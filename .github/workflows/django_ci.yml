name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [ "3.12" ]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install -r requirements.txt

    - name: Run Django System Check
      run: |
        python manage.py check

    - name: Run Production Deployment Check
      env:
        DJANGO_SECRET_KEY: "ci-test-secret-key-must-be-long-and-secure-in-production-check"
        DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
        DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1,http://testserver"
        DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "true"
        DJANGO_SECURE_HSTS_PRELOAD: "true"
        # Dummy URL: solo se parsea, no se conecta. DATABASE_URL es obligatorio
        # en producción desde que se eliminó el fallback a SQLite.
        DATABASE_URL: "postgres://user:pass@localhost:5432/ci_dummy"
      run: |
        python manage.py check --deploy --fail-level ERROR --settings=config.settings.production

    - name: Run Tests
      env:
        DJANGO_SECRET_KEY: "ci-test-secret-key-must-be-long-and-secure-in-production-check"
        DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
        DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1,http://testserver"
      run: |
        python manage.py test
