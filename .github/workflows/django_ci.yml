name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [ "3.12" ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install -r requirements.txt

    - name: Run Django System Check
      run: |
        python manage.py check

    - name: Run Production Deployment Check
      env:
        DJANGO_SECRET_KEY: "ci-test-secret-key-must-be-long-and-secure-in-production-check"
        DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
        DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1,http://testserver"
        DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "true"
        DJANGO_SECURE_HSTS_PRELOAD: "true"
      run: |
        python manage.py check --deploy --fail-level ERROR --settings=config.settings.production > deploy-check.log 2>&1 || {
          status=$?
          python - <<'PY'
        from pathlib import Path

        message = Path("deploy-check.log").read_text(errors="replace")
        message = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
        print(f"::error file=.github/workflows/django_ci.yml,line=42,title=Production deploy check failed::{message[:8000]}")
        PY
          cat deploy-check.log
          exit "$status"
        }
        cat deploy-check.log

    - name: Run Tests
      env:
        DJANGO_SECRET_KEY: "ci-test-secret-key-must-be-long-and-secure-in-production-check"
        DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
        DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1,http://testserver"
      run: |
        python manage.py test
