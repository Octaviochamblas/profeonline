name: Auto-merge

# Activa el auto-merge (squash) en cada PR no-borrador. GitHub lo completará solo
# cuando TODOS los checks requeridos pasen (CI `test (3.12)` + `audit-gate`).
# Requiere: repo con "Allow auto-merge" activado y branch protection en main.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Activar auto-merge (squash)
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --auto --squash \
            && echo "Auto-merge activado: se mergeará al pasar todos los checks." \
            || echo "Auto-merge aún no activable (¿faltan checks requeridos, conflictos, o ya está mergeado?)."
