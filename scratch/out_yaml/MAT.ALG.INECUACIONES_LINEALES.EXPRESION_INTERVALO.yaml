semantic_id: MAT.ALG.INECUACIONES_LINEALES.EXPRESION_INTERVALO
titulo: Expresión de Inecuaciones Lineales como Intervalo
objetivo: Relacionar los conjuntos solución de inecuaciones lineales con su notación
  y representación en intervalos reales.
introduccion: Una vez que resolvemos una inecuación lineal, el resultado nos indica
  un conjunto infinito de números que satisfacen la condición inicial. Aprender a
  expresar este rango como un intervalo es fundamental para comunicar la respuesta
  de forma estandarizada y compacta.
resumen: 'Resolver una inecuación lineal de una variable arroja una desigualdad simple
  de la forma $x < a$, $x \le a$, $x > a$ o $x \ge a$. Cada una se asocia de forma
  directa con un intervalo: $(-\infty, a)$, $(-\infty, a]$, $(a, \infty)$ o $[a, \infty)$,
  respectivamente.'
explicacion: '### Definición formal

  Una inecuación lineal es una expresión de la forma $mx + n \ge 0$, donde $m, n \in
  \mathbb{R}$ y $m \neq 0$ (o utilizando otros símbolos de orden). Su solución es
  un conjunto $S \subseteq \mathbb{R}$. Dependiendo de la desigualdad resultante tras
  despejar $x$, el conjunto solución se denota mediante un intervalo que se extiende
  hasta el infinito positivo o negativo. Los símbolos de orden estricto ($<$ o $>$)
  generan intervalos abiertos denotados con paréntesis redondos, y los de orden no
  estricto ($\le$ o $\ge$) incluyen al extremo con un corchete recto cerrado.


  ### Desarrollo didáctico

  Despejar una inecuación lineal es muy similar a resolver una ecuación, con la salvedad
  de que multiplicar o dividir por un número negativo invierte el signo de la desigualdad.
  Por ejemplo, al llegar a la conclusión $x \ge 4$, leemos "todos los números mayores
  o iguales a $4$". Si representamos esto en la recta numérica, dibujaríamos un punto
  relleno en el $4$ y sombrearíamos todo hacia la derecha. La notación de intervalo
  resume ese dibujo como $[4, \infty)$. Si el resultado fuera $x < 4$, sería un círculo
  sin rellenar en el $4$ sombreado hacia la izquierda, denotado como $(-\infty, 4)$.'
procedimiento:
- Simplificar y agrupar los términos semejantes de la inecuación lineal a ambos lados.
- Despejar la variable $x$, recordando invertir la desigualdad si multiplicas o divides
  por un coeficiente negativo.
- Interpretar la expresión final (por ejemplo $x > a$) ubicando mentalmente o en papel
  los valores en la recta numérica real.
- Traducir dicha región gráfica en la notación de intervalo correspondiente, cuidando
  el uso de corchetes según si el extremo está incluido o no.
ejemplos:
- tipo: A
  titulo: Presupuesto de compras
  enunciado: Tienes un presupuesto de $50000$ pesos y quieres comprar libros que cuestan
    $12000$ pesos cada uno, además de pagar $2000$ por envío. ¿Cuántos libros $x$
    puedes comprar? Expresa el conjunto de valores que puede tomar $x$ como intervalo
    continuo.
  solucion_pasos:
  - 'Modelamos el gasto total: $12000x + 2000 \le 50000$.'
  - 'Restamos $2000$: $12000x \le 48000$.'
  - 'Dividimos por $12000$: $x \le 4$.'
  - El intervalo de números reales que cumplen esta condición es $(-\infty, 4]$. (En
    la vida real se restringiría a enteros no negativos).
- tipo: A
  titulo: Resolución con coeficiente negativo
  enunciado: Resuelve la inecuación $-3x + 7 > 22$ y expresa su conjunto solución
    usando notación de intervalos.
  solucion_pasos:
  - 'Restamos $7$ a ambos lados: $-3x > 15$.'
  - 'Dividimos por $-3$. Como es negativo, invertimos el sentido de la desigualdad:
    $x < -5$.'
  - En palabras, son todos los números menores que $-5$.
  - En notación de intervalo, esto se escribe como $(-\infty, -5)$.
- tipo: B
  titulo: ¿El conjunto solución de $2x \ge 10$ se representa con el intervalo $(5,
    \infty)$?
  respuesta: 'No'
  solucion_pasos:
  - Despejando $x$, dividimos por $2$ (positivo), quedando $x \ge 5$.
  - Como la desigualdad incluye el igual (es no estricta), el $5$ debe estar incluido.
  - 'La notación correcta emplea corchete: $[5, \infty)$.'
- tipo: B
  titulo: ¿El infinito siempre va acompañado de un paréntesis redondo en los intervalos?
  respuesta: Sí
  solucion_pasos:
  - El infinito no es un número real específico que pueda ser 'incluido'.
  - Por convención matemática universal, en la notación de intervalos siempre se usan
    paréntesis o corchetes abiertos en los extremos infinitos, es decir, $(-\infty$
    y $\infty)$.
errores_frecuentes:
- Afirmar que el corchete se usa en los extremos numéricos de un intervalo de forma
  obligatoria e independiente del tipo de desigualdad.
- Omitir la inversión del símbolo de desigualdad al dividir o multiplicar por un coeficiente
  negativo.
- Concluir que el símbolo de infinito $(+\infty)$ o $(-\infty)$ puede ir acompañado
  de un corchete cerrado.
- Escribir el intervalo al revés, colocando el número mayor a la izquierda y el menor
  a la derecha.
- Interpretar una desigualdad estricta (como $x < 8$) empleando un corchete cerrado
  para el número límite en el intervalo.
