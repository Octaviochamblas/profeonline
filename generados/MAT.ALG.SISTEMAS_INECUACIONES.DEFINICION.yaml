semantic_id: MAT.ALG.SISTEMAS_INECUACIONES.DEFINICION
titulo: Sistemas de Inecuaciones Lineales
objetivo: Comprender la estructura de un sistema de inecuaciones y determinar su conjunto
  solución mediante intersección.
introduccion: En muchas situaciones se deben cumplir simultáneamente varias condiciones
  o restricciones. Esto da origen a los sistemas de inecuaciones.
resumen: Un sistema de inecuaciones lineales consiste en dos o más inecuaciones que
  deben cumplirse al mismo tiempo.
explicacion: '### Definición formal

  Un sistema de inecuaciones lineales en una variable $x$ es un conjunto de dos o
  más inecuaciones, como $a_1 x + b_1 < 0$ y $a_2 x + b_2 \ge 0$. La solución del
  sistema es la intersección de los conjuntos solución de cada una de las inecuaciones
  individuales.


  ### Desarrollo didáctico

  Para resolver el sistema, se resuelve cada inecuación por separado y luego se busca
  la región de la recta numérica que satisfaga todas las condiciones al mismo tiempo.
  Es muy útil graficar cada conjunto solución en una recta para visualizar dónde se
  superponen. Si no hay intersección, el sistema no tiene solución.'
procedimiento:
- Resolver cada inecuación del sistema de manera independiente, despejando la incógnita.
- Representar el conjunto solución de cada inecuación en una misma recta numérica
  o utilizando notación de intervalos.
- Determinar la intersección de todos los conjuntos solución. Esta intersección es
  la solución final del sistema.
ejemplos:
- titulo: Resolución de un sistema simple
  enunciado: Resuelva el sistema formado por $x > 2$ y $x \le 5$.
  solucion_pasos:
  - 'La primera inecuación ya está resuelta: $x > 2$, que corresponde al intervalo
    $(2, \infty)$.'
  - 'La segunda inecuación también: $x \le 5$, que corresponde al intervalo $(-\infty,
    5]$.'
  - La intersección de ambos intervalos es $(2, 5]$.
- titulo: Sistema sin solución
  enunciado: 'Determine el conjunto solución del sistema: $2x < 4$ y $x - 3 > 0$.'
  solucion_pasos:
  - 'Resolvemos la primera: $2x < 4 \implies x < 2$. El intervalo es $(-\infty, 2)$.'
  - 'Resolvemos la segunda: $x - 3 > 0 \implies x > 3$. El intervalo es $(3, \infty)$.'
  - No hay números que sean menores a 2 y mayores a 3 al mismo tiempo. La intersección
    es vacía ($\emptyset$).
- titulo: ¿Es $x=3$ solución del sistema $x + 1 > 3$ y $2x \le 8$?
  respuesta: Sí
  solucion_pasos:
  - 'Verificamos la primera inecuación con $x=3$: $3 + 1 = 4$. Como $4 > 3$, se cumple.'
  - 'Verificamos la segunda inecuación con $x=3$: $2(3) = 6$. Como $6 \le 8$, se cumple.'
  - Dado que satisface ambas inecuaciones simultáneamente, $x=3$ es solución.
- titulo: ¿El conjunto solución del sistema $x > -1$ y $x > 2$ es $(-1, \infty)$?
  respuesta: 'No'
  solucion_pasos:
  - El primer intervalo es $(-1, \infty)$.
  - El segundo intervalo es $(2, \infty)$.
  - La intersección de ambos conjuntos es $(2, \infty)$, no $(-1, \infty)$. Por lo
    tanto, la afirmación es falsa.
errores_frecuentes:
- Creer que la solución del sistema es la unión de los intervalos en lugar de su intersección.
- Olvidar invertir el signo de la desigualdad al dividir o multiplicar por un número
  negativo en alguna de las inecuaciones.
- Asumir que un sistema siempre tiene solución, ignorando el caso en que los intervalos
  no se intersecan.
- Graficar incorrectamente los extremos (confundir intervalos abiertos con cerrados)
  al buscar la intersección.
- Afirmar que si un número cumple con una de las inecuaciones, entonces es solución
  del sistema completo.
