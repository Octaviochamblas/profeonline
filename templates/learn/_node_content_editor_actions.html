<div class="content-editor__item-actions">
    <button type="button" data-move="up" aria-label="Subir {{ item_label }}">↑</button>
    <button type="button" data-move="down" aria-label="Bajar {{ item_label }}">↓</button>
    <button type="button" data-remove aria-label="Eliminar {{ item_label }}">×</button>
</div>
