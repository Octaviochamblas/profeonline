<div class="assessment-blocked" style="background: #fff; border: 1.5px solid #fca5a5; border-radius: 16px; padding: 1.5rem; text-align: center; box-shadow: 0 4px 12px rgba(0,0,0,.05); margin-top: 1rem;">
    <div style="font-size: 2.5rem; color: #ef4444; margin-bottom: .5rem;">🔒</div>
    <h3 style="margin: 0 0 .5rem; font-size: 1.15rem; font-weight: 800; color: #991b1b;">
        Evaluación Bloqueada
    </h3>
    <p style="font-size: .92rem; color: #4b5563; line-height: 1.5; margin: 0 0 1.25rem;">
        Has alcanzado el límite máximo de 3 intentos fallidos para el <strong>Nivel {{ level }}</strong> de este recurso.
    </p>
    <div style="background: #fcf8f2; border-left: 3px solid #f59e0b; border-radius: 0 8px 8px 0; padding: .75rem 1rem; color: #78350f; font-size: .88rem; text-align: left; margin-bottom: 1.5rem;">
        Recomendamos repasar cuidadosamente el contenido explicativo de este recurso y resolver las preguntas del banco de práctica para consolidar tu aprendizaje.
    </div>
    <button type="button" class="btn btn-secondary" style="padding: .45rem 1.25rem;"
            hx-get="{% url 'learn:assessment_status' node.asignatura_slug node.eje_slug node.bloque_slug node.tema_slug node.slug %}"
            hx-target="#assessment-container"
            hx-swap="innerHTML">
        Volver a la vista general
    </button>
</div>
