<div class="quiz-player quiz-player--panel"
     data-quiz-status-url="{% url 'learn:assessment_status' node.asignatura_slug node.eje_slug node.bloque_slug node.tema_slug node.slug %}"
     data-quiz-refresh-target="#assessment-container"
     data-quiz-refresh-swap="innerHTML">
<header class="quiz-player__bar">
    <button type="button" class="quiz-player__close" data-quiz-close aria-label="Volver a niveles">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <span class="quiz-player__mode">Evaluación · Nivel {{ level }}</span>
    <span class="quiz-player__progress"></span>
</header>
<div class="quiz-player__panel-body">
<div class="quiz-blocked" role="alert">
    <div class="quiz-blocked__icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <h3 class="quiz-blocked__title">Evaluación no disponible</h3>
    <p class="quiz-blocked__text">
        Aún no hay suficientes preguntas publicadas para la evaluación de Nivel {{ level }} de este recurso.
        Vuelve a intentarlo más tarde o continúa practicando con los ejercicios del banco de práctica.
    </p>
    <div class="quiz-blocked__actions">
        <button type="button" class="btn btn-secondary quiz-btn" data-quiz-close>
            Volver a niveles
        </button>
    </div>
</div>
</div>
</div>
