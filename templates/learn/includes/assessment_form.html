{% load static %}
<div class="assessment-player" style="background: #fafafa; border: 1.5px solid #e2e8f0; border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 12px rgba(0,0,0,.05); margin-top: 1rem;">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0;">
        <div>
            <h3 style="margin: 0; font-size: 1.1rem; font-weight: 800; color: #1e3a5f;">
                Evaluación · Nivel {{ level }}: {{ level_label }}
            </h3>
            <span style="font-size: .82rem; color: #64748b;">Responde todas las preguntas para enviar tu evaluación.</span>
        </div>
        <button type="button" class="btn btn-secondary" style="font-size: .85rem; padding: .35rem .75rem;"
                hx-get="{% url 'learn:assessment_status' node.asignatura_slug node.eje_slug node.bloque_slug node.tema_slug node.slug %}"
                hx-target="#assessment-container"
                hx-swap="innerHTML">
            Cancelar
        </button>
    </header>

    <form hx-post="{% url 'learn:assessment_submit' node.asignatura_slug node.eje_slug node.bloque_slug node.tema_slug node.slug level %}"
          hx-target="#assessment-container"
          hx-swap="innerHTML"
          class="assessment-form">
        {% csrf_token %}

        <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 1.5rem;">
            {% for question in questions %}
            <fieldset style="border: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .75rem;">
                <legend style="font-weight: 700; font-size: .95rem; color: #1e293b; margin-bottom: .5rem; width: 100%;">
                    <span style="color: #3b82f6;">{{ forloop.counter }}.</span> {{ question.text }}
                </legend>

                <div style="display: flex; flex-direction: column; gap: .5rem;">
                    {% for choice in question.choices.all %}
                    <label style="display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem; border: 1.5px solid #d0d5dd; border-radius: 10px; background: #fff; cursor: pointer; transition: background .15s, border-color .15s;">
                        <input type="radio"
                               name="question_{{ question.pk }}"
                               value="{{ choice.pk }}"
                               required
                               style="width: 1.15rem; height: 1.15rem; cursor: pointer;">
                        <span style="font-size: .91rem; color: #374151;">{{ choice.text }}</span>
                    </label>
                    {% endfor %}
                </div>
            </fieldset>
            {% endfor %}
        </div>

        <div style="padding-top: 1rem; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end;">
            <button type="submit" class="btn btn-primary" style="padding: .6rem 1.5rem; font-weight: 700;">
                Enviar evaluación
            </button>
        </div>
    </form>
</div>

<script nonce="{{ csp_nonce }}">
(function() {
    // Renderizar fórmulas de KaTeX si están presentes
    if (typeof window.renderMathInElement === "function") {
        var container = document.getElementById("assessment-container");
        if (container) {
            try {
                window.renderMathInElement(container, { throwOnError: false });
            } catch (e) {
                console.error("Error al renderizar KaTeX en el formulario: ", e);
            }
        }
    }
})();
</script>
