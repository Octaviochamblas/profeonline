{% if prerequisites %}
<aside class="learn-prereqs">
    <h2 class="learn-prereqs__title">
        <span class="learn-prereqs__icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M5 6h13l-3 3 3 3H5"/></svg>
        </span>
        Antes de empezar
    </h2>
    <p class="learn-prereqs__intro">Te recomendamos tener claro esto antes de avanzar:</p>
    <ul class="learn-prereqs__list">
        {% for pr in prerequisites %}
        <li class="learn-prereqs__item">
            <a class="learn-prereqs__link" href="{{ pr.url }}">{{ pr.node.name }}</a>
            <span class="badge {% if pr.kind == 'requerido' %}badge--info{% else %}badge--neutral{% endif %} learn-prereqs__kind">{{ pr.kind_display }}</span>
        </li>
        {% endfor %}
    </ul>
</aside>
{% endif %}
