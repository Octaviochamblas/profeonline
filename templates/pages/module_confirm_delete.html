{% extends "base.html" %}

{% block title %}Eliminar módulo | ProfeOnline{% endblock %}

{% block content %}
<section class="c-hero">
    <h1>Eliminar módulo</h1>

    <p>¿Estás segura de que deseas eliminar el módulo <strong>{{ module.title }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
    </form>

    <p>
        <a href="{% url 'content:module_list' %}">Cancelar</a>
    </p>
</section>
{% endblock %}
