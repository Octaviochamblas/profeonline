{% extends "base.html" %}

{% block title %}Formulario de recurso | ProfeOnline{% endblock %}

{% block content %}
<section class="c-hero">
    <h1>
        {% if form.instance.pk %}
            Editar recurso
        {% else %}
            Crear recurso
        {% endif %}
    </h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
    </form>

    <p>
        <a href="{% url 'content:resource_list' %}">Volver a recursos</a>
    </p>
</section>
{% endblock %}
