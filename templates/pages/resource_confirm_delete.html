{% extends "base.html" %}

{% block title %}Eliminar recurso | ProfeOnline{% endblock %}

{% block content %}
<section class="c-hero">
    <h1>Eliminar recurso</h1>

    <p>¿Estás segura de que deseas eliminar el recurso <strong>{{ resource.title }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
    </form>

    <p>
        <a href="{% url 'content:resource_detail' resource.pk %}">Cancelar</a>
    </p>
</section>
{% endblock %}
