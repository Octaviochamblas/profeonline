{% extends "base.html" %}

{% block title %}Eliminar asignatura | ProfeOnline{% endblock %}

{% block content %}
<section class="c-hero">
    <h1>Eliminar asignatura</h1>

    <p>¿Estás segura de que deseas eliminar la asignatura <strong>{{ subject.name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
    </form>

    <p>
        <a href="{% url 'content:subject_list' %}">Cancelar</a>
    </p>
</section>
{% endblock %}
