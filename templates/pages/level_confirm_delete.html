{% extends "base.html" %}

{% block title %}Eliminar nivel | ProfeOnline{% endblock %}

{% block content %}
<section class="c-hero">
    <h1>Eliminar nivel</h1>

    <p>¿Estás segura de que deseas eliminar el nivel <strong>{{ level.name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
    </form>

    <p>
        <a href="{% url 'content:level_list' %}">Cancelar</a>
    </p>
</section>
{% endblock %}
