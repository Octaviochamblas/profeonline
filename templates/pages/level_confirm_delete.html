{% extends "base.html" %}

{% block title %}Eliminar nivel | ProfeOnline{% endblock %}

{% block content %}
<section class="page-hero">
    <div class="section-header">
        <div>
            <p class="page-hero__kicker">Confirmación</p>
            <h1>Eliminar nivel</h1>
        </div>
    </div>
</section>

<form method="post" class="form-panel">
    {% csrf_token %}
    <p>¿Estás segura de que deseas eliminar el nivel <strong>{{ level.name }}</strong>?</p>
    <div class="form-actions">
        <a href="{% url 'content:level_list' %}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    </div>
</form>
{% endblock %}
