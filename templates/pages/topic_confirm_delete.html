{% extends "base.html" %}

{% block title %}Eliminar tema | ProfeOnline{% endblock %}

{% block content %}
<section class="c-hero">
    <h1>Eliminar tema</h1>

    <p>¿Estás segura de que deseas eliminar el tema <strong>{{ topic.name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
    </form>

    <p>
        <a href="{% url 'content:topic_list' %}">Cancelar</a>
    </p>
</section>
{% endblock %}
