{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ProfeOnline{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'core:home' %}">ProfeOnline</a>
            <a href="{% url 'content:resource_list' %}">Recursos</a>
            <a href="{% url 'content:subject_list' %}">Asignaturas</a>
            <a href="{% url 'content:topic_list' %}">Temas</a>
            <a href="{% url 'content:level_list' %}">Niveles</a>
            <a href="{% url 'content:module_list' %}">Módulos</a>
            {% if user.is_authenticated %}
                <span>Hola, {{ user.username }}</span>
                <a href="{% url 'profile' %}">Mi perfil</a>

                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Cerrar sesión</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Iniciar sesión</a>
                <a href="{% url 'register' %}">Registrarse</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
