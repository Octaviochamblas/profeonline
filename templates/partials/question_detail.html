<div class="q-detail">
    <p class="q-detail__full">{{ question.text }}</p>
    {% if question.explanation %}
        <div class="q-detail__expl"><strong>Explicación:</strong> {{ question.explanation|linebreaksbr }}</div>
    {% endif %}

    <div class="q-detail__alts" id="alts-{{ question.id }}">
        {% for choice in question.choices.all %}
            {% include "partials/choice_item.html" with choice=choice %}
        {% endfor %}
    </div>

    <div class="q-detail__actions">
        <button type="button" class="btn-secondary btn-sm"
                hx-post="{% url 'content:add_choice_inline' question.id %}"
                hx-target="#alts-{{ question.id }}"
                hx-swap="beforeend">
            + Alternativa
        </button>
        <button type="button" class="btn-secondary btn-sm"
                hx-get="{% url 'content:edit_question_inline' question.id %}"
                hx-target="#question-body-{{ question.id }}"
                hx-swap="innerHTML">
            Editar pregunta
        </button>
        <button type="button" class="btn-danger btn-sm"
                hx-post="{% url 'content:delete_question' question.id %}"
                hx-confirm="¿Eliminar esta pregunta y todas sus alternativas?"
                hx-target="#question-item-{{ question.id }}"
                hx-swap="outerHTML">
            Eliminar
        </button>
    </div>
</div>
