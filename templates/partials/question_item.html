<details class="acc-q acc-q--{{ question.status }}" id="question-item-{{ question.id }}"{% if open %} open{% endif %}>
    <summary class="acc-q__sum">
        <input type="checkbox" class="q-check" value="{{ question.id }}" aria-label="Seleccionar pregunta">
        <span class="acc-q__dot" aria-hidden="true"></span>
        <span class="acc-q__txt">{{ question.text|truncatechars:120 }}</span>
        <span class="acc-q__badges">
            <span class="badge badge--status-{{ question.status }}">{{ question.get_status_display }}</span>
        </span>
        <span class="acc-q__chev" aria-hidden="true"></span>
    </summary>
    <div class="acc-q__body" id="question-body-{{ question.id }}">
        {% include "partials/question_detail.html" with question=question %}
    </div>
</details>
