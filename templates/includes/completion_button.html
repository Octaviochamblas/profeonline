<form id="completion-button"
      method="post"
      action="{% url 'content:resource_toggle_completion' resource.slug %}"
      hx-post="{% url 'content:resource_toggle_completion' resource.slug %}"
      hx-swap="outerHTML"
      class="completion-form">
    {% csrf_token %}
    {% if completed %}
        <button type="submit" class="btn completion-btn completion-btn--done">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            Comprendido
        </button>
        <span class="completion-hint">Lo marcaste como comprendido. Pulsa para desmarcar.</span>
    {% else %}
        <button type="submit" class="btn btn-secondary completion-btn">
            Marcar como comprendido
        </button>
    {% endif %}
</form>
