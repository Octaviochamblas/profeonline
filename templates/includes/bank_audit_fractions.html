<span class="acc-audits" aria-label="Auditoría editorial">
    {% for a in audit %}
    <span class="acc-frac{% if a.complete %} is-complete{% elif a.done %} is-partial{% else %} is-none{% endif %}" title="{{ a.label }}: {{ a.done }} de {{ a.total }} recursos auditados">
        <span class="acc-frac__label">{{ a.label }}</span>
        <span class="acc-frac__num">{{ a.done }}/{{ a.total }}</span>
    </span>
    {% endfor %}
</span>
