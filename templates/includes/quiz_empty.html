<div class="quiz-player quiz-player--panel" data-quiz-status-url="{% url 'content:quiz_status' resource.slug %}">
<header class="quiz-player__bar">
    <button type="button" class="quiz-player__close" data-quiz-close aria-label="Volver a niveles">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <span class="quiz-player__mode">{% if mode == "preparacion" %}Preparación{% else %}Evaluación{% endif %} · Nivel {{ level }}</span>
    <span class="quiz-player__progress"></span>
</header>
<div class="quiz-player__panel-body">
<div class="quiz-empty" role="status">
    <p class="quiz-empty__text">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        Aún no hay preguntas de
        {% if mode == "preparacion" %}preparación{% else %}evaluación{% endif %}
        disponibles para el nivel {{ level }} de este recurso.
    </p>
</div>
</div>
</div>
