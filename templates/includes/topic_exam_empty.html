<div class="quiz-player quiz-player--panel">
<header class="quiz-player__bar">
    <button type="button" class="quiz-player__close" data-quiz-close aria-label="Cerrar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <span class="quiz-player__mode">Evaluación final — {{ topic.name }}</span>
    <span class="quiz-player__progress"></span>
</header>
<div class="quiz-player__panel-body">
<div class="quiz-empty" role="status">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <p>Aún no hay preguntas disponibles para la evaluación final de <strong>{{ topic.name }}</strong>. Vuelve más adelante.</p>
</div>
</div>
</div>
