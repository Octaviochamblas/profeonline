<div class="quiz-recover-result" role="status">
    {% if recovered %}
    <div class="quiz-recover-result--success">
        <p>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            <strong>¡Intento recuperado!</strong> Ahora puedes volver a intentar la evaluación del nivel {{ level }}.
        </p>
        <button class="btn btn-primary quiz-btn"
                hx-get="{% url 'content:quiz_start' resource.slug level 'evaluacion' %}"
                hx-target="#quiz-area-{{ level }}"
                hx-swap="innerHTML">
            Intentar evaluación
        </button>
    </div>
    {% else %}
    <div class="quiz-recover-result--fail">
        <p>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            No se pudo recuperar el intento. Practica con al menos <strong>80% de aciertos</strong> para poder recuperar.
        </p>
    </div>
    {% endif %}
</div>
