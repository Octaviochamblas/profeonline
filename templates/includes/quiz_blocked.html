<div class="quiz-player quiz-player--panel" data-quiz-status-url="{% url 'content:quiz_status' resource.slug %}">
<header class="quiz-player__bar">
    <button type="button" class="quiz-player__close" data-quiz-close aria-label="Volver a niveles">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <span class="quiz-player__mode">Evaluación · Nivel {{ level }}</span>
    <span class="quiz-player__progress"></span>
</header>
<div class="quiz-player__panel-body">
<div class="quiz-blocked" role="alert">
    <div class="quiz-blocked__icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h3 class="quiz-blocked__title">Evaluación bloqueada</h3>
    <p class="quiz-blocked__text">
        Has agotado tus 3 intentos de evaluación en el nivel {{ level }}.
        Para recuperar un intento, completa una sesión de práctica con al menos <strong>80% de aciertos</strong>.
    </p>
    <div class="quiz-blocked__actions">
        <button class="btn btn-primary quiz-btn"
                hx-get="{% url 'content:quiz_start' resource.slug level 'preparacion' %}"
                hx-target="#quiz-player-root"
                hx-swap="innerHTML">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            Ir a Preparación
        </button>
        {% if info.can_recover %}
        <form hx-post="{% url 'content:quiz_recover' resource.slug level %}"
              hx-target="#quiz-player-root"
              hx-swap="innerHTML">
            {% csrf_token %}
            <button type="submit" class="btn btn-secondary quiz-btn">
                Recuperar intento
            </button>
        </form>
        {% endif %}
    </div>
</div>
</div>
</div>
