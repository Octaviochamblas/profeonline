<nav class="breadcrumbs" aria-label="Breadcrumb">
    <ol>
        {% for item in breadcrumbs %}
            <li>
                {% if item.url and not forloop.last %}
                    <a href="{{ item.url }}">{{ item.label }}</a>
                {% else %}
                    <span aria-current="page">{{ item.label }}</span>
                {% endif %}
            </li>
        {% endfor %}
    </ol>
</nav>
