{% if last_resource %}
<a class="resume-card" href="{% url 'content:resource_detail' last_resource.slug %}">
    <span class="resume-card__body">
        <span class="page-hero__kicker">Continuar donde quedaste</span>
        <span class="resume-card__title">{{ last_resource.title }}</span>
        <span class="resume-card__meta">
            {% if last_resource.subject %}<span class="badge badge--neutral">{{ last_resource.subject.name }}</span>{% endif %}
            {% if last_resource.topic %}<span class="badge badge--neutral">{{ last_resource.topic.name }}</span>{% endif %}
        </span>
    </span>
    <span class="resume-card__cta btn btn-primary">Continuar →</span>
</a>
{% endif %}
