repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: django-check
        name: Django System Check
        entry: .venv/Scripts/python.exe manage.py check
        language: system
        pass_filenames: false
        always_run: true

      - id: django-tests
        name: Django Unit Tests
        entry: .venv/Scripts/python.exe manage.py test
        language: system
        pass_filenames: false
        always_run: true
