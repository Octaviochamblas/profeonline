# Nixpacks configuration for Django on Railway

[phases.build]
cmds = ["pip install -r requirements.txt", "python manage.py collectstatic --no-input"]

[start]
# --timeout 120: las llamadas a la IA (extracción de ítems, generación) son síncronas
# y pueden tardar >30s (el default de gunicorn), lo que abortaba el worker (SystemExit: 1).
# import_knowledge_tree/load_node_content/load_exercise_bank/publish_knowledge_nodes son
# idempotentes: sincronizan docs/conocimiento/ con la base en cada deploy.
cmd = "python manage.py migrate && python manage.py ensure_admin && python manage.py ensure_site && python manage.py import_knowledge_tree && python manage.py load_node_content && python manage.py load_exercise_bank && python manage.py publish_knowledge_nodes && gunicorn config.wsgi:application --timeout 120"
