<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Regla mnemotécnica de valores trigonométricos notables"><rect width="320" height="260" fill="#ffffff"/><text x="160.00" y="30.00" font-size="13" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">Tabla de valores trigonométricos notables</text><text x="70.00" y="70.00" font-size="13" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600"></text><text x="150.00" y="70.00" font-size="13" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">30°</text><text x="210.00" y="70.00" font-size="13" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">45°</text><text x="270.00" y="70.00" font-size="13" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">60°</text><text x="70.00" y="105.00" font-size="12" fill="#1f2937" text-anchor="start" font-family="Outfit, sans-serif" font-weight="normal">sen θ</text><text x="150.00" y="105.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">1/2</text><text x="210.00" y="105.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">√2/2</text><text x="270.00" y="105.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">√3/2</text><text x="70.00" y="140.00" font-size="12" fill="#1f2937" text-anchor="start" font-family="Outfit, sans-serif" font-weight="normal">cos θ</text><text x="150.00" y="140.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">√3/2</text><text x="210.00" y="140.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">√2/2</text><text x="270.00" y="140.00" font-size="12" fill="#1f2937" text-anchor="middle"