<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Definición de factorial">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="70.00" font-size="15" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">n! = n×(n-1)×(n-2)×...×2×1</text>
<text x="160.00" y="115.00" font-size="14" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">5! = 5×4×3×2×1 = 120</text>
<text x="160.00" y="160.00" font-size="13" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">0! = 1 (por definición)</text>
</svg>
