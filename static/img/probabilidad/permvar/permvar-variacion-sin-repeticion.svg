<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Variaciones sin repetición">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="70.00" font-size="16" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">V(n,r) = n! / (n-r)!</text>
<text x="160.00" y="115.00" font-size="12" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">5 personas, 3 puestos: V(5,3)=5×4×3=60</text>
</svg>
