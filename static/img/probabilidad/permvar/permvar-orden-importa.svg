<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Situaciones donde el orden importa">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="70.00" font-size="16" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">¿Importa el orden?</text>
<text x="160.00" y="115.00" font-size="13" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">Sí → permutación / variación</text>
<text x="160.00" y="160.00" font-size="13" fill="#7c3aed" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">No → combinación</text>
</svg>
