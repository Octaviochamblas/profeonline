<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Eventos dependientes">
<rect width="320" height="260" fill="#ffffff"/>
<rect x="30.00" y="60.00" width="110.00" height="55.00" rx="0" fill="none" fill-opacity="1.0" stroke="#2563eb" stroke-width="2"/>
<text x="85.00" y="85.00" font-size="11" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">Urna: 5 rojas, 5 azules</text>
<text x="85.00" y="103.00" font-size="10" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">extraer sin devolver</text>
<text x="160.00" y="105.00" font-size="20" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">→</text>
<rect x="190.00" y="60.00" width="110.00" height="55.00" rx="0" fill="none" fill-opacity="1.0" stroke="#dc2626" stroke-width="2"/>
<text x="245.00" y="85.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">Urna: cambia</text>
