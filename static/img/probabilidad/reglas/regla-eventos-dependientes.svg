<text x="160.00" y="150.00" font-size="13" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">P(2da roja | 1ra roja) ≠ P(1ra roja)</text>
<text x="160.00" y="175.00" font-size="11" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">el resultado del 1er evento afecta al 2do</text>
</svg>
