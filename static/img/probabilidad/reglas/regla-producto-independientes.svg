<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Regla del producto para eventos independientes">
<rect width="320" height="260" fill="#ffffff"/>
<rect x="30.00" y="90.00" width="100.00" height="60.00" rx="0" fill="none" fill-opacity="1.0" stroke="#2563eb" stroke-width="2"/>
<text x="80.00" y="115.00" font-size="13" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">Moneda</text>
<text x="80.00" y="135.00" font-size="11" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">P(cara)=1/2</text>
<text x="150.00" y="120.00" font-size="22" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">×</text>
<rect x="190.00" y="90.00" width="100.00" height="60.00" rx="0" fill="none" fill-opacity="1.0" stroke="#7c3aed" stroke-width="2"/>
<text x="240.00" y="115.00" font-size="13" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">Dado</text>
<text x="240.00" y="135.00" font-size="11" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">P(6)=1/6</text>
<line x1="160.00" y1="160.00" x2="160.00" y2="190.00" stroke="#1f2937" stroke-width="1.5"/>
<text x="160.00" y="210.00" font-size="13" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">P(cara y 6) = 1/2 × 1/6 = 1/12</text>
</svg>
