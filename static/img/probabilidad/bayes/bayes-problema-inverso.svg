<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Problemas de probabilidad inversa">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="60.00" font-size="13" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">Dato conocido: P(síntoma|enfermedad)</text>
<text x="160.00" y="100.00" font-size="16" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">↓ (invertir)</text>
<text x="160.00" y="140.00" font-size="13" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">Se busca: P(enfermedad|síntoma)</text>
<text x="160.00" y="190.00" font-size="11" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">esta es la 'probabilidad inversa'</text>
