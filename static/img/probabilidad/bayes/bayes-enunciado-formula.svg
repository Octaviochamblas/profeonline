<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Enunciado formal de la regla de Bayes">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="50.00" font-size="14" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">P(Bi|A) = P(Bi)×P(A|Bi) / P(A)</text>
<text x="160.00" y="100.00" font-size="13" fill="#7c3aed" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">P(A) = Σ P(Bj)×P(A|Bj)</text>
<text x="160.00" y="145.00" font-size="11" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">numerador: la ruta específica Bi</text>
<text x="160.00" y="175.00" font-size="11" fill="#7c3aed" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">denominador: probabilidad total (todas las rutas)</text>
</svg>
