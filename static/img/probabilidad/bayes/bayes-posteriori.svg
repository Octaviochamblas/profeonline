<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Probabilidad a posteriori">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="60.00" font-size="14" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">P(A|B) = probabilidad a posteriori</text>
<text x="160.00" y="110.00" font-size="13" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">actualizada DESPUÉS de observar</text>
<text x="160.00" y="140.00" font-size="13" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">la evidencia B (ej: resultado positivo)</text>
<text x="160.00" y="190.00" font-size="11" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">P(enfermedad|positivo) = valor actualizado</text>
</svg>
