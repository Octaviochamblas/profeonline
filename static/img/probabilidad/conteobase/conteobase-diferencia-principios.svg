<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diferencia entre principio aditivo y multiplicativo">
<rect width="320" height="260" fill="#ffffff"/>
<rect x="20.00" y="30.00" width="130.00" height="190.00" rx="0" fill="none" fill-opacity="1.0" stroke="#2563eb" stroke-width="2"/>
<text x="85.00" y="55.00" font-size="14" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">Aditivo (O)</text>
<text x="85.00" y="90.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">3 buses O 2 trenes</text>
<text x="85.00" y="120.00" font-size="13" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">3 + 2 = 5</text>
<text x="85.00" y="150.00" font-size="10" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">alternativas excluyentes</text>
<rect x="170.00" y="30.00" width="130.00" height="190.00" rx="0" fill="none" fill-opacity="1.0" stroke="#7c3aed" stroke-width="2"/>
<text x="235.00" y="55.00" font-size="13" fill="#7c3aed" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">Multiplicativo (Y)</text>
<text x="235.00" y="90.00" font-size="11" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">3 entradas Y 2 postres</text>
<text x="235.00" y="120.00" font-size="13" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">3 × 2 = 6</text>
<text x="235.00" y="150.00" font-size="10" fill="#7c3aed" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">etapas sucesivas</text>
</svg>
