<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Conectores lógicos en problemas de conteo">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="60.00" font-size="15" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">'O' → suma (aditivo)</text>
<text x="160.00" y="110.00" font-size="15" fill="#7c3aed" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">'Y' → producto (multiplicativo)</text>
<text x="160.00" y="160.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">identificar el conector antes de contar</text>
</svg>
