<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cálculo del producto condicional">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="60.00" font-size="16" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">P(A∩B) = P(A) × P(B|A)</text>
<text x="160.00" y="110.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">forma equivalente:</text>
<text x="160.00" y="145.00" font-size="15" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">P(A∩B) = P(B) × P(A|B)</text>
<text x="160.00" y="190.00" font-size="11" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">ambas formas dan el mismo resultado</text>
</svg>
