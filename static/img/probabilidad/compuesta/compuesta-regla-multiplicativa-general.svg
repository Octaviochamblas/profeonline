<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Regla multiplicativa general">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="60.00" font-size="15" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">P(A|B) = P(A∩B) / P(B)</text>
<text x="160.00" y="100.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">despejando P(A∩B):</text>
<text x="160.00" y="140.00" font-size="17" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">P(A∩B) = P(B) × P(A|B)</text>
</svg>
