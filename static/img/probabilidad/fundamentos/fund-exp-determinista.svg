<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Experimento aleatorio vs determinista">
<rect width="320" height="260" fill="#ffffff"/>
<rect x="20.00" y="30.00" width="130.00" height="190.00" rx="0" fill="none" fill-opacity="1.0" stroke="#2563eb" stroke-width="2"/>
<text x="85.00" y="55.00" font-size="14" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">Aleatorio</text>
<text x="85.00" y="90.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">Lanzar un dado</text>
<text x="85.00" y="115.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">resultado ∈ {1..6}</text>
<text x="85.00" y="145.00" font-size="11" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">no se puede predecir</text>
<rect x="170.00" y="30.00" width="130.00" height="190.00" rx="0" fill="none" fill-opacity="1.0" stroke="#7c3aed" stroke-width="2"/>
<text x="235.00" y="55.00" font-size="14" fill="#7c3aed" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">Determinista</text>
<text x="235.00" y="90.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">2 + 2</text>
<text x="235.00" y="115.00" font-size="12" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">resultado = 4</text>
<text x="235.00" y="145.00" font-size="11" fill="#7c3aed" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">siempre el mismo</text>
</svg>
