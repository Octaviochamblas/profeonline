<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lectura verbal de la notación condicional">
<rect width="320" height="260" fill="#ffffff"/>
<text x="160.00" y="60.00" font-size="28" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="700">P(A|B)</text>
<text x="160.00" y="110.00" font-size="13" fill="#1f2937" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">se lee:</text>
<text x="160.00" y="145.00" font-size="15" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="600">"probabilidad de A, dado B"</text>
<line x1="60.00" y1="175.00" x2="260.00" y2="175.00" stroke="#1f2937" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="160.00" y="200.00" font-size="12" fill="#2563eb" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">A = evento de interés</text>
<text x="160.00" y="220.00" font-size="12" fill="#dc2626" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="normal">B = evento condicionante (ya ocurrió)</text>
</svg>
