<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cálculo del puntaje Z">
<text x="160" y="90" font-size="13" fill="#1f2937" text-anchor="middle" font-family="sans-serif">x=650, μ=500, σ=100</text>
<text x="160" y="140" font-size="15" fill="#dc2626" text-anchor="middle" font-family="sans-serif">Z = (650-500)/100 = 1,5</text>
</svg>
