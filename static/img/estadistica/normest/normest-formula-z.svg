<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fórmula de estandarización">
<text x="160" y="110" font-size="18" fill="#1f2937" text-anchor="middle" font-family="sans-serif">Z = (x - μ) / σ</text>
<text x="160" y="150" font-size="12" fill="#dc2626" text-anchor="middle" font-family="sans-serif">x=180, μ=170, σ=10 → Z=1</text>
</svg>
