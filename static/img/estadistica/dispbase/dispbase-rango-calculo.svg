<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cálculo del rango">
<text x="160" y="120" font-size="16" fill="#1f2937" text-anchor="middle" font-family="sans-serif">R = x_max - x_min</text>
<line x1="40" y1="150" x2="280" y2="150" stroke="#1f2937" stroke-width="2"/>
<circle cx="60" cy="150" r="5" fill="#1f2937"/>
<circle cx="260" cy="150" r="5" fill="#dc2626"/>
<text x="60" y="175" font-size="10" fill="#1f2937" text-anchor="middle" font-family="sans-serif">min</text>
<text x="260" y="175" font-size="10" fill="#dc2626" text-anchor="middle" font-family="sans-serif">max</text>
</svg>
