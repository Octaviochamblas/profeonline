<text x="160" y="115" font-size="13" fill="#1f2937" text-anchor="middle" font-weight="normal" font-family="sans-serif">sumar k a cada dato</text>
<text x="160" y="160" font-size="13" fill="#1f2937" text-anchor="middle" font-weight="normal" font-family="sans-serif">→ suma k a la media</text>
