<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cálculo del coeficiente de variación">
<text x="160" y="100" font-size="13" fill="#1f2937" text-anchor="middle" font-family="sans-serif">media = 50, σ = 5</text>
<text x="160" y="145" font-size="15" fill="#dc2626" text-anchor="middle" font-family="sans-serif">CV = (5/50) × 100% = 10%</text>
</svg>
