<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparación relativa entre grupos">
<text x="90" y="90" font-size="12" fill="#1f2937" text-anchor="middle" font-family="sans-serif">Grupo A</text>
<text x="90" y="115" font-size="13" fill="#2563eb" text-anchor="middle" font-family="sans-serif">CV = 5%</text>
<text x="230" y="90" font-size="12" fill="#1f2937" text-anchor="middle" font-family="sans-serif">Grupo B</text>
<text x="230" y="115" font-size="13" fill="#dc2626" text-anchor="middle" font-family="sans-serif">CV = 20%</text>
<text x="160" y="160" font-size="11" fill="#1f2937" text-anchor="middle" font-family="sans-serif">B es relativamente más disperso</text>
</svg>
