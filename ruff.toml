# Config de Ruff (linter/formatter de Python).
# Por ahora corre en CI en modo REPORTE (no bloquea). Cuando el código esté limpio,
# quitar el `|| true` del job `lint` en .github/workflows/django_ci.yml para hacerlo gating.
line-length = 100
target-version = "py312"
extend-exclude = ["**/migrations/**", ".venv/**"]

[lint]
select = ["E", "F", "W", "I"]   # errores, pyflakes, warnings, orden de imports
ignore = ["E501"]               # largo de línea: no fallar todavía
