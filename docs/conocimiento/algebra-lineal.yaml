# =============================================================================
# DETALLE — Rama ÁLGEBRA LINEAL (introducción)   (borde superior preu, M2)
# Fuente: Carreño (Cap 10 vectores, Cap 11 matrices). El 🧑 decide si entra en
# preu o va a fase universitaria.
# =============================================================================

rama: Álgebra Lineal (introducción)
abreviatura: LIN
temas:

  - id: MAT.LIN.VECTORES-R3
    nombre: Vectores en el espacio
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Vectores en R³ y operatoria", dificultad: avanzada }
      - { n: "02", nombre: "Producto punto (escalar) y ángulo entre vectores", dificultad: avanzada }
      - { n: "03", nombre: "Producto vectorial (cruz)", dificultad: avanzada }

  - id: MAT.LIN.MATRICES
    nombre: Matrices y operaciones
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Concepto de matriz, igualdad y adición", dificultad: avanzada }
      - { n: "02", nombre: "Ponderación por un escalar", dificultad: avanzada }
      - { n: "03", nombre: "Multiplicación de matrices", dificultad: avanzada }
      - { n: "04", nombre: "Matriz inversa y ecuaciones matriciales", dificultad: avanzada }

  - id: MAT.LIN.DETERMINANTES
    nombre: Determinantes y sistemas lineales
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Determinantes de orden 2 y 3", dificultad: avanzada }
      - { n: "02", nombre: "Sistemas lineales con determinantes (Cramer)", dificultad: avanzada }
