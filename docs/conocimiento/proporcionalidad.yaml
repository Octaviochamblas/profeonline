      - { n: "02", nombre: "Proporciones y propiedad fundamental", dificultad: basica }
      - { n: "03", nombre: "Serie de razones", dificultad: media }

  - id: MAT.PROP.DIRECTA
    nombre: Proporcionalidad directa
    dificultad: [basica, media]
