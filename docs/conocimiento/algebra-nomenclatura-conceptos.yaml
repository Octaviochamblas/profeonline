      - { cod: "03.04.09", id: MAT.ALG.POLINOMIOS.POLINOMIOS_IDENTICOS, nombre: "Identificación de polinomios idénticos", dificultad: media, cursos: [1M, 2M] } # sin fuente
      - { cod: "03.04.10", id: MAT.ALG.POLINOMIOS.IGUALDAD_COEFICIENTES, nombre: "Determinación de coeficientes correspondientes en polinomios idénticos", dificultad: avanzada, cursos: [1M, 2M] } # sin fuente

