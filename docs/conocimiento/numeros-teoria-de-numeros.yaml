# =============================================================================
# DETALLE ATÓMICO — Eje 02: NÚMEROS · Bloque 02: Teoría de Números
# Grano: núcleo mínimo (1 recurso = 1 idea = 1 video corto).
# Nomenclatura: EE.BB.TT.RR. id = identificador semántico estable.
# competencia: M1 | M2 | U   dificultad: basica < media < avanzada
# Archivo separado (un archivo por bloque). Temas 02.02.01–02.02.06.
# =============================================================================

rama: Números
codigo: "02"
abreviatura: NUM
bloque: "Teoría de Números"
bloque_codigo: "02.02"
temas:

  - codigo: "02.02.01"
    id: MAT.NUM.DIVISIBILIDAD
    nombre: Divisibilidad
    competencia: M1
    recursos:
      - { cod: "02.02.01.01", id: MAT.NUM.DIVISIBILIDAD.MULTIPLO_CONCEPTO, nombre: "Concepto de múltiplo de un número natural", dificultad: basica, cursos: [5B, 6B, 7B] } # baja certeza curricular
      - { cod: "02.02.01.02", id: MAT.NUM.DIVISIBILIDAD.OBTENCION_MULTIPLOS, nombre: "Obtención de múltiplos de un número natural", dificultad: basica, cursos: [5B, 6B, 7B] } # baja certeza curricular
      - { cod: "02.02.01.03", id: MAT.NUM.DIVISIBILIDAD.DIVISOR_CONCEPTO, nombre: "Concepto de divisor de un número natural", dificultad: basica, cursos: [5B, 6B, 7B] } # baja certeza curricular
      - { cod: "02.02.01.04", id: MAT.NUM.DIVISIBILIDAD.OBTENCION_DIVISORES, nombre: "Obtención de divisores de un número natural", dificultad: basica, cursos: [5B, 6B, 7B] } # baja certeza curricular
      - { cod: "02.02.01.05", id: MAT.NUM.DIVISIBILIDAD.DIVISION_EXACTA, nombre: "Divisibilidad como división exacta", dificultad: basica, cursos: [6B, 7B] }
      - { cod: "02.02.01.06", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_2, nombre: "Criterio de divisibilidad por 2", dificultad: basica, cursos: [6B] }
      - { cod: "02.02.01.07", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_3, nombre: "Criterio de divisibilidad por 3", dificultad: basica, cursos: [6B] }
      - { cod: "02.02.01.08", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_4, nombre: "Criterio de divisibilidad por 4", dificultad: media, cursos: [6B] }
      - { cod: "02.02.01.09", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_5, nombre: "Criterio de divisibilidad por 5", dificultad: basica, cursos: [6B] }
      - { cod: "02.02.01.10", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_6, nombre: "Criterio de divisibilidad por 6", dificultad: media, cursos: [6B] }
      - { cod: "02.02.01.11", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_8, nombre: "Criterio de divisibilidad por 8", dificultad: media, cursos: [6B] }
      - { cod: "02.02.01.12", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_9, nombre: "Criterio de divisibilidad por 9", dificultad: media, cursos: [6B] }
      - { cod: "02.02.01.13", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_10, nombre: "Criterio de divisibilidad por 10", dificultad: basica, cursos: [6B] }
      - { cod: "02.02.01.14", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_11, nombre: "Criterio de divisibilidad por 11", dificultad: avanzada, competencia: U, cursos: [7B] } # poco frecuente
      - { cod: "02.02.01.15", id: MAT.NUM.DIVISIBILIDAD.CRITERIO_25, nombre: "Criterio de divisibilidad por 25", dificultad: avanzada, competencia: U, cursos: [7B] } # poco frecuente

  - codigo: "02.02.02"
    id: MAT.NUM.NUMEROS_PRIMOS
    nombre: Números primos
    competencia: M1
    recursos:
      - { cod: "02.02.02.01", id: MAT.NUM.NUMEROS_PRIMOS.PRIMO_DEFINICION, nombre: "Definición de número primo", dificultad: basica, cursos: [6B, 7B] }
      - { cod: "02.02.02.02", id: MAT.NUM.NUMEROS_PRIMOS.PRIMO_IDENTIFICACION, nombre: "Identificación de número primo por cantidad de divisores", dificultad: basica, cursos: [6B, 7B] }
      - { cod: "02.02.02.03", id: MAT.NUM.NUMEROS_PRIMOS.COMPUESTO_DEFINICION, nombre: "Definición de número compuesto", dificultad: basica, cursos: [6B, 7B] }
      - { cod: "02.02.02.04", id: MAT.NUM.NUMEROS_PRIMOS.COMPUESTO_IDENTIFICACION, nombre: "Identificación de número compuesto por cantidad de divisores", dificultad: basica, cursos: [6B, 7B] }
      - { cod: "02.02.02.05", id: MAT.NUM.NUMEROS_PRIMOS.UNO_NO_PRIMO_NO_COMPUESTO, nombre: "Caso del número 1 frente a la primalidad", dificultad: media, cursos: [6B, 7B] }

  - codigo: "02.02.03"
    id: MAT.NUM.FACTORIZACION_PRIMA
    nombre: Factorización prima
    competencia: M1
    recursos:
      - { cod: "02.02.03.01", id: MAT.NUM.FACTORIZACION_PRIMA.FACTOR_PRIMO_CONCEPTO, nombre: "Concepto de factor primo", dificultad: basica, cursos: [6B, 7B] }
      - { cod: "02.02.03.02", id: MAT.NUM.FACTORIZACION_PRIMA.DESCOMPOSICION_PRIMA_CONCEPTO, nombre: "Descomposición prima como producto de factores primos", dificultad: media, cursos: [6B, 7B] }
      - { cod: "02.02.03.03", id: MAT.NUM.FACTORIZACION_PRIMA.DESCOMPOSICION_UNICA, nombre: "Unicidad de la descomposición prima", dificultad: media, cursos: [7B, 1M] }
      - { cod: "02.02.03.04", id: MAT.NUM.FACTORIZACION_PRIMA.METODO_TABLA, nombre: "Factorización prima mediante tabla", dificultad: media, cursos: [6B, 7B] }
      - { cod: "02.02.03.05", id: MAT.NUM.FACTORIZACION_PRIMA.METODO_ARBOL, nombre: "Factorización prima mediante árbol de factores", dificultad: media, cursos: [6B, 7B] }
      - { cod: "02.02.03.06", id: MAT.NUM.FACTORIZACION_PRIMA.CANTIDAD_DIVISORES, nombre: "Cálculo de cantidad total de divisores mediante exponentes", competencia: M2, dificultad: avanzada, cursos: [1M, 2M] } # baja certeza curricular

  - codigo: "02.02.04"
    id: MAT.NUM.MINIMO_COMUN_MULTIPLO
    nombre: Mínimo Común Múltiplo
    competencia: M1
    recursos:
      - { cod: "02.02.04.01", id: MAT.NUM.MINIMO_COMUN_MULTIPLO.CONCEPTO, nombre: "Concepto de mínimo común múltiplo", dificultad: basica, cursos: [6B, 7B] }
      - { cod: "02.02.04.02", id: MAT.NUM.MINIMO_COMUN_MULTIPLO.IDENTIFICACION_LISTA, nombre: "Identificación del m.c.m. mediante lista de múltiplos comunes", dificultad: media, cursos: [6B, 7B] }
      - { cod: "02.02.04.03", id: MAT.NUM.MINIMO_COMUN_MULTIPLO.METODO_TABLA_SIMULTANEA, nombre: "Cálculo del m.c.m. mediante tabla de descomposición simultánea", dificultad: media, cursos: [6B, 7B] }
      - { cod: "02.02.04.04", id: MAT.NUM.MINIMO_COMUN_MULTIPLO.METODO_POTENCIAS_PRIMAS, nombre: "Cálculo del m.c.m. mediante potencias primas de mayor exponente", dificultad: avanzada, cursos: [8B, 1M] }

  - codigo: "02.02.05"
    id: MAT.NUM.MAXIMO_COMUN_DIVISOR
    nombre: Máximo Común Divisor
    competencia: M1
    recursos:
      - { cod: "02.02.05.01", id: MAT.NUM.MAXIMO_COMUN_DIVISOR.CONCEPTO, nombre: "Concepto de máximo común divisor", dificultad: basica, cursos: [6B, 7B] }
      - { cod: "02.02.05.02", id: MAT.NUM.MAXIMO_COMUN_DIVISOR.IDENTIFICACION_LISTA, nombre: "Identificación del M.C.D. mediante lista de divisores comunes", dificultad: media, cursos: [6B, 7B] }
      - { cod: "02.02.05.03", id: MAT.NUM.MAXIMO_COMUN_DIVISOR.METODO_TABLA_FACTORES_COMUNES, nombre: "Cálculo del M.C.D. mediante tabla de factores comunes", dificultad: media, cursos: [7B] }
      - { cod: "02.02.05.04", id: MAT.NUM.MAXIMO_COMUN_DIVISOR.METODO_POTENCIAS_PRIMAS, nombre: "Cálculo del M.C.D. mediante potencias primas de menor exponente", dificultad: avanzada, cursos: [8B, 1M] }
      - { cod: "02.02.05.05", id: MAT.NUM.MAXIMO_COMUN_DIVISOR.ALGORITMO_EUCLIDES, nombre: "Cálculo del M.C.D. mediante el algoritmo de Euclides", competencia: M2, dificultad: avanzada, cursos: [8B, 1M] }
      - { cod: "02.02.05.06", id: MAT.NUM.MAXIMO_COMUN_DIVISOR.COPRIMOS_CONCEPTO, nombre: "Concepto de números coprimos (M.C.D. igual a 1)", dificultad: media, cursos: [7B, 1M] }

  - codigo: "02.02.06"
    id: MAT.NUM.APLICACIONES_MCM_MCD
    nombre: Aplicaciones de m.c.m. y M.C.D.
    competencia: M1
    recursos:
      - { cod: "02.02.06.01", id: MAT.NUM.APLICACIONES_MCM_MCD.RELACION_PRODUCTO, nombre: "Relación entre m.c.m., M.C.D. y el producto de dos números", competencia: M2, dificultad: media, cursos: [8B, 1M] }
      - { cod: "02.02.06.02", id: MAT.NUM.APLICACIONES_MCM_MCD.PROBLEMA_MCM_COINCIDENCIA, nombre: "Resolución de problemas de coincidencia o encuentro con m.c.m.", dificultad: media, cursos: [7B, 8B, 1M] }
      - { cod: "02.02.06.03", id: MAT.NUM.APLICACIONES_MCM_MCD.PROBLEMA_MCD_REPARTO, nombre: "Resolución de problemas de reparto en grupos iguales con M.C.D.", dificultad: media, cursos: [7B, 8B, 1M] }
      - { cod: "02.02.06.04", id: MAT.NUM.APLICACIONES_MCM_MCD.SELECCION_MCM_O_MCD, nombre: "Decisión de cuándo usar m.c.m. o M.C.D. en un problema", dificultad: avanzada, cursos: [8B, 1M] }
