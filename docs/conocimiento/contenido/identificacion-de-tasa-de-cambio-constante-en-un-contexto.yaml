semantic_id: MAT.ALG.MODELAMIENTO_AFIN.IDENTIFICACION_TASA_CONSTANTE
titulo: Identificación de tasa de cambio constante en un contexto
objetivo: Reconocer en un enunciado verbal la existencia de una tasa de cambio constante, condición para
  modelar con una función afín.
introduccion: 'Antes de escribir cualquier fórmula, hay que detectar la señal clave: ¿la magnitud cambia
  siempre en la misma proporción por cada unidad de la otra? Si sí, ya sabes que necesitas una función
  afín.'
resumen: Una situación se modela con función afín cuando existe una **tasa de cambio constante**, es decir,
  cuando la magnitud dependiente aumenta o disminuye siempre en la misma cantidad por cada unidad que
  cambia la magnitud independiente.
explicacion: '### Definición formal


  Una relación entre dos magnitudes $x$ e $y$ admite un modelo afín $y=mx+n$ si y solo si, para cualquier
  incremento $\Delta x$, el incremento correspondiente $\Delta y$ satisface $\Delta y = m \cdot \Delta
  x$ con $m$ constante, independiente del punto de partida.


  ### Desarrollo didáctico


  En un enunciado verbal, la tasa de cambio constante suele aparecer como frases del tipo "por cada",
  "cada", "a razón de", seguidas de un número fijo.


  Si un texto dice "el estanque sube 3 cm por cada minuto que pasa", esa frase señala directamente una
  tasa constante de 3 cm/minuto, la pendiente $m$ del modelo afín que describe la altura del agua.'
procedimiento:
- 'Paso 1: Lee el enunciado buscando frases que indiquen una razón fija ("por cada", "a razón de").'
- 'Paso 2: Verifica que esa razón no cambie a lo largo del contexto descrito.'
- 'Paso 3: Si la tasa es constante, el fenómeno puede modelarse con una función afín.'
ejemplos:
- titulo: Identificación de tasa constante en un texto
  enunciado: 'Un texto dice: "El taxímetro sube \$400 por cada kilómetro recorrido". Identifica la tasa
    constante.'
  solucion_pasos:
  - La frase "por cada kilómetro" señala una tasa fija.
  - La tasa constante es \$400 por kilómetro.
- titulo: Detección de ausencia de tasa constante
  enunciado: 'Un texto dice: "La velocidad del auto aumenta cada vez más rápido a medida que pasa el tiempo".
    ¿Hay tasa de cambio constante?'
  solucion_pasos:
  - La frase indica que el cambio se acelera, no que sea constante.
  - No hay tasa constante; no corresponde un modelo afín simple.
- titulo: ¿Toda relación entre dos magnitudes tiene una tasa de cambio constante?
  enunciado: ¿Toda relación entre dos magnitudes tiene una tasa de cambio constante?
  respuesta: 'No'
  solucion_pasos:
  - Muchas relaciones (como el crecimiento acelerado) no cumplen esta condición y requieren otros modelos.
- titulo: ¿La frase "aumenta siempre en la misma cantidad" indica tasa constante?
  enunciado: ¿La frase "aumenta siempre en la misma cantidad" indica tasa constante?
  respuesta: Sí
  solucion_pasos:
  - Esa expresión describe exactamente la condición de tasa de cambio constante necesaria para un modelo
    afín.
errores_frecuentes:
- Confundir "aumenta rápido" con "aumenta a tasa constante", sin verificar si la razón realmente no cambia.
- Modelar con función afín situaciones donde la tasa de cambio varía con el tiempo.
- No distinguir entre un valor fijo inicial y una tasa de cambio en el enunciado.
- Ignorar unidades al identificar la tasa (confundir \$/km con \$ totales).
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
