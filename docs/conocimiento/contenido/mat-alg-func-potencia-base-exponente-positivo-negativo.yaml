semantic_id: MAT.ALG.FUNC_POTENCIA_BASE.EXPONENTE_POSITIVO_NEGATIVO
titulo: Distinción entre exponente positivo y negativo
objetivo: Diferenciar el comportamiento de $f(x)=x^n$ según si el exponente $n$ es positivo o negativo.
introduccion: 'El signo del exponente cambia por completo el comportamiento de la función cuando $x$ crece: unas
  crecen sin límite y otras se acercan a $0$.'
resumen: Si $n$ es **positivo**, $f(x)=x^n$ crece en valor absoluto a medida que $|x|$ aumenta; si $n$ es
  **negativo**, $f(x)=x^n$ se acerca a $0$ a medida que $|x|$ aumenta.
explicacion: '### Definición formal


  Para $n>0$, $|x^n|\to\infty$ cuando $|x|\to\infty$: la función crece sin límite. Para $n<0$, $x^n=1/x^{|n|}$,
  y como $|x^{|n|}|\to\infty$ cuando $|x|\to\infty$, se cumple que $|x^n|\to0$: la función decrece hacia $0$.


  ### Desarrollo didáctico


  Con $n=2$: $f(10)=100$, $f(100)=10\,000$, crece sin límite. Con $n=-2$: $f(10)=1/100=0{,}01$,
  $f(100)=1/10\,000=0{,}0001$, se acerca cada vez más a $0$.'
procedimiento:
- 'Paso 1: Determina si el exponente $n$ es positivo o negativo.'
- 'Paso 2: Si es positivo, anticipa que la función crece en valor absoluto al aumentar $|x|$.'
- 'Paso 3: Si es negativo, anticipa que la función se acerca a $0$ al aumentar $|x|$.'
ejemplos:
- titulo: Comportamiento con exponente positivo
  enunciado: 'Evalúa $f(x)=x^3$ en $x=5$ y $x=10$ y describe la tendencia.'
  solucion_pasos:
  - '$f(5)=125$ y $f(10)=1000$.'
  - El resultado crece rápidamente a medida que $x$ aumenta.
- titulo: Comportamiento con exponente negativo
  enunciado: 'Evalúa $f(x)=x^{-3}$ en $x=5$ y $x=10$ y describe la tendencia.'
  solucion_pasos:
  - '$f(5)=1/125=0{,}008$ y $f(10)=1/1000=0{,}001$.'
  - El resultado se acerca cada vez más a $0$ a medida que $x$ aumenta.
- titulo: ¿$x^{-n}$ con $n>0$ puede tomar valores mayores que $1$?
  enunciado: ¿Puede $x^{-n}$ (con $n>0$) tomar valores mayores que $1$ cuando $x$ es cercano a $0$?
  respuesta: Sí
  solucion_pasos:
  - Al acercarse el argumento a $0$, la función con exponente negativo crece sin límite.
- titulo: ¿El comportamiento de crecimiento/decrecimiento depende del signo del exponente $n$?
  enunciado: ¿La tendencia de la función cuando $|x|$ crece depende directamente del signo del exponente $n$?
  respuesta: Sí
  solucion_pasos:
  - Un exponente positivo produce crecimiento en valor absoluto, y uno negativo produce acercamiento a $0$.
errores_frecuentes:
- Confundir el comportamiento de exponente negativo con el de un coeficiente $a$ negativo.
- Suponer que toda función potencia crece sin límite, ignorando el caso de exponente negativo.
- No distinguir el comportamiento cerca de $x=0$ del comportamiento cuando $|x|$ es grande.
- Olvidar que el exponente negativo introduce una restricción de dominio ($x\neq0$).
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
