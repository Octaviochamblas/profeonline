semantic_id: MAT.ALG.COMPOSICION_FUNCIONES.NOTACION
titulo: Interpretación de la notación de composición de funciones
objetivo: Interpretar correctamente el símbolo $\circ$ y distinguir $(f\circ g)(x)$ de $f(x)\cdot g(x)$.
introduccion: 'El pequeño círculo entre dos letras de función no es un punto de multiplicación disimulado:
  es un símbolo con significado propio, el de composición.'
resumen: La notación $(f \circ g)(x)$ se lee "$f$ compuesto con $g$, evaluado en $x$", y representa $f(g(x))$;
  el símbolo $\circ$ nunca indica multiplicación.
explicacion: '### Definición formal


  El símbolo $\circ$ denota la operación de composición de funciones: $(f \circ g)(x) := f(g(x))$. Esta
  notación distingue claramente la composición del producto ordinario $f(x) \cdot g(x)$, que es una operación
  diferente.


  ### Desarrollo didáctico


  Leer $(f \circ g)$ de derecha a izquierda ayuda a recordar el orden de aplicación: primero $g$ (la más
  cercana a la $x$), después $f$.


  $(f \circ g)(3)$ significa: evalúa primero $g$ en $3$, y luego evalúa $f$ en ese resultado. Nunca significa
  multiplicar $f(3)$ por $g(3)$.'
procedimiento:
- 'Paso 1: Identifica el símbolo $\circ$ en la expresión.'
- 'Paso 2: Reconoce que la función a la derecha del símbolo se aplica primero.'
- 'Paso 3: Reconoce que la función a la izquierda del símbolo se aplica al resultado de la primera.'
ejemplos:
- titulo: Lectura correcta de la notación
  enunciado: Si $f(x)=x-1$ y $g(x)=2x$, ¿qué función se aplica primero en $(f\circ g)(x)$?
  solucion_pasos:
  - La función a la derecha del círculo, $g$, se aplica primero.
  - Luego se aplica $f$ sobre el resultado de $g$.
- titulo: Diferencia entre composición y producto
  enunciado: Si $f(x)=x+2$ y $g(x)=x$, calcula $(f\circ g)(3)$ y $f(3)\cdot g(3)$, y compáralos.
  solucion_pasos:
  - $(f\circ g)(3)=f(g(3))=f(3)=5$.
  - $f(3)\cdot g(3)=5\cdot3=15$.
  - Son resultados distintos, confirmando que composición y producto no son lo mismo.
- titulo: ¿El símbolo $\circ$ indica multiplicación entre funciones?
  enunciado: ¿El símbolo $\circ$ indica multiplicación entre funciones?
  respuesta: 'No'
  solucion_pasos:
  - Indica composición, es decir, aplicar una función sobre el resultado de otra.
- titulo: ¿$(f\circ g)(x)$ y $(g\circ f)(x)$ representan siempre lo mismo?
  enunciado: ¿$(f\circ g)(x)$ y $(g\circ f)(x)$ representan siempre lo mismo?
  respuesta: 'No'
  solucion_pasos:
  - La composición generalmente no es conmutativa; el orden de aplicación afecta el resultado.
errores_frecuentes:
- Interpretar $(f\circ g)(x)$ como el producto $f(x)\cdot g(x)$.
- Confundir el orden de aplicación al leer la notación.
- Asumir que $(f\circ g)(x)=(g\circ f)(x)$ sin verificarlo.
- Confundir $\circ$ con el punto decimal o de multiplicación en cálculos manuscritos.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
