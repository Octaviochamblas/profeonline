semantic_id: MAT.ALG.MULT_MON_POL.DISTRIBUCION_TERMINOS
objetivo: Aplicar la propiedad distributiva al multiplicar un monomio por un polinomio.
introduccion: Imagina que eres un cartero y tienes que entregar una carta en cada
  casa de una cuadra. El monomio es el cartero, y cada término del polinomio es una
  casa. ¡El monomio debe visitar (multiplicar) a absolutamente todos los términos
  de la cuadra!
resumen: 'La multiplicación de un monomio por un polinomio se basa en la **Propiedad
  Distributiva**: el monomio exterior se multiplica por cada uno de los términos del
  polinomio interior por separado, sumando los resultados obtenidos.'
explicacion: 'Operación: $3x(2x^2 - 5x + 4)$.


  Aplicamos la distribución término a término:

  1. Primer término: $(3x)(2x^2) = 6x^3$.

  2. Segundo término: $(3x)(-5x) = -15x^2$.

  3. Tercer término: $(3x)(+4) = +12x$.


  Sumamos o conectamos los resultados: $6x^3 - 15x^2 + 12x$.'
procedimiento:
- 'Paso 1: Identifica el monomio exterior y todos los términos del polinomio interior.'
- 'Paso 2: Multiplica el monomio por el primer término del polinomio.'
- 'Paso 3: Multiplica el monomio por el segundo término del polinomio (respetando
  signos).'
- 'Paso 4: Repite el proceso para todos los términos restantes.'
- 'Paso 5: Escribe la expresión final conectando todos los productos parciales con
  sus respectivos signos.'
ejemplos:
- titulo: El cartero algebraico
  enunciado: 'Multiplica: 2a(3a - 5b).'
  solucion_pasos:
  - 'Multiplicación 1: (2a)(3a) = 6a^2.'
  - 'Multiplicación 2: (2a)(-5b) = -10ab.'
  - 'Combinación: 6a^2 - 10ab.'
errores_frecuentes:
- Multiplicar el monomio únicamente por el primer término del polinomio y dejar los
  demás intactos (ej. $2(x+3) = 2x+3$).
- Cometer errores de signos al multiplicar el monomio por los términos negativos del
  polinomio.
fuente: Álgebra de Baldor.
estado: publicado
