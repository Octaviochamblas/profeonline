semantic_id: MAT.ALG.FUNC_CUADR_MODELO.PROBLEMAS_AREAS
titulo: Resolución de problemas de áreas usando funciones cuadráticas
objetivo: Resolver problemas de optimización o cálculo de áreas de figuras geométricas modeladas con funciones
  cuadráticas.
introduccion: Cuando el área de una figura depende de una dimensión desconocida elevada al cuadrado (o
  de un producto de dos expresiones con esa incógnita), se puede analizar mediante una función cuadrática
  completa, no solo mediante una ecuación puntual.
resumen: Los problemas de áreas se resuelven planteando la función de área $A(x)$ en términos de una variable,
  y luego evaluándola, encontrando su máximo, o resolviendo $A(x)$ igual a un valor específico según lo
  que se pida.
explicacion: '### Definición formal


  Dada una figura cuya área depende de una variable $x$, se plantea la función $A(x)$ correspondiente.
  A diferencia de un problema puntual (resolver una ecuación para un valor de área dado), tratar el área
  como función permite analizar su comportamiento completo: valores posibles, máximo alcanzable, o crecimiento.


  ### Desarrollo didáctico


  El enfoque de función (en vez de ecuación) es especialmente útil cuando se pregunta por el área máxima
  posible, ya que permite usar el vértice de la parábola directamente.


  Con $100$ metros de cerca disponibles para un corral rectangular, si $x$ es uno de los lados, el otro
  es $50-x$, y el área es $A(x)=x(50-x)=-x^2+50x$, una función cuadrática cuyo máximo se puede analizar
  mediante su vértice.'
procedimiento:
- 'Paso 1: Plantea la función de área $A(x)$ en términos de una variable adecuada.'
- 'Paso 2: Identifica qué se pregunta: un valor específico, el máximo, o el comportamiento general.'
- 'Paso 3: Aplica la herramienta correspondiente (evaluación, vértice, o resolución de ecuación).'
ejemplos:
- titulo: Planteamiento de función de área con perímetro fijo
  enunciado: Con $40$ m de cerca para un corral rectangular, si $x$ es un lado, plantea el área en función
    de $x$.
  solucion_pasos:
  - El otro lado es $20-x$ (la mitad del perímetro menos $x$).
  - $A(x)=x(20-x)=-x^2+20x$.
- titulo: Evaluación de la función de área en un valor específico
  enunciado: Con $A(x)=-x^2+20x$, ¿cuál es el área si $x=6$?
  solucion_pasos:
  - $A(6)=-36+120=84$.
  - El área es $84 \text{ m}^2$.
- titulo: ¿Tratar el área como función permite analizar su comportamiento completo?
  enunciado: ¿Tratar el área como función permite analizar su comportamiento completo?
  respuesta: Sí
  solucion_pasos:
  - A diferencia de resolver para un solo valor, la función permite estudiar el área para cualquier valor
    de la variable, incluyendo su máximo.
- titulo: ¿El dominio de la función de área en un problema aplicado siempre es todo $\mathbb{R}$?
  enunciado: ¿El dominio de la función de área en un problema aplicado siempre es todo $\mathbb{R}$?
  respuesta: 'No'
  solucion_pasos:
  - El contexto impone restricciones (por ejemplo, que ambas dimensiones sean positivas), acotando el
    dominio real del problema.
errores_frecuentes:
- Plantear incorrectamente la relación entre las dos dimensiones de la figura a partir del perímetro dado.
- Confundir la función de área con la función de perímetro al plantear el modelo.
- No considerar las restricciones del contexto (dimensiones positivas) al analizar la función.
- Evaluar la función en un valor fuera del dominio razonable del problema, sin advertirlo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
