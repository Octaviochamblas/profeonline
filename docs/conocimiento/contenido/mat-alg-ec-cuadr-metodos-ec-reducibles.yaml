semantic_id: MAT.ALG.EC_CUADR_METODOS.EC_REDUCIBLES
titulo: Resolución de ecuaciones reducibles a segundo grado mediante sustitución auxiliar
objetivo: Resolver completamente ecuaciones reducibles a segundo grado, incluyendo el paso final de deshacer la
  sustitución auxiliar.
introduccion: Identificar la sustitución correcta es solo la mitad del trabajo; falta resolver la ecuación cuadrática
  resultante y luego "traducir" esa solución de vuelta a la variable original.
resumen: 'Resolver una ecuación reducible implica tres etapas: sustituir para obtener una ecuación cuadrática en
  $u$, resolverla con los métodos habituales, y deshacer la sustitución para hallar los valores de $x$.'
explicacion: '### Definición formal


  Dada una ecuación reducible mediante $u=g(x)$, el proceso completo consiste en resolver $au^2+bu+c=0$ para obtener
  los valores de $u$, y luego resolver la ecuación $g(x)=u$ para cada valor válido de $u$, obteniendo así las
  soluciones finales en $x$.


  ### Desarrollo didáctico


  Un detalle crucial es que no todo valor de $u$ obtenido produce soluciones reales en $x$: si $u=g(x)=x^2$ y
  el valor de $u$ resulta negativo, ese valor debe descartarse.


  Para $x^4-5x^2+4=0$: con $u=x^2$, se obtiene $u^2-5u+4=0$, cuyas soluciones son $u=1$ y $u=4$. Deshaciendo: $x^2=1
  \Rightarrow x=\pm1$; $x^2=4 \Rightarrow x=\pm2$. En total, cuatro soluciones: $x=\pm1, \pm2$.'
procedimiento:
- 'Paso 1: Aplica la sustitución auxiliar $u=g(x)$ para obtener una ecuación cuadrática en $u$.'
- 'Paso 2: Resuelve la ecuación cuadrática resultante para hallar los valores de $u$.'
- 'Paso 3: Para cada valor de $u$, resuelve $g(x)=u$ para obtener los valores de $x$, descartando los que no tengan
  solución real.'
ejemplos:
- titulo: Resolución completa de una ecuación bicuadrada
  enunciado: 'Resuelve $x^4-13x^2+36=0$.'
  solucion_pasos:
  - 'Con $u=x^2$: $u^2-13u+36=0$, cuyas soluciones son $u=4$ y $u=9$.'
  - 'Deshaciendo: $x^2=4 \Rightarrow x=\pm2$; $x^2=9 \Rightarrow x=\pm3$.'
  - 'Las cuatro soluciones son $x=\pm2, \pm3$.'
- titulo: Resolución con descarte de solución no real
  enunciado: 'Resuelve $x^4+3x^2-4=0$.'
  solucion_pasos:
  - 'Con $u=x^2$: $u^2+3u-4=0$, cuyas soluciones son $u=1$ y $u=-4$.'
  - 'Como $u=x^2$ no puede ser negativo, se descarta $u=-4$.'
  - 'Solo queda $x^2=1 \Rightarrow x=\pm1$.'
- titulo: ¿Todo valor de $u$ obtenido siempre genera soluciones reales en $x$?
  enunciado: ¿Todo valor de $u$ obtenido siempre genera soluciones reales en $x$?
  respuesta: 'No'
  solucion_pasos:
  - Si $u=x^2$ y el valor de $u$ resulta negativo, no existe ningún $x$ real que lo satisfaga, por lo que se descarta.
- titulo: ¿Una ecuación bicuadrada puede tener hasta cuatro soluciones reales?
  enunciado: ¿Una ecuación bicuadrada puede tener hasta cuatro soluciones reales?
  respuesta: Sí
  solucion_pasos:
  - Cada valor positivo de $u=x^2$ genera dos soluciones opuestas en $x$, por lo que dos valores positivos de $u$
    producen cuatro soluciones en total.
errores_frecuentes:
- Olvidar deshacer la sustitución, entregando como respuesta final los valores de $u$ en vez de $x$.
- No descartar valores negativos de $u$ cuando la sustitución es $u=x^2$.
- Olvidar el signo $\pm$ al despejar $x$ desde $x^2=u$.
- Reportar menos soluciones de las que realmente tiene la ecuación al no revisar todos los valores de $u$ obtenidos.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
