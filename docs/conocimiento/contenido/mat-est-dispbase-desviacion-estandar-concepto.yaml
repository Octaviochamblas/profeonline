semantic_id: MAT.EST.DISPERSION_BASE.DESVIACION_ESTANDAR_CONCEPTO
titulo: Definir la desviación estándar como raíz de la varianza
objetivo: Definir la desviación estándar como la raíz cuadrada de la varianza de un conjunto de datos.
introduccion: La desviación estándar es como "devolver" la varianza a las unidades originales de los datos, sacándole
  la raíz cuadrada.
resumen: La desviación estándar $\sigma$ es la raíz cuadrada de la varianza y se expresa en las mismas unidades que los
  datos originales.
explicacion: '![Concepto de desviación estándar](/static/img/estadistica/dispbase/dispbase-desviacion-estandar-concepto.svg)


  ### Definición formal


  La desviación estándar se define como $\sigma = \sqrt{\sigma^2}$, donde $\sigma^2$ es la varianza del conjunto de

  datos.


  ### Desarrollo didáctico


  A diferencia de la varianza, que queda en unidades al cuadrado, la desviación estándar vuelve a las unidades

  originales de los datos, lo que la hace más fácil de interpretar en contexto.'
procedimiento:
- 'Paso 1: Calcula la varianza $\sigma^2$ del conjunto de datos.'
- 'Paso 2: Calcula la raíz cuadrada de la varianza.'
- 'Paso 3: Ese valor corresponde a la desviación estándar $\sigma$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si la varianza de un conjunto de datos es 9, ¿cuál es su desviación estándar?
  solucion_pasos:
  - $\sigma = \sqrt{9} = 3$.
- titulo: Ejemplo 2
  enunciado: ¿Por qué la desviación estándar es más fácil de interpretar que la varianza en un contexto real?
  solucion_pasos:
  - Porque está expresada en las mismas unidades que los datos originales, no al cuadrado.
- titulo: ¿La desviación estándar es la raíz cuadrada de la varianza?
  respuesta: Sí
  solucion_pasos:
  - Sí, $\sigma=\sqrt{\sigma^2}$.
- titulo: ¿La desviación estándar se expresa en unidades al cuadrado, igual que la varianza?
  respuesta: 'No'
  solucion_pasos:
  - 'No, la desviación estándar se expresa en las mismas unidades que los datos originales.'
errores_frecuentes:
- Confundir la desviación estándar con la varianza directamente.
- Olvidar aplicar la raíz cuadrada al calcular la desviación estándar a partir de la varianza.
- Creer que la desviación estándar puede ser negativa.
- Pensar que la desviación estándar y el rango miden exactamente lo mismo.
- No verificar las unidades del resultado al interpretar la desviación estándar.
fuente: 'Elaboración propia (referencia: Moraleja 238, 296).'
estado: publicado
