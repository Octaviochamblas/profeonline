semantic_id: MAT.ALG.RELACION_EXP_LOG.ELECCION_MODELO
titulo: Elección entre modelo exponencial y modelo logarítmico
objetivo: Decidir si una situación contextual se describe mejor con un modelo exponencial o con uno logarítmico,
  según qué variable depende de cuál.
introduccion: 'Exponencial y logarítmica describen la misma relación entre dos variables, pero desde puntos de
  vista opuestos: la elección depende de qué magnitud se quiere calcular a partir de cuál otra.'
resumen: Se usa un modelo **exponencial** cuando se calcula una cantidad final a partir del tiempo transcurrido,
  y un modelo **logarítmico** cuando se calcula el tiempo (u otra magnitud) necesario para alcanzar cierta
  cantidad.
explicacion: '### Definición formal


  Dada la relación $y=b^x$ entre dos variables, si el problema pide calcular $y$ conocido $x$, corresponde un
  modelo exponencial directo. Si el problema pide calcular $x$ conocido $y$, corresponde despejar usando la
  función inversa, es decir, un modelo logarítmico $x=\log_b(y)$.


  ### Desarrollo didáctico


  Si un capital crece según $C(t)=1000\cdot1{,}05^t$ y se pregunta "¿cuánto dinero habrá en $5$ años?", se usa
  directamente el modelo exponencial evaluando $t=5$. Pero si se pregunta "¿en cuántos años el capital llegará a
  $2000$?", conviene despejar $t$ usando logaritmos: $t=\log_{1{,}05}(2)$.'
procedimiento:
- 'Paso 1: Identifica cuál variable es la incógnita del problema: el resultado final o el tiempo/parámetro.'
- 'Paso 2: Si se pide el resultado final conociendo el tiempo, evalúa el modelo exponencial directamente.'
- 'Paso 3: Si se pide el tiempo o parámetro conociendo el resultado final, despeja usando logaritmos.'
ejemplos:
- titulo: Elección del modelo exponencial
  enunciado: 'Una bacteria se duplica cada hora según $N(t)=50\cdot2^t$. ¿Cuántas bacterias habrá en $4$ horas?'
  solucion_pasos:
  - Se pide el resultado final conociendo el tiempo, así que se usa el modelo exponencial directamente.
  - 'Se evalúa $N(4)=50\cdot2^4=800$.'
- titulo: Elección del modelo logarítmico
  enunciado: 'Con la misma población $N(t)=50\cdot2^t$, ¿en cuántas horas la población llegará a $3200$?'
  solucion_pasos:
  - Se pide el tiempo conociendo el resultado final, así que se despeja usando logaritmos.
  - 'Se plantea $2^t=64$, así que $t=\log_2(64)=6$ horas.'
- titulo: ¿Se necesita un logaritmo para calcular el valor final de un modelo exponencial?
  enunciado: ¿Es necesario usar logaritmos para calcular $N(4)$ en un modelo $N(t)=50\cdot2^t$?
  respuesta: 'No'
  solucion_pasos:
  - Basta con evaluar la potencia directamente, sin necesidad de despejar nada.
- titulo: ¿El modelo logarítmico y el exponencial describen relaciones distintas entre las variables?
  enunciado: ¿El modelo exponencial y el logarítmico usados en un mismo contexto describen relaciones
    matemáticas distintas entre las variables?
  respuesta: 'No'
  solucion_pasos:
  - Describen exactamente la misma relación, solo que despejada respecto a variables distintas.
errores_frecuentes:
- Usar logaritmos innecesariamente cuando basta con evaluar directamente la función exponencial.
- Intentar evaluar directamente cuando en realidad se necesita despejar el exponente con un logaritmo.
- Confundir cuál variable es la incógnita real del problema contextual.
- Olvidar interpretar el resultado final en las unidades correctas del contexto (tiempo, cantidad, etc.).
