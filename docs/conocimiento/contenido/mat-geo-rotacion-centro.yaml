semantic_id: MAT.GEO.ROTACION_PLANO.CENTRO_ROTACION
titulo: Identificación del centro de rotación
objetivo: Identificar el centro de rotación como el punto fijo alrededor del cual giran todos los demás
  puntos de una figura durante una rotación.
introduccion: 'El centro de rotación es como el ''eje'' de una rueda: el único punto que no se mueve mientras
  todo lo demás gira a su alrededor.'
resumen: El centro de rotación es el punto fijo $O$ que permanece invariante durante una rotación, mientras
  que todos los demás puntos de la figura giran a su alrededor manteniendo la misma distancia a $O$.
explicacion: '![Centro de rotación](/static/img/geometria/isometrias/rotacion-centro.svg)


  ### Definición formal


  En una rotación, el centro $O$ es el único punto del plano que no cambia de posición. Todo otro punto
  $P$ se transforma en $P''$ de modo que $OP=OP''$ (la distancia al centro se conserva) y el ángulo $\angle
  POP''$ es el ángulo de rotación.


  ### Desarrollo didáctico


  En la figura, el punto $O$ (el origen) es el centro de rotación: el punto $P$ gira a su alrededor hasta
  convertirse en $P''$, manteniendo siempre la misma distancia a $O$.'
procedimiento:
- 'Paso 1: Identifica el punto que permanece fijo durante la transformación.'
- 'Paso 2: Verifica que todos los demás puntos mantengan la misma distancia a ese punto fijo antes y después
  de la rotación.'
- 'Paso 3: Concluye que ese punto fijo es el centro de rotación.'
ejemplos:
- titulo: Identificar el centro de rotación de una figura
  enunciado: Un triángulo gira alrededor de un punto O, que no cambia de posición.
  solucion_pasos:
  - 'O es el centro de rotación: el único punto de todo el plano que permanece fijo durante el giro.'
- titulo: Verificar la conservación de la distancia al centro
  enunciado: El punto P está a 5 unidades de O antes de rotar.
  solucion_pasos:
  - Después de rotar, su imagen P' también debe estar exactamente a 5 unidades de O.
- titulo: ¿El centro de rotación puede ser cualquier punto del plano?
  respuesta: Sí
  solucion_pasos:
  - Sí, el centro de rotación puede ser el origen o cualquier otro punto fijo elegido.
- titulo: ¿El centro de rotación cambia de posición durante la transformación?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición, el centro de rotación es el único punto que permanece invariante.
errores_frecuentes:
- Confundir el centro de rotación con cualquier otro punto de la figura que también se mueve.
- Creer que el centro de rotación siempre debe ser el origen del sistema cartesiano.
- No verificar que la distancia al centro se conserve entre el punto original y su imagen.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 128, Cid 75).'
estado: publicado
