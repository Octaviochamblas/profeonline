semantic_id: MAT.GEO.RECTA_ECUACIONES.GENERAL_A_PRINCIPAL
titulo: Conversión de la ecuación general a la forma principal
objetivo: Convertir una ecuación de la forma general Ax+By+C=0 a la forma principal y=mx+b, despejando
  la variable y.
introduccion: Para identificar rápidamente la pendiente y el coeficiente de posición de una recta dada
  en forma general, conviene despejar y para obtener su forma principal equivalente.
resumen: Dada la ecuación general $Ax+By+C=0$ con $B\neq0$, se despeja $y=-\dfrac{A}{B}x-\dfrac{C}{B}$,
  obteniendo $m=-\dfrac{A}{B}$ y $b=-\dfrac{C}{B}$.
explicacion: '![Conversión: forma general a principal](/static/img/geometria/analitica/rectaeq-general-a-principal.svg)


  ### Definición formal


  De $Ax+By+C=0$, despejando $y$: $By=-Ax-C$, por lo que $y=-\dfrac{A}{B}x-\dfrac{C}{B}$, siempre que
  $B\neq0$.


  ### Desarrollo didáctico


  Para la ecuación $3x+2y-6=0$: despejando, $2y=-3x+6$, por lo que $y=-1{,}5x+3$, obteniendo $m=-1{,}5$
  y $b=3$.'
procedimiento:
- 'Paso 1: Verifica que B≠0 (de lo contrario, la recta es vertical y no tiene forma principal).'
- 'Paso 2: Despeja el término By, dejándolo solo en un lado de la ecuación.'
- 'Paso 3: Divide toda la ecuación por B para obtener y=mx+b.'
ejemplos:
- titulo: Convertir 3x+2y-6=0 a forma principal
  enunciado: 3x+2y-6=0.
  solucion_pasos:
  - 2y=-3x+6 → y=-1,5x+3.
- titulo: Convertir 4x-y+8=0 a forma principal
  enunciado: 4x-y+8=0.
  solucion_pasos:
  - -y=-4x-8 → y=4x+8.
- titulo: ¿Se puede convertir siempre que B sea distinto de cero?
  respuesta: Sí
  solucion_pasos:
  - Sí, si B≠0, siempre es posible despejar y.
- titulo: ¿Una recta vertical (B=0) tiene forma principal?
  respuesta: 'No'
  solucion_pasos:
  - No, en ese caso no se puede despejar y, ya que no aparece en la ecuación.
errores_frecuentes:
- Olvidar dividir todos los términos de la ecuación por B, no solo algunos.
- Cometer errores de signo al despejar y (especialmente cuando B es negativo).
- Intentar convertir una ecuación con B=0 (recta vertical), que no tiene forma principal.
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
