errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Compara las pendientes (inclinaciones) de ambas rectas
  (el coeficiente que acompaña a la ''x'' al despejar la ''y'')».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Si las pendientes son diferentes, el sistema
  es Determinado».'
- La definición sigue cumpliéndose aunque no se considere que la inmensa mayoría de los sistemas que resuelves son
  de este tipo. 'Compatible' significa que SÍ tiene solución. 'Determinado' significa que puedes determinar cuál
  es con exactitud (es única).
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Compara las pendientes (inclinaciones)
  de ambas rectas (el coeficiente que acompaña a la 'x' al despejar la 'y')».
- La comprobación del resultado vuelve innecesaria la condición «Si las pendientes son diferentes, el sistema es
  Determinado».
