- titulo: $x=3$
  enunciado: Determina qué debe hacerse en $x=3$ y fundamenta cada transformación.
  solucion_pasos:
  - Algebraicamente, te das cuenta de que es determinado porque al aplicar tus métodos, llegas felizmente a algo
    como '$x=3$, $y=4$'.
  - Compara las pendientes (inclinaciones) de ambas rectas (el coeficiente que acompaña a la 'x' al despejar la
    'y').
- titulo: $x=3$
  enunciado: Analiza el caso $x=3$ y explica cómo se aplica el criterio estudiado.
  solucion_pasos:
  - Algebraicamente, te das cuenta de que es determinado porque al aplicar tus métodos, llegas felizmente a algo
    como '$x=3$, $y=4$'.
  - Si las pendientes son diferentes, el sistema es Determinado.
- titulo: 'Respecto de «Sistema determinado: solución única (rectas secantes)»: ¿Se ajusta a la definic'
  enunciado: 'Respecto de «Sistema determinado: solución única (rectas secantes)»: ¿Se ajusta a la definición esta
    afirmación? «La inmensa mayoría de los sistemas que resuelves son de este tipo»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La inmensa mayoría de los sistemas que resuelves son de este
    tipo.'
- titulo: 'Respecto de «Sistema determinado: solución única (rectas secantes)»: ¿Es compatible con el p'
  enunciado: 'Respecto de «Sistema determinado: solución única (rectas secantes)»: ¿Es compatible con el procedimiento
    esta afirmación? «Puede omitirse esta condición sin cambiar el resultado: «Compara las pendientes (inclinaciones)
    de ambas rectas (el coeficiente que acompaña a la ''x'' al despejar la ''y'')»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La inmensa mayoría de los sistemas que resuelves son de este
