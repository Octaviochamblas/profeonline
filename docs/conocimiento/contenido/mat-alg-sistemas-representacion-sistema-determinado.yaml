semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.SISTEMA_DETERMINADO
titulo: Sistema Compatible Determinado
objetivo: Reconocer gráfica y algebraicamente un sistema con solución única.
introduccion: En el mundo de los dibujos, esto ocurre cuando las dos rectas tienen inclinaciones (pendientes) diferentes.
  Tarde o temprano, como si fueran dos espadas cruzadas, chocarán en un único punto.
resumen: La inmensa mayoría de los sistemas que resuelves son de este tipo. 'Compatible' significa que SÍ tiene
  solución. 'Determinado' significa que puedes determinar cuál es con exactitud (es única).
explicacion: '### Definición formal


  Un sistema $a_1x+b_1y=c_1$, $a_2x+b_2y=c_2$ es compatible determinado (tiene exactamente una solución) si y solo
  si sus pendientes son distintas, $\frac{a_1}{b_1} \neq \frac{a_2}{b_2}$; geométricamente, las rectas asociadas
  son secantes y se cruzan en un único punto.


  ### Desarrollo didáctico


  En el mundo de los dibujos, esto ocurre cuando las dos rectas tienen inclinaciones (pendientes) diferentes. Tarde
  o temprano, como si fueran dos espadas cruzadas, chocarán en un único punto.


  Algebraicamente, te das cuenta de que es determinado porque al aplicar tus métodos, llegas felizmente a algo como
  ''$x=3$, $y=4$''.'
procedimiento:
- Compara las pendientes (inclinaciones) de ambas rectas (el coeficiente que acompaña a la 'x' al despejar la 'y').
- Si las pendientes son diferentes, el sistema es Determinado.
- Tendrá exactamente una sola solución (un punto de intersección).
