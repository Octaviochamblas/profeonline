semantic_id: 'MAT.ALG.SISTEMAS_REPRESENTACION.SISTEMA_DETERMINADO'
titulo: 'Sistema Compatible Determinado'
objetivo: 'Reconocer gráfica y algebraicamente un sistema con solución única.'
introduccion: |
  La inmensa mayoría de los sistemas que resuelves son de este tipo. 'Compatible' significa que SÍ tiene solución. 'Determinado' significa que puedes determinar cuál es con exactitud (es única).
resumen: |
  Algebraicamente, te das cuenta de que es determinado porque al aplicar tus métodos, llegas felizmente a algo como '$x=3$, $y=4$'.
explicacion: |
  En el mundo de los dibujos, esto ocurre cuando las dos rectas tienen inclinaciones (pendientes) diferentes. Tarde o temprano, como si fueran dos espadas cruzadas, se intersecarán en un único punto.
procedimiento:
  - 'Paso 1: Compara las pendientes (inclinaciones) de ambas rectas (el coeficiente que acompaña a la ''x'' al despejar la ''y'').'
  - 'Paso 2: Si las pendientes son diferentes, el sistema es Determinado.'
  - 'Paso 3: Tendrá exactamente una sola solución (un punto de choque).'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
