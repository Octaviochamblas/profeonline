semantic_id: MAT.GEO.CIRCULO_TEOREMAS.POTENCIA_PUNTO_DEFINICION
titulo: Definición de potencia de un punto respecto de una circunferencia
objetivo: Definir la potencia de un punto respecto de una circunferencia y reconocer su signo según la
  posición del punto (exterior, interior o sobre la circunferencia).
introduccion: La potencia de un punto es un número que resume, en una sola fórmula, si un punto está dentro,
  fuera o justo sobre una circunferencia, y sirve de base para los teoremas de cuerdas, secantes y tangentes.
resumen: 'La potencia de un punto $P$ respecto de una circunferencia de centro $O$ y radio $r$ se define
  como $\text{pot}(P)=PO^2-r^2$: es positiva si $P$ es exterior, negativa si es interior, y cero si $P$
  está sobre la circunferencia.'
explicacion: '![Potencia de un punto: los tres casos](/static/img/geometria/circunferencia-circulo/circulo-potencia-punto-definicion.svg)


  ### Definición formal


  Dada una circunferencia de centro $O$ y radio $r$, la potencia de un punto $P$ respecto de ella es $\text{pot}(P)=PO^2-r^2$,
  donde $PO$ es la distancia de $P$ al centro. Si $P$ es exterior ($PO>r$), la potencia es positiva; si
  $P$ es interior ($PO<r$), es negativa; si $P$ está sobre la circunferencia ($PO=r$), la potencia es
  exactamente cero.


  ### Desarrollo didáctico


  Esta definición unifica los teoremas de cuerdas, secantes y tangente-secante: en todos los casos, el
  producto de segmentos (o su negativo, según la posición) es igual al valor absoluto de la potencia del
  punto. Así, $\text{pot}(P)$ es una única fórmula que sintetiza los tres teoremas de proporcionalidad
  métrica en la circunferencia.'
procedimiento:
- 'Paso 1: Calcula la distancia PO entre el punto P y el centro O de la circunferencia.'
- 'Paso 2: Aplica la fórmula pot(P)=PO²-r², usando el radio r de la circunferencia.'
- 'Paso 3: Interpreta el signo del resultado: positivo (exterior), negativo (interior) o cero (sobre la
  circunferencia).'
ejemplos:
- titulo: Calcular la potencia de un punto exterior
  enunciado: Un punto P está a 10 cm del centro de una circunferencia de radio 6 cm.
  solucion_pasos:
  - pot(P)=10²-6²=100-36=64 (positiva, ya que P es exterior).
- titulo: Calcular la potencia de un punto interior
  enunciado: Un punto P está a 3 cm del centro de una circunferencia de radio 7 cm.
  solucion_pasos:
  - pot(P)=3²-7²=9-49=-40 (negativa, ya que P es interior).
- titulo: ¿La potencia de un punto sobre la circunferencia es siempre cero?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque en ese caso PO=r, por lo que PO²-r²=0.
- titulo: ¿Una potencia negativa significa que el cálculo está mal hecho?
  respuesta: 'No'
  solucion_pasos:
  - No, una potencia negativa simplemente indica que el punto es interior a la circunferencia; es un resultado
    válido y esperado.
errores_frecuentes:
- Interpretar una potencia negativa como un error de cálculo, en vez de reconocerla como indicador de
  punto interior.
- Olvidar elevar al cuadrado tanto la distancia PO como el radio r antes de restar.
- Confundir el orden de la resta (r²-PO² en vez de PO²-r²), lo que invierte el signo del resultado.
fuente: Elaboración propia (sin fuente específica).
estado: publicado
