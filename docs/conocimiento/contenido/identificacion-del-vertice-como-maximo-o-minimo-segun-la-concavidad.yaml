semantic_id: MAT.ALG.FUNC_CUADR_VERTICE.MAXIMO_MINIMO
titulo: Identificación del vértice como máximo o mínimo según la concavidad
objetivo: Identificar si el vértice de una función cuadrática corresponde a un máximo o a un mínimo, según
  el signo del coeficiente $a$.
introduccion: Antes de calcular el vértice, ya se puede anticipar si será el punto más alto o más bajo
  de toda la curva, simplemente observando el signo de $a$.
resumen: Si $a>0$, el vértice es un **mínimo** (la función nunca baja de ese valor); si $a<0$, el vértice
  es un **máximo** (la función nunca sube de ese valor).
explicacion: '### Definición formal


  Dada $f(x)=ax^2+bx+c$: si $a>0$, la función es cóncava hacia arriba y su vértice es un mínimo global,
  es decir, $f(x) \geq f(x_v)$ para todo $x$; si $a<0$, la función es cóncava hacia abajo y su vértice
  es un máximo global, es decir, $f(x) \leq f(x_v)$ para todo $x$.


  ### Desarrollo didáctico


  Antes de calcular el valor exacto del vértice, conviene identificar primero si se busca un máximo o
  un mínimo, observando únicamente el signo de $a$; esto ayuda a interpretar correctamente el resultado
  obtenido.


  Para $f(x)=-5x^2+10x+3$, con $a=-5<0$: el vértice será un máximo, el mayor valor que puede alcanzar
  la función.'
procedimiento:
- 'Paso 1: Identifica el signo del coeficiente $a$ de la función.'
- 'Paso 2: Si $a>0$, concluye que el vértice es un mínimo.'
- 'Paso 3: Si $a<0$, concluye que el vértice es un máximo.'
ejemplos:
- titulo: Identificación de un mínimo
  enunciado: ¿El vértice de $f(x)=4x^2-9x+2$ es un máximo o un mínimo?
  solucion_pasos:
  - $a=4>0$.
  - Es un mínimo.
- titulo: Identificación de un máximo
  enunciado: ¿El vértice de $f(x)=-x^2+6x-1$ es un máximo o un mínimo?
  solucion_pasos:
  - $a=-1<0$.
  - Es un máximo.
- titulo: ¿Un mínimo local puede existir en una función cuadrática además del vértice?
  enunciado: ¿Un mínimo local puede existir en una función cuadrática además del vértice?
  respuesta: 'No'
  solucion_pasos:
  - El vértice es el único punto extremo de toda la parábola; no existen otros máximos o mínimos locales.
- titulo: ¿Se puede determinar si el vértice es máximo o mínimo sin calcular sus coordenadas?
  enunciado: ¿Se puede determinar si el vértice es máximo o mínimo sin calcular sus coordenadas?
  respuesta: Sí
  solucion_pasos:
  - Basta con observar el signo del coeficiente $a$, sin necesidad de calcular el vértice completo.
errores_frecuentes:
- Invertir la interpretación del signo de $a$, confundiendo máximo con mínimo.
- Asumir que toda función cuadrática tiene un mínimo, sin considerar el caso $a<0$.
- Calcular el vértice completo cuando solo se pregunta si es máximo o mínimo.
- Confundir "máximo global" con "máximo local", cuando en una función cuadrática son equivalentes.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
