semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.CLAUSURA_MULTIPLICACION
titulo: Clausura de la multiplicación en los racionales
objetivo: Reconocer que el producto de dos números racionales es siempre otro número racional.
introduccion: 'Igual que ocurre con la suma, multiplicar dos fracciones nunca produce un resultado fuera
  de \(\mathbb{Q}\): el producto de racionales también es racional.'
resumen: Para todo \(p,q\in\mathbb{Q}\), se cumple que \(p\cdot q\in\mathbb{Q}\).
explicacion: '### Definición formal


  Si \(p=\frac{a}{b}\) y \(q=\frac{c}{d}\) con \(a,b,c,d\in\mathbb{Z}\), \(b,d\neq0\), entonces \(p\cdot
  q=\frac{ac}{bd}\), donde \(ac\in\mathbb{Z}\) y \(bd\in\mathbb{Z}\) con \(bd\neq0\) (por ser producto
  de enteros no nulos). Por lo tanto \(\mathbb{Q}\) es cerrado bajo la multiplicación.


  ### Desarrollo didáctico


  Si \(\frac{3}{4}\) y \(-\frac{2}{7}\) son racionales, su producto es \(\frac{3}{4}\cdot\left(-\frac{2}{7}\right)=-\frac{6}{28}=-\frac{3}{14}\),
  que también es racional: el numerador y el denominador del resultado son enteros con denominador distinto
  de cero.'
procedimiento:
- 'Paso 1: Representa los dos racionales como fracciones de denominador no nulo.'
- 'Paso 2: Multiplica numeradores y denominadores.'
- 'Paso 3: Comprueba que el denominador del producto no sea cero y concluye que sigue siendo racional.'
ejemplos:
- titulo: Aplicación razonada — Clausura de Q en la multiplicación
  enunciado: Si \(\frac{3}{4}\) y \(-\frac{2}{7}\) son racionales, entonces su producto también lo es.
  solucion_pasos:
  - Representa los dos racionales como fracciones de denominador no nulo.
  - Multiplica numeradores y denominadores.
  - Comprueba que el denominador del producto no sea cero y concluye que sigue siendo racional.
- titulo: Revisión de una solución — Clausura de Q en la multiplicación
  enunciado: Una solución aplica “Multiplica numeradores y denominadores.”, pero termina sin comprobar
    que la multiplicación conserva pertenencia al conjunto de los racionales. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define clausura de Q en la multiplicación: la clausura de \(\mathbb{Q}\)
    en la multiplicación afirma que el producto de dos racionales siempre es racional.'
  - Representa los dos racionales como fracciones de denominador no nulo.
  - 'Completa la revisión con este control: Comprueba que el denominador del producto no sea cero y concluye
    que sigue siendo racional.'
- titulo: ¿Se cumple que la multiplicación conserva pertenencia al conjunto de los racionales? — Clausura
    de Q en la multiplicación
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la clausura de \(\mathbb{Q}\) en la multiplicación afirma
    que el producto de dos racionales siempre es racional.
  - El caso “Si \(\frac{3}{4}\) y \(-\frac{2}{7}\) son racionales, entonces su producto también lo es”
    satisface esa condición.
  - Comprueba que el denominador del producto no sea cero y concluye que sigue siendo racional.
- titulo: ¿Es válido omitir el paso “Representa los dos racionales como fracciones de denominador no nulo”?
    — Clausura de Q en la multiplicación
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de clausura de Q en la multiplicación.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica numeradores y denominadores.'
  - 'La solución debe terminar de este modo: Comprueba que el denominador del producto no sea cero y concluye
    que sigue siendo racional.'
errores_frecuentes:
- 'Empezar clausura de Q en la multiplicación sin realizar este control inicial: Representa los dos racionales
  como fracciones de denominador no nulo.'
- Memorizar “Si \(\frac{3}{4}\) y \(-\frac{2}{7}\) son racionales, entonces su producto también lo es”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Multiplica numeradores y denominadores.” y usarlo aunque cambien las condiciones
  del problema.
- Dar por válida una conclusión sobre clausura de Q en la multiplicación que contradice el criterio “La
  multiplicación conserva pertenencia al conjunto de los racionales”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que el denominador del producto no
  sea cero y concluye que sigue siendo racional.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
