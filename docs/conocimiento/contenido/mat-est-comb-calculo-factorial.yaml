semantic_id: MAT.EST.COMBINACIONES.CALCULO_FACTORIAL
titulo: Calcular combinaciones simplificando factoriales de forma eficiente
objetivo: Calcular el valor de C(n,r) simplificando los factoriales directamente, sin calcular n! completo
  cuando no es necesario.
introduccion: Al igual que en las variaciones, es más eficiente simplificar los factoriales antes de multiplicar,
  especialmente cuando n es grande.
resumen: Para calcular $C(n,r)$ de forma eficiente, se simplifica $\dfrac{n!}{(n-r)!}$ primero (dejando
  solo $r$ factores), y luego se divide por $r!$.
explicacion: '![Cálculo de combinaciones vía factoriales](/static/img/probabilidad/comb/comb-calculo-factorial.svg)


  ### Definición formal


  $C(n,r)=\dfrac{n\times(n-1)\times\cdots\times(n-r+1)}{r!}$, simplificando el numerador a solo $r$ factores
  antes de dividir.


  ### Desarrollo didáctico


  Para calcular $C(8,3)$: en vez de calcular $8!$ y $3!\times5!$ completos, se simplifica directamente
  $\dfrac{8\times7\times6}{3\times2\times1}=\dfrac{336}{6}=56$.'
procedimiento:
- 'Paso 1: Escribe el numerador como el producto de los r factores decrecientes desde n (sin calcular
  n! completo).'
- 'Paso 2: Calcula r! en el denominador.'
- 'Paso 3: Divide el numerador simplificado por r! para obtener el resultado final.'
ejemplos:
- titulo: Calcular C(8,3) de forma eficiente
  enunciado: C(8,3).
  solucion_pasos:
  - (8×7×6)/(3×2×1)=336/6=56.
- titulo: Calcular C(9,4) de forma eficiente
  enunciado: C(9,4).
  solucion_pasos:
  - (9×8×7×6)/(4×3×2×1)=3024/24=126.
- titulo: ¿Es más eficiente simplificar directamente que calcular n! completo?
  respuesta: Sí
  solucion_pasos:
  - Sí, especialmente cuando n es grande, evita cálculos innecesarios con números muy grandes.
- titulo: ¿El numerador simplificado siempre tiene exactamente r factores?
  respuesta: Sí
  solucion_pasos:
  - Sí, van desde n hasta (n-r+1), es decir, exactamente r números.
errores_frecuentes:
- Calcular n! completo innecesariamente, en vez de simplificar directamente a r factores.
- Escribir un número incorrecto de factores en el numerador (más o menos de los r necesarios).
- Olvidar dividir por r! después de simplificar el numerador.
fuente: 'Elaboración propia (referencia: Baldor 375, Moraleja 300).'
estado: publicado
