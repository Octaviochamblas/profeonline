semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.EQUILATERO_ANGULOS_60
titulo: Propiedad de los tres ángulos interiores de 60° en un triángulo equilátero
objetivo: Aplicar la propiedad de que los tres ángulos interiores de un triángulo equilátero miden 60°
  cada uno.
introduccion: Como los tres lados de un triángulo equilátero son iguales, también lo son sus tres ángulos
  interiores; y como deben sumar 180°, cada uno mide exactamente 60°.
resumen: En todo triángulo equilátero, cada uno de los tres ángulos interiores mide 60°.
explicacion: '![Ángulos del triángulo equilátero](/static/img/geometria/triangulos/triangulos-clasificacion-equilatero-angulos-60.svg)


  ### Definición formal


  En un triángulo equilátero, los tres ángulos interiores son iguales entre sí (por la igualdad de los
  lados) y suman 180°; por lo tanto, cada uno mide 180°÷3=60°.


  ### Desarrollo didáctico


  Si los tres ángulos son iguales, α=β=γ, y α+β+γ=180°, entonces 3α=180°, de donde α=60°. Esto ocurre
  en todo triángulo equilátero, sin importar el tamaño de sus lados.'
procedimiento:
- 'Paso 1: Verifica que el triángulo sea equilátero (los tres lados iguales).'
- 'Paso 2: Recuerda que los tres ángulos interiores también son iguales entre sí.'
- 'Paso 3: Divide 180° entre 3 para obtener la medida de cada ángulo: 60°.'
ejemplos:
- titulo: Calcular los ángulos de un equilátero
  enunciado: Un triángulo equilátero tiene lados de 10 cm.
  solucion_pasos:
  - Cada uno de sus tres ángulos interiores mide 60°, sin importar la medida de los lados.
- titulo: Verificar la suma
  enunciado: Comprueba que 60°+60°+60° cumple el teorema de la suma de ángulos interiores.
  solucion_pasos:
  - 60°+60°+60°=180°, se cumple correctamente.
- titulo: ¿Todos los ángulos de un triángulo equilátero son iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, los tres miden 60° cada uno.
- titulo: ¿La medida de los ángulos depende del tamaño del triángulo equilátero?
  respuesta: 'No'
  solucion_pasos:
  - No, siempre son 60° cada uno, sin importar cuánto midan los lados.
errores_frecuentes:
- Creer que los ángulos de un triángulo equilátero dependen del tamaño de sus lados.
- Confundir esta propiedad con la de un triángulo isósceles cualquiera.
- Olvidar dividir 180° entre 3 y asumir otra medida para los ángulos.
fuente: Elaboración propia.
estado: publicado
