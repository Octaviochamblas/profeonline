semantic_id: MAT.EST.MEDIA_PROMEDIO.TABLA_FRECUENCIA
titulo: Calcular la media mediante tablas de frecuencia
objetivo: Calcular la media aritmética a partir de una tabla de frecuencias, usando la suma de productos
  x·f dividida por el total de datos.
introduccion: Cuando los datos ya están organizados en una tabla de frecuencia, es más eficiente usar
  esta fórmula que sumar cada dato individualmente.
resumen: La media a partir de una tabla de frecuencias se calcula sumando el producto de cada valor por
  su frecuencia, y dividiendo por el total de datos.
explicacion: '![Cálculo de la media mediante tabla de frecuencia](/static/img/estadistica/promedio/media-tabla-frecuencia.svg)


  ### Definición formal


  $\bar{x}=\dfrac{\sum(x_i\times f_i)}{n}$, donde $n=\sum f_i$ es el total de datos.


  ### Desarrollo didáctico


  Con x=4,f=1; x=5,f=2; x=6,f=3 (n=6): $\bar{x}=(4\times1+5\times2+6\times3)/6=(4+10+18)/6=32/6\approx5{,}33$.'
procedimiento:
- 'Paso 1: Para cada valor x de la tabla, calcula el producto x·f (valor por su frecuencia).'
- 'Paso 2: Suma todos esos productos x·f.'
- 'Paso 3: Divide esa suma por el total de datos n (la suma de todas las frecuencias) para obtener la
  media.'
ejemplos:
- titulo: Calcular la media con tabla de 3 valores
  enunciado: x=4,f=1; x=5,f=2; x=6,f=3.
  solucion_pasos:
  - Σ(x·f)=4+10+18=32. n=6. Media=32/6≈5,33.
- titulo: Calcular la media de notas con tabla de frecuencia
  enunciado: x=5,f=3; x=6,f=5; x=7,f=2.
  solucion_pasos:
  - Σ(x·f)=15+30+14=59. n=10. Media=59/10=5,9.
- titulo: ¿Es necesario multiplicar cada valor por su frecuencia antes de sumar?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el paso clave para no calcular la media de forma incorrecta con datos en tabla.
- titulo: ¿El total de datos n es igual a la suma de todas las frecuencias?
  respuesta: Sí
  solucion_pasos:
  - Sí, n=Σf, tal como se vio en el bloque de tablas de frecuencia.
errores_frecuentes:
- Olvidar multiplicar cada valor por su frecuencia antes de sumar, sumando solo los valores x directamente.
- Dividir por el número de filas de la tabla en vez de por el total de datos (suma de frecuencias).
- Cometer errores aritméticos al calcular los productos x·f para cada fila.
fuente: 'Elaboración propia (referencia: Moraleja 359).'
estado: publicado
