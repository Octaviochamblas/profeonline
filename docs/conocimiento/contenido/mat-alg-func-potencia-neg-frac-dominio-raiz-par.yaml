semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.DOMINIO_RAIZ_PAR
titulo: Dominio de $f(x)=x^{1/q}$ con índice par
objetivo: Determinar que el dominio de $f(x)=x^{1/q}$ se restringe a $x\geq0$ cuando $q$ es un entero par.
introduccion: Cuando el índice de la raíz es par, como en la raíz cuadrada o cuarta, no existe una raíz real para
  números negativos.
resumen: Si $q$ es un entero par, el dominio de $f(x)=x^{1/q}=\sqrt[q]{x}$ es $[0,+\infty)$, excluyendo todos los
  valores negativos de $x$.
explicacion: '### Definición formal


  Para $q$ par, la expresión $\sqrt[q]{x}$ solo está definida dentro de los números reales cuando $x\geq0$, ya
  que ninguna potencia par de un número real puede dar un resultado negativo. Por lo tanto, el dominio de
  $f(x)=x^{1/q}$ es $[0,+\infty)$.


  ### Desarrollo didáctico


  $f(x)=\sqrt[4]{x}$: está definida en $x=16$, dando $f(16)=2$, pero no está definida en $x=-16$, porque ningún
  número real elevado a la cuarta potencia puede dar $-16$.'
procedimiento:
- 'Paso 1: Identifica el índice $q$ de la raíz en la expresión $x^{1/q}$.'
- 'Paso 2: Verifica si $q$ es par.'
- 'Paso 3: Si es par, restringe el dominio a $x\geq0$.'
ejemplos:
- titulo: Determinación del dominio de $x^{1/2}$
  enunciado: 'Determina el dominio de $f(x)=x^{1/2}$.'
  solucion_pasos:
  - El índice de la raíz es $2$, un número par.
  - 'El dominio es $[0,+\infty)$.'
- titulo: Determinación del dominio de $x^{1/6}$
  enunciado: 'Determina el dominio de $f(x)=x^{1/6}$.'
  solucion_pasos:
  - El índice de la raíz es $6$, un número par.
  - 'El dominio es $[0,+\infty)$.'
- titulo: ¿$x=-9$ pertenece al dominio de $f(x)=\sqrt[4]{x}$?
  enunciado: ¿El valor $x=-9$ pertenece al dominio de $f(x)=\sqrt[4]{x}$?
  respuesta: 'No'
  solucion_pasos:
  - Ningún número real elevado a la cuarta potencia da un resultado negativo.
- titulo: ¿El valor $x=0$ pertenece al dominio de $f(x)=\sqrt[6]{x}$?
  enunciado: ¿El valor $x=0$ pertenece al dominio de $f(x)=\sqrt[6]{x}$?
  respuesta: Sí
  solucion_pasos:
  - Se incluye $x=0$, porque $\sqrt[6]{0}=0$ está bien definido.
errores_frecuentes:
- Suponer que toda función raíz excluye $x=0$, cuando en realidad sí pertenece al dominio.
- No verificar la paridad del índice antes de determinar el dominio.
- Confundir esta restricción con la del recorrido, que es un análisis distinto.
- Aplicar esta restricción a raíces con índice impar, donde no corresponde.
