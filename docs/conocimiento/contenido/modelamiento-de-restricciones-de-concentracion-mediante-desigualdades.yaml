semantic_id: MAT.ALG.MODELAMIENTO_DESIGUALDADES.RESTRICCION_CONCENTRACION
titulo: Modelamiento de restricciones de concentración mediante desigualdades
objetivo: Modelar condiciones de concentración o porcentaje usando desigualdades lineales.
introduccion: En mezclas, soluciones y productos diluidos suele exigirse que la concentración no sobrepase
  o no baje de cierto valor. Esas condiciones pueden escribirse con desigualdades.
resumen: Una restricción de concentración compara la cantidad de sustancia activa con una concentración
  máxima o mínima permitida en la mezcla total.
explicacion: '### Definición formal


  Si una mezcla contiene una cantidad de sustancia activa $A(x)$ y una cantidad total de mezcla $M(x)$,
  una condición de concentración se modela como una desigualdad entre el cociente $\frac{A(x)}{M(x)}$
  y una cota dada $c$. En forma general:

  $$\frac{A(x)}{M(x)} \leq c \qquad \text{o} \qquad \frac{A(x)}{M(x)} \geq c,$$

  con $M(x) > 0$. Al multiplicar por $M(x)$, la restricción puede transformarse en una desigualdad lineal
  equivalente siempre que el denominador sea positivo en el contexto del problema.


  ### Desarrollo didáctico


  En palabras simples, una concentración compara "parte activa" con "cantidad total". Si el problema exige
  no pasar de cierto porcentaje, la inecuación debe reflejar ese límite sobre la mezcla completa, no solo
  sobre uno de sus componentes.

  Este tipo de modelamiento aparece en química básica, soluciones desinfectantes, bebidas o alimentos
  diluidos.'
procedimiento:
- 'Paso 1: Identifica cuál es la sustancia activa y cuál es la cantidad total de mezcla.'
- 'Paso 2: Expresa algebraicamente la cantidad de sustancia activa en función de la variable del problema.'
- 'Paso 3: Expresa la concentración como cociente entre parte activa y total.'
- 'Paso 4: Compara ese cociente con la concentración máxima o mínima permitida.'
- 'Paso 5: Elimina denominadores, si corresponde, y simplifica la desigualdad resultante.'
ejemplos:
- titulo: Máximo porcentaje de sal
  enunciado: A una solución con 2 litros de agua se agregan $x$ litros de salmuera al 20%. Si la concentración
    final no debe superar el 8%, plantea la desigualdad.
  solucion_pasos:
  - La cantidad de sal agregada es $0.20x$ litros equivalentes de sal.
  - El volumen total de mezcla es $x + 2$.
  - La condición pedida es $\frac{0.20x}{x+2} \leq 0.08$.
- titulo: Concentración mínima requerida
  enunciado: Una mezcla debe contener al menos 30% de jugo concentrado. Si se agregan $x$ litros de concentrado
    a 5 litros de agua, modela la restricción.
  solucion_pasos:
  - La cantidad de concentrado es $x$.
  - El volumen total es $x + 5$.
  - La desigualdad que modela la condición es $\frac{x}{x+5} \geq 0.30$.
- titulo: ¿En una restricción de concentración se compara la parte activa con el total de mezcla?
  respuesta: Sí
  solucion_pasos:
  - Una concentración expresa una razón entre cantidad activa y cantidad total.
  - Por eso la comparación correcta usa un cociente, no una simple diferencia.
- titulo: ¿Si se exige un máximo de 10%, basta imponer $A(x) \leq 10$ sin considerar el total?
  respuesta: 'No'
  solucion_pasos:
  - El porcentaje depende de la relación entre parte activa y total, no del valor aislado de la parte
    activa.
  - La condición correcta debe involucrar una razón como $\frac{A(x)}{M(x)} \leq 0.10$.
errores_frecuentes:
- Comparar la cantidad activa con el porcentaje sin dividir por el total.
- Olvidar incluir en el total todos los componentes de la mezcla.
- Eliminar denominadores sin verificar que el total sea positivo.
- Expresar el porcentaje 8% como 8 en vez de $0.08$.
- Suponer que una restricción de concentración siempre se reduce a una igualdad exacta.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
