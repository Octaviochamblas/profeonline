semantic_id: MAT.ALG.MULT_MON_POL.COEFICIENTES_FRACCIONARIOS
objetivo: Multiplicar un monomio por un polinomio con coeficientes fraccionarios,
  aplicando la propiedad distributiva término a término.
introduccion: Cuando distribuimos un monomio sobre un polinomio con fracciones, multiplicamos
  el término exterior por cada término interior. Esto genera múltiples multiplicaciones
  de fracciones independientes que resolvemos una por una.
resumen: Al multiplicar un monomio por un polinomio con **Coeficientes Fraccionarios**,
  se distribuye el monomio multiplicando cada término. Cada producto parcial requiere
  multiplicar fracciones numeradores con numeradores y denominadores con denominadores.
explicacion: "Multiplica: $\\frac{1}{2}x(\\frac{2}{3}x - \\frac{4}{5})$.\n\n1. Distribución\
  \ 1:\n   $\\frac{1}{2}x \\cdot \\frac{2}{3}x = (\\frac{1}{2} \\cdot \\frac{2}{3})x^2\
  \ = \\frac{2}{6}x^2 = \\frac{1}{3}x^2$.\n2. Distribución 2:\n   $\\frac{1}{2}x \\\
  cdot (-\\frac{4}{5}) = -(\\frac{1}{2} \\cdot \\frac{4}{5})x = -\\frac{4}{10}x =\
  \ -\\frac{2}{5}x$.\n\nResultado combinado: $\\frac{1}{3}x^2 - \\frac{2}{5}x$."
procedimiento:
- 'Paso 1: Identifica el monomio multiplicador y cada uno de los sumandos fraccionarios
  dentro del polinomio.'
- 'Paso 2: Distribuye el monomio multiplicando el primer término del polinomio (multiplicación
  de fracciones).'
- 'Paso 3: Distribuye al segundo término (ojo con los signos y la multiplicación de
  fracciones).'
- 'Paso 4: Simplifica cada una de las fracciones obtenidas en los coeficientes.'
- 'Paso 5: Escribe el polinomio final.'
ejemplos:
- titulo: Distribución fraccionaria
  enunciado: 'Multiplica: 2/3 a(3/4 a + 1/2).'
  solucion_pasos:
  - 'Producto 1: (2/3 a)(3/4 a) = 6/12 a^2 = 1/2 a^2.'
  - 'Producto 2: (2/3 a)(1/2) = 2/6 a = 1/3 a.'
  - 'Resultado: 1/2 a^2 + 1/3 a.'
errores_frecuentes:
- Olvidar distribuir el monomio al denominador de los coeficientes del polinomio.
- No simplificar las fracciones finales de cada término.
fuente: Álgebra de Baldor.
estado: publicado
