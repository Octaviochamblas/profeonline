semantic_id: MAT.ALG.MULT_MON_POL.COEFICIENTES_FRACCIONARIOS
objetivo: Multiplicar un monomio por un polinomio con coeficientes fraccionarios, aplicando la propiedad distributiva
  término a término.
introduccion: Cuando distribuimos un monomio sobre un polinomio con fracciones, multiplicamos el término exterior
  por cada término interior. Esto genera múltiples multiplicaciones de fracciones independientes que resolvemos
  una por una.
resumen: Al multiplicar un monomio por un polinomio con **Coeficientes Fraccionarios**, se distribuye el monomio
  multiplicando cada término. Cada producto parcial requiere multiplicar fracciones numeradores con numeradores
  y denominadores con denominadores.
explicacion: "### Definición formal\n\nSea $M=cX^{\\alpha}$ un monomio y sea $P=\\sum_{i=1}^{n}d_iX^{\\beta_i}$ un polinomio, donde $c,d_i\\in\\mathbb{Q}$ y todos los denominadores son distintos de cero. Entonces\n\n$$M\\cdot P=\\sum_{i=1}^{n}(cd_i)X^{\\alpha+\\beta_i}.$$\n\nLa presencia de coeficientes fraccionarios no modifica la propiedad distributiva: cada coeficiente $cd_i$ se calcula mediante el producto de fracciones y se expresa en su forma irreducible; las potencias de bases iguales se combinan sumando exponentes.\n\n### Desarrollo didáctico\n\nMultiplica: $\\frac{1}{2}x(\\frac{2}{3}x - \\frac{4}{5})$.\n\
  \n1. Distribución 1:\n   $\\frac{1}{2}x \\cdot \\frac{2}{3}x = (\\frac{1}{2} \\cdot \\frac{2}{3})x^2 = \\frac{2}{6}x^2\
  \ = \\frac{1}{3}x^2$.\n2. Distribución 2:\n   $\\frac{1}{2}x \\cdot (-\\frac{4}{5}) = -(\\frac{1}{2} \\cdot \\\
  frac{4}{5})x = -\\frac{4}{10}x = -\\frac{2}{5}x$.\n\nResultado combinado: $\\frac{1}{3}x^2 - \\frac{2}{5}x$."
procedimiento:
- 'Paso 1: Identifica el monomio multiplicador y cada uno de los sumandos fraccionarios dentro del polinomio.'
- 'Paso 2: Distribuye el monomio multiplicando el primer término del polinomio (multiplicación de fracciones).'
- 'Paso 3: Distribuye al segundo término (ojo con los signos y la multiplicación de fracciones).'
- 'Paso 4: Simplifica cada una de las fracciones obtenidas en los coeficientes.'
- 'Paso 5: Escribe el polinomio final.'
- 'Término 1: $\frac{3}{5} \times \frac{5}{3} = 1$. Término 2: $\frac{3}{5} \times (-10) = -6$.'
ejemplos:
- titulo: Distribución fraccionaria
  enunciado: 'Multiplica: 2/3 a(3/4 a + 1/2).'
  solucion_pasos:
  - 'Producto 1: (2/3 a)(3/4 a) = 6/12 a^2 = 1/2 a^2.'
  - 'Producto 2: (2/3 a)(1/2) = 2/6 a = 1/3 a.'
  - 'Resultado: 1/2 a^2 + 1/3 a.'
- titulo: Un maestro de obra diseña una rampa de ancho $\frac{1}{2}w$ metros y longitud descrita por $
  enunciado: 'Un maestro de obra diseña una rampa de ancho $\frac{1}{2}w$ metros y longitud descrita por $(\frac{2}{3}w^2
    + 8w)$ metros. ¿Cuál es el área de la superficie de la rampa? (v1)


    Opciones: A) $\frac{1}{3}w^3 + 4w^2$ · B) $\frac{2}{6}w^3 + 8w^2$ · C) $\frac{1}{2}w^3 + 4w^2$ · D) $\frac{1}{3}w^2
    + 4w$'
  solucion_pasos:
  - Área $= (\frac{1}{2}w)(\frac{2}{3}w^2 + 8w) = (\frac{1}{2} \cdot \frac{2}{3})w^3 + (\frac{1}{2} \cdot 8)w^2
    = \frac{2}{6}w^3 + 4w^2 = \frac{1}{3}w^3 + 4w^2$.
  - 'Respuesta: $\frac{1}{3}w^3 + 4w^2$'
- titulo: 'Respecto de «Producto de monomio por polinomio con coeficientes fraccionarios»: ¿Es correcta'
  enunciado: 'Respecto de «Producto de monomio por polinomio con coeficientes fraccionarios»: ¿Es correcta esta
    caracterización? «Al multiplicar un monomio por un polinomio con **Coeficientes Fraccionarios**, se distribuye
    el monomio multiplicando cada término»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al multiplicar un monomio por un polinomio con **Coeficientes
    Fraccionarios**, se distribuye el monomio multiplicando cada término.'
- titulo: 'Respecto de «Producto de monomio por polinomio con coeficientes fraccionarios»: ¿Es válida e'
  enunciado: 'Respecto de «Producto de monomio por polinomio con coeficientes fraccionarios»: ¿Es válida esta afirmación?
    «Olvidar distribuir el monomio al denominador de los coeficientes del polinomio»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al multiplicar un monomio por un polinomio con **Coeficientes
    Fraccionarios**, se distribuye el monomio multiplicando cada término.'
errores_frecuentes:
- Olvidar distribuir el monomio al denominador de los coeficientes del polinomio.
- No simplificar las fracciones finales de cada término.
- $\frac{15}{15}$ y $-\frac{30}{5}$.
- $1$ y $-10$.
- $\frac{3}{5}$ y $-6$.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Producto de monomio por polinomio con coeficientes fraccionarios
