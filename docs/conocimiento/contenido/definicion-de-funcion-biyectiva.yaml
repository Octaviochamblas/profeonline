semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.BIYECTIVA_DEFINICION
titulo: Definición de función biyectiva
objetivo: Comprender la biyectividad como la combinación simultánea de inyectividad y sobreyectividad.
introduccion: Cuando una función cumple las dos propiedades más exigentes al mismo tiempo, cada elemento
  del dominio y cada elemento del codominio quedan emparejados en una correspondencia perfecta, uno a
  uno.
resumen: Una función $f\colon A \to B$ es **biyectiva** si es simultáneamente inyectiva y sobreyectiva;
  es decir, cada elemento de $B$ es imagen de exactamente un elemento de $A$.
explicacion: '### Definición formal


  Una función $f\colon A \to B$ es biyectiva si cumple ambas condiciones: inyectividad ($f(x_1)=f(x_2)
  \implies x_1=x_2$) y sobreyectividad ($\text{Rec}(f)=B$). Equivalentemente, para todo $y \in B$ existe
  un único $x \in A$ tal que $f(x)=y$.


  ### Desarrollo didáctico


  Piensa en una biyección como un "emparejamiento perfecto" entre dos conjuntos: cada elemento de un lado
  tiene exactamente una pareja del otro lado, sin sobrar ni faltar nadie.


  $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=2x+3$ es biyectiva: es inyectiva (por ser lineal con $m\neq0$)
  y sobreyectiva (su recorrido es todo $\mathbb{R}$, igual al codominio).'
procedimiento:
- 'Paso 1: Verifica la inyectividad de la función (que elementos distintos tengan imágenes distintas).'
- 'Paso 2: Verifica la sobreyectividad (que el recorrido coincida con el codominio).'
- 'Paso 3: Si ambas condiciones se cumplen simultáneamente, la función es biyectiva.'
ejemplos:
- titulo: Verificación de biyectividad en función afín
  enunciado: Determina si $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=-4x+7$, es biyectiva.
  solucion_pasos:
  - Es inyectiva, por ser una función afín con pendiente distinta de cero.
  - Es sobreyectiva, pues su recorrido es todo $\mathbb{R}$, igual al codominio.
  - Cumple ambas condiciones, es biyectiva.
- titulo: Función que no es biyectiva
  enunciado: Determina si $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=x^2$, es biyectiva.
  solucion_pasos:
  - No es inyectiva (por ejemplo, $f(2)=f(-2)=4$).
  - Al fallar una de las dos condiciones, no es biyectiva.
- titulo: ¿Una función biyectiva debe ser inyectiva y sobreyectiva al mismo tiempo?
  enunciado: ¿Una función biyectiva debe ser inyectiva y sobreyectiva al mismo tiempo?
  respuesta: Sí
  solucion_pasos:
  - Ambas condiciones deben cumplirse simultáneamente para hablar de biyectividad.
- titulo: ¿Toda función inyectiva es automáticamente biyectiva?
  enunciado: ¿Toda función inyectiva es automáticamente biyectiva?
  respuesta: 'No'
  solucion_pasos:
  - También debe ser sobreyectiva; una función puede ser inyectiva sin serlo sobreyectiva.
errores_frecuentes:
- Confirmar solo una de las dos condiciones (inyectividad o sobreyectividad) y concluir biyectividad.
- Confundir biyectividad con la existencia de inversa, sin verificar ambas propiedades explícitamente.
- No considerar que la biyectividad depende del codominio declarado, igual que la sobreyectividad.
- Suponer que toda función afín es automáticamente biyectiva sin especificar dominio y codominio.
