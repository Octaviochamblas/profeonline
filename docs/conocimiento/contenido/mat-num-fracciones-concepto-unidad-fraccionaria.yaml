semantic_id: MAT.NUM.FRACCIONES_CONCEPTO.UNIDAD_FRACCIONARIA
objetivo: Comprender concepto de unidad fraccionaria y aplicarlo correctamente en
  ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso concepto de unidad fraccionaria ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Una unidad fraccionaria es una fracción con numerador 1 que representa una
  sola parte igual del entero. Además, las unidades fraccionarias sirven como referencia
  para construir otras fracciones.
explicacion: |-
  Una unidad fraccionaria es una fracción con numerador 1 que representa una sola parte igual del entero.

  Una idea importante es que las unidades fraccionarias sirven como referencia para construir otras fracciones.

  Por ejemplo, \(\frac{1}{6}\) es una unidad fraccionaria del entero dividido en 6 partes iguales.
procedimiento:
- 'Paso 1: Identificar qué representa el número o la fracción en la situación.'
- 'Paso 2: Revisar la definición formal del concepto y sus condiciones.'
- 'Paso 3: Concluir si el ejemplo sí corresponde a concepto de unidad fraccionaria
  y justificarlo.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{1}{6}\) es una unidad fraccionaria
    del entero dividido en 6 partes iguales.” se relaciona con concepto de unidad
    fraccionaria.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: una unidad fraccionaria es una fracción con numerador
    1 que representa una sola parte igual del entero.'
  - Concluye que el ejemplo sí ilustra concepto de unidad fraccionaria.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Las unidades fraccionarias sirven como referencia
    para construir otras fracciones.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con concepto de unidad fraccionaria?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que las unidades fraccionarias sirven como
    referencia para construir otras fracciones.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar concepto de unidad fraccionaria ignorando la definición o
    las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar concepto de unidad fraccionaria sin mirar qué representan numerador,
  denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
