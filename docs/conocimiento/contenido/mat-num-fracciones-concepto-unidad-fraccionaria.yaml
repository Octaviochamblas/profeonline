semantic_id: MAT.NUM.FRACCIONES_CONCEPTO.UNIDAD_FRACCIONARIA
titulo: Unidad fraccionaria
objetivo: Reconocer una unidad fraccionaria como una sola parte de un entero dividido en partes iguales.
introduccion: 'Cuando el numerador de una fracción es exactamente \(1\), se obtiene el "ladrillo básico"
  a partir del cual se construyen todas las demás fracciones con ese mismo denominador: la unidad fraccionaria.'
resumen: Una unidad fraccionaria es una fracción de la forma \(\frac{1}{b}\), con \(b\in\mathbb{Z}^+\).
explicacion: '### Definición formal


  Una unidad fraccionaria es toda fracción \(\frac{1}{b}\) con \(b\in\mathbb{Z}^+\): representa exactamente
  una de las \(b\) partes iguales en que se dividió el entero. Cualquier fracción \(\frac{a}{b}\) puede
  escribirse como \(a\) veces la unidad fraccionaria \(\frac{1}{b}\).


  ### Desarrollo didáctico


  \(\frac{1}{6}\) es la unidad fraccionaria de un entero dividido en \(6\) partes iguales. Sumando esa
  unidad varias veces se obtienen las demás fracciones de igual denominador: \(\frac{1}{6}+\frac{1}{6}+\frac{1}{6}=\frac{3}{6}\).'
procedimiento:
- 'Paso 1: Determina en cuántas partes iguales se dividió el entero.'
- 'Paso 2: Escribe una sola de esas partes como \(1/b\).'
- 'Paso 3: Verifica que reunir \(b\) unidades fraccionarias reconstruya el entero.'
ejemplos:
- titulo: Aplicación razonada — Concepto de unidad fraccionaria
  enunciado: \(\frac{1}{6}\) es una unidad fraccionaria del entero dividido en 6 partes iguales.
  solucion_pasos:
  - Determina en cuántas partes iguales se dividió el entero.
  - Escribe una sola de esas partes como \(1/b\).
  - Verifica que reunir \(b\) unidades fraccionarias reconstruya el entero.
- titulo: Revisión de una solución — Concepto de unidad fraccionaria
  enunciado: Una solución aplica “Escribe una sola de esas partes como \(1/b\).”, pero termina sin comprobar
    que las unidades fraccionarias sirven como referencia para construir otras fracciones. Determina qué
    falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define concepto de unidad fraccionaria: una unidad fraccionaria es una
    fracción con numerador 1 que representa una sola parte igual del entero.'
  - Determina en cuántas partes iguales se dividió el entero.
  - 'Completa la revisión con este control: Verifica que reunir \(b\) unidades fraccionarias reconstruya
    el entero.'
- titulo: ¿Se cumple que las unidades fraccionarias sirven como referencia para construir otras fracciones?
    — Concepto de unidad fraccionaria
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una unidad fraccionaria es una fracción con numerador 1
    que representa una sola parte igual del entero.
  - El caso “\(\frac{1}{6}\) es una unidad fraccionaria del entero dividido en 6 partes iguales” satisface
    esa condición.
  - Verifica que reunir \(b\) unidades fraccionarias reconstruya el entero.
- titulo: ¿Es válido omitir el paso “Determina en cuántas partes iguales se dividió el entero”? — Concepto
    de unidad fraccionaria
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de concepto de unidad fraccionaria.
  - 'Omitirlo puede volver inválida la acción siguiente: Escribe una sola de esas partes como \(1/b\).'
  - 'La solución debe terminar de este modo: Verifica que reunir \(b\) unidades fraccionarias reconstruya
    el entero.'
errores_frecuentes:
- 'Empezar concepto de unidad fraccionaria sin realizar este control inicial: Determina en cuántas partes
  iguales se dividió el entero.'
- Memorizar “\(\frac{1}{6}\) es una unidad fraccionaria del entero dividido en 6 partes iguales” como
  respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Escribe una sola de esas partes como \(1/b\).” y usarlo aunque cambien
  las condiciones del problema.
- Dar por válida una conclusión sobre concepto de unidad fraccionaria que contradice el criterio “Las
  unidades fraccionarias sirven como referencia para construir otras fracciones”.
- 'Cerrar el ejercicio sin esta comprobación específica: Verifica que reunir \(b\) unidades fraccionarias
  reconstruya el entero.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
