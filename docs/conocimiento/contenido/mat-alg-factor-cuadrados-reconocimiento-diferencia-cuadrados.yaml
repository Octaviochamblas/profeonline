semantic_id: MAT.ALG.FACTOR_CUADRADOS.RECONOCIMIENTO_DIFERENCIA_CUADRADOS
titulo: Diferencia de cuadrados perfectos
objetivo: Aprender a factorizar expresiones algebraicas que se presentan como la resta de dos cuadrados perfectos.
introduccion: 'Si has estudiado los productos notables, recordarás que la multiplicación de "Suma por su diferencia"
  creaba un resultado muy limpio: dos cuadrados restándose. Ahora haremos exactamente lo opuesto: tomaremos esa
  resta limpia y descubriremos los gemelos (uno positivo y uno negativo) que le dieron origen.'
resumen: 'La diferencia de cuadrados se factoriza en el producto de dos binomios conjugados: la suma de las raíces
  de los cuadrados por su diferencia: $a^2 - b^2 = (a+b)(a-b)$.'
explicacion: '### Definición formal


  El producto de dos binomios conjugados (suma por su diferencia).


  ### Desarrollo didáctico


  El caso de $a^2 - b^2$ es posiblemente la factorización más famosa del álgebra.


  Para que este método sea aplicable, la expresión debe cumplir dos condiciones inflexibles:

  1. Tienen que ser exactamente dos términos.

  2. Uno de los términos debe ser positivo y el otro negativo (están restándose).

  3. Ambos términos deben ser ''cuadrados perfectos'', lo que significa que puedes extraerles su raíz cuadrada de
  forma exacta.


  Por ejemplo: $25x^2 - 9$.

  - ¿Son dos términos restándose? Sí.

  - ¿Raíz cuadrada de $25x^2$? Es $5x$.

  - ¿Raíz cuadrada de $9$? Es $3$.


  Las raíces son $5x$ y $3$.

  Formamos los gemelos conjugados: $(5x + 3)(5x - 3)$.

  Y listo. Ya está factorizado.'
procedimiento:
- 'Paso 1: Confirma que tienes un binomio separado por un signo de resta ($-$).'
- 'Paso 2: Extrae la raíz cuadrada exacta del primer término.'
- 'Paso 3: Extrae la raíz cuadrada exacta del segundo término (sin tomar el signo negativo).'
- 'Paso 4: Escribe tu respuesta como dos binomios multiplicándose: en uno pones la suma de las raíces, y en el otro,
  la resta.'
- La forma es (A+B)(A-B).
ejemplos:
- titulo: Factoriza $49m^2 - 16$
  enunciado: Factoriza $49m^2 - 16$.
  solucion_pasos:
  - 'Raíz del primero: $\sqrt{49m^2} = 7m$.'
  - 'Raíz del segundo: $\sqrt{16} = 4$.'
  - Multiplicamos la suma por la resta de ambas raíces.
  - 'Resultado: $(7m + 4)(7m - 4)$.'
- titulo: ¿Cuál es la factorización de $y^6 - 100$?
  solucion_pasos:
  - La raíz cuadrada de $y^6$ es $y^3$ (se divide el exponente entre 2). La raíz de 100 es 10.
- titulo: 'Respecto de «Reconocimiento de diferencia de cuadrados perfectos»: ¿Es correcta esta caracte'
  enunciado: 'Respecto de «Reconocimiento de diferencia de cuadrados perfectos»: ¿Es correcta esta caracterización?
    «La diferencia de cuadrados se factoriza en el producto de dos binomios conjugados: la suma de las raíces de
    los cuadrados por su diferencia: $a^2 - b^2 = (a+b)(a-b)$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La diferencia de cuadrados se factoriza en el producto de
    dos binomios conjugados: la suma de las raíces de los cuadrados por su diferencia: $a^2 - b^2 = (a+b)(a-b)$.'
- titulo: 'Respecto de «Reconocimiento de diferencia de cuadrados perfectos»: ¿Es válida esta afirmació'
  enunciado: 'Respecto de «Reconocimiento de diferencia de cuadrados perfectos»: ¿Es válida esta afirmación? «Dividir
    el exponente entre 4 en lugar de 2 al sacar raíz cuadrada de exponentes mayores»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La diferencia de cuadrados se factoriza en el producto de
    dos binomios conjugados: la suma de las raíces de los cuadrados por su diferencia: $a^2 - b^2 = (a+b)(a-b)$.'
errores_frecuentes:
- Dividir el exponente entre 4 en lugar de 2 al sacar raíz cuadrada de exponentes mayores.
- Pensar que la factorización de $(a^2 - b^2)$ es $(a-b)^2$.
- Intentar aplicar el método si hay un signo '+$' en medio (ej. $x^2 + 4$).
- Para «¿Cuál es el resultado general de factorizar una diferencia de cuadrados», la respuesta correcta es Un trinomio.
- Para «¿Cuál es el resultado general de factorizar una diferencia de cuadrados», la respuesta correcta es Un binomio
  al cuadrado.
