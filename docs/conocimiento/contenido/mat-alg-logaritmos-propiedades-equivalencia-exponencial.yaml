errores_frecuentes:
- Invertir el orden de la equivalencia, escribiendo $x^y=b$ en vez de $b^y=x$.
- Omitir la verificaciĂłn de que la base cumple $b>0$, $b\neq1$ al aplicar la equivalencia.
- No usar variables auxiliares al demostrar propiedades, complicando innecesariamente el Ăˇlgebra.
- Aplicar la equivalencia solo en una direcciĂłn, sin aprovecharla para volver de exponencial a logarĂ­tmica.
