semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.EQUIVALENCIA_EXPONENCIAL
titulo: Equivalencia entre notaciĂłn logarĂ­tmica y exponencial
objetivo: Usar la equivalencia $\log_b(x)=y \Leftrightarrow b^y=x$ como herramienta para demostrar propiedades
  algebraicas del logaritmo.
introduccion: Cada propiedad del logaritmo puede demostrarse traduciĂ©ndola a su versiĂłn exponencial equivalente,
  donde las reglas de potencias ya son conocidas.
resumen: La equivalencia $\log_b(x)=y \Leftrightarrow b^y=x$ permite traducir cualquier propiedad logarĂ­tmica a
  una propiedad de potencias, y viceversa, facilitando su demostraciĂłn algebraica.
explicacion: '### DefiniciĂłn formal


  Para $b>0$, $b\neq1$ y $x>0$, se cumple $\log_b(x)=y \Leftrightarrow b^y=x$. Esta doble implicaciĂłn permite
  reescribir cualquier igualdad logarĂ­tmica como una igualdad exponencial equivalente, y usar las propiedades ya
  conocidas de las potencias para demostrar las propiedades del logaritmo.


  ### Desarrollo didĂˇctico


  Para demostrar $\log_b(xy)=\log_b(x)+\log_b(y)$, se definen $m=\log_b(x)$ y $n=\log_b(y)$, es decir $b^m=x$ y
  $b^n=y$. Multiplicando: $xy=b^m\cdot b^n=b^{m+n}$. Al aplicar el logaritmo, se obtiene
  $\log_b(xy)=m+n=\log_b(x)+\log_b(y)$.'
procedimiento:
- 'Paso 1: Escribe cada logaritmo involucrado como una variable auxiliar (por ejemplo $m=\log_b(x)$).'
- 'Paso 2: Traduce cada variable auxiliar a su forma exponencial equivalente ($b^m=x$).'
- 'Paso 3: Opera con las potencias usando las reglas ya conocidas (producto, cociente, potencia de potencia).'
- 'Paso 4: Vuelve a aplicar el logaritmo al resultado para obtener la propiedad logarĂ­tmica buscada.'
ejemplos:
- titulo: TraducciĂłn de una ecuaciĂłn logarĂ­tmica a exponencial
  enunciado: 'Traduce $\log_b(x)=m$ a su forma exponencial equivalente.'
  solucion_pasos:
  - Se aplica la equivalencia directa de la definiciĂłn.
  - 'La forma exponencial equivalente es $b^m=x$.'
- titulo: Uso de la equivalencia para demostrar una propiedad
  enunciado: 'Usa la equivalencia exponencial para justificar que $\log_b(x^n)=n\cdot\log_b(x)$.'
  solucion_pasos:
  - 'Se define $m=\log_b(x)$, es decir $b^m=x$.'
  - 'Elevando a $n$: $x^n=(b^m)^n=b^{mn}$, asĂ­ que $\log_b(x^n)=mn=n\cdot\log_b(x)$.'
