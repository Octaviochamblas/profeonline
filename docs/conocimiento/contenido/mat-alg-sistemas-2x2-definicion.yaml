semantic_id: 'MAT.ALG.SISTEMAS_2X2.DEFINICION'
titulo: 'Definición de Sistemas Lineales 2x2'
objetivo: 'Comprender la estructura de dos ecuaciones simultáneas con dos incógnitas.'
introduccion: |
  Hasta ahora resolvías problemas de una sola letra ($x$). Pero, ¿qué pasa si quieres saber el precio de una manzana ($x$) y de una pera ($y$)? Necesitas **dos letras**.
resumen: |
  Un sistema 2x2 es simplemente un par de ecuaciones (generalmente escritas una debajo de la otra unidas por una llave) que deben cumplirse **al mismo tiempo**.
explicacion: |
  La regla dorada del álgebra dice: Si tienes 2 incógnitas, necesitas OBLIGATORIAMENTE 2 ecuaciones distintas para poder resolverlo. Si solo tienes 1 ecuación (ej: $x + y = 10$), hay infinitas combinaciones ($5+5$, $8+2$, $0+10$).
procedimiento:
  - 'Paso 1: Identifica que tienes dos incógnitas distintas (usualmente ''x'' e ''y'').'
  - 'Paso 2: Asegúrate de tener dos ecuaciones que relacionen esas dos incógnitas.'
  - 'Paso 3: Comprende que la solución del sistema es un PAR ORDENADO $(x, y)$ que hace verdaderas a ambas ecuaciones simultáneamente.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
