semantic_id: MAT.ALG.SISTEMAS_2X2.DEFINICION
titulo: Definición de Sistemas Lineales 2x2
objetivo: Comprender la estructura de dos ecuaciones simultáneas con dos incógnitas.
introduccion: 'La regla dorada del álgebra dice: Si tienes 2 incógnitas, necesitas OBLIGATORIAMENTE 2 ecuaciones
  distintas para poder resolverlo. Si solo tienes 1 ecuación (ej: $x + y = 10$), hay infinitas combinaciones ($5+5$,
  $8+2$, $0+10$).'
resumen: Hasta ahora resolvías problemas de una sola letra ($x$). Pero, ¿qué pasa si quieres saber el precio de
  una manzana ($x$) y de una pera ($y$)? Necesitas **dos letras**.
explicacion: '### Definición formal


  Un sistema lineal $2\times 2$ es un conjunto de dos ecuaciones lineales con dos incógnitas, de la forma

  $$\begin{cases}
  a_1x+b_1y=c_1,\\
  a_2x+b_2y=c_2,
  \end{cases}$$

  donde $(a_1,b_1)\neq(0,0)$ y $(a_2,b_2)\neq(0,0)$. Resolver el sistema consiste en determinar el conjunto de pares
  ordenados $(x,y)$ que satisfacen simultáneamente ambas ecuaciones. La solución puede ser única, inexistente o infinita,
  según la relación entre las dos ecuaciones.


  ### Desarrollo didáctico


  La regla dorada del álgebra dice: Si tienes 2 incógnitas, necesitas OBLIGATORIAMENTE 2 ecuaciones distintas para
  poder resolverlo. Si solo tienes 1 ecuación (ej: $x + y = 10$), hay infinitas combinaciones ($5+5$, $8+2$, $0+10$).


  Un sistema 2x2 es simplemente un par de ecuaciones (generalmente escritas una debajo de la otra unidas por una
  llave) que deben cumplirse **al mismo tiempo**.'
procedimiento:
- Identifica que tienes dos incógnitas distintas (usualmente 'x' e 'y').
- Asegúrate de tener dos ecuaciones que relacionen esas dos incógnitas.
- Comprende que la solución del sistema es un PAR ORDENADO $(x, y)$ que hace verdaderas a ambas ecuaciones simultáneamente.
ejemplos:
- titulo: $x + y = 10$ y $0+10$
  enunciado: Analiza el caso $x + y = 10$ y $0+10$ y explica cómo se aplica el criterio estudiado.
  solucion_pasos:
  - 'La regla dorada del álgebra dice: Si tienes 2 incógnitas, necesitas OBLIGATORIAMENTE 2 ecuaciones distintas
    para poder resolverlo. Si solo tienes 1 ecuación (ej: $x + y = 10$), hay infinitas combinaciones ($5+5$, $8+2$,
    $0+10$).'
  - Identifica que tienes dos incógnitas distintas (usualmente 'x' e 'y').
- titulo: $x$
  enunciado: Resuelve o interpreta $x$ usando las condiciones de este recurso.
  solucion_pasos:
  - Hasta ahora resolvías problemas de una sola letra ($x$). Pero, ¿qué pasa si quieres saber el precio de una manzana
    ($x$) y de una pera ($y$)? Necesitas **dos letras**.
  - Asegúrate de tener dos ecuaciones que relacionen esas dos incógnitas.
- titulo: 'Respecto de «Definición de sistema de ecuaciones lineales 2x2»: ¿Es correcta esta caracteriz'
  enunciado: 'Respecto de «Definición de sistema de ecuaciones lineales 2x2»: ¿Es correcta esta caracterización?
    «Hasta ahora resolvías problemas de una sola letra ($x$)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Hasta ahora resolvías problemas de una sola letra ($x$).'
- titulo: 'Respecto de «Definición de sistema de ecuaciones lineales 2x2»: ¿Es válida esta afirmación?'
  enunciado: 'Respecto de «Definición de sistema de ecuaciones lineales 2x2»: ¿Es válida esta afirmación? «Puede
    omitirse esta condición sin cambiar el resultado: «Identifica que tienes dos incógnitas distintas (usualmente
    ''x'' e ''y'')»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Hasta ahora resolvías problemas de una sola letra ($x$).'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Identifica que tienes dos incógnitas distintas (usualmente
  ''x'' e ''y'')».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Asegúrate de tener dos ecuaciones que relacionen
  esas dos incógnitas».'
- La definición sigue cumpliéndose aunque no se considere que hasta ahora resolvías problemas de una sola letra
  ($x$). Pero, ¿qué pasa si quieres saber el precio de una manzana ($x$) y de una pera ($y$)? Necesitas **dos letras**.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Identifica que tienes dos incógnitas
  distintas (usualmente 'x' e 'y')».
- La comprobación del resultado vuelve innecesaria la condición «Asegúrate de tener dos ecuaciones que relacionen
  esas dos incógnitas».
