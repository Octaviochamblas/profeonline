semantic_id: MAT.GEO.PARALELOGRAMOS.AREA_BASE_ALTURA
titulo: Cálculo del área de un paralelogramo mediante base por altura
objetivo: Calcular el área de cualquier paralelogramo multiplicando la longitud de su base por su altura
  correspondiente.
introduccion: Así como el triángulo tiene una fórmula de área basada en base y altura, el paralelogramo
  tiene una fórmula análoga, incluso más directa.
resumen: El área de un paralelogramo es igual al producto de su base por su altura correspondiente (la
  distancia perpendicular entre la base y el lado opuesto).
explicacion: '![Área de un paralelogramo: base por altura](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-area-base-altura.svg)


  ### Definición formal


  Si $b$ es la base de un paralelogramo y $h$ es la altura correspondiente (perpendicular a la base, hasta
  el lado opuesto), el área es $A=b\times h$.


  ### Desarrollo didáctico


  Un paralelogramo con base 10 cm y altura 6 cm tiene área $A=10\times6=60$ cm². A diferencia del triángulo
  (que divide entre 2), el paralelogramo no requiere esa división, ya que puede pensarse como el doble
  de un triángulo con la misma base y altura.'
procedimiento:
- 'Paso 1: Identifica la base del paralelogramo.'
- 'Paso 2: Identifica la altura correspondiente a esa base (el segmento perpendicular hasta el lado opuesto).'
- 'Paso 3: Multiplica la base por la altura para obtener el área.'
ejemplos:
- titulo: Calcular el área con base y altura conocidas
  enunciado: Un paralelogramo tiene base 10 cm y altura 6 cm.
  solucion_pasos:
  - A=10×6=60 cm².
- titulo: Calcular el área de un rectángulo (caso particular)
  enunciado: Un rectángulo tiene lados 8 cm y 5 cm.
  solucion_pasos:
  - A=8×5=40 cm², ya que en el rectángulo la altura coincide con el lado perpendicular a la base.
- titulo: ¿Se divide entre 2 en esta fórmula, como en el triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, a diferencia del triángulo, el paralelogramo no requiere dividir entre 2.
- titulo: ¿La altura siempre coincide con uno de los lados del paralelogramo?
  respuesta: 'No'
  solucion_pasos:
  - No, solo en el caso del rectángulo (y cuadrado); en romboides y rombos inclinados, la altura es distinta
    de los lados.
errores_frecuentes:
- Dividir por error entre 2, confundiendo esta fórmula con la del área del triángulo.
- Usar un lado que no es realmente perpendicular a la base como si fuera la altura.
- Confundir la base con un lado cualquiera, sin identificar cuál corresponde a la altura dada.
fuente: 'Fuente: Moraleja Tomo 2 68-69, Cid 32-33.'
estado: publicado
