semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.SISTEMA_INCONSISTENTE
titulo: Sistema Incompatible (Sin Solución)
objetivo: Reconocer sistemas imposibles donde las rectas son paralelas.
explicacion: |
  Este es el escenario más trágico. Te dan dos ecuaciones que exigen cosas contradictorias (ej: $x+y=5$ y al mismo tiempo $x+y=10$. ¿Cómo dos números van a sumar 5 y 10 a la vez?).

  Si dibujas esto en un gráfico, obtendrás **dos líneas perfectamente paralelas**, como las vías del tren. Tienen la misma inclinación, pero están separadas.
  ¿En qué punto se cruzan las vías del tren? Nunca. Por lo tanto, el sistema **No tiene solución** (Conjunto Vacío).

  Si intentas forzar una respuesta con álgebra, las letras se aniquilarán, pero llegarás a una mentira espantosa como $0 = 5$.
procedimiento: |
  1. Compara las pendientes de las rectas (coeficientes de x e y).
  2. Si las pendientes son idénticas, pero los resultados (términos independientes) son diferentes y no proporcionales, son paralelas.
  3. Concluye que el sistema no tiene solución.
  4. Si resuelves con álgebra, llegarás a un absurdo matemático como $0=8$.
