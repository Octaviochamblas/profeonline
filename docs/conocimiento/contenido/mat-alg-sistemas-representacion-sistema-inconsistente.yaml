semantic_id: 'MAT.ALG.SISTEMAS_REPRESENTACION.SISTEMA_INCONSISTENTE'
titulo: 'Sistema Incompatible (Sin Solución)'
objetivo: 'Reconocer sistemas imposibles donde las rectas son paralelas.'
introduccion: |
  Este es el escenario más trágico. Te dan dos ecuaciones que exigen cosas contradictorias (ej: $x+y=5$ y al mismo tiempo $x+y=10$. ¿Cómo dos números van a sumar 5 y 10 a la vez?).
resumen: |
  Si intentas forzar una respuesta con álgebra, las letras se eliminarán, pero llegarás a una contradicción matemática como $0 = 5$.
explicacion: |
  Si dibujas esto en un gráfico, obtendrás **dos líneas perfectamente paralelas**, como las rectas paralelas. Tienen la misma inclinación, pero están separadas.
  ¿En qué punto se cruzan las rectas paralelas? Nunca. Por lo tanto, el sistema **No tiene solución** (Conjunto Vacío).
procedimiento:
  - 'Paso 1: Compara las pendientes de las rectas (coeficientes de x e y).'
  - 'Paso 2: Si las pendientes son idénticas, pero los resultados (términos independientes) son diferentes y no proporcionales, son paralelas.'
  - 'Paso 3: Concluye que el sistema no tiene solución.'
  - 'Paso 4: Si resuelves con álgebra, llegarás a un absurdo matemático como $0=8$.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
