semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.RESTRICCIONES
titulo: Restricciones de Dominio
objetivo: Identificar los valores prohibidos para la incógnita antes de resolver.
explicacion: |
  Cuando la incógnita $x$ está en el denominador (ej: $\frac{5}{x-2} = 3$), estás jugando con fuego. La matemática tiene una ley inquebrantable: **No se puede dividir por cero**.

  Antes de siquiera intentar resolver la ecuación, debes hacer un chequeo de seguridad: observar todos los denominadores que tengan 'x' y preguntar '¿Qué valor de x haría que esto sea cero?'.

  En $\frac{5}{x-2}$, si $x$ valiera 2, el denominador sería $2-2=0$. ¡Peligro! Debes escribir en piedra: **Restricción: $x \neq 2$**. Si al resolver la ecuación, la respuesta mágica resulta ser 2, tendrás que rechazarla.
procedimiento: |
  1. Toma cada denominador de la ecuación que contenga la incógnita.
  2. Iguala cada denominador a cero y resuelve esa pequeña ecuación.
  3. Los resultados obtenidos conforman tu 'Lista Negra' (Restricciones). La respuesta final no puede ser ninguno de esos valores.
