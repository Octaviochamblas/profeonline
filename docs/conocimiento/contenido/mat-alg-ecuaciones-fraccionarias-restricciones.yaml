semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.RESTRICCIONES
titulo: Restricciones de Dominio
objetivo: Identificar los valores prohibidos para la incógnita antes de resolver.
introduccion: 'Antes de siquiera intentar resolver la ecuación, debes hacer un chequeo de seguridad: observar todos
  los denominadores que tengan ''x'' y preguntar ''¿Qué valor de x haría que esto sea cero?''.'
resumen: 'Cuando la incógnita $x$ está en el denominador (ej: $\frac{5}{x-2} = 3$), estás jugando con fuego. La
  matemática tiene una ley inquebrantable: **No se puede dividir por cero**.'
explicacion: '### Definición formal


  Cuando la incógnita $x$ está en el denominador (ej: $\frac{5}{x-2} = 3$), estás jugando con fuego. La matemática
  tiene una ley inquebrantable: **No se puede dividir por cero**.


  ### Desarrollo didáctico


  Antes de siquiera intentar resolver la ecuación, debes hacer un chequeo de seguridad: observar todos los denominadores
  que tengan ''x'' y preguntar ''¿Qué valor de x haría que esto sea cero?''.


  En $\frac{5}{x-2}$, si $x$ valiera 2, el denominador sería $2-2=0$. Peligro. Debes escribir en piedra: **Restricción:
  $x \neq 2$**. Si al resolver la ecuación, la respuesta adecuado resulta ser 2, tendrás que rechazarla.'
procedimiento:
- Toma cada denominador de la ecuación que contenga la incógnita.
- Iguala cada denominador a cero y resuelve esa pequeña ecuación.
- Los resultados obtenidos conforman tu 'lista de restricciones del dominio' (Restricciones). La respuesta final
  no puede ser ninguno de esos valores.
ejemplos:
- titulo: $\frac{5}{x-2}$ y $2-2=0$
  enunciado: Analiza el caso $\frac{5}{x-2}$ y $2-2=0$ y explica cómo se aplica el criterio estudiado.
  solucion_pasos:
  - 'En $\frac{5}{x-2}$, si $x$ valiera 2, el denominador sería $2-2=0$. Peligro. Debes escribir en piedra: **Restricción:
    $x \neq 2$**. Si al resolver la ecuación, la respuesta adecuado resulta ser 2, tendrás que rechazarla.'
  - Toma cada denominador de la ecuación que contenga la incógnita.
- titulo: $x$ y $\frac{5}{x-2} = 3$
  enunciado: Resuelve o interpreta $x$ y $\frac{5}{x-2} = 3$ usando las condiciones de este recurso.
  solucion_pasos:
  - 'Cuando la incógnita $x$ está en el denominador (ej: $\frac{5}{x-2} = 3$), estás jugando con fuego. La matemática
    tiene una ley inquebrantable: **No se puede dividir por cero**.'
  - Iguala cada denominador a cero y resuelve esa pequeña ecuación.
- titulo: 'Respecto de «Identificación de valores que indefinen la ecuación fraccionaria»: ¿Es correcta'
  enunciado: 'Respecto de «Identificación de valores que indefinen la ecuación fraccionaria»: ¿Es correcta esta
    caracterización? «Cuando la incógnita $x$ está en el denominador (ej: $\frac{5}{x-2} = 3$), estás jugando con
    fuego»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Cuando la incógnita $x$ está en el denominador (ej: $\frac{5}{x-2}
    = 3$), estás jugando con fuego.'
- titulo: 'Respecto de «Identificación de valores que indefinen la ecuación fraccionaria»: ¿Es válida e'
  enunciado: 'Respecto de «Identificación de valores que indefinen la ecuación fraccionaria»: ¿Es válida esta afirmación?
    «Puede omitirse esta condición sin cambiar el resultado: «Toma cada denominador de la ecuación que contenga
    la incógnita»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Cuando la incógnita $x$ está en el denominador (ej: $\frac{5}{x-2}
    = 3$), estás jugando con fuego.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Toma cada denominador de la ecuación que contenga la
  incógnita».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Iguala cada denominador a cero y resuelve esa
  pequeña ecuación».'
- 'La definición sigue cumpliéndose aunque no se considere que cuando la incógnita $x$ está en el denominador (ej:
  $\frac{5}{x-2} = 3$), estás jugando con fuego. La matemática tiene una ley inquebrantable: **No se puede dividir
  por cero**.'
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Toma cada denominador de la ecuación
  que contenga la incógnita».
- La comprobación del resultado vuelve innecesaria la condición «Iguala cada denominador a cero y resuelve esa pequeña
  ecuación».
