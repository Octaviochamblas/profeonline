semantic_id: MAT.GEO.ANGULOS_RELACIONES_POSICION.CONSECUTIVOS
titulo: Ángulos consecutivos con vértice y lado común
objetivo: 'Identificar un par de ángulos consecutivos en un dibujo y comprobar que compartir vértice no
  basta: también debe existir exactamente un lado común.'
introduccion: En un abanico abierto pueden aparecer varias aberturas que nacen del mismo punto. Para decidir
  si son consecutivas hay que mirar además si comparten un rayo.
resumen: 'Dos ángulos son consecutivos cuando comparten vértice y un lado. Como idea de control, compartir
  vértice no basta: también debe existir exactamente un lado común.'
explicacion: 'Dos ángulos son consecutivos cuando comparten vértice y un lado.


  Cuando se analiza “si \(\angle AOB\) y \(\angle BOC\) tienen vértice \(O\) y el lado \(OB\) en común,
  son consecutivos” conviene evitar la memoria mecánica. El control decisivo es comprobar que compartir
  vértice no basta: también debe existir exactamente un lado común.'
procedimiento:
- 'Paso 1: Verifica que ambos ángulos tengan el mismo vértice.'
- 'Paso 2: Busca si comparten uno de sus lados y distingue ese rayo común.'
- 'Paso 3: Concluye si son consecutivos y descarta pares que solo compartan el vértice.'
ejemplos:
- titulo: Aplicación directa — Ángulos consecutivos
  enunciado: Si \(\angle AOB\) y \(\angle BOC\) tienen vértice \(O\) y el lado \(OB\) en común, son consecutivos.
  solucion_pasos:
  - Verifica que ambos ángulos tengan el mismo vértice.
  - Busca si comparten uno de sus lados y distingue ese rayo común.
  - Concluye si son consecutivos y descarta pares que solo compartan el vértice.
- titulo: Corrección de una respuesta — Ángulos consecutivos
  enunciado: En la situación “si \(\angle AOB\) y \(\angle BOC\) tienen vértice \(O\) y el lado \(OB\)
    en común, son consecutivos”, un compañero llega a la respuesta correcta pero no explica el paso decisivo.
    Reconstruye la justificación completa.
  solucion_pasos:
  - 'Parte de la definición: dos ángulos son consecutivos cuando comparten vértice y un lado.'
  - Busca si comparten uno de sus lados y distingue ese rayo común.
  - Concluye si son consecutivos y descarta pares que solo compartan el vértice.
- titulo: ¿La interpretación del dibujo es válida? — Ángulos consecutivos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: dos ángulos son consecutivos cuando comparten
    vértice y un lado.'
  - 'En el caso “si \(\angle AOB\) y \(\angle BOC\) tienen vértice \(O\) y el lado \(OB\) en común, son
    consecutivos” se observa que compartir vértice no basta: también debe existir exactamente un lado
    común.'
  - Concluye si son consecutivos y descarta pares que solo compartan el vértice.
- titulo: ¿Se puede cerrar sin el control final? — Ángulos consecutivos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulos consecutivos con vértice y lado
    común.
  - Después del paso “Verifica que ambos ángulos tengan el mismo vértice.” todavía hace falta revisar
    “Busca si comparten uno de sus lados y distingue ese rayo común.”.
  - El cierre correcto exige “Concluye si son consecutivos y descarta pares que solo compartan el vértice.”.
errores_frecuentes:
- Ángulos consecutivos significa tener solo el mismo vértice, aunque no compartan ningún lado.
- Para resolver ángulos consecutivos, basta con el paso “Verifica que ambos ángulos tengan el mismo vértice.”
  y no hace falta revisar “Busca si comparten uno de sus lados y distingue ese rayo común.”.
- 'Si el dibujo parece claro, se puede ignorar que compartir vértice no basta: también debe existir exactamente
  un lado común.'
- Dos configuraciones distintas representan ángulos consecutivos solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si son consecutivos y descarta pares
  que solo compartan el vértice.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
estado: publicado
