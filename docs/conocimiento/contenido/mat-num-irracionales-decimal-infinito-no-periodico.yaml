semantic_id: MAT.NUM.IRRACIONALES.DECIMAL_INFINITO_NO_PERIODICO
objetivo: Distinguir un decimal irracional de uno periódico.
introduccion: Dos decimales pueden continuar para siempre y pertenecer a conjuntos
  distintos. La pregunta decisiva no es dónde terminan, sino si sus cifras entran
  en un ciclo repetitivo.
resumen: 'La expansión decimal de un irracional es infinita y no repite indefinidamente
  ningún bloque fijo. Ser infinito no basta: \(0.333\ldots\) es periódico y, por tanto,
  racional.'
explicacion: |-
  La expansión decimal de un irracional es infinita y no repite indefinidamente ningún bloque fijo.

  En el caso “\(0.101001000100001\ldots\) intercala cada vez más ceros y no forma un período” esta idea se hace visible: ser infinito no basta: \(0.333\ldots\) es periódico y, por tanto, racional
procedimiento:
- 'Paso 1: Observa una porción suficientemente larga de la expansión decimal.'
- 'Paso 2: Busca un bloque fijo que se repita desde algún punto en adelante.'
- 'Paso 3: Si la escritura es infinita y no periódica, concluye que representa un
  irracional.'
ejemplos:
- titulo: Aplicación razonada — Decimal infinito no periódico como representación
    irracional
  enunciado: \(0.101001000100001\ldots\) intercala cada vez más ceros y no forma un
    período.
  solucion_pasos:
  - Observa una porción suficientemente larga de la expansión decimal.
  - Busca un bloque fijo que se repita desde algún punto en adelante.
  - Si la escritura es infinita y no periódica, concluye que representa un irracional.
- titulo: Revisión de una solución — Decimal infinito no periódico como representación
    irracional
  enunciado: 'Una solución aplica “Busca un bloque fijo que se repita desde algún
    punto en adelante.”, pero termina sin comprobar que ser infinito no basta: \(0.333\ldots\)
    es periódico y, por tanto, racional. Determina qué falta justificar.'
  solucion_pasos:
  - 'Vuelve a la condición que define decimal infinito no periódico como representación
    irracional: la expansión decimal de un irracional es infinita y no repite indefinidamente
    ningún bloque fijo.'
  - Observa una porción suficientemente larga de la expansión decimal.
  - 'Completa la revisión con este control: Si la escritura es infinita y no periódica,
    concluye que representa un irracional.'
- titulo: '¿Se cumple que ser infinito no basta: \(0.333\ldots\) es periódico y, por
    tanto, racional? — Decimal infinito no periódico como representación irracional'
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la expansión decimal de un irracional
    es infinita y no repite indefinidamente ningún bloque fijo.
  - El caso “\(0.101001000100001\ldots\) intercala cada vez más ceros y no forma un
    período” satisface esa condición.
  - Si la escritura es infinita y no periódica, concluye que representa un irracional.
- titulo: ¿Es válido omitir el paso “Observa una porción suficientemente larga de
    la expansión decimal”? — Decimal infinito no periódico como representación irracional
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de decimal infinito no periódico
    como representación irracional.
  - 'Omitirlo puede volver inválida la acción siguiente: Busca un bloque fijo que
    se repita desde algún punto en adelante.'
  - 'La solución debe terminar de este modo: Si la escritura es infinita y no periódica,
    concluye que representa un irracional.'
errores_frecuentes:
- 'Confundir decimal infinito no periódico como representación irracional con otro
  concepto y omitir este inicio: Observa una porción suficientemente larga de la expansión
  decimal.'
- Aplicar mecánicamente “Busca un bloque fijo que se repita desde algún punto en adelante.”
  sin revisar las condiciones de la definición.
- Tomar “\(0.101001000100001\ldots\) intercala cada vez más ceros y no forma un período”
  como una igualdad aislada, sin explicar por qué es válida.
- 'Aceptar una respuesta que contradice la idea clave “ser infinito no basta: \(0.333\ldots\)
  es periódico y, por tanto, racional”.'
- 'Terminar el desarrollo sin realizar este control: Si la escritura es infinita y
  no periódica, concluye que representa un irracional.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
