semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.REFLEXION_EJE_X
titulo: Reflexión respecto al eje $x$ en funciones trigonométricas
objetivo: Reconocer que un coeficiente $a<0$ en $f(x)=a\sin(x)$ o $f(x)=a\cos(x)$ refleja la curva respecto al
  eje $x$.
introduccion: Igual que en otras familias de funciones, el signo del coeficiente principal determina si la curva
  se invierte respecto al eje horizontal.
resumen: Si $a<0$ en $f(x)=a\sin(x)$ o $f(x)=a\cos(x)$, la gráfica es la **reflexión respecto al eje $x$** de
  la curva con $|a|$.
explicacion: '### Definición formal


  Para $f(x)=a\cdot g(x)$ con $a<0$, se cumple $f(x)=-|a|\cdot g(x)$, lo que invierte el signo de cada valor de
  $g(x)$. Geométricamente, esto refleja la gráfica respecto al eje $x$: donde $g$ sube, $f$ baja, y viceversa.


  ### Desarrollo didáctico


  $f(x)=-\sin(x)$ tiene su primer mínimo donde $\sin(x)$ tiene su máximo (en $x=\pi/2$), y su primer máximo
  donde $\sin(x)$ tiene su mínimo (en $x=3\pi/2$).'
procedimiento:
- 'Paso 1: Identifica el signo del coeficiente $a$.'
- 'Paso 2: Si $a<0$, reconoce que la curva se refleja respecto al eje $x$.'
- 'Paso 3: Intercambia mentalmente las posiciones de máximos y mínimos respecto a la función sin reflejar.'
ejemplos:
- titulo: Identificación de una reflexión en el seno
  enunciado: '¿Es $f(x)=-3\sin(x)$ una reflexión de $g(x)=3\sin(x)$?'
  solucion_pasos:
  - Se compara: $f(x)=-g(x)$.
  - Sí, es exactamente su reflexión respecto al eje $x$.
- titulo: Ubicación del máximo tras una reflexión
  enunciado: '¿Dónde está el máximo de $f(x)=-\cos(x)$?'
  solucion_pasos:
  - El mínimo de $\cos(x)$ está en $x=\pi$.
  - Al reflejar, el máximo de $f(x)=-\cos(x)$ está en $x=\pi$.
- titulo: ¿La reflexión respecto al eje $x$ cambia el periodo de la función?
  enunciado: ¿Reflejar una función trigonométrica respecto al eje $x$ cambia su periodo?
  respuesta: 'No'
  solucion_pasos:
  - El periodo depende del parámetro $b$, no del signo de $a$.
- titulo: ¿La reflexión respecto al eje $x$ cambia la amplitud de la función?
  enunciado: ¿Reflejar una función trigonométrica respecto al eje $x$ cambia su amplitud?
  respuesta: 'No'
  solucion_pasos:
  - La amplitud es $|a|$, que no cambia al invertir el signo de $a$.
errores_frecuentes:
- Confundir la reflexión respecto al eje $x$ con un desplazamiento horizontal.
- Suponer que la reflexión cambia el periodo o la amplitud.
- No intercambiar correctamente las posiciones de máximos y mínimos tras la reflexión.
- Confundir esta reflexión con la simetría par o impar propia de la función.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
