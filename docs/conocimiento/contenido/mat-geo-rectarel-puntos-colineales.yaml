semantic_id: MAT.GEO.RECTA_RELACIONES.PUNTOS_COLINEALES
titulo: Determinación de la colinealidad de tres puntos en el plano
objetivo: Determinar si tres puntos del plano son colineales (pertenecen a una misma recta), verificando
  que la pendiente entre cada par de puntos sea la misma.
introduccion: Tres puntos son colineales si, al unirlos, forman una única línea recta; esto se puede verificar
  comparando las pendientes entre distintos pares de esos puntos.
resumen: Tres puntos $A$, $B$ y $C$ son colineales si la pendiente entre $A$ y $B$ es igual a la pendiente
  entre $B$ y $C$ (y también igual a la pendiente entre $A$ y $C$).
explicacion: '![Colinealidad de tres puntos](/static/img/geometria/analitica/rectarel-puntos-colineales.svg)


  ### Definición formal


  Sean $A(x_1,y_1)$, $B(x_2,y_2)$ y $C(x_3,y_3)$. Son colineales si $\dfrac{y_2-y_1}{x_2-x_1}=\dfrac{y_3-y_2}{x_3-x_2}$.


  ### Desarrollo didáctico


  Para los puntos $A(-2,-2)$, $B(1,1)$ y $C(3,3)$: la pendiente entre $A$ y $B$ es $\dfrac{1-(-2)}{1-(-2)}=1$,
  y entre $B$ y $C$ es $\dfrac{3-1}{3-1}=1$. Como ambas pendientes son iguales, los tres puntos son colineales.'
procedimiento:
- 'Paso 1: Calcula la pendiente entre el primer y el segundo punto.'
- 'Paso 2: Calcula la pendiente entre el segundo y el tercer punto.'
- 'Paso 3: Si ambas pendientes son iguales, los tres puntos son colineales.'
ejemplos:
- titulo: Verificar la colinealidad de A(-2,-2), B(1,1) y C(3,3)
  enunciado: Tres puntos dados.
  solucion_pasos:
  - m(AB)=1, m(BC)=1. Como son iguales, los puntos son colineales.
- titulo: Determinar que tres puntos NO son colineales
  enunciado: A(0,0), B(2,4), C(5,6).
  solucion_pasos:
  - m(AB)=4/2=2, m(BC)=(6-4)/(5-2)=2/3. Como las pendientes son distintas, los puntos no son colineales.
- titulo: ¿Basta con comparar dos pares de pendientes para verificar colinealidad de tres puntos?
  respuesta: Sí
  solucion_pasos:
  - Sí, si m(AB)=m(BC), automáticamente también m(AC) será igual a ambas.
- titulo: ¿Tres puntos elegidos al azar suelen ser colineales?
  respuesta: 'No'
  solucion_pasos:
  - No, en general tres puntos arbitrarios no son colineales; la colinealidad es una condición especial.
errores_frecuentes:
- Comparar solo las coordenadas de los puntos, sin calcular realmente las pendientes.
- Cometer errores de signo al calcular alguna de las pendientes.
- Concluir colinealidad con pendientes que son solo aproximadamente iguales, sin verificar la igualdad
  exacta.
fuente: 'Elaboración propia (referencia: Carreño 168).'
estado: publicado
