semantic_id: MAT.ALG.FUNC_CUADR_FORMAS.EXTRACCION_CEROS_FACTORIZADA
titulo: Extracción de los ceros de la función desde la forma factorizada
objetivo: Extraer directamente los ceros de una función cuadrática expresada en forma factorizada.
introduccion: Del mismo modo que el vértice se lee directamente en la forma canónica, los ceros de la función
  se leen directamente en la forma factorizada, sin resolver ninguna ecuación.
resumen: Si $f(x)=a(x-r_1)(x-r_2)$, los ceros de la función son directamente $x=r_1$ y $x=r_2$, sin necesidad
  de aplicar la fórmula general ni factorizar de nuevo.
explicacion: '### Definición formal


  Dada $f(x)=a(x-r_1)(x-r_2)$, los ceros de la función son los valores de $x$ que hacen $f(x)=0$. Por la propiedad
  del producto nulo, $f(x)=0$ exactamente cuando $x=r_1$ o $x=r_2$.


  ### Desarrollo didáctico


  Extraer los ceros es un proceso de lectura directa: se identifica cada $r_i$ (con su signo correcto) sin necesidad
  de resolver ninguna ecuación adicional.


  En $f(x)=-(x-4)(x+9)$: los ceros son $x=4$ y $x=-9$.'
procedimiento:
- 'Paso 1: Verifica que la función esté en forma factorizada $a(x-r_1)(x-r_2)$.'
- 'Paso 2: Identifica $r_1$, reescribiendo el binomio si es necesario para leer su signo correctamente.'
- 'Paso 3: Identifica $r_2$ de la misma manera.'
- 'Paso 4: Los ceros de la función son $x=r_1$ y $x=r_2$.'
ejemplos:
- titulo: Extracción de ceros positivos
  enunciado: 'Determina los ceros de $f(x)=4(x-2)(x-9)$.'
  solucion_pasos:
  - '$r_1=2$, $r_2=9$.'
  - Los ceros son $x=2$ y $x=9$.
- titulo: Extracción de ceros con signos mixtos
  enunciado: 'Determina los ceros de $f(x)=-3(x+5)(x-1)$.'
  solucion_pasos:
  - 'Reescribiendo $(x+5)$ como $(x-(-5))$: un cero es $x=-5$.'
  - El otro cero es $x=1$.
- titulo: ¿Se necesita resolver una ecuación adicional para hallar los ceros desde la forma factorizada?
  enunciado: ¿Se necesita resolver una ecuación adicional para hallar los ceros desde la forma factorizada?
  respuesta: 'No'
  solucion_pasos:
  - Los ceros se leen directamente como $r_1$ y $r_2$, aplicando la propiedad del producto nulo de forma implícita.
- titulo: ¿El coeficiente $a$ afecta el valor de los ceros de la función?
  enunciado: ¿El coeficiente $a$ afecta el valor de los ceros de la función?
  respuesta: 'No'
  solucion_pasos:
  - El coeficiente $a$ no puede ser cero, por lo que los ceros dependen únicamente de $r_1$ y $r_2$.
errores_frecuentes:
- Leer los ceros con el signo incorrecto al no reescribir el binomio en la forma $(x-r)$.
- Confundir los ceros con las coordenadas del vértice.
- Aplicar innecesariamente la fórmula general cuando la función ya está en forma factorizada.
- Olvidar que un binomio con signo positivo, como $(x+5)$, corresponde a un cero negativo.
