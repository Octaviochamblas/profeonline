semantic_id: MAT.ALG.VALORIZACION.CONCEPTO_SUSTITUCION
objetivo: Entender la valorización como el proceso de sustitución de variables simbólicas por valores numéricos
  específicos.
introduccion: Hasta ahora, las letras eran fantasmas. Sabíamos que escondían un número, pero no cuál. Ha llegado
  el momento de arrancarles la máscara. En la valorización, por fin sabremos el valor real de la expresión.
resumen: La **Valorización o Sustitución** es el proceso de **reemplazar cada variable (letra) de una expresión
  algebraica por un número específico dado**, y luego resolver las operaciones aritméticas resultantes respetando
  la jerarquía.
explicacion: "### Definición formal\n\nAl sustituir todas las variables por sus valores concretos, eliminamos el\
  \ componente simbólico y pasamos a aritmética pura.\n\n### Desarrollo didáctico\n\nImagina que tienes la expresión\
  \ $3x + 5$. Esto es un 'molde' algebraico.\nSi te dicen 'Valora la expresión para $x = 2$', tu trabajo es quirúrgico:\n\
  1. Borras la $x$.\n2. Pones un $(2)$ en su lugar.\n3. Calculas: $3(2) + 5 = 6 + 5 = 11$.\n\nEl valor numérico\
  \ de esa expresión, cuando la variable vale 2, es 11. \nRegla de oro de la sustitución: **Cada vez que reemplaces\
  \ una letra por un número, pon ese número entre paréntesis**. Esto te salvará la vida cuando haya signos negativos\
  \ o exponentes."
procedimiento:
- 'Paso 1: Copia la expresión algebraica original.'
- 'Paso 2: Borra mentalmente la letra que vas a sustituir y deja un paréntesis vacío en su lugar (ej. si es 5x,
  deja 5( )).'
- 'Paso 3: Introduce el valor numérico proporcionado dentro de ese paréntesis.'
- 'Paso 4: Resuelve las operaciones aritméticas usando PAPOMUDAS (Paréntesis, Potencias, Multiplicación/División,
  Suma/Resta).'
ejemplos:
- titulo: El molde en acción
  enunciado: Valoriza la expresión 4y - 7, si sabemos que y = 5.
  solucion_pasos:
  - 'Expresión: 4y - 7.'
  - 'Reemplazamos ''y'' por ''(5)'': 4(5) - 7.'
  - 'Multiplicamos 4 por 5: 20 - 7.'
  - 'Restamos: 13. El valor numérico es 13.'
- titulo: Un sistema médico calcula la dosis de medicamento con el polinomio $D(p) = 5p + 10$, donde $
  enunciado: 'Un sistema médico calcula la dosis de medicamento con el polinomio $D(p) = 5p + 10$, donde $p$ es
    el peso en kilos. Si ingresa un niño de $20$ kilos, ¿cuál es la dosis exacta que la máquina administrará tras
    valorizar la expresión? (v1)


    Opciones: A) $110$ · B) $35$ · C) $100$ · D) $520$'
  solucion_pasos:
  - 'Se sustituye $p=20$ en la fórmula: $5(20) + 10$. Multiplicamos primero: $100 + 10$. Sumamos: $110$.'
- titulo: 'Respecto de «Concepto de valorización por sustitución numérica»: ¿Describe adecuadamente el'
  enunciado: 'Respecto de «Concepto de valorización por sustitución numérica»: ¿Describe adecuadamente el concepto
    esta frase? «La **Valorización o Sustitución** es el proceso de **reemplazar cada variable (letra) de una expresión
    algebraica por un número específico dado**, y luego resolver las operaciones aritméticas resultantes respetando
    la jerarquía»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Valorización o Sustitución** es el proceso de **reemplazar
    cada variable (letra) de una expresión algebraica por un número específico dado**, y luego resolver las operaciones
    aritméticas resultantes respetando la jerarquía.'
- titulo: 'Respecto de «Concepto de valorización por sustitución numérica»: ¿Se puede aceptar esta afir'
  enunciado: 'Respecto de «Concepto de valorización por sustitución numérica»: ¿Se puede aceptar esta afirmación?
    «Olvidar que $4x$ es una multiplicación. Al reemplazar $x=5$, los estudiantes a veces escriben el número $45$
    en lugar de multiplicar $4 \cdot 5$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Valorización o Sustitución** es el proceso de **reemplazar
    cada variable (letra) de una expresión algebraica por un número específico dado**, y luego resolver las operaciones
    aritméticas resultantes respetando la jerarquía.'
errores_frecuentes:
- Olvidar que $4x$ es una multiplicación. Al reemplazar $x=5$, los estudiantes a veces escriben el número $45$ en
  lugar de multiplicar $4 \cdot 5$.
- No respetar la jerarquía de operaciones después de sustituir (ej. sumar antes de multiplicar).
- La expresión se convierte en una ecuación con infinitas soluciones.
- Las variables cambian de minúsculas a mayúsculas.
- Para «¿Qué transformación estructural ocurre en una expresión algebraica una vez que se realiza con éxito el proceso
  de 'valorización' para todas sus variables? (v1)», la respuesta correcta es El grado del polinomio aumenta en
  una unidad.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Concepto de valorización por sustitución numérica
