semantic_id: MAT.GEO.RECTA_ECUACIONES.FORMA_SEGMENTARIA
titulo: Reconocimiento de la ecuación segmentaria de la recta
objetivo: Reconocer la ecuación segmentaria (o canónica) de una recta, de la forma x/a+y/b=1, que muestra
  directamente sus dos interceptos con los ejes.
introduccion: Cuando interesa mostrar directamente dónde una recta corta ambos ejes coordenados, conviene
  expresarla en su forma segmentaria en vez de la principal o general.
resumen: La ecuación segmentaria de una recta tiene la forma $\dfrac{x}{a}+\dfrac{y}{b}=1$, donde $a$
  es el intercepto con el eje x y $b$ es el intercepto con el eje y.
explicacion: '![Ecuación segmentaria de la recta](/static/img/geometria/analitica/rectaeq-forma-segmentaria.svg)


  ### Definición formal


  Una recta que corta al eje x en $(a,0)$ y al eje y en $(0,b)$ (con $a,b\neq0$) se escribe en forma segmentaria
  como $\dfrac{x}{a}+\dfrac{y}{b}=1$.


  ### Desarrollo didáctico


  En la figura, la recta corta el eje x en $(4,0)$ y el eje y en $(0,3)$, por lo que su ecuación segmentaria
  es $\dfrac{x}{4}+\dfrac{y}{3}=1$.'
procedimiento:
- 'Paso 1: Identifica los interceptos de la recta con el eje x (punto (a,0)) y con el eje y (punto (0,b)).'
- 'Paso 2: Sustituye esos valores de a y b en la forma x/a+y/b=1.'
- 'Paso 3: Si es necesario, convierte esta ecuación a forma principal o general.'
ejemplos:
- titulo: Escribir la ecuación segmentaria con interceptos (4,0) y (0,3)
  enunciado: a=4, b=3.
  solucion_pasos:
  - x/4+y/3=1.
- titulo: Escribir la ecuación segmentaria con interceptos (-2,0) y (0,5)
  enunciado: a=-2, b=5.
  solucion_pasos:
  - x/(-2)+y/5=1.
- titulo: ¿Esta forma requiere que la recta corte ambos ejes coordenados?
  respuesta: Sí
  solucion_pasos:
  - Sí, si la recta es paralela a algún eje (o pasa por el origen), no tiene forma segmentaria.
- titulo: ¿Una recta que pasa por el origen tiene forma segmentaria?
  respuesta: 'No'
  solucion_pasos:
  - No, ya que en ese caso a=0 o b=0, lo cual no está permitido en esta forma (serían divisiones por cero).
errores_frecuentes:
- Confundir cuál valor corresponde a a (intercepto con x) y cuál a b (intercepto con y).
- Intentar aplicar esta forma a una recta que pasa por el origen o es paralela a un eje.
- Olvidar que el lado derecho de la ecuación debe ser igual a 1, no a otro valor.
fuente: 'Elaboración propia (referencia: Carreño 167).'
estado: publicado
