semantic_id: MAT.GEO.ANGULOS_RELACIONES_POSICION.RECTAS_PERPENDICULARES_ANGULOS_RECTOS
titulo: Formación de cuatro ángulos rectos en rectas perpendiculares
objetivo: Deducir las cuatro medidas rectas en un cruce perpendicular y comprobar que basta reconocer
  un ángulo recto en el cruce para deducir los otros tres.
introduccion: Cuando dos rectas se cruzan a escuadra, la regularidad del cruce hace que no aparezcan medidas
  distintas entre sus cuatro regiones. Este recurso se centra en formación de cuatro ángulos rectos en
  rectas perpendiculares y en cómo reconocerlo con un criterio geométrico claro.
resumen: Si dos rectas son perpendiculares, las cuatro regiones angulares del cruce miden 90°. Como idea
  de control, basta reconocer un ángulo recto en el cruce para deducir los otros tres.
explicacion: 'Si dos rectas son perpendiculares, las cuatro regiones angulares del cruce miden 90°.


  En el caso “al saberse que un cruce es perpendicular, cada uno de los cuatro ángulos vale 90°” esta
  idea se vuelve visible y permite comprobar que basta reconocer un ángulo recto en el cruce para deducir
  los otros tres.'
procedimiento:
- 'Paso 1: Identifica que el cruce corresponde a dos rectas perpendiculares.'
- 'Paso 2: Usa la presencia de un ángulo recto para trasladar esa medida a las otras tres regiones.'
- 'Paso 3: Verifica que las cuatro aberturas sumen 360° alrededor del punto.'
ejemplos:
- titulo: Caso guiado — Cuatro rectos en una perpendicular
  enunciado: Al saberse que un cruce es perpendicular, cada uno de los cuatro ángulos vale 90°.
  solucion_pasos:
  - Identifica que el cruce corresponde a dos rectas perpendiculares.
  - Usa la presencia de un ángulo recto para trasladar esa medida a las otras tres regiones.
  - Verifica que las cuatro aberturas sumen 360° alrededor del punto.
- titulo: Corrección de una respuesta — Cuatro rectos en una perpendicular
  enunciado: 'Un estudiante usa la idea “basta reconocer un ángulo recto en el cruce para deducir los
    otros tres” al analizar este caso: al saberse que un cruce es perpendicular, cada uno de los cuatro
    ángulos vale 90°. Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: si dos rectas son perpendiculares, las cuatro regiones angulares del cruce
    miden 90°.'
  - Usa la presencia de un ángulo recto para trasladar esa medida a las otras tres regiones.
  - Verifica que las cuatro aberturas sumen 360° alrededor del punto.
- titulo: ¿La situación respeta la idea clave del recurso? — Cuatro rectos en una perpendicular
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: si dos rectas son perpendiculares, las cuatro
    regiones angulares del cruce miden 90°.'
  - En el caso “al saberse que un cruce es perpendicular, cada uno de los cuatro ángulos vale 90°” se
    observa que basta reconocer un ángulo recto en el cruce para deducir los otros tres.
  - Verifica que las cuatro aberturas sumen 360° alrededor del punto.
- titulo: ¿Se puede omitir el paso intermedio? — Cuatro rectos en una perpendicular
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de formación de cuatro ángulos rectos en
    rectas perpendiculares.
  - Después del paso “Identifica que el cruce corresponde a dos rectas perpendiculares.” todavía hace
    falta revisar “Usa la presencia de un ángulo recto para trasladar esa medida a las otras tres regiones.”.
  - El cierre correcto exige “Verifica que las cuatro aberturas sumen 360° alrededor del punto.”.
errores_frecuentes:
- Cuatro rectos en una perpendicular significa solo el ángulo marcado con un cuadrado mide 90°, mientras
  los demás pueden variar.
- Para resolver cuatro rectos en una perpendicular, basta con el paso “Identifica que el cruce corresponde
  a dos rectas perpendiculares.” y no hace falta revisar “Usa la presencia de un ángulo recto para trasladar
  esa medida a las otras tres regiones.”.
- Si el dibujo parece claro, se puede ignorar que basta reconocer un ángulo recto en el cruce para deducir
  los otros tres.
- Dos configuraciones distintas representan cuatro rectos en una perpendicular solo porque contienen la
  palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Verifica que las cuatro aberturas sumen 360°
  alrededor del punto.”.
