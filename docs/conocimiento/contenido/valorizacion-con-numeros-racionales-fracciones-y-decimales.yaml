semantic_id: MAT.ALG.VALORIZACION.RACIONALES
titulo: Valorización con números racionales (fracciones y decimales)
objetivo: Valorizar expresiones fraccionarias sustituyendo el numerador y el denominador.
introduccion: 'Las fracciones en álgebra no son más que divisiones pospuestas. Valorizar una expresión
  racional es como calcular el peso de dos trenes distintos: uno arriba (numerador) y otro abajo (denominador),
  y luego ver si podemos simplificarlos.'
resumen: Al valorizar **Expresiones Racionales** (fracciones), se debe tratar al **numerador y al denominador
  como polinomios independientes**. Se calcula el valor numérico de arriba, el valor de abajo, y finalmente
  se divide o simplifica la fracción resultante.
explicacion: '### Definición formal


  El denominador representa ''entre cuántas partes se divide algo''. No se puede dividir entre cero partes.


  ### Desarrollo didáctico


  Toma la expresión: $\frac{2x + 4}{x - 1}$, para $x=3$.

  Regla del bloque: Jamás intentes cruzar operaciones entre el piso de arriba y el de abajo antes de que
  sean un solo número.

  - Arriba: $2(3) + 4 = 6 + 4 = 10$.

  - Abajo: $(3) - 1 = 2$.

  - Nueva fracción: $\frac{10}{2}$.

  - División final: $5$.


  *Advertencia crítica:* Si al evaluar el denominador obtienes un $0$ (ej. en $\frac{5}{x-2}$ con $x=2$,
  quedaría $\frac{5}{0}$), la expresión es **indeterminada** o ''no existe'' en los números reales. El
  cero en el divisor es el apocalipsis matemático.'
procedimiento:
- 'Paso 1: Valoriza y calcula completamente el numerador como si fuera un ejercicio solitario.'
- 'Paso 2: Valoriza y calcula el denominador de igual manera.'
- 'Paso 3: Construye la fracción con ambos resultados finales (ej. 15 / 3).'
- 'Paso 4: Divide si es un resultado entero, o simplifica la fracción si no lo es.'
- 'Paso 5: Si el denominador dio cero, declara que la expresión está indeterminada.'
ejemplos:
- titulo: Pisos independientes
  enunciado: Valora (x^2 - 1) / (x + 1) para x = 4.
  solucion_pasos:
  - 'Numerador: (4)^2 - 1 = 16 - 1 = 15.'
  - 'Denominador: (4) + 1 = 5.'
  - 'Fracción final: 15 / 5.'
  - 'División: 3.'
- titulo: La ley de gravitación indica que la fuerza es $F = \frac{G m_1 m_2}{r^2}$. Si en un modelo s
  enunciado: 'La ley de gravitación indica que la fuerza es $F = \frac{G m_1 m_2}{r^2}$. Si en un modelo
    simplificado asignamos $G=10$, las masas $m_1=5$ y $m_2=2$, y la distancia es $r=5$, ¿cuál es el valor
    de la fuerza $F$ en este escenario estático? (v1)


    Opciones: A) $4$ · B) $20$ · C) $100$ · D) $10$'
  solucion_pasos:
  - 'Numerador: $10 \cdot 5 \cdot 2 = 100$. Denominador: $5^2 = 25$. Fracción: $\frac{100}{25}$. Dividimos:
    $4$.'
- titulo: 'Respecto de «Valorización con números racionales (fracciones y decimales)»: ¿La siguiente fo'
  enunciado: 'Respecto de «Valorización con números racionales (fracciones y decimales)»: ¿La siguiente
    formulación es correcta? «Al valorizar **Expresiones Racionales** (fracciones), se debe tratar al
    **numerador y al denominador como polinomios independientes**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al valorizar **Expresiones Racionales** (fracciones),
    se debe tratar al **numerador y al denominador como polinomios independientes**.'
- titulo: 'Respecto de «Valorización con números racionales (fracciones y decimales)»: ¿La siguiente co'
  enunciado: 'Respecto de «Valorización con números racionales (fracciones y decimales)»: ¿La siguiente
    conclusión es correcta? «Simplificar variables o números entre el numerador y denominador ANTES de
    terminar las sumas/restas (ej. ''cancelar'' una $x$ de arriba con una $x$ de abajo si están sumando)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al valorizar **Expresiones Racionales** (fracciones),
    se debe tratar al **numerador y al denominador como polinomios independientes**.'
errores_frecuentes:
- Simplificar variables o números entre el numerador y denominador ANTES de terminar las sumas/restas
  (ej. 'cancelar' una $x$ de arriba con una $x$ de abajo si están sumando).
- No notar que un denominador igual a 0 invalida todo el problema.
- Para «Al valorar una expresión algebraica racional (fraccionaria), ¿qué condición matemática sobre el
  resultado del denominador haría que el valor de la expresión se considere 'indeterminado' o 'inexistente'?
  (v1)», la respuesta correcta es Que el resultado del numerador sea igual a $0$.
- Que el denominador resulte en un número negativo.
- Que el denominador sea una fracción irreducible.
fuente: Álgebra de Baldor.
