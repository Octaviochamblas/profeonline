semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.SEMEJANZA_TRIANGULOS_CONCEPTO
titulo: Concepto de semejanza de triángulos
objetivo: 'Comprender qué significa que dos triángulos sean semejantes: tener sus ángulos correspondientes
  iguales y sus lados correspondientes proporcionales.'
introduccion: Aplicando el concepto general de semejanza al caso particular de los triángulos, se obtiene
  una relación con condiciones muy precisas y fáciles de verificar.
resumen: Dos triángulos son semejantes si sus ángulos correspondientes son iguales y sus lados correspondientes
  son proporcionales.
explicacion: '![Semejanza de triángulos](/static/img/geometria/congruencia-semejanza/semejanza-triangulos-concepto.svg)


  ### Definición formal


  Si $\triangle ABC$ y $\triangle A''B''C''$ cumplen $\angle A=\angle A''$, $\angle B=\angle B''$, $\angle
  C=\angle C''$, y $\frac{AB}{A''B''}=\frac{BC}{B''C''}=\frac{CA}{C''A''}$, entonces $\triangle ABC\sim\triangle
  A''B''C''$.


  ### Desarrollo didáctico


  En triángulos, basta con verificar solo una parte de estas condiciones para garantizar la semejanza
  completa (como se verá con los criterios de semejanza más adelante): por ejemplo, si los tres ángulos
  son iguales, automáticamente los lados resultan proporcionales.'
procedimiento:
- 'Paso 1: Identifica los ángulos correspondientes entre ambos triángulos.'
- 'Paso 2: Verifica si esos ángulos son iguales entre sí.'
- 'Paso 3: Verifica que los lados correspondientes mantengan la misma razón de proporcionalidad.'
ejemplos:
- titulo: Verificar semejanza con ángulos iguales
  enunciado: 'Dos triángulos tienen los mismos tres ángulos: 50°, 60° y 70°.'
  solucion_pasos:
  - Son semejantes, ya que sus ángulos correspondientes son iguales.
- titulo: Verificar semejanza con lados proporcionales
  enunciado: Un triángulo tiene lados 3, 4, 5; otro tiene lados 6, 8, 10.
  solucion_pasos:
  - Son semejantes, ya que cada lado del segundo es el doble del correspondiente en el primero.
- titulo: ¿Dos triángulos semejantes deben tener el mismo tamaño?
  respuesta: 'No'
  solucion_pasos:
  - No, solo deben mantener la misma forma (ángulos iguales, lados proporcionales).
- titulo: ¿El símbolo ~ se usa para indicar semejanza de triángulos?
  respuesta: Sí
  solucion_pasos:
  - Sí, se escribe △ABC~△A'B'C' para indicar que son semejantes.
errores_frecuentes:
- Confundir el símbolo de semejanza (~) con el de congruencia (≅).
- Verificar solo los ángulos o solo los lados, sin comprender que ambas condiciones están relacionadas.
- Comparar lados que no son realmente correspondientes entre los dos triángulos.
fuente: 'Fuente: Moraleja 152, Cid 117.'
estado: publicado
