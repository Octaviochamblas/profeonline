semantic_id: MAT.EST.DATOS_AGRUPADOS.CONSTRUCCION_TABLA
titulo: Construir tablas de frecuencia con datos agrupados en intervalos
objetivo: Construir una tabla de frecuencia completa para datos agrupados, integrando intervalos, marcas
  de clase y frecuencias.
introduccion: Este recurso integra los conceptos previos del tema (intervalos, límites, amplitud, marca
  de clase) en el procedimiento completo de tabulación con datos agrupados.
resumen: La construcción de una tabla de frecuencia con datos agrupados requiere definir los intervalos
  de clase, calcular su marca de clase y contar la frecuencia de datos que caen en cada uno.
explicacion: '![Construcción de tablas con datos en intervalos](/static/img/estadistica/datosagr/datosagr-construccion-tabla.svg)


  ### Definición formal


  Una tabla de datos agrupados contiene, para cada intervalo: sus límites, su marca de clase (MC) y su
  frecuencia absoluta (f), pudiendo incluir además frecuencia acumulada, relativa y relativa acumulada.


  ### Desarrollo didáctico


  Con los intervalos [0-10), [10-20), [20-30) y frecuencias 4, 7, 3 respectivamente (14 datos en total):
  la tabla tendría marca de clase 5, 15, 25 con esas mismas frecuencias asociadas.'
procedimiento:
- 'Paso 1: Determina el rango total de los datos (desde el mínimo hasta el máximo).'
- 'Paso 2: Define los intervalos de clase (usualmente de igual amplitud) que cubran todo el rango.'
- 'Paso 3: Cuenta cuántos datos caen en cada intervalo (frecuencia) y calcula la marca de clase de cada
  uno.'
ejemplos:
- titulo: Construir una tabla con 3 intervalos
  enunciado: Datos entre 0 y 30, con 4, 7 y 3 datos en los intervalos [0-10), [10-20), [20-30) respectivamente.
  solucion_pasos:
  - 'Tabla: [0-10) MC=5 f=4; [10-20) MC=15 f=7; [20-30) MC=25 f=3. Total n=14.'
- titulo: Construir una tabla de estaturas
  enunciado: Estaturas entre 150 y 180 cm, agrupadas en 3 intervalos de amplitud 10.
  solucion_pasos:
  - 'Intervalos: [150-160), [160-170), [170-180), con sus marcas de clase 155, 165, 175 respectivamente.'
- titulo: ¿La suma de las frecuencias de todos los intervalos debe ser igual al total de datos?
  respuesta: Sí
  solucion_pasos:
  - Sí, al igual que en las tablas de datos no agrupados, la suma de frecuencias debe coincidir con n.
- titulo: ¿Los intervalos deben cubrir completamente el rango de los datos observados?
  respuesta: Sí
  solucion_pasos:
  - Sí, de lo contrario algunos datos quedarían sin clasificar en ningún intervalo.
errores_frecuentes:
- Definir intervalos que dejan huecos o se solapan, generando ambigüedad en la clasificación de algunos
  datos.
- Calcular mal la marca de clase de alguno de los intervalos, afectando cálculos posteriores.
- No verificar que la suma total de frecuencias coincida con el número total de datos original.
fuente: 'Elaboración propia (referencia: Moraleja 351, 362).'
estado: publicado
