semantic_id: MAT.ALG.FUNC_CUADR_GRAFICA.TABLA_VALORES
titulo: Construcción de una tabla de valores para graficar una función cuadrática
objetivo: Construir una tabla de valores adecuada para graficar una función cuadrática, eligiendo puntos
  representativos.
introduccion: Antes de dibujar la parábola, conviene calcular varios pares ordenados $(x,f(x))$, eligiendo
  valores de $x$ que rodeen simétricamente el vértice de la función.
resumen: Una **tabla de valores** para graficar una función cuadrática consiste en calcular $f(x)$ para
  varios valores de $x$, idealmente distribuidos simétricamente alrededor del vértice.
explicacion: '### Definición formal


  Una tabla de valores para $f(x)=ax^2+bx+c$ es un conjunto de pares ordenados $(x_i, f(x_i))$ obtenidos
  evaluando la función en varios valores elegidos de $x_i$. Para representar correctamente la parábola,
  conviene incluir el vértice y puntos simétricos a ambos lados de él.


  ### Desarrollo didáctico


  Una estrategia eficiente es calcular primero la posición del vértice (o al menos su coordenada $x$),
  y luego elegir valores de $x$ simétricamente distribuidos a su alrededor.


  Para $f(x)=x^2-4x+3$, con vértice en $x=2$: se evalúa en $x=0,1,2,3,4$, obteniendo los pares $(0,3)$,
  $(1,0)$, $(2,-1)$, $(3,0)$, $(4,3)$.'
procedimiento:
- 'Paso 1: Identifica (o estima) la coordenada $x$ del vértice de la función.'
- 'Paso 2: Elige varios valores de $x$ simétricamente distribuidos alrededor de esa coordenada.'
- 'Paso 3: Calcula $f(x)$ para cada valor elegido, formando pares ordenados.'
ejemplos:
- titulo: Construcción de tabla para una parábola simple
  enunciado: Construye una tabla de valores para $f(x)=x^2$ usando $x=-2,-1,0,1,2$.
  solucion_pasos:
  - $f(-2)=4$, $f(-1)=1$, $f(0)=0$, $f(1)=1$, $f(2)=4$.
  - Los pares son $(-2,4)$, $(-1,1)$, $(0,0)$, $(1,1)$, $(2,4)$.
- titulo: Construcción de tabla alrededor del vértice
  enunciado: Construye una tabla de valores para $f(x)=x^2-4x+3$ usando $x=0,1,2,3,4$.
  solucion_pasos:
  - $f(0)=3$, $f(1)=0$, $f(2)=-1$, $f(3)=0$, $f(4)=3$.
  - Los pares son $(0,3)$, $(1,0)$, $(2,-1)$, $(3,0)$, $(4,3)$.
- titulo: ¿Es útil elegir valores de $x$ simétricos respecto al vértice al construir la tabla?
  enunciado: ¿Es útil elegir valores de $x$ simétricos respecto al vértice al construir la tabla?
  respuesta: Sí
  solucion_pasos:
  - Esa elección aprovecha la simetría de la parábola y facilita una gráfica más precisa con menos cálculos.
- titulo: ¿Basta con tres valores de $x$ para representar correctamente una parábola?
  enunciado: ¿Basta con tres valores de $x$ para representar correctamente una parábola?
  respuesta: 'No'
  solucion_pasos:
  - Generalmente se necesitan al menos cinco puntos bien distribuidos para apreciar correctamente la forma
    y simetría de la curva.
errores_frecuentes:
- Elegir valores de $x$ muy alejados entre sí, dificultando ver la forma real de la curva.
- No incluir el vértice (o un punto cercano a él) entre los valores calculados.
- Cometer errores aritméticos al evaluar la función en cada valor de $x$.
- Elegir valores de $x$ solo de un lado del vértice, perdiendo la simetría de la parábola.
