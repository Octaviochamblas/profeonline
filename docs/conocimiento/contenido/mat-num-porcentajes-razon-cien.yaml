semantic_id: MAT.NUM.PORCENTAJES.RAZON_CIEN
objetivo: Comprender el porcentaje como una razón con denominador 100.
introduccion: Cuando decimos que tu teléfono tiene 100% de batería, significa que
  está completamente lleno. El número 100 es el 'total perfecto' inventado por la
  humanidad para comparar cualquier cosa de forma fácil.
resumen: Un porcentaje es simplemente una fracción cuyo denominador siempre es 100.
  Escribir $x\%$ es exactamente lo mismo que escribir $x/100$.
explicacion: 'La palabra **porcentaje** viene del latín *per centum*, que significa
  literalmente ''por cada cien''.


  Matemáticamente, el símbolo $\%$ es una abreviatura para ''$\div 100$''. Un porcentaje
  es una **razón** (una fracción) donde el denominador, es decir el total de referencia,
  siempre es el número 100.

  - $50\%$ significa $50/100$ (la mitad de algo).

  - $25\%$ significa $25/100$ (la cuarta parte de algo).

  - $100\%$ significa $100/100$ (el total completo, equivalente a 1).'
procedimiento:
- 'Paso 1: Identifica el número que acompaña al símbolo de porcentaje (%).'
- 'Paso 2: Escribe ese número como el numerador de una fracción.'
- 'Paso 3: Escribe el número 100 como denominador. Esa es su forma de razón.'
ejemplos:
- titulo: Conversión directa
  enunciado: ¿Qué significa matemáticamente un 42%?
  solucion_pasos:
  - Significa que si dividimos algo en 100 partes iguales, tomamos 42 de ellas.
  - En fracción se escribe $42/100$.
  - Si lo divides, es $0.42$ en decimal.
errores_frecuentes:
- Creer que 100% es el número máximo que existe (se puede tener 200%, que es el doble
  de un total).
- Escribir $50\%$ como la fracción $100/50$.
- Olvidar que el % es solo una notación y no un número en sí mismo para operar sin
  convertirlo.
fuente: Currículum Nacional MINEDUC.
estado: publicado
