semantic_id: MAT.ALG.LENGUAJE_RELACIONES.SEMISUMA_NUMEROS
objetivo: Traducir la división de una adición entre dos, conocida comúnmente como promedio o media aritmética de
  dos números.
introduccion: Si tú tienes 10 dulces y yo 4, y queremos ser justos, juntamos todos en una bolsa (14) y los dividimos
  a la mitad. Cada uno se lleva 7. Acabamos de hacer una semisuma.
resumen: 'La **Semisuma** entre dos cantidades es la **mitad de su suma**. Se traduce algebraicamente estructurando
  la adición en el numerador y dividiendo todo entre dos: **$\frac{a + b}{2}$**.'
explicacion: '### Definición formal


  Sumar dos números y dividir el resultado entre dos (semisuma) es la fórmula exacta para obtener su promedio.


  ### Desarrollo didáctico


  Anatomía de la expresión:

  - Suma: $x + y$

  - Semi (mitad): Dividido por 2.

  - Semisuma: $\frac{x + y}{2}$


  *Conexión de Oro:* La semisuma de dos variables es exactamente el mismo concepto que el **promedio** (o media
  aritmética) de dos datos. Si un problema dice ''el promedio de dos números'', escribe de inmediato su semisuma.'
procedimiento:
- 'Paso 1: Identifica las dos entidades que se están sumando.'
- 'Paso 2: Escribe la primera entidad más la segunda (A + B).'
- 'Paso 3: Envuelve toda esa suma en el numerador de una fracción, y coloca un 2 como denominador.'
- Sumar dos números y dividir el resultado entre dos (semisuma) es la fórmula exacta para obtener su promedio.
ejemplos:
- titulo: El punto medio
  enunciado: 'Traduce algebraicamente: ''El promedio entre la nota de control y la nota final''.'
  solucion_pasos:
  - 'Nota de control: C.'
  - 'Nota final: F.'
  - El promedio de dos valores es su semisuma.
  - 'Traducción: (C + F) / 2.'
- titulo: 'La normativa de evaluación de un instituto dice: ''La nota de presentación ($P$) de un alumno'
  enunciado: 'La normativa de evaluación de un instituto dice: ''La nota de presentación ($P$) de un alumno se calcula
    como la semisuma entre su nota teórica ($T$) y su nota práctica ($R$)''. Si un estudiante despeja su nota teórica
    en la ecuación, ¿qué expresión obtiene? (v1)


    Opciones: A) $T = 2P - R$ · B) $T = P - 2R$ · C) $T = \frac{P}{2} - R$ · D) $T = 2(P - R)$'
  solucion_pasos:
  - 'Ecuación original: $P = \frac{T + R}{2}$. Al despejar T, el 2 pasa multiplicando: $2P = T + R$. Luego la R
    pasa restando: $2P - R = T$.'
  - 'Respuesta: $T = 2P - R$'
- titulo: 'Respecto de «Traducción de la semisuma entre dos números»: ¿Se ajusta a la definición esta a'
  enunciado: 'Respecto de «Traducción de la semisuma entre dos números»: ¿Se ajusta a la definición esta afirmación?
    «La **Semisuma** entre dos cantidades es la **mitad de su suma**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Semisuma** entre dos cantidades es la **mitad de su suma**.'
- titulo: 'Respecto de «Traducción de la semisuma entre dos números»: ¿Es compatible con el procedimien'
  enunciado: 'Respecto de «Traducción de la semisuma entre dos números»: ¿Es compatible con el procedimiento esta
    afirmación? «Dividir solo el último número por dos. Escribir $x + \frac{y}{2}$ en lugar de $\frac{x + y}{2}$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Semisuma** entre dos cantidades es la **mitad de su suma**.'
errores_frecuentes:
- Dividir solo el último número por dos. Escribir $x + \frac{y}{2}$ en lugar de $\frac{x + y}{2}$.
- Dividir por otra constante que no sea 2 (el prefijo semi es estricto y significa dos).
- A la mediana estadística.
- A la desviación estándar.
- Para «¿A qué concepto estadístico fundamental equivale algebraicamente la operación de 'semisuma' aplicada sobre
  dos cantidades numéricas distintas? (v1)», la respuesta correcta es A la moda.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción de la semisuma entre dos números
