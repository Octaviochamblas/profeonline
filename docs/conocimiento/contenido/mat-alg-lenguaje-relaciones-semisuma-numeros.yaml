semantic_id: MAT.ALG.LENGUAJE_RELACIONES.SEMISUMA_NUMEROS
objetivo: Traducir la división de una adición entre dos, conocida comúnmente como
  promedio o media aritmética de dos números.
introduccion: Si tú tienes 10 dulces y yo 4, y queremos ser justos, juntamos todos
  en una bolsa (14) y los dividimos a la mitad. Cada uno se lleva 7. Acabamos de hacer
  una semisuma.
resumen: 'La **Semisuma** entre dos cantidades es la **mitad de su suma**. Se traduce
  algebraicamente estructurando la adición en el numerador y dividiendo todo entre
  dos: **$\frac{a + b}{2}$**.'
explicacion: 'Anatomía de la expresión:

  - Suma: $x + y$

  - Semi (mitad): Dividido por 2.

  - Semisuma: $\frac{x + y}{2}$


  *Conexión de Oro:* La semisuma de dos variables es exactamente el mismo concepto
  que el **promedio** (o media aritmética) de dos datos. Si un problema dice ''el
  promedio de dos números'', escribe de inmediato su semisuma.'
procedimiento:
- 'Paso 1: Identifica las dos entidades que se están sumando.'
- 'Paso 2: Escribe la primera entidad más la segunda (A + B).'
- 'Paso 3: Envuelve toda esa suma en el numerador de una fracción, y coloca un 2 como
  denominador.'
ejemplos:
- titulo: El punto medio
  enunciado: 'Traduce algebraicamente: ''El promedio entre la nota de control y la
    nota final''.'
  solucion_pasos:
  - 'Nota de control: C.'
  - 'Nota final: F.'
  - El promedio de dos valores es su semisuma.
  - 'Traducción: (C + F) / 2.'
errores_frecuentes:
- Dividir solo el último número por dos. Escribir $x + \frac{y}{2}$ en lugar de $\frac{x
  + y}{2}$.
- Dividir por otra constante que no sea 2 (el prefijo semi es estricto y significa
  dos).
fuente: Álgebra de Baldor.
estado: publicado
