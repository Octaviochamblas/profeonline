semantic_id: MAT.ALG.FACTOR_CUBOS.RECONOCIMIENTO_DIFERENCIA_CUBOS
titulo: Reconocimiento de diferencia de cubos perfectos
objetivo: Identificar binomios que corresponden a la resta de dos cubos perfectos.
introduccion: No discrimines a la resta. Así como vimos la Suma de Cubos, su hermana, la Diferencia de
  Cubos, es igual de predecible y elegante. De hecho, los requisitos para encontrarla son exactamente
  los mismos, solo cambia el signo central.
resumen: Una diferencia de cubos se presenta como $A^3 - B^3$. Son dos términos con signo negativo entre
  ellos, donde a ambos se les puede extraer raíz cúbica exacta.
explicacion: '### Definición formal


  Un binomio de la forma $A^3 - B^3$ es una diferencia de cubos si y solo si tanto $A$ como $B$ admiten
  raíz cúbica exacta (son cubos perfectos), en cuyo caso factoriza como $A^3 - B^3 = (A - B)(A^2 + AB
  + B^2)$.


  ### Desarrollo didáctico


  Para reconocerla, pasamos el control de calidad:

  1. Son dos términos.

  2. Están separados por un signo menos (resta).

  3. Tienen raíz cúbica exacta.


  Ejemplo: $125 - 64y^9$.

  - ¿Dos términos separados por resta? Sí.

  - La raíz cúbica de 125 es 5.

  - La raíz cúbica de $64y^9$ se halla sacando raíz a 64 (que es 4) y dividiendo el exponente 9 entre
  3 (que da 3). Queda $4y^3$.


  Al tener ambas raíces exactas ($5$ y $4y^3$), confirmamos que estamos ante una Diferencia de Cubos lista
  para ser factorizada.


  Recuerda los cubos clave: $1, 8, 27, 64, 125, 216, 343, 512, 729, 1000$.'
procedimiento:
- 'Paso 1: Observa que la expresión tiene 2 términos restándose.'
- 'Paso 2: Comprueba que el coeficiente numérico del primer y segundo término sean cubos perfectos.'
- 'Paso 3: Comprueba que los exponentes de todas las letras involucradas sean divisibles por 3.'
- Diferencia es sinónimo de resta en matemáticas.
ejemplos:
- titulo: Determina si $x^3 y^6 - 27$ es diferencia de cubos
  enunciado: Determina si $x^3 y^6 - 27$ es diferencia de cubos.
  solucion_pasos:
  - Dos términos, signo resta.
  - 'Raíz del primero: $\sqrt[3]{x^3 y^6} = x y^2$.'
  - 'Raíz del segundo: $\sqrt[3]{27} = 3$.'
  - Ambas raíces existen. Es Diferencia de Cubos.
- titulo: El número 1 se considera un cubo perfecto válido para la diferencia de cubos, como en $y^3 -
  enunciado: ¿El número 1 se considera un cubo perfecto válido para la diferencia de cubos, como en $y^3
    - 1$?
  solucion_pasos:
  - 'El 1 es mágico: es cuadrado, cubo, cuarta potencia... $1^3 = 1$.'
  - 'Respuesta: Verdadero'
- titulo: 'Respecto de «Reconocimiento de diferencia de cubos perfectos»: ¿Es correcta esta caracteriza'
  enunciado: 'Respecto de «Reconocimiento de diferencia de cubos perfectos»: ¿Es correcta esta caracterización?
    «Una diferencia de cubos se presenta como $A^3 - B^3$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una diferencia de cubos se presenta como $A^3 -
    B^3$.'
- titulo: 'Respecto de «Reconocimiento de diferencia de cubos perfectos»: ¿Es válida esta afirmación?
    «'
  enunciado: 'Respecto de «Reconocimiento de diferencia de cubos perfectos»: ¿Es válida esta afirmación?
    «Confundirla con la Diferencia de Cuadrados (ej. $x^6 - 64$ es AMBAS cosas, pero generalmente es mejor
    sacarla como Diferencia de Cuadrados primero por facilidad)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una diferencia de cubos se presenta como $A^3 -
