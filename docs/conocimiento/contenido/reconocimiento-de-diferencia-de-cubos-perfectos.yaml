errores_frecuentes:
- Confundirla con la Diferencia de Cuadrados (ej. $x^6 - 64$ es AMBAS cosas, pero generalmente es mejor
  sacarla como Diferencia de Cuadrados primero por facilidad).
- Asumir que 9 es un cubo perfecto (¡es el cuadrado de 3, no su cubo!).
- Positivo (+).
- Multiplicación.
- División.
