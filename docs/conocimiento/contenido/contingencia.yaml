semantic_id: MAT.FUND.TABLAS_VERDAD.CONTINGENCIA
titulo: Contingencia
objetivo: Identificar y demostrar si una proposición compuesta es una contingencia mediante la construcción
  de su tabla de verdad.
introduccion: 'Imagina que te dicen: "Mañana comeré pizza". ¿Es esta frase una verdad absoluta? No, tal
  vez decidas comer otra cosa. ¿Es una mentira absoluta? Tampoco, es muy posible que sí comas pizza. El
  valor de verdad de esa frase depende de lo que ocurra mañana en la realidad. En lógica proposicional,
  una fórmula que no es ni 100% verdadera (tautología) ni 100% falsa (contradicción) se llama Contingencia.
  Su valor de verdad final "depende" de los valores de las variables individuales.'
resumen: Una contingencia (o proposición sintética) es una proposición compuesta que resulta ser verdadera
  ($V$) en algunas filas de su tabla de verdad y falsa ($F$) en otras, dependiendo de las combinaciones
  de las variables de entrada.
explicacion: 'En lógica proposicional, las fórmulas lógicas se dividen exhaustivamente en tres categorías
  según los resultados de su columna final:


  1. **Tautología**: Siempre verdadera (solo $V$).

  2. **Contradicción**: Siempre falsa (solo $F$).

  3. **Contingencia**: Mezcla de valores Verdaderos ($V$) y Falsos ($F$).


  Una **contingencia** es una proposición compuesta cuyo valor de verdad final depende de los valores
  de las proposiciones simples que la componen. Es decir, bajo algunas asignaciones de valores es verdadera
  y bajo otras es falsa.


  **Verificación de una contingencia:**

  Para demostrar si una expresión es una contingencia:

  - Se construye la tabla de verdad completa.

  - Se verifica la columna de resultado final.

  - Si la columna contiene al menos un valor Verdadero ($V$) y al menos un valor Falso ($F$), entonces
  la expresión es clasificada formalmente como contingencia.


  La gran mayoría de las expresiones lógicas ordinarias que modelan oraciones del lenguaje natural o condiciones
  de control en informática son contingencias.'
procedimiento:
- 'Paso 1: Determinar el número de proposiciones simples $n$ y definir la cantidad de filas de la tabla
  mediante la fórmula $2^n$.'
- 'Paso 2: Definir las columnas de la tabla de verdad: variables base de entrada, negaciones, operaciones
  intermedias delimitadas por paréntesis de adentro hacia afuera, y la columna final para la expresión
  completa.'
- 'Paso 3: Llenar los valores lógicos iniciales de las variables de forma sistemática cubriendo todas
  las combinaciones posibles.'
- 'Paso 4: Evaluar la expresión conectivo por conectivo desde el interior hacia el exterior. Si la columna
  de resultado final contiene tanto valores Verdaderos ($V$) como Falsos ($F$), concluir que la proposición
  es una contingencia.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determina mediante tabla de verdad si la expresión $(p \lor q) \rightarrow p$ es una contingencia.
  solucion_pasos:
  - 'Paso a: Diseñamos la tabla de verdad de 4 filas para dos variables. Columnas: $p$, $q$, $(p \lor
    q)$ y la expresión final.'
  - 'Paso b: Llenamos los valores y calculamos la disyunción $(p \lor q)$, obteniendo ($V, V, V, F$).'
  - 'Paso c: Evaluamos el condicional $(p \lor q) \rightarrow p$: fila 1 ($V \rightarrow V$) es $V$; fila
    2 ($V \rightarrow V$) es $V$; fila 3 ($V \rightarrow F$) es $F$; fila 4 ($F \rightarrow F$) es $V$.
    La columna final es ($V, V, F, V$). Al contener tres $V$ y un $F$, es una contingencia.'
- titulo: Ejemplo 2
  enunciado: Explica por qué la conjunción básica $p \land q$ es una contingencia.
  solucion_pasos:
  - 'Paso a: Construimos la tabla de verdad estándar de 4 filas para la expresión $p \land q$.'
  - 'Paso b: Obtenemos la columna resultante para la conjunción: ($V, F, F, F$).'
  - 'Paso c: Analizamos el resultado: dado que la primera fila es verdadera ($V$) y las tres filas restantes
    son falsas ($F$), la expresión contiene ambos valores lógicos, por lo que es una contingencia.'
- titulo: ¿La negación de una contingencia es también una contingencia?
  respuesta: Sí
  solucion_pasos:
  - Una contingencia contiene una mezcla de valores Verdaderos ($V$) y Falsos ($F$) en su columna de resultado.
  - Al aplicar la negación lógica ($\neg$), todos los valores $V$ se convierten en $F$, y los valores
    $F$ se convierten en $V$.
  - La nueva columna resultante seguirá conteniendo una mezcla de valores $V$ y $F$. Por lo tanto, la
    negación de una contingencia sigue siendo una contingencia.
- titulo: ¿La expresión $(p \land \neg p) \lor q$ es una contingencia si $q$ puede ser verdadera o falsa?
  respuesta: Sí
  solucion_pasos:
  - 'Evaluamos la parte izquierda: $p \land \neg p$ es siempre falsa ($F$).'
  - 'Evaluamos toda la expresión: $F \lor q$, lo cual por identidad lógica de la disyunción equivale simplemente
    a $q$.'
  - Como $q$ es una variable simple de entrada que puede ser tanto verdadera como falsa, el resultado
    final de la expresión dependerá enteramente de $q$, variando entre $V$ y $F$. Por tanto, es una contingencia.
errores_frecuentes:
- Clasificar erróneamente una expresión como contingencia por haber calculado mal una de las filas (por
  ejemplo, omitir un valor falso y concluir que es tautología).
- Pensar que si una expresión tiene más valores verdaderos que falsos, debe clasificarse como tautología.
- Olvidar que una expresión de contingencia debe evaluarse bajo todas las combinaciones posibles de sus
  variables básicas.
- Confundir la contingencia con contradicción al ver que la mayoría de los resultados son falsos.
- Creer que las variables proposicionales simples por sí solas no son contingencias (una variable sola
  $p$ tiene valores $V$ y $F$, por lo que es una contingencia básica).
fuente: Lógica Matemática y Teoría de Conjuntos, pág. 52
estado: publicado
