semantic_id: MAT.EST.PROBA_COND_BASE.EVENTO_CONDICIONADO
titulo: Identificación del evento condicionado en problemas de texto
objetivo: Identificar en un problema descrito en palabras cuál es el evento condicionado, es decir, aquel
  cuya probabilidad se está calculando.
introduccion: Además de identificar la condición, es igualmente importante reconocer cuál es exactamente
  el evento cuya probabilidad se pregunta calcular.
resumen: El evento condicionado es aquel cuya probabilidad se calcula, considerando el espacio muestral
  restringido por el evento condicionante.
explicacion: '![Identificación del evento condicionado](/static/img/probabilidad/condbase/condbase-evento-condicionado.svg)


  ### Definición formal


  En un problema de probabilidad condicional, el evento condicionado suele identificarse por frases como
  ''¿cuál es la probabilidad de...?'', que preceden al evento cuya probabilidad se busca.


  ### Desarrollo didáctico


  En el enunciado ''si se sabe que el número obtenido al lanzar un dado es mayor que 3, ¿cuál es la probabilidad
  de que sea par?'', el evento condicionado es ''ser par'', identificado por la frase ''¿cuál es la probabilidad
  de?''.'
procedimiento:
- 'Paso 1: Busca en el enunciado la frase que pregunta por una probabilidad (''¿cuál es la probabilidad
  de...?'').'
- 'Paso 2: El evento descrito inmediatamente después de esa frase es el evento condicionado.'
- 'Paso 3: Ese evento se ubicará a la izquierda de la barra vertical en la notación P(A|B).'
ejemplos:
- titulo: Identificar el evento condicionado en un problema de dado
  enunciado: '''Si se sabe que el resultado es mayor que 3, ¿cuál es la probabilidad de que sea par?'''
  solucion_pasos:
  - El evento condicionado es 'ser par'.
- titulo: Identificar el evento condicionado en un problema de cartas
  enunciado: '''Sabiendo que la carta extraída es una figura, ¿cuál es la probabilidad de que sea de corazones?'''
  solucion_pasos:
  - El evento condicionado es 'ser de corazones'.
- titulo: ¿El evento condicionado se ubica a la izquierda de la barra vertical en la notación?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es su posición estándar en P(A|B).
- titulo: ¿El evento condicionado es lo mismo que la condición ya conocida?
  respuesta: 'No'
  solucion_pasos:
  - 'No, son conceptos distintos: la condición ya conocida es el condicionante, mientras que el condicionado
    es lo que se pregunta calcular.'
errores_frecuentes:
- Confundir el evento condicionado con el evento condicionante.
- Identificar mal la pregunta central del problema, calculando la probabilidad de un evento equivocado.
- Olvidar que el evento condicionado debe ubicarse a la izquierda de la barra vertical en la notación
  P(A|B).
fuente: Elaboración propia.
estado: publicado
