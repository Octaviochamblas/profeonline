semantic_id: MAT.GEO.CUERPOS_REDONDOS_BASE.ESFERA_DEFINICION
titulo: Definición de esfera
objetivo: Reconocer la esfera como el cuerpo redondo formado por todos los puntos del espacio que equidistan
  de un punto fijo llamado centro.
introduccion: 'Una esfera es como una pelota: un cuerpo perfectamente redondo en todas direcciones, sin
  bases ni vértices.'
resumen: Una esfera es el conjunto de todos los puntos del espacio que están a una misma distancia (el
  radio) de un punto fijo llamado centro.
explicacion: '![Definición de esfera](/static/img/geometria/espacio-cuerpos/esfera-definicion.svg)


  ### Definición formal


  Una esfera de centro $O$ y radio $r$ es el conjunto de todos los puntos del espacio que están a una
  distancia exactamente igual a $r$ del centro $O$. A diferencia del cilindro y el cono, la esfera no
  tiene bases ni vértices: toda su superficie es curva.


  ### Desarrollo didáctico


  En la figura, el segmento desde el centro $O$ hasta cualquier punto de la superficie mide siempre lo
  mismo: el radio $r$. Esta propiedad de equidistancia es lo que define completamente a la esfera, sin
  importar la dirección en la que se mida.'
procedimiento:
- 'Paso 1: Identifica el centro de la esfera (el punto de referencia interior).'
- 'Paso 2: Reconoce que todos los puntos de la superficie están a la misma distancia del centro (el radio
  r).'
- 'Paso 3: Utiliza esa distancia constante (r) como la medida fundamental para cualquier cálculo con la
  esfera.'
ejemplos:
- titulo: Identificar una esfera
  enunciado: Una pelota de fútbol tiene todos sus puntos superficiales a la misma distancia de su centro.
  solucion_pasos:
  - 'Esa pelota tiene forma de esfera: todos los puntos de su superficie equidistan del centro.'
- titulo: Reconocer el radio de una esfera
  enunciado: Una esfera tiene un segmento desde el centro hasta la superficie que mide 7 cm.
  solucion_pasos:
  - Ese segmento es el radio de la esfera, r=7 cm.
- titulo: ¿La esfera tiene bases o vértices?
  respuesta: 'No'
  solucion_pasos:
  - No, a diferencia del cilindro y el cono, la esfera no tiene bases planas ni vértices; toda su superficie
    es curva.
- titulo: ¿Todos los puntos de la superficie de una esfera están a la misma distancia del centro?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la propiedad que define a la esfera.
errores_frecuentes:
- Creer que la esfera tiene alguna base plana, como el cilindro o el cono.
- Confundir el radio de la esfera con su diámetro (el doble del radio).
- Pensar que la distancia al centro varía según el punto de la superficie elegido.
fuente: 'Elaboración propia (referencias: Moraleja 97, Cid 181).'
estado: publicado
