semantic_id: MAT.EST.NORMAL_ESTANDAR.CALCULO_Z
titulo: Calcular el puntaje Z a partir de un valor observado
objetivo: Calcular el puntaje Z correspondiente a un valor observado, aplicando la fórmula de estandarización paso a
  paso.
introduccion: Calcular un puntaje Z es simplemente reemplazar los números correctos en la fórmula de estandarización
  y hacer la resta y la división en el orden correcto.
resumen: Para calcular un puntaje Z se resta la media al valor observado y se divide el resultado por la desviación
  estándar de la distribución original.
explicacion: '![Cálculo del puntaje Z](/static/img/estadistica/normest/normest-calculo-z.svg)


  ### Definición formal


  Se aplica $Z=\dfrac{x-\mu}{\sigma}$, reemplazando los valores conocidos de $x$, $\mu$ y $\sigma$ para obtener el

  puntaje estandarizado correspondiente.


  ### Desarrollo didáctico


  Por ejemplo, si un estudiante obtiene 650 puntos en una prueba con $\mu=500$ y $\sigma=100$, su puntaje $Z$ es

  $\dfrac{650-500}{100}=1{,}5$, es decir, 1,5 desviaciones estándar sobre la media.'
procedimiento:
- 'Paso 1: Identifica los valores de $x$, $\mu$ y $\sigma$ del problema.'
- 'Paso 2: Calcula la diferencia $x-\mu$.'
- 'Paso 3: Divide esa diferencia por $\sigma$ para obtener el puntaje $Z$ final.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Un estudiante obtiene 650 puntos en una prueba con $\mu=500$ y $\sigma=100$. Calcula su puntaje $Z$.
  solucion_pasos:
  - $Z=\dfrac{650-500}{100}=\dfrac{150}{100}$.
  - $Z=1{,}5$.
- titulo: Ejemplo 2
  enunciado: Un producto pesa 48 kg en una distribución con $\mu=50$ kg y $\sigma=2$ kg. Calcula su puntaje $Z$.
  solucion_pasos:
  - $Z=\dfrac{48-50}{2}=\dfrac{-2}{2}$.
  - $Z=-1$.
- titulo: ¿Se necesita conocer la media y la desviación estándar originales para calcular un puntaje $Z$?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos valores son indispensables en la fórmula.
- titulo: ¿Un puntaje $Z$ igual a 0 indica que el valor coincide con la media original?
  respuesta: Sí
  solucion_pasos:
  - Sí, esta afirmación es correcta: cuando $x=\mu$, el puntaje $Z$ resultante es exactamente 0.
errores_frecuentes:
- Calcular mal la resta $x-\mu$, invirtiendo el orden de los términos.
- Olvidar dividir por $\sigma$ después de calcular la diferencia.
- Confundir la media o desviación estándar del problema con las de otro ejercicio distinto.
- Redondear el resultado antes de completar todos los cálculos necesarios.
- Interpretar mal el signo del puntaje $Z$ obtenido.
fuente: 'Elaboración propia (referencia: Moraleja 307).'
estado: publicado
