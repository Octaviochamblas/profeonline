semantic_id: MAT.ALG.SUSTRACCION_POL.OPERACION_COMBINADA
objetivo: Resolver expresiones algebraicas que combinan adición y sustracción de varios
  polinomios.
introduccion: Las operaciones algebraicas rara vez se presentan de una en una. En
  una expresión real, puede haber que sumar y restar varios polinomios en secuencia.
  La clave es resolver en orden, convirtiendo siempre las restas en sumas del opuesto.
resumen: 'En una **Operación Combinada** con polinomios, se procesa cada signo entre
  ellos: los $+$ no alteran los signos interiores, los $-$ invierten todos los signos
  del polinomio que sigue.'
explicacion: 'Simplifica: $(3x^2 - x) + (x^2 + 4) - (2x^2 - 3x + 1)$.


  Eliminamos los agrupadores con sus reglas:

  - El $+$ no cambia nada: $3x^2 - x + x^2 + 4$.

  - El $-$ invierte el último: $-2x^2 + 3x - 1$.


  Juntos: $3x^2 - x + x^2 + 4 - 2x^2 + 3x - 1$.


  Reducimos por familias:

  - $x^2$: $3 + 1 - 2 = 2x^2$.

  - $x$: $-1 + 3 = 2x$.

  - Constante: $4 - 1 = 3$.


  Resultado: $2x^2 + 2x + 3$.'
procedimiento:
- 'Paso 1: Identifica todos los signos que preceden a cada paréntesis.'
- 'Paso 2: Elimina los paréntesis: conserva los signos si el exterior es $+$, invierte
  si es $-$.'
- 'Paso 3: Agrupa por familias.'
- 'Paso 4: Reduce cada familia.'
ejemplos:
- titulo: El combo algebraico
  enunciado: 'Simplifica: (5a + 3) - (2a - 1) + (a + 4).'
  solucion_pasos:
  - '+ (5a+3): 5a+3.'
  - '- (2a-1): -2a+1.'
  - '+ (a+4): a+4.'
  - 'Junto: 5a+3-2a+1+a+4.'
  - 'Familia a: 5-2+1=4a. Constante: 3+1+4=8.'
  - 'Resultado: 4a+8.'
errores_frecuentes:
- Al haber múltiples signos externos, invertir solo los del primer signo negativo
  y olvidar los siguientes.
- No reducir completamente, dejando términos semejantes sin agrupar en el resultado.
fuente: Álgebra de Baldor.
estado: publicado
