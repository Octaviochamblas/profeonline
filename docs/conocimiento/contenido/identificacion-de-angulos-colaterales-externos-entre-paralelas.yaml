semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.COLATERALES_EXTERNOS_IDENTIFICACION
titulo: Identificación de ángulos colaterales externos entre paralelas
objetivo: Identificar un par de ángulos colaterales externos en un esquema con paralelas y comprobar que
  la posición exterior y el mismo lado de la transversal son la clave del nombre.
introduccion: Cuando una calle cruza dos avenidas paralelas aparecen muchos ángulos con nombres distintos.
  El truco no es memorizar números, sino mirar dónde queda cada uno respecto de la transversal y de las
  paralelas. Para resolver situaciones de identificación de ángulos colaterales externos entre paralelas
  conviene mirar el dibujo con método, no solo por intuición.
resumen: Los ángulos colaterales externos se reconocen por su posición relativa respecto de dos paralelas
  y una transversal. Como idea de control, la posición exterior y el mismo lado de la transversal son
  la clave del nombre.
explicacion: 'Los ángulos colaterales externos se reconocen por su posición relativa respecto de dos paralelas
  y una transversal.


  La situación “fuera de las paralelas, dos ángulos quedan del mismo lado de la transversal” muestra cómo
  pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se verifica
  que la posición exterior y el mismo lado de la transversal son la clave del nombre.'
procedimiento:
- 'Paso 1: Ubica primero cuáles son las rectas paralelas y cuál es la transversal.'
- 'Paso 2: Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.'
- 'Paso 3: Concluye si el par corresponde a ángulos colaterales externos y descarta relaciones vecinas.'
ejemplos:
- titulo: Caso guiado — Colaterales externos
  enunciado: Fuera de las paralelas, dos ángulos quedan del mismo lado de la transversal.
  solucion_pasos:
  - Ubica primero cuáles son las rectas paralelas y cuál es la transversal.
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos colaterales externos y descarta relaciones vecinas.
- titulo: Chequeo del procedimiento — Colaterales externos
  enunciado: En la situación “fuera de las paralelas, dos ángulos quedan del mismo lado de la transversal”,
    un compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye la justificación
    completa.
  solucion_pasos:
  - 'Parte de la definición: los ángulos colaterales externos se reconocen por su posición relativa respecto
    de dos paralelas y una transversal.'
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos colaterales externos y descarta relaciones vecinas.
- titulo: ¿La situación respeta la idea clave del recurso? — Colaterales externos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: los ángulos colaterales externos se reconocen
    por su posición relativa respecto de dos paralelas y una transversal.'
  - En el caso “fuera de las paralelas, dos ángulos quedan del mismo lado de la transversal” se observa
    que la posición exterior y el mismo lado de la transversal son la clave del nombre.
  - Concluye si el par corresponde a ángulos colaterales externos y descarta relaciones vecinas.
- titulo: ¿Se puede cerrar sin el control final? — Colaterales externos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de identificación de ángulos colaterales
    externos entre paralelas.
  - Después del paso “Ubica primero cuáles son las rectas paralelas y cuál es la transversal.” todavía
    hace falta revisar “Decide si cada ángulo está en la zona interior o exterior y en qué lado de la
    transversal queda.”.
  - El cierre correcto exige “Concluye si el par corresponde a ángulos colaterales externos y descarta
    relaciones vecinas.”.
errores_frecuentes:
- Colaterales externos significa quedar fuera de las paralelas y en lados opuestos de la transversal.
- Para resolver colaterales externos, basta con el paso “Ubica primero cuáles son las rectas paralelas
  y cuál es la transversal.” y no hace falta revisar “Decide si cada ángulo está en la zona interior o
  exterior y en qué lado de la transversal queda.”.
- Si el dibujo parece claro, se puede ignorar que la posición exterior y el mismo lado de la transversal
  son la clave del nombre.
- Dos configuraciones distintas representan colaterales externos solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si el par corresponde a ángulos
  colaterales externos y descarta relaciones vecinas.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
