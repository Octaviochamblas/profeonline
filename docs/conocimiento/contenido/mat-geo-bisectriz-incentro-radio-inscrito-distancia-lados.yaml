semantic_id: MAT.GEO.BISECTRIZ_INCENTRO.RADIO_INSCRITO_DISTANCIA_LADOS
titulo: Radio de la circunferencia inscrita como distancia del incentro a los lados
objetivo: Calcular el radio inscrito de un triángulo a partir de su área y su semiperímetro.
introduccion: 'El radio de la circunferencia inscrita no solo se define geométricamente como distancia
  del incentro a los lados: también puede calcularse numéricamente a partir del área y el semiperímetro
  del triángulo.'
resumen: El radio inscrito de un triángulo se calcula como r = Área / s, donde s es el semiperímetro.
explicacion: '![Radio inscrito como distancia del incentro a los lados](/static/img/geometria/elementos-secundarios/bisectriz-incentro-radio-inscrito-distancia-lados.svg)


  ### Definición formal


  Si un triángulo tiene área $A$ y semiperímetro $s=\frac{a+b+c}{2}$, su radio inscrito es $r=\frac{A}{s}$.


  ### Desarrollo didáctico


  Un triángulo de lados 3, 4 y 5 tiene semiperímetro $s=\frac{3+4+5}{2}=6$ y área $A=\frac{3\cdot4}{2}=6$
  (es rectángulo); su radio inscrito es $r=\frac{6}{6}=1$.'
procedimiento:
- 'Paso 1: Calcula el semiperímetro s sumando los tres lados y dividiendo entre 2.'
- 'Paso 2: Calcula (o identifica) el área del triángulo.'
- 'Paso 3: Divide el área entre el semiperímetro para obtener el radio inscrito.'
ejemplos:
- titulo: Calcular el inradio
  enunciado: Un triángulo tiene área 12 y semiperímetro 6.
  solucion_pasos:
  - r = 12/6 = 2.
- titulo: Calcular con el triángulo 3-4-5
  enunciado: Calcula el inradio del triángulo rectángulo de lados 3, 4 y 5.
  solucion_pasos:
  - s=(3+4+5)/2=6, área=6, r=6/6=1.
- titulo: ¿El inradio depende del área del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es directamente proporcional al área (para un semiperímetro fijo).
- titulo: ¿Se puede calcular el inradio sin conocer el área?
  respuesta: 'No'
  solucion_pasos:
  - No, con esta fórmula se necesita conocer el área y el semiperímetro.
errores_frecuentes:
- Olvidar dividir entre 2 al calcular el semiperímetro.
- Confundir el perímetro con el semiperímetro en la fórmula.
- Usar el perímetro completo en vez del semiperímetro al dividir el área.
fuente: Elaboración propia.
estado: publicado
