semantic_id: MAT.GEO.MEDICION_ANGULAR.RADIAN_DEFINICION
titulo: Definición de radián como unidad de medida angular
objetivo: Interpretar el radián como una unidad geométrica de medida angular y comprobar que el radián
  nace de una razón geométrica y no de una división arbitraria de la vuelta.
introduccion: A diferencia del grado, el radián no aparece porque alguien partió la vuelta en muchas piezas.
  Surge directamente al comparar longitudes en una circunferencia.
resumen: Un radián es el ángulo central que subtiende un arco cuya longitud es igual al radio de la circunferencia.
  Como idea de control, el radián nace de una razón geométrica y no de una división arbitraria de la vuelta.
explicacion: 'Un radián es el ángulo central que subtiende un arco cuya longitud es igual al radio de
  la circunferencia.


  El ejemplo “si el arco y el radio miden lo mismo, el ángulo central correspondiente mide 1 radián” no
  se resuelve por apariencia: se justifica usando la definición y revisando finalmente que el radián nace
  de una razón geométrica y no de una división arbitraria de la vuelta.'
procedimiento:
- 'Paso 1: Relaciona el ángulo con un arco y con el radio de la circunferencia.'
- 'Paso 2: Comprueba si la longitud del arco coincide con la del radio o con un múltiplo de ella.'
- 'Paso 3: Concluye la medida en radianes explicando la relación geométrica utilizada.'
ejemplos:
- titulo: Caso guiado — Radián
  enunciado: Si el arco y el radio miden lo mismo, el ángulo central correspondiente mide 1 radián.
  solucion_pasos:
  - Relaciona el ángulo con un arco y con el radio de la circunferencia.
  - Comprueba si la longitud del arco coincide con la del radio o con un múltiplo de ella.
  - Concluye la medida en radianes explicando la relación geométrica utilizada.
- titulo: Corrección de una respuesta — Radián
  enunciado: 'Revisa una solución del caso “si el arco y el radio miden lo mismo, el ángulo central correspondiente
    mide 1 radián”: el resultado parece razonable, pero falta conectar el dibujo con la definición. Explica
    esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: un radián es el ángulo central que subtiende un arco cuya longitud es igual
    al radio de la circunferencia.'
  - Comprueba si la longitud del arco coincide con la del radio o con un múltiplo de ella.
  - Concluye la medida en radianes explicando la relación geométrica utilizada.
- titulo: ¿La interpretación del dibujo es válida? — Radián
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un radián es el ángulo central que subtiende
    un arco cuya longitud es igual al radio de la circunferencia.'
  - En el caso “si el arco y el radio miden lo mismo, el ángulo central correspondiente mide 1 radián”
    se observa que el radián nace de una razón geométrica y no de una división arbitraria de la vuelta.
  - Concluye la medida en radianes explicando la relación geométrica utilizada.
- titulo: ¿Se puede omitir el paso intermedio? — Radián
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de definición de radián como unidad de medida
    angular.
  - Después del paso “Relaciona el ángulo con un arco y con el radio de la circunferencia.” todavía hace
    falta revisar “Comprueba si la longitud del arco coincide con la del radio o con un múltiplo de ella.”.
  - El cierre correcto exige “Concluye la medida en radianes explicando la relación geométrica utilizada.”.
errores_frecuentes:
- Radián significa ser simplemente otra palabra para 1°.
- Para resolver radián, basta con el paso “Relaciona el ángulo con un arco y con el radio de la circunferencia.”
  y no hace falta revisar “Comprueba si la longitud del arco coincide con la del radio o con un múltiplo
  de ella.”.
- Si el dibujo parece claro, se puede ignorar que el radián nace de una razón geométrica y no de una división
  arbitraria de la vuelta.
- Dos configuraciones distintas representan radián solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye la medida en radianes explicando
  la relación geométrica utilizada.”.
fuente: Currículum Nacional MINEDUC — Medición angular, sistemas sexagesimal, radial y centesimal.
estado: publicado
