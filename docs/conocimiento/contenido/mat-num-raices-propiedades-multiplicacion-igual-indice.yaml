semantic_id: MAT.NUM.RAICES_PROPIEDADES.MULTIPLICACION_IGUAL_INDICE
objetivo: Multiplicar y simplificar raíces con índice común.
introduccion: Dos radicales del mismo tipo pueden reunir sus radicandos. Esta transformación
  suele revelar una potencia perfecta que no aparecía por separado.
resumen: 'Raíces de igual índice pueden multiplicarse dentro de un solo radical: \(\sqrt[n]{a}\sqrt[n]{b}=\sqrt[n]{ab}\).
  La identidad exige compatibilidad de índices y condiciones reales de los radicandos.'
explicacion: |-
  Raíces de igual índice pueden multiplicarse dentro de un solo radical: \(\sqrt[n]{a}\sqrt[n]{b}=\sqrt[n]{ab}\).

  La situación “\(\sqrt3\sqrt{12}=\sqrt{36}=6\)” permite comprobar, y no solo memorizar, que la identidad exige compatibilidad de índices y condiciones reales de los radicandos
procedimiento:
- 'Paso 1: Comprueba que los índices coincidan y que cada radical exista en \(\mathbb{R}\).'
- 'Paso 2: Multiplica los radicandos bajo un único radical.'
- 'Paso 3: Busca potencias perfectas y verifica el resultado por aproximación o potencia.'
ejemplos:
- titulo: Aplicación razonada — Multiplicación de raíces de igual índice
  enunciado: \(\sqrt3\sqrt{12}=\sqrt{36}=6\).
  solucion_pasos:
  - Comprueba que los índices coincidan y que cada radical exista en \(\mathbb{R}\).
  - Multiplica los radicandos bajo un único radical.
  - Busca potencias perfectas y verifica el resultado por aproximación o potencia.
- titulo: Revisión de una solución — Multiplicación de raíces de igual índice
  enunciado: Una solución aplica “Multiplica los radicandos bajo un único radical.”,
    pero termina sin comprobar que la identidad exige compatibilidad de índices y
    condiciones reales de los radicandos. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define multiplicación de raíces de igual índice: raíces
    de igual índice pueden multiplicarse dentro de un solo radical: \(\sqrt[n]{a}\sqrt[n]{b}=\sqrt[n]{ab}\).'
  - Comprueba que los índices coincidan y que cada radical exista en \(\mathbb{R}\).
  - 'Completa la revisión con este control: Busca potencias perfectas y verifica el
    resultado por aproximación o potencia.'
- titulo: ¿Se cumple que la identidad exige compatibilidad de índices y condiciones
    reales de los radicandos? — Multiplicación de raíces de igual índice
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que raíces de igual índice pueden multiplicarse
    dentro de un solo radical: \(\sqrt[n]{a}\sqrt[n]{b}=\sqrt[n]{ab}\).'
  - El caso “\(\sqrt3\sqrt{12}=\sqrt{36}=6\)” satisface esa condición.
  - Busca potencias perfectas y verifica el resultado por aproximación o potencia.
- titulo: ¿Es válido omitir el paso “Comprueba que los índices coincidan y que cada
    radical exista en \(\mathbb{R}\)”? — Multiplicación de raíces de igual índice
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de multiplicación de raíces de
    igual índice.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica los radicandos
    bajo un único radical.'
  - 'La solución debe terminar de este modo: Busca potencias perfectas y verifica
    el resultado por aproximación o potencia.'
errores_frecuentes:
- 'Confundir multiplicación de raíces de igual índice con otro concepto y omitir este
  inicio: Comprueba que los índices coincidan y que cada radical exista en \(\mathbb{R}\).'
- Aplicar mecánicamente “Multiplica los radicandos bajo un único radical.” sin revisar
  las condiciones de la definición.
- Tomar “\(\sqrt3\sqrt{12}=\sqrt{36}=6\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la identidad exige compatibilidad
  de índices y condiciones reales de los radicandos”.
- 'Terminar el desarrollo sin realizar este control: Busca potencias perfectas y verifica
  el resultado por aproximación o potencia.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
