semantic_id: MAT.GEO.TRIANGULOS_DEF.ANGULOS_EXTERIORES
titulo: Identificación de los ángulos exteriores de un triángulo
objetivo: Identificar un ángulo exterior de un triángulo como el que se forma al prolongar uno de sus
  lados.
introduccion: Si se prolonga uno de los lados de un triángulo más allá de un vértice, se forma un nuevo
  ángulo, distinto del interior, entre esa prolongación y el otro lado del vértice.
resumen: Un ángulo exterior de un triángulo se forma entre un lado y la prolongación del lado adyacente,
  en un mismo vértice.
explicacion: '![Ángulo exterior de un triángulo](/static/img/geometria/triangulos/triangulos-def-angulos-exteriores.svg)


  ### Definición formal


  En el vértice B de un triángulo ABC, si se prolonga el lado AB más allá de B, el ángulo exterior δ es
  el que forma esa prolongación con el lado BC.


  ### Desarrollo didáctico


  El ángulo interior en B y el ángulo exterior δ en B son adyacentes: juntos completan una línea recta
  (180°) a lo largo de la prolongación de AB. Por eso δ y el ángulo interior en B son suplementarios.'
procedimiento:
- 'Paso 1: Elige un vértice del triángulo y uno de los lados que llegan a él.'
- 'Paso 2: Prolonga ese lado más allá del vértice, en línea recta.'
- 'Paso 3: El ángulo exterior es el que forma esa prolongación con el otro lado del vértice.'
ejemplos:
- titulo: Formar un ángulo exterior
  enunciado: Se prolonga el lado AB de un triángulo ABC más allá de B.
  solucion_pasos:
  - El ángulo entre esa prolongación y el lado BC es el ángulo exterior en B.
- titulo: Ángulo exterior en otro vértice
  enunciado: ¿Cómo se forma el ángulo exterior en el vértice C de un triángulo ABC?
  solucion_pasos:
  - Se prolonga BC (o CA) más allá de C, y se mide el ángulo con el otro lado de C.
- titulo: ¿Un ángulo exterior se forma prolongando un lado?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre se genera al prolongar uno de los dos lados que llegan al vértice.
- titulo: ¿El ángulo exterior es igual al ángulo interior del mismo vértice?
  respuesta: 'No'
  solucion_pasos:
  - No, son ángulos distintos y adyacentes, que juntos suman 180°.
errores_frecuentes:
- Confundir el ángulo exterior con el ángulo interior del mismo vértice.
- Prolongar el lado equivocado al construir el ángulo exterior.
- Creer que el ángulo exterior se forma sin prolongar ningún lado.
fuente: Elaboración propia.
estado: publicado
