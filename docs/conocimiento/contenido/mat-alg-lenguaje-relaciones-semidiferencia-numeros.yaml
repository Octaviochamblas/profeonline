semantic_id: MAT.ALG.LENGUAJE_RELACIONES.SEMIDIFERENCIA_NUMEROS
objetivo: Traducir la división de una resta entre dos.
introduccion: El prefijo 'semi' en matemáticas y en español significa 'la mitad de'.
  Si entiendes lo que es una diferencia (resta), entonces la semidiferencia es simplemente
  cortarla por la mitad.
resumen: 'La **Semidiferencia** entre dos cantidades es la **mitad de su resta**.
  Se traduce algebraicamente estructurando la resta en el numerador y dividiendo todo
  entre dos: **$\frac{a - b}{2}$**.'
explicacion: 'Anatomía de la expresión:

  - Diferencia: $x - y$

  - Semi (mitad): Dividido por 2.

  - Semidiferencia: $\frac{x - y}{2}$


  Al igual que en toda resta, el orden es ley. ''La semidiferencia entre $m$ y $n$''
  obliga a que $m$ sea el minuendo (positivo) y $n$ el sustraendo (negativo): $\frac{m
  - n}{2}$.'
procedimiento:
- 'Paso 1: Identifica las dos entidades que se están comparando.'
- 'Paso 2: Escribe la primera entidad menos la segunda (A - B).'
- 'Paso 3: Envuelve toda esa resta en el numerador de una fracción, y coloca un 2
  como denominador.'
ejemplos:
- titulo: Cortando la distancia
  enunciado: 'Traduce algebraicamente: ''La semidiferencia entre el cuadrado de a
    y el cubo de b''.'
  solucion_pasos:
  - 'Entidad 1: cuadrado de a (a^2).'
  - 'Entidad 2: cubo de b (b^3).'
  - 'Diferencia: a^2 - b^3.'
  - 'Semi: Todo lo anterior dividido en 2. Traducción: (a^2 - b^3) / 2.'
errores_frecuentes:
- Dividir solo el primer número por dos. Escribir $\frac{x}{2} - y$ en lugar de $\frac{x
  - y}{2}$.
- Confundirla con la semisuma.
fuente: Álgebra de Baldor.
estado: publicado
