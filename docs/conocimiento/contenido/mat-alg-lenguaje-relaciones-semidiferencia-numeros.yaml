semantic_id: MAT.ALG.LENGUAJE_RELACIONES.SEMIDIFERENCIA_NUMEROS
objetivo: Traducir la división de una resta entre dos.
introduccion: El prefijo 'semi' en matemáticas y en español significa 'la mitad de'. Si entiendes lo que es una
  diferencia (resta), entonces la semidiferencia es simplemente cortarla por la mitad.
resumen: 'La **Semidiferencia** entre dos cantidades es la **mitad de su resta**. Se traduce algebraicamente estructurando
  la resta en el numerador y dividiendo todo entre dos: **$\frac{a - b}{2}$**.'
explicacion: '### Definición formal


  El prefijo semi- afecta a la totalidad de la palabra que acompaña. Semidiferencia = (diferencia) / 2.


  ### Desarrollo didáctico


  Anatomía de la expresión:

  - Diferencia: $x - y$

  - Semi (mitad): Dividido por 2.

  - Semidiferencia: $\frac{x - y}{2}$


  Al igual que en toda resta, el orden es ley. ''La semidiferencia entre $m$ y $n$'' obliga a que $m$ sea el minuendo
  (positivo) y $n$ el sustraendo (negativo): $\frac{m - n}{2}$.'
procedimiento:
- 'Paso 1: Identifica las dos entidades que se están comparando.'
- 'Paso 2: Escribe la primera entidad menos la segunda (A - B).'
- 'Paso 3: Envuelve toda esa resta en el numerador de una fracción, y coloca un 2 como denominador.'
- El prefijo semi- afecta a la totalidad de la palabra que acompaña. Semidiferencia = (diferencia) / 2.
ejemplos:
- titulo: Cortando la distancia
  enunciado: 'Traduce algebraicamente: ''La semidiferencia entre el cuadrado de a y el cubo de b''.'
  solucion_pasos:
  - 'Entidad 1: cuadrado de a (a^2).'
  - 'Entidad 2: cubo de b (b^3).'
  - 'Diferencia: a^2 - b^3.'
  - 'Semi: Todo lo anterior dividido en 2. Traducción: (a^2 - b^3) / 2.'
- titulo: Un sistema de navegación calcula el 'margen de corrección' como la semidiferencia entre la c
  enunciado: 'Un sistema de navegación calcula el ''margen de corrección'' como la semidiferencia entre la coordenada
    objetivo ($O$) y la coordenada actual ($A$). ¿Qué expresión debe programarse en la computadora de a bordo? (v1)


    Opciones: A) $Margen = \frac{O - A}{2}$ · B) $Margen = \frac{A - O}{2}$ · C) $Margen = O - \frac{A}{2}$ · D)
    $Margen = \frac{O + A}{2}$'
  solucion_pasos:
  - El orden de mención fue Objetivo primero y Actual después. Por tanto, es (O - A). La palabra 'semi' obliga a
    dividir toda la resta por 2.
  - 'Respuesta: $Margen = \frac{O - A}{2}$'
- titulo: 'Respecto de «Traducción de la semidiferencia entre dos números»: ¿Se ajusta a la definición'
  enunciado: 'Respecto de «Traducción de la semidiferencia entre dos números»: ¿Se ajusta a la definición esta afirmación?
    «La **Semidiferencia** entre dos cantidades es la **mitad de su resta**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Semidiferencia** entre dos cantidades es la **mitad de
    su resta**.'
- titulo: 'Respecto de «Traducción de la semidiferencia entre dos números»: ¿Es compatible con el proce'
  enunciado: 'Respecto de «Traducción de la semidiferencia entre dos números»: ¿Es compatible con el procedimiento
    esta afirmación? «Dividir solo el primer número por dos. Escribir $\frac{x}{2} - y$ en lugar de $\frac{x - y}{2}$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Semidiferencia** entre dos cantidades es la **mitad de
    su resta**.'
errores_frecuentes:
- Dividir solo el primer número por dos. Escribir $\frac{x}{2} - y$ en lugar de $\frac{x - y}{2}$.
- Confundirla con la semisuma.
- Primero se dividen ambas variables por dos, y luego se multiplican los resultados.
- Primero se suman las variables, y luego se restan por dos.
- Para «A nivel estructural, ¿qué operaciones y en qué orden lógico combina el concepto de 'semidiferencia' de dos
  variables algebraicas? (v1)», la respuesta correcta es Se resta el doble de la primera variable menos la segunda.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción de la semidiferencia entre dos números
