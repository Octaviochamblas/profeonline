semantic_id: MAT.ALG.EC_CUADR_RESOL_FACTOR.INCOMPLETA_PURA
titulo: Resolución de ecuaciones de la forma ax² + c = 0 mediante despeje
objetivo: Resolver ecuaciones incompletas puras de la forma $ax^2+c=0$ despejando directamente y extrayendo raíz
  cuadrada.
introduccion: 'Cuando falta el término lineal, no hace falta factorizar como en otros casos: basta con despejar
  $x^2$ y luego extraer raíz cuadrada, con cuidado del signo $\pm$.'
resumen: Para resolver $ax^2+c=0$, se despeja $x^2=-\dfrac{c}{a}$ y se extrae raíz cuadrada, obteniendo $x=\pm\sqrt{-c/a}$
  si el valor bajo la raíz es no negativo.
explicacion: '### Definición formal


  Dada la ecuación $ax^2+c=0$ con $a \neq 0$ y $c \neq 0$, se despeja $x^2=-\dfrac{c}{a}$. Si $-\dfrac{c}{a} \geq
  0$, las soluciones son $x=\pm\sqrt{-c/a}$; si $-\dfrac{c}{a}<0$, la ecuación no tiene soluciones reales.


  ### Desarrollo didáctico


  El procedimiento consiste en aislar el término cuadrático, despejar $x^2$, y luego decidir si el valor obtenido
  permite extraer raíz cuadrada real.


  Para $3x^2-27=0$: despejando, $x^2=9$, por lo que $x=\pm3$. Para $x^2+4=0$: despejando, $x^2=-4$, que no tiene
  solución real.'
procedimiento:
- 'Paso 1: Verifica que la ecuación tenga la forma $ax^2+c=0$, sin término lineal.'
- 'Paso 2: Despeja $x^2$, aislándolo en un lado de la igualdad.'
- 'Paso 3: Si el resultado es no negativo, extrae raíz cuadrada con signo $\pm$; si es negativo, concluye que
  no hay soluciones reales.'
ejemplos:
- titulo: Resolución con solución real
  enunciado: 'Resuelve $2x^2-32=0$.'
  solucion_pasos:
  - 'Despejando: $x^2=16$.'
  - '$x=\pm4$.'
- titulo: Resolución sin solución real
  enunciado: 'Resuelve $x^2+9=0$.'
  solucion_pasos:
  - 'Despejando: $x^2=-9$.'
  - No tiene solución real, ya que ningún cuadrado real es negativo.
- titulo: ¿Las soluciones de una ecuación incompleta pura son siempre un par de números opuestos?
  enunciado: ¿Las soluciones de una ecuación incompleta pura son siempre un par de números opuestos?
  respuesta: Sí
  solucion_pasos:
  - Al despejar $x=\pm\sqrt{-c/a}$, cuando existen soluciones reales, siempre son un par de valores opuestos entre
    sí.
- titulo: ¿Toda ecuación incompleta pura tiene solución dentro de los números reales?
  enunciado: ¿Toda ecuación incompleta pura tiene solución dentro de los números reales?
  respuesta: 'No'
  solucion_pasos:
  - Si $-c/a$ resulta negativo, no existe ningún número real cuyo cuadrado sea ese valor.
errores_frecuentes:
- Olvidar el signo $\pm$ al extraer la raíz cuadrada, perdiendo una de las dos soluciones.
- No verificar si el valor bajo la raíz es negativo antes de intentar calcularla.
- Cometer errores de signo al despejar $x^2$ desde la ecuación original.
- Confundir esta ecuación con la incompleta binomia, que sí requiere factorización por término común.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
