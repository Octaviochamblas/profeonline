semantic_id: MAT.GEO.PARALELOGRAMOS.ANGULOS_OPUESTOS_CONGRUENTES
titulo: Propiedad de ángulos opuestos congruentes en paralelogramos
objetivo: Reconocer que en todo paralelogramo, los ángulos opuestos son congruentes entre sí.
introduccion: Así como ocurre con los lados, los ángulos de un paralelogramo también siguen un patrón
  de igualdad entre sus elementos opuestos.
resumen: 'En todo paralelogramo, los ángulos opuestos son congruentes: tienen exactamente la misma medida.'
explicacion: '![Ángulos opuestos congruentes en un paralelogramo](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-angulos-opuestos-congruentes.svg)


  ### Definición formal


  En un paralelogramo $ABCD$, se cumple $\angle A=\angle C$ y $\angle B=\angle D$. Además, los ángulos
  consecutivos (adyacentes) son suplementarios: $\angle A+\angle B=180°$.


  ### Desarrollo didáctico


  Un paralelogramo con un ángulo de 70° tiene su ángulo opuesto también de 70°, y sus dos ángulos adyacentes
  (consecutivos) de $180°-70°=110°$ cada uno.'
procedimiento:
- 'Paso 1: Identifica los dos pares de ángulos opuestos del paralelogramo.'
- 'Paso 2: Recuerda que cada par de ángulos opuestos es congruente.'
- 'Paso 3: Si conoces un ángulo, ya conoces su opuesto (igual) y puedes calcular los adyacentes (suplementarios,
  sumando 180° con el conocido).'
ejemplos:
- titulo: Calcular un ángulo opuesto
  enunciado: En un paralelogramo, un ángulo mide 70°.
  solucion_pasos:
  - Su ángulo opuesto también mide 70°.
- titulo: Calcular los ángulos adyacentes
  enunciado: Con un ángulo de 70°, ¿cuánto miden los adyacentes?
  solucion_pasos:
  - 180-70=110°, cada uno de los dos ángulos adyacentes mide 110°.
- titulo: ¿Todos los ángulos de un paralelogramo son iguales entre sí?
  respuesta: 'No'
  solucion_pasos:
  - No, solo los opuestos son iguales; los adyacentes son suplementarios, no necesariamente iguales (salvo
    en rectángulos y cuadrados).
- titulo: ¿La suma de los cuatro ángulos de un paralelogramo es 360°?
  respuesta: Sí
  solucion_pasos:
  - Sí, como todo cuadrilátero, la suma de sus ángulos interiores es 360°.
errores_frecuentes:
- Creer que todos los ángulos del paralelogramo son iguales entre sí.
- Confundir ángulos opuestos (iguales) con ángulos adyacentes (suplementarios).
- Olvidar que los ángulos adyacentes suman 180°, no 90° u otro valor.
fuente: 'Fuente: Moraleja Tomo 2 68, Cid 45.'
estado: publicado
