semantic_id: MAT.ALG.ADICION_POL.METODO_VERTICAL
objetivo: Sumar polinomios mediante el método vertical, alineando los términos semejantes
  en columnas.
introduccion: 'Cuando en la escuela aprendiste a sumar números de varios dígitos (unidades
  con unidades, decenas con decenas), estabas usando el método vertical. En álgebra,
  la misma lógica se aplica: cada ''columna'' agrupa una familia de términos semejantes.'
resumen: En la **Adición Vertical**, los polinomios se escriben uno debajo del otro,
  alineando los términos semejantes en columnas. Luego se suma columna por columna,
  como en la aritmética de los números.
explicacion: "Suma: $(4x^2 + 3x - 5)$ y $(2x^2 - x + 1)$.\n\nAlineamos verticalmente:\n\
  ```\n  4x² + 3x - 5\n+ 2x² -  x + 1\n─────────────\n  6x² + 2x - 4\n```\n\nEn cada\
  \ columna sumamos los coeficientes:\n- Columna $x^2$: $4 + 2 = 6$.\n- Columna $x$:\
  \ $3 + (-1) = 2$.\n- Columna constante: $-5 + 1 = -4$.\n\nResultado: $6x^2 + 2x\
  \ - 4$."
procedimiento:
- 'Paso 1: Escribe el primer polinomio.'
- 'Paso 2: Escribe el segundo polinomio debajo, alineando estrictamente los términos
  del mismo grado en la misma columna.'
- 'Paso 3: Traza una línea horizontal separadora.'
- 'Paso 4: Suma columna por columna los coeficientes.'
ejemplos:
- titulo: La suma de los pesos
  enunciado: 'Suma verticalmente: (2m^2 - 3m) + (m^2 + 5m - 4).'
  solucion_pasos:
  - 'Columna m^2: 2 + 1 = 3m^2.'
  - 'Columna m: -3 + 5 = 2m.'
  - 'Columna constante: 0 + (-4) = -4.'
  - 'Resultado: 3m^2 + 2m - 4.'
errores_frecuentes:
- Desalinear los términos, sumando coeficientes de distintas familias por error de
  columna.
- Olvidar que si un polinomio no tiene un término de cierto grado, se deja un espacio
  en blanco (coeficiente 0) en esa columna.
fuente: Álgebra de Baldor.
estado: publicado
