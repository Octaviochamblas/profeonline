semantic_id: MAT.ALG.ADICION_POL.METODO_VERTICAL
objetivo: Sumar polinomios mediante el mﾃｩtodo vertical, alineando los tﾃｩrminos semejantes en columnas.
introduccion: 'Cuando en la escuela aprendiste a sumar nﾃｺmeros de varios dﾃｭgitos (unidades con unidades, decenas
  con decenas), estabas usando el mﾃｩtodo vertical. En ﾃ｡lgebra, la misma lﾃｳgica se aplica: cada ''columna'' agrupa
  una familia de tﾃｩrminos semejantes.'
resumen: En la **Adiciﾃｳn Vertical**, los polinomios se escriben uno debajo del otro, alineando los tﾃｩrminos semejantes
  en columnas. Luego se suma columna por columna, como en la aritmﾃｩtica de los nﾃｺmeros.
explicacion: "### Definiciﾃｳn formal\n\nLa alineaciﾃｳn visual por columnas es la gran fortaleza del mﾃｩtodo vertical.\n\
  \n### Desarrollo didﾃ｡ctico\n\nSuma: $(4x^2 + 3x - 5)$ y $(2x^2 - x + 1)$.\n\nAlineamos verticalmente:\n```\n \
  \ 4xﾂｲ + 3x - 5\n+ 2xﾂｲ -  x + 1\n笏笏笏笏笏笏笏笏笏笏笏笏笏\n  6xﾂｲ + 2x - 4\n```\n\nEn cada columna sumamos los coeficientes:\n\
  - Columna $x^2$: $4 + 2 = 6$.\n- Columna $x$: $3 + (-1) = 2$.\n- Columna constante: $-5 + 1 = -4$.\n\nResultado:\
  \ $6x^2 + 2x - 4$."
procedimiento:
- 'Paso 1: Escribe el primer polinomio.'
- 'Paso 2: Escribe el segundo polinomio debajo, alineando estrictamente los tﾃｩrminos del mismo grado en la misma
  columna.'
- 'Paso 3: Traza una lﾃｭnea horizontal separadora.'
- 'Paso 4: Suma columna por columna los coeficientes.'
ejemplos:
- titulo: La suma de los pesos
  enunciado: 'Suma verticalmente: $(2m^2 - 3m) + (m^2 + 5m - 4)$.'
  solucion_pasos:
  - 'Columna $m^2$: $2 + 1 = 3m^2$.'
  - 'Columna $m$: $-3 + 5 = 2m$.'
  - 'Columna constante: 0 + (-4) = -4.'
  - 'Resultado: $3m^2 + 2m - 4$.'
- titulo: Tres proyectos describen sus costos con los polinomios $P_1 = 2t^2 + 3t$, $P_2 = t^2 - t + 5
  enunciado: 'Tres proyectos describen sus costos con los polinomios $P_1 = 2t^2 + 3t$, $P_2 = t^2 - t + 5$ y $P_3
    = 4t - 2$. ﾂｿCuﾃ｡l es el costo total combinado? (v1)


    Opciones: A) $3t^2 + 6t + 3$ ﾂｷ B) $3t^2 - 6t + 3$ ﾂｷ C) $3t^2 + 6t - 3$ ﾂｷ D) $7t^2 + 6t + 3$'
  solucion_pasos:
  - 'Col $t^2$: $2+1+0=3$. Col $t$: $3-1+4=6$. Col constante: $0+5-2=3$. Total: $3t^2+6t+3$.'
  - 'Respuesta: $3t^2 + 6t + 3$'
