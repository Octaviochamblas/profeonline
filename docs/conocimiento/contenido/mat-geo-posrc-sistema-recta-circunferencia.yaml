semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.SISTEMA_RECTA_CIRCUNFERENCIA
titulo: Resolución de sistemas para hallar intersecciones entre recta y circunferencia
objetivo: Resolver el sistema formado por las ecuaciones de una recta y una circunferencia, para encontrar
  sus puntos de intersección.
introduccion: Los puntos de intersección entre una recta y una circunferencia se obtienen sustituyendo
  la ecuación de la recta en la de la circunferencia, resultando en una ecuación cuadrática en una sola
  variable.
resumen: Para hallar la intersección entre una recta $y=mx+b$ y una circunferencia $(x-h)^2+(y-k)^2=r^2$,
  se sustituye la expresión de $y$ en la ecuación de la circunferencia, obteniendo una ecuación cuadrática
  en $x$.
explicacion: '![Sistema recta-circunferencia](/static/img/geometria/analitica/posrc-sistema-recta-circunferencia.svg)


  ### Definición formal


  Sustituyendo $y=mx+b$ en $(x-h)^2+(y-k)^2=r^2$, se obtiene una ecuación cuadrática $Ax^2+Bx+C=0$, cuyas
  soluciones (si existen) dan las coordenadas x de los puntos de intersección.


  ### Desarrollo didáctico


  Para la recta $y=3$ y la circunferencia $x^2+y^2=25$: sustituyendo, $x^2+9=25$, por lo que $x^2=16$,
  dando $x=4$ o $x=-4$. Los puntos de intersección son $(4,3)$ y $(-4,3)$.'
procedimiento:
- 'Paso 1: Despeja y en la ecuación de la recta (si no lo está ya).'
- 'Paso 2: Sustituye esa expresión de y en la ecuación de la circunferencia.'
- 'Paso 3: Resuelve la ecuación cuadrática resultante en x, y luego calcula el valor de y correspondiente
  para cada solución.'
ejemplos:
- titulo: Encontrar la intersección entre y=3 y x²+y²=25
  enunciado: Recta horizontal, circunferencia dada.
  solucion_pasos:
  - 'Sustituyendo: x²+9=25 → x²=16 → x=±4. Los puntos son (4,3) y (-4,3).'
- titulo: Encontrar la intersección entre x=0 y x²+y²=16
  enunciado: Recta vertical, circunferencia dada.
  solucion_pasos:
  - 'Sustituyendo: 0+y²=16 → y=±4. Los puntos son (0,4) y (0,-4).'
- titulo: ¿La sustitución siempre genera una ecuación cuadrática en una variable?
  respuesta: Sí
  solucion_pasos:
  - Sí, al sustituir una variable en función de la otra, la ecuación de la circunferencia se convierte
    en cuadrática.
- titulo: ¿Puede este sistema tener cero, una o dos soluciones reales?
  respuesta: Sí
  solucion_pasos:
  - Sí, dependiendo de si la recta es exterior, tangente o secante a la circunferencia.
errores_frecuentes:
- Olvidar sustituir correctamente la expresión completa de y en la ecuación de la circunferencia.
- Cometer errores algebraicos al expandir el cuadrado de la expresión sustituida.
- Olvidar calcular el valor correspondiente de y después de encontrar cada solución de x.
fuente: Elaboración propia.
estado: publicado
