semantic_id: MAT.NUM.PROP_INVERSA.PROBLEMAS_CONTEXTO
objetivo: Resolver problemas cotidianos utilizando el modelo de proporcionalidad inversa.
introduccion: ¿Cómo calculas a qué velocidad debes manejar para llegar a tiempo si
  saliste tarde? Este tipo de cálculos, donde apurar el paso reduce la demora, se
  resuelven utilizando proporcionalidad inversa.
resumen: Los problemas de proporción inversa se resuelven igualando los productos
  de las variables ($x_1 \cdot y_1 = x_2 \cdot y_2$) o usando el modelo $y = k/x$.
explicacion: 'En la vida diaria, las proporciones inversas aparecen típicamente en
  tres contextos: tiempo y velocidad, tiempo y cantidad de trabajadores, o reparto
  equitativo de un recurso fijo.


  Para resolverlos, el método más seguro no es la regla de tres cruzada (que se usa
  en directa), sino **igualar los productos** (regla de tres inversa). Si la situación
  inicial tiene valores $x_1$ e $y_1$, y la situación final tiene $x_2$ e $y_2$, se
  cumple que:

  $$x_1 \cdot y_1 = x_2 \cdot y_2$$

  De aquí simplemente despejas el valor desconocido.'
procedimiento:
- 'Paso 1: Confirma que la relación es inversa (más trabajadores = menos días).'
- 'Paso 2: Multiplica los dos datos de la situación inicial conocida para obtener
  $k$.'
- 'Paso 3: Divide esa constante $k$ por el único dato conocido de la situación final
  para hallar la incógnita.'
ejemplos:
- titulo: Pintores y días
  enunciado: Si 3 pintores pintan una casa en 12 días, ¿cuántos días demorarán 4 pintores?
  solucion_pasos:
  - Es inversa (más pintores, menos días).
  - 'Calculamos el trabajo total: $3 \text{ pintores} \cdot 12 \text{ días} = 36$
    días-pintor ($k$).'
  - 'Dividimos por la nueva cantidad: $36 / 4 \text{ pintores} = 9$ días.'
errores_frecuentes:
- Aplicar la regla de tres simple cruzada ($x = 4\cdot12/3 = 16$), obteniendo absurdamente
  que más pintores demoran más.
- 'No verificar lógicamente el resultado (preguntarse: ¿tiene sentido que demoren
  más si son más?).'
fuente: Currículum Nacional MINEDUC.
estado: publicado
