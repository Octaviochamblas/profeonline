semantic_id: MAT.ALG.FRACCIONES_BASE.ERROR_RESTRICCIONES
titulo: Detección de error por omitir restricciones de la variable
objetivo: Comprender que las restricciones de dominio de una fracción deben calcularse ANTES de simplificarla.
introduccion: Un error muy común es simplificar una fracción algebraicamente y olvidarse de dónde venía.
  Cuando cancelas un factor del denominador, parece que el "peligro" ha desaparecido, pero no es así para
  la función original.
resumen: Las restricciones del dominio (donde el denominador se hace cero) deben determinarse a partir
  de la expresión ORIGINAL, antes de cualquier simplificación o tachado de factores.
explicacion: '### Definición formal


  Es lo que en funciones se llama una ''discontinuidad evitable'' o ''agujero'', el punto sigue sin existir.


  ### Desarrollo didáctico


  Un error conceptual profundo es creer que al simplificar una fracción, sus restricciones originales
  desaparecen o ya no importan.


  Analiza este caso: $\frac{x^2 - 4}{x - 2}$.

  - Restricción inicial mirando el denominador: $x - 2 = 0 \rightarrow x \neq 2$. (Si x es 2, la expresión
  queda indefinida).

  - Ahora simplificamos. Factorizamos arriba como diferencia de cuadrados: $\frac{(x-2)(x+2)}{x-2}$.

  - Tachamos los $(x-2)$. El resultado es bellísimo y simple: $x + 2$.


  Pero cuidado. Aunque el resultado $x + 2$ no tenga denominador aparente, **hereda genéticamente la restricción
  original**. La respuesta matemáticamente rigurosa es: ''El resultado es $x+2$, pero con la condición
  de que $x \neq 2$''.


  Si olvidas arrastrar las restricciones, estás diciendo que la función existe en $x=2$, lo cual contradice
  el problema original.'
procedimiento:
- 'Paso 1: Toma la fracción exactamente como te la dieron en el problema inicial.'
- 'Paso 2: Iguala el denominador inicial a cero y calcula sus raíces. ESAS son las restricciones eternas.'
- 'Paso 3: Ahora sí, factoriza y simplifica.'
- 'Paso 4: Presenta tu respuesta simplificada, pero anexando las restricciones que descubriste en el Paso
  2.'
ejemplos:
- titulo: Simplifica y da las restricciones de $\frac{3x - 15}{x^2 - 5x}$
  enunciado: Simplifica y da las restricciones de $\frac{3x - 15}{x^2 - 5x}$.
  solucion_pasos:
  - '1. Restricciones iniciales: Denom $x^2 - 5x = x(x-5) = 0$. Las restricciones son $x \neq 0$ y $x
    \neq 5$.'
  - '2. Simplificamos: Arriba $3(x-5)$, abajo $x(x-5)$.'
  - 3. Cancelamos $(x-5)$. Queda $\frac{3}{x}$.
  - '4. Resultado final: $\frac{3}{x}$, con restricciones $x \neq 0$ y $x \neq 5$.'
- titulo: Simplifica $\frac{x^2+x}{x+1}$
  solucion_pasos:
  - El factor (x+1) se cancela, pero la restricción de que x no puede ser -1 se mantiene viva.
- titulo: 'Respecto de «Detección de error por omitir restricciones de la variable»: ¿Describe adecuada'
  enunciado: 'Respecto de «Detección de error por omitir restricciones de la variable»: ¿Describe adecuadamente
    el concepto esta frase? «Las restricciones del dominio (donde el denominador se hace cero) deben determinarse
    a partir de la expresión ORIGINAL, antes de cualquier simplificación o tachado de factores»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Las restricciones del dominio (donde el denominador
    se hace cero) deben determinarse a partir de la expresión ORIGINAL, antes de cualquier simplificación
    o tachado de factores.'
- titulo: 'Respecto de «Detección de error por omitir restricciones de la variable»: ¿Se puede aceptar'
  enunciado: 'Respecto de «Detección de error por omitir restricciones de la variable»: ¿Se puede aceptar
    esta afirmación? «Simplificar primero y luego buscar las restricciones en la fracción resultante (perdiendo
    restricciones en el camino)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Las restricciones del dominio (donde el denominador
    se hace cero) deben determinarse a partir de la expresión ORIGINAL, antes de cualquier simplificación
    o tachado de factores.'
errores_frecuentes:
- Simplificar primero y luego buscar las restricciones en la fracción resultante (perdiendo restricciones
  en el camino).
- Considerar que $0/0$ da 1.
- Porque la simplificación hace que las fracciones desaparezcan.
- Para «¿Por qué es obligatorio calcular las restricciones antes de simplificar una fracción algebraica»,
  la respuesta correcta es Para evitar sumar polinomios equivocados.
- Es solo una regla mnemotécnica sin base lógica.
