semantic_id: MAT.GEO.CIRCULO_RECTAS.TANGENTE
titulo: Definición de recta tangente a una circunferencia como recta con un solo punto de intersección
objetivo: Reconocer una recta tangente a una circunferencia como aquella que la toca en exactamente un
  punto.
introduccion: 'Existe un caso límite muy especial entre la recta secante (dos puntos) y la exterior (ningún
  punto): cuando la recta apenas roza la circunferencia en un único punto.'
resumen: Una recta es tangente a una circunferencia cuando la toca en exactamente un punto; la distancia
  del centro a la recta es igual al radio.
explicacion: '![Recta tangente: un solo punto de intersección](/static/img/geometria/circunferencia-circulo/circulo-recta-tangente.svg)


  ### Definición formal


  Una recta $L$ es tangente a una circunferencia de centro $O$ y radio $r$ si la distancia de $O$ a $L$
  es exactamente igual a $r$: $d(O,L)=r$. En este caso, $L$ y la circunferencia comparten exactamente
  un punto, llamado punto de tangencia.


  ### Desarrollo didáctico


  La recta tangente representa el caso límite exacto entre la secante (que corta en dos puntos) y la exterior
  (que no corta en ninguno): es el punto de transición donde ambos puntos de intersección de una secante
  ''se juntan'' en uno solo.'
procedimiento:
- 'Paso 1: Calcula la distancia entre el centro de la circunferencia y la recta.'
- 'Paso 2: Compara esa distancia con el radio de la circunferencia.'
- 'Paso 3: Si la distancia es exactamente igual al radio, la recta es tangente.'
ejemplos:
- titulo: Identificar una recta tangente
  enunciado: Una circunferencia tiene radio 5 cm, y una recta está exactamente a 5 cm del centro.
  solucion_pasos:
  - La recta es tangente, ya que la distancia es igual al radio.
- titulo: Distinguir tangente de secante
  enunciado: Una recta está a 4,9 cm del centro de una circunferencia de radio 5 cm.
  solucion_pasos:
  - La recta es secante (no tangente), ya que 4,9<5, aunque esté muy cerca del caso tangente.
- titulo: ¿Una recta tangente comparte más de un punto con la circunferencia?
  respuesta: 'No'
  solucion_pasos:
  - No, comparte exactamente un único punto, llamado punto de tangencia.
- titulo: ¿La recta tangente es un caso límite entre secante y exterior?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el punto de transición exacto entre ambos casos.
errores_frecuentes:
- Confundir una recta tangente con una secante muy cercana al caso límite, sin verificar la igualdad exacta.
- Creer que una recta que 'parece tocar' la circunferencia visualmente es necesariamente tangente.
- Olvidar que la condición matemática exacta es d(O,L)=r, no una aproximación.
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
