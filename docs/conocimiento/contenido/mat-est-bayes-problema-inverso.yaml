semantic_id: MAT.EST.REGLA_BAYES.PROBLEMA_INVERSO
titulo: Identificación de problemas de probabilidad inversa
objetivo: Identificar un problema de probabilidad inversa como aquel en que se conoce P(B|A) y se busca
  calcular P(A|B), el orden condicional opuesto.
introduccion: Muchos problemas de la vida real dan información en un sentido (por ejemplo, la probabilidad
  de un síntoma dado que existe una enfermedad) y preguntan en el sentido contrario (la probabilidad de
  la enfermedad dado el síntoma).
resumen: Un problema de probabilidad inversa es aquel en que se conocen probabilidades del tipo $P(B|A)$
  y se pide calcular $P(A|B)$, el orden condicional invertido.
explicacion: '![Problemas de probabilidad inversa](/static/img/probabilidad/bayes/bayes-problema-inverso.svg)


  ### Definición formal


  Si los datos disponibles son $P(A)$, $P(B|A)$ (y similares para otras categorías), pero la pregunta
  es $P(A|B)$, se trata de un problema de probabilidad inversa, resuelto mediante la regla de Bayes.


  ### Desarrollo didáctico


  Un problema típico: se sabe que el 90% de los enfermos da positivo en una prueba (P(positivo|enfermo)=0,9),
  pero se pregunta: si una persona dio positivo, ¿cuál es la probabilidad de que realmente esté enferma?
  (P(enfermo|positivo)=?). Ese cambio de dirección es lo que define el problema como inverso.'
procedimiento:
- 'Paso 1: Identifica qué probabilidad condicional se conoce como dato en el enunciado.'
- 'Paso 2: Identifica qué probabilidad condicional se pregunta calcular.'
- 'Paso 3: Si el orden de los eventos está invertido entre el dato conocido y la pregunta, se trata de
  un problema de probabilidad inversa, que requiere la regla de Bayes.'
ejemplos:
- titulo: Reconocer un problema de probabilidad inversa médico
  enunciado: 'Dato: P(positivo|enfermo)=0,9. Pregunta: P(enfermo|positivo)=?'
  solucion_pasos:
  - 'El orden está invertido entre el dato y la pregunta: es un problema de probabilidad inversa.'
- titulo: Reconocer un problema que NO es de probabilidad inversa
  enunciado: 'Dato: P(enfermo)=0,05. Pregunta: P(positivo|enfermo)=?'
  solucion_pasos:
  - El orden coincide (ambos condicionan de la misma forma esperada), no es un problema de probabilidad
    inversa en el sentido estricto de requerir Bayes para invertir el condicionamiento.
- titulo: ¿La regla de Bayes es la herramienta para resolver problemas de probabilidad inversa?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente su propósito principal.
- titulo: ¿Es común que el dato conocido en estos problemas provenga de estudios previos o pruebas de
    laboratorio?
  respuesta: Sí
  solucion_pasos:
  - Sí, típicamente P(B|A) proviene de estudios controlados (por ejemplo, sensibilidad de una prueba médica),
    mientras que P(A|B) es lo que se necesita inferir en la práctica.
errores_frecuentes:
- Confundir P(A|B) con P(B|A), asumiendo que son iguales sin verificar.
- No reconocer que un problema requiere 'invertir' el condicionamiento, intentando resolverlo con la fórmula
  directa incorrecta.
- Aplicar directamente el dato conocido como si fuera la respuesta buscada, sin aplicar la regla de Bayes.
fuente: Elaboración propia.
estado: publicado
