semantic_id: MAT.EST.INDEPENDENCIA_CONDICIONAL.VERIFICACION_PRODUCTO
titulo: Verificación de independencia usando P(A∩B) = P(A)·P(B)
objetivo: Verificar si dos eventos son independientes, comparando la probabilidad de su intersección con
  el producto de sus probabilidades individuales.
introduccion: 'Existe una forma alternativa (y equivalente) de verificar independencia, sin necesidad
  de calcular una probabilidad condicional directamente: comparar P(A∩B) con P(A)×P(B).'
resumen: Dos eventos $A$ y $B$ son independientes si y solo si $P(A\cap B)=P(A)\times P(B)$.
explicacion: '![Verificación de independencia mediante el producto](/static/img/probabilidad/independencia/indep-verificacion-producto.svg)


  ### Definición formal


  Si $P(A\cap B)=P(A)\times P(B)$, entonces $A$ y $B$ son independientes; si $P(A\cap B)\neq P(A)\times
  P(B)$, son dependientes.


  ### Desarrollo didáctico


  Al lanzar una moneda y un dado, P(cara)=0,5, P(número par)=0,5, y P(cara y par)=0,25. Como $0{,}5\times0{,}5=0{,}25$,
  coincide exactamente, confirmando que son independientes.'
procedimiento:
- 'Paso 1: Calcula P(A) y P(B) por separado.'
- 'Paso 2: Calcula el producto P(A)×P(B).'
- 'Paso 3: Compara ese producto con P(A∩B) calculado directamente: si coinciden, son independientes.'
ejemplos:
- titulo: Verificar independencia con el producto
  enunciado: P(cara)=0,5, P(par)=0,5, P(cara y par)=0,25.
  solucion_pasos:
  - '0,5×0,5=0,25, coincide con P(cara y par): son independientes.'
- titulo: Detectar dependencia con este método
  enunciado: P(A)=0,4, P(B)=0,5, P(A∩B)=0,3.
  solucion_pasos:
  - 0,4×0,5=0,2≠0,3, por lo que A y B son dependientes.
- titulo: ¿Este método es equivalente a comparar P(A|B) con P(A)?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos métodos verifican matemáticamente la misma condición de independencia, solo con distinta
    forma de cálculo.
- titulo: ¿Se necesita calcular una probabilidad condicional para usar este método?
  respuesta: 'No'
  solucion_pasos:
  - 'No, esa es su ventaja: se puede verificar independencia sin calcular directamente P(A|B).'
errores_frecuentes:
- Sumar P(A) y P(B) en vez de multiplicarlos al aplicar este criterio.
- Confundir este método con la regla de la suma para eventos excluyentes.
- Calcular incorrectamente P(A∩B), llevando a una conclusión errónea sobre la independencia.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
