semantic_id: MAT.GEO.MEDICION_ANGULAR.SISTEMA_CENTESIMAL
titulo: Sistema centesimal de medición angular en gradianes
objetivo: Interpretar medidas angulares en gradianes y comprobar que en este sistema la media vuelta corresponde
  a 200 gradianes.
introduccion: Así como el sistema sexagesimal reparte la vuelta en 360 partes, el centesimal la reparte
  en 400. Cambia la escala, no la abertura geométrica. Este recurso se centra en sistema centesimal de
  medición angular en gradianes y en cómo reconocerlo con un criterio geométrico claro.
resumen: El sistema centesimal divide la vuelta completa en 400 gradianes. Como idea de control, en este
  sistema la media vuelta corresponde a 200 gradianes.
explicacion: 'El sistema centesimal divide la vuelta completa en 400 gradianes.


  En el caso “un ángulo recto equivale a 100 gradianes en el sistema centesimal” esta idea se vuelve visible
  y permite comprobar que en este sistema la media vuelta corresponde a 200 gradianes.'
procedimiento:
- 'Paso 1: Reconoce que la unidad empleada es el gradian o gon.'
- 'Paso 2: Relaciona la medida con la vuelta completa de 400 gradianes.'
- 'Paso 3: Comprueba equivalencias simples como 100 gradianes para un recto y 200 para una media vuelta.'
ejemplos:
- titulo: Lectura del dibujo — Sistema centesimal
  enunciado: Un ángulo recto equivale a 100 gradianes en el sistema centesimal.
  solucion_pasos:
  - Reconoce que la unidad empleada es el gradian o gon.
  - Relaciona la medida con la vuelta completa de 400 gradianes.
  - Comprueba equivalencias simples como 100 gradianes para un recto y 200 para una media vuelta.
- titulo: Chequeo del procedimiento — Sistema centesimal
  enunciado: 'Revisa una solución del caso “un ángulo recto equivale a 100 gradianes en el sistema centesimal”:
    el resultado parece razonable, pero falta conectar el dibujo con la definición. Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: el sistema centesimal divide la vuelta completa en 400 gradianes.'
  - Relaciona la medida con la vuelta completa de 400 gradianes.
  - Comprueba equivalencias simples como 100 gradianes para un recto y 200 para una media vuelta.
- titulo: ¿El caso confirma que en este sistema la media vuelta corresponde a 200 gradianes? — Sistema
    centesimal
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: el sistema centesimal divide la vuelta completa
    en 400 gradianes.'
  - En el caso “un ángulo recto equivale a 100 gradianes en el sistema centesimal” se observa que en este
    sistema la media vuelta corresponde a 200 gradianes.
  - Comprueba equivalencias simples como 100 gradianes para un recto y 200 para una media vuelta.
- titulo: ¿Se puede cerrar sin el control final? — Sistema centesimal
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de sistema centesimal de medición angular
    en gradianes.
  - Después del paso “Reconoce que la unidad empleada es el gradian o gon.” todavía hace falta revisar
    “Relaciona la medida con la vuelta completa de 400 gradianes.”.
  - El cierre correcto exige “Comprueba equivalencias simples como 100 gradianes para un recto y 200 para
    una media vuelta.”.
errores_frecuentes:
- Sistema centesimal significa usar 360 como vuelta completa también en el sistema centesimal.
- Para resolver sistema centesimal, basta con el paso “Reconoce que la unidad empleada es el gradian o
  gon.” y no hace falta revisar “Relaciona la medida con la vuelta completa de 400 gradianes.”.
- Si el dibujo parece claro, se puede ignorar que en este sistema la media vuelta corresponde a 200 gradianes.
- Dos configuraciones distintas representan sistema centesimal solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba equivalencias simples como 100
  gradianes para un recto y 200 para una media vuelta.”.
fuente: Currículum Nacional MINEDUC — Medición angular, sistemas sexagesimal, radial y centesimal.
