semantic_id: MAT.EST.COMBINACIONES.PASCAL_COEFICIENTES
titulo: Relacionar las filas del Triángulo de Pascal con los coeficientes binomiales C(n,r)
objetivo: Relacionar cada fila del Triángulo de Pascal con los valores de C(n,r), identificando que la
  fila n contiene exactamente los coeficientes C(n,0), C(n,1), ..., C(n,n).
introduccion: Esta relación permite leer directamente el valor de una combinación desde el Triángulo de
  Pascal, sin necesidad de calcular la fórmula factorial, siempre que n no sea demasiado grande.
resumen: La fila $n$ del Triángulo de Pascal (comenzando a contar desde la fila 0) contiene, en orden,
  los valores $C(n,0), C(n,1), C(n,2), \ldots, C(n,n)$.
explicacion: '![Triángulo de Pascal y coeficientes binomiales](/static/img/probabilidad/comb/comb-pascal-coeficientes.svg)


  ### Definición formal


  El término en la posición $r$ (comenzando desde 0) de la fila $n$ del Triángulo de Pascal es exactamente
  $C(n,r)=\binom{n}{r}$.


  ### Desarrollo didáctico


  La fila 4 del triángulo es 1, 4, 6, 4, 1. Esto corresponde exactamente a $C(4,0)=1$, $C(4,1)=4$, $C(4,2)=6$,
  $C(4,3)=4$, $C(4,4)=1$, lo cual se puede verificar con la fórmula factorial.'
procedimiento:
- 'Paso 1: Identifica el valor de n (número de la fila) y r (posición dentro de la fila, comenzando en
  0).'
- 'Paso 2: Ubica la fila n en el Triángulo de Pascal (construyéndola si es necesario).'
- 'Paso 3: Lee el valor en la posición r de esa fila: ese valor es exactamente C(n,r).'
ejemplos:
- titulo: Leer C(4,2) desde el Triángulo de Pascal
  enunciado: 'Fila 4: 1, 4, 6, 4, 1.'
  solucion_pasos:
  - La posición 2 (comenzando en 0) de la fila 4 es 6. Por lo tanto, C(4,2)=6.
- titulo: Leer C(5,3) desde el Triángulo de Pascal
  enunciado: 'Fila 5: 1, 5, 10, 10, 5, 1.'
  solucion_pasos:
  - La posición 3 de la fila 5 es 10. Por lo tanto, C(5,3)=10.
- titulo: ¿El primer término de cada fila corresponde a C(n,0)?
  respuesta: Sí
  solucion_pasos:
  - Sí, y su valor siempre es 1, coincidiendo con C(n,0)=1 para cualquier n.
- titulo: ¿Se puede verificar el valor leído del triángulo usando la fórmula factorial de C(n,r)?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos métodos deben dar exactamente el mismo resultado, ya que representan la misma cantidad.
errores_frecuentes:
- Confundir la posición r dentro de la fila, contando desde 1 en vez de desde 0.
- Ubicar una fila incorrecta del triángulo al buscar C(n,r).
- Olvidar que este método solo es práctico para valores pequeños de n; para n grandes conviene usar la
  fórmula factorial directamente.
fuente: 'Elaboración propia (referencia: Baldor 376, Moraleja 300).'
estado: publicado
