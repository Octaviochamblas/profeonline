semantic_id: MAT.GEO.CUERPOS_REDONDOS_METRICA.CONO_VOLUMEN
titulo: Cálculo del volumen del cono
objetivo: Calcular el volumen de un cono a partir del radio de su base y su altura.
introduccion: El volumen de un cono es exactamente un tercio del volumen de un cilindro con la misma base
  y altura.
resumen: El volumen de un cono de radio $r$ y altura $h$ es $V = \frac{\pi r^2 h}{3}$.
explicacion: '![Volumen del cono](/static/img/geometria/espacio-cuerpos/cono-volumen.svg)


  ### Definición formal


  El volumen de un cono es un tercio del producto entre el área de su base circular ($\pi r^2$) y su altura
  ($h$): $V=\frac{\pi r^2 h}{3}$.


  ### Desarrollo didáctico


  Si un cono tiene radio 3 cm y altura 6 cm, su volumen es $V=\frac{\pi(3)^2(6)}{3}=\frac{54\pi}{3}=18\pi\approx56,52$
  cm³ (usando π≈3,14). Puede verificarse experimentalmente que se necesitan exactamente 3 conos de estas
  medidas para llenar un cilindro de igual radio y altura.'
procedimiento:
- 'Paso 1: Identifica el radio (r) de la base circular y la altura (h) del cono.'
- 'Paso 2: Calcula el volumen del cilindro equivalente (misma base y altura): πr²h.'
- 'Paso 3: Divide ese resultado entre 3 para obtener el volumen del cono: V=(πr²h)/3.'
ejemplos:
- titulo: Calcular el volumen de un cono
  enunciado: Un cono tiene radio 3 cm y altura 6 cm (π≈3,14).
  solucion_pasos:
  - V=(3,14×9×6)/3=169,56/3=56,52 cm³.
- titulo: Calcular la altura a partir del volumen
  enunciado: Un cono tiene volumen 100,48 cm³ y radio 4 cm (π≈3,14).
  solucion_pasos:
  - 100,48=(3,14×16×h)/3 → 301,44=50,24h → h=301,44/50,24=6 cm.
- titulo: ¿El volumen del cono es un tercio del cilindro equivalente?
  respuesta: Sí
  solucion_pasos:
  - Sí, con la misma base y altura, el cono tiene exactamente un tercio del volumen del cilindro.
- titulo: ¿Se necesita conocer la generatriz para calcular el volumen del cono?
  respuesta: 'No'
  solucion_pasos:
  - No, el volumen solo requiere el radio y la altura; la generatriz se usa para el área, no para el volumen.
errores_frecuentes:
- Olvidar dividir entre 3, calculando el volumen como si fuera un cilindro completo.
- Confundir la altura con la generatriz al aplicar esta fórmula.
- Elevar el radio a una potencia incorrecta (distinta de 2) en la fórmula.
fuente: 'Elaboración propia (referencias: Moraleja 98, Cid 181).'
estado: publicado
