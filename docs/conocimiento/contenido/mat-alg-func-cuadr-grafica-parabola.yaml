semantic_id: MAT.ALG.FUNC_CUADR_GRAFICA.PARABOLA
titulo: Reconocimiento de la parábola como gráfica de una función cuadrática
objetivo: Reconocer la parábola como la curva característica que representa gráficamente a toda función cuadrática.
introduccion: A diferencia de la recta que representa a una función afín, toda función cuadrática se grafica siempre
  como una curva suave con forma de "U" (o "U" invertida).
resumen: 'La gráfica de toda **función cuadrática** es una **parábola**: una curva simétrica con un único punto
  extremo (el vértice), que se abre hacia arriba o hacia abajo según el signo del coeficiente $a$.'
explicacion: '### Definición formal


  La gráfica de $f(x)=ax^2+bx+c$ (con $a\neq0$) es siempre una parábola: el lugar geométrico de los puntos $(x,f(x))$
  para todo $x \in \mathbb{R}$. Esta curva es simétrica respecto a una recta vertical llamada eje de simetría,
  que pasa por su único punto extremo, el vértice.


  ### Desarrollo didáctico


  Reconocer que la gráfica siempre es una parábola permite anticipar su forma general antes de calcular puntos
  específicos: una curva suave, sin esquinas, simétrica, con un solo punto más alto o más bajo.


  La gráfica de $f(x)=x^2$ es la parábola más simple: una "U" con vértice en el origen $(0,0)$, simétrica respecto
  al eje $y$.'
procedimiento:
- 'Paso 1: Verifica que la función sea cuadrática (con $a\neq0$).'
- 'Paso 2: Reconoce que su gráfica será necesariamente una parábola, sin importar los valores específicos de los
  coeficientes.'
ejemplos:
- titulo: Reconocimiento de la forma parabólica
  enunciado: '¿Qué forma tiene la gráfica de $f(x)=-2x^2+3x-1$?'
  solucion_pasos:
  - Es una función cuadrática, con $a=-2 \neq 0$.
  - Su gráfica es una parábola.
- titulo: Comparación con una función afín
  enunciado: '¿La gráfica de $g(x)=4x-7$ es una parábola?'
  solucion_pasos:
  - No es una función cuadrática, sino afín (de primer grado).
  - Su gráfica es una recta, no una parábola.
- titulo: ¿Toda parábola tiene exactamente un punto extremo?
  enunciado: ¿Toda parábola tiene exactamente un punto extremo?
  respuesta: Sí
  solucion_pasos:
  - Ese punto extremo es el vértice, que puede ser un máximo o un mínimo según la concavidad.
- titulo: ¿Puede la gráfica de una función cuadrática tener esquinas o quiebres?
  enunciado: ¿Puede la gráfica de una función cuadrática tener esquinas o quiebres?
  respuesta: 'No'
  solucion_pasos:
  - La parábola es una curva suave y continua en todos sus puntos, sin ningún quiebre ni esquina.
errores_frecuentes:
- Confundir la gráfica de una función cuadrática con la de una función afín (recta) o con otras curvas.
- Dibujar la parábola con esquinas en vez de una curva suave.
- Asumir que toda parábola tiene su vértice en el origen del plano.
- No reconocer que la simetría de la gráfica es una propiedad esencial de toda parábola.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
