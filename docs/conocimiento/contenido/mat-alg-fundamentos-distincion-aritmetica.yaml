semantic_id: MAT.ALG.FUNDAMENTOS.DISTINCION_ARITMETICA
objetivo: Identificar las diferencias clave entre el enfoque aritmético y el enfoque
  algebraico.
introduccion: Si la Aritmética es tomar una fotografía de un solo instante numérico,
  el Álgebra es grabar un video de todo lo que podría pasar. Ambas ramas operan parecido,
  pero sus alcances son muy diferentes.
resumen: La diferencia principal es que la **Aritmética** solo representa cantidades
  con **números exactos** (ej. $20$). El número $20$ siempre vale $20$. El **Álgebra**,
  en cambio, usa **letras** (ej. $x$) que pueden tomar cualquier valor (generalización)
  o representar un valor exacto pero que aún ignoramos (incógnita).
explicacion: 'Piensa en el precio de una entrada al cine.

  - **Aritmética:** ''Compré 3 entradas a 5.000 pesos cada una. Total = $3 \cdot 5000
  = 15000$ pesos''. Se aplica a este cine, hoy.

  - **Álgebra:** ''Compré 3 entradas a un precio $p$. Total = $3p$''. Esta expresión
  $3p$ sirve para cuando haya ofertas, cuando suba la inflación, o para un cine en
  otro país.


  En la aritmética las cantidades tienen valores absolutos y determinados. En el álgebra,
  son valores relativos, variables o sujetos a descubrimiento.'
procedimiento:
- 'Paso 1: Observa la expresión matemática.'
- 'Paso 2: Si solo ves números explícitos y operaciones directas (5 + 8 / 2), es Aritmética.'
- 'Paso 3: Si ves letras representando partes de la operación (5x + 8 / y), es Álgebra.'
ejemplos:
- titulo: Comparación directa
  enunciado: 'Clasifica como Aritmética o Álgebra: a) 4 + 7 = 11, b) a + b = c'
  solucion_pasos:
  - a) 4 + 7 = 11. Solo usa números conocidos absolutos. Es Aritmética.
  - b) a + b = c. Usa letras para generalizar la suma. Es Álgebra.
errores_frecuentes:
- Creer que la Aritmética no usa reglas o fórmulas (sí las usa, pero para números
  conocidos).
- Asumir que un cálculo algebraico siempre da una letra como resultado (puede dar
  un número exacto si se conocen o se anulan las variables).
fuente: Álgebra de Baldor.
estado: publicado
