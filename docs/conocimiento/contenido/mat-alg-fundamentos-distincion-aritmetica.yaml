semantic_id: MAT.ALG.FUNDAMENTOS.DISTINCION_ARITMETICA
objetivo: Identificar las diferencias clave entre el enfoque aritmético y el enfoque algebraico.
introduccion: Si la Aritmética es tomar una fotografía de un solo instante numérico, el Álgebra es grabar un video
  de todo lo que podría pasar. Ambas ramas operan parecido, pero sus alcances son muy diferentes.
resumen: La diferencia principal es que la **Aritmética** solo representa cantidades con **números exactos** (ej.
  $20$). El número $20$ siempre vale $20$. El **Álgebra**, en cambio, usa **letras** (ej. $x$) que pueden tomar
  cualquier valor (generalización) o representar un valor exacto pero que aún ignoramos (incógnita).
explicacion: '### Definición formal


  La generalización a través de literales es lo que separa estructuralmente al álgebra de la aritmética clásica.


  ### Desarrollo didáctico


  Piensa en el precio de una entrada al cine.

  - **Aritmética:** ''Compré 3 entradas a 5.000 pesos cada una. Total = $3 \cdot 5000 = 15000$ pesos''. Se aplica
  a este cine, hoy.

  - **Álgebra:** ''Compré 3 entradas a un precio $p$. Total = $3p$''. Esta expresión $3p$ sirve para cuando haya
  ofertas, cuando suba la inflación, o para un cine en otro país.


  En la aritmética las cantidades tienen valores absolutos y determinados. En el álgebra, son valores relativos,
  variables o sujetos a descubrimiento.'
procedimiento:
- 'Paso 1: Observa la expresión matemática.'
- 'Paso 2: Si solo ves números explícitos y operaciones directas (5 + 8 / 2), es Aritmética.'
- 'Paso 3: Si ves letras representando partes de la operación (5x + 8 / y), es Álgebra.'
- La generalización a través de literales es lo que separa estructuralmente al álgebra de la aritmética clásica.
ejemplos:
- titulo: Comparación directa
  enunciado: 'Clasifica como Aritmética o Álgebra: a) 4 + 7 = 11, b) a + b = c'
  solucion_pasos:
  - a) 4 + 7 = 11. Solo usa números conocidos absolutos. Es Aritmética.
  - b) a + b = c. Usa letras para generalizar la suma. Es Álgebra.
- titulo: Dos analistas de datos discuten cómo programar el descuento de productos en una base de dato
  enunciado: 'Dos analistas de datos discuten cómo programar el descuento de productos en una base de datos de supermercado.
    El analista A propone restar $\$500$ al precio de hoy del champú. El analista B propone establecer una celda
    que tome el precio ''$P$'' de cualquier producto y lo multiplique por $0.8$ para aplicar un $20\%$ general.
    ¿Qué enfoques usaron respectivamente? (v1)


    Opciones: A) El analista A usó un enfoque aritmético y el B un enfoque algebraico. · B) Ambos usaron un enfoque
    aritmético. · C) Ambos usaron un enfoque algebraico. · D) El analista A usó un enfoque algebraico y el B un
    enfoque aritmético.'
  solucion_pasos:
  - El caso A es un cálculo numérico específico. El caso B generaliza sobre una variable $P$, lo cual es álgebra.
  - 'Respuesta: El analista A usó un enfoque aritmético y el B un enfoque algebraico.'
