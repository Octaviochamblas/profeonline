semantic_id: MAT.NUM.SUCESIONES_BASE.COMPARACION_EXPLICITA_RECURSIVA
titulo: Diferencia entre sucesión definida por término general y por recurrencia
objetivo: Diferenciar entre la fórmula del término general (explícita) y la de recurrencia, comprendiendo
  sus ventajas.
introduccion: 'Si quieres saber qué número está en la posición 1.000 de una fila, tienes dos opciones:
  o cuentas uno a uno desde el principio (recurrencia), o tomas un atajo matemático que te deja ahí instantáneamente
  (fórmula explícita).'
resumen: La **Fórmula Explícita** ($a_n = 5n$) usa solo 'n' y te permite hallar cualquier posición directamente.
  La **Recurrencia** ($a_n = a_{n-1} + 5$) usa términos anteriores y te obliga a calcular todo paso a
  paso.
explicacion: "Una misma sucesión, por ejemplo los múltiplos de cinco ($5, 10, 15, 20\\dots$), puede escribirse\
  \ en 'dos idiomas':\n\n1. **Idioma Explícito (Término General):** $a_n = 5 \\cdot n$\n   - *Ventaja:*\
  \ Es rápido. Si quieres el término 100, haces $5 \\cdot 100 = 500$. Listo.\n   \n2. **Idioma Recursivo:**\
  \ $a_1 = 5$ y $a_n = a_{n-1} + 5$\n   - *Desventaja:* Es lento para el futuro. Si quieres el término\
  \ 100, primero debes calcular los 99 anteriores.\n   - *Ventaja:* Es muy fácil de entender y de programar\
  \ en un computador. La famosa sucesión de Fibonacci ($1, 1, 2, 3, 5, 8\\dots$) es muy fácil de escribir\
  \ como recurrencia ($a_n = a_{n-1} + a_{n-2}$), pero su fórmula explícita es horriblemente compleja."
procedimiento:
- 'Paso 1: Para identificar una fórmula EXPLÍCITA, busca que solo contenga la letra ''$n$'' operando con
  números.'
- 'Paso 2: Para identificar una fórmula RECURSIVA, busca que contenga expresiones con subíndices de posiciones
  relativas, como ''$a_{n-1}$'' o ''$a_{n-2}$''.'
- 'Paso 3: Si te piden un término muy lejano, intenta siempre deducir la explícita.'
ejemplos:
- titulo: Reconociendo el idioma
  enunciado: 'Analiza: Opción 1: $b_n = 2n + 1$. Opción 2: $b_n = b_{n-1} + 2$. ¿Cuál es cuál?'
  solucion_pasos:
  - Opción 1 solo usa 'n'. Es explícita (Término General).
  - Opción 2 usa 'b_{n-1}'. Es recursiva.
errores_frecuentes:
- Confundir el concepto de recurrencia con el de término general en preguntas de verdadero/falso.
- Intentar calcular el término cien usando una recurrencia a mano, perdiendo valioso tiempo en una prueba.
fuente: Currículum Nacional MINEDUC.
estado: publicado
