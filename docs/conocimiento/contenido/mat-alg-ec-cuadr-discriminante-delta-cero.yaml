semantic_id: MAT.ALG.EC_CUADR_DISCRIMINANTE.DELTA_CERO
titulo: Interpretación de discriminante cero como una solución real doble
objetivo: Interpretar el caso $\Delta=0$ como indicador de que la ecuación cuadrática tiene una única solución
  real (raíz doble).
introduccion: Cuando el discriminante da exactamente cero, la raíz cuadrada que aparece en la fórmula general desaparece,
  y el signo $\pm$ deja de generar dos resultados distintos.
resumen: Si $\Delta=b^2-4ac=0$, la ecuación cuadrática tiene una **única solución real**, llamada raíz doble, dada
  por $x=\dfrac{-b}{2a}$.
explicacion: '### Definición formal


  Cuando $\Delta=0$, la fórmula general $x=\dfrac{-b\pm\sqrt{\Delta}}{2a}$ se reduce a $x=\dfrac{-b}{2a}$, pues
  $\sqrt{0}=0$ elimina la parte variable del $\pm$. Esta única solución se denomina raíz doble (multiplicidad 2).


  ### Desarrollo didáctico


  Un discriminante cero señala que la parábola asociada es tangente al eje $x$: lo toca en un único punto, sin
  cruzarlo.


  En $x^2-4x+4=0$, $\Delta=16-16=0$, por lo que hay una única solución: $x=\dfrac{4}{2}=2$ (raíz doble).'
procedimiento:
- 'Paso 1: Calcula el discriminante $\Delta=b^2-4ac$.'
- 'Paso 2: Verifica que $\Delta=0$.'
- 'Paso 3: Calcula la única solución mediante $x=\dfrac{-b}{2a}$.'
ejemplos:
- titulo: Interpretación con discriminante cero
  enunciado: 'Sin resolver completamente, determina cuántas soluciones reales distintas tiene $x^2+6x+9=0$.'
  solucion_pasos:
  - '$\Delta=6^2-4(1)(9)=36-36=0$.'
  - Tiene una única solución real (raíz doble).
- titulo: Cálculo de la raíz doble
  enunciado: 'Encuentra la solución de $4x^2-4x+1=0$, sabiendo que $\Delta=0$.'
  solucion_pasos:
  - '$a=4$, $b=-4$.'
  - '$x=\dfrac{-(-4)}{2(4)}=\dfrac{4}{8}=\dfrac{1}{2}$.'
- titulo: ¿Una raíz doble cuenta como dos soluciones distintas?
  enunciado: ¿Una raíz doble cuenta como dos soluciones distintas?
  respuesta: 'No'
  solucion_pasos:
  - Es un único valor numérico repetido con multiplicidad 2, no dos valores diferentes.
- titulo: ¿Un discriminante igual a cero implica que la parábola es tangente al eje $x$?
  enunciado: ¿Un discriminante igual a cero implica que la parábola es tangente al eje $x$?
  respuesta: Sí
  solucion_pasos:
  - La parábola toca al eje $x$ en un único punto, sin cruzarlo, cuando $\Delta=0$.
errores_frecuentes:
- Reportar dos soluciones iguales como si fueran distintas en un contexto que pide contar soluciones diferentes.
- Confundir $\Delta=0$ con $\Delta<0$ (ausencia total de soluciones reales).
- Olvidar dividir por $2a$ al calcular la raíz doble.
- No verificar que efectivamente $\Delta$ sea exactamente cero antes de aplicar la fórmula simplificada.
