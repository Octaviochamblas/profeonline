semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.DELTOIDE_DEFINICION
titulo: Definición de deltoide como trapezoide simétrico
objetivo: Comprender el deltoide como un cuadrilátero con dos pares de lados adyacentes (consecutivos)
  congruentes, similar a la forma de una cometa.
introduccion: 'Dentro de los trapezoides (cuadriláteros sin lados paralelos), existe un caso particular
  con una propiedad de simetría muy reconocible: el deltoide.'
resumen: Un deltoide es un cuadrilátero que tiene dos pares de lados adyacentes (consecutivos) congruentes
  entre sí, con forma similar a una cometa.
explicacion: '![Deltoide: dos pares de lados adyacentes congruentes](/static/img/geometria/poligonos-cuadrilateros/trapecios-deltoide-definicion.svg)


  ### Definición formal


  Un deltoide $ABCD$ cumple $AB=AD$ y $CB=CD$ (dos pares de lados consecutivos iguales, a diferencia del
  paralelogramo donde los lados iguales son los opuestos).


  ### Desarrollo didáctico


  A diferencia del rombo (que tiene los cuatro lados iguales), el deltoide solo exige que los lados sean
  iguales en pares consecutivos, formando una figura con un eje de simetría a lo largo de una de sus diagonales,
  similar a la forma de una cometa voladora.'
procedimiento:
- 'Paso 1: Identifica los cuatro lados del cuadrilátero.'
- 'Paso 2: Verifica si hay dos pares de lados adyacentes (consecutivos) congruentes entre sí.'
- 'Paso 3: Si se cumple esa condición, el cuadrilátero es un deltoide.'
ejemplos:
- titulo: Identificar un deltoide
  enunciado: Un cuadrilátero tiene lados AB=AD=5 cm y CB=CD=8 cm.
  solucion_pasos:
  - Es un deltoide, ya que tiene dos pares de lados adyacentes congruentes.
- titulo: Distinguir deltoide de rombo
  enunciado: Un cuadrilátero tiene sus cuatro lados de 6 cm.
  solucion_pasos:
  - Es un rombo (y también un caso particular de deltoide, ya que un rombo cumple la condición de lados
    adyacentes iguales, coincidiendo en este caso con los cuatro lados).
- titulo: ¿El deltoide tiene un eje de simetría?
  respuesta: Sí
  solucion_pasos:
  - Sí, a lo largo de una de sus diagonales.
- titulo: ¿El deltoide tiene lados paralelos?
  respuesta: No, en general
  solucion_pasos:
  - No, en general no tiene ningún par de lados paralelos (a menos que sea un rombo).
errores_frecuentes:
- Confundir el deltoide con el rombo, sin verificar si los cuatro lados son iguales o solo pares adyacentes.
- Creer que el deltoide tiene lados opuestos iguales (como el paralelogramo), en vez de lados adyacentes.
- Asumir que el deltoide siempre tiene lados paralelos.
fuente: 'Fuente: Moraleja Tomo 2 70.'
estado: publicado
