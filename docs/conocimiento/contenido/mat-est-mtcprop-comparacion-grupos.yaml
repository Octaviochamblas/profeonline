semantic_id: MAT.EST.MTC_PROPIEDADES.COMPARACION_GRUPOS
titulo: Comparar tendencias centrales entre dos o más grupos de datos
objetivo: Comparar medidas de tendencia central (media, mediana o moda) entre dos o más poblaciones o
  grupos, para analizar diferencias entre ellos.
introduccion: Comparar grupos distintos usando una misma medida de tendencia central permite responder
  preguntas como '¿qué grupo tiene mejor desempeño en promedio?'.
resumen: Comparar tendencias centrales entre grupos consiste en calcular la misma medida (media, mediana
  o moda) para cada grupo por separado, y analizar las diferencias obtenidas.
explicacion: '![Comparación de tendencia central entre grupos](/static/img/estadistica/mtcprop/mtcprop-comparacion-grupos.svg)


  ### Definición formal


  Se calcula la misma medida $\bar{x}_A$ y $\bar{x}_B$ (u otra medida) para cada grupo A y B por separado,
  y se comparan los resultados obtenidos.


  ### Desarrollo didáctico


  Si el curso A tiene media 5,5 y el curso B tiene media 6,2 en la misma prueba, se puede afirmar que,
  en promedio, el curso B tuvo un mejor desempeño en esa evaluación.'
procedimiento:
- 'Paso 1: Identifica los grupos distintos que se quieren comparar.'
- 'Paso 2: Calcula la misma medida de tendencia central (media, mediana o moda) para cada grupo por separado.'
- 'Paso 3: Compara los resultados obtenidos entre los grupos, interpretando la diferencia en el contexto
  del estudio.'
ejemplos:
- titulo: Comparar el desempeño de dos cursos
  enunciado: 'Curso A: media=5,5. Curso B: media=6,2.'
  solucion_pasos:
  - El curso B tuvo, en promedio, un mejor desempeño que el curso A en esa evaluación.
- titulo: Comparar la mediana de ingresos entre dos comunas
  enunciado: 'Comuna X: mediana=$500.000. Comuna Y: mediana=$700.000.'
  solucion_pasos:
  - La comuna Y tiene un ingreso mediano mayor que la comuna X.
- titulo: ¿Se debe usar la misma medida de tendencia central para comparar ambos grupos de forma válida?
  respuesta: Sí
  solucion_pasos:
  - Sí, comparar medidas distintas (como la media de un grupo con la mediana del otro) no sería una comparación
    válida.
- titulo: ¿Una diferencia en la medida de tendencia central entre grupos garantiza que todos los individuos
    de un grupo superan a los del otro?
  respuesta: 'No'
  solucion_pasos:
  - No, la comparación de tendencia central es un resumen general, no garantiza que cada individuo de
    un grupo supere a todos los del otro.
errores_frecuentes:
- Comparar medidas distintas entre los grupos (por ejemplo, la media de uno con la mediana del otro),
  lo cual no es una comparación válida.
- Concluir que todos los individuos de un grupo superan a los del otro, solo por una diferencia en la
  tendencia central.
- No considerar el tamaño de cada grupo al interpretar la comparación, especialmente si son de tamaños
  muy distintos.
fuente: 'Elaboración propia (referencia: Moraleja 363, 142).'
estado: publicado
