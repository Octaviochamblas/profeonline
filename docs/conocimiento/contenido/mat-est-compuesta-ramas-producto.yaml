semantic_id: MAT.EST.PROBA_COMPUESTA_CONDICIONAL.RAMAS_PRODUCTO
titulo: Cálculo de probabilidades en ramas sucesivas del diagrama de árbol
objetivo: Calcular la probabilidad de un camino completo en un diagrama de árbol condicional, multiplicando
  las probabilidades de cada rama a lo largo de ese camino.
introduccion: Al igual que en árboles con eventos independientes, la probabilidad de un camino completo
  se obtiene multiplicando, pero ahora usando probabilidades condicionadas específicas.
resumen: La probabilidad de un camino completo en un árbol condicional es el producto de la probabilidad
  del primer nivel por la probabilidad condicional del segundo nivel correspondiente.
explicacion: '![Cálculo del producto en ramas del árbol](/static/img/probabilidad/compuesta/compuesta-ramas-producto.svg)


  ### Definición formal


  Si el camino pasa por la rama $B_i$ (probabilidad $P(B_i)$) y luego por la rama $A$ condicionada (probabilidad
  $P(A|B_i)$), la probabilidad del camino completo es $P(B_i)\times P(A|B_i)=P(A\cap B_i)$.


  ### Desarrollo didáctico


  En el ejemplo de las dos máquinas: la probabilidad de que una pieza provenga de la máquina A y sea defectuosa
  es $P(\text{A y defectuosa})=0{,}6\times0{,}05=0{,}03$.'
procedimiento:
- 'Paso 1: Identifica el camino completo de interés en el árbol (una secuencia específica de ramas).'
- 'Paso 2: Multiplica la probabilidad de la rama del primer nivel por la probabilidad condicional de la
  rama del segundo nivel.'
- 'Paso 3: Ese producto es la probabilidad de ese camino completo (una probabilidad conjunta).'
ejemplos:
- titulo: Calcular P(máquina A y defectuosa)
  enunciado: P(A)=0,6, P(defectuosa|A)=0,05.
  solucion_pasos:
  - P(A y defectuosa)=0,6×0,05=0,03.
- titulo: Calcular P(máquina B y buena)
  enunciado: P(B)=0,4, P(buena|B)=0,9.
  solucion_pasos:
  - P(B y buena)=0,4×0,9=0,36.
- titulo: ¿La probabilidad de un camino completo es siempre el producto de sus ramas?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la regla básica de cálculo en cualquier diagrama de árbol.
- titulo: ¿El resultado de este producto es una probabilidad conjunta (intersección)?
  respuesta: Sí
  solucion_pasos:
  - Sí, representa exactamente P(evento del primer nivel y evento del segundo nivel).
errores_frecuentes:
- Sumar las probabilidades de las ramas en vez de multiplicarlas.
- Usar la probabilidad condicional equivocada (de la rama incorrecta del primer nivel) al calcular el
  producto.
- Confundir la probabilidad de un solo camino con la probabilidad total del evento de interés (que puede
  requerir sumar varios caminos).
fuente: 'Elaboración propia (referencia: Moraleja 405).'
estado: publicado
