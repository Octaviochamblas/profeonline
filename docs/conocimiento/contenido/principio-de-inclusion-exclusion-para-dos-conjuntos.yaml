semantic_id: MAT.FUND.CARDINALIDAD_CONJUNTOS.INCLUSION_EXCLUSION_DOS_CONJUNTOS
titulo: Principio de inclusión-exclusión para dos conjuntos
objetivo: Aplicar el principio de inclusión-exclusión para calcular la cardinalidad de la unión o intersección
  de dos conjuntos no disjuntos.
introduccion: 'Imagina que en un grupo de amigos hay 8 que juegan fútbol ($A$) y 6 que juegan tenis ($B$).
  Si te dijeran que hay 3 amigos que practican ambos deportes al mismo tiempo ($A \cap B$), ¿cuántos amigos
  hay en total que jueguen fútbol o tenis? Si sumas directamente $8 + 6 = 14$, estarás contando dos veces
  a los 3 amigos que juegan ambos deportes (los incluiste en el grupo de fútbol y también en el de tenis).
  Para corregir este conteo doble, debes restar a los repetidos una vez: $8 + 6 - 3 = 11$. Esta regla
  de conteo se llama el Principio de Inclusión-Exclusión.'
resumen: 'El principio de inclusión-exclusión para dos conjuntos establece que la cardinalidad de la unión
  de dos conjuntos es la suma de sus cardinalidades individuales menos la cardinalidad de su intersección.
  Formalmente: $|A \cup B| = |A| + |B| - |A \cap B|$.'
explicacion: 'El **principio de inclusión-exclusión** es una propiedad fundamental de la teoría de la
  cardinalidad de conjuntos que permite realizar conteos precisos evitando la duplicación de elementos
  compartidos.


  ### Explicación de la Fórmula

  Sean $A$ y $B$ dos conjuntos finitos que se traslapan en un diagrama de Venn.

  - Al calcular $|A|$, contamos todos los elementos dentro de $A$, incluyendo la zona común con $B$.

  - Al calcular $|B|$, contamos todos los elementos dentro de $B$, volviendo a incluir la zona común.

  - ''Como la zona común ($A \cap B$) se ha contabilizado dos veces, debemos restarla una vez para obtener
  el tamaño real de la unión ($A \cup B$).''


  ### Fórmula Matemática

  $$|A \cup B| = |A| + |B| - |A \cap B|$$


  ### Despejes y Variaciones

  Esta fórmula es una ecuación lineal de cuatro variables. Si se conocen tres de ellas, se puede despejar
  la restante. Por ejemplo, para encontrar el número de elementos comunes (la intersección):

  $$|A \cap B| = |A| + |B| - |A \cup B|$$'
procedimiento:
- 'Paso 1: Identifica las cardinalidades dadas en el problema: $|A|$, $|B|$ y la intersección $|A \cap
  B|$ (o la unión $|A \cup B|$).'
- 'Paso 2: Si el problema pide la unión, aplica la fórmula: $|A \cup B| = |A| + |B| - |A \cap B|$.'
- 'Paso 3: Si el problema pide la intersección, despeja y calcula: $|A \cap B| = |A| + |B| - |A \cup B|$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: En un curso de 30 estudiantes, 18 estudian inglés ($I$), 15 estudian francés ($F$) y 7 estudian
    ambos idiomas ($I \cap F$). ¿Cuántos estudiantes estudian al menos uno de los dos idiomas?
  solucion_pasos:
  - 'Paso a: Identificamos los datos: $|I| = 18$, $|F| = 15$ y $|I \cap F| = 7$.'
  - 'Paso b: Queremos encontrar la cardinalidad de la unión $|I \cup F|$, que representa a los estudiantes
    que estudian inglés o francés.'
  - 'Paso c: Aplicamos la fórmula del principio de inclusión-exclusión: $|I \cup F| = |I| + |F| - |I \cap
    F| = 18 + 15 - 7$.'
  - 'Paso d: Realizamos la operación: $18 + 15 = 33$, y $33 - 7 = 26$. Por lo tanto, 26 estudiantes estudian
    al menos uno de los dos idiomas.'
- titulo: Ejemplo 2
  enunciado: Se sabe que en una oficina hay 25 personas. De ellas, 15 beben café ($C$) y 12 beben té ($T$).
    Si todos los trabajadores beben al menos una de las dos bebidas, calcula cuántas personas beben café
    y té.
  solucion_pasos:
  - 'Paso a: Identificamos los datos. Como todos beben al menos una bebida, la unión es igual al total
    de personas: $|C \cup T| = 25$. Además, $|C| = 15$ y $|T| = 12$.'
  - 'Paso b: Queremos encontrar el número de personas que beben ambas bebidas, es decir, la cardinalidad
    de la intersección $|C \cap T|$.'
  - 'Paso c: Utilizamos la fórmula despejada para la intersección: $|C \cap T| = |C| + |T| - |C \cup T|$.'
  - 'Paso d: Sustituimos y calculamos: $|C \cap T| = 15 + 12 - 25 = 27 - 25 = 2$. Así, 2 personas beben
    café y té.'
- titulo: ¿Es el principio de inclusión-exclusión válido si los conjuntos son disjuntos?
  respuesta: Sí
  solucion_pasos:
  - Si los conjuntos son disjuntos, entonces $|A \cap B| = 0$.
  - 'Sustituyendo en la fórmula: $|A \cup B| = |A| + |B| - 0 = |A| + |B|$, lo cual coincide con la fórmula
    de la unión disjunta.'
- titulo: ¿Si $|A| = 10$, $|B| = 8$ y $|A \cap B| = 12$, la fórmula da un resultado coherente?
  respuesta: 'No'
  solucion_pasos:
  - La intersección no puede tener más elementos que los propios conjuntos individuales.
  - Dado que la intersección $A \cap B$ está contenida en $A$ y en $B$, se debe cumplir que $|A \cap B|
    \le |A|$ y $|A \cap B| \le |B|$.
  - Por ende, un valor de 12 para la intersección es imposible si los conjuntos tienen 10 y 8 elementos.
errores_frecuentes:
- Olvidar restar la intersección al calcular la unión, lo que genera un valor total inflado (mayor que
  el universo real).
- Sumar la intersección en lugar de restarla.
- Confundir los términos 'o' (unión) e 'y' (intersección) al leer los enunciados de los problemas.
- Pensar que la unión $|A \cup B|$ siempre es igual al total de elementos del universo (a veces hay elementos
  que no pertenecen a ninguno de los dos conjuntos).
- Colocar valores en la intersección que superan el tamaño de los conjuntos individuales.
fuente: Álgebra y Trigonometría con Geometría Analítica, Editorial Cengage, pág. 612
estado: publicado
