semantic_id: MAT.EST.REPRESENTACIONES_AVANZADAS.OJIVA_LECTURA
titulo: Leer la ojiva para frecuencias relativas acumuladas
objetivo: Leer e interpretar la ojiva, un gráfico que representa la evolución de la frecuencia acumulada
  a lo largo de los distintos intervalos de clase.
introduccion: La ojiva es especialmente útil para determinar rápidamente cuántos o qué porcentaje de datos
  están por debajo de un valor determinado.
resumen: La ojiva es un gráfico que representa la frecuencia acumulada (o relativa acumulada) en función
  del límite superior de cada intervalo, conectando los puntos con una línea creciente.
explicacion: '![Lectura de la ojiva](/static/img/estadistica/repavan/repavan-ojiva-lectura.svg)


  ### Definición formal


  Cada punto de la ojiva se ubica en $(LS_i, F_i)$, el límite superior del intervalo en el eje horizontal
  y su frecuencia acumulada en el eje vertical.


  ### Desarrollo didáctico


  Si F(20)=15 y F(30)=25 en una tabla de frecuencias, la ojiva pasa por los puntos (20,15) y (30,25),
  permitiendo leer visualmente cuántos datos son menores que cualquier valor entre esos límites.'
procedimiento:
- 'Paso 1: Identifica los límites superiores de los intervalos y sus frecuencias acumuladas correspondientes.'
- 'Paso 2: Marca un punto por cada par (límite superior, frecuencia acumulada).'
- 'Paso 3: Conecta los puntos en orden creciente, formando la ojiva.'
ejemplos:
- titulo: Leer la frecuencia acumulada hasta cierto valor en una ojiva
  enunciado: Una ojiva pasa por el punto (30, 25).
  solucion_pasos:
  - Esto indica que 25 datos son menores o iguales que 30.
- titulo: Interpretar una ojiva con crecimiento rápido en un tramo
  enunciado: La ojiva sube abruptamente entre los valores 40 y 50.
  solucion_pasos:
  - Indica que hay una alta concentración de datos en ese intervalo [40-50).
- titulo: ¿La ojiva siempre es una curva o línea creciente?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que representa una frecuencia acumulada, que nunca puede disminuir.
- titulo: ¿El último punto de la ojiva corresponde siempre al total de datos (n)?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que la última frecuencia acumulada siempre es igual al total de datos.
errores_frecuentes:
- Confundir la ojiva con el polígono de frecuencias, que usa las marcas de clase y frecuencias simples,
  no acumuladas.
- Interpretar incorrectamente un tramo plano de la ojiva, que en realidad indica ausencia de datos en
  ese rango.
- No usar el límite superior de los intervalos (en vez de la marca de clase) al construir la ojiva.
fuente: 'Elaboración propia (referencia: Moraleja 51, 83).'
estado: publicado
