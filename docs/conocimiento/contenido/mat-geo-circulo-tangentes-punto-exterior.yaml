semantic_id: MAT.GEO.CIRCULO_RECTAS.TANGENTES_PUNTO_EXTERIOR_CONGRUENTES
titulo: Propiedad de congruencia de segmentos tangentes trazados desde un mismo punto exterior
objetivo: Reconocer que los dos segmentos tangentes trazados desde un mismo punto exterior a una circunferencia
  tienen siempre la misma longitud.
introduccion: Desde cualquier punto exterior a una circunferencia, siempre es posible trazar exactamente
  dos rectas tangentes; estos dos segmentos comparten una propiedad notable.
resumen: Los dos segmentos tangentes trazados desde un mismo punto exterior a una circunferencia son congruentes
  entre sí (tienen la misma longitud).
explicacion: '![Tangentes congruentes desde un punto exterior](/static/img/geometria/circunferencia-circulo/circulo-tangentes-punto-exterior.svg)


  ### Definición formal


  Si $P$ es un punto exterior a una circunferencia de centro $O$, y $PT_1$, $PT_2$ son los dos segmentos
  tangentes desde $P$ (con $T_1$, $T_2$ los puntos de tangencia), entonces $\overline{PT_1}=\overline{PT_2}$.


  ### Desarrollo didáctico


  Esta propiedad se demuestra fácilmente usando congruencia de triángulos: los triángulos $OPT_1$ y $OPT_2$
  son congruentes por el criterio LLA mayor (comparten la hipotenusa OP, tienen radios iguales OT₁=OT₂,
  y ambos ángulos en T₁ y T₂ son rectos), lo que implica que PT₁=PT₂.'
procedimiento:
- 'Paso 1: Identifica el punto exterior desde el cual se trazan las dos tangentes.'
- 'Paso 2: Identifica los dos puntos de tangencia correspondientes.'
- 'Paso 3: Los dos segmentos tangentes (desde el punto exterior hasta cada punto de tangencia) son congruentes.'
ejemplos:
- titulo: Aplicar la propiedad con un segmento conocido
  enunciado: Desde un punto P se trazan dos tangentes a una circunferencia; una de ellas mide 12 cm.
  solucion_pasos:
  - La otra tangente también mide 12 cm, por la propiedad de congruencia.
- titulo: Usar la propiedad para resolver un problema
  enunciado: Dos tangentes desde un punto P miden (3x+2) y (x+10). ¿Cuánto vale x?
  solucion_pasos:
  - 3x+2=x+10 → 2x=8 → x=4 (ambas expresiones deben ser iguales).
- titulo: ¿Cuántas tangentes se pueden trazar desde un punto exterior?
  respuesta: Exactamente dos
  solucion_pasos:
  - Exactamente dos, una hacia cada lado de la circunferencia.
- titulo: ¿Esta propiedad se puede demostrar usando congruencia de triángulos?
  respuesta: Sí
  solucion_pasos:
  - Sí, comparando los dos triángulos rectángulos formados por el centro, el punto exterior y cada punto
    de tangencia.
errores_frecuentes:
- Creer que se pueden trazar más de dos tangentes desde un mismo punto exterior.
- Olvidar que esta propiedad solo aplica a un punto EXTERIOR, no a puntos interiores o sobre la circunferencia.
- Confundir los segmentos tangentes con los radios al aplicar esta propiedad.
fuente: Elaboración propia.
estado: publicado
