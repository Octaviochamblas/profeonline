semantic_id: MAT.ALG.LEYES_MULTIPLICACION.SIGNOS_DOS_FACTORES
objetivo: Aplicar correctamente la regla de los signos al multiplicar dos factores
  algebraicos.
introduccion: ¿Qué obtienes cuando un amigo de tu amigo es tu amigo? Positivo. ¿Y
  cuando el enemigo de tu enemigo es tu amigo? También positivo. La regla de los signos
  en la multiplicación sigue exactamente esa lógica.
resumen: 'Al multiplicar dos factores, la **Regla de los Signos** establece: igual
  × igual = positivo, distinto × distinto = negativo. Específicamente: $(+)(+) = +$,
  $(-)(-)= +$, $(+)(-) = -$, $(-)(+) = -$.'
explicacion: 'Las cuatro combinaciones posibles:

  - $(+3)(+4) = +12$: positivo × positivo = positivo.

  - $(-3)(-4) = +12$: negativo × negativo = positivo.

  - $(+3)(-4) = -12$: positivo × negativo = negativo.

  - $(-3)(+4) = -12$: negativo × positivo = negativo.


  En álgebra con variables: $(-2x)(+5y) = -10xy$. El signo se determina por la regla,
  y el resto es la multiplicación normal de coeficientes y letras.'
procedimiento:
- 'Paso 1: Determina el signo del resultado según la regla (igual → positivo, distinto
  → negativo).'
- 'Paso 2: Multiplica los valores absolutos de los coeficientes.'
- 'Paso 3: Multiplica las partes literales (letras).'
- 'Paso 4: Combina el signo del paso 1 con el resultado de los pasos 2 y 3.'
ejemplos:
- titulo: Los dos casos negativos
  enunciado: 'Calcula: (-4a)(−3b).'
  solucion_pasos:
  - 'Signos: (-)(-) = +.'
  - 'Coeficientes: 4 × 3 = 12.'
  - 'Letras: a × b = ab.'
  - 'Resultado: +12ab = 12ab.'
errores_frecuentes:
- Creer que dos negativos siempre dan negativo (el opuesto es cierto en multiplicación).
- Aplicar la regla de los signos de la suma (distinto → conservar el mayor) en lugar
  de la de la multiplicación.
fuente: Álgebra de Baldor.
estado: publicado
