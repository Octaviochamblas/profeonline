semantic_id: 'MAT.ALG.FRACCIONES_COMPLEJAS.FRACCION_CONTINUA_INFINITA'
titulo: 'Fracciones Continuas Infinitas (Concepto Avanzado)'
objetivo: 'Comprender la idea y técnica básica para evaluar una fracción continua que se repite infinitamente.'
introduccion: |
  Una fracción continua infinita es una escalera que nunca toca el suelo. Parece magia negra, pero se puede resolver con un truco algebraico brillante: la auto-referencia.
resumen: |
  Para evaluar una fracción infinita repetitiva $x = 1 + \frac{1}{1 + \dots}$, se sustituye la porción repetida por la variable $x$, creando una ecuación cuadrática a resolver.
explicacion: |
  Hagamos magia.
  Sea: $x = 1 + \frac{1}{1 + \frac{1}{1 + \dots}}$

  Mira el denominador de la primera fracción: $1 + \frac{1}{1 + \dots}$
  ¿Te das cuenta de que ¡es exactamente igual a la $x$ original!?

  Entonces, podemos reemplazar todo ese infinito por $x$:
  $x = 1 + \frac{1}{x}$

  Ahora resolvemos esta ecuación normal:
  Multiplicamos todo por $x$ para matar el denominador: $x^2 = x + 1$.
  Ecuación cuadrática: $x^2 - x - 1 = 0$.
  Usando la fórmula general, obtienes que $x = \frac{1 \pm \sqrt{5}}{2}$. (El resultado positivo es el famoso 'Número de Oro').
procedimiento:
  - 'Paso 1: Asigna una variable (ej. $x$) a toda la fracción infinita.'
  - 'Paso 2: Observa el patrón y encuentra el bloque infinito interior que sea idéntico a tu fracción original.'
  - 'Paso 3: Reemplaza ese bloque interno por la variable $x$.'
  - 'Paso 4: Resuelve la ecuación algebraica resultante.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Halla el valor de $y = 2 + \frac{3}{2 + \frac{3}{2 + \dots}}$'
    solucion_pasos:
    - 'La parte que se repite en el denominador $2 + \frac{3}{\dots}$ es igual a $y$.'
    - 'Ecuación: $y = 2 + \frac{3}{y}$.'
    - 'Multiplica por y: $y^2 = 2y + 3$.'
    - 'Cuadrática: $y^2 - 2y - 3 = 0$.'
    - 'Factoriza: $(y-3)(y+1) = 0$.'
    - 'Como los términos son positivos, el valor es $y=3$.'
  - titulo: 'En la expresión $z = 4 - \frac{1}{4 - \dots}$, ¿cuál es la ecuación a resolver?'
    respuesta: '$z = 4 - \frac{1}{z}$'
    solucion_pasos:
    - 'Todo el denominador se reemplaza por z.'
errores_frecuentes:
  - 'Asumir que por ser infinito no tiene un valor o diverge (muchas de estas convergen).'
  - 'Reemplazar en el lugar incorrecto perdiendo la estructura de la ecuación.'
estado: publicado
