semantic_id: MAT.GEO.TRIG_APLICA_REAL.VALIDEZ_SOLUCION
titulo: Evaluación de la validez geométrica de una solución trigonométrica en contexto
objetivo: Verificar si una solución numérica obtenida al resolver un triángulo oblicuángulo es geométricamente
  válida, revisando la suma de los ángulos y la desigualdad triangular.
introduccion: Al resolver triángulos con las leyes de senos y cosenos, es posible obtener resultados numéricamente
  correctos en el álgebra pero geométricamente imposibles, por lo que siempre se debe verificar la validez
  de la solución final.
resumen: Una solución es geométricamente válida si los tres ángulos son positivos y suman exactamente
  180°, y si los tres lados cumplen la desigualdad triangular (cada lado es menor que la suma de los otros
  dos).
explicacion: '![Validez geométrica de una solución](/static/img/geometria/trigonometria/trigreal-validez-solucion.svg)


  ### Definición formal


  Una solución de un triángulo es válida si: (1) los tres ángulos son positivos y su suma es 180°, y (2)
  cada lado es menor que la suma de los otros dos (desigualdad triangular).


  ### Desarrollo didáctico


  En el caso ambiguo de la ley de senos, por ejemplo, una de las dos soluciones angulares posibles puede
  hacer que la suma de los ángulos supere 180°, lo que la descarta automáticamente como solución inválida,
  dejando solo la otra como la respuesta correcta.'
procedimiento:
- 'Paso 1: Suma los tres ángulos obtenidos y verifica que el resultado sea exactamente 180°.'
- 'Paso 2: Verifica que los tres lados cumplan la desigualdad triangular (cada lado menor que la suma
  de los otros dos).'
- 'Paso 3: Si alguna de estas condiciones falla, descarta esa solución como geométricamente inválida.'
ejemplos:
- titulo: Verificar la suma de ángulos de una solución
  enunciado: Una solución da A=50°, B=70°, C=60°.
  solucion_pasos:
  - 50°+70°+60°=180°, por lo que la suma es correcta y la solución es válida en ese aspecto.
- titulo: Descartar una solución por violar la desigualdad triangular
  enunciado: Se obtienen lados a=3, b=4, c=10.
  solucion_pasos:
  - Como c=10 no es menor que a+b=7, esta combinación de lados no puede formar un triángulo válido.
- titulo: ¿Es necesario verificar tanto los ángulos como los lados de una solución?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas condiciones (suma de ángulos y desigualdad triangular) deben cumplirse para que la solución
    sea válida.
- titulo: ¿En el caso ambiguo siempre ambas soluciones angulares son válidas simultáneamente?
  respuesta: 'No'
  solucion_pasos:
  - No, a veces solo una de las dos soluciones cumple que la suma de los ángulos no supere 180°.
errores_frecuentes:
- No verificar la suma de los ángulos después de resolver un triángulo, aceptando una solución inválida.
- Ignorar la desigualdad triangular al aceptar un conjunto de tres lados como solución válida.
- Aceptar automáticamente ambas soluciones angulares del caso ambiguo sin verificar su validez geométrica.
fuente: Elaboración propia.
estado: publicado
