semantic_id: MAT.GEO.ANGULOS_CLASIFICACION.NULO
titulo: Ángulo nulo de medida 0°
objetivo: Clasificar un ángulo a partir de su medida y comprobar que la coincidencia total de los lados
  impide que aparezca una apertura visible.
introduccion: A veces un ángulo existe aunque no 'se vea abierto'. Si los dos rayos quedan uno sobre otro,
  sigue habiendo una posición geométrica que se puede nombrar. Aquí lo trabajaremos con ejemplos concretos
  y verificaciones cortas.
resumen: Un ángulo nulo mide 0° porque sus dos rayos coinciden. Como idea de control, la coincidencia
  total de los lados impide que aparezca una apertura visible.
explicacion: 'Un ángulo nulo mide 0° porque sus dos rayos coinciden.


  El ejemplo “si ambos rayos quedan exactamente superpuestos, la abertura es 0°” no se resuelve por apariencia:
  se justifica usando la definición y revisando finalmente que la coincidencia total de los lados impide
  que aparezca una apertura visible.'
procedimiento:
- 'Paso 1: Lee o estima la abertura del ángulo en grados.'
- 'Paso 2: Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.'
- 'Paso 3: Asigna el nombre correcto y revisa que no contradiga el dibujo.'
ejemplos:
- titulo: Lectura del dibujo — Ángulo nulo
  enunciado: Si ambos rayos quedan exactamente superpuestos, la abertura es 0°.
  solucion_pasos:
  - Lee o estima la abertura del ángulo en grados.
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: Chequeo del procedimiento — Ángulo nulo
  enunciado: 'Revisa una solución del caso “si ambos rayos quedan exactamente superpuestos, la abertura
    es 0°”: el resultado parece razonable, pero falta conectar el dibujo con la definición. Explica esa
    conexión.'
  solucion_pasos:
  - 'Parte de la definición: un ángulo nulo mide 0° porque sus dos rayos coinciden.'
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿La situación respeta la idea clave del recurso? — Ángulo nulo
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo nulo mide 0° porque sus dos rayos
    coinciden.'
  - En el caso “si ambos rayos quedan exactamente superpuestos, la abertura es 0°” se observa que la coincidencia
    total de los lados impide que aparezca una apertura visible.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Se puede cerrar sin el control final? — Ángulo nulo
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulo nulo de medida 0°.
  - Después del paso “Lee o estima la abertura del ángulo en grados.” todavía hace falta revisar “Compara
    la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
  - El cierre correcto exige “Asigna el nombre correcto y revisa que no contradiga el dibujo.”.
errores_frecuentes:
- Ángulo nulo significa tener una abertura pequeña pero distinta de cero.
- Para resolver ángulo nulo, basta con el paso “Lee o estima la abertura del ángulo en grados.” y no hace
  falta revisar “Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
- Si el dibujo parece claro, se puede ignorar que la coincidencia total de los lados impide que aparezca
  una apertura visible.
- Dos configuraciones distintas representan ángulo nulo solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Asigna el nombre correcto y revisa que no
  contradiga el dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
