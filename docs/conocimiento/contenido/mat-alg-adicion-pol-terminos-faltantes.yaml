semantic_id: MAT.ALG.ADICION_POL.TERMINOS_FALTANTES
objetivo: Sumar polinomios que tienen grados distintos o términos ausentes, gestionando
  correctamente los espacios vacíos.
introduccion: Muchas veces los polinomios que se suman no tienen los mismos términos.
  Uno puede tener término en $x^3$ y el otro no. En la suma vertical, esto corresponde
  a una columna con solo un número, que pasa directo al resultado.
resumen: Al sumar polinomios con **Términos Faltantes**, los grados que no tienen
  representación en uno de los sumandos se tratan como si tuvieran coeficiente $0$.
  En el resultado, esos términos se 'heredan' directamente del único polinomio que
  los tiene.
explicacion: "Suma: $(x^3 + 2x - 5)$ y $(3x^2 + x + 1)$.\n\nEl primer polinomio no\
  \ tiene $x^2$, el segundo no tiene $x^3$.\n\nEn formato vertical:\n```\n  x³ + 0x²\
  \ + 2x - 5\n+ 0x³ + 3x² +  x + 1\n───────────────────\n  x³ + 3x² + 3x - 4\n```\n\
  \nLos ceros se hacen explícitos para no confundir columnas. Los términos únicos\
  \ (como $x^3$) pasan directo al resultado."
procedimiento:
- 'Paso 1: Determina el grado máximo entre todos los polinomios a sumar.'
- 'Paso 2: Completa los polinomios con los términos faltantes usando coeficiente $0$.'
- 'Paso 3: Alinea verticalmente.'
- 'Paso 4: Suma columna por columna como siempre.'
ejemplos:
- titulo: El hueco del cuadrado
  enunciado: 'Suma: (2a^3 - 5) + (a^2 + 3a + 2).'
  solucion_pasos:
  - 'Completamos con ceros: (2a^3 + 0a^2 + 0a - 5) + (0a^3 + a^2 + 3a + 2).'
  - 'Col a^3: 2+0 = 2a^3.'
  - 'Col a^2: 0+1 = a^2.'
  - 'Col a: 0+3 = 3a.'
  - 'Constante: -5+2 = -3.'
  - 'Resultado: 2a^3 + a^2 + 3a - 3.'
errores_frecuentes:
- Desalinear los términos al no colocar explícitamente los ceros, sumando términos
  de distintas familias.
- Omitir completamente un grado faltante en el resultado por creer que 'no existe'.
fuente: Álgebra de Baldor.
estado: publicado
