semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.FORMA_GENERAL
titulo: Reconocimiento de la forma general f(x) = log_b(x)
objetivo: Reconocer y describir la estructura de la forma general de una función logarítmica.
introduccion: Toda función logarítmica básica, sin importar el contexto del que provenga, se escribe en un único
  formato con dos elementos esenciales, el argumento y la base.
resumen: La **forma general** de una función logarítmica básica es $f(x)=\log_b(x)$, donde $b$ es la base (positiva
  y distinta de 1) y $x$ es el argumento de la función.
explicacion: '### Definición formal


  La forma general de una función logarítmica básica es $f(x)=\log_b(x)$, con $b>0$ y $b\neq1$. Cuando la base
  no aparece escrita explícitamente (como en $\log(x)$), se asume convencionalmente que $b=10$ (logaritmo decimal).


  ### Desarrollo didáctico


  Reconocer la forma general implica identificar la base (que aparece como subíndice) y el argumento (que aparece
  entre paréntesis), distinguiendo esta notación de la de la función exponencial.


  En $f(x)=\log_5(x)$, la base es $5$ y el argumento es $x$. En $f(x)=\ln(x)$, la base implícita es el número
  $e$ (logaritmo natural).'
procedimiento:
- 'Paso 1: Verifica que la función tenga la forma de un logaritmo con base y argumento variable.'
- 'Paso 2: Identifica la base $b$, que aparece como subíndice.'
- 'Paso 3: Identifica el argumento, que aparece entre paréntesis.'
ejemplos:
- titulo: Identificación de la forma general
  enunciado: 'Identifica la base y el argumento en $f(x)=\log_7(x)$.'
  solucion_pasos:
  - Ya está en forma general.
  - 'Base $b=7$, argumento $x$.'
- titulo: Identificación con notación especial
  enunciado: '¿Cuál es la base implícita en $f(x)=\log(x)$?'
  solucion_pasos:
  - Cuando no se escribe la base explícitamente, se asume base $10$.
  - '$f(x)=\log_{10}(x)$.'
- titulo: ¿La notación $\ln(x)$ corresponde a una base específica?
  enunciado: ¿La notación $\ln(x)$ corresponde a una base específica?
  respuesta: Sí
  solucion_pasos:
  - '$\ln(x)$ es el logaritmo natural, con base igual al número $e$.'
- titulo: ¿El argumento de la forma general siempre debe ser exactamente la variable $x$?
  enunciado: ¿El argumento de la forma general siempre debe ser exactamente la variable $x$?
  respuesta: 'No'
  solucion_pasos:
  - El argumento puede ser una expresión más compleja que involucre a $x$, aunque en la forma básica suele ser
    $x$ directamente.
errores_frecuentes:
- Confundir la base (subíndice) con el argumento (dentro del paréntesis).
- Asumir incorrectamente que $\log(x)$ sin base escrita significa base $e$ en vez de base $10$.
- Confundir la notación logarítmica con la notación exponencial.
- No reconocer $\ln(x)$ como un caso particular de $\log_b(x)$ con $b=e$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
