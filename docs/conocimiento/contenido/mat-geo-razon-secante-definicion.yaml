semantic_id: MAT.GEO.TRIG_RECIPROCAS.SECANTE_DEFINICION
titulo: Definición de secante de un ángulo agudo como hipotenusa sobre cateto adyacente
objetivo: 'Definir la secante de un ángulo agudo como la razón recíproca del coseno: hipotenusa sobre
  cateto adyacente.'
introduccion: 'La secante es el coseno ''puesto al revés'': en vez de cateto adyacente sobre hipotenusa,
  es hipotenusa sobre cateto adyacente.'
resumen: 'La secante de un ángulo agudo $\theta$ es la razón recíproca del coseno: $\sec\theta=\dfrac{\text{hipotenusa}}{\text{cateto
  adyacente}}=\dfrac{1}{\cos\theta}$.'
explicacion: '![Definición de secante](/static/img/geometria/trigonometria/razon-secante-definicion.svg)


  ### Definición formal


  La secante de $\theta$ se define como $\sec\theta=\dfrac{\text{hipotenusa}}{\text{cateto adyacente}}$,
  es decir, el recíproco (inverso multiplicativo) del coseno: $\sec\theta=\dfrac{1}{\cos\theta}$.


  ### Desarrollo didáctico


  Si $\cos\theta=0{,}8$ (es decir, cateto adyacente=4, hipotenusa=5), entonces $\sec\theta=\dfrac{5}{4}=1{,}25$,
  el recíproco exacto de $0{,}8$.'
procedimiento:
- 'Paso 1: Identifica el cateto adyacente a θ y la hipotenusa del triángulo rectángulo.'
- 'Paso 2: Calcula la razón hipotenusa/cateto adyacente (el orden invertido respecto del coseno).'
- 'Paso 3: Verifica, si es útil, que sec θ = 1/cos θ, calculando el recíproco del coseno.'
ejemplos:
- titulo: Calcular la secante con medidas conocidas
  enunciado: El cateto adyacente mide 4 cm y la hipotenusa 5 cm.
  solucion_pasos:
  - secθ=5/4=1,25.
- titulo: Calcular la secante a partir del coseno
  enunciado: cosθ=0,5.
  solucion_pasos:
  - secθ=1/0,5=2.
- titulo: ¿La secante es el recíproco del coseno?
  respuesta: Sí
  solucion_pasos:
  - Sí, secθ=1/cosθ, por definición de razones recíprocas.
- titulo: ¿La secante puede ser menor que 1 para un ángulo agudo?
  respuesta: 'No'
  solucion_pasos:
  - No, ya que el coseno de un ángulo agudo está entre 0 y 1, su recíproco (la secante) siempre es mayor
    que 1.
errores_frecuentes:
- Invertir el orden y calcular cateto adyacente/hipotenusa en vez de hipotenusa/cateto adyacente.
- Confundir la secante con la cosecante (que es recíproca del seno, no del coseno).
- Creer que la secante puede tomar valores menores que 1 para un ángulo agudo.
fuente: 'Elaboración propia (referencias: Moraleja 175, Cid 155).'
estado: publicado
