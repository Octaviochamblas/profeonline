semantic_id: MAT.ALG.TRIG_COORDENADAS.COSENO_COORDENADA_X
titulo: El coseno como la coordenada $x$ del círculo unitario
objetivo: Definir $\cos(\theta)$ como la coordenada $x$ del punto donde el lado terminal de $\theta$ corta al
  círculo unitario.
introduccion: En vez de memorizar razones entre lados de un triángulo, el círculo unitario permite definir el
  coseno directamente a partir de la posición de un punto.
resumen: Para un ángulo $\theta$ en posición estándar, $\cos(\theta)$ se define como la **coordenada $x$** del
  punto donde el lado terminal corta al círculo unitario.
explicacion: '### Definición formal


  Si el lado terminal del ángulo $\theta$ corta al círculo unitario en el punto $(x,y)$, entonces
  $\cos(\theta)=x$. Esta definición extiende el coseno a cualquier ángulo, no solo a los agudos de un triángulo
  rectángulo.


  ### Desarrollo didáctico


  Para $\theta=0°$, el punto asociado es $(1,0)$, así que $\cos(0°)=1$. Para $\theta=90°$, el punto es $(0,1)$,
  así que $\cos(90°)=0$.'
procedimiento:
- 'Paso 1: Ubica el punto $(x,y)$ donde el lado terminal de $\theta$ corta al círculo unitario.'
- 'Paso 2: Identifica la coordenada $x$ de ese punto.'
- 'Paso 3: Esa coordenada $x$ es el valor de $\cos(\theta)$.'
ejemplos:
- titulo: Cálculo del coseno en un ángulo cuadrantal
  enunciado: 'Calcula $\cos(180°)$.'
  solucion_pasos:
  - El punto asociado a $180°$ es $(-1,0)$.
  - 'Se obtiene $\cos(180°)=-1$.'
- titulo: Cálculo del coseno en otro ángulo cuadrantal
  enunciado: 'Calcula $\cos(270°)$.'
  solucion_pasos:
  - El punto asociado a $270°$ es $(0,-1)$.
  - 'Se obtiene $\cos(270°)=0$.'
- titulo: ¿El coseno puede tomar valores mayores que $1$?
  enunciado: ¿Puede $\cos(\theta)$ tomar un valor mayor que $1$?
  respuesta: 'No'
  solucion_pasos:
  - Como $(x,y)$ pertenece al círculo unitario, $x$ nunca puede superar $1$ en valor absoluto.
- titulo: ¿El coseno de un ángulo cuadrantal siempre es $0$ o $\pm1$?
  enunciado: ¿El coseno de cualquier ángulo cuadrantal es siempre $0$, $1$ o $-1$?
  respuesta: Sí
  solucion_pasos:
  - Los puntos cuadrantales tienen coordenada $x$ igual a $0$, $1$ o $-1$.
errores_frecuentes:
- Confundir el coseno con la coordenada $y$, que corresponde al seno.
- Suponer que el coseno puede tomar cualquier valor real, sin restricción.
- No verificar que el punto usado realmente pertenezca al círculo unitario.
- Confundir esta definición general con la limitada al triángulo rectángulo (solo ángulos agudos).
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
