semantic_id: MAT.EST.DIAGRAMA_CAJA.RANGO_INTERCUARTIL
titulo: Calcular el rango intercuartílico
objetivo: Calcular el rango intercuartílico como la diferencia entre el tercer y el primer cuartil.
introduccion: El rango intercuartílico mide qué tan "ancho" es el 50% central de los datos, ignorando los valores más
  extremos de ambos lados.
resumen: El rango intercuartílico $RIC$ se calcula como $RIC = Q_3 - Q_1$ y representa la amplitud del 50% central de
  los datos.
explicacion: '![Rango intercuartílico](/static/img/estadistica/diagcaja/diagcaja-rango-intercuartil.svg)


  ### Definición formal


  El rango intercuartílico se define como $RIC = Q_3 - Q_1$, es decir, el largo de la caja en un diagrama de caja y

  bigotes.


  ### Desarrollo didáctico


  A diferencia del rango total (máximo menos mínimo), el $RIC$ no se ve afectado por valores extremos, ya que solo

  considera el 50% central de la distribución.'
procedimiento:
- 'Paso 1: Calcula $Q_1$ y $Q_3$ del conjunto de datos.'
- 'Paso 2: Resta $Q_1$ a $Q_3$: $RIC = Q_3 - Q_1$.'
- 'Paso 3: Interpreta el resultado como la amplitud del 50% central de los datos.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $Q_1=20$ y $Q_3=35$, calcula el rango intercuartílico.
  solucion_pasos:
  - $RIC = Q_3 - Q_1 = 35 - 20$.
  - $RIC = 15$.
- titulo: Ejemplo 2
  enunciado: ¿Qué representa gráficamente el $RIC$ en un diagrama de caja?
  solucion_pasos:
  - Representa el largo de la caja, es decir, la distancia entre sus dos bordes.
- titulo: ¿El rango intercuartílico se calcula como $Q_3-Q_1$?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la fórmula del rango intercuartílico.
- titulo: ¿El rango intercuartílico se ve muy afectado por valores extremos?
  respuesta: 'No'
  solucion_pasos:
  - 'No, precisamente su ventaja es que ignora los valores extremos al considerar solo el 50% central.'
errores_frecuentes:
- Calcular el $RIC$ como máximo menos mínimo en vez de $Q_3-Q_1$.
- Invertir la resta y calcular $Q_1-Q_3$, obteniendo un valor negativo.
- Confundir el $RIC$ con el rango total del conjunto de datos.
- Creer que el $RIC$ representa el 100% de los datos.
- Pensar que un $RIC$ mayor siempre implica más datos en total.
fuente: 'Elaboración propia (referencia: Moraleja 138, 380).'
estado: publicado
