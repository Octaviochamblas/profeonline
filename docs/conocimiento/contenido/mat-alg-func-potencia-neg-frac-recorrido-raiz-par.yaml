semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.RECORRIDO_RAIZ_PAR
titulo: Recorrido de $f(x)=x^{1/q}$ con índice par
objetivo: Determinar que el recorrido de $f(x)=x^{1/q}$ es $[0,+\infty)$ cuando $q$ es un entero par.
introduccion: Así como el dominio de la raíz de índice par se restringe a los no negativos, su resultado también
  queda limitado de la misma forma.
resumen: Si $q$ es un entero par, el recorrido de $f(x)=x^{1/q}=\sqrt[q]{x}$ es $[0,+\infty)$, ya que la raíz de
  índice par se define como el valor no negativo que cumple la igualdad.
explicacion: '### Definición formal


  Para $q$ par, $\sqrt[q]{x}$ se define como el único número real no negativo $y$ tal que $y^q=x$, para
  $x\geq0$. Como $y\geq0$ por definición, el recorrido de $f(x)=x^{1/q}$ es $[0,+\infty)$.


  ### Desarrollo didáctico


  $f(x)=\sqrt{x}$: nunca entrega como resultado un número negativo, aunque matemáticamente $(-3)^2=9$ también.
  Por convención, $\sqrt{9}=3$ (el valor no negativo), así que el recorrido de la función excluye los negativos.'
procedimiento:
- 'Paso 1: Identifica el índice $q$ de la raíz en la expresión $x^{1/q}$.'
- 'Paso 2: Verifica si $q$ es par.'
- 'Paso 3: Si es par, concluye que el recorrido es $[0,+\infty)$.'
ejemplos:
- titulo: Determinación del recorrido de $\sqrt{x}$
  enunciado: 'Determina el recorrido de $f(x)=\sqrt{x}$.'
  solucion_pasos:
  - El índice de la raíz es $2$, un número par.
  - 'El recorrido es $[0,+\infty)$.'
- titulo: Determinación del recorrido de $x^{1/4}$
  enunciado: 'Determina el recorrido de $f(x)=x^{1/4}$.'
  solucion_pasos:
  - El índice de la raíz es $4$, un número par.
  - 'El recorrido es $[0,+\infty)$.'
- titulo: ¿Puede $f(x)=\sqrt{x}$ entregar como resultado un número negativo?
  enunciado: ¿Puede la función $f(x)=\sqrt{x}$ entregar un resultado negativo para algún $x$ de su dominio?
  respuesta: 'No'
  solucion_pasos:
  - Por convención, la raíz de índice par se define como el valor no negativo que cumple la igualdad.
- titulo: ¿El valor $0$ pertenece al recorrido de $f(x)=\sqrt[6]{x}$?
  enunciado: ¿El valor $f(x)=0$ pertenece al recorrido de $f(x)=\sqrt[6]{x}$?
  respuesta: Sí
  solucion_pasos:
  - Se alcanza exactamente en $x=0$, ya que $\sqrt[6]{0}=0$.
errores_frecuentes:
- Suponer que la raíz de índice par puede entregar tanto el valor positivo como el negativo.
- Confundir el recorrido de la raíz par con el de la raíz impar, que sí es todo $\mathbb{R}$.
- No relacionar el recorrido restringido con la definición por convención de la raíz de índice par.
- Olvidar que el valor $0$ sí pertenece al recorrido.
