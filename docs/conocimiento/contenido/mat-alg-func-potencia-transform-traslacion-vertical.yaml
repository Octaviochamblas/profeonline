semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.TRASLACION_VERTICAL
titulo: Traslación vertical de la función potencia
objetivo: Reconocer el efecto de $f(x)=a\cdot x^n+k$ como un desplazamiento vertical de la gráfica básica.
introduccion: Sumar una constante fuera de la potencia mueve toda la curva hacia arriba o hacia abajo, sin
  alterar su forma horizontal.
resumen: La función $f(x)=a\cdot x^n+k$ corresponde a la gráfica de $g(x)=a\cdot x^n$ **desplazada
  verticalmente** $k$ unidades.
explicacion: '### Definición formal


  Dada $g(x)=a\cdot x^n$, la función $f(x)=g(x)+k=a\cdot x^n+k$ tiene la misma forma que $g$, pero cada punto
  $(x_0,y_0)$ de $g$ se traslada al punto $(x_0,y_0+k)$ en $f$. El valor de referencia, antes en $y=0$, pasa a
  estar en $y=k$.


  ### Desarrollo didáctico


  $f(x)=x^2+3$ tiene la misma forma de copa que $x^2$, pero su vértice está en $(0,3)$ en vez de $(0,0)$.
  Evaluar $f(0)=3$ confirma el desplazamiento vertical.'
procedimiento:
- 'Paso 1: Identifica el valor de $k$ sumado fuera de la potencia.'
- 'Paso 2: Reconoce que el valor de referencia se traslada a $y=k$.'
- 'Paso 3: Traza la gráfica básica y desplázala verticalmente según el valor de $k$.'
ejemplos:
- titulo: Identificación del desplazamiento en $x^2+5$
  enunciado: '¿Cuál es el desplazamiento vertical de $f(x)=x^2+5$?'
  solucion_pasos:
  - Se identifica $k=5$.
  - La gráfica se desplaza $5$ unidades hacia arriba respecto a $x^2$.
- titulo: Cálculo del nuevo vértice
  enunciado: '¿En qué punto se ubica el vértice de $f(x)=x^4-2$?'
  solucion_pasos:
  - Se identifica $k=-2$.
  - 'El vértice se ubica en $(0,-2)$.'
- titulo: ¿La traslación vertical cambia el dominio de la función?
  enunciado: ¿Una traslación vertical afecta el dominio de una función potencia?
  respuesta: 'No'
  solucion_pasos:
  - Solo afecta la posición vertical y el recorrido; el dominio permanece igual.
- titulo: ¿La traslación vertical afecta el recorrido de la función?
  enunciado: ¿Una traslación vertical modifica el recorrido de la función?
  respuesta: Sí
  solucion_pasos:
  - Todo el recorrido se desplaza $k$ unidades en la misma dirección que la traslación.
errores_frecuentes:
- Confundir la traslación vertical con la horizontal, aplicándola sobre $x$ en vez de sobre $y$.
- Suponer que la traslación vertical afecta el dominio de la función.
- No identificar correctamente el valor de $k$ cuando aparece con signo negativo.
- Olvidar actualizar el recorrido tras aplicar el desplazamiento.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
