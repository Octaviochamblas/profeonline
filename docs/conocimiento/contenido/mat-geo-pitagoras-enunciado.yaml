semantic_id: MAT.GEO.PITAGORAS.ENUNCIADO
titulo: 'Enunciado del teorema de Pitágoras: el cuadrado de la hipotenusa es igual a la suma de los cuadrados
  de los catetos'
objetivo: Comprender el teorema de Pitágoras como la relación fundamental entre los tres lados de un triángulo
  rectángulo.
introduccion: 'El teorema de Pitágoras es una de las relaciones más usadas en geometría: conecta la medida
  de la hipotenusa con la de los dos catetos de cualquier triángulo rectángulo.'
resumen: El teorema de Pitágoras establece que, en todo triángulo rectángulo, el cuadrado de la hipotenusa
  es igual a la suma de los cuadrados de los catetos.
explicacion: '![Teorema de Pitágoras: catetos e hipotenusa](/static/img/geometria/areas-pitagoras/pitagoras-enunciado.svg)


  ### Definición formal


  En un triángulo rectángulo de catetos $a$ y $b$ e hipotenusa $c$, se cumple $c^2=a^2+b^2$.


  ### Desarrollo didáctico


  En el triángulo rectángulo de catetos 3 y 4, la hipotenusa cumple $c^2=3^2+4^2=9+16=25$, por lo que
  $c=5$: es la conocida terna pitagórica 3-4-5.'
procedimiento:
- 'Paso 1: Identifica cuál lado es la hipotenusa (opuesta al ángulo recto) y cuáles son los catetos.'
- 'Paso 2: Eleva al cuadrado las medidas de los catetos y súmalas.'
- 'Paso 3: Esa suma es igual al cuadrado de la hipotenusa.'
ejemplos:
- titulo: Verificar el teorema
  enunciado: Un triángulo rectángulo tiene catetos 3 y 4, e hipotenusa 5.
  solucion_pasos:
  - '3²+4²=9+16=25=5²: se cumple el teorema.'
- titulo: Verificar con otra terna
  enunciado: Un triángulo rectángulo tiene catetos 6 y 8, e hipotenusa 10.
  solucion_pasos:
  - '6²+8²=36+64=100=10²: se cumple el teorema.'
- titulo: ¿El teorema de Pitágoras aplica a cualquier triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, solo aplica a triángulos rectángulos.
- titulo: ¿La hipotenusa es siempre el lado más largo?
  respuesta: Sí
  solucion_pasos:
  - Sí, como su cuadrado es la suma de los otros dos cuadrados, siempre es el mayor de los tres lados.
errores_frecuentes:
- Aplicar el teorema a triángulos que no son rectángulos.
- Confundir cuál lado es la hipotenusa, usando un cateto en su lugar en la fórmula.
- Olvidar elevar al cuadrado antes de sumar (sumar los lados directamente en vez de sus cuadrados).
fuente: Elaboración propia.
estado: publicado
