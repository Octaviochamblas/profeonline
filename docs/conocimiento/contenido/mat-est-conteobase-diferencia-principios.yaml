semantic_id: MAT.EST.CONTEO_BASE.DIFERENCIA_PRINCIPIOS
titulo: Distinción entre principio aditivo y principio multiplicativo según el contexto
objetivo: Distinguir, en un problema descrito en palabras, si corresponde aplicar el principio aditivo
  (alternativas excluyentes) o el principio multiplicativo (etapas sucesivas).
introduccion: El error más común en conteo es aplicar el principio equivocado; reconocer la estructura
  del problema (alternativas vs. etapas) es el primer paso esencial para resolverlo correctamente.
resumen: Se aplica el principio aditivo cuando las opciones son alternativas mutuamente excluyentes ('se
  elige una u otra'); se aplica el principio multiplicativo cuando las opciones son etapas sucesivas que
  deben realizarse todas ('se elige una de cada').
explicacion: '![Diferencia entre principio aditivo y multiplicativo](/static/img/probabilidad/conteobase/conteobase-diferencia-principios.svg)


  ### Definición formal


  Si el problema plantea ''A o B'' (excluyentes, una sola elección entre alternativas), se suma; si plantea
  ''A y B'' (etapas sucesivas, ambas decisiones se toman), se multiplica.


  ### Desarrollo didáctico


  ''Viajar en bus (3 líneas) o en tren (2 líneas)'' es aditivo (3+2=5), ya que se elige un solo medio
  de transporte. ''Elegir una entrada (3 opciones) y un postre (2 opciones)'' es multiplicativo (3×2=6),
  ya que se eligen ambas cosas.'
procedimiento:
- 'Paso 1: Lee cuidadosamente el enunciado e identifica si se trata de elegir ''una u otra'' opción (excluyente)
  o ''una de cada'' categoría (etapas sucesivas).'
- 'Paso 2: Si es una elección excluyente entre alternativas, aplica el principio aditivo (suma).'
- 'Paso 3: Si son etapas sucesivas donde se deben tomar todas las decisiones, aplica el principio multiplicativo
  (producto).'
ejemplos:
- titulo: Distinguir un caso aditivo
  enunciado: '''Viajar en bus (3 líneas) o en tren (2 líneas)''.'
  solucion_pasos:
  - 'Es aditivo: se elige solo un medio de transporte, 3+2=5.'
- titulo: Distinguir un caso multiplicativo
  enunciado: '''Elegir una entrada (3 opciones) y un postre (2 opciones)''.'
  solucion_pasos:
  - 'Es multiplicativo: se eligen ambas cosas, 3×2=6.'
- titulo: ¿La palabra 'o' suele indicar el principio aditivo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una señal lingüística típica (aunque siempre se debe verificar el contexto real del problema).
- titulo: ¿La palabra 'y' suele indicar el principio multiplicativo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una señal lingüística típica de etapas sucesivas.
errores_frecuentes:
- Aplicar el principio multiplicativo a una situación de alternativas excluyentes (o viceversa).
- Guiarse únicamente por las palabras 'o'/'y' sin verificar el contexto real del problema (a veces el
  lenguaje natural es ambiguo).
- Combinar incorrectamente ambos principios en un mismo problema sin identificar claramente qué parte
  es aditiva y cuál multiplicativa.
fuente: 'Elaboración propia (referencia: Moraleja 298).'
estado: publicado
