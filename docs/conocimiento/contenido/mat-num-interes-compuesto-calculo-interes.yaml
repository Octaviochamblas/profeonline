semantic_id: MAT.NUM.INTERES_COMPUESTO.CALCULO_INTERES
objetivo: Calcular únicamente el monto de los intereses ganados en una operación de
  interés compuesto.
introduccion: 'Si la fórmula del interés compuesto te da siempre el total (con tu
  capital incluido), ¿cómo haces para saber exactamente cuánta ''ganancia pura'' obtuviste?
  Simple lógica: al total, réstale lo que tú pusiste.'
resumen: 'A diferencia del interés simple, no hay una fórmula corta directa para el
  interés puro ($I$) en compuesto. Se calcula hallando primero el Monto Final ($M$)
  y restando el Capital Inicial ($C$): $I = M - C$.'
explicacion: "En interés compuesto, la fórmula principal es $M = C(1+i)^t$.\nSi un\
  \ problema te pregunta **exclusivamente por la ganancia** (los intereses), debes\
  \ proceder en dos pasos ineludibles:\n\n1. Usa la fórmula principal para encontrar\
  \ el dinero total que hay en la cuenta al final ($M$).\n2. Al resultado anterior\
  \ ($M$), réstale tu capital inicial ($C$).\n\nFórmula derivada: \n$$I = C(1+i)^t\
  \ - C$$\nFactorizando C, también se puede escribir como:\n$$I = C \\cdot [ (1+i)^t\
  \ - 1 ]$$"
procedimiento:
- 'Paso 1: Calcula el Monto Final $M = C \cdot (1+i)^t$.'
- 'Paso 2: Al resultado $M$, réstale el capital inicial $C$.'
- 'Paso 3: El número resultante es el interés puro ganado.'
ejemplos:
- titulo: Obteniendo la ganancia pura
  enunciado: Se invierten $10.000 al 10% de interés compuesto anual por 2 años. ¿Cuánto
    dinero se ganó solo por concepto de intereses?
  solucion_pasos:
  - 'Calculamos el Monto Final: $M = 10.000 \cdot (1.10)^2$.'
  - 'Resolvemos la potencia: $(1.10)^2 = 1.21$.'
  - M = $10.000 \cdot 1.21 = 12.100$. (Ese es el total en la cuenta).
  - 'Restamos el capital: Interés = $12.100 - 10.000 = 2.100$. Se ganaron $2.100 puros.'
errores_frecuentes:
- Responder con el Monto Final cuando se pregunta por 'los intereses'.
- Tratar de usar la fórmula $I = C \cdot i \cdot t$ (que es solo para interés simple).
fuente: Currículum Nacional MINEDUC.
estado: publicado
