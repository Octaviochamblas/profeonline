semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.DESPLAZAMIENTO_HORIZONTAL
titulo: Desplazamiento horizontal (desfase) en funciones trigonométricas
objetivo: Determinar el desplazamiento horizontal de $f(x)=\sin(b(x-c))$ a partir del parámetro $c$.
introduccion: El parámetro $c$, también llamado desfase, mueve toda la curva a lo largo del eje horizontal, sin
  cambiar su forma ni su tamaño.
resumen: 'En $f(x)=a\sin(b(x-c))+d$, el parámetro $c$ representa el **desplazamiento horizontal**: la curva se
  mueve $c$ unidades hacia la derecha (si $c>0$) o hacia la izquierda (si $c<0$).'
explicacion: '### Definición formal


  La función $f(x)=g(x-c)$, donde $g(x)=a\sin(bx)+d$, traslada horizontalmente la gráfica de $g$ en $c$
  unidades. Es fundamental que el parámetro $b$ esté factorizado fuera del paréntesis para leer correctamente
  $c$.


  ### Desarrollo didáctico


  $f(x)=\sin(2(x-\pi/4))$ tiene desfase $c=\pi/4$: se desplaza $\pi/4$ unidades a la derecha respecto a
  $\sin(2x)$. Si la expresión fuera $\sin(2x-\pi/2)$, primero habría que factorizar: $2x-\pi/2=2(x-\pi/4)$,
  llegando al mismo resultado.'
procedimiento:
- 'Paso 1: Factoriza la expresión dentro del seno o coseno para que $b$ quede fuera del paréntesis.'
- 'Paso 2: Identifica el valor de $c$ una vez factorizado.'
- 'Paso 3: Determina la dirección del desplazamiento según el signo de $c$.'
ejemplos:
- titulo: Identificación directa del desfase
  enunciado: 'Identifica el desfase de $f(x)=\cos(3(x-2))$.'
  solucion_pasos:
  - Ya está en la forma factorizada.
  - 'El desfase es $c=2$, desplazamiento a la derecha.'
- titulo: Factorización previa para identificar el desfase
  enunciado: 'Identifica el desfase de $f(x)=\sin(4x+8)$.'
  solucion_pasos:
  - 'Se factoriza: $4x+8=4(x+2)=4(x-(-2))$.'
  - 'El desfase es $c=-2$, desplazamiento a la izquierda.'
- titulo: ¿Es necesario factorizar $b$ antes de leer el desfase correctamente?
  enunciado: ¿Es necesario factorizar el coeficiente $b$ fuera del paréntesis antes de identificar correctamente
    el desfase $c$?
  respuesta: Sí
  solucion_pasos:
  - Si no se factoriza, se puede leer un valor incorrecto para $c$.
- titulo: ¿El desplazamiento horizontal afecta la amplitud de la función?
  enunciado: ¿El desplazamiento horizontal afecta la amplitud de la función trigonométrica?
  respuesta: 'No'
  solucion_pasos:
  - Solo cambia la posición horizontal de la curva, no su amplitud.
errores_frecuentes:
- Leer el desfase directamente sin factorizar $b$ primero, obteniendo un valor incorrecto.
- Confundir la dirección del desplazamiento según el signo de $c$.
- Confundir el desplazamiento horizontal con el vertical.
- No verificar el resultado evaluando la función en el punto desplazado.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
