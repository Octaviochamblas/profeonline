semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.ADICION_IGUAL_DENOMINADOR
objetivo: Comprender adición de fracciones de igual denominador y aplicarlo correctamente
  en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso adición de fracciones de igual denominador ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Para sumar fracciones de igual denominador se suman los numeradores y se
  conserva el denominador. Además, el denominador común indica el tamaño de las partes
  y no cambia en esta suma.
explicacion: |-
  Para sumar fracciones de igual denominador se suman los numeradores y se conserva el denominador.

  Una idea importante es que el denominador común indica el tamaño de las partes y no cambia en esta suma.

  Por ejemplo, \(\frac{2}{7}+\frac{3}{7}=\frac{5}{7}\).
procedimiento:
- 'Paso 1: Identificar la operación y preparar una representación adecuada de los
  datos.'
- 'Paso 2: Aplicar la regla específica de la operación respetando valor posicional
  o denominadores.'
- 'Paso 3: Simplificar o verificar el resultado final según corresponda.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{2}{7}+\frac{3}{7}=\frac{5}{7}\).”
    se relaciona con adición de fracciones de igual denominador.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: para sumar fracciones de igual denominador se suman
    los numeradores y se conserva el denominador.'
  - Concluye que el ejemplo sí ilustra adición de fracciones de igual denominador.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “El denominador común indica el tamaño de las
    partes y no cambia en esta suma.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con adición de fracciones de igual denominador?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que el denominador común indica el tamaño de
    las partes y no cambia en esta suma.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar adición de fracciones de igual denominador ignorando la definición
    o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar adición de fracciones de igual denominador sin mirar qué representan
  numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
