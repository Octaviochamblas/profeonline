semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.ADICION_IGUAL_DENOMINADOR
objetivo: Sumar fracciones con igual denominador.
introduccion: 'Observa este caso: \(\frac{2}{7}+\frac{3}{7}=\frac{5}{7}\). Para explicar
  por qué funciona estudiaremos adición de fracciones de igual denominador. Al finalizar
  podrás sumar fracciones con igual denominador.'
resumen: Para sumar fracciones de igual denominador se suman los numeradores y se
  conserva el denominador. Como criterio de control, el denominador común indica el
  tamaño de las partes y no cambia en esta suma
explicacion: |-
  Para sumar fracciones de igual denominador se suman los numeradores y se conserva el denominador.

  El ejemplo “\(\frac{2}{7}+\frac{3}{7}=\frac{5}{7}\)” lleva la definición a una situación concreta y permite verificar esta consecuencia: El denominador común indica el tamaño de las partes y no cambia en esta suma.
procedimiento:
- 'Paso 1: Comprueba que los denominadores sean iguales y distintos de cero.'
- 'Paso 2: Suma los numeradores y conserva el denominador común.'
- 'Paso 3: Simplifica la fracción resultante y estima si su tamaño es razonable.'
ejemplos:
- titulo: Aplicación razonada — Adición de fracciones de igual denominador
  enunciado: \(\frac{2}{7}+\frac{3}{7}=\frac{5}{7}\).
  solucion_pasos:
  - Comprueba que los denominadores sean iguales y distintos de cero.
  - Suma los numeradores y conserva el denominador común.
  - Simplifica la fracción resultante y estima si su tamaño es razonable.
- titulo: Revisión de una solución — Adición de fracciones de igual denominador
  enunciado: Una solución aplica “Suma los numeradores y conserva el denominador común.”,
    pero termina sin comprobar que el denominador común indica el tamaño de las partes
    y no cambia en esta suma. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define adición de fracciones de igual denominador:
    para sumar fracciones de igual denominador se suman los numeradores y se conserva
    el denominador.'
  - Comprueba que los denominadores sean iguales y distintos de cero.
  - 'Completa la revisión con este control: Simplifica la fracción resultante y estima
    si su tamaño es razonable.'
- titulo: ¿Se cumple que el denominador común indica el tamaño de las partes y no
    cambia en esta suma? — Adición de fracciones de igual denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para sumar fracciones de igual denominador
    se suman los numeradores y se conserva el denominador.
  - El caso “\(\frac{2}{7}+\frac{3}{7}=\frac{5}{7}\)” satisface esa condición.
  - Simplifica la fracción resultante y estima si su tamaño es razonable.
- titulo: ¿Es válido omitir el paso “Comprueba que los denominadores sean iguales
    y distintos de cero”? — Adición de fracciones de igual denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de adición de fracciones de igual
    denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Suma los numeradores y conserva
    el denominador común.'
  - 'La solución debe terminar de este modo: Simplifica la fracción resultante y estima
    si su tamaño es razonable.'
errores_frecuentes:
- 'Empezar adición de fracciones de igual denominador sin realizar este control inicial:
  Comprueba que los denominadores sean iguales y distintos de cero.'
- Memorizar “\(\frac{2}{7}+\frac{3}{7}=\frac{5}{7}\)” como respuesta aislada, sin
  reconstruir la definición que lo justifica.
- Convertir en receta el paso “Suma los numeradores y conserva el denominador común.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre adición de fracciones de igual denominador que
  contradice el criterio “El denominador común indica el tamaño de las partes y no
  cambia en esta suma”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica la fracción resultante
  y estima si su tamaño es razonable.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
