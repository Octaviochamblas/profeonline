semantic_id: MAT.ALG.FRACCIONES_BASE.RESTRICCIONES_DOMINIO
titulo: Restricciones y Dominio de una Fracción
objetivo: Calcular los valores numéricos que la variable no puede tomar para evitar que el denominador sea cero.
introduccion: Debido a la regla de oro (no dividirás por cero), cada vez que te entreguen una fracción algebraica
  debes ponerle una etiqueta de advertencia indicando qué valores son 'tóxicos' para ella. A esto le llamamos restricciones.
resumen: Para encontrar las restricciones de una fracción, se toma el denominador, se iguala a cero, y se resuelve
  la ecuación resultante. Los valores obtenidos son los que la variable NO puede tomar.
explicacion: '### Definición formal


  El dominio es el conjunto de valores "seguros" o permitidos para la variable.


  ### Desarrollo didáctico


  Para encontrar todas las restricciones (valores prohibidos) de una fracción algebraica, debes realizar una ''interrogación''
  rigurosa a su denominador.


  El procedimiento es sistemático:

  1. **Toma solo el denominador:** Ignora por completo el numerador (el numerador sí puede ser cero, no hay problema
  con eso).

  2. **Plantea una ecuación:** Iguala el denominador a cero. Ej: $x^2 - 9 = 0$.

  3. **Resuelve la ecuación:** Factoriza y despeja la incógnita. En este caso: $(x-3)(x+3) = 0$, por lo que $x=3$
  y $x=-3$.

  4. **Declara las restricciones:** Los números que encontraste son la ''lista de restricciones''. Debes indicar
  explícitamente que la fracción existe para todos los números reales **excepto** esos valores. Se anota: $x \neq
  3$ y $x \neq -3$.


  Si no indicas las restricciones al simplificar, estás mintiendo matemáticamente, ya que la expresión original
  no era válida para esos números.'
procedimiento:
- 'Paso 1: Ignora completamente el numerador.'
- 'Paso 2: Toma la expresión del denominador y plantéala igual a cero ($Denominador = 0$).'
- 'Paso 3: Resuelve la ecuación (generalmente requerirá factorizar si es cuadrática).'
- 'Paso 4: Los números resultantes son las restricciones ($variable \neq número$).'
- El dominio es el conjunto de valores "seguros" o permitidos para la variable.
ejemplos:
- titulo: Determina las restricciones de $\frac{x+1}{2x - 8}$
  enunciado: Determina las restricciones de $\frac{x+1}{2x - 8}$.
  solucion_pasos:
  - 'Tomamos el denominador: $2x - 8$.'
  - 'Lo igualamos a cero: $2x - 8 = 0$.'
  - 'Resolvemos: $2x = 8 \rightarrow x = 4$.'
  - La restricción es $x \neq 4$.
- titulo: ¿Qué valores no puede tomar 'y' en $\frac{3}{y(y-2)}$?
  solucion_pasos:
  - 'Igualamos el denominador a cero: y(y-2) = 0. Esto se cumple si y=0 o si y=2.'
- titulo: 'Respecto de «Determinación de restricciones antes de simplificar»: ¿La siguiente formulación'
  enunciado: 'Respecto de «Determinación de restricciones antes de simplificar»: ¿La siguiente formulación es correcta?
    «Para encontrar las restricciones de una fracción, se toma el denominador, se iguala a cero, y se resuelve la
    ecuación resultante»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para encontrar las restricciones de una fracción, se toma
    el denominador, se iguala a cero, y se resuelve la ecuación resultante.'
- titulo: 'Respecto de «Determinación de restricciones antes de simplificar»: ¿La siguiente conclusión'
  enunciado: 'Respecto de «Determinación de restricciones antes de simplificar»: ¿La siguiente conclusión es correcta?
    «Calcular las restricciones usando el numerador en lugar del denominador»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para encontrar las restricciones de una fracción, se toma
    el denominador, se iguala a cero, y se resuelve la ecuación resultante.'
errores_frecuentes:
- Calcular las restricciones usando el numerador en lugar del denominador.
- Si el denominador es una letra sola ($x$), pensar que no hay restricciones (la restricción es $x \neq 0$).
- Para «¿Qué representa el 'dominio' en el contexto de una fracción algebraica», la respuesta correcta es Los valores
  que hacen que el numerador sea cero.
- El grado máximo del polinomio.
- Los valores que dan como resultado una fracción negativa.
