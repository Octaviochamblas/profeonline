semantic_id: MAT.EST.BINOMIAL_BASE.EXITO
titulo: Definir el concepto de 'éxito' en un experimento de Bernoulli
objetivo: Definir el concepto de 'éxito' como el resultado de interés en un experimento de Bernoulli,
  cuya probabilidad se denota habitualmente con la letra p.
introduccion: '''Éxito'' es una etiqueta convencional para el resultado que se está estudiando, no necesariamente
  algo positivo en el sentido cotidiano.'
resumen: El 'éxito' es el resultado del experimento de Bernoulli que se define como de interés para el
  análisis; su probabilidad se denota $p=P(\text{éxito})$.
explicacion: '![Concepto de éxito en el modelo binomial](/static/img/probabilidad/binombase/binombase-exito.svg)


  ### Definición formal


  $p=P(\text{éxito})$, donde ''éxito'' es el resultado que el analista decide estudiar, independientemente
  de si es deseable o no en el sentido cotidiano.


  ### Desarrollo didáctico


  Si se estudia la probabilidad de que un artículo salga defectuoso, se puede definir ''éxito'' como ''artículo
  defectuoso'', aunque en el lenguaje cotidiano esto sea indeseable. Lo importante es que ''éxito'' identifica
  el resultado de interés del estudio.'
procedimiento:
- 'Paso 1: Lee el problema e identifica cuál es el resultado de interés que se quiere analizar.'
- 'Paso 2: Define ese resultado como ''éxito'', sin importar si es positivo o negativo en el sentido cotidiano.'
- 'Paso 3: Denota su probabilidad como p=P(éxito), según los datos del problema.'
ejemplos:
- titulo: Definir éxito en un control de calidad
  enunciado: Se estudia la proporción de artículos defectuosos en una línea de producción.
  solucion_pasos:
  - Se define 'éxito' como 'artículo defectuoso', ya que es el resultado de interés del estudio, aunque
    sea indeseable en la práctica.
- titulo: Definir éxito en un examen médico
  enunciado: Se estudia la probabilidad de que un paciente dé positivo en un examen de detección.
  solucion_pasos:
  - Se define 'éxito' como 'resultado positivo', ya que es el evento de interés del análisis estadístico.
- titulo: ¿'Éxito' siempre representa algo positivo o deseable?
  respuesta: 'No'
  solucion_pasos:
  - No, 'éxito' es solo una etiqueta convencional para el resultado de interés, sin importar su connotación
    cotidiana.
- titulo: ¿La probabilidad de éxito se denota habitualmente con la letra p?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la notación estándar usada en el modelo binomial.
errores_frecuentes:
- Confundir 'éxito' con un resultado necesariamente positivo o deseable en el sentido cotidiano.
- No identificar correctamente cuál es el resultado de interés del problema antes de definir 'éxito'.
- Olvidar la notación estándar p=P(éxito) al plantear el problema.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
