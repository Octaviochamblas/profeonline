semantic_id: MAT.EST.MODA_ANALISIS.UNIMODAL
titulo: Identificar un conjunto de datos unimodal
objetivo: Identificar un conjunto de datos unimodal, aquel que tiene exactamente una moda.
introduccion: El caso más común es que un conjunto de datos tenga una única moda claramente definida.
resumen: Un conjunto de datos es unimodal cuando tiene exactamente un valor con la máxima frecuencia,
  es decir, una única moda.
explicacion: '![Conjunto unimodal](/static/img/estadistica/moda/moda-unimodal.svg)


  ### Definición formal


  Un conjunto es unimodal si existe un único valor $x_i$ tal que $f_i>f_j$ para todo otro valor $x_j$
  del conjunto.


  ### Desarrollo didáctico


  En el conjunto {3, 4, 4, 4, 5, 6}, el valor 4 tiene la máxima frecuencia (3) y ningún otro valor la
  iguala, por lo que el conjunto es unimodal con moda 4.'
procedimiento:
- 'Paso 1: Calcula la frecuencia de cada valor distinto del conjunto de datos.'
- 'Paso 2: Identifica el valor con la frecuencia máxima.'
- 'Paso 3: Verifica que ningún otro valor iguale esa frecuencia máxima; si es así, el conjunto es unimodal.'
ejemplos:
- titulo: Verificar que {3,4,4,4,5,6} es unimodal
  enunciado: 'Conjunto: 3,4,4,4,5,6.'
  solucion_pasos:
  - El 4 tiene frecuencia 3, ningún otro valor la iguala. Es unimodal con moda 4.
- titulo: Verificar que las notas de un curso son unimodales
  enunciado: 'Notas: 5,6,6,6,6,7.'
  solucion_pasos:
  - El 6 tiene frecuencia 4, la única mayor del conjunto. Es unimodal con moda 6.
- titulo: ¿Un conjunto unimodal tiene exactamente una moda?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición de conjunto unimodal.
- titulo: ¿Es posible que un conjunto unimodal tenga todos sus valores distintos entre sí (frecuencia
    1 cada uno)?
  respuesta: 'No'
  solucion_pasos:
  - No, en ese caso el conjunto sería amodal, ya que todos tendrían la misma frecuencia (1), sin un valor
    destacado.
errores_frecuentes:
- Confundir un conjunto unimodal con uno bimodal, sin verificar correctamente si hay empate en la frecuencia
  máxima.
- No calcular correctamente todas las frecuencias antes de determinar si el conjunto es unimodal.
- Asumir que el primer valor repetido encontrado es automáticamente la moda, sin comparar con los demás.
fuente: 'Elaboración propia (referencia: Moraleja 359).'
estado: publicado
