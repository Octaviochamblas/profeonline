semantic_id: MAT.NUM.PROG_ARITMETICA.MODELO_CAMBIO_LINEAL
objetivo: Modelar situaciones reales de la vida cotidiana que presentan un cambio
  constante como progresiones aritméticas.
introduccion: ¿Acaso el taxímetro del Uber usa sucesiones numéricas? ¿La cuenta de
  la luz? ¡Sí! Cuando algo cobra un cargo fijo más un extra por cada kilómetro o minuto,
  estás frente a una progresión aritmética disfrazada.
resumen: Una situación se modela con P.A. si y solo si presenta un 'costo inicial
  o base' y un 'crecimiento/decrecimiento constante por unidad'. Es matemáticamente
  equivalente a una función lineal ($y = mx + n$).
explicacion: "No vas a ir por la calle calculando $a_n$. Vas a calcular tarifas de\
  \ celular, depreciación de autos o crecimiento de plantas. \n\nPara modelar un problema\
  \ real con P.A:\n1. **Identifica la Diferencia ($d$):** Busca las palabras clave\
  \ 'por cada', 'aumento mensual de', 'baja a un ritmo de'. Ese es el número que siempre\
  \ se suma o resta.\n2. **Identifica el Inicio ($a_1$):** ¡Ojo aquí! A veces el 'cargo\
  \ fijo' actúa como el término inicial, pero otras veces el cargo fijo ocurre *antes*\
  \ del primer paso. Debes leer con cuidado si el primer evento real incluye ya un\
  \ aumento o es solo la base.\n\nEjemplo: Un plan de teléfono cobra $\\$5000$ fijos\
  \ al mes, más $\\$100$ por cada minuto hablado.\n- Si hablas 1 min: Pagas $5000\
  \ + 100 = 5100$ ($a_1$).\n- Si hablas 2 min: Pagas $5000 + 200 = 5200$ ($a_2$).\n\
  La diferencia es $d=100$. Es una progresión aritmética perfecta."
procedimiento:
- 'Paso 1: Lee el problema y confirma que los aumentos o disminuciones sean SIEMPRE
  por el mismo número absoluto (no porcentajes).'
- 'Paso 2: Traduce el ''ritmo de cambio'' a la diferencia ''d''.'
- 'Paso 3: Traduce el primer evento al término $a_1$.'
- 'Paso 4: Usa las fórmulas de P.A. para proyectar al futuro (Término General) o totalizar
  (Suma Finita).'
ejemplos:
- titulo: Ahorro bajo el colchón
  enunciado: Juana tiene $\$10.000$ y decide guardar $\$2.000$ extras cada mes. ¿Cuánto
    dinero total tendrá ahorrado justo al cumplirse el mes 6?
  solucion_pasos:
  - 'Cuidado: El mes 1 no empieza con 10.000. Ese es el mes cero.'
  - 'Mes 1 ahorra y llega a: 10.000 + 2.000 = 12.000 (a1 = 12.000).'
  - La diferencia es d = 2.000.
  - Me piden cuánto tiene en el mes 6 (a6).
  - a6 = 12.000 + (6-1)*2.000 = 12.000 + 10.000 = 22.000.
  - Tendrá $22.000.
errores_frecuentes:
- Confundir el 'término cero' (cargo fijo) con el $a_1$ de la fórmula. Si $a_1$ es
  el valor al mes 1, a veces hay que sumarle una vez 'd' al valor base para hallar
  $a_1$.
- Usar P.A. para problemas de intereses compuestos o poblaciones de bacterias (que
  crecen multiplicando, no sumando).
fuente: Currículum Nacional MINEDUC.
estado: publicado
