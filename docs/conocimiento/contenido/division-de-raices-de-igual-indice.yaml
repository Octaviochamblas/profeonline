semantic_id: MAT.NUM.RAICES_PROPIEDADES.DIVISION_IGUAL_INDICE
titulo: División de raíces de igual índice
objetivo: Dividir raíces de igual índice.
introduccion: Un cociente de radicales puede esconder una división exacta entre radicandos. Revisar el
  denominador antes de reunirlos evita crear una expresión inválida.
resumen: Raíces de igual índice pueden dividirse como \(\sqrt[n]{a}/\sqrt[n]{b}=\sqrt[n]{a/b}\), con divisor
  no nulo. La propiedad puede simplificar el cociente antes de calcular raíces por separado.
explicacion: 'Raíces de igual índice pueden dividirse como \(\sqrt[n]{a}/\sqrt[n]{b}=\sqrt[n]{a/b}\),
  con divisor no nulo.


  En el caso “\(\sqrt{72}/\sqrt2=\sqrt{36}=6\)” esta idea se hace visible: la propiedad puede simplificar
  el cociente antes de calcular raíces por separado'
procedimiento:
- 'Paso 1: Verifica índices iguales y que el radical divisor sea distinto de cero.'
- 'Paso 2: Forma el cociente de radicandos dentro de una sola raíz.'
- 'Paso 3: Simplifica el cociente y comprueba que se mantenga el dominio original.'
ejemplos:
- titulo: Aplicación razonada — División de raíces de igual índice
  enunciado: \(\sqrt{72}/\sqrt2=\sqrt{36}=6\).
  solucion_pasos:
  - Verifica índices iguales y que el radical divisor sea distinto de cero.
  - Forma el cociente de radicandos dentro de una sola raíz.
  - Simplifica el cociente y comprueba que se mantenga el dominio original.
- titulo: Revisión de una solución — División de raíces de igual índice
  enunciado: Una solución aplica “Forma el cociente de radicandos dentro de una sola raíz.”, pero termina
    sin comprobar que la propiedad puede simplificar el cociente antes de calcular raíces por separado.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define división de raíces de igual índice: raíces de igual índice pueden
    dividirse como \(\sqrt[n]{a}/\sqrt[n]{b}=\sqrt[n]{a/b}\), con divisor no nulo.'
  - Verifica índices iguales y que el radical divisor sea distinto de cero.
  - 'Completa la revisión con este control: Simplifica el cociente y comprueba que se mantenga el dominio
    original.'
- titulo: ¿Se cumple que la propiedad puede simplificar el cociente antes de calcular raíces por separado?
    — División de raíces de igual índice
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que raíces de igual índice pueden dividirse como \(\sqrt[n]{a}/\sqrt[n]{b}=\sqrt[n]{a/b}\),
    con divisor no nulo.
  - El caso “\(\sqrt{72}/\sqrt2=\sqrt{36}=6\)” satisface esa condición.
  - Simplifica el cociente y comprueba que se mantenga el dominio original.
- titulo: ¿Es válido omitir el paso “Verifica índices iguales y que el radical divisor sea distinto de
    cero”? — División de raíces de igual índice
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de división de raíces de igual índice.
  - 'Omitirlo puede volver inválida la acción siguiente: Forma el cociente de radicandos dentro de una
    sola raíz.'
  - 'La solución debe terminar de este modo: Simplifica el cociente y comprueba que se mantenga el dominio
    original.'
errores_frecuentes:
- 'Confundir división de raíces de igual índice con otro concepto y omitir este inicio: Verifica índices
  iguales y que el radical divisor sea distinto de cero.'
- Aplicar mecánicamente “Forma el cociente de radicandos dentro de una sola raíz.” sin revisar las condiciones
  de la definición.
- Tomar “\(\sqrt{72}/\sqrt2=\sqrt{36}=6\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la propiedad puede simplificar el cociente antes
  de calcular raíces por separado”.
- 'Terminar el desarrollo sin realizar este control: Simplifica el cociente y comprueba que se mantenga
  el dominio original.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
