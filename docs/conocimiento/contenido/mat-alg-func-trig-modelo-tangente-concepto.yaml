semantic_id: MAT.ALG.FUNC_TRIG_MODELO.TANGENTE_CONCEPTO
titulo: Concepto de la función tangente
objetivo: Definir $\tan(\theta)=\dfrac{\sin(\theta)}{\cos(\theta)}$ y reconocer su relación con el seno y el
  coseno.
introduccion: Además del seno y el coseno, existe una tercera función trigonométrica fundamental que se
  construye como el cociente entre ambas.
resumen: La **función tangente** se define como $\tan(\theta)=\dfrac{\sin(\theta)}{\cos(\theta)}$, siempre que
  $\cos(\theta)\neq0$.
explicacion: '### Definición formal


  Para todo ángulo $\theta$ tal que $\cos(\theta)\neq0$, se define $\tan(\theta)=\dfrac{\sin(\theta)}{\cos(\theta)}$.
  Geométricamente, representa la razón entre la coordenada $y$ y la coordenada $x$ del punto asociado a
  $\theta$ en el círculo unitario.


  ### Desarrollo didáctico


  $\tan(\pi/4)=\dfrac{\sin(\pi/4)}{\cos(\pi/4)}=\dfrac{\sqrt{2}/2}{\sqrt{2}/2}=1$. $\tan(0)=\dfrac{0}{1}=0$.
  $\tan(\pi/2)$ no está definida, porque $\cos(\pi/2)=0$.'
procedimiento:
- 'Paso 1: Calcula $\sin(\theta)$ y $\cos(\theta)$ para el ángulo dado.'
- 'Paso 2: Verifica que $\cos(\theta)\neq0$.'
- 'Paso 3: Divide $\sin(\theta)$ por $\cos(\theta)$ para obtener $\tan(\theta)$.'
ejemplos:
- titulo: Cálculo directo de la tangente
  enunciado: 'Calcula $\tan(\pi/3)$.'
  solucion_pasos:
  - 'Se calcula $\sin(\pi/3)=\sqrt{3}/2$ y $\cos(\pi/3)=1/2$.'
  - 'Se divide: $\tan(\pi/3)=\sqrt{3}$.'
- titulo: Detección de un valor no definido
  enunciado: '¿Está definida $\tan(3\pi/2)$?'
  solucion_pasos:
  - 'Se verifica $\cos(3\pi/2)=0$.'
  - No está definida, ya que se produciría una división por cero.
- titulo: ¿La tangente está definida para todos los ángulos reales?
  enunciado: ¿La función tangente está definida para cualquier ángulo real, sin excepciones?
  respuesta: 'No'
  solucion_pasos:
  - Se excluyen los ángulos donde $\cos(\theta)=0$, es decir, $\theta=\pi/2+n\pi$.
- titulo: ¿$\tan(0)=0$?
  enunciado: ¿El valor de $\tan(0)$ es igual a $0$?
  respuesta: Sí
  solucion_pasos:
  - '$\sin(0)=0$ y $\cos(0)=1$, así que $\tan(0)=0/1=0$.'
errores_frecuentes:
- Olvidar verificar que $\cos(\theta)\neq0$ antes de calcular la tangente.
- Confundir la tangente con el cociente inverso, $\cos(\theta)/\sin(\theta)$.
- Suponer que la tangente está acotada, como el seno y el coseno.
- Calcular mal la división entre seno y coseno, cometiendo errores aritméticos.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
