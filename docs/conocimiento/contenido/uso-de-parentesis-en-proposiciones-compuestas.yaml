semantic_id: MAT.FUND.CONECTIVOS_LOGICOS.PARENTESIS_LOGICOS
titulo: Uso de parĂŠntesis en proposiciones compuestas
objetivo: Comprender y aplicar el uso de parĂŠntesis para modificar el orden de evaluaciĂłn en fĂłrmulas
  lĂłgicas compuestas, agrupando subfĂłrmulas correctamente
introduccion: 'En aritmĂŠtica, (2 + 3) Ă 4 = 20 es diferente de 2 + (3 Ă 4) = 14. Los parĂŠntesis cambian
  el resultado. En lĂłgica ocurre lo mismo: los parĂŠntesis agrupan subfĂłrmulas y pueden cambiar completamente
  el valor de verdad de una proposiciĂłn compuesta. Son la herramienta que nos permite anular la prioridad
  predeterminada de los conectivos.

  '
resumen: 'Los parĂŠntesis en lĂłgica permiten agrupar subfĂłrmulas y forzar un orden de evaluaciĂłn diferente
  al establecido por la prioridad de conectivos. La subfĂłrmula dentro del parĂŠntesis mĂĄs interno se evalĂşa
  primero.

  '
explicacion: 'Los **parĂŠntesis** son sĂ­mbolos de agrupaciĂłn que forman parte de la sintaxis de la lĂłgica
  proposicional.


  **FunciĂłn:** Modificar el orden de evaluaciĂłn que establece la prioridad de conectivos.


  **Regla de evaluaciĂłn:** Se evalĂşa primero el parĂŠntesis mĂĄs interno (anidamiento), luego los externos.


  **Ejemplo de impacto en el valor de verdad:**


  Sean $p = V$, $q = F$, $r = V$:

  - $p \lor q \land r$ (sin parĂŠntesis) = $p \lor (q \land r)$ = $V \lor (F \land V)$ = $V \lor F$ = $V$

  - $(p \lor q) \land r$ (con parĂŠntesis) = $(V \lor F) \land V$ = $V \land V$ = $V$

  - En este caso coinciden, pero no siempre ocurre asĂ­.


  **Ejemplo con parĂŠntesis que cambia el resultado:** sean $p = F$, $q = V$, $r = V$:

  - $\neg p \land q$ = $(\neg F) \land V$ = $V \land V$ = $V$

  - $\neg(p \land q)$ = $\neg(F \land V)$ = $\neg F$ = $V$ (coinciden aquĂ­)

  - $p \land \neg q$ vs $\neg(p \land q)$: son fĂłrmulas distintas con resultados distintos en general.


  **ParĂŠntesis anidados:** Se evalĂşa de adentro hacia afuera.

  - $((p \land q) \lor r) \to s$: primero $p \land q$, luego $\_ \lor r$, luego $\_ \to s$.


  **FĂłrmula bien formada (FBF):** Una fĂłrmula sin parĂŠntesis ambiguos o faltantes. Toda FBF tiene un ĂĄrbol
  sintĂĄctico Ăşnico.

  '
procedimiento:
- Identificar el parĂŠntesis mĂĄs interno de la fĂłrmula.
- Evaluar la subfĂłrmula contenida en ese parĂŠntesis con los valores de verdad dados.
- Reemplazar el parĂŠntesis evaluado por su valor (V o F) y continuar hacia afuera.
- Repetir el proceso hasta evaluar la fĂłrmula completa.
- Verificar que el resultado final corresponde al valor de la fĂłrmula completa.
ejemplos:
- titulo: Ejemplo 1
  enunciado: Con $p = V$, $q = F$, $r = V$, evalĂşa $\neg(p \land q) \lor r$.
  solucion_pasos:
  - 'Paso 1 (parĂŠntesis mĂĄs interno): $p \land q = V \land F = F$.'
  - 'Paso 2 (negaciĂłn sobre el resultado): $\neg(F) = V$.'
  - 'Paso 3 (disyunciĂłn final): $V \lor r = V \lor V = V$.'
  - 'La fĂłrmula tiene valor de verdad: V.'
- titulo: Ejemplo 2
  enunciado: Con $p = V$, $q = V$, $r = F$, evalĂşa $((p \to q) \land r) \leftrightarrow \neg p$.
  solucion_pasos:
  - 'Paso 1 (parĂŠntesis mĂĄs interno): $p \to q = V \to V = V$.'
  - 'Paso 2 (parĂŠntesis externo): $(V) \land r = V \land F = F$.'
  - 'Paso 3 (negaciĂłn separada): $\neg p = \neg V = F$.'
  - 'Paso 4 (bicondicional): $F \leftrightarrow F = V$ (mismos valores de verdad).'
- titulo: ÂżCambia el valor de verdad de $\neg p \land q$ si se escribe como $\neg(p \land q)$?
  respuesta: SĂ­
  solucion_pasos:
  - 'Ejemplo con $p = V$, $q = V$: $\neg p \land q = F \land V = F$; mientras que $\neg(p \land q) = \neg(V)
