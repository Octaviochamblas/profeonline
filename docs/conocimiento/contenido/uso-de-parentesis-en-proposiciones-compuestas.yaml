  - 'Ejemplo con $p = F$, $q = V$: $\neg p \land q = V \land V = V$; mientras que $\neg(p \land q) = \neg(F
    \land V) = \neg F = V$ (coinciden nuevamente, pero no siempre). Con $p=V$, $q=F$: $\neg p \land q
    = F \land F = F$; $\neg(p\land q)=\neg F=V$. ÂĄDifieren!'
- titulo: ÂżTiene sentido una fĂłrmula con parĂŠntesis mal balanceados, como $p \land (q \lor r$?
  respuesta: 'No'
  solucion_pasos:
  - Una fĂłrmula bien formada (FBF) exige que cada parĂŠntesis de apertura tenga su correspondiente parĂŠntesis
    de cierre.
  - 'La expresiĂłn $p \land (q \lor r$ no es una FBF: estĂĄ incompleta y es sintĂĄcticamente invĂĄlida en
    lĂłgica proposicional.'
