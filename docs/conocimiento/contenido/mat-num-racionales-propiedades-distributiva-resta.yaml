semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.DISTRIBUTIVA_RESTA
objetivo: Distribuir un factor sobre una resta.
introduccion: 'El caso “\(\frac{3}{5}(\frac{7}{2}-\frac{1}{2})=\frac{3}{5}\cdot\frac{7}{2}-\frac{3}{5}\cdot\frac{1}{2}\)”
  plantea una situación propia de propiedad distributiva del producto respecto de
  la resta. Resolverla exige usar esta condición con precisión: la distributiva respecto
  de la resta permite multiplicar un factor común por el minuendo y por el sustraendo.'
resumen: La distributiva respecto de la resta permite multiplicar un factor común
  por el minuendo y por el sustraendo. Como criterio de control, la distributiva también
  funciona cuando dentro del paréntesis hay una resta
explicacion: |-
  La distributiva respecto de la resta permite multiplicar un factor común por el minuendo y por el sustraendo.

  En el caso “\(\frac{3}{5}(\frac{7}{2}-\frac{1}{2})=\frac{3}{5}\cdot\frac{7}{2}-\frac{3}{5}\cdot\frac{1}{2}\)” esta definición se aplica de forma directa. El control final consiste en comprobar que la distributiva también funciona cuando dentro del paréntesis hay una resta.
procedimiento:
- 'Paso 1: Identifica el factor exterior, el minuendo y el sustraendo.'
- 'Paso 2: Multiplica el factor por ambos términos y conserva el signo menos entre
  productos.'
- 'Paso 3: Verifica que \(a(b-c)=ab-ac\), cuidando especialmente los signos negativos.'
ejemplos:
- titulo: Aplicación razonada — Propiedad distributiva del producto respecto de la
    resta
  enunciado: \(\frac{3}{5}(\frac{7}{2}-\frac{1}{2})=\frac{3}{5}\cdot\frac{7}{2}-\frac{3}{5}\cdot\frac{1}{2}\).
  solucion_pasos:
  - Identifica el factor exterior, el minuendo y el sustraendo.
  - Multiplica el factor por ambos términos y conserva el signo menos entre productos.
  - Verifica que \(a(b-c)=ab-ac\), cuidando especialmente los signos negativos.
- titulo: Revisión de una solución — Propiedad distributiva del producto respecto
    de la resta
  enunciado: Una solución aplica “Multiplica el factor por ambos términos y conserva
    el signo menos entre productos.”, pero termina sin comprobar que la distributiva
    también funciona cuando dentro del paréntesis hay una resta. Determina qué falta
    justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define propiedad distributiva del producto respecto
    de la resta: la distributiva respecto de la resta permite multiplicar un factor
    común por el minuendo y por el sustraendo.'
  - Identifica el factor exterior, el minuendo y el sustraendo.
  - 'Completa la revisión con este control: Verifica que \(a(b-c)=ab-ac\), cuidando
    especialmente los signos negativos.'
- titulo: ¿Se cumple que la distributiva también funciona cuando dentro del paréntesis
    hay una resta? — Propiedad distributiva del producto respecto de la resta
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la distributiva respecto de la resta
    permite multiplicar un factor común por el minuendo y por el sustraendo.
  - El caso “\(\frac{3}{5}(\frac{7}{2}-\frac{1}{2})=\frac{3}{5}\cdot\frac{7}{2}-\frac{3}{5}\cdot\frac{1}{2}\)”
    satisface esa condición.
  - Verifica que \(a(b-c)=ab-ac\), cuidando especialmente los signos negativos.
- titulo: ¿Es válido omitir el paso “Identifica el factor exterior, el minuendo y
    el sustraendo”? — Propiedad distributiva del producto respecto de la resta
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de propiedad distributiva del producto
    respecto de la resta.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica el factor por
    ambos términos y conserva el signo menos entre productos.'
  - 'La solución debe terminar de este modo: Verifica que \(a(b-c)=ab-ac\), cuidando
    especialmente los signos negativos.'
errores_frecuentes:
- 'Empezar propiedad distributiva del producto respecto de la resta sin realizar este
  control inicial: Identifica el factor exterior, el minuendo y el sustraendo.'
- Memorizar “\(\frac{3}{5}(\frac{7}{2}-\frac{1}{2})=\frac{3}{5}\cdot\frac{7}{2}-\frac{3}{5}\cdot\frac{1}{2}\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Multiplica el factor por ambos términos y conserva
  el signo menos entre productos.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre propiedad distributiva del producto respecto
  de la resta que contradice el criterio “La distributiva también funciona cuando
  dentro del paréntesis hay una resta”.
- 'Cerrar el ejercicio sin esta comprobación específica: Verifica que \(a(b-c)=ab-ac\),
  cuidando especialmente los signos negativos.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
