semantic_id: MAT.GEO.TRIG_IDENTIDADES.PITAGORICA_FUNDAMENTAL
titulo: 'Identidad pitagórica fundamental: seno cuadrado más coseno cuadrado igual a uno'
objetivo: Demostrar y aplicar la identidad pitagórica fundamental, que relaciona el seno y el coseno de
  un mismo ángulo mediante el teorema de Pitágoras.
introduccion: Esta identidad es una consecuencia directa del teorema de Pitágoras aplicado a un triángulo
  rectángulo con hipotenusa igual a 1.
resumen: Para cualquier ángulo agudo $\theta$, se cumple la identidad $\sin^2\theta+\cos^2\theta=1$.
explicacion: '![Identidad pitagórica fundamental](/static/img/geometria/trigonometria/razon-identidad-pitagorica.svg)


  ### Definición formal


  En un triángulo rectángulo con hipotenusa igual a 1, el cateto opuesto a $\theta$ mide $\sin\theta$
  y el cateto adyacente mide $\cos\theta$. Por el teorema de Pitágoras: $(\sin\theta)^2+(\cos\theta)^2=1^2$,
  es decir, $\sin^2\theta+\cos^2\theta=1$.


  ### Desarrollo didáctico


  Esta identidad permite calcular el coseno a partir del seno (o viceversa): si $\sin\theta=0{,}6$, entonces
  $\cos^2\theta=1-0{,}36=0{,}64$, por lo que $\cos\theta=0{,}8$ (para un ángulo agudo, donde el coseno
  es positivo).'
procedimiento:
- 'Paso 1: Recuerda que esta identidad se obtiene aplicando el teorema de Pitágoras a un triángulo con
  hipotenusa 1.'
- 'Paso 2: Si conoces sinθ, despeja cos²θ=1-sin²θ para obtener cosθ (y viceversa).'
- 'Paso 3: Extrae la raíz cuadrada, recordando que para un ángulo agudo tanto el seno como el coseno son
  positivos.'
ejemplos:
- titulo: Calcular el coseno a partir del seno usando la identidad
  enunciado: sinθ=0,6 para un ángulo agudo.
  solucion_pasos:
  - cos²θ=1-0,6²=1-0,36=0,64 → cosθ=0,8.
- titulo: Verificar la identidad con valores notables
  enunciado: θ=30°, con sin30°=0,5 y cos30°=√3/2.
  solucion_pasos:
  - sin²30°+cos²30°=0,25+0,75=1, confirmando la identidad.
- titulo: ¿Esta identidad se cumple para cualquier ángulo agudo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una identidad válida para todos los ángulos, no solo para valores específicos.
- titulo: ¿Se puede usar esta identidad para verificar cálculos trigonométricos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una herramienta útil para comprobar que un par de valores de seno y coseno son consistentes
    entre sí.
errores_frecuentes:
- Olvidar elevar al cuadrado tanto el seno como el coseno antes de sumarlos.
- 'Confundir esta identidad con una simple suma sin cuadrados: sinθ+cosθ≠1 en general.'
- Olvidar considerar el signo correcto al sacar la raíz cuadrada.
fuente: 'Elaboración propia (referencias: Moraleja 178, Cid 155).'
estado: publicado
