semantic_id: MAT.GEO.POLIEDROS_PRISMAS.PRISMA_RECTO_CONCEPTO
titulo: Concepto de prisma recto
objetivo: Reconocer el prisma recto como un poliedro con dos bases poligonales congruentes y paralelas,
  unidas por caras laterales rectangulares perpendiculares a las bases.
introduccion: 'Un prisma recto es como una ''columna'' geométrica: dos bases iguales y paralelas, conectadas
  por caras laterales que forman ángulos rectos con ellas.'
resumen: Un prisma recto es un poliedro formado por dos bases poligonales congruentes y paralelas, unidas
  por caras laterales rectangulares que son perpendiculares a las bases.
explicacion: '![Concepto de prisma recto](/static/img/geometria/espacio-cuerpos/prisma-recto-concepto.svg)


  ### Definición formal


  Un prisma recto tiene dos bases poligonales congruentes y paralelas entre sí, unidas por aristas laterales
  perpendiculares a ambas bases. Como consecuencia, todas las caras laterales son rectángulos.


  ### Desarrollo didáctico


  En la figura, el prisma rectangular tiene sus dos bases (superior e inferior) paralelas y congruentes,
  y sus aristas laterales forman ángulos de 90° con las bases, generando caras laterales rectangulares.
  Si las aristas laterales no fueran perpendiculares a las bases, el prisma sería oblicuo, no recto.'
procedimiento:
- 'Paso 1: Verifica que el poliedro tenga dos bases poligonales congruentes y paralelas.'
- 'Paso 2: Verifica que las aristas laterales sean perpendiculares a ambas bases.'
- 'Paso 3: Si se cumplen ambas condiciones, el prisma es recto (y sus caras laterales son rectángulos).'
ejemplos:
- titulo: Verificar que un prisma es recto
  enunciado: Un prisma tiene bases hexagonales congruentes y paralelas, con aristas laterales perpendiculares
    a ellas.
  solucion_pasos:
  - El prisma es recto, ya que sus aristas laterales son perpendiculares a las bases, generando caras
    laterales rectangulares.
- titulo: Reconocer un prisma que NO es recto
  enunciado: Un prisma tiene bases paralelas, pero sus aristas laterales están inclinadas (no perpendiculares).
  solucion_pasos:
  - Ese prisma es oblicuo, no recto, ya que sus caras laterales no forman ángulos rectos con las bases.
- titulo: ¿Las caras laterales de un prisma recto son siempre rectángulos?
  respuesta: Sí
  solucion_pasos:
  - Sí, al ser las aristas laterales perpendiculares a las bases, las caras laterales resultan ser rectángulos.
- titulo: ¿Las dos bases de un prisma recto deben ser congruentes entre sí?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, es una condición esencial: ambas bases deben tener exactamente la misma forma y tamaño.'
errores_frecuentes:
- Confundir un prisma recto con uno oblicuo (donde las aristas laterales no son perpendiculares a las
  bases).
- Creer que las bases deben ser necesariamente cuadradas o rectangulares (pueden ser cualquier polígono).
- Olvidar verificar la congruencia entre ambas bases antes de clasificar el prisma.
fuente: 'Elaboración propia (referencias: Moraleja 96, Cid 181).'
estado: publicado
