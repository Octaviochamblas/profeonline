semantic_id: MAT.FUND.RAZONAMIENTO_LOGICO.CONDICIONAL_INVERSO
titulo: Inverso de un condicional
objetivo: Obtener el inverso de una proposición condicional negando tanto el antecedente como el consecuente.
introduccion: 'Imagina que alguien te dice: "Si comes todas tus verduras, entonces obtendrás postre".
  ¿Qué pasaría si no comes tus verduras? ¿Significa automáticamente que no tendrás postre?


  En lógica matemática, si tomamos una frase de tipo "Si... entonces..." y negamos ambas partes, creamos
  una nueva proposición llamada el inverso (o contraria) del condicional.


  Es súper importante entender que el inverso no significa lo mismo que la frase original. ¡Tu mamá podría
  tener piedad y darte postre de todas formas! Aprenderemos a construir el inverso de cualquier condicional
  y a ver por qué no debemos confundirlo con la frase original.'
resumen: 'El inverso de un condicional $p \to q$ es la proposición condicional $\neg p \to \neg q$, obtenida
  al negar tanto el antecedente como el consecuente. En general, un condicional y su inverso no son lógicamente
  equivalentes.

  '
explicacion: 'Dado un condicional de la forma $p \to q$, donde $p$ es el **antecedente** y $q$ es el **consecuente**,
  podemos formar otras proposiciones lógicas relacionadas.


  El **inverso** (o la proposición contraria) de $p \to q$ se obtiene negando individualmente tanto el
  antecedente como el consecuente, manteniendo el orden original de la implicación.


  Formalmente:

  $$\text{Si el condicional original es } p \to q \text{, su inverso es } \neg p \to \neg q$$


  **Independencia de los Valores de Verdad**

  Un condicional y su inverso **no son lógicamente equivalentes**:

  $$p \to q \not\equiv \neg p \to \neg q$$


  Comparemos sus tablas de verdad:


  | $p$ | $q$ | $\neg p$ | $\neg q$ | Condicional: $p \to q$ | Inverso: $\neg p \to \neg q$ |

  | :---: | :---: | :---: | :---: | :---: | :---: |

  | V | V | F | F | **V** | **V** |

  | V | F | F | V | **F** | **V** |

  | F | V | V | F | **V** | **F** |

  | F | F | V | V | **V** | **V** |


  Como vemos en las filas 2 y 3, sus valores de verdad son diferentes. Sin embargo, es interesante notar
  que el inverso $\neg p \to \neg q$ es lógicamente equivalente al recíproco $q \to p$.'
procedimiento:
- 'Paso 1: Identificar el antecedente ($p$) y el consecuente ($q$) en la proposición condicional original
  $p \to q$.'
- 'Paso 2: Negar de forma individual tanto el antecedente como el consecuente, obteniendo $\neg p$ y $\neg
  q$.'
- 'Paso 3: Escribir la nueva proposición condicional manteniendo el orden de la implicación: $\neg p \to
  \neg q$. En esquema: $p \to q \implies \neg p \to \neg q$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'Determina el inverso del condicional: ''Si llueve, entonces la calle se moja''.'
  solucion_pasos:
  - 'Paso a: Identificamos el antecedente $p$ (''llueve'') y el consecuente $q$ (''la calle se moja'').'
  - 'Paso b: Negamos ambas partes: $\neg p$ es ''no llueve'' y $\neg q$ es ''la calle no se moja''.'
  - 'Paso c: Formamos el condicional inverso manteniendo el orden: ''Si no llueve, entonces la calle no
    se moja''.'
  - 'Paso d: Notamos que el condicional original es verdadero, pero el inverso puede ser falso (la calle
    se podría mojar por un camión de riego).'
- titulo: Ejemplo 2
  enunciado: Escribe la proposición inversa de $\neg p \to q$.
  solucion_pasos:
  - 'Paso a: Identificamos el antecedente: $\neg p$.'
  - 'Paso b: Identificamos el consecuente: $q$.'
  - 'Paso c: Negamos ambos términos: la negación de $\neg p$ es $\neg(\neg p) \equiv p$, y la negación
    de $q$ es $\neg q$.'
  - 'Paso d: Escribimos el condicional inverso con las partes negadas: $p \to \neg q$.'
- titulo: ¿El inverso de 'Si estudio, entonces apruebo' es 'Si no estudio, entonces no apruebo'?
  respuesta: Sí
  solucion_pasos:
  - 'Identificamos el antecedente: ''estudio''.'
  - 'Identificamos el consecuente: ''apruebo''.'
  - 'Negamos ambos elementos manteniendo el orden: ''Si no estudio, entonces no apruebo''.'
  - Esta proposición corresponde exactamente a la definición de condicional inverso.
- titulo: ¿Es un condicional siempre lógicamente equivalente a su inverso?
  respuesta: 'No'
  solucion_pasos:
  - Comparemos las tablas de verdad de $p \to q$ y $\neg p \to \neg q$.
  - Para la combinación $p$ Falso y $q$ Verdadero (F, V), el condicional $p \to q$ es Verdadero, pero
    el inverso $\neg p \to \neg q$ es Falso (pues se traduce en $V \to F$).
  - Al diferir en sus valores de verdad, se demuestra que $p \to q \not\equiv \neg p \to \neg q$.
errores_frecuentes:
- Asumir que un condicional y su inverso siempre dicen lo mismo (son equivalentes) e intercambiarlos en
  deducciones.
- Confundir el inverso (\\neg p \\to \\neg q) con el recíproco (q \\to p) o con el contrarrecíproco (\\neg
  q \\to \\neg p).
- Intercambiar de lugar los términos al negar (escribiendo \\neg q \\to \\neg p, lo cual es el contrarrecíproco,
  no el inverso).
- Olvidar aplicar la ley de doble negación al negar términos que ya eran negativos en el condicional de
  origen.
- Creer que si el condicional inverso es falso, el condicional original obligatoriamente debe ser falso,
  siendo que son independientes.
fuente: Lógica Simbólica, Irving Copi, Capítulo 2
estado: publicado
