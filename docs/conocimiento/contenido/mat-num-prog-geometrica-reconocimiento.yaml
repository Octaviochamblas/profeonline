semantic_id: MAT.NUM.PROG_GEOMETRICA.RECONOCIMIENTO
objetivo: Auditar una lista de números para determinar rápidamente si califica o no
  como progresión geométrica.
introduccion: No todo lo que crece rápido es una progresión geométrica. Algunas sucesiones
  tienen trampas. Así como en las aritméticas comprobábamos restando, aquí seremos
  los inspectores de la multiplicación.
resumen: Para confirmar que una secuencia es Progresión Geométrica (P.G.), debes verificar
  que al **dividir** cualquier término por su antecesor, el resultado ('$r$') sea
  siempre idéntico para todos los pares consecutivos entregados.
explicacion: 'Una secuencia sospechosa: $2, 6, 18, 36$.

  Vamos a auditarla paso a paso:

  1. $6 / 2 = 3$

  2. $18 / 6 = 3$

  3. $36 / 18 = 2$ $\rightarrow$ **¡Fallo!** Aunque empezó bien multiplicando por
  3, al final se multiplicó por 2. No es una P.G.


  También puedes toparte con secuencias alternadas como $5, -10, 20, -40$.

  1. $-10 / 5 = -2$

  2. $20 / -10 = -2$

  3. $-40 / 20 = -2$

  ¡Éxito! Todas las divisiones dan $-2$. Es una P.G. perfectamente válida.'
procedimiento:
- 'Paso 1: Toma el segundo número y divídelo por el primero.'
- 'Paso 2: Toma el tercer número y divídelo por el segundo.'
- 'Paso 3: Sigue así con todos los números que te hayan dado.'
- 'Paso 4: Si todas las divisiones dan el mismo resultado exacto, es una P.G. Si una
  sola falla, la rechazas.'
ejemplos:
- titulo: Desenmascarando al impostor
  enunciado: ¿La secuencia $1, 4, 9, 16$ es una progresión geométrica?
  solucion_pasos:
  - Dividimos 4/1 = 4.
  - Dividimos 9/4 = 2.25.
  - Como 4 y 2.25 son distintos, no necesitamos seguir. NO es geométrica. (En realidad,
    son los cuadrados perfectos).
errores_frecuentes:
- Comprobar solo los primeros dos números y dar por hecho que la regla se cumple para
  el resto.
- Creer que si tiene números negativos o fracciones no puede ser geométrica. Las progresiones
  con razón fraccionaria o negativa son las favoritas en la PAES.
fuente: Currículum Nacional MINEDUC.
estado: publicado
