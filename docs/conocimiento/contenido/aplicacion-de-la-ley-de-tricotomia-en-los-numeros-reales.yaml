semantic_id: MAT.ALG.ORDEN_FUNDAMENTOS.LEY_TRICOTOMIA
titulo: Aplicación de la ley de tricotomía en los números reales
objetivo: Aplicar la ley de tricotomía para establecer la relación exacta entre dos números reales.
introduccion: La comparación fundamental en álgebra requiere que sepamos si una cantidad es mayor, menor
  o igual a otra.
resumen: La ley de tricotomía establece que dadas dos cantidades, solo una de tres relaciones posibles
  puede cumplirse.
explicacion: '### Definición formal

  Para cualquier par de números reales $a$ y $b$, se cumple exactamente una de las siguientes relaciones:
  $a < b$, $a = b$, o $a > b$.


  ### Desarrollo didáctico

  Esta propiedad es fundamental para la resolución de desigualdades, ya que descarta cualquier ambigüedad
  al comparar dos valores reales.'
procedimiento:
- Identificar los dos números reales a comparar.
- Evaluar la diferencia entre ambos valores.
- Concluir cuál de las tres relaciones de tricotomía se cumple.
ejemplos:
- enunciado: Analizar la validez de la relación para $x = 3$ frente a $y = 2$.
  solucion_pasos:
  - Evaluar los valores asignados a cada variable.
  - Comparar los resultados obtenidos en el marco de la definición formal.
  titulo: Ejemplo de análisis 1 en el contexto de la relación matemática
- enunciado: Analizar la validez de la relación para $x = 4$ frente a $y = 4$.
  solucion_pasos:
  - Evaluar los valores asignados a cada variable.
  - Comparar los resultados obtenidos en el marco de la definición formal.
  titulo: Ejemplo de análisis 2 en el contexto de la relación matemática
- respuesta: Sí
  solucion_pasos:
  - Reemplazar el valor propuesto en la formulación.
  - Verificar la concordancia lógica positiva.
  titulo: ¿Cumple el número $5$ con la condición matemática descrita?
- respuesta: 'No'
  solucion_pasos:
  - Sustituir la cantidad constante en el modelo algebraico.
  - Demostrar que el valor no satisface la exigencia definida.
  titulo: ¿Cumple el número $-3$ con la condición matemática descrita?
errores_frecuentes:
- Dos números pueden ser mayores y menores entre sí al mismo tiempo.
- La ley de tricotomía aplica solo a números enteros.
- Es posible que dos números reales no cumplan ninguna de las tres relaciones.
- Si $a = b$, entonces también puede ser que $a < b$.
- La tricotomía no es válida si uno de los números es irracional.
fuente: Elaboración propia
estado: publicado
