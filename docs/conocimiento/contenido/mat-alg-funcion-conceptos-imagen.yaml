semantic_id: MAT.ALG.FUNCION_CONCEPTOS.IMAGEN
titulo: Concepto de imagen de una función
objetivo: Comprender la imagen de un elemento del dominio como el único valor que la función le asigna.
introduccion: 'Cuando introduces un valor $x$ en una función, obtienes exactamente un resultado. Ese resultado
  tiene nombre propio en matemáticas: la imagen de $x$.'
resumen: Dada una función $f\colon A \to B$ y un elemento $x \in A$, la **imagen** de $x$ es el único valor $y = f(x)
  \in B$ que la función le asigna.
explicacion: '### Definición formal


  Para $f\colon A \to B$ y $x \in A$, la imagen de $x$ bajo $f$ es el elemento $y = f(x)$ tal que $(x,y) \in f$. La
  definición de función garantiza que esta imagen existe y es única para cada $x$ del dominio.


  ### Desarrollo didáctico


  Si $f(x) = 2x - 1$, la imagen de $x=5$ se obtiene evaluando: $f(5) = 2(5) - 1 = 9$. Decimos que "$9$ es la imagen
  de $5$ bajo $f$", o simplemente $f(5)=9$.


  A diferencia de la preimagen (que puede tener varios valores), la imagen de un elemento del dominio es siempre
  un único número, garantizado por la condición de unicidad que define a las funciones.'
procedimiento:
- 'Paso 1: Identifica el elemento $x$ del dominio cuya imagen buscas.'
- 'Paso 2: Sustituye ese valor en la regla de la función $f(x)$.'
- 'Paso 3: Realiza las operaciones indicadas para obtener un único valor numérico.'
- 'Paso 4: Ese valor es la imagen de $x$ bajo $f$.'
ejemplos:
- titulo: Cálculo directo de una imagen
  enunciado: Si $f(x) = x^2 - 3$, determina la imagen de $x=4$.
  solucion_pasos:
  - Se sustituye $x$ por $4$ en la fórmula.
  - '$f(4) = 4^2 - 3 = 16 - 3 = 13$.'
- titulo: Imagen con argumento negativo
  enunciado: Si $f(x) = -2x + 7$, determina la imagen de $x=-3$.
  solucion_pasos:
  - Se sustituye $x$ por $-3$.
  - '$f(-3) = -2(-3) + 7 = 6 + 7 = 13$.'
- titulo: ¿Un elemento del dominio puede tener dos imágenes distintas?
  enunciado: ¿Un elemento del dominio puede tener dos imágenes distintas?
  respuesta: Falso
  solucion_pasos:
  - La definición de función exige unicidad de imagen para cada elemento del dominio.
- titulo: ¿La imagen de $x$ bajo $f$ es lo mismo que $f(x)$?
  enunciado: ¿La imagen de $x$ bajo $f$ es lo mismo que $f(x)$?
  respuesta: Verdadero
  solucion_pasos:
  - Por definición, $f(x)$ es la notación estándar para nombrar la imagen de $x$ bajo la función $f$.
errores_frecuentes:
- Confundir imagen con preimagen, buscando qué valores producen un resultado en vez de calcular el resultado.
- Creer que un mismo $x$ puede tener dos imágenes distintas según el contexto.
- Sustituir el valor solo en parte de la fórmula al calcular una imagen con varios términos.
- Olvidar aplicar la jerarquía de operaciones al evaluar la imagen.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
