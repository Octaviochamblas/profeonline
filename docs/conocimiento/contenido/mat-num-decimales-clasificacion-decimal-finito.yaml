semantic_id: MAT.NUM.DECIMALES_CLASIFICACION.DECIMAL_FINITO
titulo: Decimal finito
objetivo: Reconocer cuándo la expresión decimal de un número tiene una cantidad limitada de cifras.
introduccion: No todos los números racionales se escriben con infinitas cifras decimales. Cuando la división
  que genera la expresión decimal termina exactamente, el número es un decimal finito.
resumen: Un decimal finito es aquel cuya cantidad de cifras después de la coma es limitada; su expresión
  decimal termina.
explicacion: '### Definición formal


  Un número racional \(\frac{a}{b}\) (en forma irreductible) tiene expresión decimal finita si y solo
  si los únicos factores primos de \(b\) son 2 y/o 5, pues la división por potencias de 2 y 5 siempre
  termina.


  ### Desarrollo didáctico


  \(0.75\) es decimal finito porque sus cifras después de la coma terminan: proviene de \(\frac{3}{4}\),
  y \(4=2^2\) solo tiene el factor primo 2.'
procedimiento:
- 'Paso 1: Observa si la escritura decimal termina después de una cantidad limitada de cifras.'
- 'Paso 2: Cuenta las posiciones decimales y escríbelo sobre la potencia de diez correspondiente.'
- 'Paso 3: Simplifica la fracción para confirmar que representa el mismo valor.'
ejemplos:
- titulo: Aplicación razonada — Identificación de decimal finito
  enunciado: \(0.75\) es decimal finito porque sus cifras después de la coma terminan.
  solucion_pasos:
  - Observa si la escritura decimal termina después de una cantidad limitada de cifras.
  - Cuenta las posiciones decimales y escríbelo sobre la potencia de diez correspondiente.
  - Simplifica la fracción para confirmar que representa el mismo valor.
- titulo: Revisión de una solución — Identificación de decimal finito
  enunciado: Una solución aplica “Cuenta las posiciones decimales y escríbelo sobre la potencia de diez
    correspondiente.”, pero termina sin comprobar que todo decimal finito puede escribirse como fracción
    con denominador potencia de 10. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de decimal finito: un decimal finito tiene una cantidad
    limitada de cifras decimales.'
  - Observa si la escritura decimal termina después de una cantidad limitada de cifras.
  - 'Completa la revisión con este control: Simplifica la fracción para confirmar que representa el mismo
    valor.'
- titulo: ¿Se cumple que todo decimal finito puede escribirse como fracción con denominador potencia de
    10? — Identificación de decimal finito
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un decimal finito tiene una cantidad limitada de cifras
    decimales.
  - El caso “\(0.75\) es decimal finito porque sus cifras después de la coma terminan” satisface esa condición.
  - Simplifica la fracción para confirmar que representa el mismo valor.
- titulo: ¿Es válido omitir el paso “Observa si la escritura decimal termina después de una cantidad limitada
    de cifras”? — Identificación de decimal finito
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de decimal finito.
  - 'Omitirlo puede volver inválida la acción siguiente: Cuenta las posiciones decimales y escríbelo sobre
    la potencia de diez correspondiente.'
  - 'La solución debe terminar de este modo: Simplifica la fracción para confirmar que representa el mismo
    valor.'
errores_frecuentes:
- 'Empezar identificación de decimal finito sin realizar este control inicial: Observa si la escritura
  decimal termina después de una cantidad limitada de cifras.'
- Memorizar “\(0.75\) es decimal finito porque sus cifras después de la coma terminan” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Cuenta las posiciones decimales y escríbelo sobre la potencia de diez correspondiente.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación de decimal finito que contradice el criterio “Todo
  decimal finito puede escribirse como fracción con denominador potencia de 10”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica la fracción para confirmar que representa
  el mismo valor.'
