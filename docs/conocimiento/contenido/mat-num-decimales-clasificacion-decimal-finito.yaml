semantic_id: MAT.NUM.DECIMALES_CLASIFICACION.DECIMAL_FINITO
objetivo: Reconocer un decimal finito.
introduccion: La idea “Todo decimal finito puede escribirse como fracción con denominador
  potencia de 10” cobra sentido al analizar el caso “\(0.75\) es decimal finito porque
  sus cifras después de la coma terminan”. Ese vínculo es el foco de identificación
  de decimal finito.
resumen: Un decimal finito tiene una cantidad limitada de cifras decimales. Como criterio
  de control, todo decimal finito puede escribirse como fracción con denominador potencia
  de 10
explicacion: |-
  Un decimal finito tiene una cantidad limitada de cifras decimales.

  El ejemplo “\(0.75\) es decimal finito porque sus cifras después de la coma terminan” lleva la definición a una situación concreta y permite verificar esta consecuencia: Todo decimal finito puede escribirse como fracción con denominador potencia de 10.
procedimiento:
- 'Paso 1: Observa si la escritura decimal termina después de una cantidad limitada
  de cifras.'
- 'Paso 2: Cuenta las posiciones decimales y escríbelo sobre la potencia de diez correspondiente.'
- 'Paso 3: Simplifica la fracción para confirmar que representa el mismo valor.'
ejemplos:
- titulo: Aplicación razonada — Identificación de decimal finito
  enunciado: \(0.75\) es decimal finito porque sus cifras después de la coma terminan.
  solucion_pasos:
  - Observa si la escritura decimal termina después de una cantidad limitada de cifras.
  - Cuenta las posiciones decimales y escríbelo sobre la potencia de diez correspondiente.
  - Simplifica la fracción para confirmar que representa el mismo valor.
- titulo: Revisión de una solución — Identificación de decimal finito
  enunciado: Una solución aplica “Cuenta las posiciones decimales y escríbelo sobre
    la potencia de diez correspondiente.”, pero termina sin comprobar que todo decimal
    finito puede escribirse como fracción con denominador potencia de 10. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de decimal finito: un decimal
    finito tiene una cantidad limitada de cifras decimales.'
  - Observa si la escritura decimal termina después de una cantidad limitada de cifras.
  - 'Completa la revisión con este control: Simplifica la fracción para confirmar
    que representa el mismo valor.'
- titulo: ¿Se cumple que todo decimal finito puede escribirse como fracción con denominador
    potencia de 10? — Identificación de decimal finito
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un decimal finito tiene una cantidad
    limitada de cifras decimales.
  - El caso “\(0.75\) es decimal finito porque sus cifras después de la coma terminan”
    satisface esa condición.
  - Simplifica la fracción para confirmar que representa el mismo valor.
- titulo: ¿Es válido omitir el paso “Observa si la escritura decimal termina después
    de una cantidad limitada de cifras”? — Identificación de decimal finito
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de decimal finito.
  - 'Omitirlo puede volver inválida la acción siguiente: Cuenta las posiciones decimales
    y escríbelo sobre la potencia de diez correspondiente.'
  - 'La solución debe terminar de este modo: Simplifica la fracción para confirmar
    que representa el mismo valor.'
errores_frecuentes:
- 'Empezar identificación de decimal finito sin realizar este control inicial: Observa
  si la escritura decimal termina después de una cantidad limitada de cifras.'
- Memorizar “\(0.75\) es decimal finito porque sus cifras después de la coma terminan”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Cuenta las posiciones decimales y escríbelo sobre la
  potencia de diez correspondiente.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación de decimal finito que contradice
  el criterio “Todo decimal finito puede escribirse como fracción con denominador
  potencia de 10”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica la fracción para
  confirmar que representa el mismo valor.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
