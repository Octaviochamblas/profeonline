semantic_id: MAT.ALG.REDUCCION_OPERATIVA.COEFICIENTES_FRACCIONARIOS
objetivo: Reducir términos semejantes cuyos coeficientes son fracciones, aplicando la suma o resta de fracciones.
introduccion: 'Los coeficientes de un término algebraico no siempre son números enteros. A veces son fracciones.
  La buena noticia: la regla de la semejanza no cambia. La única diferencia es que la suma de los coeficientes requiere
  operar con fracciones.'
resumen: Al reducir términos semejantes con **Coeficientes Fraccionarios**, el factor literal se trata igual que
  siempre. El trabajo extra está en sumar o restar las fracciones correctamente (buscando un denominador común).
explicacion: '### Definición formal


  Los denominadores son iguales, sumamos numeradores: $\frac{1+1}{4} = \frac{2}{4} = \frac{1}{2}$. Resultado: $\frac{1}{2}m$.


  ### Desarrollo didáctico


  Reduce: $\frac{1}{2}x + \frac{1}{3}x$.


  Ambos son de la familia $x$. Debo sumar los coeficientes $\frac{1}{2}$ y $\frac{1}{3}$.

  Mínimo común denominador (MCD): $6$.

  $\frac{1}{2} = \frac{3}{6}$ y $\frac{1}{3} = \frac{2}{6}$.

  $\frac{3}{6} + \frac{2}{6} = \frac{5}{6}$.

  Resultado: $\frac{5}{6}x$.'
procedimiento:
- 'Paso 1: Confirma que los términos son semejantes (mismo factor literal).'
- 'Paso 2: Extrae los coeficientes fraccionarios.'
- 'Paso 3: Suma o resta esas fracciones buscando el denominador común.'
- 'Paso 4: El resultado de la operación de fracciones es el nuevo coeficiente, acompañado del factor literal.'
- 'Los denominadores son iguales, sumamos numeradores: $\frac{1+1}{4} = \frac{2}{4} = \frac{1}{2}$. Resultado: $\frac{1}{2}m$.'
ejemplos:
- titulo: Medias y cuartos de x
  enunciado: 'Reduce: (3/4)a - (1/2)a.'
  solucion_pasos:
  - Familia 'a'. Operamos los coeficientes.
  - MCD de 4 y 2 es 4.
  - 1/2 = 2/4.
  - 3/4 - 2/4 = 1/4.
  - 'Resultado: (1/4)a.'
- titulo: 'En una receta industrial se usan dos ingredientes del mismo tipo X: $\frac{1}{3}$ de litro e'
  enunciado: 'En una receta industrial se usan dos ingredientes del mismo tipo X: $\frac{1}{3}$ de litro en la primera
    fase y $\frac{1}{4}$ de litro en la segunda. ¿Cuántos litros totales del ingrediente X se utilizan? (v1)


    Opciones: A) $\frac{7}{12}X$ · B) $\frac{2}{7}X$ · C) $\frac{1}{12}X$ · D) $\frac{2}{12}X$'
  solucion_pasos:
  - 'MCD de 3 y 4 es 12. $\frac{1}{3}=\frac{4}{12}$ y $\frac{1}{4}=\frac{3}{12}$. Sumamos: $\frac{4+3}{12}=\frac{7}{12}$.
    Total: $\frac{7}{12}X$.'
- titulo: 'Respecto de «Reducción con coeficientes fraccionarios»: ¿Describe adecuadamente el concepto'
  enunciado: 'Respecto de «Reducción con coeficientes fraccionarios»: ¿Describe adecuadamente el concepto esta frase?
    «Al reducir términos semejantes con **Coeficientes Fraccionarios**, el factor literal se trata igual que siempre»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al reducir términos semejantes con **Coeficientes Fraccionarios**,
    el factor literal se trata igual que siempre.'
- titulo: 'Respecto de «Reducción con coeficientes fraccionarios»: ¿Se puede aceptar esta afirmación? «'
  enunciado: 'Respecto de «Reducción con coeficientes fraccionarios»: ¿Se puede aceptar esta afirmación? «Sumar
    los numeradores y los denominadores directamente (ej. 1/2 + 1/3 = 2/5). ¡Error garrafal!»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al reducir términos semejantes con **Coeficientes Fraccionarios**,
    el factor literal se trata igual que siempre.'
errores_frecuentes:
- Sumar los numeradores y los denominadores directamente (ej. 1/2 + 1/3 = 2/5). ¡Error garrafal!
- Multiplicar el resultado de la suma de fracciones por sí misma en lugar de por el factor literal.
- Para «Al intentar reducir $(\frac{1}{4})m + (\frac{1}{4})m$, ¿cuál es el resultado correcto? (v1)», la respuesta
  correcta es $\frac{1}{8}m$.
- Para «Al intentar reducir $(\frac{1}{4})m + (\frac{1}{4})m$, ¿cuál es el resultado correcto? (v1)», la respuesta
  correcta es $\frac{2}{8}m$.
- Para «Al intentar reducir $(\frac{1}{4})m + (\frac{1}{4})m$, ¿cuál es el resultado correcto? (v1)», la respuesta
  correcta es $\frac{1}{16}m$.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Reducción con coeficientes fraccionarios
