semantic_id: MAT.EST.BINOMIAL_BASE.PROBABILIDAD_FRACASO
titulo: Calcular la probabilidad de fracaso en problemas contextualizados
objetivo: Calcular la probabilidad de fracaso q a partir de datos contextualizados de un problema, aplicando
  la relación q=1-p.
introduccion: En problemas aplicados, con frecuencia se entrega la probabilidad de éxito en un contexto
  real (por ejemplo, tasa de aprobación, efectividad de un tratamiento), y se pide calcular la probabilidad
  complementaria.
resumen: Dado un valor de $p$ en un contexto específico, la probabilidad de fracaso se obtiene directamente
  aplicando $q=1-p$.
explicacion: '![Cálculo de la probabilidad de fracaso en contexto](/static/img/probabilidad/binombase/binombase-probabilidad-fracaso.svg)


  ### Definición formal


  $q=1-p$, aplicada a los datos específicos de un problema contextualizado.


  ### Desarrollo didáctico


  Si una vacuna tiene una efectividad (probabilidad de éxito) de $p=0{,}9$, la probabilidad de que no
  sea efectiva en un paciente (fracaso) es $q=1-0{,}9=0{,}1$, es decir, un 10%.'
procedimiento:
- 'Paso 1: Identifica el valor de p dado en el contexto del problema (puede estar expresado como porcentaje
  o decimal).'
- 'Paso 2: Convierte el valor a decimal si es necesario (por ejemplo, 90% → 0,9).'
- 'Paso 3: Calcula q=1-p y expresa el resultado en el mismo formato que se pide en el problema (decimal
  o porcentaje).'
ejemplos:
- titulo: Calcular la probabilidad de que una vacuna no sea efectiva
  enunciado: Una vacuna tiene 90% de efectividad.
  solucion_pasos:
  - p=0,9 (efectiva). q=1-0,9=0,1, es decir, un 10% de probabilidad de no ser efectiva.
- titulo: Calcular la probabilidad de que un vuelo no llegue a tiempo
  enunciado: El 85% de los vuelos de una aerolínea llegan a tiempo.
  solucion_pasos:
  - p=0,85 (llega a tiempo). q=1-0,85=0,15, es decir, un 15% de probabilidad de no llegar a tiempo.
- titulo: ¿Es necesario convertir un porcentaje a decimal antes de calcular q?
  respuesta: Sí
  solucion_pasos:
  - Sí, para aplicar correctamente la fórmula q=1-p, ambos valores deben estar en el mismo formato (decimal).
- titulo: ¿El resultado final se puede expresar nuevamente como porcentaje?
  respuesta: Sí
  solucion_pasos:
  - Sí, dependiendo de cómo se pida la respuesta en el problema, multiplicando por 100 si corresponde.
errores_frecuentes:
- Olvidar convertir el porcentaje a decimal antes de aplicar la fórmula q=1-p.
- Confundir el porcentaje de éxito dado en el problema con el de fracaso, invirtiendo el resultado.
- Expresar el resultado final en un formato distinto al solicitado (decimal en vez de porcentaje, o viceversa).
fuente: Elaboración propia.
estado: publicado
