semantic_id: MAT.GEO.CIRCULO_TEOREMAS.CUERDAS_PRODUCTO
titulo: Teorema de las cuerdas como igualdad de productos de segmentos de cuerdas
objetivo: Aplicar el teorema de las cuerdas para calcular longitudes desconocidas mediante la igualdad
  de productos de los segmentos que dos cuerdas determinan al cruzarse.
introduccion: 'Cuando dos cuerdas se cruzan dentro de un círculo, existe una relación numérica precisa
  entre los cuatro segmentos que forman: sus productos son iguales.'
resumen: Si dos cuerdas $AB$ y $CD$ se intersectan en un punto interior $P$, entonces $PA\times PB = PC\times
  PD$.
explicacion: '![Teorema de las cuerdas: PA×PB = PC×PD](/static/img/geometria/circunferencia-circulo/circulo-teorema-cuerdas-producto.svg)


  ### Definición formal


  Si las cuerdas $AB$ y $CD$ de una circunferencia se cruzan en un punto interior $P$, se cumple que $PA\times
  PB=PC\times PD$. Esta igualdad se demuestra mediante semejanza de los triángulos $PAC$ y $PDB$ (o $PAD$
  y $PCB$, según la configuración).


  ### Desarrollo didáctico


  Si $PA=4$ cm, $PB=6$ cm y $PC=3$ cm, entonces $4\times6=3\times PD$, de donde $PD=\frac{24}{3}=8$ cm.
  Este teorema permite calcular un segmento desconocido conociendo los otros tres.'
procedimiento:
- 'Paso 1: Identifica las cuatro longitudes de los segmentos formados por las dos cuerdas que se cruzan
  (PA, PB, PC, PD).'
- 'Paso 2: Plantea la igualdad PA×PB=PC×PD, sustituyendo los valores conocidos.'
- 'Paso 3: Despeja el segmento desconocido a partir de la ecuación planteada.'
ejemplos:
- titulo: Calcular un segmento desconocido usando el teorema de las cuerdas
  enunciado: PA=4 cm, PB=6 cm, PC=3 cm.
  solucion_pasos:
  - 4×6=3×PD → 24=3×PD → PD=24/3=8 cm.
- titulo: Verificar la igualdad de productos
  enunciado: PA=5 cm, PB=8 cm, PC=4 cm, PD=10 cm.
  solucion_pasos:
  - PA×PB=5×8=40; PC×PD=4×10=40; ambos productos son iguales (40=40), por lo que la configuración es consistente.
- titulo: ¿El producto de los segmentos de una cuerda es igual al de la otra cuerda?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la igualdad que establece el teorema de las cuerdas.
- titulo: ¿Este teorema aplica cuando las cuerdas no se cruzan dentro del círculo?
  respuesta: 'No'
  solucion_pasos:
  - No, el teorema requiere específicamente que ambas cuerdas se intersecten en un punto interior a la
    circunferencia.
errores_frecuentes:
- Multiplicar segmentos que pertenecen a la misma cuerda en vez de emparejar correctamente los de cuerdas
  distintas.
- Aplicar el teorema cuando las cuerdas no se cruzan dentro del círculo (por ejemplo, si se prolongan
  fuera de él).
- Errar al despejar el segmento desconocido, dividiendo por el factor incorrecto.
fuente: 'Elaboración propia (referencias: Moraleja 75, Cid 132).'
estado: publicado
