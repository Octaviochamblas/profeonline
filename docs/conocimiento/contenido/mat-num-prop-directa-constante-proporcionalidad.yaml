semantic_id: MAT.NUM.PROP_DIRECTA.CONSTANTE_PROPORCIONALIDAD
objetivo: Calcular la constante de proporcionalidad directa.
introduccion: Si en un negocio cada alfajor cuesta $500, no importa cuántos compres,
  la relación 'precio dividido por alfajores' siempre dará 500. Ese número fijo es
  el corazón de la proporción directa.
resumen: 'La constante de proporcionalidad directa ($k$) es el valor fijo que resulta
  de dividir dos magnitudes proporcionales: $k = y/x$.'
explicacion: 'En una **proporcionalidad directa**, aunque los valores de $x$ e $y$
  cambien constantemente, su cociente jamás lo hace. Si divides cualquier valor de
  $y$ por su correspondiente $x$, siempre obtendrás el mismo número.


  A este número inalterable lo llamamos **constante de proporcionalidad ($k$)**.

  $$k = \frac{y}{x}$$'
procedimiento:
- 'Paso 1: Identifica un par de valores $(x, y)$ que correspondan entre sí.'
- 'Paso 2: Divide la magnitud dependiente ($y$) por la independiente ($x$).'
- 'Paso 3: El resultado de esa división es la constante $k$.'
ejemplos:
- titulo: Hallando k
  enunciado: Si $3$ horas de trabajo producen $15$ juguetes, ¿cuál es la constante
    de proporcionalidad?
  solucion_pasos:
  - El par de valores es $x=3$ horas, $y=15$ juguetes.
  - Dividimos $y/x = 15/3 = 5$.
  - La constante es $k=5$. (Se producen 5 juguetes por hora).
- titulo: ¿Qué pasa si invierto el orden?
  respuesta: Cambia el significado
  solucion_pasos:
  - Si divides $3/15 = 1/5 = 0.2$. Esta es la constante inversa ($1/k$), que indica
    que se demora 0.2 horas en hacer un juguete. Matemáticamente es válido, pero suele
    estandarizarse $y/x$.
errores_frecuentes:
- Restar los valores en lugar de dividirlos.
- Multiplicar $x \cdot y$ en vez de dividirlos (eso es constante de proporción inversa).
- Creer que la constante cambia si uso números más grandes.
- Dividir a veces $y/x$ y a veces $x/y$ en un mismo problema.
fuente: Currículum Nacional MINEDUC.
estado: publicado
