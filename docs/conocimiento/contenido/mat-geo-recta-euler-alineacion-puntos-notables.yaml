semantic_id: MAT.GEO.RECTA_EULER.ALINEACION_PUNTOS_NOTABLES
titulo: Alineación del ortocentro, baricentro y circuncentro en triángulos no equiláteros
objetivo: Aplicar la propiedad de que el baricentro divide el segmento entre el circuncentro y el ortocentro
  en razón 1:2.
introduccion: 'La alineación de O, G y H en la recta de Euler no es arbitraria: el baricentro siempre
  se ubica en una posición precisa entre los otros dos, dividiendo el segmento OH en una razón fija.'
resumen: En la recta de Euler, el baricentro divide el segmento entre el circuncentro y el ortocentro
  en razón OG:GH = 1:2.
explicacion: '![Alineación de O, G y H con razón OG:GH = 1:2](/static/img/geometria/elementos-secundarios/recta-euler-alineacion-puntos-notables.svg)


  ### Definición formal


  Si O es el circuncentro, G el baricentro y H el ortocentro de un triángulo, se cumple $OG:GH=1:2$, es
  decir, $\vec{OH}=3\vec{OG}$, o equivalentemente $H=3G-2O$.


  ### Desarrollo didáctico


  Si la distancia de O a G es 4 cm, la distancia de G a H es el doble, 8 cm, y la distancia total de O
  a H es 4+8=12 cm. Esta relación vectorial es, de hecho, la fórmula usada para calcular el ortocentro
  a partir del baricentro y el circuncentro.'
procedimiento:
- 'Paso 1: Calcula o mide la distancia OG (circuncentro a baricentro).'
- 'Paso 2: Multiplica esa distancia por 2 para obtener GH (baricentro a ortocentro).'
- 'Paso 3: Suma ambas distancias para obtener OH (circuncentro a ortocentro) si se necesita.'
ejemplos:
- titulo: Calcular GH desde OG
  enunciado: La distancia OG es 3 cm.
  solucion_pasos:
  - La distancia GH es el doble, 6 cm.
- titulo: Calcular OG desde OH
  enunciado: La distancia total OH es 18 cm.
  solucion_pasos:
  - 'Como OG:GH=1:2, OG es un tercio del total: 18/3=6 cm, y GH es 12 cm.'
- titulo: ¿El baricentro está más cerca del circuncentro o del ortocentro?
  respuesta: Del circuncentro
  solucion_pasos:
  - Está más cerca del circuncentro, ya que la parte OG es más corta que la parte GH.
- titulo: ¿Esta razón 1:2 es la misma que la del baricentro sobre las transversales de gravedad?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la misma razón 1:2 (o 2:1 vista desde el otro extremo) que aparece en la propiedad del baricentro.
errores_frecuentes:
- Invertir la razón, creyendo que el baricentro está más cerca del ortocentro.
- Confundir esta razón (sobre la recta de Euler) con otra propiedad distinta del baricentro.
- Sumar mal las distancias al calcular el segmento total OH.
fuente: Elaboración propia.
estado: publicado
