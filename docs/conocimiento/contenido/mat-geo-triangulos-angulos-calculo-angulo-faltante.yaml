semantic_id: MAT.GEO.TRIANGULOS_ANGULOS.CALCULO_ANGULO_FALTANTE
titulo: Cálculo de un ángulo interior faltante usando la suma 180°
objetivo: Calcular la medida de un ángulo interior desconocido de un triángulo, conociendo los otros dos.
introduccion: Cuando se conocen dos de los tres ángulos interiores de un triángulo, el tercero queda completamente
  determinado por el teorema de la suma 180°.
resumen: El ángulo interior faltante de un triángulo se calcula restando de 180° la suma de los otros
  dos ángulos conocidos.
explicacion: '![Cálculo de un ángulo interior faltante](/static/img/geometria/triangulos/triangulos-angulos-calculo-angulo-faltante.svg)


  ### Definición formal


  Si un triángulo tiene ángulos interiores α y β conocidos, el tercer ángulo γ se calcula como γ = 180°
  − α − β.


  ### Desarrollo didáctico


  Con α=50° y β=70°: γ = 180° − 50° − 70° = 60°. Se verifica sumando los tres: 50°+70°+60°=180°.'
procedimiento:
- 'Paso 1: Identifica los dos ángulos interiores conocidos.'
- 'Paso 2: Súmalos entre sí.'
- 'Paso 3: Resta ese resultado de 180° para obtener el ángulo faltante.'
ejemplos:
- titulo: Calcular el ángulo faltante
  enunciado: Un triángulo tiene ángulos de 50° y 70°.
  solucion_pasos:
  - El tercer ángulo es 180°−50°−70°=60°.
- titulo: Otro caso numérico
  enunciado: Un triángulo tiene ángulos de 35° y 95°.
  solucion_pasos:
  - El tercer ángulo es 180°−35°−95°=50°.
- titulo: ¿Basta conocer dos ángulos para hallar el tercero?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque los tres siempre suman exactamente 180°.
- titulo: ¿El ángulo faltante puede calcularse sin usar 180°?
  respuesta: 'No'
  solucion_pasos:
  - No, el cálculo depende directamente del teorema de la suma 180°.
errores_frecuentes:
- Restar solo uno de los dos ángulos conocidos en vez de ambos.
- Usar 360° en vez de 180° como total de referencia.
- Sumar en vez de restar al despejar el ángulo faltante.
fuente: Elaboración propia.
estado: publicado
