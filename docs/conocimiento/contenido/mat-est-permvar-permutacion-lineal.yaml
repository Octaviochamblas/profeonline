semantic_id: MAT.EST.PERMUTACIONES_VARIACIONES.PERMUTACION_LINEAL
titulo: Cálculo de permutaciones lineales de n elementos distintos
objetivo: Calcular el número de permutaciones lineales de n elementos distintos, es decir, todas las formas
  posibles de ordenarlos en una fila.
introduccion: Cuando se quiere ordenar en fila un conjunto completo de elementos distintos, el número
  de arreglos posibles se calcula directamente con el factorial de n.
resumen: El número de permutaciones lineales de $n$ elementos distintos, tomados todos a la vez, es $P(n)=n!$.
explicacion: '![Permutaciones lineales](/static/img/probabilidad/permvar/permvar-permutacion-lineal.svg)


  ### Definición formal


  Una permutación lineal de $n$ elementos distintos es un arreglo ordenado de todos ellos; el número total
  de tales arreglos es $n!$.


  ### Desarrollo didáctico


  Con 3 libros distintos (A, B, C), las permutaciones lineales posibles son ABC, ACB, BAC, BCA, CAB, CBA:
  un total de $3!=6$ arreglos.'
procedimiento:
- 'Paso 1: Identifica el número n de elementos distintos que se quieren ordenar.'
- 'Paso 2: Verifica que se estén usando todos los elementos en cada arreglo (no una selección parcial).'
- 'Paso 3: Calcula n! para obtener el número total de permutaciones lineales.'
ejemplos:
- titulo: Calcular las permutaciones de 3 libros
  enunciado: 3 libros distintos.
  solucion_pasos:
  - P(3)=3!=6 arreglos posibles.
- titulo: Calcular las permutaciones de 5 personas en una fila
  enunciado: 5 personas distintas.
  solucion_pasos:
  - P(5)=5!=120 arreglos posibles.
- titulo: ¿Una permutación lineal usa todos los elementos disponibles?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de una variación, que puede usar solo una parte de los elementos.
- titulo: ¿El orden importa en una permutación?
  respuesta: Sí
  solucion_pasos:
  - Sí, cada orden distinto de los mismos elementos cuenta como una permutación diferente.
errores_frecuentes:
- Confundir permutación (usa todos los elementos) con variación (usa solo una parte de ellos).
- Olvidar que el orden importa en una permutación, tratando arreglos distintos como si fueran el mismo
  caso.
- Calcular mal el factorial correspondiente al número de elementos.
fuente: 'Elaboración propia (referencia: Baldor 372, Moraleja 299).'
estado: publicado
