semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.POTENCIA
titulo: Propiedad del logaritmo de una potencia
objetivo: Aplicar la propiedad $\log_b(x^n)=n\cdot\log_b(x)$ para bajar exponentes fuera del logaritmo.
introduccion: Cuando el argumento de un logaritmo está elevado a una potencia, ese exponente puede "bajarse" como
  factor multiplicando al logaritmo.
resumen: La propiedad de la **potencia** establece que $\log_b(x^n)=n\cdot\log_b(x)$, permitiendo trasladar el
  exponente del argumento hacia afuera del logaritmo como un coeficiente.
explicacion: '### Definición formal


  Para $b>0$, $b\neq1$, $x>0$ y $n\in\mathbb{R}$, se cumple $\log_b(x^n)=n\cdot\log_b(x)$. Se demuestra
  definiendo $m=\log_b(x)$, de modo que $b^m=x$; elevando ambos lados a $n$: $x^n=(b^m)^n=b^{mn}$, y aplicando el
  logaritmo se obtiene $\log_b(x^n)=mn=n\cdot\log_b(x)$.


  ### Desarrollo didáctico


  $\log_2(8^2)=2\cdot\log_2(8)=2\cdot3=6$, lo mismo que calcular directamente $\log_2(64)=6$. La propiedad
  también funciona con exponentes fraccionarios: $\log_9(9^{1/2})=\frac{1}{2}\cdot\log_9(9)=\frac{1}{2}$.'
procedimiento:
- 'Paso 1: Identifica el exponente del argumento dentro del logaritmo.'
- 'Paso 2: Traslada ese exponente como coeficiente que multiplica al logaritmo.'
- 'Paso 3: Simplifica el logaritmo resultante si corresponde.'
ejemplos:
- titulo: Aplicación con exponente entero
  enunciado: 'Simplifica $\log_5(25^3)$.'
  solucion_pasos:
  - Se traslada el exponente: $3\cdot\log_5(25)$.
  - 'Como $\log_5(25)=2$, el resultado es $3\cdot2=6$.'
- titulo: Aplicación con exponente fraccionario
  enunciado: 'Simplifica $\log_4(4^{1/2})$.'
  solucion_pasos:
  - Se traslada el exponente: $\frac{1}{2}\cdot\log_4(4)$.
  - 'Como $\log_4(4)=1$, el resultado es $\frac{1}{2}$.'
- titulo: ¿La propiedad de la potencia funciona con exponentes negativos?
  enunciado: ¿Se cumple $\log_b(x^{-n})=-n\cdot\log_b(x)$?
  respuesta: Sí
  solucion_pasos:
  - La propiedad es válida para cualquier exponente real, incluidos los negativos.
- titulo: ¿Se puede aplicar esta propiedad si el argumento es negativo?
  enunciado: '¿Se puede aplicar $\log_b(x^n)=n\cdot\log_b(x)$ si $x<0$?'
  respuesta: 'No'
  solucion_pasos:
  - Se exige $x>0$ para que $\log_b(x)$ esté definido en el lado derecho de la igualdad.
errores_frecuentes:
- Olvidar trasladar el exponente completo, incluido su signo, al aplicar la propiedad.
- Confundir $\log_b(x^n)$ con $(\log_b(x))^n$, que no son expresiones equivalentes.
- Aplicar la propiedad sin verificar que el argumento base $x$ sea positivo.
- No simplificar el logaritmo resultante cuando corresponde un valor numérico exacto.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
