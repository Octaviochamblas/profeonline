semantic_id: MAT.EST.DISPERSION_BASE.RANGO_CALCULO
titulo: Calcular el rango como diferencia entre máximo y mínimo
objetivo: Calcular el rango de un conjunto de datos como la diferencia entre el valor máximo y el valor mínimo.
introduccion: Calcular el rango es tan simple como restar el dato más pequeño al dato más grande de una lista.
resumen: El rango se calcula con la fórmula $R = \text{máximo} - \text{mínimo}$, aplicada directamente sobre el conjunto
  de datos.
explicacion: '![Cálculo del rango](/static/img/estadistica/dispbase/dispbase-rango-calculo.svg)


  ### Definición formal


  El rango se calcula mediante la fórmula $R = x_{max} - x_{min}$, donde $x_{max}$ y $x_{min}$ son el valor máximo y

  mínimo del conjunto de datos, respectivamente.


  ### Desarrollo didáctico


  Este cálculo no requiere ordenar todos los datos, solo identificar correctamente los dos valores extremos y

  restarlos.'
procedimiento:
- 'Paso 1: Identifica el valor máximo del conjunto de datos.'
- 'Paso 2: Identifica el valor mínimo del conjunto de datos.'
- 'Paso 3: Calcula $R = x_{max} - x_{min}$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Para el conjunto $\{4, 9, 15, 22, 30\}$, calcula el rango.
  solucion_pasos:
  - El valor máximo es 30 y el valor mínimo es 4.
  - $R = 30 - 4 = 26$.
- titulo: Ejemplo 2
  enunciado: Las temperaturas de una semana fueron 18, 20, 15, 25 y 19 grados. Calcula el rango.
  solucion_pasos:
  - El valor máximo es 25 y el valor mínimo es 15.
  - $R = 25 - 15 = 10$ grados.
- titulo: ¿El rango se calcula restando el mínimo al máximo?
  respuesta: Sí
  solucion_pasos:
  - Sí, $R = x_{max} - x_{min}$.
- titulo: ¿Es necesario ordenar todos los datos para calcular el rango?
  respuesta: 'No'
  solucion_pasos:
  - 'No, solo es necesario identificar el máximo y el mínimo, sin ordenar el resto de los datos.'
errores_frecuentes:
- Invertir la resta y calcular mínimo menos máximo, obteniendo un valor negativo.
- Confundir el máximo o el mínimo con otro dato del conjunto.
- Calcular el rango usando el promedio en vez del mínimo y el máximo.
- Olvidar las unidades de medida al expresar el resultado del rango.
- Confundir el rango con la cantidad total de datos del conjunto.
fuente: 'Elaboración propia (referencia: Moraleja 296, 321).'
estado: publicado
