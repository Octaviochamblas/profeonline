semantic_id: 'MAT.ALG.ECUACIONES_FRACCIONARIAS.COEFICIENTES_FRACCIONARIOS'
titulo: 'Ecuaciones con Coeficientes Fraccionarios'
objetivo: 'Resolver ecuaciones lineales que tienen números fraccionarios como coeficientes.'
introduccion: |
  Estas son ecuaciones donde la $x$ está feliz en el numerador o a un lado, pero está acompañada de fracciones numéricas molestas, como $\frac{1}{2}x + \frac{3}{4} = \frac{x}{3}$.
resumen: |
  Ejemplo: Denominadores 2, 4 y 3. El MCM es 12. Si multiplicas cada término de la ecuación por 12, mágicamente todas las fracciones se convertirán en números enteros, porque el 12 se dividirá exactamente por el 2, el 4 y el 3.
explicacion: |
  El secreto del éxito aquí es el 'Rayo Desintegrador de Denominadores': multiplicar toda la balanza (ambos miembros) por el **MCM numérico de los denominadores**.
procedimiento:
  - 'Paso 1: Calcula el MCM de todos los números que están en los denominadores.'
  - 'Paso 2: Multiplica TODA la ecuación (cada término, a la izquierda y derecha) por el MCM.'
  - 'Paso 3: Simplifica cruzado cada término. La ecuación ahora será plana (sin fracciones).'
  - 'Paso 4: Resuelve la ecuación lineal normal resultante.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
