errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Calcula el MCM de todos los números que están en los
  denominadores».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Multiplica TODA la ecuación (cada término, a
  la izquierda y derecha) por el MCM».'
