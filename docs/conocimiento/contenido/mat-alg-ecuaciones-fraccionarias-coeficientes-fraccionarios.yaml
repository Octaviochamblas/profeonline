semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.COEFICIENTES_FRACCIONARIOS
titulo: Ecuaciones con Coeficientes Fraccionarios
objetivo: Resolver ecuaciones lineales que tienen números fraccionarios como coeficientes.
introduccion: 'El secreto del éxito aquí es el ''multiplicación por el mínimo común múltiplo'': multiplicar toda
  la balanza (ambos miembros) por el **MCM numérico de los denominadores**.'
resumen: Estas son ecuaciones donde la $x$ permanece en el numerador o a un lado, pero está acompañada de fracciones
  numéricas molestas, como $\frac{1}{2}x + \frac{3}{4} = \frac{x}{3}$.
explicacion: '### Definición formal


  Una ecuación lineal con coeficientes fraccionarios $\frac{a_1}{b_1}x + \frac{a_2}{b_2} = \frac{a_3}{b_3}x + \dots$
  se reduce a una ecuación de coeficientes enteros multiplicando ambos miembros por el Mínimo Común Múltiplo de
  los denominadores $b_1, b_2, b_3, \dots$, pues ese producto es divisible exactamente por cada uno de ellos.


  ### Desarrollo didáctico


  El secreto del éxito aquí es el ''multiplicación por el mínimo común múltiplo'': multiplicar toda la balanza (ambos
  miembros) por el **MCM numérico de los denominadores**.


  Ejemplo: Denominadores 2, 4 y 3. El MCM es 12. Si multiplicas cada término de la ecuación por 12, de manera directa
  todas las fracciones se convertirán en números enteros, porque el 12 se dividirá exactamente por el 2, el 4 y
  el 3.'
procedimiento:
- Calcula el MCM de todos los números que están en los denominadores.
- Multiplica TODA la ecuación (cada término, a la izquierda y derecha) por el MCM.
- Simplifica cruzado cada término. La ecuación ahora será plana (sin fracciones).
- Resuelve la ecuación lineal normal resultante.
