semantic_id: 'MAT.ALG.MODELAMIENTO_LINEAL.PLANTEAMIENTO_ECUACION'
titulo: 'Planteamiento de la Ecuación'
objetivo: |
  Traducir las relaciones descritas en el problema a una ecuación matemática formal.
introduccion: |
  Una vez que tienes a tus variables definidos en función de 'x' (Juan = $x$, Pedro = $2x$), necesitas encontrar el 'operador relacional' matemático del problema que los iguale.
resumen: 'Acabas de construir un puente entre el enunciado verbal y el modelo algebraico.'
explicacion: |
  Busca palabras clave que actúen como el signo igual ($=$): 'es', 'da', 'resulta', 'suman', 'equivalen a'.
  Ejemplo: 'La suma de las edades de Juan y Pedro es 30'.
  Traducción: (Juan) + (Pedro) = 30.
  Sustituyes tus variables: $x + 2x = 30$.
procedimiento:
  - 'Paso 1: Identifica la relación principal (la condición que une a todos los elementos).'
  - 'Paso 2: Encuentra la palabra que representa el signo igual ''=''.'
  - 'Paso 3: Ensambla el lado izquierdo y el lado derecho usando tus expresiones en función de ''x''.'
  - 'Paso 4: Revisa que tu ecuación tenga sentido lógico al leerla de vuelta en español.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
