semantic_id: MAT.ALG.MODELAMIENTO_LINEAL.PLANTEAMIENTO_ECUACION
titulo: Planteamiento de la Ecuación
objetivo: Traducir las relaciones descritas en el problema a una ecuación matemática formal.
introduccion: 'Busca palabras clave que actúen como el signo igual ($=$): ''es'', ''da'', ''resulta'', ''suman'',
  ''equivalen a''.'
resumen: Una vez que tienes a tus cantidades involucradas definidos en función de 'x' (Juan = $x$, Pedro = $2x$),
  necesitas encontrar el 'verbo' matemático del problema que los iguale.
explicacion: '### Definición formal


  Una vez que tienes a tus cantidades involucradas definidos en función de ''x'' (Juan = $x$, Pedro = $2x$), necesitas
  encontrar el ''verbo'' matemático del problema que los iguale.


  ### Desarrollo didáctico


  Busca palabras clave que actúen como el signo igual ($=$): ''es'', ''da'', ''resulta'', ''suman'', ''equivalen
  a''.

  Ejemplo: ''La suma de las edades de Juan y Pedro es 30''.

  Traducción: (Juan) + (Pedro) = 30.

  Sustituyes tus cantidades involucradas: $x + 2x = 30$.


  Acabas de construir un puente entre el mundo de las palabras y el mundo del álgebra.'
procedimiento:
- Identifica la relación principal (la condición que une a todos los elementos).
- Encuentra la palabra que representa el signo igual '='.
- Ensambla el lado izquierdo y el lado derecho usando tus expresiones en función de 'x'.
- Revisa que tu ecuación tenga sentido lógico al leerla de vuelta en español.
