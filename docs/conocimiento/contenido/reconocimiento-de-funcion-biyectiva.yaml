semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.BIYECTIVA_RECONOCIMIENTO
titulo: Reconocimiento de función biyectiva
objetivo: Reconocer si una función es biyectiva aplicando conjuntamente los criterios de las líneas vertical,
  horizontal y de sobreyectividad.
introduccion: Reconocer una biyección exige pasar dos pruebas seguidas; si falla cualquiera de las dos,
  ya no hay biyección.
resumen: Para reconocer una función biyectiva, se verifica primero la inyectividad (criterio de la línea
  horizontal o algebraico) y luego la sobreyectividad (comparación de recorrido y codominio); ambas deben
  cumplirse.
explicacion: '### Definición formal


  Dada $f\colon A \to B$, se determina inyectividad verificando que toda recta horizontal corte la gráfica
  en a lo más un punto, y sobreyectividad verificando que toda recta horizontal corte la gráfica en al
  menos un punto. Si ambas condiciones se cumplen para todo $y \in B$, cada recta horizontal corta la
  gráfica en exactamente un punto, y $f$ es biyectiva.


  ### Desarrollo didáctico


  En la práctica, conviene verificar primero la condición más restrictiva o más fácil de descartar; si
  una función ya no es inyectiva, no hace falta seguir revisando la sobreyectividad.


  Para $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=x^3$: cada recta horizontal corta la curva exactamente
  en un punto (ni cero ni dos), confirmando que es biyectiva.'
procedimiento:
- 'Paso 1: Verifica la inyectividad (a lo más una preimagen por cada elemento del codominio).'
- 'Paso 2: Si es inyectiva, verifica la sobreyectividad (al menos una preimagen por cada elemento del
  codominio).'
- 'Paso 3: Si ambas se cumplen, la función es biyectiva; si falla alguna, no lo es.'
ejemplos:
- titulo: Reconocimiento en función cúbica
  enunciado: Determina si $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=x^3$, es biyectiva.
  solucion_pasos:
  - Cada recta horizontal corta la curva en exactamente un punto.
  - Es inyectiva y sobreyectiva simultáneamente.
  - Es biyectiva.
- titulo: Reconocimiento con falla de inyectividad
  enunciado: Determina si $f\colon \mathbb{R} \to [0,+\infty[$, $f(x)=x^2$, es biyectiva.
  solucion_pasos:
  - Aunque es sobreyectiva (recorrido igual al codominio), no es inyectiva, pues $f(2)=f(-2)=4$.
  - Al fallar la inyectividad, no es biyectiva.
- titulo: ¿Es suficiente verificar solo la sobreyectividad para concluir biyectividad?
  enunciado: ¿Es suficiente verificar solo la sobreyectividad para concluir biyectividad?
  respuesta: 'No'
  solucion_pasos:
  - También se debe verificar la inyectividad; ambas condiciones son necesarias.
- titulo: ¿Toda recta horizontal debe cortar la gráfica exactamente una vez en una función biyectiva?
  enunciado: ¿Toda recta horizontal debe cortar la gráfica exactamente una vez en una función biyectiva?
  respuesta: Sí
  solucion_pasos:
  - Ni cero veces (fallaría sobreyectividad) ni dos o más veces (fallaría inyectividad).
errores_frecuentes:
- Verificar solo una de las dos condiciones y concluir biyectividad prematuramente.
- Confundir "exactamente un punto" con "al menos un punto" al aplicar el criterio combinado.
- No ajustar el codominio antes de evaluar sobreyectividad.
- Aplicar el criterio de la línea horizontal incorrectamente como si fuera vertical.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
