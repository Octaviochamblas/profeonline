semantic_id: MAT.ALG.EC_CUADR_BASE.INCOMPLETA_BINOMIA
titulo: Identificación de ecuaciones cuadráticas incompletas de la forma ax² + bx = 0
objetivo: Reconocer ecuaciones cuadráticas incompletas binomias, aquellas en las que falta el término independiente.
introduccion: Cuando a una ecuación cuadrática le falta el número suelto (el término independiente), quedan solo
  dos términos con la incógnita presente en ambos.
resumen: Una **ecuación incompleta binomia** tiene la forma $ax^2+bx=0$, con $a\neq0$ y $b\neq0$, donde el término
  independiente $c$ es igual a cero.
explicacion: '### Definición formal


  Una ecuación de segundo grado es incompleta binomia si tiene la forma $ax^2+bx=0$, es decir, $c=0$ mientras
  $a \neq 0$ y $b \neq 0$. El término independiente está ausente.


  ### Desarrollo didáctico


  Se reconoce porque, al ordenar la ecuación en forma general, no queda ningún número suelto: solo aparecen los
  términos con $x^2$ y con $x$.


  La ecuación $3x^2-12x=0$ es incompleta binomia: no hay término independiente, pero sí están presentes tanto
  $x^2$ como $x$.'
procedimiento:
- 'Paso 1: Escribe la ecuación en su forma general $ax^2+bx+c=0$.'
- 'Paso 2: Verifica que el término independiente $c$ sea igual a cero.'
- 'Paso 3: Verifica que tanto $a$ como $b$ sean distintos de cero; de ser así, es incompleta binomia.'
ejemplos:
- titulo: Reconocimiento de ecuación incompleta binomia
  enunciado: '¿Es $5x^2+2x=0$ una ecuación incompleta binomia?'
  solucion_pasos:
  - '$a=5$, $b=2$, $c=0$.'
  - Sí, es incompleta binomia.
- titulo: Reconocimiento de ecuación que no es binomia
  enunciado: '¿Es $x^2-16=0$ una ecuación incompleta binomia?'
  solucion_pasos:
  - '$a=1$, $b=0$, $c=-16$.'
  - No es binomia, porque el término lineal está ausente, no el independiente.
- titulo: ¿Una ecuación incompleta binomia siempre tiene $x=0$ como una de sus soluciones?
  enunciado: ¿Una ecuación incompleta binomia siempre tiene $x=0$ como una de sus soluciones?
  respuesta: Sí
  solucion_pasos:
  - Al poder factorizar $x(ax+b)=0$, siempre $x=0$ es una de las dos soluciones.
- titulo: ¿En una ecuación incompleta binomia el coeficiente $b$ puede ser cero?
  enunciado: ¿En una ecuación incompleta binomia el coeficiente $b$ puede ser cero?
  respuesta: 'No'
  solucion_pasos:
  - Si además $b=0$, la ecuación se reduciría a $ax^2=0$, que se clasifica como incompleta monomia, no binomia.
errores_frecuentes:
- Confundir la ecuación incompleta binomia (falta $c$) con la incompleta pura (falta $b$).
- Intentar aplicar la fórmula general cuando factorizar por término común es mucho más directo.
- Olvidar que $x=0$ es siempre una de las soluciones en este tipo de ecuación.
- No verificar que $b$ sea distinto de cero antes de clasificar la ecuación como binomia.
