semantic_id: MAT.ALG.TRIG_COORDENADAS.SIGNO_SENO_CUADRANTES
titulo: Signo del seno según el cuadrante
objetivo: Determinar el signo de $\sin(\theta)$ según el cuadrante donde se ubica el ángulo $\theta$.
introduccion: Como el seno corresponde a la coordenada $y$, su signo cambia exactamente igual que el signo de esa
  coordenada en cada cuadrante.
resumen: El seno es **positivo** en el primer y segundo cuadrante (donde $y>0$), y **negativo** en el tercer y
  cuarto cuadrante (donde $y<0$).
explicacion: '### Definición formal


  Como $\sin(\theta)=y$, el signo del seno coincide con el signo de la coordenada $y$ del punto asociado. En el
  primer cuadrante ($0°<\theta<90°$) y el segundo ($90°<\theta<180°$), $y>0$; en el tercero
  ($180°<\theta<270°$) y el cuarto ($270°<\theta<360°$), $y<0$.


  ### Desarrollo didáctico


  $\sin(45°)$ (primer cuadrante) es positivo; $\sin(135°)$ (segundo cuadrante) también es positivo, con el
  mismo valor absoluto que $\sin(45°)$; $\sin(225°)$ (tercer cuadrante) es negativo.'
procedimiento:
- 'Paso 1: Identifica el cuadrante donde se ubica el ángulo $\theta$.'
- 'Paso 2: Si está en el primer o segundo cuadrante, el seno es positivo.'
- 'Paso 3: Si está en el tercer o cuarto cuadrante, el seno es negativo.'
ejemplos:
- titulo: Signo del seno en el segundo cuadrante
  enunciado: '¿Cuál es el signo de $\sin(120°)$?'
  solucion_pasos:
  - $120°$ está en el segundo cuadrante.
  - El seno es positivo en ese cuadrante.
- titulo: Signo del seno en el cuarto cuadrante
  enunciado: '¿Cuál es el signo de $\sin(300°)$?'
  solucion_pasos:
  - $300°$ está en el cuarto cuadrante.
  - El seno es negativo en ese cuadrante.
- titulo: ¿El seno es positivo en el tercer cuadrante?
  enunciado: ¿El seno es positivo para ángulos del tercer cuadrante?
  respuesta: 'No'
  solucion_pasos:
  - En el tercer cuadrante, la coordenada $y$ es negativa, así que el seno también lo es.
- titulo: ¿El seno tiene el mismo signo en el primer y segundo cuadrante?
  enunciado: ¿El seno tiene el mismo signo (positivo) tanto en el primer como en el segundo cuadrante?
  respuesta: Sí
  solucion_pasos:
  - En ambos cuadrantes la coordenada $y$ es positiva.
errores_frecuentes:
- Confundir el signo del seno con el del coseno en cada cuadrante.
- Aplicar el signo correcto de un cuadrante a otro por error.
- No relacionar el signo del seno con el signo de la coordenada $y$.
- Olvidar que el signo puede cambiar incluso si el ángulo de referencia es el mismo.
