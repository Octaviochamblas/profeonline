semantic_id: MAT.GEO.TRIG_CUADRANTES.SIGNO_SENO
titulo: Identificación del signo del seno según el cuadrante
objetivo: Determinar el signo (positivo o negativo) del seno de un ángulo según el cuadrante en que se
  ubica su lado terminal.
introduccion: El seno de un ángulo, definido como la coordenada y de un punto en el lado terminal (dividida
  por el radio, siempre positivo), tiene signo positivo cuando esa coordenada y es positiva, y negativo
  cuando es negativa.
resumen: El seno de un ángulo es positivo en los cuadrantes I y II (donde la coordenada y del lado terminal
  es positiva), y negativo en los cuadrantes III y IV (donde esa coordenada es negativa).
explicacion: '![Signo del seno por cuadrante](/static/img/geometria/trigonometria/trigcuad-signo-seno.svg)


  ### Definición formal


  Si $P=(x,y)$ es un punto sobre el lado terminal de $\theta$ a distancia $r$ del origen, entonces $\sin\theta=\dfrac{y}{r}$,
  con $r>0$ siempre. Por lo tanto, el signo de $\sin\theta$ coincide con el signo de $y$.


  ### Desarrollo didáctico


  En los cuadrantes I y II, la coordenada y es positiva (por encima del eje x), por lo que $\sin\theta>0$.
  En los cuadrantes III y IV, la coordenada y es negativa (por debajo del eje x), por lo que $\sin\theta<0$.'
procedimiento:
- 'Paso 1: Determina en qué cuadrante se ubica el lado terminal del ángulo.'
- 'Paso 2: Recuerda que el signo del seno coincide con el signo de la coordenada y del lado terminal.'
- 'Paso 3: Asigna signo positivo si el cuadrante es I o II, y negativo si es III o IV.'
ejemplos:
- titulo: Determinar el signo del seno de un ángulo de 150°
  enunciado: θ=150° (segundo cuadrante).
  solucion_pasos:
  - Como 150° está en el segundo cuadrante, sin150°>0.
- titulo: Determinar el signo del seno de un ángulo de 300°
  enunciado: θ=300° (cuarto cuadrante).
  solucion_pasos:
  - Como 300° está en el cuarto cuadrante, sin300°<0.
- titulo: ¿El seno es positivo en el segundo cuadrante?
  respuesta: Sí
  solucion_pasos:
  - Sí, en el segundo cuadrante la coordenada y sigue siendo positiva.
- titulo: ¿El seno es negativo en el primer cuadrante?
  respuesta: 'No'
  solucion_pasos:
  - No, en el primer cuadrante tanto x como y son positivos, por lo que el seno es positivo.
errores_frecuentes:
- Confundir el signo del seno con el del coseno en un cuadrante dado.
- Suponer que el seno es siempre positivo, sin considerar el cuadrante del ángulo.
- Olvidar que el signo del seno depende de la coordenada y, no de la x.
fuente: Elaboración propia.
estado: publicado
