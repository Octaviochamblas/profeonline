semantic_id: MAT.ALG.SIMILARIDAD.IGUALDAD_FACTOR_LITERAL
titulo: Identificación por igualdad de factor literal
objetivo: Reconocer la igualdad del factor literal como condición necesaria para la semejanza.
introduccion: La matemática es un idioma preciso. Una 'x' no es lo mismo que una 'y', así como un auto
  no es lo mismo que un barco. Si intentas mezclarlos operativamente, crearás caos.
resumen: La primera regla de la semejanza es la **Igualdad del Factor Literal**. Para que dos términos
  puedan sumarse o restarse, deben contener exactamente el mismo conjunto de variables (letras).
explicacion: '### Definición formal


  El factor literal debe ser un clon exacto. Si falta o sobra una variable, la semejanza se rompe.


  ### Desarrollo didáctico


  Comparemos $8m$ y $5n$.

  - El primer término pertenece al grupo de las ''m''.

  - El segundo término pertenece al grupo de las ''n''.

  Como no comparten la misma letra, no son semejantes. No se pueden reducir. La expresión $8m + 5n$ queda
  exactamente así, no se puede simplificar a $13mn$ (ese es un error garrafal).'
procedimiento:
- 'Paso 1: Extrae visualmente todas las letras del primer término.'
- 'Paso 2: Extrae todas las letras del segundo término.'
- 'Paso 3: Compara. Si falta alguna letra en un lado, o sobra alguna, los términos NO son semejantes.'
ejemplos:
- titulo: Letras incompatibles
  enunciado: ¿Son semejantes 7pq y 7pr?
  solucion_pasos:
  - 'Factor literal 1: pq.'
  - 'Factor literal 2: pr.'
  - Aunque la 'p' coincide, la 'q' no es lo mismo que la 'r'.
  - 'Conclusión: No son semejantes.'
- titulo: En una bodega de materiales, el inventario se registra algebraicamente. Tienes $10a$ cajas d
  enunciado: 'En una bodega de materiales, el inventario se registra algebraicamente. Tienes $10a$ cajas
    de clavos y te llega un cargamento de $5b$ cajas de tornillos. Si el jefe te pide el total agrupado,
    ¿cómo se expresa correctamente la cantidad total de cajas en inventario? (v1)


    Opciones: A) $10a + 5b$ · B) $15ab$ · C) $50ab$ · D) $15(a+b)$'
  solucion_pasos:
  - 'Clavos ($a$) y tornillos ($b$) no son la misma cosa. No son semejantes. Se deja indicada la suma:
    $10a + 5b$.'
- titulo: 'Respecto de «Identificación por igualdad de factor literal»: ¿Es correcta esta caracterizaci'
  enunciado: 'Respecto de «Identificación por igualdad de factor literal»: ¿Es correcta esta caracterización?
    «La primera regla de la semejanza es la **Igualdad del Factor Literal**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La primera regla de la semejanza es la **Igualdad
    del Factor Literal**.'
- titulo: 'Respecto de «Identificación por igualdad de factor literal»: ¿Es válida esta afirmación? «Cr'
  enunciado: 'Respecto de «Identificación por igualdad de factor literal»: ¿Es válida esta afirmación?
    «Creer que si comparten algunas letras (ej. $abc$ y $ab$) ya son semejantes. Tienen que ser exactamente
    todas las letras iguales»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La primera regla de la semejanza es la **Igualdad
    del Factor Literal**.'
errores_frecuentes:
- Creer que si comparten algunas letras (ej. $abc$ y $ab$) ya son semejantes. Tienen que ser exactamente
  todas las letras iguales.
- Asumir que un término con una letra extra se puede sumar ignorando la letra sobrante.
- Porque tienen signos opuestos ($+$ y $-$).
- Porque los coeficientes numéricos son diferentes ($5$ y $-2$).
- Para «Si tienes los términos $5abc$ y $-2ab$, ¿por qué no se consideran términos semejantes a pesar
  de compartir las letras $a$ y $b$? (v1)», la respuesta correcta es Porque tres letras nunca pueden ser
  semejantes a dos letras.
fuente: Álgebra de Baldor.
estado: publicado
