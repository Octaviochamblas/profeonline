semantic_id: MAT.ALG.FUNCION_AFIN.INTERSECCION_EJE_X
titulo: Determinación de la intersección con el eje de las abscisas
objetivo: Determinar el punto donde la gráfica de una función afín corta el eje horizontal, resolviendo
  $f(x)=0$.
introduccion: Mientras que la intersección con el eje $y$ se lee directamente, la intersección con el
  eje $x$ exige resolver una pequeña ecuación.
resumen: La **intersección con el eje $x$** de una función afín $f(x) = mx+n$ (con $m \neq 0$) es el punto
  $\left(-\dfrac{n}{m}, 0\right)$, obtenido resolviendo la ecuación $f(x) = 0$.
explicacion: '### Definición formal


  Dada $f(x) = mx+n$ con $m \neq 0$, su gráfica corta al eje $x$ en el punto donde $f(x)=0$: resolviendo
  $mx+n=0$ se obtiene $x = -\dfrac{n}{m}$, por lo que el punto de intersección es $\left(-\dfrac{n}{m},
  0\right)$.


  ### Desarrollo didáctico


  A diferencia de la intersección con el eje $y$ (que se lee directamente), esta requiere resolver la
  ecuación lineal $mx+n=0$, despejando $x$.


  Si $f(x) = 4x - 20$: se resuelve $4x-20=0$, obteniendo $x=5$. La intersección con el eje $x$ es el punto
  $(5, 0)$.'
procedimiento:
- 'Paso 1: Iguala la función a cero, $mx+n=0$.'
- 'Paso 2: Despeja $x$, obteniendo $x = -n/m$.'
- 'Paso 3: El punto de intersección con el eje $x$ es $(-n/m, 0)$.'
ejemplos:
- titulo: Cálculo directo
  enunciado: Determina la intersección con el eje $x$ de $f(x) = 3x - 9$.
  solucion_pasos:
  - Se resuelve $3x-9=0$.
  - $x=3$.
  - 'Punto de intersección: $(3, 0)$.'
- titulo: Intersección con pendiente negativa
  enunciado: Determina la intersección con el eje $x$ de $f(x) = -2x + 8$.
  solucion_pasos:
  - Se resuelve $-2x+8=0$.
  - $x=4$.
  - 'Punto de intersección: $(4, 0)$.'
- titulo: ¿La intersección con el eje $x$ de una función afín siempre tiene ordenada cero?
  enunciado: ¿La intersección con el eje $x$ de una función afín siempre tiene ordenada cero?
  respuesta: Sí
  solucion_pasos:
  - Por definición, el eje $x$ contiene exactamente los puntos con $y=0$.
- titulo: ¿Se puede calcular la intersección con el eje $x$ si $m=0$?
  enunciado: ¿Se puede calcular la intersección con el eje $x$ si $m=0$?
  respuesta: Depende
  solucion_pasos:
  - Si $m=0$ la función es constante; si $n=0$ toda la recta coincide con el eje x, y si $n\neq0$ la recta
    nunca lo corta.
errores_frecuentes:
- Confundir la intersección con el eje $x$ con la intersección con el eje $y$.
- Olvidar cambiar el signo al despejar $x$ en la ecuación $mx+n=0$.
- Dividir por $m$ sin verificar primero que $m \neq 0$.
- Expresar solo el valor de $x$ sin formar el punto completo $(x,0)$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
