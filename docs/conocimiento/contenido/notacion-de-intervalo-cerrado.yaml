semantic_id: MAT.ALG.INTERVALOS.INTERVALO_CERRADO
titulo: Notación de intervalo cerrado
objetivo: Examinar y representar intervalos cerrados que incluyen a sus extremos.
introduccion: A diferencia del intervalo abierto, un intervalo cerrado incorpora los valores límite en
  el conjunto.
resumen: Se denota por $[a, b]$ e incluye tanto al límite inferior como al superior.
explicacion: '### Definición formal

  El intervalo cerrado se define como $[a, b] = \{ x \in \mathbb{R} \mid a \le x \le b \}$.


  ### Desarrollo didáctico

  En la recta numérica, marcamos los extremos con círculos sólidos o rellenados, demostrando que estos
  números pertenecen a la solución.'
procedimiento:
- Definir el límite inferior $a$ y superior $b$.
- Utilizar la notación de corchetes $[a, b]$ donde ambos corchetes apuntan al interior.
- Representar con puntos rellenados en una recta numérica y conectar ambos con una línea.
ejemplos:
- titulo: Análisis en un escenario práctico
  enunciado: Considera el contexto de MAT.ALG.INTERVALOS.INTERVALO_CERRADO. Determina las implicancias.
  solucion_pasos:
  - Establecer los límites.
  - Analizar el tipo de extremo.
  - Concluir.
- titulo: Evaluación de condición general
  enunciado: Dada la estructura del conjunto para MAT.ALG.INTERVALOS.INTERVALO_CERRADO, plantea la desigualdad.
  solucion_pasos:
  - Identificar la variable.
  - Aplicar la definición.
  - Escribir el intervalo.
- titulo: ¿Es cierto que todos los elementos de un conjunto finito pueden formar un intervalo denso?
  respuesta: 'No'
  solucion_pasos:
  - Recordar la definición de intervalo en $\mathbb{R}$.
  - Concluir que un conjunto finito no contiene todos los números reales entre dos puntos.
- titulo: ¿El uso de MAT.ALG.INTERVALOS.INTERVALO_CERRADO es adecuado para expresar desigualdades lineales
    simples?
  respuesta: Sí
  solucion_pasos:
  - Analizar el resultado de una desigualdad simple.
  - Verificar que su conjunto solución puede representarse como intervalo.
errores_frecuentes:
- El intervalo cerrado solo incluye los valores enteros entre $a$ y $b$.
- El intervalo cerrado $(a, b]$ es un ejemplo de intervalo cerrado por ambos lados.
- Para que un intervalo sea cerrado debe contener el $0$.
- Los intervalos cerrados no pueden solaparse con intervalos abiertos.
- La notación $]a, b[$ equivale a un intervalo cerrado en otros países.
