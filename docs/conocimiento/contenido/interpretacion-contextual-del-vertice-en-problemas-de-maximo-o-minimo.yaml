semantic_id: MAT.ALG.FUNC_CUADR_MODELO.INTERPRETACION_VERTICE_CONTEXTO
titulo: Interpretación contextual del vértice en problemas de máximo o mínimo
objetivo: Interpretar el significado, dentro del contexto de un problema aplicado, de las coordenadas
  del vértice de una función cuadrática.
introduccion: Calcular correctamente el vértice no es suficiente; hay que traducir sus dos coordenadas
  al lenguaje específico del problema, incluyendo qué representa cada una y sus unidades.
resumen: Al interpretar el vértice $(h,k)$ en un problema aplicado, la coordenada $h$ representa el valor
  de la variable donde ocurre el óptimo, y $k$ representa el valor óptimo mismo (máximo o mínimo) de la
  cantidad modelada.
explicacion: '### Definición formal


  Si $f(x)$ modela una cantidad en función de una variable $x$, y su vértice es $(h,k)$, entonces $h$
  es el valor de $x$ (con sus unidades correspondientes) donde se alcanza el óptimo, y $k=f(h)$ es el
  valor óptimo de la cantidad modelada (también con sus propias unidades).


  ### Desarrollo didáctico


  Es fundamental distinguir las unidades de cada coordenada: si $x$ representa tiempo en segundos y $f(x)$
  representa altura en metros, entonces $h$ se interpreta en segundos y $k$ en metros, nunca al revés.


  Si el vértice de $h(t)=-5t^2+20t$ es $(2,20)$: la coordenada $2$ significa que el objeto alcanza su
  altura máxima a los $2$ segundos, y la coordenada $20$ significa que esa altura máxima es de $20$ metros.'
procedimiento:
- 'Paso 1: Calcula el vértice $(h,k)$ de la función que modela el problema.'
- 'Paso 2: Identifica las unidades correspondientes a la variable independiente (coordenada $h$) y a la
  función (coordenada $k$).'
- 'Paso 3: Expresa ambos valores en el lenguaje del problema, con sus unidades correspondientes.'
ejemplos:
- titulo: Interpretación de un vértice de altura máxima
  enunciado: El vértice de $h(t)=-4{,}9t^2+29{,}4t$ es $(3,44{,}1)$. Interpreta este resultado.
  solucion_pasos:
  - La coordenada $3$ representa el tiempo, en segundos, en que se alcanza la altura máxima.
  - La coordenada $44{,}1$ representa la altura máxima, en metros, alcanzada por el objeto.
- titulo: Interpretación de un vértice de área máxima
  enunciado: El vértice de $A(x)=-x^2+30x$ es $(15,225)$, donde $x$ es el ancho en metros. Interpreta
    este resultado.
  solucion_pasos:
  - Con un ancho de $15$ metros se alcanza el área máxima posible.
  - Esa área máxima es de $225$ metros cuadrados.
- titulo: ¿La coordenada $h$ del vértice siempre representa el valor óptimo de la cantidad modelada?
  enunciado: ¿La coordenada $h$ del vértice siempre representa el valor óptimo de la cantidad modelada?
  respuesta: 'No'
  solucion_pasos:
  - $h$ representa el valor de la variable independiente donde ocurre el óptimo; $k=f(h)$ es quien representa
    el valor óptimo de la cantidad modelada.
- titulo: ¿Es importante distinguir las unidades de cada coordenada del vértice?
  enunciado: ¿Es importante distinguir las unidades de cada coordenada del vértice?
  respuesta: Sí
  solucion_pasos:
  - Cada coordenada representa una magnitud distinta (por ejemplo, tiempo y altura), con unidades propias
    que no deben confundirse.
errores_frecuentes:
- Confundir cuál coordenada del vértice representa la variable y cuál representa el valor óptimo de la
  función.
- Omitir las unidades correspondientes a cada coordenada al interpretar el resultado.
- Interpretar el vértice sin relacionarlo con la pregunta específica del problema.
- Reportar solo una de las dos coordenadas cuando el problema pide información sobre ambas.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
