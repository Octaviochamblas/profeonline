semantic_id: MAT.EST.PERCENTILES.PERCENTIL_50_MEDIANA
titulo: Reconocer la equivalencia entre el percentil 50 y la mediana
objetivo: Reconocer que el percentil 50 de un conjunto de datos es exactamente equivalente a su mediana,
  ya que ambos representan la posición central.
introduccion: Este recurso cierra el tema de percentiles conectándolo directamente con el concepto de
  mediana visto en el bloque anterior.
resumen: El percentil 50 ($P_{50}$) es exactamente equivalente a la mediana de un conjunto de datos, ya
  que ambos identifican el valor que deja el 50% de los datos a cada lado.
explicacion: '![Equivalencia entre percentil 50 y mediana](/static/img/estadistica/percentil/percentil-50-mediana.svg)


  ### Definición formal


  $P_{50}=Me$, ya que ambos conceptos se definen como el valor que deja el 50% de los datos por debajo
  y el 50% por encima.


  ### Desarrollo didáctico


  En el conjunto ordenado {3,5,7,9,11}, la mediana es 7; al calcular el percentil 50 con la fórmula de
  posición, se obtiene el mismo resultado: posición=(50×5)/100=2,5, dato central=7.'
procedimiento:
- 'Paso 1: Reconoce que calcular P50 y calcular la mediana son, conceptualmente, el mismo procedimiento.'
- 'Paso 2: Si ya se conoce la mediana de un conjunto, se puede afirmar directamente que P50 es igual a
  ese valor, sin recalcular.'
- 'Paso 3: Usa esta equivalencia para verificar la coherencia entre ambos cálculos si se realizan por
  separado.'
ejemplos:
- titulo: Verificar la equivalencia con {3,5,7,9,11}
  enunciado: Mediana=7 (calculada previamente).
  solucion_pasos:
  - El percentil 50 de este conjunto es también 7, ya que P50=mediana.
- titulo: Usar la equivalencia para ahorrar cálculo
  enunciado: Se conoce que la mediana de un conjunto de sueldos es $520.000.
  solucion_pasos:
  - Se puede afirmar directamente que P50=$520.000, sin necesidad de recalcular con la fórmula de percentiles.
- titulo: ¿P50 y la mediana representan siempre exactamente el mismo valor?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, son dos formas distintas de referirse al mismo concepto: la posición central del 50%.'
- titulo: ¿Es necesario recalcular ambos valores por separado si ya se conoce uno de los dos?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con calcular uno de ellos y usar la equivalencia para conocer el otro directamente.
errores_frecuentes:
- Calcular por separado la mediana y el percentil 50, sin aprovechar que son exactamente el mismo valor.
- Pensar que P50 y la mediana son conceptos distintos que solo coinciden en algunos casos particulares.
- No usar esta equivalencia como una forma de verificar la coherencia entre dos cálculos relacionados.
fuente: 'Elaboración propia (referencia: Moraleja 137, 380).'
estado: publicado
