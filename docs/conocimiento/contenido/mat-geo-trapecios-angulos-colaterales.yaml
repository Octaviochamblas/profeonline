semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.TRAPECIO_ANGULOS_COLATERALES
titulo: Suplementariedad de ángulos colaterales en un trapecio
objetivo: Reconocer que los ángulos colaterales de un trapecio (los que comparten un lado lateral) son
  suplementarios entre sí.
introduccion: Los lados laterales de un trapecio conectan cada base con la otra, y en cada uno de esos
  lados se forman dos ángulos con una relación específica.
resumen: 'En un trapecio, los ángulos colaterales (los que comparten un mismo lado lateral, uno en cada
  base) son suplementarios: suman 180°.'
explicacion: '![Ángulos colaterales suplementarios en un trapecio](/static/img/geometria/poligonos-cuadrilateros/trapecios-angulos-colaterales.svg)


  ### Definición formal


  En un trapecio $ABCD$ con $AB\parallel CD$, se cumple $\angle A+\angle D=180°$ y $\angle B+\angle C=180°$
  (los ángulos que comparten el lado lateral AD, y los que comparten el lado lateral BC, respectivamente).


  ### Desarrollo didáctico


  Esta propiedad surge del paralelismo entre las bases: el lado lateral actúa como una transversal que
  corta a dos rectas paralelas, generando ángulos internos del mismo lado que son suplementarios (propiedad
  de rectas paralelas cortadas por una transversal).'
procedimiento:
- 'Paso 1: Identifica los dos ángulos que comparten un mismo lado lateral del trapecio.'
- 'Paso 2: Recuerda que esos dos ángulos colaterales son suplementarios (suman 180°).'
- 'Paso 3: Si conoces uno de los dos ángulos, resta su valor de 180° para obtener el otro.'
ejemplos:
- titulo: Calcular un ángulo colateral
  enunciado: En un trapecio, el ángulo A mide 70°.
  solucion_pasos:
  - El ángulo D (colateral, mismo lado lateral) mide 180-70=110°.
- titulo: Verificar la suplementariedad
  enunciado: Los ángulos B y C de un trapecio son colaterales, con B=95°.
  solucion_pasos:
  - C=180-95=85°.
- titulo: ¿Por qué se cumple esta propiedad?
  respuesta: Por el paralelismo entre las bases del trapecio
  solucion_pasos:
  - El lado lateral actúa como transversal de las dos bases paralelas, generando ángulos suplementarios.
- titulo: ¿Los cuatro ángulos de un trapecio son siempre iguales entre sí?
  respuesta: 'No'
  solucion_pasos:
  - No, en general solo se cumple la relación de suplementariedad entre colaterales, no igualdad entre
    todos.
errores_frecuentes:
- Confundir ángulos colaterales (comparten un lado lateral) con ángulos opuestos (que no tienen esta relación
  de suplementariedad en un trapecio general).
- Creer que los ángulos colaterales son congruentes en vez de suplementarios.
- Aplicar esta propiedad al par de ángulos incorrecto (por ejemplo, uno de cada lado lateral distinto).
fuente: 'Fuente: Moraleja Tomo 2 69, Cid 44.'
estado: publicado
