semantic_id: MAT.ALG.LENGUAJE_RELACIONES.MENOR_QUE
objetivo: Traducir relaciones de desigualdad donde una cantidad es inferior a otra.
introduccion: Los límites de velocidad en las carreteras son un ejemplo clásico. Nadie te prohíbe ir más lento,
  la regla es ser inferior al límite. El álgebra modela los 'techos' con el símbolo menor que.
resumen: La relación **'Menor que'** se traduce utilizando el símbolo de desigualdad estricta **$<$**. La punta
  cerrada o 'vértice' del símbolo siempre apunta hacia la cantidad más pequeña.
explicacion: '### Definición formal


  El símbolo $<$ es estricto. Si $x < 10$, $x$ jamás podrá ser 10.


  ### Desarrollo didáctico


  Palabras clave:

  - A es menor que B: $A < B$

  - Es inferior a

  - No alcanza a

  - Está por debajo de


  Ejemplos:

  - ''La edad de María es menor que la de Juan'': $M < J$

  - ''El costo de producción no alcanzó los mil dólares'': $C < 1000$


  Nuevamente, hablamos de desigualdad **estricta**. Si una velocidad límite es de 100 km/h y te dicen que vayas
  a una velocidad ''menor que'' 100, ir a 100 exactos está prohibido. Debe ser 99.9 o menos.'
procedimiento:
- 'Paso 1: Identifica la entidad más pequeña. Escríbela en el lado izquierdo.'
- 'Paso 2: Dibuja el símbolo < (la punta afilada mirando a la entidad pequeña).'
- 'Paso 3: Escribe el ''techo'' o entidad mayor en el lado derecho.'
ejemplos:
- titulo: Por debajo del radar
  enunciado: 'Traduce algebraicamente: ''El doble del peso es inferior a sesenta kilos''.'
  solucion_pasos:
  - 'El doble del peso: 2P.'
  - 'Es inferior a: <.'
  - 'El límite superior: 60.'
  - 'Traducción completa: 2P < 60.'
- titulo: 'Las especificaciones de un ascensor detallan: ''Para que el sistema de poleas no sufra daño e'
  enunciado: 'Las especificaciones de un ascensor detallan: ''Para que el sistema de poleas no sufra daño estructural,
    la suma de las masas de los ocupantes ($M$) y la masa de la cabina ($C$) debe ser inferior al límite de resistencia
    del cable ($R$)''. ¿Qué modelo algebraico debe implementar el sensor de seguridad? (v1)


    Opciones: A) $M + C < R$ · B) $M + C > R$ · C) $M + C \le R$ · D) $M - C < R$'
  solucion_pasos:
  - La suma de ambas masas es $M + C$. El texto exige que esta suma sea 'inferior a' (estrictamente menor que) el
    límite de resistencia R. El sensor debe verificar que $M + C < R$.
- titulo: 'Respecto de «Traducción de la relación menor que»: ¿La siguiente formulación es correcta? «L'
  enunciado: 'Respecto de «Traducción de la relación menor que»: ¿La siguiente formulación es correcta? «La relación
    **''Menor que''** se traduce utilizando el símbolo de desigualdad estricta **$<$**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La relación **''Menor que''** se traduce utilizando el símbolo
    de desigualdad estricta **$<$**.'
- titulo: 'Respecto de «Traducción de la relación menor que»: ¿La siguiente conclusión es correcta? «Co'
  enunciado: 'Respecto de «Traducción de la relación menor que»: ¿La siguiente conclusión es correcta? «Confundir
    ''menor que'' con ''menor o igual a''»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La relación **''Menor que''** se traduce utilizando el símbolo
    de desigualdad estricta **$<$**.'
errores_frecuentes:
- Confundir 'menor que' con 'menor o igual a'.
- Invertir los lados de la inecuación al plantearla mentalmente de atrás hacia adelante.
- Ninguna, ambas permiten que las cantidades sean exactamente iguales.
- La relación 'menor que' significa que el resultado siempre será un número decimal.
- La relación 'menor que' solo aplica para comparar cantidades negativas.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción de la relación menor que
