semantic_id: MAT.ALG.LENGUAJE_RELACIONES.MENOR_QUE
objetivo: Traducir relaciones de desigualdad donde una cantidad es inferior a otra.
introduccion: Los límites de velocidad en las carreteras son un ejemplo clásico. Nadie
  te prohíbe ir más lento, la regla es ser inferior al límite. El álgebra modela los
  'techos' con el símbolo menor que.
resumen: La relación **'Menor que'** se traduce utilizando el símbolo de desigualdad
  estricta **$<$**. La punta cerrada o 'vértice' del símbolo siempre apunta hacia
  la cantidad más pequeña.
explicacion: 'Palabras clave:

  - A es menor que B: $A < B$

  - Es inferior a

  - No alcanza a

  - Está por debajo de


  Ejemplos:

  - ''La edad de María es menor que la de Juan'': $M < J$

  - ''El costo de producción no alcanzó los mil dólares'': $C < 1000$


  Nuevamente, hablamos de desigualdad **estricta**. Si una velocidad límite es de
  100 km/h y te dicen que vayas a una velocidad ''menor que'' 100, ir a 100 exactos
  está prohibido. Debe ser 99.9 o menos.'
procedimiento:
- 'Paso 1: Identifica la entidad más pequeña. Escríbela en el lado izquierdo.'
- 'Paso 2: Dibuja el símbolo < (la punta afilada mirando a la entidad pequeña).'
- 'Paso 3: Escribe el ''techo'' o entidad mayor en el lado derecho.'
ejemplos:
- titulo: Por debajo del radar
  enunciado: 'Traduce algebraicamente: ''El doble del peso es inferior a sesenta kilos''.'
  solucion_pasos:
  - 'El doble del peso: 2P.'
  - 'Es inferior a: <.'
  - 'El límite superior: 60.'
  - 'Traducción completa: 2P < 60.'
errores_frecuentes:
- Confundir 'menor que' con 'menor o igual a'.
- Invertir los lados de la inecuación al plantearla mentalmente de atrás hacia adelante.
fuente: Álgebra de Baldor.
estado: publicado
