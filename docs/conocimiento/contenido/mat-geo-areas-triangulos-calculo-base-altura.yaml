semantic_id: MAT.GEO.AREAS_TRIANGULOS.CALCULO_BASE_ALTURA
titulo: Cálculo del área de un triángulo dada la base y la altura
objetivo: Aplicar directamente la fórmula del área a casos numéricos concretos, dadas la base y la altura
  del triángulo.
introduccion: Con la fórmula A=(base×altura)/2 ya establecida, es momento de aplicarla directamente a
  ejercicios numéricos concretos.
resumen: Para calcular el área de un triángulo con base y altura conocidas, se multiplican ambas y se
  divide el resultado entre 2.
explicacion: '![Cálculo del área con base 9 y altura 6](/static/img/geometria/areas-pitagoras/areas-triangulos-calculo-base-altura.svg)


  ### Definición formal


  Dados base $b=9$ cm y altura $h=6$ cm, el área es $A=\frac{9\times6}{2}=\frac{54}{2}=27$ cm².


  ### Desarrollo didáctico


  Este cálculo es una aplicación numérica directa de la fórmula A=(base×altura)/2, útil en cualquier problema
  donde se dan ambos datos explícitamente.'
procedimiento:
- 'Paso 1: Identifica los valores numéricos de la base y la altura.'
- 'Paso 2: Multiplícalos.'
- 'Paso 3: Divide el resultado entre 2 para obtener el área.'
ejemplos:
- titulo: Calcular con base 9 y altura 6
  enunciado: Un triángulo tiene base 9 cm y altura 6 cm.
  solucion_pasos:
  - A=(9×6)/2=27 cm².
- titulo: Calcular con base 15 y altura 4
  enunciado: Un triángulo tiene base 15 cm y altura 4 cm.
  solucion_pasos:
  - A=(15×4)/2=30 cm².
- titulo: ¿El resultado se expresa en unidades cuadradas?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre que base y altura estén en cm, el área se expresa en cm².
- titulo: ¿Es necesario conocer los tres lados del triángulo para este cálculo?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con conocer una base y su altura correspondiente.
errores_frecuentes:
- Olvidar dividir entre 2 al final del cálculo.
- Confundir las unidades, expresando el área en unidades lineales en vez de cuadradas.
- Usar valores de base y altura que no corresponden entre sí (de distintos lados).
fuente: Elaboración propia.
estado: publicado
