semantic_id: MAT.NUM.POTENCIAS_PROPIEDADES.POTENCIA_DE_PRODUCTO
titulo: Potencia de un producto
objetivo: Distribuir una potencia sobre un producto.
introduccion: Elevar un producto repite el bloque completo, no solo uno de sus componentes. Reordenar
  los factores permite agrupar las copias de cada uno.
resumen: 'La potencia de un producto se distribuye a cada factor: \((ab)^n=a^n b^n\). Cada repetición
  del producto contiene una copia de todos sus factores.'
explicacion: 'La potencia de un producto se distribuye a cada factor: \((ab)^n=a^n b^n\).


  El cálculo “\((2\cdot3)^4=2^4\cdot3^4=1296\)” muestra por qué cada repetición del producto contiene
  una copia de todos sus factores'
procedimiento:
- 'Paso 1: Comprueba que toda la multiplicación esté dentro de la base.'
- 'Paso 2: Eleva cada factor al mismo exponente exterior.'
- 'Paso 3: Multiplica los resultados y verifica frente a la potencia del producto original.'
ejemplos:
- titulo: Aplicación razonada — Potencia de un producto
  enunciado: \((2\cdot3)^4=2^4\cdot3^4=1296\).
  solucion_pasos:
  - Comprueba que toda la multiplicación esté dentro de la base.
  - Eleva cada factor al mismo exponente exterior.
  - Multiplica los resultados y verifica frente a la potencia del producto original.
- titulo: Revisión de una solución — Potencia de un producto
  enunciado: Una solución aplica “Eleva cada factor al mismo exponente exterior.”, pero termina sin comprobar
    que cada repetición del producto contiene una copia de todos sus factores. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define potencia de un producto: la potencia de un producto se distribuye
    a cada factor: \((ab)^n=a^n b^n\).'
  - Comprueba que toda la multiplicación esté dentro de la base.
  - 'Completa la revisión con este control: Multiplica los resultados y verifica frente a la potencia
    del producto original.'
- titulo: ¿Se cumple que cada repetición del producto contiene una copia de todos sus factores? — Potencia
    de un producto
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que la potencia de un producto se distribuye a cada factor:
    \((ab)^n=a^n b^n\).'
  - El caso “\((2\cdot3)^4=2^4\cdot3^4=1296\)” satisface esa condición.
  - Multiplica los resultados y verifica frente a la potencia del producto original.
- titulo: ¿Es válido omitir el paso “Comprueba que toda la multiplicación esté dentro de la base”? — Potencia
    de un producto
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de potencia de un producto.
  - 'Omitirlo puede volver inválida la acción siguiente: Eleva cada factor al mismo exponente exterior.'
  - 'La solución debe terminar de este modo: Multiplica los resultados y verifica frente a la potencia
    del producto original.'
errores_frecuentes:
- 'Confundir potencia de un producto con otro concepto y omitir este inicio: Comprueba que toda la multiplicación
  esté dentro de la base.'
- Aplicar mecánicamente “Eleva cada factor al mismo exponente exterior.” sin revisar las condiciones de
  la definición.
- Tomar “\((2\cdot3)^4=2^4\cdot3^4=1296\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “cada repetición del producto contiene una copia
  de todos sus factores”.
- 'Terminar el desarrollo sin realizar este control: Multiplica los resultados y verifica frente a la
  potencia del producto original.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
