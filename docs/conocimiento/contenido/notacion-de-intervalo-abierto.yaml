semantic_id: MAT.ALG.INTERVALOS.INTERVALO_ABIERTO
titulo: Notación de intervalo abierto
objetivo: Analizar la estructura y notación de un intervalo abierto en la recta numérica.
introduccion: Un intervalo abierto comprende todos los números reales estrictamente entre dos valores
  dados.
resumen: Conjunto de la forma $(a, b)$ que no incluye sus extremos.
explicacion: '### Definición formal

  El intervalo abierto se define como $(a, b) = \{ x \in \mathbb{R} \mid a < x < b \}$.


  ### Desarrollo didáctico

  Al representar gráficamente, utilizamos círculos sin rellenar en los extremos para indicar que esos
  puntos exactos no forman parte del conjunto.'
procedimiento:
- Identificar los límites inferior y superior, $a$ y $b$.
- Escribir el conjunto como $(a, b)$ o $]a, b[$.
- Trazar la gráfica utilizando puntos sin colorear en $a$ y $b$.
ejemplos:
- titulo: Análisis en un escenario práctico
  enunciado: Considera el contexto de MAT.ALG.INTERVALOS.INTERVALO_ABIERTO. Determina las implicancias.
  solucion_pasos:
  - Establecer los límites.
  - Analizar el tipo de extremo.
  - Concluir.
- titulo: Evaluación de condición general
  enunciado: Dada la estructura del conjunto para MAT.ALG.INTERVALOS.INTERVALO_ABIERTO, plantea la desigualdad.
  solucion_pasos:
  - Identificar la variable.
  - Aplicar la definición.
  - Escribir el intervalo.
- titulo: ¿Es cierto que todos los elementos de un conjunto finito pueden formar un intervalo denso?
  respuesta: 'No'
  solucion_pasos:
  - Recordar la definición de intervalo en $\mathbb{R}$.
  - Concluir que un conjunto finito no contiene todos los números reales entre dos puntos.
- titulo: ¿El uso de MAT.ALG.INTERVALOS.INTERVALO_ABIERTO es adecuado para expresar desigualdades lineales
    simples?
  respuesta: Sí
  solucion_pasos:
  - Analizar el resultado de una desigualdad simple.
  - Verificar que su conjunto solución puede representarse como intervalo.
errores_frecuentes:
- El intervalo abierto incluye al extremo inferior.
- El intervalo abierto $(2, 5)$ contiene exactamente 2 números.
- Se usan corchetes apuntando hacia el interior para denotar intervalos abiertos.
- Un intervalo abierto no puede tener un extremo negativo.
- Un intervalo abierto solo puede definirse entre números racionales.
