semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.LOGARITMO_BASE
titulo: Propiedad del logaritmo de la base
objetivo: Aplicar la propiedad $\log_b(b)=1$ para simplificar expresiones algebraicas donde el argumento coincide
  con la base.
introduccion: Cuando el argumento de un logaritmo es exactamente igual a su base, el resultado siempre es el mismo
  valor fijo, sin importar cuál sea esa base.
resumen: Para cualquier base válida $b$, se cumple $\log_b(b)=1$, ya que $b^1=b$; esta propiedad simplifica
  términos donde el argumento y la base coinciden.
explicacion: '### Definición formal


  Para todo $b>0$, $b\neq1$, se cumple $\log_b(b)=1$, pues $b^1=b$. Esta propiedad permite simplificar de
  inmediato cualquier término de una expresión algebraica donde el argumento sea idéntico a la base del
  logaritmo.


  ### Desarrollo didáctico


  Al simplificar $\log_7(x)+\log_7(7)$, se reemplaza $\log_7(7)$ por $1$, quedando $\log_7(x)+1$. Reconocer
  esta coincidencia entre base y argumento evita cálculos innecesarios.'
procedimiento:
- 'Paso 1: Localiza cualquier término donde el argumento coincida exactamente con la base del logaritmo.'
- 'Paso 2: Reemplázalo directamente por $1$.'
- 'Paso 3: Simplifica la expresión resultante integrando ese valor constante.'
ejemplos:
- titulo: Simplificación directa de $\log_b(b)$
  enunciado: 'Simplifica $\log_4(4)+\log_4(x)$.'
  solucion_pasos:
  - Se reemplaza $\log_4(4)$ por $1$.
  - 'La expresión se reduce a $1+\log_4(x)$.'
- titulo: Uso dentro de una expresión con resta
  enunciado: 'Simplifica $\log_3(x)-\log_3(3)$.'
  solucion_pasos:
  - Se reemplaza $\log_3(3)$ por $1$.
  - 'La expresión queda $\log_3(x)-1$, equivalente a $\log_3(x/3)$.'
- titulo: ¿Es cierto que $\log_b(b)=1$ para toda base válida?
  enunciado: ¿La igualdad $\log_b(b)=1$ se cumple para cualquier base $b>0$, $b\neq1$?
  respuesta: Sí
  solucion_pasos:
  - Se deriva directamente de que $b^1=b$ para cualquier base.
- titulo: ¿$\log_b(b)$ puede ser distinto de $1$ para alguna base?
  enunciado: ¿Existe alguna base válida $b$ para la cual $\log_b(b)\neq1$?
  respuesta: 'No'
  solucion_pasos:
  - El resultado siempre es $1$, sin importar qué base válida se use.
errores_frecuentes:
- Confundir $\log_b(b)=1$ con $\log_b(1)=0$, invirtiendo los resultados de ambas propiedades.
- No reconocer el término $\log_b(b)$ cuando aparece disfrazado dentro de una expresión más compleja.
- Suponer que el resultado depende del valor específico de la base.
- Olvidar verificar que la base cumpla $b>0$, $b\neq1$ antes de aplicar la propiedad.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
