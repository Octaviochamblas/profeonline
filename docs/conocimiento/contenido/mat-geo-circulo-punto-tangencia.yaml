semantic_id: MAT.GEO.CIRCULO_RECTAS.PUNTO_TANGENCIA
titulo: Identificación del punto de tangencia entre una recta tangente y una circunferencia
objetivo: Identificar el punto de tangencia como el único punto en común entre una recta tangente y la
  circunferencia.
introduccion: Toda recta tangente tiene un punto característico y único que merece un nombre específico,
  dado su rol central en esta relación geométrica.
resumen: El punto de tangencia es el único punto que comparten una recta tangente y la circunferencia
  a la que es tangente.
explicacion: '![Punto de tangencia](/static/img/geometria/circunferencia-circulo/circulo-punto-tangencia.svg)


  ### Definición formal


  Si $L$ es tangente a una circunferencia de centro $O$, el punto de tangencia $T$ es el único punto que
  pertenece tanto a $L$ como a la circunferencia.


  ### Desarrollo didáctico


  El punto de tangencia es también el punto de la circunferencia más cercano a la recta tangente (de hecho,
  es el único punto de la circunferencia que realmente toca la recta); todos los demás puntos de la circunferencia
  están a una distancia mayor de la recta.'
procedimiento:
- 'Paso 1: Identifica la recta tangente y la circunferencia correspondiente.'
- 'Paso 2: Encuentra el único punto que pertenece a ambas.'
- 'Paso 3: Ese punto es el punto de tangencia.'
ejemplos:
- titulo: Identificar el punto de tangencia
  enunciado: Una recta tangente toca a una circunferencia en el punto T.
  solucion_pasos:
  - T es el punto de tangencia entre la recta y la circunferencia.
- titulo: Reconocer la unicidad del punto de tangencia
  enunciado: ¿Puede una recta tangente tener dos puntos de tangencia con la misma circunferencia?
  solucion_pasos:
  - No, solo puede haber un único punto de tangencia por definición.
- titulo: ¿El punto de tangencia pertenece a la circunferencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, es un punto de la circunferencia (y también de la recta tangente).
- titulo: ¿El punto de tangencia es el punto de la circunferencia más cercano a la recta?
  respuesta: Sí
  solucion_pasos:
  - Sí, es precisamente el único punto que realmente toca la recta.
errores_frecuentes:
- Creer que puede haber más de un punto de tangencia entre una recta y una circunferencia dadas.
- Confundir el punto de tangencia con el centro de la circunferencia.
- No verificar que el punto identificado realmente pertenezca a ambos elementos (recta y circunferencia).
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
