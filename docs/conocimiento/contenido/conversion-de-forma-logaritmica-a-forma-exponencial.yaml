semantic_id: MAT.NUM.LOGARITMOS_CONCEPTO.FORMA_LOGARITMICA_A_EXPONENCIAL
titulo: Conversión de forma logarítmica a forma exponencial
objetivo: Convertir una igualdad logarítmica a exponencial.
introduccion: La forma logarítmica puede parecer abstracta hasta que se vuelve potencia. Esa traducción
  es también una herramienta de comprobación inmediata.
resumen: De \(\log_b a=c\) se obtiene la forma exponencial \(b^c=a\). La conversión conserva la base y
  hace explícita la potencia que define el logaritmo.
explicacion: 'De \(\log_b a=c\) se obtiene la forma exponencial \(b^c=a\).


  Al analizar “\(\log_5 125=3\) se transforma en \(5^3=125\)” conviene observar la conexión siguiente:
  la conversión conserva la base y hace explícita la potencia que define el logaritmo'
procedimiento:
- 'Paso 1: Ubica la base como número inferior del logaritmo.'
- 'Paso 2: Usa el valor del logaritmo como exponente y el argumento como resultado.'
- 'Paso 3: Evalúa la potencia para comprobar la igualdad y el dominio.'
ejemplos:
- titulo: Aplicación razonada — Conversión de forma logarítmica a forma exponencial
  enunciado: \(\log_5 125=3\) se transforma en \(5^3=125\).
  solucion_pasos:
  - Ubica la base como número inferior del logaritmo.
  - Usa el valor del logaritmo como exponente y el argumento como resultado.
  - Evalúa la potencia para comprobar la igualdad y el dominio.
- titulo: Revisión de una solución — Conversión de forma logarítmica a forma exponencial
  enunciado: Una solución aplica “Usa el valor del logaritmo como exponente y el argumento como resultado.”,
    pero termina sin comprobar que la conversión conserva la base y hace explícita la potencia que define
    el logaritmo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conversión de forma logarítmica a forma exponencial: de \(\log_b
    a=c\) se obtiene la forma exponencial \(b^c=a\).'
  - Ubica la base como número inferior del logaritmo.
  - 'Completa la revisión con este control: Evalúa la potencia para comprobar la igualdad y el dominio.'
- titulo: ¿Se cumple que la conversión conserva la base y hace explícita la potencia que define el logaritmo?
    — Conversión de forma logarítmica a forma exponencial
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que de \(\log_b a=c\) se obtiene la forma exponencial \(b^c=a\).
  - El caso “\(\log_5 125=3\) se transforma en \(5^3=125\)” satisface esa condición.
  - Evalúa la potencia para comprobar la igualdad y el dominio.
- titulo: ¿Es válido omitir el paso “Ubica la base como número inferior del logaritmo”? — Conversión de
    forma logarítmica a forma exponencial
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conversión de forma logarítmica a forma exponencial.
  - 'Omitirlo puede volver inválida la acción siguiente: Usa el valor del logaritmo como exponente y el
    argumento como resultado.'
  - 'La solución debe terminar de este modo: Evalúa la potencia para comprobar la igualdad y el dominio.'
errores_frecuentes:
- 'Confundir conversión de forma logarítmica a forma exponencial con otro concepto y omitir este inicio:
  Ubica la base como número inferior del logaritmo.'
- Aplicar mecánicamente “Usa el valor del logaritmo como exponente y el argumento como resultado.” sin
  revisar las condiciones de la definición.
- Tomar “\(\log_5 125=3\) se transforma en \(5^3=125\)” como una igualdad aislada, sin explicar por qué
  es válida.
- Aceptar una respuesta que contradice la idea clave “la conversión conserva la base y hace explícita
  la potencia que define el logaritmo”.
- 'Terminar el desarrollo sin realizar este control: Evalúa la potencia para comprobar la igualdad y el
  dominio.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
