semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.PENDIENTE_DOS_PUNTOS
titulo: Cálculo de la pendiente dados dos puntos
objetivo: Calcular la pendiente de una recta a partir de las coordenadas de dos puntos conocidos.
introduccion: Con solo dos puntos de una recta puedes calcular exactamente su pendiente, sin necesidad de ver el
  gráfico completo.
resumen: Dados dos puntos $(x_1, y_1)$ y $(x_2, y_2)$ de una recta no vertical, su pendiente se calcula mediante
  la fórmula $m = \dfrac{y_2-y_1}{x_2-x_1}$.
explicacion: '### Definición formal


  Dados dos puntos distintos $(x_1,y_1)$ y $(x_2,y_2)$ pertenecientes a una recta, con $x_1 \neq x_2$, la pendiente
  de la recta que los contiene es $m = \dfrac{y_2-y_1}{x_2-x_1}$. Este valor es independiente del orden en que
  se etiqueten los puntos, siempre que se mantenga la consistencia entre numerador y denominador.


  ### Desarrollo didáctico


  Es fundamental restar las coordenadas en el mismo orden en numerador y denominador: si empiezas restando $y_2-y_1$,
  debes seguir con $x_2-x_1$, no $x_1-x_2$.


  Para los puntos $(2,3)$ y $(5,12)$: $m = \frac{12-3}{5-2} = \frac{9}{3} = 3$. Si invirtieras el orden consistentemente,
  $m = \frac{3-12}{2-5} = \frac{-9}{-3} = 3$, el mismo resultado.'
procedimiento:
- 'Paso 1: Identifica las coordenadas de ambos puntos, $(x_1,y_1)$ y $(x_2,y_2)$.'
- 'Paso 2: Resta las ordenadas en el orden elegido: $y_2 - y_1$.'
- 'Paso 3: Resta las abscisas en el mismo orden: $x_2 - x_1$.'
- 'Paso 4: Divide ambos resultados para obtener la pendiente.'
ejemplos:
- titulo: Cálculo estándar
  enunciado: Calcula la pendiente de la recta que pasa por $(0,1)$ y $(4,9)$.
  solucion_pasos:
  - '$m = \frac{9-1}{4-0} = \frac{8}{4} = 2$.'
- titulo: Cálculo con pendiente negativa
  enunciado: Calcula la pendiente de la recta que pasa por $(1,7)$ y $(4,-2)$.
  solucion_pasos:
  - '$m = \frac{-2-7}{4-1} = \frac{-9}{3} = -3$.'
- titulo: ¿El resultado cambia si se invierte el orden de los puntos en la fórmula?
  enunciado: ¿El resultado cambia si se invierte el orden de los puntos en la fórmula?
  respuesta: 'No'
  solucion_pasos:
  - Siempre que se mantenga el mismo orden en numerador y denominador, el resultado es idéntico.
- titulo: ¿Se puede calcular la pendiente con dos puntos que tienen la misma ordenada?
  enunciado: ¿Se puede calcular la pendiente con dos puntos que tienen la misma ordenada?
  respuesta: Sí
  solucion_pasos:
  - Esto da pendiente 0 (recta horizontal), siempre que las abscisas sean distintas.
errores_frecuentes:
- Restar en orden inconsistente, por ejemplo $y_2-y_1$ dividido por $x_1-x_2$, invirtiendo el signo del resultado.
- Confundir cuál coordenada corresponde a $x$ y cuál a $y$ en cada punto.
- Usar dos puntos con la misma abscisa, generando una división por cero.
- Cometer errores de signo al restar coordenadas negativas.
