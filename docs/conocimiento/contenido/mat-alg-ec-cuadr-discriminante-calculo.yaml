  solucion_pasos:
  - '$a=2$, $b=-7$, $c=3$.'
  - '$b^2=49$; $4ac=4(2)(3)=24$.'
  - '$\Delta=49-24=25$.'
- titulo: Â¿Restar un producto $4ac$ negativo aumenta el valor del discriminante?
