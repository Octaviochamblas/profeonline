objetivo: Aplicar correctamente la expresiĂ³n $b^2-4ac$ para calcular el discriminante de distintas ecuaciones cuadrĂ¡ticas.
introduccion: Calcular el discriminante es un procedimiento mecĂ¡nico de tres pasos, pero exige cuidado especial
  con los signos, sobre todo cuando $a$ o $c$ son negativos.
resumen: Calcular el discriminante consiste en sustituir los valores de $a$, $b$ y $c$ en la expresiĂ³n $\Delta=b^2-4ac$
  y simplificar, prestando especial atenciĂ³n a los signos.
explicacion: '### DefiniciĂ³n formal


  El cĂ¡lculo del discriminante $\Delta=b^2-4ac$ requiere elevar $b$ al cuadrado, calcular el producto $4ac$, y
  restar ambos resultados en ese orden. Cada operaciĂ³n debe respetar los signos de los coeficientes originales.


  ### Desarrollo didĂ¡ctico


  Es recomendable calcular $b^2$ y $4ac$ por separado antes de restar, especialmente cuando $a$ o $c$ son negativos,
  ya que el producto $4ac$ puede resultar negativo, y restar un nĂºmero negativo equivale a sumar.


  Para $3x^2+2x-5=0$: $b^2=2^2=4$; $4ac=4(3)(-5)=-60$; $\Delta=4-(-60)=4+60=64$.'
procedimiento:
- 'Paso 1: Identifica $a$, $b$ y $c$ en la forma general de la ecuaciĂ³n.'
- 'Paso 2: Calcula $b^2$ por separado.'
- 'Paso 3: Calcula el producto $4ac$ por separado, respetando los signos.'
- 'Paso 4: Resta: $\Delta=b^2-(4ac)$.'
ejemplos:
- titulo: CĂ¡lculo con coeficiente a negativo
  enunciado: 'Calcula el discriminante de $-x^2+6x-9=0$.'
  solucion_pasos:
  - '$a=-1$, $b=6$, $c=-9$.'
  - '$b^2=36$; $4ac=4(-1)(-9)=36$.'
  - '$\Delta=36-36=0$.'
- titulo: CĂ¡lculo con tĂ©rmino lineal negativo
