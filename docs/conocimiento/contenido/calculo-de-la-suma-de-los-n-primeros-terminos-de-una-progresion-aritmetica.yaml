semantic_id: MAT.NUM.PROG_ARITMETICA.SUMA_FINITA
titulo: Cálculo de la suma de los n primeros términos de una progresión aritmética
objetivo: Calcular la suma de los primeros 'n' términos de una progresión aritmética utilizando la fórmula
  de Gauss.
introduccion: Cuenta la leyenda que el famoso matemático Carl Friedrich Gauss, a los 9 años, sumó todos
  los números del 1 al 100 en unos segundos. Su maestro quedó pasmado. Gauss no sumó uno por uno, descubrió
  un truco genial.
resumen: 'La suma de los primeros ''$n$'' términos de una P.A. se calcula promediando el primer y el último
  término, y multiplicando por la cantidad de términos: $S_n = \frac{n}{2} \cdot (a_1 + a_n)$.'
explicacion: "Imagina que quieres sumar $1 + 2 + 3 + \\dots + 98 + 99 + 100$.\nGauss notó que si sumas\
  \ el primero y el último ($1+100$), da $101$. El segundo con el penúltimo ($2+99$), da $101$. El tercero\
  \ con el antepenúltimo ($3+98$), da $101$. \n\nTodas las parejas suman lo mismo. Como hay 100 números,\
  \ hay 50 parejas. Así que la suma total es $50 \\cdot 101 = 5.050$. ¡Brillante!\n\nDe ahí nace la fórmula\
  \ oficial:\n$$S_n = \\frac{n}{2} \\cdot (a_1 + a_n)$$\nDonde:\n- **$S_n$**: Suma total de los $n$ números.\n\
  - **$n$**: Cantidad de términos que estás sumando.\n- **$a_1$**: El primer término de tu lista.\n- **$a_n$**:\
  \ El último término de tu lista."
procedimiento:
- 'Paso 1: Identifica cuántos términos sumarás ($n$).'
- 'Paso 2: Identifica el primer término ($a_1$).'
- 'Paso 3: Identifica (o calcula usando la fórmula del término general) el último término que sumarás
  ($a_n$).'
- 'Paso 4: Suma el primero con el último, multiplica por ''$n$'', y finalmente divide por 2.'
ejemplos:
- titulo: Sumando la quincena
  enunciado: Ahorras $10 el día 1, $20 el día 2, $30 el día 3, y así sucesivamente durante 15 días. ¿Cuánto
    dinero ahorraste en total?
  solucion_pasos:
  - Es una P.A. donde a1=10, d=10. Necesito sumar 15 días (n=15).
  - El último día (día 15) ahorro a15 = 10 + (14)*10 = 150.
  - 'Fórmula suma: S15 = (15 / 2) * (10 + 150)'
  - S15 = 7.5 * 160 = 1.200.
  - Ahorraste $1.200 en total.
errores_frecuentes:
- Confundir el valor del último término ($a_n$) con la suma total ($S_n$). (El último término es cuánto
  vale la casilla 15, la suma es el total acumulado en las 15 casillas).
- No tener el dato del último término y olvidar que primero hay que calcularlo con la fórmula $a_n = a_1
  + (n-1)d$.
fuente: Currículum Nacional MINEDUC.
estado: publicado
