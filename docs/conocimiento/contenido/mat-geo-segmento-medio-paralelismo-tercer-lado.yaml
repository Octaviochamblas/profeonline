semantic_id: MAT.GEO.SEGMENTO_MEDIO.PARALELISMO_TERCER_LADO
titulo: Propiedad de paralelismo del segmento medio respecto del tercer lado
objetivo: Aplicar la propiedad de que el segmento medio de un triángulo es siempre paralelo al lado al
  que es relativo.
introduccion: Una propiedad notable del segmento medio es que, sin importar la forma del triángulo, siempre
  queda exactamente paralelo al tercer lado, el que no interviene en su construcción.
resumen: El segmento medio de un triángulo es paralelo al lado al que es relativo.
explicacion: '![Segmento medio paralelo al tercer lado](/static/img/geometria/elementos-secundarios/segmento-medio-paralelismo-tercer-lado.svg)


  ### Definición formal


  Si M y N son los puntos medios de AB y AC en un triángulo ABC, el segmento MN es paralelo al lado BC.


  ### Desarrollo didáctico


  Esta propiedad, junto con la de la medida (MN mide la mitad de BC), constituye el llamado teorema del
  segmento medio o teorema de la base media.'
procedimiento:
- 'Paso 1: Identifica el segmento medio y el lado al que es relativo.'
- 'Paso 2: Recuerda que ambos son siempre paralelos entre sí.'
- 'Paso 3: Aplica esta propiedad para resolver problemas de ángulos o de paralelismo.'
ejemplos:
- titulo: Verificar el paralelismo
  enunciado: El segmento medio MN es relativo al lado BC.
  solucion_pasos:
  - MN es paralelo a BC.
- titulo: Aplicar a un ángulo
  enunciado: El lado BC forma un ángulo de 40° con una recta externa. ¿Qué ángulo forma el segmento medio
    MN con esa misma recta?
  solucion_pasos:
  - También 40°, porque MN es paralelo a BC.
- titulo: ¿El segmento medio es siempre paralelo al lado correspondiente?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad general del segmento medio.
- titulo: ¿Esta propiedad depende del tipo de triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, se cumple en cualquier triángulo, sin importar su forma.
errores_frecuentes:
- Creer que el paralelismo solo se cumple en triángulos isósceles o equiláteros.
- Confundir cuál es el lado al que el segmento medio es paralelo.
- Asumir que el segmento medio y el lado correspondiente son perpendiculares en vez de paralelos.
fuente: Elaboración propia.
estado: publicado
