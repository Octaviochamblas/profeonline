semantic_id: 'MAT.ALG.SUMA_DIFERENCIA.DEFINICION_CONJUGADOS'
titulo: 'Definición de binomios conjugados'
objetivo: 'Comprender el concepto de binomios conjugados y su estructura fundamental.'
introduccion: '¿Qué tienen de especial dos binomios que son casi iguales pero difieren solo en un signo? A esta pareja le llamamos ''conjugados''.'
resumen: |
  Dos binomios son conjugados cuando contienen exactamente los mismos términos, pero difieren únicamente en el signo que los separa en medio.
  Ejemplo clásico: $(a+b)$ y $(a-b)$ son conjugados entre sí.
explicacion: |
  La suma por su diferencia es el producto notable que surge al multiplicar dos binomios conjugados: $(A+B)(A-B)$.
  La característica definitoria de los conjugados es que un término mantiene su signo intacto en ambos binomios (en este caso $A$), mientras que el otro término tiene signos opuestos en cada binomio ($+B$ y $-B$).
  Al multiplicarlos, la magia ocurre: los productos cruzados se cancelan ($AB - AB = 0$), dejando solo la diferencia de los cuadrados.
procedimiento:
  - 'Paso 1: Para verificar si dos factores forman una suma por diferencia (son conjugados):'
  - 'Paso 2: Revisa que ambos binomios tengan los mismos valores absolutos (las mismas letras y números).'
  - 'Paso 3: Asegúrate de que un término tenga el mismo signo en ambos paréntesis.'
  - 'Paso 4: Asegúrate de que el otro término tenga signos contrarios (uno positivo y uno negativo).'
ejemplos:
  - titulo: 'Identificando conjugados'
    enunciado: '¿Son $(3x + 2y)$ y $(3x - 2y)$ conjugados?'
    solucion_pasos:
      - 'Ambos tienen los términos $3x$ y $2y$.'
      - 'El término $3x$ es positivo en ambos.'
      - 'El término $2y$ es positivo en el primero y negativo en el segundo.'
      - 'Sí son conjugados.'
errores_frecuentes:
  - 'Creer que $(a-b)$ y $(b-a)$ son conjugados. ¡No lo son! Son inversos aditivos. Los conjugados deben mantener un término idéntico.'
