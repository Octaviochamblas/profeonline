semantic_id: MAT.GEO.TRIG_CUADRANTES.ANGULO_REFERENCIA
titulo: Cálculo del ángulo de referencia para ángulos no agudos
objetivo: Calcular el ángulo de referencia de un ángulo en posición general, definido como el ángulo agudo
  formado entre el lado terminal y el eje x.
introduccion: 'Para calcular razones trigonométricas de ángulos mayores a 90°, conviene relacionarlos
  con un ángulo agudo equivalente: el ángulo de referencia, que siempre se mide respecto del eje x, nunca
  del eje y.'
resumen: El ángulo de referencia de un ángulo $\theta$ en posición general es el ángulo agudo positivo
  formado entre el lado terminal de $\theta$ y el eje x (el más cercano).
explicacion: '![Ángulo de referencia](/static/img/geometria/trigonometria/trigcuad-angulo-referencia.svg)


  ### Definición formal


  Si $\theta$ está en el cuadrante II, su ángulo de referencia es $\alpha=180°-\theta$. Si está en el
  cuadrante III, $\alpha=\theta-180°$. Si está en el cuadrante IV, $\alpha=360°-\theta$. Si está en el
  cuadrante I, $\alpha=\theta$.


  ### Desarrollo didáctico


  En la figura, $\theta=150°$ está en el segundo cuadrante, y su ángulo de referencia es $\alpha=180°-150°=30°$,
  medido entre el lado terminal y el semieje negativo de las x (el eje más cercano).'
procedimiento:
- 'Paso 1: Determina el cuadrante en que se ubica el ángulo θ.'
- 'Paso 2: Aplica la fórmula correspondiente a ese cuadrante (180°-θ, θ-180°, 360°-θ, o θ mismo si está
  en el cuadrante I).'
- 'Paso 3: El resultado es el ángulo de referencia, siempre un ángulo agudo entre 0° y 90°.'
ejemplos:
- titulo: Calcular el ángulo de referencia de 150°
  enunciado: θ=150° (segundo cuadrante).
  solucion_pasos:
  - α=180°-150°=30°.
- titulo: Calcular el ángulo de referencia de 250°
  enunciado: θ=250° (tercer cuadrante).
  solucion_pasos:
  - α=250°-180°=70°.
- titulo: ¿El ángulo de referencia siempre es un ángulo agudo?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición está siempre entre 0° y 90°.
- titulo: ¿El ángulo de referencia se mide respecto del eje y?
  respuesta: 'No'
  solucion_pasos:
  - No, siempre se mide respecto del eje x, nunca del eje y.
errores_frecuentes:
- Calcular el ángulo de referencia respecto del eje y en vez del eje x.
- Usar la fórmula de un cuadrante equivocado (por ejemplo, aplicar 180°-θ a un ángulo del tercer cuadrante).
- Obtener un ángulo de referencia mayor a 90°, lo que indica un error en el cálculo.
fuente: Elaboración propia.
estado: publicado
