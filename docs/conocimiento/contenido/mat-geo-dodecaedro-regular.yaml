semantic_id: MAT.GEO.POLIEDROS_PRISMAS.DODECAEDRO_REGULAR
titulo: Identificación del dodecaedro regular
objetivo: Reconocer el dodecaedro regular como el poliedro regular formado por doce caras pentagonales
  regulares congruentes.
introduccion: El dodecaedro regular está formado por doce 'casas' pentagonales idénticas, ensambladas
  para formar un cuerpo geométrico casi esférico.
resumen: El dodecaedro regular es un poliedro regular formado por 12 caras pentagonales regulares congruentes,
  20 vértices y 30 aristas, con 3 caras concurriendo en cada vértice.
explicacion: '![Dodecaedro regular (esquema)](/static/img/geometria/espacio-cuerpos/dodecaedro-regular.svg)


  ### Definición formal


  El dodecaedro regular es uno de los cinco sólidos platónicos. Tiene 12 caras (todas pentágonos regulares
  congruentes), 20 vértices y 30 aristas. En cada vértice concurren exactamente 3 caras.


  ### Desarrollo didáctico


  El esquema muestra una vista frontal simplificada: un pentágono central rodeado por las caras adyacentes
  que se ''inclinan'' hacia el fondo del cuerpo. El nombre ''dodecaedro'' proviene del griego ''dodeca''
  (doce), en referencia a sus 12 caras.'
procedimiento:
- 'Paso 1: Verifica que el cuerpo tenga exactamente 12 caras pentagonales.'
- 'Paso 2: Verifica que las 12 caras sean pentágonos regulares congruentes entre sí.'
- 'Paso 3: Confirma que en cada uno de los 20 vértices concurran exactamente 3 caras.'
ejemplos:
- titulo: Contar los elementos del dodecaedro regular
  enunciado: Un dodecaedro regular tiene 12 caras pentagonales.
  solucion_pasos:
  - 'Tiene 12 caras, 20 vértices y 30 aristas, cumpliendo la relación de Euler: 20-30+12=2.'
- titulo: Reconocer el origen del nombre 'dodecaedro'
  enunciado: El prefijo griego 'dodeca' significa doce.
  solucion_pasos:
  - '''Dodecaedro'' significa literalmente ''cuerpo de doce caras'', refiriéndose a sus 12 caras pentagonales.'
- titulo: ¿Las caras del dodecaedro regular son pentágonos regulares?
  respuesta: Sí
  solucion_pasos:
  - Sí, todas sus 12 caras son pentágonos regulares congruentes entre sí.
- titulo: ¿El dodecaedro regular tiene más vértices que el icosaedro regular?
  respuesta: 'No'
  solucion_pasos:
  - No, el dodecaedro tiene 20 vértices, mientras que el icosaedro tiene 12; son duales entre sí (intercambian
    vértices y caras).
errores_frecuentes:
- Confundir el número de caras (12) con el número de vértices (20) o aristas (30).
- Creer que las caras del dodecaedro son hexágonos en vez de pentágonos.
- No reconocer la relación de dualidad entre el dodecaedro y el icosaedro.
fuente: 'Elaboración propia (referencia: Moraleja 96).'
estado: publicado
