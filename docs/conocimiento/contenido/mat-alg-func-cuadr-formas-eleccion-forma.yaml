semantic_id: MAT.ALG.FUNC_CUADR_FORMAS.ELECCION_FORMA
titulo: Elección de la forma más conveniente de la función según la información disponible
objetivo: Elegir la forma de la función cuadrática (general, canónica o factorizada) más adecuada según lo que
  se necesite calcular o mostrar.
introduccion: Ninguna de las tres formas de la función cuadrática es "la mejor" en términos absolutos; cada una
  resulta más útil dependiendo de qué información se busque.
resumen: La forma general facilita identificar los coeficientes $a$, $b$, $c$ y el corte con el eje $y$; la canónica
  facilita el vértice; la factorizada facilita los ceros de la función.
explicacion: '### Definición formal


  Las tres formas de una función cuadrática ($ax^2+bx+c$, $a(x-h)^2+k$, $a(x-r_1)(x-r_2)$) son algebraicamente
  equivalentes, pero cada una expone directamente distinta información: la general expone $c=f(0)$; la canónica
  expone el vértice $(h,k)$; la factorizada expone los ceros $r_1, r_2$ (cuando existen).


  ### Desarrollo didáctico


  Antes de elegir una forma, conviene preguntarse qué información se necesita: si es el vértice, usar la forma
  canónica; si son los ceros, la factorizada; si es evaluar rápidamente o identificar coeficientes, la general.


  Para determinar el máximo de una función que modela una trayectoria, conviene usar la forma canónica, ya que
  expone directamente el vértice, que corresponde a ese máximo.'
procedimiento:
- 'Paso 1: Identifica qué información se necesita obtener de la función (vértice, ceros, o coeficientes).'
- 'Paso 2: Si se necesita el vértice, prioriza la forma canónica.'
- 'Paso 3: Si se necesitan los ceros, prioriza la forma factorizada.'
- 'Paso 4: Si se necesita evaluar la función o identificar coeficientes rápidamente, usa la forma general.'
ejemplos:
- titulo: Elección de forma para hallar el vértice
  enunciado: 'Se necesita el vértice de una parábola que modela la altura de un objeto. ¿Qué forma conviene usar?'
  solucion_pasos:
  - La forma canónica expone directamente las coordenadas del vértice.
  - Conviene usar la forma canónica.
- titulo: Elección de forma para hallar los ceros
  enunciado: 'Se necesita saber en qué instantes un objeto toca el suelo (altura cero). ¿Qué forma conviene usar?'
  solucion_pasos:
  - La forma factorizada expone directamente los ceros de la función.
  - Conviene usar la forma factorizada.
- titulo: ¿La forma general es siempre la más útil para cualquier cálculo?
  enunciado: ¿La forma general es siempre la más útil para cualquier cálculo?
  respuesta: 'No'
  solucion_pasos:
  - Depende de qué información se busque; la canónica y la factorizada son más directas para el vértice y los
    ceros respectivamente.
- titulo: ¿Se puede convertir libremente entre las tres formas de una misma función?
  enunciado: ¿Se puede convertir libremente entre las tres formas de una misma función?
  respuesta: Sí
  solucion_pasos:
  - Las tres formas son algebraicamente equivalentes, por lo que siempre es posible convertir entre ellas.
errores_frecuentes:
- Intentar leer el vértice directamente de la forma general sin convertir a la forma canónica.
- Intentar leer los ceros directamente de la forma canónica sin resolver la ecuación correspondiente.
- Elegir siempre la forma general por costumbre, incluso cuando otra forma sería más directa para el problema.
- Suponer que la forma factorizada siempre existe, sin verificar si la función tiene ceros reales.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
