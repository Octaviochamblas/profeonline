semantic_id: MAT.ALG.RELACION_EXP_LOG.SIMETRIA_RECTA_IDENTIDAD
titulo: Simetría respecto a la recta $y=x$
objetivo: Reconocer que las gráficas de $f(x)=\log_b(x)$ y $g(x)=b^x$ son simétricas respecto a la recta $y=x$.
introduccion: Una propiedad visual muy útil de las funciones inversas es que, al graficarlas juntas, una parece
  el reflejo de la otra respecto a la diagonal $y=x$.
resumen: 'Las gráficas de $f(x)=\log_b(x)$ y $g(x)=b^x$ son **simétricas respecto a la recta $y=x$**, porque son
  funciones inversas: cada punto $(a,c)$ de una tiene su reflejo $(c,a)$ en la otra.'
explicacion: '### Definición formal


  Si $f$ y $g$ son funciones inversas, entonces $(a,c)$ pertenece a la gráfica de $g$ si y solo si $(c,a)$
  pertenece a la gráfica de $f$. Geométricamente, esto significa que ambas gráficas son reflejos una de la otra
  respecto a la recta $y=x$.


  ### Desarrollo didáctico


  Si $g(x)=2^x$ pasa por $(3,8)$, entonces $f(x)=\log_2(x)$ pasa por $(8,3)$. Al dibujar ambos puntos y la recta
  $y=x$, se observa que uno es exactamente el reflejo especular del otro respecto a esa diagonal.'
procedimiento:
- 'Paso 1: Identifica un punto conocido de la gráfica de la función exponencial $g(x)=b^x$.'
- 'Paso 2: Intercambia las coordenadas $(a,c)\to(c,a)$ para obtener el punto correspondiente en $f(x)=\log_b(x)$.'
- 'Paso 3: Verifica que ambos puntos son simétricos respecto a la recta $y=x$.'
ejemplos:
- titulo: Obtención del punto simétrico
  enunciado: 'Si $g(x)=3^x$ pasa por $(2,9)$, ¿por qué punto pasa $f(x)=\log_3(x)$?'
  solucion_pasos:
  - Se intercambian las coordenadas del punto conocido.
  - 'El punto correspondiente en $f$ es $(9,2)$.'
- titulo: Verificación de la simetría con el punto fijo
  enunciado: '¿Cómo se relacionan los puntos fijos $(0,1)$ de la exponencial y $(1,0)$ de la logarítmica con la
    recta $y=x$?'
  solucion_pasos:
  - Se observa que las coordenadas de un punto son exactamente las del otro intercambiadas.
  - Ambos puntos son simétricos respecto a la recta $y=x$, consistente con la relación inversa.
- titulo: ¿Las gráficas de una función y su inversa siempre son simétricas respecto a $y=x$?
  enunciado: ¿Es una propiedad general que la gráfica de cualquier función y su inversa sean simétricas respecto
    a la recta $y=x$?
  respuesta: Sí
  solucion_pasos:
  - Es una propiedad geométrica válida para cualquier par de funciones inversas, no solo exponencial-logarítmica.
- titulo: ¿La asíntota horizontal de la exponencial se refleja en una asíntota horizontal de la logarítmica?
  enunciado: ¿Al reflejar la asíntota horizontal $y=0$ de la exponencial respecto a $y=x$, se obtiene otra
    asíntota horizontal?
  respuesta: 'No'
  solucion_pasos:
  - Se refleja en la asíntota vertical $x=0$ de la función logarítmica, no en otra horizontal.
errores_frecuentes:
- Confundir la simetría respecto a $y=x$ con la simetría respecto al eje $y$.
- Intercambiar mal las coordenadas al buscar el punto correspondiente.
- Suponer que la asíntota se refleja en otra del mismo tipo, en vez de cambiar de vertical a horizontal (o viceversa).
- Olvidar que esta simetría es consecuencia directa de ser funciones inversas.
