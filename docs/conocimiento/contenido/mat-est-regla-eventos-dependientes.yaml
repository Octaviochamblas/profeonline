semantic_id: MAT.EST.REGLAS_PROBABILIDAD.EVENTOS_DEPENDIENTES
titulo: Identificación de eventos dependientes en situaciones probabilísticas
objetivo: Identificar eventos dependientes como aquellos en los que la ocurrencia de uno afecta la probabilidad
  del otro.
introduccion: En muchas situaciones, especialmente al extraer objetos sin reponerlos, el resultado de
  un primer evento cambia las condiciones para el segundo, alterando su probabilidad.
resumen: Dos eventos $A$ y $B$ son dependientes si la ocurrencia de $A$ modifica la probabilidad de que
  ocurra $B$.
explicacion: '![Eventos dependientes](/static/img/probabilidad/reglas/regla-eventos-dependientes.svg)


  ### Definición formal


  Si $P(B|A)\neq P(B)$ (la probabilidad de B, condicionada a que ocurrió A, es distinta de la probabilidad
  de B sin esa condición), entonces A y B son eventos dependientes.


  ### Desarrollo didáctico


  En una urna con 5 bolitas rojas y 5 azules, si se extrae una roja sin devolverla, la urna queda con
  4 rojas y 5 azules. La probabilidad de sacar una segunda roja cambia de $\dfrac{5}{10}$ a $\dfrac{4}{9}$:
  los eventos son dependientes.'
procedimiento:
- 'Paso 1: Identifica si la ocurrencia del primer evento modifica las condiciones (cantidades, proporciones)
  del segundo.'
- 'Paso 2: Calcula la probabilidad del segundo evento antes y después de la ocurrencia del primero.'
- 'Paso 3: Si esas probabilidades son distintas, los eventos son dependientes.'
ejemplos:
- titulo: Reconocer dependencia en extracciones sin reposición
  enunciado: Urna con 5 rojas y 5 azules, se extrae sin devolver.
  solucion_pasos:
  - 'Sacar una roja cambia la urna a 4 rojas y 5 azules, alterando la probabilidad de la siguiente extracción:
    son eventos dependientes.'
- titulo: Reconocer independencia en extracciones con reposición
  enunciado: Se extrae una bolita, se registra el color, y se devuelve a la urna antes de la siguiente
    extracción.
  solucion_pasos:
  - Como la bolita se devuelve, la urna queda igual que antes, por lo que las extracciones son independientes.
- titulo: ¿Extraer sin reposición genera eventos dependientes?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que la composición de la urna cambia después de cada extracción.
- titulo: ¿La reposición (devolver el objeto extraído) mantiene la independencia entre extracciones?
  respuesta: Sí
  solucion_pasos:
  - Sí, al devolver el objeto, la situación vuelve a ser la misma para la siguiente extracción.
errores_frecuentes:
- Asumir que todas las extracciones sucesivas son independientes, sin importar si hay reposición o no.
- Confundir eventos dependientes con eventos mutuamente excluyentes.
- Aplicar la regla del producto simple (P(A)×P(B)) a eventos que en realidad son dependientes.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
