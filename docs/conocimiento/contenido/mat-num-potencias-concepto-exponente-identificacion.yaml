semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.EXPONENTE_IDENTIFICACION
objetivo: Leer e interpretar el exponente de una potencia.
introduccion: Confundir \(2^6\) con \(2\cdot6\) borra la idea de crecimiento multiplicativo.
  Leer el exponente correctamente evita ese error desde el comienzo.
resumen: El exponente señala la operación o cantidad de factores aplicada a la base.
  Un exponente no es un factor que se multiplica por la base.
explicacion: |-
  El exponente señala la operación o cantidad de factores aplicada a la base.

  Al analizar “en \(2^6\), el exponente \(6\) indica seis factores iguales a \(2\)” conviene observar la conexión siguiente: un exponente no es un factor que se multiplica por la base
procedimiento:
- 'Paso 1: Ubica el número o expresión escrita en posición superior.'
- 'Paso 2: Relaciona su valor natural con la cantidad de factores iguales.'
- 'Paso 3: Contrasta la expansión con una multiplicación base por exponente para no
  confundirlas.'
ejemplos:
- titulo: Aplicación razonada — Identificación del exponente de una potencia
  enunciado: En \(2^6\), el exponente \(6\) indica seis factores iguales a \(2\).
  solucion_pasos:
  - Ubica el número o expresión escrita en posición superior.
  - Relaciona su valor natural con la cantidad de factores iguales.
  - Contrasta la expansión con una multiplicación base por exponente para no confundirlas.
- titulo: Revisión de una solución — Identificación del exponente de una potencia
  enunciado: Una solución aplica “Relaciona su valor natural con la cantidad de factores
    iguales.”, pero termina sin comprobar que un exponente no es un factor que se
    multiplica por la base. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación del exponente de una potencia:
    el exponente señala la operación o cantidad de factores aplicada a la base.'
  - Ubica el número o expresión escrita en posición superior.
  - 'Completa la revisión con este control: Contrasta la expansión con una multiplicación
    base por exponente para no confundirlas.'
- titulo: ¿Se cumple que un exponente no es un factor que se multiplica por la base?
    — Identificación del exponente de una potencia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el exponente señala la operación o
    cantidad de factores aplicada a la base.
  - El caso “en \(2^6\), el exponente \(6\) indica seis factores iguales a \(2\)”
    satisface esa condición.
  - Contrasta la expansión con una multiplicación base por exponente para no confundirlas.
- titulo: ¿Es válido omitir el paso “Ubica el número o expresión escrita en posición
    superior”? — Identificación del exponente de una potencia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación del exponente
    de una potencia.
  - 'Omitirlo puede volver inválida la acción siguiente: Relaciona su valor natural
    con la cantidad de factores iguales.'
  - 'La solución debe terminar de este modo: Contrasta la expansión con una multiplicación
    base por exponente para no confundirlas.'
errores_frecuentes:
- 'Confundir identificación del exponente de una potencia con otro concepto y omitir
  este inicio: Ubica el número o expresión escrita en posición superior.'
- Aplicar mecánicamente “Relaciona su valor natural con la cantidad de factores iguales.”
  sin revisar las condiciones de la definición.
- Tomar “en \(2^6\), el exponente \(6\) indica seis factores iguales a \(2\)” como
  una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “un exponente no es un factor
  que se multiplica por la base”.
- 'Terminar el desarrollo sin realizar este control: Contrasta la expansión con una
  multiplicación base por exponente para no confundirlas.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
