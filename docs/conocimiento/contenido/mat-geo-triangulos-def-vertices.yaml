semantic_id: MAT.GEO.TRIANGULOS_DEF.VERTICES
titulo: Identificación de los tres vértices de un triángulo
objetivo: Identificar los vértices de un triángulo como los puntos donde se encuentran sus lados.
introduccion: Cada triángulo tiene exactamente tres puntos donde dos de sus lados se tocan; esos puntos
  son sus vértices y se nombran con letras mayúsculas.
resumen: Los vértices de un triángulo son los tres puntos donde se unen sus lados, dos a dos.
explicacion: '![Vértices de un triángulo](/static/img/geometria/triangulos/triangulos-def-vertices.svg)


  ### Definición formal


  En un triángulo de lados AB, BC y CA, los vértices son los puntos A, B y C, cada uno formado por la
  intersección de dos lados consecutivos.


  ### Desarrollo didáctico


  En el triángulo ABC, el vértice A es donde se unen los lados AB y CA; el vértice B es donde se unen
  AB y BC; el vértice C es donde se unen BC y CA. Cada vértice pertenece exactamente a dos lados.'
procedimiento:
- 'Paso 1: Localiza los puntos donde dos lados del triángulo se tocan.'
- 'Paso 2: Nombra cada uno de esos puntos con una letra mayúscula.'
- 'Paso 3: Verifica que sean exactamente tres puntos distintos.'
ejemplos:
- titulo: Nombrar los vértices
  enunciado: Un triángulo tiene lados MN, NP y PM.
  solucion_pasos:
  - Los vértices son los puntos M, N y P, donde se unen los lados.
- titulo: Vértice compartido
  enunciado: Los lados AB y BC de un triángulo se encuentran en un punto.
  solucion_pasos:
  - Ese punto de encuentro es el vértice B.
- titulo: ¿Un triángulo tiene exactamente tres vértices?
  respuesta: Sí
  solucion_pasos:
  - Sí, uno por cada par de lados que se encuentran.
- titulo: ¿Puede un vértice pertenecer a un solo lado?
  respuesta: 'No'
  solucion_pasos:
  - No, cada vértice es el punto de encuentro de exactamente dos lados.
errores_frecuentes:
- Confundir un vértice con el punto medio de un lado.
- Nombrar más o menos de tres vértices en un triángulo.
- Olvidar que cada vértice pertenece a dos lados a la vez.
fuente: Elaboración propia.
estado: publicado
