semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.MULTIPLO_NUMERO
objetivo: Traducir múltiplos explícitos de un número (doble, triple, cuádruple).
introduccion: No es lo mismo decir 'tengo dos amigos' que 'tengo el doble de amigos
  que tú'. Los múltiplos escalan cantidades desconocidas como si usáramos una fotocopiadora
  matemática.
resumen: Un **Múltiplo de un Número** se traduce multiplicando una constante (el factor
  de multiplicidad) por la variable. **El número constante siempre se escribe a la
  izquierda de la variable**.
explicacion: 'Palabras clave y su traducción directa:

  - El doble de un número: $2x$

  - El triple de una cantidad: $3a$

  - El cuádruple de la ganancia: $4G$

  - Cinco veces un valor: $5v$


  *La regla de oro:* El coeficiente (el número fijo) siempre, siempre, va antes de
  la letra. Escribir $x2$ en vez de $2x$ es un error de sintaxis gravísimo en álgebra
  formal.'
procedimiento:
- 'Paso 1: Identifica la palabra que indica multiplicidad (doble, triple, veces).'
- 'Paso 2: Conviértela a su número correspondiente (2, 3, etc). Escríbelo primero.'
- 'Paso 3: Identifica de quién estamos calculando ese múltiplo y asigna una variable.'
- 'Paso 4: Escribe la variable inmediatamente a la derecha del número.'
ejemplos:
- titulo: Clonando variables
  enunciado: 'Traduce algebraicamente: ''Siete veces la edad del capitán''.'
  solucion_pasos:
  - 'La expresión ''Siete veces'' nos da la constante multiplicadora: 7.'
  - 'La ''edad del capitán'' es el objeto a multiplicar: C.'
  - 'Se escribe constante seguida de variable: 7C.'
errores_frecuentes:
- Escribir $x^2$ (x al cuadrado) para expresar 'el doble'. El doble es una multiplicación
  ($2x$), no una potencia.
- Escribir $x2$ violando la regla del coeficiente a la izquierda.
fuente: Álgebra de Baldor.
estado: publicado
