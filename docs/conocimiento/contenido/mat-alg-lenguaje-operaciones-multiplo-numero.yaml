semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.MULTIPLO_NUMERO
objetivo: Traducir múltiplos explícitos de un número (doble, triple, cuádruple).
introduccion: No es lo mismo decir 'tengo dos amigos' que 'tengo el doble de amigos que tú'. Los múltiplos escalan
  cantidades desconocidas como si usáramos una fotocopiadora matemática.
resumen: Un **Múltiplo de un Número** se traduce multiplicando una constante (el factor de multiplicidad) por la
  variable. **El número constante siempre se escribe a la izquierda de la variable**.
explicacion: '### Definición formal


  El ''doble'' es multiplicar por 2 ($2x$). Elevar al cuadrado ($x^2$) es multiplicar el número por sí mismo, un
  concepto totalmente distinto.


  ### Desarrollo didáctico


  Palabras clave y su traducción directa:

  - El doble de un número: $2x$

  - El triple de una cantidad: $3a$

  - El cuádruple de la ganancia: $4G$

  - Cinco veces un valor: $5v$


  *La regla de oro:* El coeficiente (el número fijo) siempre, siempre, va antes de la letra. Escribir $x2$ en vez
  de $2x$ es un error de sintaxis gravísimo en álgebra formal.'
procedimiento:
- 'Paso 1: Identifica la palabra que indica multiplicidad (doble, triple, veces).'
- 'Paso 2: Conviértela a su número correspondiente (2, 3, etc). Escríbelo primero.'
- 'Paso 3: Identifica de quién estamos calculando ese múltiplo y asigna una variable.'
- 'Paso 4: Escribe la variable inmediatamente a la derecha del número.'
ejemplos:
- titulo: Clonando variables
  enunciado: 'Traduce algebraicamente: ''Siete veces la edad del capitán''.'
  solucion_pasos:
  - 'La expresión ''Siete veces'' nos da la constante multiplicadora: 7.'
  - 'La ''edad del capitán'' es el objeto a multiplicar: C.'
  - 'Se escribe constante seguida de variable: 7C.'
- titulo: En una fábrica, la meta de producción de este mes exige fabricar 'el cuádruple de lo fabrica
  enunciado: 'En una fábrica, la meta de producción de este mes exige fabricar ''el cuádruple de lo fabricado el
    mes anterior''. Si la producción del mes anterior está guardada en la variable $P$, ¿cómo debe escribirse el
    algoritmo que define la meta actual? (v1)


    Opciones: A) $Meta = 4P$ · B) $Meta = P^4$ · C) $Meta = P / 4$ · D) $Meta = 4 + P$'
  solucion_pasos:
  - El cuádruple significa multiplicar por cuatro. Se escribe el coeficiente 4 seguido de la variable P.
  - 'Respuesta: $Meta = 4P$'
- titulo: 'Respecto de «Traducción de un múltiplo de un número (doble, triple, cuádruple, …)»: ¿Describ'
  enunciado: 'Respecto de «Traducción de un múltiplo de un número (doble, triple, cuádruple, …)»: ¿Describe adecuadamente
    el concepto esta frase? «Un **Múltiplo de un Número** se traduce multiplicando una constante (el factor de multiplicidad)
    por la variable»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un **Múltiplo de un Número** se traduce multiplicando una
    constante (el factor de multiplicidad) por la variable.'
- titulo: 'Respecto de «Traducción de un múltiplo de un número (doble, triple, cuádruple, …)»: ¿Se pued'
  enunciado: 'Respecto de «Traducción de un múltiplo de un número (doble, triple, cuádruple, …)»: ¿Se puede aceptar
    esta afirmación? «Escribir $x^2$ (x al cuadrado) para expresar ''el doble''. El doble es una multiplicación
    ($2x$), no una potencia»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un **Múltiplo de un Número** se traduce multiplicando una
    constante (el factor de multiplicidad) por la variable.'
errores_frecuentes:
- Escribir $x^2$ (x al cuadrado) para expresar 'el doble'. El doble es una multiplicación ($2x$), no una potencia.
- Escribir $x2$ violando la regla del coeficiente a la izquierda.
- Traducirla como $2+x$.
- Traducirla usando el número $3$.
- Traducirla como una fracción, $\frac{x}{2}$.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción de un múltiplo de un número (doble, triple, cuádruple, …)
