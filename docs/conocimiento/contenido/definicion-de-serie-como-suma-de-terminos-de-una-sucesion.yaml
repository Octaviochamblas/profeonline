semantic_id: MAT.NUM.SERIE_GEOMETRICA.CONCEPTO_SERIE
titulo: Definición de serie como suma de términos de una sucesión
objetivo: Diferenciar formalmente el concepto de 'Sucesión' (lista de números) del concepto de 'Serie'
  (suma de esa lista).
introduccion: En el lenguaje cotidiano, 'sucesión' y 'serie' parecen sinónimos (como una 'serie de televisión'
  con episodios sucesivos). Pero en matemáticas, son dos animales completamente distintos. No cometas
  el error de confundirlos en la prueba.
resumen: Una **Sucesión** es una LISTA ordenada de números separados por comas ($a_1, a_2, a_3\dots$).
  Una **Serie** es el resultado de SUMAR todos los números de una sucesión ($a_1 + a_2 + a_3\dots$).
explicacion: "Visualicemos la diferencia:\n\n- **La Sucesión:** Es como mirar tu cuenta corriente mes\
  \ a mes.\n  - Mes 1: $\\$10.000$\n  - Mes 2: $\\$20.000$\n  - Mes 3: $\\$40.000$\n  - Sucesión (lista):\
  \ $10.000, 20.000, 40.000$.\n\n- **La Serie:** Es como meter todo ese dinero en una gran alcancía y\
  \ contar el total.\n  - Total = $10.000 + 20.000 + 40.000 = $\\$70.000$.\n  - Serie (suma): $70.000$.\n\
  \nCuando veas la palabra 'Serie' en un problema de matemáticas, tu cerebro debe encender una alerta\
  \ de neón que diga: **'¡TENGO QUE SUMAR, VOY A USAR LA FÓRMULA DE $S_n$!'**"
procedimiento:
- 'Paso 1: Lee el enunciado. Si te piden encontrar un número específico en una posición, trabajas con
  una SUCESIÓN (fórmula de a_n).'
- 'Paso 2: Si el problema habla de ''acumulado'', ''total'', ''recorrido completo'' o dice literalmente
  ''SERIE'', entonces es una SUMA (fórmula de S_n).'
ejemplos:
- titulo: Aclarando el vocabulario
  enunciado: La P.G. es 2, 4, 8, 16. ¿Cuál es el valor del 4to término de la sucesión, y cuál es el valor
    de la serie finita de 4 términos?
  solucion_pasos:
  - 'Sucesión: Buscamos el elemento en la posición 4. Miramos la lista: es el 16.'
  - 'Serie: Buscamos la suma de los 4 elementos. 2 + 4 + 8 + 16 = 30.'
errores_frecuentes:
- Entregar el valor del término $a_n$ cuando el problema pedía calcular 'la serie'.
- Entregar el total acumulado cuando el problema solo pedía 'el valor del término de la sucesión'.
fuente: Currículum Nacional MINEDUC.
estado: publicado
