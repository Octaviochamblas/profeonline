semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.RAIZ_EN_POTENCIA
titulo: Exponente fraccionario como raíz
objetivo: Reescribir $f(x)=x^{p/q}$ como $f(x)=\sqrt[q]{x^p}$ y reconocer la equivalencia entre exponentes
  fraccionarios y raíces.
introduccion: 'Un exponente fraccionario no es más que una raíz disfrazada: el denominador indica el índice de la
  raíz y el numerador, la potencia dentro de ella.'
resumen: Para $p,q$ enteros con $q>0$, se cumple $x^{p/q}=\sqrt[q]{x^p}$, lo que permite tratar los exponentes
  fraccionarios como raíces con las restricciones de dominio correspondientes.
explicacion: '### Definición formal


  Para $x$ dentro del dominio adecuado, $q\in\mathbb{Z}^+$ y $p\in\mathbb{Z}$, se define
  $x^{p/q}=\sqrt[q]{x^p}=(\sqrt[q]{x})^p$. El denominador $q$ del exponente indica el índice de la raíz, y el
  numerador $p$, la potencia interna o externa (equivalentes cuando $x\geq0$).


  ### Desarrollo didáctico


  $x^{2/3}=\sqrt[3]{x^2}$: para $x=8$, se calcula $\sqrt[3]{64}=4$, lo mismo que $(\sqrt[3]{8})^2=2^2=4$. Ambas
  formas de calcular dan el mismo resultado.'
procedimiento:
- 'Paso 1: Identifica el numerador $p$ y el denominador $q$ del exponente fraccionario.'
- 'Paso 2: Reescribe la expresión como $\sqrt[q]{x^p}$.'
- 'Paso 3: Verifica las restricciones de dominio según la paridad de $q$.'
ejemplos:
- titulo: Reescritura de un exponente fraccionario simple
  enunciado: 'Reescribe $f(x)=x^{1/4}$ como raíz.'
  solucion_pasos:
  - Se identifica $p=1$ y $q=4$.
  - 'Se obtiene $f(x)=\sqrt[4]{x}$.'
- titulo: Reescritura de un exponente fraccionario con numerador distinto de 1
  enunciado: 'Reescribe $f(x)=x^{3/2}$ como raíz.'
  solucion_pasos:
  - Se identifica $p=3$ y $q=2$.
  - 'Se obtiene $f(x)=\sqrt{x^3}$.'
- titulo: ¿$x^{1/2}$ equivale a la raíz cuadrada de $x$?
  enunciado: ¿La expresión $x^{1/2}$ es equivalente a $\sqrt{x}$?
  respuesta: Sí
  solucion_pasos:
  - Se aplica la equivalencia general con $p=1$ y $q=2$.
- titulo: ¿El orden entre elevar y sacar raíz siempre da el mismo resultado?
  enunciado: ¿$\sqrt[q]{x^p}$ es siempre igual a $(\sqrt[q]{x})^p$, sin ninguna restricción sobre $x$?
  respuesta: 'No'
  solucion_pasos:
  - Son equivalentes cuando $x\geq0$, pero pueden diferir en su dominio de definición si $x$ es negativo y $q$ es par.
errores_frecuentes:
- Confundir el numerador y el denominador del exponente al identificar la raíz correspondiente.
- No verificar la paridad del índice de la raíz antes de determinar el dominio.
- Suponer que $x^{p/q}$ siempre está definido para cualquier $x$, sin restricciones.
- Aplicar la equivalencia sin simplificar primero la fracción $p/q$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
