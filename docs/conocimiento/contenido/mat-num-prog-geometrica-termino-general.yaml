semantic_id: MAT.NUM.PROG_GEOMETRICA.TERMINO_GENERAL
objetivo: Aplicar la fórmula del término general de una progresión geométrica para
  encontrar cualquier valor en la secuencia.
introduccion: Si un rumor empieza contigo y se lo cuentas a 3 personas, y cada uno
  a otras 3... ¿cuántos sabrán el rumor en el paso 10? No puedes sumar. Aquí los saltos
  son exponentes. Bienvenido al término general geométrico.
resumen: 'La fórmula maestra para hallar cualquier término en una P.G. es: $a_n =
  a_1 \cdot r^{(n - 1)}$. Necesitas el primer término ($a_1$), la razón ($r$) y la
  posición que buscas ($n$).'
explicacion: 'Anatomía de la fórmula: **$a_n = a_1 \cdot r^{(n - 1)}$**

  - **$a_n$**: Es el número gigante o pequeñito que quieres descubrir.

  - **$a_1$**: Es tu punto de inicio.

  - **$r$**: Es el multiplicador (la razón).

  - **$(n - 1)$**: Es la cantidad de saltos que darás. Como empezamos en el salto
  cero (la posición 1), el exponente siempre es uno menos que la posición.


  Ejemplo: Tienes la progresión $2, 6, 18\dots$ y te piden el término 5.

  - $a_1 = 2$

  - $r = 3$ (porque $6/2=3$)

  - $n = 5$

  Fórmula: $a_5 = 2 \cdot 3^{(5 - 1)} \rightarrow 2 \cdot 3^4 \rightarrow 2 \cdot
  81 = 162$.'
procedimiento:
- 'Paso 1: Extrae a1 (el primer término).'
- 'Paso 2: Calcula la razón ''r'' dividiendo el 2do por el 1ro.'
- 'Paso 3: Identifica la posición ''n''.'
- 'Paso 4: Eleva ''r'' a la potencia $(n-1)$.'
- 'Paso 5: Multiplica ese resultado por $a_1$.'
ejemplos:
- titulo: Plegando el papel
  enunciado: Doblas una hoja de papel por la mitad. Luego otra vez. El grosor inicial
    es 0.1 mm y se duplica en cada doblez. ¿Cuál será el grosor en el doblez número
    7?
  solucion_pasos:
  - a1 = 0.1 mm. r = 2. n = 7.
  - 'Fórmula: a7 = 0.1 * 2^(7-1)'
  - a7 = 0.1 * 2^6
  - 2^6 = 64.
  - a7 = 0.1 * 64 = 6.4 mm.
errores_frecuentes:
- 'Multiplicar $a_1$ por ''$r$'' ANTES de elevar al exponente. Por ejemplo, en $2
  \cdot 3^4$, multiplicar $6^4$ (incorrecto) en vez de $2 \cdot 81$ (correcto). ¡Papomudas:
  potencias primero!'
- Olvidar restar 1 al exponente (usar $r^n$ en lugar de $r^{n-1}$).
fuente: Currículum Nacional MINEDUC.
estado: publicado
