semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.ASOCIATIVA_MULTIPLICACION
objetivo: Reagrupar un producto de racionales.
introduccion: 'Para estudiar propiedad asociativa de la multiplicación en Q partiremos
  de una situación concreta: \((\frac{2}{3}\cdot\frac{3}{5})\cdot\frac{5}{2}=\frac{2}{3}\cdot(\frac{3}{5}\cdot\frac{5}{2})\).
  La definición que guiará cada decisión es: la propiedad asociativa de la multiplicación
  permite agrupar factores de distintas maneras sin cambiar el producto.'
resumen: La propiedad asociativa de la multiplicación permite agrupar factores de
  distintas maneras sin cambiar el producto. Como criterio de control, al multiplicar
  racionales, cambiar la agrupación no cambia el resultado
explicacion: |-
  La propiedad asociativa de la multiplicación permite agrupar factores de distintas maneras sin cambiar el producto.

  En “\((\frac{2}{3}\cdot\frac{3}{5})\cdot\frac{5}{2}=\frac{2}{3}\cdot(\frac{3}{5}\cdot\frac{5}{2})\)” cada decisión debe justificarse desde la definición, no desde la memoria. La comprobación decisiva es que al multiplicar racionales, cambiar la agrupación no cambia el resultado.
procedimiento:
- 'Paso 1: Conserva el orden de tres factores y multiplica primero los dos iniciales.'
- 'Paso 2: Repite agrupando los dos factores finales.'
- 'Paso 3: Verifica que \((ab)c=a(bc)\) sin confundir reagrupar con reordenar.'
ejemplos:
- titulo: Aplicación razonada — Propiedad asociativa de la multiplicación en Q
  enunciado: \((\frac{2}{3}\cdot\frac{3}{5})\cdot\frac{5}{2}=\frac{2}{3}\cdot(\frac{3}{5}\cdot\frac{5}{2})\).
  solucion_pasos:
  - Conserva el orden de tres factores y multiplica primero los dos iniciales.
  - Repite agrupando los dos factores finales.
  - Verifica que \((ab)c=a(bc)\) sin confundir reagrupar con reordenar.
- titulo: Revisión de una solución — Propiedad asociativa de la multiplicación en
    Q
  enunciado: Una solución aplica “Repite agrupando los dos factores finales.”, pero
    termina sin comprobar que al multiplicar racionales, cambiar la agrupación no
    cambia el resultado. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define propiedad asociativa de la multiplicación en
    Q: la propiedad asociativa de la multiplicación permite agrupar factores de distintas
    maneras sin cambiar el producto.'
  - Conserva el orden de tres factores y multiplica primero los dos iniciales.
  - 'Completa la revisión con este control: Verifica que \((ab)c=a(bc)\) sin confundir
    reagrupar con reordenar.'
- titulo: ¿Se cumple que al multiplicar racionales, cambiar la agrupación no cambia
    el resultado? — Propiedad asociativa de la multiplicación en Q
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la propiedad asociativa de la multiplicación
    permite agrupar factores de distintas maneras sin cambiar el producto.
  - El caso “\((\frac{2}{3}\cdot\frac{3}{5})\cdot\frac{5}{2}=\frac{2}{3}\cdot(\frac{3}{5}\cdot\frac{5}{2})\)”
    satisface esa condición.
  - Verifica que \((ab)c=a(bc)\) sin confundir reagrupar con reordenar.
- titulo: ¿Es válido omitir el paso “Conserva el orden de tres factores y multiplica
    primero los dos iniciales”? — Propiedad asociativa de la multiplicación en Q
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de propiedad asociativa de la multiplicación
    en Q.
  - 'Omitirlo puede volver inválida la acción siguiente: Repite agrupando los dos
    factores finales.'
  - 'La solución debe terminar de este modo: Verifica que \((ab)c=a(bc)\) sin confundir
    reagrupar con reordenar.'
errores_frecuentes:
- 'Empezar propiedad asociativa de la multiplicación en Q sin realizar este control
  inicial: Conserva el orden de tres factores y multiplica primero los dos iniciales.'
- Memorizar “\((\frac{2}{3}\cdot\frac{3}{5})\cdot\frac{5}{2}=\frac{2}{3}\cdot(\frac{3}{5}\cdot\frac{5}{2})\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Repite agrupando los dos factores finales.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre propiedad asociativa de la multiplicación en
  Q que contradice el criterio “Al multiplicar racionales, cambiar la agrupación no
  cambia el resultado”.
- 'Cerrar el ejercicio sin esta comprobación específica: Verifica que \((ab)c=a(bc)\)
  sin confundir reagrupar con reordenar.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
