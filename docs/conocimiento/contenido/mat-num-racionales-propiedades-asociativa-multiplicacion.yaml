semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.ASOCIATIVA_MULTIPLICACION
objetivo: Comprender propiedad asociativa de la multiplicación en q y aplicarlo correctamente
  en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso propiedad asociativa de la multiplicación en q ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: La propiedad asociativa de la multiplicación permite agrupar factores de
  distintas maneras sin cambiar el producto. Además, al multiplicar racionales, cambiar
  la agrupación no cambia el resultado.
explicacion: |-
  La propiedad asociativa de la multiplicación permite agrupar factores de distintas maneras sin cambiar el producto.

  Una idea importante es que al multiplicar racionales, cambiar la agrupación no cambia el resultado.

  Por ejemplo, \((\frac{2}{3}\cdot\frac{3}{5})\cdot\frac{5}{2}=\frac{2}{3}\cdot(\frac{3}{5}\cdot\frac{5}{2})\).
procedimiento:
- 'Paso 1: Escribir ambos lados de la propiedad con números racionales simples.'
- 'Paso 2: Calcular cada lado por separado respetando el orden de las operaciones.'
- 'Paso 3: Comparar los resultados y concluir si la propiedad se cumple.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\((\frac{2}{3}\cdot\frac{3}{5})\cdot\frac{5}{2}=\frac{2}{3}\cdot(\frac{3}{5}\cdot\frac{5}{2})\).”
    se relaciona con propiedad asociativa de la multiplicación en q.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: la propiedad asociativa de la multiplicación permite
    agrupar factores de distintas maneras sin cambiar el producto.'
  - Concluye que el ejemplo sí ilustra propiedad asociativa de la multiplicación en
    q.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Al multiplicar racionales, cambiar la agrupación
    no cambia el resultado.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con propiedad asociativa de la multiplicación
    en q?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que al multiplicar racionales, cambiar la agrupación
    no cambia el resultado.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar propiedad asociativa de la multiplicación en q ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar propiedad asociativa de la multiplicación en q sin mirar qué representan
  numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
