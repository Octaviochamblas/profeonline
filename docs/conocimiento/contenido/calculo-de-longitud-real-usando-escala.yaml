semantic_id: MAT.NUM.REPARTO_ESCALAS.LONGITUD_REAL
titulo: Cálculo de longitud real usando escala
objetivo: Calcular la longitud real de un objeto a partir de su medida en el plano y la escala.
introduccion: ¿Alguna vez has puesto una regla sobre un mapa para calcular a cuántos kilómetros está una
  ciudad de otra? Ese acto tan simple encierra la matemática de revertir una escala.
resumen: Para hallar la medida real, multiplica la medida del plano por el factor de escala ($E$). El
  resultado estará en la misma unidad que usaste para medir el plano.
explicacion: 'Partiendo de $\frac{\text{Plano}}{\text{Realidad}} = \frac{1}{E}$, si despejamos la medida
  **Real** obtenemos:


  $$\text{Realidad} = \text{Plano} \cdot E$$


  Este cálculo te devolverá un número muy grande, porque estará **en centímetros** (asumiendo que mediste
  el mapa con una regla en cm). Para darle sentido en la vida real, deberás convertirlo:

  - A metros: dividiendo por $100$.

  - A kilómetros: dividiendo por $100.000$.'
procedimiento:
- 'Paso 1: Mide con una regla la distancia en el plano (en cm).'
- 'Paso 2: Multiplica esa medida por el factor $E$ de la escala $1:E$.'
- 'Paso 3: El resultado está en centímetros reales. Conviértelo a metros (divide por 100) o a km (divide
  por 100.000).'
ejemplos:
- titulo: Distancia entre ciudades
  enunciado: En un mapa 1:500.000, dos ciudades están a 4 cm de distancia. ¿Cuál es su distancia real?
  solucion_pasos:
  - 'Multiplicamos: $4 \cdot 500.000 = 2.000.000$ cm reales.'
  - 'Convertimos a km: $2.000.000 / 100.000 = 20$ kilómetros.'
  - La distancia real es 20 km.
errores_frecuentes:
- Creer que el resultado de la multiplicación ya está en kilómetros.
- Dividir por la escala en lugar de multiplicar (hallando medidas microscópicas irreales).
- Equivocarse en los ceros al convertir de centímetros a kilómetros.
fuente: Currículum Nacional MINEDUC.
estado: publicado
