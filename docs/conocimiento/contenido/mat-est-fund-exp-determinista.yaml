semantic_id: MAT.EST.PROBA_FUNDAMENTOS.EXP_DETERMINISTA
titulo: Diferencia entre experimento aleatorio y experimento determinista
objetivo: Distinguir entre un experimento aleatorio (resultado incierto) y un experimento determinista
  (resultado siempre predecible con certeza bajo las mismas condiciones).
introduccion: 'No todos los procesos son inciertos: algunos, como los cálculos matemáticos o las mediciones
  físicas bajo condiciones controladas, siempre dan el mismo resultado, y se llaman experimentos deterministas.'
resumen: Un experimento es determinista si, repetido bajo las mismas condiciones, siempre produce el mismo
  resultado, a diferencia de un experimento aleatorio, cuyo resultado varía o es incierto.
explicacion: '![Experimento aleatorio vs determinista](/static/img/probabilidad/fundamentos/fund-exp-determinista.svg)


  ### Definición formal


  Un experimento determinista tiene un único resultado posible bajo condiciones fijas, mientras que un
  experimento aleatorio puede tener distintos resultados posibles, sin poder anticiparse cuál ocurrirá.


  ### Desarrollo didáctico


  Calcular 2+2 siempre da 4 (determinista); lanzar un dado puede dar cualquier valor entre 1 y 6 (aleatorio).
  La diferencia clave es la certeza (o no) del resultado antes de realizar la acción.'
procedimiento:
- 'Paso 1: Identifica el proceso o acción en cuestión.'
- 'Paso 2: Pregúntate si, repitiendo el proceso bajo las mismas condiciones, el resultado sería siempre
  el mismo.'
- 'Paso 3: Si el resultado es siempre el mismo, es determinista; si puede variar sin poder predecirse,
  es aleatorio.'
ejemplos:
- titulo: Clasificar calcular una raíz cuadrada
  enunciado: Calcular √16.
  solucion_pasos:
  - Siempre da 4, por lo que es un proceso determinista.
- titulo: Clasificar lanzar una moneda
  enunciado: Lanzar una moneda al aire.
  solucion_pasos:
  - El resultado (cara o sello) no se puede predecir con certeza, por lo que es un experimento aleatorio.
- titulo: ¿Un experimento determinista siempre da el mismo resultado bajo las mismas condiciones?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es su característica definitoria.
- titulo: ¿La probabilidad estudia principalmente experimentos deterministas?
  respuesta: 'No'
  solucion_pasos:
  - No, la probabilidad se centra en el estudio de experimentos aleatorios.
errores_frecuentes:
- Confundir un cálculo matemático (determinista) con un experimento aleatorio.
- Creer que un experimento determinista no tiene ningún resultado definido.
- Asumir que todos los procesos físicos son deterministas, ignorando fuentes reales de incertidumbre.
fuente: 'Elaboración propia (referencia: Moraleja 403).'
estado: publicado
