semantic_id: MAT.GEO.RECTA_ECUACIONES.ECUACION_PARAMETRICA
titulo: Reconocimiento de la ecuación paramétrica de la recta en el plano
objetivo: Reconocer la ecuación paramétrica de una recta, que expresa las coordenadas x e y por separado
  en función de un parámetro t.
introduccion: La ecuación paramétrica separa la ecuación vectorial en dos ecuaciones escalares, una para
  x y otra para y, ambas dependientes del mismo parámetro t.
resumen: Dado un punto $(x_0,y_0)$ y un vector director $(d_1,d_2)$, la ecuación paramétrica de la recta
  es el sistema $x=x_0+td_1$, $y=y_0+td_2$, con $t\in\mathbb{R}$.
explicacion: '![Ecuación paramétrica de la recta](/static/img/geometria/analitica/rectaeq-ecuacion-parametrica.svg)


  ### Definición formal


  A partir de la ecuación vectorial $(x,y)=(x_0,y_0)+t(d_1,d_2)$, se separan las coordenadas: $x=x_0+td_1$
  y $y=y_0+td_2$, formando el sistema paramétrico.


  ### Desarrollo didáctico


  Para la recta con punto $(0,1)$ y vector director $(4,3)$: $x=4t$, $y=1+3t$. Al sustituir $t=1$, se
  obtiene $x=4$, $y=4$, coincidiendo con el punto $(4,4)$.'
procedimiento:
- 'Paso 1: Identifica el punto (x0,y0) y el vector director (d1,d2) de la recta.'
- 'Paso 2: Escribe las dos ecuaciones separadas: x=x0+t·d1 y y=y0+t·d2.'
- 'Paso 3: Usa un valor específico de t para obtener un punto particular de la recta.'
ejemplos:
- titulo: Escribir la ecuación paramétrica con punto (0,1) y vector (4,3)
  enunciado: P0=(0,1), d=(4,3).
  solucion_pasos:
  - x=4t, y=1+3t.
- titulo: Obtener un punto de la recta con t=2
  enunciado: x=4t, y=1+3t, t=2.
  solucion_pasos:
  - x=8, y=7, es decir, el punto (8,7).
- titulo: ¿La ecuación paramétrica separa la ecuación vectorial en dos ecuaciones escalares?
  respuesta: Sí
  solucion_pasos:
  - Sí, una para la coordenada x y otra para la coordenada y.
- titulo: ¿Ambas ecuaciones (para x e y) comparten el mismo parámetro t?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el mismo valor de t el que determina simultáneamente ambas coordenadas.
errores_frecuentes:
- Usar parámetros distintos para las ecuaciones de x e y, en vez del mismo t para ambas.
- Confundir cuál componente del vector director corresponde a x y cuál a y.
- Olvidar sumar el punto de referencia (x0,y0), dejando la ecuación solo en función del vector director.
fuente: Elaboración propia.
estado: publicado
