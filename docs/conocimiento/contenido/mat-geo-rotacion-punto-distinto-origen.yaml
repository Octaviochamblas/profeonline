semantic_id: MAT.GEO.ROTACION_PLANO.ROTACION_PUNTO_DISTINTO_ORIGEN
titulo: Procedimiento de rotación en torno a un punto distinto del origen
objetivo: Aplicar el procedimiento para rotar un punto alrededor de un centro de rotación que no coincide
  con el origen del sistema cartesiano.
introduccion: 'Rotar alrededor de un punto que no es el origen requiere un truco: primero ''trasladar''
  mentalmente ese punto al origen, rotar allí, y luego devolver todo a su lugar original.'
resumen: Para rotar un punto $P$ un ángulo $\theta$ alrededor de un centro $O$ distinto del origen, se
  traslada $P$ restando las coordenadas de $O$, se aplica la regla de rotación correspondiente al resultado,
  y luego se traslada de vuelta sumando las coordenadas de $O$.
explicacion: '![Rotación en torno a un punto distinto del origen](/static/img/geometria/isometrias/rotacion-punto-distinto-origen.svg)


  ### Definición formal


  Para rotar $P(x,y)$ un ángulo $\theta$ alrededor de $O(a,b)$: (1) se calcula el punto relativo $(x-a,\,y-b)$;
  (2) se aplica la regla de rotación de $\theta$ a ese punto relativo, obteniendo $(x_r,y_r)$; (3) se
  traslada de vuelta sumando $O$: $P''=(x_r+a,\,y_r+b)$.


  ### Desarrollo didáctico


  En la figura, para rotar $P(4,1)$ 90° antihorario alrededor de $O(2,1)$: el punto relativo es $(4-2,\,1-1)=(2,0)$;
  al rotar 90° se obtiene $(0,2)$; al trasladar de vuelta sumando $O$, resulta $P''=(0+2,\,2+1)=(2,3)$.'
procedimiento:
- 'Paso 1: Resta las coordenadas del centro O al punto P, obteniendo el punto relativo (x-a, y-b).'
- 'Paso 2: Aplica la regla de rotación correspondiente al ángulo θ sobre ese punto relativo.'
- 'Paso 3: Suma las coordenadas de O al resultado para obtener la posición final P'' en el sistema original.'
ejemplos:
- titulo: Rotar un punto 90° alrededor de un centro distinto del origen
  enunciado: P(4,1) rota 90° antihorario alrededor de O(2,1).
  solucion_pasos:
  - 'Relativo: (4-2,1-1)=(2,0); rotado 90°: (-0,2)=(0,2); final: (0+2,2+1)=(2,3).'
- titulo: Rotar un punto 180° alrededor de un centro distinto del origen
  enunciado: P(5,3) rota 180° alrededor de O(1,1).
  solucion_pasos:
  - 'Relativo: (5-1,3-1)=(4,2); rotado 180°: (-4,-2); final: (-4+1,-2+1)=(-3,-1).'
- titulo: ¿Es necesario trasladar el punto antes de aplicar la regla de rotación?
  respuesta: Sí
  solucion_pasos:
  - Sí, las reglas de rotación (90°, 180°, 270°) solo aplican directamente cuando el centro es el origen;
    si no lo es, se debe trasladar primero.
- titulo: ¿Se debe sumar de vuelta las coordenadas del centro al final del procedimiento?
  respuesta: Sí
  solucion_pasos:
  - Sí, ese paso final devuelve el punto a su posición correcta en el sistema de coordenadas original.
errores_frecuentes:
- Aplicar directamente la regla de rotación sin trasladar primero al origen, cuando el centro no es el
  origen.
- Olvidar el paso final de trasladar de vuelta sumando las coordenadas del centro O.
- Restar u sumar las coordenadas de O en el orden o momento incorrecto del procedimiento.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 128, Cid 76).'
estado: publicado
