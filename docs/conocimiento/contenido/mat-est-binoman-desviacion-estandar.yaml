semantic_id: MAT.EST.BINOMIAL_ANALISIS.DESVIACION_ESTANDAR
titulo: Calcular la desviación estándar de una distribución binomial
objetivo: Calcular la desviación estándar de una variable binomial como la raíz cuadrada de su varianza.
introduccion: La desviación estándar expresa la dispersión en las mismas unidades que la variable original,
  siendo más interpretable que la varianza en algunos contextos.
resumen: La desviación estándar de una variable $X\sim B(n,p)$ es $\sigma=\sqrt{\text{Var}(X)}=\sqrt{n\,p\,q}$.
explicacion: '![Desviación estándar de una distribución binomial](/static/img/probabilidad/binoman/binoman-desviacion-estandar.svg)


  ### Definición formal


  $\sigma=\sqrt{n\,p\,q}$, la raíz cuadrada de la varianza $n\,p\,q$.


  ### Desarrollo didáctico


  Si $X\sim B(20;\,0{,}5)$, la varianza es $\text{Var}(X)=5$, por lo tanto $\sigma=\sqrt{5}\approx2{,}24$.'
procedimiento:
- 'Paso 1: Calcula primero la varianza Var(X)=n×p×q.'
- 'Paso 2: Calcula la raíz cuadrada de ese valor para obtener σ.'
- 'Paso 3: Interpreta σ como la dispersión típica de X respecto de su esperanza, en las mismas unidades
  que X.'
ejemplos:
- titulo: Calcular σ con n=20, p=0,5
  enunciado: Var(X)=5.
  solucion_pasos:
  - σ=√5≈2,24.
- titulo: Calcular σ con n=100, p=0,1
  enunciado: Var(X)=100×0,1×0,9=9.
  solucion_pasos:
  - σ=√9=3.
- titulo: ¿σ siempre es la raíz cuadrada de la varianza?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición de desviación estándar en cualquier distribución de probabilidad.
- titulo: ¿σ puede ser un número negativo?
  respuesta: 'No'
  solucion_pasos:
  - No, la raíz cuadrada de un valor no negativo (la varianza) siempre da un resultado no negativo.
errores_frecuentes:
- Olvidar calcular primero la varianza antes de sacar la raíz cuadrada.
- Confundir varianza con desviación estándar, presentando el valor de Var(X) como si fuera σ.
- Cometer errores al calcular la raíz cuadrada, especialmente con valores no exactos.
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
