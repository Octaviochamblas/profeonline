semantic_id: MAT.ALG.FUNC_POTENCIA_BASE.DEFINICION
titulo: Definición de función potencia
objetivo: Comprender la función potencia como una función donde la variable independiente está en la base y el
  exponente es un número fijo.
introduccion: A diferencia de la función exponencial, donde la variable está en el exponente, en la función
  potencia la variable ocupa la base y el exponente permanece constante.
resumen: Una **función potencia** es una función de la forma $f(x)=a\cdot x^n$, donde $a$ y $n$ son constantes
  reales y la variable $x$ aparece en la base, no en el exponente.
explicacion: '### Definición formal


  Una función $f:\mathbb{R}\to\mathbb{R}$ (o un subconjunto de $\mathbb{R}$, según el exponente) es una función
  potencia si puede expresarse como $f(x)=a\cdot x^n$, con $a\neq0$ y $n$ un número real fijo. La variable
  independiente $x$ ocupa la base de la potencia, mientras que $n$ permanece constante para toda la función.


  ### Desarrollo didáctico


  $f(x)=3x^2$ es una función potencia con $a=3$ y $n=2$: para cada valor de $x$ se calcula su cuadrado y se
  multiplica por $3$. En cambio, $g(x)=3^x$ no es una función potencia, porque ahí la variable está en el
  exponente, no en la base.'
procedimiento:
- 'Paso 1: Verifica que la variable $x$ aparezca en la base de la expresión, no en el exponente.'
- 'Paso 2: Identifica el coeficiente $a$ y el exponente fijo $n$.'
- 'Paso 3: Confirma que $a\neq0$ para que la expresión represente una función potencia válida.'
ejemplos:
- titulo: Reconocimiento de una función potencia
  enunciado: '¿Es $f(x)=5x^3$ una función potencia?'
  solucion_pasos:
  - La variable $x$ está en la base, elevada al exponente fijo $3$.
  - Sí, es una función potencia con $a=5$ y $n=3$.
- titulo: Distinción respecto a la función exponencial
  enunciado: '¿Es $g(x)=2^x$ una función potencia?'
  solucion_pasos:
  - La variable $x$ está en el exponente, no en la base.
  - No, corresponde a una función exponencial, no a una función potencia.
- titulo: ¿Toda función con exponente es una función potencia?
  enunciado: ¿Cualquier función que incluya una potencia es automáticamente una función potencia?
  respuesta: 'No'
  solucion_pasos:
  - Solo lo es si la variable independiente está en la base y el exponente es una constante fija.
- titulo: ¿El coeficiente $a$ puede ser igual a cero en una función potencia?
  enunciado: ¿Puede el coeficiente $a$ de $f(x)=a\cdot x^n$ ser igual a $0$?
  respuesta: 'No'
  solucion_pasos:
  - Si $a=0$, la función se reduce a la función constante $f(x)=0$, y deja de ser una función potencia.
errores_frecuentes:
- Confundir la función potencia con la función exponencial por tener ambas un exponente visible.
- Aceptar $a=0$ como coeficiente válido de una función potencia.
- Suponer que $n$ debe ser un número entero positivo, cuando puede ser cualquier real distinto de los casos excluidos.
- No identificar correctamente cuál elemento es la base y cuál el exponente.
