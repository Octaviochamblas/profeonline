semantic_id: MAT.NUM.RACIONALES_CONCEPTO.ENTEROS_COMO_RACIONALES
titulo: Los enteros como subconjunto de los racionales
objetivo: Representar cualquier número entero como un número racional de denominador \(1\).
introduccion: 'Los enteros y los racionales no son conjuntos separados: todo entero puede mirarse también
  como un caso particular de número racional, lo que explica por qué \(\mathbb{Z}\subset\mathbb{Q}\).'
resumen: Todo número entero \(n\) puede escribirse como el racional \(\frac{n}{1}\), ya que \(n/1=n\).
explicacion: '### Definición formal


  Para cualquier \(n\in\mathbb{Z}\), la fracción \(\frac{n}{1}\) cumple la definición de número racional
  (\(n\) y \(1\) son enteros, y \(1\neq0\)), y además \(\frac{n}{1}=n\). Esto demuestra que \(\mathbb{Z}\subset\mathbb{Q}\):
  todo entero es racional, aunque no todo racional sea entero.


  ### Desarrollo didáctico


  El entero \(-3\) se representa como \(-\frac{3}{1}\); dividiendo, \(-3/1=-3\), así que el valor no cambia.
  Esta representación permite tratar a los enteros con las mismas reglas de operatoria que a las demás
  fracciones.'
procedimiento:
- 'Paso 1: Toma el entero que quieres expresar como fracción.'
- 'Paso 2: Colócalo como numerador y usa \(1\) como denominador.'
- 'Paso 3: Divide para comprobar que \(n/1=n\) y que el valor no cambió.'
ejemplos:
- titulo: Aplicación razonada — Representación de números enteros como racionales
  enunciado: El entero \(-3\) puede escribirse como \(-\frac{3}{1}\).
  solucion_pasos:
  - Toma el entero que quieres expresar como fracción.
  - Colócalo como numerador y usa \(1\) como denominador.
  - Divide para comprobar que \(n/1=n\) y que el valor no cambió.
- titulo: Revisión de una solución — Representación de números enteros como racionales
  enunciado: Una solución aplica “Colócalo como numerador y usa \(1\) como denominador.”, pero termina
    sin comprobar que el conjunto de los enteros está contenido en el conjunto de los racionales. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define representación de números enteros como racionales: todo número entero
    puede escribirse como un racional con denominador 1.'
  - Toma el entero que quieres expresar como fracción.
  - 'Completa la revisión con este control: Divide para comprobar que \(n/1=n\) y que el valor no cambió.'
- titulo: ¿Se cumple que el conjunto de los enteros está contenido en el conjunto de los racionales? —
    Representación de números enteros como racionales
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que todo número entero puede escribirse como un racional con
    denominador 1.
  - El caso “El entero \(-3\) puede escribirse como \(-\frac{3}{1}\)” satisface esa condición.
  - Divide para comprobar que \(n/1=n\) y que el valor no cambió.
- titulo: ¿Es válido omitir el paso “Toma el entero que quieres expresar como fracción”? — Representación
    de números enteros como racionales
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de representación de números enteros como racionales.
  - 'Omitirlo puede volver inválida la acción siguiente: Colócalo como numerador y usa \(1\) como denominador.'
  - 'La solución debe terminar de este modo: Divide para comprobar que \(n/1=n\) y que el valor no cambió.'
errores_frecuentes:
- 'Empezar representación de números enteros como racionales sin realizar este control inicial: Toma el
  entero que quieres expresar como fracción.'
- Memorizar “El entero \(-3\) puede escribirse como \(-\frac{3}{1}\)” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Colócalo como numerador y usa \(1\) como denominador.” y usarlo aunque
  cambien las condiciones del problema.
- Dar por válida una conclusión sobre representación de números enteros como racionales que contradice
  el criterio “El conjunto de los enteros está contenido en el conjunto de los racionales”.
- 'Cerrar el ejercicio sin esta comprobación específica: Divide para comprobar que \(n/1=n\) y que el
  valor no cambió.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
