semantic_id: MAT.NUM.RACIONALES_CONCEPTO.ENTEROS_COMO_RACIONALES
objetivo: Representar cualquier entero como número racional.
introduccion: 'El entero \(-3\) puede escribirse como \(-\frac{3}{1}\). Este resultado
  se explica mediante representación de números enteros como racionales; el criterio
  que permite controlarlo es: El conjunto de los enteros está contenido en el conjunto
  de los racionales.'
resumen: Todo número entero puede escribirse como un racional con denominador 1. Como
  criterio de control, el conjunto de los enteros está contenido en el conjunto de
  los racionales
explicacion: |-
  Todo número entero puede escribirse como un racional con denominador 1.

  La relación entre la definición y el caso “El entero \(-3\) puede escribirse como \(-\frac{3}{1}\)” conduce a una conclusión útil: El conjunto de los enteros está contenido en el conjunto de los racionales.
procedimiento:
- 'Paso 1: Toma el entero que quieres expresar como fracción.'
- 'Paso 2: Colócalo como numerador y usa \(1\) como denominador.'
- 'Paso 3: Divide para comprobar que \(n/1=n\) y que el valor no cambió.'
ejemplos:
- titulo: Aplicación razonada — Representación de números enteros como racionales
  enunciado: El entero \(-3\) puede escribirse como \(-\frac{3}{1}\).
  solucion_pasos:
  - Toma el entero que quieres expresar como fracción.
  - Colócalo como numerador y usa \(1\) como denominador.
  - Divide para comprobar que \(n/1=n\) y que el valor no cambió.
- titulo: Revisión de una solución — Representación de números enteros como racionales
  enunciado: Una solución aplica “Colócalo como numerador y usa \(1\) como denominador.”,
    pero termina sin comprobar que el conjunto de los enteros está contenido en el
    conjunto de los racionales. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define representación de números enteros como racionales:
    todo número entero puede escribirse como un racional con denominador 1.'
  - Toma el entero que quieres expresar como fracción.
  - 'Completa la revisión con este control: Divide para comprobar que \(n/1=n\) y
    que el valor no cambió.'
- titulo: ¿Se cumple que el conjunto de los enteros está contenido en el conjunto
    de los racionales? — Representación de números enteros como racionales
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que todo número entero puede escribirse
    como un racional con denominador 1.
  - El caso “El entero \(-3\) puede escribirse como \(-\frac{3}{1}\)” satisface esa
    condición.
  - Divide para comprobar que \(n/1=n\) y que el valor no cambió.
- titulo: ¿Es válido omitir el paso “Toma el entero que quieres expresar como fracción”?
    — Representación de números enteros como racionales
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de representación de números enteros
    como racionales.
  - 'Omitirlo puede volver inválida la acción siguiente: Colócalo como numerador y
    usa \(1\) como denominador.'
  - 'La solución debe terminar de este modo: Divide para comprobar que \(n/1=n\) y
    que el valor no cambió.'
errores_frecuentes:
- 'Empezar representación de números enteros como racionales sin realizar este control
  inicial: Toma el entero que quieres expresar como fracción.'
- Memorizar “El entero \(-3\) puede escribirse como \(-\frac{3}{1}\)” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Colócalo como numerador y usa \(1\) como denominador.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre representación de números enteros como racionales
  que contradice el criterio “El conjunto de los enteros está contenido en el conjunto
  de los racionales”.
- 'Cerrar el ejercicio sin esta comprobación específica: Divide para comprobar que
  \(n/1=n\) y que el valor no cambió.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
