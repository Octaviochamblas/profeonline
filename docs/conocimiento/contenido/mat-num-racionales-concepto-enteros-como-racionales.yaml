semantic_id: MAT.NUM.RACIONALES_CONCEPTO.ENTEROS_COMO_RACIONALES
objetivo: Comprender representación de números enteros como racionales y aplicarlo
  correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso representación de números enteros como racionales ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Todo número entero puede escribirse como un racional con denominador 1. Además,
  el conjunto de los enteros está contenido en el conjunto de los racionales.
explicacion: |-
  Todo número entero puede escribirse como un racional con denominador 1.

  Una idea importante es que el conjunto de los enteros está contenido en el conjunto de los racionales.

  Por ejemplo, El entero \(-3\) puede escribirse como \(-\frac{3}{1}\).
procedimiento:
- 'Paso 1: Identificar qué representa el número o la fracción en la situación.'
- 'Paso 2: Revisar la definición formal del concepto y sus condiciones.'
- 'Paso 3: Concluir si el ejemplo sí corresponde a representación de números enteros
  como racionales y justificarlo.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “El entero \(-3\) puede escribirse como
    \(-\frac{3}{1}\).” se relaciona con representación de números enteros como racionales.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: todo número entero puede escribirse como un racional
    con denominador 1.'
  - Concluye que el ejemplo sí ilustra representación de números enteros como racionales.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “El conjunto de los enteros está contenido
    en el conjunto de los racionales.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con representación de números enteros como
    racionales?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que el conjunto de los enteros está contenido
    en el conjunto de los racionales.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar representación de números enteros como racionales ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar representación de números enteros como racionales sin mirar qué
  representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
