semantic_id: MAT.ALG.FUNC_SENO_ANALISIS.MAXIMOS_MINIMOS
titulo: Máximos y mínimos de la función seno
objetivo: Determinar los valores de $x$ donde $f(x)=\sin(x)$ alcanza sus máximos y mínimos absolutos.
introduccion: La curva del seno alcanza su punto más alto y más bajo en posiciones específicas y regularmente
  espaciadas dentro de cada período.
resumen: La función $f(x)=\sin(x)$ alcanza su **máximo** ($y=1$) en $x=\pi/2+2n\pi$, y su **mínimo** ($y=-1$)
  en $x=3\pi/2+2n\pi$, para cualquier entero $n$.
explicacion: '### Definición formal


  El máximo de $\sin(x)$ ocurre cuando el punto asociado es $(0,1)$, es decir, cuando $x=\pi/2+2n\pi$. El
  mínimo ocurre cuando el punto asociado es $(0,-1)$, es decir, cuando $x=3\pi/2+2n\pi$ (equivalente a
  $-\pi/2+2n\pi$).


  ### Desarrollo didáctico


  Dentro de un período, el máximo se alcanza en $x=\pi/2$ y el mínimo en $x=3\pi/2$. Sumando múltiplos de $2\pi$
  se obtienen todos los demás máximos y mínimos: $x=\pi/2+2\pi=5\pi/2$ también es un máximo.'
procedimiento:
- 'Paso 1: Identifica el primer máximo dentro de un período, en $x=\pi/2$.'
- 'Paso 2: Suma múltiplos de $2\pi$ para encontrar todos los demás máximos.'
- 'Paso 3: Repite el proceso con $x=3\pi/2$ para encontrar todos los mínimos.'
ejemplos:
- titulo: Verificación de un máximo
  enunciado: '¿Es $x=5\pi/2$ un máximo de $f(x)=\sin(x)$?'
  solucion_pasos:
  - 'Se verifica: $5\pi/2=\pi/2+2\pi$.'
  - Sí, es un máximo, ya que corresponde a un período completo después de $\pi/2$.
- titulo: Verificación de un mínimo
  enunciado: '¿Es $x=-\pi/2$ un mínimo de $f(x)=\sin(x)$?'
  solucion_pasos:
  - 'Se calcula $\sin(-\pi/2)=-1$.'
  - Sí, es un mínimo de la función.
- titulo: ¿La distancia entre un máximo y el siguiente máximo es igual al periodo?
  enunciado: ¿La distancia entre dos máximos consecutivos de $f(x)=\sin(x)$ es igual al periodo $2\pi$?
  respuesta: Sí
  solucion_pasos:
  - Al repetirse el patrón cada $2\pi$, los máximos también se repiten con esa misma separación.
- titulo: ¿El máximo y el mínimo están separados por medio periodo?
  enunciado: ¿La distancia entre un máximo y el mínimo más cercano es la mitad del periodo?
  respuesta: Sí
  solucion_pasos:
  - Entre $\pi/2$ y $3\pi/2$ hay exactamente $\pi$, la mitad del periodo $2\pi$.
errores_frecuentes:
- Confundir la posición del máximo con la del mínimo.
- Olvidar sumar múltiplos de $2\pi$ para encontrar todos los máximos y mínimos posibles.
- Confundir estos valores con los ceros de la función.
- Aplicar la fórmula del seno a la función coseno, donde las posiciones son distintas.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
