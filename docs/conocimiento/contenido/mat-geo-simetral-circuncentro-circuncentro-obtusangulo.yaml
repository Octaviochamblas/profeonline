semantic_id: MAT.GEO.SIMETRAL_CIRCUNCENTRO.CIRCUNCENTRO_OBTUSANGULO
titulo: Ubicación exterior del circuncentro en un triángulo obtusángulo
objetivo: Reconocer que el circuncentro de un triángulo obtusángulo se ubica fuera de la figura.
introduccion: Cuando uno de los ángulos del triángulo supera los 90°, las simetrales se cruzan fuera de
  la figura, y por lo tanto también el circuncentro.
resumen: En todo triángulo obtusángulo, el circuncentro se ubica en el exterior del triángulo.
explicacion: '![Circuncentro exterior en triángulo obtusángulo](/static/img/geometria/elementos-secundarios/simetral-circuncentro-circuncentro-obtusangulo.svg)


  ### Definición formal


  Si un triángulo tiene un ángulo interior mayor que 90°, el circuncentro O se ubica fuera de la región
  triangular, del lado del lado opuesto al ángulo obtuso.


  ### Desarrollo didáctico


  A medida que un ángulo del triángulo se acerca y luego supera los 90°, el circuncentro se acerca al
  lado opuesto a ese ángulo, lo cruza (cuando el ángulo es exactamente 90°) y termina fuera del triángulo
  (cuando el ángulo es obtuso).'
procedimiento:
- 'Paso 1: Identifica si el triángulo tiene un ángulo mayor que 90°.'
- 'Paso 2: Si lo tiene, reconoce que las simetrales se cruzan fuera de la figura.'
- 'Paso 3: Concluye que el circuncentro se ubica fuera del triángulo.'
ejemplos:
- titulo: Ubicar el circuncentro en un obtusángulo
  enunciado: Un triángulo tiene ángulos 110°, 40° y 30°.
  solucion_pasos:
  - Es obtusángulo, así que su circuncentro está fuera de la figura.
- titulo: Comparar con el rectángulo
  enunciado: ¿Cómo cambia la posición del circuncentro al pasar de un triángulo rectángulo a uno obtusángulo?
  solucion_pasos:
  - En el rectángulo está en el punto medio de la hipotenusa; en el obtusángulo, ya fuera del triángulo.
- titulo: ¿El circuncentro de un triángulo obtusángulo está dentro de la figura?
  respuesta: 'No'
  solucion_pasos:
  - No, se ubica fuera del triángulo.
- titulo: ¿Basta con un ángulo obtuso para que el circuncentro quede afuera?
  respuesta: Sí
  solucion_pasos:
  - Sí, con que exista un solo ángulo mayor que 90° ya se cumple esta propiedad.
errores_frecuentes:
- Creer que el circuncentro está siempre dentro del triángulo, sin importar su forma.
- No verificar si el triángulo tiene realmente un ángulo obtuso antes de ubicar el circuncentro.
- Confundir la ubicación exterior del circuncentro con la del ortocentro.
fuente: Elaboración propia.
estado: publicado
