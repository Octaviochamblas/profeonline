semantic_id: MAT.GEO.CIRCUNFERENCIA_ANALITICA.COMPLETAR_CUADRADO_Y
titulo: Completación de cuadrados en la variable y para transformar la ecuación general
objetivo: Completar el cuadrado de los términos en y de la ecuación general de una circunferencia, de
  forma análoga al procedimiento usado para x.
introduccion: El mismo procedimiento aplicado a los términos en x se repite de forma idéntica para los
  términos en y, ya que ambas variables juegan un papel simétrico en la ecuación de la circunferencia.
resumen: Para completar el cuadrado en $y^2+Ey$, se suma y resta $\left(\dfrac{E}{2}\right)^2$, obteniendo
  $\left(y+\dfrac{E}{2}\right)^2-\left(\dfrac{E}{2}\right)^2$.
explicacion: '![Completación de cuadrado en y](/static/img/geometria/analitica/circanal-completar-cuadrado-y.svg)


  ### Definición formal


  Dado $y^2+Ey$, se agrega el término $\left(\dfrac{E}{2}\right)^2$ para completar el cuadrado perfecto:
  $y^2+Ey+\left(\dfrac{E}{2}\right)^2=\left(y+\dfrac{E}{2}\right)^2$.


  ### Desarrollo didáctico


  Para $y^2+4y$: la mitad de 4 es 2, y su cuadrado es 4. Entonces $y^2+4y+4=(y+2)^2$, restando ese mismo
  4 en algún otro lugar de la ecuación.'
procedimiento:
- 'Paso 1: Identifica el coeficiente E que acompaña a y en el término y²+Ey.'
- 'Paso 2: Calcula (E/2)² y súmalo para completar el cuadrado.'
- 'Paso 3: Resta esa misma cantidad (E/2)² en otro lugar de la ecuación, para mantener la igualdad.'
ejemplos:
- titulo: Completar el cuadrado en y²+4y
  enunciado: y²+4y.
  solucion_pasos:
  - (4/2)²=4; y²+4y+4=(y+2)², restando 4 en algún otro lugar de la ecuación completa.
- titulo: Completar el cuadrado en y²-10y
  enunciado: y²-10y.
  solucion_pasos:
  - (-10/2)²=25; y²-10y+25=(y-5)², restando 25 en algún otro lugar de la ecuación completa.
- titulo: ¿Este procedimiento es análogo al usado para x?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas variables se tratan exactamente de la misma manera, de forma independiente.
- titulo: ¿Se puede completar el cuadrado en x e y de manera simultánea en la misma ecuación?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente el procedimiento necesario para convertir la forma general a la canónica.
errores_frecuentes:
- Aplicar el procedimiento de x a la variable y sin ajustar correctamente su propio coeficiente E.
- Olvidar restar la cantidad sumada al completar el cuadrado en y.
- Confundir el coeficiente E con el de D al completar los cuadrados de ambas variables.
fuente: Elaboración propia.
estado: publicado
