semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.DISTANCIA_PUNTO_RECTA_CALCULO
titulo: Cálculo de la distancia de un punto a una recta
objetivo: Aplicar la fórmula de distancia de un punto a una recta para calcular casos concretos, incluyendo
  la conversión previa de la recta a forma general si es necesario.
introduccion: En la práctica, la recta puede estar dada en forma principal o segmentaria, por lo que a
  menudo se necesita convertirla primero a forma general antes de aplicar la fórmula de distancia.
resumen: Para calcular la distancia de un punto a una recta dada en cualquier forma, primero se convierte
  la recta a la forma general $Ax+By+C=0$, y luego se aplica $d=\dfrac{|Ax_0+By_0+C|}{\sqrt{A^2+B^2}}$.
explicacion: '![Cálculo de la distancia de un punto a una recta](/static/img/geometria/analitica/posrc-distancia-punto-recta-calculo.svg)


  ### Definición formal


  Si la recta está dada como $y=mx+b$, se convierte primero a forma general: $mx-y+b=0$, con $A=m$, $B=-1$,
  $C=b$, y luego se aplica la fórmula de distancia.


  ### Desarrollo didáctico


  Para la recta $y=-0{,}75x+2$ (forma general: $0{,}75x+y-2=0$) y el punto $P(3,3)$: $d=\dfrac{|0{,}75\times3+3-2|}{\sqrt{0{,}75^2+1^2}}=\dfrac{|2{,}25+1|}{\sqrt{1{,}5625}}=\dfrac{3{,}25}{1{,}25}=2{,}6$.'
procedimiento:
- 'Paso 1: Si la recta no está en forma general, conviértela primero (Ax+By+C=0).'
- 'Paso 2: Identifica A, B y C, y sustituye las coordenadas del punto en la fórmula.'
- 'Paso 3: Calcula el valor absoluto del numerador y divídelo por √(A²+B²) para obtener la distancia.'
ejemplos:
- titulo: Calcular la distancia de P(3,3) a y=-0,75x+2
  enunciado: 'Forma general: 0,75x+y-2=0.'
  solucion_pasos:
  - d=|0,75×3+3-2|/√(0,5625+1)=3,25/1,25=2,6.
- titulo: Calcular la distancia de P(1,1) a la recta 2x-y+3=0
  enunciado: A=2, B=-1, C=3, P(1,1).
  solucion_pasos:
  - d=|2×1-1+3|/√(4+1)=4/√5≈1,79.
- titulo: ¿Es necesario convertir la recta a forma general antes de calcular la distancia?
  respuesta: Sí
  solucion_pasos:
  - Sí, la fórmula de distancia requiere específicamente los coeficientes A, B y C de esa forma.
- titulo: ¿El resultado de esta fórmula puede ser 0?
  respuesta: Sí
  solucion_pasos:
  - Sí, si el punto pertenece exactamente a la recta.
errores_frecuentes:
- Aplicar la fórmula directamente sin convertir primero la recta a forma general.
- Cometer errores de signo al convertir de forma principal a general.
- Olvidar el valor absoluto antes de dividir en el cálculo final.
fuente: Elaboración propia.
estado: publicado
