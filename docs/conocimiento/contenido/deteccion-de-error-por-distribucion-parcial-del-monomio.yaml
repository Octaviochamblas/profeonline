semantic_id: MAT.ALG.MULT_MON_POL.DISTRIBUCION_PARCIAL_ERROR
titulo: Detección de error por distribución parcial del monomio
objetivo: Identificar y corregir el error de la distribución parcial al multiplicar un monomio por un
  polinomio.
introduccion: Un error muy clásico al resolver paréntesis es repartir el número de afuera solo al primer
  término de adentro y olvidarse de los demás. No dejes a los otros términos sin su multiplicación.
resumen: 'La distribución parcial es un error frecuente donde el monomio exterior solo multiplica al primer
  término del polinomio y se deja el resto inalterado.


  - Forma incorrecta: $a(b + c) = ab + c$

  - Forma correcta: $a(b + c) = ab + ac$


  Para evitar este error, se recomienda dibujar arcos desde el monomio exterior hacia **cada uno** de
  los términos del polinomio.'
explicacion: '### Definición formal


  Sean $M$ un monomio y $P=\sum_{i=1}^{n}T_i$ un polinomio con $n\geq2$. La distributividad exige la identidad

  $$M\cdot P=\sum_{i=1}^{n}M\cdot T_i.$$

  Existe distribución parcial cuando el factor $M$ se aplica únicamente a los términos cuyos índices pertenecen
  a un subconjunto propio de $\{1,\ldots,n\}$ y los restantes se conservan sin multiplicar. Esa transformación
  no es algebraicamente equivalente al producto original, salvo casos degenerados en los que los términos
  omitidos o el efecto de la multiplicación sobre ellos sean nulos.


  ### Desarrollo didáctico


  La propiedad distributiva establece que la multiplicación se distribuye sobre la adición y la sustracción.
  Esto significa que el factor externo actúa como un multiplicador universal para todo lo contenido en
  el paréntesis.


  Si tenemos $3x(2x + 5y - 4)$, el error de distribución parcial daría como resultado $6x^2 + 5y - 4$.
  El estudiante operó correctamente $3x \cdot 2x$, pero se olvidó del $5y$ y del $-4$.


  El resultado correcto requiere realizar tres multiplicaciones separadas:

  $(3x \cdot 2x) + (3x \cdot 5y) + (3x \cdot -4) = 6x^2 + 15xy - 12x$.'
procedimiento:
- 'Para asegurar una distribución completa:

  1. Cuenta cuántos términos tiene el polinomio dentro del paréntesis.

  2. Haz una marca (como un arco) por cada término, partiendo desde el monomio exterior.

  3. Realiza tantas multiplicaciones como arcos hayas dibujado.

  4. Verifica que el resultado final tenga el mismo número de términos que el polinomio original (antes
  de reducir términos semejantes, si los hay).'
- El error clásico es $a(b+c) = ab+c$, olvidando multiplicar $a$ por $c$.
ejemplos:
- titulo: Identificación de una distribución incompleta
  enunciado: 'Identifica el error en este cálculo: $-4(2a - 3b + 1) = -8a - 3b + 1$.'
  solucion_pasos:
  - El estudiante solo multiplicó el $-4$ por el primer término $2a$.
  - Olvidó multiplicar el $-4$ por el $-3b$ y por el $1$.
  - 'El resultado correcto debe ser: $-8a + 12b - 4$.'
- titulo: Corrección de una distribución sobre tres términos
  enunciado: Resuelve correctamente $5m(m^2 - 2m + 3)$.
  solucion_pasos:
  - Hay 3 términos en el paréntesis. Haremos 3 multiplicaciones.
  - $(5m)(m^2) = 5m^3$
  - $(5m)(-2m) = -10m^2$
  - $(5m)(3) = 15m$
  - 'Resultado: $5m^3 - 10m^2 + 15m$.'
- titulo: Relación entre cantidad de términos y distribución
  enunciado: Si multiplicamos un monomio por un trinomio, el resultado siempre tendrá tres términos, asumiendo
    que no hay reducción posible.
  solucion_pasos:
  - Al distribuir, se hace una multiplicación por cada término del trinomio.
  - Al ser tres multiplicaciones distintas, se generarán tres términos.
  - Por lo tanto, la afirmación es Verdadera.
- titulo: 'Respecto de «Detección de error por distribución parcial del monomio»: ¿Es correcta esta car'
  enunciado: 'Respecto de «Detección de error por distribución parcial del monomio»: ¿Es correcta esta
    caracterización? «La distribución parcial es un error frecuente donde el monomio exterior solo multiplica
    al primer término del polinomio y se deja el resto inalterado»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La distribución parcial es un error frecuente donde
    el monomio exterior solo multiplica al primer término del polinomio y se deja el resto inalterado.'
- titulo: 'Respecto de «Detección de error por distribución parcial del monomio»: ¿Es válida esta afirm'
  enunciado: 'Respecto de «Detección de error por distribución parcial del monomio»: ¿Es válida esta afirmación?
    «Multiplicar únicamente el primer término y transcribir el resto igual»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La distribución parcial es un error frecuente donde
    el monomio exterior solo multiplica al primer término del polinomio y se deja el resto inalterado.'
errores_frecuentes:
- Multiplicar únicamente el primer término y transcribir el resto igual.
- Distribuir correctamente los números pero olvidar distribuir la variable.
- Detener la distribución al encontrar un signo negativo.
- Para «El error de distribución parcial al resolver $a(b + c)$ consiste en:», la respuesta correcta es
  Multiplicar $b$ por $c$ y luego por $a$.
- Sumar $a$, $b$ y $c$.
