semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.BASE_ISOSCELES
titulo: Identificación de la base en un triángulo isósceles
objetivo: Identificar cuál de los tres lados de un triángulo isósceles es su base.
introduccion: En un triángulo isósceles, los dos lados de igual medida reciben el nombre de piernas o
  lados, mientras que el tercero, distinto, se llama base.
resumen: La base de un triángulo isósceles es el lado que no es igual a los otros dos.
explicacion: '![Base de un triángulo isósceles](/static/img/geometria/triangulos/triangulos-clasificacion-base-isosceles.svg)


  ### Definición formal


  En un triángulo isósceles con lados iguales $a=b$ y tercer lado $c$, la base es el lado $c$, el que
  no participa de la igualdad.


  ### Desarrollo didáctico


  En un triángulo isósceles ABC con AC=BC=6 cm y AB=4 cm, la base es AB (el lado distinto), y AC, BC son
  las piernas.'
procedimiento:
- 'Paso 1: Identifica los dos lados de igual medida en el triángulo isósceles.'
- 'Paso 2: El lado restante, de medida distinta, es la base.'
- 'Paso 3: Si los tres lados son iguales (equilátero), cualquier lado puede tomarse como base.'
ejemplos:
- titulo: Identificar la base
  enunciado: Un triángulo isósceles tiene lados 6 cm, 6 cm y 4 cm.
  solucion_pasos:
  - La base es el lado de 4 cm, el que no se repite.
- titulo: Otro caso
  enunciado: Un triángulo isósceles tiene lados 10 cm, 7 cm y 7 cm.
  solucion_pasos:
  - La base es el lado de 10 cm.
- titulo: ¿La base siempre es distinta a los otros dos lados?
  respuesta: Sí
  solucion_pasos:
  - Sí, salvo en el caso equilátero, donde los tres lados son iguales.
- titulo: ¿Las piernas de un triángulo isósceles pueden tener distinta medida entre sí?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición las dos piernas deben medir lo mismo.
errores_frecuentes:
- Confundir la base con una de las piernas del triángulo.
- Suponer que la base siempre es el lado horizontal en el dibujo.
- Olvidar que en un triángulo equilátero cualquier lado puede considerarse base.
fuente: Elaboración propia.
estado: publicado
