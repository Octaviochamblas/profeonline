semantic_id: MAT.GEO.RECTA_ECUACIONES.FORMA_GENERAL
titulo: Definición de la ecuación general de la recta Ax + By + C = 0
objetivo: Definir la ecuación general de una recta, de la forma Ax+By+C=0, y reconocer que puede representar
  cualquier recta del plano, incluidas las verticales.
introduccion: A diferencia de la forma principal, que no puede representar rectas verticales, la forma
  general puede expresar cualquier recta del plano cartesiano.
resumen: La ecuación general de una recta tiene la forma $Ax+By+C=0$, donde $A$, $B$ y $C$ son constantes
  reales, con $A$ y $B$ no simultáneamente nulos.
explicacion: '![Ecuación general de la recta](/static/img/geometria/analitica/rectaeq-forma-general.svg)


  ### Definición formal


  Toda recta del plano cartesiano puede escribirse en la forma $Ax+By+C=0$, con $A,B,C\in\mathbb{R}$ y
  no ambos $A$ y $B$ iguales a cero. Si $B\neq0$, se puede despejar $y$ para obtener la forma principal.


  ### Desarrollo didáctico


  La recta $y=1{,}5x+1$ puede escribirse en forma general como $1{,}5x-y+1=0$, o equivalentemente $3x-2y+2=0$
  (multiplicando por 2 para evitar decimales).'
procedimiento:
- 'Paso 1: Verifica que la ecuación tenga la forma Ax+By+C=0, con los términos igualados a cero.'
- 'Paso 2: Identifica los valores de A, B y C.'
- 'Paso 3: Si B≠0, se puede despejar y para obtener la forma principal equivalente.'
ejemplos:
- titulo: Identificar A, B y C en una ecuación general
  enunciado: 3x-2y+2=0.
  solucion_pasos:
  - A=3, B=-2, C=2.
- titulo: Reconocer una recta vertical en forma general
  enunciado: x-4=0.
  solucion_pasos:
  - Esta ecuación corresponde a A=1, B=0, C=-4, representando la recta vertical x=4.
- titulo: ¿La forma general puede representar rectas verticales?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de la forma principal, la forma general sí puede representarlas (cuando B=0).
- titulo: ¿Los valores de A, B y C son únicos para una recta dada?
  respuesta: 'No'
  solucion_pasos:
  - No, cualquier múltiplo no nulo de A, B y C representa la misma recta (por ejemplo, 3x-2y+2=0 y 6x-4y+4=0
    son la misma recta).
errores_frecuentes:
- Olvidar que los coeficientes A, B y C no son únicos (existen múltiplos equivalentes).
- Confundir la forma general con la forma principal sin realizar la conversión correspondiente.
- Asumir que B siempre es distinto de cero, ignorando el caso de rectas verticales.
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
