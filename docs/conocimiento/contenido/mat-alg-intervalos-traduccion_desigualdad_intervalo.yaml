semantic_id: MAT.ALG.INTERVALOS.TRADUCCION_DESIGUALDAD_INTERVALO
titulo: Conversión de desigualdades a notación de intervalos
objetivo: Transformar expresiones de desigualdades algebraicas en su correspondiente
  notación de conjuntos usando intervalos.
introduccion: Las inecuaciones resultan en conjuntos de soluciones que se expresan
  en desigualdades. Pasar de una desigualdad a la notación de intervalos nos proporciona
  una manera estándar y compacta de comunicar resultados.
resumen: Para traducir una desigualdad a un intervalo, se identifican los valores
  límite y el sentido de la desigualdad. Se emplean corchetes cerrados $[, ]$ para
  símbolos como $\leq, \geq$ y corchetes abiertos $] , [$ (o paréntesis) para símbolos
  como $<, >$ o para el infinito.
explicacion: '### Definición formal

  Sea $x$ una variable real. Una desigualdad simple o compuesta define un subconjunto
  de $\mathbb{R}$. La transformación de una desigualdad $D$ a un intervalo $I$ requiere
  mapear cada cota de $x$ a un extremo de $I$. Si $D$ es de la forma $a \leq x < b$,
  se deduce que el extremo inferior $a$ está incluido y el superior $b$ excluido,
  formando el intervalo $I = [a, b[$. Las desigualdades sin cota superior implican
  un extremo superior de $\infty$, y las sin cota inferior un extremo inferior de
  $-\infty$, los cuales siempre toman corchetes abiertos.


  ### Desarrollo didáctico

  Convertir una desigualdad a un intervalo es tomar la "historia" de los números permitidos
  y empaquetarla. Si la desigualdad nos dice "todos los números mayores o iguales
  a 7", sabemos que empezamos en el 7 y nos vamos hacia la derecha sin parar. Empaquetamos
  esto poniendo un 7, una coma, y el símbolo de infinito. Para decidir los cierres,
  si vemos una línea extra en el símbolo de desigualdad (menor o igual, mayor o igual),
  usamos un corchete que "atrapa" al número. Si es solo un "pico" estricto, o un infinito,
  usamos un corchete que le da la espalda al número o símbolo.'
procedimiento:
- Identificar el límite inferior y el límite superior de la desigualdad planteada.
- Si falta un límite (e.g. $x > a$), sustituirlo conceptualmente por infinito positivo
  o negativo según corresponda.
- Escribir los dos límites separados por una coma, siempre ubicando el menor a la
  izquierda.
- Colocar un corchete cerrado (apuntando al número) si la desigualdad asociada es
  $\leq$ o $\geq$.
- Colocar un corchete abierto (apuntando hacia afuera) si la desigualdad es $<$ o
  $>$ o si el extremo es $\pm \infty$.
ejemplos:
- titulo: Traducción de una desigualdad de la forma mayor o igual que
  enunciado: Escribe el conjunto solución dado por la desigualdad $x \geq -4$ usando
    notación de intervalo.
  solucion_pasos:
  - La desigualdad $x \geq -4$ indica todos los números mayores o iguales a $-4$.
  - El límite inferior es $-4$ y no hay un límite superior definido, por lo que va
    hasta $\infty$.
  - El símbolo $\geq$ incluye al $-4$, por lo que usamos corchete cerrado $[$ al inicio.
  - El infinito siempre lleva corchete abierto $[$ (o paréntesis).
  - La notación final de intervalo es $[-4, \infty[$.
- titulo: Traducción de una desigualdad doble estricta
  enunciado: Convierte la desigualdad compuesta $1.5 < x < 9$ a su forma de intervalo.
  solucion_pasos:
  - La desigualdad señala un conjunto acotado entre los valores $1.5$ y $9$.
  - Ambos signos son estrictos ($<$), lo que indica exclusión de los extremos.
  - Se utilizarán corchetes abiertos para ambos límites.
  - El intervalo resultante se escribe como $]1.5, 9[$.
- titulo: ¿La desigualdad $x \leq 0$ corresponde al intervalo $[0, -\infty[$?
  respuesta: 'No'
  solucion_pasos:
  - En notación de intervalos, el límite menor siempre debe escribirse a la izquierda.
  - Los números menores o iguales a cero van desde infinito negativo hasta cero.
  - El infinito negativo lleva corchete abierto y el cero lleva corchete cerrado.
  - El intervalo correcto es $]-\infty, 0]$.
- titulo: ¿Se traduce la desigualdad $-7 \leq x < -2$ al intervalo $[-7, -2[$?
  respuesta: Sí
  solucion_pasos:
  - El límite inferior $-7$ está incluido debido al signo $\leq$, requiriendo un corchete
    cerrado $[$.
  - El límite superior $-2$ está excluido por el signo $<$, necesitando un corchete
    abierto $[$ (o hacia afuera).
  - El orden y los corchetes en $[-7, -2[$ representan fielmente la desigualdad dada.
errores_frecuentes:
- Colocar el infinito negativo a la derecha en la notación de intervalos.
- Asignar un corchete cerrado al infinito o infinito negativo.
- Confundir los símbolos $\leq$ y $<$ al momento de elegir el tipo de corchete para
  el intervalo.
- Alterar el orden de los límites numéricos, poniendo el número mayor en la primera
  posición del intervalo.
- Olvidar separar los límites del intervalo con una coma.
