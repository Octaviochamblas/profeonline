semantic_id: MAT.NUM.IMAGINARIOS.POTENCIAS_DE_I
objetivo: Reducir cualquier potencia entera de \(i\).
introduccion: Calcular una potencia enorme de \(i\) factor por factor sería inútil.
  La periodicidad convierte el exponente en un problema de división con resto.
resumen: 'Las potencias de \(i\) se repiten en un ciclo de cuatro: \(i,-1,-i,1\).
  El resto al dividir el exponente por \(4\) determina el valo.'
explicacion: |-
  Las potencias de \(i\) se repiten en un ciclo de cuatro: \(i,-1,-i,1\).

  El cálculo “\(i^{23}=i^{4\cdot5+3}=i^3=-i\)” muestra por qué el resto al dividir el exponente por \(4\) determina el valo
procedimiento:
- 'Paso 1: Divide el exponente por \(4\) y conserva el resto.'
- 'Paso 2: Asocia los restos \(0,1,2,3\) con \(1,i,-1,-i\).'
- 'Paso 3: Comprueba el signo recorriendo un ciclo cercano si existe duda.'
ejemplos:
- titulo: Aplicación razonada — Ciclo de potencias de la unidad imaginaria
  enunciado: \(i^{23}=i^{4\cdot5+3}=i^3=-i\).
  solucion_pasos:
  - Divide el exponente por \(4\) y conserva el resto.
  - Asocia los restos \(0,1,2,3\) con \(1,i,-1,-i\).
  - Comprueba el signo recorriendo un ciclo cercano si existe duda.
- titulo: Revisión de una solución — Ciclo de potencias de la unidad imaginaria
  enunciado: Una solución aplica “Asocia los restos \(0,1,2,3\) con \(1,i,-1,-i\).”,
    pero termina sin comprobar que el resto al dividir el exponente por \(4\) determina
    el valo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define ciclo de potencias de la unidad imaginaria:
    las potencias de \(i\) se repiten en un ciclo de cuatro: \(i,-1,-i,1\).'
  - Divide el exponente por \(4\) y conserva el resto.
  - 'Completa la revisión con este control: Comprueba el signo recorriendo un ciclo
    cercano si existe duda.'
- titulo: ¿Se cumple que el resto al dividir el exponente por \(4\) determina el valo?
    — Ciclo de potencias de la unidad imaginaria
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que las potencias de \(i\) se repiten
    en un ciclo de cuatro: \(i,-1,-i,1\).'
  - El caso “\(i^{23}=i^{4\cdot5+3}=i^3=-i\)” satisface esa condición.
  - Comprueba el signo recorriendo un ciclo cercano si existe duda.
- titulo: ¿Es válido omitir el paso “Divide el exponente por \(4\) y conserva el resto”?
    — Ciclo de potencias de la unidad imaginaria
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de ciclo de potencias de la unidad
    imaginaria.
  - 'Omitirlo puede volver inválida la acción siguiente: Asocia los restos \(0,1,2,3\)
    con \(1,i,-1,-i\).'
  - 'La solución debe terminar de este modo: Comprueba el signo recorriendo un ciclo
    cercano si existe duda.'
errores_frecuentes:
- 'Confundir ciclo de potencias de la unidad imaginaria con otro concepto y omitir
  este inicio: Divide el exponente por \(4\) y conserva el resto.'
- Aplicar mecánicamente “Asocia los restos \(0,1,2,3\) con \(1,i,-1,-i\).” sin revisar
  las condiciones de la definición.
- Tomar “\(i^{23}=i^{4\cdot5+3}=i^3=-i\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el resto al dividir el exponente
  por \(4\) determina el valo”.
- 'Terminar el desarrollo sin realizar este control: Comprueba el signo recorriendo
  un ciclo cercano si existe duda.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
