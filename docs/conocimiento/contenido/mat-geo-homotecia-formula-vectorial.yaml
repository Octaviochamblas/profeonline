semantic_id: MAT.GEO.HOMOTECIA.FORMULA_VECTORIAL_CENTRO_GENERAL
titulo: 'Fórmula vectorial de homotecia con centro general: P'' = O + k·(P − O)'
objetivo: Comprender y aplicar la fórmula vectorial de la homotecia, que expresa la transformación de
  forma compacta usando notación de vectores.
introduccion: La fórmula de coordenadas de la homotecia con centro general puede expresarse de forma más
  compacta y elegante utilizando notación vectorial.
resumen: La fórmula vectorial de una homotecia de centro $O$ y razón $k$ es $P'=O+k\cdot(P-O)$, donde
  $P$ y $P'$ son los vectores de posición del punto original y su imagen.
explicacion: '![Fórmula vectorial de homotecia](/static/img/geometria/congruencia-semejanza/homotecia-formula-vectorial.svg)


  ### Definición formal


  $P''=O+k(P-O)$, donde $P-O$ es el vector que va del centro al punto original, escalado por $k$, y luego
  trasladado de vuelta sumando $O$.


  ### Desarrollo didáctico


  Esta fórmula es equivalente a la fórmula de coordenadas $(a+k(x-a), b+k(y-b))$, pero expresada de forma
  vectorial: el vector $(P-O)$ representa la posición relativa del punto respecto al centro, que se escala
  por $k$ y se reubica sumando nuevamente $O$.'
procedimiento:
- 'Paso 1: Calcula el vector P−O (resta las coordenadas del centro a las del punto).'
- 'Paso 2: Multiplica ese vector por la razón k.'
- 'Paso 3: Suma el vector O al resultado para obtener el vector de posición de P''.'
ejemplos:
- titulo: Aplicar la fórmula vectorial con un ejemplo numérico
  enunciado: O=(2,3), P=(5,7), k=2.
  solucion_pasos:
  - P-O=(3,4); k(P-O)=(6,8); P'=O+(6,8)=(8,11).
- titulo: Verificar que la fórmula vectorial coincide con la de coordenadas
  enunciado: Comparar el resultado anterior con la fórmula (a+k(x-a), b+k(y-b)).
  solucion_pasos:
  - 'Da exactamente el mismo resultado: (8,11), confirmando que ambas fórmulas son equivalentes.'
- titulo: ¿La fórmula vectorial y la de coordenadas son equivalentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, son la misma operación expresada de dos formas distintas.
- titulo: ¿Qué representa el vector P-O?
  respuesta: La posición relativa de P respecto al centro O
  solucion_pasos:
  - Representa la posición relativa de P respecto al centro O.
errores_frecuentes:
- Olvidar sumar el vector O al final, dejando solo k(P-O) como resultado.
- Invertir el orden de la resta, calculando O-P en vez de P-O.
- Confundir la notación vectorial con una simple suma de coordenadas.
fuente: Elaboración propia.
estado: publicado
