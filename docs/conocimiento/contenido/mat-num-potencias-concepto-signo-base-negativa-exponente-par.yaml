semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.SIGNO_BASE_NEGATIVA_EXPONENTE_PAR
objetivo: Predecir el signo con base negativa y exponente pa.
introduccion: El signo de una potencia negativa se puede anticipar antes de multiplicar.
  Un exponente par garantiza que no quede ningún factor negativo sin pareja.
resumen: Una base negativa elevada a exponente par produce un resultado positivo.
  Los factores negativos se agrupan en pares de producto positivo.
explicacion: |-
  Una base negativa elevada a exponente par produce un resultado positivo.

  Al analizar “\((-3)^4=81\)” conviene observar la conexión siguiente: los factores negativos se agrupan en pares de producto positivo
procedimiento:
- 'Paso 1: Confirma que el signo menos pertenezca a la base.'
- 'Paso 2: Clasifica el exponente como par y empareja los factores negativos.'
- 'Paso 3: Calcula la potencia del valor absoluto y asigna signo positivo.'
ejemplos:
- titulo: Aplicación razonada — Signo de potencia con base negativa y exponente par
  enunciado: \((-3)^4=81\).
  solucion_pasos:
  - Confirma que el signo menos pertenezca a la base.
  - Clasifica el exponente como par y empareja los factores negativos.
  - Calcula la potencia del valor absoluto y asigna signo positivo.
- titulo: Revisión de una solución — Signo de potencia con base negativa y exponente
    par
  enunciado: Una solución aplica “Clasifica el exponente como par y empareja los factores
    negativos.”, pero termina sin comprobar que los factores negativos se agrupan
    en pares de producto positivo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define signo de potencia con base negativa y exponente
    par: una base negativa elevada a exponente par produce un resultado positivo.'
  - Confirma que el signo menos pertenezca a la base.
  - 'Completa la revisión con este control: Calcula la potencia del valor absoluto
    y asigna signo positivo.'
- titulo: ¿Se cumple que los factores negativos se agrupan en pares de producto positivo?
    — Signo de potencia con base negativa y exponente par
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una base negativa elevada a exponente
    par produce un resultado positivo.
  - El caso “\((-3)^4=81\)” satisface esa condición.
  - Calcula la potencia del valor absoluto y asigna signo positivo.
- titulo: ¿Es válido omitir el paso “Confirma que el signo menos pertenezca a la base”?
    — Signo de potencia con base negativa y exponente par
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de signo de potencia con base negativa
    y exponente par.
  - 'Omitirlo puede volver inválida la acción siguiente: Clasifica el exponente como
    par y empareja los factores negativos.'
  - 'La solución debe terminar de este modo: Calcula la potencia del valor absoluto
    y asigna signo positivo.'
errores_frecuentes:
- 'Confundir signo de potencia con base negativa y exponente par con otro concepto
  y omitir este inicio: Confirma que el signo menos pertenezca a la base.'
- Aplicar mecánicamente “Clasifica el exponente como par y empareja los factores negativos.”
  sin revisar las condiciones de la definición.
- Tomar “\((-3)^4=81\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “los factores negativos se agrupan
  en pares de producto positivo”.
- 'Terminar el desarrollo sin realizar este control: Calcula la potencia del valor
  absoluto y asigna signo positivo.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
