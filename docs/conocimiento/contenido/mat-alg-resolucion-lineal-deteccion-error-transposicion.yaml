semantic_id: MAT.ALG.RESOLUCION_LINEAL.DETECCION_ERROR_TRANSPOSICION
titulo: Detección de Errores Comunes en Transposición
objetivo: Identificar y corregir los errores clásicos de transposición de términos y operaciones inversas.
introduccion: Para ser un maestro del álgebra, no solo debes saber cómo hacerlo bien, sino también saber exactamente
  cómo y por qué se equivocan los demás. Analizar errores ajenos es el mejor entrenamiento.
resumen: 'Los errores más críticos ocurren al: 1) olvidar cambiar el signo al mover un sumando, 2) alterar el signo
  de un coeficiente cuando pasa dividiendo, 3) no respetar la jerarquía (separar productos antes que sumas).'
explicacion: "### Definición formal\n\nEsta es la corrección al error más extendido. Un número como -5 que multiplica,\
  \ pasa como el número -5 dividiendo.\n\n### Desarrollo didáctico\n\nVamos a ser auditores matemáticos. Revisa\
  \ este 'desarrollo' erróneo paso a paso:\n\n**Ecuación:** $2x - 5 = 7$\n- *Paso 1 del estudiante:* $2x = 7 - 5$\
  \ (ERROR 1.)\n  *Corrección:* El $-5$ estaba restando, debió pasar sumando como $+5$.\n- *Paso 2 del estudiante\
  \ (asumiendo que $2x = 2$):* $x = \\frac{2}{-2}$ (ERROR 2.)\n  *Corrección:* El $2$ multiplicaba positivo. Pasa\
  \ dividiendo como $2$ positivo, no cambia de signo, cambia de operación.\n\nOtro clásico:\n**Ecuación:** $\\frac{x\
  \ - 1}{3} = 4$\n- *Paso 1 del estudiante:* $\\frac{x}{3} = 4 + 1$ (ERROR 3.)\n  *Corrección:* El $-1$ no está\
  \ libre, está atrapado arriba en la fracción (dividido por 3). Primero hay que pasar el $3$ multiplicando al otro\
  \ lado.\n\nAprender a auditar estos pasos te evitará cometerlos en tus pruebas de estrés (como la PAES)."
procedimiento:
- 'Paso 1: Revisa el movimiento de términos sumando/restando. ¿Cambiaron a su signo opuesto al saltar el ''=''?'
- 'Paso 2: Revisa el movimiento de coeficientes multiplicando/dividiendo. ¿Conservaron su signo original pero cambiaron
  su operación matemática?'
- 'Paso 3: Revisa la jerarquía. ¿El término movido estaba ''libre'' para moverse, o estaba atrapado por una división
  o multiplicación mayor?'
- Esta es la corrección al error más extendido. Un número como -5 que multiplica, pasa como el número -5 dividiendo.
ejemplos:
- titulo: 'Audita el siguiente paso: $4 - x = 10 \rightarrow x = 10 - 4$. ¿Hay un error'
  enunciado: 'Audita el siguiente paso: $4 - x = 10 \rightarrow x = 10 - 4$. ¿Hay un error?'
  solucion_pasos:
  - Sí, hay error de arrastre de signo.
  - El 4 positivo pasó restando (-4), eso está bien.
  - Pero el estudiante ignoró que la 'x' tenía un signo menos, dejándola como 'x' positiva.
  - 'Lo correcto era: $-x = 10 - 4$.'
- titulo: Identifica el error en $3(x + 2) = 15 \rightarrow x + 2 = 15 - 3$
  solucion_pasos:
  - El 3 estaba multiplicando al paréntesis. Debió pasar DIVIDIENDO al 15.
- titulo: 'Respecto de «Detección de error por transposición incorrecta»: ¿Describe adecuadamente el co'
  enunciado: 'Respecto de «Detección de error por transposición incorrecta»: ¿Describe adecuadamente el concepto
    esta frase? «Los errores más críticos ocurren al: 1) olvidar cambiar el signo al mover un sumando, 2) alterar
    el signo de un coeficiente cuando pasa dividiendo, 3) no respetar la jerarquía (separar productos antes que
    sumas)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Los errores más críticos ocurren al: 1) olvidar cambiar el
    signo al mover un sumando, 2) alterar el signo de un coeficiente cuando pasa dividiendo, 3) no respetar la jerarquía
    (separar productos antes que sumas).'
- titulo: 'Respecto de «Detección de error por transposición incorrecta»: ¿Se puede aceptar esta afirma'
  enunciado: 'Respecto de «Detección de error por transposición incorrecta»: ¿Se puede aceptar esta afirmación?
    «Inventar ''super-reglas'', como ''cuando pasa al otro lado SIEMPRE cambia de signo'' (lo cual arruina las divisiones,
    donde el signo se conserva)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Los errores más críticos ocurren al: 1) olvidar cambiar el
    signo al mover un sumando, 2) alterar el signo de un coeficiente cuando pasa dividiendo, 3) no respetar la jerarquía
    (separar productos antes que sumas).'
errores_frecuentes:
- Inventar 'super-reglas', como 'cuando pasa al otro lado SIEMPRE cambia de signo' (lo cual arruina las divisiones,
  donde el signo se conserva).
- Para «Al transponer un factor que está multiplicando hacia el otro miembro para dividir, ¿qué ocurre con su signo
  (positivo o negativo)», la respuesta correcta es Siempre se convierte en positivo.
- 'Debe invertirse: si era positivo queda negativo y viceversa.'
- Para «Al transponer un factor que está multiplicando hacia el otro miembro para dividir, ¿qué ocurre con su signo
  (positivo o negativo)», la respuesta correcta es Se cancela.
- 'Para «Un alumno desarrolla la ecuación $5 - 2x = 11$ de la siguiente manera:

  Paso 1: $-2x = 11 + 5$

  Paso 2: $-2x = 16$

  Paso 3: $x = \frac{16}{2}$

  Paso 4: $x = 8$


  ¿En qué paso cometió el primer error algebraico», la respuesta correcta es En el Paso 2.'
