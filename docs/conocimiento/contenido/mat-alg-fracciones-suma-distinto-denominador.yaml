semantic_id: MAT.ALG.FRACCIONES_SUMA.DISTINTO_DENOMINADOR
titulo: Suma de Fracciones con Distinto Denominador
objetivo: Comprender la necesidad de unificar denominadores antes de sumar.
introduccion: Si intentas sumar peras con manzanas sin transformarlas a 'frutas' primero, tendrás un problema. Con
  fracciones de distinto denominador, no puedes sumar los techos hasta que no unifiques los pisos.
resumen: Nunca se pueden sumar fracciones con distintos denominadores directamente. Primero deben amplificarse para
  que compartan un denominador común.
explicacion: '### Definición formal


  1/2 y 1/3 son pedazos de distinto tamaño. Necesitan un molde común (1/6).


  ### Desarrollo didáctico


  Este es el verdadero desafío del álgebra de fracciones. No puedes sumar fracciones con distintos denominadores
  directamente, porque estarías intentando sumar manzanas con limones.


  Antes de juntar los numeradores, debes forzar a que ambos denominadores sean idénticos. Este proceso se llama
  ''hallar el Mínimo Común Denominador (MCM)''.


  Si tienes $\frac{1}{x} + \frac{1}{y}$:

  1. El MCM de $x$ e $y$ es $xy$.

  2. Amplificas la primera fracción: le falta la ''y'' abajo, así que multiplicas arriba y abajo por ''y'' $\rightarrow
  \frac{y}{xy}$.

  3. Amplificas la segunda fracción: le falta la ''x'' abajo, multiplicas arriba y abajo por ''x'' $\rightarrow
  \frac{x}{xy}$.

  4. Ahora ambas tienen $xy$ abajo. Puedes juntar los techos.

  Resultado: $\frac{y+x}{xy}$.'
procedimiento:
- 'Paso 1: Identifica que los denominadores son diferentes.'
- 'Paso 2: Encuentra un denominador común (idealmente el mínimo).'
- 'Paso 3: Amplifica cada fracción para que tenga ese denominador común.'
- 'Paso 4: Realiza la suma de los nuevos numeradores.'
- 1/2 y 1/3 son pedazos de distinto tamaño. Necesitan un molde común (1/6).
ejemplos:
- titulo: Concepto de $\frac{a}{b} + \frac{c}{d}$
  enunciado: Concepto de $\frac{a}{b} + \frac{c}{d}$.
  solucion_pasos:
  - No se pueden sumar tal cual.
  - Denominador común es $bd$.
  - 'Amplificamos la primera por $d$: $\frac{ad}{bd}$.'
  - 'Amplificamos la segunda por $b$: $\frac{bc}{bd}$.'
  - 'Suma: $\frac{ad+bc}{bd}$.'
- titulo: Al buscar el denominador común entre dos fracciones que no tienen factores comunes, basta co
  enunciado: Al buscar el denominador común entre dos fracciones que no tienen factores comunes, basta con multiplicar
    sus denominadores originales.
  solucion_pasos:
  - Sí, si no comparten factores (son primos entre sí), su mínimo común múltiplo es su producto directo.
  - 'Respuesta: Verdadero'
- titulo: 'Respecto de «Adición de fracciones algebraicas de distinto denominador»: ¿Se ajusta a la def'
  enunciado: 'Respecto de «Adición de fracciones algebraicas de distinto denominador»: ¿Se ajusta a la definición
    esta afirmación? «Nunca se pueden sumar fracciones con distintos denominadores directamente»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Nunca se pueden sumar fracciones con distintos denominadores
    directamente.'
- titulo: 'Respecto de «Adición de fracciones algebraicas de distinto denominador»: ¿Es compatible con'
  enunciado: 'Respecto de «Adición de fracciones algebraicas de distinto denominador»: ¿Es compatible con el procedimiento
    esta afirmación? «Sumar los numeradores por un lado y los denominadores por otro lado»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Nunca se pueden sumar fracciones con distintos denominadores
    directamente.'
errores_frecuentes:
- Sumar los numeradores por un lado y los denominadores por otro lado.
- Para «¿Por qué es incorrecto sumar directamente los numeradores si los denominadores son diferentes», la respuesta
  correcta es Porque el numerador siempre debe ser mayor al denominador.
- Es matemáticamente correcto pero no se acostumbra.
- Para «¿Por qué es incorrecto sumar directamente los numeradores si los denominadores son diferentes», la respuesta
  correcta es Porque los signos pueden ser diferentes.
- $\frac{2}{x+y}$.
