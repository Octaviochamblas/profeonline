semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.ECUACIONES_IGUAL_BASE
titulo: Resolución de ecuaciones exponenciales mediante igualación de bases
objetivo: Resolver ecuaciones exponenciales expresando ambos lados con la misma base e igualando los exponentes.
introduccion: Cuando dos potencias con la misma base son iguales, los exponentes también deben ser iguales; esta
  simple idea permite resolver muchas ecuaciones exponenciales sin necesidad de logaritmos.
resumen: Si $b^{m}=b^{n}$ con $b>0$ y $b\neq1$, entonces necesariamente $m=n$. Esta propiedad permite resolver
  ecuaciones exponenciales reescribiendo ambos lados con la misma base.
explicacion: '### Definición formal


  La función exponencial $f(x)=b^x$ es inyectiva para $b>0$, $b\neq1$: si $b^m=b^n$, entonces $m=n$. Por tanto,
  una ecuación exponencial se resuelve reescribiendo ambos lados como potencias de una misma base y luego igualando
  los exponentes.


  ### Desarrollo didáctico


  El método requiere primero identificar una base común a la que ambos lados de la ecuación puedan reescribirse,
  usualmente un número primo pequeño.


  Para resolver $2^{x+1}=8$: se reescribe $8=2^3$, obteniendo $2^{x+1}=2^3$; igualando exponentes, $x+1=3$, por
  lo que $x=2$.'
procedimiento:
- 'Paso 1: Reescribe ambos lados de la ecuación como potencias de una misma base.'
- 'Paso 2: Iguala los exponentes de ambos lados.'
- 'Paso 3: Resuelve la ecuación (generalmente lineal) resultante para encontrar $x$.'
ejemplos:
- titulo: Resolución con reescritura directa
  enunciado: 'Resuelve $3^x=81$.'
  solucion_pasos:
  - 'Reescribiendo: $81=3^4$.'
  - 'Igualando exponentes: $x=4$.'
- titulo: Resolución con exponente compuesto
  enunciado: 'Resuelve $5^{2x-1}=125$.'
  solucion_pasos:
  - 'Reescribiendo: $125=5^3$.'
  - 'Igualando exponentes: $2x-1=3$, dando $x=2$.'
- titulo: ¿Es siempre posible reescribir ambos lados de una ecuación exponencial con la misma base?
  enunciado: ¿Es siempre posible reescribir ambos lados de una ecuación exponencial con la misma base?
  respuesta: 'No'
  solucion_pasos:
  - Solo cuando ambos lados son potencias de un mismo número; en caso contrario, se necesitan logaritmos.
- titulo: ¿Si $b^m=b^n$ con $b>0$ y $b\neq1$, se puede concluir que $m=n$?
  enunciado: ¿Si $b^m=b^n$ con $b>0$ y $b\neq1$, se puede concluir que $m=n$?
  respuesta: Sí
  solucion_pasos:
  - La inyectividad de la función exponencial garantiza que exponentes iguales corresponden a bases iguales elevadas
    a exponentes iguales.
errores_frecuentes:
- Igualar los exponentes sin haber reescrito primero ambos lados con la misma base.
- Cometer errores al reescribir un número como potencia de otro (por ejemplo, confundir $27=3^3$ con $27=3^2$).
- Aplicar este método a ecuaciones donde ambos lados no se pueden expresar con la misma base.
- No resolver correctamente la ecuación lineal resultante tras igualar los exponentes.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
