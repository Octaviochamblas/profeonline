semantic_id: MAT.EST.MEDIANA_ANALISIS.CALCULO_IMPAR
titulo: Determinar la mediana para un número impar de datos
objetivo: Determinar la mediana de un conjunto con número impar de datos, identificando la posición central
  exacta mediante la fórmula (n+1)/2.
introduccion: Cuando el conjunto tiene un número impar de datos, existe exactamente un valor central,
  sin ambigüedad.
resumen: Con un número impar de datos ordenados, la mediana es el valor que ocupa la posición $(n+1)/2$
  del conjunto.
explicacion: '![Mediana con número impar de datos](/static/img/estadistica/mediana/mediana-calculo-impar.svg)


  ### Definición formal


  Con $n$ impar, la mediana ocupa la posición $\frac{n+1}{2}$ en el conjunto ordenado.


  ### Desarrollo didáctico


  Con 7 datos ordenados, la posición central es $(7+1)/2=4$, por lo que la mediana es el cuarto dato del
  conjunto ordenado.'
procedimiento:
- 'Paso 1: Ordena el conjunto de datos de menor a mayor.'
- 'Paso 2: Calcula la posición central usando (n+1)/2, donde n es el número total de datos (impar).'
- 'Paso 3: El valor que ocupa esa posición en el conjunto ordenado es la mediana.'
ejemplos:
- titulo: Calcular la mediana con 5 datos
  enunciado: 'Datos ordenados: 3,5,7,9,11 (n=5).'
  solucion_pasos:
  - Posición=(5+1)/2=3. El tercer dato es 7. Mediana=7.
- titulo: Calcular la mediana con 7 datos
  enunciado: 'Datos ordenados: 2,4,6,8,10,12,14 (n=7).'
  solucion_pasos:
  - Posición=(7+1)/2=4. El cuarto dato es 8. Mediana=8.
- titulo: ¿Con un número impar de datos, la mediana siempre coincide con un dato existente en el conjunto?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que la posición central es siempre un número entero cuando n es impar.
- titulo: ¿La fórmula (n+1)/2 da directamente el valor de la mediana?
  respuesta: 'No'
  solucion_pasos:
  - No, esa fórmula da la posición donde se encuentra la mediana, no su valor directamente.
errores_frecuentes:
- Confundir la posición calculada con (n+1)/2 con el valor mismo de la mediana.
- Calcular mal la posición central, especialmente al aplicar la fórmula con valores de n grandes.
- Olvidar ordenar los datos antes de aplicar la fórmula de posición central.
fuente: 'Elaboración propia (referencia: Moraleja 359).'
estado: publicado
