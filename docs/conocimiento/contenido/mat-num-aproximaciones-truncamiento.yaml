semantic_id: MAT.NUM.APROXIMACIONES.TRUNCAMIENTO
titulo: Truncamiento de números decimales
objetivo: Aproximar un número decimal eliminando directamente las cifras posteriores al orden pedido,
  sin aplicar ningún criterio de redondeo.
introduccion: 'El truncamiento es la forma más simple de aproximar: se cortan las cifras sobrantes sin
  observar su valor, a diferencia del redondeo, que sí decide según la cifra siguiente.'
resumen: Truncar un número a un cierto orden consiste en eliminar todas las cifras posteriores a ese orden,
  sin modificar la última cifra conservada, sin importar su valor.
explicacion: '### Definición formal


  Truncar \(x\) al orden \(10^{-n}\) da el mismo resultado que aproximar por defecto: se conservan las
  primeras \(n\) cifras decimales y se descartan las siguientes, sin evaluar su magnitud.


  ### Desarrollo didáctico


  Truncar \(4.987\) a la décima: se conserva la cifra de las décimas (9) y se eliminan las cifras siguientes
  (8 y 7) sin considerarlas, obteniendo \(4.9\), aunque el redondeo habría dado \(5.0\).'
procedimiento:
- 'Paso 1: Ubica la última posición decimal que se conservará.'
- 'Paso 2: Elimina todas las cifras posteriores sin modificar la última conservada.'
- 'Paso 3: Distingue el truncamiento del redondeo comparando ambos resultados.'
ejemplos:
- titulo: Aplicación razonada — Aproximación por truncamiento
  enunciado: Truncar \(4.987\) a la décima produce \(4.9\).
  solucion_pasos:
  - Ubica la última posición decimal que se conservará.
  - Elimina todas las cifras posteriores sin modificar la última conservada.
  - Distingue el truncamiento del redondeo comparando ambos resultados.
- titulo: Revisión de una solución — Aproximación por truncamiento
  enunciado: Una solución aplica “Elimina todas las cifras posteriores sin modificar la última conservada.”,
    pero termina sin comprobar que el truncamiento no mira la cifra siguiente; simplemente elimina las
    restantes. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define aproximación por truncamiento: truncar un número significa cortar
    las cifras a partir de cierto orden sin redondear.'
  - Ubica la última posición decimal que se conservará.
  - 'Completa la revisión con este control: Distingue el truncamiento del redondeo comparando ambos resultados.'
- titulo: ¿Se cumple que el truncamiento no mira la cifra siguiente; simplemente elimina las restantes?
    — Aproximación por truncamiento
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que truncar un número significa cortar las cifras a partir
    de cierto orden sin redondear.
  - El caso “Truncar \(4.987\) a la décima produce \(4.9\)” satisface esa condición.
  - Distingue el truncamiento del redondeo comparando ambos resultados.
- titulo: ¿Es válido omitir el paso “Ubica la última posición decimal que se conservará”? — Aproximación
    por truncamiento
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de aproximación por truncamiento.
  - 'Omitirlo puede volver inválida la acción siguiente: Elimina todas las cifras posteriores sin modificar
    la última conservada.'
  - 'La solución debe terminar de este modo: Distingue el truncamiento del redondeo comparando ambos resultados.'
errores_frecuentes:
- 'Empezar aproximación por truncamiento sin realizar este control inicial: Ubica la última posición decimal
  que se conservará.'
- Memorizar “Truncar \(4.987\) a la décima produce \(4.9\)” como respuesta aislada, sin reconstruir la
  definición que lo justifica.
- Convertir en receta el paso “Elimina todas las cifras posteriores sin modificar la última conservada.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre aproximación por truncamiento que contradice el criterio “El truncamiento
  no mira la cifra siguiente; simplemente elimina las restantes”.
- 'Cerrar el ejercicio sin esta comprobación específica: Distingue el truncamiento del redondeo comparando
  ambos resultados.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
