semantic_id: MAT.NUM.APROXIMACIONES.TRUNCAMIENTO
objetivo: Comprender aproximación por truncamiento y aplicarlo correctamente en ejercicios
  básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso aproximación por truncamiento ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Truncar un número significa cortar las cifras a partir de cierto orden sin
  redondear. Además, el truncamiento no mira la cifra siguiente; simplemente elimina
  las restantes.
explicacion: |-
  Truncar un número significa cortar las cifras a partir de cierto orden sin redondear.

  Una idea importante es que el truncamiento no mira la cifra siguiente; simplemente elimina las restantes.

  Por ejemplo, Truncar \(4.987\) a la décima produce \(4.9\).
procedimiento:
- 'Paso 1: Identificar el orden al que se quiere aproximar el número.'
- 'Paso 2: Mirar la cifra relevante y aplicar defecto, exceso, redondeo o truncamiento
  según corresponda.'
- 'Paso 3: Escribir la aproximación y comprobar si cumple la condición pedida.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Truncar \(4.987\) a la décima produce
    \(4.9\).” se relaciona con aproximación por truncamiento.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: truncar un número significa cortar las cifras a
    partir de cierto orden sin redondear.'
  - Concluye que el ejemplo sí ilustra aproximación por truncamiento.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “El truncamiento no mira la cifra siguiente;
    simplemente elimina las restantes.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con aproximación por truncamiento?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que el truncamiento no mira la cifra siguiente;
    simplemente elimina las restantes.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar aproximación por truncamiento ignorando la definición o las
    condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar aproximación por truncamiento sin mirar qué representan numerador,
  denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
estado: publicado
