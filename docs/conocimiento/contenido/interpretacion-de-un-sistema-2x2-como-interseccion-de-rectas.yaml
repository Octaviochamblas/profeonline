semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.INTERPRETACION_RECTAS
titulo: Interpretación de un sistema 2x2 como intersección de rectas
objetivo: Visualizar cada ecuación del sistema como una línea recta en el plano cartesiano.
introduccion: Si tomas todos los pares de números que hacen que $2x + y = 5$ sea verdad, y pones un puntito
  por cada uno, verás que forman una recta continua.
resumen: Cada ecuación lineal de dos variables representa una recta. La posición relativa de las rectas
  permite interpretar cuántas soluciones tiene el sistema.
explicacion: '### Definición formal


  El conjunto solución de una ecuación lineal $ax+by=c$ (con $a, b$ no ambos nulos) es geométricamente
  una recta en el plano cartesiano. Por tanto, el conjunto solución de un sistema de dos ecuaciones lineales
  corresponde a la intersección de las dos rectas asociadas, cuya cardinalidad (un punto, ninguno o infinitos)
  depende de su posición relativa.


  ### Desarrollo didáctico


  Si tomas todos los pares de números que hacen que $2x + y = 5$ sea verdad, y pones un puntito por cada
  uno, verás que forman una recta continua.

  Por lo tanto, un sistema de dos ecuaciones 2x2 son simplemente **dos líneas rectas dibujadas en el mismo
  mapa**.'
procedimiento:
- Toma una ecuación del sistema.
- Encuentra al menos dos puntos (pares x,y) que la satisfagan (por ejemplo, si x=0 cuánto vale y, y viceversa).
- Dibuja esos puntos en el plano y únelos con una recta.
- Repite el proceso para la segunda ecuación.
ejemplos:
- titulo: $2x + y = 5$ y $(x,y)$
  enunciado: Justifica el procedimiento adecuado para el caso $2x + y = 5$ y $(x,y)$.
  solucion_pasos:
  - "Aquí es donde el álgebra de letras se convierte en geometría visual. \nToda ecuación lineal con dos\
    \ variables (como $2x + y = 5$) es, en realidad, las instrucciones para dibujar una línea recta perfecta\
    \ en un gráfico de coordenadas $(x,y)$."
  - Toma una ecuación del sistema.
- titulo: $2x + y = 5$
  enunciado: Determina qué debe hacerse en $2x + y = 5$ y fundamenta cada transformación.
  solucion_pasos:
  - 'Si tomas todos los pares de números que hacen que $2x + y = 5$ sea verdad, y pones un puntito por
