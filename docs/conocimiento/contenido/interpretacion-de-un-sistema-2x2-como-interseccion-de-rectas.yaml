    Por lo tanto, un sistema de dos ecuaciones 2x2 son simplemente **dos líneas rectas dibujadas en el
    mismo mapa**.'
  - Encuentra al menos dos puntos (pares x,y) que la satisfagan (por ejemplo, si x=0 cuánto vale y, y
    viceversa).
