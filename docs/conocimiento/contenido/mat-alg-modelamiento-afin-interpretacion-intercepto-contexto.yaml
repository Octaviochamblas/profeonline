semantic_id: MAT.ALG.MODELAMIENTO_AFIN.INTERPRETACION_INTERCEPTO_CONTEXTO
titulo: Interpretación contextual del intercepto
objetivo: Interpretar el coeficiente de posición de un modelo afín como el valor de la magnitud dependiente antes
  de que actúe la variable independiente.
introduccion: 'El intercepto responde una pregunta muy concreta en cualquier problema real: ¿cuánto había, o cuánto
  costaba, antes de que empezara a contar la variable?'
resumen: En un modelo afín aplicado a un contexto, el **coeficiente de posición** $n$ representa el valor de la
  magnitud dependiente cuando la variable independiente vale cero, usualmente interpretado como un valor inicial
  o un cargo fijo.
explicacion: '### Definición formal


  Dado un modelo $f(x)=mx+n$ aplicado a un contexto, $n=f(0)$ representa el valor de la magnitud dependiente en
  el instante o condición inicial ($x=0$), independiente de cualquier contribución de la variable $x$.


  ### Desarrollo didáctico


  La interpretación depende completamente del contexto: puede ser un cargo fijo, un valor inicial de altura, una
  población de partida, o una temperatura base, entre otros.


  Si $C(x)=100x+3000$ modela el costo de un servicio, el intercepto $3000$ se interpreta como "el costo fijo,
  cobrado incluso si no se usa el servicio ($x=0$)".'
procedimiento:
- 'Paso 1: Evalúa o identifica el valor de la función cuando la variable independiente es cero.'
- 'Paso 2: Determina qué representa "cero" en el contexto (por ejemplo, sin uso, al inicio, en el momento cero).'
- 'Paso 3: Redacta la interpretación indicando que ese es el valor de la magnitud en esa condición inicial.'
ejemplos:
- titulo: Interpretación de cargo fijo
  enunciado: 'Si $C(x)=50x+4000$ modela el costo de un plan de internet según los GB usados, interpreta el intercepto
    $4000$.'
  solucion_pasos:
  - Es el valor de $C$ cuando $x=0$ (sin usar datos).
  - Interpretación - el plan cuesta \$4000 fijos mensuales, aunque no se use ningún GB de datos.
- titulo: Interpretación de altura inicial
  enunciado: 'Si $A(t)=3t+20$ modela la altura de una planta en cm según las semanas $t$, interpreta el intercepto
    $20$.'
  solucion_pasos:
  - Es el valor de $A$ cuando $t=0$ (al momento de plantarla).
  - Interpretación - la planta medía 20 cm al momento de ser plantada.
- titulo: ¿El intercepto siempre representa un cargo monetario?
  enunciado: ¿El intercepto siempre representa un cargo monetario?
  respuesta: 'No'
  solucion_pasos:
  - Depende del contexto - puede ser una altura, población, temperatura, o cualquier magnitud inicial.
- titulo: ¿El intercepto es el valor de la función en la condición inicial del contexto?
  enunciado: ¿El intercepto es el valor de la función en la condición inicial del contexto?
  respuesta: Sí
  solucion_pasos:
  - Corresponde exactamente al valor cuando la variable independiente es cero.
errores_frecuentes:
- Interpretar el intercepto sin relacionarlo con la condición "cero" del contexto específico.
- Confundir el intercepto con la pendiente al redactar la interpretación.
- Asumir que el intercepto siempre debe ser positivo.
- Ignorar el intercepto al construir la interpretación completa del modelo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
