semantic_id: MAT.NUM.REPARTO_ESCALAS.ESCALA_DESCONOCIDA
objetivo: Calcular la escala de un plano conociendo una medida del dibujo y su equivalente
  real.
introduccion: Imagina que encuentras un mapa viejo sin leyenda, pero logras identificar
  la distancia entre dos ciudades conocidas. Con esa simple información, puedes 'desencriptar'
  la escala que usó el cartógrafo.
resumen: Para hallar la escala $1:E$, convierte la medida real a la misma unidad del
  plano y divídela por la medida del plano ($E = \text{Realidad} / \text{Plano}$).
explicacion: 'Si tenemos la medida en el **Plano** y la medida en la **Realidad**,
  encontrar la escala $1:E$ se reduce a despejar $E$ de la fórmula:


  $$E = \frac{\text{Realidad}}{\text{Plano}}$$


  **Regla de oro:** Ambas medidas deben estar forzosamente en la **misma unidad**
  (sugerimos centímetros) antes de hacer la división. El resultado $E$ te dirá que
  la escala es $1:E$.'
procedimiento:
- 'Paso 1: Convierte la medida de la Realidad a la unidad de la medida del Plano (ej.
  de km a cm).'
- 'Paso 2: Divide la Realidad por el Plano.'
- 'Paso 3: El número resultante es el factor $E$. La escala se escribe $1:E$.'
ejemplos:
- titulo: Descifrando la escala
  enunciado: Un parque de 200 metros de largo está dibujado en un papel con una longitud
    de 10 cm. ¿Qué escala se usó?
  solucion_pasos:
  - 'Convertimos la realidad a cm: $200 \text{ m} = 20.000$ cm.'
  - 'Dividimos realidad entre plano: $20.000 / 10 = 2.000$.'
  - El factor $E$ es 2.000. La escala del dibujo es 1:2.000.
errores_frecuentes:
- Dividir el plano por la realidad (obteniendo un número decimal absurdo como 0.0005).
- Hacer la división sin haber igualado las unidades de medida (ej. dividir 200 metros
  / 10 cm = 20 $\rightarrow$ escala 1:20 es incorrecto).
fuente: Currículum Nacional MINEDUC.
estado: publicado
