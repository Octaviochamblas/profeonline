semantic_id: MAT.GEO.CIRCUNFERENCIA_ANALITICA.CENTRO_ORIGEN
titulo: Reconocimiento de la ecuación de circunferencia con centro en el origen
objetivo: Reconocer la ecuación de una circunferencia cuyo centro coincide con el origen del plano cartesiano.
introduccion: La circunferencia más simple de representar analíticamente es aquella centrada en el origen,
  ya que su ecuación no involucra desplazamientos en x ni en y.
resumen: La ecuación de una circunferencia con centro en el origen $(0,0)$ y radio $r$ es $x^2+y^2=r^2$.
explicacion: '![Circunferencia con centro en el origen](/static/img/geometria/analitica/circanal-centro-origen.svg)


  ### Definición formal


  Un punto $(x,y)$ pertenece a la circunferencia de centro $(0,0)$ y radio $r$ si su distancia al origen
  es exactamente $r$: $\sqrt{x^2+y^2}=r$, es decir, $x^2+y^2=r^2$.


  ### Desarrollo didáctico


  La ecuación $x^2+y^2=9$ representa una circunferencia centrada en el origen con radio $r=3$, ya que
  $9=3^2$.'
procedimiento:
- 'Paso 1: Verifica que la ecuación tenga la forma x²+y²=k, sin términos adicionales en x o y.'
- 'Paso 2: Reconoce que el centro de esa circunferencia es el origen (0,0).'
- 'Paso 3: El radio se obtiene calculando la raíz cuadrada de k.'
ejemplos:
- titulo: Reconocer una circunferencia centrada en el origen
  enunciado: x²+y²=16.
  solucion_pasos:
  - Esta ecuación representa una circunferencia con centro (0,0) y radio 4 (ya que √16=4).
- titulo: Verificar que un punto pertenece a la circunferencia
  enunciado: x²+y²=25, punto (3,4).
  solucion_pasos:
  - 3²+4²=9+16=25, por lo que el punto (3,4) pertenece a esta circunferencia.
- titulo: ¿Toda ecuación x²+y²=k representa una circunferencia centrada en el origen?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre que k sea positivo, garantizando un radio real.
- titulo: ¿El radio de esta circunferencia puede ser un número negativo?
  respuesta: 'No'
  solucion_pasos:
  - No, el radio siempre es una longitud positiva.
errores_frecuentes:
- Confundir el valor de k con el radio directamente, sin extraer la raíz cuadrada.
- Creer que la ecuación x²+y²=k representa una recta en vez de una circunferencia.
- Aplicar esta forma simplificada a circunferencias que no están centradas en el origen.
fuente: Elaboración propia.
estado: publicado
