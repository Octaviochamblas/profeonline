semantic_id: MAT.ALG.EXPRESIONES.IDENTIFICACION_TRINOMIO
objetivo: Reconocer y clasificar polinomios de exactamente tres términos (Trinomios).
introduccion: El 'tri' lo vemos en triángulos, triciclos, trípodes. Cuando el tren
  algebraico suma un vagón más y llega a tres piezas fundamentales, lo bautizamos
  como Trinomio.
resumen: Un **Trinomio** es un polinomio compuesto por la suma o diferencia de **exactamente
  tres términos** que no son semejantes entre sí.
explicacion: 'Visualmente, un trinomio puro tiene dos ''puentes'' (+ o -) libres en
  su estructura, separando el conjunto en tres bloques.

  - Expresión base: $x^2 + 5x + 6$. (Un bloque cuadrático, un bloque lineal, y un
  bloque numérico independiente). Es el clásico trinomio de la forma general.

  - Expresión: $a + b - c$. Tres variables distintas. Es un trinomio.

  - Expresión engañosa: $x^2 + 2x - 2x$. ¿Es un trinomio? ¡No! El $+2x$ y el $-2x$
  son semejantes y se anulan mutuamente (da $0x$). La expresión real es simplemente
  $x^2$. Era un **monomio** disfrazado de trinomio.'
procedimiento:
- 'Paso 1: Detecta y reduce todos los términos semejantes que existan (suma peras
  con peras).'
- 'Paso 2: Cuenta los bloques que sobrevivieron a la reducción, separados por los
  signos de adición/sustracción.'
- 'Paso 3: Si el conteo final de bloques irreductibles es tres, es un trinomio.'
ejemplos:
- titulo: Contando bloques irreductibles
  enunciado: Verifica si 5x^3 - x^2 - x^2 es un trinomio.
  solucion_pasos:
  - Visualmente tiene tres pedazos.
  - Pero -x^2 y -x^2 son semejantes. Se reducen a -2x^2.
  - La expresión final es 5x^3 - 2x^2.
  - Solo quedaron dos términos. Es un Binomio, no un trinomio.
errores_frecuentes:
- No reducir términos semejantes y clasificar una expresión larga como trinomio solo
  contando los espacios.
- Ignorar el término numérico independiente (ej. en $x^2+x+1$, creer que no es trinomio
  porque el 1 no tiene letras. Los tres bloques cuentan).
fuente: Álgebra de Baldor.
estado: publicado
