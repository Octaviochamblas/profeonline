semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.TABLA_VALORES
titulo: Tabla de valores de la función coseno
objetivo: Construir una tabla de valores de $f(x)=\cos(x)$ para valores representativos de $x$ entre $0$ y $2\pi$.
introduccion: A diferencia del seno, el coseno comienza en su valor máximo, lo que produce un patrón distinto
  aunque relacionado.
resumen: 'Una tabla de valores de $f(x)=\cos(x)$ para $x=0,\pi/2,\pi,3\pi/2,2\pi$ revela el patrón básico:
  $1,0,-1,0,1$, que se repite indefinidamente.'
explicacion: '### Definición formal


  Evaluando $f(x)=\cos(x)$ en los ángulos cuadrantales dentro de un período completo: $f(0)=1$,
  $f(\pi/2)=0$, $f(\pi)=-1$, $f(3\pi/2)=0$, $f(2\pi)=1$. Estos cinco puntos son suficientes para trazar la
  forma general de un período de la curva.


  ### Desarrollo didáctico


  Al agregar los ángulos notables intermedios, como $\pi/6$ ($f\approx0{,}87$) o $\pi/4$ ($f\approx0{,}71$), se
  afina la forma de la curva entre los puntos cuadrantales.'
procedimiento:
- 'Paso 1: Selecciona valores representativos de $x$, incluyendo los ángulos cuadrantales.'
- 'Paso 2: Evalúa $f(x)=\cos(x)$ en cada valor elegido.'
- 'Paso 3: Organiza los pares $(x,f(x))$ para identificar el patrón de la curva.'
ejemplos:
- titulo: Construcción de la tabla en un período completo
  enunciado: 'Construye la tabla de valores de $f(x)=\cos(x)$ para $x=0,\pi/2,\pi,3\pi/2,2\pi$.'
  solucion_pasos:
  - 'Se evalúa cada valor: $f(0)=1$, $f(\pi/2)=0$, $f(\pi)=-1$, $f(3\pi/2)=0$, $f(2\pi)=1$.'
  - Se obtiene el patrón $1,0,-1,0,1$.
- titulo: Valor intermedio en la tabla
  enunciado: 'Calcula $f(\pi/3)$ para $f(x)=\cos(x)$.'
  solucion_pasos:
  - Se interpreta $\pi/3$ como $60°$.
  - 'Se obtiene $f(\pi/3)=1/2$.'
- titulo: ¿El patrón de la tabla del coseno coincide con el del seno desplazado?
  enunciado: ¿El patrón de valores del coseno coincide con el del seno, pero comenzando en un punto distinto del
    ciclo?
  respuesta: Sí
  solucion_pasos:
  - Ambas funciones comparten la misma forma, pero el coseno está desplazado respecto al seno.
- titulo: ¿Los valores de la tabla del coseno dependen de si se usan grados o radianes?
  enunciado: ¿Los valores numéricos de $f(x)=\cos(x)$ dependen de si $x$ se interpreta en grados o en radianes?
  respuesta: 'No'
  solucion_pasos:
  - El valor del coseno es el mismo; solo cambia la notación del argumento.
errores_frecuentes:
- Olvidar incluir los ángulos cuadrantales al construir la tabla.
- Confundir el patrón $1,0,-1,0,1$ con el correspondiente al seno.
- No reconocer que el patrón se repite en cada período siguiente.
- Calcular mal los valores intermedios entre los ángulos cuadrantales.
