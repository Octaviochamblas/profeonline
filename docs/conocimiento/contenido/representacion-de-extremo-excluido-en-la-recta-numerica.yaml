semantic_id: MAT.ALG.INTERVALOS.EXTREMO_EXCLUIDO
titulo: Representación de extremo excluido en la recta numérica
objetivo: Comprender e identificar los extremos excluidos en la notación de intervalos y representarlos
  correctamente.
introduccion: Al trabajar con intervalos, es fundamental diferenciar entre los valores que pertenecen
  al conjunto y aquellos que, aunque marcan un límite, no están incluidos en él. Un extremo excluido indica
  un límite estricto.
resumen: Un extremo excluido en un intervalo significa que dicho número no forma parte del conjunto de
  soluciones. Se denota con corchetes hacia afuera $]a, b[$ o paréntesis $(a, b)$, y gráficamente con
  un círculo vacío o sin rellenar.
explicacion: '### Definición formal

  Un intervalo abierto en ambos extremos se define como el conjunto de números reales $x$ tales que $a
  < x < b$, denotado por $]a, b[$ o $(a, b)$. En este caso, $a$ y $b$ son extremos excluidos, lo que significa
  que $a \notin ]a, b[$ y $b \notin ]a, b[$. Un extremo excluido se da en cualquier intervalo donde la
  desigualdad sea estricta ($<$ o $>$).


  ### Desarrollo didáctico

  La noción de extremo excluido es como un cerco al que te puedes acercar tanto como quieras, pero que
  nunca puedes tocar. Matemáticamente, esto nos permite hablar de todos los números que están estrictamente
  entre dos valores. Al representar esto en una recta numérica, utilizamos un punto hueco o círculo sin
  pintar sobre el número que actúa como extremo excluido para dejar claro visualmente que ese valor específico
  no es parte del grupo.'
procedimiento:
- Identificar los límites numéricos del intervalo dado.
- Observar el tipo de desigualdad (si es $<$ o $>$ será un extremo excluido).
- Traducir la desigualdad estricta a notación de intervalo usando paréntesis o corchetes abiertos $] [$.
- Graficar en la recta numérica ubicando el límite numérico y marcándolo con una circunferencia hueca.
ejemplos:
- titulo: Determinación del intervalo de números positivos menores que cinco
  enunciado: Escribe en notación de intervalo el conjunto de todos los números reales estrictamente mayores
    que $0$ y estrictamente menores que $5$.
  solucion_pasos:
  - Identificamos que el conjunto busca valores entre $0$ y $5$.
  - Dado que los valores deben ser estrictamente mayores que $0$ y menores que $5$, no se incluyen el
    $0$ ni el $5$.
  - El límite inferior es $0$ (excluido) y el superior es $5$ (excluido).
  - La notación correspondiente es el intervalo abierto $]0, 5[$.
- titulo: Intervalo a partir de una gráfica con punto hueco
  enunciado: Dada una recta numérica con una región sombreada a la derecha del número $-2$, donde sobre
    el $-2$ hay un círculo sin rellenar, expresa este conjunto como un intervalo.
  solucion_pasos:
  - El círculo sin rellenar en $-2$ indica que este valor es un extremo excluido.
  - La región sombreada a la derecha indica que los valores son mayores que $-2$ y continúan hacia el
    infinito positivo.
  - El extremo inferior es $-2$ (excluido) y el superior es $\infty$.
  - El intervalo resultante se escribe como $]-2, \infty[$.
- titulo: ¿El número pertenece al intervalo si coincide con su extremo excluido?
  respuesta: 'No'
  solucion_pasos:
  - Si el extremo está excluido, denotado por un paréntesis o corchete hacia afuera, el valor que define
    ese extremo no es parte del conjunto.
- titulo: ¿Es correcto afirmar que en el intervalo $]-3, 7]$ el número $-3$ es un extremo excluido?
  respuesta: Sí
  solucion_pasos:
  - El uso del corchete abierto $]-3$ indica que la frontera inferior no forma parte del conjunto.
  - Por lo tanto, $-3$ es un extremo excluido del intervalo.
errores_frecuentes:
- Incluir el extremo numérico en la solución cuando la desigualdad es estricta (por ejemplo, pensar que
  $3$ pertenece a $]3, 6[$).
- Utilizar corchetes cerrados $[ ]$ para representar extremos excluidos en notación de intervalos.
- Marcar el extremo excluido con un círculo relleno al graficar en la recta numérica.
- Asumir que un extremo excluido significa que el intervalo no tiene límite en esa dirección.
- Creer que en $]a, b[$ el número siguiente entero después de $a$ es el primer elemento del intervalo
  continuo de reales.
