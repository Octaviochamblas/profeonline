semantic_id: MAT.NUM.RAICES_CONCEPTO.EXISTENCIA_INDICE_PAR
objetivo: Determinar el dominio real de una raíz pa.
introduccion: Antes de simplificar una raíz par hay que mirar el signo interior. Esa
  revisión de dominio puede detener un cálculo que, de otro modo, parecería rutinario.
resumen: Una raíz de índice par tiene valor real solo cuando el radicando es no negativo.
  Ninguna potencia par de un real puede producir un número negativo.
explicacion: |-
  Una raíz de índice par tiene valor real solo cuando el radicando es no negativo.

  En el caso “\(\sqrt[4]{16}=2\), mientras que \(\sqrt[4]{-16}\) no existe en \(\mathbb{R}\)” esta idea se hace visible: ninguna potencia par de un real puede producir un número negativo
procedimiento:
- 'Paso 1: Identifica que el índice sea par.'
- 'Paso 2: Exige que el radicando sea mayor o igual que cero.'
- 'Paso 3: Resuelve la restricción y solo después calcula o simplifica el radical.'
ejemplos:
- titulo: Aplicación razonada — Condición de existencia real de raíz con índice par
  enunciado: \(\sqrt[4]{16}=2\), mientras que \(\sqrt[4]{-16}\) no existe en \(\mathbb{R}\).
  solucion_pasos:
  - Identifica que el índice sea par.
  - Exige que el radicando sea mayor o igual que cero.
  - Resuelve la restricción y solo después calcula o simplifica el radical.
- titulo: Revisión de una solución — Condición de existencia real de raíz con índice
    par
  enunciado: Una solución aplica “Exige que el radicando sea mayor o igual que cero.”,
    pero termina sin comprobar que ninguna potencia par de un real puede producir
    un número negativo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define condición de existencia real de raíz con índice
    par: una raíz de índice par tiene valor real solo cuando el radicando es no negativo.'
  - Identifica que el índice sea par.
  - 'Completa la revisión con este control: Resuelve la restricción y solo después
    calcula o simplifica el radical.'
- titulo: ¿Se cumple que ninguna potencia par de un real puede producir un número
    negativo? — Condición de existencia real de raíz con índice par
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una raíz de índice par tiene valor
    real solo cuando el radicando es no negativo.
  - El caso “\(\sqrt[4]{16}=2\), mientras que \(\sqrt[4]{-16}\) no existe en \(\mathbb{R}\)”
    satisface esa condición.
  - Resuelve la restricción y solo después calcula o simplifica el radical.
- titulo: ¿Es válido omitir el paso “Identifica que el índice sea par”? — Condición
    de existencia real de raíz con índice par
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de condición de existencia real
    de raíz con índice par.
  - 'Omitirlo puede volver inválida la acción siguiente: Exige que el radicando sea
    mayor o igual que cero.'
  - 'La solución debe terminar de este modo: Resuelve la restricción y solo después
    calcula o simplifica el radical.'
errores_frecuentes:
- 'Confundir condición de existencia real de raíz con índice par con otro concepto
  y omitir este inicio: Identifica que el índice sea par.'
- Aplicar mecánicamente “Exige que el radicando sea mayor o igual que cero.” sin revisar
  las condiciones de la definición.
- Tomar “\(\sqrt[4]{16}=2\), mientras que \(\sqrt[4]{-16}\) no existe en \(\mathbb{R}\)”
  como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “ninguna potencia par de un real
  puede producir un número negativo”.
- 'Terminar el desarrollo sin realizar este control: Resuelve la restricción y solo
  después calcula o simplifica el radical.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
