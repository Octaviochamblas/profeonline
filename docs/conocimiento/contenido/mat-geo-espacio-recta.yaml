semantic_id: MAT.GEO.ESPACIO_FUNDAMENTOS.RECTA_ESPACIO
titulo: Concepto de recta en el espacio
objetivo: Reconocer la recta como conjunto infinito de puntos alineados que se extiende sin límite en
  dos sentidos dentro del espacio tridimensional.
introduccion: Así como en el plano, en el espacio una recta sigue siendo un conjunto infinito de puntos
  alineados, pero ahora puede orientarse en cualquier dirección de las tres dimensiones.
resumen: Una recta en el espacio es un conjunto infinito de puntos alineados que se extiende indefinidamente
  en ambos sentidos, y que puede tener cualquier orientación dentro de las tres dimensiones.
explicacion: '![Recta en el espacio](/static/img/geometria/espacio-cuerpos/espacio-recta.svg)


  ### Definición formal


  Una recta $L$ en el espacio es un conjunto infinito de puntos alineados que se extiende sin límite en
  ambos sentidos. A diferencia del plano, en el espacio una recta puede tener cualquier orientación tridimensional,
  no solo estar contenida en una hoja plana.


  ### Desarrollo didáctico


  En la figura, la recta $L$ pasa por los puntos $A$ y $B$ (dos vértices de un cuerpo geométrico) y se
  extiende más allá de ambos, representando su naturaleza infinita. Dos puntos distintos determinan siempre
  una única recta que pasa por ambos.'
procedimiento:
- 'Paso 1: Identifica dos puntos distintos por los que debe pasar la recta.'
- 'Paso 2: Reconoce que la recta se extiende infinitamente en ambos sentidos más allá de esos dos puntos.'
- 'Paso 3: Denota la recta con una letra minúscula o mediante los dos puntos que la determinan (por ejemplo,
  recta AB).'
ejemplos:
- titulo: Identificar una recta que pasa por dos puntos
  enunciado: Dos vértices A y B de un cuerpo geométrico están alineados.
  solucion_pasos:
  - La recta L que contiene a A y B es el conjunto infinito de puntos alineados con ambos, extendiéndose
    más allá de A y B.
- titulo: Reconocer que dos puntos determinan una única recta
  enunciado: Se dan dos puntos distintos A y B en el espacio.
  solucion_pasos:
  - Existe una única recta que pasa por A y B; no puede haber dos rectas distintas que contengan ambos
    puntos.
- titulo: ¿Una recta en el espacio se extiende infinitamente?
  respuesta: Sí
  solucion_pasos:
  - Sí, al igual que en el plano, una recta no tiene principio ni fin, se extiende sin límite en ambos
    sentidos.
- titulo: ¿Una recta puede estar contenida en un único plano en el espacio?
  respuesta: 'No'
  solucion_pasos:
  - 'No exactamente: una recta puede estar contenida en infinitos planos distintos (todos los que pasan
    por ella), no en uno solo.'
errores_frecuentes:
- Confundir la recta con un segmento (que sí tiene extremos y longitud finita).
- Creer que una recta en el espacio debe estar contenida en un único plano específico.
- Olvidar que dos puntos distintos siempre determinan una única recta.
fuente: 'Elaboración propia (referencia: Cid 167).'
estado: publicado
