semantic_id: MAT.NUM.INTERES_COMPUESTO.CALCULO_MONTO
titulo: Cálculo del monto en interés compuesto
objetivo: Calcular el monto final acumulado en una operación de interés compuesto.
introduccion: Si inviertes dinero en la bolsa a largo plazo, no calculas tu ganancia sumando el mismo
  billete año tras año. Para ver el futuro, usas la fórmula mágica del crecimiento exponencial.
resumen: 'La fórmula del Monto Final ($M$ o $C_f$) en interés compuesto es: $M = C \cdot (1 + i)^t$. Donde
  el paréntesis $(1+i)$ se eleva a la cantidad de períodos $t$.'
explicacion: 'En el interés compuesto, la fórmula principal nos da directamente el **Monto Final Total**
  (Capital + Intereses sumados):


  $$M = C \cdot (1 + i)^t$$


  - **$C$:** Capital Inicial.

  - **$i$:** Tasa de interés (en decimal, ej: $0.05$).

  - **$t$:** Cantidad de períodos de capitalización.


  Notar que el factor de aumento $(1 + i)$ no se multiplica por $t$ (como en el simple), sino que se **eleva**
  a $t$. Multiplicar un número por sí mismo repetidas veces es lo que genera la curva exponencial que
  hace crecer el dinero agresivamente en el tiempo.'
procedimiento:
- 'Paso 1: Convierte la tasa de interés a decimal ($i$).'
- 'Paso 2: Suma 1 a la tasa para obtener el factor de crecimiento ($1 + i$).'
- 'Paso 3: Eleva ese factor a la potencia $t$ (el número de periodos).'
- 'Paso 4: Multiplica el resultado por el Capital Inicial.'
ejemplos:
- titulo: Depósito a plazo compuesto
  enunciado: Se invierten $100.000 al 5% de interés compuesto anual durante 3 años. ¿Cuánto dinero hay
    al final?
  solucion_pasos:
  - C = 100.000, i = 0.05, t = 3.
  - Factor = $(1 + 0.05) = 1.05$.
  - 'Elevamos a t: $(1.05)^3 = 1.05 \cdot 1.05 \cdot 1.05 = 1.157625$.'
  - 'Multiplicamos por C: $100.000 \cdot 1.157625 = 115.762,5$.'
  - El monto final es aproximadamente $115.763.
errores_frecuentes:
- Multiplicar $(1 + i)$ por $t$ en lugar de usar potencias (confundir la fórmula con interés simple).
- Olvidar sumar el 1 antes de elevar a la potencia (calcular $0.05^3$ destruirá el capital en lugar de
  hacerlo crecer).
fuente: Currículum Nacional MINEDUC.
estado: publicado
