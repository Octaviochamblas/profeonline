semantic_id: MAT.ALG.CLASIFICACION_TECNICA.EXPRESION_FRACCIONARIA
objetivo: Reconocer expresiones algebraicas fraccionarias por la presencia de variables en el denominador.
introduccion: Cuando la letra principal de la historia se hunde en el sótano de una fracción, las reglas del juego
  cambian. La expresión ya no es 'entera'.
resumen: Una **Expresión Algebraica Fraccionaria** es aquella que tiene **al menos una variable (letra) figurando
  en un denominador**, o equivalentemente, que posee al menos una variable con un exponente negativo.
explicacion: '### Definición formal


  La posición de la variable en el divisor (abajo) es lo que define a las expresiones fraccionarias.


  ### Desarrollo didáctico


  A diferencia de las expresiones enteras (donde los números pueden estar abajo, pero las letras no), en las fraccionarias
  las letras son el divisor.

  - $\frac{5}{x}$ es fraccionaria (la ''x'' está dividiendo).

  - $x^2 + \frac{1}{y}$ es fraccionaria (basta con que una variable esté en un denominador para contagiar a toda
  la expresión).

  - $3x^{-4}$ es fraccionaria, porque matemáticamente es igual a $\frac{3}{x^4}$.


  El gran problema de las expresiones fraccionarias es que su dominio ya no es infinito. Debemos tener cuidado de
  que esa letra en el denominador jamás tome el valor cero (porque la división por cero no está definida).'
procedimiento:
- 'Paso 1: Examina toda la expresión buscando divisiones (líneas fraccionarias).'
- 'Paso 2: Si debajo de alguna línea fraccionaria hay una letra, la expresión es fraccionaria.'
- 'Paso 3: Examina si alguna letra tiene exponente negativo. Si es así, también es fraccionaria.'
- La posición de la variable en el divisor (abajo) es lo que define a las expresiones fraccionarias.
ejemplos:
- titulo: El infiltrado en el sótano
  enunciado: Clasifica la expresión x^3/5 + 2/x + y.
  solucion_pasos:
  - El primer término (x^3/5) es entero, la x está arriba.
  - El segundo término (2/x) tiene a la variable x en el denominador.
  - Al haber al menos una letra en el denominador, toda la expresión se clasifica como Fraccionaria.
- titulo: En una tarea de clasificación de dominios, se pide separar las funciones que tienen dominio
  enunciado: 'En una tarea de clasificación de dominios, se pide separar las funciones que tienen dominio real infinito
    de las que tienen restricciones. El profesor escribe $M = \frac{a+b}{100}$ y $N = 100(a+b)^{-1}$. ¿Cómo debe
    clasificarlas el estudiante? (v1)


    Opciones: A) M es una expresión entera (dominio infinito) y N es una expresión fraccionaria (dominio con restricciones).
    · B) Ambas son expresiones fraccionarias porque las dos representan divisiones de alguna forma. · C) Ambas son
    expresiones enteras porque ninguna usa el símbolo de fracción explícito con una letra abajo. · D) M es fraccionaria
    y N es entera.'
  solucion_pasos:
  - M tiene un denominador numérico fijo (100), es Entera. N tiene exponente -1 afectando a las variables, lo que
    es igual a $100/(a+b)$, es Fraccionaria.
  - 'Respuesta: M es una expresión entera (dominio infinito) y N es una expresión fraccionaria (dominio con restricciones).'
- titulo: 'Respecto de «Identificación de expresión algebraica fraccionaria»: ¿Es correcta esta caracte'
  enunciado: 'Respecto de «Identificación de expresión algebraica fraccionaria»: ¿Es correcta esta caracterización?
    «Una **Expresión Algebraica Fraccionaria** es aquella que tiene **al menos una variable (letra) figurando en
    un denominador**, o equivalentemente, que posee al menos una variable con un exponente negativo»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una **Expresión Algebraica Fraccionaria** es aquella que tiene
    **al menos una variable (letra) figurando en un denominador**, o equivalentemente, que posee al menos una variable
    con un exponente negativo.'
- titulo: 'Respecto de «Identificación de expresión algebraica fraccionaria»: ¿Es válida esta afirmació'
  enunciado: 'Respecto de «Identificación de expresión algebraica fraccionaria»: ¿Es válida esta afirmación? «Confundir
    una fracción de números (como $\frac{1}{2}x$) con una expresión fraccionaria. Recuerda: lo que hace fraccionaria
    a la expresión es la letra, no el número»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una **Expresión Algebraica Fraccionaria** es aquella que tiene
    **al menos una variable (letra) figurando en un denominador**, o equivalentemente, que posee al menos una variable
    con un exponente negativo.'
errores_frecuentes:
- 'Confundir una fracción de números (como $\frac{1}{2}x$) con una expresión fraccionaria. Recuerda: lo que hace
  fraccionaria a la expresión es la letra, no el número.'
- Olvidar que las variables con exponentes negativos son fracciones disfrazadas.
- La existencia de cualquier fracción, incluso si solo involucra números como coeficientes.
- La presencia de una raíz cuadrada aplicada a un número.
- Que el grado absoluto de la expresión sea un número fraccionario.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Identificación de expresión algebraica fraccionaria
