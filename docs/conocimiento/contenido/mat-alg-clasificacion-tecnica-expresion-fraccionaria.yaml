semantic_id: MAT.ALG.CLASIFICACION_TECNICA.EXPRESION_FRACCIONARIA
objetivo: Reconocer expresiones algebraicas fraccionarias por la presencia de variables
  en el denominador.
introduccion: Cuando la letra principal de la historia se hunde en el sótano de una
  fracción, las reglas del juego cambian. La expresión ya no es 'entera'.
resumen: Una **Expresión Algebraica Fraccionaria** es aquella que tiene **al menos
  una variable (letra) figurando en un denominador**, o equivalentemente, que posee
  al menos una variable con un exponente negativo.
explicacion: 'A diferencia de las expresiones enteras (donde los números pueden estar
  abajo, pero las letras no), en las fraccionarias las letras son el divisor.

  - $\frac{5}{x}$ es fraccionaria (la ''x'' está dividiendo).

  - $x^2 + \frac{1}{y}$ es fraccionaria (basta con que una variable esté en un denominador
  para contagiar a toda la expresión).

  - $3x^{-4}$ es fraccionaria, porque matemáticamente es igual a $\frac{3}{x^4}$.


  El gran problema de las expresiones fraccionarias es que su dominio ya no es infinito.
  Debemos tener cuidado de que esa letra en el denominador jamás tome el valor cero
  (porque la división por cero no está definida).'
procedimiento:
- 'Paso 1: Examina toda la expresión buscando divisiones (líneas fraccionarias).'
- 'Paso 2: Si debajo de alguna línea fraccionaria hay una letra, la expresión es fraccionaria.'
- 'Paso 3: Examina si alguna letra tiene exponente negativo. Si es así, también es
  fraccionaria.'
ejemplos:
- titulo: El infiltrado en el sótano
  enunciado: Clasifica la expresión x^3/5 + 2/x + y.
  solucion_pasos:
  - El primer término (x^3/5) es entero, la x está arriba.
  - El segundo término (2/x) tiene a la variable x en el denominador.
  - Al haber al menos una letra en el denominador, toda la expresión se clasifica
    como Fraccionaria.
errores_frecuentes:
- 'Confundir una fracción de números (como $\frac{1}{2}x$) con una expresión fraccionaria.
  Recuerda: lo que hace fraccionaria a la expresión es la letra, no el número.'
- Olvidar que las variables con exponentes negativos son fracciones disfrazadas.
fuente: Álgebra de Baldor.
estado: publicado
