semantic_id: MAT.ALG.FACTOR_CUADRADOS.RECONOCIMIENTO_TRINOMIO_CUADRADO
titulo: Suma de cuadrados y su dominio
objetivo: Reconocer que la suma de dos cuadrados perfectos (ej. $a^2 + b^2$) no es factorizable en el conjunto de
  los números Reales.
introduccion: 'Hay un espejismo en el desierto del álgebra que confunde a muchos estudiantes: ven un $x^2 + 25$
  y su instinto les grita que escriban $(x+5)(x+5)$. Sin embargo, al multiplicarlo de vuelta. aparece un intruso.
  La suma de cuadrados es una bóveda que no se puede abrir con los números reales.'
resumen: A diferencia de $a^2 - b^2$, la expresión $a^2 + b^2$ NO posee una factorización con coeficientes Reales.
  Cualquier intento usando binomios repetidos generará un término central no deseado.
explicacion: '### Definición formal


  Porque al expandirlo se genera un término central $+8x$.


  ### Desarrollo didáctico


  Intentemos factorizar falsamente $x^2 + 9$.


  Si crees que es $(x+3)(x+3)$, al expandirlo usando la propiedad distributiva obtienes: $x^2 + 3x + 3x + 9 = x^2
  + 6x + 9$.

  Apareció un $+6x$ de la nada. Por tanto, $(x+3)^2$ NO es igual a $x^2 + 9$.


  ¿Y si pruebas $(x-3)(x-3)$? Obtienes $x^2 - 6x + 9$.

  ¿Y si pruebas $(x+3)(x-3)$? Esa es una suma por diferencia, que da $x^2 - 9$ (y nosotros queríamos $+9$.).


  Conclusión: No existe forma en el conjunto de los Números Reales de que dos binomios al multiplicarse cancelen
  el término del medio y dejen el último positivo. Por ello, decimos que $a^2 + b^2$ es "prima" o **no factorizable
  en los Reales**. (Solo se puede factorizar usando números Complejos Imaginarios, lo cual está fuera del temario
  PAES).'
procedimiento:
- 'Paso 1: Identifica si los términos son cuadrados perfectos.'
- 'Paso 2: Observa el signo que los separa.'
- 'Paso 3: Si el signo es $+$, decreta que el polinomio no es factorizable en los números Reales (queda exactamente
  igual).'
- 'Paso 4: No te dejes engañar y evita inventar factorizaciones.'
- El binomio al cuadrado desarrolla 3 términos, no 2.
ejemplos:
- titulo: Cuál es la factorización de $4x^2 + 16$
  enunciado: ¿Cuál es la factorización de $4x^2 + 16$?
  solucion_pasos:
  - 'Se puede extraer el factor común 4: $4(x^2 + 4)$.'
  - Observamos el paréntesis $(x^2 + 4)$. Es una suma de cuadrados.
  - No se puede seguir factorizando.
  - 'Resultado final: $4(x^2 + 4)$.'
- titulo: Factoriza $m^2 + 100$.
  solucion_pasos:
  - Al ser una suma de cuadrados, se mantiene igual en el dominio de los Reales.
- titulo: 'Respecto de «Reconocimiento del trinomio cuadrado perfecto»: ¿Es correcta esta caracterizaci'
  enunciado: 'Respecto de «Reconocimiento del trinomio cuadrado perfecto»: ¿Es correcta esta caracterización? «A
    diferencia de $a^2 - b^2$, la expresión $a^2 + b^2$ NO posee una factorización con coeficientes Reales»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: A diferencia de $a^2 - b^2$, la expresión $a^2 + b^2$ NO posee
    una factorización con coeficientes Reales.'
- titulo: 'Respecto de «Reconocimiento del trinomio cuadrado perfecto»: ¿Es válida esta afirmación? «As'
  enunciado: 'Respecto de «Reconocimiento del trinomio cuadrado perfecto»: ¿Es válida esta afirmación? «Asumir impulsivamente
    que $x^2 + y^2 = (x+y)^2$. ¡Falso! Falta el $+2xy$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: A diferencia de $a^2 - b^2$, la expresión $a^2 + b^2$ NO posee
    una factorización con coeficientes Reales.'
errores_frecuentes:
- Asumir impulsivamente que $x^2 + y^2 = (x+y)^2$. ¡Falso! Falta el $+2xy$.
- Confundir la imposibilidad de factorizar la suma de cuadrados con no poder extraer un factor común numérico previo.
- Para «¿Por qué $(x+4)(x+4)$ no es la factorización de $x^2 + 16$», la respuesta correcta es Porque falta multiplicar
  los exponentes.
- Porque los signos deberían ser negativos.
- Porque $(x+4)$ está mal calculado.
