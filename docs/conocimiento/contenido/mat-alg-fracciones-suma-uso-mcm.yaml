semantic_id: 'MAT.ALG.FRACCIONES_SUMA.USO_MCM'
titulo: 'Uso del MCM en Sumas Algebraicas'
objetivo: 'Utilizar el Mínimo Común Múltiplo para sumar fracciones de forma eficiente sin crear polinomios gigantes.'
introduccion: |
  Para igualar denominadores puedes simplemente multiplicar todos los denominadores viejos entre sí. ¡Pero eso puede crear un monstruo! El MCM te asegura usar el denominador común más pequeño posible.
resumen: |
  El denominador común óptimo es el MCM de todos los denominadores originales, obtenido factorizándolos y tomando los factores únicos con su mayor exponente.
explicacion: |
  Suma: $\frac{1}{x^2} + \frac{1}{x^3}$.
  Si multiplicas los denominadores (método de aspas), obtienes $x^5$.
  La fracción quedaría $\frac{x^3 + x^2}{x^5}$. (Gigante y requiere simplificar después).

  Usando el MCM:
  Los denominadores son $x^2$ y $x^3$. El factor común es $x$, el mayor exponente es $3$.
  MCM = $x^3$.
  Amplificamos solo la primera por $x$: $\frac{x}{x^3}$. La segunda ya tiene el $x^3$.
  Suma: $\frac{x+1}{x^3}$.
  Es más directo y el resultado ya está casi simplificado.
procedimiento:
  - 'Paso 1: Factoriza los denominadores.'
  - 'Paso 2: Construye el MCM.'
  - 'Paso 3: Para cada fracción, multiplica su numerador por los factores del MCM que NO están en su denominador original.'
  - 'Paso 4: Pon la suma de esos nuevos numeradores sobre el MCM.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Suma $\frac{2}{ab} + \frac{3}{b^2}$.'
    solucion_pasos:
    - 'MCM entre $ab$ y $b^2$ es $ab^2$.'
    - 'A la 1ra le falta ''b'': numerador $2b$.'
    - 'A la 2da le falta ''a'': numerador $3a$.'
    - 'Suma: $\frac{2b + 3a}{ab^2}$.'
  - titulo: 'Suma $\frac{1}{2x} + \frac{1}{4x}$.'
    respuesta: '$\frac{3}{4x}$'
    solucion_pasos:
    - 'MCM es 4x. A la primera le falta 2. 2/4x + 1/4x = 3/4x.'
errores_frecuentes:
  - 'Usar el producto de todos los denominadores sin sacar MCM, resultando en polinomios difíciles de manejar.'
  - 'Multiplicar el numerador por todo el MCM en lugar de solo por el factor faltante.'
estado: publicado
