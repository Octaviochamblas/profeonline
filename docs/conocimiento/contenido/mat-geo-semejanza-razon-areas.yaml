semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.RAZON_AREAS
titulo: Relación entre áreas de figuras semejantes como cuadrado de la razón de semejanza
objetivo: Comprender que la razón entre las áreas de dos figuras semejantes es igual al cuadrado de su
  razón de semejanza.
introduccion: A diferencia de los perímetros (que escalan linealmente), las áreas de figuras semejantes
  se comportan de forma distinta, ya que involucran dos dimensiones a la vez.
resumen: La razón entre las áreas de dos figuras semejantes es igual al cuadrado de la razón de semejanza
  entre ellas.
explicacion: '![Razón entre áreas de figuras semejantes](/static/img/geometria/congruencia-semejanza/semejanza-razon-areas.svg)


  ### Definición formal


  Si dos figuras son semejantes con razón de semejanza $k$, entonces $\frac{A_2}{A_1}=k^2$, donde $A_1$
  y $A_2$ son sus áreas respectivas.


  ### Desarrollo didáctico


  Esto ocurre porque el área depende del producto de dos longitudes (por ejemplo, base×altura), y cada
  una de esas longitudes se multiplica por $k$, por lo que el área total se multiplica por $k\times k=k^2$.
  Por ejemplo, si un triángulo se amplía al doble ($k=2$), su área se cuadruplica ($k^2=4$).'
procedimiento:
- 'Paso 1: Determina la razón de semejanza $k$ entre las dos figuras.'
- 'Paso 2: Eleva esa razón al cuadrado para obtener la razón de áreas.'
- 'Paso 3: Multiplica el área conocida por $k^2$ para obtener el área de la otra figura.'
ejemplos:
- titulo: Calcular el área de una figura semejante ampliada
  enunciado: Un triángulo tiene área 10 cm²; su semejante tiene razón de semejanza 2.
  solucion_pasos:
  - Área del semejante = 10×2²=10×4=40 cm².
- titulo: Calcular la razón de semejanza a partir de áreas
  enunciado: Dos triángulos semejantes tienen áreas 8 cm² y 72 cm².
  solucion_pasos:
  - k²=72/8=9 → k=3.
- titulo: ¿Duplicar el tamaño de una figura cuadruplica su área?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, porque el área escala con el cuadrado de la razón: 2²=4.'
- titulo: ¿La razón de áreas es la misma que la razón de perímetros?
  respuesta: 'No'
  solucion_pasos:
  - No, la razón de áreas es el cuadrado de la razón de semejanza, mientras que la de perímetros es la
    razón misma.
errores_frecuentes:
- Confundir la razón de áreas con la razón de semejanza directa (olvidando elevar al cuadrado).
- Al despejar la razón de semejanza desde una razón de áreas, olvidar aplicar la raíz cuadrada.
- Aplicar la razón lineal de perímetros al calcular áreas.
fuente: 'Fuente: Cid 120.'
estado: publicado
