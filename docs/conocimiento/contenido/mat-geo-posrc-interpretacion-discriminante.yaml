semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.INTERPRETACION_DISCRIMINANTE
titulo: Interpretación del discriminante del sistema recta-circunferencia
objetivo: Interpretar el signo del discriminante de la ecuación cuadrática resultante del sistema recta-circunferencia,
  para determinar si la recta es secante, tangente o exterior sin necesidad de resolver completamente
  el sistema.
introduccion: Al igual que en cualquier ecuación cuadrática, el discriminante anticipa cuántas soluciones
  reales existen, lo que en este contexto se traduce directamente en el tipo de posición relativa entre
  la recta y la circunferencia.
resumen: 'Si al sustituir la recta en la circunferencia se obtiene la ecuación cuadrática $Ax^2+Bx+C=0$,
  su discriminante $\Delta=B^2-4AC$ determina la posición relativa: si $\Delta>0$, la recta es secante
  (dos puntos); si $\Delta=0$, es tangente (un punto); si $\Delta<0$, es exterior (ningún punto real).'
explicacion: '![Interpretación del discriminante recta-circunferencia](/static/img/geometria/analitica/posrc-interpretacion-discriminante.svg)


  ### Definición formal


  El discriminante $\Delta=B^2-4AC$ de la ecuación cuadrática obtenida al sustituir la recta en la circunferencia
  determina el número de soluciones reales: dos si $\Delta>0$ (secante), una si $\Delta=0$ (tangente),
  ninguna si $\Delta<0$ (exterior).


  ### Desarrollo didáctico


  En la figura, las rectas $y=2$, $y=4$ e $y=6$ se relacionan con la circunferencia $x^2+y^2=16$ (radio
  4) de tres formas distintas: la primera es secante (discriminante positivo), la segunda es tangente
  (discriminante cero, ya que toca justo en el punto más alto), y la tercera es exterior (discriminante
  negativo).'
procedimiento:
- 'Paso 1: Sustituye la ecuación de la recta en la de la circunferencia para obtener una ecuación cuadrática.'
- 'Paso 2: Calcula el discriminante Δ=B²-4AC de esa ecuación cuadrática.'
- 'Paso 3: Interpreta el signo de Δ: positivo (secante), cero (tangente), negativo (exterior).'
ejemplos:
- titulo: Interpretar un discriminante positivo
  enunciado: Δ=36 (positivo).
  solucion_pasos:
  - Como Δ>0, la recta es secante a la circunferencia, cortándola en dos puntos distintos.
- titulo: Interpretar un discriminante igual a cero
  enunciado: Δ=0.
  solucion_pasos:
  - Como Δ=0, la recta es tangente a la circunferencia, tocándola en un único punto.
- titulo: ¿Un discriminante negativo indica que la recta es exterior a la circunferencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, un discriminante negativo significa que no existen soluciones reales, es decir, no hay puntos
    de intersección.
- titulo: ¿Es necesario resolver completamente la ecuación cuadrática para saber el tipo de posición relativa?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con calcular el signo del discriminante, sin necesidad de encontrar los valores exactos
    de las soluciones.
errores_frecuentes:
- Confundir el signo del discriminante con el número de soluciones (por ejemplo, asociar discriminante
  positivo con una única solución).
- Cometer errores al calcular A, B o C de la ecuación cuadrática antes de aplicar la fórmula del discriminante.
- Olvidar que un discriminante negativo no significa un error de cálculo, sino que simplemente no existen
  soluciones reales.
fuente: Elaboración propia.
estado: publicado
