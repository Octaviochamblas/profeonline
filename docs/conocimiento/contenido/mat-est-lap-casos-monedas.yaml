semantic_id: MAT.EST.LAPLACE_MUESTRALES.CASOS_MONEDAS
titulo: Determinación de casos totales en el lanzamiento de varias monedas
objetivo: Determinar el número de casos totales al lanzar varias monedas simultáneamente, aplicando el
  principio multiplicativo (potencias de 2).
introduccion: Cada moneda adicional que se lanza multiplica por 2 el número de resultados posibles, ya
  que cada una puede dar cara o sello independientemente de las demás.
resumen: Al lanzar $n$ monedas, el número de casos totales es $n(S)=2^n$, ya que cada moneda tiene 2 resultados
  posibles independientes.
explicacion: '![Casos totales al lanzar monedas](/static/img/probabilidad/laplace/lap-casos-monedas.svg)


  ### Definición formal


  Si se lanzan $n$ monedas, cada una con 2 resultados posibles (cara o sello), el espacio muestral tiene
  $n(S)=2^n$ elementos, por el principio multiplicativo.


  ### Desarrollo didáctico


  Al lanzar 2 monedas, $n(S)=2^2=4$: los resultados son $\{CC,CS,SC,SS\}$. Al lanzar 3 monedas, $n(S)=2^3=8$.'
procedimiento:
- 'Paso 1: Identifica cuántas monedas se están lanzando (n).'
- 'Paso 2: Aplica la fórmula n(S)=2^n, ya que cada moneda tiene 2 resultados posibles.'
- 'Paso 3: Si es necesario, lista explícitamente todas las combinaciones para verificar el resultado.'
ejemplos:
- titulo: Calcular los casos totales al lanzar 2 monedas
  enunciado: n=2 monedas.
  solucion_pasos:
  - 'n(S)=2²=4: {CC,CS,SC,SS}.'
- titulo: Calcular los casos totales al lanzar 3 monedas
  enunciado: n=3 monedas.
  solucion_pasos:
  - n(S)=2³=8.
- titulo: ¿El número de casos totales crece exponencialmente con el número de monedas?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que cada moneda adicional multiplica por 2 el total de casos.
- titulo: ¿Los resultados CS y SC se consideran distintos al lanzar dos monedas?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que se distingue cuál moneda dio cara y cuál dio sello, aunque el conjunto de resultados sea
    el mismo.
errores_frecuentes:
- Confundir el número de monedas con el número de casos totales sin aplicar la potencia correspondiente.
- Olvidar que CS y SC son resultados distintos si se distingue el orden o la identidad de cada moneda.
- Calcular incorrectamente la potencia de 2 correspondiente al número de monedas lanzadas.
fuente: 'Elaboración propia (referencia: Moraleja 404).'
estado: publicado
