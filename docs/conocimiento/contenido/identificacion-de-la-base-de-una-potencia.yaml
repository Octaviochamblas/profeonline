semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.BASE_IDENTIFICACION
titulo: Identificación de la base de una potencia
objetivo: Identificar la base completa de una potencia.
introduccion: En una potencia negativa, un par de paréntesis puede cambiar el resultado. Antes de aplicar
  cualquier propiedad hay que decidir con exactitud qué expresión está siendo elevada.
resumen: La base es la cantidad que se eleva y constituye el factor repetido. Los paréntesis determinan
  si un signo forma parte de la base.
explicacion: 'La base es la cantidad que se eleva y constituye el factor repetido.


  En el caso “en \((-5)^3\), la base completa es \(-5\) porque el signo está dentro de los paréntesis”
  esta idea se hace visible: los paréntesis determinan si un signo forma parte de la base'
procedimiento:
- 'Paso 1: Localiza el exponente y observa qué expresión queda directamente bajo él.'
- 'Paso 2: Incluye signos, fracciones o paréntesis que pertenezcan a esa expresión.'
- 'Paso 3: Expande un caso pequeño para comprobar que elegiste la base correcta.'
ejemplos:
- titulo: Aplicación razonada — Identificación de la base de una potencia
  enunciado: En \((-5)^3\), la base completa es \(-5\) porque el signo está dentro de los paréntesis.
  solucion_pasos:
  - Localiza el exponente y observa qué expresión queda directamente bajo él.
  - Incluye signos, fracciones o paréntesis que pertenezcan a esa expresión.
  - Expande un caso pequeño para comprobar que elegiste la base correcta.
- titulo: Revisión de una solución — Identificación de la base de una potencia
  enunciado: Una solución aplica “Incluye signos, fracciones o paréntesis que pertenezcan a esa expresión.”,
    pero termina sin comprobar que los paréntesis determinan si un signo forma parte de la base. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de la base de una potencia: la base es la cantidad
    que se eleva y constituye el factor repetido.'
  - Localiza el exponente y observa qué expresión queda directamente bajo él.
  - 'Completa la revisión con este control: Expande un caso pequeño para comprobar que elegiste la base
    correcta.'
- titulo: ¿Se cumple que los paréntesis determinan si un signo forma parte de la base? — Identificación
    de la base de una potencia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la base es la cantidad que se eleva y constituye el factor
    repetido.
  - El caso “en \((-5)^3\), la base completa es \(-5\) porque el signo está dentro de los paréntesis”
    satisface esa condición.
  - Expande un caso pequeño para comprobar que elegiste la base correcta.
- titulo: ¿Es válido omitir el paso “Localiza el exponente y observa qué expresión queda directamente
    bajo él”? — Identificación de la base de una potencia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de la base de una potencia.
  - 'Omitirlo puede volver inválida la acción siguiente: Incluye signos, fracciones o paréntesis que pertenezcan
    a esa expresión.'
  - 'La solución debe terminar de este modo: Expande un caso pequeño para comprobar que elegiste la base
    correcta.'
errores_frecuentes:
- 'Confundir identificación de la base de una potencia con otro concepto y omitir este inicio: Localiza
  el exponente y observa qué expresión queda directamente bajo él.'
- Aplicar mecánicamente “Incluye signos, fracciones o paréntesis que pertenezcan a esa expresión.” sin
  revisar las condiciones de la definición.
- Tomar “en \((-5)^3\), la base completa es \(-5\) porque el signo está dentro de los paréntesis” como
  una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “los paréntesis determinan si un signo forma parte
  de la base”.
- 'Terminar el desarrollo sin realizar este control: Expande un caso pequeño para comprobar que elegiste
  la base correcta.'
