semantic_id: MAT.EST.MODA_ANALISIS.INTERVALO_MODAL
titulo: Determinar el intervalo modal en datos agrupados
objetivo: Determinar el intervalo modal como el intervalo de clase con mayor frecuencia dentro de una
  tabla de datos agrupados.
introduccion: Cuando los datos están agrupados en intervalos, no se puede determinar una moda puntual
  exacta, sino el intervalo donde se concentra la mayor frecuencia.
resumen: El intervalo modal es el intervalo de clase que presenta la mayor frecuencia dentro de una tabla
  de datos agrupados.
explicacion: '![Intervalo modal en datos agrupados](/static/img/estadistica/moda/moda-intervalo-modal.svg)


  ### Definición formal


  El intervalo modal es aquel intervalo $[LI_i, LS_i)$ cuya frecuencia $f_i$ es la máxima entre todos
  los intervalos de la tabla.


  ### Desarrollo didáctico


  Con intervalos [10-20) f=2, [20-30) f=7, [30-40) f=3, el intervalo con mayor frecuencia es [20-30),
  por lo que ese es el intervalo modal.'
procedimiento:
- 'Paso 1: Observa la columna de frecuencias de la tabla de datos agrupados.'
- 'Paso 2: Identifica cuál intervalo tiene la frecuencia más alta.'
- 'Paso 3: Ese intervalo es el intervalo modal (no se determina un valor puntual exacto, sino el rango
  completo).'
ejemplos:
- titulo: Determinar el intervalo modal con 3 intervalos
  enunciado: '[10-20) f=2, [20-30) f=7, [30-40) f=3.'
  solucion_pasos:
  - El intervalo [20-30) tiene la mayor frecuencia (7). Es el intervalo modal.
- titulo: Determinar el intervalo modal de estaturas
  enunciado: '[150-160) f=5, [160-170) f=12, [170-180) f=8.'
  solucion_pasos:
  - El intervalo [160-170) tiene la mayor frecuencia (12). Es el intervalo modal.
- titulo: ¿El intervalo modal es un rango, no un valor puntual único?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de la moda en datos no agrupados, aquí se reporta el intervalo completo.
- titulo: ¿Se puede usar la marca de clase del intervalo modal como una aproximación puntual de la moda?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una aproximación común cuando se necesita un valor puntual representativo.
errores_frecuentes:
- Confundir el intervalo modal con la marca de clase de otro intervalo distinto al de mayor frecuencia.
- No revisar todos los intervalos de la tabla antes de determinar cuál tiene realmente la frecuencia máxima.
- Reportar un valor puntual exacto como si fuera 'la moda', cuando en realidad con datos agrupados solo
  se puede determinar el intervalo modal.
fuente: 'Elaboración propia (referencia: Moraleja 362).'
estado: publicado
