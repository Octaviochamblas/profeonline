semantic_id: MAT.NUM.PROP_COMPUESTA.PROBLEMAS_CONTEXTO
titulo: Resolución de problemas de proporcionalidad compuesta
objetivo: Resolver problemas cotidianos complejos que involucren proporcionalidad compuesta.
introduccion: 'Ya tienes todas las herramientas: sabes identificar las variables, ver si son directas
  o inversas, y armar la ecuación. Ahora pondremos a prueba tu destreza con problemas reales de fábricas,
  viajes y presupuestos.'
resumen: La resolución en contexto exige leer cuidadosamente, armar la tabla de datos, analizar las relaciones
  respecto a la incógnita, y resolver la ecuación sin mezclar los números.
explicacion: "En los problemas de contexto extenso, el mayor desafío es la **extracción de datos**. \n\
  1. Haz una tabla donde las columnas sean las variables y las filas sean los 'Escenarios' (el escenario\
  \ de datos conocidos y el de la incógnita).\n2. Siempre deja la columna de la incógnita al final o al\
  \ principio para aislarla fácilmente.\n3. Revisa las unidades: si el tiempo inicial está en horas y\
  \ el final en minutos, ¡debes convertirlos antes de operar!"
procedimiento:
- 'Paso 1: Extrae los datos y arma una tabla limpia.'
- 'Paso 2: Comprueba unidades (ej: que todos los tiempos estén en la misma medida).'
- 'Paso 3: Aplica el método de igualación de fracciones o la fórmula generalizada para obtener el resultado.'
ejemplos:
- titulo: Transporte de mercancía
  enunciado: 3 camiones transportan 12 toneladas en 6 viajes. ¿Cuántos viajes harán 4 camiones para transportar
    16 toneladas?
  solucion_pasos:
  - 'Incógnita: Viajes ($x$). Variables: Camiones, Toneladas.'
  - 'Viajes vs Camiones: Inversa (más camiones, menos viajes). Viajes vs Toneladas: Directa (más toneladas,
    más viajes).'
  - 'Fracción Viajes: $6/x$. Fracción Camiones (invierte): $4/3$. Fracción Toneladas (mantiene): $12/16
    = 3/4$.'
  - 'Ecuación: $6/x = (4/3) \cdot (3/4) = 1$.'
  - $6/x = 1 \implies x = 6$ viajes.
errores_frecuentes:
- Operar con unidades mixtas (meses y días, kilos y toneladas) sin convertirlas.
- Confundirse al momento de despejar $x$ cuando queda en el denominador.
- Armar mal la tabla cruzando datos de la primera oración con la segunda.
fuente: Currículum Nacional MINEDUC.
estado: publicado
