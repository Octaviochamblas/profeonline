semantic_id: MAT.GEO.TRIG_CUADRANTES.REDUCCION_COSENO
titulo: Reducción del coseno al primer cuadrante usando ángulo de referencia
objetivo: Calcular el coseno de un ángulo no agudo expresándolo en función del coseno de su ángulo de
  referencia, con el signo correspondiente al cuadrante.
introduccion: Al igual que con el seno, el coseno de cualquier ángulo puede obtenerse a partir del coseno
  de su ángulo de referencia (agudo), ajustando el signo según el cuadrante.
resumen: 'El coseno de un ángulo $\theta$ es igual al coseno de su ángulo de referencia $\alpha$, con
  el signo correspondiente al cuadrante de $\theta$: $\cos\theta=\pm\cos\alpha$.'
explicacion: '![Reducción del coseno al primer cuadrante](/static/img/geometria/trigonometria/trigcuad-reduccion-coseno.svg)


  ### Definición formal


  Si $\alpha$ es el ángulo de referencia de $\theta$, entonces $|\cos\theta|=\cos\alpha$, y el signo de
  $\cos\theta$ se determina según el cuadrante de $\theta$ (positivo en I y IV, negativo en II y III).


  ### Desarrollo didáctico


  Para $\theta=210°$ (tercer cuadrante), el ángulo de referencia es $\alpha=30°$. Como el coseno es negativo
  en el tercer cuadrante, $\cos210°=-\cos30°=-\dfrac{\sqrt3}{2}$.'
procedimiento:
- 'Paso 1: Calcula el ángulo de referencia α del ángulo θ dado.'
- 'Paso 2: Calcula cosα usando los valores conocidos de ángulos notables o agudos.'
- 'Paso 3: Asigna el signo correspondiente al cuadrante de θ para obtener cosθ=±cosα.'
ejemplos:
- titulo: Calcular cos(210°) usando el ángulo de referencia
  enunciado: θ=210°, α=30°, tercer cuadrante.
  solucion_pasos:
  - cos210°=-cos30°=-√3/2, negativo porque el coseno es negativo en el tercer cuadrante.
- titulo: Calcular cos(330°) usando el ángulo de referencia
  enunciado: θ=330°, α=30°, cuarto cuadrante.
  solucion_pasos:
  - cos330°=+cos30°=√3/2, positivo porque el coseno es positivo en el cuarto cuadrante.
- titulo: ¿El valor absoluto de cosθ es igual al de cosα?
  respuesta: Sí
  solucion_pasos:
  - Sí, |cosθ|=cosα siempre, solo cambia el signo según el cuadrante.
- titulo: ¿El coseno de un ángulo del segundo cuadrante es positivo?
  respuesta: 'No'
  solucion_pasos:
  - No, el coseno es negativo en el segundo cuadrante.
errores_frecuentes:
- Olvidar aplicar el signo correspondiente al cuadrante del ángulo original.
- Calcular mal el ángulo de referencia antes de aplicar la reducción.
- Confundir la reducción del coseno con la del seno, aplicando el signo equivocado.
fuente: Elaboración propia.
estado: publicado
