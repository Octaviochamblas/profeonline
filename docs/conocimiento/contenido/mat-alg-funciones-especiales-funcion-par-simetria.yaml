semantic_id: MAT.ALG.FUNCIONES_ESPECIALES.FUNCION_PAR_SIMETRIA
titulo: Reconocimiento de simetría respecto del eje de las ordenadas
objetivo: Reconocer gráficamente una función par identificando la simetría de su gráfica respecto al eje $y$.
introduccion: Si doblaras el papel exactamente sobre el eje vertical, la gráfica de una función par calzaría perfectamente
  consigo misma en ambos lados.
resumen: 'La gráfica de una función par es **simétrica respecto al eje $y$** (eje de las ordenadas): el lado izquierdo
  de la curva es el reflejo especular exacto del lado derecho.'
explicacion: '### Definición formal


  Geométricamente, $f(-x)=f(x)$ significa que el punto $(-a, f(a))$ pertenece a la gráfica siempre que $(a, f(a))$
  también pertenezca a ella. Esto equivale a que la gráfica completa sea invariante bajo la reflexión respecto
  al eje $y$.


  ### Desarrollo didáctico


  Para reconocer visualmente una función par, observa si existe un "espejo" vertical en $x=0$ tal que ambos lados
  de la curva sean idénticos.


  La parábola $f(x)=x^2$ es el ejemplo clásico: su lado izquierdo (para $x<0$) es un reflejo perfecto de su lado
  derecho (para $x>0$), con el eje $y$ como línea de simetría.'
procedimiento:
- 'Paso 1: Observa la gráfica de la función a ambos lados del eje $y$.'
- 'Paso 2: Verifica si el lado izquierdo es exactamente el reflejo especular del lado derecho.'
- 'Paso 3: Si se cumple esa simetría, la función es par.'
ejemplos:
- titulo: Reconocimiento en una parábola
  enunciado: '¿Es simétrica respecto al eje $y$ la gráfica de $f(x)=x^2-4$?'
  solucion_pasos:
  - El vértice está sobre el eje $y$ en $(0,-4)$.
  - Ambos lados de la parábola son reflejos exactos entre sí.
  - Sí, es simétrica respecto al eje $y$.
- titulo: Reconocimiento de ausencia de simetría par
  enunciado: '¿Es simétrica respecto al eje $y$ la gráfica de $f(x)=x^3$?'
  solucion_pasos:
  - El lado izquierdo de la curva cúbica no coincide con el lado derecho al reflejarlo en el eje $y$.
  - No es simétrica respecto al eje $y$.
- titulo: ¿Una gráfica simétrica respecto al eje $y$ corresponde siempre a una función par?
  enunciado: ¿Una gráfica simétrica respecto al eje $y$ corresponde siempre a una función par?
  respuesta: Sí
  solucion_pasos:
  - Esa simetría geométrica es la traducción visual exacta de la condición algebraica $f(-x)=f(x)$.
- titulo: ¿La simetría de una función par es respecto al eje $x$?
  enunciado: ¿La simetría de una función par es respecto al eje $x$?
  respuesta: 'No'
  solucion_pasos:
  - La simetría de una función par es respecto al eje $y$ (vertical), no al eje $x$.
errores_frecuentes:
- Confundir la simetría respecto al eje $y$ (función par) con la simetría respecto al origen (función impar).
- Concluir paridad observando solo un segmento pequeño de la curva sin verificar toda la gráfica visible.
- Confundir simetría respecto al eje $x$ (que ni siquiera correspondería a una función) con la respecto al eje
  $y$.
- Suponer que toda parábola es necesariamente par, sin considerar desplazamientos horizontales.
