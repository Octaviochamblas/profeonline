semantic_id: MAT.NUM.IRRACIONALES.DEFINICION
titulo: Definición de número irracional
objetivo: Reconocer un irracional a partir de su representación.
introduccion: 'La diagonal de un cuadrado de lado 1 mide \(\sqrt{2}\): una longitud perfectamente concreta
  que ninguna fracción representa exactamente. Esa tensión entre geometría y aritmética motiva los números
  irracionales.'
resumen: Un número irracional es un real que no puede escribirse como cociente de dos enteros. Los irracionales
  completan los puntos de la recta que no cubre \(\mathbb{Q}\).
explicacion: 'Un número irracional es un real que no puede escribirse como cociente de dos enteros.


  En el caso “\(\sqrt{2}\) no admite una fracción exacta y su decimal \(1.4142\ldots\) no termina ni presenta
  período” esta idea se hace visible: los irracionales completan los puntos de la recta que no cubre \(\mathbb{Q}\)'
procedimiento:
- 'Paso 1: Descarta primero que el número sea un decimal finito o periódico.'
- 'Paso 2: Comprueba si existe una representación exacta como cociente de enteros.'
- 'Paso 3: Clasifica como irracional solo cuando esa representación racional no existe.'
ejemplos:
- titulo: Aplicación razonada — Definición de número irracional
  enunciado: \(\sqrt{2}\) no admite una fracción exacta y su decimal \(1.4142\ldots\) no termina ni presenta
    período.
  solucion_pasos:
  - Descarta primero que el número sea un decimal finito o periódico.
  - Comprueba si existe una representación exacta como cociente de enteros.
  - Clasifica como irracional solo cuando esa representación racional no existe.
- titulo: Revisión de una solución — Definición de número irracional
  enunciado: Una solución aplica “Comprueba si existe una representación exacta como cociente de enteros.”,
    pero termina sin comprobar que los irracionales completan los puntos de la recta que no cubre \(\mathbb{Q}\).
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define definición de número irracional: un número irracional es un real
    que no puede escribirse como cociente de dos enteros.'
  - Descarta primero que el número sea un decimal finito o periódico.
  - 'Completa la revisión con este control: Clasifica como irracional solo cuando esa representación racional
    no existe.'
- titulo: ¿Se cumple que los irracionales completan los puntos de la recta que no cubre \(\mathbb{Q}\)?
    — Definición de número irracional
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un número irracional es un real que no puede escribirse
    como cociente de dos enteros.
  - El caso “\(\sqrt{2}\) no admite una fracción exacta y su decimal \(1.4142\ldots\) no termina ni presenta
    período” satisface esa condición.
  - Clasifica como irracional solo cuando esa representación racional no existe.
- titulo: ¿Es válido omitir el paso “Descarta primero que el número sea un decimal finito o periódico”?
    — Definición de número irracional
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de definición de número irracional.
  - 'Omitirlo puede volver inválida la acción siguiente: Comprueba si existe una representación exacta
    como cociente de enteros.'
  - 'La solución debe terminar de este modo: Clasifica como irracional solo cuando esa representación
    racional no existe.'
errores_frecuentes:
- 'Confundir definición de número irracional con otro concepto y omitir este inicio: Descarta primero
  que el número sea un decimal finito o periódico.'
- Aplicar mecánicamente “Comprueba si existe una representación exacta como cociente de enteros.” sin
  revisar las condiciones de la definición.
- Tomar “\(\sqrt{2}\) no admite una fracción exacta y su decimal \(1.4142\ldots\) no termina ni presenta
  período” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “los irracionales completan los puntos de la recta
  que no cubre \(\mathbb{Q}\)”.
- 'Terminar el desarrollo sin realizar este control: Clasifica como irracional solo cuando esa representación
  racional no existe.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
