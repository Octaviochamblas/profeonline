semantic_id: MAT.EST.PROBA_COND_BASE.CALCULO_DIRECTO
titulo: Cálculo directo de probabilidad condicional en conjuntos finitos
objetivo: Calcular directamente una probabilidad condicional en un espacio muestral finito, contando los
  elementos del evento restringido sin necesidad de aplicar la fórmula de intersección.
introduccion: En espacios muestrales pequeños, a veces es más simple contar directamente los elementos
  favorables dentro del universo restringido que aplicar la fórmula formal.
resumen: En un espacio muestral finito, $P(A|B)$ puede calcularse directamente como el número de elementos
  que están en $A$ y en $B$, dividido por el número total de elementos en $B$.
explicacion: '![Cálculo directo de probabilidad condicional](/static/img/probabilidad/condbase/condbase-calculo-directo.svg)


  ### Definición formal


  $P(A|B)=\dfrac{n(A\cap B)}{n(B)}$, equivalente a la fórmula con probabilidades, ya que ambos numerador
  y denominador se dividen por $n(S)$.


  ### Desarrollo didáctico


  Al lanzar un dado, con $B=\{4,5,6\}$ (mayor que 3) y buscando $A$=''par'' dentro de ese universo: de
  los 3 elementos de B, 2 son pares (4 y 6), por lo que $P(A|B)=\dfrac{2}{3}$ directamente, sin pasar
  por probabilidades intermedias.'
procedimiento:
- 'Paso 1: Identifica los elementos del espacio muestral que pertenecen al evento condicionante B.'
- 'Paso 2: De esos elementos, cuenta cuántos también cumplen la condición del evento A.'
- 'Paso 3: Divide ese conteo por el total de elementos de B para obtener P(A|B) directamente.'
ejemplos:
- titulo: Calcular P(par|mayor que 3) directamente
  enunciado: B={4,5,6}, de los cuales A={4,6} son pares.
  solucion_pasos:
  - P(A|B)=2/3.
- titulo: Calcular P(rey|figura) directamente en un mazo
  enunciado: 12 figuras en total, de las cuales 4 son reyes.
  solucion_pasos:
  - P(rey|figura)=4/12=1/3.
- titulo: ¿Este método de conteo directo da el mismo resultado que la fórmula P(A∩B)/P(B)?
  respuesta: Sí
  solucion_pasos:
  - Sí, son matemáticamente equivalentes, ya que ambos se derivan de dividir por n(S) internamente.
- titulo: ¿Este método es útil cuando se cuenta con el espacio muestral completo listado?
  respuesta: Sí
  solucion_pasos:
  - Sí, en esos casos suele ser más directo que aplicar la fórmula con probabilidades.
errores_frecuentes:
- Contar sobre el espacio muestral completo en vez de restringirse al evento condicionante B.
- Confundir n(A∩B) con n(A) al hacer el conteo dentro del universo restringido.
- Olvidar que el denominador de este método es n(B), no n(S).
fuente: 'Elaboración propia (referencia: Moraleja 411).'
estado: publicado
