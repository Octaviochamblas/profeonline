semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.INVERSA_GRAFICA
titulo: Interpretación de la simetría gráfica entre una función y su inversa
objetivo: Reconocer que las gráficas de una función y su inversa son simétricas respecto a la recta identidad
  $y=x$.
introduccion: Existe un espejo matemático especial, la recta $y=x$, y la gráfica de la función inversa
  es exactamente el reflejo de la función original en ese espejo.
resumen: 'Las gráficas de una función invertible $f$ y su inversa $f^{-1}$ son **simétricas respecto a
  la recta $y=x$**: si $(a,b)$ pertenece a la gráfica de $f$, entonces $(b,a)$ pertenece a la gráfica
  de $f^{-1}$.'
explicacion: '### Definición formal


  Si $f(a)=b$, entonces $f^{-1}(b)=a$ por definición de función inversa. Geométricamente, el punto $(a,b)$
  de la gráfica de $f$ tiene su punto simétrico $(b,a)$ en la gráfica de $f^{-1}$, siendo la recta $y=x$
  el eje de esa simetría.


  ### Desarrollo didáctico


  Para dibujar rápidamente la gráfica de $f^{-1}$ a partir de la de $f$, basta con reflejar cada punto
  respecto a la diagonal $y=x$: intercambiar sus coordenadas.


  Si $f$ pasa por $(2,7)$, entonces $f^{-1}$ pasa por $(7,2)$. Si se dibuja la recta $y=x$ como referencia,
  ambas gráficas aparecen como reflejos una de la otra.'
procedimiento:
- 'Paso 1: Identifica varios puntos de la gráfica de $f$.'
- 'Paso 2: Intercambia las coordenadas de cada punto para obtener los puntos correspondientes de $f^{-1}$.'
- 'Paso 3: Grafica esos nuevos puntos y traza la curva de $f^{-1}$.'
- 'Paso 4: Verifica que ambas gráficas sean simétricas respecto a la recta $y=x$.'
ejemplos:
- titulo: Determinación de un punto de la inversa por simetría
  enunciado: Si la gráfica de $f$ pasa por $(3,10)$, determina un punto de la gráfica de $f^{-1}$.
  solucion_pasos:
  - Se intercambian las coordenadas del punto.
  - $f^{-1}$ pasa por $(10,3)$.
- titulo: Reconocimiento de simetría en la función identidad
  enunciado: ¿Qué ocurre con la gráfica de $f(x)=x$ (identidad) respecto a su inversa?
  solucion_pasos:
  - La identidad es su propia inversa, $f^{-1}(x)=x$.
  - Su gráfica coincide exactamente consigo misma, siendo simétrica respecto a $y=x$ trivialmente.
- titulo: ¿Si $(a,b)$ pertenece a la gráfica de $f$, entonces $(b,a)$ pertenece a la gráfica de $f^{-1}$?
  enunciado: ¿Si $(a,b)$ pertenece a la gráfica de $f$, entonces $(b,a)$ pertenece a la gráfica de $f^{-1}$?
  respuesta: Sí
  solucion_pasos:
  - Es la traducción geométrica directa de la relación $f(a)=b \iff f^{-1}(b)=a$.
- titulo: ¿La recta de simetría entre una función y su inversa es siempre $y=x$?
  enunciado: ¿La recta de simetría entre una función y su inversa es siempre $y=x$?
  respuesta: Sí
  solucion_pasos:
  - Esa es la recta identidad, eje de simetría constante para toda función y su inversa.
errores_frecuentes:
- Confundir la simetría respecto a $y=x$ con la simetría respecto al eje $x$ o al eje $y$.
- Olvidar intercambiar ambas coordenadas al construir un punto de la inversa.
- Creer que toda función y su inversa se cruzan necesariamente en algún punto.
- Suponer que la simetría aplica solo a funciones lineales.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
