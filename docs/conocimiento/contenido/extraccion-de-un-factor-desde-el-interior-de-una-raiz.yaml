semantic_id: MAT.NUM.RAICES_PROPIEDADES.EXTRACCION_FACTOR_SUBRADICAL
titulo: Extracción de un factor desde el interior de una raíz
objetivo: Extraer factores perfectos desde un radical.
introduccion: Simplificar un radical consiste en separar dentro del radicando la mayor potencia perfecta
  posible. El factor extraído conserva la exactitud.
resumen: Un factor que forma una potencia perfecta puede salir del radical. Solo salen grupos completos
  de tantos factores como indique el índice.
explicacion: 'Un factor que forma una potencia perfecta puede salir del radical.


  La situación “\(\sqrt{72}=\sqrt{36\cdot2}=6\sqrt2\)” permite comprobar, y no solo memorizar, que solo
  salen grupos completos de tantos factores como indique el índice'
procedimiento:
- 'Paso 1: Factoriza el radicando y forma grupos según el índice.'
- 'Paso 2: Extrae un factor por cada grupo completo y deja los restantes dentro.'
- 'Paso 3: Eleva o vuelve a ingresar el factor para comprobar que recuperas el radicando.'
ejemplos:
- titulo: Aplicación razonada — Extracción de un factor desde el interior de una raíz
  enunciado: \(\sqrt{72}=\sqrt{36\cdot2}=6\sqrt2\).
  solucion_pasos:
  - Factoriza el radicando y forma grupos según el índice.
  - Extrae un factor por cada grupo completo y deja los restantes dentro.
  - Eleva o vuelve a ingresar el factor para comprobar que recuperas el radicando.
- titulo: Revisión de una solución — Extracción de un factor desde el interior de una raíz
  enunciado: Una solución aplica “Extrae un factor por cada grupo completo y deja los restantes dentro.”,
    pero termina sin comprobar que solo salen grupos completos de tantos factores como indique el índice.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define extracción de un factor desde el interior de una raíz: un factor
    que forma una potencia perfecta puede salir del radical.'
  - Factoriza el radicando y forma grupos según el índice.
  - 'Completa la revisión con este control: Eleva o vuelve a ingresar el factor para comprobar que recuperas
    el radicando.'
- titulo: ¿Se cumple que solo salen grupos completos de tantos factores como indique el índice? — Extracción
    de un factor desde el interior de una raíz
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un factor que forma una potencia perfecta puede salir del
    radical.
  - El caso “\(\sqrt{72}=\sqrt{36\cdot2}=6\sqrt2\)” satisface esa condición.
  - Eleva o vuelve a ingresar el factor para comprobar que recuperas el radicando.
- titulo: ¿Es válido omitir el paso “Factoriza el radicando y forma grupos según el índice”? — Extracción
    de un factor desde el interior de una raíz
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de extracción de un factor desde el interior de una
    raíz.
  - 'Omitirlo puede volver inválida la acción siguiente: Extrae un factor por cada grupo completo y deja
    los restantes dentro.'
  - 'La solución debe terminar de este modo: Eleva o vuelve a ingresar el factor para comprobar que recuperas
    el radicando.'
errores_frecuentes:
- 'Confundir extracción de un factor desde el interior de una raíz con otro concepto y omitir este inicio:
  Factoriza el radicando y forma grupos según el índice.'
- Aplicar mecánicamente “Extrae un factor por cada grupo completo y deja los restantes dentro.” sin revisar
  las condiciones de la definición.
- Tomar “\(\sqrt{72}=\sqrt{36\cdot2}=6\sqrt2\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “solo salen grupos completos de tantos factores como
  indique el índice”.
- 'Terminar el desarrollo sin realizar este control: Eleva o vuelve a ingresar el factor para comprobar
  que recuperas el radicando.'
