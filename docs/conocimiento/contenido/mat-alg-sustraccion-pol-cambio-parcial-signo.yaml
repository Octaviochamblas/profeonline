semantic_id: MAT.ALG.SUSTRACCION_POL.CAMBIO_PARCIAL_SIGNO
objetivo: Reconocer y evitar el error de cambio parcial de signo en la sustracciĂłn de polinomios.
introduccion: Similar al error del signo negativo, pero en el contexto de la sustracciĂłn de polinomios completos.
  AquĂ­ el error sucede cuando se cambia solo el signo de algunos tĂŠrminos del sustraendo, no de todos.
resumen: El **Cambio Parcial de Signo** es el error de invertir el signo de solo una parte de los tĂŠrminos del sustraendo
  al restar un polinomio. La regla de la sustracciĂłn exige invertir TODOS los signos del sustraendo, sin excepciĂłn.
explicacion: '### DefiniciĂłn formal


  Opuesto completo: $(-3m+n-4)$. Suma: $8m+2n-3m+n-4 = 5m+3n-4$. El alumno olvidĂł cambiar $-n$ a $+n$ y $+4$ a $-4$.


  ### Desarrollo didĂĄctico


  Calculemos $(7a + 3b - 2) - (4a - b + 5)$.


  Opuesto correcto del sustraendo $(4a - b + 5)$:

  $(-4a + b - 5)$.


  Suma correcta:

  $(7a + 3b - 2) + (-4a + b - 5) = 3a + 4b - 7$.


  Error de cambio parcial (solo cambia el primer tĂŠrmino):

  $(7a + 3b - 2) + (-4a - b + 5) = 3a + 2b + 3$ â MAL.


  Diferencia: El $-b$ del sustraendo debĂ­a convertirse en $+b$, pero al hacerlo parcialmente quedĂł como $-b$.'
procedimiento:
- 'Paso 1: Escribe el sustraendo completo.'
- 'Paso 2: Identifica cuĂĄntos tĂŠrminos tiene. Cuenta: 1, 2, 3.'
- 'Paso 3: Invierte el signo de CADA UNO de ellos, uno por uno.'
- 'Paso 4: Verifica la cantidad: el opuesto debe tener exactamente el mismo nĂşmero de tĂŠrminos.'
- 'Opuesto completo: $(-3m+n-4)$. Suma: $8m+2n-3m+n-4 = 5m+3n-4$. El alumno olvidĂł cambiar $-n$ a $+n$ y $+4$ a
  $-4$.'
ejemplos:
- titulo: El cambio incompleto
