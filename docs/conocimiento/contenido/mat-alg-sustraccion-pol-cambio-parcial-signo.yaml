  solucion_pasos:
  - El sustraendo es (3x - 2y).
  - Su opuesto es (-3x + 2y).
  - El cĂĄlculo errĂłneo convirtiĂł -2y en -2y en lugar de +2y.
  - 'Resultado correcto: 10x - 4y - 3x + 2y = 7x - 2y.'
