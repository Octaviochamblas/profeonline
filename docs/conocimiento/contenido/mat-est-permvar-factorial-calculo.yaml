semantic_id: MAT.EST.PERMUTACIONES_VARIACIONES.FACTORIAL_CALCULO
titulo: Cálculo de expresiones factoriales simples
objetivo: Calcular el valor numérico de expresiones factoriales simples, aplicando directamente la definición
  de factorial.
introduccion: Más allá de conocer la definición, es fundamental practicar el cálculo directo de factoriales
  para distintos valores de n.
resumen: Para calcular $n!$, se multiplican secuencialmente todos los enteros desde $n$ hasta 1, obteniendo
  un único valor numérico.
explicacion: '![Cálculo de expresiones factoriales](/static/img/probabilidad/permvar/permvar-factorial-calculo.svg)


  ### Definición formal


  El cálculo de $n!$ se realiza multiplicando secuencialmente: $n\times(n-1)\times(n-2)\times\cdots\times1$.


  ### Desarrollo didáctico


  Para calcular $6!$: $6\times5=30$, $30\times4=120$, $120\times3=360$, $360\times2=720$, $720\times1=720$.
  Por lo tanto, $6!=720$.'
procedimiento:
- 'Paso 1: Escribe el número n cuyo factorial se quiere calcular.'
- 'Paso 2: Multiplica secuencialmente n por (n-1), luego por (n-2), y así sucesivamente hasta 1.'
- 'Paso 3: El resultado final de esa multiplicación secuencial es el valor de n!.'
ejemplos:
- titulo: Calcular 6! paso a paso
  enunciado: n=6.
  solucion_pasos:
  - 6×5=30, 30×4=120, 120×3=360, 360×2=720, 720×1=720. 6!=720.
- titulo: Calcular 7! paso a paso
  enunciado: n=7.
  solucion_pasos:
  - 7×6!=7×720=5040. 7!=5040.
- titulo: ¿Se puede calcular 7! usando el valor ya conocido de 6!?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que 7!=7×6!, aprovechando cálculos previos.
- titulo: ¿El factorial de un número mayor siempre es mayor que el factorial de uno menor (para naturales)?
  respuesta: Sí
  solucion_pasos:
  - Sí, el factorial es una función estrictamente creciente para números naturales positivos.
errores_frecuentes:
- Cometer errores aritméticos en alguno de los pasos de la multiplicación secuencial.
- Detenerse antes de completar todos los factores hasta llegar a 1.
- No aprovechar el cálculo de un factorial previo (n-1)! para calcular n! más rápidamente.
fuente: 'Elaboración propia (referencia: Baldor 373, Moraleja 299).'
estado: publicado
