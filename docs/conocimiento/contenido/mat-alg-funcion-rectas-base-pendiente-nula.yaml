semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.PENDIENTE_NULA
titulo: Interpretación de pendiente nula como función constante
objetivo: Reconocer que una pendiente igual a cero corresponde a una función constante y a una recta horizontal.
introduccion: Si la recta no sube ni baja al avanzar, su pendiente es exactamente cero, y eso equivale a decir
  que la función es constante.
resumen: Una recta tiene **pendiente nula** ($m=0$) cuando su valor de $y$ no cambia al variar $x$; en tal caso,
  la función asociada es constante y su gráfica es una recta horizontal.
explicacion: '### Definición formal


  Si $f(x) = mx + n$ con $m=0$, entonces $f(x) = n$ para todo $x$, reduciéndose a una función constante. La pendiente
  nula implica $y_2 - y_1 = 0$ para cualquier par de puntos de la recta, es decir, todos comparten la misma ordenada.


  ### Desarrollo didáctico


  Calcular la pendiente entre dos puntos con la misma altura confirma esta situación: si $(1,5)$ y $(8,5)$ pertenecen
  a la recta, $m = \frac{5-5}{8-1} = \frac{0}{7} = 0$.


  Una pendiente nula no significa "sin recta", sino una recta perfectamente horizontal: ni sube ni baja, sin importar
  cuánto avances en $x$.'
procedimiento:
- 'Paso 1: Calcula la diferencia de ordenadas entre dos puntos de la recta.'
- 'Paso 2: Si esa diferencia es cero, la pendiente es nula.'
- 'Paso 3: Concluye que la recta es horizontal y la función es constante.'
ejemplos:
- titulo: Cálculo de pendiente nula
  enunciado: Calcula la pendiente de la recta que pasa por $(2,7)$ y $(9,7)$.
  solucion_pasos:
  - '$m = \frac{7-7}{9-2} = \frac{0}{7} = 0$.'
  - La pendiente es nula.
- titulo: Reconocimiento de función constante desde pendiente nula
  enunciado: Si una recta tiene pendiente $m=0$ y pasa por $(0,-3)$, determina su fórmula.
  solucion_pasos:
  - Con pendiente nula, la función es constante e igual a la ordenada de cualquier punto.
  - '$f(x) = -3$.'
- titulo: ¿Una recta con pendiente nula es horizontal?
  enunciado: ¿Una recta con pendiente nula es horizontal?
  respuesta: Sí
  solucion_pasos:
  - Al no cambiar $y$ con $x$, la recta resulta perfectamente horizontal.
- titulo: ¿Pendiente nula es lo mismo que pendiente indefinida?
  enunciado: ¿Pendiente nula es lo mismo que pendiente indefinida?
  respuesta: 'No'
  solucion_pasos:
  - Pendiente nula es $m=0$ (recta horizontal); pendiente indefinida corresponde a una recta vertical, que no representa
    función.
errores_frecuentes:
- Confundir pendiente nula (recta horizontal, $m=0$) con pendiente indefinida (recta vertical, sin función asociada).
- Pensar que una pendiente nula significa que no existe recta.
- Asumir que una función con pendiente nula no tiene gráfica.
- Calcular mal la diferencia de ordenadas al verificar si la pendiente es cero.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
