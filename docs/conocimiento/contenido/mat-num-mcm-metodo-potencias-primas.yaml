semantic_id: MAT.NUM.MINIMO_COMUN_MULTIPLO.METODO_POTENCIAS_PRIMAS
objetivo: 'Calcular el mĂ­nimo comĂşn mĂşltiplo (MCM) de dos o mĂĄs nĂşmeros utilizando la multiplicaciĂłn de los factores primos comunes y no comunes elevados a su mayor exponente.'
introduccion: |
  Imagina que eres un coleccionista muy exigente que quiere construir el set definitivo de bloques de construcciĂłn. Tienes dos modelos de juguetes. El modelo A usa dos piezas rojas y una azul; el modelo B usa una pieza roja, una azul y tres verdes.

  Para poder armar cualquiera de los dos modelos, tu caja de herramientas debe tener suficientes bloques. Debes tomar el mĂĄximo de piezas rojas necesarias para un solo modelo (dos), el mĂĄximo de azules (una) y el mĂĄximo de verdes (tres).

  En matemĂĄticas, este mĂŠtodo de coleccionar el 'mĂĄximo' de cada factor primo comĂşn y no comĂşn es la forma mĂĄs rĂĄpida y poderosa de calcular el MCM de cualquier grupo de nĂşmeros. Es muy utilizado en ĂĄlgebra para simplificar fracciones y resolver ecuaciones.
resumen: |
  El mĂŠtodo de potencias primas establece que el MCM de dos o mĂĄs nĂşmeros es el producto de todos sus factores primos (comunes y no comunes) tomados con su mayor exponente en las descomposiciones correspondientes.
explicacion: |
  El mĂŠtodo de **CĂĄlculo de MCM por Factores Primos con Mayor Exponente** es el mĂŠtodo algebraico por excelencia. Se basa directamente en la descomposiciĂłn prima de cada nĂşmero.

  **La Regla de Oro:**
  Para calcular el MCM de dos o mĂĄs nĂşmeros mediante este mĂŠtodo, realizamos los siguientes pasos:
  1. Descomponemos cada nĂşmero en sus factores primos de forma individual y los expresamos en formato de potencias.
  2. Identificamos todos los factores primos (bases) que aparecen en **cualquiera** de las descomposiciones (factores comunes y no comunes).
  3. Para cada factor primo identificado, seleccionamos la potencia que tenga el **mayor exponente**.
  4. Multiplicamos todas las potencias seleccionadas. El producto final es el MCM.

  **Ejemplo detallado: Calcular el MCM de $24$ y $90$:**

  1. Descomponemos cada nĂşmero:
     - $24 = 2^3 \cdot 3^1$
     - $90 = 2^1 \cdot 3^2 \cdot 5^1$

  2. Los factores primos que aparecen en total son el $2$, el $3$ y el $5$.

  3. Elegimos el mayor exponente para cada base:
     - Para la base $2$: compiten $2^3$ y $2^1$. Elegimos $2^3$.
     - Para la base $3$: compiten $3^1$ y $3^2$. Elegimos $3^2$.
     - Para la base $5$: solo aparece $5^1$ en $90$ (en $24$ su exponente es $0$). Elegimos $5^1$.

  4. Multiplicamos las potencias elegidas:
     $$\text{MCM}(24, 90) = 2^3 \cdot 3^2 \cdot 5^1$$
     $$\text{MCM}(24, 90) = 8 \cdot 9 \cdot 5 = 360$$

  Este mĂŠtodo es sumamente potente porque se extiende de forma idĂŠntica al ĂĄlgebra para calcular el **mĂ­nimo comĂşn mĂşltiplo de expresiones algebraicas** (monomios y polinomios).
procedimiento:
  - 'Paso 1: DescompĂłn cada nĂşmero por separado en factores primos y escrĂ­belos usando potencias.'
  - 'Paso 2: Haz una lista de todas las bases de nĂşmeros primos distintas que aparecen en cualquiera de las descomposiciones (factores comunes y no comunes).'
  - 'Paso 3: Para cada base de la lista, busca en cuĂĄl de las descomposiciones tiene el exponente mĂĄs alto y escribe la potencia con ese exponente.'
  - 'Paso 4: Multiplica todas las potencias seleccionadas en el Paso 3 para obtener el MCM.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Calcula el MCM de $18$ y $30$ mediante el mĂŠtodo de potencias primas.'
    solucion_pasos:
      - 'Paso a: Obtenemos las descomposiciones: $18 = 2^1 \cdot 3^2$ y $30 = 2^1 \cdot 3^1 \cdot 5^1$.'
      - 'Paso b: Listamos todas las bases que aparecen: $2, 3$ y $5$.'
      - 'Paso c: Seleccionamos el mayor exponente para cada una: para $2$ es $2^1$, para $3$ es $3^2$, y para $5$ es $5^1$.'
      - 'Paso d: Multiplicamos: $\text{MCM} = 2^1 \cdot 3^2 \cdot 5^1 = 2 \cdot 9 \cdot 5 = 90$.'
  - titulo: 'Ejemplo 2'
    enunciado: 'Encuentra el MCM de $12$ y $16$ por potencias primas.'
    solucion_pasos:
      - 'Paso a: Descomponemos: $12 = 2^2 \cdot 3^1$ y $16 = 2^4$.'
      - 'Paso b: Las bases presentes son $2$ y $3$.'
      - 'Paso c: Tomamos el mayor exponente: para la base $2$ es $2^4$ (ya que $4 > 2$), y para la base $3$ es $3^1$.'
      - 'Paso d: Multiplicamos: $\text{MCM} = 2^4 \cdot 3^1 = 16 \cdot 3 = 48$.'
  - titulo: 'Si las descomposiciones de dos nĂşmeros son $2^3 \cdot 5$ y $2 \cdot 5^2$, Âżes $2^3 \cdot 5^2$ la expresiĂłn del MCM?'
    respuesta: 'SĂ­'
    solucion_pasos:
      - 'Las bases que aparecen son $2$ y $5$.'
      - 'El mayor exponente para la base $2$ es $3$ (de $2^3$).'
      - 'El mayor exponente para la base $5$ es $2$ (de $5^2$).'
      - 'Multiplicando estas potencias de mayor exponente obtenemos $2^3 \cdot 5^2$ (que es $8 \cdot 25 = 200$).'
  - titulo: 'En el mĂŠtodo de potencias primas para el MCM, Âżdebemos descartar los factores primos que no son comunes (los que aparecen en un solo nĂşmero)?'
    respuesta: 'No'
    solucion_pasos:
      - 'Al contrario que en el MĂĄximo ComĂşn Divisor (MCD) donde solo se consideran los factores comunes, para el MCM se deben incluir obligatoriamente todos los factores primos, sean comunes o no comunes.'
      - 'Si los descartĂĄramos, el resultado no serĂ­a mĂşltiplo de todos los nĂşmeros originales.'
errores_frecuentes:
  - 'Elegir el menor exponente en lugar del mayor para cada factor primo.'
  - 'Olvidar incluir los factores primos no comunes.'
  - 'Multiplicar los exponentes entre sĂ­ o sumar las bases.'
  - 'No escribir las descomposiciones usando potencias.'
  - 'Multiplicar todas las potencias de ambas descomposiciones directamente sin comparar los exponentes de los factores repetidos.'
fuente: 'TeorĂ­a de NĂşmeros'
estado: publicado
