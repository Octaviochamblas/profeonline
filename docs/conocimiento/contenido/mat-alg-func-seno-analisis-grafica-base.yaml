semantic_id: MAT.ALG.FUNC_SENO_ANALISIS.GRAFICA_BASE
titulo: Gráfica de la función seno básica
objetivo: Describir la forma ondulada característica de la gráfica de $f(x)=\sin(x)$.
introduccion: Al conectar los puntos de la tabla de valores, la función seno revela una curva suave y repetitiva
  que sube y baja de forma predecible.
resumen: La gráfica de $f(x)=\sin(x)$ tiene forma de **onda continua**, que sube desde $0$ hasta $1$, baja hasta
  $-1$, y vuelve a $0$, repitiendo este patrón indefinidamente.
explicacion: '### Definición formal


  La gráfica de $f(x)=\sin(x)$ es el conjunto de puntos $(x,\sin(x))$ para todo $x\in\mathbb{R}$. Es una curva
  continua y suave (sin esquinas ni saltos), que oscila entre $-1$ y $1$, pasando por el origen.


  ### Desarrollo didáctico


  Partiendo de $(0,0)$, la curva sube hasta el máximo $(\pi/2,1)$, desciende cruzando el eje $x$ en $(\pi,0)$,
  sigue bajando hasta el mínimo $(3\pi/2,-1)$, y vuelve a subir hasta $(2\pi,0)$, completando un ciclo.'
procedimiento:
- 'Paso 1: Marca los puntos clave: cero en $x=0$, máximo en $x=\pi/2$, cero en $x=\pi$, mínimo en $x=3\pi/2$,
    cero en $x=2\pi$.'
- 'Paso 2: Conecta los puntos con una curva suave, sin líneas rectas ni ángulos.'
- 'Paso 3: Repite el patrón hacia la izquierda y la derecha para extender la gráfica.'
ejemplos:
- titulo: Descripción de un ciclo completo
  enunciado: 'Describe la forma de la gráfica de $f(x)=\sin(x)$ en el intervalo $[0,2\pi]$.'
  solucion_pasos:
  - Comienza en $0$, sube hasta el máximo en $\pi/2$, baja pasando por $0$ en $\pi$.
  - Continúa bajando hasta el mínimo en $3\pi/2$, y sube de vuelta a $0$ en $2\pi$.
- titulo: Identificación de un punto sobre la curva
  enunciado: '¿El punto $(\pi/2,1)$ pertenece a la gráfica de $f(x)=\sin(x)$?'
  solucion_pasos:
  - 'Se evalúa $f(\pi/2)=1$.'
  - Sí, el punto pertenece a la gráfica.
- titulo: ¿La gráfica de la función seno tiene esquinas o quiebres?
  enunciado: ¿La gráfica de $f(x)=\sin(x)$ presenta esquinas o quiebres en algún punto?
  respuesta: 'No'
  solucion_pasos:
  - Es una curva completamente suave y continua en todo su dominio.
- titulo: ¿La gráfica de la función seno se repite indefinidamente?
  enunciado: ¿El patrón ondulado de $f(x)=\sin(x)$ se repite indefinidamente hacia ambos lados del eje $x$?
  respuesta: Sí
  solucion_pasos:
  - Es consecuencia de la periodicidad de la función seno.
errores_frecuentes:
- Trazar la curva con segmentos rectos en vez de una onda suave.
- Confundir la posición del máximo y el mínimo dentro de un ciclo.
- No repetir el patrón fuera del intervalo $[0,2\pi]$.
- Confundir esta gráfica con la de la función coseno, que inicia en un máximo.
