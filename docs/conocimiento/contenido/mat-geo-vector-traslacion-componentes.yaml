semantic_id: MAT.GEO.ISOMETRIA_TRASLACION.VECTOR_TRASLACION_COMPONENTES
titulo: Identificación de las componentes del vector traslación
objetivo: Identificar las componentes horizontal y vertical del vector traslación, que indican cuánto
  se desplaza una figura en cada dirección.
introduccion: 'Las componentes del vector traslación son como las ''instrucciones de movimiento'': cuánto
  avanzar horizontalmente y cuánto verticalmente.'
resumen: El vector traslación $\vec{v}=(a,b)$ tiene una componente horizontal $a$ (desplazamiento en el
  eje X) y una componente vertical $b$ (desplazamiento en el eje Y).
explicacion: '![Componentes del vector traslación](/static/img/geometria/isometrias/vector-traslacion-componentes.svg)


  ### Definición formal


  Si el vector traslación es $\vec{v}=(a,b)$, todo punto $P(x,y)$ se transforma en $P''(x+a,\,y+b)$: la
  componente $a$ desplaza horizontalmente y la componente $b$ desplaza verticalmente.


  ### Desarrollo didáctico


  En la figura, el vector traslación $\vec{v}=(5,4)$ tiene componente horizontal $a=5$ (desplazamiento
  hacia la derecha) y componente vertical $b=4$ (desplazamiento hacia arriba).'
procedimiento:
- 'Paso 1: Identifica el vector traslación v=(a,b) de la transformación.'
- 'Paso 2: Reconoce que la componente a indica el desplazamiento horizontal (positivo a la derecha, negativo
  a la izquierda).'
- 'Paso 3: Reconoce que la componente b indica el desplazamiento vertical (positivo hacia arriba, negativo
  hacia abajo).'
ejemplos:
- titulo: Identificar las componentes de un vector traslación
  enunciado: El vector traslación es v=(5,4).
  solucion_pasos:
  - La componente a=5 indica desplazamiento horizontal a la derecha; b=4 indica desplazamiento vertical
    hacia arriba.
- titulo: Interpretar un vector traslación con componente negativa
  enunciado: El vector traslación es v=(-3,2).
  solucion_pasos:
  - a=-3 indica desplazamiento hacia la izquierda; b=2 indica desplazamiento hacia arriba.
- titulo: ¿La componente a siempre corresponde al desplazamiento horizontal?
  respuesta: Sí
  solucion_pasos:
  - Sí, por convención (x,y), la primera componente siempre es la horizontal.
- titulo: ¿Una componente negativa indica ausencia de desplazamiento?
  respuesta: 'No'
  solucion_pasos:
  - No, simplemente indica desplazamiento en sentido contrario (izquierda o abajo, según corresponda).
errores_frecuentes:
- Confundir la componente horizontal con la vertical al interpretar el vector.
- Creer que una componente negativa significa que no hay desplazamiento en esa dirección.
- Invertir el orden de las componentes (a,b) al aplicar la traslación.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 126).'
estado: publicado
