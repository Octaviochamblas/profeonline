semantic_id: MAT.GEO.CIRCULO_METRICA.AREA_CIRCULO
titulo: Cálculo del área del círculo usando πr²
objetivo: Calcular el área (la superficie) de un círculo a partir de su radio, usando la fórmula πr².
introduccion: Además de la longitud de su contorno (circunferencia), es fundamental saber calcular cuánta
  superficie ocupa un círculo completo.
resumen: El área de un círculo de radio $r$ es $A=\pi r^2$.
explicacion: '![Área del círculo: πr²](/static/img/geometria/circunferencia-circulo/circulo-area.svg)


  ### Definición formal


  El área de un círculo de radio $r$ es $A=\pi r^2$, es decir, π multiplicado por el cuadrado del radio.


  ### Desarrollo didáctico


  Un círculo de radio 6 cm tiene área $A=\pi\times6^2=36\pi\approx113,1$ cm². A diferencia de la longitud
  (que escala linealmente con r), el área escala con el cuadrado del radio, por lo que duplicar el radio
  cuadruplica el área.'
procedimiento:
- 'Paso 1: Identifica el radio r del círculo.'
- 'Paso 2: Eleva el radio al cuadrado.'
- 'Paso 3: Multiplica ese resultado por π para obtener el área.'
ejemplos:
- titulo: Calcular el área con radio conocido
  enunciado: Un círculo tiene radio 6 cm.
  solucion_pasos:
  - A=π×6²=36π≈113,1 cm².
- titulo: Calcular el radio a partir del área
  enunciado: Un círculo tiene área 78,5 cm² (aproximada).
  solucion_pasos:
  - r²=78,5/π≈25 → r=5 cm.
- titulo: ¿El área escala linealmente con el radio?
  respuesta: 'No'
  solucion_pasos:
  - No, escala con el cuadrado del radio (r²), por lo que duplicar r cuadruplica el área.
- titulo: ¿Esta fórmula aplica a la circunferencia (la línea) o al círculo (la región)?
  respuesta: Al círculo
  solucion_pasos:
  - Al círculo, ya que mide superficie (área), no longitud.
errores_frecuentes:
- Olvidar elevar al cuadrado el radio, usando πr en vez de πr².
- Confundir esta fórmula con la de longitud de la circunferencia (2πr).
- Al despejar el radio desde el área, olvidar aplicar la raíz cuadrada al final.
fuente: 'Fuente: Moraleja 73, Cid 34, 249.'
estado: publicado
