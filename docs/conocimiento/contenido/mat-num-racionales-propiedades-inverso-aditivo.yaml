semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.INVERSO_ADITIVO
objetivo: Comprender inverso aditivo de un número racional y aplicarlo correctamente
  en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso inverso aditivo de un número racional ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: El inverso aditivo de un racional es el número que sumado con él produce
  0. Además, todo racional tiene inverso aditivo y ambos suman cero.
explicacion: |-
  El inverso aditivo de un racional es el número que sumado con él produce 0.

  Una idea importante es que todo racional tiene inverso aditivo y ambos suman cero.

  Por ejemplo, El inverso aditivo de \(\frac{3}{5}\) es \(-\frac{3}{5}\).
procedimiento:
- 'Paso 1: Escribir ambos lados de la propiedad con números racionales simples.'
- 'Paso 2: Calcular cada lado por separado respetando el orden de las operaciones.'
- 'Paso 3: Comparar los resultados y concluir si la propiedad se cumple.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “El inverso aditivo de \(\frac{3}{5}\)
    es \(-\frac{3}{5}\).” se relaciona con inverso aditivo de un número racional.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: el inverso aditivo de un racional es el número que
    sumado con él produce 0.'
  - Concluye que el ejemplo sí ilustra inverso aditivo de un número racional.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Todo racional tiene inverso aditivo y ambos
    suman cero.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con inverso aditivo de un número racional?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que todo racional tiene inverso aditivo y ambos
    suman cero.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar inverso aditivo de un número racional ignorando la definición
    o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar inverso aditivo de un número racional sin mirar qué representan
  numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
