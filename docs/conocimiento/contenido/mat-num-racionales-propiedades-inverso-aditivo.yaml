semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.INVERSO_ADITIVO
titulo: Inverso aditivo de un número racional
objetivo: Determinar el inverso aditivo (opuesto) de un número racional dado.
introduccion: 'Todo número racional tiene un "opuesto" que, sumado a él, da exactamente \(0\): ese opuesto
  es su inverso aditivo.'
resumen: El inverso aditivo de \(p=\frac{a}{b}\) es \(-p=\frac{-a}{b}\), y cumple \(p+(-p)=0\).
explicacion: '### Definición formal


  Para todo \(p=\frac{a}{b}\in\mathbb{Q}\), existe un único \(-p=\frac{-a}{b}\in\mathbb{Q}\) tal que \(p+(-p)=\frac{a}{b}+\frac{-a}{b}=\frac{a-a}{b}=\frac{0}{b}=0\).


  ### Desarrollo didáctico


  El inverso aditivo de \(\frac{3}{5}\) es \(-\frac{3}{5}\), porque \(\frac{3}{5}+\left(-\frac{3}{5}\right)=0\).
  Cambiar el signo del numerador (o del racional completo) siempre produce su opuesto.'
procedimiento:
- 'Paso 1: Copia el racional y cambia únicamente su signo.'
- 'Paso 2: Suma ambos números usando un denominador común.'
- 'Paso 3: Verifica que el resultado sea \(0\), el neutro aditivo.'
ejemplos:
- titulo: Aplicación razonada — Inverso aditivo de un número racional
  enunciado: El inverso aditivo de \(\frac{3}{5}\) es \(-\frac{3}{5}\).
  solucion_pasos:
  - Copia el racional y cambia únicamente su signo.
  - Suma ambos números usando un denominador común.
  - Verifica que el resultado sea \(0\), el neutro aditivo.
- titulo: Revisión de una solución — Inverso aditivo de un número racional
  enunciado: Una solución aplica “Suma ambos números usando un denominador común.”, pero termina sin comprobar
    que todo racional tiene inverso aditivo y ambos suman cero. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define inverso aditivo de un número racional: el inverso aditivo de un
    racional es el número que sumado con él produce 0.'
  - Copia el racional y cambia únicamente su signo.
  - 'Completa la revisión con este control: Verifica que el resultado sea \(0\), el neutro aditivo.'
- titulo: ¿Se cumple que todo racional tiene inverso aditivo y ambos suman cero? — Inverso aditivo de
    un número racional
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el inverso aditivo de un racional es el número que sumado
    con él produce 0.
  - El caso “El inverso aditivo de \(\frac{3}{5}\) es \(-\frac{3}{5}\)” satisface esa condición.
  - Verifica que el resultado sea \(0\), el neutro aditivo.
- titulo: ¿Es válido omitir el paso “Copia el racional y cambia únicamente su signo”? — Inverso aditivo
    de un número racional
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de inverso aditivo de un número racional.
  - 'Omitirlo puede volver inválida la acción siguiente: Suma ambos números usando un denominador común.'
  - 'La solución debe terminar de este modo: Verifica que el resultado sea \(0\), el neutro aditivo.'
errores_frecuentes:
- 'Empezar inverso aditivo de un número racional sin realizar este control inicial: Copia el racional
  y cambia únicamente su signo.'
- Memorizar “El inverso aditivo de \(\frac{3}{5}\) es \(-\frac{3}{5}\)” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Suma ambos números usando un denominador común.” y usarlo aunque cambien
  las condiciones del problema.
- Dar por válida una conclusión sobre inverso aditivo de un número racional que contradice el criterio
  “Todo racional tiene inverso aditivo y ambos suman cero”.
- 'Cerrar el ejercicio sin esta comprobación específica: Verifica que el resultado sea \(0\), el neutro
  aditivo.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
