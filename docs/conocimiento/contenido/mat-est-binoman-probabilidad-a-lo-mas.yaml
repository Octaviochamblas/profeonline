semantic_id: MAT.EST.BINOMIAL_ANALISIS.PROBABILIDAD_A_LO_MAS
titulo: Calcular la probabilidad acumulada 'a lo más k' éxitos
objetivo: Calcular la probabilidad de obtener a lo más k éxitos, sumando las probabilidades puntuales
  de todos los valores desde 0 hasta k.
introduccion: Muchos problemas preguntan por 'a lo más', 'como máximo' o 'no más de' k éxitos, lo que
  requiere sumar varias probabilidades puntuales, no una sola.
resumen: La probabilidad de obtener a lo más $k$ éxitos es $P(X\leq k)=P(X=0)+P(X=1)+\cdots+P(X=k)$.
explicacion: '![Cálculo de P(X≤k), ''a lo más''](/static/img/probabilidad/binoman/binoman-probabilidad-a-lo-mas.svg)


  ### Definición formal


  $P(X\leq k)=\sum_{i=0}^{k}P(X=i)=\sum_{i=0}^{k}C(n,i)p^i q^{n-i}$.


  ### Desarrollo didáctico


  Si $X\sim B(4;\,0{,}3)$, la probabilidad de obtener a lo más 1 éxito es $P(X\leq1)=P(X=0)+P(X=1)=0{,}2401+0{,}4116=0{,}6517$.'
procedimiento:
- 'Paso 1: Identifica el valor de k que delimita ''a lo más'' (el máximo número de éxitos incluido).'
- 'Paso 2: Calcula P(X=i) para cada valor de i desde 0 hasta k, inclusive.'
- 'Paso 3: Suma todos esos valores para obtener P(X≤k).'
ejemplos:
- titulo: Calcular P(X≤1) con X~B(4; 0,3)
  enunciado: n=4, p=0,3, 'a lo más 1'.
  solucion_pasos:
  - P(X=0)=0,7⁴=0,2401. P(X=1)=C(4,1)×0,3×0,7³=4×0,3×0,343=0,4116. P(X≤1)=0,2401+0,4116=0,6517.
- titulo: Calcular P(X≤2) con X~B(3; 0,5)
  enunciado: n=3, p=0,5, 'a lo más 2'.
  solucion_pasos:
  - P(X=0)=0,125, P(X=1)=0,375, P(X=2)=0,375. P(X≤2)=0,125+0,375+0,375=0,875.
- titulo: ¿'A lo más k' incluye el valor k dentro de la suma?
  respuesta: Sí
  solucion_pasos:
  - Sí, 'a lo más k' significa 0, 1, 2, ..., hasta k inclusive.
- titulo: ¿Se puede calcular P(X≤k) usando el complemento P(X>k)?
  respuesta: Sí
  solucion_pasos:
  - Sí, P(X≤k)=1-P(X>k), una alternativa útil cuando sumar directamente es más largo.
errores_frecuentes:
- Olvidar incluir el valor k dentro de la suma, calculando solo hasta (k-1).
- Confundir 'a lo más k' con 'menos de k' (que excluye el valor k).
- Cometer errores aritméticos al sumar varias probabilidades puntuales.
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
