semantic_id: MAT.NUM.PROG_GEOMETRICA.CALCULO_INDICE
titulo: Determinación de la posición de un término en una progresión geométrica
objetivo: Despejar y calcular la posición (n) de un número en una P.G. utilizando bases iguales o logaritmos
  simples.
introduccion: Empiezas con 2 bacterias. Se duplican cada hora. De pronto, tienes 1.024 bacterias. ¿Cuántas
  horas han pasado? Encontrar la incógnita en el exponente es el reto de este recurso.
resumen: Para encontrar la posición '$n$', la ecuación queda como $r^{(n-1)} = \frac{a_n}{a_1}$. Debes
  igualar las bases a ambos lados para descubrir el exponente, y luego sumarle 1.
explicacion: 'En el mundo de las progresiones aritméticas, despejábamos ''$n$'' dividiendo. Aquí ''$n$''
  está escondida en un exponente. ¡Estamos lidiando con una **Ecuación Exponencial**!


  Procedimiento de despeje:

  1. $a_n = a_1 \cdot r^{(n-1)}$

  2. Pasamos $a_1$ dividiendo: $\frac{a_n}{a_1} = r^{(n-1)}$

  3. Ahora debemos expresar el número de la izquierda como una potencia que tenga la misma base ''$r$''.


  Ejemplo: $a_1 = 5, r = 2$. ¿Qué posición ocupa el número 160?

  - $\frac{160}{5} = 2^{(n-1)}$

  - $32 = 2^{(n-1)}$

  - Expresamos 32 como potencia de 2: sabemos que $32 = 2^5$.

  - Entonces: $2^5 = 2^{(n-1)}$

  - Igualamos exponentes: $5 = n - 1 \rightarrow n = 6$.

  ¡El número 160 está en la posición 6!'
procedimiento:
- 'Paso 1: Divide el término final por el término inicial ($a_n / a_1$).'
- 'Paso 2: Escribe ese resultado como una potencia usando como base a tu razón ''r''.'
- 'Paso 3: Iguala los exponentes.'
- 'Paso 4: Despeja ''n'' (normalmente sumando 1 al otro lado).'
ejemplos:
- titulo: El salto cuántico
  enunciado: La P.G. es 3, 9, 27... ¿En qué posición está el número 243?
  solucion_pasos:
  - a1 = 3, r = 3.
  - 243 = 3 * 3^(n-1)
  - 243 / 3 = 81
  - 81 = 3^(n-1)
  - Sabemos que 81 = 3^4.
  - 4 = n - 1 -> n = 5.
errores_frecuentes:
- Olvidar sumar el '+1' al final, entregando solo el número de saltos como respuesta.
- No saber transformar el resultado de la división en una potencia de igual base.
fuente: Currículum Nacional MINEDUC.
estado: publicado
