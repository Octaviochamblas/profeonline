semantic_id: MAT.NUM.COMPLEJOS.DEFINICION
titulo: Definición de número complejo
objetivo: Reconocer un número complejo y sus componentes.
introduccion: La extensión compleja reúne una componente horizontal real y una vertical imaginaria. Juntas
  permiten representar soluciones que no caben en la recta real.
resumen: Un número complejo tiene la forma \(a+bi\), con \(a,b\in\mathbb{R}\). Los reales están contenidos
  en los complejos tomando \(b=0\).
explicacion: 'Un número complejo tiene la forma \(a+bi\), con \(a,b\in\mathbb{R}\).


  El cálculo “\(3-2i\) es complejo con parte real \(3\) y parte imaginaria \(-2\)” muestra por qué los
  reales están contenidos en los complejos tomando \(b=0\)'
procedimiento:
- 'Paso 1: Ordena la expresión en la forma \(a+bi\).'
- 'Paso 2: Identifica los coeficientes reales \(a\) y \(b\).'
- 'Paso 3: Verifica casos especiales: \(b=0\) produce un real y \(a=0\) un imaginario puro.'
ejemplos:
- titulo: Aplicación razonada — Definición de número complejo
  enunciado: \(3-2i\) es complejo con parte real \(3\) y parte imaginaria \(-2\).
  solucion_pasos:
  - Ordena la expresión en la forma \(a+bi\).
  - Identifica los coeficientes reales \(a\) y \(b\).
  - 'Verifica casos especiales: \(b=0\) produce un real y \(a=0\) un imaginario puro.'
- titulo: Revisión de una solución — Definición de número complejo
  enunciado: Una solución aplica “Identifica los coeficientes reales \(a\) y \(b\).”, pero termina sin
    comprobar que los reales están contenidos en los complejos tomando \(b=0\). Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define definición de número complejo: un número complejo tiene la forma
    \(a+bi\), con \(a,b\in\mathbb{R}\).'
  - Ordena la expresión en la forma \(a+bi\).
  - 'Completa la revisión con este control: Verifica casos especiales: \(b=0\) produce un real y \(a=0\)
    un imaginario puro.'
- titulo: ¿Se cumple que los reales están contenidos en los complejos tomando \(b=0\)? — Definición de
    número complejo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un número complejo tiene la forma \(a+bi\), con \(a,b\in\mathbb{R}\).
  - El caso “\(3-2i\) es complejo con parte real \(3\) y parte imaginaria \(-2\)” satisface esa condición.
  - 'Verifica casos especiales: \(b=0\) produce un real y \(a=0\) un imaginario puro.'
- titulo: ¿Es válido omitir el paso “Ordena la expresión en la forma \(a+bi\)”? — Definición de número
    complejo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de definición de número complejo.
  - 'Omitirlo puede volver inválida la acción siguiente: Identifica los coeficientes reales \(a\) y \(b\).'
  - 'La solución debe terminar de este modo: Verifica casos especiales: \(b=0\) produce un real y \(a=0\)
    un imaginario puro.'
errores_frecuentes:
- 'Confundir definición de número complejo con otro concepto y omitir este inicio: Ordena la expresión
  en la forma \(a+bi\).'
- Aplicar mecánicamente “Identifica los coeficientes reales \(a\) y \(b\).” sin revisar las condiciones
  de la definición.
- Tomar “\(3-2i\) es complejo con parte real \(3\) y parte imaginaria \(-2\)” como una igualdad aislada,
  sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “los reales están contenidos en los complejos tomando
  \(b=0\)”.
- 'Terminar el desarrollo sin realizar este control: Verifica casos especiales: \(b=0\) produce un real
  y \(a=0\) un imaginario puro.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
