semantic_id: MAT.NUM.FINANZAS_PERSONALES.TASA_INTERES_REAL
objetivo: Calcular la tasa de interés real descontando el efecto de la inflación.
introduccion: Si el banco te da un 5% de premio por guardar tu plata, pero el supermercado
  sube sus precios un 6% ese mismo año, en realidad perdiste dinero. El banco te dio
  más billetes, pero ahora esos billetes compran menos.
resumen: 'La Tasa de Interés Nominal es lo que promete el banco. La Tasa de Interés
  Real es la rentabilidad verdadera tras descontar la inflación. Fórmula aproximada:
  Tasa Real = Tasa Nominal - Inflación.'
explicacion: 'Al evaluar una inversión, debes diferenciar:


  - **Tasa Nominal:** Es el porcentaje bruto que el banco o institución te promete
  pagar (Ej: $7\%$ al año).

  - **Inflación (IPC):** Es la pérdida de poder adquisitivo del dinero (Ej: $4\%$
  al año).

  - **Tasa de Interés Real:** Es el aumento real de tu capacidad de compra.


  La fórmula rápida (y aproximada para tasas pequeñas) es:

  $$\text{Tasa Real} \approx \text{Tasa Nominal} - \text{Inflación}$$


  Si inviertes a una tasa del $7\%$ nominal y la inflación es del $4\%$, tu rentabilidad
  real es solo del $3\%$. Si la inflación fuera mayor a la tasa del banco, tu tasa
  real sería negativa.'
procedimiento:
- 'Paso 1: Identifica la Tasa Nominal (lo que te pagan).'
- 'Paso 2: Identifica la Inflación del mismo período.'
- 'Paso 3: Resta $Nominal - Inflacion$ para conocer la Tasa Real.'
ejemplos:
- titulo: Rentabilidad engañosa
  enunciado: Un fondo mutuo rinde 8% en el año, pero la inflación fue del 10%. ¿Cuál
    fue la tasa real aproximada?
  solucion_pasos:
  - Tasa Nominal = $8\%$.
  - Inflación = $10\%$.
  - Tasa Real = $8\% - 10\% = -2\%$.
  - En realidad, perdió un 2% de poder de compra.
errores_frecuentes:
- Creer que mientras la tasa del banco sea mayor a 0, siempre se está ganando dinero
  de verdad.
- Restar al revés (Inflación menos Nominal).
fuente: Currículum Nacional MINEDUC.
estado: publicado
