semantic_id: MAT.GEO.AREAS_TRIANGULOS.TRIANGULOS_IGUAL_BASE
titulo: Igualdad de áreas de triángulos con igual base entre paralelas
objetivo: Reconocer que triángulos con la misma base y vértices sobre una recta paralela a ella tienen áreas
  iguales.
introduccion: Puedes "deslizar" la punta superior de un triángulo a lo largo de una línea paralela a su base
  sin que cambie el área del triángulo, siempre que la base se mantenga igual.
resumen: Todos los triángulos que comparten la misma base y cuyo vértice opuesto se ubica sobre una recta
  paralela a esa base tienen exactamente la misma área.
explicacion: '![Triángulos con igual base entre paralelas](/static/img/geometria/areas-pitagoras/areas-triangulos-igual-base.svg)


  ### Definición formal


  Si dos triángulos comparten la misma base $b$ y sus vértices opuestos se ubican sobre una misma recta

  paralela a esa base, ambos triángulos tienen la misma altura y, por lo tanto, la misma área.


  ### Desarrollo didáctico


  Esto ocurre porque la distancia entre dos rectas paralelas es constante en todos sus puntos: sin importar

  dónde se ubique el vértice sobre la recta paralela, la altura respecto de la base no cambia.'
procedimiento:
- 'Paso 1: Verifica que ambos triángulos compartan exactamente la misma base.'
- 'Paso 2: Verifica que los vértices opuestos estén sobre una misma recta paralela a esa base.'
- 'Paso 3: Concluye que ambos triángulos tienen la misma altura y, por lo tanto, la misma área.'
ejemplos:
- titulo: Vértice desplazado sobre la paralela
  enunciado: Dos triángulos comparten la base $AB$ y sus vértices opuestos, $C$ y $C'$, están sobre una misma
    recta paralela a $AB$. ¿Qué se puede afirmar sobre sus áreas?
  solucion_pasos:
  - Ambos triángulos tienen la misma altura, ya que la distancia entre la recta paralela y la base es
    constante.
  - Por lo tanto, ambos triángulos tienen exactamente la misma área.
- titulo: Relación con la fórmula base por altura
  enunciado: ¿Por qué la fórmula $A=\frac{base\times altura}{2}$ explica esta propiedad?
  solucion_pasos:
  - Porque si la base y la altura son iguales para ambos triángulos, el área calculada también debe ser igual.
- titulo: ¿La distancia entre dos rectas paralelas es constante en todos sus puntos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad fundamental de las rectas paralelas.
- titulo: ¿Dos triángulos con la misma base siempre tienen la misma área, sin importar dónde esté el vértice?
  respuesta: 'No'
  solucion_pasos:
  - 'No, solo si el vértice se ubica sobre una recta paralela a la base; de lo contrario la altura puede
    cambiar.'
errores_frecuentes:
- Creer que cualquier par de triángulos con la misma base tiene automáticamente la misma área.
- Olvidar verificar que los vértices estén sobre una recta paralela a la base.
- Confundir la altura del triángulo con la longitud del segmento entre los vértices.
- Pensar que desplazar el vértice sobre la paralela cambia la forma pero también el área.
- No identificar correctamente cuál lado corresponde a la base compartida.
fuente: 'Elaboración propia.'
estado: publicado
