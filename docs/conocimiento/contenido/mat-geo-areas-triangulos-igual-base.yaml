semantic_id: MAT.GEO.AREAS_TRIANGULOS.TRIANGULOS_IGUAL_BASE
titulo: Triángulos con igual base e igual altura tienen igual área
objetivo: Reconocer que todos los triángulos que comparten una misma base y cuyo vértice opuesto está
  sobre una recta paralela a esa base tienen exactamente la misma área.
introduccion: Es posible dibujar infinitos triángulos distintos, con formas muy diferentes entre sí, que
  sin embargo tengan exactamente la misma área.
resumen: Todos los triángulos con la misma base y cuyo vértice opuesto se ubica sobre una recta paralela
  a dicha base tienen la misma área, sin importar su forma.
explicacion: '![Triángulos con igual base e igual altura](/static/img/geometria/areas-pitagoras/areas-triangulos-igual-base.svg)


  ### Definición formal


  Si varios triángulos comparten la base $AB$ y sus vértices opuestos están sobre una misma recta paralela
  a $AB$, todos tienen la misma altura (la distancia entre las paralelas) y, por lo tanto, la misma área
  $A=\frac{AB\times h}{2}$.


  ### Desarrollo didáctico


  Esta propiedad es la base de muchas demostraciones geométricas: permite "deslizar" el vértice de un
  triángulo sobre una paralela a la base sin alterar su área, aunque cambie completamente su forma.'
procedimiento:
- 'Paso 1: Identifica la base común de los triángulos que se comparan.'
- 'Paso 2: Verifica que los vértices opuestos estén sobre una misma recta paralela a esa base.'
- 'Paso 3: Concluye que todos esos triángulos tienen la misma altura y, por lo tanto, la misma área.'
ejemplos:
- titulo: Comparar triángulos con vértices en distintas posiciones sobre la misma paralela
  enunciado: Tres triángulos comparten la base AB y sus vértices están sobre una misma paralela a AB.
  solucion_pasos:
  - Los tres triángulos tienen exactamente la misma área, aunque se vean muy distintos.
- titulo: Relacionar esta propiedad con la fórmula del área
  enunciado: ¿Por qué estos triángulos tienen igual área?
  solucion_pasos:
  - Porque comparten la misma base y la misma altura (distancia entre las paralelas).
- titulo: ¿La forma del triángulo afecta esta propiedad?
  respuesta: 'No'
  solucion_pasos:
  - No, la forma puede variar mucho; lo único relevante es la base y la altura.
- titulo: ¿Esta propiedad requiere que los triángulos sean congruentes?
  respuesta: 'No'
  solucion_pasos:
  - No, los triángulos pueden ser completamente distintos en forma, solo deben compartir base y altura.
errores_frecuentes:
- Confundir 'igual área' con 'triángulos congruentes' (son conceptos distintos).
- No verificar que la recta que contiene los vértices sea realmente paralela a la base.
- Olvidar que la altura relevante es la distancia entre las dos rectas paralelas, no la longitud de otro
  lado.
fuente: Elaboración propia.
estado: publicado
