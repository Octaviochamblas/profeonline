semantic_id: MAT.EST.MEDIA_PROMEDIO.PONDERADA
titulo: Calcular la media ponderada
objetivo: Calcular la media ponderada de un conjunto de valores que tienen distinta importancia relativa
  (peso) dentro del promedio.
introduccion: En muchos contextos (notas con distinto peso, ingredientes con distinta proporción), no
  todos los valores contribuyen por igual al promedio final.
resumen: La media ponderada es el promedio de un conjunto de valores, donde cada uno se multiplica por
  un peso que refleja su importancia relativa, antes de dividir por la suma de los pesos.
explicacion: '![Media ponderada](/static/img/estadistica/promedio/media-ponderada.svg)


  ### Definición formal


  $\bar{x}_p=\dfrac{\sum(x_i\times w_i)}{\sum w_i}$, donde $w_i$ es el peso asociado a cada valor $x_i$.


  ### Desarrollo didáctico


  Si una prueba (nota 6, peso 2) y una tarea (nota 4, peso 1) conforman el promedio final: $\bar{x}_p=(6\times2+4\times1)/(2+1)=(12+4)/3=16/3\approx5{,}33$.'
procedimiento:
- 'Paso 1: Identifica cada valor y su peso correspondiente dentro del promedio.'
- 'Paso 2: Multiplica cada valor por su peso y suma todos esos productos.'
- 'Paso 3: Divide esa suma por la suma total de los pesos, para obtener la media ponderada.'
ejemplos:
- titulo: Calcular una nota final ponderada
  enunciado: 'Prueba: nota 6, peso 2. Tarea: nota 4, peso 1.'
  solucion_pasos:
  - (6×2+4×1)/(2+1)=(12+4)/3=16/3≈5,33.
- titulo: Calcular un promedio ponderado de calificaciones
  enunciado: 'Examen final: nota 5, peso 3. Trabajo semestral: nota 7, peso 1.'
  solucion_pasos:
  - (5×3+7×1)/(3+1)=(15+7)/4=22/4=5,5.
- titulo: ¿Un valor con mayor peso influye más en el resultado final que uno con menor peso?
  respuesta: Sí
  solucion_pasos:
  - Sí, es precisamente el propósito de asignar pesos distintos a cada valor.
- titulo: ¿La media ponderada es igual a la media simple cuando todos los pesos son iguales entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, en ese caso los pesos se simplifican y el resultado es equivalente a la media aritmética simple.
errores_frecuentes:
- Olvidar dividir por la suma de los pesos, dividiendo en cambio por el número de valores (como en la
  media simple).
- Confundir el valor con su peso al multiplicar, invirtiendo el orden de la operación.
- Aplicar pesos incorrectos que no reflejan la importancia real asignada a cada valor en el contexto del
  problema.
fuente: 'Elaboración propia (referencia: Moraleja 115, 161).'
estado: publicado
