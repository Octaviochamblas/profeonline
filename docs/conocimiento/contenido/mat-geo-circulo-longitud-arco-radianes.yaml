semantic_id: MAT.GEO.CIRCULO_METRICA.LONGITUD_ARCO_RADIANES
titulo: Cálculo de longitud de arco en radianes usando s = θr
objetivo: Calcular la longitud de un arco de circunferencia usando la fórmula directa s=θr, cuando el
  ángulo central está expresado en radianes.
introduccion: Cuando el ángulo central se mide en radianes (en vez de grados), la fórmula de longitud
  de arco se simplifica considerablemente.
resumen: La longitud de un arco con ángulo central $\theta$ (en radianes) en una circunferencia de radio
  $r$ es $s=\theta\times r$.
explicacion: '![Longitud de arco en radianes: s = θr](/static/img/geometria/circunferencia-circulo/circulo-longitud-arco-radianes.svg)


  ### Definición formal


  Si $\theta$ está expresado en radianes, la longitud del arco correspondiente es simplemente $s=\theta
  r$, sin necesidad de dividir entre 360° ni multiplicar por 2π (esos factores ya están incorporados en
  la definición del radián).


  ### Desarrollo didáctico


  Un arco con ángulo central de $\frac{\pi}{2}$ radianes (equivalente a 90°) en una circunferencia de
  radio 8 cm mide $s=\frac{\pi}{2}\times8=4\pi\approx12,57$ cm, coincidiendo exactamente con el resultado
  obtenido usando la fórmula en grados.'
procedimiento:
- 'Paso 1: Verifica que el ángulo central esté expresado en radianes (si está en grados, conviértelo primero:
  radianes=grados×π/180).'
- 'Paso 2: Multiplica el ángulo (en radianes) por el radio.'
- 'Paso 3: Ese producto es la longitud del arco.'
ejemplos:
- titulo: Calcular la longitud de arco con ángulo en radianes
  enunciado: Una circunferencia de radio 8 cm tiene un arco con ángulo central de π/2 radianes.
  solucion_pasos:
  - s=(π/2)×8=4π≈12,57 cm.
- titulo: Convertir de grados a radianes antes de aplicar la fórmula
  enunciado: Un arco de 60° está en una circunferencia de radio 6 cm.
  solucion_pasos:
  - 60°=π/3 radianes; s=(π/3)×6=2π≈6,28 cm.
- titulo: ¿Esta fórmula requiere dividir entre 360°?
  respuesta: 'No'
  solucion_pasos:
  - No, esa conversión ya está incorporada en la definición del radián; la fórmula es directamente s=θr.
- titulo: ¿Un ángulo de 2π radianes corresponde a la circunferencia completa?
  respuesta: Sí
  solucion_pasos:
  - Sí, 2π radianes equivale a 360°, el giro completo.
errores_frecuentes:
- Aplicar esta fórmula (s=θr) con el ángulo aún en grados, sin convertir primero a radianes.
- Confundir la simplicidad de esta fórmula con la de grados, mezclando ambos métodos incorrectamente.
- Olvidar convertir el resultado final si se requiere en otras unidades.
fuente: Elaboración propia.
estado: publicado
