semantic_id: MAT.ALG.FUNC_SENO_ANALISIS.RECORRIDO
titulo: Recorrido de la función seno
objetivo: Determinar que el recorrido de $f(x)=\sin(x)$ es el intervalo $[-1,1]$.
introduccion: A diferencia del dominio, que es ilimitado, el resultado de la función seno siempre queda
  restringido a un rango pequeño y fijo de valores.
resumen: El recorrido de $f(x)=\sin(x)$ es el intervalo **$[-1,1]$**, ya que el valor del seno corresponde a una
  coordenada del círculo unitario, que nunca supera ese rango.
explicacion: '### Definición formal


  Como $\sin(x)$ es la coordenada $y$ de un punto sobre el círculo unitario, y todo punto del círculo cumple
  $-1\leq y\leq1$, se concluye que $-1\leq\sin(x)\leq1$ para todo $x$. Los valores extremos $-1$ y $1$ sí se
  alcanzan.


  ### Desarrollo didáctico


  El máximo $\sin(x)=1$ se alcanza en $x=\pi/2$ (y en todos sus coterminales); el mínimo $\sin(x)=-1$ se
  alcanza en $x=3\pi/2$. Ningún valor de $x$ produce un resultado fuera de $[-1,1]$.'
procedimiento:
- 'Paso 1: Recuerda que $\sin(x)$ representa una coordenada del círculo unitario.'
- 'Paso 2: Verifica que esa coordenada siempre está entre $-1$ y $1$, inclusive.'
- 'Paso 3: Concluye que el recorrido es $[-1,1]$.'
ejemplos:
- titulo: Verificación de un valor dentro del recorrido
  enunciado: '¿Pertenece $0{,}5$ al recorrido de $f(x)=\sin(x)$?'
  solucion_pasos:
  - Se verifica que $-1\leq0{,}5\leq1$.
  - Sí, pertenece al recorrido, y de hecho $\sin(\pi/6)=0{,}5$.
- titulo: Detección de un valor fuera del recorrido
  enunciado: '¿Pertenece $1{,}5$ al recorrido de $f(x)=\sin(x)$?'
  solucion_pasos:
  - Se verifica que $1{,}5>1$.
  - No, no existe ningún $x$ tal que $\sin(x)=1{,}5$.
- titulo: ¿El seno puede alcanzar exactamente el valor $1$?
  enunciado: ¿Existe algún valor de $x$ para el cual $\sin(x)=1$ exactamente?
  respuesta: Sí
  solucion_pasos:
  - 'Se alcanza en $x=\pi/2$, y en todos sus ángulos coterminales.'
- titulo: ¿El recorrido de la función seno depende del valor de $x$ elegido?
  enunciado: ¿El intervalo del recorrido de $f(x)=\sin(x)$ cambia según qué valores de $x$ se consideren?
  respuesta: 'No'
  solucion_pasos:
  - El recorrido $[-1,1]$ es fijo, independientemente del dominio considerado (siempre que sea todo $\mathbb{R}$).
errores_frecuentes:
- Confundir el recorrido con el dominio, que es todo $\mathbb{R}$.
- Excluir los valores extremos $-1$ y $1$, cuando sí se alcanzan.
- Suponer que el seno puede tomar valores mayores que $1$ o menores que $-1$.
- No relacionar el recorrido con la definición del seno como coordenada del círculo unitario.
