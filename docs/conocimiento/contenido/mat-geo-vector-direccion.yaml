semantic_id: MAT.GEO.VECTORES_BASE.DIRECCION
titulo: Concepto de dirección de un vector
objetivo: Reconocer la dirección de un vector como el ángulo que forma con el eje de las abscisas (eje
  X), medido en sentido antihorario.
introduccion: La dirección de un vector es 'hacia dónde apunta', expresada como un ángulo respecto de
  una referencia fija (el eje X).
resumen: La dirección de un vector es el ángulo $\theta$ que forma con el eje de las abscisas (eje X),
  medido convencionalmente en sentido antihorario desde el semieje positivo.
explicacion: '![Dirección de un vector](/static/img/geometria/cartesiano-vectores/vector-direccion.svg)


  ### Definición formal


  La dirección de un vector $\vec{v}=(v_x,v_y)$ es el ángulo $\theta$ que forma con el semieje positivo
  de las abscisas, calculado como $\theta=\arctan\left(\frac{v_y}{v_x}\right)$, ajustado según el cuadrante
  correspondiente.


  ### Desarrollo didáctico


  En la figura, el vector con componentes $(4,3)$ forma un ángulo de aproximadamente $37°$ con el eje
  X, calculado como $\arctan(3/4)\approx37°$.'
procedimiento:
- 'Paso 1: Identifica las componentes del vector (vx, vy).'
- 'Paso 2: Calcula el ángulo θ=arctan(vy/vx).'
- 'Paso 3: Ajusta el ángulo según el cuadrante en el que se ubica el vector, si es necesario.'
ejemplos:
- titulo: Calcular la dirección de un vector en el primer cuadrante
  enunciado: Un vector tiene componentes (4,3).
  solucion_pasos:
  - θ=arctan(3/4)≈37°, medido desde el eje X positivo en sentido antihorario.
- titulo: Reconocer la dirección de un vector horizontal
  enunciado: Un vector tiene componentes (5,0).
  solucion_pasos:
  - Su dirección es 0°, ya que apunta exactamente en la dirección del eje X positivo.
- titulo: ¿La dirección se mide siempre respecto del eje X?
  respuesta: Sí
  solucion_pasos:
  - Sí, por convención, la dirección de un vector se mide como el ángulo respecto del eje de las abscisas.
- titulo: ¿La dirección de un vector puede ser mayor a 360°?
  respuesta: 'No'
  solucion_pasos:
  - No, por convención, los ángulos de dirección se expresan entre 0° y 360° (o 0 y 2π radianes).
errores_frecuentes:
- Olvidar ajustar el ángulo según el cuadrante correspondiente al usar la función arcotangente.
- Confundir la dirección del vector con su módulo.
- Medir el ángulo en sentido horario en vez de antihorario.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 122).'
estado: publicado
