semantic_id: MAT.ALG.FUNC_TRIG_MODELO.RECONOCIMIENTO_FENOMENO_PERIODICO
titulo: Reconocimiento de un fenómeno periódico en contexto
objetivo: Identificar cuándo una situación real se describe mediante un modelo trigonométrico por presentar un
  comportamiento periódico.
introduccion: Muchos fenómenos de la vida cotidiana, como las mareas, la temperatura diaria o el movimiento de un
  péndulo, se repiten siguiendo un patrón regular a lo largo del tiempo.
resumen: Un fenómeno es **periódico** cuando sus valores se repiten exactamente después de un intervalo fijo de
  tiempo o distancia, característica que se modela naturalmente con funciones seno o coseno.
explicacion: '### Definición formal


  Una situación se modela con una función trigonométrica cuando existe un intervalo fijo $T$ (el periodo) tal
  que el estado del fenómeno en el instante $t$ es idéntico al estado en $t+T$, y la variación entre valores
  máximos y mínimos es suave, no abrupta.


  ### Desarrollo didáctico


  La altura de la marea sube y baja repitiendo su patrón cada aproximadamente $12$ horas; la temperatura diaria
  sube durante el día y baja durante la noche, repitiendo el ciclo cada $24$ horas. Ambos son ejemplos de
  fenómenos periódicos modelables con funciones trigonométricas.'
procedimiento:
- 'Paso 1: Verifica si la situación descrita presenta un patrón que se repite regularmente.'
- 'Paso 2: Confirma que la variación entre valores extremos sea suave, no abrupta.'
- 'Paso 3: Si se cumplen ambas condiciones, considera un modelo trigonométrico (seno o coseno).'
ejemplos:
- titulo: Reconocimiento de un fenómeno periódico
  enunciado: '¿Es periódica la variación de la temperatura promedio mensual a lo largo de varios años?'
  solucion_pasos:
  - Se repite un patrón anual: temperaturas altas en verano, bajas en invierno, año tras año.
  - Sí, es un fenómeno periódico, modelable con una función trigonométrica.
- titulo: Distinción respecto a un fenómeno no periódico
  enunciado: '¿Es periódico el crecimiento de una población que aumenta indefinidamente cada año?'
  solucion_pasos:
  - No hay repetición de valores; la población sigue creciendo sin volver a valores anteriores.
  - No es periódico; correspondería más bien a un modelo exponencial o polinomial.
- titulo: ¿Todo fenómeno que varía con el tiempo es periódico?
  enunciado: ¿Cualquier fenómeno que cambia con el tiempo se puede modelar como periódico?
  respuesta: 'No'
  solucion_pasos:
  - Solo los fenómenos que repiten su patrón después de un intervalo fijo son periódicos.
- titulo: ¿El movimiento de un péndulo simple es un fenómeno periódico?
  enunciado: ¿El movimiento oscilante de un péndulo simple es un ejemplo de fenómeno periódico?
  respuesta: Sí
  solucion_pasos:
  - Repite su posición y velocidad después de cada oscilación completa, en un intervalo de tiempo fijo.
errores_frecuentes:
- Confundir un fenómeno que crece de forma constante con uno periódico.
- No verificar que la variación sea suave, aplicando el modelo a fenómenos con saltos bruscos.
- Suponer que todo fenómeno cíclico se ajusta exactamente a una función seno o coseno pura.
- Ignorar la necesidad de datos suficientes para confirmar la periodicidad observada.
