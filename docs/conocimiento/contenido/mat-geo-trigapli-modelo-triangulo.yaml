semantic_id: MAT.GEO.TRIG_APLICACIONES.MODELO_TRIANGULO_RECTANGULO
titulo: Modelamiento de una situación contextual mediante un triángulo rectángulo
objetivo: Traducir una situación descrita en palabras (altura, distancia, ángulo de inclinación) en un
  triángulo rectángulo con sus elementos correctamente identificados, como paso previo a resolverla con
  razones trigonométricas.
introduccion: Antes de aplicar cualquier razón trigonométrica, es necesario dibujar la situación real
  como un triángulo rectángulo, identificando qué dato corresponde a cada cateto, a la hipotenusa y al
  ángulo relevante.
resumen: Modelar una situación contextual mediante un triángulo rectángulo consiste en representar los
  elementos de un problema real (alturas, distancias, ángulos) como los lados y el ángulo agudo de un
  triángulo rectángulo.
explicacion: '![Modelamiento con triángulo rectángulo](/static/img/geometria/trigonometria/trigapli-modelo-triangulo.svg)


  ### Definición formal


  Dada una situación con un elemento vertical (altura), un elemento horizontal (distancia) y un ángulo
  de observación, se construye un triángulo rectángulo donde el ángulo recto está entre la altura y la
  distancia horizontal, y el ángulo dado corresponde a uno de los ángulos agudos.


  ### Desarrollo didáctico


  Por ejemplo, si un cable sujeta la punta de un poste al suelo formando un ángulo de 50° con el suelo,
  el poste es el cateto opuesto al ángulo, el suelo (desde la base del poste hasta el punto de anclaje)
  es el cateto adyacente, y el cable es la hipotenusa. Una vez modelada la situación así, se puede aplicar
  la razón trigonométrica adecuada.'
procedimiento:
- 'Paso 1: Lee el problema e identifica los tres elementos: una longitud vertical, una longitud horizontal
  y un ángulo.'
- 'Paso 2: Dibuja un triángulo rectángulo, ubicando el ángulo recto entre el elemento vertical y el horizontal.'
- 'Paso 3: Rotula cada lado como cateto opuesto, cateto adyacente o hipotenusa según la posición del ángulo
  dado.'
ejemplos:
- titulo: Modelar la situación de un cable sujetando un poste
  enunciado: Un cable sujeta la punta de un poste al suelo, formando un ángulo de 50° con el suelo.
  solucion_pasos:
  - El poste es el cateto opuesto al ángulo de 50°, el suelo hasta el punto de anclaje es el cateto adyacente,
    y el cable es la hipotenusa.
- titulo: Modelar la situación de una rampa
  enunciado: Una rampa de acceso forma un ángulo de 15° con el suelo y tiene 6 m de longitud.
  solucion_pasos:
  - La rampa es la hipotenusa (6 m), el suelo bajo la rampa es el cateto adyacente al ángulo de 15°, y
    la altura de la rampa es el cateto opuesto.
- titulo: ¿El ángulo recto del triángulo modelado va siempre entre el cateto opuesto y el adyacente?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición del triángulo rectángulo, el ángulo recto siempre está entre los dos catetos.
- titulo: ¿Es necesario dibujar el triángulo antes de calcular con razones trigonométricas?
  respuesta: Sí
  solucion_pasos:
  - Sí, modelar correctamente el triángulo evita errores al identificar qué lado es opuesto y cuál es
    adyacente.
errores_frecuentes:
- Ubicar el ángulo recto en el lugar equivocado del triángulo modelado.
- Confundir cuál elemento del problema corresponde a la hipotenusa y cuál a un cateto.
- Omitir el paso de dibujar el triángulo y tratar de aplicar razones trigonométricas directamente sobre
  el enunciado.
fuente: 'Elaboración propia (referencias: Moraleja 183, Cid 155).'
estado: publicado
