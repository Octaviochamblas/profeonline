semantic_id: MAT.ALG.EC_CUADR_BASE.INCOMPLETA_MONOMIA
titulo: Identificación de ecuaciones cuadráticas incompletas de la forma ax² = 0
objetivo: Reconocer ecuaciones cuadráticas incompletas monomias, aquellas en las que faltan tanto el término
  lineal como el término independiente.
introduccion: 'En el caso más simplificado de todos, la ecuación cuadrática se reduce a un único término:
  el cuadrático.'
resumen: Una **ecuación incompleta monomia** tiene la forma $ax^2=0$, con $a\neq0$, donde tanto el coeficiente
  lineal $b$ como el término independiente $c$ son iguales a cero.
explicacion: '### Definición formal


  Una ecuación de segundo grado es incompleta monomia si tiene la forma $ax^2=0$, es decir, $b=0$ y $c=0$
  simultáneamente, mientras $a \neq 0$. Solo permanece el término cuadrático.


  ### Desarrollo didáctico


  Se reconoce porque, al ordenar la ecuación en forma general, no queda ningún otro término aparte de
  $ax^2$. Al dividir ambos lados por $a$, se obtiene directamente $x^2=0$, cuya única solución es $x=0$
  (raíz doble).


  La ecuación $7x^2=0$ es incompleta monomia: solo está presente el término cuadrático, y su única solución
  es $x=0$.'
procedimiento:
- 'Paso 1: Escribe la ecuación en su forma general $ax^2+bx+c=0$.'
- 'Paso 2: Verifica que tanto $b$ como $c$ sean iguales a cero.'
- 'Paso 3: Si solo permanece el término cuadrático, la ecuación es incompleta monomia.'
ejemplos:
- titulo: Reconocimiento de ecuación incompleta monomia
  enunciado: ¿Es $3x^2=0$ una ecuación incompleta monomia?
  solucion_pasos:
  - $a=3$, $b=0$, $c=0$.
  - Sí, es incompleta monomia.
- titulo: Reconocimiento de ecuación que no es monomia
  enunciado: ¿Es $2x^2+5=0$ una ecuación incompleta monomia?
  solucion_pasos:
  - $a=2$, $b=0$, $c=5$.
  - No es monomia, porque $c \neq 0$; es incompleta pura.
- titulo: ¿Una ecuación incompleta monomia tiene dos soluciones reales distintas?
  enunciado: ¿Una ecuación incompleta monomia tiene dos soluciones reales distintas?
  respuesta: 'No'
  solucion_pasos:
  - Tiene una única solución real, $x=0$, considerada raíz doble (de multiplicidad 2), no dos soluciones
    distintas.
- titulo: ¿Es siempre $x=0$ la solución de una ecuación incompleta monomia?
  enunciado: ¿Es siempre $x=0$ la solución de una ecuación incompleta monomia?
  respuesta: Sí
  solucion_pasos:
  - Al dividir $ax^2=0$ por $a \neq 0$, se obtiene $x^2=0$, cuya única solución posible es $x=0$.
errores_frecuentes:
- Confundir la ecuación incompleta monomia con la incompleta binomia o pura.
- Reportar dos soluciones distintas en vez de reconocer que $x=0$ es una raíz doble.
- Aplicar la fórmula general innecesariamente cuando basta con despejar directamente $x^2=0$.
- Olvidar dividir por $a$ antes de concluir que $x^2=0$.
