semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.CONTRACCION_VERTICAL
titulo: Contracción vertical de la función potencia
objetivo: Reconocer que un coeficiente $0<|a|<1$ produce una contracción vertical (expansión respecto al eje $y$)
  de la gráfica básica.
introduccion: Multiplicar la función por una fracción entre $0$ y $1$ en valor absoluto "achata" la curva,
  haciéndola crecer más lento.
resumen: 'Dada $g(x)=x^n$, la función $f(x)=a\cdot x^n$ con $0<|a|<1$ es una **contracción vertical**: cada valor
  de $g$ se multiplica por $|a|$, produciendo una curva que crece más lento.'
explicacion: '### Definición formal


  Para $f(x)=a\cdot g(x)$ con $0<|a|<1$, cada punto $(x_0,y_0)$ de $g$ se transforma en $(x_0,a\cdot y_0)$, con
  $|a\cdot y_0|<|y_0|$. Visualmente, la curva se "achata" acercándose al eje $x$ más que la curva original.


  ### Desarrollo didáctico


  Comparando $g(x)=x^2$ con $f(x)=0{,}25x^2$: en $x=4$, $g(4)=16$ pero $f(4)=4$. La curva de $f$ alcanza valores
  mucho menores para el mismo $x$, dando la apariencia de estar más "ancha" o contraída verticalmente.'
procedimiento:
- 'Paso 1: Compara el valor absoluto del coeficiente $a$ con $1$.'
- 'Paso 2: Si $0<|a|<1$, reconoce que la curva se contrae verticalmente respecto a $x^n$.'
- 'Paso 3: Calcula puntos específicos para confirmar el crecimiento más lento.'
ejemplos:
- titulo: Identificación de una contracción vertical
  enunciado: '¿Es $f(x)=0{,}2x^3$ una contracción vertical de $g(x)=x^3$?'
  solucion_pasos:
  - Se compara $0<|0{,}2|<1$.
  - Sí, es una contracción vertical.
- titulo: Comparación numérica de contracción
  enunciado: 'Compara $f(4)$ con $g(4)$ para $f(x)=0{,}5x^2$ y $g(x)=x^2$.'
  solucion_pasos:
  - 'Se calcula $g(4)=16$ y $f(4)=8$.'
  - $f(4)$ es la mitad de $g(4)$, confirmando la contracción.
- titulo: ¿Una contracción vertical cambia la posición del vértice de $f(x)=ax^2$?
  enunciado: ¿Una contracción vertical desplaza la posición del vértice de la curva básica $x^2$?
  respuesta: 'No'
  solucion_pasos:
  - El vértice permanece en el origen; solo cambia qué tan rápido crece la curva.
- titulo: ¿Toda contracción vertical implica un coeficiente entre $0$ y $1$ en valor absoluto?
  enunciado: ¿Una contracción vertical siempre corresponde a $0<|a|<1$?
  respuesta: Sí
  solucion_pasos:
  - Es la condición que distingue la contracción de la dilatación vertical, donde $|a|>1$.
errores_frecuentes:
- Confundir contracción con dilatación, invirtiendo la condición sobre $|a|$.
- Suponer que la contracción vertical desplaza el vértice de la curva.
- No comparar el valor absoluto de $a$, sino solo su signo.
- Confundir esta transformación con una traslación vertical.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
