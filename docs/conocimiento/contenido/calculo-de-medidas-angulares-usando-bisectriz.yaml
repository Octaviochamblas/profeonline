semantic_id: MAT.GEO.ANGULOS_RELACIONES_POSICION.BISECTRIZ_CALCULO
titulo: Cálculo de medidas angulares usando bisectriz
objetivo: 'Calcular medidas angulares usando la propiedad de la bisectriz y comprobar que también puede
  usarse al revés: dos partes iguales permiten reconstruir el ángulo total.'
introduccion: Cuando una abertura queda partida en dos mitades exactas, la mitad y el total se determinan
  uno a partir del otro con facilidad. Este recurso se centra en cálculo de medidas angulares usando bisectriz
  y en cómo reconocerlo con un criterio geométrico claro.
resumen: 'Si un ángulo es dividido por su bisectriz, las dos medidas resultantes son iguales y su suma
  reproduce el ángulo completo. Como idea de control, también puede usarse al revés: dos partes iguales
  permiten reconstruir el ángulo total.'
explicacion: 'Si un ángulo es dividido por su bisectriz, las dos medidas resultantes son iguales y su
  suma reproduce el ángulo completo.


  La situación “si una bisectriz parte un ángulo de 86°, cada mitad mide 43°” muestra cómo pasar del dibujo
  a una conclusión válida: primero se identifica la relación correcta y luego se verifica que también
  puede usarse al revés: dos partes iguales permiten reconstruir el ángulo total.'
procedimiento:
- 'Paso 1: Comprueba que el rayo indicado sea efectivamente una bisectriz.'
- 'Paso 2: Plantea la igualdad entre las dos partes o divide el total en dos mitades iguales.'
- 'Paso 3: Verifica que la suma de las partes recupere el ángulo original.'
ejemplos:
- titulo: Aplicación directa — Cálculo con bisectriz
  enunciado: Si una bisectriz parte un ángulo de 86°, cada mitad mide 43°.
  solucion_pasos:
  - Comprueba que el rayo indicado sea efectivamente una bisectriz.
  - Plantea la igualdad entre las dos partes o divide el total en dos mitades iguales.
  - Verifica que la suma de las partes recupere el ángulo original.
- titulo: Corrección de una respuesta — Cálculo con bisectriz
  enunciado: 'Un estudiante usa la idea “también puede usarse al revés: dos partes iguales permiten reconstruir
    el ángulo total” al analizar este caso: si una bisectriz parte un ángulo de 86°, cada mitad mide 43°.
    Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: si un ángulo es dividido por su bisectriz, las dos medidas resultantes son
    iguales y su suma reproduce el ángulo completo.'
  - Plantea la igualdad entre las dos partes o divide el total en dos mitades iguales.
  - Verifica que la suma de las partes recupere el ángulo original.
- titulo: ¿Puede concluirse correctamente este hecho? — Cálculo con bisectriz
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: si un ángulo es dividido por su bisectriz,
    las dos medidas resultantes son iguales y su suma reproduce el ángulo completo.'
  - 'En el caso “si una bisectriz parte un ángulo de 86°, cada mitad mide 43°” se observa que también
    puede usarse al revés: dos partes iguales permiten reconstruir el ángulo total.'
  - Verifica que la suma de las partes recupere el ángulo original.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Cálculo con bisectriz
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de cálculo de medidas angulares usando bisectriz.
  - Después del paso “Comprueba que el rayo indicado sea efectivamente una bisectriz.” todavía hace falta
    revisar “Plantea la igualdad entre las dos partes o divide el total en dos mitades iguales.”.
  - El cierre correcto exige “Verifica que la suma de las partes recupere el ángulo original.”.
errores_frecuentes:
- Cálculo con bisectriz significa restar una mitad al total sin imponer que ambas partes sean iguales.
- Para resolver cálculo con bisectriz, basta con el paso “Comprueba que el rayo indicado sea efectivamente
  una bisectriz.” y no hace falta revisar “Plantea la igualdad entre las dos partes o divide el total
  en dos mitades iguales.”.
- 'Si el dibujo parece claro, se puede ignorar que también puede usarse al revés: dos partes iguales permiten
  reconstruir el ángulo total.'
- Dos configuraciones distintas representan cálculo con bisectriz solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Verifica que la suma de las partes recupere
  el ángulo original.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
