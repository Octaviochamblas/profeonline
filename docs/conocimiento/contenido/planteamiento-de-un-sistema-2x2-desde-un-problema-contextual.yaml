semantic_id: MAT.ALG.SISTEMAS_2X2.MODELAMIENTO_BIDIMENSIONAL
titulo: Planteamiento de un sistema 2x2 desde un problema contextual
objetivo: Plantear sistemas a partir de problemas con dos condiciones dadas.
introduccion: 'Ejemplo clásico de la granja:'
resumen: Cuando un problema te da dos piezas de información totalmente distintas, necesitas un sistema
  2x2.
explicacion: '### Definición formal


  Modelar un problema con un sistema lineal $2\times2$ consiste en traducir dos condiciones independientes
  del contexto a dos ecuaciones lineales en dos incógnitas. Si $x$ e $y$ representan cantidades desconocidas
  del problema, cada relación verbal se expresa como una igualdad algebraica de la forma

  $$a_1x+b_1y=c_1,\qquad a_2x+b_2y=c_2.$$

  El sistema resultante conserva la estructura cuantitativa del problema y su solución algebraica representa
  los valores que satisfacen simultáneamente todas las condiciones modeladas.


  ### Desarrollo didáctico


  Ejemplo clásico de la granja:

  ''En una granja hay gallinas ($x$) y vacas ($y$). En total hay 30 cabezas y 100 patas.''

  Aquí tienes dos mundos (dos ecuaciones):

  - El mundo de las cabezas (cada animal tiene 1): $1x + 1y = 30$.

  - El mundo de las patas (gallinas tienen 2, vacas tienen 4): $2x + 4y = 100$.


  Acabas de modelar el problema. Ahora aplicas reducción, sustitución o igualación.'
procedimiento:
- Define claramente qué representa 'x' y qué representa 'y'.
- Lee la primera condición del problema y tradúcela a la Ecuación 1.
- Lee la segunda condición del problema (suele hablar de dinero, total de patas, edades) y tradúcela a
  la Ecuación 2.
- Asegúrate de que las unidades coincidan en cada ecuación.
