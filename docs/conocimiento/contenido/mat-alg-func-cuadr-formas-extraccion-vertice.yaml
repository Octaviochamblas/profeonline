semantic_id: MAT.ALG.FUNC_CUADR_FORMAS.EXTRACCION_VERTICE
titulo: Extracción directa del vértice desde la forma canónica
objetivo: Extraer directamente las coordenadas del vértice de una función cuadrática expresada en forma canónica.
introduccion: 'La principal ventaja práctica de la forma canónica es que el vértice no requiere ningún cálculo
  adicional: simplemente se lee de la expresión.'
resumen: Si $f(x)=a(x-h)^2+k$, el vértice de la parábola es directamente el punto $(h,k)$, sin necesidad de aplicar
  ninguna fórmula adicional.
explicacion: '### Definición formal


  Dada $f(x)=a(x-h)^2+k$, el vértice de la parábola es el punto $(h,k)$. Esto se debe a que $(x-h)^2 \geq 0$ para
  todo $x$, alcanzando su valor mínimo (cero) exactamente cuando $x=h$, momento en que $f(x)=k$.


  ### Desarrollo didáctico


  Extraer el vértice es un proceso de lectura directa: se identifica $h$ (con su signo correcto, reescribiendo
  el binomio si es necesario) y $k$, y el vértice es el par ordenado $(h,k)$.


  En $f(x)=3(x-5)^2+2$: el vértice es $(5,2)$.'
procedimiento:
- 'Paso 1: Verifica que la función esté en forma canónica $a(x-h)^2+k$.'
- 'Paso 2: Identifica $h$, reescribiendo el binomio si es necesario para leer su signo correctamente.'
- 'Paso 3: Identifica $k$.'
- 'Paso 4: El vértice es el punto $(h,k)$.'
ejemplos:
- titulo: Extracción con vértice de coordenadas positivas
  enunciado: 'Determina el vértice de $f(x)=2(x-4)^2+7$.'
  solucion_pasos:
  - '$h=4$, $k=7$.'
  - El vértice es $(4,7)$.
- titulo: Extracción con vértice de coordenada negativa
  enunciado: 'Determina el vértice de $f(x)=-(x+6)^2-3$.'
  solucion_pasos:
  - 'Reescribiendo $(x+6)$ como $(x-(-6))$: $h=-6$.'
  - '$k=-3$.'
  - El vértice es $(-6,-3)$.
- titulo: ¿Se necesita calcular algo adicional para hallar el vértice desde la forma canónica?
  enunciado: ¿Se necesita calcular algo adicional para hallar el vértice desde la forma canónica?
  respuesta: 'No'
  solucion_pasos:
  - El vértice se lee directamente como el par $(h,k)$, sin fórmulas ni cálculos adicionales.
- titulo: ¿El coeficiente $a$ forma parte de las coordenadas del vértice?
  enunciado: ¿El coeficiente $a$ forma parte de las coordenadas del vértice?
  respuesta: 'No'
  solucion_pasos:
  - El coeficiente $a$ determina la concavidad y la abertura de la parábola, pero no interviene en las coordenadas
    del vértice.
errores_frecuentes:
- Leer el vértice como $(-h,k)$ en vez de $(h,k)$, invirtiendo el signo de $h$ incorrectamente.
- Confundir el orden de las coordenadas, reportando $(k,h)$ en vez de $(h,k)$.
- Incluir el coeficiente $a$ como parte de las coordenadas del vértice.
- No reescribir correctamente el binomio cuando aparece con signo positivo, como $(x+3)$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
