semantic_id: MAT.GEO.ISOMETRIA_TRASLACION.CONGRUENCIA_FIGURAS
titulo: Relación entre isometría y congruencia de figuras
objetivo: Reconocer que toda isometría produce una imagen congruente con la figura original, y que dos
  figuras congruentes siempre pueden relacionarse mediante alguna isometría.
introduccion: Si dos figuras son congruentes, siempre existe una forma de 'moverlas' (trasladar, reflejar
  o rotar) una hasta hacerla coincidir exactamente con la otra.
resumen: Toda isometría transforma una figura en otra congruente con ella; recíprocamente, si dos figuras
  son congruentes, existe una isometría que transforma una en la otra.
explicacion: '![Relación entre isometría y congruencia](/static/img/geometria/isometrias/isometria-congruencia-figuras.svg)


  ### Definición formal


  Dos figuras $F$ y $F''$ son congruentes si y solo si existe una isometría que transforma $F$ en $F''$.
  Esta es una relación de equivalencia: toda isometría preserva la congruencia, y toda congruencia puede
  explicarse mediante alguna isometría.


  ### Desarrollo didáctico


  En la figura, el triángulo $ABC$ y su imagen $A''B''C''$ son congruentes ($ABC\cong A''B''C''$): tienen
  lados y ángulos correspondientes iguales, y existe una traslación que transforma uno en el otro.'
procedimiento:
- 'Paso 1: Identifica las dos figuras que se quiere comparar (preimagen e imagen).'
- 'Paso 2: Verifica si existe una isometría (traslación, simetría o rotación) que transforme una en la
  otra.'
- 'Paso 3: Si tal isometría existe, concluye que ambas figuras son congruentes.'
ejemplos:
- titulo: Verificar la congruencia mediante una isometría
  enunciado: El triángulo ABC se traslada mediante un vector, obteniendo A'B'C'.
  solucion_pasos:
  - Como la traslación es una isometría, ABC≅A'B'C'.
- titulo: Reconocer figuras congruentes sin isometría explícita
  enunciado: Dos triángulos tienen exactamente los mismos lados y ángulos, pero en posiciones distintas
    del plano.
  solucion_pasos:
  - Son congruentes, y debe existir alguna isometría (traslación, rotación o simetría) que transforme
    uno en el otro.
- titulo: ¿Toda isometría produce figuras congruentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad fundamental que define a las isometrías.
- titulo: ¿Toda congruencia entre dos figuras implica necesariamente una isometría?
  respuesta: Sí
  solucion_pasos:
  - Sí, dos figuras congruentes siempre pueden relacionarse mediante alguna combinación de isometrías.
errores_frecuentes:
- Creer que dos figuras pueden ser congruentes sin que exista ninguna isometría que las relacione.
- Confundir congruencia con semejanza (que permite cambios de tamaño proporcional).
- No verificar la correspondencia exacta entre todos los lados y ángulos al afirmar congruencia.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 126, Cid 73).'
estado: publicado
