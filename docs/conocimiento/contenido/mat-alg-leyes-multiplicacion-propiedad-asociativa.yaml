semantic_id: MAT.ALG.LEYES_MULTIPLICACION.PROPIEDAD_ASOCIATIVA
titulo: Uso de la propiedad asociativa en multiplicaciĂłn algebraica
objetivo: Aplicar la propiedad asociativa en multiplicaciĂłn algebraica y justificar el procedimiento algebraico.
introduccion: Cuando intervienen tres o mĂĄs factores, los parĂŠntesis indican quĂŠ producto se calcula primero. La
  propiedad asociativa permite cambiar esa agrupaciĂłn sin alterar el resultado.
resumen: La asociatividad indica que el orden de agrupaciĂłn no altera el producto final.
explicacion: '### DefiniciĂłn formal


  Para todo $a, b, c$ pertenecientes al conjunto de expresiones algebraicas, se cumple $(a \cdot b) \cdot c = a
  \cdot (b \cdot c)$: el resultado de un producto de tres o mĂĄs factores no depende de cĂłmo se agrupen mediante
  parĂŠntesis, sino solo del orden en que aparecen los factores.


  ### Desarrollo didĂĄctico


  Agrupar los monomios $5 \cdot 2x$ da $10x$, un multiplicador muy fĂĄcil de distribuir luego en $(x-1)$.


  La forma correcta es agrupar: $[3(x+2)](x-4)$ o $3[(x+2)(x-4)]$. Multiplicar ambos implica insertar el factor
  dos veces.


  Se asocian los dos binomios juntos para resolver el producto notable primero.'
procedimiento:
- Agrupar los monomios $5 \cdot 2x$ da $10x$, un multiplicador muy fĂĄcil de distribuir luego en $(x-1)$.
- 'La forma correcta es agrupar: $[3(x+2)](x-4)$ o $3[(x+2)(x-4)]$. Multiplicar ambos implica insertar el factor
  dos veces.'
- Se asocian los dos binomios juntos para resolver el producto notable primero.
ejemplos:
- titulo: Un volumen se calcula como $\frac{1}{3} \cdot \pi r^2 \cdot (3h + 6)$. Mediante agrupaciones
  enunciado: 'Un volumen se calcula como $\frac{1}{3} \cdot \pi r^2 \cdot (3h + 6)$. Mediante agrupaciones de la
    asociatividad, una expresiĂłn equivalente mĂĄs compacta es:


    Opciones: A) $\pi r^2 (h + 2)$ Âˇ B) $\pi r^2 (3h + 2)$ Âˇ C) $\frac{\pi}{3} r^2 h + 6$ Âˇ D) $\pi r^2 h + 2$'
  solucion_pasos:
  - 'Podemos asociar $\frac{1}{3}$ con el parĂŠntesis: $\pi r^2 \cdot [\frac{1}{3}(3h + 6)] = \pi r^2(h + 2)$.'
  - 'Respuesta: $\pi r^2 (h + 2)$'
- titulo: Si $A = 2(x+1)$, $B = 3(x-1)$ y $C = x$, encuentra el producto $A \cdot B \cdot C$
  enunciado: 'Si $A = 2(x+1)$, $B = 3(x-1)$ y $C = x$, encuentra el producto $A \cdot B \cdot C$.


    Opciones: A) $6x^3 - 6x$ Âˇ B) $6x^3 - x$ Âˇ C) $6x^3 - 6$ Âˇ D) $5x^3 - 5x$'
  solucion_pasos:
  - '$A \cdot B \cdot C = 2(x+1) \cdot 3(x-1) \cdot x$. Asociando nĂşmeros: $6x$. Binomios: $x^2-1$. Total: $6x(x^2-1)
    = 6x^3 - 6x$.'
  - 'Respuesta: $6x^3 - 6x$'
