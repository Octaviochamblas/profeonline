semantic_id: MAT.ALG.LEYES_MULTIPLICACION.PROPIEDAD_ASOCIATIVA
titulo: Uso de la propiedad asociativa en multiplicación algebraica
objetivo: Aplicar la propiedad asociativa en multiplicación algebraica y justificar el procedimiento algebraico.
introduccion: Cuando intervienen tres o más factores, los paréntesis indican qué producto se calcula primero. La
  propiedad asociativa permite cambiar esa agrupación sin alterar el resultado.
resumen: La asociatividad indica que el orden de agrupación no altera el producto final.
explicacion: '### Definición formal


  La asociatividad indica que el orden de agrupación no altera el producto final.


  ### Desarrollo didáctico


  Agrupar los monomios $5 \cdot 2x$ da $10x$, un multiplicador muy fácil de distribuir luego en $(x-1)$.


  La forma correcta es agrupar: $[3(x+2)](x-4)$ o $3[(x+2)(x-4)]$. Multiplicar ambos implica insertar el factor
  dos veces.


  Se asocian los dos binomios juntos para resolver el producto notable primero.'
procedimiento:
- Agrupar los monomios $5 \cdot 2x$ da $10x$, un multiplicador muy fácil de distribuir luego en $(x-1)$.
- 'La forma correcta es agrupar: $[3(x+2)](x-4)$ o $3[(x+2)(x-4)]$. Multiplicar ambos implica insertar el factor
  dos veces.'
- Se asocian los dos binomios juntos para resolver el producto notable primero.
- La asociatividad indica que el orden de agrupación no altera el producto final.
ejemplos:
- titulo: Un volumen se calcula como $\frac{1}{3} \cdot \pi r^2 \cdot (3h + 6)$. Mediante agrupaciones
  enunciado: 'Un volumen se calcula como $\frac{1}{3} \cdot \pi r^2 \cdot (3h + 6)$. Mediante agrupaciones de la
    asociatividad, una expresión equivalente más compacta es:


    Opciones: A) $\pi r^2 (h + 2)$ · B) $\pi r^2 (3h + 2)$ · C) $\frac{\pi}{3} r^2 h + 6$ · D) $\pi r^2 h + 2$'
  solucion_pasos:
  - 'Podemos asociar $\frac{1}{3}$ con el paréntesis: $\pi r^2 \cdot [\frac{1}{3}(3h + 6)] = \pi r^2(h + 2)$.'
  - 'Respuesta: $\pi r^2 (h + 2)$'
- titulo: Si $A = 2(x+1)$, $B = 3(x-1)$ y $C = x$, encuentra el producto $A \cdot B \cdot C$
  enunciado: 'Si $A = 2(x+1)$, $B = 3(x-1)$ y $C = x$, encuentra el producto $A \cdot B \cdot C$.


    Opciones: A) $6x^3 - 6x$ · B) $6x^3 - x$ · C) $6x^3 - 6$ · D) $5x^3 - 5x$'
  solucion_pasos:
  - '$A \cdot B \cdot C = 2(x+1) \cdot 3(x-1) \cdot x$. Asociando números: $6x$. Binomios: $x^2-1$. Total: $6x(x^2-1)
    = 6x^3 - 6x$.'
  - 'Respuesta: $6x^3 - 6x$'
- titulo: 'Respecto de «Uso de la propiedad asociativa en multiplicación algebraica»: ¿Describe adecuad'
  enunciado: 'Respecto de «Uso de la propiedad asociativa en multiplicación algebraica»: ¿Describe adecuadamente
    el concepto esta frase? «La asociatividad indica que el orden de agrupación no altera el producto final»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La asociatividad indica que el orden de agrupación no altera
    el producto final.'
- titulo: 'Respecto de «Uso de la propiedad asociativa en multiplicación algebraica»: ¿Se puede aceptar'
  enunciado: 'Respecto de «Uso de la propiedad asociativa en multiplicación algebraica»: ¿Se puede aceptar esta
    afirmación? «$a(b + c) = ab + ac$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La asociatividad indica que el orden de agrupación no altera
    el producto final.'
errores_frecuentes:
- $a(b + c) = ab + ac$.
- $a \cdot b = b \cdot a$.
- $a \cdot 1 = a$.
- $(5 \cdot (x-1)) \cdot 2x$.
- Distribuir el 5, luego distribuir el 2x.
