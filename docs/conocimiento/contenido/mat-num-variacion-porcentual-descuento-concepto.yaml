semantic_id: MAT.NUM.VARIACION_PORCENTUAL.DESCUENTO_CONCEPTO
objetivo: Diferenciar entre el valor del descuento y el valor final en contextos comerciales.
introduccion: Vas al mall y ves '50% de Descuento'. Tu cerebro se emociona porque
  sabe que pagará la mitad. El descuento es la disminución porcentual más famosa del
  mundo.
resumen: En el comercio, 'Descuento' se refiere al monto de dinero que te restan (el
  $D\%$), mientras que 'Precio Final' o 'Precio con Descuento' es lo que efectivamente
  pagas (el $(100-D)\%$).
explicacion: 'En problemas comerciales, es vital leer con lupa lo que se está preguntando:


  - **Valor del descuento (la rebaja):** Es la cantidad de dinero que NO vas a pagar.
  Se calcula como $\text{Precio Original} \cdot (D / 100)$.

  - **Precio final (lo que pagas):** Es el precio original menos la rebaja. Se calcula
  más rápido con el factor de disminución: $\text{Precio Original} \cdot ((100 - D)
  / 100)$.


  Por ejemplo, en un pantalón de $\$10.000$ con un $30\%$ de descuento:

  - La rebaja es de $\$3.000$ ($30\%$).

  - El precio final que te cobrará el cajero es de $\$7.000$ ($70\%$).'
procedimiento:
- 'Paso 1: Lee si la pregunta pide ''el valor del descuento'' (la rebaja) o el ''precio
  final'' (lo que pagas).'
- 'Paso 2: Si pide el descuento, calcula el $D\%$ del total.'
- 'Paso 3: Si pide el precio final, calcula el $(100 - D)\%$ del total.'
ejemplos:
- titulo: Liquidación de temporada
  enunciado: Una bicicleta vale $100.000. Tiene un 40% de descuento. ¿Cuál es el valor
    del descuento y cuál es el precio final?
  solucion_pasos:
  - 'Descuento (rebaja): El 40% de 100.000. Son $40.000. Ese dinero te lo ahorras.'
  - 'Precio final: El 60% de 100.000 (ya que $100 - 40 = 60$). Son $60.000. Eso pagas
    en caja.'
errores_frecuentes:
- Confundir el valor del descuento con el precio a pagar. (Responder que pagas $40.000
  en el ejemplo anterior).
- Creer que dos descuentos consecutivos del 20% suman un 40% (no es así, el segundo
  descuento se aplica sobre el nuevo precio ya rebajado).
fuente: Currículum Nacional MINEDUC.
estado: publicado
