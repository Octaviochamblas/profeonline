semantic_id: MAT.EST.DISPERSION_COMPARATIVA.COEF_VARIACION_DEFINICION
titulo: Definir el coeficiente de variación como medida relativa de dispersión
objetivo: Definir el coeficiente de variación como una medida relativa de dispersión que permite comparar variabilidad
  entre conjuntos con distintas unidades o medias.
introduccion: Comparar la dispersión de estaturas con la de sueldos usando solo la desviación estándar no tiene sentido,
  porque están en unidades distintas; el coeficiente de variación resuelve ese problema.
resumen: El coeficiente de variación $CV$ es una medida relativa de dispersión que expresa la desviación estándar como
  un porcentaje de la media, permitiendo comparar variabilidad entre conjuntos distintos.
explicacion: '![Coeficiente de variación](/static/img/estadistica/dispcomp/dispcomp-coef-variacion-definicion.svg)


  ### Definición formal


  El coeficiente de variación se define como $CV=\dfrac{\sigma}{\bar{x}}\times 100\%$, expresando la desviación

  estándar como un porcentaje de la media.


  ### Desarrollo didáctico


  Al ser una medida relativa (sin unidades), el $CV$ permite comparar la dispersión de conjuntos con unidades

  distintas, algo que la desviación estándar sola no permite hacer directamente.'
procedimiento:
- 'Paso 1: Calcula la media $\bar{x}$ y la desviación estándar $\sigma$ del conjunto de datos.'
- 'Paso 2: Divide la desviación estándar por la media: $\sigma / \bar{x}$.'
- 'Paso 3: Multiplica el resultado por 100 para expresarlo como porcentaje.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: ¿Por qué no se puede comparar directamente la desviación estándar de estaturas (en cm) con la de sueldos
    (en pesos)?
  solucion_pasos:
  - Porque están expresadas en unidades distintas, que no son comparables entre sí.
  - El coeficiente de variación resuelve esto al ser una medida relativa, sin unidades.
- titulo: Ejemplo 2
  enunciado: ¿Qué tipo de unidad tiene el coeficiente de variación?
  solucion_pasos:
  - Se expresa como un porcentaje, sin unidades del conjunto original.
- titulo: ¿El coeficiente de variación permite comparar dispersión entre conjuntos de distintas unidades?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es su principal utilidad.
- titulo: ¿El coeficiente de variación se expresa en las mismas unidades que los datos originales?
  respuesta: 'No'
  solucion_pasos:
  - 'No, se expresa como un porcentaje relativo, sin unidades.'
errores_frecuentes:
- Comparar directamente desviaciones estándar de conjuntos con unidades distintas.
- Olvidar multiplicar por 100 para expresar el resultado como porcentaje.
- Confundir el coeficiente de variación con la varianza.
- Calcular el $CV$ sin haber obtenido primero la media y la desviación estándar.
- Pensar que el coeficiente de variación tiene las mismas unidades que los datos originales.
fuente: 'Elaboración propia.'
estado: publicado
