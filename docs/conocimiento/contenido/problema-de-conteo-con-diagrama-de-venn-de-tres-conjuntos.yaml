semantic_id: MAT.FUND.CARDINALIDAD_CONJUNTOS.PROBLEMA_VENN_TRES_CONJUNTOS
titulo: Problema de conteo con diagrama de Venn de tres conjuntos
objetivo: Resolver problemas de conteo con diagramas de Venn de tres conjuntos distribuyendo los datos
  de 'adentro hacia afuera' en las ocho regiones disjuntas del diagrama.
introduccion: 'Imagina que tienes una lista de alumnos inscritos en los talleres de Ajedrez ($A$), Robótica
  ($B$) y Teatro ($C$). Si quieres organizar la información de modo que no cuentes dos veces a ningún
  alumno, dibujas tres círculos que se entrelazan. Esto divide el diagrama en 8 zonas diferentes. Para
  rellenar estas zonas sin equivocarte, la clave es empezar desde el centro de todo: los alumnos que están
  en los tres talleres simultáneamente ($A \cap B \cap C$). Desde ahí, vas restando para rellenar las
  zonas de dos talleres, luego las de un solo taller, y finalmente los que no participan en ninguno. ¡Este
  método paso a paso hace que resolver problemas de tres conjuntos sea muy sencillo!'
resumen: Resolver problemas de tres conjuntos mediante diagramas de Venn consiste en dividir el universo
  en ocho regiones disjuntas, calculando sus cardinalidades de manera secuencial desde la intersección
  triple ($A \cap B \cap C$) hacia las regiones exteriores.
explicacion: "Un **diagrama de Venn de tres conjuntos** $A$, $B$ y $C$ divide al conjunto universal $U$\
  \ en exactamente ocho regiones disjuntas. Resolver un problema de conteo consiste en encontrar la cardinalidad\
  \ de cada una de estas ocho regiones a partir de los datos dados.\n\n### Las Ocho Regiones Disjuntas\n\
  1. **Intersección Triple (Región central):** Elementos comunes a los tres conjuntos:\n   $$\\text{Región\
  \ } 1 = |A \\cap B \\cap C|$$\n2. **Intersecciones Dobles Exclusivas (Solo dos conjuntos):** Elementos\
  \ comunes a dos conjuntos, pero que no pertenecen al tercero:\n   - 'Solo $A$ y $B$: $|(A \\cap B) \\\
  setminus C| = |A \\cap B| - |A \\cap B \\cap C|$'\n   - 'Solo $A$ y $C$: $|(A \\cap C) \\setminus B|\
  \ = |A \\cap C| - |A \\cap B \\cap C|$'\n   - 'Solo $B$ y $C$: $|(B \\cap C) \\setminus A| = |B \\cap\
  \ C| - |A \\cap B \\cap C|$'\n3. **Regiones Exclusivas Individuales (Solo un conjunto):** Elementos\
  \ que pertenecen únicamente a uno de los conjuntos:\n   - 'Solo $A$: $|Solo\\ A| = |A| - |Solo\\ A\\\
  \ y\\ B| - |Solo\\ A\\ y\\ C| - |A \\cap B \\cap C|$'\n   - 'Solo $B$: $|Solo\\ B| = |B| - |Solo\\ A\\\
  \ y\\ B| - |Solo\\ B\\ y\\ C| - |A \\cap B \\cap C|$'\n   - 'Solo $C$: $|Solo\\ C| = |C| - |Solo\\ A\\\
  \ y\\ C| - |Solo\\ B\\ y\\ C| - |A \\cap B \\cap C|$'\n4. **Exterior (Ninguno):** Elementos del universo\
  \ $U$ que no pertenecen a ninguno de los tres conjuntos:\n   $$|Ninguno| = |U| - |A \\cup B \\cup C|$$\n\
  \   Donde $|A \\cup B \\cup C|$ es la suma de las 7 regiones internas anteriores.\n\n### Estrategia\
  \ de Resolución \"De adentro hacia afuera\"\n- '**Paso 1:** Coloca el valor de la intersección triple\
  \ en el centro.'\n- '**Paso 2:** Resta este valor a las intersecciones dobles dadas para obtener los\
  \ valores de las intersecciones dobles exclusivas.'\n- '**Paso 3:** Resta los tres valores internos\
  \ correspondientes a cada círculo de su total para obtener las regiones exclusivas individuales.'\n\
  - '**Paso 4:** Suma las 7 regiones internas y réstalas del universo para obtener el valor del exterior.'"
procedimiento:
- 'Paso 1: Dibuja tres círculos entrelazados que representan a los conjuntos $A$, $B$ y $C$ dentro del
  rectángulo del universo.'
- 'Paso 2: Escribe la cardinalidad de la intersección triple en la región central compartida por los tres
  círculos.'
- 'Paso 3: Completa las regiones de intersección de dos conjuntos restando la intersección triple de las
  intersecciones dobles totales.'
- 'Paso 4: Completa las regiones de un solo conjunto restando las tres subregiones internas correspondientes
  del total de cada conjunto.'
- 'Paso 5: Suma las 7 regiones internas y resta el resultado del total del universo para hallar los elementos
  en la región exterior (Ninguno).'
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'En una encuesta a 100 estudiantes sobre el uso de redes sociales: 50 usan Instagram ($I$),
    45 Facebook ($F$) y 30 Twitter ($T$). Además, 15 usan $I$ y $F$, 10 usan $I$ y $T$, 8 usan $F$ y $T$,
    y 5 usan las tres. ¿Cuántos estudiantes no usan ninguna de estas tres redes sociales?'
  solucion_pasos:
  - 'Paso a: Identificamos los datos: Universo $|U| = 100$, Individuales ($|I| = 50$, $|F| = 45$, $|T|
    = 30$), Dobles ($|I \cap F| = 15$, $|I \cap T| = 10$, $|F \cap T| = 8$), Triple ($|I \cap F \cap T|
    = 5$).'
  - 'Paso b: Colocamos el $5$ en el centro (intersección triple).'
  - 'Paso c: Calculamos intersecciones dobles exclusivas: Solo $I$ y $F = 15 - 5 = 10$; Solo $I$ y $T
    = 10 - 5 = 5$; Solo $F$ y $T = 8 - 5 = 3$.'
  - 'Paso d: Calculamos regiones exclusivas individuales: Solo $I = 50 - (10 + 5 + 5) = 30$; Solo $F =
    45 - (10 + 3 + 5) = 27$; Solo $T = 30 - (5 + 3 + 5) = 17$.'
  - 'Paso e: Sumamos las 7 regiones internas para hallar la unión: $30 + 27 + 17 + 10 + 5 + 3 + 5 = 97$.'
  - 'Paso f: Restamos del universo para hallar "Ninguno": $100 - 97 = 3$. Por lo tanto, 3 estudiantes
    no usan ninguna red social.'
- titulo: Ejemplo 2
  enunciado: 'En un grupo de deportistas, todos practican al menos uno de los tres deportes: Tenis ($T$),
    Natación ($N$) o Ciclismo ($C$). Hay 10 que practican los tres deportes. Si el total de personas que
    practican exactamente dos deportes es 15, y las personas que practican exactamente un deporte es 20,
    ¿cuántos deportistas hay en total?'
  solucion_pasos:
  - 'Paso a: El problema nos da las sumas de las regiones directamente. Como todos practican al menos
    un deporte, el total de deportistas es igual a la unión de los tres conjuntos.'
  - 'Paso b: La unión está formada por la suma de las 7 regiones internas, que se pueden agrupar en: personas
    que practican exactamente un deporte (3 regiones), personas que practican exactamente dos deportes
    (3 regiones) y personas que practican los tres deportes (1 región).'
  - 'Paso c: Sumamos estos tres grupos: $\text{Total} = \text{Exactamente 1} + \text{Exactamente 2} +
    \text{Exactamente 3}$.'
  - 'Paso d: Calculamos: $\text{Total} = 20 + 15 + 10 = 45$. Por lo tanto, hay 45 deportistas en total.'
- titulo: ¿Se puede calcular el número de personas en el exterior sin tener el dato del universo?
  respuesta: 'No'
  solucion_pasos:
  - El número de elementos en la región exterior (Ninguno) depende directamente de la cardinalidad del
    conjunto universal.
  - Sin conocer el tamaño total de la población en estudio ($|U|$), es imposible saber cuántos elementos
    quedan fuera de la unión de los tres conjuntos.
- titulo: ¿Es posible que la suma de las 7 regiones internas de los conjuntos sea mayor que el universo?
  respuesta: 'No'
  solucion_pasos:
  - La unión de los tres conjuntos está contenida en el conjunto universal $U$.
  - Por ende, la cardinalidad de la unión (que es la suma de las 7 regiones internas) debe ser menor o
    igual a la del universo. Un valor superior indica que los datos del problema están mal planteados.
errores_frecuentes:
- Colocar los valores totales de los conjuntos directamente en las regiones sin restar las intersecciones
  internas, duplicando o triplicando elementos.
- Olvidar restar la intersección triple al calcular las intersecciones dobles exclusivas.
- Confundir la frase "exactamente dos conjuntos" (que no incluye la intersección triple) con "los conjuntos
  A y B" (que sí incluye la intersección triple).
- No verificar que la suma de todas las regiones sea menor o igual al universo.
- Restar incorrectamente los términos al ir de adentro hacia afuera en el diagrama.
fuente: Matemáticas para Ciencias de la Computación, Editorial Prentice Hall, pág. 156
estado: publicado
