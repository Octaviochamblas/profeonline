semantic_id: MAT.GEO.TRIGONOMETRIA_BASICA.COSENO_DEFINICION
titulo: Definición del coseno de un ángulo agudo como razón cateto adyacente / hipotenusa
objetivo: Comprender el coseno de un ángulo agudo en un triángulo rectángulo como la razón entre el cateto
  adyacente y la hipotenusa.
introduccion: 'Junto al seno, la segunda razón trigonométrica fundamental de un ángulo agudo es el coseno,
  que involucra el otro cateto: el adyacente.'
resumen: 'El coseno de un ángulo agudo α en un triángulo rectángulo es la razón entre el cateto adyacente
  a α y la hipotenusa: $\cos(\alpha)=\frac{\text{cateto adyacente}}{\text{hipotenusa}}$.'
explicacion: '![Definición del coseno](/static/img/geometria/areas-pitagoras/trig-coseno-definicion.svg)


  ### Definición formal


  Dado un ángulo agudo $\alpha$ en un triángulo rectángulo, $\cos(\alpha)=\frac{\text{cateto adyacente
  a }\alpha}{\text{hipotenusa}}$.


  ### Desarrollo didáctico


  En un triángulo rectángulo con cateto adyacente a α de 4 cm e hipotenusa de 5 cm, $\cos(\alpha)=\frac{4}{5}=0,8$.
  El cateto adyacente es el que sí toca al ángulo α (sin ser la hipotenusa), a diferencia del cateto opuesto
  usado en el seno.'
procedimiento:
- 'Paso 1: Identifica el ángulo agudo α del que quieres calcular el coseno.'
- 'Paso 2: Identifica el cateto adyacente a ese ángulo (el que lo toca, sin ser la hipotenusa) y la hipotenusa.'
- 'Paso 3: Divide el cateto adyacente entre la hipotenusa.'
ejemplos:
- titulo: Calcular cos(α) con cateto adyacente 4 e hipotenusa 5
  enunciado: Un triángulo rectángulo tiene cateto adyacente a α de 4 cm e hipotenusa de 5 cm.
  solucion_pasos:
  - cos(α)=4/5=0,8.
- titulo: Calcular cos(α) con cateto adyacente 6 e hipotenusa 10
  enunciado: Un triángulo rectángulo tiene cateto adyacente a α de 6 cm e hipotenusa de 10 cm.
  solucion_pasos:
  - cos(α)=6/10=0,6.
- titulo: ¿El coseno también depende solo del ángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, al igual que el seno, es constante para un ángulo dado, independiente del tamaño del triángulo.
- titulo: ¿El coseno puede ser mayor que 1?
  respuesta: 'No'
  solucion_pasos:
  - No, porque el cateto adyacente siempre es menor que la hipotenusa.
errores_frecuentes:
- Confundir el cateto adyacente con el cateto opuesto al calcular el coseno.
- Usar un lado que no es la hipotenusa como denominador.
- Olvidar que el cateto adyacente es distinto según cuál sea el ángulo considerado.
fuente: 'Fuente: Moraleja 53, Cid 221.'
estado: publicado
