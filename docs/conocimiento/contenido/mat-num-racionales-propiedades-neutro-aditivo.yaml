semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.NEUTRO_ADITIVO
titulo: Elemento neutro de la adición
objetivo: Reconocer que sumar cero a un número racional no cambia su valor.
introduccion: 'Existe un único racional que, sumado a cualquier otro, lo deja exactamente igual: ese es
  el elemento neutro de la adición, y en \(\mathbb{Q}\) es el número \(0\).'
resumen: Para todo \(p\in\mathbb{Q}\), se cumple \(p+0=p\).
explicacion: '### Definición formal


  El elemento neutro aditivo de \(\mathbb{Q}\) es \(0=\frac{0}{1}\), ya que para cualquier \(p=\frac{a}{b}\),
  \(p+0=\frac{a}{b}+\frac{0}{1}=\frac{a\cdot1+b\cdot0}{b\cdot1}=\frac{a}{b}=p\).


  ### Desarrollo didáctico


  \(\frac{5}{8}+0=\frac{5}{8}\): sumar \(0\) nunca altera el valor original, sin importar qué racional
  se sume.'
procedimiento:
- 'Paso 1: Toma un racional cualquiera y súmale cero.'
- 'Paso 2: Efectúa la suma escribiendo \(0\) con un denominador conveniente.'
- 'Paso 3: Comprueba que el resultado sea el racional original.'
ejemplos:
- titulo: Aplicación razonada — Elemento neutro aditivo en Q
  enunciado: \(\frac{5}{8}+0=\frac{5}{8}\).
  solucion_pasos:
  - Toma un racional cualquiera y súmale cero.
  - Efectúa la suma escribiendo \(0\) con un denominador conveniente.
  - Comprueba que el resultado sea el racional original.
- titulo: Revisión de una solución — Elemento neutro aditivo en Q
  enunciado: Una solución aplica “Efectúa la suma escribiendo \(0\) con un denominador conveniente.”,
    pero termina sin comprobar que el cero conserva cualquier racional al sumarse con él. Determina qué
    falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define elemento neutro aditivo en Q: el neutro aditivo en \(\mathbb{Q}\)
    es 0 porque sumar 0 no cambia el número.'
  - Toma un racional cualquiera y súmale cero.
  - 'Completa la revisión con este control: Comprueba que el resultado sea el racional original.'
- titulo: ¿Se cumple que el cero conserva cualquier racional al sumarse con él? — Elemento neutro aditivo
    en Q
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el neutro aditivo en \(\mathbb{Q}\) es 0 porque sumar 0
    no cambia el número.
  - El caso “\(\frac{5}{8}+0=\frac{5}{8}\)” satisface esa condición.
  - Comprueba que el resultado sea el racional original.
- titulo: ¿Es válido omitir el paso “Toma un racional cualquiera y súmale cero”? — Elemento neutro aditivo
    en Q
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de elemento neutro aditivo en Q.
  - 'Omitirlo puede volver inválida la acción siguiente: Efectúa la suma escribiendo \(0\) con un denominador
    conveniente.'
  - 'La solución debe terminar de este modo: Comprueba que el resultado sea el racional original.'
errores_frecuentes:
- 'Empezar elemento neutro aditivo en Q sin realizar este control inicial: Toma un racional cualquiera
  y súmale cero.'
- Memorizar “\(\frac{5}{8}+0=\frac{5}{8}\)” como respuesta aislada, sin reconstruir la definición que
  lo justifica.
- Convertir en receta el paso “Efectúa la suma escribiendo \(0\) con un denominador conveniente.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre elemento neutro aditivo en Q que contradice el criterio “El cero
  conserva cualquier racional al sumarse con él”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que el resultado sea el racional original.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
