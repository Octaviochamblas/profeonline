semantic_id: MAT.ALG.FUNC_POTENCIA_MODELO.RECONOCIMIENTO_MODELO
titulo: Reconocimiento de un modelo de función potencia en contexto
objetivo: Identificar cuándo una situación real se describe mediante un modelo de función potencia $f(x)=a\cdot
  x^n$.
introduccion: Muchas situaciones cotidianas, como el área de una figura o la fuerza de atracción entre objetos,
  siguen relaciones donde una cantidad depende de otra elevada a una potencia fija.
resumen: Un modelo de **función potencia** aparece cuando una magnitud es proporcional a otra elevada a un
  exponente constante, es decir, cuando la relación tiene la forma $y=a\cdot x^n$.
explicacion: '### Definición formal


  Una situación se modela con una función potencia si existe una constante $a\neq0$ y un exponente fijo $n$ tal
  que la magnitud dependiente $y$ se relaciona con la magnitud independiente $x$ mediante $y=a\cdot x^n$, sin
  que $x$ aparezca en el exponente ni dentro de un logaritmo.


  ### Desarrollo didáctico


  El área de un cuadrado de lado $x$ es $A(x)=x^2$: es una función potencia con $a=1$, $n=2$. En cambio, el
  crecimiento de una población que se duplica cada año, $P(t)=P_0\cdot2^t$, no es función potencia, porque la
  variable está en el exponente.'
procedimiento:
- 'Paso 1: Identifica la magnitud independiente y la dependiente en la situación descrita.'
- 'Paso 2: Verifica si la variable independiente aparece en la base, con exponente fijo.'
- 'Paso 3: Si se cumple, escribe el modelo en la forma $y=a\cdot x^n$.'
ejemplos:
- titulo: Reconocimiento en el área de un círculo
  enunciado: '¿El área de un círculo $A(r)=\pi r^2$ es un modelo de función potencia?'
  solucion_pasos:
  - La variable $r$ está en la base, elevada al exponente fijo $2$.
  - Sí, es un modelo de función potencia con $a=\pi$ y $n=2$.
- titulo: Distinción respecto a un modelo exponencial
  enunciado: '¿El interés compuesto $C(t)=1000\cdot1{,}05^t$ es un modelo de función potencia?'
  solucion_pasos:
  - La variable $t$ está en el exponente, no en la base.
  - No, corresponde a un modelo exponencial, no a una función potencia.
- titulo: ¿Todo modelo con exponente visible es una función potencia?
  enunciado: ¿Cualquier modelo matemático que incluya un exponente es automáticamente una función potencia?
  respuesta: 'No'
  solucion_pasos:
  - Solo lo es si la variable independiente está en la base y el exponente es constante.
- titulo: ¿El volumen de un cubo de arista $x$ es un modelo de función potencia?
  enunciado: ¿El volumen $V(x)=x^3$ de un cubo de arista $x$ corresponde a una función potencia?
  respuesta: Sí
  solucion_pasos:
  - La variable $x$ está en la base, elevada al exponente fijo $3$.
errores_frecuentes:
- Confundir un modelo de función potencia con uno exponencial por tener ambos un exponente.
- No identificar correctamente cuál magnitud es la variable independiente.
- Suponer que el exponente debe ser necesariamente $2$ o $3$, ignorando otros valores posibles.
- Ignorar el coeficiente $a$ al describir el modelo, dejándolo implícito sin justificación.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
