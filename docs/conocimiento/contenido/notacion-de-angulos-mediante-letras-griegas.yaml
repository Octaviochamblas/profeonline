semantic_id: MAT.GEO.ANGULOS_FUNDAMENTOS.NOTACION_LETRAS_GRIEGAS
titulo: Notación de ángulos mediante letras griegas
objetivo: Interpretar la notación de un ángulo escrita con letras griegas y comprobar que cambiar el nombre
  del ángulo no cambia su abertura ni sus lados.
introduccion: En muchos diagramas sería incómodo escribir tres puntos sobre cada abertura. Una letra griega
  funciona como una etiqueta corta para hablar del mismo ángulo. Este recurso se centra en notación de
  ángulos mediante letras griegas y en cómo reconocerlo con un criterio geométrico claro.
resumen: Un ángulo puede nombrarse con una letra griega cuando el contexto permite identificarlo sin ambigüedad.
  Como idea de control, cambiar el nombre del ángulo no cambia su abertura ni sus lados.
explicacion: 'Un ángulo puede nombrarse con una letra griega cuando el contexto permite identificarlo
  sin ambigüedad.


  El ejemplo “en un esquema sencillo, un ángulo se puede marcar como \(\alpha\) para referirse a su medida”
  no se resuelve por apariencia: se justifica usando la definición y revisando finalmente que cambiar
  el nombre del ángulo no cambia su abertura ni sus lados.'
procedimiento:
- 'Paso 1: Ubica en el dibujo qué abertura está asociada a la letra griega.'
- 'Paso 2: Relaciona esa etiqueta con los lados y el vértice del ángulo marcado.'
- 'Paso 3: Comprueba que la letra nombra el ángulo completo y no solo una de sus partes.'
ejemplos:
- titulo: Aplicación directa — Notación con letras griegas
  enunciado: En un esquema sencillo, un ángulo se puede marcar como \(\alpha\) para referirse a su medida.
  solucion_pasos:
  - Ubica en el dibujo qué abertura está asociada a la letra griega.
  - Relaciona esa etiqueta con los lados y el vértice del ángulo marcado.
  - Comprueba que la letra nombra el ángulo completo y no solo una de sus partes.
- titulo: Chequeo del procedimiento — Notación con letras griegas
  enunciado: 'Un estudiante usa la idea “cambiar el nombre del ángulo no cambia su abertura ni sus lados”
    al analizar este caso: en un esquema sencillo, un ángulo se puede marcar como \(\alpha\) para referirse
    a su medida. Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: un ángulo puede nombrarse con una letra griega cuando el contexto permite
    identificarlo sin ambigüedad.'
  - Relaciona esa etiqueta con los lados y el vértice del ángulo marcado.
  - Comprueba que la letra nombra el ángulo completo y no solo una de sus partes.
- titulo: ¿El caso confirma que cambiar el nombre del ángulo no cambia su abertura ni sus lados? — Notación
    con letras griegas
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo puede nombrarse con una letra griega
    cuando el contexto permite identificarlo sin ambigüedad.'
  - En el caso “en un esquema sencillo, un ángulo se puede marcar como \(\alpha\) para referirse a su
    medida” se observa que cambiar el nombre del ángulo no cambia su abertura ni sus lados.
  - Comprueba que la letra nombra el ángulo completo y no solo una de sus partes.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Notación con letras griegas
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de notación de ángulos mediante letras griegas.
  - Después del paso “Ubica en el dibujo qué abertura está asociada a la letra griega.” todavía hace falta
    revisar “Relaciona esa etiqueta con los lados y el vértice del ángulo marcado.”.
  - El cierre correcto exige “Comprueba que la letra nombra el ángulo completo y no solo una de sus partes.”.
errores_frecuentes:
- Notación con letras griegas significa una letra griega cualquiera dibujada cerca de la figura, aunque
  no señale una abertura concreta.
- Para resolver notación con letras griegas, basta con el paso “Ubica en el dibujo qué abertura está asociada
  a la letra griega.” y no hace falta revisar “Relaciona esa etiqueta con los lados y el vértice del ángulo
  marcado.”.
- Si el dibujo parece claro, se puede ignorar que cambiar el nombre del ángulo no cambia su abertura ni
  sus lados.
- Dos configuraciones distintas representan notación con letras griegas solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que la letra nombra el ángulo completo
  y no solo una de sus partes.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
