semantic_id: MAT.ALG.LEYES_MULTIPLICACION.SIGNOS_MULTIPLES_FACTORES
objetivo: Determinar el signo del producto de tres o más factores algebraicos contando
  los signos negativos.
introduccion: 'Con dos factores, la regla de signos es simple. Con tres o más, hay
  un truco elegante: basta con contar cuántos factores negativos hay. Número par de
  negativos → positivo. Número impar → negativo.'
resumen: 'Para **Múltiples Factores**, el signo del producto se determina contando
  los factores con signo negativo: si son **pares**, el producto es positivo; si son
  **impares**, el producto es negativo.'
explicacion: 'Ejemplo: $(-2)(-3)(+4)$.

  Factores negativos: $-2$ y $-3$ → 2 negativos (par) → resultado positivo.

  Producto: $2 \times 3 \times 4 = 24$ → resultado final: $+24$.


  Ejemplo con 3 negativos: $(-2)(-3)(-4)$.

  Factores negativos: 3 (impar) → resultado negativo.

  Producto: $24$ → resultado final: $-24$.


  Regla mnemotécnica: un número par de signos negativos se ''cancelan'' entre sí.'
procedimiento:
- 'Paso 1: Cuenta cuántos factores tienen signo negativo.'
- 'Paso 2: Si el conteo es par → signo positivo. Si es impar → signo negativo.'
- 'Paso 3: Multiplica los valores absolutos de todos los coeficientes.'
- 'Paso 4: Multiplica todas las partes literales.'
- 'Paso 5: Adjunta el signo del paso 2 al resultado.'
ejemplos:
- titulo: Los tres negativos
  enunciado: 'Calcula: (-a)(-2b)(-3c).'
  solucion_pasos:
  - 'Negativos: 3 (impar) → resultado negativo.'
  - 'Coeficientes: 1 × 2 × 3 = 6.'
  - 'Letras: a × b × c = abc.'
  - 'Resultado: -6abc.'
errores_frecuentes:
- Aplicar la regla par/impar en la suma en lugar de la multiplicación.
- Olvidar contar un factor y llegar al signo equivocado.
fuente: Álgebra de Baldor.
estado: publicado
