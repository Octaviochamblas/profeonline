semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.JERARQUIA_OPERACIONES
titulo: Jerarquía de operaciones con fracciones
objetivo: Aplicar el orden correcto de las operaciones en expresiones combinadas con fracciones.
introduccion: 'Cuando una expresión combina sumas, restas, multiplicaciones y divisiones de fracciones,
  el orden en que se resuelven no es libre: sigue el mismo orden de prioridad que en los números enteros.'
resumen: En expresiones combinadas se resuelven primero paréntesis, luego multiplicaciones y divisiones
  (de izquierda a derecha), y finalmente sumas y restas.
explicacion: '### Definición formal


  La jerarquía de operaciones establece el orden: 1) paréntesis, 2) potencias, 3) multiplicación y división
  (izquierda a derecha), 4) suma y resta (izquierda a derecha); las fracciones se rigen por el mismo orden
  que los enteros.


  ### Desarrollo didáctico


  En \(\frac{1}{2}+\frac{3}{4}\cdot\frac{2}{3}\), primero se calcula el producto \(\frac{3}{4}\cdot\frac{2}{3}=\frac{6}{12}=\frac{1}{2}\),
  y luego se suma: \(\frac{1}{2}+\frac{1}{2}=1\).'
procedimiento:
- 'Paso 1: Separa la expresión según paréntesis, multiplicaciones/divisiones y sumas/restas.'
- 'Paso 2: Resuelve cada nivel de izquierda a derecha usando fracciones equivalentes cuando corresponda.'
- 'Paso 3: Sustituye los resultados parciales y verifica que no hayas alterado el orden.'
ejemplos:
- titulo: Aplicación razonada — Jerarquía de operaciones con fracciones
  enunciado: En \(\frac{1}{2}+\frac{3}{4}\cdot\frac{2}{3}\), primero se calcula el producto.
  solucion_pasos:
  - Separa la expresión según paréntesis, multiplicaciones/divisiones y sumas/restas.
  - Resuelve cada nivel de izquierda a derecha usando fracciones equivalentes cuando corresponda.
  - Sustituye los resultados parciales y verifica que no hayas alterado el orden.
- titulo: Revisión de una solución — Jerarquía de operaciones con fracciones
  enunciado: Una solución aplica “Resuelve cada nivel de izquierda a derecha usando fracciones equivalentes
    cuando corresponda.”, pero termina sin comprobar que la jerarquía evita resultados distintos para
    una misma expresión. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define jerarquía de operaciones con fracciones: en expresiones con fracciones
    se respeta la jerarquía usual: paréntesis, multiplicaciones y divisiones, luego sumas y restas.'
  - Separa la expresión según paréntesis, multiplicaciones/divisiones y sumas/restas.
  - 'Completa la revisión con este control: Sustituye los resultados parciales y verifica que no hayas
    alterado el orden.'
- titulo: ¿Se cumple que la jerarquía evita resultados distintos para una misma expresión? — Jerarquía
    de operaciones con fracciones
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que en expresiones con fracciones se respeta la jerarquía
    usual: paréntesis, multiplicaciones y divisiones, luego sumas y restas.'
  - El caso “En \(\frac{1}{2}+\frac{3}{4}\cdot\frac{2}{3}\), primero se calcula el producto” satisface
    esa condición.
  - Sustituye los resultados parciales y verifica que no hayas alterado el orden.
- titulo: ¿Es válido omitir el paso “Separa la expresión según paréntesis, multiplicaciones/divisiones
    y sumas/restas”? — Jerarquía de operaciones con fracciones
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de jerarquía de operaciones con fracciones.
  - 'Omitirlo puede volver inválida la acción siguiente: Resuelve cada nivel de izquierda a derecha usando
    fracciones equivalentes cuando corresponda.'
  - 'La solución debe terminar de este modo: Sustituye los resultados parciales y verifica que no hayas
    alterado el orden.'
errores_frecuentes:
- 'Empezar jerarquía de operaciones con fracciones sin realizar este control inicial: Separa la expresión
  según paréntesis, multiplicaciones/divisiones y sumas/restas.'
- Memorizar “En \(\frac{1}{2}+\frac{3}{4}\cdot\frac{2}{3}\), primero se calcula el producto” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Resuelve cada nivel de izquierda a derecha usando fracciones equivalentes
  cuando corresponda.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre jerarquía de operaciones con fracciones que contradice el criterio
  “La jerarquía evita resultados distintos para una misma expresión”.
- 'Cerrar el ejercicio sin esta comprobación específica: Sustituye los resultados parciales y verifica
  que no hayas alterado el orden.'
