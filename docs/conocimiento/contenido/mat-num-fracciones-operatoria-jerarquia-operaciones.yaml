semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.JERARQUIA_OPERACIONES
objetivo: Resolver operaciones combinadas con fracciones.
introduccion: Una tarea matemática frecuente es resolver operaciones combinadas con
  fracciones. El caso “En \(\frac{1}{2}+\frac{3}{4}\cdot\frac{2}{3}\), primero se
  calcula el producto” muestra cómo abordarla desde jerarquía de operaciones con fracciones.
resumen: 'En expresiones con fracciones se respeta la jerarquía usual: paréntesis,
  multiplicaciones y divisiones, luego sumas y restas. Como criterio de control, la
  jerarquía evita resultados distintos para una misma expresión'
explicacion: |-
  En expresiones con fracciones se respeta la jerarquía usual: paréntesis, multiplicaciones y divisiones, luego sumas y restas.

  Esta formulación se hace concreta en “En \(\frac{1}{2}+\frac{3}{4}\cdot\frac{2}{3}\), primero se calcula el producto”. Allí puede reconocerse que la jerarquía evita resultados distintos para una misma expresión.
procedimiento:
- 'Paso 1: Separa la expresión según paréntesis, multiplicaciones/divisiones y sumas/restas.'
- 'Paso 2: Resuelve cada nivel de izquierda a derecha usando fracciones equivalentes
  cuando corresponda.'
- 'Paso 3: Sustituye los resultados parciales y verifica que no hayas alterado el
  orden.'
ejemplos:
- titulo: Aplicación razonada — Jerarquía de operaciones con fracciones
  enunciado: En \(\frac{1}{2}+\frac{3}{4}\cdot\frac{2}{3}\), primero se calcula el
    producto.
  solucion_pasos:
  - Separa la expresión según paréntesis, multiplicaciones/divisiones y sumas/restas.
  - Resuelve cada nivel de izquierda a derecha usando fracciones equivalentes cuando
    corresponda.
  - Sustituye los resultados parciales y verifica que no hayas alterado el orden.
- titulo: Revisión de una solución — Jerarquía de operaciones con fracciones
  enunciado: Una solución aplica “Resuelve cada nivel de izquierda a derecha usando
    fracciones equivalentes cuando corresponda.”, pero termina sin comprobar que la
    jerarquía evita resultados distintos para una misma expresión. Determina qué falta
    justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define jerarquía de operaciones con fracciones: en
    expresiones con fracciones se respeta la jerarquía usual: paréntesis, multiplicaciones
    y divisiones, luego sumas y restas.'
  - Separa la expresión según paréntesis, multiplicaciones/divisiones y sumas/restas.
  - 'Completa la revisión con este control: Sustituye los resultados parciales y verifica
    que no hayas alterado el orden.'
- titulo: ¿Se cumple que la jerarquía evita resultados distintos para una misma expresión?
    — Jerarquía de operaciones con fracciones
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que en expresiones con fracciones se respeta
    la jerarquía usual: paréntesis, multiplicaciones y divisiones, luego sumas y restas.'
  - El caso “En \(\frac{1}{2}+\frac{3}{4}\cdot\frac{2}{3}\), primero se calcula el
    producto” satisface esa condición.
  - Sustituye los resultados parciales y verifica que no hayas alterado el orden.
- titulo: ¿Es válido omitir el paso “Separa la expresión según paréntesis, multiplicaciones/divisiones
    y sumas/restas”? — Jerarquía de operaciones con fracciones
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de jerarquía de operaciones con
    fracciones.
  - 'Omitirlo puede volver inválida la acción siguiente: Resuelve cada nivel de izquierda
    a derecha usando fracciones equivalentes cuando corresponda.'
  - 'La solución debe terminar de este modo: Sustituye los resultados parciales y
    verifica que no hayas alterado el orden.'
errores_frecuentes:
- 'Empezar jerarquía de operaciones con fracciones sin realizar este control inicial:
  Separa la expresión según paréntesis, multiplicaciones/divisiones y sumas/restas.'
- Memorizar “En \(\frac{1}{2}+\frac{3}{4}\cdot\frac{2}{3}\), primero se calcula el
  producto” como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Resuelve cada nivel de izquierda a derecha usando fracciones
  equivalentes cuando corresponda.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre jerarquía de operaciones con fracciones que
  contradice el criterio “La jerarquía evita resultados distintos para una misma expresión”.
- 'Cerrar el ejercicio sin esta comprobación específica: Sustituye los resultados
  parciales y verifica que no hayas alterado el orden.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
