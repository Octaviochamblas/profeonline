semantic_id: MAT.ALG.SISTEMAS_INECUACIONES.SISTEMA_SIN_SOLUCION
titulo: Reconocimiento de sistema de inecuaciones sin solución
objetivo: Identificar y resolver sistemas de inecuaciones lineales con una incógnita que no tienen solución,
  interpretando la intersección vacía de sus conjuntos solución.
introduccion: Al resolver un sistema de inecuaciones, buscamos los valores que satisfacen todas las desigualdades
  simultáneamente. Sin embargo, puede darse el caso de que las condiciones sean incompatibles, es decir,
  que ningún número real cumpla todas las inecuaciones al mismo tiempo. En estos casos, decimos que el
  sistema no tiene solución.
resumen: Un sistema de inecuaciones no tiene solución cuando la intersección de los conjuntos solución
  de cada inecuación individual es vacía ($S_1 \cap S_2 = \emptyset$).
explicacion: '### Definición formal


  Sea un sistema de dos inecuaciones lineales con una incógnita $x$:


  $$\begin{cases} a_1 x + b_1 > 0 \\ a_2 x + b_2 < 0 \end{cases}$$


  Si el conjunto solución de la primera inecuación es $S_1$ y el de la segunda es $S_2$, el conjunto solución
  del sistema es $S = S_1 \cap S_2$. El sistema no tiene solución si y solo si $S_1 \cap S_2 = \emptyset$.


  ### Desarrollo didáctico


  Para comprender visualmente por qué un sistema no tiene solución, resulta muy útil representar los intervalos
  en la recta numérica. Supongamos que, tras resolver cada inecuación por separado, obtenemos que $x >
  5$ y al mismo tiempo $x < 2$.


  Al dibujar la recta numérica y marcar los valores mayores a $5$ (hacia la derecha) y los valores menores
  a $2$ (hacia la izquierda), observamos que las regiones sombreadas no se superponen en ningún punto.
  No existe ningún número real que sea simultáneamente estrictamente mayor que $5$ y estrictamente menor
  que $2$. Como no hay elementos en común, la intersección de los intervalos es el conjunto vacío.'
procedimiento:
- Resuelve cada inecuación del sistema de forma independiente para hallar sus respectivos conjuntos solución.
- Expresa el conjunto solución de cada inecuación como un intervalo o desigualdad.
- Representa gráficamente cada intervalo obtenido sobre una misma recta numérica.
- Identifica la región donde se intersecan o superponen todos los intervalos trazados.
- Si los intervalos no se superponen en ningún punto, concluye que la intersección es vacía y el sistema
  carece de solución.
ejemplos:
- titulo: Sistema con condiciones opuestas excluyentes
  enunciado: 'Resuelve el siguiente sistema de inecuaciones:


    $\begin{cases} 2x - 4 > 6 \\ -3x + 9 > 0 \end{cases}$'
  solucion_pasos:
  - 'Resolvemos la primera inecuación: $2x - 4 > 6 \implies 2x > 10 \implies x > 5$. El intervalo es $(5,
    \infty)$.'
  - 'Resolvemos la segunda inecuación: $-3x + 9 > 0 \implies -3x > -9 \implies x < 3$. El intervalo es
    $(-\infty, 3)$.'
  - 'Intersecamos los intervalos: Buscamos valores de $x$ que pertenezcan simultáneamente a $(5, \infty)$
    y a $(-\infty, 3)$.'
  - Como $x > 5$ exige que los valores sean mayores a $5$, y $x < 3$ exige que sean menores a $3$, no
    hay traslape.
  - 'Conclusión: La intersección es vacía, el sistema no tiene solución ($S = \emptyset$).'
- titulo: Restricciones contradictorias en un modelo de producción
  enunciado: "Una fábrica requiere que la temperatura $T$ (en grados Celsius) de un proceso cumpla las\
    \ siguientes condiciones por motivos de seguridad y eficiencia:\n\n$\\begin{cases} T - 150 \\ge 20\
    \ \\\\ 2T \\le 300 \\end{cases}$ \n\n¿Existe alguna temperatura que cumpla ambos requisitos?"
  solucion_pasos:
  - 'De la primera condición, tenemos: $T - 150 \ge 20 \implies T \ge 170$. Es decir, la temperatura debe
    ser al menos de $170^\circ C$.'
  - 'De la segunda condición, tenemos: $2T \le 300 \implies T \le 150$. Esto significa que la temperatura
    no puede superar los $150^\circ C$.'
  - 'Buscamos la intersección de ambos conjuntos: $[170, \infty) \cap (-\infty, 150]$.'
  - No existe ningún número real que sea mayor o igual a $170$ y, al mismo tiempo, menor o igual a $150$.
  - Por lo tanto, el sistema no tiene solución y no existe una temperatura que satisfaga ambos requisitos.
- titulo: ¿Es posible que un sistema con inecuaciones que apuntan en el mismo sentido carezca de solución?
  respuesta: Falso
  solucion_pasos:
  - Consideremos un sistema con dos inecuaciones de la forma $x > a$ y $x > b$.
  - El conjunto solución será la intersección $(a, \infty) \cap (b, \infty)$.
  - Esta intersección siempre resultará en el intervalo $(\max(a, b), \infty)$, el cual nunca es vacío.
  - De forma análoga ocurre para inecuaciones del tipo $x < a$ y $x < b$.
  - Por lo tanto, si las desigualdades apuntan al mismo infinito (sin restricciones adicionales contrarias),
    el sistema siempre tendrá solución.
- titulo: ¿El sistema formado por las inecuaciones $x \ge 4$ y $x \le 4$ carece de solución?
  respuesta: Falso
  solucion_pasos:
  - El conjunto solución de la primera inecuación es $[4, \infty)$.
  - El conjunto solución de la segunda inecuación es $(-\infty, 4]$.
  - Al intersecar ambos intervalos, obtenemos $[4, \infty) \cap (-\infty, 4]$.
  - El único elemento común en ambos conjuntos es el número $4$.
  - Por lo tanto, el sistema sí tiene solución, la cual es el conjunto unitario $S = \{4\}$.
errores_frecuentes:
- Creer que si una de las inecuaciones tiene como solución todos los reales, el sistema carece de solución.
- Asumir que un sistema carece de solución si los límites de los intervalos son el mismo número y uno
  es abierto y el otro cerrado.
- Afirmar que un sistema no tiene solución si ambas desigualdades involucran signos negativos en la variable
  principal sin resolverlas primero.
- Pensar que la solución de un sistema incompatible es el número cero, confundiendo el conjunto vacío
  con el valor numérico cero.
- Concluir equivocadamente que un sistema sin solución significa que el planteamiento algebraico es incorrecto
  o inválido.
