semantic_id: MAT.GEO.RECTA_ECUACIONES.PENDIENTE_M
titulo: Identificación de la pendiente m en la ecuación principal de la recta
objetivo: Identificar la pendiente m en la ecuación principal de una recta e interpretarla como la razón
  de cambio entre y y x.
introduccion: 'La pendiente indica qué tan inclinada está una recta y en qué dirección: cuánto cambia
  y por cada unidad que cambia x.'
resumen: 'En la ecuación $y=mx+b$, la pendiente $m$ representa el cambio en $y$ por cada unidad de cambio
  en $x$: $m=\dfrac{\Delta y}{\Delta x}$.'
explicacion: '![Pendiente m de una recta](/static/img/geometria/analitica/rectaeq-pendiente-m.svg)


  ### Definición formal


  La pendiente $m$ de una recta $y=mx+b$ es el coeficiente que acompaña a $x$, e indica que por cada aumento
  de 1 unidad en $x$, $y$ aumenta (o disminuye, si $m<0$) en $m$ unidades.


  ### Desarrollo didáctico


  En la figura, la recta tiene pendiente $m=1{,}5$: al avanzar 2 unidades en x (Δx=2), y aumenta 3 unidades
  (Δy=3), cumpliéndose que $m=\dfrac{3}{2}=1{,}5$.'
procedimiento:
- 'Paso 1: Identifica el coeficiente que acompaña a la variable x en la ecuación y=mx+b.'
- 'Paso 2: Interpreta ese valor como el cambio en y por cada unidad de cambio en x.'
- 'Paso 3: Determina si la recta es creciente (m>0), decreciente (m<0), horizontal (m=0), o si no tiene
  pendiente definida (recta vertical).'
ejemplos:
- titulo: Identificar la pendiente en una ecuación dada
  enunciado: y=1,5x+1.
  solucion_pasos:
  - m=1,5, por lo que la recta es creciente.
- titulo: Calcular el cambio en y usando la pendiente
  enunciado: m=1,5, y x aumenta en 4 unidades.
  solucion_pasos:
  - El cambio en y es Δy=m×Δx=1,5×4=6 unidades.
- titulo: ¿Una pendiente positiva indica que la recta es creciente?
  respuesta: Sí
  solucion_pasos:
  - Sí, si m>0, y aumenta cuando x aumenta.
- titulo: ¿Una pendiente de valor 0 indica una recta vertical?
  respuesta: 'No'
  solucion_pasos:
  - No, una pendiente de 0 corresponde a una recta horizontal, no vertical.
errores_frecuentes:
- Confundir el signo de la pendiente, asociando pendiente negativa con recta creciente.
- Creer que una recta vertical tiene pendiente igual a 0 (en realidad no tiene pendiente definida).
- Calcular incorrectamente Δy/Δx, invirtiendo numerador y denominador.
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
