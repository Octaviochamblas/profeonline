semantic_id: MAT.NUM.DECIMALES_OPERATORIA.DIVISION_POR_NATURAL
objetivo: Dividir un decimal por un número natural.
introduccion: Una tarea matemática frecuente es dividir un decimal por un número natural.
  El caso “\(4.8 \div 3 = 1.6\)” muestra cómo abordarla desde división de decimal
  por número natural.
resumen: Al dividir un decimal por un número natural se conserva la coma y se continúa
  la división cifra a cifra. Como criterio de control, la división por natural mantiene
  el valor posicional si se baja la coma en el momento adecuado
explicacion: |-
  Al dividir un decimal por un número natural se conserva la coma y se continúa la división cifra a cifra.

  En el caso “\(4.8 \div 3 = 1.6\)” esta definición se aplica de forma directa. El control final consiste en comprobar que la división por natural mantiene el valor posicional si se baja la coma en el momento adecuado.
procedimiento:
- 'Paso 1: Plantea la división y avanza por las cifras del dividendo.'
- 'Paso 2: Al cruzar la coma del dividendo, coloca la coma en el cociente.'
- 'Paso 3: Multiplica cociente por divisor para comprobar que recuperas el dividendo.'
ejemplos:
- titulo: Aplicación razonada — División de decimal por número natural
  enunciado: \(4.8 \div 3 = 1.6\).
  solucion_pasos:
  - Plantea la división y avanza por las cifras del dividendo.
  - Al cruzar la coma del dividendo, coloca la coma en el cociente.
  - Multiplica cociente por divisor para comprobar que recuperas el dividendo.
- titulo: Revisión de una solución — División de decimal por número natural
  enunciado: Una solución aplica “Al cruzar la coma del dividendo, coloca la coma
    en el cociente.”, pero termina sin comprobar que la división por natural mantiene
    el valor posicional si se baja la coma en el momento adecuado. Determina qué falta
    justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define división de decimal por número natural: al dividir
    un decimal por un número natural se conserva la coma y se continúa la división
    cifra a cifra.'
  - Plantea la división y avanza por las cifras del dividendo.
  - 'Completa la revisión con este control: Multiplica cociente por divisor para comprobar
    que recuperas el dividendo.'
- titulo: ¿Se cumple que la división por natural mantiene el valor posicional si se
    baja la coma en el momento adecuado? — División de decimal por número natural
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que al dividir un decimal por un número
    natural se conserva la coma y se continúa la división cifra a cifra.
  - El caso “\(4.8 \div 3 = 1.6\)” satisface esa condición.
  - Multiplica cociente por divisor para comprobar que recuperas el dividendo.
- titulo: ¿Es válido omitir el paso “Plantea la división y avanza por las cifras del
    dividendo”? — División de decimal por número natural
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de división de decimal por número
    natural.
  - 'Omitirlo puede volver inválida la acción siguiente: Al cruzar la coma del dividendo,
    coloca la coma en el cociente.'
  - 'La solución debe terminar de este modo: Multiplica cociente por divisor para
    comprobar que recuperas el dividendo.'
errores_frecuentes:
- 'Empezar división de decimal por número natural sin realizar este control inicial:
  Plantea la división y avanza por las cifras del dividendo.'
- Memorizar “\(4.8 \div 3 = 1.6\)” como respuesta aislada, sin reconstruir la definición
  que lo justifica.
- Convertir en receta el paso “Al cruzar la coma del dividendo, coloca la coma en
  el cociente.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre división de decimal por número natural que contradice
  el criterio “La división por natural mantiene el valor posicional si se baja la
  coma en el momento adecuado”.
- 'Cerrar el ejercicio sin esta comprobación específica: Multiplica cociente por divisor
  para comprobar que recuperas el dividendo.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
