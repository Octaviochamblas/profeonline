semantic_id: MAT.ALG.MODELAMIENTO_LINEAL.IDENTIFICACION_INCOGNITA
titulo: Identificación de la Incógnita
objetivo: Aprender a traducir una pregunta en lenguaje natural a una variable matemática.
explicacion: |
  El primer paso para resolver un problema de la vida real con álgebra no es calcular, es nombrar. Lee la pregunta del problema (generalmente está al final). Lo que te están preguntando es tu incógnita.

  Si el problema dice '¿Cuántos años tiene Juan?', entonces defines: $x = \text{edad de Juan}$.
  Si el problema habla de varios sujetos ('La edad de Pedro es el doble que la de Juan'), debes usar ESA misma $x$ como base para construir a los demás. Entonces Pedro sería $2x$.

  Regla de oro: Asigna la $x$ al elemento más pequeño o básico del problema. Si sabes cuánto vale la base, sabes cuánto valen los demás.
procedimiento: |
  1. Lee la pregunta final del problema verbal.
  2. Asigna la letra 'x' a la cantidad desconocida principal.
  3. Escribe explícitamente en una esquina qué significa la 'x' (ej: 'x = precio del pantalón').
  4. Expresa todas las demás cantidades desconocidas usando variaciones de 'x' (x+5, 3x, etc.).
