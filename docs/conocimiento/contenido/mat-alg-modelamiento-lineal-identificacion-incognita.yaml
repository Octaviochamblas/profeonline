semantic_id: 'MAT.ALG.MODELAMIENTO_LINEAL.IDENTIFICACION_INCOGNITA'
titulo: 'Identificación de la Incógnita'
objetivo: 'Aprender a traducir una pregunta en lenguaje natural a una variable matemática.'
introduccion: |
  El primer paso para resolver un problema de la vida real con álgebra no es calcular, es nombrar. Lee la pregunta del problema (generalmente está al final). Lo que te están preguntando es tu incógnita.
resumen: |
  Regla de oro: Asigna la $x$ al elemento más pequeño o básico del problema. Si sabes cuánto vale la base, sabes cuánto valen los demás.
explicacion: |
  Si el problema dice '¿Cuántos años tiene Juan?', entonces defines: $x = \text{edad de Juan}$.
  Si el problema habla de varios sujetos ('La edad de Pedro es el doble que la de Juan'), debes usar ESA misma $x$ como base para construir a los demás. Entonces Pedro sería $2x$.
procedimiento:
  - 'Paso 1: Lee la pregunta final del problema verbal.'
  - 'Paso 2: Asigna la letra ''x'' a la cantidad desconocida principal.'
  - 'Paso 3: Escribe explícitamente en una esquina qué significa la ''x'' (ej: ''x = precio del pantalón'').'
  - 'Paso 4: Expresa todas las demás cantidades desconocidas usando variaciones de ''x'' (x+5, 3x, etc.).'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
