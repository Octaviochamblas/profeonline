semantic_id: MAT.GEO.CIRCULO_METRICA.PERIMETRO_SEMICIRCULO
titulo: Cálculo del perímetro de un semicírculo incluyendo diámetro y arco semicircular
objetivo: Calcular el perímetro completo de un semicírculo, sumando el arco semicircular curvo y el diámetro
  recto que lo cierra.
introduccion: 'A diferencia del área (que es simplemente la mitad del círculo), el perímetro del semicírculo
  requiere sumar dos partes distintas: una curva y una recta.'
resumen: 'El perímetro de un semicírculo de radio $r$ es la suma de su arco semicircular ($\pi r$) más
  su diámetro ($2r$): $P=\pi r+2r$.'
explicacion: '![Perímetro de un semicírculo: πr + 2r](/static/img/geometria/circunferencia-circulo/circulo-perimetro-semicirculo.svg)


  ### Definición formal


  El perímetro de un semicírculo de radio $r$ es $P=\pi r+2r$, donde $\pi r$ es la longitud del arco semicircular
  (la mitad de $2\pi r$) y $2r$ es la longitud del diámetro que cierra la figura.


  ### Desarrollo didáctico


  Un semicírculo de radio 7 cm tiene perímetro $P=\pi\times7+2\times7=7\pi+14\approx21,99+14=35,99$ cm.
  Es un error común olvidar sumar el diámetro, calculando solo la longitud del arco curvo.'
procedimiento:
- 'Paso 1: Identifica el radio r del semicírculo.'
- 'Paso 2: Calcula la longitud del arco semicircular: πr.'
- 'Paso 3: Suma el diámetro (2r) a esa longitud para obtener el perímetro total.'
ejemplos:
- titulo: Calcular el perímetro completo de un semicírculo
  enunciado: Un semicírculo tiene radio 7 cm.
  solucion_pasos:
  - P=π×7+2×7=7π+14≈21,99+14=35,99 cm.
- titulo: Calcular solo el arco (sin el diámetro)
  enunciado: ¿Cuánto mide solo el arco curvo de un semicírculo de radio 7 cm?
  solucion_pasos:
  - Arco=π×7≈21,99 cm (sin incluir el diámetro).
- titulo: ¿El perímetro del semicírculo incluye el diámetro?
  respuesta: Sí
  solucion_pasos:
  - Sí, el perímetro completo de la figura cerrada incluye tanto el arco como el diámetro que lo cierra.
- titulo: ¿El perímetro de un semicírculo es la mitad del perímetro de la circunferencia completa?
  respuesta: 'No'
  solucion_pasos:
  - No, porque además del arco (mitad de la circunferencia) se debe sumar el diámetro, que no forma parte
    de la circunferencia.
errores_frecuentes:
- Olvidar sumar el diámetro, calculando solo la longitud del arco curvo como si fuera el perímetro completo.
- Confundir el perímetro del semicírculo con la mitad exacta de la longitud de la circunferencia completa.
- Confundir esta fórmula con la del área del semicírculo.
fuente: 'Fuente: Moraleja 73, 76.'
estado: publicado
