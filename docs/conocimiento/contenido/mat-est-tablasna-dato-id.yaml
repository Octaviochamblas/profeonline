semantic_id: MAT.EST.TABLAS_NO_AGRUPADAS.DATO_ID
titulo: Identificar el dato estadístico individual
objetivo: Identificar el dato estadístico individual, representado con la letra x, como cada valor observado
  de la variable en estudio.
introduccion: 'Antes de construir tablas de frecuencia, es necesario reconocer cuál es la unidad básica
  de información: el dato individual.'
resumen: Un dato estadístico, representado por $x$, es cada valor individual observado de la variable
  en estudio dentro de un conjunto de datos.
explicacion: '![Concepto de dato estadístico individual](/static/img/estadistica/tablasna/tablasna-dato-id.svg)


  ### Definición formal


  Si se tiene un conjunto de datos $\{x_1, x_2, \ldots, x_n\}$, cada $x_i$ representa un dato individual
  observado.


  ### Desarrollo didáctico


  Si se registran las notas de 5 estudiantes: 5, 6, 4, 7, 6, cada uno de esos números (5, 6, 4, 7, 6)
  es un dato $x_i$ individual.'
procedimiento:
- 'Paso 1: Observa el conjunto de valores registrados en el estudio.'
- 'Paso 2: Identifica que cada valor individual de ese conjunto es un dato x.'
- 'Paso 3: Distingue el dato individual del conjunto completo de datos (la lista total).'
ejemplos:
- titulo: Identificar datos individuales en notas escolares
  enunciado: 'Notas de 5 estudiantes: 5, 6, 4, 7, 6.'
  solucion_pasos:
  - Cada número (5, 6, 4, 7, 6) es un dato x individual del conjunto.
- titulo: Identificar datos individuales en edades
  enunciado: 'Edades de un grupo: 12, 13, 12, 14.'
  solucion_pasos:
  - Cada edad registrada (12, 13, 12, 14) es un dato x individual.
- titulo: ¿Un dato x representa siempre un único valor observado?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la unidad básica de información en un conjunto de datos.
- titulo: ¿El conjunto completo de datos es lo mismo que un único dato x?
  respuesta: 'No'
  solucion_pasos:
  - No, el conjunto es la colección de todos los datos individuales x.
errores_frecuentes:
- Confundir el dato individual (x) con el conjunto completo de datos.
- No distinguir entre datos repetidos (mismo valor de x observado varias veces) como si fueran uno solo.
- Perder de vista qué variable representa cada dato x al analizar un conjunto grande.
fuente: 'Elaboración propia (referencia: Moraleja 351).'
estado: publicado
