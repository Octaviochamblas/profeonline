semantic_id: MAT.GEO.TRIANGULOS_RECTANGULOS.CATETOS
titulo: Identificación de los catetos como lados que forman el ángulo recto
objetivo: Identificar los catetos de un triángulo rectángulo como los dos lados que se encuentran en el
  ángulo recto.
introduccion: A diferencia de la hipotenusa, que está enfrente del ángulo recto, los otros dos lados son
  precisamente los que se juntan para formarlo.
resumen: Los catetos son los dos lados de un triángulo rectángulo que forman el ángulo recto.
explicacion: '![Catetos de un triángulo rectángulo](/static/img/geometria/triangulos/triangulos-rectangulos-catetos.svg)


  ### Definición formal


  En un triángulo rectángulo con ángulo recto en A, los catetos son los lados AB y AC, los dos que se
  encuentran en el vértice A.


  ### Desarrollo didáctico


  En un triángulo con ángulo recto en A, los lados AB=3 y AC=4 son los catetos; el lado restante, BC=5,
  es la hipotenusa, más larga que cualquiera de los catetos.'
procedimiento:
- 'Paso 1: Localiza el ángulo recto del triángulo.'
- 'Paso 2: Identifica los dos lados que se encuentran en ese vértice.'
- 'Paso 3: Esos dos lados son los catetos.'
ejemplos:
- titulo: Identificar los catetos
  enunciado: Un triángulo rectángulo tiene su ángulo recto en A, con lados AB y AC.
  solucion_pasos:
  - AB y AC son los catetos, porque forman el ángulo recto en A.
- titulo: Diferenciar de la hipotenusa
  enunciado: Un triángulo rectángulo tiene catetos 6 y 8.
  solucion_pasos:
  - Su hipotenusa, al ser el lado opuesto al recto, mide 10 (por el triángulo 3-4-5 escalado).
- titulo: ¿Los catetos son siempre más cortos que la hipotenusa?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que la hipotenusa es siempre el lado más largo del triángulo rectángulo.
- titulo: ¿Un triángulo rectángulo tiene solo un cateto?
  respuesta: 'No'
  solucion_pasos:
  - No, tiene exactamente dos catetos, además de la hipotenusa.
errores_frecuentes:
- Confundir un cateto con la hipotenusa.
- Creer que un triángulo rectángulo tiene un solo cateto.
- Ubicar los catetos en lados que no forman el ángulo recto.
fuente: Elaboración propia.
estado: publicado
