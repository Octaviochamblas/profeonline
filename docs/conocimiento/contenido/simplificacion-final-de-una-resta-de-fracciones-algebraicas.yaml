semantic_id: MAT.ALG.FRACCIONES_RESTA.SIMPLIFICACION_FINAL
titulo: Simplificación final de una resta de fracciones algebraicas
objetivo: Comprobar si el resultado de la resta permite alguna factorización y simplificación final.
introduccion: Al igual que con la suma, no celebres hasta ver si la fracción resultante se puede reducir.
resumen: Revisa siempre si el numerador reducido (después de la resta y el cambio de signos) puede ser
  factorizado y si alguno de esos factores puede cancelarse con los del denominador.
explicacion: '### Definición formal


  Ese es el instinto clave: siempre revisar si hay una simplificación oculta al final.


  ### Desarrollo didáctico


  La etapa de cierre de la resta es idéntica a la suma. Has domado los signos, distribuido, y reducido
  tu numerador gigante a algo compacto.


  Antes de cantar victoria, la revisión de estilo es obligatoria:

  1. Toma tu numerador compactado y obsérvalo. ¿Se puede factorizar? (Busca factor común o fíjate si es
  un trinomio factorizable).

  2. Si se factoriza, colócalo en paréntesis.

  3. Si alguno de esos nuevos paréntesis del numerador es exactamente igual a los paréntesis que dejaste
  descansando pacíficamente en el denominador, aplícales la simplificación asesina (táchalos).


  El resultado sobreviviente, con sus restricciones de dominio heredadas, es tu respuesta gloriosa final.'
procedimiento:
- 'Paso 1: Termina toda la suma/resta y reduce términos semejantes.'
- 'Paso 2: Inspecciona el numerador resultante. ¿Hay factor común? ¿Es un trinomio factorizable?'
- 'Paso 3: Factorízalo y contrástalo con el denominador.'
- 'Paso 4: Tacha cualquier bloque-factor idéntico (nunca términos sueltos).'
ejemplos:
- titulo: Resta y simplifica $\frac{m^2 + 5m}{m+3} - \frac{6}{m+3}$
  enunciado: Resta y simplifica $\frac{m^2 + 5m}{m+3} - \frac{6}{m+3}$.
  solucion_pasos:
  - 'Resta: $\frac{m^2 + 5m - 6}{m+3}$.'
  - 'El numerador es un trinomio factorizable: buscar dos números que multiplicados den -6 y sumados 5.
    Son 6 y -1. $(m+6)(m-1)$.'
  - 'Fracción: $\frac{(m+6)(m-1)}{m+3}$.'
  - Nada coincide con el denominador. Se deja tal cual o expresado como factores.
- titulo: Simplifica al máximo $\frac{x^2}{x-2} - \frac{2x}{x-2}$.
  solucion_pasos:
  - 'Numerador es x^2 - 2x. Factorizamos: x(x-2). Se cancela con el denominador (x-2), queda x.'
- titulo: 'Respecto de «Simplificación final de una resta de fracciones algebraicas»: ¿La siguiente for'
  enunciado: 'Respecto de «Simplificación final de una resta de fracciones algebraicas»: ¿La siguiente
    formulación es correcta? «Revisa siempre si el numerador reducido (después de la resta y el cambio
    de signos) puede ser factorizado y si alguno de esos factores puede cancelarse con los del denominador»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Revisa siempre si el numerador reducido (después
    de la resta y el cambio de signos) puede ser factorizado y si alguno de esos factores puede cancelarse
    con los del denominador.'
- titulo: 'Respecto de «Simplificación final de una resta de fracciones algebraicas»: ¿La siguiente con'
  enunciado: 'Respecto de «Simplificación final de una resta de fracciones algebraicas»: ¿La siguiente
    conclusión es correcta? «Tachar un término suelto del numerador final con algo del denominador»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Revisa siempre si el numerador reducido (después
    de la resta y el cambio de signos) puede ser factorizado y si alguno de esos factores puede cancelarse
    con los del denominador.'
errores_frecuentes:
- Tachar un término suelto del numerador final con algo del denominador.
- Dar la vuelta a la fracción.
- Para «Si después de restar dos fracciones obtienes $\frac{x^2-16}{x-4}$, ¿cuál es el paso que un buen
  algebrista debe dar antes de dar el problema por terminado», la respuesta correcta es Multiplicar por
  cero.
- Para «Si después de restar dos fracciones obtienes $\frac{x^2-16}{x-4}$, ¿cuál es el paso que un buen
  algebrista debe dar antes de dar el problema por terminado», la respuesta correcta es Tachar las $x$
  y el 16 con el 4.
- $2(x-3)$.
