semantic_id: MAT.ALG.FRACCIONES_SUMA.SIMPLIFICACION_FINAL
titulo: Simplificación Final Tras Sumar
objetivo: Verificar si la fracción obtenida tras la suma se puede simplificar mediante factorización.
introduccion: 'No cantes victoria al sumar. A veces, el nuevo numerador que formaste tiene una sorpresa: se puede
  factorizar y cancelar de manera directa con el denominador.'
resumen: Después de sumar y reducir el numerador, intenta factorizarlo. Si encuentras un factor idéntico al denominador,
  puedes simplificar la fracción final.
explicacion: '### Definición formal


  Sin factorizar, tendrás sumandos en el numerador que son ilegales de tachar directamente.


  ### Desarrollo didáctico


  Has trabajado duro, igualaste denominadores, sumaste numeradores, y reduciste todo. Ya terminaste. Bueno, casi.


  El protocolo de buena etiqueta matemática exige que el resultado final de toda fracción esté simplificado al máximo.


  Para revisar si se puede simplificar más:

  1. Toma tu numerador recién reducido (tu respuesta).

  2. Factorízalo si es posible. (Saca factor común, trinomio, etc.).

  3. Observa el denominador (que sabiamente habías dejado factorizado desde el paso del MCM).

  4. ¿Hay algún paréntesis arriba idéntico a alguno de abajo? Si es así, táchalos.


  Si no se puede factorizar el numerador, o no hay coincidencias con el denominador, entonces tu fracción es irreductible
  y has llegado al final real del problema.'
procedimiento:
- 'Paso 1: Asegúrate de que el numerador final esté completamente reducido.'
- 'Paso 2: Busca algún método para factorizar ese numerador (factor común, diferencia de cuadrados, trinomio).'
- 'Paso 3: Si uno de los factores coincide con parte o la totalidad del denominador, cancélalos.'
ejemplos:
- titulo: Suma y simplifica $\frac{2x}{x+3} + \frac{6}{x+3}$
  enunciado: Suma y simplifica $\frac{2x}{x+3} + \frac{6}{x+3}$.
  solucion_pasos:
  - 'Suma: $\frac{2x + 6}{x+3}$.'
  - 'Factoriza el numerador sacando factor común 2: $\frac{2(x+3)}{x+3}$.'
  - Cancela el factor $(x+3)$ de arriba y abajo.
  - 'Resultado final: $2$.'
- titulo: Suma $\frac{m^2}{m+1} + \frac{m}{m+1}$.
  solucion_pasos:
  - 'Suma m^2+m en el numerador. Factor común m: m(m+1). Se cancela el m+1 del denominador.'
- titulo: 'Respecto de «Simplificación final de una suma de fracciones algebraicas»: ¿Describe adecuada'
  enunciado: 'Respecto de «Simplificación final de una suma de fracciones algebraicas»: ¿Describe adecuadamente
    el concepto esta frase? «Después de sumar y reducir el numerador, intenta factorizarlo»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Después de sumar y reducir el numerador, intenta factorizarlo.'
- titulo: 'Respecto de «Simplificación final de una suma de fracciones algebraicas»: ¿Se puede aceptar'
  enunciado: 'Respecto de «Simplificación final de una suma de fracciones algebraicas»: ¿Se puede aceptar esta afirmación?
    «Terminar el ejercicio sin revisar si se podía factorizar el numerador»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Después de sumar y reducir el numerador, intenta factorizarlo.'
errores_frecuentes:
- Terminar el ejercicio sin revisar si se podía factorizar el numerador.
- Tachar sumandos en lugar de factorizar (ej. en $\frac{x^2+2}{2}$, tachar los 2).
- Multiplicar por -1.
- Voltear la fracción.
- Para «Para poder simplificar una fracción después de haber sumado sus partes, el paso intermedio absolutamente
  obligatorio es:», la respuesta correcta es Restar los exponentes.
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
