semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.POLIGONOS_LADOS_PROPORCIONALES
titulo: Proporcionalidad de lados correspondientes en polígonos semejantes
objetivo: Reconocer que en polígonos semejantes, todos los lados correspondientes mantienen exactamente
  la misma razón de proporcionalidad.
introduccion: La segunda condición que define la semejanza de polígonos, junto a la igualdad de ángulos,
  es que todos los lados correspondientes guarden la misma proporción entre sí.
resumen: En dos polígonos semejantes, la razón entre cada par de lados correspondientes es siempre la
  misma, sin importar qué par se elija.
explicacion: '![Lados proporcionales en polígonos semejantes](/static/img/geometria/congruencia-semejanza/semejanza-poligonos-lados-proporcionales.svg)


  ### Definición formal


  Si los polígonos $P_1P_2...P_n$ y $P_1''P_2''...P_n''$ son semejantes, entonces $\frac{P_1P_2}{P_1''P_2''}=\frac{P_2P_3}{P_2''P_3''}=...=\frac{P_nP_1}{P_n''P_1''}$,
  siendo esta razón constante la razón de semejanza.


  ### Desarrollo didáctico


  A diferencia de solo tener "algunos" lados proporcionales, la condición exige que TODOS los pares de
  lados correspondientes mantengan exactamente la misma razón; si un solo par no la mantiene, los polígonos
  no son semejantes.'
procedimiento:
- 'Paso 1: Identifica los lados correspondientes entre los dos polígonos.'
- 'Paso 2: Calcula la razón entre cada par de lados correspondientes.'
- 'Paso 3: Verifica que todas esas razones sean exactamente iguales entre sí.'
ejemplos:
- titulo: Verificar proporcionalidad con dos pentágonos
  enunciado: Un pentágono tiene lados 3,4,5,6,7; otro tiene lados 6,8,10,12,14.
  solucion_pasos:
  - Cada lado del segundo es el doble del correspondiente, la razón es constante (2), por lo tanto son
    proporcionales.
- titulo: Detectar cuando la proporción falla
  enunciado: Un pentágono tiene lados 3,4,5,6,7; otro tiene lados 6,8,10,12,15.
  solucion_pasos:
  - El último par (7 y 15) no mantiene la razón 2, por lo tanto no son proporcionales.
- titulo: ¿Todos los pares de lados deben tener la misma razón?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa razón constante es justamente la razón de semejanza entre los dos polígonos.
- titulo: ¿Esta condición por sí sola garantiza semejanza en cualquier polígono?
  respuesta: 'No'
  solucion_pasos:
  - No, también se requiere que los ángulos correspondientes sean iguales.
errores_frecuentes:
- Verificar la razón solo entre algunos pares de lados y asumir que el resto también coincide.
- Invertir el orden de la razón en algún par (por ejemplo, lado chico/lado grande en un par y al revés
  en otro).
- Confundir lados correspondientes con lados adyacentes dentro de un mismo polígono.
fuente: Elaboración propia.
estado: publicado
