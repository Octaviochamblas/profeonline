semantic_id: MAT.GEO.TRIANGULOS_RECTANGULOS.HIPOTENUSA
titulo: Identificación de la hipotenusa como lado opuesto al ángulo recto
objetivo: Identificar la hipotenusa de un triángulo rectángulo como el lado que no toca al ángulo recto.
introduccion: 'En un triángulo rectángulo, uno de los tres lados se distingue de los otros dos: es el
  que queda enfrente del ángulo de 90°, y siempre es el más largo.'
resumen: La hipotenusa es el lado de un triángulo rectángulo opuesto al ángulo recto.
explicacion: '![Hipotenusa de un triángulo rectángulo](/static/img/geometria/triangulos/triangulos-rectangulos-hipotenusa.svg)


  ### Definición formal


  En un triángulo rectángulo con ángulo recto en A, la hipotenusa es el lado BC, opuesto al vértice A.


  ### Desarrollo didáctico


  En un triángulo rectángulo con el ángulo recto en A, los lados AB y AC forman ese ángulo, mientras que
  BC —el lado que no toca a A— es la hipotenusa, y siempre es el lado más largo del triángulo.'
procedimiento:
- 'Paso 1: Localiza el ángulo recto (90°) del triángulo.'
- 'Paso 2: Identifica el lado que NO toca a ese vértice.'
- 'Paso 3: Ese lado es la hipotenusa.'
ejemplos:
- titulo: Identificar la hipotenusa
  enunciado: Un triángulo rectángulo tiene su ángulo recto en B.
  solucion_pasos:
  - La hipotenusa es el lado que no toca a B, es decir, el lado opuesto a ese vértice.
- titulo: Comparar longitudes
  enunciado: Un triángulo rectángulo tiene catetos 3 y 4, e hipotenusa 5.
  solucion_pasos:
  - La hipotenusa (5) es el lado más largo, como siempre ocurre en un triángulo rectángulo.
- titulo: ¿La hipotenusa toca al ángulo recto?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición es el lado opuesto a ese ángulo.
- titulo: ¿La hipotenusa es siempre el lado más largo?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque se opone al ángulo más grande del triángulo (el recto).
errores_frecuentes:
- Confundir la hipotenusa con uno de los catetos.
- Creer que la hipotenusa puede tocar al ángulo recto.
- Suponer que la hipotenusa no siempre es el lado más largo.
fuente: Elaboración propia.
estado: publicado
