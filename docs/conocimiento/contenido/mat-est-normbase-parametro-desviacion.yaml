semantic_id: MAT.EST.NORMAL_BASE.PARAMETRO_DESVIACION
titulo: Analizar el efecto de la desviación estándar en la curva normal
objetivo: Analizar cómo la desviación estándar afecta el ancho y la altura de la curva de una distribución normal.
introduccion: Si la desviación estándar es grande, la campana se ve más ancha y aplastada; si es pequeña, se ve más
  angosta y puntiaguda.
resumen: La desviación estándar $\sigma$ de una distribución normal determina qué tan ancha o angosta es la curva,
  siendo más ancha y achatada a mayor $\sigma$, y más angosta y puntiaguda a menor $\sigma$.
explicacion: '![Efecto de la desviación estándar en la curva normal](/static/img/estadistica/normbase/normbase-parametro-desviacion.svg)


  ### Definición formal


  El parámetro $\sigma$ (desviación estándar) de una distribución normal $N(\mu,\sigma)$ controla la dispersión de

  la curva: valores mayores de $\sigma$ producen curvas más anchas y bajas; valores menores producen curvas más

  angostas y altas.


  ### Desarrollo didáctico


  Aunque cambie el ancho de la curva, el área total bajo ella siempre sigue siendo 1, ya que una curva más ancha se

  compensa siendo más baja, y una más angosta se compensa siendo más alta.'
procedimiento:
- 'Paso 1: Identifica el valor de $\sigma$ de la distribución normal.'
- 'Paso 2: Compara ese valor con el de otra distribución, si corresponde.'
- 'Paso 3: Interpreta una $\sigma$ mayor como una curva más ancha y una menor como una curva más angosta.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Dos distribuciones normales tienen la misma media, pero la A tiene $\sigma=5$ y la B tiene $\sigma=15$.
    ¿Cuál curva es más ancha?
  solucion_pasos:
  - La curva de la distribución B es más ancha, ya que tiene mayor desviación estándar.
- titulo: Ejemplo 2
  enunciado: ¿Qué le ocurre a la altura del pico de la curva cuando $\sigma$ aumenta?
  solucion_pasos:
  - La altura del pico disminuye, ya que la curva se vuelve más ancha y achatada.
- titulo: ¿Una desviación estándar mayor produce una curva más ancha?
  respuesta: Sí
  solucion_pasos:
  - Sí, a mayor $\sigma$, más dispersión y más ancha la curva.
- titulo: ¿El área total bajo la curva cambia al modificar la desviación estándar?
  respuesta: 'No'
  solucion_pasos:
  - 'No, el área total siempre sigue siendo 1, sin importar el valor de $\sigma$.'
errores_frecuentes:
- Confundir el efecto de la desviación estándar con el efecto de la media.
- Creer que una curva más ancha tiene mayor área total que una angosta.
- Pensar que $\sigma$ desplaza la curva horizontalmente en vez de cambiar su forma.
- Confundir una desviación estándar pequeña con una curva más ancha.
- Olvidar que curvas con distinta $\sigma$ igual deben tener área total igual a 1.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
