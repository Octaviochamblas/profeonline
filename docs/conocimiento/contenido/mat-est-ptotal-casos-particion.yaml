semantic_id: MAT.EST.PROBABILIDAD_TOTAL.CASOS_PARTICION
titulo: Identificación de casos que forman una partición en problemas contextualizados
objetivo: Identificar, dentro de un problema descrito en palabras, cuáles son los eventos que forman la
  partición del espacio muestral.
introduccion: Antes de aplicar el teorema de la probabilidad total, es fundamental reconocer en el enunciado
  del problema cuáles son las categorías que dividen el espacio muestral sin superposición.
resumen: En un problema contextualizado, los casos que forman la partición suelen corresponder a las distintas
  'fuentes' o 'categorías' mencionadas que, juntas, cubren toda la situación sin solaparse.
explicacion: '![Identificación de casos de partición en contexto](/static/img/probabilidad/ptotal/ptotal-casos-particion.svg)


  ### Definición formal


  En problemas de fábricas, urnas o poblaciones mixtas, la partición suele corresponder a las ''fuentes''
  (máquinas, proveedores, urnas, grupos) que en conjunto conforman la totalidad del espacio muestral.


  ### Desarrollo didáctico


  En el problema ''una fábrica produce el 60% con la máquina A y el 40% con la máquina B'', los casos
  de la partición son ''proviene de A'' y ''proviene de B'', ya que juntos cubren el 100% de la producción
  sin superposición.'
procedimiento:
- 'Paso 1: Lee el enunciado e identifica las distintas categorías o fuentes mencionadas.'
- 'Paso 2: Verifica que esas categorías cubran el 100% de los casos (sin dejar ninguno fuera).'
- 'Paso 3: Verifica que esas categorías no se superpongan entre sí (un caso pertenece a una sola categoría).'
ejemplos:
- titulo: Identificar la partición en un problema de máquinas
  enunciado: '''Una fábrica produce el 60% con la máquina A y el 40% con la máquina B''.'
  solucion_pasos:
  - Los casos de la partición son 'proviene de A' (60%) y 'proviene de B' (40%).
- titulo: Identificar la partición en un problema de urnas
  enunciado: '''Se elige al azar una de tres urnas, cada una con igual probabilidad de ser elegida''.'
  solucion_pasos:
  - Los casos de la partición son 'urna 1', 'urna 2' y 'urna 3', cada uno con probabilidad 1/3.
- titulo: ¿Los porcentajes de las distintas fuentes deben sumar 100% para formar una partición válida?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición de exhaustividad de la partición.
- titulo: ¿Se puede identificar la partición sin leer completamente el enunciado del problema?
  respuesta: 'No'
  solucion_pasos:
  - No, es necesario comprender bien el contexto para identificar correctamente las categorías involucradas.
errores_frecuentes:
- Identificar incorrectamente las categorías del problema como si fueran la partición, sin verificar que
  cubran el 100% de los casos.
- Confundir la partición del problema con el evento final que se quiere calcular (por ejemplo, 'ser defectuoso').
- Omitir alguna categoría mencionada en el enunciado al identificar la partición completa.
fuente: Elaboración propia.
estado: publicado
