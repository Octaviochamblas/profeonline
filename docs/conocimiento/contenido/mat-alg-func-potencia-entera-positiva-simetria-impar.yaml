semantic_id: MAT.ALG.FUNC_POTENCIA_ENTERA_POSITIVA.SIMETRIA_IMPAR
titulo: Simetría respecto al origen con exponente impar
objetivo: Verificar algebraicamente que $f(x)=a\cdot x^n$ es una función impar cuando $n$ es un entero positivo
  impar.
introduccion: Una función es impar cuando su gráfica, al rotarla 180 grados alrededor del origen, se ve
  exactamente igual a como estaba antes.
resumen: 'Cuando $n$ es un entero positivo impar, la función $f(x)=a\cdot x^n$ es **impar**: cumple $f(-x)=-f(x)$
  para todo $x$, y su gráfica es simétrica respecto al origen.'
explicacion: '### Definición formal


  Una función $f$ es impar si $f(-x)=-f(x)$ para todo $x$ del dominio. Para $f(x)=a\cdot x^n$ con $n$ impar,
  $f(-x)=a\cdot(-x)^n=-a\cdot x^n=-f(x)$, ya que una potencia impar de un número negativo conserva el signo
  negativo.


  ### Desarrollo didáctico


  Con $f(x)=3x^5$: $f(-2)=3\cdot(-2)^5=3\cdot(-32)=-96$ y $f(2)=3\cdot2^5=96$. Se cumple $f(-2)=-f(2)$,
  confirmando que la función es impar y su gráfica es simétrica respecto al origen.'
procedimiento:
- 'Paso 1: Calcula $f(-x)$ reemplazando $x$ por $-x$ en la expresión de la función.'
- 'Paso 2: Simplifica la expresión usando que $(-x)^n=-x^n$ para $n$ impar.'
- 'Paso 3: Verifica que $f(-x)=-f(x)$ para confirmar que la función es impar.'
ejemplos:
- titulo: Verificación algebraica de simetría impar
  enunciado: 'Verifica que $f(x)=4x^3$ es una función impar.'
  solucion_pasos:
  - 'Se calcula $f(-x)=4(-x)^3=-4x^3$.'
  - 'Como $f(-x)=-f(x)$, la función es impar.'
- titulo: Verificación numérica de simetría impar
  enunciado: 'Verifica numéricamente que $f(x)=x^7$ es impar evaluando en $x=1$ y $x=-1$.'
  solucion_pasos:
  - '$f(1)=1$ y $f(-1)=-1$.'
  - Se cumple $f(-1)=-f(1)$, confirmando la simetría impar.
- titulo: ¿Toda función $f(x)=a\cdot x^n$ con $n$ impar es una función impar?
  enunciado: ¿Toda función potencia con exponente entero positivo impar cumple $f(-x)=-f(x)$?
  respuesta: Sí
  solucion_pasos:
  - Se cumple para cualquier valor del coeficiente $a$, siempre que $n$ sea impar.
- titulo: ¿Una función puede ser simultáneamente par e impar sin ser la función nula?
  enunciado: ¿Puede una función potencia con exponente entero positivo ser al mismo tiempo par e impar?
  respuesta: 'No'
  solucion_pasos:
  - Un exponente entero positivo es siempre par o impar, nunca ambos, así que la función es una cosa u otra.
errores_frecuentes:
- Confundir la simetría respecto al origen con la simetría respecto al eje $y$.
- Verificar la simetría solo con un ejemplo numérico, sin la demostración algebraica general.
- Aplicar incorrectamente la regla $(-x)^n=-x^n$, olvidando que solo es válida para $n$ impar.
- Suponer que el coeficiente $a$ influye en si la función es par o impar.
