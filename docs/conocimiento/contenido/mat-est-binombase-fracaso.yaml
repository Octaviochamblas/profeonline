semantic_id: MAT.EST.BINOMIAL_BASE.FRACASO
titulo: Definir el concepto de 'fracaso' y su probabilidad como complemento del éxito
objetivo: Definir el 'fracaso' como el resultado complementario del éxito en un experimento de Bernoulli,
  con probabilidad q=1-p.
introduccion: Como un experimento de Bernoulli tiene exactamente dos resultados posibles, la probabilidad
  de fracaso queda completamente determinada por la de éxito.
resumen: El 'fracaso' es el resultado complementario al 'éxito' en un experimento de Bernoulli; su probabilidad
  se denota $q$ y se calcula como $q=1-p$.
explicacion: '![Concepto de fracaso y su probabilidad](/static/img/probabilidad/binombase/binombase-fracaso.svg)


  ### Definición formal


  $q=P(\text{fracaso})=1-p$, ya que éxito y fracaso son eventos complementarios en un experimento de Bernoulli.


  ### Desarrollo didáctico


  Si la probabilidad de que un estudiante apruebe una prueba (éxito) es $p=0{,}7$, entonces la probabilidad
  de que repruebe (fracaso) es $q=1-0{,}7=0{,}3$.'
procedimiento:
- 'Paso 1: Identifica el valor de p (probabilidad de éxito) dado en el problema.'
- 'Paso 2: Calcula q=1-p para obtener la probabilidad de fracaso.'
- 'Paso 3: Verifica que p+q=1, confirmando que ambos eventos cubren todo el espacio muestral.'
ejemplos:
- titulo: Calcular la probabilidad de fracaso con p=0,7
  enunciado: p=0,7 (probabilidad de aprobar).
  solucion_pasos:
  - q=1-0,7=0,3 (probabilidad de reprobar).
- titulo: Calcular la probabilidad de fracaso con p=0,4
  enunciado: p=0,4 (probabilidad de que llueva).
  solucion_pasos:
  - q=1-0,4=0,6 (probabilidad de que no llueva).
- titulo: ¿Se cumple siempre que p+q=1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que éxito y fracaso son eventos complementarios que cubren todo el espacio muestral.
- titulo: ¿q siempre es un valor entre 0 y 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que representa una probabilidad, siempre está entre 0 y 1 (inclusive).
errores_frecuentes:
- Olvidar que q=1-p, calculando q de forma independiente sin relacionarlo con p.
- Confundir cuál de los dos valores (p o q) corresponde a éxito y cuál a fracaso.
- No verificar que p+q=1 como forma de comprobar el cálculo.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
