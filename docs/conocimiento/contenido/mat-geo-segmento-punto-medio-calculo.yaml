semantic_id: MAT.GEO.SEGMENTO_METRICA.PUNTO_MEDIO_CALCULO
titulo: Cálculo de las coordenadas del punto medio de un segmento
objetivo: Aplicar la fórmula del punto medio para calcular numéricamente las coordenadas del punto medio
  de un segmento específico.
introduccion: Con la fórmula del punto medio ya conocida, el siguiente paso es aplicarla con números concretos
  para obtener coordenadas precisas.
resumen: Para calcular el punto medio de un segmento con extremos $A(x_1,y_1)$ y $B(x_2,y_2)$, se sustituyen
  sus coordenadas en la fórmula $M=\left(\frac{x_1+x_2}{2},\frac{y_1+y_2}{2}\right)$ y se resuelve numéricamente.
explicacion: '![Cálculo del punto medio de un segmento](/static/img/geometria/cartesiano-vectores/segmento-punto-medio-calculo.svg)


  ### Definición formal


  Dados $A(-3,-2)$ y $B(4,3)$: $M=\left(\frac{-3+4}{2},\frac{-2+3}{2}\right)=\left(\frac{1}{2},\frac{1}{2}\right)=(0,5;\,0,5)$.


  ### Desarrollo didáctico


  Este procedimiento se repite siempre igual: sumar las abscisas y dividir entre 2, sumar las ordenadas
  y dividir entre 2, sin importar los valores específicos ni sus signos.'
procedimiento:
- 'Paso 1: Suma las abscisas de ambos puntos (x₁+x₂) y divide el resultado entre 2.'
- 'Paso 2: Suma las ordenadas de ambos puntos (y₁+y₂) y divide el resultado entre 2.'
- 'Paso 3: Escribe el par ordenado resultante como las coordenadas del punto medio M.'
ejemplos:
- titulo: Calcular el punto medio con coordenadas mixtas
  enunciado: A(-3,-2) y B(4,3).
  solucion_pasos:
  - M=((-3+4)/2, (-2+3)/2)=(0,5; 0,5).
- titulo: Calcular el punto medio con coordenadas negativas
  enunciado: A(-6,-8) y B(-2,-4).
  solucion_pasos:
  - M=((-6-2)/2, (-8-4)/2)=(-4,-6).
- titulo: ¿El punto medio puede tener coordenadas decimales?
  respuesta: Sí
  solucion_pasos:
  - Sí, como en el ejemplo (0,5; 0,5), el resultado no siempre es un número entero.
- titulo: ¿Se puede verificar el resultado calculando la distancia de M a cada extremo?
  respuesta: Sí
  solucion_pasos:
  - Sí, la distancia de M a A debe ser igual a la distancia de M a B, si el cálculo es correcto.
errores_frecuentes:
- Cometer errores de signo al sumar coordenadas negativas.
- Olvidar dividir entre 2 al final, dejando solo la suma de las coordenadas.
- Confundir el resultado del punto medio con el resultado de la fórmula de distancia.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Cid 75).'
estado: publicado
