semantic_id: MAT.GEO.ISOMETRIA_TRASLACION.ISOMETRIA_CONCEPTO
titulo: Concepto de isometría como transformación que conserva medidas
objetivo: Reconocer una isometría como una transformación geométrica que conserva las distancias y los
  ángulos de una figura, produciendo una imagen congruente con la original.
introduccion: 'Una isometría es como ''mover'' una figura sin deformarla: cambia de posición, pero conserva
  exactamente su tamaño y forma.'
resumen: Una isometría es una transformación geométrica que conserva las distancias entre puntos (y por
  lo tanto los ángulos), de modo que la figura resultante (imagen) es congruente con la figura original
  (preimagen).
explicacion: '![Concepto de isometría](/static/img/geometria/isometrias/isometria-concepto.svg)


  ### Definición formal


  Una isometría es una transformación del plano que preserva las distancias: si $A$ y $B$ son dos puntos
  cualesquiera y $A''$, $B''$ son sus respectivas imágenes, entonces $d(A,B)=d(A'',B'')$. Las tres isometrías
  básicas son la traslación, la simetría (reflexión) y la rotación.


  ### Desarrollo didáctico


  En la figura, el triángulo original y su imagen (tras la transformación) tienen exactamente el mismo
  tamaño y forma, solo cambia su posición en el plano. Esto confirma que se trata de una isometría.'
procedimiento:
- 'Paso 1: Identifica la figura original (preimagen) y la figura resultante (imagen) tras la transformación.'
- 'Paso 2: Compara las distancias entre puntos correspondientes de ambas figuras.'
- 'Paso 3: Si las distancias (y por lo tanto los ángulos) se mantienen iguales, la transformación es una
  isometría.'
ejemplos:
- titulo: Verificar que una transformación es una isometría
  enunciado: Un triángulo se traslada a una nueva posición, manteniendo su tamaño y forma.
  solucion_pasos:
  - Como se conservan las distancias entre todos sus puntos, la traslación es una isometría.
- titulo: Reconocer una transformación que NO es una isometría
  enunciado: Un triángulo se agranda al doble de su tamaño original.
  solucion_pasos:
  - Esa transformación (una ampliación) NO es una isometría, ya que no conserva las distancias originales.
- titulo: ¿La imagen de una isometría es congruente con la figura original?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la consecuencia de que una isometría conserve las distancias.
- titulo: ¿La traslación, la simetría y la rotación son isometrías?
  respuesta: Sí
  solucion_pasos:
  - Sí, son las tres transformaciones isométricas básicas estudiadas en geometría.
errores_frecuentes:
- Confundir una isometría con una transformación que cambia el tamaño de la figura (como una homotecia
  o ampliación).
- Creer que una isometría puede cambiar los ángulos internos de una figura.
- No verificar que TODAS las distancias se conserven, solo algunas de ellas.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 126, Cid 73).'
estado: publicado
