semantic_id: MAT.GEO.ANGULOS_CLASIFICACION.EXTENDIDO
titulo: Ángulo extendido de medida 180°
objetivo: Clasificar un ángulo a partir de su medida y comprobar que sus lados quedan alineados en direcciones
  opuestas sobre una misma recta.
introduccion: 'Abrir completamente un compás hasta que sus brazos queden enfrentados sobre una misma línea
  produce una abertura muy especial: una media vuelta exacta.'
resumen: Un ángulo extendido mide exactamente 180°. Como idea de control, sus lados quedan alineados en
  direcciones opuestas sobre una misma recta.
explicacion: 'Un ángulo extendido mide exactamente 180°.


  La situación “dos rayos opuestos forman una línea recta y determinan una abertura de 180°” muestra cómo
  pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se verifica
  que sus lados quedan alineados en direcciones opuestas sobre una misma recta.'
procedimiento:
- 'Paso 1: Lee o estima la abertura del ángulo en grados.'
- 'Paso 2: Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.'
- 'Paso 3: Asigna el nombre correcto y revisa que no contradiga el dibujo.'
ejemplos:
- titulo: Lectura del dibujo — Ángulo extendido
  enunciado: Dos rayos opuestos forman una línea recta y determinan una abertura de 180°.
  solucion_pasos:
  - Lee o estima la abertura del ángulo en grados.
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: Verificación de la solución — Ángulo extendido
  enunciado: 'Un estudiante usa la idea “sus lados quedan alineados en direcciones opuestas sobre una
    misma recta” al analizar este caso: dos rayos opuestos forman una línea recta y determinan una abertura
    de 180°. Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: un ángulo extendido mide exactamente 180°.'
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿El caso confirma que sus lados quedan alineados en direcciones opuestas sobre una misma recta?
    — Ángulo extendido
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo extendido mide exactamente 180°.'
  - En el caso “dos rayos opuestos forman una línea recta y determinan una abertura de 180°” se observa
    que sus lados quedan alineados en direcciones opuestas sobre una misma recta.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Basta con lee o estima la abertura del ángulo en grados? — Ángulo extendido
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulo extendido de medida 180°.
  - Después del paso “Lee o estima la abertura del ángulo en grados.” todavía hace falta revisar “Compara
    la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
  - El cierre correcto exige “Asigna el nombre correcto y revisa que no contradiga el dibujo.”.
errores_frecuentes:
- Ángulo extendido significa tener una medida cercana a 180° pero no exacta.
- Para resolver ángulo extendido, basta con el paso “Lee o estima la abertura del ángulo en grados.” y
  no hace falta revisar “Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
- Si el dibujo parece claro, se puede ignorar que sus lados quedan alineados en direcciones opuestas sobre
  una misma recta.
- Dos configuraciones distintas representan ángulo extendido solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Asigna el nombre correcto y revisa que no
  contradiga el dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
