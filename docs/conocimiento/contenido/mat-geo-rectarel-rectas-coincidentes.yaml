semantic_id: MAT.GEO.RECTA_RELACIONES.RECTAS_COINCIDENTES
titulo: Identificación de rectas coincidentes a partir de ecuaciones equivalentes
objetivo: Identificar que dos ecuaciones distintas pueden representar la misma recta (rectas coincidentes)
  cuando una es múltiplo de la otra.
introduccion: Dos ecuaciones que parecen distintas pueden en realidad describir exactamente la misma recta,
  si sus coeficientes son proporcionales entre sí.
resumen: 'Dos rectas $A_1x+B_1y+C_1=0$ y $A_2x+B_2y+C_2=0$ son coincidentes si sus coeficientes son proporcionales:
  $\dfrac{A_1}{A_2}=\dfrac{B_1}{B_2}=\dfrac{C_1}{C_2}$.'
explicacion: '![Rectas coincidentes](/static/img/geometria/analitica/rectarel-rectas-coincidentes.svg)


  ### Definición formal


  Dos rectas son coincidentes si una ecuación se obtiene multiplicando la otra por una constante no nula,
  es decir, si tienen la misma pendiente y el mismo coeficiente de posición.


  ### Desarrollo didáctico


  Las ecuaciones $2x-2y+2=0$ y $x-y+1=0$ representan la misma recta, ya que la primera es exactamente
  el doble de la segunda; ambas equivalen a $y=x+1$.'
procedimiento:
- 'Paso 1: Convierte ambas ecuaciones a la misma forma (por ejemplo, forma principal).'
- 'Paso 2: Compara sus pendientes y sus coeficientes de posición.'
- 'Paso 3: Si ambos coinciden exactamente, las rectas son coincidentes (la misma recta).'
ejemplos:
- titulo: Verificar que dos ecuaciones representan la misma recta
  enunciado: 2x-2y+2=0 y x-y+1=0.
  solucion_pasos:
  - Ambas se reducen a y=x+1, por lo que son coincidentes.
- titulo: Determinar si dos rectas dadas son coincidentes o solo paralelas
  enunciado: 3x+y-6=0 y 6x+2y-9=0.
  solucion_pasos:
  - 'Despejando: y=-3x+6 e y=-3x+4,5. Mismo m=-3, pero distinto b: son paralelas, no coincidentes.'
- titulo: ¿Rectas coincidentes tienen infinitos puntos en común?
  respuesta: Sí
  solucion_pasos:
  - Sí, al ser la misma recta, comparten absolutamente todos sus puntos.
- titulo: ¿Un sistema formado por dos rectas coincidentes tiene una única solución?
  respuesta: 'No'
  solucion_pasos:
  - No, tiene infinitas soluciones, ya que cualquier punto de una recta satisface también la otra.
errores_frecuentes:
- Confundir rectas coincidentes con rectas simplemente paralelas.
- Olvidar verificar tanto la pendiente como el coeficiente de posición antes de concluir coincidencia.
- Asumir que ecuaciones con coeficientes numéricamente distintos no pueden representar la misma recta.
fuente: 'Elaboración propia (referencia: Carreño 184).'
estado: publicado
