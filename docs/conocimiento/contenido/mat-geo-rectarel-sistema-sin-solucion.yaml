semantic_id: MAT.GEO.RECTA_RELACIONES.SISTEMA_SIN_SOLUCION
titulo: Interpretación de sistema sin solución como rectas paralelas distintas
objetivo: Interpretar que un sistema de dos ecuaciones lineales sin solución corresponde geométricamente
  a dos rectas paralelas distintas, que nunca se cruzan.
introduccion: Cuando dos rectas mantienen exactamente la misma inclinación pero parten de alturas distintas,
  nunca llegan a encontrarse, y esto se refleja algebraicamente en la ausencia de solución del sistema.
resumen: 'Un sistema de dos ecuaciones lineales no tiene solución si y solo si las rectas que representa
  son paralelas distintas: misma pendiente, distinto coeficiente de posición.'
explicacion: '![Sistema sin solución](/static/img/geometria/analitica/rectarel-sistema-sin-solucion.svg)


  ### Definición formal


  Si $m_1=m_2$ pero $b_1\neq b_2$, al intentar igualar $m_1x+b_1=m_2x+b_2$ se obtiene $b_1=b_2$, una contradicción,
  indicando que el sistema no tiene solución.


  ### Desarrollo didáctico


  El sistema formado por $y=x+1$ e $y=x-2$ no tiene solución: al igualar, $x+1=x-2$, se obtiene $1=-2$,
  una contradicción, confirmando que las rectas (paralelas) nunca se cruzan.'
procedimiento:
- 'Paso 1: Escribe ambas ecuaciones en forma principal.'
- 'Paso 2: Compara sus pendientes y coeficientes de posición.'
- 'Paso 3: Si las pendientes son iguales pero los coeficientes de posición son distintos, el sistema no
  tiene solución.'
ejemplos:
- titulo: Determinar que un sistema no tiene solución
  enunciado: y=x+1, y=x-2.
  solucion_pasos:
  - 'Misma pendiente (1) pero distinto coeficiente de posición (1 y -2): el sistema no tiene solución.'
- titulo: Verificar la contradicción algebraica al intentar resolver
  enunciado: x+1=x-2.
  solucion_pasos:
  - 'Restando x de ambos lados: 1=-2, una contradicción, confirmando que no hay solución.'
- titulo: ¿Un sistema sin solución corresponde a rectas paralelas distintas?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente esa la interpretación geométrica.
- titulo: ¿Puede un sistema con rectas paralelas tener solución en algún punto?
  respuesta: 'No'
  solucion_pasos:
  - No, si son paralelas distintas (no coincidentes), nunca se cruzan, por lo que el sistema no tiene
    solución.
errores_frecuentes:
- Confundir un sistema sin solución con uno de infinitas soluciones.
- No reconocer la contradicción algebraica (como 1=-2) como evidencia de que no hay solución.
- Olvidar verificar el coeficiente de posición después de confirmar que las pendientes son iguales.
fuente: 'Elaboración propia (referencia: Carreño 184).'
estado: publicado
