semantic_id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.RELACION_LADOS_45_45_90
titulo: 'Relación de lados en el triángulo 45°-45°-90°: cateto = hipotenusa / √2'
objetivo: Aplicar la relación fija entre los lados de un triángulo notable 45°-45°-90° para calcular catetos
  o hipotenusa.
introduccion: En un triángulo 45-45-90, la proporción entre sus lados es siempre la misma, sin importar
  su tamaño, lo que permite calcular un lado a partir del otro sin usar el teorema de Pitágoras cada vez.
resumen: En un triángulo 45°-45°-90° con catetos de longitud $l$, la hipotenusa mide $h=l\sqrt2$; equivalentemente,
  $l=\frac{h}{\sqrt2}$.
explicacion: '![Relación de lados en el triángulo 45°-45°-90°](/static/img/geometria/areas-pitagoras/notables-relacion-lados-45-45-90.svg)


  ### Definición formal


  Esta relación se obtiene aplicando Pitágoras a los dos catetos iguales: $h^2=l^2+l^2=2l^2$, por lo que
  $h=l\sqrt2$.


  ### Desarrollo didáctico


  Un triángulo 45-45-90 con catetos de 5 cm tiene hipotenusa $h=5\sqrt2\approx7,07$ cm. Si en cambio se
  conoce la hipotenusa (por ejemplo 10 cm), el cateto es $l=\frac{10}{\sqrt2}=5\sqrt2\approx7,07$ cm.'
procedimiento:
- 'Paso 1: Identifica si el dato conocido es el cateto o la hipotenusa.'
- 'Paso 2: Si conoces el cateto l, multiplícalo por √2 para obtener la hipotenusa.'
- 'Paso 3: Si conoces la hipotenusa h, divídela entre √2 para obtener el cateto.'
ejemplos:
- titulo: Calcular la hipotenusa con cateto 5
  enunciado: Un triángulo 45-45-90 tiene catetos de 5 cm.
  solucion_pasos:
  - h=5√2≈7,07 cm.
- titulo: Calcular el cateto con hipotenusa 10
  enunciado: Un triángulo 45-45-90 tiene hipotenusa de 10 cm.
  solucion_pasos:
  - l=10/√2=5√2≈7,07 cm.
- titulo: ¿La hipotenusa es siempre mayor que cada cateto?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque √2≈1,41 es mayor que 1, la hipotenusa siempre es mayor que el cateto.
- titulo: ¿Esta relación proviene del teorema de Pitágoras?
  respuesta: Sí
  solucion_pasos:
  - Sí, se deriva directamente de aplicar Pitágoras a los dos catetos iguales.
errores_frecuentes:
- Olvidar la raíz cuadrada de 2 y multiplicar solo por 2.
- Confundir cuándo multiplicar por √2 y cuándo dividir por √2.
- Aplicar esta relación a un triángulo que no es realmente 45-45-90.
fuente: Elaboración propia.
estado: publicado
