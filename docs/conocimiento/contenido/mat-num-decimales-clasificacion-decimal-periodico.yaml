semantic_id: MAT.NUM.DECIMALES_CLASIFICACION.DECIMAL_PERIODICO
titulo: Decimal periódico
objetivo: Reconocer cuándo la expresión decimal de un número repite un bloque de cifras indefinidamente.
introduccion: Cuando la división que genera la expresión decimal nunca termina pero repite el mismo bloque
  de cifras una y otra vez, el número es un decimal periódico, y ese bloque que se repite se llama período.
resumen: Un decimal periódico es aquel cuya expresión decimal tiene un bloque de cifras que se repite
  indefinidamente, llamado período, inmediatamente después de la coma.
explicacion: '### Definición formal


  Un número racional \(\frac{a}{b}\) (en forma irreductible) genera un decimal periódico puro cuando \(b\)
  no tiene como factores primos ni 2 ni 5; la división produce un resto que se repite, generando el período.


  ### Desarrollo didáctico


  \(0.\overline{3}\) es un decimal periódico: proviene de \(\frac{1}{3}\); al dividir 1 entre 3, el resto
  1 se repite en cada paso, generando el período 3 de forma indefinida.'
procedimiento:
- 'Paso 1: Observa la expansión después de la coma y busca un bloque que se repita desde el comienzo.'
- 'Paso 2: Marca el bloque mínimo repetitivo como período.'
- 'Paso 3: Comprueba que no haya cifras no repetitivas antes del período.'
ejemplos:
- titulo: Aplicación razonada — Identificación de decimal infinito periódico
  enunciado: \(0.\overline{3}\) es un decimal periódico.
  solucion_pasos:
  - Observa la expansión después de la coma y busca un bloque que se repita desde el comienzo.
  - Marca el bloque mínimo repetitivo como período.
  - Comprueba que no haya cifras no repetitivas antes del período.
- titulo: Revisión de una solución — Identificación de decimal infinito periódico
  enunciado: Una solución aplica “Marca el bloque mínimo repetitivo como período.”, pero termina sin comprobar
    que el período es el bloque que se repite indefinidamente. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de decimal infinito periódico: un decimal periódico
    infinito repite un bloque de cifras llamado período desde la primera cifra decimal o después de un
    anteperíodo.'
  - Observa la expansión después de la coma y busca un bloque que se repita desde el comienzo.
  - 'Completa la revisión con este control: Comprueba que no haya cifras no repetitivas antes del período.'
- titulo: ¿Se cumple que el período es el bloque que se repite indefinidamente? — Identificación de decimal
    infinito periódico
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un decimal periódico infinito repite un bloque de cifras
    llamado período desde la primera cifra decimal o después de un anteperíodo.
  - El caso “\(0.\overline{3}\) es un decimal periódico” satisface esa condición.
  - Comprueba que no haya cifras no repetitivas antes del período.
- titulo: ¿Es válido omitir el paso “Observa la expansión después de la coma y busca un bloque que se
    repita desde el comienzo”? — Identificación de decimal infinito periódico
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de decimal infinito periódico.
  - 'Omitirlo puede volver inválida la acción siguiente: Marca el bloque mínimo repetitivo como período.'
  - 'La solución debe terminar de este modo: Comprueba que no haya cifras no repetitivas antes del período.'
errores_frecuentes:
- 'Empezar identificación de decimal infinito periódico sin realizar este control inicial: Observa la
  expansión después de la coma y busca un bloque que se repita desde el comienzo.'
- Memorizar “\(0.\overline{3}\) es un decimal periódico” como respuesta aislada, sin reconstruir la definición
  que lo justifica.
- Convertir en receta el paso “Marca el bloque mínimo repetitivo como período.” y usarlo aunque cambien
  las condiciones del problema.
- Dar por válida una conclusión sobre identificación de decimal infinito periódico que contradice el criterio
  “El período es el bloque que se repite indefinidamente”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que no haya cifras no repetitivas antes
  del período.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
