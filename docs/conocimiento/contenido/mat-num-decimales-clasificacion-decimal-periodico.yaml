semantic_id: MAT.NUM.DECIMALES_CLASIFICACION.DECIMAL_PERIODICO
objetivo: Reconocer un decimal periódico.
introduccion: 'Para estudiar identificación de decimal infinito periódico partiremos
  de una situación concreta: \(0.\overline{3}\) es un decimal periódico. La definición
  que guiará cada decisión es: un decimal periódico infinito repite un bloque de cifras
  llamado período desde la primera cifra decimal o después de un anteperíodo.'
resumen: Un decimal periódico infinito repite un bloque de cifras llamado período
  desde la primera cifra decimal o después de un anteperíodo. Como criterio de control,
  el período es el bloque que se repite indefinidamente
explicacion: |-
  Un decimal periódico infinito repite un bloque de cifras llamado período desde la primera cifra decimal o después de un anteperíodo.

  La relación entre la definición y el caso “\(0.\overline{3}\) es un decimal periódico” conduce a una conclusión útil: El período es el bloque que se repite indefinidamente.
procedimiento:
- 'Paso 1: Observa la expansión después de la coma y busca un bloque que se repita
  desde el comienzo.'
- 'Paso 2: Marca el bloque mínimo repetitivo como período.'
- 'Paso 3: Comprueba que no haya cifras no repetitivas antes del período.'
ejemplos:
- titulo: Aplicación razonada — Identificación de decimal infinito periódico
  enunciado: \(0.\overline{3}\) es un decimal periódico.
  solucion_pasos:
  - Observa la expansión después de la coma y busca un bloque que se repita desde
    el comienzo.
  - Marca el bloque mínimo repetitivo como período.
  - Comprueba que no haya cifras no repetitivas antes del período.
- titulo: Revisión de una solución — Identificación de decimal infinito periódico
  enunciado: Una solución aplica “Marca el bloque mínimo repetitivo como período.”,
    pero termina sin comprobar que el período es el bloque que se repite indefinidamente.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de decimal infinito periódico:
    un decimal periódico infinito repite un bloque de cifras llamado período desde
    la primera cifra decimal o después de un anteperíodo.'
  - Observa la expansión después de la coma y busca un bloque que se repita desde
    el comienzo.
  - 'Completa la revisión con este control: Comprueba que no haya cifras no repetitivas
    antes del período.'
- titulo: ¿Se cumple que el período es el bloque que se repite indefinidamente? —
    Identificación de decimal infinito periódico
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un decimal periódico infinito repite
    un bloque de cifras llamado período desde la primera cifra decimal o después de
    un anteperíodo.
  - El caso “\(0.\overline{3}\) es un decimal periódico” satisface esa condición.
  - Comprueba que no haya cifras no repetitivas antes del período.
- titulo: ¿Es válido omitir el paso “Observa la expansión después de la coma y busca
    un bloque que se repita desde el comienzo”? — Identificación de decimal infinito
    periódico
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de decimal infinito
    periódico.
  - 'Omitirlo puede volver inválida la acción siguiente: Marca el bloque mínimo repetitivo
    como período.'
  - 'La solución debe terminar de este modo: Comprueba que no haya cifras no repetitivas
    antes del período.'
errores_frecuentes:
- 'Empezar identificación de decimal infinito periódico sin realizar este control
  inicial: Observa la expansión después de la coma y busca un bloque que se repita
  desde el comienzo.'
- Memorizar “\(0.\overline{3}\) es un decimal periódico” como respuesta aislada, sin
  reconstruir la definición que lo justifica.
- Convertir en receta el paso “Marca el bloque mínimo repetitivo como período.” y
  usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación de decimal infinito periódico
  que contradice el criterio “El período es el bloque que se repite indefinidamente”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que no haya cifras
  no repetitivas antes del período.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
