semantic_id: MAT.NUM.LOGARITMOS_PROPIEDADES.COCIENTE
objetivo: Aplicar la propiedad logarítmica del cociente.
introduccion: 'El cociente transforma una razón multiplicativa en una diferencia.
  El orden es importante: invertirlo cambia el signo del resultado.'
resumen: \(\log_b(x/y)=\log_bx-\log_by\) para \(x,y>0\). Dividir potencias resta exponentes
  y por eso aparece una diferencia de logaritmos.
explicacion: |-
  \(\log_b(x/y)=\log_bx-\log_by\) para \(x,y>0\).

  Al analizar “\(\log_3(81/9)=\log_3 81-\log_3 9=2\)” conviene observar la conexión siguiente: dividir potencias resta exponentes y por eso aparece una diferencia de logaritmos
procedimiento:
- 'Paso 1: Comprueba positividad de numerador y denominador.'
- 'Paso 2: Escribe logaritmo del numerador menos logaritmo del denominador.'
- 'Paso 3: Mantén la base común y verifica condensando la diferencia.'
ejemplos:
- titulo: Aplicación razonada — Logaritmo de un cociente
  enunciado: \(\log_3(81/9)=\log_3 81-\log_3 9=2\).
  solucion_pasos:
  - Comprueba positividad de numerador y denominador.
  - Escribe logaritmo del numerador menos logaritmo del denominador.
  - Mantén la base común y verifica condensando la diferencia.
- titulo: Revisión de una solución — Logaritmo de un cociente
  enunciado: Una solución aplica “Escribe logaritmo del numerador menos logaritmo
    del denominador.”, pero termina sin comprobar que dividir potencias resta exponentes
    y por eso aparece una diferencia de logaritmos. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define logaritmo de un cociente: \(\log_b(x/y)=\log_bx-\log_by\)
    para \(x,y>0\).'
  - Comprueba positividad de numerador y denominador.
  - 'Completa la revisión con este control: Mantén la base común y verifica condensando
    la diferencia.'
- titulo: ¿Se cumple que dividir potencias resta exponentes y por eso aparece una
    diferencia de logaritmos? — Logaritmo de un cociente
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\log_b(x/y)=\log_bx-\log_by\) para
    \(x,y>0\).
  - El caso “\(\log_3(81/9)=\log_3 81-\log_3 9=2\)” satisface esa condición.
  - Mantén la base común y verifica condensando la diferencia.
- titulo: ¿Es válido omitir el paso “Comprueba positividad de numerador y denominador”?
    — Logaritmo de un cociente
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de logaritmo de un cociente.
  - 'Omitirlo puede volver inválida la acción siguiente: Escribe logaritmo del numerador
    menos logaritmo del denominador.'
  - 'La solución debe terminar de este modo: Mantén la base común y verifica condensando
    la diferencia.'
errores_frecuentes:
- 'Confundir logaritmo de un cociente con otro concepto y omitir este inicio: Comprueba
  positividad de numerador y denominador.'
- Aplicar mecánicamente “Escribe logaritmo del numerador menos logaritmo del denominador.”
  sin revisar las condiciones de la definición.
- Tomar “\(\log_3(81/9)=\log_3 81-\log_3 9=2\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “dividir potencias resta exponentes
  y por eso aparece una diferencia de logaritmos”.
- 'Terminar el desarrollo sin realizar este control: Mantén la base común y verifica
  condensando la diferencia.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
