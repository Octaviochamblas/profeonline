semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.RESOLUCION_MEDIDAS_INCOGNITAS
titulo: Resolución de medidas angulares incógnitas usando paralelas y transversal
objetivo: Resolver una incógnita angular usando paralelas y una transversal y comprobar que el paso decisivo
  es nombrar bien el par antes de escribir la ecuación.
introduccion: En estos problemas la cuenta suele ser corta; lo difícil es descubrir qué relación geométrica
  gobierna el dibujo.
resumen: Las incógnitas angulares en paralelas y transversal se resuelven identificando primero la relación
  geométrica correcta y luego usando igualdad o suplementariedad. Como idea de control, el paso decisivo
  es nombrar bien el par antes de escribir la ecuación.
explicacion: 'Las incógnitas angulares en paralelas y transversal se resuelven identificando primero la
  relación geométrica correcta y luego usando igualdad o suplementariedad.


  Cuando se analiza “si \(x\) y 124° forman un par colateral interno, entonces \(x+124=180\)” conviene
  evitar la memoria mecánica. El control decisivo es comprobar que el paso decisivo es nombrar bien el
  par antes de escribir la ecuación.'
procedimiento:
- 'Paso 1: Identifica qué par de ángulos interviene y clasifícalo correctamente.'
- 'Paso 2: Traduce esa relación a igualdad o a suma de 180° según corresponda.'
- 'Paso 3: Resuelve la ecuación y comprueba que el valor obtenido coincide con la posición del dibujo.'
ejemplos:
- titulo: Caso guiado — Incógnitas con paralelas y transversal
  enunciado: Si \(x\) y 124° forman un par colateral interno, entonces \(x+124=180\).
  solucion_pasos:
  - Identifica qué par de ángulos interviene y clasifícalo correctamente.
  - Traduce esa relación a igualdad o a suma de 180° según corresponda.
  - Resuelve la ecuación y comprueba que el valor obtenido coincide con la posición del dibujo.
- titulo: Verificación de la solución — Incógnitas con paralelas y transversal
  enunciado: 'Revisa una solución del caso “si \(x\) y 124° forman un par colateral interno, entonces
    \(x+124=180\)”: el resultado parece razonable, pero falta conectar el dibujo con la definición. Explica
    esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: las incógnitas angulares en paralelas y transversal se resuelven identificando
    primero la relación geométrica correcta y luego usando igualdad o suplementariedad.'
  - Traduce esa relación a igualdad o a suma de 180° según corresponda.
  - Resuelve la ecuación y comprueba que el valor obtenido coincide con la posición del dibujo.
- titulo: ¿Puede concluirse correctamente este hecho? — Incógnitas con paralelas y transversal
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: las incógnitas angulares en paralelas y transversal
    se resuelven identificando primero la relación geométrica correcta y luego usando igualdad o suplementariedad.'
  - En el caso “si \(x\) y 124° forman un par colateral interno, entonces \(x+124=180\)” se observa que
    el paso decisivo es nombrar bien el par antes de escribir la ecuación.
  - Resuelve la ecuación y comprueba que el valor obtenido coincide con la posición del dibujo.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Incógnitas con paralelas y transversal
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de resolución de medidas angulares incógnitas
    usando paralelas y transversal.
  - Después del paso “Identifica qué par de ángulos interviene y clasifícalo correctamente.” todavía hace
    falta revisar “Traduce esa relación a igualdad o a suma de 180° según corresponda.”.
  - El cierre correcto exige “Resuelve la ecuación y comprueba que el valor obtenido coincide con la posición
    del dibujo.”.
errores_frecuentes:
- Incógnitas con paralelas y transversal significa escribir una ecuación al azar sin clasificar antes
  el par de ángulos.
- Para resolver incógnitas con paralelas y transversal, basta con el paso “Identifica qué par de ángulos
  interviene y clasifícalo correctamente.” y no hace falta revisar “Traduce esa relación a igualdad o
  a suma de 180° según corresponda.”.
- Si el dibujo parece claro, se puede ignorar que el paso decisivo es nombrar bien el par antes de escribir
  la ecuación.
- Dos configuraciones distintas representan incógnitas con paralelas y transversal solo porque contienen
  la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Resuelve la ecuación y comprueba que el valor
  obtenido coincide con la posición del dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
