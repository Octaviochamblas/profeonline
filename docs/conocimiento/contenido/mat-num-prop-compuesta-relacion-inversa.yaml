semantic_id: MAT.NUM.PROP_COMPUESTA.RELACION_INVERSA
objetivo: Identificar una relación inversa dentro de un contexto de proporcionalidad
  compuesta.
introduccion: Así como hay relaciones directas, a veces aislar dos variables nos revela
  un sube y baja. Identificar esta inversión es crítico para no equivocarse al armar
  la ecuación final.
resumen: Al aislar la variable incógnita y compararla con otra, si una aumenta y la
  otra disminuye, la fracción de esa variable se debe invertir (dar vuelta) al escribir
  la ecuación multiplicativa.
explicacion: 'Continuando con el método, comparamos la incógnita ($X$) con otra magnitud
  $B$.


  Si la pregunta ''A mayor cantidad de $B$, ¿se necesitará más o menos $X$?'' tiene
  como respuesta ''MENOS'' (funcionan como un balancín), la relación es **inversa**.


  En el método algorítmico tradicional, cuando una columna tiene relación inversa
  con la incógnita, su fracción se escribe ''de cabeza'' (se invierten el numerador
  y denominador) antes de multiplicarla.'
procedimiento:
- 'Paso 1: Fija mentalmente las demás variables.'
- 'Paso 2: Hazte la pregunta: ''A más de esto, ¿más o menos de la incógnita?''.'
- 'Paso 3: Si la respuesta es ''menos'', anota una ''I'' (inversa) y recuerda invertir
  esa fracción al operar.'
ejemplos:
- titulo: Pintores, casas y días
  enunciado: La incógnita es 'Días'. Las otras variables son Casas y Pintores. ¿Cómo
    es la relación Días-Pintores?
  solucion_pasos:
  - Congelamos las Casas (es la misma obra).
  - 'Pregunta: A más Pintores trabajando, ¿se demorarán más o menos Días?'
  - 'Respuesta: Menos días. Por tanto, es Inversa.'
errores_frecuentes:
- Olvidar invertir la fracción en la ecuación matemática a pesar de haber deducido
  correctamente que era inversa.
- Invertir la fracción de la incógnita en lugar de las fracciones de los datos.
- Pensar que 'más horas = más cansancio' es una relación matemática de proporción.
fuente: Currículum Nacional MINEDUC.
estado: publicado
