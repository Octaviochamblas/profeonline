semantic_id: MAT.GEO.TRIG_APLICA_REAL.SELECCION_LEY_SENOS_COSENOS
titulo: Selección entre ley de senos y ley de cosenos según los datos disponibles
objetivo: Determinar cuál de las dos leyes (senos o cosenos) conviene aplicar para resolver un triángulo
  oblicuángulo, según qué combinación de lados y ángulos se conocen.
introduccion: 'No toda configuración de datos se resuelve de la misma forma: la ley de senos requiere
  un par lado-ángulo opuesto completo, mientras que la ley de cosenos se usa cuando se conocen los tres
  lados o dos lados con el ángulo comprendido.'
resumen: Se usa la ley de senos cuando se conoce un lado y su ángulo opuesto (configuraciones AAS, ASA
  o SSA); se usa la ley de cosenos cuando se conocen los tres lados (LLL) o dos lados y el ángulo comprendido
  entre ellos (LAL).
explicacion: '![Selección entre ley de senos y ley de cosenos](/static/img/geometria/trigonometria/trigreal-seleccion-ley.svg)


  ### Definición formal


  Si los datos incluyen al menos un par lado-ángulo opuesto completo, se usa la ley de senos. Si los datos
  son los tres lados (LLL) o dos lados y el ángulo comprendido entre ellos (LAL), sin ningún par lado-ángulo
  opuesto completo, se usa la ley de cosenos.


  ### Desarrollo didáctico


  Por ejemplo, si se conocen dos ángulos y un lado (AAS o ASA), siempre existe un par lado-ángulo opuesto
  (ya que se puede calcular el tercer ángulo), por lo que se usa ley de senos. Si se conocen dos lados
  y el ángulo entre ellos (LAL), no hay ningún par completo, por lo que se debe usar ley de cosenos.'
procedimiento:
- 'Paso 1: Identifica qué datos conoces del triángulo (lados y ángulos).'
- 'Paso 2: Verifica si tienes un par lado-ángulo opuesto completo (o puedes obtenerlo calculando el tercer
  ángulo).'
- 'Paso 3: Si tienes ese par, usa la ley de senos; si no (LLL o LAL), usa la ley de cosenos.'
ejemplos:
- titulo: Elegir la ley adecuada con datos AAS
  enunciado: Se conocen dos ángulos y un lado no comprendido entre ellos.
  solucion_pasos:
  - 'Como se conocen dos ángulos, se puede calcular el tercero, obteniendo un par lado-ángulo opuesto
    completo: se usa ley de senos.'
- titulo: Elegir la ley adecuada con datos LAL
  enunciado: Se conocen dos lados y el ángulo comprendido entre ellos.
  solucion_pasos:
  - 'No hay ningún par lado-ángulo opuesto completo disponible: se usa ley de cosenos para encontrar el
    tercer lado.'
- titulo: ¿Con datos LLL (los tres lados) se debe usar ley de cosenos?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que no se conoce ningún ángulo, se debe partir con ley de cosenos para obtener el primero.
- titulo: ¿Con datos SSA se puede presentar el caso ambiguo?
  respuesta: Sí
  solucion_pasos:
  - Sí, SSA (lado-lado-ángulo no comprendido) es la configuración que puede generar el caso ambiguo al
    usar ley de senos.
errores_frecuentes:
- Intentar usar ley de senos cuando no se tiene ningún par lado-ángulo opuesto completo (configuración
  LAL o LLL).
- Intentar usar ley de cosenos cuando sería más directo aplicar ley de senos (por ejemplo, con datos ASA).
- No verificar si una configuración SSA puede generar el caso ambiguo antes de dar la solución por completa.
fuente: Elaboración propia.
estado: publicado
