semantic_id: MAT.ALG.FUNC_TRIG_MODELO.MODELO_COSENO_CONTEXTO
titulo: Construcción de un modelo con función coseno en contexto
objetivo: Construir un modelo $f(t)=a\cos(b(t-c))+d$ a partir de datos de un fenómeno periódico que comienza en
  su valor máximo.
introduccion: Cuando un fenómeno comienza en su punto más alto (o más bajo) en el instante de referencia,
  conviene usar la función coseno como base del modelo.
resumen: Se usa un **modelo con coseno** cuando el fenómeno comienza en su valor máximo (o mínimo), siguiendo la
  forma $f(t)=a\cos(b(t-c))+d$.
explicacion: '### Definición formal


  El coseno básico comienza en su valor máximo. Si el fenómeno tiene ese comportamiento en el instante de
  referencia, conviene modelarlo con $f(t)=a\cos(b(t-c))+d$, ajustando amplitud, periodo, desfase y línea media
  según los datos observados.


  ### Desarrollo didáctico


  La temperatura de un lugar, si se mide a partir del mediodía (momento de mayor calor), comienza en su valor
  máximo; esto sugiere un modelo tipo coseno: $T(t)=a\cos(bt)+d$, donde $a$ es la variación de temperatura y
  $d$ la temperatura promedio.'
procedimiento:
- 'Paso 1: Verifica que el fenómeno comience en su valor máximo o mínimo.'
- 'Paso 2: Calcula la amplitud, el periodo, el desfase y la línea media a partir de los datos.'
- 'Paso 3: Escribe el modelo completo $f(t)=a\cos(b(t-c))+d$, usando $a<0$ si comienza en el mínimo.'
ejemplos:
- titulo: Construcción de un modelo simple
  enunciado: 'Una señal comienza en $10$ (su máximo), baja a $2$ en $3$ segundos (su mínimo), y vuelve a $10$ en
    $6$ segundos. Escribe su modelo.'
  solucion_pasos:
  - 'Amplitud $a=(10-2)/2=4$; línea media $d=(10+2)/2=6$; periodo $T=6$, así que $b=2\pi/6=\pi/3$.'
  - 'El modelo es $f(t)=4\cos(\pi t/3)+6$.'
- titulo: Identificación del uso del coseno
  enunciado: '¿Por qué se usa coseno y no seno para modelar una señal que comienza en su valor máximo?'
  solucion_pasos:
  - El coseno básico comienza exactamente en su valor máximo.
  - Es la elección natural para ese comportamiento inicial.
- titulo: ¿Se puede modelar con coseno un fenómeno que comienza en su valor mínimo?
  enunciado: ¿Es posible usar un modelo de coseno para un fenómeno que comienza en su valor mínimo?
  respuesta: Sí
  solucion_pasos:
  - Usando $a<0$ (reflexión), el coseno comienza en su mínimo en vez de su máximo.
- titulo: ¿El modelo con coseno siempre requiere un desfase distinto de cero?
  enunciado: ¿Un modelo basado en coseno siempre necesita un desfase $c$ distinto de cero?
  respuesta: 'No'
  solucion_pasos:
  - Si el fenómeno comienza exactamente en el instante de referencia elegido, $c=0$.
errores_frecuentes:
- Elegir coseno cuando el fenómeno en realidad comienza en su valor medio (caso más apropiado para seno).
- No verificar si el fenómeno comienza en el máximo o en el mínimo antes de fijar el signo de $a$.
- Calcular mal la amplitud o la línea media a partir de los datos observados.
- Confundir el instante de referencia $t=0$ con otro punto del fenómeno.
