semantic_id: MAT.ALG.TRIG_CIRCULO_ANGULOS.GRADOS_A_RADIANES
titulo: Conversión de grados a radianes
objetivo: Aplicar la fórmula $\text{radianes}=\text{grados}\cdot\dfrac{\pi}{180}$ para convertir ángulos de grados
  a radianes.
introduccion: Como un giro completo equivale a $360°$ y también a $2\pi$ radianes, se puede establecer una regla
  de conversión directa entre ambas unidades.
resumen: Para convertir de grados a radianes, se multiplica el número de grados por $\dfrac{\pi}{180}$.
explicacion: '### Definición formal


  Dado que $360°=2\pi$ radianes, se cumple $1°=\dfrac{2\pi}{360}=\dfrac{\pi}{180}$ radianes. Por lo tanto, para
  convertir un ángulo de $g$ grados a radianes, se calcula $g\cdot\dfrac{\pi}{180}$.


  ### Desarrollo didáctico


  Para convertir $60°$ a radianes: $60\cdot\dfrac{\pi}{180}=\dfrac{60\pi}{180}=\dfrac{\pi}{3}$. Para convertir
  $150°$: $150\cdot\dfrac{\pi}{180}=\dfrac{150\pi}{180}=\dfrac{5\pi}{6}$.'
procedimiento:
- 'Paso 1: Identifica la medida del ángulo en grados.'
- 'Paso 2: Multiplica por $\dfrac{\pi}{180}$.'
- 'Paso 3: Simplifica la fracción resultante si es posible.'
ejemplos:
- titulo: Conversión de un ángulo notable
  enunciado: 'Convierte $45°$ a radianes.'
  solucion_pasos:
  - 'Se multiplica: $45\cdot\dfrac{\pi}{180}$.'
  - 'Se simplifica: $\dfrac{\pi}{4}$.'
- titulo: Conversión de un ángulo mayor a $180°$
  enunciado: 'Convierte $270°$ a radianes.'
  solucion_pasos:
  - 'Se multiplica: $270\cdot\dfrac{\pi}{180}$.'
  - 'Se simplifica: $\dfrac{3\pi}{2}$.'
- titulo: ¿$180°$ equivale a $\pi$ radianes?
  enunciado: ¿La conversión de $180°$ a radianes da como resultado $\pi$?
  respuesta: Sí
  solucion_pasos:
  - '$180\cdot\dfrac{\pi}{180}=\pi$.'
- titulo: ¿Se puede convertir cualquier ángulo en grados a radianes con esta fórmula?
  enunciado: ¿La fórmula $g\cdot\dfrac{\pi}{180}$ sirve para convertir cualquier ángulo, incluidos los negativos?
  respuesta: Sí
  solucion_pasos:
  - La fórmula es válida para cualquier valor real de grados, positivo o negativo.
errores_frecuentes:
- Multiplicar por $180/\pi$ en vez de $\pi/180$, invirtiendo la fórmula.
- No simplificar la fracción resultante al final de la conversión.
- Confundir esta conversión con la de radianes a grados.
- Olvidar el símbolo $\pi$ en el resultado, dejando solo el coeficiente numérico.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
