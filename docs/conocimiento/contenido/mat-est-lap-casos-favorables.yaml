semantic_id: MAT.EST.LAPLACE_MUESTRALES.CASOS_FAVORABLES
titulo: Identificación de casos favorables para un evento
objetivo: Identificar los casos favorables de un evento, es decir, los resultados del espacio muestral
  que cumplen la condición de interés.
introduccion: Antes de calcular una probabilidad, es necesario contar cuántos resultados del espacio muestral
  corresponden efectivamente al evento que se está estudiando.
resumen: Los casos favorables de un evento $A$ son los elementos del espacio muestral que pertenecen a
  $A$, es decir, que cumplen la condición definida por el evento.
explicacion: '![Casos favorables](/static/img/probabilidad/laplace/lap-casos-favorables.svg)


  ### Definición formal


  Si $A$ es un evento dentro del espacio muestral $S$, los casos favorables son los elementos de $A$,
  y su cantidad se denota $n(A)$.


  ### Desarrollo didáctico


  Al lanzar un dado, para el evento ''obtener un número par'', los casos favorables son $\{2,4,6\}$, es
  decir, $n(A)=3$.'
procedimiento:
- 'Paso 1: Define claramente el evento de interés.'
- 'Paso 2: Revisa cada elemento del espacio muestral y verifica si cumple la condición del evento.'
- 'Paso 3: Cuenta cuántos elementos cumplen esa condición: esos son los casos favorables, n(A).'
ejemplos:
- titulo: Identificar los casos favorables de 'número par'
  enunciado: 'Lanzar un dado, evento A: número par.'
  solucion_pasos:
  - Los casos favorables son {2,4,6}, por lo que n(A)=3.
- titulo: Identificar los casos favorables de 'carta de corazones'
  enunciado: Extraer una carta de un mazo de 52.
  solucion_pasos:
  - Los casos favorables son las 13 cartas de corazones, por lo que n(A)=13.
- titulo: ¿Los casos favorables son siempre un subconjunto del espacio muestral?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que corresponden exactamente a los elementos del evento, que es un subconjunto de S.
- titulo: ¿Puede un evento tener cero casos favorables?
  respuesta: Sí
  solucion_pasos:
  - Sí, esto ocurre cuando el evento es imposible (A=∅).
errores_frecuentes:
- Contar mal los elementos que cumplen la condición del evento, omitiendo o repitiendo alguno.
- Confundir los casos favorables con los casos totales del espacio muestral.
- Definir incorrectamente la condición del evento antes de contar los casos favorables.
fuente: 'Elaboración propia (referencia: Moraleja 404).'
estado: publicado
