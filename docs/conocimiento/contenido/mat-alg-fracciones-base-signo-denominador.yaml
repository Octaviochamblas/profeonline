semantic_id: 'MAT.ALG.FRACCIONES_BASE.SIGNO_DENOMINADOR'
titulo: 'Cambio de Signos en el Denominador'
objetivo: 'Saber cómo aplicar un signo negativo externo a un polinomio que está en el denominador.'
introduccion: |
  Al igual que con el piso de arriba, podemos inyectar un signo negativo en el subsuelo (el denominador). El mecanismo es exactamente el mismo, y es un truco fantástico para arreglar denominadores 'al revés'.
resumen: |
  Si aplicas un cambio de signo al denominador (por ejemplo, pasando el signo global hacia abajo), debes cambiarle el signo a TODOS los términos del polinomio del denominador.
explicacion: |
  Tenemos $-\frac{10}{3 - x}$.
  El numerador nos gusta así (positivo 10), pero el denominador está un poco incómodo ('3 - x').
  Usemos el signo global para arreglar el denominador:
  Metemos el signo negativo abajo: $-(3 - x)$.

  Distribuimos el negativo a todos los miembros de abajo:
  El '3' positivo se vuelve '-3'.
  El '-x' negativo se vuelve '+x'.

  El denominador quedó: $-3 + x$, que se ve más bonito ordenado como $x - 3$.
  Nuestra fracción final es $\frac{10}{x - 3}$.
  ¡Hemos usado el signo negativo para 'darle la vuelta' a una resta en el denominador!
procedimiento:
  - 'Paso 1: Para mover el signo al denominador, agrupa el denominador entre paréntesis.'
  - 'Paso 2: Multiplica todo el paréntesis por el signo negativo.'
  - 'Paso 3: Cambia de signo a TODOS los términos. Las restas invertidas ($b-a$) se volverán rectas ($a-b$).'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Mueve el negativo global de $-\frac{x^2}{4 - y}$ hacia el denominador.'
    solucion_pasos:
    - 'El signo va hacia abajo: $-(4 - y)$.'
    - 'Distribuimos: $-4 + y$.'
    - 'Reordenamos: $y - 4$.'
    - 'Resultado: $\frac{x^2}{y - 4}$.'
  - titulo: '¿Cómo escribir $\frac{5}{-(x+2)}$ sin el paréntesis?'
    respuesta: '$\frac{5}{-x-2}$'
    solucion_pasos:
    - 'El negativo afecta a la x y al 2.'
errores_frecuentes:
  - 'Cambiar el signo solo al primer término del denominador.'
  - 'Creer que al darle vuelta a un polinomio sumado ($x+3$ a $3+x$) se necesita un negativo. (La suma es conmutativa, la resta no).'
estado: publicado
