semantic_id: MAT.ALG.FRACCIONES_BASE.SIGNO_DENOMINADOR
titulo: Cambio de Signos en el Denominador
objetivo: Saber cómo aplicar un signo negativo externo a un polinomio que está en el denominador.
introduccion: Al igual que con el piso de arriba, podemos inyectar un signo negativo en el subsuelo (el denominador).
  El mecanismo es exactamente el mismo, y es un truco fantástico para arreglar denominadores 'al revés'.
resumen: Si aplicas un cambio de signo al denominador (por ejemplo, pasando el signo global hacia abajo), debes
  cambiarle el signo a TODOS los términos del polinomio del denominador.
explicacion: '### Definición formal


  Todos los términos del denominador cambian su signo.


  ### Desarrollo didáctico


  Tener un signo negativo o múltiples signos negativos molestos en el denominador es visualmente confuso y propenso
  a generar errores en sumas y restas futuras.


  Afortunadamente, podemos ''limpiar'' el denominador usando la regla de los signos: Puedes multiplicar tanto el
  numerador como el denominador por $-1$. Esto tiene el efecto adecuado de invertir todos los signos de la fracción,
  manteniéndola matemáticamente equivalente.


  Ejemplo: Tienes la fracción $\frac{x - 2}{-y + 3}$. El denominador es difícil de interpretar.

  Si multiplicas todo por $-1$ (cambias signos arriba y abajo):

  - Arriba: $(x - 2)$ se convierte en $(-x + 2)$ o $(2 - x)$.

  - Abajo: $(-y + 3)$ se convierte en $(y - 3)$.


  La nueva fracción limpia es $\frac{2 - x}{y - 3}$. Mucho más elegante y fácil de trabajar.'
procedimiento:
- 'Paso 1: Para mover el signo al denominador, agrupa el denominador entre paréntesis.'
- 'Paso 2: Multiplica todo el paréntesis por el signo negativo.'
- 'Paso 3: Cambia de signo a TODOS los términos. Las restas invertidas ($b-a$) se volverán rectas ($a-b$).'
- El signo afecta a toda la expresión como bloque.
ejemplos:
- titulo: Mueve el negativo global de $-\frac{x^2}{4 - y}$ hacia el denominador
  enunciado: Mueve el negativo global de $-\frac{x^2}{4 - y}$ hacia el denominador.
  solucion_pasos:
  - 'El signo va hacia abajo: $-(4 - y)$.'
  - 'Distribuimos: $-4 + y$.'
  - 'Reordenamos: $y - 4$.'
  - 'Resultado: $\frac{x^2}{y - 4}$.'
- titulo: ¿Cómo escribir $\frac{5}{-(x+2)}$ sin el paréntesis?
  solucion_pasos:
  - El negativo afecta a la x y al 2.
- titulo: 'Respecto de «Cambio de signo en el denominador de una fracción algebraica»: ¿La siguiente fo'
  enunciado: 'Respecto de «Cambio de signo en el denominador de una fracción algebraica»: ¿La siguiente formulación
    es correcta? «Si aplicas un cambio de signo al denominador (por ejemplo, pasando el signo global hacia abajo),
    debes cambiarle el signo a TODOS los términos del polinomio del denominador»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Si aplicas un cambio de signo al denominador (por ejemplo,
    pasando el signo global hacia abajo), debes cambiarle el signo a TODOS los términos del polinomio del denominador.'
- titulo: 'Respecto de «Cambio de signo en el denominador de una fracción algebraica»: ¿La siguiente co'
  enunciado: 'Respecto de «Cambio de signo en el denominador de una fracción algebraica»: ¿La siguiente conclusión
    es correcta? «Cambiar el signo solo al primer término del denominador»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Si aplicas un cambio de signo al denominador (por ejemplo,
    pasando el signo global hacia abajo), debes cambiarle el signo a TODOS los términos del polinomio del denominador.'
errores_frecuentes:
- Cambiar el signo solo al primer término del denominador.
- Creer que al darle vuelta a un polinomio sumado ($x+3$ a $3+x$) se necesita un negativo. (La suma es conmutativa,
  la resta no).
- Solo el término mayor cambia.
- Se invierte la fracción.
- El numerador también cambia.
