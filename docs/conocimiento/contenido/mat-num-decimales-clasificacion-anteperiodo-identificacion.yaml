semantic_id: MAT.NUM.DECIMALES_CLASIFICACION.ANTEPERIODO_IDENTIFICACION
objetivo: Identificar el anteperíodo de un decimal.
introduccion: Una tarea matemática frecuente es identificar el anteperíodo de un decimal.
  El caso “En \(0.16\overline{4}\), el anteperíodo es 16” muestra cómo abordarla desde
  identificación del anteperíodo decimal.
resumen: El anteperíodo es el conjunto de cifras decimales que aparece antes de que
  empiece la repetición. Como criterio de control, solo los decimales semiperiódicos
  tienen anteperíodo
explicacion: |-
  El anteperíodo es el conjunto de cifras decimales que aparece antes de que empiece la repetición.

  La relación entre la definición y el caso “En \(0.16\overline{4}\), el anteperíodo es 16” conduce a una conclusión útil: Solo los decimales semiperiódicos tienen anteperíodo.
procedimiento:
- 'Paso 1: Ubica las cifras posteriores a la coma que aparecen antes de la repetición.'
- 'Paso 2: Detén el anteperíodo justo donde comienza el bloque periódico.'
- 'Paso 3: Comprueba que esas cifras iniciales no vuelvan a repetirse como parte del
  período.'
ejemplos:
- titulo: Aplicación razonada — Identificación del anteperíodo decimal
  enunciado: En \(0.16\overline{4}\), el anteperíodo es 16.
  solucion_pasos:
  - Ubica las cifras posteriores a la coma que aparecen antes de la repetición.
  - Detén el anteperíodo justo donde comienza el bloque periódico.
  - Comprueba que esas cifras iniciales no vuelvan a repetirse como parte del período.
- titulo: Revisión de una solución — Identificación del anteperíodo decimal
  enunciado: Una solución aplica “Detén el anteperíodo justo donde comienza el bloque
    periódico.”, pero termina sin comprobar que solo los decimales semiperiódicos
    tienen anteperíodo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación del anteperíodo decimal: el anteperíodo
    es el conjunto de cifras decimales que aparece antes de que empiece la repetición.'
  - Ubica las cifras posteriores a la coma que aparecen antes de la repetición.
  - 'Completa la revisión con este control: Comprueba que esas cifras iniciales no
    vuelvan a repetirse como parte del período.'
- titulo: ¿Se cumple que solo los decimales semiperiódicos tienen anteperíodo? — Identificación
    del anteperíodo decimal
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el anteperíodo es el conjunto de cifras
    decimales que aparece antes de que empiece la repetición.
  - El caso “En \(0.16\overline{4}\), el anteperíodo es 16” satisface esa condición.
  - Comprueba que esas cifras iniciales no vuelvan a repetirse como parte del período.
- titulo: ¿Es válido omitir el paso “Ubica las cifras posteriores a la coma que aparecen
    antes de la repetición”? — Identificación del anteperíodo decimal
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación del anteperíodo
    decimal.
  - 'Omitirlo puede volver inválida la acción siguiente: Detén el anteperíodo justo
    donde comienza el bloque periódico.'
  - 'La solución debe terminar de este modo: Comprueba que esas cifras iniciales no
    vuelvan a repetirse como parte del período.'
errores_frecuentes:
- 'Empezar identificación del anteperíodo decimal sin realizar este control inicial:
  Ubica las cifras posteriores a la coma que aparecen antes de la repetición.'
- Memorizar “En \(0.16\overline{4}\), el anteperíodo es 16” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Detén el anteperíodo justo donde comienza el bloque
  periódico.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación del anteperíodo decimal que contradice
  el criterio “Solo los decimales semiperiódicos tienen anteperíodo”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que esas cifras
  iniciales no vuelvan a repetirse como parte del período.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
