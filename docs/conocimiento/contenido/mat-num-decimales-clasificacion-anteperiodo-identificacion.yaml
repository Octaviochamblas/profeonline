semantic_id: MAT.NUM.DECIMALES_CLASIFICACION.ANTEPERIODO_IDENTIFICACION
titulo: Identificación del anteperíodo de un decimal
objetivo: Identificar correctamente qué cifras forman el anteperíodo en un decimal semiperiódico.
introduccion: 'En un decimal semiperiódico conviven dos bloques distintos: el anteperíodo, que no se repite,
  y el período, que sí. Distinguirlos correctamente es clave para transformar el decimal a fracción.'
resumen: El anteperíodo de un decimal semiperiódico es el bloque de cifras ubicado entre la coma y el
  período, que no se repite.
explicacion: '### Definición formal


  En la notación \(0.a_1a_2\ldots a_m\overline{c_1\ldots c_k}\), el anteperíodo es el bloque \(a_1a_2\ldots
  a_m\), las cifras que aparecen antes de que comience la repetición marcada por la línea.


  ### Desarrollo didáctico


  En \(0.16\overline{4}\), el anteperíodo es 16: las cifras 1 y 6 no están bajo la línea, aparecen una
  sola vez antes de que comience a repetirse el período 4.'
procedimiento:
- 'Paso 1: Ubica las cifras posteriores a la coma que aparecen antes de la repetición.'
- 'Paso 2: Detén el anteperíodo justo donde comienza el bloque periódico.'
- 'Paso 3: Comprueba que esas cifras iniciales no vuelvan a repetirse como parte del período.'
ejemplos:
- titulo: Aplicación razonada — Identificación del anteperíodo decimal
  enunciado: En \(0.16\overline{4}\), el anteperíodo es 16.
  solucion_pasos:
  - Ubica las cifras posteriores a la coma que aparecen antes de la repetición.
  - Detén el anteperíodo justo donde comienza el bloque periódico.
  - Comprueba que esas cifras iniciales no vuelvan a repetirse como parte del período.
- titulo: Revisión de una solución — Identificación del anteperíodo decimal
  enunciado: Una solución aplica “Detén el anteperíodo justo donde comienza el bloque periódico.”, pero
    termina sin comprobar que solo los decimales semiperiódicos tienen anteperíodo. Determina qué falta
    justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación del anteperíodo decimal: el anteperíodo es el conjunto
    de cifras decimales que aparece antes de que empiece la repetición.'
  - Ubica las cifras posteriores a la coma que aparecen antes de la repetición.
  - 'Completa la revisión con este control: Comprueba que esas cifras iniciales no vuelvan a repetirse
    como parte del período.'
- titulo: ¿Se cumple que solo los decimales semiperiódicos tienen anteperíodo? — Identificación del anteperíodo
    decimal
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el anteperíodo es el conjunto de cifras decimales que aparece
    antes de que empiece la repetición.
  - El caso “En \(0.16\overline{4}\), el anteperíodo es 16” satisface esa condición.
  - Comprueba que esas cifras iniciales no vuelvan a repetirse como parte del período.
- titulo: ¿Es válido omitir el paso “Ubica las cifras posteriores a la coma que aparecen antes de la repetición”?
    — Identificación del anteperíodo decimal
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación del anteperíodo decimal.
  - 'Omitirlo puede volver inválida la acción siguiente: Detén el anteperíodo justo donde comienza el
    bloque periódico.'
  - 'La solución debe terminar de este modo: Comprueba que esas cifras iniciales no vuelvan a repetirse
    como parte del período.'
errores_frecuentes:
- 'Empezar identificación del anteperíodo decimal sin realizar este control inicial: Ubica las cifras
  posteriores a la coma que aparecen antes de la repetición.'
- Memorizar “En \(0.16\overline{4}\), el anteperíodo es 16” como respuesta aislada, sin reconstruir la
  definición que lo justifica.
- Convertir en receta el paso “Detén el anteperíodo justo donde comienza el bloque periódico.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación del anteperíodo decimal que contradice el criterio
  “Solo los decimales semiperiódicos tienen anteperíodo”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que esas cifras iniciales no vuelvan
  a repetirse como parte del período.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
