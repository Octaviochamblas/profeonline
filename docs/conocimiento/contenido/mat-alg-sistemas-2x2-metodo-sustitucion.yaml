semantic_id: 'MAT.ALG.SISTEMAS_2X2.METODO_SUSTITUCION'
titulo: 'Método de Sustitución'
objetivo: 'Resolver un sistema despejando una variable e inyectándola en la otra ecuación.'
introduccion: |
  El método de sustitución es como jugar a los sustitución de variables.
  Tienes dos ecuaciones (Ecuación A y Ecuación B).
  1. Tomas la Ecuación A y despejas una letra (digamos, la 'y'). Descubres su 'identidad secreta' (ej: $y = 5 - 2x$).
  2. Te infiltras en la Ecuación B. Donde sea que veas una 'y', la borras y escribes la identidad secreta $(5 - 2x)$.
resumen: 'Este proceso es fundamental para encontrar la solución correcta.'
explicacion: |
  ¡álgebra! La Ecuación B ahora solo tiene letras 'x'. Se convirtió en una ecuación lineal de primer grado normal. La resuelves, descubres quién es 'x', y luego usas ese valor para descubrir finalmente quién era 'y'.
procedimiento:
  - 'Paso 1: Despeja una incógnita (la que parezca más fácil) de una de las ecuaciones.'
  - 'Paso 2: Sustituye la expresión obtenida en el lugar de esa misma incógnita en la SEGUNDA ecuación.'
  - 'Paso 3: Resuelve la segunda ecuación (que ahora tiene una sola incógnita).'
  - 'Paso 4: Reemplaza el valor obtenido en el despeje del paso 1 para hallar la otra incógnita.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
