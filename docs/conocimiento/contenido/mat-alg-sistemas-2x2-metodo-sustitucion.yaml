semantic_id: MAT.ALG.SISTEMAS_2X2.METODO_SUSTITUCION
titulo: Método de Sustitución
objetivo: Resolver un sistema despejando una variable e inyectándola en la otra ecuación.
explicacion: |
  El método de sustitución es como jugar a los espías infiltrados.
  Tienes dos ecuaciones (Ecuación A y Ecuación B).
  1. Tomas la Ecuación A y despejas una letra (digamos, la 'y'). Descubres su 'identidad secreta' (ej: $y = 5 - 2x$).
  2. Te infiltras en la Ecuación B. Donde sea que veas una 'y', la borras y escribes la identidad secreta $(5 - 2x)$.

  ¡Magia! La Ecuación B ahora solo tiene letras 'x'. Se convirtió en una ecuación lineal de primer grado normal. La resuelves, descubres quién es 'x', y luego usas ese valor para descubrir finalmente quién era 'y'.
procedimiento: |
  1. Despeja una incógnita (la que parezca más fácil) de una de las ecuaciones.
  2. Sustituye la expresión obtenida en el lugar de esa misma incógnita en la SEGUNDA ecuación.
  3. Resuelve la segunda ecuación (que ahora tiene una sola incógnita).
  4. Reemplaza el valor obtenido en el despeje del paso 1 para hallar la otra incógnita.
