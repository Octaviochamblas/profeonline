semantic_id: MAT.ALG.SISTEMAS_2X2.METODO_SUSTITUCION
titulo: Método de Sustitución
objetivo: Resolver un sistema despejando una variable e inyectándola en la otra ecuación.
introduccion: relación algebraica. La Ecuación B ahora solo tiene letras 'x'. Se convirtió en una ecuación lineal
  de primer grado normal. La resuelves, descubres quién es 'x', y luego usas ese valor para descubrir finalmente
  quién era 'y'.
resumen: El método de sustitución despeja una incógnita en una ecuación y reemplaza esa expresión en la otra, reduciendo
  el sistema a una ecuación de una variable.
explicacion: '### Definición formal


  El método de sustitución despeja una incógnita en una ecuación y reemplaza esa expresión en la otra, reduciendo
  el sistema a una ecuación de una variable.


  ### Desarrollo didáctico


  relación algebraica. La Ecuación B ahora solo tiene letras ''x''. Se convirtió en una ecuación lineal de primer
  grado normal. La resuelves, descubres quién es ''x'', y luego usas ese valor para descubrir finalmente quién era
  ''y''.'
procedimiento:
- Despeja una incógnita (la que parezca más fácil) de una de las ecuaciones.
- Sustituye la expresión obtenida en el lugar de esa misma incógnita en la SEGUNDA ecuación.
- Resuelve la segunda ecuación (que ahora tiene una sola incógnita).
- Reemplaza el valor obtenido en el despeje del paso 1 para hallar la otra incógnita.
ejemplos:
- titulo: $y = 5 - 2x$ y $(5 - 2x)$
  enunciado: Resuelve o interpreta $y = 5 - 2x$ y $(5 - 2x)$ usando las condiciones de este recurso.
  solucion_pasos:
  - "El método de sustitución es como jugar a los valores sustituidos. \nTienes dos ecuaciones (Ecuación A y Ecuación\
    \ B).\n1. Tomas la Ecuación A y despejas una letra (digamos, la 'y'). Descubres su 'identidad secreta' (ej:\
    \ $y = 5 - 2x$).\n2. Te infiltras en la Ecuación B. Donde sea que veas una 'y', la borras y escribes la identidad\
    \ secreta $(5 - 2x)$."
  - Despeja una incógnita (la que parezca más fácil) de una de las ecuaciones.
- titulo: $y = 5 - 2x$ y $(5 - 2x)$
  enunciado: Justifica el procedimiento adecuado para el caso $y = 5 - 2x$ y $(5 - 2x)$.
  solucion_pasos:
