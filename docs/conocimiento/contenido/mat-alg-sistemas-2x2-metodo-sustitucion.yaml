    \ $y = 5 - 2x$).\n2. Te infiltras en la Ecuación B. Donde sea que veas una 'y', la borras y escribes la identidad\
    \ secreta $(5 - 2x)$."
  - Sustituye la expresión obtenida en el lugar de esa misma incógnita en la SEGUNDA ecuación.
- titulo: 'Respecto de «Resolución mediante el método de sustitución»: ¿Describe adecuadamente el conce'
  enunciado: 'Respecto de «Resolución mediante el método de sustitución»: ¿Describe adecuadamente el concepto esta
    frase? «El método de sustitución despeja una incógnita en una ecuación y reemplaza esa expresión en la otra,
    reduciendo el sistema a una ecuación de una variable»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El método de sustitución despeja una incógnita en una ecuación
    y reemplaza esa expresión en la otra, reduciendo el sistema a una ecuación de una variable.'
- titulo: 'Respecto de «Resolución mediante el método de sustitución»: ¿Se puede aceptar esta afirmació'
  enunciado: 'Respecto de «Resolución mediante el método de sustitución»: ¿Se puede aceptar esta afirmación? «Puede
    omitirse esta condición sin cambiar el resultado: «Despeja una incógnita (la que parezca más fácil) de una de
    las ecuaciones»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El método de sustitución despeja una incógnita en una ecuación
    y reemplaza esa expresión en la otra, reduciendo el sistema a una ecuación de una variable.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Despeja una incógnita (la que parezca más fácil) de
  una de las ecuaciones».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Sustituye la expresión obtenida en el lugar de
  esa misma incógnita en la SEGUNDA ecuación».'
- "La definición sigue cumpliéndose aunque no se considere que el método de sustitución es como jugar a los valores\
  \ sustituidos. \nTienes dos ecuaciones (Ecuación A y Ecuación B).\n1. Tomas la Ecuación A y despejas una letra\
  \ (digamos, la 'y'). Descubres su 'identidad secreta' (ej: $y = 5 - 2x$).\n2. Te infiltras en la Ecuación B. Donde\
  \ sea que veas una 'y', la borras y escribes la identidad secreta $(5 - 2x)$."
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Reemplaza el valor obtenido en el despeje
  del paso 1 para hallar la otra incógnita».
- La comprobación del resultado vuelve innecesaria la condición «Despeja una incógnita (la que parezca más fácil)
  de una de las ecuaciones».
