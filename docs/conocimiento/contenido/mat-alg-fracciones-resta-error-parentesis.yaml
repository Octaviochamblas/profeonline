semantic_id: 'MAT.ALG.FRACCIONES_RESTA.ERROR_PARENTESIS'
titulo: 'Errores de Opresión (Falta de Paréntesis)'
objetivo: 'Reconocer ejercicios que han sido desarrollados erróneamente por falta de paréntesis y corregirlos.'
introduccion: |
  Aprender del error ajeno es inteligencia. Revisaremos el error más destructivo de las fracciones algebraicas: cómo la omisión de un par de garabatos curvos () arruina todo el trabajo.
resumen: |
  Omitir los paréntesis al colocar el segundo numerador detrás del signo de resta resultará inevitablemente en signos erróneos para todos los términos (excepto el primero) de ese polinomio.
explicacion: |
  Un ejercicio resuelto por un estudiante desatento:
  $\frac{4x}{x-1} - \frac{x - 5}{x-1}$
  Paso del estudiante: $=\frac{4x - x - 5}{x-1}$
  Resultado del estudiante: $=\frac{3x - 5}{x-1}$

  **¡TERRIBLE ERROR!**
  El estudiante aplicó el menos de la resta SÓLO a la 'x'. El $-5$ bajó impunemente como $-5$.

  Resolución correcta:
  $=\frac{4x - (x - 5)}{x-1}$
  $=\frac{4x - x + 5}{x-1}$ (¡El -5 se volvió +5!)
  $=\frac{3x + 5}{x-1}$.
  Un simple + o - determina si apruebas o no.
procedimiento:
  - 'Paso 1: Siempre asume que los numeradores con más de un término vienen empacados en un paréntesis invisible.'
  - 'Paso 2: Al pasarlos después de un signo menos, haz que el paréntesis sea visible.'
  - 'Paso 3: Recuerda la regla: ''El menos ataca a todos''.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Corrige el error: $\frac{a}{2} - \frac{a+b}{2} = \frac{a - a + b}{2} = \frac{b}{2}$.'
    solucion_pasos:
    - 'Error: El signo no afectó a la ''b''.'
    - 'Correcto: $\frac{a - (a+b)}{2} = \frac{a - a - b}{2} = \frac{-b}{2}$.'
  - titulo: 'Si un alumno dice que $\frac{5}{x} - \frac{y-2}{x} = \frac{5-y-2}{x}$, ¿qué signo se equivocó?'
    respuesta: 'El -2 debería ser +2.'
    solucion_pasos:
    - 'No distribuyó el negativo hacia el -2 original.'
errores_frecuentes:
  - 'Confiar excesivamente en la memoria y hacer la distribución mentalmente fallando en los signos posteriores.'
estado: publicado
