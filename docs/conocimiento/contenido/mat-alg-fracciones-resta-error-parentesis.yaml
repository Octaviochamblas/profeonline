semantic_id: MAT.ALG.FRACCIONES_RESTA.ERROR_PARENTESIS
titulo: Errores de Opresión (Falta de Paréntesis)
objetivo: Reconocer ejercicios que han sido desarrollados erróneamente por falta de paréntesis y corregirlos.
introduccion: 'Aprender del error ajeno es inteligencia. Revisaremos el error más destructivo de las fracciones
  algebraicas: cómo la omisión de un par de garabatos curvos () arruina todo el trabajo.'
resumen: Omitir los paréntesis al colocar el segundo numerador detrás del signo de resta resultará inevitablemente
  en signos erróneos para todos los términos (excepto el primero) de ese polinomio.
explicacion: '### Definición formal


  La línea divisoria agrupa firmemente todo lo que está arriba. Al colocarlo en una línea con otros, ese bloque
  agrupado debe protegerse con paréntesis reales.


  ### Desarrollo didáctico


  Vamos a analizar el asesino de notas más letal del álgebra de fracciones: ''El Síndrome del Signo Perdido''.


  Ocurre al restar un numerador polinomial:

  Restar $\frac{x^2 - 4x + 1}{D}$.


  El estudiante apresurado une la fracción con un menos y escribe: $-x^2 - 4x + 1$.

  ¿Qué pasó? Le cambió el signo al primer término ($x^2$), pero por la prisa, copió el resto igual. Ignoró que el
  menos debía golpear al $-4x$ (volviéndolo $+4x$) y al $+1$ (volviéndolo $-1$).


  **Cura definitiva:** Cada vez que veas un signo menos enlazando fracciones, escribe físicamente un paréntesis
  gigante al juntarlas, ej: $- (x^2 - 4x + 1)$. Toma un segundo escribirlo y te salvará de perder todo el puntaje
  del ejercicio.'
procedimiento:
- 'Paso 1: Siempre asume que los numeradores con más de un término vienen empacados en un paréntesis invisible.'
- 'Paso 2: Al pasarlos después de un signo menos, haz que el paréntesis sea visible.'
- 'Paso 3: Recuerda la regla: ''El menos ataca a todos''.'
ejemplos:
- titulo: 'Corrige el error: $\frac{a}{2} - \frac{a+b}{2} = \frac{a - a + b}{2} = \frac{b}{2}$'
  enunciado: 'Corrige el error: $\frac{a}{2} - \frac{a+b}{2} = \frac{a - a + b}{2} = \frac{b}{2}$.'
  solucion_pasos:
  - 'Error: El signo no afectó a la ''b''.'
  - 'Correcto: $\frac{a - (a+b)}{2} = \frac{a - a - b}{2} = \frac{-b}{2}$.'
- titulo: Si un alumno dice que $\frac{5}{x} - \frac{y-2}{x} = \frac{5-y-2}{x}$, ¿qué signo se equivocó?
  solucion_pasos:
  - No distribuyó el negativo hacia el -2 original.
- titulo: 'Respecto de «Detección de error por omitir paréntesis en una sustracción»: ¿La siguiente for'
  enunciado: 'Respecto de «Detección de error por omitir paréntesis en una sustracción»: ¿La siguiente formulación
    es correcta? «Omitir los paréntesis al colocar el segundo numerador detrás del signo de resta resultará inevitablemente
    en signos erróneos para todos los términos (excepto el primero) de ese polinomio»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Omitir los paréntesis al colocar el segundo numerador detrás
    del signo de resta resultará inevitablemente en signos erróneos para todos los términos (excepto el primero)
    de ese polinomio.'
- titulo: 'Respecto de «Detección de error por omitir paréntesis en una sustracción»: ¿La siguiente con'
  enunciado: 'Respecto de «Detección de error por omitir paréntesis en una sustracción»: ¿La siguiente conclusión
    es correcta? «Confiar excesivamente en la memoria y hacer la distribución mentalmente fallando en los signos
    posteriores»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Omitir los paréntesis al colocar el segundo numerador detrás
    del signo de resta resultará inevitablemente en signos erróneos para todos los términos (excepto el primero)
    de ese polinomio.'
errores_frecuentes:
- Confiar excesivamente en la memoria y hacer la distribución mentalmente fallando en los signos posteriores.
- Porque todos los polinomios llevan paréntesis en álgebra.
- Para «¿Por qué un polinomio en el numerador de una fracción que está restando se comporta como si tuviera un paréntesis
  invisible», la respuesta correcta es Es una regla de formato.
- Para «¿Por qué un polinomio en el numerador de una fracción que está restando se comporta como si tuviera un paréntesis
  invisible», la respuesta correcta es Porque los signos se cancelan.
