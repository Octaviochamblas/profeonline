semantic_id: MAT.NUM.RAZONES.VALOR_RAZON
titulo: Cálculo del valor de la razón
objetivo: Calcular el valor numérico (cociente exacto) de una razón dada.
introduccion: En el estudio de las razones, es fundamental identificar las partes que la componen. Hoy
  exploraremos el valor numérico.
resumen: El valor de la razón es el resultado de efectuar la división entre el antecedente y el consecuente.
explicacion: Una razón $a:b$ tiene partes bien definidas. Al referirnos al valor numérico, analizamos
  su papel en el cálculo numérico. **Dominar este concepto** es la clave para resolver proporciones más
  avanzadas sin confusiones posicionales.
procedimiento:
- 'Paso 1: Escribe la razón como una fracción matemática estándar.'
- 'Paso 2: Identifica la posición del valor numérico según la definición.'
- 'Paso 3: Realiza las operaciones indicadas respetando su lugar.'
ejemplos:
- titulo: Ejemplo de valor numérico
  enunciado: Dada la razón $8:4$, identifica y trabaja con el valor numérico.
  solucion_pasos:
  - Escribimos la razón en forma de cociente.
  - Analizamos las posiciones.
  - Concluimos según la definición teórica.
- titulo: ¿Es siempre un número entero?
  respuesta: 'No'
  solucion_pasos:
  - Puede ser cualquier número real válido, incluyendo fracciones y decimales.
errores_frecuentes:
- Confundir las posiciones de los términos.
- Asumir que siempre son números enteros positivos.
- Olvidar que el consecuente no puede ser cero.
- Invertir el orden lógico al leer el enunciado de un problema.
- Simplificar erróneamente ignorando uno de los términos.
fuente: Currículum Nacional MINEDUC — Razones y proporciones.
estado: publicado
