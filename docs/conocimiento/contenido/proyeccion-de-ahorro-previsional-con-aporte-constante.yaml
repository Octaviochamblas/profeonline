semantic_id: MAT.NUM.FINANZAS_PERSONALES.PROYECCION_PREVISIONAL
titulo: Proyección de ahorro previsional con aporte constante
objetivo: Estimar ahorros a largo plazo basados en un aporte constante (modelo simplificado).
introduccion: 'Si guardas una pequeña cantidad de dinero todos los meses desde que empiezas a trabajar
  hasta que te jubiles, el monto final no es solo la suma del dinero: la magia del interés compuesto y
  la constancia hacen que ese pozo crezca enormemente.'
resumen: 'Proyectar el ahorro previsional de forma básica implica multiplicar: Aporte Mensual $\times$
  12 meses $\times$ Años de cotización. En la vida real, se le suma la rentabilidad del fondo.'
explicacion: 'Una proyección simplificada (sin considerar interés ni rentabilidad, solo la acumulación
  lineal) nos ayuda a entender el volumen del ahorro:


  $$\text{Monto Acumulado} = \text{Aporte Mensual} \cdot 12 \text{ meses} \cdot \text{Años Trabajados}$$


  - **¿Por qué empezar temprano?** Un trabajador que ahorra desde los 25 a los 65 años (40 años) acumulará
  mucho más capital base que alguien que empieza a los 45 años, incluso si este último aporta el doble
  de dinero mensual. El tiempo de cotización es el factor más importante para una buena pensión futura.'
procedimiento:
- 'Paso 1: Calcula el aporte mensual ($10\%$ de tu sueldo imponible).'
- 'Paso 2: Multiplica por 12 para obtener tu ahorro anual.'
- 'Paso 3: Multiplica por la cantidad de años que vas a trabajar antes de jubilar.'
ejemplos:
- titulo: Ahorro básico sin rentabilidad
  enunciado: Si tu sueldo imponible será de $1.000.000 por el resto de tu vida (y aportas el 10% mensual),
    ¿cuánto habrás juntado en 30 años de trabajo? (Ignorando la rentabilidad).
  solucion_pasos:
  - 'Aporte mensual: 10% de 1.000.000 = $100.000.'
  - 'Aporte anual: $100.000 \cdot 12 = 1.200.000$.'
  - 'Aporte en 30 años: $1.200.000 \cdot 30 = 36.000.000$.'
  - Tendrías $36.000.000 de capital puro (en la vida real sería mucho más gracias a las inversiones de
    la AFP).
errores_frecuentes:
- Olvidar multiplicar por los 12 meses del año al hacer proyecciones a largo plazo.
- Creer que la pensión será igual a tu último sueldo (la pensión depende únicamente del total de dinero
  juntado en ese pozo dividido por los años que vivas como jubilado).
fuente: Currículum Nacional MINEDUC.
estado: publicado
