semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.INYECTIVA_DEFINICION
titulo: Definición de función inyectiva
objetivo: Comprender la inyectividad como la propiedad de que elementos distintos del dominio tienen imágenes
  distintas.
introduccion: 'Hay funciones donde nunca dos entradas distintas producen la misma salida: cada resultado
  "delata" exactamente de qué entrada vino. Esa propiedad se llama inyectividad.'
resumen: Una función $f\colon A \to B$ es **inyectiva** si elementos distintos del dominio tienen siempre
  imágenes distintas; equivalentemente, si $f(x_1)=f(x_2)$ implica $x_1=x_2$.
explicacion: '### Definición formal


  Una función $f\colon A \to B$ es inyectiva (o uno a uno) si para todo $x_1, x_2 \in A$, $f(x_1) = f(x_2)
  \implies x_1 = x_2$. Equivalentemente, $x_1 \neq x_2 \implies f(x_1) \neq f(x_2)$: no existen dos elementos
  distintos del dominio con la misma imagen.


  ### Desarrollo didáctico


  La forma más práctica de verificarlo algebraicamente es plantear la ecuación $f(x_1)=f(x_2)$ y comprobar
  que la única solución posible es $x_1=x_2$.


  Para $f(x)=2x+1$: si $2x_1+1=2x_2+1$, entonces $2x_1=2x_2$, y por tanto $x_1=x_2$. Se confirma que $f$
  es inyectiva. En cambio, para $g(x)=x^2$: $g(2)=g(-2)=4$ con $2\neq-2$, así que $g$ no es inyectiva.'
procedimiento:
- 'Paso 1: Plantea la ecuación $f(x_1)=f(x_2)$.'
- 'Paso 2: Resuelve algebraicamente esa ecuación.'
- 'Paso 3: Si la única solución es $x_1=x_2$, la función es inyectiva.'
- 'Paso 4: Si existen soluciones con $x_1 \neq x_2$, la función no es inyectiva.'
ejemplos:
- titulo: Verificación algebraica de inyectividad
  enunciado: Determina si $f(x)=5x-3$ es inyectiva.
  solucion_pasos:
  - Se plantea $5x_1-3=5x_2-3$.
  - $5x_1=5x_2 \Rightarrow x_1=x_2$.
  - Es inyectiva.
- titulo: Contraejemplo de inyectividad
  enunciado: Determina si $f(x)=x^2$ es inyectiva en $\mathbb{R}$.
  solucion_pasos:
  - Se observa que $f(3)=9$ y $f(-3)=9$.
  - Aunque $3 \neq -3$, comparten la misma imagen.
  - No es inyectiva.
- titulo: ¿Una función inyectiva puede tener dos elementos distintos del dominio con la misma imagen?
  enunciado: ¿Una función inyectiva puede tener dos elementos distintos del dominio con la misma imagen?
  respuesta: 'No'
  solucion_pasos:
  - Eso violaría directamente la definición de inyectividad.
- titulo: ¿Toda función lineal $f(x)=mx+n$ con $m\neq0$ es inyectiva?
  enunciado: ¿Toda función lineal $f(x)=mx+n$ con $m\neq0$ es inyectiva?
  respuesta: Sí
  solucion_pasos:
  - Al resolver $mx_1+n=mx_2+n$ se obtiene $x_1=x_2$ siempre que $m\neq0$.
errores_frecuentes:
- Confundir inyectividad con sobreyectividad.
- Verificar la inyectividad con solo un par de valores en vez de la ecuación general.
- Creer que toda función creciente o decreciente en algún tramo es automáticamente inyectiva en todo su
  dominio.
- No considerar restricciones de dominio al evaluar la inyectividad de una función cuadrática.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
