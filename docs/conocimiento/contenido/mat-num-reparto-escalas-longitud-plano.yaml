semantic_id: MAT.NUM.REPARTO_ESCALAS.LONGITUD_PLANO
objetivo: Calcular la longitud de un objeto en un plano a partir de su medida real
  y la escala.
introduccion: Si sabes que tu habitación mide 4 metros de largo y quieres dibujarla
  en un plano 1:100, ¿de cuántos centímetros debe ser la línea que traces? Convertir
  lo real a papel es clave en el diseño.
resumen: Para hallar la medida en el plano, divide la medida real (convertida a la
  unidad del plano) por el factor de escala ($E$).
explicacion: 'Al usar la fórmula $\text{Escala} = \frac{\text{Plano}}{\text{Realidad}}$,
  si queremos calcular la medida en el **Plano** despejamos:


  $$\text{Plano} = \frac{\text{Realidad}}{E}$$

  (donde $E$ es el consecuente de la escala $1:E$).


  **¡Cuidado con las unidades!** Si la realidad está en kilómetros o metros, primero
  debes convertirla a centímetros (la unidad típica del plano) multiplicando por $100.000$
  o por $100$ respectivamente, y luego hacer la división.'
procedimiento:
- 'Paso 1: Convierte la medida real a la unidad en la que vas a dibujar (generalmente
  centímetros).'
- 'Paso 2: Toma la escala $1:E$ y fíjate en el número $E$.'
- 'Paso 3: Divide la medida real (ya convertida) por $E$. Ese es tu tamaño de dibujo.'
ejemplos:
- titulo: Dibujando una pared
  enunciado: Pared real de 5 metros. Escala 1:50. ¿Cuánto mide en el plano?
  solucion_pasos:
  - 'Convertimos 5 metros a centímetros: $5 \cdot 100 = 500$ cm.'
  - La escala dice $E = 50$.
  - 'Dividimos: $500 / 50 = 10$ cm. En el plano medirás 10 cm.'
errores_frecuentes:
- Dividir los metros sin convertirlos a centímetros (ej. $5/50 = 0.1$ cm).
- Multiplicar en lugar de dividir (obteniendo un plano más grande que la realidad).
fuente: Currículum Nacional MINEDUC.
estado: publicado
