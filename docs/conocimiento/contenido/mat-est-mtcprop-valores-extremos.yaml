semantic_id: MAT.EST.MTC_PROPIEDADES.VALORES_EXTREMOS
titulo: Analizar la sensibilidad de la media frente a valores atípicos
objetivo: Analizar cómo un valor atípico (muy alejado del resto) puede distorsionar considerablemente
  la media de un conjunto de datos.
introduccion: La media es una medida que se ve fuertemente afectada por valores extremos, a diferencia
  de otras medidas de tendencia central.
resumen: Un valor atípico (outlier) es un dato muy distinto al resto del conjunto, que al incluirse en
  el cálculo puede desplazar la media considerablemente respecto del valor 'típico' de los datos.
explicacion: '![Sensibilidad de la media a valores atípicos](/static/img/estadistica/mtcprop/mtcprop-valores-extremos.svg)


  ### Definición formal


  Como la media considera la suma de todos los valores, un solo dato muy alejado (atípico) puede desplazar
  significativamente su valor respecto de la mayoría de los datos.


  ### Desarrollo didáctico


  En el conjunto {5, 6, 6, 7}, la media es 6; pero si se agrega un valor atípico de 50, el nuevo conjunto
  {5, 6, 6, 7, 50} tiene media 14,8, muy alejada de la mayoría de los datos originales.'
procedimiento:
- 'Paso 1: Calcula la media del conjunto de datos sin el valor sospechoso de ser atípico.'
- 'Paso 2: Calcula la media incluyendo ese valor atípico.'
- 'Paso 3: Compara ambos resultados; si la diferencia es considerable, el valor atípico está afectando
  fuertemente la media.'
ejemplos:
- titulo: Comparar la media con y sin un valor atípico
  enunciado: 'Conjunto sin atípico: {5,6,6,7} (media=6). Con atípico: {5,6,6,7,50}.'
  solucion_pasos:
  - Media con atípico=(5+6+6+7+50)/5=74/5=14,8, muy distinta de la media sin ese valor (6).
- titulo: Comparar sueldos con y sin un valor atípico
  enunciado: 'Sueldos (miles): {400,420,450,430} (media=425). Se agrega un sueldo de 5000 (gerente).'
  solucion_pasos:
  - La nueva media sube considerablemente, distorsionando la representación del sueldo 'típico' del grupo.
- titulo: ¿Un solo valor atípico puede cambiar considerablemente la media de un conjunto?
  respuesta: Sí
  solucion_pasos:
  - Sí, es precisamente la sensibilidad que caracteriza a la media frente a valores extremos.
- titulo: ¿Esta sensibilidad hace que la media sea siempre inadecuada como medida de tendencia central?
  respuesta: 'No'
  solucion_pasos:
  - No necesariamente; en conjuntos sin valores atípicos, la media sigue siendo una medida muy útil y
    representativa.
errores_frecuentes:
- No verificar la presencia de valores atípicos antes de interpretar la media como representativa del
  conjunto.
- Asumir que la media siempre es la mejor medida de tendencia central, sin considerar el efecto de valores
  extremos.
- Confundir un valor atípico legítimo (un dato real, pero inusual) con un error de registro de datos.
fuente: Elaboración propia.
estado: publicado
