semantic_id: MAT.GEO.RECTA_ECUACIONES.PUNTO_PENDIENTE
titulo: Obtención de la ecuación de la recta dado un punto y la pendiente
objetivo: Obtener la ecuación de una recta conociendo un punto por el que pasa y su pendiente, usando
  la fórmula punto-pendiente.
introduccion: 'Cuando se conoce un punto de la recta y su inclinación (pendiente), no es necesario conocer
  el coeficiente de posición para escribir su ecuación: existe una fórmula directa.'
resumen: La ecuación de una recta que pasa por el punto $(x_1,y_1)$ con pendiente $m$ es $y-y_1=m(x-x_1)$.
explicacion: '![Ecuación punto-pendiente](/static/img/geometria/analitica/rectaeq-punto-pendiente.svg)


  ### Definición formal


  Si una recta tiene pendiente $m$ y pasa por el punto $(x_1,y_1)$, su ecuación es $y-y_1=m(x-x_1)$, que
  luego puede simplificarse a la forma principal.


  ### Desarrollo didáctico


  Para una recta con pendiente $m=2$ que pasa por $(2,2)$: $y-2=2(x-2)$, que al simplificar da $y=2x-2$.'
procedimiento:
- 'Paso 1: Identifica el punto (x1,y1) y la pendiente m dados.'
- 'Paso 2: Sustituye esos valores en la fórmula y-y1=m(x-x1).'
- 'Paso 3: Simplifica la ecuación para obtener la forma principal si se requiere.'
ejemplos:
- titulo: Obtener la ecuación con punto (2,2) y pendiente 2
  enunciado: Punto (2,2), m=2.
  solucion_pasos:
  - y-2=2(x-2) → y=2x-2.
- titulo: Obtener la ecuación con punto (-1,3) y pendiente -1
  enunciado: Punto (-1,3), m=-1.
  solucion_pasos:
  - y-3=-1(x-(-1))=-1(x+1) → y=-x+2.
- titulo: ¿Se necesita conocer b para usar esta fórmula?
  respuesta: 'No'
  solucion_pasos:
  - 'No, esa es justamente su ventaja: basta con un punto y la pendiente.'
- titulo: ¿El resultado final puede escribirse en forma principal?
  respuesta: Sí
  solucion_pasos:
  - Sí, simplificando la ecuación punto-pendiente se obtiene la forma y=mx+b.
errores_frecuentes:
- Invertir el orden de la resta en la fórmula, usando (x1-x) en vez de (x-x1).
- Confundir las coordenadas del punto (x1,y1) al sustituirlas en la fórmula.
- Olvidar distribuir correctamente el signo al simplificar la ecuación.
fuente: 'Elaboración propia (referencia: Carreño 167).'
estado: publicado
