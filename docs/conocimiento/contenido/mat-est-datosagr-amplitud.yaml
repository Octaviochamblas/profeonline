semantic_id: MAT.EST.DATOS_AGRUPADOS.AMPLITUD
titulo: Calcular la amplitud de un intervalo de clase
objetivo: Calcular la amplitud (o ancho) de un intervalo de clase como la diferencia entre su límite superior
  y su límite inferior.
introduccion: La amplitud determina qué tan 'ancho' es cada intervalo, afectando el nivel de detalle de
  la agrupación de datos.
resumen: 'La amplitud de un intervalo es la diferencia entre su límite superior y su límite inferior:
  $A=LS-LI$.'
explicacion: '![Cálculo de la amplitud de un intervalo](/static/img/estadistica/datosagr/datosagr-amplitud.svg)


  ### Definición formal


  $A=LS-LI$, donde $LS$ es el límite superior y $LI$ el límite inferior del intervalo.


  ### Desarrollo didáctico


  En el intervalo [10-20), la amplitud es $A=20-10=10$; en el intervalo [150-160), la amplitud también
  es $A=160-150=10$.'
procedimiento:
- 'Paso 1: Identifica el límite inferior (LI) y el límite superior (LS) del intervalo.'
- 'Paso 2: Calcula la diferencia LS-LI.'
- 'Paso 3: Ese resultado es la amplitud del intervalo.'
ejemplos:
- titulo: Calcular la amplitud del intervalo [10-20)
  enunciado: LI=10, LS=20.
  solucion_pasos:
  - A=20-10=10.
- titulo: Calcular la amplitud del intervalo [45-60)
  enunciado: LI=45, LS=60.
  solucion_pasos:
  - A=60-45=15.
- titulo: ¿Todos los intervalos de una tabla deben tener necesariamente la misma amplitud?
  respuesta: 'No'
  solucion_pasos:
  - No, aunque es común usar amplitud constante por simplicidad, es posible usar amplitudes distintas
    según el contexto.
- titulo: ¿La amplitud siempre es un valor positivo?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que el límite superior siempre es mayor que el límite inferior en un intervalo bien definido.
errores_frecuentes:
- Calcular la amplitud en el orden incorrecto (LI-LS en vez de LS-LI), obteniendo un valor negativo.
- Asumir que todos los intervalos de una tabla siempre tienen la misma amplitud sin verificarlo.
- Confundir la amplitud del intervalo con la marca de clase (que es un concepto distinto).
fuente: 'Elaboración propia (referencia: Moraleja 351, 143).'
estado: publicado
