semantic_id: MAT.EST.NORMAL_BASE.SIMETRIA_CURVA
titulo: Reconocer la simetría de la curva normal respecto de la media
objetivo: Reconocer que la curva de la distribución normal es simétrica respecto de su media.
introduccion: Si doblaras la curva normal justo por el medio, donde está la media, las dos mitades calzarían
  perfectamente una sobre la otra.
resumen: La curva normal es simétrica respecto de su media, lo que significa que ambos lados de la curva son
  reflejos exactos uno del otro.
explicacion: '![Simetría de la curva normal](/static/img/estadistica/normbase/normbase-simetria-curva.svg)


  ### Definición formal


  La distribución normal es simétrica respecto de su media $\mu$: para cualquier valor $d$, se cumple que

  $f(\mu-d)=f(\mu+d)$.


  ### Desarrollo didáctico


  Esta simetría implica que la mitad del área bajo la curva está a la izquierda de la media y la otra mitad a la

  derecha, cada una con un 50% de la probabilidad total.'
procedimiento:
- 'Paso 1: Ubica la media $\mu$ en el centro de la curva.'
- 'Paso 2: Observa que los valores equidistantes de la media tienen la misma altura en la curva.'
- 'Paso 3: Concluye que ambas mitades de la curva contienen la misma área (50% cada una).'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si la media de una distribución normal es 100, ¿qué se puede decir de los valores 90 y 110?
  solucion_pasos:
  - Ambos están a la misma distancia de la media (10 unidades).
  - Por simetría, tienen la misma altura en la curva de densidad.
- titulo: Ejemplo 2
  enunciado: ¿Qué porcentaje del área bajo la curva normal está a la derecha de la media?
  solucion_pasos:
  - El 50% del área, debido a la simetría de la curva respecto de la media.
- titulo: ¿La curva normal es simétrica respecto de su media?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una de sus propiedades fundamentales.
- titulo: ¿El área a la izquierda de la media es distinta del área a la derecha en una distribución normal?
  respuesta: 'No'
  solucion_pasos:
  - 'No, ambas áreas son iguales, cada una con el 50% del total.'
errores_frecuentes:
- Creer que la curva normal puede ser asimétrica en algunos casos.
- Confundir simetría respecto de la media con simetría respecto de cualquier otro punto.
- Pensar que valores equidistantes de la media tienen distinta probabilidad asociada.
- Olvidar que la simetría implica que ambas mitades del área son iguales.
- Confundir la media con la moda al analizar la simetría de la curva.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
