semantic_id: MAT.GEO.TRIANGULOS_RECTANGULOS.IDENTIFICACION_ROTADO
titulo: Identificación de catetos e hipotenusa en triángulos rectángulos rotados
objetivo: Identificar correctamente catetos e hipotenusa en un triángulo rectángulo dibujado en cualquier
  orientación, no solo con el ángulo recto abajo.
introduccion: Las definiciones de cateto e hipotenusa dependen únicamente del ángulo recto, no de cómo
  esté orientado o rotado el dibujo del triángulo en la hoja.
resumen: En cualquier triángulo rectángulo, sin importar su orientación en el dibujo, los catetos son
  los lados que forman el ángulo recto, y la hipotenusa es el lado opuesto a él.
explicacion: '![Triángulo rectángulo rotado](/static/img/geometria/triangulos/triangulos-rectangulos-identificacion-rotado.svg)


  ### Definición formal


  La identificación de catetos e hipotenusa depende exclusivamente de la ubicación del ángulo recto, y
  es independiente de la orientación (rotación) del triángulo en el plano.


  ### Desarrollo didáctico


  Aunque un triángulo rectángulo se dibuje inclinado, con el ángulo recto arriba o a un costado, el procedimiento
  no cambia: se localiza el ángulo de 90° y se identifican, a partir de él, los catetos (los lados que
  lo forman) y la hipotenusa (el lado opuesto).'
procedimiento:
- 'Paso 1: Ignora la orientación visual del triángulo en el dibujo.'
- 'Paso 2: Localiza el ángulo recto, sin importar en qué posición esté.'
- 'Paso 3: A partir de ese ángulo, identifica catetos (los que lo forman) e hipotenusa (el opuesto).'
ejemplos:
- titulo: Identificar en un triángulo rotado
  enunciado: Un triángulo rectángulo está dibujado con el ángulo recto en la parte superior.
  solucion_pasos:
  - Los catetos siguen siendo los dos lados que forman ese ángulo recto, sin importar su posición en el
    dibujo.
- titulo: Triángulo inclinado
  enunciado: Un triángulo rectángulo aparece dibujado en diagonal, sin ningún lado horizontal.
  solucion_pasos:
  - Se localiza igualmente el ángulo de 90° y se identifican catetos e hipotenusa a partir de él.
- titulo: ¿La orientación del dibujo cambia cuál lado es la hipotenusa?
  respuesta: 'No'
  solucion_pasos:
  - No, la hipotenusa depende solo de la posición del ángulo recto, no de la orientación del dibujo.
- titulo: ¿Es necesario que el ángulo recto esté abajo para identificarlo con facilidad?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con medir o verificar cuál ángulo mide 90°, en cualquier posición.
errores_frecuentes:
- Suponer que la hipotenusa siempre es el lado dibujado en diagonal.
- Creer que los catetos deben ser siempre horizontal y vertical en el dibujo.
- Dejarse confundir por la orientación en vez de buscar el ángulo recto real.
fuente: Elaboración propia.
estado: publicado
