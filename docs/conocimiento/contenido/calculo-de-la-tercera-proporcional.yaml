semantic_id: MAT.NUM.PROPORCIONES.TERCERA_PROPORCIONAL
titulo: Cálculo de la tercera proporcional
objetivo: Calcular la tercera proporcional en una proporción continua.
introduccion: Si en una proporción los términos medios son idénticos, solo necesitas conocer dos números
  distintos para descubrir el tercero. Ese 'tercer' número que falta en la ecuación se llama tercera proporcional.
resumen: 'La tercera proporcional es el término extremo que falta en una proporción continua: $a/b = b/x$.
  Se calcula como $x = b^2 / a$.'
explicacion: 'Cuando tenemos una proporción continua (medios iguales) de la forma $a:b = b:x$, llamamos
  a $x$ la **tercera proporcional** entre $a$ y $b$ (o $b$ y $a$, dependiendo del orden).


  Para hallar su valor, aplicamos producto cruzado: $a \cdot x = b \cdot b$, lo que significa que $ax
  = b^2$. Despejando, nos queda $x = \frac{b^2}{a}$.'
procedimiento:
- 'Paso 1: Identifica el término que no se repite ($a$) y el que se repite en los medios ($b$).'
- 'Paso 2: Eleva al cuadrado el término repetido ($b^2$).'
- 'Paso 3: Divide el resultado por el término no repetido ($a$).'
ejemplos:
- titulo: Cálculo directo
  enunciado: Halla la tercera proporcional entre 4 y 6.
  solucion_pasos:
  - 'Planteamos la proporción continua: $4/6 = 6/x$.'
  - 'Multiplicamos los medios: $6 \cdot 6 = 36$.'
  - 'Dividimos por 4: $36 / 4 = 9$. La tercera proporcional es 9.'
- titulo: ¿El orden importa?
  respuesta: Sí
  solucion_pasos:
  - La tercera proporcional entre 6 y 4 sería $x$ en $6/4 = 4/x$, lo que da $x = 16/6 = 8/3$. Es distinta
    a la de 4 y 6.
errores_frecuentes:
- Confundirla con la cuarta proporcional.
- Confundirla con la media proporcional (no sacar la raíz o sacar raíz cuando no corresponde).
- 'No respetar el orden de los datos: elevar al cuadrado el número incorrecto.'
- Sumar en lugar de multiplicar los medios.
- Simplificar erróneamente antes de armar la proporción.
fuente: Currículum Nacional MINEDUC.
estado: publicado
