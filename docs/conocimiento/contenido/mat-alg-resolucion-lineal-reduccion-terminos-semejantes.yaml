semantic_id: MAT.ALG.RESOLUCION_LINEAL.REDUCCION_TERMINOS_SEMEJANTES
titulo: Reducción de Términos Semejantes
objetivo: Agrupar y sumar los términos con la misma incógnita para simplificar una ecuación antes de despejar.
introduccion: Una ecuación puede parecer intimidante si tiene las 'x' y los números esparcidos por todas partes,
  como juguetes tirados en el suelo. El primer paso siempre es ordenar y juntar los juguetes que son iguales.
resumen: Antes de empezar a transponer o despejar, siempre se deben sumar o restar entre sí (reducir) aquellos términos
  que son semejantes (tienen la misma letra) dentro de un mismo miembro.
explicacion: '### Definición formal


  Términos semejantes son aquellos con idéntica parte literal. Reducirlos es sumarlos/restarlos.


  ### Desarrollo didáctico


  Piensa en las ''x'' como manzanas y los números sueltos como monedas. No puedes sumar manzanas con monedas.


  Ejemplo: $4x + 2 + 3x - 5 = 11$


  Si miras el lado izquierdo, es un desorden. No empieces a despejar aún. Primero, ordena la casa.


  1. **Agrupa las manzanas (términos con x):** $4x + 3x = 7x$.

  2. **Agrupa las monedas (números):** $+2 - 5 = -3$.


  Reescribe la ecuación limpia: $7x - 3 = 11$.


  Ahora sí, puedes despejar:

  - Pasas el $-3$ sumando: $7x = 11 + 3 \rightarrow 7x = 14$.

  - Pasas el $7$ dividiendo: $x = \frac{14}{7} \rightarrow x = 2$.


  Reducir términos semejantes es como ''barrer'' la ecuación para que quede en su versión más simple.'
procedimiento:
- 'Paso 1: Observa un solo miembro de la ecuación a la vez.'
- 'Paso 2: Suma o resta todos los términos que tengan la misma incógnita.'
- 'Paso 3: Suma o resta todos los números independientes.'
- 'Paso 4: Escribe la nueva ecuación simplificada y luego comienza a despejar.'
- Términos semejantes son aquellos con idéntica parte literal. Reducirlos es sumarlos/restarlos.
ejemplos:
- titulo: 'Simplifica y resuelve: $2x - x + 4 + x - 1 = 9$'
  enunciado: 'Simplifica y resuelve: $2x - x + 4 + x - 1 = 9$'
  solucion_pasos:
  - 'Reducimos las x: $2x - 1x + 1x = 2x$.'
  - 'Reducimos los números: $4 - 1 = 3$.'
  - 'La ecuación queda: $2x + 3 = 9$.'
  - 'Despejamos: $2x = 9 - 3 \rightarrow 2x = 6$.'
  - 'Final: $x = 3$.'
- titulo: Resuelve $5x - 3x + 10 = 20$
  solucion_pasos:
  - 'Reducimos: 2x + 10 = 20.'
  - 'Pasamos el 10: 2x = 10.'
  - 'Dividimos: x = 5.'
- titulo: 'Respecto de «Resolución con reducción de términos semejantes»: ¿Describe adecuadamente el co'
  enunciado: 'Respecto de «Resolución con reducción de términos semejantes»: ¿Describe adecuadamente el concepto
    esta frase? «Antes de empezar a transponer o despejar, siempre se deben sumar o restar entre sí (reducir) aquellos
    términos que son semejantes (tienen la misma letra) dentro de un mismo miembro»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Antes de empezar a transponer o despejar, siempre se deben
    sumar o restar entre sí (reducir) aquellos términos que son semejantes (tienen la misma letra) dentro de un
    mismo miembro.'
- titulo: 'Respecto de «Resolución con reducción de términos semejantes»: ¿Se puede aceptar esta afirma'
  enunciado: 'Respecto de «Resolución con reducción de términos semejantes»: ¿Se puede aceptar esta afirmación?
    «Sumar una ''x'' con un número independiente (ej: creer que $3x + 2 = 5x$). ¡Grave error algebraico!»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Antes de empezar a transponer o despejar, siempre se deben
    sumar o restar entre sí (reducir) aquellos términos que son semejantes (tienen la misma letra) dentro de un
    mismo miembro.'
errores_frecuentes:
- 'Sumar una ''x'' con un número independiente (ej: creer que $3x + 2 = 5x$). ¡Grave error algebraico!'
- 'Olvidar los signos al agrupar (ej: $4x - 5x$ ponerlo como $x$ positivo en vez de $-x$).'
- Transposición de miembros.
- Racionalización.
- Factorización por agrupación.
