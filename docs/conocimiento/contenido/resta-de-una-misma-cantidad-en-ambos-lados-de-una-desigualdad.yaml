semantic_id: MAT.ALG.DESIG_PROPIEDADES.RESTA_MISMA_CANTIDAD
titulo: Resta de una misma cantidad en ambos lados de una desigualdad
objetivo: Aplicar la propiedad de la resta de una misma cantidad a ambos lados de una desigualdad para
  mantener la relación de orden.
introduccion: Restar una cantidad en ambos lados de una desigualdad es una herramienta clave para despejar
  variables, garantizando que el orden de los valores se conserve.
resumen: Si se resta el mismo valor en ambos miembros de una desigualdad, el sentido de la desigualdad
  se mantiene inalterado.
explicacion: '### Definición formal

  Sean $a, b, c \in \mathbb{R}$. Si $a > b$, entonces $a - c > b - c$. Esta propiedad aplica de manera
  análoga para $<, \leq$ y $\geq$.


  ### Desarrollo didáctico

  Dado que la resta es matemáticamente equivalente a la suma de un número negativo, la misma lógica de
  conservación del orden se aplica cuando restamos valores.'
procedimiento:
- Identificar la desigualdad a trabajar.
- Elegir la cantidad que se desea restar.
- Restar la misma cantidad en ambos miembros.
- Simplificar la expresión sin alterar el símbolo de la desigualdad.
ejemplos:
- titulo: Aislamiento de la incógnita
  enunciado: Resuelva la inecuación $x + 4 < 10$.
  solucion_pasos:
  - 'Restar $4$ en ambos lados: $x + 4 - 4 < 10 - 4$.'
  - 'Simplificar: $x < 6$.'
- titulo: Manejo de constantes positivas
  enunciado: Resuelva $m + 7 \geq 3$.
  solucion_pasos:
  - 'Restar $7$ a ambos lados: $m + 7 - 7 \geq 3 - 7$.'
  - Simplificar obteniendo $m \geq -4$.
- titulo: ¿La expresión $8 > 5$ sigue siendo verdadera si restamos $10$ a ambos lados?
  respuesta: Sí
  solucion_pasos:
  - 'Restar $10$: $8 - 10 > 5 - 10$.'
  - 'Resultado: $-2 > -5$, lo cual es correcto.'
- titulo: ¿Se debe cambiar el símbolo de desigualdad al restar un número muy grande?
  respuesta: 'No'
  solucion_pasos:
  - El valor del número restado es irrelevante para el sentido de la desigualdad.
  - Restar siempre conserva la relación original.
errores_frecuentes:
- Restar una cantidad invierte el signo de la desigualdad.
- Solo se puede restar si el resultado final es positivo.
- Si $a \leq b$, entonces $a - c \geq b - c$.
- Restar cero afecta la relación de la desigualdad.
- Se debe restar distintas cantidades para equilibrar la desigualdad.
