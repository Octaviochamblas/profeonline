semantic_id: MAT.GEO.SIMETRAL_CIRCUNCENTRO.CIRCUNCENTRO_RECTANGULO
titulo: Ubicación del circuncentro en el punto medio de la hipotenusa de un triángulo rectángulo
objetivo: Reconocer que en un triángulo rectángulo, el circuncentro coincide exactamente con el punto
  medio de la hipotenusa.
introduccion: En un triángulo rectángulo, la hipotenusa actúa como diámetro de la circunferencia circunscrita,
  así que su centro es justamente el punto medio de la hipotenusa.
resumen: En todo triángulo rectángulo, el circuncentro coincide con el punto medio de la hipotenusa.
explicacion: '![Circuncentro en el punto medio de la hipotenusa](/static/img/geometria/elementos-secundarios/simetral-circuncentro-circuncentro-rectangulo.svg)


  ### Definición formal


  Si un triángulo ABC tiene ángulo recto en A, el circuncentro O coincide con el punto medio de BC (la
  hipotenusa), y el circunradio es la mitad de la hipotenusa.


  ### Desarrollo didáctico


  Esto se debe a que todo ángulo inscrito en una semicircunferencia es recto: si BC es diámetro de una
  circunferencia y A está sobre ella, el ángulo en A es de 90°. Por lo tanto, el círculo de diámetro BC
  es exactamente la circunferencia circunscrita del triángulo rectángulo.'
procedimiento:
- 'Paso 1: Identifica la hipotenusa del triángulo rectángulo.'
- 'Paso 2: Encuentra su punto medio.'
- 'Paso 3: Ese punto medio es el circuncentro, y la mitad de la hipotenusa es el circunradio.'
ejemplos:
- titulo: Ubicar el circuncentro en un rectángulo
  enunciado: Un triángulo rectángulo tiene hipotenusa BC de 10 cm.
  solucion_pasos:
  - El circuncentro es el punto medio de BC, y el circunradio es 10/2=5 cm.
- titulo: Explicar por qué coincide
  enunciado: ¿Por qué el circuncentro coincide con el punto medio de la hipotenusa?
  solucion_pasos:
  - Porque todo ángulo inscrito en una semicircunferencia es recto, así que el vértice del ángulo recto
    siempre está sobre la circunferencia de diámetro igual a la hipotenusa.
- titulo: ¿El circunradio es la mitad de la hipotenusa en un rectángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque la hipotenusa actúa como diámetro de la circunferencia circunscrita.
- titulo: ¿Esta propiedad aplica a cualquier triángulo, no solo al rectángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, es una propiedad exclusiva de los triángulos rectángulos.
errores_frecuentes:
- Aplicar esta propiedad a triángulos que no son rectángulos.
- Confundir el circuncentro con el ortocentro (que en este caso está en el vértice recto).
- Olvidar que el circunradio es la mitad (no la totalidad) de la hipotenusa.
fuente: Elaboración propia.
estado: publicado
