semantic_id: MAT.FUND.CONJUNTOS_BASICOS.CONJUNTO_FINITO
titulo: Conjunto finito
objetivo: Identificar y definir un conjunto finito determinando si la cantidad de sus elementos se puede
  contar por completo.
introduccion: 'Imagina que abres tu estuche de lápices. Dentro de él hay lápices de colores, una goma
  y un sacapuntas. Si los sacas todos y los cuentas, tarde o temprano terminarás de contarlos porque hay
  una cantidad limitada de objetos.


  En matemáticas, cuando un grupo o conjunto de cosas tiene una cantidad de elementos que podemos terminar
  de contar, lo llamamos un conjunto finito. No importa si son 5 lápices, los alumnos de tu curso, o todos
  los granos de arena de una playa pequeña; si el conteo tiene un fin, el conjunto es finito.


  Este concepto te ayudará a entender la diferencia entre las cosas que podemos contar por completo en
  el mundo real y aquellas que continúan para siempre sin terminar jamás.'
resumen: 'Un conjunto finito es aquel que tiene una cantidad limitada de elementos, lo que significa que
  el proceso de contar sus miembros tiene un final. Su cardinalidad (el número total de elementos) es
  un número entero no negativo.

  '
explicacion: 'Un **conjunto finito** es un conjunto que tiene un número limitado de elementos. Formalmente,
  un conjunto $A$ es finito si existe una correspondencia biyectiva entre $A$ y un conjunto de la forma
  $\{1, 2, 3, \dots, n\}$ para algún número natural $n$, o si el conjunto es vacío ($n = 0$).


  La cantidad de elementos de un conjunto finito se llama **cardinalidad** y se denota por $|A|$ o $n(A)$.
  En el caso de los conjuntos finitos, la cardinalidad es siempre un número entero no negativo ($|A| \in
  \mathbb{N}_0$).


  **Ejemplos de conjuntos finitos:**

  * El conjunto de las vocales: $V = \{a, e, i, o, u\}$, donde la cardinalidad es $|V| = 5$.

  * El conjunto vacío: $\emptyset = \{\}$, cuya cardinalidad es $|\emptyset| = 0$.

  * El conjunto de estudiantes en un colegio: aunque sea un número grande (por ejemplo, $1200$), sigue
  siendo un valor determinado y contable.

  * El conjunto de los números enteros mayores que $1$ y menores que $10$: $M = \{2, 3, 4, 5, 6, 7, 8,
  9\}$, con $|M| = 8$.


  Es importante notar que un conjunto puede tener muchísimos elementos (como el número de estrellas en
  nuestra galaxia) y seguir siendo finito, ya que ese número, por inmenso que sea, no es infinito; tiene
  un límite definido.'
procedimiento:
- 'Paso 1: Identifica o lista todos los elementos del conjunto en cuestión.'
- 'Paso 2: Comienza a contar sus elementos uno por uno.'
- 'Paso 3: Determina si el proceso de conteo llega a un fin. Si logras terminar de contar todos los elementos
  obteniendo un número entero no negativo, el conjunto es finito. Si el conteo nunca termina, no lo es.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determina si el conjunto de los días de la semana, $D = \{ \text{lunes, martes, miércoles,
    jueves, viernes, sábado, domingo} \}$, es un conjunto finito.
  solucion_pasos:
  - 'Paso a: Enumeramos los elementos del conjunto $D$. Estos son los 7 días de la semana.'
  - 'Paso b: Contamos los elementos: lunes (1), martes (2), miércoles (3), jueves (4), viernes (5), sábado
    (6), domingo (7).'
  - 'Paso c: Como el conteo termina en el número 7, el conjunto $D$ es finito y su cardinalidad es $|D|
    = 7$.'
- titulo: Ejemplo 2
  enunciado: 'Analiza si el conjunto de los números divisores de 12, es decir, $D_{12} = \{x \in \mathbb{N}
    : x \text{ divide a } 12\}$, es finito.'
  solucion_pasos:
  - 'Paso a: Encontramos los divisores positivos de 12. Estos son: 1, 2, 3, 4, 6 y 12.'
  - 'Paso b: Escribimos el conjunto por extensión: $D_{12} = \{1, 2, 3, 4, 6, 12\}$.'
  - 'Paso c: Contamos los elementos y vemos que son 6 en total. Como el proceso de conteo tiene un fin,
    concluimos que $D_{12}$ es un conjunto finito con cardinalidad $|D_{12}| = 6$.'
- titulo: ¿Es el conjunto vacío $\\emptyset = \\{\\}$ un conjunto finito?
  respuesta: Sí
  solucion_pasos:
  - Un conjunto es finito si podemos contar sus elementos y el resultado es un número entero no negativo.
  - El conjunto vacío no tiene elementos, por lo tanto, el número total de sus elementos es 0.
  - Como el 0 es un número entero no negativo y representa el fin del conteo (ya no hay nada más que contar),
    el conjunto vacío es finito.
- titulo: ¿Es el conjunto de todos los granos de arena de la Tierra un conjunto infinito?
  respuesta: 'No'
  solucion_pasos:
  - Aunque la cantidad de granos de arena de la Tierra es un número astronómicamente grande y prácticamente
    imposible de contar a mano, la Tierra tiene un tamaño y volumen limitado.
  - Por lo tanto, existe un número máximo real y limitado de granos de arena en nuestro planeta.
  - Al ser una cantidad limitada que no crece sin parar hacia el infinito, el conjunto es finito.
errores_frecuentes:
- Confundir un conjunto con muchos elementos con un conjunto infinito. Si es contable aunque sea muy grande,
  es finito.
- Pensar que el conjunto vacío no es finito porque no contiene ningún elemento. Su cardinalidad es 0,
  lo que lo hace finito.
- Creer que si un conjunto se define mediante una fórmula matemática siempre debe ser infinito.
- Suponer que si no conocemos el número exacto de elementos de un conjunto real, este debe ser infinito.
- Confundir la finitud del conjunto con el tamaño físico de sus elementos.
fuente: Álgebra y Fundamentos, Universidad de Chile
estado: publicado
