semantic_id: MAT.ALG.FUNC_TRIG_MODELO.AJUSTE_MODELO
titulo: Ajuste completo de un modelo trigonométrico a datos de contexto
objetivo: Construir el modelo completo $f(t)=a\sin(b(t-c))+d$ o $f(t)=a\cos(b(t-c))+d$ combinando todos los
  parámetros a partir de datos observados.
introduccion: Con la amplitud, el periodo y la línea media ya calculados por separado, el último paso es
  combinarlos con el desfase correcto para obtener el modelo completo.
resumen: El **ajuste completo** de un modelo trigonométrico requiere calcular en conjunto la amplitud, el
  periodo (para obtener $b$), la línea media, y el desfase necesario para que el modelo coincida con el
  comportamiento observado en el instante de referencia.
explicacion: '### Definición formal


  Dado un conjunto de datos con máximo $M$, mínimo $m$, periodo $T$ y el instante donde ocurre un máximo o
  mínimo conocido, se calcula: $a=(M-m)/2$, $d=(M+m)/2$, $b=2\pi/T$, y se elige seno o coseno según el
  comportamiento inicial, ajustando $c$ para que el modelo coincida con los datos.


  ### Desarrollo didáctico


  Si la temperatura máxima ($28°$C) ocurre a las $15$ horas, mínima ($12°$C) a las $3$ horas, y el ciclo dura
  $24$ horas: $a=8$, $d=20$, $b=2\pi/24=\pi/12$. Como el máximo ocurre en $t=15$ (no en $t=0$), se usa coseno
  con desfase $c=15$: $T(t)=8\cos(\pi(t-15)/12)+20$.'
procedimiento:
- 'Paso 1: Calcula la amplitud y la línea media a partir del máximo y el mínimo.'
- 'Paso 2: Calcula $b$ a partir del periodo observado.'
- 'Paso 3: Elige seno o coseno según el comportamiento en el instante de referencia, y ajusta el desfase $c$.'
ejemplos:
- titulo: Ajuste completo con datos de marea
  enunciado: 'La marea alcanza su máximo de $2$ m a las $6$ horas, y su mínimo de $0$ m a las $0$ horas, con
    periodo $12$ horas. Construye el modelo.'
  solucion_pasos:
  - 'Se calcula $a=(2-0)/2=1$, $d=(2+0)/2=1$, $b=2\pi/12=\pi/6$.'
  - 'Como el máximo ocurre en $t=6$, se usa $h(t)=\cos(\pi(t-6)/6)+1$.'
- titulo: Verificación del modelo construido
  enunciado: 'Verifica que el modelo del ejemplo anterior da $h(0)=0$.'
  solucion_pasos:
  - 'Se evalúa: $h(0)=\cos(\pi(0-6)/6)+1=\cos(-\pi)+1=-1+1=0$.'
  - Se confirma que el modelo coincide con el dato observado.
- titulo: ¿Es necesario verificar el modelo construido con los datos originales?
  enunciado: ¿Se debe verificar el modelo construido evaluándolo en los puntos de datos conocidos?
  respuesta: Sí
  solucion_pasos:
  - Es un paso de control necesario para confirmar que el ajuste fue correcto.
- titulo: ¿Existe una única forma correcta de escribir un modelo ajustado?
  enunciado: ¿Existe una única expresión algebraica correcta para modelar un fenómeno periódico dado?
  respuesta: 'No'
  solucion_pasos:
  - Pueden existir varias formas equivalentes, usando seno o coseno con distintos desfases, que representan el mismo fenómeno.
errores_frecuentes:
- No verificar el modelo construido evaluándolo en los datos originales.
- Elegir mal entre seno y coseno según el comportamiento inicial del fenómeno.
- Calcular incorrectamente alguno de los cuatro parámetros por separado.
- Olvidar ajustar el signo de $a$ si el fenómeno comienza en su mínimo en vez de su máximo.
