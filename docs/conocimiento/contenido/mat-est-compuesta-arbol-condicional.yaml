semantic_id: MAT.EST.PROBA_COMPUESTA_CONDICIONAL.ARBOL_CONDICIONAL
titulo: Construcción de diagramas de árbol para representar probabilidades condicionadas
objetivo: Construir un diagrama de árbol donde las ramas de un segundo nivel representan probabilidades
  condicionadas al resultado del primer nivel.
introduccion: Cuando la probabilidad de una etapa depende del resultado de la etapa anterior, el diagrama
  de árbol debe reflejar esa dependencia usando probabilidades condicionales distintas en cada rama.
resumen: En un diagrama de árbol con dependencia, cada rama del segundo nivel representa una probabilidad
  condicionada al resultado de la rama del primer nivel de la que proviene.
explicacion: '![Diagrama de árbol con probabilidades condicionadas](/static/img/probabilidad/compuesta/compuesta-arbol-condicional.svg)


  ### Definición formal


  Si el primer nivel representa el evento $B_i$ con probabilidad $P(B_i)$, las ramas del segundo nivel
  que parten de $B_i$ representan $P(A|B_i)$, la probabilidad condicionada específicamente a ese resultado.


  ### Desarrollo didáctico


  Una fábrica tiene dos máquinas: A (60% de la producción, 5% de piezas defectuosas) y B (40% de la producción,
  10% de piezas defectuosas). El árbol tiene dos ramas en el primer nivel (máquina A o B) y, desde cada
  una, dos ramas en el segundo nivel (defectuosa o buena), con probabilidades distintas según la máquina.'
procedimiento:
- 'Paso 1: Identifica el evento del primer nivel (la condición) y sus probabilidades.'
- 'Paso 2: Para cada rama del primer nivel, identifica las probabilidades condicionadas específicas del
  segundo nivel.'
- 'Paso 3: Dibuja el árbol completo, etiquetando cada rama del segundo nivel con su probabilidad condicional
  correspondiente (que puede diferir entre ramas del primer nivel).'
ejemplos:
- titulo: Construir el árbol de las dos máquinas
  enunciado: 'Máquina A: 60%, 5% defectuosas. Máquina B: 40%, 10% defectuosas.'
  solucion_pasos:
  - 'El árbol tiene dos ramas iniciales (A: 0,6, B: 0,4), y desde cada una, dos ramas (defectuosa/buena)
    con probabilidades 0,05/0,95 para A y 0,1/0,9 para B.'
- titulo: Identificar por qué las ramas del segundo nivel son distintas entre A y B
  enunciado: Las tasas de defectos son distintas en cada máquina.
  solucion_pasos:
  - Como cada máquina tiene su propia tasa de defectos, las probabilidades condicionadas del segundo nivel
    dependen de cuál máquina se está considerando.
- titulo: ¿Las ramas del segundo nivel representan probabilidades condicionales?
  respuesta: Sí
  solucion_pasos:
  - Sí, están condicionadas al resultado de la rama correspondiente del primer nivel.
- titulo: ¿Pueden ser iguales las probabilidades condicionadas en ambas ramas del primer nivel?
  respuesta: Sí
  solucion_pasos:
  - Sí, eso ocurriría si el segundo evento fuera independiente del primero; en ese caso especial, ambas
    ramas del segundo nivel serían idénticas.
errores_frecuentes:
- Usar las mismas probabilidades en el segundo nivel para todas las ramas del primer nivel, ignorando
  la dependencia real.
- Confundir las probabilidades del primer nivel con las condicionadas del segundo nivel.
- Olvidar que cada camino completo del árbol requiere multiplicar la probabilidad del primer nivel por
  la condicional correspondiente del segundo.
fuente: 'Elaboración propia (referencia: Moraleja 405).'
estado: publicado
