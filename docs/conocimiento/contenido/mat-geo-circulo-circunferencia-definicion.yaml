semantic_id: MAT.GEO.CIRCULO_ELEMENTOS.CIRCUNFERENCIA_DEFINICION
titulo: Definición de circunferencia como línea curva cerrada formada por puntos equidistantes de un centro
objetivo: Comprender la circunferencia como el conjunto de todos los puntos de un plano que están a la
  misma distancia de un punto fijo llamado centro.
introduccion: Antes de estudiar sus propiedades y elementos, es fundamental comprender qué es exactamente
  una circunferencia desde un punto de vista matemático preciso.
resumen: Una circunferencia es una línea curva cerrada formada por todos los puntos de un plano que están
  a igual distancia de un punto fijo llamado centro.
explicacion: '![Circunferencia: puntos equidistantes del centro](/static/img/geometria/circunferencia-circulo/circulo-circunferencia-definicion.svg)


  ### Definición formal


  Dado un punto $O$ (centro) y una distancia $r$ (radio), la circunferencia es el conjunto de puntos $P$
  del plano tales que $\overline{OP}=r$.


  ### Desarrollo didáctico


  La circunferencia es solo la LÍNEA (el borde), no la región interior; esto la distingue del círculo,
  que sí incluye la región interior. Es la misma diferencia entre el borde de una moneda y la moneda completa.'
procedimiento:
- 'Paso 1: Identifica el punto fijo llamado centro.'
- 'Paso 2: Identifica la distancia constante llamada radio.'
- 'Paso 3: La circunferencia es el conjunto de todos los puntos que están exactamente a esa distancia
  del centro.'
ejemplos:
- titulo: Identificar una circunferencia
  enunciado: Se dibuja una línea curva cerrada donde todos los puntos están a 5 cm de un punto central.
  solucion_pasos:
  - Es una circunferencia de radio 5 cm.
- titulo: Distinguir circunferencia de otras curvas
  enunciado: Una línea curva cerrada tiene puntos a distancias variables de un punto central.
  solucion_pasos:
  - No es una circunferencia (podría ser una elipse u otra curva), ya que la distancia al centro no es
    constante.
- titulo: ¿La circunferencia incluye su región interior?
  respuesta: 'No'
  solucion_pasos:
  - No, la circunferencia es solo la línea curva (el borde); la región interior forma parte del círculo.
- titulo: ¿Todos los puntos de una circunferencia están a la misma distancia del centro?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición que define exactamente a la circunferencia.
errores_frecuentes:
- Confundir la circunferencia (la línea) con el círculo (la región completa, incluyendo el interior).
- Creer que cualquier curva cerrada es una circunferencia, sin verificar la equidistancia al centro.
- Olvidar que la distancia al centro (radio) debe ser exactamente constante, no solo aproximada.
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
