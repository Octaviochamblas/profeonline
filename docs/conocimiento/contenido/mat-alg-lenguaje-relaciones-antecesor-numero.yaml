semantic_id: MAT.ALG.LENGUAJE_RELACIONES.ANTECESOR_NUMERO
objetivo: Traducir el concepto de antecesor de un número entero.
introduccion: En la fila del supermercado, la persona que está justo delante de ti es tu antecesor. En la recta
  numérica de los números enteros, ocurre exactamente lo mismo.
resumen: El **Antecesor** de un número entero se traduce algebraicamente restando una unidad a dicho número. Si
  el número es $x$, su antecesor es **$x - 1$**.
explicacion: '### Definición formal


  El antecesor es el número que está inmediatamente a la izquierda en la recta entera, lo cual siempre se calcula
  restando 1.


  ### Desarrollo didáctico


  Esta regla aplica para cualquier número entero, independientemente de si es positivo, negativo o cero.

  - El antecesor de $5$ es $5 - 1 = 4$.

  - El antecesor de $0$ es $0 - 1 = -1$.

  - El antecesor de $x$ es $x - 1$.

  - El antecesor del doble de un número ($2x$) es $2x - 1$.


  Es fundamental usar paréntesis cuando el antecesor se va a multiplicar. Por ejemplo, ''el triple del antecesor
  de x'' se escribe $3(x - 1)$. Si no pones paréntesis y escribes $3x - 1$, la matemática entenderá ''el antecesor
  del triple de x''.'
procedimiento:
- 'Paso 1: Identifica a quién se le está calculando el antecesor.'
- 'Paso 2: Escribe esa variable (o expresión).'
- 'Paso 3: Réstale 1.'
- 'Paso 4: Si toda esta nueva expresión (x-1) va a sufrir alguna otra operación (multiplicarse o dividirse), enciérrala
  entre paréntesis.'
- El antecesor es el número que está inmediatamente a la izquierda en la recta entera, lo cual siempre se calcula
  restando 1.
ejemplos:
- titulo: Protegiendo al antecesor
  enunciado: 'Traduce: ''La mitad del antecesor de un número''.'
  solucion_pasos:
  - El antecesor del número es (x - 1).
  - Se pide la mitad de esa cantidad completa.
  - 'Traducción: (x - 1) / 2.'
- titulo: 'Un juego de acertijos computacionales pide al usuario: ''Ingresa un número entero $N$. La máq'
  enunciado: 'Un juego de acertijos computacionales pide al usuario: ''Ingresa un número entero $N$. La máquina
    calculará el cuadrado del antecesor de tu número''. ¿Qué expresión algebraica evalúa internamente la máquina?
    (v1)


    Opciones: A) $(N - 1)^2$ · B) $N^2 - 1$ · C) $N - 1^2$ · D) $2(N - 1)$'
  solucion_pasos:
  - 'Primero hallamos el antecesor, que es $(N-1)$. Luego, le aplicamos el cuadrado a toda esa entidad, requiriendo
    paréntesis: $(N - 1)^2$. La opción B sería ''el antecesor del cuadrado''.'
- titulo: 'Respecto de «Representación del antecesor de un número»: ¿Es correcta esta caracterización?'
  enunciado: 'Respecto de «Representación del antecesor de un número»: ¿Es correcta esta caracterización? «El **Antecesor**
    de un número entero se traduce algebraicamente restando una unidad a dicho número»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Antecesor** de un número entero se traduce algebraicamente
    restando una unidad a dicho número.'
- titulo: 'Respecto de «Representación del antecesor de un número»: ¿Es válida esta afirmación? «Olvida'
  enunciado: 'Respecto de «Representación del antecesor de un número»: ¿Es válida esta afirmación? «Olvidar los
    paréntesis. Traducir ''el doble del antecesor'' como $2x - 1$ en lugar de $2(x - 1)$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Antecesor** de un número entero se traduce algebraicamente
    restando una unidad a dicho número.'
errores_frecuentes:
- Olvidar los paréntesis. Traducir 'el doble del antecesor' como $2x - 1$ en lugar de $2(x - 1)$.
- Confundir antecesor con número negativo (ej. pensar que el antecesor de $x$ es $-x$).
- La división por dos ($x/2$).
- La multiplicación por menos uno ($-x$).
- La adición de la unidad ($x + 1$).
fuente: Álgebra de Baldor.
estado: publicado
titulo: Representación del antecesor de un número
