semantic_id: MAT.NUM.DECIMALES_CLASIFICACION.PERIODO_IDENTIFICACION
objetivo: Identificar el período de un decimal.
introduccion: En el caso “En \(0.\overline{27}\), el período es 27” aparece identificación
  del período decimal. Lo analizaremos paso a paso para identificar el período de
  un decimal, sin depender de una regla memorizada.
resumen: El período es el bloque mínimo de cifras que se repite indefinidamente en
  un decimal periódico. Como criterio de control, para identificar el período hay
  que ubicar la parte que se repite una y otra vez
explicacion: |-
  El período es el bloque mínimo de cifras que se repite indefinidamente en un decimal periódico.

  Esta formulación se hace concreta en “En \(0.\overline{27}\), el período es 27”. Allí puede reconocerse que para identificar el período hay que ubicar la parte que se repite una y otra vez.
procedimiento:
- 'Paso 1: Descarta la parte entera y cualquier anteperíodo.'
- 'Paso 2: Localiza el bloque mínimo de cifras que se repite sin fin.'
- 'Paso 3: Comprueba que repetir solo ese bloque reconstruya la cola decimal.'
ejemplos:
- titulo: Aplicación razonada — Identificación del período decimal
  enunciado: En \(0.\overline{27}\), el período es 27.
  solucion_pasos:
  - Descarta la parte entera y cualquier anteperíodo.
  - Localiza el bloque mínimo de cifras que se repite sin fin.
  - Comprueba que repetir solo ese bloque reconstruya la cola decimal.
- titulo: Revisión de una solución — Identificación del período decimal
  enunciado: Una solución aplica “Localiza el bloque mínimo de cifras que se repite
    sin fin.”, pero termina sin comprobar que para identificar el período hay que
    ubicar la parte que se repite una y otra vez. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación del período decimal: el período
    es el bloque mínimo de cifras que se repite indefinidamente en un decimal periódico.'
  - Descarta la parte entera y cualquier anteperíodo.
  - 'Completa la revisión con este control: Comprueba que repetir solo ese bloque
    reconstruya la cola decimal.'
- titulo: ¿Se cumple que para identificar el período hay que ubicar la parte que se
    repite una y otra vez? — Identificación del período decimal
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el período es el bloque mínimo de cifras
    que se repite indefinidamente en un decimal periódico.
  - El caso “En \(0.\overline{27}\), el período es 27” satisface esa condición.
  - Comprueba que repetir solo ese bloque reconstruya la cola decimal.
- titulo: ¿Es válido omitir el paso “Descarta la parte entera y cualquier anteperíodo”?
    — Identificación del período decimal
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación del período decimal.
  - 'Omitirlo puede volver inválida la acción siguiente: Localiza el bloque mínimo
    de cifras que se repite sin fin.'
  - 'La solución debe terminar de este modo: Comprueba que repetir solo ese bloque
    reconstruya la cola decimal.'
errores_frecuentes:
- 'Empezar identificación del período decimal sin realizar este control inicial: Descarta
  la parte entera y cualquier anteperíodo.'
- Memorizar “En \(0.\overline{27}\), el período es 27” como respuesta aislada, sin
  reconstruir la definición que lo justifica.
- Convertir en receta el paso “Localiza el bloque mínimo de cifras que se repite sin
  fin.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación del período decimal que contradice
  el criterio “Para identificar el período hay que ubicar la parte que se repite una
  y otra vez”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que repetir solo
  ese bloque reconstruya la cola decimal.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
