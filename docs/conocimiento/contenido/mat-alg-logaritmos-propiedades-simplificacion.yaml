semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.SIMPLIFICACION
titulo: Simplificación combinada de expresiones logarítmicas
objetivo: Combinar las propiedades del producto, cociente, potencia y casos particulares para simplificar
  expresiones logarítmicas de varios términos.
introduccion: Las expresiones logarítmicas más complejas no se resuelven con una sola propiedad, sino aplicando
  varias en el orden adecuado, igual que al simplificar cualquier expresión algebraica.
resumen: La **simplificación combinada** consiste en aplicar sucesivamente las propiedades del producto, cociente
  y potencia (además de $\log_b(1)=0$ y $\log_b(b)=1$ cuando corresponda) hasta reducir la expresión a su forma
  más simple.
explicacion: '### Definición formal


  Dada una expresión logarítmica con varios factores, cocientes y potencias dentro de un mismo logaritmo, se
  simplifica aplicando en cualquier orden válido las propiedades $\log_b(xy)=\log_b(x)+\log_b(y)$,
  $\log_b(x/y)=\log_b(x)-\log_b(y)$ y $\log_b(x^n)=n\log_b(x)$, siempre respetando las restricciones de dominio
  de cada argumento involucrado.


  ### Desarrollo didáctico


  Para simplificar $\log_b\!\left(\dfrac{x^2y}{z}\right)$: primero se separa el cociente,
  $\log_b(x^2y)-\log_b(z)$; luego se separa el producto, $\log_b(x^2)+\log_b(y)-\log_b(z)$; finalmente se baja el
  exponente, obteniendo $2\log_b(x)+\log_b(y)-\log_b(z)$.'
procedimiento:
- 'Paso 1: Identifica todas las operaciones (producto, cociente, potencia) presentes dentro del argumento.'
- 'Paso 2: Aplica primero la propiedad del cociente si existe una división principal.'
- 'Paso 3: Aplica la propiedad del producto sobre los factores restantes.'
- 'Paso 4: Aplica la propiedad de la potencia para bajar los exponentes de cada factor.'
- 'Paso 5: Verifica que cada argumento individual cumpla las restricciones de dominio.'
ejemplos:
- titulo: Simplificación de una expresión con producto y potencia
  enunciado: 'Simplifica $\log_2(x^3y)$.'
  solucion_pasos:
  - Se separa el producto: $\log_2(x^3)+\log_2(y)$.
  - 'Se baja el exponente: $3\log_2(x)+\log_2(y)$.'
- titulo: Simplificación de una expresión con cociente y potencia
  enunciado: 'Simplifica $\log_3\!\left(\dfrac{x^2}{y^3}\right)$.'
  solucion_pasos:
  - Se separa el cociente: $\log_3(x^2)-\log_3(y^3)$.
  - 'Se bajan los exponentes: $2\log_3(x)-3\log_3(y)$.'
- titulo: ¿El orden en que se aplican las propiedades afecta el resultado final?
  enunciado: ¿Cambia el resultado final si se aplica primero la propiedad del producto o primero la de la
    potencia?
  respuesta: 'No'
  solucion_pasos:
  - Mientras se respeten las restricciones de dominio, cualquier orden válido de aplicación lleva al mismo
    resultado simplificado.
- titulo: ¿Es necesario verificar el dominio en cada paso de una simplificación combinada?
  enunciado: ¿Debe verificarse que cada argumento sea positivo en cada paso al simplificar una expresión con
    varias propiedades?
  respuesta: Sí
  solucion_pasos:
  - Cada separación introduce nuevos argumentos que deben cumplir individualmente la condición de positividad.
errores_frecuentes:
- Aplicar las propiedades en un orden que ignora las restricciones de dominio de pasos intermedios.
- Olvidar bajar todos los exponentes presentes en una expresión con múltiples factores.
- Mezclar erróneamente la propiedad del producto con la del cociente en un mismo paso.
- Dejar la simplificación incompleta, sin reducir todos los términos posibles.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
