semantic_id: MAT.NUM.REPARTO_ESCALAS.PARTE_DESCONOCIDA
objetivo: Calcular elementos desconocidos a partir de una de las partes de un reparto
  proporcional.
introduccion: A veces sabemos cuánto le tocó a una persona y cuál era su proporción,
  pero ignoramos de cuánto era el premio total o cuánto recibió el resto. Con una
  sola porción del pastel, podemos reconstruirlo entero.
resumen: Si se conoce una parte recibida y su índice de reparto, se puede calcular
  la Constante de Reparto ($K = \text{Parte} / \text{Índice}$). Con ella, se calculan
  las demás partes o el total.
explicacion: 'En problemas inversos de reparto, no nos dan el Total ($T$), sino que
  nos dicen cuánto recibió uno de los involucrados.


  El procedimiento es muy simple usando el método de Constante $K$:

  Si sabemos que la persona $A$ recibió un monto $M_a$, y su índice era $a$, como
  sabemos que $M_a = a \cdot K$, podemos despejar $K$ dividiendo:

  $$K = \frac{M_a}{a}$$


  Una vez que hallaste el valor de la cuota base ($K$), puedes multiplicarlo por los
  demás índices para hallar cuánto recibieron los otros, o sumarlo todo para hallar
  el Gran Total repartido.'
procedimiento:
- 'Paso 1: Toma el valor recibido por un participante y divídelo por su índice de
  reparto. Esto te da $K$.'
- 'Paso 2: Multiplica esa constante $K$ por el índice de otro participante para saber
  su parte.'
- 'Paso 3: Para hallar el Total, suma todas las partes o multiplica $K$ por la suma
  de todos los índices.'
ejemplos:
- titulo: Descubriendo el total
  enunciado: Tres amigos invierten en razón 2:3:5. Si el que puso menos recibió $40.000
    de ganancia, ¿cuál fue la ganancia total?
  solucion_pasos:
  - El que puso menos tiene índice 2. Recibió 40.000.
  - 'Hallamos K: $K = 40.000 / 2 = 20.000$.'
  - 'Suma de índices: $2+3+5 = 10$.'
  - 'Total repartido: $10 \cdot 20.000 = 200.000$.'
errores_frecuentes:
- Dividir el monto recibido por la suma de todos los índices (en vez de dividirlo
  solo por su propio índice).
- Asumir que el monto recibido es el total y repartirlo de nuevo.
- Confundirse si los índices están dados en porcentajes.
fuente: Currículum Nacional MINEDUC.
estado: publicado
