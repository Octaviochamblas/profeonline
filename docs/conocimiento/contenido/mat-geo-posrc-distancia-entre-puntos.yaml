semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.DISTANCIA_ENTRE_PUNTOS
titulo: Cálculo de la distancia entre dos puntos del plano cartesiano
objetivo: Calcular la distancia entre dos puntos del plano cartesiano, aplicando el teorema de Pitágoras
  a las diferencias de sus coordenadas.
introduccion: La distancia entre dos puntos es la longitud del segmento que los une, y se calcula considerando
  ese segmento como la hipotenusa de un triángulo rectángulo formado por las diferencias de sus coordenadas.
resumen: La distancia entre dos puntos $(x_1,y_1)$ y $(x_2,y_2)$ es $d=\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}$.
explicacion: '![Distancia entre dos puntos](/static/img/geometria/analitica/posrc-distancia-entre-puntos.svg)


  ### Definición formal


  La distancia $d$ entre $(x_1,y_1)$ y $(x_2,y_2)$ se obtiene aplicando el teorema de Pitágoras a los
  catetos $|x_2-x_1|$ y $|y_2-y_1|$: $d=\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}$.


  ### Desarrollo didáctico


  Para $A(-3,-2)$ y $B(3,3)$: $d=\sqrt{(3-(-3))^2+(3-(-2))^2}=\sqrt{36+25}=\sqrt{61}\approx7{,}81$.'
procedimiento:
- 'Paso 1: Identifica las coordenadas de ambos puntos.'
- 'Paso 2: Calcula las diferencias (x2-x1) y (y2-y1), y elévalas al cuadrado.'
- 'Paso 3: Suma ambos cuadrados y extrae la raíz cuadrada del resultado.'
ejemplos:
- titulo: Calcular la distancia entre A(-3,-2) y B(3,3)
  enunciado: A(-3,-2), B(3,3).
  solucion_pasos:
  - d=√((3-(-3))²+(3-(-2))²)=√(36+25)=√61≈7,81.
- titulo: Calcular la distancia entre (0,0) y (3,4)
  enunciado: (0,0), (3,4).
  solucion_pasos:
  - d=√(9+16)=√25=5.
- titulo: ¿El orden de los puntos afecta el resultado de la distancia?
  respuesta: 'No'
  solucion_pasos:
  - No, ya que las diferencias se elevan al cuadrado, eliminando el efecto del signo.
- titulo: ¿La distancia entre dos puntos puede ser un número negativo?
  respuesta: 'No'
  solucion_pasos:
  - No, la distancia es siempre un valor positivo (o cero si los puntos coinciden).
errores_frecuentes:
- Olvidar elevar al cuadrado las diferencias antes de sumarlas.
- No extraer la raíz cuadrada al final del cálculo.
- Confundir el orden de los puntos al restar, lo cual no afecta el resultado final pero puede generar
  confusión en los signos intermedios.
fuente: Elaboración propia.
estado: publicado
