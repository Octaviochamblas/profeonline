semantic_id: MAT.FUND.CONECTIVOS_LOGICOS.DISYUNCION_EXCLUSIVA
titulo: Disyunción exclusiva
objetivo: Identificar y aplicar el conectivo de disyunción exclusiva para formar proposiciones compuestas
  que son verdaderas cuando exactamente una de las partes es verdadera
introduccion: 'Imagina que lanzas una moneda: solo puede caer cara O sello, nunca ambas al mismo tiempo.
  Eso es la disyunción exclusiva: exactamente una de las dos opciones ocurre, pero no las dos juntas.
  Si ambas son verdaderas o ambas son falsas, el resultado es falso.

  '
resumen: 'La disyunción exclusiva ($p \oplus q$) es Verdadera cuando EXACTAMENTE UNA de las proposiciones
  es Verdadera. Si ambas son Verdaderas o ambas son Falsas, el resultado es Falso.

  '
explicacion: 'La **disyunción exclusiva** es un conectivo binario que excluye el caso en que ambas proposiciones
  sean verdaderas simultáneamente.


  **Símbolos:** $p \oplus q$ o $p \veebar q$ (también $p \lor_e q$ en algunos textos)


  **Lectura:** "p o q, pero no ambas", "o p o q (exclusivamente)"


  **Tabla de verdad:**


  | $p$ | $q$ | $p \oplus q$ |

  |-----|-----|--------------|

  | V   | V   | F            |

  | V   | F   | V            |

  | F   | V   | V            |

  | F   | F   | F            |


  **Regla clave:** $p \oplus q = V$ cuando $p$ y $q$ tienen **valores de verdad diferentes**.


  **Equivalencia formal:** $p \oplus q \equiv (p \lor q) \land \neg(p \land q)$


  **Diferencia con la disyunción inclusiva:** La inclusiva ($\lor$) acepta que ambas sean V; la exclusiva
  ($\oplus$) lo rechaza.


  **Propiedad conmutativa:** $p \oplus q \equiv q \oplus p$

  '
procedimiento:
- Identificar las dos proposiciones simples $p$ y $q$, y determinar su valor de verdad individual.
- 'Comparar los valores de verdad: si son DIFERENTES, $p \oplus q = V$; si son IGUALES, $p \oplus q =
  F$.'
- 'Alternativamente: calcular $p \lor q$ y $\neg(p \land q)$, luego conjugarlos.'
- Verificar que el contexto lingüístico corresponde a un "o exclusivo" y no a un "o inclusivo".
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'Sea $p$: "El número 3 es primo" (V) y $q$: "El número 3 es par" (F). ¿Cuál es el valor de
    verdad de $p \oplus q$?'
  solucion_pasos:
  - $p = V$ y $q = F$. Los valores son diferentes.
  - Como $p \neq q$ en sus valores de verdad, entonces $p \oplus q = V$.
- titulo: Ejemplo 2
  enunciado: 'Sea $p$: "El cuadrado de 2 es 4" (V) y $q$: "El cuadrado de 3 es 9" (V). ¿Cuál es el valor
    de verdad de $p \oplus q$?'
  solucion_pasos:
  - $p = V$ y $q = V$. Ambas son Verdaderas (valores iguales).
  - Como $p = q$ en sus valores de verdad, entonces $p \oplus q = F$ (la disyunción exclusiva no admite
    que ambas sean V).
- titulo: ¿Es la disyunción exclusiva Verdadera cuando ambas proposiciones son Falsas?
  respuesta: 'No'
  solucion_pasos:
  - Cuando $p = F$ y $q = F$, los valores son iguales (ambas falsas).
  - La disyunción exclusiva requiere valores diferentes, por lo que $p \oplus q = F$.
- titulo: ¿Es $p \oplus q$ equivalente a $(p \lor q) \land \neg(p \land q)$?
  respuesta: Sí
  solucion_pasos:
  - La expresión $(p \lor q)$ exige que al menos una sea V; $\neg(p \land q)$ prohíbe que ambas sean V.
  - La conjunción de ambas condiciones da exactamente la tabla de la disyunción exclusiva.
errores_frecuentes:
- Confundir la disyunción exclusiva (⊕) con la inclusiva (∨), olvidando que la exclusiva prohíbe que ambas
  sean verdaderas.
- Pensar que la disyunción exclusiva es verdadera cuando ambas proposiciones son falsas.
- Usar el símbolo ∨ cuando se quiere expresar la disyunción exclusiva.
- Olvidar que la regla clave es que los valores de verdad deben ser diferentes para obtener V.
- Confundir el enunciado "uno u otro, o ambos" (inclusiva) con "uno u otro, pero no ambos" (exclusiva).
fuente: Lógica Proposicional — Fundamentos Matemáticos
estado: publicado
