semantic_id: MAT.ALG.TERMINO.GRADO_RELATIVO_TERMINO
objetivo: Calcular el grado relativo de un término algebraico respecto a una variable
  específica.
introduccion: Ya vimos el peso total de la caja (grado absoluto). Pero a veces solo
  nos interesa saber el peso de las manzanas ignorando las peras. Ese enfoque individualizado
  se llama Grado Relativo.
resumen: El **Grado Relativo** de un término se calcula **respecto a una letra en
  específico**. Es simplemente el **exponente que tiene esa letra particular** en
  el término.
explicacion: 'No hay que hacer ninguna suma. Es una búsqueda y captura directa.

  Término de estudio: $-8x^4y^2z$


  - ¿Cuál es el grado relativo con respecto a la $x$? Miras la $x$, su exponente es
  4. El grado relativo respecto a $x$ es 4.

  - ¿Cuál es el grado relativo con respecto a la $y$? Miras la $y$, su exponente es
  2. El grado es 2.

  - ¿Cuál es el grado relativo con respecto a la $z$? Miras la $z$, tiene el uno invisible.
  El grado es 1.

  - ¿Cuál es el grado relativo con respecto a la $w$? Como la letra $w$ no está en
  el término, su grado relativo es 0.


  Es una herramienta vital para cuando ordenamos polinomios alfabéticamente.'
procedimiento:
- 'Paso 1: Te deben especificar la letra (variable) a analizar.'
- 'Paso 2: Busca esa letra en el término.'
- 'Paso 3: Si está, su exponente es el grado relativo.'
- 'Paso 4: Si la letra no está, el grado relativo respecto a esa letra es cero.'
ejemplos:
- titulo: Análisis por letra
  enunciado: En el término 5a^3b, ¿cuál es el grado relativo respecto a 'b' y respecto
    a 'c'?
  solucion_pasos:
  - 'Respecto a ''b'': Buscamos la b. No tiene exponente visible, por lo que es 1.
    Grado relativo a b = 1.'
  - 'Respecto a ''c'': Buscamos la c. No existe en el término. Grado relativo a c
    = 0.'
errores_frecuentes:
- Confundir Grado Relativo con Grado Absoluto y terminar sumando todos los exponentes
  inútilmente.
- Al pedir el grado relativo de una letra sin exponente escrito, decir que es 0 en
  vez de 1.
fuente: Álgebra de Baldor.
estado: publicado
