semantic_id: MAT.ALG.LEYES_MULTIPLICACION.SIGNOS_DOS_FACTORES
titulo: Aplicación de la ley de los signos en producto de dos factores
objetivo: Aplicar correctamente la regla de los signos al multiplicar dos factores algebraicos.
introduccion: ¿Qué obtienes cuando un amigo de tu amigo es tu amigo? Positivo. ¿Y cuando el enemigo de
  tu enemigo es tu amigo? También positivo. La regla de los signos en la multiplicación sigue exactamente
  esa lógica.
resumen: 'Al multiplicar dos factores, la **Regla de los Signos** establece: igual × igual = positivo,
  distinto × distinto = negativo. Específicamente: $(+)(+) = +$, $(-)(-)= +$, $(+)(-) = -$, $(-)(+) =
  -$.'
explicacion: '### Definición formal


  Negativo, porque los signos son distintos.


  ### Desarrollo didáctico


  Las cuatro combinaciones posibles:

  - $(+3)(+4) = +12$: positivo × positivo = positivo.

  - $(-3)(-4) = +12$: negativo × negativo = positivo.

  - $(+3)(-4) = -12$: positivo × negativo = negativo.

  - $(-3)(+4) = -12$: negativo × positivo = negativo.


  En álgebra con variables: $(-2x)(+5y) = -10xy$. El signo se determina por la regla, y el resto es la
  multiplicación normal de coeficientes y letras.'
procedimiento:
- 'Paso 1: Determina el signo del resultado según la regla (igual → positivo, distinto → negativo).'
- 'Paso 2: Multiplica los valores absolutos de los coeficientes.'
- 'Paso 3: Multiplica las partes literales (letras).'
- 'Paso 4: Combina el signo del paso 1 con el resultado de los pasos 2 y 3.'
- 'Regla: distinto × distinto = negativo. $(-)( +) = -$.'
ejemplos:
- titulo: Los dos casos negativos
  enunciado: 'Calcula: (-4a)(−3b).'
  solucion_pasos:
  - 'Signos: (-)(-) = +.'
  - 'Coeficientes: 4 × 3 = 12.'
  - 'Letras: a × b = ab.'
  - 'Resultado: +12ab = 12ab.'
- titulo: En física, la fuerza se expresa como $F = ma$. Si la aceleración es $-3a$ (hacia abajo) y la
  enunciado: 'En física, la fuerza se expresa como $F = ma$. Si la aceleración es $-3a$ (hacia abajo)
    y la masa es $-2m$ (representando una deuda de masa en un modelo), ¿cuál es la expresión de la fuerza?
    (v1)


    Opciones: A) $6ma$ (positiva) · B) $-6ma$ (negativa) · C) $-5ma$ · D) $1ma$'
  solucion_pasos:
  - '$F = (-2m)(-3a)$. Signos: $(-)(-)=+$. Coeficientes: $2 \times 3=6$. Resultado: $+6ma$.'
  - 'Respuesta: $6ma$ (positiva)'
- titulo: 'Respecto de «Aplicación de la ley de los signos en producto de dos factores»: ¿Es correcta
    e'
  enunciado: 'Respecto de «Aplicación de la ley de los signos en producto de dos factores»: ¿Es correcta
    esta caracterización? «Al multiplicar dos factores, la **Regla de los Signos** establece: igual ×
    igual = positivo, distinto × distinto = negativo»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al multiplicar dos factores, la **Regla de los Signos**
    establece: igual × igual = positivo, distinto × distinto = negativo.'
- titulo: 'Respecto de «Aplicación de la ley de los signos en producto de dos factores»: ¿Es válida est'
  enunciado: 'Respecto de «Aplicación de la ley de los signos en producto de dos factores»: ¿Es válida
    esta afirmación? «Creer que dos negativos siempre dan negativo (el opuesto es cierto en multiplicación)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al multiplicar dos factores, la **Regla de los Signos**
    establece: igual × igual = positivo, distinto × distinto = negativo.'
errores_frecuentes:
- Creer que dos negativos siempre dan negativo (el opuesto es cierto en multiplicación).
- Aplicar la regla de los signos de la suma (distinto → conservar el mayor) en lugar de la de la multiplicación.
- Positivo, porque hay dos factores.
- Para «¿Cuál es el signo del producto $(-7x)(+3y)$? (v1)», la respuesta correcta es Depende del valor
  de x e y.
- Positivo, porque la x es positiva.
