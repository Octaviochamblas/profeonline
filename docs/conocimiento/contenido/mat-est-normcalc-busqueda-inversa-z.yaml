semantic_id: MAT.EST.NORMAL_CALCULO.BUSQUEDA_INVERSA_Z
titulo: Buscar un valor Z a partir de un área acumulada
objetivo: Buscar el valor de Z correspondiente a un área acumulada dada, usando la tabla normal estándar de forma
  inversa.
introduccion: A veces el problema es al revés, ya sabes qué porcentaje de área quieres, y necesitas encontrar qué
  valor de Z corresponde a esa área.
resumen: Para encontrar el valor de $Z$ a partir de un área acumulada, se busca ese valor de probabilidad dentro de
  la tabla y se lee el valor de $Z$ correspondiente a esa celda.
explicacion: '![Búsqueda inversa de Z](/static/img/estadistica/normcalc/normcalc-busqueda-inversa-z.svg)


  ### Definición formal


  Dado un valor de probabilidad $p$, se busca dentro del cuerpo de la tabla normal estándar el valor más cercano a

  $p$, y se lee el valor de $Z$ correspondiente a esa fila y columna.


  ### Desarrollo didáctico


  Este proceso es el inverso de la lectura habitual de la tabla: en vez de partir de $Z$ para encontrar el área, se

  parte del área para encontrar $Z$.'
procedimiento:
- 'Paso 1: Identifica el área acumulada $p$ que se busca.'
- 'Paso 2: Busca ese valor (o el más cercano) dentro del cuerpo de la tabla normal estándar.'
- 'Paso 3: Lee el valor de $Z$ correspondiente a la fila y columna de esa celda.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si se busca el valor de Z tal que $P(Z<z)=0{,}95$, ¿qué se debe hacer en la tabla?
  solucion_pasos:
  - Se busca el valor 0,95 (o el más cercano) dentro del cuerpo de la tabla.
  - Se lee la fila y columna correspondientes para obtener $z\approx 1{,}645$.
- titulo: Ejemplo 2
  enunciado: ¿En qué se diferencia la búsqueda inversa de la lectura habitual de la tabla Z?
  solucion_pasos:
  - En la lectura habitual se parte de Z para encontrar el área.
  - En la búsqueda inversa se parte del área para encontrar Z.
- titulo: ¿La búsqueda inversa parte de un área acumulada para encontrar el valor de Z?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente el proceso inverso a la lectura habitual.
- titulo: ¿La búsqueda inversa siempre encuentra un valor de Z exacto sin aproximaciones?
  respuesta: 'No'
  solucion_pasos:
  - 'No, muchas veces se debe usar el valor más cercano disponible en la tabla, con cierta aproximación.'
errores_frecuentes:
- Buscar el área en la fila o columna en vez de en el cuerpo de la tabla.
- Confundir la búsqueda inversa con el cálculo directo de Z a partir de un dato x.
- No aproximar correctamente cuando el área exacta no aparece en la tabla.
- Olvidar el signo correcto del valor de Z si el área buscada es menor que 0,5.
- Confundir el valor de Z encontrado con el valor original x del problema.
fuente: 'Elaboración propia.'
estado: publicado
