semantic_id: MAT.GEO.HOMOTECIA.DEFINICION
titulo: Definición de homotecia como transformación determinada por un centro y una razón
objetivo: Comprender la homotecia como una transformación geométrica que amplía o reduce una figura a
  partir de un punto fijo (centro) y un factor de escala (razón).
introduccion: 'Existe una transformación geométrica especial que produce figuras semejantes a la original,
  ampliándolas o reduciéndolas desde un punto fijo: la homotecia.'
resumen: Una homotecia de centro $O$ y razón $k$ transforma cada punto $P$ de una figura en un nuevo punto
  $P'$ tal que $O$, $P$ y $P'$ están alineados, y $OP'=k\times OP$.
explicacion: '![Definición de homotecia](/static/img/geometria/congruencia-semejanza/homotecia-definicion.svg)


  ### Definición formal


  Una homotecia de centro $O$ y razón $k$ (con $k\neq0$) es la transformación que envía cada punto $P$
  al punto $P''=O+k(P-O)$.


  ### Desarrollo didáctico


  A diferencia de otras transformaciones (como traslaciones o rotaciones), la homotecia SÍ cambia el tamaño
  de la figura (salvo que $k=\pm1$), mientras conserva su forma: la figura imagen es siempre semejante
  a la original.'
procedimiento:
- 'Paso 1: Identifica el centro de homotecia O y la razón k dados.'
- 'Paso 2: Para cada punto P de la figura original, traza la recta que pasa por O y P.'
- 'Paso 3: Ubica el punto imagen P'' sobre esa recta, a una distancia k veces OP desde O.'
ejemplos:
- titulo: Aplicar una homotecia de razón 2
  enunciado: Un punto P está a 5 cm del centro O, con razón de homotecia k=2.
  solucion_pasos:
  - El punto imagen P' está a 2×5=10 cm de O, sobre la misma recta OP.
- titulo: Reconocer el resultado de una homotecia
  enunciado: Se aplica una homotecia a un triángulo.
  solucion_pasos:
  - El resultado es otro triángulo semejante al original, con sus vértices alineados con el centro O.
- titulo: ¿La homotecia conserva la forma de la figura?
  respuesta: Sí
  solucion_pasos:
  - Sí, la figura imagen es siempre semejante a la original.
- titulo: ¿Todos los puntos de la figura y su imagen están alineados con el centro?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición esencial que define la homotecia.
errores_frecuentes:
- Confundir la homotecia con una traslación, olvidando que cambia el tamaño de la figura.
- Olvidar que cada punto y su imagen deben estar alineados con el centro de homotecia.
- Aplicar la razón k sin considerar su signo, lo que puede invertir la posición del punto imagen.
fuente: 'Fuente: Moraleja 154, Cid 119.'
estado: publicado
