semantic_id: MAT.ALG.DESIG_PROPIEDADES.MULTIPLICACION_NEGATIVA
titulo: Multiplicación por una cantidad negativa
objetivo: Aplicar correctamente la inversión del sentido de la desigualdad al multiplicar
  por un número real negativo.
introduccion: El comportamiento de las desigualdades difiere del de las igualdades
  cuando se involucran multiplicaciones por valores menores a cero, requiriendo un
  cambio en la orientación del signo.
resumen: Si ambos miembros de una desigualdad se multiplican por un número negativo,
  se debe invertir el sentido de la desigualdad.
explicacion: '### Definición formal

  Sean $a, b, c \in \mathbb{R}$, con $c < 0$. Si $a < b$, entonces $a \cdot c > b
  \cdot c$. Y si $a > b$, entonces $a \cdot c < b \cdot c$.


  ### Desarrollo didáctico

  Piensa en la recta numérica: los números positivos crecen hacia la derecha. Al multiplicar
  por un negativo, se refleja todo respecto al cero. Lo que estaba más a la derecha
  (era mayor), ahora queda más a la izquierda (es menor).'
procedimiento:
  - Identificar que se multiplicará la desigualdad por un número negativo.
  - Multiplicar el lado izquierdo por el número negativo.
  - Multiplicar el lado derecho por el mismo número.
  - Invertir el símbolo de la desigualdad (ej. de $<$ a $>$, de $\leq$ a $\geq$).
  - Simplificar la expresión final.
ejemplos:
  - titulo: Manejo de denominador negativo
    enunciado: Resuelva la desigualdad $\frac{x}{-2} < 3$.
    solucion_pasos:
      - Multiplicar ambos lados por $-2$.
      - 'Al ser negativo, se invierte la desigualdad: $x > 3 \cdot (-2)$.'
      - 'Simplificar: $x > -6$.'
  - titulo: Factor fraccionario negativo
    enunciado: Resuelva $-\frac{1}{3}y \geq 2$.
    solucion_pasos:
      - Multiplicar por $-3$ en ambos lados.
      - 'Invertir el signo: $y \leq 2 \cdot (-3)$.'
      - Simplificar para obtener $y \leq -6$.
  - titulo: Al multiplicar la desigualdad $-4 < 2$ por $-1$, ¿se obtiene $4 > -2$?
    respuesta: Sí
    solucion_pasos:
      - Multiplicamos $-4 \cdot (-1) = 4$ y $2 \cdot (-1) = -2$.
      - Se debe invertir el signo de $<$ a $>$.
      - El resultado es $4 > -2$, lo cual es válido.
  - titulo: ¿Es cierto que multiplicar por un negativo mantiene el mismo símbolo de
      desigualdad?
    respuesta: 'No'
    solucion_pasos:
      - La propiedad fundamental establece que se debe cambiar el sentido de la desigualdad.
      - Esto refleja el efecto en la recta real donde el orden de los números se invierte.
errores_frecuentes:
  - Multiplicar por un número negativo mantiene el sentido de la desigualdad.
  - Solo se invierte el sentido si el número inicial era negativo.
  - Al multiplicar por $-1$, el símbolo de la desigualdad se convierte en igual.
  - Si $x > y$ y $c < 0$, entonces $xc > yc$.
  - La inversión del símbolo depende de la magnitud del número negativo.
