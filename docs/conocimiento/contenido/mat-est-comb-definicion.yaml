semantic_id: MAT.EST.COMBINACIONES.DEFINICION
titulo: Definición de combinación de n elementos tomados de a r
objetivo: Definir el concepto de combinación como una selección de elementos donde el orden no es relevante.
introduccion: A diferencia de las variaciones, en muchas situaciones (elegir un comité, un conjunto de
  ingredientes, un grupo de estudio) solo importa qué elementos se seleccionan, no en qué orden se eligieron.
resumen: Una combinación de $n$ elementos distintos tomados de a $r$ es una selección de $r$ elementos,
  en la que no importa el orden de selección.
explicacion: '![Definición de combinación](/static/img/probabilidad/comb/comb-definicion.svg)


  ### Definición formal


  Una combinación es un subconjunto de tamaño $r$ elegido de un conjunto de $n$ elementos, donde dos selecciones
  se consideran iguales si contienen los mismos elementos, sin importar el orden en que fueron elegidos.


  ### Desarrollo didáctico


  Si se seleccionan 3 personas (A, B, C) de un grupo para formar un comité, el orden en que se elige a
  cada una no genera un comité distinto: {A,B,C} es exactamente el mismo comité que {C,B,A}.'
procedimiento:
- 'Paso 1: Identifica si el problema pide una selección de elementos (sin roles diferenciados).'
- 'Paso 2: Verifica que intercambiar el orden de los elementos seleccionados no cambie el resultado.'
- 'Paso 3: Si se cumple, se trata de una combinación, y corresponde usar su fórmula específica (tema siguiente).'
ejemplos:
- titulo: 'Reconocer una combinación: elegir un comité'
  enunciado: Elegir 3 personas de un grupo de 6 para formar un comité, sin roles diferenciados.
  solucion_pasos:
  - Es una combinación, ya que el comité {A,B,C} es el mismo sin importar el orden de selección.
- titulo: 'Reconocer una combinación: elegir ingredientes'
  enunciado: Elegir 4 ingredientes de una lista de 10 para una receta.
  solucion_pasos:
  - Es una combinación, ya que el conjunto de ingredientes elegido es el mismo sin importar el orden en
    que se seleccionaron.
- titulo: ¿En una combinación, {A,B,C} y {C,B,A} representan el mismo caso?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que ambos conjuntos contienen exactamente los mismos elementos.
- titulo: ¿El orden de selección afecta el resultado en una combinación?
  respuesta: 'No'
  solucion_pasos:
  - No, es precisamente la característica que define a una combinación frente a una variación.
errores_frecuentes:
- Confundir combinación con variación, aplicando una fórmula que sí distingue el orden.
- Contar como distintas selecciones que en realidad contienen los mismos elementos, solo en orden diferente.
- No verificar si el problema realmente exige o no distinguir el orden antes de elegir el modelo de conteo.
fuente: 'Elaboración propia (referencia: Baldor 375, Moraleja 300).'
estado: publicado
