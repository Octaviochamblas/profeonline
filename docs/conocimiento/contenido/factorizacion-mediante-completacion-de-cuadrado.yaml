semantic_id: MAT.ALG.FACTOR_CUADRADOS.COMPLETACION_CUADRADO
titulo: Factorización mediante completación de cuadrado
objetivo: Resolver polinomios de cuatro o más términos donde un grupo de ellos forma un TCP que, al factorizarse,
  revela una diferencia de cuadrados con los términos restantes.
introduccion: Llegó el momento del jefe final en el mundo de los cuadrados. A veces los métodos no trabajan
  solos, sino en equipo. Hay ejercicios donde tendrás que usar tu radar para detectar un Trinomio Cuadrado
  Perfecto escondido, empacarlo, y luego darte cuenta de que se formó una épica Diferencia de Cuadrados.
resumen: Esta técnica avanzada requiere identificar 3 términos que conformen un TCP y aislarlos. Al factorizar
  ese TCP como binomio al cuadrado, se restaura una estructura de $A^2 - B^2$ con el término restante,
  permitiendo una última factorización.
explicacion: "### Definición formal\n\nLos 3 términos se vuelven un cuadrado, y con el 4to término (que\
  \ es cuadrado negativo) forman la diferencia.\n\n### Desarrollo didáctico\n\nConsidera la expresión\
  \ de 4 términos: $x^2 + 2xy + y^2 - z^2$.\n\nSi intentas \"factorizar por agrupación\" (pares) vas a\
  \ fracasar miserablemente.\nPero mira los primeros 3 términos: $x^2 + 2xy + y^2$. Es un TCP de manual.\n\
  \n1. Aislamos el TCP y lo factorizamos:\n   $(x^2 + 2xy + y^2) - z^2$\n   $= (x+y)^2 - z^2$\n\n2. Sorpresa.\
  \ Ahora la expresión entera tiene la forma de un gran bloque al cuadrado menos otro bloque al cuadrado.\
  \ Es una **Diferencia de Cuadrados Especial**.\n\n3. La raíz del primer bloque es $(x+y)$. La raíz del\
  \ segundo es $z$.\n\n4. Sumamos y restamos esas raíces:\n   $[(x+y) + z] [(x+y) - z]$\n\nResultado final:\
  \ $(x + y + z)(x + y - z)$.\nEs una de las maniobras algebraicas más satisfactorias que existen."
procedimiento:
- 'Paso 1: Revisa el polinomio (usualmente 4 términos) buscando 3 que formen un TCP (dos cuadrados positivos
  y un doble producto).'
- 'Paso 2: Agrúpalos en paréntesis, asegurando dejar el cuarto término restando fuera.'
- 'Paso 3: Factoriza el TCP para convertirlo en un binomio al cuadrado.'
- 'Paso 4: Aplica la regla de diferencia de cuadrados al binomio al cuadrado y al término externo restante.'
ejemplos:
- titulo: Factoriza $m^2 - 6m + 9 - 16n^2$
  enunciado: Factoriza $m^2 - 6m + 9 - 16n^2$.
  solucion_pasos:
  - El bloque $m^2 - 6m + 9$ es un TCP.
  - 'Lo factorizamos: $(m-3)^2 - 16n^2$.'
  - 'Aplicamos diferencia de cuadrados: raíces son $(m-3)$ y $4n$.'
  - 'Final: $(m - 3 + 4n)(m - 3 - 4n)$.'
- titulo: Factoriza $25 - x^2 - 2xy - y^2$.
  solucion_pasos:
  - 'Aquí el TCP es negativo. Extraemos el menos: $25 - (x^2 + 2xy + y^2)$. Factorizamos a $25 - (x+y)^2$.
    Aplicando diferencia: $(5 + x + y)(5 - (x+y))$. Resuelto.'
- titulo: 'Respecto de «Factorización mediante completación de cuadrado»: ¿Es correcta esta caracteriza'
  enunciado: 'Respecto de «Factorización mediante completación de cuadrado»: ¿Es correcta esta caracterización?
    «Esta técnica avanzada requiere identificar 3 términos que conformen un TCP y aislarlos»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Esta técnica avanzada requiere identificar 3 términos
    que conformen un TCP y aislarlos.'
- titulo: 'Respecto de «Factorización mediante completación de cuadrado»: ¿Es válida esta afirmación?
    «'
  enunciado: 'Respecto de «Factorización mediante completación de cuadrado»: ¿Es válida esta afirmación?
    «No darse cuenta de que si los signos del TCP están todos negativos (ej. $-x^2 - 2xy - y^2$), se debe
    extraer un signo ''-'' primero»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Esta técnica avanzada requiere identificar 3 términos
    que conformen un TCP y aislarlos.'
errores_frecuentes:
- No darse cuenta de que si los signos del TCP están todos negativos (ej. $-x^2 - 2xy - y^2$), se debe
  extraer un signo '-' primero.
- Agrupar por pares en polinomios de 4 términos sin detenerse a ver que hay un TCP de 3 términos.
- Suma de cubos y factor común.
- Para «¿Qué combinación de métodos se utiliza cuando un polinomio de 4 términos no puede factorizarse
  por agrupación en pares pero tiene tres términos que son un cuadrado perfecto», la respuesta correcta
  es Solo Trinomio Cuadrado Perfecto.
- Para «¿Qué combinación de métodos se utiliza cuando un polinomio de 4 términos no puede factorizarse
  por agrupación en pares pero tiene tres términos que son un cuadrado perfecto», la respuesta correcta
  es Diferencia de Cuadrados dos veces.
