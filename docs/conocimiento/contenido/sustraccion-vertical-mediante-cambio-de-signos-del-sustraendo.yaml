semantic_id: MAT.ALG.SUSTRACCION_POL.METODO_VERTICAL
titulo: Sustracción vertical mediante cambio de signos del sustraendo
objetivo: Restar polinomios mediante el método vertical, convirtiendo la resta en suma del opuesto.
introduccion: 'En aritmética, restar es sumar el opuesto: $9 - 4 = 9 + (-4)$. En álgebra aplica exactamente
  lo mismo. Para restar verticalmente, convertimos el sustraendo en su opuesto y sumamos.'
resumen: En la **Sustracción Vertical**, se escribe el minuendo arriba y el sustraendo debajo. Luego se
  invierte el signo de todos los términos del sustraendo y se realiza la suma columna por columna.
explicacion: "### Definición formal\n\nRestar es sumar el opuesto. Invertimos todos los signos del sustraendo.\n\
  \n### Desarrollo didáctico\n\nResta: $(5x^2 + 3x - 2) - (2x^2 - x + 4)$.\n\nFormato vertical:\n```\n\
  \  5x² + 3x - 2\n- 2x² -  x + 4\n─────────────\n```\n\nInvertimos los signos del sustraendo:\n```\n\
  \  5x² + 3x - 2\n+ (-2x²+ x - 4)\n─────────────\n  3x² + 4x - 6\n```\n\nResultado: $3x^2 + 4x - 6$."
procedimiento:
- 'Paso 1: Escribe el minuendo en la primera fila.'
- 'Paso 2: Escribe el sustraendo debajo, alineando términos semejantes.'
- 'Paso 3: Invierte el signo de CADA término del sustraendo.'
- 'Paso 4: Suma columna por columna como en la adición.'
ejemplos:
- titulo: Restar cambiando de bando
  enunciado: 'Resta: (7a + 5) - (3a - 2).'
  solucion_pasos:
  - 'Invertimos el sustraendo: -3a+2 → +3a+2... espera, el signo de 3a es + entonces su opuesto es -3a...
    ya es -3a+2... aquí ponemos +(-3a+2).'
  - 'Corregimos: sustraendo original (3a - 2). Opuesto: (-3a + 2).'
  - 'Suma: (7a+5) + (-3a+2) = 4a + 7.'
- titulo: El ingreso de una empresa en el primer semestre fue $I = 10000p + 500$ y sus gastos fueron $
  enunciado: 'El ingreso de una empresa en el primer semestre fue $I = 10000p + 500$ y sus gastos fueron
    $G = 7000p - 200$. ¿Cuál es la utilidad neta (Ingreso - Gastos)? (v1)


    Opciones: A) $3000p + 700$ · B) $3000p - 700$ · C) $17000p + 300$ · D) $3000p + 300$'
  solucion_pasos:
  - 'Utilidad $= I - G = (10000p+500) - (7000p-200)$. Opuesto de $G$: $-7000p+200$. Suma: $(10000-7000)p
    + (500+200) = 3000p+700$.'
  - 'Respuesta: $3000p + 700$'
- titulo: 'Respecto de «Sustracción vertical mediante cambio de signos del sustraendo»: ¿Describe adecu'
  enunciado: 'Respecto de «Sustracción vertical mediante cambio de signos del sustraendo»: ¿Describe adecuadamente
    el concepto esta frase? «En la **Sustracción Vertical**, se escribe el minuendo arriba y el sustraendo
    debajo»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: En la **Sustracción Vertical**, se escribe el minuendo
    arriba y el sustraendo debajo.'
- titulo: 'Respecto de «Sustracción vertical mediante cambio de signos del sustraendo»: ¿Se puede acept'
  enunciado: 'Respecto de «Sustracción vertical mediante cambio de signos del sustraendo»: ¿Se puede aceptar
    esta afirmación? «Invertir solo el signo del primer término del sustraendo»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En la **Sustracción Vertical**, se escribe el minuendo
    arriba y el sustraendo debajo.'
errores_frecuentes:
- Invertir solo el signo del primer término del sustraendo.
- Confundir el minuendo con el sustraendo (restar al revés).
- Para «Al restar $(8x - 3) - (5x + 2)$ por el método vertical, ¿qué se hace con el sustraendo $(5x +
  2)$ antes de sumar? (v1)», la respuesta correcta es Se deja igual y se suma directamente.
- Se multiplica por $-1$ solo el primer término.
- Para «Al restar $(8x - 3) - (5x + 2)$ por el método vertical, ¿qué se hace con el sustraendo $(5x +
  2)$ antes de sumar? (v1)», la respuesta correcta es Se eleva al cuadrado cada coeficiente.
