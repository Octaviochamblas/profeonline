semantic_id: MAT.ALG.MULT_POLINOMIOS.MULTIPLES_POLINOMIOS
titulo: Multiplicación continuada de polinomios
objetivo: Resolver productos sucesivos de polinomios y justificar el procedimiento algebraico.
introduccion: Un producto puede contener más de dos polinomios. Para resolverlo con seguridad se elige una agrupación
  conveniente y se simplifica cada producto antes de continuar.
resumen: La propiedad asociativa dicta agrupar de a dos, resolver y continuar con el siguiente.
explicacion: '### Definición formal


  Sea $P_1,P_2,\ldots,P_r$ una familia finita de polinomios. Su producto continuado se define recursivamente mediante

  $$\prod_{t=1}^{r} P_t = \left(\prod_{t=1}^{r-1} P_t\right)P_r,$$

  y la propiedad asociativa de la multiplicación garantiza que el resultado no depende de cómo se agrupen los factores.
  En la expansión completa, cada término del producto final proviene de elegir un término de cada polinomio factor y
  multiplicar todos esos aportes entre sí. Después se reducen los términos semejantes obtenidos.


  ### Desarrollo didáctico


  No reduce su valor matemático, pero reduce drásticamente la explosión de términos, facilitando el cálculo humano.


  La asociatividad permite elegir el orden. Resolver un producto notable primero siempre simplifica la expresión
  rápidamente.


  Los dos últimos forman $(x+1)(x-1) = x^2 - 1$. Por ende queda $x(x^2 - 1)$.'
procedimiento:
- 'Paso 1: Observa todos los factores y elige una agrupación conveniente usando la propiedad asociativa.'
- 'Paso 2: Multiplica primero un par de polinomios y simplifica por completo el resultado obtenido.'
- 'Paso 3: Usa el polinomio simplificado como nuevo factor y repite el proceso con el siguiente.'
- 'Paso 4: Continúa hasta incorporar todos los polinomios del producto.'
- 'Paso 5: Ordena y reduce el resultado final, verificando que no queden términos semejantes sin combinar.'
ejemplos:
- titulo: Si el lado de un cubo se incrementa en $2$, en $3$ y se reduce en $1$ en sus tres dimensione
  enunciado: 'Si el lado de un cubo se incrementa en $2$, en $3$ y se reduce en $1$ en sus tres dimensiones, la
    expresión polinómica del nuevo volumen en función del lado original $x$ será:


    Opciones: A) $x^3 + 4x^2 + x - 6$ · B) $x^3 + 6x^2 - x - 6$ · C) $x^3 + 4x^2 - x + 6$ · D) $x^3 + 5x^2 + x -
    6$'
  solucion_pasos:
  - $(x+2)(x+3)(x-1)$. $(x^2+5x+6)(x-1) = x^3 - x^2 + 5x^2 - 5x + 6x - 6 = x^3 + 4x^2 + x - 6$.
  - 'Respuesta: $x^3 + 4x^2 + x - 6$'
- titulo: Cuál es el coeficiente de $x^2$ en el desarrollo de $(x-2)(x-3)(x-4)$
  enunciado: '¿Cuál es el coeficiente de $x^2$ en el desarrollo de $(x-2)(x-3)(x-4)$?


    Opciones: A) $-9$ · B) $9$ · C) $-26$ · D) $24$'
  solucion_pasos:
  - $(x-2)(x-3) = x^2 - 5x + 6$. $(x^2 - 5x + 6)(x - 4) = x^3 - 4x^2 - 5x^2 + 20x + 6x - 24$. El término de $x^2$
    es $-4x^2 - 5x^2 = -9x^2$. Coeficiente $-9$.
- titulo: 'Respecto de «Multiplicación continuada de polinomios»: ¿Describe adecuadamente el concepto e'
  enunciado: 'Respecto de «Multiplicación continuada de polinomios»: ¿Describe adecuadamente el concepto esta frase?
    «La propiedad asociativa dicta agrupar de a dos, resolver y continuar con el siguiente»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La propiedad asociativa dicta agrupar de a dos, resolver y
    continuar con el siguiente.'
- titulo: 'Respecto de «Multiplicación continuada de polinomios»: ¿Se puede aceptar esta afirmación? «M'
  enunciado: 'Respecto de «Multiplicación continuada de polinomios»: ¿Se puede aceptar esta afirmación? «Multiplicar
    el primer término de cada polinomio entre sí»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La propiedad asociativa dicta agrupar de a dos, resolver y
    continuar con el siguiente.'
errores_frecuentes:
- Multiplicar el primer término de cada polinomio entre sí.
- Para «Al multiplicar tres polinomios, ¿cuál es el procedimiento estándar más recomendable», la respuesta correcta
  es Sumar los dos primeros y multiplicar por el tercero.
- Distribuir cada término del primer polinomio en todos los otros polinomios simultáneamente.
- Porque si no se hace, el resultado final cambia de valor.
- Para «¿Por qué es crucial reducir términos semejantes después de multiplicar los dos primeros polinomios, antes
  de avanzar al tercero», la respuesta correcta es Para cambiar el grado del polinomio.
