semantic_id: MAT.FUND.TABLAS_VERDAD.CONTRADICCION
titulo: Contradicción
objetivo: Identificar y demostrar si una proposición compuesta es una contradicción mediante la construcción
  de su tabla de verdad.
introduccion: 'Imagina que alguien te dice: "Tengo un gato negro que es completamente blanco". ¡Eso no
  tiene ningún sentido! Un gato no puede ser negro y blanco al mismo tiempo. Es lógicamente imposible.
  En matemáticas y lógica, una proposición compuesta que siempre es falsa, sin importar cuáles sean las
  circunstancias o los valores de verdad iniciales de sus componentes, se llama Contradicción. Es una
  mentira matemática absoluta que nunca, bajo ninguna condición, puede ser verdadera.'
resumen: Una contradicción es una proposición compuesta que resulta ser falsa ($F$) para todas las combinaciones
  posibles de valores de verdad de sus proposiciones simples. Su columna final en la tabla de verdad contiene
  únicamente valores $F$.
explicacion: 'En lógica proposicional, una **contradicción** (o antilogía) es aquella fórmula lógica que
  es **siempre falsa**, independientemente de los valores de verdad asignados a sus variables lógicas
  simples. Se denota a menudo con el símbolo $\bot$ o con la letra $C$.


  **Cómo demostrar una contradicción:**

  Se construye la tabla de verdad de la expresión lógica completa. Si al evaluar la columna final correspondiente
  a la expresión principal se obtiene el valor Falso ($F$) en todas y cada una de las filas, se concluye
  formalmente que la expresión es una contradicción.


  **Contradicciones clásicas notables:**

  1. **Principio de no contradicción**: $p \land \neg p$. (Una proposición no puede ser verdadera y falsa
  al mismo tiempo).

  2. **Negación de la identidad**: $\neg(p \rightarrow p)$.

  3. **Negación del tercero excluido**: $\neg(p \lor \neg p) \equiv p \land \neg p$.


  **Propiedad importante:**

  La negación de cualquier contradicción es lógicamente equivalente a una tautología ($\neg \bot \equiv
  \top$), y recíprocamente, la negación de una tautología es una contradicción.'
procedimiento:
- 'Paso 1: Determinar el número de proposiciones simples $n$ y definir la cantidad de filas de la tabla
  mediante la fórmula $2^n$.'
- 'Paso 2: Definir las columnas de la tabla de verdad: variables base de entrada, negaciones, operaciones
  intermedias delimitadas por paréntesis de adentro hacia afuera, y la columna final para la expresión
  completa.'
- 'Paso 3: Llenar los valores lógicos iniciales de las variables de forma sistemática cubriendo todas
  las combinaciones posibles.'
- 'Paso 4: Evaluar la expresión conectivo por conectivo desde el interior hacia el exterior. Si todos
  los valores de la columna de resultado final son Falso ($F$), concluir que la proposición es una contradicción.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Demuestra mediante tabla de verdad si la expresión $(p \lor q) \land (\neg p \land \neg q)$
    es una contradicción.
  solucion_pasos:
  - 'Paso a: Diseñamos la tabla de verdad para 2 variables ($2^2 = 4$ filas). Definimos las columnas:
    $p$, $q$, $(p \lor q)$, $\neg p$, $\neg q$, $(\neg p \land \neg q)$, y la expresión final.'
  - 'Paso b: Evaluamos los términos intermedios: $(p \lor q)$ resulta en ($V, V, V, F$). El término $(\neg
    p \land \neg q)$ resulta en ($F, F, F, V$).'
  - 'Paso c: Evaluamos la conjunción principal entre ambos términos: fila 1 es $V \land F = F$; fila 2
    es $V \land F = F$; fila 3 es $V \land F = F$; fila 4 es $F \land V = F$. Como todas las filas dan
    Falso ($F$), la expresión es una contradicción.'
- titulo: Ejemplo 2
  enunciado: Determina si la expresión condicional $\neg(p \rightarrow p)$ es una contradicción.
  solucion_pasos:
  - 'Paso a: Definimos las columnas: $p$, $(p \rightarrow p)$ y la negación externa $\neg(p \rightarrow
    p)$. Al haber 1 variable, tenemos $2^1 = 2$ filas.'
  - 'Paso b: Evaluamos el condicional interno $(p \rightarrow p)$, el cual resulta en Verdadero ($V$)
    para todas sus filas.'
  - 'Paso c: Evaluamos la negación externa $\neg(p \rightarrow p)$ invirtiendo los valores de la columna
    anterior. Obtenemos únicamente Falsos ($F$), lo que demuestra que la expresión es una contradicción.'
- titulo: ¿La expresión lógica $p \land q$ es una contradicción?
  respuesta: 'No'
  solucion_pasos:
  - Para ser una contradicción, la columna resultante debe ser falsa en todas sus filas.
  - La columna de la conjunción $p \land q$ es ($V, F, F, F$).
  - Dado que la primera fila es verdadera ($V$), la expresión no es una contradicción (es una contingencia).
- titulo: ¿Si negamos una contradicción obtenemos una tautología?
  respuesta: Sí
  solucion_pasos:
  - Una contradicción produce únicamente valores Falsos ($F$) en su columna de resultado.
  - Al aplicar el conectivo de negación lógica ($\neg$) a esa columna, todos los valores falsos se invierten
    convirtiéndose en Verdaderos ($V$).
  - Una columna compuesta únicamente por Verdaderos corresponde a la definición de una tautología.
errores_frecuentes:
- Confundir una proposición que es falsa en algunas filas (contingencia) con una contradicción, la cual
  debe ser falsa en absolutamente todas las filas.
- Cometer errores de signos y olvidar que la negación de una conjunción $\neg(p \land q)$ no es igual
  a $\neg p \land \neg q$ (Leyes de De Morgan).
- Pensar que si una fórmula tiene variables falsas en su origen, la fórmula final debe ser una contradicción.
- Resolver incorrectamente los conectivos lógicos condicionales y bicondicionales en tablas de verdad
  compuestas.
- Olvidar el principio de que la negación de una tautología siempre da como resultado una contradicción.
fuente: Lógica Matemática y Teoría de Conjuntos, pág. 48
estado: publicado
