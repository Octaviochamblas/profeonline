semantic_id: MAT.NUM.PROG_GEOMETRICA.INTERPRETACION_RAZON_CONTEXTO
titulo: Interpretación contextual de la razón geométrica en modelos multiplicativos
objetivo: Interpretar el significado práctico de la razón geométrica (r) en contextos aplicados a la vida
  real.
introduccion: Si lees que la fórmula de una pandemia es $Infectados = 100 \cdot (2.5)^t$, el número 2.5
  no es un adorno matemático, es una alerta roja. Descubramos qué nos grita la razón geométrica sobre
  el comportamiento del mundo.
resumen: La razón '$r$' en un contexto real indica el **factor multiplicativo de cambio**. Si $r > 1$,
  la situación explota o crece (intereses, poblaciones). Si $0 < r < 1$, la situación se desintegra o
  decae (depreciación, material radiactivo).
explicacion: 'Cada vez que en la prueba aparezca un modelo del tipo $A \cdot (b)^t$, concéntrate en la
  base de la potencia ''$b$'' (que es nuestra razón ''$r$'').


  1. **¿Qué nos dice si $r = 3$?** Significa que la cantidad (de bacterias, de dinero, de rumores) se
  está **triplicando** en cada unidad de tiempo. Es un crecimiento del $200\%$.

  2. **¿Qué nos dice si $r = 1.04$?** Significa que por cada paso, la cantidad retiene su $100\%$ (el
  número 1) y suma un $0.04$ extra. Es decir, crece un **$4\%$ por periodo**.

  3. **¿Qué nos dice si $r = 0.85$?** Significa que por cada paso solo retiene el $85\%$ de lo que tenía
  antes. Por ende, está perdiendo un **$15\%$ por periodo**.


  En conclusión: la razón ''r'' te da la ''velocidad y dirección'' del crecimiento exponencial.'
procedimiento:
- 'Paso 1: Localiza el número que está siendo elevado al exponente (la base de la potencia).'
- 'Paso 2: Compáralo con 1. Si es mayor a 1, hay crecimiento. Si es menor a 1, hay decrecimiento.'
- 'Paso 3: Resta el número a 1 (o viceversa) para descubrir el porcentaje exacto de cambio oculto.'
ejemplos:
- titulo: Desentrañando la fórmula
  enunciado: La masa de un medicamento en la sangre se modela como M(t) = 500 * (0.6)^t. ¿Qué significa
    el 0.6?
  solucion_pasos:
  - El 0.6 es la razón geométrica.
  - Al ser menor que 1, la masa está disminuyendo.
  - En porcentaje, 0.6 es el 60%.
  - Significa que en cada unidad de tiempo 't', el paciente solo conserva el 60% del medicamento en su
    sangre (o sea, elimina un 40%).
errores_frecuentes:
- Interpretar $r = 1.20$ como 'crece un 120%' (Falso, el 1 representa la conservación del total original;
  el crecimiento neto es solo el 0.20, es decir 20%).
- Interpretar $r = 0.30$ como 'pierde un 30%' (Falso, 0.30 es lo que CONSERVA. Por lo tanto, pierde un
  70%).
fuente: Currículum Nacional MINEDUC.
estado: publicado
