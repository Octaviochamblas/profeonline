semantic_id: MAT.ALG.FUNCIONES_ESPECIALES.FUNCION_PAR_DEFINICION
titulo: Definición de función par
objetivo: Comprender la definición algebraica de función par mediante la condición $f(-x)=f(x)$.
introduccion: 'Hay funciones donde no importa si entras con un número o con su opuesto: siempre obtienes
  exactamente el mismo resultado. Esa característica define a las funciones pares.'
resumen: Una función $f$ es **par** si $f(-x) = f(x)$ para todo $x$ del dominio; es decir, evaluar en
  un valor y en su opuesto siempre produce la misma imagen.
explicacion: '### Definición formal


  Una función $f$ con dominio simétrico respecto al origen (si $x \in \text{Dom}(f)$, entonces $-x \in
  \text{Dom}(f)$) es par si $f(-x) = f(x)$ para todo $x \in \text{Dom}(f)$.


  ### Desarrollo didáctico


  Para verificar algebraicamente, se sustituye $-x$ en la fórmula de la función y se simplifica, comparando
  el resultado con la fórmula original.


  Si $f(x)=x^2$: $f(-x)=(-x)^2=x^2=f(x)$. Se confirma que es par. En cambio, para $g(x)=x^3$: $g(-x)=(-x)^3=-x^3
  \neq g(x)$, por lo que no es par.'
procedimiento:
- 'Paso 1: Sustituye $-x$ en cada aparición de la variable de la función.'
- 'Paso 2: Simplifica la expresión resultante.'
- 'Paso 3: Compara el resultado con la fórmula original de $f(x)$.'
- 'Paso 4: Si son idénticas, la función es par.'
ejemplos:
- titulo: Verificación de función par
  enunciado: Determina si $f(x)=x^4-3$ es par.
  solucion_pasos:
  - $f(-x)=(-x)^4-3=x^4-3$.
  - Coincide exactamente con $f(x)$.
  - Es par.
- titulo: Función que no es par
  enunciado: Determina si $f(x)=x^2+x$ es par.
  solucion_pasos:
  - $f(-x)=(-x)^2+(-x)=x^2-x$.
  - No coincide con $f(x)=x^2+x$.
  - No es par.
- titulo: ¿Toda función constante es par?
  enunciado: ¿Toda función constante es par?
  respuesta: Sí
  solucion_pasos:
  - $f(-x)=c=f(x)$ para toda constante $c$, cumpliendo la definición.
- titulo: ¿La condición $f(-x)=f(x)$ debe cumplirse solo para algunos valores de $x$?
  enunciado: ¿La condición $f(-x)=f(x)$ debe cumplirse solo para algunos valores de $x$?
  respuesta: 'No'
  solucion_pasos:
  - Debe cumplirse para todo $x$ del dominio, no solo para algunos valores particulares.
errores_frecuentes:
- Verificar la condición de paridad con solo un valor numérico en vez de algebraicamente para todo $x$.
- Confundir función par con función que solo tiene exponentes pares en su fórmula (no siempre es equivalente
  si hay términos mixtos).
- Olvidar elevar correctamente potencias impares al sustituir $-x$, perdiendo el signo negativo.
- Confundir "función par" con "número par".
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
