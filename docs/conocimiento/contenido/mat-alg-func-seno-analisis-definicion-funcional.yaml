semantic_id: MAT.ALG.FUNC_SENO_ANALISIS.DEFINICION_FUNCIONAL
titulo: Definición de la función seno
objetivo: Comprender $f(x)=\sin(x)$ como una función que asigna a cada número real $x$ (interpretado como
  ángulo) la coordenada $y$ de su punto asociado en el círculo unitario.
introduccion: Ya conoces $\sin(\theta)$ para ángulos específicos; ahora se trata como una función completa, que
  puede evaluarse en cualquier número real y graficarse.
resumen: La **función seno** $f(x)=\sin(x)$ asigna a cada número real $x$, interpretado como un ángulo en
  radianes, la coordenada $y$ del punto correspondiente en el círculo unitario.
explicacion: '### Definición formal


  $f:\mathbb{R}\to\mathbb{R}$, $f(x)=\sin(x)$, donde $x$ se interpreta como la medida en radianes de un ángulo
  en posición estándar, y $f(x)$ es la coordenada $y$ del punto donde el lado terminal corta al círculo
  unitario.


  ### Desarrollo didáctico


  $f(0)=\sin(0)=0$; $f(\pi/2)=\sin(\pi/2)=1$; $f(\pi)=\sin(\pi)=0$. A diferencia de usar grados, en el contexto
  de funciones se trabaja casi siempre con radianes como unidad natural del argumento.'
procedimiento:
- 'Paso 1: Interpreta el valor de $x$ como una medida angular en radianes.'
- 'Paso 2: Ubica el punto correspondiente en el círculo unitario.'
- 'Paso 3: Lee la coordenada $y$ de ese punto como el valor de $f(x)$.'
ejemplos:
- titulo: Evaluación de la función seno en un valor simple
  enunciado: 'Evalúa $f(x)=\sin(x)$ en $x=\pi/2$.'
  solucion_pasos:
  - Se interpreta $\pi/2$ como un ángulo de $90°$.
  - 'Se obtiene $f(\pi/2)=1$.'
- titulo: Evaluación de la función seno en cero
  enunciado: 'Evalúa $f(x)=\sin(x)$ en $x=0$.'
  solucion_pasos:
  - El punto asociado a $0$ radianes es $(1,0)$.
  - 'Se obtiene $f(0)=0$.'
- titulo: ¿El argumento de la función seno se interpreta en grados o radianes por convención matemática?
  enunciado: ¿En el análisis funcional de $f(x)=\sin(x)$, el argumento $x$ se interpreta habitualmente en
    radianes?
  respuesta: Sí
  solucion_pasos:
  - Es la convención estándar al tratar el seno como función de variable real.
- titulo: ¿La función seno está definida para cualquier número real?
  enunciado: ¿La función $f(x)=\sin(x)$ está definida para cualquier valor real de $x$?
  respuesta: Sí
  solucion_pasos:
  - Todo número real puede interpretarse como una medida angular en radianes.
errores_frecuentes:
- Confundir grados con radianes al evaluar la función.
- Suponer que la función seno solo está definida para ángulos entre $0$ y $360°$.
- No relacionar el valor de $f(x)$ con la coordenada $y$ del círculo unitario.
- Olvidar que $x$ puede tomar valores negativos o mayores que $2\pi$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
