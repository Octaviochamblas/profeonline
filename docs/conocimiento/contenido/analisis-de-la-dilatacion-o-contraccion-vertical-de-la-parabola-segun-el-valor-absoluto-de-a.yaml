semantic_id: MAT.ALG.FUNC_CUADR_TRANSFORMACIONES.ESCALA_VERTICAL
titulo: Análisis de la dilatación o contracción vertical de la parábola según el valor absoluto de a
objetivo: Analizar cómo el valor absoluto del coeficiente $a$ dilata o contrae verticalmente la parábola,
  afectando su abertura.
introduccion: Además de determinar hacia dónde abre la parábola, el coeficiente $a$ también controla qué
  tan "cerrada" o "abierta" se ve la curva, independientemente de su signo.
resumen: Si $|a|>1$, la parábola se **contrae** (se ve más angosta y cerrada); si $0<|a|<1$, la parábola
  se **dilata** (se ve más abierta y ancha), comparada con $f(x)=x^2$.
explicacion: '### Definición formal


  Dada $f(x)=x^2$ y $g(x)=af(x)=ax^2$: si $|a|>1$, la gráfica de $g$ se contrae verticalmente respecto
  a la de $f$ (parece más angosta); si $0<|a|<1$, la gráfica se dilata (parece más ancha o abierta).


  ### Desarrollo didáctico


  Este efecto se aprecia comparando la altura de los puntos con igual coordenada $x$: para un mismo valor
  de $x$, mientras mayor sea $|a|$, más rápido crece (o decrece) el valor de $g(x)$ respecto a $f(x)$.


  Comparando $f(x)=x^2$ con $g(x)=4x^2$: en $x=1$, $f(1)=1$ pero $g(1)=4$, mostrando que $g$ crece más
  rápido y se ve más "cerrada" o angosta.'
procedimiento:
- 'Paso 1: Identifica el valor absoluto del coeficiente $|a|$ de la función.'
- 'Paso 2: Si $|a|>1$, concluye que la parábola es más angosta (contraída) que $f(x)=x^2$.'
- 'Paso 3: Si $0<|a|<1$, concluye que la parábola es más ancha (dilatada) que $f(x)=x^2$.'
ejemplos:
- titulo: Análisis de una contracción vertical
  enunciado: Compara la abertura de $g(x)=5x^2$ con $f(x)=x^2$.
  solucion_pasos:
  - $|a|=5>1$.
  - La gráfica de $g$ es más angosta (contraída) que la de $f$.
- titulo: Análisis de una dilatación vertical
  enunciado: Compara la abertura de $g(x)=\dfrac{1}{4}x^2$ con $f(x)=x^2$.
  solucion_pasos:
  - $|a|=1/4$, con $0<1/4<1$.
  - La gráfica de $g$ es más ancha (dilatada) que la de $f$.
- titulo: ¿El valor absoluto de $a$ afecta la posición del vértice?
  enunciado: ¿El valor absoluto de $a$ afecta la posición del vértice?
  respuesta: 'No'
  solucion_pasos:
  - El valor absoluto de $a$ solo afecta la abertura de la parábola, no la posición de su vértice.
- titulo: ¿Una parábola con $|a|=1$ tiene la misma abertura que $f(x)=x^2$?
  enunciado: ¿Una parábola con $|a|=1$ tiene la misma abertura que $f(x)=x^2$?
  respuesta: Sí
  solucion_pasos:
  - Con $|a|=1$, no hay contracción ni dilatación respecto a la parábola base.
errores_frecuentes:
- Confundir el efecto del valor absoluto de $a$ con el efecto de su signo (concavidad).
- Invertir la relación, pensando que $|a|>1$ produce una parábola más ancha en vez de más angosta.
- No distinguir entre el efecto de dilatación/contracción y el de traslación.
- Comparar incorrectamente dos funciones sin fijar la misma coordenada $x$ como referencia.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
