semantic_id: MAT.EST.MEDIA_PROMEDIO.DATOS_AGRUPADOS
titulo: Calcular la media en datos agrupados usando marcas de clase
objetivo: Calcular la media aritmética para datos agrupados en intervalos, usando la marca de clase de
  cada intervalo como valor representativo.
introduccion: Cuando los datos originales no están disponibles individualmente, sino agrupados en intervalos,
  se usa la marca de clase como aproximación.
resumen: La media con datos agrupados se calcula igual que con tabla de frecuencia, reemplazando el valor
  $x_i$ por la marca de clase $MC_i$ de cada intervalo.
explicacion: '![Cálculo de la media en intervalos](/static/img/estadistica/promedio/media-datos-agrupados.svg)


  ### Definición formal


  $\bar{x}=\dfrac{\sum(MC_i\times f_i)}{n}$, donde $MC_i$ es la marca de clase del intervalo $i$ y $n$
  el total de datos.


  ### Desarrollo didáctico


  Con intervalos [0-10) MC=5 f=4, [10-20) MC=15 f=7, [20-30) MC=25 f=3 (n=14): $\bar{x}=(5\times4+15\times7+25\times3)/14=(20+105+75)/14=200/14\approx14{,}29$.'
procedimiento:
- 'Paso 1: Calcula la marca de clase (MC) de cada intervalo de la tabla.'
- 'Paso 2: Multiplica cada marca de clase por la frecuencia de su intervalo correspondiente.'
- 'Paso 3: Suma esos productos y divide por el total de datos n para obtener la media aproximada.'
ejemplos:
- titulo: Calcular la media con 3 intervalos
  enunciado: '[0-10) MC=5 f=4, [10-20) MC=15 f=7, [20-30) MC=25 f=3.'
  solucion_pasos:
  - Σ(MC·f)=20+105+75=200. n=14. Media=200/14≈14,29.
- titulo: Calcular la media de estaturas agrupadas
  enunciado: '[150-160) MC=155 f=5, [160-170) MC=165 f=12, [170-180) MC=175 f=8.'
  solucion_pasos:
  - Σ(MC·f)=775+1980+1400=4155. n=25. Media=4155/25=166,2.
- titulo: ¿La media calculada con marcas de clase es exactamente igual a la que se obtendría con los datos
    originales?
  respuesta: 'No'
  solucion_pasos:
  - No, es una aproximación, ya que se asume que todos los datos de un intervalo se concentran en su marca
    de clase.
- titulo: ¿Es necesario calcular primero las marcas de clase antes de aplicar esta fórmula?
  respuesta: Sí
  solucion_pasos:
  - Sí, son el valor representativo que reemplaza a los datos individuales desconocidos.
errores_frecuentes:
- Usar el límite inferior o superior del intervalo en vez de la marca de clase al calcular la media.
- Olvidar que este cálculo es una aproximación, no un valor exacto como con datos no agrupados.
- Cometer errores al calcular las marcas de clase antes de aplicar la fórmula de la media.
fuente: 'Elaboración propia (referencia: Moraleja 361).'
estado: publicado
