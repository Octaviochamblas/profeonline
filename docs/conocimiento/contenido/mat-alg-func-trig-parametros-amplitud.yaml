semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.AMPLITUD
titulo: Efecto del parámetro $a$ sobre la amplitud
objetivo: Determinar la amplitud de $f(x)=a\sin(x)$ o $f(x)=a\cos(x)$ como $|a|$.
introduccion: El coeficiente que multiplica a la función seno o coseno determina qué tan "alta" y "baja" llega
  la onda respecto a su línea central.
resumen: 'En $f(x)=a\sin(x)$ o $f(x)=a\cos(x)$, la **amplitud** es $|a|$: la curva oscila entre $-|a|$ y $|a|$.'
explicacion: '### Definición formal


  Como $\sin(x)$ y $\cos(x)$ oscilan entre $-1$ y $1$, multiplicar por $a$ produce una oscilación entre $-|a|$ y
  $|a|$. La amplitud, definida como la mitad de la distancia entre el máximo y el mínimo, es entonces
  $\dfrac{|a|-(-|a|)}{2}=|a|$.


  ### Desarrollo didáctico


  $f(x)=5\sin(x)$ tiene amplitud $5$: oscila entre $-5$ y $5$. $f(x)=-3\cos(x)$ tiene amplitud $3$ (no $-3$,
  porque la amplitud es siempre no negativa), y oscila entre $-3$ y $3$.'
procedimiento:
- 'Paso 1: Identifica el coeficiente $a$ que multiplica a la función seno o coseno.'
- 'Paso 2: Calcula su valor absoluto $|a|$.'
- 'Paso 3: Ese valor es la amplitud, y la curva oscila entre $-|a|$ y $|a|$.'
ejemplos:
- titulo: Cálculo de la amplitud con coeficiente positivo
  enunciado: 'Calcula la amplitud de $f(x)=7\sin(x)$.'
  solucion_pasos:
  - Se identifica $a=7$.
  - 'La amplitud es $|7|=7$.'
- titulo: Cálculo de la amplitud con coeficiente negativo
  enunciado: 'Calcula la amplitud de $f(x)=-4\cos(x)$.'
  solucion_pasos:
  - Se identifica $a=-4$.
  - 'La amplitud es $|-4|=4$.'
- titulo: ¿La amplitud puede ser un número negativo?
  enunciado: ¿Puede la amplitud de una función trigonométrica transformada ser un valor negativo?
  respuesta: 'No'
  solucion_pasos:
  - La amplitud se define como un valor absoluto, siempre no negativo.
- titulo: ¿La amplitud de $f(x)=-2\sin(x)$ es igual a la de $g(x)=2\sin(x)$?
  enunciado: ¿La amplitud de $f(x)=-2\sin(x)$ es igual a la de $g(x)=2\sin(x)$?
  respuesta: Sí
  solucion_pasos:
  - Ambas tienen amplitud $|{-2}|=|2|=2$, aunque una esté reflejada respecto a la otra.
errores_frecuentes:
- Confundir la amplitud con el coeficiente $a$ sin aplicar el valor absoluto.
- Reportar una amplitud negativa cuando $a$ es negativo.
- Confundir la amplitud con el periodo de la función.
- No verificar el coeficiente correcto cuando la función incluye otros parámetros.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
