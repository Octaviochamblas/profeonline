semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.RECTANGULO
titulo: Triángulo rectángulo como triángulo con un ángulo recto
objetivo: Reconocer un triángulo rectángulo por tener exactamente uno de sus ángulos interiores igual
  a 90°.
introduccion: 'Entre los triángulos clasificados según sus ángulos, uno de los más usados en geometría
  es el que tiene un ángulo exactamente recto: el triángulo rectángulo.'
resumen: Un triángulo rectángulo es aquel que tiene un ángulo interior de exactamente 90°.
explicacion: '![Triángulo rectángulo](/static/img/geometria/triangulos/triangulos-clasificacion-rectangulo.svg)


  ### Definición formal


  Un triángulo con ángulos interiores α, β y γ es rectángulo si exactamente uno de ellos es igual a 90°,
  por ejemplo γ=90°.


  ### Desarrollo didáctico


  Un triángulo con ángulos 90°, 60° y 30° es rectángulo: el ángulo de 90° se marca habitualmente con un
  pequeño cuadrado en el vértice correspondiente.'
procedimiento:
- 'Paso 1: Mide o identifica los tres ángulos interiores del triángulo.'
- 'Paso 2: Verifica si exactamente uno de ellos mide 90°.'
- 'Paso 3: Si es así, el triángulo es rectángulo.'
ejemplos:
- titulo: Reconocer un rectángulo
  enunciado: Un triángulo tiene ángulos de 90°, 55° y 35°.
  solucion_pasos:
  - Tiene un ángulo de exactamente 90°, así que es rectángulo.
- titulo: Caso no rectángulo
  enunciado: Un triángulo tiene ángulos de 80°, 60° y 40°.
  solucion_pasos:
  - Ninguno mide 90°, así que no es rectángulo.
- titulo: ¿Un triángulo puede tener dos ángulos de 90°?
  respuesta: 'No'
  solucion_pasos:
  - No, porque la suma de los tres ángulos debe ser 180°, y dos rectos ya suman 180° dejando 0° al tercero.
- titulo: ¿Los otros dos ángulos de un triángulo rectángulo son siempre agudos?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque deben sumar 90° entre ambos, así que cada uno es menor que 90°.
errores_frecuentes:
- Creer que un triángulo puede tener más de un ángulo recto.
- Confundir el ángulo recto con un ángulo simplemente 'grande'.
- Olvidar que los otros dos ángulos deben sumar exactamente 90°.
fuente: Elaboración propia.
estado: publicado
