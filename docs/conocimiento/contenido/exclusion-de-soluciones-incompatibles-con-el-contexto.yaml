semantic_id: MAT.ALG.MODELAMIENTO_LINEAL.RESTRICCION_SIGNO
titulo: Exclusión de soluciones incompatibles con el contexto
objetivo: Evaluar si la solución matemática tiene sentido en el mundo físico.
introduccion: 'Existen restricciones del mundo físico:'
resumen: Las matemáticas son ciegas al mundo real. Si tú planteas una ecuación para averiguar cuántas
  personas asistieron a una fiesta y el álgebra te dice que $x = -4.5$, el álgebra no se equivocó, tú
  planteaste mal el problema (o el problema no tiene solución lógica).
explicacion: '### Definición formal


  La solución algebraica $x=k$ de una ecuación que modela un problema solo es válida como respuesta si
  $k$ pertenece al dominio de valores admisibles según el contexto (por ejemplo, $\mathbb{N}$ para conteos
  de personas, o $\mathbb{R}^+$ para magnitudes físicas); si $k$ viola esa restricción, el problema no
  tiene solución en el contexto planteado.


  ### Desarrollo didáctico


  Existen restricciones del mundo físico:

  - El número de personas debe ser un número Natural (positivo y sin decimales).

  - Las edades deben ser positivas.

  - Las distancias deben ser positivas.


  Si tu resultado viola las leyes de la física o del sentido común, debes descartarlo inmediatamente e
  indicar que el problema no tiene solución o revisar tu planteamiento inicial.'
procedimiento:
- Obtén el resultado matemático.
- Analiza qué entidad física representa (personas, tiempo, dinero, edad).
- Evalúa si el número (su signo y si es decimal) tiene sentido lógico.
- Si es absurdo, descarta la solución.
ejemplos:
- titulo: $x = -4.5$
  enunciado: Justifica el procedimiento adecuado para el caso $x = -4.5$.
  solucion_pasos:
  - Las matemáticas son ciegas al mundo real. Si tú planteas una ecuación para averiguar cuántas personas
    asistieron a una fiesta y el álgebra te dice que $x = -4.5$, el álgebra no se equivocó, tú planteaste
    mal el problema (o el problema no tiene solución lógica).
  - Obtén el resultado matemático.
- titulo: $x = -4.5$
  enunciado: Determina qué debe hacerse en $x = -4.5$ y fundamenta cada transformación.
  solucion_pasos:
  - Las matemáticas son ciegas al mundo real. Si tú planteas una ecuación para averiguar cuántas personas
    asistieron a una fiesta y el álgebra te dice que $x = -4.5$, el álgebra no se equivocó, tú planteaste
    mal el problema (o el problema no tiene solución lógica).
  - Analiza qué entidad física representa (personas, tiempo, dinero, edad).
- titulo: 'Respecto de «Exclusión de soluciones incompatibles con el contexto»: ¿La siguiente formulaci'
  enunciado: 'Respecto de «Exclusión de soluciones incompatibles con el contexto»: ¿La siguiente formulación
    es correcta? «Las matemáticas son ciegas al mundo real»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Las matemáticas son ciegas al mundo real.'
- titulo: 'Respecto de «Exclusión de soluciones incompatibles con el contexto»: ¿La siguiente conclusió'
  enunciado: 'Respecto de «Exclusión de soluciones incompatibles con el contexto»: ¿La siguiente conclusión
    es correcta? «Puede omitirse esta condición sin cambiar el resultado: «Obtén el resultado matemático»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Las matemáticas son ciegas al mundo real.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Obtén el resultado matemático».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Analiza qué entidad física representa
  (personas, tiempo, dinero, edad)».'
- La definición sigue cumpliéndose aunque no se considere que las matemáticas son ciegas al mundo real.
  Si tú planteas una ecuación para averiguar cuántas personas asistieron a una fiesta y el álgebra te
  dice que $x = -4.5$, el álgebra no se equivocó, tú planteaste mal el problema (o el problema no tiene
