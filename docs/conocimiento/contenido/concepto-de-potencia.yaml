semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.DEFINICION
titulo: Concepto de potencia
objetivo: Interpretar y calcular una potencia desde su significado.
introduccion: 'Escribir una multiplicación larga oculta su estructura repetitiva. La notación de potencia
  la concentra en dos datos: qué número se repite y cuántas copias se multiplican.'
resumen: Una potencia \(a^n\) abrevia el producto de \(n\) factores iguales a \(a\) cuando \(n\) es natural.
  La base es el factor repetido y el exponente indica cuántas veces aparece.
explicacion: 'Una potencia \(a^n\) abrevia el producto de \(n\) factores iguales a \(a\) cuando \(n\)
  es natural.


  El cálculo “\(3^4=3\cdot3\cdot3\cdot3=81\)” muestra por qué la base es el factor repetido y el exponente
  indica cuántas veces aparece'
procedimiento:
- 'Paso 1: Identifica la base y el exponente de la expresión.'
- 'Paso 2: Expande como producto repetido cuando el exponente sea natural.'
- 'Paso 3: Multiplica los factores y revisa que la cantidad coincida con el exponente.'
ejemplos:
- titulo: Aplicación razonada — Concepto de potencia
  enunciado: \(3^4=3\cdot3\cdot3\cdot3=81\).
  solucion_pasos:
  - Identifica la base y el exponente de la expresión.
  - Expande como producto repetido cuando el exponente sea natural.
  - Multiplica los factores y revisa que la cantidad coincida con el exponente.
- titulo: Revisión de una solución — Concepto de potencia
  enunciado: Una solución aplica “Expande como producto repetido cuando el exponente sea natural.”, pero
    termina sin comprobar que la base es el factor repetido y el exponente indica cuántas veces aparece.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define concepto de potencia: una potencia \(a^n\) abrevia el producto de
    \(n\) factores iguales a \(a\) cuando \(n\) es natural.'
  - Identifica la base y el exponente de la expresión.
  - 'Completa la revisión con este control: Multiplica los factores y revisa que la cantidad coincida
    con el exponente.'
- titulo: ¿Se cumple que la base es el factor repetido y el exponente indica cuántas veces aparece? —
    Concepto de potencia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una potencia \(a^n\) abrevia el producto de \(n\) factores
    iguales a \(a\) cuando \(n\) es natural.
  - El caso “\(3^4=3\cdot3\cdot3\cdot3=81\)” satisface esa condición.
  - Multiplica los factores y revisa que la cantidad coincida con el exponente.
- titulo: ¿Es válido omitir el paso “Identifica la base y el exponente de la expresión”? — Concepto de
    potencia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de concepto de potencia.
  - 'Omitirlo puede volver inválida la acción siguiente: Expande como producto repetido cuando el exponente
    sea natural.'
  - 'La solución debe terminar de este modo: Multiplica los factores y revisa que la cantidad coincida
    con el exponente.'
errores_frecuentes:
- 'Confundir concepto de potencia con otro concepto y omitir este inicio: Identifica la base y el exponente
  de la expresión.'
- Aplicar mecánicamente “Expande como producto repetido cuando el exponente sea natural.” sin revisar
  las condiciones de la definición.
- Tomar “\(3^4=3\cdot3\cdot3\cdot3=81\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la base es el factor repetido y el exponente indica
  cuántas veces aparece”.
- 'Terminar el desarrollo sin realizar este control: Multiplica los factores y revisa que la cantidad
  coincida con el exponente.'
