semantic_id: MAT.GEO.ANGULOS_RELACIONES_METRICAS.COMPLEMENTARIOS_DEFINICION
titulo: Definición de ángulos complementarios como ángulos cuya suma es 90°
objetivo: Reconocer cuándo dos medidas forman un par de ángulos complementarios y comprobar que la relación
  depende de la suma de las medidas y no de la posición del dibujo.
introduccion: Dos piezas pueden tener formas distintas y aun así completar exactamente una esquina recta
  cuando se juntan. Esa es la idea detrás del complemento. Aquí lo trabajaremos con ejemplos concretos
  y verificaciones cortas.
resumen: Dos ángulos son complementarios cuando sus medidas suman 90°. Como idea de control, la relación
  depende de la suma de las medidas y no de la posición del dibujo.
explicacion: 'Dos ángulos son complementarios cuando sus medidas suman 90°.


  En el caso “si un ángulo mide 30° y otro 60°, juntos completan 90°” esta idea se vuelve visible y permite
  comprobar que la relación depende de la suma de las medidas y no de la posición del dibujo.'
procedimiento:
- 'Paso 1: Lee las dos medidas angulares o represéntalas con una incógnita y una medida conocida.'
- 'Paso 2: Suma ambas cantidades y compara el resultado con 90°.'
- 'Paso 3: Concluye si el par es complementario explicando la comparación realizada.'
ejemplos:
- titulo: Situación geométrica — Ángulos complementarios
  enunciado: Si un ángulo mide 30° y otro 60°, juntos completan 90°.
  solucion_pasos:
  - Lee las dos medidas angulares o represéntalas con una incógnita y una medida conocida.
  - Suma ambas cantidades y compara el resultado con 90°.
  - Concluye si el par es complementario explicando la comparación realizada.
- titulo: Chequeo del procedimiento — Ángulos complementarios
  enunciado: Al resolver “si un ángulo mide 30° y otro 60°, juntos completan 90°”, una alumna salta desde
    el dibujo a la conclusión. Indica qué control geométrico faltó y cómo cerrar la solución.
  solucion_pasos:
  - 'Parte de la definición: dos ángulos son complementarios cuando sus medidas suman 90°.'
  - Suma ambas cantidades y compara el resultado con 90°.
  - Concluye si el par es complementario explicando la comparación realizada.
- titulo: ¿Puede concluirse correctamente este hecho? — Ángulos complementarios
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: dos ángulos son complementarios cuando sus
    medidas suman 90°.'
  - En el caso “si un ángulo mide 30° y otro 60°, juntos completan 90°” se observa que la relación depende
    de la suma de las medidas y no de la posición del dibujo.
  - Concluye si el par es complementario explicando la comparación realizada.
- titulo: ¿Se puede cerrar sin el control final? — Ángulos complementarios
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de definición de ángulos complementarios
    como ángulos cuya suma es 90°.
  - Después del paso “Lee las dos medidas angulares o represéntalas con una incógnita y una medida conocida.”
    todavía hace falta revisar “Suma ambas cantidades y compara el resultado con 90°.”.
  - El cierre correcto exige “Concluye si el par es complementario explicando la comparación realizada.”.
errores_frecuentes:
- Ángulos complementarios significa estar uno al lado del otro en el dibujo aunque su suma no sea 90°.
- Para resolver ángulos complementarios, basta con el paso “Lee las dos medidas angulares o represéntalas
  con una incógnita y una medida conocida.” y no hace falta revisar “Suma ambas cantidades y compara el
  resultado con 90°.”.
- Si el dibujo parece claro, se puede ignorar que la relación depende de la suma de las medidas y no de
  la posición del dibujo.
- Dos configuraciones distintas representan ángulos complementarios solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si el par es complementario explicando
  la comparación realizada.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
