semantic_id: MAT.ALG.FRACCIONES_BASE.SIGNO_NUMERADOR
titulo: Cambio de Signos en el Numerador
objetivo: Saber cómo aplicar un signo negativo externo a un polinomio que está en el numerador.
introduccion: Cuando mueves el signo negativo desde el frente de la fracción hacia el numerador (la parte superior),
  debes tener mucho cuidado si arriba hay un polinomio. Ese signo es un multiplicador silencioso para TODO el techo
  de la casa.
resumen: Si introduces un signo negativo al numerador, o lo pasas del frente al numerador, debes cambiarle el signo
  a TODOS y CADA UNO de los términos del polinomio superior.
explicacion: '### Definición formal


  El numerador completo está agrupado, el signo global lo afecta todo.


  ### Desarrollo didáctico


  Cuando decides asignar un signo negativo global hacia el numerador (la parte de arriba), debes tener un cuidado
  extremo si el numerador es un polinomio completo (tiene sumas o restas).


  El signo negativo no solo afecta al primer término que vea, sino que **afecta a TODOS los términos del numerador**,
  actuando exactamente como si hubiera un paréntesis invisible protegiéndolo.


  Ejemplo de lo correcto y lo incorrecto:

  Tienes la fracción: $-\frac{x - 5}{y}$

  - **INCORRECTO:** $\frac{-x - 5}{y}$ (El estudiante solo le cambió el signo a la ''x'' y olvidó el -5).

  - **CORRECTO:** $\frac{-(x - 5)}{y} = \frac{-x + 5}{y}$ (El menos entró al paréntesis y cambió los signos de todo:
  la ''x'' se volvió $-x$, y el $-5$ se volvió $+5$).


  Este es uno de los errores más mortales y comunes en las pruebas. Usa siempre paréntesis mentales.'
procedimiento:
- 'Paso 1: Imagina que todo el polinomio del numerador está entre paréntesis.'
- 'Paso 2: Si le vas a aplicar un cambio de signo, distribuye el signo menos en el paréntesis.'
- 'Paso 3: Cambia el signo de TODOS los términos del numerador sin excepción.'
ejemplos:
- titulo: Convierte $-\frac{2a - b + c}{5}$ moviendo el signo al numerador
  enunciado: Convierte $-\frac{2a - b + c}{5}$ moviendo el signo al numerador.
  solucion_pasos:
  - 'El negativo afecta a todo el techo: $-(2a - b + c)$.'
  - 'Distribuimos: $-2a + b - c$.'
  - El resultado es $\frac{-2a + b - c}{5}$.
- titulo: ¿A qué es equivalente $-\frac{x+y}{z}$?
  solucion_pasos:
  - El negativo afecta a la 'x' y a la 'y' a la vez.
- titulo: 'Respecto de «Cambio de signo en el numerador de una fracción algebraica»: ¿Se ajusta a la de'
  enunciado: 'Respecto de «Cambio de signo en el numerador de una fracción algebraica»: ¿Se ajusta a la definición
    esta afirmación? «Si introduces un signo negativo al numerador, o lo pasas del frente al numerador, debes cambiarle
    el signo a TODOS y CADA UNO de los términos del polinomio superior»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Si introduces un signo negativo al numerador, o lo pasas del
    frente al numerador, debes cambiarle el signo a TODOS y CADA UNO de los términos del polinomio superior.'
- titulo: 'Respecto de «Cambio de signo en el numerador de una fracción algebraica»: ¿Es compatible con'
  enunciado: 'Respecto de «Cambio de signo en el numerador de una fracción algebraica»: ¿Es compatible con el procedimiento
    esta afirmación? «Cambiar el signo solo al primer término del polinomio superior (el famoso error del francotirador
    miope)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Si introduces un signo negativo al numerador, o lo pasas del
    frente al numerador, debes cambiarle el signo a TODOS y CADA UNO de los términos del polinomio superior.'
errores_frecuentes:
- Cambiar el signo solo al primer término del polinomio superior (el famoso error del francotirador miope).
- Distribuir el signo negativo tanto al numerador COMO al denominador simultáneamente (eso altera el valor de la
  fracción).
- Para «Al pasar el signo negativo global hacia el numerador, este signo debe:», la respuesta correcta es Afectar
  solo a la primera variable.
- Para «Al pasar el signo negativo global hacia el numerador, este signo debe:», la respuesta correcta es Eliminar
  el denominador.
- Para «Al pasar el signo negativo global hacia el numerador, este signo debe:», la respuesta correcta es Quedar
  flotando.
