semantic_id: MAT.NUM.INTERES_SIMPLE.CONCEPTO
titulo: Concepto de interés simple
objetivo: Comprender la diferencia entre el interés como costo de un préstamo y el interés simple como
  modelo matemático lineal.
introduccion: Si un amigo te presta dinero, quizás no te cobre extra. Pero los bancos no son tus amigos.
  Al prestarte dinero, te cobran un 'arriendo' por usarlo. Ese arriendo se llama interés.
resumen: El interés es el costo del dinero en el tiempo. En el Interés Simple, este costo se calcula SIEMPRE
  sobre el capital inicial prestado, sin sumar los intereses ganados anteriormente a la base de cálculo.
explicacion: 'El **Interés** es el porcentaje adicional que pagas por un préstamo o que ganas por una
  inversión.

  Existen dos grandes mundos:

  - **Interés Simple:** El interés se calcula siempre sobre el capital inicial. No varía de periodo en
  periodo. Es una relación lineal. (Se usa para préstamos a muy corto plazo).

  - **Interés Compuesto:** El interés de cada mes se suma al capital, y el nuevo mes se calcula sobre
  ese monto mayor (interés sobre interés). Se usa en los bancos y a largo plazo.


  En el Interés Simple, si el capital es $\$10.000$ y el interés es $10\%$ anual, cada año pagarás exactamente
  $\$1.000$ extra. No importa si pasaron 1 o 5 años, la cuota de interés es fija.'
procedimiento:
- 'Paso 1: Entiende que la base de cálculo (el Capital Inicial) en el interés simple nunca cambia.'
- 'Paso 2: Reconoce que el crecimiento de la deuda es constante y lineal.'
- 'Paso 3: Diferéncialo del interés compuesto, donde la base de cálculo crece exponencialmente.'
ejemplos:
- titulo: Comparando el simple con la realidad
  enunciado: Si presto $1.000 con interés simple de 10% mensual, ¿cuánto dinero en intereses genero cada
    mes?
  solucion_pasos:
  - El 10% de 1.000 es 100.
  - El mes 1 genero $100.
  - El mes 2 genero otros $100.
  - El mes 3 genero otros $100. Es constante.
errores_frecuentes:
- Confundir el Interés Simple con el Compuesto (creyendo que el mes 2 se calcula el 10% sobre 1.100).
- Pensar que los bancos usan Interés Simple para los hipotecarios (los bancos usan compuesto para maximizar
  las ganancias).
fuente: Currículum Nacional MINEDUC.
estado: publicado
