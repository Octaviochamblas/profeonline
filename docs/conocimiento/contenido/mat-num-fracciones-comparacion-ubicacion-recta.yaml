semantic_id: MAT.NUM.FRACCIONES_COMPARACION.UBICACION_RECTA
objetivo: Ubicar una fracción en la recta numérica.
introduccion: 'Observa este caso: \(\frac{3}{4}\) se ubica entre 0 y 1, más cerca
  de 1 que de 0. Para explicar por qué funciona estudiaremos ubicación de fracciones
  en la recta numérica. Al finalizar podrás ubicar una fracción en la recta numérica.'
resumen: Ubicar una fracción en la recta numérica consiste en localizar el punto que
  representa su valor. Como criterio de control, la recta numérica permite comparar
  fracciones visualmente por su posición
explicacion: |-
  Ubicar una fracción en la recta numérica consiste en localizar el punto que representa su valor.

  El ejemplo “\(\frac{3}{4}\) se ubica entre 0 y 1, más cerca de 1 que de 0” lleva la definición a una situación concreta y permite verificar esta consecuencia: La recta numérica permite comparar fracciones visualmente por su posición.
procedimiento:
- 'Paso 1: Identifica los enteros consecutivos entre los que está la fracción.'
- 'Paso 2: Divide la unidad del intervalo en tantas partes iguales como indique el
  denominador.'
- 'Paso 3: Cuenta las partes desde cero y marca la posición indicada por el numerador.'
ejemplos:
- titulo: Aplicación razonada — Ubicación de fracciones en la recta numérica
  enunciado: \(\frac{3}{4}\) se ubica entre 0 y 1, más cerca de 1 que de 0.
  solucion_pasos:
  - Identifica los enteros consecutivos entre los que está la fracción.
  - Divide la unidad del intervalo en tantas partes iguales como indique el denominador.
  - Cuenta las partes desde cero y marca la posición indicada por el numerador.
- titulo: Revisión de una solución — Ubicación de fracciones en la recta numérica
  enunciado: Una solución aplica “Divide la unidad del intervalo en tantas partes
    iguales como indique el denominador.”, pero termina sin comprobar que la recta
    numérica permite comparar fracciones visualmente por su posición. Determina qué
    falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define ubicación de fracciones en la recta numérica:
    ubicar una fracción en la recta numérica consiste en localizar el punto que representa
    su valor.'
  - Identifica los enteros consecutivos entre los que está la fracción.
  - 'Completa la revisión con este control: Cuenta las partes desde cero y marca la
    posición indicada por el numerador.'
- titulo: ¿Se cumple que la recta numérica permite comparar fracciones visualmente
    por su posición? — Ubicación de fracciones en la recta numérica
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que ubicar una fracción en la recta numérica
    consiste en localizar el punto que representa su valor.
  - El caso “\(\frac{3}{4}\) se ubica entre 0 y 1, más cerca de 1 que de 0” satisface
    esa condición.
  - Cuenta las partes desde cero y marca la posición indicada por el numerador.
- titulo: ¿Es válido omitir el paso “Identifica los enteros consecutivos entre los
    que está la fracción”? — Ubicación de fracciones en la recta numérica
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de ubicación de fracciones en la
    recta numérica.
  - 'Omitirlo puede volver inválida la acción siguiente: Divide la unidad del intervalo
    en tantas partes iguales como indique el denominador.'
  - 'La solución debe terminar de este modo: Cuenta las partes desde cero y marca
    la posición indicada por el numerador.'
errores_frecuentes:
- 'Empezar ubicación de fracciones en la recta numérica sin realizar este control
  inicial: Identifica los enteros consecutivos entre los que está la fracción.'
- Memorizar “\(\frac{3}{4}\) se ubica entre 0 y 1, más cerca de 1 que de 0” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Divide la unidad del intervalo en tantas partes iguales
  como indique el denominador.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre ubicación de fracciones en la recta numérica
  que contradice el criterio “La recta numérica permite comparar fracciones visualmente
  por su posición”.
- 'Cerrar el ejercicio sin esta comprobación específica: Cuenta las partes desde cero
  y marca la posición indicada por el numerador.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
