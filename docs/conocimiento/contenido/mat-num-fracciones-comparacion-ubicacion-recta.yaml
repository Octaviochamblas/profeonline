semantic_id: MAT.NUM.FRACCIONES_COMPARACION.UBICACION_RECTA
objetivo: Comprender ubicación de fracciones en la recta numérica y aplicarlo correctamente
  en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso ubicación de fracciones en la recta numérica ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Ubicar una fracción en la recta numérica consiste en localizar el punto que
  representa su valor. Además, la recta numérica permite comparar fracciones visualmente
  por su posición.
explicacion: |-
  Ubicar una fracción en la recta numérica consiste en localizar el punto que representa su valor.

  Una idea importante es que la recta numérica permite comparar fracciones visualmente por su posición.

  Por ejemplo, \(\frac{3}{4}\) se ubica entre 0 y 1, más cerca de 1 que de 0.
procedimiento:
- 'Paso 1: Elegir una estrategia conveniente: simplificar, amplificar, usar productos
  cruzados o un denominador común.'
- 'Paso 2: Ejecutar la comparación o transformación paso a paso, cuidando el valor
  de la fracción.'
- 'Paso 3: Interpretar el resultado y expresarlo con lenguaje matemático claro.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{3}{4}\) se ubica entre 0 y 1,
    más cerca de 1 que de 0.” se relaciona con ubicación de fracciones en la recta
    numérica.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: ubicar una fracción en la recta numérica consiste
    en localizar el punto que representa su valor.'
  - Concluye que el ejemplo sí ilustra ubicación de fracciones en la recta numérica.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “La recta numérica permite comparar fracciones
    visualmente por su posición.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con ubicación de fracciones en la recta
    numérica?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que la recta numérica permite comparar fracciones
    visualmente por su posición.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar ubicación de fracciones en la recta numérica ignorando la
    definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar ubicación de fracciones en la recta numérica sin mirar qué representan
  numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
