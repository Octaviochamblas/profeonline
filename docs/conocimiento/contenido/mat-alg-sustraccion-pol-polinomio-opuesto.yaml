semantic_id: MAT.ALG.SUSTRACCION_POL.POLINOMIO_OPUESTO
objetivo: Obtener el polinomio opuesto de un polinomio dado, invirtiendo todos sus signos.
introduccion: 'El opuesto de un número es el que sumado con él da cero: el opuesto de $5$ es $-5$. En álgebra, el
  opuesto de un polinomio completo es el polinomio con todos sus coeficientes con signo invertido.'
resumen: 'El **Polinomio Opuesto** de $P(x)$ es $-P(x)$: se obtiene invirtiendo el signo de cada uno de los términos
  del polinomio original.'
explicacion: '### Definición formal


  Invertimos cada signo: $+5x^2 \to -5x^2$, $-3x \to +3x$, $+7 \to -7$.


  ### Desarrollo didáctico


  Si $P = 3x^2 - 5x + 2$, entonces:

  $-P = -3x^2 + 5x - 2$.


  Cada término cambia de signo:

  - $+3x^2 \rightarrow -3x^2$.

  - $-5x \rightarrow +5x$.

  - $+2 \rightarrow -2$.


  Importante: Si sumamos un polinomio con su opuesto, obtenemos $0$: $P + (-P) = 0$.'
procedimiento:
- 'Paso 1: Escribe el polinomio original.'
- 'Paso 2: Invierte el signo de cada término: $+$ pasa a $-$ y $-$ pasa a $+$.'
- 'Paso 3: Verifica que el grado del polinomio opuesto sea el mismo.'
- 'Paso 4: Confirma que $P + (-P) = 0$ sumando ambos.'
ejemplos:
- titulo: El gemelo inverso
  enunciado: Encuentra el opuesto de Q = -4a + 2b - 1.
  solucion_pasos:
  - -Q = +4a - 2b + 1.
  - 'Verificación: Q + (-Q) = (-4a+2b-1) + (4a-2b+1) = 0.'
- titulo: En física, si la fuerza neta sobre un objeto es $F = 3v - 8$ y se le aplica una fuerza de re
  enunciado: 'En física, si la fuerza neta sobre un objeto es $F = 3v - 8$ y se le aplica una fuerza de reacción
    opuesta $-F$, ¿cuál es la fuerza resultante? (v1)


    Opciones: A) $0$ · B) $6v - 16$ · C) $-6v + 16$ · D) $3v + 8$'
  solucion_pasos:
  - $F + (-F) = (3v-8) + (-3v+8) = 0$. La fuerza de reacción exacta cancela la fuerza original.
  - 'Respuesta: $0$'
- titulo: 'Respecto de «Concepto de resta como adición del polinomio opuesto»: ¿Es correcta esta caract'
  enunciado: 'Respecto de «Concepto de resta como adición del polinomio opuesto»: ¿Es correcta esta caracterización?
    «El **Polinomio Opuesto** de $P(x)$ es $-P(x)$: se obtiene invirtiendo el signo de cada uno de los términos
    del polinomio original»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Polinomio Opuesto** de $P(x)$ es $-P(x)$: se obtiene
    invirtiendo el signo de cada uno de los términos del polinomio original.'
- titulo: 'Respecto de «Concepto de resta como adición del polinomio opuesto»: ¿Es válida esta afirmaci'
  enunciado: 'Respecto de «Concepto de resta como adición del polinomio opuesto»: ¿Es válida esta afirmación? «Invertir
    el signo solo del primer término y dejar los demás intactos»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Polinomio Opuesto** de $P(x)$ es $-P(x)$: se obtiene
    invirtiendo el signo de cada uno de los términos del polinomio original.'
errores_frecuentes:
- Invertir el signo solo del primer término y dejar los demás intactos.
- Confundir el opuesto aditivo con el inverso multiplicativo (recíproco).
- $-5x^2 - 3x + 7$.
- $6m + 4n - 2$.
- $6v - 16$.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Concepto de resta como adición del polinomio opuesto
