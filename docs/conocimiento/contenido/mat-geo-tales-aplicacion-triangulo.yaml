semantic_id: MAT.GEO.TEOREMA_TALES.APLICACION_TRIANGULO
titulo: Aplicación del teorema de Tales en triángulos con una recta paralela a un lado
objetivo: Aplicar el teorema de Tales al caso particular de un triángulo con una recta paralela a uno
  de sus lados.
introduccion: 'Un caso muy frecuente y útil del teorema de Tales ocurre dentro de un triángulo: cuando
  se traza una recta paralela a uno de sus lados, cortando a los otros dos.'
resumen: Si en un triángulo ABC se traza un segmento DE paralelo al lado BC (con D en AB y E en AC), entonces
  se cumple que $\frac{AD}{DB}=\frac{AE}{EC}$.
explicacion: '![Tales aplicado en un triángulo con DE paralela a BC](/static/img/geometria/congruencia-semejanza/tales-aplicacion-triangulo.svg)


  ### Definición formal


  En el triángulo $ABC$, si $D\in AB$, $E\in AC$ y $DE\parallel BC$, entonces $\frac{AD}{DB}=\frac{AE}{EC}$,
  ya que AB y AC actúan como dos transversales cortadas por las paralelas que contienen a DE y BC.


  ### Desarrollo didáctico


  Este caso es simplemente una aplicación del teorema general de Tales, pero usando solo dos rectas paralelas
  (la que contiene a DE y la que contiene a BC) y dos transversales (los lados AB y AC del triángulo).'
procedimiento:
- 'Paso 1: Verifica que el segmento trazado dentro del triángulo sea paralelo a uno de sus lados.'
- 'Paso 2: Identifica los dos segmentos que se forman en cada lado cortado por esa paralela.'
- 'Paso 3: Plantea la proporción entre los segmentos correspondientes en cada lado.'
ejemplos:
- titulo: Aplicar Tales en un triángulo con DE paralela a BC
  enunciado: En el triángulo ABC, DE es paralela a BC, con D en AB y E en AC.
  solucion_pasos:
  - Se cumple que AD/DB = AE/EC.
- titulo: Verificar la proporción con valores numéricos
  enunciado: AD=4, DB=6, AE=6. ¿Cuánto mide EC?
  solucion_pasos:
  - 4/6=6/EC → EC=6×6/4=9.
- titulo: ¿Es necesario que DE sea paralela a BC para aplicar esta proporción?
  respuesta: Sí
  solucion_pasos:
  - Sí, el paralelismo es la condición esencial para que se cumpla la proporción.
- titulo: ¿Esta proporción es un caso particular del teorema general de Tales?
  respuesta: Sí
  solucion_pasos:
  - Sí, los lados del triángulo actúan como transversales de las dos rectas paralelas (DE y BC).
errores_frecuentes:
- Aplicar la proporción sin verificar primero que el segmento sea realmente paralelo al lado del triángulo.
- Invertir la proporción, comparando AD/DB con EC/AE en vez de AE/EC.
- Confundir esta proporción con la relación de semejanza de triángulos (que involucra los tres lados completos).
fuente: 'Fuente: Cid 107.'
estado: publicado
