semantic_id: MAT.NUM.RAICES_PROPIEDADES.RAIZ_DE_POTENCIA
objetivo: Simplificar raíces de potencias respetando signos.
introduccion: Cancelar índice y exponente sin mirar la paridad puede perder el signo
  correcto. La raíz principal obliga a tratar con cuidado las potencias pares.
resumen: Una raíz puede simplificar una potencia cuando su índice y el exponente comparten
  factores. Con índice par puede aparecer valor absoluto, como \(\sqrt{x^2}=|x|\).
explicacion: |-
  Una raíz puede simplificar una potencia cuando su índice y el exponente comparten factores.

  El cálculo “\(\sqrt[3]{x^6}=x^2\) para todo real \(x\)” muestra por qué con índice par puede aparecer valor absoluto, como \(\sqrt{x^2}=|x|\)
procedimiento:
- 'Paso 1: Compara el exponente del radicando con el índice y calcula su máximo común
  divisor.'
- 'Paso 2: Reduce ambos valores o extrae grupos completos del tamaño del índice.'
- 'Paso 3: Introduce valor absoluto cuando la raíz principal par lo requiera y verifica
  con valores negativos.'
ejemplos:
- titulo: Aplicación razonada — Raíz de una potencia
  enunciado: \(\sqrt[3]{x^6}=x^2\) para todo real \(x\).
  solucion_pasos:
  - Compara el exponente del radicando con el índice y calcula su máximo común divisor.
  - Reduce ambos valores o extrae grupos completos del tamaño del índice.
  - Introduce valor absoluto cuando la raíz principal par lo requiera y verifica con
    valores negativos.
- titulo: Revisión de una solución — Raíz de una potencia
  enunciado: Una solución aplica “Reduce ambos valores o extrae grupos completos del
    tamaño del índice.”, pero termina sin comprobar que con índice par puede aparecer
    valor absoluto, como \(\sqrt{x^2}=|x|\). Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define raíz de una potencia: una raíz puede simplificar
    una potencia cuando su índice y el exponente comparten factores.'
  - Compara el exponente del radicando con el índice y calcula su máximo común divisor.
  - 'Completa la revisión con este control: Introduce valor absoluto cuando la raíz
    principal par lo requiera y verifica con valores negativos.'
- titulo: ¿Se cumple que con índice par puede aparecer valor absoluto, como \(\sqrt{x^2}=|x|\)?
    — Raíz de una potencia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una raíz puede simplificar una potencia
    cuando su índice y el exponente comparten factores.
  - El caso “\(\sqrt[3]{x^6}=x^2\) para todo real \(x\)” satisface esa condición.
  - Introduce valor absoluto cuando la raíz principal par lo requiera y verifica con
    valores negativos.
- titulo: ¿Es válido omitir el paso “Compara el exponente del radicando con el índice
    y calcula su máximo común divisor”? — Raíz de una potencia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de raíz de una potencia.
  - 'Omitirlo puede volver inválida la acción siguiente: Reduce ambos valores o extrae
    grupos completos del tamaño del índice.'
  - 'La solución debe terminar de este modo: Introduce valor absoluto cuando la raíz
    principal par lo requiera y verifica con valores negativos.'
errores_frecuentes:
- 'Confundir raíz de una potencia con otro concepto y omitir este inicio: Compara
  el exponente del radicando con el índice y calcula su máximo común divisor.'
- Aplicar mecánicamente “Reduce ambos valores o extrae grupos completos del tamaño
  del índice.” sin revisar las condiciones de la definición.
- Tomar “\(\sqrt[3]{x^6}=x^2\) para todo real \(x\)” como una igualdad aislada, sin
  explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “con índice par puede aparecer
  valor absoluto, como \(\sqrt{x^2}=|x|\)”.
- 'Terminar el desarrollo sin realizar este control: Introduce valor absoluto cuando
  la raíz principal par lo requiera y verifica con valores negativos.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
