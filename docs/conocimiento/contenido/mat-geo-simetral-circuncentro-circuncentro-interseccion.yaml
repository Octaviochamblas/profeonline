semantic_id: MAT.GEO.SIMETRAL_CIRCUNCENTRO.CIRCUNCENTRO_INTERSECCION
titulo: Definición de circuncentro como punto de intersección de las simetrales
objetivo: Reconocer el circuncentro como el punto único donde concurren las tres simetrales de un triángulo.
introduccion: 'Al igual que ocurre con las alturas y las bisectrices, las tres simetrales de un triángulo
  también concurren siempre en un único punto: el circuncentro.'
resumen: El circuncentro es el punto donde se intersecan las tres simetrales de un triángulo.
explicacion: '![Circuncentro, intersección de las simetrales](/static/img/geometria/elementos-secundarios/simetral-circuncentro-circuncentro-interseccion.svg)


  ### Definición formal


  Dado un triángulo ABC, el circuncentro O es el punto común a las tres simetrales de los lados AB, BC
  y CA.


  ### Desarrollo didáctico


  La posición del circuncentro respecto al triángulo varía según su tipo: dentro en los acutángulos, en
  el punto medio de la hipotenusa en los rectángulos, y fuera en los obtusángulos.'
procedimiento:
- 'Paso 1: Traza (o identifica) las tres simetrales del triángulo.'
- 'Paso 2: Encuentra el punto donde las tres se cruzan.'
- 'Paso 3: Ese punto es el circuncentro.'
ejemplos:
- titulo: Identificar el circuncentro
  enunciado: Las tres simetrales de un triángulo se cruzan en un punto O.
  solucion_pasos:
  - O es el circuncentro del triángulo.
- titulo: Basta con dos simetrales
  enunciado: ¿Es necesario trazar las tres simetrales para hallar el circuncentro?
  solucion_pasos:
  - 'No, basta con trazar dos: su intersección ya es el circuncentro.'
- titulo: ¿Las tres simetrales siempre concurren en un mismo punto?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad general de todo triángulo.
- titulo: ¿El circuncentro puede estar fuera del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, en triángulos obtusángulos el circuncentro cae fuera de la figura.
errores_frecuentes:
- Creer que se necesitan las tres simetrales para ubicar el circuncentro (basta con dos).
- Confundir el circuncentro con el incentro o el ortocentro.
- Asumir que el circuncentro siempre está dentro del triángulo.
fuente: Elaboración propia.
estado: publicado
