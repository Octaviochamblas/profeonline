semantic_id: MAT.EST.DIAGRAMA_CAJA.LECTURA
titulo: Leer mínimo, máximo, mediana y cuartiles en un diagrama de caja
objetivo: Leer el mínimo, el máximo, la mediana y los cuartiles directamente desde un diagrama de caja y bigotes.
introduccion: Un diagrama de caja es como una radiografía de los datos, cada línea y cada borde de la caja te dice algo
  distinto sobre la distribución.
resumen: En un diagrama de caja, los bigotes marcan el mínimo y el máximo, los bordes de la caja marcan $Q_1$ y $Q_3$, y
  la línea interior marca la mediana.
explicacion: '![Lectura del diagrama de caja](/static/img/estadistica/diagcaja/diagcaja-lectura.svg)


  ### Definición formal


  En un diagrama de caja y bigotes, el extremo izquierdo del bigote inferior es el mínimo, el borde izquierdo de la

  caja es $Q_1$, la línea central de la caja es la mediana, el borde derecho de la caja es $Q_3$ y el extremo del bigote

  superior es el máximo.


  ### Desarrollo didáctico


  Con solo mirar el gráfico, sin ver los datos originales, se puede leer directamente el resumen de cinco números

  completo de la distribución.'
procedimiento:
- 'Paso 1: Identifica los extremos de los bigotes para el mínimo y el máximo.'
- 'Paso 2: Identifica los bordes de la caja para $Q_1$ y $Q_3$.'
- 'Paso 3: Identifica la línea dentro de la caja para la mediana.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: En un diagrama de caja, el bigote inferior termina en 10 y el superior en 50. ¿Qué representan estos valores?
  solucion_pasos:
  - El valor 10 es el mínimo del conjunto de datos.
  - El valor 50 es el máximo del conjunto de datos.
- titulo: Ejemplo 2
  enunciado: En un diagrama de caja, la línea dentro de la caja está en 30. ¿Qué representa este valor?
  solucion_pasos:
  - Representa la mediana ($Q_2$) del conjunto de datos.
- titulo: ¿Los bordes de la caja representan $Q_1$ y $Q_3$?
  respuesta: Sí
  solucion_pasos:
  - Sí, el borde izquierdo es $Q_1$ y el derecho es $Q_3$.
- titulo: ¿Los extremos de los bigotes siempre representan $Q_1$ y $Q_3$?
  respuesta: 'No'
  solucion_pasos:
  - 'No, los bigotes representan el mínimo y el máximo; los cuartiles son los bordes de la caja.'
errores_frecuentes:
- Confundir los bordes de la caja con los extremos de los bigotes.
- Pensar que la línea central de la caja representa el promedio en vez de la mediana.
- Creer que el largo de la caja representa el rango total de los datos.
- Confundir el mínimo con $Q_1$ y el máximo con $Q_3$.
- No identificar correctamente cuál extremo del bigote corresponde al mínimo y cuál al máximo.
fuente: 'Elaboración propia.'
estado: publicado
