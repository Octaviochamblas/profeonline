semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.AREA_TRIGONOMETRICA
titulo: Cálculo del área de un triángulo mediante dos lados y el ángulo comprendido
objetivo: Calcular el área de un triángulo conociendo dos de sus lados y el ángulo comprendido entre ellos,
  sin necesidad de conocer la altura.
introduccion: La fórmula tradicional del área (base por altura dividido en dos) requiere conocer la altura,
  que no siempre es un dato directo; esta fórmula trigonométrica la reemplaza usando el ángulo comprendido
  entre dos lados.
resumen: El área de un triángulo con dos lados $b$ y $c$ y el ángulo $A$ comprendido entre ellos se calcula
  como $\text{Área}=\dfrac{1}{2}bc\sin A$.
explicacion: '![Área mediante dos lados y el ángulo comprendido](/static/img/geometria/trigonometria/oblicu-area-trigonometrica.svg)


  ### Definición formal


  Si se traza la altura desde el vértice C hasta el lado c (o su prolongación), esa altura mide $b\sin
  A$. Sustituyendo en la fórmula tradicional Área=(base×altura)/2, con base $c$, se obtiene $\text{Área}=\dfrac{1}{2}c\cdot
  b\sin A=\dfrac{1}{2}bc\sin A$.


  ### Desarrollo didáctico


  Si $b=8$, $c=10$ y $A=30°$, el área es $\dfrac{1}{2}\times8\times10\times\sin30°=\dfrac{1}{2}\times80\times0{,}5=20$.'
procedimiento:
- 'Paso 1: Identifica los dos lados conocidos y el ángulo comprendido entre ellos.'
- 'Paso 2: Aplica la fórmula Área=(1/2)×lado1×lado2×sin(ángulo comprendido).'
- 'Paso 3: Calcula el resultado, verificando que el ángulo usado sea efectivamente el comprendido entre
  los dos lados.'
ejemplos:
- titulo: Calcular el área con b=8, c=10, A=30°
  enunciado: Ángulo comprendido A=30°.
  solucion_pasos:
  - Área=(1/2)×8×10×sin30°=(1/2)×80×0,5=20.
- titulo: Calcular el área de un triángulo equilátero de lado 6
  enunciado: b=c=6, A=60° (ángulo comprendido en un triángulo equilátero).
  solucion_pasos:
  - Área=(1/2)×6×6×sin60°=(1/2)×36×0,866≈15,59.
- titulo: ¿Esta fórmula requiere conocer la altura del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - 'No, esa es justamente su ventaja: reemplaza la necesidad de conocer la altura directamente.'
- titulo: ¿El ángulo usado debe estar comprendido entre los dos lados conocidos?
  respuesta: Sí
  solucion_pasos:
  - Sí, si se usa un ángulo no comprendido, el resultado sería incorrecto.
errores_frecuentes:
- Usar un ángulo que no está comprendido entre los dos lados conocidos.
- Olvidar el factor 1/2 en la fórmula.
- Confundir esta fórmula con la fórmula de Herón, que usa los tres lados en vez de dos lados y un ángulo.
fuente: 'Elaboración propia (referencia: Moraleja 195).'
estado: publicado
