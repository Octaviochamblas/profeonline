semantic_id: MAT.NUM.PORCENTAJES.REPRESENTACION_GRAFICA
objetivo: Interpretar la representación gráfica de un porcentaje.
introduccion: Si ves un gráfico circular en las noticias donde la mitad está pintada
  de azul, sabes instantáneamente que es un 50%. Nuestro cerebro entiende los porcentajes
  mucho mejor cuando están dibujados como porciones de un todo.
resumen: Los porcentajes se grafican típicamente en gráficos circulares (el círculo
  completo es 100%) o en cuadrículas de 10x10 (donde cada cuadrito iluminado equivale
  a 1%).
explicacion: 'Visualmente, el $100\%$ representa **el entero**. Todo dibujo que represente
  porcentajes asume que la figura completa vale 100.


  - **Cuadrícula 10x10**: Se dibuja un cuadrado dividido en 100 cuadraditos iguales.
  Pintar 25 cuadraditos representa el $25\%$.

  - **Gráfico circular (torta)**: Los $360^\circ$ del círculo representan el $100\%$.
  Para saber el ángulo de un sector, multiplicas el porcentaje por $3.6$. Por ejemplo,
  $50\%$ es la mitad del círculo ($180^\circ$).

  - **Barra de progreso**: Un rectángulo largo donde rellenar la mitad es $50\%$ y
  llenarlo entero es $100\%$.'
procedimiento:
- 'Paso 1: Identifica qué figura representa el total (100%).'
- 'Paso 2: Observa la proporción sombreada.'
- 'Paso 3: Si es una cuadrícula de 100, cuenta los cuadros. Si es circular, estima
  si es la mitad (50%), un cuarto (25%), etc.'
ejemplos:
- titulo: Cuadrícula sombreada
  enunciado: Hay un cuadrado de 10x10. Tiene 2 filas completas pintadas y 3 cuadritos
    más. ¿Qué porcentaje es?
  solucion_pasos:
  - 2 filas de 10 = 20 cuadritos.
  - 20 + 3 = 23 cuadritos.
  - Como el total es 100, representa el 23%.
errores_frecuentes:
- Creer que en una cuadrícula de 5x5 cada cuadro vale 1% (cada uno vale 4%, ya que
  100/25 = 4).
- Confundir el 25% en un círculo con un tercio de la torta.
- Asumir que si la figura crece de tamaño, los porcentajes cambian (el 50% de un círculo
  gigante sigue siendo la mitad).
fuente: Currículum Nacional MINEDUC.
estado: publicado
