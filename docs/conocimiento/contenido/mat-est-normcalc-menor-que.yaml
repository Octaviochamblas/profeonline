semantic_id: MAT.EST.NORMAL_CALCULO.MENOR_QUE
titulo: Calcular probabilidad acumulada menor que un valor
objetivo: Calcular la probabilidad de que una variable normal sea menor que un valor determinado, usando la tabla Z.
introduccion: Calcular "la probabilidad de que algo sea menor que cierto valor" es justo lo que la tabla Z entrega
  directamente, sin pasos adicionales.
resumen: Para calcular $P(X<a)$ en una distribución normal, se estandariza el valor $a$ a un puntaje $Z$ y se busca
  directamente ese valor en la tabla.
explicacion: '![Probabilidad menor que un valor](/static/img/estadistica/normcalc/normcalc-menor-que.svg)


  ### Definición formal


  Para calcular $P(X<a)$, se calcula $Z=\dfrac{a-\mu}{\sigma}$ y luego se busca $P(Z<z)$ directamente en la tabla

  normal estándar.


  ### Desarrollo didáctico


  Como la variable es continua, $P(X<a)$ y $P(X\leq a)$ son exactamente iguales, ya que la probabilidad de un valor

  puntual exacto es cero.'
procedimiento:
- 'Paso 1: Calcula el puntaje $Z=\dfrac{a-\mu}{\sigma}$.'
- 'Paso 2: Busca ese valor de $Z$ en la tabla normal estándar.'
- 'Paso 3: El valor obtenido es directamente $P(X<a)$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $\mu=100$, $\sigma=10$ y se busca $P(X<110)$, ¿cuál es el puntaje $Z$ correspondiente?
  solucion_pasos:
  - $Z=(110-100)/10=1$.
  - Se busca $P(Z<1)$ en la tabla para obtener el resultado.
- titulo: Ejemplo 2
  enunciado: ¿Es lo mismo calcular $P(X<a)$ que $P(X\leq a)$ en una variable continua?
  solucion_pasos:
  - Sí, porque la probabilidad de un valor puntual exacto es cero en variables continuas.
- titulo: ¿Para calcular $P(X<a)$ se busca directamente el puntaje $Z$ correspondiente en la tabla?
  respuesta: Sí
  solucion_pasos:
  - Sí, ese es el procedimiento estándar.
- titulo: ¿$P(X<a)$ y $P(X\leq a)$ son distintas en una variable continua?
  respuesta: 'No'
  solucion_pasos:
  - 'No, son iguales, ya que la probabilidad puntual de $a$ es cero.'
errores_frecuentes:
- Olvidar estandarizar el valor antes de buscarlo en la tabla.
- Confundir $P(X<a)$ con $P(X>a)$ al leer el resultado.
- Calcular mal el puntaje Z por error de signo o de fórmula.
- Buscar el valor incorrecto de fila o columna en la tabla Z.
- Creer que $P(X<a)$ y $P(X\leq a)$ son distintas en variables continuas.
fuente: 'Elaboración propia (referencia: Moraleja 308).'
estado: publicado
