semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.DESPLAZAMIENTO_VERTICAL
titulo: Desplazamiento vertical en funciones trigonométricas
objetivo: Determinar el desplazamiento vertical de $f(x)=a\sin(bx)+d$ a partir del parámetro $d$.
introduccion: El parámetro $d$ mueve toda la curva hacia arriba o hacia abajo, sin alterar su forma, amplitud ni
  periodo.
resumen: 'En $f(x)=a\sin(bx)+d$, el parámetro $d$ representa el **desplazamiento vertical**: la curva se mueve
  $d$ unidades hacia arriba (si $d>0$) o hacia abajo (si $d<0$).'
explicacion: '### Definición formal


  La función $f(x)=g(x)+d$, donde $g(x)=a\sin(bx)$, traslada verticalmente cada punto de $g$ en $d$ unidades.
  A diferencia del desplazamiento horizontal, el signo de $d$ coincide directamente con la dirección visual del
  movimiento.


  ### Desarrollo didáctico


  $f(x)=\sin(x)+3$ se desplaza $3$ unidades hacia arriba: oscila ahora entre $2$ y $4$, en vez de entre $-1$ y
  $1$. $f(x)=\cos(x)-2$ se desplaza $2$ unidades hacia abajo: oscila entre $-3$ y $-1$.'
procedimiento:
- 'Paso 1: Identifica el valor de $d$ sumado (o restado) fuera de la función seno o coseno.'
- 'Paso 2: Determina la dirección del desplazamiento según el signo de $d$.'
- 'Paso 3: Calcula el nuevo rango de oscilación sumando $d$ al recorrido básico $[-|a|,|a|]$.'
ejemplos:
- titulo: Cálculo del desplazamiento vertical positivo
  enunciado: '¿Hacia dónde se desplaza $f(x)=2\sin(x)+5$ respecto a $2\sin(x)$?'
  solucion_pasos:
  - Se identifica $d=5>0$.
  - Se desplaza $5$ unidades hacia arriba.
- titulo: Cálculo del nuevo rango tras el desplazamiento
  enunciado: '¿Entre qué valores oscila $f(x)=3\cos(x)-1$?'
  solucion_pasos:
  - La amplitud es $3$, así que sin desplazar oscilaría entre $-3$ y $3$.
  - 'Sumando $d=-1$, oscila entre $-4$ y $2$.'
- titulo: ¿El desplazamiento vertical afecta el periodo de la función?
  enunciado: ¿El desplazamiento vertical afecta el periodo de la función trigonométrica?
  respuesta: 'No'
  solucion_pasos:
  - Solo cambia la posición vertical de la curva, no su periodo.
- titulo: ¿El signo de $d$ coincide con la dirección visual del desplazamiento?
  enunciado: ¿El signo de $d$ coincide directamente con la dirección visual del desplazamiento vertical?
  respuesta: Sí
  solucion_pasos:
  - A diferencia del desfase horizontal, aquí no hay inversión de signo.
errores_frecuentes:
- Confundir el desplazamiento vertical con el horizontal.
- Aplicar la misma lógica de inversión de signo del desfase horizontal, donde no corresponde.
- No recalcular correctamente el rango de oscilación tras el desplazamiento.
- Confundir el parámetro $d$ con la amplitud $a$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
