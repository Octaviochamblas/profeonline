semantic_id: MAT.ALG.FACTOR_CUBOS.RECONOCIMIENTO_SUMA_CUBOS
titulo: Reconocimiento de la Suma de Cubos
objetivo: Identificar visual y matemáticamente cuándo un binomio corresponde a una suma de dos cubos perfectos.
introduccion: Si la suma de cuadrados era un espejismo que no se podía factorizar, la Suma de Cubos es una grata
  sorpresa. En la tercera dimensión, las reglas de los signos cambian y permiten que $a^3 + b^3$ se pueda romper
  en piezas más pequeñas.
resumen: Una suma de cubos perfectos consta de dos términos positivos sumados, donde a cada término se le puede
  extraer raíz cúbica exacta (ej. $x^3, 8, 27y^6, 125$).
explicacion: '### Definición formal


  Al sacar raíz cúbica, el exponente se divide entre 3. Por ende, debe ser múltiplo de 3 para que sea exacto.


  ### Desarrollo didáctico


  Para reconocer una suma de cubos $A^3 + B^3$, debes hacer un simple ''control de calidad'':

  1. Son exactamente dos términos.

  2. Hay un signo ''más'' $(+)$ entre ellos.

  3. Ambos términos tienen raíz cúbica exacta.


  Ejemplo: $8x^3 + 27$.

  - ¿Son dos términos sumados? Sí.

  - La raíz cúbica de $8x^3$ se calcula sacando raíz cúbica a 8 (que es 2, pues $2 \times 2 \times 2 = 8$) y raíz
  cúbica a $x^3$ (que es $x$). Por tanto, es $2x$.

  - La raíz cúbica de $27$ es 3 (pues $3 \times 3 \times 3 = 27$).


  Como ambos pasaron la prueba, estamos ante una Suma de Cubos y podemos prepararnos para aplicar su fórmula de
  factorización.'
procedimiento:
- 'Paso 1: Cuenta los términos. Deben ser dos.'
- 'Paso 2: Revisa el signo, debe ser positivo (+).'
- 'Paso 3: Verifica si los coeficientes numéricos pertenecen a la lista de cubos perfectos (1, 8, 27, 64, 125, 216.).'
- 'Paso 4: Verifica que los exponentes de las letras sean múltiplos de 3 (ej. $x^3, y^6, z^9$).'
ejemplos:
- titulo: Determina si $64m^6 + 1$ es una suma de cubos
  enunciado: Determina si $64m^6 + 1$ es una suma de cubos.
  solucion_pasos:
  - Tiene dos términos con signo más.
  - Raíz cúbica de 64 es 4. Raíz cúbica de $m^6$ es $m^2$.
  - Raíz cúbica de 1 es 1.
  - Cumple todos los requisitos. Es suma de cubos.
- titulo: Si el binomio es $1 + y^3$, cuenta como suma de cubos aunque el 1 esté primero
  enunciado: ¿Si el binomio es $1 + y^3$, cuenta como suma de cubos aunque el 1 esté primero?
  solucion_pasos:
  - El orden de los sumandos no altera la suma, y 1 es el cubo de 1.
  - 'Respuesta: Verdadero'
