- Confundir un cuadrado perfecto (como 9 o 25) con un cubo perfecto.
- Creer que un exponente par (como $x^2$) no puede ser parte de un cubo. ¡Sí puede! Si es $x^6$, su raíz cúbica
  es $x^2$.
- Son números pares.
- Para «¿Cuál es la característica principal de los exponentes de las variables en un cubo perfecto», la respuesta
