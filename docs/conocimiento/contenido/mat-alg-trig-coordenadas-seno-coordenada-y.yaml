semantic_id: MAT.ALG.TRIG_COORDENADAS.SENO_COORDENADA_Y
titulo: El seno como la coordenada $y$ del círculo unitario
objetivo: Definir $\sin(\theta)$ como la coordenada $y$ del punto donde el lado terminal de $\theta$ corta al
  círculo unitario.
introduccion: De forma simétrica al coseno, el seno se define usando la otra coordenada del punto asociado al
  ángulo en el círculo unitario.
resumen: Para un ángulo $\theta$ en posición estándar, $\sin(\theta)$ se define como la **coordenada $y$** del
  punto donde el lado terminal corta al círculo unitario.
explicacion: '### Definición formal


  Si el lado terminal del ángulo $\theta$ corta al círculo unitario en el punto $(x,y)$, entonces
  $\sin(\theta)=y$. Al igual que el coseno, esta definición extiende el seno a cualquier ángulo real.


  ### Desarrollo didáctico


  Para $\theta=0°$, el punto asociado es $(1,0)$, así que $\sin(0°)=0$. Para $\theta=90°$, el punto es $(0,1)$,
  así que $\sin(90°)=1$.'
procedimiento:
- 'Paso 1: Ubica el punto $(x,y)$ donde el lado terminal de $\theta$ corta al círculo unitario.'
- 'Paso 2: Identifica la coordenada $y$ de ese punto.'
- 'Paso 3: Esa coordenada $y$ es el valor de $\sin(\theta)$.'
ejemplos:
- titulo: Cálculo del seno en un ángulo cuadrantal
  enunciado: 'Calcula $\sin(180°)$.'
  solucion_pasos:
  - El punto asociado a $180°$ es $(-1,0)$.
  - 'Se obtiene $\sin(180°)=0$.'
- titulo: Cálculo del seno en otro ángulo cuadrantal
  enunciado: 'Calcula $\sin(270°)$.'
  solucion_pasos:
  - El punto asociado a $270°$ es $(0,-1)$.
  - 'Se obtiene $\sin(270°)=-1$.'
- titulo: ¿El seno puede tomar valores menores que $-1$?
  enunciado: ¿Puede $\sin(\theta)$ tomar un valor menor que $-1$?
  respuesta: 'No'
  solucion_pasos:
  - Como $(x,y)$ pertenece al círculo unitario, $y$ nunca puede ser menor que $-1$.
- titulo: ¿El seno de $0°$ y el coseno de $90°$ son iguales?
  enunciado: ¿$\sin(0°)$ y $\cos(90°)$ tienen el mismo valor?
  respuesta: Sí
  solucion_pasos:
  - Ambos valen $0$, aunque provienen de coordenadas distintas en puntos distintos.
errores_frecuentes:
- Confundir el seno con la coordenada $x$, que corresponde al coseno.
- Suponer que el seno puede tomar cualquier valor real, sin restricción.
- No verificar que el punto usado realmente pertenezca al círculo unitario.
- Confundir esta definición general con la limitada al triángulo rectángulo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
