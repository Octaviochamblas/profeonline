semantic_id: MAT.ALG.TERMINO.DEFINICION_TERMINO
objetivo: Comprender la definición de término algebraico como la unidad mínima indivisible mediante sumas o restas.
introduccion: ¿Cómo se construyen las oraciones matemáticas? Así como una oración está formada por palabras separadas
  por espacios, el álgebra está formada por 'términos' separados por signos de suma o resta.
resumen: Un **Término Algebraico** es una expresión matemática que consta de un solo símbolo o de varios símbolos
  no separados entre sí por los signos $+$ (más) o $-$ (menos). Es la pieza fundamental (el ladrillo) con la que
  se construyen las expresiones.
explicacion: "### Definición formal\n\nLos signos más y menos actúan como las fronteras que dividen a las expresiones\
  \ en términos separados.\n\n### Desarrollo didáctico\n\nVisualiza el término como un vagón de tren cerrado. Todo\
  \ lo que hay adentro (números, letras, potencias, divisiones) está pegado con multiplicaciones y divisiones. \n\
  - $3a$ es un solo término (el 3 y la $a$ están pegados por multiplicación).\n- $\\frac{4xy}{z}$ es un solo término\
  \ (están pegados por división).\n- $3a + b$ NO es un término, son DOS términos. El signo $+$ actúa como un enganche\
  \ que separa los vagones.\n\nTodo término tiene 4 partes anatómicas fundamentales que estudiaremos: el signo,\
  \ el coeficiente, la parte literal y el grado."
procedimiento:
- 'Paso 1: Lee la expresión de izquierda a derecha.'
- 'Paso 2: Busca signos + o - que no estén encerrados en paréntesis ni denominadores.'
- 'Paso 3: Cada segmento entre esos signos libres es un término independiente.'
ejemplos:
- titulo: Contando vagones
  enunciado: En la expresión '5x - 8y^2 + z/4', identifica cuáles son los términos individuales.
  solucion_pasos:
  - 'Observamos los separadores: hay un signo menos (-) y un signo más (+).'
  - Esto divide la expresión en tres partes.
  - 'Los tres términos son: ''5x'', ''-8y^2'' y ''z/4''.'
- titulo: Un software de matemáticas requiere que el usuario ingrese una fórmula dividiendo conceptual
  enunciado: 'Un software de matemáticas requiere que el usuario ingrese una fórmula dividiendo conceptualmente
    sus términos. El estudiante ingresa la expresión completa $\frac{a+b+c}{2}$. El software le informa que ha ingresado
    un solo término. El estudiante reclama diciendo que hay signos más. ¿Quién tiene la razón matemática? (v1)


    Opciones: A) El software tiene la razón, ya que la gran barra de división agrupa todo el numerador como un bloque
    unitario, formando un único término fraccionario. · B) El estudiante tiene la razón, hay tres letras distintas
    separadas por sumas, son tres términos obligatoriamente. · C) Ambos se equivocan, en realidad hay dos términos,
    la suma y la división. · D) El software falló porque las letras no pueden dividirse por números enteros.'
  solucion_pasos:
  - Una barra de fracción que abarca toda la suma actúa como un paréntesis agrupador gigante. Es un solo término
    fraccionario. Si la barra solo dividiera a la 'c', serían tres términos.
  - 'Respuesta: El software tiene la razón, ya que la gran barra de división agrupa todo el numerador como un bloque
    unitario, formando un único término fraccionario.'
- titulo: 'Respecto de «Definición de término algebraico»: ¿Se ajusta a la definición esta afirmación?'
  enunciado: 'Respecto de «Definición de término algebraico»: ¿Se ajusta a la definición esta afirmación? «Un **Término
    Algebraico** es una expresión matemática que consta de un solo símbolo o de varios símbolos no separados entre
    sí por los signos $+$ (más) o $-$ (menos)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un **Término Algebraico** es una expresión matemática que
    consta de un solo símbolo o de varios símbolos no separados entre sí por los signos $+$ (más) o $-$ (menos).'
- titulo: 'Respecto de «Definición de término algebraico»: ¿Es compatible con el procedimiento esta afi'
  enunciado: 'Respecto de «Definición de término algebraico»: ¿Es compatible con el procedimiento esta afirmación?
    «Creer que una división separa términos (ej. ver $\frac{x+y}{2}$ y pensar que son dos términos; en realidad
    el denominador largo consolida todo en un solo término fraccionario gigantesco)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un **Término Algebraico** es una expresión matemática que
    consta de un solo símbolo o de varios símbolos no separados entre sí por los signos $+$ (más) o $-$ (menos).'
errores_frecuentes:
- Creer que una división separa términos (ej. ver $\frac{x+y}{2}$ y pensar que son dos términos; en realidad el
  denominador largo consolida todo en un solo término fraccionario gigantesco).
- Asumir que un número suelto (como un 5) no es un término porque no tiene letra. Los números sueltos son términos
  independientes.
- La multiplicación y la división.
- Las potencias y las raíces.
- Para «Según la definición estructural del álgebra, ¿qué operaciones matemáticas fungen como los 'separadores'
  universales que delimitan dónde termina un término y dónde comienza el siguiente? (v1)», la respuesta correcta
  es Los signos de igualdad y desigualdad.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Definición de término algebraico
