semantic_id: MAT.GEO.TEOREMA_TALES.PARALELAS_TRANSVERSALES
titulo: Teorema general de Tales en rectas paralelas cortadas por transversales
objetivo: 'Comprender el teorema de Tales: cuando varias rectas paralelas son cortadas por dos transversales,
  los segmentos que se forman son proporcionales.'
introduccion: Cuando un conjunto de rectas paralelas es atravesado por dos rectas transversales, se genera
  una relación de proporcionalidad muy útil entre los segmentos formados, conocida como teorema de Tales.
resumen: El teorema de Tales establece que si tres o más rectas paralelas son cortadas por dos transversales,
  los segmentos que determinan en una transversal son proporcionales a los segmentos correspondientes
  en la otra.
explicacion: '![Teorema de Tales en rectas paralelas](/static/img/geometria/congruencia-semejanza/tales-paralelas-transversales.svg)


  ### Definición formal


  Si las rectas paralelas $L_1$, $L_2$, $L_3$ son cortadas por las transversales $t_1$ y $t_2$ en los
  puntos A, B, C (en $t_1$) y A'', B'', C'' (en $t_2$), entonces $\frac{AB}{BC}=\frac{A''B''}{B''C''}$.


  ### Desarrollo didáctico


  Este teorema es la base de la proporcionalidad en geometría: no importa la distancia entre las paralelas
  ni el ángulo de las transversales, la razón entre segmentos correspondientes se mantiene siempre igual.'
procedimiento:
- 'Paso 1: Identifica las rectas paralelas y las dos transversales que las cortan.'
- 'Paso 2: Marca los puntos de intersección en cada transversal.'
- 'Paso 3: Establece la proporción entre los segmentos correspondientes de ambas transversales.'
ejemplos:
- titulo: Identificar segmentos proporcionales
  enunciado: Tres rectas paralelas son cortadas por dos transversales, formando los puntos A, B, C y A',
    B', C'.
  solucion_pasos:
  - Se cumple que AB/BC = A'B'/B'C', por el teorema de Tales.
- titulo: Aplicar el teorema con valores numéricos
  enunciado: AB=4, BC=6, A'B'=6. ¿Cuánto mide B'C'?
  solucion_pasos:
  - 4/6=6/B'C' → B'C'=6×6/4=9.
- titulo: ¿El teorema requiere que las transversales sean perpendiculares a las paralelas?
  respuesta: 'No'
  solucion_pasos:
  - No, las transversales pueden cortar a las paralelas en cualquier ángulo.
- titulo: ¿Se necesitan al menos tres rectas paralelas para aplicar Tales?
  respuesta: Sí
  solucion_pasos:
  - Sí, se necesitan al menos tres paralelas para generar la proporción entre dos segmentos en cada transversal.
errores_frecuentes:
- Confundir qué segmentos son correspondientes entre ambas transversales.
- Aplicar el teorema con rectas que no son realmente paralelas.
- Invertir la proporción al plantear la ecuación (por ejemplo, AB/BC en vez de A'B'/B'C' en el lado correspondiente).
fuente: 'Fuente: Cid 106.'
estado: publicado
