semantic_id: MAT.EST.BINOMIAL_BASE.NOTACION_BINOMIAL
titulo: Reconocer y utilizar la notación X~B(n,p)
objetivo: Reconocer y utilizar la notación estándar X~B(n,p) para indicar que una variable aleatoria sigue
  una distribución binomial de parámetros n y p.
introduccion: Esta notación compacta resume toda la información necesaria (número de ensayos y probabilidad
  de éxito) para trabajar con una distribución binomial específica.
resumen: La notación $X\sim B(n,p)$ indica que la variable aleatoria $X$ sigue una distribución binomial
  con $n$ ensayos y probabilidad de éxito $p$ en cada ensayo.
explicacion: '![Notación de la distribución binomial](/static/img/probabilidad/binombase/binombase-notacion-binomial.svg)


  ### Definición formal


  $X\sim B(n,p)$ se lee ''X sigue una distribución binomial de parámetros n y p'', donde $n$ es el número
  de ensayos y $p$ la probabilidad de éxito en cada uno.


  ### Desarrollo didáctico


  Si se lanza una moneda 10 veces y $X$ es el número de caras obtenidas, se escribe $X\sim B(10;\,0{,}5)$,
  indicando 10 ensayos con probabilidad de éxito 0,5 en cada uno.'
procedimiento:
- 'Paso 1: Identifica el número de ensayos n del experimento.'
- 'Paso 2: Identifica la probabilidad de éxito p en cada ensayo.'
- 'Paso 3: Escribe la notación X~B(n,p), sustituyendo los valores específicos de n y p del problema.'
ejemplos:
- titulo: Escribir la notación para lanzar una moneda 10 veces
  enunciado: X=número de caras al lanzar una moneda 10 veces.
  solucion_pasos:
  - X~B(10; 0,5), ya que n=10 y p=0,5 (probabilidad de cara).
- titulo: Escribir la notación para un examen de 20 preguntas al azar
  enunciado: X=número de respuestas correctas al azar en 20 preguntas de verdadero/falso.
  solucion_pasos:
  - X~B(20; 0,5), ya que n=20 y p=0,5 (probabilidad de acertar al azar en cada pregunta).
- titulo: ¿La notación X~B(n,p) incluye toda la información necesaria de la distribución?
  respuesta: Sí
  solucion_pasos:
  - Sí, con n y p se puede calcular cualquier probabilidad asociada a la distribución binomial.
- titulo: ¿El orden de los parámetros en la notación es siempre (n,p) y no (p,n)?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, es la convención estándar: primero el número de ensayos, luego la probabilidad de éxito.'
errores_frecuentes:
- Invertir el orden de los parámetros, escribiendo B(p,n) en vez de B(n,p).
- Olvidar identificar correctamente el valor de p a partir del contexto del problema antes de escribir
  la notación.
- Confundir esta notación con la de otras distribuciones de probabilidad (como la normal o la de Poisson).
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
