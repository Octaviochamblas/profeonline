semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.PUNTO_MEDIO
titulo: Cálculo del punto medio entre dos puntos del plano cartesiano
objetivo: Calcular el punto medio de un segmento, que es el punto que se encuentra a igual distancia de
  sus dos extremos, promediando las coordenadas de ambos.
introduccion: El punto medio divide al segmento exactamente en dos partes iguales, y se obtiene calculando
  el promedio (media aritmética) de las coordenadas x, y por separado el de las coordenadas y.
resumen: El punto medio entre $(x_1,y_1)$ y $(x_2,y_2)$ es $M=\left(\dfrac{x_1+x_2}{2},\dfrac{y_1+y_2}{2}\right)$.
explicacion: '![Punto medio entre dos puntos](/static/img/geometria/analitica/posrc-punto-medio.svg)


  ### Definición formal


  El punto medio $M$ de un segmento con extremos $(x_1,y_1)$ y $(x_2,y_2)$ tiene coordenadas $M=\left(\dfrac{x_1+x_2}{2},\dfrac{y_1+y_2}{2}\right)$.


  ### Desarrollo didáctico


  Para $A(-3,-2)$ y $B(3,4)$: $M=\left(\dfrac{-3+3}{2},\dfrac{-2+4}{2}\right)=(0,1)$.'
procedimiento:
- 'Paso 1: Identifica las coordenadas de los dos extremos del segmento.'
- 'Paso 2: Suma las coordenadas x de ambos puntos y divide por 2.'
- 'Paso 3: Suma las coordenadas y de ambos puntos y divide por 2.'
ejemplos:
- titulo: Calcular el punto medio entre A(-3,-2) y B(3,4)
  enunciado: A(-3,-2), B(3,4).
  solucion_pasos:
  - M=((-3+3)/2, (-2+4)/2)=(0,1).
- titulo: Calcular el punto medio entre (0,0) y (6,8)
  enunciado: (0,0), (6,8).
  solucion_pasos:
  - M=(3,4).
- titulo: ¿El punto medio está siempre a igual distancia de ambos extremos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad que lo define.
- titulo: ¿El orden de los puntos afecta el cálculo del punto medio?
  respuesta: 'No'
  solucion_pasos:
  - No, la suma es conmutativa, por lo que el resultado es el mismo sin importar el orden.
errores_frecuentes:
- Sumar las coordenadas correctas pero olvidar dividir por 2 al final.
- Confundir las coordenadas x e y al calcular cada promedio por separado.
- Calcular el punto medio como la resta en vez de la suma de las coordenadas.
fuente: Elaboración propia.
estado: publicado
