semantic_id: MAT.ALG.FUNC_CUADR_VERTICE.VALOR_EXTREMO
titulo: Interpretación del valor extremo de la función cuadrática
objetivo: Interpretar correctamente qué representa la coordenada $y$ del vértice como el valor extremo (máximo
  o mínimo) alcanzable por la función.
introduccion: 'La coordenada $y$ del vértice no es un valor cualquiera: es el límite absoluto que la función puede
  alcanzar, ya sea hacia arriba o hacia abajo.'
resumen: 'El **valor extremo** de una función cuadrática es la coordenada $y_v$ de su vértice: el valor más pequeño
  que la función puede tomar (si $a>0$) o el más grande (si $a<0$), y ningún otro valor de la función lo supera
  en esa dirección.'
explicacion: '### Definición formal


  Si $(x_v,y_v)$ es el vértice de $f(x)=ax^2+bx+c$, entonces $y_v$ es el valor extremo de la función: si $a>0$,
  $y_v=\min\{f(x):x\in\mathbb{R}\}$; si $a<0$, $y_v=\max\{f(x):x\in\mathbb{R}\}$.


  ### Desarrollo didáctico


  Interpretar el valor extremo implica afirmar con seguridad que ningún otro valor de $x$ produce un resultado
  más extremo: para $a>0$, ningún $x$ da un $f(x)$ menor que $y_v$; para $a<0$, ninguno da un $f(x)$ mayor.


  Para $f(x)=x^2-4x+7$, con vértice $(2,3)$: el valor extremo es $3$, y se puede afirmar que $f(x)\geq3$ para
  todo $x$ real, sin excepción.'
procedimiento:
- 'Paso 1: Calcula el vértice $(x_v,y_v)$ de la función.'
- 'Paso 2: Identifica si $y_v$ es un mínimo o un máximo según el signo de $a$.'
- 'Paso 3: Interpreta $y_v$ como el límite absoluto de la función en esa dirección.'
ejemplos:
- titulo: Interpretación de un valor extremo mínimo
  enunciado: 'Con vértice $(3,-2)$ y $a>0$, ¿qué se puede afirmar sobre los valores de $f(x)$?'
  solucion_pasos:
  - El valor extremo es un mínimo.
  - '$f(x)\geq-2$ para todo $x$ real; $-2$ es el valor más pequeño posible.'
- titulo: Interpretación de un valor extremo máximo
  enunciado: 'Con vértice $(1,9)$ y $a<0$, ¿qué se puede afirmar sobre los valores de $f(x)$?'
  solucion_pasos:
  - El valor extremo es un máximo.
  - '$f(x)\leq9$ para todo $x$ real; $9$ es el valor más grande posible.'
- titulo: ¿Puede la función tomar un valor menor que su mínimo (si $a>0$)?
  enunciado: ¿Puede la función tomar un valor menor que su mínimo (si $a>0$)?
  respuesta: 'No'
  solucion_pasos:
  - Por definición, el mínimo es el valor más pequeño que la función puede alcanzar; ningún otro valor es menor.
- titulo: ¿El valor extremo corresponde a la coordenada $x$ o a la coordenada $y$ del vértice?
  enunciado: ¿El valor extremo corresponde a la coordenada $x$ o a la coordenada $y$ del vértice?
  respuesta: 'No'
  solucion_pasos:
  - El valor extremo corresponde exclusivamente a la coordenada $y$ del vértice, no a la coordenada $x$.
errores_frecuentes:
- Confundir el valor extremo (coordenada $y$) con la posición donde ocurre (coordenada $x$).
- Afirmar incorrectamente que el valor extremo es un máximo cuando en realidad es un mínimo, o viceversa.
- No verificar el signo de $a$ antes de interpretar si el valor es un límite superior o inferior.
- Suponer que existen valores de la función más extremos que el del vértice.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
