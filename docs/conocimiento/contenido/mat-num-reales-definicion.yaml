semantic_id: MAT.NUM.REALES.DEFINICION
objetivo: Identificar si un número pertenece a \(\mathbb{R}\).
introduccion: Las mediciones exigen tanto fracciones como raíces no exactas. El conjunto
  \(\mathbb{R}\) ofrece un mismo espacio para trabajar con ambas clases de números.
resumen: Los números reales reúnen todos los racionales y todos los irracionales.
  Cada número real corresponde a un punto de la recta numérica.
explicacion: |-
  Los números reales reúnen todos los racionales y todos los irracionales.

  El cálculo “\(-3\), \(\frac25\), \(\sqrt2\) y \(\pi\) son reales” muestra por qué cada número real corresponde a un punto de la recta numérica
procedimiento:
- 'Paso 1: Determina si el número es racional o irracional.'
- 'Paso 2: Verifica que no dependa de una raíz par de un negativo ni de una división
  por cero.'
- 'Paso 3: Ubícalo dentro de \(\mathbb{R}\) indicando, si es posible, el subconjunto
  más específico.'
ejemplos:
- titulo: Aplicación razonada — Definición del conjunto de los números reales
  enunciado: \(-3\), \(\frac25\), \(\sqrt2\) y \(\pi\) son reales.
  solucion_pasos:
  - Determina si el número es racional o irracional.
  - Verifica que no dependa de una raíz par de un negativo ni de una división por
    cero.
  - Ubícalo dentro de \(\mathbb{R}\) indicando, si es posible, el subconjunto más
    específico.
- titulo: Revisión de una solución — Definición del conjunto de los números reales
  enunciado: Una solución aplica “Verifica que no dependa de una raíz par de un negativo
    ni de una división por cero.”, pero termina sin comprobar que cada número real
    corresponde a un punto de la recta numérica. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define definición del conjunto de los números reales:
    los números reales reúnen todos los racionales y todos los irracionales.'
  - Determina si el número es racional o irracional.
  - 'Completa la revisión con este control: Ubícalo dentro de \(\mathbb{R}\) indicando,
    si es posible, el subconjunto más específico.'
- titulo: ¿Se cumple que cada número real corresponde a un punto de la recta numérica?
    — Definición del conjunto de los números reales
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que los números reales reúnen todos los
    racionales y todos los irracionales.
  - El caso “\(-3\), \(\frac25\), \(\sqrt2\) y \(\pi\) son reales” satisface esa condición.
  - Ubícalo dentro de \(\mathbb{R}\) indicando, si es posible, el subconjunto más
    específico.
- titulo: ¿Es válido omitir el paso “Determina si el número es racional o irracional”?
    — Definición del conjunto de los números reales
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de definición del conjunto de los
    números reales.
  - 'Omitirlo puede volver inválida la acción siguiente: Verifica que no dependa de
    una raíz par de un negativo ni de una división por cero.'
  - 'La solución debe terminar de este modo: Ubícalo dentro de \(\mathbb{R}\) indicando,
    si es posible, el subconjunto más específico.'
errores_frecuentes:
- 'Confundir definición del conjunto de los números reales con otro concepto y omitir
  este inicio: Determina si el número es racional o irracional.'
- Aplicar mecánicamente “Verifica que no dependa de una raíz par de un negativo ni
  de una división por cero.” sin revisar las condiciones de la definición.
- Tomar “\(-3\), \(\frac25\), \(\sqrt2\) y \(\pi\) son reales” como una igualdad aislada,
  sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “cada número real corresponde
  a un punto de la recta numérica”.
- 'Terminar el desarrollo sin realizar este control: Ubícalo dentro de \(\mathbb{R}\)
  indicando, si es posible, el subconjunto más específico.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
