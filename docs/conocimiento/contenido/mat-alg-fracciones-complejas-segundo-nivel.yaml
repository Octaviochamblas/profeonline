semantic_id: MAT.ALG.FRACCIONES_COMPLEJAS.SEGUNDO_NIVEL
titulo: Resolución de Fracciones de Segundo Nivel
objetivo: Resolver fracciones complejas simples convirtiéndolas en multiplicaciones invertidas.
introduccion: Una vez que 'acuestas' la fracción compleja (pasándola a horizontal), el problema pasa de ser una
  torre intimidante a un simple ejercicio de multiplicación que ya dominas.
resumen: Para resolver una fracción compleja simple, convierte la línea principal en $\div$, y luego aplica 'Mantener,
  Cambiar, Voltear' para multiplicar.
explicacion: '### Definición formal


  Esta regla es equivalente a invertir y multiplicar: (A/B) * (D/C) = AD / BC.


  ### Desarrollo didáctico


  El famoso truco para resolver la fracción compleja en el último paso, una vez que lograste aplanar ambos pisos
  a formas simples, se conoce de múltiples formas: regla del sándwich, ley de la oreja, o multiplicación de extremos
  por medios.


  Tienes la estructura purificada: $\frac{\frac{A}{B}}{\frac{C}{D}}$


  Esto es equivalente a $\frac{A}{B} \div \frac{C}{D}$.

  Si recuerdas la regla de división (Mantener, Cambiar, Voltear), esto se vuelve $\frac{A}{B} \cdot \frac{D}{C}
  = \frac{AD}{BC}$.


  **La Regla del Sándwich visualizada:**

  1. Multiplicas los elementos de afuera (los tapas del pan): El de más arriba ($A$) y el de más abajo ($D$). Ellos
  forman el nuevo Numerador ($AD$).

  2. Multiplicas los elementos del medio (el relleno): Los que están cerca de la línea gruesa central ($B$ y $C$).
  Ellos forman el nuevo Denominador ($BC$).


  Resultado final en un paso: $\frac{AD}{BC}$. Rápido y sin dolor.'
procedimiento:
- 'Paso 1: Transforma la fracción compleja en una división horizontal.'
- 'Paso 2: Cambia el $\div$ por $\cdot$ e invierte la segunda fracción.'
- 'Paso 3: Factoriza si es necesario.'
- 'Paso 4: Cancela factores comunes cruzados y resuelve.'
ejemplos:
- titulo: Calcula $\frac{\frac{1}{a^2}}{\frac{2}{a}}$
  enunciado: Calcula $\frac{\frac{1}{a^2}}{\frac{2}{a}}$.
  solucion_pasos:
  - 'Horizontal: $\frac{1}{a^2} \div \frac{2}{a}$.'
  - 'Multiplicación: $\frac{1}{a^2} \cdot \frac{a}{2}$.'
  - Tachamos una 'a' de arriba con una de abajo.
  - 'Resultado: $\frac{1}{2a}$.'
- titulo: Resuelve $\frac{m}{\frac{1}{m}}$.
  solucion_pasos:
  - m ÷ (1/m) = m * (m/1) = m^2.
- titulo: 'Respecto de «Simplificación de fracción algebraica compleja de segundo nivel»: ¿Es correcta'
  enunciado: 'Respecto de «Simplificación de fracción algebraica compleja de segundo nivel»: ¿Es correcta esta caracterización?
    «Para resolver una fracción compleja simple, convierte la línea principal en $\div$, y luego aplica ''Mantener,
    Cambiar, Voltear'' para multiplicar»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para resolver una fracción compleja simple, convierte la línea
    principal en $\div$, y luego aplica ''Mantener, Cambiar, Voltear'' para multiplicar.'
- titulo: 'Respecto de «Simplificación de fracción algebraica compleja de segundo nivel»: ¿Es válida es'
  enunciado: 'Respecto de «Simplificación de fracción algebraica compleja de segundo nivel»: ¿Es válida esta afirmación?
    «Intentar cancelar ''extremos con medios'' sin transformar primero, causando confusiones visuales (ley de la
    oreja o sándwich hecha a medias)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para resolver una fracción compleja simple, convierte la línea
    principal en $\div$, y luego aplica ''Mantener, Cambiar, Voltear'' para multiplicar.'
errores_frecuentes:
- Intentar cancelar 'extremos con medios' sin transformar primero, causando confusiones visuales (ley de la oreja
  o sándwich hecha a medias).
- Para «¿Cuál es la famosa regla rápida de los "extremos y medios" (o del sándwich/oreja) para resolver $\frac{\frac{A}{B}}{\frac{C}{D}}$»,
  la respuesta correcta es El producto de los extremos (A y C) se divide por los medios (B y D).
- Para «¿Cuál es la famosa regla rápida de los "extremos y medios" (o del sándwich/oreja) para resolver $\frac{\frac{A}{B}}{\frac{C}{D}}$»,
  la respuesta correcta es Se suman los extremos y se dividen por los medios.
- Para «¿Cuál es la famosa regla rápida de los "extremos y medios" (o del sándwich/oreja) para resolver $\frac{\frac{A}{B}}{\frac{C}{D}}$»,
  la respuesta correcta es Se cancelan los extremos.
- Para «Usa la regla o el método horizontal para resolver $\frac{\frac{4}{x-2}}{\frac{8}{x-2}}$.», la respuesta
  correcta es $2$.
