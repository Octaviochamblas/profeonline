semantic_id: MAT.EST.MEDIA_PROMEDIO.DEFINICION_DATOS_NO_AGRUPADOS
titulo: Definir la media aritmética para datos no agrupados
objetivo: Definir la media aritmética (promedio) como la suma de todos los datos dividida por el número
  total de datos, para datos no agrupados.
introduccion: La media aritmética es la medida de tendencia central más conocida y utilizada, representando
  el valor 'típico' o central de un conjunto de datos.
resumen: La media aritmética $\bar{x}$ de un conjunto de datos no agrupados es la suma de todos los valores
  dividida por el número total de datos.
explicacion: '![Definición de media aritmética](/static/img/estadistica/promedio/media-definicion-no-agrupados.svg)


  ### Definición formal


  $\bar{x}=\dfrac{x_1+x_2+\cdots+x_n}{n}=\dfrac{\sum x_i}{n}$, donde $n$ es el número total de datos.


  ### Desarrollo didáctico


  Si las notas de 5 estudiantes son 5, 6, 4, 7, 6, la media es $\bar{x}=(5+6+4+7+6)/5=28/5=5{,}6$.'
procedimiento:
- 'Paso 1: Suma todos los valores del conjunto de datos.'
- 'Paso 2: Cuenta el número total de datos (n).'
- 'Paso 3: Divide la suma total por n para obtener la media.'
ejemplos:
- titulo: Calcular la media de un conjunto de notas
  enunciado: 'Notas: 5, 6, 4, 7, 6.'
  solucion_pasos:
  - Suma=5+6+4+7+6=28. n=5. Media=28/5=5,6.
- titulo: Calcular la media de un conjunto de edades
  enunciado: 'Edades: 12, 14, 13, 15.'
  solucion_pasos:
  - Suma=12+14+13+15=54. n=4. Media=54/4=13,5.
- titulo: ¿La media siempre debe coincidir exactamente con uno de los datos originales?
  respuesta: 'No'
  solucion_pasos:
  - No, la media puede ser un valor distinto a todos los datos individuales, incluso decimal.
- titulo: ¿La media se calcula sumando todos los datos y dividiendo por el total de datos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición estándar de la media aritmética.
errores_frecuentes:
- Dividir por un número incorrecto de datos (n), especialmente si se omite algún dato al contar.
- Sumar mal los valores del conjunto de datos, generando un resultado incorrecto en la media.
- Confundir la media con la mediana o la moda, aplicando el procedimiento equivocado.
fuente: 'Elaboración propia (referencia: Moraleja 359, Santillana 38).'
estado: publicado
