semantic_id: MAT.NUM.INTERES_SIMPLE.MONTO_FINAL
titulo: Cálculo del monto final en interés simple
objetivo: Diferenciar y calcular el monto final acumulado versus solo el interés ganado en un régimen
  simple.
introduccion: Si le prestas 100 lucas a un amigo y te devuelve solo las 10 lucas de interés, ¡perdiste
  90 lucas! Al final del plazo, debe devolverte el Capital inicial MÁS los intereses. Eso es el Monto
  Final.
resumen: 'El Monto Final ($M$ o $C_f$) es la suma del Capital prestado ($C$) más los intereses generados
  ($I$). Fórmula directa: $M = C \cdot (1 + i \cdot t)$.'
explicacion: 'A menudo los problemas preguntan por ''¿cuánto retirará en total del banco?'' o ''¿cuál
  es la deuda total a pagar?''. No basta con calcular la ganancia ($I$). Debes calcular el **Monto Final
  ($M$)**.


  Hay dos caminos:

  1. **Camino largo (en dos pasos):** Calculas el interés $I = C \cdot i \cdot t$ y luego se lo sumas
  al capital original: $M = C + I$.

  2. **Camino directo (Factorización):** Como $M = C + (C \cdot i \cdot t)$, si factorizamos $C$ nos queda:

  $$M = C \cdot (1 + i \cdot t)$$

  Este paréntesis $(1 + i \cdot t)$ actúa como el gran factor multiplicador del interés simple total.'
procedimiento:
- 'Paso 1: Identifica si el problema pide ''cuánto ganó de interés'' (solo I) o ''cuánto retiró en total''
  (M).'
- 'Paso 2: Transforma la tasa $i$ a decimal.'
- 'Paso 3: Si pide el total, usa la fórmula $M = C \cdot (1 + i \cdot t)$, asegurándote de que $i$ y $t$
  estén en la misma unidad de tiempo.'
ejemplos:
- titulo: Retiro total del banco
  enunciado: Guardas $20.000 al 3% anual simple durante 4 años. ¿Cuánto dinero retiras en total al final?
  solucion_pasos:
  - C = 20.000, i = 0.03, t = 4.
  - Monto = $20.000 \cdot (1 + 0.03 \cdot 4)$.
  - Monto = $20.000 \cdot (1 + 0.12) = 20.000 \cdot 1.12$.
  - Monto = $22.400$. Ese es el total a retirar.
errores_frecuentes:
- Responder solo con el valor del interés cuando la pregunta dice explícitamente 'monto final' o 'total
  a pagar'.
- Sumarle 1 a la tasa antes de multiplicar por el tiempo (hacer $C \cdot (1+i) \cdot t$ es un error algebraico
  grave).
fuente: Currículum Nacional MINEDUC.
estado: publicado
