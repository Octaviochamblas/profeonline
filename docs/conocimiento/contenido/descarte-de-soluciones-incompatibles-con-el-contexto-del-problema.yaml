semantic_id: MAT.ALG.MODELAMIENTO_DESIGUALDADES.DESCARTE_SOLUCION_CONTEXTUAL
titulo: Descarte de soluciones incompatibles con el contexto del problema
objetivo: Evaluar si una solución algebraica es admisible o debe descartarse por las condiciones del contexto.
introduccion: A veces la cuenta algebraica entrega un valor correcto desde el punto de vista simbólico,
  pero absurdo desde el punto de vista real. No toda solución matemática sirve como respuesta contextual.
resumen: Descartar una solución contextual significa rechazar valores que contradicen el sentido del problema,
  aunque satisfagan la desigualdad en forma puramente algebraica.
explicacion: '### Definición formal


  Sea $S$ el conjunto solución algebraico de un modelo y sea $D$ el conjunto de valores permitidos por
  el contexto (por ejemplo, $x \geq 0$, $x \in \mathbb{Z}$ o cotas materiales del problema). El conjunto
  de respuestas válidas es

  $$S_{\text{válido}} = S \cap D.$$

  Una solución se descarta cuando pertenece a $S$ pero no pertenece a $D$. El descarte no corrige el desarrollo
  algebraico: solo reconoce que el modelo debe interpretarse dentro de condiciones semánticas adicionales.


  ### Desarrollo didáctico


  Si una desigualdad dice que "puedes comprar a lo más $6.25$ cuadernos", el álgebra está bien, pero el
  contexto obliga a pensar en cantidades enteras. Entonces la respuesta útil no es "6.25 cuadernos", sino
  la mayor cantidad entera que aún cumple la restricción.

  Este análisis es clave para no responder con valores imposibles, negativos o incompatibles con el mundo
  real.'
procedimiento:
- 'Paso 1: Obtén el conjunto solución algebraico del modelo.'
- 'Paso 2: Revisa qué condiciones adicionales impone el contexto: no negatividad, enteros, capacidad máxima,
  etcétera.'
- 'Paso 3: Compara cada tipo de valor permitido por el álgebra con esas condiciones contextuales.'
- 'Paso 4: Descarta los valores que violen el significado real de la variable.'
- 'Paso 5: Formula la respuesta final usando solo soluciones compatibles con el problema.'
ejemplos:
- titulo: Cantidad discreta de productos
  enunciado: La desigualdad de un problema entrega $x \leq 6.25$, donde $x$ representa la cantidad de
    cajas que pueden comprarse. Explica qué valores deben descartarse.
  solucion_pasos:
  - Algebraicamente, cualquier número real menor o igual que $6.25$ cumple la desigualdad.
  - Como $x$ representa cajas, solo tienen sentido valores enteros no negativos.
  - Deben descartarse los valores fraccionarios y la interpretación contextual útil llega hasta $x=6$.
- titulo: Tiempo no negativo
  enunciado: En un modelo de duración se obtiene $t > -2$. Explica por qué el contexto modifica la interpretación.
  solucion_pasos:
  - Algebraicamente, la solución incluye todos los reales mayores que $-2$.
  - Si $t$ representa tiempo transcurrido, los valores negativos no son admisibles en ese contexto.
  - La interpretación contextual habitual pasa a ser $t \geq 0$.
- titulo: ¿Una solución fraccionaria puede descartarse si la variable representa personas?
  respuesta: Sí
  solucion_pasos:
  - Las personas se cuentan en números enteros.
  - Aunque el modelo algebraico admita fracciones, el contexto impone una restricción de integralidad.
- titulo: ¿Si un valor satisface la desigualdad, siempre debe aceptarse como respuesta final?
  respuesta: 'No'
  solucion_pasos:
  - Además de satisfacer la desigualdad, la solución debe respetar el significado de la variable y las
    condiciones del problema.
  - Por eso algunas soluciones algebraicamente válidas se descartan en la interpretación final.
errores_frecuentes:
- Aceptar cantidades negativas cuando el contexto representa objetos o personas.
- Dar como respuesta final un valor fraccionario para una variable discreta sin justificarlo.
- Creer que interpretar el contexto modifica la resolución algebraica original.
- Descartar valores válidos solo por intuición, sin revisar las restricciones del problema.
- Omitir en la respuesta final la condición contextual que justifica el descarte.
