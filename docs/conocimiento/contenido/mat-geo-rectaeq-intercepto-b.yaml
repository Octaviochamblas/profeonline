semantic_id: MAT.GEO.RECTA_ECUACIONES.INTERCEPTO_B
titulo: Identificación del coeficiente de posición b como intercepto con el eje Y
objetivo: Identificar el coeficiente de posición b en la ecuación principal de una recta como el punto
  donde esta cruza el eje y.
introduccion: El término constante en la ecuación y=mx+b indica exactamente el valor de y cuando x=0,
  es decir, dónde la recta corta el eje vertical.
resumen: En la ecuación $y=mx+b$, el coeficiente de posición $b$ es el valor de $y$ cuando $x=0$, correspondiente
  al punto $(0,b)$ donde la recta corta el eje y.
explicacion: '![Intercepto b con el eje Y](/static/img/geometria/analitica/rectaeq-intercepto-b.svg)


  ### Definición formal


  Evaluando $y=mx+b$ en $x=0$, se obtiene $y=b$. Por lo tanto, el punto $(0,b)$ es siempre el intercepto
  de la recta con el eje y.


  ### Desarrollo didáctico


  En la figura, la recta $y=1{,}5x+2$ corta el eje y en el punto $(0,2)$, ya que al sustituir $x=0$ se
  obtiene $y=2$.'
procedimiento:
- 'Paso 1: Identifica el término constante en la ecuación y=mx+b.'
- 'Paso 2: Reconoce que ese valor es b, el coeficiente de posición.'
- 'Paso 3: El punto (0,b) es el lugar donde la recta corta el eje y.'
ejemplos:
- titulo: Identificar el intercepto con el eje y
  enunciado: y=1,5x+2.
  solucion_pasos:
  - El intercepto con el eje y es el punto (0,2), ya que b=2.
- titulo: Calcular el intercepto evaluando la ecuación en x=0
  enunciado: y=-3x+7.
  solucion_pasos:
  - 'Al sustituir x=0: y=7, por lo que el intercepto es (0,7).'
- titulo: ¿El coeficiente de posición b siempre corresponde a un punto sobre el eje y?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el punto donde x=0, ubicado exactamente sobre el eje y.
- titulo: ¿Una recta puede tener b=0?
  respuesta: Sí
  solucion_pasos:
  - Sí, en ese caso la recta pasa exactamente por el origen (0,0).
errores_frecuentes:
- Confundir el intercepto con el eje y (0,b) con el intercepto con el eje x.
- Olvidar que para encontrar b basta con evaluar la ecuación en x=0.
- Asociar incorrectamente b con la pendiente de la recta.
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
