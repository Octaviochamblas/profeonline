semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.ALTERNOS_EXTERNOS_IGUALDAD
titulo: Propiedad de igualdad de medida de ángulos alternos externos entre paralelas
objetivo: Usar la propiedad de los ángulos alternos externos para justificar una medida y comprobar que
  la propiedad solo puede aplicarse después de verificar que el par elegido realmente es alternos externos.
introduccion: 'En geometría muchas igualdades parecen obvias porque el dibujo ''se ve bien''. Con paralelas
  y transversal conviene ir más lento: primero se nombra bien el par y recién después se transfiere la
  medida.'
resumen: Si dos rectas paralelas son cortadas por una transversal, los ángulos alternos externos tienen
  igual medida. Como idea de control, la propiedad solo puede aplicarse después de verificar que el par
  elegido realmente es alternos externos.
explicacion: 'Si dos rectas paralelas son cortadas por una transversal, los ángulos alternos externos
  tienen igual medida.


  Cuando se analiza “si un alterno externo vale 123°, su alterno externo correspondiente también vale
  123°” conviene evitar la memoria mecánica. El control decisivo es comprobar que la propiedad solo puede
  aplicarse después de verificar que el par elegido realmente es alternos externos.'
procedimiento:
- 'Paso 1: Reconoce un par de ángulos alternos externos en el esquema.'
- 'Paso 2: Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.'
- 'Paso 3: Comprueba que el resultado respete la posición del par y la condición de paralelismo.'
ejemplos:
- titulo: Caso guiado — Igualdad de alternos externos
  enunciado: Si un alterno externo vale 123°, su alterno externo correspondiente también vale 123°.
  solucion_pasos:
  - Reconoce un par de ángulos alternos externos en el esquema.
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: Corrección de una respuesta — Igualdad de alternos externos
  enunciado: Al resolver “si un alterno externo vale 123°, su alterno externo correspondiente también
    vale 123°”, una alumna salta desde el dibujo a la conclusión. Indica qué control geométrico faltó
    y cómo cerrar la solución.
  solucion_pasos:
  - 'Parte de la definición: si dos rectas paralelas son cortadas por una transversal, los ángulos alternos
    externos tienen igual medida.'
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿La interpretación del dibujo es válida? — Igualdad de alternos externos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: si dos rectas paralelas son cortadas por una
    transversal, los ángulos alternos externos tienen igual medida.'
  - En el caso “si un alterno externo vale 123°, su alterno externo correspondiente también vale 123°”
    se observa que la propiedad solo puede aplicarse después de verificar que el par elegido realmente
    es alternos externos.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Igualdad de alternos externos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de propiedad de igualdad de medida de ángulos
    alternos externos entre paralelas.
  - Después del paso “Reconoce un par de ángulos alternos externos en el esquema.” todavía hace falta
    revisar “Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.”.
  - El cierre correcto exige “Comprueba que el resultado respete la posición del par y la condición de
    paralelismo.”.
errores_frecuentes:
- Igualdad de alternos externos significa sumar 180° solo por estar en la parte exterior.
- Para resolver igualdad de alternos externos, basta con el paso “Reconoce un par de ángulos alternos
  externos en el esquema.” y no hace falta revisar “Usa la propiedad correspondiente para relacionar la
  medida conocida con la incógnita.”.
- Si el dibujo parece claro, se puede ignorar que la propiedad solo puede aplicarse después de verificar
  que el par elegido realmente es alternos externos.
- Dos configuraciones distintas representan igualdad de alternos externos solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que el resultado respete la posición
  del par y la condición de paralelismo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
estado: publicado
