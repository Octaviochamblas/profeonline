semantic_id: MAT.GEO.RECTA_ECUACIONES.ECUACION_VECTORIAL
titulo: Reconocimiento de la ecuación vectorial de la recta en el plano
objetivo: Reconocer la ecuación vectorial de una recta, que describe cualquier punto de ella como un punto
  conocido más un múltiplo escalar del vector director.
introduccion: La ecuación vectorial expresa la recta en términos de un punto de referencia y un vector
  director, permitiendo generar todos los puntos de la recta al variar un parámetro.
resumen: La ecuación vectorial de una recta que pasa por el punto $P_0=(x_0,y_0)$ con vector director
  $\vec{d}=(d_1,d_2)$ es $(x,y)=(x_0,y_0)+t(d_1,d_2)$, con $t\in\mathbb{R}$.
explicacion: '![Ecuación vectorial de la recta](/static/img/geometria/analitica/rectaeq-ecuacion-vectorial.svg)


  ### Definición formal


  La ecuación vectorial de una recta es $(x,y)=(x_0,y_0)+t\cdot(d_1,d_2)$, donde $(x_0,y_0)$ es un punto
  conocido de la recta, $(d_1,d_2)$ es su vector director, y $t$ es un parámetro real que genera todos
  los puntos de la recta al variar.


  ### Desarrollo didáctico


  Para la recta que pasa por $(0,1)$ con vector director $(4,3)$: $(x,y)=(0,1)+t(4,3)$. Si $t=1$, se obtiene
  el punto $(4,4)$; si $t=-1$, se obtiene $(-4,-2)$.'
procedimiento:
- 'Paso 1: Identifica un punto conocido (x0,y0) de la recta.'
- 'Paso 2: Identifica el vector director (d1,d2) de la recta.'
- 'Paso 3: Escribe la ecuación (x,y)=(x0,y0)+t(d1,d2), con t como parámetro libre.'
ejemplos:
- titulo: Escribir la ecuación vectorial con punto (0,1) y vector (4,3)
  enunciado: P0=(0,1), d=(4,3).
  solucion_pasos:
  - (x,y)=(0,1)+t(4,3).
- titulo: Obtener un punto de la recta usando un valor específico de t
  enunciado: (x,y)=(0,1)+t(4,3), con t=1.
  solucion_pasos:
  - (x,y)=(0,1)+(4,3)=(4,4).
- titulo: ¿El parámetro t puede tomar cualquier valor real?
  respuesta: Sí
  solucion_pasos:
  - Sí, al variar t sobre todos los reales, se generan todos los puntos de la recta.
- titulo: ¿Existe una única ecuación vectorial para una recta dada?
  respuesta: 'No'
  solucion_pasos:
  - No, se puede usar cualquier punto de la recta y cualquier múltiplo del vector director, dando ecuaciones
    vectoriales distintas mas equivalentes.
errores_frecuentes:
- Confundir el punto de referencia (x0,y0) con el vector director (d1,d2) al escribir la ecuación.
- Olvidar que t es un parámetro variable, no un valor fijo.
- Usar un vector que no sea realmente paralelo a la recta (por ejemplo, un vector normal en su lugar).
fuente: Elaboración propia.
estado: publicado
