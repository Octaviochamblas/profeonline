semantic_id: MAT.ALG.EC_CUADR_MODELO.PROBLEMAS_MOVIMIENTO
titulo: Resolución de problemas de movimiento o altura modelados por ecuaciones cuadráticas
objetivo: Plantear y resolver problemas de altura o movimiento (como el lanzamiento de un objeto) modelados mediante
  ecuaciones de segundo grado.
introduccion: Cuando un objeto se lanza hacia arriba, su altura respecto al tiempo sigue una trayectoria parabólica;
  preguntar cuándo alcanza cierta altura, o cuándo cae al suelo, siempre lleva a una ecuación cuadrática.
resumen: Los problemas de movimiento o altura se modelan con una función cuadrática del tipo $h(t)=-\dfrac{1}{2}gt^2+v_0t+h_0$,
  y se resuelven planteando $h(t)$ igual al valor de altura buscado.
explicacion: '### Definición formal


  La altura de un objeto en movimiento vertical bajo gravedad constante se modela como $h(t)=-\dfrac{1}{2}gt^2+v_0t+h_0$,
  donde $t$ es el tiempo, $v_0$ la velocidad inicial y $h_0$ la altura inicial. Determinar en qué instante $t$
  el objeto alcanza una altura específica $h^*$ equivale a resolver $h(t)=h^*$, una ecuación de segundo grado
  en $t$.


  ### Desarrollo didáctico


  Un caso frecuente es preguntar cuándo el objeto toca el suelo, lo que corresponde a resolver $h(t)=0$; de las
  dos soluciones que entrega la ecuación, solo la de tiempo positivo tiene sentido físico.


  Si $h(t)=-5t^2+20t+25$ (en metros), para saber cuándo toca el suelo se resuelve $-5t^2+20t+25=0$, obteniendo
  $t=5$ o $t=-1$; se descarta $t=-1$ porque el tiempo no puede ser negativo.'
procedimiento:
- 'Paso 1: Identifica la función de altura $h(t)$ dada en el problema.'
- 'Paso 2: Iguala $h(t)$ al valor de altura buscado (por ejemplo, cero si se pregunta cuándo toca el suelo).'
- 'Paso 3: Resuelve la ecuación cuadrática resultante para $t$.'
- 'Paso 4: Descarta las soluciones de tiempo negativo, que no tienen sentido físico.'
ejemplos:
- titulo: Tiempo en que un objeto toca el suelo
  enunciado: 'La altura de un objeto lanzado es $h(t)=-5t^2+15t$ (en metros, con $t$ en segundos). ¿En qué instante
    toca el suelo?'
  solucion_pasos:
  - 'Se resuelve $-5t^2+15t=0$, factorizando: $-5t(t-3)=0$.'
  - '$t=0$ (instante inicial) o $t=3$.'
  - Toca el suelo a los $3$ segundos.
- titulo: Tiempo en que se alcanza una altura específica
  enunciado: 'Con $h(t)=-5t^2+20t$, ¿en qué instante(s) la altura es $15$ m?'
  solucion_pasos:
  - '$-5t^2+20t=15$, equivalente a $-5t^2+20t-15=0$, o $t^2-4t+3=0$.'
  - '$t=1$ o $t=3$, ambos tiempos positivos y válidos.'
  - El objeto alcanza $15$ m en dos instantes: al subir ($t=1$) y al bajar ($t=3$).
- titulo: ¿Puede haber dos instantes distintos en que un objeto alcance la misma altura?
  enunciado: ¿Puede haber dos instantes distintos en que un objeto alcance la misma altura?
  respuesta: Sí
  solucion_pasos:
  - El objeto pasa por la misma altura una vez al subir y otra vez al bajar, salvo que sea exactamente la altura
    máxima.
- titulo: ¿Una solución de tiempo negativo puede representar un instante físicamente válido?
  enunciado: ¿Una solución de tiempo negativo puede representar un instante físicamente válido?
  respuesta: 'No'
  solucion_pasos:
  - El tiempo transcurrido desde el lanzamiento no puede ser negativo, por lo que esas soluciones se descartan.
errores_frecuentes:
- Aceptar como válida una solución de tiempo negativo.
- Olvidar que puede haber dos instantes distintos válidos para una misma altura (subida y bajada).
- Confundir la altura inicial $h_0$ con la altura máxima alcanzada.
- No verificar las unidades o el signo del coeficiente cuadrático (siempre negativo en un modelo de caída bajo
  gravedad).
