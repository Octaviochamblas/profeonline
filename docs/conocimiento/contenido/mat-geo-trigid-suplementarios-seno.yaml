semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.SUPLEMENTARIOS_SENO
titulo: Relación del seno entre ángulos suplementarios
objetivo: Establecer que el seno de un ángulo es igual al seno de su ángulo suplementario (ángulos que
  suman 180°).
introduccion: Dos ángulos son suplementarios si su suma es 180°. En la circunferencia unitaria, los puntos
  correspondientes a ángulos suplementarios tienen la misma coordenada y (altura), por lo que comparten
  el mismo seno.
resumen: Si $x$ y $180°-x$ son ángulos suplementarios, se cumple $\sin(180°-x)=\sin x$.
explicacion: '![Seno de ángulos suplementarios](/static/img/geometria/trigonometria/trigid-suplementarios-seno.svg)


  ### Definición formal


  Para cualquier ángulo $x$, se cumple $\sin(180°-x)=\sin x$, ya que el punto correspondiente a $180°-x$
  en la circunferencia unitaria es el reflejo horizontal del punto correspondiente a $x$, con la misma
  coordenada y.


  ### Desarrollo didáctico


  En la figura, θ=50° y su suplementario 180°-θ=130°. Ambos ángulos tienen el mismo seno, ya que sus puntos
  en la circunferencia unitaria están a la misma altura (misma coordenada y), aunque con coordenada x
  de signo opuesto.'
procedimiento:
- 'Paso 1: Verifica que los dos ángulos sumen 180° (sean suplementarios).'
- 'Paso 2: Aplica sin(180°-x)=sinx.'
- 'Paso 3: Usa esta relación para obtener el seno de un ángulo obtuso a partir del seno de su suplementario
  agudo.'
ejemplos:
- titulo: Verificar la relación con 50° y 130°
  enunciado: θ=50°, suplementario 130°.
  solucion_pasos:
  - sin50°=sin130°, por ser ángulos suplementarios.
- titulo: Calcular sin(150°) usando el suplementario
  enunciado: sin30°=0,5.
  solucion_pasos:
  - sin150°=sin(180°-150°)=sin30°=0,5.
- titulo: ¿El seno de un ángulo obtuso puede calcularse usando su suplementario agudo?
  respuesta: Sí
  solucion_pasos:
  - Sí, esta identidad permite justamente eso.
- titulo: ¿La suma de dos ángulos suplementarios es siempre 180°?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición de ángulos suplementarios.
errores_frecuentes:
- Confundir ángulos suplementarios (suman 180°) con complementarios (suman 90°).
- Aplicar esta identidad al coseno en vez de al seno.
- Olvidar que esta relación NO cambia el signo del seno (a diferencia del coseno).
fuente: Elaboración propia.
estado: publicado
