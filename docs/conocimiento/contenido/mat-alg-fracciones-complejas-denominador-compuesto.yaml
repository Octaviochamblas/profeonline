semantic_id: MAT.ALG.FRACCIONES_COMPLEJAS.DENOMINADOR_COMPUESTO
titulo: Fracciones con Sumas en los Pisos
objetivo: Resolver fracciones complejas que contienen operaciones de suma o resta en el numerador o denominador
  global.
introduccion: Aquí la dificultad sube un nivel. A veces, el 'piso' de arriba o de abajo no es una sola fracción,
  sino una suma o resta de varias cosas. No puedes voltear una suma directamente.
resumen: Antes de poder aplicar la división (voltear y multiplicar), debes resolver por completo cualquier suma
  o resta presente en el numerador o denominador global para condensarlos en una ÚNICA fracción.
explicacion: '### Definición formal


  No puedes usar la ley del sándwich ni invertir el divisor si este consta de dos sumandos separados.


  ### Desarrollo didáctico


  A menudo, el ''piso de arriba'' o el ''piso de abajo'' no son fracciones simples listas para la regla del sándwich,
  sino una ensalada de fracciones sumándose o restándose. Por ejemplo, el denominador principal es $(1 + \frac{1}{x})$.


  Antes de intentar la ley del sándwich, **tienes la obligación de convertir esa ensalada en una única fracción
  compacta**.


  Para el ejemplo $(1 + \frac{1}{x})$:

  1. Imagina que el 1 es una fracción: $\frac{1}{1}$.

  2. Súmala a $\frac{1}{x}$ usando el MCM (que es ''x'').

  3. Amplifica la primera: $\frac{x}{x} + \frac{1}{x}$.

  4. Suma los numeradores: $\frac{x+1}{x}$.


  Listo. Tu piso rebelde ha sido compactado en una hermosa fracción. Haz lo mismo con el otro piso y ahora sí podrás
  aplicar la ley del sándwich sin problemas.'
procedimiento:
- 'Paso 1: Trata el numerador global como un ejercicio independiente y resuélvelo hasta que quede como una sola
  fracción.'
- 'Paso 2: Haz lo mismo con el denominador global.'
- 'Paso 3: Reescribe la fracción compleja con tus dos fracciones únicas.'
- 'Paso 4: Aplica ''extremos y medios'' o conviértelo en multiplicación.'
ejemplos:
- titulo: Simplifica $\frac{\frac{1}{a} + \frac{1}{b}}{\frac{1}{ab}}$
  enunciado: Simplifica $\frac{\frac{1}{a} + \frac{1}{b}}{\frac{1}{ab}}$.
  solucion_pasos:
  - 'Numerador: $\frac{1}{a} + \frac{1}{b} = \frac{b+a}{ab}$.'
  - 'Torre: $\frac{\frac{b+a}{ab}}{\frac{1}{ab}}$.'
  - 'Horizontal: $\frac{b+a}{ab} \cdot \frac{ab}{1}$.'
  - 'Cancela $ab$. Resultado: $b+a$ o $a+b$.'
- titulo: ¿Qué haces primero en $\frac{2}{\frac{x}{3} - 1}$?
  solucion_pasos:
  - Se debe condensar el denominador antes de cualquier división.
- titulo: 'Respecto de «Simplificación de fracción algebraica con denominador compuesto»: ¿Es correcta'
  enunciado: 'Respecto de «Simplificación de fracción algebraica con denominador compuesto»: ¿Es correcta esta caracterización?
    «Antes de poder aplicar la división (voltear y multiplicar), debes resolver por completo cualquier suma o resta
    presente en el numerador o denominador global para condensarlos en una ÚNICA fracción»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Antes de poder aplicar la división (voltear y multiplicar),
    debes resolver por completo cualquier suma o resta presente en el numerador o denominador global para condensarlos
    en una ÚNICA fracción.'
- titulo: 'Respecto de «Simplificación de fracción algebraica con denominador compuesto»: ¿Es válida es'
  enunciado: 'Respecto de «Simplificación de fracción algebraica con denominador compuesto»: ¿Es válida esta afirmación?
    «Intentar cancelar términos sueltos de las sumas con otras partes de la fracción (ej. tachar los 1 en el problema
    de arriba)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Antes de poder aplicar la división (voltear y multiplicar),
    debes resolver por completo cualquier suma o resta presente en el numerador o denominador global para condensarlos
    en una ÚNICA fracción.'
errores_frecuentes:
- Intentar cancelar términos sueltos de las sumas con otras partes de la fracción (ej. tachar los 1 en el problema
  de arriba).
- Para «Si el denominador global de una fracción compleja es $x + \frac{1}{y}$, ¿cuál es el paso OBLIGATORIO antes
  de transformarlo en multiplicación», la respuesta correcta es Multiplicar todo por x.
- Para «Si el denominador global de una fracción compleja es $x + \frac{1}{y}$, ¿cuál es el paso OBLIGATORIO antes
  de transformarlo en multiplicación», la respuesta correcta es Dar la vuelta solo al 1/y.
- Para «Si el denominador global de una fracción compleja es $x + \frac{1}{y}$, ¿cuál es el paso OBLIGATORIO antes
  de transformarlo en multiplicación», la respuesta correcta es Tachar la y con el numerador global.
- $\frac{x-2}{x^2}$.
