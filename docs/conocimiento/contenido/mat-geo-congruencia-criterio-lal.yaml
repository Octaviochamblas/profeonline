semantic_id: MAT.GEO.CONGRUENCIA_TRIANGULOS.CRITERIO_LAL
titulo: 'Criterio de congruencia LAL: lado, ángulo comprendido, lado'
objetivo: Aplicar el criterio LAL para determinar que dos triángulos son congruentes cuando dos lados
  y el ángulo comprendido entre ellos son iguales.
introduccion: Un segundo criterio abreviado de congruencia, aún más económico en cuanto a datos necesarios
  en ciertos contextos, es el criterio LAL, que combina dos lados y el ángulo entre ellos.
resumen: El criterio LAL establece que dos triángulos son congruentes si tienen dos lados correspondientes
  iguales y el ángulo comprendido entre esos lados también es igual.
explicacion: '![Criterio de congruencia LAL](/static/img/geometria/congruencia-semejanza/congruencia-criterio-lal.svg)


  ### Definición formal


  Si en $\triangle ABC$ y $\triangle A''B''C''$ se cumple $AB=A''B''$, $\angle A=\angle A''$ y $AC=A''C''$
  (con el ángulo A comprendido entre los lados AB y AC), entonces $\triangle ABC\cong\triangle A''B''C''$.


  ### Desarrollo didáctico


  Es esencial que el ángulo usado sea el que está exactamente entre los dos lados conocidos (el ángulo
  "comprendido"); si se usa un ángulo distinto, no se puede garantizar la congruencia con solo esos tres
  datos.'
procedimiento:
- 'Paso 1: Identifica dos lados de cada triángulo que quieras comparar.'
- 'Paso 2: Verifica que el ángulo comprendido entre esos dos lados también sea igual en ambos triángulos.'
- 'Paso 3: Si los dos lados y el ángulo comprendido coinciden, concluye congruencia por LAL.'
ejemplos:
- titulo: Verificar congruencia con dos lados y el ángulo comprendido
  enunciado: Un triángulo tiene lados 5 y 7 con ángulo comprendido de 40°; otro tiene lados 5 y 7 con
    ángulo comprendido de 40°.
  solucion_pasos:
  - Son congruentes por el criterio LAL.
- titulo: Detectar cuando el ángulo no es el comprendido
  enunciado: Dos triángulos comparten dos lados iguales, pero el ángulo igual no está entre esos lados.
  solucion_pasos:
  - No se puede aplicar LAL; ese caso corresponde a otro criterio (LLA mayor), con condiciones distintas.
- titulo: ¿El ángulo debe estar exactamente entre los dos lados conocidos?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la condición esencial del criterio LAL.
- titulo: ¿LAL requiere conocer el tercer lado?
  respuesta: 'No'
  solucion_pasos:
  - No, con dos lados y el ángulo comprendido basta para garantizar congruencia.
errores_frecuentes:
- Usar un ángulo que no está comprendido entre los dos lados conocidos.
- Confundir este criterio con LLA mayor, que tiene condiciones distintas.
- Olvidar verificar que los lados usados sean realmente correspondientes entre ambos triángulos.
fuente: 'Fuente: Cid 58.'
estado: publicado
