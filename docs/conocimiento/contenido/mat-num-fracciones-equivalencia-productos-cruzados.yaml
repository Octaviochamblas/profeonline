semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.PRODUCTOS_CRUZADOS
objetivo: Verificar equivalencia mediante productos cruzados.
introduccion: La afirmación “Los productos cruzados iguales indican fracciones equivalentes,
  siempre que los denominadores no sean cero” se puede comprobar en \(\frac{2}{3}\)
  y \(\frac{4}{6}\) son equivalentes porque \(2\cdot 6 = 3\cdot 4\). Este recurso
  desarrolla el razonamiento de verificación de fracciones equivalentes mediante productos
  cruzados que conecta ambas ideas.
resumen: Para verificar equivalencia entre \(\frac{a}{b}\) y \(\frac{c}{d}\), se comparan
  los productos cruzados \(a\cdot d\) y \(b\cdot c\). Como criterio de control, los
  productos cruzados iguales indican fracciones equivalentes, siempre que los denominadores
  no sean cero
explicacion: |-
  Para verificar equivalencia entre \(\frac{a}{b}\) y \(\frac{c}{d}\), se comparan los productos cruzados \(a\cdot d\) y \(b\cdot c\).

  El ejemplo “\(\frac{2}{3}\) y \(\frac{4}{6}\) son equivalentes porque \(2\cdot 6 = 3\cdot 4\)” lleva la definición a una situación concreta y permite verificar esta consecuencia: Los productos cruzados iguales indican fracciones equivalentes, siempre que los denominadores no sean cero.
procedimiento:
- 'Paso 1: Escribe las fracciones como \(a/b\) y \(c/d\), con denominadores no nulos.'
- 'Paso 2: Calcula \(a\cdot d\) y \(b\cdot c\).'
- 'Paso 3: Concluye que son equivalentes únicamente cuando ambos productos coinciden.'
ejemplos:
- titulo: Aplicación razonada — Verificación de fracciones equivalentes mediante productos
    cruzados
  enunciado: \(\frac{2}{3}\) y \(\frac{4}{6}\) son equivalentes porque \(2\cdot 6
    = 3\cdot 4\).
  solucion_pasos:
  - Escribe las fracciones como \(a/b\) y \(c/d\), con denominadores no nulos.
  - Calcula \(a\cdot d\) y \(b\cdot c\).
  - Concluye que son equivalentes únicamente cuando ambos productos coinciden.
- titulo: Revisión de una solución — Verificación de fracciones equivalentes mediante
    productos cruzados
  enunciado: Una solución aplica “Calcula \(a\cdot d\) y \(b\cdot c\).”, pero termina
    sin comprobar que los productos cruzados iguales indican fracciones equivalentes,
    siempre que los denominadores no sean cero. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define verificación de fracciones equivalentes mediante
    productos cruzados: para verificar equivalencia entre \(\frac{a}{b}\) y \(\frac{c}{d}\),
    se comparan los productos cruzados \(a\cdot d\) y \(b\cdot c\).'
  - Escribe las fracciones como \(a/b\) y \(c/d\), con denominadores no nulos.
  - 'Completa la revisión con este control: Concluye que son equivalentes únicamente
    cuando ambos productos coinciden.'
- titulo: ¿Se cumple que los productos cruzados iguales indican fracciones equivalentes,
    siempre que los denominadores no sean cero? — Verificación de fracciones equivalentes
    mediante productos cruzados
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para verificar equivalencia entre \(\frac{a}{b}\)
    y \(\frac{c}{d}\), se comparan los productos cruzados \(a\cdot d\) y \(b\cdot
    c\).
  - El caso “\(\frac{2}{3}\) y \(\frac{4}{6}\) son equivalentes porque \(2\cdot 6
    = 3\cdot 4\)” satisface esa condición.
  - Concluye que son equivalentes únicamente cuando ambos productos coinciden.
- titulo: ¿Es válido omitir el paso “Escribe las fracciones como \(a/b\) y \(c/d\),
    con denominadores no nulos”? — Verificación de fracciones equivalentes mediante
    productos cruzados
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de verificación de fracciones equivalentes
    mediante productos cruzados.
  - 'Omitirlo puede volver inválida la acción siguiente: Calcula \(a\cdot d\) y \(b\cdot
    c\).'
  - 'La solución debe terminar de este modo: Concluye que son equivalentes únicamente
    cuando ambos productos coinciden.'
errores_frecuentes:
- 'Empezar verificación de fracciones equivalentes mediante productos cruzados sin
  realizar este control inicial: Escribe las fracciones como \(a/b\) y \(c/d\), con
  denominadores no nulos.'
- Memorizar “\(\frac{2}{3}\) y \(\frac{4}{6}\) son equivalentes porque \(2\cdot 6
  = 3\cdot 4\)” como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Calcula \(a\cdot d\) y \(b\cdot c\).” y usarlo aunque
  cambien las condiciones del problema.
- Dar por válida una conclusión sobre verificación de fracciones equivalentes mediante
  productos cruzados que contradice el criterio “Los productos cruzados iguales indican
  fracciones equivalentes, siempre que los denominadores no sean cero”.
- 'Cerrar el ejercicio sin esta comprobación específica: Concluye que son equivalentes
  únicamente cuando ambos productos coinciden.'
