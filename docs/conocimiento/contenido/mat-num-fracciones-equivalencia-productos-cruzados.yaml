semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.PRODUCTOS_CRUZADOS
titulo: Verificación de equivalencia mediante productos cruzados
objetivo: Comprobar si dos fracciones son equivalentes multiplicando en cruz.
introduccion: 'Sin necesidad de simplificar ni amplificar, existe una prueba directa para verificar la
  equivalencia de dos fracciones: comparar los productos cruzados de sus términos.'
resumen: Dos fracciones \(\frac{a}{b}\) y \(\frac{c}{d}\) son equivalentes si y solo si el producto cruzado
  \(a\cdot d\) es igual al producto cruzado \(b\cdot c\).
explicacion: '### Definición formal


  \(\frac{a}{b}=\frac{c}{d}\iff a\cdot d = b\cdot c\), con \(b,d\neq0\). Esta equivalencia se deduce de
  multiplicar ambos lados de la igualdad por \(b\cdot d\).


  ### Desarrollo didáctico


  Para \(\frac{2}{3}\) y \(\frac{4}{6}\): el producto cruzado \(2\cdot6=12\) y \(3\cdot4=12\) son iguales,
  por lo tanto las fracciones son equivalentes, sin necesidad de simplificar ninguna de las dos.'
procedimiento:
- 'Paso 1: Escribe las fracciones como \(a/b\) y \(c/d\), con denominadores no nulos.'
- 'Paso 2: Calcula \(a\cdot d\) y \(b\cdot c\).'
- 'Paso 3: Concluye que son equivalentes únicamente cuando ambos productos coinciden.'
ejemplos:
- titulo: Aplicación razonada — Verificación de fracciones equivalentes mediante productos cruzados
  enunciado: \(\frac{2}{3}\) y \(\frac{4}{6}\) son equivalentes porque \(2\cdot 6 = 3\cdot 4\).
  solucion_pasos:
  - Escribe las fracciones como \(a/b\) y \(c/d\), con denominadores no nulos.
  - Calcula \(a\cdot d\) y \(b\cdot c\).
  - Concluye que son equivalentes únicamente cuando ambos productos coinciden.
- titulo: Revisión de una solución — Verificación de fracciones equivalentes mediante productos cruzados
  enunciado: Una solución aplica “Calcula \(a\cdot d\) y \(b\cdot c\).”, pero termina sin comprobar que
    los productos cruzados iguales indican fracciones equivalentes, siempre que los denominadores no sean
    cero. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define verificación de fracciones equivalentes mediante productos cruzados:
    para verificar equivalencia entre \(\frac{a}{b}\) y \(\frac{c}{d}\), se comparan los productos cruzados
    \(a\cdot d\) y \(b\cdot c\).'
  - Escribe las fracciones como \(a/b\) y \(c/d\), con denominadores no nulos.
  - 'Completa la revisión con este control: Concluye que son equivalentes únicamente cuando ambos productos
    coinciden.'
- titulo: ¿Se cumple que los productos cruzados iguales indican fracciones equivalentes, siempre que los
    denominadores no sean cero? — Verificación de fracciones equivalentes mediante productos cruzados
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para verificar equivalencia entre \(\frac{a}{b}\) y \(\frac{c}{d}\),
    se comparan los productos cruzados \(a\cdot d\) y \(b\cdot c\).
  - El caso “\(\frac{2}{3}\) y \(\frac{4}{6}\) son equivalentes porque \(2\cdot 6 = 3\cdot 4\)” satisface
    esa condición.
  - Concluye que son equivalentes únicamente cuando ambos productos coinciden.
- titulo: ¿Es válido omitir el paso “Escribe las fracciones como \(a/b\) y \(c/d\), con denominadores
    no nulos”? — Verificación de fracciones equivalentes mediante productos cruzados
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de verificación de fracciones equivalentes mediante
    productos cruzados.
  - 'Omitirlo puede volver inválida la acción siguiente: Calcula \(a\cdot d\) y \(b\cdot c\).'
  - 'La solución debe terminar de este modo: Concluye que son equivalentes únicamente cuando ambos productos
    coinciden.'
errores_frecuentes:
- 'Empezar verificación de fracciones equivalentes mediante productos cruzados sin realizar este control
  inicial: Escribe las fracciones como \(a/b\) y \(c/d\), con denominadores no nulos.'
- Memorizar “\(\frac{2}{3}\) y \(\frac{4}{6}\) son equivalentes porque \(2\cdot 6 = 3\cdot 4\)” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Calcula \(a\cdot d\) y \(b\cdot c\).” y usarlo aunque cambien las condiciones
  del problema.
- Dar por válida una conclusión sobre verificación de fracciones equivalentes mediante productos cruzados
  que contradice el criterio “Los productos cruzados iguales indican fracciones equivalentes, siempre
  que los denominadores no sean cero”.
- 'Cerrar el ejercicio sin esta comprobación específica: Concluye que son equivalentes únicamente cuando
  ambos productos coinciden.'
