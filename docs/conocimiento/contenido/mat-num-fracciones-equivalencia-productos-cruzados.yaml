semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.PRODUCTOS_CRUZADOS
objetivo: Comprender verificación de fracciones equivalentes mediante productos cruzados
  y aplicarlo correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso verificación de fracciones equivalentes mediante productos cruzados ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Para verificar equivalencia entre \(\frac{a}{b}\) y \(\frac{c}{d}\), se comparan
  los productos cruzados \(a\cdot d\) y \(b\cdot c\). Además, los productos cruzados
  iguales indican fracciones equivalentes, siempre que los denominadores no sean cero.
explicacion: |-
  Para verificar equivalencia entre \(\frac{a}{b}\) y \(\frac{c}{d}\), se comparan los productos cruzados \(a\cdot d\) y \(b\cdot c\).

  Una idea importante es que los productos cruzados iguales indican fracciones equivalentes, siempre que los denominadores no sean cero.

  Por ejemplo, \(\frac{2}{3}\) y \(\frac{4}{6}\) son equivalentes porque \(2\cdot 6 = 3\cdot 4\).
procedimiento:
- 'Paso 1: Elegir una estrategia conveniente: simplificar, amplificar, usar productos
  cruzados o un denominador común.'
- 'Paso 2: Ejecutar la comparación o transformación paso a paso, cuidando el valor
  de la fracción.'
- 'Paso 3: Interpretar el resultado y expresarlo con lenguaje matemático claro.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{2}{3}\) y \(\frac{4}{6}\) son
    equivalentes porque \(2\cdot 6 = 3\cdot 4\).” se relaciona con verificación de
    fracciones equivalentes mediante productos cruzados.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: para verificar equivalencia entre \(\frac{a}{b}\)
    y \(\frac{c}{d}\), se comparan los productos cruzados \(a\cdot d\) y \(b\cdot
    c\).'
  - Concluye que el ejemplo sí ilustra verificación de fracciones equivalentes mediante
    productos cruzados.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Los productos cruzados iguales indican fracciones
    equivalentes, siempre que los denominadores no sean cero.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con verificación de fracciones equivalentes
    mediante productos cruzados?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que los productos cruzados iguales indican
    fracciones equivalentes, siempre que los denominadores no sean cero.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar verificación de fracciones equivalentes mediante productos
    cruzados ignorando la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar verificación de fracciones equivalentes mediante productos cruzados
  sin mirar qué representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
