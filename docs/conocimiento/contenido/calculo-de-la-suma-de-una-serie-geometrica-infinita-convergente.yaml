semantic_id: MAT.NUM.SERIE_GEOMETRICA.SUMA_INFINITA
titulo: Cálculo de la suma de una serie geométrica infinita convergente
objetivo: Calcular con precisión la suma total de una serie geométrica infinita convergente.
introduccion: Ya pasaste el control del portero. La razón es una fracción válida. Ahora, es el momento
  de aplicar la fórmula más limpia y satisfactoria de todas las progresiones.
resumen: 'Si $|r| < 1$, la suma infinita se calcula resolviendo la fracción **$S_{\infty} = \frac{a_1}{1
  - r}$**. Solo necesitas dos números: el de inicio y la razón.'
explicacion: 'Fórmula: $$S_{\infty} = \frac{a_1}{1 - r}$$


  No te dejes engañar por la simplicidad. El peligro está en el manejo de los signos y las fracciones
  en el denominador.


  Ejemplo con fracciones: Serie infinita de $18, 6, 2, 2/3 \dots$

  - $a_1 = 18$.

  - $r = 6/18 = 1/3$.

  - Aplicamos fórmula: $S_{\infty} = \frac{18}{1 - 1/3}$

  - Truco para el denominador: $1$ es lo mismo que $3/3$. Así que $3/3 - 1/3 = 2/3$.

  - Nos queda: $S_{\infty} = \frac{18}{2/3}$

  - Dividir por una fracción es multiplicar por ella invertida: $18 \cdot \frac{3}{2} = \frac{54}{2} =
  27$.


  ¡La suma de todos esos infinitos números da clavado 27!'
procedimiento:
- 'Paso 1: Detecta $a_1$ y ''r''.'
- 'Paso 2: Resta la razón a 1 ($1 - r$). Ten cuidado si ''r'' es negativa.'
- 'Paso 3: Si el denominador es fracción, conviértelo (1 = 4/4, 1 = 5/5, etc.).'
- 'Paso 4: Divide $a_1$ por el resultado del denominador (regla de la herradura).'
ejemplos:
- titulo: Cuidado con los signos
  enunciado: Calcula la suma infinita de 10 - 5 + 2.5 - 1.25 ...
  solucion_pasos:
  - a1 = 10. r = -5 / 10 = -0.5.
  - 'Fórmula: S = 10 / (1 - (-0.5))'
  - 'Denominador: 1 + 0.5 = 1.5'
  - S = 10 / 1.5 = 100 / 15 = 20 / 3.
  - La suma da exactamente 20/3 (aprox 6.66).
errores_frecuentes:
- 'Olvidar la regla de los signos en el denominador cuando $r$ es negativa: calcular $(1 - 0.5)$ en lugar
  de $(1 - (-0.5))$.'
- Enredarse en la división final cuando el denominador es una fracción (hacer mal la regla de la oreja
  o herradura).
fuente: Currículum Nacional MINEDUC.
estado: publicado
