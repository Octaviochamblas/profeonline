semantic_id: MAT.GEO.SIMETRAL_CIRCUNCENTRO.SIMETRAL_DEFINICION
titulo: Definición de simetral como recta perpendicular a un lado en su punto medio
objetivo: Identificar la simetral de un lado de un triángulo como la recta perpendicular que pasa por
  su punto medio.
introduccion: 'A diferencia de la altura (que parte de un vértice), la simetral no nace en ningún vértice:
  es una recta asociada a un lado, que lo corta perpendicularmente justo en su mitad.'
resumen: La simetral de un segmento es la recta perpendicular a él que pasa exactamente por su punto medio.
explicacion: '![Simetral de un lado del triángulo](/static/img/geometria/elementos-secundarios/simetral-circuncentro-simetral-definicion.svg)


  ### Definición formal


  La simetral del lado BC de un triángulo es la recta perpendicular a BC que pasa por su punto medio M.


  ### Desarrollo didáctico


  Cada triángulo tiene tres simetrales, una por cada lado. A diferencia de las alturas, bisectrices y
  transversales de gravedad, la simetral no pasa necesariamente por ningún vértice del triángulo.'
procedimiento:
- 'Paso 1: Encuentra el punto medio del lado elegido.'
- 'Paso 2: Traza la recta perpendicular a ese lado que pasa por ese punto medio.'
- 'Paso 3: Esa recta es la simetral de ese lado.'
ejemplos:
- titulo: Reconocer una simetral
  enunciado: Se traza una recta perpendicular a BC que pasa por su punto medio.
  solucion_pasos:
  - Esa recta es la simetral de BC.
- titulo: Contar simetrales
  enunciado: ¿Cuántas simetrales tiene un triángulo?
  solucion_pasos:
  - Tiene tres, una por cada lado.
- titulo: ¿La simetral parte de un vértice?
  respuesta: 'No'
  solucion_pasos:
  - No, la simetral está asociada a un lado, no a un vértice.
- titulo: ¿La simetral pasa siempre por el punto medio del lado?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente su condición de definición.
errores_frecuentes:
- Confundir la simetral con la altura o la transversal de gravedad.
- Creer que la simetral parte de un vértice del triángulo.
- Trazar la perpendicular en un punto que no es el punto medio del lado.
fuente: Elaboración propia.
estado: publicado
