errores_frecuentes:
- Sumar las fracciones en lugar de multiplicarlas.
- Omitir la simplificación de la fracción resultante en el coeficiente.
- Para «Al multiplicar $(\frac{3}{4}x^2)$ por $(\frac{2}{3}x)$, ¿cuál es el nuevo coeficiente del monomio
  resultante tras simplificar? (v1)», la respuesta correcta es $\frac{5}{7}$.
- Para «Al multiplicar $(\frac{3}{4}x^2)$ por $(\frac{2}{3}x)$, ¿cuál es el nuevo coeficiente del monomio
  resultante tras simplificar? (v1)», la respuesta correcta es $\frac{6}{12}$.
- Para «Al multiplicar $(\frac{3}{4}x^2)$ por $(\frac{2}{3}x)$, ¿cuál es el nuevo coeficiente del monomio
  resultante tras simplificar? (v1)», la respuesta correcta es $\frac{9}{8}$.
