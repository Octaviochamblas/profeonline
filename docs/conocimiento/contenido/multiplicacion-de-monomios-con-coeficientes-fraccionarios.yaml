semantic_id: MAT.ALG.MULT_MONOMIOS.COEFICIENTES_FRACCIONARIOS
titulo: Multiplicación de monomios con coeficientes fraccionarios
objetivo: Multiplicar monomios con coeficientes fraccionarios, aplicando la multiplicación de fracciones
  y las leyes de exponentes.
introduccion: 'Los coeficientes fraccionarios en los monomios no cambian las reglas algebraicas. La multiplicación
  de fracciones se realiza directamente: numerador por numerador, y denominador por denominador. Las variables
  se operan como siempre.'
resumen: Al multiplicar monomios con **Coeficientes Fraccionarios**, se multiplican los numeradores entre
  sí y los denominadores entre sí para obtener el nuevo coeficiente, simplificando la fracción al final.
  Los exponentes de igual base se suman.
explicacion: "### Definición formal\n\nMultiplicamos: $\\frac{3}{4} \\times \\frac{2}{3} = \\frac{6}{12}$.\
  \ Al simplificar por 6, queda $\\frac{1}{2}$.\n\n### Desarrollo didáctico\n\nMultiplica: $(\\frac{2}{3}x^2y)(\\\
  frac{3}{4}xy^2)$.\n\n1. Multiplicamos coeficientes:\n   $\\frac{2}{3} \\times \\frac{3}{4} = \\frac{2\
  \ \\cdot 3}{3 \\cdot 4} = \\frac{6}{12} = \\frac{1}{2}$.\n2. Parte literal:\n   $x^2 \\cdot x = x^3$.\n\
  \   $y \\cdot y^2 = y^3$.\n3. Resultado final: $\\frac{1}{2}x^3y^3$."
procedimiento:
- 'Paso 1: Multiplica las fracciones de los coeficientes (numerador × numerador y denominador × denominador).'
- 'Paso 2: Simplifica la fracción resultante a su mínima expresión.'
- 'Paso 3: Para las variables de igual base, suma sus exponentes.'
- 'Paso 4: Escribe el resultado combinando la fracción simplificada y las variables resultantes.'
ejemplos:
- titulo: Fracciones combinadas
  enunciado: 'Multiplica: (1/2 a)(2/5 b).'
  solucion_pasos:
  - 'Coeficientes: 1/2 × 2/5 = 2/10 = 1/5.'
  - 'Letras: a × b = ab.'
  - 'Resultado: 1/5 ab.'
- titulo: Un laboratorio químico mezcla dos disoluciones. La concentración total está dada por el prod
  enunciado: 'Un laboratorio químico mezcla dos disoluciones. La concentración total está dada por el
    producto de $(\frac{1}{4}c)$ y $(\frac{2}{5}d^2)$. ¿Cuál es la concentración resultante simplificada?
    (v1)


    Opciones: A) $\frac{1}{10}cd^2$ · B) $\frac{2}{20}cd^2$ · C) $\frac{3}{9}cd^2$ · D) $\frac{1}{20}cd^2$'
  solucion_pasos:
  - 'Producto: $(\frac{1}{4}c)(\frac{2}{5}d^2) = (\frac{1}{4} \cdot \frac{2}{5})(cd^2) = \frac{2}{20}cd^2
    = \frac{1}{10}cd^2$.'
  - 'Respuesta: $\frac{1}{10}cd^2$'
- titulo: 'Respecto de «Multiplicación de monomios con coeficientes fraccionarios»: ¿Describe adecuadam'
  enunciado: 'Respecto de «Multiplicación de monomios con coeficientes fraccionarios»: ¿Describe adecuadamente
    el concepto esta frase? «Al multiplicar monomios con **Coeficientes Fraccionarios**, se multiplican
    los numeradores entre sí y los denominadores entre sí para obtener el nuevo coeficiente, simplificando
    la fracción al final»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al multiplicar monomios con **Coeficientes Fraccionarios**,
    se multiplican los numeradores entre sí y los denominadores entre sí para obtener el nuevo coeficiente,
    simplificando la fracción al final.'
- titulo: 'Respecto de «Multiplicación de monomios con coeficientes fraccionarios»: ¿Se puede aceptar
    e'
  enunciado: 'Respecto de «Multiplicación de monomios con coeficientes fraccionarios»: ¿Se puede aceptar
    esta afirmación? «Sumar las fracciones en lugar de multiplicarlas»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al multiplicar monomios con **Coeficientes Fraccionarios**,
