semantic_id: MAT.ALG.SIMILARIDAD.TERMINOS_NO_SEMEJANTES
titulo: Identificación de términos no semejantes
objetivo: Identificar términos que no cumplen los criterios de semejanza y dejarlos expresados como suma
  o resta irreducible.
introduccion: En álgebra, hay un instinto compulsivo de querer juntar todo en una sola 'bola'. Pero a
  veces, la respuesta correcta es dejar las cosas exactamente como están.
resumen: Cuando los **Términos No son Semejantes** (difieren en letras o exponentes), es algebraicamente
  imposible agruparlos mediante sumas o restas. La expresión se considera **irreducible** en ese aspecto.
explicacion: '### Definición formal


  Si no son semejantes, no pueden fusionarse en la adición/sustracción. Se dejan conectados por el signo
  de la operación (+ o -).


  ### Desarrollo didáctico


  Si te piden sumar $2x$ y $3y$, la respuesta final y definitiva es $2x + 3y$.

  Si te piden sumar $x^2$ y $x$, la respuesta final es $x^2 + x$.

  No hay ninguna regla adecuado que los funda en algo como $5xy$ o $2x^3$. Forzar una reducción donde
  no hay semejanza es destruir las reglas matemáticas fundamentales. La frontera queda trazada: lo que
  no es igual, no se mezcla en la suma.'
procedimiento:
- 'Paso 1: Aplica el test de semejanza (mismas letras, mismos exponentes).'
- 'Paso 2: Si el test falla, los términos no son semejantes.'
- 'Paso 3: Para sumar o restar, simplemente escribe un término al lado del otro conectado por su signo.'
- 'Paso 4: Declara que la expresión está en su forma más simple (irreducible).'
ejemplos:
- titulo: Forzando la mezcla
  enunciado: 'Reduce si es posible: 8a^3 - 5a^2.'
  solucion_pasos:
  - 'Analizamos: tienen la letra ''a'', pero uno es al cubo y otro al cuadrado.'
  - 'Veredicto: No son semejantes.'
  - 'Conclusión: La expresión no se puede reducir. Queda 8a^3 - 5a^2.'
- titulo: Un sastre confecciona trajes usando metros de tela de algodón ($x$) y tela sintética ($y$)
  enunciado: 'Un sastre confecciona trajes usando metros de tela de algodón ($x$) y tela sintética ($y$).
    Para un lote usa $100x$ metros, y para un segundo lote requiere $50y$ metros. Si desea expresar el
    total de tela utilizada, ¿qué expresión debe entregarle al contador? (v1)


    Opciones: A) $100x + 50y$ · B) $150xy$ · C) $150(x+y)$ · D) $5000xy$'
  solucion_pasos:
  - 'El algodón ($x$) y lo sintético ($y$) son unidades distintas (no semejantes). El total simplemente
    se expresa sumándolos: $100x + 50y$.'
- titulo: 'Respecto de «Identificación de términos no semejantes»: ¿La siguiente formulación es correct'
  enunciado: 'Respecto de «Identificación de términos no semejantes»: ¿La siguiente formulación es correcta?
    «Cuando los **Términos No son Semejantes** (difieren en letras o exponentes), es algebraicamente imposible
    agruparlos mediante sumas o restas»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Cuando los **Términos No son Semejantes** (difieren
    en letras o exponentes), es algebraicamente imposible agruparlos mediante sumas o restas.'
- titulo: 'Respecto de «Identificación de términos no semejantes»: ¿La siguiente conclusión es correcta'
  enunciado: 'Respecto de «Identificación de términos no semejantes»: ¿La siguiente conclusión es correcta?
    «Juntar las letras de términos que se suman (ej. $2a + 3b = 5ab$). ¡Eso sería si estuvieran multiplicando!»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Cuando los **Términos No son Semejantes** (difieren
    en letras o exponentes), es algebraicamente imposible agruparlos mediante sumas o restas.'
errores_frecuentes:
- Juntar las letras de términos que se suman (ej. $2a + 3b = 5ab$). ¡Eso sería si estuvieran multiplicando!
- Sumar los exponentes al sumar bases iguales (ej. $x^2 + x^3 = x^5$).
- Para «¿Cuál es el procedimiento correcto cuando se solicita sumar o restar algebraicamente dos términos
  que resultan NO ser semejantes? (v1)», la respuesta correcta es Sumar los coeficientes y escribir todas
  las letras involucradas juntas.
- Para «¿Cuál es el procedimiento correcto cuando se solicita sumar o restar algebraicamente dos términos
  que resultan NO ser semejantes? (v1)», la respuesta correcta es Multiplicar los coeficientes y sumar
  los exponentes.
- Para «¿Cuál es el procedimiento correcto cuando se solicita sumar o restar algebraicamente dos términos
  que resultan NO ser semejantes? (v1)», la respuesta correcta es Sumar los exponentes y eliminar los
  coeficientes.
fuente: Álgebra de Baldor.
estado: publicado
