semantic_id: MAT.ALG.FUNCION_CONCEPTOS.UNICIDAD_IMAGEN
titulo: Verificación de unicidad de imagen para cada preimagen
objetivo: Aplicar la condición de unicidad de imagen para determinar si una correspondencia dada es una función.
introduccion: 'La prueba definitiva para saber si algo es una función se reduce a una sola pregunta por cada elemento
  del dominio: ¿tiene una sola salida, o más de una?'
resumen: La **condición de unicidad de imagen** exige que, para cada elemento $x$ del dominio, exista a lo más
  un valor $y$ tal que $(x,y)$ pertenezca a la correspondencia; si algún $x$ se asocia con dos o más valores distintos
  de $y$, la correspondencia no es una función.
explicacion: '### Definición formal


  Una correspondencia $R \subseteq A \times B$ cumple la condición de unicidad si para todo $x \in A$ y para todo
  par $y_1, y_2 \in B$ tales que $(x,y_1) \in R$ y $(x,y_2) \in R$, se sigue que $y_1 = y_2$. Esta condición, junto
  con la de existencia, es una de las dos exigencias que definen a una función.


  ### Desarrollo didáctico


  Para verificar unicidad en una lista de pares ordenados, agrupa los pares por su primera componente y revisa
  si alguna primera componente se repite con una segunda componente distinta.


  En un gráfico, la unicidad se verifica con el **criterio de la línea vertical**: si alguna recta vertical corta
  la curva en más de un punto, esa curva viola la unicidad y no representa una función.'
procedimiento:
- 'Paso 1: Lista todos los pares ordenados o revisa el gráfico de la relación.'
- 'Paso 2: Agrupa los pares (o puntos) según su primera componente (valor de $x$).'
- 'Paso 3: Verifica si algún valor de $x$ aparece asociado a más de un valor distinto de $y$.'
- 'Paso 4: Si ocurre, la relación no cumple unicidad y no es función; si no ocurre, la unicidad se cumple.'
ejemplos:
- titulo: Verificación en pares ordenados
  enunciado: 'Verifica la unicidad en $\{(1,3), (2,5), (2,7)\}$.'
  solucion_pasos:
  - El valor $x=2$ aparece dos veces, asociado a $5$ y a $7$.
  - Se viola la unicidad de imagen.
- titulo: Verificación con criterio de la línea vertical
  enunciado: Un gráfico muestra una circunferencia completa. ¿Cumple el criterio de la línea vertical?
  solucion_pasos:
  - Una línea vertical que pase por el centro corta a la circunferencia en dos puntos.
  - No cumple el criterio; la circunferencia no representa una función.
- titulo: ¿Puede un mismo valor de $x$ tener dos imágenes distintas en una función?
  enunciado: ¿Puede un mismo valor de $x$ tener dos imágenes distintas en una función?
  respuesta: Falso
  solucion_pasos:
  - Eso violaría directamente la condición de unicidad exigida a toda función.
- titulo: ¿Dos valores distintos de $x$ pueden compartir la misma imagen $y$?
  enunciado: ¿Dos valores distintos de $x$ pueden compartir la misma imagen $y$?
  respuesta: Verdadero
  solucion_pasos:
  - La unicidad exige una sola imagen por cada $x$, pero no impide que distintos $x$ compartan la misma imagen.
errores_frecuentes:
- 'Confundir la unicidad de imagen con la inyectividad (que exige lo contrario: que distintos $x$ no compartan
  imagen).'
- Aplicar el criterio de la línea vertical usando una línea horizontal por error.
- Concluir que una relación no es función solo porque dos pares distintos comparten la misma segunda componente.
- Olvidar revisar todos los valores repetidos de $x$ en una lista extensa de pares ordenados.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
