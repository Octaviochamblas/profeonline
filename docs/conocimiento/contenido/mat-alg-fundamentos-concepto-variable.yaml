semantic_id: MAT.ALG.FUNDAMENTOS.CONCEPTO_VARIABLE
objetivo: Definir e interpretar el concepto de variable y su rol fundamental en las expresiones algebraicas.
introduccion: Imagina una caja de regalo adecuado. Cuando la abres a las 8 am tiene un peluche, pero a las 9 am
  tiene un reloj. La caja es la misma, pero su contenido cambia. Eso es exactamente una variable en matemáticas.
resumen: Una **variable** es un símbolo constitutivo (usualmente una letra como $x, y, z, t$) que representa un
  valor que puede **cambiar, variar o ser reemplazado** por diferentes números dentro de un conjunto determinado
  de posibilidades.
explicacion: "### Definición formal\n\nLa naturaleza de la variable es 'variar', permitiendo ser reemplazada por\
  \ múltiples valores en el dominio.\n\n### Desarrollo didáctico\n\nLa variable es el motor de las funciones. \n\
  En la expresión que calcula el perímetro de un cuadrado $P = 4L$, la letra $L$ es la variable.\n- Si dibujas un\
  \ cuadradito en tu cuaderno, $L$ puede valer 2 cm.\n- Si pintas un cuadrado en la calle, $L$ puede valer 5 metros.\n\
  \nLa variable es lo que le da 'vida' a las fórmulas matemáticas. Permite que una misma fórmula de física calcule\
  \ la caída de una pluma o la órbita de un planeta con solo reemplazar el valor de $t$ (tiempo) o $m$ (masa).\n\
  \nEn una ecuación simple (ej. $x + 2 = 5$), la variable solo puede tomar un valor específico que la hace verdadera\
  \ ($x=3$). Ahí la variable está 'atrapada' y se le llama incógnita. Pero en una función (ej. $y = x + 2$), la\
  \ variable $x$ es libre de valer 1, 10 o 1000, y la $y$ cambiará en respuesta."
procedimiento:
- 'Paso 1: Detecta el símbolo o letra en la ecuación/función.'
- 'Paso 2: Pregúntate si ese valor representa algo fijo o si puede admitir múltiples reemplazos según el caso.'
- 'Paso 3: Si admite múltiples reemplazos numéricos, estás frente a una variable.'
ejemplos:
- titulo: El taxi cobrador
  enunciado: La tarifa es $1000 iniciales más $200 por kilómetro. La expresión es T = 1000 + 200k. Identifica la
    variable independiente.
  solucion_pasos:
  - El 1000 y el 200 son constantes (números fijos del taxímetro).
  - La letra 'k' (kilómetros) puede ser 1, 5, o 20 dependiendo del viaje.
  - Por tanto, 'k' es la variable que tú puedes reemplazar libremente.
- titulo: Un ecólogo modela la población de un tipo de ave migratoria con la expresión $P = C \cdot (1
  enunciado: 'Un ecólogo modela la población de un tipo de ave migratoria con la expresión $P = C \cdot (1.05)^t$,
    donde ''$C$'' es el tamaño de la bandada al llegar en enero, y ''$t$'' representa los meses transcurridos. Si
    desea proyectar cómo evolucionará **esa bandada específica** a lo largo del año actual mes a mes, ¿qué rol cumplen
    los símbolos en este análisis? (v1)


    Opciones: A) ''$C$'' actúa como una constante y ''$t$'' actúa como la variable que él debe ir cambiando. · B)
    ''$C$'' y ''$t$'' son ambas variables libres. · C) ''$C$'' es la variable y ''$t$'' es una constante fija del
    problema. · D) Ambas letras actúan como constantes porque ya pasó enero.'
  solucion_pasos:
  - Para ESA bandada, el tamaño inicial 'C' está fijo (ej. 100 aves). El tiempo 't' es lo que irá cambiando (variando)
    de 1 a 12 meses.
  - 'Respuesta: ''$C$'' actúa como una constante y ''$t$'' actúa como la variable que él debe ir cambiando.'
- titulo: 'Respecto de «Concepto de variable»: ¿Es correcta esta caracterización? «Una **variable** es'
  enunciado: 'Respecto de «Concepto de variable»: ¿Es correcta esta caracterización? «Una **variable** es un símbolo
    constitutivo (usualmente una letra como $x, y, z, t$) que representa un valor que puede **cambiar, variar o
    ser reemplazado** por diferentes números dentro de un conjunto determinado de posibilidades»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una **variable** es un símbolo constitutivo (usualmente una
    letra como $x, y, z, t$) que representa un valor que puede **cambiar, variar o ser reemplazado** por diferentes
    números dentro de un conjunto determinado de posibilidades.'
- titulo: 'Respecto de «Concepto de variable»: ¿Es válida esta afirmación? «Confundir una constante (co'
  enunciado: 'Respecto de «Concepto de variable»: ¿Es válida esta afirmación? «Confundir una constante (como el
    número Pi $\pi$ o el número de Euler $e$) con una variable solo por ser símbolos/letras. Pi jamás variará, siempre
    será 3.1415»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una **variable** es un símbolo constitutivo (usualmente una
    letra como $x, y, z, t$) que representa un valor que puede **cambiar, variar o ser reemplazado** por diferentes
    números dentro de un conjunto determinado de posibilidades.'
errores_frecuentes:
- Confundir una constante (como el número Pi $\pi$ o el número de Euler $e$) con una variable solo por ser símbolos/letras.
  Pi jamás variará, siempre será 3.1415...
- Creer que una variable $x$ siempre significa 'un número desconocido que hay que despejar', olvidando que también
  puede ser 'cualquier número que yo decida ingresar'.
- Es un número desconocido que tiene un único valor correcto posible y constante.
- Es una letra que representa siempre al número 1 por defecto.
- Es un símbolo griego que tiene un valor universal como $3.1415$.
