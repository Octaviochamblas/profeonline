semantic_id: MAT.NUM.VARIACION_PORCENTUAL.VALOR_FINAL_DESCUENTO
titulo: Cálculo del valor final con descuento porcentual
objetivo: Calcular el valor final tras aplicar un descuento porcentual en un solo paso.
introduccion: ¿Apurado en la caja de la tienda? No calcules cuánto dinero te ahorras para luego restarlo.
  Calcula directamente lo que debes pagar multiplicando por el porcentaje complementario.
resumen: 'Para aplicar un descuento del $D\%$ en un solo paso, multiplica el Valor Inicial por el factor
  complementario: $(1 - D/100)$. Ej: Descuento del 20% es multiplicar por $0.80$.'
explicacion: 'Al igual que con el aumento, existe un **factor multiplicador** para los descuentos. Si
  a un total del $100\%$ le quitas un descuento $D\%$, lo que pagarás realmente es el $(100 - D)\%$.


  La fórmula directa para el Valor Final con descuento es:

  $$\text{Valor Final} = \text{Valor Inicial} \cdot \left( 1 - \frac{D}{100} \right)$$


  - Si te hacen un $20\%$ de descuento, pagas el $80\%$. El factor es $1 - 0.20 = 0.80$.

  - Si la liquidación es del $45\%$, pagas el $55\%$. Multiplicas por $0.55$.'
procedimiento:
- 'Paso 1: Identifica el porcentaje de descuento ($D\%$).'
- 'Paso 2: Resta ese porcentaje a 100 para saber qué porcentaje sí vas a pagar.'
- 'Paso 3: Convierte ese número a decimal y multiplica por el precio original.'
ejemplos:
- titulo: Zapatillas en oferta
  enunciado: Zapatillas de $60.000 con 30% de descuento. ¿Cuánto pagas en caja?
  solucion_pasos:
  - Si el descuento es 30%, pagamos el 70%.
  - El factor decimal es $0.70$.
  - 'Multiplicamos: $60.000 \cdot 0.70 = 42.000$.'
  - El precio final es $42.000.
errores_frecuentes:
- Multiplicar por $0.30$ y creer que ese es el precio a pagar (eso es el dinero que te ahorras).
- Dividir el precio por el porcentaje de descuento.
fuente: Currículum Nacional MINEDUC.
estado: publicado
