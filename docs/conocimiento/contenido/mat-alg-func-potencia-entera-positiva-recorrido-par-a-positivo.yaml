semantic_id: MAT.ALG.FUNC_POTENCIA_ENTERA_POSITIVA.RECORRIDO_PAR_A_POSITIVO
titulo: Recorrido con exponente par y coeficiente positivo
objetivo: Determinar el recorrido de $f(x)=a\cdot x^n$ cuando $n$ es par y $a>0$.
introduccion: Cuando el coeficiente es positivo y el exponente es par, la función nunca produce resultados
  negativos, así que su recorrido queda limitado a los valores no negativos.
resumen: Si $n$ es par y $a>0$, el recorrido de $f(x)=a\cdot x^n$ es $[0,+\infty)$, ya que el mínimo valor
  posible es $f(0)=0$ y la función crece sin límite.
explicacion: '### Definición formal


  Para $n$ par y $a>0$, $x^n\geq0$ para todo $x$, así que $f(x)=a\cdot x^n\geq0$. El mínimo se alcanza en
  $f(0)=0$, y como $f(x)\to+\infty$ cuando $|x|\to\infty$, la función toma todos los valores desde $0$ en
  adelante: el recorrido es $[0,+\infty)$.


  ### Desarrollo didáctico


  $f(x)=2x^2$ tiene valores $f(0)=0$, $f(1)=2$, $f(-1)=2$, $f(2)=8$: nunca aparece un resultado negativo, y el
  valor $0$ sí se alcanza exactamente en $x=0$.'
procedimiento:
- 'Paso 1: Verifica que $n$ sea par y $a>0$.'
- 'Paso 2: Identifica que el mínimo de la función es $f(0)=0$.'
- 'Paso 3: Concluye que el recorrido es $[0,+\infty)$.'
ejemplos:
- titulo: Determinación del recorrido de $3x^2$
  enunciado: 'Determina el recorrido de $f(x)=3x^2$.'
  solucion_pasos:
  - El exponente $2$ es par y el coeficiente $3$ es positivo.
  - 'El recorrido es $[0,+\infty)$.'
- titulo: Determinación del recorrido de $0{,}5x^6$
  enunciado: 'Determina el recorrido de $f(x)=0{,}5x^6$.'
  solucion_pasos:
  - El exponente $6$ es par y el coeficiente $0{,}5$ es positivo.
  - 'El recorrido es $[0,+\infty)$.'
- titulo: ¿El valor $0$ pertenece al recorrido de $f(x)=x^4$?
  enunciado: ¿El valor $f(x)=0$ pertenece al recorrido de $f(x)=x^4$?
  respuesta: Sí
  solucion_pasos:
  - Se alcanza exactamente en $x=0$, así que $0$ pertenece al recorrido.
- titulo: ¿Puede $f(x)=5x^2$ tomar algún valor negativo?
  enunciado: ¿Puede $f(x)=5x^2$ tomar algún valor negativo para algún $x$ real?
  respuesta: 'No'
  solucion_pasos:
  - Con exponente par y coeficiente positivo, el resultado nunca es negativo.
errores_frecuentes:
- Confundir el recorrido con el dominio, que en este caso sí es todo $\mathbb{R}$.
- Excluir el valor $0$ del recorrido, cuando sí se alcanza en $x=0$.
- Suponer que el recorrido depende del exponente específico ($2$, $4$, $6$, etc.) y no solo de su paridad.
- No verificar el signo del coeficiente $a$ antes de determinar el recorrido.
