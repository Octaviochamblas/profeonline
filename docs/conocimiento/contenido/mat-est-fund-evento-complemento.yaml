semantic_id: MAT.EST.PROBA_FUNDAMENTOS.EVENTO_COMPLEMENTO
titulo: Concepto y notación del complemento de un evento
objetivo: Definir el complemento de un evento como el conjunto de todos los resultados del espacio muestral
  que no pertenecen a ese evento.
introduccion: 'Para cada evento existe otro conjunto que representa ''lo contrario'': todos los resultados
  que no cumplen la condición del evento original.'
resumen: El complemento de un evento $A$, denotado $A^c$ (o $\bar{A}$), es el conjunto de todos los elementos
  del espacio muestral $S$ que no pertenecen a $A$.
explicacion: '![Complemento de un evento](/static/img/probabilidad/fundamentos/fund-evento-complemento.svg)


  ### Definición formal


  El complemento de $A$ es $A^c=\{x\in S : x\notin A\}$, y se cumple que $A\cup A^c=S$ y $A\cap A^c=\emptyset$.


  ### Desarrollo didáctico


  Al lanzar un dado, si $A=\{2,4,6\}$ (par), entonces $A^c=\{1,3,5\}$ (impar): todos los resultados que
  no están en A.'
procedimiento:
- 'Paso 1: Identifica el espacio muestral completo S y el evento A.'
- 'Paso 2: Lista todos los elementos de S que NO pertenecen a A.'
- 'Paso 3: Ese conjunto de elementos es el complemento Aᶜ.'
ejemplos:
- titulo: Calcular el complemento de 'número par'
  enunciado: S={1,...,6}, A={2,4,6}.
  solucion_pasos:
  - Aᶜ={1,3,5}.
- titulo: Calcular el complemento de 'carta roja'
  enunciado: En un mazo de 52 cartas, A=26 cartas rojas.
  solucion_pasos:
  - Aᶜ=26 cartas negras (las que no son rojas).
- titulo: ¿La unión de un evento con su complemento da el espacio muestral completo?
  respuesta: Sí
  solucion_pasos:
  - Sí, A∪Aᶜ=S, esa es una propiedad fundamental del complemento.
- titulo: ¿Un evento y su complemento pueden compartir algún elemento?
  respuesta: 'No'
  solucion_pasos:
  - No, A∩Aᶜ=∅, son mutuamente excluyentes por definición.
errores_frecuentes:
- Confundir el complemento de un evento con otro evento cualquiera no relacionado.
- Olvidar algún elemento del espacio muestral al listar el complemento.
- Creer que un evento y su complemento pueden compartir elementos en común.
fuente: 'Elaboración propia (referencia: Moraleja 403).'
estado: publicado
