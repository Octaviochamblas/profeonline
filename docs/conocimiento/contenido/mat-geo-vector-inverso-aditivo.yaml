semantic_id: MAT.GEO.VECTORES_BASE.INVERSO_ADITIVO
titulo: Interpretación del vector opuesto como inverso aditivo
objetivo: 'Interpretar el vector opuesto como el inverso aditivo de un vector: al sumarlo con el vector
  original, se obtiene el vector nulo.'
introduccion: 'Sumar un vector con su opuesto es como caminar hacia adelante y luego devolverse exactamente
  el mismo camino: terminas en el mismo lugar de donde saliste.'
resumen: El vector opuesto $-\vec{v}$ es el inverso aditivo de $\vec{v}$, ya que $\vec{v}+(-\vec{v})=\vec{0}$,
  el vector nulo (con componentes (0,0)).
explicacion: '![Vector opuesto como inverso aditivo](/static/img/geometria/cartesiano-vectores/vector-inverso-aditivo.svg)


  ### Definición formal


  Para cualquier vector $\vec{v}=(v_x,v_y)$, su inverso aditivo es $-\vec{v}=(-v_x,-v_y)$, y se cumple
  que $\vec{v}+(-\vec{v})=(v_x-v_x,v_y-v_y)=(0,0)=\vec{0}$, el vector nulo.


  ### Desarrollo didáctico


  En la figura, al recorrer el vector $\vec{v}$ y luego su opuesto $-\vec{v}$ (colocado a continuación),
  se termina exactamente en el punto de partida, ilustrando que la suma de ambos es el vector nulo.'
procedimiento:
- 'Paso 1: Identifica un vector v y su vector opuesto -v.'
- 'Paso 2: Suma sus componentes correspondientes: (vx+(-vx), vy+(-vy)).'
- 'Paso 3: Verifica que el resultado sea siempre (0,0), el vector nulo, confirmando que -v es el inverso
  aditivo de v.'
ejemplos:
- titulo: Verificar que v y -v suman el vector nulo
  enunciado: v=(4,3) y -v=(-4,-3).
  solucion_pasos:
  - v+(-v)=(4+(-4), 3+(-3))=(0,0), el vector nulo.
- titulo: Reconocer la utilidad del inverso aditivo
  enunciado: Se necesita 'cancelar' el efecto de un vector de desplazamiento.
  solucion_pasos:
  - Sumando su vector opuesto (inverso aditivo), se cancela exactamente el desplazamiento original.
- titulo: ¿La suma de un vector y su inverso aditivo siempre da el vector nulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la propiedad que define al inverso aditivo.
- titulo: ¿El vector nulo tiene dirección definida?
  respuesta: 'No'
  solucion_pasos:
  - No, el vector nulo (0,0) no tiene una dirección definida, ya que no apunta hacia ningún lado (módulo
    cero).
errores_frecuentes:
- Creer que la suma de un vector y su opuesto da un resultado distinto de cero.
- 'Confundir el vector nulo con el número cero (son conceptos relacionados pero distintos: uno es un vector,
  el otro un escalar).'
- No reconocer la analogía entre el inverso aditivo de números y el de vectores.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 122).'
estado: publicado
