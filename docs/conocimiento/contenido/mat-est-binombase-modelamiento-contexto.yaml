semantic_id: MAT.EST.BINOMIAL_BASE.MODELAMIENTO_CONTEXTO
titulo: Modelar situaciones contextualizadas mediante la distribución binomial
objetivo: Modelar una situación cotidiana o aplicada como un experimento binomial, verificando que se
  cumplan sus condiciones y planteando correctamente la función de probabilidad correspondiente.
introduccion: 'Este es el paso integrador de todo el tema: reconocer una situación real, verificar los
  requisitos del modelo binomial, y plantear (sin necesariamente resolver) la expresión de probabilidad
  adecuada.'
resumen: Modelar con el binomial implica verificar que la situación cumpla los cuatro requisitos (ensayos
  fijos n, dos resultados posibles, independencia, p constante), y luego plantear P(X=k)=C(n,k)p^k q^(n-k)
  con los valores identificados.
explicacion: '![Modelamiento de situaciones con el binomial](/static/img/probabilidad/binombase/binombase-modelamiento-contexto.svg)


  ### Definición formal


  Una situación se modela con el binomial si cumple: (1) n ensayos fijos, (2) cada ensayo tiene solo 2
  resultados posibles, (3) los ensayos son independientes, (4) p es constante en cada ensayo.


  ### Desarrollo didáctico


  ''Una tienda vende un producto con garantía; el 90% de los clientes no la reclama. Se eligen 6 clientes
  al azar. ¿Cuál es la probabilidad de que exactamente 5 no reclamen la garantía?'' Se identifica n=6,
  p=0,9 (no reclamar), k=5, y se plantea $P(X=5)=C(6,5)\times0{,}9^5\times0{,}1^1$.'
procedimiento:
- 'Paso 1: Verifica que la situación cumpla los 4 requisitos del modelo binomial (n fijo, 2 resultados,
  independencia, p constante).'
- 'Paso 2: Identifica los valores de n, p y el valor específico de k que se pregunta en el problema.'
- 'Paso 3: Plantea la expresión P(X=k)=C(n,k)×p^k×q^(n-k) sustituyendo los valores identificados (y calcula
  si el problema lo requiere).'
ejemplos:
- titulo: Modelar un problema de garantías no reclamadas
  enunciado: El 90% de clientes no reclama la garantía. Se eligen 6 clientes al azar. ¿P(exactamente 5
    no reclaman)?
  solucion_pasos:
  - n=6, p=0,9, k=5. Se plantea P(X=5)=C(6,5)×0,9^5×0,1^1=6×0,59049×0,1≈0,3543.
- titulo: Modelar un problema de germinación de semillas
  enunciado: El 80% de las semillas de cierto tipo germinan. Se siembran 5 semillas. ¿P(exactamente 4
    germinan)?
  solucion_pasos:
  - n=5, p=0,8, k=4. Se plantea P(X=4)=C(5,4)×0,8^4×0,2^1=5×0,4096×0,2=0,4096.
- titulo: ¿Es necesario verificar los 4 requisitos del modelo antes de aplicarlo a un contexto?
  respuesta: Sí
  solucion_pasos:
  - Sí, para asegurar que el modelo binomial sea aplicable correctamente a la situación descrita.
- titulo: ¿El valor de k siempre corresponde al número exacto de éxitos preguntado en el problema?
  respuesta: Sí
  solucion_pasos:
  - Sí, k es el valor específico de la variable X que se pregunta en el enunciado.
errores_frecuentes:
- Aplicar el modelo binomial sin verificar previamente que la situación cumpla sus 4 requisitos fundamentales.
- Confundir los valores de n, p y k al traducir el contexto del problema a la notación matemática.
- Calcular la probabilidad de 'al menos k' o 'a lo más k' cuando el problema en realidad pide 'exactamente
  k' (o viceversa), un tema que se profundiza en el siguiente bloque de análisis binomial.
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
