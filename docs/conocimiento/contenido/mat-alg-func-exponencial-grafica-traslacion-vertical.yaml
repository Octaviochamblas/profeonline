semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.TRASLACION_VERTICAL
titulo: Efecto de una traslación vertical en la gráfica exponencial
objetivo: Analizar el efecto de sumar una constante a una función exponencial, produciendo una traslación vertical
  de su gráfica.
introduccion: Así como con la parábola, la curva exponencial también puede deslizarse hacia arriba o hacia abajo
  sumándole un número constante, sin alterar su forma característica.
resumen: 'La función $g(x)=a\cdot b^x+k$ es la función exponencial $f(x)=a\cdot b^x$ **trasladada verticalmente**
  $k$ unidades: hacia arriba si $k>0$, hacia abajo si $k<0$.'
explicacion: '### Definición formal


  Dada $f(x)=a\cdot b^x$, la función $g(x)=f(x)+k=a\cdot b^x+k$ representa una traslación vertical de $f$ en
  $k$ unidades. Cada punto $(x,y)$ de la gráfica original se traslada a $(x,y+k)$ en la nueva gráfica.


  ### Desarrollo didáctico


  El signo de $k$ se interpreta directamente: positivo sube toda la curva, negativo la baja, sin alterar su
  forma de crecimiento o decrecimiento exponencial.


  La gráfica de $g(x)=2^x-3$ es idéntica a la de $f(x)=2^x$, pero desplazada $3$ unidades hacia abajo.'
procedimiento:
- 'Paso 1: Identifica la función base $f(x)=a\cdot b^x$ y la constante $k$ sumada.'
- 'Paso 2: Si $k>0$, concluye que la traslación es hacia arriba.'
- 'Paso 3: Si $k<0$, concluye que la traslación es hacia abajo.'
ejemplos:
- titulo: Descripción de una traslación hacia arriba
  enunciado: 'Describe la traslación vertical de $g(x)=3^x+5$ respecto a $f(x)=3^x$.'
  solucion_pasos:
  - '$k=5>0$.'
  - Se traslada $5$ unidades hacia arriba.
- titulo: Descripción de una traslación hacia abajo
  enunciado: 'Describe la traslación vertical de $g(x)=2^x-7$ respecto a $f(x)=2^x$.'
  solucion_pasos:
  - '$k=-7<0$.'
  - Se traslada $7$ unidades hacia abajo.
- titulo: ¿La traslación vertical cambia la forma de crecimiento o decrecimiento de la curva?
  enunciado: ¿La traslación vertical cambia la forma de crecimiento o decrecimiento de la curva?
  respuesta: 'No'
  solucion_pasos:
  - Solo desplaza toda la curva verticalmente; el ritmo de crecimiento o decrecimiento permanece igual.
- titulo: ¿La traslación vertical afecta el dominio de la función?
  enunciado: ¿La traslación vertical afecta el dominio de la función?
  respuesta: 'No'
  solucion_pasos:
  - El dominio de una función exponencial trasladada verticalmente sigue siendo todo $\mathbb{R}$.
errores_frecuentes:
- Confundir la dirección de la traslación, invirtiendo el signo de $k$.
- Aplicar a $k$ la lógica de reescritura usada para las traslaciones horizontales de otras funciones.
- Asumir incorrectamente que la traslación vertical cambia el dominio de la función.
- Confundir la traslación vertical con un cambio en el valor de la base $b$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
