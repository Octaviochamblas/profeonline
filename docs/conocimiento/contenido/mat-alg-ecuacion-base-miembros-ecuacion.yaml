semantic_id: 'MAT.ALG.ECUACION_BASE.MIEMBROS_ECUACION'
titulo: 'Miembros de una Ecuación'
objetivo: 'Identificar y nombrar correctamente las dos mitades principales de una ecuación.'
introduccion: |
  Para hablar el lenguaje del álgebra fluido, necesitas saber cómo llamar a las partes de una ecuación. Cuando hablemos de 'pasar de un lado a otro', debemos usar los nombres oficiales.
resumen: |
  Toda ecuación está dividida por el signo igual ($=$) en dos bloques principales: el Primer Miembro (a la izquierda) y el Segundo Miembro (a la derecha).
explicacion: |
  Dada la ecuación: $3x + 4 = 2x - 1$

  - **El Signo Igual ($=$)** es la frontera, el muro que divide los dos países.
  - **Primer Miembro (Miembro Izquierdo):** Es TODO lo que está a la izquierda del $=$. En este caso, $3x + 4$.
  - **Segundo Miembro (Miembro Derecho):** Es TODO lo que está a la derecha del $=$. En este caso, $2x - 1$.

  Es fundamental ver estos miembros como 'paquetes' completos. Si multiplicas la ecuación por 2, debes multiplicar TODO el primer miembro y TODO el segundo miembro. No puedes multiplicar partes sueltas.
procedimiento:
  - 'Paso 1: Localiza el signo $=$.'
  - 'Paso 2: Todo el bloque a su izquierda es el Primer Miembro.'
  - 'Paso 3: Todo el bloque a su derecha es el Segundo Miembro.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Identifica los miembros en $5 - x = 12 + 3x$.'
    solucion_pasos:
    - 'Frontera: el signo $=$.'
    - 'Primer Miembro (izquierdo): $5 - x$.'
    - 'Segundo Miembro (derecho): $12 + 3x$.'
  - titulo: 'En la ecuación $x^2 = 25$, ¿cuál es el segundo miembro?'
    respuesta: '25'
    solucion_pasos:
    - 'Es lo que está a la derecha del igual.'
errores_frecuentes:
  - 'Confundir ''miembro'' con ''término''. (Un miembro contiene varios términos).'
estado: publicado
