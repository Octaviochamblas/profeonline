semantic_id: MAT.ALG.FACTOR_TRINOMIOS.RAICES_FACTORES_CUADRATICOS
titulo: Evaluación del discriminante para factorizabilidad
objetivo: Utilizar el discriminante (b² - 4ac) para predecir si un polinomio es factorizable en los Reales antes
  de intentarlo.
introduccion: ¿Alguna vez has pasado 10 minutos intentando factorizar un trinomio por aspa o amplificación, solo
  para rendirte y descubrir que era matemáticamente imposible? Existe una herramienta que actúa como "rayos X" y
  te dice de antemano si el polinomio tiene solución o si debes abandonarlo de inmediato.
resumen: El discriminante de una ecuación cuadrática ($\Delta = b^2 - 4ac$) permite predecir la factorizabilidad
  en Reales. Si $\Delta < 0$, el trinomio no es factorizable en los Reales. Si $\Delta = 0$, es un TCP. Si $\Delta
  > 0$ y es un cuadrado perfecto, es factorizable mediante aspa o forma simple.
explicacion: '### Definición formal


  El valor bajo la raíz determina la existencia de soluciones reales.


  ### Desarrollo didáctico


  El discriminante, representado por la letra griega Delta ($\Delta$), es la porción de la fórmula cuadrática que
  está bajo la raíz: $b^2 - 4ac$.


  Supongamos que el profesor te pide factorizar $2x^2 + 3x + 5$.

  En vez de perder tiempo con el aspa, calculas el discriminante:

  - $a = 2, b = 3, c = 5$

  - $\Delta = (3)^2 - 4(2)(5)$

  - $\Delta = 9 - 40 = -31$


  Como el resultado es NEGATIVO, es matemáticamente imposible extraerle raíz cuadrada real. Esto significa categóricamente
  que **este polinomio no se puede factorizar** en el conjunto de los Números Reales.


  Si el resultado hubiera sido 0, significaba que tenías un Trinomio Cuadrado Perfecto.

  Si el resultado es un número positivo con raíz exacta (ej. 16, 25, 36), te garantiza que vas a encontrar dos factores
  bonitos y enteros con el método del aspa.'
procedimiento:
- 'Paso 1: Identifica $a, b, c$ en tu trinomio $ax^2 + bx + c$.'
- 'Paso 2: Reemplaza en la fórmula $\Delta = b^2 - 4ac$.'
- 'Paso 3: Evalúa el resultado.'
- 'Paso 4: Si es negativo, aborta la misión (no factorizable en $\mathbb{R}$). Si es 0, busca un TCP. Si es cuadrado
  perfecto positivo, aplica el método simple o aspa.'
- El valor bajo la raíz determina la existencia de soluciones reales.
ejemplos:
- titulo: Verifica si $x^2 - x + 6$ es factorizable
  enunciado: Verifica si $x^2 - x + 6$ es factorizable.
  solucion_pasos:
  - $a=1, b=-1, c=6$.
  - $\Delta = (-1)^2 - 4(1)(6) = 1 - 24 = -23$.
  - Como $\Delta < 0$, concluimos de inmediato que el trinomio es irreducible en los Reales.
- titulo: Calcula el discriminante de $x^2 - 5x + 6$ y predice.
  solucion_pasos:
  - $(-5)^2 - 4(1)(6) = 25 - 24 = 1$. Como 1 es cuadrado perfecto, tiene factorización exacta en enteros.
- titulo: 'Respecto de «Relación entre raíces cuadráticas con factores lineales»: ¿Es correcta esta car'
  enunciado: 'Respecto de «Relación entre raíces cuadráticas con factores lineales»: ¿Es correcta esta caracterización?
    «El discriminante de una ecuación cuadrática ($\Delta = b^2 - 4ac$) permite predecir la factorizabilidad en
    Reales»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El discriminante de una ecuación cuadrática ($\Delta = b^2
    - 4ac$) permite predecir la factorizabilidad en Reales.'
- titulo: 'Respecto de «Relación entre raíces cuadráticas con factores lineales»: ¿Es válida esta afirm'
  enunciado: 'Respecto de «Relación entre raíces cuadráticas con factores lineales»: ¿Es válida esta afirmación?
    «Olvidar colocar los signos negativos al sustituir en la fórmula (especialmente la ''c'', que cambia el signo
    de la multiplicación a positivo)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El discriminante de una ecuación cuadrática ($\Delta = b^2
    - 4ac$) permite predecir la factorizabilidad en Reales.'
errores_frecuentes:
- Olvidar colocar los signos negativos al sustituir en la fórmula (especialmente la 'c', que cambia el signo de
  la multiplicación a positivo).
- Creer que un discriminante de 0 significa que no tiene solución (0 significa que es un Trinomio Cuadrado Perfecto).
- Para «¿Qué parte de la fórmula cuadrática corresponde al discriminante», la respuesta correcta es El divisor $2a$.
- La constante $-b$.
- Para «¿Qué parte de la fórmula cuadrática corresponde al discriminante», la respuesta correcta es El signo $\pm$.
