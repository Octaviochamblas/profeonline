semantic_id: MAT.NUM.RAICES_PROPIEDADES.RADICALES_SEMEJANTES
objetivo: Reconocer radicales que pueden combinarse.
introduccion: Antes de sumar radicales hay que mirar su parte radical simplificada,
  del mismo modo que en álgebra se comparan partes literales.
resumen: Dos radicales son semejantes si, tras simplificar, tienen el mismo índice
  y el mismo radicando. Los coeficientes pueden ser distintos sin romper la semejanza.
explicacion: |-
  Dos radicales son semejantes si, tras simplificar, tienen el mismo índice y el mismo radicando.

  Al analizar “\(2\sqrt3\) y \(-5\sqrt3\) son semejantes, pero \(\sqrt2\) y \(\sqrt3\) no” conviene observar la conexión siguiente: los coeficientes pueden ser distintos sin romper la semejanza
procedimiento:
- 'Paso 1: Simplifica cada radical extrayendo potencias perfectas.'
- 'Paso 2: Compara índices y radicandos de las formas resultantes.'
- 'Paso 3: Declara semejanza solo si ambas partes radicales coinciden exactamente.'
ejemplos:
- titulo: Aplicación razonada — Identificación de radicales semejantes
  enunciado: \(2\sqrt3\) y \(-5\sqrt3\) son semejantes, pero \(\sqrt2\) y \(\sqrt3\)
    no.
  solucion_pasos:
  - Simplifica cada radical extrayendo potencias perfectas.
  - Compara índices y radicandos de las formas resultantes.
  - Declara semejanza solo si ambas partes radicales coinciden exactamente.
- titulo: Revisión de una solución — Identificación de radicales semejantes
  enunciado: Una solución aplica “Compara índices y radicandos de las formas resultantes.”,
    pero termina sin comprobar que los coeficientes pueden ser distintos sin romper
    la semejanza. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de radicales semejantes: dos
    radicales son semejantes si, tras simplificar, tienen el mismo índice y el mismo
    radicando.'
  - Simplifica cada radical extrayendo potencias perfectas.
  - 'Completa la revisión con este control: Declara semejanza solo si ambas partes
    radicales coinciden exactamente.'
- titulo: ¿Se cumple que los coeficientes pueden ser distintos sin romper la semejanza?
    — Identificación de radicales semejantes
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que dos radicales son semejantes si, tras
    simplificar, tienen el mismo índice y el mismo radicando.
  - El caso “\(2\sqrt3\) y \(-5\sqrt3\) son semejantes, pero \(\sqrt2\) y \(\sqrt3\)
    no” satisface esa condición.
  - Declara semejanza solo si ambas partes radicales coinciden exactamente.
- titulo: ¿Es válido omitir el paso “Simplifica cada radical extrayendo potencias
    perfectas”? — Identificación de radicales semejantes
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de radicales
    semejantes.
  - 'Omitirlo puede volver inválida la acción siguiente: Compara índices y radicandos
    de las formas resultantes.'
  - 'La solución debe terminar de este modo: Declara semejanza solo si ambas partes
    radicales coinciden exactamente.'
errores_frecuentes:
- 'Confundir identificación de radicales semejantes con otro concepto y omitir este
  inicio: Simplifica cada radical extrayendo potencias perfectas.'
- Aplicar mecánicamente “Compara índices y radicandos de las formas resultantes.”
  sin revisar las condiciones de la definición.
- Tomar “\(2\sqrt3\) y \(-5\sqrt3\) son semejantes, pero \(\sqrt2\) y \(\sqrt3\) no”
  como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “los coeficientes pueden ser
  distintos sin romper la semejanza”.
- 'Terminar el desarrollo sin realizar este control: Declara semejanza solo si ambas
  partes radicales coinciden exactamente.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
