semantic_id: MAT.GEO.SEGMENTO_MEDIO.MEDIDA_MITAD_TERCER_LADO
titulo: Propiedad de medida del segmento medio como mitad del tercer lado
objetivo: Calcular la medida del segmento medio de un triángulo a partir de la medida del lado al que
  es relativo.
introduccion: 'Además de ser paralelo al tercer lado, el segmento medio tiene una relación numérica exacta
  con él: siempre mide exactamente la mitad.'
resumen: El segmento medio de un triángulo mide la mitad del lado al que es relativo.
explicacion: '![Segmento medio, mitad del tercer lado](/static/img/geometria/elementos-secundarios/segmento-medio-medida-mitad-tercer-lado.svg)


  ### Definición formal


  Si M y N son los puntos medios de AB y AC en un triángulo ABC, entonces $MN=\frac{BC}{2}$.


  ### Desarrollo didáctico


  Si el lado BC mide 10 cm, el segmento medio MN (relativo a BC) mide exactamente 10/2=5 cm, sin importar
  la forma del triángulo.'
procedimiento:
- 'Paso 1: Identifica el lado al que el segmento medio es relativo.'
- 'Paso 2: Divide la medida de ese lado entre 2.'
- 'Paso 3: Ese resultado es la medida del segmento medio.'
ejemplos:
- titulo: Calcular el segmento medio
  enunciado: El lado BC mide 14 cm.
  solucion_pasos:
  - El segmento medio relativo a BC mide 14/2=7 cm.
- titulo: Calcular el lado desde el segmento medio
  enunciado: Un segmento medio mide 6 cm.
  solucion_pasos:
  - El lado al que es relativo mide el doble, 12 cm.
- titulo: ¿El segmento medio siempre mide la mitad del tercer lado?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad general del segmento medio.
- titulo: ¿Esta razón 1:2 depende del tipo de triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, se cumple en cualquier triángulo.
errores_frecuentes:
- Invertir la relación, calculando el doble en vez de la mitad.
- Confundir el lado al que el segmento medio es relativo con otro lado del triángulo.
- Aplicar esta razón a un segmento que no es realmente un segmento medio.
fuente: Elaboración propia.
estado: publicado
