semantic_id: MAT.ALG.FUNCION_AFIN.PENDIENTE_PARAMETRO
titulo: Identificación de la pendiente en una función afín
objetivo: Identificar el parámetro $m$ de una función afín como su pendiente, y reconocer su efecto en
  la inclinación de la recta.
introduccion: 'En $f(x) = mx + n$, el primer parámetro cumple exactamente el mismo rol que en la función
  lineal: controla qué tan inclinada está la recta.'
resumen: En una función afín $f(x) = mx + n$, el parámetro $m$ es la **pendiente** de la recta, que determina
  su inclinación y si la función es creciente, decreciente o constante.
explicacion: '### Definición formal


  Dada $f(x) = mx+n$, la pendiente $m$ cumple la misma función que en la recta lineal: para dos puntos
  cualesquiera $(x_1, f(x_1))$ y $(x_2, f(x_2))$ de la gráfica, se cumple $m = \dfrac{f(x_2)-f(x_1)}{x_2-x_1}$,
  independientemente del valor de $n$.


  ### Desarrollo didáctico


  Sumar el término $n$ no cambia la inclinación de la recta, solo la desplaza verticalmente; por eso $m$
  sigue siendo el único responsable de qué tan empinada e inclinada se ve la recta.


  Comparando $f(x)=3x+5$ y $g(x)=3x-10$: ambas tienen la misma pendiente ($m=3$) y por tanto son paralelas
  entre sí, aunque estén ubicadas en alturas distintas.'
procedimiento:
- 'Paso 1: Identifica en la fórmula $mx+n$ cuál es el coeficiente que multiplica a $x$.'
- 'Paso 2: Ese coeficiente es la pendiente $m$.'
- 'Paso 3: Analiza su signo (positivo, negativo o cero) para determinar si la función crece, decrece o
  es constante.'
ejemplos:
- titulo: Identificación directa
  enunciado: Identifica la pendiente de $f(x) = -8x + 3$.
  solucion_pasos:
  - El coeficiente de $x$ es $-8$.
  - $m = -8$.
- titulo: Comparación de pendientes iguales
  enunciado: ¿Las rectas $f(x)=2x+1$ y $g(x)=2x-9$ son paralelas?
  solucion_pasos:
  - Ambas tienen la misma pendiente $m=2$.
  - Sí son paralelas, aunque tengan distinto intercepto.
- titulo: ¿El valor de $n$ afecta la pendiente de una función afín?
  enunciado: ¿El valor de $n$ afecta la pendiente de una función afín?
  respuesta: 'No'
  solucion_pasos:
  - $n$ solo desplaza verticalmente la recta; la pendiente depende únicamente de $m$.
- titulo: ¿Dos funciones afines con la misma pendiente son necesariamente paralelas?
  enunciado: ¿Dos funciones afines con la misma pendiente son necesariamente paralelas?
  respuesta: Sí
  solucion_pasos:
  - Compartir pendiente implica la misma inclinación, característica definitoria del paralelismo entre
    rectas.
errores_frecuentes:
- Confundir el coeficiente de posición $n$ con la pendiente $m$.
- Creer que sumar un valor distinto a $n$ cambia la inclinación de la recta.
- Asumir que toda función afín con pendiente positiva pasa por el primer cuadrante completo.
- No verificar el signo de $m$ al determinar si la función es creciente o decreciente.
