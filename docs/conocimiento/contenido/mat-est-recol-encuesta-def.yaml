semantic_id: MAT.EST.RECOLECCION_BASE.ENCUESTA_DEF
titulo: Reconocer la encuesta como instrumento de recolección de datos
objetivo: Reconocer la encuesta como un instrumento estructurado de preguntas utilizado para recolectar
  datos de una población o muestra.
introduccion: La encuesta es una de las herramientas más comunes en estadística para obtener información
  directamente de las personas.
resumen: Una encuesta es un instrumento de recolección de datos compuesto por un conjunto de preguntas,
  aplicado a los integrantes de una población o muestra.
explicacion: '![La encuesta como instrumento de recolección](/static/img/estadistica/recol/recol-encuesta-def.svg)


  ### Definición formal


  La encuesta es un método de recolección de datos primarios que consiste en formular preguntas estandarizadas
  a los individuos de una población o muestra.


  ### Desarrollo didáctico


  Para conocer la comida favorita de los estudiantes de un colegio, se puede diseñar una encuesta con
  la pregunta ''¿Cuál es tu comida favorita?'' y aplicarla a los estudiantes.'
procedimiento:
- 'Paso 1: Define claramente qué información se quiere obtener del estudio.'
- 'Paso 2: Diseña preguntas claras y directas relacionadas con esa información.'
- 'Paso 3: Aplica la encuesta a la población o muestra seleccionada, registrando las respuestas.'
ejemplos:
- titulo: Diseñar una encuesta escolar simple
  enunciado: Se quiere conocer el deporte favorito de un curso.
  solucion_pasos:
  - Se diseña la pregunta '¿Cuál es tu deporte favorito?' y se aplica a todos los estudiantes del curso.
- titulo: Aplicar una encuesta de satisfacción
  enunciado: Una tienda quiere conocer el nivel de satisfacción de sus clientes.
  solucion_pasos:
  - Se diseña una encuesta con preguntas sobre atención, precio y calidad, aplicada a una muestra de clientes.
- titulo: ¿La encuesta es un instrumento de recolección de datos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es uno de los instrumentos más comunes para obtener datos directamente de las personas.
- titulo: ¿Una encuesta puede aplicarse tanto a una población como a una muestra?
  respuesta: Sí
  solucion_pasos:
  - Sí, dependiendo del alcance del estudio (censo o muestreo).
errores_frecuentes:
- Diseñar preguntas ambiguas o confusas que dificultan obtener datos claros.
- No definir con anticipación qué información específica se busca antes de diseñar las preguntas.
- Confundir la encuesta (instrumento) con la muestra o población (a quiénes se aplica).
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
