semantic_id: MAT.NUM.PROP_INVERSA.GRAFICO_HIPERBOLA
titulo: Representación gráfica de la proporción inversa
objetivo: Identificar y analizar el gráfico de una proporción inversa.
introduccion: A diferencia de la proporción directa que es una flecha recta y firme que cruza el plano,
  la proporción inversa traza una curva suave y elegante que se acerca a las paredes del plano pero jamás
  las toca.
resumen: El gráfico de una proporción inversa en el primer cuadrante es una curva decreciente llamada
  hipérbola equilátera, que nunca toca los ejes (es asintótica a los ejes X e Y).
explicacion: "Una **proporcionalidad inversa** ($y = k/x$) jamás será una línea recta. Su representación\
  \ gráfica es una curva que desciende de izquierda a derecha de forma pronunciada al principio y luego\
  \ se aplana. \n\nEsta curva se llama rama de **hipérbola equilátera**. Sus características clave son:\n\
  1. Es decreciente: si $x$ avanza, $y$ baja.\n2. **Nunca toca el origen $(0,0)$** ni los ejes. Esto se\
  \ debe a que no se puede dividir por cero ($k/0$ no existe), y si $x=0$, $y$ no tiene valor; si $y=0$,\
  \ $x$ no tiene valor."
procedimiento:
- 'Paso 1: Observa el plano cartesiano.'
- 'Paso 2: Comprueba que sea una curva que baja hacia la derecha (decreciente).'
- 'Paso 3: Verifica que la curva no cruce los ejes X ni Y en el cuadrante positivo.'
ejemplos:
- titulo: Evaluando gráficos inversos
  enunciado: Una gráfica muestra una línea recta diagonal que baja de $(0,10)$ a $(10,0)$. ¿Es proporción
    inversa?
  solucion_pasos:
  - La forma es de línea recta, no curva.
  - Toca los ejes (X=10 y Y=10).
  - Por lo tanto, NO es proporción inversa. Es una función afín decreciente.
errores_frecuentes:
- Confundir una recta decreciente ($y = -mx+n$) con una hipérbola.
- Creer que la curva sí toca el cero si se le da suficiente tiempo.
- No asociar el nombre 'hipérbola' a este fenómeno y creer que es una parábola.
- Graficar puntos de proporción inversa y unirlos con líneas rectas creando un polígono, en vez de una
  curva suavizada.
fuente: Currículum Nacional MINEDUC.
estado: publicado
