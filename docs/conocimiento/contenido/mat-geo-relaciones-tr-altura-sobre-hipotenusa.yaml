semantic_id: MAT.GEO.RELACIONES_TR.ALTURA_SOBRE_HIPOTENUSA
titulo: Definición de la altura relativa a la hipotenusa en un triángulo rectángulo
objetivo: Identificar la altura trazada desde el ángulo recto hasta la hipotenusa, que da origen a las
  relaciones métricas del triángulo rectángulo.
introduccion: 'En un triángulo rectángulo, la altura que se traza desde el vértice del ángulo recto hacia
  la hipotenusa tiene un rol especial: divide al triángulo original en dos triángulos más pequeños, ambos
  semejantes entre sí y al original.'
resumen: La altura relativa a la hipotenusa es el segmento perpendicular trazado desde el vértice del
  ángulo recto hasta la hipotenusa.
explicacion: '![Altura relativa a la hipotenusa](/static/img/geometria/areas-pitagoras/relaciones-tr-altura-sobre-hipotenusa.svg)


  ### Definición formal


  En un triángulo rectángulo ABC con ángulo recto en A, la altura $h$ relativa a la hipotenusa BC es el
  segmento AH, donde H es el pie de la perpendicular desde A hacia BC.


  ### Desarrollo didáctico


  Esta altura AH divide al triángulo ABC en dos triángulos más pequeños (ABH y ACH), ambos rectángulos
  y semejantes al triángulo original ABC — esta semejanza es la base de todas las relaciones métricas
  del triángulo rectángulo.'
procedimiento:
- 'Paso 1: Identifica el vértice del ángulo recto en el triángulo rectángulo.'
- 'Paso 2: Traza el segmento perpendicular desde ese vértice hasta la hipotenusa.'
- 'Paso 3: Ese segmento es la altura relativa a la hipotenusa, y su pie divide a la hipotenusa en dos
  partes.'
ejemplos:
- titulo: Identificar la altura relativa a la hipotenusa
  enunciado: En un triángulo rectángulo ABC con ángulo recto en A, se traza AH perpendicular a BC.
  solucion_pasos:
  - AH es la altura relativa a la hipotenusa.
- titulo: Reconocer los triángulos formados
  enunciado: ¿Qué dos triángulos se forman al trazar esta altura?
  solucion_pasos:
  - Se forman los triángulos ABH y ACH, ambos rectángulos y semejantes al triángulo original.
- titulo: ¿Esta altura divide al triángulo en dos partes semejantes entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos triángulos formados son semejantes entre sí y al triángulo original.
- titulo: ¿Esta altura es distinta de las otras dos alturas del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, las otras dos alturas relativas a los catetos son, de hecho, los propios catetos.
errores_frecuentes:
- Confundir esta altura con las alturas relativas a los catetos (que coinciden con los propios catetos).
- Trazar la altura desde un vértice que no es el del ángulo recto.
- No reconocer la semejanza entre los dos triángulos formados y el original.
fuente: Elaboración propia.
estado: publicado
