semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.OPERATORIA_CON_MIXTOS
objetivo: Comprender operatoria con números mixtos mediante conversión previa y aplicarlo
  correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso operatoria con números mixtos mediante conversión previa ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Para operar con números mixtos suele convenir convertirlos primero a fracciones
  impropias. Además, trabajar con una sola representación reduce errores de cálculo.
explicacion: |-
  Para operar con números mixtos suele convenir convertirlos primero a fracciones impropias.

  Una idea importante es que trabajar con una sola representación reduce errores de cálculo.

  Por ejemplo, Para sumar \(1\frac{1}{2}+2\frac{1}{3}\) se convierten en \(\frac{3}{2}\) y \(\frac{7}{3}\).
procedimiento:
- 'Paso 1: Identificar la operación y preparar una representación adecuada de los
  datos.'
- 'Paso 2: Aplicar la regla específica de la operación respetando valor posicional
  o denominadores.'
- 'Paso 3: Simplificar o verificar el resultado final según corresponda.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Para sumar \(1\frac{1}{2}+2\frac{1}{3}\)
    se convierten en \(\frac{3}{2}\) y \(\frac{7}{3}\).” se relaciona con operatoria
    con números mixtos mediante conversión previa.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: para operar con números mixtos suele convenir convertirlos
    primero a fracciones impropias.'
  - Concluye que el ejemplo sí ilustra operatoria con números mixtos mediante conversión
    previa.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Trabajar con una sola representación reduce
    errores de cálculo.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con operatoria con números mixtos mediante
    conversión previa?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que trabajar con una sola representación reduce
    errores de cálculo.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar operatoria con números mixtos mediante conversión previa
    ignorando la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar operatoria con números mixtos mediante conversión previa sin mirar
  qué representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
