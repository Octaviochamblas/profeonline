semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.OPERATORIA_CON_MIXTOS
objetivo: Operar números mixtos.
introduccion: Una tarea matemática frecuente es operar números mixtos. El caso “Para
  sumar \(1\frac{1}{2}+2\frac{1}{3}\) se convierten en \(\frac{3}{2}\) y \(\frac{7}{3}\)”
  muestra cómo abordarla desde operatoria con números mixtos mediante conversión previa.
resumen: Para operar con números mixtos suele convenir convertirlos primero a fracciones
  impropias. Como criterio de control, trabajar con una sola representación reduce
  errores de cálculo
explicacion: |-
  Para operar con números mixtos suele convenir convertirlos primero a fracciones impropias.

  En “Para sumar \(1\frac{1}{2}+2\frac{1}{3}\) se convierten en \(\frac{3}{2}\) y \(\frac{7}{3}\)” cada decisión debe justificarse desde la definición, no desde la memoria. La comprobación decisiva es que trabajar con una sola representación reduce errores de cálculo.
procedimiento:
- 'Paso 1: Convierte cada número mixto en fracción impropia antes de operar.'
- 'Paso 2: Aplica la regla correspondiente de suma, resta, multiplicación o división.'
- 'Paso 3: Simplifica y, si conviene, vuelve a número mixto para interpretar el resultado.'
ejemplos:
- titulo: Aplicación razonada — Operatoria con números mixtos mediante conversión
    previa
  enunciado: Para sumar \(1\frac{1}{2}+2\frac{1}{3}\) se convierten en \(\frac{3}{2}\)
    y \(\frac{7}{3}\).
  solucion_pasos:
  - Convierte cada número mixto en fracción impropia antes de operar.
  - Aplica la regla correspondiente de suma, resta, multiplicación o división.
  - Simplifica y, si conviene, vuelve a número mixto para interpretar el resultado.
- titulo: Revisión de una solución — Operatoria con números mixtos mediante conversión
    previa
  enunciado: Una solución aplica “Aplica la regla correspondiente de suma, resta,
    multiplicación o división.”, pero termina sin comprobar que trabajar con una sola
    representación reduce errores de cálculo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define operatoria con números mixtos mediante conversión
    previa: para operar con números mixtos suele convenir convertirlos primero a fracciones
    impropias.'
  - Convierte cada número mixto en fracción impropia antes de operar.
  - 'Completa la revisión con este control: Simplifica y, si conviene, vuelve a número
    mixto para interpretar el resultado.'
- titulo: ¿Se cumple que trabajar con una sola representación reduce errores de cálculo?
    — Operatoria con números mixtos mediante conversión previa
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para operar con números mixtos suele
    convenir convertirlos primero a fracciones impropias.
  - El caso “Para sumar \(1\frac{1}{2}+2\frac{1}{3}\) se convierten en \(\frac{3}{2}\)
    y \(\frac{7}{3}\)” satisface esa condición.
  - Simplifica y, si conviene, vuelve a número mixto para interpretar el resultado.
- titulo: ¿Es válido omitir el paso “Convierte cada número mixto en fracción impropia
    antes de operar”? — Operatoria con números mixtos mediante conversión previa
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de operatoria con números mixtos
    mediante conversión previa.
  - 'Omitirlo puede volver inválida la acción siguiente: Aplica la regla correspondiente
    de suma, resta, multiplicación o división.'
  - 'La solución debe terminar de este modo: Simplifica y, si conviene, vuelve a número
    mixto para interpretar el resultado.'
errores_frecuentes:
- 'Empezar operatoria con números mixtos mediante conversión previa sin realizar este
  control inicial: Convierte cada número mixto en fracción impropia antes de operar.'
- Memorizar “Para sumar \(1\frac{1}{2}+2\frac{1}{3}\) se convierten en \(\frac{3}{2}\)
  y \(\frac{7}{3}\)” como respuesta aislada, sin reconstruir la definición que lo
  justifica.
- Convertir en receta el paso “Aplica la regla correspondiente de suma, resta, multiplicación
  o división.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre operatoria con números mixtos mediante conversión
  previa que contradice el criterio “Trabajar con una sola representación reduce errores
  de cálculo”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica y, si conviene,
  vuelve a número mixto para interpretar el resultado.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
