semantic_id: MAT.GEO.TRIANGULOS_ANGULOS.SUMA_INTERIORES
titulo: Teorema de la suma de ángulos interiores de un triángulo igual a 180°
objetivo: Aplicar el teorema que establece que los tres ángulos interiores de cualquier triángulo suman
  siempre 180°.
introduccion: Sin importar la forma o el tamaño del triángulo, sus tres ángulos interiores siempre suman
  exactamente 180°; este es uno de los teoremas más usados en geometría.
resumen: 'En todo triángulo, la suma de sus tres ángulos interiores es igual a 180°: α + β + γ = 180°.'
explicacion: '![Suma de ángulos interiores](/static/img/geometria/triangulos/triangulos-angulos-suma-interiores.svg)


  ### Definición formal


  Para todo triángulo ABC con ángulos interiores α, β y γ, se cumple α + β + γ = 180°.


  ### Desarrollo didáctico


  Si un triángulo tiene ángulos α=50° y β=70°, el tercer ángulo γ se obtiene despejando: γ = 180° − 50°
  − 70° = 60°. Esta relación permite siempre calcular un ángulo faltante si se conocen los otros dos.'
procedimiento:
- 'Paso 1: Identifica los tres ángulos interiores del triángulo.'
- 'Paso 2: Súmalos y verifica que el resultado sea 180°, o despeja el que falte.'
- 'Paso 3: Si falta uno, calcúlalo como 180° menos la suma de los otros dos.'
ejemplos:
- titulo: Verificar la suma
  enunciado: Un triángulo tiene ángulos de 60°, 60° y 60°.
  solucion_pasos:
  - 60° + 60° + 60° = 180°, se cumple el teorema.
- titulo: Calcular un ángulo faltante
  enunciado: Un triángulo tiene ángulos de 90° y 40°. Calcula el tercero.
  solucion_pasos:
  - 180° − 90° − 40° = 50°.
- titulo: ¿La suma de los ángulos interiores depende del tamaño del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, siempre es 180° sin importar el tamaño o la forma.
- titulo: ¿Puede un triángulo tener ángulos que sumen 190°?
  respuesta: 'No'
  solucion_pasos:
  - 'No, violaría el teorema: la suma siempre debe ser exactamente 180°.'
errores_frecuentes:
- Sumar solo dos ángulos y olvidar el tercero al verificar el teorema.
- Confundir la suma de ángulos interiores (180°) con la de exteriores (360°).
- Creer que la suma depende de si el triángulo es grande o pequeño.
fuente: Elaboración propia.
estado: publicado
