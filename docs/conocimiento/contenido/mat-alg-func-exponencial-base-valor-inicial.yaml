semantic_id: MAT.ALG.FUNC_EXPONENCIAL_BASE.VALOR_INICIAL
titulo: Interpretación del valor inicial de una función exponencial en contexto
objetivo: Interpretar el parámetro $a$ de una función exponencial aplicada como el valor inicial de la cantidad
  modelada.
introduccion: 'En problemas de crecimiento poblacional, interés compuesto o decaimiento radiactivo, el parámetro
  $a$ siempre representa lo mismo: cuánto había de esa cantidad al comienzo, antes de que transcurriera tiempo
  alguno.'
resumen: En un modelo exponencial aplicado $f(t)=a\cdot b^t$, el parámetro $a$ representa el **valor inicial**
  de la cantidad modelada, es decir, su valor en el instante $t=0$.
explicacion: '### Definición formal


  Si $f(t)=a\cdot b^t$ modela una cantidad en función del tiempo $t$, entonces $a=f(0)$ representa el valor de
  esa cantidad en el instante inicial, antes de que comience el proceso de crecimiento o decrecimiento exponencial.


  ### Desarrollo didáctico


  Identificar el valor inicial de un problema aplicado es generalmente el primer paso para plantear su modelo
  exponencial, ya que corresponde directamente al parámetro $a$ de la función.


  Si una población de bacterias comienza con $500$ individuos y se triplica cada hora, el modelo es $P(t)=500\cdot3^t$,
  donde el valor inicial $a=500$ representa la cantidad de bacterias en el instante $t=0$.'
procedimiento:
- 'Paso 1: Identifica la cantidad que se modela y su valor en el instante inicial del problema.'
- 'Paso 2: Asigna ese valor al parámetro $a$ del modelo exponencial.'
- 'Paso 3: Verifica que $a=f(0)$ tenga sentido en el contexto del problema.'
ejemplos:
- titulo: Interpretación del valor inicial en crecimiento poblacional
  enunciado: 'Una colonia de bacterias sigue el modelo $P(t)=800\cdot2^t$. ¿Cuál es el valor inicial de la población?'
  solucion_pasos:
  - El valor inicial corresponde al parámetro $a$.
  - '$P(0)=800$ bacterias.'
- titulo: Interpretación del valor inicial en decaimiento
  enunciado: 'Una sustancia radiactiva sigue el modelo $M(t)=200\cdot0{,}9^t$. ¿Cuál es la masa inicial de la
    sustancia?'
  solucion_pasos:
  - El valor inicial corresponde al parámetro $a$.
  - '$M(0)=200$ gramos (u otra unidad de masa correspondiente).'
- titulo: ¿El valor inicial de un modelo exponencial siempre corresponde al parámetro $a$?
  enunciado: ¿El valor inicial de un modelo exponencial siempre corresponde al parámetro $a$?
  respuesta: Sí
  solucion_pasos:
  - '$f(0)=a\cdot b^0=a$, independientemente del valor de la base $b$.'
- titulo: ¿El valor inicial puede identificarse sin conocer la base $b$ del modelo?
  enunciado: ¿El valor inicial puede identificarse sin conocer la base $b$ del modelo?
  respuesta: Sí
  solucion_pasos:
  - El valor inicial solo depende del parámetro $a$, no de la base $b$.
errores_frecuentes:
- Confundir el valor inicial con el valor de la función en otro instante distinto de $t=0$.
- Asignar incorrectamente el valor inicial al parámetro $b$ en vez de al parámetro $a$.
- No verificar las unidades correspondientes al interpretar el valor inicial en el contexto del problema.
- Confundir el valor inicial con la tasa de crecimiento o decrecimiento del modelo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
