semantic_id: MAT.NUM.PROG_ARITMETICA.CALCULO_PRIMER_TERMINO
titulo: Determinación del primer término a partir de un término conocido y la diferencia común
objetivo: Despejar y calcular el primer término ($a_1$) de una P.A. conociendo un término cualquiera y
  la diferencia.
introduccion: A veces entras al cine cuando la película ya empezó. Te muestran el final de la progresión
  y te piden descubrir cómo empezó. Para esto debemos usar nuestra fórmula maestra, pero caminando hacia
  atrás.
resumen: 'Si conoces un término lejano ($a_n$), su posición ($n$) y la diferencia ($d$), puedes hallar
  el origen ($a_1$) despejando la fórmula principal: $a_1 = a_n - (n - 1) \cdot d$.'
explicacion: "El término general funciona como una ecuación. Si tienes 3 de las 4 piezas del rompecabezas,\
  \ puedes encontrar la faltante despejando la incógnita.\n\nFórmula original: $a_n = a_1 + (n-1)d$\n\
  Si queremos encontrar $a_1$, simplemente pasamos todo el bloque de los pasos restando hacia el otro\
  \ lado:\n**Fórmula despejada:** $a_1 = a_n - (n-1)d$\n\nTraducción lógica: 'Al término donde estoy ahora,\
  \ le RESTO todos los pasos que di, y así regreso al inicio'.\n\nEjemplo: Sabemos que el término 8 vale\
  \ 40 ($a_8=40$) y que la sucesión avanza de 4 en 4 ($d=4$). ¿Cuál era el primer número?\n- $a_1 = 40\
  \ - (8-1) \\cdot 4$\n- $a_1 = 40 - (7) \\cdot 4$\n- $a_1 = 40 - 28 = 12$. \n¡La película empezó en el\
  \ 12!"
procedimiento:
- 'Paso 1: Identifica el valor del término conocido ($a_n$) y qué posición ocupa ($n$).'
- 'Paso 2: Identifica la diferencia ($d$).'
- 'Paso 3: Calcula cuántos pasos hay entre tu posición y el inicio (que es $n-1$).'
- 'Paso 4: Multiplica esos pasos por la diferencia y réstaselo a tu término conocido.'
ejemplos:
- titulo: Buscando las raíces
  enunciado: El décimo término de una P.A. es 5 y la diferencia es -2. ¿Cuánto vale el primer término?
  solucion_pasos:
  - 'Datos: a10=5, n=10, d=-2.'
  - 'Fórmula: a1 = a10 - (10-1)*d'
  - a1 = 5 - (9) * (-2)
  - a1 = 5 - (-18)
  - a1 = 5 + 18 = 23.
errores_frecuentes:
- Equivocarse en la regla de los signos al restar un bloque que contiene una diferencia negativa, como
  en $40 - (7 \cdot -4)$.
- Sustituir los datos de '$a_n$' y '$n$' al revés en la ecuación.
fuente: Currículum Nacional MINEDUC.
estado: publicado
