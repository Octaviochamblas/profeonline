semantic_id: MAT.NUM.PROGRESIONES_COMPARACION.ELECCION_MODELO
objetivo: Justificar la elección correcta entre un modelo aritmético o uno geométrico
  para representar un problema real.
introduccion: Imagina que eres un analista financiero. Tienes que proyectar las ganancias
  de una empresa. Si usas la herramienta equivocada, predecirás la quiebra cuando
  en realidad se volverán millonarios. Elegir el modelo es el 90% del trabajo.
resumen: La elección del modelo depende exclusivamente de la **naturaleza de la tasa
  de cambio**. Si el problema describe cuotas fijas o aportes absolutos (peso por
  peso), eliges el **Modelo Aritmético**. Si describe tasas de interés, replicación
  biológica o inflación, eliges el **Modelo Geométrico**.
explicacion: "A la hora de leer un problema complejo, subraya las palabras que denotan\
  \ cómo avanza el tiempo:\n\n1. **Palabras clave para Modelo Aritmético:** 'Bono\
  \ fijo', 'cuota mensual plana', 'caída de $5$ grados por hora', 'depreciación lineal'.\
  \ \n   - Justificación: La diferencia 'd' entre periodos es un valor constante independiente\
  \ del total acumulado.\n\n2. **Palabras clave para Modelo Geométrico:** 'Interés\
  \ compuesto', 'crecimiento poblacional', 'depreciación porcentual', 'se divide a\
  \ la mitad', 'tasa de inflación'.\n   - Justificación: El aumento o disminución\
  \ se calcula sobre el nuevo saldo de cada periodo, creando un efecto de bola de\
  \ nieve (razón 'r').\n\n*Nota PAES:* Te presentarán dos opciones de inversión o\
  \ cobro y te preguntarán cuál conviene más a largo plazo. Recuerda que la progresión\
  \ geométrica (si $r > 1$) SIEMPRE terminará superando a la aritmética, sin importar\
  \ la ventaja inicial que tenga la aritmética."
procedimiento:
- 'Paso 1: Identifica qué está cambiando en la historia.'
- 'Paso 2: Evalúa si el cambio en el paso 2 depende del tamaño del paso 1 (Ej: ganar
  el 10% de 100 no es lo mismo que el 10% de 1000). Si depende del tamaño previo,
  es Geométrico.'
- 'Paso 3: Si el cambio siempre es el mismo número rígido (Ej: ganar siempre $1000),
  es Aritmético.'
ejemplos:
- titulo: Eligiendo el plan de celular
  enunciado: 'Plan A: Pagas $10.000 más $50 por cada minuto. Plan B: El primer minuto
    cuesta $10 y cada minuto extra cuesta el doble del anterior. ¿Qué modelos son?'
  solucion_pasos:
  - 'Plan A: Suma $50 por unidad. Es Aditivo -> Modelo Aritmético.'
  - 'Plan B: Multiplica por 2 por unidad (''el doble''). Es Multiplicativo -> Modelo
    Geométrico.'
  - Si hablas 10 minutos, el Plan B te arruinará exponencialmente.
errores_frecuentes:
- 'Elegir el modelo basándose en los números iniciales (Ej: si los números son grandes,
  creer que es geométrica).'
- Olvidar que el 'interés simple' es Aritmético, mientras que el 'interés compuesto'
  es Geométrico.
fuente: Currículum Nacional MINEDUC.
estado: publicado
