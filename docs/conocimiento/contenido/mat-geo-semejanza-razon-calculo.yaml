semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.RAZON_SEMEJANZA_CALCULO
titulo: Cálculo de la razón de semejanza entre lados homólogos
objetivo: Calcular la razón de semejanza entre dos figuras semejantes a partir de las longitudes de sus
  lados homólogos.
introduccion: Con el concepto de razón de semejanza ya comprendido, es momento de aplicarlo sistemáticamente
  a problemas numéricos concretos.
resumen: Para calcular la razón de semejanza entre dos figuras, se identifican dos lados homólogos (correspondientes)
  y se dividen sus longitudes.
explicacion: '![Cálculo de la razón de semejanza](/static/img/geometria/congruencia-semejanza/semejanza-razon-calculo.svg)


  ### Definición formal


  Dados los lados homólogos $l_1$ (figura 1) y $l_2$ (figura 2), la razón de semejanza de la figura 2
  respecto a la figura 1 es $k=\frac{l_2}{l_1}$.


  ### Desarrollo didáctico


  Si un triángulo tiene lados 6, 8, 10, y su semejante tiene lados 9, 12, 15, la razón de semejanza puede
  calcularse con cualquier par homólogo: $\frac{9}{6}=\frac{12}{8}=\frac{15}{10}=1,5$. El resultado es
  el mismo sin importar qué par de lados homólogos se use.'
procedimiento:
- 'Paso 1: Identifica dos lados homólogos, uno de cada figura semejante.'
- 'Paso 2: Divide la longitud del lado de la figura de referencia por la longitud del lado homólogo en
  la otra figura.'
- 'Paso 3: Verifica, si es posible, que el mismo resultado se obtenga con otro par de lados homólogos.'
ejemplos:
- titulo: Calcular la razón usando distintos pares de lados
  enunciado: Un triángulo tiene lados 6, 8, 10; su semejante tiene lados 9, 12, 15.
  solucion_pasos:
  - k=9/6=12/8=15/10=1,5, la razón de semejanza es 1,5.
- titulo: Calcular con un solo par de lados dado
  enunciado: Dos polígonos semejantes tienen un par de lados homólogos de 5 cm y 20 cm.
  solucion_pasos:
  - k=20/5=4.
- titulo: ¿El resultado cambia según qué par de lados homólogos se use?
  respuesta: 'No'
  solucion_pasos:
  - No, la razón de semejanza es constante para cualquier par de lados homólogos.
- titulo: ¿Es necesario conocer todos los lados para calcular la razón?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con un solo par de lados homólogos conocidos.
errores_frecuentes:
- Dividir en el orden incorrecto, invirtiendo la razón sin darse cuenta.
- Usar lados que no son realmente homólogos (correspondientes) entre las dos figuras.
- Obtener resultados distintos con diferentes pares de lados y no detectar el error de correspondencia.
fuente: 'Fuente: Cid 117.'
estado: publicado
