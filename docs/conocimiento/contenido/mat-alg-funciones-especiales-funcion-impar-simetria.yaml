semantic_id: MAT.ALG.FUNCIONES_ESPECIALES.FUNCION_IMPAR_SIMETRIA
titulo: Reconocimiento de simetría respecto del origen
objetivo: Reconocer gráficamente una función impar identificando la simetría de su gráfica respecto al origen
  del sistema de coordenadas.
introduccion: Si giraras la gráfica de una función impar exactamente media vuelta alrededor del origen, quedaría
  perfectamente superpuesta a sí misma.
resumen: 'La gráfica de una función impar es **simétrica respecto al origen** $(0,0)$: girar la curva $180°$ alrededor
  del origen la deja exactamente igual a como estaba.'
explicacion: '### Definición formal


  Geométricamente, $f(-x)=-f(x)$ significa que el punto $(-a, -f(a))$ pertenece a la gráfica siempre que $(a,
  f(a))$ también pertenezca a ella. Esto equivale a la invariancia de la gráfica bajo una rotación de $180°$ alrededor
  del origen.


  ### Desarrollo didáctico


  Para reconocer visualmente, verifica que cada punto $(a,b)$ de la curva tenga su correspondiente punto $(-a,-b)$
  también sobre la curva.


  La función cúbica $f(x)=x^3$ es el ejemplo clásico: el punto $(2,8)$ está en la curva, y también lo está $(-2,-8)$,
  su reflejo por rotación de $180°$ respecto al origen.'
procedimiento:
- 'Paso 1: Identifica un punto $(a,b)$ de la gráfica.'
- 'Paso 2: Verifica si el punto $(-a,-b)$ también pertenece a la gráfica.'
- 'Paso 3: Si se cumple para todos los puntos, la función es impar (simétrica respecto al origen).'
ejemplos:
- titulo: Reconocimiento en función cúbica
  enunciado: '¿Es simétrica respecto al origen la gráfica de $f(x)=x^3$?'
  solucion_pasos:
  - Si $(1,1)$ está en la curva, también lo está $(-1,-1)$.
  - Se cumple la simetría rotacional respecto al origen.
  - Sí, es simétrica respecto al origen.
- titulo: Reconocimiento de ausencia de simetría impar
  enunciado: '¿Es simétrica respecto al origen la gráfica de $f(x)=x^2$?'
  solucion_pasos:
  - Si $(2,4)$ está en la curva, su reflejo por rotación sería $(-2,-4)$, que NO está en la parábola.
  - No es simétrica respecto al origen.
- titulo: ¿Una gráfica simétrica respecto al origen corresponde siempre a una función impar?
  enunciado: ¿Una gráfica simétrica respecto al origen corresponde siempre a una función impar?
  respuesta: Sí
  solucion_pasos:
  - Esa simetría geométrica es la traducción visual exacta de la condición algebraica $f(-x)=-f(x)$.
- titulo: ¿La gráfica de una función impar pasa siempre por el origen (si $0$ está en el dominio)?
  enunciado: ¿La gráfica de una función impar pasa siempre por el origen (si $0$ está en el dominio)?
  respuesta: Sí
  solucion_pasos:
  - Como $f(0)=0$ es una consecuencia necesaria de la condición de imparidad, el origen pertenece a la gráfica.
errores_frecuentes:
- Confundir la simetría respecto al origen (impar) con la simetría respecto al eje $y$ (par).
- Verificar la simetría con un solo punto en vez de confirmar el patrón para toda la curva.
- Aplicar erróneamente una reflexión simple (respecto a un eje) en vez de la rotación de $180°$ respecto al origen.
- Suponer que toda curva "torcida" o no simétrica respecto al eje $y$ es automáticamente impar.
