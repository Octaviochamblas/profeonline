semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.CRITERIO_LLL
titulo: 'Criterio de semejanza LLL: tres pares de lados correspondientes proporcionales'
objetivo: Aplicar el criterio LLL de semejanza para determinar que dos triángulos son semejantes verificando
  que sus tres pares de lados sean proporcionales.
introduccion: Un segundo criterio abreviado de semejanza, análogo al de congruencia pero con proporcionalidad
  en vez de igualdad, permite comparar triángulos usando exclusivamente sus tres lados.
resumen: El criterio LLL de semejanza establece que dos triángulos son semejantes si sus tres pares de
  lados correspondientes son proporcionales, es decir, mantienen la misma razón.
explicacion: '![Criterio de semejanza LLL](/static/img/geometria/congruencia-semejanza/semejanza-criterio-lll.svg)


  ### Definición formal


  Si en $\triangle ABC$ y $\triangle A''B''C''$ se cumple $\frac{AB}{A''B''}=\frac{BC}{B''C''}=\frac{CA}{C''A''}$,
  entonces $\triangle ABC\sim\triangle A''B''C''$.


  ### Desarrollo didáctico


  A diferencia del criterio LLL de congruencia (que exige lados exactamente iguales), este criterio exige
  que las tres razones entre lados correspondientes coincidan; no importa el tamaño relativo, solo que
  la proporción se mantenga constante en los tres pares.'
procedimiento:
- 'Paso 1: Identifica los tres pares de lados correspondientes entre ambos triángulos.'
- 'Paso 2: Calcula la razón (cociente) de cada par de lados correspondientes.'
- 'Paso 3: Si las tres razones son exactamente iguales, concluye semejanza por LLL.'
ejemplos:
- titulo: Verificar semejanza con tres razones iguales
  enunciado: Un triángulo tiene lados 4, 6, 8; otro tiene lados 6, 9, 12.
  solucion_pasos:
  - 6/4=9/6=12/8=1,5, las tres razones coinciden, por lo tanto son semejantes por LLL.
- titulo: Detectar cuando LLL no se cumple
  enunciado: Un triángulo tiene lados 4, 6, 8; otro tiene lados 6, 9, 11.
  solucion_pasos:
  - 6/4=1,5 y 9/6=1,5, pero 11/8=1,375; las razones no coinciden, no son semejantes.
- titulo: ¿Se necesita conocer algún ángulo para aplicar LLL?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con comparar los tres lados mediante razones.
- titulo: ¿La razón obtenida en LLL corresponde a la razón de semejanza?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa razón constante es exactamente la razón de semejanza entre ambos triángulos.
errores_frecuentes:
- Comparar lados que no son realmente correspondientes entre los dos triángulos.
- Verificar solo dos de las tres razones y asumir que la tercera también coincide.
- Confundir este criterio con el LLL de congruencia, esperando que los lados sean iguales en vez de proporcionales.
fuente: 'Fuente: Cid 118.'
estado: publicado
