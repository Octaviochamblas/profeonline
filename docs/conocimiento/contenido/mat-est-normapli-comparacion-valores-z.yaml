semantic_id: MAT.EST.NORMAL_APLICACIONES.COMPARACION_VALORES_Z
titulo: Comparar valores de distribuciones normales distintas mediante Z
objetivo: Comparar valores provenientes de distribuciones normales distintas usando sus puntajes Z respectivos.
introduccion: Comparar un resultado de una prueba con otro de una prueba totalmente distinta solo tiene sentido si
  primero conviertes ambos a la misma escala común, la de los puntajes Z.
resumen: Para comparar valores de distribuciones normales distintas, se calcula el puntaje Z de cada uno en su propia
  distribución y luego se comparan esos puntajes Z entre sí.
explicacion: '![Comparación de valores mediante puntajes Z](/static/img/estadistica/normapli/normapli-comparacion-valores-z.svg)


  ### Definición formal


  Dados dos valores $x_1\sim N(\mu_1,\sigma_1)$ y $x_2\sim N(\mu_2,\sigma_2)$, se calculan $Z_1=\dfrac{x_1-\mu_1}{\sigma_1}$

  y $Z_2=\dfrac{x_2-\mu_2}{\sigma_2}$, y se comparan ambos puntajes Z para determinar la posición relativa de cada

  valor.


  ### Desarrollo didáctico


  Un puntaje $Z$ más alto indica una posición relativa más favorable dentro de su propia distribución, sin importar

  el valor numérico original de cada dato.'
procedimiento:
- 'Paso 1: Identifica la media y desviación estándar de cada una de las dos distribuciones.'
- 'Paso 2: Calcula el puntaje Z de cada valor en su distribución correspondiente.'
- 'Paso 3: Compara ambos puntajes Z para determinar cuál valor tiene una posición relativa más alta.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Un producto A pesa 520 g en una distribución $N(500, 20)$, y un producto B pesa 210 g en una
    distribución $N(200, 5)$. ¿Cuál tiene una posición relativa más alta?
  solucion_pasos:
  - $Z_A=(520-500)/20=1$.
  - $Z_B=(210-200)/5=2$; el producto B tiene una posición relativa más alta.
- titulo: Ejemplo 2
  enunciado: ¿Por qué no basta con comparar directamente 520 g y 210 g en el ejemplo anterior?
  solucion_pasos:
  - Porque ambos productos provienen de distribuciones distintas, con medias y desviaciones estándar diferentes.
- titulo: ¿Comparar puntajes Z permite determinar la posición relativa de valores de distribuciones distintas?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente la utilidad de esta técnica.
- titulo: ¿Comparar directamente los valores originales, sin estandarizar, es una forma válida de comparación entre
    distribuciones distintas?
  respuesta: 'No'
  solucion_pasos:
  - 'No, se debe estandarizar primero, ya que las distribuciones tienen escalas distintas.'
errores_frecuentes:
- Comparar directamente los valores originales sin estandarizar cuando provienen de distribuciones distintas.
- Usar la media o desviación estándar de una distribución para estandarizar el valor de la otra.
- Confundir un puntaje Z mayor con un valor numérico original mayor.
- Ignorar que ambas distribuciones deben ser normales para que esta comparación sea válida.
- Olvidar interpretar el resultado en el contexto de cada distribución por separado.
fuente: 'Elaboración propia.'
estado: publicado
