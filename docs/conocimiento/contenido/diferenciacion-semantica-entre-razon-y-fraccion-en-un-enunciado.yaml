errores_frecuentes:
- 'Pensar que si la razón A:B es 1:4, entonces A es 1/4 del total. (Realidad: A es 1/5 del total, porque
  hay 1+4=5 partes).'
- Para «Si en una asamblea la razón entre los votos a favor y los votos en contra fue de $3$ a $2$, ¿por
  qué es matemáticamente incorrecto afirmar que los votos a favor representaron los $\frac32$ del total
  de la asamblea? (v1)», la respuesta correcta es Porque las fracciones nunca pueden tener un numerador
  mayor que el denominador.
- Para «Si en una asamblea la razón entre los votos a favor y los votos en contra fue de $3$ a $2$, ¿por
  qué es matemáticamente incorrecto afirmar que los votos a favor representaron los $\frac32$ del total
  de la asamblea? (v1)», la respuesta correcta es Porque los votos en contra debieron sumarse al numerador
  y no al denominador.
- Porque una razón de $3$ a $2$ significa que en total solo votaron $5$ personas, ni una más ni una menos.
