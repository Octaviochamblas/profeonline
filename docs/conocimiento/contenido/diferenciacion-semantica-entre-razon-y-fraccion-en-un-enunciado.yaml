semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.RAZON_FRENTE_FRACCION
titulo: Diferenciación semántica entre razón y fracción en un enunciado
objetivo: Diferenciar la traducción de una razón (comparación) de la traducción de una fracción de un
  total.
introduccion: Imagina una pizza. Si te digo 'comí 3 porciones de 8', estoy usando una fracción. Si te
  digo 'comí 3 porciones por cada 5 que tú comiste', estoy usando una razón. Ambas usan números fraccionarios,
  pero cuentan historias totalmente distintas.
resumen: Una **Fracción** compara una parte contra el **total** (ej. $3/8$ del total). Una **Razón** compara
  una parte contra **otra parte** (ej. la razón $3:5$).
explicacion: '### Definición formal


  La trampa de la razón es que los números ($3$ y $2$) no incluyen al total. El total oculto es la suma
  de las partes proporcionales ($5$). Por eso la fracción real respecto al universo es $3/5$.


  ### Desarrollo didáctico


  Análisis del error clásico:

  Situación: En un curso la razón entre hombres (H) y mujeres (M) es de 2 a 3.

  - Traducción de razón: $\frac{H}{M} = \frac{2}{3}$.

  - Conclusión falsa común: ''Los hombres son 2/3 del total del curso''. FALSO.

  - Conclusión verdadera: Si por cada 2 hombres hay 3 mujeres, el ''grupo mínimo'' es de 5 personas. Por
  lo tanto, los hombres son los $2/5$ del total, y las mujeres los $3/5$ del total.


  Regla de traducción:

  - Si el texto dice ''la razón entre A y B es $a:b$'', usa proporciones ($\frac{A}{B} = \frac{a}{b}$).

  - Si el texto dice ''A es los $a/b$ del total'', se traduce como $A = \frac{a}{b} \cdot Total$.'
procedimiento:
- 'Paso 1: Lee el enunciado. ¿Se están comparando dos partes distintas (ej. autos rojos vs autos azules)?
  Es una razón.'
- 'Paso 2: ¿Se está comparando una parte contra todo el conjunto (ej. autos rojos vs el total del estacionamiento)?
  Es una fracción de un total.'
- 'Paso 3: Si es una razón (a:b), para saber qué fracción del total representa ''a'', debes sumar a+b
  y colocarlo como denominador: a/(a+b).'
ejemplos:
- titulo: De razón a fracción total
  enunciado: Si la razón entre agua y jarabe es de 4 a 1, ¿qué fracción de la mezcla total es agua?
  solucion_pasos:
  - 'Partes de agua: 4.'
  - 'Partes de jarabe: 1.'
  - 'Total de partes en la mezcla: 4 + 1 = 5.'
  - 'Fracción de agua respecto al total: 4/5 de la mezcla.'
- titulo: Un inversionista inyecta capital en una empresa bajo la condición de que 'la razón entre mi
  enunciado: 'Un inversionista inyecta capital en una empresa bajo la condición de que ''la razón entre
    mi inversión y la del fundador sea de $2$ a $3$''. Al momento de repartir los dividendos totales ($D$),
    el inversionista exige los $\frac23 D$. El abogado del fundador le dice que su exigencia es matemáticamente
    incorrecta. ¿Qué fracción del total de dividendos le corresponde realmente al inversionista según
    su contrato? (v1)


    Opciones: A) Le corresponden los $\frac{2}{5} D$. · B) Le corresponde exactamente $\frac{1}{2} D$.
    · C) Le corresponden los $\frac{3}{2} D$. · D) Le corresponden los $\frac{3}{5} D$.'
  solucion_pasos:
  - La inversión tiene la forma 2k (inversionista) y 3k (fundador). El capital total es 5k. Por lo tanto,
    al inversionista le corresponden 2 partes de las 5 totales, es decir, 2/5 del dividendo. Exigir los
    2/3 es confundir la razón con la fracción del total.
  - 'Respuesta: Le corresponden los $\frac{2}{5} D$.'
