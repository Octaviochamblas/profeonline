semantic_id: MAT.ALG.EC_CUADR_BASE.COEFICIENTE_A
titulo: Identificación del coeficiente cuadrático a
objetivo: Identificar correctamente el coeficiente $a$ (cuadrático) en una ecuación de segundo grado dada en forma
  general.
introduccion: El coeficiente $a$ es el número que "acompaña" al término $x^2$; es el que le da a la ecuación su
  carácter cuadrático.
resumen: El **coeficiente $a$** de una ecuación de segundo grado $ax^2+bx+c=0$ es el número (distinto de cero)
  que multiplica al término $x^2$.
explicacion: '### Definición formal


  En la forma general $ax^2+bx+c=0$, el coeficiente $a$ es el número real que multiplica al término de mayor
  grado, $x^2$. Por definición de ecuación cuadrática, $a \neq 0$.


  ### Desarrollo didáctico


  Para identificar $a$, basta con localizar el término que contiene $x^2$ y leer el número que lo multiplica,
  respetando su signo. Si no aparece ningún número explícito, el coeficiente es $1$ (o $-1$ si el término es negativo).


  En $-6x^2+4x-1=0$, el coeficiente $a$ es $-6$. En $x^2-9=0$, el coeficiente $a$ es $1$, aunque no aparezca escrito.'
procedimiento:
- 'Paso 1: Ordena la ecuación en forma general si aún no lo está.'
- 'Paso 2: Localiza el término que contiene $x^2$.'
- 'Paso 3: Lee el número que lo multiplica, incluyendo su signo; ese es el coeficiente $a$.'
ejemplos:
- titulo: Identificación directa del coeficiente a
  enunciado: 'Identifica el coeficiente $a$ en $9x^2-2x+5=0$.'
  solucion_pasos:
  - El término cuadrático es $9x^2$.
  - '$a=9$.'
- titulo: Identificación del coeficiente a implícito
  enunciado: 'Identifica el coeficiente $a$ en $-x^2+3x=0$.'
  solucion_pasos:
  - 'El término cuadrático es $-x^2$, equivalente a $-1x^2$.'
  - '$a=-1$.'
- titulo: ¿El coeficiente $a$ puede ser un número negativo?
  enunciado: ¿El coeficiente $a$ puede ser un número negativo?
  respuesta: Sí
  solucion_pasos:
  - Solo se exige que $a$ sea distinto de cero; puede ser positivo o negativo.
- titulo: ¿Si no aparece ningún número antes de $x^2$, el coeficiente $a$ es cero?
  enunciado: ¿Si no aparece ningún número antes de $x^2$, el coeficiente $a$ es cero?
  respuesta: 'No'
  solucion_pasos:
  - Cuando no aparece número explícito, el coeficiente implícito es $1$ (o $-1$ si hay signo negativo), no cero.
errores_frecuentes:
- Olvidar el signo negativo del coeficiente $a$ al leerlo desde la ecuación.
- Confundir el coeficiente $a$ con el coeficiente $b$ cuando la ecuación no está ordenada.
- Asumir que un término $x^2$ sin número visible tiene coeficiente cero en vez de $1$.
- No reordenar la ecuación antes de identificar $a$, confundiéndolo con otro término.
