semantic_id: MAT.ALG.FUNC_CUADR_VERTICE.COORDENADAS_VERTICE
titulo: Determinación de las coordenadas del vértice mediante fórmulas algebraicas
objetivo: Determinar ambas coordenadas del vértice de una función cuadrática dada en forma general, usando
  fórmulas algebraicas.
introduccion: Cuando la función está dada en forma general (no canónica), existen fórmulas directas que
  permiten calcular el vértice sin necesidad de completar el cuadrado.
resumen: Para $f(x)=ax^2+bx+c$, las coordenadas del vértice son $\left(-\dfrac{b}{2a}, f\left(-\dfrac{b}{2a}\right)\right)$,
  calculando primero la coordenada $x$ y luego evaluando la función en ese valor.
explicacion: '### Definición formal


  Dada $f(x)=ax^2+bx+c$, la coordenada $x$ del vértice es $x_v=-\dfrac{b}{2a}$, y la coordenada $y$ es
  $y_v=f(x_v)$, obtenida sustituyendo $x_v$ en la función original. El vértice completo es el par ordenado
  $(x_v,y_v)$.


  ### Desarrollo didáctico


  El procedimiento tiene dos etapas claramente diferenciadas: primero calcular $x_v$ con la fórmula, y
  luego sustituir ese valor en la función para obtener $y_v$; ambos pasos son indispensables.


  Para $f(x)=x^2-6x+8$: $x_v=-\dfrac{-6}{2(1)}=3$; sustituyendo, $y_v=f(3)=9-18+8=-1$. El vértice es $(3,-1)$.'
procedimiento:
- 'Paso 1: Identifica los coeficientes $a$ y $b$ de la función.'
- 'Paso 2: Calcula $x_v=-\dfrac{b}{2a}$.'
- 'Paso 3: Sustituye $x_v$ en la función original para obtener $y_v=f(x_v)$.'
- 'Paso 4: El vértice es el par ordenado $(x_v,y_v)$.'
ejemplos:
- titulo: Cálculo de coordenadas con a igual a 1
  enunciado: Determina el vértice de $f(x)=x^2+2x-3$.
  solucion_pasos:
  - $x_v=-\dfrac{2}{2(1)}=-1$.
  - $y_v=f(-1)=1-2-3=-4$.
  - El vértice es $(-1,-4)$.
- titulo: Cálculo de coordenadas con a distinto de 1
  enunciado: Determina el vértice de $f(x)=2x^2-8x+3$.
  solucion_pasos:
  - $x_v=-\dfrac{-8}{2(2)}=2$.
  - $y_v=f(2)=8-16+3=-5$.
  - El vértice es $(2,-5)$.
- titulo: ¿Es posible calcular la coordenada $y$ del vértice sin calcular primero la coordenada $x$?
  enunciado: ¿Es posible calcular la coordenada $y$ del vértice sin calcular primero la coordenada $x$?
  respuesta: 'No'
  solucion_pasos:
  - Se necesita el valor de $x_v$ para sustituirlo en la función y obtener $y_v$.
- titulo: ¿El vértice obtenido con esta fórmula coincide con el punto $(h,k)$ de la forma canónica?
  enunciado: ¿El vértice obtenido con esta fórmula coincide con el punto $(h,k)$ de la forma canónica?
  respuesta: Sí
  solucion_pasos:
  - Ambos métodos (fórmula algebraica o forma canónica) dan exactamente el mismo vértice para la misma
    función.
errores_frecuentes:
- Calcular solo la coordenada $x$ del vértice y omitir la coordenada $y$.
- Sustituir $x_v$ incorrectamente en la función original, cometiendo errores de cálculo.
- Cometer errores de signo al calcular $-b/(2a)$.
- Confundir el orden de las coordenadas, reportando $(y_v,x_v)$ en vez de $(x_v,y_v)$.
