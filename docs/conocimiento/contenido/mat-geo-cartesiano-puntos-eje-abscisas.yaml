semantic_id: MAT.GEO.CARTESIANO_BASE.PUNTOS_EJE_ABSCISAS
titulo: Identificación de puntos situados sobre el eje de las abscisas
objetivo: Reconocer que un punto está situado sobre el eje de las abscisas si y solo si su coordenada
  y (ordenada) es igual a cero.
introduccion: Cuando un punto 'no se levanta' del eje horizontal (es decir, su altura es cero), significa
  que está exactamente sobre el eje de las abscisas.
resumen: Un punto $(x,y)$ está situado sobre el eje de las abscisas si y solo si $y=0$, sin importar el
  valor de $x$.
explicacion: '![Puntos sobre el eje de las abscisas](/static/img/geometria/cartesiano-vectores/cartesiano-puntos-eje-abscisas.svg)


  ### Definición formal


  Un punto pertenece al eje de las abscisas si y solo si su ordenada es cero: todo punto de la forma $(x,0)$,
  para cualquier valor real de $x$, se ubica sobre este eje.


  ### Desarrollo didáctico


  En la figura, los puntos $E(4,0)$ y $F(-3,0)$ están sobre el eje de las abscisas, ya que ambos tienen
  ordenada igual a 0, sin importar que sus abscisas sean distintas (una positiva y otra negativa).'
procedimiento:
- 'Paso 1: Observa la coordenada y (ordenada) del punto en cuestión.'
- 'Paso 2: Verifica si esa coordenada es igual a cero.'
- 'Paso 3: Si y=0, el punto está sobre el eje de las abscisas, sin importar el valor de x.'
ejemplos:
- titulo: Verificar si un punto está sobre el eje de las abscisas
  enunciado: El punto E(4,0) tiene ordenada 0.
  solucion_pasos:
  - Como y=0, el punto E está sobre el eje de las abscisas.
- titulo: Reconocer un punto que NO está sobre el eje de las abscisas
  enunciado: El punto (5,3) tiene ordenada 3.
  solucion_pasos:
  - Como y=3 (distinto de 0), ese punto NO está sobre el eje de las abscisas.
- titulo: ¿La abscisa (x) puede tomar cualquier valor en un punto sobre el eje de las abscisas?
  respuesta: Sí
  solucion_pasos:
  - Sí, solo importa que y=0; x puede ser cualquier número real, positivo, negativo o cero.
- titulo: ¿El origen (0,0) está sobre el eje de las abscisas?
  respuesta: Sí
  solucion_pasos:
  - Sí, el origen cumple y=0, por lo que también está sobre el eje de las abscisas (y también sobre el
    de las ordenadas).
errores_frecuentes:
- Confundir la condición y=0 con x=0 al determinar si un punto está sobre este eje.
- Creer que el valor de x debe ser positivo o cero para que el punto esté sobre el eje.
- No reconocer que el origen (0,0) también cumple esta condición.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Baldor 293).'
estado: publicado
