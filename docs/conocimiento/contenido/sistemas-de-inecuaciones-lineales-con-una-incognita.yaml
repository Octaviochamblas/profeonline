semantic_id: MAT.ALG.SISTEMAS_INECUACIONES
titulo: Sistemas de inecuaciones lineales con una incógnita
objetivo: Resolver e interpretar sistemas de inecuaciones lineales con una variable, determinando la intersección
  de las condiciones simultáneas que debe cumplir la incógnita.
introduccion: En muchos problemas una sola restricción no basta. Un sistema de inecuaciones permite modelar
  varias condiciones al mismo tiempo y encontrar únicamente los valores que satisfacen todas ellas de
  manera simultánea.
resumen: Un sistema de inecuaciones lineales con una incógnita está formado por dos o más desigualdades
  en la misma variable, y su solución corresponde a la intersección de los conjuntos solución de cada
  una de ellas.
explicacion: '### Definición formal

  Un sistema de inecuaciones lineales con una incógnita es un conjunto finito de desigualdades de primer
  grado en una misma variable, consideradas de forma conjunta. Su conjunto solución está dado por los
  valores reales que verifican simultáneamente cada una de las inecuaciones del sistema.


  ### Desarrollo didáctico

  La idea central no es resolver “todo de una vez”, sino estudiar cada condición por separado y luego
  conservar solamente los valores comunes. Esa comparación final puede hacerse con intervalos, con una
  recta numérica o con lenguaje conjuntista. Si no hay puntos en común, el sistema no tiene solución;
  si todas las restricciones compatibles se superponen, la solución es justamente esa zona común.'
procedimiento:
- Resolver cada inecuación del sistema de manera independiente, aplicando las reglas de equivalencia correspondientes.
- Representar cada conjunto solución con desigualdades, intervalos o semirrectas para facilitar la comparación.
- Determinar la intersección de los conjuntos obtenidos, conservando solo los valores que cumplen todas
  las condiciones.
- Verificar si la intersección es un intervalo, un punto, un conjunto vacío u otra forma equivalente dentro
  de $\mathbb{R}$.
- Interpretar el resultado en el contexto cuando el sistema proviene de una situación aplicada.
ejemplos:
- titulo: Doble restricción sobre una cantidad
  enunciado: Un valor $x$ debe ser al menos $4$ y, a la vez, menor que $11$. Exprese el sistema y determine
    su solución.
  solucion_pasos:
  - Las condiciones se escriben como $x\ge 4$ y $x<11$.
  - La primera solución es $[4,\infty)$ y la segunda es $(-\infty,11)$.
  - La solución del sistema es la intersección de ambos conjuntos.
  - Por tanto, el conjunto solución es $[4,11)$.
- titulo: Sistema incompatible
  enunciado: Resuelva el sistema formado por $x>6$ y $x\le 2$.
  solucion_pasos:
  - La primera inecuación admite valores mayores que $6$.
  - La segunda admite valores menores o iguales que $2$.
  - No existe número real que satisfaga ambas condiciones al mismo tiempo.
  - La solución del sistema es el conjunto vacío, $\varnothing$.
- titulo: ¿La solución de un sistema se obtiene uniendo los intervalos?
  respuesta: Falso
  solucion_pasos:
  - En un sistema las condiciones deben cumplirse simultáneamente.
  - Por eso se trabaja con intersección, no con unión, salvo que el problema exprese explícitamente una
    alternativa.
  - Unir intervalos daría valores que cumplen solo una parte del sistema.
- titulo: ¿Un sistema de inecuaciones puede no tener solución?
  respuesta: Verdadero
  solucion_pasos:
  - Si los conjuntos solución de las inecuaciones no tienen puntos comunes, la intersección es vacía.
  - Esto ocurre cuando las restricciones son incompatibles entre sí.
  - En ese caso el sistema se expresa como $\varnothing$.
errores_frecuentes:
- Reemplazar la intersección por la unión al combinar las soluciones parciales.
- Resolver correctamente cada inecuación por separado, pero comparar mal los extremos de los intervalos.
- Omitir la revisión de compatibilidad entre desigualdades aparentemente similares.
- Perder la inclusión o exclusión de extremos al traducir de desigualdad a intervalo.
- Interpretar como “sin solución” un sistema cuya intersección es un único punto permitido.
