semantic_id: MAT.GEO.PARALELOGRAMOS.CUADRADO_LADOS_CONGRUENTES
titulo: Propiedad de cuatro lados congruentes en el cuadrado
objetivo: Reconocer que el cuadrado, como caso particular de paralelogramo, tiene sus cuatro lados congruentes
  entre sí.
introduccion: El cuadrado es uno de los casos particulares más conocidos de paralelogramo, con una propiedad
  adicional muy característica respecto a sus lados.
resumen: En un cuadrado, los cuatro lados son congruentes entre sí (tienen exactamente la misma longitud).
explicacion: '![Cuatro lados congruentes en el cuadrado](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-cuadrado-lados-congruentes.svg)


  ### Definición formal


  Un cuadrado es un paralelogramo con $AB=BC=CD=DA$; es decir, sus cuatro lados tienen exactamente la
  misma longitud.


  ### Desarrollo didáctico


  A diferencia del paralelogramo general (que solo garantiza lados OPUESTOS iguales), el cuadrado va más
  allá: TODOS sus lados son iguales, no solo los opuestos. Esta propiedad, junto con tener los cuatro
  ángulos rectos, define completamente al cuadrado.'
procedimiento:
- 'Paso 1: Verifica que la figura sea un cuadrado.'
- 'Paso 2: Si lo es, todos sus cuatro lados tienen la misma longitud.'
- 'Paso 3: Conociendo un solo lado, se conocen los cuatro (todos iguales).'
ejemplos:
- titulo: Calcular el perímetro de un cuadrado conociendo un lado
  enunciado: Un cuadrado tiene un lado de 6 cm.
  solucion_pasos:
  - Los cuatro lados miden 6 cm, y el perímetro es 4×6=24 cm.
- titulo: Verificar la propiedad con datos numéricos
  enunciado: Un cuadrilátero tiene lados 5, 5, 5, 5 cm y todos sus ángulos son rectos.
  solucion_pasos:
  - 'Es un cuadrado, ya que cumple ambas condiciones: lados y ángulos congruentes.'
- titulo: ¿Todo rombo es también un cuadrado?
  respuesta: 'No'
  solucion_pasos:
  - No, el rombo tiene los cuatro lados iguales pero no necesariamente ángulos rectos; el cuadrado requiere
    ambas condiciones.
- titulo: ¿Es suficiente con lados iguales para ser un cuadrado?
  respuesta: 'No'
  solucion_pasos:
  - No, también se requieren los cuatro ángulos rectos; de lo contrario, sería un rombo no cuadrado.
errores_frecuentes:
- Confundir el cuadrado con el rombo, olvidando el requisito adicional de ángulos rectos.
- Creer que basta con verificar dos lados iguales, sin comprobar los cuatro.
- Aplicar esta propiedad a un rectángulo no cuadrado, donde solo los lados opuestos son iguales.
fuente: 'Fuente: Moraleja Tomo 2 68, Cid 45.'
estado: publicado
