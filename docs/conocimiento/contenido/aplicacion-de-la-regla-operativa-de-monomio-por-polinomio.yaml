errores_frecuentes:
- Olvidar cambiar el signo de los términos interiores cuando el monomio multiplicador es negativo.
- Multiplicar el monomio por el primer término y sumar el resto del polinomio sin multiplicar.
- $-10x^2 - 15x$.
- $-10x^2 - 3$.
- $-10x + 15$.
