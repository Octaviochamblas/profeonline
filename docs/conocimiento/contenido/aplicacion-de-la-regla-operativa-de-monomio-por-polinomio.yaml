semantic_id: MAT.ALG.MULT_MON_POL.REGLA_OPERATIVA
titulo: Aplicación de la regla operativa de monomio por polinomio
objetivo: Multiplicar un monomio por un polinomio siguiendo la regla operativa formal del álgebra.
introduccion: La regla operativa para multiplicar un monomio por un polinomio establece un orden estricto
  para realizar cada multiplicación individual. Seguir este protocolo de forma metódica garantiza que
  no haya descuidos de signo o de variables.
resumen: La **Regla Operativa** para multiplicar un monomio por un polinomio exige escribir el monomio,
  abrir paréntesis para el polinomio, y multiplicar el monomio por cada uno de los términos del polinomio
  de izquierda a derecha, respetando las leyes de multiplicación.
explicacion: '### Definición formal


  Sea $M=cx_1^{\alpha_1}\cdots x_k^{\alpha_k}$ un monomio y sea $P=\sum_{i=1}^{n}d_i x_1^{\beta_{i1}}\cdots
  x_k^{\beta_{ik}}$ un polinomio. Su producto se obtiene mediante

  $$M\cdot P=\sum_{i=1}^{n}(cd_i)x_1^{\alpha_1+\beta_{i1}}\cdots x_k^{\alpha_k+\beta_{ik}}.$$

  La regla operativa consiste en distribuir $M$, determinar el signo de cada producto, multiplicar los
  coeficientes y sumar los exponentes de las bases iguales. Los términos resultantes solo se reducen si
  son semejantes.


  ### Desarrollo didáctico


  Sea la operación: $-4a^2(2a^2 - 3ab + 5b^2)$.


  Aplicamos la regla operativa distribuyendo $-4a^2$ de izquierda a derecha:

  1. $(-4a^2)(2a^2) = -8a^4$.

  2. $(-4a^2)(-3ab) = +12a^3b$ (ojo con el signo: negativo × negativo = positivo).

  3. $(-4a^2)(+5b^2) = -20a^2b^2$.


  Resultado completo: $-8a^4 + 12a^3b - 20a^2b^2$.'
procedimiento:
- 'Paso 1: Escribe el monomio multiplicador delante del polinomio encerrado en paréntesis.'
- 'Paso 2: Multiplica el monomio por el primer término del polinomio (signo, número, letras).'
- 'Paso 3: Multiplica el monomio por el segundo término del polinomio (signo, número, letras).'
- 'Paso 4: Continúa término a término hasta finalizar el polinomio.'
- 'Paso 5: Escribe el polinomio resultante con sus términos ordenados.'
- 'Multiplicamos: $(-5x)(2x) = -10x^2$. $(-5x)(-3) = +15x$. Resultado: $-10x^2 + 15x$.'
ejemplos:
- titulo: Monomio negativo distribuidor
  enunciado: 'Multiplica: -3x(2x^2 - x + 4).'
  solucion_pasos:
  - 'Multiplicación 1: (-3x)(2x^2) = -6x^3.'
  - 'Multiplicación 2: (-3x)(-x) = +3x^2.'
  - 'Multiplicación 3: (-3x)(+4) = -12x.'
  - 'Resultado combinado: -6x^3 + 3x^2 - 12x.'
- titulo: La producción de un insumo se modela como $P = -3k^2(2k - 5)$. Para fines de presupuesto, ¿c
  enunciado: 'La producción de un insumo se modela como $P = -3k^2(2k - 5)$. Para fines de presupuesto,
    ¿cuál es la expresión equivalente al distribuir la producción? (v1)


    Opciones: A) $-6k^3 + 15k^2$ · B) $-6k^3 - 15k^2$ · C) $-6k^2 + 15k$ · D) $-6k^3 + 5$'
  solucion_pasos:
  - 'Distribuimos el monomio: $-3k^2 \cdot 2k = -6k^3$. $-3k^2 \cdot (-5) = +15k^2$. Resultado: $-6k^3
    + 15k^2$.'
