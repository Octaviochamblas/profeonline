semantic_id: MAT.GEO.POLIEDROS_PRISMAS.TETRAEDRO_REGULAR
titulo: Identificación del tetraedro regular
objetivo: Reconocer el tetraedro regular como el poliedro regular más simple, formado por cuatro caras
  triangulares equiláteras congruentes.
introduccion: El tetraedro regular es como una pirámide de base triangular donde absolutamente todas las
  caras (incluida la base) son triángulos equiláteros idénticos.
resumen: El tetraedro regular es un poliedro regular formado por 4 caras triangulares equiláteras congruentes,
  4 vértices y 6 aristas, con 3 caras concurriendo en cada vértice.
explicacion: '![Tetraedro regular](/static/img/geometria/espacio-cuerpos/tetraedro-regular.svg)


  ### Definición formal


  El tetraedro regular es uno de los cinco sólidos platónicos. Tiene 4 caras (todas triángulos equiláteros
  congruentes), 4 vértices y 6 aristas. En cada vértice concurren exactamente 3 caras.


  ### Desarrollo didáctico


  En la figura, el tetraedro está formado por 4 triángulos: una base y tres caras laterales, todas del
  mismo tamaño y forma. Es el poliedro regular con menor número de caras posible (no puede existir un
  poliedro regular con solo 2 o 3 caras).'
procedimiento:
- 'Paso 1: Verifica que el cuerpo tenga exactamente 4 caras triangulares.'
- 'Paso 2: Verifica que las 4 caras sean triángulos equiláteros congruentes entre sí.'
- 'Paso 3: Confirma que en cada uno de los 4 vértices concurran exactamente 3 caras.'
ejemplos:
- titulo: Contar los elementos del tetraedro regular
  enunciado: Un tetraedro regular tiene 4 caras triangulares.
  solucion_pasos:
  - 'Tiene 4 caras, 4 vértices y 6 aristas, cumpliendo la relación de Euler: 4-6+4=2.'
- titulo: Verificar que las caras sean congruentes
  enunciado: Las 4 caras de un tetraedro regular son triángulos equiláteros de igual tamaño.
  solucion_pasos:
  - Como todas las caras son congruentes y regulares (equiláteras), y en cada vértice concurren 3 caras,
    se trata de un tetraedro regular.
- titulo: ¿El tetraedro regular es el poliedro regular con menos caras?
  respuesta: Sí
  solucion_pasos:
  - Sí, con solo 4 caras, es el sólido platónico más simple posible.
- titulo: ¿Todas las pirámides de base triangular son tetraedros regulares?
  respuesta: 'No'
  solucion_pasos:
  - No, solo lo son si además las 4 caras son triángulos equiláteros congruentes; una pirámide triangular
    común no cumple necesariamente esta condición.
errores_frecuentes:
- Confundir cualquier pirámide de base triangular con un tetraedro regular, sin verificar la congruencia
  de las caras.
- Olvidar que la base también debe ser un triángulo equilátero congruente con las caras laterales.
- Contar incorrectamente el número de aristas o vértices del tetraedro.
fuente: 'Elaboración propia (referencia: Moraleja 96).'
estado: publicado
