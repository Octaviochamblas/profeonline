semantic_id: MAT.EST.TABLAS_NO_AGRUPADAS.FREQ_ABSOLUTA
titulo: Definir y registrar la frecuencia absoluta
objetivo: Definir y registrar la frecuencia absoluta (f) como el conteo directo de repeticiones de cada
  valor en una tabla de frecuencias.
introduccion: La frecuencia absoluta es la primera columna de datos que se construye al tabular un conjunto
  de datos no agrupados.
resumen: La frecuencia absoluta, denotada $f$, es el número de veces que un valor específico aparece en
  el conjunto de datos, tal como se define en el concepto de frecuencia.
explicacion: '![Frecuencia absoluta](/static/img/estadistica/tablasna/tablasna-freq-absoluta.svg)


  ### Definición formal


  $f_i$ es el número de observaciones iguales a $x_i$ en el conjunto de datos, registrado en la tabla
  de frecuencia.


  ### Desarrollo didáctico


  En el conjunto {5, 6, 4, 7, 6, 5, 5}, la tabla de frecuencia absoluta sería: x=4, f=1; x=5, f=3; x=6,
  f=2; x=7, f=1.'
procedimiento:
- 'Paso 1: Ordena los valores distintos del conjunto de datos.'
- 'Paso 2: Cuenta cuántas veces aparece cada valor distinto.'
- 'Paso 3: Registra ese conteo en la columna de frecuencia absoluta (f) de la tabla.'
ejemplos:
- titulo: Construir la columna de frecuencia absoluta
  enunciado: 'Conjunto: {4, 5, 5, 6, 6, 6, 7}.'
  solucion_pasos:
  - x=4, f=1; x=5, f=2; x=6, f=3; x=7, f=1.
- titulo: Construir la frecuencia absoluta de notas
  enunciado: 'Notas: {6, 7, 6, 5, 7, 7}.'
  solucion_pasos:
  - x=5, f=1; x=6, f=2; x=7, f=3.
- titulo: ¿La suma de todas las frecuencias absolutas es igual al total de datos?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa suma siempre coincide con el número total de observaciones (n).
- titulo: ¿La frecuencia absoluta puede tomar valores decimales?
  respuesta: 'No'
  solucion_pasos:
  - No, es siempre un número entero, ya que representa un conteo de repeticiones.
errores_frecuentes:
- Omitir algún valor distinto del conjunto de datos al construir la tabla.
- Contar mal las repeticiones de un valor, especialmente en conjuntos de datos grandes.
- No verificar que la suma de las frecuencias absolutas coincida con el total de datos (n).
fuente: 'Elaboración propia (referencia: Moraleja 198, 351).'
estado: publicado
