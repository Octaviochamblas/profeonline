semantic_id: MAT.EST.MEDIANA_ANALISIS.TABLA_FRECUENCIA
titulo: Calcular la mediana en tablas usando frecuencia acumulada
objetivo: Calcular la mediana a partir de una tabla de frecuencias, usando la frecuencia acumulada para
  localizar la posición central.
introduccion: Cuando los datos están en una tabla de frecuencias, la frecuencia acumulada permite localizar
  directamente en qué valor se encuentra la posición central buscada.
resumen: En una tabla de frecuencias, la mediana es el valor x cuya frecuencia acumulada (F) alcanza o
  supera por primera vez la posición central (n+1)/2 o n/2, según corresponda.
explicacion: '![Mediana en tablas de frecuencia acumulada](/static/img/estadistica/mediana/mediana-tabla-frecuencia.svg)


  ### Definición formal


  Se busca el primer valor $x_i$ tal que su frecuencia acumulada $F_i$ sea mayor o igual a la posición
  central buscada.


  ### Desarrollo didáctico


  Con x=4,f=2,F=2; x=5,f=3,F=5; x=6,f=5,F=10 (n=10), la posición central se ubica entre 5 y 6 (posiciones
  5 y 6): F(5)=5 alcanza exactamente la posición 5, y F(6)=10 cubre la posición 6, por lo que la mediana
  es (5+6)/2=5,5.'
procedimiento:
- 'Paso 1: Calcula la frecuencia acumulada (F) de cada valor de la tabla.'
- 'Paso 2: Determina la posición central buscada, según si n es par o impar.'
- 'Paso 3: Identifica el valor x cuya frecuencia acumulada alcanza o supera por primera vez esa posición
  central; ese valor (o el promedio con el siguiente, si n es par) es la mediana.'
ejemplos:
- titulo: Calcular la mediana con tabla de 3 valores
  enunciado: x=4,f=2,F=2; x=5,f=3,F=5; x=6,f=5,F=10 (n=10).
  solucion_pasos:
  - Posiciones centrales 5 y 6. F(5)=5 cubre la posición 5; F(6)=10 cubre la posición 6. Mediana=(5+6)/2=5,5.
- titulo: Calcular la mediana con tabla de notas (n impar)
  enunciado: x=4,f=2,F=2; x=5,f=3,F=5; x=6,f=2,F=7 (n=7).
  solucion_pasos:
  - Posición central=(7+1)/2=4. F(5)=5 es la primera F que alcanza o supera la posición 4. Mediana=5.
- titulo: ¿Es necesario calcular primero la frecuencia acumulada antes de encontrar la mediana en una
    tabla?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la herramienta clave para localizar la posición central dentro de la tabla.
- titulo: ¿Se debe buscar el primer valor cuya frecuencia acumulada alcance o supere la posición buscada?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el criterio estándar para ubicar la mediana en una tabla de frecuencias.
errores_frecuentes:
- Buscar la posición central en la columna de frecuencia absoluta (f) en vez de la acumulada (F).
- No determinar correctamente si se debe promediar dos valores (n par) o tomar uno solo (n impar).
- Confundir el valor de la frecuencia acumulada con el valor x correspondiente a esa fila.
fuente: 'Elaboración propia (referencia: Moraleja 360).'
estado: publicado
