semantic_id: MAT.NUM.NOTACION_CIENTIFICA.ESCRITURA_NUMERO_PEQUENO
titulo: Escritura de un número pequeño en notación científica
objetivo: Convertir números pequeños a notación científica.
introduccion: Los ceros iniciales no aportan cifras significativas, pero sí indican escala. Un exponente
  negativo conserva esa información de forma compacta.
resumen: Un número entre cero y uno usa exponente negativo en notación científica. El exponente negativo
  indica cuántos lugares debe moverse la coma hacia la izquierda al reconstrui.
explicacion: 'Un número entre cero y uno usa exponente negativo en notación científica.


  El cálculo “\(0.000072=7.2\times10^{-5}\)” muestra por qué el exponente negativo indica cuántos lugares
  debe moverse la coma hacia la izquierda al reconstrui'
procedimiento:
- 'Paso 1: Mueve la coma a la derecha hasta obtener un coeficiente entre \(1\) y \(10\).'
- 'Paso 2: Cuenta los lugares y escribe el exponente con signo negativo.'
- 'Paso 3: Devuelve la coma hacia la izquierda para confirmar el valor original.'
ejemplos:
- titulo: Aplicación razonada — Escritura de un número pequeño en notación científica
  enunciado: \(0.000072=7.2\times10^{-5}\).
  solucion_pasos:
  - Mueve la coma a la derecha hasta obtener un coeficiente entre \(1\) y \(10\).
  - Cuenta los lugares y escribe el exponente con signo negativo.
  - Devuelve la coma hacia la izquierda para confirmar el valor original.
- titulo: Revisión de una solución — Escritura de un número pequeño en notación científica
  enunciado: Una solución aplica “Cuenta los lugares y escribe el exponente con signo negativo.”, pero
    termina sin comprobar que el exponente negativo indica cuántos lugares debe moverse la coma hacia
    la izquierda al reconstrui. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define escritura de un número pequeño en notación científica: un número
    entre cero y uno usa exponente negativo en notación científica.'
  - Mueve la coma a la derecha hasta obtener un coeficiente entre \(1\) y \(10\).
  - 'Completa la revisión con este control: Devuelve la coma hacia la izquierda para confirmar el valor
    original.'
- titulo: ¿Se cumple que el exponente negativo indica cuántos lugares debe moverse la coma hacia la izquierda
    al reconstrui? — Escritura de un número pequeño en notación científica
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un número entre cero y uno usa exponente negativo en notación
    científica.
  - El caso “\(0.000072=7.2\times10^{-5}\)” satisface esa condición.
  - Devuelve la coma hacia la izquierda para confirmar el valor original.
- titulo: ¿Es válido omitir el paso “Mueve la coma a la derecha hasta obtener un coeficiente entre \(1\)
    y \(10\)”? — Escritura de un número pequeño en notación científica
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de escritura de un número pequeño en notación científica.
  - 'Omitirlo puede volver inválida la acción siguiente: Cuenta los lugares y escribe el exponente con
    signo negativo.'
  - 'La solución debe terminar de este modo: Devuelve la coma hacia la izquierda para confirmar el valor
    original.'
errores_frecuentes:
- 'Confundir escritura de un número pequeño en notación científica con otro concepto y omitir este inicio:
  Mueve la coma a la derecha hasta obtener un coeficiente entre \(1\) y \(10\).'
- Aplicar mecánicamente “Cuenta los lugares y escribe el exponente con signo negativo.” sin revisar las
  condiciones de la definición.
- Tomar “\(0.000072=7.2\times10^{-5}\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el exponente negativo indica cuántos lugares debe
  moverse la coma hacia la izquierda al reconstrui”.
- 'Terminar el desarrollo sin realizar este control: Devuelve la coma hacia la izquierda para confirmar
  el valor original.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
