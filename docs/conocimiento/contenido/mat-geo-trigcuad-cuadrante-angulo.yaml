semantic_id: MAT.GEO.TRIG_CUADRANTES.CUADRANTE_ANGULO
titulo: Determinación del cuadrante al que pertenece un ángulo
objetivo: Determinar, a partir de la medida de un ángulo en posición general, en cuál de los cuatro cuadrantes
  del plano cartesiano se ubica su lado terminal.
introduccion: El plano cartesiano se divide en cuatro cuadrantes (I, II, III, IV), y según el rango en
  que se encuentre la medida de un ángulo, su lado terminal cae en uno de ellos.
resumen: 'Un ángulo en posición general pertenece al cuadrante en el que se ubica su lado terminal: cuadrante
  I si $0°<\theta<90°$, cuadrante II si $90°<\theta<180°$, cuadrante III si $180°<\theta<270°$, y cuadrante
  IV si $270°<\theta<360°$.'
explicacion: '![Cuadrante de un ángulo](/static/img/geometria/trigonometria/trigcuad-cuadrante-angulo.svg)


  ### Definición formal


  Dado un ángulo $\theta$ en posición general con $0°\le\theta<360°$, se determina su cuadrante comparando
  su medida con los límites 90°, 180° y 270°.


  ### Desarrollo didáctico


  En la figura, el ángulo de 210° tiene su lado terminal en el tercer cuadrante, ya que 210° está entre
  180° y 270°. Si el lado terminal cae exactamente sobre un eje (0°, 90°, 180°, 270°), el ángulo no pertenece
  a ningún cuadrante, se dice que es un ángulo cuadrantal.'
procedimiento:
- 'Paso 1: Verifica que la medida del ángulo esté entre 0° y 360° (reduciéndola si es necesario).'
- 'Paso 2: Compara la medida con los límites 90°, 180° y 270°.'
- 'Paso 3: Determina el cuadrante según el rango correspondiente (I: 0°-90°, II: 90°-180°, III: 180°-270°,
  IV: 270°-360°).'
ejemplos:
- titulo: Determinar el cuadrante de un ángulo de 210°
  enunciado: θ=210°.
  solucion_pasos:
  - Como 180°<210°<270°, el ángulo pertenece al tercer cuadrante.
- titulo: Determinar el cuadrante de un ángulo de 320°
  enunciado: θ=320°.
  solucion_pasos:
  - Como 270°<320°<360°, el ángulo pertenece al cuarto cuadrante.
- titulo: ¿Un ángulo de 90° pertenece a algún cuadrante?
  respuesta: 'No'
  solucion_pasos:
  - 'No, 90° es un ángulo cuadrantal: su lado terminal cae exactamente sobre el eje y, entre el primer
    y segundo cuadrante.'
- titulo: ¿Puede determinarse el cuadrante de un ángulo mayor a 360°?
  respuesta: Sí
  solucion_pasos:
  - Sí, primero se reduce restando múltiplos de 360° hasta obtener un ángulo entre 0° y 360°, y luego
    se determina su cuadrante.
errores_frecuentes:
- Olvidar reducir un ángulo mayor a 360° antes de determinar su cuadrante.
- Confundir los límites de cada cuadrante (por ejemplo, asignar 100° al primer cuadrante).
- Asignar un cuadrante a un ángulo cuadrantal (0°, 90°, 180°, 270°), que en realidad no pertenece a ninguno.
fuente: Elaboración propia.
estado: publicado
