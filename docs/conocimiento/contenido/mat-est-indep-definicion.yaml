semantic_id: MAT.EST.INDEPENDENCIA_CONDICIONAL.DEFINICION
titulo: Definición de independencia estadística mediante probabilidad condicional
objetivo: Definir la independencia estadística entre dos eventos como la situación en que la ocurrencia
  de uno no cambia la probabilidad del otro.
introduccion: 'La probabilidad condicional permite formalizar de manera precisa la idea intuitiva de que
  dos eventos son independientes: saber que uno ocurrió no aporta ninguna información sobre el otro.'
resumen: Dos eventos $A$ y $B$ (con $P(B)>0$) son independientes si $P(A|B)=P(A)$, es decir, si la ocurrencia
  de $B$ no modifica la probabilidad de $A$.
explicacion: '![Definición de independencia estadística](/static/img/probabilidad/independencia/indep-definicion.svg)


  ### Definición formal


  Si $P(A|B)=P(A)$, se dice que $A$ es independiente de $B$: saber que $B$ ocurrió no cambia la probabilidad
  de $A$.


  ### Desarrollo didáctico


  Al lanzar una moneda y un dado, el resultado de la moneda (P(cara)=0,5) no cambia sin importar qué salió
  en el dado: P(cara|cualquier resultado del dado)=0,5=P(cara), por lo que son independientes.'
procedimiento:
- 'Paso 1: Calcula P(A) sin ninguna condición.'
- 'Paso 2: Calcula P(A|B), la probabilidad de A condicionada a B.'
- 'Paso 3: Si ambos valores son iguales, A y B son independientes; si son distintos, son dependientes.'
ejemplos:
- titulo: Verificar independencia entre moneda y dado
  enunciado: P(cara)=0,5, P(cara|cualquier resultado del dado)=0,5.
  solucion_pasos:
  - Como P(cara|dado)=P(cara), los eventos son independientes.
- titulo: Verificar dependencia en extracción sin reposición
  enunciado: P(roja)=0,5 inicialmente, P(roja|se extrajo una roja antes)=4/9≈0,44.
  solucion_pasos:
  - Como P(roja|extracción previa)≠P(roja), los eventos son dependientes.
- titulo: ¿La independencia se define comparando P(A|B) con P(A)?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición formal basada en probabilidad condicional.
- titulo: ¿Puede confirmarse independencia con un solo caso comparado?
  respuesta: Sí
  solucion_pasos:
  - Sí, aunque en la práctica también se puede verificar con la fórmula del producto P(A∩B)=P(A)×P(B).
errores_frecuentes:
- Confundir independencia con eventos mutuamente excluyentes (son conceptos distintos).
- Concluir independencia sin verificar realmente que P(A|B)=P(A).
- Asumir independencia por 'sentido común' sin realizar el cálculo correspondiente.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
