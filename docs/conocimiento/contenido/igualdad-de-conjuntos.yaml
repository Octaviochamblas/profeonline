semantic_id: MAT.FUND.RELACIONES_CONJUNTOS.IGUALDAD_CONJUNTOS
titulo: Igualdad de conjuntos
objetivo: Determinar si dos conjuntos son iguales verificando que contengan exactamente los mismos elementos.
introduccion: 'Imagina que tienes una caja con lápices azul y rojo, y tu amigo tiene otra caja con lápices
  rojo y azul. Aunque los hayan ordenado de manera diferente, ¿tienen los mismos lápices? ¡Claro que sí!
  Ambas cajas contienen exactamente las mismas cosas.


  En matemáticas, decimos que dos conjuntos son iguales si tienen exactamente los mismos elementos, sin
  importar el orden en que los escribamos ni si los repetimos dentro de las llaves.


  Saber cuándo dos conjuntos son iguales te permitirá simplificar expresiones y entender que la forma
  en que representas una lista no cambia su contenido real.'
resumen: 'Dos conjuntos $A$ y $B$ son iguales (denotado por $A = B$) si y solo si tienen exactamente los
  mismos elementos. Formalmente, esto ocurre si cada elemento de $A$ pertenece a $B$ y cada elemento de
  $B$ pertenece a $A$ ($A \subseteq B$ y $B \subseteq A$).

  '
explicacion: 'La **igualdad de conjuntos** es una relación de equivalencia fundamental.


  **Definición Formal:**

  Dos conjuntos $A$ y $B$ son iguales, lo cual se escribe $A = B$, si y solo si se cumple la siguiente
  condición lógica:

  $$\forall x, (x \in A \iff x \in B)$$

  Esto significa que:

  1. Todo elemento de $A$ es también un elemento de $B$ ($A \subseteq B$).

  2. Todo elemento de $B$ es también un elemento de $A$ ($B \subseteq A$).


  Si al menos un elemento pertenece a un conjunto pero no al otro, entonces los conjuntos son **diferentes**
  ($A \neq B$).


  **Propiedades Clave:**

  * **El orden no importa:** El conjunto $\{1, 2, 3\}$ es igual al conjunto $\{3, 2, 1\}$.

  * **La repetición no afecta:** El conjunto $\{a, b\}$ es igual al conjunto $\{a, b, a, b\}$.

  * **La definición por comprensión vs. extensión:** Dos conjuntos pueden estar definidos de maneras muy
  distintas, pero ser iguales si sus soluciones o elementos coinciden. Por ejemplo, si $A = \{x \in \mathbb{N}
  : x^2 = 4\}$ y $B = \{2\}$, entonces $A = B$.'
procedimiento:
- 'Paso 1: Toma el primer conjunto ($A$) y verifica si cada uno de sus elementos está presente en el segundo
  conjunto ($B$).'
- 'Paso 2: Toma el segundo conjunto ($B$) y verifica si cada uno de sus elementos está presente en el
  primer conjunto ($A$).'
- 'Paso 3: Si ambas verificaciones son exitosas, concluye que los conjuntos son iguales ($A = B$). Si
  encuentras al menos un elemento que esté en uno pero no en el otro, concluye que son distintos ($A \neq
  B$).'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determina si los conjuntos $A = \{2, 3, 5\}$ y $B = \{3, 5, 2, 3\}$ son iguales.
  solucion_pasos:
  - 'Paso a: Analizamos los elementos de $A$: 2, 3 y 5. Verificamos que todos ellos están en $B$. Efectivamente,
    2, 3 y 5 pertenecen a $B$.'
  - 'Paso b: Analizamos los elementos de $B$: 3, 5, 2 y 3. Verificamos que todos ellos están en $A$. Efectivamente,
    3, 5 y 2 pertenecen a $A$.'
  - 'Paso c: Como todos los elementos de $A$ están en $B$ y todos los elementos de $B$ están en $A$, concluimos
    que $A = B$. El orden y la repetición del 3 en $B$ no alteran la igualdad.'
- titulo: Ejemplo 2
  enunciado: 'Verifica si el conjunto $C = \{x \in \mathbb{Z} : x^2 = 9\}$ es igual a $D = \{3\}$.'
  solucion_pasos:
  - 'Paso a: Resolvemos la condición de comprensión para el conjunto $C$. Los números enteros cuyo cuadrado
    es 9 son 3 y -3. Así, expresado por extensión, $C = \{-3, 3\}$.'
  - 'Paso b: Comparamos con el conjunto $D = \{3\}$. Vemos que el elemento $-3$ pertenece a $C$, pero
    no pertenece a $D$.'
  - 'Paso c: Como hay un elemento en $C$ que no está en $D$, los conjuntos no tienen los mismos elementos.
    Por lo tanto, $C \neq D$.'
- titulo: ¿Son iguales los conjuntos $P = \\{1, 2\\}$ y $Q = \\{1, 2, 3\\}$?
  respuesta: 'No'
  solucion_pasos:
  - Para que $P$ y $Q$ sean iguales, todos sus elementos deben coincidir.
  - El elemento 3 pertenece a $Q$, pero no pertenece a $P$.
  - Como existe un elemento en uno de los conjuntos que no está en el otro, concluimos que $P \neq Q$.
- titulo: '¿Es el conjunto $M = \\{x \\in \\mathbb{N} : x \\text{ es par y } 3 < x < 5\\}$ igual al conjunto
    $N = \\{4\\}$?'
  respuesta: Sí
  solucion_pasos:
  - Buscamos los elementos de $M$. El único número natural que es par y está estrictamente entre 3 y 5
    es el 4. Por lo tanto, $M = \{4\}$.
  - El conjunto $N$ contiene únicamente al elemento 4, es decir, $N = \{4\}$.
  - Dado que ambos conjuntos tienen exactamente el mismo elemento único, se cumple que $M = N$.
errores_frecuentes:
- Pensar que dos conjuntos son distintos solo porque sus elementos están en un orden diferente.
- Creer que tener más elementos repetidos hace que un conjunto sea diferente de otro con los mismos elementos
  sin repetir.
- Confundir la igualdad de conjuntos (mismos elementos) con tener la misma cardinalidad (misma cantidad
  de elementos).
- Olvidar verificar la pertenencia en ambas direcciones (de $A$ a $B$ y de $B$ a $A$).
- Asumir que la igualdad de conjuntos requiere que estén definidos con la misma fórmula o texto descriptivo.
fuente: Álgebra y Fundamentos, Universidad de Chile
estado: publicado
