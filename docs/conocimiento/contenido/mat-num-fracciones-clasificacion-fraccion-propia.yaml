semantic_id: MAT.NUM.FRACCIONES_CLASIFICACION.FRACCION_PROPIA
objetivo: Comprender identificación de fracción propia y aplicarlo correctamente en
  ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso identificación de fracción propia ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Una fracción propia tiene numerador menor que denominador y representa una
  cantidad menor que 1. Además, toda fracción propia positiva se ubica entre 0 y 1
  en la recta numérica.
explicacion: |-
  Una fracción propia tiene numerador menor que denominador y representa una cantidad menor que 1.

  Una idea importante es que toda fracción propia positiva se ubica entre 0 y 1 en la recta numérica.

  Por ejemplo, \(\frac{3}{5}\) es propia porque 3 es menor que 5.
procedimiento:
- 'Paso 1: Observar numerador y denominador, y verificar si el denominador es distinto
  de cero.'
- 'Paso 2: Comparar numerador y denominador o transformar la fracción si hace falta.'
- 'Paso 3: Clasificar la expresión según la definición de identificación de fracción
  propia.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{3}{5}\) es propia porque 3 es
    menor que 5.” se relaciona con identificación de fracción propia.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: una fracción propia tiene numerador menor que denominador
    y representa una cantidad menor que 1.'
  - Concluye que el ejemplo sí ilustra identificación de fracción propia.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Toda fracción propia positiva se ubica entre
    0 y 1 en la recta numérica.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con identificación de fracción propia?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que toda fracción propia positiva se ubica
    entre 0 y 1 en la recta numérica.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar identificación de fracción propia ignorando la definición
    o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar identificación de fracción propia sin mirar qué representan numerador,
  denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
