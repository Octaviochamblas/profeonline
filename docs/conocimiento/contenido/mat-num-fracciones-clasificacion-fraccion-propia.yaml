semantic_id: MAT.NUM.FRACCIONES_CLASIFICACION.FRACCION_PROPIA
titulo: Fracción propia
objetivo: Reconocer una fracción propia a partir de la comparación entre numerador y denominador.
introduccion: 'No todas las fracciones representan una cantidad menor que el entero completo: cuando el
  numerador es menor que el denominador, la fracción sí queda "dentro" de un entero, y se llama fracción
  propia.'
resumen: Una fracción \(\frac{a}{b}\) es propia si \(0<a<b\), y representa una cantidad entre \(0\) y
  \(1\).
explicacion: '### Definición formal


  Una fracción \(\frac{a}{b}\) (con \(a,b\) enteros positivos) es propia si \(a<b\). En ese caso, \(0<\frac{a}{b}<1\):
  la fracción representa menos que un entero completo.


  ### Desarrollo didáctico


  \(\frac{3}{5}\) es propia porque \(3<5\): al ubicarla en la recta numérica, queda entre \(0\) y \(1\),
  representando menos de un entero completo.'
procedimiento:
- 'Paso 1: Comprueba que numerador y denominador sean naturales y que el denominador no sea cero.'
- 'Paso 2: Compara ambos términos y verifica que el numerador sea menor.'
- 'Paso 3: Confirma que el valor obtenido quede entre \(0\) y \(1\).'
ejemplos:
- titulo: Aplicación razonada — Identificación de fracción propia
  enunciado: \(\frac{3}{5}\) es propia porque 3 es menor que 5.
  solucion_pasos:
  - Comprueba que numerador y denominador sean naturales y que el denominador no sea cero.
  - Compara ambos términos y verifica que el numerador sea menor.
  - Confirma que el valor obtenido quede entre \(0\) y \(1\).
- titulo: Revisión de una solución — Identificación de fracción propia
  enunciado: Una solución aplica “Compara ambos términos y verifica que el numerador sea menor.”, pero
    termina sin comprobar que toda fracción propia positiva se ubica entre 0 y 1 en la recta numérica.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de fracción propia: una fracción propia tiene numerador
    menor que denominador y representa una cantidad menor que 1.'
  - Comprueba que numerador y denominador sean naturales y que el denominador no sea cero.
  - 'Completa la revisión con este control: Confirma que el valor obtenido quede entre \(0\) y \(1\).'
- titulo: ¿Se cumple que toda fracción propia positiva se ubica entre 0 y 1 en la recta numérica? — Identificación
    de fracción propia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una fracción propia tiene numerador menor que denominador
    y representa una cantidad menor que 1.
  - El caso “\(\frac{3}{5}\) es propia porque 3 es menor que 5” satisface esa condición.
  - Confirma que el valor obtenido quede entre \(0\) y \(1\).
- titulo: ¿Es válido omitir el paso “Comprueba que numerador y denominador sean naturales y que el denominador
    no sea cero”? — Identificación de fracción propia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de fracción propia.
  - 'Omitirlo puede volver inválida la acción siguiente: Compara ambos términos y verifica que el numerador
    sea menor.'
  - 'La solución debe terminar de este modo: Confirma que el valor obtenido quede entre \(0\) y \(1\).'
errores_frecuentes:
- 'Empezar identificación de fracción propia sin realizar este control inicial: Comprueba que numerador
  y denominador sean naturales y que el denominador no sea cero.'
- Memorizar “\(\frac{3}{5}\) es propia porque 3 es menor que 5” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Compara ambos términos y verifica que el numerador sea menor.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación de fracción propia que contradice el criterio “Toda
  fracción propia positiva se ubica entre 0 y 1 en la recta numérica”.
- 'Cerrar el ejercicio sin esta comprobación específica: Confirma que el valor obtenido quede entre \(0\)
  y \(1\).'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
estado: publicado
