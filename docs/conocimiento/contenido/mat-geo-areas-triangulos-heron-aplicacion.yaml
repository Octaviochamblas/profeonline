semantic_id: MAT.GEO.AREAS_TRIANGULOS.HERON_APLICACION
titulo: Cálculo del área de un triángulo usando la fórmula de Herón dados los tres lados
objetivo: Calcular el área de un triángulo aplicando la fórmula de Herón paso a paso, dados sus tres lados.
introduccion: Con los tres lados de un triángulo y la fórmula de Herón, calcular el área es solo cuestión de
  seguir un procedimiento ordenado, sin necesitar la altura.
resumen: Para calcular el área con la fórmula de Herón se calcula primero el semiperímetro, luego las tres
  diferencias con los lados, y finalmente la raíz cuadrada de su producto.
explicacion: '![Aplicación de la fórmula de Herón](/static/img/geometria/areas-pitagoras/areas-triangulos-heron-aplicacion.svg)


  ### Definición formal


  Para un triángulo de lados $a$, $b$, $c$, se calcula $s=\frac{a+b+c}{2}$ y luego se evalúa

  $A=\sqrt{s(s-a)(s-b)(s-c)}$.


  ### Desarrollo didáctico


  Por ejemplo, para un triángulo de lados 5, 6 y 7: el semiperímetro es $s=9$, por lo que

  $A=\sqrt{9(9-5)(9-6)(9-7)}=\sqrt{9\cdot 4\cdot 3\cdot 2}=\sqrt{216}\approx 14{,}7$.'
procedimiento:
- 'Paso 1: Calcula el semiperímetro $s$ del triángulo.'
- 'Paso 2: Calcula $s-a$, $s-b$ y $s-c$.'
- 'Paso 3: Multiplica $s$ por esas tres diferencias y aplica la raíz cuadrada al resultado.'
ejemplos:
- titulo: Triángulo de lados 5, 6 y 7
  enunciado: Calcula el área de un triángulo con lados 5, 6 y 7 usando la fórmula de Herón.
  solucion_pasos:
  - 'Semiperímetro: $s=(5+6+7)/2=9$.'
  - 'Área: $A=\sqrt{9(9-5)(9-6)(9-7)}=\sqrt{9\cdot 4\cdot 3\cdot 2}=\sqrt{216}\approx 14{,}7$.'
- titulo: Triángulo de lados 8, 9 y 10
  enunciado: Calcula el área de un triángulo con lados 8, 9 y 10 usando la fórmula de Herón.
  solucion_pasos:
  - 'Semiperímetro: $s=(8+9+10)/2=13{,}5$.'
  - 'Área: $A=\sqrt{13{,}5(13{,}5-8)(13{,}5-9)(13{,}5-10)}=\sqrt{13{,}5\cdot 5{,}5\cdot 4{,}5\cdot 3{,}5}\approx 36{,}2$.'
- titulo: ¿El primer paso siempre es calcular el semiperímetro?
  respuesta: Sí
  solucion_pasos:
  - Sí, sin él no se pueden calcular las tres diferencias necesarias.
- titulo: ¿El resultado final se obtiene sin aplicar ninguna raíz cuadrada?
  respuesta: 'No'
  solucion_pasos:
  - 'No, el último paso siempre es aplicar la raíz cuadrada al producto obtenido.'
errores_frecuentes:
- Calcular mal el semiperímetro antes de continuar con el resto del procedimiento.
- Restar los lados en el orden incorrecto, obteniendo diferencias negativas mal interpretadas.
- Olvidar la raíz cuadrada final y entregar el producto interno como si fuera el área.
- Redondear demasiado pronto los resultados intermedios, afectando la precisión final.
- Confundir los lados del triángulo al momento de sustituir en la fórmula.
fuente: 'Elaboración propia.'
estado: publicado
