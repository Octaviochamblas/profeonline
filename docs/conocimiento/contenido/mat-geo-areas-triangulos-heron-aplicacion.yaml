semantic_id: MAT.GEO.AREAS_TRIANGULOS.HERON_APLICACION
titulo: Aplicación de la fórmula de Herón a problemas con los tres lados dados
objetivo: Resolver problemas numéricos aplicando paso a paso la fórmula de Herón cuando se conocen los
  tres lados de un triángulo.
introduccion: Con la fórmula de Herón ya conocida, es momento de aplicarla de forma sistemática a distintos
  triángulos escalenos.
resumen: 'Para aplicar Herón: se calcula primero el semiperímetro, luego las tres diferencias, y finalmente
  la raíz del producto.'
explicacion: '![Aplicación de la fórmula de Herón](/static/img/geometria/areas-pitagoras/areas-triangulos-heron-aplicacion.svg)


  ### Definición formal


  Dados lados $a=13$, $b=14$, $c=15$: $s=\frac{13+14+15}{2}=21$, y $A=\sqrt{21\times8\times7\times6}=\sqrt{7056}=84$.


  ### Desarrollo didáctico


  Este triángulo (13-14-15) es un ejemplo clásico donde el área resulta un número entero exacto, útil
  para practicar el procedimiento completo sin decimales.'
procedimiento:
- 'Paso 1: Calcula el semiperímetro con los tres lados dados.'
- 'Paso 2: Calcula (s-a), (s-b) y (s-c).'
- 'Paso 3: Multiplica los cuatro valores (s y las tres diferencias) y calcula la raíz cuadrada.'
ejemplos:
- titulo: Aplicar Herón al triángulo 13-14-15
  enunciado: Un triángulo tiene lados 13, 14 y 15 cm.
  solucion_pasos:
  - s=21; A=√(21×8×7×6)=√7056=84 cm².
- titulo: Aplicar Herón al triángulo 7-8-9
  enunciado: Un triángulo tiene lados 7, 8 y 9 cm.
  solucion_pasos:
  - s=12; A=√(12×5×4×3)=√720≈26,83 cm².
- titulo: ¿El área de 13-14-15 es un número entero?
  respuesta: Sí
  solucion_pasos:
  - Sí, da exactamente 84 cm², un caso especial sin decimales.
- titulo: ¿Todos los triángulos dan área entera con Herón?
  respuesta: 'No'
  solucion_pasos:
  - No, en general el resultado puede ser un número irracional o decimal.
errores_frecuentes:
- Confundir el orden de las diferencias, por ejemplo calcular (a-s) en vez de (s-a).
- Errores aritméticos al multiplicar los cuatro factores antes de la raíz.
- Redondear demasiado pronto en pasos intermedios, acumulando error en el resultado final.
fuente: Elaboración propia.
estado: publicado
