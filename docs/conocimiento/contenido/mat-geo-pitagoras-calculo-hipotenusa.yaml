semantic_id: MAT.GEO.PITAGORAS.CALCULO_HIPOTENUSA
titulo: Cálculo de la hipotenusa dados los dos catetos
objetivo: Calcular la medida de la hipotenusa de un triángulo rectángulo cuando se conocen sus dos catetos.
introduccion: Conocer los dos catetos de un triángulo rectángulo es suficiente para determinar completamente
  la medida de su hipotenusa, aplicando directamente el teorema de Pitágoras.
resumen: Para calcular la hipotenusa de un triángulo rectángulo se suman los cuadrados de los catetos
  y se extrae la raíz cuadrada del resultado.
explicacion: '![Cálculo de la hipotenusa con los dos catetos](/static/img/geometria/areas-pitagoras/pitagoras-calculo-hipotenusa.svg)


  ### Definición formal


  Si un triángulo rectángulo tiene catetos $a$ y $b$, su hipotenusa es $c=\sqrt{a^2+b^2}$.


  ### Desarrollo didáctico


  Con catetos 3 y 4: $c=\sqrt{3^2+4^2}=\sqrt{9+16}=\sqrt{25}=5$.'
procedimiento:
- 'Paso 1: Eleva al cuadrado cada uno de los dos catetos.'
- 'Paso 2: Suma esos dos cuadrados.'
- 'Paso 3: Calcula la raíz cuadrada de esa suma: ese es el valor de la hipotenusa.'
ejemplos:
- titulo: Calcular con catetos 6 y 8
  enunciado: Un triángulo rectángulo tiene catetos 6 y 8.
  solucion_pasos:
  - c=√(6²+8²)=√(36+64)=√100=10.
- titulo: Calcular con catetos 5 y 12
  enunciado: Un triángulo rectángulo tiene catetos 5 y 12.
  solucion_pasos:
  - c=√(5²+12²)=√(25+144)=√169=13.
- titulo: ¿Se necesita conocer algún ángulo para este cálculo?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con conocer los dos catetos.
- titulo: ¿El resultado siempre es mayor que ambos catetos?
  respuesta: Sí
  solucion_pasos:
  - Sí, la hipotenusa siempre es el lado más largo del triángulo rectángulo.
errores_frecuentes:
- Olvidar extraer la raíz cuadrada al final, dejando el resultado como el cuadrado de la hipotenusa.
- Sumar los catetos directamente en vez de sus cuadrados.
- Confundir un cateto con la hipotenusa al identificar los datos del problema.
fuente: Elaboración propia.
estado: publicado
