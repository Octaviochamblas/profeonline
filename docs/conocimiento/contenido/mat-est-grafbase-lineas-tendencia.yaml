semantic_id: MAT.EST.GRAFICOS_BASE.LINEAS_TENDENCIA
titulo: Representar la evolución temporal mediante gráficos de línea
objetivo: Representar la evolución de una variable a lo largo del tiempo mediante un gráfico de líneas,
  conectando los valores consecutivos.
introduccion: El gráfico de líneas es la forma estándar de mostrar cómo cambia un valor en el tiempo,
  permitiendo visualizar tendencias de crecimiento o disminución.
resumen: Un gráfico de líneas representa los valores de una variable en distintos momentos del tiempo,
  conectados mediante segmentos de recta que muestran la tendencia general.
explicacion: '![Gráfico de líneas para evolución temporal](/static/img/estadistica/grafbase/grafbase-lineas-tendencia.svg)


  ### Definición formal


  Cada punto del gráfico representa el valor de la variable en un momento específico; los puntos se conectan
  con segmentos de recta en orden cronológico.


  ### Desarrollo didáctico


  Si las ventas mensuales de una tienda son 50, 60, 55, 80, 95 (enero a mayo), se dibuja un punto para
  cada mes y se conectan en orden, mostrando la tendencia general de crecimiento.'
procedimiento:
- 'Paso 1: Ordena los datos cronológicamente según el momento en que fueron registrados.'
- 'Paso 2: Ubica un punto para cada valor, en la posición correspondiente del eje temporal.'
- 'Paso 3: Conecta los puntos consecutivos con segmentos de recta, en el orden cronológico.'
ejemplos:
- titulo: Construir un gráfico de líneas de ventas mensuales
  enunciado: 'Ventas: enero=50, febrero=60, marzo=55, abril=80, mayo=95.'
  solucion_pasos:
  - Se dibuja un punto para cada mes con su valor de ventas, y se conectan en orden cronológico con segmentos
    de recta.
- titulo: Interpretar la tendencia de un gráfico de líneas
  enunciado: Un gráfico de líneas muestra una subida sostenida de enero a mayo.
  solucion_pasos:
  - La tendencia general es de crecimiento a lo largo de ese periodo.
- titulo: ¿Un gráfico de líneas es adecuado para mostrar cambios a lo largo del tiempo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es su aplicación principal, a diferencia del gráfico circular o de barras.
- titulo: ¿Los puntos de un gráfico de líneas deben conectarse en un orden aleatorio?
  respuesta: 'No'
  solucion_pasos:
  - No, deben conectarse en orden cronológico para representar correctamente la evolución en el tiempo.
errores_frecuentes:
- Conectar los puntos en un orden distinto al cronológico, distorsionando la tendencia representada.
- Usar un gráfico de líneas para variables sin orden temporal natural (como categorías nominales), lo
  cual no tiene sentido.
- No usar una escala uniforme en el eje del tiempo, distorsionando visualmente la tendencia.
fuente: Elaboración propia.
estado: publicado
