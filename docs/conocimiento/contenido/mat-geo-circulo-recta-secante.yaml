semantic_id: MAT.GEO.CIRCULO_RECTAS.SECANTE
titulo: Definición de recta secante a una circunferencia como recta con dos puntos de intersección
objetivo: Reconocer una recta secante a una circunferencia como aquella que la corta en exactamente dos
  puntos.
introduccion: El segundo caso posible en la posición relativa entre una recta y una circunferencia ocurre
  cuando la recta atraviesa la figura, cortándola.
resumen: Una recta es secante a una circunferencia cuando la corta en exactamente dos puntos; la distancia
  del centro a la recta es menor que el radio.
explicacion: '![Recta secante: dos puntos de intersección](/static/img/geometria/circunferencia-circulo/circulo-recta-secante.svg)


  ### Definición formal


  Una recta $L$ es secante a una circunferencia de centro $O$ y radio $r$ si la distancia de $O$ a $L$
  es menor que $r$: $d(O,L)<r$. En este caso, $L$ y la circunferencia comparten exactamente dos puntos.


  ### Desarrollo didáctico


  El segmento de la recta secante que queda dentro de la circunferencia (entre sus dos puntos de intersección)
  es precisamente una cuerda; toda cuerda de una circunferencia proviene de prolongar una recta secante.'
procedimiento:
- 'Paso 1: Calcula la distancia entre el centro de la circunferencia y la recta.'
- 'Paso 2: Compara esa distancia con el radio de la circunferencia.'
- 'Paso 3: Si la distancia es menor que el radio, la recta es secante (corta en dos puntos).'
ejemplos:
- titulo: Identificar una recta secante
  enunciado: Una circunferencia tiene radio 6 cm, y una recta está a 4 cm del centro.
  solucion_pasos:
  - La recta es secante, ya que 4<6.
- titulo: Relacionar la secante con la cuerda
  enunciado: Una recta secante corta a la circunferencia en dos puntos A y B.
  solucion_pasos:
  - El segmento AB (dentro de la circunferencia) es una cuerda de la circunferencia.
- titulo: ¿Una recta secante tiene exactamente dos puntos en común con la circunferencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición que la define.
- titulo: ¿La distancia del centro a una recta secante es siempre menor que el radio?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la condición matemática para que exista intersección en dos puntos.
errores_frecuentes:
- Confundir una recta secante con una tangente, sin verificar el número de puntos de intersección.
- Creer que cualquier recta que 'atraviese' visualmente el dibujo es secante, sin verificar la distancia
  al centro.
- Confundir la recta secante (infinita) con la cuerda (el segmento delimitado por los dos puntos de intersección).
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
