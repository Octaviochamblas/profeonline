semantic_id: MAT.ALG.SUSTRACCION_POL.METODO_VERTICAL
objetivo: Restar polinomios mediante el método vertical, convirtiendo la resta en
  suma del opuesto.
introduccion: 'En aritmética, restar es sumar el opuesto: $9 - 4 = 9 + (-4)$. En álgebra
  aplica exactamente lo mismo. Para restar verticalmente, convertimos el sustraendo
  en su opuesto y sumamos.'
resumen: En la **Sustracción Vertical**, se escribe el minuendo arriba y el sustraendo
  debajo. Luego se invierte el signo de todos los términos del sustraendo y se realiza
  la suma columna por columna.
explicacion: "Resta: $(5x^2 + 3x - 2) - (2x^2 - x + 4)$.\n\nFormato vertical:\n```\n\
  \  5x² + 3x - 2\n- 2x² -  x + 4\n─────────────\n```\n\nInvertimos los signos del\
  \ sustraendo:\n```\n  5x² + 3x - 2\n+ (-2x²+ x - 4)\n─────────────\n  3x² + 4x -\
  \ 6\n```\n\nResultado: $3x^2 + 4x - 6$."
procedimiento:
- 'Paso 1: Escribe el minuendo en la primera fila.'
- 'Paso 2: Escribe el sustraendo debajo, alineando términos semejantes.'
- 'Paso 3: Invierte el signo de CADA término del sustraendo.'
- 'Paso 4: Suma columna por columna como en la adición.'
ejemplos:
- titulo: Restar cambiando de bando
  enunciado: 'Resta: (7a + 5) - (3a - 2).'
  solucion_pasos:
  - 'Invertimos el sustraendo: -3a+2 → +3a+2... espera, el signo de 3a es + entonces
    su opuesto es -3a... ya es -3a+2... aquí ponemos +(-3a+2).'
  - 'Corregimos: sustraendo original (3a - 2). Opuesto: (-3a + 2).'
  - 'Suma: (7a+5) + (-3a+2) = 4a + 7.'
errores_frecuentes:
- Invertir solo el signo del primer término del sustraendo.
- Confundir el minuendo con el sustraendo (restar al revés).
fuente: Álgebra de Baldor.
estado: publicado
