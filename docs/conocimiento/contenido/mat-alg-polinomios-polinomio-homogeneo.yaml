semantic_id: MAT.ALG.POLINOMIOS.POLINOMIO_HOMOGENEO
objetivo: Identificar polinomios homogéneos donde todos los términos poseen idéntico
  grado absoluto.
introduccion: ¿Alguna vez has visto un equipo de levantamiento de pesas donde todos
  levantan exactamente los mismos kilos? En álgebra, a ese equipo perfectamente equilibrado
  en peso se le llama Homogéneo.
resumen: Un **Polinomio Homogéneo** es aquel en el que **todos y cada uno de sus términos
  tienen exactamente el mismo grado absoluto**.
explicacion: "Homo significa 'igual' o 'mismo'. Para saber si es homogéneo, debemos\
  \ pesar (calcular el grado absoluto) de cada vagón por separado.\n- Polinomio: $x^3\
  \ + x^2y - xy^2 + y^3$\n  - Vagón 1 ($x^3$): Grado $3$.\n  - Vagón 2 ($x^2y$): Grado\
  \ $2+1 = 3$.\n  - Vagón 3 ($-xy^2$): Grado $1+2 = 3$.\n  - Vagón 4 ($y^3$): Grado\
  \ $3$.\nTodos los vagones pesan $3$. ¡Es un polinomio homogéneo de tercer grado!\n\
  \nSi tan solo un término tuviera un grado distinto, la homogeneidad se rompe al\
  \ instante."
procedimiento:
- 'Paso 1: Calcula el grado absoluto (suma de exponentes de las letras) del primer
  término.'
- 'Paso 2: Haz lo mismo con el segundo término.'
- 'Paso 3: Continúa hasta el final.'
- 'Paso 4: Si todos los resultados numéricos son idénticos, es Homogéneo.'
ejemplos:
- titulo: Prueba de equilibrio
  enunciado: Determina si a^4 + a^2b^2 - b^4 es homogéneo.
  solucion_pasos:
  - 'Término 1 (a^4): Grado 4.'
  - 'Término 2 (a^2b^2): Grado 2+2 = 4.'
  - 'Término 3 (-b^4): Grado 4.'
  - Todos tienen grado 4. Sí, es un polinomio homogéneo.
errores_frecuentes:
- Creer que 'homogéneo' significa que todos los términos deben tener la misma letra
  (eso sería tener una sola variable, no ser homogéneo).
- Olvidarse de sumar los exponentes ocultos ('1') y clasificar mal un término mixto,
  rompiendo falsamente la homogeneidad.
fuente: Álgebra de Baldor.
estado: publicado
