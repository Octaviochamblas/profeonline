semantic_id: MAT.GEO.TRIG_APLICA_REAL.DISTANCIAS_INACCESIBLES
titulo: Determinación de distancias inaccesibles mediante resolución de triángulos oblicuángulos
objetivo: Calcular una distancia que no puede medirse directamente, modelando la situación como un triángulo
  oblicuángulo y aplicando la ley de senos o de cosenos.
introduccion: A diferencia de los problemas de distancias indirectas con triángulo rectángulo, aquí el
  triángulo formado no tiene ángulo recto, por lo que se necesitan las leyes de senos o cosenos para resolverlo.
resumen: Una distancia inaccesible en un contexto de triángulo oblicuángulo se calcula formando un triángulo
  con los puntos relevantes, identificando los datos disponibles (lados y ángulos medibles), y aplicando
  la ley de senos o de cosenos según corresponda.
explicacion: '![Distancias inaccesibles con triángulos oblicuángulos](/static/img/geometria/trigonometria/trigreal-distancias-inaccesibles.svg)


  ### Definición formal


  Dados dos puntos accesibles y uno inaccesible, se forma un triángulo con esos tres puntos. Midiendo
  la distancia entre los puntos accesibles y los ángulos hacia el punto inaccesible desde cada uno de
  ellos, se puede calcular la distancia inaccesible mediante la ley de senos.


  ### Desarrollo didáctico


  Por ejemplo, para medir la distancia a una isla desde dos puntos de la costa: se mide la distancia entre
  esos dos puntos (c) y los ángulos hacia la isla desde cada uno (A y B). Con estos datos (ASA), se calcula
  el ángulo restante y luego, mediante la ley de senos, la distancia desde cualquiera de los puntos hasta
  la isla.'
procedimiento:
- 'Paso 1: Identifica los puntos accesibles (donde se puede medir) y el punto inaccesible.'
- 'Paso 2: Mide la distancia entre los puntos accesibles y los ángulos hacia el punto inaccesible desde
  cada uno.'
- 'Paso 3: Aplica la ley de senos (o cosenos, según los datos) para calcular la distancia inaccesible
  buscada.'
ejemplos:
- titulo: Calcular la distancia a una isla desde dos puntos de la costa
  enunciado: c=500 m entre dos puntos de la costa, con ángulos A=50° y B=60° hacia la isla.
  solucion_pasos:
  - 'El ángulo C=180°-50°-60°=70°. Luego, usando ley de senos: distancia_a_la_isla=500×sin50°/sin70°≈407,6
    m.'
- titulo: Reconocer que se forma un triángulo oblicuángulo
  enunciado: Los ángulos medidos hacia el punto inaccesible no son de 90°.
  solucion_pasos:
  - Como no hay ángulo recto garantizado, el triángulo formado es oblicuángulo, por lo que se necesita
    ley de senos o cosenos.
- titulo: ¿Se necesita medir al menos una distancia entre puntos accesibles?
  respuesta: Sí
  solucion_pasos:
  - Sí, sin esa distancia de referencia no se puede aplicar ninguna de las dos leyes.
- titulo: ¿Este método es una extensión del cálculo de distancias indirectas con triángulo rectángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, generaliza esa idea a situaciones donde no hay un ángulo recto disponible.
errores_frecuentes:
- Asumir que existe un ángulo recto en la situación sin verificarlo, aplicando razones trigonométricas
  básicas de forma incorrecta.
- Olvidar calcular el tercer ángulo antes de aplicar la ley de senos, cuando se conocen dos ángulos.
- Confundir cuál distancia es la medible (entre puntos accesibles) y cuál la inaccesible (hacia el punto
  lejano).
fuente: Elaboración propia.
estado: publicado
