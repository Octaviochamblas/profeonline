semantic_id: MAT.NUM.PROG_GEOMETRICA.MODELO_CRECIMIENTO_PORCENTUAL
objetivo: Modelar situaciones de crecimiento o decrecimiento porcentual constante
  mediante el uso de progresiones geométricas.
introduccion: Si tu dinero crece un 5% cada año, no está creciendo sumando la misma
  cantidad, está creciendo sumando un porcentaje del nuevo total. Esta es la magia
  del interés compuesto, y es una Progresión Geométrica en estado puro.
resumen: 'Todo cambio porcentual constante (como un aumento del $10\%$ mensual) se
  modela multiplicando por un factor decimal llamado ''Índice de Variación'', que
  actúa como la razón geométrica: $r = (1 \pm \frac{p}{100})$.'
explicacion: "Cuando algo aumenta o disminuye en un porcentaje fijo, no es una progresión\
  \ aritmética (lineal), sino geométrica (exponencial).\n\nPara hallar la Razón Geométrica\
  \ ($r$) a partir de un porcentaje:\n1. **Aumento porcentual ($+p\\%$):** Tu nuevo\
  \ total es el $100\\%$ original MÁS el $p\\%$. En decimales, esto es $r = 1 + \\\
  frac{p}{100}$.\n   - *Ejemplo:* Si aumenta un $15\\%$ anual, la razón es $r = 1\
  \ + 0.15 = 1.15$.\n2. **Disminución porcentual ($-p\\%$):** Tu nuevo total es el\
  \ $100\\%$ MENOS el $p\\%$. En decimales, esto es $r = 1 - \\frac{p}{100}$.\n  \
  \ - *Ejemplo:* Si un auto pierde un $20\\%$ de su valor anual, la razón es $r =\
  \ 1 - 0.20 = 0.80$.\n\nLa fórmula general queda: $Capital_{final} = Capital_{inicial}\
  \ \\cdot r^n$ (Nota: en finanzas suele usarse exponente '$n$' directo porque se\
  \ cuenta desde el periodo cero, a diferencia de la P.G. estricta que empieza en\
  \ 1)."
procedimiento:
- 'Paso 1: Identifica si el problema habla de un aumento (interés, crecimiento) o
  disminución (descuento, depreciación) porcentual.'
- 'Paso 2: Convierte ese porcentaje a decimal dividiéndolo por 100.'
- 'Paso 3: Si es aumento, suma 1 (ej: 1 + 0.05 = 1.05). Si es disminución, réstaselo
  a 1 (ej: 1 - 0.05 = 0.95). Ese número es tu razón ''r''.'
- 'Paso 4: Aplica la fórmula de progresión geométrica multiplicando el valor inicial
  por $r^n$.'
ejemplos:
- titulo: El auto que pierde valor
  enunciado: Un auto cuesta $10.000.000 y se deprecia un 10% cada año. ¿Cuál será
    su valor tras 3 años?
  solucion_pasos:
  - Es disminución del 10%. Razón r = 1 - (10/100) = 1 - 0.10 = 0.90.
  - Valor inicial = 10.000.000.
  - Valor tras 3 años = 10.000.000 * (0.90)^3
  - 0.90^3 = 0.729.
  - 10.000.000 * 0.729 = $7.290.000.
errores_frecuentes:
- Creer que si algo aumenta un 10% cada año por 3 años, aumenta un 30% en total (Falso,
  los porcentajes se aplican sobre el nuevo monto acumulado cada año).
- 'Usar el porcentaje directo como razón (ej: multiplicar por 0.10 en vez de por 1.10
  para un aumento).'
fuente: Currículum Nacional MINEDUC.
estado: publicado
