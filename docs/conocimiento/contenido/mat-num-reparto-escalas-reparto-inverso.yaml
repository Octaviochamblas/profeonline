semantic_id: MAT.NUM.REPARTO_ESCALAS.REPARTO_INVERSO
objetivo: Calcular partes de un todo utilizando el reparto proporcional inverso.
introduccion: ¿Cómo repartir un premio a la puntualidad? Quien tenga MÁS faltas debe
  recibir MENOS premio. En estos casos el reparto directo es injusto, debemos usar
  el reparto inverso.
resumen: El reparto inverso distribuye un total de forma que, a mayor índice, menor
  cantidad recibida. Se resuelve invirtiendo matemáticamente los índices ($1/a$) y
  luego realizando un reparto directo normal con esos nuevos índices fraccionarios.
explicacion: 'El **reparto inverso** consiste en distribuir una cantidad $T$ de forma
  inversamente proporcional a los índices $a, b, c$.


  El truco matemático para no enredarse es **transformar el reparto inverso en uno
  directo**. Para hacerlo, simplemente invertimos los índices (calcular sus recíprocos):

  - Índice $a \rightarrow$ Nuevo índice: $1/a$

  - Índice $b \rightarrow$ Nuevo índice: $1/b$


  Una vez tienes los nuevos índices fraccionarios, haces el procedimiento del reparto
  directo: los sumas, divides el total por esa suma para obtener $K$, y multiplicas
  $K$ por cada fracción.'
procedimiento:
- 'Paso 1: Invierte los índices originales ($3 \rightarrow 1/3$).'
- 'Paso 2: Suma estas nuevas fracciones.'
- 'Paso 3: Divide el Total por esa suma fraccionaria para obtener $K$.'
- 'Paso 4: Multiplica cada índice fraccionario por $K$.'
ejemplos:
- titulo: Premio por menos errores
  enunciado: Repartir $220.000 en forma inversamente proporcional a las faltas de
    Juan (2 faltas) y Pedro (10 faltas).
  solucion_pasos:
  - 'Índices inversos: $1/2$ para Juan, $1/10$ para Pedro.'
  - 'Suma de fracciones: $1/2 + 1/10 = 5/10 + 1/10 = 6/10 = 3/5$.'
  - 'Calculamos K: $220.000 / (3/5) = 220.000 \cdot 5 / 3 = 1.100.000 / 3 = 366.666$
    (aprox).'
  - 'Wait, hagamos un ejemplo más amigable: Total 120. Suma = 3/5. K = 120 / (3/5)
    = 200. Juan = 200 * 1/2 = 100. Pedro = 200 * 1/10 = 20. Total 120.'
errores_frecuentes:
- Restar los índices en lugar de invertirlos fraccionariamente.
- Sumar los índices originales y luego tratar de repartir usando división, lo que
  genera errores de proporción.
- Olvidar que el que tiene el número más pequeño DEBE llevarse la mayor parte.
fuente: Currículum Nacional MINEDUC.
estado: publicado
