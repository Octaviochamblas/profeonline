semantic_id: MAT.NUM.RAICES_CONCEPTO.RAIZ_EXACTA
titulo: Identificación de raíz exacta
objetivo: Reconocer y calcular raíces exactas.
introduccion: Reconocer potencias perfectas transforma un radical en un número entero o racional sin pérdida.
  La factorización permite descubrirlas cuando no son evidentes.
resumen: Una raíz es exacta cuando su radicando es una potencia perfecta del índice. El resultado exacto
  no requiere aproximación decimal.
explicacion: 'Una raíz es exacta cuando su radicando es una potencia perfecta del índice.


  Al analizar “\(\sqrt[3]{216}=6\) porque \(216=6^3\)” conviene observar la conexión siguiente: el resultado
  exacto no requiere aproximación decimal'
procedimiento:
- 'Paso 1: Compara el radicando con potencias conocidas o factorízalo.'
- 'Paso 2: Agrupa los factores en conjuntos del tamaño indicado por el índice.'
- 'Paso 3: Extrae cada grupo completo y verifica elevando el resultado.'
ejemplos:
- titulo: Aplicación razonada — Identificación de raíz exacta
  enunciado: \(\sqrt[3]{216}=6\) porque \(216=6^3\).
  solucion_pasos:
  - Compara el radicando con potencias conocidas o factorízalo.
  - Agrupa los factores en conjuntos del tamaño indicado por el índice.
  - Extrae cada grupo completo y verifica elevando el resultado.
- titulo: Revisión de una solución — Identificación de raíz exacta
  enunciado: Una solución aplica “Agrupa los factores en conjuntos del tamaño indicado por el índice.”,
    pero termina sin comprobar que el resultado exacto no requiere aproximación decimal. Determina qué
    falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de raíz exacta: una raíz es exacta cuando su radicando
    es una potencia perfecta del índice.'
  - Compara el radicando con potencias conocidas o factorízalo.
  - 'Completa la revisión con este control: Extrae cada grupo completo y verifica elevando el resultado.'
- titulo: ¿Se cumple que el resultado exacto no requiere aproximación decimal? — Identificación de raíz
    exacta
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una raíz es exacta cuando su radicando es una potencia
    perfecta del índice.
  - El caso “\(\sqrt[3]{216}=6\) porque \(216=6^3\)” satisface esa condición.
  - Extrae cada grupo completo y verifica elevando el resultado.
- titulo: ¿Es válido omitir el paso “Compara el radicando con potencias conocidas o factorízalo”? — Identificación
    de raíz exacta
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de raíz exacta.
  - 'Omitirlo puede volver inválida la acción siguiente: Agrupa los factores en conjuntos del tamaño indicado
    por el índice.'
  - 'La solución debe terminar de este modo: Extrae cada grupo completo y verifica elevando el resultado.'
errores_frecuentes:
- 'Confundir identificación de raíz exacta con otro concepto y omitir este inicio: Compara el radicando
  con potencias conocidas o factorízalo.'
- Aplicar mecánicamente “Agrupa los factores en conjuntos del tamaño indicado por el índice.” sin revisar
  las condiciones de la definición.
- Tomar “\(\sqrt[3]{216}=6\) porque \(216=6^3\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el resultado exacto no requiere aproximación decimal”.
- 'Terminar el desarrollo sin realizar este control: Extrae cada grupo completo y verifica elevando el
  resultado.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
