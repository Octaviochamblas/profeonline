semantic_id: MAT.ALG.RESOLUCION_LINEAL.COEFICIENTE_NEGATIVO
titulo: Resolución de ecuaciones con coeficiente principal negativo
objetivo: Aprender el truco matemático de multiplicar la ecuación completa por -1 cuando la incógnita
  queda negativa.
introduccion: 'Has hecho todo bien, pero al final del problema te topas con que tu ''x'' quedó con un
  molesto signo negativo (ej: $-x = 8$). No hemos terminado. La respuesta debe ser de ''x'', no de ''anti-x''.'
resumen: Si al final del despeje el término con la incógnita queda negativo, se debe multiplicar (o dividir)
  TODA la ecuación por $-1$ para cambiar el signo de todos los términos y hacer positiva a la incógnita.
explicacion: '### Definición formal


  Multiplicar todo por -1 es la operación válida que invierte los signos y vuelve positiva la incógnita.


  ### Desarrollo didáctico


  Imagínate que al resolver una ecuación llegas a este punto:

  $-3x = 15$


  Tienes dos formas legítimas de proceder:


  **Método 1 (El paso natural):**

  Recuerda que el $-3$ está multiplicando. Simplemente pásalo dividiendo con todo y su signo:

  $x = \frac{15}{-3}$

  $x = -5$


  **Método 2 (El truco del -1):**

  A muchos no les gusta mover el negativo. Entonces, multiplicas la ecuación completa por $(-1)$.

  $(-1) \cdot (-3x) = (-1) \cdot (15)$

  $3x = -15$

  Ahora el $3$ pasa dividiendo positivo:

  $x = \frac{-15}{3} \rightarrow x = -5$.


  Si llegas a $-x = 7$, el Método 2 es perfecto. Multiplicas todo por $-1$ y queda directamente $x = -7$.'
procedimiento:
- 'Paso 1: Si tienes $-x = [número]$, simplemente invierte el signo de ambos lados de la igualdad.'
- 'Paso 2: Si tienes un número negativo (como $-4x$), puedes dividir el otro lado directamente por ese
  número negativo (ej. $12 / -4$).'
- 'Paso 3: Verifica que en el resultado final, la ''x'' esté positiva y solitaria.'
ejemplos:
- titulo: 'Despeja: $10 - x = 14$'
  enunciado: 'Despeja: $10 - x = 14$'
  solucion_pasos:
  - 'Pasamos el 10 restando: $-x = 14 - 10$.'
  - 'Queda: $-x = 4$.'
  - 'Multiplicamos la ecuación por (-1): $x = -4$.'
- titulo: ¿Cuál es el valor de 'x' si $-2x = -18$?
  solucion_pasos:
  - Se puede dividir -18 entre -2. Menos por menos da más. x = 9.
- titulo: 'Respecto de «Resolución de ecuaciones con coeficiente principal negativo»: ¿Describe adecuad'
  enunciado: 'Respecto de «Resolución de ecuaciones con coeficiente principal negativo»: ¿Describe adecuadamente
    el concepto esta frase? «Si al final del despeje el término con la incógnita queda negativo, se debe
    multiplicar (o dividir) TODA la ecuación por $-1$ para cambiar el signo de todos los términos y hacer
    positiva a la incógnita»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Si al final del despeje el término con la incógnita
    queda negativo, se debe multiplicar (o dividir) TODA la ecuación por $-1$ para cambiar el signo de
    todos los términos y hacer positiva a la incógnita.'
- titulo: 'Respecto de «Resolución de ecuaciones con coeficiente principal negativo»: ¿Se puede aceptar'
  enunciado: 'Respecto de «Resolución de ecuaciones con coeficiente principal negativo»: ¿Se puede aceptar
    esta afirmación? «Llegar a $-x = 5$ y dejar eso como respuesta final, pensando que ya se resolvió»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Si al final del despeje el término con la incógnita
    queda negativo, se debe multiplicar (o dividir) TODA la ecuación por $-1$ para cambiar el signo de
    todos los términos y hacer positiva a la incógnita.'
errores_frecuentes:
- Llegar a $-x = 5$ y dejar eso como respuesta final, pensando que ya se resolvió.
- 'Pasar el coeficiente negativo sumando (ej: $-3x = 12 \rightarrow x = 12 + 3$).'
- Para «Si al final del desarrollo de una ecuación obtienes $-x = 10$, ¿cuál es el paso matemático formal
  para obtener el valor de $x$», la respuesta correcta es Mover el signo menos al otro lado como suma.
- Para «Si al final del desarrollo de una ecuación obtienes $-x = 10$, ¿cuál es el paso matemático formal
  para obtener el valor de $x$», la respuesta correcta es Elevar al cuadrado para matar el signo.
- Dejarlo así, ya está resuelto.
