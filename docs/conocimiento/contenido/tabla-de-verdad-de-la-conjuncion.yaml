semantic_id: MAT.FUND.TABLAS_VERDAD.TABLA_CONJUNCION
titulo: Tabla de verdad de la conjunción
objetivo: Comprender y construir la tabla de verdad del conectivo de conjunción lógica para evaluar proposiciones
  compuestas del tipo "y".
introduccion: 'Imagina que para ir a una excursión necesitas llevar dos cosas obligatoriamente: una autorización
  firmada Y tu documento de identidad. Si llevas la autorización pero olvidas el documento, ¿puedes ir?
  No. Si olvidas la autorización pero llevas el documento, ¿puedes ir? Tampoco. Solo puedes ir si cumples
  AMBAS condiciones a la vez. En lógica, esta relación se llama conjunción (la palabra "y"). Una proposición
  con "y" solo es verdadera cuando todas sus partes son verdaderas por separado.'
resumen: La conjunción lógica es un conectivo binario que une dos proposiciones $p$ y $q$ mediante el
  operador "y" (símbolo $\land$). La proposición compuesta $p \land q$ es verdadera únicamente cuando
  tanto $p$ como $q$ son verdaderas.
explicacion: 'La **conjunción** es un conectivo lógico binario que conecta dos proposiciones, $p$ y $q$.
  Se denota por el símbolo $\land$ (que se lee "y"), escribiéndose $p \land q$.


  La regla de verdad para la conjunción establece que la proposición compuesta $p \land q$ es **verdadera**
  si y solo si ambas proposiciones componentes ($p$ y $q$) son verdaderas al mismo tiempo. En cualquier
  otro caso, la conjunción es falsa.


  Dado que hay dos proposiciones simples implicadas ($n = 2$), la tabla de verdad tiene $2^2 = 4$ filas:


  | $p$ | $q$ | $p \land q$ |

  | :---: | :---: | :---: |

  | $V$ | $V$ | $V$ |

  | $V$ | $F$ | $F$ |

  | $F$ | $V$ | $F$ |

  | $F$ | $F$ | $F$ |


  **Puntos clave:**

  - ''Si al menos una de las proposiciones simples es falsa, toda la conjunción $p \land q$ se reduce
  a falsa ($F$).''

  - ''La conjunción es conmutativa, es decir, $p \land q \equiv q \land p$.'''
procedimiento:
- 'Paso 1: Determinar el número de proposiciones simples $n$. Para dos variables $p$ y $q$ ($n=2$), calculamos
  la cantidad de filas necesarias mediante la fórmula $2^n = 2^2 = 4$ filas.'
- 'Paso 2: Definir las columnas de la tabla de verdad: columnas para las variables simples $p$ y $q$,
  y una columna final para la conjunción $p \land q$.'
- 'Paso 3: Llenar los valores de verdad de las proposiciones iniciales de forma sistemática: para $p$
  alternar de dos en dos ($V, V, F, F$) y para $q$ alternar de uno en uno ($V, F, V, F$).'
- 'Paso 4: Evaluar la conjunción conectivo por conectivo desde el interior hacia el exterior: aplicar
  la regla de la conjunción de modo que la fila dé $V$ únicamente si tanto $p$ como $q$ son $V$, y dé
  $F$ en los demás casos.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'Determina el valor de verdad de la proposición compuesta: "El número 5 es primo y $2 + 2
    = 5$".'
  solucion_pasos:
  - 'Paso a: Identificamos las proposiciones simples. Sea $p$: "El número 5 es primo" (Verdadero) y $q$:
    "$2 + 2 = 5$" (Falso).'
  - 'Paso b: Analizamos la conjunción $p \land q$. Dado que $q$ es falsa, la proposición compuesta "y"
    es Falsa ($F$).'
- titulo: Ejemplo 2
  enunciado: Dadas dos proposiciones verdaderas $p$ y $q$, determina el valor de verdad de la expresión
    $\neg p \land q$.
  solucion_pasos:
  - 'Paso a: Evaluamos primero la negación interna: como $p$ es Verdadero ($V$), entonces $\neg p$ es
    Falsa ($F$).'
  - 'Paso b: Evaluamos la conjunción conectivo por conectivo: tenemos $\neg p \land q$, lo que equivale
    a evaluar Falso ($F$) con Verdadero ($V$). Como uno de los elementos es Falso, el resultado final
    es Falso ($F$).'
- titulo: ¿La conjunción de una proposición verdadera y otra falsa siempre resulta en un valor falso?
  respuesta: Sí
  solucion_pasos:
  - Por definición de la tabla de verdad de la conjunción, el conectivo $\land$ requiere que ambas proposiciones
    sean verdaderas para que el resultado sea verdadero.
  - Si una de ellas es falsa ($V \land F$), la regla de la conjunción determina que el resultado es Falso
    ($F$).
- titulo: ¿Es la proposición "$3 < 5 \land 7$ es un número impar" verdadera?
  respuesta: Sí
  solucion_pasos:
  - 'Evaluamos el primer término: $3 < 5$ es Verdadero ($V$).'
  - 'Evaluamos el segundo término: 7 es un número impar es Verdadero ($V$).'
  - Como ambos términos son verdaderos, la conjunción $V \land V$ es Verdadera ($V$).
errores_frecuentes:
- Asociar la palabra "y" de la conjunción con una suma lógica, pensando que basta con que una proposición
  sea verdadera para sumar puntos de verdad.
- Confundir el símbolo de la conjunción ($\land$) con el de la disyunción ($\lor$).
- Omitir la evaluación de negaciones previas a la conjunción, aplicando la regla directamente sobre las
  variables simples.
- Pensar que en lenguaje natural la palabra "pero" no representa una conjunción lógica (en lógica, "pero"
  funciona igual que "y").
- Llenar la tabla de verdad con valores desordenados para $p$ y $q$, lo que dificulta verificar si se
  consideraron todas las combinaciones posibles.
fuente: Lógica Matemática y Teoría de Conjuntos, pág. 15
estado: publicado
