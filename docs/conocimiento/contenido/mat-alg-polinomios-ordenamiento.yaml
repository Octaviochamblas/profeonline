semantic_id: MAT.ALG.POLINOMIOS.ORDENAMIENTO
objetivo: Ordenar un polinomio de forma ascendente o descendente con respecto a los exponentes de una variable u
  'ordenatriz'.
introduccion: Tener los términos desordenados es como tener un diccionario sin orden alfabético. Para poder trabajar
  limpiamente con polinomios, la regla de etiqueta es ordenarlos.
resumen: Se dice que un polinomio está **Ordenado con respecto a una letra** (llamada *letra ordenatriz*) cuando
  los exponentes de esa letra van aumentando o disminuyendo de manera progresiva y sin retrocesos.
explicacion: "### Definición formal\n\nEl orden polinomial se basa puramente en la secuencia de los exponentes de\
  \ la variable elegida como referencia.\n\n### Desarrollo didáctico\n\nExisten dos formas de ordenar un polinomio\
  \ respecto a una variable:\n- **Orden Descendente (El más usado):** Del exponente más grande al más pequeño. \n\
  \  Ej: $x^4 + x^3 - 2x^2 + 5x - 7$. (Los exponentes bajan: 4, 3, 2, 1, y el término independiente que es 0).\n\
  - **Orden Ascendente:** Del exponente más pequeño al más grande. \n  Ej: $-7 + 5x - 2x^2 + x^3 + x^4$. (Los exponentes\
  \ suben: 0, 1, 2, 3, 4).\n\nPara ordenar, se mueven los términos completos con todo y su signo. El término $-2x^2$\
  \ siempre será negativo, sin importar dónde lo coloques."
procedimiento:
- 'Paso 1: Elige o identifica la letra ordenatriz.'
- 'Paso 2: Fíjate en los exponentes de esa letra en cada término.'
- 'Paso 3: Decide si vas a ordenar de mayor a menor (descendente) o de menor a mayor (ascendente).'
- 'Paso 4: Reescribe el polinomio moviendo los términos completos (con sus coeficientes y signos) siguiendo el orden
  de los exponentes elegidos.'
ejemplos:
- titulo: Alineando la fila
  enunciado: Ordena el polinomio 5x^2 - x^4 + 3 - 2x de forma descendente.
  solucion_pasos:
  - 'Buscamos el exponente mayor de x: es 4. El primer término es -x^4.'
  - El que le sigue hacia abajo es 2. El segundo término es +5x^2.
  - Le sigue el exponente 1. El tercer término es -2x.
  - Por último, el término independiente (exponente 0). Es +3.
  - 'Resultado: -x^4 + 5x^2 - 2x + 3.'
- titulo: Para aplicar un teorema de división algebraica, la regla exige que el polinomio divisor esté
  enunciado: 'Para aplicar un teorema de división algebraica, la regla exige que el polinomio divisor esté ordenado
    en forma descendente respecto a ''$a$''. El estudiante tiene la expresión $5a^2b^3 - 4a^3b^2 + 10ab^4$. ¿Cómo
    debe escribirlo para cumplir la regla y poder ejecutar el teorema? (v1)


    Opciones: A) $-4a^3b^2 + 5a^2b^3 + 10ab^4$ · B) $10ab^4 + 5a^2b^3 - 4a^3b^2$ · C) $5a^2b^3 - 4a^3b^2 + 10ab^4$
    (ya está ordenado) · D) $-4a^3b^2 + 10ab^4 + 5a^2b^3$'
  solucion_pasos:
  - 'Revisamos solo los exponentes de ''a'': son 2, 3, 1. Para ordenar descendente: exponente 3 primero, luego 2,
    luego 1. Movilizando con signos: $-4a^3b^2 + 5a^2b^3 + 10ab^4$.'
- titulo: 'Respecto de «Ordenamiento de un polinomio (ascendente o descendente)»: ¿La siguiente formula'
  enunciado: 'Respecto de «Ordenamiento de un polinomio (ascendente o descendente)»: ¿La siguiente formulación es
    correcta? «Se dice que un polinomio está **Ordenado con respecto a una letra** (llamada *letra ordenatriz*)
    cuando los exponentes de esa letra van aumentando o disminuyendo de manera progresiva y sin retrocesos»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Se dice que un polinomio está **Ordenado con respecto a una
    letra** (llamada *letra ordenatriz*) cuando los exponentes de esa letra van aumentando o disminuyendo de manera
    progresiva y sin retrocesos.'
- titulo: 'Respecto de «Ordenamiento de un polinomio (ascendente o descendente)»: ¿La siguiente conclus'
  enunciado: 'Respecto de «Ordenamiento de un polinomio (ascendente o descendente)»: ¿La siguiente conclusión es
    correcta? «Olvidar llevarse el signo del término al moverlo (ej. dejar el signo negativo de $-x^4$ tirado en
    el medio)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Se dice que un polinomio está **Ordenado con respecto a una
    letra** (llamada *letra ordenatriz*) cuando los exponentes de esa letra van aumentando o disminuyendo de manera
    progresiva y sin retrocesos.'
errores_frecuentes:
- Olvidar llevarse el signo del término al moverlo (ej. dejar el signo negativo de $-x^4$ tirado en el medio).
- Confundirse con polinomios de múltiples variables y mezclar los exponentes de una letra con los de otra.
- Que los coeficientes de los términos vayan de un número mayor a un número menor.
- Que el grado absoluto de los términos vaya disminuyendo en todos los casos.
- Que se escriban primero las letras del final del alfabeto (Z, Y, X...).
fuente: Álgebra de Baldor.
estado: publicado
titulo: Ordenamiento de un polinomio (ascendente o descendente)
