semantic_id: MAT.ALG.POLINOMIOS.ORDENAMIENTO
objetivo: Ordenar un polinomio de forma ascendente o descendente con respecto a los
  exponentes de una variable u 'ordenatriz'.
introduccion: Tener los términos desordenados es como tener un diccionario sin orden
  alfabético. Para poder trabajar limpiamente con polinomios, la regla de etiqueta
  es ordenarlos.
resumen: Se dice que un polinomio está **Ordenado con respecto a una letra** (llamada
  *letra ordenatriz*) cuando los exponentes de esa letra van aumentando o disminuyendo
  de manera progresiva y sin retrocesos.
explicacion: "Existen dos formas de ordenar un polinomio respecto a una variable:\n\
  - **Orden Descendente (El más usado):** Del exponente más grande al más pequeño.\
  \ \n  Ej: $x^4 + x^3 - 2x^2 + 5x - 7$. (Los exponentes bajan: 4, 3, 2, 1, y el término\
  \ independiente que es 0).\n- **Orden Ascendente:** Del exponente más pequeño al\
  \ más grande. \n  Ej: $-7 + 5x - 2x^2 + x^3 + x^4$. (Los exponentes suben: 0, 1,\
  \ 2, 3, 4).\n\nPara ordenar, se mueven los términos completos con todo y su signo.\
  \ El término $-2x^2$ siempre será negativo, sin importar dónde lo coloques."
procedimiento:
- 'Paso 1: Elige o identifica la letra ordenatriz.'
- 'Paso 2: Fíjate en los exponentes de esa letra en cada término.'
- 'Paso 3: Decide si vas a ordenar de mayor a menor (descendente) o de menor a mayor
  (ascendente).'
- 'Paso 4: Reescribe el polinomio moviendo los términos completos (con sus coeficientes
  y signos) siguiendo el orden de los exponentes elegidos.'
ejemplos:
- titulo: Alineando la fila
  enunciado: Ordena el polinomio 5x^2 - x^4 + 3 - 2x de forma descendente.
  solucion_pasos:
  - 'Buscamos el exponente mayor de x: es 4. El primer término es -x^4.'
  - El que le sigue hacia abajo es 2. El segundo término es +5x^2.
  - Le sigue el exponente 1. El tercer término es -2x.
  - Por último, el término independiente (exponente 0). Es +3.
  - 'Resultado: -x^4 + 5x^2 - 2x + 3.'
errores_frecuentes:
- Olvidar llevarse el signo del término al moverlo (ej. dejar el signo negativo de
  $-x^4$ tirado en el medio).
- Confundirse con polinomios de múltiples variables y mezclar los exponentes de una
  letra con los de otra.
fuente: Álgebra de Baldor.
estado: publicado
