semantic_id: MAT.ALG.FUNC_POTENCIA_BASE.PARAMETRO_A_SIGNO
titulo: Efecto del signo del parámetro $a$
objetivo: Describir cómo el signo del coeficiente $a$ en $f(x)=a\cdot x^n$ afecta la orientación de la gráfica.
introduccion: Igual que en la función cuadrática, el signo del coeficiente principal determina si la curva se
  refleja respecto al eje $x$.
resumen: Si $a>0$, la gráfica de $f(x)=a\cdot x^n$ conserva la orientación básica de $x^n$; si $a<0$, la gráfica
  se **refleja respecto al eje $x$**.
explicacion: '### Definición formal


  Para $f(x)=a\cdot x^n$ y $g(x)=x^n$, se cumple $f(x)=a\cdot g(x)$. Si $a<0$, entonces $f(x)=-|a|\cdot g(x)$,
  lo que invierte el signo de cada valor de $g(x)$: geométricamente, esto refleja la gráfica de $g$ respecto al
  eje $x$.


  ### Desarrollo didáctico


  Compara $f(x)=x^2$ con $g(x)=-x^2$: mientras $f$ toma solo valores mayores o iguales a $0$ (abre hacia
  arriba), $g$ toma solo valores menores o iguales a $0$ (abre hacia abajo), siendo su reflejo exacto respecto al
  eje $x$.'
procedimiento:
- 'Paso 1: Identifica el signo del coeficiente $a$ en la función potencia.'
- 'Paso 2: Si $a>0$, la gráfica conserva la orientación básica de $x^n$.'
- 'Paso 3: Si $a<0$, refleja mentalmente la gráfica de $x^n$ respecto al eje $x$.'
ejemplos:
- titulo: Comparación de orientaciones con exponente par
  enunciado: 'Compara la orientación de $f(x)=3x^2$ y $g(x)=-3x^2$.'
  solucion_pasos:
  - $f(x)=3x^2$ tiene $a>0$, por lo que abre hacia arriba, igual que $x^2$.
  - $g(x)=-3x^2$ tiene $a<0$, por lo que abre hacia abajo, siendo el reflejo de $f$.
- titulo: Comparación de orientaciones con exponente impar
  enunciado: 'Compara la orientación de $f(x)=2x^3$ y $g(x)=-2x^3$.'
  solucion_pasos:
  - $f(x)=2x^3$ crece de izquierda a derecha, igual que $x^3$.
  - $g(x)=-2x^3$ es su reflejo respecto al eje $x$, por lo que decrece de izquierda a derecha.
- titulo: ¿El signo de $a$ afecta el dominio de la función potencia?
  enunciado: ¿Cambiar el signo del coeficiente $a$ modifica el dominio de la función?
  respuesta: 'No'
  solucion_pasos:
  - El dominio depende del exponente $n$, no del signo de $a$.
- titulo: ¿El signo de $a$ puede cambiar si la función es creciente o decreciente?
  enunciado: ¿El signo de $a$ puede invertir si la función es creciente o decreciente?
  respuesta: Sí
  solucion_pasos:
  - Al reflejar la gráfica respecto al eje $x$, una función creciente se vuelve decreciente y viceversa.
errores_frecuentes:
- Confundir el efecto del signo de $a$ con el efecto de la magnitud de $a$.
- Suponer que el signo de $a$ afecta el dominio o el tipo de curva, en vez de solo su orientación.
- No distinguir cómo cambia la reflexión según si el exponente es par o impar.
- Olvidar que la reflexión es respecto al eje $x$, no al eje $y$.
