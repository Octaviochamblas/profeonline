semantic_id: MAT.GEO.SIMETRIAS.AXIAL_RECTA_HORIZONTAL
titulo: Simetría axial respecto de rectas horizontales
objetivo: Aplicar la regla de la simetría axial respecto de una recta horizontal genérica y=k (distinta
  del eje X), calculando la imagen de un punto mediante la fórmula P'(x, 2k-y).
introduccion: Reflejar respecto de una recta horizontal cualquiera (no necesariamente el eje X) sigue
  la misma lógica de 'espejo', pero centrada en esa recta específica.
resumen: 'La simetría axial respecto de una recta horizontal $y=k$ transforma cada punto $P(x,y)$ en $P''(x,\,2k-y)$:
  la abscisa se mantiene igual, y la ordenada se refleja respecto de $k$.'
explicacion: '![Simetría axial respecto de rectas horizontales](/static/img/geometria/isometrias/simetria-axial-recta-horizontal.svg)


  ### Definición formal


  Si el eje de simetría es la recta horizontal $y=k$, cada punto $P(x,y)$ se transforma en $P''(x,\,2k-y)$,
  generalizando la fórmula del eje X (que corresponde al caso particular $k=0$).


  ### Desarrollo didáctico


  En la figura, respecto de la recta $y=-2$, el punto $P(2,0)$ se refleja en $P''(2,\,2\times(-2)-0)=(2,-4)$:
  la distancia de $P$ a la recta (2 unidades) es igual a la distancia de $P''$ a la recta.'
procedimiento:
- 'Paso 1: Identifica la recta horizontal y=k que actúa como eje de simetría.'
- 'Paso 2: Aplica la fórmula P''=(x, 2k-y) al punto original P(x,y).'
- 'Paso 3: Verifica que la distancia de P a la recta sea igual a la distancia de P'' a la recta.'
ejemplos:
- titulo: Aplicar la simetría respecto de una recta horizontal genérica
  enunciado: La recta y=-2 es el eje, y el punto es P(2,0).
  solucion_pasos:
  - P'=(2, 2×(-2)-0)=(2,-4).
- titulo: Aplicar la simetría cuando el punto está por debajo de la recta
  enunciado: La recta y=3 es el eje, y el punto es P(5,1).
  solucion_pasos:
  - P'=(5, 2×3-1)=(5,5).
- titulo: ¿Esta fórmula se reduce a la simetría respecto del eje X cuando k=0?
  respuesta: Sí
  solucion_pasos:
  - Sí, si k=0, P'=(x, 2×0-y)=(x,-y), exactamente la fórmula de simetría respecto del eje X.
- titulo: ¿La abscisa del punto cambia en esta simetría?
  respuesta: 'No'
  solucion_pasos:
  - No, al ser una recta horizontal, solo se ve afectada la ordenada; la abscisa permanece igual.
errores_frecuentes:
- Usar la fórmula del eje X (y'=-y) en vez de la fórmula general (y'=2k-y) cuando la recta no es el eje
  X.
- Olvidar multiplicar k por 2 en la fórmula.
- Cambiar la abscisa del punto, cuando en realidad debe permanecer igual.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 149-150).'
estado: publicado
