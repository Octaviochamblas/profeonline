semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.PENDIENTE_CONCEPTO
titulo: Concepto de pendiente de una recta
objetivo: Comprender la pendiente como una medida numérica de la inclinación de una recta.
introduccion: La pendiente responde a una sola pregunta clave, por cada paso que avanzas hacia la derecha,
  ¿cuánto sube o baja la recta?
resumen: La **pendiente** $m$ de una recta es un número real que mide su inclinación, indicando cuánto
  varía la variable dependiente $y$ por cada unidad que aumenta la variable independiente $x$.
explicacion: '### Definición formal


  Para una recta no vertical, la pendiente $m$ se define como el cociente entre el cambio en $y$ y el
  cambio en $x$ entre dos puntos cualesquiera de la recta: $m = \dfrac{\Delta y}{\Delta x} = \dfrac{y_2
  - y_1}{x_2 - x_1}$, con $x_1 \neq x_2$. Este valor es constante para todos los pares de puntos de una
  misma recta.


  ### Desarrollo didáctico


  La pendiente es una "tasa de cambio": cuánto sube o baja $y$ por cada unidad que avanza $x$.


  Si $m=3$, cada vez que $x$ aumenta en 1, $y$ aumenta en 3. Si $m=-2$, cada vez que $x$ aumenta en 1,
  $y$ disminuye en 2. La pendiente resume en un solo número todo el comportamiento de crecimiento o decrecimiento
  de la recta.'
procedimiento:
- 'Paso 1: Identifica dos puntos distintos de la recta, $(x_1,y_1)$ y $(x_2,y_2)$.'
- 'Paso 2: Calcula la diferencia de ordenadas $y_2-y_1$.'
- 'Paso 3: Calcula la diferencia de abscisas $x_2-x_1$.'
- 'Paso 4: Divide ambas diferencias para obtener la pendiente $m$.'
ejemplos:
- titulo: Cálculo directo de pendiente
  enunciado: Calcula la pendiente de la recta que pasa por $(1,2)$ y $(3,8)$.
  solucion_pasos:
  - $m = \frac{8-2}{3-1} = \frac{6}{2} = 3$.
- titulo: Pendiente con puntos negativos
  enunciado: Calcula la pendiente de la recta que pasa por $(-2,5)$ y $(2,-3)$.
  solucion_pasos:
  - $m = \frac{-3-5}{2-(-2)} = \frac{-8}{4} = -2$.
- titulo: ¿La pendiente es la misma sin importar qué dos puntos de la recta se elijan?
  enunciado: ¿La pendiente es la misma sin importar qué dos puntos de la recta se elijan?
  respuesta: Sí
  solucion_pasos:
  - La pendiente es una propiedad constante de toda la recta, no de un par de puntos en particular.
- titulo: ¿Se puede calcular la pendiente usando dos puntos con la misma abscisa?
  enunciado: ¿Se puede calcular la pendiente usando dos puntos con la misma abscisa?
  respuesta: 'No'
  solucion_pasos:
  - Eso implicaría dividir por cero ($x_2-x_1=0$), y correspondería a una recta vertical, que no tiene
    pendiente definida.
errores_frecuentes:
- Invertir el orden de los puntos en numerador y denominador, mezclando $y_2-y_1$ con $x_1-x_2$.
- Confundir la pendiente con el valor de $y$ en un punto específico.
- Intentar calcular la pendiente con dos puntos de igual abscisa (recta vertical).
- Olvidar el signo negativo al restar coordenadas negativas.
