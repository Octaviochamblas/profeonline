semantic_id: MAT.EST.COMBINACIONES.PERMUTACION_VS_COMBINACION
titulo: Relacionar y diferenciar variaciones de combinaciones
objetivo: Relacionar las fórmulas de variación y combinación, comprendiendo que la variación cuenta cada
  combinación multiplicada por sus posibles órdenes internos.
introduccion: Comprender la relación algebraica entre ambas fórmulas ayuda a recordar por qué la combinación
  'divide de más' respecto de la variación, y a decidir con seguridad cuál usar en cada problema.
resumen: La relación entre variación y combinación es $V(n,r)=C(n,r)\times r!$, es decir, cada combinación
  de $r$ elementos da lugar a $r!$ variaciones distintas (una por cada orden posible).
explicacion: '![Relación entre variación y combinación](/static/img/probabilidad/comb/comb-permutacion-vs-combinacion.svg)


  ### Definición formal


  $V(n,r)=C(n,r)\times r!$, de donde se deduce $C(n,r)=\dfrac{V(n,r)}{r!}=\dfrac{n!}{(n-r)!\,r!}$.


  ### Desarrollo didáctico


  Con el conjunto {A,B,C}, la combinación de 2 elementos {A,B} da lugar a exactamente $2!=2$ variaciones:
  (A,B) y (B,A). Como hay $C(3,2)=3$ combinaciones posibles ({A,B},{A,C},{B,C}), el total de variaciones
  es $V(3,2)=3\times2=6$.'
procedimiento:
- 'Paso 1: Calcula (o identifica) el número de combinaciones C(n,r) posibles.'
- 'Paso 2: Multiplica ese valor por r! para obtener el número de variaciones V(n,r) correspondiente.'
- 'Paso 3: Si se conoce V(n,r), se puede obtener C(n,r) dividiendo por r! (el proceso inverso).'
ejemplos:
- titulo: Verificar la relación con {A,B,C} tomados de a 2
  enunciado: C(3,2)=3 combinaciones; verificar V(3,2).
  solucion_pasos:
  - V(3,2)=C(3,2)×2!=3×2=6, coincide con el cálculo directo V(3,2)=3×2=6.
- titulo: Calcular C(7,3) sabiendo que V(7,3)=210
  enunciado: V(7,3)=210.
  solucion_pasos:
  - C(7,3)=V(7,3)/3!=210/6=35.
- titulo: ¿Cada combinación de r elementos genera exactamente r! variaciones?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que hay r! formas distintas de ordenar esos mismos r elementos seleccionados.
- titulo: ¿V(n,r) es siempre mayor o igual que C(n,r)?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que V(n,r)=C(n,r)×r!, y r!≥1 siempre.
errores_frecuentes:
- Olvidar la relación V(n,r)=C(n,r)×r!, tratando ambas fórmulas como si no estuvieran conectadas.
- Confundir cuál de las dos fórmulas (variación o combinación) usar al momento de resolver, sin verificar
  el contexto del problema.
- Calcular mal r! al aplicar la relación entre ambas fórmulas.
fuente: 'Elaboración propia (referencia: Baldor 375, Moraleja 300).'
estado: publicado
