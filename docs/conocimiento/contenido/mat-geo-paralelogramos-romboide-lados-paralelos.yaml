semantic_id: MAT.GEO.PARALELOGRAMOS.ROMBOIDE_LADOS_OPUESTOS_PARALELOS
titulo: Propiedad de lados opuestos paralelos en el romboide
objetivo: Reconocer al romboide como el paralelogramo 'general', que solo cumple las propiedades básicas
  de todo paralelogramo, sin propiedades adicionales de ángulos o lados especiales.
introduccion: 'Después de estudiar el cuadrado, el rectángulo y el rombo (cada uno con una propiedad adicional
  especial), queda un último caso: el paralelogramo que no tiene ninguna característica extra.'
resumen: Un romboide es un paralelogramo que solo cumple las propiedades generales (lados opuestos paralelos
  y congruentes, ángulos opuestos congruentes), sin tener además ángulos rectos ni los cuatro lados iguales.
explicacion: '![Romboide: lados opuestos paralelos, sin ángulos rectos ni lados iguales](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-romboide-lados-paralelos.svg)


  ### Definición formal


  Un romboide es un paralelogramo en el que $AB\parallel CD$ y $BC\parallel AD$, con $AB=CD\neq BC=AD$
  (lados opuestos iguales entre sí, pero distintos entre pares) y ángulos distintos de 90°.


  ### Desarrollo didáctico


  El romboide es, en cierto sentido, el paralelogramo ''más genérico'': tiene todas las propiedades comunes
  a todo paralelogramo, pero ninguna de las propiedades adicionales que distinguen al cuadrado (lados
  y ángulos especiales), al rectángulo (ángulos rectos) o al rombo (lados iguales).'
procedimiento:
- 'Paso 1: Verifica que la figura sea un paralelogramo (lados opuestos paralelos).'
- 'Paso 2: Verifica que NO tenga ángulos rectos ni los cuatro lados iguales.'
- 'Paso 3: Si cumple ambas condiciones, es un romboide.'
ejemplos:
- titulo: Identificar un romboide
  enunciado: Un paralelogramo tiene lados 8 y 5 cm, con ángulos de 70° y 110°.
  solucion_pasos:
  - Es un romboide, ya que no tiene ángulos rectos ni los cuatro lados iguales.
- titulo: Distinguir romboide de rombo
  enunciado: Un paralelogramo tiene los cuatro lados iguales, pero ángulos distintos de 90°.
  solucion_pasos:
  - Es un rombo, no un romboide, ya que sus cuatro lados sí son iguales.
- titulo: ¿El romboide tiene lados opuestos congruentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es una propiedad general de todo paralelogramo, incluido el romboide.
- titulo: ¿El romboide tiene alguna propiedad angular o de lados especial?
  respuesta: 'No'
  solucion_pasos:
  - 'No, es precisamente lo que lo distingue: no tiene ninguna propiedad adicional más allá de las generales
    del paralelogramo.'
errores_frecuentes:
- Confundir el romboide con el rombo (nombres parecidos, pero propiedades distintas).
- Creer que el romboide no cumple las propiedades generales de todo paralelogramo.
- Asumir que cualquier paralelogramo 'inclinado' visualmente es automáticamente un romboide, sin verificar
  sus lados y ángulos.
fuente: 'Fuente: Moraleja Tomo 2 69, Cid 45.'
estado: publicado
