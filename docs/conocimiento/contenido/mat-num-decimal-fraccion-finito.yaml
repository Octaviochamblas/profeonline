semantic_id: MAT.NUM.DECIMAL_FRACCION.FINITO
titulo: Conversión de decimal finito a fracción
objetivo: Convertir un decimal finito a su fracción equivalente usando una potencia de 10 como denominador.
introduccion: 'Un decimal finito puede escribirse directamente como fracción: las cifras después de la
  coma forman el numerador, y el denominador es la potencia de 10 correspondiente a la cantidad de cifras
  decimales.'
resumen: Para convertir un decimal finito a fracción se escribe como numerador el número sin la coma,
  y como denominador la potencia de 10 con tantos ceros como cifras decimales tenía.
explicacion: '### Definición formal


  Si \(x\) tiene \(n\) cifras decimales, entonces \(x=\frac{x\cdot10^n}{10^n}\), donde \(x\cdot10^n\)
  es el número entero que resulta de correr la coma \(n\) lugares a la derecha.


  ### Desarrollo didáctico


  \(0.125\) tiene 3 cifras decimales, así que \(0.125=\frac{125}{1000}\); simplificando por 125 se obtiene
  \(\frac{1}{8}\).'
procedimiento:
- 'Paso 1: Elimina temporalmente la coma y usa las cifras como numerador.'
- 'Paso 2: Pon como denominador una potencia de diez con tantos ceros como cifras decimales.'
- 'Paso 3: Simplifica y divide para comprobar que recuperas el decimal original.'
ejemplos:
- titulo: Aplicación razonada — Conversión de decimal finito a fracción
  enunciado: \(0.125 = \frac{125}{1000} = \frac{1}{8}\).
  solucion_pasos:
  - Elimina temporalmente la coma y usa las cifras como numerador.
  - Pon como denominador una potencia de diez con tantos ceros como cifras decimales.
  - Simplifica y divide para comprobar que recuperas el decimal original.
- titulo: Revisión de una solución — Conversión de decimal finito a fracción
  enunciado: Una solución aplica “Pon como denominador una potencia de diez con tantos ceros como cifras
    decimales.”, pero termina sin comprobar que la cantidad de cifras decimales indica qué potencia de
    10 usar en el denominador. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conversión de decimal finito a fracción: un decimal finito se convierte
    a fracción escribiéndolo sobre una potencia de 10 y simplificando si es posible.'
  - Elimina temporalmente la coma y usa las cifras como numerador.
  - 'Completa la revisión con este control: Simplifica y divide para comprobar que recuperas el decimal
    original.'
- titulo: ¿Se cumple que la cantidad de cifras decimales indica qué potencia de 10 usar en el denominador?
    — Conversión de decimal finito a fracción
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un decimal finito se convierte a fracción escribiéndolo
    sobre una potencia de 10 y simplificando si es posible.
  - El caso “\(0.125 = \frac{125}{1000} = \frac{1}{8}\)” satisface esa condición.
  - Simplifica y divide para comprobar que recuperas el decimal original.
- titulo: ¿Es válido omitir el paso “Elimina temporalmente la coma y usa las cifras como numerador”? —
    Conversión de decimal finito a fracción
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conversión de decimal finito a fracción.
  - 'Omitirlo puede volver inválida la acción siguiente: Pon como denominador una potencia de diez con
    tantos ceros como cifras decimales.'
  - 'La solución debe terminar de este modo: Simplifica y divide para comprobar que recuperas el decimal
    original.'
errores_frecuentes:
- 'Empezar conversión de decimal finito a fracción sin realizar este control inicial: Elimina temporalmente
  la coma y usa las cifras como numerador.'
- Memorizar “\(0.125 = \frac{125}{1000} = \frac{1}{8}\)” como respuesta aislada, sin reconstruir la definición
  que lo justifica.
- Convertir en receta el paso “Pon como denominador una potencia de diez con tantos ceros como cifras
  decimales.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre conversión de decimal finito a fracción que contradice el criterio
  “La cantidad de cifras decimales indica qué potencia de 10 usar en el denominador”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica y divide para comprobar que recuperas
  el decimal original.'
