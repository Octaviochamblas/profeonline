semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.CEROS
titulo: Ceros de la función coseno
objetivo: Determinar los valores de $x$ para los cuales $\cos(x)=0$.
introduccion: A diferencia del seno, la curva del coseno cruza el eje $x$ en posiciones desplazadas medio ángulo
  recto respecto al origen.
resumen: Los **ceros** de $f(x)=\cos(x)$ son todos los valores $x=\pi/2+n\pi$, con $n$ entero.
explicacion: '### Definición formal


  $\cos(x)=0$ exactamente cuando el punto asociado al ángulo $x$ tiene coordenada $x=0$, lo que ocurre cuando el
  lado terminal cae sobre el eje $y$, es decir, cuando $x=\pi/2+n\pi$ para algún entero $n$.


  ### Desarrollo didáctico


  $\cos(\pi/2)=0$ ($n=0$), $\cos(3\pi/2)=0$ ($n=1$), $\cos(-\pi/2)=0$ ($n=-1$). Todos estos valores están
  espaciados exactamente $\pi$ unidades entre sí, igual que los ceros del seno, pero desplazados $\pi/2$.'
procedimiento:
- 'Paso 1: Recuerda que los ceros del coseno corresponden a puntos sobre el eje $y$ en el círculo unitario.'
- 'Paso 2: Identifica esos puntos como $\pi/2$ más múltiplos enteros de $\pi$.'
- 'Paso 3: Expresa la solución general como $x=\pi/2+n\pi$, con $n\in\mathbb{Z}$.'
ejemplos:
- titulo: Verificación de un cero de la función
  enunciado: '¿Es $x=5\pi/2$ un cero de $f(x)=\cos(x)$?'
  solucion_pasos:
  - '$5\pi/2=\pi/2+2\pi=\pi/2+n\pi$ con $n=2$.'
  - Sí, es un cero de la función.
- titulo: Detección de un valor que no es cero
  enunciado: '¿Es $x=\pi$ un cero de $f(x)=\cos(x)$?'
  solucion_pasos:
  - '$\pi$ no tiene la forma $\pi/2+n\pi$.'
  - No, no es un cero; de hecho $\cos(\pi)=-1$.
- titulo: ¿Los ceros del coseno están igualmente espaciados?
  enunciado: ¿Los ceros consecutivos de $f(x)=\cos(x)$ están separados por la misma distancia?
  respuesta: Sí
  solucion_pasos:
  - Cada cero está separado del siguiente exactamente por $\pi$ unidades.
- titulo: ¿Los ceros del coseno coinciden con los del seno?
  enunciado: ¿Los ceros de $f(x)=\cos(x)$ ocurren en los mismos valores de $x$ que los ceros de $g(x)=\sin(x)$?
  respuesta: 'No'
  solucion_pasos:
  - Los ceros del seno son múltiplos de $\pi$; los del coseno están desplazados $\pi/2$ respecto a esos valores.
errores_frecuentes:
- Confundir los ceros del coseno con los del seno.
- Olvidar sumar el desplazamiento $\pi/2$ en la fórmula general.
- Expresar la solución con un solo valor en vez de la fórmula general $x=\pi/2+n\pi$.
- Confundir "cero de la función" con "el valor de la función en $x=0$".
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
