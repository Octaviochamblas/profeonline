semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.RAZON_PERIMETROS
titulo: Relación entre perímetros de figuras semejantes
objetivo: Comprender que la razón entre los perímetros de dos figuras semejantes es exactamente igual
  a su razón de semejanza.
introduccion: Una consecuencia directa e intuitiva de la semejanza es cómo se relacionan los perímetros
  de dos figuras semejantes entre sí.
resumen: La razón entre los perímetros de dos figuras semejantes es igual a la razón de semejanza entre
  ellas.
explicacion: '![Razón entre perímetros de figuras semejantes](/static/img/geometria/congruencia-semejanza/semejanza-razon-perimetros.svg)


  ### Definición formal


  Si dos figuras son semejantes con razón de semejanza $k$, entonces $\frac{P_2}{P_1}=k$, donde $P_1$
  y $P_2$ son sus perímetros respectivos.


  ### Desarrollo didáctico


  Esto ocurre porque el perímetro es una suma de longitudes, y cada longitud se multiplica por el mismo
  factor $k$; al sumar todos los lados multiplicados por $k$, el perímetro total también queda multiplicado
  por $k$.'
procedimiento:
- 'Paso 1: Determina la razón de semejanza entre las dos figuras.'
- 'Paso 2: Si conoces el perímetro de una figura, multiplícalo por la razón de semejanza para obtener
  el de la otra.'
- 'Paso 3: Verifica que el resultado sea consistente con la escala de la figura (mayor o menor según corresponda).'
ejemplos:
- titulo: Calcular el perímetro de una figura semejante mayor
  enunciado: Un triángulo tiene perímetro 20 cm; su semejante tiene razón de semejanza 3.
  solucion_pasos:
  - Perímetro del semejante = 20×3=60 cm.
- titulo: Calcular la razón de semejanza a partir de perímetros
  enunciado: Dos triángulos semejantes tienen perímetros 15 cm y 45 cm.
  solucion_pasos:
  - La razón de semejanza es 45/15=3.
- titulo: ¿La razón entre perímetros es igual a la razón de semejanza?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una consecuencia directa de que el perímetro es una suma de lados, todos escalados por el mismo
    factor.
- titulo: ¿Esta propiedad aplica solo a triángulos?
  respuesta: 'No'
  solucion_pasos:
  - No, aplica a cualquier par de polígonos semejantes, sin importar el número de lados.
errores_frecuentes:
- Confundir la razón de perímetros con la razón de áreas (que es el cuadrado de la razón de semejanza).
- Invertir la razón al calcular el perímetro de la figura más grande o más pequeña.
- Aplicar esta propiedad a figuras que no son realmente semejantes.
fuente: 'Fuente: Cid 120.'
estado: publicado
