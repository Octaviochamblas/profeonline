  enunciado: 'Respecto de «Sistema indeterminado: infinitas soluciones (rectas coincidentes)»: ¿La siguiente conclusión
    es correcta? «Puede omitirse esta condición sin cambiar el resultado: «Observa si una ecuación es exactamente
