semantic_id: 'MAT.ALG.SISTEMAS_REPRESENTACION.SISTEMA_INDETERMINADO'
titulo: 'Sistema Compatible Indeterminado'
objetivo: 'Identificar sistemas que tienen infinitas soluciones por ser la misma recta.'
introduccion: |
  A veces, el sistema te intenta engañar. Te da dos ecuaciones, pero una es simplemente el doble de la otra (ej: $x+y=2$ y $2x+2y=4$).
resumen: |
  Si intentas resolverlo con álgebra, las letras se eliminarán y llegarás a una verdad obvia como $0 = 0$.
explicacion: |
  Al graficarlas, dibujas la primera línea, y cuando intentas dibujar la segunda, te das cuenta de que cae exactamente encima de la primera. Son la misma recta.
  ¿En cuántos puntos se tocan dos rectas que están montadas una sobre la otra? ¡En todos! Tienen **infinitos puntos de contacto**. Por eso es 'Indeterminado', porque no puedes determinar una sola solución. Todas sirven.
procedimiento:
  - 'Paso 1: Observa si una ecuación es exactamente un múltiplo directo de la otra (en todos sus términos, incluyendo el resultado).'
  - 'Paso 2: Si es así, las rectas son coincidentes (están superpuestas).'
  - 'Paso 3: Concluye que el sistema tiene infinitas soluciones.'
  - 'Paso 4: Si lo resuelves algebraicamente, llegarás a una identidad verdadera como $0=0$ o $5=5$.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
