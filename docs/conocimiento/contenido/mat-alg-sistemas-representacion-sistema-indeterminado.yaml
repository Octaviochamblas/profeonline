  enunciado: 'Respecto de «Sistema indeterminado: infinitas soluciones (rectas coincidentes)»: ¿La siguiente formulación
    es correcta? «A veces, el sistema te intenta engañar»'
  respuesta: Sí
  solucion_pasos:
