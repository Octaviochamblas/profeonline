- 'La definición sigue cumpliéndose aunque no se considere que a veces, el sistema te intenta engañar. Te da dos
  ecuaciones, pero una es simplemente el doble de la otra (ej: $x+y=2$ y $2x+2y=4$).'
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Si lo resuelves algebraicamente, llegarás
  a una identidad verdadera como $0=0$ o $5=5$».
- La comprobación del resultado vuelve innecesaria la condición «Observa si una ecuación es exactamente un múltiplo
