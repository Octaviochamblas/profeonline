semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.SISTEMA_INDETERMINADO
titulo: Sistema Compatible Indeterminado
objetivo: Identificar sistemas que tienen infinitas soluciones por ser la misma recta.
introduccion: Al graficarlas, dibujas la primera línea, y cuando intentas dibujar la segunda, te das cuenta de que
  cae exactamente encima de la primera. Son la misma recta.
resumen: 'A veces, el sistema te intenta engañar. Te da dos ecuaciones, pero una es simplemente el doble de la otra
  (ej: $x+y=2$ y $2x+2y=4$).'
explicacion: '### Definición formal


  Un sistema $a_1x+b_1y=c_1$, $a_2x+b_2y=c_2$ es compatible indeterminado (infinitas soluciones) si y solo si sus
  tres razones coinciden, $\frac{a_1}{a_2} = \frac{b_1}{b_2} = \frac{c_1}{c_2}$: ambas ecuaciones describen la
  misma recta, por lo que todo punto de una satisface también a la otra.


  ### Desarrollo didáctico


  Al graficarlas, dibujas la primera línea, y cuando intentas dibujar la segunda, te das cuenta de que cae exactamente
  encima de la primera. Son la misma recta.

  ¿En cuántos puntos se tocan dos rectas que están montadas una sobre la otra? En todos. Tienen **infinitos puntos
  de contacto**. Por eso es ''Indeterminado'', porque no puedes determinar una sola solución. Todas sirven.


  Si intentas resolverlo con álgebra, las letras se eliminarán y llegarás a una verdad obvia como $0 = 0$.'
procedimiento:
- Observa si una ecuación es exactamente un múltiplo directo de la otra (en todos sus términos, incluyendo el resultado).
- Si es así, las rectas son coincidentes (están superpuestas).
- Concluye que el sistema tiene infinitas soluciones.
- Si lo resuelves algebraicamente, llegarás a una identidad verdadera como $0=0$ o $5=5$.
