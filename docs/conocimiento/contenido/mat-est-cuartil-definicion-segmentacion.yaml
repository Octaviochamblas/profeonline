semantic_id: MAT.EST.CUARTILES.DEFINICION_SEGMENTACION
titulo: Definir los cuartiles como división de los datos en cuatro partes
objetivo: Definir los cuartiles como los tres valores que dividen un conjunto de datos ordenados en cuatro partes de igual tamaño.
introduccion: Imagina que ordenas a todo tu curso de menor a mayor estatura y luego cortas esa fila en 4 grupos del mismo tamaño.
  Los puntos donde cortas son los cuartiles.
resumen: Los cuartiles $Q_1$, $Q_2$ y $Q_3$ son los tres valores que dividen un conjunto de datos ordenados de menor a mayor en
  cuatro partes, cada una con aproximadamente el 25% de los datos.
explicacion: '![Cuartiles como división en cuatro partes](/static/img/estadistica/cuartil/cuartil-definicion-segmentacion.svg)


  ### Definición formal


  Dado un conjunto de datos ordenados, los cuartiles $Q_1$, $Q_2$ y $Q_3$ son los tres valores que lo dividen en cuatro

  tramos consecutivos, cada uno con aproximadamente el 25% de las observaciones.


  ### Desarrollo didáctico


  Son un caso particular de los percentiles: $Q_1=P_{25}$, $Q_2=P_{50}$ y $Q_3=P_{75}$. Se usan mucho para describir

  cómo se reparte un conjunto de datos sin tener que mirar cada valor individual.'
procedimiento:
- 'Paso 1: Ordena todos los datos de menor a mayor.'
- 'Paso 2: Divide el conjunto ordenado en cuatro partes de igual tamaño aproximado.'
- 'Paso 3: Identifica los tres valores de corte: $Q_1$, $Q_2$ y $Q_3$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Se ordenan las notas de 20 estudiantes de menor a mayor. ¿Cuántos cortes se necesitan para formar los cuatro
    grupos de los cuartiles?
  solucion_pasos:
  - Se necesitan 3 cortes para formar 4 grupos.
  - Esos 3 cortes corresponden a $Q_1$, $Q_2$ y $Q_3$.
- titulo: Ejemplo 2
  enunciado: En un conjunto de datos, ¿qué proporción aproximada de datos queda entre $Q_1$ y $Q_3$?
  solucion_pasos:
  - Entre $Q_1$ y $Q_3$ queda el 50% central de los datos.
  - Esto se debe a que cada cuartil deja cortes de 25% en 25%.
- titulo: ¿Los cuartiles dividen los datos en cuatro grupos de igual tamaño aproximado?
  respuesta: Sí
  solucion_pasos:
  - Sí, cada uno de los cuatro grupos contiene aproximadamente el 25% de los datos.
- titulo: ¿Se necesitan cuatro valores de corte para formar los cuartiles?
  respuesta: 'No'
  solucion_pasos:
  - 'No, se necesitan solo tres valores de corte ($Q_1$, $Q_2$, $Q_3$) para formar cuatro grupos.'
errores_frecuentes:
- Creer que los cuartiles son cuatro valores en lugar de tres.
- Pensar que cada cuartil representa un grupo, en vez de un punto de corte entre grupos.
- Confundir la cantidad de grupos formados con la cantidad de cuartiles.
- No ordenar los datos antes de intentar dividirlos en cuartiles.
- Creer que los cuatro grupos formados deben tener exactamente el mismo número de datos siempre, incluso cuando el total
  no es divisible por 4.
fuente: 'Elaboración propia (referencia: Moraleja 380).'
estado: publicado
