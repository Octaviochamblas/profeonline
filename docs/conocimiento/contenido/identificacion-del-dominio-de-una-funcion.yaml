semantic_id: MAT.ALG.FUNCION_CONCEPTOS.DOMINIO
titulo: Identificación del dominio de una función
objetivo: Identificar el dominio de una función como el conjunto de todos los valores admisibles para
  la variable independiente.
introduccion: No todos los números pueden entrar en una función sin causar problemas (como dividir por
  cero). El dominio es la lista de entradas permitidas.
resumen: El **dominio** de una función $f$ es el conjunto de todos los valores de $x$ para los cuales
  $f(x)$ está definida, es decir, el conjunto de partida sobre el que la función efectivamente asigna
  imágenes.
explicacion: '### Definición formal


  El dominio de una función $f\colon A \to B$, denotado $\text{Dom}(f)$, es el subconjunto de $A$ formado
  por todos los valores $x$ para los cuales existe $f(x) \in B$. Cuando $f$ está dada por una fórmula
  sin restricción explícita de conjunto de partida, $\text{Dom}(f)$ es el mayor subconjunto de $\mathbb{R}$
  donde la fórmula produce un valor real definido.


  ### Desarrollo didáctico


  Para hallar el dominio de una fórmula, busca las operaciones que "rompen" la definición: divisiones
  (el denominador no puede ser cero) y raíces de índice par (el radicando no puede ser negativo).


  Si $f(x) = \frac{1}{x-3}$, el valor $x=3$ anula el denominador, así que $\text{Dom}(f) = \mathbb{R}
  - \{3\}$.

  Si $f(x) = \sqrt{x-2}$, se exige $x-2 \geq 0$, es decir $\text{Dom}(f) = [2, +\infty[$.'
procedimiento:
- 'Paso 1: Observa la fórmula de la función en busca de divisiones o raíces de índice par.'
- 'Paso 2: Si hay una división, iguala el denominador a cero y excluye esos valores del dominio.'
- 'Paso 3: Si hay una raíz de índice par, exige que el radicando sea mayor o igual a cero y resuelve la
  inecuación.'
- 'Paso 4: Si no hay restricciones, el dominio es todo $\mathbb{R}$.'
ejemplos:
- titulo: Restricción por división
  enunciado: Determina el dominio de $f(x) = \frac{5}{x+2}$.
  solucion_pasos:
  - El denominador no puede ser cero: $x + 2 \neq 0 \Rightarrow x \neq -2$.
  - 'Dominio: $\mathbb{R} - \{-2\}$.'
- titulo: Restricción por raíz cuadrada
  enunciado: Determina el dominio de $f(x) = \sqrt{5-x}$.
  solucion_pasos:
  - El radicando debe ser no negativo: $5 - x \geq 0 \Rightarrow x \leq 5$.
  - 'Dominio: $]-\infty, 5]$.'
- titulo: ¿El dominio de $f(x) = x^2 + 3x - 1$ es todo $\mathbb{R}$?
  enunciado: ¿El dominio de $f(x) = x^2 + 3x - 1$ es todo $\mathbb{R}$?
  respuesta: Verdadero
  solucion_pasos:
  - Es un polinomio; no tiene divisiones ni raíces, por lo que no hay valores prohibidos.
- titulo: ¿$x=3$ pertenece al dominio de $f(x) = \frac{2}{x-3}$?
  enunciado: ¿$x=3$ pertenece al dominio de $f(x) = \frac{2}{x-3}$?
  respuesta: Falso
  solucion_pasos:
  - En $x=3$ el denominador se anula, dejando la expresión indefinida.
errores_frecuentes:
- Olvidar restringir el dominio cuando hay una variable en el denominador.
- Exigir que el radicando sea estrictamente positivo en vez de mayor o igual a cero.
- Confundir el dominio con el recorrido de la función.
- Asumir que el dominio de todo polinomio tiene restricciones, sin verificar que no las tiene.
- No combinar todas las restricciones cuando hay más de una operación conflictiva en la misma fórmula.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
