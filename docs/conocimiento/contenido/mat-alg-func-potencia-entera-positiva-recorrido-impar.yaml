semantic_id: MAT.ALG.FUNC_POTENCIA_ENTERA_POSITIVA.RECORRIDO_IMPAR
titulo: Recorrido con exponente entero positivo impar
objetivo: Determinar que el recorrido de $f(x)=a\cdot x^n$ es todo $\mathbb{R}$ cuando $n$ es un entero positivo
  impar.
introduccion: A diferencia del caso par, cuando el exponente es impar la función alcanza tanto valores positivos
  como negativos, sin límite en ninguna dirección.
resumen: Cuando $n$ es un entero positivo impar, el recorrido de $f(x)=a\cdot x^n$ es **todo $\mathbb{R}$**,
  independientemente del signo del coeficiente $a$.
explicacion: '### Definición formal


  Para $n$ impar, la función $f(x)=a\cdot x^n$ (con $a\neq0$) es estrictamente monótona (creciente si $a>0$,
  decreciente si $a<0$) en todo $\mathbb{R}$, con $f(x)\to-\infty$ en un extremo y $f(x)\to+\infty$ en el otro.
  Al ser continua y cubrir ambos extremos infinitos sin saltos, alcanza todos los valores reales.


  ### Desarrollo didáctico


  $f(x)=x^3$ toma valores tan negativos como se quiera para $x$ suficientemente negativo, y tan positivos como
  se quiera para $x$ suficientemente positivo, pasando por todos los valores intermedios sin excepción.'
procedimiento:
- 'Paso 1: Verifica que $n$ sea un entero positivo impar.'
- 'Paso 2: Reconoce que la función no tiene máximos ni mínimos que acoten el recorrido.'
- 'Paso 3: Concluye que el recorrido es todo $\mathbb{R}$.'
ejemplos:
- titulo: Determinación del recorrido de $x^3$
  enunciado: 'Determina el recorrido de $f(x)=x^3$.'
  solucion_pasos:
  - El exponente $3$ es impar, así que no hay restricciones de signo en el resultado.
  - El recorrido es todo $\mathbb{R}$.
- titulo: Determinación del recorrido de $-4x^5$
  enunciado: 'Determina el recorrido de $f(x)=-4x^5$.'
  solucion_pasos:
  - El exponente $5$ es impar; el coeficiente negativo solo invierte la dirección del crecimiento.
  - El recorrido sigue siendo todo $\mathbb{R}$.
- titulo: ¿El recorrido de una función con exponente impar depende del signo de $a$?
  enunciado: ¿El recorrido de $f(x)=a\cdot x^n$ (con $n$ impar) cambia según el signo de $a$?
  respuesta: 'No'
  solucion_pasos:
  - El recorrido es todo $\mathbb{R}$ sin importar si $a$ es positivo o negativo.
- titulo: ¿Puede $f(x)=x^7$ tomar cualquier valor real?
  enunciado: ¿La función $f(x)=x^7$ puede tomar cualquier valor real, sin excepción?
  respuesta: Sí
  solucion_pasos:
  - Al ser estrictamente creciente y no acotada en ningún extremo, cubre todos los valores reales posibles.
errores_frecuentes:
- Confundir el recorrido con exponente impar (todo $\mathbb{R}$) con el caso par (semirrecta).
- Suponer que el signo de $a$ restringe el recorrido cuando el exponente es impar.
- No distinguir entre el comportamiento del dominio (siempre $\mathbb{R}$) y el del recorrido, que sí varía según la paridad.
- Olvidar verificar que la función no tiene extremos que acoten el recorrido.
