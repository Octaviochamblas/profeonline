semantic_id: MAT.ALG.FRACCIONES_RESTA.IGUAL_DENOMINADOR
titulo: Resta de Fracciones con Igual Denominador
objetivo: Restar fracciones algebraicas que comparten el mismo denominador.
introduccion: 'La resta es igual de sencilla que la suma cuando los pisos son idénticos. Pero la resta tiene veneno:
  el signo negativo.'
resumen: Para restar fracciones con igual denominador, mantén el denominador y resta los numeradores. Cuidado con
  el signo negativo que afecta al segundo numerador.
explicacion: '### Definición formal


  Es el mismo principio que la suma, el denominador es inmutable en este paso.


  ### Desarrollo didáctico


  La resta con igual denominador opera exactamente igual que la suma con igual denominador: mantienes el piso intacto
  y restas los techos.


  Ejemplo: $\frac{5x}{2a} - \frac{3x}{2a}$

  1. Se conserva el denominador: $2a$.

  2. Restas los numeradores: $5x - 3x = 2x$.

  3. Tienes el resultado base: $\frac{2x}{2a}$.

  4. (Paso de limpieza): Tacha el 2 con el 2. Respuesta final: $\frac{x}{a}$.


  Pero, mucho ojo: esta tranquilidad es peligrosa. Si el segundo numerador (el que está siendo restado) fuera un
  polinomio entero (ej: $3x + 1$), el signo menos va a intentar atacarlo completo. Veremos ese peligro en el siguiente
  tema.'
procedimiento:
- 'Paso 1: Confirma denominadores iguales.'
- 'Paso 2: Escribe la única fracción.'
- 'Paso 3: Coloca el primer numerador, luego un signo MENOS, y luego el segundo numerador (preferiblemente entre
  paréntesis.).'
ejemplos:
- titulo: Resta $\frac{9m}{4} - \frac{2m}{4}$
  enunciado: Resta $\frac{9m}{4} - \frac{2m}{4}$.
  solucion_pasos:
  - 'Denominador común: 4.'
  - 'Numeradores: $9m - 2m = 7m$.'
  - 'Resultado: $\frac{7m}{4}$.'
- titulo: Calcula $\frac{y^2}{y-1} - \frac{1}{y-1}$.
  solucion_pasos:
  - Numerador es y^2-1. Se factoriza a (y-1)(y+1). Se cancela (y-1).
- titulo: 'Respecto de «Sustracción de fracciones algebraicas de igual denominador»: ¿Es correcta esta'
  enunciado: 'Respecto de «Sustracción de fracciones algebraicas de igual denominador»: ¿Es correcta esta caracterización?
    «Para restar fracciones con igual denominador, mantén el denominador y resta los numeradores»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para restar fracciones con igual denominador, mantén el denominador
    y resta los numeradores.'
- titulo: 'Respecto de «Sustracción de fracciones algebraicas de igual denominador»: ¿Es válida esta af'
  enunciado: 'Respecto de «Sustracción de fracciones algebraicas de igual denominador»: ¿Es válida esta afirmación?
    «Confundir las reglas y tratar de voltear alguna fracción (eso es para división)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para restar fracciones con igual denominador, mantén el denominador
    y resta los numeradores.'
errores_frecuentes:
- Confundir las reglas y tratar de voltear alguna fracción (eso es para división).
- Para «Al restar dos fracciones algebraicas con el mismo denominador:», la respuesta correcta es Los denominadores
  se restan y dan 0.
- Se invierte la segunda fracción.
- Para «Al restar dos fracciones algebraicas con el mismo denominador:», la respuesta correcta es Se multiplican
  los numeradores cruzados.
- Para «Calcula $\frac{7a}{2} - \frac{5a}{2}$.», la respuesta correcta es $\frac{2a}{0}$.
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
