semantic_id: 'MAT.ALG.FRACCIONES_RESTA.IGUAL_DENOMINADOR'
titulo: 'Resta de Fracciones con Igual Denominador'
objetivo: 'Restar fracciones algebraicas que comparten el mismo denominador.'
introduccion: |
  La resta es igual de sencilla que la suma cuando los pisos son idénticos. Pero la resta tiene veneno: el signo negativo.
resumen: |
  Para restar fracciones con igual denominador, mantén el denominador y resta los numeradores. ¡Cuidado con el signo negativo que afecta al segundo numerador!
explicacion: |
  Con igual denominador, agrupas rápido:
  $\frac{5x}{2a} - \frac{3x}{2a} = \frac{5x - 3x}{2a} = \frac{2x}{2a} = \frac{x}{a}$.

  El cuidado es cuando el numerador que restas tiene varios términos. El signo negativo actúa como un francotirador contra TODOS ellos.
procedimiento:
  - 'Paso 1: Confirma denominadores iguales.'
  - 'Paso 2: Escribe la única fracción.'
  - 'Paso 3: Coloca el primer numerador, luego un signo MENOS, y luego el segundo numerador (¡preferiblemente entre paréntesis!).'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Resta $\frac{9m}{4} - \frac{2m}{4}$.'
    solucion_pasos:
    - 'Denominador común: 4.'
    - 'Numeradores: $9m - 2m = 7m$.'
    - 'Resultado: $\frac{7m}{4}$.'
  - titulo: 'Calcula $\frac{y^2}{y-1} - \frac{1}{y-1}$.'
    respuesta: '$y+1$'
    solucion_pasos:
    - 'Numerador es y^2-1. Se factoriza a (y-1)(y+1). Se cancela (y-1).'
errores_frecuentes:
  - 'Confundir las reglas y tratar de voltear alguna fracción (eso es para división).'
estado: publicado
