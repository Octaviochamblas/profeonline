semantic_id: MAT.GEO.TRANSVERSAL_BARICENTRO.BARICENTRO_CENTRO_GRAVEDAD
titulo: Interpretación del baricentro como centro de gravedad del triángulo
objetivo: Interpretar el baricentro como el punto de equilibrio físico de una lámina triangular homogénea.
introduccion: 'Más allá de la geometría pura, el baricentro tiene una interpretación física: es el punto
  donde se podría sostener (equilibrar) una lámina triangular hecha de un material uniforme.'
resumen: 'El baricentro es el centro de gravedad de un triángulo: el punto donde se equilibraría una lámina
  triangular homogénea.'
explicacion: '![Baricentro como centro de gravedad](/static/img/geometria/elementos-secundarios/transversal-baricentro-baricentro-centro-gravedad.svg)


  ### Definición formal


  Si se recorta una lámina triangular de densidad uniforme, su centro de masa coincide exactamente con
  el baricentro G, calculado como el promedio de las coordenadas de sus tres vértices.


  ### Desarrollo didáctico


  Si se intenta sostener un triángulo de cartón sobre la punta de un lápiz, el único punto donde queda
  perfectamente equilibrado (sin caerse hacia ningún lado) es su baricentro.'
procedimiento:
- 'Paso 1: Identifica que se trata de una lámina triangular homogénea.'
- 'Paso 2: Calcula el baricentro como promedio de los tres vértices.'
- 'Paso 3: Ese punto es donde la lámina se equilibra físicamente.'
ejemplos:
- titulo: Interpretar físicamente el baricentro
  enunciado: Se quiere equilibrar una lámina triangular de cartón sobre un solo punto de apoyo.
  solucion_pasos:
  - Ese punto de apoyo debe ser el baricentro del triángulo.
- titulo: Relacionar con el cálculo geométrico
  enunciado: ¿Cómo se calcula el centro de gravedad de un triángulo?
  solucion_pasos:
  - 'Se calcula igual que el baricentro geométrico: el promedio de las coordenadas de los tres vértices.'
- titulo: ¿El centro de gravedad depende de que el material sea uniforme?
  respuesta: Sí
  solucion_pasos:
  - Sí, esta interpretación asume una lámina de densidad uniforme; con densidad variable el centro de
    masa podría diferir.
- titulo: ¿El centro de gravedad de una lámina triangular homogénea coincide con el baricentro geométrico?
  respuesta: Sí
  solucion_pasos:
  - Sí, son exactamente el mismo punto en ese caso.
errores_frecuentes:
- Creer que el centro de gravedad físico y el baricentro geométrico son conceptos distintos (son el mismo,
  para materiales uniformes).
- Confundir el punto de equilibrio con el centro del triángulo entendido de otra forma (como el incentro
  o el circuncentro).
- Aplicar esta interpretación física sin asumir que el material es homogéneo.
fuente: Elaboración propia.
estado: publicado
