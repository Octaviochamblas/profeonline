semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_EXTERIOR_TANGENTE_SECANTE
titulo: Medida de un ángulo exterior formado por una tangente y una secante
objetivo: Calcular la medida de un ángulo formado por una recta tangente y una recta secante, ambas trazadas
  desde un mismo punto exterior a la circunferencia.
introduccion: Cuando desde un punto exterior se traza una tangente y también una secante, el ángulo entre
  ambas también depende de una semidiferencia de arcos, igual que con dos secantes.
resumen: Si desde un punto exterior $P$ se traza una tangente que toca la circunferencia en $T$ y una
  secante que la corta en $A$ y $B$ (siendo $B$ el punto más lejano), la medida del ángulo es $m(\angle
  P)=\frac{m(\text{arco }TB)-m(\text{arco }TA)}{2}$.
explicacion: '![Ángulo exterior formado por tangente y secante](/static/img/geometria/circunferencia-circulo/circulo-angulo-exterior-tangente-secante.svg)


  ### Definición formal


  Si desde un punto exterior $P$ se traza una tangente (que toca la circunferencia en $T$) y una secante
  (que la corta en $A$ y $B$, con $B$ el punto más alejado de $P$), entonces $m(\angle P)=\frac{m(\text{arco
  }TB)-m(\text{arco }TA)}{2}$, la semidiferencia entre el arco lejano y el arco cercano (ambos medidos
  desde el punto de tangencia $T$).


  ### Desarrollo didáctico


  Si el arco lejano $TB$ mide 110° y el arco cercano $TA$ mide 40°, el ángulo en $P$ mide $\frac{110°-40°}{2}=35°$.
  Esta fórmula es análoga a la del ángulo exterior de dos secantes, reemplazando uno de los puntos de
  intersección por el punto de tangencia.'
procedimiento:
- 'Paso 1: Identifica el punto exterior P, el punto de tangencia T y los dos puntos de corte de la secante
  (A cercano, B lejano).'
- 'Paso 2: Identifica el arco lejano TB y el arco cercano TA (ambos medidos desde el punto de tangencia).'
- 'Paso 3: Resta el arco cercano al arco lejano y divide el resultado entre 2 para obtener la medida del
  ángulo en P.'
ejemplos:
- titulo: Calcular el ángulo exterior a partir de dos arcos
  enunciado: Desde un punto exterior P se traza una tangente (toca en T) y una secante (corta en A y B);
    el arco TB mide 110° y el arco TA mide 40°.
  solucion_pasos:
  - m(∠P)=(110°-40°)/2=70°/2=35°.
- titulo: Calcular un arco desconocido a partir del ángulo exterior
  enunciado: El ángulo en P mide 28°, y el arco TB (lejano) mide 96°.
  solucion_pasos:
  - 28×2=56=96-x → x=96-56=40°; el arco TA mide 40°.
- titulo: ¿Ambos arcos (TA y TB) se miden desde el mismo punto de tangencia T?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos arcos parten del punto de tangencia T hacia cada uno de los puntos de corte de la secante.
- titulo: ¿Esta fórmula sería válida si P estuviera dentro de la circunferencia?
  respuesta: 'No'
  solucion_pasos:
  - No, esta fórmula exige que P sea un punto exterior; dentro de la circunferencia se aplicaría la fórmula
    del ángulo interior (semisuma, no semidiferencia).
errores_frecuentes:
- Confundir esta fórmula con la del ángulo exterior de dos secantes, olvidando que un extremo ahora es
  el punto de tangencia T.
- Sumar los arcos en vez de restarlos.
- Invertir el orden de la resta (arco cercano menos lejano), obteniendo un resultado negativo.
fuente: Elaboración propia (sin fuente específica).
estado: publicado
