semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.SOBREYECTIVA_RECONOCIMIENTO
titulo: Reconocimiento de función sobreyectiva
objetivo: Reconocer si una función es sobreyectiva comparando su recorrido con el codominio declarado.
introduccion: Verificar la sobreyectividad es, en el fondo, una comparación de dos conjuntos que ya sabes calcular
  por separado.
resumen: Para reconocer si una función es sobreyectiva, se calcula su recorrido y se compara con el codominio
  declarado; si son exactamente iguales, la función es sobreyectiva.
explicacion: '### Definición formal


  Dada $f\colon A \to B$, se determina $\text{Rec}(f)$ mediante análisis algebraico o gráfico. Si $\text{Rec}(f) =
  B$, entonces $f$ es sobreyectiva; si $\text{Rec}(f) \subsetneq B$ (subconjunto propio), $f$ no es sobreyectiva.


  ### Desarrollo didáctico


  Gráficamente, esto equivale a verificar que toda recta horizontal $y=b$ con $b \in B$ corte a la curva en al
  menos un punto (existencia de al menos una preimagen para cada elemento del codominio).


  Para $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=x^3$: toda recta horizontal corta la curva cúbica en exactamente
  un punto, así que $\text{Rec}(f)=\mathbb{R}=B$, y $f$ es sobreyectiva.'
procedimiento:
- 'Paso 1: Calcula o determina el recorrido de la función mediante análisis algebraico o gráfico.'
- 'Paso 2: Identifica el codominio declarado.'
- 'Paso 3: Compara ambos conjuntos - si son idénticos, la función es sobreyectiva; si no, no lo es.'
ejemplos:
- titulo: Reconocimiento en función cúbica
  enunciado: Determina si $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=x^3$, es sobreyectiva.
  solucion_pasos:
  - El recorrido de $x^3$ es todo $\mathbb{R}$ (toma valores positivos, negativos y cero).
  - El codominio declarado también es $\mathbb{R}$.
  - Son iguales, así que es sobreyectiva.
- titulo: Reconocimiento en función con codominio restringido
  enunciado: Determina si $f\colon \mathbb{R} \to [0,+\infty[$, $f(x)=x^2$, es sobreyectiva.
  solucion_pasos:
  - El recorrido de $x^2$ es $[0,+\infty[$.
  - El codominio declarado también es $[0,+\infty[$.
  - Coinciden, así que es sobreyectiva.
- titulo: ¿Se puede reconocer la sobreyectividad sin conocer el codominio declarado?
  enunciado: ¿Se puede reconocer la sobreyectividad sin conocer el codominio declarado?
  respuesta: 'No'
  solucion_pasos:
  - La sobreyectividad depende de comparar el recorrido con el codominio; sin este último no se puede concluir.
- titulo: ¿Toda recta horizontal debe cortar la curva en al menos un punto para que sea sobreyectiva?
  enunciado: ¿Toda recta horizontal debe cortar la curva en al menos un punto para que sea sobreyectiva?
  respuesta: Sí
  solucion_pasos:
  - Eso garantiza que cada elemento del codominio tenga al menos una preimagen.
errores_frecuentes:
- Analizar solo el recorrido sin comparar con el codominio declarado explícitamente.
- Confundir "al menos una preimagen" (sobreyectividad) con "a lo más una preimagen" (inyectividad).
- Suponer que cualquier función con recorrido no acotado es automáticamente sobreyectiva sin verificar el codominio.
- No distinguir entre el codominio del contexto y el conjunto $\mathbb{R}$ por defecto.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
