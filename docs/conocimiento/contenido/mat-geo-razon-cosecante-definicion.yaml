semantic_id: MAT.GEO.TRIG_RECIPROCAS.COSECANTE_DEFINICION
titulo: Definición de cosecante de un ángulo agudo como hipotenusa sobre cateto opuesto
objetivo: 'Definir la cosecante de un ángulo agudo como la razón recíproca del seno: hipotenusa sobre
  cateto opuesto.'
introduccion: 'La cosecante es simplemente el seno ''puesto al revés'': en vez de cateto opuesto sobre
  hipotenusa, es hipotenusa sobre cateto opuesto.'
resumen: 'La cosecante de un ángulo agudo $\theta$ es la razón recíproca del seno: $\csc\theta=\dfrac{\text{hipotenusa}}{\text{cateto
  opuesto}}=\dfrac{1}{\sin\theta}$.'
explicacion: '![Definición de cosecante](/static/img/geometria/trigonometria/razon-cosecante-definicion.svg)


  ### Definición formal


  La cosecante de $\theta$ se define como $\csc\theta=\dfrac{\text{hipotenusa}}{\text{cateto opuesto}}$,
  es decir, el recíproco (inverso multiplicativo) del seno: $\csc\theta=\dfrac{1}{\sin\theta}$.


  ### Desarrollo didáctico


  Si $\sin\theta=0{,}6$ (es decir, cateto opuesto=3, hipotenusa=5), entonces $\csc\theta=\dfrac{5}{3}\approx1{,}67$,
  el recíproco exacto de $0{,}6$.'
procedimiento:
- 'Paso 1: Identifica el cateto opuesto a θ y la hipotenusa del triángulo rectángulo.'
- 'Paso 2: Calcula la razón hipotenusa/cateto opuesto (el orden invertido respecto del seno).'
- 'Paso 3: Verifica, si es útil, que csc θ = 1/sen θ, calculando el recíproco del seno.'
ejemplos:
- titulo: Calcular la cosecante con medidas conocidas
  enunciado: El cateto opuesto mide 3 cm y la hipotenusa 5 cm.
  solucion_pasos:
  - cscθ=5/3≈1,67.
- titulo: Calcular la cosecante a partir del seno
  enunciado: sinθ=0,4.
  solucion_pasos:
  - cscθ=1/0,4=2,5.
- titulo: ¿La cosecante es el recíproco del seno?
  respuesta: Sí
  solucion_pasos:
  - Sí, cscθ=1/senθ, por definición de razones recíprocas.
- titulo: ¿La cosecante puede ser menor que 1 para un ángulo agudo?
  respuesta: 'No'
  solucion_pasos:
  - No, ya que el seno de un ángulo agudo está entre 0 y 1, su recíproco (la cosecante) siempre es mayor
    que 1.
errores_frecuentes:
- Invertir el orden y calcular cateto opuesto/hipotenusa en vez de hipotenusa/cateto opuesto.
- Confundir la cosecante con la secante (que es recíproca del coseno, no del seno).
- Creer que la cosecante puede tomar valores menores que 1 para un ángulo agudo.
fuente: 'Elaboración propia (referencias: Moraleja 175, Cid 155).'
estado: publicado
