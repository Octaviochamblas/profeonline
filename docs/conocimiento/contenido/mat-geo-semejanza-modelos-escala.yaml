semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.MODELOS_ESCALA
titulo: Aplicación de semejanza y proporcionalidad en modelos a escala
objetivo: Aplicar la semejanza y la razón de proporcionalidad para resolver problemas de modelos a escala,
  como maquetas y planos.
introduccion: Los modelos a escala (maquetas, planos, mapas) son una de las aplicaciones más frecuentes
  de la semejanza en la vida cotidiana y profesional.
resumen: Un modelo a escala es una figura semejante al objeto real, donde la razón de semejanza se denomina
  escala del modelo.
explicacion: '![Modelos a escala](/static/img/geometria/congruencia-semejanza/semejanza-modelos-escala.svg)


  ### Definición formal


  Una escala 1:$n$ indica que cada unidad de longitud en el modelo representa $n$ unidades en la realidad;
  la razón de semejanza del modelo respecto a la realidad es $\frac{1}{n}$.


  ### Desarrollo didáctico


  Una maqueta a escala 1:100 significa que 1 cm en la maqueta representa 100 cm (1 m) en la realidad.
  Si un edificio mide 25 m de alto, su representación en la maqueta mide $\frac{2500\text{ cm}}{100}=25$
  cm.'
procedimiento:
- 'Paso 1: Identifica la escala del modelo (por ejemplo, 1:n).'
- 'Paso 2: Determina si quieres convertir de modelo a realidad, o de realidad a modelo.'
- 'Paso 3: Multiplica o divide por el factor de escala n, según la dirección de la conversión.'
ejemplos:
- titulo: Calcular la medida real desde un plano a escala
  enunciado: Un plano tiene escala 1:50, y una pared mide 8 cm en el plano.
  solucion_pasos:
  - Medida real = 8×50=400 cm=4 m.
- titulo: Calcular la medida en el modelo desde la realidad
  enunciado: Un edificio de 25 m se representa en una maqueta a escala 1:100.
  solucion_pasos:
  - Medida en la maqueta = 2500 cm/100=25 cm.
- titulo: ¿Una escala 1:100 implica una reducción respecto a la realidad?
  respuesta: Sí
  solucion_pasos:
  - Sí, el modelo es 100 veces más pequeño que el objeto real.
- titulo: ¿Los ángulos del modelo coinciden con los del objeto real?
  respuesta: Sí
  solucion_pasos:
  - Sí, al ser figuras semejantes, todos los ángulos correspondientes son iguales.
errores_frecuentes:
- Confundir la dirección de la conversión (multiplicar cuando se debía dividir, o viceversa).
- Olvidar convertir las unidades de medida (por ejemplo, mezclar centímetros y metros sin ajustar).
- Asumir que la escala afecta los ángulos del modelo, cuando en realidad los mantiene idénticos.
fuente: Elaboración propia.
estado: publicado
