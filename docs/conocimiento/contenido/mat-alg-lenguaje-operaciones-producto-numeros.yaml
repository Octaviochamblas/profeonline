semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.PRODUCTO_NUMEROS
objetivo: Traducir el producto o multiplicación entre dos o más cantidades desconocidas.
introduccion: Cuando varias fuerzas actúan en conjunto multiplicando sus efectos,
  hablamos de producto. En el lenguaje de las letras, la multiplicación es la operación
  más silenciosa y unida de todas.
resumen: El **Producto de Cantidades** se traduce utilizando la multiplicación. Por
  convención algebraica, **se omite el signo de multiplicar** cuando se unen letras
  entre sí o números con letras (multiplicación implícita).
explicacion: 'Palabras clave:

  - El producto de

  - Multiplicado por

  - Veces

  - El área de (en contextos rectangulares)


  Ejemplos:

  - ''El producto de dos números distintos'': $xy$

  - ''Un número multiplicado por otro número'': $ab$

  - ''La base multiplicada por la altura'': $bh$


  No es necesario escribir $x \cdot y$ ni $x \times y$, aunque no es un error formal.
  La norma es escribirlos juntos: $xy$.'
procedimiento:
- 'Paso 1: Identifica los factores (las entidades que se están multiplicando).'
- 'Paso 2: Asígnales variables distintas si son entidades desconocidas diferentes.'
- 'Paso 3: Escribe las letras juntas, una al lado de la otra, para denotar su multiplicación.'
ejemplos:
- titulo: El factor invisible
  enunciado: 'Traduce algebraicamente: ''El producto del precio de costo por el margen
    de ganancia''.'
  solucion_pasos:
  - Precio de costo es C.
  - Margen de ganancia es M.
  - La palabra producto exige multiplicar.
  - 'Traducción: CM.'
errores_frecuentes:
- 'Traducir usando el signo de suma. (Ej: pensar que ''el producto'' es una adición).'
- Usar la misma letra para ambas cantidades, escribiendo $x^2$ cuando el enunciado
  dice 'el producto de *dos* números' (deben ser diferentes, $xy$).
fuente: Álgebra de Baldor.
estado: publicado
