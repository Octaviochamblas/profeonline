semantic_id: MAT.NUM.COMPLEJOS.PARTE_REAL
objetivo: Identificar la parte real de un complejo.
introduccion: Leer un complejo exige separar dos coordenadas. La parte real es la
  que sobreviviría al hacer cero el componente imaginario.
resumen: En \(z=a+bi\), la parte real es \(\operatorname{Re}(z)=a\). La parte real
  no incluye el término imaginario ni su coeficiente.
explicacion: |-
  En \(z=a+bi\), la parte real es \(\operatorname{Re}(z)=a\).

  El cálculo “si \(z=-5+8i\), entonces \(\operatorname{Re}(z)=-5\)” muestra por qué la parte real no incluye el término imaginario ni su coeficiente
procedimiento:
- 'Paso 1: Ordena el número en forma \(a+bi\).'
- 'Paso 2: Localiza el término que no contiene \(i\).'
- 'Paso 3: Entrega su valor con signo y comprueba que sea un número real.'
ejemplos:
- titulo: Aplicación razonada — Identificación de la parte real de un número complejo
  enunciado: Si \(z=-5+8i\), entonces \(\operatorname{Re}(z)=-5\).
  solucion_pasos:
  - Ordena el número en forma \(a+bi\).
  - Localiza el término que no contiene \(i\).
  - Entrega su valor con signo y comprueba que sea un número real.
- titulo: Revisión de una solución — Identificación de la parte real de un número
    complejo
  enunciado: Una solución aplica “Localiza el término que no contiene \(i\).”, pero
    termina sin comprobar que la parte real no incluye el término imaginario ni su
    coeficiente. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de la parte real de un número
    complejo: en \(z=a+bi\), la parte real es \(\operatorname{Re}(z)=a\).'
  - Ordena el número en forma \(a+bi\).
  - 'Completa la revisión con este control: Entrega su valor con signo y comprueba
    que sea un número real.'
- titulo: ¿Se cumple que la parte real no incluye el término imaginario ni su coeficiente?
    — Identificación de la parte real de un número complejo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que en \(z=a+bi\), la parte real es \(\operatorname{Re}(z)=a\).
  - El caso “si \(z=-5+8i\), entonces \(\operatorname{Re}(z)=-5\)” satisface esa condición.
  - Entrega su valor con signo y comprueba que sea un número real.
- titulo: ¿Es válido omitir el paso “Ordena el número en forma \(a+bi\)”? — Identificación
    de la parte real de un número complejo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de la parte real
    de un número complejo.
  - 'Omitirlo puede volver inválida la acción siguiente: Localiza el término que no
    contiene \(i\).'
  - 'La solución debe terminar de este modo: Entrega su valor con signo y comprueba
    que sea un número real.'
errores_frecuentes:
- 'Confundir identificación de la parte real de un número complejo con otro concepto
  y omitir este inicio: Ordena el número en forma \(a+bi\).'
- Aplicar mecánicamente “Localiza el término que no contiene \(i\).” sin revisar las
  condiciones de la definición.
- Tomar “si \(z=-5+8i\), entonces \(\operatorname{Re}(z)=-5\)” como una igualdad aislada,
  sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la parte real no incluye el
  término imaginario ni su coeficiente”.
- 'Terminar el desarrollo sin realizar este control: Entrega su valor con signo y
  comprueba que sea un número real.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
