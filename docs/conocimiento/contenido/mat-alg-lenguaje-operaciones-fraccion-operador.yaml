semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.FRACCION_OPERADOR
objetivo: Traducir fracciones que actúan como operadores directos sobre variables
  o enunciados.
introduccion: ¿Qué ocurre si no quiero la cantidad entera, sino solo un pedazo proporcional
  de ella? Cuando operamos con partes o rebanadas de variables, las fracciones entran
  a dominar el juego.
resumen: Las expresiones como 'la mitad', 'la tercera parte' o 'los dos quintos' se
  traducen **multiplicando la fracción numérica por la variable**, o bien, colocando
  la variable directamente en el numerador.
explicacion: "Palabras clave:\n- La mitad de: $\\frac{1}{2}x$ o $\\frac{x}{2}$\n-\
  \ La tercera parte de: $\\frac{1}{3}y$ o $\\frac{y}{3}$\n- La cuarta parte de: $\\\
  frac{z}{4}$\n- Los dos tercios de: $\\frac{2}{3}x$ o $\\frac{2x}{3}$\n\nLa palabra\
  \ **DE** en matemáticas de proporciones significa **multiplicación**. \n'Los tres\
  \ cuartos DE un número' es $\\frac{3}{4} \\cdot x$. Que por regla de fracciones\
  \ se fusiona hermosamente en $\\frac{3x}{4}$."
procedimiento:
- 'Paso 1: Identifica la fracción mencionada en palabras (mitad = 1/2, tercio = 1/3,
  quintos = /5).'
- 'Paso 2: Identifica la variable objetivo (la cantidad de la que se está sacando
  la fracción).'
- 'Paso 3: Multiplica la fracción por la variable, lo que resulta en colocar el número
  superior multiplicando a la letra, y el número inferior dividiendo.'
ejemplos:
- titulo: Las tres quintas partes
  enunciado: 'Traduce algebraicamente: ''Las tres quintas partes del salario''.'
  solucion_pasos:
  - 'Fracción mencionada: 3/5.'
  - 'Variable: S (salario).'
  - La palabra 'del' implica multiplicar 3/5 por S.
  - 'Resultado final: (3S) / 5.'
errores_frecuentes:
- Traducir 'la mitad de un número' como $x - 2$. (La mitad implica dividir en 2, no
  restar 2).
- Escribir mal fracciones compuestas (ej. 'dos tercios de x' traducirlo como $\frac{x}{2/3}$
  en lugar de $\frac{2x}{3}$).
fuente: Álgebra de Baldor.
estado: publicado
