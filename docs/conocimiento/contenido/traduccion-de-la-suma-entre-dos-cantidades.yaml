semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.SUMA_CANTIDADES
titulo: Traducción de la suma entre dos cantidades
objetivo: Traducir la suma de dos o más cantidades desconocidas desde el lenguaje natural.
introduccion: ¿Cómo escribes matemáticamente que tienes manzanas y además naranjas, sin saber cuántas
  hay de cada una? Usas la suma algebraica.
resumen: La **Suma de Cantidades** en lenguaje algebraico se representa utilizando el signo de adición
  ($+$) entre variables distintas.
explicacion: '### Definición formal


  Al no especificar que los números son iguales, lo general (y por lo tanto lo matemáticamente riguroso)
  es tratarlos como variables independientes usando letras distintas.


  ### Desarrollo didáctico


  Palabras clave que indican suma:

  - Más

  - Sumado con

  - Añadido a

  - Agregado a

  - El total de

  - Excedido en


  Ejemplos de traducción:

  - ''La suma de dos números distintos'': $x + y$

  - ''Un número sumado a otro número diferente'': $a + b$

  - ''El total de la edad de Juan y la edad de María'': $J + M$


  *Nota vital:* Si el enunciado dice ''la suma de dos números'' (sin especificar si son iguales o distintos),
  por convención rigurosa asumimos que **son distintos** y usamos letras diferentes ($x+y$). Si fueran
  el mismo número, diría ''la suma de un número con sí mismo'' ($x+x$).'
procedimiento:
- 'Paso 1: Identifica las cantidades desconocidas en la frase.'
- 'Paso 2: Si el problema sugiere que las cantidades son (o pueden ser) diferentes, usa letras diferentes
  para cada una (x, y).'
- 'Paso 3: Une las letras con un signo más (+).'
ejemplos:
- titulo: Uniendo fuerzas
  enunciado: 'Traduce algebraicamente: ''El peso de un auto más el peso de una camioneta''.'
  solucion_pasos:
  - 'Peso del auto es una cantidad desconocida: a.'
  - 'Peso de la camioneta es otra cantidad desconocida: c.'
  - La palabra 'más' indica suma.
  - 'Traducción final: a + c.'
- titulo: Un contador modela las finanzas de una pequeña tienda. Las ventas del día de ayer fueron un
  enunciado: 'Un contador modela las finanzas de una pequeña tienda. Las ventas del día de ayer fueron
    un monto desconocido, y las ventas de hoy son un monto distinto y también desconocido. El banco le
    pide registrar la ''venta acumulada de ambos días''. ¿Cuál es la expresión algebraica exacta que representa
    ese requerimiento bancario? (v1)


    Opciones: A) $x + y$ · B) $2x$ · C) $xy$ · D) $x + 2$'
  solucion_pasos:
  - 'Ayer fue un monto ($x$). Hoy es un monto distinto ($y$). La venta acumulada (total) es la suma de
    ambos: $x + y$. No es $2x$ porque los montos no son necesariamente iguales.'
- titulo: 'Respecto de «Traducción de la suma entre dos cantidades»: ¿Se ajusta a la definición esta af'
  enunciado: 'Respecto de «Traducción de la suma entre dos cantidades»: ¿Se ajusta a la definición esta
    afirmación? «La **Suma de Cantidades** en lenguaje algebraico se representa utilizando el signo de
    adición ($+$) entre variables distintas»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Suma de Cantidades** en lenguaje algebraico
    se representa utilizando el signo de adición ($+$) entre variables distintas.'
- titulo: 'Respecto de «Traducción de la suma entre dos cantidades»: ¿Es compatible con el procedimient'
  enunciado: 'Respecto de «Traducción de la suma entre dos cantidades»: ¿Es compatible con el procedimiento
    esta afirmación? «Traducir ''la suma de dos números'' como $x+x$. (A menos que te digan que los números
    son idénticos, siempre asume que son diferentes: $x+y$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Suma de Cantidades** en lenguaje algebraico
    se representa utilizando el signo de adición ($+$) entre variables distintas.'
errores_frecuentes:
- 'Traducir ''la suma de dos números'' como $x+x$. (A menos que te digan que los números son idénticos,
  siempre asume que son diferentes: $x+y$).'
- Confundir 'la suma de' con 'un número más un número fijo', usando una constante en vez de dos variables.
- Asumir que son el mismo número y representarlos como $x + x$.
- Reemplazarlos por números al azar como $2 + 3$.
- Escribir siempre $xy$, porque los números en álgebra no se suman.
fuente: Álgebra de Baldor.
estado: publicado
