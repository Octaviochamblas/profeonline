semantic_id: MAT.GEO.CIRCULO_TEOREMAS.CUERDAS_SEGMENTOS
titulo: Identificación de segmentos determinados por cuerdas que se intersectan dentro de la circunferencia
objetivo: Identificar correctamente los cuatro segmentos que se forman cuando dos cuerdas de una circunferencia
  se intersectan en un punto interior.
introduccion: Cuando dos cuerdas de un círculo se cruzan, el punto de cruce divide a cada cuerda en dos
  segmentos, dando un total de cuatro segmentos por identificar.
resumen: 'Si dos cuerdas $AB$ y $CD$ se intersectan en un punto interior $P$, quedan determinados cuatro
  segmentos: $PA$, $PB$ (partes de la cuerda $AB$) y $PC$, $PD$ (partes de la cuerda $CD$).'
explicacion: '![Segmentos determinados por dos cuerdas](/static/img/geometria/circunferencia-circulo/circulo-teorema-cuerdas-segmentos.svg)


  ### Definición formal


  Si las cuerdas $AB$ y $CD$ de una circunferencia se cruzan en un punto interior $P$, cada cuerda queda
  dividida en dos segmentos por el punto $P$: la cuerda $AB$ en $PA$ y $PB$, y la cuerda $CD$ en $PC$
  y $PD$.


  ### Desarrollo didáctico


  En la figura, las cuerdas $AB$ y $CD$ se cruzan en el punto $P$. Los cuatro segmentos resultantes ($PA$,
  $PB$, $PC$, $PD$) son la base para aplicar el teorema de las cuerdas, que relaciona sus longitudes mediante
  un producto.'
procedimiento:
- 'Paso 1: Identifica las dos cuerdas que se intersectan y el punto de intersección P.'
- 'Paso 2: Reconoce los dos segmentos en los que P divide a la primera cuerda (PA y PB).'
- 'Paso 3: Reconoce los dos segmentos en los que P divide a la segunda cuerda (PC y PD).'
ejemplos:
- titulo: Identificar los segmentos de dos cuerdas que se cruzan
  enunciado: Las cuerdas AB y CD se cruzan en el punto P dentro de una circunferencia.
  solucion_pasos:
  - Los cuatro segmentos son PA, PB (de la cuerda AB) y PC, PD (de la cuerda CD).
- titulo: Reconocer qué segmentos pertenecen a la misma cuerda
  enunciado: P es el punto de cruce de las cuerdas AB y CD.
  solucion_pasos:
  - PA y PB pertenecen a la cuerda AB; PC y PD pertenecen a la cuerda CD.
- titulo: ¿El punto P siempre divide a cada cuerda en exactamente dos segmentos?
  respuesta: Sí
  solucion_pasos:
  - Sí, al ser un punto interior a ambas cuerdas, las divide en dos partes cada una.
- titulo: ¿PA y PC pertenecen a la misma cuerda?
  respuesta: 'No'
  solucion_pasos:
  - No, PA pertenece a la cuerda AB y PC a la cuerda CD; son cuerdas distintas.
errores_frecuentes:
- Confundir qué segmentos pertenecen a cada cuerda, mezclando partes de AB con partes de CD.
- Olvidar que el punto P genera cuatro segmentos en total (dos por cada cuerda), no solo dos.
- No identificar correctamente el punto de intersección P como el vértice común de los cuatro segmentos.
fuente: 'Elaboración propia (referencias: Moraleja 75, Cid 132).'
estado: publicado
