semantic_id: MAT.ALG.EC_CUADR_METODOS.SIMPLIFICACION_RADICAL
titulo: Simplificación de raíces obtenidas mediante la fórmula general
objetivo: Simplificar correctamente las raíces cuadradas y fracciones que resultan al aplicar la fórmula
  general.
introduccion: Después de sustituir en la fórmula general, casi siempre queda una expresión con raíz cuadrada
  y una fracción que todavía se puede reducir a una forma más simple.
resumen: Simplificar el resultado de la fórmula general implica extraer factores cuadrados perfectos de
  la raíz y reducir la fracción final por el máximo común divisor entre el numerador y el denominador.
explicacion: '### Definición formal


  Tras calcular $\Delta$ y obtener $\sqrt{\Delta}$, esta raíz debe simplificarse extrayendo el mayor factor
  cuadrado perfecto posible: si $\Delta=k^2 \cdot m$ con $m$ libre de cuadrados, entonces $\sqrt{\Delta}=k\sqrt{m}$.
  Finalmente, la fracción $\dfrac{-b\pm\sqrt{\Delta}}{2a}$ debe reducirse dividiendo todos sus términos
  por su máximo común divisor, si existe.


  ### Desarrollo didáctico


  Simplificar una raíz consiste en descomponer el número en factores, identificar el mayor cuadrado perfecto
  que lo divide, y extraer su raíz fuera del radical.


  Para $\Delta=72$: $72=36 \cdot 2$, y $36$ es cuadrado perfecto, por lo que $\sqrt{72}=6\sqrt{2}$.'
procedimiento:
- 'Paso 1: Descompón el valor del discriminante en factores, buscando el mayor cuadrado perfecto posible.'
- 'Paso 2: Extrae la raíz del factor cuadrado perfecto fuera del radical.'
- 'Paso 3: Reescribe la fracción completa con la raíz simplificada.'
- 'Paso 4: Reduce la fracción dividiendo numerador y denominador por su máximo común divisor, si corresponde.'
ejemplos:
- titulo: Simplificación de una raíz no perfecta
  enunciado: Simplifica $\sqrt{50}$.
  solucion_pasos:
  - $50=25 \cdot 2$, y $25$ es cuadrado perfecto.
  - $\sqrt{50}=5\sqrt{2}$.
- titulo: Simplificación de la fracción final
  enunciado: Simplifica $x=\dfrac{4\pm\sqrt{8}}{2}$.
  solucion_pasos:
  - $\sqrt{8}=2\sqrt{2}$.
  - $x=\dfrac{4\pm2\sqrt{2}}{2}=2\pm\sqrt{2}$, dividiendo todos los términos por 2.
- titulo: ¿Toda raíz cuadrada de un entero se puede simplificar?
  enunciado: ¿Toda raíz cuadrada de un entero se puede simplificar?
  respuesta: 'No'
  solucion_pasos:
  - Solo se puede simplificar si el número bajo la raíz tiene un factor cuadrado perfecto mayor que 1;
    de lo contrario ya está en su forma más simple.
- titulo: ¿Se puede simplificar una fracción dividiendo solo el numerador y dejando el denominador igual?
  enunciado: ¿Se puede simplificar una fracción dividiendo solo el numerador y dejando el denominador
    igual?
  respuesta: 'No'
  solucion_pasos:
  - Para que la fracción siga representando el mismo valor, se debe dividir tanto el numerador como el
    denominador por el mismo factor.
errores_frecuentes:
- Simplificar la raíz solo parcialmente, sin extraer el mayor cuadrado perfecto posible.
- Reducir la fracción dividiendo únicamente el término con la raíz y no también el término $-b$ y el denominador.
- Confundir $\sqrt{a}+\sqrt{b}$ con $\sqrt{a+b}$ al intentar simplificar una suma bajo la raíz.
- Olvidar simplificar la fracción final cuando todos sus términos comparten un divisor común.
