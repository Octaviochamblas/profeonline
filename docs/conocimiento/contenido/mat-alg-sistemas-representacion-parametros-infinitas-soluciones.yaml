titulo: Parámetros para Infinitas Soluciones
objetivo: Establecer la proporcionalidad total para obligar a que las rectas sean idénticas.
introduccion: Para que sean ecuaciones dependientes, TODO debe ser proporcional. La división de las 'x', la división
  de las 'y' y la división de los números sueltos deben dar exactamente el mismo resultado.
resumen: Si te piden encontrar el valor del parámetro escondido 'k' para que el sistema tenga **infinitas soluciones**,
  te están diciendo 'haz que la segunda ecuación sea un ecuación linealmente dependiente de la primera'.
explicacion: '### Definición formal


  Si te piden encontrar el valor del parámetro escondido ''k'' para que el sistema tenga **infinitas soluciones**,
  te están diciendo ''haz que la segunda ecuación sea un ecuación linealmente dependiente de la primera''.


  ### Desarrollo didáctico


  Para que sean ecuaciones dependientes, TODO debe ser proporcional. La división de las ''x'', la división de las
  ''y'' y la división de los números sueltos deben dar exactamente el mismo resultado.


  Regla estricta de clonación: $\frac{A_1}{A_2} = \frac{B_1}{B_2} = \frac{C_1}{C_2}$.

  Igualas las fracciones que contengan a tu ''k'' con la fracción de los números conocidos, resuelves, y habrás
  encontrado el valor maestro.'
procedimiento:
- 'Arma las tres fracciones usando los coeficientes de las dos ecuaciones: ''x'', ''y'' y números sueltos.'
- 'Plantea la igualdad triple: $\frac{A_1}{A_2} = \frac{B_1}{B_2} = \frac{C_1}{C_2}$.'
- Toma dos de las fracciones (una que contenga el parámetro y otra que tenga puros números) y resuélvelas con multiplicación
  cruzada.
