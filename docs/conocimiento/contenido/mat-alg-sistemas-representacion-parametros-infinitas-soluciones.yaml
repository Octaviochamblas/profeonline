semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.PARAMETROS_INFINITAS_SOLUCIONES
titulo: Parámetros para Infinitas Soluciones
objetivo: Establecer la proporcionalidad total para obligar a que las rectas sean idénticas.
explicacion: |
  Si te piden encontrar el valor del parámetro escondido 'k' para que el sistema tenga **infinitas soluciones**, te están diciendo 'haz que la segunda ecuación sea un clon perfecto de la primera'.

  Para que sean clones, TODO debe ser proporcional. La división de las 'x', la división de las 'y' y la división de los números sueltos deben dar exactamente el mismo resultado.

  Regla estricta de clonación: $\frac{A_1}{A_2} = \frac{B_1}{B_2} = \frac{C_1}{C_2}$.
  Igualas las fracciones que contengan a tu 'k' con la fracción de los números conocidos, resuelves, y habrás encontrado el valor maestro.
procedimiento: |
  1. Arma las tres fracciones usando los coeficientes de las dos ecuaciones: 'x', 'y' y números sueltos.
  2. Plantea la igualdad triple: $\frac{A_1}{A_2} = \frac{B_1}{B_2} = \frac{C_1}{C_2}$.
  3. Toma dos de las fracciones (una que contenga el parámetro y otra que tenga puros números) y resuélvelas con multiplicación cruzada.
