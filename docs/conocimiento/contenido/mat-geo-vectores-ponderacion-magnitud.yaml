semantic_id: MAT.GEO.VECTORES_OPERATORIA.PONDERACION_MAGNITUD
titulo: Efecto de la multiplicación escalar en la magnitud de un vector
objetivo: Reconocer que al multiplicar un vector por un escalar k, su módulo (magnitud) queda multiplicado
  por el valor absoluto de k.
introduccion: Al 'estirar' o 'encoger' un vector mediante un escalar, su longitud cambia proporcionalmente
  al valor absoluto de ese escalar.
resumen: Si un vector $\vec{v}$ se multiplica por un escalar $k$, el módulo del vector resultante es $|k\vec{v}|=|k|\times|\vec{v}|$.
explicacion: '![Efecto de la ponderación escalar en la magnitud](/static/img/geometria/cartesiano-vectores/vectores-ponderacion-magnitud.svg)


  ### Definición formal


  Para cualquier vector $\vec{v}$ y escalar $k$, se cumple $|k\vec{v}|=|k|\times|\vec{v}|$: el módulo
  del vector escalado es el valor absoluto del escalar multiplicado por el módulo original.


  ### Desarrollo didáctico


  Si $|\vec{v}|=1{,}8$ y se multiplica por $k=3$, el nuevo módulo es $|3\vec{v}|=3\times1{,}8=5{,}4$:
  exactamente el triple del módulo original, sin importar la dirección del vector.'
procedimiento:
- 'Paso 1: Calcula el módulo del vector original |v|.'
- 'Paso 2: Toma el valor absoluto del escalar k, es decir, |k|.'
- 'Paso 3: Multiplica |k| por |v| para obtener el módulo del vector escalado: |kv|=|k|×|v|.'
ejemplos:
- titulo: Calcular el módulo de un vector escalado
  enunciado: '|v|=5 y se multiplica por k=4.'
  solucion_pasos:
  - '|4v|=|4|×5=20.'
- titulo: Calcular el módulo con un escalar negativo
  enunciado: '|v|=6 y se multiplica por k=-3.'
  solucion_pasos:
  - '|-3v|=|-3|×6=18 (el módulo siempre es positivo, sin importar el signo de k).'
- titulo: ¿El módulo del vector escalado depende del valor absoluto del escalar?
  respuesta: Sí
  solucion_pasos:
  - Sí, se usa |k|, no k directamente, ya que el módulo nunca puede ser negativo.
- titulo: ¿Multiplicar por un escalar entre 0 y 1 aumenta el módulo del vector?
  respuesta: 'No'
  solucion_pasos:
  - No, al multiplicar por un escalar con valor absoluto menor a 1, el módulo del vector disminuye (se
    'encoge').
errores_frecuentes:
- Usar el escalar k directamente (sin valor absoluto) para calcular el nuevo módulo, obteniendo resultados
  negativos incorrectos.
- Confundir el efecto en el módulo con el efecto en el sentido del vector.
- Creer que cualquier escalar aumenta necesariamente el módulo del vector.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 123).'
estado: publicado
