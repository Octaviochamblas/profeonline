semantic_id: MAT.GEO.ANGULOS_FUNDAMENTOS.ELEMENTO_LADOS
titulo: Identificación de los lados de un ángulo como rayos
objetivo: Reconocer cuáles rayos actúan como lados de un ángulo y comprobar que cada lado conserva el
  vértice como punto inicial y se prolonga en una sola dirección.
introduccion: Un ángulo no está hecho de bordes cerrados como una caja. Está formado por dos semirrectas
  que arrancan juntas y luego se abren. Aquí lo trabajaremos con ejemplos concretos y verificaciones cortas.
resumen: Los lados de un ángulo son los rayos que parten del vértice. Como idea de control, cada lado
  conserva el vértice como punto inicial y se prolonga en una sola dirección.
explicacion: 'Los lados de un ángulo son los rayos que parten del vértice.


  La situación “si el vértice es \(O\), los lados del ángulo pueden ser los rayos \(OA\) y \(OB\)” muestra
  cómo pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se
  verifica que cada lado conserva el vértice como punto inicial y se prolonga en una sola dirección.'
procedimiento:
- 'Paso 1: Localiza primero el vértice común del ángulo.'
- 'Paso 2: Determina qué dos rayos salen desde ese punto y delimitan la abertura.'
- 'Paso 3: Comprueba que ambos lados compartan origen pero no dirección completa.'
ejemplos:
- titulo: Situación geométrica — Lados del ángulo
  enunciado: Si el vértice es \(O\), los lados del ángulo pueden ser los rayos \(OA\) y \(OB\).
  solucion_pasos:
  - Localiza primero el vértice común del ángulo.
  - Determina qué dos rayos salen desde ese punto y delimitan la abertura.
  - Comprueba que ambos lados compartan origen pero no dirección completa.
- titulo: Chequeo del procedimiento — Lados del ángulo
  enunciado: Al resolver “si el vértice es \(O\), los lados del ángulo pueden ser los rayos \(OA\) y \(OB\)”,
    una alumna salta desde el dibujo a la conclusión. Indica qué control geométrico faltó y cómo cerrar
    la solución.
  solucion_pasos:
  - 'Parte de la definición: los lados de un ángulo son los rayos que parten del vértice.'
  - Determina qué dos rayos salen desde ese punto y delimitan la abertura.
  - Comprueba que ambos lados compartan origen pero no dirección completa.
- titulo: ¿La interpretación del dibujo es válida? — Lados del ángulo
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: los lados de un ángulo son los rayos que parten
    del vértice.'
  - En el caso “si el vértice es \(O\), los lados del ángulo pueden ser los rayos \(OA\) y \(OB\)” se
    observa que cada lado conserva el vértice como punto inicial y se prolonga en una sola dirección.
  - Comprueba que ambos lados compartan origen pero no dirección completa.
- titulo: ¿Basta con localiza primero el vértice común del ángulo? — Lados del ángulo
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de identificación de los lados de un ángulo
    como rayos.
  - Después del paso “Localiza primero el vértice común del ángulo.” todavía hace falta revisar “Determina
    qué dos rayos salen desde ese punto y delimitan la abertura.”.
  - El cierre correcto exige “Comprueba que ambos lados compartan origen pero no dirección completa.”.
errores_frecuentes:
- Lados del ángulo significa dos rectas completas que se cruzan sin distinguir el origen común.
- Para resolver lados del ángulo, basta con el paso “Localiza primero el vértice común del ángulo.” y
  no hace falta revisar “Determina qué dos rayos salen desde ese punto y delimitan la abertura.”.
- Si el dibujo parece claro, se puede ignorar que cada lado conserva el vértice como punto inicial y se
  prolonga en una sola dirección.
- Dos configuraciones distintas representan lados del ángulo solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que ambos lados compartan origen
  pero no dirección completa.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
