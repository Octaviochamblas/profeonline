semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.POLIGONOS_ANGULOS_CONGRUENTES
titulo: Congruencia de ángulos correspondientes en polígonos semejantes
objetivo: Reconocer que en polígonos semejantes, todos los ángulos correspondientes son exactamente iguales
  (congruentes) entre sí.
introduccion: 'Una de las dos condiciones que definen la semejanza de polígonos merece atención especial:
  la igualdad exacta de todos los ángulos correspondientes.'
resumen: En dos polígonos semejantes, cada ángulo interior de uno es exactamente igual (congruente) al
  ángulo interior correspondiente del otro.
explicacion: '![Ángulos congruentes en polígonos semejantes](/static/img/geometria/congruencia-semejanza/semejanza-poligonos-angulos-congruentes.svg)


  ### Definición formal


  Si los polígonos $P_1P_2...P_n$ y $P_1''P_2''...P_n''$ son semejantes, entonces $\angle P_i=\angle P_i''$
  para cada $i$ de 1 a $n$.


  ### Desarrollo didáctico


  Esta igualdad de ángulos es la que garantiza que la "forma" se mantenga: si cambiaran los ángulos, la
  figura se distorsionaría y ya no sería una simple ampliación o reducción de la original.'
procedimiento:
- 'Paso 1: Identifica los ángulos correspondientes entre los dos polígonos semejantes.'
- 'Paso 2: Verifica que cada par de ángulos correspondientes sea exactamente igual.'
- 'Paso 3: Si todos los pares de ángulos coinciden, se cumple esta condición de la semejanza.'
ejemplos:
- titulo: Verificar ángulos congruentes en pentágonos semejantes
  enunciado: Dos pentágonos semejantes tienen un ángulo de 108° cada uno en el vértice correspondiente.
  solucion_pasos:
  - Esos ángulos correspondientes son congruentes, cumpliendo la condición de semejanza.
- titulo: Detectar un ángulo que no coincide
  enunciado: En dos hexágonos, un ángulo correspondiente mide 120° en uno y 110° en el otro.
  solucion_pasos:
  - Esos hexágonos no son semejantes, ya que ese par de ángulos correspondientes no es igual.
- titulo: ¿Es necesario que TODOS los ángulos correspondientes sean iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con que un solo par de ángulos correspondientes difiera para que los polígonos no sean semejantes.
- titulo: ¿La igualdad de ángulos por sí sola garantiza semejanza en polígonos de más de 3 lados?
  respuesta: 'No'
  solucion_pasos:
  - No, también se requiere que los lados correspondientes sean proporcionales.
errores_frecuentes:
- Verificar solo algunos ángulos y asumir que los demás también coinciden sin comprobarlo.
- Confundir ángulos correspondientes con ángulos adyacentes dentro de un mismo polígono.
- Creer que la igualdad de ángulos por sí sola es suficiente para garantizar semejanza en polígonos de
  más de tres lados.
fuente: Elaboración propia.
estado: publicado
