semantic_id: MAT.NUM.LOGARITMOS_PROPIEDADES.CAMBIO_BASE
titulo: Cambio de base de un logaritmo
objetivo: Calcular un logaritmo mediante otra base.
introduccion: Una calculadora suele ofrecer solo \(\log\) y \(\ln\), pero el cambio de base reconstruye
  cualquier otra escala a partir de ellas.
resumen: \(\log_b a=\frac{\log_c a}{\log_c b}\) para bases válidas. El cociente permite calcular cualquier
  base usando una base disponible en la calculadora.
explicacion: '\(\log_b a=\frac{\log_c a}{\log_c b}\) para bases válidas.


  Al analizar “\(\log_2 7=\ln7/\ln2\)” conviene observar la conexión siguiente: el cociente permite calcular
  cualquier base usando una base disponible en la calculadora'
procedimiento:
- 'Paso 1: Elige una nueva base válida y úsala en numerador y denominador.'
- 'Paso 2: Coloca el argumento original arriba y la base original abajo.'
- 'Paso 3: Evalúa el cociente y verifica elevando la base original al resultado aproximado.'
ejemplos:
- titulo: Aplicación razonada — Cambio de base de un logaritmo
  enunciado: \(\log_2 7=\ln7/\ln2\).
  solucion_pasos:
  - Elige una nueva base válida y úsala en numerador y denominador.
  - Coloca el argumento original arriba y la base original abajo.
  - Evalúa el cociente y verifica elevando la base original al resultado aproximado.
- titulo: Revisión de una solución — Cambio de base de un logaritmo
  enunciado: Una solución aplica “Coloca el argumento original arriba y la base original abajo.”, pero
    termina sin comprobar que el cociente permite calcular cualquier base usando una base disponible en
    la calculadora. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define cambio de base de un logaritmo: \(\log_b a=\frac{\log_c a}{\log_c
    b}\) para bases válidas.'
  - Elige una nueva base válida y úsala en numerador y denominador.
  - 'Completa la revisión con este control: Evalúa el cociente y verifica elevando la base original al
    resultado aproximado.'
- titulo: ¿Se cumple que el cociente permite calcular cualquier base usando una base disponible en la
    calculadora? — Cambio de base de un logaritmo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\log_b a=\frac{\log_c a}{\log_c b}\) para bases válidas.
  - El caso “\(\log_2 7=\ln7/\ln2\)” satisface esa condición.
  - Evalúa el cociente y verifica elevando la base original al resultado aproximado.
- titulo: ¿Es válido omitir el paso “Elige una nueva base válida y úsala en numerador y denominador”?
    — Cambio de base de un logaritmo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de cambio de base de un logaritmo.
  - 'Omitirlo puede volver inválida la acción siguiente: Coloca el argumento original arriba y la base
    original abajo.'
  - 'La solución debe terminar de este modo: Evalúa el cociente y verifica elevando la base original al
    resultado aproximado.'
errores_frecuentes:
- 'Confundir cambio de base de un logaritmo con otro concepto y omitir este inicio: Elige una nueva base
  válida y úsala en numerador y denominador.'
- Aplicar mecánicamente “Coloca el argumento original arriba y la base original abajo.” sin revisar las
  condiciones de la definición.
- Tomar “\(\log_2 7=\ln7/\ln2\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el cociente permite calcular cualquier base usando
  una base disponible en la calculadora”.
- 'Terminar el desarrollo sin realizar este control: Evalúa el cociente y verifica elevando la base original
  al resultado aproximado.'
