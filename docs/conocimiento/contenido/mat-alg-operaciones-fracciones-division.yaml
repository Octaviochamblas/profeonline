semantic_id: 'MAT.ALG.OPERACIONES_FRACCIONES.DIVISION'
titulo: 'División de Fracciones Algebraicas'
objetivo: 'Dividir fracciones algebraicas convirtiéndolas en una multiplicación por el inverso multiplicativo.'
introduccion: |
  A nadie le gusta dividir fracciones. ¡La buena noticia es que no tienes que hacerlo! Toda división de fracciones se puede transformar mágicamente en una multiplicación simplemente dándole la vuelta a la segunda fracción.
resumen: |
  Para dividir dos fracciones algebraicas, mantén la primera fracción igual, cambia el signo de división a multiplicación ($\cdot$) y VUELCA (invierte) la segunda fracción. Luego resuelve como una multiplicación normal.
explicacion: |
  La regla universal es: $\frac{A}{B} \div \frac{C}{D} = \frac{A}{B} \cdot \frac{D}{C}$.

  Ejemplo: $\frac{x}{y} \div \frac{2x}{5y^2}$

  1. **Volteamos y cambiamos:**
     $\frac{x}{y} \cdot \frac{5y^2}{2x}$

  2. **Ahora es un problema de multiplicación.**
     Multiplicamos cruzado y simplificamos:
     - La 'x' de arriba en la primera se va con la 'x' de abajo en la segunda.
     - La '$y^2$' arriba se cancela con la 'y' abajo, dejando una 'y' arriba.

  3. **Sobrevivientes:**
     Arriba queda 1 (de la x) por $5y$, o sea $5y$.
     Abajo queda 1 (de la y) por 2, o sea $2$.

  Resultado final: $\frac{5y}{2}$.

  *Nota:* Jamás inviertas la primera fracción, siempre es la que está después del símbolo de división.
procedimiento:
  - 'Paso 1: Escribe la primera fracción exactamente igual.'
  - 'Paso 2: Cambia el símbolo de división ( $\div$ ) por uno de multiplicación ( $\cdot$ ).'
  - 'Paso 3: Invierte la fracción que estaba a la derecha del signo de división (el numerador pasa a ser denominador y viceversa).'
  - 'Paso 4: Resuelve el ejercicio usando las reglas de la multiplicación (factoriza y simplifica cruzado).'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Divide $\frac{x^2 - 9}{2x} \div \frac{x-3}{4x^2}$.'
    solucion_pasos:
    - 'Invertimos: $\frac{x^2 - 9}{2x} \cdot \frac{4x^2}{x-3}$.'
    - 'Factorizamos: $\frac{(x-3)(x+3)}{2x} \cdot \frac{4x^2}{x-3}$.'
    - 'Tachamos $(x-3)$ cruzado.'
    - 'Tachamos $2x$ abajo con $4x^2$ arriba, dejando $2x$ arriba.'
    - 'Resultado: $(x+3) \cdot 2x = 2x^2 + 6x$.'
  - titulo: 'Resuelve $\frac{a}{b} \div \frac{a}{b}$.'
    respuesta: '1'
    solucion_pasos:
    - 'Al invertir queda (a/b) * (b/a). Se cancela todo, resultado 1. Todo número (salvo 0) dividido por sí mismo es 1.'
errores_frecuentes:
  - 'Invertir la primera fracción en lugar de la segunda.'
  - 'Invertir ambas fracciones.'
  - 'Olvidar cambiar el signo de división a multiplicación después de invertir la fracción.'
estado: publicado
