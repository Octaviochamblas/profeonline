semantic_id: 'MAT.ALG.FRACCIONES_BASE.DEFINICION_FRACCION'
titulo: 'Definición de Fracción Algebraica'
objetivo: 'Comprender qué es una fracción algebraica y sus partes constituyentes.'
introduccion: |
  Las fracciones no son solo para números enteros. En álgebra, dividimos polinomios enteros entre otros polinomios, creando fracciones algebraicas. Funcionan casi igual que las numéricas, pero con letras.
resumen: |
  Una fracción algebraica es el cociente de dos expresiones algebraicas (generalmente polinomios), donde el denominador debe ser distinto de cero.
explicacion: |
  Una fracción algebraica tiene la forma $\frac{P(x)}{Q(x)}$.
  - El polinomio superior, $P(x)$, se llama **numerador**.
  - El polinomio inferior, $Q(x)$, se llama **denominador**.

  Es idéntico a una fracción aritmética como $\frac{3}{4}$, solo que ahora podemos tener cosas como $\frac{x^2 - 1}{x + 3}$. La principal diferencia es que al contener variables, su valor cambia dependiendo del número que reemplacemos en las letras.
procedimiento:
  - 'Paso 1: Identifica la expresión que se encuentra sobre la línea divisoria como el numerador.'
  - 'Paso 2: Identifica la expresión debajo de la línea como el denominador.'
  - 'Paso 3: Recuerda que la línea central representa la operación de división.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Conceptualmente, identifica numerador y denominador de $\frac{2a+b}{3a^2}$.'
    solucion_pasos:
    - 'Numerador (parte de arriba): $2a+b$.'
    - 'Denominador (parte de abajo): $3a^2$.'
    - 'Es el cociente de un binomio dividido por un monomio.'
  - titulo: '¿Es $\frac{x}{5}$ una fracción algebraica?'
    respuesta: 'Sí'
    solucion_pasos:
    - 'Cualquier cociente de expresiones algebraicas es una fracción algebraica, incluso si el denominador es solo un número.'
errores_frecuentes:
  - 'Confundir numerador con denominador.'
  - 'Creer que una fracción sin variables en el denominador (como $x/2$) no es algebraica. Sí lo es, pero también se puede escribir como un polinomio regular (1/2)*x.'
estado: publicado
