semantic_id: MAT.ALG.SIMILARIDAD.IGUALDAD_EXPONENTES
objetivo: Distinguir términos algebraicos en función del grado (exponentes) de sus variables.
introduccion: Tener la misma letra no es suficiente. Un cuadrado no es lo mismo que una línea, aunque ambos estén
  hechos de tinta. $x$ representa una longitud, mientras que $x^2$ representa un área. No puedes sumar metros con
  metros cuadrados.
resumen: Para que exista semejanza, es obligatoria la **Igualdad de Exponentes**. Cada letra en el primer término
  debe tener exactamente el mismo exponente sobre ella que la misma letra en el segundo término.
explicacion: '### Definición formal


  La igualdad de exponentes es letra por letra. $x^2$ no es lo mismo que $x^1$.


  ### Desarrollo didáctico


  Analicemos $5x^2$ y $5x^3$.

  Ambos tienen el coeficiente 5. Ambos tienen la letra ''x''.

  Pero el primero está al cuadrado (exponente 2) y el segundo al cubo (exponente 3).

  Como los exponentes son distintos, **NO son semejantes**.


  Es el error más común en álgebra sumar $x^2 + x^3$ y decir que es $x^5$ o $2x^5$. Esto es falso. Son especies
  distintas. La expresión $x^2 + x^3$ no se puede reducir mediante sumas.'
procedimiento:
- 'Paso 1: Verifica que las letras sean iguales.'
- 'Paso 2: Compara el exponente de la primera letra en ambos términos. Si difieren, descarta la semejanza.'
- 'Paso 3: Repite el proceso para cada una de las letras presentes.'
- La igualdad de exponentes es letra por letra. $x^2$ no es lo mismo que $x^1$.
ejemplos:
- titulo: Metros contra áreas
  enunciado: ¿Son semejantes 2a y 3a^2?
  solucion_pasos:
  - La letra en ambos es 'a'.
  - En 2a, la 'a' tiene exponente imaginario 1.
  - En 3a^2, la 'a' tiene exponente 2.
  - Como 1 no es igual a 2, no son semejantes.
- titulo: Un arquitecto modela el costo de unos terrenos usando la expresión $C = 5x^2 + 10x$, donde $
  enunciado: 'Un arquitecto modela el costo de unos terrenos usando la expresión $C = 5x^2 + 10x$, donde $x^2$ representa
    el área y $x$ el perímetro frontal. Un pasante intenta simplificar la fórmula sumando los términos, obteniendo
    $C = 15x^3$. ¿Qué error fundamental cometió el pasante? (v1)


    Opciones: A) Sumó los coeficientes de términos que no son semejantes (distinto exponente) e inventó un nuevo
    exponente. · B) Multiplicó los términos en lugar de sumarlos. · C) Olvidó sumar los coeficientes, el resultado
    debía ser $50x^3$. · D) El cálculo del pasante es matemáticamente correcto.'
  solucion_pasos:
  - $x^2$ (área) y $x$ (longitud) no son semejantes. Es como sumar metros cuadrados con metros lineales. La expresión
    $5x^2 + 10x$ es irreducible.
  - 'Respuesta: Sumó los coeficientes de términos que no son semejantes (distinto exponente) e inventó un nuevo
    exponente.'
- titulo: 'Respecto de «Identificación por igualdad de exponentes»: ¿La siguiente formulación es correc'
  enunciado: 'Respecto de «Identificación por igualdad de exponentes»: ¿La siguiente formulación es correcta? «Para
    que exista semejanza, es obligatoria la **Igualdad de Exponentes**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para que exista semejanza, es obligatoria la **Igualdad de
    Exponentes**.'
- titulo: 'Respecto de «Identificación por igualdad de exponentes»: ¿La siguiente conclusión es correct'
  enunciado: 'Respecto de «Identificación por igualdad de exponentes»: ¿La siguiente conclusión es correcta? «Sumar
    coeficientes ignorando que los exponentes son distintos (ej. $3x^2 + 4x = 7x^3$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para que exista semejanza, es obligatoria la **Igualdad de
    Exponentes**.'
errores_frecuentes:
- Sumar coeficientes ignorando que los exponentes son distintos (ej. $3x^2 + 4x = 7x^3$).
- Creer que si la suma de los exponentes totales (el grado del término) es igual, son semejantes (ej. pensar que
  $x^2y$ es semejante a $xy^2$).
- Para «¿Por qué los términos $4x^2y$ y $4xy^2$ NO son semejantes, a pesar de tener el mismo coeficiente, las mismas
  letras y la misma suma total de exponentes (grado 3)? (v1)», la respuesta correcta es Porque la $y$ siempre debe
  ir antes que la $x$.
- Porque un término no puede tener exponente 1 imaginario.
- Porque los coeficientes deberían ser distintos para compensar los exponentes.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Identificación por igualdad de exponentes
