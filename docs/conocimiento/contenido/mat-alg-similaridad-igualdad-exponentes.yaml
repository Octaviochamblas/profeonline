semantic_id: MAT.ALG.SIMILARIDAD.IGUALDAD_EXPONENTES
objetivo: Distinguir términos algebraicos en función del grado (exponentes) de sus
  variables.
introduccion: Tener la misma letra no es suficiente. Un cuadrado no es lo mismo que
  una línea, aunque ambos estén hechos de tinta. $x$ representa una longitud, mientras
  que $x^2$ representa un área. ¡No puedes sumar metros con metros cuadrados!
resumen: Para que exista semejanza, es obligatoria la **Igualdad de Exponentes**.
  Cada letra en el primer término debe tener exactamente el mismo exponente sobre
  ella que la misma letra en el segundo término.
explicacion: 'Analicemos $5x^2$ y $5x^3$.

  Ambos tienen el coeficiente 5. Ambos tienen la letra ''x''.

  Pero el primero está al cuadrado (exponente 2) y el segundo al cubo (exponente 3).

  Como los exponentes son distintos, **NO son semejantes**.


  Es el error más común en álgebra sumar $x^2 + x^3$ y decir que es $x^5$ o $2x^5$.
  Esto es falso. Son especies distintas. La expresión $x^2 + x^3$ no se puede reducir
  mediante sumas.'
procedimiento:
- 'Paso 1: Verifica que las letras sean iguales.'
- 'Paso 2: Compara el exponente de la primera letra en ambos términos. Si difieren,
  descarta la semejanza.'
- 'Paso 3: Repite el proceso para cada una de las letras presentes.'
ejemplos:
- titulo: Metros contra áreas
  enunciado: ¿Son semejantes 2a y 3a^2?
  solucion_pasos:
  - La letra en ambos es 'a'.
  - En 2a, la 'a' tiene exponente imaginario 1.
  - En 3a^2, la 'a' tiene exponente 2.
  - Como 1 no es igual a 2, no son semejantes.
errores_frecuentes:
- Sumar coeficientes ignorando que los exponentes son distintos (ej. $3x^2 + 4x =
  7x^3$).
- Creer que si la suma de los exponentes totales (el grado del término) es igual,
  son semejantes (ej. pensar que $x^2y$ es semejante a $xy^2$).
fuente: Álgebra de Baldor.
estado: publicado
