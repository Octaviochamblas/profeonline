semantic_id: MAT.EST.CONTEO_BASE.CONTEO_RESTRICCIONES
titulo: Conteo de casos con restricciones simples
objetivo: Aplicar los principios de conteo a situaciones con restricciones simples, como una posición
  fija o una condición particular que limita las opciones.
introduccion: Muchos problemas de conteo incluyen condiciones adicionales (por ejemplo, 'una persona debe
  ir siempre primera'), que reducen el número de opciones a considerar en alguna etapa.
resumen: Para contar casos con restricciones, se separa el elemento restringido (asignándole su posición
  fija u opción limitada) y se aplican los principios de conteo normales al resto de los elementos.
explicacion: '![Conteo con restricciones simples](/static/img/probabilidad/conteobase/conteobase-conteo-restricciones.svg)


  ### Definición formal


  Si un elemento tiene una posición fija entre $n$ elementos totales, el conteo de las posiciones restantes
  se realiza sobre los $n-1$ elementos libres, aplicando el principio correspondiente (por ejemplo, permutaciones).


  ### Desarrollo didáctico


  Si 3 personas (A, B, C) forman una fila, y A debe ir siempre primero, entonces solo quedan por ordenar
  B y C en las dos posiciones restantes: $2!=2$ formas posibles (ABC, ACB).'
procedimiento:
- 'Paso 1: Identifica la restricción específica del problema (posición fija, condición particular).'
- 'Paso 2: Fija esa restricción como un hecho dado, sin contarla como una opción adicional.'
- 'Paso 3: Aplica los principios de conteo normales (aditivo o multiplicativo) al resto de los elementos
  no restringidos.'
ejemplos:
- titulo: Contar filas con una persona en posición fija
  enunciado: 3 personas (A,B,C), A siempre primero.
  solucion_pasos:
  - 'Quedan 2 personas para 2 posiciones: 2!=2 formas (ABC, ACB).'
- titulo: Contar contraseñas con una restricción de dígito inicial
  enunciado: 'Contraseña de 3 dígitos, el primero debe ser impar (5 opciones: 1,3,5,7,9), los otros dos
    sin restricción (10 opciones cada uno).'
  solucion_pasos:
  - 5×10×10=500 contraseñas posibles.
- titulo: ¿Una restricción reduce el número de opciones en la etapa afectada?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el efecto directo de aplicar una restricción al conteo.
- titulo: ¿Se puede aplicar el principio multiplicativo normalmente a las etapas no restringidas?
  respuesta: Sí
  solucion_pasos:
  - Sí, una vez fijada la restricción, el resto del conteo sigue las reglas habituales.
errores_frecuentes:
- Contar la posición restringida como si tuviera múltiples opciones, cuando en realidad está fija.
- Olvidar reducir el número de elementos disponibles para las posiciones restantes tras fijar la restricción.
- Aplicar el principio incorrecto (aditivo en vez de multiplicativo) al resto de las posiciones no restringidas.
fuente: Elaboración propia.
estado: publicado
