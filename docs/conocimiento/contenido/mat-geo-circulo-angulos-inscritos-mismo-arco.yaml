semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULOS_INSCRITOS_MISMO_ARCO
titulo: Igualdad de ángulos inscritos que subtienden el mismo arco
objetivo: Reconocer y aplicar que todos los ángulos inscritos que subtienden un mismo arco tienen la misma
  medida.
introduccion: Si varios observadores ubicados en distintos puntos de una circunferencia miran el mismo
  arco, todos ven ese arco bajo el mismo ángulo.
resumen: Dos o más ángulos inscritos que subtienden el mismo arco (o arcos de igual medida) son congruentes
  entre sí.
explicacion: '![Ángulos inscritos que subtienden el mismo arco son iguales](/static/img/geometria/circunferencia-circulo/circulo-angulos-inscritos-mismo-arco.svg)


  ### Definición formal


  Si $\angle AC_1B$ y $\angle AC_2B$ son ángulos inscritos que subtienden el mismo arco $AB$ (con $C_1$
  y $C_2$ puntos distintos de la circunferencia, ambos fuera del arco $AB$), entonces $m(\angle AC_1B)=m(\angle
  AC_2B)$.


  ### Desarrollo didáctico


  Esto se debe a que ambos ángulos inscritos miden la mitad del mismo arco $AB$: si el arco $AB$ mide
  80°, entonces tanto $\angle AC_1B$ como $\angle AC_2B$ miden $\frac{80°}{2}=40°$, sin importar la posición
  exacta de $C_1$ o $C_2$ sobre el arco mayor.'
procedimiento:
- 'Paso 1: Verifica que los ángulos inscritos compartan el mismo arco subtendido (el arco que no contiene
  a ninguno de los vértices).'
- 'Paso 2: Aplica que ambos ángulos miden la mitad de ese mismo arco.'
- 'Paso 3: Concluye que ambos ángulos inscritos son iguales entre sí, sin importar la posición de sus
  vértices.'
ejemplos:
- titulo: Comparar dos ángulos inscritos que subtienden el mismo arco
  enunciado: ∠AC₁B y ∠AC₂B subtienden el mismo arco AB, que mide 80°.
  solucion_pasos:
  - Ambos ángulos miden 80°/2=40°, por lo tanto ∠AC₁B = ∠AC₂B = 40°.
- titulo: Calcular un ángulo inscrito desconocido usando esta igualdad
  enunciado: ∠AC₁B mide 55° y ∠AC₂B subtiende el mismo arco AB.
  solucion_pasos:
  - Como ambos subtienden el mismo arco, ∠AC₂B también mide 55°.
- titulo: ¿La posición exacta de C₁ y C₂ sobre el arco mayor afecta la medida del ángulo inscrito?
  respuesta: 'No'
  solucion_pasos:
  - No, mientras ambos estén sobre el mismo arco mayor (fuera del arco AB subtendido), el ángulo medirá
    lo mismo.
- titulo: ¿Esta igualdad requiere que ambos vértices estén en el mismo arco (mayor o menor)?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos vértices deben estar del mismo lado (en el mismo arco) para subtender el mismo arco AB.
errores_frecuentes:
- Comparar ángulos inscritos cuyos vértices están en arcos distintos (uno en el arco mayor y otro en el
  menor), que en realidad no son iguales sino suplementarios.
- Creer que la posición exacta del vértice sobre el arco cambia la medida del ángulo inscrito.
- Olvidar verificar que ambos ángulos efectivamente subtiendan el mismo arco antes de igualarlos.
fuente: Elaboración propia (sin fuente específica).
estado: publicado
