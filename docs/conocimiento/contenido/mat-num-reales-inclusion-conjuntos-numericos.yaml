semantic_id: MAT.NUM.REALES.INCLUSION_CONJUNTOS_NUMERICOS
objetivo: Ubicar un número en la cadena de inclusión más precisa.
introduccion: Clasificar un número no significa elegir una sola etiqueta. Un natural
  también es entero, racional y real; la jerarquía permite registrar toda esa información
  sin contradicción.
resumen: Los conjuntos numéricos cumplen \(\mathbb{N}\subset\mathbb{Z}\subset\mathbb{Q}\subset\mathbb{R}\).
  Pertenecer a un conjunto pequeño implica pertenecer a todos los conjuntos que lo
  contienen.
explicacion: |-
  Los conjuntos numéricos cumplen \(\mathbb{N}\subset\mathbb{Z}\subset\mathbb{Q}\subset\mathbb{R}\).

  Al analizar “\(-4\) es entero, racional porque \(-4=-4/1\), y también real” conviene observar la conexión siguiente: pertenecer a un conjunto pequeño implica pertenecer a todos los conjuntos que lo contienen
procedimiento:
- 'Paso 1: Identifica el conjunto más pequeño al que pertenece el número.'
- 'Paso 2: Recorre hacia afuera la cadena de inclusiones sin saltar relaciones.'
- 'Paso 3: Distingue pertenencia \(\in\) de inclusión \(\subset\) al escribir la conclusión.'
ejemplos:
- titulo: Aplicación razonada — Inclusión de conjuntos numéricos en los reales
  enunciado: \(-4\) es entero, racional porque \(-4=-4/1\), y también real.
  solucion_pasos:
  - Identifica el conjunto más pequeño al que pertenece el número.
  - Recorre hacia afuera la cadena de inclusiones sin saltar relaciones.
  - Distingue pertenencia \(\in\) de inclusión \(\subset\) al escribir la conclusión.
- titulo: Revisión de una solución — Inclusión de conjuntos numéricos en los reales
  enunciado: Una solución aplica “Recorre hacia afuera la cadena de inclusiones sin
    saltar relaciones.”, pero termina sin comprobar que pertenecer a un conjunto pequeño
    implica pertenecer a todos los conjuntos que lo contienen. Determina qué falta
    justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define inclusión de conjuntos numéricos en los reales:
    los conjuntos numéricos cumplen \(\mathbb{N}\subset\mathbb{Z}\subset\mathbb{Q}\subset\mathbb{R}\).'
  - Identifica el conjunto más pequeño al que pertenece el número.
  - 'Completa la revisión con este control: Distingue pertenencia \(\in\) de inclusión
    \(\subset\) al escribir la conclusión.'
- titulo: ¿Se cumple que pertenecer a un conjunto pequeño implica pertenecer a todos
    los conjuntos que lo contienen? — Inclusión de conjuntos numéricos en los reales
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que los conjuntos numéricos cumplen \(\mathbb{N}\subset\mathbb{Z}\subset\mathbb{Q}\subset\mathbb{R}\).
  - El caso “\(-4\) es entero, racional porque \(-4=-4/1\), y también real” satisface
    esa condición.
  - Distingue pertenencia \(\in\) de inclusión \(\subset\) al escribir la conclusión.
- titulo: ¿Es válido omitir el paso “Identifica el conjunto más pequeño al que pertenece
    el número”? — Inclusión de conjuntos numéricos en los reales
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de inclusión de conjuntos numéricos
    en los reales.
  - 'Omitirlo puede volver inválida la acción siguiente: Recorre hacia afuera la cadena
    de inclusiones sin saltar relaciones.'
  - 'La solución debe terminar de este modo: Distingue pertenencia \(\in\) de inclusión
    \(\subset\) al escribir la conclusión.'
errores_frecuentes:
- 'Confundir inclusión de conjuntos numéricos en los reales con otro concepto y omitir
  este inicio: Identifica el conjunto más pequeño al que pertenece el número.'
- Aplicar mecánicamente “Recorre hacia afuera la cadena de inclusiones sin saltar
  relaciones.” sin revisar las condiciones de la definición.
- Tomar “\(-4\) es entero, racional porque \(-4=-4/1\), y también real” como una igualdad
  aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “pertenecer a un conjunto pequeño
  implica pertenecer a todos los conjuntos que lo contienen”.
- 'Terminar el desarrollo sin realizar este control: Distingue pertenencia \(\in\)
  de inclusión \(\subset\) al escribir la conclusión.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
