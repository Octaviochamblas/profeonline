semantic_id: MAT.GEO.ISOMETRIA_TRASLACION.TRASLACION_PUNTOS
titulo: Procedimiento de traslación de puntos en el plano
objetivo: Aplicar el procedimiento para trasladar un punto del plano cartesiano, sumando las componentes
  del vector traslación a sus coordenadas.
introduccion: Trasladar un punto es tan simple como sumarle las componentes del vector traslación a sus
  propias coordenadas.
resumen: Para trasladar un punto $P(x,y)$ mediante un vector $\vec{v}=(a,b)$, se obtiene el punto imagen
  $P'(x+a,\,y+b)$.
explicacion: '![Procedimiento de traslación de puntos](/static/img/geometria/isometrias/traslacion-puntos.svg)


  ### Definición formal


  Si $P(x,y)$ es un punto y $\vec{v}=(a,b)$ es el vector traslación, el punto imagen es $P''(x+a,\,y+b)$:
  se suma la componente $a$ a la abscisa y la componente $b$ a la ordenada.


  ### Desarrollo didáctico


  En la figura, el punto $P(-3,-2)$ se traslada mediante el vector $\vec{v}=(4,3)$, obteniendo $P''(-3+4,\,-2+3)=(1,1)$.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del punto P(x,y) y las componentes del vector traslación v=(a,b).'
- 'Paso 2: Suma la componente a a la abscisa: x+a.'
- 'Paso 3: Suma la componente b a la ordenada: y+b, obteniendo el punto imagen P''(x+a, y+b).'
ejemplos:
- titulo: Trasladar un punto con un vector dado
  enunciado: P(-3,-2) se traslada con v=(4,3).
  solucion_pasos:
  - P'=(-3+4, -2+3)=(1,1).
- titulo: Trasladar un punto con componentes negativas
  enunciado: P(5,7) se traslada con v=(-2,-6).
  solucion_pasos:
  - P'=(5-2, 7-6)=(3,1).
- titulo: ¿Se suma directamente el vector a las coordenadas del punto?
  respuesta: Sí
  solucion_pasos:
  - Sí, el procedimiento consiste exactamente en sumar cada componente del vector a la coordenada correspondiente.
- titulo: ¿El procedimiento cambia si el punto está en un cuadrante distinto?
  respuesta: 'No'
  solucion_pasos:
  - No, el procedimiento de sumar las componentes es el mismo sin importar en qué cuadrante se encuentre
    el punto original.
errores_frecuentes:
- Restar las componentes del vector en vez de sumarlas.
- Sumar la componente a a la ordenada y la componente b a la abscisa, invirtiendo el orden correcto.
- Cometer errores de signo al trabajar con componentes negativas del vector o del punto.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 126, Cid 73).'
estado: publicado
