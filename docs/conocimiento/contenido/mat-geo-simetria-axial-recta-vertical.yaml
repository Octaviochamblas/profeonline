semantic_id: MAT.GEO.SIMETRIAS.AXIAL_RECTA_VERTICAL
titulo: Simetría axial respecto de rectas verticales
objetivo: Aplicar la regla de la simetría axial respecto de una recta vertical genérica x=k (distinta
  del eje Y), calculando la imagen de un punto mediante la fórmula P'(2k-x, y).
introduccion: Reflejar respecto de una recta vertical cualquiera (no necesariamente el eje Y) sigue la
  misma lógica de 'espejo', pero centrada en esa recta específica.
resumen: 'La simetría axial respecto de una recta vertical $x=k$ transforma cada punto $P(x,y)$ en $P''(2k-x,\,y)$:
  la ordenada se mantiene igual, y la abscisa se refleja respecto de $k$.'
explicacion: '![Simetría axial respecto de rectas verticales](/static/img/geometria/isometrias/simetria-axial-recta-vertical.svg)


  ### Definición formal


  Si el eje de simetría es la recta vertical $x=k$, cada punto $P(x,y)$ se transforma en $P''(2k-x,\,y)$,
  generalizando la fórmula del eje Y (que corresponde al caso particular $k=0$).


  ### Desarrollo didáctico


  En la figura, respecto de la recta $x=3$, el punto $P(0,2)$ se refleja en $P''(2\times3-0,\,2)=(6,2)$:
  la distancia de $P$ a la recta (3 unidades) es igual a la distancia de $P''$ a la recta.'
procedimiento:
- 'Paso 1: Identifica la recta vertical x=k que actúa como eje de simetría.'
- 'Paso 2: Aplica la fórmula P''=(2k-x, y) al punto original P(x,y).'
- 'Paso 3: Verifica que la distancia de P a la recta sea igual a la distancia de P'' a la recta.'
ejemplos:
- titulo: Aplicar la simetría respecto de una recta vertical genérica
  enunciado: La recta x=3 es el eje, y el punto es P(0,2).
  solucion_pasos:
  - P'=(2×3-0, 2)=(6,2).
- titulo: Aplicar la simetría cuando el punto está más cerca de la recta
  enunciado: La recta x=5 es el eje, y el punto es P(3,7).
  solucion_pasos:
  - P'=(2×5-3, 7)=(7,7).
- titulo: ¿Esta fórmula se reduce a la simetría respecto del eje Y cuando k=0?
  respuesta: Sí
  solucion_pasos:
  - Sí, si k=0, P'=(2×0-x, y)=(-x,y), exactamente la fórmula de simetría respecto del eje Y.
- titulo: ¿La ordenada del punto cambia en esta simetría?
  respuesta: 'No'
  solucion_pasos:
  - No, al ser una recta vertical, solo se ve afectada la abscisa; la ordenada permanece igual.
errores_frecuentes:
- Usar la fórmula del eje Y (x'=-x) en vez de la fórmula general (x'=2k-x) cuando la recta no es el eje
  Y.
- Olvidar multiplicar k por 2 en la fórmula.
- Cambiar la ordenada del punto, cuando en realidad debe permanecer igual.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 149-150).'
estado: publicado
