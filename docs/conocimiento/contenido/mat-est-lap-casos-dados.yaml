semantic_id: MAT.EST.LAPLACE_MUESTRALES.CASOS_DADOS
titulo: Determinación de casos totales en el lanzamiento de varios dados
objetivo: Determinar el número de casos totales al lanzar varios dados simultáneamente, aplicando el principio
  multiplicativo (potencias de 6).
introduccion: Al igual que con las monedas, cada dado adicional multiplica el número de resultados posibles,
  ya que cada uno puede dar 6 valores distintos de forma independiente.
resumen: Al lanzar $n$ dados, el número de casos totales es $n(S)=6^n$, ya que cada dado tiene 6 resultados
  posibles independientes.
explicacion: '![Casos totales al lanzar dados](/static/img/probabilidad/laplace/lap-casos-dados.svg)


  ### Definición formal


  Si se lanzan $n$ dados, cada uno con 6 resultados posibles, el espacio muestral (registrando cada dado
  por separado) tiene $n(S)=6^n$ elementos.


  ### Desarrollo didáctico


  Al lanzar 2 dados, $n(S)=6^2=36$ combinaciones posibles (por ejemplo, (1,1), (1,2), ..., (6,6)). Al
  lanzar 3 dados, $n(S)=6^3=216$.'
procedimiento:
- 'Paso 1: Identifica cuántos dados se están lanzando (n).'
- 'Paso 2: Aplica la fórmula n(S)=6^n, ya que cada dado tiene 6 resultados posibles.'
- 'Paso 3: Distingue si el problema requiere registrar cada dado por separado o solo la suma (que da un
  espacio muestral distinto y más pequeño).'
ejemplos:
- titulo: Calcular los casos totales al lanzar 2 dados
  enunciado: n=2 dados.
  solucion_pasos:
  - n(S)=6²=36 combinaciones, registrando cada dado por separado.
- titulo: Calcular los casos totales al lanzar 3 dados
  enunciado: n=3 dados.
  solucion_pasos:
  - n(S)=6³=216 combinaciones.
- titulo: ¿n(S)=36 corresponde a registrar la suma de dos dados o cada dado por separado?
  respuesta: 'No'
  solucion_pasos:
  - No, 36 corresponde a registrar cada dado por separado; la suma de dos dados tiene solo 11 valores
    posibles distintos (2 a 12).
- titulo: ¿El principio multiplicativo aplica de la misma forma a monedas y dados?
  respuesta: Sí
  solucion_pasos:
  - Sí, solo cambia la base de la potencia (2 para monedas, 6 para dados).
errores_frecuentes:
- Confundir el espacio muestral de 'cada dado por separado' (6^n) con el de 'la suma de los dados' (un
  conjunto mucho más pequeño).
- Calcular incorrectamente la potencia de 6 correspondiente al número de dados lanzados.
- Olvidar que combinaciones como (1,2) y (2,1) son resultados distintos si se distingue cada dado.
fuente: 'Elaboración propia (referencia: Moraleja 405).'
estado: publicado
