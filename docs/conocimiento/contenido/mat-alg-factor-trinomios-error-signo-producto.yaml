  enunciado: 'Respecto de «Detección de error de signo en el producto de factores»: ¿La siguiente conclusión es
    correcta? «Olvidar el paso final y entregar la respuesta con la variable falsa ''u''»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Cuando un polinomio tiene la forma $ax^{2n} + bx^n + c$ (el
