errores_frecuentes:
- Olvidar el paso final y entregar la respuesta con la variable falsa 'u'.
- 'Sustituir mal (Ej: definir $u = x^4$). La variable u siempre es igual a la porción literal del término central.'
- Para «¿Qué condición debe cumplir el trinomio para que el método de sustitución de variable sea aplicable», la
  respuesta correcta es Todos los exponentes deben ser pares.
- Para «¿Qué condición debe cumplir el trinomio para que el método de sustitución de variable sea aplicable», la
  respuesta correcta es El grado central debe ser 1.
- Para «¿Qué condición debe cumplir el trinomio para que el método de sustitución de variable sea aplicable», la
  respuesta correcta es Solo aplica para exponentes menores a 5.
