resumen: |
  Cuando un polinomio tiene la forma $ax^{2n} + bx^n + c$ (el primer exponente es el doble del segundo), se puede realizar un cambio de variable $u = x^n$ para convertirlo en un trinomio cuadrÃĄtico $au^2 + bu + c$.
