semantic_id: MAT.GEO.VECTORES_BASE.COORDENADAS_VECTOR
titulo: Representación de un vector mediante coordenadas en el plano
objetivo: Representar un vector mediante sus componentes o coordenadas (vx, vy), que indican el desplazamiento
  horizontal y vertical desde su origen.
introduccion: Las coordenadas de un vector indican cuánto se avanza horizontalmente y cuánto verticalmente
  para ir de su origen a su extremo.
resumen: Un vector se puede representar mediante sus componentes $(v_x,v_y)$, donde $v_x=x_B-x_A$ y $v_y=y_B-y_A$,
  siendo $A$ el origen y $B$ el extremo del vector.
explicacion: '![Coordenadas de un vector](/static/img/geometria/cartesiano-vectores/vector-coordenadas.svg)


  ### Definición formal


  Dado un vector $\vec{AB}$ con $A(x_A,y_A)$ y $B(x_B,y_B)$, sus componentes son $v_x=x_B-x_A$ y $v_y=y_B-y_A$.
  Cuando el vector está anclado en el origen, sus componentes coinciden directamente con las coordenadas
  de su extremo.


  ### Desarrollo didáctico


  En la figura, el vector con origen en $(0,0)$ y extremo en $(4,3)$ tiene componentes $v_x=4$ y $v_y=3$,
  representándose como $\vec{v}=(4,3)$.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del origen y el extremo del vector.'
- 'Paso 2: Calcula vx=x_extremo-x_origen (la componente horizontal).'
- 'Paso 3: Calcula vy=y_extremo-y_origen (la componente vertical), y expresa el vector como (vx,vy).'
ejemplos:
- titulo: Determinar las componentes de un vector anclado en el origen
  enunciado: Un vector va de (0,0) a (4,3).
  solucion_pasos:
  - Sus componentes son vx=4-0=4 y vy=3-0=3, por lo que v=(4,3).
- titulo: Determinar las componentes de un vector no anclado en el origen
  enunciado: Un vector va de A(2,1) a B(5,6).
  solucion_pasos:
  - vx=5-2=3; vy=6-1=5; el vector es v=(3,5).
- titulo: ¿Las componentes de un vector siempre se calculan como extremo menos origen?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre se resta el origen del extremo, en ese orden, para obtener las componentes correctas.
- titulo: ¿Dos vectores con distinto origen pero mismas componentes son iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, dos vectores son iguales si tienen las mismas componentes (mismo módulo, dirección y sentido),
    sin importar dónde estén ubicados.
errores_frecuentes:
- Calcular las componentes restando origen menos extremo, en vez de extremo menos origen.
- Confundir las coordenadas del punto extremo con las componentes del vector cuando este no está anclado
  en el origen.
- Olvidar que vectores con el mismo par (vx,vy) son iguales, sin importar su ubicación en el plano.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 122).'
estado: publicado
