semantic_id: MAT.ALG.FUNCION_REPRESENTACION.GRAFICA_PLANO_CARTESIANO
titulo: Representación gráfica de funciones en el plano cartesiano
objetivo: Construir la gráfica de una función a partir de una tabla de valores en el plano cartesiano.
introduccion: 'Una vez que tienes suficientes puntos $(x, f(x))$, ubicarlos en el plano y unirlos revela la forma
  completa de la función: su gráfica.'
resumen: La **gráfica** de una función $f$ en el plano cartesiano es el conjunto de todos los puntos $(x, f(x))$
  para $x$ en el dominio de $f$, representados sobre un sistema de ejes perpendiculares.
explicacion: '### Definición formal


  La gráfica de una función $f: A \to B$ se define como el conjunto $G_f = \{(x, f(x)) : x \in A\} \subseteq \mathbb{R}^2$,
  representado geométricamente ubicando cada punto según su abscisa $x$ y su ordenada $f(x)$ en un sistema de
  coordenadas cartesianas.


  ### Desarrollo didáctico


  El proceso práctico es: construir una tabla de valores, ubicar cada par $(x, f(x))$ como un punto en el plano,
  y unir los puntos siguiendo el comportamiento esperado de la función (recta, curva suave, etc.).


  Cuantos más puntos calcules, más preciso será el trazo de la curva, especialmente en tramos donde la función
  cambia rápidamente.'
procedimiento:
- 'Paso 1: Construye una tabla de valores de la función.'
- 'Paso 2: Dibuja los ejes cartesianos con una escala adecuada.'
- 'Paso 3: Ubica cada punto $(x, f(x))$ de la tabla en el plano.'
- 'Paso 4: Une los puntos con una línea o curva continua, respetando el comportamiento esperado de la función.'
ejemplos:
- titulo: Gráfica de una función lineal
  enunciado: 'Grafica $f(x) = 2x$ usando los puntos $(-1,-2), (0,0), (1,2)$.'
  solucion_pasos:
  - Se ubican los tres puntos en el plano cartesiano.
  - Como f es lineal, los puntos quedan alineados; se traza una recta que los une.
- titulo: Gráfica de una función cuadrática
  enunciado: 'Grafica $f(x) = x^2$ usando los puntos $(-2,4), (-1,1), (0,0), (1,1), (2,4)$.'
  solucion_pasos:
  - Se ubican los cinco puntos en el plano.
  - Se traza una curva suave (parábola) que pasa por todos ellos, simétrica respecto del eje $y$.
- titulo: ¿La gráfica de una función puede tener dos puntos con la misma abscisa?
  enunciado: ¿La gráfica de una función puede tener dos puntos con la misma abscisa?
  respuesta: 'No'
  solucion_pasos:
  - Eso implicaría que un valor de x tiene dos imágenes distintas, violando la definición de función.
- titulo: ¿Es necesario unir los puntos con una recta o curva suave al graficar?
  enunciado: ¿Es necesario unir los puntos con una recta o curva suave al graficar?
  respuesta: Depende del contexto
  solucion_pasos:
  - Se une con una línea continua si el dominio es un intervalo real; si el dominio es discreto (por ejemplo, números
    enteros), los puntos quedan aislados.
errores_frecuentes:
- Intercambiar los ejes, ubicando $x$ en el eje vertical y $f(x)$ en el horizontal.
- Unir los puntos con líneas rectas cuando la función tiene un comportamiento curvo.
- Usar escalas distintas en ambos ejes sin indicarlo, distorsionando la forma real de la curva.
- Graficar puntos fuera del dominio de la función.
