semantic_id: MAT.GEO.ANGULOS_CLASIFICACION.OBTUSO
titulo: Ángulo obtuso con medida mayor que 90° y menor que 180°
objetivo: Clasificar un ángulo a partir de su medida y comprobar que compararlo con 90° y 180° evita confundirlo
  con un recto o un extendido.
introduccion: Si una puerta se abre más que una esquina cuadrada, pero aún no queda completamente alineada
  con el muro, su abertura es obtusa. Aquí lo trabajaremos con ejemplos concretos y verificaciones cortas.
resumen: Un ángulo obtuso mide más de 90° y menos de 180°. Como idea de control, compararlo con 90° y
  180° evita confundirlo con un recto o un extendido.
explicacion: 'Un ángulo obtuso mide más de 90° y menos de 180°.


  La situación “una abertura de 120° supera a un recto, pero todavía no forma una línea recta” muestra
  cómo pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se
  verifica que compararlo con 90° y 180° evita confundirlo con un recto o un extendido.'
procedimiento:
- 'Paso 1: Lee o estima la abertura del ángulo en grados.'
- 'Paso 2: Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.'
- 'Paso 3: Asigna el nombre correcto y revisa que no contradiga el dibujo.'
ejemplos:
- titulo: Aplicación directa — Ángulo obtuso
  enunciado: Una abertura de 120° supera a un recto, pero todavía no forma una línea recta.
  solucion_pasos:
  - Lee o estima la abertura del ángulo en grados.
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: Chequeo del procedimiento — Ángulo obtuso
  enunciado: En la situación “una abertura de 120° supera a un recto, pero todavía no forma una línea
    recta”, un compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye la
    justificación completa.
  solucion_pasos:
  - 'Parte de la definición: un ángulo obtuso mide más de 90° y menos de 180°.'
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿El caso confirma que compararlo con 90° y 180° evita confundirlo con un recto o un extendido?
    — Ángulo obtuso
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo obtuso mide más de 90° y menos de
    180°.'
  - En el caso “una abertura de 120° supera a un recto, pero todavía no forma una línea recta” se observa
    que compararlo con 90° y 180° evita confundirlo con un recto o un extendido.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Ángulo obtuso
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulo obtuso con medida mayor que 90°
    y menor que 180°.
  - Después del paso “Lee o estima la abertura del ángulo en grados.” todavía hace falta revisar “Compara
    la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
  - El cierre correcto exige “Asigna el nombre correcto y revisa que no contradiga el dibujo.”.
errores_frecuentes:
- Ángulo obtuso significa medir menos de 90°.
- Para resolver ángulo obtuso, basta con el paso “Lee o estima la abertura del ángulo en grados.” y no
  hace falta revisar “Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
- Si el dibujo parece claro, se puede ignorar que compararlo con 90° y 180° evita confundirlo con un recto
  o un extendido.
- Dos configuraciones distintas representan ángulo obtuso solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Asigna el nombre correcto y revisa que no
  contradiga el dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
