semantic_id: MAT.ALG.EC_CUADR_RESOL_FACTOR.TRINOMIO_SIMPLE
titulo: Resolución de ecuaciones completas factorizando trinomios de la forma x² + px + q
objetivo: Resolver ecuaciones cuadráticas completas con $a=1$ factorizando el trinomio como producto de
  dos binomios.
introduccion: 'Cuando el coeficiente cuadrático es 1, factorizar el trinomio se reduce a encontrar dos
  números que cumplan dos condiciones simultáneas: su suma y su producto.'
resumen: Para resolver $x^2+px+q=0$, se buscan dos números $m$ y $n$ tales que $m+n=p$ y $m \cdot n=q$,
  factorizando como $(x+m)(x+n)=0$.
explicacion: '### Definición formal


  Dada la ecuación $x^2+px+q=0$, si existen $m,n \in \mathbb{R}$ tales que $m+n=p$ y $m \cdot n=q$, entonces
  $x^2+px+q=(x+m)(x+n)$. Aplicando la propiedad del producto nulo, las soluciones son $x=-m$ y $x=-n$.


  ### Desarrollo didáctico


  La búsqueda de $m$ y $n$ conviene hacerla listando los pares de factores de $q$ y verificando cuál par
  suma exactamente $p$.


  Para $x^2-7x+12=0$: se buscan dos números que sumen $-7$ y multipliquen $12$: son $-3$ y $-4$. Factorizando,
  $(x-3)(x-4)=0$, dando $x=3$ o $x=4$.'
procedimiento:
- 'Paso 1: Identifica $p$ (coeficiente lineal) y $q$ (término independiente) de la ecuación $x^2+px+q=0$.'
- 'Paso 2: Busca dos números $m$ y $n$ tales que $m+n=p$ y $m \cdot n=q$.'
- 'Paso 3: Factoriza como $(x+m)(x+n)=0$ y aplica la propiedad del producto nulo.'
- 'Paso 4: Resuelve cada factor igualado a cero para obtener las soluciones $x=-m$ y $x=-n$.'
ejemplos:
- titulo: Factorización con ambos números positivos
  enunciado: Resuelve $x^2+8x+15=0$ factorizando.
  solucion_pasos:
  - 'Se buscan dos números que sumen $8$ y multipliquen $15$: son $3$ y $5$.'
  - 'Factorizando: $(x+3)(x+5)=0$.'
  - $x=-3$ o $x=-5$.
- titulo: Factorización con números de signos opuestos
  enunciado: Resuelve $x^2-2x-15=0$ factorizando.
  solucion_pasos:
  - 'Se buscan dos números que sumen $-2$ y multipliquen $-15$: son $-5$ y $3$.'
  - 'Factorizando: $(x-5)(x+3)=0$.'
  - $x=5$ o $x=-3$.
- titulo: ¿Toda ecuación de la forma $x^2+px+q=0$ se puede factorizar con números enteros?
  enunciado: ¿Toda ecuación de la forma $x^2+px+q=0$ se puede factorizar con números enteros?
  respuesta: 'No'
  solucion_pasos:
  - Solo si existen números enteros $m$ y $n$ que cumplan ambas condiciones simultáneamente; si no, se
    debe recurrir a la fórmula general.
- titulo: ¿Las soluciones de $x^2+px+q=0$ factorizado son siempre los opuestos de $m$ y $n$?
  enunciado: ¿Las soluciones de $x^2+px+q=0$ factorizado son siempre los opuestos de $m$ y $n$?
  respuesta: Sí
  solucion_pasos:
  - Al factorizar como $(x+m)(x+n)=0$, las soluciones son $x=-m$ y $x=-n$, no $m$ y $n$ directamente.
errores_frecuentes:
- Confundir el signo de las soluciones con el signo de $m$ y $n$ usados en la factorización.
- Buscar números que solo cumplan la condición del producto, sin verificar también la suma.
- Intentar factorizar con números enteros cuando el trinomio no admite esa factorización, perdiendo tiempo.
- Cometer errores al listar los pares de factores de $q$, omitiendo alguno.
