semantic_id: MAT.ALG.POLINOMIOS.POLINOMIO_COMPLETO
objetivo: Reconocer si un polinomio está completo o incompleto con respecto a los
  exponentes de una variable.
introduccion: 'Imagina una escalera. Para que esté completa, no le puede faltar ningún
  peldaño. En los polinomios pasa lo mismo con los exponentes: si falta un peldaño
  numérico, el polinomio está incompleto.'
resumen: Un **Polinomio Completo** con respecto a una letra es aquel que contiene
  **absolutamente todos los exponentes sucesivos** de dicha letra, desde el grado
  más alto (grado relativo) hasta el término independiente (exponente cero), sin saltarse
  ninguno.
explicacion: 'Vamos a revisar peldaños.

  - Polinomio: $x^3 + 2x^2 - 4x + 5$.

  Revisamos la ''x''. Exponente más alto es 3. ¿Tiene exponente 2? Sí. ¿Tiene exponente
  1? Sí ($-4x$). ¿Tiene término independiente (exponente 0)? Sí ($+5$). ¡Es un **polinomio
  completo**!


  - Polinomio: $x^4 - 2x^2 + 1$.

  Revisamos la ''x''. Exponente más alto es 4. ¿Tiene exponente 3? ¡No está! Se saltó
  el peldaño. ¿Tiene el 2? Sí. ¿Tiene el 1? No. ¿Tiene el 0? Sí. Es un **polinomio
  incompleto**.


  Al realizar operaciones avanzadas como la división larga, los huecos de los polinomios
  incompletos suelen rellenarse con coeficientes de cero (ej. $x^4 + 0x^3 - 2x^2 +
  0x + 1$) para no perder la alineación estructural.'
procedimiento:
- 'Paso 1: Identifica la letra ordenatriz y encuentra su exponente mayor.'
- 'Paso 2: Haz una cuenta regresiva mental desde ese exponente mayor hasta cero.'
- 'Paso 3: Verifica si cada número de tu cuenta regresiva está presente como exponente
  en la expresión.'
- 'Paso 4: Si todos están, es completo. Si falta aunque sea uno, es incompleto.'
ejemplos:
- titulo: Contando peldaños
  enunciado: Verifica si el polinomio 5x^4 - 3x^3 + x es completo o incompleto.
  solucion_pasos:
  - Mayor exponente es 4. Faltarían el 3, el 2, el 1 y el 0.
  - Está el 3. No está el 2 (no hay término con x^2).
  - Al faltar el exponente 2 (y el 0), concluimos inmediatamente que es Incompleto.
errores_frecuentes:
- Creer que si el polinomio está desordenado es incompleto. El orden no importa, si
  los términos están escondidos por ahí, sigue estando completo.
- Ignorar la necesidad del término independiente ($x^0$). Un polinomio completo usualmente
  debe terminar en un número suelto.
fuente: Álgebra de Baldor.
estado: publicado
