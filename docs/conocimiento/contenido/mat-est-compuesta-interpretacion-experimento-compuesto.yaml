semantic_id: MAT.EST.PROBA_COMPUESTA_CONDICIONAL.INTERPRETACION_EXPERIMENTO_COMPUESTO
titulo: Interpretación contextual de probabilidades en experimentos compuestos
objetivo: Interpretar en el contexto real del problema las probabilidades calculadas en un experimento
  compuesto de varias etapas sucesivas.
introduccion: Al finalizar un cálculo con diagrama de árbol o regla multiplicativa, es fundamental poder
  explicar qué significa ese resultado en la situación concreta del problema.
resumen: Interpretar en contexto un experimento compuesto significa explicar, en palabras propias del
  problema, qué representan las probabilidades de cada camino y de los resultados totales calculados.
explicacion: '![Interpretación de experimentos compuestos](/static/img/probabilidad/compuesta/compuesta-interpretacion-experimento-compuesto.svg)


  ### Definición formal


  Una interpretación completa de un experimento compuesto explica el significado de cada probabilidad
  calculada (de camino individual o de evento total) en términos de las categorías reales del problema.


  ### Desarrollo didáctico


  Si $P(\text{defectuosa})=0{,}07$, la interpretación sería: ''aproximadamente el 7% de todas las piezas
  producidas (considerando ambas máquinas) resultan ser defectuosas''.'
procedimiento:
- 'Paso 1: Identifica qué probabilidad específica se calculó (de un camino, o de un evento total sumando
  varios caminos).'
- 'Paso 2: Relaciona ese valor numérico con las categorías reales del problema (máquinas, proveedores,
  etapas, etc.).'
- 'Paso 3: Redacta la interpretación en palabras claras, mencionando esas categorías específicas.'
ejemplos:
- titulo: Interpretar P(defectuosa)=0,07
  enunciado: Resultado de sumar las rutas de ambas máquinas.
  solucion_pasos:
  - 'Interpretación: aproximadamente el 7% de todas las piezas producidas por la fábrica (considerando
    ambas máquinas) resultan ser defectuosas.'
- titulo: Interpretar P(máquina A y defectuosa)=0,03
  enunciado: Resultado de un solo camino del árbol.
  solucion_pasos:
  - 'Interpretación: aproximadamente el 3% de todas las piezas de la fábrica provienen de la máquina A
    y además son defectuosas.'
- titulo: ¿Es necesario distinguir en la interpretación si el valor corresponde a un solo camino o a la
    suma de varios?
  respuesta: Sí
  solucion_pasos:
  - Sí, cambia completamente el significado de a qué se refiere el porcentaje (todo el proceso, o solo
    una parte específica de él).
- titulo: ¿Se debe mencionar el contexto específico (máquinas, categorías) en la interpretación?
  respuesta: Sí
  solucion_pasos:
  - Sí, una interpretación completa siempre conecta el número con la situación real estudiada.
errores_frecuentes:
- Dar solo el valor numérico sin explicar su significado en el contexto del problema.
- Confundir la interpretación de la probabilidad de un solo camino con la del evento total (suma de varios
  caminos).
- Redactar una interpretación ambigua que no distinga claramente las categorías específicas involucradas.
fuente: Elaboración propia.
estado: publicado
