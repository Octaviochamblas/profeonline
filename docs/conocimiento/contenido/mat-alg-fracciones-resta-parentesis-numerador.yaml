semantic_id: MAT.ALG.FRACCIONES_RESTA.PARENTESIS_NUMERADOR
titulo: El Peligro del Signo Menos (Paréntesis Vital)
objetivo: Distribuir correctamente el signo negativo al restar un polinomio completo.
introduccion: Aquí es donde mueren el 90% de los ejercicios de resta algebraica. El signo de resta que separa las
  fracciones NO ataca solo a la primera letra del numerador que le sigue, ataca a TODA la casa.
resumen: Al restar una fracción cuyo numerador es un polinomio, debes colocar todo ese polinomio entre paréntesis
  precedido por el signo menos, lo cual cambiará el signo de TODOS sus términos.
explicacion: "### Definición formal\n\nEl signo de resta es para toda la fracción, lo que equivale a multiplicar\
  \ el numerador entero por -1.\n\n### Desarrollo didáctico\n\nCuando juntas dos fracciones con una resta, debes\
  \ activar una alarma roja de emergencia en tu cerebro.\n\nEl signo menos ($-$) que estaba entre las fracciones,\
  \ ahora se va a aplicar al segundo numerador. La regla estricta es: **Coloca paréntesis invisibles a todo el segundo\
  \ numerador** antes de aplicarle el menos.\n\nEjemplo visual de la trampa:\n$\\frac{3x}{5} - \\frac{x - 2}{5}$\n\
  - Forma incorrecta: Conservas el 5 y escribes $3x - x - 2$. (El menos solo afectó a la x). Resultado erróneo:\
  \ $2x-2$.\n- Forma magistral: Conservas el 5 y escribes $3x - (x - 2)$. El menos afecta a TODOS los términos dentro\
  \ del paréntesis.\n  Queda: $3x - x + 2$ (el -2 se vuelve +2 por la regla de signos).\n  Resultado correcto: $\\\
  frac{2x + 2}{5}$.\n\nEl 90% de los errores en las pruebas al restar fracciones ocurren exactamente aquí."
procedimiento:
- 'Paso 1: Escribe el denominador común.'
- 'Paso 2: Escribe el primer numerador.'
- 'Paso 3: Pon un signo menos y ABRE PARÉNTESIS.'
- 'Paso 4: Escribe el segundo numerador dentro del paréntesis.'
- 'Paso 5: En el siguiente renglón, quita el paréntesis cambiando TODOS los signos interiores.'
ejemplos:
- titulo: Resta $\frac{a + 4}{2} - \frac{a - 2}{2}$
  enunciado: Resta $\frac{a + 4}{2} - \frac{a - 2}{2}$.
  solucion_pasos:
  - 'Escribimos: $\frac{a + 4 - (a - 2)}{2}$.'
  - 'Distribuimos el menos: $\frac{a + 4 - a + 2}{2}$.'
  - 'Reducimos: las ''a'' se van, $4+2=6$.'
  - Queda $\frac{6}{2} = 3$.
- titulo: Calcula $\frac{3x}{5} - \frac{x+1}{5}$.
  solucion_pasos:
  - El negativo afecta a la 'x' y al '1'. Queda 3x - x - 1 = 2x - 1.
- titulo: 'Respecto de «Uso de paréntesis en el numerador al sustraer fracciones»: ¿Describe adecuadame'
  enunciado: 'Respecto de «Uso de paréntesis en el numerador al sustraer fracciones»: ¿Describe adecuadamente el
    concepto esta frase? «Al restar una fracción cuyo numerador es un polinomio, debes colocar todo ese polinomio
    entre paréntesis precedido por el signo menos, lo cual cambiará el signo de TODOS sus términos»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al restar una fracción cuyo numerador es un polinomio, debes
    colocar todo ese polinomio entre paréntesis precedido por el signo menos, lo cual cambiará el signo de TODOS
    sus términos.'
- titulo: 'Respecto de «Uso de paréntesis en el numerador al sustraer fracciones»: ¿Se puede aceptar es'
  enunciado: 'Respecto de «Uso de paréntesis en el numerador al sustraer fracciones»: ¿Se puede aceptar esta afirmación?
    «El ''error del francotirador miope'': restarle solo al primer término del segundo numerador y copiar el resto
    igual»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al restar una fracción cuyo numerador es un polinomio, debes
    colocar todo ese polinomio entre paréntesis precedido por el signo menos, lo cual cambiará el signo de TODOS
    sus términos.'
errores_frecuentes:
- 'El ''error del francotirador miope'': restarle solo al primer término del segundo numerador y copiar el resto
  igual.'
- Por estética matemática.
- Para «¿Por qué es crucial usar un paréntesis en el numerador al restar fracciones algebraicas polinómicas», la
  respuesta correcta es Para multiplicar los numeradores.
- Para «¿Por qué es crucial usar un paréntesis en el numerador al restar fracciones algebraicas polinómicas», la
  respuesta correcta es Para evitar que se cancelen las variables.
