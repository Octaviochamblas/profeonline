semantic_id: MAT.ALG.FRACCIONES_MULT.PRODUCTO_RESULTANTE
titulo: Obtención del producto simplificado de fracciones algebraicas
objetivo: Unir los factores sobrevivientes en la fracción final simplificada.
introduccion: Una vez que la 'matanza' de factores cruzados termina, solo queda recoger a los sobrevivientes
  y armar la respuesta final.
resumen: Multiplica todos los factores que no fueron cancelados en el numerador para formar tu numerador
  final, y lo mismo en el denominador.
explicacion: '### Definición formal


  La cancelación es una división, por lo tanto a/a = 1, no 0.


  ### Desarrollo didáctico


  Una vez que has factorizado, simplificado en cruz y tachado todo lo tachablemente posible, llega el
  momento de recoger los escombros y armar tu respuesta final.


  El producto resultante es simplemente la multiplicación de los factores ''supervivientes'' en el numerador
  y los ''supervivientes'' en el denominador.


  Regla de estilo matemático: Es perfectamente válido, y muchas veces preferible, dejar el resultado expresado
  como multiplicaciones indicadas de factores primos en lugar de desarrollar la multiplicación. Es decir,
  dejar la respuesta como $\frac{(x-5)}{(x+2)(x-3)}$ suele ser mejor (y más útil para ver el dominio)
  que expandirlo a $\frac{x-5}{x^2-x-6}$. Sigue la instrucción de la prueba o de tu profesor.'
procedimiento:
- 'Paso 1: Identifica qué factores quedaron sin tachar en la línea de numeradores.'
- 'Paso 2: Multiplícalos o déjalos expresados juntos.'
- 'Paso 3: Haz lo mismo con los denominadores sobrevivientes.'
ejemplos:
- titulo: 'Sobrevivientes de un problema: $\frac{x-1}{1} \cdot \frac{3}{x+2}$. Escribe el final'
  enunciado: 'Sobrevivientes de un problema: $\frac{x-1}{1} \cdot \frac{3}{x+2}$. Escribe el final.'
  solucion_pasos:
  - 'Arriba: $(x-1) \cdot 3 = 3(x-1)$.'
  - 'Abajo: $1 \cdot (x+2) = x+2$.'
  - 'Resultado: $\frac{3(x-1)}{x+2}$.'
- titulo: ¿Cuál es el producto de $\frac{2}{x} \cdot \frac{x+1}{3}$?
  solucion_pasos:
  - 2*(x+1) = 2x+2 arriba, x*3 = 3x abajo.
- titulo: 'Respecto de «Obtención del producto simplificado de fracciones algebraicas»: ¿Es correcta es'
  enunciado: 'Respecto de «Obtención del producto simplificado de fracciones algebraicas»: ¿Es correcta
    esta caracterización? «Multiplica todos los factores que no fueron cancelados en el numerador para
    formar tu numerador final, y lo mismo en el denominador»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Multiplica todos los factores que no fueron cancelados
    en el numerador para formar tu numerador final, y lo mismo en el denominador.'
- titulo: 'Respecto de «Obtención del producto simplificado de fracciones algebraicas»: ¿Es válida esta'
  enunciado: 'Respecto de «Obtención del producto simplificado de fracciones algebraicas»: ¿Es válida
    esta afirmación? «Olvidar algún factor que sobrevivió a la cancelación»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Multiplica todos los factores que no fueron cancelados
    en el numerador para formar tu numerador final, y lo mismo en el denominador.'
errores_frecuentes:
- Olvidar algún factor que sobrevivió a la cancelación.
- Escribir 0 en el numerador si se canceló todo (debe ser 1).
- Para «Si en un proceso de multiplicación todos los factores del numerador de una fracción se cancelan,
  ¿qué número queda en su lugar», la respuesta correcta es 0.
- Para «Si en un proceso de multiplicación todos los factores del numerador de una fracción se cancelan,
  ¿qué número queda en su lugar», la respuesta correcta es La variable x.
- Para «Si en un proceso de multiplicación todos los factores del numerador de una fracción se cancelan,
  ¿qué número queda en su lugar», la respuesta correcta es El signo negativo.
