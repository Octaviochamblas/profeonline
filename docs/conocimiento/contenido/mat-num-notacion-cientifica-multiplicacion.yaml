semantic_id: MAT.NUM.NOTACION_CIENTIFICA.MULTIPLICACION
objetivo: Multiplicar números expresados científicamente.
introduccion: 'El producto separa dos tareas independientes: operar las cifras significativas
  y combinar las escalas. Al final ambas partes vuelven a reunirse.'
resumen: Para multiplicar notación científica se multiplican coeficientes y se suman
  exponentes. El resultado debe normalizarse si el nuevo coeficiente queda fuera de
  \([1,10)\).
explicacion: |-
  Para multiplicar notación científica se multiplican coeficientes y se suman exponentes.

  En el caso “\((2\times10^3)(4\times10^5)=8\times10^8\)” esta idea se hace visible: el resultado debe normalizarse si el nuevo coeficiente queda fuera de \([1,10)\)
procedimiento:
- 'Paso 1: Multiplica los coeficientes y suma los exponentes de diez.'
- 'Paso 2: Normaliza el coeficiente moviendo la coma si es necesario.'
- 'Paso 3: Compensa cada movimiento en el exponente y estima el orden de magnitud.'
ejemplos:
- titulo: Aplicación razonada — Multiplicación de números en notación científica
  enunciado: \((2\times10^3)(4\times10^5)=8\times10^8\).
  solucion_pasos:
  - Multiplica los coeficientes y suma los exponentes de diez.
  - Normaliza el coeficiente moviendo la coma si es necesario.
  - Compensa cada movimiento en el exponente y estima el orden de magnitud.
- titulo: Revisión de una solución — Multiplicación de números en notación científica
  enunciado: Una solución aplica “Normaliza el coeficiente moviendo la coma si es
    necesario.”, pero termina sin comprobar que el resultado debe normalizarse si
    el nuevo coeficiente queda fuera de \([1,10)\). Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define multiplicación de números en notación científica:
    para multiplicar notación científica se multiplican coeficientes y se suman exponentes.'
  - Multiplica los coeficientes y suma los exponentes de diez.
  - 'Completa la revisión con este control: Compensa cada movimiento en el exponente
    y estima el orden de magnitud.'
- titulo: ¿Se cumple que el resultado debe normalizarse si el nuevo coeficiente queda
    fuera de \([1,10)\)? — Multiplicación de números en notación científica
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para multiplicar notación científica
    se multiplican coeficientes y se suman exponentes.
  - El caso “\((2\times10^3)(4\times10^5)=8\times10^8\)” satisface esa condición.
  - Compensa cada movimiento en el exponente y estima el orden de magnitud.
- titulo: ¿Es válido omitir el paso “Multiplica los coeficientes y suma los exponentes
    de diez”? — Multiplicación de números en notación científica
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de multiplicación de números en
    notación científica.
  - 'Omitirlo puede volver inválida la acción siguiente: Normaliza el coeficiente
    moviendo la coma si es necesario.'
  - 'La solución debe terminar de este modo: Compensa cada movimiento en el exponente
    y estima el orden de magnitud.'
errores_frecuentes:
- 'Confundir multiplicación de números en notación científica con otro concepto y
  omitir este inicio: Multiplica los coeficientes y suma los exponentes de diez.'
- Aplicar mecánicamente “Normaliza el coeficiente moviendo la coma si es necesario.”
  sin revisar las condiciones de la definición.
- Tomar “\((2\times10^3)(4\times10^5)=8\times10^8\)” como una igualdad aislada, sin
  explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el resultado debe normalizarse
  si el nuevo coeficiente queda fuera de \([1,10)\)”.
- 'Terminar el desarrollo sin realizar este control: Compensa cada movimiento en el
  exponente y estima el orden de magnitud.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
