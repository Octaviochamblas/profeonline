semantic_id: MAT.ALG.FUNC_EXPONENCIAL_BASE.INTERCEPTO_Y
titulo: Cálculo del intercepto de la gráfica exponencial con el eje Y
objetivo: Calcular el punto donde la gráfica de una función exponencial interseca al eje $y$.
introduccion: Toda gráfica exponencial cruza exactamente una vez el eje vertical, y ese punto siempre coincide
  con el parámetro $a$ de la función.
resumen: El **intercepto con el eje $y$** de $f(x)=a\cdot b^x$ es siempre el punto $(0,a)$, obtenido evaluando
  $f(0)$.
explicacion: '### Definición formal


  La intersección de la gráfica de $f(x)=a\cdot b^x$ con el eje $y$ ocurre en $x=0$. Evaluando, $f(0)=a\cdot b^0=a\cdot1=a$.
  Por lo tanto, el intercepto con el eje $y$ es siempre el punto $(0,a)$.


  ### Desarrollo didáctico


  Este cálculo es el más directo entre todos los relacionados con la gráfica exponencial: basta con identificar
  el coeficiente $a$, sin necesidad de ninguna operación adicional.


  Para $f(x)=9\cdot0{,}3^x$, el intercepto con el eje $y$ es el punto $(0,9)$, leído directamente del coeficiente
  $a$.'
procedimiento:
- 'Paso 1: Identifica el coeficiente $a$ de la función exponencial.'
- 'Paso 2: El intercepto con el eje $y$ es el punto $(0,a)$.'
ejemplos:
- titulo: Cálculo directo del intercepto con el eje y
  enunciado: 'Determina el intercepto con el eje $y$ de $f(x)=6\cdot4^x$.'
  solucion_pasos:
  - '$a=6$.'
  - El intercepto es el punto $(0,6)$.
- titulo: Cálculo con coeficiente negativo
  enunciado: 'Determina el intercepto con el eje $y$ de $f(x)=-3\cdot2^x$.'
  solucion_pasos:
  - '$a=-3$.'
  - El intercepto es el punto $(0,-3)$.
- titulo: ¿Toda función exponencial interseca al eje $y$ exactamente una vez?
  enunciado: ¿Toda función exponencial interseca al eje $y$ exactamente una vez?
  respuesta: Sí
  solucion_pasos:
  - Como el dominio es todo $\mathbb{R}$, siempre existe (y es único) el valor $f(0)$.
- titulo: ¿El intercepto con el eje $y$ depende del valor de la base $b$?
  enunciado: ¿El intercepto con el eje $y$ depende del valor de la base $b$?
  respuesta: 'No'
  solucion_pasos:
  - Como $b^0=1$ para cualquier base válida, el intercepto depende únicamente del coeficiente $a$.
errores_frecuentes:
- Confundir el intercepto con el eje $y$ con la asíntota horizontal de la función.
- Reportar solo el valor $a$ como respuesta, en vez del punto completo $(0,a)$.
- Calcular incorrectamente $f(0)$, olvidando que $b^0=1$ para cualquier base válida.
- Confundir el parámetro $a$ con la base $b$ al identificar el intercepto.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
