semantic_id: MAT.EST.PROBA_FUNDAMENTOS.ESPACIO_MUESTRAL
titulo: Identificación del espacio muestral de un experimento aleatorio
objetivo: Identificar el espacio muestral de un experimento aleatorio, es decir, el conjunto de todos
  sus resultados posibles.
introduccion: Antes de calcular cualquier probabilidad, es necesario listar completamente todos los resultados
  posibles de un experimento, lo que se conoce como espacio muestral.
resumen: El espacio muestral de un experimento aleatorio, denotado $S$ (o $\Omega$), es el conjunto de
  todos sus resultados posibles.
explicacion: '![Espacio muestral](/static/img/probabilidad/fundamentos/fund-espacio-muestral.svg)


  ### Definición formal


  El espacio muestral $S$ de un experimento aleatorio es el conjunto que contiene todos los resultados
  posibles de ese experimento, sin repeticiones.


  ### Desarrollo didáctico


  Al lanzar un dado de seis caras, el espacio muestral es $S=\{1,2,3,4,5,6\}$, ya que esos son todos los
  resultados posibles del experimento.'
procedimiento:
- 'Paso 1: Identifica el experimento aleatorio que se está realizando.'
- 'Paso 2: Lista todos los resultados posibles de ese experimento, sin repetir ninguno.'
- 'Paso 3: Escribe ese conjunto como el espacio muestral S.'
ejemplos:
- titulo: Identificar el espacio muestral al lanzar un dado
  enunciado: Lanzar un dado de seis caras.
  solucion_pasos:
  - S={1,2,3,4,5,6}.
- titulo: Identificar el espacio muestral al lanzar una moneda
  enunciado: Lanzar una moneda.
  solucion_pasos:
  - S={cara, sello}.
- titulo: ¿El espacio muestral incluye todos los resultados posibles de un experimento?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición debe incluirlos todos, sin excepción.
- titulo: ¿Puede el espacio muestral tener elementos repetidos?
  respuesta: 'No'
  solucion_pasos:
  - No, al ser un conjunto, cada resultado posible aparece una sola vez.
errores_frecuentes:
- Olvidar algún resultado posible al listar el espacio muestral.
- Repetir resultados dentro del espacio muestral, cuando debe ser un conjunto sin repeticiones.
- Confundir el espacio muestral con un evento particular (un subconjunto de él).
fuente: 'Elaboración propia (referencia: Moraleja 403).'
estado: publicado
