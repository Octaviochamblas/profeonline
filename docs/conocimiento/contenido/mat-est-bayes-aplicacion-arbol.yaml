semantic_id: MAT.EST.REGLA_BAYES.APLICACION_ARBOL
titulo: Aplicación de la regla de Bayes usando diagrama de árbol
objetivo: Resolver un problema completo de la regla de Bayes usando un diagrama de árbol, calculando la
  ruta específica y la suma de todas las rutas.
introduccion: 'El diagrama de árbol facilita mucho la resolución de problemas de Bayes: la ruta específica
  del evento buscado es el numerador, y la suma de todas las rutas hacia el evento observado es el denominador.'
resumen: Usando un árbol, $P(B_i|A)$ se calcula como la probabilidad de la ruta específica que pasa por
  $B_i$ y llega a $A$, dividida por la suma de las probabilidades de todas las rutas que llegan a $A$.
explicacion: '![Aplicación de la regla de Bayes usando diagrama de árbol](/static/img/probabilidad/bayes/bayes-aplicacion-arbol.svg)


  ### Definición formal


  En el árbol, el numerador es la probabilidad de la ruta $B_i\to A$ específica, y el denominador es la
  suma de las probabilidades de todas las rutas que terminan en $A$ (sin importar de qué $B_j$ provienen).


  ### Desarrollo didáctico


  En el árbol de las dos máquinas: la ruta ''máquina A y defectuosa'' tiene probabilidad 0,03; la suma
  de todas las rutas que terminan en ''defectuosa'' es 0,07. Entonces $P(A|\text{defectuosa})=\dfrac{0{,}03}{0{,}07}\approx0{,}43$.'
procedimiento:
- 'Paso 1: Construye el árbol completo con las probabilidades del primer nivel (partición) y del segundo
  nivel (evento condicionado).'
- 'Paso 2: Calcula la probabilidad de la ruta específica de interés (numerador) y la suma de todas las
  rutas que llegan al evento observado (denominador).'
- 'Paso 3: Divide la ruta específica por esa suma total para obtener la probabilidad a posteriori buscada.'
ejemplos:
- titulo: Resolver con árbol P(máquina A|defectuosa)
  enunciado: P(A y defectuosa)=0,03, suma total de rutas a 'defectuosa'=0,07.
  solucion_pasos:
  - P(A|defectuosa)=0,03/0,07≈0,43.
- titulo: Resolver con árbol P(urna 2|roja)
  enunciado: P(urna2 y roja)=0,1, suma total de rutas a 'roja'=0,5.
  solucion_pasos:
  - P(urna2|roja)=0,1/0,5=0,2.
- titulo: ¿El numerador de este cálculo es la probabilidad de una sola ruta del árbol?
  respuesta: Sí
  solucion_pasos:
  - Sí, específicamente la ruta que pasa por el Bi de interés.
- titulo: ¿El denominador es la suma de todas las rutas que llegan al mismo evento final?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente la probabilidad total del evento observado.
errores_frecuentes:
- Usar como denominador solo una parte de las rutas, en vez de la suma completa de todas ellas.
- Confundir cuál ruta específica corresponde al numerador buscado.
- Olvidar construir completamente el árbol antes de intentar leer las probabilidades necesarias.
fuente: 'Elaboración propia (referencia: Moraleja 294).'
estado: publicado
