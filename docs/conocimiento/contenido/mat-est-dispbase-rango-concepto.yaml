semantic_id: MAT.EST.DISPERSION_BASE.RANGO_CONCEPTO
titulo: Reconocer el rango como amplitud total de los datos
objetivo: Reconocer el rango como la medida de dispersión que indica la amplitud total de un conjunto de datos.
introduccion: El rango es la forma más simple de medir qué tan "estirados" están los datos, comparando el valor más
  alto con el más bajo.
resumen: El rango es una medida de dispersión que indica la amplitud total de un conjunto de datos, considerando solo
  sus valores extremos.
explicacion: '![Concepto de rango](/static/img/estadistica/dispbase/dispbase-rango-concepto.svg)


  ### Definición formal


  El rango es la medida de dispersión más simple; representa qué tan amplio es el conjunto de datos, comparando

  únicamente el valor mínimo con el valor máximo.


  ### Desarrollo didáctico


  Aunque es fácil de calcular, el rango tiene una desventaja importante, ya que ignora completamente cómo se distribuyen

  los datos entre los dos extremos.'
procedimiento:
- 'Paso 1: Identifica el valor mínimo del conjunto de datos.'
- 'Paso 2: Identifica el valor máximo del conjunto de datos.'
- 'Paso 3: Reconoce que el rango describe la amplitud entre ambos valores.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Dos cursos tienen el mismo promedio de notas, pero uno tiene mayor rango que el otro. ¿Qué indica esto?
  solucion_pasos:
  - El curso con mayor rango tiene una diferencia más grande entre su nota más alta y su nota más baja.
  - Esto sugiere mayor variabilidad extrema en ese curso.
- titulo: Ejemplo 2
  enunciado: ¿Qué información usa el rango para medir dispersión?
  solucion_pasos:
  - Usa únicamente el valor mínimo y el valor máximo del conjunto.
  - No considera los valores intermedios de la distribución.
- titulo: ¿El rango es la medida de dispersión más simple de calcular?
  respuesta: Sí
  solucion_pasos:
  - Sí, solo requiere identificar el mínimo y el máximo.
- titulo: ¿El rango considera todos los valores del conjunto de datos?
  respuesta: 'No'
  solucion_pasos:
  - 'No, solo considera los dos valores extremos, ignorando los datos intermedios.'
errores_frecuentes:
- Confundir el rango con el rango intercuartílico.
- Creer que el rango describe la variabilidad de todos los datos, no solo de los extremos.
- Pensar que un rango pequeño implica automáticamente que todos los datos son similares entre sí.
- Calcular el rango sin antes identificar correctamente el mínimo y el máximo.
- Confundir el concepto de rango con el de recorrido de una función.
fuente: 'Elaboración propia (referencia: Moraleja 296, 321).'
estado: publicado
