semantic_id: MAT.EST.REPRESENTACIONES_AVANZADAS.TALLO_HOJA
titulo: Organizar datos mediante el diagrama de tallo y hoja
objetivo: Organizar un conjunto de datos numéricos mediante el diagrama de tallo y hoja, separando cada
  valor en una parte 'tallo' y una parte 'hoja'.
introduccion: El diagrama de tallo y hoja permite ver la forma de la distribución de los datos sin perder
  el valor exacto de cada observación, a diferencia de un histograma.
resumen: El diagrama de tallo y hoja organiza los datos separando cada valor en un 'tallo' (dígitos de
  mayor orden) y una 'hoja' (el último dígito), agrupando todas las hojas de un mismo tallo en una fila.
explicacion: '![Diagrama de tallo y hoja](/static/img/estadistica/repavan/repavan-tallo-hoja.svg)


  ### Definición formal


  Cada dato se divide en tallo (todos los dígitos excepto el último) y hoja (el último dígito); los datos
  con el mismo tallo se agrupan en la misma fila, ordenando las hojas de menor a mayor.


  ### Desarrollo didáctico


  Con los datos 12, 15, 18, 20, 23, 23, 27, 31, 35: el tallo 1 tiene hojas 2,5,8; el tallo 2 tiene hojas
  0,3,3,7; el tallo 3 tiene hojas 1,5.'
procedimiento:
- 'Paso 1: Separa cada dato en su parte ''tallo'' (dígitos de mayor orden) y su parte ''hoja'' (último
  dígito).'
- 'Paso 2: Agrupa todas las hojas correspondientes al mismo tallo en una misma fila.'
- 'Paso 3: Ordena las hojas de cada fila de menor a mayor para facilitar la lectura.'
ejemplos:
- titulo: Construir un diagrama de tallo y hoja con edades
  enunciado: 'Edades: 12, 15, 18, 20, 23, 23, 27.'
  solucion_pasos:
  - 'Tallo 1: hojas 2,5,8. Tallo 2: hojas 0,3,3,7.'
- titulo: Construir un diagrama de tallo y hoja con notas
  enunciado: 'Notas (en escala de 0 a 70): 42, 45, 48, 51, 55, 58.'
  solucion_pasos:
  - 'Tallo 4: hojas 2,5,8. Tallo 5: hojas 1,5,8.'
- titulo: ¿El diagrama de tallo y hoja conserva el valor exacto de cada dato?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de un histograma, permite reconstruir el dato original exacto (tallo+hoja).
- titulo: ¿Las hojas de una misma fila deben ordenarse de menor a mayor?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la convención estándar para facilitar la lectura del diagrama.
errores_frecuentes:
- Confundir qué dígitos corresponden al tallo y cuáles a la hoja, especialmente en datos con distinto
  número de dígitos.
- No ordenar las hojas de menor a mayor dentro de cada fila.
- Omitir algún dato al construir el diagrama, dejando su tallo o su hoja sin registrar.
fuente: Elaboración propia.
estado: publicado
