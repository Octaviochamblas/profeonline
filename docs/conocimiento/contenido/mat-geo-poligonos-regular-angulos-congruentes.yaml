semantic_id: MAT.GEO.POLIGONOS_METRICA.REGULAR_ANGULOS_CONGRUENTES
titulo: Propiedad de ángulos congruentes en un polígono regular
objetivo: Comprender que en un polígono regular todos los ángulos interiores tienen exactamente la misma
  medida.
introduccion: Junto a la congruencia de lados, la otra característica esencial de los polígonos regulares
  es la uniformidad perfecta de sus ángulos.
resumen: En un polígono regular, todos los ángulos interiores son congruentes entre sí (tienen exactamente
  la misma medida).
explicacion: '![Ángulos congruentes en un polígono regular](/static/img/geometria/poligonos-cuadrilateros/poligonos-regular-angulos-congruentes.svg)


  ### Definición formal


  Un polígono regular de $n$ lados tiene todos sus ángulos interiores de igual medida, cada uno igual
  a $\frac{180°(n-2)}{n}$.


  ### Desarrollo didáctico


  Un hexágono regular tiene sus 6 ángulos interiores exactamente iguales, cada uno midiendo $\frac{180°\times4}{6}=120°$.
  Un polígono podría tener todos sus lados iguales pero ángulos distintos (como un rombo no cuadrado),
  por lo que ambas condiciones (lados y ángulos congruentes) son necesarias para la regularidad.'
procedimiento:
- 'Paso 1: Verifica que el polígono sea regular.'
- 'Paso 2: Si es regular, todos sus ángulos interiores tienen la misma medida.'
- 'Paso 3: Esa medida se puede calcular dividiendo la suma total de ángulos interiores entre el número
  de ángulos (n).'
ejemplos:
- titulo: Verificar congruencia de ángulos en un hexágono regular
  enunciado: Un hexágono regular tiene un ángulo interior de 120°.
  solucion_pasos:
  - Los otros 5 ángulos también miden exactamente 120°, por ser regular.
- titulo: Contrastar con un polígono no regular
  enunciado: Un rombo no cuadrado tiene lados iguales pero ángulos distintos.
  solucion_pasos:
  - No es un polígono regular, ya que sus ángulos no son todos congruentes, aunque sus lados sí lo sean.
- titulo: ¿Basta con tener lados iguales para ser un polígono regular?
  respuesta: 'No'
  solucion_pasos:
  - No, también se requiere que todos los ángulos sean congruentes.
- titulo: ¿Todos los ángulos de un polígono regular miden lo mismo sin importar su tamaño?
  respuesta: Sí
  solucion_pasos:
  - Sí, la medida del ángulo depende solo del número de lados, no del tamaño del polígono.
errores_frecuentes:
- Creer que un polígono con lados iguales es automáticamente regular, sin verificar los ángulos.
- Confundir esta propiedad con la de lados congruentes, tratándolas como si fueran la misma condición.
- Asumir que la medida de los ángulos cambia según el tamaño del polígono regular, cuando en realidad
  solo depende del número de lados.
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 47.'
estado: publicado
