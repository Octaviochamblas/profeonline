semantic_id: MAT.ALG.TRIG_CIRCULO_ANGULOS.SENTIDO_POSITIVO
titulo: Sentido positivo y negativo de rotación
objetivo: Distinguir el sentido antihorario (positivo) del sentido horario (negativo) al medir ángulos.
introduccion: 'La dirección en que se gira el lado terminal de un ángulo no es indiferente: existe una convención
  que asigna signo a cada sentido de rotación.'
resumen: Un ángulo es **positivo** si se mide girando en sentido **antihorario** desde el lado inicial, y
  **negativo** si se mide girando en sentido **horario**.
explicacion: '### Definición formal


  Por convención, un ángulo $\theta>0$ corresponde a una rotación en sentido antihorario (contrario a las
  manecillas del reloj) desde el lado inicial; un ángulo $\theta<0$ corresponde a una rotación en sentido
  horario. El valor absoluto de $\theta$ indica la magnitud del giro, independiente del sentido.


  ### Desarrollo didáctico


  Un giro de $90°$ en sentido antihorario lleva el lado terminal desde el semieje positivo $x$ hasta el semieje
  positivo $y$. Un giro de $-90°$ (sentido horario) lleva el lado terminal desde el semieje positivo $x$ hasta
  el semieje negativo $y$: llegan a puntos distintos.'
procedimiento:
- 'Paso 1: Determina el signo del ángulo dado.'
- 'Paso 2: Si es positivo, gira el lado terminal en sentido antihorario.'
- 'Paso 3: Si es negativo, gira el lado terminal en sentido horario.'
ejemplos:
- titulo: Identificación del sentido de un ángulo positivo
  enunciado: '¿En qué sentido se mide un ángulo de $60°$?'
  solucion_pasos:
  - El signo positivo indica sentido antihorario.
  - Se gira en sentido antihorario desde el semieje positivo $x$.
- titulo: Identificación del sentido de un ángulo negativo
  enunciado: '¿En qué sentido se mide un ángulo de $-45°$?'
  solucion_pasos:
  - El signo negativo indica sentido horario.
  - Se gira en sentido horario desde el semieje positivo $x$.
- titulo: ¿Un ángulo de $90°$ y uno de $-90°$ terminan en el mismo punto del círculo unitario?
  enunciado: ¿Un ángulo de $90°$ y uno de $-90°$ determinan el mismo punto sobre el círculo unitario?
  respuesta: 'No'
  solucion_pasos:
  - Uno termina en $(0,1)$ y el otro en $(0,-1)$, puntos distintos.
- titulo: ¿El sentido antihorario corresponde siempre a ángulos positivos?
  enunciado: ¿Por convención, el sentido antihorario siempre corresponde a ángulos con signo positivo?
  respuesta: Sí
  solucion_pasos:
  - Es la convención estándar universal en trigonometría.
errores_frecuentes:
- Confundir el sentido antihorario con el horario al interpretar el signo del ángulo.
- Suponer que un ángulo positivo y su opuesto negativo terminan en el mismo punto.
- No aplicar la convención de signos al construir el ángulo en el plano.
- Olvidar que el valor absoluto solo indica la magnitud, no el sentido de la rotación.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
