semantic_id: MAT.FUND.RELACIONES_CONJUNTOS.CONJUNTOS_NO_DISJUNTOS
titulo: Conjuntos no disjuntos
objetivo: Identificar y justificar si dos conjuntos no son disjuntos comprobando que comparten al menos
  un elemento en común.
introduccion: 'Imagina que tú tienes un estuche con lápices de pasta azul, negro y rojo, y tu compañero
  tiene otro estuche con lápices de pasta rojo, verde y morado. Si revisan los estuches, ambos verán que
  tienen en común un lápiz de pasta rojo. Ese objeto pertenece a los dos estuches al mismo tiempo.


  En matemáticas, cuando dos conjuntos tienen al menos una cosa en común, decimos que son conjuntos no
  disjuntos (o conjuntos intersectados). Es como dos calles que se cruzan en una esquina; esa esquina
  pertenece a ambas calles.


  Saber identificar conjuntos no disjuntos te ayudará a resolver problemas de encuestas y grupos donde
  las personas pueden realizar más de una actividad a la vez.'
resumen: 'Dos conjuntos $A$ y $B$ no son disjuntos (es decir, son conjuntos con intersección no vacía)
  si comparten al menos un elemento en común ($A \cap B \neq \emptyset$). Su cardinalidad de la intersección
  es mayor o igual a uno ($|A \cap B| \ge 1$).

  '
explicacion: "La relación de **conjuntos no disjuntos** describe la superposición o intersección de elementos\
  \ entre colecciones.\n\n**Definición Formal:**\nDos conjuntos $A$ y $B$ no son disjuntos si y solo si:\n\
  $$A \\cap B \\neq \\emptyset$$\nEsto significa que existe al menos un elemento $x$ tal que pertenece\
  \ a ambos conjuntos simultáneamente:\n$$\\exists x : (x \\in A \\land x \\in B)$$\n\n**Propiedades y\
  \ Consecuencias:**\n1. **Intersección No Vacía:** La intersección de ambos conjuntos contiene al menos\
  \ un elemento.\n2. **Cardinalidad de la Unión:** Si $A$ y $B$ son conjuntos finitos no disjuntos, para\
  \ calcular la cardinalidad de su unión se debe aplicar el principio de inclusión-exclusión:\n   $$|A\
  \ \\cup B| = |A| + |B| - |A \\cap B|$$\n   (Debemos restar los elementos comunes para no contarlos dos\
  \ veces).\n3. **Diferencia de Conjuntos:** Si $A$ y $B$ no son disjuntos, entonces quitarle $B$ a $A$\
  \ eliminará elementos de $A$, por lo que $A \\setminus B$ será un subconjunto propio de $A$."
procedimiento:
- 'Paso 1: Identifica los elementos de los conjuntos $A$ y $B$.'
- 'Paso 2: Compara los elementos buscando si existe al menos un elemento común que pertenezca a ambos
  conjuntos.'
- 'Paso 3: Si encuentras al menos un elemento común, concluye que los conjuntos no son disjuntos ($A \cap
  B \neq \emptyset$). Si no hay ninguno, entonces son disjuntos.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determina si los conjuntos $A = \{1, 2, 3\}$ y $B = \{3, 4, 5\}$ son no disjuntos.
  solucion_pasos:
  - 'Paso a: Listamos los elementos de ambos conjuntos. $A = \{1, 2, 3\}$ y $B = \{3, 4, 5\}$.'
  - 'Paso b: Buscamos elementos en común. Vemos que el número 3 está en la lista de $A$ y también está
    en la lista de $B$.'
  - 'Paso c: Como el elemento 3 pertenece a la intersección ($3 \in A \cap B$), la intersección no es
    vacía. Por lo tanto, $A$ y $B$ son conjuntos no disjuntos.'
- titulo: Ejemplo 2
  enunciado: Analiza si el conjunto de los múltiplos de 2 y el conjunto de los múltiplos de 3 (en los
    números naturales) son no disjuntos.
  solucion_pasos:
  - 'Paso a: Escribimos los primeros elementos de cada conjunto. Sean $M_2 = \{2, 4, 6, 8, 10, 12, \dots\}$
    y $M_3 = \{3, 6, 9, 12, 15, \dots\}$.'
  - 'Paso b: Buscamos elementos en común. El número 6 y el número 12, por ejemplo, pertenecen a ambos
    conjuntos.'
  - 'Paso c: Como existen elementos comunes que son múltiplos de ambos (múltiplos comunes), concluimos
    que los conjuntos de múltiplos de 2 y de 3 son no disjuntos.'
- titulo: ¿Son no disjuntos los conjuntos de letras de las palabras 'SOL' y 'LUNA'?
  respuesta: Sí
  solucion_pasos:
  - 'Identificamos las letras de la palabra SOL: $\{S, O, L\}$.'
  - 'Identificamos las letras de la palabra LUNA: $\{L, U, N, A\}$.'
  - Comparamos ambos conjuntos y encontramos la letra L en común.
  - Dado que comparten al menos un elemento, los conjuntos no son disjuntos.
- titulo: ¿El conjunto vacío $\\emptyset$ y el conjunto $C = \\{1, 2\\}$ son conjuntos no disjuntos?
  respuesta: 'No'
  solucion_pasos:
  - Para que sean no disjuntos, deben compartir al menos un elemento en común.
  - El conjunto vacío no tiene ningún elemento, por lo que es imposible que comparta elementos con $C$.
  - Su intersección es vacía ($C \cap \emptyset = \emptyset$), por lo que son conjuntos disjuntos, no
    no disjuntos.
errores_frecuentes:
- Pensar que "no disjuntos" significa que un conjunto debe estar completamente contenido dentro del otro.
  Solo basta con que compartan un elemento.
- Creer que si dos conjuntos son diferentes, automáticamente son disjuntos. Pueden ser diferentes y compartir
  elementos.
- No comprobar todos los elementos, pasando por alto elementos comunes implícitos (por ejemplo, en definiciones
  por comprensión).
- Confundir la cardinalidad de la unión con la de la intersección.
- Olvidar que el conjunto vacío nunca puede formar parte de una relación de no disjuntos con ningún conjunto.
fuente: Álgebra y Fundamentos, Universidad de Chile
estado: publicado
