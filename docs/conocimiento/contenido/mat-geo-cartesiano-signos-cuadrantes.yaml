semantic_id: MAT.GEO.CARTESIANO_BASE.SIGNOS_CUADRANTES
titulo: Identificación de signos de coordenadas según cuadrante
objetivo: Reconocer el patrón de signos (positivo o negativo) de la abscisa y la ordenada de un punto
  según el cuadrante en el que se ubica.
introduccion: Cada uno de los 4 cuadrantes tiene una combinación única de signos para las coordenadas
  x e y, lo que permite saber a qué cuadrante pertenece un punto solo mirando los signos de sus coordenadas.
resumen: 'Los signos de las coordenadas según el cuadrante son: cuadrante I (+,+), cuadrante II (-,+),
  cuadrante III (-,-) y cuadrante IV (+,-).'
explicacion: '![Signos de coordenadas según cuadrante](/static/img/geometria/cartesiano-vectores/cartesiano-signos-cuadrantes.svg)


  ### Definición formal


  Según el cuadrante, los signos de la abscisa (x) y la ordenada (y) de un punto siguen este patrón: cuadrante
  I: $x>0, y>0$; cuadrante II: $x<0, y>0$; cuadrante III: $x<0, y<0$; cuadrante IV: $x>0, y<0$.


  ### Desarrollo didáctico


  Este patrón permite determinar rápidamente el cuadrante de un punto sin necesidad de graficarlo: por
  ejemplo, el punto $(-5,3)$ tiene $x<0$ e $y>0$, por lo que pertenece al cuadrante II.'
procedimiento:
- 'Paso 1: Observa el signo de la coordenada x (abscisa) del punto.'
- 'Paso 2: Observa el signo de la coordenada y (ordenada) del punto.'
- 'Paso 3: Compara esa combinación de signos con el patrón de cada cuadrante (I: ++, II: -+, III: --,
  IV: +-) para determinar a cuál pertenece.'
ejemplos:
- titulo: Determinar el cuadrante a partir de los signos
  enunciado: Un punto tiene x negativo e y positivo.
  solucion_pasos:
  - Ese punto pertenece al cuadrante II, según el patrón de signos (-,+).
- titulo: Determinar los signos a partir del cuadrante
  enunciado: Un punto está en el cuadrante IV.
  solucion_pasos:
  - Su abscisa (x) es positiva y su ordenada (y) es negativa, según el patrón (+,-).
- titulo: ¿El cuadrante III tiene ambas coordenadas negativas?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, el patrón del cuadrante III es (-,-): tanto x como y son negativos.'
- titulo: ¿Se puede determinar el cuadrante de un punto sin graficarlo?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con observar los signos de sus coordenadas y compararlos con el patrón de cada cuadrante.
errores_frecuentes:
- Confundir el patrón de signos de un cuadrante con el de otro (por ejemplo, mezclar II y IV).
- Olvidar que el cuadrante I tiene ambas coordenadas positivas, no solo una de ellas.
- No verificar ambos signos (x e y) antes de concluir el cuadrante, revisando solo uno.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Baldor 292).'
estado: publicado
