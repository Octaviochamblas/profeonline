semantic_id: MAT.GEO.RECTA_RELACIONES.SISTEMA_INFINITAS_SOLUCIONES
titulo: Interpretación de sistema con infinitas soluciones como rectas coincidentes
objetivo: Interpretar que un sistema de dos ecuaciones lineales con infinitas soluciones corresponde geométricamente
  a dos rectas coincidentes, es decir, la misma recta escrita de dos formas distintas.
introduccion: Cuando dos ecuaciones aparentemente distintas describen en realidad la misma recta, cualquier
  punto de esa recta satisface ambas ecuaciones simultáneamente, dando infinitas soluciones.
resumen: 'Un sistema de dos ecuaciones lineales tiene infinitas soluciones si y solo si las rectas que
  representa son coincidentes: misma pendiente y mismo coeficiente de posición.'
explicacion: '![Sistema con infinitas soluciones](/static/img/geometria/analitica/rectarel-sistema-infinitas-soluciones.svg)


  ### Definición formal


  Si $m_1=m_2$ y $b_1=b_2$, ambas ecuaciones representan la misma recta, por lo que todo punto de ella
  satisface el sistema: hay infinitas soluciones.


  ### Desarrollo didáctico


  El sistema formado por $2x-2y+2=0$ y $x-y+1=0$ tiene infinitas soluciones, ya que ambas ecuaciones representan
  la misma recta $y=x+1$.'
procedimiento:
- 'Paso 1: Escribe ambas ecuaciones en forma principal.'
- 'Paso 2: Compara sus pendientes y coeficientes de posición.'
- 'Paso 3: Si ambos coinciden exactamente, el sistema tiene infinitas soluciones (rectas coincidentes).'
ejemplos:
- titulo: Determinar que un sistema tiene infinitas soluciones
  enunciado: 2x-2y+2=0, x-y+1=0.
  solucion_pasos:
  - 'Ambas ecuaciones se reducen a y=x+1: son la misma recta, por lo que el sistema tiene infinitas soluciones.'
- titulo: Verificar la identidad algebraica al intentar resolver
  enunciado: x+1=x+1.
  solucion_pasos:
  - Se obtiene una identidad siempre verdadera (0=0 tras simplificar), confirmando infinitas soluciones.
- titulo: ¿Un sistema con infinitas soluciones corresponde a rectas coincidentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente esa la interpretación geométrica.
- titulo: ¿Se puede distinguir un sistema con infinitas soluciones de uno sin solución solo mirando las
    pendientes?
  respuesta: 'No'
  solucion_pasos:
  - No, ambos casos comparten la misma pendiente; se debe comparar también el coeficiente de posición
    para distinguirlos.
errores_frecuentes:
- Confundir un sistema con infinitas soluciones con uno sin solución (ambos tienen la misma pendiente).
- No verificar el coeficiente de posición después de confirmar que las pendientes son iguales.
- Creer que 'infinitas soluciones' significa que cualquier punto del plano es solución (en realidad son
  solo los puntos de esa recta específica).
fuente: 'Elaboración propia (referencia: Carreño 184).'
estado: publicado
