semantic_id: MAT.ALG.FUNCION_REPRESENTACION.DIAGRAMA_SAGITAL
titulo: Representación mediante diagrama sagital
objetivo: Interpretar y construir diagramas sagitales, verificando si representan correctamente una función.
introduccion: 'Un diagrama sagital dibuja los dos conjuntos como nubes de puntos, y flechas que conectan
  cada elemento del dominio con su imagen: literalmente, "sagital" significa "de flechas".'
resumen: Un **diagrama sagital** representa una correspondencia entre dos conjuntos mediante flechas que
  van desde cada elemento del conjunto de partida hacia su imagen en el conjunto de llegada.
explicacion: '### Definición formal


  Un diagrama sagital de una correspondencia $f$ entre conjuntos $A$ y $B$ dibuja ambos conjuntos como
  colecciones de puntos, y traza una flecha desde cada $x \in A$ hacia cada elemento $y \in B$ tal que
  $(x,y) \in f$. Es función si y solo si de cada punto de $A$ sale exactamente una flecha.


  ### Desarrollo didáctico


  El criterio visual es simple: cuenta cuántas flechas salen de cada elemento del conjunto de partida.


  Si de algún elemento de $A$ no sale ninguna flecha, falla la existencia. Si de algún elemento salen
  dos o más flechas hacia elementos distintos de $B$, falla la unicidad. Si de cada elemento sale exactamente
  una flecha, el diagrama representa una función.'
procedimiento:
- 'Paso 1: Observa cada elemento del conjunto de partida (dominio).'
- 'Paso 2: Cuenta cuántas flechas salen de cada uno de esos elementos.'
- 'Paso 3: Si algún elemento no tiene flecha saliente, o tiene más de una, el diagrama no representa función.'
- 'Paso 4: Si cada elemento tiene exactamente una flecha saliente, es función.'
ejemplos:
- titulo: Diagrama con una flecha por elemento
  enunciado: En un diagrama sagital de $A=\{1,2,3\}$ a $B=\{4,5,6\}$, cada elemento de $A$ tiene exactamente
    una flecha saliente. ¿Representa una función?
  solucion_pasos:
  - Se cumple la condición de una sola flecha por elemento del dominio.
  - Representa una función.
- titulo: Diagrama con un elemento sin flecha
  enunciado: En un diagrama sagital de $A=\{1,2,3\}$ a $B$, el elemento 3 no tiene ninguna flecha saliente.
    ¿Representa una función?
  solucion_pasos:
  - Falla la condición de existencia, pues el elemento 3 no tiene imagen asignada.
  - No representa una función.
- titulo: ¿Puede una función tener dos flechas apuntando al mismo elemento de $B$?
  enunciado: ¿Puede una función tener dos flechas apuntando al mismo elemento de $B$?
  respuesta: Sí
  solucion_pasos:
  - Distintos elementos del dominio pueden compartir la misma imagen sin violar la definición de función.
- titulo: ¿Puede un elemento del dominio tener dos flechas salientes en una función?
  enunciado: ¿Puede un elemento del dominio tener dos flechas salientes en una función?
  respuesta: 'No'
  solucion_pasos:
  - Esto violaría directamente la condición de unicidad de imagen.
errores_frecuentes:
- Contar flechas que llegan a un elemento de $B$ en vez de contar las que salen de $A$.
- Confundir un elemento sin flecha saliente con un elemento sin flecha entrante.
- Asumir que todo elemento de $B$ debe recibir al menos una flecha.
- No revisar todos los elementos del dominio antes de concluir si es función.
