semantic_id: MAT.ALG.SUSTRACCION_POL.OPERACION_COMBINADA
titulo: Operación combinada de polinomios
objetivo: Resolver expresiones algebraicas que combinan adición y sustracción de varios polinomios.
introduccion: Las operaciones algebraicas rara vez se presentan de una en una. En una expresión real,
  puede haber que sumar y restar varios polinomios en secuencia. La clave es resolver en orden, convirtiendo
  siempre las restas en sumas del opuesto.
resumen: 'En una **Operación Combinada** con polinomios, se procesa cada signo entre ellos: los $+$ no
  alteran los signos interiores, los $-$ invierten todos los signos del polinomio que sigue.'
explicacion: '### Definición formal


  El signo $-$ exterior al paréntesis de C actúa como distribuidor, invirtiendo todos sus signos internos.


  ### Desarrollo didáctico


  Simplifica: $(3x^2 - x) + (x^2 + 4) - (2x^2 - 3x + 1)$.


  Eliminamos los agrupadores con sus reglas:

  - El $+$ no cambia nada: $3x^2 - x + x^2 + 4$.

  - El $-$ invierte el último: $-2x^2 + 3x - 1$.


  Juntos: $3x^2 - x + x^2 + 4 - 2x^2 + 3x - 1$.


  Reducimos por familias:

  - $x^2$: $3 + 1 - 2 = 2x^2$.

  - $x$: $-1 + 3 = 2x$.

  - Constante: $4 - 1 = 3$.


  Resultado: $2x^2 + 2x + 3$.'
procedimiento:
- 'Paso 1: Identifica todos los signos que preceden a cada paréntesis.'
- 'Paso 2: Elimina los paréntesis: conserva los signos si el exterior es $+$, invierte si es $-$.'
- 'Paso 3: Agrupa por familias.'
- 'Paso 4: Reduce cada familia.'
ejemplos:
- titulo: El combo algebraico
  enunciado: 'Simplifica: (5a + 3) - (2a - 1) + (a + 4).'
  solucion_pasos:
  - '+ (5a+3): 5a+3.'
  - '- (2a-1): -2a+1.'
  - '+ (a+4): a+4.'
  - 'Junto: 5a+3-2a+1+a+4.'
  - 'Familia a: 5-2+1=4a. Constante: 3+1+4=8.'
  - 'Resultado: 4a+8.'
- titulo: 'El saldo de una cuenta bancaria se modifica: al saldo inicial $S = 5000t$ se suma el depósit'
  enunciado: 'El saldo de una cuenta bancaria se modifica: al saldo inicial $S = 5000t$ se suma el depósito
    $(2000t + 300)$ y se restan los retiros $(3000t - 100)$. ¿Cuál es el saldo final? (v1)


    Opciones: A) $4000t + 400$ · B) $4000t - 400$ · C) $10000t + 400$ · D) $4000t + 200$'
  solucion_pasos:
  - '$S = 5000t + (2000t+300) - (3000t-100)$. Eliminamos: $5000t+2000t+300-3000t+100$. $t$: $5000+2000-3000=4000t$.
    Cte: $300+100=400$. Resultado: $4000t+400$.'
  - 'Respuesta: $4000t + 400$'
- titulo: 'Respecto de «Operación combinada de polinomios»: ¿Describe adecuadamente el concepto esta fr'
  enunciado: 'Respecto de «Operación combinada de polinomios»: ¿Describe adecuadamente el concepto esta
    frase? «En una **Operación Combinada** con polinomios, se procesa cada signo entre ellos: los $+$
    no alteran los signos interiores, los $-$ invierten todos los signos del polinomio que sigue»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: En una **Operación Combinada** con polinomios, se
    procesa cada signo entre ellos: los $+$ no alteran los signos interiores, los $-$ invierten todos
    los signos del polinomio que sigue.'
- titulo: 'Respecto de «Operación combinada de polinomios»: ¿Se puede aceptar esta afirmación? «Al habe'
  enunciado: 'Respecto de «Operación combinada de polinomios»: ¿Se puede aceptar esta afirmación? «Al
    haber múltiples signos externos, invertir solo los del primer signo negativo y olvidar los siguientes»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En una **Operación Combinada** con polinomios, se
    procesa cada signo entre ellos: los $+$ no alteran los signos interiores, los $-$ invierten todos
    los signos del polinomio que sigue.'
errores_frecuentes:
- Al haber múltiples signos externos, invertir solo los del primer signo negativo y olvidar los siguientes.
- No reducir completamente, dejando términos semejantes sin agrupar en el resultado.
- Para «En la expresión $(A) + (B) - (C)$, donde A, B y C son polinomios, ¿qué le ocurre a los términos
  de C al eliminar el paréntesis? (v1)», la respuesta correcta es Sus signos se conservan igual que los
  de A y B.
- Para «En la expresión $(A) + (B) - (C)$, donde A, B y C son polinomios, ¿qué le ocurre a los términos
  de C al eliminar el paréntesis? (v1)», la respuesta correcta es Se multiplican por el coeficiente de
  B.
- No cambia nada porque los paréntesis no afectan signos.
fuente: Álgebra de Baldor.
