semantic_id: MAT.FUND.CONECTIVOS_LOGICOS.CONJUNCION
titulo: Conjunción lógica
objetivo: Identificar y aplicar el conectivo de conjunción para formar proposiciones compuestas que son
  verdaderas solo cuando ambas partes son verdaderas
introduccion: 'Imagina que para salir a jugar necesitas dos cosas al mismo tiempo: que no llueva Y que
  hayas terminado la tarea. Si falta cualquiera de las dos, no puedes salir. Así funciona la conjunción
  en lógica: la proposición compuesta "p y q" es verdadera únicamente cuando ambas partes son verdaderas.

  '
resumen: 'La conjunción ($p \land q$) es el conectivo que une dos proposiciones con "y". El resultado
  es Verdadero únicamente cuando AMBAS proposiciones son Verdaderas; en cualquier otro caso, es Falso.

  '
explicacion: 'La **conjunción** es un conectivo binario que actúa sobre dos proposiciones.


  **Símbolo:** $p \land q$ (también escrito $p \cdot q$ o $p \& q$)


  **Lectura:** "p y q", "p pero q", "p además q"


  **Tabla de verdad:**


  | $p$ | $q$ | $p \land q$ |

  |-----|-----|-------------|

  | V   | V   | V           |

  | V   | F   | F           |

  | F   | V   | F           |

  | F   | F   | F           |


  **Regla clave:** La conjunción es Verdadera si y solo si AMBOS conjuntos son Verdaderos. Basta que una
  sea Falsa para que el resultado sea Falso.


  **Ejemplos lingüísticos:**

  - $p$: "Chile limita con Argentina." (V) $\land$ $q$: "El número 2 es par." (V) → $p \land q$ = V

  - $p$: "El sol es una estrella." (V) $\land$ $q$: "7 es un número par." (F) → $p \land q$ = F


  **Propiedad conmutativa:** $p \land q \equiv q \land p$


  **Propiedad asociativa:** $(p \land q) \land r \equiv p \land (q \land r)$

  '
procedimiento:
- Identificar las dos proposiciones simples $p$ y $q$, y determinar su valor de verdad individual.
- Formar la proposición compuesta $p \land q$.
- 'Aplicar la regla: $p \land q = V$ solo si $p = V$ Y $q = V$; en cualquier otro caso, $p \land q = F$.'
- Verificar que la interpretación lingüística tenga sentido semántico.
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'Sea $p$: "El número 6 es par" y $q$: "El número 6 es divisible por 3". ¿Cuál es el valor
    de verdad de $p \land q$?'
  solucion_pasos:
  - '$p$: "El número 6 es par" → Verdadero, pues $6 = 2 \cdot 3$.'
  - '$q$: "El número 6 es divisible por 3" → Verdadero, pues $6 \div 3 = 2$.'
  - Como $p = V$ y $q = V$, entonces $p \land q = V$.
- titulo: Ejemplo 2
  enunciado: 'Sea $p$: "El número 5 es par" y $q$: "El número 5 es impar". ¿Cuál es el valor de verdad
    de $p \land q$?'
  solucion_pasos:
  - '$p$: "El número 5 es par" → Falso, pues 5 no es divisible por 2.'
  - '$q$: "El número 5 es impar" → Verdadero.'
  - Como $p = F$ (sin importar el valor de $q$), entonces $p \land q = F$.
- titulo: ¿Es cierto que la conjunción $p \land q$ solo es Verdadera cuando ambas proposiciones son Verdaderas?
  respuesta: Sí
  solucion_pasos:
  - 'La tabla de verdad muestra cuatro filas posibles: VV, VF, FV, FF.'
  - Solo la fila V-V produce $p \land q = V$. Las tres restantes producen F.
- titulo: ¿Es $p \land q$ equivalente a $q \land p$?
  respuesta: Sí
  solucion_pasos:
  - 'La conjunción es conmutativa: el orden no altera el resultado.'
  - 'Verificación por tabla: en cada fila de la tabla de verdad, invertir el orden de $p$ y $q$ no cambia
    el valor de $p \land q$.'
errores_frecuentes:
- Creer que la conjunción es verdadera cuando al menos una proposición es verdadera (eso corresponde a
  la disyunción).
- Confundir el símbolo ∧ (conjunción) con ∨ (disyunción).
- Olvidar evaluar ambas proposiciones por separado antes de calcular la conjunción.
- Pensar que "p pero q" tiene un significado lógico diferente a "p y q" (ambas corresponden a la conjunción).
- Asumir que la conjunción de dos proposiciones falsas puede ser verdadera.
fuente: Lógica Proposicional — Fundamentos Matemáticos
estado: publicado
