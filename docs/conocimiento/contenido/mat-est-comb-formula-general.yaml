semantic_id: MAT.EST.COMBINACIONES.FORMULA_GENERAL
titulo: Aplicar la fórmula general de combinaciones C(n,r)
objetivo: Aplicar la fórmula general de combinaciones para calcular el número de formas de seleccionar
  r elementos de un total de n, sin importar el orden.
introduccion: La fórmula de combinaciones se obtiene a partir de la de variaciones, dividiendo por r!
  para eliminar los distintos órdenes posibles de cada selección.
resumen: El número de combinaciones de $n$ elementos distintos tomados de a $r$ es $C(n,r)=\dfrac{n!}{r!\,(n-r)!}$.
explicacion: '![Fórmula general de combinaciones](/static/img/probabilidad/comb/comb-formula-general.svg)


  ### Definición formal


  $C(n,r)=\dfrac{n!}{r!\,(n-r)!}$, donde $n$ es el total de elementos disponibles y $r$ es el tamaño de
  la selección, con $0\leq r\leq n$.


  ### Desarrollo didáctico


  Para elegir un comité de 3 personas de un grupo de 5: $C(5,3)=\dfrac{5!}{3!\,2!}=\dfrac{120}{6\times2}=\dfrac{120}{12}=10$
  comités distintos posibles.'
procedimiento:
- 'Paso 1: Identifica el total de elementos disponibles (n) y el tamaño de la selección (r).'
- 'Paso 2: Sustituye los valores en la fórmula C(n,r)=n!/(r!(n-r)!).'
- 'Paso 3: Calcula el resultado, simplificando los factoriales cuando sea posible para evitar cálculos
  innecesarios.'
ejemplos:
- titulo: Calcular C(5,3)
  enunciado: Elegir un comité de 3 personas de un grupo de 5.
  solucion_pasos:
  - C(5,3)=5!/(3!·2!)=120/12=10 comités distintos.
- titulo: Calcular C(6,2)
  enunciado: Elegir 2 representantes de un grupo de 6.
  solucion_pasos:
  - C(6,2)=6!/(2!·4!)=720/48=15.
- titulo: ¿La fórmula de combinaciones divide por r! respecto de la de variaciones?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que se elimina el conteo de los distintos órdenes posibles de una misma selección.
- titulo: ¿C(n,r) siempre da un número entero?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que representa un conteo de casos posibles, siempre resulta en un valor entero.
errores_frecuentes:
- Olvidar dividir por r!, calculando en realidad una variación en vez de una combinación.
- Confundir los valores de n y r al sustituir en la fórmula.
- Cometer errores aritméticos al simplificar los factoriales del numerador y denominador.
fuente: 'Elaboración propia (referencia: Baldor 375, Moraleja 300).'
estado: publicado
