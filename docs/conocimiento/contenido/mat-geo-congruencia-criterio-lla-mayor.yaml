semantic_id: MAT.GEO.CONGRUENCIA_TRIANGULOS.CRITERIO_LLA_MAYOR
titulo: 'Criterio de congruencia LLA mayor: dos lados y el ángulo opuesto al lado mayor'
objetivo: Aplicar el criterio LLA mayor para determinar congruencia cuando se conocen dos lados y el ángulo
  opuesto al lado de mayor longitud.
introduccion: 'A diferencia de LAL, existe un caso especial donde el ángulo conocido no está comprendido
  entre los dos lados, pero aun así garantiza congruencia: cuando ese ángulo es opuesto al lado mayor
  de los dos conocidos.'
resumen: El criterio LLA mayor establece que dos triángulos son congruentes si tienen dos lados correspondientes
  iguales y el ángulo opuesto al lado de mayor longitud (de esos dos) también es igual.
explicacion: '![Criterio de congruencia LLA mayor](/static/img/geometria/congruencia-semejanza/congruencia-criterio-lla-mayor.svg)


  ### Definición formal


  Si en $\triangle ABC$ y $\triangle A''B''C''$ se cumple $AB=A''B''$, $BC=B''C''$ (con $BC>AB$) y $\angle
  A=\angle A''$ (el ángulo opuesto al lado mayor BC), entonces $\triangle ABC\cong\triangle A''B''C''$.


  ### Desarrollo didáctico


  A diferencia de un caso general "lado-lado-ángulo no comprendido" (que en general NO garantiza congruencia,
  por la ambigüedad conocida como caso ambiguo), cuando el ángulo conocido es específicamente el opuesto
  al lado mayor de los dos, la ambigüedad desaparece y sí se garantiza congruencia.'
procedimiento:
- 'Paso 1: Identifica los dos lados conocidos y determina cuál es el de mayor longitud.'
- 'Paso 2: Verifica que el ángulo conocido sea exactamente el opuesto a ese lado mayor.'
- 'Paso 3: Si los dos lados y ese ángulo opuesto al mayor coinciden en ambos triángulos, concluye congruencia
  por LLA mayor.'
ejemplos:
- titulo: Verificar congruencia con LLA mayor
  enunciado: Dos triángulos tienen lados 6 y 9 (9 es el mayor), con ángulo opuesto al lado 9 igual a 70°
    en ambos.
  solucion_pasos:
  - Son congruentes por el criterio LLA mayor.
- titulo: Reconocer el caso ambiguo si el ángulo no es opuesto al mayor
  enunciado: Dos triángulos comparten dos lados iguales y un ángulo opuesto al lado menor.
  solucion_pasos:
  - Ese caso es ambiguo en general y no garantiza congruencia por sí solo.
- titulo: ¿Este criterio requiere que el ángulo sea opuesto al lado mayor específicamente?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la condición que elimina la ambigüedad.
- titulo: ¿LLA mayor es lo mismo que LAL?
  respuesta: 'No'
  solucion_pasos:
  - No, en LAL el ángulo está comprendido entre los dos lados; en LLA mayor, el ángulo es opuesto a uno
    de ellos (el mayor).
errores_frecuentes:
- Aplicar este criterio cuando el ángulo conocido es opuesto al lado menor, no al mayor.
- Confundir este criterio con el caso ambiguo lado-lado-ángulo (que no garantiza congruencia en general).
- Olvidar verificar cuál de los dos lados es realmente el mayor antes de aplicar el criterio.
fuente: 'Fuente: Cid 58.'
estado: publicado
