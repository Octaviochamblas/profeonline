semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.DIFERENCIA_CANTIDADES
objetivo: Traducir la diferencia o resta entre dos cantidades algebraicas.
introduccion: Si tú mides 1.80m y tu amigo 1.70m, ¿cuál es la diferencia de altura? La respuesta la da la operación
  de resta. En álgebra, la diferencia compara la distancia entre dos variables.
resumen: La **Diferencia de Cantidades** se traduce utilizando el signo de sustracción ($-$). A diferencia de la
  suma, **el orden sí importa**, por lo que se debe respetar quién es el minuendo (el que va primero) y quién el
  sustraendo (el que resta).
explicacion: '### Definición formal


  Si traduces ''3 restado de x'' como 3 - x (está mal, es x - 3). Como la resta no es conmutativa, el error de traducción
  lleva a un error de cálculo.


  ### Desarrollo didáctico


  Palabras clave:

  - La diferencia entre

  - Menos

  - Restado a

  - Restado de


  Ejemplos clásicos:

  - ''La diferencia entre dos números'': $x - y$

  - ''El sueldo de Ana menos los gastos'': $S - G$


  *La Trampa Mortal del Lenguaje:* Cuidado con el orden de la palabra ''restado de''.

  - ''Si a $x$ le restamos $5$'' $\rightarrow$ $x - 5$.

  - ''Si $5$ es restado DE un número $x$'' $\rightarrow$ el número inicial es $x$, por lo tanto la traducción es
  $x - 5$. El que va después del ''DE'' es el dueño de la cantidad principal.'
procedimiento:
- 'Paso 1: Identifica las variables involucradas.'
- 'Paso 2: Lee atentamente para descubrir de quién es la cantidad inicial (quién va a sufrir la resta).'
- 'Paso 3: Coloca esa cantidad inicial a la izquierda del signo menos (-), y la cantidad que se quita, a la derecha.'
- Si traduces '3 restado de x' como 3 - x (está mal, es x - 3). Como la resta no es conmutativa, el error de traducción
  lleva a un error de cálculo.
ejemplos:
- titulo: El orden altera el producto
  enunciado: 'Traduce algebraicamente: ''Seis restado de un número cualquiera''.'
  solucion_pasos:
  - La palabra 'de' nos dice que el 'número cualquiera' es nuestro punto de partida. Lo llamamos x.
  - La cantidad 'seis' es lo que estamos quitando.
  - 'Traducción correcta: x - 6. (Escribir 6 - x sería ''un número restado de seis'').'
- titulo: 'En el examen de admisión, el problema plantea: ''Las ganancias líquidas de una empresa equiva'
  enunciado: 'En el examen de admisión, el problema plantea: ''Las ganancias líquidas de una empresa equivalen a
    sus costos fijos ($C$) restados de sus ingresos totales ($I$)''. Un estudiante apurado escribe la ecuación de
    ganancias como $G = C - I$ y entrega la prueba. ¿Qué consecuencia tendrá su error de traducción? (v1)


    Opciones: A) Su modelo calculará pérdidas financieras constantes en lugar de ganancias, ya que invirtió el orden
    de la resta al no respetar la preposición ''de''. · B) Ninguna, porque al igual que la suma, el orden de la
    resta no altera el resultado de las ganancias. · C) Su modelo calculará una multiplicación entre costos e ingresos.
    · D) El modelo fallará porque las variables C e I debieron sumarse para hallar ganancias líquidas.'
  solucion_pasos:
  - El enunciado dice 'costos fijos (C) restados DE sus ingresos (I)'. Es decir, partimos de I, y quitamos C. La
    ecuación correcta era $G = I - C$. Al escribir $C - I$, calculó un número negativo (pérdida).
  - 'Respuesta: Su modelo calculará pérdidas financieras constantes en lugar de ganancias, ya que invirtió el orden
    de la resta al no respetar la preposición ''de''.'
- titulo: 'Respecto de «Traducción de la diferencia entre dos cantidades»: ¿Se ajusta a la definición e'
  enunciado: 'Respecto de «Traducción de la diferencia entre dos cantidades»: ¿Se ajusta a la definición esta afirmación?
    «La **Diferencia de Cantidades** se traduce utilizando el signo de sustracción ($-$)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Diferencia de Cantidades** se traduce utilizando el signo
    de sustracción ($-$).'
- titulo: 'Respecto de «Traducción de la diferencia entre dos cantidades»: ¿Es compatible con el proced'
  enunciado: 'Respecto de «Traducción de la diferencia entre dos cantidades»: ¿Es compatible con el procedimiento
    esta afirmación? «Traducir en el mismo orden de lectura sin analizar. (Ej: ''Cinco restado de $x$'' traducido
    equivocadamente como $5 - x$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Diferencia de Cantidades** se traduce utilizando el signo
    de sustracción ($-$).'
errores_frecuentes:
- 'Traducir en el mismo orden de lectura sin analizar. (Ej: ''Cinco restado de $x$'' traducido equivocadamente como
  $5 - x$).'
- Asumir que 'la diferencia' siempre será positiva; en álgebra abstracta $x - y$ puede dar resultados negativos.
- Porque 'restado de' indica una división, mientras que 'menos' indica una resta convencional.
- Porque 'restado de' se usa exclusivamente para números enteros negativos.
- Porque 'restado de' indica que el resultado siempre será un número irracional.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción de la diferencia entre dos cantidades
