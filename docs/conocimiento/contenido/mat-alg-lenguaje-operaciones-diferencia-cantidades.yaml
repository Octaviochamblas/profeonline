semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.DIFERENCIA_CANTIDADES
objetivo: Traducir la diferencia o resta entre dos cantidades algebraicas.
introduccion: Si tú mides 1.80m y tu amigo 1.70m, ¿cuál es la diferencia de altura?
  La respuesta la da la operación de resta. En álgebra, la diferencia compara la distancia
  entre dos variables.
resumen: La **Diferencia de Cantidades** se traduce utilizando el signo de sustracción
  ($-$). A diferencia de la suma, **el orden sí importa**, por lo que se debe respetar
  quién es el minuendo (el que va primero) y quién el sustraendo (el que resta).
explicacion: 'Palabras clave:

  - La diferencia entre

  - Menos

  - Restado a

  - Restado de


  Ejemplos clásicos:

  - ''La diferencia entre dos números'': $x - y$

  - ''El sueldo de Ana menos los gastos'': $S - G$


  *La Trampa Mortal del Lenguaje:* Cuidado con el orden de la palabra ''restado de''.

  - ''Si a $x$ le restamos $5$'' $\rightarrow$ $x - 5$.

  - ''Si $5$ es restado DE un número $x$'' $\rightarrow$ el número inicial es $x$,
  por lo tanto la traducción es $x - 5$. ¡El que va después del ''DE'' es el dueño
  de la cantidad principal!'
procedimiento:
- 'Paso 1: Identifica las variables involucradas.'
- 'Paso 2: Lee atentamente para descubrir de quién es la cantidad inicial (quién va
  a sufrir la resta).'
- 'Paso 3: Coloca esa cantidad inicial a la izquierda del signo menos (-), y la cantidad
  que se quita, a la derecha.'
ejemplos:
- titulo: El orden altera el producto
  enunciado: 'Traduce algebraicamente: ''Seis restado de un número cualquiera''.'
  solucion_pasos:
  - La palabra 'de' nos dice que el 'número cualquiera' es nuestro punto de partida.
    Lo llamamos x.
  - La cantidad 'seis' es lo que estamos quitando.
  - 'Traducción correcta: x - 6. (Escribir 6 - x sería ''un número restado de seis'').'
errores_frecuentes:
- 'Traducir en el mismo orden de lectura sin analizar. (Ej: ''Cinco restado de $x$''
  traducido equivocadamente como $5 - x$).'
- Asumir que 'la diferencia' siempre será positiva; en álgebra abstracta $x - y$ puede
  dar resultados negativos.
fuente: Álgebra de Baldor.
estado: publicado
