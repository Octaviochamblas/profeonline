semantic_id: 'MAT.ALG.OPERACIONES_FRACCIONES.SUMA_DISTINTO_DENOMINADOR'
titulo: 'Suma y Resta con Diferentes Denominadores'
objetivo: 'Amplificar fracciones con denominadores distintos para igualarlos a un común denominador y luego sumar/restar.'
introduccion: |
  Aquí juntamos todo. Si las fracciones tienen denominadores diferentes, no puedes sumarlas. Tienes que convertirlas, mediante amplificación, para que hablen el mismo idioma (el Mínimo Común Denominador).
resumen: |
  Para sumar o restar fracciones con diferente denominador: halla el Mínimo Común Denominador (MCD). Amplifica el numerador de cada fracción multiplicándolo por los factores que le faltan a su denominador original para ser igual al MCD. Finalmente, suma los nuevos numeradores.
explicacion: |
  Suma: $\frac{2}{x} + \frac{5}{x+1}$

  1. **Hallar el MCD:** Los denominadores son $x$ y $(x+1)$. No comparten factores. MCD = $x(x+1)$.

  2. **Amplificar la primera fracción ($\frac{2}{x}$):**
     Su denominador es $x$. ¿Qué le falta para ser $x(x+1)$? Le falta el $(x+1)$.
     Multiplicamos su numerador por eso: $2 \cdot (x+1) = 2x + 2$.

  3. **Amplificar la segunda fracción ($\frac{5}{x+1}$):**
     Su denominador es $(x+1)$. ¿Qué le falta para ser $x(x+1)$? Le falta la $x$.
     Multiplicamos su numerador por eso: $5 \cdot x = 5x$.

  4. **Unir y Sumar:**
     Ahora ambas están sobre $x(x+1)$.
     Numerador final: $(2x + 2) + 5x = 7x + 2$.

  Resultado: $\frac{7x + 2}{x(x+1)}$.
procedimiento:
  - 'Paso 1: Factoriza los denominadores y halla el Mínimo Común Denominador.'
  - 'Paso 2: Escribe una línea fraccionaria larga con el nuevo MCD abajo.'
  - 'Paso 3: Para cada fracción original, pregúntate: ''¿Por qué factor tuve que multiplicar su denominador viejo para llegar al nuevo MCD?'''
  - 'Paso 4: Multiplica el numerador de esa fracción por ese mismo factor.'
  - 'Paso 5: Suma (o resta) todos los nuevos numeradores que obtuviste. Reduce términos semejantes.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Suma $\frac{1}{a} + \frac{1}{b}$.'
    solucion_pasos:
    - 'MCD es $ab$.'
    - 'A la primera fracción le falta ''b''. Arriba queda $1 \cdot b = b$.'
    - 'A la segunda le falta ''a''. Arriba queda $1 \cdot a = a$.'
    - 'Resultado: $\frac{b + a}{ab}$.'
  - titulo: 'Resta $x - \frac{1}{x}$.'
    respuesta: '$\frac{x^2 - 1}{x}$'
    solucion_pasos:
    - 'La ''x'' solita es x/1. El MCD es ''x''. Amplificamos la ''x'' por ''x'' queda x^2. La otra ya tiene la x. Queda (x^2 - 1)/x.'
errores_frecuentes:
  - 'Olvidar multiplicar el numerador al cambiar el denominador.'
  - 'Sumar cruzado tipo $A \cdot D + B \cdot C$ sin buscar el mínimo común múltiplo cuando los denominadores tienen factores en común (hace el ejercicio el triple de largo y propenso a errores).'
estado: publicado
