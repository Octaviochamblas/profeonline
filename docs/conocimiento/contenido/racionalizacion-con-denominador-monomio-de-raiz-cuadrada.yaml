semantic_id: MAT.NUM.RACIONALIZACION.DENOMINADOR_MONOMIO_RAIZ_CUADRADA
titulo: Racionalización con denominador monomio de raíz cuadrada
objetivo: Racionalizar un monomio con raíz cuadrada.
introduccion: Una fracción puede ser correcta y aun así tener un radical incómodo en el denominador. Multiplicar
  por una forma de uno traslada ese radical al numerador.
resumen: Racionalizar un denominador \(\sqrt a\) consiste en multiplicar por \(\sqrt a/\sqrt a\). El valor
  no cambia porque se multiplica por uno.
explicacion: 'Racionalizar un denominador \(\sqrt a\) consiste en multiplicar por \(\sqrt a/\sqrt a\).


  La situación “\(\frac3{\sqrt5}=\frac{3\sqrt5}{5}\)” permite comprobar, y no solo memorizar, que el valor
  no cambia porque se multiplica por uno'
procedimiento:
- 'Paso 1: Identifica el radical del denominador y comprueba que no sea cero.'
- 'Paso 2: Multiplica numerador y denominador por la misma raíz.'
- 'Paso 3: Simplifica el cuadrado del radical y reduce la fracción final.'
ejemplos:
- titulo: Aplicación razonada — Racionalización con denominador monomio de raíz cuadrada
  enunciado: \(\frac3{\sqrt5}=\frac{3\sqrt5}{5}\).
  solucion_pasos:
  - Identifica el radical del denominador y comprueba que no sea cero.
  - Multiplica numerador y denominador por la misma raíz.
  - Simplifica el cuadrado del radical y reduce la fracción final.
- titulo: Revisión de una solución — Racionalización con denominador monomio de raíz cuadrada
  enunciado: Una solución aplica “Multiplica numerador y denominador por la misma raíz.”, pero termina
    sin comprobar que el valor no cambia porque se multiplica por uno. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define racionalización con denominador monomio de raíz cuadrada: racionalizar
    un denominador \(\sqrt a\) consiste en multiplicar por \(\sqrt a/\sqrt a\).'
  - Identifica el radical del denominador y comprueba que no sea cero.
  - 'Completa la revisión con este control: Simplifica el cuadrado del radical y reduce la fracción final.'
- titulo: ¿Se cumple que el valor no cambia porque se multiplica por uno? — Racionalización con denominador
    monomio de raíz cuadrada
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que racionalizar un denominador \(\sqrt a\) consiste en multiplicar
    por \(\sqrt a/\sqrt a\).
  - El caso “\(\frac3{\sqrt5}=\frac{3\sqrt5}{5}\)” satisface esa condición.
  - Simplifica el cuadrado del radical y reduce la fracción final.
- titulo: ¿Es válido omitir el paso “Identifica el radical del denominador y comprueba que no sea cero”?
    — Racionalización con denominador monomio de raíz cuadrada
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de racionalización con denominador monomio de raíz
    cuadrada.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica numerador y denominador por la misma
    raíz.'
  - 'La solución debe terminar de este modo: Simplifica el cuadrado del radical y reduce la fracción final.'
errores_frecuentes:
- 'Confundir racionalización con denominador monomio de raíz cuadrada con otro concepto y omitir este
  inicio: Identifica el radical del denominador y comprueba que no sea cero.'
- Aplicar mecánicamente “Multiplica numerador y denominador por la misma raíz.” sin revisar las condiciones
  de la definición.
- Tomar “\(\frac3{\sqrt5}=\frac{3\sqrt5}{5}\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el valor no cambia porque se multiplica por uno”.
- 'Terminar el desarrollo sin realizar este control: Simplifica el cuadrado del radical y reduce la fracción
  final.'
