semantic_id: MAT.ALG.FACTOR_COMUN.CONCEPTO_FACTORIZAR
titulo: Definición de factorizar como proceso inverso al producto
objetivo: Comprender factorizar como proceso inverso al producto y justificar el procedimiento algebraico.
introduccion: Desarrollar transforma un producto en una suma; factorizar recorre el camino inverso. Reconocer esta
  relación permite expresar un polinomio mediante factores más simples.
resumen: Factorizar es el proceso inverso a multiplicar, transformando sumas en productos.
explicacion: '### Definición formal


  Factorizar un polinomio $P$ consiste en expresarlo como un producto de dos o más factores $P = F_1 \cdot F_2
  \cdots F_k$ que, al distribuirse nuevamente, reconstruyen exactamente $P$; es la operación inversa de la multiplicación/distribución
  de expresiones algebraicas.


  ### Desarrollo didáctico


  Es la única que es un producto completo entre $3$ y el binomio $(x+2)$.


  Así como $15 = 3 \cdot 5$, el polinomio se descompone en bloques multiplicativos.


  El lado que consta de multiplicaciones es la forma factorizada.'
procedimiento:
- Es la única que es un producto completo entre $3$ y el binomio $(x+2)$.
- Así como $15 = 3 \cdot 5$, el polinomio se descompone en bloques multiplicativos.
- El lado que consta de multiplicaciones es la forma factorizada.
ejemplos:
- titulo: La operación inversa de factorizar es distribuir (multiplicar)
  enunciado: ¿La operación inversa de factorizar es distribuir (multiplicar)?
  solucion_pasos:
  - Efectivamente, expandir/distribuir es lo opuesto a factorizar.
  - 'Respuesta: Verdadero'
- titulo: La expresión $2(x+3) + y(x+3)$ se considera un polinomio completamente factorizado
  enunciado: ¿La expresión $2(x+3) + y(x+3)$ se considera un polinomio completamente factorizado?
  solucion_pasos:
  - Es una suma de dos grandes términos, aún se debe factorizar el factor común $(x+3)$.
  - 'Respuesta: Falso'
- titulo: 'Respecto de «Definición de factorizar como proceso inverso al producto»: ¿Se ajusta a la def'
  enunciado: 'Respecto de «Definición de factorizar como proceso inverso al producto»: ¿Se ajusta a la definición
    esta afirmación? «Factorizar es el proceso inverso a multiplicar, transformando sumas en productos»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Factorizar es el proceso inverso a multiplicar, transformando
    sumas en productos.'
- titulo: 'Respecto de «Definición de factorizar como proceso inverso al producto»: ¿Es compatible con'
  enunciado: 'Respecto de «Definición de factorizar como proceso inverso al producto»: ¿Es compatible con el procedimiento
    esta afirmación? «Multiplicar todos sus términos»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Factorizar es el proceso inverso a multiplicar, transformando
    sumas en productos.'
errores_frecuentes:
- Multiplicar todos sus términos.
- Encontrar el valor numérico de la variable.
- Sumar sus términos semejantes.
- $3x + 6$.
- $x^2 + 2x + 1$.
