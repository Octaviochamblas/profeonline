semantic_id: MAT.GEO.TRIANGULOS_METRICA.LADO_MAYOR_ANGULO_MAYOR
titulo: Correspondencia entre mayor lado y mayor ángulo opuesto en un triángulo
objetivo: Reconocer que, dado el lado más largo de un triángulo, su ángulo opuesto es el mayor de los
  tres.
introduccion: 'Esta es la misma correspondencia entre lados y ángulos vista desde el otro sentido: partiendo
  del lado más largo, se puede afirmar cuál es el ángulo más grande sin medirlo.'
resumen: En todo triángulo, al lado de mayor longitud se opone el ángulo interior de mayor medida.
explicacion: '![Lado mayor opuesto a ángulo mayor](/static/img/geometria/triangulos/triangulos-metrica-lado-mayor-angulo-mayor.svg)


  ### Definición formal


  En un triángulo ABC, si el lado AB=c es el mayor de los tres lados, entonces el ángulo opuesto a c,
  que es γ (en C), es el mayor de los tres ángulos interiores.


  ### Desarrollo didáctico


  Si un triángulo tiene lados 10, 7 y 5, el lado mayor es 10; el ángulo opuesto a ese lado es, por esta
  propiedad, el ángulo más grande del triángulo, sin necesidad de calcularlo primero.'
procedimiento:
- 'Paso 1: Identifica el lado de mayor longitud en el triángulo.'
- 'Paso 2: Ubica el ángulo opuesto a ese lado (el vértice que no lo toca).'
- 'Paso 3: Ese ángulo es, por esta propiedad, el mayor de los tres.'
ejemplos:
- titulo: Identificar el ángulo mayor por el lado
  enunciado: Un triángulo tiene lados 10, 7 y 5.
  solucion_pasos:
  - El lado mayor es 10; su ángulo opuesto es el ángulo más grande del triángulo.
- titulo: Ordenar ángulos por lados
  enunciado: Un triángulo tiene lados 6, 8 y 9.
  solucion_pasos:
  - El ángulo opuesto al lado 9 es el mayor; el opuesto al lado 6 es el menor.
- titulo: ¿El ángulo opuesto al lado más corto es el más pequeño?
  respuesta: Sí
  solucion_pasos:
  - Sí, por la misma correspondencia entre orden de lados y de ángulos.
- titulo: ¿Esta propiedad depende de que el triángulo sea isósceles?
  respuesta: 'No'
  solucion_pasos:
  - No, se cumple en todo triángulo, sea escaleno, isósceles o equilátero.
errores_frecuentes:
- Ubicar el ángulo adyacente al lado en vez del ángulo opuesto.
- 'Invertir el orden: creer que el lado mayor se opone al ángulo menor.'
- Aplicar esta propiedad solo a triángulos rectángulos, cuando es general.
fuente: Elaboración propia.
estado: publicado
