semantic_id: MAT.GEO.RELACIONES_TR.CALCULO_ALTURA
titulo: Cálculo de la altura sobre la hipotenusa a partir de las proyecciones de los catetos
objetivo: Aplicar la relación de la altura como media geométrica para resolver problemas numéricos concretos.
introduccion: Con la relación h²=m·n ya establecida, se puede aplicar directamente para calcular la altura
  sobre la hipotenusa cuando se conocen las dos proyecciones de los catetos.
resumen: Para calcular la altura sobre la hipotenusa conocidas las dos proyecciones, se multiplican ambas
  y se extrae la raíz cuadrada.
explicacion: '![Cálculo de la altura desde las proyecciones](/static/img/geometria/areas-pitagoras/relaciones-tr-calculo-altura.svg)


  ### Definición formal


  Si las proyecciones son $m=6$ y $n=24$, la altura es $h=\sqrt{6\times24}=\sqrt{144}=12$.


  ### Desarrollo didáctico


  Este cálculo es una aplicación numérica directa de la relación $h^2=m\cdot n$, útil cuando se conocen
  las dos proyecciones pero no directamente los catetos ni la hipotenusa.'
procedimiento:
- 'Paso 1: Identifica las dos proyecciones de los catetos sobre la hipotenusa.'
- 'Paso 2: Multiplica ambas proyecciones.'
- 'Paso 3: Calcula la raíz cuadrada del producto: esa es la altura sobre la hipotenusa.'
ejemplos:
- titulo: Calcular con proyecciones 6 y 24
  enunciado: Las proyecciones de los catetos son 6 y 24.
  solucion_pasos:
  - h=√(6×24)=√144=12.
- titulo: Calcular con proyecciones 2 y 50
  enunciado: Las proyecciones de los catetos son 2 y 50.
  solucion_pasos:
  - h=√(2×50)=√100=10.
- titulo: ¿Esta fórmula requiere conocer los catetos directamente?
  respuesta: 'No'
  solucion_pasos:
  - No, solo requiere las dos proyecciones.
- titulo: ¿El resultado puede ser mayor que ambas proyecciones a la vez?
  respuesta: 'No'
  solucion_pasos:
  - No, la media geométrica de dos números siempre queda entre ambos (o es igual si son iguales).
errores_frecuentes:
- Sumar las proyecciones en vez de multiplicarlas.
- Confundir esta relación con la del cateto (que usa la hipotenusa, no la otra proyección).
- Olvidar la raíz cuadrada final.
fuente: Elaboración propia.
estado: publicado
