semantic_id: MAT.GEO.SIMETRIAS.AXIAL_RECTA
titulo: Simetría axial respecto de una recta
objetivo: Reconocer la simetría axial respecto de una recta como la transformación que refleja cada punto
  al otro lado de esa recta, actuando como un espejo.
introduccion: 'La simetría axial funciona como un espejo: la recta de simetría (eje) refleja cada punto
  hacia el lado opuesto, a la misma distancia perpendicular.'
resumen: La simetría axial respecto de una recta $L$ (el eje de simetría) transforma cada punto $P$ en
  un punto $P'$ tal que $L$ es la mediatriz del segmento $PP'$ (perpendicular a $PP'$ y que pasa por su
  punto medio).
explicacion: '![Simetría axial respecto de una recta](/static/img/geometria/isometrias/simetria-axial-recta.svg)


  ### Definición formal


  Dada una recta $L$ (el eje), la simetría axial transforma cada punto $P$ en $P''$ tal que $L$ es la
  mediatriz del segmento $PP''$: la recta $L$ es perpendicular a $PP''$ y pasa exactamente por su punto
  medio.


  ### Desarrollo didáctico


  En la figura, la recta diagonal (eje de simetría) actúa como espejo: el punto $P$ y su imagen $P''$
  están a la misma distancia perpendicular de la recta, uno a cada lado.'
procedimiento:
- 'Paso 1: Identifica la recta L que actuará como eje de simetría.'
- 'Paso 2: Traza la perpendicular desde el punto P hacia la recta L.'
- 'Paso 3: Ubica P'' sobre esa perpendicular, al otro lado de L, a la misma distancia que P.'
ejemplos:
- titulo: Identificar una simetría axial respecto de una recta diagonal
  enunciado: La recta y=x actúa como eje de simetría.
  solucion_pasos:
  - Un punto P(a,b) se refleja en P'(b,a), intercambiando sus coordenadas, ya que la recta y=x es la mediatriz
    de PP'.
- titulo: Verificar la propiedad de la mediatriz
  enunciado: Se traza el segmento PP' respecto de un eje de simetría L.
  solucion_pasos:
  - L debe ser perpendicular a PP' y pasar exactamente por su punto medio, cumpliendo la definición de
    mediatriz.
- titulo: ¿La distancia de P al eje es igual a la distancia de P' al eje?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, esa es la propiedad esencial de la simetría axial: equidistancia respecto del eje.'
- titulo: ¿Un punto que está sobre el eje de simetría es su propia imagen?
  respuesta: Sí
  solucion_pasos:
  - Sí, cualquier punto sobre el eje de simetría no se mueve, ya que coincide con su propia imagen.
errores_frecuentes:
- Confundir la simetría axial con la simetría central (respecto de un punto, no de una recta).
- No trazar correctamente la perpendicular al eje al ubicar el punto imagen.
- Olvidar que la distancia de P al eje debe ser igual a la distancia de P' al eje.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 127, Cid 73).'
estado: publicado
