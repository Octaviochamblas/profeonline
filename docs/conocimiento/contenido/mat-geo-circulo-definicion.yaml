semantic_id: MAT.GEO.CIRCULO_ELEMENTOS.CIRCULO_DEFINICION
titulo: Definición de círculo como región interior delimitada por una circunferencia
objetivo: Comprender el círculo como la región plana completa delimitada por una circunferencia, incluyendo
  todos sus puntos interiores.
introduccion: A diferencia de la circunferencia (solo la línea), existe un concepto relacionado que incluye
  toda la superficie encerrada por ella.
resumen: Un círculo es la región plana formada por todos los puntos de una circunferencia junto con todos
  los puntos de su interior.
explicacion: '![Círculo: región interior delimitada por la circunferencia](/static/img/geometria/circunferencia-circulo/circulo-definicion.svg)


  ### Definición formal


  Dado un centro $O$ y un radio $r$, el círculo es el conjunto de puntos $P$ del plano tales que $\overline{OP}\leq
  r$ (a diferencia de la circunferencia, que exige igualdad exacta).


  ### Desarrollo didáctico


  Esta distinción es análoga a la diferencia entre el perímetro y el área de cualquier figura: la circunferencia
  es como el perímetro (una línea, una medida de longitud), mientras que el círculo es como el área (una
  región, una medida de superficie).'
procedimiento:
- 'Paso 1: Identifica la circunferencia que delimita la región.'
- 'Paso 2: Considera todos los puntos dentro de esa circunferencia, además de los puntos de la circunferencia
  misma.'
- 'Paso 3: El conjunto de todos esos puntos (borde e interior) forma el círculo.'
ejemplos:
- titulo: Identificar un círculo
  enunciado: Se considera toda la superficie de una moneda circular, incluyendo su interior.
  solucion_pasos:
  - Es un círculo, ya que incluye tanto el borde como la región interior.
- titulo: Distinguir círculo de circunferencia
  enunciado: Solo se considera el borde de la moneda, sin su interior.
  solucion_pasos:
  - Es una circunferencia, no un círculo, ya que solo es la línea del borde.
- titulo: ¿El círculo se mide en unidades de longitud o de área?
  respuesta: De área
  solucion_pasos:
  - De área, ya que representa una región de superficie plana.
- titulo: ¿La circunferencia se mide en unidades de longitud o de área?
  respuesta: De longitud
  solucion_pasos:
  - De longitud, ya que representa una línea curva.
errores_frecuentes:
- Confundir el círculo con la circunferencia, tratándolos como sinónimos.
- Aplicar fórmulas de longitud (como 2πr) al círculo, en vez de fórmulas de área (πr²).
- Aplicar fórmulas de área (πr²) a la circunferencia, en vez de fórmulas de longitud (2πr).
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
