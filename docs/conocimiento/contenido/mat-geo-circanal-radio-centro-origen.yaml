semantic_id: MAT.GEO.CIRCUNFERENCIA_ANALITICA.RADIO_CENTRO_ORIGEN
titulo: Identificación del radio en una circunferencia con centro en el origen
objetivo: Identificar el radio de una circunferencia centrada en el origen a partir de su ecuación x²+y²=k,
  calculando la raíz cuadrada de k.
introduccion: El valor k en la ecuación x²+y²=k no es el radio directamente, sino el cuadrado del radio,
  por lo que se necesita extraer la raíz cuadrada para obtenerlo.
resumen: En la ecuación $x^2+y^2=k$ (con $k>0$), el radio de la circunferencia es $r=\sqrt{k}$.
explicacion: '![Radio en circunferencia con centro en el origen](/static/img/geometria/analitica/circanal-radio-centro-origen.svg)


  ### Definición formal


  Comparando $x^2+y^2=k$ con la forma general $x^2+y^2=r^2$, se identifica que $r^2=k$, por lo que $r=\sqrt{k}$.


  ### Desarrollo didáctico


  Para la ecuación $x^2+y^2=16$: comparando con $r^2=16$, se obtiene $r=\sqrt{16}=4$.'
procedimiento:
- 'Paso 1: Identifica el valor de k en la ecuación x²+y²=k.'
- 'Paso 2: Calcula la raíz cuadrada de k para obtener el radio r.'
- 'Paso 3: Verifica que k sea positivo, ya que de lo contrario no existiría una circunferencia real.'
ejemplos:
- titulo: Identificar el radio en x²+y²=16
  enunciado: k=16.
  solucion_pasos:
  - r=√16=4.
- titulo: Identificar el radio en x²+y²=2
  enunciado: k=2.
  solucion_pasos:
  - r=√2≈1,41.
- titulo: ¿El radio siempre es la raíz cuadrada del valor k?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre que la ecuación esté en la forma x²+y²=k con centro en el origen.
- titulo: ¿Puede existir una circunferencia real si k es negativo?
  respuesta: 'No'
  solucion_pasos:
  - No, la raíz cuadrada de un número negativo no es real, por lo que no habría circunferencia.
errores_frecuentes:
- Confundir k con el radio directamente, sin extraer la raíz cuadrada.
- Olvidar verificar que k sea positivo antes de calcular el radio.
- Calcular incorrectamente la raíz cuadrada de valores no enteros.
fuente: Elaboración propia.
estado: publicado
