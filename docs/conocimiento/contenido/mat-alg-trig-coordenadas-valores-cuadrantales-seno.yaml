semantic_id: MAT.ALG.TRIG_COORDENADAS.VALORES_CUADRANTALES_SENO
titulo: Valores del seno en los ángulos cuadrantales
objetivo: Memorizar y justificar los valores de $\sin(\theta)$ en los ángulos cuadrantales $0°$, $90°$, $180°$ y
  $270°$.
introduccion: Del mismo modo que con el coseno, los ángulos cuadrantales permiten obtener valores exactos y
  simples del seno leyendo la coordenada correspondiente.
resumen: 'Los valores del seno en los ángulos cuadrantales son: $\sin(0°)=0$, $\sin(90°)=1$, $\sin(180°)=0$,
  $\sin(270°)=-1$.'
explicacion: '### Definición formal


  Como $\sin(\theta)$ es la coordenada $y$ del punto asociado, y los puntos cuadrantales son $(1,0)$, $(0,1)$,
  $(-1,0)$ y $(0,-1)$ para $0°$, $90°$, $180°$ y $270°$ respectivamente, se obtienen directamente los valores
  $0$, $1$, $0$ y $-1$.


  ### Desarrollo didáctico


  En $0°$ y $180°$, el punto está sobre el eje $x$, así que su coordenada $y$ es siempre $0$. En $90°$, la
  coordenada $y$ alcanza su máximo posible, $1$; en $270°$, alcanza su mínimo, $-1$.'
procedimiento:
- 'Paso 1: Identifica el punto cuadrantal asociado al ángulo dado.'
- 'Paso 2: Lee la coordenada $y$ de ese punto.'
- 'Paso 3: Esa coordenada es el valor del seno buscado.'
ejemplos:
- titulo: Cálculo directo de $\sin(90°)$
  enunciado: 'Determina $\sin(90°)$.'
  solucion_pasos:
  - El punto asociado es $(0,1)$.
  - 'Se obtiene $\sin(90°)=1$.'
- titulo: Cálculo directo de $\sin(270°)$
  enunciado: 'Determina $\sin(270°)$.'
  solucion_pasos:
  - El punto asociado es $(0,-1)$.
  - 'Se obtiene $\sin(270°)=-1$.'
- titulo: ¿$\sin(0°)=\sin(180°)$?
  enunciado: ¿$\sin(0°)$ tiene el mismo valor que $\sin(180°)$?
  respuesta: Sí
  solucion_pasos:
  - Ambos valen $0$, ya que ambos puntos están sobre el eje $x$.
- titulo: ¿El seno alcanza su valor máximo en $90°$?
  enunciado: ¿El seno alcanza su valor máximo posible ($1$) en el ángulo $90°$?
  respuesta: Sí
  solucion_pasos:
  - La coordenada $y$ del punto $(0,1)$ es el mayor valor posible dentro del círculo unitario.
errores_frecuentes:
- Confundir los valores del seno con los del coseno en los ángulos cuadrantales.
- Invertir el signo al recordar $\sin(270°)$, olvidando que es $-1$ y no $1$.
- Suponer que el seno nunca puede valer $0$.
- No relacionar el valor con la coordenada $y$ del punto correspondiente.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
