semantic_id: MAT.NUM.PROP_COMPUESTA.CONCEPTO
objetivo: Comprender el concepto de proporcionalidad compuesta.
introduccion: 'Hasta ahora hemos visto problemas donde solo dos cosas cambian: pintores
  y días. Pero, ¿qué pasa si agregamos una tercera variable, como la cantidad de casas
  a pintar? Bienvenido a la proporcionalidad compuesta.'
resumen: La proporcionalidad compuesta es una relación matemática en la que intervienen
  tres o más magnitudes, pudiendo ser directas o inversas entre sí.
explicacion: 'Una **proporcionalidad compuesta** ocurre cuando una variable depende
  de múltiples factores simultáneamente. Por ejemplo, el costo de transporte depende
  del peso de la carga y de la distancia a recorrer.


  Para resolverla, la técnica no es memorizar una fórmula mágica, sino fijar la magnitud
  que tiene la incógnita y compararla independientemente con cada una de las otras
  magnitudes para ver si la relación es directa o inversa.'
procedimiento:
- 'Paso 1: Identifica todas las magnitudes (ej: horas, obreros, metros).'
- 'Paso 2: Ubica cuál magnitud contiene la incógnita (la pregunta).'
- 'Paso 3: Compara esa magnitud incógnita con las demás, *una por una*, asumiendo
  que el resto no cambia.'
ejemplos:
- titulo: Identificando magnitudes compuestas
  enunciado: Si 5 hornos consumen 10 balones de gas en 20 días, ¿cuántas variables
    hay?
  solucion_pasos:
  - 'Hay 3 magnitudes: cantidad de hornos, balones de gas, y días.'
  - Es un problema de proporción compuesta.
errores_frecuentes:
- Intentar cruzar todos los datos a la vez sin separar las relaciones.
- Creer que si son 3 variables, todas son inversas o todas son directas.
- No fijar mentalmente las demás variables al analizar un par de ellas.
fuente: Currículum Nacional MINEDUC.
estado: publicado
