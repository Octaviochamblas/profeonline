semantic_id: MAT.ALG.VALORIZACION.MULTIPLES_VARIABLES
objetivo: Valorizar expresiones algebraicas que contienen más de una variable distinta.
introduccion: Muchas fórmulas en la vida real dependen de más de un factor. El área de un rectángulo depende de
  la base y de la altura. Al valorizar, simplemente tenemos que reemplazar cada letra por su número correspondiente,
  sin mezclarlas.
resumen: Al valorizar **Múltiples Variables**, se debe sustituir cada letra por su respectivo valor numérico de
  forma independiente. Si las variables están juntas (como en $xy$), significa que sus valores numéricos **se multiplican**.
explicacion: '### Definición formal


  La yuxtaposición en álgebra (letras juntas) siempre implica multiplicación. Nunca es concatenación de dígitos.


  ### Desarrollo didáctico


  Consideremos la expresión $5xy + z$.

  Si nos dan los valores $x=2$, $y=3$, $z=4$:

  1. Reemplazamos la $x$ por (2).

  2. Reemplazamos la $y$ por (3).

  3. Reemplazamos la $z$ por (4).

  La expresión queda: $5(2)(3) + (4)$.


  El error fatal aquí es leer $xy$ como un número de dos cifras (ej. si $x=2$ e $y=3$, pensar que $xy$ es 23). Falso.
  Es una multiplicación: $2 \cdot 3 = 6$. Por eso el uso de paréntesis es obligatorio.'
procedimiento:
- 'Paso 1: Asigna a cada variable su valor numérico específico sin confundirlas.'
- 'Paso 2: Sustituye las letras en la expresión por los números entre paréntesis.'
- 'Paso 3: Si dos o más letras estaban pegadas (ej. abc), multiplica sus valores numéricos.'
- 'Paso 4: Resuelve el resto de las operaciones respetando la jerarquía.'
ejemplos:
- titulo: Tres letras, un resultado
  enunciado: Valoriza $a^2 + bc$, sabiendo que a=3, b=2, c=5.
  solucion_pasos:
  - 'Reemplazamos: (3)^2 + (2)(5).'
  - 'Resolvemos la potencia: 9 + (2)(5).'
  - 'Resolvemos la multiplicación: 9 + 10.'
  - 'Sumamos: 19.'
- titulo: La energía potencial elástica de un resorte se calcula con la fórmula $E = \frac12 k x^2$, d
  enunciado: 'La energía potencial elástica de un resorte se calcula con la fórmula $E = \frac12 k x^2$, donde $k$
    es la constante del resorte y $x$ es la deformación. Si para un experimento $k = 100$ y $x = 4$, ¿cuál es el
    valor de la energía $E$? (v1)


    Opciones: A) $800$ · B) $160000$ · C) $400$ · D) $200$'
  solucion_pasos:
  - 'Sustituimos: $E = \frac{1}{2}(100)(4)^2$. Por jerarquía, primero la potencia: $4^2 = 16$. Luego la multiplicación:
    $\frac{1}{2} \cdot 100 \cdot 16 = 50 \cdot 16 = 800$.'
  - 'Respuesta: $800$'
- titulo: 'Respecto de «Valorización de expresiones con múltiples variables»: ¿Es correcta esta caracte'
  enunciado: 'Respecto de «Valorización de expresiones con múltiples variables»: ¿Es correcta esta caracterización?
    «Al valorizar **Múltiples Variables**, se debe sustituir cada letra por su respectivo valor numérico de forma
    independiente»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al valorizar **Múltiples Variables**, se debe sustituir cada
    letra por su respectivo valor numérico de forma independiente.'
- titulo: 'Respecto de «Valorización de expresiones con múltiples variables»: ¿Es válida esta afirmació'
  enunciado: 'Respecto de «Valorización de expresiones con múltiples variables»: ¿Es válida esta afirmación? «Juntar
    los números en lugar de multiplicarlos (leer $ab$ como $23$ en lugar de $2 \cdot 3$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al valorizar **Múltiples Variables**, se debe sustituir cada
    letra por su respectivo valor numérico de forma independiente.'
errores_frecuentes:
- Juntar los números en lugar de multiplicarlos (leer $ab$ como $23$ en lugar de $2 \cdot 3$).
- Reemplazar el valor de una variable en el lugar de otra (confundir el valor de $x$ con el de $y$).
- Interpretar que las variables deben sumarse ($1+2+3=6$).
- Interpretar que el resultado siempre será un número negativo.
- Para «Al valorizar un término algebraico que contiene variables yuxtapuestas como $xyz$, si $x=1, y=2, z=3$, ¿cuál
  es el error conceptual más grave al interpretar el resultado de la sustitución? (v1)», la respuesta correcta es
  Creer que se debe multiplicar por $3$ debido a la cantidad de letras.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Valorización de expresiones con múltiples variables
