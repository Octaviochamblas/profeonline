semantic_id: MAT.ALG.VALORIZACION.MULTIPLES_VARIABLES
objetivo: Valorizar expresiones algebraicas que contienen más de una variable distinta.
introduccion: Muchas fórmulas en la vida real dependen de más de un factor. El área
  de un rectángulo depende de la base y de la altura. Al valorizar, simplemente tenemos
  que reemplazar cada letra por su número correspondiente, sin mezclarlas.
resumen: Al valorizar **Múltiples Variables**, se debe sustituir cada letra por su
  respectivo valor numérico de forma independiente. Si las variables están juntas
  (como en $xy$), significa que sus valores numéricos **se multiplican**.
explicacion: 'Consideremos la expresión $5xy + z$.

  Si nos dan los valores $x=2$, $y=3$, $z=4$:

  1. Reemplazamos la $x$ por (2).

  2. Reemplazamos la $y$ por (3).

  3. Reemplazamos la $z$ por (4).

  La expresión queda: $5(2)(3) + (4)$.


  El error fatal aquí es leer $xy$ como un número de dos cifras (ej. si $x=2$ e $y=3$,
  pensar que $xy$ es 23). ¡Falso! Es una multiplicación: $2 \cdot 3 = 6$. Por eso
  el uso de paréntesis es obligatorio.'
procedimiento:
- 'Paso 1: Asigna a cada variable su valor numérico específico sin confundirlas.'
- 'Paso 2: Sustituye las letras en la expresión por los números entre paréntesis.'
- 'Paso 3: Si dos o más letras estaban pegadas (ej. abc), multiplica sus valores numéricos.'
- 'Paso 4: Resuelve el resto de las operaciones respetando la jerarquía.'
ejemplos:
- titulo: Tres letras, un resultado
  enunciado: Valoriza $a^2 + bc$, sabiendo que a=3, b=2, c=5.
  solucion_pasos:
  - 'Reemplazamos: (3)^2 + (2)(5).'
  - 'Resolvemos la potencia: 9 + (2)(5).'
  - 'Resolvemos la multiplicación: 9 + 10.'
  - 'Sumamos: 19.'
errores_frecuentes:
- Juntar los números en lugar de multiplicarlos (leer $ab$ como $23$ en lugar de $2
  \cdot 3$).
- Reemplazar el valor de una variable en el lugar de otra (confundir el valor de $x$
  con el de $y$).
fuente: Álgebra de Baldor.
estado: publicado
