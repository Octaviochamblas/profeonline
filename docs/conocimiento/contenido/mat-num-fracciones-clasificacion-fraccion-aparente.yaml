semantic_id: MAT.NUM.FRACCIONES_CLASIFICACION.FRACCION_APARENTE
objetivo: Reconocer una fracción aparente.
introduccion: 'El caso “\(\frac{12}{3}=4\), por eso es una fracción aparente” plantea
  una situación propia de identificación de fracción aparente. Resolverla exige usar
  esta condición con precisión: una fracción aparente es una fracción cuyo numerador
  es múltiplo del denominador y equivale a un número entero.'
resumen: Una fracción aparente es una fracción cuyo numerador es múltiplo del denominador
  y equivale a un número entero. Como criterio de control, toda fracción aparente
  puede simplificarse hasta obtener un entero
explicacion: |-
  Una fracción aparente es una fracción cuyo numerador es múltiplo del denominador y equivale a un número entero.

  La relación entre la definición y el caso “\(\frac{12}{3}=4\), por eso es una fracción aparente” conduce a una conclusión útil: Toda fracción aparente puede simplificarse hasta obtener un entero.
procedimiento:
- 'Paso 1: Revisa que el denominador sea distinto de cero.'
- 'Paso 2: Comprueba si el numerador es múltiplo del denominador.'
- 'Paso 3: Efectúa la división exacta para obtener el entero representado.'
ejemplos:
- titulo: Aplicación razonada — Identificación de fracción aparente
  enunciado: \(\frac{12}{3}=4\), por eso es una fracción aparente.
  solucion_pasos:
  - Revisa que el denominador sea distinto de cero.
  - Comprueba si el numerador es múltiplo del denominador.
  - Efectúa la división exacta para obtener el entero representado.
- titulo: Revisión de una solución — Identificación de fracción aparente
  enunciado: Una solución aplica “Comprueba si el numerador es múltiplo del denominador.”,
    pero termina sin comprobar que toda fracción aparente puede simplificarse hasta
    obtener un entero. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de fracción aparente: una fracción
    aparente es una fracción cuyo numerador es múltiplo del denominador y equivale
    a un número entero.'
  - Revisa que el denominador sea distinto de cero.
  - 'Completa la revisión con este control: Efectúa la división exacta para obtener
    el entero representado.'
- titulo: ¿Se cumple que toda fracción aparente puede simplificarse hasta obtener
    un entero? — Identificación de fracción aparente
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una fracción aparente es una fracción
    cuyo numerador es múltiplo del denominador y equivale a un número entero.
  - El caso “\(\frac{12}{3}=4\), por eso es una fracción aparente” satisface esa condición.
  - Efectúa la división exacta para obtener el entero representado.
- titulo: ¿Es válido omitir el paso “Revisa que el denominador sea distinto de cero”?
    — Identificación de fracción aparente
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de fracción aparente.
  - 'Omitirlo puede volver inválida la acción siguiente: Comprueba si el numerador
    es múltiplo del denominador.'
  - 'La solución debe terminar de este modo: Efectúa la división exacta para obtener
    el entero representado.'
errores_frecuentes:
- 'Empezar identificación de fracción aparente sin realizar este control inicial:
  Revisa que el denominador sea distinto de cero.'
- Memorizar “\(\frac{12}{3}=4\), por eso es una fracción aparente” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Comprueba si el numerador es múltiplo del denominador.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación de fracción aparente que contradice
  el criterio “Toda fracción aparente puede simplificarse hasta obtener un entero”.
- 'Cerrar el ejercicio sin esta comprobación específica: Efectúa la división exacta
  para obtener el entero representado.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
