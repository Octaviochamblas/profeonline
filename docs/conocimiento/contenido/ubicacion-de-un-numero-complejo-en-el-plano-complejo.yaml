semantic_id: MAT.NUM.COMPLEJOS.PLANO_COMPLEJO
titulo: Ubicación de un número complejo en el plano complejo
objetivo: Ubicar números complejos en el plano.
introduccion: La recta numérica no tiene espacio para una segunda componente. El plano complejo añade
  un eje perpendicular y convierte cada número en una ubicación bidimensional.
resumen: El plano complejo usa el eje horizontal para la parte real y el vertical para la imaginaria.
  Cada complejo corresponde a un único punto del plano de Argand.
explicacion: 'El plano complejo usa el eje horizontal para la parte real y el vertical para la imaginaria.


  La situación “\(2-3i\) se ubica tres unidades bajo el punto \(2\) del eje real” permite comprobar, y
  no solo memorizar, que cada complejo corresponde a un único punto del plano de Argand'
procedimiento:
- 'Paso 1: Extrae las coordenadas \((a,b)\) del complejo.'
- 'Paso 2: Desplázate \(a\) unidades en el eje real y \(b\) en el imaginario.'
- 'Paso 3: Marca el punto y comprueba el cuadrante según los signos.'
ejemplos:
- titulo: Aplicación razonada — Ubicación de un número complejo en el plano complejo
  enunciado: \(2-3i\) se ubica tres unidades bajo el punto \(2\) del eje real.
  solucion_pasos:
  - Extrae las coordenadas \((a,b)\) del complejo.
  - Desplázate \(a\) unidades en el eje real y \(b\) en el imaginario.
  - Marca el punto y comprueba el cuadrante según los signos.
- titulo: Revisión de una solución — Ubicación de un número complejo en el plano complejo
  enunciado: Una solución aplica “Desplázate \(a\) unidades en el eje real y \(b\) en el imaginario.”,
    pero termina sin comprobar que cada complejo corresponde a un único punto del plano de Argand. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define ubicación de un número complejo en el plano complejo: el plano complejo
    usa el eje horizontal para la parte real y el vertical para la imaginaria.'
  - Extrae las coordenadas \((a,b)\) del complejo.
  - 'Completa la revisión con este control: Marca el punto y comprueba el cuadrante según los signos.'
- titulo: ¿Se cumple que cada complejo corresponde a un único punto del plano de Argand? — Ubicación de
    un número complejo en el plano complejo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el plano complejo usa el eje horizontal para la parte real
    y el vertical para la imaginaria.
  - El caso “\(2-3i\) se ubica tres unidades bajo el punto \(2\) del eje real” satisface esa condición.
  - Marca el punto y comprueba el cuadrante según los signos.
- titulo: ¿Es válido omitir el paso “Extrae las coordenadas \((a,b)\) del complejo”? — Ubicación de un
    número complejo en el plano complejo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de ubicación de un número complejo en el plano complejo.
  - 'Omitirlo puede volver inválida la acción siguiente: Desplázate \(a\) unidades en el eje real y \(b\)
    en el imaginario.'
  - 'La solución debe terminar de este modo: Marca el punto y comprueba el cuadrante según los signos.'
errores_frecuentes:
- 'Confundir ubicación de un número complejo en el plano complejo con otro concepto y omitir este inicio:
  Extrae las coordenadas \((a,b)\) del complejo.'
- Aplicar mecánicamente “Desplázate \(a\) unidades en el eje real y \(b\) en el imaginario.” sin revisar
  las condiciones de la definición.
- Tomar “\(2-3i\) se ubica tres unidades bajo el punto \(2\) del eje real” como una igualdad aislada,
  sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “cada complejo corresponde a un único punto del plano
  de Argand”.
- 'Terminar el desarrollo sin realizar este control: Marca el punto y comprueba el cuadrante según los
  signos.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
