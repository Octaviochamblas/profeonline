semantic_id: MAT.ALG.MULT_MON_POL.MONOMIO_NEGATIVO
titulo: Producto de monomio negativo por polinomio
objetivo: Multiplicar un monomio con coeficiente negativo por un polinomio, distribuyendo y aplicando correctamente
  la ley de los signos.
introduccion: Cuando el monomio que multiplica al polinomio es negativo, no solo cambian los números y las letras,
  también cambian todos los signos del polinomio. Es como si el signo menos se 'repartiera' a cada término.
resumen: 'Para multiplicar un monomio negativo por un polinomio:


  - Se multiplica el monomio por cada término del polinomio (propiedad distributiva).

  - Se aplica la regla de los signos en cada multiplicación ($-$ por $+$ es $-$; $-$ por $-$ es $+$).

  - Se multiplican los coeficientes numéricos y se suman los exponentes de las bases iguales.'
explicacion: '### Definición formal


  Sea $M=cX^{\alpha}$ un monomio con $c<0$ y sea $P=\sum_{i=1}^{n}d_iX^{\beta_i}$ un polinomio. Por la propiedad
  distributiva,

  $$M\cdot P=\sum_{i=1}^{n}(cd_i)X^{\alpha+\beta_i}.$$

  El coeficiente negativo de $M$ interviene en cada producto parcial. En consecuencia, el signo de cada término
  resultante es el signo del producto $cd_i$: cambia respecto de $d_i$ cuando $d_i\neq0$. La regla afecta a todos
  los términos del polinomio, no al polinomio considerado como un bloque sin distribuir.


  ### Desarrollo didáctico


  La multiplicación de un monomio negativo por un polinomio sigue el mismo principio de la propiedad distributiva,
  con una atención especial a los signos.


  Si tenemos $-a(b - c)$, el monomio negativo $-a$ se distribuye:

  $(-a) \cdot b + (-a) \cdot (-c)$


  Aplicando la ley de los signos, obtenemos:

  $-ab + ac$


  Es fundamental recordar que multiplicar por un negativo invierte todos los signos originales de los términos dentro
  del paréntesis.'
procedimiento:
- '1. Identifica el monomio negativo y los términos del polinomio.

  2. Multiplica el monomio por el primer término del polinomio, aplicando la regla de signos.

  3. Repite el proceso para cada uno de los términos restantes del polinomio.

  4. Simplifica escribiendo la suma algebraica resultante.'
- La multiplicación por un número negativo invierte el signo positivo a negativo, y el negativo a positivo en cada
  término.
ejemplos:
- titulo: Distribución con coeficiente negativo y binomio
  enunciado: Resuelve $-3x(2x + 4)$.
  solucion_pasos:
  - 'Distribuye el $-3x$ a cada término: $(-3x)(2x) + (-3x)(4)$'
  - 'Multiplica los coeficientes y suma los exponentes: $-6x^2 - 12x$'
- titulo: Cambio simultáneo de signos en un trinomio
  enunciado: Desarrolla $-2a^2(3a^2 - 5a + 1)$.
  solucion_pasos:
  - 'Distribuye: $(-2a^2)(3a^2) + (-2a^2)(-5a) + (-2a^2)(1)$'
  - 'Multiplica término a término: $-6a^4 + 10a^3 - 2a^2$'
- titulo: Producto con dos variables y signos alternados
  enunciado: Multiplica $-4xy(x^2 - xy + y^2)$.
  solucion_pasos:
  - 'Distribuye: $(-4xy)(x^2) + (-4xy)(-xy) + (-4xy)(y^2)$'
  - 'Calcula: $-4x^3y + 4x^2y^2 - 4xy^3$'
- titulo: Verificación del efecto del signo negativo
  enunciado: Analiza la afirmación «Al multiplicar $-x(y - z)$, el resultado es $-xy - xz$».
  solucion_pasos:
  - La distribución es $(-x)(y) + (-x)(-z)$
  - El resultado correcto es $-xy + xz$.
  - Por lo tanto, la afirmación es Falsa.
- titulo: 'Respecto de «Producto de monomio negativo por polinomio»: ¿Se ajusta a la definición esta af'
  enunciado: 'Respecto de «Producto de monomio negativo por polinomio»: ¿Se ajusta a la definición esta afirmación?
    «Para multiplicar un monomio negativo por un polinomio: - Se multiplica el monomio por cada término del polinomio
    (propiedad distributiva)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para multiplicar un monomio negativo por un polinomio: - Se
    multiplica el monomio por cada término del polinomio (propiedad distributiva).'
- titulo: 'Respecto de «Producto de monomio negativo por polinomio»: ¿Es compatible con el procedimient'
  enunciado: 'Respecto de «Producto de monomio negativo por polinomio»: ¿Es compatible con el procedimiento esta
    afirmación? «Olvidar cambiar el signo del segundo o tercer término del polinomio»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para multiplicar un monomio negativo por un polinomio: - Se
    multiplica el monomio por cada término del polinomio (propiedad distributiva).'
errores_frecuentes:
- Olvidar cambiar el signo del segundo o tercer término del polinomio.
- Sumar en lugar de multiplicar los coeficientes numéricos.
- Cambiar el signo pero olvidar multiplicar las partes literales.
- Para «Al multiplicar un polinomio por un monomio con coeficiente negativo, ¿qué ocurre con los signos de los términos
  del polinomio», la respuesta correcta es Todos los signos quedan iguales.
- Para «Al multiplicar un polinomio por un monomio con coeficiente negativo, ¿qué ocurre con los signos de los términos
  del polinomio», la respuesta correcta es Solo se invierte el primer signo.
