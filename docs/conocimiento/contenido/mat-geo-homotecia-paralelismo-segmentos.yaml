semantic_id: MAT.GEO.HOMOTECIA.PARALELISMO_SEGMENTOS_HOMOLOGOS
titulo: Propiedad de paralelismo entre segmentos homólogos en una homotecia
objetivo: Reconocer que todo segmento de una figura original es paralelo a su segmento homólogo correspondiente
  en la figura imagen de una homotecia.
introduccion: Una propiedad geométrica notable de la homotecia, que la distingue de otras transformaciones,
  es la relación de paralelismo que se genera entre segmentos correspondientes.
resumen: En una homotecia, cada segmento de la figura original es paralelo a su segmento homólogo correspondiente
  en la figura imagen.
explicacion: '![Paralelismo de segmentos homólogos](/static/img/geometria/congruencia-semejanza/homotecia-paralelismo-segmentos.svg)


  ### Definición formal


  Si $A''=O+k(A-O)$ y $B''=O+k(B-O)$, entonces $B''-A''=k(B-A)$, es decir, el vector $A''B''$ es un múltiplo
  escalar del vector $AB$, lo que implica que ambos segmentos son paralelos.


  ### Desarrollo didáctico


  Esta propiedad es muy útil para verificar visualmente si dos figuras están relacionadas por una homotecia:
  basta con comprobar que los lados correspondientes son paralelos entre sí (además de proporcionales
  en longitud).'
procedimiento:
- 'Paso 1: Identifica un segmento de la figura original y su correspondiente en la figura imagen.'
- 'Paso 2: Verifica que ambos segmentos tengan la misma dirección (sean paralelos).'
- 'Paso 3: Si todos los pares de segmentos correspondientes son paralelos, es consistente con una relación
  de homotecia.'
ejemplos:
- titulo: Verificar paralelismo en una homotecia
  enunciado: Un triángulo ABC se transforma mediante homotecia en A'B'C'.
  solucion_pasos:
  - El lado AB es paralelo a A'B', BC es paralelo a B'C', y CA es paralelo a C'A'.
- titulo: Detectar cuando NO hay paralelismo
  enunciado: Dos figuras semejantes tienen lados correspondientes que no son paralelos entre sí.
  solucion_pasos:
  - Esas figuras no están relacionadas por una homotecia (aunque sean semejantes por otra transformación,
    como una rotación combinada).
- titulo: ¿El paralelismo se cumple sin importar el signo de k?
  respuesta: Sí
  solucion_pasos:
  - Sí, se cumple tanto en homotecias directas como inversas, ya que la relación es de paralelismo (misma
    dirección o dirección opuesta), no de mismo sentido.
- titulo: ¿El paralelismo es una condición suficiente, por sí sola, para garantizar una homotecia?
  respuesta: 'No'
  solucion_pasos:
  - No, se necesita además que exista un único centro común para todos los segmentos correspondientes.
errores_frecuentes:
- Creer que el paralelismo por sí solo garantiza que dos figuras están relacionadas por una homotecia,
  sin verificar el centro común.
- Confundir paralelismo con perpendicularidad al comparar segmentos correspondientes.
- No verificar todos los pares de segmentos correspondientes, solo algunos.
fuente: 'Fuente: Moraleja 155, Cid 119.'
estado: publicado
