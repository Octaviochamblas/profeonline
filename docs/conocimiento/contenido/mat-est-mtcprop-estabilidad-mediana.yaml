semantic_id: MAT.EST.MTC_PROPIEDADES.ESTABILIDAD_MEDIANA
titulo: Analizar la robustez de la mediana frente a valores extremos
objetivo: Analizar por qué la mediana permanece prácticamente estable ante la presencia de valores atípicos,
  a diferencia de la media.
introduccion: La mediana solo depende de la posición central de los datos ordenados, sin importar cuán
  extremos sean los valores en los bordes del conjunto.
resumen: La mediana es una medida robusta, ya que su valor depende únicamente de la posición central de
  los datos ordenados, sin verse afectada por lo extremos que sean los valores más alejados.
explicacion: '![Robustez de la mediana ante valores extremos](/static/img/estadistica/mtcprop/mtcprop-estabilidad-mediana.svg)


  ### Definición formal


  Como la mediana solo depende de la posición central, cambiar el valor de un dato extremo (sin cambiar
  su posición relativa) no altera el valor de la mediana.


  ### Desarrollo didáctico


  En el conjunto {5, 6, 6, 7}, la mediana es 6; si se agrega un valor atípico de 50 (quedando {5,6,6,7,50}),
  la mediana sigue siendo 6, sin verse afectada por ese valor extremo.'
procedimiento:
- 'Paso 1: Calcula la mediana del conjunto de datos sin el valor sospechoso de ser atípico.'
- 'Paso 2: Calcula la mediana incluyendo ese valor atípico.'
- 'Paso 3: Compara ambos resultados; en general, la mediana cambia poco o nada, a diferencia de la media.'
ejemplos:
- titulo: Comparar la mediana con y sin un valor atípico
  enunciado: 'Conjunto sin atípico: {5,6,6,7} (mediana=6). Con atípico: {5,6,6,7,50}.'
  solucion_pasos:
  - 'Ordenado: 5,6,6,7,50. Mediana=6 (valor central), igual que antes de agregar el valor atípico.'
- titulo: Comparar sueldos con y sin un valor atípico usando la mediana
  enunciado: 'Sueldos (miles): {400,420,450,430}. Se agrega un sueldo de 5000 (gerente).'
  solucion_pasos:
  - La mediana del nuevo conjunto (con 5 datos) apenas cambia respecto de la original, a diferencia de
    lo que ocurriría con la media.
- titulo: ¿La mediana cambia poco o nada al agregar un valor extremo al conjunto?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad de robustez que caracteriza a la mediana.
- titulo: ¿La mediana depende del valor exacto de los datos extremos, o solo de su posición relativa?
  respuesta: 'No'
  solucion_pasos:
  - No depende del valor exacto de los extremos, solo de su posición relativa dentro del conjunto ordenado.
errores_frecuentes:
- Pensar que la mediana también se ve muy afectada por valores extremos, igual que la media.
- No aprovechar la robustez de la mediana en contextos donde se sabe que existen valores atípicos.
- Confundir la estabilidad de la mediana con la de la moda, que tiene un comportamiento distinto frente
  a valores extremos.
fuente: 'Elaboración propia (referencia: Moraleja 363).'
estado: publicado
