semantic_id: MAT.ALG.FUNC_SENO_ANALISIS.TABLA_VALORES
titulo: Tabla de valores de la función seno
objetivo: Construir una tabla de valores de $f(x)=\sin(x)$ para valores representativos de $x$ entre $0$ y $2\pi$.
introduccion: Antes de trazar la gráfica completa, conviene calcular algunos valores clave que revelan el patrón
  de comportamiento de la función seno.
resumen: 'Una tabla de valores de $f(x)=\sin(x)$ para $x=0,\pi/2,\pi,3\pi/2,2\pi$ revela el patrón básico:
  $0,1,0,-1,0$, que se repite indefinidamente.'
explicacion: '### Definición formal


  Evaluando $f(x)=\sin(x)$ en los ángulos cuadrantales dentro de un período completo: $f(0)=0$,
  $f(\pi/2)=1$, $f(\pi)=0$, $f(3\pi/2)=-1$, $f(2\pi)=0$. Estos cinco puntos son suficientes para trazar la forma
  general de un período de la curva.


  ### Desarrollo didáctico


  Al agregar los ángulos notables intermedios, como $\pi/6$ ($f=0{,}5$) o $\pi/4$ ($f\approx0{,}71$), se afina
  la forma de la curva entre los puntos cuadrantales, revelando su suavidad característica.'
procedimiento:
- 'Paso 1: Selecciona valores representativos de $x$, incluyendo los ángulos cuadrantales.'
- 'Paso 2: Evalúa $f(x)=\sin(x)$ en cada valor elegido.'
- 'Paso 3: Organiza los pares $(x,f(x))$ para identificar el patrón de la curva.'
ejemplos:
- titulo: Construcción de la tabla en un período completo
  enunciado: 'Construye la tabla de valores de $f(x)=\sin(x)$ para $x=0,\pi/2,\pi,3\pi/2,2\pi$.'
  solucion_pasos:
  - 'Se evalúa cada valor: $f(0)=0$, $f(\pi/2)=1$, $f(\pi)=0$, $f(3\pi/2)=-1$, $f(2\pi)=0$.'
  - Se obtiene el patrón $0,1,0,-1,0$.
- titulo: Valor intermedio en la tabla
  enunciado: 'Calcula $f(\pi/6)$ para $f(x)=\sin(x)$.'
  solucion_pasos:
  - Se interpreta $\pi/6$ como $30°$.
  - 'Se obtiene $f(\pi/6)=1/2$.'
- titulo: ¿La tabla de valores de un período es suficiente para conocer toda la función?
  enunciado: ¿Conocer la tabla de valores en un solo período es suficiente para conocer el comportamiento
    completo de $f(x)=\sin(x)$?
  respuesta: Sí
  solucion_pasos:
  - El patrón se repite idénticamente en cada período siguiente, por la propiedad de periodicidad.
- titulo: ¿Los valores de la tabla dependen de si se usan grados o radianes?
  enunciado: ¿Los valores numéricos de $f(x)=\sin(x)$ dependen de si $x$ se interpreta en grados o en radianes?
  respuesta: 'No'
  solucion_pasos:
  - El valor del seno es el mismo, sea que se exprese el ángulo en radianes o en grados; solo cambia la notación del argumento.
errores_frecuentes:
- Olvidar incluir los ángulos cuadrantales al construir la tabla.
- Confundir el patrón $0,1,0,-1,0$ con el correspondiente al coseno.
- No reconocer que el patrón se repite en cada período siguiente.
- Calcular mal los valores intermedios entre los ángulos cuadrantales.
