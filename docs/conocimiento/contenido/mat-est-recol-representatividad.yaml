semantic_id: MAT.EST.RECOLECCION_BASE.REPRESENTATIVIDAD
titulo: Comprender la importancia de la representatividad de una muestra
objetivo: Comprender por qué una muestra debe ser representativa de la población para que las inferencias
  realizadas a partir de ella sean válidas.
introduccion: Una muestra mal seleccionada, aunque sea grande, puede llevar a conclusiones erróneas sobre
  toda la población.
resumen: La representatividad es la propiedad de una muestra que asegura que sus características (proporciones,
  diversidad) reflejan fielmente las de la población de la que proviene.
explicacion: '![Importancia de la representatividad](/static/img/estadistica/recol/recol-representatividad.svg)


  ### Definición formal


  Una muestra es representativa si la distribución de sus características relevantes se aproxima a la
  distribución real de esas mismas características en la población.


  ### Desarrollo didáctico


  Si el 55% de una ciudad son mujeres, una muestra representativa debería mantener aproximadamente esa
  misma proporción; una muestra con 90% de mujeres, aunque sea numerosa, no sería representativa.'
procedimiento:
- 'Paso 1: Identifica las características relevantes de la población que se quieren preservar en la muestra.'
- 'Paso 2: Verifica si la muestra mantiene proporciones similares a las de la población en esas características.'
- 'Paso 3: Si las proporciones se alejan mucho de la población, concluye que la muestra no es representativa.'
ejemplos:
- titulo: Evaluar representatividad por género
  enunciado: Una ciudad tiene 50% hombres y 50% mujeres; una muestra tiene 48% hombres y 52% mujeres.
  solucion_pasos:
  - La muestra es representativa en género, ya que las proporciones son muy cercanas a las de la población.
- titulo: Evaluar representatividad por edad
  enunciado: Una población tiene 30% de adultos mayores, pero una muestra tiene solo 5% de adultos mayores.
  solucion_pasos:
  - La muestra NO es representativa en edad, ya que subrepresenta fuertemente a los adultos mayores.
- titulo: ¿La representatividad depende solo del tamaño de la muestra?
  respuesta: 'No'
  solucion_pasos:
  - No, también depende del método de selección; una muestra grande puede seguir siendo no representativa
    si está sesgada.
- titulo: ¿Una muestra representativa permite generalizar resultados a la población?
  respuesta: Sí
  solucion_pasos:
  - Sí, es precisamente el propósito de buscar representatividad al seleccionar una muestra.
errores_frecuentes:
- Asumir que una muestra grande es automáticamente representativa, sin verificar sus proporciones.
- No considerar todas las características relevantes (edad, género, ubicación) al evaluar representatividad.
- Generalizar resultados de una muestra no representativa como si aplicaran a toda la población.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
