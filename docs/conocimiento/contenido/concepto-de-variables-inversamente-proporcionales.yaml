semantic_id: MAT.NUM.PROP_INVERSA.CONCEPTO_VARIABLES
titulo: Concepto de variables inversamente proporcionales
objetivo: Comprender el concepto de variables inversamente proporcionales.
introduccion: Imagina que debes pintar tu casa. Si lo haces solo, demorarás 10 días. Si llamas a un amigo
  que trabaja igual que tú, ¡demorarán la mitad! A más manos, menos tiempo. Este sube y baja perfectamente
  coordinado es la proporción inversa.
resumen: Dos variables son inversamente proporcionales si al multiplicar una por una constante, la otra
  se divide por la misma constante. Su producto siempre es el mismo ($x \cdot y = k$).
explicacion: 'Hablamos de **proporcionalidad inversa** cuando dos magnitudes numéricas están vinculadas
  de modo que el aumento de una provoca la disminución proporcional de la otra.


  Matemáticamente, si $x$ e $y$ son inversamente proporcionales, el producto entre ellas es constante:

  $$x \cdot y = k$$

  Si $x$ se duplica, $y$ se reduce a la mitad. Si $x$ se divide por 3, $y$ se triplica. Es un balancín
  perfecto.'
procedimiento:
- 'Paso 1: Identifica las dos variables del problema.'
- 'Paso 2: Comprueba si al aumentar una (ej. al doble), la otra lógicamente disminuye en la misma proporción
  (a la mitad).'
- 'Paso 3: Si esto se cumple, son variables inversamente proporcionales.'
ejemplos:
- titulo: Variables de velocidad y tiempo
  enunciado: ¿Son la velocidad a la que viajas y el tiempo que demoras en llegar proporcionales?
  solucion_pasos:
  - Si viajas al doble de velocidad, te demorarás la mitad del tiempo en recorrer la misma distancia.
  - Como una sube y la otra baja proporcionalmente, son inversamente proporcionales.
- titulo: ¿Si una sube y la otra baja, siempre es proporción inversa?
  respuesta: 'No'
  solucion_pasos:
  - 'El peso de una vela y el tiempo que lleva encendida: a más tiempo, menos peso. Pero si lleva 1 hora
    y pesa 50g, a las 2 horas no pesará 25g (depende de cuánto peso inicial tenía y cuánto se consume
    por hora). Es una función lineal decreciente, no una proporción inversa.'
errores_frecuentes:
- Confundir proporción inversa con cualquier relación donde una variable disminuye mientras la otra aumenta
  (ej. restar de un total fijo).
- Intentar resolverlo con una regla de tres directa.
- Asumir que la suma es constante en lugar del producto.
fuente: Currículum Nacional MINEDUC.
estado: publicado
