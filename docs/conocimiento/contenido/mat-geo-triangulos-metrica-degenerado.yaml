semantic_id: MAT.GEO.TRIANGULOS_METRICA.TRIANGULO_DEGENERADO
titulo: Caso degenerado cuando la suma de dos lados es igual al tercer lado
objetivo: Reconocer que cuando la suma de dos lados es exactamente igual al tercero, los tres puntos quedan
  alineados y no se forma un triángulo real.
introduccion: 'En el límite de la desigualdad triangular, cuando la suma de dos lados es exactamente igual
  al tercero (no mayor), la figura colapsa: los tres puntos quedan sobre una misma recta.'
resumen: Un triángulo degenerado ocurre cuando la suma de dos lados es igual al tercero, y los tres vértices
  quedan alineados sobre una recta.
explicacion: '![Triángulo degenerado, puntos colineales](/static/img/geometria/triangulos/triangulos-metrica-degenerado.svg)


  ### Definición formal


  Si $a+b=c$ para tres medidas $a$, $b$, $c$, los puntos correspondientes A, B y C quedan colineales (sobre
  la misma recta), y no se forma una región triangular con área positiva.


  ### Desarrollo didáctico


  Con segmentos AB=3 y BC=5, si AC=8=3+5, entonces B queda exactamente sobre el segmento AC, y los tres
  puntos A, B, C están alineados: no hay triángulo, solo una línea recta.'
procedimiento:
- 'Paso 1: Suma dos de las tres medidas dadas.'
- 'Paso 2: Compara esa suma con la tercera medida.'
- 'Paso 3: Si son exactamente iguales, el caso es degenerado: no hay triángulo, solo puntos alineados.'
ejemplos:
- titulo: Identificar un caso degenerado
  enunciado: Los segmentos miden 3, 5 y 8.
  solucion_pasos:
  - '3+5=8, exactamente igual al tercer lado: es un caso degenerado.'
- titulo: Comparar con un caso válido
  enunciado: Los segmentos miden 3, 5 y 7.
  solucion_pasos:
  - '3+5=8>7: este sí es un triángulo válido, no degenerado.'
- titulo: ¿Un triángulo degenerado tiene área positiva?
  respuesta: 'No'
  solucion_pasos:
  - No, su área es cero, porque los tres puntos están alineados.
- titulo: ¿El caso degenerado cumple la desigualdad triangular estricta?
  respuesta: 'No'
  solucion_pasos:
  - No, la desigualdad estricta exige suma MAYOR (no igual) que el tercer lado.
errores_frecuentes:
- Creer que el caso degenerado sigue siendo un triángulo válido.
- Confundir 'igual' con 'mayor' al aplicar la desigualdad triangular.
- No reconocer que los tres puntos quedan sobre la misma recta en este caso.
fuente: Elaboración propia.
estado: publicado
