semantic_id: 'MAT.ALG.TERMINO_COMUN.DEFINICION'
titulo: 'Definición del producto de binomios con término común'
objetivo: 'Comprender la estructura base de multiplicar dos binomios que comparten exactamente un término común.'
introduccion: 'Ya vimos qué pasa si multiplicamos dos binomios iguales (cuadrado) y dos conjugados. ¿Qué pasa si comparten solo la mitad de la estructura? Por ejemplo: $(x+5)(x+3)$.'
resumen: |
  Un par de binomios con un 'término común' tienen la forma $(x+a)(x+b)$.
  Aquí, la $x$ representa el término común (idéntico en ambos binomios), mientras que $a$ y $b$ son los términos no comunes (distintos).
explicacion: |
  Al expandir $(x+a)(x+b)$ obtenemos cuatro partes: $x^2 + bx + ax + ab$. 
  Como $bx$ y $ax$ son términos semejantes (ambos comparten la $x$), los agrupamos factorizando: $x^2 + (a+b)x + ab$.
  Esta estructura nos enseña que el coeficiente del término común en el resultado provendrá de la SUMA de los no comunes ($a+b$), y el término independiente provendrá del PRODUCTO de los no comunes ($ab$).
procedimiento:
  - 'Paso 1: Para reconocer este producto notable:'
  - 'Paso 2: Revisa el primer término de ambos binomios. ¿Son idénticos? Ese es el término común.'
  - 'Paso 3: Revisa los segundos términos. ¿Son diferentes numéricamente? Esos son los no comunes.'
  - 'Paso 4: Entiende que el desarrollo ordenará los términos según las potencias del término común.'
ejemplos:
  - titulo: 'Identificando las partes'
    enunciado: 'En el producto $(y - 4)(y + 7)$, identifica el término común y los no comunes.'
    solucion_pasos:
      - 'El término común es $y$.'
      - 'Los términos no comunes son $-4$ y $+7$.'
errores_frecuentes:
  - 'Creer que $(x+a)(x+b) = x^2 + ab$, ignorando por completo la suma cruzada $(a+b)x$.'
