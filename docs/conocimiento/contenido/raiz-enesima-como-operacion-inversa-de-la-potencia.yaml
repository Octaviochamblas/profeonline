semantic_id: MAT.NUM.RAICES_CONCEPTO.RAIZ_COMO_INVERSA_POTENCIA
titulo: Raíz enésima como operación inversa de la potencia
objetivo: Usar raíces como inversas de potencias.
introduccion: Potenciar y extraer raíz parecen operaciones opuestas, pero el dominio y la raíz principal
  introducen matices. La verificación debe considerar signos, no solo exponentes.
resumen: La raíz enésima deshace una potencia de exponente \(n\) dentro de las condiciones de su dominio.
  Para índice par la raíz principal es no negativa, por lo que \(\sqrt{x^2}=|x|\).
explicacion: 'La raíz enésima deshace una potencia de exponente \(n\) dentro de las condiciones de su
  dominio.


  La situación “\(\sqrt[5]{3^5}=3\)” permite comprobar, y no solo memorizar, que para índice par la raíz
  principal es no negativa, por lo que \(\sqrt{x^2}=|x|\)'
procedimiento:
- 'Paso 1: Reconoce la potencia y compara su exponente con el índice radical.'
- 'Paso 2: Simplifica respetando la raíz principal y el signo del valor.'
- 'Paso 3: Comprueba elevando el resultado y revisando las restricciones del dominio.'
ejemplos:
- titulo: Aplicación razonada — Raíz enésima como operación inversa de la potencia
  enunciado: \(\sqrt[5]{3^5}=3\).
  solucion_pasos:
  - Reconoce la potencia y compara su exponente con el índice radical.
  - Simplifica respetando la raíz principal y el signo del valor.
  - Comprueba elevando el resultado y revisando las restricciones del dominio.
- titulo: Revisión de una solución — Raíz enésima como operación inversa de la potencia
  enunciado: Una solución aplica “Simplifica respetando la raíz principal y el signo del valor.”, pero
    termina sin comprobar que para índice par la raíz principal es no negativa, por lo que \(\sqrt{x^2}=|x|\).
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define raíz enésima como operación inversa de la potencia: la raíz enésima
    deshace una potencia de exponente \(n\) dentro de las condiciones de su dominio.'
  - Reconoce la potencia y compara su exponente con el índice radical.
  - 'Completa la revisión con este control: Comprueba elevando el resultado y revisando las restricciones
    del dominio.'
- titulo: ¿Se cumple que para índice par la raíz principal es no negativa, por lo que \(\sqrt{x^2}=|x|\)?
    — Raíz enésima como operación inversa de la potencia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la raíz enésima deshace una potencia de exponente \(n\)
    dentro de las condiciones de su dominio.
  - El caso “\(\sqrt[5]{3^5}=3\)” satisface esa condición.
  - Comprueba elevando el resultado y revisando las restricciones del dominio.
- titulo: ¿Es válido omitir el paso “Reconoce la potencia y compara su exponente con el índice radical”?
    — Raíz enésima como operación inversa de la potencia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de raíz enésima como operación inversa de la potencia.
  - 'Omitirlo puede volver inválida la acción siguiente: Simplifica respetando la raíz principal y el
    signo del valor.'
  - 'La solución debe terminar de este modo: Comprueba elevando el resultado y revisando las restricciones
    del dominio.'
errores_frecuentes:
- 'Confundir raíz enésima como operación inversa de la potencia con otro concepto y omitir este inicio:
  Reconoce la potencia y compara su exponente con el índice radical.'
- Aplicar mecánicamente “Simplifica respetando la raíz principal y el signo del valor.” sin revisar las
  condiciones de la definición.
- Tomar “\(\sqrt[5]{3^5}=3\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “para índice par la raíz principal es no negativa,
  por lo que \(\sqrt{x^2}=|x|\)”.
- 'Terminar el desarrollo sin realizar este control: Comprueba elevando el resultado y revisando las restricciones
  del dominio.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
