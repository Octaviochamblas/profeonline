semantic_id: MAT.GEO.TRIG_APLICA_REAL.NAVEGACION
titulo: Resolución de problemas de navegación mediante leyes trigonométricas
objetivo: Resolver problemas de navegación (embarcaciones o aeronaves que cambian de rumbo) utilizando
  la ley de senos o de cosenos para calcular distancias o ángulos entre sus posiciones.
introduccion: En navegación, las embarcaciones recorren distancias en distintas direcciones (rumbos),
  formando triángulos oblicuángulos entre sus posiciones y el punto de partida, que se resuelven con las
  leyes trigonométricas.
resumen: Un problema de navegación se modela como un triángulo oblicuángulo donde los lados representan
  las distancias recorridas y los ángulos representan los cambios de rumbo entre las trayectorias.
explicacion: '![Problemas de navegación](/static/img/geometria/trigonometria/trigreal-navegacion.svg)


  ### Definición formal


  Si dos embarcaciones parten de un mismo punto con rumbos que forman un ángulo conocido, y cada una recorre
  una distancia conocida, la distancia entre ambas se calcula con la ley de cosenos (configuración LAL).


  ### Desarrollo didáctico


  Por ejemplo, dos barcos parten de un puerto: uno navega 40 km en un rumbo, y el otro 55 km en un rumbo
  que forma un ángulo de 65° con el primero. La distancia entre ambos barcos se calcula como $\sqrt{40^2+55^2-2\times40\times55\times\cos65°}$.'
procedimiento:
- 'Paso 1: Identifica las distancias recorridas por cada embarcación y el ángulo entre sus rumbos.'
- 'Paso 2: Modela la situación como un triángulo con esos dos lados y el ángulo comprendido entre ellos.'
- 'Paso 3: Aplica la ley de cosenos para calcular la distancia entre las embarcaciones (o la ley de senos
  si se busca un ángulo).'
ejemplos:
- titulo: Calcular la distancia entre dos barcos
  enunciado: Un barco navega 40 km y otro 55 km desde el mismo puerto, con un ángulo de 65° entre sus
    rumbos.
  solucion_pasos:
  - distancia²=40²+55²-2×40×55×cos65°≈1600+3025-1861,6≈2763,4 → distancia≈52,6 km.
- titulo: Calcular el ángulo de rumbo conociendo las tres distancias
  enunciado: Dos barcos están a 50 km y 60 km del puerto, y a 70 km entre sí.
  solucion_pasos:
  - 'Usando ley de cosenos: cos(ángulo)=(50²+60²-70²)/(2×50×60)=(2500+3600-4900)/6000=1200/6000=0,2 →
    ángulo≈78,5°.'
- titulo: ¿Se puede usar la ley de cosenos si se conocen dos distancias recorridas y el ángulo entre rumbos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente la configuración LAL para calcular la distancia entre las embarcaciones.
- titulo: ¿Los problemas de navegación siempre forman triángulos rectángulos?
  respuesta: 'No'
  solucion_pasos:
  - No, generalmente los cambios de rumbo forman ángulos arbitrarios, dando triángulos oblicuángulos.
errores_frecuentes:
- Asumir que los rumbos siempre forman ángulos rectos entre sí.
- Confundir el ángulo entre los rumbos con el ángulo de cada rumbo respecto del norte (que es un dato
  distinto).
- Aplicar la ley de senos cuando la configuración de datos disponible corresponde a LAL (se necesita ley
  de cosenos).
fuente: Elaboración propia.
estado: publicado
