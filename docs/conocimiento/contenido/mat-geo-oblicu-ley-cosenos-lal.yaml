semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.LEY_COSENOS_LAL
titulo: Cálculo del tercer lado conocidos dos lados y el ángulo comprendido
objetivo: Calcular el tercer lado de un triángulo utilizando la ley de cosenos, cuando se conocen dos
  lados y el ángulo comprendido entre ellos (configuración LAL).
introduccion: A diferencia de la ley de senos, que requiere un par lado-ángulo opuesto completo, la ley
  de cosenos permite resolver directamente una configuración lado-ángulo-lado (LAL), sin ambigüedad.
resumen: Dado un ángulo $A$ comprendido entre los lados $b$ y $c$, el lado opuesto $a$ se calcula como
  $a=\sqrt{b^2+c^2-2bc\cos A}$.
explicacion: '![Ley de cosenos: caso LAL](/static/img/geometria/trigonometria/oblicu-ley-cosenos-lal.svg)


  ### Definición formal


  De la ley de cosenos $a^2=b^2+c^2-2bc\cos A$, se obtiene directamente $a=\sqrt{b^2+c^2-2bc\cos A}$,
  sin necesidad de despejar ningún ángulo previamente.


  ### Desarrollo didáctico


  Si $b=7$, $c=9$ y $A=50°$, entonces $a=\sqrt{49+81-2\times7\times9\times\cos50°}\approx\sqrt{130-90{,}9}\approx\sqrt{39{,}1}\approx6{,}25$.'
procedimiento:
- 'Paso 1: Identifica los dos lados conocidos y el ángulo comprendido entre ellos.'
- 'Paso 2: Sustituye los valores en a²=b²+c²-2bc·cosA.'
- 'Paso 3: Calcula a extrayendo la raíz cuadrada del resultado.'
ejemplos:
- titulo: Calcular el tercer lado con b=7, c=9, A=50°
  enunciado: Se busca el lado a.
  solucion_pasos:
  - a²=49+81-126×cos50°≈130-81≈49; a≈7 (valor aproximado).
- titulo: Calcular el tercer lado con b=10, c=10, A=90°
  enunciado: Triángulo rectángulo isósceles.
  solucion_pasos:
  - a²=100+100-200×cos90°=200-0=200; a=√200≈14,14.
- titulo: ¿Esta configuración (LAL) presenta el caso ambiguo?
  respuesta: 'No'
  solucion_pasos:
  - No, LAL siempre determina un único triángulo, a diferencia de SSA.
- titulo: ¿Es necesario calcular primero algún ángulo antes de encontrar el lado desconocido?
  respuesta: 'No'
  solucion_pasos:
  - No, la ley de cosenos permite calcular el lado directamente a partir de los dos lados y el ángulo
    comprendido.
errores_frecuentes:
- Usar un ángulo que no está comprendido entre los dos lados conocidos.
- Olvidar extraer la raíz cuadrada al final del cálculo.
- Confundir esta configuración (LAL) con una que sí presenta ambigüedad (SSA).
fuente: Elaboración propia.
estado: publicado
