semantic_id: MAT.GEO.TRANSVERSAL_BARICENTRO.SEIS_AREAS_EQUIVALENTES
titulo: División del triángulo en seis áreas equivalentes por sus transversales de gravedad
objetivo: Reconocer que las tres transversales de gravedad dividen a un triángulo en seis triángulos más
  pequeños de igual área.
introduccion: Al trazar las tres transversales de gravedad de un triángulo, la figura queda dividida en
  seis regiones triangulares que, sorprendentemente, tienen todas exactamente la misma área.
resumen: Las tres transversales de gravedad de un triángulo lo dividen en seis triángulos de área equivalente.
explicacion: '![División en seis triángulos de área equivalente](/static/img/geometria/elementos-secundarios/transversal-baricentro-seis-areas-equivalentes.svg)


  ### Definición formal


  Si se trazan las tres transversales de gravedad de un triángulo ABC, los seis triángulos formados (con
  vértice común en el baricentro G) tienen todos la misma área, igual a 1/6 del área del triángulo original.


  ### Desarrollo didáctico


  Si el triángulo original tiene área 24, cada uno de los seis triángulos formados por las transversales
  de gravedad tiene área 24/6=4.'
procedimiento:
- 'Paso 1: Traza las tres transversales de gravedad del triángulo.'
- 'Paso 2: Identifica los seis triángulos formados alrededor del baricentro.'
- 'Paso 3: Aplica que cada uno tiene área igual a 1/6 del área total.'
ejemplos:
- titulo: Calcular el área de una región
  enunciado: Un triángulo tiene área 30 y se trazan sus tres transversales de gravedad.
  solucion_pasos:
  - Cada uno de los seis triángulos formados tiene área 30/6=5.
- titulo: Calcular el área total desde una región
  enunciado: Uno de los seis triángulos formados tiene área 3.
  solucion_pasos:
  - El área total del triángulo original es 3×6=18.
- titulo: ¿Los seis triángulos tienen exactamente la misma área?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad central de esta división.
- titulo: ¿Esta propiedad requiere que el triángulo sea equilátero?
  respuesta: 'No'
  solucion_pasos:
  - No, se cumple en cualquier triángulo, sin importar su forma.
errores_frecuentes:
- Creer que solo triángulos equiláteros o isósceles cumplen esta propiedad.
- Confundir los seis triángulos con las tres regiones más grandes formadas por una sola transversal de
  gravedad.
- Calcular mal la división, asumiendo áreas distintas entre las seis regiones.
fuente: Elaboración propia.
estado: publicado
