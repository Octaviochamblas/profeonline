semantic_id: MAT.ALG.MULT_MONOMIOS.MONOMIOS_NEGATIVOS
objetivo: Multiplicar monomios que contienen signos negativos en sus coeficientes
  y variables.
introduccion: Los signos negativos en el álgebra pueden asustar, pero en la multiplicación
  son de lo más predecibles. Siguiendo las reglas de signos que ya conoces, los negativos
  simplemente se cancelan por pares o se mantienen si hay un número impar.
resumen: Al multiplicar **Monomios Negativos**, se calcula el signo final según la
  regla de signos (par o impar de negativos). Los coeficientes numéricos se multiplican
  normalmente y se suman los exponentes de las variables de igual base.
explicacion: 'Multiplica: $(-3x^2y^2)(-5xy^3)$.


  1. Signo: dos negativos multiplicando se cancelan → positivo.

  2. Coeficientes: $3 \times 5 = 15$.

  3. Parte literal: $x^2 \cdot x = x^3$ y $y^2 \cdot y^3 = y^5$.

  4. Resultado final: $15x^3y^5$.


  Si multiplicamos tres factores: $(-2a)(-a^2)(-3b)$:

  - 3 negativos (impar) → negativo.

  - Coeficientes: $2 \times 1 \times 3 = 6$.

  - Letras: $a \cdot a^2 \cdot b = a^3b$.

  - Resultado: $-6a^3b$.'
procedimiento:
- 'Paso 1: Cuenta el número de signos negativos entre todos los factores.'
- 'Paso 2: Si el total es par, el resultado es positivo. Si es impar, es negativo.'
- 'Paso 3: Multiplica los valores absolutos de los coeficientes.'
- 'Paso 4: Multiplica las partes literales aplicando la suma de exponentes de igual
  base.'
- 'Paso 5: Combina el signo final con el coeficiente y las variables ordenadas alfabéticamente.'
ejemplos:
- titulo: Triple producto negativo
  enunciado: 'Multiplica: (-2x)(-3x^2)(-x^3).'
  solucion_pasos:
  - 'Signos: 3 negativos (impar) → -.'
  - 'Coeficientes: 2 × 3 × 1 = 6.'
  - 'Variable x: x^1 · x^2 · x^3 = x^6.'
  - 'Resultado: -6x^6.'
errores_frecuentes:
- Sumar los coeficientes negativos creyendo que es una adición (ej. $(-2)(-3) = -5$
  en lugar de $+6$).
- Omitir el signo negativo del coeficiente del resultado cuando hay un número impar
  de factores negativos.
fuente: Álgebra de Baldor.
estado: publicado
