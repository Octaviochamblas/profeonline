semantic_id: MAT.ALG.MCD_ALGEBRAICO.COEFICIENTE_MONOMIOS
titulo: MCD de los Coeficientes Numéricos
objetivo: Calcular el Máximo Común Divisor de los coeficientes numéricos en un conjunto de monomios.
introduccion: Antes de lidiar con las letras, debemos limpiar el terreno de los números. Todo monomio tiene un coeficiente
  (el número que va adelante). Extraer el MCD algebraico siempre empieza por encontrar el MCD tradicional de estos
  coeficientes.
resumen: El coeficiente numérico del MCD algebraico es simplemente el MCD aritmético de los coeficientes de las
  expresiones dadas (tomando sus valores absolutos).
explicacion: '### Definición formal


  El MCD algebraico utiliza el MCD aritmético estándar para su parte numérica.


  ### Desarrollo didáctico


  Para los coeficientes numéricos (los números grandes al inicio de cada término), el MCD se calcula exactamente
  igual que en aritmética básica.


  Debes buscar el número más grande que divida a todos los coeficientes a la vez.


  Por ejemplo, para los términos $12x$, $18y$ y $24z$:

  - Los divisores de 12 son: 1, 2, 3, 4, 6, 12.

  - Los divisores de 18 son: 1, 2, 3, 6, 9, 18.

  - Los divisores de 24 son: 1, 2, 3, 4, 6, 8, 12, 24.


  El número más grande que aparece en las tres listas es el **6**. Por lo tanto, el MCD de los coeficientes es 6.
  Es fundamental calcular esto correctamente porque es el primer paso (y la mitad del trabajo) para factorizar por
  factor común.'
procedimiento:
- 'Paso 1: Identifica los coeficientes numéricos de todos los monomios (sus valores absolutos).'
- 'Paso 2: Descompón cada número en factores primos, o lista mentalmente sus divisores.'
- 'Paso 3: Identifica el mayor divisor que tengan en común (MCD aritmético).'
- 'Paso 4: Este número será el coeficiente del MCD algebraico final.'
- El MCD algebraico utiliza el MCD aritmético estándar para su parte numérica.
ejemplos:
- titulo: Halla el coeficiente del MCD de $24a^2b$ y $36a^3$
  enunciado: Halla el coeficiente del MCD de $24a^2b$ y $36a^3$.
  solucion_pasos:
  - 'Coeficientes: 24 y 36.'
  - 'Descomposición: $24 = 2^3 \times 3$. $36 = 2^2 \times 3^2$.'
  - 'MCD aritmético: tomamos factores comunes al menor exponente: $2^2 \times 3 = 4 \times 3 = 12$.'
  - El coeficiente del MCD es 12.
- titulo: ¿Cuál es la parte numérica del MCD entre $7x$ y $15y$?
  solucion_pasos:
  - Los números 7 y 15 no tienen divisores comunes además del 1 (son coprimos). Por tanto, es 1.
- titulo: 'Respecto de «Determinación del M.C.D. numérico entre monomios»: ¿La siguiente formulación es'
  enunciado: 'Respecto de «Determinación del M.C.D. numérico entre monomios»: ¿La siguiente formulación es correcta?
    «El coeficiente numérico del MCD algebraico es simplemente el MCD aritmético de los coeficientes de las expresiones
    dadas (tomando sus valores absolutos)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El coeficiente numérico del MCD algebraico es simplemente
    el MCD aritmético de los coeficientes de las expresiones dadas (tomando sus valores absolutos).'
- titulo: 'Respecto de «Determinación del M.C.D. numérico entre monomios»: ¿La siguiente conclusión es'
  enunciado: 'Respecto de «Determinación del M.C.D. numérico entre monomios»: ¿La siguiente conclusión es correcta?
    «Calcular el MCM de los números en lugar del MCD (ej. para 4 y 6, responder 12 en vez de 2)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El coeficiente numérico del MCD algebraico es simplemente
    el MCD aritmético de los coeficientes de las expresiones dadas (tomando sus valores absolutos).'
errores_frecuentes:
- Calcular el MCM de los números en lugar del MCD (ej. para 4 y 6, responder 12 en vez de 2).
- Creer que si uno de los números es primo, el MCD es ese número. (Ej. para 5 y 10 sí es 5, pero para 5 y 12 es
  1).
- Para «¿Cómo se determina el coeficiente del MCD de varios monomios», la respuesta correcta es Multiplicando todos
  los coeficientes.
- Buscando el MCM aritmético.
- Para «¿Cómo se determina el coeficiente del MCD de varios monomios», la respuesta correcta es Sumando los coeficientes.
