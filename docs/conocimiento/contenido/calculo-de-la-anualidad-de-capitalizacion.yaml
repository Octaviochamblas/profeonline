semantic_id: MAT.NUM.INTERES_COMPUESTO.ANUALIDAD_CAPITALIZACION
titulo: Cálculo de la anualidad de capitalización
objetivo: Comprender el concepto básico de anualidad o cuota fija como mecanismo de pago de deudas o ahorros
  constantes.
introduccion: A diferencia de un depósito único que dejas años en el banco, en la vida real pagamos el
  dividendo de la casa o guardamos dinero para la jubilación mes a mes. Esa 'cuota constante' se llama
  anualidad.
resumen: Una Anualidad es una sucesión de pagos, depósitos o retiros iguales que se realizan a intervalos
  regulares de tiempo, con interés compuesto. Si pagas el auto en 48 cuotas fijas, estás pagando una anualidad.
explicacion: 'El término **Anualidad** puede ser engañoso, porque **no significa necesariamente que se
  pague una vez al año**. Es el nombre matemático para **pagos o depósitos periódicos iguales**.


  Ejemplos clásicos de Anualidades:

  - El pago mensual del dividendo de una casa (crédito hipotecario).

  - El descuento mensual de tu sueldo para la AFP o salud.

  - Depositar $\$50.000$ fijos cada mes en una cuenta de ahorro para el pie de una casa.


  El modelamiento matemático de las anualidades mezcla la suma de muchos cálculos de interés compuesto
  (se usan fórmulas de series geométricas), pero conceptualmente debes reconocer que una ''cuota fija''
  implica que una parte del dinero paga los intereses generados ese mes, y el resto amortiza (disminuye)
  la deuda original.'
procedimiento:
- 'Paso 1: Identifica si el problema involucra un único movimiento de dinero (fórmula de interés compuesto
  tradicional) o pagos/depósitos repetitivos constantes.'
- 'Paso 2: Si son cuotas fijas repetitivas a lo largo del tiempo, clasifícalo conceptualmente como una
  Anualidad.'
ejemplos:
- titulo: Identificando la anualidad
  enunciado: Si depositas $2.000.000 hoy y no lo tocas en 5 años, ¿es una anualidad? Si depositas $50.000
    mensuales por 5 años, ¿es una anualidad?
  solucion_pasos:
  - El depósito de $2.000.000 es un pago único. NO es anualidad.
  - El depósito de $50.000 mensuales es una sucesión de pagos constantes. SÍ es una anualidad (anualidad
    mensual).
errores_frecuentes:
- Creer que la palabra 'Anualidad' solo se aplica a pagos que ocurren en diciembre o una vez al año.
- Tratar de calcular el monto final de depósitos sucesivos usando la fórmula simple $M = C(1+i)^t$.
fuente: Currículum Nacional MINEDUC.
estado: publicado
