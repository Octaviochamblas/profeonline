semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.DOMINIO
titulo: Dominio de la función coseno
objetivo: Determinar que el dominio de $f(x)=\cos(x)$ es todo $\mathbb{R}$.
introduccion: Igual que el seno, el coseno no impone ninguna restricción sobre los valores de entrada de la
  función.
resumen: El dominio de $f(x)=\cos(x)$ es **todo $\mathbb{R}$**, ya que cualquier número real puede interpretarse
  como una medida angular y siempre determina un punto en el círculo unitario.
explicacion: '### Definición formal


  Para cualquier $x\in\mathbb{R}$, existe un ángulo (en radianes) con esa medida, y ese ángulo siempre determina
  un único punto sobre el círculo unitario. Por lo tanto, $\cos(x)$ está definido para todo $x$ real, sin
  excepciones.


  ### Desarrollo didáctico


  $\cos(500)$, $\cos(-30)$ o $\cos(0{,}001)$ están todos definidos, cada uno dando un resultado entre $-1$ y
  $1$, sin importar cuán grande o pequeño sea el argumento.'
procedimiento:
- 'Paso 1: Recuerda que cualquier número real representa una medida angular válida.'
- 'Paso 2: Verifica que todo ángulo determina un punto sobre el círculo unitario.'
- 'Paso 3: Concluye que el dominio de $\cos(x)$ es todo $\mathbb{R}$, sin restricciones.'
ejemplos:
- titulo: Verificación de un valor grande dentro del dominio
  enunciado: '¿Está definido $\cos(500)$?'
  solucion_pasos:
  - $500$ es un número real, así que representa un ángulo válido.
  - Sí, $\cos(500)$ está definido, con un valor entre $-1$ y $1$.
- titulo: Verificación de un valor negativo dentro del dominio
  enunciado: '¿Está definido $\cos(-15)$?'
  solucion_pasos:
  - $-15$ es un número real, así que representa un ángulo válido.
  - Sí, $\cos(-15)$ está definido.
- titulo: ¿Existe algún número real que no pertenezca al dominio de $\cos(x)$?
  enunciado: ¿Existe algún valor real de $x$ para el cual $\cos(x)$ no esté definido?
  respuesta: 'No'
  solucion_pasos:
  - Todo número real representa una medida angular válida, así que el dominio es completo.
- titulo: ¿El dominio del coseno es distinto del dominio del seno?
  enunciado: ¿El dominio de $f(x)=\cos(x)$ es distinto del dominio de $g(x)=\sin(x)$?
  respuesta: 'No'
  solucion_pasos:
  - Ambas funciones comparten el mismo dominio: todo $\mathbb{R}$.
errores_frecuentes:
- Suponer que el dominio se restringe a valores entre $0$ y $2\pi$.
- Confundir el dominio con el recorrido, que sí está acotado entre $-1$ y $1$.
- Creer que valores muy grandes de $x$ generan resultados indefinidos.
- No reconocer que cualquier número real representa un ángulo válido.
