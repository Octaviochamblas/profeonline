semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.PUNTO_SOBRE_CIRCUNFERENCIA
titulo: Determinación de un punto sobre una circunferencia mediante distancia al centro
objetivo: Determinar si un punto pertenece exactamente a una circunferencia, verificando que su distancia
  al centro sea igual al radio.
introduccion: Un punto pertenece a la circunferencia (no está ni dentro ni fuera) exactamente cuando su
  distancia al centro coincide con el radio.
resumen: Un punto $(x_0,y_0)$ está sobre una circunferencia de centro $(h,k)$ y radio $r$ si $\sqrt{(x_0-h)^2+(y_0-k)^2}=r$.
explicacion: '![Punto sobre una circunferencia](/static/img/geometria/analitica/posrc-punto-sobre-circunferencia.svg)


  ### Definición formal


  Un punto pertenece a la circunferencia si su distancia al centro es exactamente igual al radio: $d(P,\text{centro})=r$.


  ### Desarrollo didáctico


  Para la circunferencia $x^2+y^2=25$ (centro (0,0), radio 5) y el punto $P(3,4)$: $d=\sqrt{9+16}=\sqrt{25}=5=r$,
  por lo que $P$ está exactamente sobre la circunferencia.'
procedimiento:
- 'Paso 1: Identifica el centro y el radio de la circunferencia.'
- 'Paso 2: Calcula la distancia entre el punto dado y el centro de la circunferencia.'
- 'Paso 3: Si esa distancia es exactamente igual al radio, el punto está sobre la circunferencia.'
ejemplos:
- titulo: Verificar que P(3,4) está sobre x²+y²=25
  enunciado: Centro (0,0), radio 5, P(3,4).
  solucion_pasos:
  - d=√(9+16)=√25=5=r, por lo que P está sobre la circunferencia.
- titulo: Verificar un punto sobre una circunferencia con centro distinto del origen
  enunciado: (x-1)²+(y-2)²=9, punto (4,2).
  solucion_pasos:
  - d=√((4-1)²+(2-2)²)=√9=3=r, por lo que el punto está sobre la circunferencia.
- titulo: ¿Sustituir el punto directamente en la ecuación de la circunferencia da el mismo resultado que
    comparar distancias?
  respuesta: Sí
  solucion_pasos:
  - Sí, si el punto satisface la ecuación (x-h)²+(y-k)²=r², está sobre la circunferencia.
- titulo: ¿Un punto sobre la circunferencia también puede considerarse interior?
  respuesta: 'No'
  solucion_pasos:
  - No, interior, sobre y exterior son tres categorías mutuamente excluyentes.
errores_frecuentes:
- Confundir la condición de igualdad (sobre la circunferencia) con la de desigualdad (interior o exterior).
- Sustituir el punto en la ecuación pero cometer errores aritméticos que oculten la igualdad real.
- Olvidar que basta con sustituir directamente en (x-h)²+(y-k)²=r², sin necesidad de extraer la raíz cuadrada.
fuente: Elaboración propia.
estado: publicado
