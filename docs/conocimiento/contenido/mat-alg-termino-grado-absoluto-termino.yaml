semantic_id: MAT.ALG.TERMINO.GRADO_ABSOLUTO_TERMINO
objetivo: Calcular el grado absoluto de un término algebraico sumando los exponentes de sus variables.
introduccion: '¿Qué tan ''pesado'' matemáticamente es un vagón de tren algebraico? El Grado Absoluto es como pesar
  el término completo en una balanza: metemos todas las letras y sumamos su potencia total.'
resumen: "El **Grado Absoluto** de un término algebraico es la **suma de los exponentes de TODAS sus letras** (variables).\
  \ \n- Si el término no tiene letras (es un número puro), su grado absoluto es cero."
explicacion: '### Definición formal


  El grado absoluto es una medida global del término, sumando todas las potencias literales presentes.


  ### Desarrollo didáctico


  Para encontrar el grado absoluto, ignoramos completamente al coeficiente numérico y nos concentramos solo en la
  parte literal.

  Ejemplo 1: Termino $4x^3$.

  - Tiene solo una letra ($x$) con exponente $3$. Su grado absoluto es $3$.


  Ejemplo 2: Término $-5a^2b^3c$.

  - Exponente de $a$ = $2$.

  - Exponente de $b$ = $3$.

  - Exponente de $c$ = $1$ (el uno invisible).

  - Grado absoluto = $2 + 3 + 1 = 6$. Es un término de sexto grado.


  Ejemplo 3: Término $8$.

  - No hay letras. Matemáticamente es $8x^0$. Su grado absoluto es $0$.'
procedimiento:
- 'Paso 1: Olvida el número grande (el coeficiente) y su signo. No participan.'
- 'Paso 2: Haz una lista de todas las letras presentes.'
- 'Paso 3: Identifica el exponente de cada letra (pon un ''1'' si no hay número escrito).'
- 'Paso 4: Suma todos esos exponentes. El total es el grado absoluto.'
- El grado absoluto es una medida global del término, sumando todas las potencias literales presentes.
ejemplos:
- titulo: Pesando el término
  enunciado: Calcula el grado absoluto de la expresión 12m^4n^2p.
  solucion_pasos:
  - Ignoramos el 12.
  - Exponente de m = 4. Exponente de n = 2. Exponente de p = 1.
  - 'Suma: 4 + 2 + 1 = 7.'
  - El grado absoluto es 7 (séptimo grado).
- titulo: Un software de física pide ingresar fórmulas categorizadas por su 'grado dimensional' (grado
  enunciado: 'Un software de física pide ingresar fórmulas categorizadas por su ''grado dimensional'' (grado absoluto).
    Un estudiante ingresa el término de aceleración $4\pi \cdot r^2 \cdot t^3$. Si $\pi$ es el número Pi, ¿de qué
    grado absoluto es realmente el término ingresado? (v1)


    Opciones: A) Quinto grado ($5$). · B) Sexto grado ($6$). · C) Noveno grado ($9$). · D) Cuarto grado ($4$).'
  solucion_pasos:
  - Pi es una constante numérica, no aporta al grado. Solo suman r(2) y t(3). 2 + 3 = 5.
  - 'Respuesta: Quinto grado ($5$).'
- titulo: 'Respecto de «Cálculo del grado absoluto de un término»: ¿Es correcta esta caracterización? «'
  enunciado: 'Respecto de «Cálculo del grado absoluto de un término»: ¿Es correcta esta caracterización? «El **Grado
    Absoluto** de un término algebraico es la **suma de los exponentes de TODAS sus letras** (variables)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Grado Absoluto** de un término algebraico es la **suma
    de los exponentes de TODAS sus letras** (variables).'
- titulo: 'Respecto de «Cálculo del grado absoluto de un término»: ¿Es válida esta afirmación? «Olvidar'
  enunciado: 'Respecto de «Cálculo del grado absoluto de un término»: ¿Es válida esta afirmación? «Olvidar sumar
    el ''1'' invisible de las letras que no tienen exponente escrito (ej. decir que el grado de $xy^3$ es 3, cuando
    en realidad es $1+3=4$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Grado Absoluto** de un término algebraico es la **suma
    de los exponentes de TODAS sus letras** (variables).'
errores_frecuentes:
- Olvidar sumar el '1' invisible de las letras que no tienen exponente escrito (ej. decir que el grado de $xy^3$
  es 3, cuando en realidad es $1+3=4$).
- Sumar también el coeficiente numérico a la mezcla (ej. en $2x^3$ decir que el grado es $2+3=5$. El coeficiente
  jamás se suma).
- Como el valor del mayor exponente que se encuentre en el término.
- Como la suma de todos los exponentes más el coeficiente numérico.
- Como el exponente de la primera letra en orden alfabético.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Cálculo del grado absoluto de un término
