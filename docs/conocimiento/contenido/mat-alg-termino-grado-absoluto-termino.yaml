semantic_id: MAT.ALG.TERMINO.GRADO_ABSOLUTO_TERMINO
objetivo: Calcular el grado absoluto de un término algebraico sumando los exponentes
  de sus variables.
introduccion: '¿Qué tan ''pesado'' matemáticamente es un vagón de tren algebraico?
  El Grado Absoluto es como pesar el término completo en una balanza: metemos todas
  las letras y sumamos su potencia total.'
resumen: "El **Grado Absoluto** de un término algebraico es la **suma de los exponentes\
  \ de TODAS sus letras** (variables). \n- Si el término no tiene letras (es un número\
  \ puro), su grado absoluto es cero."
explicacion: 'Para encontrar el grado absoluto, ignoramos completamente al coeficiente
  numérico y nos concentramos solo en la parte literal.

  Ejemplo 1: Termino $4x^3$.

  - Tiene solo una letra ($x$) con exponente $3$. Su grado absoluto es $3$.


  Ejemplo 2: Término $-5a^2b^3c$.

  - Exponente de $a$ = $2$.

  - Exponente de $b$ = $3$.

  - Exponente de $c$ = $1$ (el uno invisible).

  - Grado absoluto = $2 + 3 + 1 = 6$. Es un término de sexto grado.


  Ejemplo 3: Término $8$.

  - No hay letras. Matemáticamente es $8x^0$. Su grado absoluto es $0$.'
procedimiento:
- 'Paso 1: Olvida el número grande (el coeficiente) y su signo. No participan.'
- 'Paso 2: Haz una lista de todas las letras presentes.'
- 'Paso 3: Identifica el exponente de cada letra (pon un ''1'' si no hay número escrito).'
- 'Paso 4: Suma todos esos exponentes. El total es el grado absoluto.'
ejemplos:
- titulo: Pesando el término
  enunciado: Calcula el grado absoluto de la expresión 12m^4n^2p.
  solucion_pasos:
  - Ignoramos el 12.
  - Exponente de m = 4. Exponente de n = 2. Exponente de p = 1.
  - 'Suma: 4 + 2 + 1 = 7.'
  - El grado absoluto es 7 (séptimo grado).
errores_frecuentes:
- Olvidar sumar el '1' invisible de las letras que no tienen exponente escrito (ej.
  decir que el grado de $xy^3$ es 3, cuando en realidad es $1+3=4$).
- Sumar también el coeficiente numérico a la mezcla (ej. en $2x^3$ decir que el grado
  es $2+3=5$. El coeficiente jamás se suma).
fuente: Álgebra de Baldor.
estado: publicado
