semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.ALTERNOS_INTERNOS_IGUALDAD
titulo: Propiedad de igualdad de medida de ángulos alternos internos entre paralelas
objetivo: Usar la propiedad de los ángulos alternos internos para justificar una medida y comprobar que
  la propiedad solo puede aplicarse después de verificar que el par elegido realmente es alternos internos.
introduccion: 'En geometría muchas igualdades parecen obvias porque el dibujo ''se ve bien''. Con paralelas
  y transversal conviene ir más lento: primero se nombra bien el par y recién después se transfiere la
  medida.'
resumen: Si dos rectas paralelas son cortadas por una transversal, los ángulos alternos internos tienen
  igual medida. Como idea de control, la propiedad solo puede aplicarse después de verificar que el par
  elegido realmente es alternos internos.
explicacion: 'Si dos rectas paralelas son cortadas por una transversal, los ángulos alternos internos
  tienen igual medida.


  Cuando se analiza “si un alterno interno mide 68°, el otro alterno interno también mide 68°” conviene
  evitar la memoria mecánica. El control decisivo es comprobar que la propiedad solo puede aplicarse después
  de verificar que el par elegido realmente es alternos internos.'
procedimiento:
- 'Paso 1: Reconoce un par de ángulos alternos internos en el esquema.'
- 'Paso 2: Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.'
- 'Paso 3: Comprueba que el resultado respete la posición del par y la condición de paralelismo.'
ejemplos:
- titulo: Aplicación directa — Igualdad de alternos internos
  enunciado: Si un alterno interno mide 68°, el otro alterno interno también mide 68°.
  solucion_pasos:
  - Reconoce un par de ángulos alternos internos en el esquema.
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: Revisión del razonamiento — Igualdad de alternos internos
  enunciado: Al resolver “si un alterno interno mide 68°, el otro alterno interno también mide 68°”, una
    alumna salta desde el dibujo a la conclusión. Indica qué control geométrico faltó y cómo cerrar la
    solución.
  solucion_pasos:
  - 'Parte de la definición: si dos rectas paralelas son cortadas por una transversal, los ángulos alternos
    internos tienen igual medida.'
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿El caso confirma que la propiedad solo puede aplicarse después de verificar que el par elegido
    realmente es alternos internos? — Igualdad de alternos internos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: si dos rectas paralelas son cortadas por una
    transversal, los ángulos alternos internos tienen igual medida.'
  - En el caso “si un alterno interno mide 68°, el otro alterno interno también mide 68°” se observa que
    la propiedad solo puede aplicarse después de verificar que el par elegido realmente es alternos internos.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿Basta con reconoce un par de ángulos alternos internos en el esquema? — Igualdad de alternos
    internos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de propiedad de igualdad de medida de ángulos
    alternos internos entre paralelas.
  - Después del paso “Reconoce un par de ángulos alternos internos en el esquema.” todavía hace falta
    revisar “Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.”.
  - El cierre correcto exige “Comprueba que el resultado respete la posición del par y la condición de
    paralelismo.”.
errores_frecuentes:
- Igualdad de alternos internos significa ser suplementarios por estar dentro de las paralelas.
- Para resolver igualdad de alternos internos, basta con el paso “Reconoce un par de ángulos alternos
  internos en el esquema.” y no hace falta revisar “Usa la propiedad correspondiente para relacionar la
  medida conocida con la incógnita.”.
- Si el dibujo parece claro, se puede ignorar que la propiedad solo puede aplicarse después de verificar
  que el par elegido realmente es alternos internos.
- Dos configuraciones distintas representan igualdad de alternos internos solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que el resultado respete la posición
  del par y la condición de paralelismo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
