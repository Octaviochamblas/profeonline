semantic_id: MAT.ALG.MULT_MONOMIOS.MULTIPLES_MONOMIOS
objetivo: Multiplicar tres o más monomios en una sola operación aplicando las propiedades
  asociativa y conmutativa.
introduccion: Cuando multiplicas tres o más números, como $2 \times 3 \times 5$, multiplicas
  dos de ellos y luego el resultado por el tercero. Al multiplicar tres o más monomios,
  hacemos exactamente lo mismo combinando todos los números y todas las letras juntas.
resumen: Al multiplicar **Múltiples Monomios**, el signo final se determina contando
  los factores negativos. Luego se multiplican todos los coeficientes numéricos y
  se suman los exponentes de las letras que tengan la misma base.
explicacion: 'Calcula: $(-2x^2)(3y)(-5x^3y^2)$.


  Paso 1: Signo. 2 negativos (par) → $+$.

  Paso 2: Coeficientes. $2 \times 3 \times 5 = 30$.

  Paso 3: Variable $x$. $x^2 \cdot x^3 = x^5$.

  Paso 4: Variable $y$. $y^1 \cdot y^2 = y^3$.


  Resultado combinado: $30x^5y^3$.'
procedimiento:
- 'Paso 1: Determina el signo final contando cuántos términos negativos hay (par →
  +, impar → -).'
- 'Paso 2: Multiplica todos los coeficientes numéricos entre sí.'
- 'Paso 3: Agrupa las variables de igual base y suma sus exponentes.'
- 'Paso 4: Escribe las variables sin repetir en orden alfabético.'
- 'Paso 5: Ensambla el signo, el coeficiente y la parte literal en un solo término.'
ejemplos:
- titulo: Tres factores combinados
  enunciado: 'Multiplica: (a^2b)(-3ab^2)(-2c).'
  solucion_pasos:
  - 'Signo: 2 negativos → +.'
  - 'Coeficientes: 1 × 3 × 2 = 6.'
  - 'Variable a: a^2 · a = a^3.'
  - 'Variable b: b · b^2 = b^3.'
  - 'Variable c: c (se mantiene).'
  - 'Resultado: 6a^3b^3c.'
errores_frecuentes:
- Multiplicar los exponentes de la misma base en lugar de sumarlos.
- Olvidar el exponente 1 de variables que no muestran número arriba (ej. $y \cdot
  y^2 = y^2$ en lugar de $y^3$).
fuente: Álgebra de Baldor.
estado: publicado
