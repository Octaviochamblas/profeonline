semantic_id: MAT.NUM.FINANZAS_PERSONALES.TIPOS_INGRESO
objetivo: Identificar y clasificar diferentes tipos de ingresos personales.
introduccion: El dinero puede llegar a tu bolsillo por distintas vías. Entender si
  ese dinero es seguro (un sueldo) o depende de tu esfuerzo mes a mes (una comisión)
  cambia por completo cómo debes planificar tu vida.
resumen: Los ingresos pueden ser Fijos (sueldo base asegurado) o Variables (comisiones
  por venta, horas extras, ganancias de negocios independientes o bonos de acciones).
explicacion: "Al armar un presupuesto, los **ingresos (entradas de dinero)** dictan\
  \ tu nivel de vida. Se dividen en:\n\n- **Ingresos Fijos:** Dinero que recibes regularmente\
  \ y cuyo monto es seguro y predecible. El mejor ejemplo es el **salario o sueldo\
  \ base** mensual de un empleado contratado, o una pensión de jubilación.\n- **Ingresos\
  \ Variables:** Dinero que puede cambiar de mes a mes o no estar garantizado.\n \
  \ - **Comisión:** Dinero extra que se paga por lograr metas de ventas.\n  - **Horas\
  \ Extras:** Dinero por trabajar más allá del horario fijo.\n  - **Honorarios / Freelance:**\
  \ Ingresos de un trabajador independiente (un mes puede tener muchos clientes y\
  \ otro mes ninguno).\n  - **Dividendos e Intereses:** Ganancias variables por tener\
  \ acciones en empresas o dinero invertido en depósitos a plazo."
procedimiento:
- 'Paso 1: Analiza la fuente del dinero.'
- 'Paso 2: Si el monto está garantizado por contrato cada mes independiente del rendimiento,
  es Fijo.'
- 'Paso 3: Si el monto depende de cuántas ventas hiciste, o cómo le fue al negocio,
  es Variable.'
ejemplos:
- titulo: Sueldo mixto
  enunciado: Un vendedor gana $500.000 base + 5% por cada venta que haga. ¿Qué tipo
    de ingresos tiene?
  solucion_pasos:
  - Los $500.000 son Ingreso Fijo, cuenta con ellos sí o sí.
  - El 5% de ventas es una Comisión, por ende, es Ingreso Variable. Su presupuesto
    mensual debe basarse en lo fijo para no endeudarse.
errores_frecuentes:
- Creer que porque un mes te fue muy bien como independiente (ganando mucho), pasaste
  a tener un ingreso fijo alto.
- Confundir un ingreso variable como un 'bono esporádico' con algo fijo con lo que
  pagar deudas.
fuente: Currículum Nacional MINEDUC.
estado: publicado
