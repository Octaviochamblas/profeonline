semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.ASINTOTA_VERTICAL
titulo: Asíntota vertical de la función potencia con exponente negativo
objetivo: Reconocer que $f(x)=a\cdot x^{-n}$ tiene una asíntota vertical en $x=0$.
introduccion: Al acercarse a $x=0$, el denominador de la fracción equivalente se hace cada vez más pequeño, lo
  que dispara el valor de la función hacia el infinito.
resumen: La gráfica de $f(x)=a\cdot x^{-n}$ (con $n$ entero positivo) tiene una **asíntota vertical** en la recta
  $x=0$, ya que la función no está definida ahí y sus valores divergen al acercarse a ese punto.
explicacion: '### Definición formal


  Como $f(x)=a\cdot x^{-n}=a/x^n$, cuando $x\to0$, el denominador $x^n\to0$, así que $|f(x)|\to+\infty$. La
  recta $x=0$ es asíntota vertical, ya que la gráfica se aproxima a ella sin cruzarla, tanto por la izquierda
  como por la derecha.


  ### Desarrollo didáctico


  $f(x)=1/x^2$: para $x=0{,}1$, $f(0{,}1)=100$; para $x=0{,}01$, $f(0{,}01)=10\,000$. Mientras más se acerca $x$
  a $0$, más grande se vuelve el resultado, confirmando la asíntota vertical.'
procedimiento:
- 'Paso 1: Identifica que el dominio de $f(x)=a\cdot x^{-n}$ excluye $x=0$.'
- 'Paso 2: Evalúa la función con valores de $x$ cada vez más cercanos a $0$.'
- 'Paso 3: Observa que los valores de $|f(x)|$ crecen sin cota, señalando la asíntota en $x=0$.'
ejemplos:
- titulo: Comportamiento cerca de la asíntota vertical
  enunciado: 'Describe qué ocurre con $f(x)=1/x^2$ cuando $x$ se acerca a $0$.'
  solucion_pasos:
  - Se evalúan valores decrecientes de $|x|$: $0{,}1$, $0{,}01$, $0{,}001$.
  - Los resultados $100$, $10\,000$, $1\,000\,000$ crecen sin límite.
- titulo: Identificación de la ecuación de la asíntota vertical
  enunciado: '¿Cuál es la ecuación de la asíntota vertical de $f(x)=5x^{-3}$?'
  solucion_pasos:
  - El dominio de cualquier función con exponente negativo excluye $x=0$.
  - La asíntota vertical es siempre la recta $x=0$, sin importar el coeficiente ni el exponente.
- titulo: ¿La función con exponente negativo cruza su asíntota vertical?
  enunciado: ¿La gráfica de $f(x)=a\cdot x^{-n}$ llega a tocar la recta $x=0$?
  respuesta: 'No'
  solucion_pasos:
  - $x=0$ no pertenece al dominio de la función.
- titulo: ¿La asíntota vertical depende del exponente $n$?
  enunciado: ¿La posición de la asíntota vertical cambia según el valor del exponente $n$?
  respuesta: 'No'
  solucion_pasos:
  - Para cualquier exponente negativo entero, la asíntota vertical siempre es $x=0$.
errores_frecuentes:
- Confundir la asíntota vertical con la asíntota horizontal de esta misma función.
- Creer que la gráfica puede tocar el eje $y$ para valores muy pequeños de $x$.
- Pensar que la posición de la asíntota depende del exponente o del coeficiente.
- Olvidar mencionar que la asíntota es vertical al describir la gráfica.
