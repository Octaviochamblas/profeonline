semantic_id: MAT.ALG.CUADRADO_TRINOMIO.MANEJO_SIGNOS
titulo: Manejo de signos en el cuadrado de trinomio
objetivo: Determinar correctamente el signo de los dobles productos cuando hay términos negativos.
introduccion: Los cuadrados siempre son positivos, pero los dobles productos dependen de a quién multipliques.
resumen: 'En $(a-b-c)^2$:

  - Los cuadrados $a^2, b^2, c^2$ siempre suman en positivo.

  - El signo del doble producto se determina multiplicando los signos de los dos términos involucrados.'
explicacion: "### Definición formal\n\nPara términos con signo $t_1, t_2, \\dots, t_k$ (cada $t_i$ incluye\
  \ su propio signo), se cumple $(t_1+\\dots+t_k)^2 = \\sum_i t_i^2 + 2\\sum_{i<j} t_i t_j$. Como $t_i^2\
  \ \\ge 0$ sin importar el signo de $t_i$, cada cuadrado individual aporta siempre un término positivo;\
  \ el signo de cada doble producto $2t_it_j$ queda determinado por la regla de los signos de la multiplicación.\n\
  \n### Desarrollo didáctico\n\nCuando elevamos un trinomio al cuadrado que incluye restas, como $(a-b-c)^2$,\
  \ no hace falta memorizar una fórmula nueva con diferentes signos. Podemos usar la misma regla original\
  \ $(a+b+c)^2$ con un principio clave: **cada término incluye su propio signo**.\n\n**¿Cómo proceder?**\n\
  En $(a - b - c)^2$, considera que los tres términos son: $+a$, $-b$, y $-c$. Aplica la regla normal\
  \ incorporando estos signos:\n\n1. **Bloque de cuadrados (Siempre positivos):**\n   $(a)^2 + (-b)^2\
  \ + (-c)^2 = a^2 + b^2 + c^2$. *(Todo número real al cuadrado es positivo.)*\n\n2. **Bloque de dobles\
  \ productos (Dependen de las parejas):**\n   - Par 1: $2(a)(-b) = -2ab$\n   - Par 2: $2(a)(-c) = -2ac$\n\
  \   - Par 3: $2(-b)(-c) = +2bc$ *(Menos por menos da más)*\n\n**Resultado final ensamblado:**\n$a^2\
  \ + b^2 + c^2 - 2ab - 2ac + 2bc$.\nEl bloque inicial siempre será positivo. Los signos de los dobles\
  \ productos cambiarán naturalmente al multiplicar las combinaciones."
procedimiento:
- 'Paso 1: Identifica los 3 términos con sus signos antes de empezar y aplica la regla de los signos en
  cada doble producto.'
- El doble producto de $x$ y $-y$ es $2(x)(-y) = -2xy$. Coeficiente $-2$.
ejemplos:
- titulo: Con signos negativos
  enunciado: Calcula $(2m - n + 3)^2$.
  solucion_pasos:
  - 'Términos: $2m, -n, 3$.'
  - 'Cuadrados: $4m^2 + n^2 + 9$.'
  - 'Dobles: $2(2m)(-n) = -4mn$; $2(2m)(3) = 12m$; $2(-n)(3) = -6n$.'
  - 'Total: $4m^2 + n^2 + 9 - 4mn + 12m - 6n$.'
- titulo: Si se desarrolla $(x - y - 1)^2$, ¿cuál es el coeficiente del término $xy$
  enunciado: 'Si se desarrolla $(x - y - 1)^2$, ¿cuál es el coeficiente del término $xy$?


    Opciones: A) $-2$ · B) $2$ · C) $1$ · D) $-1$'
  solucion_pasos:
  - El doble producto de $x$ y $-y$ es $2(x)(-y) = -2xy$. Coeficiente $-2$.
