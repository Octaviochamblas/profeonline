  enunciado: 'Respecto de «Manejo de signos en el cuadrado de trinomio»: ¿Es compatible con el procedimiento
    esta afirmación? «Poner los cuadrados de los términos negativos con signo menos (ej. $-n^2$)»'
  respuesta: 'No'
  solucion_pasos:
