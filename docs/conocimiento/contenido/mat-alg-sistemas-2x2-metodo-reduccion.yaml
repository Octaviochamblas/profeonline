semantic_id: MAT.ALG.SISTEMAS_2X2.METODO_REDUCCION
titulo: Método de Reducción (Suma/Resta)
objetivo: eliminar una variable sumando o restando las ecuaciones verticalmente.
introduccion: 'Para que se se eliminen, debes tener exactamente la misma cantidad de una letra, pero con signos
  opuestos (ej: $+3y$ arriba y $-3y$ abajo).'
resumen: El método de reducción combina ecuaciones equivalentes para eliminar una incógnita. Después se resuelve
  la ecuación resultante y se recupera la variable restante.
explicacion: '### Definición formal


  El método de reducción combina ecuaciones equivalentes para eliminar una incógnita. Después se resuelve la ecuación
  resultante y se recupera la variable restante.


  ### Desarrollo didáctico


  Para que se se eliminen, debes tener exactamente la misma cantidad de una letra, pero con signos opuestos (ej:
  $+3y$ arriba y $-3y$ abajo).

  Si no los tienes, los creas. Multiplicas una (o ambas) ecuaciones por un número estratégico para forzar esa situación.

  Una vez forzada, sumas hacia abajo: las ''y'' desaparecen ($3y - 3y = 0$), las ''x'' se suman, los números se
  suman, y te queda una micro-ecuación rapidísima de resolver.'
procedimiento:
- Elige qué incógnita quieres eliminar.
- Multiplica las ecuaciones por números convenientes para que los coeficientes de esa incógnita sean iguales pero
  de signo contrario.
- Suma ambas ecuaciones columna por columna (las x con las x, las y con las y, los números con los números).
- Resuelve la ecuación resultante de una sola incógnita.
- Reemplaza el valor en una ecuación original para hallar la otra.
