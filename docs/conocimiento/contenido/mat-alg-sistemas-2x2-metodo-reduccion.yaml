semantic_id: 'MAT.ALG.SISTEMAS_2X2.METODO_REDUCCION'
titulo: 'Método de Reducción (Suma/Resta)'
objetivo: 'Aniquilar una variable sumando o restando las ecuaciones verticalmente.'
introduccion: |
  El método de reducción es el más rápido, poderoso y elegante (y el favorito en pruebas PAES). Se trata de sumar las dos ecuaciones verticalmente para que una de las letras se 'aniquile'.
resumen: 'Este proceso es fundamental para encontrar la solución correcta.'
explicacion: |
  Para que se anulen, debes tener exactamente la misma cantidad de una letra, pero con signos opuestos (ej: $+3y$ arriba y $-3y$ abajo).
  Si no los tienes, ¡los creas! Multiplicas una (o ambas) ecuaciones por un número estratégico para forzar esa situación.
  Una vez forzada, sumas hacia abajo: las 'y' desaparecen ($3y - 3y = 0$), las 'x' se suman, los números se suman, y te queda una micro-ecuación rapidísima de resolver.
procedimiento:
  - 'Paso 1: Elige qué incógnita quieres eliminar.'
  - 'Paso 2: Multiplica las ecuaciones por números convenientes para que los coeficientes de esa incógnita sean iguales pero de signo contrario.'
  - 'Paso 3: Suma ambas ecuaciones columna por columna (las x con las x, las y con las y, los números con los números).'
  - 'Paso 4: Resuelve la ecuación resultante de una sola incógnita.'
  - 'Paso 5: Reemplaza el valor en una ecuación original para hallar la otra.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
