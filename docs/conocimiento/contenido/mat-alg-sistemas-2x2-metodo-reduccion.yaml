- titulo: 'Respecto de «Resolución mediante el método de reducción»: ¿Se ajusta a la definición esta af'
  enunciado: 'Respecto de «Resolución mediante el método de reducción»: ¿Se ajusta a la definición esta afirmación?
    «El método de reducción combina ecuaciones equivalentes para eliminar una incógnita»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El método de reducción combina ecuaciones equivalentes para
    eliminar una incógnita.'
- titulo: 'Respecto de «Resolución mediante el método de reducción»: ¿Es compatible con el procedimient'
  enunciado: 'Respecto de «Resolución mediante el método de reducción»: ¿Es compatible con el procedimiento esta
    afirmación? «Puede omitirse esta condición sin cambiar el resultado: «Elige qué incógnita quieres eliminar»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El método de reducción combina ecuaciones equivalentes para
    eliminar una incógnita.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Elige qué incógnita quieres eliminar».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Multiplica las ecuaciones por números convenientes
  para que los coeficientes de esa incógnita sean iguales pero de signo contrario».'
- La definición sigue cumpliéndose aunque no se considere que el método de reducción es el más rápido, poderoso
  y elegante (y el favorito en pruebas PAES). Se trata de sumar las dos ecuaciones verticalmente para que una de
  las letras se 'aniquile'.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Resuelve la ecuación resultante de una
  sola incógnita».
- La comprobación del resultado vuelve innecesaria la condición «Reemplaza el valor en una ecuación original para
  hallar la otra».
