semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.LEY_COSENOS_LLL
titulo: Cálculo de un ángulo conocidos los tres lados del triángulo
objetivo: Calcular un ángulo de un triángulo utilizando la ley de cosenos, cuando se conocen los tres
  lados (configuración LLL).
introduccion: Cuando se conocen los tres lados de un triángulo pero ninguno de sus ángulos, la ley de
  cosenos permite despejar el coseno de cualquiera de ellos, sin ambigüedad.
resumen: Dados los tres lados $a$, $b$, $c$ de un triángulo, el ángulo $A$ (opuesto a $a$) se calcula
  despejando $\cos A=\dfrac{b^2+c^2-a^2}{2bc}$, y luego $A=\arccos\left(\dfrac{b^2+c^2-a^2}{2bc}\right)$.
explicacion: '![Ley de cosenos: caso LLL](/static/img/geometria/trigonometria/oblicu-ley-cosenos-lll.svg)


  ### Definición formal


  Despejando $\cos A$ de $a^2=b^2+c^2-2bc\cos A$, se obtiene $\cos A=\dfrac{b^2+c^2-a^2}{2bc}$.


  ### Desarrollo didáctico


  Si $a=7$, $b=8$ y $c=9$, entonces $\cos A=\dfrac{64+81-49}{2\times8\times9}=\dfrac{96}{144}\approx0{,}667$,
  por lo que $A\approx48{,}2°$.'
procedimiento:
- 'Paso 1: Identifica el ángulo que se busca y el lado opuesto a ese ángulo.'
- 'Paso 2: Despeja el coseno del ángulo: cosA=(b²+c²-a²)/(2bc).'
- 'Paso 3: Aplica arcocoseno para obtener la medida del ángulo.'
ejemplos:
- titulo: Calcular un ángulo con los tres lados a=7, b=8, c=9
  enunciado: Se busca el ángulo A.
  solucion_pasos:
  - cosA=(64+81-49)/144=96/144≈0,667 → A≈48,2°.
- titulo: Calcular un ángulo con los tres lados a=5, b=5, c=5
  enunciado: Triángulo equilátero.
  solucion_pasos:
  - cosA=(25+25-25)/50=25/50=0,5 → A=60°, consistente con un triángulo equilátero.
- titulo: ¿Este método (LLL) presenta el caso ambiguo?
  respuesta: 'No'
  solucion_pasos:
  - No, conocidos los tres lados, el ángulo se determina de forma única (arcocoseno siempre da un único
    valor entre 0° y 180°).
- titulo: ¿Es necesario aplicar arcocoseno al final del procedimiento?
  respuesta: Sí
  solucion_pasos:
  - Sí, luego de despejar cosA, se aplica arcocoseno para obtener la medida del ángulo.
errores_frecuentes:
- Confundir qué lado va en el numerador con signo negativo (debe ser el lado opuesto al ángulo buscado).
- Olvidar aplicar arcocoseno después de despejar el valor del coseno.
- Intentar aplicar la ley de senos en vez de la de cosenos cuando solo se conocen los tres lados.
fuente: Elaboración propia.
estado: publicado
