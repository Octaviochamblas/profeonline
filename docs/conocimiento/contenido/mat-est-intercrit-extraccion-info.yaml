semantic_id: MAT.EST.INTERPRETACION_CRITICA.EXTRACCION_INFO
titulo: Extraer información directa desde gráficos estadísticos
objetivo: Extraer directamente información específica (valores, comparaciones, totales) desde un gráfico
  estadístico dado.
introduccion: Antes de analizar críticamente un gráfico, es necesario dominar la lectura directa de la
  información que contiene.
resumen: La extracción de información consiste en leer con precisión los valores, categorías y relaciones
  representadas en un gráfico estadístico, sin realizar interpretaciones adicionales.
explicacion: '![Extracción de información desde gráficos](/static/img/estadistica/intercrit/intercrit-extraccion-info.svg)


  ### Definición formal


  Extraer información implica identificar directamente valores explícitos del gráfico: alturas de barras,
  sectores de un círculo, puntos de una línea, sin agregar juicios o inferencias no soportadas por los
  datos.


  ### Desarrollo didáctico


  Si un gráfico de barras muestra que 15 personas prefieren café y 10 prefieren té, la extracción directa
  de información es simplemente leer esos valores (15 y 10), sin todavía interpretar por qué ocurre esa
  preferencia.'
procedimiento:
- 'Paso 1: Observa el gráfico completo, identificando ejes, escalas y leyenda.'
- 'Paso 2: Lee los valores específicos que se piden (alturas, sectores, puntos).'
- 'Paso 3: Reporta esos valores tal como aparecen, sin agregar interpretaciones adicionales en esta etapa.'
ejemplos:
- titulo: Extraer información de un gráfico de barras
  enunciado: Un gráfico muestra 15 personas prefieren café y 10 prefieren té.
  solucion_pasos:
  - 'Se extrae directamente: café=15, té=10.'
- titulo: Extraer información de un gráfico circular
  enunciado: Un gráfico circular muestra un sector de 40% para 'vivienda'.
  solucion_pasos:
  - 'Se extrae directamente: el 40% del gasto corresponde a vivienda.'
- titulo: ¿Extraer información implica leer valores explícitos sin interpretaciones adicionales?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el primer paso antes de cualquier análisis o inferencia más profunda.
- titulo: ¿Se puede extraer información errónea si no se lee cuidadosamente la escala del gráfico?
  respuesta: Sí
  solucion_pasos:
  - Sí, una lectura apresurada de la escala puede llevar a extraer valores incorrectos.
errores_frecuentes:
- Leer apresuradamente un gráfico sin verificar cuidadosamente su escala y leyenda.
- Confundir la extracción directa de información con una interpretación o conclusión más elaborada.
- Extraer valores aproximados cuando el gráfico permite una lectura más precisa.
fuente: 'Elaboración propia (referencia: Moraleja 131, 354).'
estado: publicado
