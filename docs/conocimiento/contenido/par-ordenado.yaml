semantic_id: MAT.FUND.PRODUCTO_CARTESIANO.PAR_ORDENADO
titulo: Par ordenado
objetivo: 'Comprender el concepto de par ordenado $(a, b)$, reconocer que el orden de los

  componentes es fundamental, e identificar la primera y segunda coordenada.

  '
introduccion: 'En matemáticas, cuando queremos relacionar dos objetos teniendo en cuenta el orden,

  usamos la noción de **par ordenado**. A diferencia de un conjunto donde $\{a, b\} = \{b, a\}$,

  en un par ordenado la posición importa: $(a, b)$ es distinto de $(b, a)$ a menos que $a = b$.

  Esta distinción es la base del producto cartesiano y del plano cartesiano.

  '
resumen: 'Un par ordenado $(a, b)$ está formado por dos componentes en un orden fijo:

  - $a$ es la **primera coordenada** (o primera componente).

  - $b$ es la **segunda coordenada** (o segunda componente).

  Dos pares ordenados son iguales sólo si sus primeras coordenadas son iguales

  **y** sus segundas coordenadas son iguales.

  En particular, $(a, b) \neq (b, a)$ salvo cuando $a = b$.

  '
explicacion: 'El par ordenado formaliza la idea de "primero esto, luego aquello". Cuando escribimos

  $(a, b)$, estamos diciendo que $a$ ocupa el primer lugar y $b$ el segundo; cambiar ese

  orden produce un objeto distinto.


  **Notación:** se usan paréntesis y una coma: $(a, b)$.


  **Igualdad:** $(a, b) = (c, d) \iff a = c \text{ y } b = d$.


  **Ejemplo motivador:** las coordenadas geográficas (latitud, longitud) son pares ordenados:

  (40° N, 74° O) es Nueva York; (74° N, 40° O) es un punto completamente diferente.

  '
procedimiento: 'Para determinar si dos pares ordenados son iguales:

  1. Comparar las primeras coordenadas. Si son distintas, los pares son distintos. Fin.

  2. Si las primeras coordenadas son iguales, comparar las segundas coordenadas.

  3. Si ambas coinciden, los pares son iguales; de lo contrario, son distintos.


  Para encontrar un valor desconocido en un par ordenado dado que dos pares son iguales:

  1. Igualar componente a componente (primera con primera, segunda con segunda).

  2. Resolver cada ecuación resultante por separado.

  3. Verificar que la solución sea consistente.

  '
ejemplos:
- tipo: A
  titulo: ¿Es $(2, 5) = (5, 2)$?
  enunciado: 'Determina si el par ordenado $(2, 5)$ es igual al par ordenado $(5, 2)$.

    Justifica tu respuesta comparando cada componente.

    '
  solucion_pasos: "Paso 1 — Comparar primeras coordenadas:\n  Primera coordenada de $(2, 5)$: $2$\n  Primera\
    \ coordenada de $(5, 2)$: $5$\n  Como $2 \\neq 5$, las primeras coordenadas difieren.\n\nPaso 2 —\
    \ Conclusión:\n  Basta con que una coordenada difiera para que los pares sean distintos.\n  Por lo\
    \ tanto, $(2, 5) \\neq (5, 2)$.\n\nRespuesta: **No**, $(2, 5) \\neq (5, 2)$ porque $2 \\neq 5$.\n"
- tipo: A
  titulo: Encuentra $x$ si $(x + 1,\, 3) = (4,\, 3)$
  enunciado: 'Sabiendo que $(x + 1, 3) = (4, 3)$, determina el valor de $x$.

    '
  solucion_pasos: "Paso 1 — Igualar primeras coordenadas:\n  $x + 1 = 4$\n\nPaso 2 — Resolver para $x$:\n\
    \  $x = 4 - 1 = 3$\n\nPaso 3 — Igualar segundas coordenadas (verificación):\n  $3 = 3$ ✓ (consistente,\
    \ no impone condición adicional)\n\nRespuesta: $x = 3$.\n"
- tipo: B
  titulo: ¿Es cierto que $(a, b) = (b, a)$ para todo par de valores $a$ y $b$?
  respuesta: 'No'
  solucion_pasos: "Contraejemplo: tomemos $a = 1$ y $b = 2$.\n  $(a, b) = (1, 2)$ y $(b, a) = (2, 1)$.\n\
    \  Primera coordenada de $(1, 2)$: $1$.\n  Primera coordenada de $(2, 1)$: $2$.\n  Como $1 \\neq 2$,\
    \ resulta $(1, 2) \\neq (2, 1)$.\n\nLa igualdad $(a, b) = (b, a)$ solo se cumple cuando $a = b$.\n\
    Por tanto, la afirmación es **falsa** en general.\n"
- tipo: B
  titulo: ¿Puede un par ordenado tener dos componentes iguales, como $(3, 3)$?
  respuesta: Sí
  solucion_pasos: 'Un par ordenado $(a, b)$ no exige que $a \neq b$.

    El par $(3, 3)$ es perfectamente válido: su primera coordenada es $3$

    y su segunda coordenada es también $3$.


    Además, en este caso especial $(3, 3) = (3, 3)$, es decir,

    invertir el orden no cambia el par (porque $a = b$).


    Por tanto, la respuesta es **Sí**.

    '
errores_frecuentes:
- error: Confundir par ordenado con conjunto de dos elementos
  descripcion: 'Escribir $\{a, b\}$ cuando se quiere decir $(a, b)$. En el conjunto

    $\{a, b\} = \{b, a\}$; en el par ordenado $(a, b) \neq (b, a)$ en general.

    '
  correccion: 'Usar siempre paréntesis y coma para pares ordenados.

    Recordar que el orden es parte esencial de la definición.

    '
- error: Afirmar que $(a, b) = (b, a)$ siempre
  descripcion: 'Asumir que el orden no importa por analogía con la suma o el producto

    (donde $a + b = b + a$).

    '
  correccion: 'La conmutatividad es una propiedad de operaciones, no de pares ordenados.

    $(a, b) = (b, a)$ solo cuando $a = b$.

    '
- error: Comparar solo una coordenada para decidir igualdad
  descripcion: 'Concluir que $(2, 5) = (2, 7)$ porque ambas tienen primera coordenada $2$.

    '
  correccion: 'Deben coincidir **ambas** coordenadas: primera con primera y segunda con segunda.

    '
- error: Creer que un par ordenado no puede tener coordenadas iguales
  descripcion: 'Pensar que $(3, 3)$ es inválido o contradictorio porque "son iguales".

    '
  correccion: 'No hay restricción: las dos coordenadas pueden ser iguales o distintas.

    $(3, 3)$ es un par ordenado completamente válido.

    '
- error: Resolver la ecuación de igualdad mezclando coordenadas
  descripcion: 'Al resolver $(x + 1, 3) = (4, 3)$, igualar la primera coordenada de un par

    con la segunda del otro, obteniendo $x + 1 = 3$ en vez de $x + 1 = 4$.

    '
  correccion: 'Siempre igualar primera con primera y segunda con segunda, en ese orden.

    '
fuente: Matemáticas para la Educación Media, MINEDUC
estado: publicado
