semantic_id: MAT.EST.MEDIA_PROMEDIO.SUMA_CONSTANTE
titulo: Analizar el efecto de sumar o restar una constante a todos los datos sobre la media
objetivo: Analizar cómo cambia la media de un conjunto de datos cuando se suma o resta una misma constante
  a todos los valores.
introduccion: Comprender este efecto permite predecir rápidamente cambios en la media sin necesidad de
  recalcular todo desde cero.
resumen: Si a todos los datos de un conjunto se les suma (o resta) una constante $k$, la nueva media es
  igual a la media original más (o menos) esa misma constante $k$.
explicacion: '![Efecto de sumar una constante en la media](/static/img/estadistica/promedio/media-suma-constante.svg)


  ### Definición formal


  Si $y_i=x_i+k$ para todo $i$, entonces $\bar{y}=\bar{x}+k$.


  ### Desarrollo didáctico


  Si la media de las notas de un curso es 5,5 y el profesor decide sumar 0,5 puntos a todas las notas
  por igual, la nueva media será $5{,}5+0{,}5=6{,}0$.'
procedimiento:
- 'Paso 1: Identifica la media original del conjunto de datos.'
- 'Paso 2: Identifica la constante k que se suma (o resta) a todos los datos por igual.'
- 'Paso 3: Suma (o resta) esa constante k directamente a la media original para obtener la nueva media.'
ejemplos:
- titulo: Calcular la nueva media al sumar puntos a todas las notas
  enunciado: Media original=5,5. Se suma 0,5 a todas las notas.
  solucion_pasos:
  - Nueva media=5,5+0,5=6,0.
- titulo: Calcular la nueva media al restar un descuento fijo
  enunciado: Media de precios=1000. Se aplica un descuento de 100 a todos los precios.
  solucion_pasos:
  - Nueva media=1000-100=900.
- titulo: ¿Sumar una misma constante a todos los datos cambia la media exactamente en esa constante?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad descrita en este recurso.
- titulo: ¿Es necesario recalcular la media completa desde cero después de sumar una constante a todos
    los datos?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con sumar esa misma constante a la media original ya conocida.
errores_frecuentes:
- Pensar que la nueva media requiere recalcular todo el conjunto de datos desde cero, sin usar esta propiedad.
- Confundir el efecto de sumar una constante (que suma directamente a la media) con el de multiplicarla
  (que la escala proporcionalmente).
- Aplicar la constante solo a algunos datos en vez de a todos por igual, violando la condición de esta
  propiedad.
fuente: 'Elaboración propia (referencia: Moraleja 160).'
estado: publicado
