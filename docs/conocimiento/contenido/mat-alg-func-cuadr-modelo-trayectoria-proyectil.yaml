semantic_id: MAT.ALG.FUNC_CUADR_MODELO.TRAYECTORIA_PROYECTIL
titulo: Resolución de problemas de trayectoria de proyectiles usando funciones cuadráticas
objetivo: Resolver problemas de altura de un proyectil en función del tiempo, usando la función cuadrática correspondiente.
introduccion: El movimiento vertical de cualquier objeto lanzado (una pelota, un cohete de juguete, una piedra)
  sigue una trayectoria parabólica descrita por una función cuadrática del tiempo.
resumen: La altura de un proyectil se modela con $h(t)=-\dfrac{1}{2}gt^2+v_0t+h_0$, donde $t$ es el tiempo, $v_0$
  la velocidad inicial y $h_0$ la altura inicial; a partir de esta función se responden preguntas sobre su trayectoria.
explicacion: '### Definición formal


  La función $h(t)=-\dfrac{1}{2}gt^2+v_0t+h_0$ modela la altura de un proyectil en el instante $t$, donde $g$
  es la aceleración de gravedad, $v_0$ la velocidad inicial (positiva si es hacia arriba) y $h_0$ la altura desde
  la que se lanza. Es una función cuadrática en $t$, con coeficiente principal negativo.


  ### Desarrollo didáctico


  A partir de la función de altura, se pueden responder distintas preguntas: la altura máxima (vértice), cuándo
  toca el suelo (cero positivo), o en qué instante alcanza una altura específica (igualando $h(t)$ a ese valor).


  Con $h(t)=-5t^2+20t+2$ (en metros), la altura inicial es $h(0)=2$ m, y se puede calcular en qué instante alcanza,
  por ejemplo, $17$ m resolviendo $-5t^2+20t+2=17$.'
procedimiento:
- 'Paso 1: Identifica la función de altura $h(t)$ dada o planteada en el problema.'
- 'Paso 2: Determina qué se pregunta (altura máxima, tiempo en el suelo, instante con altura específica).'
- 'Paso 3: Aplica la herramienta correspondiente (vértice, ceros, o resolución de ecuación) según la pregunta.'
ejemplos:
- titulo: Cálculo de la altura inicial
  enunciado: 'Con $h(t)=-4{,}9t^2+15t+1$, ¿cuál es la altura desde la que se lanza el proyectil?'
  solucion_pasos:
  - La altura inicial corresponde a $h(0)$.
  - '$h(0)=1$ m.'
- titulo: Cálculo del tiempo en que toca el suelo
  enunciado: 'Con $h(t)=-5t^2+20t$, ¿en qué instante el proyectil toca el suelo?'
  solucion_pasos:
  - 'Se resuelve $-5t^2+20t=0$, factorizando: $-5t(t-4)=0$.'
  - 'Descartando $t=0$, el proyectil toca el suelo a los $4$ segundos.'
- titulo: ¿El coeficiente cuadrático en un modelo de trayectoria de proyectil es siempre negativo?
  enunciado: ¿El coeficiente cuadrático en un modelo de trayectoria de proyectil es siempre negativo?
  respuesta: Sí
  solucion_pasos:
  - Representa el efecto de la gravedad frenando el ascenso, por lo que el término $-\frac{1}{2}g$ siempre es
    negativo.
- titulo: ¿La velocidad inicial $v_0$ puede ser negativa en este modelo?
  enunciado: ¿La velocidad inicial $v_0$ puede ser negativa en este modelo?
  respuesta: Sí
  solucion_pasos:
  - Si el objeto se lanza hacia abajo en vez de hacia arriba, la velocidad inicial se representa con un valor
    negativo.
errores_frecuentes:
- Confundir la altura inicial $h_0$ con la altura máxima alcanzada por el proyectil.
- Aceptar como válida una solución de tiempo negativo.
- No verificar si la pregunta pide el instante en que toca el suelo o cuándo alcanza una altura intermedia (que
  puede tener dos soluciones).
- Cometer errores de signo al identificar el coeficiente cuadrático negativo del modelo.
