semantic_id: MAT.ALG.COMPOSICION_FUNCIONES.ORDEN_COMPOSICION
titulo: Reconocimiento del orden en una composición de funciones
objetivo: Reconocer que la composición de funciones generalmente no es conmutativa y que el orden altera el resultado.
introduccion: Duplicar un número y luego sumarle uno no es lo mismo que sumarle uno y luego duplicarlo. El orden
  de composición casi siempre importa.
resumen: 'En general, $(f \circ g)(x) \neq (g \circ f)(x)$: la composición de funciones **no es conmutativa**,
  por lo que el orden en que se aplican las funciones altera el resultado.'
explicacion: '### Definición formal


  Dadas dos funciones $f$ y $g$, no existe garantía general de que $(f\circ g)(x)=(g\circ f)(x)$ para todo $x$;
  esta igualdad solo se cumple para pares particulares de funciones (por ejemplo, cuando una es la inversa de
  la otra, dando la identidad), no como regla general.


  ### Desarrollo didáctico


  Para verificar si el orden importa en un caso concreto, basta con calcular ambas composiciones y compararlas
  término a término.


  Si $f(x)=x+1$ y $g(x)=2x$: $(f\circ g)(x)=2x+1$, mientras que $(g\circ f)(x)=2(x+1)=2x+2$. Son expresiones distintas,
  confirmando que el orden importa en este caso.'
procedimiento:
- 'Paso 1: Calcula $(f\circ g)(x)$ sustituyendo $g$ dentro de $f$.'
- 'Paso 2: Calcula $(g\circ f)(x)$ sustituyendo $f$ dentro de $g$.'
- 'Paso 3: Compara ambas expresiones - si son distintas, el orden de composición importa en ese caso.'
ejemplos:
- titulo: Verificación de no conmutatividad
  enunciado: 'Si $f(x)=x^2$ y $g(x)=x+3$, compara $(f\circ g)(x)$ con $(g\circ f)(x)$.'
  solucion_pasos:
  - '$(f\circ g)(x)=(x+3)^2=x^2+6x+9$.'
  - '$(g\circ f)(x)=x^2+3$.'
  - Son expresiones distintas; el orden importa.
- titulo: Caso especial donde el orden no afecta el resultado en un punto
  enunciado: 'Si $f(x)=x^2$ y $g(x)=x+3$, evalúa ambas composiciones en $x=0$ y compara.'
  solucion_pasos:
  - '$(f\circ g)(0)=(0+3)^2=9$.'
  - '$(g\circ f)(0)=0^2+3=3$.'
  - Incluso en un punto específico, los resultados pueden diferir.
- titulo: ¿La composición de funciones es siempre conmutativa?
  enunciado: ¿La composición de funciones es siempre conmutativa?
  respuesta: 'No'
  solucion_pasos:
  - En general $(f\circ g)(x) \neq (g\circ f)(x)$; solo coincide en casos particulares.
- titulo: ¿Puede existir algún par de funciones donde el orden de composición no afecte el resultado?
  enunciado: ¿Puede existir algún par de funciones donde el orden de composición no afecte el resultado?
  respuesta: Sí
  solucion_pasos:
  - Existen casos particulares (como una función y su inversa) donde ambas composiciones coinciden, aunque no
    es la regla general.
errores_frecuentes:
- Asumir que la composición es conmutativa sin verificarlo explícitamente.
- Confundir la no conmutatividad de la composición con la de la suma o el producto.
- Calcular solo una de las dos composiciones al comparar el orden.
- Generalizar un caso particular donde coinciden a todas las funciones.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
