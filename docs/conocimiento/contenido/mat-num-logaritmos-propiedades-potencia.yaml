semantic_id: MAT.NUM.LOGARITMOS_PROPIEDADES.POTENCIA
objetivo: Extraer exponentes desde un argumento logarítmico.
introduccion: Una potencia repite un factor y el logaritmo convierte esa repetición
  multiplicativa en un coeficiente.
resumen: \(\log_b(x^k)=k\log_bx\) para \(x>0\). El exponente del argumento pasa a
  multiplicar el logaritmo.
explicacion: |-
  \(\log_b(x^k)=k\log_bx\) para \(x>0\).

  La situación “\(\log_2(8^4)=4\log_2 8=12\)” permite comprobar, y no solo memorizar, que el exponente del argumento pasa a multiplicar el logaritmo
procedimiento:
- 'Paso 1: Confirma que el argumento base de la potencia sea positivo.'
- 'Paso 2: Baja el exponente como factor delante del logaritmo.'
- 'Paso 3: Evalúa ambos lados o vuelve a introducir el factor para verificar.'
ejemplos:
- titulo: Aplicación razonada — Logaritmo de una potencia
  enunciado: \(\log_2(8^4)=4\log_2 8=12\).
  solucion_pasos:
  - Confirma que el argumento base de la potencia sea positivo.
  - Baja el exponente como factor delante del logaritmo.
  - Evalúa ambos lados o vuelve a introducir el factor para verificar.
- titulo: Revisión de una solución — Logaritmo de una potencia
  enunciado: Una solución aplica “Baja el exponente como factor delante del logaritmo.”,
    pero termina sin comprobar que el exponente del argumento pasa a multiplicar el
    logaritmo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define logaritmo de una potencia: \(\log_b(x^k)=k\log_bx\)
    para \(x>0\).'
  - Confirma que el argumento base de la potencia sea positivo.
  - 'Completa la revisión con este control: Evalúa ambos lados o vuelve a introducir
    el factor para verificar.'
- titulo: ¿Se cumple que el exponente del argumento pasa a multiplicar el logaritmo?
    — Logaritmo de una potencia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\log_b(x^k)=k\log_bx\) para \(x>0\).
  - El caso “\(\log_2(8^4)=4\log_2 8=12\)” satisface esa condición.
  - Evalúa ambos lados o vuelve a introducir el factor para verificar.
- titulo: ¿Es válido omitir el paso “Confirma que el argumento base de la potencia
    sea positivo”? — Logaritmo de una potencia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de logaritmo de una potencia.
  - 'Omitirlo puede volver inválida la acción siguiente: Baja el exponente como factor
    delante del logaritmo.'
  - 'La solución debe terminar de este modo: Evalúa ambos lados o vuelve a introducir
    el factor para verificar.'
errores_frecuentes:
- 'Confundir logaritmo de una potencia con otro concepto y omitir este inicio: Confirma
  que el argumento base de la potencia sea positivo.'
- Aplicar mecánicamente “Baja el exponente como factor delante del logaritmo.” sin
  revisar las condiciones de la definición.
- Tomar “\(\log_2(8^4)=4\log_2 8=12\)” como una igualdad aislada, sin explicar por
  qué es válida.
- Aceptar una respuesta que contradice la idea clave “el exponente del argumento pasa
  a multiplicar el logaritmo”.
- 'Terminar el desarrollo sin realizar este control: Evalúa ambos lados o vuelve a
  introducir el factor para verificar.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
