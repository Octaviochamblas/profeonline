semantic_id: MAT.NUM.DECIMALES_OPERATORIA.SUSTRACCION
objetivo: Restar números decimales.
introduccion: La afirmación “Completar con ceros puede ayudar a ordenar la sustracción”
  se puede comprobar en \(5.20 - 1.37 = 3.83\). Este recurso desarrolla el razonamiento
  de sustracción de decimales mediante alineación de coma que conecta ambas ideas.
resumen: Para restar decimales se alinean las comas y se restan cifras del mismo valor
  posicional. Como criterio de control, completar con ceros puede ayudar a ordenar
  la sustracción
explicacion: |-
  Para restar decimales se alinean las comas y se restan cifras del mismo valor posicional.

  Esta formulación se hace concreta en “\(5.20 - 1.37 = 3.83\)”. Allí puede reconocerse que completar con ceros puede ayudar a ordenar la sustracción.
procedimiento:
- 'Paso 1: Alinea minuendo y sustraendo por la coma y completa posiciones con ceros.'
- 'Paso 2: Resta por columnas respetando los préstamos.'
- 'Paso 3: Mantén la coma alineada y usa una estimación para revisar signo y magnitud.'
ejemplos:
- titulo: Aplicación razonada — Sustracción de decimales mediante alineación de coma
  enunciado: \(5.20 - 1.37 = 3.83\).
  solucion_pasos:
  - Alinea minuendo y sustraendo por la coma y completa posiciones con ceros.
  - Resta por columnas respetando los préstamos.
  - Mantén la coma alineada y usa una estimación para revisar signo y magnitud.
- titulo: Revisión de una solución — Sustracción de decimales mediante alineación
    de coma
  enunciado: Una solución aplica “Resta por columnas respetando los préstamos.”, pero
    termina sin comprobar que completar con ceros puede ayudar a ordenar la sustracción.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define sustracción de decimales mediante alineación
    de coma: para restar decimales se alinean las comas y se restan cifras del mismo
    valor posicional.'
  - Alinea minuendo y sustraendo por la coma y completa posiciones con ceros.
  - 'Completa la revisión con este control: Mantén la coma alineada y usa una estimación
    para revisar signo y magnitud.'
- titulo: ¿Se cumple que completar con ceros puede ayudar a ordenar la sustracción?
    — Sustracción de decimales mediante alineación de coma
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para restar decimales se alinean las
    comas y se restan cifras del mismo valor posicional.
  - El caso “\(5.20 - 1.37 = 3.83\)” satisface esa condición.
  - Mantén la coma alineada y usa una estimación para revisar signo y magnitud.
- titulo: ¿Es válido omitir el paso “Alinea minuendo y sustraendo por la coma y completa
    posiciones con ceros”? — Sustracción de decimales mediante alineación de coma
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de sustracción de decimales mediante
    alineación de coma.
  - 'Omitirlo puede volver inválida la acción siguiente: Resta por columnas respetando
    los préstamos.'
  - 'La solución debe terminar de este modo: Mantén la coma alineada y usa una estimación
    para revisar signo y magnitud.'
errores_frecuentes:
- 'Empezar sustracción de decimales mediante alineación de coma sin realizar este
  control inicial: Alinea minuendo y sustraendo por la coma y completa posiciones
  con ceros.'
- Memorizar “\(5.20 - 1.37 = 3.83\)” como respuesta aislada, sin reconstruir la definición
  que lo justifica.
- Convertir en receta el paso “Resta por columnas respetando los préstamos.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre sustracción de decimales mediante alineación
  de coma que contradice el criterio “Completar con ceros puede ayudar a ordenar la
  sustracción”.
- 'Cerrar el ejercicio sin esta comprobación específica: Mantén la coma alineada y
  usa una estimación para revisar signo y magnitud.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
