semantic_id: MAT.EST.INDEPENDENCIA_CONDICIONAL.PROBABILIDAD_CONJUNTA_TABLA
titulo: Identificación de probabilidades conjuntas en tablas de contingencia
objetivo: Identificar y calcular una probabilidad conjunta a partir de una celda interior de la tabla,
  distinguiéndola claramente de una probabilidad condicional.
introduccion: Es fundamental distinguir entre la probabilidad conjunta (celda entre total general) y la
  condicional (celda entre total marginal), ya que usan denominadores distintos.
resumen: La probabilidad conjunta de dos categorías se calcula como el valor de su celda interior dividido
  por el total general de la tabla, a diferencia de la probabilidad condicional, que usa un total marginal.
explicacion: '![Probabilidad conjunta en tablas de contingencia](/static/img/probabilidad/independencia/indep-probabilidad-conjunta-tabla.svg)


  ### Definición formal


  $P(A\cap B)=\dfrac{\text{celda}(A,B)}{\text{total general}}$, a diferencia de $P(A|B)=\dfrac{\text{celda}(A,B)}{\text{total
  marginal de }B}$.


  ### Desarrollo didáctico


  En la tabla de sexo y preferencia, $P(\text{Sí y Hombre})=\dfrac{18}{60}=0{,}3$, mientras que $P(\text{Sí}|\text{Hombre})=\dfrac{18}{30}=0{,}6$:
  ambos usan la misma celda, pero denominadores distintos.'
procedimiento:
- 'Paso 1: Identifica la celda interior que corresponde a la combinación de categorías de interés.'
- 'Paso 2: Para la probabilidad conjunta, divide esa celda por el total general de la tabla (no por un
  total marginal).'
- 'Paso 3: Verifica que no estás confundiendo este cálculo con el de una probabilidad condicional (que
  usaría un total marginal).'
ejemplos:
- titulo: Calcular P(Sí y Hombre) como probabilidad conjunta
  enunciado: Celda (Sí,Hombre)=18, total general=60.
  solucion_pasos:
  - P(Sí y Hombre)=18/60=0,3.
- titulo: Comparar con la probabilidad condicional equivalente
  enunciado: Misma celda=18, total marginal de Hombre=30.
  solucion_pasos:
  - P(Sí|Hombre)=18/30=0,6, un valor distinto al de la probabilidad conjunta (0,3), aunque usan la misma
    celda.
- titulo: ¿La probabilidad conjunta usa el total general como denominador?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de la probabilidad condicional, que usa un total marginal.
- titulo: ¿P(A∩B) y P(A|B) pueden calcularse desde la misma celda interior?
  respuesta: Sí
  solucion_pasos:
  - Sí, pero cada una usa un denominador distinto, dando resultados numéricamente diferentes.
errores_frecuentes:
- Confundir el denominador de la probabilidad conjunta (total general) con el de la condicional (total
  marginal).
- Usar la misma celda interior para ambos cálculos sin distinguir cuál denominador corresponde a cada
  uno.
- Interpretar erróneamente P(A∩B) como si fuera P(A|B), o viceversa.
fuente: 'Elaboración propia (referencia: Moraleja 185).'
estado: publicado
