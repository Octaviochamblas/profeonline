semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.FRACCION_OPERADOR
titulo: Traducción de una fracción como operador sobre una cantidad
objetivo: Traducir fracciones que actúan como operadores directos sobre variables o enunciados.
introduccion: ¿Qué ocurre si no quiero la cantidad entera, sino solo un pedazo proporcional de ella? Cuando
  operamos con partes o rebanadas de variables, las fracciones entran a dominar el juego.
resumen: Las expresiones como 'la mitad', 'la tercera parte' o 'los dos quintos' se traducen **multiplicando
  la fracción numérica por la variable**, o bien, colocando la variable directamente en el numerador.
explicacion: "### Definición formal\n\nSacarle la proporción a algo (el 'DE' algo) es multiplicarlo por\
  \ esa fracción. $\\frac{3}{4}$ 'de' $x$ es $\\frac{3}{4} \\cdot x$.\n\n### Desarrollo didáctico\n\n\
  Palabras clave:\n- La mitad de: $\\frac{1}{2}x$ o $\\frac{x}{2}$\n- La tercera parte de: $\\frac{1}{3}y$\
  \ o $\\frac{y}{3}$\n- La cuarta parte de: $\\frac{z}{4}$\n- Los dos tercios de: $\\frac{2}{3}x$ o $\\\
  frac{2x}{3}$\n\nLa palabra **DE** en matemáticas de proporciones significa **multiplicación**. \n'Los\
  \ tres cuartos DE un número' es $\\frac{3}{4} \\cdot x$. Que por regla de fracciones se fusiona hermosamente\
  \ en $\\frac{3x}{4}$."
procedimiento:
- 'Paso 1: Identifica la fracción mencionada en palabras (mitad = 1/2, tercio = 1/3, quintos = /5).'
- 'Paso 2: Identifica la variable objetivo (la cantidad de la que se está sacando la fracción).'
- 'Paso 3: Multiplica la fracción por la variable, lo que resulta en colocar el número superior multiplicando
  a la letra, y el número inferior dividiendo.'
ejemplos:
- titulo: Las tres quintas partes
  enunciado: 'Traduce algebraicamente: ''Las tres quintas partes del salario''.'
  solucion_pasos:
  - 'Fracción mencionada: 3/5.'
  - 'Variable: S (salario).'
  - La palabra 'del' implica multiplicar 3/5 por S.
  - 'Resultado final: (3S) / 5.'
- titulo: 'Un contrato de sociedad establece la distribución de utilidades. Dice literalmente: ''El soci'
  enunciado: 'Un contrato de sociedad establece la distribución de utilidades. Dice literalmente: ''El
    socio capitalista retirará como ganancia los cuatro novenos de las utilidades totales del mes''. Si
    la utilidad del mes se designa con la letra $U$, ¿qué expresión debe programar el banco para ejecutar
    la transferencia al socio capitalista? (v1)


    Opciones: A) $\frac{4U}{9}$ · B) $\frac{9U}{4}$ · C) $4U - 9$ · D) $\frac{4}{9U}$'
  solucion_pasos:
  - Los cuatro novenos son 4/9. El 'de' implica multiplicar por U. El 4 (numerador) multiplica a U, quedando
    4U todo sobre 9.
  - 'Respuesta: $\frac{4U}{9}$'
- titulo: 'Respecto de «Traducción de una fracción como operador sobre una cantidad»: ¿La siguiente for'
  enunciado: 'Respecto de «Traducción de una fracción como operador sobre una cantidad»: ¿La siguiente
    formulación es correcta? «Las expresiones como ''la mitad'', ''la tercera parte'' o ''los dos quintos''
    se traducen **multiplicando la fracción numérica por la variable**, o bien, colocando la variable
    directamente en el numerador»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Las expresiones como ''la mitad'', ''la tercera
    parte'' o ''los dos quintos'' se traducen **multiplicando la fracción numérica por la variable**,
    o bien, colocando la variable directamente en el numerador.'
- titulo: 'Respecto de «Traducción de una fracción como operador sobre una cantidad»: ¿La siguiente con'
  enunciado: 'Respecto de «Traducción de una fracción como operador sobre una cantidad»: ¿La siguiente
    conclusión es correcta? «Traducir ''la mitad de un número'' como $x - 2$. (La mitad implica dividir
    en 2, no restar 2)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Las expresiones como ''la mitad'', ''la tercera
    parte'' o ''los dos quintos'' se traducen **multiplicando la fracción numérica por la variable**,
    o bien, colocando la variable directamente en el numerador.'
errores_frecuentes:
- Traducir 'la mitad de un número' como $x - 2$. (La mitad implica dividir en 2, no restar 2).
- Escribir mal fracciones compuestas (ej. 'dos tercios de x' traducirlo como $\frac{x}{2/3}$ en lugar
  de $\frac{2x}{3}$).
- Para «En el contexto de la traducción de fracciones como operadores, ¿qué operación matemática fundamental
  se esconde detrás de la preposición 'de' o 'del' en frases como 'los tres cuartos de un número'? (v1)»,
  la respuesta correcta es Una suma entre el numerador y la variable.
- Para «En el contexto de la traducción de fracciones como operadores, ¿qué operación matemática fundamental
  se esconde detrás de la preposición 'de' o 'del' en frases como 'los tres cuartos de un número'? (v1)»,
  la respuesta correcta es Una resta entre el denominador y la variable.
- Una igualación entre la fracción y la variable.
fuente: Álgebra de Baldor.
estado: publicado
