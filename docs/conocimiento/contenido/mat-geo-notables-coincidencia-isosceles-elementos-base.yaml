semantic_id: MAT.GEO.NOTABLES_COINCIDENCIA.ISOSCELES_ELEMENTOS_BASE
titulo: Coincidencia de altura, bisectriz y transversal de gravedad relativas a la base en un triángulo
  isósceles
objetivo: Reconocer que en un triángulo isósceles, la altura, la bisectriz y la transversal de gravedad
  trazadas desde el vértice apical hacia la base son un mismo segmento.
introduccion: En un triángulo cualquiera, altura, bisectriz y transversal de gravedad de un mismo vértice
  suelen ser tres segmentos distintos. Pero en el triángulo isósceles, la simetría hace que las tres coincidan
  exactamente, si se trazan desde el vértice apical.
resumen: En un triángulo isósceles, la altura, la bisectriz y la transversal de gravedad desde el vértice
  apical hacia la base coinciden en un único segmento.
explicacion: '![Coincidencia de rectas notables en isósceles](/static/img/geometria/elementos-secundarios/notables-coincidencia-isosceles-elementos-base.svg)


  ### Definición formal


  En un triángulo isósceles ABC con AC=BC (vértice apical C), el segmento que va desde C hasta el punto
  medio de AB es simultáneamente la altura, la bisectriz del ángulo en C, y la transversal de gravedad
  relativa a la base AB.


  ### Desarrollo didáctico


  Esta coincidencia se debe a la simetría de reflexión del triángulo isósceles respecto a ese segmento:
  refleja el lado AC en el BC (y viceversa), por lo que cualquier segmento con esa simetría debe cumplir
  las tres condiciones a la vez.'
procedimiento:
- 'Paso 1: Identifica el vértice apical del triángulo isósceles (donde se unen los dos lados iguales).'
- 'Paso 2: Traza el segmento desde ese vértice hasta el punto medio de la base.'
- 'Paso 3: Reconoce que ese único segmento es a la vez altura, bisectriz y transversal de gravedad.'
ejemplos:
- titulo: Identificar la coincidencia
  enunciado: Un triángulo isósceles tiene AC=BC, con vértice apical C.
  solucion_pasos:
  - El segmento desde C al punto medio de AB es altura, bisectriz y transversal de gravedad a la vez.
- titulo: Contraste con un triángulo escaleno
  enunciado: ¿Ocurre esta coincidencia en un triángulo escaleno?
  solucion_pasos:
  - No, en un triángulo escaleno la altura, bisectriz y transversal de gravedad de un mismo vértice son
    en general tres segmentos distintos.
- titulo: ¿Esta coincidencia ocurre en los otros dos vértices del isósceles?
  respuesta: 'No'
  solucion_pasos:
  - No, solo ocurre en el vértice apical (el que forma el ángulo entre los dos lados iguales).
- titulo: ¿La coincidencia se debe a la simetría del triángulo isósceles?
  respuesta: Sí
  solucion_pasos:
  - Sí, es consecuencia directa de la simetría de reflexión del triángulo isósceles.
errores_frecuentes:
- Creer que esta coincidencia ocurre en cualquier vértice de un triángulo isósceles (solo ocurre en el
  apical).
- Aplicar esta propiedad a un triángulo escaleno, donde no se cumple.
- Confundir el vértice apical con uno de los vértices basales.
fuente: Elaboración propia.
estado: publicado
