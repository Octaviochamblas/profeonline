semantic_id: MAT.GEO.VECTORES_OPERATORIA.MODULO_VECTOR_GENERAL
titulo: Cálculo del módulo de un vector no anclado en el origen
objetivo: Calcular el módulo de un vector cuyo origen no coincide con el origen del sistema cartesiano,
  usando la fórmula general de distancia entre dos puntos.
introduccion: Cuando un vector no 'parte desde cero', su longitud se calcula igual que la distancia entre
  dos puntos cualesquiera del plano.
resumen: Si un vector $\vec{AB}$ tiene origen $A(x_A,y_A)$ y extremo $B(x_B,y_B)$ (no necesariamente el
  origen del sistema), su módulo es $|\vec{AB}|=\sqrt{(x_B-x_A)^2+(y_B-y_A)^2}$.
explicacion: '![Módulo de un vector no anclado en el origen](/static/img/geometria/cartesiano-vectores/vector-modulo-general.svg)


  ### Definición formal


  Para un vector $\vec{AB}$ con $A(x_A,y_A)$ y $B(x_B,y_B)$ cualesquiera, el módulo se calcula con la
  fórmula general de distancia: $|\vec{AB}|=\sqrt{(x_B-x_A)^2+(y_B-y_A)^2}$, sin importar si el vector
  está anclado en el origen o no.


  ### Desarrollo didáctico


  En la figura, el vector va de $A(-2,1)$ a $B(4,5)$: $|\vec{AB}|=\sqrt{(4-(-2))^2+(5-1)^2}=\sqrt{6^2+4^2}=\sqrt{52}\approx7,2$.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del origen A(xA,yA) y el extremo B(xB,yB) del vector.'
- 'Paso 2: Calcula las diferencias de coordenadas: xB-xA y yB-yA.'
- 'Paso 3: Aplica la fórmula |AB|=√((xB-xA)²+(yB-yA)²) para obtener el módulo.'
ejemplos:
- titulo: Calcular el módulo de un vector no anclado en el origen
  enunciado: El vector va de A(-2,1) a B(4,5).
  solucion_pasos:
  - '|AB|=√((4-(-2))²+(5-1)²)=√(36+16)=√52≈7,2.'
- titulo: Verificar que la fórmula coincide con la fórmula de distancia entre puntos
  enunciado: Se compara esta fórmula con la de distancia entre dos puntos.
  solucion_pasos:
  - 'Son exactamente la misma fórmula: el módulo de un vector AB es igual a la distancia entre A y B.'
- titulo: ¿Esta fórmula general también funciona si el vector está anclado en el origen?
  respuesta: Sí
  solucion_pasos:
  - Sí, cuando A=(0,0), la fórmula se simplifica exactamente a la versión más simple √(vx²+vy²).
- titulo: ¿Es necesario restar las coordenadas en el orden correcto (extremo menos origen)?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, aunque el resultado final no cambia por el cuadrado, se debe mantener la consistencia: extremo
    menos origen.'
errores_frecuentes:
- Olvidar restar las coordenadas del origen, tratando el vector como si estuviera anclado en (0,0) sin
  estarlo.
- Cometer errores de signo al calcular las diferencias de coordenadas.
- Confundir esta fórmula general con la versión simplificada válida solo para vectores anclados en el
  origen.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 123).'
estado: publicado
