titulo: MultiplicaciĂłn de dos monomios
objetivo: Multiplicar dos monomios aplicando la regla de signos, el producto de coeficientes y la suma
  de exponentes de bases iguales.
introduccion: Multiplicar dos monomios es el bloque bĂĄsico de toda la multiplicaciĂłn algebraica. Consiste
  simplemente en fusionar dos tĂŠrminos simples en uno solo siguiendo tres reglas ordenadas.
resumen: Para multiplicar **Dos Monomios**, se multiplican sus coeficientes numĂŠricos (aplicando la regla
  de signos) y se suman los exponentes de las letras que tengan la misma base.
explicacion: '### DefiniciĂłn formal


  Signo: $(-)(+)=-$. Coeficientes: $4 \times 3 = 12$. Variable $a$: $a^1 \cdot a^2 = a^3$. Variable $b$:
  $b^2$. Variable $c$: $c$. Resultado: $-12a^3b^2c$.


  ### Desarrollo didĂĄctico


  Multiplica: $(5x^2y)(â3xy^3)$.


  Paso 1: Signos. $(+)(-) = -$.

  Paso 2: Coeficientes. $5 \times 3 = 15$.

  Paso 3: Variable $x$. $x^2 \cdot x^1 = x^{2+1} = x^3$.

  Paso 4: Variable $y$. $y^1 \cdot y^3 = y^{1+3} = y^4$.


  Resultado combinado: $-15x^3y^4$.'
procedimiento:
- 'Paso 1: Determina el signo del producto usando la regla de signos.'
- 'Paso 2: Multiplica los valores numĂŠricos de los coeficientes.'
- 'Paso 3: Identifica las variables repetidas en ambos monomios y suma sus exponentes.'
- 'Paso 4: Conserva intactas las variables que aparezcan en solo uno de los monomios.'
- 'Paso 5: Escribe el tĂŠrmino final combinando signo, coeficiente y variables ordenadas alfabĂŠticamente.'
