semantic_id: MAT.ALG.TRIG_COORDENADAS.SIGNO_COSENO_CUADRANTES
titulo: Signo del coseno según el cuadrante
objetivo: Determinar el signo de $\cos(\theta)$ según el cuadrante donde se ubica el ángulo $\theta$.
introduccion: Como el coseno corresponde a la coordenada $x$, su signo cambia exactamente igual que el signo de
  esa coordenada en cada cuadrante.
resumen: El coseno es **positivo** en el primer y cuarto cuadrante (donde $x>0$), y **negativo** en el segundo y
  tercer cuadrante (donde $x<0$).
explicacion: '### Definición formal


  Como $\cos(\theta)=x$, el signo del coseno coincide con el signo de la coordenada $x$ del punto asociado. En
  el primer cuadrante ($0°<\theta<90°$) y el cuarto ($270°<\theta<360°$), $x>0$; en el segundo
  ($90°<\theta<180°$) y el tercero ($180°<\theta<270°$), $x<0$.


  ### Desarrollo didáctico


  $\cos(45°)$ (primer cuadrante) es positivo; $\cos(135°)$ (segundo cuadrante) es negativo, con el mismo valor
  absoluto que $\cos(45°)$; $\cos(315°)$ (cuarto cuadrante) es positivo.'
procedimiento:
- 'Paso 1: Identifica el cuadrante donde se ubica el ángulo $\theta$.'
- 'Paso 2: Si está en el primer o cuarto cuadrante, el coseno es positivo.'
- 'Paso 3: Si está en el segundo o tercer cuadrante, el coseno es negativo.'
ejemplos:
- titulo: Signo del coseno en el segundo cuadrante
  enunciado: '¿Cuál es el signo de $\cos(150°)$?'
  solucion_pasos:
  - $150°$ está en el segundo cuadrante.
  - El coseno es negativo en ese cuadrante.
- titulo: Signo del coseno en el cuarto cuadrante
  enunciado: '¿Cuál es el signo de $\cos(330°)$?'
  solucion_pasos:
  - $330°$ está en el cuarto cuadrante.
  - El coseno es positivo en ese cuadrante.
- titulo: ¿El coseno es positivo en el tercer cuadrante?
  enunciado: ¿El coseno es positivo para ángulos del tercer cuadrante?
  respuesta: 'No'
  solucion_pasos:
  - En el tercer cuadrante, la coordenada $x$ es negativa, así que el coseno también lo es.
- titulo: ¿El coseno tiene el mismo signo en el primer y cuarto cuadrante?
  enunciado: ¿El coseno tiene el mismo signo (positivo) tanto en el primer como en el cuarto cuadrante?
  respuesta: Sí
  solucion_pasos:
  - En ambos cuadrantes la coordenada $x$ es positiva.
errores_frecuentes:
- Confundir el signo del coseno con el del seno en cada cuadrante.
- Aplicar el signo correcto de un cuadrante a otro por error.
- No relacionar el signo del coseno con el signo de la coordenada $x$.
- Olvidar que el signo puede cambiar incluso si el ángulo de referencia es el mismo.
