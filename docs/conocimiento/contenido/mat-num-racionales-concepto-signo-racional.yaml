semantic_id: MAT.NUM.RACIONALES_CONCEPTO.SIGNO_RACIONAL
objetivo: Determinar el signo de una fracción.
introduccion: 'Observa este caso: \(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos,
  mientras que \(-\frac{2}{-5}\) es positivo. Para explicar por qué funciona estudiaremos
  signo de un número racional escrito como fracción. Al finalizar podrás determinar
  el signo de una fracción.'
resumen: El signo de un número racional depende del signo conjunto del numerador y
  del denominador. Como criterio de control, si numerador y denominador tienen igual
  signo, la fracción es positiva
explicacion: |-
  El signo de un número racional depende del signo conjunto del numerador y del denominador.

  La relación entre la definición y el caso “\(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos, mientras que \(-\frac{2}{-5}\) es positivo” conduce a una conclusión útil: Si numerador y denominador tienen igual signo, la fracción es positiva.
procedimiento:
- 'Paso 1: Identifica por separado el signo del numerador y el del denominador.'
- 'Paso 2: Combina los signos: iguales producen positivo y distintos producen negativo.'
- 'Paso 3: Normaliza la escritura dejando, de preferencia, el signo menos en el numerador.'
ejemplos:
- titulo: Aplicación razonada — Signo de un número racional escrito como fracción
  enunciado: \(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos, mientras que \(-\frac{2}{-5}\)
    es positivo.
  solucion_pasos:
  - Identifica por separado el signo del numerador y el del denominador.
  - 'Combina los signos: iguales producen positivo y distintos producen negativo.'
  - Normaliza la escritura dejando, de preferencia, el signo menos en el numerador.
- titulo: Revisión de una solución — Signo de un número racional escrito como fracción
  enunciado: 'Una solución aplica “Combina los signos: iguales producen positivo y
    distintos producen negativo.”, pero termina sin comprobar que si numerador y denominador
    tienen igual signo, la fracción es positiva. Determina qué falta justificar.'
  solucion_pasos:
  - 'Vuelve a la condición que define signo de un número racional escrito como fracción:
    el signo de un número racional depende del signo conjunto del numerador y del
    denominador.'
  - Identifica por separado el signo del numerador y el del denominador.
  - 'Completa la revisión con este control: Normaliza la escritura dejando, de preferencia,
    el signo menos en el numerador.'
- titulo: ¿Se cumple que si numerador y denominador tienen igual signo, la fracción
    es positiva? — Signo de un número racional escrito como fracción
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el signo de un número racional depende
    del signo conjunto del numerador y del denominador.
  - El caso “\(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos, mientras que \(-\frac{2}{-5}\)
    es positivo” satisface esa condición.
  - Normaliza la escritura dejando, de preferencia, el signo menos en el numerador.
- titulo: ¿Es válido omitir el paso “Identifica por separado el signo del numerador
    y el del denominador”? — Signo de un número racional escrito como fracción
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de signo de un número racional
    escrito como fracción.
  - 'Omitirlo puede volver inválida la acción siguiente: Combina los signos: iguales
    producen positivo y distintos producen negativo.'
  - 'La solución debe terminar de este modo: Normaliza la escritura dejando, de preferencia,
    el signo menos en el numerador.'
errores_frecuentes:
- 'Empezar signo de un número racional escrito como fracción sin realizar este control
  inicial: Identifica por separado el signo del numerador y el del denominador.'
- Memorizar “\(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos, mientras que \(-\frac{2}{-5}\)
  es positivo” como respuesta aislada, sin reconstruir la definición que lo justifica.
- 'Convertir en receta el paso “Combina los signos: iguales producen positivo y distintos
  producen negativo.” y usarlo aunque cambien las condiciones del problema.'
- Dar por válida una conclusión sobre signo de un número racional escrito como fracción
  que contradice el criterio “Si numerador y denominador tienen igual signo, la fracción
  es positiva”.
- 'Cerrar el ejercicio sin esta comprobación específica: Normaliza la escritura dejando,
  de preferencia, el signo menos en el numerador.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
