semantic_id: MAT.NUM.RACIONALES_CONCEPTO.SIGNO_RACIONAL
objetivo: Comprender signo de un número racional escrito como fracción y aplicarlo
  correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso signo de un número racional escrito como fracción ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: El signo de un número racional depende del signo conjunto del numerador y
  del denominador. Además, si numerador y denominador tienen igual signo, la fracción
  es positiva.
explicacion: |-
  El signo de un número racional depende del signo conjunto del numerador y del denominador.

  Una idea importante es que si numerador y denominador tienen igual signo, la fracción es positiva.

  Por ejemplo, \(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos, mientras que \(-\frac{2}{-5}\) es positivo.
procedimiento:
- 'Paso 1: Identificar qué representa el número o la fracción en la situación.'
- 'Paso 2: Revisar la definición formal del concepto y sus condiciones.'
- 'Paso 3: Concluir si el ejemplo sí corresponde a signo de un número racional escrito
  como fracción y justificarlo.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(-\frac{2}{5}\) y \(\frac{2}{-5}\) son
    negativos, mientras que \(-\frac{2}{-5}\) es positivo.” se relaciona con signo
    de un número racional escrito como fracción.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: el signo de un número racional depende del signo
    conjunto del numerador y del denominador.'
  - Concluye que el ejemplo sí ilustra signo de un número racional escrito como fracción.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Si numerador y denominador tienen igual signo,
    la fracción es positiva.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con signo de un número racional escrito
    como fracción?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que si numerador y denominador tienen igual
    signo, la fracción es positiva.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar signo de un número racional escrito como fracción ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar signo de un número racional escrito como fracción sin mirar qué
  representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
