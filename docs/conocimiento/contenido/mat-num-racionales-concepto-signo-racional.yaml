semantic_id: MAT.NUM.RACIONALES_CONCEPTO.SIGNO_RACIONAL
titulo: Signo de un número racional escrito como fracción
objetivo: Determinar el signo de una fracción a partir de los signos de su numerador y su denominador.
introduccion: 'El signo de una fracción no depende únicamente del numerador: depende de la combinación
  de los signos de numerador y denominador, igual que en la multiplicación y la división de enteros.'
resumen: El signo de \(\frac{a}{b}\) es positivo si \(a\) y \(b\) tienen el mismo signo, y negativo si
  tienen signos distintos.
explicacion: '### Definición formal


  Para \(a,b\in\mathbb{Z}\), \(b\neq0\): \(\frac{a}{b}>0 \Leftrightarrow (a>0 \wedge b>0) \vee (a<0 \wedge
  b<0)\), y \(\frac{a}{b}<0 \Leftrightarrow (a>0 \wedge b<0) \vee (a<0 \wedge b>0)\). Esta regla coincide
  con la ley de signos de la división de enteros.


  ### Desarrollo didáctico


  \(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos, porque numerador y denominador tienen signos distintos
  en ambos casos. En cambio, \(-\frac{2}{-5}\) es positivo, porque los dos signos negativos se combinan
  como uno positivo. Por convención, se prefiere escribir el signo en el numerador: \(-\frac{2}{5}\) en
  vez de \(\frac{2}{-5}\) o \(\frac{-2}{-5}\).'
procedimiento:
- 'Paso 1: Identifica por separado el signo del numerador y el del denominador.'
- 'Paso 2: Combina los signos: iguales producen positivo y distintos producen negativo.'
- 'Paso 3: Normaliza la escritura dejando, de preferencia, el signo menos en el numerador.'
ejemplos:
- titulo: Aplicación razonada — Signo de un número racional escrito como fracción
  enunciado: \(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos, mientras que \(-\frac{2}{-5}\) es positivo.
  solucion_pasos:
  - Identifica por separado el signo del numerador y el del denominador.
  - 'Combina los signos: iguales producen positivo y distintos producen negativo.'
  - Normaliza la escritura dejando, de preferencia, el signo menos en el numerador.
- titulo: Revisión de una solución — Signo de un número racional escrito como fracción
  enunciado: 'Una solución aplica “Combina los signos: iguales producen positivo y distintos producen
    negativo.”, pero termina sin comprobar que si numerador y denominador tienen igual signo, la fracción
    es positiva. Determina qué falta justificar.'
  solucion_pasos:
  - 'Vuelve a la condición que define signo de un número racional escrito como fracción: el signo de un
    número racional depende del signo conjunto del numerador y del denominador.'
  - Identifica por separado el signo del numerador y el del denominador.
  - 'Completa la revisión con este control: Normaliza la escritura dejando, de preferencia, el signo menos
    en el numerador.'
- titulo: ¿Se cumple que si numerador y denominador tienen igual signo, la fracción es positiva? — Signo
    de un número racional escrito como fracción
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el signo de un número racional depende del signo conjunto
    del numerador y del denominador.
  - El caso “\(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos, mientras que \(-\frac{2}{-5}\) es positivo”
    satisface esa condición.
  - Normaliza la escritura dejando, de preferencia, el signo menos en el numerador.
- titulo: ¿Es válido omitir el paso “Identifica por separado el signo del numerador y el del denominador”?
    — Signo de un número racional escrito como fracción
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de signo de un número racional escrito como fracción.
  - 'Omitirlo puede volver inválida la acción siguiente: Combina los signos: iguales producen positivo
    y distintos producen negativo.'
  - 'La solución debe terminar de este modo: Normaliza la escritura dejando, de preferencia, el signo
    menos en el numerador.'
errores_frecuentes:
- 'Empezar signo de un número racional escrito como fracción sin realizar este control inicial: Identifica
  por separado el signo del numerador y el del denominador.'
- Memorizar “\(-\frac{2}{5}\) y \(\frac{2}{-5}\) son negativos, mientras que \(-\frac{2}{-5}\) es positivo”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- 'Convertir en receta el paso “Combina los signos: iguales producen positivo y distintos producen negativo.”
  y usarlo aunque cambien las condiciones del problema.'
- Dar por válida una conclusión sobre signo de un número racional escrito como fracción que contradice
  el criterio “Si numerador y denominador tienen igual signo, la fracción es positiva”.
- 'Cerrar el ejercicio sin esta comprobación específica: Normaliza la escritura dejando, de preferencia,
  el signo menos en el numerador.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
