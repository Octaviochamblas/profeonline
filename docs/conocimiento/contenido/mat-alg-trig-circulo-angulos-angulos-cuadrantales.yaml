semantic_id: MAT.ALG.TRIG_CIRCULO_ANGULOS.ANGULOS_CUADRANTALES
titulo: Ángulos cuadrantales
objetivo: Identificar los ángulos cuadrantales ($0°$, $90°$, $180°$, $270°$, $360°$) y sus puntos asociados en
  el círculo unitario.
introduccion: Algunos ángulos son especiales porque su lado terminal cae exactamente sobre uno de los ejes
  coordenados, en vez de quedar dentro de un cuadrante.
resumen: 'Los **ángulos cuadrantales** son aquellos cuyo lado terminal coincide con alguno de los ejes
  coordenados: $0°$, $90°$, $180°$, $270°$ y $360°$ (equivalente a $0°$).'
explicacion: '### Definición formal


  Un ángulo es cuadrantal si su lado terminal coincide con el semieje positivo $x$ ($0°$), el semieje positivo
  $y$ ($90°$), el semieje negativo $x$ ($180°$), o el semieje negativo $y$ ($270°$). Cada uno corresponde a un
  múltiplo de $90°$ (o $\pi/2$ radianes).


  ### Desarrollo didáctico


  El punto asociado a $0°$ es $(1,0)$; a $90°$ es $(0,1)$; a $180°$ es $(-1,0)$; a $270°$ es $(0,-1)$. En
  radianes, estos ángulos son $0$, $\pi/2$, $\pi$ y $3\pi/2$ respectivamente.'
procedimiento:
- 'Paso 1: Verifica si el ángulo dado es un múltiplo de $90°$ (o $\pi/2$ radianes).'
- 'Paso 2: Si lo es, identifica sobre qué semieje cae el lado terminal.'
- 'Paso 3: Determina el punto correspondiente sobre el círculo unitario.'
ejemplos:
- titulo: Identificación del punto para $180°$
  enunciado: '¿Cuál es el punto del círculo unitario asociado al ángulo cuadrantal $180°$?'
  solucion_pasos:
  - El lado terminal coincide con el semieje negativo $x$.
  - 'El punto asociado es $(-1,0)$.'
- titulo: Identificación de un ángulo cuadrantal en radianes
  enunciado: '¿Es $\dfrac{3\pi}{2}$ un ángulo cuadrantal?'
  solucion_pasos:
  - Se verifica que corresponde a $270°$, múltiplo de $90°$.
  - Sí, es un ángulo cuadrantal, con punto asociado $(0,-1)$.
- titulo: ¿$45°$ es un ángulo cuadrantal?
  enunciado: ¿El ángulo $45°$ se considera un ángulo cuadrantal?
  respuesta: 'No'
  solucion_pasos:
  - No es múltiplo de $90°$, así que su lado terminal cae dentro de un cuadrante, no sobre un eje.
- titulo: ¿$360°$ y $0°$ corresponden al mismo punto en el círculo unitario?
  enunciado: ¿Los ángulos $360°$ y $0°$ tienen asociado el mismo punto en el círculo unitario?
  respuesta: Sí
  solucion_pasos:
  - Ambos tienen el lado terminal sobre el semieje positivo $x$, correspondiendo al punto $(1,0)$.
errores_frecuentes:
- Confundir un ángulo cuadrantal con un ángulo que simplemente pertenece a un cuadrante.
- Asociar el punto incorrecto a cada ángulo cuadrantal.
- No reconocer los ángulos cuadrantales expresados en radianes.
- Olvidar que $360°$ y $0°$ representan el mismo punto sobre el círculo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
