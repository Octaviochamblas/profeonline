semantic_id: MAT.NUM.PROP_INVERSA.MODELO_ALGEBRAICO
objetivo: Representar situaciones de proporción inversa a través de un modelo algebraico
  (ecuación).
introduccion: Al igual que con la directa, podemos construir una 'máquina' para la
  proporción inversa. Esta máquina toma el trabajo total, lo divide por lo que tengas
  ahora, y te dice exactamente qué pasará.
resumen: El modelo algebraico de la proporcionalidad inversa es la ecuación $y = k
  / x$, donde $k$ es la constante de proporcionalidad.
explicacion: 'Sabiendo que $x \cdot y = k$, podemos despejar la variable dependiente
  $y$ dividiendo ambos lados por $x$. Así obtenemos el **modelo algebraico** de la
  proporción inversa:


  $$y = \frac{k}{x}$$


  Esta ecuación nos dice que para hallar cualquier valor de $y$, debemos tomar nuestra
  ''cantidad total'' (la constante $k$) y repartirla o dividirla entre el valor de
  $x$. Si $x$ crece, se divide por un número mayor, haciendo que $y$ sea más pequeño.'
procedimiento:
- 'Paso 1: Calcula la constante $k$ multiplicando un par conocido $x \cdot y$.'
- 'Paso 2: Escribe la ecuación sustituyendo $k$ por el número encontrado como numerador.'
- 'Paso 3: Utiliza $y = k/x$ para calcular valores desconocidos reemplazando el valor
  de $x$.'
ejemplos:
- titulo: Construyendo el modelo inverso
  enunciado: Si 5 obreros terminan un muro en 20 días, escribe el modelo algebraico
    del tiempo ($y$) en función de los obreros ($x$).
  solucion_pasos:
  - Calculamos $k = 5 \cdot 20 = 100$ (días-obrero totales).
  - Planteamos la fórmula general $y = k / x$.
  - El modelo es $y = 100/x$. (Si vienen 2 obreros, $100/2 = 50$ días).
- titulo: ¿Puedo despejar x en la ecuación inversa?
  respuesta: Sí
  solucion_pasos:
  - Al igual que $y = 100/x$, se cumple que $x = 100/y$. Puedes alternar posiciones
    sin alterar el numerador $k$.
errores_frecuentes:
- Plantear el modelo como $y = x / k$ (el total siempre debe ser el dividendo).
- Usar el modelo $y = k \cdot x$ (que es para proporción directa).
- Plantearlo como una resta $y = k - x$.
- Olvidar que $x$ no puede ser cero en la evaluación de la fórmula.
fuente: Currículum Nacional MINEDUC.
estado: publicado
