semantic_id: MAT.EST.NORMAL_APLICACIONES.VARIABLES_BIOLOGICAS
titulo: Modelar estaturas y pesos con distribución normal
objetivo: Modelar variables biológicas como estaturas y pesos usando la distribución normal para resolver problemas
  aplicados.
introduccion: Las estaturas y pesos de un grupo grande de personas son de los ejemplos más clásicos y usados de
  distribución normal en la vida real.
resumen: Las estaturas y pesos de una población suelen distribuirse aproximadamente de forma normal, lo que permite
  aplicar la tabla Z para responder preguntas sobre esas variables.
explicacion: '![Modelamiento de variables biológicas](/static/img/estadistica/normapli/normapli-variables-biologicas.svg)


  ### Definición formal


  Al modelar estaturas o pesos como $X\sim N(\mu,\sigma)$, se pueden calcular probabilidades de interés

  estandarizando los valores y usando la tabla normal estándar, igual que en cualquier otro problema normal.


  ### Desarrollo didáctico


  Por ejemplo, si las estaturas de un grupo siguen $N(165, 7)$ cm, se puede calcular qué proporción del grupo mide

  más de cierto valor, o entre dos valores determinados.'
procedimiento:
- 'Paso 1: Identifica la media y la desviación estándar de la variable biológica en estudio.'
- 'Paso 2: Estandariza el valor o intervalo de interés a puntajes $Z$.'
- 'Paso 3: Usa la tabla Z para calcular la probabilidad pedida.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Las estaturas de un grupo siguen $N(165, 7)$ cm. ¿Qué proporción del grupo mide menos de 158 cm?
  solucion_pasos:
  - $Z=(158-165)/7=-1$.
  - Se busca $P(Z<-1)$ en la tabla, aproximadamente 0,1587.
- titulo: Ejemplo 2
  enunciado: ¿Por qué es razonable modelar las estaturas de una población con distribución normal?
  solucion_pasos:
  - Porque es una variable continua, con distribución aproximadamente simétrica en torno a un promedio poblacional.
- titulo: ¿Las estaturas de una población grande suelen modelarse con distribución normal?
  respuesta: Sí
  solucion_pasos:
  - Sí, es uno de los ejemplos más clásicos de aplicación.
- titulo: ¿El peso de las personas siempre se distribuye de forma perfectamente simétrica sin excepción?
  respuesta: 'No'
  solucion_pasos:
  - 'No, es una aproximación razonable en muchos casos, pero no una regla exacta y universal.'
errores_frecuentes:
- Aplicar la fórmula sin antes identificar correctamente la media y desviación estándar del grupo.
- Confundir la variable estatura con otra variable de la misma población.
- Olvidar estandarizar antes de usar la tabla Z.
- Generalizar resultados de un grupo a poblaciones con parámetros distintos.
- No verificar si el contexto realmente sustenta el supuesto de normalidad.
fuente: 'Elaboración propia (referencia: Moraleja 309).'
estado: publicado
