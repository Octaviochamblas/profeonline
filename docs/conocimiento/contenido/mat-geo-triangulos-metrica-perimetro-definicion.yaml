semantic_id: MAT.GEO.TRIANGULOS_METRICA.PERIMETRO_DEFINICION
titulo: Definición de perímetro de un triángulo
objetivo: Comprender el perímetro de un triángulo como la longitud total de su contorno.
introduccion: El perímetro mide cuánto habría que recorrer para dar toda la vuelta al borde de un triángulo,
  sumando la longitud de sus tres lados.
resumen: El perímetro de un triángulo es la suma de las medidas de sus tres lados.
explicacion: '![Perímetro de un triángulo](/static/img/geometria/triangulos/triangulos-metrica-perimetro-definicion.svg)


  ### Definición formal


  Si un triángulo tiene lados $a$, $b$ y $c$, su perímetro $P$ se define como $P=a+b+c$.


  ### Desarrollo didáctico


  Un triángulo con lados 4 cm, 5 cm y 6 cm tiene perímetro $P=4+5+6=15$ cm: esa es la longitud total de
  su contorno.'
procedimiento:
- 'Paso 1: Mide (o identifica) la longitud de cada uno de los tres lados.'
- 'Paso 2: Suma las tres medidas.'
- 'Paso 3: El resultado es el perímetro del triángulo.'
ejemplos:
- titulo: Calcular un perímetro
  enunciado: Un triángulo tiene lados 4 cm, 5 cm y 6 cm.
  solucion_pasos:
  - El perímetro es 4+5+6=15 cm.
- titulo: Perímetro de un equilátero
  enunciado: Un triángulo equilátero tiene lados de 7 cm cada uno.
  solucion_pasos:
  - El perímetro es 7+7+7=21 cm.
- titulo: ¿El perímetro depende de los ángulos del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, el perímetro depende únicamente de la longitud de los tres lados.
- titulo: ¿El perímetro se mide en unidades de longitud?
  respuesta: Sí
  solucion_pasos:
  - Sí, como cm, m u otra unidad de longitud, igual que los lados que lo componen.
errores_frecuentes:
- Multiplicar los lados en vez de sumarlos al calcular el perímetro.
- Olvidar sumar uno de los tres lados.
- Confundir el perímetro con el área del triángulo.
fuente: Elaboración propia.
estado: publicado
