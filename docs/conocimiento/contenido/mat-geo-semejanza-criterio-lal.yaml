semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.CRITERIO_LAL
titulo: 'Criterio de semejanza LAL: dos pares de lados proporcionales y ángulo comprendido congruente'
objetivo: Aplicar el criterio LAL de semejanza para determinar que dos triángulos son semejantes verificando
  dos pares de lados proporcionales y el ángulo comprendido igual.
introduccion: El tercer criterio abreviado de semejanza combina proporcionalidad de lados con igualdad
  de un ángulo, de forma análoga al LAL de congruencia.
resumen: El criterio LAL de semejanza establece que dos triángulos son semejantes si tienen dos pares
  de lados correspondientes proporcionales y el ángulo comprendido entre esos lados es igual (congruente)
  en ambos.
explicacion: '![Criterio de semejanza LAL](/static/img/geometria/congruencia-semejanza/semejanza-criterio-lal.svg)


  ### Definición formal


  Si en $\triangle ABC$ y $\triangle A''B''C''$ se cumple $\frac{AB}{A''B''}=\frac{AC}{A''C''}$ y $\angle
  A=\angle A''$ (el ángulo comprendido entre esos lados), entonces $\triangle ABC\sim\triangle A''B''C''$.


  ### Desarrollo didáctico


  Este criterio es útil cuando se conocen solo dos lados y el ángulo entre ellos, sin necesidad de calcular
  o medir el tercer lado; la condición clave es que el ángulo debe ser exactamente el comprendido entre
  los dos lados usados en la proporción.'
procedimiento:
- 'Paso 1: Identifica dos lados de cada triángulo y calcula la razón entre ellos.'
- 'Paso 2: Verifica que el ángulo comprendido entre esos dos lados sea igual en ambos triángulos.'
- 'Paso 3: Si la razón de lados coincide y el ángulo comprendido es igual, concluye semejanza por LAL.'
ejemplos:
- titulo: Verificar semejanza con LAL
  enunciado: Un triángulo tiene lados 4 y 6 con ángulo comprendido de 50°; otro tiene lados 8 y 12 con
    ángulo comprendido de 50°.
  solucion_pasos:
  - 8/4=12/6=2, y el ángulo comprendido coincide (50°), por lo tanto son semejantes por LAL.
- titulo: Detectar cuando el ángulo no es el comprendido
  enunciado: Dos triángulos comparten dos lados proporcionales, pero el ángulo igual no está entre esos
    lados.
  solucion_pasos:
  - No se puede aplicar LAL; el ángulo debe estar exactamente entre los dos lados de la proporción.
- titulo: ¿La razón de los dos lados debe ser exactamente igual?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas razones (una por cada par de lados) deben coincidir exactamente.
- titulo: ¿Este criterio requiere conocer el tercer lado?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con dos lados y el ángulo comprendido entre ellos.
errores_frecuentes:
- Usar un ángulo que no está comprendido entre los dos lados de la proporción.
- Calcular mal una de las dos razones de lados antes de compararlas.
- Confundir este criterio con el LAL de congruencia, esperando lados iguales en vez de proporcionales.
fuente: 'Fuente: Cid 118.'
