semantic_id: MAT.FUND.TABLAS_VERDAD.TAUTOLOGIA
titulo: Tautología
objetivo: Identificar y demostrar si una proposición compuesta es una tautología mediante la construcción
  de su tabla de verdad.
introduccion: 'Imagina que alguien te dice: "Mañana lloverá o no lloverá". ¿Hay alguna posibilidad de
  que esta frase sea mentira? Si llueve, la frase es verdad. Si no llueve, la frase también es verdad.
  Pase lo que pase con el clima de mañana, esa afirmación siempre será verdadera. En matemáticas y lógica,
  una proposición compuesta que siempre es verdadera, sin importar las circunstancias o los valores iniciales
  de las variables, se llama Tautología. Es una verdad absoluta que nunca puede fallar.'
resumen: Una tautología es una proposición compuesta que resulta ser verdadera ($V$) para todas las combinaciones
  posibles de valores de verdad de sus proposiciones simples componentes. Su columna final en la tabla
  de verdad contiene únicamente valores $V$.
explicacion: 'En lógica proposicional, las fórmulas lógicas se clasifican según los valores de verdad
  que adoptan en su columna resultante.


  Una **tautología** es una fórmula lógica que es **siempre verdadera**, independientemente de los valores
  de verdad asignados a sus variables lógicas simples. Se denota a menudo con el símbolo $\top$ o con
  la letra $T$.


  **Cómo demostrar una tautología:**

  Para verificar de forma rigurosa si una expresión $E$ es una tautología, se construye su tabla de verdad
  completa. Si en la columna final que representa a $E$ todas las filas tienen el valor de verdad Verdadero
  ($V$), la expresión queda demostrada como tautología.


  **Tautologías clásicas notables:**

  1. **Tercero excluido**: $p \lor \neg p$. (Una proposición es verdadera o es falsa, no hay tercera opción).

  2. **Doble negación**: $\neg(\neg p) \leftrightarrow p$.

  3. **Ley de identidad**: $p \rightarrow p$.

  4. **Modus Ponens**: $[(p \rightarrow q) \land p] \rightarrow q$.


  Las tautologías son la base de las reglas de inferencia lógica y los teoremas matemáticos, ya que representan
  razonamientos que son formalmente válidos en cualquier contexto.'
procedimiento:
- 'Paso 1: Determinar el número de proposiciones simples $n$ y definir la cantidad de filas de la tabla
  mediante la fórmula $2^n$.'
- 'Paso 2: Definir las columnas de la tabla de verdad: columnas para las variables simples, operaciones
  secundarias dentro de paréntesis de adentro hacia afuera, y la columna final para la expresión completa.'
- 'Paso 3: Llenar los valores lógicos iniciales de las variables de forma sistemática cubriendo todas
  las combinaciones posibles.'
- 'Paso 4: Evaluar la expresión conectivo por conectivo desde el interior hacia el exterior. Si todos
  los valores de la columna de resultado final son Verdadero ($V$), concluir que la proposición es una
  tautología.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Demuestra mediante tabla de verdad si la expresión $(p \land q) \rightarrow p$ es una tautología.
  solucion_pasos:
  - 'Paso a: Diseñamos la tabla con 2 variables ($p$ y $q$), lo que da $2^2 = 4$ filas. Definimos las
    columnas: $p$, $q$, $(p \land q)$, y la expresión final $(p \land q) \rightarrow p$.'
  - 'Paso b: Evaluamos la conjunción $(p \land q)$ en las 4 filas estándar, obteniendo ($V, F, F, F$).'
  - 'Paso c: Evaluamos el condicional principal implícito $(p \land q) \rightarrow p$: en la fila 1 es
    $V \rightarrow V = V$; en la fila 2 es $F \rightarrow V = V$; en la fila 3 es $F \rightarrow F = V$;
    en la fila 4 es $F \rightarrow F = V$. Como todas las filas resultan en Verdadero ($V$), la expresión
    es una tautología.'
- titulo: Ejemplo 2
  enunciado: Determina si la expresión condicional $p \rightarrow (p \lor q)$ es una tautología.
  solucion_pasos:
  - 'Paso a: Construimos la tabla de verdad estándar de 4 filas. Evaluamos primero la disyunción inclusiva
    $(p \lor q)$, la cual resulta en ($V, V, V, F$).'
  - 'Paso b: Evaluamos el condicional principal $p \rightarrow (p \lor q)$: fila 1 es $V \rightarrow V
    = V$; fila 2 es $V \rightarrow V = V$; fila 3 es $F \rightarrow V = V$; fila 4 es $F \rightarrow F
    = V$.'
  - 'Paso c: Al ser todos los valores resultantes Verdaderos ($V$), confirmamos que la expresión es una
    tautología.'
- titulo: ¿La expresión lógica $p \lor q$ es una tautología?
  respuesta: 'No'
  solucion_pasos:
  - Para que una proposición compuesta sea una tautología, debe ser verdadera en todas las filas de su
    tabla de verdad.
  - La columna resultante de la disyunción inclusiva $p \lor q$ es ($V, V, V, F$).
  - Como en la última fila (cuando $p$ y $q$ son falsos) el resultado es Falso ($F$), la expresión no
    es una tautología.
- titulo: ¿Cualquier ley o equivalencia lógica expresada como bicondicional $A \leftrightarrow B$ es una
    tautología si $A$ y $B$ son equivalentes?
  respuesta: Sí
  solucion_pasos:
  - Si dos expresiones lógicas $A$ y $B$ son equivalentes ($A \equiv B$), significa que tienen exactamente
    la misma tabla de verdad.
  - Al unirlas mediante el conectivo bicondicional ($A \leftrightarrow B$), evaluaremos en cada fila valores
    iguales (ya sea $V \leftrightarrow V$ o $F \leftrightarrow F$), lo que siempre da como resultado Verdadero
    ($V$).
  - Por tanto, la bicondicional de expresiones equivalentes es siempre una tautología.
errores_frecuentes:
- Confundir una proposición que es simplemente verdadera en algunos casos (contingencia) con una tautología,
  la cual debe ser verdadera en absolutamente todos los casos posibles.
- Realizar una evaluación errónea de los conectivos lógicos y forzar que el resultado final dé verdadero
  sin justificación formal.
- Pensar que las tautologías solo contienen variables con valor de verdad positivo en sus filas iniciales.
- No resolver adecuadamente la jerarquía de los paréntesis de adentro hacia afuera, obteniendo una columna
  final con falsos accidentales.
- Olvidar que la negación de una tautología genera automáticamente una contradicción.
fuente: Lógica Matemática y Teoría de Conjuntos, pág. 45
estado: publicado
