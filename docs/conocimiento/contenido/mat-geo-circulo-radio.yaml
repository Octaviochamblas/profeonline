semantic_id: MAT.GEO.CIRCULO_ELEMENTOS.RADIO
titulo: Identificación del radio como segmento desde el centro hasta la circunferencia
objetivo: Identificar el radio de una circunferencia como el segmento que une el centro con cualquier
  punto de la circunferencia.
introduccion: Con el centro ya identificado, el siguiente elemento fundamental es el segmento que lo conecta
  con el borde de la figura.
resumen: El radio de una circunferencia es el segmento que une el centro con cualquier punto de la circunferencia.
explicacion: '![Radio: segmento del centro a la circunferencia](/static/img/geometria/circunferencia-circulo/circulo-radio.svg)


  ### Definición formal


  El radio $r$ es el segmento $\overline{OP}$, donde $O$ es el centro y $P$ es un punto cualquiera de
  la circunferencia. Todos los radios de una misma circunferencia tienen igual longitud.


  ### Desarrollo didáctico


  Una circunferencia tiene infinitos radios posibles (uno por cada punto de la curva), pero todos comparten
  exactamente la misma longitud, ya que esa es precisamente la condición que define a la circunferencia.'
procedimiento:
- 'Paso 1: Identifica el centro de la circunferencia.'
- 'Paso 2: Elige cualquier punto sobre la circunferencia.'
- 'Paso 3: El segmento que une esos dos puntos es un radio.'
ejemplos:
- titulo: Identificar un radio
  enunciado: Se traza un segmento desde el centro O hasta un punto P de la circunferencia.
  solucion_pasos:
  - Ese segmento OP es un radio de la circunferencia.
- titulo: Verificar la igualdad de radios
  enunciado: Se trazan dos radios distintos en la misma circunferencia.
  solucion_pasos:
  - Ambos radios tienen exactamente la misma longitud, sin importar hacia qué punto se dirijan.
- titulo: ¿Existen infinitos radios en una circunferencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, se puede trazar un radio hacia cada uno de los infinitos puntos de la circunferencia.
- titulo: ¿Todos los radios de una misma circunferencia son iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad que define a la circunferencia (equidistancia del centro).
errores_frecuentes:
- Trazar un segmento que no parte exactamente del centro, creyendo erróneamente que es un radio.
- Confundir el radio con el diámetro, olvidando que el radio llega solo hasta el centro, no cruza toda
  la figura.
- Creer que puede haber radios de distinta longitud en una misma circunferencia.
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
