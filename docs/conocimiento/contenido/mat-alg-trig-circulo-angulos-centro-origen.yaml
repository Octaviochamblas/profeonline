semantic_id: MAT.ALG.TRIG_CIRCULO_ANGULOS.CENTRO_ORIGEN
titulo: El origen como centro de referencia angular
objetivo: Reconocer el origen del plano cartesiano como el vértice desde donde se miden todos los ángulos en el
  círculo unitario.
introduccion: Todo ángulo trigonométrico se construye desde un mismo punto fijo, el origen, que actúa como
  vértice común para comparar cualquier ángulo.
resumen: El **origen** $(0,0)$ es el vértice desde el cual se miden todos los ángulos trigonométricos en el
  círculo unitario, y también su centro geométrico.
explicacion: '### Definición formal


  En el sistema de coordenadas del círculo unitario, todo ángulo $\theta$ tiene su vértice en el origen
  $(0,0)$. Un lado del ángulo, llamado lado inicial, coincide siempre con el semieje positivo $x$; el otro lado,
  llamado lado terminal, gira alrededor del origen según el valor de $\theta$.


  ### Desarrollo didáctico


  Para representar un ángulo de $90°$, se traza el lado inicial sobre el semieje positivo $x$ y se gira el lado
  terminal en sentido antihorario hasta alinearlo con el semieje positivo $y$, siempre pivotando alrededor del
  origen.'
procedimiento:
- 'Paso 1: Ubica el origen $(0,0)$ como vértice del ángulo.'
- 'Paso 2: Traza el lado inicial sobre el semieje positivo $x$.'
- 'Paso 3: Gira el lado terminal alrededor del origen según la medida del ángulo.'
ejemplos:
- titulo: Identificación del vértice de un ángulo
  enunciado: '¿Dónde se ubica el vértice de cualquier ángulo trigonométrico estándar?'
  solucion_pasos:
  - Se identifica el origen $(0,0)$ como punto fijo de referencia.
  - El vértice de todo ángulo en posición estándar es el origen.
- titulo: Construcción del lado inicial
  enunciado: '¿Sobre qué semieje se ubica siempre el lado inicial de un ángulo en posición estándar?'
  solucion_pasos:
  - Se identifica la convención estándar de la trigonometría.
  - El lado inicial se ubica sobre el semieje positivo $x$.
- titulo: ¿El vértice del ángulo puede cambiar según el valor del ángulo?
  enunciado: ¿El vértice de un ángulo en posición estándar cambia según cuál sea la medida del ángulo?
  respuesta: 'No'
  solucion_pasos:
  - El vértice siempre es el origen, sin importar la medida del ángulo.
- titulo: ¿El origen también es el centro del círculo unitario?
  enunciado: ¿El origen, además de ser el vértice de los ángulos, es también el centro del círculo unitario?
  respuesta: Sí
  solucion_pasos:
  - Ambos roles coinciden en el mismo punto, lo que simplifica la construcción geométrica.
errores_frecuentes:
- Suponer que el vértice de un ángulo puede ubicarse en un punto distinto del origen.
- Confundir el lado inicial con el lado terminal del ángulo.
- No fijar el lado inicial sobre el semieje positivo $x$ antes de medir el ángulo.
- Olvidar que el origen cumple simultáneamente el rol de vértice y de centro del círculo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
