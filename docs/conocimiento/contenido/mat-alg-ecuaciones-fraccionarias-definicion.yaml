semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.DEFINICION
titulo: Definición de Ecuaciones Fraccionarias
objetivo: Comprender qué caracteriza a una ecuación fraccionaria frente a una lineal pura.
explicacion: |
  Una ecuación fraccionaria es aquella que contiene fracciones donde la incógnita ($x$) aparece en el denominador, o bien, es una ecuación con coeficientes fraccionarios complejos.

  Imagina que estás repartiendo una herencia, pero el número de herederos ($x$) es desconocido. La cantidad que le toca a cada uno es $\frac{Herencia}{x}$. Aquí, la variable está en el piso de abajo (denominador).

  Resolverlas implica siempre un objetivo inicial: **destruir las fracciones**. A los matemáticos no les gusta trabajar con pisos. El objetivo es aplanar la ecuación para llevarla a la forma lineal clásica que ya sabes resolver.
procedimiento: |
  1. Identifica si la incógnita está en el denominador (fraccionaria real) o solo hay números en el denominador (coeficientes fraccionarios).
  2. Encuentra el Mínimo Común Múltiplo (MCM) de todos los denominadores.
  3. Multiplica toda la ecuación por ese MCM para eliminar los denominadores.
