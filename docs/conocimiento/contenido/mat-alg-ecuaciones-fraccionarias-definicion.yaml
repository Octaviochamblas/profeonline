semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.DEFINICION
titulo: Definición de Ecuaciones Fraccionarias
objetivo: Comprender qué caracteriza a una ecuación fraccionaria frente a una lineal pura.
introduccion: Imagina que estás repartiendo una herencia, pero el número de herederos ($x$) es desconocido. La cantidad
  que le toca a cada uno es $\frac{Herencia}{x}$. Aquí, la variable está en el denominador (denominador).
resumen: Una ecuación fraccionaria es aquella que contiene fracciones donde la incógnita ($x$) aparece en el denominador,
  o bien, es una ecuación con coeficientes fraccionarios complejos.
explicacion: '### Definición formal


  Una ecuación en la variable $x$ es fraccionaria si, expresada en su forma más simple, contiene al menos un término
  $\frac{p(x)}{q(x)}$ donde $q(x)$ no es una constante (la incógnita aparece en el denominador), lo que exige $q(x)
  \neq 0$ como restricción adicional sobre las soluciones válidas.


  ### Desarrollo didáctico


  Imagina que estás repartiendo una herencia, pero el número de herederos ($x$) es desconocido. La cantidad que
  le toca a cada uno es $\frac{Herencia}{x}$. Aquí, la variable está en el denominador (denominador).


  Resolverlas implica siempre un objetivo inicial: **eliminar los denominadores**. A los matemáticos no les gusta
  trabajar con pisos. El objetivo es aplanar la ecuación para llevarla a la forma lineal clásica que ya sabes resolver.'
procedimiento:
- Identifica si la incógnita está en el denominador (fraccionaria real) o solo hay números en el denominador (coeficientes
  fraccionarios).
- Encuentra el Mínimo Común Múltiplo (MCM) de todos los denominadores.
- Multiplica toda la ecuación por ese MCM para eliminar los denominadores.
ejemplos:
- titulo: $x$ y $\frac{Herencia}{x}$
  enunciado: Determina qué debe hacerse en $x$ y $\frac{Herencia}{x}$ y fundamenta cada transformación.
  solucion_pasos:
  - Imagina que estás repartiendo una herencia, pero el número de herederos ($x$) es desconocido. La cantidad que
    le toca a cada uno es $\frac{Herencia}{x}$. Aquí, la variable está en el denominador (denominador).
  - Identifica si la incógnita está en el denominador (fraccionaria real) o solo hay números en el denominador (coeficientes
    fraccionarios).
- titulo: $x$
  enunciado: Analiza el caso $x$ y explica cómo se aplica el criterio estudiado.
  solucion_pasos:
  - Una ecuación fraccionaria es aquella que contiene fracciones donde la incógnita ($x$) aparece en el denominador,
    o bien, es una ecuación con coeficientes fraccionarios complejos.
  - Encuentra el Mínimo Común Múltiplo (MCM) de todos los denominadores.
- titulo: 'Respecto de «Definición de ecuación fraccionaria de primer grado»: ¿Se ajusta a la definició'
  enunciado: 'Respecto de «Definición de ecuación fraccionaria de primer grado»: ¿Se ajusta a la definición esta
    afirmación? «Una ecuación fraccionaria es aquella que contiene fracciones donde la incógnita ($x$) aparece en
    el denominador, o bien, es una ecuación con coeficientes fraccionarios complejos»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una ecuación fraccionaria es aquella que contiene fracciones
    donde la incógnita ($x$) aparece en el denominador, o bien, es una ecuación con coeficientes fraccionarios complejos.'
- titulo: 'Respecto de «Definición de ecuación fraccionaria de primer grado»: ¿Es compatible con el pro'
  enunciado: 'Respecto de «Definición de ecuación fraccionaria de primer grado»: ¿Es compatible con el procedimiento
    esta afirmación? «Puede omitirse esta condición sin cambiar el resultado: «Identifica si la incógnita está en
    el denominador (fraccionaria real) o solo hay números en el denominador (coeficientes fraccionarios)»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una ecuación fraccionaria es aquella que contiene fracciones
    donde la incógnita ($x$) aparece en el denominador, o bien, es una ecuación con coeficientes fraccionarios complejos.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Identifica si la incógnita está en el denominador (fraccionaria
  real) o solo hay números en el denominador (coeficientes fraccionarios)».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Encuentra el Mínimo Común Múltiplo (MCM) de todos
  los denominadores».'
- La definición sigue cumpliéndose aunque no se considere que una ecuación fraccionaria es aquella que contiene
  fracciones donde la incógnita ($x$) aparece en el denominador, o bien, es una ecuación con coeficientes fraccionarios
  complejos.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Identifica si la incógnita está en el
  denominador (fraccionaria real) o solo hay números en el denominador (coeficientes fraccionarios)».
- La comprobación del resultado vuelve innecesaria la condición «Encuentra el Mínimo Común Múltiplo (MCM) de todos
  los denominadores».
