semantic_id: MAT.ALG.FUNCIONES_ESPECIALES.PARIDAD_DESDE_FORMULA
titulo: Determinación de paridad de una función desde su fórmula
objetivo: Determinar algebraicamente si una función es par, impar, o ninguna de las dos, a partir de su fórmula.
introduccion: No toda función es par ni impar; muchas simplemente no cumplen ninguna de las dos condiciones. El
  procedimiento algebraico revela cuál es el caso.
resumen: Para determinar la paridad de una función desde su fórmula, se calcula $f(-x)$ y se compara con $f(x)$
  y con $-f(x)$; según cuál coincidencia se obtenga, la función es par, impar o ninguna de las dos.
explicacion: '### Definición formal


  Dada una función $f$, se calcula $f(-x)$ mediante sustitución algebraica. Si $f(-x)=f(x)$, la función es par.
  Si $f(-x)=-f(x)$, la función es impar. Si no se cumple ninguna de las dos igualdades, la función no es ni par
  ni impar.


  ### Desarrollo didáctico


  El proceso completo tiene tres posibles conclusiones, y es fundamental revisar ambas comparaciones antes de
  descartar totalmente la paridad.


  Si $f(x)=x^2+x$: $f(-x)=x^2-x$. Esto no coincide con $f(x)=x^2+x$ (no es par) ni con $-f(x)=-x^2-x$ (no es impar).
  Se concluye que no es ni par ni impar.'
procedimiento:
- 'Paso 1: Calcula $f(-x)$ sustituyendo $-x$ en la fórmula.'
- 'Paso 2: Compara el resultado con $f(x)$; si coinciden, es par.'
- 'Paso 3: Si no coincide, compara con $-f(x)$; si coinciden, es impar.'
- 'Paso 4: Si no coincide con ninguna, la función no es ni par ni impar.'
ejemplos:
- titulo: Determinación de función par
  enunciado: Determina la paridad de $f(x)=3x^4-2x^2$.
  solucion_pasos:
  - '$f(-x)=3x^4-2x^2=f(x)$.'
  - Es par.
- titulo: Determinación de función impar
  enunciado: Determina la paridad de $f(x)=7x^5-x$.
  solucion_pasos:
  - '$f(-x)=-7x^5+x=-(7x^5-x)=-f(x)$.'
  - Es impar.
- titulo: ¿Puede una función no ser ni par ni impar?
  enunciado: ¿Puede una función no ser ni par ni impar?
  respuesta: Sí
  solucion_pasos:
  - Muchas funciones, especialmente las que mezclan términos pares e impares con constantes, no cumplen ninguna
    de las dos condiciones.
- titulo: ¿La función constante distinta de cero es impar?
  enunciado: ¿La función constante distinta de cero es impar?
  respuesta: 'No'
  solucion_pasos:
  - $f(-x)=c$ pero $-f(x)=-c$, que solo coinciden si $c=0$; para $c\neq0$ no es impar (aunque sí es par).
errores_frecuentes:
- Concluir imparidad al observar solo exponentes impares, sin comparar formalmente con $-f(x)$.
- Detenerse tras descartar paridad sin verificar la posibilidad de imparidad.
- Cometer errores de signo al calcular $f(-x)$ en términos con exponentes impares.
- Confundir "no es par" con "es impar", cuando en realidad puede no ser ninguna de las dos.
