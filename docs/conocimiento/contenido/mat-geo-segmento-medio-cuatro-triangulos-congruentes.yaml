semantic_id: MAT.GEO.SEGMENTO_MEDIO.CUATRO_TRIANGULOS_CONGRUENTES
titulo: División del triángulo en cuatro triángulos congruentes por sus segmentos medios
objetivo: Reconocer que los tres segmentos medios de un triángulo lo dividen en cuatro triángulos congruentes
  entre sí.
introduccion: Al trazar los tres segmentos medios de un triángulo, la figura queda dividida en cuatro
  triángulos más pequeños que, sorprendentemente, son todos congruentes entre sí (no solo de igual área,
  sino de igual forma y tamaño).
resumen: Los tres segmentos medios de un triángulo lo dividen en cuatro triángulos congruentes.
explicacion: '![División en cuatro triángulos congruentes](/static/img/geometria/elementos-secundarios/segmento-medio-cuatro-triangulos-congruentes.svg)


  ### Definición formal


  Si se trazan los tres segmentos medios de un triángulo ABC, se forman cuatro triángulos: el triángulo
  medial (central) y tres triángulos en las esquinas; los cuatro son congruentes entre sí y semejantes
  al triángulo original.


  ### Desarrollo didáctico


  Cada uno de los cuatro triángulos formados tiene lados que son la mitad de los lados del triángulo original,
  por lo que los cuatro comparten exactamente las mismas medidas y ángulos: son congruentes.'
procedimiento:
- 'Paso 1: Traza los tres segmentos medios del triángulo.'
- 'Paso 2: Identifica los cuatro triángulos formados (uno central y tres en las esquinas).'
- 'Paso 3: Verifica que los cuatro tengan los mismos lados y ángulos: son congruentes.'
ejemplos:
- titulo: Identificar los cuatro triángulos
  enunciado: Se trazan los tres segmentos medios de un triángulo ABC.
  solucion_pasos:
  - 'Se forman cuatro triángulos congruentes entre sí: uno central y tres en las esquinas.'
- titulo: Comparar con el original
  enunciado: ¿Qué relación tienen los cuatro triángulos con el triángulo original?
  solucion_pasos:
  - Son semejantes al original, con la mitad de la medida de sus lados.
- titulo: ¿Los cuatro triángulos formados son congruentes entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, tienen exactamente los mismos lados y ángulos.
- titulo: ¿El triángulo central está invertido respecto al original?
  respuesta: Sí
  solucion_pasos:
  - Sí, el triángulo medial (central) queda invertido respecto a la orientación del triángulo original.
errores_frecuentes:
- Creer que los cuatro triángulos solo tienen igual área, sin ser congruentes en forma.
- No reconocer el triángulo central como uno de los cuatro (a veces se ignora, contando solo los de las
  esquinas).
- Confundir esta división con la de las transversales de gravedad (que da seis triángulos de igual área,
  no cuatro congruentes).
fuente: Elaboración propia.
estado: publicado
