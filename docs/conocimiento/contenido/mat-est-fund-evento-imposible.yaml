semantic_id: MAT.EST.PROBA_FUNDAMENTOS.EVENTO_IMPOSIBLE
titulo: Identificación de un evento imposible en un experimento aleatorio
objetivo: Identificar un evento imposible como aquel que no contiene ningún elemento del espacio muestral,
  es decir, que nunca puede ocurrir.
introduccion: Así como existen eventos garantizados de ocurrir, también existen condiciones que nunca
  pueden cumplirse dentro de un experimento dado, correspondiendo al conjunto vacío.
resumen: Un evento imposible es aquel que corresponde al conjunto vacío ($A=\emptyset$), por lo que nunca
  ocurre, sin importar el resultado del experimento.
explicacion: '![Evento imposible](/static/img/probabilidad/fundamentos/fund-evento-imposible.svg)


  ### Definición formal


  Un evento $A$ es imposible si $A=\emptyset$, es decir, si no contiene ningún elemento del espacio muestral.


  ### Desarrollo didáctico


  Al lanzar un dado de seis caras, el evento ''obtener un 7'' es imposible, ya que $A=\emptyset$: ningún
  resultado del espacio muestral $\{1,...,6\}$ cumple esa condición.'
procedimiento:
- 'Paso 1: Define el evento cuya condición se quiere verificar.'
- 'Paso 2: Verifica si algún resultado del espacio muestral cumple esa condición.'
- 'Paso 3: Si ningún resultado la cumple, el evento es imposible (A=∅).'
ejemplos:
- titulo: Reconocer un evento imposible al lanzar un dado
  enunciado: 'Evento: ''obtener un 7''.'
  solucion_pasos:
  - Ningún resultado del dado es 7, por lo que A=∅, un evento imposible.
- titulo: Reconocer un evento imposible al lanzar una moneda
  enunciado: 'Evento: ''obtener un número''.'
  solucion_pasos:
  - Los resultados de una moneda son cara o sello, no números, por lo que este evento es imposible.
- titulo: ¿Un evento imposible tiene probabilidad 0?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una de las propiedades fundamentales de la probabilidad.
- titulo: ¿Un evento imposible puede ocurrir en algún caso excepcional?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición nunca puede ocurrir, sin excepciones.
errores_frecuentes:
- Confundir un evento imposible con un evento muy poco probable pero posible.
- Creer que un evento imposible puede tener probabilidad distinta de 0.
- Definir mal el espacio muestral, clasificando erróneamente un evento posible como imposible.
fuente: 'Elaboración propia (referencia: Moraleja 403).'
estado: publicado
