semantic_id: MAT.ALG.DESIG_PROPIEDADES.DIVISION_POSITIVA
titulo: División de una desigualdad por una cantidad positiva
objetivo: Dividir ambos miembros de una desigualdad entre un número real positivo preservando la relación
  de orden.
introduccion: Para despejar coeficientes que multiplican a una incógnita, es necesario dividir. Cuando
  el divisor es positivo, el proceso mantiene el orden de la desigualdad de forma natural.
resumen: Al dividir ambos lados de una desigualdad por un número real positivo, la dirección del símbolo
  de desigualdad se mantiene.
explicacion: '### Definición formal

  Sean $a, b, c \in \mathbb{R}$, con $c > 0$. Si $a > b$, entonces $\frac{a}{c} > \frac{b}{c}$. Análogo
  para $<, \leq$ y $\geq$.


  ### Desarrollo didáctico

  La división por un número positivo es equivalente a multiplicar por su inverso multiplicativo (que también
  es positivo), por lo que se comporta igual que la multiplicación positiva.'
procedimiento:
- Identificar el coeficiente o número positivo por el cual se va a dividir.
- Dividir el miembro izquierdo de la desigualdad entre dicho número.
- Dividir el miembro derecho entre el mismo número.
- Simplificar las fracciones y mantener el sentido de la desigualdad original.
ejemplos:
- titulo: Despeje con coeficiente entero
  enunciado: Resuelva la inecuación $4x < 20$.
  solucion_pasos:
  - Dividir ambos lados entre $4$, un número positivo.
  - $\frac{4x}{4} < \frac{20}{4}$.
  - 'Simplificar: $x < 5$.'
- titulo: Desigualdad con variables negativas
  enunciado: Resuelva $2y \geq -10$.
  solucion_pasos:
  - 'Dividir por $2$ a ambos lados: $\frac{2y}{2} \geq \frac{-10}{2}$.'
  - Simplificar obteniendo $y \geq -5$.
- titulo: Si $10 > 6$, ¿es correcto afirmar que $\frac{10}{2} > \frac{6}{2}$?
  respuesta: Sí
  solucion_pasos:
  - Dividimos entre $2$, que es un número mayor a cero.
  - La relación se simplifica a $5 > 3$, la cual es correcta.
- titulo: ¿El sentido de la desigualdad se invierte si el dividendo es negativo pero el divisor es positivo?
  respuesta: 'No'
  solucion_pasos:
  - El único factor que determina si la desigualdad se invierte o no, es el signo del divisor.
  - Si el divisor es positivo, la desigualdad no se invierte.
errores_frecuentes:
- Dividir por un número positivo cambia el signo de la desigualdad.
- No se puede dividir si el numerador es negativo.
- Dividir por una fracción positiva invierte la desigualdad.
- Si $x > y$ y $c > 0$, entonces $\frac{x}{c} < \frac{y}{c}$.
- Al dividir entre un número decimal positivo se debe cambiar el sentido.
