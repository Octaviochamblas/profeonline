semantic_id: MAT.NUM.RAICES_PROPIEDADES.INGRESO_FACTOR_SUBRADICAL
objetivo: Introducir un factor dentro de un radical.
introduccion: Ingresar un factor es la operación inversa de extraerlo. La potencia
  aplicada al factor compensa exactamente el índice radical.
resumen: 'Un factor exterior entra a una raíz elevado al índice: \(a\sqrt[n]{b}=\sqrt[n]{a^n
  b}\). Para índices pares y factores negativos debe controlarse el signo antes de
  ingresa.'
explicacion: |-
  Un factor exterior entra a una raíz elevado al índice: \(a\sqrt[n]{b}=\sqrt[n]{a^n b}\).

  El cálculo “\(3\sqrt2=\sqrt{3^2\cdot2}=\sqrt{18}\)” muestra por qué para índices pares y factores negativos debe controlarse el signo antes de ingresa
procedimiento:
- 'Paso 1: Identifica el índice y comprueba el signo del factor exterior.'
- 'Paso 2: Eleva el factor al índice y multiplícalo por el radicando.'
- 'Paso 3: Extrae nuevamente la potencia perfecta para verificar la equivalencia.'
ejemplos:
- titulo: Aplicación razonada — Ingreso de un factor al interior de una raíz
  enunciado: \(3\sqrt2=\sqrt{3^2\cdot2}=\sqrt{18}\).
  solucion_pasos:
  - Identifica el índice y comprueba el signo del factor exterior.
  - Eleva el factor al índice y multiplícalo por el radicando.
  - Extrae nuevamente la potencia perfecta para verificar la equivalencia.
- titulo: Revisión de una solución — Ingreso de un factor al interior de una raíz
  enunciado: Una solución aplica “Eleva el factor al índice y multiplícalo por el
    radicando.”, pero termina sin comprobar que para índices pares y factores negativos
    debe controlarse el signo antes de ingresa. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define ingreso de un factor al interior de una raíz:
    un factor exterior entra a una raíz elevado al índice: \(a\sqrt[n]{b}=\sqrt[n]{a^n
    b}\).'
  - Identifica el índice y comprueba el signo del factor exterior.
  - 'Completa la revisión con este control: Extrae nuevamente la potencia perfecta
    para verificar la equivalencia.'
- titulo: ¿Se cumple que para índices pares y factores negativos debe controlarse
    el signo antes de ingresa? — Ingreso de un factor al interior de una raíz
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que un factor exterior entra a una raíz
    elevado al índice: \(a\sqrt[n]{b}=\sqrt[n]{a^n b}\).'
  - El caso “\(3\sqrt2=\sqrt{3^2\cdot2}=\sqrt{18}\)” satisface esa condición.
  - Extrae nuevamente la potencia perfecta para verificar la equivalencia.
- titulo: ¿Es válido omitir el paso “Identifica el índice y comprueba el signo del
    factor exterior”? — Ingreso de un factor al interior de una raíz
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de ingreso de un factor al interior
    de una raíz.
  - 'Omitirlo puede volver inválida la acción siguiente: Eleva el factor al índice
    y multiplícalo por el radicando.'
  - 'La solución debe terminar de este modo: Extrae nuevamente la potencia perfecta
    para verificar la equivalencia.'
errores_frecuentes:
- 'Confundir ingreso de un factor al interior de una raíz con otro concepto y omitir
  este inicio: Identifica el índice y comprueba el signo del factor exterior.'
- Aplicar mecánicamente “Eleva el factor al índice y multiplícalo por el radicando.”
  sin revisar las condiciones de la definición.
- Tomar “\(3\sqrt2=\sqrt{3^2\cdot2}=\sqrt{18}\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “para índices pares y factores
  negativos debe controlarse el signo antes de ingresa”.
- 'Terminar el desarrollo sin realizar este control: Extrae nuevamente la potencia
  perfecta para verificar la equivalencia.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
