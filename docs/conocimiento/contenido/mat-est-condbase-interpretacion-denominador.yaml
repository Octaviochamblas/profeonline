semantic_id: MAT.EST.PROBA_COND_BASE.INTERPRETACION_DENOMINADOR
titulo: Interpretación del denominador como nuevo espacio muestral restringido
objetivo: Interpretar el denominador de la fórmula de probabilidad condicional (P(B) o n(B)) como el nuevo
  espacio muestral efectivo, una vez que se conoce que el evento condicionante ocurrió.
introduccion: 'El denominador de la fórmula de probabilidad condicional no es un simple número: representa
  conceptualmente el ''nuevo universo'' sobre el cual se calculan todas las probabilidades posteriores.'
resumen: En la fórmula $P(A|B)=\dfrac{P(A\cap B)}{P(B)}$ (o su versión con conteos $\dfrac{n(A\cap B)}{n(B)}$),
  el denominador representa el tamaño del nuevo espacio muestral, restringido únicamente al evento $B$.
explicacion: '![Interpretación del denominador en probabilidad condicional](/static/img/probabilidad/condbase/condbase-interpretacion-denominador.svg)


  ### Definición formal


  El denominador $P(B)$ o $n(B)$ no es un simple valor de normalización: representa el nuevo espacio muestral
  de referencia, dentro del cual se recalculan todas las proporciones.


  ### Desarrollo didáctico


  Al lanzar un dado, si $B=\{4,5,6\}$, el denominador $n(B)=3$ representa que, una vez sabido que el resultado
  fue mayor que 3, solo existen 3 posibilidades reales, no 6: ese es el verdadero universo de referencia
  para cualquier cálculo posterior.'
procedimiento:
- 'Paso 1: Identifica el evento condicionante B y calcula su tamaño (n(B) o P(B)).'
- 'Paso 2: Interpreta ese valor como el nuevo ''total'' de referencia, reemplazando al espacio muestral
  original.'
- 'Paso 3: Todas las probabilidades posteriores relacionadas con este problema se calculan respecto de
  ese nuevo total.'
ejemplos:
- titulo: Interpretar n(B)=3 en un problema de dado
  enunciado: B={4,5,6}, n(B)=3.
  solucion_pasos:
  - Significa que, sabiendo que el resultado fue mayor que 3, ahora solo hay 3 posibilidades reales, no
    6.
- titulo: Interpretar P(B)=0,4 en un problema de encuesta
  enunciado: B='cliente frecuente', P(B)=0,4.
  solucion_pasos:
  - Significa que, al restringirse a los clientes frecuentes, el 40% de la población original conforma
    este nuevo universo de referencia.
- titulo: ¿El denominador representa siempre el nuevo universo de referencia tras la condición?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la interpretación conceptual central de este denominador.
- titulo: ¿Cambia el significado de 'total' una vez que se aplica una condición?
  respuesta: Sí
  solucion_pasos:
  - Sí, el 'total' relevante deja de ser el espacio muestral original y pasa a ser el evento condicionante.
errores_frecuentes:
- Interpretar el denominador solo como un número aislado, sin conectarlo con el concepto de nuevo espacio
  muestral.
- Seguir usando el espacio muestral original como referencia después de aplicar una condición.
- Confundir el denominador P(B) con el numerador P(A∩B) al interpretar su significado.
fuente: 'Elaboración propia (referencia: Moraleja 411).'
estado: publicado
