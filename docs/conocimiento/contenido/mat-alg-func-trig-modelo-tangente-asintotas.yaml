semantic_id: MAT.ALG.FUNC_TRIG_MODELO.TANGENTE_ASINTOTAS
titulo: Asíntotas verticales de la función tangente
objetivo: Determinar que las asíntotas verticales de $f(x)=\tan(x)$ ocurren en $x=\pi/2+n\pi$.
introduccion: La tangente no está definida donde el coseno vale $0$, y precisamente ahí es donde aparecen sus
  asíntotas verticales.
resumen: La función $f(x)=\tan(x)$ tiene **asíntotas verticales** en $x=\pi/2+n\pi$, para cualquier entero $n$,
  que son exactamente los ceros del coseno.
explicacion: '### Definición formal


  Como $\tan(x)=\sin(x)/\cos(x)$, la función no está definida donde $\cos(x)=0$, es decir, en $x=\pi/2+n\pi$.
  Cerca de esos valores, $|\tan(x)|\to\infty$, ya que el denominador se acerca a $0$ mientras el numerador no
  se anula simultáneamente.


  ### Desarrollo didáctico


  Cerca de $x=\pi/2$: para $x=1{,}5$ (un poco menor que $\pi/2\approx1{,}5708$), $\tan(1{,}5)\approx14{,}1$; para
  $x=1{,}57$, $\tan(1{,}57)\approx1255{,}8$. El valor crece sin límite al acercarse a la asíntota.'
procedimiento:
- 'Paso 1: Recuerda que las asíntotas de la tangente coinciden con los ceros del coseno.'
- 'Paso 2: Identifica esos valores como $x=\pi/2+n\pi$.'
- 'Paso 3: Verifica que la función se acerque a $\pm\infty$ cerca de cada asíntota.'
ejemplos:
- titulo: Identificación de una asíntota
  enunciado: '¿Es $x=3\pi/2$ una asíntota vertical de $f(x)=\tan(x)$?'
  solucion_pasos:
  - 'Se verifica: $3\pi/2=\pi/2+\pi$, con $n=1$.'
  - Sí, es una asíntota vertical.
- titulo: Verificación mediante el coseno
  enunciado: '¿Por qué $x=-\pi/2$ es una asíntota de la tangente?'
  solucion_pasos:
  - 'Se verifica que $\cos(-\pi/2)=0$.'
  - Como el denominador se anula ahí, la tangente no está definida y presenta una asíntota vertical.
- titulo: ¿Las asíntotas de la tangente están igualmente espaciadas?
  enunciado: ¿Las asíntotas verticales consecutivas de $f(x)=\tan(x)$ están separadas por la misma distancia?
  respuesta: Sí
  solucion_pasos:
  - Están espaciadas exactamente $\pi$ unidades entre sí, coincidiendo con el periodo de la función.
- titulo: ¿$x=0$ es una asíntota vertical de la tangente?
  enunciado: ¿El valor $x=0$ corresponde a una asíntota vertical de $f(x)=\tan(x)$?
  respuesta: 'No'
  solucion_pasos:
  - '$\cos(0)=1\neq0$, así que la tangente está bien definida en $x=0$, con $\tan(0)=0$.'
errores_frecuentes:
- Confundir las asíntotas de la tangente con los ceros del seno.
- Suponer que las asíntotas están espaciadas cada $2\pi$ en vez de cada $\pi$.
- No verificar el valor del coseno antes de afirmar la existencia de una asíntota.
- Confundir el comportamiento de la tangente cerca de sus asíntotas con el de otras funciones.
