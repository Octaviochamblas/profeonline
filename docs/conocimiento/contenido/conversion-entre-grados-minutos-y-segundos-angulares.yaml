semantic_id: MAT.GEO.MEDICION_ANGULAR.CONVERSION_GRADOS_MINUTOS_SEGUNDOS
titulo: Conversión entre grados, minutos y segundos angulares
objetivo: Convertir medidas angulares usando la equivalencia adecuada y comprobar que cada cambio de unidad
  multiplica o divide por 60 según el sentido de la conversión.
introduccion: 'Cambiar de grados a minutos o segundos se parece a cambiar de kilómetros a metros: la idea
  es la misma, pero la equivalencia correcta aquí es sexagesimal. Para resolver situaciones de conversión
  entre grados, minutos y segundos angulares conviene mirar el dibujo con método, no solo por intuición.'
resumen: Convertir entre grados, minutos y segundos exige usar que \(1°=60'\) y \(1'=60''\). Como idea
  de control, cada cambio de unidad multiplica o divide por 60 según el sentido de la conversión.
explicacion: 'Convertir entre grados, minutos y segundos exige usar que \(1°=60''\) y \(1''=60''''\).


  Cuando se analiza “para pasar \(2.5°\) a minutos, se calcula \(2.5\times 60=150''\)” conviene evitar
  la memoria mecánica. El control decisivo es comprobar que cada cambio de unidad multiplica o divide
  por 60 según el sentido de la conversión.'
procedimiento:
- 'Paso 1: Identifica en qué unidad está dada la medida y a qué unidad debe pasar.'
- 'Paso 2: Escribe la equivalencia base del sistema involucrado antes de calcular.'
- 'Paso 3: Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.'
ejemplos:
- titulo: Caso guiado — Conversión grados-minutos-segundos
  enunciado: Para pasar \(2.5°\) a minutos, se calcula \(2.5\times 60=150'\).
  solucion_pasos:
  - Identifica en qué unidad está dada la medida y a qué unidad debe pasar.
  - Escribe la equivalencia base del sistema involucrado antes de calcular.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: Chequeo del procedimiento — Conversión grados-minutos-segundos
  enunciado: En la situación “para pasar \(2.5°\) a minutos, se calcula \(2.5\times 60=150'\)”, un compañero
    llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye la justificación completa.
  solucion_pasos:
  - 'Parte de la definición: convertir entre grados, minutos y segundos exige usar que \(1°=60''\) y \(1''=60''''\).'
  - Escribe la equivalencia base del sistema involucrado antes de calcular.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: ¿La interpretación del dibujo es válida? — Conversión grados-minutos-segundos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: convertir entre grados, minutos y segundos
    exige usar que \(1°=60''\) y \(1''=60''''\).'
  - En el caso “para pasar \(2.5°\) a minutos, se calcula \(2.5\times 60=150'\)” se observa que cada cambio
    de unidad multiplica o divide por 60 según el sentido de la conversión.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: ¿Se puede cerrar sin el control final? — Conversión grados-minutos-segundos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de conversión entre grados, minutos y segundos
    angulares.
  - Después del paso “Identifica en qué unidad está dada la medida y a qué unidad debe pasar.” todavía
    hace falta revisar “Escribe la equivalencia base del sistema involucrado antes de calcular.”.
  - El cierre correcto exige “Resuelve la proporción o la operación y verifica que el resultado tenga
    la unidad pedida.”.
errores_frecuentes:
- Conversión grados-minutos-segundos significa sumar 60 en vez de multiplicar o dividir por 60.
- Para resolver conversión grados-minutos-segundos, basta con el paso “Identifica en qué unidad está dada
  la medida y a qué unidad debe pasar.” y no hace falta revisar “Escribe la equivalencia base del sistema
  involucrado antes de calcular.”.
- Si el dibujo parece claro, se puede ignorar que cada cambio de unidad multiplica o divide por 60 según
  el sentido de la conversión.
- Dos configuraciones distintas representan conversión grados-minutos-segundos solo porque contienen la
  palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Resuelve la proporción o la operación y verifica
  que el resultado tenga la unidad pedida.”.
fuente: Currículum Nacional MINEDUC — Medición angular, sistemas sexagesimal, radial y centesimal.
