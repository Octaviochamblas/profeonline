semantic_id: MAT.ALG.FACTOR_COMUN.RECONOCIMIENTO_POLINOMIO
titulo: Reconocimiento del factor común polinomio
objetivo: Comprender reconocimiento del factor común polinomio y aplicarlo con precisión.
introduccion: A veces el elemento repetido no es una sola letra, sino un binomio o un polinomio completo. Tratar
  ese grupo como una unidad permite reconocer el factor común.
resumen: Al extraer el negativo, cambian los signos internos, invirtiendo el orden de la resta.
explicacion: '### Definición formal


  Un polinomio $Q$ es factor común de una suma $c_1 Q + c_2 Q + \dots + c_kQ$ si aparece multiplicando íntegramente
  a cada término. Cuando dos bloques son opuestos, $(a-b) = -(b-a)$, se pueden igualar extrayendo el signo $-1$
  de uno de ellos antes de factorizar.


  ### Desarrollo didáctico


  A diferencia de la resta, a+b = b+a naturalmente.


  Ese factor -1 extraído multiplica al coeficiente q, transformándolo en -q.


  Al extraer el -1 del (1-m), el signo menos exterior pasa a ser +. Nos queda +1(m-1). Por tanto, la respuesta es
  (m-1)(x+1).'
procedimiento:
- A diferencia de la resta, a+b = b+a naturalmente.
- Ese factor -1 extraído multiplica al coeficiente q, transformándolo en -q.
- Al extraer el -1 del (1-m), el signo menos exterior pasa a ser +. Nos queda +1(m-1). Por tanto, la respuesta es
  (m-1)(x+1).
ejemplos:
- titulo: En la resta, $(a-b) = -(b-a)$
  enunciado: ¿En la resta, $(a-b) = -(b-a)$?
  solucion_pasos:
  - Es una propiedad fundamental para reordenar términos restados.
  - 'Respuesta: Verdadero'
- titulo: En $x(y-3) + (y-3)^2$, el factor común polinomio es $(y-3)$
  enunciado: ¿En $x(y-3) + (y-3)^2$, el factor común polinomio es $(y-3)$?
  solucion_pasos:
  - El binomio se comporta como una letra; su exponente menor es 1.
  - 'Respuesta: Verdadero'
- titulo: 'Respecto de «Reconocimiento del factor común polinomio»: ¿Se ajusta a la definición esta afi'
  enunciado: 'Respecto de «Reconocimiento del factor común polinomio»: ¿Se ajusta a la definición esta afirmación?
    «Al extraer el negativo, cambian los signos internos, invirtiendo el orden de la resta»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al extraer el negativo, cambian los signos internos, invirtiendo
    el orden de la resta.'
- titulo: 'Respecto de «Reconocimiento del factor común polinomio»: ¿Es compatible con el procedimiento'
  enunciado: 'Respecto de «Reconocimiento del factor común polinomio»: ¿Es compatible con el procedimiento esta
    afirmación? «Para «¿Qué debes hacer matemáticamente para transformar $(b-a)$ en $(a-b)$», la respuesta correcta
    es Multiplicarlo por 1»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al extraer el negativo, cambian los signos internos, invirtiendo
    el orden de la resta.'
errores_frecuentes:
- Para «¿Qué debes hacer matemáticamente para transformar $(b-a)$ en $(a-b)$», la respuesta correcta es Multiplicarlo
  por 1.
- Para «¿Qué debes hacer matemáticamente para transformar $(b-a)$ en $(a-b)$», la respuesta correcta es Elevarlo
  al cuadrado.
- Para «¿Qué debes hacer matemáticamente para transformar $(b-a)$ en $(a-b)$», la respuesta correcta es Sumarle
  cero.
- Sí, siempre.
- Para «¿Las expresiones $(x+y)$ y $(y+x)$ requieren extracción de signo negativo para usarse como factor común»,
  la respuesta correcta es Solo si x es negativa.
