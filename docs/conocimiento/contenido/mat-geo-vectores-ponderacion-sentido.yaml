semantic_id: MAT.GEO.VECTORES_OPERATORIA.PONDERACION_SENTIDO
titulo: Efecto de la multiplicación escalar en el sentido de un vector
objetivo: Reconocer que el signo del escalar k determina si el vector resultante mantiene el mismo sentido
  que el original o si se invierte.
introduccion: El signo del número por el que se multiplica un vector decide si la flecha sigue apuntando
  hacia el mismo lado o si se voltea hacia el lado contrario.
resumen: Si un vector $\vec{v}$ se multiplica por un escalar $k>0$, el vector resultante $k\vec{v}$ mantiene
  el mismo sentido que $\vec{v}$; si $k<0$, el sentido se invierte.
explicacion: '![Efecto de la ponderación escalar en el sentido](/static/img/geometria/cartesiano-vectores/vectores-ponderacion-sentido.svg)


  ### Definición formal


  Para un vector $\vec{v}$ y un escalar $k$: si $k>0$, $k\vec{v}$ tiene el mismo sentido que $\vec{v}$;
  si $k<0$, $k\vec{v}$ tiene sentido opuesto a $\vec{v}$; si $k=0$, el resultado es el vector nulo (sin
  sentido definido).


  ### Desarrollo didáctico


  En la figura, el vector $2\vec{v}$ (con $k=2>0$) mantiene el mismo sentido que $\vec{v}$, mientras que
  $-2\vec{v}$ (con $k=-2<0$) apunta exactamente hacia el lado contrario.'
procedimiento:
- 'Paso 1: Identifica el signo del escalar k por el que se multiplicará el vector.'
- 'Paso 2: Si k es positivo, el vector resultante mantiene el mismo sentido que el original.'
- 'Paso 3: Si k es negativo, el vector resultante invierte su sentido respecto del original.'
ejemplos:
- titulo: Determinar el sentido con un escalar positivo
  enunciado: v se multiplica por k=5.
  solucion_pasos:
  - Como k>0, el vector 5v mantiene el mismo sentido que v.
- titulo: Determinar el sentido con un escalar negativo
  enunciado: v se multiplica por k=-2.
  solucion_pasos:
  - Como k<0, el vector -2v tiene sentido opuesto al de v.
- titulo: ¿Un escalar negativo siempre invierte el sentido del vector?
  respuesta: Sí
  solucion_pasos:
  - Sí, cualquier escalar negativo invierte el sentido, sin importar su valor específico.
- titulo: ¿Multiplicar por k=0 produce un vector con sentido definido?
  respuesta: 'No'
  solucion_pasos:
  - No, el resultado es el vector nulo, que no tiene una dirección ni sentido definidos.
errores_frecuentes:
- Creer que cualquier escalar (sin importar su signo) mantiene el sentido del vector.
- Confundir el efecto del escalar en el sentido con su efecto en el módulo.
- No reconocer que el vector nulo (k=0) no tiene sentido definido.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 123).'
