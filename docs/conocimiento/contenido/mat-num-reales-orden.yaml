semantic_id: MAT.NUM.REALES.ORDEN
objetivo: Comparar números reales escritos de formas distintas.
introduccion: Ordenar raíces, fracciones y decimales obliga a llevarlos a una referencia
  común. La recta y las cotas permiten comparar sin fingir que una aproximación es
  el valor exacto.
resumen: Dos números reales distintos siempre pueden compararse mediante \(<\) o \(>\).
  Comparar aproximaciones exige suficiente precisión para que los intervalos no se
  superpongan.
explicacion: |-
  Dos números reales distintos siempre pueden compararse mediante \(<\) o \(>\).

  La situación “como \(1.41^2<2<1.42^2\), se concluye \(1.41<\sqrt2<1.42\)” permite comprobar, y no solo memorizar, que comparar aproximaciones exige suficiente precisión para que los intervalos no se superpongan
procedimiento:
- 'Paso 1: Transforma los números a decimales controlados o establece cotas exactas.'
- 'Paso 2: Compara signos, partes enteras y luego las cifras o límites necesarios.'
- 'Paso 3: Escribe la desigualdad y comprueba que la precisión usada permite decidirla.'
ejemplos:
- titulo: Aplicación razonada — Orden de números reales
  enunciado: Como \(1.41^2<2<1.42^2\), se concluye \(1.41<\sqrt2<1.42\).
  solucion_pasos:
  - Transforma los números a decimales controlados o establece cotas exactas.
  - Compara signos, partes enteras y luego las cifras o límites necesarios.
  - Escribe la desigualdad y comprueba que la precisión usada permite decidirla.
- titulo: Revisión de una solución — Orden de números reales
  enunciado: Una solución aplica “Compara signos, partes enteras y luego las cifras
    o límites necesarios.”, pero termina sin comprobar que comparar aproximaciones
    exige suficiente precisión para que los intervalos no se superpongan. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define orden de números reales: dos números reales
    distintos siempre pueden compararse mediante \(<\) o \(>\).'
  - Transforma los números a decimales controlados o establece cotas exactas.
  - 'Completa la revisión con este control: Escribe la desigualdad y comprueba que
    la precisión usada permite decidirla.'
- titulo: ¿Se cumple que comparar aproximaciones exige suficiente precisión para que
    los intervalos no se superpongan? — Orden de números reales
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que dos números reales distintos siempre
    pueden compararse mediante \(<\) o \(>\).
  - El caso “como \(1.41^2<2<1.42^2\), se concluye \(1.41<\sqrt2<1.42\)” satisface
    esa condición.
  - Escribe la desigualdad y comprueba que la precisión usada permite decidirla.
- titulo: ¿Es válido omitir el paso “Transforma los números a decimales controlados
    o establece cotas exactas”? — Orden de números reales
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de orden de números reales.
  - 'Omitirlo puede volver inválida la acción siguiente: Compara signos, partes enteras
    y luego las cifras o límites necesarios.'
  - 'La solución debe terminar de este modo: Escribe la desigualdad y comprueba que
    la precisión usada permite decidirla.'
errores_frecuentes:
- 'Confundir orden de números reales con otro concepto y omitir este inicio: Transforma
  los números a decimales controlados o establece cotas exactas.'
- Aplicar mecánicamente “Compara signos, partes enteras y luego las cifras o límites
  necesarios.” sin revisar las condiciones de la definición.
- Tomar “como \(1.41^2<2<1.42^2\), se concluye \(1.41<\sqrt2<1.42\)” como una igualdad
  aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “comparar aproximaciones exige
  suficiente precisión para que los intervalos no se superpongan”.
- 'Terminar el desarrollo sin realizar este control: Escribe la desigualdad y comprueba
  que la precisión usada permite decidirla.'
