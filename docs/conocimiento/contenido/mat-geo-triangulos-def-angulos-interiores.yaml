semantic_id: MAT.GEO.TRIANGULOS_DEF.ANGULOS_INTERIORES
titulo: Identificación de los tres ángulos interiores de un triángulo
objetivo: Identificar los tres ángulos interiores de un triángulo, formados en cada vértice por los dos
  lados que se encuentran ahí.
introduccion: 'En cada vértice de un triángulo, los dos lados que se unen forman un ángulo hacia el interior
  de la figura: ese es el ángulo interior de ese vértice.'
resumen: Los ángulos interiores de un triángulo son los tres ángulos formados en sus vértices, hacia el
  interior de la figura.
explicacion: '![Ángulos interiores de un triángulo](/static/img/geometria/triangulos/triangulos-def-angulos-interiores.svg)


  ### Definición formal


  En un triángulo ABC, el ángulo interior en el vértice A (denotado α) es el ángulo formado por los lados
  AB y AC, medido hacia el interior de la figura. De igual modo se definen los ángulos interiores β en
  B y γ en C.


  ### Desarrollo didáctico


  En el vértice A, los lados AB y AC se abren formando el ángulo α; en B, los lados BA y BC forman β;
  en C, los lados CA y CB forman γ. Los tres ángulos α, β y γ son los ángulos interiores del triángulo
  ABC.'
procedimiento:
- 'Paso 1: Ubica un vértice del triángulo.'
- 'Paso 2: Identifica los dos lados que se encuentran en ese vértice.'
- 'Paso 3: El ángulo interior es el que forman esos dos lados hacia adentro de la figura.'
ejemplos:
- titulo: Identificar un ángulo interior
  enunciado: En el triángulo ABC, ¿qué lados forman el ángulo interior β?
  solucion_pasos:
  - El ángulo β está en el vértice B, formado por los lados BA y BC.
- titulo: Contar ángulos interiores
  enunciado: ¿Cuántos ángulos interiores tiene un triángulo?
  solucion_pasos:
  - Tiene tres, uno por cada vértice.
- titulo: ¿El ángulo interior en A se forma con los lados AB y AC?
  respuesta: Sí
  solucion_pasos:
  - Sí, son los dos lados que se encuentran en el vértice A.
- titulo: ¿Un triángulo puede tener más de tres ángulos interiores?
  respuesta: 'No'
  solucion_pasos:
  - No, tiene exactamente uno por cada uno de sus tres vértices.
errores_frecuentes:
- Confundir un ángulo interior con un ángulo exterior del triángulo.
- Asociar un ángulo interior con un lado en vez de con un vértice.
- Olvidar que cada vértice tiene asociado exactamente un ángulo interior.
fuente: Elaboración propia.
estado: publicado
