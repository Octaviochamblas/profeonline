semantic_id: MAT.ALG.FUNCION_CONCEPTOS.CODOMINIO
titulo: Identificación del codominio de una función
objetivo: Distinguir el codominio de una función como el conjunto de llegada declarado, diferenciándolo
  del recorrido.
introduccion: El codominio es el conjunto donde "podrían" caer las imágenes; el recorrido es el conjunto
  de las imágenes que "realmente" caen ahí. No siempre coinciden.
resumen: El **codominio** de una función $f\colon A \to B$ es el conjunto $B$ declarado como conjunto
  de llegada; contiene al recorrido de $f$, pero puede incluir además elementos que nunca son imagen de
  ningún valor del dominio.
explicacion: '### Definición formal


  Dada una función $f\colon A \to B$, el codominio es el conjunto $B$ fijado en la definición de la función,
  independiente de si cada uno de sus elementos es o no efectivamente alcanzado como imagen. Se cumple
  $\text{Rec}(f) \subseteq B$, con igualdad si y solo si $f$ es sobreyectiva.


  ### Desarrollo didáctico


  Imagina que $B$ = "todos los casilleros disponibles en un edificio" y el recorrido = "los casilleros
  que realmente tienen algo guardado". El codominio es la totalidad de casilleros; el recorrido es solo
  los ocupados.


  Por ejemplo, si se declara $f\colon \mathbb{R} \to \mathbb{R}$ con $f(x) = x^2$, el codominio es $\mathbb{R}$
  completo, aunque las imágenes reales nunca sean negativas (el recorrido es $[0, +\infty[$).'
procedimiento:
- 'Paso 1: Busca en la definición o el enunciado cuál es el conjunto de llegada declarado.'
- 'Paso 2: Ese conjunto declarado es el codominio, sin necesidad de calcular las imágenes.'
- 'Paso 3: No confundas este paso con calcular el recorrido, que requiere hallar las imágenes efectivas.'
ejemplos:
- titulo: Codominio declarado explícitamente
  enunciado: Si $f\colon \mathbb{R} \to \mathbb{R}^+_0$ con $f(x) = x^2$, indica el codominio.
  solucion_pasos:
  - El codominio es el conjunto de llegada declarado en la notación de la función.
  - 'Codominio: $\mathbb{R}^+_0$ (reales no negativos).'
- titulo: Codominio distinto del recorrido
  enunciado: Si $f\colon \mathbb{R} \to \mathbb{R}$ con $f(x) = x^2$, ¿el codominio incluye números negativos
    aunque nunca sean imagen?
  solucion_pasos:
  - Sí, porque el codominio es el conjunto de llegada completo, no solo los valores efectivamente alcanzados.
  - Los negativos pertenecen al codominio $\mathbb{R}$ pero no al recorrido de $f$.
- titulo: ¿El codominio y el recorrido son siempre el mismo conjunto?
  enunciado: ¿El codominio y el recorrido son siempre el mismo conjunto?
  respuesta: Falso
  solucion_pasos:
  - Solo coinciden cuando la función es sobreyectiva; en general el recorrido es un subconjunto del codominio.
- titulo: ¿El codominio se determina calculando todas las imágenes de la función?
  enunciado: ¿El codominio se determina calculando todas las imágenes de la función?
  respuesta: Falso
  solucion_pasos:
  - El codominio se fija por definición como conjunto de llegada; calcular las imágenes da el recorrido,
    no el codominio.
errores_frecuentes:
- Confundir codominio con recorrido, calculando las imágenes cuando solo se pide el conjunto de llegada
  declarado.
- Asumir que el codominio siempre es $\mathbb{R}$ sin revisar si el enunciado lo restringe.
- Creer que todo elemento del codominio necesariamente es imagen de algún elemento del dominio.
- No distinguir la notación $f\colon A \to B$ (que declara codominio $B$) de la fórmula $f(x)$ (que no
  lo declara).
