semantic_id: MAT.ALG.TERMINO_COMUN.CASO_GENERAL_LINEAL
titulo: Producto de binomios lineales no mónicos
objetivo: Aplicar la generalización del producto con término común cuando los binomios son del tipo $(ax+b)(cx+d)$.
introduccion: ¿Y si los coeficientes de $x$ no son $1$? ¿Y si ni siquiera son iguales? Aún hay una forma
  sistemática de resolverlo.
resumen: 'El producto de dos binomios lineales generales $(ax+b)(cx+d)$ no es estrictamente un ''producto
  notable'' tradicional, pero tiene un patrón fijo:

  **$(ax+b)(cx+d) = (ac)x^2 + (ad+bc)x + bd$**

  Esto es la aplicación formal del método FOIL (Firsts, Outers, Inners, Lasts).'
explicacion: "### Definición formal\n\nPara todo $a, b, c, d$, el producto $(ax+b)(cx+d)$ se expande por\
  \ distributividad como $(ac)x^2 + (ad+bc)x + bd$: el coeficiente cuadrático es el producto de los coeficientes\
  \ líderes, el coeficiente lineal es la suma de los dos productos cruzados, y el término independiente\
  \ es el producto de los términos constantes.\n\n### Desarrollo didáctico\n\nEl caso general de binomios\
  \ lineales con término común se da cuando el término que se repite no es simplemente una letra suelta\
  \ (como ''$x$''), sino un término que incluye un coeficiente numérico (como ''$3x$'' o ''$5y$'').\n\n\
  Por ejemplo, $(ax+b)(ax+c)$. La lógica sigue siendo exactamente la misma que la fórmula básica, pero\
  \ debes tener cuidado con las multiplicaciones.\n\n**Pasos en el caso general:**\nTomemos $(3x + 2)(3x\
  \ - 7)$:\n1. **Cuadrado del común:** El término común es $3x$. Su cuadrado es $(3x)^2 = 9x^2$. (No olvides\
  \ elevar también el coeficiente numérico.).\n2. **Suma por el común:** Los no comunes son $+2$ y $-7$.\
  \ La suma algebraica es $(2 - 7) = -5$. Ahora multiplicamos eso por el término común: $-5(3x) = -15x$.\n\
  3. **Producto:** Multiplicamos los no comunes: $(+2)(-7) = -14$.\n\nResultado final: $9x^2 - 15x - 14$.\
  \ \nEste caso nos recuerda que el \"término común\" actúa como un bloque inseparable durante los primeros\
  \ dos pasos de la regla."
procedimiento:
- 'Paso 1: Para calcular $(ax+b)(cx+d)$ mentalmente:'
- 'Paso 2: Multiplica los primeros coeficientes para el $x^2$.'
- 'Paso 3: Calcula ''los extremos por los medios'' (producto cruzado) y súmalos: $(ax \\\\\\cdot d) +
  (b \\\\\\cdot cx)$.'
- 'Paso 4: Multiplica los últimos términos (los independientes) para el final.'
- 'F: $12x^2$. O: $3x$. I: $8x$. L: $2$. Suma de cruzados: $3x + 8x = 11x$. Total: $12x^2 + 11x + 2$.'
ejemplos:
- titulo: Usando patrón general
  enunciado: Desarrolla $(2x + 3)(4x - 1)$.
  solucion_pasos:
  - 'Término en $x^2$: $2 \\\\\\cdot 4 = 8x^2$.'
  - 'Productos cruzados: $(2)(-1) = -2$; $(3)(4) = 12$. Suma: $10$. Así que $+10x$.'
  - 'Últimos: $(3)(-1) = -3$.'
  - 'Resultado: $8x^2 + 10x - 3$.'
- titulo: Si $(5x - 3)(2x + 7) = Ax^2 + Bx + C$, ¿cuál es el valor de $A + B + C$
  enunciado: 'Si $(5x - 3)(2x + 7) = Ax^2 + Bx + C$, ¿cuál es el valor de $A + B + C$?


    Opciones: A) $18$ · B) $10$ · C) $39$ · D) $29$'
  solucion_pasos:
  - 'F: $10x^2 \Rightarrow A=10$. Cruzados: $(5)(7) + (-3)(2) = 35 - 6 = 29 \Rightarrow B=29$. L: $(-3)(7)
    = -21 \Rightarrow C=-21$. $A+B+C = 10 + 29 - 21 = 39 - 21 = 18$. Espera. Evaluando en $x=1$, obtenemos
    $(5(1)-3)(2(1)+7) = (2)(9) = 18$. La respuesta A) 8 era incorrecta, debe ser 18. Espera, arreglaré
    las alternativas en el choice. ¡Ah! Voy a poner 18.'
  - 'Respuesta: $18$'
- titulo: 'Respecto de «Producto de binomios lineales no mónicos»: ¿La siguiente formulación es correct'
  enunciado: 'Respecto de «Producto de binomios lineales no mónicos»: ¿La siguiente formulación es correcta?
    «El producto de dos binomios lineales generales $(ax+b)(cx+d)$ no es estrictamente un ''producto notable''
    tradicional, pero tiene un patrón fijo: **$(ax+b)(cx+d) = (ac)x^2 + (ad+bc)x + bd$** Esto es la aplicación
    formal del método FOIL (Firsts, Outers, Inners, Lasts)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El producto de dos binomios lineales generales $(ax+b)(cx+d)$
    no es estrictamente un ''producto notable'' tradicional, pero tiene un patrón fijo: **$(ax+b)(cx+d)
    = (ac)x^2 + (ad+bc)x + bd$** Esto es la aplicación formal del método FOIL (Firsts, Outers, Inners,
    Lasts).'
- titulo: 'Respecto de «Producto de binomios lineales no mónicos»: ¿La siguiente conclusión es correcta'
  enunciado: 'Respecto de «Producto de binomios lineales no mónicos»: ¿La siguiente conclusión es correcta?
    «Multiplicar solo los primeros y los últimos, obteniendo $(ax)(cx) + (b)(d)$, omitiendo completamente
    los términos cruzados»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El producto de dos binomios lineales generales $(ax+b)(cx+d)$
    no es estrictamente un ''producto notable'' tradicional, pero tiene un patrón fijo: **$(ax+b)(cx+d)
    = (ac)x^2 + (ad+bc)x + bd$** Esto es la aplicación formal del método FOIL (Firsts, Outers, Inners,
    Lasts).'
errores_frecuentes:
- Multiplicar solo los primeros y los últimos, obteniendo $(ax)(cx) + (b)(d)$, omitiendo completamente
  los términos cruzados.
- $12x^2 + 10x + 2$.
- $12x^2 + 8x + 2$.
- $7x^2 + 11x + 2$.
- Para «Si $(5x - 3)(2x + 7) = Ax^2 + Bx + C$, ¿cuál es el valor de $A + B + C$», la respuesta correcta
  es $10$.
