semantic_id: MAT.GEO.CUERPOS_REDONDOS_METRICA.CILINDRO_VOLUMEN
titulo: Cálculo del volumen del cilindro
objetivo: Calcular el volumen de un cilindro a partir del radio de su base y su altura.
introduccion: 'El volumen de un cilindro se obtiene igual que el de un prisma: multiplicando el área de
  la base (un círculo) por la altura.'
resumen: El volumen de un cilindro de radio $r$ y altura $h$ es $V = \pi r^2 \times h$.
explicacion: '![Volumen del cilindro](/static/img/geometria/espacio-cuerpos/cilindro-volumen.svg)


  ### Definición formal


  El volumen de un cilindro es el producto entre el área de su base circular ($\pi r^2$) y su altura ($h$):
  $V=\pi r^2 h$.


  ### Desarrollo didáctico


  Si un cilindro tiene radio 4 cm y altura 10 cm, su volumen es $V=\pi(4)^2(10)=160\pi\approx502,4$ cm³
  (usando π≈3,14).'
procedimiento:
- 'Paso 1: Identifica el radio (r) de la base circular y la altura (h) del cilindro.'
- 'Paso 2: Calcula el área de la base circular: πr².'
- 'Paso 3: Multiplica el área de la base por la altura para obtener el volumen: V=πr²×h.'
ejemplos:
- titulo: Calcular el volumen de un cilindro
  enunciado: Un cilindro tiene radio 4 cm y altura 10 cm (π≈3,14).
  solucion_pasos:
  - V=3,14×16×10=502,4 cm³.
- titulo: Calcular la altura a partir del volumen
  enunciado: Un cilindro tiene volumen 150,72 cm³ y radio 4 cm (π≈3,14).
  solucion_pasos:
  - 150,72=3,14×16×h → 150,72=50,24×h → h=150,72/50,24=3 cm.
- titulo: ¿El volumen del cilindro sigue la misma lógica que el de un prisma?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos se calculan como área de la base multiplicada por la altura.
- titulo: ¿El volumen depende del radio elevado al cuadrado?
  respuesta: Sí
  solucion_pasos:
  - Sí, la fórmula V=πr²h depende de r al cuadrado, por lo que duplicar el radio cuadriplica el volumen.
errores_frecuentes:
- Confundir la fórmula del volumen (πr²h) con la del área total (2πr²+2πrh).
- Olvidar elevar el radio al cuadrado antes de multiplicar por π y por la altura.
- Usar el diámetro en vez del radio sin ajustar la fórmula.
fuente: 'Elaboración propia (referencias: Moraleja 98, Cid 181).'
estado: publicado
