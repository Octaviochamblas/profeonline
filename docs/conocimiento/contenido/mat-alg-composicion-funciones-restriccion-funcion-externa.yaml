semantic_id: MAT.ALG.COMPOSICION_FUNCIONES.RESTRICCION_FUNCION_EXTERNA
titulo: Análisis de restricción de dominio de la función externa sobre la imagen intermedia
objetivo: Identificar la restricción adicional que la función externa impone sobre el resultado (imagen intermedia)
  de la función interna.
introduccion: Además de respetar las reglas de la función interna, el resultado que ella entrega debe también
  ser aceptable para la función externa que lo recibe a continuación.
resumen: La segunda restricción a considerar en $(f\circ g)(x)$ es que el **resultado intermedio $g(x)$ debe pertenecer
  al dominio de la función externa** $f$, generando una condición adicional sobre $x$ más allá del dominio propio
  de $g$.
explicacion: '### Definición formal


  Además de exigir $x \in \text{Dom}(g)$, se debe exigir $g(x) \in \text{Dom}(f)$. Esta segunda condición se traduce
  en una restricción sobre $x$ que depende de la fórmula específica de $g$ y del dominio de $f$, y que suele expresarse
  resolviendo una inecuación o ecuación auxiliar.


  ### Desarrollo didáctico


  Esta es la restricción que más se olvida: no basta con que $x$ sea válido para $g$, el resultado de $g$ también
  debe ser digerible por $f$.


  Si $g(x)=x-7$ y $f(x)=\sqrt{x}$ (dominio $[0,+\infty[$): se necesita que el resultado intermedio $g(x)=x-7$
  sea mayor o igual a cero, es decir $x\geq7$. Esta restricción proviene exclusivamente de la función externa
  $f$, no de $g$.'
procedimiento:
- 'Paso 1: Identifica el dominio de la función externa $f$.'
- 'Paso 2: Plantea la condición $g(x) \in \text{Dom}(f)$, sustituyendo la fórmula de $g$.'
- 'Paso 3: Resuelve la ecuación o inecuación resultante para obtener la restricción sobre $x$.'
- 'Paso 4: Combina esta restricción con las propias de la función interna.'
ejemplos:
- titulo: Restricción impuesta por una raíz externa
  enunciado: 'Si $g(x)=x+1$ y $f(x)=\sqrt{x}$, determina la restricción que $f$ impone sobre $g(x)$.'
  solucion_pasos:
  - Se exige que $g(x)\geq0$, es decir $x+1\geq0$.
  - '$x\geq-1$.'
- titulo: Restricción impuesta por una fracción externa
  enunciado: 'Si $g(x)=2x$ y $f(x)=\frac{1}{x-6}$, determina la restricción que $f$ impone sobre $g(x)$.'
  solucion_pasos:
  - Se exige que $g(x)\neq6$, es decir $2x\neq6$.
  - '$x\neq3$.'
- titulo: ¿La restricción de la función externa depende de la fórmula de la función interna?
  enunciado: ¿La restricción de la función externa depende de la fórmula de la función interna?
  respuesta: Sí
  solucion_pasos:
  - La condición se traduce sustituyendo la fórmula de $g$ en la restricción del dominio de $f$.
- titulo: ¿Basta con conocer el dominio de $f$ como conjunto abstracto sin sustituir $g(x)$?
  enunciado: ¿Basta con conocer el dominio de $f$ como conjunto abstracto sin sustituir $g(x)$?
  respuesta: 'No'
  solucion_pasos:
  - Se debe sustituir la expresión de $g(x)$ en la restricción de $f$ para obtener una condición concreta sobre
    $x$.
errores_frecuentes:
- Olvidar por completo la restricción impuesta por la función externa, considerando solo la interna.
- Aplicar la restricción de $f$ directamente sobre $x$ en vez de sobre $g(x)$.
- No resolver correctamente la ecuación o inecuación auxiliar generada por la sustitución.
- Confundir esta restricción con la del dominio propio de $g$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
