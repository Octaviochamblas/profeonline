semantic_id: MAT.GEO.ANGULOS_RELACIONES_POSICION.BISECTRIZ_DEFINICION
titulo: Definición de bisectriz de un ángulo
objetivo: 'Reconocer cuándo un rayo interior es bisectriz de un ángulo y comprobar que dividir en dos
  partes no basta: ambas medidas deben ser exactamente iguales.'
introduccion: 'Partir un sándwich ''a ojo'' no asegura dos mitades iguales. Con los ángulos ocurre lo
  mismo: la bisectriz exige igualdad precisa. Este recurso se centra en definición de bisectriz de un
  ángulo y en cómo reconocerlo con un criterio geométrico claro.'
resumen: 'La bisectriz de un ángulo es el rayo que lo divide en dos ángulos de igual medida. Como idea
  de control, dividir en dos partes no basta: ambas medidas deben ser exactamente iguales.'
explicacion: 'La bisectriz de un ángulo es el rayo que lo divide en dos ángulos de igual medida.


  En el caso “si un rayo interior parte el ángulo de 50° en dos aberturas de 25°, ese rayo es su bisectriz”
  esta idea se vuelve visible y permite comprobar que dividir en dos partes no basta: ambas medidas deben
  ser exactamente iguales.'
procedimiento:
- 'Paso 1: Ubica el rayo interior que sale desde el vértice del ángulo.'
- 'Paso 2: Compara las dos medidas que genera ese rayo dentro del ángulo.'
- 'Paso 3: Concluye que es bisectriz solo si ambas aberturas son iguales.'
ejemplos:
- titulo: Aplicación directa — Bisectriz
  enunciado: Si un rayo interior parte el ángulo de 50° en dos aberturas de 25°, ese rayo es su bisectriz.
  solucion_pasos:
  - Ubica el rayo interior que sale desde el vértice del ángulo.
  - Compara las dos medidas que genera ese rayo dentro del ángulo.
  - Concluye que es bisectriz solo si ambas aberturas son iguales.
- titulo: Chequeo del procedimiento — Bisectriz
  enunciado: Al resolver “si un rayo interior parte el ángulo de 50° en dos aberturas de 25°, ese rayo
    es su bisectriz”, una alumna salta desde el dibujo a la conclusión. Indica qué control geométrico
    faltó y cómo cerrar la solución.
  solucion_pasos:
  - 'Parte de la definición: la bisectriz de un ángulo es el rayo que lo divide en dos ángulos de igual
    medida.'
  - Compara las dos medidas que genera ese rayo dentro del ángulo.
  - Concluye que es bisectriz solo si ambas aberturas son iguales.
- titulo: '¿El caso confirma que dividir en dos partes no basta: ambas medidas deben ser exactamente iguales?
    — Bisectriz'
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: la bisectriz de un ángulo es el rayo que lo
    divide en dos ángulos de igual medida.'
  - 'En el caso “si un rayo interior parte el ángulo de 50° en dos aberturas de 25°, ese rayo es su bisectriz”
    se observa que dividir en dos partes no basta: ambas medidas deben ser exactamente iguales.'
  - Concluye que es bisectriz solo si ambas aberturas son iguales.
- titulo: ¿Basta con ubica el rayo interior que sale desde el vértice del ángulo? — Bisectriz
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de definición de bisectriz de un ángulo.
  - Después del paso “Ubica el rayo interior que sale desde el vértice del ángulo.” todavía hace falta
    revisar “Compara las dos medidas que genera ese rayo dentro del ángulo.”.
  - El cierre correcto exige “Concluye que es bisectriz solo si ambas aberturas son iguales.”.
errores_frecuentes:
- Bisectriz significa cualquier rayo interior que salga del vértice, aunque no divida en partes iguales.
- Para resolver bisectriz, basta con el paso “Ubica el rayo interior que sale desde el vértice del ángulo.”
  y no hace falta revisar “Compara las dos medidas que genera ese rayo dentro del ángulo.”.
- 'Si el dibujo parece claro, se puede ignorar que dividir en dos partes no basta: ambas medidas deben
  ser exactamente iguales.'
- Dos configuraciones distintas representan bisectriz solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye que es bisectriz solo si ambas aberturas
  son iguales.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
estado: publicado
