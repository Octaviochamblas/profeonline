semantic_id: MAT.NUM.FRACCIONES_CONCEPTO.NUMERADOR_IDENTIFICACION
objetivo: Comprender identificación del numerador y aplicarlo correctamente en ejercicios
  básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso identificación del numerador ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: El numerador indica cuántas partes del todo se consideran. Además, el numerador
  se escribe sobre la barra de fracción.
explicacion: |-
  El numerador indica cuántas partes del todo se consideran.

  Una idea importante es que el numerador se escribe sobre la barra de fracción.

  Por ejemplo, En \(\frac{5}{7}\), el numerador es 5 y cuenta las partes tomadas.
procedimiento:
- 'Paso 1: Identificar qué representa el número o la fracción en la situación.'
- 'Paso 2: Revisar la definición formal del concepto y sus condiciones.'
- 'Paso 3: Concluir si el ejemplo sí corresponde a identificación del numerador y
  justificarlo.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “En \(\frac{5}{7}\), el numerador es 5
    y cuenta las partes tomadas.” se relaciona con identificación del numerador.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: el numerador indica cuántas partes del todo se consideran.'
  - Concluye que el ejemplo sí ilustra identificación del numerador.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “El numerador se escribe sobre la barra de
    fracción.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con identificación del numerador?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que el numerador se escribe sobre la barra
    de fracción.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar identificación del numerador ignorando la definición o las
    condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar identificación del numerador sin mirar qué representan numerador,
  denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
