semantic_id: MAT.NUM.FRACCIONES_CONCEPTO.NUMERADOR_IDENTIFICACION
objetivo: Identificar e interpretar el numerador.
introduccion: La idea “El numerador se escribe sobre la barra de fracción” cobra sentido
  al analizar el caso “En \(\frac{5}{7}\), el numerador es 5 y cuenta las partes tomadas”.
  Ese vínculo es el foco de identificación del numerador.
resumen: El numerador indica cuántas partes del todo se consideran. Como criterio
  de control, el numerador se escribe sobre la barra de fracción
explicacion: |-
  El numerador indica cuántas partes del todo se consideran.

  Esta formulación se hace concreta en “En \(\frac{5}{7}\), el numerador es 5 y cuenta las partes tomadas”. Allí puede reconocerse que el numerador se escribe sobre la barra de fracción.
procedimiento:
- 'Paso 1: Ubica el número escrito sobre la barra de fracción.'
- 'Paso 2: Relaciona ese número con las partes tomadas o consideradas.'
- 'Paso 3: Comprueba que tu interpretación use como referencia el total indicado por
  el denominador.'
ejemplos:
- titulo: Aplicación razonada — Identificación del numerador
  enunciado: En \(\frac{5}{7}\), el numerador es 5 y cuenta las partes tomadas.
  solucion_pasos:
  - Ubica el número escrito sobre la barra de fracción.
  - Relaciona ese número con las partes tomadas o consideradas.
  - Comprueba que tu interpretación use como referencia el total indicado por el denominador.
- titulo: Revisión de una solución — Identificación del numerador
  enunciado: Una solución aplica “Relaciona ese número con las partes tomadas o consideradas.”,
    pero termina sin comprobar que el numerador se escribe sobre la barra de fracción.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación del numerador: el numerador indica
    cuántas partes del todo se consideran.'
  - Ubica el número escrito sobre la barra de fracción.
  - 'Completa la revisión con este control: Comprueba que tu interpretación use como
    referencia el total indicado por el denominador.'
- titulo: ¿Se cumple que el numerador se escribe sobre la barra de fracción? — Identificación
    del numerador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el numerador indica cuántas partes
    del todo se consideran.
  - El caso “En \(\frac{5}{7}\), el numerador es 5 y cuenta las partes tomadas” satisface
    esa condición.
  - Comprueba que tu interpretación use como referencia el total indicado por el denominador.
- titulo: ¿Es válido omitir el paso “Ubica el número escrito sobre la barra de fracción”?
    — Identificación del numerador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación del numerador.
  - 'Omitirlo puede volver inválida la acción siguiente: Relaciona ese número con
    las partes tomadas o consideradas.'
  - 'La solución debe terminar de este modo: Comprueba que tu interpretación use como
    referencia el total indicado por el denominador.'
errores_frecuentes:
- 'Empezar identificación del numerador sin realizar este control inicial: Ubica el
  número escrito sobre la barra de fracción.'
- Memorizar “En \(\frac{5}{7}\), el numerador es 5 y cuenta las partes tomadas” como
  respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Relaciona ese número con las partes tomadas o consideradas.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación del numerador que contradice
  el criterio “El numerador se escribe sobre la barra de fracción”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que tu interpretación
  use como referencia el total indicado por el denominador.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
