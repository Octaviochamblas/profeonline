semantic_id: MAT.GEO.RECTA_RELACIONES.PARALELISMO
titulo: Aplicación de la igualdad de pendientes en rectas paralelas
objetivo: Aplicar el criterio de que dos rectas son paralelas si y solo si tienen la misma pendiente (y
  distinto coeficiente de posición).
introduccion: Dos rectas nunca se cruzan si mantienen exactamente la misma inclinación; esa es la condición
  algebraica que define el paralelismo entre rectas.
resumen: Dos rectas $y=m_1x+b_1$ y $y=m_2x+b_2$ son paralelas si y solo si $m_1=m_2$ (y $b_1\neq b_2$,
  para que sean rectas distintas).
explicacion: '![Rectas paralelas](/static/img/geometria/analitica/rectarel-paralelismo.svg)


  ### Definición formal


  Dos rectas no verticales son paralelas si y solo si tienen la misma pendiente: $m_1=m_2$. Si además
  $b_1=b_2$, las rectas son coincidentes (la misma recta), no simplemente paralelas.


  ### Desarrollo didáctico


  Las rectas $y=x+1$ e $y=x-2$ tienen la misma pendiente ($m=1$) pero distinto coeficiente de posición,
  por lo que son paralelas y nunca se intersectan.'
procedimiento:
- 'Paso 1: Identifica las pendientes de ambas rectas (convirtiendo a forma principal si es necesario).'
- 'Paso 2: Compara ambas pendientes: si son iguales, las rectas son paralelas o coincidentes.'
- 'Paso 3: Si además los coeficientes de posición son distintos, las rectas son paralelas (no coincidentes).'
ejemplos:
- titulo: Verificar el paralelismo entre y=x+1 e y=x-2
  enunciado: m1=1, m2=1, b1=1, b2=-2.
  solucion_pasos:
  - Como m1=m2=1 y b1≠b2, las rectas son paralelas.
- titulo: Determinar si dos rectas dadas son paralelas
  enunciado: 3x+2y-4=0 y 6x+4y-1=0.
  solucion_pasos:
  - 'Despejando ambas a forma principal: y=-1,5x+2 e y=-1,5x+0,25. Como m1=m2=-1,5 y b1≠b2, son paralelas.'
- titulo: ¿Dos rectas verticales distintas son paralelas?
  respuesta: Sí
  solucion_pasos:
  - Sí, aunque no tengan pendiente numérica definida, comparten la misma dirección vertical.
- titulo: ¿Rectas con la misma pendiente y el mismo coeficiente de posición son solo paralelas?
  respuesta: 'No'
  solucion_pasos:
  - No, en ese caso son la misma recta (coincidentes), no simplemente paralelas.
errores_frecuentes:
- Confundir rectas paralelas con rectas coincidentes (con igual pendiente e igual coeficiente de posición).
- Comparar los coeficientes de posición en vez de las pendientes para determinar paralelismo.
- Olvidar convertir ambas ecuaciones a la misma forma antes de comparar sus pendientes.
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
