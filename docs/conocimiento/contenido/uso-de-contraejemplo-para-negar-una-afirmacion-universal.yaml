semantic_id: MAT.FUND.CUANTIFICADORES.CONTRAEJEMPLO
titulo: Uso de contraejemplo para negar una afirmación universal
objetivo: Utilizar contraejemplos para refutar y demostrar la falsedad de proposiciones cuantificadas
  universalmente.
introduccion: 'Imagina que un amigo afirma con total seguridad: "Todos los números impares son primos".
  Si quieres ganarle la apuesta y demostrar que se equivoca, ¿necesitas revisar los infinitos números
  impares del universo? ¡Para nada! Solo tienes que nombrar el número 9. El 9 es impar, pero no es primo
  (porque se divide por 3). Con este único número has destrozado toda su teoría. En matemáticas, a este
  caso excepcional que demuestra que una afirmación general es falsa se le llama Contraejemplo. ¡Uno solo
  es suficiente para tumbar una verdad universal!'
resumen: Un contraejemplo es un elemento particular del dominio de discurso para el cual un predicado
  $P(x)$ es falso. La existencia de un solo contraejemplo demuestra que la proposición universal $\forall
  x, P(x)$ es falsa.
explicacion: 'En matemáticas y lógica formal, demostrar que una afirmación universal del tipo $\forall
  x \in D, P(x)$ es verdadera requiere una demostración general y abstracta para asegurar que no hay fallos.
  Sin embargo, para demostrar que es **falsa**, el procedimiento es mucho más simple.


  Debido a las leyes de negación de cuantificadores:

  $$\neg(\forall x \in D, P(x)) \equiv \exists x \in D, \neg P(x)$$

  Para refutar la proposición universal, basta con demostrar que existe **al menos un** elemento $c$ en
  el dominio para el cual la propiedad $P(c)$ es falsa.


  A este elemento $c$ se le denomina **contraejemplo**.


  **Requisitos de un contraejemplo válido:**

  Para que un elemento $c$ sea un contraejemplo legítimo de la proposición $\forall x \in D, P(x)$, debe
  satisfacer simultáneamente dos condiciones:

  1. **Pertenecer al dominio**: El elemento $c$ debe ser parte del dominio de discurso ($c \in D$).

  2. **Hacer falso el predicado**: La propiedad evaluada en ese elemento debe resultar falsa ($P(c)$ es
  Falso, o equivalentemente $\neg P(c)$ es Verdadero).


  **Ejemplo clásico:**

  Proposición: ''"Para todo número primo $p$, $p$ es impar".''

  - Dominio: Números primos.

  - Contraejemplo: El número 2. El 2 es primo (pertenece al dominio) pero no es impar (hace falso el predicado).
  Por lo tanto, la proposición es falsa.'
procedimiento:
- 'Paso 1: Identificar la proposición cuantificada universalmente $\forall x \in D, P(x)$ que se desea
  refutar.'
- 'Paso 2: Buscar un elemento candidato $c$ dentro de los límites del dominio de discurso $D$.'
- 'Paso 3: Evaluar la propiedad $P(x)$ utilizando el elemento candidato $c$ para verificar si la condición
  resulta falsa ($P(c) \equiv F$).'
- 'Paso 4: Concluir que la proposición universal es falsa si el elemento cumple con pertenecer al dominio
  y no satisfacer la propiedad.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'Refuta la afirmación: "Para todo número real $x$, $x^2 > x$", proponiendo un contraejemplo
    válido.'
  solucion_pasos:
  - 'Paso a: Analizamos la afirmación. Buscamos un número real $x$ tal que su cuadrado no sea mayor que
    el número original (es decir, $x^2 \leq x$).'
  - 'Paso b: Elegimos el valor $x = 1$. Vemos que pertenece al dominio de los números reales.'
  - 'Paso c: Evaluamos la propiedad para $x = 1$: $1^2 > 1$, lo que da $1 > 1$, siendo una afirmación
    falsa. Por lo tanto, $x = 1$ (o también $x = 0.5$) es un contraejemplo válido que demuestra la falsedad
    de la proposición.'
- titulo: Ejemplo 2
  enunciado: 'Propón un contraejemplo para demostrar la falsedad de la afirmación: "Todos los números
    de dos cifras que terminan en 3 son números primos".'
  solucion_pasos:
  - 'Paso a: Identificamos el dominio: números de dos cifras que terminan en 3 (por ejemplo, 13, 23, 33,
    43, 53, etc.).'
  - 'Paso b: Buscamos un elemento de este conjunto que no sea primo (que tenga más divisores además de
    1 y sí mismo).'
  - 'Paso c: Evaluamos el número 33. Termina en 3, es de dos cifras, y es divisible por 3 y 11 ($33 =
    3 \cdot 11$). Por lo tanto, no es primo. El número 33 es un contraejemplo válido.'
- titulo: ¿El número -3 es un contraejemplo válido para refutar la proposición $\forall x \in \mathbb{N},
    x^2 > 0$?
  respuesta: 'No'
  solucion_pasos:
  - Recordamos las condiciones de un contraejemplo. El elemento propuesto debe pertenecer estrictamente
    al dominio de discurso.
  - En la proposición, el dominio especificado es el de los números naturales $\mathbb{N} = \{1, 2, 3,
    \ldots\}$.
  - Como el número -3 no es un número natural (no pertenece al dominio), no puede usarse como un contraejemplo
    válido, aunque cumpla con no satisfacer la condición.
- titulo: ¿Se necesita encontrar más de un contraejemplo para refutar una proposición universal?
  respuesta: 'No'
  solucion_pasos:
  - El cuantificador universal afirma que la propiedad se cumple para todos los elementos sin excepción.
  - Al encontrar exactamente un elemento que falla, la afirmación universal "todos" deja de ser verdadera
    de forma inmediata.
  - Por tanto, bastará un único contraejemplo para refutarla.
errores_frecuentes:
- Confundir el cuantificador universal $\forall$ (para todo) con el cuantificador existencial $\exists$
  (existe al menos uno), aplicando incorrectamente sus significados lógicos.
- Negar la proposición universal $\forall x, P(x)$ como $\forall x, \neg P(x)$ en vez de la forma correcta
  $\exists x, \neg P(x)$, o negar la proposición existencial como $\exists x, \neg P(x)$ en lugar de la
  universal $\forall x, \neg P(x)$.
- Proponer un contraejemplo que no pertenece al dominio de discurso de la proposición, invalidando la
  demostración de falsedad.
- Proponer un elemento que sí cumple con la propiedad lógicamente, fallando en demostrar que la afirmación
  es falsa.
- Creer erróneamente que se requiere una lista numerosa de contraejemplos para refutar un enunciado universal.
fuente: Lógica Matemática y Teoría de Conjuntos, pág. 72
estado: publicado
