semantic_id: MAT.ALG.EC_CUADR_MODELO.PROBLEMAS_NUMEROS
titulo: Resolución de problemas numéricos que conducen a ecuaciones cuadráticas
objetivo: Plantear y resolver problemas sobre relaciones entre números (consecutivos, cuadrados, productos)
  que conducen a ecuaciones de segundo grado.
introduccion: Muchos acertijos numéricos clásicos ("el cuadrado de un número...", "el producto de dos
  números consecutivos...") esconden, tras la traducción algebraica, una ecuación cuadrática que resolver.
resumen: Los problemas numéricos que involucran cuadrados, productos de números consecutivos o relaciones
  similares se resuelven planteando la relación en una incógnita y normalizando la ecuación resultante
  a la forma general.
explicacion: '### Definición formal


  Un problema numérico se modela definiendo una incógnita $x$ para el número (o el menor de los números,
  si son varios relacionados), traduciendo la relación dada del enunciado en una igualdad algebraica,
  y resolviendo la ecuación de segundo grado resultante.


  ### Desarrollo didáctico


  Para números consecutivos, conviene representar el segundo como $x+1$ (o $x+2$ si son consecutivos pares
  o impares), evitando definir dos incógnitas independientes cuando en realidad están relacionadas.


  "La suma de los cuadrados de dos números consecutivos es 25" se traduce, con $x$ y $x+1$, como $x^2+(x+1)^2=25$,
  que al desarrollar da $2x^2+2x-24=0$.'
procedimiento:
- 'Paso 1: Define una incógnita $x$ para el número (o el primero de varios números relacionados).'
- 'Paso 2: Expresa los demás números en función de $x$, según la relación dada (consecutivos, etc.).'
- 'Paso 3: Traduce la condición del enunciado en una ecuación y normalízala a la forma general.'
- 'Paso 4: Resuelve la ecuación y verifica cuál solución tiene sentido según el enunciado (por ejemplo,
  si se piden números positivos).'
ejemplos:
- titulo: Producto de números consecutivos
  enunciado: El producto de dos números naturales consecutivos es 42. Encuentra ambos números.
  solucion_pasos:
  - 'Con $x$ y $x+1$: $x(x+1)=42$, equivalente a $x^2+x-42=0$.'
  - Resolviendo, $x=6$ o $x=-7$; se descarta la solución negativa por tratarse de naturales.
  - Los números son $6$ y $7$.
- titulo: Suma de cuadrados
  enunciado: La suma de los cuadrados de dos números consecutivos es 61. Encuentra ambos números.
  solucion_pasos:
  - 'Con $x$ y $x+1$: $x^2+(x+1)^2=61$, equivalente a $2x^2+2x-60=0$, o $x^2+x-30=0$.'
  - Resolviendo, $x=5$ o $x=-6$.
  - Si se piden naturales, los números son $5$ y $6$.
- titulo: ¿Todo problema numérico admite dos soluciones válidas simultáneamente?
  enunciado: ¿Todo problema numérico admite dos soluciones válidas simultáneamente?
  respuesta: 'No'
  solucion_pasos:
  - Dependiendo del contexto (por ejemplo, si se piden números naturales o positivos), una de las dos
    soluciones algebraicas puede no tener sentido y debe descartarse.
- titulo: ¿Es necesario representar los números relacionados con una sola incógnita?
  enunciado: ¿Es necesario representar los números relacionados con una sola incógnita?
  respuesta: Sí
  solucion_pasos:
  - Usar una única incógnita para todos los números relacionados reduce el problema a una sola ecuación
    resoluble.
errores_frecuentes:
- Definir dos incógnitas independientes para números que en realidad están relacionados entre sí.
- Olvidar descartar soluciones que no cumplen las condiciones del enunciado (como ser positivas o naturales).
- Cometer errores al desarrollar el cuadrado de un binomio al plantear sumas de cuadrados.
- No verificar la solución final sustituyéndola de vuelta en la condición original del problema.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
