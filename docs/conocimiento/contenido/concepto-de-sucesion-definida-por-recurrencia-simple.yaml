semantic_id: MAT.NUM.SUCESIONES_BASE.SUCESION_RECURSIVA
titulo: Concepto de sucesión definida por recurrencia simple
objetivo: Entender y utilizar el concepto de sucesión definida por recurrencia, donde cada término depende
  del anterior.
introduccion: 'Imagina una cadena de favores: solo puedes hacer un favor si alguien te hizo uno primero.
  En matemáticas, hay fórmulas que te obligan a conocer el número anterior para poder calcular el siguiente.
  Eso es la recurrencia.'
resumen: Una sucesión recursiva se define dando el primer término (ej. $a_1 = 5$) y una regla que conecta
  el término actual ($a_n$) con el término inmediatamente anterior ($a_{n-1}$).
explicacion: "Hasta ahora vimos el **Término General**, que funciona como un teletransportador (pones\
  \ $n=100$ y viajas directo al valor cien). \n\nPero muchas sucesiones se definen de forma **Recursiva**.\
  \ Esta notación funciona como subir escalones: no puedes saltar al escalón 100 sin pisar el 99 antes.\n\
  \nUna definición recursiva SIEMPRE tiene dos partes:\n1. **Una semilla (condición inicial):** Te deben\
  \ decir cómo empieza. Ej: $a_1 = 2$.\n2. **La regla de dependencia:** Una fórmula que usa **$a_{n-1}$**.\
  \ (Recuerda: si '$a_n$' es el término de ahora, '$a_{n-1}$' significa 'el término anterior').\n\nEjemplo:\
  \ $a_1 = 2$,  $a_n = a_{n-1} + 3$\nTraducción al español: 'Empieza en 2. Para calcular cualquier número,\
  \ toma el resultado anterior y súmale 3'.\n- $a_2 = a_1 + 3 = 2 + 3 = 5$\n- $a_3 = a_2 + 3 = 5 + 3 =\
  \ 8$"
procedimiento:
- 'Paso 1: Identifica el valor inicial o semilla ($a_1$).'
- 'Paso 2: Lee la fórmula de recurrencia. Donde veas ''$a_{n-1}$'', reemplázalo por el valor del número
  que calculaste en el paso anterior.'
- 'Paso 3: Repite el ciclo (iteración) hasta llegar a la posición deseada.'
ejemplos:
- titulo: El ciclo sin fin
  enunciado: Si $a_1 = 10$ y la recurrencia es $a_n = a_{n-1} \cdot 2$. Calcula el tercer término ($a_3$).
  solucion_pasos:
  - Empezamos con a1 = 10.
  - 'Calculamos a2 reemplazando el valor de a1: $a_2 = 10 \cdot 2 = 20$.'
  - 'Calculamos a3 reemplazando el valor de a2: $a_3 = 20 \cdot 2 = 40$.'
  - El tercer término es 40.
errores_frecuentes:
- Reemplazar la letra '$n$' por la posición directamente en el lugar de '$a_{n-1}$'. (Ej. pensar que $a_{n-1}$
  vale 4 si estás en la posición 5). ¡$a_{n-1}$ representa el VALOR de la casilla anterior, no la posición!
- Olvidar la condición inicial y no saber de dónde arrancar.
fuente: Currículum Nacional MINEDUC.
estado: publicado
