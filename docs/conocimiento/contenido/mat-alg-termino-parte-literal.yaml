semantic_id: MAT.ALG.TERMINO.PARTE_LITERAL
objetivo: Identificar la parte literal de un término algebraico y reconocer su función
  fundamental como el 'apellido' o especie de la cantidad.
introduccion: Si el coeficiente te dice 'cuántos' tienes, la parte literal te dice
  'qué' tienes. ¿Tienes 5 gatos o tienes 5 manzanas? En el álgebra, el apellido de
  tu número es la parte literal.
resumen: La **Parte Literal** está constituida por las letras que haya en el término
  y sus correspondientes exponentes. Es el bloque alfabético que sigue al coeficiente
  numérico.
explicacion: 'Anatomía de la parte literal:

  - En el término $8xyz$, la parte literal completa es $xyz$.

  - En el término $-2a^2b^3$, la parte literal no son solo las letras sueltas, ¡son
  las letras con sus exponentes pegados! La parte literal es $a^2b^3$.


  La parte literal es sagrada porque funciona como un clasificador de especies. Así
  como en la vida real no puedes sumar 3 perros con 4 gatos para obtener 7 ''perro-gatos'',
  en el álgebra no puedes sumar la parte literal $x$ con la parte literal $x^2$. Son
  de especies distintas. Analizar bien la parte literal es el paso cero antes de intentar
  sumar o restar.'
procedimiento:
- 'Paso 1: Identifica y aísla el coeficiente numérico (el número grande y su signo).'
- 'Paso 2: Todo lo que sobra a la derecha del coeficiente (letras y sus pequeños exponentes)
  es el bloque que compone la parte literal.'
ejemplos:
- titulo: Separando aguas
  enunciado: Extrae la parte literal del término fraccionario 3m^4/5
  solucion_pasos:
  - 'Separamos el coeficiente: La fracción numérica es 3/5.'
  - Todo lo que resta es la letra y su exponente.
  - La parte literal es m^4.
errores_frecuentes:
- Olvidar incluir los exponentes en la parte literal, mencionando solo las letras
  base.
- Pensar que un término puramente numérico (ej. $15$) tiene una parte literal invisible
  igual a $x$. (Su parte literal es $x^0 = 1$, que no altera el número, por ende 'carece'
  funcionalmente de parte literal visible).
fuente: Álgebra de Baldor.
estado: publicado
