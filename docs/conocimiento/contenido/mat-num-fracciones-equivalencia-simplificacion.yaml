semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.SIMPLIFICACION
titulo: Simplificación de fracciones
objetivo: Reducir una fracción dividiendo numerador y denominador por un divisor común.
introduccion: 'La simplificación es el proceso inverso a la amplificación: se busca un divisor común de
  numerador y denominador para escribir la fracción con números más pequeños, sin cambiar su valor.'
resumen: Simplificar una fracción es dividir su numerador y su denominador por un mismo divisor común,
  obteniendo una fracción equivalente con términos menores.
explicacion: '### Definición formal


  Simplificar \(\frac{a}{b}\) por un divisor común \(k\) de \(a\) y \(b\) produce \(\frac{a/k}{b/k}\),
  equivalente a \(\frac{a}{b}\) porque equivale a dividir por \(\frac{k}{k}=1\).


  ### Desarrollo didáctico


  Al simplificar \(\frac{18}{24}\) por 6 (divisor común de 18 y 24): \(18\div6=3\), \(24\div6=4\), resultando
  \(\frac{3}{4}\). El valor no cambió porque se dividió por \(\frac{6}{6}=1\).'
procedimiento:
- 'Paso 1: Busca un divisor común mayor que uno para numerador y denominador.'
- 'Paso 2: Divide ambos términos por exactamente el mismo divisor no nulo.'
- 'Paso 3: Verifica que la nueva fracción sea equivalente a la original.'
ejemplos:
- titulo: Aplicación razonada — Simplificación de fracciones
  enunciado: Al simplificar \(\frac{18}{24}\) por 6 se obtiene \(\frac{3}{4}\).
  solucion_pasos:
  - Busca un divisor común mayor que uno para numerador y denominador.
  - Divide ambos términos por exactamente el mismo divisor no nulo.
  - Verifica que la nueva fracción sea equivalente a la original.
- titulo: Revisión de una solución — Simplificación de fracciones
  enunciado: Una solución aplica “Divide ambos términos por exactamente el mismo divisor no nulo.”, pero
    termina sin comprobar que la simplificación conserva el valor de la fracción y la escribe de forma
    más simple. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define simplificación de fracciones: simplificar una fracción consiste
    en dividir numerador y denominador por un mismo divisor común distinto de cero.'
  - Busca un divisor común mayor que uno para numerador y denominador.
  - 'Completa la revisión con este control: Verifica que la nueva fracción sea equivalente a la original.'
- titulo: ¿Se cumple que la simplificación conserva el valor de la fracción y la escribe de forma más
    simple? — Simplificación de fracciones
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que simplificar una fracción consiste en dividir numerador
    y denominador por un mismo divisor común distinto de cero.
  - El caso “Al simplificar \(\frac{18}{24}\) por 6 se obtiene \(\frac{3}{4}\)” satisface esa condición.
  - Verifica que la nueva fracción sea equivalente a la original.
- titulo: ¿Es válido omitir el paso “Busca un divisor común mayor que uno para numerador y denominador”?
    — Simplificación de fracciones
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de simplificación de fracciones.
  - 'Omitirlo puede volver inválida la acción siguiente: Divide ambos términos por exactamente el mismo
    divisor no nulo.'
  - 'La solución debe terminar de este modo: Verifica que la nueva fracción sea equivalente a la original.'
errores_frecuentes:
- 'Empezar simplificación de fracciones sin realizar este control inicial: Busca un divisor común mayor
  que uno para numerador y denominador.'
- Memorizar “Al simplificar \(\frac{18}{24}\) por 6 se obtiene \(\frac{3}{4}\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Divide ambos términos por exactamente el mismo divisor no nulo.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre simplificación de fracciones que contradice el criterio “La simplificación
  conserva el valor de la fracción y la escribe de forma más simple”.
- 'Cerrar el ejercicio sin esta comprobación específica: Verifica que la nueva fracción sea equivalente
  a la original.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
