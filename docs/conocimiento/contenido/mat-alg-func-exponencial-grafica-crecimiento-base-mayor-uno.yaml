semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.CRECIMIENTO_BASE_MAYOR_UNO
titulo: Análisis del crecimiento exponencial para bases mayores que uno
objetivo: Analizar el comportamiento de crecimiento acelerado que presenta una función exponencial cuando su
  base es mayor que uno.
introduccion: Cuando la base supera a 1, cada incremento unitario en $x$ no suma una cantidad fija, sino que multiplica
  el valor anterior, generando un crecimiento cada vez más rápido.
resumen: Si $b>1$ (y $a>0$), la función exponencial $f(x)=a\cdot b^x$ es **estrictamente creciente**, con un
  crecimiento que se acelera cada vez más a medida que $x$ aumenta.
explicacion: '### Definición formal


  Para $f(x)=a\cdot b^x$ con $a>0$ y $b>1$: si $x_1<x_2$, entonces $f(x_1)<f(x_2)$, es decir, la función es estrictamente
  creciente en todo $\mathbb{R}$. Además, la tasa de crecimiento (el cociente entre valores consecutivos) es
  constante e igual a $b$.


  ### Desarrollo didáctico


  Lo distintivo del crecimiento exponencial es que no es "cada vez más lento" como el crecimiento lineal, sino
  "cada vez más rápido": los incrementos absolutos entre valores consecutivos aumentan constantemente.


  Para $f(x)=2^x$: entre $x=0$ y $x=1$, la función pasa de $1$ a $2$ (aumento de $1$); entre $x=3$ y $x=4$, pasa
  de $8$ a $16$ (aumento de $8$), mostrando que el crecimiento se acelera.'
procedimiento:
- 'Paso 1: Verifica que la base $b$ sea mayor que 1 y que $a$ sea positivo.'
- 'Paso 2: Concluye que la función es estrictamente creciente en todo su dominio.'
- 'Paso 3: Observa que el ritmo de crecimiento se acelera a medida que $x$ aumenta.'
ejemplos:
- titulo: Verificación de crecimiento acelerado
  enunciado: '¿Cómo se comporta $f(x)=3\cdot2^x$ a medida que $x$ aumenta?'
  solucion_pasos:
  - '$b=2>1$ y $a=3>0$.'
  - La función crece de manera acelerada, duplicándose cada vez que $x$ aumenta en 1 unidad.
- titulo: Comparación de tasas de crecimiento
  enunciado: '¿Cuál de $f(x)=2^x$ y $g(x)=5^x$ crece más rápido para $x$ grande?'
  solucion_pasos:
  - Ambas tienen base mayor que 1, por lo que ambas son crecientes.
  - '$g(x)=5^x$ crece más rápido, ya que su base ($5$) es mayor que la de $f(x)$ ($2$).'
- titulo: ¿El crecimiento exponencial con $b>1$ es constante en magnitud absoluta?
  enunciado: ¿El crecimiento exponencial con $b>1$ es constante en magnitud absoluta?
  respuesta: 'No'
  solucion_pasos:
  - El aumento absoluto entre valores consecutivos crece cada vez más, a diferencia del crecimiento lineal.
- titulo: ¿La razón entre dos valores consecutivos de una función exponencial con $b>1$ es siempre la misma?
  enunciado: ¿La razón entre dos valores consecutivos de una función exponencial con $b>1$ es siempre la misma?
  respuesta: Sí
  solucion_pasos:
  - Esa razón constante es precisamente el valor de la base $b$.
errores_frecuentes:
- Confundir el crecimiento exponencial con el crecimiento lineal, asumiendo incrementos constantes.
- No verificar el signo del coeficiente $a$ antes de concluir que la función es creciente.
- Asumir que toda base mayor que 1 produce el mismo ritmo de crecimiento, sin comparar valores específicos.
- Confundir "crecimiento acelerado" con "crecimiento infinito inmediato", ignorando que para $x$ negativo la
  función sigue siendo pequeña y positiva.
