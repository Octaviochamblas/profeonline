semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.ALTERNOS_EXTERNOS_IDENTIFICACION
titulo: Identificación de ángulos alternos externos entre paralelas
objetivo: Identificar un par de ángulos alternos externos en un esquema con paralelas y comprobar que
  la clave es estar en la zona exterior y cambiar de lado respecto de la transversal.
introduccion: Cuando una calle cruza dos avenidas paralelas aparecen muchos ángulos con nombres distintos.
  El truco no es memorizar números, sino mirar dónde queda cada uno respecto de la transversal y de las
  paralelas. Este recurso se centra en identificación de ángulos alternos externos entre paralelas y en
  cómo reconocerlo con un criterio geométrico claro.
resumen: Los ángulos alternos externos se reconocen por su posición relativa respecto de dos paralelas
  y una transversal. Como idea de control, la clave es estar en la zona exterior y cambiar de lado respecto
  de la transversal.
explicacion: 'Los ángulos alternos externos se reconocen por su posición relativa respecto de dos paralelas
  y una transversal.


  La situación “fuera de las paralelas, los ángulos 1 y 7 quedan a lados opuestos de la transversal” muestra
  cómo pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se
  verifica que la clave es estar en la zona exterior y cambiar de lado respecto de la transversal.'
procedimiento:
- 'Paso 1: Ubica primero cuáles son las rectas paralelas y cuál es la transversal.'
- 'Paso 2: Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.'
- 'Paso 3: Concluye si el par corresponde a ángulos alternos externos y descarta relaciones vecinas.'
ejemplos:
- titulo: Aplicación directa — Alternos externos
  enunciado: Fuera de las paralelas, los ángulos 1 y 7 quedan a lados opuestos de la transversal.
  solucion_pasos:
  - Ubica primero cuáles son las rectas paralelas y cuál es la transversal.
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos alternos externos y descarta relaciones vecinas.
- titulo: Revisión del razonamiento — Alternos externos
  enunciado: 'Revisa una solución del caso “fuera de las paralelas, los ángulos 1 y 7 quedan a lados opuestos
    de la transversal”: el resultado parece razonable, pero falta conectar el dibujo con la definición.
    Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: los ángulos alternos externos se reconocen por su posición relativa respecto
    de dos paralelas y una transversal.'
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos alternos externos y descarta relaciones vecinas.
- titulo: ¿La situación respeta la idea clave del recurso? — Alternos externos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: los ángulos alternos externos se reconocen
    por su posición relativa respecto de dos paralelas y una transversal.'
  - En el caso “fuera de las paralelas, los ángulos 1 y 7 quedan a lados opuestos de la transversal” se
    observa que la clave es estar en la zona exterior y cambiar de lado respecto de la transversal.
  - Concluye si el par corresponde a ángulos alternos externos y descarta relaciones vecinas.
- titulo: ¿Se puede omitir el paso intermedio? — Alternos externos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de identificación de ángulos alternos externos
    entre paralelas.
  - Después del paso “Ubica primero cuáles son las rectas paralelas y cuál es la transversal.” todavía
    hace falta revisar “Decide si cada ángulo está en la zona interior o exterior y en qué lado de la
    transversal queda.”.
  - El cierre correcto exige “Concluye si el par corresponde a ángulos alternos externos y descarta relaciones
    vecinas.”.
errores_frecuentes:
- Alternos externos significa cualquier par externo, aunque ambos estén del mismo lado.
- Para resolver alternos externos, basta con el paso “Ubica primero cuáles son las rectas paralelas y
  cuál es la transversal.” y no hace falta revisar “Decide si cada ángulo está en la zona interior o exterior
  y en qué lado de la transversal queda.”.
- Si el dibujo parece claro, se puede ignorar que la clave es estar en la zona exterior y cambiar de lado
  respecto de la transversal.
- Dos configuraciones distintas representan alternos externos solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si el par corresponde a ángulos
  alternos externos y descarta relaciones vecinas.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
