semantic_id: MAT.ALG.FUNCION_AFIN.TRASLACION_VERTICAL
titulo: Interpretación de la función afín como traslación vertical de la función lineal
objetivo: Interpretar la función afín como el resultado de trasladar verticalmente la gráfica de la función lineal
  asociada.
introduccion: 'Toda función afín tiene una "hermana lineal" escondida: si le quitas el coeficiente de posición,
  queda exactamente la función lineal que comparte su misma pendiente.'
resumen: 'La gráfica de la función afín $f(x)=mx+n$ se obtiene **trasladando verticalmente** la gráfica de la función
  lineal $g(x)=mx$ en $n$ unidades: hacia arriba si $n>0$, hacia abajo si $n<0$.'
explicacion: '### Definición formal


  Dadas $f(x)=mx+n$ y $g(x)=mx$, se cumple $f(x) = g(x) + n$ para todo $x$. Geométricamente, esto significa que
  cada punto $(x, g(x))$ de la recta lineal se traslada al punto $(x, g(x)+n)$ para obtener la recta afín, un
  desplazamiento vertical uniforme de magnitud $n$.


  ### Desarrollo didáctico


  Como la pendiente no cambia en esta traslación, ambas rectas ($f$ y $g$) son paralelas: solo cambia su posición
  vertical, nunca su inclinación.


  Si $g(x)=3x$ y $f(x)=3x+7$: cada punto de $g$ se traslada 7 unidades hacia arriba para obtener el punto correspondiente
  de $f$. Por ejemplo, $g(2)=6$ se traslada a $f(2)=13=6+7$.'
procedimiento:
- 'Paso 1: Identifica la función lineal asociada $g(x)=mx$, eliminando el coeficiente de posición.'
- 'Paso 2: Determina el valor de $n$ y su signo.'
- 'Paso 3: Traslada la gráfica de $g$ verticalmente $|n|$ unidades, hacia arriba si $n>0$ o hacia abajo si $n<0$.'
ejemplos:
- titulo: Traslación hacia arriba
  enunciado: Describe la traslación que relaciona $g(x)=4x$ con $f(x)=4x+6$.
  solucion_pasos:
  - Comparten la misma pendiente $m=4$.
  - '$f$ se obtiene trasladando $g$ 6 unidades hacia arriba.'
- titulo: Traslación hacia abajo
  enunciado: Describe la traslación que relaciona $g(x)=-2x$ con $f(x)=-2x-5$.
  solucion_pasos:
  - Comparten la misma pendiente $m=-2$.
  - '$f$ se obtiene trasladando $g$ 5 unidades hacia abajo.'
- titulo: ¿La traslación vertical cambia la pendiente de la recta?
  enunciado: ¿La traslación vertical cambia la pendiente de la recta?
  respuesta: 'No'
  solucion_pasos:
  - La pendiente permanece igual; solo cambia la posición vertical de la recta.
- titulo: ¿Las gráficas de $f(x)=mx+n$ y $g(x)=mx$ son paralelas?
  enunciado: ¿Las gráficas de $f(x)=mx+n$ y $g(x)=mx$ son paralelas?
  respuesta: Sí
  solucion_pasos:
  - Al compartir la misma pendiente $m$, ambas rectas son paralelas entre sí.
errores_frecuentes:
- Confundir traslación vertical con traslación horizontal.
- Creer que la traslación cambia la inclinación de la recta.
- Invertir el sentido del desplazamiento según el signo de $n$.
- Suponer que dos rectas paralelas necesariamente tienen el mismo coeficiente de posición.
