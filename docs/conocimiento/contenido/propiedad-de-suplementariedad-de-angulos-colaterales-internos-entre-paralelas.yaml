semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.COLATERALES_INTERNOS_SUPLEMENTARIOS
titulo: Propiedad de suplementariedad de ángulos colaterales internos entre paralelas
objetivo: Usar la propiedad de los ángulos colaterales internos para justificar una medida y comprobar
  que la propiedad solo puede aplicarse después de verificar que el par elegido realmente es colaterales
  internos.
introduccion: 'En geometría muchas igualdades parecen obvias porque el dibujo ''se ve bien''. Con paralelas
  y transversal conviene ir más lento: primero se nombra bien el par y recién después se transfiere la
  medida. Para resolver situaciones de propiedad de suplementariedad de ángulos colaterales internos entre
  paralelas conviene mirar el dibujo con método, no solo por intuición.'
resumen: Si dos rectas paralelas son cortadas por una transversal, los ángulos colaterales internos suman
  180°. Como idea de control, la propiedad solo puede aplicarse después de verificar que el par elegido
  realmente es colaterales internos.
explicacion: 'Si dos rectas paralelas son cortadas por una transversal, los ángulos colaterales internos
  suman 180°.


  En el caso “si un colateral interno mide 112°, el otro mide 68° para completar 180°” esta idea se vuelve
  visible y permite comprobar que la propiedad solo puede aplicarse después de verificar que el par elegido
  realmente es colaterales internos.'
procedimiento:
- 'Paso 1: Reconoce un par de ángulos colaterales internos en el esquema.'
- 'Paso 2: Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.'
- 'Paso 3: Comprueba que el resultado respete la posición del par y la condición de paralelismo.'
ejemplos:
- titulo: Aplicación directa — Suplementarios colaterales internos
  enunciado: Si un colateral interno mide 112°, el otro mide 68° para completar 180°.
  solucion_pasos:
  - Reconoce un par de ángulos colaterales internos en el esquema.
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: Corrección de una respuesta — Suplementarios colaterales internos
  enunciado: Al resolver “si un colateral interno mide 112°, el otro mide 68° para completar 180°”, una
    alumna salta desde el dibujo a la conclusión. Indica qué control geométrico faltó y cómo cerrar la
    solución.
  solucion_pasos:
  - 'Parte de la definición: si dos rectas paralelas son cortadas por una transversal, los ángulos colaterales
    internos suman 180°.'
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿La situación respeta la idea clave del recurso? — Suplementarios colaterales internos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: si dos rectas paralelas son cortadas por una
    transversal, los ángulos colaterales internos suman 180°.'
  - En el caso “si un colateral interno mide 112°, el otro mide 68° para completar 180°” se observa que
    la propiedad solo puede aplicarse después de verificar que el par elegido realmente es colaterales
    internos.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿Se puede cerrar sin el control final? — Suplementarios colaterales internos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de propiedad de suplementariedad de ángulos
    colaterales internos entre paralelas.
  - Después del paso “Reconoce un par de ángulos colaterales internos en el esquema.” todavía hace falta
    revisar “Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.”.
  - El cierre correcto exige “Comprueba que el resultado respete la posición del par y la condición de
    paralelismo.”.
errores_frecuentes:
- Suplementarios colaterales internos significa tener siempre la misma medida por estar ambos en el interior.
- Para resolver suplementarios colaterales internos, basta con el paso “Reconoce un par de ángulos colaterales
  internos en el esquema.” y no hace falta revisar “Usa la propiedad correspondiente para relacionar la
  medida conocida con la incógnita.”.
- Si el dibujo parece claro, se puede ignorar que la propiedad solo puede aplicarse después de verificar
  que el par elegido realmente es colaterales internos.
- Dos configuraciones distintas representan suplementarios colaterales internos solo porque contienen
  la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que el resultado respete la posición
  del par y la condición de paralelismo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
