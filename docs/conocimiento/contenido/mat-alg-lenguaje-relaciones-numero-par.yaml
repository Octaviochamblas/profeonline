semantic_id: MAT.ALG.LENGUAJE_RELACIONES.NUMERO_PAR
objetivo: Garantizar algebraicamente que una expresión siempre resulte en un número
  par.
introduccion: Si tú escoges el número 3, y te pido que lo vuelvas par sin sumar ni
  restar nada, ¿qué harías? Lo multiplicarías por 2. Esa es la esencia de la paridad
  en álgebra.
resumen: Un **Número Par** se traduce algebraicamente como **$2n$** (o $2x$, $2k$,
  etc.), donde $n$ pertenece a los números enteros.
explicacion: "Cualquier número entero (ya sea par o impar), al ser multiplicado por\
  \ 2, se convierte automáticamente en un número par. \n- Si $n=5$ (impar), $2n =\
  \ 10$ (par).\n- Si $n=8$ (par), $2n = 16$ (par).\nPor esto, $2n$ es el 'candado'\
  \ perfecto para forzar la paridad en cualquier demostración o problema."
procedimiento:
- 'Paso 1: Asigna una variable cualquiera para representar un número entero (ej. n).'
- 'Paso 2: Multiplica esa variable por 2.'
- 'Paso 3: Usa la expresión 2n cada vez que el problema se refiera a ''un número par
  cualquiera''.'
ejemplos:
- titulo: Forzando la paridad
  enunciado: 'Traduce algebraicamente: ''El cuádruple de un número par cualquiera''.'
  solucion_pasos:
  - Un número par cualquiera se escribe como 2n.
  - El cuádruple significa multiplicar por 4.
  - 'Traducción final: 4(2n), que puede reducirse a 8n.'
errores_frecuentes:
- Traducir 'un número par' usando la letra $p$ a secas. La $p$ podría tomar el valor
  3. Solo $2p$ garantiza que sea par.
- Creer que $x/2$ genera un número par. (La división por dos genera mitades, no fuerza
  paridad).
fuente: Álgebra de Baldor.
estado: publicado
