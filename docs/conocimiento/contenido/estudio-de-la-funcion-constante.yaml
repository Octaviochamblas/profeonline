semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.CONSTANTE_DEFINICION
titulo: Estudio de la función constante
objetivo: Reconocer la función constante como aquella cuya imagen no depende del valor de la variable
  independiente.
introduccion: 'Hay funciones donde, sin importar qué número ingreses, siempre obtienes el mismo resultado:
  son las funciones constantes.'
resumen: Una **función constante** es aquella de la forma $f(x) = c$, donde $c$ es un número real fijo;
  asigna el mismo valor $c$ a todo elemento de su dominio.
explicacion: '### Definición formal


  Una función $f: \mathbb{R} \to \mathbb{R}$ se llama constante si existe $c \in \mathbb{R}$ tal que $f(x)
  = c$ para todo $x \in \mathbb{R}$. Su recorrido es el conjunto unitario $\{c\}$, independientemente
  de que su dominio sea todo $\mathbb{R}$.


  ### Desarrollo didáctico


  A diferencia de otras funciones, cambiar el valor de entrada nunca altera el resultado: sea $x=0$, $x=100$
  o $x=-50$, la salida sigue siendo $c$.


  Un ejemplo cotidiano es el precio de entrada fijo a un cine, sin importar la película que se elija:
  $P(\text{película}) = 5000$, siempre el mismo valor.'
procedimiento:
- 'Paso 1: Identifica si la fórmula de la función depende de la variable independiente.'
- 'Paso 2: Si no depende (no aparece $x$ en la fórmula, o su coeficiente es cero), la función es constante.'
- 'Paso 3: El valor constante $c$ es el recorrido completo de la función.'
ejemplos:
- titulo: Identificación de función constante
  enunciado: Determina si $f(x) = 7$ es una función constante.
  solucion_pasos:
  - La fórmula no depende de $x$; siempre entrega 7.
  - Es una función constante con $c=7$.
- titulo: Evaluación de una función constante
  enunciado: Si $f(x) = -4$, calcula $f(10)$ y $f(-3)$.
  solucion_pasos:
  - Independiente del valor sustituido, la función siempre entrega $-4$.
  - $f(10) = -4$ y $f(-3) = -4$.
- titulo: ¿El recorrido de una función constante $f(x)=c$ tiene un solo elemento?
  enunciado: ¿El recorrido de una función constante $f(x)=c$ tiene un solo elemento?
  respuesta: Sí
  solucion_pasos:
  - El único valor alcanzado por la función es $c$, sin importar el valor de $x$.
- titulo: ¿El dominio de una función constante puede ser todo $\mathbb{R}$?
  enunciado: ¿El dominio de una función constante puede ser todo $\mathbb{R}$?
  respuesta: Sí
  solucion_pasos:
  - No hay restricciones algebraicas en $f(x)=c$, por lo que el dominio puede ser todo $\mathbb{R}$.
errores_frecuentes:
- Confundir una función constante con la función identidad, que sí depende de $x$.
- Creer que el dominio de una función constante se reduce al valor $c$.
- Pensar que una función constante no cumple la definición de función por "no cambiar".
- Asumir que $f(x)=0$ no es una función constante válida.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
