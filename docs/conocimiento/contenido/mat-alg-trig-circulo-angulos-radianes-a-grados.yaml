semantic_id: MAT.ALG.TRIG_CIRCULO_ANGULOS.RADIANES_A_GRADOS
titulo: Conversión de radianes a grados
objetivo: Aplicar la fórmula $\text{grados}=\text{radianes}\cdot\dfrac{180}{\pi}$ para convertir ángulos de
  radianes a grados.
introduccion: Así como se puede pasar de grados a radianes, también es posible hacer el camino inverso usando la
  fórmula recíproca.
resumen: Para convertir de radianes a grados, se multiplica el número de radianes por $\dfrac{180}{\pi}$.
explicacion: '### Definición formal


  Dado que $2\pi$ radianes $=360°$, se cumple $1$ radián $=\dfrac{360}{2\pi}=\dfrac{180}{\pi}$ grados. Por lo
  tanto, para convertir un ángulo de $r$ radianes a grados, se calcula $r\cdot\dfrac{180}{\pi}$.


  ### Desarrollo didáctico


  Para convertir $\dfrac{\pi}{6}$ radianes a grados: $\dfrac{\pi}{6}\cdot\dfrac{180}{\pi}=\dfrac{180}{6}=30°$.
  Para convertir $\dfrac{3\pi}{4}$: $\dfrac{3\pi}{4}\cdot\dfrac{180}{\pi}=\dfrac{3\cdot180}{4}=135°$.'
procedimiento:
- 'Paso 1: Identifica la medida del ángulo en radianes.'
- 'Paso 2: Multiplica por $\dfrac{180}{\pi}$, cancelando el símbolo $\pi$ si aparece en la expresión.'
- 'Paso 3: Simplifica el resultado numérico final.'
ejemplos:
- titulo: Conversión de un ángulo notable
  enunciado: 'Convierte $\dfrac{\pi}{3}$ radianes a grados.'
  solucion_pasos:
  - 'Se multiplica: $\dfrac{\pi}{3}\cdot\dfrac{180}{\pi}$.'
  - 'Se simplifica: $60°$.'
- titulo: Conversión de un ángulo mayor a $\pi$
  enunciado: 'Convierte $\dfrac{5\pi}{3}$ radianes a grados.'
  solucion_pasos:
  - 'Se multiplica: $\dfrac{5\pi}{3}\cdot\dfrac{180}{\pi}$.'
  - 'Se simplifica: $300°$.'
- titulo: ¿$\pi$ radianes equivale a $180°$?
  enunciado: ¿La conversión de $\pi$ radianes a grados da como resultado $180°$?
  respuesta: Sí
  solucion_pasos:
  - '$\pi\cdot\dfrac{180}{\pi}=180$.'
- titulo: ¿Se cancela siempre el símbolo $\pi$ al convertir de radianes a grados?
  enunciado: ¿El símbolo $\pi$ se cancela siempre al convertir correctamente de radianes a grados?
  respuesta: Sí
  solucion_pasos:
  - Como la conversión multiplica por $180/\pi$, el $\pi$ del radián se cancela con el del denominador.
errores_frecuentes:
- Multiplicar por $\pi/180$ en vez de $180/\pi$, invirtiendo la fórmula.
- Dejar el símbolo $\pi$ en el resultado final, cuando debería cancelarse.
- Confundir esta conversión con la de grados a radianes.
- Cometer errores aritméticos al simplificar la fracción resultante.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
