semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.TRAPECIO_DEFINICION
titulo: Definición de trapecio como cuadrilátero con un par de lados paralelos
objetivo: 'Comprender la definición de trapecio: un cuadrilátero que tiene exactamente un par de lados
  paralelos.'
introduccion: A diferencia de los paralelogramos (con dos pares de lados paralelos), existe otra familia
  de cuadriláteros que solo cumple esta condición para un único par de lados.
resumen: Un trapecio es un cuadrilátero que tiene exactamente un par de lados opuestos paralelos, llamados
  base mayor y base menor.
explicacion: '![Trapecio: cuadrilátero con un par de lados paralelos](/static/img/geometria/poligonos-cuadrilateros/trapecios-definicion.svg)


  ### Definición formal


  Un cuadrilátero $ABCD$ es un trapecio si $AB\parallel CD$, pero $BC$ no es paralelo a $AD$. Los lados
  paralelos se llaman bases (mayor y menor), y los otros dos lados se llaman lados no paralelos o laterales.


  ### Desarrollo didáctico


  A diferencia del paralelogramo, el trapecio no tiene lados opuestos congruentes en general, ni ángulos
  opuestos congruentes: solo garantiza el paralelismo de un par de lados.'
procedimiento:
- 'Paso 1: Identifica los cuatro lados del cuadrilátero.'
- 'Paso 2: Verifica si exactamente un par de lados opuestos es paralelo (no los dos pares).'
- 'Paso 3: Si se cumple esa condición, el cuadrilátero es un trapecio.'
ejemplos:
- titulo: Identificar un trapecio
  enunciado: Un cuadrilátero ABCD tiene AB paralelo a CD, pero BC no es paralelo a AD.
  solucion_pasos:
  - Es un trapecio, ya que cumple la condición de un solo par de lados paralelos.
- titulo: Distinguir trapecio de paralelogramo
  enunciado: Un cuadrilátero tiene sus dos pares de lados opuestos paralelos.
  solucion_pasos:
  - No es un trapecio (en la definición exclusiva); es un paralelogramo, ya que tiene ambos pares paralelos.
- titulo: ¿Un paralelogramo es un trapecio?
  respuesta: Depende de la definición usada
  solucion_pasos:
  - En la definición exclusiva (usada aquí), no; en la definición inclusiva, sí, ya que cumple 'al menos'
    un par de lados paralelos.
- titulo: ¿Los lados no paralelos de un trapecio tienen un nombre especial?
  respuesta: Sí, se llaman lados laterales
  solucion_pasos:
  - Sí, se llaman lados laterales o simplemente 'lados no paralelos'.
errores_frecuentes:
- Confundir un trapecio con un paralelogramo, sin verificar que solo un par de lados sea paralelo.
- Creer que los lados no paralelos de un trapecio deben ser necesariamente iguales entre sí (eso solo
  ocurre en el trapecio isósceles).
- Asumir que las bases de un trapecio deben tener una relación de tamaño específica, cuando solo se requiere
  que sean paralelas.
fuente: 'Fuente: Moraleja Tomo 2 69, Cid 44.'
estado: publicado
