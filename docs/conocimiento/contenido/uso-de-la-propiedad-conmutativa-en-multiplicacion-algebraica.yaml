semantic_id: MAT.ALG.LEYES_MULTIPLICACION.PROPIEDAD_CONMUTATIVA
titulo: Uso de la propiedad conmutativa en multiplicación algebraica
objetivo: Reconocer y aplicar la propiedad conmutativa de la multiplicación algebraica.
introduccion: '$3 \times 5 = 5 \times 3 = 15$. El orden en que multiplicas no importa. En álgebra, esta
  regla persiste: $3x \cdot 5y = 5y \cdot 3x = 15xy$.'
resumen: 'La **Propiedad Conmutativa** de la multiplicación establece que el orden de los factores no
  altera el producto: $a \cdot b = b \cdot a$. En álgebra, esto permite reorganizar factores para simplificar
  cálculos.'
explicacion: '### Definición formal


  La conmutatividad garantiza que el orden de los factores no altera el producto.


  ### Desarrollo didáctico


  Ejemplo: $(2x)(5y)(3z)$.


  Puedo reordenarlos cómodamente:

  $(2 \cdot 5 \cdot 3)(x \cdot y \cdot z) = 30xyz$.


  Sin commutativity tendría que multiplicar en orden estricto. Con ella, junto todos los números primero
  y luego todas las letras, lo que hace el cálculo más limpio.


  También se usa para reorganizar: si tienes $(-3ab)(+5c)(-2b)$, puedes agrupar: signos → $(-)(+)(-) =
  +$, coeficientes → $3 \times 5 \times 2 = 30$, literales → $ab \cdot c \cdot b = ab^2c$. Resultado:
  $30ab^2c$.'
procedimiento:
- 'Paso 1: Agrupa todos los signos y determina el signo del producto.'
- 'Paso 2: Agrupa todos los coeficientes numéricos y multiplícalos.'
- 'Paso 3: Agrupa todas las variables (por tipo) y aplica la ley de exponentes.'
- 'Paso 4: Combina el signo con el coeficiente numérico y el resultado literal.'
ejemplos:
- titulo: Agrupar para ganar
  enunciado: 'Calcula: (3a)(2b)(4c).'
  solucion_pasos:
  - 'Signos: (+)(+)(+) = +.'
  - 'Coeficientes: 3 × 2 × 4 = 24.'
  - 'Letras: a · b · c = abc.'
  - 'Resultado: 24abc.'
- titulo: Un estudiante calcula la densidad de una aleación como $D = (masa)(volumen)^{-1}$ y escribe
  enunciado: 'Un estudiante calcula la densidad de una aleación como $D = (masa)(volumen)^{-1}$ y escribe
    $(5m)(2v)$. Su compañero lo escribe al revés: $(2v)(5m)$. ¿Quién tiene razón? (v1)


    Opciones: A) Ambos, porque la multiplicación es conmutativa y el orden no altera el resultado ($10mv$).
    · B) Solo el primero, el orden importa en multiplicación. · C) Solo el segundo. · D) Ninguno, deben
    sumarse.'
  solucion_pasos:
  - La propiedad conmutativa garantiza $(5m)(2v) = (2v)(5m) = 10mv$.
  - 'Respuesta: Ambos, porque la multiplicación es conmutativa y el orden no altera el resultado ($10mv$).'
- titulo: 'Respecto de «Uso de la propiedad conmutativa en multiplicación algebraica»: ¿Es correcta est'
  enunciado: 'Respecto de «Uso de la propiedad conmutativa en multiplicación algebraica»: ¿Es correcta
    esta caracterización? «La **Propiedad Conmutativa** de la multiplicación establece que el orden de
    los factores no altera el producto: $a \cdot b = b \cdot a$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Propiedad Conmutativa** de la multiplicación
    establece que el orden de los factores no altera el producto: $a \cdot b = b \cdot a$.'
- titulo: 'Respecto de «Uso de la propiedad conmutativa en multiplicación algebraica»: ¿Es válida esta'
  enunciado: 'Respecto de «Uso de la propiedad conmutativa en multiplicación algebraica»: ¿Es válida esta
    afirmación? «Confundir la propiedad conmutativa con la asociativa (aunque en la práctica se usan juntas)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Propiedad Conmutativa** de la multiplicación
    establece que el orden de los factores no altera el producto: $a \cdot b = b \cdot a$.'
errores_frecuentes:
- Confundir la propiedad conmutativa con la asociativa (aunque en la práctica se usan juntas).
- Al reordenar, olvidar el signo de un factor que se mueve.
- Para «¿Cuál propiedad garantiza que $(4x)(3y) = (3y)(4x)$? (v1)», la respuesta correcta es La propiedad
  asociativa.
- Para «¿Cuál propiedad garantiza que $(4x)(3y) = (3y)(4x)$? (v1)», la respuesta correcta es La propiedad
  distributiva.
- Para «¿Cuál propiedad garantiza que $(4x)(3y) = (3y)(4x)$? (v1)», la respuesta correcta es La identidad
  multiplicativa.
fuente: Álgebra de Baldor.
estado: publicado
