semantic_id: MAT.ALG.INECUACIONES_LINEALES.RESOLUCION_DESPEJE
title: Resolucion Despeje
description: |-
  Estudio detallado sobre resolucion despeje y su aplicación en inecuaciones.
content:
  introduccion: |-
    En álgebra, el estudio de resolucion despeje es fundamental para comprender las desigualdades y sus conjuntos solución. Permite modelar condiciones con márgenes y restricciones reales.
  resumen: |-
    El concepto de resolucion despeje se aplica mediante propiedades de orden de los números reales.
  explicacion: |-
    ### Definición formal
    El concepto de resolucion despeje se enmarca dentro de las inecuaciones. Supongamos una variable $x$ que cumple ciertas condiciones de orden, como $ax + b < c$. Al analizar resolucion despeje, aplicamos transformaciones algebraicas equivalentes.

    ### Desarrollo didáctico
    Para visualizar esto, consideremos la recta numérica. Cuando operamos con desigualdades, debemos prestar atención al signo de los coeficientes, especialmente al multiplicar o dividir por números negativos, lo cual invierte el sentido de la desigualdad.
  pasos:
  - Identificar la estructura de resolucion despeje.
  - |-
    Aplicar las propiedades de las desigualdades (suma, resta, multiplicación, división).
  - |-
    Determinar el conjunto solución y representarlo en la recta numérica o como intervalo.
  ejemplos_resueltos:
  - tipo: abierto
    titulo: Ejemplo básico
    enunciado: |-
      Resuelva una inecuación representativa de resolucion despeje.
    pasos:
    - 'Planteamos la inecuación: $2x - 3 < 5$.'
    - 'Sumamos $3$ a ambos lados: $2x < 8$.'
    - 'Dividimos por $2$: $x < 4$.'
    - El conjunto solución es $(-\infty, 4)$.
  - tipo: abierto
    titulo: Ejemplo avanzado
    enunciado: |-
      Analice el caso con coeficiente negativo en resolucion despeje.
    pasos:
    - 'Planteamos: $-3x + 1 \leq 10$.'
    - 'Restamos $1$: $-3x \leq 9$.'
    - 'Dividimos por $-3$ e invertimos la desigualdad: $x \geq -3$.'
    - El conjunto solución es $[-3, \infty)$.
  - tipo: verdadero_falso
    titulo: Análisis conceptual 1
    afirmacion: |-
      Al multiplicar una inecuación por un número negativo, el sentido de la desigualdad se mantiene.
    respuesta: false
    explicacion: |-
      Por axiomas de orden, al multiplicar por un real negativo, el sentido se invierte.
  - tipo: verdadero_falso
    titulo: Análisis conceptual 2
    afirmacion: |-
      El conjunto solución de una inecuación lineal siempre es un intervalo continuo.
    respuesta: true
    explicacion: |-
      Una inecuación lineal de primer grado siempre resulta en un intervalo de la forma $(-\infty, a)$, $(a, \infty)$, $(-\infty, a]$ o $[a, \infty)$.
  errores_frecuentes:
  - descripcion: |-
      Olvidar invertir el signo de desigualdad al dividir por un número negativo.
  - descripcion: |-
      Confundir intervalos abiertos con cerrados en desigualdades estrictas (<, >).
  - descripcion: |-
      Operar con valor absoluto como si fuera un paréntesis regular sin considerar casos.
  - descripcion: |-
      No comprobar el conjunto solución tomando un valor de prueba.
  - descripcion: |-
      Asumir que un sistema de inecuaciones siempre tiene solución (puede ser vacío).
