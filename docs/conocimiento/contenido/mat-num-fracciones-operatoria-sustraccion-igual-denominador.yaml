semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.SUSTRACCION_IGUAL_DENOMINADOR
titulo: Sustracción de fracciones con igual denominador
objetivo: Restar fracciones que comparten el mismo denominador.
introduccion: Al igual que en la suma, cuando dos fracciones dividen el entero en la misma cantidad de
  partes, restarlas consiste en quitar partes del mismo tamaño.
resumen: Para restar fracciones con igual denominador se restan los numeradores y se conserva el denominador
  común.
explicacion: '### Definición formal


  \(\frac{a}{c}-\frac{b}{c}=\frac{a-b}{c}\), pues ambas fracciones cuentan partes del mismo tamaño \(\frac{1}{c}\),
  y restarlas es restar cuántas partes de ese tamaño se tienen.


  ### Desarrollo didáctico


  \(\frac{6}{9}-\frac{2}{9}\): ambas fracciones cuentan novenos, así que se restan los numeradores, \(6-2=4\),
  y se conserva el denominador: \(\frac{4}{9}\).'
procedimiento:
- 'Paso 1: Verifica que ambas fracciones compartan un denominador no nulo.'
- 'Paso 2: Resta los numeradores en el orden dado y conserva el denominador.'
- 'Paso 3: Simplifica y revisa especialmente el signo del resultado.'
ejemplos:
- titulo: Aplicación razonada — Sustracción de fracciones de igual denominador
  enunciado: \(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\).
  solucion_pasos:
  - Verifica que ambas fracciones compartan un denominador no nulo.
  - Resta los numeradores en el orden dado y conserva el denominador.
  - Simplifica y revisa especialmente el signo del resultado.
- titulo: Revisión de una solución — Sustracción de fracciones de igual denominador
  enunciado: Una solución aplica “Resta los numeradores en el orden dado y conserva el denominador.”,
    pero termina sin comprobar que en una resta con igual denominador solo cambia la cantidad de partes
    tomadas. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define sustracción de fracciones de igual denominador: para restar fracciones
    de igual denominador se restan los numeradores y se conserva el denominador.'
  - Verifica que ambas fracciones compartan un denominador no nulo.
  - 'Completa la revisión con este control: Simplifica y revisa especialmente el signo del resultado.'
- titulo: ¿Se cumple que en una resta con igual denominador solo cambia la cantidad de partes tomadas?
    — Sustracción de fracciones de igual denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para restar fracciones de igual denominador se restan los
    numeradores y se conserva el denominador.
  - El caso “\(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\)” satisface esa condición.
  - Simplifica y revisa especialmente el signo del resultado.
- titulo: ¿Es válido omitir el paso “Verifica que ambas fracciones compartan un denominador no nulo”?
    — Sustracción de fracciones de igual denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de sustracción de fracciones de igual denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Resta los numeradores en el orden dado y conserva
    el denominador.'
  - 'La solución debe terminar de este modo: Simplifica y revisa especialmente el signo del resultado.'
errores_frecuentes:
- 'Empezar sustracción de fracciones de igual denominador sin realizar este control inicial: Verifica
  que ambas fracciones compartan un denominador no nulo.'
- Memorizar “\(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\)” como respuesta aislada, sin reconstruir la definición
  que lo justifica.
- Convertir en receta el paso “Resta los numeradores en el orden dado y conserva el denominador.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre sustracción de fracciones de igual denominador que contradice el
  criterio “En una resta con igual denominador solo cambia la cantidad de partes tomadas”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica y revisa especialmente el signo del
  resultado.'
