semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.SUSTRACCION_IGUAL_DENOMINADOR
objetivo: Restar fracciones con igual denominador.
introduccion: La idea “En una resta con igual denominador solo cambia la cantidad
  de partes tomadas” cobra sentido al analizar el caso “\(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\)”.
  Ese vínculo es el foco de sustracción de fracciones de igual denominador.
resumen: Para restar fracciones de igual denominador se restan los numeradores y se
  conserva el denominador. Como criterio de control, en una resta con igual denominador
  solo cambia la cantidad de partes tomadas
explicacion: |-
  Para restar fracciones de igual denominador se restan los numeradores y se conserva el denominador.

  Esta formulación se hace concreta en “\(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\)”. Allí puede reconocerse que en una resta con igual denominador solo cambia la cantidad de partes tomadas.
procedimiento:
- 'Paso 1: Verifica que ambas fracciones compartan un denominador no nulo.'
- 'Paso 2: Resta los numeradores en el orden dado y conserva el denominador.'
- 'Paso 3: Simplifica y revisa especialmente el signo del resultado.'
ejemplos:
- titulo: Aplicación razonada — Sustracción de fracciones de igual denominador
  enunciado: \(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\).
  solucion_pasos:
  - Verifica que ambas fracciones compartan un denominador no nulo.
  - Resta los numeradores en el orden dado y conserva el denominador.
  - Simplifica y revisa especialmente el signo del resultado.
- titulo: Revisión de una solución — Sustracción de fracciones de igual denominador
  enunciado: Una solución aplica “Resta los numeradores en el orden dado y conserva
    el denominador.”, pero termina sin comprobar que en una resta con igual denominador
    solo cambia la cantidad de partes tomadas. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define sustracción de fracciones de igual denominador:
    para restar fracciones de igual denominador se restan los numeradores y se conserva
    el denominador.'
  - Verifica que ambas fracciones compartan un denominador no nulo.
  - 'Completa la revisión con este control: Simplifica y revisa especialmente el signo
    del resultado.'
- titulo: ¿Se cumple que en una resta con igual denominador solo cambia la cantidad
    de partes tomadas? — Sustracción de fracciones de igual denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para restar fracciones de igual denominador
    se restan los numeradores y se conserva el denominador.
  - El caso “\(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\)” satisface esa condición.
  - Simplifica y revisa especialmente el signo del resultado.
- titulo: ¿Es válido omitir el paso “Verifica que ambas fracciones compartan un denominador
    no nulo”? — Sustracción de fracciones de igual denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de sustracción de fracciones de
    igual denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Resta los numeradores en
    el orden dado y conserva el denominador.'
  - 'La solución debe terminar de este modo: Simplifica y revisa especialmente el
    signo del resultado.'
errores_frecuentes:
- 'Empezar sustracción de fracciones de igual denominador sin realizar este control
  inicial: Verifica que ambas fracciones compartan un denominador no nulo.'
- Memorizar “\(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\)” como respuesta aislada, sin
  reconstruir la definición que lo justifica.
- Convertir en receta el paso “Resta los numeradores en el orden dado y conserva el
  denominador.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre sustracción de fracciones de igual denominador
  que contradice el criterio “En una resta con igual denominador solo cambia la cantidad
  de partes tomadas”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica y revisa especialmente
  el signo del resultado.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
