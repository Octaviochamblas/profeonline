semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.SUSTRACCION_IGUAL_DENOMINADOR
objetivo: Comprender sustracción de fracciones de igual denominador y aplicarlo correctamente
  en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso sustracción de fracciones de igual denominador ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Para restar fracciones de igual denominador se restan los numeradores y se
  conserva el denominador. Además, en una resta con igual denominador solo cambia
  la cantidad de partes tomadas.
explicacion: |-
  Para restar fracciones de igual denominador se restan los numeradores y se conserva el denominador.

  Una idea importante es que en una resta con igual denominador solo cambia la cantidad de partes tomadas.

  Por ejemplo, \(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\).
procedimiento:
- 'Paso 1: Identificar la operación y preparar una representación adecuada de los
  datos.'
- 'Paso 2: Aplicar la regla específica de la operación respetando valor posicional
  o denominadores.'
- 'Paso 3: Simplificar o verificar el resultado final según corresponda.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{6}{9}-\frac{2}{9}=\frac{4}{9}\).”
    se relaciona con sustracción de fracciones de igual denominador.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: para restar fracciones de igual denominador se restan
    los numeradores y se conserva el denominador.'
  - Concluye que el ejemplo sí ilustra sustracción de fracciones de igual denominador.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “En una resta con igual denominador solo cambia
    la cantidad de partes tomadas.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con sustracción de fracciones de igual denominador?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que en una resta con igual denominador solo
    cambia la cantidad de partes tomadas.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar sustracción de fracciones de igual denominador ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar sustracción de fracciones de igual denominador sin mirar qué representan
  numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
