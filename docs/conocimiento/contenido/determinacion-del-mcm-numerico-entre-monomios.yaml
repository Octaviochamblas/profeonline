semantic_id: MAT.ALG.MCM_ALGEBRAICO.COEFICIENTE_MONOMIOS
titulo: Determinación del m.c.m. numérico entre monomios
objetivo: Calcular el Mínimo Común Múltiplo de los coeficientes numéricos en un conjunto de monomios.
introduccion: Para construir el MCM de monomios, empezamos por la fundación numérica. Necesitamos encontrar
  el Mínimo Común Múltiplo tradicional de los números que van por delante.
resumen: El coeficiente numérico del MCM algebraico es el MCM aritmético de los coeficientes de las expresiones
  (el menor número positivo que sea múltiplo de todos ellos).
explicacion: '### Definición formal


  El comportamiento numérico es idéntico a la aritmética escolar.


  ### Desarrollo didáctico


  Al igual que con el MCD, el MCM de los coeficientes numéricos se calcula usando aritmética tradicional.
  Buscamos el número más pequeño que sea múltiplo de todos los coeficientes a la vez.


  Por ejemplo, para los términos $4x$, $6y$ y $8z$:

  - Múltiplos de 4: 4, 8, 12, 16, 20, 24, 28.

  - Múltiplos de 6: 6, 12, 18, 24, 30.

  - Múltiplos de 8: 8, 16, 24, 32.


  El primer número (el menor) en el que las tres listas coinciden es el **24**. Por lo tanto, el MCM de
  los coeficientes es 24.


  Otra forma más rápida es descomponer los números en factores primos ($4 = 2^2$, $6 = 2 \cdot 3$, $8
  = 2^3$) y tomar todos los factores distintos con su mayor exponente ($2^3 \cdot 3 = 8 \cdot 3 = 24$).'
procedimiento:
- 'Paso 1: Extrae los coeficientes numéricos de los monomios, tomando sus valores positivos.'
- 'Paso 2: Descompón cada número en sus factores primos.'
- 'Paso 3: Multiplica todos los factores primos diferentes, eligiendo el de mayor exponente si se repiten.'
- 'Paso 4: El número resultante es el coeficiente del MCM algebraico.'
ejemplos:
- titulo: Halla el coeficiente del MCM de $15a$ y $10b$
  enunciado: Halla el coeficiente del MCM de $15a$ y $10b$.
  solucion_pasos:
  - 'Coeficientes: 15 y 10.'
  - 'Factores: $15 = 3 \times 5$. $10 = 2 \times 5$.'
  - 'MCM: Tomamos todos los primos al mayor exponente: $2^1 \times 3^1 \times 5^1 = 30$.'
  - El coeficiente del MCM es 30.
- titulo: MCM numérico entre $2x$ y $3y$.
  solucion_pasos:
  - '2 y 3 son primos relativos, así que su MCM es su multiplicación: 6.'
- titulo: 'Respecto de «Determinación del m.c.m. numérico entre monomios»: ¿Se ajusta a la definición
    e'
  enunciado: 'Respecto de «Determinación del m.c.m. numérico entre monomios»: ¿Se ajusta a la definición
    esta afirmación? «El coeficiente numérico del MCM algebraico es el MCM aritmético de los coeficientes
    de las expresiones (el menor número positivo que sea múltiplo de todos ellos)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El coeficiente numérico del MCM algebraico es el
    MCM aritmético de los coeficientes de las expresiones (el menor número positivo que sea múltiplo de
    todos ellos).'
- titulo: 'Respecto de «Determinación del m.c.m. numérico entre monomios»: ¿Es compatible con el proced'
  enunciado: 'Respecto de «Determinación del m.c.m. numérico entre monomios»: ¿Es compatible con el procedimiento
    esta afirmación? «Calcular el MCD en lugar del MCM (ej. decir que el MCM de 12 y 18 es 6, en vez de
    36)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El coeficiente numérico del MCM algebraico es el
    MCM aritmético de los coeficientes de las expresiones (el menor número positivo que sea múltiplo de
    todos ellos).'
errores_frecuentes:
- Calcular el MCD en lugar del MCM (ej. decir que el MCM de 12 y 18 es 6, en vez de 36).
- Multiplicar ciegamente todos los números. (Ej. para 6 y 8, decir que el MCM es 48. Funciona matemáticamente,
  pero no es el MÍNIMO, que sería 24).
- El Máximo Común Divisor.
- Se suman los números.
- Para «¿Qué método aritmético se usa para la parte numérica del MCM algebraico», la respuesta correcta
  es Se deja en 1.
