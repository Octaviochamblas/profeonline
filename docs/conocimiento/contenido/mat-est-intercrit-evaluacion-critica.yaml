semantic_id: MAT.EST.INTERPRETACION_CRITICA.EVALUACION_CRITICA
titulo: Evaluar críticamente información estadística presentada en medios de comunicación
objetivo: Evaluar críticamente información estadística presentada en medios de comunicación, considerando
  la fuente, la muestra, la escala y posibles sesgos.
introduccion: Este recurso integra todos los conceptos previos del tema (extracción, errores de escala,
  sesgos visuales, inferencias) en una evaluación crítica completa, cerrando el bloque de Estadística
  Descriptiva.
resumen: La evaluación crítica de información estadística consiste en analizar de forma integral un dato
  o gráfico presentado públicamente, considerando su fuente, metodología, representatividad y posibles
  distorsiones visuales.
explicacion: '![Evaluación crítica de información estadística](/static/img/estadistica/intercrit/intercrit-evaluacion-critica.svg)


  ### Definición formal


  La evaluación crítica integra el análisis de: la fuente y metodología del dato, la representatividad
  de la muestra, la presencia de errores de escala o sesgos visuales, y la validez de las inferencias
  propuestas.


  ### Desarrollo didáctico


  Ante una noticia que afirma ''el 90% de las personas prefiere el producto X'', conviene preguntarse:
  ¿quién realizó el estudio?, ¿qué tamaño y representatividad tuvo la muestra?, ¿el gráfico usado tiene
  errores de escala o sesgos visuales?'
procedimiento:
- 'Paso 1: Identifica la fuente de la información y, si es posible, la metodología usada para obtenerla.'
- 'Paso 2: Evalúa si la muestra (si aplica) parece representativa y libre de sesgos de selección evidentes.'
- 'Paso 3: Revisa el gráfico o dato presentado en busca de errores de escala, sesgos visuales, y evalúa
  si las conclusiones presentadas son inferencias razonables o exageradas.'
ejemplos:
- titulo: Evaluar críticamente una noticia con estadística
  enunciado: Una noticia afirma 'el 90% prefiere el producto X', sin mencionar la fuente ni el tamaño
    de la muestra.
  solucion_pasos:
  - 'Se debe ser cauteloso: sin conocer la fuente, metodología ni tamaño de muestra, no se puede evaluar
    la confiabilidad del dato.'
- titulo: Evaluar críticamente un gráfico publicitario
  enunciado: Un anuncio muestra un gráfico circular en 3D con un eje truncado que exagera el crecimiento
    de ventas.
  solucion_pasos:
  - 'Se identifican dos problemas: sesgo visual (3D) y posible error de escala, que exigen cautela antes
    de aceptar la conclusión presentada.'
- titulo: ¿Es importante conocer la fuente y metodología de un dato antes de aceptarlo como confiable?
  respuesta: Sí
  solucion_pasos:
  - Sí, sin esa información no se puede evaluar adecuadamente la calidad del dato presentado.
- titulo: ¿Se debe aceptar automáticamente cualquier estadística presentada en medios de comunicación?
  respuesta: 'No'
  solucion_pasos:
  - No, es necesario evaluarla críticamente considerando fuente, metodología, escala y posibles sesgos.
errores_frecuentes:
- Aceptar automáticamente una estadística presentada en medios sin cuestionar su fuente o metodología.
- No aplicar los criterios de representatividad, errores de escala y sesgos visuales al evaluar una noticia
  con datos.
- Confundir una opinión bien presentada visualmente con una conclusión estadísticamente válida y bien
  fundamentada.
fuente: Elaboración propia.
estado: publicado
