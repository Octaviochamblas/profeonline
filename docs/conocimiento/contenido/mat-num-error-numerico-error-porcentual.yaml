semantic_id: MAT.NUM.ERROR_NUMERICO.ERROR_PORCENTUAL
objetivo: Expresar el error relativo como porcentaje.
introduccion: La afirmación “Multiplicar el error relativo por 100 permite interpretarlo
  como porcentaje” se puede comprobar en Si el error relativo es 0.03, el error porcentual
  es \(3\%\). Este recurso desarrolla el razonamiento de cálculo del error porcentual
  que conecta ambas ideas.
resumen: El error porcentual es el error relativo expresado en porcentaje. Como criterio
  de control, multiplicar el error relativo por 100 permite interpretarlo como porcentaje
explicacion: |-
  El error porcentual es el error relativo expresado en porcentaje.

  El ejemplo “Si el error relativo es 0.03, el error porcentual es \(3\%\)” lleva la definición a una situación concreta y permite verificar esta consecuencia: Multiplicar el error relativo por 100 permite interpretarlo como porcentaje.
procedimiento:
- 'Paso 1: Obtén el error relativo a partir del valor exacto y el aproximado.'
- 'Paso 2: Multiplica el error relativo por \(100\).'
- 'Paso 3: Añade el símbolo \(\%\) e interpreta el porcentaje respecto del valor exacto.'
ejemplos:
- titulo: Aplicación razonada — Cálculo del error porcentual
  enunciado: Si el error relativo es 0.03, el error porcentual es \(3\%\).
  solucion_pasos:
  - Obtén el error relativo a partir del valor exacto y el aproximado.
  - Multiplica el error relativo por \(100\).
  - Añade el símbolo \(\%\) e interpreta el porcentaje respecto del valor exacto.
- titulo: Revisión de una solución — Cálculo del error porcentual
  enunciado: Una solución aplica “Multiplica el error relativo por \(100\).”, pero
    termina sin comprobar que multiplicar el error relativo por 100 permite interpretarlo
    como porcentaje. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define cálculo del error porcentual: el error porcentual
    es el error relativo expresado en porcentaje.'
  - Obtén el error relativo a partir del valor exacto y el aproximado.
  - 'Completa la revisión con este control: Añade el símbolo \(\%\) e interpreta el
    porcentaje respecto del valor exacto.'
- titulo: ¿Se cumple que multiplicar el error relativo por 100 permite interpretarlo
    como porcentaje? — Cálculo del error porcentual
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el error porcentual es el error relativo
    expresado en porcentaje.
  - El caso “Si el error relativo es 0.03, el error porcentual es \(3\%\)” satisface
    esa condición.
  - Añade el símbolo \(\%\) e interpreta el porcentaje respecto del valor exacto.
- titulo: ¿Es válido omitir el paso “Obtén el error relativo a partir del valor exacto
    y el aproximado”? — Cálculo del error porcentual
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de cálculo del error porcentual.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica el error relativo
    por \(100\).'
  - 'La solución debe terminar de este modo: Añade el símbolo \(\%\) e interpreta
    el porcentaje respecto del valor exacto.'
errores_frecuentes:
- 'Empezar cálculo del error porcentual sin realizar este control inicial: Obtén el
  error relativo a partir del valor exacto y el aproximado.'
- Memorizar “Si el error relativo es 0.03, el error porcentual es \(3\%\)” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Multiplica el error relativo por \(100\).” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre cálculo del error porcentual que contradice
  el criterio “Multiplicar el error relativo por 100 permite interpretarlo como porcentaje”.
- 'Cerrar el ejercicio sin esta comprobación específica: Añade el símbolo \(\%\) e
  interpreta el porcentaje respecto del valor exacto.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
