semantic_id: MAT.NUM.ERROR_NUMERICO.ERROR_PORCENTUAL
objetivo: Comprender cálculo del error porcentual y aplicarlo correctamente en ejercicios
  básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso cálculo del error porcentual ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: El error porcentual es el error relativo expresado en porcentaje. Además,
  multiplicar el error relativo por 100 permite interpretarlo como porcentaje.
explicacion: |-
  El error porcentual es el error relativo expresado en porcentaje.

  Una idea importante es que multiplicar el error relativo por 100 permite interpretarlo como porcentaje.

  Por ejemplo, Si el error relativo es 0.03, el error porcentual es \(3\%\).
procedimiento:
- 'Paso 1: Distinguir el valor exacto del valor aproximado.'
- 'Paso 2: Calcular primero el error absoluto y luego, si se requiere, el relativo
  o porcentual.'
- 'Paso 3: Interpretar el resultado indicando cuán precisa es la aproximación.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Si el error relativo es 0.03, el error
    porcentual es \(3\%\).” se relaciona con cálculo del error porcentual.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: el error porcentual es el error relativo expresado
    en porcentaje.'
  - Concluye que el ejemplo sí ilustra cálculo del error porcentual.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Multiplicar el error relativo por 100 permite
    interpretarlo como porcentaje.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con cálculo del error porcentual?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que multiplicar el error relativo por 100 permite
    interpretarlo como porcentaje.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar cálculo del error porcentual ignorando la definición o las
    condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar cálculo del error porcentual sin mirar qué representan numerador,
  denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
estado: publicado
