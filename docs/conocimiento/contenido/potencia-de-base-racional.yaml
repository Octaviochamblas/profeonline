semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.BASE_RACIONAL
titulo: Potencia de base racional
objetivo: Calcular potencias cuya base es racional.
introduccion: Elevar una fracción no significa multiplicar solo su numerador. La barra agrupa un cociente
  completo y la potencia actúa sobre ambos términos.
resumen: Una fracción elevada a una potencia aplica el exponente a numerador y denominado. El denominador
  debe ser distinto de cero y los paréntesis conservan la base completa.
explicacion: 'Una fracción elevada a una potencia aplica el exponente a numerador y denominado.


  Al analizar “\(\left(-\frac23\right)^3=-\frac8{27}\)” conviene observar la conexión siguiente: el denominador
  debe ser distinto de cero y los paréntesis conservan la base completa'
procedimiento:
- 'Paso 1: Encierra la fracción completa e identifica el signo de la base.'
- 'Paso 2: Eleva por separado numerador y denominador al mismo exponente.'
- 'Paso 3: Simplifica el resultado y comprueba el signo mediante la paridad.'
ejemplos:
- titulo: Aplicación razonada — Potencia de base racional
  enunciado: \(\left(-\frac23\right)^3=-\frac8{27}\).
  solucion_pasos:
  - Encierra la fracción completa e identifica el signo de la base.
  - Eleva por separado numerador y denominador al mismo exponente.
  - Simplifica el resultado y comprueba el signo mediante la paridad.
- titulo: Revisión de una solución — Potencia de base racional
  enunciado: Una solución aplica “Eleva por separado numerador y denominador al mismo exponente.”, pero
    termina sin comprobar que el denominador debe ser distinto de cero y los paréntesis conservan la base
    completa. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define potencia de base racional: una fracción elevada a una potencia aplica
    el exponente a numerador y denominado.'
  - Encierra la fracción completa e identifica el signo de la base.
  - 'Completa la revisión con este control: Simplifica el resultado y comprueba el signo mediante la paridad.'
- titulo: ¿Se cumple que el denominador debe ser distinto de cero y los paréntesis conservan la base completa?
    — Potencia de base racional
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una fracción elevada a una potencia aplica el exponente
    a numerador y denominado.
  - El caso “\(\left(-\frac23\right)^3=-\frac8{27}\)” satisface esa condición.
  - Simplifica el resultado y comprueba el signo mediante la paridad.
- titulo: ¿Es válido omitir el paso “Encierra la fracción completa e identifica el signo de la base”?
    — Potencia de base racional
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de potencia de base racional.
  - 'Omitirlo puede volver inválida la acción siguiente: Eleva por separado numerador y denominador al
    mismo exponente.'
  - 'La solución debe terminar de este modo: Simplifica el resultado y comprueba el signo mediante la
    paridad.'
errores_frecuentes:
- 'Confundir potencia de base racional con otro concepto y omitir este inicio: Encierra la fracción completa
  e identifica el signo de la base.'
- Aplicar mecánicamente “Eleva por separado numerador y denominador al mismo exponente.” sin revisar las
  condiciones de la definición.
- Tomar “\(\left(-\frac23\right)^3=-\frac8{27}\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el denominador debe ser distinto de cero y los paréntesis
  conservan la base completa”.
- 'Terminar el desarrollo sin realizar este control: Simplifica el resultado y comprueba el signo mediante
  la paridad.'
