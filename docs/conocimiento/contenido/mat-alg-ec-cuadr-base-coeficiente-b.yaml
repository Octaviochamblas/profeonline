semantic_id: MAT.ALG.EC_CUADR_BASE.COEFICIENTE_B
titulo: Identificación del coeficiente lineal b
objetivo: Identificar correctamente el coeficiente $b$ (lineal) en una ecuación de segundo grado dada en forma
  general.
introduccion: El coeficiente $b$ es el número que acompaña al término con $x$ elevado a la primera potencia, distinto
  del término cuadrático y del término constante.
resumen: El **coeficiente $b$** de una ecuación de segundo grado $ax^2+bx+c=0$ es el número que multiplica al término
  lineal $x$; a diferencia de $a$, puede valer cero.
explicacion: '### Definición formal


  En la forma general $ax^2+bx+c=0$, el coeficiente $b$ es el número real que multiplica al término de primer
  grado, $x$. A diferencia de $a$, no existe restricción sobre su valor: $b$ puede ser cualquier número real, incluido
  cero.


  ### Desarrollo didáctico


  Para identificar $b$, se localiza el término con $x$ elevado a la primera potencia (sin exponente visible) y
  se lee el número que lo multiplica, respetando su signo. Si ese término no aparece explícitamente, $b=0$.


  En $2x^2-7x+3=0$, el coeficiente $b$ es $-7$. En $5x^2+9=0$, no hay término lineal, por lo que $b=0$.'
procedimiento:
- 'Paso 1: Ordena la ecuación en forma general si aún no lo está.'
- 'Paso 2: Localiza el término con $x$ elevado a la primera potencia.'
- 'Paso 3: Lee el número que lo multiplica, incluyendo su signo; si no aparece ese término, $b=0$.'
ejemplos:
- titulo: Identificación directa del coeficiente b
  enunciado: 'Identifica el coeficiente $b$ en $4x^2+11x-2=0$.'
  solucion_pasos:
  - El término lineal es $11x$.
  - '$b=11$.'
- titulo: Identificación de coeficiente b nulo
  enunciado: 'Identifica el coeficiente $b$ en $6x^2-24=0$.'
  solucion_pasos:
  - No hay término con $x$ a la primera potencia.
  - '$b=0$.'
- titulo: ¿El coeficiente $b$ debe ser distinto de cero para que la ecuación sea cuadrática?
  enunciado: ¿El coeficiente $b$ debe ser distinto de cero para que la ecuación sea cuadrática?
  respuesta: 'No'
  solucion_pasos:
  - Solo se exige que $a$ sea distinto de cero; $b$ puede valer cero sin afectar el carácter cuadrático.
- titulo: ¿El signo del coeficiente $b$ se determina por el signo del término que acompaña?
  enunciado: ¿El signo del coeficiente $b$ se determina por el signo del término que acompaña?
  respuesta: Sí
  solucion_pasos:
  - El signo que precede al término lineal forma parte del coeficiente $b$.
errores_frecuentes:
- Olvidar identificar $b=0$ cuando el término lineal no aparece explícitamente en la ecuación.
- Confundir el coeficiente $b$ con el coeficiente $a$ o con el término independiente $c$.
- Omitir el signo negativo del término lineal al leer el coeficiente $b$.
- No reordenar la ecuación antes de identificar $b$, tomando por error otro término.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
