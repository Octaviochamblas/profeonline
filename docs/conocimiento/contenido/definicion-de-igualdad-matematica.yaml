semantic_id: MAT.ALG.ECUACION_BASE.DEFINICION_IGUALDAD
titulo: Definición de igualdad matemática
objetivo: Comprender la igualdad matemática como una balanza en perfecto equilibrio.
introduccion: 'Antes de correr, hay que caminar. Y antes de resolver ecuaciones, hay que entender qué
  significa el signo más famoso de las matemáticas: el igual ($=$). No es una orden para ''calcular el
  resultado'', es una declaración de equilibrio.'
resumen: Una igualdad matemática es una afirmación que establece que dos expresiones tienen exactamente
  el mismo valor numérico o algebraico.
explicacion: '### Definición formal


  El signo = declara que ambas cantidades, aunque estén escritas de forma distinta, representan la misma
  magnitud o valor.


  ### Desarrollo didáctico


  ¿Qué significa realmente escribir $A = B$?

  Significa que, aunque se vean distintos, lo que está a la izquierda pesa exactamente lo mismo que lo
  que está a la derecha.


  Piensa en una balanza antigua de dos platillos. Si tienes 5 kilos de plomo a la izquierda y 5 kilos
  de plumas a la derecha, la balanza no se mueve. Visualmente son diferentes, pero en ''valor'' son idénticos.


  Existen dos tipos de igualdades básicas:

  1. **Igualdades Numéricas:** Tienen solo números. Ej: $3 + 2 = 5$. Esto es siempre verdadero.

  2. **Igualdades Algebraicas:** Tienen letras (variables). Ej: $x + 2 = 5$. Esta igualdad depende del
  valor que tome la $x$ para ser verdadera o falsa.


  El signo $=$ actúa como el pivote central de esta balanza. Todo lo que hagas a un lado, deberás hacerlo
  al otro para mantener ese delicado equilibrio.'
procedimiento:
- 'Paso 1: Identifica el signo $=$ como el centro de la expresión.'
- 'Paso 2: Reconoce todo lo que está a la izquierda como la ''expresión izquierda'' (peso izquierdo).'
- 'Paso 3: Reconoce todo lo que está a la derecha como la ''expresión derecha'' (peso derecho).'
- 'Paso 4: Entiende que ambas expresiones representan la misma cantidad total.'
ejemplos:
- titulo: La expresión $4 \cdot 2 = 10 - 2$ es una igualdad verdadera
  enunciado: ¿La expresión $4 \cdot 2 = 10 - 2$ es una igualdad verdadera?
  solucion_pasos:
  - 'Lado izquierdo: $4 \cdot 2 = 8$.'
  - 'Lado derecho: $10 - 2 = 8$.'
  - Ambos lados valen 8. Por lo tanto, $8 = 8$, la igualdad es verdadera y está en equilibrio.
- titulo: Toda expresión matemática que contenga números y letras es automáticamente una igualdad
  enunciado: Toda expresión matemática que contenga números y letras es automáticamente una igualdad.
  solucion_pasos:
  - Si no tiene el signo '=', es solo una expresión (un polinomio o monomio), no una igualdad.
  - 'Respuesta: Falso'
- titulo: 'Respecto de «Definición de igualdad matemática»: ¿Se ajusta a la definición esta afirmación?'
  enunciado: 'Respecto de «Definición de igualdad matemática»: ¿Se ajusta a la definición esta afirmación?
    «Una igualdad matemática es una afirmación que establece que dos expresiones tienen exactamente el
    mismo valor numérico o algebraico»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una igualdad matemática es una afirmación que establece
    que dos expresiones tienen exactamente el mismo valor numérico o algebraico.'
- titulo: 'Respecto de «Definición de igualdad matemática»: ¿Es compatible con el procedimiento esta af'
  enunciado: 'Respecto de «Definición de igualdad matemática»: ¿Es compatible con el procedimiento esta
    afirmación? «Creer que el signo = significa ''aquí va la respuesta''»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una igualdad matemática es una afirmación que establece
    que dos expresiones tienen exactamente el mismo valor numérico o algebraico.'
errores_frecuentes:
- Creer que el signo = significa 'aquí va la respuesta'.
- Confundir una expresión algebraica simple (ej. $2x+3$) con una igualdad (ej. $2x+3=0$).
- Se debe calcular la operación de la izquierda para poner el resultado a la derecha.
- Para «En matemáticas, el signo de igualdad ($=$) indica que:», la respuesta correcta es El lado izquierdo
  es mayor que el derecho.
- Las expresiones son idénticas en su forma escrita.
