semantic_id: MAT.EST.BINOMIAL_ANALISIS.VARIANZA
titulo: Calcular la varianza de una distribución binomial
objetivo: Calcular la varianza de una variable binomial, que mide la dispersión de los valores de X respecto
  de su esperanza.
introduccion: La varianza cuantifica qué tan alejados, en promedio, están los posibles resultados respecto
  del valor esperado; es un paso previo necesario para calcular la desviación estándar.
resumen: La varianza de una variable $X\sim B(n,p)$ es $\text{Var}(X)=n\times p\times q$, donde $q=1-p$.
explicacion: '![Varianza de una distribución binomial](/static/img/probabilidad/binoman/binoman-varianza.svg)


  ### Definición formal


  $\text{Var}(X)=n\times p\times q$, producto del número de ensayos por la probabilidad de éxito y la
  de fracaso.


  ### Desarrollo didáctico


  Si $X\sim B(20;\,0{,}5)$: $q=0{,}5$, entonces $\text{Var}(X)=20\times0{,}5\times0{,}5=5$.'
procedimiento:
- 'Paso 1: Identifica los valores de n, p y calcula q=1-p.'
- 'Paso 2: Multiplica n×p×q para obtener la varianza.'
- 'Paso 3: Recuerda que este valor es necesario para calcular después la desviación estándar (su raíz
  cuadrada).'
ejemplos:
- titulo: Calcular la varianza con n=20, p=0,5
  enunciado: X~B(20; 0,5).
  solucion_pasos:
  - q=0,5. Var(X)=20×0,5×0,5=5.
- titulo: Calcular la varianza con n=50, p=0,04
  enunciado: X~B(50; 0,04).
  solucion_pasos:
  - q=0,96. Var(X)=50×0,04×0,96=1,92.
- titulo: ¿La varianza depende tanto de p como de q?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el producto n×p×q, involucrando ambos valores.
- titulo: ¿La varianza puede ser un número negativo?
  respuesta: 'No'
  solucion_pasos:
  - No, ya que n, p y q son todos valores no negativos, su producto tampoco puede ser negativo.
errores_frecuentes:
- Olvidar calcular q=1-p antes de aplicar la fórmula de varianza.
- Confundir la fórmula de varianza (n×p×q) con la de esperanza (n×p).
- Pensar que la varianza puede calcularse sin conocer tanto p como q.
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
