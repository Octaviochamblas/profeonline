semantic_id: MAT.EST.PROBABILIDAD_TOTAL.PARTICION_ESPACIO
titulo: Concepto de partición del espacio muestral en eventos exhaustivos y excluyentes
objetivo: Definir una partición del espacio muestral como una colección de eventos que son mutuamente
  excluyentes entre sí y que, en conjunto, cubren todo el espacio muestral.
introduccion: Muchas situaciones reales se pueden dividir en categorías que no se superponen (excluyentes)
  y que cubren todos los casos posibles (exhaustivas), formando una partición útil para el análisis.
resumen: Una partición del espacio muestral $S$ es una colección de eventos $B_1, B_2, \ldots, B_n$ tales
  que son mutuamente excluyentes entre sí ($B_i\cap B_j=\emptyset$ para $i\neq j$) y su unión es igual
  a todo el espacio muestral ($B_1\cup B_2\cup\cdots\cup B_n=S$).
explicacion: '![Partición del espacio muestral](/static/img/probabilidad/ptotal/ptotal-particion-espacio.svg)


  ### Definición formal


  Los eventos $B_1,\ldots,B_n$ forman una partición de $S$ si cumplen simultáneamente: (1) son mutuamente
  excluyentes entre sí, y (2) su unión es igual a $S$ (son exhaustivos).


  ### Desarrollo didáctico


  En una fábrica con tres máquinas (A, B y C) que producen toda la producción entre ellas, sin superposición
  (ninguna pieza proviene de dos máquinas a la vez), los eventos ''proviene de A'', ''proviene de B''
  y ''proviene de C'' forman una partición del espacio muestral de todas las piezas.'
procedimiento:
- 'Paso 1: Identifica todos los eventos propuestos como posible partición.'
- 'Paso 2: Verifica que sean mutuamente excluyentes entre sí (ningún elemento pertenece a dos de ellos
  simultáneamente).'
- 'Paso 3: Verifica que su unión cubra todo el espacio muestral (sean exhaustivos, sin dejar casos fuera).'
ejemplos:
- titulo: Verificar una partición con tres máquinas
  enunciado: Máquinas A, B y C producen toda la producción de una fábrica, sin superposición.
  solucion_pasos:
  - Como ninguna pieza proviene de dos máquinas a la vez (excluyentes) y todas las piezas provienen de
    alguna de las tres (exhaustivas), forman una partición del espacio muestral.
- titulo: Reconocer una colección que NO es partición
  enunciado: Eventos 'mayor que 3' y 'par' al lanzar un dado.
  solucion_pasos:
  - No son mutuamente excluyentes (comparten los elementos 4 y 6), por lo que no forman una partición
    válida.
- titulo: ¿Una partición debe cubrir todos los elementos del espacio muestral?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición de exhaustividad.
- titulo: ¿Los eventos de una partición pueden compartir elementos entre sí?
  respuesta: 'No'
  solucion_pasos:
  - No, deben ser mutuamente excluyentes, sin ningún elemento compartido.
errores_frecuentes:
- Proponer una partición cuyos eventos se superponen (no son mutuamente excluyentes).
- Olvidar verificar que la unión de los eventos cubra todo el espacio muestral (exhaustividad).
- Confundir una partición cualquiera de eventos con una simple lista de categorías sin verificar sus condiciones
  formales.
fuente: Elaboración propia.
estado: publicado
