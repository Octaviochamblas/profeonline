semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.ADICION_DISTINTO_DENOMINADOR
titulo: Adición de fracciones con distinto denominador
objetivo: Sumar fracciones que no comparten el mismo denominador.
introduccion: Cuando los denominadores son distintos, las fracciones representan partes de distinto tamaño
  y no pueden sumarse directamente; primero deben amplificarse a un denominador común.
resumen: Para sumar fracciones con distinto denominador se amplifican ambas a un denominador común y luego
  se suman los numeradores resultantes.
explicacion: '### Definición formal


  \(\frac{a}{b}+\frac{c}{d}=\frac{a\cdot d+b\cdot c}{b\cdot d}\), lo que equivale a amplificar cada fracción
  al denominador común \(b\cdot d\) antes de sumar los numeradores.


  ### Desarrollo didáctico


  \(\frac{1}{2}+\frac{1}{3}\): se amplifica \(\frac{1}{2}\) a sextos, \(\frac{3}{6}\), y \(\frac{1}{3}\)
  a sextos, \(\frac{2}{6}\); luego se suman los numeradores, \(3+2=5\), obteniendo \(\frac{5}{6}\).'
procedimiento:
- 'Paso 1: Calcula un denominador común, preferentemente el mínimo común múltiplo.'
- 'Paso 2: Amplifica cada fracción y suma los numeradores equivalentes.'
- 'Paso 3: Simplifica el resultado y comprueba la suma mediante una estimación.'
ejemplos:
- titulo: Aplicación razonada — Adición de fracciones de distinto denominador
  enunciado: \(\frac{1}{2}+\frac{1}{3}=\frac{3}{6}+\frac{2}{6}=\frac{5}{6}\).
  solucion_pasos:
  - Calcula un denominador común, preferentemente el mínimo común múltiplo.
  - Amplifica cada fracción y suma los numeradores equivalentes.
  - Simplifica el resultado y comprueba la suma mediante una estimación.
- titulo: Revisión de una solución — Adición de fracciones de distinto denominador
  enunciado: Una solución aplica “Amplifica cada fracción y suma los numeradores equivalentes.”, pero
    termina sin comprobar que no se pueden sumar directamente los denominadores. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define adición de fracciones de distinto denominador: para sumar fracciones
    de distinto denominador primero se buscan fracciones equivalentes con denominador común.'
  - Calcula un denominador común, preferentemente el mínimo común múltiplo.
  - 'Completa la revisión con este control: Simplifica el resultado y comprueba la suma mediante una estimación.'
- titulo: ¿Se cumple que no se pueden sumar directamente los denominadores? — Adición de fracciones de
    distinto denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para sumar fracciones de distinto denominador primero se
    buscan fracciones equivalentes con denominador común.
  - El caso “\(\frac{1}{2}+\frac{1}{3}=\frac{3}{6}+\frac{2}{6}=\frac{5}{6}\)” satisface esa condición.
  - Simplifica el resultado y comprueba la suma mediante una estimación.
- titulo: ¿Es válido omitir el paso “Calcula un denominador común, preferentemente el mínimo común múltiplo”?
    — Adición de fracciones de distinto denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de adición de fracciones de distinto denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Amplifica cada fracción y suma los numeradores
    equivalentes.'
  - 'La solución debe terminar de este modo: Simplifica el resultado y comprueba la suma mediante una
    estimación.'
errores_frecuentes:
- 'Empezar adición de fracciones de distinto denominador sin realizar este control inicial: Calcula un
  denominador común, preferentemente el mínimo común múltiplo.'
- Memorizar “\(\frac{1}{2}+\frac{1}{3}=\frac{3}{6}+\frac{2}{6}=\frac{5}{6}\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Amplifica cada fracción y suma los numeradores equivalentes.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre adición de fracciones de distinto denominador que contradice el
  criterio “No se pueden sumar directamente los denominadores”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica el resultado y comprueba la suma mediante
  una estimación.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
