semantic_id: MAT.GEO.ISOMETRIA_TRASLACION.DETERMINACION_VECTOR
titulo: Determinación del vector traslación a partir de una imagen y su preimagen
objetivo: Determinar el vector traslación que relaciona una figura (o punto) con su imagen, restando las
  coordenadas de un punto y su correspondiente imagen.
introduccion: Si conoces un punto antes y después de moverse, puedes 'deducir' exactamente cuál fue el
  vector de movimiento que se aplicó.
resumen: Dado un punto $P(x,y)$ (preimagen) y su imagen $P'(x',y')$ tras una traslación, el vector traslación
  se determina como $\vec{v}=(x'-x,\,y'-y)$.
explicacion: '![Determinación del vector traslación](/static/img/geometria/isometrias/determinacion-vector-traslacion.svg)


  ### Definición formal


  Si $P(x,y)$ es un punto de la preimagen y $P''(x'',y'')$ es su correspondiente en la imagen, el vector
  traslación es $\vec{v}=P''-P=(x''-x,\,y''-y)$. Basta con conocer un único par de puntos correspondientes
  para determinar el vector completo.


  ### Desarrollo didáctico


  En la figura, dado $P(-4,-2)$ y su imagen $P''(2,3)$, el vector traslación es $\vec{v}=(2-(-4),\,3-(-2))=(6,5)$.'
procedimiento:
- 'Paso 1: Identifica un punto de la preimagen P(x,y) y su correspondiente en la imagen P''(x'',y'').'
- 'Paso 2: Resta las coordenadas: x''-x para la componente horizontal, y''-y para la componente vertical.'
- 'Paso 3: El vector traslación es v=(x''-x, y''-y); verifica aplicándolo a otro par de puntos correspondientes
  si están disponibles.'
ejemplos:
- titulo: Determinar el vector traslación a partir de un punto y su imagen
  enunciado: P(-4,-2) se transforma en P'(2,3).
  solucion_pasos:
  - v=(2-(-4), 3-(-2))=(6,5).
- titulo: Verificar el vector con un segundo par de puntos
  enunciado: Otro punto Q(1,4) se transforma en Q'(7,9) bajo la misma traslación.
  solucion_pasos:
  - 'El vector debe coincidir: (7-1, 9-4)=(6,5), igual al calculado con P y P'', confirmando que es la
    misma traslación.'
- titulo: ¿Basta con un solo par de puntos correspondientes para determinar el vector?
  respuesta: Sí
  solucion_pasos:
  - Sí, un único par (preimagen, imagen) es suficiente para determinar completamente el vector traslación.
- titulo: ¿El orden de la resta importa al determinar el vector?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre se debe restar imagen menos preimagen (P' menos P), no al revés.
errores_frecuentes:
- Restar preimagen menos imagen, en vez de imagen menos preimagen, obteniendo el vector opuesto por error.
- Confundir las coordenadas de la preimagen con las de la imagen al hacer la resta.
- Necesitar más de un par de puntos cuando en realidad uno solo ya determina completamente el vector.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 126).'
estado: publicado
