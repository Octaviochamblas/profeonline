semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.DISTRIBUTIVA_SUMA
titulo: Propiedad distributiva de la multiplicación respecto de la suma
objetivo: Aplicar la propiedad distributiva para expandir el producto de un racional por una suma.
introduccion: 'Multiplicar un racional por una suma de racionales se puede hacer de dos formas equivalentes:
  sumar primero y multiplicar después, o multiplicar cada sumando por separado y luego sumar los resultados.'
resumen: Para todo \(p,q,r\in\mathbb{Q}\), se cumple \(p(q+r)=pq+pr\).
explicacion: '### Definición formal


  La propiedad distributiva conecta la multiplicación con la adición: \(p\cdot(q+r)=p\cdot q+p\cdot r\)
  para cualquier terna de racionales \(p,q,r\). Se demuestra usando la definición de suma y producto de
  fracciones junto con la distributividad de los enteros.


  ### Desarrollo didáctico


  \(\frac{2}{3}\left(\frac{1}{4}+\frac{5}{4}\right)=\frac{2}{3}\cdot\frac{6}{4}=\frac{2}{3}\cdot\frac{3}{2}=1\).
  Por el otro camino: \(\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}=\frac{2}{12}+\frac{10}{12}=\frac{12}{12}=1\).
  Ambos caminos coinciden.'
procedimiento:
- 'Paso 1: Identifica el factor exterior y los dos sumandos interiores.'
- 'Paso 2: Multiplica el factor por cada sumando y conserva el signo más.'
- 'Paso 3: Compara \(a(b+c)\) con \(ab+ac\) mediante el cálculo de ambos lados.'
ejemplos:
- titulo: Aplicación razonada — Propiedad distributiva del producto respecto de la suma
  enunciado: \(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\).
  solucion_pasos:
  - Identifica el factor exterior y los dos sumandos interiores.
  - Multiplica el factor por cada sumando y conserva el signo más.
  - Compara \(a(b+c)\) con \(ab+ac\) mediante el cálculo de ambos lados.
- titulo: Revisión de una solución — Propiedad distributiva del producto respecto de la suma
  enunciado: Una solución aplica “Multiplica el factor por cada sumando y conserva el signo más.”, pero
    termina sin comprobar que multiplicar una suma puede hacerse repartiendo el factor común. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define propiedad distributiva del producto respecto de la suma: la distributiva
    respecto de la suma permite multiplicar un factor común por cada sumando.'
  - Identifica el factor exterior y los dos sumandos interiores.
  - 'Completa la revisión con este control: Compara \(a(b+c)\) con \(ab+ac\) mediante el cálculo de ambos
    lados.'
- titulo: ¿Se cumple que multiplicar una suma puede hacerse repartiendo el factor común? — Propiedad distributiva
    del producto respecto de la suma
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la distributiva respecto de la suma permite multiplicar
    un factor común por cada sumando.
  - El caso “\(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\)”
    satisface esa condición.
  - Compara \(a(b+c)\) con \(ab+ac\) mediante el cálculo de ambos lados.
- titulo: ¿Es válido omitir el paso “Identifica el factor exterior y los dos sumandos interiores”? — Propiedad
    distributiva del producto respecto de la suma
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de propiedad distributiva del producto respecto de
    la suma.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica el factor por cada sumando y conserva
    el signo más.'
  - 'La solución debe terminar de este modo: Compara \(a(b+c)\) con \(ab+ac\) mediante el cálculo de ambos
    lados.'
errores_frecuentes:
- 'Empezar propiedad distributiva del producto respecto de la suma sin realizar este control inicial:
  Identifica el factor exterior y los dos sumandos interiores.'
- Memorizar “\(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Multiplica el factor por cada sumando y conserva el signo más.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre propiedad distributiva del producto respecto de la suma que contradice
  el criterio “Multiplicar una suma puede hacerse repartiendo el factor común”.
- 'Cerrar el ejercicio sin esta comprobación específica: Compara \(a(b+c)\) con \(ab+ac\) mediante el
  cálculo de ambos lados.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
estado: publicado
