semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.DISTRIBUTIVA_SUMA
objetivo: Comprender propiedad distributiva del producto respecto de la suma y aplicarlo
  correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso propiedad distributiva del producto respecto de la suma ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: La distributiva respecto de la suma permite multiplicar un factor común por
  cada sumando. Además, multiplicar una suma puede hacerse repartiendo el factor común.
explicacion: |-
  La distributiva respecto de la suma permite multiplicar un factor común por cada sumando.

  Una idea importante es que multiplicar una suma puede hacerse repartiendo el factor común.

  Por ejemplo, \(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\).
procedimiento:
- 'Paso 1: Escribir ambos lados de la propiedad con números racionales simples.'
- 'Paso 2: Calcular cada lado por separado respetando el orden de las operaciones.'
- 'Paso 3: Comparar los resultados y concluir si la propiedad se cumple.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\).”
    se relaciona con propiedad distributiva del producto respecto de la suma.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: la distributiva respecto de la suma permite multiplicar
    un factor común por cada sumando.'
  - Concluye que el ejemplo sí ilustra propiedad distributiva del producto respecto
    de la suma.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Multiplicar una suma puede hacerse repartiendo
    el factor común.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con propiedad distributiva del producto
    respecto de la suma?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que multiplicar una suma puede hacerse repartiendo
    el factor común.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar propiedad distributiva del producto respecto de la suma ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar propiedad distributiva del producto respecto de la suma sin mirar
  qué representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
