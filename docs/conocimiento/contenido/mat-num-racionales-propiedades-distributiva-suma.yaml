semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.DISTRIBUTIVA_SUMA
objetivo: Distribuir un factor sobre una suma.
introduccion: 'Observa este caso: \(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\).
  Para explicar por qué funciona estudiaremos propiedad distributiva del producto
  respecto de la suma. Al finalizar podrás distribuir un factor sobre una suma.'
resumen: La distributiva respecto de la suma permite multiplicar un factor común por
  cada sumando. Como criterio de control, multiplicar una suma puede hacerse repartiendo
  el factor común
explicacion: |-
  La distributiva respecto de la suma permite multiplicar un factor común por cada sumando.

  Para analizar “\(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\)” se identifican los datos, se aplica la definición y se controla el resultado mediante la idea “Multiplicar una suma puede hacerse repartiendo el factor común”.
procedimiento:
- 'Paso 1: Identifica el factor exterior y los dos sumandos interiores.'
- 'Paso 2: Multiplica el factor por cada sumando y conserva el signo más.'
- 'Paso 3: Compara \(a(b+c)\) con \(ab+ac\) mediante el cálculo de ambos lados.'
ejemplos:
- titulo: Aplicación razonada — Propiedad distributiva del producto respecto de la
    suma
  enunciado: \(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\).
  solucion_pasos:
  - Identifica el factor exterior y los dos sumandos interiores.
  - Multiplica el factor por cada sumando y conserva el signo más.
  - Compara \(a(b+c)\) con \(ab+ac\) mediante el cálculo de ambos lados.
- titulo: Revisión de una solución — Propiedad distributiva del producto respecto
    de la suma
  enunciado: Una solución aplica “Multiplica el factor por cada sumando y conserva
    el signo más.”, pero termina sin comprobar que multiplicar una suma puede hacerse
    repartiendo el factor común. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define propiedad distributiva del producto respecto
    de la suma: la distributiva respecto de la suma permite multiplicar un factor
    común por cada sumando.'
  - Identifica el factor exterior y los dos sumandos interiores.
  - 'Completa la revisión con este control: Compara \(a(b+c)\) con \(ab+ac\) mediante
    el cálculo de ambos lados.'
- titulo: ¿Se cumple que multiplicar una suma puede hacerse repartiendo el factor
    común? — Propiedad distributiva del producto respecto de la suma
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la distributiva respecto de la suma
    permite multiplicar un factor común por cada sumando.
  - El caso “\(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\)”
    satisface esa condición.
  - Compara \(a(b+c)\) con \(ab+ac\) mediante el cálculo de ambos lados.
- titulo: ¿Es válido omitir el paso “Identifica el factor exterior y los dos sumandos
    interiores”? — Propiedad distributiva del producto respecto de la suma
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de propiedad distributiva del producto
    respecto de la suma.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica el factor por
    cada sumando y conserva el signo más.'
  - 'La solución debe terminar de este modo: Compara \(a(b+c)\) con \(ab+ac\) mediante
    el cálculo de ambos lados.'
errores_frecuentes:
- 'Empezar propiedad distributiva del producto respecto de la suma sin realizar este
  control inicial: Identifica el factor exterior y los dos sumandos interiores.'
- Memorizar “\(\frac{2}{3}(\frac{1}{4}+\frac{5}{4})=\frac{2}{3}\cdot\frac{1}{4}+\frac{2}{3}\cdot\frac{5}{4}\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Multiplica el factor por cada sumando y conserva el
  signo más.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre propiedad distributiva del producto respecto
  de la suma que contradice el criterio “Multiplicar una suma puede hacerse repartiendo
  el factor común”.
- 'Cerrar el ejercicio sin esta comprobación específica: Compara \(a(b+c)\) con \(ab+ac\)
  mediante el cálculo de ambos lados.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
