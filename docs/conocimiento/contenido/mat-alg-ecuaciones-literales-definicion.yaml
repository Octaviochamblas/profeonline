  \ las Ăşltimas letras del abecedario ($x$, $y$, $z$) son las incĂłgnitas, y las primeras ($a$, $b$, $c$) son constantes\
  \ representadas mediante parĂĄmetros.\n\nResolver una ecuaciĂłn literal significa despejar la 'x', pero tu respuesta\
