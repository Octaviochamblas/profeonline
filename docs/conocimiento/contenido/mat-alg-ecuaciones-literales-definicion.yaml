semantic_id: MAT.ALG.ECUACIONES_LITERALES.DEFINICION
titulo: Definición de Ecuaciones Literales
objetivo: Comprender qué es una ecuación literal y cómo difiere de una numérica.
explicacion: |
  Una ecuación literal es una ecuación que tiene una invasión de letras. En lugar de números amigables como el 5 o el 8, está llena de parámetros como $a$, $b$, $m$ o $k$.

  Por ejemplo: $ax + b = c$.
  ¿Quién es la incógnita aquí? Generalmente se asume que las últimas letras del abecedario ($x$, $y$, $z$) son las incógnitas, y las primeras ($a$, $b$, $c$) son números disfrazados de letras.

  Resolver una ecuación literal significa despejar la 'x', pero tu respuesta final no será un número como '7', sino una fórmula que depende de las otras letras, por ejemplo: $x = \frac{c - b}{a}$.
procedimiento: |
  1. Identifica claramente cuál es la incógnita que debes despejar (usualmente 'x').
  2. Trata mentalmente a todas las demás letras como si fueran números comunes y corrientes.
  3. Aplica las mismas reglas de la balanza (transposición) que usarías con números.
