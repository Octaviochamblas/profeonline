resumen: Una ecuaciĂłn literal es una ecuaciĂłn que tiene una presencia de varios parĂĄmetros. En lugar de coeficientes
  numĂŠricos como el 5 o el 8, estĂĄ llena de parĂĄmetros como $a$, $b$, $m$ o $k$.
