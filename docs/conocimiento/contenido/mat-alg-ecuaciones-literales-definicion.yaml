semantic_id: 'MAT.ALG.ECUACIONES_LITERALES.DEFINICION'
titulo: 'Definición de Ecuaciones Literales'
objetivo: 'Comprender qué es una ecuación literal y cómo difiere de una numérica.'
introduccion: |
  Una ecuación literal es una ecuación que tiene una presencia de múltiples parámetros. En lugar de números lineal estándars como el 5 o el 8, está llena de parámetros como $a$, $b$, $m$ o $k$.
resumen: |
  Resolver una ecuación literal significa despejar la 'x', pero tu respuesta final no será un número como '7', sino una fórmula que depende de las otras letras, por ejemplo: $x = \frac{c - b}{a}$.
explicacion: |
  Por ejemplo: $ax + b = c$.
  ¿Quién es la incógnita aquí? Generalmente se asume que las últimas letras del abecedario ($x$, $y$, $z$) son las incógnitas, y las primeras ($a$, $b$, $c$) son constantes paramétricas.
procedimiento:
  - 'Paso 1: Identifica claramente cuál es la incógnita que debes despejar (usualmente ''x'').'
  - 'Paso 2: Trata mentalmente a todas las demás letras como si fueran números comunes y corrientes.'
  - 'Paso 3: Aplica las mismas reglas de la balanza (transposición) que usarías con números.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
