semantic_id: MAT.NUM.PORCENTAJES.CALCULO_PORCENTAJE
titulo: Cálculo del porcentaje que representa una cantidad
objetivo: Calcular qué porcentaje representa una cantidad respecto de otra (el total).
introduccion: Tuviste 24 aciertos en una prueba de 30 preguntas. ¿Qué nota te sacarás? Necesitas saber
  qué porcentaje de la prueba dominaste. Este es el cálculo inverso.
resumen: 'Para saber qué porcentaje es una Parte respecto a un Total, se divide la Parte por el Total
  y se multiplica por 100: $\% = (Parte / Total) \cdot 100$.'
explicacion: "Cuando la pregunta es '¿Qué porcentaje es $P$ respecto de $T$?', estamos buscando la relación\
  \ entre la Parte ($P$) y el Total ($T$) llevada a una escala de 100.\n\nLa fórmula directa es:\n$$\\\
  % = \\left( \\frac{\\text{Parte}}{\\text{Total}} \\right) \\cdot 100$$\n\nEjemplo lógico: Si la Parte\
  \ es exactamente la mitad del Total, $P/T$ dará $0.5$. Al multiplicarlo por 100 obtenemos $50\\%$. \n\
  Este cálculo es equivalente a una regla de tres: Si $T$ es el $100\\%$, entonces $P$ es a $x\\%$."
procedimiento:
- 'Paso 1: Identifica el ''Total'' (la base de referencia) y la ''Parte''.'
- 'Paso 2: Divide la Parte por el Total.'
- 'Paso 3: Multiplica el resultado decimal por 100 y agrégale el símbolo %.'
ejemplos:
- titulo: Porcentaje de aciertos
  enunciado: Si aciertas 15 tiros de 20 intentos, ¿cuál es tu porcentaje de acierto?
  solucion_pasos:
  - Parte = 15, Total = 20.
  - 'Fracción: $15/20$.'
  - 'Multiplicamos por 100: $(15/20) \cdot 100 = 15 \cdot 5 = 75$.'
  - El porcentaje de acierto es 75%.
errores_frecuentes:
- Dividir el Total por la Parte (ej. $20/15$) obteniendo porcentajes absurdos mayores a 100% cuando no
  corresponde.
- Olvidar multiplicar por 100, respondiendo 'es el $0.75\%$' en lugar de $75\%$.
- Confundir cuál es la base (el Total) en problemas redactados confusamente (ej. 'Qué porcentaje es 50
  respecto a 200').
fuente: Currículum Nacional MINEDUC.
estado: publicado
