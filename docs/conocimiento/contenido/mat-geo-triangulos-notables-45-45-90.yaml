semantic_id: MAT.GEO.TRIANGULOS_NOTABLES.TRIANGULO_45_45_90
titulo: Relación de lados en el triángulo notable 45°-45°-90°
objetivo: Aplicar la proporción fija entre los lados de un triángulo rectángulo isósceles con ángulos
  45°, 45° y 90°.
introduccion: Cuando un triángulo rectángulo tiene sus dos ángulos agudos iguales (45° cada uno), sus
  catetos también son iguales, y la hipotenusa queda determinada por una proporción fija respecto a ellos.
resumen: En un triángulo 45°-45°-90°, los catetos son iguales, y la hipotenusa mide $\sqrt{2}$ veces la
  medida de un cateto.
explicacion: '![Triángulo notable 45°-45°-90°](/static/img/geometria/triangulos/triangulos-notables-45-45-90.svg)


  ### Definición formal


  En un triángulo rectángulo isósceles con ángulos 45°, 45° y 90°, si cada cateto mide $l$, la hipotenusa
  mide $l\sqrt{2}$, por el teorema de Pitágoras: $l^2+l^2=h^2 \Rightarrow h=l\sqrt{2}$.


  ### Desarrollo didáctico


  Si cada cateto mide 5 cm, la hipotenusa mide $5\sqrt{2}\approx7,07$ cm. La proporción entre los lados
  es siempre $1:1:\sqrt{2}$, sin importar el tamaño del triángulo.'
procedimiento:
- 'Paso 1: Verifica que el triángulo sea rectángulo con ambos ángulos agudos de 45°.'
- 'Paso 2: Identifica la medida de un cateto (los dos son iguales).'
- 'Paso 3: Multiplica esa medida por $\sqrt{2}$ para obtener la hipotenusa.'
ejemplos:
- titulo: Calcular la hipotenusa
  enunciado: Un triángulo 45-45-90 tiene catetos de 4 cm cada uno.
  solucion_pasos:
  - La hipotenusa mide $4\sqrt{2}\approx5,66$ cm.
- titulo: Calcular un cateto desde la hipotenusa
  enunciado: Un triángulo 45-45-90 tiene hipotenusa $6\sqrt{2}$ cm.
  solucion_pasos:
  - Cada cateto mide 6 cm, ya que la hipotenusa es el cateto multiplicado por $\sqrt{2}$.
- titulo: ¿Los dos catetos de este triángulo son siempre iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque los ángulos opuestos a ellos son iguales (45° cada uno).
- titulo: ¿La proporción $1:1:\sqrt{2}$ cambia según el tamaño del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, la proporción entre los lados es constante para cualquier triángulo 45-45-90.
errores_frecuentes:
- Olvidar multiplicar por $\sqrt{2}$ al calcular la hipotenusa desde el cateto.
- Confundir esta proporción con la del triángulo 30-60-90.
- Creer que los catetos pueden ser distintos en este triángulo notable.
fuente: Elaboración propia.
estado: publicado
