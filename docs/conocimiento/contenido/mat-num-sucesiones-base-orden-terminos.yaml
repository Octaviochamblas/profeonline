semantic_id: MAT.NUM.SUCESIONES_BASE.ORDEN_TERMINOS
objetivo: Identificar y verbalizar la posición que ocupa cada término en una sucesión.
introduccion: En una carrera de atletismo, no solo importa quiénes corrieron, sino
  quién llegó primero, segundo y tercero. En las sucesiones, cada número tiene una
  'medalla' que indica su posición.
resumen: 'Cada número en una sucesión ocupa una posición ordinal: primer término,
  segundo término, tercer término, etc. La posición se denota habitualmente con la
  letra ''$n$'' y siempre es un número natural ($1, 2, 3, \dots$).'
explicacion: 'Para no perdernos en la fila de números, asignamos una etiqueta a la
  posición de cada uno, usando los números de contar (los Naturales: $1, 2, 3, 4\dots$).


  Dada la sucesión: $10, 20, 30, 40, \dots$

  - El número $10$ está en la **posición 1** (es el primer término).

  - El número $20$ está en la **posición 2**.

  - El número $40$ está en la **posición 4**.


  Es fundamental **NO confundir el valor del número con su posición**. En el ejemplo,
  el valor es $40$, pero su posición es $4$. La letra ''$n$'' se utiliza casi universalmente
  en matemáticas para representar esta posición.'
procedimiento:
- 'Paso 1: Lee la sucesión de izquierda a derecha.'
- 'Paso 2: Asigna el número 1 al primer valor que leas, el 2 al segundo, etc.'
- 'Paso 3: Si te preguntan por la posición ''n=3'', busca el tercer número escrito.'
ejemplos:
- titulo: Ubicando al infiltrado
  enunciado: 'En la sucesión: 2, 4, 8, 16, 32... ¿qué valor ocupa la cuarta posición
    (n=4)?'
  solucion_pasos:
  - 'Posición 1: 2'
  - 'Posición 2: 4'
  - 'Posición 3: 8'
  - 'Posición 4: 16.'
  - El valor en la cuarta posición es 16.
errores_frecuentes:
- Confundir el valor del término con el número de su posición (Ej. decir que el término
  en la posición 16 es el número 4, leyendo al revés).
- Pensar que existe la posición 'cero' o posiciones negativas (las posiciones empiezan
  siempre en 1).
fuente: Currículum Nacional MINEDUC.
estado: publicado
