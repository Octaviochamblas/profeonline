semantic_id: MAT.EST.PROBA_COND_BASE.CONCEPTO_RESTRICCION
titulo: Definición conceptual de probabilidad condicional como restricción del espacio muestral
objetivo: Definir la probabilidad condicional como la probabilidad de un evento cuando se sabe que otro
  evento ya ocurrió, lo que restringe el espacio muestral original.
introduccion: Cuando se sabe que un evento B ya ocurrió, el espacio de posibilidades para cualquier otro
  evento se reduce solamente a B, en vez de considerar todo el espacio muestral original.
resumen: La probabilidad condicional de un evento $A$ dado que ocurrió un evento $B$ es la probabilidad
  de $A$ calculada dentro del nuevo espacio muestral restringido a $B$.
explicacion: '![Probabilidad condicional como restricción del espacio](/static/img/probabilidad/condbase/condbase-concepto-restriccion.svg)


  ### Definición formal


  Si se sabe que ocurrió el evento $B$, el espacio muestral efectivo deja de ser $S$ y pasa a ser $B$;
  la probabilidad condicional de $A$ dado $B$ se calcula considerando solo la parte de $A$ que está dentro
  de ese nuevo universo $B$.


  ### Desarrollo didáctico


  Al lanzar un dado, si se sabe que el resultado fue un número mayor que 3 (evento B={4,5,6}), el nuevo
  universo de posibilidades ya no es {1,...,6}, sino solo {4,5,6}. La probabilidad de que además sea par
  (evento A) se calcula solo dentro de ese universo restringido.'
procedimiento:
- 'Paso 1: Identifica el evento B que se sabe que ya ocurrió (la condición).'
- 'Paso 2: Reconoce que el nuevo espacio muestral efectivo es B, no el espacio muestral original completo.'
- 'Paso 3: Calcula la probabilidad del evento A considerando solo los elementos que están dentro de ese
  nuevo universo B.'
ejemplos:
- titulo: Reconocer la restricción del espacio muestral
  enunciado: Se sabe que el resultado de un dado fue mayor que 3.
  solucion_pasos:
  - El nuevo universo de posibilidades pasa a ser {4,5,6}, en vez de {1,2,3,4,5,6}.
- titulo: Aplicar la restricción a un evento adicional
  enunciado: Dentro de {4,5,6}, ¿cuál es la probabilidad de obtener un número par?
  solucion_pasos:
  - De los 3 elementos del nuevo universo, 2 son pares (4,6), por lo que la probabilidad condicional es
    2/3.
- titulo: ¿La probabilidad condicional siempre se calcula dentro de un espacio muestral reducido?
  respuesta: Sí
  solucion_pasos:
  - Sí, ese es el concepto central de la probabilidad condicional.
- titulo: ¿El evento condicionante (B) se convierte en el nuevo espacio muestral de referencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, toda la probabilidad condicional se calcula respecto de ese nuevo universo restringido.
errores_frecuentes:
- Calcular la probabilidad condicional usando el espacio muestral original completo, en vez del restringido.
- Confundir cuál evento es la condición (el nuevo universo) y cuál es el evento de interés dentro de ese
  universo.
- Olvidar que la restricción cambia tanto los casos favorables como los casos totales considerados.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
