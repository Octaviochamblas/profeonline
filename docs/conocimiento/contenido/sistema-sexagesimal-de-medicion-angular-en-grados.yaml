semantic_id: MAT.GEO.MEDICION_ANGULAR.SISTEMA_SEXAGESIMAL
titulo: Sistema sexagesimal de medición angular en grados
objetivo: Interpretar la medición angular en grados dentro del sistema sexagesimal y comprobar que usar
  360° para la vuelta completa permite comparar medias vueltas, cuartos y fracciones del giro.
introduccion: Muchos ángulos escolares se expresan en grados porque esa unidad parte la vuelta completa
  en 360 trozos iguales y muy manejables. Este recurso se centra en sistema sexagesimal de medición angular
  en grados y en cómo reconocerlo con un criterio geométrico claro.
resumen: El sistema sexagesimal mide ángulos en grados y divide la vuelta completa en 360 partes iguales.
  Como idea de control, usar 360° para la vuelta completa permite comparar medias vueltas, cuartos y fracciones
  del giro.
explicacion: 'El sistema sexagesimal mide ángulos en grados y divide la vuelta completa en 360 partes
  iguales.


  La situación “un cuarto de vuelta equivale a 90° dentro del sistema sexagesimal” muestra cómo pasar
  del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se verifica que
  usar 360° para la vuelta completa permite comparar medias vueltas, cuartos y fracciones del giro.'
procedimiento:
- 'Paso 1: Reconoce que la unidad usada es el grado.'
- 'Paso 2: Relaciona la medida dada con fracciones de una vuelta completa de 360°.'
- 'Paso 3: Comprueba si la interpretación coincide con media vuelta, cuarto de vuelta u otra referencia
  conocida.'
ejemplos:
- titulo: Caso guiado — Sistema sexagesimal
  enunciado: Un cuarto de vuelta equivale a 90° dentro del sistema sexagesimal.
  solucion_pasos:
  - Reconoce que la unidad usada es el grado.
  - Relaciona la medida dada con fracciones de una vuelta completa de 360°.
  - Comprueba si la interpretación coincide con media vuelta, cuarto de vuelta u otra referencia conocida.
- titulo: Revisión del razonamiento — Sistema sexagesimal
  enunciado: 'Revisa una solución del caso “un cuarto de vuelta equivale a 90° dentro del sistema sexagesimal”:
    el resultado parece razonable, pero falta conectar el dibujo con la definición. Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: el sistema sexagesimal mide ángulos en grados y divide la vuelta completa
    en 360 partes iguales.'
  - Relaciona la medida dada con fracciones de una vuelta completa de 360°.
  - Comprueba si la interpretación coincide con media vuelta, cuarto de vuelta u otra referencia conocida.
- titulo: ¿El caso confirma que usar 360° para la vuelta completa permite comparar medias vueltas, cuartos
    y fracciones del giro? — Sistema sexagesimal
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: el sistema sexagesimal mide ángulos en grados
    y divide la vuelta completa en 360 partes iguales.'
  - En el caso “un cuarto de vuelta equivale a 90° dentro del sistema sexagesimal” se observa que usar
    360° para la vuelta completa permite comparar medias vueltas, cuartos y fracciones del giro.
  - Comprueba si la interpretación coincide con media vuelta, cuarto de vuelta u otra referencia conocida.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Sistema sexagesimal
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de sistema sexagesimal de medición angular
    en grados.
  - Después del paso “Reconoce que la unidad usada es el grado.” todavía hace falta revisar “Relaciona
    la medida dada con fracciones de una vuelta completa de 360°.”.
  - El cierre correcto exige “Comprueba si la interpretación coincide con media vuelta, cuarto de vuelta
    u otra referencia conocida.”.
errores_frecuentes:
- Sistema sexagesimal significa medir una vuelta completa con 100 unidades en vez de 360.
- Para resolver sistema sexagesimal, basta con el paso “Reconoce que la unidad usada es el grado.” y no
  hace falta revisar “Relaciona la medida dada con fracciones de una vuelta completa de 360°.”.
- Si el dibujo parece claro, se puede ignorar que usar 360° para la vuelta completa permite comparar medias
  vueltas, cuartos y fracciones del giro.
- Dos configuraciones distintas representan sistema sexagesimal solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba si la interpretación coincide con
  media vuelta, cuarto de vuelta u otra referencia conocida.”.
fuente: Currículum Nacional MINEDUC — Medición angular, sistemas sexagesimal, radial y centesimal.
