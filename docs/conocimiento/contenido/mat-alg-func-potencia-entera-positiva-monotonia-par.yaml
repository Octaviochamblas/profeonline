semantic_id: MAT.ALG.FUNC_POTENCIA_ENTERA_POSITIVA.MONOTONIA_PAR
titulo: Monotonía de la función potencia con exponente par
objetivo: Describir los intervalos de crecimiento y decrecimiento de $f(x)=a\cdot x^n$ cuando $n$ es par.
introduccion: A diferencia de una función monótona en todo su dominio, las funciones con exponente par cambian su
  comportamiento exactamente en el origen.
resumen: Si $n$ es par y $a>0$, $f(x)=a\cdot x^n$ es **decreciente** en $(-\infty,0]$ y **creciente** en
  $[0,+\infty)$; si $a<0$, el comportamiento se invierte.
explicacion: '### Definición formal


  Para $n$ par y $a>0$, la función $f(x)=a\cdot x^n$ cumple $f''$ positivo salvo en el vértice, lo que se
  traduce en: para $x_1<x_2\leq0$, $f(x_1)>f(x_2)$ (decreciente); para $0\leq x_1<x_2$, $f(x_1)<f(x_2)$
  (creciente). El punto $x=0$ es el punto donde cambia el comportamiento.


  ### Desarrollo didáctico


  Con $f(x)=x^2$: en el intervalo $(-\infty,0]$, a medida que $x$ aumenta (se acerca a $0$ desde valores muy
  negativos), $f(x)$ disminuye; en $[0,+\infty)$, a medida que $x$ sigue aumentando, $f(x)$ vuelve a crecer.'
procedimiento:
- 'Paso 1: Verifica que $n$ sea par y determina el signo de $a$.'
- 'Paso 2: Identifica el punto $x=0$ como el punto donde cambia la monotonía.'
- 'Paso 3: Describe el comportamiento en cada uno de los dos intervalos separados por $x=0$.'
ejemplos:
- titulo: Monotonía de $f(x)=x^2$
  enunciado: 'Describe la monotonía de $f(x)=x^2$.'
  solucion_pasos:
  - Con $a=1>0$ y $n=2$ par, la función decrece en $(-\infty,0]$.
  - Y crece en $[0,+\infty)$.
- titulo: Monotonía de $f(x)=-x^4$
  enunciado: 'Describe la monotonía de $f(x)=-x^4$.'
  solucion_pasos:
  - Con $a=-1<0$ y $n=4$ par, el comportamiento se invierte respecto al caso $a>0$.
  - La función crece en $(-\infty,0]$ y decrece en $[0,+\infty)$.
- titulo: ¿$f(x)=x^2$ es creciente en todo su dominio?
  enunciado: ¿La función $f(x)=x^2$ es creciente en todos los reales?
  respuesta: 'No'
  solucion_pasos:
  - Es decreciente en $(-\infty,0]$ y creciente en $[0,+\infty)$, no en todo su dominio.
- titulo: ¿El punto $x=0$ marca siempre el cambio de monotonía en una función con exponente par?
  enunciado: ¿El origen es siempre el punto donde cambia el comportamiento de crecimiento/decrecimiento con
    exponente par?
  respuesta: Sí
  solucion_pasos:
  - Corresponde al vértice de la curva, sea mínimo o máximo según el signo de $a$.
errores_frecuentes:
- Afirmar que la función es creciente o decreciente en todo su dominio, ignorando el cambio en $x=0$.
- Confundir los intervalos de crecimiento y decrecimiento según el signo de $a$.
- No identificar $x=0$ como el punto de cambio de comportamiento.
- Aplicar el análisis de monotonía par a una función con exponente impar.
