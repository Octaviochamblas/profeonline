semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.PENDIENTE_POSITIVA
titulo: Interpretación de pendiente positiva como crecimiento
objetivo: Interpretar una pendiente positiva como indicador de que la función es creciente.
introduccion: Cuando una recta sube de izquierda a derecha, algo numérico lo confirma sin necesidad de mirarla,
  su pendiente es positiva.
resumen: Una recta tiene **pendiente positiva** ($m>0$) si y solo si la variable dependiente aumenta a medida que
  la variable independiente aumenta; gráficamente, la recta sube de izquierda a derecha.
explicacion: '### Definición formal


  Para una función lineal o afín $f(x) = mx + n$ con $m > 0$, se cumple que $x_1 < x_2 \implies f(x_1) < f(x_2)$
  para todo $x_1, x_2$ del dominio; es decir, $f$ es estrictamente creciente en todo su dominio.


  ### Desarrollo didáctico


  Piensa en subir una escalera: cada paso hacia la derecha (aumento de $x$) corresponde a un paso hacia arriba
  (aumento de $y$).


  Si $m=4$, cada aumento de una unidad en $x$ produce un aumento de 4 unidades en $y$. La recta, vista de izquierda
  a derecha, siempre sube.'
procedimiento:
- 'Paso 1: Calcula o identifica el signo de la pendiente $m$.'
- 'Paso 2: Si $m>0$, la función es creciente en todo su dominio.'
- 'Paso 3: Verifica visualmente que la recta suba al desplazarse hacia la derecha.'
ejemplos:
- titulo: Identificación de pendiente positiva
  enunciado: 'Determina si $f(x) = 6x - 2$ tiene pendiente positiva.'
  solucion_pasos:
  - El coeficiente de $x$ es $6$, positivo.
  - La función es creciente.
- titulo: Verificación numérica de crecimiento
  enunciado: Si $f(x) = 2x$, verifica que $f(3) > f(1)$.
  solucion_pasos:
  - '$f(3)=6$ y $f(1)=2$.'
  - Como $6>2$ y $3>1$, se confirma el crecimiento asociado a la pendiente positiva.
- titulo: ¿Una recta con pendiente positiva sube de izquierda a derecha?
  enunciado: ¿Una recta con pendiente positiva sube de izquierda a derecha?
  respuesta: Sí
  solucion_pasos:
  - Esa es exactamente la interpretación gráfica de una pendiente positiva.
- titulo: ¿Si $m>0$, entonces $f(5) < f(2)$?
  enunciado: ¿Si $m>0$, entonces $f(5) < f(2)$?
  respuesta: 'No'
  solucion_pasos:
  - Con pendiente positiva la función es creciente, así que $f(5) > f(2)$, no menor.
errores_frecuentes:
- Confundir "pendiente positiva" con "función siempre positiva" (los valores de $y$ pueden ser negativos en algún
  tramo).
- Asumir que toda pendiente positiva implica que la recta pasa por el primer cuadrante completo.
- Confundir crecimiento con la magnitud (grado de inclinación) de la pendiente.
- Suponer que una pendiente positiva grande implica valores de $y$ siempre grandes.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
