semantic_id: MAT.GEO.ESPACIO_FUNDAMENTOS.RECTAS_ALABEADAS
titulo: Posición relativa de rectas alabeadas en el espacio
objetivo: 'Reconocer rectas alabeadas (o cruzadas) en el espacio: aquellas que no son coplanares, es decir,
  que no se cruzan y tampoco son paralelas.'
introduccion: 'En el espacio existe una tercera posición relativa entre rectas, que no tiene equivalente
  en la geometría plana: dos rectas pueden no cruzarse nunca y, sin embargo, no ser paralelas.'
resumen: Dos rectas en el espacio son alabeadas (o cruzadas) si no existe ningún plano que las contenga
  a ambas simultáneamente; es decir, no se intersectan y tampoco son paralelas.
explicacion: '![Rectas alabeadas en el espacio](/static/img/geometria/espacio-cuerpos/espacio-rectas-alabeadas.svg)


  ### Definición formal


  Dos rectas $AB$ y $CG$ son alabeadas si no son coplanares: no existe ningún plano que las contenga a
  ambas. Como consecuencia, nunca se intersectan y, además, no son paralelas entre sí.


  ### Desarrollo didáctico


  En la figura, la arista $AB$ (borde inferior frontal) y la arista $CG$ (borde vertical trasero derecho)
  de un prisma no se tocan en ningún punto y tampoco tienen la misma dirección, por lo que no puede existir
  un único plano que las contenga a ambas: son rectas alabeadas. Esta posición relativa es exclusiva de
  la geometría del espacio; no existe en la geometría plana.'
procedimiento:
- 'Paso 1: Verifica que las dos rectas no compartan ningún punto en común (no son secantes).'
- 'Paso 2: Verifica que las rectas no tengan la misma dirección (no son paralelas).'
- 'Paso 3: Si se cumplen ambas condiciones, concluye que las rectas son alabeadas (no coplanares).'
ejemplos:
- titulo: Identificar dos aristas alabeadas en un prisma
  enunciado: Las aristas AB y CG de un prisma no comparten ningún punto y no tienen la misma dirección.
  solucion_pasos:
  - 'AB y CG son rectas alabeadas: no se cruzan y no son paralelas, por lo que no existe un plano que
    las contenga a ambas.'
- titulo: Distinguir rectas alabeadas de rectas paralelas
  enunciado: Dos rectas nunca se cruzan.
  solucion_pasos:
  - Si además son coplanares, son paralelas; si no existe un plano que las contenga a ambas, son alabeadas.
- titulo: ¿Las rectas alabeadas existen en la geometría plana?
  respuesta: 'No'
  solucion_pasos:
  - No, esta posición relativa es exclusiva del espacio tridimensional; en el plano, dos rectas distintas
    siempre son secantes o paralelas.
- titulo: ¿Las rectas alabeadas comparten algún punto?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición, las rectas alabeadas nunca se intersectan, al igual que las paralelas, pero sin
    ser coplanares.
errores_frecuentes:
- Confundir las rectas alabeadas con las rectas paralelas, ya que ambas no se cruzan (la diferencia está
  en la coplanaridad).
- Creer que el concepto de rectas alabeadas también aplica en la geometría plana.
- No verificar ambas condiciones (no cruzarse y no ser paralelas) antes de concluir que dos rectas son
  alabeadas.
fuente: 'Elaboración propia (referencia: Cid 167).'
estado: publicado
