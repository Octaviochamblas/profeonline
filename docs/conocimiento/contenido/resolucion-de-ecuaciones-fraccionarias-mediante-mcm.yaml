semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.USO_MCM
titulo: Resolución de ecuaciones fraccionarias mediante m.c.m.
objetivo: Encontrar el MCM cuando los denominadores contienen polinomios con la incógnita.
introduccion: 'Funciona como un mínimo común múltiplo. Factorizas todos los denominadores primero (ej:
  $x^2-1$ se vuelve $(x-1)(x+1)$).'
resumen: El mínimo común múltiplo de los denominadores permite transformar una ecuación fraccionaria en
  otra equivalente sin denominadores, siempre que se respeten sus restricciones.
explicacion: '### Definición formal


  Cuando los denominadores de una ecuación fraccionaria son polinomios $q_1(x), q_2(x), \dots$, su Mínimo
  Común Múltiplo algebraico se construye factorizando cada $q_i(x)$ y tomando cada factor irreducible
  distinto elevado a su mayor exponente entre todas las factorizaciones; multiplicar la ecuación por ese
  MCM elimina todos los denominadores simultáneamente.


  ### Desarrollo didáctico


  Funciona como un mínimo común múltiplo. Factorizas todos los denominadores primero (ej: $x^2-1$ se vuelve
  $(x-1)(x+1)$).

  Luego, construyes tu mínimo común múltiplo (el MCM) tomando todos los fcantidades involucradas que aparecen,
  a su mayor exponente. Al inyectar (multiplicar) este mínimo común múltiplo en toda la ecuación, eliminarás
  todos los denominadores de un solo golpe, dejándote una ecuación lineal amigable en el numerador.'
procedimiento:
- Factoriza completamente todos los denominadores de la ecuación.
- Construye el MCM tomando los fcantidades involucradas comunes y no comunes al mayor exponente.
- Multiplica cada término de la ecuación por el MCM. Los denominadores se cancelarán con partes del MCM.
ejemplos:
- titulo: $x^2-1$ y $(x-1)(x+1)$
  enunciado: Justifica el procedimiento adecuado para el caso $x^2-1$ y $(x-1)(x+1)$.
  solucion_pasos:
  - 'Funciona como un mínimo común múltiplo. Factorizas todos los denominadores primero (ej: $x^2-1$ se
    vuelve $(x-1)(x+1)$).

    Luego, construyes tu mínimo común múltiplo (el MCM) tomando todos los fcantidades involucradas que
    aparecen, a su mayor exponente. Al inyectar (multiplicar) este mínimo común múltiplo en toda la ecuación,
    eliminarás todos los denominadores de un solo golpe, dejándote una ecuación lineal amigable en el
    numerador.'
  - Factoriza completamente todos los denominadores de la ecuación.
- titulo: $(x-1)$ y $(x^2-1)$
  enunciado: Determina qué debe hacerse en $(x-1)$ y $(x^2-1)$ y fundamenta cada transformación.
  solucion_pasos:
  - Cuando los denominadores son expresiones como $(x-1)$ y $(x^2-1)$, multiplicarlos entre sí crearía
    un expresión algebraica compleja. Necesitas usar el MCM algebraico.
  - Construye el MCM tomando los fcantidades involucradas comunes y no comunes al mayor exponente.
- titulo: 'Respecto de «Resolución de ecuaciones fraccionarias mediante m.c.m.»: ¿La siguiente formulac'
  enunciado: 'Respecto de «Resolución de ecuaciones fraccionarias mediante m.c.m.»: ¿La siguiente formulación
    es correcta? «El mínimo común múltiplo de los denominadores permite transformar una ecuación fraccionaria
    en otra equivalente sin denominadores, siempre que se respeten sus restricciones»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El mínimo común múltiplo de los denominadores permite
    transformar una ecuación fraccionaria en otra equivalente sin denominadores, siempre que se respeten
    sus restricciones.'
- titulo: 'Respecto de «Resolución de ecuaciones fraccionarias mediante m.c.m.»: ¿La siguiente conclusi'
  enunciado: 'Respecto de «Resolución de ecuaciones fraccionarias mediante m.c.m.»: ¿La siguiente conclusión
    es correcta? «Puede omitirse esta condición sin cambiar el resultado: «Factoriza completamente todos
    los denominadores de la ecuación»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El mínimo común múltiplo de los denominadores permite
    transformar una ecuación fraccionaria en otra equivalente sin denominadores, siempre que se respeten
    sus restricciones.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Factoriza completamente todos los denominadores
  de la ecuación».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Construye el MCM tomando los fcantidades
  involucradas comunes y no comunes al mayor exponente».'
- La definición sigue cumpliéndose aunque no se considere que cuando los denominadores son expresiones
  como $(x-1)$ y $(x^2-1)$, multiplicarlos entre sí crearía un expresión algebraica compleja. Necesitas
  usar el MCM algebraico.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Factoriza completamente todos
  los denominadores de la ecuación».
- La comprobación del resultado vuelve innecesaria la condición «Construye el MCM tomando los fcantidades
  involucradas comunes y no comunes al mayor exponente».
