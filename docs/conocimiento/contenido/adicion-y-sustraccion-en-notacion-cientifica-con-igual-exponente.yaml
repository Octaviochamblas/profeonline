semantic_id: MAT.NUM.NOTACION_CIENTIFICA.ADICION_SUSTRACCION
titulo: Adición y sustracción en notación científica con igual exponente
objetivo: Sumar y restar cantidades en notación científica.
introduccion: Sumar magnitudes de escalas distintas exige expresar ambas en la misma unidad posicional.
  La potencia de diez cumple el papel de esa unidad común.
resumen: Solo se suman o restan directamente coeficientes cuando las potencias de diez tienen el mismo
  exponente. Si los exponentes difieren, primero hay que reescribir uno de los términos con la misma escala.
explicacion: 'Solo se suman o restan directamente coeficientes cuando las potencias de diez tienen el
  mismo exponente.


  Al analizar “\(3.2\times10^5+1.7\times10^5=4.9\times10^5\)” conviene observar la conexión siguiente:
  si los exponentes difieren, primero hay que reescribir uno de los términos con la misma escala'
procedimiento:
- 'Paso 1: Compara los exponentes y elige una potencia de diez común.'
- 'Paso 2: Reescribe los coeficientes sin cambiar el valor de cada término.'
- 'Paso 3: Opera los coeficientes, conserva el exponente común y normaliza el resultado.'
ejemplos:
- titulo: Aplicación razonada — Adición y sustracción en notación científica con igual exponente
  enunciado: \(3.2\times10^5+1.7\times10^5=4.9\times10^5\).
  solucion_pasos:
  - Compara los exponentes y elige una potencia de diez común.
  - Reescribe los coeficientes sin cambiar el valor de cada término.
  - Opera los coeficientes, conserva el exponente común y normaliza el resultado.
- titulo: Revisión de una solución — Adición y sustracción en notación científica con igual exponente
  enunciado: Una solución aplica “Reescribe los coeficientes sin cambiar el valor de cada término.”, pero
    termina sin comprobar que si los exponentes difieren, primero hay que reescribir uno de los términos
    con la misma escala. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define adición y sustracción en notación científica con igual exponente:
    solo se suman o restan directamente coeficientes cuando las potencias de diez tienen el mismo exponente.'
  - Compara los exponentes y elige una potencia de diez común.
  - 'Completa la revisión con este control: Opera los coeficientes, conserva el exponente común y normaliza
    el resultado.'
- titulo: ¿Se cumple que si los exponentes difieren, primero hay que reescribir uno de los términos con
    la misma escala? — Adición y sustracción en notación científica con igual exponente
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que solo se suman o restan directamente coeficientes cuando
    las potencias de diez tienen el mismo exponente.
  - El caso “\(3.2\times10^5+1.7\times10^5=4.9\times10^5\)” satisface esa condición.
  - Opera los coeficientes, conserva el exponente común y normaliza el resultado.
- titulo: ¿Es válido omitir el paso “Compara los exponentes y elige una potencia de diez común”? — Adición
    y sustracción en notación científica con igual exponente
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de adición y sustracción en notación científica con
    igual exponente.
  - 'Omitirlo puede volver inválida la acción siguiente: Reescribe los coeficientes sin cambiar el valor
    de cada término.'
  - 'La solución debe terminar de este modo: Opera los coeficientes, conserva el exponente común y normaliza
    el resultado.'
errores_frecuentes:
- 'Confundir adición y sustracción en notación científica con igual exponente con otro concepto y omitir
  este inicio: Compara los exponentes y elige una potencia de diez común.'
- Aplicar mecánicamente “Reescribe los coeficientes sin cambiar el valor de cada término.” sin revisar
  las condiciones de la definición.
- Tomar “\(3.2\times10^5+1.7\times10^5=4.9\times10^5\)” como una igualdad aislada, sin explicar por qué
  es válida.
- Aceptar una respuesta que contradice la idea clave “si los exponentes difieren, primero hay que reescribir
  uno de los términos con la misma escala”.
- 'Terminar el desarrollo sin realizar este control: Opera los coeficientes, conserva el exponente común
  y normaliza el resultado.'
