semantic_id: MAT.GEO.RECTA_ECUACIONES.DOS_PUNTOS
titulo: Obtención de la ecuación de la recta dados dos puntos
objetivo: Obtener la ecuación de una recta conociendo dos puntos por los que pasa, calculando primero
  la pendiente y luego aplicando la fórmula punto-pendiente.
introduccion: Cuando no se conoce la pendiente directamente, pero sí dos puntos de la recta, se puede
  calcular la pendiente entre ellos y luego proceder como en el caso punto-pendiente.
resumen: Dados dos puntos $(x_1,y_1)$ y $(x_2,y_2)$ de una recta, se calcula la pendiente $m=\dfrac{y_2-y_1}{x_2-x_1}$,
  y luego se aplica $y-y_1=m(x-x_1)$.
explicacion: '![Ecuación dados dos puntos](/static/img/geometria/analitica/rectaeq-dos-puntos.svg)


  ### Definición formal


  Dados $(x_1,y_1)$ y $(x_2,y_2)$ con $x_1\neq x_2$, la pendiente es $m=\dfrac{y_2-y_1}{x_2-x_1}$, y la
  ecuación de la recta se obtiene sustituyendo $m$ y cualquiera de los dos puntos en $y-y_1=m(x-x_1)$.


  ### Desarrollo didáctico


  Para los puntos $(-2,-2)$ y $(3,3)$: $m=\dfrac{3-(-2)}{3-(-2)}=\dfrac{5}{5}=1$. Usando el punto $(-2,-2)$:
  $y-(-2)=1(x-(-2))$, que simplifica a $y=x$.'
procedimiento:
- 'Paso 1: Calcula la pendiente m entre los dos puntos dados, usando m=(y2-y1)/(x2-x1).'
- 'Paso 2: Sustituye esa pendiente y uno de los dos puntos en la fórmula punto-pendiente.'
- 'Paso 3: Simplifica la ecuación para obtener la forma principal (o verifica que el otro punto también
  la satisfaga).'
ejemplos:
- titulo: Obtener la ecuación con los puntos (-2,-2) y (3,3)
  enunciado: P1(-2,-2), P2(3,3).
  solucion_pasos:
  - m=(3-(-2))/(3-(-2))=1; y-(-2)=1(x-(-2)) → y=x.
- titulo: Obtener la ecuación con los puntos (0,4) y (2,0)
  enunciado: P1(0,4), P2(2,0).
  solucion_pasos:
  - m=(0-4)/(2-0)=-2; y-4=-2(x-0) → y=-2x+4.
- titulo: ¿Se puede usar cualquiera de los dos puntos para aplicar la fórmula punto-pendiente?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos puntos pertenecen a la misma recta, por lo que el resultado final es el mismo.
- titulo: ¿Es necesario que x1 sea distinto de x2 para calcular la pendiente?
  respuesta: Sí
  solucion_pasos:
  - Sí, de lo contrario se dividiría por cero (la recta sería vertical, sin pendiente definida).
errores_frecuentes:
- Invertir el orden de los puntos al calcular la pendiente (usar x1-x2 en el numerador y y2-y1 en el denominador,
  por ejemplo).
- Usar puntos con la misma coordenada x, generando una división por cero.
- Cometer errores de signo al restar coordenadas negativas.
fuente: 'Elaboración propia (referencia: Carreño 167).'
estado: publicado
