semantic_id: MAT.ALG.CUADRADO_BINOMIO.REGLA_DIFERENCIA
titulo: Aplicación de la regla del cuadrado de binomio (Diferencia)
objetivo: Aplicar la fórmula rápida del cuadrado de binomio diferencia para resolver expresiones algebraicas de
  forma directa.
introduccion: La regla para la diferencia es casi idéntica a la suma. Solo hay un pequeño (pero crucial) cambio
  de signo.
resumen: 'La regla para $(a-b)^2$ es:

  **''El cuadrado del primer término, MENOS el doble del primero por el segundo, MÁS el cuadrado del segundo término.''**

  Fórmula: $(a-b)^2 = a^2 - 2ab + b^2$'
explicacion: "### Definición formal\n\nEn la diferencia, el término central es $-2ab$. Los otros son $a^2$ y $+b^2$.\n\
  \n### Desarrollo didáctico\n\nLa regla para resolver el cuadrado de una diferencia, $(a-b)^2$, es idéntica a la\
  \ regla de la suma, salvo por el signo del término central.\n\n**Fórmula:** $(a-b)^2 = a^2 - 2ab + b^2$\n\n**Regla\
  \ en palabras (para memorizar):**\n1. **El cuadrado del primer término:** $(a)^2$.\n2. **MENOS el doble producto\
  \ del primero por el segundo:** $- 2(a)(b)$.\n3. **MÁS el cuadrado del segundo término:** $+ (b)^2$.\n\n**¿Cómo\
  \ aplicarla de manera segura?**\nCuando utilices esta regla, puedes pensar que el segundo término es \"$b$\" (positivo)\
  \ y aplicas el signo menos directamente en la fórmula. \nEjemplo para $(4x - 7)^2$:\n- Cuadrado del primero: $(4x)^2\
  \ = 16x^2$.\n- Menos el doble producto: $-2(4x)(7) = -56x$.\n- Más el cuadrado del segundo: $(7)^2 = +49$.\nResultado\
  \ final: $16x^2 - 56x + 49$."
procedimiento:
- 'Paso 1: Pasos para aplicar la regla a $(A-B)^2$:'
- 'Paso 2: Eleva el primer término al cuadrado: $(A)^2$.'
- 'Paso 3: Escribe un signo MENOS y luego el doble producto de los términos sin signo: $-2(A)(B)$.'
- 'Paso 4: Escribe un signo MÁS y eleva el segundo término (sin signo) al cuadrado: $+(B)^2$.'
- 'Paso 5: Junta todo en un trinomio.'
ejemplos:
- titulo: Aplicación paso a paso
  enunciado: Desarrolla el producto notable $(p - 6)^2$.
  solucion_pasos:
  - 'Primer término: $p$. Segundo término: $6$.'
  - 'Cuadrado del primero: $p^2$.'
  - 'Menos el doble producto: $-2(p)(6) = -12p$.'
  - 'Más cuadrado del segundo: $6^2 = 36$.'
  - 'Resultado: $p^2 - 12p + 36$.'
- titulo: Términos con exponentes
  enunciado: Calcula $(x^3 - 5y)^2$.
  solucion_pasos:
  - $(x^3)^2 = x^6$.
  - $-2(x^3)(5y) = -10x^3y$.
  - $(5y)^2 = +25y^2$.
  - 'Resultado: $x^6 - 10x^3y + 25y^2$.'
- titulo: 'Respecto de «Aplicación de la regla del cuadrado de binomio diferencia»: ¿Se ajusta a la def'
  enunciado: 'Respecto de «Aplicación de la regla del cuadrado de binomio diferencia»: ¿Se ajusta a la definición
    esta afirmación? «La regla para $(a-b)^2$ es: **''El cuadrado del primer término, MENOS el doble del primero
    por el segundo, MÁS el cuadrado del segundo término.''** Fórmula: $(a-b)^2 = a^2 - 2ab + b^2$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La regla para $(a-b)^2$ es: **''El cuadrado del primer término,
    MENOS el doble del primero por el segundo, MÁS el cuadrado del segundo término.''** Fórmula: $(a-b)^2 = a^2
    - 2ab + b^2$'
- titulo: 'Respecto de «Aplicación de la regla del cuadrado de binomio diferencia»: ¿Es compatible con'
  enunciado: 'Respecto de «Aplicación de la regla del cuadrado de binomio diferencia»: ¿Es compatible con el procedimiento
    esta afirmación? «Poner el último término como negativo, escribiendo erróneamente $a^2 - 2ab - b^2$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La regla para $(a-b)^2$ es: **''El cuadrado del primer término,
    MENOS el doble del primero por el segundo, MÁS el cuadrado del segundo término.''** Fórmula: $(a-b)^2 = a^2
    - 2ab + b^2$'
errores_frecuentes:
- Poner el último término como negativo, escribiendo erróneamente $a^2 - 2ab - b^2$.
- El primer término al cuadrado.
- El segundo término al cuadrado.
- Todos los términos.
- Porque la fórmula manda poner un más obligatoriamente, sin justificación matemática.
