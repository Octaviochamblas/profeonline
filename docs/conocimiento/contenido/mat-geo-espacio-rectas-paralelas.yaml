semantic_id: MAT.GEO.ESPACIO_FUNDAMENTOS.RECTAS_PARALELAS_ESPACIO
titulo: Posición relativa de rectas paralelas en el espacio
objetivo: 'Reconocer rectas paralelas en el espacio: aquellas que, estando en un mismo plano, nunca se
  intersectan por más que se extiendan.'
introduccion: En el espacio, dos rectas paralelas conservan la misma idea que en el plano (nunca se cruzan),
  pero ahora hay que verificar además que ambas puedan estar contenidas en un mismo plano.
resumen: Dos rectas en el espacio son paralelas si están contenidas en un mismo plano y no se intersectan,
  por más que se prolonguen indefinidamente en ambos sentidos.
explicacion: '![Rectas paralelas en el espacio](/static/img/geometria/espacio-cuerpos/espacio-rectas-paralelas.svg)


  ### Definición formal


  Dos rectas $AB$ y $HG$ en el espacio son paralelas si existe un plano que las contiene a ambas y, dentro
  de ese plano, nunca se intersectan, sin importar cuánto se prolonguen.


  ### Desarrollo didáctico


  En la figura, las aristas $AB$ (borde inferior frontal) y $HG$ (borde superior trasero) de un prisma
  son paralelas: mantienen siempre la misma distancia entre sí y nunca se cruzan, aunque no estén en la
  misma cara del cuerpo geométrico.'
procedimiento:
- 'Paso 1: Verifica que ambas rectas puedan estar contenidas en un mismo plano (una condición necesaria
  para el paralelismo).'
- 'Paso 2: Comprueba que, dentro de ese plano, las rectas nunca se intersectan.'
- 'Paso 3: Concluye que las rectas son paralelas si cumplen ambas condiciones simultáneamente.'
ejemplos:
- titulo: Identificar dos aristas paralelas en un prisma
  enunciado: Las aristas AB y HG de un prisma nunca se cruzan y están en planos paralelos entre sí.
  solucion_pasos:
  - AB y HG son rectas paralelas, ya que existe un plano que contiene a ambas (o planos paralelos) y nunca
    se intersectan.
- titulo: Verificar que dos rectas no coplanares no pueden ser paralelas
  enunciado: Dos rectas no pueden estar contenidas en ningún plano común.
  solucion_pasos:
  - Si no existe un plano que las contenga a ambas, esas rectas no pueden ser paralelas (podrían ser alabeadas,
    si además no se cruzan).
- titulo: ¿Dos rectas paralelas en el espacio deben estar en un mismo plano?
  respuesta: Sí
  solucion_pasos:
  - Sí, la coplanaridad es una condición necesaria para que dos rectas se consideren paralelas.
- titulo: ¿Basta con que dos rectas nunca se crucen para ser paralelas?
  respuesta: 'No'
  solucion_pasos:
  - No, en el espacio dos rectas pueden no cruzarse nunca y aun así no ser paralelas, si no existe un
    plano que las contenga a ambas (serían alabeadas).
errores_frecuentes:
- Creer que basta con que dos rectas nunca se intersecten para llamarlas paralelas, sin verificar la coplanaridad.
- Confundir rectas paralelas con rectas alabeadas (que tampoco se cruzan, pero no son coplanares).
- Suponer que dos aristas de un cuerpo geométrico son paralelas solo por 'verse parecidas' en la figura,
  sin verificar la definición formal.
fuente: 'Elaboración propia (referencia: Cid 167).'
estado: publicado
