semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.SUMA_CANTIDADES
objetivo: Traducir la suma de dos o más cantidades desconocidas desde el lenguaje
  natural.
introduccion: ¿Cómo escribes matemáticamente que tienes manzanas y además naranjas,
  sin saber cuántas hay de cada una? Usas la suma algebraica.
resumen: La **Suma de Cantidades** en lenguaje algebraico se representa utilizando
  el signo de adición ($+$) entre variables distintas.
explicacion: 'Palabras clave que indican suma:

  - Más

  - Sumado con

  - Añadido a

  - Agregado a

  - El total de

  - Excedido en


  Ejemplos de traducción:

  - ''La suma de dos números distintos'': $x + y$

  - ''Un número sumado a otro número diferente'': $a + b$

  - ''El total de la edad de Juan y la edad de María'': $J + M$


  *Nota vital:* Si el enunciado dice ''la suma de dos números'' (sin especificar si
  son iguales o distintos), por convención rigurosa asumimos que **son distintos**
  y usamos letras diferentes ($x+y$). Si fueran el mismo número, diría ''la suma de
  un número con sí mismo'' ($x+x$).'
procedimiento:
- 'Paso 1: Identifica las cantidades desconocidas en la frase.'
- 'Paso 2: Si el problema sugiere que las cantidades son (o pueden ser) diferentes,
  usa letras diferentes para cada una (x, y).'
- 'Paso 3: Une las letras con un signo más (+).'
ejemplos:
- titulo: Uniendo fuerzas
  enunciado: 'Traduce algebraicamente: ''El peso de un auto más el peso de una camioneta''.'
  solucion_pasos:
  - 'Peso del auto es una cantidad desconocida: a.'
  - 'Peso de la camioneta es otra cantidad desconocida: c.'
  - La palabra 'más' indica suma.
  - 'Traducción final: a + c.'
errores_frecuentes:
- 'Traducir ''la suma de dos números'' como $x+x$. (A menos que te digan que los números
  son idénticos, siempre asume que son diferentes: $x+y$).'
- Confundir 'la suma de' con 'un número más un número fijo', usando una constante
  en vez de dos variables.
fuente: Álgebra de Baldor.
estado: publicado
