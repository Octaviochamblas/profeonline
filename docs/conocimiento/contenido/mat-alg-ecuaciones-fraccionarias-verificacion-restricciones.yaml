semantic_id: 'MAT.ALG.ECUACIONES_FRACCIONARIAS.VERIFICACION_RESTRICCIONES'
titulo: 'Verificación y Cierre'
objetivo: |
  Comprobar formalmente que la solución final cumple con la ecuación original sin violar el dominio.
introduccion: |
  El hábito de los maestros es la verificación. Una vez que tienes una solución que sobrevivió a la verificación de las restricciones, el último paso es reemplazarla físicamente en la ecuación original (la que tenía fracciones).
resumen: 'Este proceso es fundamental para encontrar la solución correcta.'
explicacion: |
  No debes reemplazarla en tu ecuación 'aplanada', porque esa ecuación fue alterada por ti. Debes reemplazarla en la original para estar 100% seguro.
  Si al reemplazar $x$, el lado izquierdo se equilibra perfectamente con el lado derecho, y ningún denominador se vuelve cero en el proceso, puedes enmarcar tu respuesta. ¡Es correcta!
procedimiento:
  - 'Paso 1: Toma la solución final válida.'
  - 'Paso 2: Sustituye la ''x'' por ese número en la ecuación fraccionaria original.'
  - 'Paso 3: Resuelve la aritmética en ambos lados.'
  - 'Paso 4: Verifica que ambos lados den el mismo número final.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
