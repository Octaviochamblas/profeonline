semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.VERIFICACION_RESTRICCIONES
titulo: Verificación y Cierre
objetivo: Comprobar formalmente que la solución final cumple con la ecuación original sin violar el dominio.
explicacion: |
  El hábito de los maestros es la verificación. Una vez que tienes una solución que sobrevivió a la criba de las restricciones, el último paso es reemplazarla físicamente en la ecuación original (la que tenía fracciones).

  No debes reemplazarla en tu ecuación 'aplanada', porque esa ecuación fue alterada por ti. Debes reemplazarla en la original para estar 100% seguro.
  Si al reemplazar $x$, el lado izquierdo se equilibra perfectamente con el lado derecho, y ningún denominador se vuelve cero en el proceso, puedes enmarcar tu respuesta. ¡Es correcta!
procedimiento: |
  1. Toma la solución final válida.
  2. Sustituye la 'x' por ese número en la ecuación fraccionaria original.
  3. Resuelve la aritmética en ambos lados.
  4. Verifica que ambos lados den el mismo número final.
