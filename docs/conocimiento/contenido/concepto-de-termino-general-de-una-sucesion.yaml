semantic_id: MAT.NUM.SUCESIONES_BASE.TERMINO_GENERAL_CONCEPTO
titulo: Concepto de término general de una sucesión
objetivo: Comprender qué es el término general de una sucesión y cómo funciona como una máquina o fórmula
  productora de números.
introduccion: Si te doy los números 2, 4, 6... es fácil adivinar el que sigue. Pero si te pido el término
  que está en la posición un millón, ¿vas a sumar de a 2 un millón de veces? ¡Para eso inventamos el Término
  General!
resumen: El **Término General ($a_n$)** es una fórmula algebraica que genera cualquier valor de la sucesión
  simplemente reemplazando la '$n$' por la posición que deseas descubrir.
explicacion: 'Imagina que una sucesión es una fábrica de hacer números. El **término general** es la ''receta
  secreta'' de la máquina.


  Es una expresión algebraica que siempre lleva la letra ''$n$'' (la posición).

  Por ejemplo, si la fórmula de la máquina es **$a_n = 3n$**, significa que la máquina toma el número
  de posición que tú le digas y lo multiplica por 3.


  - Si quieres fabricar al que va primero ($n=1$): $3 \cdot 1 = 3$.

  - Si quieres fabricar al segundo ($n=2$): $3 \cdot 2 = 6$.

  - Si quieres descubrir quién está en la posición número cien ($n=100$): $3 \cdot 100 = 300$.


  El término general te da el superpoder de ''teletransportarte'' a cualquier lugar de la fila sin tener
  que calcular todos los números anteriores.'
procedimiento:
- 'Paso 1: Entiende que ''$a_n = \dots$'' es una fórmula matemática.'
- 'Paso 2: Reconoce que la ''$n$'' de la fórmula representa el número de la posición.'
- 'Paso 3: Para descubrir el valor de un término, se reemplaza la ''n'' por la posición deseada y se resuelve
  la operatoria.'
ejemplos:
- titulo: La fábrica de impares
  enunciado: La fórmula general de los números impares es $a_n = 2n - 1$. Sin sumar desde el principio,
    ¿cuál es el 50° número impar?
  solucion_pasos:
  - Quiero la posición 50, así que $n = 50$.
  - 'Tomo la fórmula: $2 \cdot (50) - 1$.'
  - 'Multiplico: $100 - 1 = 99$.'
  - El número impar número 50 de la fila es el 99.
errores_frecuentes:
- Creer que la letra 'n' en la fórmula representa el valor del número en sí, en lugar de su posición.
- Pensar que todas las sucesiones tienen una fórmula simple (algunas sucesiones reales son muy caóticas
  y difíciles de modelar con una sola fórmula).
fuente: Currículum Nacional MINEDUC.
estado: publicado
