semantic_id: 'MAT.ALG.CUADRADO_BINOMIO.SUMA_DEFINICION'
titulo: 'Definición del cuadrado de un binomio (Suma)'
objetivo: 'Comprender e interpretar algebraicamente el concepto del cuadrado de un binomio en su forma de suma $(a+b)^2$.'
introduccion: 'Elevar una suma al cuadrado aparece en muchas aplicaciones. ¿Es lo mismo sumar primero y luego elevar al cuadrado, que hacerlo al revés? ¡Vamos a definirlo formalmente!'
resumen: |
  El cuadrado de un binomio suma se define como la multiplicación del binomio por sí mismo: $(a+b)^2 = (a+b)(a+b)$.
  Esta expresión NO equivale simplemente a la suma de los cuadrados $a^2 + b^2$.
explicacion: |
  El exponente $2$ indica que la base $(a+b)$ se usa como factor dos veces. Al aplicar la propiedad distributiva a $(a+b)(a+b)$, obtenemos cuatro términos: $a^2 + ab + ba + b^2$. Puesto que $ab$ y $ba$ son términos semejantes y equivalentes, esto se reduce a $a^2 + 2ab + b^2$.
  Esto significa que siempre que elevemos un binomio al cuadrado, aparecerá un 'término central' o doble producto que muchas veces se omite por error.
procedimiento: |
  Para entender la definición:
  1. Identifica la expresión como una potencia con base binomio y exponente 2.
  2. Descomponla en factores repetidos: $(A+B)(A+B)$.
  3. Reconoce que desarrollar esto producirá términos cruzados.
ejemplos:
  - titulo: 'Expansión conceptual'
    enunciado: 'Expresa conceptualmente qué significa $(3x + 5y)^2$.'
    solucion_pasos:
      - 'Identificamos que la base es $3x + 5y$.'
      - 'Significa $(3x + 5y)(3x + 5y)$.'
errores_frecuentes:
  - 'Pensar que el exponente se distribuye sobre la suma: $(a+b)^2 = a^2 + b^2$.'
