semantic_id: MAT.ALG.LENGUAJE_RELACIONES.PARES_CONSECUTIVOS
titulo: Representación de números pares consecutivos
objetivo: Modelar una serie de números pares que se suceden entre sí.
introduccion: Si estamos contando de dos en dos (2, 4, 6, 8.), ya no nos sirve sumar de a 1. El salto
  entre números de la misma familia de paridad es mayor.
resumen: 'Los **Números Pares Consecutivos** se distancian siempre en **2 unidades**. Para modelarlos,
  anclamos el primer número como par ($2n$) y le sumamos $2, 4, 6.$ obteniendo: **$2n$, $2n+2$, $2n+4$**.'
explicacion: '### Definición formal


  Entre un par y el siguiente (ej. entre 6 y 8) hay una distancia exacta de 2 unidades, por eso se modela
  como $2n$, luego $2n+2$, etc.


  ### Desarrollo didáctico


  Construcción lógica:

  1. El primer número debe ser garantizado par: $2n$.

  2. ¿Cuál es el siguiente número par? Si le sumo 1 ($2n+1$) caigo en un impar. Debo sumarle 2.

  3. El segundo par consecutivo es: $2n+2$.

  4. El tercer par consecutivo es: $2n+4$.


  Si el problema es más permisivo y no exige que las letras representen ''cualquier entero'', a veces
  verás que usan $x, x+2, x+4$ asumiendo tácitamente que ''x'' ya es par de antemano.'
procedimiento:
- 'Paso 1: Establece el primer número como 2n (el primer par).'
- 'Paso 2: Suma 2 para hallar el segundo (2n + 2).'
- 'Paso 3: Suma 4 para hallar el tercero (2n + 4), y así sucesivamente.'
- 'Paso 4: Relaciona estos bloques según lo pida el enunciado (suma, resta, producto).'
ejemplos:
- titulo: Sumando saltos pares
  enunciado: 'Traduce algebraicamente: ''La suma de tres pares consecutivos''.'
  solucion_pasos:
  - 'Primer par: 2n.'
  - 'Segundo par: 2n + 2.'
  - 'Tercer par: 2n + 4.'
  - 'Suma total: 2n + (2n + 2) + (2n + 4).'
  - 'Reducido: 6n + 6.'
- titulo: 'Un problema geométrico indica: ''Las longitudes de los tres lados de un triángulo son números'
  enunciado: 'Un problema geométrico indica: ''Las longitudes de los tres lados de un triángulo son números
    pares consecutivos. Si su perímetro es $60$ cm, halla la ecuación correspondiente''. Si el lado más
    pequeño es $2x$, ¿cuál es la ecuación para resolver el perímetro? (v1)


    Opciones: A) $2x + (2x + 2) + (2x + 4) = 60$ · B) $2x + 2(x + 1) + 2(x + 2) = 60$ · C) $2x + (2x +
    1) + (2x + 2) = 60$ · D) $x + (x + 2) + (x + 4) = 60$'
  solucion_pasos:
  - Los tres pares consecutivos, partiendo del menor $2x$, son $2x, 2x+2, 2x+4$. Al sumarlos para igualarlos
    al perímetro 60, obtenemos la opción A. (La opción B matemáticamente equivale a la A, pero está factorizada
    innecesariamente; la A es la traducción directa más pulcra).
  - 'Respuesta: $2x + (2x + 2) + (2x + 4) = 60$'
- titulo: 'Respecto de «Representación de números pares consecutivos»: ¿La siguiente formulación es cor'
  enunciado: 'Respecto de «Representación de números pares consecutivos»: ¿La siguiente formulación es
    correcta? «Los **Números Pares Consecutivos** se distancian siempre en **2 unidades**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Los **Números Pares Consecutivos** se distancian
    siempre en **2 unidades**.'
- titulo: 'Respecto de «Representación de números pares consecutivos»: ¿La siguiente conclusión es corr'
  enunciado: 'Respecto de «Representación de números pares consecutivos»: ¿La siguiente conclusión es
    correcta? «Traducirlos como $2n, 2n+1, 2n+2$. (Aquí estás alternando par-impar-par)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Los **Números Pares Consecutivos** se distancian
    siempre en **2 unidades**.'
errores_frecuentes:
- Traducirlos como $2n, 2n+1, 2n+2$. (Aquí estás alternando par-impar-par).
- Confundirlos con enteros consecutivos ($x, x+1, x+2$).
- Para «¿Cuál es el intervalo matemático o 'salto' necesario para avanzar desde un número par cualquiera
  hacia su par consecutivo inmediato en la recta numérica? (v1)», la respuesta correcta es Un salto de
  $1$ unidad.
- Para «¿Cuál es el intervalo matemático o 'salto' necesario para avanzar desde un número par cualquiera
  hacia su par consecutivo inmediato en la recta numérica? (v1)», la respuesta correcta es Un salto de
  $4$ unidades.
- Multiplicar el número por $2$.
fuente: Álgebra de Baldor.
estado: publicado
