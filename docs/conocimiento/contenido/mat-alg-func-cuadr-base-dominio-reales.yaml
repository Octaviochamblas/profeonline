semantic_id: MAT.ALG.FUNC_CUADR_BASE.DOMINIO_REALES
titulo: Determinación del dominio real de una función cuadrática
objetivo: Determinar el dominio de una función cuadrática, reconociendo que siempre corresponde a todos los números
  reales.
introduccion: A diferencia de otras funciones (como las racionales o las con raíces), la función cuadrática nunca
  tiene restricciones sobre qué valores de $x$ puede recibir.
resumen: El **dominio** de cualquier función cuadrática $f(x)=ax^2+bx+c$ es siempre el conjunto de todos los números
  reales, $\text{Dom}(f)=\mathbb{R}$, sin excepción.
explicacion: '### Definición formal


  Para toda función cuadrática $f(x)=ax^2+bx+c$, la expresión $ax^2+bx+c$ está definida y produce un resultado
  real para cualquier valor de $x \in \mathbb{R}$, ya que solo involucra multiplicaciones, potencias y sumas.
  Por tanto, $\text{Dom}(f)=\mathbb{R}$.


  ### Desarrollo didáctico


  A diferencia de funciones con denominadores (que excluyen valores que anulan el denominador) o con raíces cuadradas
  (que exigen expresiones no negativas), un polinomio de cualquier grado no tiene ninguna operación que restrinja
  su dominio.


  Para $f(x)=5x^2-3x+8$, no existe ningún valor de $x$ que genere una operación indefinida; por tanto, $\text{Dom}(f)=\mathbb{R}$.'
procedimiento:
- 'Paso 1: Verifica que la regla de la función sea un polinomio (sin denominadores ni raíces con la variable).'
- 'Paso 2: Concluye que el dominio es $\mathbb{R}$, sin necesidad de excluir ningún valor.'
ejemplos:
- titulo: Determinación del dominio de una función cuadrática simple
  enunciado: 'Determina el dominio de $f(x)=x^2-9$.'
  solucion_pasos:
  - Es un polinomio, sin denominadores ni raíces con $x$.
  - '$\text{Dom}(f)=\mathbb{R}$.'
- titulo: Determinación del dominio con coeficientes distintos
  enunciado: 'Determina el dominio de $f(x)=-3x^2+7x-2$.'
  solucion_pasos:
  - Es un polinomio de segundo grado, definido para todo $x$ real.
  - '$\text{Dom}(f)=\mathbb{R}$.'
- titulo: ¿Existe alguna función cuadrática cuyo dominio no sea todo $\mathbb{R}$?
  enunciado: ¿Existe alguna función cuadrática cuyo dominio no sea todo $\mathbb{R}$?
  respuesta: 'No'
  solucion_pasos:
  - Por definición, toda función cuadrática es un polinomio de grado 2, y todo polinomio está definido para cualquier
    número real.
- titulo: ¿El dominio de una función cuadrática depende del signo de sus coeficientes?
  enunciado: ¿El dominio de una función cuadrática depende del signo de sus coeficientes?
  respuesta: 'No'
  solucion_pasos:
  - Sin importar los valores o signos de $a$, $b$ y $c$, el dominio siempre es $\mathbb{R}$.
errores_frecuentes:
- Confundir el dominio (siempre $\mathbb{R}$) con el recorrido, que sí depende de los coeficientes de la función.
- Buscar restricciones de dominio como si la función tuviera una raíz cuadrada o un denominador.
- Excluir por error el cero u otros valores particulares sin ninguna justificación matemática.
- Confundir el dominio de la función cuadrática con el dominio restringido de un problema aplicado (contexto).
