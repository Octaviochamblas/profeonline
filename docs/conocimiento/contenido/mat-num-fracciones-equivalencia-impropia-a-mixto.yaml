semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.IMPROPIA_A_MIXTO
titulo: Transformación de fracción impropia a número mixto
objetivo: Convertir una fracción impropia en un número mixto equivalente.
introduccion: Cuando el numerador supera al denominador, la fracción representa más de un entero completo;
  expresarla como número mixto separa esa parte entera de la fracción restante.
resumen: 'Para convertir una fracción impropia \(\frac{a}{b}\) a número mixto se divide \(a\) entre \(b\):
  el cociente es la parte entera y el resto sobre \(b\) es la parte fraccionaria.'
explicacion: '### Definición formal


  Si \(a=b\cdot n+r\) con \(0\le r<b\) (división entera de \(a\) por \(b\)), entonces \(\frac{a}{b}=n\frac{r}{b}\).


  ### Desarrollo didáctico


  \(\frac{17}{4}\): al dividir 17 entre 4 se obtiene cociente 4 y resto 1, porque \(4\cdot4+1=17\). Por
  lo tanto \(\frac{17}{4}=4\frac{1}{4}\).'
procedimiento:
- 'Paso 1: Divide el numerador por el denominador.'
- 'Paso 2: Usa el cociente como parte entera y el resto como nuevo numerador.'
- 'Paso 3: Conserva el denominador y verifica que parte entera más fracción recupere la impropia.'
ejemplos:
- titulo: Aplicación razonada — Conversión de fracción impropia a número mixto
  enunciado: \(\frac{17}{4}=4\frac{1}{4}\).
  solucion_pasos:
  - Divide el numerador por el denominador.
  - Usa el cociente como parte entera y el resto como nuevo numerador.
  - Conserva el denominador y verifica que parte entera más fracción recupere la impropia.
- titulo: Revisión de una solución — Conversión de fracción impropia a número mixto
  enunciado: Una solución aplica “Usa el cociente como parte entera y el resto como nuevo numerador.”,
    pero termina sin comprobar que la parte fraccionaria del número mixto debe quedar como fracción propia.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conversión de fracción impropia a número mixto: para convertir una
    fracción impropia a número mixto se divide el numerador por el denominador y se usa el resto como
    numerador de la parte fraccionaria.'
  - Divide el numerador por el denominador.
  - 'Completa la revisión con este control: Conserva el denominador y verifica que parte entera más fracción
    recupere la impropia.'
- titulo: ¿Se cumple que la parte fraccionaria del número mixto debe quedar como fracción propia? — Conversión
    de fracción impropia a número mixto
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para convertir una fracción impropia a número mixto se
    divide el numerador por el denominador y se usa el resto como numerador de la parte fraccionaria.
  - El caso “\(\frac{17}{4}=4\frac{1}{4}\)” satisface esa condición.
  - Conserva el denominador y verifica que parte entera más fracción recupere la impropia.
- titulo: ¿Es válido omitir el paso “Divide el numerador por el denominador”? — Conversión de fracción
    impropia a número mixto
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conversión de fracción impropia a número mixto.
  - 'Omitirlo puede volver inválida la acción siguiente: Usa el cociente como parte entera y el resto
    como nuevo numerador.'
  - 'La solución debe terminar de este modo: Conserva el denominador y verifica que parte entera más fracción
    recupere la impropia.'
errores_frecuentes:
- 'Empezar conversión de fracción impropia a número mixto sin realizar este control inicial: Divide el
  numerador por el denominador.'
- Memorizar “\(\frac{17}{4}=4\frac{1}{4}\)” como respuesta aislada, sin reconstruir la definición que
  lo justifica.
- Convertir en receta el paso “Usa el cociente como parte entera y el resto como nuevo numerador.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre conversión de fracción impropia a número mixto que contradice el
  criterio “La parte fraccionaria del número mixto debe quedar como fracción propia”.
- 'Cerrar el ejercicio sin esta comprobación específica: Conserva el denominador y verifica que parte
  entera más fracción recupere la impropia.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
