semantic_id: MAT.GEO.ESPACIO_FUNDAMENTOS.PLANO_ESPACIO
titulo: Concepto de plano en el espacio
objetivo: Reconocer el plano como una superficie infinita y bidimensional dentro del espacio tridimensional,
  determinada por tres puntos no alineados.
introduccion: 'El plano es a la geometría del espacio lo que una hoja infinita y perfectamente plana sería:
  una superficie que se extiende en todas direcciones sin curvarse ni tener bordes.'
resumen: Un plano en el espacio es una superficie bidimensional infinita, sin curvatura ni bordes, determinada
  por tres puntos no alineados o por una recta y un punto exterior a ella.
explicacion: '![Plano en el espacio](/static/img/geometria/espacio-cuerpos/espacio-plano.svg)


  ### Definición formal


  Un plano $\alpha$ es una superficie infinita y bidimensional, sin curvatura, que se extiende en todas
  direcciones. Queda determinado de forma única por tres puntos no alineados, por dos rectas que se cruzan,
  o por una recta y un punto exterior a ella.


  ### Desarrollo didáctico


  En la figura, el plano $\alpha$ contiene la cara superior de un cuerpo geométrico (los cuatro vértices
  D, C, G y H), representando una porción visible de ese plano infinito, que en realidad se extendería
  más allá de los límites del cuerpo geométrico.'
procedimiento:
- 'Paso 1: Identifica al menos tres puntos no alineados (o dos rectas que se cruzan) que determinen el
  plano.'
- 'Paso 2: Reconoce que el plano se extiende infinitamente en todas direcciones, más allá de la región
  visible en la figura.'
- 'Paso 3: Denota el plano con una letra griega minúscula (como α, β) o mediante tres de sus puntos.'
ejemplos:
- titulo: Identificar un plano mediante tres puntos
  enunciado: Los puntos D, C y G no están alineados.
  solucion_pasos:
  - Estos tres puntos no alineados determinan un único plano α que los contiene a todos.
- titulo: Reconocer la cara de un cuerpo geométrico como parte de un plano
  enunciado: La cara superior de un prisma es una región plana limitada por cuatro vértices.
  solucion_pasos:
  - Esa cara es una porción visible del plano α, que en realidad se extiende infinitamente más allá de
    los límites del prisma.
- titulo: ¿Tres puntos alineados determinan un único plano?
  respuesta: 'No'
  solucion_pasos:
  - No, tres puntos alineados (colineales) no determinan un plano único, ya que infinitos planos distintos
    pueden contener esa misma recta.
- titulo: ¿Un plano tiene bordes o límites?
  respuesta: 'No'
  solucion_pasos:
  - No, un plano es infinito y no tiene bordes; lo que se dibuja en las figuras es solo una porción representativa.
errores_frecuentes:
- Confundir el plano (infinito) con una cara de un cuerpo geométrico (una región finita y limitada).
- Creer que tres puntos cualesquiera determinan un plano único, sin verificar que no estén alineados.
- Olvidar que un plano se extiende en todas direcciones, no solo dentro de los límites dibujados en la
  figura.
fuente: 'Elaboración propia (referencia: Cid 167).'
estado: publicado
