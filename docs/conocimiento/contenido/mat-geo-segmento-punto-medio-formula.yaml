semantic_id: MAT.GEO.SEGMENTO_METRICA.PUNTO_MEDIO_FORMULA
titulo: Fórmula de las coordenadas del punto medio de un segmento
objetivo: Reconocer y comprender la fórmula que permite calcular las coordenadas del punto medio de un
  segmento a partir de las coordenadas de sus extremos.
introduccion: El punto medio de un segmento es simplemente el 'promedio' de las coordenadas de sus dos
  extremos.
resumen: Las coordenadas del punto medio $M$ de un segmento con extremos $A(x_1,y_1)$ y $B(x_2,y_2)$ son
  $M=\left(\frac{x_1+x_2}{2},\frac{y_1+y_2}{2}\right)$.
explicacion: '![Fórmula del punto medio de un segmento](/static/img/geometria/cartesiano-vectores/segmento-punto-medio-formula.svg)


  ### Definición formal


  El punto medio $M$ de un segmento $AB$, con $A(x_1,y_1)$ y $B(x_2,y_2)$, tiene coordenadas $M=\left(\frac{x_1+x_2}{2},\frac{y_1+y_2}{2}\right)$:
  el promedio de las abscisas y el promedio de las ordenadas.


  ### Desarrollo didáctico


  En la figura, el punto medio $M$ del segmento $AB$ se ubica exactamente a la misma distancia de $A$
  que de $B$, calculado promediando cada coordenada por separado.'
procedimiento:
- 'Paso 1: Identifica las coordenadas de los dos extremos del segmento: A(x₁,y₁) y B(x₂,y₂).'
- 'Paso 2: Calcula el promedio de las abscisas: (x₁+x₂)/2.'
- 'Paso 3: Calcula el promedio de las ordenadas: (y₁+y₂)/2, obteniendo así las coordenadas completas del
  punto medio M.'
ejemplos:
- titulo: Plantear la fórmula del punto medio con dos puntos genéricos
  enunciado: Se tienen los puntos A(x₁,y₁) y B(x₂,y₂).
  solucion_pasos:
  - El punto medio es M=((x₁+x₂)/2, (y₁+y₂)/2), el promedio de cada coordenada.
- titulo: Reconocer la equidistancia del punto medio
  enunciado: M es el punto medio del segmento AB.
  solucion_pasos:
  - M está exactamente a la misma distancia de A que de B, dividiendo el segmento en dos partes iguales.
- titulo: ¿El punto medio se calcula promediando cada coordenada por separado?
  respuesta: Sí
  solucion_pasos:
  - Sí, se promedian las abscisas por un lado y las ordenadas por otro, de forma independiente.
- titulo: ¿El punto medio siempre está sobre el segmento AB?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición, el punto medio siempre pertenece al segmento que conecta A y B.
errores_frecuentes:
- Sumar ambas coordenadas x e y juntas antes de dividir, en vez de promediarlas por separado.
- Olvidar dividir entre 2 después de sumar las coordenadas correspondientes.
- Confundir la fórmula del punto medio con la de la distancia entre dos puntos.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Cid 75).'
estado: publicado
