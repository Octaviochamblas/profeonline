semantic_id: MAT.ALG.COMPOSICION_FUNCIONES.RESTRICCION_FUNCION_INTERNA
titulo: Análisis de restricción de dominio de la función interna
objetivo: Identificar y aplicar la restricción de dominio propia de la función interna dentro de una composición.
introduccion: La primera regla que nunca se puede saltar en una composición es respetar las restricciones
  propias de la función que actúa primero.
resumen: Al construir el dominio de $(f\circ g)(x)$, la primera restricción a considerar es la del **dominio
  propio de la función interna** $g$, ya que $x$ debe ser un valor válido para $g$ antes de cualquier
  otra consideración.
explicacion: '### Definición formal


  Para que $(f\circ g)(x)$ tenga sentido, se requiere primero que $x \in \text{Dom}(g)$; esta es una condición
  necesaria (aunque no suficiente por sí sola) para que la composición esté definida en $x$.


  ### Desarrollo didáctico


  Si la función interna $g$ ya tiene restricciones propias (como una raíz o una fracción), esas restricciones
  se heredan automáticamente a la composición completa, sin importar qué tan simple sea la función externa
  $f$.


  Si $g(x)=\sqrt{x-4}$ (dominio $[4,+\infty[$) y $f(x)=x+10$ (sin restricciones): la composición $(f\circ
  g)(x)=\sqrt{x-4}+10$ hereda la restricción $x\geq4$ directamente de $g$, aunque $f$ no imponga ninguna
  restricción propia.'
procedimiento:
- 'Paso 1: Identifica las restricciones propias de la función interna $g$ (divisiones, raíces de índice
  par, etc.).'
- 'Paso 2: Esas restricciones deben cumplirse siempre, sin importar la función externa $f$.'
- 'Paso 3: Inclúyelas como parte del dominio final de la composición.'
ejemplos:
- titulo: Restricción heredada de una raíz
  enunciado: Si $g(x)=\sqrt{x+6}$ y $f(x)=2x$, ¿qué restricción del dominio de $g$ se hereda a $(f\circ
    g)(x)$?
  solucion_pasos:
  - El dominio de $g$ exige $x+6\geq0$, es decir $x\geq-6$.
  - Esta restricción se hereda directamente a la composición.
- titulo: Restricción heredada de una fracción
  enunciado: Si $g(x)=\frac{1}{x-3}$ y $f(x)=x^2$, ¿qué restricción del dominio de $g$ se hereda a $(f\circ
    g)(x)$?
  solucion_pasos:
  - El dominio de $g$ exige $x\neq3$.
  - Esta restricción se hereda a la composición, independiente de que $f$ no tenga restricciones.
- titulo: ¿Las restricciones de la función interna siempre se heredan a la composición?
  enunciado: ¿Las restricciones de la función interna siempre se heredan a la composición?
  respuesta: Sí
  solucion_pasos:
  - Son una condición necesaria para que $x$ sea siquiera evaluable en $g$, el primer paso de la composición.
- titulo: ¿Puede una función externa sin restricciones eliminar las restricciones heredadas de la interna?
  enunciado: ¿Puede una función externa sin restricciones eliminar las restricciones heredadas de la interna?
  respuesta: 'No'
  solucion_pasos:
  - Las restricciones de la función interna siempre deben respetarse, independientemente de las propiedades
    de la función externa.
errores_frecuentes:
- Ignorar las restricciones propias de la función interna al determinar el dominio de la composición.
- Suponer que si la función externa no tiene restricciones, la composición tampoco las tiene.
- Confundir las restricciones de la función interna con las de la externa.
- Olvidar intersectar esta restricción con las que eventualmente imponga la función externa.
