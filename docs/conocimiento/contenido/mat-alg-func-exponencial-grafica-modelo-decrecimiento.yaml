semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.MODELO_DECRECIMIENTO
titulo: Modelamiento de fenómenos de decaimiento mediante funciones exponenciales
objetivo: Plantear y resolver problemas de decaimiento (depreciación, desintegración) usando funciones exponenciales
  con base entre cero y uno.
introduccion: Así como una población puede crecer multiplicándose por un factor fijo, una cantidad también puede
  reducirse en la misma proporción cada período, como ocurre con la depreciación de un vehículo o la desintegración
  radiactiva.
resumen: Un modelo de decaimiento se expresa como $C(t)=C_0\cdot(1-r)^t$, donde $C_0$ es el valor inicial, $r$
  es la tasa de decrecimiento (como decimal) y $t$ es el tiempo transcurrido.
explicacion: '### Definición formal


  Un fenómeno que disminuye una tasa fija $r$ (expresada como decimal) por cada unidad de tiempo se modela como
  $C(t)=C_0\cdot(1-r)^t$, donde la base $b=1-r$ cumple $0<b<1$ (suponiendo $0<r<1$), garantizando decrecimiento.


  ### Desarrollo didáctico


  Para plantear el modelo, se identifica el valor inicial y la tasa de decrecimiento porcentual, restándola de
  1 (en su forma decimal) para obtener la base.


  Un vehículo de $\$10.000.000$ se deprecia un $15\%$ anual: el modelo es $V(t)=10.000.000\cdot(0{,}85)^t$, con
  base $b=1-0{,}15=0{,}85$.'
procedimiento:
- 'Paso 1: Identifica el valor inicial $C_0$ y la tasa de decrecimiento porcentual $r\%$.'
- 'Paso 2: Convierte la tasa a decimal y calcula la base $b=1-r$.'
- 'Paso 3: Plantea el modelo $C(t)=C_0\cdot b^t$.'
- 'Paso 4: Evalúa el modelo en el tiempo solicitado.'
ejemplos:
- titulo: Cálculo de valor tras depreciación
  enunciado: 'Un computador de $\$800.000$ se deprecia un $20\%$ anual. Calcula su valor después de $3$ años.'
  solucion_pasos:
  - 'Modelo: $V(t)=800.000\cdot(0{,}8)^t$.'
  - '$V(3)=800.000\cdot(0{,}8)^3=800.000\cdot0{,}512=\$409.600$.'
- titulo: Cálculo de masa restante en desintegración
  enunciado: 'Una muestra radiactiva de $100$ g pierde un $10\%$ de su masa cada hora. Calcula la masa después
    de $2$ horas.'
  solucion_pasos:
  - 'Modelo: $M(t)=100\cdot(0{,}9)^t$.'
  - '$M(2)=100\cdot(0{,}9)^2=100\cdot0{,}81=81$ g.'
- titulo: ¿La base de un modelo de decaimiento con tasa $r\%$ es siempre $1-r$ (en decimal)?
  enunciado: ¿La base de un modelo de decaimiento con tasa $r\%$ es siempre $1-r$ (en decimal)?
  respuesta: Sí
  solucion_pasos:
  - Restar la tasa decimal a 1 representa el 100% original menos el porcentaje que se pierde.
- titulo: ¿Un valor que se reduce a la mitad cada período corresponde a una base igual a $0{,}5$?
  enunciado: ¿Un valor que se reduce a la mitad cada período corresponde a una base igual a $0{,}5$?
  respuesta: Sí
  solucion_pasos:
  - Reducirse a la mitad significa multiplicar por 0,5 en cada unidad de tiempo, lo que corresponde a $b=0{,}5$.
errores_frecuentes:
- Sumar la tasa en vez de restarla al construir la base del modelo de decaimiento.
- Confundir la tasa de decrecimiento $r$ con la base $b=1-r$ del modelo.
- Usar directamente el porcentaje (por ejemplo, 20) en vez de su forma decimal (0,2).
- No verificar que la tasa $r$ sea menor que 1, lo que produciría una base negativa inválida.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
