semantic_id: MAT.NUM.PROG_GEOMETRICA.RAZON_GEOMETRICA
objetivo: Calcular correctamente la razón geométrica (r) a partir de términos consecutivos
  o distantes.
introduccion: Si ves los números 3, 12, 48... sabes que algo se está multiplicando
  rápido. Descubrir por qué número se está multiplicando es aislar la 'Razón Geométrica',
  la huella digital de esta secuencia.
resumen: 'La razón se calcula **dividiendo** un término por su inmediato anterior:
  $r = \frac{a_n}{a_{n-1}}$. Si los términos no están seguidos, las reglas de potencias
  y raíces son necesarias para descubrir ''r''.'
explicacion: "1. **Términos Juntos:** \nSi te dan $5, 35, 245\\dots$ es fácil. \n\
  - $r = 35 / 5 = 7$.\n\n2. **Términos Separados (¡Ojo!):**\nSi te dan $a_1 = 2$ y\
  \ de pronto te dicen que $a_3 = 18$. ¿Cuál es la razón?\n- Piensa: para llegar de\
  \ $a_1$ a $a_3$ tuviste que multiplicar por '$r$' dos veces (dos saltos). \n- Es\
  \ decir: $a_1 \\cdot r \\cdot r = a_3 \\rightarrow 2 \\cdot r^2 = 18$.\n- Despejamos:\
  \ $r^2 = 18 / 2 = 9$. \n- Si $r^2 = 9$, entonces $r$ puede ser $3$ (o $-3$).\n\n\
  Este es el principio general: la distancia de posiciones indica el exponente de\
  \ '$r$'."
procedimiento:
- 'Paso 1: Si tienes términos vecinos (como el 2do y el 1ro), simplemente divide el
  de la derecha entre el de la izquierda.'
- 'Paso 2: Si tienes términos separados (ej. $a_4$ y $a_1$), divide el mayor entre
  el menor para aislar $r^{\Delta n}$.'
- 'Paso 3: Aplica raíz para despejar ''r'' (Si la distancia es 3 saltos, sacas raíz
  cúbica).'
ejemplos:
- titulo: A un salto de distancia
  enunciado: Calcula la razón de la P.G. donde a_2 = -12 y a_3 = 36.
  solucion_pasos:
  - Están juntos, así que es directo.
  - r = a3 / a2 = 36 / -12
  - r = -3.
errores_frecuentes:
- Restar los términos en lugar de dividirlos (creyendo que es aritmética).
- Al despejar $r^2$, olvidar que la razón podría ser un número negativo alternante
  ($-3$ al cuadrado también da $9$).
fuente: Currículum Nacional MINEDUC.
estado: publicado
