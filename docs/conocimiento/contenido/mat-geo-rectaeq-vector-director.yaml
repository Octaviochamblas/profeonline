semantic_id: MAT.GEO.RECTA_ECUACIONES.VECTOR_DIRECTOR
titulo: Identificación del vector director de una recta en el plano
objetivo: Identificar el vector director de una recta, que indica su dirección, a partir de su pendiente
  o de dos puntos que pertenecen a ella.
introduccion: 'Además de la pendiente, una recta puede describirse mediante un vector que apunta en su
  misma dirección: el vector director, base de las formas vectorial y paramétrica.'
resumen: El vector director de una recta es cualquier vector $\vec{d}=(d_1,d_2)$ paralelo a la recta,
  es decir, que apunta en su misma dirección.
explicacion: '![Vector director de una recta](/static/img/geometria/analitica/rectaeq-vector-director.svg)


  ### Definición formal


  Si una recta tiene pendiente $m=\dfrac{d_2}{d_1}$, entonces $\vec{d}=(d_1,d_2)$ es un vector director
  válido. También se puede obtener restando las coordenadas de dos puntos de la recta: $\vec{d}=(x_2-x_1,y_2-y_1)$.


  ### Desarrollo didáctico


  En la figura, la recta con pendiente $m=0{,}75$ tiene como vector director, por ejemplo, $\vec{d}=(4,3)$,
  ya que $\dfrac{3}{4}=0{,}75$.'
procedimiento:
- 'Paso 1: Identifica la pendiente m de la recta (o dos puntos que pertenezcan a ella).'
- 'Paso 2: Si tienes la pendiente, elige un vector (d1,d2) tal que d2/d1=m.'
- 'Paso 3: Si tienes dos puntos, calcula el vector restando sus coordenadas: (x2-x1, y2-y1).'
ejemplos:
- titulo: Obtener un vector director a partir de la pendiente
  enunciado: m=0,75.
  solucion_pasos:
  - Un vector director válido es (4,3), ya que 3/4=0,75.
- titulo: Obtener un vector director a partir de dos puntos
  enunciado: P1(1,2), P2(5,8).
  solucion_pasos:
  - El vector director es (5-1, 8-2)=(4,6).
- titulo: ¿Existe un único vector director para una recta dada?
  respuesta: 'No'
  solucion_pasos:
  - No, cualquier múltiplo no nulo de un vector director también es un vector director válido para la
    misma recta.
- titulo: ¿El vector director determina completamente la posición de la recta en el plano?
  respuesta: 'No'
  solucion_pasos:
  - No, el vector director solo determina la dirección; se necesita además un punto de la recta para ubicarla
    exactamente.
errores_frecuentes:
- Confundir el vector director con un vector normal (perpendicular) a la recta.
- Creer que existe un único vector director válido, sin reconocer sus múltiplos equivalentes.
- Olvidar que se necesita también un punto de la recta, además del vector director, para determinarla
  completamente.
fuente: Elaboración propia.
estado: publicado
