semantic_id: MAT.NUM.PROG_ARITMETICA.RECONOCIMIENTO
titulo: Reconocimiento de una progresión aritmética a partir de sus términos
objetivo: Auditar una lista de números para determinar rápidamente si califica o no como progresión aritmética.
introduccion: No todo lo que brilla es oro, y no toda secuencia que suma es aritmética. A veces un solo
  número fuera de lugar rompe toda la regla. Es hora de poner a prueba las secuencias.
resumen: Para reconocer una Progresión Aritmética (P.A.), es obligatorio comprobar que la diferencia 'd'
  sea idéntica a lo largo de TODOS los pares consecutivos entregados en el problema.
explicacion: 'Una trampa clásica en las pruebas es darte una secuencia que parece aritmética en sus primeros
  términos, pero falla al final.


  Secuencia sospechosa: $3, 7, 11, 16$

  1. $7 - 3 = 4$

  2. $11 - 7 = 4$

  3. $16 - 11 = 5$ $\rightarrow$ **¡Fallo!** Aunque empezó como P.A, no lo es. La regla se rompió.


  Otro caso de confusión son las sucesiones alternadas ($1, -1, 1, -1$). Al restar: $(-1) - 1 = -2$. Luego:
  $1 - (-1) = 2$. Como $-2$ es distinto de $2$, tampoco es una progresión aritmética.'
procedimiento:
- 'Paso 1: Calcula la diferencia entre el 2do y 1er término.'
- 'Paso 2: Calcula la diferencia entre el 3er y 2do término.'
- 'Paso 3: Continúa hasta agotar los números visibles.'
- 'Paso 4: Si absolutamente todas las restas dan el mismo número, puedes declararla oficialmente como
  P.A.'
ejemplos:
- titulo: Desenmascarando al infiltrado
  enunciado: ¿Es $1/2, 1, 3/2, 2, 5/2$ una Progresión Aritmética?
  solucion_pasos:
  - 'Pasamos a decimales para verlo fácil: 0.5, 1.0, 1.5, 2.0, 2.5.'
  - 1.0 - 0.5 = 0.5
  - 1.5 - 1.0 = 0.5
  - 2.0 - 1.5 = 0.5
  - 2.5 - 2.0 = 0.5
  - Sí lo es, la diferencia constante es 0.5 (o 1/2).
errores_frecuentes:
- Comprobar solo los primeros dos números y asumir que la regla se mantiene para el resto.
- 'Confundir una sucesión geométrica (donde se multiplica, ej: 2, 4, 8) con una aritmética.'
fuente: Currículum Nacional MINEDUC.
estado: publicado
