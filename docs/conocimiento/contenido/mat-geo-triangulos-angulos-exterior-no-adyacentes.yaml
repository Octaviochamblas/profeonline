semantic_id: MAT.GEO.TRIANGULOS_ANGULOS.ANGULO_EXTERIOR_NO_ADYACENTES
titulo: Propiedad del ángulo exterior como suma de los ángulos interiores no adyacentes
objetivo: Aplicar la propiedad que dice que un ángulo exterior es igual a la suma de los dos ángulos interiores
  que no lo tocan.
introduccion: 'Un ángulo exterior no solo es suplementario a su interior adyacente: también es exactamente
  igual a la suma de los otros dos ángulos interiores del triángulo, los que no comparten su vértice.'
resumen: Un ángulo exterior de un triángulo es igual a la suma de los dos ángulos interiores no adyacentes
  a él.
explicacion: '![Ángulo exterior = suma de interiores no adyacentes](/static/img/geometria/triangulos/triangulos-angulos-exterior-no-adyacentes.svg)


  ### Definición formal


  Si δ es el ángulo exterior en el vértice B de un triángulo ABC, entonces δ = α + γ, donde α y γ son
  los ángulos interiores en A y C (los que no comparten vértice con δ).


  ### Desarrollo didáctico


  Si α=40° y γ=35°, el ángulo exterior en B es δ=40°+35°=75°. Esto es consistente con el teorema de suplementariedad:
  el interior en B mide 180°−75°=105°, y en efecto 40°+35°+105°=180°.'
procedimiento:
- 'Paso 1: Identifica el ángulo exterior y ubica su vértice.'
- 'Paso 2: Identifica los dos ángulos interiores que NO comparten ese vértice.'
- 'Paso 3: Suma esos dos ángulos interiores para obtener el ángulo exterior.'
ejemplos:
- titulo: Calcular el ángulo exterior por suma
  enunciado: En un triángulo, los ángulos no adyacentes al exterior en B miden 40° y 35°.
  solucion_pasos:
  - El ángulo exterior en B mide 40°+35°=75°.
- titulo: Verificar con el ángulo interior
  enunciado: Comprueba que el resultado anterior sea consistente con β + δ = 180°.
  solucion_pasos:
  - β = 180°−75°=105°; y en efecto 40°+35°+105°=180°.
- titulo: ¿El ángulo exterior es igual a la suma de los interiores no adyacentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad directa del teorema de la suma de ángulos interiores.
- titulo: ¿Se usa el ángulo interior del mismo vértice en esta suma?
  respuesta: 'No'
  solucion_pasos:
  - No, se usan exclusivamente los otros dos ángulos interiores.
errores_frecuentes:
- Sumar el ángulo interior del mismo vértice en vez de los otros dos.
- Confundir esta propiedad con la de suplementariedad (β + δ = 180°).
- Usar solo uno de los dos ángulos no adyacentes en vez de ambos.
fuente: Elaboración propia.
estado: publicado
