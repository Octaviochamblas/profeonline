semantic_id: MAT.NUM.PROG_GEOMETRICA.DEFINICION
titulo: Definición de progresión geométrica mediante razón constante
objetivo: Reconocer las Progresiones Geométricas (P.G.) como sucesiones cuyo crecimiento es multiplicativo
  (razón constante).
introduccion: Mientras la progresión aritmética camina, la progresión geométrica vuela. Los virus, el
  interés compuesto de los bancos y las reacciones nucleares crecen de forma explosiva multiplicándose
  a sí mismas.
resumen: Una Progresión Geométrica (P.G.) es una sucesión donde para pasar de un término al siguiente
  no se suma, sino que se **MULTIPLICA** por un mismo número constante. Ese multiplicador se llama 'Razón'
  ($r$).
explicacion: "A diferencia de las aritméticas (que suman paso a pasito), las **Progresiones Geométricas**\
  \ se inflan rápidamente.\n\n- **La Prueba de Fuego:** Toma un término de la fila y divídelo por el que\
  \ está a su izquierda (Ej: $a_2 / a_1$). Si repites esto para cada par y siempre te da el mismo resultado,\
  \ es una P.G.\n- **La Razón ($r$):** Es ese factor por el cual se va multiplicando la fila. \n  - Si\
  \ $r > 1$, la secuencia explota y crece gigante (Ej: $2, 4, 8, 16\\dots$ aquí $r=2$).\n  - Si $0 < r\
  \ < 1$ (una fracción como $1/2$), la secuencia se va encogiendo hacia cero (Ej: $100, 50, 25, 12.5\\\
  dots$ aquí $r=0.5$).\n  - Si $r$ es negativo, la secuencia salta de positivo a negativo locamente (Ej:\
  \ $3, -6, 12, -24\\dots$ aquí $r=-2$)."
procedimiento:
- 'Paso 1: Para probar si una secuencia es Geométrica, toma el segundo término y divídelo por el primero
  ($a_2 / a_1$).'
- 'Paso 2: Toma el tercer término y divídelo por el segundo ($a_3 / a_2$).'
- 'Paso 3: Si ambos dan el mismo cociente exacto, entonces el patrón es multiplicativo por ese número
  ''r''.'
ejemplos:
- titulo: ¿Aritmética o Geométrica?
  enunciado: Verifica si la sucesión 5, 15, 45, 135 es aritmética o geométrica.
  solucion_pasos:
  - 'Prueba Aritmética (Restar): 15 - 5 = 10. 45 - 15 = 30. 10 y 30 son distintos. NO es Aritmética.'
  - 'Prueba Geométrica (Dividir): 15 / 5 = 3. 45 / 15 = 3. 135 / 45 = 3. Dan igual. SÍ es Geométrica (r=3).'
errores_frecuentes:
- Confundirlas con las aritméticas y tratar de buscar una 'suma constante' cuando en realidad crecen demasiado
  rápido para ser lineales.
- Dividir al revés (el primero dividido por el segundo), calculando la razón invertida.
fuente: Currículum Nacional MINEDUC.
estado: publicado
