semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.COMPARACION_GRAFICAS
titulo: Comparación integral de gráficas transformadas
objetivo: Describir de forma integrada todas las transformaciones aplicadas a $f(x)=a(x-h)^n+k$ respecto a la
  función básica.
introduccion: Ya conoces cada transformación por separado; ahora se combinan todas para describir completamente
  cómo se ve una función potencia transformada respecto a su versión básica.
resumen: Para comparar $f(x)=a(x-h)^n+k$ con $g(x)=x^n$, se analizan en conjunto el signo y magnitud de $a$
  (reflexión y dilatación/contracción), y los valores de $h$ y $k$ (traslación horizontal y vertical).
explicacion: '### Definición formal


  Dada $f(x)=a(x-h)^n+k$, la comparación completa con $g(x)=x^n$ requiere describir: (1) si $a<0$, hay reflexión
  respecto al eje $x$; (2) si $|a|>1$ o $|a|<1$, hay dilatación o contracción vertical; (3) el valor de $h$
  indica el desplazamiento horizontal; (4) el valor de $k$ indica el desplazamiento vertical.


  ### Desarrollo didáctico


  Para $f(x)=-2(x-1)^2+3$: el coeficiente $a=-2$ indica reflexión (por el signo) y dilatación (por $|{-2}|>1$);
  $h=1$ desplaza $1$ unidad a la derecha; $k=3$ desplaza $3$ unidades hacia arriba. El vértice, antes en
  $(0,0)$, ahora está en $(1,3)$, y la curva abre hacia abajo en vez de hacia arriba.'
procedimiento:
- 'Paso 1: Identifica el signo y la magnitud del coeficiente $a$.'
- 'Paso 2: Identifica los valores de $h$ y $k$ para las traslaciones.'
- 'Paso 3: Describe la combinación de todas las transformaciones respecto a la función básica $x^n$.'
ejemplos:
- titulo: Descripción integral de una transformación
  enunciado: 'Describe todas las transformaciones de $f(x)=3(x+2)^2-5$ respecto a $g(x)=x^2$.'
  solucion_pasos:
  - '$a=3>1$: dilatación vertical, sin reflexión.'
  - '$h=-2$: desplazamiento $2$ unidades a la izquierda; $k=-5$: desplazamiento $5$ unidades hacia abajo.'
- titulo: Descripción integral con reflexión y contracción
  enunciado: 'Describe todas las transformaciones de $f(x)=-0{,}5(x-4)^3+1$ respecto a $g(x)=x^3$.'
  solucion_pasos:
  - '$a=-0{,}5$: hay reflexión (signo negativo) y contracción vertical ($|{-0{,}5}|<1$).'
  - '$h=4$: desplazamiento $4$ unidades a la derecha; $k=1$: desplazamiento $1$ unidad hacia arriba.'
- titulo: ¿Es posible que una función tenga reflexión y dilatación simultáneamente?
  enunciado: ¿Puede una función potencia transformada presentar reflexión y dilatación vertical al mismo tiempo?
  respuesta: Sí
  solucion_pasos:
  - Ocurre cuando $a<-1$: el signo negativo produce reflexión y el valor absoluto mayor que $1$ produce dilatación.
- titulo: ¿El orden de las transformaciones afecta el resultado final de la gráfica?
  enunciado: ¿Cambia la gráfica final si se aplican las transformaciones en distinto orden (primero traslación,
    luego reflexión, o viceversa)?
  respuesta: 'No'
  solucion_pasos:
  - Siguiendo la forma estándar $a(x-h)^n+k$, el resultado final es el mismo independiente del orden de análisis.
errores_frecuentes:
- Analizar el coeficiente $a$ solo por su signo o solo por su magnitud, sin combinar ambos aspectos.
- Confundir el orden de $h$ y $k$ al describir las traslaciones.
- Olvidar mencionar alguna de las cuatro transformaciones al describir la gráfica completa.
- No verificar el nuevo punto de referencia $(h,k)$ como resumen de ambas traslaciones.
