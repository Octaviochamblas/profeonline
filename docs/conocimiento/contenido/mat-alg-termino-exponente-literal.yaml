semantic_id: MAT.ALG.TERMINO.EXPONENTE_LITERAL
objetivo: Reconocer y operar con los exponentes dentro de la parte literal, especialmente
  el exponente 'uno' implícito.
introduccion: 'Hemos dicho que las letras representan números. Pero a veces, una sola
  letra está multiplicándose por sí misma muchas veces. El pequeño número que flota
  arriba de la letra es un ahorrador de espacio profesional: el exponente.'
resumen: "El **Exponente** es el número pequeño en la esquina superior derecha de\
  \ una letra que indica cuántas veces esa letra se multiplica por sí misma. \n- **La\
  \ regla del exponente invisible:** Cuando una letra no tiene un exponente explícitamente\
  \ escrito, se asume matemáticamente que **su exponente es $1$**."
explicacion: "Análisis microscópico de una letra:\n- $x^3$ significa $x \\cdot x \\\
  cdot x$.\n- $a^4$ significa $a \\cdot a \\cdot a \\cdot a$.\n- Si ves la expresión\
  \ $5y$, la letra $y$ se ve solita. ¿Significa que su exponente es 0? ¡NO! Porque\
  \ todo número elevado a 0 se vuelve 1. Si fuera $y^0$, sería $5 \\cdot 1 = 5$, ¡la\
  \ letra desaparecería! \n- La letra sobrevive porque su exponente real es 1. $y$\
  \ es en realidad $y^1$. \n\nEntender el uno invisible es crucial para multiplicar\
  \ letras más adelante. Si multiplicas $x \\cdot x^2$, en realidad estás multiplicando\
  \ $x^1 \\cdot x^2$, lo que te da $x^3$. Si olvidas el uno, el cálculo fallará."
procedimiento:
- 'Paso 1: Mira la esquina superior derecha de cada letra en el término.'
- 'Paso 2: Si hay un número, ese es su exponente.'
- 'Paso 3: Si la esquina está vacía, dibuja mentalmente un ''1''. Jamás asumas que
  es un cero.'
ejemplos:
- titulo: Desenmascarando los unos
  enunciado: Extrae los exponentes individuales de las letras en el término -7ab^2c.
  solucion_pasos:
  - 'La ''a'' no tiene exponente visible. Por tanto, es a^1. Exponente: 1.'
  - 'La ''b'' tiene un 2. Exponente: 2.'
  - 'La ''c'' no tiene exponente visible. Es c^1. Exponente: 1.'
errores_frecuentes:
- Creer que una letra sin exponente tiene exponente 0.
- Confundir el coeficiente (el multiplicador que va adelante) con el exponente (el
  potenciador que va arriba). El 3 en $3x$ hace algo totalmente distinto al 3 en $x^3$.
fuente: Álgebra de Baldor.
estado: publicado
