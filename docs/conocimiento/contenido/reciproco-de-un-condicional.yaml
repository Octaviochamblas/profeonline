semantic_id: MAT.FUND.RAZONAMIENTO_LOGICO.CONDICIONAL_RECIPROCO
titulo: Recíproco de un condicional
objetivo: Obtener el recíproco de una proposición condicional intercambiando el antecedente y el consecuente.
introduccion: 'Imagina la siguiente regla: "Si está lloviendo, entonces el suelo está mojado". ¿Qué pasa
  si la leemos al revés? "Si el suelo está mojado, entonces está lloviendo".


  Aunque a veces parece que al leer una frase condicional al revés obtenemos lo mismo, esto no siempre
  es verdad. En matemáticas, la frase leída al revés (intercambiando el orden de las dos partes) se llama
  el recíproco del condicional.


  El recíproco es una nueva proposición y es sumamente importante entender que su valor de verdad no tiene
  por qué ser igual al del condicional original. ¡El suelo podría estar mojado porque alguien regó las
  plantas!'
resumen: 'El recíproco de un condicional $p \to q$ es la proposición condicional $q \to p$, obtenida al
  intercambiar el antecedente y el consecuente. En general, un condicional y su recíproco no son lógicamente
  equivalentes.

  '
explicacion: 'Dado un condicional de la forma $p \to q$, donde $p$ es el **antecedente** (hipótesis) y
  $q$ es el **consecuente** (tesis), podemos construir nuevas variaciones condicionales.


  El **recíproco** (o recíproca) de $p \to q$ se obtiene intercambiando las posiciones del antecedente
  y el consecuente.


  Formalmente:

  $$\text{Si el condicional original es } p \to q \text{, su recíproco es } q \to p$$


  **Independencia de los Valores de Verdad**

  Es un error conceptual común pensar que si una implicación $p \to q$ es verdadera, su recíproco $q \to
  p$ también debe serlo. Comparemos sus tablas de verdad:


  | $p$ | $q$ | Condicional: $p \to q$ | Recíproco: $q \to p$ |

  | :---: | :---: | :---: | :---: |

  | V | V | **V** | **V** |

  | V | F | **F** | **V** |

  | F | V | **V** | **F** |

  | F | F | **V** | **V** |


  Como podemos ver en la segunda y tercera fila, las columnas de resultados difieren. Por lo tanto, el
  condicional original y su recíproco **no son lógicamente equivalentes**:

  $$p \to q \not\equiv q \to p$$'
procedimiento:
- 'Paso 1: Identificar el antecedente ($p$) y el consecuente ($q$) en la proposición condicional original
  $p \to q$.'
- 'Paso 2: Intercambiar sus posiciones, colocando el consecuente original como el nuevo antecedente, y
  el antecedente original como el nuevo consecuente.'
- 'Paso 3: Escribir la nueva proposición condicional resultante: $q \to p$. En esquema: $p \to q \implies
  q \to p$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'Determina el recíproco del condicional: ''Si un número es divisible por 4, entonces es un
    número par''.'
  solucion_pasos:
  - 'Paso a: Identificamos los componentes: el antecedente $p$ es ''un número es divisible por 4'' y el
    consecuente $q$ es ''es un número par''.'
  - 'Paso b: Intercambiamos el orden de $p$ y $q$.'
  - 'Paso c: Escribimos el recíproco: ''Si un número es par, entonces es divisible por 4''.'
  - 'Paso d: Observamos que aunque el condicional original es verdadero, el recíproco es falso (por ejemplo,
    el número 6 es par pero no es divisible por 4).'
- titulo: Ejemplo 2
  enunciado: Escribe la proposición recíproca de $\neg p \to q$.
  solucion_pasos:
  - 'Paso a: Identificamos el antecedente: $\neg p$.'
  - 'Paso b: Identificamos el consecuente: $q$.'
  - 'Paso c: Intercambiamos ambos elementos.'
  - 'Paso d: La proposición recíproca obtenida es $q \to \neg p$.'
- titulo: ¿El recíproco de 'Si estudio, entonces apruebo' es 'Si apruebo, entonces estudio'?
  respuesta: Sí
  solucion_pasos:
  - 'Identificamos el antecedente: ''estudio''.'
  - 'Identificamos el consecuente: ''apruebo''.'
  - 'Intercambiamos el orden para formar el nuevo condicional: ''Si apruebo, entonces estudio''.'
  - Esta proposición es el recíproco de la original.
- titulo: ¿Es un condicional siempre equivalente a su recíproco?
  respuesta: 'No'
  solucion_pasos:
  - Construyendo la tabla de verdad de $p \to q$ y $q \to p$, vemos que para la asignación $p$ Verdadero
    y $q$ Falso (V, F), $p \to q$ es Falso y $q \to p$ es Verdadero.
  - Al diferir en sus valores de verdad, demostramos que $p \to q \not\equiv q \to p$, por lo que no son
    equivalentes en general.
errores_frecuentes:
- Creer que el condicional y su recíproco son equivalentes y usarlos indistintamente en demostraciones.
- Confundir el recíproco ($q \to p$) con el inverso ($\neg p \to \neg q$) o con el contrarrecíproco ($\neg
  q \to \neg p$).
- Negar los términos al formar el recíproco (escribiendo por ejemplo $\neg q \to \neg p$, lo cual es el
  contrarrecíproco, no el recíproco).
- Identificar de manera errónea el antecedente en frases que no tienen la estructura clásica 'Si... entonces...'
  (ej. 'q siempre que p').
- Pensar que si el recíproco es falso, la proposición original también debe ser falsa, cuando sus valores
  son lógicamente independientes.
fuente: Lógica Simbólica, Irving Copi, Capítulo 2
estado: publicado
