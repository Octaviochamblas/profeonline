semantic_id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.FACTOR_ESCALA_NOTABLES
titulo: Aplicación del factor de escala para calcular lados en triángulos notables no unitarios
objetivo: Calcular los lados de un triángulo notable escalado, usando un factor multiplicador k sobre
  las proporciones base.
introduccion: 'Las relaciones de los triángulos notables no están limitadas a un solo tamaño: cualquier
  triángulo semejante a un 45-45-90 o a un 30-60-90 conserva las mismas proporciones, multiplicadas por
  un factor de escala k.'
resumen: Si un triángulo notable se escala por un factor $k$, todos sus lados se multiplican por $k$,
  manteniendo las mismas proporciones angulares.
explicacion: '![Factor de escala en triángulos notables](/static/img/geometria/areas-pitagoras/notables-factor-escala.svg)


  ### Definición formal


  Un triángulo 45-45-90 con catetos $k$ tiene hipotenusa $k\sqrt2$; un triángulo 30-60-90 con cateto menor
  $k$ tiene cateto mayor $k\sqrt3$ e hipotenusa $2k$. El valor de $k$ es el factor de escala del triángulo
  específico.


  ### Desarrollo didáctico


  Un triángulo 45-45-90 con catetos de 9 cm corresponde a $k=9$ (ya que la forma base tiene catetos de
  longitud 1), por lo que su hipotenusa es $9\sqrt2\approx12,73$ cm. De igual modo, un triángulo 30-60-90
  con cateto menor de 4 cm corresponde a $k=4$, con cateto mayor $4\sqrt3\approx6,93$ cm e hipotenusa
  $8$ cm.'
procedimiento:
- 'Paso 1: Identifica qué triángulo notable es (45-45-90 o 30-60-90) y cuál lado conocido corresponde
  al factor k.'
- 'Paso 2: Aplica las proporciones fijas de ese triángulo notable, multiplicadas por k.'
- 'Paso 3: Calcula los lados restantes usando esas proporciones escaladas.'
ejemplos:
- titulo: Escalar un triángulo 45-45-90 con k=9
  enunciado: Un triángulo 45-45-90 tiene catetos de 9 cm.
  solucion_pasos:
  - k=9; hipotenusa=9√2≈12,73 cm.
- titulo: Escalar un triángulo 30-60-90 con k=4
  enunciado: Un triángulo 30-60-90 tiene cateto menor de 4 cm (k=4).
  solucion_pasos:
  - Cateto mayor=4√3≈6,93 cm; hipotenusa=8 cm.
- titulo: ¿El factor de escala afecta los ángulos del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, los ángulos se mantienen iguales; solo cambian las longitudes de los lados.
- titulo: ¿Dos triángulos notables del mismo tipo con distinto k son semejantes?
  respuesta: Sí
  solucion_pasos:
  - Sí, mantienen la misma forma (mismos ángulos), solo cambia su tamaño.
errores_frecuentes:
- Identificar mal cuál lado corresponde al factor k base.
- Aplicar la proporción de un triángulo 45-45-90 a uno que en realidad es 30-60-90 (o viceversa).
- Olvidar multiplicar todos los lados por el mismo factor k de forma consistente.
fuente: Elaboración propia.
estado: publicado
