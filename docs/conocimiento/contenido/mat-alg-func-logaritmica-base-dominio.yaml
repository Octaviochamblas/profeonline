semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.DOMINIO
titulo: Determinación del dominio de la función logarítmica
objetivo: Determinar el dominio de una función logarítmica básica, reconociendo que se restringe a los números
  reales positivos.
introduccion: A diferencia de la función exponencial (definida en todo $\mathbb{R}$), su inversa logarítmica hereda
  una restricción directa del recorrido de la exponencial, que nunca es cero ni negativo.
resumen: El **dominio** de la función logarítmica básica $f(x)=\log_b(x)$ es siempre el conjunto de los números
  reales positivos, $\text{Dom}(f)=\mathbb{R}^+=]0,+\infty[$.
explicacion: '### Definición formal


  Como $f(x)=\log_b(x)$ es la inversa de $g(x)=b^x$, el dominio de $f$ coincide con el recorrido de $g$, que
  es $]0,+\infty[$. Por lo tanto, $\log_b(x)$ solo está definido para $x>0$.


  ### Desarrollo didáctico


  El dominio restringido tiene sentido intuitivo: como ninguna potencia de una base positiva puede dar cero
  o un número negativo, no existe ningún exponente que responda "¿a qué potencia elevo $b$ para obtener $-3$
  (o $0$)?".


  Para $f(x)=\log_2(x)$, el dominio es $]0,+\infty[$; $\log_2(-4)$ y $\log_2(0)$ no están definidos.'
procedimiento:
- 'Paso 1: Identifica el argumento de la función logarítmica.'
- 'Paso 2: Exige que ese argumento sea estrictamente positivo.'
- 'Paso 3: El dominio de la función logarítmica básica es $]0,+\infty[$.'
ejemplos:
- titulo: Determinación del dominio de una función logarítmica básica
  enunciado: 'Determina el dominio de $f(x)=\log_5(x)$.'
  solucion_pasos:
  - El argumento es $x$, que debe ser positivo.
  - '$\text{Dom}(f)=]0,+\infty[$.'
- titulo: Verificación de un valor fuera del dominio
  enunciado: '¿Pertenece $x=-2$ al dominio de $f(x)=\log_3(x)$?'
  solucion_pasos:
  - '$-2$ no es positivo.'
  - No, $-2$ no pertenece al dominio.
- titulo: ¿El dominio de la función logarítmica coincide con el recorrido de la función exponencial correspondiente?
  enunciado: ¿El dominio de la función logarítmica coincide con el recorrido de la función exponencial correspondiente?
  respuesta: Sí
  solucion_pasos:
  - Al ser funciones inversas, el dominio de una coincide exactamente con el recorrido de la otra.
- titulo: ¿El valor $x=0$ pertenece al dominio de una función logarítmica básica?
  enunciado: ¿El valor $x=0$ pertenece al dominio de una función logarítmica básica?
  respuesta: 'No'
  solucion_pasos:
  - El dominio es estrictamente positivo, $]0,+\infty[$, excluyendo el cero.
errores_frecuentes:
- Incluir el cero o valores negativos en el dominio de la función logarítmica.
- Confundir el dominio de la función logarítmica con el de la función exponencial (que es $\mathbb{R}$).
- No verificar la positividad del argumento cuando este es una expresión más compleja que $x$.
- Usar corchetes en vez de paréntesis en el extremo cero del dominio, que no se incluye.
