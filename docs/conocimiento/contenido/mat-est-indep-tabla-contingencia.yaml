semantic_id: MAT.EST.INDEPENDENCIA_CONDICIONAL.TABLA_CONTINGENCIA
titulo: Cálculo de probabilidad condicional usando tablas de contingencia
objetivo: Calcular una probabilidad condicional directamente desde una tabla de contingencia, dividiendo
  una celda interior por el total marginal correspondiente.
introduccion: Las tablas de doble entrada son especialmente útiles para calcular probabilidades condicionales,
  ya que el total marginal de una fila o columna representa directamente el nuevo universo restringido.
resumen: Para calcular $P(A|B)$ desde una tabla de contingencia, se divide el valor de la celda que cruza
  $A$ y $B$ por el total marginal de la categoría $B$.
explicacion: '![Probabilidad condicional en tablas de contingencia](/static/img/probabilidad/independencia/indep-tabla-contingencia.svg)


  ### Definición formal


  $P(A|B)=\dfrac{\text{celda}(A,B)}{\text{total marginal de }B}$, donde el total marginal de B actúa como
  el nuevo denominador restringido.


  ### Desarrollo didáctico


  En la tabla de sexo y preferencia, para calcular $P(\text{Sí}|\text{Hombre})$: la celda (Sí,Hombre)=18,
  y el total marginal de ''Hombre'' es 30. Entonces $P(\text{Sí}|\text{Hombre})=\dfrac{18}{30}=0{,}6$.'
procedimiento:
- 'Paso 1: Identifica la celda interior que cruza el evento de interés con el evento condicionante.'
- 'Paso 2: Identifica el total marginal correspondiente al evento condicionante.'
- 'Paso 3: Divide el valor de la celda por ese total marginal para obtener la probabilidad condicional.'
ejemplos:
- titulo: Calcular P(Sí|Hombre) desde la tabla
  enunciado: Celda (Sí,Hombre)=18, total marginal 'Hombre'=30.
  solucion_pasos:
  - P(Sí|Hombre)=18/30=0,6.
- titulo: Calcular P(No|Mujer) desde la tabla
  enunciado: Celda (No,Mujer)=8, total marginal 'Mujer'=30.
  solucion_pasos:
  - P(No|Mujer)=8/30≈0,27.
- titulo: ¿El total marginal usado como denominador corresponde siempre al evento condicionante?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición del denominador en este método.
- titulo: ¿Se puede usar este método para verificar independencia entre las variables de la tabla?
  respuesta: Sí
  solucion_pasos:
  - Sí, comparando P(A|B) con la probabilidad marginal simple P(A).
errores_frecuentes:
- Usar el total general de la tabla en vez del total marginal correspondiente al evento condicionante.
- Confundir cuál celda corresponde a la combinación buscada.
- Invertir la fila y la columna al identificar el evento condicionante y el condicionado.
fuente: 'Elaboración propia (referencia: Moraleja 185).'
estado: publicado
