semantic_id: MAT.GEO.ANGULOS_CLASIFICACION.CONCAVO
titulo: Ángulo cóncavo con medida mayor que 180° y menor que 360°
objetivo: Clasificar un ángulo a partir de su medida y comprobar que requiere mirar la abertura mayor
  y no la menor entre los mismos lados.
introduccion: 'Entre dos rayos pueden existir dos recorridos posibles: uno corto y uno largo. El ángulo
  cóncavo aparece cuando estudiamos el recorrido grande. Para resolver situaciones de ángulo cóncavo con
  medida mayor que 180° y menor que 360° conviene mirar el dibujo con método, no solo por intuición.'
resumen: Un ángulo cóncavo mide más de 180° y menos de 360°. Como idea de control, requiere mirar la abertura
  mayor y no la menor entre los mismos lados.
explicacion: 'Un ángulo cóncavo mide más de 180° y menos de 360°.


  El ejemplo “si el recorrido elegido supera la media vuelta pero no completa un giro entero, el ángulo
  es cóncavo” no se resuelve por apariencia: se justifica usando la definición y revisando finalmente
  que requiere mirar la abertura mayor y no la menor entre los mismos lados.'
procedimiento:
- 'Paso 1: Lee o estima la abertura del ángulo en grados.'
- 'Paso 2: Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.'
- 'Paso 3: Asigna el nombre correcto y revisa que no contradiga el dibujo.'
ejemplos:
- titulo: Caso guiado — Ángulo cóncavo
  enunciado: Si el recorrido elegido supera la media vuelta pero no completa un giro entero, el ángulo
    es cóncavo.
  solucion_pasos:
  - Lee o estima la abertura del ángulo en grados.
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: Chequeo del procedimiento — Ángulo cóncavo
  enunciado: En la situación “si el recorrido elegido supera la media vuelta pero no completa un giro
    entero, el ángulo es cóncavo”, un compañero llega a la respuesta correcta pero no explica el paso
    decisivo. Reconstruye la justificación completa.
  solucion_pasos:
  - 'Parte de la definición: un ángulo cóncavo mide más de 180° y menos de 360°.'
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿La interpretación del dibujo es válida? — Ángulo cóncavo
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo cóncavo mide más de 180° y menos
    de 360°.'
  - En el caso “si el recorrido elegido supera la media vuelta pero no completa un giro entero, el ángulo
    es cóncavo” se observa que requiere mirar la abertura mayor y no la menor entre los mismos lados.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Se puede cerrar sin el control final? — Ángulo cóncavo
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulo cóncavo con medida mayor que 180°
    y menor que 360°.
  - Después del paso “Lee o estima la abertura del ángulo en grados.” todavía hace falta revisar “Compara
    la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
  - El cierre correcto exige “Asigna el nombre correcto y revisa que no contradiga el dibujo.”.
errores_frecuentes:
- Ángulo cóncavo significa confundirlo con cualquier ángulo 'grande' aunque mida menos de 180°.
- Para resolver ángulo cóncavo, basta con el paso “Lee o estima la abertura del ángulo en grados.” y no
  hace falta revisar “Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
- Si el dibujo parece claro, se puede ignorar que requiere mirar la abertura mayor y no la menor entre
  los mismos lados.
- Dos configuraciones distintas representan ángulo cóncavo solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Asigna el nombre correcto y revisa que no
  contradiga el dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
