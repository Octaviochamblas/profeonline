semantic_id: MAT.GEO.VECTORES_OPERATORIA.MODULO_VECTOR_ORIGEN
titulo: Cálculo del módulo de un vector representado desde el origen
objetivo: Calcular el módulo de un vector cuyo origen coincide con el origen del sistema cartesiano, aplicando
  el teorema de Pitágoras directamente a sus componentes.
introduccion: Cuando un vector 'parte desde cero', calcular su longitud es tan simple como aplicar el
  teorema de Pitágoras a sus dos componentes.
resumen: Si un vector $\vec{v}=(v_x,v_y)$ tiene su origen en el punto $(0,0)$, su módulo se calcula directamente
  como $|\vec{v}|=\sqrt{v_x^2+v_y^2}$.
explicacion: '![Módulo de un vector desde el origen](/static/img/geometria/cartesiano-vectores/vector-modulo-origen.svg)


  ### Definición formal


  Cuando el origen de un vector coincide con el origen del sistema cartesiano, sus componentes $(v_x,v_y)$
  coinciden con las coordenadas de su extremo, y el módulo se calcula directamente como $|\vec{v}|=\sqrt{v_x^2+v_y^2}$,
  sin necesidad de restar coordenadas.


  ### Desarrollo didáctico


  En la figura, el vector $\vec{v}=(4,3)$, anclado en el origen, tiene módulo $|\vec{v}|=\sqrt{4^2+3^2}=\sqrt{25}=5$.'
procedimiento:
- 'Paso 1: Verifica que el vector tenga su origen en el punto (0,0) del sistema cartesiano.'
- 'Paso 2: Identifica directamente sus componentes (vx,vy), que coinciden con las coordenadas de su extremo.'
- 'Paso 3: Aplica la fórmula |v|=√(vx²+vy²) para obtener el módulo.'
ejemplos:
- titulo: Calcular el módulo de un vector anclado en el origen
  enunciado: El vector v=(4,3) tiene su origen en (0,0).
  solucion_pasos:
  - '|v|=√(4²+3²)=√25=5.'
- titulo: Calcular el módulo con componentes negativas
  enunciado: El vector v=(-6,8) tiene su origen en (0,0).
  solucion_pasos:
  - '|v|=√((-6)²+8²)=√(36+64)=√100=10.'
- titulo: ¿Es necesario restar coordenadas cuando el vector parte del origen?
  respuesta: 'No'
  solucion_pasos:
  - No, las componentes ya coinciden directamente con las coordenadas del extremo, sin necesidad de restar
    nada.
- titulo: ¿Esta fórmula es un caso particular de la fórmula de distancia entre dos puntos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la fórmula de distancia aplicada específicamente cuando uno de los puntos es el origen (0,0).
errores_frecuentes:
- Restar innecesariamente las coordenadas del origen (que son ambas cero) antes de aplicar la fórmula.
- Confundir esta fórmula simplificada con la fórmula general para vectores no anclados en el origen.
- Olvidar elevar al cuadrado alguna de las dos componentes.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 123).'
estado: publicado
