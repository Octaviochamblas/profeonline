semantic_id: MAT.ALG.FUNC_POTENCIA_BASE.FORMA_GENERAL
titulo: Forma general de la función potencia
objetivo: Identificar los elementos $a$, $x$ y $n$ en la forma general $f(x)=a\cdot x^n$.
introduccion: Fijar una notación clara para cada elemento de la función potencia facilita reconocerla y
  analizarla en distintos contextos.
resumen: La forma general de la función potencia es $f(x)=a\cdot x^n$, donde $a$ es el coeficiente, $x$ la
  variable independiente y $n$ el exponente fijo.
explicacion: '### Definición formal


  En $f(x)=a\cdot x^n$, el coeficiente $a\in\mathbb{R}\setminus\{0\}$ escala verticalmente la función, la
  variable $x$ es la variable independiente y $n\in\mathbb{R}$ es el exponente fijo que determina el
  comportamiento particular de la función (parábola, hipérbola, raíz, etc.).


  ### Desarrollo didáctico


  En $f(x)=-2x^4$: $a=-2$ y $n=4$. En $f(x)=x^{-1}$: $a=1$ y $n=-1$. En $f(x)=\frac{1}{3}x^{1/2}$: $a=1/3$ y
  $n=1/2$. Identificar estos dos valores permite anticipar la forma de la gráfica antes de trazarla.'
procedimiento:
- 'Paso 1: Localiza el coeficiente que multiplica a la potencia de $x$.'
- 'Paso 2: Localiza el exponente al cual está elevada la variable $x$.'
- 'Paso 3: Escribe la función en la forma estándar $f(x)=a\cdot x^n$ si no está en ese formato.'
ejemplos:
- titulo: Identificación de $a$ y $n$
  enunciado: 'Identifica $a$ y $n$ en $f(x)=7x^5$.'
  solucion_pasos:
  - Se compara con la forma general $f(x)=a\cdot x^n$.
  - 'Se obtiene $a=7$ y $n=5$.'
- titulo: Reescritura a la forma estándar
  enunciado: 'Reescribe $f(x)=\dfrac{4}{x^2}$ en la forma $a\cdot x^n$.'
  solucion_pasos:
  - Se reescribe el denominador como exponente negativo.
  - 'Queda $f(x)=4x^{-2}$, con $a=4$ y $n=-2$.'
- titulo: ¿El exponente $n$ debe ser siempre positivo?
  enunciado: ¿En la forma general $f(x)=a\cdot x^n$, el exponente $n$ debe ser siempre un número positivo?
  respuesta: 'No'
  solucion_pasos:
  - El exponente $n$ puede ser positivo, negativo o fraccionario, según el tipo de función potencia.
- titulo: ¿El coeficiente $a$ afecta el tipo de curva, o solo su tamaño?
  enunciado: ¿El coeficiente $a$ determina el tipo general de curva (parábola, hipérbola, etc.)?
  respuesta: 'No'
  solucion_pasos:
  - El tipo de curva lo determina principalmente el exponente $n$; el coeficiente $a$ solo escala y refleja la gráfica.
errores_frecuentes:
- Confundir el coeficiente $a$ con el exponente $n$ al identificar los elementos de la función.
- No reescribir expresiones con raíces o fracciones a la forma estándar $a\cdot x^n$ antes de analizarlas.
- Suponer que $n$ debe ser un entero, ignorando los casos fraccionarios.
- Olvidar el signo del coeficiente $a$ al identificarlo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
