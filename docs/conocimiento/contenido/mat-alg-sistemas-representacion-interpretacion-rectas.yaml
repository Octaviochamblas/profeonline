semantic_id: 'MAT.ALG.SISTEMAS_REPRESENTACION.INTERPRETACION_RECTAS'
titulo: 'Interpretación como Rectas'
objetivo: |
  Visualizar cada ecuación del sistema como una línea recta en el plano cartesiano.
introduccion: |
  Aquí es donde el álgebra de letras se convierte en geometría visual.
  Toda ecuación lineal con dos variables (como $2x + y = 5$) es, en realidad, las instrucciones para dibujar una línea recta perfecta en un gráfico de coordenadas $(x,y)$.
resumen: 'Este proceso es fundamental para encontrar la solución correcta.'
explicacion: |
  Si tomas todos los pares de números que hacen que $2x + y = 5$ sea verdad, y pones un puntito por cada uno, verás que forman una recta continua.
  Por lo tanto, un sistema de dos ecuaciones 2x2 son simplemente **dos líneas rectas dibujadas en el mismo mapa**.
procedimiento:
  - 'Paso 1: Toma una ecuación del sistema.'
  - 'Paso 2: Encuentra al menos dos puntos (pares x,y) que la satisfagan (por ejemplo, si x=0 cuánto vale y, y viceversa).'
  - 'Paso 3: Dibuja esos puntos en el plano y únelos con una recta.'
  - 'Paso 4: Repite el proceso para la segunda ecuación.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
