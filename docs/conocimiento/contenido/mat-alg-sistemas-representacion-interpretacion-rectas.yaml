semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.INTERPRETACION_RECTAS
titulo: Interpretación como Rectas
objetivo: Visualizar cada ecuación del sistema como una línea recta en el plano cartesiano.
explicacion: |
  Aquí es donde el álgebra de letras se convierte en geometría visual.
  Toda ecuación lineal con dos variables (como $2x + y = 5$) es, en realidad, las instrucciones para dibujar una línea recta perfecta en un gráfico de coordenadas $(x,y)$.

  Si tomas todos los pares de números que hacen que $2x + y = 5$ sea verdad, y pones un puntito por cada uno, verás que forman una recta continua.
  Por lo tanto, un sistema de dos ecuaciones 2x2 son simplemente **dos líneas rectas dibujadas en el mismo mapa**.
procedimiento: |
  1. Toma una ecuación del sistema.
  2. Encuentra al menos dos puntos (pares x,y) que la satisfagan (por ejemplo, si x=0 cuánto vale y, y viceversa).
  3. Dibuja esos puntos en el plano y únelos con una recta.
  4. Repite el proceso para la segunda ecuación.
