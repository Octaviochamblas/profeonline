semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.RECTA_EXTERIOR_CIRCUNFERENCIA
titulo: Identificación de recta exterior a una circunferencia
objetivo: Identificar que una recta es exterior a una circunferencia cuando no la toca en ningún punto,
  condición que se cumple si la distancia del centro a la recta es mayor que el radio.
introduccion: Cuando una recta se encuentra completamente fuera del alcance de una circunferencia, no
  existe ningún punto en común entre ambas figuras.
resumen: 'Una recta es exterior a una circunferencia de centro $(h,k)$ y radio $r$ si la distancia entre
  el centro y la recta es mayor que $r$: $d(\text{centro},\text{recta})>r$.'
explicacion: '![Recta exterior a una circunferencia](/static/img/geometria/analitica/posrc-recta-exterior-circunferencia.svg)


  ### Definición formal


  Una recta $Ax+By+C=0$ es exterior a una circunferencia de centro $(h,k)$ y radio $r$ si $\dfrac{|Ah+Bk+C|}{\sqrt{A^2+B^2}}>r$,
  sin ningún punto en común entre ambas.


  ### Desarrollo didáctico


  Para la circunferencia $x^2+y^2=9$ (centro (0,0), radio 3) y la recta horizontal $y=5$: la distancia
  del centro a la recta es 5, mayor que 3, por lo que la recta es exterior, sin tocar la circunferencia
  en ningún punto.'
procedimiento:
- 'Paso 1: Calcula la distancia entre el centro de la circunferencia y la recta dada.'
- 'Paso 2: Compara esa distancia con el radio de la circunferencia.'
- 'Paso 3: Si la distancia es mayor que el radio, la recta es exterior (no toca la circunferencia).'
ejemplos:
- titulo: Verificar que y=5 es exterior a x²+y²=9
  enunciado: Centro (0,0), radio 3, recta y=5.
  solucion_pasos:
  - La distancia del centro a la recta es 5>3, por lo que la recta es exterior.
- titulo: Verificar una recta vertical exterior
  enunciado: x²+y²=16, recta x=10.
  solucion_pasos:
  - La distancia del centro (0,0) a la recta x=10 es 10>4, por lo que la recta es exterior.
- titulo: ¿Una recta exterior tiene algún punto en común con la circunferencia?
  respuesta: 'No'
  solucion_pasos:
  - No, es exactamente la característica que la define como exterior.
- titulo: ¿Al resolver el sistema recta-circunferencia con una recta exterior se obtienen soluciones reales?
  respuesta: 'No'
  solucion_pasos:
  - No, el sistema no tiene solución real en ese caso, ya que no hay puntos en común.
errores_frecuentes:
- Confundir recta exterior con recta tangente, sin verificar la desigualdad estricta.
- Calcular incorrectamente la distancia del centro a la recta, obteniendo una conclusión errónea.
- Asumir que toda recta 'lejana' visualmente es automáticamente exterior sin verificación numérica precisa.
fuente: Elaboración propia.
estado: publicado
