semantic_id: MAT.NUM.RAZONES.SUMA_TERMINOS_SERIE
titulo: Uso de la suma de términos en una serie de razones
objetivo: Aplicar la propiedad de las sumas de antecedentes y consecuentes.
introduccion: En el estudio de las razones, es fundamental identificar las partes que la componen. Hoy
  exploraremos el suma de términos en una serie.
resumen: En una serie de razones, la suma de los antecedentes dividida por la suma de los consecuentes
  mantiene el valor original.
explicacion: Una razón $a:b$ tiene partes bien definidas. Al referirnos al suma de términos en una serie,
  analizamos su papel en el cálculo numérico. **Dominar este concepto** es la clave para resolver proporciones
  más avanzadas sin confusiones posicionales.
procedimiento:
- 'Paso 1: Escribe la razón como una fracción matemática estándar.'
- 'Paso 2: Identifica la posición del suma de términos en una serie según la definición.'
- 'Paso 3: Realiza las operaciones indicadas respetando su lugar.'
ejemplos:
- titulo: Ejemplo de suma de términos en una serie
  enunciado: Dada la razón $8:4$, identifica y trabaja con el suma de términos en una serie.
  solucion_pasos:
  - Escribimos la razón en forma de cociente.
  - Analizamos las posiciones.
  - Concluimos según la definición teórica.
- titulo: ¿Es siempre un número entero?
  respuesta: 'No'
  solucion_pasos:
  - Puede ser cualquier número real válido, incluyendo fracciones y decimales.
errores_frecuentes:
- Confundir las posiciones de los términos.
- Asumir que siempre son números enteros positivos.
- Olvidar que el consecuente no puede ser cero.
- Invertir el orden lógico al leer el enunciado de un problema.
- Simplificar erróneamente ignorando uno de los términos.
fuente: Currículum Nacional MINEDUC — Razones y proporciones.
estado: publicado
