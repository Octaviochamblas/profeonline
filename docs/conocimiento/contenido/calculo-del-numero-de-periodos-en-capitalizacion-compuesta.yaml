semantic_id: MAT.NUM.INTERES_COMPUESTO.NUMERO_PERIODOS
titulo: Cálculo del número de períodos en capitalización compuesta
objetivo: Determinar el número total de períodos (exponente $t$) en operaciones con diferentes frecuencias
  de capitalización.
introduccion: ¿Qué pasa si guardas plata por 5 años, pero el banco te paga los intereses cada mes? No
  puedes poner un '5' en la fórmula. Tienes que pensar cuántas veces pasará el camión de los intereses
  en total.
resumen: El exponente $t$ representa el 'número total de veces que se capitaliza' (las veces que la bola
  de nieve da la vuelta). Se calcula multiplicando los años de la inversión por la cantidad de períodos
  en un año.
explicacion: 'Al igual que tuvimos que ajustar la tasa, **debemos ajustar el tiempo** en la fórmula $M
  = C(1+i)^t$.


  - La letra $t$ NO significa necesariamente ''años''. Significa **Cantidad Total de Períodos**.

  - Si la inversión dura **3 años**, pero la cuenta es capitalizable **mensualmente**, significa que el
  interés se suma 12 veces por año.

  - ¿Cuántas veces se sumará el interés en total durante los 3 años?

  $$t = 3 \text{ años} \cdot 12 \text{ meses/año} = 36 \text{ períodos mensules}.$$


  En la PAES, la clave está en que la tasa periódica ($i_p$) y el exponente total de tiempo ($t$) DEBEN
  estar en la misma frecuencia de tiempo.'
procedimiento:
- 'Paso 1: Identifica la duración total de la inversión en años.'
- 'Paso 2: Lee la frecuencia de capitalización (ej. Semestral).'
- 'Paso 3: Multiplica los años por cuántos periodos hay en un año (ej. $x 2$ para semestres).'
- 'Paso 4: El resultado será el número entero que pondrás como exponente.'
ejemplos:
- titulo: Contando los trimestres
  enunciado: Una inversión a 5 años plazo se capitaliza trimestralmente. ¿Cuál será el exponente en la
    fórmula?
  solucion_pasos:
  - Tiempo en años = 5.
  - En un año hay 4 trimestres.
  - Total de periodos (exponente t) = $5 \cdot 4 = 20$.
  - El exponente a usar es 20.
errores_frecuentes:
- Poner directamente los 'años' como exponente sin fijarse en la capitalización.
- Confundir trimestral (multiplicar por 4) con cuatrimestral (multiplicar por 3).
fuente: Currículum Nacional MINEDUC.
estado: publicado
