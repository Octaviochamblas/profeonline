semantic_id: MAT.EST.NORMAL_CALCULO.AREA_COLAS
titulo: Calcular probabilidades en una o dos colas de la distribución
objetivo: Calcular la probabilidad asociada a una o dos colas de la distribución normal a partir de valores críticos.
introduccion: A veces interesa saber qué probabilidad hay de estar "muy lejos" del centro, ya sea de un solo lado
  (una cola) o de ambos lados a la vez (dos colas).
resumen: El área de una cola se calcula con el complemento de la tabla; el área de dos colas simétricas se calcula
  duplicando el área de una sola cola.
explicacion: '![Área de una o dos colas](/static/img/estadistica/normcalc/normcalc-area-colas.svg)


  ### Definición formal


  Para una cola derecha, $P(Z>z)=1-P(Z<z)$. Para dos colas simétricas (valores mayores que $z$ y menores que $-z$),

  el área total es $2\cdot(1-P(Z<z))$.


  ### Desarrollo didáctico


  Este cálculo es muy usado en pruebas de hipótesis y en criterios de decisión, donde se define un "nivel crítico" de

  probabilidad en los extremos de la distribución.'
procedimiento:
- 'Paso 1: Identifica si se pide el área de una cola o de dos colas simétricas.'
- 'Paso 2: Calcula $P(Z<z)$ usando la tabla y aplica el complemento para obtener el área de una cola.'
- 'Paso 3: Si son dos colas simétricas, duplica el área de una sola cola.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $P(Z<2)=0{,}9772$, calcula el área de la cola derecha (a partir de $Z=2$).
  solucion_pasos:
  - Área de la cola derecha $=1-0{,}9772$.
  - Área de la cola derecha $=0{,}0228$.
- titulo: Ejemplo 2
  enunciado: Con el resultado anterior, calcula el área total de las dos colas simétricas ($Z>2$ y $Z<-2$).
  solucion_pasos:
  - Área de dos colas $=2\times 0{,}0228$.
  - Área de dos colas $=0{,}0456$.
- titulo: ¿El área de dos colas simétricas se obtiene duplicando el área de una sola cola?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre que ambas colas sean simétricas respecto de la media.
- titulo: ¿El área de una cola derecha se calcula sumando 1 al valor de la tabla?
  respuesta: 'No'
  solucion_pasos:
  - 'No, se calcula restando el valor de la tabla de 1 (complemento).'
errores_frecuentes:
- Olvidar duplicar el área al calcular dos colas en vez de una sola.
- Confundir el área de la cola derecha con la de la cola izquierda.
- No verificar que ambas colas sean realmente simétricas antes de duplicar el área.
- Aplicar el complemento de forma incorrecta al calcular el área de una cola.
- Sumar en vez de restar al calcular el complemento de la tabla.
fuente: 'Elaboración propia.'
estado: publicado
