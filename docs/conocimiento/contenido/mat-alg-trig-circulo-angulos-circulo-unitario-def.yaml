semantic_id: MAT.ALG.TRIG_CIRCULO_ANGULOS.CIRCULO_UNITARIO_DEF
titulo: Definición del círculo unitario
objetivo: Reconocer el círculo unitario como la herramienta central para definir las funciones trigonométricas.
introduccion: Para estudiar el seno y el coseno de cualquier ángulo, conviene fijar un círculo de referencia
  simple, con radio exactamente igual a $1$.
resumen: El **círculo unitario** es la circunferencia de radio $1$ centrada en el origen del plano cartesiano,
  formada por todos los puntos $(x,y)$ que cumplen $x^2+y^2=1$.
explicacion: '### Definición formal


  El círculo unitario es el conjunto $\{(x,y)\in\mathbb{R}^2 : x^2+y^2=1\}$, es decir, la circunferencia de
  radio $1$ centrada en el origen $(0,0)$. Sirve como marco de referencia estándar para definir las funciones
  trigonométricas de cualquier ángulo.


  ### Desarrollo didáctico


  El punto $(1,0)$ pertenece al círculo unitario porque $1^2+0^2=1$. El punto $(0,1)$ también pertenece, porque
  $0^2+1^2=1$. En cambio, $(1,1)$ no pertenece, porque $1^2+1^2=2\neq1$.'
procedimiento:
- 'Paso 1: Verifica que el punto en cuestión cumpla $x^2+y^2=1$.'
- 'Paso 2: Si se cumple, el punto pertenece al círculo unitario.'
- 'Paso 3: Usa el círculo unitario como referencia para ubicar ángulos y sus coordenadas asociadas.'
ejemplos:
- titulo: Verificación de un punto en el círculo unitario
  enunciado: '¿Pertenece el punto $(0,-1)$ al círculo unitario?'
  solucion_pasos:
  - 'Se verifica: $0^2+(-1)^2=0+1=1$.'
  - Sí, pertenece al círculo unitario.
- titulo: Verificación de un punto fuera del círculo unitario
  enunciado: '¿Pertenece el punto $(2,0)$ al círculo unitario?'
  solucion_pasos:
  - 'Se verifica: $2^2+0^2=4\neq1$.'
  - No, no pertenece al círculo unitario.
- titulo: ¿El centro del círculo unitario está en el origen?
  enunciado: ¿El círculo unitario está centrado en el origen del plano cartesiano?
  respuesta: Sí
  solucion_pasos:
  - Es parte de su definición: centro en $(0,0)$ y radio $1$.
- titulo: ¿El radio del círculo unitario puede ser distinto de $1$?
  enunciado: ¿Puede el círculo unitario tener un radio distinto de $1$?
  respuesta: 'No'
  solucion_pasos:
  - Por definición, el círculo unitario siempre tiene radio exactamente $1$.
errores_frecuentes:
- Confundir el círculo unitario con una circunferencia de radio distinto de $1$.
- Suponer que el centro puede estar en un punto distinto del origen.
- No verificar la ecuación $x^2+y^2=1$ antes de aceptar que un punto pertenece al círculo.
- Confundir el círculo unitario (la curva) con el disco unitario (la región interior).
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
