semantic_id: MAT.ALG.EC_CUADR_BASE.DEFINICION
titulo: Definición de ecuación de segundo grado
objetivo: Comprender qué es una ecuación de segundo grado y reconocerla por la presencia de un término
  cuadrático.
introduccion: Cuando la incógnita de una ecuación aparece elevada al cuadrado (y ese es su mayor exponente),
  ya no estamos frente a una ecuación lineal, sino frente a una ecuación de segundo grado.
resumen: Una **ecuación de segundo grado** (o cuadrática) es una igualdad polinómica cuyo mayor exponente
  en la incógnita es 2, expresable en la forma $ax^2+bx+c=0$ con $a\neq0$.
explicacion: '### Definición formal


  Una ecuación de segundo grado en la incógnita $x$ es toda igualdad de la forma $ax^2+bx+c=0$, donde
  $a,b,c \in \mathbb{R}$ y $a \neq 0$. El nombre "segundo grado" proviene de que el mayor exponente de
  $x$ presente en la ecuación es 2.


  ### Desarrollo didáctico


  Para reconocer una ecuación de segundo grado, basta con identificar si, tras ordenar todos los términos,
  aparece un término con $x^2$ con coeficiente distinto de cero.


  $3x^2-5x+2=0$ es una ecuación de segundo grado, porque el mayor exponente de $x$ es 2 y su coeficiente
  ($3$) es distinto de cero. En cambio, $5x-7=0$ es de primer grado, pues no hay término cuadrático.'
procedimiento:
- 'Paso 1: Ordena la ecuación de modo que todos los términos queden de un mismo lado, igualados a cero.'
- 'Paso 2: Identifica el mayor exponente presente en la incógnita.'
- 'Paso 3: Si ese mayor exponente es 2 (con coeficiente distinto de cero), la ecuación es de segundo grado.'
ejemplos:
- titulo: Reconocimiento de una ecuación cuadrática
  enunciado: ¿Es $2x^2+x-6=0$ una ecuación de segundo grado?
  solucion_pasos:
  - El mayor exponente de $x$ presente es 2, con coeficiente $2 \neq 0$.
  - Sí, es una ecuación de segundo grado.
- titulo: Reconocimiento de una ecuación que no es cuadrática
  enunciado: ¿Es $4x+9=0$ una ecuación de segundo grado?
  solucion_pasos:
  - No hay ningún término con $x^2$ en la ecuación.
  - No, es una ecuación de primer grado.
- titulo: ¿Toda ecuación con un término $x^2$ es necesariamente de segundo grado?
  enunciado: ¿Toda ecuación con un término $x^2$ es necesariamente de segundo grado?
  respuesta: 'No'
  solucion_pasos:
  - Solo lo es si el coeficiente de $x^2$ es distinto de cero tras simplificar la ecuación.
- titulo: ¿Puede una ecuación de segundo grado tener término lineal igual a cero?
  enunciado: ¿Puede una ecuación de segundo grado tener término lineal igual a cero?
  respuesta: Sí
  solucion_pasos:
  - Basta con que el coeficiente $a$ del término cuadrático sea distinto de cero; $b$ puede ser cero.
errores_frecuentes:
- Clasificar como cuadrática una ecuación donde el término $x^2$ se cancela al simplificar (quedando coeficiente
  cero).
- Confundir el grado de la ecuación con la cantidad de términos que tiene.
- No ordenar la ecuación antes de identificar el mayor exponente presente.
- Creer que una ecuación de segundo grado necesariamente tiene los tres términos ($x^2$, $x$ y constante).
