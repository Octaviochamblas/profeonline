semantic_id: MAT.GEO.CUERPOS_REDONDOS_BASE.CONO_POR_ROTACION
titulo: Generación del cono como sólido de revolución
objetivo: Reconocer que el cono se genera al hacer girar un triángulo rectángulo 360° alrededor de uno
  de sus catetos.
introduccion: Si tomas un triángulo rectángulo (como una porción de pizza triangular) y lo giras alrededor
  de uno de sus catetos, el barrido que genera forma un cono.
resumen: 'El cono se genera al rotar un triángulo rectángulo 360° alrededor de uno de sus catetos: ese
  cateto se convierte en el eje (y en la altura), el otro cateto se convierte en el radio, y la hipotenusa
  se convierte en la generatriz.'
explicacion: '![Generación del cono por rotación](/static/img/geometria/espacio-cuerpos/cono-por-rotacion.svg)


  ### Definición formal


  Al rotar un triángulo rectángulo de catetos $r$ y $h$ 360° alrededor del cateto $h$ (que actúa como
  eje), se genera un cono cuya altura es $h$, cuyo radio de la base es $r$ (el otro cateto), y cuya generatriz
  es la hipotenusa del triángulo.


  ### Desarrollo didáctico


  En la figura, el triángulo rectángulo resaltado gira alrededor del eje vertical (uno de sus catetos),
  generando el cono mostrado a la derecha. El vértice del triángulo (donde se unen el cateto-eje y la
  hipotenusa) se convierte en el vértice del cono.'
procedimiento:
- 'Paso 1: Identifica el triángulo rectángulo generador y cuál de sus catetos actuará como eje de rotación.'
- 'Paso 2: Reconoce que el cateto usado como eje se convierte en la altura (h) del cono.'
- 'Paso 3: Reconoce que el otro cateto se convierte en el radio (r) y la hipotenusa en la generatriz (g)
  del cono.'
ejemplos:
- titulo: Determinar las medidas del cono generado
  enunciado: Un triángulo rectángulo de catetos 3 cm y 4 cm gira alrededor del cateto de 4 cm.
  solucion_pasos:
  - Se genera un cono de altura h=4 cm (el eje), radio r=3 cm (el otro cateto), y generatriz g=5 cm (la
    hipotenusa, por Pitágoras).
- titulo: Identificar el eje correcto de rotación
  enunciado: Un triángulo rectángulo puede rotar alrededor de cualquiera de sus dos catetos.
  solucion_pasos:
  - Según qué cateto se use como eje, cambian los valores de r y h del cono resultante (se intercambian).
- titulo: ¿La hipotenusa del triángulo se convierte en la generatriz del cono?
  respuesta: Sí
  solucion_pasos:
  - Sí, la hipotenusa del triángulo rectángulo generador se convierte exactamente en la generatriz del
    cono.
- titulo: ¿Se puede generar un cono rotando un triángulo alrededor de su hipotenusa?
  respuesta: 'No'
  solucion_pasos:
  - 'No de forma simple: rotar alrededor de la hipotenusa genera un sólido más complejo (dos conos unidos
    por sus bases), no un cono simple.'
errores_frecuentes:
- Confundir cuál cateto se convierte en radio y cuál en altura del cono.
- Olvidar que la hipotenusa se convierte en la generatriz, no en la altura ni el radio.
- Creer que rotar alrededor de la hipotenusa también genera un cono simple.
fuente: 'Elaboración propia (referencias: Moraleja 97, Cid 182).'
estado: publicado
