semantic_id: MAT.EST.DIAGRAMA_CAJA.SIMETRIA_ANALISIS
titulo: Analizar la simetría de la muestra en el diagrama de caja
objetivo: Analizar la simetría o asimetría de una distribución a partir de la posición de la mediana y el largo de los
  bigotes en el diagrama de caja.
introduccion: Si miras un diagrama de caja y la mediana está justo al centro con bigotes parecidos, los datos son bastante
  simétricos; si está descentrada, hay asimetría.
resumen: Un diagrama de caja es aproximadamente simétrico cuando la mediana está al centro de la caja y los bigotes tienen
  largos parecidos; es asimétrico cuando alguno de esos elementos está desplazado.
explicacion: '![Simetría en el diagrama de caja](/static/img/estadistica/diagcaja/diagcaja-simetria-analisis.svg)


  ### Definición formal


  La simetría de una distribución se puede analizar observando la posición de la mediana dentro de la caja y las

  longitudes relativas de los dos bigotes. Simetría aproximada implica mediana centrada y bigotes de largo similar.


  ### Desarrollo didáctico


  Si el bigote superior es mucho más largo que el inferior, la distribución tiende a tener asimetría hacia la derecha (valores

  altos más dispersos); lo contrario indica asimetría hacia la izquierda.'
procedimiento:
- 'Paso 1: Observa la posición de la línea de la mediana dentro de la caja.'
- 'Paso 2: Compara el largo del bigote inferior con el del bigote superior.'
- 'Paso 3: Concluye si la distribución es aproximadamente simétrica o asimétrica, y hacia qué lado.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: En un diagrama de caja, el bigote superior es mucho más largo que el inferior. ¿Qué tipo de asimetría sugiere?
  solucion_pasos:
  - Sugiere asimetría hacia la derecha (valores altos más dispersos que los bajos).
- titulo: Ejemplo 2
  enunciado: En un diagrama de caja, la mediana está justo al centro de la caja y los bigotes tienen largo similar. ¿Qué
    se puede concluir?
  solucion_pasos:
  - La distribución es aproximadamente simétrica.
- titulo: ¿Una mediana centrada con bigotes de largo similar sugiere simetría aproximada?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos elementos en conjunto son indicadores de simetría.
- titulo: ¿La simetría de un diagrama de caja depende solo del largo de la caja?
  respuesta: 'No'
  solucion_pasos:
  - 'No, también depende de la posición de la mediana y del largo relativo de los bigotes.'
errores_frecuentes:
- Analizar la simetría mirando solo el largo de la caja, sin considerar los bigotes.
- Confundir asimetría hacia la derecha con asimetría hacia la izquierda.
- Creer que toda distribución con mediana centrada es perfectamente simétrica.
- Ignorar la posición relativa de la mediana dentro de la caja.
- Pensar que un diagrama de caja siempre representa una distribución simétrica.
fuente: 'Elaboración propia (referencia: Moraleja 137, 380).'
estado: publicado
