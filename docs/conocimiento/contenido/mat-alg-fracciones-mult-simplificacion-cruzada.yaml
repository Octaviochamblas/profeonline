semantic_id: MAT.ALG.FRACCIONES_MULT.SIMPLIFICACION_CRUZADA
titulo: Simplificación Cruzada
objetivo: Cancelar factores comunes entre cualquier numerador y cualquier denominador antes de multiplicar.
introduccion: Una vez que todo está factorizado, comienza el juego de emparejar. Cualquier factor idéntico que esté
  arriba puede cancelar a uno que esté abajo, no importa en qué fracción estén.
resumen: En una multiplicación de fracciones, puedes cancelar cualquier factor del numerador de cualquier fracción
  con el mismo factor en el denominador de cualquier fracción.
explicacion: '### Definición formal


  Es como si ya fueran una sola fracción, por lo tanto cualquier factor arriba cancela a uno abajo.


  ### Desarrollo didáctico


  La simplificación cruzada es tu herramienta útil para evitar cálculos extensos. Se basa en una propiedad adecuado
  de la multiplicación de fracciones: como todos los numeradores terminan multiplicándose juntos arriba y los denominadores
  abajo, **puedes tachar cualquier factor de arriba con cualquier factor igual de abajo**, sin importar si estaban
  originalmente en la misma fracción o en fracciones cruzadas.


  Ejemplo:

  Tienes $\frac{(x-2)}{x+1} \cdot \frac{x+1}{(x-2)(x+3)}$.


  En lugar de multiplicar todo, observa:

  - Tienes un $(x-2)$ arriba (en la 1ra) y uno abajo (en la 2da). Se tachan.

  - Tienes un $(x+1)$ abajo (en la 1ra) y uno arriba (en la 2da). Se tachan.


  ¿Qué sobrevivió a la masacre? Arriba se canceló todo (queda un 1). Abajo sobrevivió $(x+3)$.

  Resultado final inmediato: $\frac{1}{x+3}$.'
procedimiento:
- 'Paso 1: Busca factores idénticos que estén tanto en la parte superior como en la inferior.'
- 'Paso 2: Tacha el par de factores idénticos.'
- 'Paso 3: Repite el proceso hasta que no queden factores comunes entre la parte superior (numeradores) y la inferior
  (denominadores).'
ejemplos:
- titulo: Simplifica $\frac{5}{x-1} \cdot \frac{x-1}{10}$
  enunciado: Simplifica $\frac{5}{x-1} \cdot \frac{x-1}{10}$.
  solucion_pasos:
  - El factor $(x-1)$ está arriba en la 2da y abajo en la 1ra. Tachamos.
  - El 5 está arriba y el 10 abajo. Dividimos ambos por 5 (queda 1 y 2).
  - 'Sobrevivientes: Arriba $1 \cdot 1$. Abajo $1 \cdot 2$.'
  - 'Resultado: $\frac{1}{2}$.'
- titulo: Simplifica $\frac{a+b}{m} \cdot \frac{m}{a+b}$.
  solucion_pasos:
  - Todo se cancela cruzado, quedando puros unos. 1/1 = 1.
- titulo: 'Respecto de «Simplificación cruzada en producto de fracciones algebraicas»: ¿Describe adecua'
  enunciado: 'Respecto de «Simplificación cruzada en producto de fracciones algebraicas»: ¿Describe adecuadamente
    el concepto esta frase? «En una multiplicación de fracciones, puedes cancelar cualquier factor del numerador
    de cualquier fracción con el mismo factor en el denominador de cualquier fracción»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: En una multiplicación de fracciones, puedes cancelar cualquier
    factor del numerador de cualquier fracción con el mismo factor en el denominador de cualquier fracción.'
- titulo: 'Respecto de «Simplificación cruzada en producto de fracciones algebraicas»: ¿Se puede acepta'
  enunciado: 'Respecto de «Simplificación cruzada en producto de fracciones algebraicas»: ¿Se puede aceptar esta
    afirmación? «Cancelar cruzado términos que se suman, no factores (ej: tachar un +2 cruzado con otro +2)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En una multiplicación de fracciones, puedes cancelar cualquier
    factor del numerador de cualquier fracción con el mismo factor en el denominador de cualquier fracción.'
errores_frecuentes:
- 'Cancelar cruzado términos que se suman, no factores (ej: tachar un +2 cruzado con otro +2).'
- Cancelar factores horizontalmente (numerador con numerador).
- Porque la multiplicación es conmutativa.
- Es un atajo no justificado matemáticamente.
- Para «¿Por qué es válido cancelar un factor del numerador de la primera fracción con uno del denominador de la
  segunda», la respuesta correcta es Porque los signos se cancelan.
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
