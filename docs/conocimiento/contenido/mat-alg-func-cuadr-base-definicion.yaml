semantic_id: MAT.ALG.FUNC_CUADR_BASE.DEFINICION
titulo: Definición de función cuadrática
objetivo: Comprender la función cuadrática como aquella cuya regla de asignación es un polinomio de segundo grado.
introduccion: Cuando la regla de una función involucra a la variable elevada al cuadrado como su mayor potencia,
  la función deja de ser una recta y se convierte en una curva con forma de parábola.
resumen: Una **función cuadrática** es una función $f:\mathbb{R} \to \mathbb{R}$ cuya regla de asignación es un
  polinomio de segundo grado, es decir, $f(x)=ax^2+bx+c$ con $a\neq0$.
explicacion: '### Definición formal


  Una función $f$ es cuadrática si puede expresarse como $f(x)=ax^2+bx+c$, donde $a,b,c \in \mathbb{R}$ y $a \neq
  0$. El nombre "cuadrática" proviene de que el mayor exponente de $x$ presente en la regla es 2.


  ### Desarrollo didáctico


  Para reconocer una función cuadrática, basta con verificar que, tras simplificar su regla, aparezca un término
  con $x^2$ cuyo coeficiente sea distinto de cero.


  $f(x)=2x^2-3x+1$ es cuadrática, porque el mayor exponente de $x$ es 2 y su coeficiente ($2$) es distinto de
  cero. En cambio, $g(x)=5x-7$ es una función afín, no cuadrática, pues no tiene término en $x^2$.'
procedimiento:
- 'Paso 1: Observa la regla de la función y ordénala si es necesario.'
- 'Paso 2: Identifica el mayor exponente presente en la variable $x$.'
- 'Paso 3: Si ese mayor exponente es 2, con coeficiente distinto de cero, la función es cuadrática.'
ejemplos:
- titulo: Reconocimiento de una función cuadrática
  enunciado: '¿Es $f(x)=-3x^2+4$ una función cuadrática?'
  solucion_pasos:
  - El mayor exponente de $x$ presente es 2, con coeficiente $-3 \neq 0$.
  - Sí, es una función cuadrática.
- titulo: Reconocimiento de una función que no es cuadrática
  enunciado: '¿Es $g(x)=7x+2$ una función cuadrática?'
  solucion_pasos:
  - No hay ningún término con $x^2$ en la regla.
  - No, es una función afín (de primer grado).
- titulo: ¿Toda función con un término $x^2$ visible es necesariamente cuadrática?
  enunciado: ¿Toda función con un término $x^2$ visible es necesariamente cuadrática?
  respuesta: 'No'
  solucion_pasos:
  - Solo lo es si el coeficiente de $x^2$ es distinto de cero tras simplificar la regla completa.
- titulo: ¿Una función cuadrática puede tener término lineal igual a cero?
  enunciado: ¿Una función cuadrática puede tener término lineal igual a cero?
  respuesta: Sí
  solucion_pasos:
  - Basta con que el coeficiente $a$ del término cuadrático sea distinto de cero; el coeficiente $b$ puede ser
    cero.
errores_frecuentes:
- Clasificar como cuadrática una función donde el término $x^2$ se cancela al simplificar, quedando coeficiente
  cero.
- Confundir una función cuadrática con una ecuación cuadrática, que son objetos matemáticos distintos.
- No ordenar la regla de la función antes de identificar el mayor exponente presente.
- Creer que una función cuadrática necesariamente tiene los tres términos ($x^2$, $x$ y constante).
