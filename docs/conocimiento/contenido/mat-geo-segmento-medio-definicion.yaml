semantic_id: MAT.GEO.SEGMENTO_MEDIO.DEFINICION
titulo: Definición de segmento medio como segmento que une los puntos medios de dos lados de un triángulo
objetivo: Identificar el segmento medio de un triángulo como el que conecta los puntos medios de dos de
  sus lados.
introduccion: 'Además de los segmentos que parten de un vértice, hay un segmento notable que ni siquiera
  toca ningún vértice: el que une los puntos medios de dos lados.'
resumen: El segmento medio de un triángulo une los puntos medios de dos de sus lados.
explicacion: '![Segmento medio de un triángulo](/static/img/geometria/elementos-secundarios/segmento-medio-definicion.svg)


  ### Definición formal


  Si M y N son los puntos medios de los lados AB y AC de un triángulo ABC, el segmento MN es el segmento
  medio relativo al lado BC.


  ### Desarrollo didáctico


  Cada triángulo tiene tres segmentos medios, uno por cada par de lados. El segmento medio MN (que une
  los puntos medios de AB y AC) es el segmento medio relativo al tercer lado, BC.'
procedimiento:
- 'Paso 1: Encuentra los puntos medios de dos lados del triángulo.'
- 'Paso 2: Traza el segmento que los une.'
- 'Paso 3: Ese segmento es el segmento medio relativo al tercer lado.'
ejemplos:
- titulo: Reconocer un segmento medio
  enunciado: M es el punto medio de AB y N es el punto medio de AC.
  solucion_pasos:
  - El segmento MN es el segmento medio relativo al lado BC.
- titulo: Contar segmentos medios
  enunciado: ¿Cuántos segmentos medios tiene un triángulo?
  solucion_pasos:
  - Tiene tres, uno por cada par de lados.
- titulo: ¿El segmento medio toca algún vértice?
  respuesta: 'No'
  solucion_pasos:
  - No, sus extremos son puntos medios de lados, no vértices.
- titulo: ¿El segmento medio conecta puntos medios de dos lados distintos?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre conecta los puntos medios de dos lados diferentes.
errores_frecuentes:
- Confundir el segmento medio con una transversal de gravedad (que sí llega a un vértice).
- Unir un punto medio con un vértice en vez de con otro punto medio.
- Creer que el segmento medio es igual de largo que el lado al que es relativo.
fuente: Elaboración propia.
estado: publicado
