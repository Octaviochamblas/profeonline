semantic_id: MAT.GEO.TRIANGULOS_ANGULOS.SUMA_EXTERIORES
titulo: Teorema de la suma de ángulos exteriores de un triángulo igual a 360°
objetivo: Aplicar el teorema que establece que los tres ángulos exteriores de cualquier triángulo (uno
  por vértice) suman siempre 360°.
introduccion: Al prolongar un lado en cada vértice se obtiene un ángulo exterior; tomando los tres (uno
  por vértice, todos en el mismo sentido de recorrido), su suma es siempre 360°.
resumen: En todo triángulo, tomando un ángulo exterior por vértice (en el mismo sentido de giro), su suma
  es igual a 360°.
explicacion: '![Suma de ángulos exteriores](/static/img/geometria/triangulos/triangulos-angulos-suma-exteriores.svg)


  ### Definición formal


  Si α, β, γ son los ángulos interiores de un triángulo, sus ángulos exteriores asociados son 180°−α,
  180°−β y 180°−γ. Su suma es (180°−α)+(180°−β)+(180°−γ) = 540°−(α+β+γ) = 540°−180° = 360°.


  ### Desarrollo didáctico


  Si los ángulos interiores son 50°, 70° y 60°, sus exteriores son 130°, 110° y 120°. Sumando: 130°+110°+120°
  = 360°, confirmando el teorema.'
procedimiento:
- 'Paso 1: Identifica o calcula los tres ángulos interiores del triángulo.'
- 'Paso 2: Calcula cada ángulo exterior como 180° menos su interior correspondiente.'
- 'Paso 3: Verifica que los tres ángulos exteriores sumen 360°.'
ejemplos:
- titulo: Verificar la suma exterior
  enunciado: Un triángulo tiene ángulos interiores 50°, 70° y 60°.
  solucion_pasos:
  - Los exteriores son 130°, 110° y 120°, y suman 360°.
- titulo: Triángulo equilátero
  enunciado: Calcula la suma de los ángulos exteriores de un triángulo equilátero.
  solucion_pasos:
  - Cada exterior mide 180°−60°=120°; 120°×3=360°.
- titulo: ¿La suma de los ángulos exteriores es siempre 360°?
  respuesta: Sí
  solucion_pasos:
  - Sí, se cumple para todo triángulo, sin importar su forma.
- titulo: ¿La suma de exteriores depende de la suma de interiores?
  respuesta: Sí
  solucion_pasos:
  - Sí, se deduce directamente de que los interiores suman 180°.
errores_frecuentes:
- Confundir la suma de ángulos exteriores (360°) con la de interiores (180°).
- Calcular el ángulo exterior sumando en vez de restar de 180°.
- Tomar dos ángulos exteriores del mismo vértice en vez de uno por vértice.
fuente: Elaboración propia.
estado: publicado
