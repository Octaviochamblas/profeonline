semantic_id: MAT.EST.REPRESENTACION_CONTEO.DIAGRAMA_ARBOL_ESPACIO
titulo: Construcción de diagramas de árbol para representar espacios muestrales
objetivo: Construir un diagrama de árbol para representar de forma ordenada y visual todos los resultados
  posibles de un experimento aleatorio compuesto por varias etapas.
introduccion: Cuando un experimento tiene varias etapas sucesivas (como lanzar una moneda dos veces),
  un diagrama de árbol ayuda a visualizar y no omitir ningún resultado posible.
resumen: Un diagrama de árbol es una representación gráfica en la que cada rama representa un resultado
  posible de una etapa del experimento, y los caminos completos desde la raíz hasta las hojas representan
  todos los resultados del espacio muestral.
explicacion: '![Diagrama de árbol para el espacio muestral](/static/img/probabilidad/conteo/conteo-diagrama-arbol-espacio.svg)


  ### Definición formal


  En un diagrama de árbol, cada nivel representa una etapa del experimento, y cada rama que sale de un
  nodo representa uno de los resultados posibles en esa etapa. Cada camino completo desde la raíz hasta
  una hoja final representa un resultado del espacio muestral.


  ### Desarrollo didáctico


  Al lanzar una moneda dos veces, el primer nivel del árbol tiene dos ramas (C, S); desde cada una de
  ellas surgen otras dos ramas (C, S), dando cuatro caminos completos: CC, CS, SC, SS, que constituyen
  el espacio muestral completo.'
procedimiento:
- 'Paso 1: Identifica cuántas etapas tiene el experimento y cuántos resultados posibles hay en cada una.'
- 'Paso 2: Dibuja la raíz del árbol y traza una rama por cada resultado posible de la primera etapa.'
- 'Paso 3: Desde cada rama de la primera etapa, traza las ramas correspondientes a la siguiente etapa,
  repitiendo hasta completar todas las etapas; cada camino completo es un resultado del espacio muestral.'
ejemplos:
- titulo: Construir el árbol de dos lanzamientos de moneda
  enunciado: Lanzar una moneda dos veces.
  solucion_pasos:
  - 'El árbol tiene dos niveles con dos ramas cada uno, dando 4 caminos: CC, CS, SC, SS.'
- titulo: Construir el árbol de elegir ropa (2 poleras, 2 pantalones)
  enunciado: 2 poleras (A,B) y 2 pantalones (X,Y).
  solucion_pasos:
  - 'El árbol tiene un primer nivel con 2 ramas (poleras) y un segundo nivel con 2 ramas cada una (pantalones),
    dando 4 combinaciones: AX, AY, BX, BY.'
- titulo: ¿Cada camino completo del árbol representa un resultado del espacio muestral?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la interpretación central de esta herramienta de representación.
- titulo: ¿Un diagrama de árbol ayuda a evitar omitir resultados posibles?
  respuesta: Sí
  solucion_pasos:
  - Sí, su estructura ordenada por etapas facilita listar sistemáticamente todos los resultados.
errores_frecuentes:
- Omitir alguna rama en algún nivel del árbol, perdiendo resultados posibles del espacio muestral.
- Confundir un nodo intermedio del árbol con un resultado completo del experimento.
- Repetir ramas innecesariamente, duplicando resultados que ya estaban representados.
fuente: 'Elaboración propia (referencia: Moraleja 405).'
estado: publicado
