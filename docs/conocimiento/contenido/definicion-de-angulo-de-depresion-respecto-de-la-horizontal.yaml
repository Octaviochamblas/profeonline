semantic_id: MAT.GEO.ANGULOS_APLICACIONES.DEPRESION_DEFINICION
titulo: Definición de ángulo de depresión respecto de la horizontal
objetivo: Reconocer un ángulo de depresión en un contexto real y comprobar que la horizontal sigue siendo
  la referencia, aunque el objeto observado quede más abajo.
introduccion: 'Mirar hacia abajo desde un mirador parece lo opuesto del ángulo de elevación, pero la referencia
  geométrica sigue siendo exactamente la misma: la horizontal.'
resumen: El ángulo de depresión se mide desde la horizontal del observador hacia abajo, hasta la línea
  de visión. Como idea de control, la horizontal sigue siendo la referencia, aunque el objeto observado
  quede más abajo.
explicacion: 'El ángulo de depresión se mide desde la horizontal del observador hacia abajo, hasta la
  línea de visión.


  El ejemplo “desde un balcón, el ángulo entre la horizontal de la vista y la mirada hacia un auto en
  la calle es un ángulo de depresión” no se resuelve por apariencia: se justifica usando la definición
  y revisando finalmente que la horizontal sigue siendo la referencia, aunque el objeto observado quede
  más abajo.'
procedimiento:
- 'Paso 1: Ubica la horizontal del observador en el punto desde donde mira.'
- 'Paso 2: Traza la línea de visión hacia el objeto situado más abajo.'
- 'Paso 3: Comprueba que el ángulo se lee desde la horizontal descendiendo hacia la línea visual.'
ejemplos:
- titulo: Lectura del dibujo — Ángulo de depresión
  enunciado: Desde un balcón, el ángulo entre la horizontal de la vista y la mirada hacia un auto en la
    calle es un ángulo de depresión.
  solucion_pasos:
  - Ubica la horizontal del observador en el punto desde donde mira.
  - Traza la línea de visión hacia el objeto situado más abajo.
  - Comprueba que el ángulo se lee desde la horizontal descendiendo hacia la línea visual.
- titulo: Corrección de una respuesta — Ángulo de depresión
  enunciado: En la situación “desde un balcón, el ángulo entre la horizontal de la vista y la mirada hacia
    un auto en la calle es un ángulo de depresión”, un compañero llega a la respuesta correcta pero no
    explica el paso decisivo. Reconstruye la justificación completa.
  solucion_pasos:
  - 'Parte de la definición: el ángulo de depresión se mide desde la horizontal del observador hacia abajo,
    hasta la línea de visión.'
  - Traza la línea de visión hacia el objeto situado más abajo.
  - Comprueba que el ángulo se lee desde la horizontal descendiendo hacia la línea visual.
- titulo: ¿La situación respeta la idea clave del recurso? — Ángulo de depresión
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: el ángulo de depresión se mide desde la horizontal
    del observador hacia abajo, hasta la línea de visión.'
  - En el caso “desde un balcón, el ángulo entre la horizontal de la vista y la mirada hacia un auto en
    la calle es un ángulo de depresión” se observa que la horizontal sigue siendo la referencia, aunque
    el objeto observado quede más abajo.
  - Comprueba que el ángulo se lee desde la horizontal descendiendo hacia la línea visual.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Ángulo de depresión
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de definición de ángulo de depresión respecto
    de la horizontal.
  - Después del paso “Ubica la horizontal del observador en el punto desde donde mira.” todavía hace falta
    revisar “Traza la línea de visión hacia el objeto situado más abajo.”.
  - El cierre correcto exige “Comprueba que el ángulo se lee desde la horizontal descendiendo hacia la
    línea visual.”.
errores_frecuentes:
- Ángulo de depresión significa medirlo desde el suelo del objeto observado y no desde el observador.
- Para resolver ángulo de depresión, basta con el paso “Ubica la horizontal del observador en el punto
  desde donde mira.” y no hace falta revisar “Traza la línea de visión hacia el objeto situado más abajo.”.
- Si el dibujo parece claro, se puede ignorar que la horizontal sigue siendo la referencia, aunque el
  objeto observado quede más abajo.
- Dos configuraciones distintas representan ángulo de depresión solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que el ángulo se lee desde la horizontal
  descendiendo hacia la línea visual.”.
fuente: Currículum Nacional MINEDUC — Aplicaciones de ángulos y lectura geométrica de situaciones cotidianas.
estado: publicado
