semantic_id: MAT.ALG.SISTEMAS_2X2.SISTEMAS_EQUIVALENTES
titulo: Sistemas Equivalentes
objetivo: Identificar cuándo multiplicar una ecuación por una constante mantiene el sistema inalterado.
explicacion: |
  Imagina una ecuación como una receta: '2 manzanas y 1 pera cuestan 5 dólares' ($2x + y = 5$).
  Si multiplicas toda la receta por 3: '6 manzanas y 3 peras cuestan 15 dólares' ($6x + 3y = 15$).

  Es exactamente la misma información, solo amplificada. A esto se le llama una ecuación equivalente.
  En los sistemas de ecuaciones, puedes tomar cualquiera de las ecuaciones, multiplicar todos sus términos por cualquier número (distinto de cero), y el sistema no cambiará sus soluciones. Esta es la base de casi todos los métodos de resolución.
procedimiento: |
  1. Elige una ecuación del sistema.
  2. Multiplica cada término (lado izquierdo y lado derecho) por la misma constante.
  3. La nueva ecuación es matemáticamente equivalente a la original y puedes usarla para reemplazarla en el sistema.
