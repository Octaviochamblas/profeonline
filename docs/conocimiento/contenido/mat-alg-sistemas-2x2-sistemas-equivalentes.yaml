semantic_id: 'MAT.ALG.SISTEMAS_2X2.SISTEMAS_EQUIVALENTES'
titulo: 'Sistemas Equivalentes'
objetivo: |
  Identificar cuándo multiplicar una ecuación por una constante mantiene el sistema inalterado.
introduccion: |
  Imagina una ecuación como una receta: '2 variables principales y 1 pera cuestan 5 dólares' ($2x + y = 5$).
  Si multiplicas toda la receta por 3: '6 variables principales y 3 peras cuestan 15 dólares' ($6x + 3y = 15$).
resumen: 'Este proceso es fundamental para encontrar la solución correcta.'
explicacion: |
  Es exactamente la misma información, solo amplificada. A esto se le llama una ecuación equivalente.
  En los sistemas de ecuaciones, puedes tomar cualquiera de las ecuaciones, multiplicar todos sus términos por cualquier número (distinto de cero), y el sistema no cambiará sus soluciones. Esta es la base de casi todos los métodos de resolución.
procedimiento:
  - 'Paso 1: Elige una ecuación del sistema.'
  - 'Paso 2: Multiplica cada término (lado izquierdo y lado derecho) por la misma constante.'
  - 'Paso 3: La nueva ecuación es matemáticamente equivalente a la original y puedes usarla para reemplazarla en el sistema.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
