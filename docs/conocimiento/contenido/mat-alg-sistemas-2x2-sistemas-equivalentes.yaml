semantic_id: MAT.ALG.SISTEMAS_2X2.SISTEMAS_EQUIVALENTES
titulo: Sistemas Equivalentes
objetivo: Identificar cuándo multiplicar una ecuación por una constante mantiene el sistema inalterado.
introduccion: Es exactamente la misma información, solo amplificada. A esto se le llama una ecuación equivalente.
resumen: Dos sistemas son equivalentes cuando poseen el mismo conjunto solución, aunque sus ecuaciones tengan una
  forma distinta.
explicacion: '### Definición formal


  Dos sistemas de ecuaciones son equivalentes si tienen exactamente el mismo conjunto solución. En símbolos, si $S$
  y $S''$ son sistemas, entonces

  $$S\equiv S'' \iff \operatorname{Sol}(S)=\operatorname{Sol}(S'').$$

  Cualquier transformación que conserve todas y solo las soluciones del sistema original produce un sistema equivalente.
  Entre ellas están reordenar ecuaciones, multiplicar una ecuación por una constante no nula o reemplazar una ecuación
  por una combinación lineal equivalente de las ecuaciones del sistema.


  ### Desarrollo didáctico


  Es exactamente la misma información, solo amplificada. A esto se le llama una ecuación equivalente.

  En los sistemas de ecuaciones, puedes tomar cualquiera de las ecuaciones, multiplicar todos sus términos por cualquier
  número (distinto de cero), y el sistema no cambiará sus soluciones. Esta es la base de casi todos los métodos
  de resolución.'
procedimiento:
- Elige una ecuación del sistema.
- Multiplica cada término (lado izquierdo y lado derecho) por la misma constante.
- La nueva ecuación es matemáticamente equivalente a la original y puedes usarla para reemplazarla en el sistema.
ejemplos:
- titulo: $2x + y = 5$ y $6x + 3y = 15$
  enunciado: Justifica el procedimiento adecuado para el caso $2x + y = 5$ y $6x + 3y = 15$.
  solucion_pasos:
  - 'Imagina una ecuación como una receta: ''2 manzanas y 1 pera cuestan 5 dólares'' ($2x + y = 5$).

    Si multiplicas toda la receta por 3: ''6 manzanas y 3 peras cuestan 15 dólares'' ($6x + 3y = 15$).'
  - Elige una ecuación del sistema.
- titulo: $2x + y = 5$ y $6x + 3y = 15$
  enunciado: Determina qué debe hacerse en $2x + y = 5$ y $6x + 3y = 15$ y fundamenta cada transformación.
  solucion_pasos:
  - 'Imagina una ecuación como una receta: ''2 manzanas y 1 pera cuestan 5 dólares'' ($2x + y = 5$).

    Si multiplicas toda la receta por 3: ''6 manzanas y 3 peras cuestan 15 dólares'' ($6x + 3y = 15$).'
  - Multiplica cada término (lado izquierdo y lado derecho) por la misma constante.
