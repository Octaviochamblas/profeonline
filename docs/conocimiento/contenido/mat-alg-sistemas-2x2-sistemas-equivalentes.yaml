errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Elige una ecuación del sistema».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Multiplica cada término (lado izquierdo y lado
  derecho) por la misma constante».'
- 'La definición sigue cumpliéndose aunque no se considere que imagina una ecuación como una receta: ''2 manzanas
  y 1 pera cuestan 5 dólares'' ($2x + y = 5$).

  Si multiplicas toda la receta por 3: ''6 manzanas y 3 peras cuestan 15 dólares'' ($6x + 3y = 15$).'
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Elige una ecuación del sistema».
- La comprobación del resultado vuelve innecesaria la condición «Multiplica cada término (lado izquierdo y lado
  derecho) por la misma constante».
