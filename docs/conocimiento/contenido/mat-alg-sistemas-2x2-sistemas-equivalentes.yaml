  enunciado: 'Respecto de «Concepto de sistemas de ecuaciones equivalentes»: ¿La siguiente formulación es correcta?
    «Dos sistemas son equivalentes cuando poseen el mismo conjunto solución, aunque sus ecuaciones tengan una forma
    distinta»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Dos sistemas son equivalentes cuando poseen el mismo conjunto
