- titulo: 'Respecto de «Concepto de sistemas de ecuaciones equivalentes»: ¿La siguiente conclusión es c'
  enunciado: 'Respecto de «Concepto de sistemas de ecuaciones equivalentes»: ¿La siguiente conclusión es correcta?
    «Puede omitirse esta condición sin cambiar el resultado: «Elige una ecuación del sistema»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Dos sistemas son equivalentes cuando poseen el mismo conjunto
