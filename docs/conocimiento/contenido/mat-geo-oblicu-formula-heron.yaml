semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.FORMULA_HERON
titulo: Cálculo del área de un triángulo mediante la fórmula de Herón
objetivo: Calcular el área de un triángulo conociendo únicamente sus tres lados, mediante la fórmula de
  Herón, sin necesidad de conocer ningún ángulo.
introduccion: Cuando se conocen los tres lados de un triángulo pero ningún ángulo, la fórmula de Herón
  permite calcular el área directamente a partir del semiperímetro.
resumen: El área de un triángulo de lados $a$, $b$, $c$ y semiperímetro $s=\dfrac{a+b+c}{2}$ se calcula
  como $\text{Área}=\sqrt{s(s-a)(s-b)(s-c)}$.
explicacion: '![Fórmula de Herón](/static/img/geometria/trigonometria/oblicu-formula-heron.svg)


  ### Definición formal


  Dado un triángulo de lados $a$, $b$, $c$, se calcula primero el semiperímetro $s=\dfrac{a+b+c}{2}$,
  y luego el área como $\text{Área}=\sqrt{s(s-a)(s-b)(s-c)}$.


  ### Desarrollo didáctico


  Para un triángulo de lados $a=7$, $b=8$, $c=9$: $s=\dfrac{7+8+9}{2}=12$, y $\text{Área}=\sqrt{12\times5\times4\times3}=\sqrt{720}\approx26{,}83$.'
procedimiento:
- 'Paso 1: Calcula el semiperímetro s=(a+b+c)/2.'
- 'Paso 2: Calcula las tres diferencias (s-a), (s-b) y (s-c).'
- 'Paso 3: Calcula el área como la raíz cuadrada del producto s×(s-a)×(s-b)×(s-c).'
ejemplos:
- titulo: Calcular el área con lados 7, 8, 9
  enunciado: a=7, b=8, c=9.
  solucion_pasos:
  - s=(7+8+9)/2=12; Área=√(12×5×4×3)=√720≈26,83.
- titulo: Calcular el área de un triángulo equilátero de lado 6
  enunciado: a=b=c=6.
  solucion_pasos:
  - s=(6+6+6)/2=9; Área=√(9×3×3×3)=√243≈15,59.
- titulo: ¿Se necesita conocer algún ángulo para usar esta fórmula?
  respuesta: 'No'
  solucion_pasos:
  - 'No, esa es justamente su ventaja: solo requiere los tres lados.'
- titulo: ¿El semiperímetro es la mitad del perímetro del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, s=(a+b+c)/2, exactamente la mitad de la suma de los tres lados.
errores_frecuentes:
- Olvidar dividir por 2 al calcular el semiperímetro, usando el perímetro completo.
- Calcular mal alguna de las diferencias (s-a), (s-b) o (s-c).
- Olvidar extraer la raíz cuadrada final, dejando el resultado como el producto sin la raíz.
fuente: Elaboración propia.
estado: publicado
