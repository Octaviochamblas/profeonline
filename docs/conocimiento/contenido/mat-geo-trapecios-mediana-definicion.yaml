semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.MEDIANA_TRAPECIO_DEFINICION
titulo: Definición de mediana del trapecio
objetivo: 'Comprender qué es la mediana de un trapecio: el segmento que une los puntos medios de los dos
  lados laterales.'
introduccion: Así como un triángulo tiene medianas hacia sus vértices, el trapecio tiene un segmento especial,
  también llamado mediana, con una ubicación y propiedades particulares.
resumen: La mediana de un trapecio es el segmento que une los puntos medios de sus dos lados laterales
  (no paralelos).
explicacion: '![Mediana de un trapecio](/static/img/geometria/poligonos-cuadrilateros/trapecios-mediana-definicion.svg)


  ### Definición formal


  En un trapecio $ABCD$ con lados laterales $AD$ y $BC$, la mediana es el segmento que une el punto medio
  de $AD$ con el punto medio de $BC$.


  ### Desarrollo didáctico


  A diferencia de la mediana de un triángulo (que va de un vértice al punto medio del lado opuesto), la
  mediana del trapecio conecta los puntos medios de los dos lados no paralelos, y resulta ser paralela
  a ambas bases.'
procedimiento:
- 'Paso 1: Identifica los dos lados laterales (no paralelos) del trapecio.'
- 'Paso 2: Encuentra el punto medio de cada uno de esos dos lados.'
- 'Paso 3: El segmento que une esos dos puntos medios es la mediana del trapecio.'
ejemplos:
- titulo: Identificar la mediana en un trapecio
  enunciado: Un trapecio ABCD tiene lados laterales AD y BC.
  solucion_pasos:
  - La mediana conecta el punto medio de AD con el punto medio de BC.
- titulo: Reconocer el paralelismo de la mediana
  enunciado: ¿La mediana de un trapecio es paralela a las bases?
  solucion_pasos:
  - Sí, la mediana siempre es paralela tanto a la base mayor como a la base menor.
- titulo: ¿La mediana pasa por el centro exacto del trapecio?
  respuesta: No necesariamente
  solucion_pasos:
  - No necesariamente por el 'centro' geométrico, pero sí divide a los lados laterales exactamente por
    la mitad.
- titulo: ¿Es la mediana lo mismo que una diagonal del trapecio?
  respuesta: 'No'
  solucion_pasos:
  - No, la diagonal une dos vértices no consecutivos; la mediana une los puntos medios de los lados laterales.
errores_frecuentes:
- Confundir la mediana del trapecio con una diagonal.
- Confundir esta mediana con la mediana de un triángulo (concepto relacionado pero distinto).
- Creer que la mediana conecta los puntos medios de las bases, en vez de los lados laterales.
fuente: 'Fuente: Moraleja Tomo 2 69.'
estado: publicado
