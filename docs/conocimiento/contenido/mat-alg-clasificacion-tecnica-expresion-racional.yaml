semantic_id: MAT.ALG.CLASIFICACION_TECNICA.EXPRESION_RACIONAL
objetivo: Englobar las expresiones enteras y fraccionarias bajo el concepto general
  de Expresión Racional, excluyendo a las irracionales.
introduccion: 'En el reino animal, tanto los leones como los tigres son felinos. En
  el álgebra, tanto las expresiones enteras como las fraccionarias pertenecen a una
  misma gran familia: Las Racionales.'
resumen: Una **Expresión Algebraica Racional** es el conjunto mayor que engloba tanto
  a las expresiones enteras como a las fraccionarias. Su característica definitoria
  es que **ninguna de sus variables está bajo el signo de una raíz (radical)** ni
  afectada por exponentes fraccionarios.
explicacion: "La palabra 'racional' en matemáticas suele estar asociada a la idea\
  \ de proporción o fracción sin componentes infinitos no periódicos. \n- $3x^2 +\
  \ 5$ es racional (y además, entera).\n- $\\frac{2}{x}$ es racional (y además, fraccionaria).\n\
  - $\\sqrt{5} \\cdot x$ es racional. (Ojo: ¡La raíz afecta al número 5, no a la 'x'!).\n\
  \n¿Quién no entra a la fiesta? Las expresiones donde la *variable* está atrapada\
  \ dentro de un radical, como $\\sqrt{x}$. Esas son la otra gran familia (Irracionales)."
procedimiento:
- 'Paso 1: Revisa toda la expresión buscando símbolos de raíz (cuadrada, cúbica, etc.)
  o exponentes en forma de fracción (ej. x^(1/2)).'
- 'Paso 2: Si ves alguna raíz, fíjate qué hay adentro.'
- 'Paso 3: Si dentro de la raíz SOLO hay números, y ninguna letra, la expresión sigue
  siendo Racional.'
- 'Paso 4: Si no hay raíces afectando letras, puedes clasificarla con seguridad como
  Racional.'
ejemplos:
- titulo: El club racional
  enunciado: Verifica si la expresión x^2 + 3/x - √7 es racional.
  solucion_pasos:
  - El primer término no tiene raíz. Es racional.
  - El segundo tiene una fracción (letra en denominador), pero no tiene raíz. Es racional.
  - El tercero es √7. Es una raíz, pero adentro solo hay un número (el 7). No afecta
    a las variables.
  - 'Conclusión: La expresión completa es Racional.'
errores_frecuentes:
- Creer que la presencia de un número irracional (como $\sqrt{2}$ o $\pi$) vuelve
  a la expresión algebraica irracional. La clasificación depende del estado de las
  *variables*, no de las constantes numéricas.
- Pensar que una expresión no puede ser simultáneamente 'Fraccionaria' y 'Racional'.
  (Fraccionaria es un subtipo de Racional).
fuente: Álgebra de Baldor.
estado: publicado
