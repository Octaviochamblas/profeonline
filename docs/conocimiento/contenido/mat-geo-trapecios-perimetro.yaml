semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.PERIMETRO_TRAPECIO
titulo: Cálculo del perímetro de un trapecio
objetivo: 'Calcular el perímetro de un trapecio sumando las longitudes de sus cuatro lados: las dos bases
  y los dos lados laterales.'
introduccion: A diferencia del paralelogramo (donde bastan dos lados por la congruencia de opuestos),
  en un trapecio general se necesitan los cuatro lados para calcular el perímetro.
resumen: 'El perímetro de un trapecio es la suma de sus cuatro lados: la base mayor, la base menor, y
  los dos lados laterales.'
explicacion: '![Perímetro de un trapecio: suma de los cuatro lados](/static/img/geometria/poligonos-cuadrilateros/trapecios-perimetro.svg)


  ### Definición formal


  Si un trapecio tiene base mayor $B$, base menor $b$, y lados laterales $l_1$ y $l_2$, su perímetro es
  $P=B+b+l_1+l_2$.


  ### Desarrollo didáctico


  Un trapecio con base mayor 15 cm, base menor 9 cm, y lados laterales de 7 cm y 8 cm tiene perímetro
  $P=15+9+7+8=39$ cm. A diferencia del paralelogramo, aquí no se puede simplificar la fórmula asumiendo
  lados iguales, salvo en el caso particular del trapecio isósceles.'
procedimiento:
- 'Paso 1: Identifica las longitudes de las dos bases (mayor y menor).'
- 'Paso 2: Identifica las longitudes de los dos lados laterales.'
- 'Paso 3: Suma los cuatro valores para obtener el perímetro.'
ejemplos:
- titulo: Calcular el perímetro con los cuatro lados conocidos
  enunciado: Un trapecio tiene base mayor 15 cm, base menor 9 cm, y lados laterales de 7 y 8 cm.
  solucion_pasos:
  - P=15+9+7+8=39 cm.
- titulo: Calcular el perímetro de un trapecio isósceles
  enunciado: Un trapecio isósceles tiene bases 20 y 12 cm, y lados laterales de 6,5 cm cada uno.
  solucion_pasos:
  - P=20+12+6,5+6,5=45 cm.
- titulo: ¿Se necesitan los cuatro lados para calcular este perímetro?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del paralelogramo, en un trapecio general no se puede deducir un lado a partir de
    otro.
- titulo: ¿En un trapecio isósceles se simplifica el cálculo?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que los dos lados laterales son iguales, basta con conocer uno de ellos.
errores_frecuentes:
- Olvidar sumar alguno de los cuatro lados del trapecio.
- Confundir la mediana con uno de los lados al calcular el perímetro.
- Asumir (incorrectamente) que los lados laterales son siempre iguales en cualquier trapecio, no solo
  en el isósceles.
fuente: 'Fuente: Moraleja Tomo 2 69, Cid 34.'
estado: publicado
