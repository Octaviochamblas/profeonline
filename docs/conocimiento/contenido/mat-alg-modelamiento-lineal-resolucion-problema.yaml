semantic_id: MAT.ALG.MODELAMIENTO_LINEAL.RESOLUCION_PROBLEMA
titulo: Resolución del Problema Modelado
objetivo: Aplicar técnicas de resolución lineal a la ecuación planteada.
introduccion: 'Te concentras puramente en el álgebra: reduces términos semejantes ($3x = 30$) y despejas ($x = 10$).'
resumen: Este es el paso mecánico. Tienes tu ecuación $x + 2x = 30$. Ahora te olvidas de Juan, de Pedro y de las
  palabras.
explicacion: '### Definición formal


  Este es el paso mecánico. Tienes tu ecuación $x + 2x = 30$. Ahora te olvidas de Juan, de Pedro y de las palabras.


  ### Desarrollo didáctico


  Te concentras puramente en el álgebra: reduces términos semejantes ($3x = 30$) y despejas ($x = 10$).


  Aquí aplicas todo lo que has aprendido en los módulos anteriores: transposición, uso del MCM si hay fracciones,
  o distribución de signos negativos si hay restas.'
procedimiento:
- Aisla la ecuación del contexto verbal.
- Aplica la reducción de términos semejantes.
- Transpón los términos numéricos a un lado y la incógnita al otro.
- Divide por el coeficiente de la incógnita para obtener el valor numérico de 'x'.
ejemplos:
- titulo: $3x = 30$ y $x = 10$
  enunciado: Justifica el procedimiento adecuado para el caso $3x = 30$ y $x = 10$.
  solucion_pasos:
  - 'Te concentras puramente en el álgebra: reduces términos semejantes ($3x = 30$) y despejas ($x = 10$).'
  - Aisla la ecuación del contexto verbal.
- titulo: $x + 2x = 30$
  enunciado: Determina qué debe hacerse en $x + 2x = 30$ y fundamenta cada transformación.
  solucion_pasos:
  - Este es el paso mecánico. Tienes tu ecuación $x + 2x = 30$. Ahora te olvidas de Juan, de Pedro y de las palabras.
  - Aplica la reducción de términos semejantes.
- titulo: 'Respecto de «Resolución de un problema mediante ecuación lineal»: ¿La siguiente formulación'
  enunciado: 'Respecto de «Resolución de un problema mediante ecuación lineal»: ¿La siguiente formulación es correcta?
    «Este es el paso mecánico»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Este es el paso mecánico.'
- titulo: 'Respecto de «Resolución de un problema mediante ecuación lineal»: ¿La siguiente conclusión e'
  enunciado: 'Respecto de «Resolución de un problema mediante ecuación lineal»: ¿La siguiente conclusión es correcta?
    «Puede omitirse esta condición sin cambiar el resultado: «Aisla la ecuación del contexto verbal»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Este es el paso mecánico.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Aisla la ecuación del contexto verbal».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Aplica la reducción de términos semejantes».'
- La definición sigue cumpliéndose aunque no se considere que este es el paso mecánico. Tienes tu ecuación $x +
  2x = 30$. Ahora te olvidas de Juan, de Pedro y de las palabras.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Divide por el coeficiente de la incógnita
  para obtener el valor numérico de 'x'».
- La comprobación del resultado vuelve innecesaria la condición «Aisla la ecuación del contexto verbal».
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
