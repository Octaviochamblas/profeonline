semantic_id: MAT.ALG.MODELAMIENTO_LINEAL.RESOLUCION_PROBLEMA
titulo: Resolución del Problema Modelado
objetivo: Aplicar técnicas de resolución lineal a la ecuación planteada.
explicacion: |
  Este es el paso mecánico. Tienes tu ecuación $x + 2x = 30$. Ahora te olvidas de Juan, de Pedro y de las palabras.

  Te concentras puramente en el álgebra: reduces términos semejantes ($3x = 30$) y despejas ($x = 10$).

  Aquí aplicas todo lo que has aprendido en los módulos anteriores: transposición, uso del MCM si hay fracciones, o distribución de signos negativos si hay restas.
procedimiento: |
  1. Aisla la ecuación del contexto verbal.
  2. Aplica la reducción de términos semejantes.
  3. Transpón los términos numéricos a un lado y la incógnita al otro.
  4. Divide por el coeficiente de la incógnita para obtener el valor numérico de 'x'.
