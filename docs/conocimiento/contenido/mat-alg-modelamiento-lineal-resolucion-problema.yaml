semantic_id: 'MAT.ALG.MODELAMIENTO_LINEAL.RESOLUCION_PROBLEMA'
titulo: 'Resolución del Problema Modelado'
objetivo: 'Aplicar técnicas de resolución lineal a la ecuación planteada.'
introduccion: |
  Este es el paso mecánico. Tienes tu ecuación $x + 2x = 30$. Ahora te haces abstracción del contexto verbal.
resumen: |
  Aquí aplicas todo lo que has aprendido en los módulos anteriores: transposición, uso del MCM si hay fracciones, o distribución de signos negativos si hay restas.
explicacion: |
  Te concentras puramente en el álgebra: reduces términos semejantes ($3x = 30$) y despejas ($x = 10$).
procedimiento:
  - 'Paso 1: Aisla la ecuación del contexto verbal.'
  - 'Paso 2: Aplica la reducción de términos semejantes.'
  - 'Paso 3: Transpón los términos numéricos a un lado y la incógnita al otro.'
  - 'Paso 4: Divide por el coeficiente de la incógnita para obtener el valor numérico de ''x''.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
