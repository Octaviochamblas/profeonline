semantic_id: MAT.EST.GRAFICOS_BASE.BARRAS_SIMPLES
titulo: Representar datos mediante gráficos de barras simples
objetivo: Representar datos categóricos o discretos mediante un gráfico de barras simples, donde la altura
  de cada barra indica la frecuencia.
introduccion: El gráfico de barras es una de las formas más comunes y directas de visualizar datos estadísticos,
  especialmente para variables cualitativas o discretas.
resumen: Un gráfico de barras simples representa cada categoría o valor de la variable con una barra,
  cuya altura (o longitud) es proporcional a su frecuencia.
explicacion: '![Gráfico de barras simples](/static/img/estadistica/grafbase/grafbase-barras-simples.svg)


  ### Definición formal


  Cada categoría se representa con una barra separada de las demás, de altura proporcional a su frecuencia
  $f_i$, permitiendo comparar visualmente los valores.


  ### Desarrollo didáctico


  Si 4 estudiantes prefieren fútbol, 7 básquetbol y 3 vóleibol, se dibuja una barra para cada deporte,
  con alturas proporcionales a 4, 7 y 3 respectivamente.'
procedimiento:
- 'Paso 1: Identifica las categorías o valores de la variable y sus frecuencias.'
- 'Paso 2: Dibuja un eje con las categorías y otro con la escala de frecuencia.'
- 'Paso 3: Dibuja una barra para cada categoría, con altura proporcional a su frecuencia, dejando espacio
  entre barras.'
ejemplos:
- titulo: Construir un gráfico de barras de deportes favoritos
  enunciado: 'Fútbol: 4, Básquetbol: 7, Vóleibol: 3.'
  solucion_pasos:
  - Se dibujan 3 barras separadas, con alturas proporcionales a 4, 7 y 3.
- titulo: Interpretar un gráfico de barras de mascotas
  enunciado: Un gráfico muestra barras de altura 5 (perro), 3 (gato), 1 (otro).
  solucion_pasos:
  - La mascota más común es el perro (barra más alta, frecuencia 5), seguida del gato (3) y otros (1).
- titulo: ¿Las barras de un gráfico de barras simples deben estar separadas entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del histograma, las barras están separadas porque representan categorías distintas.
- titulo: ¿La altura de cada barra representa la frecuencia de esa categoría?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la característica central de este tipo de gráfico.
errores_frecuentes:
- Dibujar las barras pegadas entre sí, confundiendo el gráfico de barras con un histograma.
- No usar una escala consistente en el eje de frecuencias, distorsionando la comparación visual.
- Omitir etiquetas claras de las categorías o de los valores de frecuencia en el gráfico.
fuente: 'Elaboración propia (referencia: Moraleja 200, 352).'
estado: publicado
