semantic_id: MAT.NUM.INTERES_SIMPLE.CAPITAL_INICIAL
objetivo: Despejar el capital inicial en la ecuación de interés simple.
introduccion: 'A veces sabes cuánto quieres retirar al final de un plazo y cuánto
  paga el banco, pero la gran pregunta es: ¿Cuánto dinero tengo que meter hoy para
  lograr esa meta? Para eso hay que despejar el Capital Inicial.'
resumen: Si conoces el interés generado ($I$), $C = I / (i \cdot t)$. Si conoces el
  monto final total ($M$), $C = M / (1 + i \cdot t)$.
explicacion: "Como $M = C \\cdot (1 + i \\cdot t)$ y $I = C \\cdot i \\cdot t$, podemos\
  \ usar álgebra para encontrar el Capital Inicial ($C$) si nos dan los otros datos.\n\
  \n**Caso 1: Te dan el dinero que ganaste (solo intereses $I$)**\nDespejando $C$\
  \ de la fórmula chica: \n$$C = \\frac{I}{i \\cdot t}$$\n\n**Caso 2: Te dan el dinero\
  \ final total de la cuenta ($M$)**\nDespejando $C$ de la fórmula grande (el paréntesis\
  \ pasa dividiendo):\n$$C = \\frac{M}{1 + i \\cdot t}$$\n*(Este caso es muy común\
  \ en problemas de la PAES).* "
procedimiento:
- 'Paso 1: Lee cuidadosamente si el dinero que te dan es el ''interés generado'' o
  ''el total en la cuenta''.'
- 'Paso 2: Convierte la tasa a decimal y asegúrate de que el tiempo esté en la misma
  unidad.'
- 'Paso 3: Divide el dato por $(i \cdot t)$ o por $(1 + i \cdot t)$ según corresponda.'
ejemplos:
- titulo: Meta de ahorro
  enunciado: Al cabo de 5 años, una inversión a interés simple del 4% anual se convirtió
    en un total de $3.600.000. ¿Cuánto se invirtió inicialmente?
  solucion_pasos:
  - Es el total, usamos $C = M / (1 + i \cdot t)$.
  - $M = 3.600.000$, $i = 0.04$, $t = 5$.
  - 'Denominador: $1 + (0.04 \cdot 5) = 1 + 0.20 = 1.20$.'
  - $C = 3.600.000 / 1.20 = 3.000.000$. Se invirtieron 3 millones.
errores_frecuentes:
- Restar los intereses al Monto usando la tasa sobre el Monto Final (¡Los intereses
  siempre se calculan sobre el capital inicial desconocido, por eso hay que usar división!).
- Dividir el Monto $M$ solo por $(i \cdot t)$, confundiendo las fórmulas.
fuente: Currículum Nacional MINEDUC.
estado: publicado
