semantic_id: MAT.GEO.TRANSVERSAL_BARICENTRO.BARICENTRO_INTERSECCION
titulo: Definición de baricentro como punto de intersección de las transversales de gravedad
objetivo: Reconocer el baricentro como el punto único donde concurren las tres transversales de gravedad
  de un triángulo.
introduccion: 'Al igual que ocurre con las alturas y las bisectrices, las tres transversales de gravedad
  de un triángulo también concurren siempre en un único punto: el baricentro.'
resumen: El baricentro es el punto donde se intersecan las tres transversales de gravedad de un triángulo.
explicacion: '![Baricentro, intersección de las transversales de gravedad](/static/img/geometria/elementos-secundarios/transversal-baricentro-baricentro-interseccion.svg)


  ### Definición formal


  Dado un triángulo ABC, el baricentro G es el punto común a las tres transversales de gravedad trazadas
  desde A, B y C. Su coordenada es el promedio de los tres vértices: $G=\frac{A+B+C}{3}$.


  ### Desarrollo didáctico


  A diferencia del ortocentro y el circuncentro, el baricentro siempre se ubica en el interior del triángulo,
  sin importar su forma.'
procedimiento:
- 'Paso 1: Traza (o identifica) las tres transversales de gravedad del triángulo.'
- 'Paso 2: Encuentra el punto donde las tres se cruzan.'
- 'Paso 3: Ese punto es el baricentro.'
ejemplos:
- titulo: Identificar el baricentro
  enunciado: Las tres transversales de gravedad de un triángulo se cruzan en un punto G.
  solucion_pasos:
  - G es el baricentro del triángulo.
- titulo: Basta con dos transversales
  enunciado: ¿Es necesario trazar las tres transversales de gravedad para hallar el baricentro?
  solucion_pasos:
  - 'No, basta con trazar dos: su intersección ya es el baricentro.'
- titulo: ¿El baricentro siempre está dentro del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del ortocentro y el circuncentro, el baricentro siempre queda dentro.
- titulo: ¿El baricentro coincide con el ortocentro en general?
  respuesta: 'No'
  solucion_pasos:
  - No, son puntos distintos salvo en el triángulo equilátero.
errores_frecuentes:
- Creer que se necesitan las tres transversales de gravedad para ubicar el baricentro (basta con dos).
- Confundir el baricentro con el incentro, el ortocentro o el circuncentro.
- Pensar que el baricentro puede quedar fuera del triángulo.
fuente: Elaboración propia.
estado: publicado
