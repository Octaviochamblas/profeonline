semantic_id: MAT.EST.NORMAL_CALCULO.LECTURA_TABLA
titulo: Usar la tabla Z para áreas acumuladas
objetivo: Usar la tabla Z para obtener el área acumulada a la izquierda de un valor determinado en la distribución
  normal estándar.
introduccion: La tabla Z es como un mapa gigante que ya tiene calculadas todas las áreas bajo la curva normal
  estándar, para que no tengas que calcular integrales.
resumen: La tabla Z entrega directamente el área acumulada a la izquierda de un valor $Z$ dado, es decir,
  $P(Z\leq z)$.
explicacion: '![Uso de la tabla Z](/static/img/estadistica/normcalc/normcalc-lectura-tabla.svg)


  ### Definición formal


  La tabla de la distribución normal estándar (tabla Z) entrega el valor de $P(Z\leq z)$ para distintos valores de

  $z$, es decir, el área acumulada bajo la curva a la izquierda de ese punto.


  ### Desarrollo didáctico


  En vez de calcular integrales, basta con buscar el valor de $Z$ en la tabla para obtener directamente la

  probabilidad acumulada correspondiente.'
procedimiento:
- 'Paso 1: Calcula el puntaje $Z$ del valor de interés (si es necesario).'
- 'Paso 2: Busca ese valor de $Z$ en la tabla normal estándar.'
- 'Paso 3: Lee el área acumulada correspondiente, que representa $P(Z\leq z)$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: ¿Qué representa el valor que entrega la tabla Z para un puntaje dado?
  solucion_pasos:
  - Representa el área acumulada a la izquierda de ese puntaje Z.
  - Es decir, la probabilidad $P(Z\leq z)$.
- titulo: Ejemplo 2
  enunciado: ¿Por qué es útil la tabla Z para resolver problemas de distribución normal?
  solucion_pasos:
  - Porque evita tener que calcular integrales para obtener probabilidades.
  - Basta con buscar el valor correspondiente en la tabla.
- titulo: ¿La tabla Z entrega el área acumulada a la izquierda de un valor Z?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente su función.
- titulo: ¿La tabla Z entrega directamente la probabilidad de un valor puntual exacto?
  respuesta: 'No'
  solucion_pasos:
  - 'No, entrega áreas acumuladas (probabilidades de intervalos), no probabilidades puntuales.'
errores_frecuentes:
- Confundir el área acumulada con el área de la cola derecha del valor.
- Buscar el valor equivocado de Z en la tabla por error de signo.
- Olvidar que la tabla siempre entrega la probabilidad acumulada hasta ese punto (no a partir de él).
- Interpolar incorrectamente cuando el valor Z no aparece exacto en la tabla.
- Confundir la tabla Z con una tabla de valores de otra distribución.
fuente: 'Elaboración propia (referencia: Moraleja 308).'
estado: publicado
