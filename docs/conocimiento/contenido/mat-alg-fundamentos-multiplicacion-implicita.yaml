semantic_id: MAT.ALG.FUNDAMENTOS.MULTIPLICACION_IMPLICITA
objetivo: Reconocer la multiplicación implícita por ausencia de signos entre números,
  letras y paréntesis.
introduccion: En matemáticas, a veces el mayor mensaje es el que no está escrito.
  Cuando las letras y los números se abrazan sin separadores en medio, hay una operación
  invisible ocurriendo.
resumen: La **Multiplicación Implícita** es la convención algebraica donde **la ausencia
  de un signo de operación entre números, letras o paréntesis indica obligatoriamente
  una multiplicación**.
explicacion: 'El signo ''por'' ($\cdot$ o $\times$) a menudo se omite por estética
  y velocidad.

  - Entre un número y una letra: $5x$ significa $5 \cdot x$.

  - Entre dos letras: $ab$ significa $a \cdot b$.

  - Antes de un paréntesis: $3(x + 2)$ significa $3 \cdot (x + 2)$.

  - Entre dos paréntesis: $(a)(b)$ significa $(a) \cdot (b)$.


  ATENCIÓN: Esto NO aplica entre dos números explícitos. $52$ es cincuenta y dos,
  NO es $5 \cdot 2$. Para multiplicar números explicitamente debes usar el punto ($5
  \cdot 2$) o paréntesis $5(2)$.'
procedimiento:
- 'Paso 1: Observa si dos elementos están adyacentes sin un signo ''+'' ni ''-'' entre
  ellos.'
- 'Paso 2: Si al menos uno de ellos es una letra o un paréntesis, asume que están
  multiplicándose.'
- 'Paso 3: Si ambos son números arábigos sueltos (ej. 4 y 7 formados como 47), no
  hay multiplicación, es la conformación posicional del número.'
ejemplos:
- titulo: Traductor explícito
  enunciado: Reescribe la expresión 4xyz(a+b) mostrando todas sus multiplicaciones
    ocultas.
  solucion_pasos:
  - 'Entre el 4 y la x hay multiplicación: 4 * x'
  - 'Entre x, y, z hay multiplicación: x * y * z'
  - 'Entre la z y el paréntesis hay multiplicación: z * (a+b)'
  - 'Resultado: 4 * x * y * z * (a+b)'
errores_frecuentes:
- 'Confundir la multiplicación implícita con adición. (Ej: pensar que $xy$ significa
  $x + y$).'
- 'Aplicar la regla a números fijos (ej: al reemplazar $x=2$ en $3x$, escribir 32
  en lugar de $3 \cdot 2 = 6$).'
fuente: Álgebra de Baldor.
estado: publicado
