semantic_id: MAT.ALG.SIMILARIDAD.IGUALDAD_FACTOR_LITERAL
objetivo: Reconocer la igualdad del factor literal como condición necesaria para la
  semejanza.
introduccion: La matemática es un idioma preciso. Una 'x' no es lo mismo que una 'y',
  así como un auto no es lo mismo que un barco. Si intentas mezclarlos operativamente,
  crearás caos.
resumen: La primera regla de la semejanza es la **Igualdad del Factor Literal**. Para
  que dos términos puedan sumarse o restarse, deben contener exactamente el mismo
  conjunto de variables (letras).
explicacion: 'Comparemos $8m$ y $5n$.

  - El primer término pertenece al grupo de las ''m''.

  - El segundo término pertenece al grupo de las ''n''.

  Como no comparten la misma letra, no son semejantes. No se pueden reducir. La expresión
  $8m + 5n$ queda exactamente así, no se puede simplificar a $13mn$ (ese es un error
  garrafal).'
procedimiento:
- 'Paso 1: Extrae visualmente todas las letras del primer término.'
- 'Paso 2: Extrae todas las letras del segundo término.'
- 'Paso 3: Compara. Si falta alguna letra en un lado, o sobra alguna, los términos
  NO son semejantes.'
ejemplos:
- titulo: Letras incompatibles
  enunciado: ¿Son semejantes 7pq y 7pr?
  solucion_pasos:
  - 'Factor literal 1: pq.'
  - 'Factor literal 2: pr.'
  - Aunque la 'p' coincide, la 'q' no es lo mismo que la 'r'.
  - 'Conclusión: No son semejantes.'
errores_frecuentes:
- Creer que si comparten algunas letras (ej. $abc$ y $ab$) ya son semejantes. Tienen
  que ser exactamente todas las letras iguales.
- Asumir que un término con una letra extra se puede sumar ignorando la letra sobrante.
fuente: Álgebra de Baldor.
estado: publicado
