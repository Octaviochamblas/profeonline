semantic_id: MAT.ALG.ORDEN_FUNDAMENTOS.DESIGUALDAD_LITERAL
"titulo": "Desigualdades con expresiones literales"
"objetivo": "Reconocer desigualdades que involucran variables y parámetros algebraicos."
"introduccion": |-
  El álgebra utiliza letras para representar incógnitas o cantidades variables dentro de relaciones de orden.
"resumen": |-
  Las desigualdades literales contienen al menos una variable, y su veracidad depende de los valores que adopte dicha variable.
"explicacion": |-
  ### Definición formal
  Sea $E_1(x)$ y $E_2(x)$ expresiones algebraicas. Una desigualdad literal es de la forma $E_1(x) \\mathcal{R} E_2(x)$, con $\\mathcal{R} \\in \\{<, >, \\leq, \\geq\\}$.

  ### Desarrollo didáctico
  El conjunto de valores que satisface la desigualdad literal constituye el conjunto solución de la inecuación.
"procedimiento":
- "Identificar las variables en la expresión."
- "Establecer la relación de orden que vincula las expresiones."
- "Despejar la variable aplicando las propiedades de las desigualdades."
"ejemplos":
- "enunciado": "Analizar la validez de la relación para $x = 3$ frente a $y = 2$."
  "solucion_pasos":
  - "Evaluar los valores asignados a cada variable."
  - "Comparar los resultados obtenidos en el marco de la definición formal."
  "titulo": "Ejemplo de análisis 1 en el contexto de la relación matemática"
- "enunciado": "Analizar la validez de la relación para $x = 4$ frente a $y = 4$."
  "solucion_pasos":
  - "Evaluar los valores asignados a cada variable."
  - "Comparar los resultados obtenidos en el marco de la definición formal."
  "titulo": "Ejemplo de análisis 2 en el contexto de la relación matemática"
- "respuesta": "Sí"
  "solucion_pasos":
  - "Reemplazar el valor propuesto en la formulación."
  - "Verificar la concordancia lógica positiva."
  "titulo": "¿Cumple el número $5$ con la condición matemática descrita?"
- "respuesta": "No"
  "solucion_pasos":
  - "Sustituir la cantidad constante en el modelo algebraico."
  - "Demostrar que el valor no satisface la exigencia definida."
  "titulo": "¿Cumple el número $-3$ con la condición matemática descrita?"
"errores_frecuentes":
- "Las variables en una desigualdad solo pueden ser positivas."
- "El conjunto solución de una desigualdad literal es siempre un único número."
- "Al multiplicar ambos lados por una variable, el símbolo nunca cambia."
- "Las desigualdades literales no pueden tener soluciones reales vacías."
- "Un parámetro algebraico siempre es mayor que cero."
