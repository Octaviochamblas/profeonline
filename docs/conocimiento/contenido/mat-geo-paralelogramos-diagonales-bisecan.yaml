semantic_id: MAT.GEO.PARALELOGRAMOS.DIAGONALES_BISECAN
titulo: Propiedad de las diagonales de un paralelogramo que se dimidian entre sí
objetivo: Reconocer que las dos diagonales de un paralelogramo se cortan en un punto que es el punto medio
  de ambas.
introduccion: 'Al trazar las dos diagonales de un paralelogramo, ocurre algo notable en el punto donde
  se cruzan: ese punto divide a ambas diagonales exactamente por la mitad.'
resumen: 'Las diagonales de un paralelogramo se bisecan (se dimidian) entre sí: se cortan en un punto
  que es el punto medio de ambas diagonales.'
explicacion: '![Diagonales que se dimidian en un paralelogramo](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-diagonales-bisecan.svg)


  ### Definición formal


  En un paralelogramo $ABCD$ con diagonales $AC$ y $BD$ que se cortan en el punto $M$, se cumple $AM=MC$
  y $BM=MD$: $M$ es el punto medio de ambas diagonales.


  ### Desarrollo didáctico


  Si una diagonal mide 10 cm, cada mitad (desde un vértice hasta el punto de intersección) mide 5 cm.
  Esta propiedad es exclusiva de los paralelogramos: en un trapecio, por ejemplo, las diagonales no se
  bisecan entre sí (excepto en casos muy particulares).'
procedimiento:
- 'Paso 1: Identifica el punto donde se cruzan las dos diagonales del paralelogramo.'
- 'Paso 2: Recuerda que ese punto es el punto medio de ambas diagonales.'
- 'Paso 3: Si conoces la longitud completa de una diagonal, divídela entre 2 para obtener cada mitad.'
ejemplos:
- titulo: Calcular la mitad de una diagonal
  enunciado: Una diagonal de un paralelogramo mide 10 cm.
  solucion_pasos:
  - Cada mitad (desde un vértice al punto de intersección) mide 5 cm.
- titulo: Calcular la diagonal completa desde una mitad
  enunciado: Desde el punto de intersección hasta un vértice hay 6 cm.
  solucion_pasos:
  - La diagonal completa mide 12 cm (el doble de la mitad conocida).
- titulo: ¿El punto de intersección de las diagonales es el punto medio de ambas?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad esencial de las diagonales en un paralelogramo.
- titulo: ¿Esta propiedad se cumple en cualquier cuadrilátero?
  respuesta: 'No'
  solucion_pasos:
  - No, es específica de los paralelogramos; en general no se cumple en trapecios o trapezoides.
errores_frecuentes:
- Aplicar esta propiedad a cuadriláteros que no son paralelogramos (como trapecios).
- Confundir el punto de intersección con el centro de la figura (coinciden en el paralelogramo, pero conceptualmente
  son ideas distintas).
- Olvidar dividir entre 2 al calcular la mitad de una diagonal a partir de su longitud completa.
fuente: 'Fuente: Moraleja Tomo 2 68, Cid 45.'
estado: publicado
