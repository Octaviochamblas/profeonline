semantic_id: MAT.ALG.LENGUAJE_RELACIONES.ENTEROS_CONSECUTIVOS
objetivo: Modelar series de varios números enteros que se suceden uno tras otro.
introduccion: Ya sabemos encontrar al que sigue en la fila, pero ¿qué pasa si necesitamos
  a los tres siguientes, o a una familia entera de consecutivos? Necesitamos encadenar
  la lógica del sucesor.
resumen: 'Una **Serie de Enteros Consecutivos** se traduce tomando una variable inicial
  ($x$) y sumándole progresivamente $1, 2, 3...$ para representar los siguientes elementos:
  **$x, (x+1), (x+2), (x+3)$...**'
explicacion: 'Al modelar problemas verbales con tres o más números consecutivos, tienes
  libertad para elegir el punto de partida, pero la progresión debe mantenerse intacta.

  - Modelo clásico: El menor es $x$. Los tres consecutivos son $x$, $x+1$, $x+2$.

  - Modelo centrado (muy útil para simplificar ecuaciones): El del medio es $x$. Los
  tres consecutivos son $x-1$, $x$, $x+1$.


  Ambos modelos son correctos, pero si el problema te pide ''el número menor'' y usaste
  el modelo centrado, ¡recuerda que el menor era $x-1$, no $x$!'
procedimiento:
- 'Paso 1: Identifica cuántos números consecutivos pide el problema (tres, cuatro,
  cinco...).'
- 'Paso 2: Decide si partirás desde el menor (x) o desde un punto central.'
- 'Paso 3: Construye la lista sumando 1 sucesivamente: x, x+1, x+2...'
- 'Paso 4: Si el problema pide la suma de todos, escribe la suma total de la lista
  y reduce términos semejantes.'
ejemplos:
- titulo: Tres hermanos seguidos
  enunciado: 'Traduce algebraicamente: ''La suma de las edades de tres hermanos que
    nacieron en años consecutivos''.'
  solucion_pasos:
  - 'Hermano menor: x.'
  - 'Hermano del medio: x + 1.'
  - 'Hermano mayor: x + 2.'
  - 'Suma total: x + (x + 1) + (x + 2).'
  - 'Si reducimos, obtenemos: 3x + 3.'
errores_frecuentes:
- 'Traducir ''tres números consecutivos'' usando tres letras distintas como $x, y,
  z$. (Error fatal: se pierde la relación matemática entre ellos, que es distar en
  una unidad).'
- Olvidar a la $x$ solita y empezar a contar desde $x+1$. (Ej. escribir $x+1, x+2,
  x+3$ como tres consecutivos, lo cual es válido, pero hace que la variable $x$ no
  sea ninguno de los números del conjunto).
fuente: Álgebra de Baldor.
estado: publicado
