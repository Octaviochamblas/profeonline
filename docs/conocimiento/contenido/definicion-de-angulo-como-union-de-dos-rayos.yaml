semantic_id: MAT.GEO.ANGULOS_FUNDAMENTOS.DEFINICION_RAYOS
titulo: Definición de ángulo como unión de dos rayos
objetivo: Reconocer cuándo dos rayos sí forman un ángulo y comprobar que sin origen común no hay ángulo,
  sino dos rayos distintos.
introduccion: Cuando una puerta se abre, ambas posiciones salen de la misma bisagra. Esa idea de origen
  compartido es la que hace aparecer un ángulo.
resumen: Un ángulo es la figura formada por dos rayos que comparten un mismo origen. Como idea de control,
  sin origen común no hay ángulo, sino dos rayos distintos.
explicacion: 'Un ángulo es la figura formada por dos rayos que comparten un mismo origen.


  La situación “los rayos \(OA\) y \(OB\) parten del punto \(O\) y abren una esquina visible” muestra
  cómo pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se
  verifica que sin origen común no hay ángulo, sino dos rayos distintos.'
procedimiento:
- 'Paso 1: Identifica si los dos rayos parten exactamente del mismo punto.'
- 'Paso 2: Observa la abertura determinada por esos rayos y no por segmentos ajenos al vértice.'
- 'Paso 3: Concluye si la figura corresponde a un ángulo y justifica por qué.'
ejemplos:
- titulo: Lectura del dibujo — Definición de ángulo
  enunciado: Los rayos \(OA\) y \(OB\) parten del punto \(O\) y abren una esquina visible.
  solucion_pasos:
  - Identifica si los dos rayos parten exactamente del mismo punto.
  - Observa la abertura determinada por esos rayos y no por segmentos ajenos al vértice.
  - Concluye si la figura corresponde a un ángulo y justifica por qué.
- titulo: Chequeo del procedimiento — Definición de ángulo
  enunciado: 'Un estudiante usa la idea “sin origen común no hay ángulo, sino dos rayos distintos” al
    analizar este caso: los rayos \(OA\) y \(OB\) parten del punto \(O\) y abren una esquina visible.
    Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: un ángulo es la figura formada por dos rayos que comparten un mismo origen.'
  - Observa la abertura determinada por esos rayos y no por segmentos ajenos al vértice.
  - Concluye si la figura corresponde a un ángulo y justifica por qué.
- titulo: ¿Puede concluirse correctamente este hecho? — Definición de ángulo
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo es la figura formada por dos rayos
    que comparten un mismo origen.'
  - En el caso “los rayos \(OA\) y \(OB\) parten del punto \(O\) y abren una esquina visible” se observa
    que sin origen común no hay ángulo, sino dos rayos distintos.
  - Concluye si la figura corresponde a un ángulo y justifica por qué.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Definición de ángulo
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de definición de ángulo como unión de dos
    rayos.
  - Después del paso “Identifica si los dos rayos parten exactamente del mismo punto.” todavía hace falta
    revisar “Observa la abertura determinada por esos rayos y no por segmentos ajenos al vértice.”.
  - El cierre correcto exige “Concluye si la figura corresponde a un ángulo y justifica por qué.”.
errores_frecuentes:
- Definición de ángulo significa dos segmentos cualesquiera que aparezcan separados en el dibujo.
- Para resolver definición de ángulo, basta con el paso “Identifica si los dos rayos parten exactamente
  del mismo punto.” y no hace falta revisar “Observa la abertura determinada por esos rayos y no por segmentos
  ajenos al vértice.”.
- Si el dibujo parece claro, se puede ignorar que sin origen común no hay ángulo, sino dos rayos distintos.
- Dos configuraciones distintas representan definición de ángulo solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si la figura corresponde a un ángulo
  y justifica por qué.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
