semantic_id: MAT.ALG.FUNC_POTENCIA_BASE.EXPONENTE_PAR_IMPAR
titulo: Distinción entre exponente par e impar
objetivo: Diferenciar el comportamiento de $f(x)=x^n$ según si $n$ es un entero par o impar.
introduccion: Que un exponente sea par o impar cambia radicalmente cómo se comporta la función frente a valores
  negativos de $x$.
resumen: Si $n$ es **par**, $f(x)=x^n$ siempre es positivo o cero, sin importar el signo de $x$; si $n$ es
  **impar**, $f(x)=x^n$ conserva el signo de $x$.
explicacion: '### Definición formal


  Para $n$ par, $(-x)^n=x^n$ para todo $x$, así que $f(-x)=f(x)$: la función es par y su resultado nunca es
  negativo. Para $n$ impar, $(-x)^n=-x^n$, así que $f(-x)=-f(x)$: la función es impar y su resultado conserva el
  signo de $x$.


  ### Desarrollo didáctico


  Con $n=2$: $(-3)^2=9$ y $3^2=9$, el mismo resultado positivo. Con $n=3$: $(-3)^3=-27$ y $3^3=27$, resultados
  opuestos que conservan el signo de la base original.'
procedimiento:
- 'Paso 1: Determina si el exponente $n$ es par o impar.'
- 'Paso 2: Si es par, anticipa que el resultado será siempre positivo o cero, sin importar el signo de $x$.'
- 'Paso 3: Si es impar, anticipa que el resultado conservará el signo de $x$.'
ejemplos:
- titulo: Evaluación con exponente par
  enunciado: 'Evalúa $f(x)=x^4$ en $x=-2$ y $x=2$.'
  solucion_pasos:
  - '$(-2)^4=16$ y $2^4=16$: ambos resultados son iguales y positivos.'
  - Se confirma el comportamiento típico de exponente par.
- titulo: Evaluación con exponente impar
  enunciado: 'Evalúa $f(x)=x^5$ en $x=-2$ y $x=2$.'
  solucion_pasos:
  - '$(-2)^5=-32$ y $2^5=32$: los resultados son opuestos.'
  - Se confirma que la función conserva el signo de $x$, típico de exponente impar.
- titulo: ¿Puede $x^n$ ser negativo si $n$ es par?
  enunciado: ¿Puede $x^n$ tomar un valor negativo cuando $n$ es un entero par?
  respuesta: 'No'
  solucion_pasos:
  - Con exponente par, el resultado siempre es mayor o igual a $0$, sin importar el signo de $x$.
- titulo: ¿$x^n$ puede ser negativo si $n$ es impar y $x$ es negativo?
  enunciado: ¿Puede $x^n$ ser negativo si $n$ es impar y $x$ es un número negativo?
  respuesta: Sí
  solucion_pasos:
  - Con exponente impar, el signo del resultado coincide con el signo de la base.
errores_frecuentes:
- Suponer que $(-x)^n$ siempre da el mismo resultado que $x^n$, sin importar la paridad de $n$.
- Confundir la paridad del exponente con la paridad del coeficiente $a$.
- Aplicar el comportamiento de exponente par a un exponente impar, o viceversa.
- Olvidar verificar el signo de $x$ antes de calcular el resultado con exponente impar.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
