semantic_id: MAT.ALG.DESIG_PROPIEDADES.DIVISION_NEGATIVA
titulo: División por una cantidad negativa
objetivo: Resolver desigualdades invirtiendo correctamente el sentido de las mismas
  al dividir por una cantidad negativa.
introduccion: De forma análoga a la multiplicación, cuando se requiere dividir una
  desigualdad por un número negativo para despejar una incógnita, la relación de orden
  sufre una alteración fundamental.
resumen: Al dividir ambos lados de una inecuación por un número real negativo, el
  sentido de la inecuación debe ser invertido.
explicacion: '### Definición formal

  Sean $a, b, c \in \mathbb{R}$, con $c < 0$. Si $a \leq b$, entonces $\frac{a}{c}
  \geq \frac{b}{c}$. Si $a \geq b$, entonces $\frac{a}{c} \leq \frac{b}{c}$.


  ### Desarrollo didáctico

  Dividir por un número negativo es lo mismo que multiplicar por una fracción negativa.
  En ambos casos se induce una reflexión en la recta numérica, provocando que los
  números mayores pasen a ser los menores y viceversa.'
procedimiento:
  - Identificar el coeficiente negativo que divide a la incógnita.
  - Dividir el miembro izquierdo por ese valor negativo.
  - Dividir el miembro derecho por el mismo valor.
  - Invertir inmediatamente el sentido del símbolo de la desigualdad.
  - Simplificar para obtener el resultado final.
ejemplos:
  - titulo: Despeje con coeficiente negativo
    enunciado: Resuelva la inecuación $-5x > 15$.
    solucion_pasos:
      - Dividir ambos lados por $-5$.
      - Invertir el símbolo de $>$ a $<$.
      - $\frac{-5x}{-5} < \frac{15}{-5}$.
      - 'Simplificar: $x < -3$.'
  - titulo: Incógnita con signo negativo
    enunciado: Resuelva $-m \leq -7$.
    solucion_pasos:
      - Dividir por $-1$ a ambos lados.
      - 'Invertir el signo: $\frac{-m}{-1} \geq \frac{-7}{-1}$.'
      - Obtener el resultado $m \geq 7$.
  - titulo: Si tenemos $-8 < -4$, ¿al dividir entre $-2$ obtenemos $4 > 2$?
    respuesta: Sí
    solucion_pasos:
      - Dividimos los términos entre $-2$, que es negativo.
      - El $-8$ se convierte en $4$ y el $-4$ se convierte en $2$.
      - Invertimos el signo de $<$ a $>$, obteniendo $4 > 2$ (verdadero).
  - titulo: ¿Se conserva la desigualdad si se divide un número positivo entre un número
      negativo?
    respuesta: 'No'
    solucion_pasos:
      - Siempre que el número que efectúa la división en ambos lados sea negativo,
        el símbolo debe invertirse.
      - Es indiferente si el numerador original es positivo o negativo.
errores_frecuentes:
  - Dividir por un número negativo no altera el sentido de la desigualdad.
  - Si $x < y$ y $c < 0$, entonces $\frac{x}{c} < \frac{y}{c}$.
  - El signo solo se invierte si el resultado de la división es negativo.
  - Dividir por un decimal negativo no requiere cambiar el símbolo.
  - Si se divide por un negativo, se debe cambiar el signo de la desigualdad a igualdad.
