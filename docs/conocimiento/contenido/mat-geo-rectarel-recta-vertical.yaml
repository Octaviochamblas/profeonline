semantic_id: MAT.GEO.RECTA_RELACIONES.RECTA_VERTICAL
titulo: Identificación de rectas verticales como caso sin pendiente definida
objetivo: Identificar que una recta vertical no tiene pendiente definida, ya que su cálculo implicaría
  una división por cero, y que su ecuación tiene la forma x=k.
introduccion: A diferencia de todas las demás rectas, las verticales no pueden describirse con una pendiente
  numérica, porque cualquier intento de calcularla produce una división por cero.
resumen: Una recta vertical tiene ecuación de la forma $x=k$, para alguna constante $k$, y no tiene pendiente
  definida.
explicacion: '![Recta vertical](/static/img/geometria/analitica/rectarel-recta-vertical.svg)


  ### Definición formal


  En una recta vertical, todos los puntos tienen la misma coordenada x, por lo que $x_2-x_1=0$ para cualquier
  par de puntos, haciendo que $m=\dfrac{y_2-y_1}{x_2-x_1}$ no esté definida (división por cero).


  ### Desarrollo didáctico


  La recta $x=2$ es vertical: para cualquier valor de $y$ (positivo, negativo o cero), el valor de $x$
  siempre es 2.'
procedimiento:
- 'Paso 1: Verifica si todos los puntos de la recta comparten la misma coordenada x.'
- 'Paso 2: Si es así, reconoce que la recta es vertical, con ecuación x=k.'
- 'Paso 3: Recuerda que esta recta no tiene pendiente definida ni forma principal y=mx+b.'
ejemplos:
- titulo: Reconocer una recta vertical por su ecuación
  enunciado: x=2.
  solucion_pasos:
  - Esta ecuación no depende de y, por lo que representa una recta vertical en x=2.
- titulo: Reconocer una recta vertical por dos puntos
  enunciado: Puntos (4,1) y (4,9).
  solucion_pasos:
  - Como ambos puntos tienen la misma coordenada x, la recta es vertical (x=4), sin pendiente definida.
- titulo: ¿Una recta vertical tiene pendiente igual a 0?
  respuesta: 'No'
  solucion_pasos:
  - No, una recta vertical no tiene pendiente definida en absoluto (no es 0, sino indefinida).
- titulo: ¿El eje y mismo es un caso particular de recta vertical?
  respuesta: Sí
  solucion_pasos:
  - Sí, el eje y corresponde a la recta vertical x=0.
errores_frecuentes:
- Confundir la ausencia de pendiente definida con una pendiente igual a 0.
- Confundir recta vertical con recta horizontal.
- Intentar escribir una recta vertical en la forma y=mx+b.
fuente: Elaboración propia.
estado: publicado
