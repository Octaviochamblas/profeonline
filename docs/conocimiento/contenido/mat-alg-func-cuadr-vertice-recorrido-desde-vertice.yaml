semantic_id: MAT.ALG.FUNC_CUADR_VERTICE.RECORRIDO_DESDE_VERTICE
titulo: Determinación del recorrido de la función cuadrática a partir del vértice y la concavidad
objetivo: Determinar el recorrido de una función cuadrática combinando la información del vértice y la concavidad.
introduccion: A diferencia del dominio (siempre $\mathbb{R}$), el recorrido de una función cuadrática sí depende
  de sus coeficientes, y se determina fácilmente combinando el vértice con la dirección de apertura.
resumen: El **recorrido** de $f(x)=ax^2+bx+c$ es $[y_v,+\infty[$ si $a>0$ (la función crece indefinidamente hacia
  arriba desde el mínimo), o $]-\infty,y_v]$ si $a<0$ (decrece indefinidamente hacia abajo desde el máximo).
explicacion: '### Definición formal


  Dada $f(x)=ax^2+bx+c$ con vértice $(x_v,y_v)$: si $a>0$, $\text{Rec}(f)=[y_v,+\infty[$; si $a<0$, $\text{Rec}(f)=]-\infty,y_v]$.
  En ambos casos, el intervalo incluye el valor $y_v$ mismo, ya que es alcanzado exactamente en $x=x_v$.


  ### Desarrollo didáctico


  El procedimiento combina dos datos ya conocidos: primero se calcula el vértice (específicamente $y_v$), y luego
  se usa el signo de $a$ para decidir si el intervalo va "hacia arriba" o "hacia abajo" desde ese valor.


  Para $f(x)=2x^2-4x+5$, con vértice $(1,3)$ y $a=2>0$: el recorrido es $[3,+\infty[$.'
procedimiento:
- 'Paso 1: Calcula la coordenada $y_v$ del vértice de la función.'
- 'Paso 2: Identifica el signo de $a$.'
- 'Paso 3: Si $a>0$, el recorrido es $[y_v,+\infty[$; si $a<0$, el recorrido es $]-\infty,y_v]$.'
ejemplos:
- titulo: Determinación de recorrido con a positivo
  enunciado: 'Determina el recorrido de $f(x)=x^2-6x+8$.'
  solucion_pasos:
  - 'Vértice: $(3,-1)$; $a=1>0$.'
  - 'Recorrido: $[-1,+\infty[$.'
- titulo: Determinación de recorrido con a negativo
  enunciado: 'Determina el recorrido de $f(x)=-3x^2+12x-7$.'
  solucion_pasos:
  - 'Vértice: $(2,5)$; $a=-3<0$.'
  - 'Recorrido: $]-\infty,5]$.'
- titulo: ¿El recorrido de una función cuadrática incluye siempre el valor $y_v$?
  enunciado: ¿El recorrido de una función cuadrática incluye siempre el valor $y_v$?
  respuesta: Sí
  solucion_pasos:
  - El valor $y_v$ se alcanza exactamente en $x=x_v$, por lo que siempre pertenece al recorrido.
- titulo: ¿El recorrido de una función cuadrática puede ser todo $\mathbb{R}$?
  enunciado: ¿El recorrido de una función cuadrática puede ser todo $\mathbb{R}$?
  respuesta: 'No'
  solucion_pasos:
  - Siempre está acotado por un lado (superior o inferior) debido a la existencia del vértice.
errores_frecuentes:
- Confundir el recorrido con el dominio, que siempre es $\mathbb{R}$ en una función cuadrática.
- Invertir la dirección del intervalo del recorrido según el signo de $a$.
- Usar paréntesis en vez de corchetes en el extremo donde se alcanza $y_v$, excluyéndolo incorrectamente.
- No calcular primero el vértice antes de intentar determinar el recorrido.
