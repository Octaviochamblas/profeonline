semantic_id: MAT.NUM.FINANZAS_PERSONALES.IPC_DEFINICION
titulo: Definición del Índice de Precios al Consumidor
objetivo: Comprender qué es el IPC (Índice de Precios al Consumidor) y cómo afecta el poder adquisitivo.
introduccion: Hace 10 años, con $10.000 llenabas el carro del supermercado. Hoy, con suerte compras un
  par de cosas. El dinero pierde valor invisiblemente. El culpable (o el termómetro de esto) es la inflación,
  medida a través del IPC.
resumen: El IPC mide la variación de los precios de una 'canasta básica' de bienes y servicios a lo largo
  del tiempo. Un IPC positivo indica inflación (las cosas están más caras, tu dinero vale menos).
explicacion: 'El **Índice de Precios al Consumidor (IPC)** es el indicador oficial que mide la **inflación**.

  - El Instituto Nacional de Estadísticas (INE) arma una ''Canasta Básica'' representativa de lo que consume
  una familia chilena promedio (pan, transporte, vivienda, salud, educación).

  - Cada mes miden si esa misma canasta cuesta más o menos que el mes anterior.

  - **IPC Positivo (+0.4%):** Hubo inflación. El costo de vida subió.

  - **Poder Adquisitivo:** Si hay inflación, pero tu sueldo no sube, tu ''poder adquisitivo'' (lo que
  puedes comprar con tu sueldo) disminuye.


  Por eso, la UF (Unidad de Fomento) se reajusta diariamente según la variación mensual del IPC. Los créditos,
  arriendos y planes de salud suelen estar en UF para proteger a los vendedores de la inflación.'
procedimiento:
- 'Paso 1: Identifica si el IPC del período fue positivo (inflación) o negativo (deflación).'
- 'Paso 2: Si el IPC es positivo, los precios subieron.'
- 'Paso 3: Si tu sueldo se mantuvo igual, tu capacidad de compra (poder adquisitivo) bajó en esa misma
  proporción.'
ejemplos:
- titulo: Aumento de precios y sueldo congelado
  enunciado: Si el IPC del año fue de un 5% y tu sueldo no subió nada en todo el año, ¿eres más rico o
    más pobre?
  solucion_pasos:
  - Los productos son un 5% más caros.
  - Tu sueldo es el mismo en billetes, pero ahora compra menos cosas.
  - Por lo tanto, eres un 5% más 'pobre' en poder adquisitivo.
errores_frecuentes:
- Creer que si la inflación baja, los precios bajan (Falso. Si la inflación baja de 8% a 4%, los precios
  SIGUEN SUBIENDO, pero más lento. Para que los precios bajen debe haber IPC negativo o Deflación).
- Pensar que el IPC mide solo el precio del pan y la bencina (Mide una canasta de cientos de productos).
fuente: Currículum Nacional MINEDUC.
estado: publicado
