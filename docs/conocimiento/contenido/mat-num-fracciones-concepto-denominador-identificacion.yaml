semantic_id: MAT.NUM.FRACCIONES_CONCEPTO.DENOMINADOR_IDENTIFICACION
titulo: Identificación del denominador de una fracción
objetivo: Identificar el denominador de una fracción y su significado dentro de la interpretación parte-todo.
introduccion: El número escrito abajo en una fracción, el denominador, indica en cuántas partes iguales
  se dividió el entero de referencia; sin él, el numerador no tiene sentido por sí solo.
resumen: 'En \(\frac{a}{b}\), el denominador es \(b\): el número total de partes iguales en que se dividió
  el entero, con \(b\neq0\).'
explicacion: '### Definición formal


  En la fracción \(\frac{a}{b}\), el denominador \(b\) (con \(b\neq0\)) es el término que ocupa la posición
  inferior y determina el tamaño de cada parte: el entero se divide en \(b\) partes iguales, cada una
  de tamaño \(\frac{1}{b}\).


  ### Desarrollo didáctico


  En \(\frac{5}{7}\), el denominador es \(7\): el entero se dividió en \(7\) partes iguales, y cada una
  de ellas mide \(\frac{1}{7}\) del entero.'
procedimiento:
- 'Paso 1: Ubica el número escrito bajo la barra y verifica que no sea cero.'
- 'Paso 2: Interprétalo como la cantidad de partes iguales en que se divide la unidad.'
- 'Paso 3: Comprueba que el tamaño de cada parte sea \(1/b\) de la unidad.'
ejemplos:
- titulo: Aplicación razonada — Identificación del denominador
  enunciado: En \(\frac{5}{7}\), el denominador es 7 y representa las partes iguales del entero.
  solucion_pasos:
  - Ubica el número escrito bajo la barra y verifica que no sea cero.
  - Interprétalo como la cantidad de partes iguales en que se divide la unidad.
  - Comprueba que el tamaño de cada parte sea \(1/b\) de la unidad.
- titulo: Revisión de una solución — Identificación del denominador
  enunciado: Una solución aplica “Interprétalo como la cantidad de partes iguales en que se divide la
    unidad.”, pero termina sin comprobar que el denominador se escribe bajo la barra de fracción y no
    puede ser cero. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación del denominador: el denominador indica en cuántas
    partes iguales se dividió el todo.'
  - Ubica el número escrito bajo la barra y verifica que no sea cero.
  - 'Completa la revisión con este control: Comprueba que el tamaño de cada parte sea \(1/b\) de la unidad.'
- titulo: ¿Se cumple que el denominador se escribe bajo la barra de fracción y no puede ser cero? — Identificación
    del denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el denominador indica en cuántas partes iguales se dividió
    el todo.
  - El caso “En \(\frac{5}{7}\), el denominador es 7 y representa las partes iguales del entero” satisface
    esa condición.
  - Comprueba que el tamaño de cada parte sea \(1/b\) de la unidad.
- titulo: ¿Es válido omitir el paso “Ubica el número escrito bajo la barra y verifica que no sea cero”?
    — Identificación del denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación del denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Interprétalo como la cantidad de partes iguales
    en que se divide la unidad.'
  - 'La solución debe terminar de este modo: Comprueba que el tamaño de cada parte sea \(1/b\) de la unidad.'
errores_frecuentes:
- 'Empezar identificación del denominador sin realizar este control inicial: Ubica el número escrito bajo
  la barra y verifica que no sea cero.'
- Memorizar “En \(\frac{5}{7}\), el denominador es 7 y representa las partes iguales del entero” como
  respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Interprétalo como la cantidad de partes iguales en que se divide la unidad.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación del denominador que contradice el criterio “El denominador
  se escribe bajo la barra de fracción y no puede ser cero”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que el tamaño de cada parte sea \(1/b\)
  de la unidad.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
estado: publicado
