semantic_id: MAT.ALG.REDUCCION_OPERATIVA.MULTIPLES_TERMINOS
objetivo: Reducir expresiones algebraicas con múltiples términos semejantes de signos
  mixtos.
introduccion: 'En el mundo real rara vez las cosas son solo positivas o solo negativas.
  Los presupuestos tienen ingresos y egresos mezclados. En álgebra pasa lo mismo:
  debemos ordenar la mezcla y agrupar lo que es de la misma familia.'
resumen: Para reducir **Múltiples Términos** semejantes con signos mixtos, la estrategia
  es agrupar primero los positivos entre sí y los negativos entre sí, luego restar
  los totales parciales.
explicacion: 'Simplifica $7x - 3x + 5x - 9x$.


  Estrategia de dos pasos:

  1. Agrupamos positivos: $7x + 5x = 12x$.

  2. Agrupamos negativos: $3x + 9x = 12x$ (en valor absoluto).

  3. Restamos totales: $12x - 12x = 0$.


  El resultado es $0$ — los términos se cancelan perfectamente.


  Otro ejemplo: $10a - 2a + 4a - 7a$.

  - Positivos: $10a + 4a = 14a$.

  - Negativos: $2a + 7a = 9a$.

  - Resultado: $14a - 9a = 5a$.'
procedimiento:
- 'Paso 1: Marca visualmente (o separa en columnas) los términos positivos y los negativos.'
- 'Paso 2: Suma los coeficientes de los términos positivos entre sí.'
- 'Paso 3: Suma los coeficientes de los términos negativos entre sí (en valor absoluto).'
- 'Paso 4: Resta el total negativo al total positivo para obtener el resultado final.'
ejemplos:
- titulo: El presupuesto algebraico
  enunciado: 'Reduce: 8n - 5n + 2n - 3n.'
  solucion_pasos:
  - 'Positivos: 8n + 2n = 10n.'
  - 'Negativos: 5n + 3n = 8n.'
  - 'Restamos: 10n - 8n = 2n.'
  - 'Resultado: 2n.'
errores_frecuentes:
- Procesar los términos de izquierda a derecha sin ordenar, lo que puede provocar
  errores en la gestión de signos.
- Olvidar sumar el valor de un término negativo al grupo de negativos (omitirlo porque
  'se ve pequeño').
fuente: Álgebra de Baldor.
estado: publicado
