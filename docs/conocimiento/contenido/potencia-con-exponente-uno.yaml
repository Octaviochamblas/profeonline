semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.EXPONENTE_UNO
titulo: Potencia con exponente uno
objetivo: Simplificar potencias de exponente uno.
introduccion: El exponente uno suele quedar invisible en el álgebra, pero explica por qué una letra sin
  exponente representa su primera potencia.
resumen: 'Toda base conserva su valor al elevarse a uno: \(a^1=a\). Un solo factor no modifica la base.'
explicacion: 'Toda base conserva su valor al elevarse a uno: \(a^1=a\).


  Al analizar “\((-7)^1=-7\)” conviene observar la conexión siguiente: un solo factor no modifica la base'
procedimiento:
- 'Paso 1: Comprueba que el exponente sea exactamente \(1\).'
- 'Paso 2: Conserva íntegra la base, incluidos su signo y sus paréntesis.'
- 'Paso 3: Verifica interpretando la potencia como un producto de un único factor.'
ejemplos:
- titulo: Aplicación razonada — Potencia con exponente uno
  enunciado: \((-7)^1=-7\).
  solucion_pasos:
  - Comprueba que el exponente sea exactamente \(1\).
  - Conserva íntegra la base, incluidos su signo y sus paréntesis.
  - Verifica interpretando la potencia como un producto de un único factor.
- titulo: Revisión de una solución — Potencia con exponente uno
  enunciado: Una solución aplica “Conserva íntegra la base, incluidos su signo y sus paréntesis.”, pero
    termina sin comprobar que un solo factor no modifica la base. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define potencia con exponente uno: toda base conserva su valor al elevarse
    a uno: \(a^1=a\).'
  - Comprueba que el exponente sea exactamente \(1\).
  - 'Completa la revisión con este control: Verifica interpretando la potencia como un producto de un
    único factor.'
- titulo: ¿Se cumple que un solo factor no modifica la base? — Potencia con exponente uno
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que toda base conserva su valor al elevarse a uno: \(a^1=a\).'
  - El caso “\((-7)^1=-7\)” satisface esa condición.
  - Verifica interpretando la potencia como un producto de un único factor.
- titulo: ¿Es válido omitir el paso “Comprueba que el exponente sea exactamente \(1\)”? — Potencia con
    exponente uno
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de potencia con exponente uno.
  - 'Omitirlo puede volver inválida la acción siguiente: Conserva íntegra la base, incluidos su signo
    y sus paréntesis.'
  - 'La solución debe terminar de este modo: Verifica interpretando la potencia como un producto de un
    único factor.'
errores_frecuentes:
- 'Confundir potencia con exponente uno con otro concepto y omitir este inicio: Comprueba que el exponente
  sea exactamente \(1\).'
- Aplicar mecánicamente “Conserva íntegra la base, incluidos su signo y sus paréntesis.” sin revisar las
  condiciones de la definición.
- Tomar “\((-7)^1=-7\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “un solo factor no modifica la base”.
- 'Terminar el desarrollo sin realizar este control: Verifica interpretando la potencia como un producto
  de un único factor.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
