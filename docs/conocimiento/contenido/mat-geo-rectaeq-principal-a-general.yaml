semantic_id: MAT.GEO.RECTA_ECUACIONES.PRINCIPAL_A_GENERAL
titulo: Conversión de la ecuación principal a la forma general
objetivo: Convertir una ecuación de la forma principal y=mx+b a la forma general Ax+By+C=0, reagrupando
  todos los términos en un solo lado.
introduccion: Algunos procedimientos (como el cálculo de distancia de un punto a una recta) requieren
  la ecuación en forma general, por lo que es necesario saber convertir desde la forma principal.
resumen: 'Dada la ecuación principal $y=mx+b$, se obtiene la forma general reagrupando todos los términos:
  $mx-y+b=0$, es decir, $A=m$, $B=-1$, $C=b$.'
explicacion: '![Conversión: forma principal a general](/static/img/geometria/analitica/rectaeq-principal-a-general.svg)


  ### Definición formal


  De $y=mx+b$, pasando todos los términos a un lado: $mx-y+b=0$. Si se desea evitar coeficientes fraccionarios,
  se puede multiplicar toda la ecuación por un número conveniente.


  ### Desarrollo didáctico


  Para $y=-0{,}5x+2$: reagrupando, $0{,}5x+y-2=0$, o equivalentemente (multiplicando por 2) $x+2y-4=0$,
  evitando el coeficiente decimal.'
procedimiento:
- 'Paso 1: Escribe la ecuación principal y=mx+b.'
- 'Paso 2: Pasa todos los términos a un lado de la ecuación, igualando a cero: mx-y+b=0.'
- 'Paso 3: Si conviene, multiplica toda la ecuación por un número para eliminar fracciones o decimales.'
ejemplos:
- titulo: Convertir y=3x-4 a forma general
  enunciado: y=3x-4.
  solucion_pasos:
  - 3x-y-4=0.
- titulo: Convertir y=-0,5x+2 a forma general sin decimales
  enunciado: y=-0,5x+2.
  solucion_pasos:
  - '0,5x+y-2=0, y multiplicando por 2: x+2y-4=0.'
- titulo: ¿Existe una única forma general correcta para una recta?
  respuesta: 'No'
  solucion_pasos:
  - No, existen múltiples formas equivalentes (múltiplos entre sí) para la misma recta.
- titulo: ¿Es válido multiplicar toda la ecuación general por una constante no nula?
  respuesta: Sí
  solucion_pasos:
  - Sí, se obtiene una ecuación equivalente que representa la misma recta.
errores_frecuentes:
- Olvidar pasar todos los términos al mismo lado de la ecuación.
- Cometer errores de signo al reagrupar los términos.
- Creer que existe una única forma general correcta, sin reconocer las formas equivalentes.
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
