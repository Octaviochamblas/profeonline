semantic_id: MAT.GEO.CARTESIANO_BASE.UBICACION_PUNTOS
titulo: Ubicación de puntos mediante pares ordenados
objetivo: Ubicar correctamente puntos en el plano cartesiano a partir de sus pares ordenados, y viceversa,
  determinar el par ordenado de un punto ya graficado.
introduccion: 'Ubicar un punto en el plano cartesiano es como seguir instrucciones de un mapa: primero
  se avanza horizontalmente según la abscisa, y luego verticalmente según la ordenada.'
resumen: Para ubicar un punto $(x,y)$ en el plano cartesiano, se avanza $x$ unidades horizontalmente desde
  el origen (a la derecha si es positivo, a la izquierda si es negativo) y luego $y$ unidades verticalmente
  (hacia arriba si es positivo, hacia abajo si es negativo).
explicacion: '![Ubicación de puntos en el plano cartesiano](/static/img/geometria/cartesiano-vectores/cartesiano-ubicacion-puntos.svg)


  ### Definición formal


  Para graficar un punto $P(x,y)$, se parte del origen, se desplaza $|x|$ unidades horizontalmente (derecha
  si $x>0$, izquierda si $x<0$) y luego $|y|$ unidades verticalmente (arriba si $y>0$, abajo si $y<0$).


  ### Desarrollo didáctico


  En la figura, los puntos $A(4,3)$, $B(-3,2)$, $C(-2,-4)$ y $D(3,-2)$ están ubicados siguiendo este procedimiento,
  cada uno en un cuadrante distinto según el signo de sus coordenadas.'
procedimiento:
- 'Paso 1: Parte desde el origen (0,0) del plano cartesiano.'
- 'Paso 2: Desplázate horizontalmente según el valor de x (a la derecha si es positivo, a la izquierda
  si es negativo).'
- 'Paso 3: Desde esa posición, desplázate verticalmente según el valor de y (hacia arriba si es positivo,
  hacia abajo si es negativo), y marca el punto final.'
ejemplos:
- titulo: Ubicar un punto con coordenadas positivas
  enunciado: Se pide ubicar el punto A(4,3).
  solucion_pasos:
  - Desde el origen, avanza 4 unidades a la derecha y 3 unidades hacia arriba; ese es el punto A.
- titulo: Ubicar un punto con coordenadas negativas
  enunciado: Se pide ubicar el punto C(-2,-4).
  solucion_pasos:
  - Desde el origen, avanza 2 unidades a la izquierda y 4 unidades hacia abajo; ese es el punto C.
- titulo: ¿El orden de los desplazamientos (horizontal primero, luego vertical) es importante?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre se avanza primero según x (horizontal) y luego según y (vertical), siguiendo el orden
    del par ordenado.
- titulo: ¿Se puede determinar el par ordenado de un punto ya graficado?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con leer cuántas unidades está desplazado horizontal y verticalmente respecto del origen.
errores_frecuentes:
- Invertir el orden de los desplazamientos, moviéndose primero verticalmente y luego horizontalmente.
- Confundir la dirección del desplazamiento según el signo de la coordenada (derecha/izquierda, arriba/abajo).
- Olvidar partir siempre desde el origen al ubicar un nuevo punto.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Baldor 292, Santillana 13).'
estado: publicado
