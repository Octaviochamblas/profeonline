semantic_id: MAT.NUM.APROXIMACIONES.APROXIMACION_DEFECTO
titulo: Aproximación por defecto
objetivo: Aproximar un número decimal descartando las cifras posteriores al orden pedido, sin aumentar
  la cifra retenida.
introduccion: Aproximar por defecto significa quedarse con el valor inmediatamente menor o igual al número
  original en el orden decimal indicado, ignorando simplemente lo que sigue.
resumen: Aproximar un número por defecto a un cierto orden consiste en eliminar las cifras siguientes
  a ese orden sin modificar la última cifra conservada.
explicacion: '### Definición formal


  Aproximar \(x\) por defecto al orden \(10^{-n}\) da el mayor múltiplo de \(10^{-n}\) que es menor o
  igual a \(x\), es decir, se conservan las primeras \(n\) cifras decimales sin alterarlas.


  ### Desarrollo didáctico


  Aproximar por defecto \(5.78\) a la décima: se conserva la cifra de las décimas (7) sin cambios y se
  descarta el resto, obteniendo \(5.7\).'
procedimiento:
- 'Paso 1: Elige el orden decimal solicitado y conserva las cifras anteriores.'
- 'Paso 2: Descarta las cifras posteriores sin aumentar la última conservada.'
- 'Paso 3: Comprueba que la aproximación sea menor o igual que el valor original.'
ejemplos:
- titulo: Aplicación razonada — Aproximación por defecto
  enunciado: Aproximar por defecto \(5.78\) a la décima da \(5.7\).
  solucion_pasos:
  - Elige el orden decimal solicitado y conserva las cifras anteriores.
  - Descarta las cifras posteriores sin aumentar la última conservada.
  - Comprueba que la aproximación sea menor o igual que el valor original.
- titulo: Revisión de una solución — Aproximación por defecto
  enunciado: Una solución aplica “Descarta las cifras posteriores sin aumentar la última conservada.”,
    pero termina sin comprobar que la aproximación por defecto nunca supera el valor original. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define aproximación por defecto: una aproximación por defecto es un valor
    menor o igual que el número original.'
  - Elige el orden decimal solicitado y conserva las cifras anteriores.
  - 'Completa la revisión con este control: Comprueba que la aproximación sea menor o igual que el valor
    original.'
- titulo: ¿Se cumple que la aproximación por defecto nunca supera el valor original? — Aproximación por
    defecto
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una aproximación por defecto es un valor menor o igual
    que el número original.
  - El caso “Aproximar por defecto \(5.78\) a la décima da \(5.7\)” satisface esa condición.
  - Comprueba que la aproximación sea menor o igual que el valor original.
- titulo: ¿Es válido omitir el paso “Elige el orden decimal solicitado y conserva las cifras anteriores”?
    — Aproximación por defecto
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de aproximación por defecto.
  - 'Omitirlo puede volver inválida la acción siguiente: Descarta las cifras posteriores sin aumentar
    la última conservada.'
  - 'La solución debe terminar de este modo: Comprueba que la aproximación sea menor o igual que el valor
    original.'
errores_frecuentes:
- 'Empezar aproximación por defecto sin realizar este control inicial: Elige el orden decimal solicitado
  y conserva las cifras anteriores.'
- Memorizar “Aproximar por defecto \(5.78\) a la décima da \(5.7\)” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Descarta las cifras posteriores sin aumentar la última conservada.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre aproximación por defecto que contradice el criterio “La aproximación
  por defecto nunca supera el valor original”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que la aproximación sea menor o igual
  que el valor original.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
