semantic_id: MAT.ALG.FUNC_CUADR_GRAFICA.INTERSECCION_Y
titulo: Cálculo de la intersección de la parábola con el eje Y
objetivo: Calcular el punto donde la gráfica de una función cuadrática interseca al eje $y$.
introduccion: 'Toda parábola cruza exactamente una vez el eje vertical, y ese punto se calcula de la manera
  más simple posible: evaluando la función en $x=0$.'
resumen: La **intersección con el eje $y$** de una función cuadrática $f(x)=ax^2+bx+c$ es siempre el punto
  $(0,c)$, obtenido evaluando $f(0)$.
explicacion: '### Definición formal


  La intersección de la gráfica de $f(x)=ax^2+bx+c$ con el eje $y$ ocurre en el punto donde $x=0$. Evaluando,
  $f(0)=a(0)^2+b(0)+c=c$. Por lo tanto, la intersección con el eje $y$ es siempre el punto $(0,c)$.


  ### Desarrollo didáctico


  Este cálculo es el más directo entre todos los relacionados con la gráfica: basta con identificar el
  término independiente $c$, sin necesidad de resolver ninguna ecuación.


  Para $f(x)=3x^2-5x+8$, la intersección con el eje $y$ es el punto $(0,8)$, leído directamente del término
  independiente.'
procedimiento:
- 'Paso 1: Identifica el término independiente $c$ de la función.'
- 'Paso 2: La intersección con el eje $y$ es el punto $(0,c)$.'
ejemplos:
- titulo: Cálculo directo de la intersección con el eje y
  enunciado: Determina la intersección con el eje $y$ de $f(x)=2x^2-7x+9$.
  solucion_pasos:
  - $c=9$.
  - La intersección es el punto $(0,9)$.
- titulo: Cálculo con término independiente negativo
  enunciado: Determina la intersección con el eje $y$ de $f(x)=-4x^2+x-3$.
  solucion_pasos:
  - $c=-3$.
  - La intersección es el punto $(0,-3)$.
- titulo: ¿Toda función cuadrática interseca al eje $y$ exactamente una vez?
  enunciado: ¿Toda función cuadrática interseca al eje $y$ exactamente una vez?
  respuesta: Sí
  solucion_pasos:
  - Como el dominio es todo $\mathbb{R}$, siempre existe (y es único) el valor $f(0)$.
- titulo: ¿La intersección con el eje $y$ depende de los coeficientes $a$ o $b$?
  enunciado: ¿La intersección con el eje $y$ depende de los coeficientes $a$ o $b$?
  respuesta: 'No'
  solucion_pasos:
  - Solo depende del término independiente $c$, ya que $a$ y $b$ se anulan al multiplicarse por $x=0$.
errores_frecuentes:
- Confundir la intersección con el eje $y$ con la intersección con el eje $x$ (los ceros de la función).
- Reportar solo el valor $c$ como respuesta, en vez del punto completo $(0,c)$.
- Calcular incorrectamente $f(0)$, olvidando anular los términos con $x$.
- Confundir el término independiente con otro coeficiente de la función.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
