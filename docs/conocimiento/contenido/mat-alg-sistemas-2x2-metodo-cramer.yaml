semantic_id: 'MAT.ALG.SISTEMAS_2X2.METODO_CRAMER'
titulo: 'Método de Cramer (Determinantes)'
objetivo: |
  Utilizar reglas matriciales simples para resolver sistemas directamente sin despejes.
introduccion: |
  El método de Cramer es una fórmula mágica que no requiere que pienses en álgebra, solo en aritmética pura y multiplicaciones cruzadas.
resumen: |
  Calculas determinantes similares para la $x$ ($\Delta x$) y para la $y$ ($\Delta y$), reemplazando sus columnas por los números independientes.
  Al final, las soluciones son divisiones simples: $x = \frac{\Delta x}{\Delta S}$ e $y = \frac{\Delta y}{\Delta S}$.
  Es el método ideal si odias las fracciones intermedias.
explicacion: |
  Primero ordenas las ecuaciones: las 'x' y las 'y' a la izquierda, los números a la derecha.
  Luego calculas un número principal llamado 'Determinante del Sistema' ($\Delta S$). Lo haces cruzando los coeficientes de $x$ e $y$: $(A \cdot D) - (B \cdot C)$.
procedimiento:
  - 'Paso 1: Ordena el sistema en la forma $Ax + By = C$.'
  - 'Paso 2: Calcula el determinante del sistema ($\Delta S$) usando los coeficientes de $x$ e $y$.'
  - 'Paso 3: Calcula el determinante de $x$ ($\Delta x$) reemplazando la columna de $x$ por los términos independientes.'
  - 'Paso 4: Calcula el determinante de $y$ ($\Delta y$) reemplazando la columna de $y$ por los términos independientes.'
  - 'Paso 5: Encuentra las soluciones con $x = \Delta x / \Delta S$ e $y = \Delta y / \Delta S$.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
