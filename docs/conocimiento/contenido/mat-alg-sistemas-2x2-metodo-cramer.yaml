semantic_id: MAT.ALG.SISTEMAS_2X2.METODO_CRAMER
titulo: Método de Cramer (Determinantes)
objetivo: Utilizar reglas matriciales simples para resolver sistemas directamente sin despejes.
introduccion: 'Primero ordenas las ecuaciones: las ''x'' y las ''y'' a la izquierda, los números a la derecha.'
resumen: El método de Cramer es una fórmula adecuado que no requiere que pienses en álgebra, solo en aritmética
  pura y multiplicaciones cruzadas.
explicacion: '### Definición formal


  El método de Cramer es una fórmula adecuado que no requiere que pienses en álgebra, solo en aritmética pura y
  multiplicaciones cruzadas.


  ### Desarrollo didáctico


  Primero ordenas las ecuaciones: las ''x'' y las ''y'' a la izquierda, los números a la derecha.

  Luego calculas un número principal llamado ''Determinante del Sistema'' ($\Delta S$). Lo haces cruzando los coeficientes
  de $x$ e $y$: $(A \cdot D) - (B \cdot C)$.


  Calculas determinantes similares para la $x$ ($\Delta x$) y para la $y$ ($\Delta y$), reemplazando sus columnas
  por los números independientes.

  Al final, las soluciones son divisiones simples: $x = \frac{\Delta x}{\Delta S}$ e $y = \frac{\Delta y}{\Delta
  S}$.

  Es el método ideal si odias las fracciones intermedias.'
procedimiento:
- Ordena el sistema en la forma $Ax + By = C$.
- Calcula el determinante del sistema ($\Delta S$) usando los coeficientes de $x$ e $y$.
- Calcula el determinante de $x$ ($\Delta x$) reemplazando la columna de $x$ por los términos independientes.
- Calcula el determinante de $y$ ($\Delta y$) reemplazando la columna de $y$ por los términos independientes.
- Encuentra las soluciones con $x = \Delta x / \Delta S$ e $y = \Delta y / \Delta S$.
