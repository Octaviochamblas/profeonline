- titulo: 'Respecto de «Resolución mediante regla de Cramer»: ¿Describe adecuadamente el concepto esta'
  enunciado: 'Respecto de «Resolución mediante regla de Cramer»: ¿Describe adecuadamente el concepto esta frase?
    «El método de Cramer es una fórmula adecuado que no requiere que pienses en álgebra, solo en aritmética pura
    y multiplicaciones cruzadas»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El método de Cramer es una fórmula adecuado que no requiere
    que pienses en álgebra, solo en aritmética pura y multiplicaciones cruzadas.'
- titulo: 'Respecto de «Resolución mediante regla de Cramer»: ¿Se puede aceptar esta afirmación? «Puede'
  enunciado: 'Respecto de «Resolución mediante regla de Cramer»: ¿Se puede aceptar esta afirmación? «Puede omitirse
    esta condición sin cambiar el resultado: «Ordena el sistema en la forma $Ax + By = C$»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El método de Cramer es una fórmula adecuado que no requiere
    que pienses en álgebra, solo en aritmética pura y multiplicaciones cruzadas.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Ordena el sistema en la forma $Ax + By = C$».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Calcula el determinante del sistema ($\Delta
  S$) usando los coeficientes de $x$ e $y$».'
- La definición sigue cumpliéndose aunque no se considere que el método de Cramer es una fórmula adecuado que no
  requiere que pienses en álgebra, solo en aritmética pura y multiplicaciones cruzadas.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Calcula el determinante de $y$ ($\Delta
  y$) reemplazando la columna de $y$ por los términos independientes».
- La comprobación del resultado vuelve innecesaria la condición «Encuentra las soluciones con $x = \Delta x / \Delta
  S$ e $y = \Delta y / \Delta S$».
