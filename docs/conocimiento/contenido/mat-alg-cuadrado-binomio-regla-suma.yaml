- titulo: 'Respecto de «Aplicación de la regla del cuadrado de binomio suma»: ¿Es compatible con el pro'
  enunciado: 'Respecto de «Aplicación de la regla del cuadrado de binomio suma»: ¿Es compatible con el procedimiento
    esta afirmación? «Olvidar elevar al cuadrado el coeficiente numérico del término (ej. decir que $(3x)^2 = 3x^2$
    en vez de $9x^2$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La regla de oro para $(a+b)^2$ es: **''El cuadrado del primer
    término, más el doble del primero por el segundo, más el cuadrado del segundo término.''** Fórmula: $(a+b)^2
    = a^2 + 2ab + b^2$'
errores_frecuentes:
- Olvidar elevar al cuadrado el coeficiente numérico del término (ej. decir que $(3x)^2 = 3x^2$ en vez de $9x^2$).
- Para «En la regla del cuadrado de binomio $(a+b)^2 = a^2 + 2ab + b^2$, la frase 'el doble producto' se refiere
  al término:», la respuesta correcta es $a^2$.
- Para «En la regla del cuadrado de binomio $(a+b)^2 = a^2 + 2ab + b^2$, la frase 'el doble producto' se refiere
  al término:», la respuesta correcta es $b^2$.
