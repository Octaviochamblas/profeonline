semantic_id: MAT.ALG.RESOLUCION_LINEAL.TRANSPOSICION_TERMINOS
titulo: Transposición de Términos
objetivo: Aplicar de forma rápida y segura el cambio de términos de un miembro a otro invirtiendo su operación.
introduccion: Aplicar formalmente la propiedad aditiva sumando y restando a ambos lados en cada paso es matemáticamente
  perfecto, pero se vuelve muy largo. El 'atajo' oficial se llama Transposición de Términos.
resumen: 'La transposición es una regla práctica que indica: cualquier término puede ''saltar'' al otro lado del
  signo igual, siempre y cuando cambie a su operación matemática inversa (suma a resta, multiplicación a división,
  etc.).'
explicacion: '### Definición formal


  La transposición es una abreviatura operativa de aplicar la misma operación inversa en ambos miembros de una ecuación.
  La igualdad se conserva porque ambos miembros se transforman de manera equivalente.


  ### Desarrollo didáctico


  Visualiza el signo $=$ como un transformación algebraica que transforma a los números en su ''opuesto'' operativo.


  - **Suma y Resta (Términos completos):**

  Si un término está sumando (tiene un $+$ delante), se resta la misma cantidad en ambos miembros ($-$):

  $x + 8 = 10 \rightarrow x = 10 \mathbf{- 8}$


  Si está restando ($-$), se suma la misma cantidad en ambos miembros ($+$):

  $y - 5 = 12 \rightarrow y = 12 \mathbf{+ 5}$


  - **Multiplicación y División (Coeficientes):**

  Si un número está multiplicando a toda la incógnita, cruza dividiendo a TODO el otro lado:

  $3x = 15 \rightarrow x = \frac{15}{\mathbf{3}}$


  Si está dividiendo, cruza multiplicando:

  $\frac{m}{4} = 8 \rightarrow m = 8 \cdot \mathbf{4}$


  Cuidado. Solo puedes transponer ''multiplicaciones'' o ''divisiones'' si el número afecta a TODO el miembro entero.
  Si tienes $2x + 1 = 7$, no puedes pasar el $2$ dividiendo todavía. Primero se van los términos sumando/restando.'
procedimiento:
- 'Paso 1: Identifica tu objetivo: dejar a la incógnita completamente sola.'
- 'Paso 2: Localiza los términos que acompañan a la incógnita sumando o restando y pásalos al otro miembro con el
  signo contrario.'
- 'Paso 3: Si queda un coeficiente multiplicando a la incógnita (ej: 4x), pásalo dividiendo a TODO el otro miembro.'
- 'Paso 4: Realiza las operaciones aritméticas en el miembro de los números para hallar la respuesta final.'
- 'Esta es la regla esencial de la transposición: suma a resta, multiplicación a división, etc.'
ejemplos:
- titulo: 'Resuelve usando transposición: $2x - 5 = 11$'
  enunciado: 'Resuelve usando transposición: $2x - 5 = 11$'
  solucion_pasos:
  - 'Paso 1: Mueve el término -5 al lado derecho como +5.'
  - $2x = 11 + 5$
  - $2x = 16$
  - 'Paso 2: El 2 está multiplicando, pasa al lado derecho dividiendo.'
  - $x = 16 / 2$
  - $x = 8$
- titulo: 'Despeja la ''a'' en: $\frac{a}{3} + 4 = 10$'
  solucion_pasos:
  - 'El +4 pasa como -4: a/3 = 10 - 4 -> a/3 = 6.'
  - 'El 3 que divide pasa multiplicando: a = 6 * 3 = 18.'
- titulo: 'Respecto de «Aplicación de la regla de transposición de términos»: ¿Se ajusta a la definició'
  enunciado: 'Respecto de «Aplicación de la regla de transposición de términos»: ¿Se ajusta a la definición esta
    afirmación? «La transposición es una regla práctica que indica: cualquier término puede ''saltar'' al otro lado
    del signo igual, siempre y cuando cambie a su operación matemática inversa (suma a resta, multiplicación a división,
    etc.)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La transposición es una regla práctica que indica: cualquier
    término puede ''saltar'' al otro lado del signo igual, siempre y cuando cambie a su operación matemática inversa
    (suma a resta, multiplicación a división, etc.).'
- titulo: 'Respecto de «Aplicación de la regla de transposición de términos»: ¿Es compatible con el pro'
  enunciado: 'Respecto de «Aplicación de la regla de transposición de términos»: ¿Es compatible con el procedimiento
    esta afirmación? «Pasar un número multiplicando o dividiendo ANTES de haber movido las sumas y restas libres»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La transposición es una regla práctica que indica: cualquier
    término puede ''saltar'' al otro lado del signo igual, siempre y cuando cambie a su operación matemática inversa
    (suma a resta, multiplicación a división, etc.).'
errores_frecuentes:
- Pasar un número multiplicando o dividiendo ANTES de haber movido las sumas y restas libres.
- 'Pasar un número negativo que está multiplicando (ej: $-3x = 12$) como $+3$ al otro lado. ¡El $-3$ entero pasa
  dividiendo! La operación principal es multiplicar, no restar.'
- Cambia su signo a positivo sin importar cuál tenía.
- Se convierte en fracción.
- Se le suma un uno automáticamente.
