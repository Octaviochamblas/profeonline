semantic_id: MAT.NUM.PROGRESIONES_COMPARACION.INTERPOLACION_ARITMETICA
objetivo: Interpolar (insertar) medios aritméticos (números faltantes) entre dos extremos
  conocidos para completar una Progresión Aritmética.
introduccion: Alguien borró los números del medio en una lista. Tienes el primero
  y el último, y sabes que era una progresión aritmética. Tu misión es construir el
  puente de escalones perfectos entre esos dos extremos. A esto le llamamos 'Interpolar'.
resumen: 'Para interpolar ''$k$'' medios aritméticos entre un número ''$A$'' y un
  número ''$B$'', debes calcular la diferencia constante ''$d$'' usando la fórmula
  de los saltos: **$d = \frac{B - A}{k + 1}$**. Luego, vas sumando ''$d$'' desde ''$A$''
  hasta llegar a ''$B$''.'
explicacion: 'Visualiza el problema:

  Te dan el número 5 y el número 17. Te piden **interpolar 3 números** en el medio
  para que formen una P.A.

  - La lista se vería así: $5, \_ , \_ , \_ , 17$.

  - Cuentas los saltos: Para pasar del 5 al 17 a través de 3 espacios vacíos, debes
  dar **4 saltos** (siempre es $k+1$ saltos, donde ''$k$'' es la cantidad de huecos).


  Cálculo de la diferencia ''d'':

  1. Distancia total = $17 - 5 = 12$.

  2. Cantidad de saltos = $3 + 1 = 4$.

  3. Tamaño de cada salto ($d$) = Distancia Total / Saltos = $12 / 4 = 3$.


  Llenamos los huecos sumando de a 3:

  - $5 + 3 = 8$

  - $8 + 3 = 11$

  - $11 + 3 = 14$

  - ¡Y comprobamos! $14 + 3 = 17$. El puente encaja perfectamente. Los ''medios aritméticos''
  son $8, 11$ y $14$.'
procedimiento:
- 'Paso 1: Resta el extremo final menos el extremo inicial ($B - A$).'
- 'Paso 2: A la cantidad de números a interpolar ($k$), súmale 1 ($k + 1$).'
- 'Paso 3: Divide el resultado del Paso 1 entre el resultado del Paso 2. Esta es tu
  diferencia ''d''.'
- 'Paso 4: Suma ''d'' repetidamente partiendo desde ''A''.'
ejemplos:
- titulo: Construyendo la escalera
  enunciado: Interpolar 4 medios aritméticos entre 10 y 40.
  solucion_pasos:
  - A = 10, B = 40. k = 4.
  - Distancia total = 40 - 10 = 30.
  - Número de saltos = 4 + 1 = 5.
  - d = 30 / 5 = 6.
  - 'Interpolar: 10 (+6)-> 16 (+6)-> 22 (+6)-> 28 (+6)-> 34 (+6)-> 40.'
  - 'Los medios son: 16, 22, 28, 34.'
errores_frecuentes:
- Dividir la distancia total simplemente por '$k$' (la cantidad de huecos) en lugar
  de '$k+1$' (los saltos). ¡Si hay 3 huecos, hay 4 espacios/saltos que los conectan!
- Confundirse y restar al revés ($A - B$) obteniendo una diferencia con el signo cambiado.
fuente: Currículum Nacional MINEDUC.
estado: publicado
