semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.MULTIPLICACION
objetivo: Comprender multiplicación de fracciones y aplicarlo correctamente en ejercicios
  básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso multiplicación de fracciones ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Para multiplicar fracciones se multiplican numeradores entre sí y denominadores
  entre sí. Además, conviene simplificar antes o después de multiplicar para obtener
  una fracción más simple.
explicacion: |-
  Para multiplicar fracciones se multiplican numeradores entre sí y denominadores entre sí.

  Una idea importante es que conviene simplificar antes o después de multiplicar para obtener una fracción más simple.

  Por ejemplo, \(\frac{2}{3}\cdot\frac{5}{4}=\frac{10}{12}=\frac{5}{6}\).
procedimiento:
- 'Paso 1: Identificar la operación y preparar una representación adecuada de los
  datos.'
- 'Paso 2: Aplicar la regla específica de la operación respetando valor posicional
  o denominadores.'
- 'Paso 3: Simplificar o verificar el resultado final según corresponda.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{2}{3}\cdot\frac{5}{4}=\frac{10}{12}=\frac{5}{6}\).”
    se relaciona con multiplicación de fracciones.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: para multiplicar fracciones se multiplican numeradores
    entre sí y denominadores entre sí.'
  - Concluye que el ejemplo sí ilustra multiplicación de fracciones.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Conviene simplificar antes o después de multiplicar
    para obtener una fracción más simple.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con multiplicación de fracciones?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que conviene simplificar antes o después de
    multiplicar para obtener una fracción más simple.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar multiplicación de fracciones ignorando la definición o las
    condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar multiplicación de fracciones sin mirar qué representan numerador,
  denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
