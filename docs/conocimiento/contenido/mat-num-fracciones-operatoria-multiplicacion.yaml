semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.MULTIPLICACION
titulo: Multiplicación de fracciones
objetivo: Multiplicar dos fracciones directamente, sin necesidad de un denominador común.
introduccion: 'A diferencia de la suma y la resta, la multiplicación de fracciones no requiere igualar
  denominadores: se opera directamente numerador con numerador y denominador con denominador.'
resumen: Para multiplicar dos fracciones se multiplican los numeradores entre sí y los denominadores entre
  sí.
explicacion: '### Definición formal


  \(\frac{a}{b}\cdot\frac{c}{d}=\frac{a\cdot c}{b\cdot d}\), sin necesidad de denominador común, porque
  multiplicar fracciones equivale a tomar una fracción de otra fracción.


  ### Desarrollo didáctico


  \(\frac{2}{3}\cdot\frac{5}{4}\): se multiplican los numeradores, \(2\cdot5=10\), y los denominadores,
  \(3\cdot4=12\), obteniendo \(\frac{10}{12}\), que simplificado por 2 da \(\frac{5}{6}\).'
procedimiento:
- 'Paso 1: Revisa los signos y simplifica factores cruzados cuando sea posible.'
- 'Paso 2: Multiplica numerador por numerador y denominador por denominador.'
- 'Paso 3: Reduce la fracción final y verifica el signo del producto.'
ejemplos:
- titulo: Aplicación razonada — Multiplicación de fracciones
  enunciado: \(\frac{2}{3}\cdot\frac{5}{4}=\frac{10}{12}=\frac{5}{6}\).
  solucion_pasos:
  - Revisa los signos y simplifica factores cruzados cuando sea posible.
  - Multiplica numerador por numerador y denominador por denominador.
  - Reduce la fracción final y verifica el signo del producto.
- titulo: Revisión de una solución — Multiplicación de fracciones
  enunciado: Una solución aplica “Multiplica numerador por numerador y denominador por denominador.”,
    pero termina sin comprobar que conviene simplificar antes o después de multiplicar para obtener una
    fracción más simple. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define multiplicación de fracciones: para multiplicar fracciones se multiplican
    numeradores entre sí y denominadores entre sí.'
  - Revisa los signos y simplifica factores cruzados cuando sea posible.
  - 'Completa la revisión con este control: Reduce la fracción final y verifica el signo del producto.'
- titulo: ¿Se cumple que conviene simplificar antes o después de multiplicar para obtener una fracción
    más simple? — Multiplicación de fracciones
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para multiplicar fracciones se multiplican numeradores
    entre sí y denominadores entre sí.
  - El caso “\(\frac{2}{3}\cdot\frac{5}{4}=\frac{10}{12}=\frac{5}{6}\)” satisface esa condición.
  - Reduce la fracción final y verifica el signo del producto.
- titulo: ¿Es válido omitir el paso “Revisa los signos y simplifica factores cruzados cuando sea posible”?
    — Multiplicación de fracciones
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de multiplicación de fracciones.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica numerador por numerador y denominador
    por denominador.'
  - 'La solución debe terminar de este modo: Reduce la fracción final y verifica el signo del producto.'
errores_frecuentes:
- 'Empezar multiplicación de fracciones sin realizar este control inicial: Revisa los signos y simplifica
  factores cruzados cuando sea posible.'
- Memorizar “\(\frac{2}{3}\cdot\frac{5}{4}=\frac{10}{12}=\frac{5}{6}\)” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Multiplica numerador por numerador y denominador por denominador.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre multiplicación de fracciones que contradice el criterio “Conviene
  simplificar antes o después de multiplicar para obtener una fracción más simple”.
- 'Cerrar el ejercicio sin esta comprobación específica: Reduce la fracción final y verifica el signo
  del producto.'
