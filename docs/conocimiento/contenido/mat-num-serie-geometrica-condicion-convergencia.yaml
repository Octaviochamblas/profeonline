semantic_id: MAT.NUM.SERIE_GEOMETRICA.CONDICION_CONVERGENCIA
objetivo: Evaluar si una serie geométrica dada cumple las condiciones matemáticas
  para ser sumada hasta el infinito.
introduccion: Antes de lanzarte a usar la fórmula del infinito, tienes que pedirle
  permiso a las matemáticas. Como un portero de discoteca, la 'Condición de Convergencia'
  revisa tu razón 'r' y te dice si pasas o rebotas.
resumen: 'La única condición para que una serie geométrica converja a un número real
  al sumarla infinitamente es que **su razón ''$r$'' esté estrictamente entre $-1$
  y $1$ (sin incluirlos)**. Matemáticamente: $|r| < 1$.'
explicacion: 'Si te saltas este control de seguridad, la fórmula te mentirá.


  Ejemplo de desastre: Serie $1 + 2 + 4 + 8 + 16 \dots$ (Aquí $r = 2$).

  - Claramente la suma va hacia el infinito positivo.

  - ¡Pero la fórmula $S = \frac{a_1}{1 - r}$ te dejaría usarla! Te daría $\frac{1}{1
  - 2} = -1$.

  - ¿Sumar números positivos infinitamente te dará $-1$? ¡ABSURDO!


  Por eso el portero existe:

  - ¿$r = 0.5$? PASE.

  - ¿$r = -1/3$? PASE.

  - ¿$r = -0.99$? PASE.

  - ¿$r = 1.01$? ¡RECHAZADO! (La suma explota).

  - ¿$r = -1$? ¡RECHAZADO! (La suma alterna infinitamente entre dos valores sin decidirse).'
procedimiento:
- 'Paso 1: Calcula la razón ''r'' dividiendo el 2do término por el 1ro.'
- 'Paso 2: Quítale el signo (toma su valor absoluto).'
- 'Paso 3: Pregúntate: ¿Es estrictamente menor que 1?'
- 'Paso 4: Si es Sí, la serie converge y puedes usar la fórmula. Si es No, la serie
  diverge (su suma es infinito o no existe).'
ejemplos:
- titulo: El portero matemático
  enunciado: Determina si la serie infinita 5 - 10 + 20 - 40... se puede sumar con
    la fórmula.
  solucion_pasos:
  - 'Calculamos r: -10 / 5 = -2.'
  - Valor absoluto de r es 2.
  - Como 2 es mayor que 1, el portero la rechaza.
  - 'Respuesta: NO converge, no se puede calcular un total fijo.'
errores_frecuentes:
- Creer que si la razón es negativa, automáticamente la serie diverge (Las razones
  negativas pequeñas como -0.5 convergen perfectamente).
- Forzar la fórmula con $r > 1$ y entregar ciegamente el resultado negativo como respuesta
  válida.
fuente: Currículum Nacional MINEDUC.
estado: publicado
