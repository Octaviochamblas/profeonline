semantic_id: MAT.ALG.FUNCION_CONCEPTOS.VARIABLE_INDEPENDIENTE
titulo: Identificación de la variable independiente
objetivo: Reconocer la variable independiente como aquella cuyo valor se elige libremente dentro del dominio.
introduccion: En $y = f(x)$, tú eliges libremente el valor de $x$; el valor de $y$ queda determinado por esa elección.
  Por eso $x$ es "independiente" y $y$ es "dependiente".
resumen: La **variable independiente** de una función es aquella que representa los valores del dominio, elegidos
  libremente; convencionalmente se denota $x$ y aparece dentro del paréntesis en la notación $f(x)$.
explicacion: '### Definición formal


  En una función $f\colon A \to B$ expresada como $y = f(x)$, la variable $x$ recorre el dominio $A$ y puede tomar cualquier
  valor permitido en él sin depender de otra cantidad de la relación; es la variable independiente. El valor $y$
  queda determinado por la elección de $x$ a través de la regla $f$.


  ### Desarrollo didáctico


  Piensa en un experimento controlado: tú decides cuánta agua le das a una planta ($x$, variable independiente)
  y observas cuánto crece ($y$, variable dependiente). El crecimiento no se elige directamente, resulta de la
  cantidad de agua.


  En una fórmula como $y = 3x + 2$, puedes sustituir cualquier valor permitido de $x$: $1$, $-5$, $\frac{1}{2}$,
  etc. Cada elección determina un único $y$ correspondiente.'
procedimiento:
- 'Paso 1: Identifica cuál cantidad se elige o controla libremente en el contexto o la fórmula.'
- 'Paso 2: Esa cantidad, generalmente denotada $x$, es la variable independiente.'
- 'Paso 3: Verifica que su valor pertenezca al dominio permitido de la función.'
ejemplos:
- titulo: Identificación en una fórmula
  enunciado: En $y = 5x - 2$, ¿cuál es la variable independiente?
  solucion_pasos:
  - La variable que se sustituye libremente y determina el valor de $y$ es $x$.
  - 'Variable independiente: $x$.'
- titulo: Identificación en un contexto verbal
  enunciado: Un taxi cobra según los kilómetros recorridos. ¿Cuál es la variable independiente?
  solucion_pasos:
  - El costo depende de los kilómetros recorridos, no al revés.
  - 'Variable independiente: los kilómetros recorridos.'
- titulo: ¿La variable independiente puede tomar cualquier valor del dominio sin depender de otra variable?
  enunciado: ¿La variable independiente puede tomar cualquier valor del dominio sin depender de otra variable?
  respuesta: Verdadero
  solucion_pasos:
  - Por definición, la variable independiente se elige libremente dentro del dominio permitido.
- titulo: ¿En $f(x)$, la letra $x$ representa la variable dependiente?
  enunciado: ¿En $f(x)$, la letra $x$ representa la variable dependiente?
  respuesta: Falso
  solucion_pasos:
  - $x$ es el argumento que se elige libremente, es decir, la variable independiente.
errores_frecuentes:
- Invertir los roles, creyendo que la variable dentro del paréntesis es la dependiente.
- Asumir que la variable independiente siempre se llama $x$, ignorando el contexto del problema.
- No verificar que el valor elegido para la variable independiente pertenezca al dominio.
- Confundir "independiente" con "constante", cuando en realidad puede tomar múltiples valores.
