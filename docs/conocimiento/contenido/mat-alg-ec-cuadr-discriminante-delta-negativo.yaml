semantic_id: MAT.ALG.EC_CUADR_DISCRIMINANTE.DELTA_NEGATIVO
titulo: Interpretación de discriminante negativo como ausencia de soluciones reales
objetivo: Interpretar el caso $\Delta<0$ como indicador de que la ecuación cuadrática no tiene soluciones reales.
introduccion: Cuando el discriminante resulta negativo, la fórmula general exige calcular la raíz cuadrada de un
  número negativo, algo que ningún número real puede producir.
resumen: Si $\Delta=b^2-4ac<0$, la ecuación cuadrática **no tiene soluciones reales**, porque la fórmula general
  exigiría la raíz cuadrada de un número negativo.
explicacion: '### Definición formal


  Cuando $\Delta<0$, la expresión $\sqrt{\Delta}$ no está definida dentro de los números reales, ya que ningún
  número real elevado al cuadrado produce un resultado negativo. En consecuencia, la ecuación $ax^2+bx+c=0$ no
  tiene raíces reales.


  ### Desarrollo didáctico


  Un discriminante negativo señala que la parábola asociada no toca en ningún punto al eje $x$: permanece completamente
  por encima o completamente por debajo de él.


  En $x^2+2x+5=0$, $\Delta=4-20=-16<0$, por lo que la ecuación no tiene soluciones reales.'
procedimiento:
- 'Paso 1: Calcula el discriminante $\Delta=b^2-4ac$.'
- 'Paso 2: Verifica que $\Delta<0$.'
- 'Paso 3: Concluye que la ecuación no tiene soluciones dentro de los números reales.'
ejemplos:
- titulo: Interpretación con discriminante negativo
  enunciado: 'Sin resolver, ¿tiene soluciones reales $x^2+x+1=0$?'
  solucion_pasos:
  - '$\Delta=1^2-4(1)(1)=1-4=-3$.'
  - Como $\Delta<0$, no tiene soluciones reales.
- titulo: Verificación de ausencia de soluciones
  enunciado: 'Verifica si $2x^2-3x+5=0$ tiene soluciones reales.'
  solucion_pasos:
  - '$\Delta=(-3)^2-4(2)(5)=9-40=-31$.'
  - Como $\Delta=-31<0$, no tiene soluciones reales.
- titulo: ¿Una ecuación con $\Delta<0$ carece completamente de gráfica?
  enunciado: ¿Una ecuación con $\Delta<0$ carece completamente de gráfica?
  respuesta: 'No'
  solucion_pasos:
  - La parábola asociada sí existe y se puede graficar; simplemente no cruza ni toca el eje $x$.
- titulo: ¿$\Delta<0$ significa que la ecuación no tiene ninguna solución, ni siquiera compleja?
  enunciado: ¿$\Delta<0$ significa que la ecuación no tiene ninguna solución, ni siquiera compleja?
  respuesta: 'No'
  solucion_pasos:
  - Dentro del conjunto de los números complejos sí existen soluciones; la ausencia es únicamente de soluciones
    reales.
errores_frecuentes:
- Afirmar que la ecuación "no tiene solución" en términos absolutos, sin precisar que es dentro de los reales.
- Intentar de todas formas calcular $\sqrt{\Delta}$ como si fuera un número real cuando $\Delta$ es negativo.
- Confundir "sin soluciones reales" con "sin gráfica"; la parábola sigue existiendo, solo no corta el eje $x$.
- No verificar correctamente el signo del discriminante antes de concluir.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
