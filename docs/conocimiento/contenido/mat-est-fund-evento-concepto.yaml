semantic_id: MAT.EST.PROBA_FUNDAMENTOS.EVENTO_CONCEPTO
titulo: Definición de evento o suceso como subconjunto del espacio muestral
objetivo: Definir un evento (o suceso) como cualquier subconjunto del espacio muestral de un experimento
  aleatorio.
introduccion: Un evento representa una condición o característica de interés dentro de todos los resultados
  posibles; por ejemplo, 'obtener un número par' al lanzar un dado.
resumen: Un evento $A$ de un experimento aleatorio es cualquier subconjunto del espacio muestral $S$,
  es decir, $A\subseteq S$.
explicacion: '![Evento como subconjunto del espacio muestral](/static/img/probabilidad/fundamentos/fund-evento-concepto.svg)


  ### Definición formal


  Un evento $A$ es un subconjunto del espacio muestral $S$ ($A\subseteq S$), formado por los resultados
  que cumplen cierta condición de interés.


  ### Desarrollo didáctico


  Al lanzar un dado, $S=\{1,2,3,4,5,6\}$. El evento ''obtener un número par'' es $A=\{2,4,6\}$, un subconjunto
  de $S$.'
procedimiento:
- 'Paso 1: Identifica el espacio muestral completo del experimento.'
- 'Paso 2: Define la condición de interés (el evento) que se quiere estudiar.'
- 'Paso 3: Lista los elementos del espacio muestral que cumplen esa condición: ese es el evento.'
ejemplos:
- titulo: Definir el evento 'número par' al lanzar un dado
  enunciado: S={1,2,3,4,5,6}.
  solucion_pasos:
  - A={2,4,6}, el subconjunto de números pares.
- titulo: Definir el evento 'carta roja' en un mazo
  enunciado: S=52 cartas.
  solucion_pasos:
  - 'A={26 cartas rojas: corazones y diamantes}, un subconjunto de S.'
- titulo: ¿Un evento es siempre un subconjunto del espacio muestral?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición formal de evento.
- titulo: ¿El espacio muestral completo puede considerarse un evento?
  respuesta: Sí
  solucion_pasos:
  - Sí, S es un subconjunto de sí mismo, correspondiente al evento seguro.
errores_frecuentes:
- Confundir un evento con un solo resultado individual, en vez de un conjunto de resultados.
- Definir un evento con elementos que no pertenecen al espacio muestral original.
- Olvidar que un evento puede tener uno, varios o todos los elementos del espacio muestral.
fuente: 'Elaboración propia (referencia: Moraleja 403).'
estado: publicado
