semantic_id: MAT.ALG.MODELAMIENTO_AFIN.MODELO_AFIN_CONTEXTUAL
titulo: Modelamiento de una situación con valor inicial mediante función afín
objetivo: Construir el modelo de función afín para situaciones que combinan un valor inicial fijo con
  una tasa de cambio constante.
introduccion: Cuando hay algo que "ya viene incluido" antes de empezar a contar, y además una tasa fija
  por unidad, el modelo necesita ambos ingredientes, un valor inicial y una pendiente.
resumen: Una situación se modela con **función afín** $f(x)=mx+n$ cuando existe un valor inicial fijo
  $n$ (presente incluso en $x=0$) junto con una tasa de cambio constante $m$ por cada unidad de $x$.
explicacion: '### Definición formal


  Si una situación cumple $y=n\neq0$ cuando $x=0$ (existe un valor de partida) y además la razón de cambio
  $\Delta y/\Delta x$ es constante e igual a $m$, el modelo correcto es $f(x)=mx+n$.


  ### Desarrollo didáctico


  El proceso de modelamiento tiene dos preguntas clave: "¿Cuánto hay cuando $x=0$?" (da $n$) y "¿Cuánto
  cambia por cada unidad de $x$?" (da $m$).


  Si un plan de celular cuesta \$5000 fijos más \$100 por minuto adicional: al no usar minutos ($x=0$)
  igual se paga \$5000 ($n=5000$), y cada minuto agrega \$100 ($m=100$). El modelo es $C(x)=100x+5000$.'
procedimiento:
- 'Paso 1: Identifica el valor inicial del contexto, presente incluso cuando la variable independiente
  es cero.'
- 'Paso 2: Identifica la tasa de cambio constante asociada a cada unidad adicional.'
- 'Paso 3: Construye el modelo $f(x)=mx+n$ usando esos dos valores.'
ejemplos:
- titulo: Modelamiento de plan telefónico
  enunciado: Un plan cuesta \$8000 fijos más \$150 por cada minuto adicional. Modela el costo $C$ según
    los minutos $x$.
  solucion_pasos:
  - Valor inicial (cargo fijo) - $n=8000$.
  - Tasa de cambio (por minuto) - $m=150$.
  - $C(x)=150x+8000$.
- titulo: Modelamiento de altura inicial
  enunciado: Una planta mide 12 cm al comprarla y crece 2 cm por semana. Modela su altura $A$ según las
    semanas $x$.
  solucion_pasos:
  - Valor inicial - $n=12$.
  - Tasa de crecimiento - $m=2$.
  - $A(x)=2x+12$.
- titulo: ¿Un modelo afín siempre tiene un valor inicial distinto de cero?
  enunciado: ¿Un modelo afín siempre tiene un valor inicial distinto de cero?
  respuesta: Sí
  solucion_pasos:
  - Por definición, la función afín exige $n\neq0$; si $n=0$ el modelo se reduce a lineal.
- titulo: ¿Se puede construir el modelo afín conociendo solo la tasa de cambio?
  enunciado: ¿Se puede construir el modelo afín conociendo solo la tasa de cambio?
  respuesta: 'No'
  solucion_pasos:
  - También se necesita el valor inicial para determinar completamente el modelo.
errores_frecuentes:
- Olvidar incluir el valor inicial en el modelo cuando el contexto lo menciona explícitamente.
- Confundir el valor inicial con la tasa de cambio al construir la fórmula.
- Invertir los roles de $m$ y $n$ al escribir la función final.
- Ignorar el signo cuando la tasa de cambio representa una disminución.
