semantic_id: MAT.EST.NORMAL_APLICACIONES.CONTROL_CALIDAD
titulo: Resolver problemas de control de calidad con distribución normal
objetivo: Resolver problemas de control de calidad usando la distribución normal para estimar proporciones de
  productos dentro o fuera de un rango aceptable.
introduccion: Las fábricas usan la distribución normal para estimar qué porcentaje de sus productos cumple con las
  medidas o pesos exigidos, sin tener que revisar cada unidad una por una.
resumen: En control de calidad, la distribución normal permite calcular la proporción esperada de productos que
  cumplen o no con un rango de tolerancia especificado.
explicacion: '![Control de calidad con distribución normal](/static/img/estadistica/normapli/normapli-control-calidad.svg)


  ### Definición formal


  Si una característica del producto (peso, longitud, etc.) sigue $N(\mu,\sigma)$, la proporción de productos dentro

  de un rango de tolerancia $[a,b]$ se calcula como $P(a<X<b)$, estandarizando ambos límites.


  ### Desarrollo didáctico


  Esto permite a una fábrica estimar, antes de producir, qué porcentaje de sus productos probablemente no cumplirá

  con la tolerancia especificada, y así decidir si ajustar el proceso.'
procedimiento:
- 'Paso 1: Identifica la media y la desviación estándar del proceso de fabricación.'
- 'Paso 2: Estandariza los límites de tolerancia $a$ y $b$ a puntajes $Z$.'
- 'Paso 3: Calcula $P(a<X<b)$ usando la tabla normal estándar.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Un proceso de fabricación de tornillos sigue $N(50, 2)$ mm, con tolerancia de 46 a 54 mm. ¿Qué
    proporción de tornillos cumple la tolerancia?
  solucion_pasos:
  - $Z_a=(46-50)/2=-2$; $Z_b=(54-50)/2=2$.
  - $P(-2<Z<2)\approx 0{,}9544$, es decir, aproximadamente el 95,44% cumple la tolerancia.
- titulo: Ejemplo 2
  enunciado: ¿Qué porcentaje de tornillos del ejemplo anterior queda fuera de la tolerancia?
  solucion_pasos:
  - Aproximadamente $1-0{,}9544=0{,}0456$, es decir, un 4,56% queda fuera de la tolerancia.
- titulo: ¿La distribución normal permite estimar la proporción de productos dentro de un rango de tolerancia?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una de sus aplicaciones más frecuentes en control de calidad.
- titulo: ¿Es necesario revisar cada producto individualmente para aplicar este método?
  respuesta: 'No'
  solucion_pasos:
  - 'No, el modelo estima proporciones esperadas sin necesidad de revisar cada unidad.'
errores_frecuentes:
- Confundir el rango de tolerancia con los límites de tres desviaciones estándar (regla del 99,7%) sin verificarlo.
- Olvidar estandarizar ambos límites del rango de tolerancia.
- Calcular mal el complemento al estimar el porcentaje fuera de tolerancia.
- Usar parámetros de un proceso distinto al que realmente se está evaluando.
- Confundir la proporción esperada con la cantidad exacta de productos defectuosos en un lote específico.
fuente: 'Elaboración propia (referencia: Moraleja 309).'
estado: publicado
