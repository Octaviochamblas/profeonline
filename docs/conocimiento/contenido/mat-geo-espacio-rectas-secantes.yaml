semantic_id: MAT.GEO.ESPACIO_FUNDAMENTOS.RECTAS_SECANTES_ESPACIO
titulo: Posición relativa de rectas secantes en el espacio
objetivo: 'Reconocer rectas secantes en el espacio: aquellas que se intersectan en exactamente un punto
  y que, por lo tanto, son necesariamente coplanares.'
introduccion: Dos rectas que se cruzan en un único punto determinan automáticamente un plano que las contiene
  a ambas, algo que no ocurre con las rectas alabeadas.
resumen: Dos rectas en el espacio son secantes si se intersectan en exactamente un punto; toda pareja
  de rectas secantes es, además, necesariamente coplanar.
explicacion: '![Rectas secantes en el espacio](/static/img/geometria/espacio-cuerpos/espacio-rectas-secantes.svg)


  ### Definición formal


  Dos rectas $AB$ y $AD$ son secantes si comparten exactamente un punto en común (en este caso, el punto
  $A$). Dos rectas secantes son siempre coplanares: determinan un único plano que las contiene a ambas.


  ### Desarrollo didáctico


  En la figura, las aristas $AB$ y $AD$ de un prisma comparten el vértice $A$: se cruzan en ese único
  punto, por lo que son rectas secantes. Ambas están contenidas en la cara frontal del prisma, confirmando
  que son coplanares.'
procedimiento:
- 'Paso 1: Verifica si las dos rectas comparten algún punto en común.'
- 'Paso 2: Si comparten exactamente un punto, confirma que son secantes (y, por lo tanto, coplanares).'
- 'Paso 3: Identifica el plano que las contiene a ambas, si es necesario para el problema.'
ejemplos:
- titulo: Identificar dos aristas secantes en un vértice
  enunciado: Las aristas AB y AD de un prisma comparten el vértice A.
  solucion_pasos:
  - AB y AD son rectas secantes, ya que se cruzan exactamente en el punto A.
- titulo: Verificar la coplanaridad de rectas secantes
  enunciado: Dos rectas se cruzan en un único punto P.
  solucion_pasos:
  - Como se cruzan en un punto, existe un único plano que contiene a ambas rectas; son necesariamente
    coplanares.
- titulo: ¿Dos rectas secantes son siempre coplanares?
  respuesta: Sí
  solucion_pasos:
  - Sí, el hecho de compartir un punto en común garantiza que ambas pertenecen a un mismo plano.
- titulo: ¿Pueden dos rectas secantes cruzarse en más de un punto?
  respuesta: 'No'
  solucion_pasos:
  - No, si dos rectas distintas compartieran más de un punto, en realidad serían la misma recta, no dos
    rectas secantes.
errores_frecuentes:
- Creer que dos rectas secantes podrían no ser coplanares (siempre lo son).
- Confundir rectas secantes con rectas alabeadas (que nunca comparten ningún punto).
- Pensar que dos rectas distintas pueden compartir más de un punto sin ser la misma recta.
fuente: 'Elaboración propia (referencia: Cid 167).'
estado: publicado
