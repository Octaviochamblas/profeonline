semantic_id: MAT.GEO.PARALELOGRAMOS.ROMBO_LADOS_CONGRUENTES
titulo: Propiedad de cuatro lados congruentes en el rombo
objetivo: Reconocer que el rombo, como caso particular de paralelogramo, tiene sus cuatro lados congruentes
  entre sí.
introduccion: El rombo es otro caso particular de paralelogramo, caracterizado esta vez por una propiedad
  de sus lados, similar a la del cuadrado pero sin exigir ángulos rectos.
resumen: En un rombo, los cuatro lados son congruentes entre sí (tienen exactamente la misma longitud).
explicacion: '![Cuatro lados congruentes en el rombo](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-rombo-lados-congruentes.svg)


  ### Definición formal


  Un rombo es un paralelogramo con $AB=BC=CD=DA$. A diferencia del cuadrado, el rombo no exige que sus
  ángulos sean rectos, solo que los cuatro lados sean iguales.


  ### Desarrollo didáctico


  Un rombo con lado de 7 cm tiene sus cuatro lados iguales a 7 cm, pero sus ángulos pueden ser distintos
  de 90° (por ejemplo, dos ángulos de 60° y dos de 120°). Esto lo distingue del cuadrado, que además exige
  ángulos rectos.'
procedimiento:
- 'Paso 1: Verifica que la figura sea un rombo.'
- 'Paso 2: Si lo es, todos sus cuatro lados tienen la misma longitud.'
- 'Paso 3: Recuerda que esto no implica que los ángulos sean rectos (a diferencia del cuadrado).'
ejemplos:
- titulo: Calcular el perímetro de un rombo
  enunciado: Un rombo tiene un lado de 7 cm.
  solucion_pasos:
  - Los cuatro lados miden 7 cm, y el perímetro es 4×7=28 cm.
- titulo: Distinguir rombo de cuadrado
  enunciado: Un rombo tiene ángulos de 60° y 120°.
  solucion_pasos:
  - Es un rombo (no cuadrado), ya que sus ángulos no son rectos, aunque sus lados sean iguales.
- titulo: ¿Todo cuadrado es un rombo?
  respuesta: Sí
  solucion_pasos:
  - Sí, el cuadrado es un caso particular de rombo, con la condición adicional de ángulos rectos.
- titulo: ¿Todo rombo es un cuadrado?
  respuesta: 'No'
  solucion_pasos:
  - No, solo lo es si además tiene los cuatro ángulos rectos.
errores_frecuentes:
- Creer que todo rombo es un cuadrado, olvidando que el cuadrado requiere además ángulos rectos.
- Confundir esta propiedad con la del rectángulo (que tiene ángulos rectos pero no necesariamente lados
  iguales).
- Asumir que un rombo no tiene diagonales perpendiculares (en realidad, esta es otra propiedad característica
  del rombo).
fuente: 'Fuente: Moraleja Tomo 2 69, Cid 45.'
