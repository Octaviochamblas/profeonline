semantic_id: MAT.ALG.LEYES_MULTIPLICACION.PROPIEDAD_CONMUTATIVA
objetivo: Reconocer y aplicar la propiedad conmutativa de la multiplicación algebraica.
introduccion: '$3 \times 5 = 5 \times 3 = 15$. El orden en que multiplicas no importa.
  En álgebra, esta regla persiste: $3x \cdot 5y = 5y \cdot 3x = 15xy$.'
resumen: 'La **Propiedad Conmutativa** de la multiplicación establece que el orden
  de los factores no altera el producto: $a \cdot b = b \cdot a$. En álgebra, esto
  permite reorganizar factores para simplificar cálculos.'
explicacion: 'Ejemplo: $(2x)(5y)(3z)$.


  Puedo reordenarlos cómodamente:

  $(2 \cdot 5 \cdot 3)(x \cdot y \cdot z) = 30xyz$.


  Sin commutativity tendría que multiplicar en orden estricto. Con ella, junto todos
  los números primero y luego todas las letras, lo que hace el cálculo más limpio.


  También se usa para reorganizar: si tienes $(-3ab)(+5c)(-2b)$, puedes agrupar: signos
  → $(-)(+)(-) = +$, coeficientes → $3 \times 5 \times 2 = 30$, literales → $ab \cdot
  c \cdot b = ab^2c$. Resultado: $30ab^2c$.'
procedimiento:
- 'Paso 1: Agrupa todos los signos y determina el signo del producto.'
- 'Paso 2: Agrupa todos los coeficientes numéricos y multiplícalos.'
- 'Paso 3: Agrupa todas las variables (por tipo) y aplica la ley de exponentes.'
- 'Paso 4: Combina el signo con el coeficiente numérico y el resultado literal.'
ejemplos:
- titulo: Agrupar para ganar
  enunciado: 'Calcula: (3a)(2b)(4c).'
  solucion_pasos:
  - 'Signos: (+)(+)(+) = +.'
  - 'Coeficientes: 3 × 2 × 4 = 24.'
  - 'Letras: a · b · c = abc.'
  - 'Resultado: 24abc.'
errores_frecuentes:
- Confundir la propiedad conmutativa con la asociativa (aunque en la práctica se usan
  juntas).
- Al reordenar, olvidar el signo de un factor que se mueve.
fuente: Álgebra de Baldor.
estado: publicado
