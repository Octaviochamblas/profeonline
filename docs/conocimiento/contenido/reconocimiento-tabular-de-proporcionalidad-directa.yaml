semantic_id: MAT.NUM.PROP_DIRECTA.RECONOCIMIENTO_TABULAR
titulo: Reconocimiento tabular de proporcionalidad directa
objetivo: Reconocer una relación de proporcionalidad directa a partir de una tabla de valores.
introduccion: Si te entregan una hoja de cálculo con datos, ¿cómo sabes a simple vista si obedecen a una
  proporción directa? El secreto está en probar si todos esconden el mismo multiplicador.
resumen: En una tabla de proporcionalidad directa, la división $y/x$ en cada fila o columna debe dar exactamente
  el mismo resultado ($k$).
explicacion: 'Una **tabla de valores** representa la relación entre dos magnitudes. Para comprobar si
  dicha tabla modela una proporcionalidad directa, debes dividir el valor de $y$ por su correspondiente
  valor de $x$ en cada uno de los pares de datos presentados.


  - Si todas las divisiones dan el mismo resultado $k$, la tabla representa una proporción directa.

  - Si al menos uno de los resultados es distinto, la tabla NO es de proporción directa.'
procedimiento:
- 'Paso 1: Toma el primer par de datos $(x, y)$ de la tabla y divide $y$ por $x$.'
- 'Paso 2: Repite la división para el segundo par, el tercero, y así sucesivamente.'
- 'Paso 3: Si todos los resultados son idénticos, la tabla es directamente proporcional.'
ejemplos:
- titulo: Verificando una tabla
  enunciado: La tabla tiene los pares $(2, 6)$, $(3, 9)$, $(5, 16)$. ¿Es proporción directa?
  solucion_pasos:
  - 'Dividimos par 1: $6/2 = 3$.'
  - 'Dividimos par 2: $9/3 = 3$.'
  - 'Dividimos par 3: $16/5 = 3.2$.'
  - Como $3 \neq 3.2$, la tabla NO representa proporción directa.
errores_frecuentes:
- Comprobar solo el primer par y asumir que los demás también cumplen.
- Comprobar que ambas variables crecen, pero sin verificar si el cociente es constante.
- Dividir $x/y$ en una celda e $y/x$ en la siguiente.
- Confundir con la proporción inversa (donde lo constante es el producto $x \cdot y$).
fuente: Currículum Nacional MINEDUC.
estado: publicado
