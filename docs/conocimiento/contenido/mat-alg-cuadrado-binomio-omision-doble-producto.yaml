semantic_id: MAT.ALG.CUADRADO_BINOMIO.OMISION_DOBLE_PRODUCTO
titulo: Detección del error por omisión del doble producto
objetivo: Identificar y corregir el error común de distribuir el exponente sobre una suma o resta $(a \\\\pm b)^2
  \\neq a^2 \\\\pm b^2$.
introduccion: 'Si hay un error que todo estudiante de álgebra ha cometido al menos una vez, es el llamado ''sueño
  del estudiante principiante'': creer que el exponente se distribuye en la suma.'
resumen: 'Es fundamental detectar cuando una expresión ha sido mal desarrollada:

  **El error:** Escribir que $(x+y)^2 = x^2 + y^2$.

  **La corrección:** Faltó sumar el doble producto $+2xy$.

  Este error proviene de confundir las propiedades de las potencias, que sí se distribuyen en multiplicaciones $(xy)^2
  = x^2 y^2$, pero nunca en sumas o restas.'
explicacion: "### Definición formal\n\nConsiste en distribuir el exponente erróneamente omitiendo el doble producto.\n\
  \n### Desarrollo didáctico\n\nEl error algebraico más famoso en matemáticas es, sin duda, la omisión del doble\
  \ producto al elevar un binomio al cuadrado. También se le llama \"El sueño del estudiante novato\".\n\nEl error\
  \ consiste en creer falsamente que el exponente se puede distribuir sobre la suma o la resta, escribiendo:\n$(a+b)^2\
  \ \\neq a^2 + b^2$\n$(a-b)^2 \\neq a^2 - b^2$\n\n**¿Por qué este es un error grave?**\nUn exponente nos indica\
  \ cuántas veces se multiplica *la base entera* por sí misma. En $(a+b)^2$, la base es el bloque $(a+b)$. Al distribuirla\
  \ correctamente como $(a+b)(a+b)$ sabemos que aparecen los términos cruzados $ab + ba$ que originan el $+2ab$.\
  \ \n\nSi omitimos el doble producto, estamos ignorando los dos rectángulos interiores que aparecen al representar\
  \ esto geométricamente. Para evitar este error, siempre recuerda la regla del producto notable, o, en caso de\
  \ duda, escribe los dos paréntesis y multiplica término a término."
procedimiento:
- 'Paso 1: Para auditar un desarrollo:'
- 'Paso 2: Revisa cada paso donde se expanda un cuadrado de binomio.'
- 'Paso 3: Verifica que el trinomio resultante tenga 3 términos, no 2.'
- 'Paso 4: Si la expresión tiene 2 términos, el desarrollo está malo (o bien uno de los sumandos era $0$).'
ejemplos:
- titulo: Auditoría de un problema
  enunciado: Un estudiante dice que para resolver $(x-3)^2 = 16$, puede tomar la raíz cuadrada a cada término y
    decir $x - 3 = 4 \Rightarrow x = 7$. Luego, expande como $x^2 - 9 = 16$. ¿Qué errores cometió?
  solucion_pasos:
  - 'Error 1: al sacar raíz cuadrada de 16 debía considerar \\\pm 4, no solo +4.'
  - 'Error 2 (vital): Expandió mal el binomio al decir $x^2 - 9$. Omitió el $-6x$ y además puso $-9$ en lugar de
    $+9$.'
  - La verdadera expansión es $x^2 - 6x + 9 = 16$.
- titulo: En una prueba, 4 alumnos desarrollan $\sqrt{x^2+9}$. ¿Quién tiene la razón
  enunciado: 'En una prueba, 4 alumnos desarrollan $\sqrt{x^2+9}$. ¿Quién tiene la razón?


    Opciones: A) Pedro, quien dice que no se puede simplificar más (para todo $x$). · B) Juan, quien dice que es
    $x+3$. · C) Ana, quien dice que es $x-3$. · D) Sofía, quien dice que es $\pm (x+3)$.'
  solucion_pasos:
  - Decir que es $x+3$ implica que $(x+3)^2 = x^2+9$, cayendo en el error de omisión del $6x$. No se puede sacar
    raíz distribuyéndola en la suma.
  - 'Respuesta: Pedro, quien dice que no se puede simplificar más (para todo $x$).'
- titulo: 'Respecto de «Detección de error por omisión del doble producto»: ¿Describe adecuadamente el'
  enunciado: 'Respecto de «Detección de error por omisión del doble producto»: ¿Describe adecuadamente el concepto
    esta frase? «Es fundamental detectar cuando una expresión ha sido mal desarrollada: **El error:** Escribir que
    $(x+y)^2 = x^2 + y^2$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Es fundamental detectar cuando una expresión ha sido mal desarrollada:
    **El error:** Escribir que $(x+y)^2 = x^2 + y^2$.'
- titulo: 'Respecto de «Detección de error por omisión del doble producto»: ¿Se puede aceptar esta afir'
  enunciado: 'Respecto de «Detección de error por omisión del doble producto»: ¿Se puede aceptar esta afirmación?
    «Afirmar que $\\\sqrt{a^2 + b^2} = a + b$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Es fundamental detectar cuando una expresión ha sido mal desarrollada:
    **El error:** Escribir que $(x+y)^2 = x^2 + y^2$.'
errores_frecuentes:
- Afirmar que $\\\sqrt{a^2 + b^2} = a + b$.
- $x^2 + 2xy + y^2$.
- $2x + 2y$.
- Para «El error común 'El sueño del estudiante principiante' consiste en suponer que el desarrollo de $(x+y)^2$
  es:», la respuesta correcta es $x^2y^2$.
- Para todo par de números enteros.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
