semantic_id: MAT.GEO.VECTORES_BASE.MODULO
titulo: Concepto de módulo o magnitud de un vector
objetivo: Reconocer el módulo de un vector como la longitud del segmento que lo representa, calculada
  mediante la fórmula de distancia.
introduccion: 'El módulo de un vector es simplemente ''qué tan largo es'': su magnitud, sin considerar
  hacia dónde apunta.'
resumen: El módulo (o magnitud) de un vector es la longitud del segmento que lo representa, y se calcula
  igual que la distancia entre su origen y su extremo.
explicacion: '![Módulo de un vector](/static/img/geometria/cartesiano-vectores/vector-modulo.svg)


  ### Definición formal


  El módulo de un vector $\vec{v}=\vec{AB}$, denotado $|\vec{v}|$, es la longitud del segmento $AB$, calculada
  mediante la fórmula de distancia: $|\vec{v}|=\sqrt{(x_B-x_A)^2+(y_B-y_A)^2}$.


  ### Desarrollo didáctico


  En la figura, el módulo del vector es la longitud de la flecha completa, independiente de su orientación
  en el plano. Si el vector va de $A(-3,-2)$ a $B(3,3)$, su módulo es $|\vec{v}|=\sqrt{6^2+5^2}=\sqrt{61}\approx7,8$.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del origen y el extremo del vector.'
- 'Paso 2: Calcula las diferencias de coordenadas entre extremo y origen.'
- 'Paso 3: Aplica la fórmula de distancia (raíz de la suma de los cuadrados de las diferencias) para obtener
  el módulo.'
ejemplos:
- titulo: Calcular el módulo de un vector con origen y extremo conocidos
  enunciado: El vector va de A(-3,-2) a B(3,3).
  solucion_pasos:
  - '|v|=√((3-(-3))²+(3-(-2))²)=√(36+25)=√61≈7,8.'
- titulo: Reconocer que el módulo siempre es no negativo
  enunciado: Se calcula el módulo de cualquier vector.
  solucion_pasos:
  - El módulo, al ser una raíz cuadrada de una suma de cuadrados, siempre es un valor no negativo.
- titulo: ¿El módulo de un vector es lo mismo que su longitud?
  respuesta: Sí
  solucion_pasos:
  - Sí, el módulo es exactamente la longitud del segmento que representa al vector.
- titulo: ¿Dos vectores con distinta dirección pueden tener el mismo módulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, el módulo solo depende de la longitud, no de la dirección ni el sentido del vector.
errores_frecuentes:
- Confundir el módulo con las coordenadas del vector, sin aplicar la fórmula de distancia.
- Olvidar sacar la raíz cuadrada al final del cálculo.
- Creer que el módulo puede ser negativo.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 122).'
estado: publicado
