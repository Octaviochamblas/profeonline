semantic_id: MAT.GEO.CIRCUNFERENCIA_ANALITICA.IDENTIFICAR_RADIO
titulo: Identificación del radio de una circunferencia desde su forma canónica
objetivo: Identificar correctamente el radio de una circunferencia a partir de su ecuación canónica, extrayendo
  la raíz cuadrada del término a la derecha de la igualdad.
introduccion: El número que aparece a la derecha de la ecuación canónica no es el radio directamente,
  sino su cuadrado, por lo que siempre se debe aplicar raíz cuadrada.
resumen: En la ecuación $(x-h)^2+(y-k)^2=r^2$, el radio se obtiene calculando $r=\sqrt{\text{valor a la
  derecha de la igualdad}}$.
explicacion: '![Identificación del radio](/static/img/geometria/analitica/circanal-identificar-radio.svg)


  ### Definición formal


  Si la ecuación es $(x-h)^2+(y-k)^2=r^2$, el radio se obtiene despejando $r=\sqrt{r^2}$, es decir, extrayendo
  la raíz cuadrada del término a la derecha.


  ### Desarrollo didáctico


  Para $(x-1)^2+(y+2)^2=25$: el término a la derecha es 25, por lo que el radio es $r=\sqrt{25}=5$.'
procedimiento:
- 'Paso 1: Identifica el número a la derecha de la igualdad en la ecuación canónica.'
- 'Paso 2: Calcula la raíz cuadrada de ese número.'
- 'Paso 3: Verifica que ese número sea positivo, ya que de lo contrario no existiría una circunferencia
  real.'
ejemplos:
- titulo: Identificar el radio de (x-1)²+(y+2)²=25
  enunciado: (x-1)²+(y+2)²=25.
  solucion_pasos:
  - r=√25=5.
- titulo: Identificar el radio de (x+3)²+(y-4)²=50
  enunciado: (x+3)²+(y-4)²=50.
  solucion_pasos:
  - r=√50≈7,07.
- titulo: ¿El radio se obtiene extrayendo la raíz cuadrada del término derecho?
  respuesta: Sí
  solucion_pasos:
  - Sí, ese término representa r², no r directamente.
- titulo: ¿Puede el término a la derecha de la ecuación ser negativo?
  respuesta: 'No'
  solucion_pasos:
  - No, si lo fuera, no existiría un radio real y la ecuación no representaría una circunferencia.
errores_frecuentes:
- Tomar el término a la derecha como si fuera directamente el radio, sin extraer la raíz cuadrada.
- No verificar que ese término sea positivo antes de calcular el radio.
- Confundir el radio con el diámetro de la circunferencia.
fuente: Elaboración propia.
estado: publicado
