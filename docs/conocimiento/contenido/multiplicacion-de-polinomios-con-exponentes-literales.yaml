  enunciado: 'Respecto de «Multiplicación de polinomios con exponentes literales»: ¿Es compatible con
    el procedimiento esta afirmación? «Una multiplicación de polinomios»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Conserva la base y suma algebraicamente los exponentes
