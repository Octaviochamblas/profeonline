semantic_id: MAT.ALG.MULT_POLINOMIOS.EXPONENTES_LITERALES
titulo: Multiplicación de polinomios con exponentes literales
objetivo: Resolver la multiplicación de polinomios con exponentes literales y justificar el procedimiento
  algebraico.
introduccion: En algunos productos polinomiales los exponentes también están representados por letras.
  Las leyes de potencias siguen siendo válidas siempre que se identifique correctamente la base.
resumen: 'Conserva la base y suma algebraicamente los exponentes (ej: $(x+1) + (x-1)$).'
explicacion: '### Definición formal


  Si dos potencias tienen la misma base y exponentes algebraicos $\alpha$ y $\beta$, entonces, siempre
  que la expresión esté definida,

  $$x^{\alpha}\cdot x^{\beta}=x^{\alpha+\beta}.$$

  En la multiplicación de polinomios con exponentes literales, cada producto parcial combina los coeficientes
  de la manera usual y suma algebraicamente los exponentes de las bases iguales. Dos términos resultantes
  son semejantes solo si coinciden exactamente sus partes literales completas, incluyendo las expresiones
  que aparecen en los exponentes.


  ### Desarrollo didáctico


  Para ser semejantes, tanto la base como el exponente completo deben ser idénticos. $a+1 \neq a+2$.


  El $1$ es el elemento neutro de la multiplicación. $x^{2a} \cdot 1 = x^{2a}$. (No se suma $1$ al exponente
  porque no es $x^1$, es $x^0$).


  Suma: $(m - 3) + (m + 5) = 2m + 2$.'
procedimiento:
- 'Paso 1: Multiplica los coeficientes numéricos de los términos que intervienen en cada producto parcial.'
- 'Paso 2: Para cada base literal repetida, conserva la base y suma algebraicamente sus exponentes.'
- 'Paso 3: Mantén separados los términos cuyos exponentes literales no coincidan exactamente.'
- 'Paso 4: Después de expandir todo el producto, identifica qué términos son verdaderamente semejantes.'
- 'Paso 5: Reduce solo los términos con la misma parte literal completa y ordena el resultado final.'
ejemplos:
- titulo: Si en la expansión de $(2x^k - 3)(x^k + 5)$ el término central se reduce a $7x^3$, ¿cuál es
  enunciado: 'Si en la expansión de $(2x^k - 3)(x^k + 5)$ el término central se reduce a $7x^3$, ¿cuál
    es el valor de $k$?


    Opciones: A) $3$ · B) $6$ · C) $1.5$ · D) $4$'
  solucion_pasos:
  - El producto es $2x^{2k} + 10x^k - 3x^k - 15 = 2x^{2k} + 7x^k - 15$. El término central es $7x^k$.
    Como nos dicen que es $7x^3$, entonces $k=3$.
  - 'Respuesta: $3$'
- titulo: Cuál es la expresión factorizada de $m^{2a+2} + m^{2a+1}$ luego de extraer como factor común
  enunciado: '¿Cuál es la expresión factorizada de $m^{2a+2} + m^{2a+1}$ luego de extraer como factor
    común al monomio de menor grado?


    Opciones: A) $m^{2a+1}(m + 1)$ · B) $m^{2a}(m^2 + m)$ · C) $m^{a+1}(m^{a+1} + m^a)$ · D) $m^{2a+1}(m)$'
  solucion_pasos:
  - 'Revertimos la distribución. El menor grado es $2a+1$. Dividiendo obtenemos: $m^{(2a+2)-(2a+1)} +
    1 = m^1 + 1$. Luego: $m^{2a+1}(m + 1)$.'
- titulo: 'Respecto de «Multiplicación de polinomios con exponentes literales»: ¿Se ajusta a la definic'
  enunciado: 'Respecto de «Multiplicación de polinomios con exponentes literales»: ¿Se ajusta a la definición
    esta afirmación? «Conserva la base y suma algebraicamente los exponentes (ej: $(x+1) + (x-1)$)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Conserva la base y suma algebraicamente los exponentes
    (ej: $(x+1) + (x-1)$).'
- titulo: 'Respecto de «Multiplicación de polinomios con exponentes literales»: ¿Es compatible con el
