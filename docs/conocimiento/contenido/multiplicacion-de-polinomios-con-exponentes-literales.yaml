errores_frecuentes:
- Una multiplicación de polinomios.
- Para «Al multiplicar potencias de igual base con exponentes algebraicos, la operación sobre los exponentes
  corresponde a:», la respuesta correcta es Dejar el exponente de mayor grado.
- Una división de exponentes.
- Sí, el resultado es $x^{2a+3}$.
- Sí, pero solo si $a=1$.
