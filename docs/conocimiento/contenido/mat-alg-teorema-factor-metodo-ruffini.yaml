errores_frecuentes:
- Adivinar un número que no es divisor del término independiente (ej. intentar probar el 5 si el término independiente
  es 6, lo cual es pérdida de tiempo en raíces enteras).
- Olvidar poner el factor lineal extraído en la respuesta final y entregar solo la factorización del cociente.
- De los múltiplos del coeficiente principal.
- Siempre probamos solo 1 y -1.
- De los números primos.
