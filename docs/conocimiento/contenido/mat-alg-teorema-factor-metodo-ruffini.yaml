semantic_id: MAT.ALG.TEOREMA_FACTOR.METODO_RUFFINI
titulo: Factorización mediante Ruffini
objetivo: Aprender a buscar raíces racionales y aplicar la regla de Ruffini en cadena para factorizar polinomios
  de grado mayor a 2.
introduccion: 'Factorizar un polinomio de grado 3 o 4 usando solo agrupación es como intentar desarmar un reloj
  con un martillo: a veces funciona, pero usualmente terminas frustrado. El método de Ruffini es tu destornillador
  de precisión. Te permite adivinar una pieza, sacarla limpiamente, y ver qué queda.'
resumen: 'El Método de Ruffini para factorizar consiste en: 1) Adivinar una raíz ''$c$'' probando divisores del
  término independiente. 2) Aplicar división sintética con esa raíz para obtener un resto $0$. 3) Escribir el polinomio
  como $(x-c) \cdot \text{Cociente}$.'
explicacion: '### Definición formal


  Según el Teorema de las Raíces Racionales, cualquier raíz entera forzosamente debe dividir al término constante
  (independiente).


  ### Desarrollo didáctico


  Queremos factorizar $x^3 - 4x^2 + x + 6$.


  1. **Adivinar la raíz:** Probamos divisores del número final (6). Son: $\pm1, \pm2, \pm3, \pm6$.

  - Probemos $x = -1$. Evaluamos: $(-1)^3 - 4(-1)^2 + (-1) + 6 = -1 - 4 - 1 + 6 = 0$. Es raíz.


  2. **Extraer el factor:** Sabemos que $(x - (-1)) = (x+1)$ es factor.


  3. **Aplicar Ruffini** para encontrar el otro paréntesis:

  Multiplicador: $-1$.

  Coeficientes: `1  -4   1   6`

  Ruffini nos dará una fila final: `1  -5   6  | 0`.


  4. **Armar el rompecabezas:** El polinomio original ahora es $(x + 1)(x^2 - 5x + 6)$.


  5. **Seguir factorizando:** El trinomio $(x^2 - 5x + 6)$ lo podemos factorizar con el método simple de buscar
  dos números que multipliquen 6 y sumen -5. Son -2 y -3. Nos queda $(x-2)(x-3)$.


  **Factorización final:** $(x + 1)(x - 2)(x - 3)$. Hemos destrozado un polinomio de tercer grado en sus tres piezas
  lineales fundamentales.'
procedimiento:
- 'Paso 1: Lista los posibles divisores enteros del término independiente (el número solo).'
- 'Paso 2: Evalúa el polinomio con esos números hasta encontrar uno que dé como resultado 0 (esa es tu raíz).'
- 'Paso 3: Realiza la división sintética (Ruffini) usando esa raíz como multiplicador.'
- 'Paso 4: Comprueba que el resto sea 0. Si no es 0, te equivocaste en la suma o no era raíz.'
- 'Paso 5: Escribe la respuesta parcial como $(x - \text{raíz}) \cdot (\text{polinomio cociente})$.'
- 'Paso 6: Repite el proceso con el polinomio cociente si su grado es mayor a 2, o aplica métodos clásicos si es
  cuadrático.'
- Según el Teorema de las Raíces Racionales, cualquier raíz entera forzosamente debe dividir al término constante
  (independiente).
ejemplos:
- titulo: 'Factoriza $x^3 - 7x + 6$. (Ojo: falta $x^2$)'
  enunciado: 'Factoriza $x^3 - 7x + 6$. (Ojo: falta $x^2$).'
  solucion_pasos:
  - 'Divisores de 6: $\pm1, \pm2, \pm3, \pm6$. Probamos 1: $1^3 - 7(1) + 6 = 0$. Raíz: 1.'
  - 'Ruffini con raíz 1. Coeficientes: `1, 0, -7, 6`.'
  - 'Fila final: `1  1  -6 | 0`. Cociente: $x^2 + x - 6$.'
  - 'Factorizamos el trinomio: $(x+3)(x-2)$.'
  - 'Resultado: $(x-1)(x+3)(x-2)$.'
- titulo: Si al hacer Ruffini en un grado 4 te da resto 0, ¿qué grado tiene el cociente?
  solucion_pasos:
  - Al extraer un factor lineal de un grado 4, el polinomio se reduce a un grado 3, al cual le puedes volver a aplicar
    Ruffini.
- titulo: 'Respecto de «Factorización mediante método de Ruffini»: ¿Describe adecuadamente el concepto'
  enunciado: 'Respecto de «Factorización mediante método de Ruffini»: ¿Describe adecuadamente el concepto esta frase?
    «El Método de Ruffini para factorizar consiste en: 1) Adivinar una raíz ''$c$'' probando divisores del término
    independiente»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El Método de Ruffini para factorizar consiste en: 1) Adivinar
    una raíz ''$c$'' probando divisores del término independiente.'
- titulo: 'Respecto de «Factorización mediante método de Ruffini»: ¿Se puede aceptar esta afirmación? «'
  enunciado: 'Respecto de «Factorización mediante método de Ruffini»: ¿Se puede aceptar esta afirmación? «Adivinar
    un número que no es divisor del término independiente (ej. intentar probar el 5 si el término independiente
    es 6, lo cual es pérdida de tiempo en raíces enteras)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El Método de Ruffini para factorizar consiste en: 1) Adivinar
