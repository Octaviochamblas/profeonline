semantic_id: MAT.EST.VARIABLES_TIPOS.CUALITATIVA_ID
titulo: Identificar variables cualitativas
objetivo: Identificar variables cualitativas como aquellas que describen atributos o cualidades no numéricas
  de los elementos de estudio.
introduccion: No todas las características que se estudian son números; muchas describen cualidades, categorías
  o atributos.
resumen: Una variable cualitativa (o categórica) es aquella cuyos valores son atributos, cualidades o
  categorías, no números.
explicacion: '![Identificación de variables cualitativas](/static/img/estadistica/vartipo/vartipo-cualitativa-id.svg)


  ### Definición formal


  Una variable es cualitativa si sus valores posibles son categorías o etiquetas, y no tiene sentido realizar
  operaciones aritméticas sobre ellos.


  ### Desarrollo didáctico


  El color de ojos (azul, café, verde) o la comuna de residencia son variables cualitativas: describen
  una cualidad, no una cantidad numérica.'
procedimiento:
- 'Paso 1: Observa los valores posibles que puede tomar la variable en estudio.'
- 'Paso 2: Verifica si esos valores son categorías/atributos o si son números con sentido numérico.'
- 'Paso 3: Si son categorías o atributos, la variable es cualitativa.'
ejemplos:
- titulo: 'Identificar una variable cualitativa: color favorito'
  enunciado: Se pregunta a un grupo cuál es su color favorito.
  solucion_pasos:
  - El color favorito es una variable cualitativa, ya que sus valores son categorías (rojo, azul, etc.),
    no números.
- titulo: 'Identificar una variable cualitativa: comuna de residencia'
  enunciado: Se registra la comuna donde vive cada encuestado.
  solucion_pasos:
  - La comuna de residencia es una variable cualitativa, ya que describe una categoría geográfica.
- titulo: ¿El número de hijos de una familia es una variable cualitativa?
  respuesta: 'No'
  solucion_pasos:
  - No, es una variable cuantitativa, ya que representa una cantidad numérica (conteo).
- titulo: ¿El tipo de sangre de una persona es una variable cualitativa?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que sus valores (A, B, AB, O) son categorías, no cantidades numéricas.
errores_frecuentes:
- Confundir una variable cualitativa codificada con números (por ejemplo, 1=hombre, 2=mujer) con una variable
  cuantitativa real.
- Pensar que toda variable con pocas categorías es automáticamente cuantitativa.
- No distinguir entre atributos con y sin orden (nominal vs. ordinal) al clasificar variables cualitativas.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
