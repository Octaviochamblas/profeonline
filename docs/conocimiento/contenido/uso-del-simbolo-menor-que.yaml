semantic_id: MAT.ALG.ORDEN_FUNDAMENTOS.SIMBOLO_MENOR
titulo: Uso del símbolo menor que
objetivo: Interpretar el símbolo de menor que para modelar restricciones de orden.
introduccion: Para expresar que una cantidad es inferior a otra, empleamos el símbolo de menor que.
resumen: El símbolo menor que ($<$) determina que la cantidad de la izquierda es estrictamente inferior
  a la cantidad de la derecha.
explicacion: '### Definición formal

  Para $a, b \\in \\mathbb{R}$, $a < b$ si y solo si $b - a > 0$, lo que implica que la diferencia $b
  - a$ es un real positivo.


  ### Desarrollo didáctico

  Geométricamente, escribir $a < b$ indica que el punto $a$ se encuentra a la izquierda del punto $b$
  en la recta real.'
procedimiento:
- Extraer las cantidades a comparar.
- Escribir el símbolo $<$ entre ambas cantidades.
- Comprobar que el valor de la izquierda es estrictamente inferior.
ejemplos:
- enunciado: Analizar la validez de la relación para $x = 3$ frente a $y = 2$.
  solucion_pasos:
  - Evaluar los valores asignados a cada variable.
  - Comparar los resultados obtenidos en el marco de la definición formal.
  titulo: Ejemplo de análisis 1 en el contexto de la relación matemática
- enunciado: Analizar la validez de la relación para $x = 4$ frente a $y = 4$.
  solucion_pasos:
  - Evaluar los valores asignados a cada variable.
  - Comparar los resultados obtenidos en el marco de la definición formal.
  titulo: Ejemplo de análisis 2 en el contexto de la relación matemática
- respuesta: Sí
  solucion_pasos:
  - Reemplazar el valor propuesto en la formulación.
  - Verificar la concordancia lógica positiva.
  titulo: ¿Cumple el número $5$ con la condición matemática descrita?
- respuesta: 'No'
  solucion_pasos:
  - Sustituir la cantidad constante en el modelo algebraico.
  - Demostrar que el valor no satisface la exigencia definida.
  titulo: ¿Cumple el número $-3$ con la condición matemática descrita?
errores_frecuentes:
- El símbolo $<$ incluye el caso de igualdad.
- La lectura de $a < b$ depende del signo de los números.
- Si $a < b$, entonces $a$ debe ser negativo.
- El símbolo $<$ representa diferencia de conjuntos.
- Si $a < b$, la distancia al cero de $a$ es siempre menor.
fuente: Elaboración propia
