semantic_id: MAT.ALG.INECUACIONES_VALOR_ABSOLUTO.MENOR_QUE_POSITIVO
titulo: Resolución de inecuación de valor absoluto menor que una constante positiva
objetivo: Resolver inecuaciones con valor absoluto de la forma menor que un número positivo aplicando
  la propiedad de acotación.
introduccion: Cuando decimos que el valor absoluto de una cantidad es menor que un número positivo, significa
  que la distancia de esa cantidad al origen es más pequeña que ese número. Esto se traduce en que la
  cantidad original debe estar "atrapada" entre el valor negativo y el valor positivo del número.
resumen: La inecuación $|x| < a$ con $a > 0$ se resuelve transformándola en la doble desigualdad simultánea
  $-a < x < a$.
explicacion: '### Definición formal

  Para cualquier expresión algebraica $u$ y cualquier número real constante $a > 0$, la inecuación de
  valor absoluto $|u| < a$ es lógicamente equivalente a la doble inecuación $-a < u < a$. Del mismo modo,
  si la inecuación incluye la igualdad, $|u| \\leq a$ es equivalente a $-a \\leq u \\leq a$.


  ### Desarrollo didáctico

  Imagina que estás en el centro de una plaza (posición cero) y te dicen que debes mantenerte a una distancia
  menor a 5 metros de este centro. Eso significa que no puedes alejarte 5 metros hacia la derecha (valores
  positivos) ni 5 metros hacia la izquierda (valores negativos). Debes permanecer en la franja que va
  desde $-5$ hasta $5$. En términos algebraicos, esto explica por qué si $|x| < 5$, entonces obligatoriamente
  $-5 < x < 5$. Cuando hay una expresión más compleja dentro de las barras, como $|2x - 1| < 5$, aplicamos
  el mismo principio para atrapar al bloque entero $-5 < 2x - 1 < 5$, y a partir de ahí despejamos la
  variable.'
procedimiento:
- Identificar que la inecuación tiene la forma $|u| < a$ o $|u| \\leq a$, confirmando primero que $a$
  es un número estrictamente mayor que cero.
- Reescribir la inecuación eliminando las barras de valor absoluto y formandouna doble desigualdad - $-a
  < u < a$ (o $-a \\leq u \\leq a$).
- Despejar la variable incógnita en la parte central de la desigualdad. Toda operación (suma, resta, multiplicación
  o división) debe aplicarse a los tres lados simultáneamente.
- Expresar el resultado final en notación de intervalo.
ejemplos:
- titulo: Resolución de una inecuación básica
  enunciado: Resuelve la inecuación $|x - 2| < 5$.
  solucion_pasos:
  - 'Paso 1: Identificamos la forma $|u| < a$ con $u = x - 2$ y $a = 5$.'
  - 'Paso 2: Transformamos en doble desigualdad - $-5 < x - 2 < 5$.'
  - 'Paso 3: Para despejar $x$, sumamos 2 en las tres partes de la inecuación.'
  - 'Paso 4: Obtenemos $-5 + 2 < x < 5 + 2$, lo que da $-3 < x < 7$.'
  - 'Paso 5: La solución en forma de intervalo es $(-3, 7)$.'
- titulo: Inecuación con coeficiente que acompaña la incógnita
  enunciado: Resuelve la inecuación $|2x + 1| \\leq 7$.
  solucion_pasos:
  - 'Paso 1: Identificamos que aplica la propiedad con $a=7$ positivo - $-7 \\leq 2x + 1 \\leq 7$.'
  - 'Paso 2: Restamos 1 en las tres partes - $-7 - 1 \\leq 2x \\leq 7 - 1$.'
  - 'Paso 3: Simplificamos obteniendo $-8 \\leq 2x \\leq 6$.'
  - 'Paso 4: Dividimos todas las partes por 2, obteniendo $-4 \\leq x \\leq 3$.'
  - 'Paso 5: La solución en forma de intervalo es $[-4, 3]$.'
- titulo: ¿Es un valor específico solución de la inecuación?
  respuesta: Verdadero
  solucion_pasos:
  - Para saber si $x=0$ es solución de $|x| < 3$, sustituimos la variable por el valor.
  - Calculamos $|0|$.
  - El valor absoluto de 0 es 0.
  - Comparamos con la inecuación original - $0 < 3$ es una proposición verdadera, por lo tanto sí es solución.
- titulo: ¿Se puede aplicar la propiedad $-a < x < a$ para resolver $|x| < -4$?
  respuesta: Falso
  solucion_pasos:
  - La propiedad exige que el número al otro lado de la desigualdad sea positivo ($a > 0$).
  - En este caso, se pide que un valor absoluto, que por definición es siempre mayor o igual a 0, sea
    estrictamente menor que un número negativo ($-4$).
  - Esto es matemáticamente imposible.
  - No se aplica la propiedad; la inecuación directamente no tiene solución real (conjunto vacío).
errores_frecuentes:
- Separar la inecuación $|x| < a$ en dos inecuaciones aisladas sin unirlas correctamente en una doble
  desigualdad, asumiendo $x < a$ o $x < -a$.
- Olvidar que la constante $a$ debe ser positiva antes de aplicar la regla de transformación a doble desigualdad.
- Resolver la inecuación ignorando completamente las barras de valor absoluto, como si solo fuera $x <
  a$.
- Despejar erróneamente en la doble desigualdad operando solo en el lado derecho y dejando intacto el
  lado izquierdo.
- Creer que la solución de $|x| < a$ son dos intervalos disjuntos que se alejan del origen en lugar de
  un único intervalo central continuo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
