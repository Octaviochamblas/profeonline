semantic_id: MAT.ALG.FUNC_CUADR_TRANSFORMACIONES.TRASLACION_HORIZONTAL
titulo: Descripción de la traslación horizontal de la parábola en el plano
objetivo: Describir cómo el parámetro $h$ de la forma canónica traslada horizontalmente la gráfica de la función
  cuadrática básica.
introduccion: Partiendo de la parábola más simple, $f(x)=x^2$, es posible deslizarla hacia la izquierda o hacia
  la derecha sin cambiar su forma, simplemente modificando un parámetro dentro del paréntesis.
resumen: La función $g(x)=(x-h)^2$ es la parábola $f(x)=x^2$ **trasladada horizontalmente** $h$ unidades, manteniendo
  exactamente la misma forma y concavidad.
explicacion: '### Definición formal


  Dada $f(x)=x^2$, la función $g(x)=f(x-h)=(x-h)^2$ representa una traslación horizontal de la gráfica de $f$
  en $h$ unidades. Cada punto $(x,y)$ de la gráfica original se traslada a $(x+h,y)$ en la nueva gráfica.


  ### Desarrollo didáctico


  La traslación horizontal no altera la forma ni la abertura de la parábola: solo desplaza toda la curva a lo
  largo del eje $x$, incluyendo su vértice.


  La gráfica de $g(x)=(x-3)^2$ es idéntica a la de $f(x)=x^2$, pero desplazada $3$ unidades hacia la derecha,
  con vértice en $(3,0)$ en vez de $(0,0)$.'
procedimiento:
- 'Paso 1: Identifica la función base $f(x)=x^2$ y la función transformada $g(x)=(x-h)^2$.'
- 'Paso 2: Reconoce que la gráfica de $g$ es la de $f$ desplazada horizontalmente $h$ unidades.'
- 'Paso 3: Ubica el nuevo vértice trasladando el vértice original $(0,0)$ a $(h,0)$.'
ejemplos:
- titulo: Descripción de una traslación hacia la derecha
  enunciado: 'Describe la traslación horizontal de $g(x)=(x-5)^2$ respecto a $f(x)=x^2$.'
  solucion_pasos:
  - La gráfica de $f$ se traslada $5$ unidades.
  - El vértice pasa de $(0,0)$ a $(5,0)$, desplazándose hacia la derecha.
- titulo: Descripción de una traslación hacia la izquierda
  enunciado: 'Describe la traslación horizontal de $g(x)=(x+4)^2$ respecto a $f(x)=x^2$.'
  solucion_pasos:
  - 'Reescribiendo como $(x-(-4))^2$, la traslación es de $-4$ unidades.'
  - El vértice pasa de $(0,0)$ a $(-4,0)$, desplazándose hacia la izquierda.
- titulo: ¿La traslación horizontal cambia la forma de la parábola?
  enunciado: ¿La traslación horizontal cambia la forma de la parábola?
  respuesta: 'No'
  solucion_pasos:
  - Solo desplaza la posición de la curva; su forma, concavidad y abertura permanecen exactamente iguales.
- titulo: ¿La traslación horizontal afecta la coordenada $y$ del vértice?
  enunciado: ¿La traslación horizontal afecta la coordenada $y$ del vértice?
  respuesta: 'No'
  solucion_pasos:
  - Solo afecta la coordenada $x$ del vértice; la coordenada $y$ permanece igual a la de la función original.
errores_frecuentes:
- Confundir la dirección de la traslación, moviendo hacia la izquierda cuando debería ser hacia la derecha o
  viceversa.
- Aplicar la traslación a la coordenada $y$ del vértice en vez de a la coordenada $x$.
- No reescribir correctamente el binomio para identificar el valor real de $h$.
- Confundir la traslación horizontal con la traslación vertical.
