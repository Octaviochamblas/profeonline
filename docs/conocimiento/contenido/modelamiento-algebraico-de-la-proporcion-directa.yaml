semantic_id: MAT.NUM.PROP_DIRECTA.MODELO_ALGEBRAICO
titulo: Modelamiento algebraico de la proporción directa
objetivo: Representar situaciones de proporción directa a través de un modelo algebraico (ecuación).
introduccion: Una vez que conoces la constante de proporcionalidad, ya no necesitas resolver regla de
  tres cada vez. Puedes crear una 'máquina matemática' en forma de ecuación que calcule cualquier valor
  de forma instantánea.
resumen: El modelo algebraico de la proporcionalidad directa es la ecuación $y = k \cdot x$, donde $k$
  es la constante de proporcionalidad.
explicacion: 'Al saber que $y/x = k$, podemos multiplicar a ambos lados de la igualdad por $x$ para despejar
  $y$. Esto nos entrega el **modelo algebraico** de la proporción:


  $$y = k \cdot x$$


  Esta ecuación nos dice que para hallar cualquier valor de $y$ (magnitud dependiente), simplemente multiplicamos
  el valor de $x$ (magnitud independiente) por nuestra constante $k$. Es equivalente a una función lineal
  $f(x) = kx$.'
procedimiento:
- 'Paso 1: Calcula la constante $k$ dividiendo un par conocido $y/x$.'
- 'Paso 2: Escribe la ecuación sustituyendo $k$ por el número encontrado.'
- 'Paso 3: Utiliza $y = kx$ para encontrar valores desconocidos de forma inmediata.'
ejemplos:
- titulo: Construyendo el modelo
  enunciado: Si 2 cajas pesan 10 kilos, escribe el modelo algebraico del peso en función de las cajas.
  solucion_pasos:
  - Calculamos $k = 10 / 2 = 5$.
  - Planteamos la fórmula general $y = k \cdot x$.
  - El modelo es $y = 5x$ (el peso es 5 veces el número de cajas).
- titulo: ¿Puedo despejar x?
  respuesta: Sí
  solucion_pasos:
  - Del modelo $y = kx$, se deduce que $x = y / k$ si necesitamos calcular el antecedente.
errores_frecuentes:
- Plantear el modelo como $y = k + x$.
- Intercambiar variables escribiendo $x = ky$ sin adaptar el valor de la constante.
- Olvidar calcular $k$ antes de armar la ecuación final.
- Agregar un término libre (ej. $y = kx + n$), convirtiéndolo en función afín.
fuente: Currículum Nacional MINEDUC.
estado: publicado
