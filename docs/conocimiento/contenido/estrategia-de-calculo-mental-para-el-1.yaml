semantic_id: MAT.NUM.PORCENTAJES.CALCULO_MENTAL_UNO
titulo: Estrategia de cálculo mental para el 1%
objetivo: Aplicar la estrategia de cálculo mental rápida para el 1% y porcentajes de un dígito.
introduccion: Así como el 10% es tu herramienta para porcentajes grandes, saber aislar el 1% te permite
  calcular cirujías exactas como un 3% o un 7% sin escribir una sola fórmula.
resumen: Para hallar el 1% de cualquier número, divídelo por 100 (córrele la coma dos espacios a la izquierda).
  Luego multiplica por 2, 3 o 7 según el porcentaje que necesites.
explicacion: 'El **$1\%$** equivale a la fracción $1/100$.


  **Regla de oro del 1%:**

  Para calcular el 1% de un número, mueve su punto decimal **dos posiciones a la izquierda**.

  - El 1% de 600 es 6.

  - El 1% de 45 es 0.45.


  Una vez que conoces el valor de la unidad porcentual básica (el 1%), calcular porcentajes precisos como
  el $3\%$ es simplemente multiplicar ese valor base por 3.

  - **$4\%$ de 300**: El 1% es 3. Multiplico $3 \cdot 4 = 12$.'
procedimiento:
- 'Paso 1: Mueve la coma decimal dos lugares a la izquierda para obtener el 1%.'
- 'Paso 2: Multiplica ese resultado por el dígito del porcentaje deseado.'
- 'Paso 3: Verifica mentalmente que el número resultante sea bastante pequeño en relación al total.'
ejemplos:
- titulo: Cálculo de comisión
  enunciado: Un corredor cobra un 3% de comisión por vender un auto de $8.000.000. ¿Cuánto es la comisión?
  solucion_pasos:
  - 'Calculamos el 1%: Movemos la coma dos espacios. Es $80.000.'
  - 'Calculamos el 3%: Multiplicamos por 3. $80.000 \cdot 3 = 240.000$.'
  - La comisión es $240.000.
errores_frecuentes:
- Mover la coma un solo espacio por accidente (calculando el 10% y luego multiplicando, lo que da números
  gigantes).
- No saber multiplicar números con decimales resultantes mentalmente (ej. el 2% de 15 es $0.15 \cdot 2
  = 0.30$).
fuente: Currículum Nacional MINEDUC.
estado: publicado
