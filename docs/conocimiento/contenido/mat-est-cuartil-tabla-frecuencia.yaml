semantic_id: MAT.EST.CUARTILES.TABLA_FRECUENCIA
titulo: Determinar cuartiles en tablas de frecuencia acumulada
objetivo: Determinar los cuartiles de un conjunto de datos presentado en una tabla de frecuencia usando la frecuencia
  acumulada.
introduccion: Cuando los datos ya vienen resumidos en una tabla, se puede encontrar el cuartil mirando en qué fila se
  acumula el porcentaje que buscas.
resumen: En una tabla de frecuencia, el cuartil $Q_i$ se ubica identificando la primera fila cuya frecuencia acumulada
  alcanza o supera $\dfrac{i\cdot n}{4}$.
explicacion: '![Cuartiles en tabla de frecuencia](/static/img/estadistica/cuartil/cuartil-tabla-frecuencia.svg)


  ### Definición formal


  Se calcula la frecuencia acumulada de la tabla y se busca la primera fila donde esta alcanza o supera $\dfrac{i\cdot

  n}{4}$. El valor de esa fila corresponde al cuartil buscado.


  ### Desarrollo didáctico


  Es el mismo principio usado para la mediana en tablas de frecuencia, aplicado ahora a las posiciones $n/4$, $2n/4$ y

  $3n/4$ en vez de solo $n/2$.'
procedimiento:
- 'Paso 1: Construye o revisa la columna de frecuencia acumulada de la tabla.'
- 'Paso 2: Calcula la posición objetivo $\dfrac{i\cdot n}{4}$ para el cuartil buscado.'
- 'Paso 3: Ubica la primera fila cuya frecuencia acumulada alcanza o supera esa posición; ese valor es el cuartil.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Una tabla tiene $n=40$ datos. ¿Cuál es la posición objetivo para encontrar $Q_2$?
  solucion_pasos:
  - Posición $= \dfrac{2\cdot 40}{4}=20$.
  - Se busca la primera fila con frecuencia acumulada de al menos 20.
- titulo: Ejemplo 2
  enunciado: En una tabla con frecuencias acumuladas 5, 12, 20, 28 y 40, ¿en qué fila está $Q_1$ si $n=40$?
  solucion_pasos:
  - Posición objetivo $= \dfrac{1\cdot 40}{4} = 10$.
  - La primera fila que alcanza o supera 10 es la de acumulada 12, por lo tanto $Q_1$ está en esa fila.
- titulo: ¿Se usa la frecuencia acumulada para ubicar los cuartiles en una tabla?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la herramienta clave para saber en qué fila cae cada cuartil.
- titulo: ¿La posición objetivo para $Q_3$ en una tabla de frecuencia es $n/2$?
  respuesta: 'No'
  solucion_pasos:
  - 'No, para $Q_3$ la posición objetivo es $3n/4$, no $n/2$ (esa es la posición de $Q_2$).'
errores_frecuentes:
- Confundir la frecuencia absoluta con la frecuencia acumulada al buscar el cuartil.
- Usar $n/2$ para todos los cuartiles en vez de $n/4$, $2n/4$ y $3n/4$.
- Elegir la fila anterior a la que realmente alcanza la posición objetivo.
- No verificar que la tabla esté ordenada de menor a mayor antes de acumular frecuencias.
- Olvidar que el total $n$ corresponde a la última frecuencia acumulada de la tabla.
fuente: 'Elaboración propia.'
estado: publicado
