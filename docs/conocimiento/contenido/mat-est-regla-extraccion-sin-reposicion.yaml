semantic_id: MAT.EST.REGLAS_PROBABILIDAD.EXTRACCION_SIN_REPOSICION
titulo: Resolución de probabilidades en extracciones sin reposición mediante conteo secuencial
objetivo: Resolver problemas de probabilidad con extracciones sucesivas sin reposición, ajustando el número
  de casos favorables y totales en cada extracción.
introduccion: Cuando se extraen varios objetos sin devolverlos, cada extracción cambia las condiciones
  de la siguiente, por lo que se debe recalcular la probabilidad en cada paso.
resumen: En una extracción sin reposición, la probabilidad de una secuencia de resultados se calcula multiplicando
  las probabilidades de cada extracción, ajustando los casos favorables y totales según lo ya extraído.
explicacion: '![Extracción sin reposición](/static/img/probabilidad/reglas/regla-extraccion-sin-reposicion.svg)


  ### Definición formal


  Si se extraen sucesivamente sin reposición, la probabilidad de una secuencia específica es el producto
  de las probabilidades condicionales en cada paso, donde el denominador disminuye en 1 en cada extracción
  (y el numerador según lo ya extraído).


  ### Desarrollo didáctico


  En una urna con 5 bolitas rojas y 5 azules, la probabilidad de extraer dos rojas seguidas sin reposición
  es $P(R,R)=\dfrac{5}{10}\times\dfrac{4}{9}=\dfrac{2}{9}$: tras la primera extracción, quedan 9 bolitas
  en total y solo 4 rojas.'
procedimiento:
- 'Paso 1: Calcula la probabilidad de la primera extracción con las condiciones iniciales.'
- 'Paso 2: Ajusta el numerador (casos favorables) y el denominador (casos totales) según lo extraído,
  y calcula la probabilidad de la segunda extracción.'
- 'Paso 3: Multiplica las probabilidades de todas las extracciones sucesivas para obtener la probabilidad
  de la secuencia completa.'
ejemplos:
- titulo: Calcular P(dos rojas seguidas) sin reposición
  enunciado: Urna con 5 rojas y 5 azules.
  solucion_pasos:
  - P(R,R)=5/10×4/9=20/90=2/9.
- titulo: Calcular P(dos ases seguidos) al extraer cartas sin reposición
  enunciado: Mazo de 52 cartas, 4 ases.
  solucion_pasos:
  - P(As,As)=4/52×3/51=12/2652=1/221.
- titulo: ¿El denominador disminuye en cada extracción sin reposición?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que el total de objetos disminuye en 1 en cada extracción.
- titulo: ¿El numerador también puede cambiar según el resultado de la extracción anterior?
  respuesta: Sí
  solucion_pasos:
  - Sí, si el objeto extraído pertenecía a la misma categoría que se busca de nuevo, ese conteo también
    disminuye.
errores_frecuentes:
- Olvidar disminuir el total de objetos disponibles en cada extracción sucesiva.
- Aplicar el mismo cálculo que en extracciones con reposición, ignorando el cambio de condiciones.
- Confundir cuál conteo (numerador o denominador) debe ajustarse según el resultado extraído previamente.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
