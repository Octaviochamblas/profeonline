semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.INVERSO_MULTIPLICATIVO
objetivo: Comprender inverso multiplicativo de un número racional no nulo y aplicarlo
  correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso inverso multiplicativo de un número racional no nulo ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: El inverso multiplicativo de un racional no nulo es el número que multiplicado
  por él produce 1. Además, solo el cero no tiene inverso multiplicativo.
explicacion: |-
  El inverso multiplicativo de un racional no nulo es el número que multiplicado por él produce 1.

  Una idea importante es que solo el cero no tiene inverso multiplicativo.

  Por ejemplo, El inverso multiplicativo de \(-\frac{7}{3}\) es \(-\frac{3}{7}\).
procedimiento:
- 'Paso 1: Escribir ambos lados de la propiedad con números racionales simples.'
- 'Paso 2: Calcular cada lado por separado respetando el orden de las operaciones.'
- 'Paso 3: Comparar los resultados y concluir si la propiedad se cumple.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “El inverso multiplicativo de \(-\frac{7}{3}\)
    es \(-\frac{3}{7}\).” se relaciona con inverso multiplicativo de un número racional
    no nulo.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: el inverso multiplicativo de un racional no nulo
    es el número que multiplicado por él produce 1.'
  - Concluye que el ejemplo sí ilustra inverso multiplicativo de un número racional
    no nulo.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Solo el cero no tiene inverso multiplicativo.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con inverso multiplicativo de un número
    racional no nulo?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que solo el cero no tiene inverso multiplicativo.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar inverso multiplicativo de un número racional no nulo ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar inverso multiplicativo de un número racional no nulo sin mirar
  qué representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
