semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.INVERSO_MULTIPLICATIVO
objetivo: Encontrar el inverso multiplicativo de un racional no nulo.
introduccion: La afirmación “Solo el cero no tiene inverso multiplicativo” se puede
  comprobar en El inverso multiplicativo de \(-\frac{7}{3}\) es \(-\frac{3}{7}\).
  Este recurso desarrolla el razonamiento de inverso multiplicativo de un número racional
  no nulo que conecta ambas ideas.
resumen: El inverso multiplicativo de un racional no nulo es el número que multiplicado
  por él produce 1. Como criterio de control, solo el cero no tiene inverso multiplicativo
explicacion: |-
  El inverso multiplicativo de un racional no nulo es el número que multiplicado por él produce 1.

  Para analizar “El inverso multiplicativo de \(-\frac{7}{3}\) es \(-\frac{3}{7}\)” se identifican los datos, se aplica la definición y se controla el resultado mediante la idea “Solo el cero no tiene inverso multiplicativo”.
procedimiento:
- 'Paso 1: Comprueba que el racional no sea cero.'
- 'Paso 2: Intercambia numerador y denominador conservando el signo global.'
- 'Paso 3: Multiplica ambos números y verifica que el resultado sea \(1\).'
ejemplos:
- titulo: Aplicación razonada — Inverso multiplicativo de un número racional no nulo
  enunciado: El inverso multiplicativo de \(-\frac{7}{3}\) es \(-\frac{3}{7}\).
  solucion_pasos:
  - Comprueba que el racional no sea cero.
  - Intercambia numerador y denominador conservando el signo global.
  - Multiplica ambos números y verifica que el resultado sea \(1\).
- titulo: Revisión de una solución — Inverso multiplicativo de un número racional
    no nulo
  enunciado: Una solución aplica “Intercambia numerador y denominador conservando
    el signo global.”, pero termina sin comprobar que solo el cero no tiene inverso
    multiplicativo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define inverso multiplicativo de un número racional
    no nulo: el inverso multiplicativo de un racional no nulo es el número que multiplicado
    por él produce 1.'
  - Comprueba que el racional no sea cero.
  - 'Completa la revisión con este control: Multiplica ambos números y verifica que
    el resultado sea \(1\).'
- titulo: ¿Se cumple que solo el cero no tiene inverso multiplicativo? — Inverso multiplicativo
    de un número racional no nulo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el inverso multiplicativo de un racional
    no nulo es el número que multiplicado por él produce 1.
  - El caso “El inverso multiplicativo de \(-\frac{7}{3}\) es \(-\frac{3}{7}\)” satisface
    esa condición.
  - Multiplica ambos números y verifica que el resultado sea \(1\).
- titulo: ¿Es válido omitir el paso “Comprueba que el racional no sea cero”? — Inverso
    multiplicativo de un número racional no nulo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de inverso multiplicativo de un
    número racional no nulo.
  - 'Omitirlo puede volver inválida la acción siguiente: Intercambia numerador y denominador
    conservando el signo global.'
  - 'La solución debe terminar de este modo: Multiplica ambos números y verifica que
    el resultado sea \(1\).'
errores_frecuentes:
- 'Empezar inverso multiplicativo de un número racional no nulo sin realizar este
  control inicial: Comprueba que el racional no sea cero.'
- Memorizar “El inverso multiplicativo de \(-\frac{7}{3}\) es \(-\frac{3}{7}\)” como
  respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Intercambia numerador y denominador conservando el
  signo global.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre inverso multiplicativo de un número racional
  no nulo que contradice el criterio “Solo el cero no tiene inverso multiplicativo”.
- 'Cerrar el ejercicio sin esta comprobación específica: Multiplica ambos números
  y verifica que el resultado sea \(1\).'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
