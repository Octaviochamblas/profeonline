semantic_id: MAT.NUM.RAICES_CONCEPTO.INDICE_IDENTIFICACION
titulo: Identificación del índice de una raíz
objetivo: Identificar e interpretar el índice de una raíz.
introduccion: El pequeño número situado en el radical decide qué operación inversa se busca. Omitirlo
  cambia una raíz cúbica, quinta o cuadrada en problemas diferentes.
resumen: El índice de un radical indica la potencia inversa que se está aplicando. Cuando no se escribe
  índice se entiende \(2\).
explicacion: 'El índice de un radical indica la potencia inversa que se está aplicando.


  La situación “en \(\sqrt[5]{32}\), el índice es \(5\)” permite comprobar, y no solo memorizar, que cuando
  no se escribe índice se entiende \(2\)'
procedimiento:
- 'Paso 1: Localiza el número pequeño escrito en la abertura del radical.'
- 'Paso 2: Si no aparece, asigna índice \(2\) por convención.'
- 'Paso 3: Relaciona el índice con la potencia que debe reproducir el radicando.'
ejemplos:
- titulo: Aplicación razonada — Identificación del índice de una raíz
  enunciado: En \(\sqrt[5]{32}\), el índice es \(5\).
  solucion_pasos:
  - Localiza el número pequeño escrito en la abertura del radical.
  - Si no aparece, asigna índice \(2\) por convención.
  - Relaciona el índice con la potencia que debe reproducir el radicando.
- titulo: Revisión de una solución — Identificación del índice de una raíz
  enunciado: Una solución aplica “Si no aparece, asigna índice \(2\) por convención.”, pero termina sin
    comprobar que cuando no se escribe índice se entiende \(2\). Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación del índice de una raíz: el índice de un radical indica
    la potencia inversa que se está aplicando.'
  - Localiza el número pequeño escrito en la abertura del radical.
  - 'Completa la revisión con este control: Relaciona el índice con la potencia que debe reproducir el
    radicando.'
- titulo: ¿Se cumple que cuando no se escribe índice se entiende \(2\)? — Identificación del índice de
    una raíz
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el índice de un radical indica la potencia inversa que
    se está aplicando.
  - El caso “en \(\sqrt[5]{32}\), el índice es \(5\)” satisface esa condición.
  - Relaciona el índice con la potencia que debe reproducir el radicando.
- titulo: ¿Es válido omitir el paso “Localiza el número pequeño escrito en la abertura del radical”? —
    Identificación del índice de una raíz
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación del índice de una raíz.
  - 'Omitirlo puede volver inválida la acción siguiente: Si no aparece, asigna índice \(2\) por convención.'
  - 'La solución debe terminar de este modo: Relaciona el índice con la potencia que debe reproducir el
    radicando.'
errores_frecuentes:
- 'Confundir identificación del índice de una raíz con otro concepto y omitir este inicio: Localiza el
  número pequeño escrito en la abertura del radical.'
- Aplicar mecánicamente “Si no aparece, asigna índice \(2\) por convención.” sin revisar las condiciones
  de la definición.
- Tomar “en \(\sqrt[5]{32}\), el índice es \(5\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “cuando no se escribe índice se entiende \(2\)”.
- 'Terminar el desarrollo sin realizar este control: Relaciona el índice con la potencia que debe reproducir
  el radicando.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
