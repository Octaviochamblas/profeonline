semantic_id: MAT.GEO.ANGULOS_RELACIONES_METRICAS.SUPLEMENTO_CALCULO
titulo: Cálculo del suplemento de un ángulo dado
objetivo: Calcular el suplemento de un ángulo dado y comprobar que el resultado debe completar una media
  vuelta exacta con el ángulo original.
introduccion: Cuando una abertura ya ocupa parte de una línea recta, el suplemento indica cuánto falta
  para completarla. Este recurso se centra en cálculo del suplemento de un ángulo dado y en cómo reconocerlo
  con un criterio geométrico claro.
resumen: El suplemento de un ángulo se obtiene restando su medida a 180°. Como idea de control, el resultado
  debe completar una media vuelta exacta con el ángulo original.
explicacion: 'El suplemento de un ángulo se obtiene restando su medida a 180°.


  Cuando se analiza “el suplemento de 124° es 56° porque \(180°-124°=56°\)” conviene evitar la memoria
  mecánica. El control decisivo es comprobar que el resultado debe completar una media vuelta exacta con
  el ángulo original.'
procedimiento:
- 'Paso 1: Comprueba que la medida dada no exceda 180° si se busca un suplemento no negativo.'
- 'Paso 2: Resta la medida del ángulo a 180°.'
- 'Paso 3: Verifica que la suma del ángulo inicial y el suplemento obtenido sea 180°.'
ejemplos:
- titulo: Aplicación directa — Cálculo del suplemento
  enunciado: El suplemento de 124° es 56° porque \(180°-124°=56°\).
  solucion_pasos:
  - Comprueba que la medida dada no exceda 180° si se busca un suplemento no negativo.
  - Resta la medida del ángulo a 180°.
  - Verifica que la suma del ángulo inicial y el suplemento obtenido sea 180°.
- titulo: Chequeo del procedimiento — Cálculo del suplemento
  enunciado: 'Revisa una solución del caso “el suplemento de 124° es 56° porque \(180°-124°=56°\)”: el
    resultado parece razonable, pero falta conectar el dibujo con la definición. Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: el suplemento de un ángulo se obtiene restando su medida a 180°.'
  - Resta la medida del ángulo a 180°.
  - Verifica que la suma del ángulo inicial y el suplemento obtenido sea 180°.
- titulo: ¿El caso confirma que el resultado debe completar una media vuelta exacta con el ángulo original?
    — Cálculo del suplemento
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: el suplemento de un ángulo se obtiene restando
    su medida a 180°.'
  - En el caso “el suplemento de 124° es 56° porque \(180°-124°=56°\)” se observa que el resultado debe
    completar una media vuelta exacta con el ángulo original.
  - Verifica que la suma del ángulo inicial y el suplemento obtenido sea 180°.
- titulo: ¿Se puede omitir el paso intermedio? — Cálculo del suplemento
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de cálculo del suplemento de un ángulo dado.
  - Después del paso “Comprueba que la medida dada no exceda 180° si se busca un suplemento no negativo.”
    todavía hace falta revisar “Resta la medida del ángulo a 180°.”.
  - El cierre correcto exige “Verifica que la suma del ángulo inicial y el suplemento obtenido sea 180°.”.
errores_frecuentes:
- Cálculo del suplemento significa restar la medida a 90° o tratar el suplemento como si fuera complemento.
- Para resolver cálculo del suplemento, basta con el paso “Comprueba que la medida dada no exceda 180°
  si se busca un suplemento no negativo.” y no hace falta revisar “Resta la medida del ángulo a 180°.”.
- Si el dibujo parece claro, se puede ignorar que el resultado debe completar una media vuelta exacta
  con el ángulo original.
- Dos configuraciones distintas representan cálculo del suplemento solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Verifica que la suma del ángulo inicial y
  el suplemento obtenido sea 180°.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
