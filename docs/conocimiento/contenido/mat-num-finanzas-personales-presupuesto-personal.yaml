semantic_id: MAT.NUM.FINANZAS_PERSONALES.PRESUPUESTO_PERSONAL
objetivo: Comprender la estructura y finalidad de un presupuesto personal mensual.
introduccion: Si no le dices a tu dinero a dónde ir, terminarás preguntándote a dónde
  se fue. El presupuesto no es para restringirte, es un plan para que el dinero alcance
  para tus metas.
resumen: Un presupuesto es una herramienta que detalla Ingresos (dinero entrante),
  Gastos (dinero saliente) y Ahorro esperado. La regla de oro es que Gastos + Ahorro
  no deben superar los Ingresos.
explicacion: 'Un **Presupuesto Personal** es un documento (o tabla Excel) donde planificas
  el mes.

  Se construye sumando todos tus **Ingresos Totales** y restando todos tus **Gastos
  (Fijos y Variables)**.


  Estructura ideal (Regla 50/30/20):

  - **50% Necesidades Básicas:** Arriendo, comida, transporte, servicios.

  - **30% Gastos Personales / Deseos:** Salidas, ropa, entretenimiento.

  - **20% Ahorro / Pago de deudas:** Dinero que se guarda para el futuro o emergencias.


  El peor error es ''ahorrar lo que sobra a fin de mes'' (porque nunca sobra). El
  ahorro debe presupuestarse como si fuera un gasto fijo al principio del mes (''Págate
  a ti mismo primero'').'
procedimiento:
- 'Paso 1: Suma tus ingresos fijos del mes.'
- 'Paso 2: Define tu meta de ahorro y sepárala de inmediato.'
- 'Paso 3: Lista tus gastos fijos obligatorios.'
- 'Paso 4: Asigna el resto del dinero a tus gastos variables hasta que la cuenta llegue
  a cero ($Ingresos - Ahorro - Gastos = 0$).'
ejemplos:
- titulo: Aplicando la regla 50/30/20
  enunciado: Si ganas $600.000 al mes, ¿cuánto deberías destinar al ahorro idealmente
    usando la regla 50/30/20?
  solucion_pasos:
  - El 20% debe ir a Ahorro.
  - 20% de 600.000 es $600.000 \cdot 0.20 = 120.000$.
  - Deberías ahorrar $120.000 mensuales.
errores_frecuentes:
- No incluir los gastos 'hormiga' (café, golosinas, Uber) en el presupuesto, los cuales
  terminan desequilibrándolo a fin de mes.
- Poner el ahorro al final de la lista de prioridades.
fuente: Currículum Nacional MINEDUC.
estado: publicado
