semantic_id: MAT.EST.MTC_PROPIEDADES.SIMETRIA_DISTRIBUCION
titulo: Analizar la relación entre media, mediana y moda en distribuciones simétricas
objetivo: Analizar cómo, en una distribución perfectamente simétrica, la media, la mediana y la moda coinciden
  en un mismo valor central.
introduccion: Este recurso cierra el bloque de Medidas de Tendencia Central conectando las tres medidas
  con la forma general de la distribución de los datos.
resumen: En una distribución simétrica, los valores se distribuyen de forma equilibrada a ambos lados
  del centro, haciendo que media, mediana y moda coincidan en un mismo valor.
explicacion: '![Relación entre medidas en distribuciones simétricas](/static/img/estadistica/mtcprop/mtcprop-simetria-distribucion.svg)


  ### Definición formal


  En una distribución simétrica, $\bar{x}=Me=Mo$; cuando existe asimetría, estas tres medidas se ordenan
  de forma distinta según la dirección de la cola de la distribución.


  ### Desarrollo didáctico


  En el conjunto {2,4,6,6,6,8,10} (simétrico alrededor de 6): media=6, mediana=6, moda=6, las tres coinciden.
  En un conjunto con asimetría positiva (cola hacia la derecha), la media suele ser mayor que la mediana,
  que a su vez suele ser mayor que la moda.'
procedimiento:
- 'Paso 1: Calcula media, mediana y moda del conjunto de datos.'
- 'Paso 2: Verifica si las tres medidas coinciden aproximadamente en un mismo valor.'
- 'Paso 3: Si coinciden, la distribución es aproximadamente simétrica; si no, analiza el orden entre ellas
  para inferir el tipo de asimetría.'
ejemplos:
- titulo: Verificar simetría en {2,4,6,6,6,8,10}
  enunciado: 'Conjunto: 2,4,6,6,6,8,10.'
  solucion_pasos:
  - 'Media=6, mediana=6, moda=6. Las tres coinciden: distribución simétrica.'
- titulo: Detectar asimetría positiva en un conjunto de ingresos
  enunciado: Media=800, mediana=650, moda=500 (miles).
  solucion_pasos:
  - 'Media>mediana>moda: es un patrón típico de asimetría positiva (cola hacia valores altos).'
- titulo: ¿En una distribución simétrica, las tres medidas coinciden en un mismo valor?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad central de una distribución simétrica.
- titulo: ¿El orden media>mediana>moda siempre indica asimetría negativa?
  respuesta: 'No'
  solucion_pasos:
  - No, ese orden (media>mediana>moda) es característico de asimetría positiva, no negativa.
errores_frecuentes:
- Confundir el orden de las tres medidas al determinar el tipo de asimetría (positiva vs. negativa).
- Asumir que un conjunto es simétrico sin verificar realmente que las tres medidas coincidan.
- No considerar que pequeñas diferencias entre las tres medidas no siempre implican una asimetría marcada.
fuente: 'Elaboración propia (referencia: Moraleja 158).'
estado: publicado
