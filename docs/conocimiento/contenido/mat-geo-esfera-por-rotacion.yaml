semantic_id: MAT.GEO.CUERPOS_REDONDOS_BASE.ESFERA_POR_ROTACION
titulo: Generación de la esfera como sólido de revolución
objetivo: Reconocer que la esfera se genera al hacer girar un semicírculo 360° alrededor de su diámetro.
introduccion: Si tomas un semicírculo (como una medialuna) y lo giras alrededor de su lado recto (el diámetro),
  el barrido que genera forma una esfera perfecta.
resumen: 'La esfera se genera al rotar un semicírculo 360° alrededor de su diámetro: el radio del semicírculo
  se convierte en el radio de la esfera resultante.'
explicacion: '![Generación de la esfera por rotación](/static/img/geometria/espacio-cuerpos/esfera-por-rotacion.svg)


  ### Definición formal


  Al rotar un semicírculo de radio $r$ 360° alrededor de su diámetro (que actúa como eje), se genera una
  esfera de radio $r$, idéntico al del semicírculo original.


  ### Desarrollo didáctico


  En la figura, el semicírculo resaltado gira alrededor del eje vertical (su diámetro), generando la esfera
  mostrada a la derecha. A diferencia del cilindro y el cono, la esfera tiene una única medida (el radio),
  que coincide exactamente con el radio del semicírculo generador.'
procedimiento:
- 'Paso 1: Identifica el semicírculo generador y su diámetro (el lado recto, que actúa como eje).'
- 'Paso 2: Reconoce que el radio del semicírculo es igual al radio de la esfera resultante.'
- 'Paso 3: Confirma que el giro completo de 360° genera la esfera cerrada en su totalidad.'
ejemplos:
- titulo: Determinar el radio de la esfera generada
  enunciado: Un semicírculo de radio 6 cm gira alrededor de su diámetro.
  solucion_pasos:
  - Se genera una esfera de radio 6 cm, idéntico al del semicírculo original.
- titulo: Reconocer el eje de rotación correcto
  enunciado: Un semicírculo tiene un lado recto (el diámetro) y un lado curvo (el arco).
  solucion_pasos:
  - El eje de rotación debe ser el diámetro (lado recto), no el arco curvo.
- titulo: ¿El radio del semicírculo es igual al radio de la esfera generada?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del cilindro y el cono, la esfera solo tiene una medida (el radio), que coincide
    exactamente con la del semicírculo.
- titulo: ¿Se puede generar una esfera rotando un círculo completo (no un semicírculo)?
  respuesta: 'No'
  solucion_pasos:
  - 'No de forma simple: rotar un círculo completo (que no está pegado al eje) generaría un toroide (forma
    de dona), no una esfera.'
errores_frecuentes:
- Confundir el eje de rotación (el diámetro) con el arco curvo del semicírculo.
- Creer que rotar un círculo completo (en vez de un semicírculo) también genera una esfera.
- Olvidar que el radio de la esfera es exactamente igual al del semicírculo generador, sin necesidad de
  cálculos adicionales.
fuente: 'Elaboración propia (referencias: Moraleja 97, Cid 182).'
estado: publicado
