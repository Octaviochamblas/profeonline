semantic_id: MAT.GEO.TEOREMA_TALES.RECIPROCO_PARALELISMO
titulo: Uso del recíproco del teorema de Tales para justificar paralelismo
objetivo: Aplicar el recíproco del teorema de Tales en problemas concretos para justificar que un segmento
  es paralelo a un lado del triángulo.
introduccion: 'Con el enunciado del recíproco ya comprendido, es momento de aplicarlo de forma práctica:
  dado un conjunto de medidas, determinar si un segmento es o no paralelo a un lado del triángulo.'
resumen: Para justificar paralelismo con el recíproco de Tales, se calculan ambas razones (AD/DB y AE/EC)
  y se verifica si son exactamente iguales.
explicacion: '![Uso del recíproco para justificar paralelismo](/static/img/geometria/congruencia-semejanza/tales-reciproco-paralelismo.svg)


  ### Definición formal


  Dado un triángulo con $D\in AB$ y $E\in AC$, se calcula $\frac{AD}{DB}$ y $\frac{AE}{EC}$ por separado;
  si ambos valores coinciden exactamente, se concluye (por el recíproco de Tales) que $DE\parallel BC$.


  ### Desarrollo didáctico


  Esta aplicación es común en problemas donde se pide "determinar si" un segmento es paralelo a un lado,
  dado un conjunto de medidas: el procedimiento es sistemático y no requiere trazar ni medir ángulos,
  solo comparar dos razones numéricas.'
procedimiento:
- 'Paso 1: Calcula la razón AD/DB con los datos dados.'
- 'Paso 2: Calcula la razón AE/EC con los datos dados.'
- 'Paso 3: Compara ambas razones: si son iguales, DE es paralela a BC; si no, no lo es.'
ejemplos:
- titulo: Justificar paralelismo con datos numéricos
  enunciado: AD=8, DB=12, AE=10, EC=15.
  solucion_pasos:
  - 8/12=2/3 y 10/15=2/3; son iguales, por lo tanto DE es paralela a BC.
- titulo: Descartar paralelismo con datos numéricos
  enunciado: AD=5, DB=10, AE=4, EC=9.
  solucion_pasos:
  - 5/10=0,5 y 4/9≈0,44; no son iguales, por lo tanto DE no es paralela a BC.
- titulo: ¿Se requiere medir algún ángulo en este procedimiento?
  respuesta: 'No'
  solucion_pasos:
  - No, el procedimiento se basa exclusivamente en comparar razones de longitudes.
- titulo: ¿Una pequeña diferencia entre las razones permite concluir paralelismo?
  respuesta: 'No'
  solucion_pasos:
  - No, las razones deben ser exactamente iguales, no solo aproximadamente cercanas.
errores_frecuentes:
- Concluir paralelismo con razones que son solo aproximadamente iguales, no exactamente.
- Calcular mal una de las dos razones antes de compararlas.
- Invertir una de las razones (por ejemplo, usar DB/AD en vez de AD/DB) antes de comparar.
fuente: 'Fuente: Cid 106.'
estado: publicado
