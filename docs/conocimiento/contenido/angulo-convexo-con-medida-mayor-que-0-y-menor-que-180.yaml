semantic_id: MAT.GEO.ANGULOS_CLASIFICACION.CONVEXO
titulo: Ángulo convexo con medida mayor que 0° y menor que 180°
objetivo: Clasificar un ángulo a partir de su medida y comprobar que todo agudo, recto u obtuso es convexo
  porque queda antes de 180°.
introduccion: A veces conviene clasificar no por una sola medida puntual, sino por una familia entera
  de ángulos que comparten un mismo rango. Aquí lo trabajaremos con ejemplos concretos y verificaciones
  cortas.
resumen: Un ángulo convexo mide más de 0° y menos de 180°. Como idea de control, todo agudo, recto u obtuso
  es convexo porque queda antes de 180°.
explicacion: 'Un ángulo convexo mide más de 0° y menos de 180°.


  Cuando se analiza “una abertura de 150° sigue siendo convexa porque no sobrepasa la media vuelta” conviene
  evitar la memoria mecánica. El control decisivo es comprobar que todo agudo, recto u obtuso es convexo
  porque queda antes de 180°.'
procedimiento:
- 'Paso 1: Lee o estima la abertura del ángulo en grados.'
- 'Paso 2: Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.'
- 'Paso 3: Asigna el nombre correcto y revisa que no contradiga el dibujo.'
ejemplos:
- titulo: Aplicación directa — Ángulo convexo
  enunciado: Una abertura de 150° sigue siendo convexa porque no sobrepasa la media vuelta.
  solucion_pasos:
  - Lee o estima la abertura del ángulo en grados.
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: Corrección de una respuesta — Ángulo convexo
  enunciado: 'Revisa una solución del caso “una abertura de 150° sigue siendo convexa porque no sobrepasa
    la media vuelta”: el resultado parece razonable, pero falta conectar el dibujo con la definición.
    Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: un ángulo convexo mide más de 0° y menos de 180°.'
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿La interpretación del dibujo es válida? — Ángulo convexo
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo convexo mide más de 0° y menos de
    180°.'
  - En el caso “una abertura de 150° sigue siendo convexa porque no sobrepasa la media vuelta” se observa
    que todo agudo, recto u obtuso es convexo porque queda antes de 180°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Se puede omitir el paso intermedio? — Ángulo convexo
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulo convexo con medida mayor que 0°
    y menor que 180°.
  - Después del paso “Lee o estima la abertura del ángulo en grados.” todavía hace falta revisar “Compara
    la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
  - El cierre correcto exige “Asigna el nombre correcto y revisa que no contradiga el dibujo.”.
errores_frecuentes:
- Ángulo convexo significa ser cualquier ángulo menor que 360°.
- Para resolver ángulo convexo, basta con el paso “Lee o estima la abertura del ángulo en grados.” y no
  hace falta revisar “Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
- Si el dibujo parece claro, se puede ignorar que todo agudo, recto u obtuso es convexo porque queda antes
  de 180°.
- Dos configuraciones distintas representan ángulo convexo solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Asigna el nombre correcto y revisa que no
  contradiga el dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
