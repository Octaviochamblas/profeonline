semantic_id: MAT.NUM.POTENCIAS_PROPIEDADES.MULTIPLICACION_IGUAL_EXPONENTE
objetivo: Combinar productos de potencias con exponente común.
introduccion: A veces conviene mirar los exponentes en lugar de las bases. Si coinciden,
  cada posición del producto repetido puede agrupar una base de cada potencia.
resumen: 'Potencias con igual exponente pueden reunirse multiplicando sus bases: \(a^n
  b^n=(ab)^n\). La propiedad funciona por igualdad de exponentes, aunque las bases
  sean distintas.'
explicacion: |-
  Potencias con igual exponente pueden reunirse multiplicando sus bases: \(a^n b^n=(ab)^n\).

  El cálculo “\(2^3\cdot5^3=(2\cdot5)^3=10^3\)” muestra por qué la propiedad funciona por igualdad de exponentes, aunque las bases sean distintas
procedimiento:
- 'Paso 1: Comprueba que los exponentes sean iguales.'
- 'Paso 2: Multiplica las bases y conserva el exponente común.'
- 'Paso 3: Elige la forma que simplifique el cálculo y verifica evaluando ambos lados.'
ejemplos:
- titulo: Aplicación razonada — Multiplicación de potencias de igual exponente
  enunciado: \(2^3\cdot5^3=(2\cdot5)^3=10^3\).
  solucion_pasos:
  - Comprueba que los exponentes sean iguales.
  - Multiplica las bases y conserva el exponente común.
  - Elige la forma que simplifique el cálculo y verifica evaluando ambos lados.
- titulo: Revisión de una solución — Multiplicación de potencias de igual exponente
  enunciado: Una solución aplica “Multiplica las bases y conserva el exponente común.”,
    pero termina sin comprobar que la propiedad funciona por igualdad de exponentes,
    aunque las bases sean distintas. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define multiplicación de potencias de igual exponente:
    potencias con igual exponente pueden reunirse multiplicando sus bases: \(a^n b^n=(ab)^n\).'
  - Comprueba que los exponentes sean iguales.
  - 'Completa la revisión con este control: Elige la forma que simplifique el cálculo
    y verifica evaluando ambos lados.'
- titulo: ¿Se cumple que la propiedad funciona por igualdad de exponentes, aunque
    las bases sean distintas? — Multiplicación de potencias de igual exponente
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que potencias con igual exponente pueden
    reunirse multiplicando sus bases: \(a^n b^n=(ab)^n\).'
  - El caso “\(2^3\cdot5^3=(2\cdot5)^3=10^3\)” satisface esa condición.
  - Elige la forma que simplifique el cálculo y verifica evaluando ambos lados.
- titulo: ¿Es válido omitir el paso “Comprueba que los exponentes sean iguales”? —
    Multiplicación de potencias de igual exponente
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de multiplicación de potencias
    de igual exponente.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica las bases y conserva
    el exponente común.'
  - 'La solución debe terminar de este modo: Elige la forma que simplifique el cálculo
    y verifica evaluando ambos lados.'
errores_frecuentes:
- 'Confundir multiplicación de potencias de igual exponente con otro concepto y omitir
  este inicio: Comprueba que los exponentes sean iguales.'
- Aplicar mecánicamente “Multiplica las bases y conserva el exponente común.” sin
  revisar las condiciones de la definición.
- Tomar “\(2^3\cdot5^3=(2\cdot5)^3=10^3\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la propiedad funciona por igualdad
  de exponentes, aunque las bases sean distintas”.
- 'Terminar el desarrollo sin realizar este control: Elige la forma que simplifique
  el cálculo y verifica evaluando ambos lados.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
