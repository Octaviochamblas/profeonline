semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.COLATERALES_INTERNOS_IDENTIFICACION
titulo: Identificación de ángulos colaterales internos entre paralelas
objetivo: Identificar un par de ángulos colaterales internos en un esquema con paralelas y comprobar que
  compartir lado respecto de la transversal y estar dentro de las paralelas define este par.
introduccion: Cuando una calle cruza dos avenidas paralelas aparecen muchos ángulos con nombres distintos.
  El truco no es memorizar números, sino mirar dónde queda cada uno respecto de la transversal y de las
  paralelas. Para resolver situaciones de identificación de ángulos colaterales internos entre paralelas
  conviene mirar el dibujo con método, no solo por intuición.
resumen: Los ángulos colaterales internos se reconocen por su posición relativa respecto de dos paralelas
  y una transversal. Como idea de control, compartir lado respecto de la transversal y estar dentro de
  las paralelas define este par.
explicacion: 'Los ángulos colaterales internos se reconocen por su posición relativa respecto de dos paralelas
  y una transversal.


  En el caso “entre las paralelas, dos ángulos quedan del mismo lado de la transversal” esta idea se vuelve
  visible y permite comprobar que compartir lado respecto de la transversal y estar dentro de las paralelas
  define este par.'
procedimiento:
- 'Paso 1: Ubica primero cuáles son las rectas paralelas y cuál es la transversal.'
- 'Paso 2: Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.'
- 'Paso 3: Concluye si el par corresponde a ángulos colaterales internos y descarta relaciones vecinas.'
ejemplos:
- titulo: Situación geométrica — Colaterales internos
  enunciado: Entre las paralelas, dos ángulos quedan del mismo lado de la transversal.
  solucion_pasos:
  - Ubica primero cuáles son las rectas paralelas y cuál es la transversal.
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos colaterales internos y descarta relaciones vecinas.
- titulo: Corrección de una respuesta — Colaterales internos
  enunciado: En la situación “entre las paralelas, dos ángulos quedan del mismo lado de la transversal”,
    un compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye la justificación
    completa.
  solucion_pasos:
  - 'Parte de la definición: los ángulos colaterales internos se reconocen por su posición relativa respecto
    de dos paralelas y una transversal.'
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos colaterales internos y descarta relaciones vecinas.
- titulo: ¿La interpretación del dibujo es válida? — Colaterales internos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: los ángulos colaterales internos se reconocen
    por su posición relativa respecto de dos paralelas y una transversal.'
  - En el caso “entre las paralelas, dos ángulos quedan del mismo lado de la transversal” se observa que
    compartir lado respecto de la transversal y estar dentro de las paralelas define este par.
  - Concluye si el par corresponde a ángulos colaterales internos y descarta relaciones vecinas.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Colaterales internos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de identificación de ángulos colaterales
    internos entre paralelas.
  - Después del paso “Ubica primero cuáles son las rectas paralelas y cuál es la transversal.” todavía
    hace falta revisar “Decide si cada ángulo está en la zona interior o exterior y en qué lado de la
    transversal queda.”.
  - El cierre correcto exige “Concluye si el par corresponde a ángulos colaterales internos y descarta
    relaciones vecinas.”.
errores_frecuentes:
- Colaterales internos significa estar en lados opuestos de la transversal aunque sigan siendo interiores.
- Para resolver colaterales internos, basta con el paso “Ubica primero cuáles son las rectas paralelas
  y cuál es la transversal.” y no hace falta revisar “Decide si cada ángulo está en la zona interior o
  exterior y en qué lado de la transversal queda.”.
- Si el dibujo parece claro, se puede ignorar que compartir lado respecto de la transversal y estar dentro
  de las paralelas define este par.
- Dos configuraciones distintas representan colaterales internos solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si el par corresponde a ángulos
  colaterales internos y descarta relaciones vecinas.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
