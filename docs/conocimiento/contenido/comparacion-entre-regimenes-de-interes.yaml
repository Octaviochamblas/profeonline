semantic_id: MAT.NUM.INTERES_COMPUESTO.COMPARACION_REGIMENES
titulo: Comparación entre regímenes de interés
objetivo: Comparar matemáticamente el rendimiento y los costos entre interés simple y compuesto.
introduccion: Imagina que el simple es una bicicleta y el compuesto es un auto. En la primera cuadra ambos
  van iguales, pero si la carrera es larga, el auto te pasará por encima.
resumen: A igual tasa y plazo, durante el primer período ($t=1$), ambos regímenes generan exactamente
  el mismo interés. A partir del segundo período ($t>1$), el interés compuesto SIEMPRE supera al interés
  simple.
explicacion: "Comparar el interés simple con el compuesto es un clásico problema de la prueba:\n\n- **Si\
  \ $t=1$ (Ej. el primer mes de una inversión a tasa mensual):**\n  - Interés Simple: Ganas el $10\\%$\
  \ sobre tu capital.\n  - Interés Compuesto: Ganas el $10\\%$ sobre tu capital.\n  - **Conclusión:**\
  \ En $t=1$, ambos regímenes son **IGUALES**.\n\n- **Si $t>1$ (A partir del segundo mes/año):**\n  -\
  \ Interés Simple: Sigues ganando el mismo $10\\%$ sobre el capital inicial (crecimiento lineal).\n \
  \ - Interés Compuesto: Ganas el $10\\%$ sobre el capital inicial MÁS los intereses del mes anterior\
  \ (crecimiento exponencial).\n  - **Conclusión:** El Interés Compuesto siempre generará **MÁS DINERO**\
  \ (mayor ganancia si es inversión, mayor deuda si es préstamo)."
procedimiento:
- 'Paso 1: Lee si el problema te pide comparar resultados en el primer periodo ($t=1$) o a largo plazo
  ($t>1$).'
- 'Paso 2: Si $t=1$, asume que los montos son idénticos.'
- 'Paso 3: Si $t>1$, asume que el Compuesto es matemáticamente mayor que el Simple.'
ejemplos:
- titulo: La carrera de los intereses
  enunciado: Sofía invierte $100.000 al 5% simple anual. Tomás invierte $100.000 al 5% compuesto anual.
    ¿Quién tendrá más dinero al final del primer año y quién al final del segundo año?
  solucion_pasos:
  - 'Año 1: Ambos tendrán $100.000 + 5.000 = 105.000. Tienen lo MISMO.'
  - 'Año 2 (Sofía): $105.000 + 5.000 = 110.000. (Creció lineal).'
  - 'Año 2 (Tomás): El 5% de $105.000 es 5.250. Él tendrá $105.000 + 5.250 = 110.250.'
  - Tomás gana en el año 2 debido a la capitalización.
errores_frecuentes:
- Creer que el interés compuesto siempre es mayor desde el día 1 (en el periodo 1 son exactamente iguales).
- Tratar de calcular las cifras exactas en preguntas teóricas de la PAES que solo buscan que reconozcas
  cuál es mayor.
fuente: Currículum Nacional MINEDUC.
estado: publicado
