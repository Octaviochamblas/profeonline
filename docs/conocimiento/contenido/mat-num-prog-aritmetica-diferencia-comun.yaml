semantic_id: MAT.NUM.PROG_ARITMETICA.DIFERENCIA_COMUN
objetivo: Calcular correctamente la diferencia común (d) de una progresión aritmética
  a partir de términos consecutivos.
introduccion: Si la Progresión Aritmética es un vehículo, la Diferencia Común 'd'
  es su motor. Nos dice a qué velocidad avanza la fila de números y, lo más importante,
  si va hacia adelante o en reversa.
resumen: 'La diferencia común se calcula siempre restando a un término cualquiera
  su término inmediatamente anterior: $d = a_n - a_{n-1}$. Un error en el signo de
  ''d'' arruinará todos los cálculos posteriores.'
explicacion: 'El cálculo de la diferencia **$d$** es matemáticamente muy sencillo,
  pero es la principal causa de error en las pruebas por descuidos con los signos.


  **Regla de Oro:** Siempre toma el término de la DERECHA y réstale el de la IZQUIERDA.
  NUNCA al revés.

  - P.A: $12, 17, 22\dots$ $\rightarrow$ $d = 17 - 12 = 5$.

  - P.A: $8, 5, 2\dots$ $\rightarrow$ $d = 5 - 8 = -3$. (¡Es negativo!)

  - P.A con negativos: $-10, -6, -2\dots$ $\rightarrow$ $d = -6 - (-10) = -6 + 10
  = 4$.


  Es recomendable hacer la resta con dos pares de números distintos (ej. $a_2 - a_1$
  y luego $a_3 - a_2$) para comprobar que no te hayas equivocado en una resta básica.'
procedimiento:
- 'Paso 1: Identifica dos números consecutivos en la progresión (ojalá los más fáciles,
  sin fracciones o números grandes si es posible).'
- 'Paso 2: Al número que está más a la derecha, réstale el número que está a su izquierda.'
- 'Paso 3: Respeta la ley de los signos si el número de la izquierda es negativo (terminarás
  sumando).'
- 'Paso 4: El resultado de esa resta es ''d''.'
ejemplos:
- titulo: Cuidado con los negativos
  enunciado: 'Calcula la diferencia de la P.A: 5, 1, -3, -7...'
  solucion_pasos:
  - 'Tomamos a2=1 y a1=5. Restamos: 1 - 5 = -4.'
  - 'Comprobamos con a3=-3 y a2=1. Restamos: -3 - 1 = -4.'
  - 'Comprobamos con a4=-7 y a3=-3. Restamos: -7 - (-3) = -7 + 3 = -4.'
  - La diferencia d es -4.
errores_frecuentes:
- Restar el número mayor menos el menor, sin importar su orden (ej. en 10, 8, 6, restar
  10-8=2 en lugar de 8-10=-2).
- Olvidar los paréntesis al restar un número negativo, transformando $5 - (-2)$ en
  $5 - 2$.
fuente: Currículum Nacional MINEDUC.
estado: publicado
