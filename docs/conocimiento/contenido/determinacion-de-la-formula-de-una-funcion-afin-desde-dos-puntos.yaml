semantic_id: MAT.ALG.FUNCION_AFIN.FORMULA_DESDE_DOS_PUNTOS
titulo: Determinación de la fórmula de una función afín desde dos puntos
objetivo: Obtener la fórmula de una función afín a partir de dos puntos conocidos, sin necesidad de un
  gráfico.
introduccion: Aunque no veas el dibujo de la recta, dos puntos cualesquiera bastan para reconstruir exactamente
  su fórmula completa.
resumen: Dados dos puntos $(x_1,y_1)$ y $(x_2,y_2)$ de una función afín, su fórmula se determina calculando
  primero la pendiente $m$, y luego despejando $n$ sustituyendo uno de los puntos en $f(x)=mx+n$.
explicacion: '### Definición formal


  Dados dos puntos $(x_1,y_1)$ y $(x_2,y_2)$ con $x_1 \neq x_2$, la pendiente es $m = \dfrac{y_2-y_1}{x_2-x_1}$.
  Sustituyendo $m$ y uno de los puntos, por ejemplo $(x_1,y_1)$, en $y_1 = mx_1+n$, se despeja $n = y_1
  - mx_1$, completando la fórmula $f(x)=mx+n$.


  ### Desarrollo didáctico


  El proceso tiene dos etapas: primero calcular la pendiente con la fórmula de dos puntos, y luego usar
  cualquiera de los dos puntos originales para despejar el coeficiente de posición.


  Con $(1,5)$ y $(3,13)$: $m = \frac{13-5}{3-1} = 4$. Sustituyendo en $(1,5)$: $5 = 4(1)+n \Rightarrow
  n=1$. La fórmula es $f(x)=4x+1$.'
procedimiento:
- 'Paso 1: Calcula la pendiente $m$ usando la fórmula de dos puntos.'
- 'Paso 2: Sustituye $m$ y uno de los puntos conocidos en $y=mx+n$.'
- 'Paso 3: Despeja $n$ de esa ecuación.'
- 'Paso 4: Escribe la fórmula final $f(x)=mx+n$.'
ejemplos:
- titulo: Cálculo completo con dos puntos
  enunciado: Determina la fórmula de la función afín que pasa por $(0,4)$ y $(2,12)$.
  solucion_pasos:
  - $m = \frac{12-4}{2-0} = 4$.
  - 'Como uno de los puntos ya tiene $x=0$: $n=4$ directamente.'
  - $f(x) = 4x + 4$.
- titulo: Cálculo sin punto en el eje $y$
  enunciado: Determina la fórmula de la función afín que pasa por $(2,7)$ y $(5,16)$.
  solucion_pasos:
  - $m = \frac{16-7}{5-2} = 3$.
  - 'Sustituyendo en $(2,7)$: $7=3(2)+n \Rightarrow n=1$.'
  - $f(x) = 3x + 1$.
- titulo: ¿Se puede usar cualquiera de los dos puntos para despejar $n$?
  enunciado: ¿Se puede usar cualquiera de los dos puntos para despejar $n$?
  respuesta: Sí
  solucion_pasos:
  - Ambos puntos pertenecen a la misma recta, así que cualquiera de los dos entrega el mismo valor de
    $n$.
- titulo: ¿Es posible determinar la fórmula con solo un punto conocido?
  enunciado: ¿Es posible determinar la fórmula con solo un punto conocido?
  respuesta: 'No'
  solucion_pasos:
  - Se necesitan dos condiciones independientes para determinar ambos parámetros $m$ y $n$.
errores_frecuentes:
- Calcular mal la pendiente por errores en el orden de resta de coordenadas.
- Sustituir incorrectamente el punto al despejar $n$, mezclando coordenadas de ambos puntos.
- Olvidar verificar el resultado sustituyendo el segundo punto en la fórmula final.
- Confundir el orden de $m$ y $n$ al escribir la fórmula final.
