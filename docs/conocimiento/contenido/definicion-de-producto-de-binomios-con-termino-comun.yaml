semantic_id: MAT.ALG.TERMINO_COMUN.DEFINICION
titulo: Definición de producto de binomios con término común
objetivo: Comprender la estructura base de multiplicar dos binomios que comparten exactamente un término
  común.
introduccion: 'Ya vimos qué pasa si multiplicamos dos binomios iguales (cuadrado) y dos conjugados. ¿Qué
  pasa si comparten solo la mitad de la estructura? Por ejemplo: $(x+5)(x+3)$.'
resumen: 'Un par de binomios con un ''término común'' tienen la forma $(x+a)(x+b)$.

  Aquí, la $x$ representa el término común (idéntico en ambos binomios), mientras que $a$ y $b$ son los
  términos no comunes (distintos).'
explicacion: "### Definición formal\n\nComo su nombre indica, comparten solo un término (ej: la variable)\
  \ mientras que los números libres varían.\n\n### Desarrollo didáctico\n\nEl producto de dos binomios\
  \ con un término en común ocurre cuando multiplicamos dos expresiones que comparten exactamente un sumando\
  \ idéntico, pero el otro sumando es diferente. \n\nSu estructura general se representa como: **$(x+a)(x+b)$**\n\
  Aquí, ''$x$'' representa el término que se repite en ambos paréntesis (el término común), mientras que\
  \ ''$a$'' y ''$b$'' son términos distintos (los términos no comunes).\n\n**¿De dónde sale la regla?**\n\
  Si multiplicamos $(x+a)(x+b)$ usando distributividad completa, tenemos:\n$x(x) + x(b) + a(x) + a(b)$\n\
  $= x^2 + bx + ax + ab$\n\nSi agrupamos los dos términos centrales (que contienen la variable $x$) factorizando\
  \ esa $x$, obtenemos:\n$= x^2 + (a+b)x + ab$\n\nEsta estructura es el origen del **Trinomio de la forma\
  \ $x^2 + px + q$**, que es fundamental para factorizar más adelante."
procedimiento:
- 'Paso 1: Para reconocer este producto notable:'
- 'Paso 2: Revisa el primer término de ambos binomios. ¿Son idénticos? Ese es el término común.'
- 'Paso 3: Revisa los segundos términos. ¿Son diferentes numéricamente? Esos son los no comunes.'
- 'Paso 4: Entiende que el desarrollo ordenará los términos según las potencias del término común.'
ejemplos:
- titulo: Identificando las partes
  enunciado: En el producto $(y - 4)(y + 7)$, identifica el término común y los no comunes.
  solucion_pasos:
  - El término común es $y$.
  - Los términos no comunes son $-4$ y $+7$.
- titulo: Si el término libre (independiente) de $(x+k)(x-5)$ es $-40$, ¿cuál es el coeficiente de $x$
  enunciado: 'Si el término libre (independiente) de $(x+k)(x-5)$ es $-40$, ¿cuál es el coeficiente de
    $x$ en el resultado?


    Opciones: A) $3$ · B) $8$ · C) $-13$ · D) $13$'
  solucion_pasos:
  - 'Producto libres: $k(-5) = -40 \Rightarrow k=8$. Suma de libres (coef. lineal): $8 + (-5) = 3$.'
  - 'Respuesta: $3$'
- titulo: 'Respecto de «Definición de producto de binomios con término común»: ¿Se ajusta a la definici'
  enunciado: 'Respecto de «Definición de producto de binomios con término común»: ¿Se ajusta a la definición
    esta afirmación? «Un par de binomios con un ''término común'' tienen la forma $(x+a)(x+b)$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un par de binomios con un ''término común'' tienen
    la forma $(x+a)(x+b)$.'
- titulo: 'Respecto de «Definición de producto de binomios con término común»: ¿Es compatible con el pr'
  enunciado: 'Respecto de «Definición de producto de binomios con término común»: ¿Es compatible con el
    procedimiento esta afirmación? «Creer que $(x+a)(x+b) = x^2 + ab$, ignorando por completo la suma
    cruzada $(a+b)x$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un par de binomios con un ''término común'' tienen
    la forma $(x+a)(x+b)$.'
errores_frecuentes:
- Creer que $(x+a)(x+b) = x^2 + ab$, ignorando por completo la suma cruzada $(a+b)x$.
- Para «¿Qué caracteriza a un producto de binomios con un término común», la respuesta correcta es Ambos
  binomios son iguales.
- Tienen los mismos términos con signo distinto.
- Tienen una variable en común pero coeficientes diferentes.
- De multiplicar los términos no comunes.
