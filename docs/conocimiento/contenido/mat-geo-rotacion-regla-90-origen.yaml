semantic_id: MAT.GEO.ROTACION_PLANO.REGLA_90_ORIGEN
titulo: Regla de rotación de 90° en torno al origen
objetivo: Aplicar la regla específica para rotar un punto 90° en sentido antihorario alrededor del origen
  del sistema cartesiano.
introduccion: 'Rotar un punto 90° alrededor del origen sigue una regla simple: la nueva ordenada es la
  antigua abscisa, y la nueva abscisa es el opuesto de la antigua ordenada.'
resumen: La rotación de 90° en sentido antihorario en torno al origen transforma cada punto $P(x,y)$ en
  $P'(-y,\,x)$.
explicacion: '![Regla de rotación de 90° en torno al origen](/static/img/geometria/isometrias/rotacion-regla-90-origen.svg)


  ### Definición formal


  La rotación de $90°$ (antihoraria) en torno al origen transforma $P(x,y)$ en $P''(-y,x)$: la abscisa
  de la imagen es el opuesto de la ordenada original, y la ordenada de la imagen es la abscisa original.


  ### Desarrollo didáctico


  En la figura, el punto $P(3,2)$ rotado 90° alrededor del origen se transforma en $P''(-2,3)$: se aplica
  directamente la regla $(x,y)\to(-y,x)$.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del punto P(x,y) que se desea rotar 90° alrededor del origen.'
- 'Paso 2: Calcula la nueva abscisa como el opuesto de la ordenada original: -y.'
- 'Paso 3: Calcula la nueva ordenada como la abscisa original: x, obteniendo P''(-y,x).'
ejemplos:
- titulo: Aplicar la regla de rotación de 90° a un punto
  enunciado: El punto P(3,2) rota 90° antihorario alrededor del origen.
  solucion_pasos:
  - P'=(-2,3), aplicando la regla (x,y)→(-y,x).
- titulo: Aplicar la regla a un punto con coordenadas negativas
  enunciado: El punto P(-4,5) rota 90° antihorario alrededor del origen.
  solucion_pasos:
  - P'=(-5,-4).
- titulo: ¿Esta regla conserva la distancia al origen?
  respuesta: Sí
  solucion_pasos:
  - Sí, la rotación es una isometría, por lo que la distancia al centro (origen) se conserva.
- titulo: ¿Esta regla aplica también a rotaciones horarias de 90°?
  respuesta: 'No'
  solucion_pasos:
  - 'No, esta regla específica es para rotación antihoraria de 90°; la rotación horaria de 90° usa una
    regla distinta: (x,y)→(y,-x).'
errores_frecuentes:
- Confundir esta regla con la de rotación horaria de 90° (que usa (y,-x) en vez de (-y,x)).
- 'Invertir el orden al aplicar la regla: usar (y,-x) por error.'
- Aplicar esta regla a un centro de rotación distinto del origen sin ajustarla.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 128, Cid 77).'
estado: publicado
