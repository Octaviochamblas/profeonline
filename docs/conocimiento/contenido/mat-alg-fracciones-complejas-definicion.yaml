semantic_id: MAT.ALG.FRACCIONES_COMPLEJAS.DEFINICION
titulo: 'Fracciones Complejas: Definición'
objetivo: Identificar y comprender la estructura de una fracción que contiene fracciones en su numerador y/o denominador.
introduccion: A veces, las fracciones se vuelven locas y empiezan a tener fracciones dentro de fracciones. Como
  las muñecas rusas (Matrioskas), una fracción compleja es simplemente una división gigante con pequeñas fracciones
  adentro.
resumen: Una fracción compleja es una expresión fraccionaria donde el numerador, el denominador, o ambos, contienen
  a su vez otras fracciones algebraicas.
explicacion: '### Definición formal


  Una operación de división ($\div$) entre el bloque superior y el inferior.


  ### Desarrollo didáctico


  Una fracción compleja (o compuesta) parece una pesadilla arquitectónica: es una fracción principal enorme que
  tiene otras fracciones más pequeñas anidadas adentro de su numerador, de su denominador, o en ambos.


  Tiene la estructura:

  $\frac{\frac{A}{B}}{\frac{C}{D}}$


  No debes entrar en pánico. Una fracción es fundamentalmente un símbolo de división gigante.

  Esa pesadilla visual se puede leer en español simple como: ''(Numerador Grande) dividido entre (Denominador Grande)''.


  El método general más seguro para resolverlas se llama ''Aplanar los pisos''. Consiste en trabajar solo el piso
  de arriba hasta convertirlo en UNA sola fracción normal, luego trabajar solo el piso de abajo hasta que sea UNA
  sola fracción normal, y finalmente usar la regla de la taza de café (multiplicar extremos con extremos, medios
  con medios) para colapsarlas en una sola.'
procedimiento:
- 'Paso 1: Identifica la línea fraccionaria principal (suele ser más larga o estar alineada con el signo =).'
- 'Paso 2: Escribe la fracción de arriba (numerador global).'
- 'Paso 3: Coloca el signo $\div$ en lugar de la gran línea divisoria.'
- 'Paso 4: Escribe la fracción de abajo (denominador global).'
- La línea divisoria siempre indica división.
ejemplos:
- titulo: 'Convierte a división horizontal: $\frac{\frac{2a}{b}}{\frac{c}{d}}$'
  enunciado: 'Convierte a división horizontal: $\frac{\frac{2a}{b}}{\frac{c}{d}}$.'
  solucion_pasos:
  - 'Numerador global: $\frac{2a}{b}$.'
  - 'Denominador global: $\frac{c}{d}$.'
  - 'Forma horizontal: $\frac{2a}{b} \div \frac{c}{d}$.'
- titulo: Si tienes $\frac{5}{\frac{x}{2}}$, ¿cómo se escribe con el signo $\div$?
  solucion_pasos:
  - El 5 es el numerador global, x/2 el denominador global.
- titulo: 'Respecto de «Reconocimiento de fracción algebraica compleja»: ¿La siguiente formulación es c'
  enunciado: 'Respecto de «Reconocimiento de fracción algebraica compleja»: ¿La siguiente formulación es correcta?
    «Una fracción compleja es una expresión fraccionaria donde el numerador, el denominador, o ambos, contienen
    a su vez otras fracciones algebraicas»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una fracción compleja es una expresión fraccionaria donde
    el numerador, el denominador, o ambos, contienen a su vez otras fracciones algebraicas.'
- titulo: 'Respecto de «Reconocimiento de fracción algebraica compleja»: ¿La siguiente conclusión es co'
  enunciado: 'Respecto de «Reconocimiento de fracción algebraica compleja»: ¿La siguiente conclusión es correcta?
    «Confundir cuál es la línea divisoria principal (por ejemplo confundir $\frac{\frac{a}{b}}{c}$ con $\frac{a}{\frac{b}{c}}$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una fracción compleja es una expresión fraccionaria donde
    el numerador, el denominador, o ambos, contienen a su vez otras fracciones algebraicas.'
errores_frecuentes:
- Confundir cuál es la línea divisoria principal (por ejemplo confundir $\frac{\frac{a}{b}}{c}$ con $\frac{a}{\frac{b}{c}}$).
- Para «¿Qué representa la línea horizontal principal (la más larga) en una fracción compleja», la respuesta correcta
  es Una resta.
- Para «¿Qué representa la línea horizontal principal (la más larga) en una fracción compleja», la respuesta correcta
  es El signo de igualdad.
- Una multiplicación cruzada.
- $\frac{x-1}{2} \cdot \frac{x+1}{3}$.
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
