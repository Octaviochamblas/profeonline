semantic_id: MAT.GEO.ANGULOS_RELACIONES_POSICION.OPUESTOS_VERTICE_IGUALDAD
titulo: Propiedad de igualdad de medida en ángulos opuestos por el vértice
objetivo: Usar la igualdad de los ángulos opuestos por el vértice y comprobar que antes de copiar la medida
  hay que comprobar que el par sea realmente opuesto por el vértice.
introduccion: 'En un cruce de rectas, algunas medidas se repiten. Esa repetición no es casual: depende
  de identificar bien qué regiones se enfrentan. Aquí lo trabajaremos con ejemplos concretos y verificaciones
  cortas.'
resumen: Cuando dos rectas se cruzan, los ángulos opuestos por el vértice tienen igual medida. Como idea
  de control, antes de copiar la medida hay que comprobar que el par sea realmente opuesto por el vértice.
explicacion: 'Cuando dos rectas se cruzan, los ángulos opuestos por el vértice tienen igual medida.


  El ejemplo “si un ángulo del cruce mide 47°, el opuesto por el vértice también mide 47°” no se resuelve
  por apariencia: se justifica usando la definición y revisando finalmente que antes de copiar la medida
  hay que comprobar que el par sea realmente opuesto por el vértice.'
procedimiento:
- 'Paso 1: Identifica un par de ángulos opuestos por el vértice en el cruce.'
- 'Paso 2: Transfiere la medida conocida al ángulo enfrentado.'
- 'Paso 3: Comprueba que el par elegido no comparte lado y que la igualdad aplicada corresponde al dibujo.'
ejemplos:
- titulo: Caso guiado — Igualdad de opuestos por el vértice
  enunciado: Si un ángulo del cruce mide 47°, el opuesto por el vértice también mide 47°.
  solucion_pasos:
  - Identifica un par de ángulos opuestos por el vértice en el cruce.
  - Transfiere la medida conocida al ángulo enfrentado.
  - Comprueba que el par elegido no comparte lado y que la igualdad aplicada corresponde al dibujo.
- titulo: Corrección de una respuesta — Igualdad de opuestos por el vértice
  enunciado: Al resolver “si un ángulo del cruce mide 47°, el opuesto por el vértice también mide 47°”,
    una alumna salta desde el dibujo a la conclusión. Indica qué control geométrico faltó y cómo cerrar
    la solución.
  solucion_pasos:
  - 'Parte de la definición: cuando dos rectas se cruzan, los ángulos opuestos por el vértice tienen igual
    medida.'
  - Transfiere la medida conocida al ángulo enfrentado.
  - Comprueba que el par elegido no comparte lado y que la igualdad aplicada corresponde al dibujo.
- titulo: ¿El caso confirma que antes de copiar la medida hay que comprobar que el par sea realmente opuesto
    por el vértice? — Igualdad de opuestos por el vértice
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: cuando dos rectas se cruzan, los ángulos opuestos
    por el vértice tienen igual medida.'
  - En el caso “si un ángulo del cruce mide 47°, el opuesto por el vértice también mide 47°” se observa
    que antes de copiar la medida hay que comprobar que el par sea realmente opuesto por el vértice.
  - Comprueba que el par elegido no comparte lado y que la igualdad aplicada corresponde al dibujo.
- titulo: ¿Se puede omitir el paso intermedio? — Igualdad de opuestos por el vértice
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de propiedad de igualdad de medida en ángulos
    opuestos por el vértice.
  - Después del paso “Identifica un par de ángulos opuestos por el vértice en el cruce.” todavía hace
    falta revisar “Transfiere la medida conocida al ángulo enfrentado.”.
  - El cierre correcto exige “Comprueba que el par elegido no comparte lado y que la igualdad aplicada
    corresponde al dibujo.”.
errores_frecuentes:
- Igualdad de opuestos por el vértice significa sumar 180° para cualquier par enfrentado, aunque se trate
  de ángulos opuestos por el vértice.
- Para resolver igualdad de opuestos por el vértice, basta con el paso “Identifica un par de ángulos opuestos
  por el vértice en el cruce.” y no hace falta revisar “Transfiere la medida conocida al ángulo enfrentado.”.
- Si el dibujo parece claro, se puede ignorar que antes de copiar la medida hay que comprobar que el par
  sea realmente opuesto por el vértice.
- Dos configuraciones distintas representan igualdad de opuestos por el vértice solo porque contienen
  la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que el par elegido no comparte
  lado y que la igualdad aplicada corresponde al dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
estado: publicado
