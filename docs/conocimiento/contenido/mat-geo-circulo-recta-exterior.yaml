semantic_id: MAT.GEO.CIRCULO_RECTAS.EXTERIOR
titulo: Definición de recta exterior a una circunferencia como recta sin puntos de intersección
objetivo: Reconocer una recta exterior a una circunferencia como aquella que no tiene ningún punto en
  común con ella.
introduccion: Al analizar la posición relativa entre una recta y una circunferencia, existen tres casos
  posibles según cuántos puntos comparten; el primero es cuando no comparten ninguno.
resumen: Una recta es exterior a una circunferencia cuando no tiene ningún punto de intersección con ella;
  la distancia del centro a la recta es mayor que el radio.
explicacion: '![Recta exterior: sin puntos de intersección](/static/img/geometria/circunferencia-circulo/circulo-recta-exterior.svg)


  ### Definición formal


  Una recta $L$ es exterior a una circunferencia de centro $O$ y radio $r$ si la distancia de $O$ a $L$
  es mayor que $r$: $d(O,L)>r$.


  ### Desarrollo didáctico


  Si la recta está lo suficientemente lejos del centro (más allá del radio), nunca llegará a tocar la
  circunferencia, sin importar cuánto se extienda la recta en cualquiera de sus dos direcciones.'
procedimiento:
- 'Paso 1: Calcula la distancia entre el centro de la circunferencia y la recta.'
- 'Paso 2: Compara esa distancia con el radio de la circunferencia.'
- 'Paso 3: Si la distancia es mayor que el radio, la recta es exterior.'
ejemplos:
- titulo: Identificar una recta exterior
  enunciado: Una circunferencia tiene radio 5 cm, y una recta está a 8 cm del centro.
  solucion_pasos:
  - La recta es exterior, ya que 8>5 (distancia mayor que el radio).
- titulo: Detectar cuando la recta no es exterior
  enunciado: Una circunferencia tiene radio 6 cm, y una recta está a 4 cm del centro.
  solucion_pasos:
  - La recta no es exterior (es secante), ya que 4<6.
- titulo: ¿Una recta exterior tiene algún punto en común con la circunferencia?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición, no comparte ningún punto con la circunferencia.
- titulo: ¿La posición de una recta exterior depende solo de la distancia al centro?
  respuesta: Sí
  solucion_pasos:
  - Sí, comparando esa distancia con el radio se determina la posición relativa.
errores_frecuentes:
- Confundir una recta exterior con una tangente, sin comparar correctamente la distancia con el radio.
- Creer que una recta 'lejos visualmente' es exterior sin verificar la distancia exacta al centro.
- Olvidar que la comparación debe ser estrictamente mayor (d>r), no mayor o igual.
fuente: Elaboración propia.
estado: publicado
