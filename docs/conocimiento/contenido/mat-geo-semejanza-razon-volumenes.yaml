semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.RAZON_VOLUMENES
titulo: Relación entre volúmenes de cuerpos semejantes como cubo de la razón de semejanza
objetivo: Comprender que la razón entre los volúmenes de dos cuerpos semejantes es igual al cubo de su
  razón de semejanza.
introduccion: Extendiendo la idea de la razón de áreas al espacio tridimensional, los volúmenes de cuerpos
  semejantes siguen un patrón similar, pero con una potencia distinta.
resumen: La razón entre los volúmenes de dos cuerpos semejantes es igual al cubo de la razón de semejanza
  entre ellos.
explicacion: '![Razón entre volúmenes de cuerpos semejantes](/static/img/geometria/congruencia-semejanza/semejanza-razon-volumenes.svg)


  ### Definición formal


  Si dos cuerpos son semejantes con razón de semejanza $k$, entonces $\frac{V_2}{V_1}=k^3$, donde $V_1$
  y $V_2$ son sus volúmenes respectivos.


  ### Desarrollo didáctico


  Esto ocurre porque el volumen depende del producto de tres longitudes, cada una escalada por $k$, por
  lo que el volumen total se multiplica por $k^3$. Por ejemplo, si un cubo se amplía al doble de tamaño
  ($k=2$), su volumen se multiplica por $2^3=8$, no solo por 2 o por 4.'
procedimiento:
- 'Paso 1: Determina la razón de semejanza $k$ entre los dos cuerpos.'
- 'Paso 2: Eleva esa razón al cubo para obtener la razón de volúmenes.'
- 'Paso 3: Multiplica el volumen conocido por $k^3$ para obtener el volumen del otro cuerpo.'
ejemplos:
- titulo: Calcular el volumen de un cuerpo semejante ampliado
  enunciado: Un cuerpo tiene volumen 5 cm³; su semejante tiene razón de semejanza 2.
  solucion_pasos:
  - Volumen del semejante = 5×2³=5×8=40 cm³.
- titulo: Calcular la razón de semejanza a partir de volúmenes
  enunciado: Dos cuerpos semejantes tienen volúmenes 8 cm³ y 216 cm³.
  solucion_pasos:
  - k³=216/8=27 → k=3.
- titulo: ¿Duplicar el tamaño lineal de un cuerpo multiplica su volumen por 8?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, porque el volumen escala con el cubo de la razón: 2³=8.'
- titulo: ¿La razón de volúmenes es la misma que la razón de áreas?
  respuesta: 'No'
  solucion_pasos:
  - No, la razón de volúmenes es el cubo de la razón de semejanza, mientras que la de áreas es el cuadrado.
errores_frecuentes:
- Confundir la razón de volúmenes con la razón de áreas (usar el cuadrado en vez del cubo).
- Al despejar la razón de semejanza desde una razón de volúmenes, olvidar aplicar la raíz cúbica.
- Aplicar la razón lineal directamente al calcular volúmenes, sin elevar al cubo.
fuente: 'Fuente: Santillana 155.'
estado: publicado
