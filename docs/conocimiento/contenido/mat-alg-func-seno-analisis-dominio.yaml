semantic_id: MAT.ALG.FUNC_SENO_ANALISIS.DOMINIO
titulo: Dominio de la función seno
objetivo: Determinar que el dominio de $f(x)=\sin(x)$ es todo $\mathbb{R}$.
introduccion: A diferencia de otras funciones estudiadas, el seno no tiene ninguna restricción sobre los valores
  que puede tomar su variable independiente.
resumen: El dominio de $f(x)=\sin(x)$ es **todo $\mathbb{R}$**, ya que cualquier número real puede interpretarse
  como una medida angular y siempre determina un punto en el círculo unitario.
explicacion: '### Definición formal


  Para cualquier $x\in\mathbb{R}$, existe un ángulo (en radianes) con esa medida, y ese ángulo siempre determina
  un único punto sobre el círculo unitario. Por lo tanto, $\sin(x)$ está definido para todo $x$ real, sin
  excepciones.


  ### Desarrollo didáctico


  A diferencia de $f(x)=\sqrt{x}$ (que excluye negativos) o $f(x)=1/x$ (que excluye el $0$), la función
  $f(x)=\sin(x)$ puede evaluarse en cualquier número, incluidos valores muy grandes o muy negativos, como
  $\sin(1000)$ o $\sin(-50)$.'
procedimiento:
- 'Paso 1: Recuerda que cualquier número real representa una medida angular válida.'
- 'Paso 2: Verifica que todo ángulo determina un punto sobre el círculo unitario.'
- 'Paso 3: Concluye que el dominio de $\sin(x)$ es todo $\mathbb{R}$, sin restricciones.'
ejemplos:
- titulo: Verificación de un valor grande dentro del dominio
  enunciado: '¿Está definido $\sin(1000)$?'
  solucion_pasos:
  - $1000$ es un número real, así que representa un ángulo válido (aunque grande).
  - Sí, $\sin(1000)$ está definido, con un valor entre $-1$ y $1$.
- titulo: Verificación de un valor negativo dentro del dominio
  enunciado: '¿Está definido $\sin(-7)$?'
  solucion_pasos:
  - $-7$ es un número real, así que representa un ángulo válido.
  - Sí, $\sin(-7)$ está definido.
- titulo: ¿Existe algún número real que no pertenezca al dominio de $\sin(x)$?
  enunciado: ¿Existe algún valor real de $x$ para el cual $\sin(x)$ no esté definido?
  respuesta: 'No'
  solucion_pasos:
  - Todo número real representa una medida angular válida, así que el dominio es completo.
- titulo: ¿El dominio de la función seno es distinto del dominio de la función coseno?
  enunciado: ¿El dominio de $f(x)=\sin(x)$ es distinto del dominio de $g(x)=\cos(x)$?
  respuesta: 'No'
  solucion_pasos:
  - Ambas funciones comparten el mismo dominio: todo $\mathbb{R}$.
errores_frecuentes:
- Suponer que el dominio se restringe a valores entre $0$ y $2\pi$.
- Confundir el dominio con el recorrido, que sí está acotado entre $-1$ y $1$.
- Creer que valores muy grandes de $x$ generan resultados indefinidos.
- No reconocer que cualquier número real representa un ángulo válido.
