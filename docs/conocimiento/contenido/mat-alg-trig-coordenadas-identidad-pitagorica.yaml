semantic_id: MAT.ALG.TRIG_COORDENADAS.IDENTIDAD_PITAGORICA
titulo: Identidad pitagórica fundamental
objetivo: Demostrar y aplicar la identidad $\sin^2(\theta)+\cos^2(\theta)=1$ para cualquier ángulo $\theta$.
introduccion: Como el punto asociado a cada ángulo está sobre el círculo unitario, existe una relación fija entre
  el seno y el coseno de ese mismo ángulo.
resumen: Para cualquier ángulo $\theta$, se cumple la **identidad pitagórica** $\sin^2(\theta)+\cos^2(\theta)=1$,
  consecuencia directa de la ecuación del círculo unitario.
explicacion: '### Definición formal


  Si $(x,y)$ es el punto asociado a $\theta$ en el círculo unitario, entonces $x^2+y^2=1$. Como $\cos(\theta)=x$
  y $\sin(\theta)=y$, sustituyendo se obtiene $\cos^2(\theta)+\sin^2(\theta)=1$, válida para cualquier ángulo
  $\theta$ real.


  ### Desarrollo didáctico


  Si $\sin(\theta)=3/5$, se puede despejar $\cos^2(\theta)=1-(3/5)^2=1-9/25=16/25$, así que
  $\cos(\theta)=\pm4/5$, con el signo determinado por el cuadrante de $\theta$.'
procedimiento:
- 'Paso 1: Identifica el valor conocido, ya sea $\sin(\theta)$ o $\cos(\theta)$.'
- 'Paso 2: Aplica la identidad $\sin^2(\theta)+\cos^2(\theta)=1$ para despejar el valor desconocido.'
- 'Paso 3: Determina el signo correcto del resultado según el cuadrante de $\theta$.'
ejemplos:
- titulo: Aplicación directa de la identidad
  enunciado: 'Si $\cos(\theta)=4/5$ y $\theta$ está en el primer cuadrante, calcula $\sin(\theta)$.'
  solucion_pasos:
  - 'Se despeja: $\sin^2(\theta)=1-(4/5)^2=1-16/25=9/25$.'
  - 'Como $\theta$ está en el primer cuadrante, $\sin(\theta)=3/5$ (positivo).'
- titulo: Verificación de la identidad con un ángulo notable
  enunciado: 'Verifica la identidad pitagórica para $\theta=30°$.'
  solucion_pasos:
  - 'Se calcula $\sin^2(30°)+\cos^2(30°)=(1/2)^2+(\sqrt{3}/2)^2=1/4+3/4=1$.'
  - Se confirma que la identidad se cumple.
- titulo: ¿La identidad pitagórica se cumple para cualquier ángulo?
  enunciado: ¿La identidad $\sin^2(\theta)+\cos^2(\theta)=1$ es válida para cualquier valor de $\theta$?
  respuesta: Sí
  solucion_pasos:
  - Es consecuencia directa de que el punto asociado siempre pertenece al círculo unitario.
- titulo: ¿Conocer solo $\sin(\theta)$ determina el signo de $\cos(\theta)$?
  enunciado: ¿Conocer únicamente el valor de $\sin(\theta)$ es suficiente para determinar el signo de
    $\cos(\theta)$?
  respuesta: 'No'
  solucion_pasos:
  - También se necesita conocer el cuadrante de $\theta$ para determinar el signo correcto.
errores_frecuentes:
- Olvidar elevar al cuadrado correctamente antes de aplicar la identidad.
- No determinar el signo correcto del valor despejado según el cuadrante.
- Confundir $\sin^2(\theta)$ con $\sin(\theta^2)$, expresiones completamente distintas.
- Aplicar la identidad con valores que no corresponden al mismo ángulo $\theta$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
