semantic_id: MAT.GEO.ALTURA_ORTOCENTRO.ORTOCENTRO_RECTANGULO
titulo: Ubicación del ortocentro en el vértice del ángulo recto de un triángulo rectángulo
objetivo: Reconocer que en un triángulo rectángulo, el ortocentro coincide exactamente con el vértice
  del ángulo recto.
introduccion: En un triángulo rectángulo, los dos catetos ya son perpendiculares entre sí, así que actúan
  directamente como dos de las alturas, y su punto de encuentro es el propio vértice recto.
resumen: En todo triángulo rectángulo, el ortocentro coincide con el vértice donde está el ángulo recto.
explicacion: '![Ortocentro en el vértice recto](/static/img/geometria/elementos-secundarios/altura-ortocentro-ortocentro-rectangulo.svg)


  ### Definición formal


  Si un triángulo ABC tiene ángulo recto en A, entonces los catetos AB y AC son las alturas relativas
  a AC y AB respectivamente, y ambas se cruzan en A; por lo tanto, el ortocentro H coincide con A.


  ### Desarrollo didáctico


  En un triángulo rectángulo con ángulo recto en A, el cateto AB ya es perpendicular a AC (y viceversa),
  así que cada cateto ES la altura relativa al otro; ambas alturas concurren exactamente en A.'
procedimiento:
- 'Paso 1: Identifica el vértice donde está el ángulo recto.'
- 'Paso 2: Reconoce que los dos catetos ya son perpendiculares entre sí.'
- 'Paso 3: Concluye que el ortocentro es ese mismo vértice recto.'
ejemplos:
- titulo: Ubicar el ortocentro en un rectángulo
  enunciado: Un triángulo tiene su ángulo recto en el vértice B.
  solucion_pasos:
  - El ortocentro de ese triángulo es exactamente B.
- titulo: Explicar por qué coincide
  enunciado: ¿Por qué el ortocentro coincide con el vértice recto?
  solucion_pasos:
  - Porque los catetos ya son perpendiculares entre sí, así que actúan como dos alturas que se cruzan
    justo ahí.
- titulo: ¿El ortocentro de un triángulo rectángulo puede estar fuera del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, siempre coincide exactamente con el vértice del ángulo recto.
- titulo: ¿Se necesita trazar alguna altura adicional para ubicar el ortocentro en este caso?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con identificar el vértice recto directamente.
errores_frecuentes:
- Intentar trazar las tres alturas cuando basta con identificar el vértice recto.
- Confundir el ortocentro con el circuncentro (que en este caso está en el punto medio de la hipotenusa).
- No reconocer que los catetos ya cumplen el rol de dos alturas.
fuente: Elaboración propia.
estado: publicado
