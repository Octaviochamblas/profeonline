semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.VERIFICACION_COMPOSICION_IDENTIDAD
titulo: Verificación de inversa mediante composición identidad
objetivo: Verificar que una función propuesta es efectivamente la inversa de otra, comprobando que su
  composición produce la función identidad.
introduccion: Existe una prueba infalible para confirmar que calculaste bien una inversa, componerla con
  la original y comprobar que el resultado sea simplemente "devolver lo mismo que entró".
resumen: Para **verificar** que $g$ es la inversa de $f$, se comprueba que ambas composiciones $f(g(x))$
  y $g(f(x))$ sean iguales a la función identidad, $f(g(x))=x$ y $g(f(x))=x$.
explicacion: '### Definición formal


  Dadas funciones $f$ y $g$, $g=f^{-1}$ si y solo si $(f \circ g)(x) = x$ para todo $x$ en el dominio
  de $g$, y $(g \circ f)(x) = x$ para todo $x$ en el dominio de $f$. Ambas condiciones deben cumplirse
  simultáneamente.


  ### Desarrollo didáctico


  Esta verificación es la forma más rigurosa de confirmar un cálculo de inversa, ya que no depende de
  "confiar" en el proceso algebraico, sino de comprobar el resultado directamente.


  Si $f(x)=5x-2$ y se propone $g(x)=\frac{x+2}{5}$: se calcula $f(g(x))=5\left(\frac{x+2}{5}\right)-2=(x+2)-2=x$.
  Se confirma que $g$ es efectivamente la inversa de $f$.'
procedimiento:
- 'Paso 1: Calcula la composición $f(g(x))$, sustituyendo $g(x)$ dentro de $f$.'
- 'Paso 2: Simplifica y verifica si el resultado es exactamente $x$.'
- 'Paso 3: Calcula la composición $g(f(x))$ y verifica también que dé $x$.'
- 'Paso 4: Si ambas composiciones dan $x$, se confirma que $g$ es la inversa de $f$.'
ejemplos:
- titulo: Verificación completa de una inversa
  enunciado: Verifica que $g(x)=\frac{x-3}{2}$ es la inversa de $f(x)=2x+3$.
  solucion_pasos:
  - $f(g(x)) = 2\left(\frac{x-3}{2}\right)+3 = (x-3)+3 = x$.
  - $g(f(x)) = \frac{(2x+3)-3}{2} = \frac{2x}{2} = x$.
  - Ambas composiciones dan $x$, se confirma que $g=f^{-1}$.
- titulo: Detección de un cálculo incorrecto de inversa
  enunciado: Verifica si $g(x)=\frac{x}{3}$ es la inversa de $f(x)=3x+1$.
  solucion_pasos:
  - $f(g(x)) = 3\left(\frac{x}{3}\right)+1 = x+1 \neq x$.
  - La composición no da $x$, así que $g$ NO es la inversa correcta de $f$.
- titulo: ¿Basta con verificar solo $f(g(x))=x$ para confirmar que $g$ es la inversa de $f$?
  enunciado: ¿Basta con verificar solo $f(g(x))=x$ para confirmar que $g$ es la inversa de $f$?
  respuesta: 'No'
  solucion_pasos:
  - Se deben verificar ambas composiciones, $f(g(x))=x$ y $g(f(x))=x$, para una confirmación rigurosa.
- titulo: ¿Componer una función con su verdadera inversa siempre produce la función identidad?
  enunciado: ¿Componer una función con su verdadera inversa siempre produce la función identidad?
  respuesta: Sí
  solucion_pasos:
  - Esa es precisamente la propiedad que define y caracteriza a la función inversa.
errores_frecuentes:
- Verificar solo una de las dos composiciones y dar por válida la inversa sin comprobar la otra.
- Cometer errores algebraicos al simplificar la composición, concluyendo erróneamente que no es la inversa.
- Confundir la composición $f(g(x))$ con el producto $f(x)\cdot g(x)$.
- No simplificar completamente la expresión antes de comparar con $x$.
