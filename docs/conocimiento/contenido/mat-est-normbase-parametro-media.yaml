semantic_id: MAT.EST.NORMAL_BASE.PARAMETRO_MEDIA
titulo: Reconocer la media como centro de la distribución normal
objetivo: Reconocer la media como el parámetro que determina el centro de una distribución normal.
introduccion: La media de una distribución normal marca exactamente el punto donde está el pico más alto de la
  campana, el "centro" de todos los datos.
resumen: La media $\mu$ de una distribución normal determina la ubicación del centro de la curva, coincidiendo con el
  punto más alto de la campana.
explicacion: '![Media como centro de la distribución normal](/static/img/estadistica/normbase/normbase-parametro-media.svg)


  ### Definición formal


  El parámetro $\mu$ (media) de una distribución normal $N(\mu,\sigma)$ indica la posición del centro de la curva,

  donde se ubica su único máximo.


  ### Desarrollo didáctico


  Cambiar el valor de $\mu$ desplaza toda la curva hacia la izquierda o la derecha en el eje horizontal, sin alterar

  su forma ni su dispersión.'
procedimiento:
- 'Paso 1: Identifica el valor de $\mu$ de la distribución normal.'
- 'Paso 2: Ubica ese valor en el eje horizontal como el centro de la curva.'
- 'Paso 3: Reconoce que ese punto corresponde al máximo de la función de densidad.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si una distribución normal tiene media 170, ¿dónde se ubica el pico de la curva?
  solucion_pasos:
  - El pico de la curva se ubica exactamente en 170.
- titulo: Ejemplo 2
  enunciado: Si dos distribuciones normales tienen medias distintas pero la misma desviación estándar, ¿en qué se
    diferencian sus curvas?
  solucion_pasos:
  - Tienen exactamente la misma forma, pero están centradas en distintos puntos del eje horizontal.
- titulo: ¿La media de una distribución normal coincide con el punto más alto de su curva?
  respuesta: Sí
  solucion_pasos:
  - Sí, ese es el centro de la campana.
- titulo: ¿Cambiar la media de una distribución normal cambia la forma de su curva?
  respuesta: 'No'
  solucion_pasos:
  - 'No, solo desplaza la curva horizontalmente, sin cambiar su forma.'
errores_frecuentes:
- Confundir el efecto de la media con el efecto de la desviación estándar sobre la curva.
- Creer que cambiar la media modifica el ancho de la campana.
- Pensar que la media siempre debe ser un número entero.
- Confundir la posición de la media con la posición de los extremos de la curva.
- Suponer que dos curvas con distinta media deben tener distinta forma.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
