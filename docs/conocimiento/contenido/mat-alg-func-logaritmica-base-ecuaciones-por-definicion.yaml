semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.ECUACIONES_POR_DEFINICION
titulo: Resolución de ecuaciones logarítmicas por definición
objetivo: Resolver ecuaciones logarítmicas simples convirtiéndolas a su forma exponencial equivalente.
introduccion: La forma más directa de resolver una ecuación logarítmica sencilla es "deshacer" el logaritmo,
  transformándolo en la ecuación exponencial equivalente que ya sabes resolver.
resumen: Para resolver $\log_b(x)=y$, se aplica la definición y se reescribe como $x=b^y$, despejando así la
  incógnita sin necesidad de propiedades adicionales.
explicacion: '### Definición formal


  Dada una ecuación de la forma $\log_b(x)=y$ con $b>0$, $b\neq1$, la definición de logaritmo garantiza la
  equivalencia $\log_b(x)=y \Leftrightarrow x=b^y$. Esta equivalencia permite despejar $x$ calculando
  directamente la potencia $b^y$.


  ### Desarrollo didáctico


  Para resolver $\log_2(x)=3$: se traduce a la forma exponencial $x=2^3$, obteniendo $x=8$. Se comprueba
  reemplazando: $\log_2(8)=3$ porque $2^3=8$. El mismo método funciona cuando la incógnita está en la base o en
  el exponente.'
procedimiento:
- 'Paso 1: Identifica la base $b$, el argumento y el resultado del logaritmo en la ecuación.'
- 'Paso 2: Reescribe la ecuación logarítmica en su forma exponencial equivalente $x=b^y$.'
- 'Paso 3: Calcula la potencia para obtener el valor de la incógnita.'
- 'Paso 4: Verifica que el resultado cumpla las condiciones de existencia del logaritmo original.'
ejemplos:
- titulo: Ecuación con incógnita en el argumento
  enunciado: 'Resuelve $\log_5(x)=2$.'
  solucion_pasos:
  - Se reescribe en forma exponencial: $x=5^2$.
  - Se calcula la potencia y se obtiene $x=25$.
- titulo: Ecuación con incógnita en la base
  enunciado: 'Resuelve $\log_b(16)=4$.'
  solucion_pasos:
  - Se reescribe en forma exponencial: $b^4=16$.
  - 'Se despeja $b=\sqrt[4]{16}=2$.'
- titulo: ¿$\log_3(x)=0$ tiene como solución $x=1$?
  enunciado: ¿Es correcto afirmar que la solución de $\log_3(x)=0$ es $x=1$?
  respuesta: Sí
  solucion_pasos:
  - 'Al aplicar la definición, $\log_3(x)=0$ equivale a $x=3^0=1$.'
- titulo: ¿Toda solución obtenida por definición es válida sin verificar?
  enunciado: ¿Se puede aceptar directamente cualquier solución obtenida al aplicar la definición, sin comprobar
    restricciones?
  respuesta: 'No'
  solucion_pasos:
  - Siempre debe verificarse que el argumento resultante sea positivo y coherente con el dominio original.
errores_frecuentes:
- Confundir la posición de la base y el exponente al reescribir la ecuación exponencial equivalente.
- Olvidar verificar que la solución obtenida cumpla las condiciones de existencia del logaritmo.
- Aplicar la definición sin antes identificar correctamente cuál es la incógnita en la ecuación.
- Calcular mal la potencia al despejar, especialmente con exponentes negativos o fraccionarios.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
