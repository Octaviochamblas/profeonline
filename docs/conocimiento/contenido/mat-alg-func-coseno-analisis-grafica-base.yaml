semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.GRAFICA_BASE
titulo: Gráfica de la función coseno básica
objetivo: Describir la forma ondulada característica de la gráfica de $f(x)=\cos(x)$, distinguiéndola de la del
  seno.
introduccion: La gráfica del coseno tiene la misma forma general que la del seno, pero desplazada, comenzando en
  su punto más alto en vez de en cero.
resumen: La gráfica de $f(x)=\cos(x)$ tiene forma de **onda continua**, que comienza en su máximo, baja hasta
  $-1$, y vuelve a subir hasta $1$, repitiendo este patrón indefinidamente.
explicacion: '### Definición formal


  La gráfica de $f(x)=\cos(x)$ es el conjunto de puntos $(x,\cos(x))$ para todo $x\in\mathbb{R}$. Es una curva
  continua y suave, idéntica en forma a la del seno pero desplazada horizontalmente $\pi/2$ unidades hacia la
  izquierda.


  ### Desarrollo didáctico


  Partiendo de $(0,1)$, la curva desciende cruzando el eje $x$ en $(\pi/2,0)$, sigue bajando hasta el mínimo
  $(\pi,-1)$, sube cruzando el eje $x$ en $(3\pi/2,0)$, y vuelve a subir hasta $(2\pi,1)$, completando un
  ciclo.'
procedimiento:
- 'Paso 1: Marca los puntos clave: máximo en $x=0$, cero en $x=\pi/2$, mínimo en $x=\pi$, cero en $x=3\pi/2$,
    máximo en $x=2\pi$.'
- 'Paso 2: Conecta los puntos con una curva suave, sin líneas rectas ni ángulos.'
- 'Paso 3: Repite el patrón hacia la izquierda y la derecha para extender la gráfica.'
ejemplos:
- titulo: Descripción de un ciclo completo
  enunciado: 'Describe la forma de la gráfica de $f(x)=\cos(x)$ en el intervalo $[0,2\pi]$.'
  solucion_pasos:
  - Comienza en el máximo $(0,1)$, baja pasando por $0$ en $\pi/2$.
  - Continúa bajando hasta el mínimo en $\pi$, sube de vuelta a $0$ en $3\pi/2$ y al máximo en $2\pi$.
- titulo: Identificación de un punto sobre la curva
  enunciado: '¿El punto $(\pi,-1)$ pertenece a la gráfica de $f(x)=\cos(x)$?'
  solucion_pasos:
  - 'Se evalúa $f(\pi)=-1$.'
  - Sí, el punto pertenece a la gráfica.
- titulo: ¿La gráfica del coseno comienza en $0$, igual que la del seno?
  enunciado: ¿La gráfica de $f(x)=\cos(x)$ comienza en $y=0$ para $x=0$, igual que el seno?
  respuesta: 'No'
  solucion_pasos:
  - El coseno comienza en su valor máximo, $y=1$, no en $0$.
- titulo: ¿Ambas gráficas, seno y coseno, tienen la misma forma general de onda?
  enunciado: ¿Las gráficas de seno y coseno comparten la misma forma general de onda, solo desplazadas entre sí?
  respuesta: Sí
  solucion_pasos:
  - Son la misma curva, desplazada horizontalmente $\pi/2$ unidades una respecto a la otra.
errores_frecuentes:
- Confundir el punto de inicio del coseno con el del seno.
- Trazar la curva con segmentos rectos en vez de una onda suave.
- Confundir la posición del máximo y el mínimo dentro de un ciclo.
- No repetir el patrón fuera del intervalo $[0,2\pi]$.
