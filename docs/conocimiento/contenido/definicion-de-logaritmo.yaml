semantic_id: MAT.NUM.LOGARITMOS_CONCEPTO.DEFINICION
titulo: Definición de logaritmo
objetivo: Calcular logaritmos desde su definición.
introduccion: 'El resultado de un logaritmo no es una potencia ni una base: es un exponente. Traducir
  la pregunta a forma exponencial vuelve visible ese significado.'
resumen: \(\log_b a=c\) significa que \(b^c=a\), con \(b>0\), \(b\neq1\) y \(a>0\). Un logaritmo responde
  qué exponente necesita la base para producir el argumento.
explicacion: '\(\log_b a=c\) significa que \(b^c=a\), con \(b>0\), \(b\neq1\) y \(a>0\).


  El cálculo “\(\log_2 32=5\) porque \(2^5=32\)” muestra por qué un logaritmo responde qué exponente necesita
  la base para producir el argumento'
procedimiento:
- 'Paso 1: Identifica base, argumento y exponente desconocido.'
- 'Paso 2: Reescribe la igualdad en forma exponencial.'
- 'Paso 3: Comprueba las restricciones y eleva la base al resultado obtenido.'
ejemplos:
- titulo: Aplicación razonada — Definición de logaritmo
  enunciado: \(\log_2 32=5\) porque \(2^5=32\).
  solucion_pasos:
  - Identifica base, argumento y exponente desconocido.
  - Reescribe la igualdad en forma exponencial.
  - Comprueba las restricciones y eleva la base al resultado obtenido.
- titulo: Revisión de una solución — Definición de logaritmo
  enunciado: Una solución aplica “Reescribe la igualdad en forma exponencial.”, pero termina sin comprobar
    que un logaritmo responde qué exponente necesita la base para producir el argumento. Determina qué
    falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define definición de logaritmo: \(\log_b a=c\) significa que \(b^c=a\),
    con \(b>0\), \(b\neq1\) y \(a>0\).'
  - Identifica base, argumento y exponente desconocido.
  - 'Completa la revisión con este control: Comprueba las restricciones y eleva la base al resultado obtenido.'
- titulo: ¿Se cumple que un logaritmo responde qué exponente necesita la base para producir el argumento?
    — Definición de logaritmo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\log_b a=c\) significa que \(b^c=a\), con \(b>0\), \(b\neq1\)
    y \(a>0\).
  - El caso “\(\log_2 32=5\) porque \(2^5=32\)” satisface esa condición.
  - Comprueba las restricciones y eleva la base al resultado obtenido.
- titulo: ¿Es válido omitir el paso “Identifica base, argumento y exponente desconocido”? — Definición
    de logaritmo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de definición de logaritmo.
  - 'Omitirlo puede volver inválida la acción siguiente: Reescribe la igualdad en forma exponencial.'
  - 'La solución debe terminar de este modo: Comprueba las restricciones y eleva la base al resultado
    obtenido.'
errores_frecuentes:
- 'Confundir definición de logaritmo con otro concepto y omitir este inicio: Identifica base, argumento
  y exponente desconocido.'
- Aplicar mecánicamente “Reescribe la igualdad en forma exponencial.” sin revisar las condiciones de la
  definición.
- Tomar “\(\log_2 32=5\) porque \(2^5=32\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “un logaritmo responde qué exponente necesita la
  base para producir el argumento”.
- 'Terminar el desarrollo sin realizar este control: Comprueba las restricciones y eleva la base al resultado
  obtenido.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
