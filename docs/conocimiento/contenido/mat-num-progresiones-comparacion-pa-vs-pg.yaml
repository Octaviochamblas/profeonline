semantic_id: MAT.NUM.PROGRESIONES_COMPARACION.PA_VS_PG
objetivo: Distinguir entre una progresión aritmética (P.A.) y una geométrica (P.G.)
  analizando el comportamiento de sus términos.
introduccion: En el examen PAES, casi nunca te dicen 'hola, soy una progresión aritmética'.
  Te entregan un problema con números crudos. Si te equivocas al clasificarlos, aplicarás
  la fórmula equivocada. Es vital saber qué bestia enfrentamos.
resumen: Si la diferencia (resta) entre términos vecinos es constante, es una **Progresión
  Aritmética (P.A.)**. Si el cociente (división) entre términos vecinos es constante,
  es una **Progresión Geométrica (P.G.)**.
explicacion: "El test de paternidad de las sucesiones:\nTe dan la lista: $3, 12, 21,\
  \ 30$\n- **Prueba A (Restar):** $12-3=9$. $21-12=9$. $30-21=9$. \n- ¡Bingo! Pasa\
  \ la prueba aritmética. Su diferencia es $d=9$.\n\nTe dan la lista: $3, 12, 48,\
  \ 192$\n- **Prueba A (Restar):** $12-3=9$. $48-12=36$. \n- ¡Fallo! No es aritmética.\
  \ Vamos al plan B.\n- **Prueba B (Dividir):** $12/3=4$. $48/12=4$. $192/48=4$.\n\
  - ¡Bingo! Es una geométrica con razón $r=4$.\n\nCuidado con las 'trampas PAES':\
  \ Secuencias como $1, 4, 9, 16, 25$. Si haces la prueba de restar da $3, 5, 7, 9$.\
  \ Si haces la de dividir da $4, 2.25, 1.77$. ¡No pasa ninguna! No te asustes, no\
  \ todo en la vida es P.A. o P.G. (estas son los cuadrados perfectos)."
procedimiento:
- 'Paso 1: Toma el 2do y 1er término. Réstalos. Luego divide el 2do entre el 1ro.'
- 'Paso 2: Haz lo mismo con el 3er y 2do término.'
- 'Paso 3: Si las RESTAS dieron igual, usa fórmulas de P.A.'
- 'Paso 4: Si las DIVISIONES dieron igual, usa fórmulas de P.G.'
- 'Paso 5: Si ninguna da igual, detente, el problema se resuelve con otra lógica.'
ejemplos:
- titulo: Clasificando la deuda
  enunciado: 'Tus cuotas a pagar son: mes 1 = $500, mes 2 = $550, mes 3 = $605, mes
    4 = $665.5. ¿Qué tipo de sucesión es?'
  solucion_pasos:
  - 'Prueba A: 550 - 500 = 50. 605 - 550 = 55. Fallo, no es Aritmética.'
  - 'Prueba B: 550 / 500 = 1.1. 605 / 550 = 1.1. 665.5 / 605 = 1.1.'
  - 'Conclusión: Es Geométrica (aumenta un 10% mensual).'
errores_frecuentes:
- 'Detener la verificación en el segundo término asumiendo que el patrón se mantiene
  (Ej: $2, 4, 8, 10$ parece geométrica al principio porque $4/2=2$ y $8/4=2$, pero
  el 10 la arruina).'
- Confundir P.A. con P.G. al trabajar con fracciones.
fuente: Currículum Nacional MINEDUC.
estado: publicado
