semantic_id: MAT.NUM.RAICES_CONCEPTO.EXPONENTE_FRACCIONARIO
objetivo: Traducir entre radicales y exponentes fraccionarios.
introduccion: Cambiar de radical a potencia puede revelar propiedades que la notación
  original oculta. La fracción del exponente conserva por separado potencia e índice.
resumen: \(\sqrt[n]{a^m}=a^{m/n}\) cuando la expresión está definida en los reales.
  Radical y exponente racional son dos escrituras del mismo valo.
explicacion: |-
  \(\sqrt[n]{a^m}=a^{m/n}\) cuando la expresión está definida en los reales.

  La situación “\(\sqrt[4]{16^3}=16^{3/4}=8\)” permite comprobar, y no solo memorizar, que radical y exponente racional son dos escrituras del mismo valo
procedimiento:
- 'Paso 1: Lee el índice como denominador y la potencia del radicando como numerador.'
- 'Paso 2: Escribe la potencia racional y simplifica la fracción del exponente si
  corresponde.'
- 'Paso 3: Revisa el dominio real y verifica regresando a la notación radical.'
ejemplos:
- titulo: Aplicación razonada — Relación entre raíz y potencia de exponente fraccionario
  enunciado: \(\sqrt[4]{16^3}=16^{3/4}=8\).
  solucion_pasos:
  - Lee el índice como denominador y la potencia del radicando como numerador.
  - Escribe la potencia racional y simplifica la fracción del exponente si corresponde.
  - Revisa el dominio real y verifica regresando a la notación radical.
- titulo: Revisión de una solución — Relación entre raíz y potencia de exponente fraccionario
  enunciado: Una solución aplica “Escribe la potencia racional y simplifica la fracción
    del exponente si corresponde.”, pero termina sin comprobar que radical y exponente
    racional son dos escrituras del mismo valo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define relación entre raíz y potencia de exponente
    fraccionario: \(\sqrt[n]{a^m}=a^{m/n}\) cuando la expresión está definida en los
    reales.'
  - Lee el índice como denominador y la potencia del radicando como numerador.
  - 'Completa la revisión con este control: Revisa el dominio real y verifica regresando
    a la notación radical.'
- titulo: ¿Se cumple que radical y exponente racional son dos escrituras del mismo
    valo? — Relación entre raíz y potencia de exponente fraccionario
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\sqrt[n]{a^m}=a^{m/n}\) cuando la
    expresión está definida en los reales.
  - El caso “\(\sqrt[4]{16^3}=16^{3/4}=8\)” satisface esa condición.
  - Revisa el dominio real y verifica regresando a la notación radical.
- titulo: ¿Es válido omitir el paso “Lee el índice como denominador y la potencia
    del radicando como numerador”? — Relación entre raíz y potencia de exponente fraccionario
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de relación entre raíz y potencia
    de exponente fraccionario.
  - 'Omitirlo puede volver inválida la acción siguiente: Escribe la potencia racional
    y simplifica la fracción del exponente si corresponde.'
  - 'La solución debe terminar de este modo: Revisa el dominio real y verifica regresando
    a la notación radical.'
errores_frecuentes:
- 'Confundir relación entre raíz y potencia de exponente fraccionario con otro concepto
  y omitir este inicio: Lee el índice como denominador y la potencia del radicando
  como numerador.'
- Aplicar mecánicamente “Escribe la potencia racional y simplifica la fracción del
  exponente si corresponde.” sin revisar las condiciones de la definición.
- Tomar “\(\sqrt[4]{16^3}=16^{3/4}=8\)” como una igualdad aislada, sin explicar por
  qué es válida.
- Aceptar una respuesta que contradice la idea clave “radical y exponente racional
  son dos escrituras del mismo valo”.
- 'Terminar el desarrollo sin realizar este control: Revisa el dominio real y verifica
  regresando a la notación radical.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
