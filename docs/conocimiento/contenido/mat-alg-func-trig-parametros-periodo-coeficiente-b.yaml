semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.PERIODO_COEFICIENTE_B
titulo: Efecto del parámetro $b$ sobre el periodo
objetivo: Aplicar la fórmula $T=\dfrac{2\pi}{|b|}$ para calcular el periodo de $f(x)=\sin(bx)$ o $f(x)=\cos(bx)$.
introduccion: El coeficiente que multiplica a la variable dentro del seno o coseno controla qué tan rápido se
  completa cada ciclo de la oscilación.
resumen: En $f(x)=\sin(bx)$ o $f(x)=\cos(bx)$, el **periodo** es $T=\dfrac{2\pi}{|b|}$.
explicacion: '### Definición formal


  Para que $f(x+T)=f(x)$, se necesita que $b(x+T)=bx+2\pi$ (una vuelta completa adicional), lo que da
  $bT=2\pi$, y despejando, $T=\dfrac{2\pi}{|b|}$. Si $b=1$, se recupera el periodo básico $2\pi$.


  ### Desarrollo didáctico


  $f(x)=\sin(2x)$ tiene periodo $T=2\pi/2=\pi$: completa un ciclo el doble de rápido que $\sin(x)$. $f(x)=\cos(x/2)$
  tiene periodo $T=2\pi/(1/2)=4\pi$: completa un ciclo el doble de lento.'
procedimiento:
- 'Paso 1: Identifica el coeficiente $b$ que multiplica a $x$ dentro de la función.'
- 'Paso 2: Aplica la fórmula $T=2\pi/|b|$.'
- 'Paso 3: Simplifica el resultado si es posible.'
ejemplos:
- titulo: Cálculo del periodo con $b>1$
  enunciado: 'Calcula el periodo de $f(x)=\sin(4x)$.'
  solucion_pasos:
  - Se identifica $b=4$.
  - 'Se aplica la fórmula: $T=2\pi/4=\pi/2$.'
- titulo: Cálculo del periodo con $b<1$
  enunciado: 'Calcula el periodo de $f(x)=\cos(x/3)$.'
  solucion_pasos:
  - Se identifica $b=1/3$.
  - 'Se aplica la fórmula: $T=2\pi/(1/3)=6\pi$.'
- titulo: ¿Un mayor valor de $|b|$ produce un periodo más corto?
  enunciado: ¿Un mayor valor de $|b|$ produce un periodo más corto en la función trigonométrica?
  respuesta: Sí
  solucion_pasos:
  - Como el periodo es $2\pi/|b|$, un $|b|$ mayor produce un cociente menor.
- titulo: ¿El periodo puede calcularse con $b$ negativo directamente sin valor absoluto?
  enunciado: ¿Se debe usar $|b|$ en vez de $b$ directamente al calcular el periodo?
  respuesta: Sí
  solucion_pasos:
  - El periodo siempre es positivo, así que se usa el valor absoluto de $b$.
errores_frecuentes:
- Olvidar aplicar el valor absoluto a $b$ al calcular el periodo.
- Confundir la fórmula con $T=2\pi\cdot b$ en vez de $T=2\pi/|b|$.
- No simplificar correctamente la fracción resultante.
- Confundir el efecto de $b$ sobre el periodo con el efecto de $a$ sobre la amplitud.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
