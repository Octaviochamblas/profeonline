semantic_id: MAT.ALG.INECUACIONES_VALOR_ABSOLUTO.DEFINICION
titulo: Reconocimiento de inecuación con valor absoluto
objetivo: Comprender la definición de inecuación con valor absoluto y aplicar sus propiedades básicas
  para plantear el intervalo de soluciones
introduccion: El valor absoluto representa una distancia. Cuando resolvemos inecuaciones con valor absoluto,
  estamos buscando todos los puntos cuya distancia a un cierto valor cumple una condición determinada,
  como ser menor o mayor a cierta cantidad.
resumen: Las inecuaciones con valor absoluto involucran expresiones dentro de $|x|$. Su resolución se
  basa en interpretar el valor absoluto como distancia y usar las propiedades fundamentales para transformarlas
  en inecuaciones lineales equivalentes.
explicacion: "### Definición formal\nUna inecuación con valor absoluto es una desigualdad que contiene\
  \ a la incógnita dentro de barras de valor absoluto. Las formas básicas son $|x| < a$, $|x| \\\\le a$,\
  \ $|x| > a$ y $|x| \\\\ge a$, donde $a$ es un número real positivo. \n\nPor las propiedades del valor\
  \ absoluto, estas inecuaciones se traducen de la siguiente manera:\n1. Si $|x| < a$ (con $a > 0$), entonces\
  \ $-a < x < a$.\n2. Si $|x| > a$ (con $a > 0$), entonces $x < -a$ o $x > a$.\n\n### Desarrollo didáctico\n\
  Piensa en $|x|$ como la distancia desde el número $x$ hasta el cero en la recta numérica. Si decimos\
  \ $|x| < 3$, estamos pidiendo todos los números cuya distancia al cero sea menor que $3$. Visualmente,\
  \ esto incluye todos los números entre $-3$ y $3$.\n\nPor otro lado, si decimos $|x| > 3$, buscamos\
  \ aquellos números que estén a una distancia mayor que $3$ del cero. Esto ocurre para números menores\
  \ que $-3$ (como el $-4, -5$) y también para números mayores que $3$ (como el $4, 5$).\n\nCuando la\
  \ inecuación involucra una expresión más compleja, como $|x - b| < a$, esto se interpreta como \"la\
  \ distancia entre $x$ y $b$ es menor que $a$\". Aplicar las propiedades nos permite eliminar el valor\
  \ absoluto y resolver las inecuaciones resultantes como lo haríamos normalmente."
procedimiento:
- Identificar la expresión con valor absoluto y aislarla a un lado de la desigualdad, si es necesario.
- Verificar que la constante del otro lado sea positiva. Si es un número negativo y tenemos un menor que,
  la solución es vacía; si es mayor que, son todos los reales.
- 'Aplicar la propiedad correspondiente: transformar en una desigualdad doble si es ''<'' o en dos desigualdades
  separadas por ''o'' si es ''>''.'
- Resolver la inecuación o el par de inecuaciones resultantes para encontrar el intervalo solución final.
ejemplos:
- titulo: Inecuación de tipo menor que
  enunciado: Resolver la inecuación $|x - 2| < 5$.
  solucion_pasos:
  - Identificamos que tiene la forma $|X| < a$, donde $X = x - 2$ y $a = 5$.
  - Aplicamos la propiedad - $-5 < x - 2 < 5$.
  - Sumamos 2 a todos los miembros de la desigualdad - $-5 + 2 < x - 2 + 2 < 5 + 2$.
  - Obtenemos $-3 < x < 7$. El intervalo solución es $(-3, 7)$.
- titulo: Inecuación de tipo mayor o igual que
  enunciado: Resolver la inecuación $|2x + 1| \\ge 7$.
  solucion_pasos:
  - Tiene la forma $|X| \ge a$, lo que se descompone en $X \le -a$ o $X \ge a$.
  - Planteamos las dos desigualdades - $2x + 1 \le -7$ o $2x + 1 \ge 7$.
  - Resolvemos la primera - $2x \le -8$, lo que da $x \le -4$.
  - Resolvemos la segunda - $2x \ge 6$, lo que da $x \ge 3$.
  - La solución final es la unión de ambos intervalos - $(-\infty, -4] \cup [3, \infty)$.
- titulo: ¿Es correcto que $|x| < -2$ no tiene solución real?
  respuesta: Verdadero
  solucion_pasos:
  - El valor absoluto de cualquier número real siempre es mayor o igual a cero (nunca es negativo).
  - Por lo tanto, la expresión $|x|$ nunca puede ser estrictamente menor que $-2$.
  - Concluimos que no hay ningún valor real de $x$ que satisfaga la inecuación, por lo que no tiene solución
    en los reales.
- titulo: ¿La inecuación $|x| > -5$ tiene como solución todos los números reales?
  respuesta: Verdadero
  solucion_pasos:
  - Sabemos que $|x| \ge 0$ para cualquier número real $x$.
  - Dado que $0 > -5$, se cumple que $|x| \ge 0 > -5$.
  - Como cualquier número positivo o cero es mayor que $-5$, la inecuación es verdadera para todo $x \in
    \mathbb{R}$.
errores_frecuentes:
- Resolver $|x| > a$ escribiendo la desigualdad compuesta como $-a > x > a$, lo cual es lógicamente inconsistente.
- Olvidar cambiar el sentido de la desigualdad cuando se plantea el caso negativo en inecuaciones tipo
  mayor que.
- Ignorar el caso cuando la inecuación se iguala a un número negativo y proceder mecánicamente, obteniendo
  soluciones falsas.
- Tratar el valor absoluto como paréntesis y simplemente suprimirlo, escribiendo $x - 2 < 5$ como única
  inecuación al resolver $|x - 2| < 5$.
- Afirmar que la solución a $|x| < 0$ es todo número real negativo.
