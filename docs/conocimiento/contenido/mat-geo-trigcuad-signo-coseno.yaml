semantic_id: MAT.GEO.TRIG_CUADRANTES.SIGNO_COSENO
titulo: Identificación del signo del coseno según el cuadrante
objetivo: Determinar el signo (positivo o negativo) del coseno de un ángulo según el cuadrante en que
  se ubica su lado terminal.
introduccion: El coseno de un ángulo, definido como la coordenada x de un punto en el lado terminal (dividida
  por el radio, siempre positivo), tiene signo positivo cuando esa coordenada x es positiva, y negativo
  cuando es negativa.
resumen: El coseno de un ángulo es positivo en los cuadrantes I y IV (donde la coordenada x del lado terminal
  es positiva), y negativo en los cuadrantes II y III (donde esa coordenada es negativa).
explicacion: '![Signo del coseno por cuadrante](/static/img/geometria/trigonometria/trigcuad-signo-coseno.svg)


  ### Definición formal


  Si $P=(x,y)$ es un punto sobre el lado terminal de $\theta$ a distancia $r$ del origen, entonces $\cos\theta=\dfrac{x}{r}$,
  con $r>0$ siempre. Por lo tanto, el signo de $\cos\theta$ coincide con el signo de $x$.


  ### Desarrollo didáctico


  En los cuadrantes I y IV, la coordenada x es positiva (a la derecha del eje y), por lo que $\cos\theta>0$.
  En los cuadrantes II y III, la coordenada x es negativa (a la izquierda del eje y), por lo que $\cos\theta<0$.'
procedimiento:
- 'Paso 1: Determina en qué cuadrante se ubica el lado terminal del ángulo.'
- 'Paso 2: Recuerda que el signo del coseno coincide con el signo de la coordenada x del lado terminal.'
- 'Paso 3: Asigna signo positivo si el cuadrante es I o IV, y negativo si es II o III.'
ejemplos:
- titulo: Determinar el signo del coseno de un ángulo de 150°
  enunciado: θ=150° (segundo cuadrante).
  solucion_pasos:
  - Como 150° está en el segundo cuadrante, cos150°<0.
- titulo: Determinar el signo del coseno de un ángulo de 300°
  enunciado: θ=300° (cuarto cuadrante).
  solucion_pasos:
  - Como 300° está en el cuarto cuadrante, cos300°>0.
- titulo: ¿El coseno es positivo en el cuarto cuadrante?
  respuesta: Sí
  solucion_pasos:
  - Sí, en el cuarto cuadrante la coordenada x sigue siendo positiva.
- titulo: ¿El coseno es positivo en el segundo cuadrante?
  respuesta: 'No'
  solucion_pasos:
  - No, en el segundo cuadrante la coordenada x es negativa, por lo que el coseno es negativo.
errores_frecuentes:
- Confundir el signo del coseno con el del seno en un cuadrante dado.
- Suponer que el coseno es siempre positivo, sin considerar el cuadrante del ángulo.
- Olvidar que el signo del coseno depende de la coordenada x, no de la y.
fuente: Elaboración propia.
estado: publicado
