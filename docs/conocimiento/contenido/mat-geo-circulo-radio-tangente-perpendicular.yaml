semantic_id: MAT.GEO.CIRCULO_RECTAS.RADIO_TANGENTE_PERPENDICULAR
titulo: Propiedad de perpendicularidad entre el radio y la tangente en el punto de tangencia
objetivo: Reconocer que el radio trazado hacia el punto de tangencia siempre es perpendicular a la recta
  tangente en ese punto.
introduccion: Existe una propiedad geométrica muy poderosa que conecta el radio de una circunferencia
  con cualquier recta tangente a ella.
resumen: El radio trazado desde el centro hasta el punto de tangencia es siempre perpendicular a la recta
  tangente en ese punto.
explicacion: '![Radio perpendicular a la tangente en el punto de tangencia](/static/img/geometria/circunferencia-circulo/circulo-radio-tangente-perpendicular.svg)


  ### Definición formal


  Si $L$ es tangente a una circunferencia de centro $O$ en el punto $T$, entonces $\overline{OT}\perp
  L$.


  ### Desarrollo didáctico


  Esta propiedad se puede demostrar por contradicción: si el radio OT no fuera perpendicular a la tangente,
  existiría otro punto de la recta más cercano a O que T, lo que implicaría que ese otro punto está dentro
  de la circunferencia, contradiciendo que L es tangente (toca la circunferencia en un solo punto).'
procedimiento:
- 'Paso 1: Identifica el punto de tangencia entre la recta tangente y la circunferencia.'
- 'Paso 2: Traza el radio desde el centro hasta ese punto de tangencia.'
- 'Paso 3: Ese radio siempre forma un ángulo de 90° con la recta tangente.'
ejemplos:
- titulo: Verificar la perpendicularidad
  enunciado: Una recta es tangente a una circunferencia en el punto T, con centro O.
  solucion_pasos:
  - El radio OT es perpendicular a la recta tangente en T.
- titulo: Aplicar la propiedad para calcular una distancia
  enunciado: Una recta tangente pasa por un punto exterior P, con radio OT=5 cm y OP=13 cm.
  solucion_pasos:
  - 'Como OT⊥TP, se forma un triángulo rectángulo, y se puede usar Pitágoras: TP=√(13²-5²)=√144=12 cm.'
- titulo: ¿Esta propiedad se cumple para cualquier recta tangente?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad universal de la tangencia, sin excepciones.
- titulo: ¿Se puede usar esta propiedad para construir una tangente desde un punto exterior?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la base del método de construcción geométrica de tangentes desde un punto exterior.
errores_frecuentes:
- Creer que el radio y la tangente forman un ángulo distinto de 90° en algunos casos.
- Olvidar aplicar esta propiedad al resolver problemas donde se forma un triángulo rectángulo con el radio
  y la tangente.
- Confundir el punto de tangencia con otro punto cualquiera de la recta tangente al aplicar esta propiedad.
fuente: Elaboración propia.
estado: publicado
