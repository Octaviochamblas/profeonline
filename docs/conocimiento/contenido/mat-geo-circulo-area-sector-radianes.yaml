semantic_id: MAT.GEO.CIRCULO_METRICA.AREA_SECTOR_RADIANES
titulo: Cálculo del área de un sector circular en radianes usando A = θr² / 2
objetivo: Calcular el área de un sector circular usando la fórmula directa A=θr²/2, cuando el ángulo central
  está expresado en radianes.
introduccion: Cuando el ángulo central se mide en radianes, la fórmula del área de un sector circular
  se simplifica de forma similar a la longitud de arco.
resumen: El área de un sector con ángulo central $\theta$ (en radianes) en un círculo de radio $r$ es
  $A=\frac{\theta\times r^2}{2}$.
explicacion: '![Área de sector circular: A = θr²/2](/static/img/geometria/circunferencia-circulo/circulo-area-sector-radianes.svg)


  ### Definición formal


  Si $\theta$ está expresado en radianes, el área del sector correspondiente es $A=\frac{\theta r^2}{2}$,
  sin necesidad de dividir entre 360° ni multiplicar por π (esos factores ya están incorporados en la
  definición del radián).


  ### Desarrollo didáctico


  Un sector con ángulo central de $\frac{\pi}{2}$ radianes (equivalente a 90°) en un círculo de radio
  8 cm tiene área $A=\frac{(\pi/2)\times8^2}{2}=\frac{64\pi/2}{2}=16\pi\approx50,27$ cm², coincidiendo
  con el resultado usando la fórmula en grados.'
procedimiento:
- 'Paso 1: Verifica que el ángulo central esté expresado en radianes (si está en grados, conviértelo primero:
  radianes=grados×π/180).'
- 'Paso 2: Eleva el radio al cuadrado y multiplícalo por el ángulo (en radianes).'
- 'Paso 3: Divide ese producto entre 2 para obtener el área del sector.'
ejemplos:
- titulo: Calcular el área de un sector con ángulo en radianes
  enunciado: Un círculo de radio 8 cm tiene un sector con ángulo central de π/2 radianes.
  solucion_pasos:
  - A=(π/2×8²)/2=(π/2×64)/2=16π≈50,27 cm².
- titulo: Convertir de grados a radianes antes de aplicar la fórmula
  enunciado: Un sector de 60° está en un círculo de radio 6 cm.
  solucion_pasos:
  - '60°=π/3 radianes; A=(π/3×36)/2=12π/2×... calculemos: (π/3)×36=12π; 12π/2=6π≈18,85 cm².'
- titulo: ¿Esta fórmula requiere dividir entre 360°?
  respuesta: 'No'
  solucion_pasos:
  - No, esa conversión ya está incorporada en la definición del radián; la fórmula es directamente A=θr²/2.
- titulo: ¿Un ángulo de 2π radianes corresponde al área total del círculo?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, con θ=2π: A=(2π×r²)/2=πr², el área completa del círculo.'
errores_frecuentes:
- Aplicar esta fórmula (A=θr²/2) con el ángulo aún en grados, sin convertir primero a radianes.
- Olvidar dividir entre 2 después de multiplicar el ángulo por el radio al cuadrado.
- Confundir esta fórmula con la de longitud de arco en radianes (s=θr, sin elevar al cuadrado ni dividir
  entre 2).
fuente: Elaboración propia.
estado: publicado
