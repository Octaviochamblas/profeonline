semantic_id: MAT.GEO.CUERPOS_REDONDOS_BASE.CONO_DEFINICION
titulo: Definición de cono
objetivo: Reconocer el cono como un cuerpo redondo con una base circular y un vértice, unidos por una
  superficie lateral curva.
introduccion: 'Un cono es como un helado de barquillo o un gorro de fiesta: una base circular que se estrecha
  hasta un único punto (el vértice).'
resumen: Un cono es un cuerpo redondo formado por una base circular y un vértice (fuera del plano de la
  base), unidos por una superficie lateral curva.
explicacion: '![Definición de cono](/static/img/geometria/espacio-cuerpos/cono-definicion.svg)


  ### Definición formal


  Un cono recto tiene una base circular de radio $r$, un vértice (o cúspide) ubicado a una altura $h$
  sobre el centro de la base, y una superficie lateral curva. La distancia desde el vértice hasta cualquier
  punto del borde de la base se llama generatriz ($g$).


  ### Desarrollo didáctico


  En la figura, el cono tiene su base circular de radio $r$, su altura $h$ (distancia perpendicular desde
  el vértice hasta el centro de la base) y su generatriz $g$ (la línea inclinada desde el vértice hasta
  el borde de la base). Por el teorema de Pitágoras, $g^2=r^2+h^2$.'
procedimiento:
- 'Paso 1: Identifica la base circular y el vértice (fuera del plano de la base) del cuerpo.'
- 'Paso 2: Reconoce la superficie lateral curva que conecta el vértice con el borde de la base.'
- 'Paso 3: Identifica el radio (r), la altura (h) y la generatriz (g), relacionados por g²=r²+h².'
ejemplos:
- titulo: Identificar un cono
  enunciado: Un gorro de fiesta tiene una base circular que se estrecha hasta un único punto.
  solucion_pasos:
  - 'Ese gorro tiene forma de cono: una base circular y un vértice unidos por una superficie curva.'
- titulo: Calcular la generatriz de un cono
  enunciado: Un cono tiene radio 3 cm y altura 4 cm.
  solucion_pasos:
  - g²=3²+4²=9+16=25 → g=5 cm, usando el teorema de Pitágoras.
- titulo: ¿El cono tiene un solo vértice?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del cilindro (que no tiene vértices), el cono tiene exactamente un vértice.
- titulo: ¿La generatriz es igual a la altura del cono?
  respuesta: 'No'
  solucion_pasos:
  - No, la generatriz es siempre mayor que la altura (salvo en el caso degenerado de radio cero), ya que
    forma la hipotenusa de un triángulo rectángulo con la altura y el radio.
errores_frecuentes:
- Confundir la generatriz con la altura del cono.
- Creer que el cono tiene dos bases, como el cilindro.
- Olvidar aplicar el teorema de Pitágoras para relacionar radio, altura y generatriz.
fuente: 'Elaboración propia (referencias: Moraleja 97, Cid 181).'
estado: publicado
