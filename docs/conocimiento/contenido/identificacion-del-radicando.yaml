semantic_id: MAT.NUM.RAICES_CONCEPTO.RADICANDO_IDENTIFICACION
titulo: Identificación del radicando
objetivo: Identificar el radicando completo.
introduccion: En expresiones algebraicas, confundir una parte con el radicando completo altera el dominio
  y el resultado. La extensión de la barra funciona como un paréntesis.
resumen: El radicando es la expresión situada bajo el signo radical. La barra del radical agrupa todos
  los términos que cubre.
explicacion: 'El radicando es la expresión situada bajo el signo radical.


  El cálculo “en \(\sqrt[3]{x+7}\), el radicando completo es \(x+7\)” muestra por qué la barra del radical
  agrupa todos los términos que cubre'
procedimiento:
- 'Paso 1: Observa hasta dónde se extiende la barra horizontal del radical.'
- 'Paso 2: Agrupa todos los términos cubiertos como una sola expresión.'
- 'Paso 3: Sustituye un valor sencillo para comprobar que respetaste la agrupación.'
ejemplos:
- titulo: Aplicación razonada — Identificación del radicando
  enunciado: En \(\sqrt[3]{x+7}\), el radicando completo es \(x+7\).
  solucion_pasos:
  - Observa hasta dónde se extiende la barra horizontal del radical.
  - Agrupa todos los términos cubiertos como una sola expresión.
  - Sustituye un valor sencillo para comprobar que respetaste la agrupación.
- titulo: Revisión de una solución — Identificación del radicando
  enunciado: Una solución aplica “Agrupa todos los términos cubiertos como una sola expresión.”, pero
    termina sin comprobar que la barra del radical agrupa todos los términos que cubre. Determina qué
    falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación del radicando: el radicando es la expresión situada
    bajo el signo radical.'
  - Observa hasta dónde se extiende la barra horizontal del radical.
  - 'Completa la revisión con este control: Sustituye un valor sencillo para comprobar que respetaste
    la agrupación.'
- titulo: ¿Se cumple que la barra del radical agrupa todos los términos que cubre? — Identificación del
    radicando
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el radicando es la expresión situada bajo el signo radical.
  - El caso “en \(\sqrt[3]{x+7}\), el radicando completo es \(x+7\)” satisface esa condición.
  - Sustituye un valor sencillo para comprobar que respetaste la agrupación.
- titulo: ¿Es válido omitir el paso “Observa hasta dónde se extiende la barra horizontal del radical”?
    — Identificación del radicando
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación del radicando.
  - 'Omitirlo puede volver inválida la acción siguiente: Agrupa todos los términos cubiertos como una
    sola expresión.'
  - 'La solución debe terminar de este modo: Sustituye un valor sencillo para comprobar que respetaste
    la agrupación.'
errores_frecuentes:
- 'Confundir identificación del radicando con otro concepto y omitir este inicio: Observa hasta dónde
  se extiende la barra horizontal del radical.'
- Aplicar mecánicamente “Agrupa todos los términos cubiertos como una sola expresión.” sin revisar las
  condiciones de la definición.
- Tomar “en \(\sqrt[3]{x+7}\), el radicando completo es \(x+7\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la barra del radical agrupa todos los términos que
  cubre”.
- 'Terminar el desarrollo sin realizar este control: Sustituye un valor sencillo para comprobar que respetaste
  la agrupación.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
