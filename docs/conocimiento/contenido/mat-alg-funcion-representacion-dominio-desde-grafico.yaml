semantic_id: MAT.ALG.FUNCION_REPRESENTACION.DOMINIO_DESDE_GRAFICO
titulo: Determinación del dominio desde un gráfico
objetivo: Determinar el dominio de una función proyectando su gráfica sobre el eje horizontal.
introduccion: 'La sombra que proyecta una curva sobre el suelo (el eje $x$) te dice exactamente qué valores de
  entrada tiene permitidos la función.'
resumen: El dominio de una función representada gráficamente se obtiene proyectando la totalidad de la curva sobre
  el eje horizontal ($x$), identificando todos los valores de abscisa efectivamente cubiertos por la gráfica.
explicacion: '### Definición formal


  Dado el gráfico $G_f = \{(x, f(x))\}$ de una función $f$, el dominio corresponde a la proyección ortogonal de
  $G_f$ sobre el eje $x$: $\text{Dom}(f) = \{x \in \mathbb{R} : \exists\, y,\ (x,y) \in G_f\}$.


  ### Desarrollo didáctico


  Visualmente, recorre la curva de izquierda a derecha y observa el rango de valores de $x$ que efectivamente
  cubre, prestando atención a extremos abiertos (huecos) o cerrados (puntos sólidos), y a posibles interrupciones.


  Si la curva comienza en $x=-3$ con un punto sólido y termina en $x=5$ con un punto abierto, el dominio es $[-3,
  5[$.'
procedimiento:
- 'Paso 1: Observa el extremo izquierdo de la curva y determina si está incluido (punto sólido) o excluido (punto
  abierto).'
- 'Paso 2: Observa el extremo derecho de la curva con el mismo criterio.'
- 'Paso 3: Revisa si existen interrupciones o huecos en el medio de la curva.'
- 'Paso 4: Expresa el dominio como intervalo o unión de intervalos, según corresponda.'
ejemplos:
- titulo: Dominio con extremos cerrados
  enunciado: Una curva comienza en $(-4, 2)$ con punto sólido y termina en $(6, -1)$ con punto sólido, sin interrupciones.
    Determina el dominio.
  solucion_pasos:
  - Ambos extremos están incluidos.
  - 'Dominio: $[-4, 6]$.'
- titulo: Dominio con una interrupción
  enunciado: Una curva cubre $x$ desde $-2$ hasta $8$, pero tiene un punto abierto en $x=3$. Determina el dominio.
  solucion_pasos:
  - Se excluye únicamente el valor $x=3$ del intervalo cubierto.
  - 'Dominio: $[-2, 8] - \{3\}$.'
- titulo: ¿Un punto abierto en el extremo de una curva indica que ese valor pertenece al dominio?
  enunciado: ¿Un punto abierto en el extremo de una curva indica que ese valor pertenece al dominio?
  respuesta: 'No'
  solucion_pasos:
  - Un punto abierto marca la exclusión explícita de ese valor del dominio.
- titulo: ¿El dominio se obtiene proyectando la curva sobre el eje vertical?
  enunciado: ¿El dominio se obtiene proyectando la curva sobre el eje vertical?
  respuesta: 'No'
  solucion_pasos:
  - El dominio se obtiene proyectando sobre el eje horizontal; la proyección vertical entrega el recorrido.
errores_frecuentes:
- Proyectar la curva sobre el eje vertical en vez del horizontal, confundiendo dominio con recorrido.
- Ignorar puntos abiertos o huecos, incluyendo valores excluidos en el dominio.
- No revisar interrupciones intermedias de la curva, asumiendo un intervalo continuo sin verificarlo.
- Confundir el extremo del gráfico dibujado con el verdadero límite del dominio, cuando la curva continúa fuera
  del recuadro visible.
