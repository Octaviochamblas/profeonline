semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.SOBREYECTIVA_DEFINICION
titulo: Definición de función sobreyectiva
objetivo: Comprender la sobreyectividad como la propiedad de que todo elemento del codominio es alcanzado
  como imagen.
introduccion: 'En algunas funciones, ningún elemento del conjunto de llegada queda "sin visita": todos
  son imagen de algo. Esa propiedad se llama sobreyectividad.'
resumen: Una función $f\colon A \to B$ es **sobreyectiva** (o epiyectiva) si todo elemento de $B$ es imagen
  de al menos un elemento de $A$; equivalentemente, si $\text{Rec}(f) = B$.
explicacion: '### Definición formal


  Una función $f\colon A \to B$ es sobreyectiva si para todo $y \in B$ existe al menos un $x \in A$ tal
  que $f(x)=y$. Esta condición es equivalente a que el recorrido de $f$ coincida exactamente con el codominio
  declarado, $\text{Rec}(f)=B$.


  ### Desarrollo didáctico


  La sobreyectividad depende crucialmente del codominio declarado: la misma fórmula puede ser sobreyectiva
  o no, según qué conjunto de llegada se elija.


  Si $f\colon \mathbb{R} \to \mathbb{R}$ con $f(x)=x^2$, no es sobreyectiva (los negativos del codominio
  nunca son imagen). Pero si se redefine como $f\colon \mathbb{R} \to [0,+\infty[$, la misma fórmula sí
  es sobreyectiva, porque ahora el codominio coincide exactamente con el recorrido.'
procedimiento:
- 'Paso 1: Determina el recorrido real de la función analizando su comportamiento.'
- 'Paso 2: Identifica el codominio declarado en la definición de la función.'
- 'Paso 3: Compara ambos conjuntos - si coinciden, la función es sobreyectiva.'
ejemplos:
- titulo: Verificación de sobreyectividad en función lineal
  enunciado: Determina si $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=3x-1$, es sobreyectiva.
  solucion_pasos:
  - El recorrido de una función lineal no constante es todo $\mathbb{R}$.
  - El codominio declarado también es $\mathbb{R}$.
  - Son iguales, por lo que es sobreyectiva.
- titulo: Función no sobreyectiva
  enunciado: Determina si $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=x^2$, es sobreyectiva.
  solucion_pasos:
  - El recorrido de $f$ es $[0,+\infty[$.
  - El codominio declarado es $\mathbb{R}$, más amplio que el recorrido.
  - No es sobreyectiva.
- titulo: ¿La sobreyectividad depende del codominio elegido?
  enunciado: ¿La sobreyectividad depende del codominio elegido?
  respuesta: Sí
  solucion_pasos:
  - Cambiar el codominio declarado puede convertir una función no sobreyectiva en sobreyectiva, sin cambiar
    su fórmula.
- titulo: ¿La sobreyectividad exige que $\text{Rec}(f)=B$?
  enunciado: ¿La sobreyectividad exige que $\text{Rec}(f)=B$?
  respuesta: Sí
  solucion_pasos:
  - Esa igualdad es exactamente la condición formal de sobreyectividad.
errores_frecuentes:
- Confundir sobreyectividad con inyectividad.
- No especificar el codominio al analizar la sobreyectividad, asumiendo siempre $\mathbb{R}$.
- Creer que toda función con recorrido infinito es automáticamente sobreyectiva.
- Confundir el recorrido con el codominio al verificar la igualdad requerida.
