semantic_id: MAT.ALG.EC_CUADR_PROPIEDADES.USO_VIETA_PARAMETROS
titulo: Uso de relaciones de Vieta para determinar parámetros desconocidos
objetivo: Usar las relaciones de Vieta (suma y producto de raíces) para determinar el valor de un parámetro desconocido
  en una ecuación cuadrática.
introduccion: Cuando se conoce información parcial sobre las raíces de una ecuación con parámetro (como su suma
  o su producto, o el valor de una de ellas), las relaciones de Vieta permiten despejar el parámetro sin resolver
  la ecuación por completo.
resumen: Usar las relaciones de Vieta con parámetros consiste en plantear $x_1+x_2=-b/a$ y $x_1 \cdot x_2=c/a$
  como ecuaciones donde el parámetro es la incógnita, y resolverlas para hallar su valor.
explicacion: '### Definición formal


  Si una ecuación $ax^2+bx+c=0$ contiene un parámetro $k$ en alguno de sus coeficientes, y se conoce una condición
  sobre sus raíces (su suma, su producto, o el valor de una de ellas), esa condición se traduce en una ecuación
  en $k$ usando $x_1+x_2=-b/a$ o $x_1 \cdot x_2=c/a$, la cual se resuelve para determinar $k$.


  ### Desarrollo didáctico


  El procedimiento combina el conocimiento algebraico de las relaciones de Vieta con la resolución de una ecuación
  auxiliar en el parámetro, distinta de la ecuación cuadrática original.


  Si las raíces de $x^2-kx+8=0$ suman $6$, se plantea $x_1+x_2=-\dfrac{-k}{1}=k=6$, por lo que $k=6$.'
procedimiento:
- 'Paso 1: Identifica qué condición se da sobre las raíces (suma, producto, o el valor de una raíz).'
- 'Paso 2: Traduce esa condición usando $x_1+x_2=-b/a$ o $x_1 \cdot x_2=c/a$, dejando el parámetro como incógnita.'
- 'Paso 3: Resuelve la ecuación resultante para determinar el valor del parámetro.'
ejemplos:
- titulo: Determinación de parámetro a partir de la suma
  enunciado: 'Las raíces de $x^2-(m+1)x+12=0$ suman $7$. Determina el valor de $m$.'
  solucion_pasos:
  - '$x_1+x_2=-\dfrac{-(m+1)}{1}=m+1=7$.'
  - '$m=6$.'
- titulo: Determinación de parámetro a partir del producto
  enunciado: 'Las raíces de $x^2-5x+(p-2)=0$ tienen producto $6$. Determina el valor de $p$.'
  solucion_pasos:
  - '$x_1 \cdot x_2=\dfrac{p-2}{1}=6$.'
  - '$p=8$.'
- titulo: ¿Las relaciones de Vieta permiten hallar un parámetro sin resolver completamente la ecuación cuadrática?
  enunciado: ¿Las relaciones de Vieta permiten hallar un parámetro sin resolver completamente la ecuación cuadrática?
  respuesta: Sí
  solucion_pasos:
  - Basta con plantear la relación de suma o producto como una ecuación auxiliar en el parámetro.
- titulo: ¿Se puede usar la relación de Vieta si solo se conoce el valor de una raíz, no ambas?
  enunciado: ¿Se puede usar la relación de Vieta si solo se conoce el valor de una raíz, no ambas?
  respuesta: Sí
  solucion_pasos:
  - Conociendo una raíz y usando la suma o producto, se puede despejar tanto la otra raíz como el parámetro.
errores_frecuentes:
- Confundir cuál relación de Vieta (suma o producto) corresponde a la condición dada en el problema.
- Cometer errores de signo al identificar $b$ cuando el coeficiente involucra directamente al parámetro con signo
  negativo.
- Resolver la ecuación cuadrática completa en vez de usar directamente las relaciones de Vieta, un camino más
  largo e innecesario.
- No verificar que el valor del parámetro obtenido mantenga la ecuación como cuadrática (es decir, que $a$ siga
  siendo distinto de cero).
