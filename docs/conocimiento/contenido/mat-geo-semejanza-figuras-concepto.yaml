semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.SEMEJANZA_FIGURAS_CONCEPTO
titulo: Concepto de semejanza de figuras como igualdad de forma y posible diferencia de tamaño
objetivo: Comprender la semejanza de figuras como una relación en la que dos figuras tienen la misma forma,
  aunque puedan diferir en tamaño.
introduccion: 'A diferencia de la congruencia, donde dos figuras deben coincidir exactamente en forma
  y tamaño, existe una relación más amplia que solo exige que la forma sea la misma: la semejanza.'
resumen: Dos figuras son semejantes si tienen exactamente la misma forma, aunque su tamaño pueda ser distinto.
explicacion: '![Semejanza: misma forma, distinto tamaño](/static/img/geometria/congruencia-semejanza/semejanza-figuras-concepto.svg)


  ### Definición formal


  Dos figuras son semejantes si una es una ampliación o reducción exacta de la otra (posiblemente combinada
  con traslación, rotación o reflexión), de modo que conserven la misma forma.


  ### Desarrollo didáctico


  Una fotografía y su versión ampliada son semejantes: cada detalle mantiene las mismas proporciones relativas
  entre sí, aunque el tamaño total cambie. Toda figura congruente es también semejante (con tamaño idéntico),
  pero no toda figura semejante es congruente.'
procedimiento:
- 'Paso 1: Observa las dos figuras que quieres comparar.'
- 'Paso 2: Verifica si una puede obtenerse ampliando o reduciendo la otra, manteniendo la misma forma.'
- 'Paso 3: Si la forma se mantiene (aunque el tamaño cambie), las figuras son semejantes.'
ejemplos:
- titulo: Comparar una foto y su ampliación
  enunciado: Una fotografía se amplía al doble de su tamaño original.
  solucion_pasos:
  - La foto original y la ampliada son semejantes, ya que mantienen la misma forma.
- titulo: Distinguir semejanza de congruencia
  enunciado: Dos triángulos tienen la misma forma pero uno es el doble de grande que el otro.
  solucion_pasos:
  - Son semejantes, pero no congruentes, ya que difieren en tamaño.
- titulo: ¿Toda figura congruente es también semejante?
  respuesta: Sí
  solucion_pasos:
  - Sí, la congruencia es un caso particular de semejanza, con tamaño idéntico.
- titulo: ¿Toda figura semejante es también congruente?
  respuesta: 'No'
  solucion_pasos:
  - No, solo lo es si además tienen el mismo tamaño.
errores_frecuentes:
- Confundir semejanza con congruencia, exigiendo igualdad de tamaño.
- Creer que dos figuras con la misma forma pero orientación distinta no pueden ser semejantes.
- Asumir que basta con que las figuras 'se vean parecidas' sin verificar proporciones exactas.
fuente: 'Fuente: Moraleja 152, Cid 117.'
estado: publicado
