semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.FRECUENCIA_RELATIVA_B
titulo: Interpretación de $b$ como frecuencia relativa
objetivo: Interpretar el parámetro $b$ como el número de ciclos completos que la función realiza en un intervalo
  de longitud $2\pi$.
introduccion: Además de determinar el periodo, el parámetro $b$ tiene una interpretación directa relacionada con
  cuántas oscilaciones completas ocurren en un tramo fijo.
resumen: El parámetro $b$ en $f(x)=\sin(bx)$ representa cuántos **ciclos completos** ocurren en un intervalo de
  longitud $2\pi$ (comparado con el ciclo único de la función básica).
explicacion: '### Definición formal


  Como el periodo es $T=2\pi/|b|$, en un intervalo de longitud $2\pi$ caben $2\pi/T=|b|$ periodos completos.
  Por eso, $|b|$ se interpreta como la cantidad de oscilaciones completas dentro de ese intervalo de referencia.


  ### Desarrollo didáctico


  $f(x)=\sin(3x)$ completa $3$ ciclos en el intervalo $[0,2\pi]$, mientras que $\sin(x)$ completa solo $1$. Esto
  se relaciona directamente con que su periodo, $2\pi/3$, cabe exactamente $3$ veces en $2\pi$.'
procedimiento:
- 'Paso 1: Identifica el valor de $|b|$ en la función.'
- 'Paso 2: Interpreta ese valor como el número de ciclos completos en un intervalo de longitud $2\pi$.'
- 'Paso 3: Relaciona esta interpretación con el cálculo directo del periodo si es necesario.'
ejemplos:
- titulo: Interpretación de $b=5$
  enunciado: '¿Cuántos ciclos completa $f(x)=\cos(5x)$ en el intervalo $[0,2\pi]$?'
  solucion_pasos:
  - Se identifica $b=5$.
  - Completa $5$ ciclos en ese intervalo.
- titulo: Relación entre frecuencia y periodo
  enunciado: 'Si una función completa $4$ ciclos en $[0,2\pi]$, ¿cuál es su periodo?'
  solucion_pasos:
  - Se identifica que $b=4$.
  - 'El periodo es $T=2\pi/4=\pi/2$.'
- titulo: ¿Un valor mayor de $b$ implica más oscilaciones en el mismo intervalo?
  enunciado: ¿Un valor mayor de $|b|$ implica que la función oscila más veces en el mismo intervalo de longitud
    $2\pi$?
  respuesta: Sí
  solucion_pasos:
  - Es la interpretación directa de $b$ como número de ciclos.
- titulo: ¿$b=1$ corresponde a la función básica sin transformar el periodo?
  enunciado: ¿Un valor $b=1$ corresponde a completar exactamente un ciclo en $[0,2\pi]$, como la función básica?
  respuesta: Sí
  solucion_pasos:
  - Es el caso de referencia, correspondiente a la función básica sin modificar el periodo.
errores_frecuentes:
- Confundir el número de ciclos con el valor del periodo directamente.
- No relacionar correctamente $|b|$ con la cantidad de oscilaciones en el intervalo de referencia.
- Suponer que un $b$ fraccionario significa menos de un ciclo completo sin verificar el cálculo.
- Confundir esta interpretación con el efecto de la amplitud sobre la altura de la curva.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
