semantic_id: MAT.NUM.REALES.RECTA_NUMERICA
titulo: Representación de números reales en la recta numérica
objetivo: Ubicar racionales e irracionales en la recta.
introduccion: Aunque un irracional tenga infinitas cifras, ocupa una posición exacta. Aproximaciones sucesivas
  permiten encerrarlo en intervalos cada vez más pequeños de la recta.
resumen: Cada real se representa mediante un único punto de la recta numérica. La posición expresa simultáneamente
  orden y distancia respecto de cero.
explicacion: 'Cada real se representa mediante un único punto de la recta numérica.


  La situación “\(\sqrt2\approx1.414\) se ubica entre \(1.4\) y \(1.5\), a la derecha de \(1\)” permite
  comprobar, y no solo memorizar, que la posición expresa simultáneamente orden y distancia respecto de
  cero'
procedimiento:
- 'Paso 1: Obtén una aproximación suficiente o encierra el número entre valores conocidos.'
- 'Paso 2: Localiza el intervalo entre enteros y subdivídelo según la precisión requerida.'
- 'Paso 3: Marca el punto y verifica su orden respecto de los números vecinos.'
ejemplos:
- titulo: Aplicación razonada — Representación de números reales en la recta numérica
  enunciado: \(\sqrt2\approx1.414\) se ubica entre \(1.4\) y \(1.5\), a la derecha de \(1\).
  solucion_pasos:
  - Obtén una aproximación suficiente o encierra el número entre valores conocidos.
  - Localiza el intervalo entre enteros y subdivídelo según la precisión requerida.
  - Marca el punto y verifica su orden respecto de los números vecinos.
- titulo: Revisión de una solución — Representación de números reales en la recta numérica
  enunciado: Una solución aplica “Localiza el intervalo entre enteros y subdivídelo según la precisión
    requerida.”, pero termina sin comprobar que la posición expresa simultáneamente orden y distancia
    respecto de cero. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define representación de números reales en la recta numérica: cada real
    se representa mediante un único punto de la recta numérica.'
  - Obtén una aproximación suficiente o encierra el número entre valores conocidos.
  - 'Completa la revisión con este control: Marca el punto y verifica su orden respecto de los números
    vecinos.'
- titulo: ¿Se cumple que la posición expresa simultáneamente orden y distancia respecto de cero? — Representación
    de números reales en la recta numérica
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que cada real se representa mediante un único punto de la recta
    numérica.
  - El caso “\(\sqrt2\approx1.414\) se ubica entre \(1.4\) y \(1.5\), a la derecha de \(1\)” satisface
    esa condición.
  - Marca el punto y verifica su orden respecto de los números vecinos.
- titulo: ¿Es válido omitir el paso “Obtén una aproximación suficiente o encierra el número entre valores
    conocidos”? — Representación de números reales en la recta numérica
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de representación de números reales en la recta numérica.
  - 'Omitirlo puede volver inválida la acción siguiente: Localiza el intervalo entre enteros y subdivídelo
    según la precisión requerida.'
  - 'La solución debe terminar de este modo: Marca el punto y verifica su orden respecto de los números
    vecinos.'
errores_frecuentes:
- 'Confundir representación de números reales en la recta numérica con otro concepto y omitir este inicio:
  Obtén una aproximación suficiente o encierra el número entre valores conocidos.'
- Aplicar mecánicamente “Localiza el intervalo entre enteros y subdivídelo según la precisión requerida.”
  sin revisar las condiciones de la definición.
- Tomar “\(\sqrt2\approx1.414\) se ubica entre \(1.4\) y \(1.5\), a la derecha de \(1\)” como una igualdad
  aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la posición expresa simultáneamente orden y distancia
  respecto de cero”.
- 'Terminar el desarrollo sin realizar este control: Marca el punto y verifica su orden respecto de los
  números vecinos.'
