semantic_id: MAT.ALG.FUNDAMENTOS.CONCEPTO_CONSTANTE
titulo: Concepto de constante algebraica
objetivo: Comprender la diferencia entre una variable y una constante en una expresión algebraica.
introduccion: En el teatro de las matemáticas, algunos actores cambian de disfraz en cada obra (las variables),
  pero otros siempre interpretan el mismo papel, pase lo que pase.
resumen: Una **Constante** es un valor fijo que no cambia bajo ninguna circunstancia dentro de un problema.
  Se representa habitualmente mediante números explícitos (ej. $5$, $-3$, $\pi$) o mediante las primeras
  letras del alfabeto ($a$, $b$, $c$) cuando generalizamos una fórmula.
explicacion: '### Definición formal


  Una constante no muta. Es la roca fija alrededor de la cual el resto de las variables (los ríos) fluyen
  y cambian.


  ### Desarrollo didáctico


  A diferencia de las variables (usualmente $x$, $y$, $z$) que están esperando que les asignes un valor,
  las constantes nacen con su valor definido.

  En la fórmula del perímetro de una circunferencia $P = 2 \cdot \pi \cdot r$:

  - El $2$ es una constante numérica. Jamás dejará de ser dos.

  - $\pi$ es una constante (aprox. 3.14159.).

  - La $r$ (radio) es la variable, porque puedes tener círculos grandes o pequeños.


  En la expresión genérica $ax^2 + bx + c$, por convención matemática, asumimos que $a, b, c$ son constantes
  (números fijos que rellenaremos luego) y la $x$ es la única variable que mutará.'
procedimiento:
- 'Paso 1: Identifica los números explícitos o constantes universales (como pi o e).'
- 'Paso 2: Según el contexto del problema, identifica letras de inicio del abecedario (a, b, k) que funcionen
  como parámetros fijos.'
- 'Paso 3: Distínguelas de las letras finales (x, y, z) o variables que cambian su valor dinámicamente.'
ejemplos:
- titulo: El elenco de la fórmula
  enunciado: En la fórmula física de la velocidad en caída libre v = g*t (donde g es la gravedad de la
    Tierra y t el tiempo), identifica la constante y la variable.
  solucion_pasos:
  - La gravedad de la Tierra 'g' no cambia, es un valor fijo (9.8 m/s^2). Es la constante.
  - El tiempo 't' fluye y cambia constantemente. Es la variable.
  - La velocidad 'v' cambia dependiendo de 't', por lo que también es variable.
- titulo: Un programador diseña un algoritmo para calcular el costo de un viaje en taxi. Escribe el mo
  enunciado: 'Un programador diseña un algoritmo para calcular el costo de un viaje en taxi. Escribe el
    modelo: $Costo = BajadaDeBandera + (PrecioPorKm \cdot KmRecorridos)$. Para una ciudad particular donde
    las tarifas están reguladas por ley y no cambian, ¿qué elementos del modelo deben ser declarados como
    ''constantes'' en el código? (v1)


    Opciones: A) La Bajada de Bandera y el Precio por Km. · B) Únicamente los Kilómetros Recorridos. ·
    C) El Costo Total y los Kilómetros Recorridos. · D) Todas las letras son variables por definición
    en un programa.'
  solucion_pasos:
  - La tarifa de inicio y el costo por kilómetro son fijos para la ciudad (son las reglas del juego).
    Lo único que varía entre un pasajero y otro son los kilómetros recorridos (variable independiente)
    y el costo final (variable dependiente).
  - 'Respuesta: La Bajada de Bandera y el Precio por Km.'
- titulo: 'Respecto de «Concepto de constante algebraica»: ¿Describe adecuadamente el concepto esta fra'
  enunciado: 'Respecto de «Concepto de constante algebraica»: ¿Describe adecuadamente el concepto esta
    frase? «Una **Constante** es un valor fijo que no cambia bajo ninguna circunstancia dentro de un problema»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una **Constante** es un valor fijo que no cambia
    bajo ninguna circunstancia dentro de un problema.'
- titulo: 'Respecto de «Concepto de constante algebraica»: ¿Se puede aceptar esta afirmación? «Creer qu'
  enunciado: 'Respecto de «Concepto de constante algebraica»: ¿Se puede aceptar esta afirmación? «Creer
    que todas las letras son variables por el simple hecho de ser letras. A veces usamos letras para guardar
    números constantes»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una **Constante** es un valor fijo que no cambia
    bajo ninguna circunstancia dentro de un problema.'
errores_frecuentes:
- Creer que todas las letras son variables por el simple hecho de ser letras. A veces usamos letras para
  guardar números constantes.
- Confundir constante con coeficiente. El coeficiente es un tipo específico de constante que multiplica
  a una variable.
- La constante siempre se representa con un número y jamás puede ser representada con una letra.
- La constante debe ser obligatoriamente un número positivo, mientras la variable puede ser negativa.
- La constante es el resultado final de la ecuación.
fuente: Álgebra de Baldor.
