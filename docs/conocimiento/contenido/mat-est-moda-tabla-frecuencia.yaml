semantic_id: MAT.EST.MODA_ANALISIS.TABLA_FRECUENCIA
titulo: Identificar la moda en tablas de frecuencia simple
objetivo: Identificar la moda directamente a partir de una tabla de frecuencias, buscando el valor con
  la frecuencia más alta registrada.
introduccion: Cuando los datos ya están organizados en una tabla, encontrar la moda es tan simple como
  localizar la fila con mayor frecuencia.
resumen: En una tabla de frecuencias, la moda corresponde al valor x cuya frecuencia f es la más alta
  de toda la tabla.
explicacion: '![Moda en tablas de frecuencia simple](/static/img/estadistica/moda/moda-tabla-frecuencia.svg)


  ### Definición formal


  En una tabla con valores $x_i$ y frecuencias $f_i$, la moda es el valor $x_i$ correspondiente a la fila
  con el mayor valor de $f_i$.


  ### Desarrollo didáctico


  Con la tabla x=4,f=2; x=5,f=5; x=6,f=3, la fila con mayor frecuencia es x=5 (f=5), por lo que la moda
  es 5.'
procedimiento:
- 'Paso 1: Observa la columna de frecuencias (f) de la tabla.'
- 'Paso 2: Identifica cuál es la frecuencia más alta registrada en toda la tabla.'
- 'Paso 3: La moda es el valor x correspondiente a esa fila con la frecuencia máxima.'
ejemplos:
- titulo: Determinar la moda desde una tabla de 3 filas
  enunciado: x=4,f=2; x=5,f=5; x=6,f=3.
  solucion_pasos:
  - La mayor frecuencia es 5, correspondiente a x=5. Moda=5.
- titulo: Determinar la moda de una tabla de notas
  enunciado: x=4,f=3; x=5,f=8; x=6,f=6; x=7,f=3.
  solucion_pasos:
  - La mayor frecuencia es 8, correspondiente a x=5. Moda=5.
- titulo: ¿Se puede leer la moda directamente de una tabla de frecuencia bien ordenada?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con identificar la fila con la frecuencia más alta.
- titulo: ¿Puede haber más de una moda si dos filas comparten la frecuencia máxima en una tabla?
  respuesta: Sí
  solucion_pasos:
  - Sí, en ese caso la tabla representaría un conjunto bimodal (o multimodal).
errores_frecuentes:
- Confundir la columna de valores (x) con la de frecuencias (f) al buscar la fila con mayor frecuencia.
- No revisar toda la tabla completa antes de determinar cuál fila tiene realmente la frecuencia máxima.
- Reportar el valor de la frecuencia máxima como si fuera la moda, en vez de reportar el valor x correspondiente.
fuente: 'Elaboración propia (referencia: Moraleja 359).'
estado: publicado
