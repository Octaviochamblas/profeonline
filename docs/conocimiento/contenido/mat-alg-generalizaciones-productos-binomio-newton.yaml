errores_frecuentes:
- Olvidar que $k$ empieza en 0, por lo que el 'término $m$' corresponde a $k = m-1$.
- $n!$.
- Para «De acuerdo con el Teorema del Binomio, la suma de todos los coeficientes del desarrollo de $(1+1)^n$ es:»,
  la respuesta correcta es $0$.
- Para «De acuerdo con el Teorema del Binomio, la suma de todos los coeficientes del desarrollo de $(1+1)^n$ es:»,
  la respuesta correcta es $n^2$.
- La afirmación «$2^n$» no es válida en este contenido.
