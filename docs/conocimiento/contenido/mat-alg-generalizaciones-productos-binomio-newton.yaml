  enunciado: 'Respecto de «Formalización del Binomio de Newton»: ¿Es válida esta afirmación? «Olvidar que $k$ empieza
    en 0, por lo que el ''término $m$'' corresponde a $k = m-1$»'
  respuesta: 'No'
