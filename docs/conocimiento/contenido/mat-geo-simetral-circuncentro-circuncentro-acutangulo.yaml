semantic_id: MAT.GEO.SIMETRAL_CIRCUNCENTRO.CIRCUNCENTRO_ACUTANGULO
titulo: Ubicación interior del circuncentro en un triángulo acutángulo
objetivo: Reconocer que el circuncentro de un triángulo acutángulo siempre se ubica en el interior de
  la figura.
introduccion: La posición del circuncentro respecto al triángulo depende del tipo de triángulo; en el
  caso acutángulo, cae siempre dentro.
resumen: En todo triángulo acutángulo, el circuncentro se ubica en el interior del triángulo.
explicacion: '![Circuncentro interior en triángulo acutángulo](/static/img/geometria/elementos-secundarios/simetral-circuncentro-circuncentro-acutangulo.svg)


  ### Definición formal


  Si los tres ángulos interiores de un triángulo son agudos, el circuncentro O se ubica en el interior
  de la región triangular.


  ### Desarrollo didáctico


  En un triángulo acutángulo, las tres simetrales se cruzan dentro de la figura, a diferencia de lo que
  ocurre en triángulos obtusángulos.'
procedimiento:
- 'Paso 1: Verifica que los tres ángulos del triángulo sean agudos.'
- 'Paso 2: Traza las simetrales y observa que se cruzan dentro de la figura.'
- 'Paso 3: Concluye que el circuncentro está dentro del triángulo.'
ejemplos:
- titulo: Ubicar el circuncentro en un acutángulo
  enunciado: Un triángulo tiene ángulos 70°, 60° y 50°.
  solucion_pasos:
  - Es acutángulo, así que su circuncentro está en el interior de la figura.
- titulo: Comparar con el ortocentro
  enunciado: ¿El circuncentro y el ortocentro de un acutángulo están en la misma región?
  solucion_pasos:
  - Sí, ambos están dentro del triángulo cuando este es acutángulo.
- titulo: ¿El circuncentro de un triángulo acutángulo está siempre dentro?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad general de los triángulos acutángulos.
- titulo: ¿Puede el circuncentro de un acutángulo coincidir con un vértice?
  respuesta: 'No'
  solucion_pasos:
  - No, eso solo ocurre en casos degenerados, no en triángulos acutángulos válidos.
errores_frecuentes:
- Creer que el circuncentro siempre está dentro del triángulo, sin importar su tipo.
- Confundir la condición 'acutángulo' con 'equilátero'.
- No verificar los tres ángulos antes de concluir que el triángulo es acutángulo.
fuente: Elaboración propia.
estado: publicado
