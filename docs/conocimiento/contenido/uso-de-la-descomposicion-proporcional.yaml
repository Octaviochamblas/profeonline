semantic_id: MAT.NUM.PROPORCIONES.DESCOMPOSICION_PROPORCIONAL
titulo: Uso de la descomposición proporcional
objetivo: Aplicar la propiedad de descomposición de proporciones.
introduccion: De forma análoga a la suma, a veces necesitamos restar cantidades de nuestra proporción
  para hallar la solución, por ejemplo, cuando conocemos la diferencia de dos valores.
resumen: La descomposición indica que en $a/b = c/d$, se cumple que $(a-b)/b = (c-d)/d$.
explicacion: 'La **descomposición proporcional** es la propiedad hermana de la composición. Nos permite
  restar el denominador del numerador en ambas razones de una proporción sin que la igualdad se rompa.


  Demostración rápida:

  - Si $\frac{a}{b} = \frac{c}{d}$, restamos 1 a cada lado: $\frac{a}{b} - 1 = \frac{c}{d} - 1$

  - Al restar fracciones queda: $\frac{a-b}{b} = \frac{c-d}{d}$'
procedimiento:
- 'Paso 1: Toma la proporción original.'
- 'Paso 2: Resta el término inferior al superior en ambas razones.'
- 'Paso 3: Mantén los mismos términos inferiores originales.'
ejemplos:
- titulo: Aplicando descomposición
  enunciado: Si $10/2 = 20/4$, demuestra la descomposición.
  solucion_pasos:
  - 'Restamos el denominador: $(10-2)/2 = 8/2 = 4$.'
  - 'Restamos en el otro lado: $(20-4)/4 = 16/4 = 4$.'
  - La igualdad $4=4$ se mantiene.
errores_frecuentes:
- Restar el numerador del denominador en lugar del denominador del numerador (produce signos opuestos).
- Aplicar composición en un lado y descomposición en el otro.
- Olvidar mantener el denominador original.
- Restar los numeradores entre sí (eso es la propiedad de la resta de antecedentes).
fuente: Currículum Nacional MINEDUC.
estado: publicado
