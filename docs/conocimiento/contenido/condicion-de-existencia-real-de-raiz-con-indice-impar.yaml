semantic_id: MAT.NUM.RAICES_CONCEPTO.EXISTENCIA_INDICE_IMPAR
titulo: Condición de existencia real de raíz con índice impar
objetivo: Calcular raíces impares de radicandos positivos o negativos.
introduccion: A diferencia de una raíz cuadrada, una raíz cúbica puede atravesar valores negativos sin
  abandonar los reales. El signo del resultado sigue al del radicando.
resumen: Una raíz de índice impar admite cualquier radicando real. Las potencias impares conservan el
  signo y cubren todos los valores reales.
explicacion: 'Una raíz de índice impar admite cualquier radicando real.


  En el caso “\(\sqrt[3]{-125}=-5\)” esta idea se hace visible: las potencias impares conservan el signo
  y cubren todos los valores reales'
procedimiento:
- 'Paso 1: Reconoce que el índice sea impar.'
- 'Paso 2: Busca un número con el mismo signo cuyo exponente reproduzca el radicando.'
- 'Paso 3: Eleva el resultado al índice para verificar tanto magnitud como signo.'
ejemplos:
- titulo: Aplicación razonada — Condición de existencia real de raíz con índice impar
  enunciado: \(\sqrt[3]{-125}=-5\).
  solucion_pasos:
  - Reconoce que el índice sea impar.
  - Busca un número con el mismo signo cuyo exponente reproduzca el radicando.
  - Eleva el resultado al índice para verificar tanto magnitud como signo.
- titulo: Revisión de una solución — Condición de existencia real de raíz con índice impar
  enunciado: Una solución aplica “Busca un número con el mismo signo cuyo exponente reproduzca el radicando.”,
    pero termina sin comprobar que las potencias impares conservan el signo y cubren todos los valores
    reales. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define condición de existencia real de raíz con índice impar: una raíz
    de índice impar admite cualquier radicando real.'
  - Reconoce que el índice sea impar.
  - 'Completa la revisión con este control: Eleva el resultado al índice para verificar tanto magnitud
    como signo.'
- titulo: ¿Se cumple que las potencias impares conservan el signo y cubren todos los valores reales? —
    Condición de existencia real de raíz con índice impar
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una raíz de índice impar admite cualquier radicando real.
  - El caso “\(\sqrt[3]{-125}=-5\)” satisface esa condición.
  - Eleva el resultado al índice para verificar tanto magnitud como signo.
- titulo: ¿Es válido omitir el paso “Reconoce que el índice sea impar”? — Condición de existencia real
    de raíz con índice impar
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de condición de existencia real de raíz con índice
    impar.
  - 'Omitirlo puede volver inválida la acción siguiente: Busca un número con el mismo signo cuyo exponente
    reproduzca el radicando.'
  - 'La solución debe terminar de este modo: Eleva el resultado al índice para verificar tanto magnitud
    como signo.'
errores_frecuentes:
- 'Confundir condición de existencia real de raíz con índice impar con otro concepto y omitir este inicio:
  Reconoce que el índice sea impar.'
- Aplicar mecánicamente “Busca un número con el mismo signo cuyo exponente reproduzca el radicando.” sin
  revisar las condiciones de la definición.
- Tomar “\(\sqrt[3]{-125}=-5\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “las potencias impares conservan el signo y cubren
  todos los valores reales”.
- 'Terminar el desarrollo sin realizar este control: Eleva el resultado al índice para verificar tanto
  magnitud como signo.'
