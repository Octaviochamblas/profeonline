semantic_id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_HERON
titulo: 'Fórmula de Herón: área a partir de los tres lados'
objetivo: Aplicar la fórmula de Herón para calcular el área de un triángulo conociendo únicamente sus
  tres lados.
introduccion: ¿Qué hacer cuando no se conoce la altura de un triángulo, pero sí sus tres lados? La fórmula
  de Herón resuelve exactamente ese problema.
resumen: 'La fórmula de Herón permite calcular el área de un triángulo a partir de sus tres lados y su
  semiperímetro: $A=\sqrt{s(s-a)(s-b)(s-c)}$.'
explicacion: '![Fórmula de Herón](/static/img/geometria/areas-pitagoras/areas-triangulos-formula-heron.svg)


  ### Definición formal


  Si un triángulo tiene lados $a$, $b$, $c$ y semiperímetro $s=\frac{a+b+c}{2}$, su área es $A=\sqrt{s(s-a)(s-b)(s-c)}$.


  ### Desarrollo didáctico


  Un triángulo de lados 5, 6 y 7 tiene semiperímetro $s=9$, y área $A=\sqrt{9(9-5)(9-6)(9-7)}=\sqrt{9\times4\times3\times2}=\sqrt{216}\approx14,7$.
  Esta fórmula es especialmente útil cuando no se conoce (ni es fácil de calcular) la altura.'
procedimiento:
- 'Paso 1: Calcula el semiperímetro s = (a+b+c)/2.'
- 'Paso 2: Calcula las tres diferencias (s-a), (s-b) y (s-c).'
- 'Paso 3: Multiplica s por esas tres diferencias y calcula la raíz cuadrada del resultado.'
ejemplos:
- titulo: Calcular con lados 5, 6 y 7
  enunciado: Un triángulo tiene lados 5, 6 y 7 cm.
  solucion_pasos:
  - s=9; A=√(9×4×3×2)=√216≈14,7 cm².
- titulo: Calcular con lados 3, 4 y 5
  enunciado: Un triángulo tiene lados 3, 4 y 5 cm (rectángulo).
  solucion_pasos:
  - s=6; A=√(6×3×2×1)=√36=6 cm², coincide con (3×4)/2=6.
- titulo: ¿Se necesita conocer la altura para usar Herón?
  respuesta: 'No'
  solucion_pasos:
  - 'No, esa es justamente su ventaja: solo requiere los tres lados.'
- titulo: ¿El resultado dentro de la raíz puede ser negativo si los lados forman un triángulo válido?
  respuesta: 'No'
  solucion_pasos:
  - No, si los tres lados cumplen la desigualdad triangular, el producto siempre es positivo.
errores_frecuentes:
- Calcular mal el semiperímetro antes de aplicar la fórmula.
- Olvidar la raíz cuadrada final y dejar el resultado sin ella.
- Restar los lados en el orden incorrecto (por ejemplo a-s en vez de s-a).
fuente: Elaboración propia.
estado: publicado
