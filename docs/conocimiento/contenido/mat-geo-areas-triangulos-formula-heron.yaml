semantic_id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_HERON
titulo: 'Fórmula de Herón: A = √(s(s−a)(s−b)(s−c))'
objetivo: Reconocer la fórmula de Herón como el método para calcular el área de un triángulo conociendo
  únicamente sus tres lados.
introduccion: A veces no conoces la altura de un triángulo, solo sus tres lados. Para esos casos existe una
  fórmula especial, descubierta por el matemático griego Herón, que permite calcular el área sin necesitar
  la altura.
resumen: 'La fórmula de Herón calcula el área de un triángulo a partir de sus tres lados $a$, $b$, $c$ y su
  semiperímetro $s$: $A=\sqrt{s(s-a)(s-b)(s-c)}$.'
explicacion: '![Fórmula de Herón](/static/img/geometria/areas-pitagoras/areas-triangulos-formula-heron.svg)


  ### Definición formal


  Dado un triángulo de lados $a$, $b$, $c$ y semiperímetro $s=\frac{a+b+c}{2}$, su área se calcula como

  $A=\sqrt{s(s-a)(s-b)(s-c)}$.


  ### Desarrollo didáctico


  Esta fórmula es especialmente útil cuando no se conoce la altura del triángulo, ya que solo requiere las

  tres longitudes de sus lados para obtener el área directamente.'
procedimiento:
- 'Paso 1: Calcula el semiperímetro $s=\frac{a+b+c}{2}$.'
- 'Paso 2: Calcula las diferencias $s-a$, $s-b$ y $s-c$.'
- 'Paso 3: Multiplica $s$ por esas tres diferencias y calcula la raíz cuadrada del resultado.'
ejemplos:
- titulo: Identificar los datos necesarios
  enunciado: ¿Qué datos del triángulo se necesitan para aplicar la fórmula de Herón?
  solucion_pasos:
  - Se necesitan únicamente los tres lados del triángulo, $a$, $b$ y $c$.
  - No se requiere conocer ninguna altura ni ningún ángulo.
- titulo: Reconocer el rol del semiperímetro
  enunciado: ¿Por qué es necesario calcular primero el semiperímetro antes de aplicar la fórmula de Herón?
  solucion_pasos:
  - Porque el semiperímetro $s$ aparece directamente dentro de la fórmula, junto con los tres lados.
  - Sin calcular $s$ primero, no es posible evaluar la expresión $\sqrt{s(s-a)(s-b)(s-c)}$.
- titulo: ¿La fórmula de Herón usa solo los tres lados del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es su principal ventaja frente a la fórmula base por altura.
- titulo: ¿La fórmula de Herón requiere conocer un ángulo del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - 'No, solo requiere los tres lados y el semiperímetro calculado a partir de ellos.'
errores_frecuentes:
- Olvidar calcular el semiperímetro antes de aplicar la fórmula.
- Confundir el orden de las restas $s-a$, $s-b$, $s-c$.
- Olvidar aplicar la raíz cuadrada al producto final.
- Intentar usar la fórmula sin conocer los tres lados completos del triángulo.
- Confundir esta fórmula con la del área por base y altura.
fuente: 'Elaboración propia (referencia: Moraleja 46, Cid 33).'
estado: publicado
