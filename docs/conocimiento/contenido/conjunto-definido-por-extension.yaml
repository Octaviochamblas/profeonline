semantic_id: MAT.FUND.CONJUNTOS_BASICOS.CONJUNTO_EXTENSION
titulo: Conjunto definido por extensión
objetivo: Comprender conjunto por extensión y aplicarlo correctamente en situaciones básicas.
introduccion: 'El estudio de conjunto por extensión ayuda a organizar ideas y evitar errores frecuentes
  de interpretación.


  Cuando comprendemos este recurso, podemos leer mejor enunciados, representar conjuntos con precisión
  y justificar conclusiones matemáticas con lenguaje claro.'
resumen: Un conjunto por extensión se describe listando uno a uno sus elementos. Además, la forma por
  extensión muestra directamente qué elementos integran el conjunto.
explicacion: 'Un conjunto por extensión se describe listando uno a uno sus elementos. Esta idea aparece
  de manera natural cuando trabajamos con lenguaje de conjuntos o con representaciones formales.


  Una forma útil de reconocerla es recordar que la forma por extensión muestra directamente qué elementos
  integran el conjunto.


  Por ejemplo: A = {1, 2, 3, 4} es una descripción por extensión.'
procedimiento: '1. Identifica qué objetos o expresiones intervienen en la situación.

  2. Determina qué idea de teoría de conjuntos se está usando.

  3. Verifica la notación o la propiedad relevante del concepto.

  4. Concluye usando una representación correcta del conjunto.'
ejemplos:
- tipo: A
  titulo: Identificar el concepto en contexto
  enunciado: Explica por qué el caso “A = {1, 2, 3, 4} es una descripción por extensión.” corresponde
    a conjunto por extensión.
  solucion_pasos: '1. Observa qué objetos o expresiones aparecen.

    2. Compáralos con la definición: un conjunto por extensión se describe listando uno a uno sus elementos.

    3. Concluye que el caso sí corresponde a conjunto por extensión.'
- tipo: A
  titulo: Recordar la idea clave
  enunciado: 'Justifica la afirmación: “La forma por extensión muestra directamente qué elementos integran
    el conjunto.”.'
  solucion_pasos: '1. Parte de la definición del concepto.

    2. Relaciona esa definición con la propiedad indicada.

    3. Explica por qué la afirmación es correcta en este recurso.'
- tipo: B
  titulo: Verificar una afirmación
  respuesta: Sí
  solucion_pasos: Sí. El ejemplo “A = {1, 2, 3, 4} es una descripción por extensión.” es una aplicación
    válida de conjunto por extensión.
- tipo: B
  titulo: Descartar una confusión
  respuesta: 'No'
  solucion_pasos: 'No. Conjunto por extensión no debe confundirse con otra noción distinta; su definición
    correcta es: un conjunto por extensión se describe listando uno a uno sus elementos.'
errores_frecuentes:
- Confundir conjunto por extensión con otro concepto cercano del mismo subtema.
- Usar la notación de manera informal y sacar conclusiones sin revisar la definición.
- Mirar solo un ejemplo particular y olvidar la idea general del recurso.
- Interpretar el contexto sin fijarse en qué conjunto, dominio o representación se está usando.
- Responder de memoria sin comprobar la propiedad clave que caracteriza al concepto.
fuente: Lipschutz, S. (2011). Teoría de conjuntos. McGraw-Hill.
estado: publicado
