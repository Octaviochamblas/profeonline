semantic_id: MAT.EST.NORMAL_BASE.REGLA_95
titulo: Aplicar la regla empírica del 95% en torno a la media
objetivo: Aplicar la regla empírica que indica que aproximadamente el 95% de los datos de una distribución normal se
  encuentra a dos desviaciones estándar de la media.
introduccion: Si te alejas un poco más del centro de la curva normal, dos desviaciones estándar hacia cada lado, ya
  cubres casi todos los datos posibles, un 95%.
resumen: Aproximadamente el 95% de los datos de una distribución normal se encuentra dentro del intervalo
  $[\mu-2\sigma, \mu+2\sigma]$.
explicacion: '![Regla del 95%](/static/img/estadistica/normbase/normbase-regla-95.svg)


  ### Definición formal


  En toda distribución normal, se cumple que $P(\mu-2\sigma\leq X\leq \mu+2\sigma)\approx 0{,}95$, es decir, el 95%

  de los datos está a menos de dos desviaciones estándar de la media.


  ### Desarrollo didáctico


  Esta regla es especialmente útil para identificar valores poco comunes: un dato fuera de este intervalo se

  considera relativamente inusual, ya que solo el 5% de los datos cae fuera de él.'
procedimiento:
- 'Paso 1: Calcula los valores $\mu-2\sigma$ y $\mu+2\sigma$.'
- 'Paso 2: Reconoce ese intervalo como el rango de dos desviaciones estándar en torno a la media.'
- 'Paso 3: Aplica la regla empírica: aproximadamente el 95% de los datos está en ese intervalo.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si una distribución normal tiene $\mu=100$ y $\sigma=10$, ¿qué intervalo contiene aproximadamente el 95%
    de los datos?
  solucion_pasos:
  - El intervalo es $[100-20, 100+20] = [80, 120]$.
  - Aproximadamente el 95% de los datos se encuentra en ese rango.
- titulo: Ejemplo 2
  enunciado: ¿Qué porcentaje de los datos queda fuera del intervalo $[\mu-2\sigma, \mu+2\sigma]$?
  solucion_pasos:
  - Aproximadamente el 5% de los datos queda fuera de ese intervalo (100% - 95%).
- titulo: ¿La regla del 95% se refiere al intervalo de dos desviaciones estándar en torno a la media?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente ese intervalo.
- titulo: ¿La regla del 95% corresponde a una sola desviación estándar en torno a la media?
  respuesta: 'No'
  solucion_pasos:
  - 'No, corresponde a dos desviaciones estándar; una sola desviación corresponde a la regla del 68%.'
errores_frecuentes:
- Confundir la regla del 95% con la del 68% o la del 99,7%.
- Calcular el intervalo usando $1\sigma$ o $3\sigma$ en vez de $2\sigma$.
- Pensar que el 95% es un valor exacto en vez de una aproximación empírica.
- Olvidar que el intervalo es simétrico respecto de la media.
- Confundir el 5% restante como "valores imposibles" en vez de "valores poco comunes".
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
