semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.INYECTIVA_RECONOCIMIENTO
titulo: Reconocimiento de función inyectiva
objetivo: Reconocer visualmente si una función es inyectiva aplicando el criterio de la línea horizontal.
introduccion: Así como la línea vertical detecta si algo es función, otra línea (la horizontal) revela
  si esa función es inyectiva.
resumen: El **criterio de la línea horizontal** establece que una función es inyectiva si y solo si ninguna
  recta horizontal corta su gráfica en más de un punto.
explicacion: '### Definición formal


  Sea $f$ una función con gráfica $G_f$. $f$ es inyectiva si y solo si para todo $b \in \mathbb{R}$, la
  recta horizontal $y=b$ interseca a $G_f$ en a lo más un punto. Esto es la traducción gráfica directa
  de la condición algebraica de inyectividad.


  ### Desarrollo didáctico


  Cada recta horizontal $y=b$ representa "todos los puntos con la misma imagen $b$". Si la curva tiene
  dos puntos con esa altura, dos valores distintos de $x$ comparten esa imagen, violando la inyectividad.


  Una parábola falla el criterio (una recta horizontal por encima del vértice la corta en dos puntos),
  mientras que una recta con pendiente distinta de cero, o una curva estrictamente creciente o decreciente
  en todo su dominio, lo cumple.'
procedimiento:
- 'Paso 1: Imagina o traza rectas horizontales a lo largo de todo el recorrido visible de la curva.'
- 'Paso 2: Cuenta cuántas veces cada recta horizontal corta la curva.'
- 'Paso 3: Si alguna recta corta la curva en más de un punto, la función no es inyectiva.'
- 'Paso 4: Si toda recta horizontal corta la curva en a lo más un punto, la función es inyectiva.'
ejemplos:
- titulo: Aplicación a una parábola
  enunciado: Aplica el criterio de la línea horizontal a $f(x)=x^2$.
  solucion_pasos:
  - Para $y=4$, tanto $x=2$ como $x=-2$ satisfacen la ecuación.
  - Una recta horizontal en $y=4$ corta la curva en dos puntos.
  - No es inyectiva.
- titulo: Aplicación a una recta con pendiente distinta de cero
  enunciado: Aplica el criterio de la línea horizontal a $f(x)=-3x+2$.
  solucion_pasos:
  - Cualquier recta horizontal $y=b$ corta a esta recta en exactamente un punto.
  - Es inyectiva.
- titulo: ¿Una función constante cumple el criterio de la línea horizontal?
  enunciado: ¿Una función constante cumple el criterio de la línea horizontal?
  respuesta: 'No'
  solucion_pasos:
  - La recta horizontal correspondiente al valor constante coincide con toda la gráfica, cortándola en
    infinitos puntos.
- titulo: ¿El criterio de la línea horizontal verifica inyectividad o existencia de función?
  enunciado: ¿El criterio de la línea horizontal verifica inyectividad o existencia de función?
  respuesta: Inyectividad
  solucion_pasos:
  - El criterio de la línea vertical verifica si es función; el de la línea horizontal verifica inyectividad.
errores_frecuentes:
- Confundir el criterio de la línea horizontal con el de la línea vertical.
- Aplicar el criterio solo a una parte de la curva, sin revisar todo el recorrido.
- Concluir inyectividad basándose en la apariencia general sin verificar rigurosamente cada altura.
- Creer que toda parábola completa es inyectiva por ser una curva "simple".
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
