errores_frecuentes:
- Creer que 'homogéneo' significa que todos los términos deben tener la misma letra (eso sería tener una
  sola variable, no ser homogéneo).
- Olvidarse de sumar los exponentes ocultos ('1') y clasificar mal un término mixto, rompiendo falsamente
  la homogeneidad.
- Que todos sus términos tienen coeficientes numéricos iguales.
- Que está formado exclusivamente por una sola variable.
- Que todos sus términos son positivos.
fuente: Álgebra de Baldor.
