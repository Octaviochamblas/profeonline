semantic_id: MAT.ALG.POLINOMIOS.POLINOMIO_HOMOGENEO
titulo: Identificación de polinomio homogéneo
objetivo: Identificar polinomios homogéneos donde todos los términos poseen idéntico grado absoluto.
introduccion: ¿Alguna vez has visto un equipo de levantamiento de pesas donde todos levantan exactamente
  los mismos kilos? En álgebra, a ese equipo perfectamente equilibrado en peso se le llama Homogéneo.
resumen: Un **Polinomio Homogéneo** es aquel en el que **todos y cada uno de sus términos tienen exactamente
  el mismo grado absoluto**.
explicacion: "### Definición formal\n\nLa homogeneidad polinomial se refiere al equilibrio perfecto de\
  \ grados absolutos a través de toda la expresión.\n\n### Desarrollo didáctico\n\nHomo significa 'igual'\
  \ o 'mismo'. Para saber si es homogéneo, debemos pesar (calcular el grado absoluto) de cada vagón por\
  \ separado.\n- Polinomio: $x^3 + x^2y - xy^2 + y^3$\n  - Vagón 1 ($x^3$): Grado $3$.\n  - Vagón 2 ($x^2y$):\
  \ Grado $2+1 = 3$.\n  - Vagón 3 ($-xy^2$): Grado $1+2 = 3$.\n  - Vagón 4 ($y^3$): Grado $3$.\nTodos\
  \ los vagones pesan $3$. Es un polinomio homogéneo de tercer grado.\n\nSi tan solo un término tuviera\
  \ un grado distinto, la homogeneidad se rompe al instante."
procedimiento:
- 'Paso 1: Calcula el grado absoluto (suma de exponentes de las letras) del primer término.'
- 'Paso 2: Haz lo mismo con el segundo término.'
- 'Paso 3: Continúa hasta el final.'
- 'Paso 4: Si todos los resultados numéricos son idénticos, es Homogéneo.'
ejemplos:
- titulo: Prueba de equilibrio
  enunciado: Determina si a^4 + a^2b^2 - b^4 es homogéneo.
  solucion_pasos:
  - 'Término 1 (a^4): Grado 4.'
  - 'Término 2 (a^2b^2): Grado 2+2 = 4.'
  - 'Término 3 (-b^4): Grado 4.'
  - Todos tienen grado 4. Sí, es un polinomio homogéneo.
- titulo: En el diseño de curvas aerodinámicas, las ecuaciones deben ser 'homogéneas de grado $4$' par
  enunciado: 'En el diseño de curvas aerodinámicas, las ecuaciones deben ser ''homogéneas de grado $4$''
    para no alterar la escala tridimensional. Un ingeniero propone la fórmula $F(x,y) = 3x^4 - 2x^2y^2
    + 5y^4 - 10$. El sistema arroja un error de escala. ¿Por qué la fórmula no es homogénea? (v1)


    Opciones: A) Porque contiene el término independiente $-10$, el cual tiene grado $0$, rompiendo la
    homogeneidad de grado $4$ del resto de los términos. · B) Porque el término $2x^2y^2$ tiene grado
    $2$, no $4$. · C) Porque los coeficientes numéricos $3, -2, 5, -10$ son diferentes entre sí. · D)
    Porque una fórmula homogénea no puede tener signos negativos.'
  solucion_pasos:
  - T1(4), T2(4), T3(4). Todo iba bien hasta el -10, que es T4(0). Un solo término con grado distinto
    destruye la homogeneidad.
  - 'Respuesta: Porque contiene el término independiente $-10$, el cual tiene grado $0$, rompiendo la
    homogeneidad de grado $4$ del resto de los términos.'
- titulo: 'Respecto de «Identificación de polinomio homogéneo»: ¿Se ajusta a la definición esta afirmac'
  enunciado: 'Respecto de «Identificación de polinomio homogéneo»: ¿Se ajusta a la definición esta afirmación?
    «Un **Polinomio Homogéneo** es aquel en el que **todos y cada uno de sus términos tienen exactamente
    el mismo grado absoluto**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un **Polinomio Homogéneo** es aquel en el que **todos
    y cada uno de sus términos tienen exactamente el mismo grado absoluto**.'
- titulo: 'Respecto de «Identificación de polinomio homogéneo»: ¿Es compatible con el procedimiento est'
  enunciado: 'Respecto de «Identificación de polinomio homogéneo»: ¿Es compatible con el procedimiento
    esta afirmación? «Creer que ''homogéneo'' significa que todos los términos deben tener la misma letra
    (eso sería tener una sola variable, no ser homogéneo)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un **Polinomio Homogéneo** es aquel en el que **todos
