semantic_id: MAT.GEO.CONGRUENCIA_TRIANGULOS.FIGURAS_CONGRUENTES_CONCEPTO
titulo: Concepto de figuras congruentes como figuras de igual forma y tamaño
objetivo: 'Comprender qué significa que dos figuras sean congruentes: tener exactamente la misma forma
  y el mismo tamaño.'
introduccion: 'Cuando se observan dos triángulos que parecen "iguales" —mismo tamaño y misma forma, aunque
  estén en posiciones distintas—, existe un término matemático preciso para describir esa relación: congruencia.'
resumen: Dos figuras son congruentes si tienen exactamente la misma forma y el mismo tamaño, sin importar
  su posición u orientación en el plano.
explicacion: '![Figuras congruentes: igual forma y tamaño](/static/img/geometria/congruencia-semejanza/congruencia-figuras-congruentes-concepto.svg)


  ### Definición formal


  Dos figuras son congruentes si una puede superponerse exactamente sobre la otra mediante traslaciones,
  rotaciones y/o reflexiones (sin estirar ni encoger), de modo que coincidan por completo.


  ### Desarrollo didáctico


  Dos triángulos recortados de papel son congruentes si, al colocar uno encima del otro (permitiendo girarlo
  o darlo vuelta), coinciden exactamente en todos sus puntos. Esta idea intuitiva de "encajar perfectamente"
  es la base formal de la congruencia.'
procedimiento:
- 'Paso 1: Observa las dos figuras que quieres comparar.'
- 'Paso 2: Verifica si es posible moverlas (trasladar, rotar o reflejar) hasta que coincidan exactamente.'
- 'Paso 3: Si coinciden por completo, son figuras congruentes.'
ejemplos:
- titulo: Comparar dos triángulos recortados de papel
  enunciado: Dos triángulos de papel se superponen exactamente al girarlos.
  solucion_pasos:
  - Son congruentes, ya que coinciden por completo en forma y tamaño.
- titulo: Distinguir congruencia de semejanza
  enunciado: Dos triángulos tienen la misma forma pero distinto tamaño.
  solucion_pasos:
  - No son congruentes; son semejantes, un concepto distinto que se estudia más adelante.
- titulo: ¿La posición de una figura afecta si es congruente con otra?
  respuesta: 'No'
  solucion_pasos:
  - No, la congruencia no depende de la posición ni orientación, solo de la forma y el tamaño.
- titulo: ¿Dos figuras congruentes deben tener el mismo tamaño?
  respuesta: Sí
  solucion_pasos:
  - Sí, junto con la misma forma, es la condición esencial de la congruencia.
errores_frecuentes:
- Confundir congruencia (igual forma y tamaño) con semejanza (igual forma, tamaño posiblemente distinto).
- Creer que dos figuras deben verse idénticas en la misma orientación para ser congruentes.
- Asumir que figuras con el mismo perímetro son automáticamente congruentes.
fuente: 'Fuente: Moraleja 152, Cid 57.'
estado: publicado
