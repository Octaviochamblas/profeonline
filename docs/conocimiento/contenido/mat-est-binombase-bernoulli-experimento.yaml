semantic_id: MAT.EST.BINOMIAL_BASE.BERNOULLI_EXPERIMENTO
titulo: Reconocer un experimento de Bernoulli
objetivo: 'Reconocer un experimento de Bernoulli como aquel que tiene exactamente dos resultados posibles:
  éxito o fracaso.'
introduccion: Muchas situaciones cotidianas (lanzar una moneda, aprobar o reprobar, un producto defectuoso
  o no) pueden modelarse como experimentos de solo dos resultados posibles.
resumen: Un experimento de Bernoulli es un experimento aleatorio con exactamente dos resultados posibles,
  usualmente llamados 'éxito' y 'fracaso'.
explicacion: '![Experimento de Bernoulli](/static/img/probabilidad/binombase/binombase-bernoulli-experimento.svg)


  ### Definición formal


  Un experimento de Bernoulli tiene un espacio muestral de exactamente dos elementos: $S=\{\text{éxito},\text{fracaso}\}$.


  ### Desarrollo didáctico


  Lanzar una moneda (cara o sello), verificar si un artículo es defectuoso o no, o comprobar si un estudiante
  aprueba o reprueba una prueba, son todos ejemplos de experimentos de Bernoulli.'
procedimiento:
- 'Paso 1: Identifica el experimento aleatorio en cuestión.'
- 'Paso 2: Verifica que tenga exactamente dos resultados posibles.'
- 'Paso 3: Etiqueta uno de los resultados como ''éxito'' y el otro como ''fracaso'', según el contexto
  del problema.'
ejemplos:
- titulo: 'Reconocer un experimento de Bernoulli: lanzar una moneda'
  enunciado: Lanzar una moneda y observar si sale cara o sello.
  solucion_pasos:
  - 'Es un experimento de Bernoulli, ya que tiene exactamente 2 resultados posibles: cara (éxito) o sello
    (fracaso).'
- titulo: 'Reconocer un experimento de Bernoulli: control de calidad'
  enunciado: Revisar si un artículo fabricado es defectuoso o no.
  solucion_pasos:
  - 'Es un experimento de Bernoulli: defectuoso (fracaso) o no defectuoso (éxito).'
- titulo: ¿Lanzar un dado común (6 caras) es un experimento de Bernoulli?
  respuesta: 'No'
  solucion_pasos:
  - No, tiene 6 resultados posibles, no 2; salvo que se redefina como 'sacar un 6' (éxito) vs. 'no sacar
    un 6' (fracaso).
- titulo: ¿Aprobar o reprobar una prueba es un experimento de Bernoulli?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, tiene exactamente 2 resultados posibles: aprobar (éxito) o reprobar (fracaso).'
errores_frecuentes:
- Confundir un experimento con muchos resultados posibles (como lanzar un dado) con uno de Bernoulli sin
  redefinir adecuadamente 'éxito' y 'fracaso'.
- No etiquetar claramente cuál resultado es 'éxito' y cuál es 'fracaso' según el contexto del problema.
- Pensar que 'éxito' siempre implica un resultado positivo o deseable; en realidad es solo una etiqueta
  convencional.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
