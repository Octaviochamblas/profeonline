semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.DOMINIO_RAIZ_IMPAR
titulo: Dominio de $f(x)=x^{1/q}$ con índice impar
objetivo: Determinar que el dominio de $f(x)=x^{1/q}$ es todo $\mathbb{R}$ cuando $q$ es un entero impar.
introduccion: A diferencia de la raíz cuadrada, la raíz cúbica y otras de índice impar sí están definidas para
  números negativos.
resumen: Si $q$ es un entero impar, el dominio de $f(x)=x^{1/q}=\sqrt[q]{x}$ es **todo $\mathbb{R}$**, sin ninguna
  restricción sobre el signo de $x$.
explicacion: '### Definición formal


  Para $q$ impar, existe un único número real $y$ tal que $y^q=x$, para cualquier $x\in\mathbb{R}$, ya que una
  potencia impar conserva el signo de la base. Por lo tanto, el dominio de $f(x)=x^{1/q}$ es todo $\mathbb{R}$.


  ### Desarrollo didáctico


  $f(x)=\sqrt[3]{x}$: está definida en $x=8$, dando $f(8)=2$, y también en $x=-8$, dando $f(-8)=-2$, porque
  $(-2)^3=-8$.'
procedimiento:
- 'Paso 1: Identifica el índice $q$ de la raíz en la expresión $x^{1/q}$.'
- 'Paso 2: Verifica si $q$ es impar.'
- 'Paso 3: Si es impar, concluye que el dominio es todo $\mathbb{R}$.'
ejemplos:
- titulo: Determinación del dominio de $x^{1/3}$
  enunciado: 'Determina el dominio de $f(x)=x^{1/3}$.'
  solucion_pasos:
  - El índice de la raíz es $3$, un número impar.
  - El dominio es todo $\mathbb{R}$.
- titulo: Evaluación de la raíz cúbica de un negativo
  enunciado: 'Evalúa $f(x)=\sqrt[3]{x}$ en $x=-27$.'
  solucion_pasos:
  - Se busca un número que elevado al cubo dé $-27$.
  - 'Como $(-3)^3=-27$, se obtiene $f(-27)=-3$.'
- titulo: ¿$x=-16$ pertenece al dominio de $f(x)=\sqrt[5]{x}$?
  enunciado: ¿El valor $x=-16$ pertenece al dominio de $f(x)=\sqrt[5]{x}$?
  respuesta: Sí
  solucion_pasos:
  - Con índice impar, cualquier número real, positivo o negativo, pertenece al dominio.
- titulo: ¿El dominio de una raíz de índice impar se restringe igual que el de índice par?
  enunciado: ¿El dominio de $f(x)=\sqrt[q]{x}$ con $q$ impar se restringe de la misma forma que con $q$ par?
  respuesta: 'No'
  solucion_pasos:
  - Con índice impar el dominio es todo $\mathbb{R}$; con índice par se restringe a $x\geq0$.
errores_frecuentes:
- Restringir innecesariamente el dominio de una raíz con índice impar a los valores positivos.
- Confundir el comportamiento de índice impar con el de índice par.
- Suponer que no existe la raíz de un número negativo, sin importar el índice.
- No verificar la paridad del índice antes de determinar el dominio.
