semantic_id: MAT.ALG.FACTOR_COMUN.MAXIMO_COEFICIENTE_COMUN
titulo: Determinación del máximo factor común numérico
objetivo: Comprender determinación del máximo factor común numérico y aplicarlo con precisión.
introduccion: La parte numérica del factor común debe dividir exactamente todos los coeficientes. Elegir su máximo
  común divisor produce una factorización completa en la parte numérica.
resumen: '8.'
explicacion: '### Definición formal


  8.


  ### Desarrollo didáctico


  El mayor número que divide exactamente a 16 y 24 es 8.


  Dividimos 9/3=3 y 6/3=2, quedando (3a + 2b).


  Todos son divisibles por 6, y no hay otro mayor que divida a los tres.'
procedimiento:
- El mayor número que divide exactamente a 16 y 24 es 8.
- Dividimos 9/3=3 y 6/3=2, quedando (3a + 2b).
- Todos son divisibles por 6, y no hay otro mayor que divida a los tres.
ejemplos:
- titulo: El factor común numérico de $7x + 11$ es 1
  enunciado: ¿El factor común numérico de $7x + 11$ es 1?
  solucion_pasos:
  - Como 7 y 11 son primos entre sí, su único divisor común es 1.
  - 'Respuesta: Verdadero'
- titulo: Si saco 2 de $4x+8$, obtengo la factorización final completa
  enunciado: ¿Si saco 2 de $4x+8$, obtengo la factorización final completa?
  solucion_pasos:
  - Quedaría 2(2x+4), pero el interior aún es divisible por 2. Debí sacar el 4.
  - 'Respuesta: Falso'
- titulo: 'Respecto de «Determinación del máximo factor común numérico»: ¿Describe adecuadamente el con'
  enunciado: 'Respecto de «Determinación del máximo factor común numérico»: ¿Describe adecuadamente el concepto
    esta frase? «8»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: 8.'
- titulo: 'Respecto de «Determinación del máximo factor común numérico»: ¿Se puede aceptar esta afirmac'
  enunciado: 'Respecto de «Determinación del máximo factor común numérico»: ¿Se puede aceptar esta afirmación? «Para
    «¿Cuál es el MCD de los coeficientes en $16x^2 - 24x$», la respuesta correcta es 4»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: 8.'
errores_frecuentes:
- Para «¿Cuál es el MCD de los coeficientes en $16x^2 - 24x$», la respuesta correcta es 4.
- Para «¿Cuál es el MCD de los coeficientes en $16x^2 - 24x$», la respuesta correcta es 16.
- Para «¿Cuál es el MCD de los coeficientes en $16x^2 - 24x$», la respuesta correcta es 2.
- $6a + 3b$.
- $9a + 6b$.
