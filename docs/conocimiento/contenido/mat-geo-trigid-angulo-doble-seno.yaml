semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.ANGULO_DOBLE_SENO
titulo: Identidad del seno del ángulo doble
objetivo: Aplicar la identidad del seno del ángulo doble, que expresa sin(2x) en función del seno y el
  coseno de x.
introduccion: Esta identidad es un caso particular de la fórmula del seno de una suma, cuando ambos ángulos
  que se suman son iguales (α=β=x).
resumen: Para cualquier ángulo $x$, se cumple $\sin(2x)=2\sin x\cos x$.
explicacion: '![Seno del ángulo doble](/static/img/geometria/trigonometria/trigid-angulo-doble-seno.svg)


  ### Definición formal


  Haciendo $\alpha=\beta=x$ en la identidad $\sin(\alpha+\beta)=\sin\alpha\cos\beta+\cos\alpha\sin\beta$,
  se obtiene $\sin(2x)=\sin x\cos x+\cos x\sin x=2\sin x\cos x$.


  ### Desarrollo didáctico


  En la figura, θ=35° y 2θ=70°. Se puede verificar que sin70°=2·sin35°·cos35°, en vez de calcular sin70°
  de forma independiente.'
procedimiento:
- 'Paso 1: Identifica el ángulo x cuyo doble se quiere calcular.'
- 'Paso 2: Obtén (o calcula) los valores de sinx y cosx.'
- 'Paso 3: Aplica la fórmula sin(2x)=2·sinx·cosx.'
ejemplos:
- titulo: Calcular sin(60°) usando el ángulo doble de 30°
  enunciado: sin30°=0,5, cos30°=√3/2≈0,866.
  solucion_pasos:
  - sin60°=2×0,5×0,866≈0,866, coincidiendo con el valor conocido de sin60°.
- titulo: Calcular sin(2x) si sinx=0,6 y cosx=0,8
  enunciado: sinx=0,6, cosx=0,8.
  solucion_pasos:
  - sin(2x)=2×0,6×0,8=0,96.
- titulo: ¿Esta identidad se deduce de la fórmula del seno de una suma?
  respuesta: Sí
  solucion_pasos:
  - Sí, haciendo α=β=x en esa fórmula.
- titulo: ¿sin(2x) es siempre el doble de sinx?
  respuesta: 'No'
  solucion_pasos:
  - No, sin(2x)=2·sinx·cosx, no simplemente 2·sinx; solo coincidirían si cosx=1.
errores_frecuentes:
- Confundir sin(2x) con 2·sinx, olvidando el factor cosx.
- Olvidar el factor 2 en la fórmula, calculando solo sinx·cosx.
- Usar valores de seno y coseno de ángulos distintos entre sí en la fórmula.
fuente: Elaboración propia.
estado: publicado
