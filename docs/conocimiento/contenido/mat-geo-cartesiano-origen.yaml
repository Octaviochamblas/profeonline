semantic_id: MAT.GEO.CARTESIANO_BASE.ORIGEN_COORDENADAS
titulo: Identificación del origen del sistema cartesiano
objetivo: Identificar el origen del sistema cartesiano como el punto de intersección entre el eje de las
  abscisas y el eje de las ordenadas.
introduccion: 'El origen es el ''punto cero'' del plano cartesiano: el lugar exacto donde ambos ejes se
  cruzan, la referencia desde la cual se miden todas las coordenadas.'
resumen: El origen del sistema cartesiano es el punto de intersección entre el eje de las abscisas y el
  eje de las ordenadas, representado por el par ordenado (0,0).
explicacion: '![Origen del sistema cartesiano](/static/img/geometria/cartesiano-vectores/cartesiano-origen.svg)


  ### Definición formal


  El origen $O$ del sistema cartesiano es el único punto donde se intersectan el eje de las abscisas y
  el eje de las ordenadas. Sus coordenadas son siempre $(0,0)$.


  ### Desarrollo didáctico


  En la figura, el punto resaltado en el cruce de ambos ejes es el origen. Todas las coordenadas de cualquier
  otro punto del plano se miden tomando como referencia este punto.'
procedimiento:
- 'Paso 1: Identifica el punto donde se cruzan el eje de las abscisas y el eje de las ordenadas.'
- 'Paso 2: Reconoce ese punto como el origen del sistema cartesiano.'
- 'Paso 3: Recuerda que las coordenadas del origen son siempre (0,0).'
ejemplos:
- titulo: Identificar el origen del sistema cartesiano
  enunciado: En un plano cartesiano, el eje X y el eje Y se cruzan en un punto.
  solucion_pasos:
  - Ese punto de cruce es el origen del sistema, con coordenadas (0,0).
- titulo: Reconocer las coordenadas del origen
  enunciado: Se pide identificar el par ordenado que representa al origen.
  solucion_pasos:
  - El origen siempre se representa como (0,0), sin excepción.
- titulo: ¿El origen es el punto de referencia para medir todas las demás coordenadas?
  respuesta: Sí
  solucion_pasos:
  - Sí, todas las coordenadas de otros puntos se miden tomando como referencia el origen.
- titulo: ¿Puede haber más de un origen en un mismo sistema cartesiano?
  respuesta: 'No'
  solucion_pasos:
  - 'No, el origen es único: es exactamente el punto donde ambos ejes se cruzan una sola vez.'
errores_frecuentes:
- Confundir el origen con cualquier otro punto sobre alguno de los ejes.
- Olvidar que las coordenadas del origen son siempre (0,0), sin importar la escala del gráfico.
- Creer que puede existir más de un origen en un mismo plano cartesiano.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Baldor 292).'
estado: publicado
