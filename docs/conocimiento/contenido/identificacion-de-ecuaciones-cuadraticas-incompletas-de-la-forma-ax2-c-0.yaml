semantic_id: MAT.ALG.EC_CUADR_BASE.INCOMPLETA_PURA
titulo: Identificación de ecuaciones cuadráticas incompletas de la forma ax² + c = 0
objetivo: Reconocer ecuaciones cuadráticas incompletas puras, aquellas en las que falta el término lineal.
introduccion: Cuando a una ecuación cuadrática le falta el término con $x$ a la primera potencia, quedan
  solo el término cuadrático y el término independiente.
resumen: Una **ecuación incompleta pura** tiene la forma $ax^2+c=0$, con $a\neq0$ y $c\neq0$, donde el
  coeficiente lineal $b$ es igual a cero.
explicacion: '### Definición formal


  Una ecuación de segundo grado es incompleta pura si tiene la forma $ax^2+c=0$, es decir, $b=0$ mientras
  $a \neq 0$ y $c \neq 0$. El término lineal está ausente.


  ### Desarrollo didáctico


  Se reconoce porque, al ordenar la ecuación en forma general, no queda ningún término con $x$ a la primera
  potencia: solo aparecen el término cuadrático y el número suelto.


  La ecuación $2x^2-18=0$ es incompleta pura: no hay término con $x$, pero sí están presentes tanto $x^2$
  como el término independiente.'
procedimiento:
- 'Paso 1: Escribe la ecuación en su forma general $ax^2+bx+c=0$.'
- 'Paso 2: Verifica que el coeficiente lineal $b$ sea igual a cero.'
- 'Paso 3: Verifica que tanto $a$ como $c$ sean distintos de cero; de ser así, es incompleta pura.'
ejemplos:
- titulo: Reconocimiento de ecuación incompleta pura
  enunciado: ¿Es $4x^2-25=0$ una ecuación incompleta pura?
  solucion_pasos:
  - $a=4$, $b=0$, $c=-25$.
  - Sí, es incompleta pura.
- titulo: Reconocimiento de ecuación que no es pura
  enunciado: ¿Es $x^2+7x=0$ una ecuación incompleta pura?
  solucion_pasos:
  - $a=1$, $b=7$, $c=0$.
  - No es pura, porque el término independiente está ausente, no el lineal.
- titulo: ¿Toda ecuación incompleta pura tiene soluciones reales?
  enunciado: ¿Toda ecuación incompleta pura tiene soluciones reales?
  respuesta: 'No'
  solucion_pasos:
  - Si al despejar $x^2=-c/a$ el resultado es negativo, no existen soluciones reales.
- titulo: ¿Las soluciones de una ecuación incompleta pura son siempre opuestas entre sí?
  enunciado: ¿Las soluciones de una ecuación incompleta pura son siempre opuestas entre sí?
  respuesta: Sí
  solucion_pasos:
  - Al despejar $x=\pm\sqrt{-c/a}$, cuando existen soluciones reales, estas son siempre un par de números
    opuestos.
errores_frecuentes:
- Confundir la ecuación incompleta pura (falta $b$) con la incompleta binomia (falta $c$).
- Olvidar el signo $\pm$ al despejar la raíz cuadrada, perdiendo una de las dos soluciones.
- No verificar si el valor bajo la raíz es negativo, lo que indicaría ausencia de soluciones reales.
- Aplicar factorización por término común cuando en realidad no hay término lineal que factorizar.
