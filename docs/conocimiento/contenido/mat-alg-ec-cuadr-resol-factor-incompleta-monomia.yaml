semantic_id: MAT.ALG.EC_CUADR_RESOL_FACTOR.INCOMPLETA_MONOMIA
titulo: Resolución de ecuaciones de la forma ax² = 0
objetivo: Resolver ecuaciones incompletas monomias de la forma $ax^2=0$ mediante despeje directo.
introduccion: 'Este es el tipo de ecuación cuadrática más simple de resolver: solo tiene un término, y despejarlo
  es casi inmediato.'
resumen: Para resolver $ax^2=0$ con $a\neq0$, se divide por $a$ y se extrae raíz cuadrada, obteniendo la única
  solución $x=0$ (raíz doble).
explicacion: '### Definición formal


  Dada la ecuación $ax^2=0$ con $a \neq 0$, dividiendo ambos lados por $a$ se obtiene $x^2=0$, cuya única solución
  real es $x=0$, considerada raíz de multiplicidad 2 (raíz doble).


  ### Desarrollo didáctico


  No es necesario aplicar la fórmula general ni completar el cuadrado: basta con despejar $x^2$ y luego extraer
  raíz cuadrada, notando que $\sqrt{0}=0$ produce un único valor, no dos.


  Para $9x^2=0$: dividiendo por $9$, $x^2=0$, por lo que $x=0$ es la única solución (raíz doble).'
procedimiento:
- 'Paso 1: Verifica que la ecuación tenga la forma $ax^2=0$, sin términos lineales ni independientes.'
- 'Paso 2: Divide ambos lados por $a$ para obtener $x^2=0$.'
- 'Paso 3: Extrae raíz cuadrada, concluyendo que $x=0$ es la única solución (raíz doble).'
ejemplos:
- titulo: Resolución directa
  enunciado: 'Resuelve $5x^2=0$.'
  solucion_pasos:
  - 'Dividiendo por $5$: $x^2=0$.'
  - '$x=0$ (raíz doble).'
- titulo: Resolución con coeficiente negativo
  enunciado: 'Resuelve $-3x^2=0$.'
  solucion_pasos:
  - 'Dividiendo por $-3$: $x^2=0$.'
  - '$x=0$ (raíz doble).'
- titulo: ¿La ecuación $ax^2=0$ tiene dos soluciones reales distintas?
  enunciado: ¿La ecuación $ax^2=0$ tiene dos soluciones reales distintas?
  respuesta: 'No'
  solucion_pasos:
  - Tiene una única solución real, $x=0$, considerada raíz doble por su multiplicidad 2.
- titulo: ¿El signo del coeficiente $a$ afecta la solución de $ax^2=0$?
  enunciado: ¿El signo del coeficiente $a$ afecta la solución de $ax^2=0$?
  respuesta: 'No'
  solucion_pasos:
  - Sin importar el signo de $a$ (siempre que sea distinto de cero), la única solución sigue siendo $x=0$.
errores_frecuentes:
- Reportar dos soluciones distintas en vez de reconocer que $x=0$ es una raíz doble.
- Aplicar innecesariamente la fórmula general en vez de despejar directamente.
- Olvidar dividir por $a$ antes de concluir que $x^2=0$.
- Confundir esta ecuación con una incompleta binomia o pura, que tienen un término adicional.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
