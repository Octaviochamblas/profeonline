semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.LEY_COSENOS_ENUNCIADO
titulo: Enunciado de la ley de cosenos para triángulos oblicuángulos
objetivo: Enunciar la ley de cosenos, que generaliza el teorema de Pitágoras para relacionar los tres
  lados de un triángulo cualquiera con el coseno de uno de sus ángulos.
introduccion: El teorema de Pitágoras solo aplica a triángulos rectángulos; la ley de cosenos lo generaliza
  a cualquier triángulo, incorporando un término adicional con el coseno del ángulo entre dos de los lados.
resumen: La ley de cosenos establece que, en cualquier triángulo, el cuadrado de un lado es igual a la
  suma de los cuadrados de los otros dos lados, menos el doble producto de esos lados por el coseno del
  ángulo comprendido entre ellos.
explicacion: '![Ley de cosenos](/static/img/geometria/trigonometria/oblicu-ley-cosenos-enunciado.svg)


  ### Definición formal


  En un triángulo de lados $a$, $b$, $c$, con $A$ el ángulo opuesto a $a$ (comprendido entre $b$ y $c$),
  se cumple $a^2=b^2+c^2-2bc\cos A$.


  ### Desarrollo didáctico


  Si $A=90°$, entonces $\cos A=0$ y la fórmula se reduce a $a^2=b^2+c^2$, el teorema de Pitágoras. Para
  cualquier otro ángulo, el término $-2bc\cos A$ corrige esa relación según qué tan agudo u obtuso sea
  el ángulo A.'
procedimiento:
- 'Paso 1: Identifica el lado que se busca calcular y su ángulo opuesto (el comprendido entre los otros
  dos lados).'
- 'Paso 2: Escribe la fórmula lado²=suma de cuadrados de los otros dos lados - 2×producto de esos lados×cos(ángulo
  comprendido).'
- 'Paso 3: Sustituye los valores conocidos y resuelve para obtener el lado buscado.'
ejemplos:
- titulo: Reconocer la relación con el teorema de Pitágoras
  enunciado: Un triángulo tiene A=90°.
  solucion_pasos:
  - Como cos90°=0, la ley de cosenos se reduce a a²=b²+c², que es el teorema de Pitágoras.
- titulo: Plantear la ley de cosenos con datos b=8, c=10, A=60°
  enunciado: Se busca el lado a.
  solucion_pasos:
  - a²=8²+10²-2×8×10×cos60°=64+100-160×0,5=164-80=84, por lo que a=√84≈9,17.
- titulo: ¿La ley de cosenos generaliza el teorema de Pitágoras?
  respuesta: Sí
  solucion_pasos:
  - Sí, el teorema de Pitágoras es el caso particular cuando el ángulo es de 90°.
- titulo: ¿El ángulo usado en la fórmula debe ser el comprendido entre los otros dos lados?
  respuesta: Sí
  solucion_pasos:
  - Sí, el ángulo A en la fórmula a²=b²+c²-2bc·cosA es el ángulo opuesto a a, que está comprendido entre
    b y c.
errores_frecuentes:
- Usar un ángulo que no es el comprendido entre los dos lados de la fórmula.
- Olvidar el término -2bc·cosA, calculando solo b²+c² como si fuera Pitágoras.
- Confundir la ley de cosenos con la ley de senos al elegir cuál aplicar según los datos disponibles.
fuente: Elaboración propia.
estado: publicado
