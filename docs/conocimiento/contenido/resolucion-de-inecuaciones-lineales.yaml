semantic_id: MAT.ALG.INECUACIONES_LINEALES
titulo: Resolución de inecuaciones lineales
objetivo: Analizar, resolver e interpretar inecuaciones lineales en una variable, reconociendo que su
  solución es un conjunto de valores reales condicionado por una relación de orden.
introduccion: Las inecuaciones lineales permiten expresar límites, cotas y restricciones en situaciones
  donde no se busca un valor único, sino todos los valores que satisfacen una condición de desigualdad.
resumen: Una inecuación lineal en una variable es una desigualdad equivalente a una expresión de la forma
  $ax+b<c$, $ax+b\le c$, $ax+b>c$ o $ax+b\ge c$, con $a\neq 0$, cuya solución se representa como un conjunto
  o intervalo de números reales.
explicacion: '### Definición formal

  Una inecuación lineal en una variable es una proposición abierta que compara dos expresiones algebraicas
  de primer grado mediante los signos $<$, $>$, $\le$ o $\ge$. Resolverla consiste en determinar el conjunto
  de todos los valores reales de la variable para los cuales la desigualdad resulta verdadera.


  ### Desarrollo didáctico

  A diferencia de una ecuación lineal, cuya solución suele ser un valor puntual, una inecuación lineal
  describe una región de la recta real. Por eso no basta con “despejar”: también es necesario interpretar
  el sentido de la desigualdad, decidir si el extremo se incluye o no y representar el resultado con precisión
  en intervalo, conjunto o recta numérica. El cuidado principal aparece cuando se multiplica o divide
  por un número negativo, porque esa operación invierte el orden.'
procedimiento:
- Identificar la desigualdad, la variable involucrada y las restricciones algebraicas presentes en ambos
  miembros.
- Reunir los términos con variable en un lado y los términos independientes en el otro, usando operaciones
  equivalentes de suma o resta.
- Despejar la variable mediante multiplicación o división, invirtiendo el signo de desigualdad si se opera
  con un número negativo.
- Expresar el conjunto solución con notación adecuada: desigualdad, intervalo o representación en la recta
    numérica.
- Verificar la coherencia del resultado probando un valor que pertenezca a la solución y otro que quede
  fuera de ella.
ejemplos:
- titulo: Restricción de capacidad
  enunciado: En una sala pueden ingresar como máximo $42$ personas. Si ya hay $9$ dentro, exprese la condición
    para la cantidad $x$ de personas que aún pueden entrar y determine el conjunto solución.
  solucion_pasos:
  - La condición “como máximo” se traduce como $9+x\le 42$.
  - Restamos $9$ en ambos lados para aislar la variable: $x\le 33$.
  - La solución está formada por todos los valores reales menores o iguales que $33$.
  - Si el contexto exige personas enteras, la interpretación contextual restringe a números naturales
    hasta $33$.
- titulo: Despeje con coeficiente negativo
  enunciado: Resuelva la inecuación $-4x+7>19$.
  solucion_pasos:
  - Restamos $7$ en ambos lados: $-4x>12$.
  - Dividimos por $-4$ y, por tratarse de un número negativo, invertimos el sentido de la desigualdad.
  - Se obtiene $x<-3$.
  - En notación de intervalo, la solución es $(-\infty,-3)$.
- titulo: ¿Dividir por un número negativo conserva el signo?
  respuesta: Falso
  solucion_pasos:
  - En una desigualdad, multiplicar o dividir ambos lados por un número negativo invierte la relación
    de orden.
  - Si no se invierte el signo, se obtiene un conjunto solución incorrecto.
  - Esta es una diferencia esencial entre la resolución de ecuaciones y la de inecuaciones.
- titulo: ¿Toda inecuación lineal tiene un único valor solución?
  respuesta: Falso
  solucion_pasos:
  - Una inecuación lineal describe todos los valores que hacen verdadera una desigualdad.
  - Por ello, su solución suele ser un intervalo, una semirrecta, el conjunto vacío o, en casos particulares,
    todo $\mathbb{R}$.
  - El resultado no se reduce normalmente a un solo número.
errores_frecuentes:
- Olvidar invertir el sentido de la desigualdad al dividir o multiplicar por un número negativo.
- Confundir desigualdades estrictas con no estrictas al escribir intervalos abiertos o cerrados.
- Resolver solo el despeje algebraico y omitir la representación del conjunto solución.
- Verificar la solución con un único valor aislado y concluir erróneamente que eso reemplaza al conjunto
  completo.
- Tratar una inecuación como si siempre tuviera una solución única igual que una ecuación lineal.
