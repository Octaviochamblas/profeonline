semantic_id: MAT.FUND.PRODUCTO_CARTESIANO.IGUALDAD_PARES_ORDENADOS

objetivo: |
  Comprender y aplicar la condición de igualdad de pares ordenados:
  $(a, b) = (c, d)$ si y sólo si $a = c$ y $b = d$ simultáneamente.

introduccion: |
  Saber cuándo dos pares ordenados son iguales es esencial para trabajar con el
  producto cartesiano y con ecuaciones que involucran pares. La condición es precisa:
  no basta que coincida una sola coordenada; **ambas** deben coincidir al mismo tiempo.
  Esta propiedad permite resolver sistemas de ecuaciones igualando componentes.

resumen: |
  Dados dos pares ordenados $(a, b)$ y $(c, d)$:
  $$(a, b) = (c, d) \iff a = c \text{ y } b = d$$
  Esto significa que la igualdad de pares se reduce a **dos ecuaciones simultáneas**,
  una por cada posición. Si alguna de las ecuaciones no se satisface, los pares son distintos.

explicacion: |
  La igualdad de pares ordenados es una condición **bicondicional**:
  - Si $(a, b) = (c, d)$, entonces necesariamente $a = c$ y $b = d$.
  - Si $a = c$ y $b = d$, entonces $(a, b) = (c, d)$.

  Esta propiedad es muy útil para resolver problemas donde se conoce que dos pares
  son iguales pero las componentes contienen incógnitas. Se descompone en un sistema:

  $$\begin{cases} \text{Primera coordenada: } a = c \\ \text{Segunda coordenada: } b = d \end{cases}$$

  y se resuelve cada ecuación de forma independiente.

procedimiento: |
  Para resolver un problema de igualdad de pares ordenados con incógnitas:
  1. Igualar las primeras coordenadas entre sí y plantear la ecuación resultante.
  2. Igualar las segundas coordenadas entre sí y plantear la ecuación resultante.
  3. Resolver cada ecuación por separado (son independientes).
  4. Verificar sustituyendo los valores obtenidos en el par original.

ejemplos:
  - tipo: A
    titulo: 'Resolver $(2x,\, y - 1) = (8,\, 5)$'
    enunciado: |
      Encuentra los valores de $x$ e $y$ sabiendo que $(2x, y - 1) = (8, 5)$.
    solucion_pasos: |
      Paso 1 — Igualar primeras coordenadas:
        $2x = 8$
        $x = \dfrac{8}{2} = 4$

      Paso 2 — Igualar segundas coordenadas:
        $y - 1 = 5$
        $y = 5 + 1 = 6$

      Paso 3 — Verificación:
        $(2 \times 4,\; 6 - 1) = (8, 5)$ ✓

      Respuesta: $x = 4$, $y = 6$.

  - tipo: A
    titulo: 'Resolver $(a + 2,\, 3b) = (7,\, 12)$'
    enunciado: |
      Encuentra los valores de $a$ y $b$ sabiendo que $(a + 2, 3b) = (7, 12)$.
    solucion_pasos: |
      Paso 1 — Igualar primeras coordenadas:
        $a + 2 = 7$
        $a = 7 - 2 = 5$

      Paso 2 — Igualar segundas coordenadas:
        $3b = 12$
        $b = \dfrac{12}{3} = 4$

      Paso 3 — Verificación:
        $(5 + 2,\; 3 \times 4) = (7, 12)$ ✓

      Respuesta: $a = 5$, $b = 4$.

  - tipo: B
    titulo: '¿Para que dos pares ordenados sean iguales, basta con que sus primeras componentes sean iguales?'
    respuesta: 'No'
    solucion_pasos: |
      Contraejemplo: $(1, 2)$ y $(1, 5)$.
        Primera coordenada: $1 = 1$ ✓ (coinciden)
        Segunda coordenada: $2 \neq 5$ ✗ (no coinciden)

      A pesar de que las primeras componentes son iguales, los pares son distintos
      porque la segunda componente difiere.

      La igualdad exige que **ambas** coordenadas coincidan simultáneamente.
      La respuesta es **No**.

  - tipo: B
    titulo: '¿Es posible que $(1, 2) = (1, 2)$?'
    respuesta: 'Sí'
    solucion_pasos: |
      Verificamos la condición de igualdad:
        Primera coordenada: $1 = 1$ ✓
        Segunda coordenada: $2 = 2$ ✓

      Como ambas coordenadas coinciden, los pares son iguales.
      Un par ordenado siempre es igual a sí mismo (propiedad reflexiva).

      La respuesta es **Sí**.

errores_frecuentes:
  - error: 'Igualar solo la primera coordenada y concluir que los pares son iguales'
    descripcion: |
      Ver que $a = c$ y afirmar $(a, b) = (c, d)$ sin verificar que $b = d$.
    correccion: |
      Siempre verificar **ambas** coordenadas. La igualdad requiere $a = c$ **y** $b = d$.

  - error: 'Igualar primera coordenada de un par con segunda del otro'
    descripcion: |
      Al plantear $(2x, y-1) = (8, 5)$, escribir $2x = 5$ o $y - 1 = 8$ mezclando posiciones.
    correccion: |
      Igualar siempre primera con primera y segunda con segunda: $2x = 8$ y $y - 1 = 5$.

  - error: 'Creer que $(a, b) = (c, d)$ implica $a = d$ o $b = c$'
    descripcion: |
      Pensar que las componentes pueden cruzarse en la comparación.
    correccion: |
      La posición determina qué se compara: primera posición con primera, segunda con segunda.
      No hay cruce de componentes.

  - error: 'No resolver ambas ecuaciones independientemente'
    descripcion: |
      Encontrar $x$ en la primera ecuación y sustituirlo en la segunda, cuando las
      ecuaciones no tienen variables en común.
    correccion: |
      Cada ecuación se resuelve por separado. Si las incógnitas son distintas,
      cada una aparece solo en su ecuación.

  - error: 'Olvidar verificar la solución sustituyendo en el par original'
    descripcion: |
      Dar la respuesta sin comprobar que los pares efectivamente coinciden
      con los valores encontrados.
    correccion: |
      Sustituir siempre los valores hallados y confirmar que ambos pares resultan idénticos.

fuente: 'Matemáticas para la Educación Media, MINEDUC'
estado: publicado
