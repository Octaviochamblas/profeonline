semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.AREA_TRAPECIO
titulo: Cálculo del área de un trapecio
objetivo: Calcular el área de un trapecio a partir de sus dos bases y su altura, usando la fórmula (B+b)×h/2.
introduccion: Aprovechando la propiedad de la mediana (semisuma de las bases), se puede derivar directamente
  la fórmula del área de cualquier trapecio.
resumen: El área de un trapecio con bases $B$ y $b$, y altura $h$, es $A=\frac{(B+b)\times h}{2}$.
explicacion: '![Área de un trapecio: (B+b)×h/2](/static/img/geometria/poligonos-cuadrilateros/trapecios-area.svg)


  ### Definición formal


  Si $B$ es la base mayor, $b$ es la base menor, y $h$ es la altura (distancia perpendicular entre las
  bases), el área del trapecio es $A=\frac{(B+b)\times h}{2}$. Equivalentemente, $A=\text{mediana}\times
  h$.


  ### Desarrollo didáctico


  Un trapecio con bases 16 cm y 10 cm, y altura 7 cm, tiene área $A=\frac{(16+10)\times7}{2}=\frac{26\times7}{2}=\frac{182}{2}=91$
  cm². Esta fórmula se puede visualizar duplicando el trapecio y rotándolo 180° para formar un paralelogramo
  con base $(B+b)$ y la misma altura $h$.'
procedimiento:
- 'Paso 1: Identifica las longitudes de la base mayor B y la base menor b.'
- 'Paso 2: Identifica la altura h (distancia perpendicular entre las bases).'
- 'Paso 3: Suma las bases, multiplica por la altura, y divide el resultado entre 2.'
ejemplos:
- titulo: Calcular el área con bases y altura conocidas
  enunciado: Un trapecio tiene bases 16 y 10 cm, y altura 7 cm.
  solucion_pasos:
  - A=(16+10)×7/2=182/2=91 cm².
- titulo: Calcular el área usando la mediana
  enunciado: Un trapecio tiene mediana 13 cm y altura 7 cm.
  solucion_pasos:
  - A=13×7=91 cm², coincide con el cálculo usando las bases directamente.
- titulo: ¿Es necesario dividir entre 2 en esta fórmula?
  respuesta: Sí
  solucion_pasos:
  - Sí, a menos que se use la versión con la mediana (mediana×altura), que ya incorpora esa división.
- titulo: ¿Esta fórmula funciona para cualquier tipo de trapecio?
  respuesta: Sí
  solucion_pasos:
  - Sí, aplica a trapecios escalenos, isósceles y rectángulos por igual.
errores_frecuentes:
- Olvidar dividir entre 2 después de multiplicar la suma de bases por la altura.
- Usar un lado lateral como si fuera la altura, cuando no es perpendicular a las bases (excepto en el
  trapecio rectángulo).
- Confundir la fórmula con la del paralelogramo (base×altura, sin sumar dos bases).
fuente: 'Fuente: Moraleja Tomo 2 69, Cid 34.'
estado: publicado
