semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.LOGARITMO_POTENCIA_BASE
titulo: Propiedad del logaritmo de una potencia de la base
objetivo: Aplicar la propiedad $\log_b(b^n)=n$ para simplificar expresiones algebraicas donde el argumento es una
  potencia de la base.
introduccion: Cuando el argumento de un logaritmo es la base elevada a un exponente, el resultado es directamente
  ese exponente, sin necesidad de cálculos adicionales.
resumen: Para cualquier base válida $b$ y cualquier exponente $n$, se cumple $\log_b(b^n)=n$, porque el logaritmo
  y la potencia se cancelan al compartir la misma base.
explicacion: '### Definición formal


  Para $b>0$, $b\neq1$ y $n\in\mathbb{R}$, se cumple $\log_b(b^n)=n$. Esta propiedad es consecuencia directa de
  que $\log_b(\cdot)$ y $b^{(\cdot)}$ son funciones inversas: al aplicar el logaritmo a una potencia de la misma
  base, ambas operaciones se cancelan y queda solo el exponente.


  ### Desarrollo didáctico


  $\log_2(2^5)=5$, porque el logaritmo "deshace" la potencia de igual base. Lo mismo ocurre con exponentes
  negativos o fraccionarios: $\log_3(3^{-2})=-2$ y $\log_5(5^{1/2})=1/2$.'
procedimiento:
- 'Paso 1: Verifica que la base del logaritmo y la base de la potencia dentro del argumento sean iguales.'
- 'Paso 2: Si coinciden, el resultado es directamente el exponente de la potencia.'
- 'Paso 3: Si no coinciden, no se puede aplicar esta propiedad directamente.'
ejemplos:
- titulo: Aplicación directa con exponente positivo
  enunciado: 'Simplifica $\log_6(6^4)$.'
  solucion_pasos:
  - Se verifica que la base del logaritmo y de la potencia coinciden ($6$).
  - 'El resultado es directamente el exponente: $4$.'
- titulo: Aplicación con exponente negativo
  enunciado: 'Simplifica $\log_2(2^{-3})$.'
  solucion_pasos:
  - Se verifica que ambas bases coinciden ($2$).
  - 'El resultado es directamente el exponente: $-3$.'
- titulo: ¿Se cumple $\log_b(b^n)=n$ para exponentes negativos?
  enunciado: ¿La propiedad $\log_b(b^n)=n$ también es válida cuando $n$ es negativo?
  respuesta: Sí
  solucion_pasos:
  - La propiedad se cumple para cualquier exponente real, positivo, negativo o fraccionario.
- titulo: ¿Se puede aplicar la propiedad si las bases no coinciden?
  enunciado: ¿Se puede simplificar directamente $\log_2(3^5)$ usando $\log_b(b^n)=n$?
  respuesta: 'No'
  solucion_pasos:
  - La base del logaritmo ($2$) y la base de la potencia ($3$) son distintas, así que la propiedad no aplica.
errores_frecuentes:
- Aplicar la propiedad cuando la base del logaritmo y de la potencia no son iguales.
- Olvidar que el resultado incluye el signo del exponente cuando este es negativo.
- Confundir esta propiedad con $b^{\log_b(x)}=x$, que tiene la composición en orden inverso.
- No verificar que la base cumpla $b>0$, $b\neq1$ antes de simplificar.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
