  enunciado: 'Respecto de «Adición de polinomios con coeficientes fraccionarios»: ¿Es válida esta afirmación?
    «Sumar numeradores y denominadores directamente sin buscar denominador común»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al sumar polinomios con **Coeficientes Fraccionarios**,
