semantic_id: MAT.ALG.ADICION_POL.COEFICIENTES_FRACCIONARIOS
titulo: Adición de polinomios con coeficientes fraccionarios
objetivo: Sumar polinomios cuyos coeficientes son fracciones, aplicando la suma de fracciones término
  a término.
introduccion: Igual que en la vida real podemos tener la mitad de una torta más un cuarto de torta, en
  álgebra podemos sumar polinomios con coeficientes fraccionarios. La lógica no cambia, solo necesitamos
  recordar cómo sumar fracciones.
resumen: Al sumar polinomios con **Coeficientes Fraccionarios**, el proceso es idéntico al de la adición
  normal, pero al sumar los coeficientes de cada familia, se aplica la suma de fracciones con denominador
  común.
explicacion: '### Definición formal


  La suma de fracciones requiere denominador común. La suma de numeradores y denominadores es un error
  fundamental.


  ### Desarrollo didáctico


  Suma: $(\frac{1}{2}x^2 + \frac{1}{3}x) + (\frac{1}{4}x^2 - \frac{2}{3}x + 1)$.


  Familia $x^2$: $\frac{1}{2} + \frac{1}{4} = \frac{2}{4} + \frac{1}{4} = \frac{3}{4}$.

  Familia $x$: $\frac{1}{3} - \frac{2}{3} = \frac{-1}{3}$.

  Constante: $1$.


  Resultado: $\frac{3}{4}x^2 - \frac{1}{3}x + 1$.'
procedimiento:
- 'Paso 1: Identifica las familias de términos semejantes.'
- 'Paso 2: Para cada familia, extrae los coeficientes fraccionarios.'
- 'Paso 3: Suma o resta esas fracciones buscando denominador común.'
- 'Paso 4: El resultado de cada operación de fracciones forma el nuevo coeficiente de su familia.'
ejemplos:
- titulo: Mitades y cuartos
  enunciado: 'Suma: (1/2)a + (1/4)a + (3/4)a.'
  solucion_pasos:
  - Todos son de la familia 'a'. Sumamos los coeficientes.
  - MCD de 2, 4, 4 es 4.
  - 1/2 = 2/4.
  - 2/4 + 1/4 + 3/4 = 6/4 = 3/2.
  - 'Resultado: (3/2)a.'
- titulo: Un nutricionista combina dos dietas. La primera aporta $\frac{1}{4}p$ de proteína y $\frac{1
  enunciado: 'Un nutricionista combina dos dietas. La primera aporta $\frac{1}{4}p$ de proteína y $\frac{1}{2}c$
    de carbohidratos. La segunda aporta $\frac{3}{4}p$ y $\frac{1}{4}c$. ¿Cuál es el aporte nutricional
    total? (v1)


    Opciones: A) $p + \frac{3}{4}c$ · B) $p + \frac{3}{4}c$... misma respuesta · C) $\frac{4}{8}p + \frac{3}{6}c$
    · D) $\frac{1}{2}p + \frac{3}{4}c$'
  solucion_pasos:
  - 'Proteína: $\frac{1}{4}+\frac{3}{4}=\frac{4}{4}=1p$. Carbohidratos: $\frac{1}{2}+\frac{1}{4}=\frac{2}{4}+\frac{1}{4}=\frac{3}{4}c$.
    Total: $p + \frac{3}{4}c$.'
