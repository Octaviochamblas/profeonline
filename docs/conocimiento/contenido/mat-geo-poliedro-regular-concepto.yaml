semantic_id: MAT.GEO.POLIEDROS_PRISMAS.POLIEDRO_REGULAR_CONCEPTO
titulo: Concepto de poliedro regular
objetivo: Reconocer el poliedro regular como aquel cuyas caras son polígonos regulares congruentes entre
  sí, con el mismo número de caras concurriendo en cada vértice.
introduccion: 'Un poliedro regular es la versión ''perfectamente simétrica'' de un poliedro: todas sus
  caras son idénticas y en cada vértice se repite exactamente el mismo patrón.'
resumen: Un poliedro regular es aquel cuyas caras son todas polígonos regulares congruentes entre sí,
  y en el que concurre el mismo número de caras en cada vértice.
explicacion: '![Concepto de poliedro regular](/static/img/geometria/espacio-cuerpos/poliedro-regular-concepto.svg)


  ### Definición formal


  Un poliedro regular cumple dos condiciones: (1) todas sus caras son polígonos regulares congruentes
  entre sí (mismo número de lados, misma medida), y (2) en cada vértice concurre exactamente el mismo
  número de caras. Existen exactamente cinco poliedros regulares, conocidos como los sólidos platónicos.


  ### Desarrollo didáctico


  En la figura, el cubo es un poliedro regular: sus 6 caras son cuadrados congruentes, y en cada uno de
  sus 8 vértices concurren exactamente 3 caras. Un prisma rectangular con caras de distinto tamaño (no
  todas cuadradas) NO sería un poliedro regular, aunque sí sería un poliedro común.'
procedimiento:
- 'Paso 1: Verifica que todas las caras del poliedro sean polígonos regulares (lados y ángulos iguales
  entre sí).'
- 'Paso 2: Verifica que todas esas caras sean además congruentes entre sí (mismo tamaño).'
- 'Paso 3: Verifica que en cada vértice concurra el mismo número de caras; si se cumplen las tres condiciones,
  el poliedro es regular.'
ejemplos:
- titulo: Verificar que el cubo es un poliedro regular
  enunciado: El cubo tiene 6 caras cuadradas congruentes, con 3 caras concurriendo en cada vértice.
  solucion_pasos:
  - 'El cubo es un poliedro regular, ya que cumple ambas condiciones: caras regulares congruentes y mismo
    número de caras por vértice.'
- titulo: Reconocer un poliedro que NO es regular
  enunciado: Un prisma rectangular tiene caras cuadradas y rectangulares de distinto tamaño.
  solucion_pasos:
  - Ese prisma NO es un poliedro regular, ya que sus caras no son todas congruentes entre sí (algunas
    son cuadradas y otras rectangulares, o de distinto tamaño).
- titulo: ¿Existen solo cinco poliedros regulares posibles?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, son los cinco sólidos platónicos: tetraedro, hexaedro (cubo), octaedro, dodecaedro e icosaedro
    regulares.'
- titulo: ¿Un prisma hexagonal con todas las caras cuadradas sería regular?
  respuesta: 'No'
  solucion_pasos:
  - 'No necesariamente: además de que las caras laterales sean cuadradas, se requiere que las bases también
    sean polígonos regulares congruentes con esas caras, condición que un prisma hexagonal estándar no
    cumple.'
errores_frecuentes:
- Creer que cualquier poliedro con caras iguales entre sí ya es regular, sin verificar que sean específicamente
  polígonos regulares.
- Confundir poliedro regular con simplemente 'poliedro simétrico' sin verificar las condiciones formales
  completas.
- Pensar que existen más de cinco poliedros regulares posibles.
fuente: 'Elaboración propia (referencia: Moraleja 96).'
estado: publicado
