semantic_id: MAT.EST.GRAFICOS_BASE.BARRAS_DOBLES
titulo: Utilizar gráficos de barras dobles para comparar categorías
objetivo: Utilizar gráficos de barras dobles (o agrupadas) para comparar dos series de datos dentro de
  las mismas categorías.
introduccion: Cuando se quiere comparar dos grupos (por ejemplo, hombres y mujeres) dentro de las mismas
  categorías, el gráfico de barras dobles es más informativo que dos gráficos separados.
resumen: Un gráfico de barras dobles presenta, para cada categoría, dos barras adyacentes correspondientes
  a dos series de datos distintas, facilitando su comparación directa.
explicacion: '![Gráfico de barras dobles](/static/img/estadistica/grafbase/grafbase-barras-dobles.svg)


  ### Definición formal


  Para cada categoría se dibujan dos barras adyacentes (con colores distintos), una por cada serie de
  datos que se compara.


  ### Desarrollo didáctico


  Para comparar las preferencias deportivas entre hombres y mujeres, se dibuja para cada deporte una barra
  con la frecuencia de hombres y otra adyacente con la de mujeres, usando colores distintos para cada
  serie.'
procedimiento:
- 'Paso 1: Identifica las categorías comunes y las dos series de datos a comparar.'
- 'Paso 2: Para cada categoría, dibuja dos barras adyacentes, una por cada serie, con un color distinto
  para cada una.'
- 'Paso 3: Incluye una leyenda que indique qué color corresponde a cada serie de datos.'
ejemplos:
- titulo: Comparar preferencias deportivas por género
  enunciado: 'Fútbol: hombres=8, mujeres=3. Básquetbol: hombres=5, mujeres=6.'
  solucion_pasos:
  - Para fútbol se dibujan dos barras adyacentes (8 y 3); para básquetbol, otras dos (5 y 6), con colores
    distintos por género.
- titulo: Comparar ventas de dos años
  enunciado: 'Producto A: 2024=120, 2025=140. Producto B: 2024=90, 2025=85.'
  solucion_pasos:
  - Para cada producto se dibujan dos barras adyacentes, una por cada año, permitiendo comparar el cambio.
- titulo: ¿Un gráfico de barras dobles permite comparar dos series dentro de la misma categoría?
  respuesta: Sí
  solucion_pasos:
  - Sí, es precisamente su propósito principal.
- titulo: ¿Es necesaria una leyenda de colores en un gráfico de barras dobles?
  respuesta: Sí
  solucion_pasos:
  - Sí, para que el lector distinga claramente a qué serie corresponde cada color.
errores_frecuentes:
- Omitir la leyenda de colores, generando confusión sobre qué serie representa cada barra.
- Usar escalas distintas para las dos series, lo que distorsiona la comparación visual entre ellas.
- Confundir el gráfico de barras dobles con el gráfico de barras apiladas (que suma ambas series en una
  sola barra).
fuente: 'Elaboración propia (referencia: Moraleja 352, 269).'
estado: publicado
