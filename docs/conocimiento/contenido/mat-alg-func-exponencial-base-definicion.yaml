semantic_id: MAT.ALG.FUNC_EXPONENCIAL_BASE.DEFINICION
titulo: Definición de función exponencial
objetivo: Comprender la función exponencial como aquella en la que la variable independiente aparece en el exponente.
introduccion: Hasta ahora la variable siempre estaba en la base de una potencia (como $x^2$); en la función exponencial,
  los papeles se invierten y la variable pasa a ocupar el exponente.
resumen: Una **función exponencial** es una función de la forma $f(x)=a\cdot b^x$, donde la variable independiente
  $x$ aparece como exponente de una base constante $b$.
explicacion: '### Definición formal


  Una función $f:\mathbb{R} \to \mathbb{R}$ es exponencial si puede expresarse como $f(x)=a\cdot b^x$, con $a\neq0$,
  $b>0$ y $b\neq1$. El nombre "exponencial" refleja que la variable $x$ ocupa la posición del exponente, no de
  la base.


  ### Desarrollo didáctico


  Para reconocer una función exponencial, se busca la variable en la posición del exponente; si la variable
  está en la base de la potencia (como en $x^3$), la función no es exponencial, sino potencial o polinómica.


  $f(x)=3\cdot2^x$ es exponencial, porque $x$ está en el exponente. En cambio, $g(x)=x^3$ no es exponencial, porque
  la variable está en la base.'
procedimiento:
- 'Paso 1: Observa la regla de la función.'
- 'Paso 2: Identifica si la variable $x$ aparece como exponente de una base constante.'
- 'Paso 3: Si es así, y la base es positiva y distinta de 1, la función es exponencial.'
ejemplos:
- titulo: Reconocimiento de una función exponencial
  enunciado: '¿Es $f(x)=5\cdot3^x$ una función exponencial?'
  solucion_pasos:
  - La variable $x$ está en el exponente, con base $3>0$ y $3\neq1$.
  - Sí, es una función exponencial.
- titulo: Reconocimiento de una función que no es exponencial
  enunciado: '¿Es $g(x)=x^5$ una función exponencial?'
  solucion_pasos:
  - La variable $x$ está en la base, no en el exponente.
  - No, es una función potencial, no exponencial.
- titulo: ¿Toda función con un exponente es necesariamente exponencial?
  enunciado: ¿Toda función con un exponente es necesariamente exponencial?
  respuesta: 'No'
  solucion_pasos:
  - Solo lo es si la variable independiente ocupa la posición del exponente; si el exponente es un número fijo,
    la función es potencial, no exponencial.
- titulo: ¿Puede la base de una función exponencial ser un número negativo?
  enunciado: ¿Puede la base de una función exponencial ser un número negativo?
  respuesta: 'No'
  solucion_pasos:
  - La base debe ser positiva para que la función esté bien definida para todo $x$ real.
errores_frecuentes:
- Confundir una función exponencial ($a\cdot b^x$) con una función potencial ($a\cdot x^n$).
- No verificar que la base sea positiva y distinta de 1.
- Confundir la posición de la variable, asumiendo que puede estar en la base o en el exponente indistintamente.
- Clasificar como exponencial una función donde el exponente es constante y no contiene la variable.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
