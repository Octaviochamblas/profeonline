semantic_id: MAT.NUM.PORCENTAJES.CALCULO_VALOR
titulo: Cálculo del c% de una cantidad
objetivo: Calcular un porcentaje determinado de una cantidad dada.
introduccion: Si la tienda anuncia un 30% de descuento en una zapatilla de $50.000, ¿cuántos billetes
  te estás ahorrando exactamente? Este es el cálculo porcentual más usado en el mundo real.
resumen: Para calcular el $c\%$ de una cantidad $N$, se multiplica $N$ por la fracción $c/100$ o por su
  número decimal asociado ($0.c$).
explicacion: 'Calcular el porcentaje de una cantidad significa encontrar esa porción específica sobre
  un número base.


  Matemáticamente, la palabra ''de'' significa multiplicación. Por ende, el ''$c\%$ de $N$'' se traduce
  como:

  $$\text{Valor} = N \cdot \frac{c}{100}$$


  Puedes hacerlo de tres formas (elige la más cómoda para los números que tengas):

  1. Multiplicar $N \cdot c$ y luego dividir por $100$.

  2. Convertir $c\%$ a decimal y multiplicar: $N \cdot 0.c$.

  3. Usar fracciones equivalentes si es un porcentaje famoso (ej. para $25\%$, divides $N$ por $4$).'
procedimiento:
- 'Paso 1: Identifica el porcentaje a calcular ($c$) y la cantidad base ($N$).'
- 'Paso 2: Plantea la multiplicación $N \cdot (c/100)$.'
- 'Paso 3: Realiza la operación (multiplica y luego divide por 100, o usa decimales).'
ejemplos:
- titulo: Cálculo estándar
  enunciado: Calcula el 15% de 400.
  solucion_pasos:
  - Multiplicamos $400 \cdot 15 = 6000$.
  - 'Dividimos por 100: $6000 / 100 = 60$.'
  - El 15% de 400 es 60.
errores_frecuentes:
- Dividir la cantidad $N$ por el porcentaje $c$ (ej. $400 / 15$).
- Calcular el porcentaje pero olvidar restarlo o sumarlo si el problema preguntaba por un descuento o
  aumento final.
- Olvidar los ceros al multiplicar por decimales.
fuente: Currículum Nacional MINEDUC.
estado: publicado
