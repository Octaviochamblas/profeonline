semantic_id: MAT.ALG.FUNCION_EVALUACION.PREIMAGEN_DESDE_VALOR
titulo: Determinación de preimagen a partir de una imagen dada
objetivo: Calcular la preimagen de un valor resolviendo la ecuación que se obtiene al igualar la función
  a ese valor.
introduccion: Ahora el juego se invierte. En vez de darte el ingrediente y pedirte el resultado, te dan
  el resultado y te piden averiguar qué ingrediente lo produjo.
resumen: Determinar la preimagen de un valor $y_0$ para una función $f$ consiste en resolver la ecuación
  $f(x) = y_0$ para la incógnita $x$, obteniendo todos los valores del dominio que producen esa imagen.
explicacion: '### Definición formal


  Dada una función $f$ y un valor $y_0$ del codominio, hallar la preimagen de $y_0$ es resolver la ecuación
  $f(x) = y_0$ en la variable $x$; el conjunto de soluciones que pertenecen al dominio de $f$ constituye
  $f^{-1}(\{y_0\})$.


  ### Desarrollo didáctico


  El procedimiento es el inverso de evaluar: en vez de sustituir $x$ y calcular $y$, ahora conoces $y$
  y despejas $x$.


  Si $f(x) = 2x + 3$ y buscas qué $x$ produce $f(x) = 11$, resuelves $2x+3=11$, obteniendo $2x=8$, $x=4$.
  Por lo tanto, la preimagen de $11$ es $\{4\}$.'
procedimiento:
- 'Paso 1: Escribe la ecuación $f(x) = y_0$, donde $y_0$ es el valor dado.'
- 'Paso 2: Resuelve la ecuación aplicando las técnicas algebraicas correspondientes (transposición, factorización,
  etc.).'
- 'Paso 3: Verifica que cada solución obtenida pertenezca al dominio de $f$.'
- 'Paso 4: El conjunto de soluciones válidas es la preimagen buscada.'
ejemplos:
- titulo: Preimagen en función lineal
  enunciado: Si $f(x) = 5x - 4$, determina la preimagen de $16$.
  solucion_pasos:
  - Se resuelve $5x-4=16$.
  - $5x=20 \Rightarrow x=4$.
  - 'Preimagen: $\{4\}$.'
- titulo: Preimagen con dos soluciones
  enunciado: Si $f(x) = x^2 - 1$, determina la preimagen de $8$.
  solucion_pasos:
  - Se resuelve $x^2-1=8$, es decir $x^2=9$.
  - Las soluciones son $x=3$ y $x=-3$.
  - 'Preimagen: $\{3, -3\}$.'
- titulo: ¿Determinar la preimagen de $y_0$ es lo mismo que resolver $f(x)=y_0$?
  enunciado: ¿Determinar la preimagen de $y_0$ es lo mismo que resolver $f(x)=y_0$?
  respuesta: Sí
  solucion_pasos:
  - Por definición, la preimagen son las soluciones de esa ecuación.
- titulo: ¿Toda ecuación $f(x)=y_0$ tiene al menos una solución real?
  enunciado: ¿Toda ecuación $f(x)=y_0$ tiene al menos una solución real?
  respuesta: 'No'
  solucion_pasos:
  - Si $y_0$ no pertenece al recorrido de f, la ecuación no tiene solución real (preimagen vacía).
errores_frecuentes:
- Confundir la preimagen con la imagen, evaluando $f(y_0)$ en vez de resolver $f(x)=y_0$.
- Olvidar considerar todas las soluciones cuando la ecuación tiene más de una raíz.
- No descartar soluciones que no pertenezcan al dominio de la función.
- Suponer que la preimagen siempre existe, sin verificar si $y_0$ pertenece al recorrido.
