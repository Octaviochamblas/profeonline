semantic_id: MAT.GEO.TRIG_APLICACIONES.DEPRESION_DEFINICION
titulo: Concepto de ángulo de depresión medido hacia abajo desde la horizontal
objetivo: Definir el ángulo de depresión como el ángulo agudo medido desde la horizontal hacia abajo hasta
  la línea de mira que apunta a un objeto ubicado por debajo del nivel del observador.
introduccion: 'Cuando alguien mira hacia un objeto que está más abajo que sus ojos (un bote desde un faro,
  una persona desde un edificio), se forma un ángulo entre la horizontal y la línea de mira: ese es el
  ángulo de depresión.'
resumen: El ángulo de depresión es el ángulo agudo formado entre la horizontal, a la altura del observador,
  y la línea de mira dirigida hacia un objeto ubicado por debajo de esa horizontal.
explicacion: '![Ángulo de depresión](/static/img/geometria/trigonometria/trigapli-depresion-definicion.svg)


  ### Definición formal


  Sea un observador situado en un punto elevado y un objeto ubicado por debajo del nivel de sus ojos.
  El ángulo de depresión $\theta$ es el ángulo agudo entre la recta horizontal que pasa por el observador
  y la línea de mira (recta que une al observador con el objeto).


  ### Desarrollo didáctico


  En la figura, el observador está arriba y traza una horizontal punteada hacia la derecha. La línea de
  mira baja hacia el objeto. El ángulo $\theta$ entre la horizontal y la línea de mira es el ángulo de
  depresión. Como la horizontal del observador y la horizontal del suelo son paralelas, el ángulo de depresión
  es igual al ángulo de elevación medido desde el objeto hacia el observador (ángulos alternos internos).'
procedimiento:
- 'Paso 1: Ubica al observador en un punto elevado y traza la horizontal a la altura de sus ojos.'
- 'Paso 2: Traza la línea de mira desde el observador hasta el objeto (que está por debajo de la horizontal).'
- 'Paso 3: El ángulo entre la horizontal y la línea de mira, medido hacia abajo, es el ángulo de depresión.'
ejemplos:
- titulo: Reconocer un ángulo de depresión en un contexto
  enunciado: Un salvavidas ubicado en una torre observa a un nadador en el agua, mirando hacia abajo respecto
    de la horizontal.
  solucion_pasos:
  - El ángulo formado entre la horizontal (a la altura de los ojos del salvavidas) y la línea de mira
    hacia el nadador es un ángulo de depresión.
- titulo: Relacionar el ángulo de depresión con el de elevación
  enunciado: Un observador en un faro mide un ángulo de depresión de 20° hacia un bote.
  solucion_pasos:
  - Por ángulos alternos internos entre horizontales paralelas, el ángulo de elevación que mediría alguien
    en el bote hacia el faro también es 20°.
- titulo: ¿El ángulo de depresión se mide desde la horizontal del observador?
  respuesta: Sí
  solucion_pasos:
  - Sí, se mide desde la horizontal a la altura de los ojos del observador, no desde el suelo donde está
    el objeto.
- titulo: ¿El ángulo de depresión puede ser mayor que 90°?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición es un ángulo agudo entre la horizontal y la línea de mira.
errores_frecuentes:
- Confundir el ángulo de depresión con el ángulo que se forma respecto de la vertical.
- Suponer que el ángulo de depresión y el de elevación son distintos en una misma situación, olvidando
  la relación de ángulos alternos internos.
- Medir el ángulo desde el nivel del suelo del objeto en vez de desde la horizontal del observador.
fuente: 'Elaboración propia (referencia: Moraleja 183, 184).'
estado: publicado
