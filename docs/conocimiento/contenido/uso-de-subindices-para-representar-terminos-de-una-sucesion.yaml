semantic_id: MAT.NUM.SUCESIONES_BASE.NOTACION_SUBINDICE
titulo: Uso de subíndices para representar términos de una sucesión
objetivo: Utilizar e interpretar la notación algebraica con subíndices ($a_n$) en sucesiones.
introduccion: 'Los matemáticos son perezosos para escribir. En lugar de anotar ''el quinto número de la
  fila A es 20'', inventaron un símbolo corto y elegante: $a_5 = 20$. Conocer este idioma te ahorrará
  mucha lectura.'
resumen: Para referirnos a un término específico usamos una letra minúscula seguida de un subíndice. $a_1$
  es el primer término, $a_2$ es el segundo, y $a_n$ se refiere al término genérico en la posición '$n$'.
explicacion: 'En vez de escribir frases largas, usamos la **notación de subíndice**:

  - Se elige una letra para nombrar a la sucesión completa (casi siempre **$a$**, a veces $b$, $c$, etc.).

  - Se le añade un número pequeñito abajo a la derecha (**el subíndice**), que indica la posición.


  Ejemplo en la sucesión $a$: $7, 14, 21, 28, \dots$

  - **$a_1 = 7$** (Se lee ''a sub uno es igual a siete'').

  - **$a_2 = 14$**

  - **$a_4 = 28$**


  El símbolo mágico es **$a_n$**, que significa ''un término cualquiera que está en la posición $n$''.
  Te permite hablar de las reglas de la sucesión de manera universal sin referirte a un número específico.'
procedimiento:
- 'Paso 1: Identifica la letra base (por ejemplo ''a'') que nombra la lista.'
- 'Paso 2: Mira el número chiquito (subíndice). Ese es la posición ''n''.'
- 'Paso 3: Busca en la lista el valor numérico que está en esa posición.'
ejemplos:
- titulo: Traduciendo el subíndice
  enunciado: 'Dada la sucesión b: 100, 90, 80, 70, 60... ¿Cuánto vale la suma de $b_2 + b_5$?'
  solucion_pasos:
  - El subíndice indica la posición.
  - $b_2$ es el segundo término, que vale 90.
  - $b_5$ es el quinto término, que vale 60.
  - La suma es 90 + 60 = 150.
errores_frecuentes:
- Creer que el subíndice multiplica a la letra (pensar que $a_3$ significa 'a multiplicado por 3').
- Confundir el subíndice (posición) con el exponente (potencia). ¡Van escritos abajo, no arriba!
fuente: Currículum Nacional MINEDUC.
estado: publicado
