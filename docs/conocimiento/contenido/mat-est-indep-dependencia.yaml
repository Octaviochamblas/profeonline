semantic_id: MAT.EST.INDEPENDENCIA_CONDICIONAL.DEPENDENCIA
titulo: Identificación de eventos dependientes mediante cambio de probabilidad
objetivo: Identificar eventos dependientes reconociendo que la probabilidad condicional P(A|B) es distinta
  de la probabilidad simple P(A).
introduccion: Cuando el conocimiento de un evento altera la probabilidad de otro, esa alteración numérica
  es la señal matemática precisa de dependencia.
resumen: 'Dos eventos son dependientes si $P(A|B)\neq P(A)$: la ocurrencia de $B$ cambia (aumenta o disminuye)
  la probabilidad de $A$.'
explicacion: '![Identificación de eventos dependientes](/static/img/probabilidad/independencia/indep-dependencia.svg)


  ### Definición formal


  Si $P(A|B)>P(A)$, se dice que $B$ favorece la ocurrencia de $A$; si $P(A|B)<P(A)$, se dice que $B$ desfavorece
  a $A$. En ambos casos, $A$ y $B$ son dependientes.


  ### Desarrollo didáctico


  Si P(aprobar)=0,6 pero P(aprobar|asistencia regular)=0,85, la asistencia regular favorece claramente
  la aprobación: ambos eventos son dependientes, y de forma positiva.'
procedimiento:
- 'Paso 1: Calcula la probabilidad simple P(A) y la probabilidad condicional P(A|B).'
- 'Paso 2: Compara ambos valores para determinar si son distintos.'
- 'Paso 3: Si son distintos, identifica si B favorece (P(A|B)>P(A)) o desfavorece (P(A|B)<P(A)) la ocurrencia
  de A.'
ejemplos:
- titulo: Identificar dependencia positiva
  enunciado: P(aprobar)=0,6, P(aprobar|asistencia regular)=0,85.
  solucion_pasos:
  - 'Como P(aprobar|asistencia)>P(aprobar), la asistencia regular favorece la aprobación: son dependientes.'
- titulo: Identificar dependencia negativa
  enunciado: P(llegar a tiempo)=0,7, P(llegar a tiempo|hay congestión vial)=0,3.
  solucion_pasos:
  - 'Como P(llegar a tiempo|congestión)<P(llegar a tiempo), la congestión desfavorece llegar a tiempo:
    son dependientes.'
- titulo: ¿Una diferencia entre P(A) y P(A|B) siempre indica dependencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, cualquier diferencia (mayor o menor) confirma dependencia entre los eventos.
- titulo: ¿Puede un evento B favorecer a A en una dirección y desfavorecerlo en otra situación distinta?
  respuesta: 'No'
  solucion_pasos:
  - No directamente; la relación de dependencia entre A y B (favorecer o desfavorecer) es una propiedad
    fija de esos eventos específicos en ese contexto, no cambia entre repeticiones del mismo experimento.
errores_frecuentes:
- Concluir dependencia sin verificar realmente la diferencia numérica entre P(A) y P(A|B).
- Confundir 'B favorece a A' con 'B causa a A' en un sentido causal fuerte (la dependencia estadística
  no implica necesariamente causalidad).
- No distinguir entre dependencia positiva (favorece) y negativa (desfavorece) al interpretar el resultado.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
