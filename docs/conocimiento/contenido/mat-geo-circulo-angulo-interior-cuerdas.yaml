semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_INTERIOR_CUERDAS
titulo: Medida de un ángulo interior formado por dos cuerdas que se intersectan dentro de la circunferencia
objetivo: Calcular la medida de un ángulo formado por dos cuerdas que se cruzan en un punto interior de
  la circunferencia, a partir de los arcos que dicho ángulo y su opuesto por el vértice determinan.
introduccion: Cuando dos cuerdas se cruzan dentro de un círculo, el ángulo que forman no es simplemente
  la mitad de un arco, sino el promedio de dos arcos opuestos.
resumen: Si dos cuerdas $AB$ y $CD$ se intersectan en un punto interior $P$, la medida del ángulo formado
  es $m(\angle APC)=\frac{m(\text{arco }AC)+m(\text{arco }BD)}{2}$.
explicacion: '![Ángulo interior formado por dos cuerdas](/static/img/geometria/circunferencia-circulo/circulo-angulo-interior-cuerdas.svg)


  ### Definición formal


  Si dos cuerdas $AC$ y $BD$ de una circunferencia se intersectan en un punto interior $P$, la medida
  del ángulo $\angle APB$ (o su opuesto por el vértice $\angle CPD$) es igual a la semisuma de los arcos
  que dicho ángulo y su ángulo opuesto interceptan: $m(\angle APB)=\frac{m(\text{arco }AB)+m(\text{arco
  }CD)}{2}$.


  ### Desarrollo didáctico


  Si el arco $AB$ mide 70° y el arco $CD$ mide 50°, el ángulo formado entre las cuerdas en su punto de
  intersección mide $\frac{70°+50°}{2}=60°$. Este resultado se obtiene trazando una cuerda auxiliar y
  usando la propiedad del ángulo exterior de un triángulo junto con el teorema del ángulo inscrito.'
procedimiento:
- 'Paso 1: Identifica las dos cuerdas que se intersectan y el punto de intersección interior.'
- 'Paso 2: Identifica los dos arcos que quedan ''enfrentados'' por el ángulo de interés y su opuesto por
  el vértice.'
- 'Paso 3: Suma ambos arcos y divide el resultado entre 2 para obtener la medida del ángulo.'
ejemplos:
- titulo: Calcular un ángulo interior a partir de dos arcos
  enunciado: Dos cuerdas se cruzan dentro de una circunferencia; los arcos que enfrenta el ángulo miden
    70° y 50°.
  solucion_pasos:
  - m(ángulo)=(70°+50°)/2=120°/2=60°.
- titulo: Calcular un arco desconocido a partir del ángulo interior
  enunciado: El ángulo formado por dos cuerdas que se cruzan mide 65°, y uno de los arcos enfrentados
    mide 80°.
  solucion_pasos:
  - 65×2=130=80+x → x=130-80=50°; el otro arco mide 50°.
- titulo: ¿Este ángulo depende de dos arcos y no de uno solo?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del ángulo inscrito (que depende de un solo arco), este ángulo depende de la suma
    de dos arcos opuestos.
- titulo: ¿Este ángulo puede calcularse igual que un ángulo inscrito simple?
  respuesta: 'No'
  solucion_pasos:
  - No, requiere promediar dos arcos, no solo tomar la mitad de un único arco.
errores_frecuentes:
- Usar solo uno de los dos arcos en vez de sumar ambos antes de dividir entre 2.
- Confundir los arcos que 'enfrenta' el ángulo con los arcos adyacentes a las cuerdas.
- Aplicar la fórmula del ángulo inscrito (mitad de un solo arco) en vez de la del ángulo interior (semisuma
  de dos arcos).
fuente: Elaboración propia (sin fuente específica).
estado: publicado
