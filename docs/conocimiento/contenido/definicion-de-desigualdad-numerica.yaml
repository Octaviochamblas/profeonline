semantic_id: MAT.ALG.ORDEN_FUNDAMENTOS.DESIGUALDAD_NUMERICA
titulo: Definición de desigualdad numérica
objetivo: Evaluar la veracidad de desigualdades formadas exclusivamente por valores numéricos.
introduccion: Antes de introducir variables, es fundamental dominar la comparación de constantes numéricas
  conocidas.
resumen: Una desigualdad numérica es una proposición matemática que compara dos valores fijos, la cual
  puede ser verdadera o falsa.
explicacion: '### Definición formal

  Una desigualdad numérica es una expresión de la forma $c_1 \\mathcal{R} c_2$, donde $c_1, c_2 \\in \\mathbb{R}$
  y $\\mathcal{R} \\in \\{<, >, \\leq, \\geq\\}$.


  ### Desarrollo didáctico

  La evaluación de estas desigualdades se realiza simplificando las expresiones numéricas y verificando
  la consistencia según los axiomas de orden.'
procedimiento:
- Simplificar las operaciones a ambos lados de la desigualdad.
- Comparar los valores numéricos resultantes.
- Determinar el valor de verdad de la proposición lógica.
ejemplos:
- enunciado: Analizar la validez de la relación para $x = 3$ frente a $y = 2$.
  solucion_pasos:
  - Evaluar los valores asignados a cada variable.
  - Comparar los resultados obtenidos en el marco de la definición formal.
  titulo: Ejemplo de análisis 1 en el contexto de la relación matemática
- enunciado: Analizar la validez de la relación para $x = 4$ frente a $y = 4$.
  solucion_pasos:
  - Evaluar los valores asignados a cada variable.
  - Comparar los resultados obtenidos en el marco de la definición formal.
  titulo: Ejemplo de análisis 2 en el contexto de la relación matemática
- respuesta: Sí
  solucion_pasos:
  - Reemplazar el valor propuesto en la formulación.
  - Verificar la concordancia lógica positiva.
  titulo: ¿Cumple el número $5$ con la condición matemática descrita?
- respuesta: 'No'
  solucion_pasos:
  - Sustituir la cantidad constante en el modelo algebraico.
  - Demostrar que el valor no satisface la exigencia definida.
  titulo: ¿Cumple el número $-3$ con la condición matemática descrita?
errores_frecuentes:
- Las desigualdades numéricas siempre tienen solución múltiple.
- Una desigualdad falsa no es una desigualdad matemática.
- Multiplicar una desigualdad numérica por un negativo no requiere cambios.
- El valor absoluto siempre preserva el sentido de la desigualdad numérica.
- Las fracciones no se pueden comparar en desigualdades numéricas sin convertirlas a decimales.
fuente: Elaboración propia
estado: publicado
