semantic_id: MAT.EST.MEDIA_PROMEDIO.GEOMETRICA
titulo: Conocer el concepto y cálculo básico de la media geométrica
objetivo: Conocer el concepto de media geométrica como la raíz n-ésima del producto de n valores, útil
  especialmente para tasas de crecimiento.
introduccion: A diferencia de la media aritmética, la media geométrica es más apropiada cuando se combinan
  valores que representan tasas o factores multiplicativos, como el crecimiento porcentual.
resumen: La media geométrica de $n$ valores positivos es la raíz $n$-ésima del producto de todos ellos.
explicacion: '![Concepto de media geométrica](/static/img/estadistica/promedio/media-geometrica.svg)


  ### Definición formal


  $MG=\sqrt[n]{x_1\times x_2\times\cdots\times x_n}$, la raíz n-ésima del producto de los n valores.


  ### Desarrollo didáctico


  Para los valores 4 y 9, la media geométrica es $MG=\sqrt{4\times9}=\sqrt{36}=6$, distinta de la media
  aritmética, que sería $(4+9)/2=6{,}5$.'
procedimiento:
- 'Paso 1: Identifica los n valores positivos de los que se calculará la media geométrica.'
- 'Paso 2: Multiplica todos esos valores entre sí.'
- 'Paso 3: Calcula la raíz n-ésima de ese producto (por ejemplo, raíz cuadrada si son 2 valores, raíz
  cúbica si son 3).'
ejemplos:
- titulo: Calcular la media geométrica de 4 y 9
  enunciado: 'Valores: 4, 9.'
  solucion_pasos:
  - MG=√(4×9)=√36=6.
- titulo: Calcular la media geométrica de 2, 8 y 4
  enunciado: 'Valores: 2, 8, 4.'
  solucion_pasos:
  - MG=∛(2×8×4)=∛64=4.
- titulo: ¿La media geométrica siempre requiere que los valores sean positivos?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que involucra raíces de productos, que no están bien definidas con valores negativos en el
    caso general.
- titulo: ¿La media geométrica es igual a la media aritmética en general?
  respuesta: 'No'
  solucion_pasos:
  - No, ambas son medidas distintas; solo coinciden cuando todos los valores son iguales entre sí.
errores_frecuentes:
- Aplicar la media geométrica a valores negativos, cuando en el caso general esta medida requiere valores
  positivos.
- Confundir la raíz n-ésima correspondiente, usando raíz cuadrada cuando en realidad hay más de 2 valores.
- Usar la media aritmética en contextos donde la media geométrica es más apropiada (como tasas de crecimiento
  compuesto).
fuente: Elaboración propia.
estado: publicado
