semantic_id: MAT.EST.PERMUTACIONES_VARIACIONES.PERMUTACION_CON_REPETIDOS
titulo: Cálculo de permutaciones con elementos repetidos
objetivo: Calcular el número de permutaciones de un conjunto que contiene elementos repetidos, dividiendo
  el factorial total por los factoriales de cada grupo de repetidos.
introduccion: Cuando algunos elementos de un conjunto son idénticos entre sí, muchas de las permutaciones
  'aparentes' resultan indistinguibles, por lo que se debe dividir para no contarlas más de una vez.
resumen: El número de permutaciones de $n$ elementos, donde hay grupos de elementos repetidos de tamaños
  $n_1, n_2, \ldots$, es $\dfrac{n!}{n_1!\times n_2!\times\cdots}$.
explicacion: '![Permutaciones con elementos repetidos](/static/img/probabilidad/permvar/permvar-permutacion-con-repetidos.svg)


  ### Definición formal


  Si entre los $n$ elementos hay grupos indistinguibles de tamaños $n_1,n_2,\ldots$ (con $n_1+n_2+\cdots=n$),
  el número de arreglos distintos es $\dfrac{n!}{n_1!\times n_2!\times\cdots}$.


  ### Desarrollo didáctico


  La palabra ''MAMA'' tiene 4 letras, con la M repetida 2 veces y la A repetida 2 veces. El número de
  arreglos distintos es $\dfrac{4!}{2!\times2!}=\dfrac{24}{4}=6$.'
procedimiento:
- 'Paso 1: Identifica el número total de elementos n y los grupos de elementos repetidos, con sus tamaños
  n1, n2, etc.'
- 'Paso 2: Calcula n! (el total sin considerar las repeticiones).'
- 'Paso 3: Divide ese valor por el producto de los factoriales de cada grupo repetido (n1!×n2!×...) para
  obtener el número de arreglos distintos.'
ejemplos:
- titulo: Calcular las permutaciones de la palabra MAMA
  enunciado: 4 letras, M repetida 2 veces, A repetida 2 veces.
  solucion_pasos:
  - 4!/(2!×2!)=24/4=6 arreglos distintos.
- titulo: Calcular las permutaciones de la palabra BANANA
  enunciado: '6 letras: B(1), A(3), N(2).'
  solucion_pasos:
  - 6!/(1!×3!×2!)=720/12=60 arreglos distintos.
- titulo: ¿Se debe dividir por el factorial de cada grupo de elementos repetidos?
  respuesta: Sí
  solucion_pasos:
  - Sí, para no contar como distintos los arreglos que en realidad son indistinguibles entre sí.
- titulo: ¿Esta fórmula se reduce a n! si no hay ningún elemento repetido?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que todos los grupos tendrían tamaño 1, y 1!=1 no afecta la división.
errores_frecuentes:
- Olvidar dividir por el factorial de algún grupo de elementos repetidos, sobreestimando el conteo.
- Confundir el tamaño de cada grupo repetido, usando valores incorrectos en la fórmula.
- Aplicar esta fórmula cuando en realidad todos los elementos son distintos (caso en que basta con n!
  directamente).
fuente: 'Elaboración propia (referencia: Moraleja 299).'
estado: publicado
