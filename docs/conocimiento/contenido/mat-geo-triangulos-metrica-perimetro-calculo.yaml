semantic_id: MAT.GEO.TRIANGULOS_METRICA.PERIMETRO_CALCULO
titulo: Cálculo del perímetro de un triángulo sumando sus tres lados
objetivo: Calcular el perímetro de un triángulo a partir de las medidas numéricas de sus tres lados.
introduccion: Aplicar la definición de perímetro a casos numéricos concretos es el paso natural después
  de comprender qué representa.
resumen: Para calcular el perímetro de un triángulo se suman directamente las medidas numéricas de sus
  tres lados.
explicacion: '![Cálculo del perímetro con lados 3, 4 y 5](/static/img/geometria/triangulos/triangulos-metrica-perimetro-calculo.svg)


  ### Definición formal


  Dado un triángulo con lados de medidas $a$, $b$ y $c$ expresadas en una misma unidad, su perímetro es
  $P=a+b+c$.


  ### Desarrollo didáctico


  Para un triángulo con lados 3 cm, 4 cm y 5 cm: $P=3+4+5=12$ cm. Si las medidas estuvieran en distintas
  unidades, primero habría que convertirlas a una unidad común antes de sumar.'
procedimiento:
- 'Paso 1: Verifica que las tres medidas estén en la misma unidad.'
- 'Paso 2: Suma las tres medidas.'
- 'Paso 3: Expresa el resultado con la unidad correspondiente.'
ejemplos:
- titulo: Calcular con el triángulo 3-4-5
  enunciado: Un triángulo tiene lados 3 cm, 4 cm y 5 cm.
  solucion_pasos:
  - El perímetro es 3+4+5=12 cm.
- titulo: Calcular con unidades mixtas
  enunciado: Un triángulo tiene lados 20 cm, 0,3 m y 25 cm.
  solucion_pasos:
  - Se convierte 0,3 m a 30 cm; luego 20+30+25=75 cm.
- titulo: ¿Es necesario unificar las unidades antes de sumar?
  respuesta: Sí
  solucion_pasos:
  - Sí, de lo contrario la suma no tiene sentido matemático.
- titulo: ¿El perímetro de un triángulo 3-4-5 es 60?
  respuesta: 'No'
  solucion_pasos:
  - No, la suma correcta es 3+4+5=12, no 3×4×5=60 (eso sería un producto, no una suma).
errores_frecuentes:
- Multiplicar los lados en vez de sumarlos.
- Sumar medidas en unidades distintas sin convertirlas primero.
- Omitir uno de los tres lados al calcular la suma.
fuente: Elaboración propia.
estado: publicado
