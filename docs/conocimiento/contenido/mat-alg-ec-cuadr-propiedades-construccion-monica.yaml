semantic_id: MAT.ALG.EC_CUADR_PROPIEDADES.CONSTRUCCION_MONICA
titulo: Formación de una ecuación cuadrática mónica conocidas sus raíces
objetivo: Construir la ecuación cuadrática mónica (con $a=1$) que tiene dos raíces dadas, usando las relaciones
  de Vieta en sentido inverso.
introduccion: 'Así como se puede pasar de una ecuación a sus raíces, también se puede hacer el camino inverso: dadas
  dos raíces, reconstruir la ecuación cuadrática más simple que las tiene como soluciones.'
resumen: Dadas dos raíces $x_1$ y $x_2$, la **ecuación cuadrática mónica** que las tiene como soluciones es $x^2-(x_1+x_2)x+x_1x_2=0$.
explicacion: '### Definición formal


  Si $x_1$ y $x_2$ son las raíces deseadas, la ecuación cuadrática mónica (con coeficiente principal $a=1$) que
  las tiene como soluciones es $x^2-(x_1+x_2)x+(x_1 \cdot x_2)=0$. Esta fórmula es la aplicación inversa de las
  relaciones de Vieta: en vez de partir de la ecuación para hallar suma y producto, se parte de la suma y el producto
  para construir la ecuación.


  ### Desarrollo didáctico


  Basta con calcular la suma y el producto de las raíces dadas, y sustituirlos directamente en la fórmula $x^2-(\text{suma})x+(\text{producto})=0$.


  Para raíces $x_1=3$ y $x_2=-2$: suma $=1$, producto $=-6$. La ecuación mónica es $x^2-1x+(-6)=0$, es decir $x^2-x-6=0$.'
procedimiento:
- 'Paso 1: Calcula la suma $x_1+x_2$ de las raíces dadas.'
- 'Paso 2: Calcula el producto $x_1 \cdot x_2$ de las raíces dadas.'
- 'Paso 3: Sustituye ambos valores en $x^2-(\text{suma})x+(\text{producto})=0$.'
ejemplos:
- titulo: Construcción con raíces positivas
  enunciado: 'Construye la ecuación mónica cuyas raíces son $4$ y $5$.'
  solucion_pasos:
  - 'Suma $=4+5=9$; producto $=4 \cdot 5=20$.'
  - 'La ecuación es $x^2-9x+20=0$.'
- titulo: Construcción con una raíz negativa
  enunciado: 'Construye la ecuación mónica cuyas raíces son $-3$ y $7$.'
  solucion_pasos:
  - 'Suma $=-3+7=4$; producto $=-3 \cdot 7=-21$.'
  - 'La ecuación es $x^2-4x-21=0$.'
- titulo: ¿Es única la ecuación mónica con dos raíces dadas?
  enunciado: ¿Es única la ecuación mónica con dos raíces dadas?
  respuesta: Sí
  solucion_pasos:
  - Fijando $a=1$, la suma y el producto de las raíces determinan completamente los coeficientes $b$ y $c$.
- titulo: ¿El coeficiente $b$ de la ecuación mónica es igual a la suma de las raíces?
  enunciado: ¿El coeficiente $b$ de la ecuación mónica es igual a la suma de las raíces?
  respuesta: 'No'
  solucion_pasos:
  - El coeficiente $b$ es el opuesto de la suma de las raíces, es decir $b=-(x_1+x_2)$, no la suma directamente.
errores_frecuentes:
- Olvidar el signo negativo delante del término de la suma al construir la ecuación.
- Confundir la posición de la suma y el producto dentro de la fórmula.
- Cometer errores de signo al calcular la suma o el producto cuando alguna raíz es negativa.
- Construir una ecuación con $a\neq1$ pensando que la mónica permite cualquier coeficiente principal.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
