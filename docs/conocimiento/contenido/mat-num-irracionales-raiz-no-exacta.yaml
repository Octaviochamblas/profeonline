semantic_id: MAT.NUM.IRRACIONALES.RAIZ_NO_EXACTA
objetivo: Decidir si una raíz entera no exacta es irracional.
introduccion: La calculadora muestra \(\sqrt{7}\approx2.6458\), pero esos dígitos
  son solo una aproximación. El símbolo radical conserva un valor exacto que no cabe
  en una expansión decimal finita.
resumen: La raíz de un entero positivo que no es potencia perfecta suele ser irracional.
  Una aproximación de la raíz no convierte el valor exacto en racional.
explicacion: |-
  La raíz de un entero positivo que no es potencia perfecta suele ser irracional.

  Al analizar “como \(4<7<9\), se tiene \(2<\sqrt{7}<3\), pero no existe una fracción decimal finita que sea su valor exacto” conviene observar la conexión siguiente: una aproximación de la raíz no convierte el valor exacto en racional
procedimiento:
- 'Paso 1: Compara el radicando con potencias perfectas consecutivas.'
- 'Paso 2: Verifica que ninguna potencia entera produzca exactamente el radicando.'
- 'Paso 3: Conserva el radical como valor exacto y usa decimales únicamente para aproximar.'
ejemplos:
- titulo: Aplicación razonada — Identificación de raíces no exactas como irracionales
  enunciado: Como \(4<7<9\), se tiene \(2<\sqrt{7}<3\), pero no existe una fracción
    decimal finita que sea su valor exacto.
  solucion_pasos:
  - Compara el radicando con potencias perfectas consecutivas.
  - Verifica que ninguna potencia entera produzca exactamente el radicando.
  - Conserva el radical como valor exacto y usa decimales únicamente para aproximar.
- titulo: Revisión de una solución — Identificación de raíces no exactas como irracionales
  enunciado: Una solución aplica “Verifica que ninguna potencia entera produzca exactamente
    el radicando.”, pero termina sin comprobar que una aproximación de la raíz no
    convierte el valor exacto en racional. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de raíces no exactas como irracionales:
    la raíz de un entero positivo que no es potencia perfecta suele ser irracional.'
  - Compara el radicando con potencias perfectas consecutivas.
  - 'Completa la revisión con este control: Conserva el radical como valor exacto
    y usa decimales únicamente para aproximar.'
- titulo: ¿Se cumple que una aproximación de la raíz no convierte el valor exacto
    en racional? — Identificación de raíces no exactas como irracionales
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la raíz de un entero positivo que no
    es potencia perfecta suele ser irracional.
  - El caso “como \(4<7<9\), se tiene \(2<\sqrt{7}<3\), pero no existe una fracción
    decimal finita que sea su valor exacto” satisface esa condición.
  - Conserva el radical como valor exacto y usa decimales únicamente para aproximar.
- titulo: ¿Es válido omitir el paso “Compara el radicando con potencias perfectas
    consecutivas”? — Identificación de raíces no exactas como irracionales
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de raíces no
    exactas como irracionales.
  - 'Omitirlo puede volver inválida la acción siguiente: Verifica que ninguna potencia
    entera produzca exactamente el radicando.'
  - 'La solución debe terminar de este modo: Conserva el radical como valor exacto
    y usa decimales únicamente para aproximar.'
errores_frecuentes:
- 'Confundir identificación de raíces no exactas como irracionales con otro concepto
  y omitir este inicio: Compara el radicando con potencias perfectas consecutivas.'
- Aplicar mecánicamente “Verifica que ninguna potencia entera produzca exactamente
  el radicando.” sin revisar las condiciones de la definición.
- Tomar “como \(4<7<9\), se tiene \(2<\sqrt{7}<3\), pero no existe una fracción decimal
  finita que sea su valor exacto” como una igualdad aislada, sin explicar por qué
  es válida.
- Aceptar una respuesta que contradice la idea clave “una aproximación de la raíz
  no convierte el valor exacto en racional”.
- 'Terminar el desarrollo sin realizar este control: Conserva el radical como valor
  exacto y usa decimales únicamente para aproximar.'
