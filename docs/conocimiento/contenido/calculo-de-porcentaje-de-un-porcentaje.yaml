semantic_id: MAT.NUM.PORCENTAJES.PORCENTAJE_DE_PORCENTAJE
titulo: Cálculo de porcentaje de un porcentaje
objetivo: Calcular el porcentaje de un porcentaje y representarlo como un porcentaje único.
introduccion: Si hay una liquidación del 50% y sobre eso te hacen un 20% extra por ser socio, ¿es un 70%
  total? ¡NO! Es el 20% de lo que quedó. Entender los porcentajes encadenados evita que las tiendas te
  engañen.
resumen: 'Para calcular el $A\%$ del $B\%$ de una cantidad, se multiplican las fracciones correspondientes:
  $(A/100) \cdot (B/100)$. Nunca se suman directamente.'
explicacion: "Calcular el porcentaje de otro porcentaje significa que la base referencial (el Total) ha\
  \ cambiado.\n\nPor ejemplo, el $50\\%$ del $20\\%$ no es el $70\\%$. Matemáticamente, se traduce reemplazando\
  \ el 'del' por una multiplicación:\n\n$$\\frac{50}{100} \\cdot \\frac{20}{100} = \\frac{1}{2} \\cdot\
  \ \\frac{1}{5} = \\frac{1}{10} = 10\\%$$\n\n¡El 50% (la mitad) del 20% es lógicamente el 10% del total!\
  \ \nSi quieres saber el porcentaje único, siempre multiplica las fracciones porcentuales y simplifica\
  \ hasta que quede un único denominador 100."
procedimiento:
- 'Paso 1: Escribe cada porcentaje como una fracción sobre 100.'
- 'Paso 2: Multiplica ambas fracciones entre sí.'
- 'Paso 3: Simplifica la fracción resultante para que el denominador vuelva a ser 100. El numerador será
  el porcentaje real equivalente.'
ejemplos:
- titulo: Porcentaje de porcentaje
  enunciado: Calcula el 25% del 40% de una cantidad.
  solucion_pasos:
  - 'Escribimos las fracciones: $(25/100) \cdot (40/100)$.'
  - 'Simplificamos: $25/100$ es $1/4$. $40/100$ es $2/5$.'
  - 'Multiplicamos: $(1/4) \cdot (2/5) = 2/20$.'
  - 'Llevamos a denominador 100 multiplicando por 5 arriba y abajo: $10/100$.'
  - Equivale a calcular el 10% de la cantidad original.
errores_frecuentes:
- Sumar los porcentajes (ej. creer que el 20% del 30% es un 50%).
- Multiplicar los números enteros directamente sin dividir por $100 \cdot 100$ (ej. $20 \cdot 30 = 600\%$
  en lugar de $6\%$).
fuente: Currículum Nacional MINEDUC.
estado: publicado
