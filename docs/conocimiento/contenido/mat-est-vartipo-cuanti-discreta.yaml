semantic_id: MAT.EST.VARIABLES_TIPOS.CUANTI_DISCRETA
titulo: Clasificar variables cuantitativas discretas
objetivo: Clasificar variables cuantitativas discretas como aquellas asociadas a procesos de conteo, que
  toman valores numéricos enteros y separados.
introduccion: Dentro de las variables cuantitativas, algunas provienen de contar elementos y otras de
  medir magnitudes continuas.
resumen: Una variable cuantitativa discreta es aquella que proviene de un proceso de conteo, tomando valores
  numéricos enteros, separados entre sí (sin valores intermedios posibles).
explicacion: '![Variables cuantitativas discretas](/static/img/estadistica/vartipo/vartipo-cuanti-discreta.svg)


  ### Definición formal


  Una variable discreta toma valores dentro de un conjunto contable (usualmente números enteros), sin
  que existan valores intermedios entre dos consecutivos.


  ### Desarrollo didáctico


  El número de hijos de una familia (0, 1, 2, 3, ...) es una variable discreta: no puede tomar el valor
  2,5 hijos, ya que proviene de un conteo de unidades completas.'
procedimiento:
- 'Paso 1: Verifica que la variable sea cuantitativa (numérica).'
- 'Paso 2: Analiza si sus valores provienen de un proceso de conteo (unidades completas, sin fracciones
  con sentido).'
- 'Paso 3: Si es así, la variable es discreta.'
ejemplos:
- titulo: Clasificar el número de hijos como discreta
  enunciado: Se registra el número de hijos de cada familia.
  solucion_pasos:
  - Es una variable discreta, ya que proviene de un conteo (no puede haber 2,5 hijos).
- titulo: Clasificar el número de autos como discreta
  enunciado: Se registra el número de autos que posee cada familia.
  solucion_pasos:
  - Es una variable discreta, ya que es un conteo de unidades completas de autos.
- titulo: ¿El peso corporal es una variable discreta?
  respuesta: 'No'
  solucion_pasos:
  - No, es continua, ya que puede tomar cualquier valor decimal dentro de un rango (proviene de medición,
    no de conteo).
- titulo: ¿El número de goles anotados en un partido es una variable discreta?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que proviene de un conteo de unidades completas (no se pueden anotar 2,5 goles).
errores_frecuentes:
- Confundir una variable discreta con una continua, especialmente cuando los valores discretos parecen
  'grandes' o variados.
- Pensar que cualquier variable numérica entera es automáticamente discreta, sin verificar si proviene
  realmente de un conteo.
- No reconocer que entre dos valores discretos consecutivos no existen valores intermedios con sentido
  para esa variable.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
