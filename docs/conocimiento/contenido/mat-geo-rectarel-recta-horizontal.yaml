semantic_id: MAT.GEO.RECTA_RELACIONES.RECTA_HORIZONTAL
titulo: Identificación de rectas horizontales a partir de su pendiente
objetivo: Identificar que una recta es horizontal cuando su pendiente es igual a cero, y que su ecuación
  tiene la forma y=k.
introduccion: Cuando la pendiente de una recta es 0, significa que y no cambia sin importar el valor de
  x, lo que geométricamente corresponde a una línea horizontal.
resumen: Una recta es horizontal si y solo si su pendiente es $m=0$; su ecuación tiene la forma $y=k$,
  para alguna constante $k$.
explicacion: '![Recta horizontal](/static/img/geometria/analitica/rectarel-recta-horizontal.svg)


  ### Definición formal


  Si $m=0$, la ecuación $y=mx+b$ se reduce a $y=b$, una constante independiente de $x$: la recta horizontal.


  ### Desarrollo didáctico


  La recta $y=3$ es horizontal: para cualquier valor de $x$ (positivo, negativo o cero), el valor de $y$
  siempre es 3.'
procedimiento:
- 'Paso 1: Verifica si la pendiente de la recta es igual a 0.'
- 'Paso 2: Si m=0, reconoce que la ecuación tiene la forma y=k (constante).'
- 'Paso 3: Interpreta que la recta es paralela al eje x, a una altura k.'
ejemplos:
- titulo: Reconocer una recta horizontal por su ecuación
  enunciado: y=3.
  solucion_pasos:
  - Esta ecuación no depende de x, por lo que representa una recta horizontal a la altura y=3.
- titulo: Reconocer una recta horizontal por dos puntos
  enunciado: Puntos (2,5) y (7,5).
  solucion_pasos:
  - Como ambos puntos tienen la misma coordenada y, la pendiente es 0 y la recta es horizontal (y=5).
- titulo: ¿Una recta horizontal tiene pendiente igual a 0?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición que define a una recta horizontal.
- titulo: ¿El eje x mismo es un caso particular de recta horizontal?
  respuesta: Sí
  solucion_pasos:
  - Sí, el eje x corresponde a la recta horizontal y=0.
errores_frecuentes:
- Confundir recta horizontal con recta vertical.
- Creer que una recta horizontal no tiene ecuación definida.
- Asumir que una recta horizontal debe pasar necesariamente por el origen.
fuente: Elaboración propia.
