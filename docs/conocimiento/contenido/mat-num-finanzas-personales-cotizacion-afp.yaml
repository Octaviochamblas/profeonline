semantic_id: MAT.NUM.FINANZAS_PERSONALES.COTIZACION_AFP
objetivo: Calcular la cotización previsional obligatoria (AFP y salud) sobre un sueldo
  imponible.
introduccion: ¿Te ofrecieron un trabajo por $1.000.000? Cuidado, ese dinero no llegará
  completo a tu cuenta. El Estado exige que guardes una parte obligatoria para tu
  jubilación y salud. Lo que te llega se llama 'sueldo líquido'.
resumen: En Chile, de tu Sueldo Imponible se descuenta aproximadamente un 10% obligatorio
  para jubilación (AFP) + la comisión de la AFP (ej. 1.5%), y un 7% obligatorio para
  Salud (Fonasa o Isapre).
explicacion: "Al firmar un contrato, tu sueldo se divide así:\n\n1. **Sueldo Imponible:**\
  \ El monto base sobre el cual se calculan los descuentos.\n2. **Descuentos Legales\
  \ (Cotizaciones):**\n   - **AFP (Fondo de Pensiones):** Un $10\\%$ obligatorio que\
  \ va a tu cuenta individual para la vejez, más una comisión que cobra la AFP (ej:\
  \ $0.6\\%$ a $1.5\\%$). En promedio, se descuenta alrededor de un $11\\%$ total.\n\
  \   - **Salud:** Un $7\\%$ obligatorio (va a Fonasa o a pagar el plan base de tu\
  \ Isapre).\n   - *Seguro de Cesantía e Impuestos (si corresponde).* \n3. **Sueldo\
  \ Líquido:** Es el dinero que finalmente te depositan en el banco ($Liquido = Imponible\
  \ - Cotizaciones$)."
procedimiento:
- 'Paso 1: Identifica el Sueldo Imponible.'
- 'Paso 2: Calcula el $10\%$ para la cuenta de AFP (sin contar la comisión) multiplicando
  el Imponible por $0.10$.'
- 'Paso 3: Calcula el $7\%$ para Salud multiplicando el Imponible por $0.07$.'
ejemplos:
- titulo: Descuento de Salud y AFP
  enunciado: Si tu sueldo imponible es de $800.000, ¿cuánto dinero va a tu fondo de
    pensión (el 10%) y cuánto a salud (7%)?
  solucion_pasos:
  - 'Pensión (10%): $800.000 \cdot 0.10 = 80.000$.'
  - 'Salud (7%): $800.000 \cdot 0.07 = 56.000$.'
  - 'Total de esos dos descuentos legales: $136.000.'
errores_frecuentes:
- Creer que la AFP descuenta exactamente el 10% de tu sueldo (descuenta un poco más
  debido a la comisión por administración).
- Pensar que el Sueldo Imponible es lo que recibirás a fin de mes.
fuente: Currículum Nacional MINEDUC.
estado: publicado
