semantic_id: MAT.NUM.APROXIMACIONES.REGLA_DEL_CINCO
objetivo: Aplicar correctamente la regla del cinco.
introduccion: La idea “Si la cifra siguiente es menor que 5, la cifra conservada se
  mantiene” cobra sentido al analizar el caso “Al redondear \(8.267\) a la centésima,
  como la milésima es 7, resulta \(8.27\)”. Ese vínculo es el foco de regla del cinco
  en el redondeo.
resumen: La regla del cinco indica que si la cifra siguiente es 5 o mayor se aumenta
  en una unidad la cifra que se conserva. Como criterio de control, si la cifra siguiente
  es menor que 5, la cifra conservada se mantiene
explicacion: |-
  La regla del cinco indica que si la cifra siguiente es 5 o mayor se aumenta en una unidad la cifra que se conserva.

  Para analizar “Al redondear \(8.267\) a la centésima, como la milésima es 7, resulta \(8.27\)” se identifican los datos, se aplica la definición y se controla el resultado mediante la idea “Si la cifra siguiente es menor que 5, la cifra conservada se mantiene”.
procedimiento:
- 'Paso 1: Identifica la primera cifra que será eliminada.'
- 'Paso 2: Si esa cifra es \(5\) o mayor, incrementa la última cifra conservada; si
  es menor, mantenla.'
- 'Paso 3: Revisa posibles llevadas, como al redondear \(1.99\) a décimas.'
ejemplos:
- titulo: Aplicación razonada — Regla del cinco en el redondeo
  enunciado: Al redondear \(8.267\) a la centésima, como la milésima es 7, resulta
    \(8.27\).
  solucion_pasos:
  - Identifica la primera cifra que será eliminada.
  - Si esa cifra es \(5\) o mayor, incrementa la última cifra conservada; si es menor,
    mantenla.
  - Revisa posibles llevadas, como al redondear \(1.99\) a décimas.
- titulo: Revisión de una solución — Regla del cinco en el redondeo
  enunciado: Una solución aplica “Si esa cifra es \(5\) o mayor, incrementa la última
    cifra conservada; si es menor, mantenla.”, pero termina sin comprobar que si la
    cifra siguiente es menor que 5, la cifra conservada se mantiene. Determina qué
    falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define regla del cinco en el redondeo: la regla del
    cinco indica que si la cifra siguiente es 5 o mayor se aumenta en una unidad la
    cifra que se conserva.'
  - Identifica la primera cifra que será eliminada.
  - 'Completa la revisión con este control: Revisa posibles llevadas, como al redondear
    \(1.99\) a décimas.'
- titulo: ¿Se cumple que si la cifra siguiente es menor que 5, la cifra conservada
    se mantiene? — Regla del cinco en el redondeo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la regla del cinco indica que si la
    cifra siguiente es 5 o mayor se aumenta en una unidad la cifra que se conserva.
  - El caso “Al redondear \(8.267\) a la centésima, como la milésima es 7, resulta
    \(8.27\)” satisface esa condición.
  - Revisa posibles llevadas, como al redondear \(1.99\) a décimas.
- titulo: ¿Es válido omitir el paso “Identifica la primera cifra que será eliminada”?
    — Regla del cinco en el redondeo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de regla del cinco en el redondeo.
  - 'Omitirlo puede volver inválida la acción siguiente: Si esa cifra es \(5\) o mayor,
    incrementa la última cifra conservada; si es menor, mantenla.'
  - 'La solución debe terminar de este modo: Revisa posibles llevadas, como al redondear
    \(1.99\) a décimas.'
errores_frecuentes:
- 'Empezar regla del cinco en el redondeo sin realizar este control inicial: Identifica
  la primera cifra que será eliminada.'
- Memorizar “Al redondear \(8.267\) a la centésima, como la milésima es 7, resulta
  \(8.27\)” como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Si esa cifra es \(5\) o mayor, incrementa la última
  cifra conservada; si es menor, mantenla.” y usarlo aunque cambien las condiciones
  del problema.
- Dar por válida una conclusión sobre regla del cinco en el redondeo que contradice
  el criterio “Si la cifra siguiente es menor que 5, la cifra conservada se mantiene”.
- 'Cerrar el ejercicio sin esta comprobación específica: Revisa posibles llevadas,
  como al redondear \(1.99\) a décimas.'
