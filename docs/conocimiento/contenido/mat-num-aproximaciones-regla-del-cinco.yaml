semantic_id: MAT.NUM.APROXIMACIONES.REGLA_DEL_CINCO
objetivo: Comprender regla del cinco en el redondeo y aplicarlo correctamente en ejercicios
  básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso regla del cinco en el redondeo ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: La regla del cinco indica que si la cifra siguiente es 5 o mayor se aumenta
  en una unidad la cifra que se conserva. Además, si la cifra siguiente es menor que
  5, la cifra conservada se mantiene.
explicacion: |-
  La regla del cinco indica que si la cifra siguiente es 5 o mayor se aumenta en una unidad la cifra que se conserva.

  Una idea importante es que si la cifra siguiente es menor que 5, la cifra conservada se mantiene.

  Por ejemplo, Al redondear \(8.267\) a la centésima, como la milésima es 7, resulta \(8.27\).
procedimiento:
- 'Paso 1: Identificar el orden al que se quiere aproximar el número.'
- 'Paso 2: Mirar la cifra relevante y aplicar defecto, exceso, redondeo o truncamiento
  según corresponda.'
- 'Paso 3: Escribir la aproximación y comprobar si cumple la condición pedida.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Al redondear \(8.267\) a la centésima,
    como la milésima es 7, resulta \(8.27\).” se relaciona con regla del cinco en
    el redondeo.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: la regla del cinco indica que si la cifra siguiente
    es 5 o mayor se aumenta en una unidad la cifra que se conserva.'
  - Concluye que el ejemplo sí ilustra regla del cinco en el redondeo.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Si la cifra siguiente es menor que 5, la cifra
    conservada se mantiene.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con regla del cinco en el redondeo?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que si la cifra siguiente es menor que 5, la
    cifra conservada se mantiene.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar regla del cinco en el redondeo ignorando la definición o
    las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar regla del cinco en el redondeo sin mirar qué representan numerador,
  denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
estado: publicado
