semantic_id: MAT.GEO.CIRCULO_TEOREMAS.TANGENTE_SECANTE_SEGMENTOS
titulo: Identificación del segmento tangente y los segmentos de la secante trazados desde un punto exterior
objetivo: Identificar correctamente el segmento tangente y los segmentos exterior y total de una secante,
  ambos trazados desde un mismo punto exterior a la circunferencia.
introduccion: Cuando desde un punto exterior se traza una tangente y también una secante, hay que distinguir
  con precisión el segmento tangente de los dos segmentos que genera la secante.
resumen: Si desde un punto exterior $P$ se traza una tangente que toca la circunferencia en $T$ y una
  secante que la corta en $A$ (cercano) y $B$ (lejano), el segmento $PT$ es el segmento tangente, $PA$
  es el segmento exterior de la secante y $PB$ es su segmento total.
explicacion: '![Segmentos de una tangente y una secante](/static/img/geometria/circunferencia-circulo/circulo-teorema-tangente-secante-segmentos.svg)


  ### Definición formal


  Desde un punto exterior $P$ se traza una tangente que toca la circunferencia en un único punto $T$ (segmento
  tangente $PT$) y una secante que la corta en dos puntos, $A$ (cercano) y $B$ (lejano), determinando
  el segmento exterior $PA$ y el segmento total $PB$.


  ### Desarrollo didáctico


  En la figura, $PT$ es el segmento tangente (un solo punto de contacto), mientras que $PA$ y $PB$ son,
  respectivamente, el segmento exterior y el segmento total de la secante. Estos tres segmentos son la
  base para aplicar el teorema de la tangente y la secante.'
procedimiento:
- 'Paso 1: Identifica el punto exterior P, el punto de tangencia T y los dos puntos de corte de la secante
  (A cercano, B lejano).'
- 'Paso 2: Reconoce el segmento tangente PT (desde P hasta el único punto de contacto T).'
- 'Paso 3: Reconoce los segmentos de la secante: PA (exterior) y PB (total, desde P hasta el punto lejano
  B).'
ejemplos:
- titulo: Identificar el segmento tangente y los de la secante
  enunciado: Desde P se traza una tangente que toca en T, y una secante que corta en A (cercano) y B (lejano).
  solucion_pasos:
  - El segmento tangente es PT; los segmentos de la secante son PA (exterior) y PB (total).
- titulo: Reconocer que la tangente toca en un solo punto
  enunciado: La recta tangente desde P toca la circunferencia en el punto T.
  solucion_pasos:
  - A diferencia de la secante (que corta en dos puntos), la tangente toca en un único punto T.
- titulo: ¿El segmento PT es único, sin un 'segmento total' asociado?
  respuesta: Sí
  solucion_pasos:
  - Sí, dado que la tangente solo toca en un punto, PT no se divide en exterior y total como sí ocurre
    con la secante.
- titulo: ¿El segmento PB (total) incluye al segmento PA (exterior)?
  respuesta: Sí
  solucion_pasos:
  - Sí, PB va desde P hasta el punto lejano B, pasando por el punto cercano A, por lo que contiene a PA.
errores_frecuentes:
- Confundir el segmento tangente con uno de los segmentos de la secante.
- Creer que la tangente también tiene un segmento 'exterior' y otro 'total', cuando en realidad solo hay
  un segmento tangente.
- Invertir cuál punto de la secante es el cercano (A) y cuál el lejano (B).
fuente: 'Elaboración propia (referencias: Moraleja 75, Cid 133).'
estado: publicado
