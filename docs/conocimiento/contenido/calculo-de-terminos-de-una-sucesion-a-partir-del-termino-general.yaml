semantic_id: MAT.NUM.SUCESIONES_BASE.CALCULO_TERMINOS_GENERAL
titulo: Cálculo de términos de una sucesión a partir del término general
objetivo: Calcular los primeros términos o un término específico de una sucesión a partir de su fórmula
  general.
introduccion: Ya conocemos la máquina que fabrica números. ¡Ahora aprendamos a usarla! Conecta los cables,
  engrasa las piezas, introduce el número de posición y veamos qué sale por el otro lado de la fórmula.
resumen: Para construir la sucesión a partir de $a_n$, se reemplaza la $n$ por $1$ para el primer término,
  por $2$ para el segundo, por $3$ para el tercero, y así sucesivamente, respetando la jerarquía de las
  operaciones matemáticas.
explicacion: 'Construir una sucesión desde su fórmula general es un simple ejercicio de **evaluación algebraica**.


  Reglas importantes:

  1. Sustituye la letra $n$ por el número de la posición.

  2. Respeta el **PAPOMUDAS** (Paréntesis, Potencias, Multiplicación/División, Adición/Sustracción).

  3. Cuidado con los signos negativos y las fracciones.


  Ejemplo: Generar los 3 primeros términos de la sucesión $a_n = n^2 - 1$.

  - Para $n=1$: $\rightarrow (1)^2 - 1 \rightarrow 1 - 1 = 0$

  - Para $n=2$: $\rightarrow (2)^2 - 1 \rightarrow 4 - 1 = 3$

  - Para $n=3$: $\rightarrow (3)^2 - 1 \rightarrow 9 - 1 = 8$

  La sucesión comienza así: $0, 3, 8, \dots$'
procedimiento:
- 'Paso 1: Escribe la fórmula general.'
- 'Paso 2: Haz una lista con las posiciones ''n'' que te piden (ej. $n=1, n=2, n=3$).'
- 'Paso 3: Sustituye la ''n'' en la fórmula por cada número de la lista y resuelve paso a paso.'
ejemplos:
- titulo: Alternancia de signos
  enunciado: Calcula el primer y el segundo término de la sucesión con fórmula $a_n = (-1)^n \cdot 5$.
  solucion_pasos:
  - 'Para n=1: $(-1)^1 \cdot 5 = (-1) \cdot 5 = -5$.'
  - 'Para n=2: $(-1)^2 \cdot 5 = (+1) \cdot 5 = 5$.'
  - 'La sucesión empieza alternando: -5, 5...'
errores_frecuentes:
- Olvidar que $3n$ significa '3 multiplicado por n' y no '3 sumado a n'.
- Cometer errores de signos al elevar a potencias, especialmente cuando $n$ acompaña a bases negativas
  (ej. $(-1)^n$).
fuente: Currículum Nacional MINEDUC.
estado: publicado
