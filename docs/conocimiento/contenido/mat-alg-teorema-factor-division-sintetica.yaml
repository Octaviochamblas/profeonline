semantic_id: MAT.ALG.TEOREMA_FACTOR.DIVISION_SINTETICA
titulo: Mecánica de la División Sintética (Ruffini)
objetivo: Aprender el algoritmo numérico de Ruffini para dividir polinomios entre binomios lineales de forma ultra
  rápida.
introduccion: Hemos descubierto que si $(x-c)$ es un factor, podemos "sacarlo" del polinomio. ¿Pero cómo lo extraemos
  matemáticamente para ver qué queda de residuo? En lugar de hacer una división larga y tediosa con 'x' por todas
  partes, Paolo Ruffini nos legó un método sintético y veloz que solo usa los números.
resumen: La división sintética (Regla de Ruffini) es un método simplificado para dividir un polinomio entre un factor
  lineal $(x-c)$. Utiliza solo los coeficientes del polinomio, aplicando una secuencia repetitiva de "bajar, multiplicar
  por la raíz, y sumar en la siguiente columna".
explicacion: '### Definición formal


  La división sintética (Regla de Ruffini) es un método simplificado para dividir un polinomio entre un factor lineal
  $(x-c)$. Utiliza solo los coeficientes del polinomio, aplicando una secuencia repetitiva de "bajar, multiplicar
  por la raíz, y sumar en la siguiente columna".


  ### Desarrollo didáctico


  Vamos a dividir $2x^3 - 3x^2 - 4x + 5$ entre $(x - 2)$.

  La ''raíz'' de $(x-2)$ es $2$. Ese será nuestro valor de referencia (lo ponemos a la izquierda de una línea vertical).


  Escribimos solo los coeficientes en fila:  `2  -3  -4   5`


  Pasos del algoritmo:

  1. Bajar el primer número directo: Baja el `2`.

  2. Multiplicar por la raíz: $2 \times 2 = 4$. Lo ponemos debajo del siguiente número ($-3$).

  3. Sumar la columna: $-3 + 4 = 1$. (Tenemos nuestro nuevo número abajo).

  4. Repetir: Multiplicar $1 \times 2 = 2$. Lo ponemos debajo del $-4$.

  5. Sumar columna: $-4 + 2 = -2$.

  6. Repetir: Multiplicar $-2 \times 2 = -4$. Lo ponemos debajo del $5$.

  7. Sumar columna: $5 - 4 = 1$.


  Nuestra fila inferior final es: `2   1  -2  |  1`

  ¿Qué significa? El último número ($1$) es el resto. (Como el resto no es 0, $(x-2)$ no era factor exacto).

  Los números anteriores `2, 1, -2` son los coeficientes del polinomio respuesta, reducidos en un grado (eran grado
  3, ahora son grado 2): $2x^2 + 1x - 2$.'
procedimiento:
- 'Paso 1: Escribe el multiplicador (la raíz $c$ cambiando el signo del divisor $x-c$).'
- 'Paso 2: Escribe en fila los coeficientes del polinomio. Si falta un grado (ej. no hay $x^2$), debes poner un
  0 en ese espacio.'
- 'Paso 3: Baja el primer coeficiente sin cambios.'
- 'Paso 4: Multiplica el número de abajo por el multiplicador, pon el resultado en la siguiente columna.'
- 'Paso 5: Suma la columna y pon el resultado abajo. Repite hasta el final.'
ejemplos:
- titulo: Divide $x^3 - 8$ entre $(x-2)$ usando Ruffini
  enunciado: Divide $x^3 - 8$ entre $(x-2)$ usando Ruffini.
  solucion_pasos:
  - Divisor $(x-2) \rightarrow$ Raíz es 2.
  - 'Coeficientes de $x^3 - 8$: son `1, 0, 0, -8` (¡importantes los ceros de x^2 y x!).'
  - Bajar 1. Multiplicar $1*2=2$. Sumar $0+2=2$.
  - Multiplicar $2*2=4$. Sumar $0+4=4$.
  - Multiplicar $4*2=8$. Sumar $-8+8=0$.
  - 'Fila final: `1  2  4  | 0`. El resto es 0. El cociente es $x^2 + 2x + 4$.'
- titulo: Usa Ruffini en $x^2 + 5x + 6$ entre $(x+2)$
  solucion_pasos:
  - 'Raíz es -2. Coeficientes 1, 5, 6. Baja 1. $1*-2 = -2$. $5-2=3$. $3*-2=-6$. $6-6=0$. Fila final: 1  3 | 0. Cociente
    $x+3$.'
- titulo: 'Respecto de «Aplicación de división sintética»: ¿Se ajusta a la definición esta afirmación?'
  enunciado: 'Respecto de «Aplicación de división sintética»: ¿Se ajusta a la definición esta afirmación? «La división
    sintética (Regla de Ruffini) es un método simplificado para dividir un polinomio entre un factor lineal $(x-c)$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La división sintética (Regla de Ruffini) es un método simplificado
    para dividir un polinomio entre un factor lineal $(x-c)$.'
- titulo: 'Respecto de «Aplicación de división sintética»: ¿Es compatible con el procedimiento esta afi'
  enunciado: 'Respecto de «Aplicación de división sintética»: ¿Es compatible con el procedimiento esta afirmación?
    «Olvidar escribir un cero (0) en la fila de coeficientes cuando al polinomio le falta un término de grado intermedio»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La división sintética (Regla de Ruffini) es un método simplificado
    para dividir un polinomio entre un factor lineal $(x-c)$.'
errores_frecuentes:
- Olvidar escribir un cero (0) en la fila de coeficientes cuando al polinomio le falta un término de grado intermedio.
- Usar el número del divisor tal cual (ej. para $(x+3)$ usar 3 como multiplicador en lugar de la raíz correcta,
  que es -3).
- La división sintética reduce el grado del cociente en dos unidades.
- El último valor de la fila inferior es un coeficiente más del cociente.
- Un resto distinto de cero confirma que el divisor es factor exacto.
