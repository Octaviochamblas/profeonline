semantic_id: MAT.NUM.COMPLEJOS.FORMA_BINOMIAL
objetivo: Escribir expresiones complejas en forma binomial.
introduccion: El orden estándar no cambia el valor, pero vuelve visibles las dos componentes.
  Esa organización es esencial al sumar términos semejantes.
resumen: La forma binomial estándar de un complejo es \(z=a+bi\). Escribir primero
  la parte real facilita comparar y operar complejos.
explicacion: |-
  La forma binomial estándar de un complejo es \(z=a+bi\).

  Al analizar “\(4i-7\) se ordena como \(-7+4i\)” conviene observar la conexión siguiente: escribir primero la parte real facilita comparar y operar complejos
procedimiento:
- 'Paso 1: Reduce potencias de \(i\) y agrupa términos reales.'
- 'Paso 2: Agrupa por separado los términos que contienen \(i\).'
- 'Paso 3: Escribe el resultado como parte real más coeficiente imaginario por \(i\).'
ejemplos:
- titulo: Aplicación razonada — Representación binomial de un número complejo
  enunciado: \(4i-7\) se ordena como \(-7+4i\).
  solucion_pasos:
  - Reduce potencias de \(i\) y agrupa términos reales.
  - Agrupa por separado los términos que contienen \(i\).
  - Escribe el resultado como parte real más coeficiente imaginario por \(i\).
- titulo: Revisión de una solución — Representación binomial de un número complejo
  enunciado: Una solución aplica “Agrupa por separado los términos que contienen \(i\).”,
    pero termina sin comprobar que escribir primero la parte real facilita comparar
    y operar complejos. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define representación binomial de un número complejo:
    la forma binomial estándar de un complejo es \(z=a+bi\).'
  - Reduce potencias de \(i\) y agrupa términos reales.
  - 'Completa la revisión con este control: Escribe el resultado como parte real más
    coeficiente imaginario por \(i\).'
- titulo: ¿Se cumple que escribir primero la parte real facilita comparar y operar
    complejos? — Representación binomial de un número complejo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la forma binomial estándar de un complejo
    es \(z=a+bi\).
  - El caso “\(4i-7\) se ordena como \(-7+4i\)” satisface esa condición.
  - Escribe el resultado como parte real más coeficiente imaginario por \(i\).
- titulo: ¿Es válido omitir el paso “Reduce potencias de \(i\) y agrupa términos reales”?
    — Representación binomial de un número complejo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de representación binomial de un
    número complejo.
  - 'Omitirlo puede volver inválida la acción siguiente: Agrupa por separado los términos
    que contienen \(i\).'
  - 'La solución debe terminar de este modo: Escribe el resultado como parte real
    más coeficiente imaginario por \(i\).'
errores_frecuentes:
- 'Confundir representación binomial de un número complejo con otro concepto y omitir
  este inicio: Reduce potencias de \(i\) y agrupa términos reales.'
- Aplicar mecánicamente “Agrupa por separado los términos que contienen \(i\).” sin
  revisar las condiciones de la definición.
- Tomar “\(4i-7\) se ordena como \(-7+4i\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “escribir primero la parte real
  facilita comparar y operar complejos”.
- 'Terminar el desarrollo sin realizar este control: Escribe el resultado como parte
  real más coeficiente imaginario por \(i\).'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
