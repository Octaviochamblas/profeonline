semantic_id: MAT.ALG.FUNCION_CONCEPTOS.RECORRIDO
titulo: Identificación del recorrido de una función
objetivo: Determinar el recorrido (o rango) de una función como el conjunto de todas las imágenes efectivamente
  alcanzadas.
introduccion: Si el codominio es "todo lo posible", el recorrido es "todo lo que realmente ocurre". Es el subconjunto
  del codominio formado únicamente por los valores que sí son imagen de algo.
resumen: El **recorrido** (o rango) de una función $f$, denotado $\text{Rec}(f)$, es el conjunto de todos los valores
  $y$ tales que $y = f(x)$ para algún $x$ del dominio; es un subconjunto del codominio.
explicacion: '### Definición formal


  Dada $f\colon A \to B$, el recorrido se define como $\text{Rec}(f) = \{y \in B \colon \exists\, x \in A,\ f(x) = y\}$.
  Por definición, $\text{Rec}(f) \subseteq B$, y determinarlo requiere analizar qué valores puede tomar realmente
  la expresión $f(x)$ al variar $x$ en el dominio.


  ### Desarrollo didáctico


  Para funciones simples, el recorrido suele obtenerse analizando el comportamiento algebraico o gráfico de la
  función. Una parábola $f(x)=x^2$ nunca entrega valores negativos, así que su recorrido es $[0,+\infty[$, sin
  importar que el codominio declarado sea $\mathbb{R}$.


  Gráficamente, el recorrido corresponde a la proyección de la gráfica de la función sobre el eje vertical (eje
  $y$): son todas las alturas que la curva realmente alcanza.'
procedimiento:
- 'Paso 1: Analiza la expresión algebraica o el gráfico de la función.'
- 'Paso 2: Determina qué valores de $y$ pueden efectivamente obtenerse al variar $x$ dentro del dominio.'
- 'Paso 3: Si trabajas con un gráfico, proyecta la curva sobre el eje $y$ para obtener el recorrido.'
- 'Paso 4: Expresa el recorrido como intervalo o conjunto de valores.'
ejemplos:
- titulo: Recorrido de una función cuadrática básica
  enunciado: Determina el recorrido de $f(x) = x^2$.
  solucion_pasos:
  - Todo número real elevado al cuadrado es siempre mayor o igual a cero.
  - No existe ningún $x$ real para el cual $x^2$ sea negativo.
  - 'Recorrido: $[0, +\infty[$.'
- titulo: Recorrido desde un gráfico acotado
  enunciado: Si el gráfico de una función muestra que la curva nunca sube de $y=4$ ni baja de $y=-1$, ¿cuál es
    su recorrido?
  solucion_pasos:
  - El recorrido corresponde a la proyección vertical completa de la curva.
  - 'Recorrido: $[-1, 4]$.'
- titulo: ¿El recorrido siempre es igual al codominio declarado?
  enunciado: ¿El recorrido siempre es igual al codominio declarado?
  respuesta: Falso
  solucion_pasos:
  - El recorrido es solo el subconjunto del codominio efectivamente alcanzado; puede ser un subconjunto propio.
- titulo: ¿Un valor que nunca es imagen de ningún $x$ del dominio pertenece al recorrido?
  enunciado: ¿Un valor que nunca es imagen de ningún $x$ del dominio pertenece al recorrido?
  respuesta: Falso
  solucion_pasos:
  - Por definición, el recorrido solo contiene valores que sí son imagen de al menos un elemento del dominio.
errores_frecuentes:
- Confundir el recorrido con el codominio, entregando el conjunto de llegada completo en vez del subconjunto alcanzado.
- Calcular el dominio en lugar del recorrido al leer un gráfico.
- Al proyectar un gráfico, proyectar sobre el eje horizontal en vez del vertical.
- Asumir que toda función cuadrática tiene recorrido $\mathbb{R}$ sin analizar su comportamiento.
