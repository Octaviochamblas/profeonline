semantic_id: MAT.EST.VARIABLES_TIPOS.CUANTI_CONTINUA
titulo: Clasificar variables cuantitativas continuas
objetivo: Clasificar variables cuantitativas continuas como aquellas asociadas a procesos de medición,
  que pueden tomar cualquier valor dentro de un rango.
introduccion: Las variables continuas provienen de mediciones (no de conteos), por lo que admiten valores
  decimales, incluso con precisión arbitraria.
resumen: Una variable cuantitativa continua es aquella que proviene de un proceso de medición, pudiendo
  tomar cualquier valor dentro de un intervalo, incluyendo decimales.
explicacion: '![Variables cuantitativas continuas](/static/img/estadistica/vartipo/vartipo-cuanti-continua.svg)


  ### Definición formal


  Una variable continua toma valores dentro de un intervalo de números reales, existiendo siempre un valor
  intermedio posible entre dos valores dados, sin importar cuán cercanos estén.


  ### Desarrollo didáctico


  La estatura de una persona (1,65 m, 1,652 m, 1,6523 m, ...) es una variable continua: proviene de una
  medición y puede refinarse con más decimales según la precisión del instrumento.'
procedimiento:
- 'Paso 1: Verifica que la variable sea cuantitativa (numérica).'
- 'Paso 2: Analiza si sus valores provienen de un proceso de medición (con posibilidad de valores decimales
  intermedios).'
- 'Paso 3: Si es así, la variable es continua (a diferencia de la discreta, que proviene de conteo).'
ejemplos:
- titulo: Clasificar la estatura como continua
  enunciado: Se mide la estatura de cada estudiante de un curso.
  solucion_pasos:
  - Es una variable continua, ya que proviene de una medición y puede tomar valores decimales.
- titulo: Clasificar el tiempo de una carrera como continua
  enunciado: Se registra el tiempo (en segundos) que tarda cada corredor en completar una carrera.
  solucion_pasos:
  - Es una variable continua, ya que el tiempo puede medirse con cualquier precisión decimal.
- titulo: ¿El número de estudiantes en una sala es una variable continua?
  respuesta: 'No'
  solucion_pasos:
  - No, es discreta, ya que proviene de un conteo de unidades completas de estudiantes.
- titulo: ¿La temperatura ambiente es una variable continua?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que puede tomar cualquier valor decimal dentro de un rango, proveniente de una medición.
errores_frecuentes:
- Confundir una variable continua con una discreta, especialmente cuando en la práctica se redondea a
  números enteros.
- Pensar que una variable es discreta solo porque en un registro particular aparecen valores enteros (por
  ejemplo, edades redondeadas).
- No reconocer que las variables continuas admiten, en teoría, infinitos valores intermedios entre dos
  datos cualesquiera.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
