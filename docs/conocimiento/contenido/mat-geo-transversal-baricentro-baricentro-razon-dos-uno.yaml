semantic_id: MAT.GEO.TRANSVERSAL_BARICENTRO.BARICENTRO_RAZON_DOS_UNO
titulo: 'Propiedad del baricentro: división de cada transversal de gravedad en razón 2:1 desde el vértice'
objetivo: Aplicar la propiedad de que el baricentro divide cada transversal de gravedad en dos partes,
  en razón 2:1, siempre más cerca del punto medio.
introduccion: 'El baricentro no está en cualquier punto de la transversal de gravedad: siempre se ubica
  a dos tercios de la distancia entre el vértice y el punto medio del lado opuesto.'
resumen: El baricentro divide cada transversal de gravedad en razón 2:1, quedando la parte más larga junto
  al vértice.
explicacion: '![Baricentro en razón 2:1 sobre la transversal](/static/img/geometria/elementos-secundarios/transversal-baricentro-baricentro-razon-dos-uno.svg)


  ### Definición formal


  Si G es el baricentro y M es el punto medio de BC, entonces AG = 2·GM; es decir, la distancia del vértice
  al baricentro es el doble de la distancia del baricentro al punto medio.


  ### Desarrollo didáctico


  Si una transversal de gravedad mide 9 cm en total, el baricentro la divide en dos partes: 6 cm (del
  vértice al baricentro) y 3 cm (del baricentro al punto medio), manteniendo la razón 2:1.'
procedimiento:
- 'Paso 1: Identifica la transversal de gravedad completa, desde el vértice hasta el punto medio.'
- 'Paso 2: Divide su longitud total en 3 partes iguales.'
- 'Paso 3: El baricentro se ubica a 2 partes del vértice y 1 parte del punto medio.'
ejemplos:
- titulo: Calcular las partes de una transversal
  enunciado: Una transversal de gravedad mide 12 cm.
  solucion_pasos:
  - Del vértice al baricentro hay 8 cm, y del baricentro al punto medio hay 4 cm (razón 2:1).
- titulo: Calcular la transversal completa desde una parte
  enunciado: La distancia del baricentro al punto medio es 5 cm.
  solucion_pasos:
  - La distancia del vértice al baricentro es el doble, 10 cm, y la transversal completa mide 15 cm.
- titulo: ¿El baricentro está más cerca del vértice o del punto medio?
  respuesta: Del punto medio
  solucion_pasos:
  - Está más cerca del punto medio, ya que la parte del vértice al baricentro es el doble de larga.
- titulo: ¿Esta razón 2:1 es igual en las tres transversales de gravedad?
  respuesta: Sí
  solucion_pasos:
  - Sí, se cumple en las tres transversales de gravedad de cualquier triángulo.
errores_frecuentes:
- Invertir la razón, creyendo que el baricentro está más cerca del vértice.
- Dividir la transversal en partes iguales (1:1) en vez de en razón 2:1.
- Aplicar esta razón a un segmento que no es una transversal de gravedad completa.
fuente: Elaboración propia.
estado: publicado
