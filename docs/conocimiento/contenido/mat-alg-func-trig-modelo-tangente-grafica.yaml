semantic_id: MAT.ALG.FUNC_TRIG_MODELO.TANGENTE_GRAFICA
titulo: Gráfica de la función tangente
objetivo: Describir la forma de la gráfica de $f(x)=\tan(x)$, incluyendo su periodo y su comportamiento
  creciente.
introduccion: A diferencia del seno y el coseno, que son curvas onduladas acotadas, la tangente presenta un
  patrón muy distinto, con ramas que crecen sin límite.
resumen: La gráfica de $f(x)=\tan(x)$ está formada por **ramas crecientes** separadas por asíntotas verticales,
  con **periodo $\pi$** (la mitad del periodo del seno y el coseno).
explicacion: '### Definición formal


  En cada intervalo entre dos asíntotas consecutivas (de longitud $\pi$), la función $f(x)=\tan(x)$ es
  estrictamente creciente, pasando de $-\infty$ a $+\infty$. El patrón se repite exactamente cada $\pi$
  unidades, por lo que el periodo de la tangente es $\pi$, no $2\pi$.


  ### Desarrollo didáctico


  En el intervalo $(-\pi/2,\pi/2)$: $\tan(-\pi/4)=-1$, $\tan(0)=0$, $\tan(\pi/4)=1$. La curva pasa por el origen
  creciendo, y se acerca a $-\infty$ cerca de $-\pi/2$ y a $+\infty$ cerca de $\pi/2$.'
procedimiento:
- 'Paso 1: Identifica las asíntotas verticales, ubicadas en $x=\pi/2+n\pi$.'
- 'Paso 2: Dentro de cada intervalo entre asíntotas, traza una rama creciente que pasa por un punto de la forma
    $(n\pi,0)$.'
- 'Paso 3: Repite el patrón en cada intervalo de longitud $\pi$.'
ejemplos:
- titulo: Descripción de una rama de la tangente
  enunciado: 'Describe el comportamiento de $f(x)=\tan(x)$ en el intervalo $(-\pi/2,\pi/2)$.'
  solucion_pasos:
  - La función es estrictamente creciente en todo el intervalo.
  - Pasa por $(0,0)$ y se acerca a $-\infty$ y $+\infty$ en los extremos del intervalo.
- titulo: Identificación del periodo de la tangente
  enunciado: '¿Cuál es el periodo de $f(x)=\tan(x)$?'
  solucion_pasos:
  - El patrón se repite cada $\pi$ unidades, no cada $2\pi$.
  - El periodo es $\pi$.
- titulo: ¿La gráfica de la tangente está acotada, como el seno y el coseno?
  enunciado: ¿La gráfica de $f(x)=\tan(x)$ está acotada entre un valor máximo y uno mínimo, como el seno y el
    coseno?
  respuesta: 'No'
  solucion_pasos:
  - Cada rama de la tangente crece sin límite, sin un máximo ni un mínimo absoluto.
- titulo: ¿La tangente es una función creciente en cada intervalo entre asíntotas?
  enunciado: ¿La función tangente es estrictamente creciente dentro de cada intervalo entre dos asíntotas
    consecutivas?
  respuesta: Sí
  solucion_pasos:
  - Es una propiedad característica de la tangente en toda su gráfica.
errores_frecuentes:
- Confundir el periodo de la tangente ($\pi$) con el del seno o coseno ($2\pi$).
- Suponer que la tangente está acotada como el seno y el coseno.
- Trazar la curva sin marcar correctamente las asíntotas verticales.
- Suponer que la tangente decrece en algún tramo de su dominio.
