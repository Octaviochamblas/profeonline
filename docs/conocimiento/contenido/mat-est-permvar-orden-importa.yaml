semantic_id: MAT.EST.PERMUTACIONES_VARIACIONES.ORDEN_IMPORTA
titulo: Identificación de situaciones de conteo donde el orden importa
objetivo: Identificar en un problema de conteo si el orden de los elementos seleccionados es relevante,
  lo que determina si corresponde usar permutaciones o variaciones.
introduccion: El primer paso para resolver correctamente un problema de conteo es decidir si el orden
  de selección importa (como en una carrera con distintos premios) o no (como en elegir un comité sin
  distinguir roles).
resumen: El orden importa cuando distintos arreglos de los mismos elementos representan resultados diferentes
  (por ejemplo, distintos premios o posiciones); en ese caso se usan permutaciones o variaciones.
explicacion: '![Situaciones donde el orden importa](/static/img/probabilidad/permvar/permvar-orden-importa.svg)


  ### Definición formal


  Si intercambiar dos elementos seleccionados genera un resultado distinto (por ejemplo, distintos premios
  asignados), el orden importa, y se debe usar la fórmula de permutación o variación correspondiente.


  ### Desarrollo didáctico


  Asignar los tres primeros lugares de una carrera (oro, plata, bronce) es un caso donde el orden importa:
  llegar primero es distinto de llegar segundo. En cambio, elegir 3 representantes de un curso (sin distinguir
  roles) es un caso donde el orden no importa.'
procedimiento:
- 'Paso 1: Analiza si intercambiar el orden de los elementos seleccionados genera resultados distintos
  o el mismo resultado.'
- 'Paso 2: Si genera resultados distintos (por ejemplo, distintos premios o roles), el orden importa:
  usa permutación o variación.'
- 'Paso 3: Si no genera resultados distintos (la selección es la misma sin importar el orden), el orden
  no importa: usa combinación (tema del siguiente bloque).'
ejemplos:
- titulo: Reconocer un caso donde el orden importa
  enunciado: Asignar medallas de oro, plata y bronce entre 5 competidores.
  solucion_pasos:
  - 'El orden importa: quién obtiene el oro es distinto de quién obtiene la plata, aunque sean las mismas
    3 personas seleccionadas.'
- titulo: Reconocer un caso donde el orden NO importa
  enunciado: Elegir un comité de 3 personas de un grupo de 5, sin roles diferenciados.
  solucion_pasos:
  - 'El orden no importa: el comité {A,B,C} es el mismo sin importar en qué orden se eligieron sus integrantes.'
- titulo: ¿Asignar premios distintos es un caso donde el orden importa?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que cada posición (oro, plata, bronce) es un rol distinto.
- titulo: ¿Elegir un grupo sin roles diferenciados es un caso donde el orden importa?
  respuesta: 'No'
  solucion_pasos:
  - No, ya que el grupo resultante es el mismo, sin importar el orden de selección de sus integrantes.
errores_frecuentes:
- Aplicar una fórmula de variación o permutación cuando en realidad el problema corresponde a una combinación
  (orden no importa).
- Aplicar una fórmula de combinación cuando en realidad el problema requiere distinguir el orden (variación
  o permutación).
- No detenerse a analizar la naturaleza real del problema antes de elegir la fórmula, aplicando una por
  costumbre.
fuente: Elaboración propia.
estado: publicado
