semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_CENTRO_ARCO
titulo: Relación de igualdad entre la medida del ángulo del centro y la medida del arco correspondiente
objetivo: Aplicar la relación de igualdad entre la medida de un ángulo del centro y la medida (en grados)
  del arco que dicho ángulo subtiende.
introduccion: Un ángulo del centro y el arco que este determina comparten exactamente la misma medida
  en grados, lo que permite pasar de uno a otro directamente.
resumen: 'La medida de un ángulo del centro es igual a la medida del arco que subtiende: $m(\angle AOB)
  = m(\text{arco }AB)$.'
explicacion: '![Ángulo del centro igual a su arco correspondiente](/static/img/geometria/circunferencia-circulo/circulo-angulo-centro-arco.svg)


  ### Definición formal


  Por definición, la medida en grados de un arco de circunferencia se establece igual a la medida del
  ángulo del centro que lo subtiende: $m(\angle AOB)=m(\text{arco }AB)$.


  ### Desarrollo didáctico


  Si el ángulo del centro $\angle AOB$ mide 80°, entonces el arco $AB$ correspondiente también mide 80°.
  Esta igualdad es la base para relacionar ángulos y arcos en todos los teoremas posteriores de la circunferencia.'
procedimiento:
- 'Paso 1: Identifica el ángulo del centro y su arco correspondiente.'
- 'Paso 2: Aplica la igualdad m(∠AOB) = m(arco AB): ambas medidas son iguales en grados.'
- 'Paso 3: Usa el valor conocido (ángulo o arco) para determinar el valor desconocido.'
ejemplos:
- titulo: Determinar la medida del arco a partir del ángulo del centro
  enunciado: El ángulo del centro ∠AOB mide 80°.
  solucion_pasos:
  - Como m(∠AOB)=m(arco AB), el arco AB también mide 80°.
- titulo: Determinar el ángulo del centro a partir del arco
  enunciado: El arco AB mide 115°.
  solucion_pasos:
  - Como la medida del ángulo del centro es igual a la del arco, ∠AOB mide 115°.
- titulo: ¿Si el ángulo del centro mide 40°, el arco correspondiente también mide 40°?
  respuesta: Sí
  solucion_pasos:
  - Sí, por la igualdad directa entre ángulo del centro y arco correspondiente.
- titulo: ¿Esta igualdad aplica también a ángulos inscritos?
  respuesta: 'No'
  solucion_pasos:
  - No, el ángulo inscrito mide la mitad del arco, no lo mismo; la igualdad directa es exclusiva del ángulo
    del centro.
errores_frecuentes:
- Aplicar esta igualdad directa a un ángulo inscrito, olvidando que este mide la mitad del arco.
- Confundir el arco correspondiente con el arco opuesto (el que no subtiende el ángulo).
- Olvidar que ángulo y arco se miden en las mismas unidades (grados) para esta igualdad.
fuente: 'Elaboración propia (referencias: Moraleja 74, Cid 94).'
estado: publicado
