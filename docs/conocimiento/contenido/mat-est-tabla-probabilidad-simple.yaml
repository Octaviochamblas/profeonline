semantic_id: MAT.EST.TABLAS_CONTINGENCIA.PROBABILIDAD_SIMPLE
titulo: Uso de totales marginales para calcular probabilidades simples
objetivo: Calcular la probabilidad simple de una categoría de una variable, usando su total marginal dividido
  por el total general de la tabla.
introduccion: Los totales marginales permiten calcular directamente la probabilidad de una sola característica,
  sin necesidad de considerar la otra variable de la tabla.
resumen: La probabilidad simple de una categoría se calcula dividiendo su total marginal por el total
  general de la tabla.
explicacion: '![Probabilidad simple con totales marginales](/static/img/probabilidad/tablas/tabla-probabilidad-simple.svg)


  ### Definición formal


  Si el total marginal de una categoría es $n_i$ y el total general es $N$, la probabilidad simple de
  esa categoría es $P=\dfrac{n_i}{N}$.


  ### Desarrollo didáctico


  En la tabla de sexo y preferencia, si el total marginal de ''Sí'' es 40 y el total general es 60, la
  probabilidad de que una persona elegida al azar responda ''Sí'' es $P(\text{Sí})=\dfrac{40}{60}=\dfrac{2}{3}$.'
procedimiento:
- 'Paso 1: Identifica el total marginal de la categoría de interés.'
- 'Paso 2: Identifica el total general de la tabla (todos los datos).'
- 'Paso 3: Divide el total marginal por el total general para obtener la probabilidad simple.'
ejemplos:
- titulo: Calcular P(Sí) usando el total marginal
  enunciado: Total marginal 'Sí'=40, total general=60.
  solucion_pasos:
  - P(Sí)=40/60=2/3.
- titulo: Calcular P(Hombre) usando el total marginal
  enunciado: Total marginal 'Hombre'=30, total general=60.
  solucion_pasos:
  - P(Hombre)=30/60=0,5.
- titulo: ¿Se usa el total marginal (no una celda interior) para calcular una probabilidad simple?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que la probabilidad simple se refiere a una sola variable, representada por el total marginal.
- titulo: ¿El total general de la tabla siempre es el denominador de una probabilidad simple?
  respuesta: Sí
  solucion_pasos:
  - Sí, representa el total de casos posibles (n(S)).
errores_frecuentes:
- Usar una celda interior en vez del total marginal correspondiente para calcular la probabilidad simple.
- Dividir por un total marginal en vez del total general al calcular esta probabilidad.
- Confundir la probabilidad simple con la probabilidad conjunta (que sí usa una celda interior específica).
fuente: 'Elaboración propia (referencia: Moraleja 185).'
estado: publicado
