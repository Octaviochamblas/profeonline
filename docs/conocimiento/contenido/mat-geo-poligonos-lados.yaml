semantic_id: MAT.GEO.POLIGONOS_BASE.LADOS
titulo: Identificación de los lados de un polígono
objetivo: Identificar los lados de un polígono como los segmentos de recta que lo forman.
introduccion: Además de los vértices, el otro elemento fundamental que compone a todo polígono son sus
  lados, los segmentos que lo delimitan.
resumen: Los lados de un polígono son los segmentos de recta que unen vértices consecutivos, formando
  el contorno de la figura.
explicacion: '![Lados de un polígono](/static/img/geometria/poligonos-cuadrilateros/poligonos-lados.svg)


  ### Definición formal


  En un polígono de $n$ vértices, existen exactamente $n$ lados, cada uno formado por el segmento que
  une dos vértices consecutivos.


  ### Desarrollo didáctico


  Un pentágono tiene exactamente 5 lados, cada uno conectando un vértice con el siguiente en el recorrido
  de la figura. El nombre de cada polígono deriva del número de lados que posee (por ejemplo, penta- significa
  cinco).'
procedimiento:
- 'Paso 1: Identifica todos los segmentos de recta que forman el contorno del polígono.'
- 'Paso 2: Cuenta esos segmentos: ese es el número de lados.'
- 'Paso 3: Verifica que cada lado una exactamente dos vértices consecutivos.'
ejemplos:
- titulo: Contar los lados de un hexágono
  enunciado: Un hexágono tiene 6 vértices.
  solucion_pasos:
  - Tiene exactamente 6 lados, uno por cada par de vértices consecutivos.
- titulo: Relacionar el nombre del polígono con el número de lados
  enunciado: Un polígono se llama heptágono.
  solucion_pasos:
  - Tiene 7 lados, ya que 'hepta-' significa siete.
- titulo: ¿Cada lado conecta exactamente dos vértices?
  respuesta: Sí
  solucion_pasos:
  - Sí, cada lado es el segmento que une dos vértices consecutivos.
- titulo: ¿Puede un polígono tener un lado curvo?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición todos los lados de un polígono son segmentos de recta.
errores_frecuentes:
- Contar mal los lados, incluyendo diagonales como si fueran lados.
- Confundir el nombre del polígono con un número de lados incorrecto.
- Olvidar que el número de lados siempre coincide con el número de vértices.
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 46.'
estado: publicado
