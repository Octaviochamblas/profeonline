semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.CRECIMIENTO_BASE_MAYOR_UNO
titulo: Crecimiento de la función logarítmica cuando $b>1$
objetivo: Reconocer que $f(x)=\log_b(x)$ es creciente cuando la base cumple $b>1$.
introduccion: Cuando la base de un logaritmo es mayor que $1$, a medida que el argumento crece, también crece
  el valor del logaritmo, aunque cada vez más lentamente.
resumen: 'Si $b>1$, la función $f(x)=\log_b(x)$ es **estrictamente creciente**: a mayor $x$, mayor es $f(x)$, aunque
  el crecimiento se hace cada vez más lento.'
explicacion: '### Definición formal


  Si $b>1$, entonces para todo par $x_1,x_2\in\mathbb{R}^+$ con $x_1<x_2$ se cumple $\log_b(x_1)<\log_b(x_2)$; es
  decir, $f(x)=\log_b(x)$ es estrictamente creciente en todo su dominio.


  ### Desarrollo didáctico


  Con $b=2$: $\log_2(1)=0$, $\log_2(2)=1$, $\log_2(4)=2$, $\log_2(8)=3$. Cada vez que $x$ se duplica, $f(x)$ aumenta
  en $1$ unidad; el valor de la función crece de forma sostenida, aunque necesita argumentos cada vez más grandes
  para seguir subiendo.'
procedimiento:
- 'Paso 1: Verifica que la base $b$ cumple $b>1$.'
- 'Paso 2: Evalúa la función en al menos dos valores crecientes de $x$.'
- 'Paso 3: Compara los resultados y confirma que $f(x)$ aumenta cuando $x$ aumenta.'
ejemplos:
- titulo: Comparación de valores con base $10$
  enunciado: 'Compara $\log_{10}(10)$ y $\log_{10}(100)$ para $f(x)=\log_{10}(x)$.'
  solucion_pasos:
  - 'Se calcula $\log_{10}(10)=1$ y $\log_{10}(100)=2$.'
  - Como $100>10$ y $2>1$, se confirma que la función es creciente.
- titulo: Verificación de crecimiento con base $3$
  enunciado: 'Determina si $f(x)=\log_3(x)$ es creciente evaluando $x=9$ y $x=27$.'
  solucion_pasos:
  - 'Se calcula $\log_3(9)=2$ y $\log_3(27)=3$.'
  - Como $27>9$ y $3>2$, la función efectivamente crece.
- titulo: ¿Es creciente $f(x)=\log_5(x)$?
  enunciado: ¿La función $f(x)=\log_5(x)$ es creciente en todo su dominio?
  respuesta: Sí
  solucion_pasos:
  - La base $5$ cumple $b>1$, condición suficiente para que la función sea creciente.
- titulo: ¿El crecimiento logarítmico es constante?
  enunciado: ¿La rapidez con que crece $f(x)=\log_b(x)$ se mantiene constante cuando $b>1$?
  respuesta: 'No'
  solucion_pasos:
  - El crecimiento se vuelve cada vez más lento a medida que $x$ aumenta, aunque nunca se detiene.
errores_frecuentes:
- Confundir "creciente" con "crece rápidamente"; el crecimiento logarítmico es lento pero sostenido.
- Aplicar la condición $b>1$ sin verificarla antes de afirmar que la función es creciente.
- Suponer que el crecimiento depende del valor de $x$ en vez de depender de la base $b$.
- Confundir el comportamiento creciente de $b>1$ con el decreciente de $0<b<1$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
