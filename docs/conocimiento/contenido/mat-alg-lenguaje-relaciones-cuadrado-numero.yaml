semantic_id: MAT.ALG.LENGUAJE_RELACIONES.CUADRADO_NUMERO
objetivo: Traducir correctamente la operación de elevar al cuadrado en contraposición
  a multiplicar por dos.
introduccion: En el álgebra, crecer multiplicando no es lo mismo que crecer exponencialmente.
  La diferencia entre el doble y el cuadrado es la diferencia entre un edificio y
  una bomba atómica.
resumen: El **Cuadrado de un Número** se traduce elevando la variable a la potencia
  de dos ($x^2$). Representa el área de un cuadrado de lado $x$, o el producto del
  número por sí mismo ($x \cdot x$).
explicacion: "Palabras clave:\n- El cuadrado de\n- Elevado a dos\n- Multiplicado por\
  \ sí mismo\n\nComparación crítica:\n- 'El doble de un número' $\\rightarrow$ $2x$\
  \ (crecimiento lineal).\n- 'El cuadrado de un número' $\\rightarrow$ $x^2$ (crecimiento\
  \ cuadrático).\n\nEl uso del paréntesis es dictatorial cuando hay más términos.\
  \ \n- 'El cuadrado de la suma de dos números' $\\rightarrow$ Primero sumo, luego\
  \ elevo: $(x + y)^2$.\n- 'La suma de los cuadrados de dos números' $\\rightarrow$\
  \ Primero elevo, luego sumo: $x^2 + y^2$."
procedimiento:
- 'Paso 1: Identifica a qué entidad le aplicarás el cuadrado (a una letra sola, o
  a un grupo de operaciones).'
- 'Paso 2: Si es a una letra sola, colócale el exponente 2 arriba a la derecha (x^2).'
- 'Paso 3: Si es a un grupo u operación (una suma, un producto), envuelve el grupo
  en paréntesis y coloca el exponente 2 fuera de ellos.'
ejemplos:
- titulo: El orden del cuadrado
  enunciado: 'Traduce algebraicamente: ''El cuadrado de la diferencia entre a y b''.'
  solucion_pasos:
  - 'Primero analizamos qué es lo que se va a elevar: ''la diferencia entre a y b''.'
  - 'Escribimos esa diferencia: a - b.'
  - 'Ahora aplicamos el cuadrado A TODO ESO, usando paréntesis: (a - b)^2.'
errores_frecuentes:
- Confundir el cuadrado ($x^2$) con el doble ($2x$).
- Omitir los paréntesis, traduciendo 'el cuadrado de la suma' como $x + y^2$ (donde
  solo la y quedó elevada al cuadrado).
fuente: Álgebra de Baldor.
estado: publicado
