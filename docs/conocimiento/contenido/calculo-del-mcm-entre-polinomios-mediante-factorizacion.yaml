semantic_id: MAT.ALG.MCM_ALGEBRAICO.FACTORIZACION_POLINOMIOS
titulo: Cálculo del m.c.m. entre polinomios mediante factorización
objetivo: Encontrar el Mínimo Común Múltiplo entre polinomios (binomios, trinomios) usando sus formas
  factorizadas.
introduccion: ¿Recuerdas que desarmamos polinomios para hallar el MCD? Para el MCM haremos exactamente
  lo mismo. Factorizaremos primero, y luego aplicaremos la regla de "todo el mundo adentro al mayor exponente".
resumen: Para hallar el MCM de varios polinomios, primero se factorizan completamente. Luego, el MCM se
  forma tomando TODOS los paréntesis diferentes (comunes y no comunes) y elevándolos a su mayor exponente.
explicacion: "### Definición formal\n\nEs la regla universal de construcción del Mínimo Común Múltiplo.\n\
  \n### Desarrollo didáctico\n\nPara hallar el MCM de expresiones polinómicas complejas, el primer paso\
  \ irrenunciable es **Factorizar cada polinomio completamente**.\n\nUna vez que tienes los polinomios\
  \ expresados como multiplicaciones de paréntesis, aplicas la regla general del MCM: Tomas TODOS los\
  \ factores distintos (comunes y no comunes), con su MAYOR exponente.\n\nEjemplo:\n- Polinomio 1: $x^2\
  \ - 1$. Factorizado es $(x-1)(x+1)$.\n- Polinomio 2: $x^2 - 2x + 1$. Factorizado es $(x-1)^2$.\n\nAplicamos\
  \ la regla del MCM:\n1. **Todos los factores:** Aparecen los paréntesis $(x-1)$ y $(x+1)$. Debemos incluirlos\
  \ ambos.\n2. **Mayor exponente:**\n   - El $(x-1)$ aparece elevado a 1 en P1 y elevado a 2 en P2. Tomamos\
  \ la versión más grande: $(x-1)^2$.\n   - El $(x+1)$ solo aparece elevado a 1. Lo tomamos tal cual.\n\
  \nEl MCM es **$(x-1)^2(x+1)$**. Dominar esto es vital para sumar fracciones algebraicas."
procedimiento:
- 'Paso 1: Factoriza completamente cada uno de los polinomios.'
- 'Paso 2: Haz una lista mental (o escrita) de todos los factores (paréntesis) distintos que veas.'
- 'Paso 3: Asígnale a cada paréntesis el exponente más alto que tenga en el grupo.'
- 'Paso 4: Multiplica todos estos paréntesis. Deja el resultado expresado (factorizado).'
ejemplos:
- titulo: Halla el MCM de $2x+4$ y $x^2-4$
  enunciado: Halla el MCM de $2x+4$ y $x^2-4$.
  solucion_pasos:
  - 'Factorizamos: $2x+4 = 2(x+2)$.'
  - 'Factorizamos: $x^2-4 = (x+2)(x-2)$.'
  - 'Lista de factores distintos: el número ''2'', el paréntesis $(x+2)$ y el paréntesis $(x-2)$.'
  - Mayor exponente de cada uno es 1.
  - 'MCM: $2(x+2)(x-2)$.'
- titulo: MCM entre $(x-1)^3$ y $(x-1)(x+5)$.
  solucion_pasos:
  - 'Factores: (x-1) y (x+5). Mayor de (x-1) es 3. Mayor de (x+5) es 1.'
- titulo: 'Respecto de «Cálculo del m.c.m. entre polinomios mediante factorización»: ¿Describe adecuada'
  enunciado: 'Respecto de «Cálculo del m.c.m. entre polinomios mediante factorización»: ¿Describe adecuadamente
    el concepto esta frase? «Para hallar el MCM de varios polinomios, primero se factorizan completamente»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para hallar el MCM de varios polinomios, primero
    se factorizan completamente.'
- titulo: 'Respecto de «Cálculo del m.c.m. entre polinomios mediante factorización»: ¿Se puede aceptar'
  enunciado: 'Respecto de «Cálculo del m.c.m. entre polinomios mediante factorización»: ¿Se puede aceptar
    esta afirmación? «Confundir la regla del MCD y tomar solo los factores comunes (lo que arruina el
    MCM)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para hallar el MCM de varios polinomios, primero
    se factorizan completamente.'
errores_frecuentes:
- Confundir la regla del MCD y tomar solo los factores comunes (lo que arruina el MCM).
- Si hay factores numéricos externos (ej. un 3 y un 6), olvidarse de sacar el MCM numérico de esos números
  (que sería 6).
- Para «Al buscar el MCM de polinomios factorizados, ¿qué factores se deben incluir», la respuesta correcta
  es Solo los factores comunes al menor exponente.
- Para «Al buscar el MCM de polinomios factorizados, ¿qué factores se deben incluir», la respuesta correcta
  es Solo los factores no comunes.
- Las raíces sin repetir.
