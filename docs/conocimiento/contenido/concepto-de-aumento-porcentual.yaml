semantic_id: MAT.NUM.VARIACION_PORCENTUAL.AUMENTO_CONCEPTO
titulo: Concepto de aumento porcentual
objetivo: Comprender el concepto de aumento porcentual y sus aplicaciones.
introduccion: Cuando te suben el sueldo, el nuevo monto es tu sueldo antiguo MÁS un pedacito extra. Un
  aumento porcentual es sumar un porcentaje sobre un 100% que ya tenías.
resumen: Un aumento porcentual consiste en incrementar una cantidad base ($100\%$) agregándole un $p\%$.
  El nuevo valor corresponderá al $(100 + p)\%$ del original.
explicacion: "El **aumento porcentual** ocurre cuando una cantidad inicial crece. \nExisten dos formas\
  \ matemáticas de calcular un valor después de un aumento del $A\\%$:\n\n**Método de 2 pasos (Suma):**\n\
  1. Calculas de cuánto es el aumento: $Valor \\cdot (A / 100)$\n2. Se lo sumas al valor original: $Valor\
  \ + Aumento$\n\n**Método de 1 paso (Factor de variación):**\nComo tienes el 100% original y le sumas\
  \ un $A\\%$, en realidad pasas a tener el $(100 + A)\\%$ del valor.\n- Si algo aumenta un $20\\%$, el\
  \ nuevo precio es el $120\\%$ del original.\n- Multiplicas el original por la fracción $120/100$ (o\
  \ el decimal $1.20$)."
procedimiento:
- 'Paso 1: Identifica el porcentaje de aumento ($A\%$).'
- 'Paso 2: Suma ese aumento al $100\%$ base (ej. $100 + 15 = 115\%$).'
- 'Paso 3: Multiplica la cantidad original por el factor decimal correspondiente (ej. $1.15$) para hallar
  el valor final en un solo paso.'
ejemplos:
- titulo: Aumento de precio
  enunciado: Un pasaje de bus de $10.000 sube un 15% en temporada alta. ¿Cuál es el nuevo precio?
  solucion_pasos:
  - 'Método 1 paso: Nuevo precio es $100\% + 15\% = 115\%$.'
  - 'Decimal asociado: $1.15$.'
  - 'Multiplicamos: $10.000 \cdot 1.15 = 11.500$.'
  - El nuevo precio es $11.500.
errores_frecuentes:
- Calcular el 15% y responder que ese es el nuevo precio, olvidando sumar el valor original.
- Creer que aumentar un 100% significa que el valor queda igual (aumentar un 100% significa doblar el
  precio, pasando a 200%).
fuente: Currículum Nacional MINEDUC.
estado: publicado
