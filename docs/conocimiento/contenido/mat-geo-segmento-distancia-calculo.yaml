semantic_id: MAT.GEO.SEGMENTO_METRICA.DISTANCIA_CALCULO
titulo: Cálculo de la distancia entre dos puntos en el plano cartesiano
objetivo: Aplicar la fórmula de distancia para calcular numéricamente la distancia entre dos puntos específicos
  del plano cartesiano.
introduccion: Con la fórmula de distancia ya conocida, el siguiente paso es aplicarla con números concretos
  para obtener resultados numéricos precisos.
resumen: Para calcular la distancia entre dos puntos $A(x_1,y_1)$ y $B(x_2,y_2)$, se sustituyen sus coordenadas
  en la fórmula $d(A,B)=\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}$ y se resuelve numéricamente.
explicacion: '![Cálculo de la distancia entre dos puntos](/static/img/geometria/cartesiano-vectores/segmento-distancia-calculo.svg)


  ### Definición formal


  Dados $A(-3,-2)$ y $B(4,3)$: $\Delta x=4-(-3)=7$, $\Delta y=3-(-2)=5$, por lo que $d(A,B)=\sqrt{7^2+5^2}=\sqrt{49+25}=\sqrt{74}\approx8,6$.


  ### Desarrollo didáctico


  Este procedimiento se repite siempre igual: calcular las diferencias, elevarlas al cuadrado, sumarlas
  y sacar la raíz cuadrada del resultado, sin importar los valores específicos de los puntos.'
procedimiento:
- 'Paso 1: Sustituye las coordenadas de los dos puntos en las diferencias Δx=x₂-x₁ y Δy=y₂-y₁.'
- 'Paso 2: Eleva ambas diferencias al cuadrado y súmalas.'
- 'Paso 3: Calcula la raíz cuadrada de esa suma para obtener la distancia final.'
ejemplos:
- titulo: Calcular la distancia entre dos puntos dados
  enunciado: A(-3,-2) y B(4,3).
  solucion_pasos:
  - Δx=4-(-3)=7; Δy=3-(-2)=5; d=√(7²+5²)=√74≈8,6.
- titulo: Calcular la distancia con coordenadas positivas simples
  enunciado: A(1,2) y B(4,6).
  solucion_pasos:
  - Δx=4-1=3; Δy=6-2=4; d=√(3²+4²)=√25=5.
- titulo: ¿El resultado puede ser un número irracional (con raíz no exacta)?
  respuesta: Sí
  solucion_pasos:
  - Sí, como en el ejemplo con √74, el resultado no siempre es un número entero o exacto.
- titulo: ¿Se puede verificar el resultado usando el teorema de Pitágoras directamente?
  respuesta: Sí
  solucion_pasos:
  - Sí, Δx y Δy son los catetos, y d es la hipotenusa; se puede verificar que Δx²+Δy²=d².
errores_frecuentes:
- Restar las coordenadas en el orden incorrecto entre los dos puntos, generando confusión (aunque el resultado
  final no cambia por el cuadrado).
- Cometer errores aritméticos al elevar al cuadrado o sumar las diferencias.
- Dejar el resultado sin simplificar o sin aproximar cuando la raíz no es exacta.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Cid 75).'
estado: publicado
