semantic_id: MAT.NUM.IRRACIONALES.NUMERO_AUREO
objetivo: Reconocer y utilizar la forma exacta del número áureo.
introduccion: Una proporción es áurea cuando la razón entre el total y la parte mayor
  coincide con la razón entre la parte mayor y la menor. Esa condición conduce a una
  ecuación cuadrática y al valor \(\varphi\).
resumen: El número áureo es \(\varphi=\frac{1+\sqrt5}{2}\). \(\varphi\) es irracional
  porque contiene la raíz no exacta \(\sqrt5\).
explicacion: |-
  El número áureo es \(\varphi=\frac{1+\sqrt5}{2}\).

  La situación “\(\varphi^2=\varphi+1\), propiedad que se verifica a partir de su forma radical” permite comprobar, y no solo memorizar, que \(\varphi\) es irracional porque contiene la raíz no exacta \(\sqrt5\)
procedimiento:
- 'Paso 1: Parte de \(\varphi=(1+\sqrt5)/2\) o de la ecuación \(x^2=x+1\).'
- 'Paso 2: Opera manteniendo \(\sqrt5\) para no perder exactitud.'
- 'Paso 3: Comprueba la identidad \(\varphi^2=\varphi+1\) o aproxima solo al final.'
ejemplos:
- titulo: Aplicación razonada — Identificación de fi como número irracional
  enunciado: \(\varphi^2=\varphi+1\), propiedad que se verifica a partir de su forma
    radical.
  solucion_pasos:
  - Parte de \(\varphi=(1+\sqrt5)/2\) o de la ecuación \(x^2=x+1\).
  - Opera manteniendo \(\sqrt5\) para no perder exactitud.
  - Comprueba la identidad \(\varphi^2=\varphi+1\) o aproxima solo al final.
- titulo: Revisión de una solución — Identificación de fi como número irracional
  enunciado: Una solución aplica “Opera manteniendo \(\sqrt5\) para no perder exactitud.”,
    pero termina sin comprobar que \(\varphi\) es irracional porque contiene la raíz
    no exacta \(\sqrt5\). Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de fi como número irracional:
    el número áureo es \(\varphi=\frac{1+\sqrt5}{2}\).'
  - Parte de \(\varphi=(1+\sqrt5)/2\) o de la ecuación \(x^2=x+1\).
  - 'Completa la revisión con este control: Comprueba la identidad \(\varphi^2=\varphi+1\)
    o aproxima solo al final.'
- titulo: ¿Se cumple que \(\varphi\) es irracional porque contiene la raíz no exacta
    \(\sqrt5\)? — Identificación de fi como número irracional
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el número áureo es \(\varphi=\frac{1+\sqrt5}{2}\).
  - El caso “\(\varphi^2=\varphi+1\), propiedad que se verifica a partir de su forma
    radical” satisface esa condición.
  - Comprueba la identidad \(\varphi^2=\varphi+1\) o aproxima solo al final.
- titulo: ¿Es válido omitir el paso “Parte de \(\varphi=(1+\sqrt5)/2\) o de la ecuación
    \(x^2=x+1\)”? — Identificación de fi como número irracional
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de fi como número
    irracional.
  - 'Omitirlo puede volver inválida la acción siguiente: Opera manteniendo \(\sqrt5\)
    para no perder exactitud.'
  - 'La solución debe terminar de este modo: Comprueba la identidad \(\varphi^2=\varphi+1\)
    o aproxima solo al final.'
errores_frecuentes:
- 'Confundir identificación de fi como número irracional con otro concepto y omitir
  este inicio: Parte de \(\varphi=(1+\sqrt5)/2\) o de la ecuación \(x^2=x+1\).'
- Aplicar mecánicamente “Opera manteniendo \(\sqrt5\) para no perder exactitud.” sin
  revisar las condiciones de la definición.
- Tomar “\(\varphi^2=\varphi+1\), propiedad que se verifica a partir de su forma radical”
  como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “\(\varphi\) es irracional porque
  contiene la raíz no exacta \(\sqrt5\)”.
- 'Terminar el desarrollo sin realizar este control: Comprueba la identidad \(\varphi^2=\varphi+1\)
  o aproxima solo al final.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
