semantic_id: MAT.ALG.FACTOR_COMUN.MENOR_EXPONENTE_LITERAL
titulo: Determinación del menor exponente literal común
objetivo: Comprender determinación del menor exponente literal común y aplicarlo con precisión.
introduccion: Una potencia literal puede extraerse solo hasta el menor exponente presente en todos los términos.
  Ese criterio garantiza que los cocientes mantengan exponentes no negativos.
resumen: No puedes sacar más letras de las que posee el término con menor exponente.
explicacion: '### Definición formal


  No puedes sacar más letras de las que posee el término con menor exponente.


  ### Desarrollo didáctico


  Siempre seleccionamos el menor exponente presente.


  Todo número o variable sin exponente explícito está elevado a la potencia 1.


  El término central es ''-w'', que equivale a ''-w^1''. Su exponente es 1.'
procedimiento:
- Siempre seleccionamos el menor exponente presente.
- Todo número o variable sin exponente explícito está elevado a la potencia 1.
- El término central es '-w', que equivale a '-w^1'. Su exponente es 1.
- No puedes sacar más letras de las que posee el término con menor exponente.
ejemplos:
- titulo: En la expresión $x^4 + x^6$, el factor a extraer es $x^6$
  enunciado: ¿En la expresión $x^4 + x^6$, el factor a extraer es $x^6$?
  solucion_pasos:
  - Se debe extraer el exponente menor, que es x^4.
  - 'Respuesta: Falso'
- titulo: Si factorizo extrayendo el menor exponente, garantizo que ningún término interno tenga un ex
  enunciado: ¿Si factorizo extrayendo el menor exponente, garantizo que ningún término interno tenga un exponente
    negativo?
  solucion_pasos:
  - Esa es la razón exacta matemática para elegir el exponente más bajo.
  - 'Respuesta: Verdadero'
- titulo: 'Respecto de «Determinación del menor exponente literal común»: ¿La siguiente formulación es'
  enunciado: 'Respecto de «Determinación del menor exponente literal común»: ¿La siguiente formulación es correcta?
    «No puedes sacar más letras de las que posee el término con menor exponente»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: No puedes sacar más letras de las que posee el término con
    menor exponente.'
- titulo: 'Respecto de «Determinación del menor exponente literal común»: ¿La siguiente conclusión es c'
  enunciado: 'Respecto de «Determinación del menor exponente literal común»: ¿La siguiente conclusión es correcta?
    «Porque es número impar»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: No puedes sacar más letras de las que posee el término con
    menor exponente.'
errores_frecuentes:
- Porque es número impar.
- Para «¿Por qué no podemos extraer $x^3$ en el polinomio $x^5 + x^2$», la respuesta correcta es Porque la suma
  da $x^7$.
- Sí se puede extraer y queda polinomio entero.
- Para «Si en un polinomio de 5 términos, todos tienen la variable 'a', con exponentes 4, 7, 2, 9 y 5. ¿Cuál es
  el factor común literal», la respuesta correcta es $a^9$.
- Para «Si en un polinomio de 5 términos, todos tienen la variable 'a', con exponentes 4, 7, 2, 9 y 5. ¿Cuál es
  el factor común literal», la respuesta correcta es $a^4$.
