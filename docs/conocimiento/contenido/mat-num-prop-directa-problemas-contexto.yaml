semantic_id: MAT.NUM.PROP_DIRECTA.PROBLEMAS_CONTEXTO
objetivo: Resolver problemas cotidianos utilizando el modelo de proporcionalidad directa.
introduccion: ¿Cómo calculan las constructoras el material para 100 casas si solo
  hicieron los planos de una? Las proporciones directas son herramientas de la vida
  real usadas a diario para escalar ingredientes, costos, tiempo y materiales.
resumen: Los problemas cotidianos se resuelven identificando las magnitudes, validando
  que al aumentar una aumenta la otra en igual factor, y aplicando regla de tres o
  el modelo $y=kx$.
explicacion: 'Para resolver un problema de la vida cotidiana usando **proporcionalidad
  directa**, lo más crítico es leer con cuidado para confirmar que no haya ''cargos
  fijos'' o relaciones inversas (ej. más obreros $\rightarrow$ menos tiempo, eso es
  inverso).


  Una vez seguros de que es directa (ej. más kilos $\rightarrow$ más dinero; más tiempo
  $\rightarrow$ más distancia), usamos la regla de tres cruzada o calculamos $k$ para
  despejar la incógnita. Plantear los datos en una tabla rápida mental o en papel
  evita cruzar los números equivocados.'
procedimiento:
- 'Paso 1: Lee el enunciado y asegúrate de que la relación crezca o decrezca simultáneamente
  (si duplico A, debe duplicarse B).'
- 'Paso 2: Ordena los datos conocidos en un planteo de dos columnas.'
- 'Paso 3: Multiplica cruzado y divide por el dato restante (cuarta proporcional)
  para hallar la respuesta.'
ejemplos:
- titulo: Ingredientes de receta
  enunciado: Una receta para 4 personas necesita 600g de pollo. ¿Cuánto pollo se necesita
    para 10 personas?
  solucion_pasos:
  - 'Confirmamos: el doble de personas requerirá el doble de pollo (es directa).'
  - 'Planteo: $4$ personas $\rightarrow 600g$ \n $10$ personas $\rightarrow x$.'
  - 'Operación: $x = (10 \cdot 600) / 4 = 6000 / 4 = 1500g$. Se necesitan 1.5 kilos.'
errores_frecuentes:
- Aplicar regla de tres directa en problemas de proporción inversa (como velocidad
  y tiempo).
- Cruzar erróneamente los datos al armar las columnas.
- Ignorar las unidades de medida (ej. mezclar gramos con kilos en la regla de tres).
- Apurarse sin comprobar que la constante inicial era correcta.
fuente: Currículum Nacional MINEDUC.
estado: publicado
