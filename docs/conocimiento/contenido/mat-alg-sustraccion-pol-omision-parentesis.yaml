semantic_id: MAT.ALG.SUSTRACCION_POL.OMISION_PARENTESIS
objetivo: Identificar y corregir el error clásico de omitir la inversión de signos al restar un polinomio sin paréntesis.
introduccion: Uno de los errores más frecuentes en álgebra es olvidar los paréntesis al restar un polinomio. Sin
  ellos, el signo menos solo afecta al primer término, dejando el resto sin cambio — un error silencioso pero devastador.
resumen: La **Omisión de Paréntesis** en la sustracción genera el error de aplicar el signo $-$ solo al primer término
  del sustraendo y dejar los siguientes inalterados. El paréntesis es obligatorio para que el signo menos actúe
  sobre toda la expresión.
explicacion: '### Definición formal


  Sin paréntesis, el $-$ solo afecta al $2x$. El $+3$ queda positivo cuando debería ser $-3$.


  ### Desarrollo didáctico


  Error clásico: Calcular $5x - 3x + 2$ creyendo que es $(5x) - (3x + 2)$.


  Sin paréntesis, la expresión es: $5x - 3x + 2 = 2x + 2$.

  Con paréntesis: $5x - (3x + 2) = 5x - 3x - 2 = 2x - 2$.


  Dos resultados distintos. La diferencia: el signo $-$ con paréntesis invierte TODOS los signos del polinomio restado,
  incluyendo el $+2$ final.'
procedimiento:
- 'Paso 1: Cuando vayas a restar un polinomio de más de un término, siempre usa paréntesis.'
- 'Paso 2: Verifica que el signo $-$ esté justo antes del paréntesis que abre.'
- 'Paso 3: Al eliminar el paréntesis, invierte TODOS los signos interiores.'
- 'Paso 4: Si ves una resta escrita sin paréntesis, pregúntate: ¿el $-$ solo afecta al primer término o a todos?'
ejemplos:
- titulo: El error oculto
  enunciado: '¿Son iguales las expresiones: (A) 8a - 2a + 5 y (B) 8a - (2a + 5)?'
  solucion_pasos:
  - 'Expresión A: solo se resta 2a, el +5 queda intacto → 6a + 5.'
  - 'Expresión B: se resta el binomio completo → 8a - 2a - 5 = 6a - 5.'
  - Son DISTINTAS. La diferencia está en si el signo - afecta al +5 o no.
- titulo: 'Un estudiante calcula el descuento de un precio así: $P = 1000 - 200r + 50$, pero el enuncia'
  enunciado: 'Un estudiante calcula el descuento de un precio así: $P = 1000 - 200r + 50$, pero el enunciado decía
    que el descuento era $(200r + 50)$. ¿Cuál es el resultado real? (v1)


    Opciones: A) $950 - 200r$ · B) $1050 - 200r$ · C) $950 + 200r$ · D) $1000 - 200r$'
  solucion_pasos:
  - 'El descuento correcto: $P = 1000 - (200r + 50) = 1000 - 200r - 50 = 950 - 200r$. Sin paréntesis, el estudiante
    habría obtenido $1050 - 200r$, un error de $\$100$.'
  - 'Respuesta: $950 - 200r$'
- titulo: 'Respecto de «Detección de error por omisión de paréntesis en el sustraendo»: ¿Se ajusta a la'
  enunciado: 'Respecto de «Detección de error por omisión de paréntesis en el sustraendo»: ¿Se ajusta a la definición
    esta afirmación? «La **Omisión de Paréntesis** en la sustracción genera el error de aplicar el signo $-$ solo
    al primer término del sustraendo y dejar los siguientes inalterados»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Omisión de Paréntesis** en la sustracción genera el error
    de aplicar el signo $-$ solo al primer término del sustraendo y dejar los siguientes inalterados.'
- titulo: 'Respecto de «Detección de error por omisión de paréntesis en el sustraendo»: ¿Es compatible'
  enunciado: 'Respecto de «Detección de error por omisión de paréntesis en el sustraendo»: ¿Es compatible con el
    procedimiento esta afirmación? «Omitir el paréntesis al escribir una resta de un binomio o trinomio»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Omisión de Paréntesis** en la sustracción genera el error
    de aplicar el signo $-$ solo al primer término del sustraendo y dejar los siguientes inalterados.'
errores_frecuentes:
- Omitir el paréntesis al escribir una resta de un binomio o trinomio.
- Aplicar la inversión de signos solo al primer término y dejar los demás sin cambio.
- Escribir $10 - (2x + 3)$ y luego invertir todos los signos.
- Usar el paréntesis correctamente en $10 - (2x + 3) = 7 - 2x$.
- Sumar polinomios sin paréntesis.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Detección de error por omisión de paréntesis en el sustraendo
