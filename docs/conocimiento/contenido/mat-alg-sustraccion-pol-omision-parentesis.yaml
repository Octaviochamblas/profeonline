semantic_id: MAT.ALG.SUSTRACCION_POL.OMISION_PARENTESIS
objetivo: Identificar y corregir el error clásico de omitir la inversión de signos
  al restar un polinomio sin paréntesis.
introduccion: Uno de los errores más frecuentes en álgebra es olvidar los paréntesis
  al restar un polinomio. Sin ellos, el signo menos solo afecta al primer término,
  dejando el resto sin cambio — un error silencioso pero devastador.
resumen: La **Omisión de Paréntesis** en la sustracción genera el error de aplicar
  el signo $-$ solo al primer término del sustraendo y dejar los siguientes inalterados.
  El paréntesis es obligatorio para que el signo menos actúe sobre toda la expresión.
explicacion: 'Error clásico: Calcular $5x - 3x + 2$ creyendo que es $(5x) - (3x +
  2)$.


  Sin paréntesis, la expresión es: $5x - 3x + 2 = 2x + 2$.

  Con paréntesis: $5x - (3x + 2) = 5x - 3x - 2 = 2x - 2$.


  Dos resultados distintos. La diferencia: el signo $-$ con paréntesis invierte TODOS
  los signos del polinomio restado, incluyendo el $+2$ final.'
procedimiento:
- 'Paso 1: Cuando vayas a restar un polinomio de más de un término, SIEMPRE usa paréntesis.'
- 'Paso 2: Verifica que el signo $-$ esté justo antes del paréntesis que abre.'
- 'Paso 3: Al eliminar el paréntesis, invierte TODOS los signos interiores.'
- 'Paso 4: Si ves una resta escrita sin paréntesis, pregúntate: ¿el $-$ solo afecta
  al primer término o a todos?'
ejemplos:
- titulo: El error oculto
  enunciado: '¿Son iguales las expresiones: (A) 8a - 2a + 5 y (B) 8a - (2a + 5)?'
  solucion_pasos:
  - 'Expresión A: solo se resta 2a, el +5 queda intacto → 6a + 5.'
  - 'Expresión B: se resta el binomio completo → 8a - 2a - 5 = 6a - 5.'
  - Son DISTINTAS. La diferencia está en si el signo - afecta al +5 o no.
errores_frecuentes:
- Omitir el paréntesis al escribir una resta de un binomio o trinomio.
- Aplicar la inversión de signos solo al primer término y dejar los demás sin cambio.
fuente: Álgebra de Baldor.
estado: publicado
