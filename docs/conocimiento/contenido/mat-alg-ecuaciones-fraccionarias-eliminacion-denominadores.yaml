semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.ELIMINACION_DENOMINADORES
titulo: Eliminación de Denominadores
objetivo: Ejecutar correctamente el paso de multiplicación por el MCM para aplanar la ecuación.
explicacion: |
  Este es el momento de la verdad, y donde la mayoría comete el error fatal. Tienes tu MCM (ej: $x(x-2)$) y vas a multiplicar a la ecuación: $\frac{3}{x} + \frac{1}{x-2} = 2$.

  El MCM debe visitar a **CADA INQUILINO** de la ecuación (cada término, incluso los que no tienen fracción).
  - Al visitar $\frac{3}{x}$, la 'x' se cancela y queda $3(x-2)$.
  - Al visitar $\frac{1}{x-2}$, el $(x-2)$ se cancela y queda $1(x)$.
  - Al visitar el 2 (¡no lo olvides!), no se cancela nada, queda $2x(x-2)$.

  La ecuación plana resultante es: $3(x-2) + x = 2x(x-2)$. Todo el peligro de dividir ha desaparecido.
procedimiento: |
  1. Escribe el MCM al lado de cada término (fracción o número entero).
  2. Simplifica el denominador de la fracción tachándolo con su parte correspondiente en el MCM.
  3. Multiplica lo que sobrevivió del MCM por el numerador.
  4. Mantén los paréntesis al reescribir la nueva ecuación aplanada.
