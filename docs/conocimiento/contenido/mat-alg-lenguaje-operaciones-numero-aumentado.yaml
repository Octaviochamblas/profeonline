semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.NUMERO_AUMENTADO
objetivo: Traducir el concepto de aumentar un número desconocido en una cantidad fija
  o variable.
introduccion: ¿Qué pasa si ya tienes algo guardado en una caja, y le agregas exactamente
  5 monedas más? Aumentaste tu cantidad. Esa es una de las traducciones más comunes
  en álgebra.
resumen: Un **Número Aumentado** es una expresión donde una variable (que representa
  el número original) se suma con otra cantidad, ya sea un valor fijo u otra variable.
explicacion: 'Palabras clave de aumento:

  - Aumentado en

  - Incrementado en

  - Más


  Ejemplos clásicos:

  - ''Un número aumentado en ocho'': $x + 8$

  - ''Cinco incrementado en un número'': $5 + x$

  - ''La edad de Pedro aumentada en 10 años'': $P + 10$


  En la suma, el orden de los factores no altera el resultado (propiedad conmutativa),
  por lo que $x + 8$ es matemáticamente equivalente a $8 + x$.'
procedimiento:
- 'Paso 1: Identifica el ''sujeto'' de la oración (el número inicial) y ponle una
  variable.'
- 'Paso 2: Detecta la palabra clave ''aumentado'', ''incrementado'' o ''más''. Escribe
  el signo +.'
- 'Paso 3: Identifica la cantidad de aumento y ponla a la derecha del signo más.'
ejemplos:
- titulo: Crecimiento de temperatura
  enunciado: 'Traduce: ''La temperatura actual aumentada en quince grados''.'
  solucion_pasos:
  - 'Temperatura actual es la variable: T.'
  - 'Aumentada en: +.'
  - 'Quince grados es la constante: 15.'
  - 'Traducción: T + 15.'
errores_frecuentes:
- Confundir 'aumentado en' con 'multiplicado por'. Traducir 'Un número aumentado en
  5' como $5x$ en vez de $x + 5$.
- 'En problemas de edades, olvidar aumentar a todas las personas. (Ej: ''Dentro de
  5 años'', la edad de Juan será $J+5$ y la de Ana $A+5$).'
fuente: Álgebra de Baldor.
estado: publicado
