semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.NUMERO_AUMENTADO
objetivo: Traducir el concepto de aumentar un número desconocido en una cantidad fija o variable.
introduccion: ¿Qué pasa si ya tienes algo guardado en una caja, y le agregas exactamente 5 monedas más? Aumentaste
  tu cantidad. Esa es una de las traducciones más comunes en álgebra.
resumen: Un **Número Aumentado** es una expresión donde una variable (que representa el número original) se suma
  con otra cantidad, ya sea un valor fijo u otra variable.
explicacion: '### Definición formal


  La palabra ''aumentado en'' requiere un incremento sumativo. ''Veces'' requiere un factor multiplicativo.


  ### Desarrollo didáctico


  Palabras clave de aumento:

  - Aumentado en

  - Incrementado en

  - Más


  Ejemplos clásicos:

  - ''Un número aumentado en ocho'': $x + 8$

  - ''Cinco incrementado en un número'': $5 + x$

  - ''La edad de Pedro aumentada en 10 años'': $P + 10$


  En la suma, el orden de los factores no altera el resultado (propiedad conmutativa), por lo que $x + 8$ es matemáticamente
  equivalente a $8 + x$.'
procedimiento:
- 'Paso 1: Identifica el ''sujeto'' de la oración (el número inicial) y ponle una variable.'
- 'Paso 2: Detecta la palabra clave ''aumentado'', ''incrementado'' o ''más''. Escribe el signo +.'
- 'Paso 3: Identifica la cantidad de aumento y ponla a la derecha del signo más.'
ejemplos:
- titulo: Crecimiento de temperatura
  enunciado: 'Traduce: ''La temperatura actual aumentada en quince grados''.'
  solucion_pasos:
  - 'Temperatura actual es la variable: T.'
  - 'Aumentada en: +.'
  - 'Quince grados es la constante: 15.'
  - 'Traducción: T + 15.'
- titulo: Para configurar la fórmula de un peaje dinámico, el ingeniero de sistemas recibe la instrucc
  enunciado: 'Para configurar la fórmula de un peaje dinámico, el ingeniero de sistemas recibe la instrucción: ''La
    tarifa base del automóvil debe ser aumentada en una tarifa variable según la cantidad de tráfico''. Si la tarifa
    base es $B$ y la tarifa por tráfico es $T$, ¿cómo debe programar el ingeniero la tarifa final ($F$) para no
    cobrar de más a los usuarios? (v1)


    Opciones: A) $F = B + T$ · B) $F = B \cdot T$ · C) $F = B + B^T$ · D) $F = B - T$'
  solucion_pasos:
  - La palabra 'aumentada en' exige una suma lineal directa entre la base y la variable. Si cobrara $B \cdot T$,
    multiplicaría los montos causando tarifas exponenciales irreales.
  - 'Respuesta: $F = B + T$'
- titulo: 'Respecto de «Traducción de un número aumentado en una cantidad»: ¿Describe adecuadamente el'
  enunciado: 'Respecto de «Traducción de un número aumentado en una cantidad»: ¿Describe adecuadamente el concepto
    esta frase? «Un **Número Aumentado** es una expresión donde una variable (que representa el número original)
    se suma con otra cantidad, ya sea un valor fijo u otra variable»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un **Número Aumentado** es una expresión donde una variable
    (que representa el número original) se suma con otra cantidad, ya sea un valor fijo u otra variable.'
- titulo: 'Respecto de «Traducción de un número aumentado en una cantidad»: ¿Se puede aceptar esta afir'
  enunciado: 'Respecto de «Traducción de un número aumentado en una cantidad»: ¿Se puede aceptar esta afirmación?
    «Confundir ''aumentado en'' con ''multiplicado por''. Traducir ''Un número aumentado en 5'' como $5x$ en vez
    de $x + 5$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un **Número Aumentado** es una expresión donde una variable
    (que representa el número original) se suma con otra cantidad, ya sea un valor fijo u otra variable.'
errores_frecuentes:
- Confundir 'aumentado en' con 'multiplicado por'. Traducir 'Un número aumentado en 5' como $5x$ en vez de $x +
  5$.
- 'En problemas de edades, olvidar aumentar a todas las personas. (Ej: ''Dentro de 5 años'', la edad de Juan será
  $J+5$ y la de Ana $A+5$).'
- Ambas frases significan matemáticamente lo mismo ($x + 5$).
- Ambas frases significan matemáticamente lo mismo ($5x$).
- '''Aumentado en cinco'' es una potencia ($x^5$) y ''cinco veces mayor'' es una suma ($x+5$).'
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción de un número aumentado en una cantidad
