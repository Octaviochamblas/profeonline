semantic_id: MAT.EST.MODA_ANALISIS.AMODAL
titulo: Identificar un conjunto de datos amodal
objetivo: Identificar un conjunto de datos amodal, aquel en el que todos los valores tienen la misma frecuencia,
  sin que exista una moda destacada.
introduccion: En algunos conjuntos de datos, ningún valor se repite más que los demás, por lo que no existe
  una moda propiamente dicha.
resumen: Un conjunto de datos es amodal cuando todos sus valores distintos tienen exactamente la misma
  frecuencia, sin que exista un valor que se destaque como moda.
explicacion: '![Conjunto amodal](/static/img/estadistica/moda/moda-amodal.svg)


  ### Definición formal


  Un conjunto es amodal si $f_i=f_j$ para todos los valores distintos del conjunto, sin ningún valor con
  frecuencia estrictamente mayor.


  ### Desarrollo didáctico


  En el conjunto {1, 2, 3, 4, 5}, cada valor aparece exactamente una vez (frecuencia 1 para todos), por
  lo que este conjunto es amodal, sin ninguna moda definida.'
procedimiento:
- 'Paso 1: Calcula la frecuencia de cada valor distinto del conjunto de datos.'
- 'Paso 2: Compara todas las frecuencias obtenidas entre sí.'
- 'Paso 3: Si todas las frecuencias son iguales entre sí, el conjunto es amodal (sin moda definida).'
ejemplos:
- titulo: Verificar que {1,2,3,4,5} es amodal
  enunciado: 'Conjunto: 1,2,3,4,5.'
  solucion_pasos:
  - Cada valor tiene frecuencia 1, todas iguales entre sí. El conjunto es amodal.
- titulo: Verificar que {2,2,3,3,4,4} es amodal
  enunciado: 'Conjunto: 2,2,3,3,4,4.'
  solucion_pasos:
  - Cada valor tiene frecuencia 2, todas iguales entre sí. El conjunto es amodal, aunque haya repeticiones.
- titulo: ¿Un conjunto amodal siempre tiene todos sus valores distintos entre sí (sin ninguna repetición)?
  respuesta: 'No'
  solucion_pasos:
  - No, un conjunto puede ser amodal aunque tenga repeticiones, siempre que todas las frecuencias sean
    exactamente iguales.
- titulo: ¿Un conjunto amodal tiene una moda definida?
  respuesta: 'No'
  solucion_pasos:
  - No, precisamente esa es la característica distintiva de un conjunto amodal.
errores_frecuentes:
- Pensar que un conjunto es amodal solo si todos los valores son distintos (sin ninguna repetición), ignorando
  que puede haber repeticiones iguales para todos los valores.
- Confundir un conjunto amodal con uno donde simplemente no se calculó correctamente la frecuencia máxima.
- Asumir que siempre existe una moda en cualquier conjunto de datos, sin verificar el caso amodal.
fuente: 'Elaboración propia (referencia: Moraleja 359).'
estado: publicado
