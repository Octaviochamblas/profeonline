semantic_id: MAT.ALG.LEYES_MULTIPLICACION.PRODUCTO_COEFICIENTES
objetivo: Multiplicar correctamente los coeficientes numéricos de monomios, separándolos de la parte literal.
introduccion: 'En un monomio como $3x^2$, el $3$ y el $x^2$ son dos piezas distintas. Al multiplicar monomios, cada
  pieza va por su propio carril: los números se multiplican con números, y las letras con letras.'
resumen: Al multiplicar monomios, el **Producto de Coeficientes** se calcula por separado multiplicando los números
  entre sí. Luego se multiplican las partes literales. El resultado final combina ambas partes.
explicacion: '### Definición formal


  Coeficientes: $5 \times 3=15$. Variable $a$: $a^2 \cdot a = a^3$. Variable $b$: $b \cdot b^2=b^3$. Resultado:
  $15a^3b^3$.


  ### Desarrollo didáctico


  Para multiplicar $(3x^2)(4x^3)$:

  1. Coeficientes: $3 \times 4 = 12$.

  2. Parte literal: $x^2 \times x^3 = x^{2+3} = x^5$.

  3. Resultado: $12x^5$.


  Con signo: $(-5a^2)(3a) = -15a^3$.

  - Signo: $(-)( +) = -$.

  - Coeficientes: $5 \times 3 = 15$.

  - Literal: $a^2 \cdot a = a^3$.

  - Resultado: $-15a^3$.'
procedimiento:
- 'Paso 1: Determina el signo del producto (regla de signos).'
- 'Paso 2: Multiplica los valores absolutos de los coeficientes.'
- 'Paso 3: Para cada variable, suma los exponentes.'
- 'Paso 4: Escribe el resultado: signo + coeficiente + parte literal.'
ejemplos:
- titulo: El monomio combinado
  enunciado: 'Multiplica: (2x^2y)(5xy^3).'
  solucion_pasos:
  - 'Signo: (+)(+) = +.'
  - 'Coeficientes: 2 × 5 = 10.'
  - 'Variable x: x^2 · x = x^3.'
  - 'Variable y: y · y^3 = y^4.'
  - 'Resultado: 10x^3y^4.'
- titulo: El volumen de un cubo de lado $3a^2$ cm se calcula como $V = (3a^2)^3$. Expresando esto como
  enunciado: 'El volumen de un cubo de lado $3a^2$ cm se calcula como $V = (3a^2)^3$. Expresando esto como producto
    de tres factores iguales, ¿cuánto es $(3a^2)(3a^2)(3a^2)$? (v1)


    Opciones: A) $27a^6$ · B) $9a^6$ · C) $27a^5$ · D) $9a^5$'
  solucion_pasos:
  - 'Coeficientes: $3 \times 3 \times 3=27$. Variable $a$: $a^2 \cdot a^2 \cdot a^2=a^6$. Resultado: $27a^6$.'
- titulo: 'Respecto de «Multiplicación de coeficientes numéricos en un producto algebraico»: ¿La siguie'
  enunciado: 'Respecto de «Multiplicación de coeficientes numéricos en un producto algebraico»: ¿La siguiente formulación
    es correcta? «Al multiplicar monomios, el **Producto de Coeficientes** se calcula por separado multiplicando
    los números entre sí»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al multiplicar monomios, el **Producto de Coeficientes** se
    calcula por separado multiplicando los números entre sí.'
- titulo: 'Respecto de «Multiplicación de coeficientes numéricos en un producto algebraico»: ¿La siguie'
  enunciado: 'Respecto de «Multiplicación de coeficientes numéricos en un producto algebraico»: ¿La siguiente conclusión
    es correcta? «Sumar los coeficientes en lugar de multiplicarlos (ej. $3x \cdot 4y = 7xy$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al multiplicar monomios, el **Producto de Coeficientes** se
    calcula por separado multiplicando los números entre sí.'
errores_frecuentes:
- Sumar los coeficientes en lugar de multiplicarlos (ej. $3x \cdot 4y = 7xy$).
- Mezclar la multiplicación de coeficientes con la de exponentes (ej. $3x^2 \cdot 4x = 12x^2$ en lugar de $12x^3$).
- Los coeficientes se suman ($5+3=8$) y los exponentes también ($15a^6b^6$).
- Los coeficientes se multiplican pero los exponentes también ($15a^2b^2$).
- 'Solo se multiplican los coeficientes: $15ab$.'
fuente: Álgebra de Baldor.
estado: publicado
titulo: Multiplicación de coeficientes numéricos en un producto algebraico
