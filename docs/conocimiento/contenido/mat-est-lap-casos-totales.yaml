semantic_id: MAT.EST.LAPLACE_MUESTRALES.CASOS_TOTALES
titulo: Identificación de casos totales en un espacio muestral finito
objetivo: Identificar los casos totales de un experimento aleatorio, es decir, el número de todos los
  resultados posibles del espacio muestral.
introduccion: Los casos totales representan el universo completo de posibilidades del experimento, y funcionan
  como el denominador en el cálculo de probabilidades clásicas.
resumen: Los casos totales de un experimento aleatorio corresponden a la cardinalidad de su espacio muestral,
  $n(S)$.
explicacion: '![Casos totales](/static/img/probabilidad/laplace/lap-casos-totales.svg)


  ### Definición formal


  Los casos totales son todos los elementos del espacio muestral $S$, y su cantidad se denota $n(S)$.


  ### Desarrollo didáctico


  Al lanzar un dado, los casos totales son los 6 resultados posibles $\{1,2,3,4,5,6\}$, por lo que $n(S)=6$.'
procedimiento:
- 'Paso 1: Identifica el espacio muestral completo del experimento.'
- 'Paso 2: Cuenta todos los elementos distintos de ese espacio muestral.'
- 'Paso 3: Ese número es la cantidad de casos totales, n(S).'
ejemplos:
- titulo: Identificar los casos totales al lanzar un dado
  enunciado: Dado de seis caras.
  solucion_pasos:
  - n(S)=6.
- titulo: Identificar los casos totales al extraer una carta
  enunciado: Mazo de 52 cartas.
  solucion_pasos:
  - n(S)=52.
- titulo: ¿Los casos totales incluyen absolutamente todos los resultados posibles?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición del espacio muestral completo.
- titulo: ¿Los casos totales pueden variar según cómo se defina el experimento?
  respuesta: Sí
  solucion_pasos:
  - Sí, por ejemplo, lanzar un dado y registrar el número da n(S)=6, pero registrar si es par o impar
    da n(S)=2.
errores_frecuentes:
- Contar mal los resultados posibles, olvidando alguno o repitiendo otro.
- Confundir los casos totales con los casos favorables de un evento específico.
- Cambiar la definición del experimento a mitad del análisis, afectando el conteo de n(S).
fuente: 'Elaboración propia (referencia: Moraleja 404).'
estado: publicado
