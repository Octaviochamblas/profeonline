semantic_id: MAT.EST.MEDIA_PROMEDIO.DATO_FALTANTE
titulo: Determinar un dato faltante a partir de la media conocida
objetivo: Determinar el valor de un dato faltante en un conjunto, sabiendo la media del conjunto completo
  y el resto de los datos.
introduccion: 'Este es un ejercicio inverso: en vez de calcular la media a partir de los datos, se usa
  la media conocida para encontrar un dato desconocido.'
resumen: Para encontrar un dato faltante, se despeja su valor de la fórmula de la media, sabiendo que
  la suma total de los datos es igual a la media multiplicada por el número de datos.
explicacion: '![Determinación de un dato faltante](/static/img/estadistica/promedio/media-dato-faltante.svg)


  ### Definición formal


  Si $\bar{x}=\dfrac{\sum x_i}{n}$ es conocida, entonces $\sum x_i=\bar{x}\times n$; el dato faltante
  se obtiene restando la suma de los datos conocidos de ese total.


  ### Desarrollo didáctico


  Si la media de 5 datos es 6 y se conocen 4 de ellos (5, 6, 7, 4, sumando 22), el dato faltante es $6\times5-22=30-22=8$.'
procedimiento:
- 'Paso 1: Calcula la suma total de todos los datos, multiplicando la media conocida por el número total
  de datos (n).'
- 'Paso 2: Suma los valores de los datos que sí conoces.'
- 'Paso 3: Resta esa suma parcial del total calculado en el paso 1, para obtener el dato faltante.'
ejemplos:
- titulo: Encontrar un dato faltante con media 6 y 5 datos
  enunciado: 'Media=6, n=5, datos conocidos: 5,6,7,4.'
  solucion_pasos:
  - Suma total=6×5=30. Suma conocida=5+6+7+4=22. Dato faltante=30-22=8.
- titulo: Encontrar un dato faltante con media 10 y 4 datos
  enunciado: 'Media=10, n=4, datos conocidos: 8,9,11.'
  solucion_pasos:
  - Suma total=10×4=40. Suma conocida=8+9+11=28. Dato faltante=40-28=12.
- titulo: ¿Es necesario conocer el número total de datos (n) para resolver este tipo de problema?
  respuesta: Sí
  solucion_pasos:
  - Sí, es indispensable para calcular la suma total a partir de la media.
- titulo: ¿Se puede encontrar más de un dato faltante con este mismo método, si se conocen suficientes
    datos?
  respuesta: Sí
  solucion_pasos:
  - Sí, mientras se conozca la media, n, y todos los demás datos excepto el que falta calcular.
errores_frecuentes:
- Olvidar multiplicar la media por n para obtener la suma total antes de restar los datos conocidos.
- Contar mal el número de datos conocidos, afectando el cálculo de la suma parcial.
- Confundir el dato faltante con la media misma, sin realizar el despeje correspondiente.
fuente: Elaboración propia.
estado: publicado
