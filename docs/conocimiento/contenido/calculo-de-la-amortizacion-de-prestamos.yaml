semantic_id: MAT.NUM.INTERES_COMPUESTO.AMORTIZACION_PRESTAMO
titulo: Cálculo de la amortización de préstamos
objetivo: Entender la descomposición de una cuota de préstamo entre el pago de intereses y la amortización
  del capital.
introduccion: ¿Has pagado una cuota de 300 lucas por tu casa y al mirar la deuda ves que solo bajó 50
  lucas? No te están robando, es el proceso de amortización. Una parte es para el banco, otra parte achica
  la deuda.
resumen: En cada cuota fija de un crédito, una parte se destina a pagar los **Intereses** del mes (ganancia
  del banco) y el resto se usa para **Amortizar** (disminuir el Capital real adeudado).
explicacion: 'Cuando pides un préstamo bancario (como un hipotecario) y pagas una cuota fija mensual,
  ese dinero se divide internamente en dos pedazos:


  1. **Interés:** Es el costo por usar el dinero del banco ese mes. Se calcula multiplicando el Saldo
  Adeudado actual por la tasa de interés.

  2. **Amortización:** Es lo que sobra de la cuota después de pagar el interés. Este dinero **resta**
  la deuda real que tienes.


  **Ecuación de la Cuota:**

  $$\text{Cuota} = \text{Amortización} + \text{Interés}$$


  Al principio de un crédito de 20 años, la deuda es tan grande que casi toda la cuota se va en pagar
  puros intereses (el banco se asegura su ganancia primero) y la amortización es ínfima. Al final del
  crédito, ocurre lo contrario.'
procedimiento:
- 'Paso 1: Reconoce que Cuota Fija NO significa que la deuda baje esa misma cantidad.'
- 'Paso 2: Entiende que $Amortizacion = Cuota - Interes$.'
- 'Paso 3: Solo la ''Amortización'' disminuye el Saldo Insoluto (la deuda real).'
ejemplos:
- titulo: Descomponiendo la cuota
  enunciado: Debes $10.000.000. El interés de este mes es el 1% de esa deuda. Pagas una cuota de $300.000.
    ¿Cuánto se redujo realmente tu deuda?
  solucion_pasos:
  - 'Calculamos el interés del mes: 1% de $10.000.000 = $100.000.'
  - La cuota es de $300.000. De esos, $100.000 son para pagar el interés.
  - 'Lo que sobra es la Amortización: $300.000 - $100.000 = $200.000.'
  - Tu deuda bajó en $200.000. Ahora debes $9.800.000.
errores_frecuentes:
- Restarle el valor completo de la cuota al total de la deuda (ignorando que el banco cobra intereses).
- Creer que la palabra 'Amortizar' es sinónimo de 'Pagar Intereses'.
fuente: Currículum Nacional MINEDUC.
estado: publicado
