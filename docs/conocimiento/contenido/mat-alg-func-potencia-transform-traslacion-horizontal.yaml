semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.TRASLACION_HORIZONTAL
titulo: Traslación horizontal de la función potencia
objetivo: Reconocer el efecto de $f(x)=a(x-h)^n$ como un desplazamiento horizontal de la gráfica básica.
introduccion: Reemplazar $x$ por $x-h$ dentro de la función desplaza toda la curva a lo largo del eje horizontal,
  sin cambiar su forma.
resumen: La función $f(x)=a(x-h)^n$ corresponde a la gráfica de $g(x)=a\cdot x^n$ **desplazada horizontalmente**
  $h$ unidades.
explicacion: '### Definición formal


  Dada $g(x)=a\cdot x^n$, la función $f(x)=g(x-h)=a(x-h)^n$ tiene la misma forma que $g$, pero cada punto
  $(x_0,y_0)$ de $g$ se traslada al punto $(x_0+h,y_0)$ en $f$. El nuevo "centro" de la curva, antes en $x=0$,
  pasa a estar en $x=h$.


  ### Desarrollo didáctico


  $f(x)=(x-3)^2$ tiene la misma forma de copa que $x^2$, pero su vértice está en $x=3$ en vez de $x=0$. Evaluar
  $f(3)=0$ confirma que el vértice se movió exactamente a esa posición.'
procedimiento:
- 'Paso 1: Identifica el valor de $h$ dentro de la expresión $(x-h)^n$.'
- 'Paso 2: Reconoce que el "centro" de la curva se traslada a $x=h$.'
- 'Paso 3: Traza la gráfica básica y desplázala horizontalmente según el valor de $h$.'
ejemplos:
- titulo: Identificación del desplazamiento en $(x-5)^2$
  enunciado: '¿Cuál es el desplazamiento horizontal de $f(x)=(x-5)^2$?'
  solucion_pasos:
  - Se identifica $h=5$ en la expresión $(x-h)^2$.
  - La gráfica se desplaza $5$ unidades hacia la derecha respecto a $x^2$.
- titulo: Cálculo del nuevo centro de la curva
  enunciado: '¿En qué valor de $x$ se ubica el nuevo vértice de $f(x)=(x-4)^4$?'
  solucion_pasos:
  - Se identifica $h=4$.
  - El vértice se ubica en $x=4$, donde $f(4)=0$.
- titulo: ¿La traslación horizontal cambia la forma de la curva?
  enunciado: ¿Al trasladar horizontalmente una función potencia, cambia su forma general (copa, s, etc.)?
  respuesta: 'No'
  solucion_pasos:
  - Solo cambia la posición de la curva, no su forma ni su tipo.
- titulo: ¿La traslación horizontal afecta el recorrido de la función?
  enunciado: ¿Una traslación horizontal modifica el recorrido de la función?
  respuesta: 'No'
  solucion_pasos:
  - Solo afecta el dominio (si corresponde) y la posición en el eje $x$; el recorrido permanece igual.
errores_frecuentes:
- Confundir la dirección del desplazamiento (derecha vs. izquierda) según el signo de $h$.
- Suponer que la traslación horizontal también desplaza verticalmente la curva.
- No identificar correctamente el valor de $h$ cuando la expresión no está en la forma estándar $(x-h)$.
- Creer que la traslación cambia el tipo de curva (de copa a s, por ejemplo).
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
