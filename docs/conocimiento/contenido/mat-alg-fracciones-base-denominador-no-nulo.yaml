semantic_id: 'MAT.ALG.FRACCIONES_BASE.DENOMINADOR_NO_NULO'
titulo: 'La Regla de Oro: Denominador Distinto de Cero'
objetivo: 'Entender la restricción fundamental de que la división por cero no está definida en matemáticas.'
introduccion: |
  En álgebra hay una regla que nunca, bajo ninguna circunstancia, se puede romper: la división por cero no existe. Esta prohibición matemática pura es la base de todas las restricciones en fracciones algebraicas.
resumen: |
  En cualquier fracción matemática o algebraica, el valor del denominador NUNCA puede ser cero, porque la división por cero no está definida.
explicacion: |
  En el universo de las matemáticas, hay un pecado capital que destruye la realidad misma: **dividir por cero**. Es una operación matemáticamente indefinida (no existe respuesta).

  Dado que una fracción algebraica es una división disfrazada, el denominador (la parte de abajo) jamás puede ser igual a cero. Si el denominador llega a valer cero, la fracción 'explota' y deja de existir.

  Por ejemplo, en la fracción $\frac{x+5}{x-2}$:
  Si la $x$ toma el valor mágico de $2$, el denominador se vuelve $(2 - 2) = 0$. La fracción quedaría $\frac{7}{0}$, lo cual es un absurdo matemático. Por lo tanto, debes declarar inmediatamente que para esta fracción, **$x$ no puede ser 2** ($x \neq 2$).

  A esto se le llama calcular el 'dominio' o las 'restricciones' de la fracción.

procedimiento:
  - 'Paso 1: Siempre que veas una fracción, mira su denominador.'
  - 'Paso 2: Recuerda la regla: ese denominador jamás puede tomar el valor cero.'
  - 'Paso 3: Esta regla prevalece incluso antes de intentar simplificar o resolver cualquier cosa.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Concepto: Si tenemos $\frac{5}{x-3}$, ¿qué pasa si la variable ''x'' vale 3?'
    solucion_pasos:
    - 'Si $x = 3$, el denominador sería $3 - 3 = 0$.'
    - 'La fracción se convertiría en $\frac{5}{0}$.'
    - 'Esto es matemáticamente imposible (indefinido).'
  - titulo: 'Si el denominador es ''a'', ¿qué valor está prohibido para ''a''?'
    respuesta: 'El cero'
    solucion_pasos:
    - '''a'' no puede ser 0, porque dividiríamos por 0.'
errores_frecuentes:
  - 'Creer que dividir por cero da cero.'
  - 'Creer que dividir por cero da infinito en álgebra básica (en cálculo diferencial se analiza el límite, pero en álgebra estática está simplemente indefinido).'
estado: publicado
