semantic_id: 'MAT.ALG.OPERACIONES_FRACCIONES.OPERACIONES_COMBINADAS'
titulo: 'Operaciones Combinadas y Fracciones Complejas'
objetivo: 'Resolver ejercicios que combinan sumas, multiplicaciones, y divisiones de fracciones algebraicas (incluyendo fracciones dentro de fracciones).'
introduccion: |
  El desafío final del bloque: monstruos de varios pisos. Cuando veas sumas dentro del numerador de una división, que a su vez se multiplica por algo más. ¿La clave? Orden, jerarquía y calma. Resolver de adentro hacia afuera.
resumen: |
  En operaciones combinadas de fracciones, respeta la jerarquía matemática (paréntesis primero, luego multiplicaciones/divisiones, finalmente sumas/restas). Si tienes una fracción compleja (una fracción que contiene otras fracciones), resuelve el numerador gigante completo hasta que sea una sola fracción, y el denominador gigante hasta que sea una sola, luego aplica la división principal.
explicacion: |
  Fracciones Complejas: $\frac{\frac{x}{y} + 1}{\frac{x}{y} - 1}$

  No te asustes, divídelo en misiones pequeñas:

  **Misión 1: Arreglar el piso de arriba**
  $\frac{x}{y} + 1 = \frac{x}{y} + \frac{y}{y} = \frac{x+y}{y}$

  **Misión 2: Arreglar el piso de abajo**
  $\frac{x}{y} - 1 = \frac{x}{y} - \frac{y}{y} = \frac{x-y}{y}$

  **Misión 3: Enfrentar a los dos pisos**
  Ahora el problema es:
  $\frac{\frac{x+y}{y}}{\frac{x-y}{y}}$

  Recuerda que esa raya enorme del medio es solo una división ( $\div$ ).
  $\frac{x+y}{y} \div \frac{x-y}{y}$

  Aplicamos la regla de la división (invertir y multiplicar):
  $\frac{x+y}{y} \cdot \frac{y}{x-y}$

  Las letras 'y' se cancelan cruzado. El resultado glorioso es:
  $\frac{x+y}{x-y}$.
procedimiento:
  - 'Paso 1: Identifica claramente cuál es la raya fraccionaria principal (la más larga o la que está alineada con el signo de igual).'
  - 'Paso 2: Trata todo lo que está por encima de la raya principal como un problema independiente y resuélvelo hasta que quede una sola fracción simple.'
  - 'Paso 3: Trata todo lo que está debajo de la raya principal como otro problema independiente y resuélvelo.'
  - 'Paso 4: Reescribe el problema como una división horizontal de dos fracciones simples.'
  - 'Paso 5: Invierte la segunda, multiplica y simplifica.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Simplifica la fracción compleja $\frac{1 + \frac{2}{x}}{1 - \frac{4}{x^2}}$.'
    solucion_pasos:
    - 'Arriba: $1 + 2/x = (x+2)/x$.'
    - 'Abajo: $1 - 4/x^2 = (x^2-4)/x^2$.'
    - 'Reescribimos como división: $\frac{x+2}{x} \div \frac{x^2-4}{x^2}$.'
    - 'Invertimos: $\frac{x+2}{x} \cdot \frac{x^2}{(x-2)(x+2)}$.'
    - 'Tachamos $(x+2)$. Simplificamos $x^2$ con $x$ dejando ''x'' arriba.'
    - 'Resultado: $\frac{x}{x-2}$.'
  - titulo: 'Resuelve $(\frac{x}{2} + \frac{x}{3}) \cdot \frac{6}{5x}$.'
    respuesta: '1'
    solucion_pasos:
    - 'Dentro del paréntesis, el MCD es 6. Suma: (3x+2x)/6 = 5x/6. Multiplicar por 6/5x da exactamente 1.'
errores_frecuentes:
  - 'Perder de vista cuál es la línea divisoria principal en una fracción compleja de 3 pisos.'
  - 'Intentar multiplicar sin haber terminado de sumar las fracciones internas de los paréntesis o pisos.'
estado: publicado
