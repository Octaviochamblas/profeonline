semantic_id: MAT.FUND.RELACIONES_CONJUNTOS.SUBCONJUNTO_IMPROPIO
titulo: Subconjunto impropio
objetivo: Identificar y definir los subconjuntos impropios de un conjunto reconociendo al propio conjunto
  y al conjunto vacío como tales.
introduccion: 'Imagina que tienes una caja con juguetes. Si decides regalarle a tu hermano un grupo de
  juguetes de esa caja, tienes varias opciones. Pero hay dos casos extremos: no regalarle nada (dejar
  la caja vacía para él) o regalarle exactamente la caja completa con todos los juguetes.


  En matemáticas, a estos dos extremos los llamamos subconjuntos impropios de un conjunto. En particular,
  cualquier conjunto es un subconjunto impropio de sí mismo porque contiene exactamente la misma información
  y elementos, sin dejar nada fuera.


  Aprender sobre subconjuntos impropios te ayudará a reconocer los límites extremos cuando analizamos
  las posibles formas de agrupar o seleccionar elementos de un conjunto.'
resumen: 'Un subconjunto impropio es un subconjunto que no aporta elementos nuevos ni restringe de forma
  parcial el conjunto original. Para cualquier conjunto $A$, los subconjuntos impropios son el propio
  conjunto $A$ (ya que $A \subseteq A$) y, según la definición clásica, el conjunto vacío $\emptyset$
  (ya que $\emptyset \subseteq A$).

  '
explicacion: "En la teoría de conjuntos, la relación de inclusión $A \\subseteq B$ permite que ambos conjuntos\
  \ sean iguales.\n\n**Definición:**\nDado un conjunto $A$, sus subconjuntos se dividen en dos categorías:\n\
  1. **Subconjuntos Propios:** Aquellos subconjuntos que son estrictamente más pequeños que $A$ y no vacíos\
  \ (en algunos textos).\n2. **Subconjuntos Impropios:** Aquellos casos extremos de inclusión que no representan\
  \ una parte estricta y diferente del conjunto. Estos son:\n   * **El propio conjunto ($A$):** Dado que\
  \ todo conjunto está contenido en sí mismo ($A \\subseteq A$), el conjunto $A$ es un subconjunto impropio\
  \ de sí mismo.\n   * **El conjunto vacío ($\\emptyset$):** Como el conjunto vacío está contenido en\
  \ cualquier conjunto ($\\emptyset \\subseteq A$), también se le clasifica como subconjunto impropio\
  \ de $A$.\n\nCualquier otro subconjunto $S$ de $A$ tal que $S \\neq \\emptyset$ y $S \\neq A$ se denomina\
  \ **subconjunto propio**.\n\n**Características de $A$ como su propio subconjunto impropio:**\n* **Cardinalidad:**\
  \ La cardinalidad del subconjunto impropio $A$ es idéntica a la del conjunto original: $|A| = |A|$.\n\
  * **Igualdad:** Es el único subconjunto de $A$ que es igual a $A$."
procedimiento:
- 'Paso 1: Identifica el conjunto original $A$ dado en el problema.'
- 'Paso 2: Escribe los dos subconjuntos extremos que siempre existen para cualquier conjunto: el conjunto
  vacío $\emptyset$ y el mismo conjunto $A$.'
- 'Paso 3: Clasifica a estos dos conjuntos como los subconjuntos impropios del conjunto $A$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Para el conjunto $M = \{1, 2, 3\}$, identifica todos sus subconjuntos impropios.
  solucion_pasos:
  - 'Paso a: Identificamos el conjunto dado: $M = \{1, 2, 3\}$.'
  - 'Paso b: Determinamos los casos extremos de contención. El conjunto vacío $\emptyset$ y el propio
    conjunto $M = \{1, 2, 3\}$ son subconjuntos de $M$.'
  - 'Paso c: Clasificamos estos dos conjuntos. Por definición, $\emptyset$ y $\{1, 2, 3\}$ son los subconjuntos
    impropios de $M$.'
- titulo: Ejemplo 2
  enunciado: Determina si el conjunto $S = \{a\}$ es un subconjunto impropio de $T = \{a, b\}$.
  solucion_pasos:
  - 'Paso a: Comparamos el conjunto $S = \{a\}$ con el conjunto contenedor $T = \{a, b\}$. Vemos que $S
    \subseteq T$.'
  - 'Paso b: Verificamos si $S$ es igual al conjunto vacío $\emptyset$ o al conjunto completo $T$. Como
    $\{a\} \neq \emptyset$ y $\{a\} \neq \{a, b\}$, $S$ no es ninguno de los extremos impropios de $T$.'
  - 'Paso c: Concluimos que $S = \{a\}$ es un subconjunto propio de $T$, y no un subconjunto impropio
    de $T$.'
- titulo: ¿Es el conjunto $A = \\{2, 4, 6\\}$ un subconjunto impropio de sí mismo?
  respuesta: Sí
  solucion_pasos:
  - Por propiedad reflexiva de los conjuntos, todo conjunto es subconjunto de sí mismo, es decir, $A \subseteq
    A$.
  - Un subconjunto que es igual al conjunto original se clasifica como subconjunto impropio.
  - Por lo tanto, $A$ es efectivamente un subconjunto impropio de sí mismo.
- titulo: ¿Existe algún subconjunto propio para el conjunto vacío $\\emptyset$?
  respuesta: 'No'
  solucion_pasos:
  - El conjunto vacío $\emptyset$ solo tiene un subconjunto en total, que es sí mismo ($\emptyset$).
  - Como este único subconjunto es igual al conjunto original, es un subconjunto impropio.
  - Por lo tanto, el conjunto vacío no posee subconjuntos propios.
errores_frecuentes:
- Confundir subconjuntos propios con impropios. Los propios deben ser estrictamente menores que el conjunto
  original.
- Pensar que un conjunto no es subconjunto de sí mismo porque son iguales. La relación $\subseteq$ incluye
  la igualdad.
- Creer que el conjunto vacío es un subconjunto propio de sí mismo.
- Olvidar que la definición de subconjunto impropio incluye tanto a $\emptyset$ como al propio conjunto
  en la literatura clásica.
- Asumir que los subconjuntos impropios de un conjunto finito tienen menor cardinalidad que este.
fuente: Álgebra y Fundamentos, Universidad de Chile
estado: publicado
