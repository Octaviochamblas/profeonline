semantic_id: MAT.ALG.FUNCIONES_ESPECIALES.PARIDAD_DESDE_GRAFICO
titulo: Determinación de paridad de una función desde su gráfico
objetivo: Determinar visualmente si una función es par, impar o ninguna de las dos, observando el tipo
  de simetría de su gráfica.
introduccion: Con solo mirar el dibujo de una curva, puedes saber si es par (simetría de espejo), impar
  (simetría de giro) o ninguna de las dos (sin patrón de simetría especial).
resumen: Para determinar la paridad desde un gráfico, se observa si la curva es simétrica respecto al
  eje $y$ (función par), simétrica respecto al origen (función impar), o no presenta ninguna de esas simetrías
  (ni par ni impar).
explicacion: '### Definición formal


  La simetría respecto al eje $y$ corresponde geométricamente a $f(-x)=f(x)$ (función par); la simetría
  respecto al origen corresponde a $f(-x)=-f(x)$ (función impar). Una gráfica que no exhibe ninguna de
  estas dos simetrías no representa una función par ni impar.


  ### Desarrollo didáctico


  El truco visual es comparar el lado izquierdo de la curva ($x<0$) con el lado derecho ($x>0$): si son
  un reflejo de espejo vertical, es par; si son un giro de $180°$, es impar; si no coinciden con ninguno
  de esos dos patrones, no es ninguna de las dos.


  El gráfico de $f(x)=x^2-2x$ no es simétrico respecto al eje $y$ ni respecto al origen: su vértice está
  desplazado del eje $y$, así que no es ni par ni impar.'
procedimiento:
- 'Paso 1: Observa si la gráfica es simétrica respecto al eje $y$ (espejo vertical).'
- 'Paso 2: Si no lo es, observa si es simétrica respecto al origen (rotación de $180°$).'
- 'Paso 3: Si no cumple ninguna de las dos, concluye que no es par ni impar.'
ejemplos:
- titulo: Reconocimiento de simetría par en gráfico
  enunciado: El gráfico de $f(x)=|x|$ es simétrico respecto al eje $y$. ¿Qué tipo de función es?
  solucion_pasos:
  - La simetría respecto al eje $y$ corresponde a función par.
  - Es una función par.
- titulo: Reconocimiento de ausencia de simetría especial
  enunciado: El gráfico de $f(x)=x^2+2x+1$ no es simétrico ni respecto al eje $y$ ni respecto al origen.
    ¿Qué se concluye?
  solucion_pasos:
  - No cumple ninguno de los dos tipos de simetría.
  - No es ni par ni impar.
- titulo: ¿Un gráfico puede ser simétrico respecto al eje $y$ y al origen simultáneamente?
  enunciado: ¿Un gráfico puede ser simétrico respecto al eje $y$ y al origen simultáneamente?
  respuesta: Sí
  solucion_pasos:
  - Esto ocurre únicamente para la función $f(x)=0$ (la función nula), que es simultáneamente par e impar.
- titulo: ¿Toda gráfica que pasa por el origen es impar?
  enunciado: ¿Toda gráfica que pasa por el origen es impar?
  respuesta: 'No'
  solucion_pasos:
  - Pasar por el origen es necesario pero no suficiente para ser impar; se requiere además la simetría
    rotacional completa.
errores_frecuentes:
- Confundir simetría respecto al eje $y$ con simetría respecto al origen al observar el gráfico.
- Concluir paridad observando solo una parte pequeña de la curva sin considerar todo el dominio visible.
- Asumir que toda curva que pasa por el origen es impar sin verificar la simetría rotacional completa.
- No considerar la posibilidad de que la función no sea ni par ni impar.
