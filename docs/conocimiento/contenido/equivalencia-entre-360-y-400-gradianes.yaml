semantic_id: MAT.GEO.MEDICION_ANGULAR.EQUIVALENCIA_CENTESIMAL
titulo: Equivalencia entre 360° y 400 gradianes
objetivo: Convertir medidas angulares usando la equivalencia adecuada y comprobar que la equivalencia
  360° = 400g permite pasar de un sistema a otro por proporcionalidad.
introduccion: 'Cambiar entre grados y gradianes es parecido a cambiar entre pesos y centavos: la magnitud
  no cambia, solo la escala numérica.'
resumen: La vuelta completa puede escribirse como 360° o como 400 gradianes. Como idea de control, la
  equivalencia 360° = 400g permite pasar de un sistema a otro por proporcionalidad.
explicacion: 'La vuelta completa puede escribirse como 360° o como 400 gradianes.


  El ejemplo “si una vuelta completa vale 400g, entonces un ángulo recto vale 100g” no se resuelve por
  apariencia: se justifica usando la definición y revisando finalmente que la equivalencia 360° = 400g
  permite pasar de un sistema a otro por proporcionalidad.'
procedimiento:
- 'Paso 1: Identifica en qué unidad está dada la medida y a qué unidad debe pasar.'
- 'Paso 2: Escribe la equivalencia base del sistema involucrado antes de calcular.'
- 'Paso 3: Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.'
ejemplos:
- titulo: Situación geométrica — Equivalencia sexagesimal-centesimal
  enunciado: Si una vuelta completa vale 400g, entonces un ángulo recto vale 100g.
  solucion_pasos:
  - Identifica en qué unidad está dada la medida y a qué unidad debe pasar.
  - Escribe la equivalencia base del sistema involucrado antes de calcular.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: Chequeo del procedimiento — Equivalencia sexagesimal-centesimal
  enunciado: En la situación “si una vuelta completa vale 400g, entonces un ángulo recto vale 100g”, un
    compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye la justificación
    completa.
  solucion_pasos:
  - 'Parte de la definición: la vuelta completa puede escribirse como 360° o como 400 gradianes.'
  - Escribe la equivalencia base del sistema involucrado antes de calcular.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: ¿La interpretación del dibujo es válida? — Equivalencia sexagesimal-centesimal
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: la vuelta completa puede escribirse como 360°
    o como 400 gradianes.'
  - En el caso “si una vuelta completa vale 400g, entonces un ángulo recto vale 100g” se observa que la
    equivalencia 360° = 400g permite pasar de un sistema a otro por proporcionalidad.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: ¿Se puede omitir el paso intermedio? — Equivalencia sexagesimal-centesimal
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de equivalencia entre 360° y 400 gradianes.
  - Después del paso “Identifica en qué unidad está dada la medida y a qué unidad debe pasar.” todavía
    hace falta revisar “Escribe la equivalencia base del sistema involucrado antes de calcular.”.
  - El cierre correcto exige “Resuelve la proporción o la operación y verifica que el resultado tenga
    la unidad pedida.”.
errores_frecuentes:
- Equivalencia sexagesimal-centesimal significa pensar que 1° equivale exactamente a 1 gradian.
- Para resolver equivalencia sexagesimal-centesimal, basta con el paso “Identifica en qué unidad está
  dada la medida y a qué unidad debe pasar.” y no hace falta revisar “Escribe la equivalencia base del
  sistema involucrado antes de calcular.”.
- Si el dibujo parece claro, se puede ignorar que la equivalencia 360° = 400g permite pasar de un sistema
  a otro por proporcionalidad.
- Dos configuraciones distintas representan equivalencia sexagesimal-centesimal solo porque contienen
  la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Resuelve la proporción o la operación y verifica
  que el resultado tenga la unidad pedida.”.
fuente: Currículum Nacional MINEDUC — Medición angular, sistemas sexagesimal, radial y centesimal.
