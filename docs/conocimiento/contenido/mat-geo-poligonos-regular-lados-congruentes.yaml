semantic_id: MAT.GEO.POLIGONOS_METRICA.REGULAR_LADOS_CONGRUENTES
titulo: Propiedad de lados congruentes en un polígono regular
objetivo: Comprender que en un polígono regular todos los lados tienen exactamente la misma longitud.
introduccion: 'Los polígonos regulares tienen una característica visual muy reconocible: perfecta uniformidad
  en la longitud de sus lados.'
resumen: En un polígono regular, todos los lados son congruentes entre sí (tienen exactamente la misma
  longitud).
explicacion: '![Lados congruentes en un polígono regular](/static/img/geometria/poligonos-cuadrilateros/poligonos-regular-lados-congruentes.svg)


  ### Definición formal


  Un polígono regular de $n$ lados tiene todos sus lados de igual longitud $l$, por lo que su perímetro
  es $P=n\times l$.


  ### Desarrollo didáctico


  Un hexágono regular con lado de 5 cm tiene los 6 lados exactamente iguales, y su perímetro es $6\times5=30$
  cm. Esta propiedad simplifica enormemente los cálculos de perímetro en polígonos regulares, comparado
  con los irregulares.'
procedimiento:
- 'Paso 1: Verifica que el polígono sea regular.'
- 'Paso 2: Si es regular, todos sus lados tienen la misma longitud.'
- 'Paso 3: Multiplica esa longitud por el número de lados para obtener el perímetro.'
ejemplos:
- titulo: Calcular el perímetro de un hexágono regular
  enunciado: Un hexágono regular tiene lado de 5 cm.
  solucion_pasos:
  - Perímetro=6×5=30 cm.
- titulo: Verificar congruencia de lados
  enunciado: Un pentágono regular tiene un lado de 7 cm.
  solucion_pasos:
  - Los otros 4 lados también miden exactamente 7 cm, por ser regular.
- titulo: ¿Todos los polígonos tienen lados congruentes?
  respuesta: 'No'
  solucion_pasos:
  - No, esta propiedad es exclusiva de los polígonos regulares; los irregulares pueden tener lados de
    distinta longitud.
- titulo: ¿Un rectángulo no cuadrado es un polígono regular?
  respuesta: 'No'
  solucion_pasos:
  - No, porque sus cuatro lados no son todos iguales (solo los opuestos lo son).
errores_frecuentes:
- Asumir que cualquier polígono con lados de igual longitud en dos direcciones es regular, sin verificar
  todos los lados.
- Confundir esta propiedad (lados congruentes) con la de ángulos congruentes, que también se cumple en
  polígonos regulares pero es una propiedad distinta.
- Aplicar esta propiedad a un polígono irregular, asumiendo incorrectamente que todos sus lados son iguales.
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 47.'
estado: publicado
