semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.DECRECIMIENTO_BASE_ENTRE_CERO_UNO
titulo: Decrecimiento de la función logarítmica cuando $0<b<1$
objetivo: Reconocer que $f(x)=\log_b(x)$ es decreciente cuando la base cumple $0<b<1$.
introduccion: 'Cuando la base de un logaritmo es una fracción entre $0$ y $1$, el comportamiento se invierte
  respecto del caso $b>1$: a medida que el argumento crece, el valor del logaritmo disminuye.'
resumen: 'Si $0<b<1$, la función $f(x)=\log_b(x)$ es **estrictamente decreciente**: a mayor $x$, menor es $f(x)$.'
explicacion: '### Definición formal


  Si $0<b<1$, entonces para todo par $x_1,x_2\in\mathbb{R}^+$ con $x_1<x_2$ se cumple $\log_b(x_1)>\log_b(x_2)$;
  es decir, $f(x)=\log_b(x)$ es estrictamente decreciente en todo su dominio.


  ### Desarrollo didáctico


  Con $b=0{,}5$: $\log_{0{,}5}(1)=0$, $\log_{0{,}5}(2)=-1$, $\log_{0{,}5}(4)=-2$, $\log_{0{,}5}(8)=-3$. Cada vez
  que $x$ se duplica, $f(x)$ disminuye en $1$ unidad; el valor de la función baja de forma sostenida a medida que
  el argumento aumenta.'
procedimiento:
- 'Paso 1: Verifica que la base $b$ cumple $0<b<1$.'
- 'Paso 2: Evalúa la función en al menos dos valores crecientes de $x$.'
- 'Paso 3: Compara los resultados y confirma que $f(x)$ disminuye cuando $x$ aumenta.'
ejemplos:
- titulo: Comparación de valores con base $0{,}5$
  enunciado: 'Compara $\log_{0{,}5}(2)$ y $\log_{0{,}5}(8)$ para $f(x)=\log_{0{,}5}(x)$.'
  solucion_pasos:
  - 'Se calcula $\log_{0{,}5}(2)=-1$ y $\log_{0{,}5}(8)=-3$.'
  - Como $8>2$ y $-3<-1$, se confirma que la función es decreciente.
- titulo: Verificación de decrecimiento con base $\frac{1}{3}$
  enunciado: 'Determina si $f(x)=\log_{1/3}(x)$ es decreciente evaluando $x=3$ y $x=9$.'
  solucion_pasos:
  - 'Se calcula $\log_{1/3}(3)=-1$ y $\log_{1/3}(9)=-2$.'
  - Como $9>3$ y $-2<-1$, la función efectivamente decrece.
- titulo: ¿Es decreciente $f(x)=\log_{0{,}2}(x)$?
  enunciado: ¿La función $f(x)=\log_{0{,}2}(x)$ es decreciente en todo su dominio?
  respuesta: Sí
  solucion_pasos:
  - La base $0{,}2$ cumple $0<b<1$, condición suficiente para que la función sea decreciente.
- titulo: ¿Una base entre $0$ y $1$ puede producir una función creciente?
  enunciado: ¿Existe alguna base $b$ con $0<b<1$ para la cual $f(x)=\log_b(x)$ sea creciente?
  respuesta: 'No'
  solucion_pasos:
  - Toda base que cumple $0<b<1$ produce necesariamente una función decreciente.
errores_frecuentes:
- Suponer que una base fraccionaria hace que la función "crezca menos" en vez de decrecer.
- Confundir el comportamiento decreciente de $0<b<1$ con el creciente de $b>1$.
- Olvidar que la restricción $b\neq1$ excluye el caso donde la función sería constante.
- Aplicar la regla de decrecimiento sin antes verificar que $0<b<1$.
