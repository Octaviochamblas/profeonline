semantic_id: MAT.ALG.FUNC_POTENCIA_MODELO.CRECIMIENTO_POLINOMIAL
titulo: Modelamiento de crecimiento con exponente positivo
objetivo: Interpretar situaciones donde una magnitud crece según un modelo de función potencia con exponente
  entero positivo.
introduccion: Cuando una cantidad depende de otra elevada a una potencia positiva, como el área o el volumen,
  pequeños aumentos de la variable independiente producen aumentos mucho mayores en el resultado.
resumen: Un **modelo de crecimiento polinomial** usa $y=a\cdot x^n$ (con $n$ entero positivo) para describir
  cómo una magnitud crece cada vez más rápido a medida que aumenta la variable independiente.
explicacion: '### Definición formal


  En un modelo $y=a\cdot x^n$ con $a>0$ y $n$ entero positivo, la magnitud $y$ crece sin límite a medida que $x$
  aumenta, y la rapidez de ese crecimiento también aumenta (para $n\geq2$), a diferencia de un crecimiento
  lineal donde la rapidez es constante.


  ### Desarrollo didáctico


  Si el costo de producción depende del cuadrado de las unidades fabricadas, $C(x)=2x^2$: al pasar de $10$ a
  $20$ unidades, el costo pasa de $200$ a $800$, cuadruplicándose en vez de duplicarse, como ocurriría en un
  modelo lineal.'
procedimiento:
- 'Paso 1: Identifica el modelo $y=a\cdot x^n$ que describe la situación.'
- 'Paso 2: Evalúa el modelo en los valores de $x$ requeridos por el problema.'
- 'Paso 3: Interpreta el resultado en el contexto original, prestando atención a la rapidez de crecimiento.'
ejemplos:
- titulo: Interpretación de un modelo de área
  enunciado: 'Si el área de un terreno cuadrado es $A(x)=x^2$, ¿cuánto aumenta el área al duplicar el lado?'
  solucion_pasos:
  - Se comparan $A(x)$ y $A(2x)=(2x)^2=4x^2$.
  - El área se cuadruplica, no se duplica, al duplicar el lado.
- titulo: Cálculo directo en un modelo de crecimiento
  enunciado: 'Con $C(x)=3x^2$, calcula el costo para $x=5$ unidades.'
  solucion_pasos:
  - Se evalúa $C(5)=3\cdot25=75$.
  - El costo para $5$ unidades es $75$.
- titulo: ¿Un modelo con $n=1$ describe un crecimiento polinomial de orden superior?
  enunciado: ¿El modelo $y=a\cdot x^1$ (lineal) es un ejemplo de crecimiento polinomial de orden superior?
  respuesta: 'No'
  solucion_pasos:
  - Con $n=1$, la relación es lineal, sin la aceleración característica de exponentes mayores.
- titulo: ¿Duplicar $x$ siempre duplica el resultado en un modelo $y=a\cdot x^n$ con $n>1$?
  enunciado: ¿Duplicar la variable independiente $x$ siempre duplica el valor de $y$ en un modelo con $n>1$?
  respuesta: 'No'
  solucion_pasos:
  - El resultado se multiplica por $2^n$, no solo por $2$, cuando $n>1$.
errores_frecuentes:
- Suponer que duplicar $x$ siempre duplica el resultado, ignorando el efecto del exponente.
- Confundir el crecimiento polinomial con el crecimiento exponencial.
- No verificar las unidades correctas al interpretar el resultado en el contexto real.
- Aplicar el modelo fuera de su dominio de validez física (por ejemplo, con valores negativos sin sentido).
