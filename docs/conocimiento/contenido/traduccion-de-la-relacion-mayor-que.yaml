semantic_id: MAT.ALG.LENGUAJE_RELACIONES.MAYOR_QUE
titulo: Traducción de la relación mayor que
objetivo: Traducir relaciones de desigualdad donde una cantidad es superior a otra.
introduccion: Hasta ahora hemos sido los reyes de la igualdad. Todo era perfecto y estaba en equilibrio.
  Pero en la vida real, las cosas rara vez son iguales. Bienvenido al mundo de las inecuaciones.
resumen: La relación **'Mayor que'** se traduce utilizando el símbolo de desigualdad estricta **$>$**.
  La punta abierta o 'boca' del símbolo siempre apunta hacia la cantidad más grande.
explicacion: '### Definición formal


  La regla visual del símbolo es que la parte más ancha (la abertura) enfrenta a la expresión más grande,
  mientras el vértice (la punta) apunta al menor.


  ### Desarrollo didáctico


  Palabras clave:

  - A es mayor que B: $A > B$

  - Es superior a

  - Supera a

  - Más que


  Ejemplos:

  - ''El salario de un gerente es mayor que el de un analista'': $G > A$

  - ''El doble de un número es superior a cien'': $2x > 100$


  ¿Por qué es importante el sentido? Porque, a diferencia de la igualdad, si inviertes los lados tienes
  que invertir el símbolo. Si $A > B$, entonces obligatoriamente $B < A$.'
procedimiento:
- 'Paso 1: Identifica qué entidad es la más grande en la comparación.'
- 'Paso 2: Escribe esa entidad en el lado izquierdo.'
- 'Paso 3: Dibuja el símbolo > (la boca abierta mirando a la entidad grande).'
- 'Paso 4: Escribe la entidad más pequeña en el lado derecho.'
ejemplos:
- titulo: Rompiendo barreras
  enunciado: 'Traduce: ''La suma de las ventas de hoy y ayer superan los cinco mil dólares''.'
  solucion_pasos:
  - 'Suma de ventas de hoy y ayer: H + A.'
  - Es superior a (>) cinco mil (5000).
  - 'Traducción: H + A > 5000.'
- titulo: 'Una aerolínea dicta en sus políticas: ''El peso del equipaje ($P$) más el peso del pasajero
    ('
  enunciado: 'Una aerolínea dicta en sus políticas: ''El peso del equipaje ($P$) más el peso del pasajero
    ($M$) no debe ser igual a la capacidad máxima ($C$), de hecho, debe ser siempre un valor que la sobrepase
    para justificar el uso de aviones grandes''. ¿Cuál es la inecuación que modela esta extraña política?
    (v1)


    Opciones: A) $P + M > C$ · B) $P + M < C$ · C) $P + M \ge C$ · D) $P > M + C$'
  solucion_pasos:
  - La suma de ambos pesos ($P+M$) debe 'sobrepasar' (ser estrictamente mayor que) la capacidad ($C$).
    Esto se traduce sin ambigüedades como $P + M > C$.
- titulo: 'Respecto de «Traducción de la relación mayor que»: ¿Describe adecuadamente el concepto esta'
  enunciado: 'Respecto de «Traducción de la relación mayor que»: ¿Describe adecuadamente el concepto esta
    frase? «La relación **''Mayor que''** se traduce utilizando el símbolo de desigualdad estricta **$>$**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La relación **''Mayor que''** se traduce utilizando
    el símbolo de desigualdad estricta **$>$**.'
- titulo: 'Respecto de «Traducción de la relación mayor que»: ¿Se puede aceptar esta afirmación? «Confu'
  enunciado: 'Respecto de «Traducción de la relación mayor que»: ¿Se puede aceptar esta afirmación? «Confundir
    los símbolos $>$ (mayor) con $<$ (menor). (Regla nemotécnica: el pez grande se come al chico, la boca
    abierta va hacia el mayor)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La relación **''Mayor que''** se traduce utilizando
    el símbolo de desigualdad estricta **$>$**.'
errores_frecuentes:
- 'Confundir los símbolos $>$ (mayor) con $<$ (menor). (Regla nemotécnica: el pez grande se come al chico,
  la boca abierta va hacia el mayor).'
- Asumir que 'mayor que' implica una suma.
- Siempre apunta hacia la incógnita, sin importar si es mayor o menor.
- Siempre apunta hacia la derecha, por convención de lectura.
- Indica que el lado hacia donde se abre es un número negativo.
fuente: Álgebra de Baldor.
estado: publicado
