semantic_id: MAT.ALG.EC_CUADR_MODELO.SELECCION_RAIZ_VALIDA
titulo: Selección de la raíz válida según las restricciones del contexto
objetivo: Seleccionar, entre las dos soluciones de una ecuación cuadrática aplicada a un problema, cuál
  (o cuáles) tienen sentido según las restricciones del contexto.
introduccion: Resolver correctamente la ecuación es solo la mitad del trabajo en un problema aplicado;
  la otra mitad es decidir cuál de las soluciones algebraicas realmente responde a la pregunta planteada.
resumen: Seleccionar la raíz válida consiste en revisar cada solución algebraica de la ecuación cuadrática
  contra las restricciones del contexto (positividad, naturaleza del número, límites físicos) y descartar
  las que no las cumplen.
explicacion: '### Definición formal


  Una ecuación cuadrática que modela un problema aplicado entrega, en general, dos soluciones matemáticas.
  La solución del problema real es el subconjunto de esas raíces que satisface además las restricciones
  impuestas por el contexto (por ejemplo, $x>0$ para una longitud, o $x \in \mathbb{N}$ para una cantidad
  de objetos).


  ### Desarrollo didáctico


  El criterio de selección depende de qué representa la incógnita: longitudes, tiempos y cantidades físicas
  exigen valores positivos; cantidades de objetos exigen valores enteros; edades exigen valores razonables
  dentro de un rango humano.


  Si la ecuación de un problema de área da $x=5$ o $x=-8$, y $x$ representa el ancho de un terreno, se
  descarta $x=-8$ por no ser una longitud válida, quedando $x=5$ como única solución del problema.'
procedimiento:
- 'Paso 1: Resuelve completamente la ecuación cuadrática, obteniendo ambas soluciones algebraicas.'
- 'Paso 2: Identifica qué representa la incógnita en el contexto del problema (longitud, tiempo, cantidad,
  etc.).'
- 'Paso 3: Determina las restricciones que esa cantidad debe cumplir (positividad, ser entero, rango razonable).'
- 'Paso 4: Descarta las soluciones que no cumplan esas restricciones y conserva las que sí.'
ejemplos:
- titulo: Selección con restricción de positividad
  enunciado: Al resolver un problema de área se obtiene $x=6$ o $x=-9$, donde $x$ representa el largo
    de un jardín. ¿Cuál es la solución válida?
  solucion_pasos:
  - Una longitud no puede ser negativa.
  - La solución válida es $x=6$.
- titulo: Selección con ambas soluciones válidas
  enunciado: Al resolver un problema de altura se obtiene $t=2$ o $t=6$, ambos tiempos positivos, representando
    los instantes en que un objeto alcanza cierta altura. ¿Son ambas válidas?
  solucion_pasos:
  - Ambos tiempos son positivos y corresponden a instantes reales (subida y bajada).
  - Sí, ambas soluciones son válidas en este contexto.
- titulo: ¿Siempre se debe descartar la solución negativa de una ecuación cuadrática aplicada?
  enunciado: ¿Siempre se debe descartar la solución negativa de una ecuación cuadrática aplicada?
  respuesta: 'No'
  solucion_pasos:
  - Solo se descarta si el contexto exige valores positivos (como una longitud); en otros contextos (por
    ejemplo, una posición en una recta numérica) un valor negativo puede ser perfectamente válido.
- titulo: ¿Puede un problema aplicado tener las dos soluciones algebraicas como válidas simultáneamente?
  enunciado: ¿Puede un problema aplicado tener las dos soluciones algebraicas como válidas simultáneamente?
  respuesta: Sí
  solucion_pasos:
  - Ocurre cuando ambas soluciones cumplen las restricciones del contexto, como en el ejemplo de las dos
    alturas alcanzadas durante un lanzamiento.
errores_frecuentes:
- Descartar automáticamente la solución negativa sin verificar si realmente viola una restricción del
  contexto.
- Aceptar ambas soluciones sin verificar si alguna incumple una restricción implícita del problema.
- No identificar correctamente qué representa la incógnita antes de decidir qué restricciones aplicar.
- Olvidar verificar restricciones adicionales, como que la solución sea un número entero si se piden unidades
  completas.
