semantic_id: MAT.GEO.TRIG_IDENTIDADES.SECANTE_TANGENTE
titulo: 'Identidad pitagórica recíproca: uno más tangente cuadrado igual a secante cuadrado'
objetivo: Demostrar y aplicar la identidad pitagórica recíproca que relaciona la tangente y la secante
  de un mismo ángulo.
introduccion: Esta identidad se obtiene dividiendo la identidad pitagórica fundamental por el coseno al
  cuadrado, transformando seno y coseno en tangente y secante.
resumen: Para cualquier ángulo agudo $\theta$, se cumple la identidad $1+\tan^2\theta=\sec^2\theta$.
explicacion: '![Identidad pitagórica: 1+tan²θ=sec²θ](/static/img/geometria/trigonometria/razon-identidad-secante-tangente.svg)


  ### Definición formal


  Partiendo de $\sin^2\theta+\cos^2\theta=1$ y dividiendo ambos lados por $\cos^2\theta$: $\dfrac{\sin^2\theta}{\cos^2\theta}+1=\dfrac{1}{\cos^2\theta}$,
  es decir, $\tan^2\theta+1=\sec^2\theta$.


  ### Desarrollo didáctico


  Si $\tan\theta=0{,}75$, entonces $\sec^2\theta=1+0{,}75^2=1+0{,}5625=1{,}5625$, por lo que $\sec\theta=1{,}25$
  (coincidiendo con el recíproco del coseno de ese mismo ángulo).'
procedimiento:
- 'Paso 1: Recuerda que esta identidad se obtiene dividiendo la identidad pitagórica fundamental por cos²θ.'
- 'Paso 2: Si conoces tanθ, calcula sec²θ=1+tan²θ.'
- 'Paso 3: Extrae la raíz cuadrada para obtener secθ, y de ahí cosθ=1/secθ si es necesario.'
ejemplos:
- titulo: Calcular la secante a partir de la tangente
  enunciado: tanθ=0,75.
  solucion_pasos:
  - sec²θ=1+0,75²=1,5625 → secθ=1,25.
- titulo: Verificar la identidad con valores notables
  enunciado: θ=45°, con tan45°=1.
  solucion_pasos:
  - sec²45°=1+1²=2 → sec45°=√2, coincidiendo con 1/cos45°=1/(√2/2)=√2.
- titulo: ¿Esta identidad se deduce de la identidad pitagórica fundamental?
  respuesta: Sí
  solucion_pasos:
  - Sí, se obtiene dividiendo sin²θ+cos²θ=1 por cos²θ.
- titulo: ¿Se puede usar esta identidad para calcular el coseno a partir de la tangente?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, una vez obtenida la secante, el coseno es simplemente su recíproco: cosθ=1/secθ.'
errores_frecuentes:
- Olvidar sumar 1 antes de elevar la tangente al cuadrado.
- Confundir esta identidad con la fundamental (seno-coseno), aplicándola con los términos incorrectos.
- Olvidar sacar la raíz cuadrada al despejar la secante desde su cuadrado.
fuente: 'Elaboración propia (referencias: Moraleja 178, Cid 155).'
estado: publicado
