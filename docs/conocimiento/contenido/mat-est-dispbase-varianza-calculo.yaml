semantic_id: MAT.EST.DISPERSION_BASE.VARIANZA_CALCULO
titulo: Calcular la varianza para datos no agrupados
objetivo: Calcular la varianza de un conjunto de datos no agrupados aplicando su fórmula paso a paso.
introduccion: Calcular la varianza es un procedimiento con pasos ordenados, similar a seguir una receta, que termina
  en un solo número que resume la dispersión.
resumen: Para calcular la varianza se resta la media a cada dato, se elevan al cuadrado esas diferencias y se promedian
  todos los resultados obtenidos.
explicacion: '![Cálculo de la varianza](/static/img/estadistica/dispbase/dispbase-varianza-calculo.svg)


  ### Definición formal


  La varianza se calcula con $\sigma^2 = \dfrac{\sum (x_i-\bar{x})^2}{n}$, sumando los cuadrados de todas las

  desviaciones y dividiendo por el total de datos $n$.


  ### Desarrollo didáctico


  Por ejemplo, con datos $\{2, 4, 6\}$ y media $4$, las desviaciones son $-2, 0, 2$; sus cuadrados son $4, 0, 4$; la

  varianza es $\dfrac{4+0+4}{3}=2{,}67$.'
procedimiento:
- 'Paso 1: Calcula la media aritmética $\bar{x}$ del conjunto de datos.'
- 'Paso 2: Calcula $(x_i-\bar{x})^2$ para cada dato.'
- 'Paso 3: Suma todos los cuadrados y divide por $n$ para obtener la varianza.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Calcula la varianza del conjunto $\{2, 4, 6\}$.
  solucion_pasos:
  - La media es $\bar{x}=4$.
  - Las desviaciones son $-2, 0, 2$; sus cuadrados son $4, 0, 4$.
  - $\sigma^2=\dfrac{4+0+4}{3}=2{,}67$.
- titulo: Ejemplo 2
  enunciado: Calcula la varianza del conjunto $\{10, 10, 10\}$.
  solucion_pasos:
  - La media es $\bar{x}=10$.
  - Todas las desviaciones son 0.
  - $\sigma^2 = 0$.
- titulo: ¿Se divide por $n$ (número de datos) al calcular la varianza?
  respuesta: Sí
  solucion_pasos:
  - Sí, la suma de cuadrados se divide por el total de datos.
- titulo: ¿Se calcula la varianza sumando las desviaciones sin elevarlas al cuadrado?
  respuesta: 'No'
  solucion_pasos:
  - 'No, se deben elevar al cuadrado antes de sumarlas; de lo contrario, el resultado siempre sería cero.'
errores_frecuentes:
- Olvidar dividir por $n$ después de sumar los cuadrados de las desviaciones.
- Sumar las desviaciones sin elevarlas al cuadrado.
- Calcular mal la media antes de obtener las desviaciones.
- Confundir el orden de las operaciones al aplicar la fórmula.
- Redondear demasiado pronto los resultados intermedios, afectando la precisión final.
fuente: 'Elaboración propia (referencia: Moraleja 238).'
estado: publicado
