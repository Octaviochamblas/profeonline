semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.PARAMETROS_SIN_SOLUCION
titulo: Parámetros para Sistema sin Solución
objetivo: Configurar los coeficientes para crear rectas paralelas separadas.
explicacion: |
  El último truco del mago: te piden el parámetro 'k' para que el sistema **no tenga solución**.
  Traducción geométrica: 'Haz que las vías del tren sean paralelas'.

  Para que sean paralelas, deben tener la misma inclinación (las 'x' y las 'y' deben ser proporcionales entre sí), pero ¡CUIDADO! el resultado final debe ser diferente (no pueden ser clones).

  Regla de las paralelas: $\frac{A_1}{A_2} = \frac{B_1}{B_2}$ pero esto debe ser $\neq \frac{C_1}{C_2}$.
  Normalmente, te bastará con igualar la fracción de las 'x' con la fracción de las 'y' para despejar 'k', y el problema estará resuelto.
procedimiento: |
  1. Arma las fracciones de proporciones.
  2. Para garantizar la misma pendiente, iguala la proporción de 'x' con la proporción de 'y': $\frac{A_1}{A_2} = \frac{B_1}{B_2}$.
  3. Resuelve esa igualdad para despejar el parámetro.
  4. (Opcional pero formal) Verifica que con ese valor encontrado, la proporción resultante sea DISTINTA a la de los números sueltos ($\frac{C_1}{C_2}$).
