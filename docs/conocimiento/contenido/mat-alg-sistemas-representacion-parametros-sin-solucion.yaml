semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.PARAMETROS_SIN_SOLUCION
titulo: Parámetros para Sistema sin Solución
objetivo: Configurar los coeficientes para crear rectas paralelas separadas.
introduccion: Para que sean paralelas, deben tener la misma inclinación (las 'x' y las 'y' deben ser proporcionales
  entre sí), pero CUIDADO. el resultado final debe ser diferente (no pueden ser ecuaciones dependientes).
resumen: 'El último caso paramétrico: te piden el parámetro ''k'' para que el sistema **no tenga solución**.

  Traducción geométrica: ''Haz que las rectas paralelas sean paralelas''.'
explicacion: '### Definición formal


  El último caso paramétrico: te piden el parámetro ''k'' para que el sistema **no tenga solución**.

  Traducción geométrica: ''Haz que las rectas paralelas sean paralelas''.


  ### Desarrollo didáctico


  Para que sean paralelas, deben tener la misma inclinación (las ''x'' y las ''y'' deben ser proporcionales entre
  sí), pero CUIDADO. el resultado final debe ser diferente (no pueden ser ecuaciones dependientes).


  Regla de las paralelas: $\frac{A_1}{A_2} = \frac{B_1}{B_2}$ pero esto debe ser $\neq \frac{C_1}{C_2}$.

  Normalmente, te bastará con igualar la fracción de las ''x'' con la fracción de las ''y'' para despejar ''k'',
  y el problema estará resuelto.'
procedimiento:
- Arma las fracciones de proporciones.
- 'Para garantizar la misma pendiente, iguala la proporción de ''x'' con la proporción de ''y'': $\frac{A_1}{A_2}
  = \frac{B_1}{B_2}$.'
- Resuelve esa igualdad para despejar el parámetro.
- (Opcional pero formal) Verifica que con ese valor encontrado, la proporción resultante sea DISTINTA a la de los
  números sueltos ($\frac{C_1}{C_2}$).
ejemplos:
- titulo: $\frac{A_1}{A_2} = \frac{B_1}{B_2}$ y $\neq \frac{C_1}{C_2}$
  enunciado: Analiza el caso $\frac{A_1}{A_2} = \frac{B_1}{B_2}$ y $\neq \frac{C_1}{C_2}$ y explica cómo se aplica
    el criterio estudiado.
  solucion_pasos:
  - 'Regla de las paralelas: $\frac{A_1}{A_2} = \frac{B_1}{B_2}$ pero esto debe ser $\neq \frac{C_1}{C_2}$.

    Normalmente, te bastará con igualar la fracción de las ''x'' con la fracción de las ''y'' para despejar ''k'',
    y el problema estará resuelto.'
  - Arma las fracciones de proporciones.
- titulo: $\frac{A_1}{A_2} = \frac{B_1}{B_2}$ y $\neq \frac{C_1}{C_2}$
  enunciado: Resuelve o interpreta $\frac{A_1}{A_2} = \frac{B_1}{B_2}$ y $\neq \frac{C_1}{C_2}$ usando las condiciones
    de este recurso.
  solucion_pasos:
  - 'Regla de las paralelas: $\frac{A_1}{A_2} = \frac{B_1}{B_2}$ pero esto debe ser $\neq \frac{C_1}{C_2}$.

    Normalmente, te bastará con igualar la fracción de las ''x'' con la fracción de las ''y'' para despejar ''k'',
    y el problema estará resuelto.'
  - 'Para garantizar la misma pendiente, iguala la proporción de ''x'' con la proporción de ''y'': $\frac{A_1}{A_2}
    = \frac{B_1}{B_2}$.'
- titulo: 'Respecto de «Condición paramétrica para ausencia de solución en un sistema 2x2»: ¿Es correct'
  enunciado: 'Respecto de «Condición paramétrica para ausencia de solución en un sistema 2x2»: ¿Es correcta esta
    caracterización? «El último caso paramétrico: te piden el parámetro ''k'' para que el sistema **no tenga solución**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El último caso paramétrico: te piden el parámetro ''k'' para
    que el sistema **no tenga solución**.'
- titulo: 'Respecto de «Condición paramétrica para ausencia de solución en un sistema 2x2»: ¿Es válida'
  enunciado: 'Respecto de «Condición paramétrica para ausencia de solución en un sistema 2x2»: ¿Es válida esta afirmación?
    «Puede omitirse esta condición sin cambiar el resultado: «Arma las fracciones de proporciones»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El último caso paramétrico: te piden el parámetro ''k'' para
    que el sistema **no tenga solución**.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Arma las fracciones de proporciones».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Para garantizar la misma pendiente, iguala la
  proporción de ''x'' con la proporción de ''y'': $\frac{A_1}{A_2} = \frac{B_1}{B_2}$».'
- 'La definición sigue cumpliéndose aunque no se considere que el último caso paramétrico: te piden el parámetro
  ''k'' para que el sistema **no tenga solución**.

  Traducción geométrica: ''Haz que las rectas paralelas sean paralelas''.'
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «(Opcional pero formal) Verifica que con
  ese valor encontrado, la proporción resultante sea DISTINTA a la de los números sueltos ($\frac{C_1}{C_2}$)».
- La comprobación del resultado vuelve innecesaria la condición «Arma las fracciones de proporciones».
