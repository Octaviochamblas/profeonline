semantic_id: MAT.GEO.MEDICION_ANGULAR.MINUTOS_SEGUNDOS
titulo: 'Subunidades sexagesimales del grado: minutos y segundos angulares'
objetivo: Leer y descomponer una medida angular en grados, minutos y segundos y comprobar que minutos
  y segundos angulares no representan tiempo, sino subdivisiones del grado.
introduccion: 'En un mapa o en astronomía se usan medidas muy finas. Para no abandonar los grados, se
  los subdivide en minutos y segundos angulares. Para resolver situaciones de subunidades sexagesimales
  del grado: minutos y segundos angulares conviene mirar el dibujo con método, no solo por intuición.'
resumen: En el sistema sexagesimal, 1° se divide en 60 minutos y 1 minuto en 60 segundos. Como idea de
  control, minutos y segundos angulares no representan tiempo, sino subdivisiones del grado.
explicacion: 'En el sistema sexagesimal, 1° se divide en 60 minutos y 1 minuto en 60 segundos.


  La situación “la medida \(25°\,18''\,36''''\) usa grados, minutos y segundos angulares” muestra cómo
  pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se verifica
  que minutos y segundos angulares no representan tiempo, sino subdivisiones del grado.'
procedimiento:
- 'Paso 1: Ubica qué parte de la medida corresponde a grados, minutos y segundos.'
- 'Paso 2: Recuerda las equivalencias \(1°=60''\) y \(1''=60''''\).'
- 'Paso 3: Comprueba que cada subunidad esté interpretada como parte del grado y no como tiempo.'
ejemplos:
- titulo: Lectura del dibujo — Minutos y segundos angulares
  enunciado: La medida \(25°\,18'\,36''\) usa grados, minutos y segundos angulares.
  solucion_pasos:
  - Ubica qué parte de la medida corresponde a grados, minutos y segundos.
  - Recuerda las equivalencias \(1°=60'\) y \(1'=60''\).
  - Comprueba que cada subunidad esté interpretada como parte del grado y no como tiempo.
- titulo: Verificación de la solución — Minutos y segundos angulares
  enunciado: En la situación “la medida \(25°\,18'\,36''\) usa grados, minutos y segundos angulares”,
    un compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye la justificación
    completa.
  solucion_pasos:
  - 'Parte de la definición: en el sistema sexagesimal, 1° se divide en 60 minutos y 1 minuto en 60 segundos.'
  - Recuerda las equivalencias \(1°=60'\) y \(1'=60''\).
  - Comprueba que cada subunidad esté interpretada como parte del grado y no como tiempo.
- titulo: ¿Puede concluirse correctamente este hecho? — Minutos y segundos angulares
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: en el sistema sexagesimal, 1° se divide en
    60 minutos y 1 minuto en 60 segundos.'
  - En el caso “la medida \(25°\,18'\,36''\) usa grados, minutos y segundos angulares” se observa que
    minutos y segundos angulares no representan tiempo, sino subdivisiones del grado.
  - Comprueba que cada subunidad esté interpretada como parte del grado y no como tiempo.
- titulo: ¿Se puede cerrar sin el control final? — Minutos y segundos angulares
  respuesta: 'No'
  solucion_pasos:
  - 'No. Un inicio útil no reemplaza la justificación completa de subunidades sexagesimales del grado:
    minutos y segundos angulares.'
  - Después del paso “Ubica qué parte de la medida corresponde a grados, minutos y segundos.” todavía
    hace falta revisar “Recuerda las equivalencias \(1°=60'\) y \(1'=60''\).”.
  - El cierre correcto exige “Comprueba que cada subunidad esté interpretada como parte del grado y no
    como tiempo.”.
errores_frecuentes:
- Minutos y segundos angulares significa tratar los minutos y segundos angulares exactamente como minutos
  y segundos de un reloj.
- Para resolver minutos y segundos angulares, basta con el paso “Ubica qué parte de la medida corresponde
  a grados, minutos y segundos.” y no hace falta revisar “Recuerda las equivalencias \(1°=60'\) y \(1'=60''\).”.
- Si el dibujo parece claro, se puede ignorar que minutos y segundos angulares no representan tiempo,
  sino subdivisiones del grado.
- Dos configuraciones distintas representan minutos y segundos angulares solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que cada subunidad esté interpretada
  como parte del grado y no como tiempo.”.
fuente: Currículum Nacional MINEDUC — Medición angular, sistemas sexagesimal, radial y centesimal.
