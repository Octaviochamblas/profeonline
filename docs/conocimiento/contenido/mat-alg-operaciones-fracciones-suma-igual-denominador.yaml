semantic_id: 'MAT.ALG.OPERACIONES_FRACCIONES.SUMA_IGUAL_DENOMINADOR'
titulo: 'Suma y Resta con Denominadores Iguales'
objetivo: 'Sumar o restar fracciones algebraicas que ya comparten el mismo denominador.'
introduccion: |
  Si dos fracciones tienen el mismo denominador, ya están 'hablando el mismo idioma'. La suma o resta es inmediata y muy sencilla. Es el escenario ideal que siempre buscaremos alcanzar.
resumen: |
  Para sumar o restar fracciones algebraicas con el mismo denominador, mantén el denominador intacto y suma o resta los numeradores.
explicacion: |
  Piensa en pedazos de pizza. Si tienes $\frac{3}{8}$ de pizza y te dan $\frac{2}{8}$ más, tienes $\frac{5}{8}$. ¡No sumas los 8!

  En álgebra es idéntico:
  $\frac{5x}{x+2} + \frac{3x}{x+2}$
  Ambos tienen como denominador $(x+2)$. Así que la respuesta tendrá base $(x+2)$.
  Sumamos los techos: $5x + 3x = 8x$.
  Resultado: $\frac{8x}{x+2}$.

  **El peligro de las restas:**
  Si es una resta, el negativo afecta a TODO el segundo numerador.
  $\frac{7x}{x-1} - \frac{2x - 5}{x-1}$
  Juntamos en una fracción: $\frac{7x - (2x - 5)}{x-1}$.
  Distribuimos el negativo: $\frac{7x - 2x + 5}{x-1} = \frac{5x + 5}{x-1}$.
procedimiento:
  - 'Paso 1: Verifica visualmente que ambos denominadores sean absolutamente idénticos.'
  - 'Paso 2: Dibuja una sola línea fraccionaria y escribe el denominador común una sola vez debajo.'
  - 'Paso 3: Copia los numeradores en la parte superior. Si hay un signo menos de resta entre las fracciones, pon el segundo numerador entre paréntesis para que el menos afecte a todos sus términos.'
  - 'Paso 4: Reduce términos semejantes en el numerador final y, si es posible, factoriza para ver si algo se simplifica con el denominador.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Suma $\frac{2a + 3b}{5} + \frac{4a - b}{5}$.'
    solucion_pasos:
    - 'Mismo denominador (5).'
    - 'Sumamos numeradores: $2a + 3b + 4a - b$.'
    - 'Reducimos semejantes: $6a + 2b$.'
    - 'Resultado final: $\frac{6a + 2b}{5}$.'
  - titulo: 'Resta $\frac{x}{y} - \frac{x-2}{y}$.'
    respuesta: '$\frac{2}{y}$'
    solucion_pasos:
    - 'Numerador será: x - (x - 2) = x - x + 2 = 2. Denominador y.'
errores_frecuentes:
  - 'Sumar también los denominadores (ej. decir que $\frac{x}{2} + \frac{y}{2} = \frac{x+y}{4}$).'
  - 'En una resta, restar solo el primer término del segundo numerador y olvidar distribuir el signo menos.'
estado: publicado
