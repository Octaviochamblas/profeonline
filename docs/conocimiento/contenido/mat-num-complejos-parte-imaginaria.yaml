semantic_id: MAT.NUM.COMPLEJOS.PARTE_IMAGINARIA
objetivo: Identificar correctamente la parte imaginaria.
introduccion: La palabra “parte” puede inducir a copiar todo el término con \(i\).
  En notación matemática, \(\operatorname{Im}(z)\) devuelve únicamente su coeficiente
  real.
resumen: En \(z=a+bi\), la parte imaginaria es el coeficiente real \(b\). La parte
  imaginaria es \(-3\), no el término \(-3i\).
explicacion: |-
  En \(z=a+bi\), la parte imaginaria es el coeficiente real \(b\).

  El cálculo “si \(z=6-3i\), entonces \(\operatorname{Im}(z)=-3\)” muestra por qué la parte imaginaria es \(-3\), no el término \(-3i\)
procedimiento:
- 'Paso 1: Escribe el complejo como \(a+bi\).'
- 'Paso 2: Lee el coeficiente de \(i\), incluyendo su signo.'
- 'Paso 3: Distingue el coeficiente \(b\) del término imaginario completo \(bi\).'
ejemplos:
- titulo: Aplicación razonada — Identificación de la parte imaginaria de un número
    complejo
  enunciado: Si \(z=6-3i\), entonces \(\operatorname{Im}(z)=-3\).
  solucion_pasos:
  - Escribe el complejo como \(a+bi\).
  - Lee el coeficiente de \(i\), incluyendo su signo.
  - Distingue el coeficiente \(b\) del término imaginario completo \(bi\).
- titulo: Revisión de una solución — Identificación de la parte imaginaria de un número
    complejo
  enunciado: Una solución aplica “Lee el coeficiente de \(i\), incluyendo su signo.”,
    pero termina sin comprobar que la parte imaginaria es \(-3\), no el término \(-3i\).
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de la parte imaginaria de un
    número complejo: en \(z=a+bi\), la parte imaginaria es el coeficiente real \(b\).'
  - Escribe el complejo como \(a+bi\).
  - 'Completa la revisión con este control: Distingue el coeficiente \(b\) del término
    imaginario completo \(bi\).'
- titulo: ¿Se cumple que la parte imaginaria es \(-3\), no el término \(-3i\)? — Identificación
    de la parte imaginaria de un número complejo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que en \(z=a+bi\), la parte imaginaria
    es el coeficiente real \(b\).
  - El caso “si \(z=6-3i\), entonces \(\operatorname{Im}(z)=-3\)” satisface esa condición.
  - Distingue el coeficiente \(b\) del término imaginario completo \(bi\).
- titulo: ¿Es válido omitir el paso “Escribe el complejo como \(a+bi\)”? — Identificación
    de la parte imaginaria de un número complejo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de la parte imaginaria
    de un número complejo.
  - 'Omitirlo puede volver inválida la acción siguiente: Lee el coeficiente de \(i\),
    incluyendo su signo.'
  - 'La solución debe terminar de este modo: Distingue el coeficiente \(b\) del término
    imaginario completo \(bi\).'
errores_frecuentes:
- 'Confundir identificación de la parte imaginaria de un número complejo con otro
  concepto y omitir este inicio: Escribe el complejo como \(a+bi\).'
- Aplicar mecánicamente “Lee el coeficiente de \(i\), incluyendo su signo.” sin revisar
  las condiciones de la definición.
- Tomar “si \(z=6-3i\), entonces \(\operatorname{Im}(z)=-3\)” como una igualdad aislada,
  sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la parte imaginaria es \(-3\),
  no el término \(-3i\)”.
- 'Terminar el desarrollo sin realizar este control: Distingue el coeficiente \(b\)
  del término imaginario completo \(bi\).'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
