semantic_id: MAT.GEO.POLIEDROS_PRISMAS.VERTICES
titulo: Identificación de los vértices de un poliedro
objetivo: 'Identificar correctamente los vértices de un poliedro: los puntos donde concurren tres o más
  aristas.'
introduccion: Cada 'esquina puntiaguda' de un poliedro, como las puntas de un dado, es lo que en geometría
  se llama vértice.
resumen: Los vértices de un poliedro son los puntos donde concurren tres o más aristas del poliedro.
explicacion: '![Vértices de un poliedro](/static/img/geometria/espacio-cuerpos/poliedro-vertices.svg)


  ### Definición formal


  Un vértice de un poliedro es un punto donde concurren (se encuentran) tres o más aristas, y por lo tanto
  también tres o más caras. Es el elemento de menor dimensión del poliedro (dimensión cero).


  ### Desarrollo didáctico


  En la figura, el punto $B$ es un vértice del prisma: en él concurren tres aristas y tres caras. Un prisma
  rectangular tiene en total 8 vértices.'
procedimiento:
- 'Paso 1: Observa dónde concurren tres o más aristas del poliedro.'
- 'Paso 2: Identifica ese punto de encuentro como un vértice.'
- 'Paso 3: Cuenta el total de vértices para caracterizar completamente el poliedro.'
ejemplos:
- titulo: Identificar un vértice en un prisma rectangular
  enunciado: En el punto B del prisma concurren tres aristas.
  solucion_pasos:
  - B es un vértice del prisma, ya que en él se encuentran tres aristas.
- titulo: Contar el total de vértices de un prisma rectangular
  enunciado: Un prisma rectangular tiene 4 vértices en cada base.
  solucion_pasos:
  - 'En total tiene 8 vértices: 4 de la base superior y 4 de la base inferior.'
- titulo: ¿En cada vértice de un poliedro concurren al menos tres aristas?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición, un vértice requiere el encuentro de al menos tres aristas (y por lo tanto tres
    caras).
- titulo: ¿Un vértice tiene alguna dimensión (longitud, área)?
  respuesta: 'No'
  solucion_pasos:
  - No, al igual que un punto, un vértice no tiene dimensiones; es el elemento de dimensión cero del poliedro.
errores_frecuentes:
- Confundir un vértice con una arista o una cara.
- Contar incorrectamente los vértices, olvidando alguno de los de la base inferior o superior.
- Creer que un vértice puede formarse con solo dos aristas concurrentes (se necesitan al menos tres).
fuente: 'Elaboración propia (referencias: Moraleja 96, Cid 167).'
estado: publicado
