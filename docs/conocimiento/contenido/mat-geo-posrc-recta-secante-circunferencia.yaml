semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.RECTA_SECANTE_CIRCUNFERENCIA
titulo: Identificación de recta secante a una circunferencia
objetivo: Identificar que una recta es secante a una circunferencia cuando la corta en exactamente dos
  puntos distintos, condición que se cumple si la distancia del centro a la recta es menor que el radio.
introduccion: 'Una recta puede relacionarse con una circunferencia de tres maneras: cruzándola en dos
  puntos (secante), tocándola en uno solo (tangente), o sin tocarla (exterior). El caso secante se distingue
  por la posición del centro respecto de la recta.'
resumen: 'Una recta es secante a una circunferencia de centro $(h,k)$ y radio $r$ si la distancia entre
  el centro y la recta es menor que $r$: $d(\text{centro},\text{recta})<r$.'
explicacion: '![Recta secante a una circunferencia](/static/img/geometria/analitica/posrc-recta-secante-circunferencia.svg)


  ### Definición formal


  Una recta $Ax+By+C=0$ es secante a una circunferencia de centro $(h,k)$ y radio $r$ si $\dfrac{|Ah+Bk+C|}{\sqrt{A^2+B^2}}<r$,
  cortándola en exactamente dos puntos.


  ### Desarrollo didáctico


  Para la circunferencia $x^2+y^2=9$ (centro (0,0), radio 3) y la recta horizontal $y=1$: la distancia
  del centro a la recta es 1 (la diferencia vertical), que es menor que 3, por lo que la recta es secante,
  cruzando la circunferencia en dos puntos.'
procedimiento:
- 'Paso 1: Calcula la distancia entre el centro de la circunferencia y la recta dada.'
- 'Paso 2: Compara esa distancia con el radio de la circunferencia.'
- 'Paso 3: Si la distancia es menor que el radio, la recta es secante (corta la circunferencia en dos
  puntos).'
ejemplos:
- titulo: Verificar que y=1 es secante a x²+y²=9
  enunciado: Centro (0,0), radio 3, recta y=1.
  solucion_pasos:
  - La distancia del centro a la recta es 1<3, por lo que la recta es secante.
- titulo: Verificar que una recta vertical es secante a una circunferencia
  enunciado: x²+y²=25, recta x=3.
  solucion_pasos:
  - La distancia del centro (0,0) a la recta x=3 es 3<5, por lo que la recta es secante.
- titulo: ¿Una recta secante corta la circunferencia en exactamente dos puntos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición geométrica de recta secante.
- titulo: ¿Es posible que una recta secante pase exactamente por el centro de la circunferencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, en ese caso la distancia del centro a la recta es 0, claramente menor que el radio.
errores_frecuentes:
- Confundir recta secante con recta tangente, sin verificar realmente la desigualdad de distancia.
- Calcular incorrectamente la distancia del centro a la recta.
- Asumir que toda recta que pasa 'cerca' de la circunferencia es automáticamente secante, sin verificación
  numérica.
fuente: Elaboración propia.
estado: publicado
