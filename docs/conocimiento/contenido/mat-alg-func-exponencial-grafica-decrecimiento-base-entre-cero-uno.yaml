semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.DECRECIMIENTO_BASE_ENTRE_CERO_UNO
titulo: Análisis del decrecimiento exponencial para bases entre cero y uno
objetivo: Analizar el comportamiento de decrecimiento (desintegración) que presenta una función exponencial cuando
  su base está entre cero y uno.
introduccion: Cuando la base es una fracción propia (menor que 1), cada incremento unitario en $x$ reduce el
  valor anterior, generando una curva que se acerca cada vez más a cero sin llegar a alcanzarlo.
resumen: Si $0<b<1$ (y $a>0$), la función exponencial $f(x)=a\cdot b^x$ es **estrictamente decreciente**, aproximándose
  cada vez más a cero a medida que $x$ aumenta.
explicacion: '### Definición formal


  Para $f(x)=a\cdot b^x$ con $a>0$ y $0<b<1$: si $x_1<x_2$, entonces $f(x_1)>f(x_2)$, es decir, la función es
  estrictamente decreciente en todo $\mathbb{R}$. La tasa de decrecimiento (el cociente entre valores consecutivos)
  es constante e igual a $b$.


  ### Desarrollo didáctico


  Este comportamiento es característico de fenómenos de desintegración o decaimiento: la cantidad se reduce
  siempre en la misma proporción, aunque el valor absoluto de esa reducción disminuya con el tiempo.


  Para $f(x)=(1/2)^x$: entre $x=0$ y $x=1$, la función pasa de $1$ a $0{,}5$ (reducción de $0{,}5$); entre $x=3$
  y $x=4$, pasa de $0{,}125$ a $0{,}0625$ (reducción de $0{,}0625$), un decrecimiento cada vez más pequeño en
  magnitud absoluta.'
procedimiento:
- 'Paso 1: Verifica que la base $b$ esté entre 0 y 1, y que $a$ sea positivo.'
- 'Paso 2: Concluye que la función es estrictamente decreciente en todo su dominio.'
- 'Paso 3: Observa que la función se acerca cada vez más a cero sin nunca alcanzarlo.'
ejemplos:
- titulo: Verificación de decrecimiento
  enunciado: '¿Cómo se comporta $f(x)=5\cdot0{,}3^x$ a medida que $x$ aumenta?'
  solucion_pasos:
  - '$b=0{,}3$, con $0<0{,}3<1$, y $a=5>0$.'
  - La función decrece, aproximándose cada vez más a cero.
- titulo: Comparación de tasas de decrecimiento
  enunciado: '¿Cuál de $f(x)=0{,}5^x$ y $g(x)=0{,}1^x$ decrece más rápido para $x$ grande?'
  solucion_pasos:
  - Ambas tienen base entre 0 y 1, por lo que ambas son decrecientes.
  - '$g(x)=0{,}1^x$ decrece más rápido, ya que su base ($0{,}1$) es menor que la de $f(x)$ ($0{,}5$).'
- titulo: ¿Una función exponencial decreciente puede tomar valores negativos si $a>0$?
  enunciado: ¿Una función exponencial decreciente puede tomar valores negativos si $a>0$?
  respuesta: 'No'
  solucion_pasos:
  - La función se acerca a cero pero siempre permanece positiva, sin llegar nunca a ser negativa.
- titulo: ¿El decrecimiento exponencial con $0<b<1$ implica que la función alcanza el valor cero?
  enunciado: ¿El decrecimiento exponencial con $0<b<1$ implica que la función alcanza el valor cero?
  respuesta: 'No'
  solucion_pasos:
  - La función se aproxima indefinidamente a cero, pero nunca lo alcanza exactamente.
errores_frecuentes:
- Confundir el decrecimiento exponencial con un decrecimiento lineal de reducción constante.
- Asumir incorrectamente que la función eventualmente alcanza o cruza el valor cero.
- No verificar el signo del coeficiente $a$ antes de concluir que la función es decreciente.
- Confundir la condición $0<b<1$ con $b<0$, que no corresponde a una base válida.
