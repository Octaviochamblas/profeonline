semantic_id: MAT.ALG.INECUACIONES_VALOR_ABSOLUTO.MENOR_IGUAL_POSITIVO
titulo: Resolución de inecuación de valor absoluto menor o igual que una constante positiva
objetivo: Resolver inecuaciones con valor absoluto de la forma $|x| < a$ y $|x| \le a$, con $a > 0$.
introduccion: El valor absoluto de un número representa su distancia al cero en la recta numérica. Cuando
  decimos que el valor absoluto de una cantidad es menor o igual que un número positivo, estamos limitando
  qué tan lejos puede estar esa cantidad respecto al cero.
resumen: 'Para resolver inecuaciones del tipo $|X| \le a$ (con $a > 0$), se aplica la propiedad que lo
  transforma en un sistema de dos inecuaciones simultáneas: $-a \le X \le a$.'
explicacion: '### Definición formal

  Sea $x \in \mathbb{R}$ y $a \in \mathbb{R}$ tal que $a > 0$.

  La inecuación con valor absoluto $|x| \le a$ es equivalente a la doble inecuación $-a \le x \le a$.

  De forma análoga, $|x| < a \iff -a < x < a$.

  El conjunto solución corresponde al intervalo $[-a, a]$ para la desigualdad débil, y $(-a, a)$ para
  la estricta.


  ### Desarrollo didáctico

  Imagina que estás en el centro de una ciudad (el cero) y te dicen que no puedes alejarte más de $5$
  kilómetros. Esto significa que puedes caminar hasta $5$ km a la derecha (positivo) o hasta $5$ km a
  la izquierda (negativo). En lenguaje matemático, si tu posición es $x$, entonces la distancia al centro
  es $|x|$, y la restricción es $|x| \le 5$.

  Por lo tanto, tu posición real $x$ debe estar entre $-5$ y $5$, es decir, $-5 \le x \le 5$.

  Si dentro del valor absoluto hay una expresión más compleja, como $|2x - 1| \le 3$, el principio es
  el mismo: lo que está adentro debe quedar atrapado entre $-3$ y $3$. Luego, se despeja la variable $x$
  de esa doble desigualdad, sumando o dividiendo simultáneamente en las tres partes.'
procedimiento:
- Verificar que la inecuación esté en la forma $|X| \le a$ o $|X| < a$, y que la constante $a$ sea un
  número real positivo.
- 'Aplicar la propiedad del valor absoluto para transformarla en una doble desigualdad: $-a \le X \le
  a$ (o $-a < X < a$).'
- Despejar la variable incógnita del término central, aplicando las operaciones inversas en todas las
  partes de la desigualdad al mismo tiempo.
- Expresar el conjunto solución en forma de intervalo y/o gráfico.
ejemplos:
- titulo: Inecuación básica con restricción estricta
  enunciado: Resuelve la inecuación $|x - 3| < 4$.
  solucion_pasos:
  - 'Aplicamos la propiedad para $a = 4$: $-4 < x - 3 < 4$.'
  - 'Sumamos $3$ a todas las partes para despejar $x$: $-4 + 3 < x < 4 + 3$.'
  - 'Simplificamos obteniendo: $-1 < x < 7$.'
  - El conjunto solución es el intervalo $(-1, 7)$.
- titulo: Inecuación con coeficiente acompañando a la variable
  enunciado: Encuentra el conjunto solución de $|2x + 1| \le 5$.
  solucion_pasos:
  - 'Utilizamos la propiedad: $-5 \le 2x + 1 \le 5$.'
  - 'Restamos $1$ en los tres miembros: $-6 \le 2x \le 4$.'
  - 'Dividimos por $2$ (positivo, por lo que se mantienen los sentidos de las desigualdades): $-3 \le
    x \le 2$.'
  - La solución es el intervalo $[-3, 2]$.
- titulo: ¿El número 0 pertenece al conjunto solución de $|3x - 2| \le 4$?
  respuesta: Verdadero
  solucion_pasos:
  - Al reemplazar $x = 0$ en la inecuación $|3x - 2| \le 4$, evaluamos la expresión.
  - 'Calculamos: $|3(0) - 2| = |-2| = 2$.'
  - Como $2 \le 4$ es una afirmación verdadera, el $0$ sí pertenece al conjunto solución.
- titulo: ¿La solución de $|x + 2| \le -1$ es un intervalo acotado?
  respuesta: Falso
  solucion_pasos:
  - Observamos que el valor absoluto de cualquier expresión siempre es mayor o igual a cero.
  - La inecuación plantea que un valor absoluto sea menor o igual a un número negativo ($-1$).
  - Esto es imposible en los números reales, por lo que el conjunto solución es vacío ($\emptyset$), no
    un intervalo acotado.
errores_frecuentes:
- Asumir que $|x - 2| \le 3$ implica solamente que $x - 2 \le 3$, olvidando la restricción inferior de
  $-3$.
- Escribir la solución de $|x| \le 4$ como $x \ge -4 \cup x \le 4$ en lugar de una intersección ($-4 \le
  x \le 4$).
- Creer que $|-x| \le 5$ significa que $x \le -5$ en vez de $-5 \le x \le 5$.
- Al resolver $-2 \le -x \le 2$, multiplicar por $-1$ y no invertir el sentido de las desigualdades.
- Aplicar la propiedad $-a \le X \le a$ cuando $a$ es negativo, obteniendo intervalos inconsistentes en
  lugar de determinar que la solución es vacía.
