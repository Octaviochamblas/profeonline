semantic_id: MAT.EST.PROBABILIDAD_TOTAL.ENUNCIADO_TEOREMA
titulo: Enunciado del teorema de la probabilidad total
objetivo: Enunciar formalmente el teorema de la probabilidad total, que permite calcular la probabilidad
  de un evento a partir de una partición del espacio muestral.
introduccion: Cuando un evento puede ocurrir a través de distintas 'vías' (representadas por una partición),
  existe una fórmula precisa que combina las probabilidades de cada vía y las probabilidades condicionales
  correspondientes.
resumen: El teorema de la probabilidad total establece que, si $B_1, B_2, \ldots, B_n$ forman una partición
  del espacio muestral, entonces $P(A)=\sum_{i=1}^{n}P(B_i)\times P(A|B_i)$.
explicacion: '![Enunciado del teorema de la probabilidad total](/static/img/probabilidad/ptotal/ptotal-enunciado-teorema.svg)


  ### Definición formal


  $P(A)=P(B_1)\times P(A|B_1)+P(B_2)\times P(A|B_2)+\cdots+P(B_n)\times P(A|B_n)$, sumando sobre todas
  las partes de la partición.


  ### Desarrollo didáctico


  Si una fábrica tiene dos máquinas (P(A)=0,6, P(B)=0,4) con tasas de defecto 0,05 y 0,1 respectivamente,
  la probabilidad total de que una pieza sea defectuosa es $P(\text{defectuosa})=0{,}6\times0{,}05+0{,}4\times0{,}1=0{,}03+0{,}04=0{,}07$.'
procedimiento:
- 'Paso 1: Identifica la partición del espacio muestral (B1, B2, ..., Bn) y sus probabilidades.'
- 'Paso 2: Identifica las probabilidades condicionales P(A|Bi) para cada parte de la partición.'
- 'Paso 3: Aplica la fórmula sumando el producto P(Bi)×P(A|Bi) para todas las partes de la partición.'
ejemplos:
- titulo: Aplicar el teorema con dos máquinas
  enunciado: P(A)=0,6, P(B)=0,4, P(defectuosa|A)=0,05, P(defectuosa|B)=0,1.
  solucion_pasos:
  - P(defectuosa)=0,6×0,05+0,4×0,1=0,03+0,04=0,07.
- titulo: Aplicar el teorema con tres urnas equiprobables
  enunciado: 3 urnas, cada una con probabilidad 1/3, con P(roja|urna1)=0,5, P(roja|urna2)=0,3, P(roja|urna3)=0,7.
  solucion_pasos:
  - P(roja)=(1/3)(0,5)+(1/3)(0,3)+(1/3)(0,7)=(0,5+0,3+0,7)/3=1,5/3=0,5.
- titulo: ¿Este teorema requiere una partición válida del espacio muestral?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición fundamental para que la fórmula sea válida.
- titulo: ¿Se pueden sumar más de dos términos en esta fórmula?
  respuesta: Sí
  solucion_pasos:
  - Sí, la fórmula se extiende a cualquier número de partes de la partición.
errores_frecuentes:
- Aplicar la fórmula sin verificar que los eventos Bi realmente formen una partición válida.
- Olvidar sumar todos los términos correspondientes a cada parte de la partición.
- Confundir P(Bi) con P(A|Bi) al sustituir los valores en la fórmula.
fuente: 'Elaboración propia (referencia: Moraleja 294).'
estado: publicado
