semantic_id: MAT.GEO.CIRCUNFERENCIA_ANALITICA.VALIDEZ_RADIO_REAL
titulo: Verificación de validez de una circunferencia mediante radio real positivo
objetivo: Verificar si una ecuación, tras completar cuadrados, representa efectivamente una circunferencia
  real, comprobando que el término derecho (r²) sea estrictamente positivo.
introduccion: 'No toda ecuación con la estructura de una circunferencia representa realmente una: si al
  completar cuadrados el resultado no es positivo, no existe ninguna figura real (o se reduce a un solo
  punto).'
resumen: Una ecuación $(x-h)^2+(y-k)^2=r^2$ representa una circunferencia real si y solo si $r^2>0$. Si
  $r^2=0$, representa un único punto; si $r^2<0$, no representa ninguna figura real.
explicacion: '![Validez de una circunferencia real](/static/img/geometria/analitica/circanal-validez-radio-real.svg)


  ### Definición formal


  Después de completar cuadrados, si el término derecho de la ecuación resulta ser positivo, existe una
  circunferencia real con ese centro y ese radio. Si es cero, la ecuación representa solo el punto (h,k).
  Si es negativo, no existe ninguna solución real.


  ### Desarrollo didáctico


  La ecuación $x^2+y^2-2x-2y+3=0$ se completa como $(x-1)^2+(y-1)^2=-1$, un resultado negativo: esta ecuación
  no representa ninguna circunferencia real, ya que no existen valores reales de x e y que la satisfagan.'
procedimiento:
- 'Paso 1: Completa los cuadrados en x e y para llevar la ecuación a su forma canónica.'
- 'Paso 2: Observa el valor obtenido en el término derecho de la igualdad.'
- 'Paso 3: Si es positivo, existe una circunferencia real; si es cero, es un único punto; si es negativo,
  no existe ninguna figura real.'
ejemplos:
- titulo: Verificar que una ecuación representa una circunferencia real
  enunciado: x²+y²-2x-2y-2=0.
  solucion_pasos:
  - (x-1)²+(y-1)²=4, positivo, por lo que representa una circunferencia real de radio 2.
- titulo: Verificar que una ecuación no representa una circunferencia real
  enunciado: x²+y²-2x-2y+3=0.
  solucion_pasos:
  - (x-1)²+(y-1)²=-1, negativo, por lo que esta ecuación no representa ninguna circunferencia real.
- titulo: ¿Una ecuación con término derecho igual a 0 representa una circunferencia?
  respuesta: 'No'
  solucion_pasos:
  - No, en ese caso representa un único punto (el centro), no una circunferencia propiamente dicha.
- titulo: ¿Es posible que una ecuación con la estructura general de circunferencia no represente ninguna
    figura real?
  respuesta: Sí
  solucion_pasos:
  - Sí, esto ocurre cuando, al completar cuadrados, se obtiene un valor negativo en el término derecho.
errores_frecuentes:
- Asumir que toda ecuación con la forma x²+y²+Dx+Ey+F=0 representa automáticamente una circunferencia
  real.
- No completar correctamente los cuadrados antes de evaluar el signo del término derecho.
- Confundir el caso de radio 0 (un punto) con el caso de no existencia (radio negativo, imposible).
fuente: Elaboración propia.
estado: publicado
