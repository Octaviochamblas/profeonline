semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.COMPLEMENTARIOS_SENO_COSENO
titulo: Relación entre seno y coseno de ángulos complementarios
objetivo: Establecer que el seno de un ángulo es igual al coseno de su ángulo complementario (y viceversa),
  para ángulos complementarios (que suman 90°).
introduccion: Dos ángulos son complementarios si su suma es 90°. En un triángulo rectángulo, el cateto
  opuesto a un ángulo agudo es el cateto adyacente al otro, lo que explica esta relación entre seno y
  coseno.
resumen: Si $x$ y $90°-x$ son ángulos complementarios, se cumple $\sin(90°-x)=\cos x$ y $\cos(90°-x)=\sin
  x$.
explicacion: '![Seno y coseno de ángulos complementarios](/static/img/geometria/trigonometria/trigid-complementarios-seno-coseno.svg)


  ### Definición formal


  Para cualquier ángulo $x$, se cumple $\sin(90°-x)=\cos x$ y $\cos(90°-x)=\sin x$, ya que $90°-x$ es
  el ángulo complementario de $x$.


  ### Desarrollo didáctico


  En la figura, θ=30° y su complementario 90°-θ=60°. Se cumple que sin30°=cos60°=0,5 y cos30°=sin60°=√3/2,
  verificando la relación de complementariedad.'
procedimiento:
- 'Paso 1: Verifica que los dos ángulos sumen 90° (sean complementarios).'
- 'Paso 2: Aplica sin(90°-x)=cosx, o de forma equivalente cos(90°-x)=sinx.'
- 'Paso 3: Usa esta relación para obtener el valor de una razón a partir de la otra, sin necesidad de
  calcularla directamente.'
ejemplos:
- titulo: Verificar la relación con 30° y 60°
  enunciado: θ=30°, complementario 60°.
  solucion_pasos:
  - sin30°=0,5=cos60°, y cos30°=√3/2=sin60°, confirmando la relación.
- titulo: Calcular cos(70°) usando el complementario
  enunciado: sin20°≈0,342.
  solucion_pasos:
  - cos70°=sin(90°-70°)=sin20°≈0,342.
- titulo: ¿La suma de dos ángulos complementarios es siempre 90°?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición de ángulos complementarios.
- titulo: ¿El coseno de un ángulo es igual al seno de su complementario?
  respuesta: Sí
  solucion_pasos:
  - Sí, cosx=sin(90°-x), consecuencia directa de esta identidad.
errores_frecuentes:
- Confundir ángulos complementarios (suman 90°) con suplementarios (suman 180°).
- Aplicar la relación con el seno en vez del coseno, o viceversa.
- Olvidar que esta relación es válida en ambos sentidos (de x a 90°-x y viceversa).
fuente: 'Elaboración propia (referencia: Moraleja 178).'
estado: publicado
