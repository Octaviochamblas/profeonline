semantic_id: MAT.NUM.PROPORCIONES.TERMINOS_MEDIOS
titulo: Identificación de términos medios
objetivo: Identificar los términos medios en una proporción.
introduccion: Así como hay números en las puntas, hay números que quedan 'al centro' cuando leemos una
  proporción de izquierda a derecha. Son los medios.
resumen: En la proporción $a:b = c:d$, los valores $b$ y $c$ se llaman medios porque ocupan las posiciones
  centrales.
explicacion: Al escribir $\frac{a}{b} = \frac{c}{d}$ en notación de cociente $a:b = c:d$, los **medios**
  son el segundo término de la primera razón ($b$) y el primer término de la segunda razón ($c$). Identificarlos
  correctamente evita errores al resolver incógnitas.
procedimiento:
- 'Paso 1: Escribe la proporción en formato lineal $a:b = c:d$.'
- 'Paso 2: Observa los dos números que quedan en el centro, junto al signo igual.'
- 'Paso 3: Esos dos números consecutivos son los medios.'
ejemplos:
- titulo: Identificando medios
  enunciado: En $2:5 = 6:15$, ¿cuáles son los medios?
  solucion_pasos:
  - El número antes del igual es 5.
  - El número después del igual es 6.
  - Los medios son 5 y 6.
- titulo: ¿Pueden los medios ser iguales?
  respuesta: Sí
  solucion_pasos:
  - Se conoce como proporción continua, por ejemplo en $2:4 = 4:8$.
errores_frecuentes:
- Confundirlos con los extremos.
- Pensar que en $a/b = c/d$ los medios son los denominadores.
- Tomar solo un número como 'el medio'.
- Multiplicar un medio por otro medio para hallar el valor de la razón.
- Creer que los medios siempre son números enteros.
fuente: Currículum Nacional MINEDUC.
estado: publicado
