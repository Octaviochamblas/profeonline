semantic_id: MAT.ALG.SUSTRACCION_POL.CAMBIO_PARCIAL_SIGNO
titulo: Detección de error por cambio parcial de signo en el sustraendo
objetivo: Reconocer y evitar el error de cambio parcial de signo en la sustracción de polinomios.
introduccion: Similar al error del signo negativo, pero en el contexto de la sustracción de polinomios
  completos. Aquí el error sucede cuando se cambia solo el signo de algunos términos del sustraendo, no
  de todos.
resumen: El **Cambio Parcial de Signo** es el error de invertir el signo de solo una parte de los términos
  del sustraendo al restar un polinomio. La regla de la sustracción exige invertir TODOS los signos del
  sustraendo, sin excepción.
explicacion: '### Definición formal


  Opuesto completo: $(-3m+n-4)$. Suma: $8m+2n-3m+n-4 = 5m+3n-4$. El alumno olvidó cambiar $-n$ a $+n$
  y $+4$ a $-4$.


  ### Desarrollo didáctico


  Calculemos $(7a + 3b - 2) - (4a - b + 5)$.


  Opuesto correcto del sustraendo $(4a - b + 5)$:

  $(-4a + b - 5)$.


  Suma correcta:

  $(7a + 3b - 2) + (-4a + b - 5) = 3a + 4b - 7$.


  Error de cambio parcial (solo cambia el primer término):

  $(7a + 3b - 2) + (-4a - b + 5) = 3a + 2b + 3$ ← MAL.


  Diferencia: El $-b$ del sustraendo debía convertirse en $+b$, pero al hacerlo parcialmente quedó como
  $-b$.'
procedimiento:
- 'Paso 1: Escribe el sustraendo completo.'
- 'Paso 2: Identifica cuántos términos tiene. Cuenta: 1, 2, 3.'
- 'Paso 3: Invierte el signo de CADA UNO de ellos, uno por uno.'
- 'Paso 4: Verifica la cantidad: el opuesto debe tener exactamente el mismo número de términos.'
ejemplos:
- titulo: El cambio incompleto
  enunciado: 'Detecta el error: (10x - 4y) - (3x - 2y) = 10x - 4y - 3x - 2y = 7x - 6y.'
  solucion_pasos:
  - El sustraendo es (3x - 2y).
  - Su opuesto es (-3x + 2y).
  - El cálculo erróneo convirtió -2y en -2y en lugar de +2y.
  - 'Resultado correcto: 10x - 4y - 3x + 2y = 7x - 2y.'
- titulo: Dos modelos de producción son $P_1 = 8k + 4l - 2$ y $P_2 = 3k - l + 7$. ¿Cuánto excede $P_1$
  enunciado: 'Dos modelos de producción son $P_1 = 8k + 4l - 2$ y $P_2 = 3k - l + 7$. ¿Cuánto excede $P_1$
    a $P_2$? (v1)


    Opciones: A) $5k + 5l - 9$ · B) $5k - 5l - 9$ · C) $5k + 5l + 5$ · D) $5k + 3l - 9$'
  solucion_pasos:
  - 'Exceso = $P_1 - P_2 = (8k+4l-2)-(3k-l+7)$. Opuesto: $(-3k+l-7)$. Suma: $8k+4l-2-3k+l-7=5k+5l-9$.'
  - 'Respuesta: $5k + 5l - 9$'
- titulo: 'Respecto de «Detección de error por cambio parcial de signo en el sustraendo»: ¿Describe ade'
  enunciado: 'Respecto de «Detección de error por cambio parcial de signo en el sustraendo»: ¿Describe
    adecuadamente el concepto esta frase? «El **Cambio Parcial de Signo** es el error de invertir el signo
    de solo una parte de los términos del sustraendo al restar un polinomio»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Cambio Parcial de Signo** es el error de invertir
    el signo de solo una parte de los términos del sustraendo al restar un polinomio.'
- titulo: 'Respecto de «Detección de error por cambio parcial de signo en el sustraendo»: ¿Se puede ace'
  enunciado: 'Respecto de «Detección de error por cambio parcial de signo en el sustraendo»: ¿Se puede
    aceptar esta afirmación? «Invertir los signos de los términos con coeficiente grande y ''olvidar''
    el último término»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Cambio Parcial de Signo** es el error de invertir
    el signo de solo una parte de los términos del sustraendo al restar un polinomio.'
errores_frecuentes:
- Invertir los signos de los términos con coeficiente grande y 'olvidar' el último término.
- Confundir el sustraendo con el minuendo al decidir cuál se invierte.
- $5m + n + 4$.
- $11m + 3n + 4$.
- $4p - 4q - 6$.
fuente: Álgebra de Baldor.
estado: publicado
