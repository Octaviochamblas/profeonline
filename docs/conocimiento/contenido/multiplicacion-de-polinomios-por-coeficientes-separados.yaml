semantic_id: MAT.ALG.MULT_POLINOMIOS.COEFICIENTES_SEPARADOS
titulo: Multiplicación de polinomios por coeficientes separados
objetivo: Resolver la multiplicación de polinomios por coeficientes separados y justificar el procedimiento
  algebraico.
introduccion: Separar temporalmente los coeficientes numéricos de las partes literales ayuda a ordenar
  productos extensos y a comprobar cada operación sin perder términos.
resumen: Los ceros guardan el espacio del grado correspondiente, igual que en el sistema decimal.
explicacion: '### Definición formal


  Sea $P(x)=a_nx^n+a_{n-1}x^{n-1}+\cdots+a_0$ y $Q(x)=b_mx^m+b_{m-1}x^{m-1}+\cdots+b_0$, completando con
  coeficiente $0$ los grados faltantes cuando sea necesario. El método de coeficientes separados asocia
  a estos polinomios las sucesiones ordenadas $(a_n,\ldots,a_0)$ y $(b_m,\ldots,b_0)$.

  El coeficiente del término de grado $k$ en el producto $P(x)Q(x)$ viene dado por

  $$c_k=\sum_{i+j=k} a_i b_j,$$

  de modo que el producto corresponde a la convolución de las sucesiones de coeficientes. Los ceros no
  alteran el polinomio: solo conservan la posición de los grados ausentes para que la correspondencia
  entre coeficientes y potencias quede bien determinada.


  ### Desarrollo didáctico


  No hay relación de ''10 unidades forman 1 de la siguiente'' entre $x$ y $x^2$. Son variables independientes
  numéricamente.


  Los coeficientes asignan potencias desde 3 hasta 0: $2x^3, -5x^2, 0x^1, 4x^0$. O sea $2x^3 - 5x^2 +
  4$.


  Grados 4, 3, 2, 1, 0. Coeficientes: $3 (para\ x^4)$, $0 (x^3)$, $-1 (x^2)$, $0 (x^1)$, $5 (x^0)$.'
procedimiento:
- 'Paso 1: Ordena ambos polinomios por grados y completa con coeficiente $0$ los términos faltantes.'
- 'Paso 2: Escribe solo las sucesiones de coeficientes respetando la posición de cada grado.'
- 'Paso 3: Forma los productos parciales entre coeficientes según los grados que se combinan.'
- 'Paso 4: Suma los aportes que correspondan al mismo grado del producto.'
- 'Paso 5: Reconstruye el polinomio final asociando cada coeficiente con su potencia correspondiente.'
ejemplos:
- titulo: Si en la multiplicación por coeficientes separados de un polinomio de grado $4$ por uno de g
  enunciado: 'Si en la multiplicación por coeficientes separados de un polinomio de grado $4$ por uno
    de grado $3$ se forma una matriz de sumas parciales, ¿cuántas filas de sumas parciales habrá antes
    de reducir?


    Opciones: A) $4$ filas. · B) $3$ filas. · C) $7$ filas. · D) $12$ filas.'
  solucion_pasos:
  - El factor inferior es de grado 3, o sea tiene 4 coeficientes. Por lo tanto, habrá 4 multiplicaciones
    y 4 filas para sumar.
  - 'Respuesta: $4$ filas.'
- titulo: Sabiendo que al multiplicar por coeficientes separados $(a, b, c)$ por $(1, 2)$ se obtiene $
  enunciado: 'Sabiendo que al multiplicar por coeficientes separados $(a, b, c)$ por $(1, 2)$ se obtiene
    $(3, 5, 2, -4)$, entonces el valor de $a+b+c$ es:


    Opciones: A) $2$ · B) $6$ · C) $3$ · D) $-2$'
  solucion_pasos:
  - Suma de coeficientes de producto = suma coefs P1 * suma coefs P2. $(3+5+2-4) = 6$. $P2 = 1+2 = 3$.
    $P1 * 3 = 6 \Rightarrow P1 = 2$. Así, $a+b+c = 2$. Pero wait. Vamos a revisar las alternativas. $a=3$,
    $2a+b=5 \Rightarrow b=-1$. $2b+c=2 \Rightarrow -2+c=2 \Rightarrow c=4$. $a+b+c = 3 - 1 + 4 = 6$. Oh!
    Sum of coefs formula! Let me fix the answer to 2.
  - 'Respuesta: $2$'
- titulo: 'Respecto de «Multiplicación de polinomios por coeficientes separados»: ¿Es correcta esta car'
  enunciado: 'Respecto de «Multiplicación de polinomios por coeficientes separados»: ¿Es correcta esta
    caracterización? «Los ceros guardan el espacio del grado correspondiente, igual que en el sistema
    decimal»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Los ceros guardan el espacio del grado correspondiente,
    igual que en el sistema decimal.'
- titulo: 'Respecto de «Multiplicación de polinomios por coeficientes separados»: ¿Es válida esta afirm'
  enunciado: 'Respecto de «Multiplicación de polinomios por coeficientes separados»: ¿Es válida esta afirmación?
    «Para «Para multiplicar por el método de coeficientes separados, ¿qué condición deben cumplir los
    polinomios respecto a los términos faltantes», la respuesta correcta es Se omiten y se escriben juntos
    los que quedan»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Los ceros guardan el espacio del grado correspondiente,
    igual que en el sistema decimal.'
errores_frecuentes:
- Para «Para multiplicar por el método de coeficientes separados, ¿qué condición deben cumplir los polinomios
  respecto a los términos faltantes», la respuesta correcta es Se omiten y se escriben juntos los que
  quedan.
- Para «Para multiplicar por el método de coeficientes separados, ¿qué condición deben cumplir los polinomios
  respecto a los términos faltantes», la respuesta correcta es Se rellenan con coeficiente 1.
- El método no se puede usar si faltan términos.
- Porque en álgebra las reservas se restan.
- Para «¿Por qué no se 'lleva reserva' al multiplicar coeficientes separados, a diferencia de la multiplicación
  aritmética tradicional», la respuesta correcta es Porque los coeficientes siempre son menores a 10.
