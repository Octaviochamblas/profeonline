semantic_id: MAT.NUM.POTENCIAS_PROPIEDADES.MULTIPLICACION_IGUAL_BASE
titulo: Multiplicación de potencias de igual base
objetivo: Simplificar productos de potencias con base común.
introduccion: Dos potencias con la misma base son dos grupos del mismo factor repetido. Al juntar los
  grupos, la cantidad total de factores se suma.
resumen: 'Al multiplicar potencias de igual base se suman los exponentes: \(a^m a^n=a^{m+n}\). La propiedad
  reúne en una sola potencia todos los factores iguales.'
explicacion: 'Al multiplicar potencias de igual base se suman los exponentes: \(a^m a^n=a^{m+n}\).


  Al analizar “\(2^3\cdot2^5=2^8=256\)” conviene observar la conexión siguiente: la propiedad reúne en
  una sola potencia todos los factores iguales'
procedimiento:
- 'Paso 1: Verifica que las bases sean exactamente iguales, incluidos signos y paréntesis.'
- 'Paso 2: Suma los exponentes y conserva la base sin multiplicarla por sí misma.'
- 'Paso 3: Comprueba expandiendo un caso pequeño o evaluando ambos miembros.'
ejemplos:
- titulo: Aplicación razonada — Multiplicación de potencias de igual base
  enunciado: \(2^3\cdot2^5=2^8=256\).
  solucion_pasos:
  - Verifica que las bases sean exactamente iguales, incluidos signos y paréntesis.
  - Suma los exponentes y conserva la base sin multiplicarla por sí misma.
  - Comprueba expandiendo un caso pequeño o evaluando ambos miembros.
- titulo: Revisión de una solución — Multiplicación de potencias de igual base
  enunciado: Una solución aplica “Suma los exponentes y conserva la base sin multiplicarla por sí misma.”,
    pero termina sin comprobar que la propiedad reúne en una sola potencia todos los factores iguales.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define multiplicación de potencias de igual base: al multiplicar potencias
    de igual base se suman los exponentes: \(a^m a^n=a^{m+n}\).'
  - Verifica que las bases sean exactamente iguales, incluidos signos y paréntesis.
  - 'Completa la revisión con este control: Comprueba expandiendo un caso pequeño o evaluando ambos miembros.'
- titulo: ¿Se cumple que la propiedad reúne en una sola potencia todos los factores iguales? — Multiplicación
    de potencias de igual base
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que al multiplicar potencias de igual base se suman los exponentes:
    \(a^m a^n=a^{m+n}\).'
  - El caso “\(2^3\cdot2^5=2^8=256\)” satisface esa condición.
  - Comprueba expandiendo un caso pequeño o evaluando ambos miembros.
- titulo: ¿Es válido omitir el paso “Verifica que las bases sean exactamente iguales, incluidos signos
    y paréntesis”? — Multiplicación de potencias de igual base
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de multiplicación de potencias de igual base.
  - 'Omitirlo puede volver inválida la acción siguiente: Suma los exponentes y conserva la base sin multiplicarla
    por sí misma.'
  - 'La solución debe terminar de este modo: Comprueba expandiendo un caso pequeño o evaluando ambos miembros.'
errores_frecuentes:
- 'Confundir multiplicación de potencias de igual base con otro concepto y omitir este inicio: Verifica
  que las bases sean exactamente iguales, incluidos signos y paréntesis.'
- Aplicar mecánicamente “Suma los exponentes y conserva la base sin multiplicarla por sí misma.” sin revisar
  las condiciones de la definición.
- Tomar “\(2^3\cdot2^5=2^8=256\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la propiedad reúne en una sola potencia todos los
  factores iguales”.
- 'Terminar el desarrollo sin realizar este control: Comprueba expandiendo un caso pequeño o evaluando
  ambos miembros.'
