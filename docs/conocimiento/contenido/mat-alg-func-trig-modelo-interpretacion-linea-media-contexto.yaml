semantic_id: MAT.ALG.FUNC_TRIG_MODELO.INTERPRETACION_LINEA_MEDIA_CONTEXTO
titulo: Interpretación de la línea media en un modelo de contexto
objetivo: Interpretar el parámetro $d$ de un modelo trigonométrico aplicado como el valor promedio del fenómeno.
introduccion: La línea media de un modelo aplicado representa el punto de equilibrio alrededor del cual oscila el
  fenómeno estudiado.
resumen: En un modelo $f(t)=a\sin(bt)+d$ aplicado a un contexto, la **línea media** $d$ representa el **valor
  promedio** del fenómeno, calculado como $(M+m)/2$.
explicacion: '### Definición formal


  Si un fenómeno alcanza un valor máximo $M$ y un valor mínimo $m$, la línea media del modelo correspondiente
  es $d=(M+m)/2$. Representa el nivel de equilibrio del fenómeno, ni máximo ni mínimo.


  ### Desarrollo didáctico


  Si la temperatura de una ciudad varía entre $10°$C y $30°$C, la línea media es $(10+30)/2=20°$C: la
  temperatura promedio del ciclo, alrededor de la cual oscila con amplitud $10°$C.'
procedimiento:
- 'Paso 1: Identifica el valor máximo $M$ y el valor mínimo $m$ del fenómeno.'
- 'Paso 2: Calcula la línea media como $d=(M+m)/2$.'
- 'Paso 3: Interpreta $d$ como el valor de equilibrio del fenómeno.'
ejemplos:
- titulo: Cálculo de la línea media a partir de datos
  enunciado: 'La altura de una marea varía entre $0{,}5$ m y $2{,}5$ m. Calcula la línea media del modelo.'
  solucion_pasos:
  - 'Se aplica la fórmula: $d=(0{,}5+2{,}5)/2=1{,}5$.'
  - La línea media es $1{,}5$ metros.
- titulo: Interpretación de la línea media en contexto
  enunciado: 'Si un modelo de temperatura tiene línea media $18°$C y amplitud $6°$C, ¿cuáles son la temperatura
    máxima y mínima?'
  solucion_pasos:
  - 'Se suma y resta la amplitud a la línea media: $18+6=24$ y $18-6=12$.'
  - La temperatura máxima es $24°$C y la mínima es $12°$C.
- titulo: ¿La línea media siempre coincide con uno de los valores observados del fenómeno?
  enunciado: ¿La línea media de un modelo siempre corresponde a un valor efectivamente alcanzado por el
    fenómeno en algún momento?
  respuesta: Sí
  solucion_pasos:
  - La línea media sí se alcanza, en los puntos donde la función cruza su valor promedio.
- titulo: ¿La línea media es siempre igual al promedio aritmético entre máximo y mínimo?
  enunciado: ¿La línea media de un modelo trigonométrico se calcula siempre como el promedio aritmético entre el
    valor máximo y el mínimo?
  respuesta: Sí
  solucion_pasos:
  - Es la fórmula estándar para funciones seno o coseno simétricas alrededor de su línea media.
errores_frecuentes:
- Confundir la línea media con la amplitud del modelo.
- No calcular correctamente el promedio entre máximo y mínimo.
- Suponer que la línea media siempre es $0$, sin verificar los datos del contexto.
- Confundir la línea media con el desplazamiento horizontal del modelo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
