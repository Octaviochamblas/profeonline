semantic_id: MAT.ALG.FRACCIONES_DIV.FACTORIZACION_PREVIA
titulo: Factorización previa en división de fracciones algebraicas
objetivo: Factorizar todos los polinomios en un problema de división antes o justo después de aplicar
  el recíproco.
introduccion: Al igual que en la multiplicación, la clave de la división es factorizar todo. El mejor
  momento para hacerlo es justo después de haber 'volteado' la segunda fracción.
resumen: En una división, primero aplica la regla de voltear (para volverlo multiplicación), y luego factoriza
  absolutamente todos los numeradores y denominadores.
explicacion: '### Definición formal


  La cancelación cruzada solo es válida en multiplicaciones. En divisiones, los factores están en posiciones
  invertidas matemáticamente.


  ### Desarrollo didáctico


  Al igual que en la multiplicación, lanzarse a multiplicar el resultado del ''producto recíproco'' sin
  factorizar es un suicidio algebraico.


  El orden estricto de ejecución para divisiones complejas es:

  1. Aplica la regla ''Mantener, Cambiar, Voltear'' para transformar la división en multiplicación.

  2. Inmediatamente después, **factoriza absolutamente todos** los numeradores y denominadores resultantes.

  3. Ahora que todo son puros factores (paréntesis) multiplicándose, busca paréntesis idénticos arriba
  y abajo para simplificarlos (tacharlos).


  Si te saltas el paso 2 y multiplicas primero, crearás polinomios masivos que te harán perder el tiempo
  en exámenes.'
procedimiento:
- 'Paso 1: Transforma la división en multiplicación invirtiendo la segunda fracción.'
- 'Paso 2: Factoriza el numerador de la primera fracción.'
- 'Paso 3: Factoriza el denominador de la primera fracción.'
- 'Paso 4: Factoriza los polinomios de la fracción ya invertida.'
- 'Paso 5: Procede a tachar factores comunes.'
ejemplos:
- titulo: 'Factoriza y prepara: $\frac{x^2-25}{3} \div \frac{x+5}{6}$'
  enunciado: 'Factoriza y prepara: $\frac{x^2-25}{3} \div \frac{x+5}{6}$.'
  solucion_pasos:
  - 'Invertir: $\frac{x^2-25}{3} \cdot \frac{6}{x+5}$.'
  - 'Factorizar: $\frac{(x-5)(x+5)}{3} \cdot \frac{2 \cdot 3}{x+5}$.'
  - Listo para cancelar.
- titulo: Invertida y factorizada, ¿cómo se ve $\frac{x^2+2x}{y} \div \frac{x+2}{y^2}$?
  solucion_pasos:
  - Factorizamos x(x+2) e invertimos la segunda.
- titulo: 'Respecto de «Factorización previa en división de fracciones algebraicas»: ¿Describe adecuada'
  enunciado: 'Respecto de «Factorización previa en división de fracciones algebraicas»: ¿Describe adecuadamente
    el concepto esta frase? «En una división, primero aplica la regla de voltear (para volverlo multiplicación),
    y luego factoriza absolutamente todos los numeradores y denominadores»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: En una división, primero aplica la regla de voltear
    (para volverlo multiplicación), y luego factoriza absolutamente todos los numeradores y denominadores.'
- titulo: 'Respecto de «Factorización previa en división de fracciones algebraicas»: ¿Se puede aceptar'
  enunciado: 'Respecto de «Factorización previa en división de fracciones algebraicas»: ¿Se puede aceptar
    esta afirmación? «Intentar cancelar cruzado ANTES de voltear la segunda fracción (gravísimo error)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En una división, primero aplica la regla de voltear
    (para volverlo multiplicación), y luego factoriza absolutamente todos los numeradores y denominadores.'
errores_frecuentes:
- Intentar cancelar cruzado ANTES de voltear la segunda fracción (gravísimo error).
- Olvidar factorizar un polinomio por la prisa de tachar.
- Para «¿Cuál es un error fatal al intentar simplificar una división de fracciones algebraicas», la respuesta
  correcta es Factorizar antes de invertir.
- Invertir la segunda fracción.
- Convertir la división en multiplicación.
