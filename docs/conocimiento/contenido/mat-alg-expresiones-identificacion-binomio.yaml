semantic_id: MAT.ALG.EXPRESIONES.IDENTIFICACION_BINOMIO
objetivo: Reconocer y clasificar polinomios de exactamente dos términos (Binomios).
introduccion: Si 'mono' es uno, 'bi' es dos. Bicicleta, binocular, bilingüe... y en
  álgebra, Binomio. Es el tren más corto posible que no viaja solo.
resumen: Un **Binomio** es un polinomio formado por la suma o diferencia de **exactamente
  dos términos** algebraicos que no son semejantes entre sí.
explicacion: 'Todo binomio tiene un único ''puente'' o separador principal (un signo
  $+$ o un signo $-$) libre en la mitad de la expresión, separando dos grandes bloques.

  - $a + b$ es un binomio.

  - $5x^3 - 8y^2$ es un binomio (el menos es el puente).

  - $\frac{x}{2} + 4$ es un binomio.


  *La trampa mortal:* ¿Es $3x + 5x$ un binomio? Visualmente tiene dos términos y un
  puente en medio. ¡Pero CUIDADO! Los términos son semejantes. Antes de clasificar,
  hay que sumar: $3x + 5x = 8x$. En realidad es un **monomio** disfrazado. Para que
  sea un binomio real, los dos términos deben ser de especies diferentes.'
procedimiento:
- 'Paso 1: Simplifica la expresión sumando todos los términos semejantes si los hay.'
- 'Paso 2: Cuenta cuántos términos distintos te quedan en la versión final irreductible.'
- 'Paso 3: Si te quedan exactamente dos, y están unidos por un +, o por un -, es un
  binomio.'
ejemplos:
- titulo: El puente
  enunciado: Clasifica la expresión 4a^2b + 5ab^2
  solucion_pasos:
  - Verificamos si son semejantes. El primero es especie a^2b, el segundo es ab^2.
    No se pueden sumar.
  - Contamos los términos separados por el '+'. Hay 1 y 2.
  - La clasificación es Binomio.
errores_frecuentes:
- Llamar binomio a expresiones reducibles como $x + x$.
- Creer que una división separa términos y decir que $\frac{a}{b}$ es un binomio (es
  un monomio).
fuente: Álgebra de Baldor.
estado: publicado
