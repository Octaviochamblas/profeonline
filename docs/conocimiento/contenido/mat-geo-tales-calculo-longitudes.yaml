semantic_id: MAT.GEO.TEOREMA_TALES.CALCULO_LONGITUDES
titulo: Cálculo de longitudes desconocidas usando el teorema de Tales
objetivo: Resolver problemas numéricos calculando longitudes desconocidas mediante el planteamiento de
  proporciones basadas en el teorema de Tales.
introduccion: Con el teorema de Tales ya comprendido, tanto en su forma general como en el caso particular
  de triángulos, es momento de aplicarlo sistemáticamente para resolver problemas de longitudes desconocidas.
resumen: Para calcular una longitud desconocida usando Tales, se identifica la proporción correcta entre
  segmentos correspondientes y se despeja la incógnita mediante una multiplicación cruzada.
explicacion: '![Cálculo de longitudes usando el teorema de Tales](/static/img/geometria/congruencia-semejanza/tales-calculo-longitudes.svg)


  ### Definición formal


  Dada una proporción $\frac{a}{b}=\frac{c}{x}$ (donde $x$ es la incógnita), se despeja mediante multiplicación
  cruzada: $x=\frac{b\times c}{a}$.


  ### Desarrollo didáctico


  En un triángulo con AD=5, DB=10, AE=8, se busca EC: $\frac{5}{10}=\frac{8}{EC}$, por lo que $EC=\frac{10\times8}{5}=16$.
  El procedimiento es siempre el mismo: identificar la proporción, sustituir los datos conocidos y despejar.'
procedimiento:
- 'Paso 1: Identifica la configuración de Tales (paralelas o triángulo) y la proporción que corresponde.'
- 'Paso 2: Sustituye los valores conocidos en la proporción, dejando la incógnita en un lugar.'
- 'Paso 3: Despeja la incógnita mediante multiplicación cruzada.'
ejemplos:
- titulo: Calcular una longitud desconocida
  enunciado: En un triángulo, AD=5, DB=10, AE=8, y DE es paralela a BC.
  solucion_pasos:
  - 5/10=8/EC → EC=10×8/5=16.
- titulo: Calcular con datos distintos
  enunciado: AD=6, DB=9, EC=12.
  solucion_pasos:
  - 6/9=AE/12 → AE=6×12/9=8.
- titulo: ¿El procedimiento cambia si los datos están en distinta posición de la proporción?
  respuesta: 'No'
  solucion_pasos:
  - No, el método de multiplicación cruzada funciona sin importar en qué posición esté la incógnita.
- titulo: ¿Es necesario dibujar la figura para resolver estos problemas?
  respuesta: 'No'
  solucion_pasos:
  - No es estrictamente necesario, aunque ayuda a visualizar la correspondencia correcta entre segmentos.
errores_frecuentes:
- Plantear la proporción con segmentos que no son realmente correspondientes.
- Errores aritméticos al despejar la incógnita mediante multiplicación cruzada.
- Confundir el segmento AB completo con el segmento parcial AD (o DB) al plantear la ecuación.
fuente: 'Fuente: Cid 106, 107.'
estado: publicado
