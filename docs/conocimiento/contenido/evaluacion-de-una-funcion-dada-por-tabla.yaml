semantic_id: MAT.ALG.FUNCION_EVALUACION.EVALUACION_DESDE_TABLA
titulo: Evaluación de una función dada por tabla
objetivo: Obtener la imagen o preimagen de un valor a partir de una tabla de valores de una función.
introduccion: No todas las funciones vienen con una fórmula a la vista. A veces solo tienes una tabla,
  y evaluar se convierte en buscar el número correcto en la fila correspondiente.
resumen: Evaluar una función dada por tabla consiste en localizar el valor de entrada en la fila (o columna)
  de $x$ y leer directamente el valor correspondiente de $y$ en la misma columna (o fila).
explicacion: '### Definición formal


  Si una función se representa mediante una tabla de pares $(x_i, y_i)$, evaluar $f(x_k)$ para un valor
  $x_k$ presente en la tabla consiste en localizar la fila donde aparece $x_k$ y leer el valor $y_k$ asociado,
  que corresponde a $f(x_k)$.


  ### Desarrollo didáctico


  A diferencia de una fórmula, una tabla solo entrega información para los valores explícitamente listados;
  no se puede evaluar directamente un $x$ que no aparezca en la tabla sin más información (como un patrón
  o una fórmula subyacente).


  Si la tabla muestra $x: 1, 2, 3$ con $y: 5, 8, 11$, entonces $f(2) = 8$, leyendo directamente la fila
  correspondiente a $x=2$.'
procedimiento:
- 'Paso 1: Localiza el valor de $x$ solicitado en la fila o columna de entradas.'
- 'Paso 2: Identifica la fila o columna correspondiente de salidas ($y$).'
- 'Paso 3: Lee el valor de $y$ asociado a ese $x$; ese valor es la imagen buscada.'
ejemplos:
- titulo: Lectura directa de tabla
  enunciado: 'Una tabla muestra: $x=0 \to y=3$; $x=1 \to y=5$; $x=2 \to y=7$. Determina $f(1)$.'
  solucion_pasos:
  - Se busca la fila donde x=1.
  - $f(1) = 5$.
- titulo: Tabla con valores negativos
  enunciado: 'Una tabla muestra: $x=-2 \to y=10$; $x=-1 \to y=6$; $x=0 \to y=2$. Determina $f(-1)$.'
  solucion_pasos:
  - Se busca la fila donde x=-1.
  - $f(-1) = 6$.
- titulo: ¿Se puede evaluar directamente $f(5)$ si la tabla solo llega hasta $x=3$?
  enunciado: ¿Se puede evaluar directamente $f(5)$ si la tabla solo llega hasta $x=3$?
  respuesta: 'No'
  solucion_pasos:
  - La tabla solo entrega información de los valores listados; sin fórmula o patrón adicional, no se puede
    evaluar fuera de ese rango.
- titulo: ¿Una tabla puede representar una función?
  enunciado: ¿Una tabla puede representar una función?
  respuesta: Sí
  solucion_pasos:
  - Siempre que cada valor de x en la tabla tenga asociado un único valor de y.
errores_frecuentes:
- Confundir la columna de entradas ($x$) con la de salidas ($y$) al leer la tabla.
- Intentar evaluar un valor de $x$ que no está listado sin verificar si existe un patrón explícito.
- Asumir que la tabla completa representa todo el dominio de la función.
- Leer la fila incorrecta por error de conteo en tablas extensas.
