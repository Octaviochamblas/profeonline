semantic_id: MAT.ALG.FUNC_CUADR_TRANSFORMACIONES.REFLEXION_EJE_X
titulo: Análisis de la reflexión de la gráfica respecto del eje X
objetivo: Analizar cómo el signo negativo del coeficiente $a$ produce una reflexión de la parábola respecto
  al eje $x$.
introduccion: 'Multiplicar toda la función por $-1$ produce el mismo efecto que si se colocara un espejo
  horizontal bajo la parábola: cada punto se refleja verticalmente.'
resumen: 'La función $g(x)=-f(x)$ es la **reflexión de $f(x)$ respecto al eje $x$**: cada punto $(x,y)$
  de la gráfica original se convierte en $(x,-y)$.'
explicacion: '### Definición formal


  Dada $f(x)=x^2$, la función $g(x)=-f(x)=-x^2$ es la reflexión de $f$ respecto al eje $x$. Para cada
  valor de $x$, si $f(x)=y$, entonces $g(x)=-y$, invirtiendo el signo de la imagen sin alterar el valor
  de $x$.


  ### Desarrollo didáctico


  Geométricamente, esta reflexión invierte la concavidad de la parábola: una parábola que abría hacia
  arriba ahora abre hacia abajo, y viceversa, manteniendo la misma abertura.


  La gráfica de $g(x)=-x^2$ es la reflexión de $f(x)=x^2$ respecto al eje $x$: donde $f$ tenía un mínimo
  en $(0,0)$, $g$ tiene un máximo en el mismo punto.'
procedimiento:
- 'Paso 1: Identifica si el coeficiente principal de la función tiene signo negativo respecto a una función
  base positiva.'
- 'Paso 2: Si es así, reconoce que la gráfica es la reflexión respecto al eje $x$ de la función base.'
- 'Paso 3: Determina cómo cambia la concavidad: de hacia arriba a hacia abajo, o viceversa.'
ejemplos:
- titulo: Reflexión de una parábola básica
  enunciado: Describe la relación entre $f(x)=x^2$ y $g(x)=-x^2$.
  solucion_pasos:
  - $g(x)=-f(x)$.
  - La gráfica de $g$ es la reflexión de la de $f$ respecto al eje $x$; $f$ abre hacia arriba y $g$ hacia
    abajo.
- titulo: Reflexión con función desplazada
  enunciado: Describe la relación entre $f(x)=(x-2)^2+3$ y $g(x)=-(x-2)^2-3$.
  solucion_pasos:
  - $g(x)=-f(x)$.
  - La gráfica de $g$ es la reflexión de la de $f$ respecto al eje $x$; el vértice pasa de máximo/mínimo
    a mínimo/máximo con la coordenada $y$ invertida en signo.
- titulo: ¿La reflexión respecto al eje $x$ cambia el vértice de la parábola?
  enunciado: ¿La reflexión respecto al eje $x$ cambia el vértice de la parábola?
  respuesta: Sí
  solucion_pasos:
  - La coordenada $x$ del vértice permanece igual, pero la coordenada $y$ cambia de signo.
- titulo: ¿La reflexión respecto al eje $x$ afecta el ancho o abertura de la parábola?
  enunciado: ¿La reflexión respecto al eje $x$ afecta el ancho o abertura de la parábola?
  respuesta: 'No'
  solucion_pasos:
  - Solo invierte la concavidad; el valor absoluto del coeficiente $a$ (que determina la abertura) permanece
    igual.
errores_frecuentes:
- Confundir la reflexión respecto al eje $x$ con una traslación vertical.
- Asumir que la reflexión cambia la coordenada $x$ del vértice, cuando en realidad solo cambia la coordenada
  $y$.
- No reconocer que la reflexión invierte la concavidad de la parábola.
- Confundir la reflexión respecto al eje $x$ con la reflexión respecto al eje $y$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
