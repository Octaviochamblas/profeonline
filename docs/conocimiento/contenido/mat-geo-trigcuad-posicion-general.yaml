semantic_id: MAT.GEO.TRIG_CUADRANTES.ANGULO_POSICION_GENERAL
titulo: Concepto de ángulo en posición general en el plano cartesiano
objetivo: Definir un ángulo en posición general (o estándar) como aquel cuyo vértice coincide con el origen
  y cuyo lado inicial coincide con el semieje positivo de las x.
introduccion: Para estudiar la trigonometría más allá de los triángulos rectángulos, los ángulos se representan
  en el plano cartesiano, con su vértice en el origen, lo que permite definir razones trigonométricas
  para cualquier ángulo, no solo agudos.
resumen: Un ángulo está en posición general (o estándar) si su vértice está en el origen del plano cartesiano
  y su lado inicial coincide con el semieje positivo de las x, mientras que su lado terminal es el resultado
  de rotar el lado inicial en torno al origen.
explicacion: '![Ángulo en posición general](/static/img/geometria/trigonometria/trigcuad-posicion-general.svg)


  ### Definición formal


  Un ángulo $\theta$ está en posición general si su vértice es el origen $O=(0,0)$ y su lado inicial es
  el semieje positivo de las x. El lado terminal se obtiene rotando el lado inicial en torno a $O$ en
  sentido antihorario (para ángulos positivos) un ángulo de medida $\theta$.


  ### Desarrollo didáctico


  En la figura, el lado inicial es el segmento sobre el eje x positivo, y el lado terminal es el rayo
  que pasa por el punto $P$, formando un ángulo $\theta=50°$ medido en sentido antihorario. Este punto
  de vista permite definir seno, coseno y tangente para cualquier ángulo, usando las coordenadas de un
  punto sobre el lado terminal.'
procedimiento:
- 'Paso 1: Ubica el vértice del ángulo en el origen del plano cartesiano.'
- 'Paso 2: Identifica el lado inicial como el semieje positivo de las x.'
- 'Paso 3: El lado terminal es el rayo que se obtiene al rotar el lado inicial la medida del ángulo, en
  sentido antihorario si el ángulo es positivo.'
ejemplos:
- titulo: Ubicar un ángulo de 50° en posición general
  enunciado: Se quiere representar un ángulo de 50° en posición general.
  solucion_pasos:
  - El vértice se ubica en el origen, el lado inicial en el semieje positivo de las x, y el lado terminal
    se obtiene rotando 50° en sentido antihorario.
- titulo: Reconocer que un ángulo no está en posición general
  enunciado: Un ángulo tiene su vértice en el punto (2,3) y no en el origen.
  solucion_pasos:
  - Ese ángulo no está en posición general, ya que por definición el vértice debe coincidir con el origen
    del plano cartesiano.
- titulo: ¿El lado inicial de un ángulo en posición general siempre es el semieje positivo de las x?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, es parte de la definición: el lado inicial coincide siempre con el semieje positivo de las x.'
- titulo: ¿Puede un ángulo en posición general tener su lado terminal sobre el eje y?
  respuesta: Sí
  solucion_pasos:
  - Sí, por ejemplo un ángulo de 90° tiene su lado terminal exactamente sobre el semieje positivo de las
    y.
errores_frecuentes:
- Ubicar el vértice del ángulo en un punto distinto del origen.
- Confundir el lado inicial con el lado terminal.
- Suponer que el lado inicial puede ser cualquier semieje, en vez de siempre el semieje positivo de las
  x.
fuente: Elaboración propia.
estado: publicado
