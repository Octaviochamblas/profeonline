semantic_id: MAT.GEO.CARTESIANO_BASE.CUADRANTES
titulo: Identificación de los cuatro cuadrantes del plano cartesiano
objetivo: Identificar los cuatro cuadrantes en los que los ejes de coordenadas dividen al plano cartesiano,
  numerados en sentido antihorario desde el superior derecho.
introduccion: Los dos ejes del plano cartesiano lo dividen en 4 regiones, llamadas cuadrantes, numeradas
  de la I a la IV siguiendo el sentido contrario a las manecillas del reloj.
resumen: 'Los cuatro cuadrantes son las cuatro regiones en que los ejes de coordenadas dividen al plano
  cartesiano: el cuadrante I (superior derecho), II (superior izquierdo), III (inferior izquierdo) y IV
  (inferior derecho).'
explicacion: '![Cuadrantes del plano cartesiano](/static/img/geometria/cartesiano-vectores/cartesiano-cuadrantes.svg)


  ### Definición formal


  El eje de las abscisas y el eje de las ordenadas dividen al plano cartesiano en cuatro regiones llamadas
  cuadrantes, numeradas con números romanos en sentido antihorario: I (superior derecho), II (superior
  izquierdo), III (inferior izquierdo) y IV (inferior derecho).


  ### Desarrollo didáctico


  En la figura, cada cuadrante está identificado con su número romano correspondiente. Esta numeración
  es una convención universal en matemáticas, siempre en sentido antihorario comenzando por el cuadrante
  superior derecho.'
procedimiento:
- 'Paso 1: Ubica los dos ejes de coordenadas dividiendo el plano en cuatro regiones.'
- 'Paso 2: Identifica el cuadrante I como la región superior derecha.'
- 'Paso 3: Numera los cuadrantes restantes en sentido antihorario: II (superior izquierdo), III (inferior
  izquierdo) y IV (inferior derecho).'
ejemplos:
- titulo: Identificar el cuadrante I
  enunciado: Se pide identificar la región superior derecha del plano cartesiano.
  solucion_pasos:
  - Esa región es el cuadrante I, según la convención de numeración.
- titulo: Determinar el orden de numeración de los cuadrantes
  enunciado: Se numeran los cuatro cuadrantes del plano.
  solucion_pasos:
  - 'Se numeran en sentido antihorario: I (superior derecho), II (superior izquierdo), III (inferior izquierdo),
    IV (inferior derecho).'
- titulo: ¿El cuadrante I está en la parte superior derecha?
  respuesta: Sí
  solucion_pasos:
  - Sí, por convención, el cuadrante I siempre corresponde a esa región.
- titulo: ¿Los cuadrantes se numeran en sentido horario?
  respuesta: 'No'
  solucion_pasos:
  - No, se numeran en sentido antihorario (contrario a las manecillas del reloj).
errores_frecuentes:
- Numerar los cuadrantes en sentido horario en vez de antihorario.
- Confundir cuál cuadrante corresponde a cada combinación de signos de coordenadas.
- Creer que el cuadrante I está en la parte inferior en vez de la superior derecha.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Baldor 292).'
estado: publicado
