semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.TRASLACION_COMPUESTA
titulo: Traslación compuesta horizontal y vertical
objetivo: Analizar el efecto combinado de $f(x)=a(x-h)^n+k$ como doble desplazamiento de la gráfica básica.
introduccion: Cuando una función combina ambos tipos de traslación, el nuevo punto de referencia se mueve
  simultáneamente en dos direcciones.
resumen: La función $f(x)=a(x-h)^n+k$ corresponde a la gráfica de $g(x)=a\cdot x^n$ desplazada $h$ unidades
  horizontalmente y $k$ unidades verticalmente, con nuevo punto de referencia en $(h,k)$.
explicacion: '### Definición formal


  Combinando ambas traslaciones, $f(x)=a(x-h)^n+k$ traslada cada punto $(x_0,y_0)$ de $g(x)=a\cdot x^n$ al punto
  $(x_0+h,y_0+k)$. El punto de referencia de la curva, antes en $(0,0)$, pasa a ubicarse en $(h,k)$.


  ### Desarrollo didáctico


  $f(x)=(x-2)^2+5$: se traslada $2$ unidades a la derecha y $5$ hacia arriba. Su vértice, antes en $(0,0)$, ahora
  está en $(2,5)$, lo que se confirma evaluando $f(2)=5$.'
procedimiento:
- 'Paso 1: Identifica los valores de $h$ (dentro del paréntesis) y $k$ (sumado fuera).'
- 'Paso 2: Determina el nuevo punto de referencia como $(h,k)$.'
- 'Paso 3: Traza la gráfica básica y desplázala simultáneamente en ambas direcciones.'
ejemplos:
- titulo: Identificación de ambos desplazamientos
  enunciado: '¿Cuál es el nuevo punto de referencia de $f(x)=(x-3)^2-4$?'
  solucion_pasos:
  - Se identifica $h=3$ y $k=-4$.
  - 'El nuevo punto de referencia es $(3,-4)$.'
- titulo: Verificación numérica del punto trasladado
  enunciado: 'Verifica que $(2,5)$ es el vértice de $f(x)=(x-2)^2+5$.'
  solucion_pasos:
  - 'Se evalúa $f(2)=(2-2)^2+5=0+5=5$.'
  - Se confirma que el punto $(2,5)$ pertenece a la gráfica y corresponde al vértice.
- titulo: ¿El orden en que se aplican ambas traslaciones afecta el resultado final?
  enunciado: ¿Cambia el resultado final si se traslada primero horizontalmente y luego verticalmente, o al revés?
  respuesta: 'No'
  solucion_pasos:
  - Ambas traslaciones son independientes entre sí y el resultado final es el mismo sin importar el orden.
- titulo: ¿Una traslación compuesta cambia la forma de la curva?
  enunciado: ¿La traslación compuesta cambia la forma general de la curva (copa, s, etc.)?
  respuesta: 'No'
  solucion_pasos:
  - Solo cambia la posición del punto de referencia; la forma de la curva permanece igual.
errores_frecuentes:
- Confundir el signo de $h$ en la traslación horizontal, invirtiendo la dirección.
- Aplicar el signo de $k$ de forma invertida, cuando en la vertical coincide con la dirección real.
- Ubicar el punto de referencia como $(k,h)$ en vez de $(h,k)$.
- No verificar el resultado evaluando $f(h)=k$ para confirmar el punto trasladado.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
