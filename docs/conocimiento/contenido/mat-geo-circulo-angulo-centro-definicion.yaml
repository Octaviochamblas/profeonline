semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_CENTRO_DEFINICION
titulo: Definición de ángulo del centro en una circunferencia
objetivo: 'Identificar y definir el ángulo del centro: aquel cuyo vértice coincide con el centro de la
  circunferencia y cuyos lados son dos radios.'
introduccion: Al unir el centro de una circunferencia con dos puntos de ella mediante radios, se forma
  un ángulo especial llamado ángulo del centro.
resumen: Un ángulo del centro es aquel cuyo vértice es el centro de la circunferencia y cuyos lados son
  dos radios que llegan a puntos de la circunferencia.
explicacion: '![Ángulo del centro en la circunferencia](/static/img/geometria/circunferencia-circulo/circulo-angulo-centro-definicion.svg)


  ### Definición formal


  Un ángulo del centro (o ángulo central) es un ángulo cuyo vértice coincide con el centro $O$ de una
  circunferencia y cuyos lados son dos radios $OA$ y $OB$. El arco $AB$ comprendido entre los extremos
  de los radios se llama arco correspondiente al ángulo del centro.


  ### Desarrollo didáctico


  En la figura, $O$ es el centro de la circunferencia y $A$, $B$ son puntos sobre ella. El ángulo $\angle
  AOB$, formado por los radios $OA$ y $OB$, es un ángulo del centro. A cada ángulo del centro le corresponde
  un único arco (el arco $AB$ que ''ve'' el ángulo).'
procedimiento:
- 'Paso 1: Ubica el centro O de la circunferencia y verifica que sea el vértice del ángulo.'
- 'Paso 2: Identifica los dos radios que forman los lados del ángulo (OA y OB).'
- 'Paso 3: Reconoce el arco AB correspondiente, comprendido entre los extremos de ambos radios.'
ejemplos:
- titulo: Identificar un ángulo del centro
  enunciado: En una circunferencia de centro O, se trazan los radios OA y OB.
  solucion_pasos:
  - El ángulo ∠AOB, con vértice en O y lados los radios OA y OB, es un ángulo del centro.
- titulo: Reconocer el arco correspondiente
  enunciado: El ángulo del centro ∠AOB mide 80°.
  solucion_pasos:
  - El arco AB comprendido entre los radios es el arco correspondiente a ese ángulo del centro.
- titulo: ¿El vértice de un ángulo del centro es siempre el centro de la circunferencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición, el vértice de un ángulo del centro coincide siempre con el centro de la circunferencia.
- titulo: ¿Los lados de un ángulo del centro pueden ser cuerdas cualesquiera?
  respuesta: 'No'
  solucion_pasos:
  - No, los lados de un ángulo del centro deben ser específicamente radios, no cuerdas cualesquiera.
errores_frecuentes:
- Confundir el ángulo del centro con un ángulo inscrito (cuyo vértice está sobre la circunferencia, no
  en el centro).
- Creer que los lados pueden ser cualquier segmento, sin ser necesariamente radios.
- No identificar correctamente el arco correspondiente al ángulo del centro.
fuente: 'Elaboración propia (referencias: Moraleja 74, Cid 94).'
estado: publicado
