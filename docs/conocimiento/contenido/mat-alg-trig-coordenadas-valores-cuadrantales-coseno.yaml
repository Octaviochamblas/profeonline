semantic_id: MAT.ALG.TRIG_COORDENADAS.VALORES_CUADRANTALES_COSENO
titulo: Valores del coseno en los ángulos cuadrantales
objetivo: Memorizar y justificar los valores de $\cos(\theta)$ en los ángulos cuadrantales $0°$, $90°$, $180°$ y
  $270°$.
introduccion: Los ángulos cuadrantales tienen puntos asociados muy simples, lo que permite obtener sus valores de
  coseno sin cálculos complejos.
resumen: 'Los valores del coseno en los ángulos cuadrantales son: $\cos(0°)=1$, $\cos(90°)=0$, $\cos(180°)=-1$,
  $\cos(270°)=0$.'
explicacion: '### Definición formal


  Como $\cos(\theta)$ es la coordenada $x$ del punto asociado, y los puntos cuadrantales son $(1,0)$, $(0,1)$,
  $(-1,0)$ y $(0,-1)$ para $0°$, $90°$, $180°$ y $270°$ respectivamente, se obtienen directamente los valores
  $1$, $0$, $-1$ y $0$.


  ### Desarrollo didáctico


  Para recordar estos valores, basta con visualizar el punto correspondiente en el círculo unitario y leer su
  coordenada $x$: en $90°$ y $270°$, el punto está sobre el eje $y$, así que su coordenada $x$ es siempre $0$.'
procedimiento:
- 'Paso 1: Identifica el punto cuadrantal asociado al ángulo dado.'
- 'Paso 2: Lee la coordenada $x$ de ese punto.'
- 'Paso 3: Esa coordenada es el valor del coseno buscado.'
ejemplos:
- titulo: Cálculo directo de $\cos(0°)$
  enunciado: 'Determina $\cos(0°)$.'
  solucion_pasos:
  - El punto asociado es $(1,0)$.
  - 'Se obtiene $\cos(0°)=1$.'
- titulo: Cálculo directo de $\cos(90°)$
  enunciado: 'Determina $\cos(90°)$.'
  solucion_pasos:
  - El punto asociado es $(0,1)$.
  - 'Se obtiene $\cos(90°)=0$.'
- titulo: ¿$\cos(180°)=\cos(0°)$?
  enunciado: ¿$\cos(180°)$ tiene el mismo valor que $\cos(0°)$?
  respuesta: 'No'
  solucion_pasos:
  - '$\cos(180°)=-1$ y $\cos(0°)=1$, valores opuestos, no iguales.'
- titulo: ¿El coseno vale $0$ en ambos ángulos $90°$ y $270°$?
  enunciado: ¿El coseno vale exactamente $0$ tanto en $90°$ como en $270°$?
  respuesta: Sí
  solucion_pasos:
  - Ambos puntos cuadrantales tienen coordenada $x$ igual a $0$.
errores_frecuentes:
- Confundir los valores del coseno con los del seno en los ángulos cuadrantales.
- Invertir el signo al recordar $\cos(180°)$, olvidando que es $-1$ y no $1$.
- Suponer que el coseno nunca puede valer $0$.
- No relacionar el valor con la coordenada $x$ del punto correspondiente.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
