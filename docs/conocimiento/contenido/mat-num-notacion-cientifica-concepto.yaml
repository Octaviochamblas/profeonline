semantic_id: MAT.NUM.NOTACION_CIENTIFICA.CONCEPTO
objetivo: Reconocer una escritura científica normalizada.
introduccion: Las distancias astronómicas y los tamaños microscópicos son difíciles
  de leer con largas filas de ceros. La notación científica separa precisión y orden
  de magnitud.
resumen: La notación científica escribe un número como \(a\times10^n\), con \(1\le
  |a|<10\). El coeficiente contiene las cifras significativas y la potencia de diez
  fija la escala.
explicacion: |-
  La notación científica escribe un número como \(a\times10^n\), con \(1\le |a|<10\).

  En el caso “\(6300000=6.3\times10^6\)” esta idea se hace visible: el coeficiente contiene las cifras significativas y la potencia de diez fija la escala
procedimiento:
- 'Paso 1: Localiza la primera cifra no nula y coloca la coma después de ella.'
- 'Paso 2: Cuenta los lugares desplazados y asigna el signo del exponente.'
- 'Paso 3: Comprueba que el coeficiente tenga valor absoluto entre \(1\) y \(10\).'
ejemplos:
- titulo: Aplicación razonada — Concepto de notación científica
  enunciado: \(6300000=6.3\times10^6\).
  solucion_pasos:
  - Localiza la primera cifra no nula y coloca la coma después de ella.
  - Cuenta los lugares desplazados y asigna el signo del exponente.
  - Comprueba que el coeficiente tenga valor absoluto entre \(1\) y \(10\).
- titulo: Revisión de una solución — Concepto de notación científica
  enunciado: Una solución aplica “Cuenta los lugares desplazados y asigna el signo
    del exponente.”, pero termina sin comprobar que el coeficiente contiene las cifras
    significativas y la potencia de diez fija la escala. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define concepto de notación científica: la notación
    científica escribe un número como \(a\times10^n\), con \(1\le |a|<10\).'
  - Localiza la primera cifra no nula y coloca la coma después de ella.
  - 'Completa la revisión con este control: Comprueba que el coeficiente tenga valor
    absoluto entre \(1\) y \(10\).'
- titulo: ¿Se cumple que el coeficiente contiene las cifras significativas y la potencia
    de diez fija la escala? — Concepto de notación científica
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la notación científica escribe un número
    como \(a\times10^n\), con \(1\le |a|<10\).
  - El caso “\(6300000=6.3\times10^6\)” satisface esa condición.
  - Comprueba que el coeficiente tenga valor absoluto entre \(1\) y \(10\).
- titulo: ¿Es válido omitir el paso “Localiza la primera cifra no nula y coloca la
    coma después de ella”? — Concepto de notación científica
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de concepto de notación científica.
  - 'Omitirlo puede volver inválida la acción siguiente: Cuenta los lugares desplazados
    y asigna el signo del exponente.'
  - 'La solución debe terminar de este modo: Comprueba que el coeficiente tenga valor
    absoluto entre \(1\) y \(10\).'
errores_frecuentes:
- 'Confundir concepto de notación científica con otro concepto y omitir este inicio:
  Localiza la primera cifra no nula y coloca la coma después de ella.'
- Aplicar mecánicamente “Cuenta los lugares desplazados y asigna el signo del exponente.”
  sin revisar las condiciones de la definición.
- Tomar “\(6300000=6.3\times10^6\)” como una igualdad aislada, sin explicar por qué
  es válida.
- Aceptar una respuesta que contradice la idea clave “el coeficiente contiene las
  cifras significativas y la potencia de diez fija la escala”.
- 'Terminar el desarrollo sin realizar este control: Comprueba que el coeficiente
  tenga valor absoluto entre \(1\) y \(10\).'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
