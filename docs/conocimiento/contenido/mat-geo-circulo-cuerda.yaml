semantic_id: MAT.GEO.CIRCULO_ELEMENTOS.CUERDA
titulo: Identificación de la cuerda como segmento cuyos extremos pertenecen a la circunferencia
objetivo: Identificar la cuerda de una circunferencia como el segmento que une dos puntos cualesquiera
  de la circunferencia, sin pasar necesariamente por el centro.
introduccion: Además del radio (que conecta el centro con un punto de la curva), existe otro segmento
  importante que conecta directamente dos puntos de la circunferencia entre sí.
resumen: Una cuerda es un segmento cuyos dos extremos son puntos de la circunferencia, sin que necesariamente
  pase por el centro.
explicacion: '![Cuerda: segmento entre dos puntos de la circunferencia](/static/img/geometria/circunferencia-circulo/circulo-cuerda.svg)


  ### Definición formal


  Una cuerda es el segmento $\overline{AB}$, donde $A$ y $B$ son dos puntos distintos de la circunferencia.
  A diferencia del radio, ninguno de sus extremos es necesariamente el centro.


  ### Desarrollo didáctico


  Existen infinitas cuerdas posibles en una circunferencia, de distintas longitudes según qué tan separados
  estén sus dos puntos extremos; la cuerda más larga posible es aquella que sí pasa por el centro, llamada
  diámetro (un caso particular de cuerda).'
procedimiento:
- 'Paso 1: Elige dos puntos distintos sobre la circunferencia.'
- 'Paso 2: Traza el segmento que los une.'
- 'Paso 3: Ese segmento es una cuerda de la circunferencia.'
ejemplos:
- titulo: Identificar una cuerda
  enunciado: Se traza un segmento entre dos puntos A y B de una circunferencia, sin pasar por el centro.
  solucion_pasos:
  - El segmento AB es una cuerda de la circunferencia.
- titulo: Reconocer el caso particular del diámetro
  enunciado: Una cuerda pasa exactamente por el centro de la circunferencia.
  solucion_pasos:
  - Esa cuerda es un diámetro, el caso particular de cuerda máxima.
- titulo: ¿Todas las cuerdas de una circunferencia tienen la misma longitud?
  respuesta: 'No'
  solucion_pasos:
  - No, las cuerdas pueden tener longitudes muy distintas, dependiendo de la posición de sus extremos.
- titulo: ¿Un radio es un caso particular de cuerda?
  respuesta: 'No'
  solucion_pasos:
  - No, porque el radio tiene un extremo en el centro (que no es un punto de la circunferencia), mientras
    que ambos extremos de una cuerda deben estar sobre la circunferencia.
errores_frecuentes:
- Confundir una cuerda con un radio, olvidando que ambos extremos de la cuerda deben estar en la circunferencia.
- Creer que todas las cuerdas de una circunferencia tienen la misma longitud.
- No reconocer que el diámetro es un caso particular (el más largo) de cuerda.
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
