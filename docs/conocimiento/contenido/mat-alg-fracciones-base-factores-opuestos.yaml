semantic_id: MAT.ALG.FRACCIONES_BASE.FACTORES_OPUESTOS
titulo: Simplificación de Binomios Opuestos (x-y) / (y-x)
objetivo: Reconocer y simplificar la estructura clásica de la división de polinomios opuestos que resulta en -1.
introduccion: ¿Qué pasa si intentas simplificar dos expresiones que son idénticas, pero donde alguien las escribió
  exactamente al revés? En las restas algebraicas esto sucede todo el tiempo.
resumen: Cualquier binomio dividido por su exacto opuesto invertido matemáticamente, de la forma $\frac{a-b}{b-a}$,
  siempre da como resultado $-1$ (siempre que $a \neq b$).
explicacion: '### Definición formal


  (x-y) = -(-x+y) = -(y-x). Al dividir por (y-x), queda el -1.


  ### Desarrollo didáctico


  En tu camino algebraico te encontrarás con una confusión visual muy común: los factores opuestos. Tienes un paréntesis
  arriba como $(a - b)$ y abajo tienes $(b - a)$.


  Se ven casi idénticos, pero están al revés debido a la resta. No puedes tacharlos directamente. $(5 - 3)$ no es
  lo mismo que $(3 - 5)$.


  Sin embargo, puedes aplicar un truco maestro de factorización:

  **Extracción del factor negativo (-1).**


  Si sacas un signo negativo fuera de un paréntesis, los signos internos se invierten.

  - Tienes $(b - a)$.

  - Sacas un $-1$: $-( -b + a )$.

  - Lo reordenas para que se vea bonito: $-(a - b)$.


  relación algebraica. Ahora tienes el mismo paréntesis que arriba, pero con un signo menos adelante. Si tenías
  $\frac{a - b}{b - a}$, esto se convierte en $\frac{a - b}{-(a - b)}$. Ahora puedes tachar los paréntesis idénticos.
  El resultado no es 1, es **$-1$**.'
procedimiento:
- 'Paso 1: Revisa si el polinomio de arriba tiene EXACTAMENTE los mismos términos que el de abajo, pero con todos
  los signos invertidos.'
- 'Paso 2: Esta situación es muy común en restas invertidas como $(a-b)$ y $(b-a)$.'
- 'Paso 3: Cancela todo el bloque de arriba con todo el de abajo y reemplázalos por un $-1$.'
- (x-y) = -(-x+y) = -(y-x). Al dividir por (y-x), queda el -1.
ejemplos:
- titulo: Simplifica $\frac{3m - 2n}{2n - 3m}$
  enunciado: Simplifica $\frac{3m - 2n}{2n - 3m}$.
  solucion_pasos:
  - La 'm' arriba es $+3$, abajo es $-3$.
  - La 'n' arriba es $-2$, abajo es $+2$.
  - Son opuestos perfectos.
  - Cancelamos y el resultado es $-1$.
- titulo: Simplifica $\frac{x+y}{y+x}$.
  solucion_pasos:
  - ¡Cuidado! Son sumas, y la suma es conmutativa. $x+y$ es exactamente igual a $y+x$, no son opuestos. El resultado
    es 1.
- titulo: 'Respecto de «Simplificación de factores opuestos mediante factor negativo»: ¿Se ajusta a la'
  enunciado: 'Respecto de «Simplificación de factores opuestos mediante factor negativo»: ¿Se ajusta a la definición
    esta afirmación? «Cualquier binomio dividido por su exacto opuesto invertido matemáticamente, de la forma $\frac{a-b}{b-a}$,
    siempre da como resultado $-1$ (siempre que $a \neq b$)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Cualquier binomio dividido por su exacto opuesto invertido
    matemáticamente, de la forma $\frac{a-b}{b-a}$, siempre da como resultado $-1$ (siempre que $a \neq b$).'
- titulo: 'Respecto de «Simplificación de factores opuestos mediante factor negativo»: ¿Es compatible c'
  enunciado: 'Respecto de «Simplificación de factores opuestos mediante factor negativo»: ¿Es compatible con el
    procedimiento esta afirmación? «Creer que $\frac{a-b}{b-a} = 1$ (ignorar los signos)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Cualquier binomio dividido por su exacto opuesto invertido
    matemáticamente, de la forma $\frac{a-b}{b-a}$, siempre da como resultado $-1$ (siempre que $a \neq b$).'
errores_frecuentes:
- Creer que $\frac{a-b}{b-a} = 1$ (ignorar los signos).
- Confundir la suma con la resta (creer que $\frac{a+b}{b+a} = -1$).
- Tachar un $(a-b)$ con un $(a+b)$ que no son opuestos, sino diferentes.
- Para «¿Cuál es la justificación matemática de que $\frac{x-y}{y-x} = -1$», la respuesta correcta es Porque las
  variables se anulan a cero y queda un uno.
- Para «¿Cuál es la justificación matemática de que $\frac{x-y}{y-x} = -1$», la respuesta correcta es Es un axioma
  indemostrable.
