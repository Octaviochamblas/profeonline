semantic_id: 'MAT.ALG.FRACCIONES_BASE.FACTORES_OPUESTOS'
titulo: 'Simplificación de Binomios Opuestos (x-y) / (y-x)'
objetivo: 'Reconocer y simplificar la estructura clásica de la división de polinomios opuestos que resulta en -1.'
introduccion: |
  ¿Qué pasa si intentas simplificar dos expresiones que son idénticas, pero donde alguien las escribió exactamente al revés? En las restas algebraicas esto sucede todo el tiempo.
resumen: |
  Cualquier binomio dividido por su exacto opuesto invertido matemáticamente, de la forma $\frac{a-b}{b-a}$, siempre da como resultado $-1$ (siempre que $a \neq b$).
explicacion: |
  Queremos simplificar $\frac{x-5}{5-x}$.
  A primera vista, no son iguales. Arriba la 'x' es positiva, abajo es negativa. Arriba el 5 es negativo, abajo es positivo.
  ¡Tienen los signos exactamente opuestos!

  ¿Cómo lo resolvemos usando las reglas que aprendimos?
  Saquemos un 'factor común' de -1 en el numerador:
  $x - 5 = -1(-x + 5) = -(5 - x)$.

  Si reemplazamos esto en nuestra fracción:
  $\frac{-(5 - x)}{5 - x}$.
  Ahora el paréntesis $(5 - x)$ es idéntico arriba y abajo. Lo cancelamos.
  ¿Qué sobrevivió? El signo negativo del frente (el -1).

  Conclusión directa: Cuando veas una resta dividida por la misma resta al revés, bórralas de inmediato y escribe un `-1` gigante.
procedimiento:
  - 'Paso 1: Revisa si el polinomio de arriba tiene EXACTAMENTE los mismos términos que el de abajo, pero con todos los signos invertidos.'
  - 'Paso 2: Esta situación es muy común en restas invertidas como $(a-b)$ y $(b-a)$.'
  - 'Paso 3: Cancela todo el bloque de arriba con todo el de abajo y reemplázalos por un $-1$.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Simplifica $\frac{3m - 2n}{2n - 3m}$.'
    solucion_pasos:
    - 'La ''m'' arriba es $+3$, abajo es $-3$.'
    - 'La ''n'' arriba es $-2$, abajo es $+2$.'
    - 'Son opuestos perfectos.'
    - 'Cancelamos y el resultado es $-1$.'
  - titulo: 'Simplifica $\frac{x+y}{y+x}$.'
    respuesta: '1'
    solucion_pasos:
    - '¡Cuidado! Son sumas, y la suma es conmutativa. $x+y$ es exactamente igual a $y+x$, no son opuestos. El resultado es 1.'
errores_frecuentes:
  - 'Creer que $\frac{a-b}{b-a} = 1$ (ignorar los signos).'
  - 'Confundir la suma con la resta (creer que $\frac{a+b}{b+a} = -1$).'
  - 'Tachar un $(a-b)$ con un $(a+b)$ que no son opuestos, sino diferentes.'
estado: publicado
