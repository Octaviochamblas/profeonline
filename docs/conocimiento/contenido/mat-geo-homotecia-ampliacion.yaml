semantic_id: MAT.GEO.HOMOTECIA.AMPLIACION
titulo: Efecto de ampliación en una homotecia con valor absoluto de la razón mayor que 1
objetivo: Reconocer que una homotecia con |k|>1 produce una ampliación de la figura original, sin importar
  si k es positivo o negativo.
introduccion: 'Independientemente de si una homotecia es directa o inversa, existe un factor separado
  que determina si la figura se agranda o se achica: el valor absoluto de la razón.'
resumen: 'Una homotecia produce una ampliación cuando el valor absoluto de su razón es mayor que 1 ($|k|>1$):
  la figura imagen es más grande que la original.'
explicacion: '![Homotecia de ampliación](/static/img/geometria/congruencia-semejanza/homotecia-ampliacion.svg)


  ### Definición formal


  Si $|k|>1$, cada distancia en la figura imagen es $|k|$ veces la distancia correspondiente en la figura
  original, produciendo una figura más grande, sin importar si $k$ es positivo (directa) o negativo (inversa).


  ### Desarrollo didáctico


  Tanto k=3 como k=-3 producen una ampliación (el triple del tamaño), pero con orientación distinta: k=3
  mantiene la orientación (directa), mientras que k=-3 la invierte respecto al centro (inversa).'
procedimiento:
- 'Paso 1: Calcula el valor absoluto de la razón de homotecia k.'
- 'Paso 2: Compara ese valor con 1.'
- 'Paso 3: Si |k|>1, la homotecia produce una ampliación de la figura.'
ejemplos:
- titulo: Identificar una ampliación con k positivo
  enunciado: Una homotecia tiene razón k=3.
  solucion_pasos:
  - '|3|=3>1, por lo tanto es una ampliación (y además directa, por ser k positivo).'
- titulo: Identificar una ampliación con k negativo
  enunciado: Una homotecia tiene razón k=-2,5.
  solucion_pasos:
  - '|-2,5|=2,5>1, por lo tanto también es una ampliación (e inversa, por ser k negativo).'
- titulo: ¿El signo de k determina si hay ampliación?
  respuesta: 'No'
  solucion_pasos:
  - No, el signo determina si es directa o inversa; el valor absoluto determina si amplía o reduce.
- titulo: ¿Una razón k=1,5 produce ampliación?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque |1,5|=1,5>1.
errores_frecuentes:
- Confundir el efecto de ampliación/reducción (que depende de |k|) con la clasificación directa/inversa
  (que depende del signo de k).
- Creer que solo valores positivos de k pueden producir ampliación.
- Olvidar tomar el valor absoluto antes de comparar con 1, especialmente con razones negativas.
fuente: Elaboración propia.
estado: publicado
