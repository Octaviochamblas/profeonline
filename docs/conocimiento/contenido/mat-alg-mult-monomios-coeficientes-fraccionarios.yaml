semantic_id: MAT.ALG.MULT_MONOMIOS.COEFICIENTES_FRACCIONARIOS
objetivo: Multiplicar monomios con coeficientes fraccionarios, aplicando la multiplicación
  de fracciones y las leyes de exponentes.
introduccion: 'Los coeficientes fraccionarios en los monomios no cambian las reglas
  algebraicas. La multiplicación de fracciones se realiza directamente: numerador
  por numerador, y denominador por denominador. Las variables se operan como siempre.'
resumen: Al multiplicar monomios con **Coeficientes Fraccionarios**, se multiplican
  los numeradores entre sí y los denominadores entre sí para obtener el nuevo coeficiente,
  simplificando la fracción al final. Los exponentes de igual base se suman.
explicacion: "Multiplica: $(\\frac{2}{3}x^2y)(\\frac{3}{4}xy^2)$.\n\n1. Multiplicamos\
  \ coeficientes:\n   $\\frac{2}{3} \\times \\frac{3}{4} = \\frac{2 \\cdot 3}{3 \\\
  cdot 4} = \\frac{6}{12} = \\frac{1}{2}$.\n2. Parte literal:\n   $x^2 \\cdot x =\
  \ x^3$.\n   $y \\cdot y^2 = y^3$.\n3. Resultado final: $\\frac{1}{2}x^3y^3$."
procedimiento:
- 'Paso 1: Multiplica las fracciones de los coeficientes (numerador × numerador y
  denominador × denominador).'
- 'Paso 2: Simplifica la fracción resultante a su mínima expresión.'
- 'Paso 3: Para las variables de igual base, suma sus exponentes.'
- 'Paso 4: Escribe el resultado combinando la fracción simplificada y las variables
  resultantes.'
ejemplos:
- titulo: Fracciones combinadas
  enunciado: 'Multiplica: (1/2 a)(2/5 b).'
  solucion_pasos:
  - 'Coeficientes: 1/2 × 2/5 = 2/10 = 1/5.'
  - 'Letras: a × b = ab.'
  - 'Resultado: 1/5 ab.'
errores_frecuentes:
- Sumar las fracciones en lugar de multiplicarlas.
- Omitir la simplificación de la fracción resultante en el coeficiente.
fuente: Álgebra de Baldor.
estado: publicado
