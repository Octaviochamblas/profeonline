semantic_id: MAT.EST.COMBINACIONES.COEFICIENTE_BINOMIAL
titulo: Reconocer la notación de coeficiente binomial para las combinaciones
objetivo: Reconocer y utilizar la notación de coeficiente binomial $\binom{n}{r}$ como forma alternativa
  de representar el número de combinaciones C(n,r).
introduccion: El coeficiente binomial es la notación matemática estándar (usada también en el desarrollo
  del binomio de Newton) para representar el número de combinaciones.
resumen: El coeficiente binomial $\binom{n}{r}$ se lee 'n sobre r' o 'combinaciones de n en r', y es exactamente
  igual a $C(n,r)=\dfrac{n!}{r!\,(n-r)!}$.
explicacion: '![Notación de coeficiente binomial](/static/img/probabilidad/comb/comb-coeficiente-binomial.svg)


  ### Definición formal


  $\binom{n}{r}=C(n,r)=\dfrac{n!}{r!\,(n-r)!}$; ambas notaciones representan exactamente el mismo valor
  numérico.


  ### Desarrollo didáctico


  $\binom{5}{2}=C(5,2)=\dfrac{5!}{2!\,3!}=\dfrac{120}{2\times6}=10$. Esta notación aparece frecuentemente
  en el desarrollo del binomio de Newton, donde los coeficientes de $(a+b)^n$ son precisamente estos números
  combinatorios.'
procedimiento:
- 'Paso 1: Reconoce que la notación $\binom{n}{r}$ representa exactamente lo mismo que C(n,r).'
- 'Paso 2: Aplica la misma fórmula n!/(r!(n-r)!) para calcular su valor, independientemente de la notación
  usada.'
- 'Paso 3: Relaciona este concepto con el Triángulo de Pascal, donde estos coeficientes aparecen ordenados
  por filas.'
ejemplos:
- titulo: Calcular el coeficiente binomial (5 sobre 2)
  enunciado: $\binom{5}{2}$.
  solucion_pasos:
  - $\binom{5}{2}=C(5,2)=5!/(2!·3!)=120/12=10$.
- titulo: Calcular el coeficiente binomial (6 sobre 3)
  enunciado: $\binom{6}{3}$.
  solucion_pasos:
  - $\binom{6}{3}=C(6,3)=6!/(3!·3!)=720/36=20$.
- titulo: ¿El coeficiente binomial (n sobre r) es igual a C(n,r)?
  respuesta: Sí
  solucion_pasos:
  - Sí, son exactamente la misma cantidad, solo con notación distinta.
- titulo: ¿El coeficiente binomial aparece en el desarrollo del binomio de Newton?
  respuesta: Sí
  solucion_pasos:
  - Sí, los coeficientes de (a+b)^n son precisamente los coeficientes binomiales $\binom{n}{r}$.
errores_frecuentes:
- Pensar que $\binom{n}{r}$ es una fracción o división simple, en vez de reconocerla como notación de
  combinación.
- Confundir el orden de los valores dentro de la notación (n arriba, r abajo).
- No relacionar esta notación con conceptos ya vistos como el Triángulo de Pascal o el binomio de Newton.
fuente: 'Elaboración propia (referencia: Baldor 375, Moraleja 300).'
estado: publicado
