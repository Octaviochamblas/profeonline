semantic_id: MAT.NUM.SUCESIONES_BASE.REGULARIDAD_NUMERICA
objetivo: Identificar el patrón o regularidad oculta en una secuencia numérica para
  predecir términos siguientes.
introduccion: Si ves los números 10, 20, 30... tu cerebro automáticamente grita '¡40!'.
  Acabas de encontrar una regularidad numérica. Descubrir el patrón es como ser un
  detective matemático.
resumen: Una regularidad numérica es la regla constante que relaciona un término de
  la sucesión con el siguiente. Puede ser sumar, restar, multiplicar, dividir, o incluso
  elevar al cuadrado.
explicacion: 'Para descubrir qué regla gobierna una sucesión, debes probar operaciones
  básicas entre números consecutivos:


  1. **¿Sumar o Restar?** Revisa si la diferencia entre números juntos es siempre
  la misma. Ej: $7, 10, 13, 16$ (el patrón es $+3$).

  2. **¿Multiplicar o Dividir?** Si los números crecen muy rápido, prueba dividir
  un término por el anterior. Ej: $3, 6, 12, 24$ (el patrón es $\cdot 2$).

  3. **¿Cuadrados perfectos?** Si ves $1, 4, 9, 16, 25$, no están sumando ni multiplicando
  por lo mismo. Son los números $1^2, 2^2, 3^2, 4^2\dots$


  Una vez que descubres el ''secreto'' de la sucesión, puedes calcular el siguiente
  término fácilmente.'
procedimiento:
- 'Paso 1: Calcula la diferencia (resta) entre el segundo y el primer término, y luego
  entre el tercero y el segundo.'
- 'Paso 2: Si la diferencia es constante, la regularidad es una suma/resta.'
- 'Paso 3: Si no es constante, prueba dividiendo para ver si hay un factor multiplicativo.'
- 'Paso 4: Aplica la regla encontrada al último término para hallar el siguiente.'
ejemplos:
- titulo: Buscando el eslabón perdido
  enunciado: 'Encuentra la regularidad y el siguiente número en la sucesión: 80, 40,
    20, 10...'
  solucion_pasos:
  - 'Resto: 40 - 80 = -40. Resto 20 - 40 = -20. No es una resta constante.'
  - 'Divido: 40 / 80 = 0.5 (o dividir por 2). Divido 20 / 40 = 0.5.'
  - El patrón constante es 'dividir por 2' (o multiplicar por 1/2).
  - El siguiente es 10 / 2 = 5.
errores_frecuentes:
- Asumir una regla comprobando solo los dos primeros números, sin verificar que se
  cumpla en el tercer y cuarto número.
- Pensar que las reglas solo pueden ser sumas simples.
fuente: Currículum Nacional MINEDUC.
estado: publicado
