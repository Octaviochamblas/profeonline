semantic_id: MAT.ALG.FUNCIONES_ESPECIALES.PARTE_ENTERA_GRAFICO
titulo: Representación gráfica de la función parte entera
objetivo: Reconocer y construir la gráfica escalonada de la función parte entera.
introduccion: 'La gráfica de esta función no es una curva suave: parece una escalera, con tramos horizontales
  que saltan de golpe al siguiente escalón.'
resumen: 'La gráfica de $f(x)=\lfloor x \rfloor$ tiene forma de **escalera**: consiste en segmentos horizontales
  de longitud 1, cada uno a la altura de un número entero, con un punto sólido en el extremo izquierdo y un punto
  abierto en el extremo derecho de cada tramo.'
explicacion: '### Definición formal


  Para $x \in [n, n+1[$ con $n \in \mathbb{Z}$, se cumple $\lfloor x \rfloor = n$. Por tanto, la gráfica consiste
  en la unión de segmentos horizontales $\{(x,n) : x \in [n,n+1[\}$ para cada entero $n$, generando discontinuidades
  de salto en cada valor entero.


  ### Desarrollo didáctico


  Cada "escalón" horizontal comienza exactamente en un número entero (con punto sólido, porque ese entero sí
  pertenece al tramo) y termina justo antes del siguiente entero (con punto abierto, porque ese siguiente valor
  ya pertenece al escalón de arriba).


  Entre $x=2$ y $x=3$ (sin incluirlo), la función vale constantemente $2$. En $x=3$ exactamente, salta abruptamente
  a valer $3$.'
procedimiento:
- 'Paso 1: Divide la recta numérica en intervalos de longitud 1 entre enteros consecutivos.'
- 'Paso 2: Para cada intervalo $[n,n+1[$, dibuja un segmento horizontal a la altura $n$.'
- 'Paso 3: Marca el extremo izquierdo de cada segmento con punto sólido (incluido) y el derecho con punto abierto
  (excluido).'
ejemplos:
- titulo: Lectura de un tramo del gráfico
  enunciado: 'En el tramo $[4,5[$ del gráfico de $\lfloor x \rfloor$, ¿a qué altura está el segmento horizontal?'
  solucion_pasos:
  - Para todo $x$ en ese intervalo, $\lfloor x \rfloor = 4$.
  - El segmento está a la altura $y=4$.
- titulo: Identificación del punto de salto
  enunciado: '¿Qué ocurre en el gráfico de $\lfloor x \rfloor$ exactamente en $x=7$?'
  solucion_pasos:
  - El valor de la función salta de $6$ (justo antes de 7) a $7$ (en 7 mismo e inmediatamente después).
  - Hay una discontinuidad de salto en $x=7$.
- titulo: ¿Cada escalón de la gráfica tiene longitud horizontal igual a 1?
  enunciado: ¿Cada escalón de la gráfica tiene longitud horizontal igual a 1?
  respuesta: Sí
  solucion_pasos:
  - Cada intervalo $[n,n+1[$ tiene longitud exactamente 1.
- titulo: ¿El extremo derecho de cada escalón está incluido en ese tramo?
  enunciado: ¿El extremo derecho de cada escalón está incluido en ese tramo?
  respuesta: 'No'
  solucion_pasos:
  - El extremo derecho corresponde ya al valor entero siguiente, marcado con punto abierto en ese tramo.
errores_frecuentes:
- Dibujar líneas inclinadas en vez de segmentos horizontales.
- Invertir los puntos sólidos y abiertos en los extremos de cada escalón.
- Unir los escalones con líneas verticales, sugiriendo continuidad donde en realidad hay saltos.
- Asumir que todos los escalones tienen la misma longitud vertical (la altura del salto sí es constante, pero
  no debe confundirse con la longitud horizontal).
