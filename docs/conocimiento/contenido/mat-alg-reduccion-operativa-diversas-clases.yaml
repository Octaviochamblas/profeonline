semantic_id: MAT.ALG.REDUCCION_OPERATIVA.DIVERSAS_CLASES
objetivo: Reducir polinomios que contienen múltiples grupos de términos semejantes
  de distintas clases.
introduccion: Una bodega real tiene manzanas, peras y naranjas. Puedes contar las
  manzanas juntas, las peras juntas, y las naranjas juntas, pero nunca mezclas la
  cuenta. En álgebra, una expresión puede tener términos de tipo $x$, términos de
  tipo $y$ y términos de tipo $x^2$, y cada familia se reduce por separado.
resumen: Cuando un polinomio contiene **Diversas Clases** de términos, se agrupa y
  reduce cada familia por separado, produciendo un polinomio final simplificado con
  uno o más términos.
explicacion: 'Simplifica: $3a + 5b - a + 2b$.


  Familia $a$: $3a - a = 2a$.

  Familia $b$: $5b + 2b = 7b$.

  Resultado final: $2a + 7b$.


  Ejemplo más complejo: $4x^2 + 3x - 2x^2 + x - 5$.

  - Familia $x^2$: $4x^2 - 2x^2 = 2x^2$.

  - Familia $x$: $3x + x = 4x$.

  - Familia constante: $-5$ (única, no hay otros números solos).

  - Resultado: $2x^2 + 4x - 5$.'
procedimiento:
- 'Paso 1: Identifica todas las familias (grupos de términos semejantes) distintas
  que hay en el polinomio.'
- 'Paso 2: Agrupa los términos de cada familia: subráyalos del mismo color o lista
  mentalmente.'
- 'Paso 3: Reduce cada familia de forma independiente.'
- 'Paso 4: Escribe la expresión final con los resultados de cada familia, conectados
  por sus signos.'
ejemplos:
- titulo: La bodega algebraica
  enunciado: 'Reduce: 5x + 2y - 3x + y - 4.'
  solucion_pasos:
  - 'Familia x: 5x - 3x = 2x.'
  - 'Familia y: 2y + y = 3y.'
  - 'Constante: -4.'
  - 'Resultado: 2x + 3y - 4.'
errores_frecuentes:
- Mezclar los coeficientes de diferentes familias (ej. sumar el 3 de $3x$ con el 2
  de $2y$).
- Omitir términos que son únicos en su familia (ej. ignorar el término constante $-4$).
fuente: Álgebra de Baldor.
estado: publicado
