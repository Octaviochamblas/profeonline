    fraccionarios de cada familia usando denominador común.'
errores_frecuentes:
- Olvidar invertir el signo del sustraendo antes de sumar las fracciones.
- Operar las fracciones sin buscar el denominador común.
- Para «Al calcular $(\frac{3}{5})m - (\frac{1}{5})m$, ¿cuál es el primer paso? (v1)», la respuesta correcta es
  Multiplicar numeradores y denominadores.
- 'Restar directamente: $\frac{3-1}{5-5} = \frac{2}{0}$.'
- Para «Al calcular $(\frac{3}{5})m - (\frac{1}{5})m$, ¿cuál es el primer paso? (v1)», la respuesta correcta es
  Elevar al cuadrado ambas fracciones.
fuente: Álgebra de Baldor.
