semantic_id: MAT.ALG.SUSTRACCION_POL.COEFICIENTES_FRACCIONARIOS
objetivo: Restar polinomios con coeficientes fraccionarios, combinando la inversión de signos con la resta de fracciones.
introduccion: 'La resta de polinomios con fracciones combina dos habilidades: la inversión de signos del sustraendo
  y la operatoria con fracciones. Bien ordenadas, ambas son completamente manejables.'
resumen: En la **Sustracción con Coeficientes Fraccionarios**, primero se transforma la resta en suma del opuesto
  (invirtiendo signos del sustraendo), y luego se suman los coeficientes fraccionarios de cada familia usando denominador
  común.
explicacion: '### Definición formal


  La resta siempre se convierte en suma del opuesto primero.


  ### Desarrollo didáctico


  Resta: $(\frac{3}{4}x + \frac{1}{2}) - (\frac{1}{4}x - \frac{1}{3})$.


  Convertimos en suma del opuesto:

  $(\frac{3}{4}x + \frac{1}{2}) + (-\frac{1}{4}x + \frac{1}{3})$.


  Familia $x$: $\frac{3}{4} - \frac{1}{4} = \frac{2}{4} = \frac{1}{2}$.

  Constantes: $\frac{1}{2} + \frac{1}{3} = \frac{3}{6} + \frac{2}{6} = \frac{5}{6}$.


  Resultado: $\frac{1}{2}x + \frac{5}{6}$.'
procedimiento:
- 'Paso 1: Invierte el signo de cada término del sustraendo (convierte la resta en suma).'
- 'Paso 2: Agrupa por familias de términos semejantes.'
- 'Paso 3: Para cada familia, suma o resta las fracciones con denominador común.'
- 'Paso 4: Simplifica las fracciones del resultado si es posible.'
- La resta siempre se convierte en suma del opuesto primero.
ejemplos:
- titulo: Fracciones de restar
  enunciado: 'Calcula: (2/3)a - (1/6)a.'
  solucion_pasos:
  - 'Suma del opuesto: (2/3)a + (-1/6)a.'
  - MCD de 3 y 6 es 6.
  - 2/3 = 4/6.
  - 4/6 - 1/6 = 3/6 = 1/2.
  - 'Resultado: (1/2)a.'
- titulo: Una receta requiere $\frac{3}{4}$ kg de harina del tipo A. Ya se usaron $\frac{1}{3}$ kg. ¿C
  enunciado: 'Una receta requiere $\frac{3}{4}$ kg de harina del tipo A. Ya se usaron $\frac{1}{3}$ kg. ¿Cuánto
    queda por agregar? (v1)


    Opciones: A) $\frac{5}{12}$ kg · B) $\frac{2}{1}$ kg · C) $\frac{2}{7}$ kg · D) $\frac{1}{6}$ kg'
  solucion_pasos:
  - 'MCD de 4 y 3 es 12. $\frac{3}{4}=\frac{9}{12}$, $\frac{1}{3}=\frac{4}{12}$. Resta: $\frac{9-4}{12}=\frac{5}{12}$.'
  - 'Respuesta: $\frac{5}{12}$ kg'
- titulo: 'Respecto de «Sustracción de polinomios con coeficientes fraccionarios»: ¿Se ajusta a la defi'
  enunciado: 'Respecto de «Sustracción de polinomios con coeficientes fraccionarios»: ¿Se ajusta a la definición
    esta afirmación? «En la **Sustracción con Coeficientes Fraccionarios**, primero se transforma la resta en suma
    del opuesto (invirtiendo signos del sustraendo), y luego se suman los coeficientes fraccionarios de cada familia
    usando denominador común»'
  respuesta: Sí
  solucion_pasos:
