semantic_id: MAT.ALG.SUSTRACCION_POL.COEFICIENTES_FRACCIONARIOS
objetivo: Restar polinomios con coeficientes fraccionarios, combinando la inversión
  de signos con la resta de fracciones.
introduccion: 'La resta de polinomios con fracciones combina dos habilidades: la inversión
  de signos del sustraendo y la operatoria con fracciones. Bien ordenadas, ambas son
  completamente manejables.'
resumen: En la **Sustracción con Coeficientes Fraccionarios**, primero se transforma
  la resta en suma del opuesto (invirtiendo signos del sustraendo), y luego se suman
  los coeficientes fraccionarios de cada familia usando denominador común.
explicacion: 'Resta: $(\frac{3}{4}x + \frac{1}{2}) - (\frac{1}{4}x - \frac{1}{3})$.


  Convertimos en suma del opuesto:

  $(\frac{3}{4}x + \frac{1}{2}) + (-\frac{1}{4}x + \frac{1}{3})$.


  Familia $x$: $\frac{3}{4} - \frac{1}{4} = \frac{2}{4} = \frac{1}{2}$.

  Constantes: $\frac{1}{2} + \frac{1}{3} = \frac{3}{6} + \frac{2}{6} = \frac{5}{6}$.


  Resultado: $\frac{1}{2}x + \frac{5}{6}$.'
procedimiento:
- 'Paso 1: Invierte el signo de cada término del sustraendo (convierte la resta en
  suma).'
- 'Paso 2: Agrupa por familias de términos semejantes.'
- 'Paso 3: Para cada familia, suma o resta las fracciones con denominador común.'
- 'Paso 4: Simplifica las fracciones del resultado si es posible.'
ejemplos:
- titulo: Fracciones de restar
  enunciado: 'Calcula: (2/3)a - (1/6)a.'
  solucion_pasos:
  - 'Suma del opuesto: (2/3)a + (-1/6)a.'
  - MCD de 3 y 6 es 6.
  - 2/3 = 4/6.
  - 4/6 - 1/6 = 3/6 = 1/2.
  - 'Resultado: (1/2)a.'
errores_frecuentes:
- Olvidar invertir el signo del sustraendo antes de sumar las fracciones.
- Operar las fracciones sin buscar el denominador común.
fuente: Álgebra de Baldor.
estado: publicado
