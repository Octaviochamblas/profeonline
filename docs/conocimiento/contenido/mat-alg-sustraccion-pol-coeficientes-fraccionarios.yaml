    se transforma la resta en suma del opuesto (invirtiendo signos del sustraendo), y luego se suman los coeficientes
    fraccionarios de cada familia usando denominador común.'
- titulo: 'Respecto de «Sustracción de polinomios con coeficientes fraccionarios»: ¿Es compatible con e'
  enunciado: 'Respecto de «Sustracción de polinomios con coeficientes fraccionarios»: ¿Es compatible con el procedimiento
    esta afirmación? «Olvidar invertir el signo del sustraendo antes de sumar las fracciones»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En la **Sustracción con Coeficientes Fraccionarios**, primero
