semantic_id: MAT.ALG.COMPOSICION_FUNCIONES.EVALUACION_NUMERICA
titulo: Evaluación numérica de una función compuesta
objetivo: Evaluar una composición de funciones en un valor numérico específico, aplicando las funciones
  en el orden correcto.
introduccion: 'Antes de buscar la fórmula general de una composición, conviene practicar con números concretos:
  el proceso es exactamente el mismo, solo que más corto.'
resumen: Evaluar $(f \circ g)(a)$ para un valor numérico $a$ consiste en calcular primero $g(a)$, y luego
  evaluar $f$ en ese resultado numérico.
explicacion: '### Definición formal


  Para evaluar $(f \circ g)(a)$, se calcula $b = g(a)$ y luego se calcula $f(b)$; el resultado final es
  $(f \circ g)(a) = f(g(a))$. Cada paso es una evaluación numérica ordinaria de una función.


  ### Desarrollo didáctico


  El truco es hacerlo en dos pasos separados y nunca simultáneos: primero termina completamente de calcular
  $g(a)$, y solo después sustituye ese número en $f$.


  Si $f(x)=x^2+1$ y $g(x)=x-4$, para calcular $(f\circ g)(6)$: primero $g(6)=6-4=2$; luego $f(2)=2^2+1=5$.
  Por tanto $(f\circ g)(6)=5$.'
procedimiento:
- 'Paso 1: Calcula $g(a)$, sustituyendo el valor numérico dado.'
- 'Paso 2: Toma ese resultado numérico como el nuevo valor a evaluar en $f$.'
- 'Paso 3: Calcula $f$ de ese resultado para obtener la respuesta final.'
ejemplos:
- titulo: Evaluación directa
  enunciado: Si $f(x)=3x$ y $g(x)=x+2$, calcula $(f\circ g)(5)$.
  solucion_pasos:
  - $g(5)=5+2=7$.
  - $f(7)=3(7)=21$.
  - $(f\circ g)(5)=21$.
- titulo: Evaluación con función cuadrática
  enunciado: Si $f(x)=x^2$ y $g(x)=2x-1$, calcula $(f\circ g)(3)$.
  solucion_pasos:
  - $g(3)=2(3)-1=5$.
  - $f(5)=5^2=25$.
  - $(f\circ g)(3)=25$.
- titulo: ¿Para evaluar $(f\circ g)(a)$ se calcula primero $f(a)$?
  enunciado: ¿Para evaluar $(f\circ g)(a)$ se calcula primero $f(a)$?
  respuesta: 'No'
  solucion_pasos:
  - Se calcula primero $g(a)$, la función interna, y luego se evalúa $f$ en ese resultado.
- titulo: ¿$(f\circ g)(a)$ y $(g\circ f)(a)$ dan siempre el mismo resultado numérico?
  enunciado: ¿$(f\circ g)(a)$ y $(g\circ f)(a)$ dan siempre el mismo resultado numérico?
  respuesta: 'No'
  solucion_pasos:
  - En general el orden de composición afecta el resultado numérico obtenido.
errores_frecuentes:
- Evaluar $f$ primero en vez de $g$, invirtiendo el orden de composición.
- Sustituir el valor original $a$ directamente en $f$, ignorando el paso intermedio de $g$.
- Cometer errores aritméticos en el paso intermedio, arrastrando el error al resultado final.
- Confundir $(f\circ g)(a)$ con $f(a)\cdot g(a)$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
