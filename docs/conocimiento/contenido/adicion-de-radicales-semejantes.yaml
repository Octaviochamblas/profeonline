semantic_id: MAT.NUM.RAICES_PROPIEDADES.ADICION_RADICALES_SEMEJANTES
titulo: Adición de radicales semejantes
objetivo: Sumar expresiones con radical común.
introduccion: Sumar radicales semejantes funciona como sumar términos algebraicos semejantes. La raíz
  no se suma consigo misma; se factoriza mientras cambian los coeficientes.
resumen: Los radicales semejantes se suman operando sus coeficientes. La parte radical común se conserva
  como un facto.
explicacion: 'Los radicales semejantes se suman operando sus coeficientes.


  El cálculo “\(3\sqrt5+2\sqrt5=5\sqrt5\)” muestra por qué la parte radical común se conserva como un
  facto'
procedimiento:
- 'Paso 1: Simplifica los radicales y confirma que sean semejantes.'
- 'Paso 2: Suma únicamente los coeficientes y conserva la parte radical.'
- 'Paso 3: Distribuye el resultado para verificar que reproduce los términos iniciales.'
ejemplos:
- titulo: Aplicación razonada — Adición de radicales semejantes
  enunciado: \(3\sqrt5+2\sqrt5=5\sqrt5\).
  solucion_pasos:
  - Simplifica los radicales y confirma que sean semejantes.
  - Suma únicamente los coeficientes y conserva la parte radical.
  - Distribuye el resultado para verificar que reproduce los términos iniciales.
- titulo: Revisión de una solución — Adición de radicales semejantes
  enunciado: Una solución aplica “Suma únicamente los coeficientes y conserva la parte radical.”, pero
    termina sin comprobar que la parte radical común se conserva como un facto. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define adición de radicales semejantes: los radicales semejantes se suman
    operando sus coeficientes.'
  - Simplifica los radicales y confirma que sean semejantes.
  - 'Completa la revisión con este control: Distribuye el resultado para verificar que reproduce los términos
    iniciales.'
- titulo: ¿Se cumple que la parte radical común se conserva como un facto? — Adición de radicales semejantes
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que los radicales semejantes se suman operando sus coeficientes.
  - El caso “\(3\sqrt5+2\sqrt5=5\sqrt5\)” satisface esa condición.
  - Distribuye el resultado para verificar que reproduce los términos iniciales.
- titulo: ¿Es válido omitir el paso “Simplifica los radicales y confirma que sean semejantes”? — Adición
    de radicales semejantes
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de adición de radicales semejantes.
  - 'Omitirlo puede volver inválida la acción siguiente: Suma únicamente los coeficientes y conserva la
    parte radical.'
  - 'La solución debe terminar de este modo: Distribuye el resultado para verificar que reproduce los
    términos iniciales.'
errores_frecuentes:
- 'Confundir adición de radicales semejantes con otro concepto y omitir este inicio: Simplifica los radicales
  y confirma que sean semejantes.'
- Aplicar mecánicamente “Suma únicamente los coeficientes y conserva la parte radical.” sin revisar las
  condiciones de la definición.
- Tomar “\(3\sqrt5+2\sqrt5=5\sqrt5\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la parte radical común se conserva como un facto”.
- 'Terminar el desarrollo sin realizar este control: Distribuye el resultado para verificar que reproduce
  los términos iniciales.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
estado: publicado
