semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.SIMETRIA_PAR
titulo: Simetría par de la función coseno
objetivo: Verificar que $f(x)=\cos(x)$ es una función par, cumpliendo $\cos(-x)=\cos(x)$.
introduccion: A diferencia del seno, la curva del coseno es simétrica de forma que ambos lados del eje $y$ se
  ven exactamente igual.
resumen: 'La función $f(x)=\cos(x)$ es **par**: cumple $\cos(-x)=\cos(x)$ para todo $x$, y su gráfica es
  simétrica respecto al eje $y$.'
explicacion: '### Definición formal


  Para un ángulo $\theta$ y su opuesto $-\theta$, los puntos asociados en el círculo unitario son $(x,y)$ y
  $(x,-y)$: comparten la misma coordenada $x$ (mismo coseno), aunque tengan coordenada $y$ opuesta. Por lo
  tanto, $\cos(-\theta)=\cos(\theta)$.


  ### Desarrollo didáctico


  $\cos(\pi/6)=\sqrt{3}/2$ y $\cos(-\pi/6)=\sqrt{3}/2$: son valores idénticos. Geométricamente, el ángulo
  $-\pi/6$ es el reflejo de $\pi/6$ respecto al eje $x$, lo que no altera la coordenada $x$.'
procedimiento:
- 'Paso 1: Calcula $\cos(-x)$ para un valor dado de $x$.'
- 'Paso 2: Compara el resultado con $\cos(x)$.'
- 'Paso 3: Si coinciden, se confirma la simetría par.'
ejemplos:
- titulo: Verificación numérica de la simetría par
  enunciado: 'Verifica que $\cos(-\pi/3)=\cos(\pi/3)$.'
  solucion_pasos:
  - 'Se calcula $\cos(\pi/3)=1/2$ y $\cos(-\pi/3)=1/2$.'
  - Se confirma que ambos valores coinciden.
- titulo: Aplicación de la simetría para simplificar un cálculo
  enunciado: 'Si $\cos(2)\approx-0{,}416$, calcula $\cos(-2)$ sin evaluar directamente.'
  solucion_pasos:
  - Se aplica la propiedad de simetría par.
  - '$\cos(-2)=\cos(2)\approx-0{,}416$.'
- titulo: ¿La gráfica de la función coseno es simétrica respecto al origen?
  enunciado: ¿La gráfica de $f(x)=\cos(x)$ es simétrica respecto al origen (función impar)?
  respuesta: 'No'
  solucion_pasos:
  - Es simétrica respecto al eje $y$ (función par), no respecto al origen.
- titulo: ¿La simetría par y la simetría impar pueden coexistir en la misma función no nula?
  enunciado: ¿Puede una función no nula ser simultáneamente par e impar?
  respuesta: 'No'
  solucion_pasos:
  - Solo la función constante $f(x)=0$ cumple ambas propiedades a la vez.
errores_frecuentes:
- Confundir la simetría par del coseno con la simetría impar del seno.
- Suponer que $\cos(-x)=-\cos(x)$, cuando en realidad son valores iguales.
- No aplicar correctamente la simetría para simplificar cálculos con ángulos negativos.
- Confundir simetría respecto al eje $y$ con simetría respecto al origen.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
