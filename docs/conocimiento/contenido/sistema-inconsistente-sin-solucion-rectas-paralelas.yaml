semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.SISTEMA_INCONSISTENTE
titulo: 'Sistema inconsistente: sin solución (rectas paralelas)'
objetivo: Reconocer sistemas imposibles donde las rectas son paralelas.
introduccion: Si dibujas esto en un gráfico, obtendrás **dos líneas perfectamente paralelas**, como las
  rectas paralelas. Tienen la misma inclinación, pero están separadas.
resumen: 'Este es el escenario más trágico. Te dan dos ecuaciones que exigen cosas contradictorias (ej:
  $x+y=5$ y al mismo tiempo $x+y=10$. ¿Cómo dos números van a sumar 5 y 10 a la vez?).'
explicacion: '### Definición formal


  Un sistema $a_1x+b_1y=c_1$, $a_2x+b_2y=c_2$ es incompatible (sin solución) si y solo si sus pendientes
  coinciden pero sus términos independientes no son proporcionales, $\frac{a_1}{a_2} = \frac{b_1}{b_2}
  \neq \frac{c_1}{c_2}$: las rectas asociadas son paralelas y no se intersectan.


  ### Desarrollo didáctico


  Si dibujas esto en un gráfico, obtendrás **dos líneas perfectamente paralelas**, como las rectas paralelas.
  Tienen la misma inclinación, pero están separadas.

  ¿En qué punto se cruzan las rectas paralelas? Nunca. Por lo tanto, el sistema **No tiene solución**
  (Conjunto Vacío).


  Si intentas forzar una respuesta con álgebra, las letras se eliminarán, pero llegarás a una contradicción
  matemática como $0 = 5$.'
procedimiento:
- Compara las pendientes de las rectas (coeficientes de x e y).
- Si las pendientes son idénticas, pero los resultados (términos independientes) son diferentes y no proporcionales,
  son paralelas.
- Concluye que el sistema no tiene solución.
- Si resuelves con álgebra, llegarás a un absurdo matemático como $0=8$.
