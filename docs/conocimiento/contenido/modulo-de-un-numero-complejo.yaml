semantic_id: MAT.NUM.COMPLEJOS.MODULO
titulo: Módulo de un número complejo
objetivo: Calcular e interpretar el módulo de un complejo.
introduccion: Las partes real e imaginaria forman los catetos de un triángulo rectángulo. El módulo es
  su hipotenusa y mide el tamaño del complejo en el plano.
resumen: El módulo de \(z=a+bi\) es \(|z|=\sqrt{a^2+b^2}\). El módulo es la distancia desde el origen
  al punto complejo y siempre es no negativo.
explicacion: 'El módulo de \(z=a+bi\) es \(|z|=\sqrt{a^2+b^2}\).


  En el caso “\(|3-4i|=\sqrt{3^2+(-4)^2}=5\)” esta idea se hace visible: el módulo es la distancia desde
  el origen al punto complejo y siempre es no negativo'
procedimiento:
- 'Paso 1: Identifica las componentes \(a\) y \(b\).'
- 'Paso 2: Suma sus cuadrados y extrae la raíz cuadrada principal.'
- 'Paso 3: Comprueba que el resultado sea no negativo y coincida con la distancia al origen.'
ejemplos:
- titulo: Aplicación razonada — Módulo de un número complejo
  enunciado: \(|3-4i|=\sqrt{3^2+(-4)^2}=5\).
  solucion_pasos:
  - Identifica las componentes \(a\) y \(b\).
  - Suma sus cuadrados y extrae la raíz cuadrada principal.
  - Comprueba que el resultado sea no negativo y coincida con la distancia al origen.
- titulo: Revisión de una solución — Módulo de un número complejo
  enunciado: Una solución aplica “Suma sus cuadrados y extrae la raíz cuadrada principal.”, pero termina
    sin comprobar que el módulo es la distancia desde el origen al punto complejo y siempre es no negativo.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define módulo de un número complejo: el módulo de \(z=a+bi\) es \(|z|=\sqrt{a^2+b^2}\).'
  - Identifica las componentes \(a\) y \(b\).
  - 'Completa la revisión con este control: Comprueba que el resultado sea no negativo y coincida con
    la distancia al origen.'
- titulo: ¿Se cumple que el módulo es la distancia desde el origen al punto complejo y siempre es no negativo?
    — Módulo de un número complejo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el módulo de \(z=a+bi\) es \(|z|=\sqrt{a^2+b^2}\).
  - El caso “\(|3-4i|=\sqrt{3^2+(-4)^2}=5\)” satisface esa condición.
  - Comprueba que el resultado sea no negativo y coincida con la distancia al origen.
- titulo: ¿Es válido omitir el paso “Identifica las componentes \(a\) y \(b\)”? — Módulo de un número
    complejo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de módulo de un número complejo.
  - 'Omitirlo puede volver inválida la acción siguiente: Suma sus cuadrados y extrae la raíz cuadrada
    principal.'
  - 'La solución debe terminar de este modo: Comprueba que el resultado sea no negativo y coincida con
    la distancia al origen.'
errores_frecuentes:
- 'Confundir módulo de un número complejo con otro concepto y omitir este inicio: Identifica las componentes
  \(a\) y \(b\).'
- Aplicar mecánicamente “Suma sus cuadrados y extrae la raíz cuadrada principal.” sin revisar las condiciones
  de la definición.
- Tomar “\(|3-4i|=\sqrt{3^2+(-4)^2}=5\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el módulo es la distancia desde el origen al punto
  complejo y siempre es no negativo”.
- 'Terminar el desarrollo sin realizar este control: Comprueba que el resultado sea no negativo y coincida
  con la distancia al origen.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
