semantic_id: MAT.GEO.CARTESIANO_BASE.PUNTOS_EJE_ORDENADAS
titulo: Identificación de puntos situados sobre el eje de las ordenadas
objetivo: Reconocer que un punto está situado sobre el eje de las ordenadas si y solo si su coordenada
  x (abscisa) es igual a cero.
introduccion: Cuando un punto 'no se desplaza' del eje vertical (es decir, su distancia horizontal es
  cero), significa que está exactamente sobre el eje de las ordenadas.
resumen: Un punto $(x,y)$ está situado sobre el eje de las ordenadas si y solo si $x=0$, sin importar
  el valor de $y$.
explicacion: '![Puntos sobre el eje de las ordenadas](/static/img/geometria/cartesiano-vectores/cartesiano-puntos-eje-ordenadas.svg)


  ### Definición formal


  Un punto pertenece al eje de las ordenadas si y solo si su abscisa es cero: todo punto de la forma $(0,y)$,
  para cualquier valor real de $y$, se ubica sobre este eje.


  ### Desarrollo didáctico


  En la figura, los puntos $G(0,4)$ y $H(0,-3)$ están sobre el eje de las ordenadas, ya que ambos tienen
  abscisa igual a 0, sin importar que sus ordenadas sean distintas (una positiva y otra negativa).'
procedimiento:
- 'Paso 1: Observa la coordenada x (abscisa) del punto en cuestión.'
- 'Paso 2: Verifica si esa coordenada es igual a cero.'
- 'Paso 3: Si x=0, el punto está sobre el eje de las ordenadas, sin importar el valor de y.'
ejemplos:
- titulo: Verificar si un punto está sobre el eje de las ordenadas
  enunciado: El punto G(0,4) tiene abscisa 0.
  solucion_pasos:
  - Como x=0, el punto G está sobre el eje de las ordenadas.
- titulo: Reconocer un punto que NO está sobre el eje de las ordenadas
  enunciado: El punto (6,2) tiene abscisa 6.
  solucion_pasos:
  - Como x=6 (distinto de 0), ese punto NO está sobre el eje de las ordenadas.
- titulo: ¿La ordenada (y) puede tomar cualquier valor en un punto sobre el eje de las ordenadas?
  respuesta: Sí
  solucion_pasos:
  - Sí, solo importa que x=0; y puede ser cualquier número real, positivo, negativo o cero.
- titulo: ¿El origen (0,0) está sobre el eje de las ordenadas?
  respuesta: Sí
  solucion_pasos:
  - Sí, el origen cumple x=0, por lo que también está sobre el eje de las ordenadas (y también sobre el
    de las abscisas).
errores_frecuentes:
- Confundir la condición x=0 con y=0 al determinar si un punto está sobre este eje.
- Creer que el valor de y debe ser positivo o cero para que el punto esté sobre el eje.
- No reconocer que el origen (0,0) también cumple esta condición.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Baldor 293).'
estado: publicado
