semantic_id: MAT.ALG.POLINOMIOS.POLINOMIO_NULO
objetivo: Comprender el concepto de polinomio nulo y su condición de coeficientes
  iguales a cero.
introduccion: 'Imagina un tren fantasma: ves los vagones, pero adentro no hay nada
  ni nadie. En álgebra, existe un polinomio que aparentemente tiene estructura, pero
  no vale absolutamente nada.'
resumen: Un **Polinomio Nulo** es aquel en el cual **todos y cada uno de sus coeficientes
  numéricos son iguales a cero**. Su valor numérico será siempre cero, sin importar
  qué valores tomen sus variables.
explicacion: "Se denota convencionalmente como $P(x) \\equiv 0$.\nUna forma de escribirlo\
  \ explícitamente sería:\n$P(x) = 0x^3 + 0x^2 + 0x + 0$\n\nAunque visualmente parezca\
  \ de tercer grado, como todo está multiplicado por cero, el polinomio completo colapsa\
  \ a la nada. \n\n*Nota teórica importante:* Como todos los términos desaparecen,\
  \ el polinomio nulo carece de grado definido. No se dice que es de grado cero (porque\
  \ eso sería un número como el $5$), directamente **no tiene grado**."
procedimiento:
- 'Paso 1: Revisa el coeficiente (el número grande) que acompaña a cada término de
  la expresión.'
- 'Paso 2: Revisa también el término independiente.'
- 'Paso 3: Si absolutamente todos esos números son un gran ''0'', estás ante un polinomio
  nulo.'
ejemplos:
- titulo: El tren vacío
  enunciado: Sabiendo que P(x) = (a-2)x^2 + (b-3)x es un polinomio nulo, halla a y
    b.
  solucion_pasos:
  - Si es nulo, todos sus coeficientes deben valer cero.
  - El primer coeficiente (a-2) debe ser 0. Por ende, a = 2.
  - El segundo coeficiente (b-3) debe ser 0. Por ende, b = 3.
errores_frecuentes:
- Confundir 'Polinomio Nulo' con 'Polinomio de grado cero'. Un polinomio de grado
  cero es una constante ($P(x) = 5$). Un polinomio nulo es literalmente el vacío ($P(x)
  = 0$).
- Creer que si la 'x' vale cero, el polinomio se llama nulo. El polinomio es nulo
  solo si sus *coeficientes fijos* son cero de fábrica.
fuente: Álgebra de Baldor.
estado: publicado
