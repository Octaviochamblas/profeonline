semantic_id: MAT.ALG.FUNC_SENO_ANALISIS.PERIODO
titulo: Periodo de la función seno
objetivo: Reconocer que $f(x)=\sin(x)$ es una función periódica con periodo $2\pi$.
introduccion: La forma ondulada de la función seno se debe a que su patrón de valores se repite exactamente cada
  cierta distancia a lo largo del eje $x$.
resumen: 'La función $f(x)=\sin(x)$ es **periódica** con **periodo $2\pi$**: se cumple $\sin(x+2\pi)=\sin(x)$
  para todo $x$.'
explicacion: '### Definición formal


  Una función $f$ es periódica con periodo $T>0$ si $f(x+T)=f(x)$ para todo $x$, y $T$ es el menor valor
  positivo que cumple esa condición. Para $f(x)=\sin(x)$, el periodo es $T=2\pi$, ya que sumar $2\pi$ al ángulo
  corresponde a dar una vuelta completa en el círculo unitario, regresando al mismo punto.


  ### Desarrollo didáctico


  $\sin(0)=0$ y $\sin(0+2\pi)=\sin(2\pi)=0$: coinciden. Lo mismo ocurre en cualquier punto: $\sin(\pi/2)=1$ y
  $\sin(\pi/2+2\pi)=\sin(5\pi/2)=1$.'
procedimiento:
- 'Paso 1: Recuerda que sumar $2\pi$ al ángulo corresponde a dar una vuelta completa en el círculo unitario.'
- 'Paso 2: Verifica que $\sin(x+2\pi)=\sin(x)$ para cualquier valor de $x$.'
- 'Paso 3: Concluye que el periodo de la función seno básica es $2\pi$.'
ejemplos:
- titulo: Verificación de la periodicidad
  enunciado: 'Verifica que $\sin(\pi/6)=\sin(\pi/6+2\pi)$.'
  solucion_pasos:
  - 'Se calcula $\sin(\pi/6)=1/2$.'
  - '$\pi/6+2\pi$ es coterminal con $\pi/6$, así que también da $1/2$.'
- titulo: Uso del periodo para simplificar un cálculo
  enunciado: 'Calcula $\sin(4\pi+\pi/2)$ usando la periodicidad.'
  solucion_pasos:
  - 'Se observa que $4\pi=2\cdot2\pi$, dos periodos completos.'
  - 'Se simplifica a $\sin(\pi/2)=1$.'
- titulo: ¿Es $2\pi$ el menor periodo positivo de la función seno básica?
  enunciado: ¿El valor $2\pi$ es el menor periodo positivo posible para $f(x)=\sin(x)$?
  respuesta: Sí
  solucion_pasos:
  - No existe un valor positivo menor que $2\pi$ que cumpla $\sin(x+T)=\sin(x)$ para todo $x$.
- titulo: ¿Un múltiplo de $2\pi$, como $4\pi$, también cumple la condición de periodicidad?
  enunciado: ¿$\sin(x+4\pi)=\sin(x)$ para todo $x$?
  respuesta: Sí
  solucion_pasos:
  - Cualquier múltiplo entero del periodo también cumple la condición, aunque el periodo fundamental sea $2\pi$.
errores_frecuentes:
- Confundir el periodo con la amplitud de la función.
- Suponer que el periodo es $\pi$ en vez de $2\pi$.
- No distinguir entre el periodo fundamental y los múltiplos del periodo.
- Aplicar la periodicidad incorrectamente al simplificar cálculos.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
