semantic_id: MAT.EST.MEDIANA_ANALISIS.INTERVALO_MEDIANO
titulo: Identificar el intervalo que contiene a la mediana en datos agrupados
objetivo: Identificar el intervalo mediano como aquel intervalo de clase que contiene a la posición central
  de los datos, usando la frecuencia acumulada.
introduccion: Al igual que con la moda, cuando los datos están agrupados en intervalos no se puede determinar
  un valor puntual exacto de la mediana, sino el intervalo donde se ubica.
resumen: El intervalo mediano es el intervalo de clase cuya frecuencia acumulada alcanza o supera por
  primera vez la mitad del total de datos (n/2).
explicacion: '![Intervalo mediano en datos agrupados](/static/img/estadistica/mediana/mediana-intervalo-mediano.svg)


  ### Definición formal


  El intervalo mediano es aquel $[LI_i,LS_i)$ cuya frecuencia acumulada $F_i$ es la primera en alcanzar
  o superar $n/2$.


  ### Desarrollo didáctico


  Con intervalos [10-20) f=3 F=3, [20-30) f=6 F=9, [30-40) f=4 F=13 (n=13), la mitad es 6,5; F=9 (en [20-30))
  es la primera en superar 6,5, por lo que ese es el intervalo mediano.'
procedimiento:
- 'Paso 1: Calcula la frecuencia acumulada (F) de cada intervalo de la tabla de datos agrupados.'
- 'Paso 2: Calcula la mitad del total de datos (n/2).'
- 'Paso 3: Identifica el primer intervalo cuya frecuencia acumulada alcance o supere ese valor (n/2);
  ese es el intervalo mediano.'
ejemplos:
- titulo: Determinar el intervalo mediano con 3 intervalos
  enunciado: '[10-20) f=3 F=3, [20-30) f=6 F=9, [30-40) f=4 F=13 (n=13).'
  solucion_pasos:
  - n/2=6,5. F=9 (en [20-30)) es la primera en superar 6,5. Intervalo mediano=[20-30).
- titulo: Determinar el intervalo mediano de estaturas
  enunciado: '[150-160) f=5 F=5, [160-170) f=12 F=17, [170-180) f=8 F=25 (n=25).'
  solucion_pasos:
  - n/2=12,5. F=17 (en [160-170)) es la primera en superar 12,5. Intervalo mediano=[160-170).
- titulo: ¿El intervalo mediano se determina usando la frecuencia acumulada?
  respuesta: Sí
  solucion_pasos:
  - Sí, al igual que con datos no agrupados, se busca dónde se alcanza la mitad de los datos.
- titulo: ¿Se puede calcular con este método un valor puntual exacto de la mediana en datos agrupados?
  respuesta: 'No'
  solucion_pasos:
  - No, solo se puede determinar el intervalo; un valor puntual exacto requeriría fórmulas de interpolación
    más avanzadas.
errores_frecuentes:
- Buscar el intervalo mediano usando la frecuencia absoluta (f) en vez de la acumulada (F).
- Calcular incorrectamente n/2, especialmente si se confunde con (n+1)/2 (usado en datos no agrupados
  con n impar).
- No revisar todos los intervalos en orden antes de determinar cuál es el primero en superar n/2.
fuente: 'Elaboración propia (referencia: Moraleja 362).'
estado: publicado
