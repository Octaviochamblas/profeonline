semantic_id: MAT.EST.REGLAS_PROBABILIDAD.SUMA_EXCLUYENTES
titulo: Regla de la suma para eventos mutuamente excluyentes
objetivo: Aplicar la regla de la suma para calcular la probabilidad de que ocurra un evento u otro, cuando
  ambos eventos son mutuamente excluyentes.
introduccion: Cuando dos eventos no pueden ocurrir al mismo tiempo, calcular la probabilidad de que ocurra
  uno u otro es simplemente sumar sus probabilidades individuales.
resumen: Si $A$ y $B$ son eventos mutuamente excluyentes ($A\cap B=\emptyset$), la probabilidad de que
  ocurra $A$ o $B$ es $P(A\cup B)=P(A)+P(B)$.
explicacion: '![Regla de la suma para eventos excluyentes](/static/img/probabilidad/reglas/regla-suma-excluyentes.svg)


  ### Definición formal


  Como $A$ y $B$ no comparten elementos, sus casos favorables se pueden sumar directamente: $n(A\cup B)=n(A)+n(B)$,
  y dividiendo por $n(S)$ se obtiene $P(A\cup B)=P(A)+P(B)$.


  ### Desarrollo didáctico


  Al lanzar un dado, si $A$=''obtener 1 o 2'' ($P(A)=2/6$) y $B$=''obtener 5 o 6'' ($P(B)=2/6$), como
  son excluyentes, $P(A\cup B)=2/6+2/6=4/6$.'
procedimiento:
- 'Paso 1: Verifica que los eventos A y B sean mutuamente excluyentes (no comparten elementos).'
- 'Paso 2: Calcula las probabilidades individuales P(A) y P(B).'
- 'Paso 3: Suma directamente P(A)+P(B) para obtener P(A∪B).'
ejemplos:
- titulo: Calcular la probabilidad de 'obtener 1 o 2' al lanzar un dado
  enunciado: A={1,2}, P(A)=2/6.
  solucion_pasos:
  - Es un único evento, P(A)=2/6=1/3 directamente.
- titulo: Calcular P(A∪B) con eventos excluyentes A={1,2} y B={5,6}
  enunciado: P(A)=2/6, P(B)=2/6.
  solucion_pasos:
  - Como son excluyentes, P(A∪B)=2/6+2/6=4/6=2/3.
- titulo: ¿Esta regla requiere que los eventos sean mutuamente excluyentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, si compartieran elementos, se estarían contando doblemente, y se necesitaría la regla general.
- titulo: ¿La suma P(A)+P(B) puede superar 1 en este caso?
  respuesta: 'No'
  solucion_pasos:
  - No, ya que P(A∪B) siempre está entre 0 y 1, siendo A y B subconjuntos disjuntos de S.
errores_frecuentes:
- Aplicar esta regla simplificada a eventos que no son realmente mutuamente excluyentes, sobreestimando
  la probabilidad.
- Olvidar verificar la condición de exclusión antes de sumar directamente las probabilidades.
- Confundir la unión de eventos (A∪B, 'A o B') con la intersección (A∩B, 'A y B').
fuente: 'Elaboración propia (referencia: Moraleja 409).'
estado: publicado
