semantic_id: MAT.GEO.HOMOTECIA.INVERSA
titulo: Homotecia inversa con razón negativa
objetivo: Reconocer las propiedades de una homotecia inversa, aquella cuya razón k es negativa.
introduccion: 'El segundo tipo de homotecia, según el signo de su razón, produce un efecto visual muy
  distinto al de la homotecia directa: invierte la posición de la figura respecto al centro.'
resumen: Una homotecia es inversa cuando su razón $k$ es negativa ($k<0$); en este caso, cada punto imagen
  queda del lado opuesto del centro respecto a su punto original.
explicacion: '![Homotecia inversa (razón negativa)](/static/img/geometria/congruencia-semejanza/homotecia-inversa.svg)


  ### Definición formal


  Si $k<0$, la homotecia se llama inversa: para cada punto $P$, su imagen $P''=O+k(P-O)$ se ubica en el
  rayo opuesto al que parte de $O$ y pasa por $P$.


  ### Desarrollo didáctico


  En una homotecia inversa, la figura imagen queda "al otro lado" del centro respecto a la original, como
  si se reflejara a través del punto O; visualmente parece una rotación de 180° combinada con un cambio
  de tamaño.'
procedimiento:
- 'Paso 1: Observa el signo de la razón de homotecia k.'
- 'Paso 2: Si k es negativo, la homotecia es inversa.'
- 'Paso 3: Verifica que cada punto imagen esté del lado opuesto del centro respecto a su punto original.'
ejemplos:
- titulo: Identificar una homotecia inversa
  enunciado: Una homotecia tiene razón k=-2.
  solucion_pasos:
  - Es una homotecia inversa, ya que k<0.
- titulo: Verificar la posición en una homotecia inversa
  enunciado: Se aplica una homotecia inversa a un triángulo.
  solucion_pasos:
  - La figura imagen queda del lado opuesto del centro respecto a la original.
- titulo: ¿Una homotecia con k=-0,5 es inversa?
  respuesta: Sí
  solucion_pasos:
  - Sí, sigue siendo inversa porque -0,5 es negativo, aunque produzca una reducción.
- titulo: ¿La homotecia inversa cambia el tamaño de la figura?
  respuesta: Depende
  solucion_pasos:
  - 'Depende del valor absoluto de k: si |k|=1 (k=-1) no cambia el tamaño, solo la posición.'
errores_frecuentes:
- Creer que 'inversa' significa necesariamente que la figura se reduce.
- Confundir homotecia inversa con una reflexión (simetría axial), que es una transformación distinta.
- No verificar el signo de k antes de clasificar la homotecia como directa o inversa.
fuente: 'Fuente: Moraleja 154.'
estado: publicado
