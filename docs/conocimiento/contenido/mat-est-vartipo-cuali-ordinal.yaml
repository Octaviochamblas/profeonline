semantic_id: MAT.EST.VARIABLES_TIPOS.CUALI_ORDINAL
titulo: Clasificar variables cualitativas ordinales
objetivo: Clasificar variables cualitativas ordinales como aquellas cuyas categorías siguen una jerarquía
  o un orden establecido.
introduccion: A diferencia de las nominales, algunas variables cualitativas sí presentan un orden lógico
  entre sus categorías.
resumen: Una variable cualitativa ordinal es aquella cuyas categorías tienen un orden o jerarquía establecida,
  aunque no se pueda medir la distancia exacta entre ellas.
explicacion: '![Variables cualitativas ordinales](/static/img/estadistica/vartipo/vartipo-cuali-ordinal.svg)


  ### Definición formal


  En una variable ordinal, existe una relación de orden entre sus categorías (por ejemplo, bajo < medio
  < alto), pero no se puede cuantificar la diferencia exacta entre ellas.


  ### Desarrollo didáctico


  El nivel de satisfacción de un cliente (insatisfecho, neutral, satisfecho) es ordinal: hay un orden
  claro, pero no se puede decir cuánto más satisfecho está uno respecto de otro en términos numéricos
  exactos.'
procedimiento:
- 'Paso 1: Identifica que la variable es cualitativa (describe categorías).'
- 'Paso 2: Analiza si existe un orden lógico natural entre esas categorías.'
- 'Paso 3: Si existe un orden claro, la variable es ordinal (a diferencia de la nominal, que no tiene
  orden).'
ejemplos:
- titulo: Clasificar el nivel de satisfacción como ordinal
  enunciado: 'Se pregunta el nivel de satisfacción: bajo, medio, alto.'
  solucion_pasos:
  - Es una variable ordinal, ya que existe un orden claro entre bajo, medio y alto.
- titulo: Clasificar el grado militar como ordinal
  enunciado: Se registra el grado militar de un grupo de oficiales.
  solucion_pasos:
  - Es una variable ordinal, ya que los grados militares siguen una jerarquía establecida.
- titulo: ¿El color de cabello es una variable ordinal?
  respuesta: 'No'
  solucion_pasos:
  - No, es nominal, ya que no existe un orden natural entre los colores de cabello.
- titulo: ¿El nivel socioeconómico (bajo, medio, alto) es una variable ordinal?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que existe un orden claro de progresión entre esos niveles.
errores_frecuentes:
- Confundir variables ordinales con cuantitativas, asumiendo que se pueden hacer operaciones aritméticas
  exactas sobre ellas.
- No reconocer el orden natural de una variable, clasificándola como nominal cuando en realidad es ordinal.
- Asignar distancias numéricas arbitrarias entre categorías ordinales, cuando en realidad esas distancias
  no son medibles con precisión.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
