semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.SUMA_ANGULOS_SENO
titulo: Identidad del seno de una suma de ángulos
objetivo: Aplicar la identidad del seno de una suma de dos ángulos, que expresa sin(α+β) en función de
  los senos y cosenos de α y β por separado.
introduccion: El seno de una suma de ángulos no es la suma de los senos; existe una fórmula específica
  que combina seno y coseno de ambos ángulos.
resumen: Para cualquier par de ángulos $\alpha$ y $\beta$, se cumple $\sin(\alpha+\beta)=\sin\alpha\cos\beta+\cos\alpha\sin\beta$.
explicacion: '![Seno de una suma de ángulos](/static/img/geometria/trigonometria/trigid-suma-angulos-seno.svg)


  ### Definición formal


  Para ángulos $\alpha$ y $\beta$ cualesquiera, $\sin(\alpha+\beta)=\sin\alpha\cos\beta+\cos\alpha\sin\beta$.


  ### Desarrollo didáctico


  En la figura, α=20° y β=35°, con suma α+β=55°. Se puede verificar que sin55°=sin20°cos35°+cos20°sin35°,
  en vez de sumar directamente sin20°+sin35° (que daría un resultado distinto e incorrecto).'
procedimiento:
- 'Paso 1: Identifica los dos ángulos α y β que se están sumando.'
- 'Paso 2: Aplica la fórmula sin(α+β)=sinα·cosβ+cosα·sinβ, sustituyendo los valores conocidos.'
- 'Paso 3: Calcula el resultado, verificando que no sea simplemente la suma de los senos por separado.'
ejemplos:
- titulo: Calcular sin(75°) descomponiéndolo como 45°+30°
  enunciado: sin45°=cos45°=√2/2, sin30°=0,5, cos30°=√3/2.
  solucion_pasos:
  - sin75°=sin45°cos30°+cos45°sin30°=(√2/2)(√3/2)+(√2/2)(0,5)=(√6+√2)/4≈0,966.
- titulo: Verificar que sin(α+β) no es sinα+sinβ
  enunciado: α=30°, β=30°.
  solucion_pasos:
  - sin(30°+30°)=sin60°≈0,866, mientras que sin30°+sin30°=1, valores distintos, confirmando que no se
    puede sumar directamente.
- titulo: ¿Esta identidad involucra tanto seno como coseno de ambos ángulos?
  respuesta: Sí
  solucion_pasos:
  - Sí, la fórmula combina sinα, cosβ, cosα y sinβ.
- titulo: ¿Se puede usar esta identidad para calcular el seno de ángulos no notables descomponiéndolos
    en dos notables?
  respuesta: Sí
  solucion_pasos:
  - Sí, por ejemplo 75°=45°+30°, ambos ángulos notables.
errores_frecuentes:
- Sumar directamente los senos de cada ángulo, en vez de aplicar la fórmula correcta.
- Confundir el orden u operación de la fórmula, por ejemplo restando en vez de sumando los términos.
- Olvidar que se necesitan tanto los senos como los cosenos de ambos ángulos para aplicar la identidad.
fuente: Elaboración propia.
estado: publicado
