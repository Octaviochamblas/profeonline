semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.PARTE_NUMERO
objetivo: Diferenciar la traducción del recíproco respecto del múltiplo, evitando ambigüedades.
introduccion: En español existe una diferencia sutil pero catastrófica entre 'El doble' y 'La mitad'. Uno te hace
  rico, el otro te quita dinero. El lenguaje algebraico debe captar estas sutilezas sin margen de error.
resumen: La **'parte' de un número** se refiere a **fracciones unitarias (recíprocas)** y siempre ubica al número
  de la división en el denominador. Esto contrasta frontalmente con los múltiplos, donde el número va multiplicando.
explicacion: "### Definición formal\n\nLa palabra 'parte' invoca un fraccionamiento, una división de la entidad.\n\
  \n### Desarrollo didáctico\n\nAnálisis comparativo para no perder claridad:\n- 'Doble' $\\rightarrow$ Multiplica\
  \ por 2 ($2x$). \n- 'Mitad' o 'media parte' $\\rightarrow$ Divide por 2 ($\\frac{x}{2}$).\n\n- 'Tercero' o 'El\
  \ triple' $\\rightarrow$ Multiplica por 3 ($3x$).\n- 'Tercera parte' $\\rightarrow$ Divide por 3 ($\\frac{x}{3}$).\n\
  \n- 'Cuádruple' $\\rightarrow$ Multiplica por 4 ($4x$).\n- 'Cuarta parte' $\\rightarrow$ Divide por 4 ($\\frac{x}{4}$).\n\
  \nLa palabra adecuado que indica que la constante va al sótano (al denominador) es la palabra **'parte'**."
procedimiento:
- 'Paso 1: Lee el enunciado buscando el sufijo multiplicador (triple, cuádruple) o el sustantivo fraccionario (tercera
  parte, cuarta parte).'
- 'Paso 2: Si es multiplicador, el número va como coeficiente (arriba, a la izquierda de la variable).'
- 'Paso 3: Si dice ''parte'', el número va automáticamente como denominador debajo de una fracción (y la variable
  arriba).'
ejemplos:
- titulo: El abismo del lenguaje
  enunciado: 'Traduce: ''La quinta parte de un número sumada al quíntuple del mismo número''.'
  solucion_pasos:
  - 'La quinta parte de un número: x/5.'
  - 'El quíntuple del mismo número: 5x.'
  - 'Sumados entre sí: x/5 + 5x.'
- titulo: 'Un problema de control de calidad indica: ''El margen de error del lote debe ser la sexta par'
  enunciado: 'Un problema de control de calidad indica: ''El margen de error del lote debe ser la sexta parte de
    los productos defectuosos admitidos en el lote anterior''. Un técnico novato modela esto como $Error = 6 \cdot
    Defectuosos$. ¿Qué impacto técnico tiene este error de traducción en la producción de la empresa? (v1)


    Opciones: A) El técnico está permitiendo 36 veces más error del solicitado, ya que multiplicó por 6 en lugar
    de dividir por 6. · B) El técnico está reduciendo el error, porque 6 es un número par. · C) Ningún impacto,
    ambas operaciones son equivalentes si se evalúan en cero. · D) Está exigiendo que el error sea la mitad.'
  solucion_pasos:
  - La sexta parte requería dividir entre 6 ($\frac{x}{6}$). Al multiplicar ($6x$), multiplicó el impacto en un
    factor global inmenso en comparación con dividirlo.
  - 'Respuesta: El técnico está permitiendo 36 veces más error del solicitado, ya que multiplicó por 6 en lugar
    de dividir por 6.'
- titulo: Respecto de «Traducción de una parte de un número (mitad, tercera parte, cuarta parte, …)»
  enunciado: 'Respecto de «Traducción de una parte de un número (mitad, tercera parte, cuarta parte, …)»: ¿Se ajusta
    a la definición esta afirmación? «La **''parte'' de un número** se refiere a **fracciones unitarias (recíprocas)**
    y siempre ubica al número de la división en el denominador»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **''parte'' de un número** se refiere a **fracciones unitarias
    (recíprocas)** y siempre ubica al número de la división en el denominador.'
- titulo: Respecto de «Traducción de una parte de un número (mitad, tercera parte, cuarta parte, …)»
  enunciado: 'Respecto de «Traducción de una parte de un número (mitad, tercera parte, cuarta parte, …)»: ¿Es compatible
    con el procedimiento esta afirmación? «Leer ''tercera parte'' y por ansiedad traducirlo como $3x$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **''parte'' de un número** se refiere a **fracciones unitarias
    (recíprocas)** y siempre ubica al número de la división en el denominador.'
errores_frecuentes:
- Leer 'tercera parte' y por ansiedad traducirlo como $3x$.
- Leer 'cuádruple' y traducirlo como $\frac{x}{4}$.
- Provoca que la expresión requiera una raíz cuadrada.
- Para «¿Cuál es el efecto algebraico crítico que provoca la palabra 'parte' (como en 'la cuarta parte') en comparación
  con su prefijo multiplicativo ('el cuádruple')? (v1)», la respuesta correcta es Obliga a que la variable asuma
  un valor negativo.
- Ambas palabras significan matemáticamente lo mismo, solo es una diferencia de estilo.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción de una parte de un número (mitad, tercera parte, cuarta parte, …)
