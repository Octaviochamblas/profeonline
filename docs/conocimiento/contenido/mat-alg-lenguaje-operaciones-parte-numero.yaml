semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.PARTE_NUMERO
objetivo: Diferenciar la traducción del recíproco respecto del múltiplo, evitando
  ambigüedades.
introduccion: En español existe una diferencia sutil pero catastrófica entre 'El doble'
  y 'La mitad'. Uno te hace rico, el otro te quita dinero. El lenguaje algebraico
  debe captar estas sutilezas sin margen de error.
resumen: La **'parte' de un número** se refiere a **fracciones unitarias (recíprocas)**
  y siempre ubica al número de la división en el denominador. Esto contrasta frontalmente
  con los múltiplos, donde el número va multiplicando.
explicacion: "Análisis comparativo para no morir en el intento:\n- 'Doble' $\\rightarrow$\
  \ Multiplica por 2 ($2x$). \n- 'Mitad' o 'media parte' $\\rightarrow$ Divide por\
  \ 2 ($\\frac{x}{2}$).\n\n- 'Tercero' o 'El triple' $\\rightarrow$ Multiplica por\
  \ 3 ($3x$).\n- 'Tercera parte' $\\rightarrow$ Divide por 3 ($\\frac{x}{3}$).\n\n\
  - 'Cuádruple' $\\rightarrow$ Multiplica por 4 ($4x$).\n- 'Cuarta parte' $\\rightarrow$\
  \ Divide por 4 ($\\frac{x}{4}$).\n\nLa palabra mágica que indica que la constante\
  \ va al sótano (al denominador) es la palabra **'parte'**."
procedimiento:
- 'Paso 1: Lee el enunciado buscando el sufijo multiplicador (triple, cuádruple) o
  el sustantivo fraccionario (tercera parte, cuarta parte).'
- 'Paso 2: Si es multiplicador, el número va como coeficiente (arriba, a la izquierda
  de la variable).'
- 'Paso 3: Si dice ''parte'', el número va automáticamente como denominador debajo
  de una fracción (y la variable arriba).'
ejemplos:
- titulo: El abismo del lenguaje
  enunciado: 'Traduce: ''La quinta parte de un número sumada al quíntuple del mismo
    número''.'
  solucion_pasos:
  - 'La quinta parte de un número: x/5.'
  - 'El quíntuple del mismo número: 5x.'
  - 'Sumados entre sí: x/5 + 5x.'
errores_frecuentes:
- Leer 'tercera parte' y por ansiedad traducirlo como $3x$.
- Leer 'cuádruple' y traducirlo como $\frac{x}{4}$.
fuente: Álgebra de Baldor.
estado: publicado
