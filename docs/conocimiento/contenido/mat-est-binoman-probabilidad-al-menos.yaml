semantic_id: MAT.EST.BINOMIAL_ANALISIS.PROBABILIDAD_AL_MENOS
titulo: Calcular la probabilidad acumulada 'al menos k' éxitos
objetivo: Calcular la probabilidad de obtener al menos k éxitos, usualmente mediante el complemento de
  'a lo más (k-1)'.
introduccion: Calcular directamente 'al menos k' puede implicar sumar muchos términos; suele ser más eficiente
  usar el complemento respecto de 'a lo más (k-1)'.
resumen: La probabilidad de obtener al menos $k$ éxitos es $P(X\geq k)=1-P(X\leq k-1)$.
explicacion: '![Cálculo de P(X≥k), ''al menos''](/static/img/probabilidad/binoman/binoman-probabilidad-al-menos.svg)


  ### Definición formal


  $P(X\geq k)=1-P(X\leq k-1)=1-\sum_{i=0}^{k-1}P(X=i)$.


  ### Desarrollo didáctico


  Si $X\sim B(4;\,0{,}3)$, la probabilidad de obtener al menos 2 éxitos es $P(X\geq2)=1-P(X\leq1)=1-0{,}6517=0{,}3483$
  (usando el resultado ya calculado en el tema anterior).'
procedimiento:
- 'Paso 1: Identifica el valor de k que delimita ''al menos'' (el mínimo número de éxitos incluido).'
- 'Paso 2: Calcula P(X≤k-1), la probabilidad acumulada de todos los valores menores que k.'
- 'Paso 3: Resta ese valor de 1 para obtener P(X≥k).'
ejemplos:
- titulo: Calcular P(X≥2) con X~B(4; 0,3)
  enunciado: n=4, p=0,3, 'al menos 2'.
  solucion_pasos:
  - P(X≤1)=0,6517 (calculado previamente). P(X≥2)=1-0,6517=0,3483.
- titulo: Calcular P(X≥1) con X~B(5; 0,2)
  enunciado: n=5, p=0,2, 'al menos 1'.
  solucion_pasos:
  - P(X=0)=0,8⁵=0,32768. P(X≥1)=1-0,32768=0,67232.
- titulo: ¿'Al menos k' es el complemento de 'a lo más (k-1)'?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que 'al menos k' y 'a lo más (k-1)' cubren todos los casos posibles sin superposición.
- titulo: ¿P(X≥0) siempre es igual a 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que cualquier valor de X es siempre mayor o igual a 0.
errores_frecuentes:
- Calcular 'al menos k' sumando directamente desde k hasta n, en vez de usar el complemento más eficiente.
- Confundir el valor límite, calculando P(X≤k) en vez de P(X≤k-1) al aplicar el complemento.
- Olvidar que 'al menos 1' es un caso muy común, calculado como 1-P(X=0).
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
