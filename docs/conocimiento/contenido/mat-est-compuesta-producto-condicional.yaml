semantic_id: MAT.EST.PROBA_COMPUESTA_CONDICIONAL.PRODUCTO_CONDICIONAL
titulo: Cálculo de P(A∩B) mediante P(A)·P(B|A)
objetivo: Calcular la probabilidad de la intersección de dos eventos usando la forma equivalente P(A)×P(B|A),
  eligiendo el evento que conviene condicionar primero.
introduccion: La regla multiplicativa puede escribirse de dos formas equivalentes, y conviene elegir la
  que use los datos disponibles del problema de forma más directa.
resumen: La probabilidad de la intersección también puede calcularse como $P(A\cap B)=P(A)\times P(B|A)$,
  condicionando en el orden opuesto al de la fórmula original.
explicacion: '![Cálculo del producto condicional](/static/img/probabilidad/compuesta/compuesta-producto-condicional.svg)


  ### Definición formal


  Como la intersección es conmutativa ($A\cap B=B\cap A$), se cumple $P(A)\times P(B|A)=P(B)\times P(A|B)$,
  ambas formas válidas para calcular $P(A\cap B)$.


  ### Desarrollo didáctico


  Si se conoce P(primera carta sea as)=4/52 y P(segunda carta sea as|primera fue as)=3/51, se calcula
  P(ambas ases)=P(A)×P(B|A)=(4/52)×(3/51).'
procedimiento:
- 'Paso 1: Identifica cuál de los dos eventos conviene tomar como ''primero'' según el orden natural del
  problema (por ejemplo, extracciones sucesivas).'
- 'Paso 2: Calcula P(A) sin condición, y P(B|A) considerando que A ya ocurrió.'
- 'Paso 3: Multiplica ambos valores para obtener P(A∩B).'
ejemplos:
- titulo: Calcular P(dos ases seguidos) usando este orden
  enunciado: P(1ra as)=4/52, P(2da as|1ra as)=3/51.
  solucion_pasos:
  - P(ambas ases)=(4/52)×(3/51)=12/2652=1/221.
- titulo: Calcular con valores decimales
  enunciado: P(A)=0,7, P(B|A)=0,4.
  solucion_pasos:
  - P(A∩B)=0,7×0,4=0,28.
- titulo: ¿Ambas formas de la regla multiplicativa dan el mismo resultado para P(A∩B)?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, ya que la intersección es conmutativa: A∩B=B∩A.'
- titulo: ¿Se puede elegir libremente qué evento condicionar primero según los datos disponibles?
  respuesta: Sí
  solucion_pasos:
  - Sí, se elige la forma que use más directamente los datos ya conocidos del problema.
errores_frecuentes:
- Confundir P(A)×P(B|A) con P(A)×P(B), ignorando la dependencia entre los eventos.
- Usar datos de P(A|B) cuando el problema en realidad proporciona P(B|A), sin ajustar correctamente la
  fórmula.
- Multiplicar en el orden incorrecto de las extracciones sucesivas, invirtiendo cuál evento ocurre primero.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
