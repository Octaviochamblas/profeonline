semantic_id: MAT.GEO.CIRCULO_TEOREMAS.SECANTES_PRODUCTO
titulo: Teorema de las secantes como igualdad de productos entre segmento exterior y segmento total
objetivo: Aplicar el teorema de las secantes para calcular longitudes desconocidas mediante la igualdad
  de productos entre el segmento exterior y el segmento total de dos secantes trazadas desde un punto
  exterior.
introduccion: Al igual que ocurre con las cuerdas dentro del círculo, dos secantes trazadas desde un punto
  exterior cumplen una relación de productos entre sus segmentos.
resumen: Si desde un punto exterior $P$ se trazan dos secantes, cortando la circunferencia en $A,B$ (la
  primera) y $C,D$ (la segunda), entonces $PA\times PB = PC\times PD$ (segmento exterior por segmento
  total, en cada secante).
explicacion: '![Teorema de las secantes: PA×PB = PC×PD](/static/img/geometria/circunferencia-circulo/circulo-teorema-secantes-producto.svg)


  ### Definición formal


  Si desde un punto exterior $P$ se trazan dos secantes que cortan la circunferencia en $A,B$ y $C,D$
  respectivamente (siendo $A$ y $C$ los puntos cercanos), se cumple $PA\times PB=PC\times PD$. Se demuestra
  mediante semejanza de los triángulos $PAD$ y $PCB$ (ángulo en $P$ compartido y ángulos inscritos iguales).


  ### Desarrollo didáctico


  Si $PA=3$ cm, $PB=8$ cm y $PC=4$ cm, entonces $3\times8=4\times PD$, de donde $PD=\frac{24}{4}=6$ cm.
  Este teorema es análogo al de las cuerdas, pero con el punto de referencia fuera de la circunferencia.'
procedimiento:
- 'Paso 1: Identifica el punto exterior P y los segmentos exterior y total de cada una de las dos secantes.'
- 'Paso 2: Plantea la igualdad PA×PB=PC×PD, sustituyendo los valores conocidos.'
- 'Paso 3: Despeja el segmento desconocido a partir de la ecuación planteada.'
ejemplos:
- titulo: Calcular un segmento desconocido usando el teorema de las secantes
  enunciado: PA=3 cm, PB=8 cm, PC=4 cm.
  solucion_pasos:
  - 3×8=4×PD → 24=4×PD → PD=24/4=6 cm.
- titulo: Verificar la igualdad de productos entre dos secantes
  enunciado: PA=5 cm, PB=9 cm, PC=3 cm, PD=15 cm.
  solucion_pasos:
  - PA×PB=5×9=45; PC×PD=3×15=45; ambos productos son iguales, la configuración es consistente.
- titulo: ¿El producto exterior×total de una secante es igual al de la otra secante?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la igualdad que establece el teorema de las secantes.
- titulo: ¿Este teorema requiere que ambas rectas sean secantes (no tangentes)?
  respuesta: Sí
  solucion_pasos:
  - Sí, si una de las rectas fuera tangente, se aplicaría el teorema de la tangente y la secante, con
    una fórmula distinta.
errores_frecuentes:
- Multiplicar el segmento exterior de una secante por el segmento total de la otra, en vez de mantener
  cada producto dentro de su propia secante.
- Confundir el segmento exterior con el segmento total al sustituir en la ecuación.
- Aplicar este teorema cuando una de las rectas es tangente, en vez de usar la fórmula específica de tangente-secante.
fuente: 'Elaboración propia (referencias: Moraleja 75, Cid 132).'
estado: publicado
