semantic_id: MAT.ALG.TERMINO.SIGNO_TERMINO
objetivo: Identificar y clasificar el signo de un término algebraico (positivo o negativo).
introduccion: En el álgebra, ningún vagón de tren viaja sin placa patente. Esa placa puede ser positiva (+) o negativa
  (-), e indica la naturaleza y dirección de esa cantidad matemática.
resumen: "El **Signo** es la primera parte de un término. \n- Son **términos positivos** los que van precedidos\
  \ del signo $+$.\n- Son **términos negativos** los que van precedidos del signo $-$.\n- **Regla de oro:** Cuando\
  \ un término no va precedido de ningún signo, se asume que es positivo."
explicacion: "### Definición formal\n\nAl igual que con los números ordinarios, la falta de signo asume el signo\
  \ positivo (+).\n\n### Desarrollo didáctico\n\nEl signo es el estructura de la suma y resta. \nSi tienes la expresión:\
  \ $4a - 5b + c$\n1. El término $4a$ no tiene signo escrito adelante. Automáticamente, es un $+4a$.\n2. El término\
  \ $-5b$ tiene un signo negativo. Pertenece al equipo negativo.\n3. El término $+c$ tiene un signo positivo. \n\
  \nNunca asumas que el signo '-' es 'una resta que le pertenece al espacio'. El signo le pertenece exclusivamente\
  \ al término que está INMEDIATAMENTE a su derecha. En $-5b$, el menos es parte inseparable del $5b$."
procedimiento:
- 'Paso 1: Mira el extremo izquierdo del término que estás analizando.'
- 'Paso 2: Si hay un signo ''-'' escrito explícitamente, el término es negativo.'
- 'Paso 3: Si hay un signo ''+'' o si no hay absolutamente NADA escrito, el término es positivo.'
ejemplos:
- titulo: El dueño del signo
  enunciado: 'Determina los signos de los términos de la expresión: x - 3y + 2z - 8'
  solucion_pasos:
  - 'Término ''x'': No tiene signo visible al principio. Es positivo (+).'
  - 'Término ''3y'': Tiene un ''-'' a la izquierda. Es negativo (-).'
  - 'Término ''2z'': Tiene un ''+'' a la izquierda. Es positivo (+).'
  - 'Término ''8'': Tiene un ''-'' a la izquierda. Es negativo (-).'
- titulo: Un profesor presenta el modelo de utilidades $U = I - G$, donde $I$ son los ingresos y $G$ s
  enunciado: 'Un profesor presenta el modelo de utilidades $U = I - G$, donde $I$ son los ingresos y $G$ son los
    gastos fijos. Un estudiante decide reorganizar la fórmula colocando los gastos primero para enfatizarlos, escribiendo
    $U = G - I$. ¿Es correcta esta modificación a nivel algebraico de los signos? (v1)


    Opciones: A) Es incorrecta, debió escribir $U = -G + I$ para respetar el signo original que le pertenecía a
    cada término. · B) Es correcta, porque el orden de los factores no altera el resultado. · C) Es correcta, porque
    en álgebra las letras siempre deben ser positivas sin importar su lugar. · D) Es incorrecta, porque jamás se
    puede iniciar una fórmula con una letra de gasto.'
  solucion_pasos:
  - 'En I - G, la G es negativa y la I es positiva. Al mover los vagones, deben llevarse su placa patente consigo:
    -G + I.'
  - 'Respuesta: Es incorrecta, debió escribir $U = -G + I$ para respetar el signo original que le pertenecía a cada
    término.'
- titulo: 'Respecto de «Identificación del signo de un término»: ¿Se ajusta a la definición esta afirma'
  enunciado: 'Respecto de «Identificación del signo de un término»: ¿Se ajusta a la definición esta afirmación?
    «El **Signo** es la primera parte de un término»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Signo** es la primera parte de un término.'
- titulo: 'Respecto de «Identificación del signo de un término»: ¿Es compatible con el procedimiento es'
  enunciado: 'Respecto de «Identificación del signo de un término»: ¿Es compatible con el procedimiento esta afirmación?
    «Creer que si la letra es negativa, el término completo cambia de naturaleza (El signo del término lo dicta
    el ''+'' o ''-'' exterior, independiente del valor oculto que pueda tener la variable)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Signo** es la primera parte de un término.'
errores_frecuentes:
- Creer que si la letra es negativa, el término completo cambia de naturaleza (El signo del término lo dicta el
  '+' o '-' exterior, independiente del valor oculto que pueda tener la variable).
- Asignarle el signo al término que está a la izquierda del signo, en lugar de al que está a la derecha.
- Indica que el término es equivalente a cero.
- Indica que falta información y la ecuación es irresoluble.
- Indica que el término es estrictamente negativo.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Identificación del signo de un término
