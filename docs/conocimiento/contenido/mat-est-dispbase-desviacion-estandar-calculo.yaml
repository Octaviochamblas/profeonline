semantic_id: MAT.EST.DISPERSION_BASE.DESVIACION_ESTANDAR_CALCULO
titulo: Calcular la desviación estándar para datos no agrupados
objetivo: Calcular la desviación estándar de un conjunto de datos no agrupados a partir de su varianza.
introduccion: Para obtener la desviación estándar solo falta un paso más después de calcular la varianza, sacarle la
  raíz cuadrada.
resumen: La desviación estándar se calcula obteniendo primero la varianza del conjunto de datos y luego aplicando la
  raíz cuadrada a ese resultado.
explicacion: '![Cálculo de la desviación estándar](/static/img/estadistica/dispbase/dispbase-desviacion-estandar-calculo.svg)


  ### Definición formal


  Se calcula con $\sigma = \sqrt{\dfrac{\sum (x_i-\bar{x})^2}{n}}$, es decir, la raíz cuadrada del promedio de las

  desviaciones al cuadrado.


  ### Desarrollo didáctico


  Por ejemplo, si la varianza de un conjunto es $6{,}25$, la desviación estándar es $\sqrt{6{,}25}=2{,}5$, en las mismas

  unidades que los datos originales.'
procedimiento:
- 'Paso 1: Calcula la media aritmética del conjunto de datos.'
- 'Paso 2: Calcula la varianza usando las desviaciones al cuadrado.'
- 'Paso 3: Aplica la raíz cuadrada a la varianza para obtener la desviación estándar.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si la varianza de un conjunto de datos es 6,25, calcula la desviación estándar.
  solucion_pasos:
  - $\sigma = \sqrt{6{,}25}$.
  - $\sigma = 2{,}5$.
- titulo: Ejemplo 2
  enunciado: Para el conjunto $\{2, 4, 6\}$ con varianza $2{,}67$, ¿cuál es aproximadamente su desviación estándar?
  solucion_pasos:
  - $\sigma = \sqrt{2{,}67}$.
  - $\sigma \approx 1{,}63$.
- titulo: ¿Se necesita calcular primero la varianza para obtener la desviación estándar?
  respuesta: Sí
  solucion_pasos:
  - Sí, la desviación estándar depende directamente de la varianza.
- titulo: ¿La desviación estándar se calcula elevando la varianza al cuadrado?
  respuesta: 'No'
  solucion_pasos:
  - 'No, se calcula aplicando la raíz cuadrada a la varianza, no elevándola al cuadrado.'
errores_frecuentes:
- Elevar la varianza al cuadrado en vez de calcular su raíz cuadrada.
- Calcular la raíz cuadrada antes de haber calculado correctamente la varianza.
- Confundir el resultado final con la varianza misma.
- Cometer errores aritméticos al calcular la raíz cuadrada de números decimales.
- Olvidar expresar el resultado en las unidades correctas del contexto del problema.
fuente: 'Elaboración propia (referencia: Moraleja 238, 296).'
estado: publicado
