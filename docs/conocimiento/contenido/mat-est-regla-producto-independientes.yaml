semantic_id: MAT.EST.REGLAS_PROBABILIDAD.PRODUCTO_INDEPENDIENTES
titulo: Regla del producto para eventos independientes
objetivo: Aplicar la regla del producto para calcular la probabilidad de que ocurran dos eventos independientes
  simultáneamente, multiplicando sus probabilidades individuales.
introduccion: Cuando dos eventos no se afectan entre sí (por ejemplo, lanzar una moneda y un dado por
  separado), la probabilidad de que ambos ocurran a la vez se obtiene multiplicando sus probabilidades
  individuales.
resumen: Si $A$ y $B$ son eventos independientes, la probabilidad de que ocurran ambos simultáneamente
  es $P(A\cap B)=P(A)\times P(B)$.
explicacion: '![Regla del producto para eventos independientes](/static/img/probabilidad/reglas/regla-producto-independientes.svg)


  ### Definición formal


  Dos eventos $A$ y $B$ son independientes si la ocurrencia de uno no afecta la probabilidad del otro.
  En ese caso, $P(A\cap B)=P(A)\times P(B)$.


  ### Desarrollo didáctico


  Al lanzar una moneda y un dado simultáneamente, el evento ''obtener cara y un 6'' tiene probabilidad
  $P=\dfrac{1}{2}\times\dfrac{1}{6}=\dfrac{1}{12}$, ya que ambos experimentos son independientes entre
  sí.'
procedimiento:
- 'Paso 1: Verifica que los eventos A y B sean independientes (la ocurrencia de uno no afecta al otro).'
- 'Paso 2: Calcula las probabilidades individuales P(A) y P(B).'
- 'Paso 3: Multiplica ambas probabilidades para obtener P(A∩B).'
ejemplos:
- titulo: Calcular P(cara y 6) al lanzar moneda y dado
  enunciado: P(cara)=1/2, P(6)=1/6.
  solucion_pasos:
  - P(cara y 6)=1/2×1/6=1/12.
- titulo: Calcular la probabilidad de dos eventos independientes con decimales
  enunciado: P(A)=0,3, P(B)=0,4.
  solucion_pasos:
  - P(A∩B)=0,3×0,4=0,12.
- titulo: ¿Esta regla requiere que los eventos sean independientes?
  respuesta: Sí
  solucion_pasos:
  - Sí, si fueran dependientes, se necesitaría ajustar el cálculo usando probabilidad condicional.
- titulo: ¿Lanzar dos dados por separado son eventos independientes entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, el resultado de un dado no afecta en absoluto al resultado del otro.
errores_frecuentes:
- Sumar las probabilidades en vez de multiplicarlas para eventos independientes.
- Aplicar esta regla a eventos que en realidad son dependientes entre sí.
- Confundir 'eventos independientes' con 'eventos mutuamente excluyentes' (son conceptos distintos).
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
