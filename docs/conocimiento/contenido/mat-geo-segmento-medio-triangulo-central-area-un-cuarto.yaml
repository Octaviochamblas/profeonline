semantic_id: MAT.GEO.SEGMENTO_MEDIO.TRIANGULO_CENTRAL_AREA_UN_CUARTO
titulo: Razón de área 1:4 entre el triángulo central formado por segmentos medios y el triángulo original
objetivo: Calcular la razón de área entre el triángulo medial (central) y el triángulo original a partir
  de sus tres segmentos medios.
introduccion: Como los cuatro triángulos formados por los segmentos medios son congruentes, el central
  (llamado triángulo medial) ocupa exactamente una cuarta parte del área total del triángulo original.
resumen: El triángulo medial, formado por los tres segmentos medios, tiene un área igual a 1/4 del área
  del triángulo original.
explicacion: '![Triángulo medial con un cuarto del área](/static/img/geometria/elementos-secundarios/segmento-medio-triangulo-central-area-un-cuarto.svg)


  ### Definición formal


  Si el triángulo medial MNP se forma uniendo los puntos medios de los lados de un triángulo ABC, entonces
  $\text{Área}(MNP)=\frac{1}{4}\text{Área}(ABC)$.


  ### Desarrollo didáctico


  Si el triángulo original tiene área 20, el triángulo medial (central) tiene área 20/4=5. Esto es consistente
  con que los cuatro triángulos congruentes formados reparten el área total en 4 partes iguales.'
procedimiento:
- 'Paso 1: Identifica el área del triángulo original.'
- 'Paso 2: Divide esa área entre 4.'
- 'Paso 3: Ese resultado es el área del triángulo medial (central).'
ejemplos:
- titulo: Calcular el área del triángulo medial
  enunciado: Un triángulo tiene área 28.
  solucion_pasos:
  - El triángulo medial tiene área 28/4=7.
- titulo: Calcular el área original desde el medial
  enunciado: El triángulo medial tiene área 6.
  solucion_pasos:
  - El triángulo original tiene área 6×4=24.
- titulo: ¿El triángulo medial es semejante al original?
  respuesta: Sí
  solucion_pasos:
  - Sí, con razón de semejanza 1:2 (por eso la razón de áreas es 1:4).
- titulo: ¿La razón de área 1:4 depende del tipo de triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, se cumple en cualquier triángulo.
errores_frecuentes:
- Confundir la razón de áreas (1:4) con la razón de lados (1:2).
- Multiplicar por 4 en vez de dividir al calcular el área del triángulo medial.
- Creer que esta razón cambia según la forma del triángulo original.
fuente: Elaboración propia.
estado: publicado
