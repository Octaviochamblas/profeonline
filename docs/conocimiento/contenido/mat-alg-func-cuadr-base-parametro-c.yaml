semantic_id: MAT.ALG.FUNC_CUADR_BASE.PARAMETRO_C
titulo: Identificación del término independiente c en la expresión funcional
objetivo: Identificar correctamente el término independiente $c$ en una función cuadrática dada en forma general.
introduccion: El término independiente es el único que no lleva la incógnita $x$ acompañándolo; es simplemente
  un número suelto en la regla de la función.
resumen: El **término independiente $c$** de una función cuadrática $f(x)=ax^2+bx+c$ es el número que no está
  multiplicado por ninguna potencia de $x$; coincide con el valor $f(0)$.
explicacion: '### Definición formal


  En $f(x)=ax^2+bx+c$, el término independiente $c$ es el número real que no acompaña a ninguna potencia de
  $x$. Evaluando la función en $x=0$: $f(0)=a(0)^2+b(0)+c=c$, por lo que $c$ coincide exactamente con $f(0)$.


  ### Desarrollo didáctico


  Para identificar $c$, se localiza el término numérico que aparece solo, sin ninguna $x$ junto a él. Alternativamente,
  se puede calcular $f(0)$ directamente.


  En $f(x)=2x^2-6x+9$, el término independiente es $9$, y en efecto $f(0)=2(0)^2-6(0)+9=9$.'
procedimiento:
- 'Paso 1: Ordena la función en forma general si aún no lo está.'
- 'Paso 2: Localiza el término numérico que no está multiplicado por ninguna potencia de $x$.'
- 'Paso 3: Ese número, con su signo, es el término independiente $c$; si no aparece, $c=0$.'
ejemplos:
- titulo: Identificación directa del término independiente
  enunciado: 'Identifica el término independiente $c$ en $f(x)=3x^2-8x+5$.'
  solucion_pasos:
  - El único término sin $x$ es $5$.
  - '$c=5$.'
- titulo: Identificación de término independiente nulo
  enunciado: 'Identifica el término independiente $c$ en $f(x)=6x^2+x$.'
  solucion_pasos:
  - No hay ningún término numérico suelto.
  - '$c=0$.'
- titulo: ¿El término independiente $c$ coincide siempre con $f(0)$?
  enunciado: ¿El término independiente $c$ coincide siempre con $f(0)$?
  respuesta: Sí
  solucion_pasos:
  - Al evaluar $f(0)$, los términos con $x$ se anulan, dejando exactamente el valor de $c$.
- titulo: ¿El término independiente debe ser distinto de cero para que la función sea cuadrática?
  enunciado: ¿El término independiente debe ser distinto de cero para que la función sea cuadrática?
  respuesta: 'No'
  solucion_pasos:
  - Solo se exige que $a$ sea distinto de cero; $c$ puede valer cero sin afectar el carácter cuadrático.
errores_frecuentes:
- Olvidar identificar $c=0$ cuando el término independiente no aparece explícitamente en la función.
- Confundir el término independiente con el coeficiente $b$ cuando la función no está ordenada.
- No relacionar el término independiente con el valor de $f(0)$, perdiendo un atajo útil de verificación.
- Omitir el signo negativo del término independiente al leer su valor.
