semantic_id: MAT.ALG.SIMILARIDAD.ORDEN_LITERAL_DISTINTO
objetivo: Comprender que el orden de los factores literales no altera la semejanza
  de los términos algebraicos.
introduccion: '¿Es $3 \times 4$ lo mismo que $4 \times 3$? Sí, ambos dan 12. En álgebra
  pasa igual: las letras que se multiplican pueden cambiar de lugar sin alterar el
  resultado.'
resumen: El **Orden Literal Distinto** es una trampa visual. Como las letras de un
  término se están multiplicando, la propiedad conmutativa aplica. Por lo tanto, $xy$
  es **exactamente lo mismo** que $yx$.
explicacion: 'Mira estos dos términos: $5ab^2$ y $-2b^2a$.

  A primera vista, parecen diferentes. Pero analicemos:

  - ¿Tienen las mismas letras? Sí, ambos tienen ''a'' y ''b''.

  - ¿Tienen los mismos exponentes letra por letra? La ''a'' está elevada a 1 en ambos.
  La ''b'' está elevada a 2 en ambos.

  Conclusión: ¡Son totalmente semejantes!


  Para evitar confusiones, la convención matemática recomienda **ordenar las letras
  alfabéticamente**. Así, $-2b^2a$ se reescribe como $-2ab^2$, y la semejanza se hace
  evidente de inmediato.'
procedimiento:
- 'Paso 1: Si ves letras desordenadas, toma tu lápiz y reescribe cada término ordenando
  sus letras alfabéticamente.'
- 'Paso 2: Asegúrate de que cada letra conserve su exponente original al moverla.'
- 'Paso 3: Ahora compara los factores literales ya ordenados. Si coinciden, son semejantes.'
ejemplos:
- titulo: El disfraz del desorden
  enunciado: ¿Son semejantes 4xzy y 9yxz?
  solucion_pasos:
  - 'Ordenamos el primero alfabéticamente: 4xyz.'
  - 'Ordenamos el segundo alfabéticamente: 9xyz.'
  - 'Comparamos: xyz es idéntico a xyz.'
  - Sí, son semejantes.
errores_frecuentes:
- Descartar la semejanza simplemente porque visualmente las letras no están en el
  mismo orden.
- Al ordenar, pasar el exponente de una letra a otra (ej. cambiar $a^2b$ a $ab^2$).
fuente: Álgebra de Baldor.
estado: publicado
