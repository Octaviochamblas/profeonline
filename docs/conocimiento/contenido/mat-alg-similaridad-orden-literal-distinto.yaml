semantic_id: MAT.ALG.SIMILARIDAD.ORDEN_LITERAL_DISTINTO
objetivo: Comprender que el orden de los factores literales no altera la semejanza de los términos algebraicos.
introduccion: '¿Es $3 \times 4$ lo mismo que $4 \times 3$? Sí, ambos dan 12. En álgebra pasa igual: las letras que
  se multiplican pueden cambiar de lugar sin alterar el resultado.'
resumen: El **Orden Literal Distinto** es una confusión visual. Como las letras de un término se están multiplicando,
  la propiedad conmutativa aplica. Por lo tanto, $xy$ es **exactamente lo mismo** que $yx$.
explicacion: '### Definición formal


  Las variables $x^2$ e $y$ se están multiplicando entre sí. Por la propiedad conmutativa, $x^2 \cdot y = y \cdot
  x^2$.


  ### Desarrollo didáctico


  Mira estos dos términos: $5ab^2$ y $-2b^2a$.

  A primera vista, parecen diferentes. Pero analicemos:

  - ¿Tienen las mismas letras? Sí, ambos tienen ''a'' y ''b''.

  - ¿Tienen los mismos exponentes letra por letra? La ''a'' está elevada a 1 en ambos. La ''b'' está elevada a 2
  en ambos.

  Conclusión: Son totalmente semejantes.


  Para evitar confusiones, la convención matemática recomienda **ordenar las letras alfabéticamente**. Así, $-2b^2a$
  se reescribe como $-2ab^2$, y la semejanza se hace evidente de inmediato.'
procedimiento:
- 'Paso 1: Si ves letras desordenadas, toma tu lápiz y reescribe cada término ordenando sus letras alfabéticamente.'
- 'Paso 2: Asegúrate de que cada letra conserve su exponente original al moverla.'
- 'Paso 3: Ahora compara los factores literales ya ordenados. Si coinciden, son semejantes.'
ejemplos:
- titulo: El disfraz del desorden
  enunciado: ¿Son semejantes 4xzy y 9yxz?
  solucion_pasos:
  - 'Ordenamos el primero alfabéticamente: 4xyz.'
  - 'Ordenamos el segundo alfabéticamente: 9xyz.'
  - 'Comparamos: xyz es idéntico a xyz.'
  - Sí, son semejantes.
- titulo: La energía de dos sistemas físicos se describe por las ecuaciones $E_1 = 4m^2v$ y $E_2 = -3v
  enunciado: 'La energía de dos sistemas físicos se describe por las ecuaciones $E_1 = 4m^2v$ y $E_2 = -3vm^2$.
    Si se requiere calcular la energía neta ($E_1 + E_2$), ¿cuál es la expresión reducida correcta? (v1)


    Opciones: A) $m^2v$ · B) $7m^2v$ · C) $m^4v^2$ · D) Las expresiones no se pueden sumar.'
  solucion_pasos:
  - '$vm^2$ se reescribe como $m^2v$. Tenemos $4m^2v - 3m^2v$. Como son semejantes, restamos coeficientes: $4 -
    3 = 1$. Queda $1m^2v$, que se escribe $m^2v$.'
- titulo: 'Respecto de «Identificación de términos semejantes con orden literal distinto»: ¿Es correcta'
  enunciado: 'Respecto de «Identificación de términos semejantes con orden literal distinto»: ¿Es correcta esta
    caracterización? «El **Orden Literal Distinto** es una confusión visual»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Orden Literal Distinto** es una confusión visual.'
- titulo: 'Respecto de «Identificación de términos semejantes con orden literal distinto»: ¿Es válida e'
  enunciado: 'Respecto de «Identificación de términos semejantes con orden literal distinto»: ¿Es válida esta afirmación?
    «Descartar la semejanza simplemente porque visualmente las letras no están en el mismo orden»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Orden Literal Distinto** es una confusión visual.'
errores_frecuentes:
- Descartar la semejanza simplemente porque visualmente las letras no están en el mismo orden.
- Al ordenar, pasar el exponente de una letra a otra (ej. cambiar $a^2b$ a $ab^2$).
- En la propiedad distributiva de la multiplicación sobre la suma.
- Para «¿En qué propiedad matemática se basa el hecho de que el término $x^2y$ sea semejante al término $yx^2$?
  (v1)», la respuesta correcta es En la regla de los signos.
- En la propiedad asociativa de la adición.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Identificación de términos semejantes con orden literal distinto
