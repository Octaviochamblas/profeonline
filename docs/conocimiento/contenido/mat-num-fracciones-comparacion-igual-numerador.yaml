semantic_id: MAT.NUM.FRACCIONES_COMPARACION.IGUAL_NUMERADOR
titulo: Comparación de fracciones con igual numerador
objetivo: Ordenar fracciones que comparten el mismo numerador.
introduccion: Cuando dos fracciones toman la misma cantidad de partes pero el entero está dividido en
  distinta cantidad, la fracción con menos divisiones representa partes más grandes.
resumen: Si dos fracciones tienen igual numerador, es mayor la que tiene menor denominador.
explicacion: '### Definición formal


  Si \(a>0\), entonces \(\frac{a}{b_1}>\frac{a}{b_2} \iff b_1<b_2\), porque al dividir el entero en menos
  partes, cada parte es más grande.


  ### Desarrollo didáctico


  Entre \(\frac{3}{4}\) y \(\frac{3}{7}\), ambas toman 3 partes, pero en la primera el entero se dividió
  en 4 partes (más grandes) y en la segunda en 7 (más pequeñas); por eso \(\frac{3}{4}>\frac{3}{7}\).'
procedimiento:
- 'Paso 1: Verifica que los numeradores coincidan y que las fracciones sean positivas.'
- 'Paso 2: Compara los denominadores: más partes implican partes más pequeñas.'
- 'Paso 3: Ordena de forma inversa a los denominadores y comprueba con un dibujo o decimal.'
ejemplos:
- titulo: Aplicación razonada — Comparación de fracciones de igual numerador
  enunciado: Entre \(\frac{3}{4}\) y \(\frac{3}{7}\), la mayor es \(\frac{3}{4}\).
  solucion_pasos:
  - Verifica que los numeradores coincidan y que las fracciones sean positivas.
  - 'Compara los denominadores: más partes implican partes más pequeñas.'
  - Ordena de forma inversa a los denominadores y comprueba con un dibujo o decimal.
- titulo: Revisión de una solución — Comparación de fracciones de igual numerador
  enunciado: 'Una solución aplica “Compara los denominadores: más partes implican partes más pequeñas.”,
    pero termina sin comprobar que con el mismo número de partes tomadas, conviene mirar el tamaño de
    cada parte. Determina qué falta justificar.'
  solucion_pasos:
  - 'Vuelve a la condición que define comparación de fracciones de igual numerador: si dos fracciones
    positivas tienen igual numerador, es mayor la que tiene menor denominador.'
  - Verifica que los numeradores coincidan y que las fracciones sean positivas.
  - 'Completa la revisión con este control: Ordena de forma inversa a los denominadores y comprueba con
    un dibujo o decimal.'
- titulo: ¿Se cumple que con el mismo número de partes tomadas, conviene mirar el tamaño de cada parte?
    — Comparación de fracciones de igual numerador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que si dos fracciones positivas tienen igual numerador, es
    mayor la que tiene menor denominador.
  - El caso “Entre \(\frac{3}{4}\) y \(\frac{3}{7}\), la mayor es \(\frac{3}{4}\)” satisface esa condición.
  - Ordena de forma inversa a los denominadores y comprueba con un dibujo o decimal.
- titulo: ¿Es válido omitir el paso “Verifica que los numeradores coincidan y que las fracciones sean
    positivas”? — Comparación de fracciones de igual numerador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de comparación de fracciones de igual numerador.
  - 'Omitirlo puede volver inválida la acción siguiente: Compara los denominadores: más partes implican
    partes más pequeñas.'
  - 'La solución debe terminar de este modo: Ordena de forma inversa a los denominadores y comprueba con
    un dibujo o decimal.'
errores_frecuentes:
- 'Empezar comparación de fracciones de igual numerador sin realizar este control inicial: Verifica que
  los numeradores coincidan y que las fracciones sean positivas.'
- Memorizar “Entre \(\frac{3}{4}\) y \(\frac{3}{7}\), la mayor es \(\frac{3}{4}\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- 'Convertir en receta el paso “Compara los denominadores: más partes implican partes más pequeñas.” y
  usarlo aunque cambien las condiciones del problema.'
- Dar por válida una conclusión sobre comparación de fracciones de igual numerador que contradice el criterio
  “Con el mismo número de partes tomadas, conviene mirar el tamaño de cada parte”.
- 'Cerrar el ejercicio sin esta comprobación específica: Ordena de forma inversa a los denominadores y
  comprueba con un dibujo o decimal.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
