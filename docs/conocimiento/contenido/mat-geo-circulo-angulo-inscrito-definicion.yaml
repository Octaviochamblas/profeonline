semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_INSCRITO_DEFINICION
titulo: Definición de ángulo inscrito en una circunferencia
objetivo: 'Identificar y definir el ángulo inscrito: aquel cuyo vértice está sobre la circunferencia y
  cuyos lados son dos cuerdas.'
introduccion: Cuando el vértice de un ángulo se ubica sobre la propia circunferencia (en vez de en el
  centro), y sus lados son cuerdas, se forma un ángulo inscrito.
resumen: Un ángulo inscrito es aquel cuyo vértice pertenece a la circunferencia y cuyos lados son dos
  cuerdas que parten de ese vértice.
explicacion: '![Ángulo inscrito en la circunferencia](/static/img/geometria/circunferencia-circulo/circulo-angulo-inscrito-definicion.svg)


  ### Definición formal


  Un ángulo inscrito es un ángulo cuyo vértice $C$ está sobre la circunferencia y cuyos lados son dos
  cuerdas, $CA$ y $CB$, que unen el vértice con otros dos puntos de la circunferencia. El arco $AB$ que
  no contiene a $C$ se llama arco subtendido por el ángulo inscrito.


  ### Desarrollo didáctico


  En la figura, $C$ es un punto de la circunferencia distinto de $A$ y $B$. El ángulo $\angle ACB$, formado
  por las cuerdas $CA$ y $CB$, es un ángulo inscrito que subtiende el arco $AB$ (el arco que no contiene
  a $C$).'
procedimiento:
- 'Paso 1: Verifica que el vértice del ángulo esté sobre la circunferencia (no en el centro ni fuera de
  ella).'
- 'Paso 2: Identifica las dos cuerdas que forman los lados del ángulo.'
- 'Paso 3: Reconoce el arco subtendido: el arco comprendido entre los extremos de las cuerdas que NO contiene
  al vértice.'
ejemplos:
- titulo: Identificar un ángulo inscrito
  enunciado: En una circunferencia, C, A y B son puntos de ella, y se trazan las cuerdas CA y CB.
  solucion_pasos:
  - El ángulo ∠ACB, con vértice C sobre la circunferencia y lados las cuerdas CA y CB, es un ángulo inscrito.
- titulo: Reconocer el arco subtendido
  enunciado: El ángulo inscrito ∠ACB tiene vértice C, con A y B en la circunferencia.
  solucion_pasos:
  - El arco subtendido es el arco AB que no contiene al punto C.
- titulo: ¿El vértice de un ángulo inscrito está sobre la circunferencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición, el vértice de un ángulo inscrito siempre pertenece a la circunferencia.
- titulo: ¿Los lados de un ángulo inscrito son radios?
  respuesta: 'No'
  solucion_pasos:
  - No, los lados de un ángulo inscrito son cuerdas, no radios (a diferencia del ángulo del centro).
errores_frecuentes:
- Confundir el ángulo inscrito con el ángulo del centro (vértice en el centro, no en la circunferencia).
- 'Identificar el arco incorrecto: tomar el arco que sí contiene al vértice C en vez del que no lo contiene.'
- Creer que los lados del ángulo inscrito son radios en vez de cuerdas.
fuente: 'Elaboración propia (referencias: Moraleja 74, Cid 95).'
estado: publicado
