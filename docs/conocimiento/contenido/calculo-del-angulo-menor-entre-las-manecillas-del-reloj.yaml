semantic_id: MAT.GEO.ANGULOS_APLICACIONES.MANECILLAS_ANGULO_MENOR
titulo: Cálculo del ángulo menor entre las manecillas del reloj
objetivo: Calcular el ángulo menor entre las manecillas de un reloj y comprobar que primero se calculan
  las posiciones de cada manecilla y solo al final se elige la abertura menor.
introduccion: Entre dos manecillas siempre hay dos caminos posibles alrededor del centro. El problema
  pide el menor, así que no basta con restar sin interpretar el dibujo. Para resolver situaciones de cálculo
  del ángulo menor entre las manecillas del reloj conviene mirar el dibujo con método, no solo por intuición.
resumen: El ángulo menor entre las manecillas del reloj se obtiene comparando sus posiciones y eligiendo
  la abertura más pequeña. Como idea de control, primero se calculan las posiciones de cada manecilla
  y solo al final se elige la abertura menor.
explicacion: 'El ángulo menor entre las manecillas del reloj se obtiene comparando sus posiciones y eligiendo
  la abertura más pequeña.


  Cuando se analiza “a las 3:00, la minutera está en 12 y la horaria en 3, de modo que el ángulo menor
  es 90°” conviene evitar la memoria mecánica. El control decisivo es comprobar que primero se calculan
  las posiciones de cada manecilla y solo al final se elige la abertura menor.'
procedimiento:
- 'Paso 1: Calcula o identifica la posición angular de cada manecilla respecto de las 12.'
- 'Paso 2: Resta ambas posiciones para obtener una abertura posible.'
- 'Paso 3: Compara esa abertura con 360° menos ella y elige la menor de las dos.'
ejemplos:
- titulo: Lectura del dibujo — Ángulo menor entre manecillas
  enunciado: A las 3:00, la minutera está en 12 y la horaria en 3, de modo que el ángulo menor es 90°.
  solucion_pasos:
  - Calcula o identifica la posición angular de cada manecilla respecto de las 12.
  - Resta ambas posiciones para obtener una abertura posible.
  - Compara esa abertura con 360° menos ella y elige la menor de las dos.
- titulo: Revisión del razonamiento — Ángulo menor entre manecillas
  enunciado: En la situación “a las 3:00, la minutera está en 12 y la horaria en 3, de modo que el ángulo
    menor es 90°”, un compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye
    la justificación completa.
  solucion_pasos:
  - 'Parte de la definición: el ángulo menor entre las manecillas del reloj se obtiene comparando sus
    posiciones y eligiendo la abertura más pequeña.'
  - Resta ambas posiciones para obtener una abertura posible.
  - Compara esa abertura con 360° menos ella y elige la menor de las dos.
- titulo: ¿Puede concluirse correctamente este hecho? — Ángulo menor entre manecillas
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: el ángulo menor entre las manecillas del reloj
    se obtiene comparando sus posiciones y eligiendo la abertura más pequeña.'
  - En el caso “a las 3:00, la minutera está en 12 y la horaria en 3, de modo que el ángulo menor es 90°”
    se observa que primero se calculan las posiciones de cada manecilla y solo al final se elige la abertura
    menor.
  - Compara esa abertura con 360° menos ella y elige la menor de las dos.
- titulo: ¿Se puede omitir el paso intermedio? — Ángulo menor entre manecillas
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de cálculo del ángulo menor entre las manecillas
    del reloj.
  - Después del paso “Calcula o identifica la posición angular de cada manecilla respecto de las 12.”
    todavía hace falta revisar “Resta ambas posiciones para obtener una abertura posible.”.
  - El cierre correcto exige “Compara esa abertura con 360° menos ella y elige la menor de las dos.”.
errores_frecuentes:
- Ángulo menor entre manecillas significa restar las posiciones y aceptar siempre ese resultado, aunque
  exista una abertura menor.
- Para resolver ángulo menor entre manecillas, basta con el paso “Calcula o identifica la posición angular
  de cada manecilla respecto de las 12.” y no hace falta revisar “Resta ambas posiciones para obtener
  una abertura posible.”.
- Si el dibujo parece claro, se puede ignorar que primero se calculan las posiciones de cada manecilla
  y solo al final se elige la abertura menor.
- Dos configuraciones distintas representan ángulo menor entre manecillas solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Compara esa abertura con 360° menos ella
  y elige la menor de las dos.”.
fuente: Currículum Nacional MINEDUC — Aplicaciones de ángulos y lectura geométrica de situaciones cotidianas.
estado: publicado
