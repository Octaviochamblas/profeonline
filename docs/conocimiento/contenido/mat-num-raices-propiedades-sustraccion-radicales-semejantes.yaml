semantic_id: MAT.NUM.RAICES_PROPIEDADES.SUSTRACCION_RADICALES_SEMEJANTES
objetivo: Restar términos con la misma parte radical.
introduccion: La resta actúa sobre las cantidades de una misma unidad radical. Si
  las raíces no son semejantes, la expresión no se combina de esta manera.
resumen: Los radicales semejantes se restan operando sus coeficientes. Restar radicandos
  entre sí no es una propiedad válida.
explicacion: |-
  Los radicales semejantes se restan operando sus coeficientes.

  La situación “\(7\sqrt2-3\sqrt2=4\sqrt2\)” permite comprobar, y no solo memorizar, que restar radicandos entre sí no es una propiedad válida
procedimiento:
- 'Paso 1: Reduce cada radical y verifica que índice y radicando coincidan.'
- 'Paso 2: Resta los coeficientes respetando sus signos.'
- 'Paso 3: Conserva el radical común y comprueba expandiendo el factor.'
ejemplos:
- titulo: Aplicación razonada — Sustracción de radicales semejantes
  enunciado: \(7\sqrt2-3\sqrt2=4\sqrt2\).
  solucion_pasos:
  - Reduce cada radical y verifica que índice y radicando coincidan.
  - Resta los coeficientes respetando sus signos.
  - Conserva el radical común y comprueba expandiendo el factor.
- titulo: Revisión de una solución — Sustracción de radicales semejantes
  enunciado: Una solución aplica “Resta los coeficientes respetando sus signos.”,
    pero termina sin comprobar que restar radicandos entre sí no es una propiedad
    válida. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define sustracción de radicales semejantes: los radicales
    semejantes se restan operando sus coeficientes.'
  - Reduce cada radical y verifica que índice y radicando coincidan.
  - 'Completa la revisión con este control: Conserva el radical común y comprueba
    expandiendo el factor.'
- titulo: ¿Se cumple que restar radicandos entre sí no es una propiedad válida? —
    Sustracción de radicales semejantes
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que los radicales semejantes se restan
    operando sus coeficientes.
  - El caso “\(7\sqrt2-3\sqrt2=4\sqrt2\)” satisface esa condición.
  - Conserva el radical común y comprueba expandiendo el factor.
- titulo: ¿Es válido omitir el paso “Reduce cada radical y verifica que índice y radicando
    coincidan”? — Sustracción de radicales semejantes
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de sustracción de radicales semejantes.
  - 'Omitirlo puede volver inválida la acción siguiente: Resta los coeficientes respetando
    sus signos.'
  - 'La solución debe terminar de este modo: Conserva el radical común y comprueba
    expandiendo el factor.'
errores_frecuentes:
- 'Confundir sustracción de radicales semejantes con otro concepto y omitir este inicio:
  Reduce cada radical y verifica que índice y radicando coincidan.'
- Aplicar mecánicamente “Resta los coeficientes respetando sus signos.” sin revisar
  las condiciones de la definición.
- Tomar “\(7\sqrt2-3\sqrt2=4\sqrt2\)” como una igualdad aislada, sin explicar por
  qué es válida.
- Aceptar una respuesta que contradice la idea clave “restar radicandos entre sí no
  es una propiedad válida”.
- 'Terminar el desarrollo sin realizar este control: Conserva el radical común y comprueba
  expandiendo el factor.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
