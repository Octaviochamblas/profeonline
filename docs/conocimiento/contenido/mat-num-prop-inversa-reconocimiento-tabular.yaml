semantic_id: MAT.NUM.PROP_INVERSA.RECONOCIMIENTO_TABULAR
objetivo: Reconocer una relación de proporcionalidad inversa a partir de una tabla
  de valores.
introduccion: ¿Cómo distinguirías una tabla de proporción inversa de una tabla cualquiera
  donde los datos suben y bajan? La prueba ácida es multiplicar las filas.
resumen: En una tabla de proporcionalidad inversa, el producto $x \cdot y$ en cada
  fila o columna debe dar exactamente el mismo resultado ($k$).
explicacion: 'Una **tabla de valores** puede modelar una proporcionalidad inversa.
  Para comprobarlo de forma matemática e irrefutable, debes multiplicar el valor de
  $x$ por su correspondiente valor de $y$ en cada uno de los pares de datos presentados.


  - Si todas las multiplicaciones arrojan el mismo número constante $k$, la tabla
  representa una proporción inversa.

  - Si al menos uno de los productos es distinto, la tabla NO es de proporción inversa
  (aunque visualmente parezca que una baja mientras la otra sube).'
procedimiento:
- 'Paso 1: Toma el primer par de datos $(x, y)$ de la tabla y multiplícalos.'
- 'Paso 2: Repite la multiplicación para todos los demás pares.'
- 'Paso 3: Si todos los resultados son idénticos, la tabla es inversamente proporcional.'
ejemplos:
- titulo: Verificando una tabla inversa
  enunciado: La tabla tiene los pares $(2, 24)$, $(3, 16)$, $(6, 8)$. ¿Es proporción
    inversa?
  solucion_pasos:
  - 'Multiplicamos par 1: $2 \cdot 24 = 48$.'
  - 'Multiplicamos par 2: $3 \cdot 16 = 48$.'
  - 'Multiplicamos par 3: $6 \cdot 8 = 48$.'
  - Como todos los productos dan $48$, SÍ representa proporción inversa.
errores_frecuentes:
- Dividir los valores en lugar de multiplicarlos (eso prueba proporción directa).
- Solo mirar que los valores de Y bajen cuando X sube, sin hacer el cálculo aritmético.
- Asumir que si la diferencia $x-y$ es constante, es proporción inversa.
fuente: Currículum Nacional MINEDUC.
estado: publicado
