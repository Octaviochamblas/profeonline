semantic_id: MAT.EST.REGLA_BAYES.DENOMINADOR_TOTAL
titulo: Uso de la probabilidad total como denominador en la regla de Bayes
objetivo: Calcular explícitamente el denominador de la regla de Bayes aplicando el teorema de la probabilidad
  total antes de resolver el problema completo.
introduccion: Un error común es intentar aplicar la fórmula de Bayes sin antes calcular correctamente
  P(A) (el denominador) mediante la suma de todas las rutas de la partición.
resumen: 'El denominador de la regla de Bayes se calcula previamente mediante el teorema de la probabilidad
  total: $P(A)=\sum_i P(B_i)\times P(A|B_i)$, sumando sobre toda la partición.'
explicacion: '![Uso de la probabilidad total como denominador](/static/img/probabilidad/bayes/bayes-denominador-total.svg)


  ### Definición formal


  Antes de calcular $P(B_i|A)$, se debe calcular $P(A)$ como un paso previo, sumando los productos $P(B_j)\times
  P(A|B_j)$ para todas las partes de la partición.


  ### Desarrollo didáctico


  Para calcular P(A|defectuosa) en el ejemplo de las dos máquinas, primero se calcula el denominador:
  P(defectuosa)=0,6×0,05+0,4×0,1=0,03+0,04=0,07. Solo después se puede completar el cálculo de Bayes.'
procedimiento:
- 'Paso 1: Antes de aplicar la fórmula completa de Bayes, calcula P(A) sumando todos los productos P(Bj)×P(A|Bj)
  de la partición.'
- 'Paso 2: Verifica que ese valor de P(A) sea razonable (esté entre 0 y 1).'
- 'Paso 3: Usa ese valor ya calculado como denominador fijo para calcular cualquier P(Bi|A) de interés.'
ejemplos:
- titulo: Calcular el denominador antes de aplicar Bayes
  enunciado: P(A)=0,6, P(B)=0,4, P(defectuosa|A)=0,05, P(defectuosa|B)=0,1.
  solucion_pasos:
  - P(defectuosa)=0,6×0,05+0,4×0,1=0,03+0,04=0,07, este es el denominador a usar.
- titulo: Usar el mismo denominador para calcular ambas probabilidades a posteriori
  enunciado: 'Denominador ya calculado: 0,07.'
  solucion_pasos:
  - P(A|defectuosa)=0,03/0,07 y P(B|defectuosa)=0,04/0,07, ambas usando el mismo denominador.
- titulo: ¿El denominador es el mismo para calcular P(Bi|A) para cualquier parte de la partición?
  respuesta: Sí
  solucion_pasos:
  - Sí, el denominador P(A) es fijo, solo cambia el numerador según qué Bi se esté calculando.
- titulo: ¿Se debe calcular el denominador antes de intentar resolver el problema completo de Bayes?
  respuesta: Sí
  solucion_pasos:
  - Sí, es un paso previo necesario y recomendado para organizar el cálculo.
errores_frecuentes:
- Intentar calcular P(Bi|A) sin haber calculado primero correctamente el denominador P(A).
- Recalcular el denominador de forma distinta para cada parte de la partición, cuando en realidad debe
  ser el mismo valor fijo.
- Confundir el denominador (probabilidad total) con uno de los numeradores (una sola ruta específica).
fuente: 'Elaboración propia (referencia: Moraleja 294).'
estado: publicado
