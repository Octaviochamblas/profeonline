semantic_id: MAT.GEO.POLIGONOS_METRICA.DIAGONALES_VERTICE
titulo: Cálculo de diagonales trazadas desde un solo vértice mediante n - 3
objetivo: Calcular cuántas diagonales se pueden trazar desde un único vértice de un polígono, usando la
  fórmula n-3.
introduccion: Antes de calcular el total de diagonales de un polígono, es útil primero entender cuántas
  se pueden trazar desde un solo vértice.
resumen: Desde un vértice de un polígono de $n$ lados se pueden trazar exactamente $n-3$ diagonales.
explicacion: '![Diagonales trazadas desde un vértice](/static/img/geometria/poligonos-cuadrilateros/poligonos-diagonales-vertice.svg)


  ### Definición formal


  Desde cualquier vértice de un polígono de $n$ lados, se pueden trazar diagonales hacia todos los demás
  vértices, excepto hacia sí mismo y hacia sus dos vértices adyacentes; esto da $n-3$ diagonales posibles.


  ### Desarrollo didáctico


  En un hexágono ($n=6$), desde un vértice se pueden trazar $6-3=3$ diagonales: hacia los 3 vértices que
  no son el propio vértice ni sus dos vecinos inmediatos.'
procedimiento:
- 'Paso 1: Identifica el número de lados n del polígono.'
- 'Paso 2: Resta 3 al número de lados (se excluyen el propio vértice y sus dos vecinos).'
- 'Paso 3: El resultado (n-3) es el número de diagonales que se pueden trazar desde ese vértice.'
ejemplos:
- titulo: Calcular diagonales desde un vértice en un hexágono
  enunciado: Un hexágono tiene 6 lados.
  solucion_pasos:
  - Desde un vértice se pueden trazar 6-3=3 diagonales.
- titulo: Calcular diagonales desde un vértice en un octógono
  enunciado: Un octógono tiene 8 lados.
  solucion_pasos:
  - Desde un vértice se pueden trazar 8-3=5 diagonales.
- titulo: ¿Por qué se resta 3 y no otro número?
  respuesta: Se excluyen el propio vértice y sus dos vecinos adyacentes
  solucion_pasos:
  - Se excluyen el propio vértice y sus dos vecinos adyacentes (unidos por lados, no diagonales).
- titulo: ¿Un cuadrilátero tiene diagonales desde cada vértice?
  respuesta: Sí, exactamente una
  solucion_pasos:
  - 'Sí, con n=4: 4-3=1 diagonal desde cada vértice.'
errores_frecuentes:
- Olvidar restar 3, incluyendo por error el propio vértice o sus vecinos.
- Confundir esta fórmula (n-3, diagonales desde un vértice) con la del total de diagonales del polígono.
- Aplicar la fórmula a un triángulo, donde el resultado sería 0 (correcto, pero puede generar confusión
  si no se interpreta bien).
fuente: 'Fuente: Moraleja Tomo 2 67.'
estado: publicado
