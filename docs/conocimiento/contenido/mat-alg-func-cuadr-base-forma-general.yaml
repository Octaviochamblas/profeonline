semantic_id: MAT.ALG.FUNC_CUADR_BASE.FORMA_GENERAL
titulo: Reconocimiento de la forma general f(x) = ax² + bx + c
objetivo: Reconocer y describir la estructura de la forma general de una función cuadrática.
introduccion: Toda función cuadrática, sin importar cómo se presente originalmente, puede reescribirse en un único
  formato estándar de tres términos ordenados.
resumen: La **forma general** de una función cuadrática es $f(x)=ax^2+bx+c$, donde $a$ es el coeficiente cuadrático,
  $b$ el coeficiente lineal y $c$ el término independiente.
explicacion: '### Definición formal


  La forma general de una función cuadrática es $f(x)=ax^2+bx+c$, con $a,b,c \in \mathbb{R}$ y $a \neq 0$. Los
  tres coeficientes determinan completamente la función y, por tanto, su gráfica.


  ### Desarrollo didáctico


  Reconocer la forma general implica ubicar, en orden, el término cuadrático, el término lineal y el término
  constante dentro de la regla de la función.


  En $f(x)=4x^2-5x+2$, la forma general ya está presente: el coeficiente cuadrático es $4$, el lineal es $-5$
  y el término independiente es $2$.'
procedimiento:
- 'Paso 1: Verifica que la regla de la función esté ordenada de mayor a menor exponente.'
- 'Paso 2: Identifica el coeficiente que acompaña a $x^2$.'
- 'Paso 3: Identifica el coeficiente que acompaña a $x$ y el término independiente.'
ejemplos:
- titulo: Identificación de la forma general
  enunciado: 'Identifica los coeficientes de $f(x)=6x^2+3x-7$.'
  solucion_pasos:
  - Ya está en forma general.
  - '$a=6$, $b=3$, $c=-7$.'
- titulo: Reordenamiento a la forma general
  enunciado: 'Escribe en forma general $f(x)=-5+2x^2$.'
  solucion_pasos:
  - Reordenando los términos, $f(x)=2x^2-5$.
  - Esto equivale a $f(x)=2x^2+0x-5$.
- titulo: ¿La forma general siempre debe tener los tres términos escritos explícitamente?
  enunciado: ¿La forma general siempre debe tener los tres términos escritos explícitamente?
  respuesta: 'No'
  solucion_pasos:
  - Un coeficiente puede valer cero (por ejemplo $b=0$), aunque conceptualmente sigue estando presente en la forma
    $ax^2+bx+c$.
- titulo: ¿El orden en que se escriben los términos afecta el valor de los coeficientes identificados?
  enunciado: ¿El orden en que se escriben los términos afecta el valor de los coeficientes identificados?
  respuesta: 'No'
  solucion_pasos:
  - Los coeficientes dependen del término al que acompañan, no del orden en que se escriban.
errores_frecuentes:
- Confundir la posición de los coeficientes al no ordenar primero la regla de la función.
- Omitir el signo negativo de un coeficiente al transcribirlo.
- Asumir que $b$ o $c$ deben ser distintos de cero para que la función esté en forma general.
- Confundir la forma general de una función cuadrática con la de una ecuación cuadrática.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
