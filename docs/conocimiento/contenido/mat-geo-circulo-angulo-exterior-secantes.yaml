semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_EXTERIOR_SECANTES
titulo: Medida de un ángulo exterior formado por dos secantes trazadas desde un punto exterior
objetivo: Calcular la medida de un ángulo formado por dos rectas secantes trazadas desde un punto exterior
  a la circunferencia, a partir de los arcos que quedan comprendidos entre ellas.
introduccion: Desde un punto fuera de un círculo se pueden trazar dos secantes, cada una cortando la circunferencia
  en dos puntos; el ángulo entre ellas depende de la diferencia de los arcos que abarcan.
resumen: Si desde un punto exterior $P$ se trazan dos secantes que cortan la circunferencia en $A,B$ y
  $C,D$ (siendo $B$ y $D$ los puntos más lejanos), la medida del ángulo es $m(\angle P)=\frac{m(\text{arco
  }BD)-m(\text{arco }AC)}{2}$.
explicacion: '![Ángulo exterior formado por dos secantes](/static/img/geometria/circunferencia-circulo/circulo-angulo-exterior-secantes.svg)


  ### Definición formal


  Si desde un punto exterior $P$ se trazan dos secantes a una circunferencia, cortándola en $A,B$ (la
  primera) y $C,D$ (la segunda), con $B$ y $D$ los puntos más alejados de $P$, entonces $m(\angle P)=\frac{m(\text{arco
  }BD)-m(\text{arco }AC)}{2}$, es decir, la semidiferencia entre el arco lejano y el arco cercano.


  ### Desarrollo didáctico


  Si el arco lejano $BD$ mide 100° y el arco cercano $AC$ mide 30°, el ángulo en $P$ mide $\frac{100°-30°}{2}=35°$.
  Esta relación se demuestra trazando la cuerda auxiliar $BC$ y usando la propiedad del ángulo exterior
  de un triángulo junto con el teorema del ángulo inscrito.'
procedimiento:
- 'Paso 1: Identifica el punto exterior P y las dos secantes trazadas desde él.'
- 'Paso 2: Identifica el arco lejano (entre los dos puntos más alejados de P) y el arco cercano (entre
  los dos puntos más próximos a P).'
- 'Paso 3: Resta el arco cercano al arco lejano y divide el resultado entre 2 para obtener la medida del
  ángulo en P.'
ejemplos:
- titulo: Calcular el ángulo exterior a partir de dos arcos
  enunciado: Dos secantes trazadas desde un punto exterior P determinan un arco lejano de 100° y un arco
    cercano de 30°.
  solucion_pasos:
  - m(∠P)=(100°-30°)/2=70°/2=35°.
- titulo: Calcular un arco desconocido a partir del ángulo exterior
  enunciado: El ángulo en P mide 25°, y el arco lejano mide 80°.
  solucion_pasos:
  - 25×2=50=80-x → x=80-50=30°; el arco cercano mide 30°.
- titulo: ¿Se resta el arco cercano al lejano (y no al revés)?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre se resta el arco menor (cercano) del arco mayor (lejano) para obtener un resultado positivo.
- titulo: ¿Este ángulo podría calcularse sumando ambos arcos en vez de restarlos?
  respuesta: 'No'
  solucion_pasos:
  - No, a diferencia del ángulo interior (que suma arcos), el ángulo exterior siempre resta los arcos.
errores_frecuentes:
- Sumar los arcos en vez de restarlos (esa es la fórmula del ángulo interior, no del exterior).
- Restar el arco lejano menos el cercano en el orden incorrecto, obteniendo un valor negativo.
- Confundir cuál arco es el lejano y cuál el cercano respecto del punto exterior P.
fuente: Elaboración propia (sin fuente específica).
