semantic_id: MAT.ALG.RELACION_EXP_LOG.CONVERSION_LOG_EXP
titulo: Conversión de una ecuación logarítmica a forma exponencial
objetivo: Reescribir una ecuación logarítmica $\log_b(x)=y$ en su forma exponencial equivalente $b^y=x$.
introduccion: Cuando la incógnita de una ecuación logarítmica está dentro del argumento, conviene pasar la
  ecuación a su forma exponencial para despejarla directamente.
resumen: Toda ecuación logarítmica $\log_b(x)=y$ puede reescribirse en su forma exponencial equivalente
  $b^y=x$, útil para despejar un argumento desconocido.
explicacion: '### Definición formal


  Dada la ecuación $\log_b(x)=y$ con $b>0$, $b\neq1$ y $x>0$, su forma exponencial equivalente es $b^y=x$. Esta
  conversión permite despejar directamente un argumento que de otro modo requeriría operaciones logarítmicas
  adicionales.


  ### Desarrollo didáctico


  Para resolver $\log_4(x)=3$, se convierte a forma exponencial: $x=4^3=64$. La conversión traslada el problema
  del ámbito logarítmico al de las potencias, donde el cálculo es directo.'
procedimiento:
- 'Paso 1: Identifica la base $b$, el argumento incógnita $x$ y el resultado $y$ en la ecuación logarítmica.'
- 'Paso 2: Reescribe la ecuación en su forma exponencial equivalente $x=b^y$.'
- 'Paso 3: Calcula la potencia para obtener el valor de $x$.'
ejemplos:
- titulo: Conversión de una ecuación logarítmica simple
  enunciado: 'Convierte $\log_2(x)=6$ a su forma exponencial.'
  solucion_pasos:
  - Se identifica $b=2$ y $y=6$.
  - 'La forma exponencial equivalente es $x=2^6=64$.'
- titulo: Conversión con argumento algebraico
  enunciado: 'Convierte $\log_5(x-1)=2$ a su forma exponencial.'
  solucion_pasos:
  - Se identifica $b=5$, argumento $x-1$ y resultado $2$.
  - 'La forma exponencial equivalente es $x-1=5^2=25$, de donde $x=26$.'
- titulo: ¿Toda ecuación logarítmica tiene una forma exponencial equivalente?
  enunciado: ¿Puede toda ecuación de la forma $\log_b(x)=y$ reescribirse como $x=b^y$?
  respuesta: Sí
  solucion_pasos:
  - Es exactamente la definición de logaritmo aplicada como equivalencia.
- titulo: ¿Es necesario verificar restricciones después de convertir a forma exponencial?
  enunciado: ¿Se debe verificar que la solución obtenida cumpla las condiciones de dominio del logaritmo
    original?
  respuesta: Sí
  solucion_pasos:
  - Aunque la conversión sea correcta, la solución debe hacer que el argumento original sea positivo.
errores_frecuentes:
- Invertir el orden y escribir $y^b=x$ en vez de $b^y=x$.
- Olvidar verificar que la solución obtenida cumpla el dominio del logaritmo original.
- Confundir cuál literal representa la base y cuál el exponente al convertir.
- No aislar primero el logaritmo antes de aplicar la conversión, si hay términos adicionales en la ecuación.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
