semantic_id: MAT.FUND.CONJUNTOS_BASICOS.CARDINALIDAD_BASICA
titulo: Cardinalidad básica de un conjunto
objetivo: Calcular la cardinalidad básica de un conjunto contando sus elementos únicos.
introduccion: 'Imagina que tienes una bolsa con frutas: una manzana, un plátano, una naranja y otra manzana.
  Si alguien te pregunta cuántas variedades de frutas diferentes tienes, contarías la manzana (1), el
  plátano (2) y la naranja (3). La segunda manzana no añade una fruta nueva, ya la contaste.


  En matemáticas, el "tamaño" de un conjunto se mide contando cuántos elementos diferentes tiene. A este
  número especial lo llamamos cardinalidad.


  Aprender a calcular la cardinalidad te ayudará a comparar conjuntos y saber si uno tiene más, menos
  o la misma cantidad de elementos que otro, sin importar el tipo de objetos que contenga.'
resumen: 'La cardinalidad de un conjunto es la medida de la cantidad de elementos que lo componen. Para
  un conjunto finito $A$, la cardinalidad es un número natural (o cero) que indica cuántos elementos únicos
  posee, y se denota por $|A|$ o $n(A)$.

  '
explicacion: 'La **cardinalidad** es un concepto fundamental en la teoría de conjuntos que representa
  el número de elementos de un conjunto.


  **Definición y Notación:**

  Si $A$ es un conjunto finito, su cardinalidad se representa mediante el símbolo $|A|$, $card(A)$ o $n(A)$,
  y corresponde a un número entero no negativo.

  * Si el conjunto es vacío, $A = \emptyset$, entonces su cardinalidad es cero: $|\emptyset| = 0$.

  * Si el conjunto es unitario, por ejemplo $B = \{5\}$, su cardinalidad es uno: $|B| = 1$.


  **Regla de los Elementos Únicos:**

  En un conjunto, los elementos repetidos no se cuentan más de una vez. Un conjunto se define por la distinción
  de sus miembros. Por lo tanto, si escribimos $C = \{a, b, a, c, b\}$, los elementos únicos son únicamente
  $a$, $b$ y $c$. La cardinalidad de $C$ es $|C| = 3$.


  **Conjuntos Equivalentes:**

  Dos conjuntos $A$ y $B$ son equivalentes (o coordinables) si tienen la misma cardinalidad, es decir,
  $|A| = |B|$. Esto significa que es posible establecer una correspondencia uno a uno (biyección) entre
  sus elementos.'
procedimiento:
- 'Paso 1: Identifica todos los elementos descritos en el conjunto.'
- 'Paso 2: Elimina las repeticiones, de modo que cada elemento sea único en tu lista mental o escrita.'
- 'Paso 3: Cuenta cuántos elementos únicos quedan. El número obtenido es la cardinalidad del conjunto.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Calcula la cardinalidad del conjunto $A = \{2, 4, 6, 8, 2, 4, 10\}$.
  solucion_pasos:
  - 'Paso a: Identificamos los elementos listados en el conjunto $A$: 2, 4, 6, 8, 2, 4, 10.'
  - 'Paso b: Removemos los elementos repetidos. El 2 y el 4 aparecen más de una vez, así que los consideramos
    una sola vez. Los elementos únicos son: 2, 4, 6, 8, 10.'
  - 'Paso c: Contamos los elementos únicos de la lista filtrada: 2 (uno), 4 (dos), 6 (tres), 8 (cuatro),
    10 (cinco). Por lo tanto, la cardinalidad es $|A| = 5$.'
- titulo: Ejemplo 2
  enunciado: Determina la cardinalidad del conjunto de las letras de la palabra 'MATEMATICA'.
  solucion_pasos:
  - 'Paso a: Escribimos las letras individuales que forman la palabra: M, A, T, E, M, A, T, I, C, A.'
  - 'Paso b: Listamos los elementos del conjunto eliminando las repeticiones: $\{M, A, T, E, I, C\}$.'
  - 'Paso c: Contamos la cantidad de letras únicas en el conjunto. Vemos que son 6 letras: M, A, T, E,
    I, C. Así, la cardinalidad es 6.'
- titulo: ¿La cardinalidad del conjunto $B = \\{0\\}$ es igual a 0?
  respuesta: 'No'
  solucion_pasos:
  - El conjunto $B = \{0\}$ contiene exactamente un elemento, que es el número 0.
  - Como tiene un elemento, su cardinalidad es 1, es decir, $|B| = 1$.
  - El valor numérico del elemento (que es 0) no debe confundirse con la cantidad de elementos (que es
    1).
- titulo: ¿Tienen la misma cardinalidad los conjuntos $M = \\{x, y, z\\}$ y $N = \\{1, 2, 3\\}$?
  respuesta: Sí
  solucion_pasos:
  - 'Contamos los elementos de $M$: tiene los elementos distintos $x$, $y$ y $z$, por lo tanto $|M| =
    3$.'
  - 'Contamos los elementos de $N$: tiene los números distintos 1, 2 y 3, por lo tanto $|N| = 3$.'
  - Como la cantidad de elementos en ambos conjuntos es 3, sus cardinalidades son iguales ($|M| = |N|$).
errores_frecuentes:
- Contar elementos repetidos varias veces al calcular la cardinalidad.
- Confundir la cardinalidad del conjunto $\{0\}$ con 0. El conjunto contiene al número 0, por lo que su
  cardinalidad es 1.
- Pensar que la cardinalidad depende del orden en el que se listan los elementos.
- Confundir la cardinalidad con la suma de los elementos numéricos del conjunto.
- Creer que dos conjuntos deben tener los mismos elementos para tener la misma cardinalidad.
fuente: Álgebra y Fundamentos, Universidad de Chile
estado: publicado
