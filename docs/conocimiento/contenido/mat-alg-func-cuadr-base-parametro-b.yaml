semantic_id: MAT.ALG.FUNC_CUADR_BASE.PARAMETRO_B
titulo: Identificación del coeficiente lineal b en la expresión funcional
objetivo: Identificar correctamente el coeficiente $b$ (lineal) en una función cuadrática dada en forma general.
introduccion: El coeficiente $b$ es el número que acompaña al término con $x$ elevado a la primera potencia,
  distinto del término cuadrático y del término constante.
resumen: El **coeficiente $b$** de una función cuadrática $f(x)=ax^2+bx+c$ es el número que multiplica al término
  lineal $x$; a diferencia de $a$, puede valer cero.
explicacion: '### Definición formal


  En $f(x)=ax^2+bx+c$, el coeficiente $b$ es el número real que multiplica al término de primer grado, $x$. A
  diferencia de $a$, no existe restricción sobre su valor: $b$ puede ser cualquier número real, incluido cero.


  ### Desarrollo didáctico


  Para identificar $b$, se localiza el término con $x$ elevado a la primera potencia y se lee el número que lo
  multiplica, respetando su signo. Si ese término no aparece explícitamente, $b=0$.


  En $f(x)=3x^2-9x+1$, el coeficiente $b$ es $-9$. En $f(x)=4x^2+7$, no hay término lineal, por lo que $b=0$.'
procedimiento:
- 'Paso 1: Ordena la función en forma general si aún no lo está.'
- 'Paso 2: Localiza el término con $x$ elevado a la primera potencia.'
- 'Paso 3: Lee el número que lo multiplica, incluyendo su signo; si no aparece ese término, $b=0$.'
ejemplos:
- titulo: Identificación directa del coeficiente b
  enunciado: 'Identifica el coeficiente $b$ en $f(x)=5x^2+12x-3$.'
  solucion_pasos:
  - El término lineal es $12x$.
  - '$b=12$.'
- titulo: Identificación de coeficiente b nulo
  enunciado: 'Identifica el coeficiente $b$ en $f(x)=7x^2-20$.'
  solucion_pasos:
  - No hay término con $x$ a la primera potencia.
  - '$b=0$.'
- titulo: ¿El coeficiente $b$ debe ser distinto de cero para que la función sea cuadrática?
  enunciado: ¿El coeficiente $b$ debe ser distinto de cero para que la función sea cuadrática?
  respuesta: 'No'
  solucion_pasos:
  - Solo se exige que $a$ sea distinto de cero; $b$ puede valer cero sin afectar el carácter cuadrático.
- titulo: ¿El coeficiente $b$ influye en la posición del eje de simetría de la parábola?
  enunciado: ¿El coeficiente $b$ influye en la posición del eje de simetría de la parábola?
  respuesta: Sí
  solucion_pasos:
  - El eje de simetría se calcula como $x=-b/(2a)$, por lo que el valor de $b$ afecta directamente su posición.
errores_frecuentes:
- Olvidar identificar $b=0$ cuando el término lineal no aparece explícitamente en la función.
- Confundir el coeficiente $b$ con el coeficiente $a$ o con el término independiente $c$.
- Omitir el signo negativo del término lineal al leer el coeficiente $b$.
- No reordenar la función antes de identificar $b$, tomando por error otro término.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
