semantic_id: MAT.ALG.FUNCION_AFIN.GRAFICA_DESDE_PARAMETROS
titulo: Construcción de la gráfica de una función afín desde sus parámetros
objetivo: Graficar una función afín identificando directamente su coeficiente de posición y su pendiente.
introduccion: Con solo los dos parámetros $m$ y $n$ de la fórmula, puedes construir la gráfica completa sin necesidad
  de una tabla extensa de valores.
resumen: Graficar una función afín $f(x)=mx+n$ a partir de sus parámetros consiste en marcar el punto $(0,n)$
  y, desde ahí, usar la pendiente $m$ para encontrar un segundo punto y trazar la recta.
explicacion: '### Definición formal


  Dada $f(x)=mx+n$, el punto $(0,n)$ pertenece a la gráfica. A partir de él, interpretando $m$ como $\dfrac{\Delta
  y}{\Delta x}$, se puede obtener un segundo punto avanzando $\Delta x$ unidades horizontalmente y $m \cdot \Delta
  x$ unidades verticalmente.


  ### Desarrollo didáctico


  El método rápido: marca $(0,n)$, y desde ahí "camina" según la pendiente: si $m=\frac{a}{b}$, avanza $b$ unidades
  a la derecha y $a$ unidades hacia arriba (o hacia abajo si $m$ es negativo).


  Si $f(x)=2x+3$: se marca $(0,3)$, y desde ahí se avanza 1 unidad a la derecha y 2 hacia arriba, llegando a $(1,5)$.
  Se traza la recta que une ambos puntos.'
procedimiento:
- 'Paso 1: Marca el punto $(0,n)$ usando el coeficiente de posición.'
- 'Paso 2: Desde ese punto, usa la pendiente $m$ para avanzar horizontalmente y verticalmente hasta un segundo
  punto.'
- 'Paso 3: Traza la recta que une ambos puntos, extendiéndola en ambas direcciones.'
ejemplos:
- titulo: Gráfica con pendiente entera
  enunciado: Grafica $f(x) = 3x - 2$ usando sus parámetros.
  solucion_pasos:
  - Se marca $(0,-2)$.
  - Desde ahí, se avanza 1 a la derecha y 3 hacia arriba, llegando a $(1,1)$.
  - Se traza la recta que une $(0,-2)$ y $(1,1)$.
- titulo: Gráfica con pendiente negativa
  enunciado: Grafica $f(x) = -x + 4$ usando sus parámetros.
  solucion_pasos:
  - Se marca $(0,4)$.
  - Desde ahí, se avanza 1 a la derecha y 1 hacia abajo, llegando a $(1,3)$.
  - Se traza la recta que une $(0,4)$ y $(1,3)$.
- titulo: ¿El primer punto a marcar siempre es $(0,n)$?
  enunciado: ¿El primer punto a marcar siempre es $(0,n)$?
  respuesta: Sí
  solucion_pasos:
  - Ese es el punto de intersección con el eje $y$, siempre disponible directamente desde la fórmula.
- titulo: ¿Se necesitan al menos tres puntos para graficar una función afín?
  enunciado: ¿Se necesitan al menos tres puntos para graficar una función afín?
  respuesta: 'No'
  solucion_pasos:
  - Con dos puntos basta, ya que dos puntos determinan de forma única una recta.
errores_frecuentes:
- Marcar el punto $(n,0)$ en vez de $(0,n)$ como punto de partida.
- Confundir la dirección del desplazamiento cuando la pendiente es negativa.
- No usar la pendiente correctamente al buscar el segundo punto.
- Trazar la recta sin extenderla en ambas direcciones.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
