semantic_id: MAT.ALG.INTERVALOS.TRADUCCION_INTERVALO_DESIGUALDAD
titulo: Traducción de intervalo a desigualdad
objetivo: Traducir correctamente conjuntos numéricos expresados en notación de intervalos a notación de
  desigualdades algebraicas.
introduccion: Las notaciones matemáticas ofrecen múltiples formas de describir conjuntos. Convertir de
  un intervalo a una desigualdad nos permite incorporar la restricción fácilmente en ecuaciones y problemas
  algebraicos.
resumen: La notación de intervalos utiliza corchetes para señalar si los extremos están incluidos o no.
  Para traducir esto a una desigualdad, se asigna una variable (como $x$) y se usan los símbolos $<$,
  $\leq$, $>$ o $\geq$ basándose en la orientación y tipo de los corchetes.
explicacion: '### Definición formal

  Sea $I$ un intervalo con extremos $a$ y $b$ ($a < b$). La transformación a desigualdad $D$ se realiza
  estableciendo la relación de un elemento $x$ respecto a $a$ y $b$. Un corchete cerrado $[$ o $]$ adyacente
  a un extremo finito implica una relación no estricta ($\leq$ o $\geq$). Un corchete abierto $] [$, $($
  o $)$ o la presencia de $\pm \infty$ implica una relación estricta ($<$ o $>$). Así, $I = [a, b[$ se
  traduce lógicamente a la desigualdad compuesta $a \leq x < b$.


  ### Desarrollo didáctico

  Traducir un intervalo a una desigualdad es como escribir una frase usando símbolos matemáticos. Si el
  intervalo nos da un límite inferior y uno superior, colocamos una variable, usualmente $x$, en el medio.
  Luego, observamos los "muros" (corchetes): si el muro es recto y nos abraza (corchete cerrado), usamos
  el símbolo "menor o igual" ($\leq$). Si el muro nos da la espalda o es curvo (corchete abierto o paréntesis),
  usamos el símbolo "estrictamente menor" ($<$). Si hay un infinito, solo necesitamos un símbolo de desigualdad.'
procedimiento:
- Establecer una variable genérica, por ejemplo, $x$, para representar los elementos del conjunto.
- Identificar si el intervalo es acotado (tiene dos extremos numéricos) o no acotado (contiene infinito).
- Si es acotado, colocar $x$ entre los dos valores numéricos. Si no es acotado, relacionar $x$ con el
  único valor numérico.
- Asignar $\leq$ o $\geq$ si el corchete junto al número está cerrado hacia el intervalo.
- Asignar $<$ o $>$ si el corchete junto al número está abierto o es un infinito.
- Escribir la desigualdad resultante final.
ejemplos:
- titulo: Traducción de un intervalo semiabierto acotado
  enunciado: Expresa el intervalo $]-3, 8]$ como una desigualdad para una variable $x$.
  solucion_pasos:
  - El intervalo posee dos extremos numéricos, $-3$ y $8$, por lo que $x$ estará entre ellos.
  - 'El extremo izquierdo $-3$ tiene un corchete abierto, por lo que la relación es estricta: $-3 < x$.'
  - 'El extremo derecho $8$ tiene un corchete cerrado, por lo que la relación es no estricta: $x \leq
    8$.'
  - Combinando ambas partes, la desigualdad final es $-3 < x \leq 8$.
- titulo: Traducción de un intervalo no acotado hacia el infinito negativo
  enunciado: Transforma el intervalo $]-\infty, 12[$ en notación de desigualdad.
  solucion_pasos:
  - El intervalo es no acotado y se extiende hasta el infinito negativo, limitando superiormente en $12$.
  - Esto indica que estamos buscando todos los números menores que $12$.
  - El corchete en el $12$ está abierto, lo que significa que el límite excluye a $12$.
  - Por lo tanto, la desigualdad se escribe como $x < 12$.
- titulo: ¿El intervalo $[5, 10]$ corresponde a la desigualdad $5 \leq x \leq 10$?
  respuesta: Sí
  solucion_pasos:
  - Ambos extremos en la notación de intervalo tienen corchetes cerrados.
  - Esto indica que tanto el $5$ como el $10$ están incluidos en el conjunto.
  - La desigualdad correcta que representa la inclusión de ambos extremos es $5 \leq x \leq 10$.
- titulo: ¿Se traduce el intervalo $]2, \infty[$ como $x \geq 2$?
  respuesta: 'No'
  solucion_pasos:
  - El intervalo tiene un corchete abierto en el $2$, lo que significa exclusión.
  - La exclusión requiere el uso de un signo de desigualdad estricta ($>$).
  - La traducción correcta de $]2, \infty[$ es $x > 2$.
errores_frecuentes:
- Utilizar desigualdades dobles cuando el intervalo es no acotado (involucra infinito), como escribir
  $-\infty < x < 5$.
- Invertir los signos de desigualdad al traducir, escribiendo por ejemplo $a > x > b$ en lugar de $a <
  x < b$.
- Asociar un corchete abierto con el símbolo $\leq$ o $\geq$.
- Traducir $[a, b]$ como dos desigualdades separadas sin la conjunción "y" en lugar de la forma compacta
  $a \leq x \leq b$.
- Olvidar colocar la variable $x$ en el centro de la desigualdad doble.
