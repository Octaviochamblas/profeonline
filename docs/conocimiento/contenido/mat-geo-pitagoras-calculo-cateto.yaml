semantic_id: MAT.GEO.PITAGORAS.CALCULO_CATETO
titulo: Cálculo de un cateto dados la hipotenusa y el otro cateto
objetivo: Calcular la medida de un cateto de un triángulo rectángulo cuando se conocen la hipotenusa y
  el otro cateto.
introduccion: Cuando falta uno de los catetos pero se conocen la hipotenusa y el otro cateto, el teorema
  de Pitágoras también permite despejar el dato faltante, esta vez restando en vez de sumando.
resumen: Para calcular un cateto de un triángulo rectángulo se resta el cuadrado del otro cateto al cuadrado
  de la hipotenusa, y se extrae la raíz cuadrada del resultado.
explicacion: '![Cálculo de un cateto](/static/img/geometria/areas-pitagoras/pitagoras-calculo-cateto.svg)


  ### Definición formal


  Si un triángulo rectángulo tiene hipotenusa $c$ y cateto conocido $b$, el otro cateto es $a=\sqrt{c^2-b^2}$.


  ### Desarrollo didáctico


  Con hipotenusa 5 y un cateto 4: $a=\sqrt{5^2-4^2}=\sqrt{25-16}=\sqrt{9}=3$.'
procedimiento:
- 'Paso 1: Eleva al cuadrado la hipotenusa y el cateto conocido.'
- 'Paso 2: Resta el cuadrado del cateto conocido al cuadrado de la hipotenusa.'
- 'Paso 3: Calcula la raíz cuadrada de esa resta: ese es el cateto faltante.'
ejemplos:
- titulo: Calcular con hipotenusa 10 y cateto 6
  enunciado: Un triángulo rectángulo tiene hipotenusa 10 y un cateto 6.
  solucion_pasos:
  - a=√(10²−6²)=√(100−36)=√64=8.
- titulo: Calcular con hipotenusa 13 y cateto 5
  enunciado: Un triángulo rectángulo tiene hipotenusa 13 y un cateto 5.
  solucion_pasos:
  - a=√(13²−5²)=√(169−25)=√144=12.
- titulo: ¿Se resta el cuadrado de la hipotenusa o del cateto?
  respuesta: Del cateto conocido
  solucion_pasos:
  - Se resta el cuadrado del cateto conocido al cuadrado de la hipotenusa, no al revés.
- titulo: ¿El cateto calculado es siempre menor que la hipotenusa?
  respuesta: Sí
  solucion_pasos:
  - Sí, todo cateto es siempre menor que la hipotenusa.
errores_frecuentes:
- Restar el cuadrado de la hipotenusa al cuadrado del cateto (orden invertido, da un número negativo).
- Sumar en vez de restar los cuadrados.
- Olvidar la raíz cuadrada final.
fuente: Elaboración propia.
estado: publicado
