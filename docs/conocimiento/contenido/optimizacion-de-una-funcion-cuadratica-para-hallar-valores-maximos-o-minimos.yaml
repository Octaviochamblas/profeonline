semantic_id: MAT.ALG.FUNC_CUADR_MODELO.OPTIMIZACION
titulo: Optimización de una función cuadrática para hallar valores máximos o mínimos
objetivo: Aplicar el concepto de vértice para optimizar una función cuadrática, hallando el valor máximo
  o mínimo que puede alcanzar.
introduccion: Cuando un problema pregunta por el "mejor" resultado posible (el área máxima, el costo mínimo,
  la ganancia máxima), la respuesta siempre está en el vértice de la función cuadrática que modela la
  situación.
resumen: '**Optimizar** una función cuadrática consiste en calcular su vértice: si $a>0$, el vértice da
  el valor mínimo; si $a<0$, da el valor máximo que la función puede alcanzar.'
explicacion: '### Definición formal


  Dada $f(x)=ax^2+bx+c$, el valor óptimo (máximo o mínimo) de la función es su valor en el vértice, $f\left(-\dfrac{b}{2a}\right)$.
  Si $a>0$, ese valor es el mínimo global; si $a<0$, es el máximo global de la función.


  ### Desarrollo didáctico


  El procedimiento de optimización consiste en plantear la función, identificar el signo de $a$ para saber
  si se busca máximo o mínimo, calcular la coordenada $x$ del vértice, y evaluar la función en ese punto.


  Para $A(x)=-x^2+20x$ (área de un corral con perímetro fijo), el vértice está en $x=-\dfrac{20}{-2}=10$,
  y $A(10)=-100+200=100$; el área máxima posible es $100 \text{ m}^2$.'
procedimiento:
- 'Paso 1: Plantea la función que modela la cantidad a optimizar.'
- 'Paso 2: Identifica si se busca un máximo ($a<0$) o un mínimo ($a>0$).'
- 'Paso 3: Calcula la coordenada $x$ del vértice mediante $x=-b/(2a)$.'
- 'Paso 4: Evalúa la función en ese valor para obtener el valor óptimo.'
ejemplos:
- titulo: Optimización de un área máxima
  enunciado: Con $A(x)=-2x^2+40x$, determina el área máxima posible.
  solucion_pasos:
  - $x=-\dfrac{40}{2(-2)}=10$.
  - $A(10)=-200+400=200$.
  - El área máxima es $200$ unidades cuadradas.
- titulo: Optimización de un costo mínimo
  enunciado: Con $C(x)=3x^2-24x+100$, determina el costo mínimo posible.
  solucion_pasos:
  - $x=-\dfrac{-24}{2(3)}=4$.
  - $C(4)=48-96+100=52$.
  - El costo mínimo es $52$.
- titulo: ¿Se necesita calcular el vértice completo (ambas coordenadas) para hallar el valor óptimo?
  enunciado: ¿Se necesita calcular el vértice completo (ambas coordenadas) para hallar el valor óptimo?
  respuesta: Sí
  solucion_pasos:
  - Se necesita la coordenada $x$ para saber dónde ocurre, y la coordenada $y$ (el valor de la función)
    para saber cuánto vale ese óptimo.
- titulo: ¿El signo de $a$ determina si se busca un máximo o un mínimo?
  enunciado: ¿El signo de $a$ determina si se busca un máximo o un mínimo?
  respuesta: Sí
  solucion_pasos:
  - Si $a<0$ el vértice es un máximo; si $a>0$, es un mínimo.
errores_frecuentes:
- Reportar solo la coordenada $x$ del vértice como respuesta, sin calcular el valor óptimo de la función.
- Confundir si se busca un máximo o un mínimo según el signo de $a$.
- Cometer errores algebraicos al calcular $-b/(2a)$, especialmente con signos negativos.
- No verificar que el valor de $x$ obtenido esté dentro del dominio válido según el contexto del problema.
