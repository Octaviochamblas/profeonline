semantic_id: MAT.EST.PERCENTILES.CALCULO_POSICION
titulo: Aplicar la fórmula de posición para determinar el percentil k
objetivo: Aplicar la fórmula de posición (k/100)×n para determinar en qué lugar del conjunto ordenado
  se ubica el percentil k.
introduccion: Antes de poder leer el valor del percentil, es necesario calcular en qué posición del conjunto
  ordenado se encuentra.
resumen: La posición del percentil $k$ en un conjunto de $n$ datos ordenados se calcula mediante la fórmula
  $\text{Posición}=\dfrac{k}{100}\times n$.
explicacion: '![Fórmula de posición para el percentil k](/static/img/estadistica/percentil/percentil-calculo-posicion.svg)


  ### Definición formal


  $\text{Posición}=\dfrac{k\times n}{100}$, donde $k$ es el percentil buscado y $n$ el número total de
  datos.


  ### Desarrollo didáctico


  Para encontrar el percentil 30 en un conjunto de 20 datos: posición=(30×20)/100=6, por lo que se busca
  el sexto dato del conjunto ordenado.'
procedimiento:
- 'Paso 1: Identifica el valor de k (percentil buscado) y n (número total de datos).'
- 'Paso 2: Aplica la fórmula posición=(k×n)/100.'
- 'Paso 3: Si el resultado es un número entero, se usa esa posición (o el promedio con la siguiente, según
  convención); si no es entero, se redondea hacia arriba para encontrar la posición correspondiente.'
ejemplos:
- titulo: Calcular la posición del percentil 30 en 20 datos
  enunciado: k=30, n=20.
  solucion_pasos:
  - Posición=(30×20)/100=6. Se busca el sexto dato del conjunto ordenado.
- titulo: Calcular la posición del percentil 75 en 40 datos
  enunciado: k=75, n=40.
  solucion_pasos:
  - Posición=(75×40)/100=30. Se busca el dato número 30 del conjunto ordenado.
- titulo: ¿La fórmula (k×n)/100 siempre da un número entero?
  respuesta: 'No'
  solucion_pasos:
  - No, dependiendo de los valores de k y n, el resultado puede ser decimal, requiriendo un criterio adicional
    (redondeo o interpolación).
- titulo: ¿Es necesario ordenar los datos antes de aplicar esta fórmula de posición?
  respuesta: Sí
  solucion_pasos:
  - Sí, la posición calculada solo tiene sentido sobre un conjunto ya ordenado de menor a mayor.
errores_frecuentes:
- Aplicar la fórmula con los valores de k y n invertidos, obteniendo un resultado incorrecto.
- Olvidar ordenar los datos antes de aplicar la posición calculada.
- No decidir un criterio claro quando el resultado de la fórmula no es un número entero.
fuente: 'Elaboración propia (referencia: Moraleja 378).'
estado: publicado
