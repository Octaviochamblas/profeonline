semantic_id: MAT.NUM.SUCESIONES_BASE.REGULARIDAD_GRAFICA
titulo: Identificación de regularidades en secuencias gráficas
objetivo: Identificar patrones y regularidades en secuencias de figuras o arreglos geométricos.
introduccion: 'No todos los patrones son solo números en una pizarra. A veces, los patrones son visuales:
  pirámides de puntos, baldosas en el piso o fractales. Traducir dibujos a números es un superpoder geométrico.'
resumen: Una sucesión gráfica o geométrica muestra figuras que crecen o cambian según una regla. El truco
  principal es **contar** los elementos de cada figura y transformar el problema visual en una secuencia
  de números.
explicacion: 'En las pruebas suelen presentarse dibujos de cuadrados apilados, puntos formando triángulos
  o palitos de fósforo armando figuras.


  Para resolverlos sin enredarte, sigue el ''método de traducción'':

  1. Mira la **Figura 1**. Cuenta sus elementos (ej. tiene 3 palitos). Escribe un $3$.

  2. Mira la **Figura 2**. Cuenta sus elementos (ej. tiene 5 palitos). Escribe un $5$.

  3. Mira la **Figura 3**. Cuenta sus elementos (ej. tiene 7 palitos). Escribe un $7$.


  Acabas de transformar los dibujos en una sucesión numérica simple: $3, 5, 7\dots$

  Ahora aplicas lo que ya sabes: el patrón numérico es $+2$. La siguiente figura tendrá $9$ palitos.'
procedimiento:
- 'Paso 1: Asigna un número a cada etapa o ''Figura n''.'
- 'Paso 2: Cuenta metódicamente los elementos (puntos, lados, áreas) de la Figura 1 y anótalo.'
- 'Paso 3: Repite para las Figuras 2 y 3 para crear tu lista ordenada de números.'
- 'Paso 4: Encuentra la regularidad matemática de esos números.'
ejemplos:
- titulo: Triángulos de fósforos
  enunciado: La Figura 1 es un triángulo (3 fósforos). La Figura 2 son dos triángulos unidos por un lado
    (5 fósforos). La Figura 3 son tres triángulos unidos en fila (7 fósforos). ¿Cuántos fósforos tendrá
    la Figura 4?
  solucion_pasos:
  - 'Traducimos a números: a1=3, a2=5, a3=7.'
  - La regularidad es +2 por cada nuevo triángulo adherido.
  - La figura 4 tendrá 7 + 2 = 9 fósforos.
errores_frecuentes:
- Intentar dibujar la figura número 10 o 20 a mano en lugar de usar la lógica matemática de la secuencia.
- Contar mal los elementos que se 'comparten' entre figuras geométricas adyacentes.
fuente: Currículum Nacional MINEDUC.
estado: publicado
