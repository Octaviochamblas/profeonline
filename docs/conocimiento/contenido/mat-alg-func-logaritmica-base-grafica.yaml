semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.GRAFICA
titulo: Gráfica de la función logarítmica
objetivo: Describir la forma general de la gráfica de $f(x)=\log_b(x)$ integrando dominio, asíntota, intercepto
  y monotonía.
introduccion: Ya conoces por separado el dominio, la asíntota y el comportamiento creciente o decreciente de la
  función logarítmica. Ahora se combinan todas esas piezas en una sola curva.
resumen: La gráfica de $f(x)=\log_b(x)$ es una curva definida solo para $x>0$, con asíntota vertical en $x=0$,
  que pasa siempre por $(1,0)$ y es creciente si $b>1$ o decreciente si $0<b<1$.
explicacion: '### Definición formal


  La gráfica de $f(x)=\log_b(x)$, con $b>0$ y $b\neq1$, es el conjunto de puntos $(x,\log_b(x))$ con $x>0$. Se
  aproxima a la recta $x=0$ sin tocarla, corta el eje $x$ únicamente en $(1,0)$, y es estrictamente monótona
  (creciente si $b>1$, decreciente si $0<b<1$) en todo su dominio.


  ### Desarrollo didáctico


  Para trazar la curva de $f(x)=\log_2(x)$: se ubica la asíntota vertical en $x=0$; se marca el punto fijo
  $(1,0)$; se calculan puntos adicionales como $(2,1)$, $(4,2)$ y $(0{,}5,-1)$; finalmente se une todo con una
  curva creciente que se aplana a medida que $x$ crece.'
procedimiento:
- 'Paso 1: Dibuja la asíntota vertical en $x=0$ como línea guía (no forma parte de la curva).'
- 'Paso 2: Marca el punto fijo $(1,0)$, común a toda función logarítmica.'
- 'Paso 3: Calcula 2 o 3 puntos adicionales evaluando la función en valores de $x$ mayores y menores que $1$.'
- 'Paso 4: Une los puntos con una curva suave, creciente si $b>1$ o decreciente si $0<b<1$, sin cruzar la asíntota.'
ejemplos:
- titulo: Trazado de $f(x)=\log_2(x)$
  enunciado: 'Describe los elementos clave para graficar $f(x)=\log_2(x)$.'
  solucion_pasos:
  - Asíntota vertical en $x=0$, punto fijo $(1,0)$ y base $b=2>1$, por lo que la curva es creciente.
  - Puntos de apoyo: $(2,1)$, $(4,2)$ y $(0{,}5,-1)$.
- titulo: Trazado de $f(x)=\log_{0,5}(x)$
  enunciado: 'Describe los elementos clave para graficar $f(x)=\log_{0,5}(x)$.'
  solucion_pasos:
  - Asíntota vertical en $x=0$, punto fijo $(1,0)$ y base $b=0{,}5<1$, por lo que la curva es decreciente.
  - Puntos de apoyo: $(2,-1)$, $(4,-2)$ y $(0{,}5,1)$.
- titulo: ¿La gráfica de toda función logarítmica pasa por el mismo punto fijo?
  enunciado: ¿Todas las funciones $f(x)=\log_b(x)$ pasan por el punto $(1,0)$ sin importar la base?
  respuesta: Sí
  solucion_pasos:
  - $\log_b(1)=0$ se cumple para cualquier base válida $b$.
- titulo: ¿La gráfica de la función logarítmica cruza la asíntota vertical?
  enunciado: ¿La curva de $f(x)=\log_b(x)$ llega a cruzar la asíntota vertical en algún punto?
  respuesta: 'No'
  solucion_pasos:
  - La asíntota vertical representa un límite que la curva se aproxima pero nunca alcanza.
errores_frecuentes:
- Dibujar la curva cruzando el eje $y$, ignorando la asíntota vertical.
- Olvidar marcar el punto fijo $(1,0)$ como referencia obligatoria.
- Trazar una curva creciente cuando $0<b<1$, invirtiendo la monotonía real.
- Extender la curva hacia valores de $x$ negativos o iguales a cero.
