semantic_id: MAT.FUND.RAZONAMIENTO_LOGICO.DE_MORGAN_DISYUNCION
titulo: Ley de De Morgan para la negación de una disyunción
objetivo: Aplicar la Ley de De Morgan para la negación de una disyunción para encontrar proposiciones
  equivalentes.
introduccion: 'Imagina que alguien te dice: "No es cierto que mañana iré al cine o al parque". ¿Qué significa
  eso? Significa que no harás ninguna de las dos actividades. No irás al cine Y tampoco irás al parque.


  En el lenguaje cotidiano, negar que ocurra una de dos opciones (unidas por "o") significa obligatoriamente
  que ninguna de ellas puede ocurrir. Ambas deben ser falsas a la vez.


  Esta es la segunda de las Leyes de De Morgan. Nos enseña a simplificar la negación de una disyunción
  ("o") transformándola en una frase donde negamos cada parte individualmente unidas por la palabra "y".'
resumen: 'La Ley de De Morgan para la disyunción establece que la negación de una disyunción es lógicamente
  equivalente a la conjunción de las negaciones de cada proposición. Formalmente, $\neg(p \lor q) \equiv
  \neg p \land \neg q$.

  '
explicacion: 'La segunda de las **Leyes de De Morgan** trata sobre la negación de una disyunción ("o").
  Establece que decir que una disyunción es falsa equivale a afirmar que cada una de las proposiciones
  que la componen es individualmente falsa.


  Formalmente:

  $$\neg(p \lor q) \equiv \neg p \land \neg q$$


  **Demostración mediante Tabla de Verdad**

  Comprobemos la equivalencia de ambas expresiones construyendo su tabla de verdad:


  | $p$ | $q$ | $p \lor q$ | $\neg(p \lor q)$ | $\neg p$ | $\neg q$ | $\neg p \land \neg q$ |

  | :---: | :---: | :---: | :---: | :---: | :---: | :---: |

  | V | V | V | **F** | F | F | **F** |

  | V | F | V | **F** | F | V | **F** |

  | F | V | V | **F** | V | F | **F** |

  | F | F | F | **V** | V | V | **V** |


  Las columnas correspondientes a $\neg(p \lor q)$ y $\neg p \land \neg q$ coinciden exactamente en todas
  sus filas.'
procedimiento:
- 'Paso 1: Identificar la estructura de negación de una disyunción de la forma $\neg(P \lor Q)$.'
- 'Paso 2: Negar individualmente cada una de las proposiciones del interior del paréntesis, obteniendo
  $\neg P$ y $\neg Q$.'
- 'Paso 3: Cambiar el conectivo de disyunción ($\lor$) por el de conjunción ($\land$).'
- 'Paso 4: Escribir la proposición equivalente resultante: $\neg(P \lor Q) \equiv \neg P \land \neg Q$.
  En esquema: $\neg(p \lor q) \vdash \neg p \land \neg q$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Simplifica la proposición $\neg(p \lor \neg q)$ aplicando la Ley de De Morgan para la disyunción.
  solucion_pasos:
  - 'Paso a: Identificamos la negación exterior de una disyunción: $\neg(P \lor Q)$, donde $P = p$ y $Q
    = \neg q$.'
  - 'Paso b: Aplicamos De Morgan distribuyendo la negación: $\neg p \land \neg(\neg q)$.'
  - 'Paso c: Simplificamos la doble negación del segundo término: $\neg(\neg q) \equiv q$.'
  - 'Paso d: La proposición equivalente final es $\neg p \land q$.'
- titulo: Ejemplo 2
  enunciado: 'Formaliza y simplifica la frase: ''No es verdad que llueva o haga calor''.'
  solucion_pasos:
  - 'Paso a: Definimos las variables: sea $ll$ ''llueva'' y $c$ ''haga calor''.'
  - 'Paso b: La frase original se escribe como la negación de una disyunción: $\neg(ll \lor c)$.'
  - 'Paso c: Aplicamos la Ley de De Morgan para la disyunción: $\neg(ll \lor c) \equiv \neg ll \land \neg
    c$.'
  - 'Paso d: Traducimos al lenguaje natural: ''No llueve y no hace calor''.'
- titulo: ¿La negación de la disyunción $\neg(\neg p \lor \neg q)$ es equivalente a $p \land q$?
  respuesta: Sí
  solucion_pasos:
  - Partimos de la expresión $\neg(\neg p \lor \neg q)$.
  - 'Aplicamos la Ley de De Morgan: negamos individualmente y cambiamos el conectivo central: $\neg(\neg
    p) \land \neg(\neg q)$.'
  - 'Simplificamos ambas dobles negaciones: $\neg(\neg p) \equiv p$ y $\neg(\neg q) \equiv q$.'
  - El resultado es $p \land q$, lo que demuestra la equivalencia lógica.
- titulo: ¿La expresión $\neg(p \lor q)$ es lógicamente equivalente a $\neg p \lor \neg q$?
  respuesta: 'No'
  solucion_pasos:
  - Al aplicar la Ley de De Morgan para la disyunción, el conectivo 'o' ($\lor$) debe cambiarse a 'y'
    ($\land$).
  - La expresión propuesta mantiene el conectivo 'o' ($\lor$), lo cual es incorrecto.
  - Evaluando la combinación $p$ Verdadero y $q$ Falso (V, F), $\neg(V \lor F) \equiv \neg V \equiv F$,
    mientras que $\neg V \lor \neg F \equiv F \lor V \equiv V$. Al diferir, no son equivalentes.
errores_frecuentes:
- No cambiar el conectivo central al negar la disyunción, dejando el conectivo 'o' ($\lor$) en lugar de
  escribir 'y' ($\land$).
- Negar solo uno de los términos de la disyunción y no ambos (ej. escribir $\neg(p \lor q) \equiv \neg
  p \land q$).
- Confundir la negación de una disyunción con la negación de una conjunción.
- Escribir incorrectamente los paréntesis al aplicar la ley, lo que cambia la jerarquía de las operaciones.
- Pensar que $\neg p \land \neg q$ significa que al menos uno es falso, cuando en realidad significa obligatoriamente
  que ambos son falsos.
fuente: Elementos de Lógica Matemática, J. R. Ortiz, Sección 1.3
estado: publicado
