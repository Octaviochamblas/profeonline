semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.DILATACION_VERTICAL
titulo: Dilatación vertical de la función potencia
objetivo: Reconocer que un coeficiente $|a|>1$ produce una dilatación vertical (compresión hacia el eje $y$) de
  la gráfica básica.
introduccion: Multiplicar la función por un número mayor que $1$ en valor absoluto "estira" la curva, haciéndola
  crecer más rápido en cada dirección.
resumen: 'Dada $g(x)=x^n$, la función $f(x)=a\cdot x^n$ con $|a|>1$ es una **dilatación vertical**: cada valor de
  $g$ se multiplica por $|a|$, produciendo una curva que crece más rápido.'
explicacion: '### Definición formal


  Para $f(x)=a\cdot g(x)$ con $|a|>1$, cada punto $(x_0,y_0)$ de $g$ se transforma en $(x_0,a\cdot y_0)$, con
  $|a\cdot y_0|>|y_0|$. Visualmente, la curva se "estira" alejándose del eje $x$ más rápido que la curva
  original.


  ### Desarrollo didáctico


  Comparando $g(x)=x^2$ con $f(x)=4x^2$: en $x=2$, $g(2)=4$ pero $f(2)=16$. La curva de $f$ alcanza valores
  mucho mayores para el mismo $x$, dando la apariencia de estar más "angosta" o dilatada verticalmente.'
procedimiento:
- 'Paso 1: Compara el valor absoluto del coeficiente $a$ con $1$.'
- 'Paso 2: Si $|a|>1$, reconoce que la curva se dilata verticalmente respecto a $x^n$.'
- 'Paso 3: Calcula puntos específicos para confirmar el crecimiento más rápido.'
ejemplos:
- titulo: Identificación de una dilatación vertical
  enunciado: '¿Es $f(x)=6x^2$ una dilatación vertical de $g(x)=x^2$?'
  solucion_pasos:
  - Se compara $|6|>1$.
  - Sí, es una dilatación vertical.
- titulo: Comparación numérica de dilatación
  enunciado: 'Compara $f(3)$ con $g(3)$ para $f(x)=5x^2$ y $g(x)=x^2$.'
  solucion_pasos:
  - 'Se calcula $g(3)=9$ y $f(3)=45$.'
  - $f(3)$ es $5$ veces mayor que $g(3)$, confirmando la dilatación.
- titulo: ¿Una dilatación vertical cambia la posición del vértice de $f(x)=ax^2$?
  enunciado: ¿Una dilatación vertical desplaza la posición del vértice de la curva básica $x^2$?
  respuesta: 'No'
  solucion_pasos:
  - El vértice permanece en el origen; solo cambia qué tan rápido crece la curva.
- titulo: ¿Toda dilatación vertical implica un coeficiente mayor que $1$ en valor absoluto?
  enunciado: ¿Una dilatación vertical siempre corresponde a $|a|>1$?
  respuesta: Sí
  solucion_pasos:
  - Es la condición que distingue la dilatación de la contracción vertical, donde $0<|a|<1$.
errores_frecuentes:
- Confundir dilatación con contracción, invirtiendo la condición sobre $|a|$.
- Suponer que la dilatación vertical desplaza el vértice de la curva.
- No comparar el valor absoluto de $a$, sino solo su signo.
- Confundir esta transformación con una traslación vertical.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
