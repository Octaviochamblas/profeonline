semantic_id: MAT.ALG.VALORIZACION.PARENTESIS_VALORES_NEGATIVOS
objetivo: Manejar correctamente la sustitución de números negativos en una expresión
  algebraica mediante el uso riguroso de paréntesis.
introduccion: Si hay un 'asesino silencioso' en las pruebas de álgebra, es el número
  negativo. Si lo valorizas sin ponerle su 'chaleco antibalas' (el paréntesis), morirá
  a manos de las potencias o alterará los signos de toda la ecuación.
resumen: Al sustituir un **Valor Negativo**, es absolutamente obligatorio **encerrarlo
  entre paréntesis**. Esto garantiza que tanto las multiplicaciones como las potencias
  afecten también a su signo negativo.
explicacion: 'Veamos la tragedia de valorizar $x^2$ cuando $x = -3$.

  - Forma INCORRECTA (sin chaleco): $-3^2 = -9$. ¡Mortal! El cuadrado elevó solo al
  3, dejando el menos intacto.

  - Forma CORRECTA (con chaleco): $(-3)^2 = (-3)(-3) = +9$. ¡Salvado! El cuadrado
  elevó también al signo menos, volviéndolo positivo.


  El uso del paréntesis también salva vidas en restas. Valoremos $5 - x$ con $x =
  -2$.

  - Incorrecto: $5 - 2 = 3$. (Se perdió un signo).

  - Correcto: $5 - (-2) = 5 + 2 = 7$.'
procedimiento:
- 'Paso 1: Coloca la variable original entre paréntesis vacíos en la expresión.'
- 'Paso 2: Introduce el número negativo junto con su signo dentro de ese paréntesis.'
- 'Paso 3: Si hay una potencia exterior, recuerda la regla de los signos (base negativa
  a exponente par = positivo, a impar = negativo).'
- 'Paso 4: Si hay un signo menos delante del paréntesis, haz chocar los signos (-
  por - da +).'
ejemplos:
- titulo: Doble negatividad
  enunciado: Valora la expresión -x^2 - x, cuando x = -4.
  solucion_pasos:
  - 'Colocamos paréntesis vacíos: -( )^2 - ( ).'
  - 'Rellenamos con -4: -(-4)^2 - (-4).'
  - 'Resolvemos la potencia de adentro: (-4)^2 = +16.'
  - 'Reescribimos: -(16) - (-4).'
  - 'Chocamos signos: -16 + 4.'
  - 'Resultado final: -12.'
errores_frecuentes:
- No usar paréntesis y que una potencia par no elimine el signo negativo (ej. decir
  que $x^2 = -16$ cuando $x=-4$).
- Olvidar chocar los signos cuando la variable tenía un signo negativo previo (ej.
  $2 - x$, con $x=-3$, escribir $2 - 3$ en lugar de $2 - (-3)$).
fuente: Álgebra de Baldor.
estado: publicado
