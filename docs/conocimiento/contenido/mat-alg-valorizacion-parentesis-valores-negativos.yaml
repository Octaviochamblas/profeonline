semantic_id: MAT.ALG.VALORIZACION.PARENTESIS_VALORES_NEGATIVOS
objetivo: Manejar correctamente la sustitución de números negativos en una expresión algebraica mediante el uso
  riguroso de paréntesis.
introduccion: Si hay un 'asesino silencioso' en las pruebas de álgebra, es el número negativo. Si lo valorizas sin
  ponerle su 'chaleco antibalas' (el paréntesis), morirá a manos de las potencias o alterará los signos de toda
  la ecuación.
resumen: Al sustituir un **Valor Negativo**, es absolutamente obligatorio **encerrarlo entre paréntesis**. Esto
  garantiza que tanto las multiplicaciones como las potencias afecten también a su signo negativo.
explicacion: '### Definición formal


  El exponente opera inmediatamente sobre su base izquierda. En $-5^2$, la base es 5. En $(-5)^2$, la base es -5.


  ### Desarrollo didáctico


  Veamos la tragedia de valorizar $x^2$ cuando $x = -3$.

  - Forma INCORRECTA (sin chaleco): $-3^2 = -9$. Mortal. El cuadrado elevó solo al 3, dejando el menos intacto.

  - Forma CORRECTA (con chaleco): $(-3)^2 = (-3)(-3) = +9$. Salvado. El cuadrado elevó también al signo menos, volviéndolo
  positivo.


  El uso del paréntesis también salva vidas en restas. Valoremos $5 - x$ con $x = -2$.

  - Incorrecto: $5 - 2 = 3$. (Se perdió un signo).

  - Correcto: $5 - (-2) = 5 + 2 = 7$.'
procedimiento:
- 'Paso 1: Coloca la variable original entre paréntesis vacíos en la expresión.'
- 'Paso 2: Introduce el número negativo junto con su signo dentro de ese paréntesis.'
- 'Paso 3: Si hay una potencia exterior, recuerda la regla de los signos (base negativa a exponente par = positivo,
  a impar = negativo).'
- 'Paso 4: Si hay un signo menos delante del paréntesis, haz chocar los signos (- por - da +).'
ejemplos:
- titulo: Doble negatividad
  enunciado: Valora la expresión -x^2 - x, cuando x = -4.
  solucion_pasos:
  - 'Colocamos paréntesis vacíos: -( )^2 - ( ).'
  - 'Rellenamos con -4: -(-4)^2 - (-4).'
  - 'Resolvemos la potencia de adentro: (-4)^2 = +16.'
  - 'Reescribimos: -(16) - (-4).'
  - 'Chocamos signos: -16 + 4.'
  - 'Resultado final: -12.'
- titulo: Una función de transferencia en un circuito electrónico se define por $V = a^2 - ab$. Si el
  enunciado: 'Una función de transferencia en un circuito electrónico se define por $V = a^2 - ab$. Si el voltaje
    $a$ es de $-3$ voltios y la corriente $b$ es de $-2$ amperios, ¿cuál es el valor de $V$ procesado correctamente
    por el sistema? (v1)


    Opciones: A) $3$ · B) $15$ · C) $-3$ · D) $9$'
  solucion_pasos:
  - 'Sustitución con chalecos: $V = (-3)^2 - (-3)(-2)$. Calculamos la potencia: $(-3)^2 = 9$. Calculamos el bloque
    derecho: $(-3)(-2) = +6$. Reconstruimos: $9 - (+6) = 9 - 6 = 3$.'
  - 'Respuesta: $3$'
- titulo: 'Respecto de «Uso de paréntesis al sustituir valores negativos»: ¿Describe adecuadamente el c'
  enunciado: 'Respecto de «Uso de paréntesis al sustituir valores negativos»: ¿Describe adecuadamente el concepto
    esta frase? «Al sustituir un **Valor Negativo**, es absolutamente obligatorio **encerrarlo entre paréntesis**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al sustituir un **Valor Negativo**, es absolutamente obligatorio
    **encerrarlo entre paréntesis**.'
- titulo: 'Respecto de «Uso de paréntesis al sustituir valores negativos»: ¿Se puede aceptar esta afirm'
  enunciado: 'Respecto de «Uso de paréntesis al sustituir valores negativos»: ¿Se puede aceptar esta afirmación?
    «No usar paréntesis y que una potencia par no elimine el signo negativo (ej. decir que $x^2 = -16$ cuando $x=-4$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al sustituir un **Valor Negativo**, es absolutamente obligatorio
    **encerrarlo entre paréntesis**.'
errores_frecuentes:
- No usar paréntesis y que una potencia par no elimine el signo negativo (ej. decir que $x^2 = -16$ cuando $x=-4$).
- Olvidar chocar los signos cuando la variable tenía un signo negativo previo (ej. $2 - x$, con $x=-3$, escribir
  $2 - 3$ en lugar de $2 - (-3)$).
- Porque los paréntesis sirven para recordar que el número es negativo, aunque el resultado matemático sería el
  mismo de todas formas.
- Porque los números negativos no pueden existir sin paréntesis en matemáticas.
- Porque el paréntesis indica que se debe multiplicar por dos.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Uso de paréntesis al sustituir valores negativos
