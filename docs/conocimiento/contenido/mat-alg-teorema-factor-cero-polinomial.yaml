semantic_id: MAT.ALG.TEOREMA_FACTOR.CERO_POLINOMIAL
titulo: Ceros o Raíces de un Polinomio
objetivo: Entender qué es un 'cero' matemático de un polinomio y cómo identificarlo.
introduccion: ¿Qué sucede cuando tu máquina de polinomios arroja un rotundo 'cero' como resultado? Acabas de encontrar
  un resultado relevante. En álgebra, los números que hacen que un polinomio valga cero no son casualidades, son
  el estructura algebraica del polinomio.
resumen: Un número '$c$' es considerado una 'raíz' o 'cero' de un polinomio $P(x)$ si al evaluarlo se cumple estrictamente
  que $P(c) = 0$.
explicacion: "### Definición formal\n\nEl conjunto de raíces (o ceros) de un polinomio $P(x)$ de grado $n$ se define\
  \ como $\\{c \\in \\mathbb{R} : P(c) = 0\\}$, y contiene a lo más $n$ elementos distintos, contando multiplicidad.\n\
  \n### Desarrollo didáctico\n\nConsidera el polinomio\
  \ $P(x) = x^2 - 5x + 6$.\nVamos a evaluarlo con distintos números, buscando suerte:\n- Si evaluamos $x = 1$:\n\
  \  $P(1) = 1^2 - 5(1) + 6 = 1 - 5 + 6 = 2$.\n  (El 1 es un número cualquiera, no es una raíz).\n\n- Si evaluamos\
  \ $x = 2$:\n  $P(2) = 2^2 - 5(2) + 6 = 4 - 10 + 6 = 0$.\n  En efecto, El resultado fue cero. Esto significa que\
  \ **x = 2 es una raíz** (o un Cero) del polinomio.\n\n- Si evaluamos $x = 3$:\n  $P(3) = 3^2 - 5(3) + 6 = 9 -\
  \ 15 + 6 = 0$.\n  En este caso, **x = 3 también es una raíz** del polinomio.\n\nEncontrar las raíces es como encontrar\
  \ el punto de equilibrio donde todo se anula. Gráficamente, son los puntos exactos donde la línea del polinomio\
  \ cruza el eje horizontal (eje X)."
procedimiento:
- 'Paso 1: Para verificar si un número ''a'' es raíz, evalúa $P(a)$.'
- 'Paso 2: Realiza las sumas y multiplicaciones correspondientes.'
- 'Paso 3: Si el resultado final es exactamente cero, confírmalo como raíz.'
- 'Paso 4: Si da cualquier otro número (positivo, negativo, decimal), recházalo, no es una raíz.'
ejemplos:
- titulo: Es $x = -3$ raíz de $P(x) = x^2 - 9$
  enunciado: ¿Es $x = -3$ raíz de $P(x) = x^2 - 9$?
  solucion_pasos:
  - 'Evaluamos: $P(-3) = (-3)^2 - 9$.'
  - 'Calculamos: $9 - 9 = 0$.'
  - Da cero. Por lo tanto, $x = -3$ SÍ es una raíz.
- titulo: Verificación de una raíz
  enunciado: Determina si $4$ es un cero de $P(x)=x^2-6x+8$.
  solucion_pasos:
  - Evalúa $P(4)=4^2-6\cdot4+8$.
  - Calcula $16-24+8=0$.
  - Como $P(4)=0$, el número $4$ sí es un cero del polinomio.
- titulo: 'Respecto de «Reconocimiento de un cero polinomial»: ¿Se ajusta a la definición esta afirmaci'
  enunciado: 'Respecto de «Reconocimiento de un cero polinomial»: ¿Se ajusta a la definición esta afirmación? «Un
    número ''$c$'' es considerado una ''raíz'' o ''cero'' de un polinomio $P(x)$ si al evaluarlo se cumple estrictamente
    que $P(c) = 0$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un número ''$c$'' es considerado una ''raíz'' o ''cero'' de
    un polinomio $P(x)$ si al evaluarlo se cumple estrictamente que $P(c) = 0$.'
- titulo: 'Respecto de «Reconocimiento de un cero polinomial»: ¿Es compatible con el procedimiento esta'
  enunciado: 'Respecto de «Reconocimiento de un cero polinomial»: ¿Es compatible con el procedimiento esta afirmación?
    «Confundir la palabra ''raíz de un polinomio'' con la operación aritmética de ''raíz cuadrada''. Son conceptos
    homónimos pero distintos en este contexto»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un número ''$c$'' es considerado una ''raíz'' o ''cero'' de
    un polinomio $P(x)$ si al evaluarlo se cumple estrictamente que $P(c) = 0$.'
errores_frecuentes:
- Confundir la palabra 'raíz de un polinomio' con la operación aritmética de 'raíz cuadrada'. Son conceptos homónimos
  pero distintos en este contexto.
- Creer que un polinomio solo puede tener una raíz. (Un polinomio de grado $n$ puede tener hasta $n$ raíces).
- Todo número que pertenece al dominio de un polinomio es también una raíz.
- Un cero polinomial se reconoce cuando $P(c)=1$.
- El número de raíces reales siempre coincide exactamente con el grado del polinomio.
