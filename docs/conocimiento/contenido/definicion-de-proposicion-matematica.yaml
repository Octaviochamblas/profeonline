semantic_id: MAT.FUND.LOGICA_BASICA.PROPOSICION_MATEMATICA
titulo: Definición de proposición matemática
objetivo: Identificar proposiciones matemáticas y determinar si un enunciado es una proposición.
introduccion: 'Imagina que eres un juez y alguien te dice una frase. Tu trabajo es decidir si esa frase
  es verdadera o falsa. Si puedes decidirlo con total seguridad, esa frase es una proposición. Por ejemplo,
  si te dicen "el color del cielo es verde", puedes decir "¡Eso es falso!". Pero si te dicen "¿qué hora
  es?", no puedes decir si es verdadero o falso, porque es una pregunta.


  En el mundo de las matemáticas y la lógica, las proposiciones son los bloques de construcción básicos.
  Son enunciados declarativos a los que, sin lugar a dudas, se les puede asignar un valor de verdad: o
  son verdaderos, o son falsos, pero nunca ambos a la vez.

  '
resumen: 'Una proposición matemática es un enunciado aseverativo o declarativo del cual se puede afirmar,
  de forma objetiva y sin ambigüedad, que es verdadero o falso. No incluye preguntas, órdenes, exclamaciones
  ni opiniones subjetivas.

  '
explicacion: 'Una **proposición matemática** (o proposición lógica) es un enunciado declarativo que tiene
  la propiedad de ser **verdadero** ($V$) o **falso** ($F$), pero no ambos de forma simultánea.


  Para que una oración sea considerada una proposición, debe cumplir con las siguientes características:

  1. **Ser declarativa**: Debe afirmar o negar algo sobre el mundo o sobre objetos matemáticos.

  2. **Tener un valor de verdad definido**: Debe ser posible (en principio) determinar si es verdadera
  o falsa de manera objetiva.


  **Ejemplos de proposiciones**:

  - ''$p$: "Santiago es la capital de Chile" (Es una proposición verdadera, $V$).''

  - ''$q$: "$5 + 3 = 9$" (Es una proposición falsa, $F$, ya que $5 + 3 = 8$).''

  - ''$r$: "El número $2$ es el único primo par" (Es una proposición verdadera, $V$).''


  **Ejemplos de enunciados que NO son proposiciones**:

  - ''"¡Qué hermoso día!" (Es una exclamación, subjetiva).''

  - ''"¿Dónde están mis llaves?" (Es una pregunta).''

  - ''"Resuelve la ecuación" (Es una instrucción u orden).''

  - ''"El chocolate es el mejor sabor" (Es una opinión subjetiva, no tiene valor de verdad objetivo).''

  - ''"$x + 3 = 10$" (Es una función proposicional o enunciado abierto; no se puede determinar su valor
  de verdad sin conocer el valor de $x$).''

  '
procedimiento:
- 'Paso 1: Leer atentamente el enunciado y determinar si es una oración declarativa (que afirma o niega
  algo).'
- 'Paso 2: Evaluar si tiene sentido preguntarse si la declaración es verdadera o falsa de forma objetiva.'
- 'Paso 3: Si es declarativa y tiene un único valor de verdad (verdadero o falso), entonces es una proposición.
  Si es una exclamación, pregunta, orden o expresión con variables libres sin definir, no es una proposición.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determine si el enunciado '$7$ es un número impar' es una proposición.
  solucion_pasos:
  - 'Paso a: El enunciado ''$7$ es un número impar'' es una oración declarativa que afirma una propiedad
    del número $7$.'
  - 'Paso b: Podemos evaluar de forma objetiva si es verdadero o falso. En este caso, $7$ efectivamente
    es impar, por lo tanto el enunciado es verdadero.'
  - 'Paso c: Como es un enunciado declarativo con un valor de verdad definido, concluimos que sí es una
    proposición.'
- titulo: Ejemplo 2
  enunciado: Determine si el enunciado '¿Cuánto es $4 \\cdot 5$?' es una proposición.
  solucion_pasos:
  - 'Paso a: El enunciado es una pregunta directa, no una declaración.'
  - 'Paso b: Las preguntas no afirman nada y no se les puede asignar un valor de verdadero o falso.'
  - 'Paso c: Por lo tanto, no es una proposición.'
- titulo: ¿Es una proposición el enunciado 'El número $15$ es un número primo'?
  respuesta: Sí
  solucion_pasos:
  - El enunciado afirma que $15$ es primo. Aunque esta afirmación es falsa (porque $15 = 3 \\cdot 5$),
    sigue siendo una proposición, ya que es una declaración con un valor de verdad objetivo bien definido
    (falso).
- titulo: ¿Es una proposición el enunciado '¡Ojalá llueva mañana!'?
  respuesta: 'No'
  solucion_pasos:
  - Este enunciado expresa un deseo (oración desiderativa) y no una afirmación o negación objetiva. Por
    lo tanto, no se le puede asignar un valor de verdad (no es ni verdadero ni falso), así que no es una
    proposición.
errores_frecuentes:
- Creer que un enunciado falso no es una proposición. Una proposición puede ser falsa; lo importante es
  que tenga un valor de verdad definido.
- Confundir oraciones exclamativas, interrogativas o imperativas con proposiciones.
- Considerar que las opiniones subjetivas son proposiciones matemáticas.
- Pensar que las ecuaciones con variables libres (como $x + 2 = 5$) son proposiciones, cuando en realidad
  son enunciados abiertos.
- Creer que si no conocemos actualmente si algo es verdadero o falso, no es una proposición (por ejemplo,
  'Hay vida en Marte' sí es una proposición porque tiene un valor de verdad objetivo, aunque no lo conozcamos
  con certeza absoluta).
fuente: Lógica y Teoría de Conjuntos, Santillana p.12
estado: publicado
