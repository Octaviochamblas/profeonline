semantic_id: MAT.EST.NORMAL_APLICACIONES.UMBRAL_CRITICO
titulo: Calcular probabilidades sobre o bajo un umbral crítico
objetivo: Calcular la probabilidad de que una variable normal supere o no alcance un umbral crítico definido en un
  problema aplicado.
introduccion: Muchas decisiones reales dependen de saber qué probabilidad hay de superar (o no alcanzar) un cierto
  límite importante, como un puntaje mínimo o un nivel de alerta.
resumen: Un umbral crítico es un valor de referencia importante en un problema aplicado; la probabilidad de
  superarlo o no alcanzarlo se calcula estandarizando ese valor y usando la tabla Z.
explicacion: '![Probabilidad sobre o bajo un umbral crítico](/static/img/estadistica/normapli/normapli-umbral-critico.svg)


  ### Definición formal


  Dado un umbral crítico $c$ en una distribución $N(\mu,\sigma)$, se calcula $Z_c=\dfrac{c-\mu}{\sigma}$ y luego se

  usa la tabla Z para obtener $P(X<c)$ o $P(X>c)$, según lo que pida el problema.


  ### Desarrollo didáctico


  Este tipo de cálculo es muy común en contextos como aprobación de exámenes, niveles de alerta médica o límites de

  seguridad en procesos industriales.'
procedimiento:
- 'Paso 1: Identifica el umbral crítico $c$ y los parámetros $\mu$ y $\sigma$ de la distribución.'
- 'Paso 2: Calcula el puntaje $Z_c=\dfrac{c-\mu}{\sigma}$.'
- 'Paso 3: Usa la tabla Z para calcular la probabilidad pedida (sobre o bajo el umbral).'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Un examen exige un mínimo de 500 puntos para aprobar, y los puntajes siguen $N(480, 40)$. ¿Cuál es la
    probabilidad de aprobar?
  solucion_pasos:
  - $Z=(500-480)/40=0{,}5$.
  - $P(X>500)=1-P(Z<0{,}5)\approx 1-0{,}6915=0{,}3085$.
- titulo: Ejemplo 2
  enunciado: ¿Qué representa el resultado del ejemplo anterior en el contexto del examen?
  solucion_pasos:
  - Representa que aproximadamente el 30,85% de los postulantes aprobaría el examen.
- titulo: ¿Un umbral crítico puede representar un puntaje mínimo de aprobación?
  respuesta: Sí
  solucion_pasos:
  - Sí, es un ejemplo típico de umbral crítico.
- titulo: ¿Para calcular la probabilidad de superar un umbral es innecesario estandarizar el valor?
  respuesta: 'No'
  solucion_pasos:
  - Esta afirmación es incorrecta: siempre se debe estandarizar el umbral antes de usar la tabla Z.
errores_frecuentes:
- Olvidar estandarizar el umbral crítico antes de buscar en la tabla.
- Confundir "superar el umbral" con "no alcanzar el umbral" al interpretar el resultado.
- Usar el complemento quando en realidad se pedía el área directa, o viceversa.
- Calcular mal el puntaje Z por errores de signo.
- Interpretar el resultado sin conectar el número con el contexto real del umbral.
fuente: 'Elaboración propia.'
estado: publicado
