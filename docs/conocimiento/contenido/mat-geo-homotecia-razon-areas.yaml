semantic_id: MAT.GEO.HOMOTECIA.RAZON_AREAS
titulo: Relación entre áreas de figuras homotéticas como cuadrado de la razón de homotecia
objetivo: Comprender que la razón entre las áreas de una figura y su imagen homotética es igual al cuadrado
  del valor absoluto de la razón de homotecia.
introduccion: Al igual que ocurre con la semejanza en general, las áreas de figuras relacionadas por una
  homotecia siguen una regla de escalamiento cuadrática.
resumen: La razón entre el área de la figura imagen y el área de la figura original bajo una homotecia
  de razón $k$ es $k^2$.
explicacion: '![Razón entre áreas homotéticas](/static/img/geometria/congruencia-semejanza/homotecia-razon-areas.svg)


  ### Definición formal


  Si $A_1$ es el área de la figura original y $A_2$ el área de su imagen bajo homotecia de razón $k$,
  entonces $\frac{A_2}{A_1}=k^2$.


  ### Desarrollo didáctico


  Una homotecia con razón $k=-3$ aplicada a un triángulo de área 8 cm² produce una imagen de área $8\times(-3)^2=8\times9=72$
  cm²; nótese que se usa $k^2$ (siempre positivo), no $|k|$, aunque para el área el resultado sea equivalente
  ya que $k^2=|k|^2$.'
procedimiento:
- 'Paso 1: Identifica el área de la figura original y la razón de homotecia k.'
- 'Paso 2: Eleva la razón k al cuadrado (el resultado siempre será positivo).'
- 'Paso 3: Multiplica el área original por k² para obtener el área de la figura imagen.'
ejemplos:
- titulo: Calcular el área imagen con k positivo
  enunciado: Un triángulo de área 8 cm² se transforma bajo una homotecia de razón k=3.
  solucion_pasos:
  - Área imagen = 8×3²=8×9=72 cm².
- titulo: Calcular el área imagen con k negativo
  enunciado: Un triángulo de área 8 cm² se transforma bajo una homotecia de razón k=-3.
  solucion_pasos:
  - Área imagen = 8×(-3)²=8×9=72 cm² (el mismo resultado que con k positivo).
- titulo: ¿El signo de k afecta el área de la figura imagen?
  respuesta: 'No'
  solucion_pasos:
  - No, porque k² siempre es positivo, sin importar el signo de k.
- titulo: ¿Esta relación es la misma que para la razón de semejanza general?
  respuesta: Sí
  solucion_pasos:
  - Sí, la homotecia es un caso particular de semejanza, y sigue la misma regla de área proporcional al
    cuadrado de la razón.
errores_frecuentes:
- Usar |k| en vez de k² al calcular el área (aunque el resultado numérico final coincida, el razonamiento
  correcto usa el cuadrado).
- Confundir la razón de áreas (k²) con la razón de longitudes (|k|).
- Olvidar elevar al cuadrado, aplicando la razón de forma lineal al área.
fuente: Elaboración propia.
estado: publicado
