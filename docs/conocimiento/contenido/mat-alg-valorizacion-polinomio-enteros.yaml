semantic_id: MAT.ALG.VALORIZACION.POLINOMIO_ENTEROS
objetivo: Valorizar polinomios resolviendo múltiples términos separados por sumas y restas.
introduccion: Un polinomio es como un tren. Está compuesto por varios vagones (monomios) unidos por enganches de
  suma o resta. Para calcular el peso total del tren, primero calculamos el peso de cada vagón por separado y luego
  los sumamos todos.
resumen: Al valorizar un **Polinomio**, se debe evaluar cada término (monomio) de forma independiente respetando
  la jerarquía de operaciones, y **al final se realizan las sumas y restas** que conectan a los términos.
explicacion: '### Definición formal


  Las sumas y restas (engranajes del polinomio) son la última operación de la jerarquía PAPOMUDAS.


  ### Desarrollo didáctico


  Sea el polinomio: $2x^2 - 3x + 5$, para $x=4$.

  Evaluamos vagón por vagón:

  - Primer vagón ($2x^2$): $2(4)^2 = 2(16) = 32$.

  - Segundo vagón ($3x$): $3(4) = 12$.

  - Tercer vagón ($5$): Es una constante, se queda como 5.


  Ahora reconstruimos el tren con sus signos originales:

  $32 - 12 + 5$

  Operamos de izquierda a derecha:

  $20 + 5 = 25$.

  Ese es el valor del polinomio.'
procedimiento:
- 'Paso 1: Sustituye la variable en cada término del polinomio.'
- 'Paso 2: Resuelve las potencias y multiplicaciones dentro de cada término individual.'
- 'Paso 3: Reescribe el polinomio completo solo con los resultados numéricos de cada término y sus signos originales.'
- 'Paso 4: Realiza las sumas y restas finales de izquierda a derecha.'
- Las sumas y restas (engranajes del polinomio) son la última operación de la jerarquía PAPOMUDAS.
ejemplos:
- titulo: El tren polinómico
  enunciado: Valora 3a^2 - 2a + 1 para a=5.
  solucion_pasos:
  - 'Sustitución: 3(5)^2 - 2(5) + 1.'
  - 'Primer término: 3(25) = 75.'
  - 'Segundo término: 2(5) = 10.'
  - 'Reescribiendo: 75 - 10 + 1.'
  - 'Resultado: 65 + 1 = 66.'
- titulo: La altura $h$ de un proyectil en función del tiempo $t$ está dada por el polinomio $h(t) = 5
  enunciado: 'La altura $h$ de un proyectil en función del tiempo $t$ está dada por el polinomio $h(t) = 50t - 5t^2$.
    Si se quiere conocer la altura exacta al los $4$ segundos de vuelo, ¿qué cálculo debe realizarse? (v1)


    Opciones: A) $120$ metros. · B) $200$ metros. · C) $40$ metros. · D) $80$ metros.'
  solucion_pasos:
  - 'Evaluamos el polinomio en $t=4$: $50(4) - 5(4)^2$. Primer vagón: $200$. Segundo vagón: $5(16) = 80$. Diferencia:
    $200 - 80 = 120$.'
  - 'Respuesta: $120$ metros.'
