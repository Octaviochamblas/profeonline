errores_frecuentes:
- Mezclar términos antes de resolver sus multiplicaciones (ej. restar el 2 de '3a^2 - 2' antes de multiplicarlo
  por 'a').
- Equivocarse en la regla de los signos al sumar o restar los resultados finales.
- Para «Al evaluar el polinomio $3x^2 + 4x - 5$, ¿cuál es el procedimiento correcto respecto al orden de las sumas
  y restas centrales? (v1)», la respuesta correcta es Se puede sumar el $3x^2$ con el $4x$ directamente sumando
  los coeficientes ($7x^3$) y luego sustituir.
- Para «Al evaluar el polinomio $3x^2 + 4x - 5$, ¿cuál es el procedimiento correcto respecto al orden de las sumas
  y restas centrales? (v1)», la respuesta correcta es Se debe restar el $5$ al $4$ antes de multiplicarlo por $x$.
- Para «Al evaluar el polinomio $3x^2 + 4x - 5$, ¿cuál es el procedimiento correcto respecto al orden de las sumas
  y restas centrales? (v1)», la respuesta correcta es Las operaciones deben hacerse de derecha a izquierda obligatoriamente.
