semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.EXPONENTE_NATURAL
objetivo: Evaluar potencias con exponente natural.
introduccion: Los exponentes naturales construyen potencias mediante repetición. Esa
  lectura permite calcular y, a la vez, anticipar el signo sin depender de una calculadora.
resumen: Para \(n\in\mathbb{N}\), \(a^n\) es el producto de \(n\) factores iguales
  a \(a\). La paridad del exponente controla el signo cuando la base es negativa.
explicacion: |-
  Para \(n\in\mathbb{N}\), \(a^n\) es el producto de \(n\) factores iguales a \(a\).

  En el caso “\((-2)^5=(-2)(-2)(-2)(-2)(-2)=-32\)” esta idea se hace visible: la paridad del exponente controla el signo cuando la base es negativa
procedimiento:
- 'Paso 1: Escribe la base completa tantas veces como indique el exponente.'
- 'Paso 2: Determina primero el signo contando factores negativos.'
- 'Paso 3: Multiplica los valores absolutos y combina el signo previsto.'
ejemplos:
- titulo: Aplicación razonada — Potencia con exponente natural
  enunciado: \((-2)^5=(-2)(-2)(-2)(-2)(-2)=-32\).
  solucion_pasos:
  - Escribe la base completa tantas veces como indique el exponente.
  - Determina primero el signo contando factores negativos.
  - Multiplica los valores absolutos y combina el signo previsto.
- titulo: Revisión de una solución — Potencia con exponente natural
  enunciado: Una solución aplica “Determina primero el signo contando factores negativos.”,
    pero termina sin comprobar que la paridad del exponente controla el signo cuando
    la base es negativa. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define potencia con exponente natural: para \(n\in\mathbb{N}\),
    \(a^n\) es el producto de \(n\) factores iguales a \(a\).'
  - Escribe la base completa tantas veces como indique el exponente.
  - 'Completa la revisión con este control: Multiplica los valores absolutos y combina
    el signo previsto.'
- titulo: ¿Se cumple que la paridad del exponente controla el signo cuando la base
    es negativa? — Potencia con exponente natural
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para \(n\in\mathbb{N}\), \(a^n\) es
    el producto de \(n\) factores iguales a \(a\).
  - El caso “\((-2)^5=(-2)(-2)(-2)(-2)(-2)=-32\)” satisface esa condición.
  - Multiplica los valores absolutos y combina el signo previsto.
- titulo: ¿Es válido omitir el paso “Escribe la base completa tantas veces como indique
    el exponente”? — Potencia con exponente natural
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de potencia con exponente natural.
  - 'Omitirlo puede volver inválida la acción siguiente: Determina primero el signo
    contando factores negativos.'
  - 'La solución debe terminar de este modo: Multiplica los valores absolutos y combina
    el signo previsto.'
errores_frecuentes:
- 'Confundir potencia con exponente natural con otro concepto y omitir este inicio:
  Escribe la base completa tantas veces como indique el exponente.'
- Aplicar mecánicamente “Determina primero el signo contando factores negativos.”
  sin revisar las condiciones de la definición.
- Tomar “\((-2)^5=(-2)(-2)(-2)(-2)(-2)=-32\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la paridad del exponente controla
  el signo cuando la base es negativa”.
- 'Terminar el desarrollo sin realizar este control: Multiplica los valores absolutos
  y combina el signo previsto.'
