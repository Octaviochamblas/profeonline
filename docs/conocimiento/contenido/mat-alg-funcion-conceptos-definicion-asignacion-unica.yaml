semantic_id: MAT.ALG.FUNCION_CONCEPTOS.DEFINICION_ASIGNACION_UNICA
titulo: Concepto de función como regla de asignación única
objetivo: Comprender la definición de función como una correspondencia que asigna a cada elemento del dominio exactamente
  un elemento del codominio.
introduccion: 'Ya conoces las relaciones entre conjuntos. Una función es un tipo especial de relación con una regla
  estricta de unicidad: cada entrada produce una única salida, nunca dos.'
resumen: Una **función** $f$ de un conjunto $A$ (dominio) en un conjunto $B$ (codominio) es una correspondencia
  que asigna a **cada** elemento de $A$ **exactamente un** elemento de $B$.
explicacion: '### Definición formal


  Sea $A$ y $B$ dos conjuntos no vacíos. Una función $f\colon A \to B$ es un subconjunto de pares ordenados $(x, y)
  \in A \times B$ tal que para todo $x \in A$ existe un único $y \in B$ con $(x,y) \in f$; se escribe $y = f(x)$.
  La condición de existencia exige que todo elemento de $A$ tenga imagen, y la de unicidad exige que no tenga más
  de una.


  ### Desarrollo didáctico


  Imagina una máquina expendedora: cada botón (dominio) entrega siempre el mismo producto (imagen), y nunca dos
  productos distintos con el mismo botón. Eso es exactamente lo que exige una función.


  Dos condiciones deben cumplirse simultáneamente:

  1. **Existencia:** todo elemento del dominio debe tener asignada una imagen (nadie se queda sin salida).

  2. **Unicidad:** ningún elemento del dominio puede tener dos imágenes distintas (nadie recibe dos salidas).


  Si alguna de las dos falla, la correspondencia es una simple relación, pero no una función.'
procedimiento:
- 'Paso 1: Identifica el conjunto de partida (dominio) y de llegada (codominio).'
- 'Paso 2: Verifica que todo elemento del dominio tenga al menos una imagen asignada (existencia).'
- 'Paso 3: Verifica que ningún elemento del dominio tenga más de una imagen asignada (unicidad).'
- 'Paso 4: Si ambas condiciones se cumplen, la correspondencia es una función.'
ejemplos:
- titulo: Verificación por pares ordenados
  enunciado: 'Determina si la correspondencia $\{(1,2), (2,3), (3,2), (4,5)\}$ es una función.'
  solucion_pasos:
  - Cada primer componente (1, 2, 3, 4) aparece una sola vez en la lista.
  - No hay dos pares con la misma primera componente y distinta segunda componente.
  - Se cumple existencia y unicidad. Es una función.
- titulo: Detección de falla de unicidad
  enunciado: 'Determina si la correspondencia $\{(1,2), (1,5), (2,3)\}$ es una función.'
  solucion_pasos:
  - El elemento $1$ aparece dos veces, asociado a $2$ y a $5$.
  - Esto viola la condición de unicidad de la imagen.
  - No es una función.
- titulo: ¿Toda relación entre dos conjuntos es una función?
  enunciado: ¿Toda relación entre dos conjuntos es una función?
  respuesta: 'No'
  solucion_pasos:
  - Una relación solo es función si cumple existencia y unicidad de imagen para cada elemento del dominio.
  - Muchas relaciones asignan dos o más imágenes a un mismo elemento, o dejan elementos sin imagen.
- titulo: ¿Puede un elemento del dominio quedar sin imagen asignada en una función?
  enunciado: ¿Puede un elemento del dominio quedar sin imagen asignada en una función?
  respuesta: 'No'
  solucion_pasos:
  - La condición de existencia exige que todo elemento del dominio tenga asignada al menos una imagen.
  - Si algún elemento queda sin imagen, la correspondencia no es una función sobre ese dominio.
errores_frecuentes:
- Creer que basta con que "la mayoría" de los elementos tengan una sola imagen; la unicidad debe cumplirse para
  todos sin excepción.
- Confundir función con relación biunívoca, asumiendo que también el codominio necesita unicidad de preimagen.
- Pensar que dos elementos distintos del dominio no pueden compartir la misma imagen (eso sí está permitido en
  una función general).
- Olvidar verificar la condición de existencia y centrarse solo en la unicidad.
- Asumir que una fórmula algebraica siempre define una función sin revisar restricciones de dominio.
