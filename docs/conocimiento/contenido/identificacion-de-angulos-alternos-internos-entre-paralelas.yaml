semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.ALTERNOS_INTERNOS_IDENTIFICACION
titulo: Identificación de ángulos alternos internos entre paralelas
objetivo: Identificar un par de ángulos alternos internos en un esquema con paralelas y comprobar que
  estar en la zona interior y en lados opuestos de la transversal es lo que define al par.
introduccion: Cuando una calle cruza dos avenidas paralelas aparecen muchos ángulos con nombres distintos.
  El truco no es memorizar números, sino mirar dónde queda cada uno respecto de la transversal y de las
  paralelas. Este recurso se centra en identificación de ángulos alternos internos entre paralelas y en
  cómo reconocerlo con un criterio geométrico claro.
resumen: Los ángulos alternos internos se reconocen por su posición relativa respecto de dos paralelas
  y una transversal. Como idea de control, estar en la zona interior y en lados opuestos de la transversal
  es lo que define al par.
explicacion: 'Los ángulos alternos internos se reconocen por su posición relativa respecto de dos paralelas
  y una transversal.


  La situación “entre dos paralelas, los ángulos 3 y 5 quedan dentro de las rectas y a lados opuestos
  de la transversal” muestra cómo pasar del dibujo a una conclusión válida: primero se identifica la relación
  correcta y luego se verifica que estar en la zona interior y en lados opuestos de la transversal es
  lo que define al par.'
procedimiento:
- 'Paso 1: Ubica primero cuáles son las rectas paralelas y cuál es la transversal.'
- 'Paso 2: Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.'
- 'Paso 3: Concluye si el par corresponde a ángulos alternos internos y descarta relaciones vecinas.'
ejemplos:
- titulo: Aplicación directa — Alternos internos
  enunciado: Entre dos paralelas, los ángulos 3 y 5 quedan dentro de las rectas y a lados opuestos de
    la transversal.
  solucion_pasos:
  - Ubica primero cuáles son las rectas paralelas y cuál es la transversal.
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos alternos internos y descarta relaciones vecinas.
- titulo: Verificación de la solución — Alternos internos
  enunciado: 'Revisa una solución del caso “entre dos paralelas, los ángulos 3 y 5 quedan dentro de las
    rectas y a lados opuestos de la transversal”: el resultado parece razonable, pero falta conectar el
    dibujo con la definición. Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: los ángulos alternos internos se reconocen por su posición relativa respecto
    de dos paralelas y una transversal.'
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos alternos internos y descarta relaciones vecinas.
- titulo: ¿Puede concluirse correctamente este hecho? — Alternos internos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: los ángulos alternos internos se reconocen
    por su posición relativa respecto de dos paralelas y una transversal.'
  - En el caso “entre dos paralelas, los ángulos 3 y 5 quedan dentro de las rectas y a lados opuestos
    de la transversal” se observa que estar en la zona interior y en lados opuestos de la transversal
    es lo que define al par.
  - Concluye si el par corresponde a ángulos alternos internos y descarta relaciones vecinas.
- titulo: ¿Se puede omitir el paso intermedio? — Alternos internos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de identificación de ángulos alternos internos
    entre paralelas.
  - Después del paso “Ubica primero cuáles son las rectas paralelas y cuál es la transversal.” todavía
    hace falta revisar “Decide si cada ángulo está en la zona interior o exterior y en qué lado de la
    transversal queda.”.
  - El cierre correcto exige “Concluye si el par corresponde a ángulos alternos internos y descarta relaciones
    vecinas.”.
errores_frecuentes:
- Alternos internos significa cualquier par interior, aunque quede del mismo lado de la transversal.
- Para resolver alternos internos, basta con el paso “Ubica primero cuáles son las rectas paralelas y
  cuál es la transversal.” y no hace falta revisar “Decide si cada ángulo está en la zona interior o exterior
  y en qué lado de la transversal queda.”.
- Si el dibujo parece claro, se puede ignorar que estar en la zona interior y en lados opuestos de la
  transversal es lo que define al par.
- Dos configuraciones distintas representan alternos internos solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si el par corresponde a ángulos
  alternos internos y descarta relaciones vecinas.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
