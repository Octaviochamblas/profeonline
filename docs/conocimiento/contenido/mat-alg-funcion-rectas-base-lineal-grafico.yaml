semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.LINEAL_GRAFICO
titulo: Representación gráfica de la función lineal
objetivo: Graficar una función lineal identificando que su recta pasa siempre por el origen del plano cartesiano.
introduccion: Toda función lineal comparte un punto de partida obligatorio en su gráfica, el origen, y desde ahí
  se despliega en línea recta según su pendiente.
resumen: La gráfica de la función lineal $f(x) = mx$ es una **recta que pasa por el origen** $(0,0)$, con inclinación
  determinada por el valor de la pendiente $m$.
explicacion: '### Definición formal


  La gráfica de $f(x) = mx$ es el conjunto $\{(x, mx) : x \in \mathbb{R}\}$, una recta que satisface $f(0)=0$,
  por lo que necesariamente pasa por el origen del sistema de coordenadas. La inclinación de la recta queda determinada
  por el signo y magnitud de $m$.


  ### Desarrollo didáctico


  Para graficar, basta con el origen $(0,0)$ y un segundo punto obtenido evaluando la función en cualquier otro
  valor de $x$; con esos dos puntos, se traza la recta completa.


  Si $f(x) = 2x$: el origen $(0,0)$ y el punto $(1,2)$ determinan la recta completa, que se extiende infinitamente
  en ambas direcciones.'
procedimiento:
- 'Paso 1: Marca el origen $(0,0)$, que siempre pertenece a la gráfica.'
- 'Paso 2: Evalúa la función en un valor de $x$ distinto de cero para obtener un segundo punto.'
- 'Paso 3: Traza la recta que une ambos puntos, extendiéndola en ambas direcciones.'
ejemplos:
- titulo: Gráfica con pendiente positiva
  enunciado: Grafica $f(x) = 3x$ usando el origen y un segundo punto.
  solucion_pasos:
  - El origen $(0,0)$ pertenece a la gráfica.
  - '$f(1) = 3$, dando el punto $(1,3)$.'
  - Se traza la recta que une $(0,0)$ y $(1,3)$.
- titulo: Gráfica con pendiente negativa
  enunciado: Grafica $f(x) = -x$ usando el origen y un segundo punto.
  solucion_pasos:
  - El origen $(0,0)$ pertenece a la gráfica.
  - '$f(2) = -2$, dando el punto $(2,-2)$.'
  - Se traza la recta que une $(0,0)$ y $(2,-2)$.
- titulo: ¿Toda recta que pasa por el origen representa una función lineal?
  enunciado: ¿Toda recta que pasa por el origen representa una función lineal?
  respuesta: 'No'
  solucion_pasos:
  - La recta vertical $x=0$ pasa por el origen pero no representa una función (viola el criterio de la línea vertical).
- titulo: ¿El punto $(0,0)$ siempre pertenece a la gráfica de una función lineal?
  enunciado: ¿El punto $(0,0)$ siempre pertenece a la gráfica de una función lineal?
  respuesta: Sí
  solucion_pasos:
  - Toda función lineal cumple $f(0)=0$, así que el origen siempre está en su gráfica.
errores_frecuentes:
- Olvidar que el origen siempre debe estar marcado como punto de la recta.
- Confundir la gráfica de una función lineal con una que no pasa por el origen (afín).
- Calcular mal el segundo punto por errores de evaluación.
- Trazar la recta solo en el primer cuadrante, ignorando que se extiende en ambas direcciones.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
