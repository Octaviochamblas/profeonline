semantic_id: MAT.GEO.CONGRUENCIA_TRIANGULOS.CORRESPONDENCIA_LADOS_ANGULOS
titulo: Correspondencia de lados y ángulos homólogos en triángulos congruentes
objetivo: Identificar los lados y ángulos homólogos (correspondientes) entre dos triángulos congruentes,
  y reconocer que son iguales entre sí.
introduccion: 'Una vez establecida la correspondencia de vértices, se puede dar el siguiente paso: identificar
  qué lados y qué ángulos son homólogos, y verificar que en triángulos congruentes son siempre iguales.'
resumen: En triángulos congruentes, los lados homólogos (correspondientes) tienen la misma longitud, y
  los ángulos homólogos tienen la misma medida.
explicacion: '![Correspondencia de lados y ángulos homólogos](/static/img/geometria/congruencia-semejanza/congruencia-lados-angulos.svg)


  ### Definición formal


  Si $\triangle ABC\cong\triangle A''B''C''$, entonces $AB=A''B''$, $BC=B''C''$, $CA=C''A''$, y $\angle
  A=\angle A''$, $\angle B=\angle B''$, $\angle C=\angle C''$.


  ### Desarrollo didáctico


  Esta propiedad es justamente lo que hace "iguales" a dos triángulos congruentes: no solo los vértices
  se corresponden, sino que cada lado y cada ángulo homólogo comparte exactamente la misma medida, sin
  excepción.'
procedimiento:
- 'Paso 1: Determina la correspondencia de vértices entre los dos triángulos.'
- 'Paso 2: Identifica cada lado homólogo (formado por vértices correspondientes) y cada ángulo homólogo.'
- 'Paso 3: Concluye que cada par de lados homólogos y cada par de ángulos homólogos son iguales.'
ejemplos:
- titulo: Identificar lados homólogos
  enunciado: Con △ABC≅△DEF, ¿qué lado es homólogo a BC?
  solucion_pasos:
  - El lado EF, ya que B↔E y C↔F.
- titulo: Usar la igualdad de ángulos homólogos
  enunciado: Con △ABC≅△DEF y ∠B=70°, ¿cuánto mide ∠E?
  solucion_pasos:
  - ∠E=70°, porque B y E son ángulos homólogos.
- titulo: ¿Los lados homólogos son siempre iguales en triángulos congruentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad esencial de la congruencia.
- titulo: ¿Se puede tener congruencia sin que todos los ángulos homólogos sean iguales?
  respuesta: 'No'
  solucion_pasos:
  - No, la igualdad de todos los ángulos homólogos (y lados) es parte de la definición de congruencia.
errores_frecuentes:
- Identificar mal qué lado o ángulo es homólogo a otro, sin seguir la correspondencia de vértices.
- Suponer que solo algunos lados o ángulos homólogos son iguales, y otros no.
- Confundir lados homólogos con lados adyacentes en un mismo triángulo.
fuente: Elaboración propia.
estado: publicado
