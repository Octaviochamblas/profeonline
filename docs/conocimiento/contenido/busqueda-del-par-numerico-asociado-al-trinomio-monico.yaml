semantic_id: MAT.ALG.FACTOR_TRINOMIOS.PAR_NUMERICO_SIMPLE
titulo: Búsqueda del par numérico asociado al trinomio mónico
objetivo: Aplicar la regla aditivo-multiplicativa cuando el término central es negativo pero el independiente
  es positivo.
introduccion: 'A veces la pista principal está en los signos. Si el tercer término es positivo, nos grita:
  "Los dos números tienen el mismo signo.". Pero si el término del medio es negativo. bueno, blanco y
  en botella: Ambos números deben ser negativos.'
resumen: En un trinomio $x^2 - px + q$ (donde $q$ es positivo y el central es negativo), la factorización
  resultará siempre en $(x - a)(x - b)$. Ambos números encontrados deben ser negativos.
explicacion: '### Definición formal


  Producto positivo exige signos iguales. Suma negativa exige que esos signos iguales sean negativos.


  ### Desarrollo didáctico


  Estudiemos $x^2 - 7x + 12$.

  - Queremos que multiplicados den $+12$.

  - Queremos que sumados den $-7$.


  Para que la multiplicación sea positiva, pueden ser dos positivos o dos negativos. Pero como al sumarlos
  dan $-7$ (un número negativo), la única forma es que AMBOS sean negativos.


  Filtremos los pares que multiplican 12 y pongámosles signos negativos:

  - $(-1) \cdot (-12) = 12 \rightarrow$ Suma: $-13$ (No).

  - $(-2) \cdot (-6) = 12 \rightarrow$ Suma: $-8$ (No).

  - $(-3) \cdot (-4) = 12 \rightarrow$ Suma: $-7$ (Sí.).


  Nuestra factorización es $(x - 3)(x - 4)$. Un truco útil es simplemente buscar los números positivos
  que sumen el valor del medio y luego ponerles el signo menos a ambos.'
procedimiento:
- 'Paso 1: Detecta el patrón de signos: $(+)x^2 (-)x (+)$.'
- 'Paso 2: Escribe tus paréntesis con signos negativos pre-colocados: $(x - \quad)(x - \quad)$.'
- 'Paso 3: Busca dos números positivos que multiplicados den el 3er término y sumados den el valor numérico
  (sin signo) del 2do término.'
- 'Paso 4: Pon esos números en los espacios vacíos.'
ejemplos:
- titulo: Factoriza $x^2 - 9x + 20$
  enunciado: Factoriza $x^2 - 9x + 20$.
  solucion_pasos:
  - Signos son $(-)$ y $(+)$. Ambos números serán negativos.
  - Multiplicados dan 20, sumados dan 9.
  - Los números son 4 y 5.
  - 'Resultado: $(x - 4)(x - 5)$.'
- titulo: En $y^2 - 10y + 16$, ¿cuál es la factorización?
  solucion_pasos:
  - 2 y 8 suman 10 y multiplican 16. Ambos van con signo menos.
- titulo: 'Respecto de «Búsqueda del par numérico asociado al trinomio mónico»: ¿Se ajusta a la definic'
  enunciado: 'Respecto de «Búsqueda del par numérico asociado al trinomio mónico»: ¿Se ajusta a la definición
    esta afirmación? «En un trinomio $x^2 - px + q$ (donde $q$ es positivo y el central es negativo),
    la factorización resultará siempre en $(x - a)(x - b)$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: En un trinomio $x^2 - px + q$ (donde $q$ es positivo
    y el central es negativo), la factorización resultará siempre en $(x - a)(x - b)$.'
- titulo: 'Respecto de «Búsqueda del par numérico asociado al trinomio mónico»: ¿Es compatible con el
    p'
  enunciado: 'Respecto de «Búsqueda del par numérico asociado al trinomio mónico»: ¿Es compatible con
    el procedimiento esta afirmación? «Poner un signo positivo y uno negativo. Si lo haces, la multiplicación
    daría negativo, lo cual contradice el 3er término»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En un trinomio $x^2 - px + q$ (donde $q$ es positivo
    y el central es negativo), la factorización resultará siempre en $(x - a)(x - b)$.'
errores_frecuentes:
- Poner un signo positivo y uno negativo. Si lo haces, la multiplicación daría negativo, lo cual contradice
  el 3er término.
- Equivocarse en la suma de números negativos, tratándolos como una resta.
- Para «Si en $x^2 + bx + c$, la letra 'c' es positiva y 'b' es negativa, ¿qué puedes deducir de los números
  que buscas», la respuesta correcta es Ambos son positivos.
- Para «Si en $x^2 + bx + c$, la letra 'c' es positiva y 'b' es negativa, ¿qué puedes deducir de los números
  que buscas», la respuesta correcta es Uno positivo y uno negativo.
- Para «Si en $x^2 + bx + c$, la letra 'c' es positiva y 'b' es negativa, ¿qué puedes deducir de los números
  que buscas», la respuesta correcta es Uno de ellos es cero.
