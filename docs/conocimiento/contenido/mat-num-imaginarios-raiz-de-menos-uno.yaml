semantic_id: MAT.NUM.IMAGINARIOS.RAIZ_DE_MENOS_UNO
objetivo: Interpretar \(i\) al resolver una raíz o ecuación negativa.
introduccion: 'El símbolo \(i\) no es una variable desconocida cualquiera: nombra
  una cantidad cuyo cuadrado es negativo y abre la puerta al plano complejo.'
resumen: \(i\) representa una raíz cuadrada de \(-1\). Las dos soluciones de \(x^2=-1\)
  son \(i\) y \(-i\).
explicacion: |-
  \(i\) representa una raíz cuadrada de \(-1\).

  Al analizar “\(i^2=-1\), por lo que \(i\) satisface \(x^2=-1\)” conviene observar la conexión siguiente: las dos soluciones de \(x^2=-1\) son \(i\) y \(-i\)
procedimiento:
- 'Paso 1: Reescribe la raíz negativa separando \(-1\).'
- 'Paso 2: Usa \(\sqrt{-1}=i\) para la raíz principal elegida por convenio.'
- 'Paso 3: Si resuelves una ecuación cuadrática, incluye ambas soluciones \(\pm i\).'
ejemplos:
- titulo: Aplicación razonada — Interpretación de i como raíz de menos uno
  enunciado: \(i^2=-1\), por lo que \(i\) satisface \(x^2=-1\).
  solucion_pasos:
  - Reescribe la raíz negativa separando \(-1\).
  - Usa \(\sqrt{-1}=i\) para la raíz principal elegida por convenio.
  - Si resuelves una ecuación cuadrática, incluye ambas soluciones \(\pm i\).
- titulo: Revisión de una solución — Interpretación de i como raíz de menos uno
  enunciado: Una solución aplica “Usa \(\sqrt{-1}=i\) para la raíz principal elegida
    por convenio.”, pero termina sin comprobar que las dos soluciones de \(x^2=-1\)
    son \(i\) y \(-i\). Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define interpretación de i como raíz de menos uno:
    \(i\) representa una raíz cuadrada de \(-1\).'
  - Reescribe la raíz negativa separando \(-1\).
  - 'Completa la revisión con este control: Si resuelves una ecuación cuadrática,
    incluye ambas soluciones \(\pm i\).'
- titulo: ¿Se cumple que las dos soluciones de \(x^2=-1\) son \(i\) y \(-i\)? — Interpretación
    de i como raíz de menos uno
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(i\) representa una raíz cuadrada
    de \(-1\).
  - El caso “\(i^2=-1\), por lo que \(i\) satisface \(x^2=-1\)” satisface esa condición.
  - Si resuelves una ecuación cuadrática, incluye ambas soluciones \(\pm i\).
- titulo: ¿Es válido omitir el paso “Reescribe la raíz negativa separando \(-1\)”?
    — Interpretación de i como raíz de menos uno
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de interpretación de i como raíz
    de menos uno.
  - 'Omitirlo puede volver inválida la acción siguiente: Usa \(\sqrt{-1}=i\) para
    la raíz principal elegida por convenio.'
  - 'La solución debe terminar de este modo: Si resuelves una ecuación cuadrática,
    incluye ambas soluciones \(\pm i\).'
errores_frecuentes:
- 'Confundir interpretación de i como raíz de menos uno con otro concepto y omitir
  este inicio: Reescribe la raíz negativa separando \(-1\).'
- Aplicar mecánicamente “Usa \(\sqrt{-1}=i\) para la raíz principal elegida por convenio.”
  sin revisar las condiciones de la definición.
- Tomar “\(i^2=-1\), por lo que \(i\) satisface \(x^2=-1\)” como una igualdad aislada,
  sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “las dos soluciones de \(x^2=-1\)
  son \(i\) y \(-i\)”.
- 'Terminar el desarrollo sin realizar este control: Si resuelves una ecuación cuadrática,
  incluye ambas soluciones \(\pm i\).'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
