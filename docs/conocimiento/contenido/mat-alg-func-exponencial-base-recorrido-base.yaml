objetivo: Determinar el recorrido de una funciĂłn exponencial bĂˇsica de la forma $f(x)=a\cdot b^x$, sin traslaciones
  adicionales.
introduccion: Sin importar quĂ© tan grande o pequeĂ±o sea el exponente, una potencia con base positiva nunca produce
  cero ni un valor negativo; ese hecho determina completamente el recorrido.
resumen: El **recorrido** de $f(x)=a\cdot b^x$ (sin traslaciĂłn vertical) es $]0,+\infty[$ si $a>0$, o $]-\infty,0[$
  si $a<0$; en ningĂşn caso la funciĂłn alcanza el valor cero.
explicacion: '### DefiniciĂłn formal


  Dada $f(x)=a\cdot b^x$ con $b>0$, $b\neq1$: como $b^x>0$ para todo $x$ real, si $a>0$ entonces $f(x)>0$ para
  todo $x$, dando $\text{Rec}(f)=]0,+\infty[$; si $a<0$, entonces $f(x)<0$ para todo $x$, dando $\text{Rec}(f)=]-\infty,0[$.


  ### Desarrollo didĂˇctico


  El valor cero nunca se alcanza porque ninguna potencia con base positiva puede dar exactamente cero, sin importar
  cuĂˇn negativo sea el exponente; la funciĂłn solo se acerca infinitamente a cero sin tocarlo.


  Para $f(x)=3\cdot2^x$: como $a=3>0$, el recorrido es $]0,+\infty[$; la funciĂłn nunca es cero ni negativa.'
procedimiento:
- 'Paso 1: Verifica el signo del coeficiente $a$.'
- 'Paso 2: Si $a>0$, concluye que el recorrido es $]0,+\infty[$.'
- 'Paso 3: Si $a<0$, concluye que el recorrido es $]-\infty,0[$.'
