semantic_id: MAT.EST.BINOMIAL_BASE.PROBABILIDAD_CONSTANTE
titulo: Verificar la condición de constancia de la probabilidad de éxito p
objetivo: Verificar que la probabilidad de éxito p se mantenga constante en todos los ensayos del experimento
  binomial.
introduccion: Además de la independencia, el modelo binomial requiere que la probabilidad de éxito no
  cambie de un ensayo a otro; de lo contrario, no es aplicable la fórmula estándar.
resumen: En un experimento binomial, la probabilidad de éxito $p$ debe permanecer constante en cada uno
  de los $n$ ensayos realizados.
explicacion: '![Constancia de la probabilidad de éxito](/static/img/probabilidad/binombase/binombase-probabilidad-constante.svg)


  ### Definición formal


  $P(\text{éxito en el ensayo }i)=p$ para todo $i=1,2,\ldots,n$, es decir, la probabilidad de éxito es
  la misma en cada ensayo.


  ### Desarrollo didáctico


  Al lanzar la misma moneda repetidamente, la probabilidad de obtener cara ($p=0{,}5$) se mantiene igual
  en cada lanzamiento. En cambio, si se usan monedas distintas con distinta probabilidad de cara en cada
  lanzamiento, esta condición no se cumpliría.'
procedimiento:
- 'Paso 1: Verifica que el experimento se repita en condiciones idénticas en cada ensayo (mismo objeto,
  misma situación).'
- 'Paso 2: Confirma que la probabilidad de éxito no dependa del número de ensayo (por ejemplo, no cambie
  con el tiempo o por desgaste).'
- 'Paso 3: Si se cumple, la probabilidad p es constante, y el modelo binomial estándar es aplicable.'
ejemplos:
- titulo: Verificar constancia de p al lanzar la misma moneda
  enunciado: Lanzar la misma moneda 8 veces.
  solucion_pasos:
  - p es constante en cada lanzamiento, ya que se usa siempre la misma moneda con las mismas características
    físicas.
- titulo: Verificar constancia de p en una máquina que se desgasta
  enunciado: Una máquina fabrica artículos, pero su tasa de defectos aumenta a medida que se desgasta
    con el uso.
  solucion_pasos:
  - p NO es constante en este caso, ya que la probabilidad de defecto cambia (aumenta) con el uso de la
    máquina.
- titulo: ¿La probabilidad p debe ser la misma en todos los ensayos del modelo binomial?
  respuesta: Sí
  solucion_pasos:
  - Sí, es uno de los requisitos fundamentales del modelo, junto con n fijo y la independencia.
- titulo: ¿Usar objetos distintos con distintas probabilidades en cada ensayo respeta la constancia de
    p?
  respuesta: 'No'
  solucion_pasos:
  - No, violaría la condición de constancia, ya que p cambiaría de un ensayo a otro.
errores_frecuentes:
- Aplicar el modelo binomial a situaciones donde la probabilidad de éxito cambia con el tiempo o entre
  ensayos.
- No verificar si las condiciones del experimento se mantienen idénticas en cada repetición.
- Confundir esta condición (constancia de p) con la de independencia entre ensayos (son requisitos relacionados,
  pero distintos).
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
