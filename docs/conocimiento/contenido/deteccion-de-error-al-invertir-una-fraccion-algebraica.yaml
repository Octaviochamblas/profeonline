semantic_id: MAT.ALG.FRACCIONES_DIV.ERROR_RECIPROCO
titulo: Detección de error al invertir una fracción algebraica
objetivo: 'Identificar y evitar el error más frecuente en divisiones: invertir el dividendo o simplificar
  antes de invertir.'
introduccion: En los nervios del examen, la regla 'Mantener, Cambiar, Voltear' se confunde. Al final,
  los estudiantes voltean lo que no deben o tachan en diagonal cuando aún hay un signo de división.
resumen: 'REGLA DE ORO: Jamás simplifiques en diagonal (cruzado) a través de un signo de división ($\div$).
  Solo el término a la derecha del $\div$ debe ser invertido.'
explicacion: '### Definición formal


  El numerador del divisor es, en la práctica, parte del denominador global.


  ### Desarrollo didáctico


  El error más doloroso e imperdonable al dividir fracciones es confundirse de fracción y voltear la primera
  en lugar de la segunda.


  Ejemplo del horror:

  $\frac{x}{y} \div \frac{2}{3}$

  - Estudiante confundido: Voltea la primera $\rightarrow \frac{y}{x} \cdot \frac{2}{3} = \frac{2y}{3x}$.

  - Estudiante maestro: Voltea la SEGUNDA $\rightarrow \frac{x}{y} \cdot \frac{3}{2} = \frac{3x}{2y}$.


  ¿Ves la diferencia? El resultado es completamente distinto. La división no es conmutativa (dividir 10
  entre 2 no es lo mismo que dividir 2 entre 10).


  **REGLA:** El signo de división SOLO afecta a la fracción que está a su INMEDIATA DERECHA. Esa es la
  única que tiene permiso para voltearse.'
procedimiento:
- 'Paso 1: Detecta el signo $\div$. Es como un semáforo en rojo para tachar cruzado.'
- 'Paso 2: Inmediatamente invierte la fracción a la derecha y pon un $\cdot$.'
- 'Paso 3: Solo entonces, con luz verde ($\cdot$), busca qué tachar.'
ejemplos:
- titulo: A simple vista, ¿puedes tachar el 5 de $\frac{x}{5} \div \frac{y}{5}$
  enunciado: A simple vista, ¿puedes tachar el 5 de $\frac{x}{5} \div \frac{y}{5}$?
  solucion_pasos:
  - No.
  - Al invertir queda $\frac{x}{5} \cdot \frac{5}{y}$.
  - 'Ahí el 5 sí se tacha, pero como numerador y denominador. Resultado: $\frac{x}{y}$.'
- titulo: En una división, el 'numerador del divisor' se puede cancelar con el 'numerador del dividend
  enunciado: En una división, el 'numerador del divisor' se puede cancelar con el 'numerador del dividendo'.
  solucion_pasos:
  - ¡Sí! Porque al invertir la segunda fracción, ese 'numerador del divisor' bajará al denominador, pudiendo
    entonces cancelar al numerador de la primera (dividendo).
  - 'Respuesta: Verdadero'
- titulo: 'Respecto de «Detección de error al invertir una fracción algebraica»: ¿La siguiente formulac'
  enunciado: 'Respecto de «Detección de error al invertir una fracción algebraica»: ¿La siguiente formulación
    es correcta? «REGLA DE ORO: Jamás simplifiques en diagonal (cruzado) a través de un signo de división
    ($\div$)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: REGLA DE ORO: Jamás simplifiques en diagonal (cruzado)
    a través de un signo de división ($\div$).'
- titulo: 'Respecto de «Detección de error al invertir una fracción algebraica»: ¿La siguiente conclusi'
  enunciado: 'Respecto de «Detección de error al invertir una fracción algebraica»: ¿La siguiente conclusión
    es correcta? «Tachar cruzado sin haber transformado a multiplicación»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: REGLA DE ORO: Jamás simplifiques en diagonal (cruzado)
    a través de un signo de división ($\div$).'
errores_frecuentes:
- Tachar cruzado sin haber transformado a multiplicación.
- Voltear la primera fracción (A/B -> B/A).
- Porque la división no es asociativa.
- Porque los números negativos no lo permiten.
- Es correcto, se puede cancelar siempre.
