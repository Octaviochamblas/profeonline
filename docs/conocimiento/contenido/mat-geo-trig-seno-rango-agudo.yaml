semantic_id: MAT.GEO.TRIG_FUNDAMENTAL.SENO_RANGO_AGUDO
titulo: Restricción del valor del seno de un ángulo agudo entre 0 y 1
objetivo: Reconocer que el seno de cualquier ángulo agudo siempre toma un valor comprendido estrictamente
  entre 0 y 1.
introduccion: 'El seno de un ángulo agudo nunca puede ser cero ni uno, y mucho menos negativo o mayor
  que uno: siempre está ''atrapado'' entre esos dos valores.'
resumen: Para cualquier ángulo agudo $\theta$ (con $0°<\theta<90°$), se cumple que $0<\sin\theta<1$.
explicacion: '![Rango del seno de un ángulo agudo](/static/img/geometria/trigonometria/trig-seno-rango-agudo.svg)


  ### Definición formal


  Como el cateto opuesto a un ángulo agudo siempre es menor que la hipotenusa (el lado más largo del triángulo
  rectángulo), la razón $\sin\theta=\dfrac{\text{cateto opuesto}}{\text{hipotenusa}}$ siempre resulta
  en un valor entre 0 y 1, sin alcanzar ninguno de esos extremos.


  ### Desarrollo didáctico


  En la figura, el cateto opuesto ($AC$) es siempre menor que la hipotenusa ($BC$), ya que la hipotenusa
  es el lado más largo de cualquier triángulo rectángulo. Por lo tanto, $\sin\theta=\dfrac{AC}{BC}$ siempre
  da un valor menor que 1 y mayor que 0.'
procedimiento:
- 'Paso 1: Recuerda que en cualquier triángulo rectángulo, la hipotenusa es siempre el lado de mayor longitud.'
- 'Paso 2: Reconoce que el cateto opuesto a un ángulo agudo es siempre menor que esa hipotenusa.'
- 'Paso 3: Concluye que la razón (cateto opuesto)/(hipotenusa) siempre está entre 0 y 1, sin alcanzar
  esos extremos para ángulos agudos verdaderos.'
ejemplos:
- titulo: Verificar que un valor de seno calculado es válido
  enunciado: Se calcula sinθ=0,6 para un ángulo agudo.
  solucion_pasos:
  - Es un resultado válido, ya que 0,6 está estrictamente entre 0 y 1.
- titulo: Reconocer un resultado imposible para el seno de un ángulo agudo
  enunciado: Un estudiante calcula sinθ=1,5 para un ángulo agudo.
  solucion_pasos:
  - Ese resultado es imposible, ya que el seno de un ángulo agudo nunca puede ser mayor que 1; hay un
    error en el cálculo.
- titulo: ¿El seno de un ángulo agudo puede ser exactamente 0 o exactamente 1?
  respuesta: 'No'
  solucion_pasos:
  - No, esos valores extremos corresponden a los ángulos límite 0° y 90°, que no son estrictamente agudos.
- titulo: ¿El seno de un ángulo agudo puede ser negativo?
  respuesta: 'No'
  solucion_pasos:
  - No, al ser el cociente de dos longitudes positivas (cateto opuesto e hipotenusa), el resultado siempre
    es positivo.
errores_frecuentes:
- Aceptar como válido un resultado de seno mayor que 1 o negativo sin cuestionar el cálculo.
- Creer que el seno de un ángulo agudo puede alcanzar exactamente los valores 0 o 1.
- Confundir esta restricción con la del coseno, aunque ambas coincidan en el rango (0,1).
fuente: 'Elaboración propia (referencia: Moraleja 175).'
estado: publicado
