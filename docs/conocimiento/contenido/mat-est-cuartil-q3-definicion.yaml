semantic_id: MAT.EST.CUARTILES.Q3_DEFINICION
titulo: Interpretar el tercer cuartil como límite del 75% inferior
objetivo: Interpretar el tercer cuartil $Q_3$ como el valor que deja aproximadamente el 75% de los datos por debajo de él.
introduccion: El tercer cuartil marca el punto donde se acumulan las tres cuartas partes "más bajas" de los datos ordenados.
resumen: El tercer cuartil $Q_3$ es el valor que deja aproximadamente el 75% de los datos ordenados por debajo de él y el
  25% restante por encima.
explicacion: '![Tercer cuartil](/static/img/estadistica/cuartil/cuartil-q3-definicion.svg)


  ### Definición formal


  $Q_3$ es el valor tal que aproximadamente el 75% de los datos ordenados son menores o iguales a él, equivalente al

  percentil 75 ($P_{75}$).


  ### Desarrollo didáctico


  Si $Q_3$ de los puntajes de una prueba es 85 puntos, significa que aproximadamente el 75% de los estudiantes obtuvo

  85 puntos o menos, y solo el 25% superó ese puntaje.'
procedimiento:
- 'Paso 1: Ordena los datos de menor a mayor.'
- 'Paso 2: Ubica el valor que deja aproximadamente el 75% de los datos por debajo de él.'
- 'Paso 3: Ese valor corresponde a $Q_3$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: El tercer cuartil de los puntajes de una prueba es 85 puntos. ¿Qué porcentaje de estudiantes superó ese
    puntaje?
  solucion_pasos:
  - $Q_3$ deja aproximadamente el 75% de los datos por debajo.
  - Por lo tanto, aproximadamente el 25% de los estudiantes superó los 85 puntos.
- titulo: Ejemplo 2
  enunciado: ¿Qué percentil corresponde exactamente al tercer cuartil?
  solucion_pasos:
  - El tercer cuartil corresponde al percentil 75.
  - Es decir, $Q_3 = P_{75}$.
- titulo: ¿El tercer cuartil deja el 25% de los datos por encima de él?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que deja el 75% por debajo, el 25% restante queda por encima.
- titulo: ¿$Q_3$ siempre es menor que $Q_1$?
  respuesta: 'No'
  solucion_pasos:
  - 'No, en un conjunto ordenado siempre se cumple $Q_1 \leq Q_2 \leq Q_3$.'
errores_frecuentes:
- Confundir $Q_3$ con el valor máximo del conjunto.
- Pensar que $Q_3$ deja el 75% de los datos por encima de él, en vez de por debajo.
- Creer que $Q_3$ es menor que $Q_1$.
- No relacionar $Q_3$ con el percentil 75.
- Olvidar ordenar los datos antes de ubicar $Q_3$.
fuente: 'Elaboración propia (referencia: Moraleja 380).'
estado: publicado
