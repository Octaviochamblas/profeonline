semantic_id: MAT.EST.RECOLECCION_BASE.POBLACION_DEF
titulo: Definir población estadística
objetivo: Definir el concepto de población estadística como el conjunto completo de elementos que son
  objeto de un estudio.
introduccion: Antes de analizar cualquier dato, es necesario delimitar con precisión cuál es el conjunto
  total de elementos sobre el que se quiere obtener información.
resumen: La población estadística es el conjunto completo de todos los elementos (personas, objetos, eventos)
  que comparten una característica común y que son objeto de estudio.
explicacion: '![Definición de población estadística](/static/img/estadistica/recol/recol-poblacion-def.svg)


  ### Definición formal


  La población es el conjunto universo $U$ de todos los elementos que cumplen la condición de interés
  del estudio, sin excepción.


  ### Desarrollo didáctico


  Si se quiere estudiar la estatura de los estudiantes de un colegio, la población es el conjunto de TODOS
  los estudiantes matriculados en ese colegio, no solo algunos de ellos.'
procedimiento:
- 'Paso 1: Lee el problema e identifica qué característica se quiere estudiar.'
- 'Paso 2: Determina cuál es el conjunto completo de elementos que poseen esa característica.'
- 'Paso 3: Verifica que ese conjunto incluya a todos los elementos posibles, sin dejar ninguno fuera.'
ejemplos:
- titulo: Identificar la población en un estudio escolar
  enunciado: Se quiere estudiar el promedio de notas de un colegio de 800 estudiantes.
  solucion_pasos:
  - La población es el conjunto de los 800 estudiantes matriculados en el colegio.
- titulo: Identificar la población en un estudio de salud pública
  enunciado: Se quiere conocer la estatura promedio de los recién nacidos en un país durante un año.
  solucion_pasos:
  - La población es el conjunto de todos los recién nacidos de ese país durante ese año.
- titulo: ¿La población siempre incluye a todos los elementos posibles del estudio?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la característica que define a la población, a diferencia de una muestra.
- titulo: ¿Puede la población de un estudio ser un subconjunto elegido al azar?
  respuesta: 'No'
  solucion_pasos:
  - No, un subconjunto elegido es una muestra; la población es siempre el conjunto completo.
errores_frecuentes:
- Confundir población con muestra, tratando un subconjunto como si fuera el conjunto completo.
- No delimitar claramente el criterio que define a la población (por ejemplo, edad, ubicación o fecha).
- Asumir una población distinta a la que realmente pide el problema.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
