semantic_id: MAT.GEO.CIRCULO_TEOREMAS.TANGENTE_SECANTE_PRODUCTO
titulo: Teorema de la tangente y la secante como igualdad entre cuadrado de tangente y producto de secante
objetivo: Aplicar el teorema de la tangente y la secante para calcular longitudes desconocidas mediante
  la igualdad entre el cuadrado del segmento tangente y el producto de los segmentos de la secante.
introduccion: 'Cuando desde un punto exterior se traza una tangente y una secante, existe una relación
  precisa: el cuadrado de la tangente es igual al producto de los segmentos de la secante.'
resumen: Si desde un punto exterior $P$ se traza una tangente (que toca en $T$) y una secante (que corta
  en $A$ cercano y $B$ lejano), entonces $PT^2 = PA \times PB$.
explicacion: '![Teorema de la tangente y la secante: PT² = PA×PB](/static/img/geometria/circunferencia-circulo/circulo-teorema-tangente-secante-producto.svg)


  ### Definición formal


  Si desde un punto exterior $P$ se traza una tangente que toca la circunferencia en $T$ y una secante
  que la corta en $A$ (cercano) y $B$ (lejano), se cumple $PT^2=PA\times PB$. Se demuestra mediante semejanza
  de los triángulos $PTA$ y $PBT$ (ángulo en $P$ compartido y el ángulo semiinscrito igual al ángulo inscrito
  correspondiente).


  ### Desarrollo didáctico


  Si $PA=4$ cm y $PB=9$ cm, entonces $PT^2=4\times9=36$, de donde $PT=\sqrt{36}=6$ cm. Este teorema es
  un caso límite del teorema de las secantes, cuando una de las dos secantes se convierte en tangente
  (sus dos puntos de corte se juntan en uno solo).'
procedimiento:
- 'Paso 1: Identifica el segmento tangente PT y los segmentos exterior (PA) y total (PB) de la secante.'
- 'Paso 2: Plantea la igualdad PT²=PA×PB, sustituyendo los valores conocidos.'
- 'Paso 3: Despeja la incógnita, recordando sacar raíz cuadrada si la incógnita es PT.'
ejemplos:
- titulo: Calcular la tangente usando el teorema
  enunciado: PA=4 cm y PB=9 cm.
  solucion_pasos:
  - PT²=4×9=36 → PT=√36=6 cm.
- titulo: Calcular un segmento de la secante conociendo la tangente
  enunciado: PT=8 cm y PA=4 cm.
  solucion_pasos:
  - 8²=4×PB → 64=4×PB → PB=64/4=16 cm.
- titulo: ¿Se debe sacar raíz cuadrada al despejar PT?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que la ecuación involucra PT al cuadrado, se debe extraer la raíz cuadrada al despejar.
- titulo: ¿Este teorema es un caso particular del teorema de las secantes?
  respuesta: Sí
  solucion_pasos:
  - Sí, corresponde al caso límite en que una secante se convierte en tangente (sus dos puntos de corte
    coinciden en T).
errores_frecuentes:
- Olvidar elevar al cuadrado el segmento tangente al plantear la ecuación.
- Olvidar sacar raíz cuadrada al despejar PT a partir del producto PA×PB.
- Confundir el segmento exterior con el total de la secante al sustituir en la fórmula.
fuente: 'Elaboración propia (referencias: Moraleja 75, Cid 133).'
estado: publicado
