semantic_id: MAT.EST.GRAFICOS_CONTINUOS.TRANSICION_TABLA
titulo: Reconstruir una tabla de frecuencias a partir de un histograma
objetivo: Aplicar el procedimiento para transitar desde un histograma dado hacia la tabla de frecuencias
  que lo generó, extrayendo intervalos y frecuencias.
introduccion: En muchos problemas se entrega directamente el gráfico (histograma) y se pide reconstruir
  la información tabular subyacente, un ejercicio inverso al habitual.
resumen: Transitar de un histograma a una tabla consiste en leer los límites de cada intervalo (eje horizontal)
  y su frecuencia correspondiente (altura de la barra), organizándolos en una tabla.
explicacion: '![Transición de histograma a tabla](/static/img/estadistica/grafcont/grafcont-transicion-tabla.svg)


  ### Definición formal


  A partir de un histograma, cada barra aporta un par (intervalo, frecuencia) que se traslada directamente
  a una fila de la tabla de frecuencias.


  ### Desarrollo didáctico


  Un histograma con tres barras (para [0-10), [10-20), [20-30)) de alturas 4, 7 y 3 se traduce en la tabla:
  x=[0-10) f=4; x=[10-20) f=7; x=[20-30) f=3.'
procedimiento:
- 'Paso 1: Identifica los límites de cada intervalo representado en el eje horizontal del histograma.'
- 'Paso 2: Lee la altura de cada barra para determinar su frecuencia correspondiente.'
- 'Paso 3: Organiza esa información (intervalo, frecuencia) en una tabla de frecuencias.'
ejemplos:
- titulo: Reconstruir una tabla desde un histograma de 3 barras
  enunciado: Histograma con barras de altura 4, 7 y 3 para los intervalos [0-10), [10-20), [20-30).
  solucion_pasos:
  - 'Tabla: [0-10) f=4; [10-20) f=7; [20-30) f=3.'
- titulo: Reconstruir una tabla desde un histograma de estaturas
  enunciado: Histograma con barras de altura 5, 12, 8 para [150-160), [160-170), [170-180).
  solucion_pasos:
  - 'Tabla: [150-160) f=5; [160-170) f=12; [170-180) f=8.'
- titulo: ¿Se puede calcular el total de datos sumando las frecuencias leídas del histograma?
  respuesta: Sí
  solucion_pasos:
  - Sí, al igual que en cualquier tabla de frecuencia, la suma de todas las frecuencias da el total de
    datos.
- titulo: ¿Se pueden calcular las marcas de clase a partir de la tabla reconstruida del histograma?
  respuesta: Sí
  solucion_pasos:
  - Sí, una vez identificados los límites de cada intervalo, se puede calcular su marca de clase como
    siempre.
errores_frecuentes:
- Leer incorrectamente los límites de los intervalos representados en el eje horizontal del histograma.
- Confundir la altura de la barra con su área al determinar la frecuencia, especialmente si las amplitudes
  no son iguales.
- No verificar que la suma de las frecuencias leídas coincida con el total de datos esperado del problema.
fuente: 'Elaboración propia (referencia: Moraleja 125).'
estado: publicado
