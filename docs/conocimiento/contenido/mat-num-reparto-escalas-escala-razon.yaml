semantic_id: MAT.NUM.REPARTO_ESCALAS.ESCALA_RAZON
objetivo: Comprender e interpretar el concepto de escala como una razón matemática.
introduccion: '¿Cómo cabe el mapa de todo un país en la pantalla de tu celular? Gracias
  a las escalas. Una escala es simplemente una promesa matemática: ''Por cada centímetro
  que veas aquí, en la vida real hay tantos más''.'
resumen: Una escala es una razón entre la medida del dibujo (plano) y la medida real
  del objeto, expresadas en la misma unidad de medida. Se anota comúnmente como 1:E.
explicacion: 'Una **escala** es una aplicación directa del concepto de razón. Compara
  la dimensión de un objeto en una representación (mapa, maqueta, plano) con su dimensión
  en la realidad.


  Fórmula fundamental de la escala:

  $$Escala = \frac{\text{Medida en el Plano}}{\text{Medida en la Realidad}}$$


  Se suele escribir en la forma **1 : E** (por ejemplo, 1:100), lo que significa que
  **1 unidad** en el plano equivale a **E unidades** en la realidad. ¡Ojo! Ambas deben
  estar en la misma unidad de medida (si el plano está en cm, la realidad en la razón
  también está en cm).'
procedimiento:
- 'Paso 1: Lee la escala en el formato 1:E.'
- 'Paso 2: Recuerda que el ''1'' representa el dibujo y la ''E'' representa la realidad.'
- 'Paso 3: Interpreta: ''1 cm en el mapa son E cm en la vida real''.'
ejemplos:
- titulo: Escala de un mapa
  enunciado: ¿Qué significa que un mapa tenga escala 1:50.000?
  solucion_pasos:
  - El primer número (1) es el plano. El segundo (50.000) es la realidad.
  - Significa que 1 centímetro en el mapa equivale a 50.000 centímetros reales.
  - (Que equivalen a 500 metros).
- titulo: Escala de ampliación
  enunciado: ¿Qué significa una escala 10:1 en un microscopio?
  solucion_pasos:
  - Significa que el dibujo o lente muestra 10 unidades por cada 1 unidad real.
  - Es una ampliación (el dibujo es más grande que la realidad).
errores_frecuentes:
- Creer que la escala 1:100 significa que 1 cm equivale a 100 metros (son 100 centímetros,
  o sea 1 metro).
- Invertir los números creyendo que 100:1 es una reducción.
- Olvidar que las escalas son adimensionales (no llevan la palabra 'cm' pegada en
  la razón).
fuente: Currículum Nacional MINEDUC.
estado: publicado
