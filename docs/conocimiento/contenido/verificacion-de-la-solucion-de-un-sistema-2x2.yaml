    está malo.
  - Toma tus valores finales obtenidos para 'x' e 'y'.
- titulo: $(x, y)$
  enunciado: Justifica el procedimiento adecuado para el caso $(x, y)$.
  solucion_pasos:
  - Para que el par ordenado $(x, y)$ sea el par ordenado válido del sistema, debe ser capaz de reemplazar
