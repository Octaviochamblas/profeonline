semantic_id: MAT.ALG.SISTEMAS_2X2.VERIFICACION_SOLUCION
titulo: Verificación de la solución de un sistema 2x2
objetivo: Comprobar que la solución encontrada satisface ambas ecuaciones simultáneamente.
introduccion: Falso sentido de seguridad. Es posible equivocarse en el desarrollo, que los números cuadren
  por casualidad en la primera ecuación, pero que no satisfagan la segunda ecuación en la segunda.
resumen: Una trampa común es encontrar el valor de 'x' e 'y', reemplazarlo en la primera ecuación para
  ver si cuadra, y seguir de largo.
explicacion: '### Definición formal


  Un par ordenado $(x_0,y_0)$ es solución de un sistema lineal $2\times2$ si satisface simultáneamente
  cada ecuación del sistema. Es decir, para

  $$\begin{cases} a_1x+b_1y=c_1,\\ a_2x+b_2y=c_2, \end{cases}$$

  el par $(x_0,y_0)$ es solución si y solo si

  $$a_1x_0+b_1y_0=c_1 \qquad \text{y} \qquad a_2x_0+b_2y_0=c_2.$$

  Verificar una solución consiste precisamente en comprobar ambas igualdades; si falla una de ellas, el
  par no pertenece al conjunto solución.


  ### Desarrollo didáctico


  Falso sentido de seguridad. Es posible equivocarse en el desarrollo, que los números cuadren por casualidad
  en la primera ecuación, pero que no satisfagan la segunda ecuación en la segunda.


  Para que el par ordenado $(x, y)$ sea el par ordenado válido del sistema, debe ser capaz de reemplazar
  las letras en AMBAS ecuaciones y mantener la igualdad perfecta en las dos. Si falla en una, el resultado
  está malo.'
procedimiento:
- Toma tus valores finales obtenidos para 'x' e 'y'.
- Reemplázalos en la Ecuación 1 y verifica que el lado izquierdo sea igual al derecho.
- Reemplázalos en la Ecuación 2 y verifica la igualdad.
- Solo si ambas igualdades son ciertas, el par es la solución oficial.
