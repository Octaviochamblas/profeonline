  - Reemplázalos en la Ecuación 1 y verifica que el lado izquierdo sea igual al derecho.
- titulo: 'Respecto de «Verificación de la solución de un sistema 2x2»: ¿Describe adecuadamente el conc'
  enunciado: 'Respecto de «Verificación de la solución de un sistema 2x2»: ¿Describe adecuadamente el
    concepto esta frase? «Una trampa común es encontrar el valor de ''x'' e ''y'', reemplazarlo en la
    primera ecuación para ver si cuadra, y seguir de largo»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una trampa común es encontrar el valor de ''x''
    e ''y'', reemplazarlo en la primera ecuación para ver si cuadra, y seguir de largo.'
- titulo: 'Respecto de «Verificación de la solución de un sistema 2x2»: ¿Se puede aceptar esta afirmaci'
  enunciado: 'Respecto de «Verificación de la solución de un sistema 2x2»: ¿Se puede aceptar esta afirmación?
    «Puede omitirse esta condición sin cambiar el resultado: «Toma tus valores finales obtenidos para
    ''x'' e ''y''»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una trampa común es encontrar el valor de ''x''
    e ''y'', reemplazarlo en la primera ecuación para ver si cuadra, y seguir de largo.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Toma tus valores finales obtenidos para ''x''
  e ''y''».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Reemplázalos en la Ecuación 1 y verifica
  que el lado izquierdo sea igual al derecho».'
- La definición sigue cumpliéndose aunque no se considere que una trampa común es encontrar el valor de
  'x' e 'y', reemplazarlo en la primera ecuación para ver si cuadra, y seguir de largo.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Solo si ambas igualdades son
  ciertas, el par es la solución oficial».
- La comprobación del resultado vuelve innecesaria la condición «Toma tus valores finales obtenidos para
  'x' e 'y'».
