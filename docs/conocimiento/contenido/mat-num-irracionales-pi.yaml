semantic_id: MAT.NUM.IRRACIONALES.PI
objetivo: Usar \(\pi\) como valor exacto y distinguirlo de sus aproximaciones.
introduccion: Medir objetos circulares siempre conduce al mismo número, sin importar
  el tamaño del círculo. Esa constante geométrica es exacta, aunque solo podamos escribir
  aproximaciones de sus infinitas cifras.
resumen: \(\pi\) es la razón constante entre la longitud de una circunferencia y su
  diámetro. \(\pi\) es irracional y su decimal no termina ni se vuelve periódico.
explicacion: |-
  \(\pi\) es la razón constante entre la longitud de una circunferencia y su diámetro.

  Al analizar “si un círculo tiene diámetro \(10\text{ cm}\), su longitud es exactamente \(10\pi\text{ cm}\), no \(31.4\text{ cm}\)” conviene observar la conexión siguiente: \(\pi\) es irracional y su decimal no termina ni se vuelve periódico
procedimiento:
- 'Paso 1: Identifica la magnitud circular y la fórmula que contiene \(\pi\).'
- 'Paso 2: Sustituye los datos manteniendo \(\pi\) durante el cálculo exacto.'
- 'Paso 3: Aproxima al final solo si el problema solicita una cantidad decimal.'
ejemplos:
- titulo: Aplicación razonada — Identificación de pi como número irracional
  enunciado: Si un círculo tiene diámetro \(10\text{ cm}\), su longitud es exactamente
    \(10\pi\text{ cm}\), no \(31.4\text{ cm}\).
  solucion_pasos:
  - Identifica la magnitud circular y la fórmula que contiene \(\pi\).
  - Sustituye los datos manteniendo \(\pi\) durante el cálculo exacto.
  - Aproxima al final solo si el problema solicita una cantidad decimal.
- titulo: Revisión de una solución — Identificación de pi como número irracional
  enunciado: Una solución aplica “Sustituye los datos manteniendo \(\pi\) durante
    el cálculo exacto.”, pero termina sin comprobar que \(\pi\) es irracional y su
    decimal no termina ni se vuelve periódico. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de pi como número irracional:
    \(\pi\) es la razón constante entre la longitud de una circunferencia y su diámetro.'
  - Identifica la magnitud circular y la fórmula que contiene \(\pi\).
  - 'Completa la revisión con este control: Aproxima al final solo si el problema
    solicita una cantidad decimal.'
- titulo: ¿Se cumple que \(\pi\) es irracional y su decimal no termina ni se vuelve
    periódico? — Identificación de pi como número irracional
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\pi\) es la razón constante entre
    la longitud de una circunferencia y su diámetro.
  - El caso “si un círculo tiene diámetro \(10\text{ cm}\), su longitud es exactamente
    \(10\pi\text{ cm}\), no \(31.4\text{ cm}\)” satisface esa condición.
  - Aproxima al final solo si el problema solicita una cantidad decimal.
- titulo: ¿Es válido omitir el paso “Identifica la magnitud circular y la fórmula
    que contiene \(\pi\)”? — Identificación de pi como número irracional
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de pi como número
    irracional.
  - 'Omitirlo puede volver inválida la acción siguiente: Sustituye los datos manteniendo
    \(\pi\) durante el cálculo exacto.'
  - 'La solución debe terminar de este modo: Aproxima al final solo si el problema
    solicita una cantidad decimal.'
errores_frecuentes:
- 'Confundir identificación de pi como número irracional con otro concepto y omitir
  este inicio: Identifica la magnitud circular y la fórmula que contiene \(\pi\).'
- Aplicar mecánicamente “Sustituye los datos manteniendo \(\pi\) durante el cálculo
  exacto.” sin revisar las condiciones de la definición.
- Tomar “si un círculo tiene diámetro \(10\text{ cm}\), su longitud es exactamente
  \(10\pi\text{ cm}\), no \(31.4\text{ cm}\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “\(\pi\) es irracional y su decimal
  no termina ni se vuelve periódico”.
- 'Terminar el desarrollo sin realizar este control: Aproxima al final solo si el
  problema solicita una cantidad decimal.'
