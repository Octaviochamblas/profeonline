semantic_id: MAT.GEO.TEOREMA_TALES.MODELAMIENTO_SOMBRAS
titulo: Modelamiento de sombras proyectadas usando proporcionalidad de Tales
objetivo: Modelar problemas de sombras proyectadas por objetos verticales, usando la proporcionalidad
  del teorema de Tales para calcular alturas desconocidas.
introduccion: Una aplicación clásica y muy práctica del teorema de Tales es el cálculo de alturas de objetos
  altos (como árboles o edificios) usando la sombra que proyectan, comparada con la sombra de un objeto
  de altura conocida.
resumen: 'Dos objetos verticales bajo el mismo sol proyectan sombras proporcionales a sus alturas: $\frac{\text{altura
  objeto 1}}{\text{sombra objeto 1}}=\frac{\text{altura objeto 2}}{\text{sombra objeto 2}}$.'
explicacion: '![Modelamiento de sombras con proporcionalidad de Tales](/static/img/geometria/congruencia-semejanza/tales-modelamiento-sombras.svg)


  ### Definición formal


  Como los rayos del sol son prácticamente paralelos entre sí, dos objetos verticales bajo el mismo sol
  forman triángulos semejantes con sus respectivas sombras, cumpliendo $\frac{h_1}{s_1}=\frac{h_2}{s_2}$,
  donde $h$ es la altura y $s$ la sombra de cada objeto.


  ### Desarrollo didáctico


  Una persona de 1,7 m de altura proyecta una sombra de 2 m; un árbol cercano proyecta una sombra de 12
  m en el mismo momento. Usando la proporción: $\frac{1,7}{2}=\frac{h}{12}$, se obtiene $h=\frac{1,7\times12}{2}=10,2$
  m, la altura del árbol.'
procedimiento:
- 'Paso 1: Mide (o identifica) la altura y la sombra de un objeto de referencia conocido.'
- 'Paso 2: Mide la sombra del objeto cuya altura se desconoce, en el mismo momento del día.'
- 'Paso 3: Plantea la proporción altura/sombra entre ambos objetos y despeja la altura desconocida.'
ejemplos:
- titulo: Calcular la altura de un árbol usando la sombra de una persona
  enunciado: Una persona de 1,7 m proyecta sombra de 2 m; un árbol proyecta sombra de 12 m.
  solucion_pasos:
  - 1,7/2=h/12 → h=1,7×12/2=10,2 m.
- titulo: Calcular la altura de un edificio usando un poste de referencia
  enunciado: Un poste de 3 m proyecta sombra de 4 m; un edificio proyecta sombra de 60 m.
  solucion_pasos:
  - 3/4=h/60 → h=3×60/4=45 m.
- titulo: ¿Las mediciones deben tomarse en el mismo momento del día?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque el ángulo del sol cambia durante el día, alterando la proporción sombra/altura.
- titulo: ¿Este método funciona porque los rayos del sol son prácticamente paralelos?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la base geométrica que permite aplicar el teorema de Tales en este contexto.
errores_frecuentes:
- Tomar las medidas de sombra en momentos distintos del día, cuando el ángulo del sol ha cambiado.
- Invertir la proporción, comparando altura con sombra del otro objeto de forma cruzada incorrecta.
- Olvidar que ambos objetos deben estar sobre terreno plano para que la comparación sea válida.
fuente: Elaboración propia.
estado: publicado
