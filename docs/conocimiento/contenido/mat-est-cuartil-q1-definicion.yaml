semantic_id: MAT.EST.CUARTILES.Q1_DEFINICION
titulo: Interpretar el primer cuartil como límite del 25% inferior
objetivo: Interpretar el primer cuartil $Q_1$ como el valor que deja aproximadamente el 25% de los datos por debajo de él.
introduccion: El primer cuartil es como una marca que deja atrás a la cuarta parte "más baja" de un grupo de datos ordenados.
resumen: El primer cuartil $Q_1$ es el valor que deja aproximadamente el 25% de los datos ordenados por debajo de él y el
  75% restante por encima.
explicacion: '![Primer cuartil](/static/img/estadistica/cuartil/cuartil-q1-definicion.svg)


  ### Definición formal


  $Q_1$ es el valor tal que aproximadamente el 25% de los datos ordenados son menores o iguales a él, equivalente al

  percentil 25 ($P_{25}$).


  ### Desarrollo didáctico


  Si el primer cuartil de los sueldos de una empresa es \$500.000, significa que aproximadamente el 25% de los

  trabajadores gana \$500.000 o menos, y el 75% restante gana más que eso.'
procedimiento:
- 'Paso 1: Ordena los datos de menor a mayor.'
- 'Paso 2: Ubica el valor que deja aproximadamente el 25% de los datos por debajo de él.'
- 'Paso 3: Ese valor corresponde a $Q_1$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: El primer cuartil de los tiempos de una carrera es 42 minutos. ¿Qué significa este dato?
  solucion_pasos:
  - Aproximadamente el 25% de los corredores terminó en 42 minutos o menos.
  - El 75% restante tardó más de 42 minutos.
- titulo: Ejemplo 2
  enunciado: En un conjunto de sueldos, $Q_1 = \$500.000$. ¿Qué porcentaje de trabajadores gana más que ese valor?
  solucion_pasos:
  - Si $Q_1$ deja el 25% por debajo, entonces el 75% restante gana más.
- titulo: ¿El primer cuartil equivale al percentil 25?
  respuesta: Sí
  solucion_pasos:
  - Sí, $Q_1 = P_{25}$ por definición.
- titulo: ¿El primer cuartil deja el 50% de los datos por debajo de él?
  respuesta: 'No'
  solucion_pasos:
  - 'No, deja aproximadamente el 25% de los datos por debajo; el 50% corresponde al segundo cuartil.'
errores_frecuentes:
- Confundir el primer cuartil con la mediana.
- Pensar que $Q_1$ deja el 25% de los datos por encima de él, en vez de por debajo.
- Creer que $Q_1$ siempre coincide con el valor mínimo del conjunto.
- No relacionar $Q_1$ con el percentil 25.
- Olvidar ordenar los datos antes de ubicar $Q_1$.
fuente: 'Elaboración propia (referencia: Moraleja 380).'
estado: publicado
