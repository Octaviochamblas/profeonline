semantic_id: MAT.GEO.ISOMETRIA_TRASLACION.VECTOR_TRASLACION_DEFINICION
titulo: Definición de vector traslación
objetivo: Reconocer el vector traslación como el vector que determina completamente el desplazamiento
  de todos los puntos de una figura en una traslación.
introduccion: El vector traslación es como una 'instrucción única' que le dice a cada punto de la figura
  exactamente cuánto y hacia dónde moverse.
resumen: El vector traslación $\vec{v}$ es el vector que indica la dirección, sentido y magnitud del desplazamiento
  aplicado a todos los puntos de una figura durante una traslación.
explicacion: '![Definición de vector traslación](/static/img/geometria/isometrias/vector-traslacion-definicion.svg)


  ### Definición formal


  Una traslación de vector $\vec{v}$ es una transformación que mueve cada punto $P$ del plano a un nuevo
  punto $P''$ tal que $\vec{PP''}=\vec{v}$: todos los puntos de la figura se desplazan exactamente la
  misma distancia, en la misma dirección y sentido.


  ### Desarrollo didáctico


  En la figura, el vector $\vec{v}$ conecta un vértice de la figura original con su correspondiente en
  la figura imagen. Este mismo vector, aplicado a cualquier otro punto de la figura original, produce
  su punto correspondiente en la imagen.'
procedimiento:
- 'Paso 1: Identifica un punto de la figura original y su correspondiente en la figura imagen.'
- 'Paso 2: Traza el vector que va desde el punto original hasta su imagen; ese es el vector traslación.'
- 'Paso 3: Verifica que ese mismo vector aplicado a cualquier otro punto de la figura produce su imagen
  correspondiente.'
ejemplos:
- titulo: Identificar el vector traslación entre dos figuras
  enunciado: Un vértice A se traslada al punto A'.
  solucion_pasos:
  - El vector traslación es v=AA', el mismo que se aplica a todos los demás puntos de la figura.
- titulo: Verificar que el vector es el mismo para todos los puntos
  enunciado: Se comparan los vectores entre varios pares de puntos correspondientes.
  solucion_pasos:
  - Todos esos vectores deben ser exactamente iguales (mismas componentes), confirmando que es una traslación
    válida.
- titulo: ¿El vector traslación es el mismo para todos los puntos de la figura?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, esa es la característica definitoria de una traslación: un único vector aplicado uniformemente.'
- titulo: ¿Una traslación puede tener vectores distintos para diferentes puntos?
  respuesta: 'No'
  solucion_pasos:
  - No, si los vectores fueran distintos para cada punto, la figura se deformaría, y no sería una traslación
    (ni una isometría válida).
errores_frecuentes:
- Calcular vectores distintos para diferentes pares de puntos, sin verificar que deban ser iguales en
  una traslación válida.
- Confundir el vector traslación con un vector cualquiera dentro de la figura.
- Invertir el orden del vector (calcular preimagen menos imagen, en vez de imagen menos preimagen).
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 126).'
estado: publicado
