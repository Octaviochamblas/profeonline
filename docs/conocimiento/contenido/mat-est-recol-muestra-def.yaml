semantic_id: MAT.EST.RECOLECCION_BASE.MUESTRA_DEF
titulo: Definir el concepto de muestra estadística
objetivo: Definir la muestra como un subconjunto representativo de la población, utilizado cuando estudiar
  el total resulta inviable.
introduccion: Cuando la población es muy grande o inaccesible en su totalidad, se recurre a estudiar solo
  una parte de ella que la represente adecuadamente.
resumen: La muestra es un subconjunto de la población, seleccionado de manera que represente adecuadamente
  sus características para poder generalizar los resultados.
explicacion: '![Concepto de muestra estadística](/static/img/estadistica/recol/recol-muestra-def.svg)


  ### Definición formal


  Una muestra es un subconjunto $M\subset U$ de la población $U$, elegido con un método que busca preservar
  sus características esenciales.


  ### Desarrollo didáctico


  Para estudiar la opinión de 50.000 habitantes de una ciudad, se puede encuestar solo a 500 de ellos
  (la muestra), siempre que se elijan de forma que representen a toda la población.'
procedimiento:
- 'Paso 1: Identifica cuál es la población total del estudio.'
- 'Paso 2: Reconoce si el problema estudia solo una parte de esa población (muestra) o el total (censo).'
- 'Paso 3: Verifica que la muestra sea representativa, es decir, que refleje las características de la
  población.'
ejemplos:
- titulo: Identificar una muestra en una encuesta ciudadana
  enunciado: Se encuesta a 500 de los 50.000 habitantes de una ciudad.
  solucion_pasos:
  - Los 500 habitantes encuestados constituyen la muestra del estudio.
- titulo: Identificar una muestra en control de calidad
  enunciado: Una fábrica revisa 50 de las 10.000 piezas producidas en un mes.
  solucion_pasos:
  - Las 50 piezas revisadas constituyen la muestra.
- titulo: ¿Una muestra es siempre más pequeña o igual que la población?
  respuesta: Sí
  solucion_pasos:
  - Sí, la muestra es un subconjunto de la población, nunca puede ser mayor que ella.
- titulo: ¿Se puede generalizar el resultado de una muestra a toda la población?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre que la muestra sea representativa, es posible hacer inferencias sobre la población completa.
errores_frecuentes:
- Confundir muestra con población, generalizando resultados de una parte pequeña sin verificar representatividad.
- Elegir una muestra demasiado pequeña o sesgada para representar adecuadamente a la población.
- Pensar que estudiar una muestra siempre da exactamente el mismo resultado que estudiar toda la población.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
