semantic_id: MAT.ALG.LENGUAJE_RELACIONES.MAYOR_QUE
objetivo: Traducir relaciones de desigualdad donde una cantidad es superior a otra.
introduccion: Hasta ahora hemos sido los reyes de la igualdad. Todo era perfecto y
  estaba en equilibrio. Pero en la vida real, las cosas rara vez son iguales. Bienvenido
  al mundo de las inecuaciones.
resumen: La relación **'Mayor que'** se traduce utilizando el símbolo de desigualdad
  estricta **$>$**. La punta abierta o 'boca' del símbolo siempre apunta hacia la
  cantidad más grande.
explicacion: 'Palabras clave:

  - A es mayor que B: $A > B$

  - Es superior a

  - Supera a

  - Más que


  Ejemplos:

  - ''El salario de un gerente es mayor que el de un analista'': $G > A$

  - ''El doble de un número es superior a cien'': $2x > 100$


  ¿Por qué es importante el sentido? Porque, a diferencia de la igualdad, si inviertes
  los lados tienes que invertir el símbolo. Si $A > B$, entonces obligatoriamente
  $B < A$.'
procedimiento:
- 'Paso 1: Identifica qué entidad es la más grande en la comparación.'
- 'Paso 2: Escribe esa entidad en el lado izquierdo.'
- 'Paso 3: Dibuja el símbolo > (la boca abierta mirando a la entidad grande).'
- 'Paso 4: Escribe la entidad más pequeña en el lado derecho.'
ejemplos:
- titulo: Rompiendo barreras
  enunciado: 'Traduce: ''La suma de las ventas de hoy y ayer superan los cinco mil
    dólares''.'
  solucion_pasos:
  - 'Suma de ventas de hoy y ayer: H + A.'
  - Es superior a (>) cinco mil (5000).
  - 'Traducción: H + A > 5000.'
errores_frecuentes:
- 'Confundir los símbolos $>$ (mayor) con $<$ (menor). (Regla nemotécnica: el pez
  grande se come al chico, la boca abierta va hacia el mayor).'
- Asumir que 'mayor que' implica una suma.
fuente: Álgebra de Baldor.
estado: publicado
