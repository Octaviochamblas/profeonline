semantic_id: MAT.ALG.FACTOR_COMUN.EXTRACCION_POLINOMIO
titulo: Extracción del factor común polinomio
objetivo: Comprender extracción del factor común polinomio y aplicarlo con precisión.
introduccion: Cuando un mismo polinomio multiplica a varios términos, puede escribirse una sola vez como
  factor. Los multiplicadores restantes forman el segundo factor del producto.
resumen: Cualquier bloque repetido íntegramente sirve como factor común.
explicacion: '### Definición formal


  Si un polinomio $Q$ multiplica íntegramente a cada término de una suma $c_1Q + c_2Q + \dots + c_kQ$,
  se extrae como factor común escribiendo $Q(c_1+c_2+\dots+c_k)$, aplicando la propiedad distributiva
  en sentido inverso.


  ### Desarrollo didáctico


  Es el bloque entero que se repite.


  El término solitario (x+1) equivale a +1(x+1). Al sacarlo queda ''a+1''.


  Se saca (m-n) y se juntan los factores externos 5 y -p.'
procedimiento:
- Es el bloque entero que se repite.
- El término solitario (x+1) equivale a +1(x+1). Al sacarlo queda 'a+1'.
- Se saca (m-n) y se juntan los factores externos 5 y -p.
ejemplos:
- titulo: El resultado de factorizar $2(a+b) + 3(a+b)$ es $5(a+b)$
  enunciado: ¿El resultado de factorizar $2(a+b) + 3(a+b)$ es $5(a+b)$?
  solucion_pasos:
  - Al extraer (a+b) nos queda (a+b)(2+3) = 5(a+b).
  - 'Respuesta: Verdadero'
- titulo: Los factores $(x-y)$ y $(y-x)$ son considerados idénticos para extraerlos directamente
  enunciado: ¿Los factores $(x-y)$ y $(y-x)$ son considerados idénticos para extraerlos directamente?
  solucion_pasos:
  - Son opuestos. Para igualarlos hay que extraer un signo menos a uno de ellos.
  - 'Respuesta: Falso'
- titulo: 'Respecto de «Extracción del factor común polinomio»: ¿Describe adecuadamente el concepto est'
  enunciado: 'Respecto de «Extracción del factor común polinomio»: ¿Describe adecuadamente el concepto
    esta frase? «Cualquier bloque repetido íntegramente sirve como factor común»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Cualquier bloque repetido íntegramente sirve como
    factor común.'
- titulo: 'Respecto de «Extracción del factor común polinomio»: ¿Se puede aceptar esta afirmación? «No'
  enunciado: 'Respecto de «Extracción del factor común polinomio»: ¿Se puede aceptar esta afirmación?
    «No, solo pueden ser números y letras sueltas»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Cualquier bloque repetido íntegramente sirve como
    factor común.'
errores_frecuentes:
- No, solo pueden ser números y letras sueltas.
- Para «¿Un polinomio entero encerrado entre paréntesis puede actuar como factor común», la respuesta
  correcta es Solo si es un binomio suma.
- Sí, pero hay que separarlo primero.
- Para «En $x(y-2) + 5(y-2)$, ¿qué representa $(y-2)$», la respuesta correcta es El factor sobrante.
- Para «En $x(y-2) + 5(y-2)$, ¿qué representa $(y-2)$», la respuesta correcta es El coeficiente principal.
