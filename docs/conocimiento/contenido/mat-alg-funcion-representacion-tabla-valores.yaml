semantic_id: MAT.ALG.FUNCION_REPRESENTACION.TABLA_VALORES
titulo: Construcción de tabla de valores para una función
objetivo: Construir una tabla de valores de una función evaluándola en un conjunto de entradas seleccionadas.
introduccion: 'Antes de dibujar una función, conviene calcular varios puntos ordenadamente: eso es exactamente
  una tabla de valores.'
resumen: Una **tabla de valores** de una función $f$ es un registro ordenado de pares $(x, f(x))$ obtenidos al
  evaluar la función en un conjunto seleccionado de entradas, típicamente espaciadas de forma regular.
explicacion: '### Definición formal


  Dada una función $f$ y un conjunto finito de valores $\{x_1, x_2, \dots, x_n\} \subseteq \text{Dom}(f)$, la
  tabla de valores asociada es el conjunto ordenado de pares $\{(x_1, f(x_1)), (x_2, f(x_2)), \dots, (x_n, f(x_n))\}$,
  usualmente dispuesto en dos columnas o filas paralelas.


  ### Desarrollo didáctico


  Construir la tabla es simplemente repetir el proceso de evaluación varias veces, con distintos valores de entrada,
  y organizar los resultados de forma ordenada.


  Si $f(x) = 2x - 1$ y eliges $x \in \{-1, 0, 1, 2\}$: $f(-1)=-3$, $f(0)=-1$, $f(1)=1$, $f(2)=3$. La tabla resultante
  facilita luego graficar la función uniendo los puntos.'
procedimiento:
- 'Paso 1: Elige un conjunto de valores de $x$ dentro del dominio de la función, idealmente espaciados regularmente.'
- 'Paso 2: Evalúa la función en cada uno de esos valores.'
- 'Paso 3: Organiza los resultados en dos columnas o filas paralelas: una para $x$ y otra para $f(x)$.'
- 'Paso 4: Verifica que cada valor de $x$ tenga un único valor de $f(x)$ asociado.'
ejemplos:
- titulo: Construcción de una tabla simple
  enunciado: 'Construye la tabla de valores de $f(x) = x^2$ para $x \in \{-2, -1, 0, 1, 2\}$.'
  solucion_pasos:
  - 'Se evalúa en cada valor: $f(-2)=4$, $f(-1)=1$, $f(0)=0$, $f(1)=1$, $f(2)=4$.'
  - 'Tabla: $(-2,4), (-1,1), (0,0), (1,1), (2,4)$.'
- titulo: Tabla de una función afín
  enunciado: 'Construye la tabla de valores de $f(x) = -x + 3$ para $x \in \{0, 1, 2, 3\}$.'
  solucion_pasos:
  - 'Se evalúa: $f(0)=3$, $f(1)=2$, $f(2)=1$, $f(3)=0$.'
  - 'Tabla: $(0,3), (1,2), (2,1), (3,0)$.'
- titulo: ¿Una tabla de valores puede tener el mismo $x$ repetido con distinto $f(x)$?
  enunciado: ¿Una tabla de valores puede tener el mismo $x$ repetido con distinto $f(x)$?
  respuesta: 'No'
  solucion_pasos:
  - Eso violaría la unicidad de imagen exigida a toda función.
- titulo: ¿Es necesario elegir valores de $x$ espaciados regularmente?
  enunciado: ¿Es necesario elegir valores de $x$ espaciados regularmente?
  respuesta: 'No'
  solucion_pasos:
  - Es una práctica conveniente para graficar, pero no un requisito matemático de la tabla.
errores_frecuentes:
- Elegir valores de $x$ fuera del dominio de la función, obteniendo resultados indefinidos.
- Cometer errores aritméticos al evaluar cada fila, generando inconsistencias en la tabla.
- Repetir un valor de $x$ con distinto resultado por error de cálculo.
- Confundir las columnas de entrada y salida al construir la tabla.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
