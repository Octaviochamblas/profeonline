semantic_id: MAT.ALG.FRACCIONES_RESTA.USO_MCM
titulo: Uso del MCM en Restas Algebraicas
objetivo: Aplicar el Mínimo Común Múltiplo para optimizar restas complejas.
introduccion: Al igual que en la suma, usar el MCM para el común denominador en las restas evita que los polinomios
  se hinchen innecesariamente.
resumen: El denominador común para la resta debe ser el MCM de los denominadores. Así la amplificación será mínima
  y se evitarán polinomios extensos a reducir.
explicacion: '### Definición formal


  Identificar factores repetidos para no incluirlos múltiples veces en el denominador común.


  ### Desarrollo didáctico


  El uso del MCM en la resta es idéntico a la suma, pero la presión aumenta al momento de armar el gran numerador
  final por culpa de los signos negativos.


  Al construir el numerador unificado:

  $\frac{ \text{Num1}(\text{lo que faltaba}) - \text{Num2}(\text{lo que faltaba}) }{ \text{MCM} }$


  Ese signo menos intermedio multiplicará al desarrollo de $\text{Num2}(\text{lo que faltaba})$.


  **Recomendación de oro:** Desarrolla la multiplicación de $\text{Num2}(\text{lo que faltaba})$ manteniendo un
  gran corchete de seguridad, y solo cuando hayas terminado de multiplicar los paréntesis internos, distribuye el
  signo negativo externo para invertir todos los signos resultantes de golpe.'
procedimiento:
- 'Paso 1: Factoriza ambos denominadores para ver sus entrañas.'
- 'Paso 2: Arma el súper denominador MCM (todos los factores distintos, exponente mayor).'
- 'Paso 3: Amplifica los numeradores por los factores que les faltaban.'
- 'Paso 4: Pon un menos y un gran paréntesis para el segundo bloque amplificado, y resuelve.'
- Esto mantiene el MCM lo más 'pequeño' posible.
ejemplos:
- titulo: Resta $\frac{3}{x(x-2)} - \frac{2}{x^2(x-2)}$
  enunciado: Resta $\frac{3}{x(x-2)} - \frac{2}{x^2(x-2)}$.
  solucion_pasos:
  - 'MCM: La x mayor es $x^2$. Incluimos $(x-2)$. MCM=$x^2(x-2)$.'
  - A la 1ra le falta una 'x'. Num = 3x.
  - A la 2da no le falta nada. Num = 2.
  - 'Resta: $\frac{3x - 2}{x^2(x-2)}$.'
- titulo: Halla el MCM de denominadores de $\frac{5}{m^3 n} - \frac{2}{m n^4}$.
  solucion_pasos:
  - 'Mayores exponentes: m al cubo y n a la cuarta.'
- titulo: 'Respecto de «Uso del m.c.m. algebraico en sustracción de fracciones»: ¿La siguiente formulac'
  enunciado: 'Respecto de «Uso del m.c.m. algebraico en sustracción de fracciones»: ¿La siguiente formulación es
    correcta? «El denominador común para la resta debe ser el MCM de los denominadores»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El denominador común para la resta debe ser el MCM de los
    denominadores.'
- titulo: 'Respecto de «Uso del m.c.m. algebraico en sustracción de fracciones»: ¿La siguiente conclusi'
  enunciado: 'Respecto de «Uso del m.c.m. algebraico en sustracción de fracciones»: ¿La siguiente conclusión es
    correcta? «Tomar un denominador común simplemente multiplicando todo (por ejemplo, $(x-1)(x+1)(x-1)$), lo que
    complica enormemente la expresión»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El denominador común para la resta debe ser el MCM de los
    denominadores.'
errores_frecuentes:
- Tomar un denominador común simplemente multiplicando todo (por ejemplo, $(x-1)(x+1)(x-1)$), lo que complica enormemente
  la expresión.
- Para «Al usar el MCM para restar fracciones, el objetivo de factorizar primero los denominadores es:», la respuesta
  correcta es Simplificarlos con los numeradores.
- Para «Al usar el MCM para restar fracciones, el objetivo de factorizar primero los denominadores es:», la respuesta
  correcta es Eliminar el signo negativo.
- Para «Al usar el MCM para restar fracciones, el objetivo de factorizar primero los denominadores es:», la respuesta
  correcta es Invertir las fracciones.
- 'Para «Aplica MCM para resolver: $\frac{5}{x^2} - \frac{2}{x^3}$.», la respuesta correcta es $\frac{3}{x^3}$.'
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
