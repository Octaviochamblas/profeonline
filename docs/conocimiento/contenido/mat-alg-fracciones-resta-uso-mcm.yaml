semantic_id: 'MAT.ALG.FRACCIONES_RESTA.USO_MCM'
titulo: 'Uso del MCM en Restas Algebraicas'
objetivo: 'Aplicar el Mínimo Común Múltiplo para optimizar restas complejas.'
introduccion: |
  Al igual que en la suma, usar el MCM para el común denominador en las restas evita que los polinomios se hinchen innecesariamente.
resumen: |
  El denominador común para la resta debe ser el MCM de los denominadores. Así la amplificación será mínima y se evitarán polinomios gigantes a reducir.
explicacion: |
  Resta: $\frac{1}{x^2-1} - \frac{1}{x-1}$.

  1. **Denominadores factorizados:** $(x-1)(x+1)$ y $(x-1)$.
  2. **MCM:** Tomamos todo, sin repetir exponentes. Es $(x-1)(x+1)$.
  3. **Amplificación:**
     - A la primera fracción no le falta nada. Su numerador sigue siendo 1.
     - A la segunda fracción (con piso $x-1$) le falta el $(x+1)$. Su numerador se multiplica por eso: $1 \cdot (x+1) = x+1$.
  4. **Restamos con cuidado (paréntesis!):**
     $1 - (x+1) = 1 - x - 1 = -x$.
  5. **Resultado final:** $\frac{-x}{(x-1)(x+1)}$.
procedimiento:
  - 'Paso 1: Factoriza ambos denominadores para ver sus entrañas.'
  - 'Paso 2: Arma el súper denominador MCM (todos los factores distintos, exponente mayor).'
  - 'Paso 3: Amplifica los numeradores por los factores que les faltaban.'
  - 'Paso 4: Pon un menos y un gran paréntesis para el segundo bloque amplificado, y resuelve.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Resta $\frac{3}{x(x-2)} - \frac{2}{x^2(x-2)}$.'
    solucion_pasos:
    - 'MCM: La x mayor es $x^2$. Incluimos $(x-2)$. MCM=$x^2(x-2)$.'
    - 'A la 1ra le falta una ''x''. Num = 3x.'
    - 'A la 2da no le falta nada. Num = 2.'
    - 'Resta: $\frac{3x - 2}{x^2(x-2)}$.'
  - titulo: 'Halla el MCM de denominadores de $\frac{5}{m^3 n} - \frac{2}{m n^4}$.'
    respuesta: '$m^3 n^4$'
    solucion_pasos:
    - 'Mayores exponentes: m al cubo y n a la cuarta.'
errores_frecuentes:
  - 'Tomar un denominador común simplemente multiplicando todo (por ejemplo, $(x-1)(x+1)(x-1)$), lo que complica enormemente la expresión.'
estado: publicado
