semantic_id: 'MAT.ALG.FRACCIONES_DIV.ERROR_RECIPROCO'
titulo: 'Errores Comunes: Inversión Equivocada'
objetivo: 'Identificar y evitar el error más frecuente en divisiones: invertir el dividendo o simplificar antes de invertir.'
introduccion: |
  En los nervios del examen, la regla 'Mantener, Cambiar, Voltear' se confunde. Al final, los estudiantes voltean lo que no deben o tachan en diagonal cuando aún hay un signo de división.
resumen: |
  REGLA DE ORO: Jamás simplifiques en diagonal (cruzado) a través de un signo de división ($\div$). Solo el término a la derecha del $\div$ debe ser invertido.
explicacion: |
  El escenario del desastre:
  $\frac{x-1}{x} \div \frac{x-1}{2}$
  El estudiante ansioso ve $(x-1)$ arriba en la primera y $(x-1)$ arriba en la segunda y... ¡los tacha!
  ¡ERROR FATAL!

  Haz los pasos:
  1. $\frac{x-1}{x} \cdot \frac{2}{x-1}$.
  ¡Ajá! El segundo $(x-1)$ bajó al denominador. AHORA SÍ están uno arriba y uno abajo, y puedes cancelarlos legalmente.
  Resultado: $\frac{2}{x}$.
  Si hubieras tachado horizontalmente, te habría dado un resultado invertido y absurdo.
procedimiento:
  - 'Paso 1: Detecta el signo $\div$. Es como un semáforo en rojo para tachar cruzado.'
  - 'Paso 2: Inmediatamente invierte la fracción a la derecha y pon un $\cdot$.'
  - 'Paso 3: Solo entonces, con luz verde ($\cdot$), busca qué tachar.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'A simple vista, ¿puedes tachar el 5 de $\frac{x}{5} \div \frac{y}{5}$?'
    solucion_pasos:
    - 'No.'
    - 'Al invertir queda $\frac{x}{5} \cdot \frac{5}{y}$.'
    - 'Ahí el 5 sí se tacha, pero como numerador y denominador. Resultado: $\frac{x}{y}$.'
  - titulo: 'En $\frac{x}{y} \div \frac{z}{x}$, ¿puedo cancelar la ''x''?'
    respuesta: 'No'
    solucion_pasos:
    - 'Al invertir, quedará x/y * x/z = x^2 / yz. ¡Las x se multiplican, no se cancelan!'
errores_frecuentes:
  - 'Tachar cruzado sin haber transformado a multiplicación.'
  - 'Voltear la primera fracción (A/B -> B/A).'
estado: publicado
