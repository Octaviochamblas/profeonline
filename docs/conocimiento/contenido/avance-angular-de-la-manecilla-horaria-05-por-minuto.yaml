semantic_id: MAT.GEO.ANGULOS_APLICACIONES.MANECILLA_HORARIA_AVANCE
titulo: 'Avance angular de la manecilla horaria: 0,5° por minuto'
objetivo: Calcular el giro de la manecilla horaria en minutos u horas y comprobar que aunque se mueva
  más lento que la minutera, su avance también es uniforme.
introduccion: 'La manecilla de las horas parece casi quieta, pero en realidad gira todo el tiempo. Su
  lentitud obliga a medir con más atención. Este recurso se centra en avance angular de la manecilla horaria:
  0,5° por minuto y en cómo reconocerlo con un criterio geométrico claro.'
resumen: La manecilla horaria recorre 360° en 12 horas, por lo que avanza 30° por hora o 0,5° por minuto.
  Como idea de control, aunque se mueva más lento que la minutera, su avance también es uniforme.
explicacion: 'La manecilla horaria recorre 360° en 12 horas, por lo que avanza 30° por hora o 0,5° por
  minuto.


  El ejemplo “en 20 minutos, la horaria gira \(20\cdot 0.5° = 10°\)” no se resuelve por apariencia: se
  justifica usando la definición y revisando finalmente que aunque se mueva más lento que la minutera,
  su avance también es uniforme.'
procedimiento:
- 'Paso 1: Recuerda que la horaria completa 360° en 12 horas.'
- 'Paso 2: Convierte esa vuelta a una tasa de 30° por hora o 0,5° por minuto.'
- 'Paso 3: Multiplica por el tiempo transcurrido y comprueba que el resultado sea menor que el de la minutera
  en el mismo intervalo.'
ejemplos:
- titulo: Aplicación directa — Avance de la horaria
  enunciado: En 20 minutos, la horaria gira \(20\cdot 0.5° = 10°\).
  solucion_pasos:
  - Recuerda que la horaria completa 360° en 12 horas.
  - Convierte esa vuelta a una tasa de 30° por hora o 0,5° por minuto.
  - Multiplica por el tiempo transcurrido y comprueba que el resultado sea menor que el de la minutera
    en el mismo intervalo.
- titulo: Chequeo del procedimiento — Avance de la horaria
  enunciado: Al resolver “en 20 minutos, la horaria gira \(20\cdot 0.5° = 10°\)”, una alumna salta desde
    el dibujo a la conclusión. Indica qué control geométrico faltó y cómo cerrar la solución.
  solucion_pasos:
  - 'Parte de la definición: la manecilla horaria recorre 360° en 12 horas, por lo que avanza 30° por
    hora o 0,5° por minuto.'
  - Convierte esa vuelta a una tasa de 30° por hora o 0,5° por minuto.
  - Multiplica por el tiempo transcurrido y comprueba que el resultado sea menor que el de la minutera
    en el mismo intervalo.
- titulo: ¿La situación respeta la idea clave del recurso? — Avance de la horaria
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: la manecilla horaria recorre 360° en 12 horas,
    por lo que avanza 30° por hora o 0,5° por minuto.'
  - En el caso “en 20 minutos, la horaria gira \(20\cdot 0.5° = 10°\)” se observa que aunque se mueva
    más lento que la minutera, su avance también es uniforme.
  - Multiplica por el tiempo transcurrido y comprueba que el resultado sea menor que el de la minutera
    en el mismo intervalo.
- titulo: ¿Se puede cerrar sin el control final? — Avance de la horaria
  respuesta: 'No'
  solucion_pasos:
  - 'No. Un inicio útil no reemplaza la justificación completa de avance angular de la manecilla horaria:
    0,5° por minuto.'
  - Después del paso “Recuerda que la horaria completa 360° en 12 horas.” todavía hace falta revisar “Convierte
    esa vuelta a una tasa de 30° por hora o 0,5° por minuto.”.
  - El cierre correcto exige “Multiplica por el tiempo transcurrido y comprueba que el resultado sea menor
    que el de la minutera en el mismo intervalo.”.
errores_frecuentes:
- Avance de la horaria significa usar 6° por minuto, que corresponde a la manecilla minutera.
- Para resolver avance de la horaria, basta con el paso “Recuerda que la horaria completa 360° en 12 horas.”
  y no hace falta revisar “Convierte esa vuelta a una tasa de 30° por hora o 0,5° por minuto.”.
- Si el dibujo parece claro, se puede ignorar que aunque se mueva más lento que la minutera, su avance
  también es uniforme.
- Dos configuraciones distintas representan avance de la horaria solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Multiplica por el tiempo transcurrido y comprueba
  que el resultado sea menor que el de la minutera en el mismo intervalo.”.
fuente: Currículum Nacional MINEDUC — Aplicaciones de ángulos y lectura geométrica de situaciones cotidianas.
