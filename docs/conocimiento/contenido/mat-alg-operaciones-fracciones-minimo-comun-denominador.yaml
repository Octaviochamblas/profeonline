semantic_id: 'MAT.ALG.OPERACIONES_FRACCIONES.MINIMO_COMUN_DENOMINADOR'
titulo: 'Mínimo Común Múltiplo para Denominadores'
objetivo: 'Aprender a encontrar el mcm de polinomios para igualar los denominadores de las fracciones.'
introduccion: |
  ¿Qué haces cuando los denominadores son diferentes? ¡Pues los haces iguales! Y para no crear expresiones gigantescas e inmanejables, usamos el concepto del Mínimo Común Múltiplo (mcm), aplicado a expresiones algebraicas.
resumen: |
  El Mínimo Común Denominador es el mcm de los denominadores. Para hallarlo, factoriza todos los denominadores, toma TODOS los factores diferentes que aparezcan, y si alguno se repite, toma el que tenga el mayor exponente.
explicacion: |
  Queremos hallar el común denominador entre estas dos fracciones: $\frac{1}{x^2 - 9}$ y $\frac{1}{x^2 + 3x}$.

  1. **Factorizamos los denominadores:**
     - D1: $x^2 - 9 = (x-3)(x+3)$
     - D2: $x^2 + 3x = x(x+3)$

  2. **Construimos el "Súper Denominador" (MCM):**
     Vamos tomando factores. Necesitamos cubrir todo lo que tienen los dos.
     - Tomamos la $x$ libre (de D2).
     - Tomamos $(x-3)$ (de D1).
     - Tomamos $(x+3)$ (Aparece en ambos, lo ponemos UNA sola vez porque no tiene exponentes mayores a 1).

  3. **MCM final:** $x(x-3)(x+3)$.

  Ese será el nuevo denominador para ambas fracciones. Es el piso común más pequeño que 'contiene' perfectamente a los denominadores originales.
procedimiento:
  - 'Paso 1: Factoriza al máximo cada uno de los denominadores de tus fracciones.'
  - 'Paso 2: Escribe en tu resultado cada factor distinto que veas, sin importar en qué fracción esté.'
  - 'Paso 3: Si un mismo factor aparece en varios denominadores, compáralos y toma solo el que tenga el exponente más grande.'
  - 'Paso 4: El producto de esos factores elegidos es tu Mínimo Común Denominador.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Halla el MCM de los denominadores en $\frac{3}{a^2 b}$ y $\frac{5}{ab^3}$.'
    solucion_pasos:
    - 'Están factorizados por ser monomios.'
    - 'Letra ''a'': aparece al cuadrado y a la uno. Tomamos $a^2$.'
    - 'Letra ''b'': aparece al cubo y a la uno. Tomamos $b^3$.'
    - 'MCM es $a^2 b^3$.'
  - titulo: '¿Cuál es el denominador común entre $\frac{1}{x-1}$ y $\frac{1}{x-2}$?'
    respuesta: '$(x-1)(x-2)$'
    solucion_pasos:
    - 'Como no comparten ningún factor, simplemente se multiplican entre sí.'
errores_frecuentes:
  - 'Multiplicar los denominadores completos sin factorizarlos primero (crea un denominador común válido, pero gigantesco e inmanejable).'
  - 'Si un factor se repite, ponerlo dos veces en el MCM.'
estado: publicado
