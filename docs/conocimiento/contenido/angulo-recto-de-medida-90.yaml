semantic_id: MAT.GEO.ANGULOS_CLASIFICACION.RECTO
titulo: Ángulo recto de medida 90°
objetivo: Clasificar un ángulo a partir de su medida y comprobar que su medida exacta lo vuelve referencia
  para clasificar otros ángulos.
introduccion: Muchas construcciones usan esquinas 'perfectas' para comprobar alineación. Esa abertura
  especial sirve como patrón de comparación. Aquí lo trabajaremos con ejemplos concretos y verificaciones
  cortas.
resumen: Un ángulo recto mide exactamente 90°. Como idea de control, su medida exacta lo vuelve referencia
  para clasificar otros ángulos.
explicacion: 'Un ángulo recto mide exactamente 90°.


  Cuando se analiza “la esquina de una hoja o de una baldosa marca una abertura de 90°” conviene evitar
  la memoria mecánica. El control decisivo es comprobar que su medida exacta lo vuelve referencia para
  clasificar otros ángulos.'
procedimiento:
- 'Paso 1: Lee o estima la abertura del ángulo en grados.'
- 'Paso 2: Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.'
- 'Paso 3: Asigna el nombre correcto y revisa que no contradiga el dibujo.'
ejemplos:
- titulo: Lectura del dibujo — Ángulo recto
  enunciado: La esquina de una hoja o de una baldosa marca una abertura de 90°.
  solucion_pasos:
  - Lee o estima la abertura del ángulo en grados.
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: Revisión del razonamiento — Ángulo recto
  enunciado: 'Revisa una solución del caso “la esquina de una hoja o de una baldosa marca una abertura
    de 90°”: el resultado parece razonable, pero falta conectar el dibujo con la definición. Explica esa
    conexión.'
  solucion_pasos:
  - 'Parte de la definición: un ángulo recto mide exactamente 90°.'
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Puede concluirse correctamente este hecho? — Ángulo recto
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo recto mide exactamente 90°.'
  - En el caso “la esquina de una hoja o de una baldosa marca una abertura de 90°” se observa que su medida
    exacta lo vuelve referencia para clasificar otros ángulos.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Basta con lee o estima la abertura del ángulo en grados? — Ángulo recto
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulo recto de medida 90°.
  - Después del paso “Lee o estima la abertura del ángulo en grados.” todavía hace falta revisar “Compara
    la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
  - El cierre correcto exige “Asigna el nombre correcto y revisa que no contradiga el dibujo.”.
errores_frecuentes:
- Ángulo recto significa ser cualquier ángulo que parezca vertical u horizontal.
- Para resolver ángulo recto, basta con el paso “Lee o estima la abertura del ángulo en grados.” y no
  hace falta revisar “Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
- Si el dibujo parece claro, se puede ignorar que su medida exacta lo vuelve referencia para clasificar
  otros ángulos.
- Dos configuraciones distintas representan ángulo recto solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Asigna el nombre correcto y revisa que no
  contradiga el dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
estado: publicado
