semantic_id: MAT.GEO.PARALELOGRAMOS.DEFINICION
titulo: Definición de paralelogramo como cuadrilátero con dos pares de lados paralelos
objetivo: 'Comprender la definición de paralelogramo: un cuadrilátero cuyos lados opuestos son paralelos
  entre sí.'
introduccion: 'Dentro de la familia de los cuadriláteros, existe un grupo especial caracterizado por una
  propiedad de paralelismo entre sus lados opuestos: los paralelogramos.'
resumen: Un paralelogramo es un cuadrilátero que tiene dos pares de lados opuestos paralelos entre sí.
explicacion: '![Paralelogramo: dos pares de lados paralelos](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-definicion.svg)


  ### Definición formal


  Un cuadrilátero $ABCD$ es un paralelogramo si $AB\parallel CD$ y $BC\parallel AD$ (los dos pares de
  lados opuestos son paralelos).


  ### Desarrollo didáctico


  El cuadrado, el rectángulo, el rombo y el romboide son todos casos particulares de paralelogramo, cada
  uno con propiedades adicionales específicas. Un trapecio, en cambio, no es un paralelogramo, ya que
  solo tiene un par de lados paralelos, no dos.'
procedimiento:
- 'Paso 1: Identifica los dos pares de lados opuestos del cuadrilátero.'
- 'Paso 2: Verifica si cada par de lados opuestos es paralelo entre sí.'
- 'Paso 3: Si ambos pares son paralelos, el cuadrilátero es un paralelogramo.'
ejemplos:
- titulo: Verificar que una figura es un paralelogramo
  enunciado: Un cuadrilátero ABCD tiene AB paralelo a CD, y BC paralelo a AD.
  solucion_pasos:
  - Es un paralelogramo, ya que cumple ambas condiciones de paralelismo.
- titulo: Detectar cuando NO es un paralelogramo
  enunciado: Un cuadrilátero tiene solo un par de lados paralelos.
  solucion_pasos:
  - No es un paralelogramo (podría ser un trapecio), ya que le falta el segundo par de lados paralelos.
- titulo: ¿Un cuadrado es un paralelogramo?
  respuesta: Sí
  solucion_pasos:
  - Sí, el cuadrado es un caso particular de paralelogramo con propiedades adicionales (todos los lados
    y ángulos iguales).
- titulo: ¿Un trapecio es un paralelogramo?
  respuesta: 'No'
  solucion_pasos:
  - No, el trapecio solo tiene un par de lados paralelos, no dos.
errores_frecuentes:
- Confundir un trapecio (un solo par de lados paralelos) con un paralelogramo (dos pares).
- Creer que un paralelogramo debe tener ángulos rectos necesariamente.
- No verificar ambos pares de lados opuestos, concluyendo con solo uno.
fuente: 'Fuente: Moraleja Tomo 2 68, Cid 44.'
estado: publicado
