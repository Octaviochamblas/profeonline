semantic_id: MAT.GEO.TRIANGULOS_METRICA.DESIGUALDAD_TRIANGULAR_SUMA
titulo: 'Desigualdad triangular: la suma de dos lados debe ser mayor que el tercer lado'
objetivo: Aplicar la condición de que la suma de dos lados cualesquiera de un triángulo debe superar al
  tercer lado.
introduccion: 'No cualquier trío de medidas puede formar un triángulo: si dos lados son demasiado cortos,
  no alcanzan a encontrarse para cerrar la figura.'
resumen: En todo triángulo, la suma de dos lados cualesquiera debe ser mayor que el tercer lado.
explicacion: '![Desigualdad triangular: suma de lados](/static/img/geometria/triangulos/triangulos-metrica-desigualdad-suma.svg)


  ### Definición formal


  Para un triángulo de lados $a$, $b$ y $c$ se debe cumplir simultáneamente $a+b>c$, $b+c>a$ y $a+c>b$.


  ### Desarrollo didáctico


  Con lados 4, 5 y 7: se verifica $4+5=9>7$, $5+7=12>4$ y $4+7=11>5$; las tres condiciones se cumplen,
  así que estos lados sí forman un triángulo.'
procedimiento:
- 'Paso 1: Suma cada par de lados posibles.'
- 'Paso 2: Compara cada suma con el tercer lado restante.'
- 'Paso 3: Si las tres sumas superan al lado restante correspondiente, el triángulo es válido.'
ejemplos:
- titulo: Verificar lados válidos
  enunciado: Comprueba si 4, 5 y 7 pueden formar un triángulo.
  solucion_pasos:
  - '4+5=9>7, 5+7=12>4, 4+7=11>5: se cumplen las tres condiciones.'
- titulo: Caso inválido
  enunciado: Comprueba si 2, 3 y 8 pueden formar un triángulo.
  solucion_pasos:
  - '2+3=5, que no es mayor que 8: no se cumple la desigualdad.'
- titulo: ¿Basta con verificar una sola suma?
  respuesta: 'No'
  solucion_pasos:
  - No, deben cumplirse las tres condiciones simultáneamente.
- titulo: ¿Pueden 1, 2 y 3 formar un triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, porque 1+2=3, que no es mayor que 3 (es igual, no forma un triángulo real).
errores_frecuentes:
- Verificar solo una de las tres combinaciones de suma.
- Confundir 'mayor que' con 'mayor o igual que' en la desigualdad.
- Sumar los tres lados en vez de compararlos de a pares.
fuente: Elaboración propia.
estado: publicado
