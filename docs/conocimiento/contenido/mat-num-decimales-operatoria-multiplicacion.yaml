semantic_id: MAT.NUM.DECIMALES_OPERATORIA.MULTIPLICACION
titulo: Multiplicación de números decimales
objetivo: Multiplicar números decimales operando como enteros y ubicando después la coma decimal.
introduccion: 'La multiplicación de decimales no requiere alinear comas: se multiplican los números ignorando
  temporalmente la coma, y al final se cuenta la cantidad total de cifras decimales para ubicarla correctamente
  en el resultado.'
resumen: Para multiplicar números decimales se multiplican como si fueran enteros y luego se ubica la
  coma en el resultado, contando tantas cifras decimales como la suma de las cifras decimales de ambos
  factores.
explicacion: '### Definición formal


  Si \(x\) tiene \(m\) cifras decimales e \(y\) tiene \(n\) cifras decimales, entonces \(x\cdot y\) tiene
  \(m+n\) cifras decimales, porque multiplicar por \(10^m\) y \(10^n\) convierte ambos factores en enteros,
  y el producto debe dividirse luego por \(10^{m+n}\).


  ### Desarrollo didáctico


  \(1.2\cdot0.4\): se multiplica \(12\cdot4=48\) como enteros; como \(1.2\) tiene 1 cifra decimal y \(0.4\)
  tiene 1 cifra decimal, el resultado lleva \(1+1=2\) cifras decimales: \(0.48\).'
procedimiento:
- 'Paso 1: Cuenta el total de cifras decimales de ambos factores.'
- 'Paso 2: Multiplica temporalmente como si fueran enteros.'
- 'Paso 3: Separa en el producto tantas cifras decimales como contaste y verifica con una estimación.'
ejemplos:
- titulo: Aplicación razonada — Multiplicación de decimales mediante conteo de cifras decimales
  enunciado: \(1.2\cdot 0.4 = 0.48\).
  solucion_pasos:
  - Cuenta el total de cifras decimales de ambos factores.
  - Multiplica temporalmente como si fueran enteros.
  - Separa en el producto tantas cifras decimales como contaste y verifica con una estimación.
- titulo: Revisión de una solución — Multiplicación de decimales mediante conteo de cifras decimales
  enunciado: Una solución aplica “Multiplica temporalmente como si fueran enteros.”, pero termina sin
    comprobar que la cantidad de cifras decimales del producto es la suma de las cifras decimales de los
    factores. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define multiplicación de decimales mediante conteo de cifras decimales:
    para multiplicar decimales se multiplican como enteros y luego se ubica la coma según el total de
    cifras decimales.'
  - Cuenta el total de cifras decimales de ambos factores.
  - 'Completa la revisión con este control: Separa en el producto tantas cifras decimales como contaste
    y verifica con una estimación.'
- titulo: ¿Se cumple que la cantidad de cifras decimales del producto es la suma de las cifras decimales
    de los factores? — Multiplicación de decimales mediante conteo de cifras decimales
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para multiplicar decimales se multiplican como enteros
    y luego se ubica la coma según el total de cifras decimales.
  - El caso “\(1.2\cdot 0.4 = 0.48\)” satisface esa condición.
  - Separa en el producto tantas cifras decimales como contaste y verifica con una estimación.
- titulo: ¿Es válido omitir el paso “Cuenta el total de cifras decimales de ambos factores”? — Multiplicación
    de decimales mediante conteo de cifras decimales
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de multiplicación de decimales mediante conteo de cifras
    decimales.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica temporalmente como si fueran enteros.'
  - 'La solución debe terminar de este modo: Separa en el producto tantas cifras decimales como contaste
    y verifica con una estimación.'
errores_frecuentes:
- 'Empezar multiplicación de decimales mediante conteo de cifras decimales sin realizar este control inicial:
  Cuenta el total de cifras decimales de ambos factores.'
- Memorizar “\(1.2\cdot 0.4 = 0.48\)” como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Multiplica temporalmente como si fueran enteros.” y usarlo aunque cambien
  las condiciones del problema.
- Dar por válida una conclusión sobre multiplicación de decimales mediante conteo de cifras decimales
  que contradice el criterio “La cantidad de cifras decimales del producto es la suma de las cifras decimales
  de los factores”.
- 'Cerrar el ejercicio sin esta comprobación específica: Separa en el producto tantas cifras decimales
  como contaste y verifica con una estimación.'
