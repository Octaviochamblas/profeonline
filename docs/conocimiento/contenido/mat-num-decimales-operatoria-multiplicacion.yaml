semantic_id: MAT.NUM.DECIMALES_OPERATORIA.MULTIPLICACION
objetivo: Multiplicar números decimales.
introduccion: Una tarea matemática frecuente es multiplicar números decimales. El
  caso “\(1.2\cdot 0.4 = 0.48\)” muestra cómo abordarla desde multiplicación de decimales
  mediante conteo de cifras decimales.
resumen: Para multiplicar decimales se multiplican como enteros y luego se ubica la
  coma según el total de cifras decimales. Como criterio de control, la cantidad de
  cifras decimales del producto es la suma de las cifras decimales de los factores
explicacion: |-
  Para multiplicar decimales se multiplican como enteros y luego se ubica la coma según el total de cifras decimales.

  En el caso “\(1.2\cdot 0.4 = 0.48\)” esta definición se aplica de forma directa. El control final consiste en comprobar que la cantidad de cifras decimales del producto es la suma de las cifras decimales de los factores.
procedimiento:
- 'Paso 1: Cuenta el total de cifras decimales de ambos factores.'
- 'Paso 2: Multiplica temporalmente como si fueran enteros.'
- 'Paso 3: Separa en el producto tantas cifras decimales como contaste y verifica
  con una estimación.'
ejemplos:
- titulo: Aplicación razonada — Multiplicación de decimales mediante conteo de cifras
    decimales
  enunciado: \(1.2\cdot 0.4 = 0.48\).
  solucion_pasos:
  - Cuenta el total de cifras decimales de ambos factores.
  - Multiplica temporalmente como si fueran enteros.
  - Separa en el producto tantas cifras decimales como contaste y verifica con una
    estimación.
- titulo: Revisión de una solución — Multiplicación de decimales mediante conteo de
    cifras decimales
  enunciado: Una solución aplica “Multiplica temporalmente como si fueran enteros.”,
    pero termina sin comprobar que la cantidad de cifras decimales del producto es
    la suma de las cifras decimales de los factores. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define multiplicación de decimales mediante conteo
    de cifras decimales: para multiplicar decimales se multiplican como enteros y
    luego se ubica la coma según el total de cifras decimales.'
  - Cuenta el total de cifras decimales de ambos factores.
  - 'Completa la revisión con este control: Separa en el producto tantas cifras decimales
    como contaste y verifica con una estimación.'
- titulo: ¿Se cumple que la cantidad de cifras decimales del producto es la suma de
    las cifras decimales de los factores? — Multiplicación de decimales mediante conteo
    de cifras decimales
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para multiplicar decimales se multiplican
    como enteros y luego se ubica la coma según el total de cifras decimales.
  - El caso “\(1.2\cdot 0.4 = 0.48\)” satisface esa condición.
  - Separa en el producto tantas cifras decimales como contaste y verifica con una
    estimación.
- titulo: ¿Es válido omitir el paso “Cuenta el total de cifras decimales de ambos
    factores”? — Multiplicación de decimales mediante conteo de cifras decimales
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de multiplicación de decimales
    mediante conteo de cifras decimales.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica temporalmente
    como si fueran enteros.'
  - 'La solución debe terminar de este modo: Separa en el producto tantas cifras decimales
    como contaste y verifica con una estimación.'
errores_frecuentes:
- 'Empezar multiplicación de decimales mediante conteo de cifras decimales sin realizar
  este control inicial: Cuenta el total de cifras decimales de ambos factores.'
- Memorizar “\(1.2\cdot 0.4 = 0.48\)” como respuesta aislada, sin reconstruir la definición
  que lo justifica.
- Convertir en receta el paso “Multiplica temporalmente como si fueran enteros.” y
  usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre multiplicación de decimales mediante conteo
  de cifras decimales que contradice el criterio “La cantidad de cifras decimales
  del producto es la suma de las cifras decimales de los factores”.
- 'Cerrar el ejercicio sin esta comprobación específica: Separa en el producto tantas
  cifras decimales como contaste y verifica con una estimación.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
