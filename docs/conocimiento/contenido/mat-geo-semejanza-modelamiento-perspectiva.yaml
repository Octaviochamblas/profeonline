semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.MODELAMIENTO_PERSPECTIVA
titulo: Modelamiento de problemas de perspectiva usando semejanza de triángulos
objetivo: Modelar problemas de perspectiva visual (como estimar la altura de un objeto lejano) usando
  triángulos semejantes formados por la línea de visión.
introduccion: 'Además de las sombras, otra aplicación clásica de la semejanza de triángulos es la perspectiva:
  estimar distancias o alturas usando la línea de visión de un observador.'
resumen: 'Al mirar un objeto lejano a través de una referencia cercana (como un dedo extendido o una regla),
  se forman dos triángulos semejantes: uno pequeño (cerca del ojo) y uno grande (hasta el objeto real).'
explicacion: '![Modelamiento de perspectiva con semejanza](/static/img/geometria/congruencia-semejanza/semejanza-modelamiento-perspectiva.svg)


  ### Definición formal


  Si un observador sostiene un objeto de referencia de altura $h_1$ a distancia $d_1$ de su ojo, y observa
  un objeto lejano de altura $h_2$ (desconocida) a distancia $d_2$, alineados en la misma línea de visión,
  se cumple $\frac{h_1}{d_1}=\frac{h_2}{d_2}$ (triángulos semejantes por AA).


  ### Desarrollo didáctico


  Esta técnica es usada, por ejemplo, en topografía y navegación: un observador sostiene una regla de
  10 cm a 50 cm de su ojo, y esta cubre exactamente un árbol lejano ubicado a 20 m. La altura del árbol
  es $h_2=\frac{10\times2000}{50}=400$ cm=4 m.'
procedimiento:
- 'Paso 1: Identifica la altura y distancia del objeto de referencia cercano al ojo.'
- 'Paso 2: Identifica la distancia hasta el objeto lejano cuya altura se desconoce.'
- 'Paso 3: Plantea la proporción entre ambos triángulos semejantes y despeja la altura desconocida.'
ejemplos:
- titulo: Estimar la altura de un árbol usando una regla
  enunciado: Una regla de 10 cm a 50 cm del ojo cubre un árbol a 20 m de distancia.
  solucion_pasos:
  - 10/50=h/2000 → h=10×2000/50=400 cm=4 m.
- titulo: Aplicar el mismo método con otro objeto de referencia
  enunciado: Un dedo de 8 cm a 40 cm del ojo cubre un edificio a 100 m.
  solucion_pasos:
  - 8/40=h/10000 → h=8×10000/40=2000 cm=20 m.
- titulo: ¿Este método requiere que el objeto de referencia y el objeto lejano estén alineados con el
    ojo?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos deben estar en la misma línea de visión para formar los triángulos semejantes.
- titulo: ¿Qué criterio de semejanza justifica este método?
  respuesta: AA
  solucion_pasos:
  - Los triángulos comparten el ángulo en el ojo y ambos tienen un ángulo recto, cumpliendo AA.
errores_frecuentes:
- No alinear correctamente el objeto de referencia con el objeto lejano en la misma línea de visión.
- Confundir las distancias del objeto de referencia con las del objeto lejano al plantear la proporción.
- Olvidar convertir las unidades (cm, m) de forma consistente antes de calcular.
fuente: Elaboración propia.
estado: publicado
