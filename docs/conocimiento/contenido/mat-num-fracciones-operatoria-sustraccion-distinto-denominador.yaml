semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.SUSTRACCION_DISTINTO_DENOMINADOR
titulo: Sustracción de fracciones con distinto denominador
objetivo: Restar fracciones que no comparten el mismo denominador.
introduccion: Igual que en la suma, para restar fracciones con distinto denominador es necesario primero
  llevarlas a un denominador común mediante amplificación.
resumen: Para restar fracciones con distinto denominador se amplifican ambas a un denominador común y
  luego se restan los numeradores resultantes.
explicacion: '### Definición formal


  \(\frac{a}{b}-\frac{c}{d}=\frac{a\cdot d-b\cdot c}{b\cdot d}\), lo que equivale a amplificar cada fracción
  al denominador común \(b\cdot d\) antes de restar los numeradores.


  ### Desarrollo didáctico


  \(\frac{5}{6}-\frac{1}{4}\): se amplifica \(\frac{5}{6}\) a doceavos, \(\frac{10}{12}\), y \(\frac{1}{4}\)
  a doceavos, \(\frac{3}{12}\); luego se restan los numeradores, \(10-3=7\), obteniendo \(\frac{7}{12}\).'
procedimiento:
- 'Paso 1: Obtén un denominador común para ambas fracciones.'
- 'Paso 2: Reescribe fracciones equivalentes y resta los numeradores respetando el orden.'
- 'Paso 3: Simplifica y compara con una estimación para controlar el signo y la magnitud.'
ejemplos:
- titulo: Aplicación razonada — Sustracción de fracciones de distinto denominador
  enunciado: \(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\).
  solucion_pasos:
  - Obtén un denominador común para ambas fracciones.
  - Reescribe fracciones equivalentes y resta los numeradores respetando el orden.
  - Simplifica y compara con una estimación para controlar el signo y la magnitud.
- titulo: Revisión de una solución — Sustracción de fracciones de distinto denominador
  enunciado: Una solución aplica “Reescribe fracciones equivalentes y resta los numeradores respetando
    el orden.”, pero termina sin comprobar que buscar un m.c.m. suele hacer más eficiente la operación.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define sustracción de fracciones de distinto denominador: para restar fracciones
    de distinto denominador primero se expresan con un denominador común.'
  - Obtén un denominador común para ambas fracciones.
  - 'Completa la revisión con este control: Simplifica y compara con una estimación para controlar el
    signo y la magnitud.'
- titulo: ¿Se cumple que buscar un m.c.m. suele hacer más eficiente la operación? — Sustracción de fracciones
    de distinto denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para restar fracciones de distinto denominador primero
    se expresan con un denominador común.
  - El caso “\(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\)” satisface esa condición.
  - Simplifica y compara con una estimación para controlar el signo y la magnitud.
- titulo: ¿Es válido omitir el paso “Obtén un denominador común para ambas fracciones”? — Sustracción
    de fracciones de distinto denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de sustracción de fracciones de distinto denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Reescribe fracciones equivalentes y resta los
    numeradores respetando el orden.'
  - 'La solución debe terminar de este modo: Simplifica y compara con una estimación para controlar el
    signo y la magnitud.'
errores_frecuentes:
- 'Empezar sustracción de fracciones de distinto denominador sin realizar este control inicial: Obtén
  un denominador común para ambas fracciones.'
- Memorizar “\(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Reescribe fracciones equivalentes y resta los numeradores respetando el
  orden.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre sustracción de fracciones de distinto denominador que contradice
  el criterio “Buscar un m.c.m. suele hacer más eficiente la operación”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica y compara con una estimación para
  controlar el signo y la magnitud.'
