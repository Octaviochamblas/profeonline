semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.SUSTRACCION_DISTINTO_DENOMINADOR
objetivo: Restar fracciones con denominadores distintos.
introduccion: 'El caso “\(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\)”
  plantea una situación propia de sustracción de fracciones de distinto denominador.
  Resolverla exige usar esta condición con precisión: para restar fracciones de distinto
  denominador primero se expresan con un denominador común.'
resumen: Para restar fracciones de distinto denominador primero se expresan con un
  denominador común. Como criterio de control, buscar un m.c.m. suele hacer más eficiente
  la operación
explicacion: |-
  Para restar fracciones de distinto denominador primero se expresan con un denominador común.

  En el caso “\(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\)” esta definición se aplica de forma directa. El control final consiste en comprobar que buscar un m.c.m. suele hacer más eficiente la operación.
procedimiento:
- 'Paso 1: Obtén un denominador común para ambas fracciones.'
- 'Paso 2: Reescribe fracciones equivalentes y resta los numeradores respetando el
  orden.'
- 'Paso 3: Simplifica y compara con una estimación para controlar el signo y la magnitud.'
ejemplos:
- titulo: Aplicación razonada — Sustracción de fracciones de distinto denominador
  enunciado: \(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\).
  solucion_pasos:
  - Obtén un denominador común para ambas fracciones.
  - Reescribe fracciones equivalentes y resta los numeradores respetando el orden.
  - Simplifica y compara con una estimación para controlar el signo y la magnitud.
- titulo: Revisión de una solución — Sustracción de fracciones de distinto denominador
  enunciado: Una solución aplica “Reescribe fracciones equivalentes y resta los numeradores
    respetando el orden.”, pero termina sin comprobar que buscar un m.c.m. suele hacer
    más eficiente la operación. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define sustracción de fracciones de distinto denominador:
    para restar fracciones de distinto denominador primero se expresan con un denominador
    común.'
  - Obtén un denominador común para ambas fracciones.
  - 'Completa la revisión con este control: Simplifica y compara con una estimación
    para controlar el signo y la magnitud.'
- titulo: ¿Se cumple que buscar un m.c.m. suele hacer más eficiente la operación?
    — Sustracción de fracciones de distinto denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para restar fracciones de distinto
    denominador primero se expresan con un denominador común.
  - El caso “\(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\)”
    satisface esa condición.
  - Simplifica y compara con una estimación para controlar el signo y la magnitud.
- titulo: ¿Es válido omitir el paso “Obtén un denominador común para ambas fracciones”?
    — Sustracción de fracciones de distinto denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de sustracción de fracciones de
    distinto denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Reescribe fracciones equivalentes
    y resta los numeradores respetando el orden.'
  - 'La solución debe terminar de este modo: Simplifica y compara con una estimación
    para controlar el signo y la magnitud.'
errores_frecuentes:
- 'Empezar sustracción de fracciones de distinto denominador sin realizar este control
  inicial: Obtén un denominador común para ambas fracciones.'
- Memorizar “\(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Reescribe fracciones equivalentes y resta los numeradores
  respetando el orden.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre sustracción de fracciones de distinto denominador
  que contradice el criterio “Buscar un m.c.m. suele hacer más eficiente la operación”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica y compara con
  una estimación para controlar el signo y la magnitud.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
