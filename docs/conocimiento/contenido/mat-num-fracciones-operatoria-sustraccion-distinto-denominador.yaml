semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.SUSTRACCION_DISTINTO_DENOMINADOR
objetivo: Comprender sustracción de fracciones de distinto denominador y aplicarlo
  correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso sustracción de fracciones de distinto denominador ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Para restar fracciones de distinto denominador primero se expresan con un
  denominador común. Además, buscar un m.c.m. suele hacer más eficiente la operación.
explicacion: |-
  Para restar fracciones de distinto denominador primero se expresan con un denominador común.

  Una idea importante es que buscar un m.c.m. suele hacer más eficiente la operación.

  Por ejemplo, \(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\).
procedimiento:
- 'Paso 1: Identificar la operación y preparar una representación adecuada de los
  datos.'
- 'Paso 2: Aplicar la regla específica de la operación respetando valor posicional
  o denominadores.'
- 'Paso 3: Simplificar o verificar el resultado final según corresponda.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{5}{6}-\frac{1}{4}=\frac{10}{12}-\frac{3}{12}=\frac{7}{12}\).”
    se relaciona con sustracción de fracciones de distinto denominador.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: para restar fracciones de distinto denominador primero
    se expresan con un denominador común.'
  - Concluye que el ejemplo sí ilustra sustracción de fracciones de distinto denominador.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Buscar un m.c.m. suele hacer más eficiente
    la operación.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con sustracción de fracciones de distinto
    denominador?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que buscar un m.c.m. suele hacer más eficiente
    la operación.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar sustracción de fracciones de distinto denominador ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar sustracción de fracciones de distinto denominador sin mirar qué
  representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
