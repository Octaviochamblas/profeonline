semantic_id: MAT.ALG.MULT_MON_POL.DISTRIBUCION_TERMINOS
titulo: Distribución de un monomio sobre los términos de un polinomio
objetivo: Aplicar la propiedad distributiva al multiplicar un monomio por un polinomio.
introduccion: Imagina que eres un cartero y tienes que entregar una carta en cada casa de una cuadra.
  El monomio es el cartero, y cada término del polinomio es una casa. El monomio debe visitar (multiplicar)
  a absolutamente todos los términos de la cuadra.
resumen: 'La multiplicación de un monomio por un polinomio se basa en la **Propiedad Distributiva**: el
  monomio exterior se multiplica por cada uno de los términos del polinomio interior por separado, sumando
  los resultados obtenidos.'
explicacion: '### Definición formal


  Sean $M$ un monomio y $P=T_1+T_2+\cdots+T_n$ un polinomio escrito como suma algebraica de sus términos.
  La propiedad distributiva define su producto mediante

  $$M\cdot P=M\cdot T_1+M\cdot T_2+\cdots+M\cdot T_n=\sum_{i=1}^{n}M\cdot T_i.$$

  Por tanto, el monomio multiplica a todos los términos del polinomio y conserva entre los productos parciales
  las operaciones de suma o resta presentes en $P$.


  ### Desarrollo didáctico


  Operación: $3x(2x^2 - 5x + 4)$.


  Aplicamos la distribución término a término:

  1. Primer término: $(3x)(2x^2) = 6x^3$.

  2. Segundo término: $(3x)(-5x) = -15x^2$.

  3. Tercer término: $(3x)(+4) = +12x$.


  Sumamos o conectamos los resultados: $6x^3 - 15x^2 + 12x$.'
procedimiento:
- 'Paso 1: Identifica el monomio exterior y todos los términos del polinomio interior.'
- 'Paso 2: Multiplica el monomio por el primer término del polinomio.'
- 'Paso 3: Multiplica el monomio por el segundo término del polinomio (respetando signos).'
- 'Paso 4: Repite el proceso para todos los términos restantes.'
- 'Paso 5: Escribe la expresión final conectando todos los productos parciales con sus respectivos signos.'
- La distributividad permite repartir el producto exterior a cada sumando interior.
ejemplos:
- titulo: El cartero algebraico
  enunciado: 'Multiplica: 2a(3a - 5b).'
  solucion_pasos:
  - 'Multiplicación 1: (2a)(3a) = 6a^2.'
  - 'Multiplicación 2: (2a)(-5b) = -10ab.'
  - 'Combinación: 6a^2 - 10ab.'
- titulo: El ingreso de un cine se calcula como $I = p(100 - 2p)$ donde $p$ es el precio de la entrada
  enunciado: 'El ingreso de un cine se calcula como $I = p(100 - 2p)$ donde $p$ es el precio de la entrada.
    ¿Cuál es la expresión equivalente para el ingreso al distribuir el precio? (v1)


    Opciones: A) $100p - 2p^2$ · B) $100 - 2p^2$ · C) $100p - 2p$ · D) $98p^2$'
  solucion_pasos:
  - 'Distribuimos $p$: $p \cdot 100 = 100p$. $p \cdot (-2p) = -2p^2$. Resultado: $100p - 2p^2$.'
- titulo: 'Respecto de «Distribución de un monomio sobre los términos de un polinomio»: ¿Es correcta es'
  enunciado: 'Respecto de «Distribución de un monomio sobre los términos de un polinomio»: ¿Es correcta
    esta caracterización? «La multiplicación de un monomio por un polinomio se basa en la **Propiedad
    Distributiva**: el monomio exterior se multiplica por cada uno de los términos del polinomio interior
    por separado, sumando los resultados obtenidos»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La multiplicación de un monomio por un polinomio
    se basa en la **Propiedad Distributiva**: el monomio exterior se multiplica por cada uno de los términos
    del polinomio interior por separado, sumando los resultados obtenidos.'
- titulo: 'Respecto de «Distribución de un monomio sobre los términos de un polinomio»: ¿Es válida esta'
  enunciado: 'Respecto de «Distribución de un monomio sobre los términos de un polinomio»: ¿Es válida
    esta afirmación? «Multiplicar el monomio únicamente por el primer término del polinomio y dejar los
    demás intactos (ej. $2(x+3) = 2x+3$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La multiplicación de un monomio por un polinomio
    se basa en la **Propiedad Distributiva**: el monomio exterior se multiplica por cada uno de los términos
    del polinomio interior por separado, sumando los resultados obtenidos.'
errores_frecuentes:
- Multiplicar el monomio únicamente por el primer término del polinomio y dejar los demás intactos (ej.
  $2(x+3) = 2x+3$).
- Cometer errores de signos al multiplicar el monomio por los términos negativos del polinomio.
- Para «¿Qué propiedad matemática justifica que la operación $3a(b + c)$ se resuelva como $3ab + 3ac$?
  (v1)», la respuesta correcta es Propiedad conmutativa.
- Para «¿Qué propiedad matemática justifica que la operación $3a(b + c)$ se resuelva como $3ab + 3ac$?
  (v1)», la respuesta correcta es Propiedad asociativa.
- Para «¿Qué propiedad matemática justifica que la operación $3a(b + c)$ se resuelva como $3ab + 3ac$?
  (v1)», la respuesta correcta es Elemento neutro multiplicativo.
fuente: Álgebra de Baldor.
estado: publicado
