semantic_id: MAT.ALG.FACTOR_TRINOMIOS.AMPLIFICACION_COMPUESTO
titulo: Aplicación del método de amplificación en trinomio no mónico
objetivo: Aprender a transformar un trinomio compuesto en uno simple mediante la amplificación por su
  coeficiente principal.
introduccion: Si un problema es muy difícil, a veces es mejor 'disfrazarlo' de uno fácil. El método de
  amplificación toma un trinomio rebelde (con a distinto de 1) y lo disfraza multiplicándolo por sí mismo
  hasta que parece un trinomio simple y amigable.
resumen: El método consiste en multiplicar todo el polinomio $ax^2 + bx + c$ por '$a$' y dividirlo por
  '$a$'. Esto transforma el numerador en $(ax)^2 + b(ax) + ac$, que puede factorizarse como un trinomio
  simple.
explicacion: '### Definición formal


  Dejar $b(ax)$ nos permite tratar a $(ax)$ como una variable ''U'' y aplicar el método simple.


  ### Desarrollo didáctico


  Resolvamos $3x^2 + 14x + 8$.

  Multiplicamos todo el polinomio por 3, y para no alterar su valor, dividimos todo entre 3:

  $\frac{3(3x^2 + 14x + 8)}{3}$


  Al multiplicar el numerador, el truco es NO multiplicar el término del medio. Lo reordenamos:

  $\frac{(3x)^2 + 14(3x) + 24}{3}$


  Fíjate bien. Si llamas a $(3x)$ como si fuera una nueva letra $U$, te queda:

  $U^2 + 14U + 24$

  Esto es un trinomio simple. Buscamos dos números que multipliquen 24 y sumen 14. Son 12 y 2.


  Factorizamos arriba: $\frac{(3x + 12)(3x + 2)}{3}$.

  Por último, debemos eliminar el 3 del denominador. Para eso, sacamos factor común 3 del primer paréntesis:
  $3(x + 4)$.

  $\frac{3(x + 4)(3x + 2)}{3}$. Cancelamos los 3 y listo. Nos queda $(x + 4)(3x + 2)$.'
procedimiento:
- 'Paso 1: Multiplica y divide el trinomio por el coeficiente ''a'' (el número que acompaña a la $x^2$).'
- 'Paso 2: Desarrolla el numerador dejando indicado el término central: $(ax)^2 + b(ax) + ac$.'
- 'Paso 3: Factoriza el numerador buscando dos números que multipliquen ''ac'' y sumen ''b''.'
- 'Paso 4: Escribe los paréntesis $(ax + \text{num1})(ax + \text{num2})$.'
- 'Paso 5: Extrae un factor común de los paréntesis (puede ser en uno o en ambos) para simplificar y eliminar
  el denominador ''a''.'
ejemplos:
- titulo: Factoriza $2x^2 + 5x + 3$
  enunciado: Factoriza $2x^2 + 5x + 3$.
  solucion_pasos:
  - 'Amplificamos por 2: $\frac{(2x)^2 + 5(2x) + 6}{2}$.'
  - 'Dos números que den 6 multiplicados y 5 sumados: 2 y 3.'
  - 'Numerador: $(2x+2)(2x+3)$.'
  - 'Extraemos factor común 2 del primer paréntesis: $2(x+1)$.'
  - 'Cancelamos el /2. Resultado: $(x+1)(2x+3)$.'
- titulo: Factoriza $5x^2 - 13x - 6$.
  solucion_pasos:
  - 'Amplificamos por 5. Numerador: $(5x)^2 - 13(5x) - 30$. Números: -15 y +2. Queda $(5x-15)(5x+2) /
    5$. Simplificando el primer paréntesis queda $(x-3)$.'
- titulo: 'Respecto de «Aplicación del método de amplificación en trinomio no mónico»: ¿Se ajusta a la'
  enunciado: 'Respecto de «Aplicación del método de amplificación en trinomio no mónico»: ¿Se ajusta a
    la definición esta afirmación? «El método consiste en multiplicar todo el polinomio $ax^2 + bx + c$
    por ''$a$'' y dividirlo por ''$a$''»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El método consiste en multiplicar todo el polinomio
    $ax^2 + bx + c$ por ''$a$'' y dividirlo por ''$a$''.'
- titulo: 'Respecto de «Aplicación del método de amplificación en trinomio no mónico»: ¿Es compatible
    c'
  enunciado: 'Respecto de «Aplicación del método de amplificación en trinomio no mónico»: ¿Es compatible
    con el procedimiento esta afirmación? «Multiplicar el término central y perder la estructura $(ax)$.
    (Ej: Escribir $42x$ en vez de $14(3x)$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El método consiste en multiplicar todo el polinomio
    $ax^2 + bx + c$ por ''$a$'' y dividirlo por ''$a$''.'
errores_frecuentes:
- 'Multiplicar el término central y perder la estructura $(ax)$. (Ej: Escribir $42x$ en vez de $14(3x)$).'
- Olvidar dividir por 'a' y quedarse con una factorización amplificada que no equivale al polinomio original.
- Para «¿Cuál es el propósito de NO multiplicar directamente el coeficiente central al usar este método»,
  la respuesta correcta es Por pereza mental.
- Porque daría un número negativo.
- Para «¿Cuál es el propósito de NO multiplicar directamente el coeficiente central al usar este método»,
  la respuesta correcta es Para que se cancele con el denominador.
