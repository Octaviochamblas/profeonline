semantic_id: MAT.GEO.HOMOTECIA.REDUCCION
titulo: Efecto de reducción en una homotecia con valor absoluto de la razón entre 0 y 1
objetivo: Reconocer que una homotecia con 0<|k|<1 produce una reducción de la figura original, sin importar
  si k es positivo o negativo.
introduccion: 'El caso opuesto a la ampliación ocurre cuando el valor absoluto de la razón es un número
  entre 0 y 1: la figura resultante es más pequeña que la original.'
resumen: 'Una homotecia produce una reducción cuando el valor absoluto de su razón está entre 0 y 1 ($0<|k|<1$):
  la figura imagen es más pequeña que la original.'
explicacion: '![Homotecia de reducción](/static/img/geometria/congruencia-semejanza/homotecia-reduccion.svg)


  ### Definición formal


  Si $0<|k|<1$, cada distancia en la figura imagen es $|k|$ veces la distancia correspondiente en la figura
  original (un valor menor), produciendo una figura más pequeña, sin importar el signo de $k$.


  ### Desarrollo didáctico


  Tanto k=0,5 como k=-0,5 producen una reducción a la mitad del tamaño, pero con orientación distinta:
  k=0,5 mantiene la orientación (directa), mientras que k=-0,5 la invierte respecto al centro (inversa).'
procedimiento:
- 'Paso 1: Calcula el valor absoluto de la razón de homotecia k.'
- 'Paso 2: Compara ese valor con 1.'
- 'Paso 3: Si 0<|k|<1, la homotecia produce una reducción de la figura.'
ejemplos:
- titulo: Identificar una reducción con k positivo
  enunciado: Una homotecia tiene razón k=0,4.
  solucion_pasos:
  - 0<0,4<1, por lo tanto es una reducción (y además directa, por ser k positivo).
- titulo: Identificar una reducción con k negativo
  enunciado: Una homotecia tiene razón k=-0,3.
  solucion_pasos:
  - '|-0,3|=0,3, con 0<0,3<1, por lo tanto también es una reducción (e inversa, por ser k negativo).'
- titulo: ¿El signo de k determina si hay reducción?
  respuesta: 'No'
  solucion_pasos:
  - No, el signo determina si es directa o inversa; el valor absoluto determina si reduce o amplía.
- titulo: ¿Una razón k=0,9 produce reducción?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque 0<0,9<1, aunque sea una reducción muy leve.
errores_frecuentes:
- Confundir el efecto de reducción con la clasificación directa/inversa, que dependen de aspectos distintos
  de k.
- Creer que valores negativos de k siempre implican reducción.
- No verificar correctamente si 0<|k|<1, confundiendo con el caso |k|>1 (ampliación).
fuente: Elaboración propia.
estado: publicado
