semantic_id: MAT.NUM.PROG_GEOMETRICA.CALCULO_PRIMER_TERMINO
titulo: Determinación del primer término a partir de un término conocido y la razón geométrica
objetivo: Despejar y calcular el primer término ($a_1$) de una P.G. conociendo un término cualquiera y
  la razón.
introduccion: Imagina que entras a la cocina y ves un pan gigante que triplicó su tamaño tres veces seguidas.
  ¿De qué tamaño era la bolita de masa original? Tenemos que rebobinar la película usando divisiones.
resumen: 'Para hallar el término inicial ($a_1$) conociendo un término lejano ($a_n$), debes despejar
  la fórmula general pasando la potencia dividiendo: $a_1 = \frac{a_n}{r^{(n - 1)}}$.'
explicacion: "Sabemos que $a_n = a_1 \\cdot r^{(n-1)}$.\nSi la incógnita es $a_1$, el bloque multiplicativo\
  \ de la razón $r^{(n-1)}$ debe cruzar al otro lado haciendo la operación contraria (dividiendo).\n\n\
  **Fórmula despejada:**\n$$a_1 = \\frac{a_n}{r^{(n - 1)}}$$\n\nLógica: 'Tomo el número gigante de la\
  \ posición $n$ y lo divido todas las veces que fue multiplicado para encogerlo de vuelta a su tamaño\
  \ original'.\n\nEjemplo: Sabemos que el término 4 vale 54 ($a_4=54$) y la razón es 3 ($r=3$).\n- $a_1\
  \ = \\frac{54}{3^{(4-1)}}$\n- $a_1 = \\frac{54}{3^3}$\n- $a_1 = \\frac{54}{27} = 2$. \n¡La bolita original\
  \ valía 2!"
procedimiento:
- 'Paso 1: Identifica tu término de destino ($a_n$) y su posición ($n$).'
- 'Paso 2: Identifica la razón geométrica ($r$).'
- 'Paso 3: Eleva la razón al exponente $(n-1)$ para saber cuál fue el factor total de multiplicación.'
- 'Paso 4: Divide el término de destino ($a_n$) por ese factor.'
ejemplos:
- titulo: Desinflando el número
  enunciado: El 5to término de una progresión geométrica es 160. Su razón es 2. Halla el primer término.
  solucion_pasos:
  - 'Datos: a5 = 160, r = 2, n = 5.'
  - 'Factor total: 2^(5-1) = 2^4 = 16.'
  - 'Despejamos a1: 160 / 16.'
  - a1 = 10.
errores_frecuentes:
- Olvidar elevar a la potencia $(n-1)$ y dividir simplemente $a_n / r$ (lo cual solo te retrocedería una
  posición, en vez de volver hasta el inicio).
- Equivocarse en el cálculo de la potencia en el denominador (ej. decir que $2^4 = 8$ en vez de 16).
fuente: Currículum Nacional MINEDUC.
estado: publicado
