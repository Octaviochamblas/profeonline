semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.COLATERALES_EXTERNOS_SUPLEMENTARIOS
titulo: Propiedad de suplementariedad de ángulos colaterales externos entre paralelas
objetivo: Usar la propiedad de los ángulos colaterales externos para justificar una medida y comprobar
  que la propiedad solo puede aplicarse después de verificar que el par elegido realmente es colaterales
  externos.
introduccion: 'En geometría muchas igualdades parecen obvias porque el dibujo ''se ve bien''. Con paralelas
  y transversal conviene ir más lento: primero se nombra bien el par y recién después se transfiere la
  medida. Aquí lo trabajaremos con ejemplos concretos y verificaciones cortas.'
resumen: Si dos rectas paralelas son cortadas por una transversal, los ángulos colaterales externos suman
  180°. Como idea de control, la propiedad solo puede aplicarse después de verificar que el par elegido
  realmente es colaterales externos.
explicacion: 'Si dos rectas paralelas son cortadas por una transversal, los ángulos colaterales externos
  suman 180°.


  Cuando se analiza “si un colateral externo vale 145°, el otro debe medir 35°” conviene evitar la memoria
  mecánica. El control decisivo es comprobar que la propiedad solo puede aplicarse después de verificar
  que el par elegido realmente es colaterales externos.'
procedimiento:
- 'Paso 1: Reconoce un par de ángulos colaterales externos en el esquema.'
- 'Paso 2: Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.'
- 'Paso 3: Comprueba que el resultado respete la posición del par y la condición de paralelismo.'
ejemplos:
- titulo: Caso guiado — Suplementarios colaterales externos
  enunciado: Si un colateral externo vale 145°, el otro debe medir 35°.
  solucion_pasos:
  - Reconoce un par de ángulos colaterales externos en el esquema.
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: Verificación de la solución — Suplementarios colaterales externos
  enunciado: 'Un estudiante usa la idea “la propiedad solo puede aplicarse después de verificar que el
    par elegido realmente es colaterales externos” al analizar este caso: si un colateral externo vale
    145°, el otro debe medir 35°. Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: si dos rectas paralelas son cortadas por una transversal, los ángulos colaterales
    externos suman 180°.'
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿La situación respeta la idea clave del recurso? — Suplementarios colaterales externos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: si dos rectas paralelas son cortadas por una
    transversal, los ángulos colaterales externos suman 180°.'
  - En el caso “si un colateral externo vale 145°, el otro debe medir 35°” se observa que la propiedad
    solo puede aplicarse después de verificar que el par elegido realmente es colaterales externos.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Suplementarios colaterales externos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de propiedad de suplementariedad de ángulos
    colaterales externos entre paralelas.
  - Después del paso “Reconoce un par de ángulos colaterales externos en el esquema.” todavía hace falta
    revisar “Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.”.
  - El cierre correcto exige “Comprueba que el resultado respete la posición del par y la condición de
    paralelismo.”.
errores_frecuentes:
- Suplementarios colaterales externos significa ser iguales solo por estar ambos fuera de las paralelas.
- Para resolver suplementarios colaterales externos, basta con el paso “Reconoce un par de ángulos colaterales
  externos en el esquema.” y no hace falta revisar “Usa la propiedad correspondiente para relacionar la
  medida conocida con la incógnita.”.
- Si el dibujo parece claro, se puede ignorar que la propiedad solo puede aplicarse después de verificar
  que el par elegido realmente es colaterales externos.
- Dos configuraciones distintas representan suplementarios colaterales externos solo porque contienen
  la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que el resultado respete la posición
  del par y la condición de paralelismo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
