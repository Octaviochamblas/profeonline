semantic_id: MAT.ALG.LEYES_MULTIPLICACION.EXPONENTES_IGUAL_BASE
titulo: Aplicación del producto de potencias de igual base en multiplicación algebraica
objetivo: Aplicar la ley de exponentes al multiplicar potencias de la misma base, sumando los exponentes.
introduccion: '¿Cuánto es $x^2 \cdot x^3$? Podemos pensar: $x^2 = x \cdot x$ y $x^3 = x \cdot x \cdot
  x$. Juntándolos: $x \cdot x \cdot x \cdot x \cdot x = x^5$. Los exponentes se suman.'
resumen: 'Al multiplicar potencias de la **misma base**, los exponentes se **suman**: $x^m \cdot x^n =
  x^{m+n}$. La base permanece igual; solo los exponentes se operan.'
explicacion: '### Definición formal


  Regla: $a^m \cdot a^n = a^{m+n}$. Base idéntica → sumar exponentes.


  ### Desarrollo didáctico


  Regla formal: $a^m \cdot a^n = a^{m+n}$.


  Ejemplos:

  - $x^3 \cdot x^4 = x^{3+4} = x^7$.

  - $y^2 \cdot y = y^{2+1} = y^3$ (el exponente 1 es implícito).

  - $a^5 \cdot a^0 = a^{5+0} = a^5$ (cualquier base elevada a cero es 1).


  Importante: Esta regla solo aplica cuando las bases son idénticas. $x^3 \cdot y^4$ NO se simplifica
  sumando exponentes porque las bases ($x$ e $y$) son distintas.'
procedimiento:
- 'Paso 1: Verifica que las dos potencias tengan exactamente la misma base.'
- 'Paso 2: Suma sus exponentes.'
- 'Paso 3: Escribe la base con el exponente resultante.'
- 'Paso 4: Si las bases son distintas, NO apliques esta regla; déjalas separadas.'
ejemplos:
- titulo: El acumulador de potencias
  enunciado: 'Simplifica: x^3 · x^2 · x.'
  solucion_pasos:
  - Misma base x en los tres factores.
  - 'Sumamos exponentes: 3 + 2 + 1 = 6.'
  - 'Resultado: x^6.'
- titulo: El área de un rectángulo es largo × ancho. Si el largo es $x^3$ cm y el ancho es $x^2$ cm, ¿
  enunciado: 'El área de un rectángulo es largo × ancho. Si el largo es $x^3$ cm y el ancho es $x^2$ cm,
    ¿cuál es el área? (v1)


    Opciones: A) $x^5$ cm² · B) $x^6$ cm² · C) $2x^5$ cm² · D) $x^5$ cm'
  solucion_pasos:
  - $A = x^3 \cdot x^2 = x^{3+2} = x^5$ cm².
  - 'Respuesta: $x^5$ cm²'
- titulo: Respecto de «Aplicación del producto de potencias de igual base en multiplicación algebraica
  enunciado: 'Respecto de «Aplicación del producto de potencias de igual base en multiplicación algebraica»:
    ¿La siguiente formulación es correcta? «Al multiplicar potencias de la **misma base**, los exponentes
    se **suman**: $x^m \cdot x^n = x^{m+n}$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al multiplicar potencias de la **misma base**, los
    exponentes se **suman**: $x^m \cdot x^n = x^{m+n}$.'
- titulo: Respecto de «Aplicación del producto de potencias de igual base en multiplicación algebraica
  enunciado: 'Respecto de «Aplicación del producto de potencias de igual base en multiplicación algebraica»:
    ¿La siguiente conclusión es correcta? «Multiplicar los exponentes en lugar de sumarlos (ej. $x^3 \cdot
    x^4 = x^{12}$). Eso es elevar una potencia a otra»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al multiplicar potencias de la **misma base**, los
    exponentes se **suman**: $x^m \cdot x^n = x^{m+n}$.'
errores_frecuentes:
- Multiplicar los exponentes en lugar de sumarlos (ej. $x^3 \cdot x^4 = x^{12}$). Eso es elevar una potencia
  a otra.
- Aplicar la regla a bases distintas (ej. creer que $x^3 \cdot y^2 = xy^5$).
- 'Al multiplicar potencias de igual base, se multiplican los exponentes: $x^{5 \cdot 3}=x^{15}$.'
- 'Los exponentes se restan: $x^{5-3}=x^2$.'
- 'Los exponentes no cambian: el resultado es $x^5$.'
fuente: Álgebra de Baldor.
estado: publicado
