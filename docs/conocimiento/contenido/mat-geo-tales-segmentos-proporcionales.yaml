semantic_id: MAT.GEO.TEOREMA_TALES.SEGMENTOS_PROPORCIONALES
titulo: Identificación de segmentos proporcionales determinados por paralelas y transversales
objetivo: Identificar correctamente cuáles segmentos son proporcionales entre sí en una configuración
  de rectas paralelas cortadas por transversales.
introduccion: Antes de poder calcular longitudes desconocidas usando el teorema de Tales, es fundamental
  saber identificar con precisión qué segmentos corresponden entre sí y forman la proporción correcta.
resumen: Los segmentos proporcionales por Tales son aquellos formados entre las mismas dos rectas paralelas
  consecutivas, uno en cada transversal.
explicacion: '![Segmentos proporcionales por Tales](/static/img/geometria/congruencia-semejanza/tales-segmentos-proporcionales.svg)


  ### Definición formal


  Si las paralelas $L_1$, $L_2$, $L_3$ cortan a las transversales en A, B, C y A'', B'', C'' respectivamente,
  el segmento AB (entre $L_1$ y $L_2$) es proporcional a A''B'' (entre las mismas dos paralelas), y BC
  es proporcional a B''C''.


  ### Desarrollo didáctico


  El error más común en este tema es identificar mal la correspondencia: por ejemplo, comparar AB con
  B''C'' en vez de con A''B''. Siempre se debe verificar que ambos segmentos estén delimitados por el
  mismo par de rectas paralelas.'
procedimiento:
- 'Paso 1: Identifica las dos rectas paralelas que delimitan el segmento en la primera transversal.'
- 'Paso 2: Busca el segmento delimitado por esas mismas dos paralelas en la segunda transversal.'
- 'Paso 3: Esos dos segmentos son los proporcionales entre sí.'
ejemplos:
- titulo: Identificar el segmento correspondiente a AB
  enunciado: En una configuración de Tales, AB está entre las paralelas L1 y L2.
  solucion_pasos:
  - El segmento proporcional en la otra transversal es A'B', también entre L1 y L2.
- titulo: Detectar una correspondencia incorrecta
  enunciado: ¿Es correcto comparar AB con B'C'?
  solucion_pasos:
  - No, porque AB está entre L1-L2 y B'C' está entre L2-L3; no son el mismo par de paralelas.
- titulo: ¿Los segmentos proporcionales deben estar entre las mismas paralelas?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la condición esencial para que sean correspondientes.
- titulo: ¿Puede haber más de un par de segmentos proporcionales en una misma configuración?
  respuesta: Sí
  solucion_pasos:
  - Sí, con tres paralelas hay dos pares (AB con A'B', y BC con B'C').
errores_frecuentes:
- Comparar segmentos que no están delimitados por el mismo par de paralelas.
- Confundir el orden de los puntos al identificar un segmento (por ejemplo, BA en vez de AB).
- Asumir que cualquier par de segmentos de las dos transversales es proporcional, sin verificar las paralelas
  involucradas.
fuente: 'Fuente: Cid 106.'
estado: publicado
