semantic_id: MAT.ALG.FACTOR_CUADRADOS.FACTORIZACION_TRINOMIO_CUADRADO
titulo: Trinomio Cuadrado Perfecto
objetivo: Identificar y factorizar trinomios que resultan de elevar un binomio al cuadrado (Cuadrado de Binomio).
introduccion: A veces nos topamos con trinomios que parecen hijos únicos, pero en realidad provienen de gemelos
  exactos multiplicándose. Son el resultado directo del Cuadrado de un Binomio. Saber reconocerlos te ahorrará el
  camino largo.
resumen: 'Un Trinomio Cuadrado Perfecto (TCP) tiene la forma $a^2 \pm 2ab + b^2$. Se factoriza compactándolo en
  un binomio al cuadrado: $(a \pm b)^2$.'
explicacion: "### Definición formal\n\nEsa es la regla de oro que define al Cuadrado de Binomio (a^2 + 2ab + b^2).\n\
  \n### Desarrollo didáctico\n\nEl Cuadrado de Binomio nos enseñó que $(a + b)^2 = a^2 + 2ab + b^2$.\nPara ir en\
  \ reversa (factorizar), debemos someter a nuestro trinomio a un 'Control de Calidad' de tres pasos.\n\nPrueba\
  \ con $4x^2 + 12x + 9$:\n1. ¿El primer y último término son positivos y tienen raíz cuadrada exacta?\n   Sí. Raíz\
  \ de $4x^2$ es $2x$. Raíz de $9$ es $3$.\n2. ¿El término del medio es EXACTAMENTE el doble del producto de estas\
  \ raíces?\n   Calculemos: $2 \\cdot (2x) \\cdot (3) = 12x$. Sí. Coincide perfectamente con el centro del trinomio.\n\
  \nDado que pasó el control de calidad, es un TCP oficial.\nTomamos ambas raíces ($2x$ y $3$), les ponemos el signo\
  \ del término central ($+$), las encerramos en un paréntesis y elevamos al cuadrado: $(2x + 3)^2$."
procedimiento:
- 'Paso 1: Ordena el trinomio de mayor a menor exponente.'
- 'Paso 2: Verifica que los extremos sean positivos y tengan raíz cuadrada exacta. Extráelas.'
- 'Paso 3: Multiplica esas dos raíces por 2. Si el resultado es igual a la magnitud del término central, es un TCP.'
- 'Paso 4: Escribe un paréntesis que contenga ambas raíces separadas por el signo del término central original.
  Cierra y eleva al cuadrado (o multiplica el paréntesis por sí mismo).'
ejemplos:
- titulo: Factoriza $m^2 - 10m + 25$
  enunciado: Factoriza $m^2 - 10m + 25$.
  solucion_pasos:
  - 'Raíz del primero: $m$. Raíz del tercero: $5$.'
  - 'Doble producto: $2 * m * 5 = 10m$. (Cumple el control de calidad).'
  - Signo del medio es negativo (-).
  - 'Resultado: $(m - 5)^2$.'
- titulo: Evalúa si $x^2 + 7x + 49$ es un TCP.
  solucion_pasos:
  - La raíz de 49 es 7. La raíz de $x^2$ es $x$. El doble producto sería $14x$, pero el centro tiene $7x$.
- titulo: 'Respecto de «Factorización del trinomio cuadrado perfecto»: ¿La siguiente formulación es cor'
  enunciado: 'Respecto de «Factorización del trinomio cuadrado perfecto»: ¿La siguiente formulación es correcta?
    «Un Trinomio Cuadrado Perfecto (TCP) tiene la forma $a^2 \pm 2ab + b^2$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un Trinomio Cuadrado Perfecto (TCP) tiene la forma $a^2 \pm
    2ab + b^2$.'
- titulo: 'Respecto de «Factorización del trinomio cuadrado perfecto»: ¿La siguiente conclusión es corr'
  enunciado: 'Respecto de «Factorización del trinomio cuadrado perfecto»: ¿La siguiente conclusión es correcta?
    «Olvidar comprobar el término central (el ''control de calidad'') y asumir ciegamente que es TCP solo por ver
    dos cuadrados a los extremos»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un Trinomio Cuadrado Perfecto (TCP) tiene la forma $a^2 \pm
    2ab + b^2$.'
errores_frecuentes:
- Olvidar comprobar el término central (el 'control de calidad') y asumir ciegamente que es TCP solo por ver dos
  cuadrados a los extremos.
- Intentar aplicar la regla si el tercer término es negativo (ej. $x^2 + 2x - 1$). Un cuadrado nunca es negativo
  en los Reales.
- Tres términos cualquiera.
- Extremos cuadrados perfectos y centro igual al producto de las raíces.
- Todos los términos positivos.
