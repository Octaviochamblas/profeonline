semantic_id: MAT.ALG.FUNC_CUADR_TRANSFORMACIONES.SIGNO_TRASLACION_HORIZONTAL
titulo: Interpretación del signo de h en la traslación horizontal
objetivo: Interpretar correctamente el signo de $h$ en $(x-h)^2$ para determinar la dirección de la traslación
  horizontal.
introduccion: El signo de $h$ es la fuente más común de confusión al trabajar con traslaciones horizontales,
  porque su efecto es "contraintuitivo" a primera vista.
resumen: En $g(x)=(x-h)^2$, si $h>0$ la parábola se traslada hacia la **derecha**; si $h<0$, se traslada
  hacia la **izquierda**; el efecto es opuesto al signo que aparece dentro del paréntesis.
explicacion: '### Definición formal


  Dada $g(x)=(x-h)^2$: para $h>0$, la gráfica de $f(x)=x^2$ se desplaza $h$ unidades a la derecha; para
  $h<0$, se desplaza $|h|$ unidades a la izquierda. Es fundamental identificar $h$ reescribiendo el binomio
  en la forma $(x-h)$, no leyendo directamente el signo que aparece en la expresión.


  ### Desarrollo didáctico


  El punto clave es que $(x+3)$ debe reescribirse como $(x-(-3))$ para identificar $h=-3$; el signo "+"
  dentro del paréntesis corresponde a una traslación hacia la **izquierda**, no hacia la derecha como
  podría parecer intuitivamente.


  Para $g(x)=(x+2)^2$: reescribiendo, $h=-2$, por lo que la parábola se traslada $2$ unidades hacia la
  izquierda, no hacia la derecha.'
procedimiento:
- 'Paso 1: Reescribe el binomio en la forma exacta $(x-h)$.'
- 'Paso 2: Si $h>0$, concluye que la traslación es hacia la derecha.'
- 'Paso 3: Si $h<0$, concluye que la traslación es hacia la izquierda.'
ejemplos:
- titulo: Interpretación con signo positivo dentro del paréntesis
  enunciado: ¿Hacia dónde se traslada la parábola $g(x)=(x+7)^2$ respecto a $f(x)=x^2$?
  solucion_pasos:
  - Reescribiendo, $(x+7)=(x-(-7))$, por lo que $h=-7$.
  - Se traslada $7$ unidades hacia la izquierda.
- titulo: Interpretación con signo negativo dentro del paréntesis
  enunciado: ¿Hacia dónde se traslada la parábola $g(x)=(x-9)^2$ respecto a $f(x)=x^2$?
  solucion_pasos:
  - El binomio ya tiene la forma $(x-h)$ con $h=9$.
  - Se traslada $9$ unidades hacia la derecha.
- titulo: ¿Un signo "+" dentro del paréntesis siempre corresponde a una traslación hacia la izquierda?
  enunciado: ¿Un signo "+" dentro del paréntesis siempre corresponde a una traslación hacia la izquierda?
  respuesta: Sí
  solucion_pasos:
  - $(x+k)$ con $k>0$ equivale a $(x-(-k))$, por lo que $h=-k<0$, correspondiente a una traslación hacia
    la izquierda.
- titulo: ¿El signo dentro del paréntesis se lee directamente igual al signo de $h$?
  enunciado: ¿El signo dentro del paréntesis se lee directamente igual al signo de $h$?
  respuesta: 'No'
  solucion_pasos:
  - Se debe reescribir el binomio como $(x-h)$ antes de leer correctamente el signo de $h$.
errores_frecuentes:
- Interpretar $(x+3)$ como traslación hacia la derecha por el signo "+" visible, sin reescribir correctamente.
- Confundir "traslación hacia la derecha" con "traslación hacia la izquierda" al leer el signo de $h$.
- Aplicar la misma lógica de signos usada en la traslación vertical, que funciona de manera distinta.
- No verificar el signo de $h$ tras la reescritura antes de concluir la dirección de la traslación.
