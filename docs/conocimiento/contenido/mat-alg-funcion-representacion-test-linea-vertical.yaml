semantic_id: MAT.ALG.FUNCION_REPRESENTACION.TEST_LINEA_VERTICAL
titulo: Aplicación del criterio de la línea vertical para identificar funciones
objetivo: Aplicar el criterio de la línea vertical para determinar si una curva del plano representa una función.
introduccion: Sin necesidad de fórmulas, basta imaginar rectas verticales barriendo la curva de izquierda a derecha
  para saber si estás frente a una función.
resumen: El **criterio de la línea vertical** establece que una curva en el plano cartesiano representa una función
  si y solo si ninguna recta vertical la corta en más de un punto.
explicacion: '### Definición formal


  Sea $C$ una curva en el plano cartesiano. $C$ representa la gráfica de una función si y solo si para todo $a
  \in \mathbb{R}$, la recta vertical $x=a$ interseca a $C$ en a lo más un punto. Esta condición es equivalente
  geométrica de la unicidad de imagen exigida a las funciones.


  ### Desarrollo didáctico


  Cada recta vertical $x=a$ representa "todos los puntos posibles con abscisa $a$". Si la curva tiene dos puntos
  con la misma abscisa, esa recta corta la curva dos veces, lo que significa que $a$ tendría dos imágenes distintas:
  viola la unicidad.


  Una circunferencia falla el criterio (rectas verticales cerca del centro la cortan dos veces), mientras que
  una recta no vertical, una parábola con eje vertical, o cualquier curva "que suba y baje sin duplicarse en x"
  lo cumple.'
procedimiento:
- 'Paso 1: Imagina o traza rectas verticales a lo largo de todo el dominio visible de la curva.'
- 'Paso 2: Cuenta cuántas veces cada recta vertical corta la curva.'
- 'Paso 3: Si alguna recta corta la curva en más de un punto, la curva no representa una función.'
- 'Paso 4: Si toda recta vertical corta la curva en a lo más un punto, la curva sí representa una función.'
ejemplos:
- titulo: Aplicación a una parábola horizontal
  enunciado: Aplica el criterio de la línea vertical a la curva $x = y^2$.
  solucion_pasos:
  - Para $x=4$, tanto $y=2$ como $y=-2$ satisfacen la ecuación.
  - Una recta vertical en $x=4$ corta la curva en dos puntos.
  - No representa una función.
- titulo: Aplicación a una recta oblicua
  enunciado: Aplica el criterio de la línea vertical a la recta $y = 3x - 1$.
  solucion_pasos:
  - Cualquier recta vertical $x=a$ corta a esta recta en exactamente un punto.
  - Representa una función.
- titulo: ¿Una recta horizontal cumple el criterio de la línea vertical?
  enunciado: ¿Una recta horizontal cumple el criterio de la línea vertical?
  respuesta: Sí
  solucion_pasos:
  - Cada recta vertical corta a una recta horizontal en exactamente un punto, por lo que sí representa una función
    (constante).
- titulo: ¿Una recta vertical $x=k$ cumple el criterio de la línea vertical?
  enunciado: ¿Una recta vertical $x=k$ cumple el criterio de la línea vertical?
  respuesta: 'No'
  solucion_pasos:
  - La misma recta vertical $x=k$ coincide con la curva, "cortándola" en infinitos puntos; no representa una función.
errores_frecuentes:
- Aplicar el criterio con líneas horizontales en vez de verticales.
- Concluir que una curva es función revisando solo unas pocas rectas verticales, sin considerar todo el dominio.
- Confundir el criterio de la línea vertical (para funciones) con el de la línea horizontal (para inyectividad).
- Aplicar el criterio a un conjunto de puntos aislados sin considerar que cada punto ya define su propia recta
  vertical.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
