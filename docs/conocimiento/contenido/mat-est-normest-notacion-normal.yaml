semantic_id: MAT.EST.NORMAL_ESTANDAR.NOTACION_NORMAL
titulo: Identificar la notación de una distribución normal
objetivo: Identificar la notación $N(\mu,\sigma)$ usada para describir una distribución normal con sus dos parámetros.
introduccion: Cuando ves algo como $N(170, 8)$, en realidad te están diciendo todo lo necesario para dibujar esa curva
  normal específica, dónde está centrada y qué tan ancha es.
resumen: Una distribución normal se identifica con la notación $N(\mu,\sigma)$, donde $\mu$ es la media y $\sigma$ es
  la desviación estándar de esa distribución particular.
explicacion: '![Notación de la distribución normal](/static/img/estadistica/normest/normest-notacion-normal.svg)


  ### Definición formal


  La notación $X\sim N(\mu,\sigma)$ indica que la variable $X$ sigue una distribución normal con media $\mu$ y

  desviación estándar $\sigma$.


  ### Desarrollo didáctico


  Con solo estos dos parámetros queda completamente determinada la forma, el centro y la dispersión de toda la curva

  normal correspondiente.'
procedimiento:
- 'Paso 1: Identifica el primer valor dentro del paréntesis como la media $\mu$.'
- 'Paso 2: Identifica el segundo valor dentro del paréntesis como la desviación estándar $\sigma$.'
- 'Paso 3: Interpreta $N(\mu,\sigma)$ como la distribución normal con esos dos parámetros.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si una variable sigue $N(170, 8)$, ¿cuáles son su media y su desviación estándar?
  solucion_pasos:
  - Su media es $\mu=170$.
  - Su desviación estándar es $\sigma=8$.
- titulo: Ejemplo 2
  enunciado: ¿Qué información entrega completamente la notación $N(\mu,\sigma)$?
  solucion_pasos:
  - Entrega el centro (media) y la dispersión (desviación estándar) de la curva normal.
- titulo: ¿La notación $N(\mu,\sigma)$ incluye tanto la media como la desviación estándar?
  respuesta: Sí
  solucion_pasos:
  - Sí, son los dos parámetros que definen completamente la distribución.
- titulo: ¿La notación $N(\mu,\sigma)$ representa una distribución discreta?
  respuesta: 'No'
  solucion_pasos:
  - 'No, representa una distribución continua, la distribución normal.'
errores_frecuentes:
- Invertir el orden de los parámetros, confundiendo $\mu$ con $\sigma$.
- Creer que la notación $N(\mu,\sigma)$ representa una variable discreta.
- Pensar que se necesitan más de dos parámetros para definir una distribución normal.
- Confundir la notación con la de otras distribuciones de probabilidad.
- Olvidar que ambos parámetros deben corresponder a la misma variable.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
