- titulo: 'Respecto de «Interpretación geométrica del cuadrado de trinomio mediante área»: ¿Se puede ac'
  enunciado: 'Respecto de «Interpretación geométrica del cuadrado de trinomio mediante área»: ¿Se puede aceptar
    esta afirmación? «Pensar que un trinomio al cuadrado solo tiene 3 partes en su interior»'
  respuesta: 'No'
