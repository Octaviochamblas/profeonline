errores_frecuentes:
- Pensar que un trinomio al cuadrado solo tiene 3 partes en su interior.
- Para «Si visualizas $(a+b+c)^2$ como un cuadrado de área, los tres cuadrados perfectos $a^2, b^2, c^2$ se ubican
  geométricamente:», la respuesta correcta es Todos en una misma esquina.
- Formando un triángulo central.
- Para «Si visualizas $(a+b+c)^2$ como un cuadrado de área, los tres cuadrados perfectos $a^2, b^2, c^2$ se ubican
  geométricamente:», la respuesta correcta es Repartidos en las 4 esquinas.
- La afirmación «A lo largo de la diagonal principal del cuadrado grande» no es válida en este contenido.
