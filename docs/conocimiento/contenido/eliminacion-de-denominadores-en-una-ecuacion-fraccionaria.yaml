semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.ELIMINACION_DENOMINADORES
titulo: Eliminación de denominadores en una ecuación fraccionaria
objetivo: Ejecutar correctamente el paso de multiplicación por el MCM para aplanar la ecuación.
introduccion: El MCM debe visitar a **cada término** de la ecuación (cada término, incluso los que no
  tienen fracción).
resumen: 'Este es el momento de la verdad, y donde la mayoría comete el error frecuente. Tienes tu MCM
  (ej: $x(x-2)$) y vas a multiplicar a la ecuación: $\frac{3}{x} + \frac{1}{x-2} = 2$.'
explicacion: '### Definición formal


  Multiplicar una ecuación fraccionaria por su MCM algebraico $M$ transforma cada término $\frac{p_i(x)}{q_i(x)}$
  en $\frac{M}{q_i(x)}p_i(x)$, una expresión polinomial pues $q_i(x)$ divide exactamente a $M$; el paso
  debe aplicarse a todos los términos de la ecuación, incluidos los que no tienen denominador explícito.


  ### Desarrollo didáctico


  El MCM debe visitar a **cada término** de la ecuación (cada término, incluso los que no tienen fracción).

  - Al visitar $\frac{3}{x}$, la ''x'' se cancela y queda $3(x-2)$.

  - Al visitar $\frac{1}{x-2}$, el $(x-2)$ se cancela y queda $1(x)$.

  - Al visitar el 2 (no lo olvides.), no se cancela nada, queda $2x(x-2)$.


  La ecuación plana resultante es: $3(x-2) + x = 2x(x-2)$. Todo el peligro de dividir ha desaparecido.'
procedimiento:
- Escribe el MCM al lado de cada término (fracción o número entero).
- Simplifica el denominador de la fracción tachándolo con su parte correspondiente en el MCM.
- Multiplica lo que sobrevivió del MCM por el numerador.
- Mantén los paréntesis al reescribir la nueva ecuación aplanada.
