errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Obtén tu solución numérica tras resolver la ecuación
  plana».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Revísala contra la ''lista de restricciones del
  dominio'' de restricciones que calculaste al principio».'
- La definición sigue cumpliéndose aunque no se considere que a veces, la matemática te juega una broma. Realizas
  todos los pasos perfectos para resolver una ecuación fraccionaria, aplanas los denominadores, resuelves, y obtienes
  $x=5$.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Si no coincide, es una solución válida».
- La comprobación del resultado vuelve innecesaria la condición «Obtén tu solución numérica tras resolver la ecuación
