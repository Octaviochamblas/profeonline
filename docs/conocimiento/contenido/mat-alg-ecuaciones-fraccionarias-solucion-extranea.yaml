semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.SOLUCION_EXTRANEA
titulo: Soluciones Extrañas (Espurias)
objetivo: Reconocer cuándo un resultado matemático obtenido no es una solución real.
introduccion: Pero resulta que al principio del problema, tú habías anotado que la restricción era $x \neq 5$.
resumen: A veces, la matemática te juega una broma. Realizas todos los pasos perfectos para resolver una ecuación
  fraccionaria, aplanas los denominadores, resuelves, y obtienes $x=5$.
explicacion: '### Definición formal


  A veces, la matemática te juega una broma. Realizas todos los pasos perfectos para resolver una ecuación fraccionaria,
  aplanas los denominadores, resuelves, y obtienes $x=5$.


  ### Desarrollo didáctico


  Pero resulta que al principio del problema, tú habías anotado que la restricción era $x \neq 5$.


  Ese resultado $x=5$ se llama **solución extraña** o espuria. Se generó como un efecto secundario al multiplicar
  toda la ecuación por polinomios (el MCM) que escondían un cero. Es como un espejismo. La solución no sirve. Si
  era la única que obtuviste, la respuesta final es: **No hay solución** (Conjunto Vacío).'
procedimiento:
- Obtén tu solución numérica tras resolver la ecuación plana.
- Revísala contra la 'lista de restricciones del dominio' de restricciones que calculaste al principio.
- Si coincide con una restricción, declárala como solución extraña y descártala.
- Si no coincide, es una solución válida.
