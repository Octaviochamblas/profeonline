semantic_id: 'MAT.ALG.ECUACIONES_FRACCIONARIAS.SOLUCION_EXTRANEA'
titulo: 'Soluciones Extrañas (Espurias)'
objetivo: 'Reconocer cuándo un resultado matemático obtenido no es una solución real.'
introduccion: |
  A veces, la matemática te juega una paradoja. Realizas todos los pasos perfectos para resolver una ecuación fraccionaria, aplanas los denominadores, resuelves, y obtienes $x=5$.
resumen: |
  Ese resultado $x=5$ se llama **solución extraña** o espuria. Se generó como un efecto secundario al multiplicar toda la ecuación por polinomios (el MCM) que escondían un cero. Es como un valor espurio. La solución no sirve. Si era la única que obtuviste, la respuesta final es: **No hay solución** (Conjunto Vacío).
explicacion: |
  Pero resulta que al principio del problema, tú habías anotado que la restricción era $x \neq 5$.
procedimiento:
  - 'Paso 1: Obtén tu solución numérica tras resolver la ecuación plana.'
  - 'Paso 2: Revísala contra la ''Lista Negra'' de restricciones que calculaste al principio.'
  - 'Paso 3: Si coincide con una restricción, declárala como solución extraña y descártala.'
  - 'Paso 4: Si no coincide, es una solución válida.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
