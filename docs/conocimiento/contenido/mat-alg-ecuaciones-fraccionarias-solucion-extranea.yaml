semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.SOLUCION_EXTRANEA
titulo: Soluciones Extrañas (Espurias)
objetivo: Reconocer cuándo un resultado matemático obtenido no es una solución real.
explicacion: |
  A veces, la matemática te juega una broma. Realizas todos los pasos perfectos para resolver una ecuación fraccionaria, aplanas los denominadores, resuelves, y obtienes $x=5$.

  Pero resulta que al principio del problema, tú habías anotado que la restricción era $x \neq 5$.

  Ese resultado $x=5$ se llama **solución extraña** o espuria. Se generó como un efecto secundario al multiplicar toda la ecuación por polinomios (el MCM) que escondían un cero. Es como un espejismo. La solución no sirve. Si era la única que obtuviste, la respuesta final es: **No hay solución** (Conjunto Vacío).
procedimiento: |
  1. Obtén tu solución numérica tras resolver la ecuación plana.
  2. Revísala contra la 'Lista Negra' de restricciones que calculaste al principio.
  3. Si coincide con una restricción, declárala como solución extraña y descártala.
  4. Si no coincide, es una solución válida.
