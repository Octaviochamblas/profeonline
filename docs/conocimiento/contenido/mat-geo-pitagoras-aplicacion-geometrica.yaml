semantic_id: MAT.GEO.PITAGORAS.APLICACION_GEOMETRICA
titulo: Aplicación del teorema de Pitágoras para calcular diagonales y distancias en figuras geométricas
objetivo: Aplicar el teorema de Pitágoras para calcular diagonales de rectángulos y distancias entre puntos
  en distintas figuras.
introduccion: 'El teorema de Pitágoras no se limita a triángulos aislados: cualquier figura que contenga
  (o pueda dividirse en) un triángulo rectángulo puede aprovecharlo para calcular diagonales o distancias.'
resumen: El teorema de Pitágoras permite calcular la diagonal de un rectángulo, tratándola como la hipotenusa
  de un triángulo rectángulo formado por dos lados del rectángulo.
explicacion: '![Aplicación geométrica: diagonal de un rectángulo](/static/img/geometria/areas-pitagoras/pitagoras-aplicacion-geometrica.svg)


  ### Definición formal


  En un rectángulo de lados $a$ y $b$, la diagonal $d$ cumple $d^2=a^2+b^2$, ya que la diagonal, junto
  con dos lados consecutivos, forma un triángulo rectángulo.


  ### Desarrollo didáctico


  Un rectángulo de lados 6 y 8 tiene diagonal $d=\sqrt{6^2+8^2}=\sqrt{36+64}=\sqrt{100}=10$, aplicando
  exactamente la misma terna pitagórica 6-8-10.'
procedimiento:
- 'Paso 1: Identifica el triángulo rectángulo formado dentro de la figura (por ejemplo, dos lados de un
  rectángulo y su diagonal).'
- 'Paso 2: Aplica el teorema de Pitágoras a ese triángulo rectángulo.'
- 'Paso 3: Despeja el lado o distancia que se busca (diagonal, distancia entre puntos, etc.).'
ejemplos:
- titulo: Calcular la diagonal de un rectángulo
  enunciado: Un rectángulo tiene lados 9 y 12.
  solucion_pasos:
  - Su diagonal es d=√(9²+12²)=√(81+144)=√225=15.
- titulo: Calcular la diagonal de un cuadrado
  enunciado: Un cuadrado tiene lado 7.
  solucion_pasos:
  - Su diagonal es d=√(7²+7²)=√98=7√2.
- titulo: ¿La diagonal de un rectángulo actúa como hipotenusa de un triángulo rectángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, ese triángulo se forma con dos lados consecutivos del rectángulo.
- titulo: ¿Esta aplicación se limita solo a rectángulos?
  respuesta: 'No'
  solucion_pasos:
  - No, se puede aplicar a cualquier figura donde se pueda identificar un triángulo rectángulo, como cubos
    o distancias en el plano cartesiano.
errores_frecuentes:
- Usar un lado del rectángulo en vez de la diagonal como si fuera la hipotenusa.
- Olvidar que se necesitan dos lados (no uno) para calcular la diagonal.
- Confundir esta aplicación con el cálculo del perímetro o del área del rectángulo.
fuente: Elaboración propia.
estado: publicado
