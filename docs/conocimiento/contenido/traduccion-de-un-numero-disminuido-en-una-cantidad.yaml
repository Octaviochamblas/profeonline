semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.NUMERO_DISMINUIDO
titulo: Traducción de un número disminuido en una cantidad
objetivo: Traducir expresiones donde una cantidad se ve reducida en un valor específico.
introduccion: Si a un estanque de agua se le hace un agujero, la cantidad de agua disminuye. Al igual
  que el concepto de 'aumentado', el álgebra tiene una traducción directa para cuando perdemos cantidad.
resumen: Un **Número Disminuido** se traduce tomando la variable inicial y aplicándole una sustracción
  ($-$) con la cantidad que se pierde o disminuye.
explicacion: '### Definición formal


  Como es la variable la que sufre la disminución, ella va primero ($x - k$).


  ### Desarrollo didáctico


  Palabras clave:

  - Disminuido en

  - Reducido en

  - Rebajado en


  Ejemplos:

  - ''Un número disminuido en quince'': $x - 15$

  - ''El precio de la camisa reducido en un descuento desconocido'': $P - d$

  - ''Diez disminuido en un número'': $10 - x$


  Nuevamente, el orden es ley. Si la oración dice ''un número disminuido en siete'', el número es el que
  sufre la pérdida, por lo tanto él va primero: $x - 7$.'
procedimiento:
- 'Paso 1: Identifica el objeto principal de la oración que va a sufrir la pérdida.'
- 'Paso 2: Escribe la letra que lo representa.'
- 'Paso 3: Escribe el signo de resta (-).'
- 'Paso 4: Escribe la cantidad de reducción a la derecha del signo menos.'
ejemplos:
- titulo: Pérdida de peso
  enunciado: 'Traduce algebraicamente: ''El peso de un paciente disminuido en 5 kilogramos''.'
  solucion_pasos:
  - 'El sujeto principal es el peso del paciente: P.'
  - 'Sufre una reducción: -.'
  - 'La reducción es de 5 kg: 5.'
  - 'Traducción completa: P - 5.'
- titulo: 'Un programador lee las reglas de negocio de una tienda: ''Si el cliente tiene código premium'
  enunciado: 'Un programador lee las reglas de negocio de una tienda: ''Si el cliente tiene código premium,
    el costo de despacho (representado por $D$) debe ser disminuido en su totalidad''. ¿Cuál es la representación
    matemática del nuevo costo de despacho para el cliente premium? (v1)


    Opciones: A) $D - D = 0$ · B) $D - 1$ · C) $D / D = 1$ · D) $0 - D$'
  solucion_pasos:
  - El valor inicial es D. Se le disminuye 'su totalidad', es decir, se le disminuye D. La expresión es
    $D - D$, lo cual resulta en un costo de despacho igual a 0.
  - 'Respuesta: $D - D = 0$'
- titulo: 'Respecto de «Traducción de un número disminuido en una cantidad»: ¿Es correcta esta caracter'
  enunciado: 'Respecto de «Traducción de un número disminuido en una cantidad»: ¿Es correcta esta caracterización?
    «Un **Número Disminuido** se traduce tomando la variable inicial y aplicándole una sustracción ($-$)
    con la cantidad que se pierde o disminuye»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un **Número Disminuido** se traduce tomando la variable
    inicial y aplicándole una sustracción ($-$) con la cantidad que se pierde o disminuye.'
- titulo: 'Respecto de «Traducción de un número disminuido en una cantidad»: ¿Es válida esta afirmación'
  enunciado: 'Respecto de «Traducción de un número disminuido en una cantidad»: ¿Es válida esta afirmación?
    «Escribir la constante primero por inercia cuando se lee rápido. (Ej: ''un número disminuido en 8''
    traducido como $8 - x$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un **Número Disminuido** se traduce tomando la variable
    inicial y aplicándole una sustracción ($-$) con la cantidad que se pierde o disminuye.'
errores_frecuentes:
- 'Escribir la constante primero por inercia cuando se lee rápido. (Ej: ''un número disminuido en 8''
  traducido como $8 - x$).'
- 'Confundir ''disminuido en'' con ''disminuido a''. (Ej: ''El precio rebajado a la mitad'' es una división
  $\frac{x}{2}$, pero ''el precio rebajado en la mitad'' es una resta $x - \frac{x}{2}$).'
- Una división entre la constante y la variable.
- Para «Al traducir el enunciado verbal 'una variable disminuida en una constante', ¿qué estructura matemática
  lineal se debe construir? (v1)», la respuesta correcta es Un binomio de resta donde la constante va
  a la izquierda y la variable a la derecha.
- Una multiplicación con un signo negativo frente a la variable.
fuente: Álgebra de Baldor.
estado: publicado
