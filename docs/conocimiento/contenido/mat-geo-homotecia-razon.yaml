semantic_id: MAT.GEO.HOMOTECIA.RAZON
titulo: Identificación de la razón de homotecia
objetivo: Calcular la razón de una homotecia a partir de las distancias entre el centro y los puntos originales
  e imagen.
introduccion: Una vez identificado el centro de una homotecia, el siguiente dato esencial para caracterizarla
  completamente es su razón.
resumen: La razón de homotecia $k$ se calcula como el cociente entre la distancia del centro a un punto
  imagen y la distancia del centro al punto original correspondiente, con signo según la orientación.
explicacion: '![Identificación de la razón de homotecia](/static/img/geometria/congruencia-semejanza/homotecia-razon.svg)


  ### Definición formal


  Si $O$ es el centro de homotecia, $P$ un punto original y $P''$ su imagen, la razón es $k=\frac{\overline{OP''}}{\overline{OP}}$,
  considerando signo positivo si $P''$ está del mismo lado que $P$ respecto a $O$, y negativo si está
  del lado opuesto.


  ### Desarrollo didáctico


  Si un punto está a 4 cm del centro y su imagen está a 12 cm del centro, en el mismo sentido, la razón
  es $k=\frac{12}{4}=3$. Si la imagen estuviera al otro lado del centro, la razón sería $k=-3$.'
procedimiento:
- 'Paso 1: Mide (o calcula) la distancia del centro O al punto original P.'
- 'Paso 2: Mide la distancia del centro O al punto imagen P''.'
- 'Paso 3: Divide OP'' entre OP, asignando signo negativo si P y P'' están en lados opuestos de O.'
ejemplos:
- titulo: Calcular la razón con puntos del mismo lado
  enunciado: OP=4 cm, OP'=12 cm, ambos del mismo lado de O.
  solucion_pasos:
  - k=12/4=3.
- titulo: Calcular la razón con puntos en lados opuestos
  enunciado: OP=5 cm, OP'=5 cm, pero en lados opuestos de O.
  solucion_pasos:
  - k=-5/5=-1 (una simetría central).
- titulo: ¿La razón puede ser negativa?
  respuesta: Sí
  solucion_pasos:
  - Sí, cuando el punto imagen queda del lado opuesto del centro respecto al punto original.
- titulo: ¿Es posible que la razón sea 0?
  respuesta: 'No'
  solucion_pasos:
  - No, una razón 0 colapsaría todos los puntos en el centro, lo cual no define una homotecia válida.
errores_frecuentes:
- Olvidar el signo de la razón, ignorando si los puntos quedan en el mismo lado o en lados opuestos del
  centro.
- Invertir el cociente, calculando OP/OP' en vez de OP'/OP.
- Confundir la razón de homotecia con la distancia misma, sin calcular el cociente.
fuente: 'Fuente: Moraleja 154, Cid 119.'
estado: publicado
