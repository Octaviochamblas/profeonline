semantic_id: MAT.ALG.FUNC_CUADR_GRAFICA.CONCAVIDAD_SIGNO_A
titulo: Análisis de la concavidad de la parábola según el signo de a
objetivo: Determinar la concavidad (orientación) de una parábola a partir del signo del coeficiente cuadrático
  $a$.
introduccion: Sin necesidad de graficar ni calcular ningún punto, el simple signo del coeficiente $a$
  ya revela si la parábola abre "como una copa" o "como un paraguas".
resumen: Si $a>0$, la parábola es **cóncava hacia arriba** (abre hacia arriba, forma de "U"); si $a<0$,
  es **cóncava hacia abajo** (abre hacia abajo, forma de "U" invertida).
explicacion: '### Definición formal


  Dada $f(x)=ax^2+bx+c$: si $a>0$, la función tiene un mínimo global en su vértice y su gráfica es cóncava
  hacia arriba; si $a<0$, la función tiene un máximo global en su vértice y su gráfica es cóncava hacia
  abajo.


  ### Desarrollo didáctico


  Basta con leer el signo del coeficiente $a$, sin necesidad de más información, para anticipar la orientación
  general de la parábola antes de graficarla.


  Para $f(x)=3x^2-2x+1$, con $a=3>0$: la parábola es cóncava hacia arriba. Para $g(x)=-5x^2+x$, con $a=-5<0$:
  la parábola es cóncava hacia abajo.'
procedimiento:
- 'Paso 1: Identifica el coeficiente $a$ de la función.'
- 'Paso 2: Si $a>0$, concluye que la parábola es cóncava hacia arriba (abre hacia arriba).'
- 'Paso 3: Si $a<0$, concluye que la parábola es cóncava hacia abajo (abre hacia abajo).'
ejemplos:
- titulo: Determinación de concavidad hacia arriba
  enunciado: ¿Cuál es la concavidad de $f(x)=4x^2-7x+2$?
  solucion_pasos:
  - $a=4>0$.
  - La parábola es cóncava hacia arriba.
- titulo: Determinación de concavidad hacia abajo
  enunciado: ¿Cuál es la concavidad de $f(x)=-x^2+3x$?
  solucion_pasos:
  - $a=-1<0$.
  - La parábola es cóncava hacia abajo.
- titulo: ¿El signo de $b$ o $c$ afecta la concavidad de la parábola?
  enunciado: ¿El signo de $b$ o $c$ afecta la concavidad de la parábola?
  respuesta: 'No'
  solucion_pasos:
  - La concavidad depende exclusivamente del signo del coeficiente $a$, no de $b$ ni de $c$.
- titulo: ¿Una parábola cóncava hacia arriba tiene un valor máximo?
  enunciado: ¿Una parábola cóncava hacia arriba tiene un valor máximo?
  respuesta: 'No'
  solucion_pasos:
  - Una parábola cóncava hacia arriba tiene un valor mínimo (en su vértice), pero no un valor máximo,
    ya que crece indefinidamente hacia ambos lados.
errores_frecuentes:
- Confundir la concavidad hacia arriba con hacia abajo, invirtiendo la interpretación del signo de $a$.
- Determinar la concavidad usando el signo de $b$ o $c$ en vez del signo de $a$.
- Asumir que $|a|$ (el valor absoluto) determina la concavidad, cuando en realidad solo importa el signo.
- Confundir "cóncava hacia arriba" con "creciente en todo su dominio", cuando en realidad decrece antes
  del vértice y crece después.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
