semantic_id: MAT.ALG.FUNDAMENTOS.CONCEPTO_CONSTANTE
objetivo: Comprender la diferencia entre una variable y una constante en una expresión
  algebraica.
introduccion: En el teatro de las matemáticas, algunos actores cambian de disfraz
  en cada obra (las variables), pero otros siempre interpretan el mismo papel, pase
  lo que pase.
resumen: Una **Constante** es un valor fijo que no cambia bajo ninguna circunstancia
  dentro de un problema. Se representa habitualmente mediante números explícitos (ej.
  $5$, $-3$, $\pi$) o mediante las primeras letras del alfabeto ($a$, $b$, $c$) cuando
  generalizamos una fórmula.
explicacion: 'A diferencia de las variables (usualmente $x$, $y$, $z$) que están esperando
  que les asignes un valor, las constantes nacen con su valor definido.

  En la fórmula del perímetro de una circunferencia $P = 2 \cdot \pi \cdot r$:

  - El $2$ es una constante numérica. Jamás dejará de ser dos.

  - $\pi$ es una constante (aprox. 3.14159...).

  - La $r$ (radio) es la variable, porque puedes tener círculos grandes o pequeños.


  En la expresión genérica $ax^2 + bx + c$, por convención matemática, asumimos que
  $a, b, c$ son constantes (números fijos que rellenaremos luego) y la $x$ es la única
  variable que mutará.'
procedimiento:
- 'Paso 1: Identifica los números explícitos o constantes universales (como pi o e).'
- 'Paso 2: Según el contexto del problema, identifica letras de inicio del abecedario
  (a, b, k) que funcionen como parámetros fijos.'
- 'Paso 3: Distínguelas de las letras finales (x, y, z) o variables que cambian su
  valor dinámicamente.'
ejemplos:
- titulo: El elenco de la fórmula
  enunciado: En la fórmula física de la velocidad en caída libre v = g*t (donde g
    es la gravedad de la Tierra y t el tiempo), identifica la constante y la variable.
  solucion_pasos:
  - La gravedad de la Tierra 'g' no cambia, es un valor fijo (9.8 m/s^2). Es la constante.
  - El tiempo 't' fluye y cambia constantemente. Es la variable.
  - La velocidad 'v' cambia dependiendo de 't', por lo que también es variable.
errores_frecuentes:
- Creer que todas las letras son variables por el simple hecho de ser letras. A veces
  usamos letras para guardar números constantes.
- Confundir constante con coeficiente. El coeficiente es un tipo específico de constante
  que multiplica a una variable.
fuente: Álgebra de Baldor.
estado: publicado
