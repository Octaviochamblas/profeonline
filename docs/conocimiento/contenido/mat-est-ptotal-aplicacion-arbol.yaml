semantic_id: MAT.EST.PROBABILIDAD_TOTAL.APLICACION_ARBOL
titulo: Resolución de problemas de probabilidad total mediante diagrama de árbol
objetivo: Resolver un problema de probabilidad total representando la partición y las probabilidades condicionales
  mediante un diagrama de árbol.
introduccion: 'El diagrama de árbol ofrece una representación visual clara del teorema de la probabilidad
  total: cada rama del primer nivel es una parte de la partición, y la probabilidad total se obtiene sumando
  las rutas.'
resumen: Para resolver un problema de probabilidad total con un árbol, se construyen las ramas del primer
  nivel (partición) con sus probabilidades, las ramas del segundo nivel (evento condicionado) con las
  probabilidades condicionales, y se suman las probabilidades de las rutas que llevan al evento de interés.
explicacion: '![Resolución de probabilidad total mediante árbol](/static/img/probabilidad/ptotal/ptotal-aplicacion-arbol.svg)


  ### Definición formal


  Cada ruta completa del árbol representa $P(B_i)\times P(A|B_i)$; sumando todas las rutas que terminan
  en el evento $A$, se obtiene $P(A)$ por el teorema de la probabilidad total.


  ### Desarrollo didáctico


  Se elige al azar una de tres urnas (cada una con probabilidad 1/3), con proporciones de bolitas rojas
  0,5, 0,3 y 0,7 respectivamente. La probabilidad de sacar una bolita roja es $P(\text{roja})=(1/3)(0{,}5)+(1/3)(0{,}3)+(1/3)(0{,}7)=0{,}5$.'
procedimiento:
- 'Paso 1: Dibuja el primer nivel del árbol con las partes de la partición y sus probabilidades.'
- 'Paso 2: Dibuja el segundo nivel con las probabilidades condicionales del evento de interés para cada
  rama.'
- 'Paso 3: Multiplica cada ruta y suma todas las rutas que llevan al evento de interés para obtener la
  probabilidad total.'
ejemplos:
- titulo: Resolver con árbol el problema de las tres urnas
  enunciado: 3 urnas (1/3 cada una), proporciones de rojas 0,5, 0,3 y 0,7.
  solucion_pasos:
  - P(roja)=(1/3)(0,5)+(1/3)(0,3)+(1/3)(0,7)=(0,5+0,3+0,7)/3=0,5.
- titulo: Resolver con árbol un problema de dos máquinas
  enunciado: P(A)=0,6, P(B)=0,4, P(defectuosa|A)=0,05, P(defectuosa|B)=0,1.
  solucion_pasos:
  - P(defectuosa)=0,6×0,05+0,4×0,1=0,03+0,04=0,07, sumando ambas rutas del árbol.
- titulo: ¿El árbol facilita visualizar todas las rutas que se deben sumar?
  respuesta: Sí
  solucion_pasos:
  - Sí, es su principal ventaja como herramienta de representación.
- titulo: ¿El resultado obtenido con el árbol coincide con el de la fórmula algebraica?
  respuesta: Sí
  solucion_pasos:
  - Sí, son exactamente el mismo cálculo, solo representado de forma distinta.
errores_frecuentes:
- Olvidar dibujar o considerar alguna rama del primer nivel, omitiendo una parte de la partición.
- Confundir las probabilidades del primer nivel con las condicionales del segundo nivel al construir el
  árbol.
- No sumar todas las rutas relevantes que llevan al evento de interés al final del cálculo.
fuente: 'Elaboración propia (referencia: Moraleja 294).'
estado: publicado
