semantic_id: MAT.GEO.CIRCULO_RECTAS.POLIGONOS_CIRCUNSCRITOS_TANGENTES
titulo: Cálculo de perímetros en polígonos circunscritos usando segmentos tangentes congruentes
objetivo: Aplicar la propiedad de congruencia de tangentes para calcular perímetros de polígonos circunscritos
  a una circunferencia.
introduccion: La propiedad de tangentes congruentes desde un punto exterior tiene una aplicación muy práctica
  en polígonos cuyos lados son todos tangentes a una misma circunferencia.
resumen: Un polígono está circunscrito a una circunferencia cuando todos sus lados son tangentes a ella;
  en este caso, se puede usar la congruencia de segmentos tangentes para calcular su perímetro.
explicacion: '![Polígono circunscrito a una circunferencia](/static/img/geometria/circunferencia-circulo/circulo-poligonos-circunscritos.svg)


  ### Definición formal


  En un polígono circunscrito a una circunferencia, cada vértice tiene dos segmentos tangentes (hacia
  los dos lados que se encuentran en ese vértice) que son congruentes entre sí, gracias a la propiedad
  de tangentes desde un punto exterior.


  ### Desarrollo didáctico


  En un triángulo circunscrito con lados $a$, $b$, $c$, cada vértice genera un par de segmentos tangentes
  iguales; sumando todos los segmentos tangentes de los tres vértices se puede reconstruir el perímetro
  del triángulo de forma alternativa, útil en problemas donde se conocen los segmentos tangentes en vez
  de los lados completos.'
procedimiento:
- 'Paso 1: Identifica los puntos de tangencia en cada lado del polígono circunscrito.'
- 'Paso 2: En cada vértice, identifica los dos segmentos tangentes (iguales entre sí) que llegan a ese
  vértice.'
- 'Paso 3: Usa esas igualdades para plantear ecuaciones y calcular longitudes de lados o el perímetro
  total.'
ejemplos:
- titulo: Calcular el perímetro de un triángulo circunscrito con segmentos tangentes conocidos
  enunciado: Un triángulo circunscrito tiene segmentos tangentes de 4, 5 y 6 cm desde cada vértice (dos
    veces cada uno, uno por cada lado adyacente).
  solucion_pasos:
  - Perímetro=2×(4+5+6)=2×15=30 cm, ya que cada segmento tangente se cuenta dos veces (una por cada lado
    que toca).
- titulo: Relacionar segmentos tangentes con los lados del triángulo
  enunciado: Si los segmentos tangentes desde los vértices A, B, C son x, y, z respectivamente, ¿cómo
    se expresan los lados del triángulo?
  solucion_pasos:
  - 'Cada lado es la suma de los dos segmentos tangentes de sus vértices extremos: por ejemplo, el lado
    entre A y B mide x+y.'
- titulo: ¿Todos los polígonos pueden circunscribirse a una circunferencia?
  respuesta: 'No'
  solucion_pasos:
  - No, no todos los polígonos admiten una circunferencia inscrita tangente a todos sus lados; se requieren
    ciertas condiciones (por ejemplo, todo triángulo sí las cumple).
- titulo: ¿Esta propiedad simplifica el cálculo de perímetros?
  respuesta: Sí
  solucion_pasos:
  - Sí, permite calcular el perímetro a partir de los segmentos tangentes, sin necesidad de conocer directamente
    cada lado completo.
errores_frecuentes:
- Olvidar que cada segmento tangente se cuenta dos veces al calcular el perímetro completo (una vez por
  cada lado adyacente al vértice).
- Confundir los segmentos tangentes con los lados completos del polígono.
- Asumir que cualquier polígono puede circunscribirse a una circunferencia sin verificar esa condición.
fuente: Elaboración propia.
estado: publicado
