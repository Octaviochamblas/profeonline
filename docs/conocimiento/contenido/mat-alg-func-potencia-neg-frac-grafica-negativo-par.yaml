semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.GRAFICA_NEGATIVO_PAR
titulo: Gráfica de $f(x)=x^{-n}$ con $n$ par
objetivo: Describir la forma de la gráfica de $f(x)=a\cdot x^{-n}$ cuando $n$ es un entero positivo par.
introduccion: Cuando el exponente negativo es par, la función se comporta de forma simétrica respecto al eje $y$,
  pero con dos ramas separadas por una asíntota.
resumen: Cuando $n$ es par, la gráfica de $f(x)=a\cdot x^{-n}$ (con $a>0$) tiene **dos ramas positivas**, una a
  cada lado del eje $y$, que se acercan a las asíntotas $x=0$ e $y=0$.
explicacion: '### Definición formal


  Para $n$ par y $a>0$, $f(x)=a\cdot x^{-n}=\dfrac{a}{x^n}>0$ para todo $x\neq0$, ya que $x^n>0$. La curva tiene
  dos ramas simétricas respecto al eje $y$, ambas ubicadas por encima del eje $x$.


  ### Desarrollo didáctico


  $f(x)=x^{-2}$: para $x=1$, $f(1)=1$; para $x=-1$, $f(-1)=1$; para $x=2$, $f(2)=0{,}25$; para $x=-2$,
  $f(-2)=0{,}25$. Ambas ramas son idénticas por simetría, y se acercan a $0$ al alejarse del origen.'
procedimiento:
- 'Paso 1: Verifica que $n$ sea par y determina el signo de $a$.'
- 'Paso 2: Reconoce que la curva tendrá dos ramas simétricas respecto al eje $y$.'
- 'Paso 3: Calcula puntos en ambos lados para confirmar la simetría.'
ejemplos:
- titulo: Descripción de la gráfica de $x^{-2}$
  enunciado: 'Describe la forma de $f(x)=x^{-2}$.'
  solucion_pasos:
  - El exponente $-2$ tiene parte par ($n=2$), así que la curva tiene dos ramas simétricas.
  - Ambas ramas se ubican por encima del eje $x$, acercándose a las asíntotas.
- titulo: Verificación de simetría con exponente negativo par
  enunciado: 'Verifica que $f(1)=f(-1)$ para $f(x)=x^{-4}$.'
  solucion_pasos:
  - 'Se calcula $f(1)=1$ y $f(-1)=1$.'
  - Ambos valores coinciden, confirmando la simetría respecto al eje $y$.
- titulo: ¿Puede $f(x)=x^{-2}$ tomar valores negativos?
  enunciado: ¿Puede la función $f(x)=x^{-2}$ tomar algún valor negativo?
  respuesta: 'No'
  solucion_pasos:
  - Con exponente negativo par, el resultado siempre es positivo, ya que $x^2>0$ para $x\neq0$.
- titulo: ¿La gráfica de $f(x)=x^{-4}$ pasa por el origen?
  enunciado: ¿La gráfica de $f(x)=x^{-4}$ pasa por el punto $(0,0)$?
  respuesta: 'No'
  solucion_pasos:
  - $x=0$ no pertenece al dominio, por lo que la curva nunca toca el origen.
errores_frecuentes:
- Suponer que la gráfica pasa por el origen, ignorando la asíntota vertical en $x=0$.
- Confundir el comportamiento de exponente negativo par con el de exponente negativo impar.
- No reconocer que ambas ramas quedan del mismo lado (positivo) del eje $x$.
- Olvidar verificar el signo de $a$ antes de describir la ubicación de las ramas.
