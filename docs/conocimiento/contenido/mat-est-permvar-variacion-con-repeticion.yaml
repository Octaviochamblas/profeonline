semantic_id: MAT.EST.PERMUTACIONES_VARIACIONES.VARIACION_CON_REPETICION
titulo: Cálculo de variaciones de n elementos tomados de a r con repetición
objetivo: Calcular el número de variaciones de n elementos tomados de a r, permitiendo que un mismo elemento
  se repita en distintas posiciones.
introduccion: En situaciones como claves numéricas o códigos, un mismo símbolo puede repetirse en distintas
  posiciones, lo que cambia la fórmula de conteo respecto de las variaciones sin repetición.
resumen: El número de variaciones con repetición de $n$ elementos tomados de a $r$ es $VR(n,r)=n^r$.
explicacion: '![Variaciones con repetición](/static/img/probabilidad/permvar/permvar-variacion-con-repeticion.svg)


  ### Definición formal


  $VR(n,r)=n^r$, ya que cada una de las $r$ posiciones puede llenarse con cualquiera de los $n$ elementos
  disponibles, de forma independiente y repetible.


  ### Desarrollo didáctico


  Una clave numérica de 4 dígitos, cada uno del 0 al 9 (10 opciones, repetibles), tiene $VR(10,4)=10^4=10.000$
  claves posibles.'
procedimiento:
- 'Paso 1: Identifica el número n de símbolos o elementos disponibles, y el número r de posiciones a llenar.'
- 'Paso 2: Verifica que se permita la repetición de elementos en distintas posiciones.'
- 'Paso 3: Calcula n elevado a la potencia r para obtener el total de variaciones con repetición.'
ejemplos:
- titulo: Calcular las claves numéricas de 4 dígitos
  enunciado: 10 dígitos posibles (0-9), 4 posiciones, repetición permitida.
  solucion_pasos:
  - VR(10,4)=10⁴=10.000 claves posibles.
- titulo: Calcular las cadenas de 3 letras usando solo A, B, C
  enunciado: 3 letras posibles, 3 posiciones, repetición permitida.
  solucion_pasos:
  - VR(3,3)=3³=27 cadenas posibles.
- titulo: ¿Se permite repetir un mismo elemento en distintas posiciones?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la característica que define esta variación 'con repetición'.
- titulo: ¿VR(n,r) siempre da un resultado mayor o igual que V(n,r) (sin repetición)?
  respuesta: Sí
  solucion_pasos:
  - Sí, permitir repetición siempre genera al menos tantas combinaciones como sin permitirla.
errores_frecuentes:
- Confundir esta fórmula (n^r) con la de variaciones sin repetición (n!/(n-r)!).
- Aplicar esta fórmula a situaciones donde en realidad no se permite repetir elementos.
- Calcular incorrectamente la potencia, confundiendo la base (n) con el exponente (r).
fuente: Elaboración propia.
estado: publicado
