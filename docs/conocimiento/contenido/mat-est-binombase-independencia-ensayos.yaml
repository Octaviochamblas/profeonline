semantic_id: MAT.EST.BINOMIAL_BASE.INDEPENDENCIA_ENSAYOS
titulo: Verificar la condición de independencia entre los ensayos de un experimento binomial
objetivo: Verificar que los ensayos repetidos de un experimento binomial sean independientes entre sí,
  es decir, que el resultado de un ensayo no afecte la probabilidad de los siguientes.
introduccion: La independencia entre ensayos es uno de los requisitos fundamentales del modelo binomial;
  sin ella, la fórmula de probabilidad binomial no es aplicable directamente.
resumen: 'Los ensayos de un experimento binomial deben ser independientes: el resultado obtenido en un
  ensayo no debe influir en la probabilidad de éxito de los ensayos siguientes.'
explicacion: '![Independencia entre los ensayos](/static/img/probabilidad/binombase/binombase-independencia-ensayos.svg)


  ### Definición formal


  Los ensayos son independientes si $P(\text{éxito en el ensayo }i\mid\text{resultados de los ensayos
  anteriores})=P(\text{éxito})=p$ para todo $i$.


  ### Desarrollo didáctico


  Lanzar una moneda varias veces cumple la independencia, ya que cada lanzamiento no depende de los anteriores.
  En cambio, extraer cartas de un mazo sin reposición NO cumple la independencia, ya que la probabilidad
  cambia según lo extraído previamente.'
procedimiento:
- 'Paso 1: Analiza si el resultado de un ensayo puede afectar la probabilidad de éxito de los ensayos
  siguientes.'
- 'Paso 2: Si el experimento se realiza con reposición (o los ensayos son físicamente independientes,
  como lanzamientos de moneda), se cumple la independencia.'
- 'Paso 3: Si el experimento se realiza sin reposición (como extraer cartas de un mazo sin devolverlas),
  la independencia NO se cumple, y el modelo binomial no aplica directamente.'
ejemplos:
- titulo: Verificar independencia al lanzar una moneda varias veces
  enunciado: Lanzar una moneda 5 veces.
  solucion_pasos:
  - 'Los ensayos son independientes: el resultado de un lanzamiento no afecta la probabilidad de los siguientes.'
- titulo: Verificar independencia al extraer cartas sin reposición
  enunciado: Extraer 3 cartas de un mazo sin devolverlas.
  solucion_pasos:
  - 'Los ensayos NO son independientes: la probabilidad de cada extracción cambia según las cartas ya
    extraídas.'
- titulo: ¿Extraer bolitas de una urna CON reposición cumple la independencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que al devolver la bolita extraída, la composición de la urna no cambia entre ensayos.
- titulo: ¿Es la independencia un requisito necesario para aplicar el modelo binomial estándar?
  respuesta: Sí
  solucion_pasos:
  - Sí, es uno de los requisitos fundamentales, junto con n fijo y p constante.
errores_frecuentes:
- Aplicar el modelo binomial a experimentos sin reposición, donde en realidad no se cumple la independencia
  entre ensayos.
- No verificar si el contexto del problema (con o sin reposición) afecta la independencia antes de aplicar
  la fórmula.
- Confundir independencia entre ensayos con la constancia de la probabilidad p (son requisitos relacionados,
  pero distintos).
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
