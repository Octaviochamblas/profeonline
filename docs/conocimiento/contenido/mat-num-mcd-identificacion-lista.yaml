semantic_id: MAT.NUM.MAXIMO_COMUN_DIVISOR.IDENTIFICACION_LISTA
objetivo: Calcular el MCD de dos o más números identificando y listando todos sus divisores individuales.
introduccion: |-
  ¿Cómo encuentras algo cuando tienes muchas cosas mezcladas? ¡Haces una lista!

  Si quieres saber cuál es el mayor divisor común de dos números, una de las formas más sencillas y seguras de hacerlo es escribir dos listas: una con todos los divisores del primer número, y otra con todos los divisores del segundo número.

  Una vez que tengas las dos listas preparadas, simplemente buscas los números que aparecen en ambas listas y eliges el más grande de todos. Este método es excelente para números pequeños porque te permite ver claramente todos los candidatos antes de tomar la decisión final.
resumen: El método de listado para calcular el MCD consiste en escribir ordenadamente el conjunto completo de divisores de cada número por separado, identificar los divisores que se repiten en todos los conjuntos (divisores comunes) y seleccionar el de mayor valor como el MCD.
explicacion: |-
  Para calcular el Máximo Común Divisor (MCD) de dos números $a$ y $b$ mediante el **método de listado**, procedemos a determinar todos los divisores de cada número de forma independiente.

  Definimos el conjunto de divisores de un número natural $n$, denotado como $D(n)$, como todos los números naturales $d$ tales que $n \pmod d = 0$.

  **Pasos del método:**
  1. Encontrar el conjunto de divisores del primer número, $D(a)$.
  2. Encontrar el conjunto de divisores del segundo número, $D(b)$.
  3. Determinar la intersección de ambos conjuntos, que representa los divisores comunes:
     $$D(a) \cap D(b)$$
  4. Seleccionar el elemento más grande de la intersección. Este elemento es el $\text{MCD}(a, b)$.

  **Ejemplo detallado:**
  Para calcular el $\text{MCD}(24, 36)$:
  - Divisores de $24$: $D(24) = \{1, 2, 3, 4, 6, 8, 12, 24\}$
  - Divisores de $36$: $D(36) = \{1, 2, 3, 4, 6, 9, 12, 18, 36\}$
  - Divisores comunes: $D(24) \cap D(36) = \{1, 2, 3, 4, 6, 12\}$
  - El mayor de ellos es $12$, por lo tanto, $\text{MCD}(24, 36) = 12$.

  Este método es ideal cuando los números son pequeños ($< 100$) y sus divisores son fáciles de enumerar. Sin embargo, para números grandes puede resultar ineficiente o propenso a omitir divisores.
procedimiento:
  - 'Paso 1: Escribe la lista completa de los divisores del primer número, comenzando por el 1 y terminando en el número mismo.'
  - 'Paso 2: Escribe la lista completa de los divisores del segundo número de la misma manera.'
  - 'Paso 3: Identifica y subraya todos los números que aparecen en ambas listas (divisores comunes).'
  - 'Paso 4: Elige el número más grande de los divisores comunes identificados; este será el MCD.'
ejemplos:
  - titulo: Ejemplo 1
    enunciado: Calcula el MCD de $16$ y $24$ listando sus divisores.
    solucion_pasos:
      - 'Paso a: Listamos los divisores de $16$: $D(16) = \{1, 2, 4, 8, 16\}$.'
      - 'Paso b: Listamos los divisores de $24$: $D(24) = \{1, 2, 3, 4, 6, 8, 12, 24\}$.'
      - 'Paso c: Identificamos los divisores comunes entre ambas listas: $\{1, 2, 4, 8\}$.'
      - 'Paso d: Seleccionamos el mayor, que es $8$. Por ende, $\text{MCD}(16, 24) = 8$.'
  - titulo: Ejemplo 2
    enunciado: Determina el MCD de $18$ y $27$ listando sus divisores.
    solucion_pasos:
      - 'Paso a: Los divisores de $18$ son $D(18) = \{1, 2, 3, 6, 9, 18\}$.'
      - 'Paso b: Los divisores de $27$ son $D(27) = \{1, 3, 9, 27\}$.'
      - 'Paso c: Intersecamos las dos listas para obtener los divisores comunes: $\{1, 3, 9\}$.'
      - 'Paso d: Elegimos el mayor valor, que es $9$. Por ende, $\text{MCD}(18, 27) = 9$.'
  - titulo: '¿El MCD de $14$ y $35$ es $7$?'
    respuesta: 'Sí'
    solucion_pasos:
      - 'Los divisores de $14$ son $\{1, 2, 7, 14\}$.'
      - 'Los divisores de $35$ son $\{1, 5, 7, 35\}$.'
      - 'Los divisores comunes son $\{1, 7\}$, de los cuales el mayor es $7$. Así, $\text{MCD}(14, 35) = 7$.'
  - titulo: 'Al listar los divisores de $20$ y $30$, ¿es el divisor común más grande igual a $5$?'
    respuesta: 'No'
    solucion_pasos:
      - 'Los divisores de $20$ son $\{1, 2, 4, 5, 10, 20\}$.'
      - 'Los divisores de $30$ son $\{1, 2, 3, 5, 6, 10, 15, 30\}$.'
      - 'Los divisores comunes son $\{1, 2, 5, 10\}$. El mayor común es $10$, no $5$.'
errores_frecuentes:
  - Omitir divisores al escribir la lista (por ejemplo, olvidar el 1 o el propio número).
  - Listar los múltiplos del número en lugar de sus divisores.
  - Seleccionar un divisor que solo pertenece a uno de los números pero no es común a ambos.
  - Elegir el menor divisor común positivo (que siempre es 1) en lugar de elegir el mayor (MCD).
  - Dividir incorrectamente al comprobar si un número es divisor, lo que altera la lista resultante.
fuente: Teoría de Números
estado: publicado
