semantic_id: 'MAT.ALG.MCM_ALGEBRAICO.PARTE_LITERAL_MONOMIOS'
titulo: 'MCM de la Parte Literal (Letras)'
objetivo: 'Aprender la regla para crear el contenedor literal perfecto usando factores comunes y no comunes.'
introduccion: |
  ¿Y qué hay de las letras en el MCM? Aquí reina la inclusión absoluta. Si una letra aparece, sin importar si está sola o en todos lados, debe estar en el MCM. Y si hay competencia de exponentes, ¡gana siempre el más fuerte!
resumen: |
  Para obtener la parte literal del MCM, escribe TODAS las bases (letras) diferentes que aparezcan en los monomios, y eleva cada una a su MAYOR exponente presente.
explicacion: |
  Retomemos a Ana, Beto y Carlos, pero ahora armando un super-kit de herramientas para el taller.
  - Ana trae: llave 5, llave 8.
  - Beto trae: llave 8, martillo.
  - Carlos trae: martillo, destornillador.

  El super-kit (MCM) debe contener TODO lo necesario para replicar la caja de cualquiera de los tres. Necesitamos: llave 5, llave 8, martillo, destornillador.

  En álgebra, es lo mismo con los exponentes:
  Si tenemos $x^2 y$, $x^4$, y $y^3 z$.
  - Listamos todas las letras presentes: x, y, z.
  - Para 'x', compiten $x^2$ y $x^4$. El ganador (mayor) es $x^4$.
  - Para 'y', compiten $y^1$ y $y^3$. El mayor es $y^3$.
  - Para 'z', solo hay $z^1$, así que gana $z^1$.

  Parte literal del MCM: $x^4 y^3 z$. Cualquier monomio original cabe perfectamente aquí dentro.
procedimiento:
  - 'Paso 1: Haz una lista con TODAS las letras distintas que aparezcan, sin excluir ninguna.'
  - 'Paso 2: Revisa los exponentes que tiene cada letra en los distintos monomios.'
  - 'Paso 3: Asígnale a cada letra de tu lista el exponente MÁS GRANDE que hayas encontrado.'
  - 'Paso 4: Multiplica todas las letras resultantes.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Halla el MCM literal de $m^3 n^2$, $m^5 p$ y $n^4 p^2$.'
    solucion_pasos:
    - 'Letras totales: m, n, p.'
    - 'Mayor exp de m: 5 ($m^5$).'
    - 'Mayor exp de n: 4 ($n^4$).'
    - 'Mayor exp de p: 2 ($p^2$).'
    - 'El MCM literal es $m^5 n^4 p^2$.'
  - titulo: 'MCM literal de $a^2$ y $b^3$.'
    respuesta: '$a^2 b^3$'
    solucion_pasos:
    - 'Se incluyen ambas variables sin alterar sus exponentes porque no hay competencia: $a^2 b^3$.'
errores_frecuentes:
  - 'Descartar letras que no son comunes a todos los términos (es el error fatal más común, contamina el MCM con lógica de MCD).'
  - 'Elegir el exponente más pequeño.'
estado: publicado
