semantic_id: MAT.ALG.MCM_ALGEBRAICO.PARTE_LITERAL_MONOMIOS
titulo: MCM de la Parte Literal (Letras)
objetivo: Aprender la regla para crear el contenedor literal perfecto usando factores comunes y no comunes.
introduccion: ¿Y qué hay de las letras en el MCM? Aquí reina la inclusión absoluta. Si una letra aparece, sin importar
  si está sola o en todos lados, debe estar en el MCM. Y si hay competencia de exponentes, gana siempre el más fuerte.
resumen: Para obtener la parte literal del MCM, escribe TODAS las bases (letras) diferentes que aparezcan en los
  monomios, y eleva cada una a su MAYOR exponente presente.
explicacion: "### Definición formal\n\nLas letras comunes y no comunes al mayor exponente.\n\n### Desarrollo didáctico\n\
  \nLa construcción de la parte literal del MCM requiere ser generoso, al contrario del MCD que era estricto.\n\n\
  **Regla del MCM Literal:** Se toman TODAS las bases (letras) que aparezcan, ya sea que se repitan o no, y a cada\
  \ una se le asigna el MAYOR exponente con el que aparezca.\n\nEjemplo: Tenemos $A = x^3 y^2$ y $B = x^2 y^4 z$.\n\
  - **Paso 1 (Todas las letras):** ¿Qué letras existen en total? Tenemos $x$, $y$, y $z$. Tomamos las tres.\n- **Paso\
  \ 2 (Mayor exponente):**\n  - Para $x$: Aparece como $x^3$ y $x^2$. El mayor es 3. Tomamos $x^3$.\n  - Para $y$:\
  \ Aparece como $y^2$ y $y^4$. El mayor es 4. Tomamos $y^4$.\n  - Para $z$: Solo aparece como $z^1$. Tomamos $z^1$.\n\
  \nResultado: El MCM es $x^3 y^4 z$. Fíjate cómo tanto A como B 'caben' perfectamente dentro de este resultado."
procedimiento:
- 'Paso 1: Haz una lista con TODAS las letras distintas que aparezcan, sin excluir ninguna.'
- 'Paso 2: Revisa los exponentes que tiene cada letra en los distintos monomios.'
- 'Paso 3: Asígnale a cada letra de tu lista el exponente MÁS GRANDE que hayas encontrado.'
- 'Paso 4: Multiplica todas las letras resultantes.'
- Es la definición técnica de inclusión máxima (MCM).
ejemplos:
- titulo: Halla el MCM literal de $m^3 n^2$, $m^5 p$ y $n^4 p^2$
  enunciado: Halla el MCM literal de $m^3 n^2$, $m^5 p$ y $n^4 p^2$.
  solucion_pasos:
  - 'Letras totales: m, n, p.'
  - 'Mayor exp de m: 5 ($m^5$).'
  - 'Mayor exp de n: 4 ($n^4$).'
  - 'Mayor exp de p: 2 ($p^2$).'
  - El MCM literal es $m^5 n^4 p^2$.
- titulo: MCM literal de $a^2$ y $b^3$.
  solucion_pasos:
  - 'Se incluyen ambas variables sin alterar sus exponentes porque no hay competencia: $a^2 b^3$.'
- titulo: 'Respecto de «Determinación del m.c.m. literal entre monomios»: ¿Describe adecuadamente el co'
  enunciado: 'Respecto de «Determinación del m.c.m. literal entre monomios»: ¿Describe adecuadamente el concepto
    esta frase? «Para obtener la parte literal del MCM, escribe TODAS las bases (letras) diferentes que aparezcan
    en los monomios, y eleva cada una a su MAYOR exponente presente»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para obtener la parte literal del MCM, escribe TODAS las bases
    (letras) diferentes que aparezcan en los monomios, y eleva cada una a su MAYOR exponente presente.'
- titulo: 'Respecto de «Determinación del m.c.m. literal entre monomios»: ¿Se puede aceptar esta afirma'
  enunciado: 'Respecto de «Determinación del m.c.m. literal entre monomios»: ¿Se puede aceptar esta afirmación?
    «Descartar letras que no son comunes a todos los términos (es el error fatal más común, contamina el MCM con
    lógica de MCD)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para obtener la parte literal del MCM, escribe TODAS las bases
    (letras) diferentes que aparezcan en los monomios, y eleva cada una a su MAYOR exponente presente.'
errores_frecuentes:
- Descartar letras que no son comunes a todos los términos (es el error fatal más común, contamina el MCM con lógica
  de MCD).
- Elegir el exponente más pequeño.
- Para «La regla de oro para el MCM literal indica que se escogen:», la respuesta correcta es Solo las letras comunes
  al mayor exponente.
- Para «La regla de oro para el MCM literal indica que se escogen:», la respuesta correcta es Las letras comunes
  y no comunes al menor exponente.
- Las letras multiplicadas entre sí.
