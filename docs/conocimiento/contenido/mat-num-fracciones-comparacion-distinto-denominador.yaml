semantic_id: MAT.NUM.FRACCIONES_COMPARACION.DISTINTO_DENOMINADOR
objetivo: Comparar fracciones con denominadores distintos.
introduccion: Una tarea matemática frecuente es comparar fracciones con denominadores
  distintos. El caso “Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se puede llevar
  ambas a quinceavos” muestra cómo abordarla desde comparación de fracciones de distinto
  denominador.
resumen: Para comparar fracciones con distinto denominador suele buscarse un denominador
  común o una representación equivalente. Como criterio de control, usar fracciones
  equivalentes facilita comparar cantidades escritas de forma distinta
explicacion: |-
  Para comparar fracciones con distinto denominador suele buscarse un denominador común o una representación equivalente.

  La relación entre la definición y el caso “Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se puede llevar ambas a quinceavos” conduce a una conclusión útil: Usar fracciones equivalentes facilita comparar cantidades escritas de forma distinta.
procedimiento:
- 'Paso 1: Busca un denominador común positivo o el mínimo común múltiplo.'
- 'Paso 2: Amplifica cada fracción hasta obtener denominadores iguales.'
- 'Paso 3: Compara los nuevos numeradores y traslada el orden a las fracciones originales.'
ejemplos:
- titulo: Aplicación razonada — Comparación de fracciones de distinto denominador
  enunciado: Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se puede llevar ambas
    a quinceavos.
  solucion_pasos:
  - Busca un denominador común positivo o el mínimo común múltiplo.
  - Amplifica cada fracción hasta obtener denominadores iguales.
  - Compara los nuevos numeradores y traslada el orden a las fracciones originales.
- titulo: Revisión de una solución — Comparación de fracciones de distinto denominador
  enunciado: Una solución aplica “Amplifica cada fracción hasta obtener denominadores
    iguales.”, pero termina sin comprobar que usar fracciones equivalentes facilita
    comparar cantidades escritas de forma distinta. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define comparación de fracciones de distinto denominador:
    para comparar fracciones con distinto denominador suele buscarse un denominador
    común o una representación equivalente.'
  - Busca un denominador común positivo o el mínimo común múltiplo.
  - 'Completa la revisión con este control: Compara los nuevos numeradores y traslada
    el orden a las fracciones originales.'
- titulo: ¿Se cumple que usar fracciones equivalentes facilita comparar cantidades
    escritas de forma distinta? — Comparación de fracciones de distinto denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para comparar fracciones con distinto
    denominador suele buscarse un denominador común o una representación equivalente.
  - El caso “Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se puede llevar ambas
    a quinceavos” satisface esa condición.
  - Compara los nuevos numeradores y traslada el orden a las fracciones originales.
- titulo: ¿Es válido omitir el paso “Busca un denominador común positivo o el mínimo
    común múltiplo”? — Comparación de fracciones de distinto denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de comparación de fracciones de
    distinto denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Amplifica cada fracción hasta
    obtener denominadores iguales.'
  - 'La solución debe terminar de este modo: Compara los nuevos numeradores y traslada
    el orden a las fracciones originales.'
errores_frecuentes:
- 'Empezar comparación de fracciones de distinto denominador sin realizar este control
  inicial: Busca un denominador común positivo o el mínimo común múltiplo.'
- Memorizar “Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se puede llevar ambas
  a quinceavos” como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Amplifica cada fracción hasta obtener denominadores
  iguales.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre comparación de fracciones de distinto denominador
  que contradice el criterio “Usar fracciones equivalentes facilita comparar cantidades
  escritas de forma distinta”.
- 'Cerrar el ejercicio sin esta comprobación específica: Compara los nuevos numeradores
  y traslada el orden a las fracciones originales.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
