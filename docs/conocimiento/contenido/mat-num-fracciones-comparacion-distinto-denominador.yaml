semantic_id: MAT.NUM.FRACCIONES_COMPARACION.DISTINTO_DENOMINADOR
titulo: Comparación de fracciones con distinto denominador mediante amplificación
objetivo: Comparar fracciones con denominadores distintos llevándolas a un denominador común.
introduccion: Cuando ni el numerador ni el denominador coinciden, la comparación directa no es posible;
  se necesita reescribir ambas fracciones con un denominador común mediante amplificación.
resumen: Para comparar fracciones con distinto denominador se amplifican ambas a un denominador común,
  usualmente el mínimo común múltiplo de los denominadores, y luego se comparan los numeradores.
explicacion: '### Definición formal


  Dadas \(\frac{a}{b}\) y \(\frac{c}{d}\) con \(b\neq d\), se amplifican a un denominador común \(m\)
  (por ejemplo \(m=\mathrm{mcm}(b,d)\)) y se comparan los numeradores resultantes, aplicando el criterio
  de igual denominador.


  ### Desarrollo didáctico


  Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se lleva ambas a quinceavos: \(\frac{2}{3}=\frac{10}{15}\)
  y \(\frac{3}{5}=\frac{9}{15}\). Como \(10>9\), se concluye \(\frac{2}{3}>\frac{3}{5}\).'
procedimiento:
- 'Paso 1: Busca un denominador común positivo o el mínimo común múltiplo.'
- 'Paso 2: Amplifica cada fracción hasta obtener denominadores iguales.'
- 'Paso 3: Compara los nuevos numeradores y traslada el orden a las fracciones originales.'
ejemplos:
- titulo: Aplicación razonada — Comparación de fracciones de distinto denominador
  enunciado: Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se puede llevar ambas a quinceavos.
  solucion_pasos:
  - Busca un denominador común positivo o el mínimo común múltiplo.
  - Amplifica cada fracción hasta obtener denominadores iguales.
  - Compara los nuevos numeradores y traslada el orden a las fracciones originales.
- titulo: Revisión de una solución — Comparación de fracciones de distinto denominador
  enunciado: Una solución aplica “Amplifica cada fracción hasta obtener denominadores iguales.”, pero
    termina sin comprobar que usar fracciones equivalentes facilita comparar cantidades escritas de forma
    distinta. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define comparación de fracciones de distinto denominador: para comparar
    fracciones con distinto denominador suele buscarse un denominador común o una representación equivalente.'
  - Busca un denominador común positivo o el mínimo común múltiplo.
  - 'Completa la revisión con este control: Compara los nuevos numeradores y traslada el orden a las fracciones
    originales.'
- titulo: ¿Se cumple que usar fracciones equivalentes facilita comparar cantidades escritas de forma distinta?
    — Comparación de fracciones de distinto denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para comparar fracciones con distinto denominador suele
    buscarse un denominador común o una representación equivalente.
  - El caso “Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se puede llevar ambas a quinceavos” satisface
    esa condición.
  - Compara los nuevos numeradores y traslada el orden a las fracciones originales.
- titulo: ¿Es válido omitir el paso “Busca un denominador común positivo o el mínimo común múltiplo”?
    — Comparación de fracciones de distinto denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de comparación de fracciones de distinto denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Amplifica cada fracción hasta obtener denominadores
    iguales.'
  - 'La solución debe terminar de este modo: Compara los nuevos numeradores y traslada el orden a las
    fracciones originales.'
errores_frecuentes:
- 'Empezar comparación de fracciones de distinto denominador sin realizar este control inicial: Busca
  un denominador común positivo o el mínimo común múltiplo.'
- Memorizar “Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se puede llevar ambas a quinceavos” como
  respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Amplifica cada fracción hasta obtener denominadores iguales.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre comparación de fracciones de distinto denominador que contradice
  el criterio “Usar fracciones equivalentes facilita comparar cantidades escritas de forma distinta”.
- 'Cerrar el ejercicio sin esta comprobación específica: Compara los nuevos numeradores y traslada el
  orden a las fracciones originales.'
