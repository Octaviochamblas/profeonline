semantic_id: MAT.NUM.FRACCIONES_COMPARACION.DISTINTO_DENOMINADOR
objetivo: Comprender comparación de fracciones de distinto denominador y aplicarlo
  correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso comparación de fracciones de distinto denominador ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Para comparar fracciones con distinto denominador suele buscarse un denominador
  común o una representación equivalente. Además, usar fracciones equivalentes facilita
  comparar cantidades escritas de forma distinta.
explicacion: |-
  Para comparar fracciones con distinto denominador suele buscarse un denominador común o una representación equivalente.

  Una idea importante es que usar fracciones equivalentes facilita comparar cantidades escritas de forma distinta.

  Por ejemplo, Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\), se puede llevar ambas a quinceavos.
procedimiento:
- 'Paso 1: Elegir una estrategia conveniente: simplificar, amplificar, usar productos
  cruzados o un denominador común.'
- 'Paso 2: Ejecutar la comparación o transformación paso a paso, cuidando el valor
  de la fracción.'
- 'Paso 3: Interpretar el resultado y expresarlo con lenguaje matemático claro.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Para comparar \(\frac{2}{3}\) y \(\frac{3}{5}\),
    se puede llevar ambas a quinceavos.” se relaciona con comparación de fracciones
    de distinto denominador.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: para comparar fracciones con distinto denominador
    suele buscarse un denominador común o una representación equivalente.'
  - Concluye que el ejemplo sí ilustra comparación de fracciones de distinto denominador.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Usar fracciones equivalentes facilita comparar
    cantidades escritas de forma distinta.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con comparación de fracciones de distinto
    denominador?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que usar fracciones equivalentes facilita comparar
    cantidades escritas de forma distinta.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar comparación de fracciones de distinto denominador ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar comparación de fracciones de distinto denominador sin mirar qué
  representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
