semantic_id: MAT.ALG.FUNC_CUADR_FORMAS.COMPLETACION_CUADRADO
titulo: Obtención de la forma canónica completando el cuadrado
objetivo: Transformar una función cuadrática de la forma general a la forma canónica completando el cuadrado.
introduccion: Para aprovechar las ventajas de la forma canónica cuando la función viene dada en forma general,
  es necesario transformarla mediante el mismo método usado para ecuaciones cuadráticas.
resumen: Para obtener la forma canónica desde $f(x)=ax^2+bx+c$, se factoriza $a$ de los términos con $x$ y se
  completa el cuadrado dentro del paréntesis, reordenando hasta llegar a $a(x-h)^2+k$.
explicacion: '### Definición formal


  Dada $f(x)=ax^2+bx+c$, se factoriza $a$ de los primeros dos términos: $f(x)=a\left(x^2+\dfrac{b}{a}x\right)+c$.
  Sumando y restando $\left(\dfrac{b}{2a}\right)^2$ dentro del paréntesis y reorganizando, se obtiene la forma
  canónica $f(x)=a\left(x+\dfrac{b}{2a}\right)^2+\left(c-\dfrac{b^2}{4a}\right)$.


  ### Desarrollo didáctico


  El procedimiento es análogo a completar el cuadrado en una ecuación, con la diferencia de que aquí se trabaja
  con una función y el resultado final conserva la constante $k$ en vez de igualarse a cero.


  Para $f(x)=x^2-6x+11$: factorizando (con $a=1$), se completa el cuadrado sumando y restando $9$: $f(x)=(x^2-6x+9)-9+11=(x-3)^2+2$.'
procedimiento:
- 'Paso 1: Si $a\neq1$, factoriza $a$ de los términos con $x^2$ y $x$.'
- 'Paso 2: Dentro del paréntesis, suma y resta el cuadrado de la mitad del coeficiente de $x$.'
- 'Paso 3: Reescribe el trinomio cuadrado perfecto como un binomio al cuadrado.'
- 'Paso 4: Simplifica los términos constantes fuera del paréntesis para obtener $k$.'
ejemplos:
- titulo: Completación del cuadrado con a=1
  enunciado: 'Escribe en forma canónica $f(x)=x^2+8x+10$.'
  solucion_pasos:
  - 'Completando el cuadrado: $f(x)=(x^2+8x+16)-16+10$.'
  - '$f(x)=(x+4)^2-6$.'
- titulo: Completación del cuadrado con a distinto de 1
  enunciado: 'Escribe en forma canónica $f(x)=2x^2-8x+5$.'
  solucion_pasos:
  - 'Factorizando $2$: $f(x)=2(x^2-4x)+5$.'
  - 'Completando el cuadrado dentro del paréntesis: $f(x)=2(x^2-4x+4)-8+5$.'
  - '$f(x)=2(x-2)^2-3$.'
- titulo: ¿Completar el cuadrado en una función cambia su gráfica?
  enunciado: ¿Completar el cuadrado en una función cambia su gráfica?
  respuesta: 'No'
  solucion_pasos:
  - Las operaciones usadas son equivalencias algebraicas que preservan exactamente la misma función y su gráfica.
- titulo: ¿Es necesario factorizar $a$ antes de completar el cuadrado cuando $a\neq1$?
  enunciado: ¿Es necesario factorizar $a$ antes de completar el cuadrado cuando $a\neq1$?
  respuesta: Sí
  solucion_pasos:
  - Sin factorizar $a$ primero, el término que completa el cuadrado no se calcula correctamente.
errores_frecuentes:
- Olvidar multiplicar por $a$ el término que se resta al completar el cuadrado, cuando $a\neq1$.
- Sumar el término que completa el cuadrado sin restarlo, rompiendo la equivalencia con la función original.
- Cometer errores al calcular el cuadrado de la mitad del coeficiente lineal.
- No simplificar completamente los términos constantes fuera del paréntesis.
