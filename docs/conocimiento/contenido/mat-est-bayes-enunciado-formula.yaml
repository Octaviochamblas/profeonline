semantic_id: MAT.EST.REGLA_BAYES.ENUNCIADO_FORMULA
titulo: Enunciado formal de la regla de Bayes
objetivo: Enunciar formalmente la regla de Bayes, que permite calcular la probabilidad de una parte de
  la partición dado un evento observado, invirtiendo el condicionamiento.
introduccion: La regla de Bayes combina la regla multiplicativa y el teorema de la probabilidad total
  para resolver exactamente el tipo de problemas de probabilidad inversa.
resumen: La regla de Bayes establece que $P(B_i|A)=\dfrac{P(B_i)\times P(A|B_i)}{P(A)}$, donde $P(A)$
  se calcula mediante el teorema de la probabilidad total.
explicacion: '![Enunciado formal de la regla de Bayes](/static/img/probabilidad/bayes/bayes-enunciado-formula.svg)


  ### Definición formal


  $P(B_i|A)=\dfrac{P(B_i)\times P(A|B_i)}{\sum_{j}P(B_j)\times P(A|B_j)}$, donde el denominador es exactamente
  $P(A)$ calculado con el teorema de la probabilidad total.


  ### Desarrollo didáctico


  Si una fábrica tiene dos máquinas (P(A)=0,6, P(B)=0,4) con tasas de defecto 0,05 y 0,1, y se quiere
  saber la probabilidad de que una pieza defectuosa provenga de la máquina A: $P(A|\text{defectuosa})=\dfrac{0{,}6\times0{,}05}{0{,}6\times0{,}05+0{,}4\times0{,}1}=\dfrac{0{,}03}{0{,}07}\approx0{,}43$.'
procedimiento:
- 'Paso 1: Identifica la partición Bi y sus probabilidades, junto con las probabilidades condicionales
  P(A|Bi).'
- 'Paso 2: Calcula el numerador P(Bi)×P(A|Bi) para la parte específica de interés.'
- 'Paso 3: Calcula el denominador P(A) sumando todos los productos P(Bj)×P(A|Bj) de la partición completa,
  y divide el numerador por ese total.'
ejemplos:
- titulo: Calcular P(máquina A|defectuosa)
  enunciado: P(A)=0,6, P(B)=0,4, P(defectuosa|A)=0,05, P(defectuosa|B)=0,1.
  solucion_pasos:
  - 'Numerador: 0,6×0,05=0,03. Denominador: 0,03+0,04=0,07. P(A|defectuosa)=0,03/0,07≈0,43.'
- titulo: Calcular P(urna 1|roja) con tres urnas equiprobables
  enunciado: 3 urnas (1/3 cada una), P(roja|urna1)=0,5, P(roja|urna2)=0,3, P(roja|urna3)=0,7.
  solucion_pasos:
  - 'Numerador: (1/3)(0,5)≈0,167. Denominador: 0,5 (calculado previamente). P(urna1|roja)=0,167/0,5≈0,33.'
- titulo: ¿El denominador de esta fórmula es exactamente la probabilidad total P(A)?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la conexión directa entre ambos teoremas.
- titulo: ¿La suma de todas las P(Bi|A) para todas las partes de la partición debe dar 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que representan todas las posibles 'causas' del evento A observado.
errores_frecuentes:
- Olvidar calcular correctamente el denominador usando el teorema de la probabilidad total (sumando todos
  los términos de la partición).
- Confundir P(Bi|A) con P(A|Bi), invirtiendo incorrectamente el resultado final.
- Usar solo el numerador como respuesta final, sin dividir por el denominador (la probabilidad total).
fuente: 'Elaboración propia (referencia: Moraleja 294).'
estado: publicado
