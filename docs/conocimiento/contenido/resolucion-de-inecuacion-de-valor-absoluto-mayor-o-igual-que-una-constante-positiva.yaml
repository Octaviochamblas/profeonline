semantic_id: MAT.ALG.INECUACIONES_VALOR_ABSOLUTO.MAYOR_IGUAL_POSITIVO
titulo: Resolución de inecuación de valor absoluto mayor o igual que una constante positiva
objetivo: Resolver inecuaciones que involucran un valor absoluto mayor o igual a una constante positiva,
  aplicando sus propiedades algebraicas para determinar el conjunto solución.
introduccion: El valor absoluto de un número representa su distancia al origen en la recta numérica. Cuando
  nos encontramos con una expresión de la forma $|x| \ge a$, donde $a$ es un número positivo, estamos
  buscando todos los números reales cuya distancia a cero sea igual o mayor que $a$. Esta condición geométrica
  se traduce en dos direcciones opuestas sobre la recta.
resumen: 'La inecuación con valor absoluto $|x| \ge a$, con $a > 0$, se separa en dos inecuaciones simples:
  $x \le -a$ o $x \ge a$. La solución es la unión de los intervalos correspondientes: $(-\infty, -a] \cup
  [a, \infty)$.'
explicacion: '### Definición formal


  Sea $x$ una expresión algebraica y $a \in \mathbb{R}$ tal que $a > 0$. La inecuación $|x| \ge a$ es
  equivalente a la disyunción lógica:


  $$x \le -a \quad \lor \quad x \ge a$$


  El conjunto solución general de esta inecuación se expresa como la unión de dos intervalos:


  $$S = (-\infty, -a] \cup [a, \infty)$$


  Esta propiedad se fundamenta en la definición de valor absoluto como distancia. Los valores de $x$ que
  satisfacen la inecuación son aquellos situados a la izquierda de $-a$ (inclusive) o a la derecha de
  $a$ (inclusive).


  ### Desarrollo didáctico


  Imagina que estás en el centro de una plaza (posición $0$) y te piden que te ubiques a una distancia
  de al menos $5$ metros del centro. Para cumplir esta condición, tienes dos opciones: puedes caminar
  $5$ metros o más hacia la izquierda, llegando a posiciones iguales o menores a $-5$; o puedes caminar
  $5$ metros o más hacia la derecha, alcanzando posiciones iguales o mayores a $5$.


  Cualquier posición entre $-5$ y $5$ no cumple con la regla, ya que estarías a una distancia menor a
  $5$ metros del centro. Al trasladar esta idea a una expresión algebraica arbitraria $|f(x)| \ge a$,
  simplemente resolvemos dos casos separados: cuando el interior del valor absoluto es muy negativo ($f(x)
  \le -a$) y cuando es muy positivo ($f(x) \ge a$). La palabra fundamental aquí es "o" (disyunción), lo
  que implica que el conjunto solución será la unión de ambos escenarios.'
procedimiento:
- Identifica la expresión de la forma $|f(x)| \ge a$ y verifica que $a$ sea un número positivo.
- 'Aplica la propiedad del valor absoluto para separar en dos inecuaciones independientes conectadas por
  un "o": $f(x) \le -a$ y $f(x) \ge a$.'
- Resuelve la primera inecuación $f(x) \le -a$ para encontrar su conjunto solución $S_1$.
- Resuelve la segunda inecuación $f(x) \ge a$ para encontrar su conjunto solución $S_2$.
- 'El conjunto solución final será la unión de ambas soluciones obtenidas: $S = S_1 \cup S_2$.'
ejemplos:
- titulo: Resolución de una inecuación lineal con valor absoluto
  enunciado: Encuentra el conjunto solución de la inecuación $|2x - 3| \ge 7$.
  solucion_pasos:
  - Identificamos que la inecuación tiene la forma $|f(x)| \ge a$, con $a = 7 > 0$.
  - 'Aplicamos la propiedad: $2x - 3 \le -7$ o $2x - 3 \ge 7$.'
  - 'Resolvemos el primer caso: $2x - 3 \le -7 \implies 2x \le -4 \implies x \le -2$. El intervalo es
    $(-\infty, -2]$.'
  - 'Resolvemos el segundo caso: $2x - 3 \ge 7 \implies 2x \ge 10 \implies x \ge 5$. El intervalo es $[5,
    \infty)$.'
  - 'La solución final es la unión de ambos intervalos: $S = (-\infty, -2] \cup [5, \infty)$.'
- titulo: Despeje previo antes de aplicar la propiedad
  enunciado: Resuelve la inecuación $3|x + 1| - 4 \ge 5$.
  solucion_pasos:
  - 'Primero debemos aislar el valor absoluto. Sumamos $4$ a ambos lados: $3|x + 1| \ge 9$.'
  - 'Dividimos por $3$: $|x + 1| \ge 3$.'
  - 'Aplicamos la propiedad de $|X| \ge a$: $x + 1 \le -3$ o $x + 1 \ge 3$.'
  - 'Resolvemos la primera inecuación: $x + 1 \le -3 \implies x \le -4$.'
  - 'Resolvemos la segunda inecuación: $x + 1 \ge 3 \implies x \ge 2$.'
  - 'El conjunto solución es la unión: $(-\infty, -4] \cup [2, \infty)$.'
- titulo: ¿El conjunto solución de $|x| \ge 2$ incluye los números comprendidos entre -2 y 2?
  respuesta: Falso
  solucion_pasos:
  - La expresión $|x| \ge 2$ significa que la distancia de $x$ al cero debe ser mayor o igual a $2$.
  - Los números comprendidos estrictamente entre $-2$ y $2$ (por ejemplo, el $0$, el $1$ o el $-1.5$)
    tienen una distancia al cero que es menor que $2$.
  - Por definición, se resuelve como $x \le -2 \lor x \ge 2$.
  - Por lo tanto, la región entre $-2$ y $2$ es justamente la parte de la recta real que no forma parte
    de la solución.
- titulo: ¿Es correcto expresar la solución de $|x - 5| \ge 3$ como una intersección de intervalos?
  respuesta: Falso
  solucion_pasos:
  - 'La inecuación $|x - 5| \ge 3$ se descompone en dos condiciones disjuntas: $x - 5 \le -3$ o $x - 5
    \ge 3$.'
  - El conector lógico involucrado es "o" (disyunción), que se traduce algebraicamente en una unión de
    conjuntos ($\cup$).
  - Si se expresara como una intersección ($\cap$), se estarían buscando números que sean simultáneamente
    menores que $2$ y mayores que $8$, lo cual es el conjunto vacío.
  - 'En consecuencia, la solución debe expresarse siempre como una unión de intervalos: $(-\infty, 2]
    \cup [8, \infty)$.'
errores_frecuentes:
- Expresar la solución como una intersección de intervalos en lugar de una unión, obteniendo equivocadamente
  el conjunto vacío.
- Escribir incorrectamente la propiedad descomponiendo en $-a \le x \le a$, lo cual corresponde al caso
  del símbolo "menor o igual".
- Omitir el signo negativo al plantear la desigualdad $x \le -a$, escribiéndola erróneamente como $x \le
  a$.
- No cambiar el sentido de la desigualdad al plantear la parte negativa, escribiendo $x \ge -a$ en lugar
  de $x \le -a$.
- Olvidar incluir los corchetes cerrados en la notación de intervalos, asumiendo que la inecuación era
  estricta (sin el "igual").
