semantic_id: MAT.GEO.SIMETRIAS.AXIAL_EJE_Y
titulo: Simetría axial respecto del eje y
objetivo: 'Aplicar la regla específica de la simetría axial respecto del eje de las ordenadas (eje Y):
  cada punto P(x,y) se transforma en P''(-x,y).'
introduccion: Reflejar un punto respecto del eje Y es como 'voltear' su posición horizontal, manteniendo
  igual la posición vertical.
resumen: 'La simetría axial respecto del eje Y transforma cada punto $P(x,y)$ en $P''(-x,y)$: se invierte
  el signo de la abscisa y se mantiene igual la ordenada.'
explicacion: '![Simetría axial respecto del eje Y](/static/img/geometria/isometrias/simetria-axial-eje-y.svg)


  ### Definición formal


  Si el eje Y es la recta de simetría, cada punto $P(x,y)$ se transforma en $P''(-x,y)$: la coordenada
  $y$ permanece igual, y la coordenada $x$ cambia de signo.


  ### Desarrollo didáctico


  En la figura, el punto $P(3,3)$ tiene como imagen respecto del eje Y el punto $P''(-3,3)$: la ordenada
  se mantiene igual, y la abscisa se invierte.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del punto P(x,y).'
- 'Paso 2: Invierte el signo de la abscisa x.'
- 'Paso 3: Mantén la ordenada y sin cambios, obteniendo el punto imagen P''(-x,y).'
ejemplos:
- titulo: Aplicar la simetría respecto del eje Y
  enunciado: El punto P(3,3) se refleja respecto del eje Y.
  solucion_pasos:
  - P'=(-3,3).
- titulo: Aplicar la simetría a un punto con abscisa negativa
  enunciado: El punto P(-6,4) se refleja respecto del eje Y.
  solucion_pasos:
  - P'=(6,4).
- titulo: ¿La ordenada del punto cambia en esta simetría?
  respuesta: 'No'
  solucion_pasos:
  - No, la ordenada permanece exactamente igual; solo cambia el signo de la abscisa.
- titulo: ¿Un punto sobre el eje Y es su propia imagen?
  respuesta: Sí
  solucion_pasos:
  - Sí, si x=0, entonces -x=0 también, por lo que el punto no cambia.
errores_frecuentes:
- Invertir el signo de la ordenada en vez de la abscisa.
- Confundir esta simetría con la respecto del eje X (que invierte y, no x).
- Cambiar ambas coordenadas de signo, confundiendo con la simetría central respecto del origen.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 127, Cid 76).'
estado: publicado
