semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.DELTOIDE_DIAGONALES
titulo: Propiedad de las diagonales en el deltoide
objetivo: Reconocer que las diagonales de un deltoide son perpendiculares entre sí, y que una de ellas
  biseca a la otra.
introduccion: La simetría característica del deltoide se refleja de forma muy clara en la relación geométrica
  entre sus dos diagonales.
resumen: En un deltoide, las diagonales son perpendiculares entre sí; además, la diagonal que es eje de
  simetría biseca (divide por la mitad) a la otra diagonal.
explicacion: '![Diagonales perpendiculares en el deltoide](/static/img/geometria/poligonos-cuadrilateros/trapecios-deltoide-diagonales.svg)


  ### Definición formal


  Si $AC$ es la diagonal que actúa como eje de simetría de un deltoide $ABCD$, entonces $AC\perp BD$,
  y además $AC$ biseca a $BD$ (aunque $BD$ no necesariamente biseca a $AC$).


  ### Desarrollo didáctico


  A diferencia del rombo (donde AMBAS diagonales se bisecan mutuamente), en el deltoide general solo una
  de las diagonales (el eje de simetría) biseca a la otra; la relación de perpendicularidad, en cambio,
  sí se cumple siempre entre ambas.'
procedimiento:
- 'Paso 1: Identifica cuál de las dos diagonales del deltoide es el eje de simetría.'
- 'Paso 2: Recuerda que ambas diagonales son perpendiculares entre sí.'
- 'Paso 3: Recuerda que solo el eje de simetría biseca a la otra diagonal, no necesariamente al revés.'
ejemplos:
- titulo: Verificar la perpendicularidad de las diagonales
  enunciado: Un deltoide tiene diagonales AC y BD.
  solucion_pasos:
  - AC y BD son perpendiculares entre sí, sin importar sus longitudes.
- titulo: Identificar cuál diagonal biseca a la otra
  enunciado: En un deltoide, AC es el eje de simetría.
  solucion_pasos:
  - AC biseca a BD (divide a BD exactamente por la mitad), pero BD no necesariamente biseca a AC.
- titulo: ¿Ambas diagonales se bisecan mutuamente en el deltoide general?
  respuesta: 'No'
  solucion_pasos:
  - No, solo el eje de simetría biseca a la otra diagonal; eso solo ocurre en ambos sentidos en el caso
    particular del rombo.
- titulo: ¿La perpendicularidad de las diagonales se cumple siempre en el deltoide?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad general válida para cualquier deltoide.
errores_frecuentes:
- Creer que ambas diagonales se bisecan mutuamente (eso solo ocurre en el caso particular del rombo).
- Olvidar identificar cuál diagonal es el eje de simetría antes de aplicar la propiedad de bisección.
- Confundir esta propiedad con la del rombo, tratando al deltoide como si tuviera las mismas propiedades
  exactas.
fuente: 'Fuente: Moraleja Tomo 2 70.'
estado: publicado
