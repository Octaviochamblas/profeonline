semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.SIGNO_TRASLACION_HORIZONTAL
titulo: Efecto del signo en la traslación horizontal
objetivo: Determinar la dirección del desplazamiento horizontal según el signo de $h$ en $f(x)=a(x-h)^n$.
introduccion: 'El signo dentro del paréntesis puede resultar contraintuitivo: un signo "menos" mueve la curva
  hacia la derecha, y un signo "más" la mueve hacia la izquierda.'
resumen: En $f(x)=a(x-h)^n$, si $h>0$ la curva se desplaza **hacia la derecha**; si $h<0$ (equivalente a sumar),
  se desplaza **hacia la izquierda**.
explicacion: '### Definición formal


  Escrito en la forma $f(x)=a(x-h)^n$, un valor $h>0$ desplaza la gráfica $h$ unidades a la derecha. Si la
  expresión aparece como $f(x)=a(x+k)^n$ con $k>0$, esto equivale a $h=-k<0$, y la gráfica se desplaza $k$
  unidades a la izquierda.


  ### Desarrollo didáctico


  $f(x)=(x-2)^2$ tiene $h=2>0$: se desplaza a la derecha, con vértice en $x=2$. En cambio, $f(x)=(x+2)^2$
  equivale a $h=-2$: se desplaza a la izquierda, con vértice en $x=-2$.'
procedimiento:
- 'Paso 1: Reescribe la expresión en la forma $(x-h)^n$ si aparece como $(x+k)^n$.'
- 'Paso 2: Identifica el signo de $h$.'
- 'Paso 3: Si $h>0$, desplaza a la derecha; si $h<0$, desplaza a la izquierda.'
ejemplos:
- titulo: Traslación hacia la derecha
  enunciado: '¿Hacia dónde se desplaza $f(x)=(x-6)^3$ respecto a $x^3$?'
  solucion_pasos:
  - Se identifica $h=6>0$.
  - Se desplaza $6$ unidades hacia la derecha.
- titulo: Traslación hacia la izquierda
  enunciado: '¿Hacia dónde se desplaza $f(x)=(x+4)^2$ respecto a $x^2$?'
  solucion_pasos:
  - Se reescribe como $(x-(-4))^2$, así que $h=-4$.
  - Se desplaza $4$ unidades hacia la izquierda.
- titulo: ¿$f(x)=(x-3)^2$ se desplaza hacia la izquierda?
  enunciado: ¿La función $f(x)=(x-3)^2$ se desplaza hacia la izquierda respecto a $x^2$?
  respuesta: 'No'
  solucion_pasos:
  - Con $h=3>0$, el desplazamiento es hacia la derecha, no hacia la izquierda.
- titulo: ¿El signo dentro del paréntesis coincide con la dirección visual del desplazamiento?
  enunciado: ¿Un signo "menos" dentro del paréntesis siempre produce un desplazamiento hacia la derecha?
  respuesta: Sí
  solucion_pasos:
  - Es la convención matemática: $(x-h)$ con $h>0$ mueve la curva a la derecha, de forma contraintuitiva.
errores_frecuentes:
- Invertir la dirección del desplazamiento, moviendo hacia la izquierda cuando corresponde a la derecha.
- No reescribir $(x+k)$ como $(x-(-k))$ antes de identificar el signo de $h$.
- Confundir esta traslación horizontal con una traslación vertical.
- Aplicar el signo del desplazamiento al valor de $y$ en vez de al de $x$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
