semantic_id: MAT.GEO.SIMETRIAS.CENTRAL_PUNTO
titulo: Simetría central respecto de un punto
objetivo: Reconocer la simetría central respecto de un punto O como la transformación que envía cada punto
  P a otro punto P' tal que O es el punto medio del segmento PP'.
introduccion: 'En una simetría central, el punto de referencia (centro) actúa como un ''espejo puntual'':
  cada punto se refleja exactamente al otro lado, a la misma distancia.'
resumen: La simetría central respecto de un punto $O$ transforma cada punto $P$ en un punto $P'$ tal que
  $O$ es el punto medio del segmento $PP'$.
explicacion: '![Simetría central respecto de un punto](/static/img/geometria/isometrias/simetria-central-punto.svg)


  ### Definición formal


  Dado un punto fijo $O$ (el centro de simetría), la simetría central transforma cada punto $P$ en $P''$
  tal que $O$ es el punto medio de $PP''$: $O=\left(\frac{x_P+x_{P''}}{2},\frac{y_P+y_{P''}}{2}\right)$.


  ### Desarrollo didáctico


  En la figura, el punto $O(1,1)$ es el centro de simetría. El punto $P(-2,3)$ tiene como imagen $P''(4,-1)$,
  verificándose que $O$ es exactamente el punto medio de $PP''$.'
procedimiento:
- 'Paso 1: Identifica el centro de simetría O y el punto P que se desea transformar.'
- 'Paso 2: Reconoce que P'' debe ubicarse de modo que O sea el punto medio exacto entre P y P''.'
- 'Paso 3: Calcula P'' usando la fórmula del punto medio despejada: P''=(2xO-xP, 2yO-yP).'
ejemplos:
- titulo: Identificar la simetría central respecto de un punto
  enunciado: O(1,1) es el centro y P(-2,3) el punto original.
  solucion_pasos:
  - P'=(2×1-(-2), 2×1-3)=(4,-1); O es el punto medio de P y P'.
- titulo: Verificar que O es el punto medio
  enunciado: Se comprueba que O(1,1) es el punto medio de P(-2,3) y P'(4,-1).
  solucion_pasos:
  - Punto medio=((-2+4)/2, (3-1)/2)=(1,1)=O, confirmando la simetría central.
- titulo: ¿La distancia de P a O es igual a la distancia de P' a O?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, esa es la propiedad esencial de la simetría central: ambos puntos equidistan del centro.'
- titulo: ¿El centro de simetría puede ser cualquier punto del plano?
  respuesta: Sí
  solucion_pasos:
  - Sí, la simetría central se puede definir respecto de cualquier punto fijo, no solo el origen.
errores_frecuentes:
- Confundir la simetría central con una simetría axial (respecto de una recta, no de un punto).
- Calcular incorrectamente la fórmula de P', olvidando despejarla correctamente de la fórmula del punto
  medio.
- Creer que el centro de simetría debe ser siempre el origen del sistema cartesiano.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 126, Cid 74).'
estado: publicado
