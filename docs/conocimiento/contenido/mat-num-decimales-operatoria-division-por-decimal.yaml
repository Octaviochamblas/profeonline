semantic_id: MAT.NUM.DECIMALES_OPERATORIA.DIVISION_POR_DECIMAL
titulo: División de un decimal por otro decimal
objetivo: Dividir dos números decimales transformando el divisor en un número entero.
introduccion: Cuando el divisor también es decimal, conviene transformarlo en un número entero amplificando
  ambos números por la misma potencia de 10, lo que no altera el resultado de la división.
resumen: Para dividir un decimal por otro decimal se multiplican ambos por la misma potencia de 10 (tantas
  veces como cifras decimales tenga el divisor) hasta que el divisor sea entero, y luego se divide normalmente.
explicacion: '### Definición formal


  \(x\div y = (x\cdot10^k)\div(y\cdot10^k)\) para cualquier \(k\), pues multiplicar dividendo y divisor
  por el mismo número no altera el cociente; se elige \(k\) igual a la cantidad de cifras decimales de
  \(y\) para volverlo entero.


  ### Desarrollo didáctico


  \(3.6\div0.4\): el divisor tiene 1 cifra decimal, así que se multiplican ambos por 10: \(36\div4=9\).
  El cociente es 9.'
procedimiento:
- 'Paso 1: Desplaza la coma del divisor hasta convertirlo en entero.'
- 'Paso 2: Desplaza la coma del dividendo exactamente la misma cantidad de lugares.'
- 'Paso 3: Divide la expresión equivalente y verifica multiplicando por el divisor original.'
ejemplos:
- titulo: Aplicación razonada — División de decimales mediante amplificación por potencia de 10
  enunciado: \(3.6 \div 0.4 = 36 \div 4 = 9\).
  solucion_pasos:
  - Desplaza la coma del divisor hasta convertirlo en entero.
  - Desplaza la coma del dividendo exactamente la misma cantidad de lugares.
  - Divide la expresión equivalente y verifica multiplicando por el divisor original.
- titulo: Revisión de una solución — División de decimales mediante amplificación por potencia de 10
  enunciado: Una solución aplica “Desplaza la coma del dividendo exactamente la misma cantidad de lugares.”,
    pero termina sin comprobar que multiplicar ambos términos por la misma potencia de 10 no cambia el
    cociente. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define división de decimales mediante amplificación por potencia de 10:
    para dividir por un decimal se amplifican dividendo y divisor por una potencia de 10 hasta que el
    divisor sea natural.'
  - Desplaza la coma del divisor hasta convertirlo en entero.
  - 'Completa la revisión con este control: Divide la expresión equivalente y verifica multiplicando por
    el divisor original.'
- titulo: ¿Se cumple que multiplicar ambos términos por la misma potencia de 10 no cambia el cociente?
    — División de decimales mediante amplificación por potencia de 10
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para dividir por un decimal se amplifican dividendo y divisor
    por una potencia de 10 hasta que el divisor sea natural.
  - El caso “\(3.6 \div 0.4 = 36 \div 4 = 9\)” satisface esa condición.
  - Divide la expresión equivalente y verifica multiplicando por el divisor original.
- titulo: ¿Es válido omitir el paso “Desplaza la coma del divisor hasta convertirlo en entero”? — División
    de decimales mediante amplificación por potencia de 10
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de división de decimales mediante amplificación por
    potencia de 10.
  - 'Omitirlo puede volver inválida la acción siguiente: Desplaza la coma del dividendo exactamente la
    misma cantidad de lugares.'
  - 'La solución debe terminar de este modo: Divide la expresión equivalente y verifica multiplicando
    por el divisor original.'
errores_frecuentes:
- 'Empezar división de decimales mediante amplificación por potencia de 10 sin realizar este control inicial:
  Desplaza la coma del divisor hasta convertirlo en entero.'
- Memorizar “\(3.6 \div 0.4 = 36 \div 4 = 9\)” como respuesta aislada, sin reconstruir la definición que
  lo justifica.
- Convertir en receta el paso “Desplaza la coma del dividendo exactamente la misma cantidad de lugares.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre división de decimales mediante amplificación por potencia de 10
  que contradice el criterio “Multiplicar ambos términos por la misma potencia de 10 no cambia el cociente”.
- 'Cerrar el ejercicio sin esta comprobación específica: Divide la expresión equivalente y verifica multiplicando
  por el divisor original.'
