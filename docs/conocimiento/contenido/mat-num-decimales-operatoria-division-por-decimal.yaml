semantic_id: MAT.NUM.DECIMALES_OPERATORIA.DIVISION_POR_DECIMAL
objetivo: Dividir por un número decimal.
introduccion: 'Observa este caso: \(3.6 \div 0.4 = 36 \div 4 = 9\). Para explicar
  por qué funciona estudiaremos división de decimales mediante amplificación por potencia
  de 10. Al finalizar podrás dividir por un número decimal.'
resumen: Para dividir por un decimal se amplifican dividendo y divisor por una potencia
  de 10 hasta que el divisor sea natural. Como criterio de control, multiplicar ambos
  términos por la misma potencia de 10 no cambia el cociente
explicacion: |-
  Para dividir por un decimal se amplifican dividendo y divisor por una potencia de 10 hasta que el divisor sea natural.

  Esta formulación se hace concreta en “\(3.6 \div 0.4 = 36 \div 4 = 9\)”. Allí puede reconocerse que multiplicar ambos términos por la misma potencia de 10 no cambia el cociente.
procedimiento:
- 'Paso 1: Desplaza la coma del divisor hasta convertirlo en entero.'
- 'Paso 2: Desplaza la coma del dividendo exactamente la misma cantidad de lugares.'
- 'Paso 3: Divide la expresión equivalente y verifica multiplicando por el divisor
  original.'
ejemplos:
- titulo: Aplicación razonada — División de decimales mediante amplificación por potencia
    de 10
  enunciado: \(3.6 \div 0.4 = 36 \div 4 = 9\).
  solucion_pasos:
  - Desplaza la coma del divisor hasta convertirlo en entero.
  - Desplaza la coma del dividendo exactamente la misma cantidad de lugares.
  - Divide la expresión equivalente y verifica multiplicando por el divisor original.
- titulo: Revisión de una solución — División de decimales mediante amplificación
    por potencia de 10
  enunciado: Una solución aplica “Desplaza la coma del dividendo exactamente la misma
    cantidad de lugares.”, pero termina sin comprobar que multiplicar ambos términos
    por la misma potencia de 10 no cambia el cociente. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define división de decimales mediante amplificación
    por potencia de 10: para dividir por un decimal se amplifican dividendo y divisor
    por una potencia de 10 hasta que el divisor sea natural.'
  - Desplaza la coma del divisor hasta convertirlo en entero.
  - 'Completa la revisión con este control: Divide la expresión equivalente y verifica
    multiplicando por el divisor original.'
- titulo: ¿Se cumple que multiplicar ambos términos por la misma potencia de 10 no
    cambia el cociente? — División de decimales mediante amplificación por potencia
    de 10
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para dividir por un decimal se amplifican
    dividendo y divisor por una potencia de 10 hasta que el divisor sea natural.
  - El caso “\(3.6 \div 0.4 = 36 \div 4 = 9\)” satisface esa condición.
  - Divide la expresión equivalente y verifica multiplicando por el divisor original.
- titulo: ¿Es válido omitir el paso “Desplaza la coma del divisor hasta convertirlo
    en entero”? — División de decimales mediante amplificación por potencia de 10
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de división de decimales mediante
    amplificación por potencia de 10.
  - 'Omitirlo puede volver inválida la acción siguiente: Desplaza la coma del dividendo
    exactamente la misma cantidad de lugares.'
  - 'La solución debe terminar de este modo: Divide la expresión equivalente y verifica
    multiplicando por el divisor original.'
errores_frecuentes:
- 'Empezar división de decimales mediante amplificación por potencia de 10 sin realizar
  este control inicial: Desplaza la coma del divisor hasta convertirlo en entero.'
- Memorizar “\(3.6 \div 0.4 = 36 \div 4 = 9\)” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Desplaza la coma del dividendo exactamente la misma
  cantidad de lugares.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre división de decimales mediante amplificación
  por potencia de 10 que contradice el criterio “Multiplicar ambos términos por la
  misma potencia de 10 no cambia el cociente”.
- 'Cerrar el ejercicio sin esta comprobación específica: Divide la expresión equivalente
  y verifica multiplicando por el divisor original.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
