semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.ASINTOTA_VERTICAL
titulo: Asíntota vertical de la función logarítmica
objetivo: Reconocer que el eje $y$ es una asíntota vertical de $f(x)=\log_b(x)$.
introduccion: A medida que $x$ se acerca a $0$ por la derecha, el logaritmo crece o decrece sin límite, pero nunca
  llega a tocar el eje $y$. Esa barrera invisible es la asíntota vertical.
resumen: La gráfica de $f(x)=\log_b(x)$ tiene una **asíntota vertical** en la recta $x=0$ (el eje $y$), porque
  la función no está definida para $x\leq0$ y sus valores divergen al acercarse a ese límite.
explicacion: '### Definición formal


  La recta $x=0$ es asíntota vertical de $f(x)=\log_b(x)$ porque, cuando $x\to0^+$, se cumple que $f(x)\to+\infty$
  si $b>1$, o $f(x)\to-\infty$ si $0<b<1$; en ambos casos la gráfica se aproxima a la recta sin cruzarla, ya que
  $x=0$ no pertenece al dominio.


  ### Desarrollo didáctico


  Prueba con $b=2$: si $x=0{,}1$, entonces $\log_2(0{,}1)\approx-3{,}32$; si $x=0{,}0001$, entonces
  $\log_2(0{,}0001)\approx-13{,}29$. Mientras más se acerca $x$ a $0$, más negativo se vuelve el logaritmo, pero
  $x$ nunca llega a ser $0$ ni negativo dentro del dominio.'
procedimiento:
- 'Paso 1: Identifica que el dominio de $f(x)=\log_b(x)$ excluye $x=0$ y todo valor negativo.'
- 'Paso 2: Evalúa la función con valores de $x$ cada vez más cercanos a $0$ por la derecha.'
- 'Paso 3: Observa que los valores de $f(x)$ crecen o decrecen sin cota, señalando la asíntota en $x=0$.'
ejemplos:
- titulo: Comportamiento cerca de la asíntota
  enunciado: 'Describe qué ocurre con $f(x)=\log_2(x)$ cuando $x$ se acerca a $0$ por la derecha.'
  solucion_pasos:
  - Se evalúan valores decrecientes de $x$: $0{,}1$, $0{,}01$, $0{,}001$.
  - Los resultados $-3{,}32$, $-6{,}64$, $-9{,}97$ se vuelven cada vez más negativos sin límite.
- titulo: Identificación de la ecuación de la asíntota
  enunciado: '¿Cuál es la ecuación de la asíntota vertical de $f(x)=\log_5(x)$?'
  solucion_pasos:
  - El dominio de cualquier función logarítmica excluye $x=0$.
  - La asíntota vertical es siempre la recta $x=0$, independiente de la base.
- titulo: ¿La función logarítmica corta la asíntota vertical?
  enunciado: ¿La gráfica de $f(x)=\log_b(x)$ llega a tocar la recta $x=0$?
  respuesta: 'No'
  solucion_pasos:
  - $x=0$ no pertenece al dominio de la función logarítmica.
- titulo: ¿La asíntota vertical depende del valor de la base?
  enunciado: ¿La posición de la asíntota vertical cambia según el valor de la base $b$?
  respuesta: 'No'
  solucion_pasos:
  - Para toda base válida $b>0$, $b\neq1$, la asíntota vertical siempre es $x=0$.
errores_frecuentes:
- Confundir la asíntota vertical de la función logarítmica con la asíntota horizontal de la exponencial.
- Creer que la gráfica puede tocar o cruzar el eje $y$ para valores muy pequeños de $x$.
- Pensar que la posición de la asíntota depende de la base $b$.
- Olvidar mencionar que la asíntota es vertical y no horizontal al describir la gráfica.
