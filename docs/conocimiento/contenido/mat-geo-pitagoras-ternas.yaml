semantic_id: MAT.GEO.PITAGORAS.TERNAS
titulo: 'Identificación de ternas pitagóricas básicas: (3, 4, 5), (5, 12, 13), (8, 15, 17)'
objetivo: Reconocer las ternas pitagóricas básicas como conjuntos de tres números enteros que cumplen
  el teorema de Pitágoras.
introduccion: Algunos conjuntos de tres números enteros aparecen una y otra vez como lados de triángulos
  rectángulos; memorizar los más comunes agiliza mucho la resolución de problemas.
resumen: Una terna pitagórica es un conjunto de tres números enteros positivos que cumplen $a^2+b^2=c^2$;
  las más comunes son (3,4,5), (5,12,13) y (8,15,17).
explicacion: '![Terna pitagórica 3-4-5](/static/img/geometria/areas-pitagoras/pitagoras-ternas.svg)


  ### Definición formal


  Una terna pitagórica $(a,b,c)$ cumple $a^2+b^2=c^2$ con $a$, $b$, $c$ enteros positivos. Las básicas
  son (3,4,5), (5,12,13) y (8,15,17), y cualquier múltiplo entero de ellas (como 6,8,10) también es una
  terna pitagórica válida.


  ### Desarrollo didáctico


  Verificar (5,12,13): $5^2+12^2=25+144=169=13^2$. Al multiplicar por 2 se obtiene la terna (10,24,26),
  que también cumple: $10^2+24^2=100+576=676=26^2$.'
procedimiento:
- 'Paso 1: Memoriza las ternas pitagóricas básicas: (3,4,5), (5,12,13) y (8,15,17).'
- 'Paso 2: Reconoce si los lados de un problema son un múltiplo entero de alguna de ellas.'
- 'Paso 3: Usa la terna para evitar calcular raíces cuadradas manualmente.'
ejemplos:
- titulo: Reconocer un múltiplo de terna
  enunciado: Un triángulo rectángulo tiene catetos 6 y 8.
  solucion_pasos:
  - Es el doble de la terna 3-4-5, así que la hipotenusa es 10 (el doble de 5).
- titulo: Reconocer otra terna
  enunciado: Un triángulo rectángulo tiene catetos 15 y 20.
  solucion_pasos:
  - Es 5 veces la terna 3-4-5 (3×5=15, 4×5=20), así que la hipotenusa es 5×5=25.
- titulo: ¿(3,4,5) es la terna pitagórica más pequeña con números enteros?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la terna pitagórica primitiva más pequeña.
- titulo: ¿Cualquier múltiplo entero de una terna pitagórica es también una terna pitagórica?
  respuesta: Sí
  solucion_pasos:
  - Sí, si se multiplican los tres números por el mismo entero, la relación a²+b²=c² se sigue cumpliendo.
errores_frecuentes:
- No reconocer que un triángulo dado es un múltiplo de una terna conocida, calculando innecesariamente
  con raíces.
- Memorizar mal los números de una terna (por ejemplo, confundir 13 con 12 en la terna 5-12-13).
- Creer que solo existen esas tres ternas básicas, sin considerar sus múltiplos.
fuente: Elaboración propia.
estado: publicado
