semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.CORRESPONDIENTES_IGUALDAD
titulo: Propiedad de igualdad de medida de ángulos correspondientes entre paralelas
objetivo: Usar la propiedad de los ángulos correspondientes para justificar una medida y comprobar que
  la propiedad solo puede aplicarse después de verificar que el par elegido realmente es correspondientes.
introduccion: 'En geometría muchas igualdades parecen obvias porque el dibujo ''se ve bien''. Con paralelas
  y transversal conviene ir más lento: primero se nombra bien el par y recién después se transfiere la
  medida. Aquí lo trabajaremos con ejemplos concretos y verificaciones cortas.'
resumen: Si dos rectas paralelas son cortadas por una transversal, los ángulos correspondientes tienen
  igual medida. Como idea de control, la propiedad solo puede aplicarse después de verificar que el par
  elegido realmente es correspondientes.
explicacion: 'Si dos rectas paralelas son cortadas por una transversal, los ángulos correspondientes tienen
  igual medida.


  En el caso “si un ángulo correspondiente mide 41°, el otro correspondiente también mide 41°” esta idea
  se vuelve visible y permite comprobar que la propiedad solo puede aplicarse después de verificar que
  el par elegido realmente es correspondientes.'
procedimiento:
- 'Paso 1: Reconoce un par de ángulos correspondientes en el esquema.'
- 'Paso 2: Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.'
- 'Paso 3: Comprueba que el resultado respete la posición del par y la condición de paralelismo.'
ejemplos:
- titulo: Situación geométrica — Igualdad de correspondientes
  enunciado: Si un ángulo correspondiente mide 41°, el otro correspondiente también mide 41°.
  solucion_pasos:
  - Reconoce un par de ángulos correspondientes en el esquema.
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: Corrección de una respuesta — Igualdad de correspondientes
  enunciado: 'Revisa una solución del caso “si un ángulo correspondiente mide 41°, el otro correspondiente
    también mide 41°”: el resultado parece razonable, pero falta conectar el dibujo con la definición.
    Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: si dos rectas paralelas son cortadas por una transversal, los ángulos correspondientes
    tienen igual medida.'
  - Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿La interpretación del dibujo es válida? — Igualdad de correspondientes
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: si dos rectas paralelas son cortadas por una
    transversal, los ángulos correspondientes tienen igual medida.'
  - En el caso “si un ángulo correspondiente mide 41°, el otro correspondiente también mide 41°” se observa
    que la propiedad solo puede aplicarse después de verificar que el par elegido realmente es correspondientes.
  - Comprueba que el resultado respete la posición del par y la condición de paralelismo.
- titulo: ¿Se puede cerrar sin el control final? — Igualdad de correspondientes
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de propiedad de igualdad de medida de ángulos
    correspondientes entre paralelas.
  - Después del paso “Reconoce un par de ángulos correspondientes en el esquema.” todavía hace falta revisar
    “Usa la propiedad correspondiente para relacionar la medida conocida con la incógnita.”.
  - El cierre correcto exige “Comprueba que el resultado respete la posición del par y la condición de
    paralelismo.”.
errores_frecuentes:
- Igualdad de correspondientes significa ser suplementarios por parecer ubicados 'arriba' en el dibujo.
- Para resolver igualdad de correspondientes, basta con el paso “Reconoce un par de ángulos correspondientes
  en el esquema.” y no hace falta revisar “Usa la propiedad correspondiente para relacionar la medida
  conocida con la incógnita.”.
- Si el dibujo parece claro, se puede ignorar que la propiedad solo puede aplicarse después de verificar
  que el par elegido realmente es correspondientes.
- Dos configuraciones distintas representan igualdad de correspondientes solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que el resultado respete la posición
  del par y la condición de paralelismo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
estado: publicado
