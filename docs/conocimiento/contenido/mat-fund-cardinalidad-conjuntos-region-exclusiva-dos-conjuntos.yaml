semantic_id: MAT.FUND.CARDINALIDAD_CONJUNTOS.REGION_EXCLUSIVA_DOS_CONJUNTOS

objetivo: |
  Calcular la cardinalidad de la región exclusiva de un conjunto en un diagrama de
  Venn de dos conjuntos, aplicando la fórmula |A\B| = |A| - |A∩B| y su análoga
  para B.

introduccion: |
  En un diagrama de Venn de dos conjuntos A y B, la región «solo A» contiene los
  elementos que pertenecen a A pero no a B. Su cardinalidad se obtiene restando de
  |A| los elementos que A comparte con B, es decir, |A∩B|. Esta operación es
  fundamental para distribuir correctamente los elementos en cada región del diagrama
  antes de calcular totales o resolver problemas de conteo.

resumen: |
  Fórmulas para las regiones exclusivas en un diagrama de dos conjuntos:
  - Región «solo A»: |A\B| = |A| - |A∩B|
  - Región «solo B»: |B\A| = |B| - |A∩B|

  Estas fórmulas garantizan que la intersección no se cuente dos veces al sumar
  las regiones del diagrama.

explicacion: |
  El conjunto A se descompone en dos partes disjuntas:
    A = (A\B) ∪ (A∩B)

  Como las dos partes son disjuntas, sus cardinalidades suman:
    |A| = |A\B| + |A∩B|

  Despejando la región exclusiva:
    |A\B| = |A| - |A∩B|

  El razonamiento es simétrico para B:
    |B| = |B\A| + |A∩B|  →  |B\A| = |B| - |A∩B|

  Es importante que |A∩B| ≤ |A| y |A∩B| ≤ |B| para que las cardinalidades sean
  no negativas. Si los datos del problema violan esta condición, hay un error en
  los datos.

procedimiento: |
  Para calcular la cardinalidad de la región exclusiva de A (o B):

  Paso 1. Identificar los datos: |A|, |B| y |A∩B|.
  Paso 2. Verificar que |A∩B| ≤ |A| (y ≤ |B| si se necesita |B\A|).
  Paso 3. Aplicar la fórmula:
          |A\B| = |A| - |A∩B|
          |B\A| = |B| - |A∩B|
  Paso 4. Verificar: |A\B| + |A∩B| debe ser igual a |A|;
                     |B\A| + |A∩B| debe ser igual a |B|.

ejemplos:
  - tipo: A
    titulo: 'Calcular |A\B| y |B\A| con datos concretos'
    enunciado: |
      Dados |A| = 15, |B| = 10 y |A∩B| = 4, calcula |A\B| y |B\A|.
    solucion_pasos:
      - paso: 1
        descripcion: |
          Identificamos los datos: |A| = 15, |B| = 10, |A∩B| = 4.
      - paso: 2
        descripcion: |
          Verificamos: |A∩B| = 4 ≤ 15 = |A| ✓ y 4 ≤ 10 = |B| ✓.
      - paso: 3
        descripcion: |
          Calculamos la región «solo A»:
          |A\B| = |A| - |A∩B| = 15 - 4 = 11.
      - paso: 4
        descripcion: |
          Calculamos la región «solo B»:
          |B\A| = |B| - |A∩B| = 10 - 4 = 6.
      - paso: 5
        descripcion: |
          Verificación: 11 + 4 = 15 = |A| ✓ y 6 + 4 = 10 = |B| ✓.
          Resultado: |A\B| = 11, |B\A| = 6.

  - tipo: A
    titulo: 'Calcular |A\B| con |A|=20, |B|=12 y |A∩B|=7'
    enunciado: |
      Dados |A| = 20, |B| = 12 y |A∩B| = 7, calcula |A\B|.
    solucion_pasos:
      - paso: 1
        descripcion: |
          Identificamos los datos: |A| = 20, |A∩B| = 7.
      - paso: 2
        descripcion: |
          Verificamos: |A∩B| = 7 ≤ 20 = |A| ✓.
      - paso: 3
        descripcion: |
          Aplicamos la fórmula:
          |A\B| = |A| - |A∩B| = 20 - 7 = 13.
      - paso: 4
        descripcion: |
          Verificación: 13 + 7 = 20 = |A| ✓.
          Resultado: |A\B| = 13.

  - tipo: B
    titulo: '¿Es cierto que $|A \setminus B| = |A| - |A \cap B|$ siempre?'
    enunciado: |
      ¿Se cumple que $|A \setminus B| = |A| - |A \cap B|$ para todo par de conjuntos
      $A$ y $B$ con $A \cap B \subseteq A$?
    respuesta: 'Sí'
    solucion_pasos:
      - paso: 1
        descripcion: |
          Por definición, A se descompone en dos partes disjuntas:
          A = (A\B) ∪ (A∩B).
      - paso: 2
        descripcion: |
          Como las partes son disjuntas: |A| = |A\B| + |A∩B|.
      - paso: 3
        descripcion: |
          Despejando: |A\B| = |A| - |A∩B|. Esto es válido siempre que A∩B ⊆ A,
          lo que es siempre cierto por definición de intersección.
      - paso: 4
        descripcion: |
          Conclusión: Sí, la fórmula se cumple para cualquier par de conjuntos A y B. ✓

  - tipo: B
    titulo: '¿Puede $|A \setminus B|$ ser mayor que $|A|$?'
    enunciado: |
      ¿Puede $|A \setminus B|$ ser mayor que $|A|$?
    respuesta: 'No'
    solucion_pasos:
      - paso: 1
        descripcion: |
          $A \setminus B \subseteq A$ por definición (la diferencia es un subconjunto de A).
      - paso: 2
        descripcion: |
          Si un conjunto es subconjunto de otro, su cardinalidad no puede superar
          la del conjunto mayor: |A\B| ≤ |A|.
      - paso: 3
        descripcion: |
          Formalmente: |A\B| = |A| - |A∩B|. Como |A∩B| ≥ 0, se tiene |A\B| ≤ |A|.
      - paso: 4
        descripcion: |
          Conclusión: No, $|A \setminus B|$ nunca puede superar $|A|$. ✓

errores_frecuentes:
  - error: 'Restar |B| en lugar de |A∩B|: calcular |A\B| = |A| - |B|.'
    correccion: |
      Lo que se resta es la intersección, no el conjunto completo B. La fórmula
      correcta es |A\B| = |A| - |A∩B|.

  - error: 'Calcular |A\B| = |A| + |B| - |A∩B|, aplicando la fórmula de la unión.'
    correccion: |
      La fórmula de la unión es |A∪B| = |A| + |B| - |A∩B|. Para la región exclusiva
      se usa solo |A\B| = |A| - |A∩B|.

  - error: 'No verificar que |A∩B| ≤ |A|, obteniendo una cardinalidad negativa.'
    correccion: |
      Si |A∩B| > |A|, los datos del problema son inconsistentes. Siempre verificar
      la condición antes de calcular.

  - error: 'Confundir |A\B| con |B\A|, invirtiendo cuál conjunto es el minuendo.'
    correccion: |
      |A\B| = |A| - |A∩B| (se parte de A). |B\A| = |B| - |A∩B| (se parte de B).
      El resultado suele ser distinto si |A| ≠ |B|.

  - error: |
      Incluir la intersección en el conteo de la región exclusiva, sumando |A\B| + |A∩B|
      y llamando al resultado «solo A».
    correccion: |
      La región «solo A» excluye la intersección. El conteo correcto para la región
      exclusiva es únicamente |A\B| = |A| - |A∩B|, sin sumar |A∩B|.

fuente: 'Matemáticas para la Educación Media, MINEDUC'
estado: publicado
