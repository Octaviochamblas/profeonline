semantic_id: MAT.ALG.FUNCION_AFIN.COEFICIENTE_POSICION
titulo: Identificación del coeficiente de posición
objetivo: Identificar el coeficiente de posición de una función afín y su interpretación como valor inicial.
introduccion: 'El segundo parámetro de la función afín responde a una pregunta distinta a la pendiente:
  ¿en qué altura empieza la recta cuando $x$ vale cero?'
resumen: En una función afín $f(x) = mx + n$, el parámetro $n$ es el **coeficiente de posición**, el valor
  de la función cuando $x=0$, que determina dónde corta la gráfica al eje vertical.
explicacion: '### Definición formal


  Dada $f(x) = mx + n$, el coeficiente de posición satisface $n = f(0)$, ya que al evaluar en $x=0$ el
  término $mx$ se anula. Geométricamente, $n$ es la ordenada del punto donde la recta corta al eje $y$:
  el punto $(0, n)$.


  ### Desarrollo didáctico


  A diferencia de la pendiente, que controla la inclinación, $n$ controla la posición vertical de toda
  la recta: aumentar $n$ desplaza la recta hacia arriba, disminuirlo la desplaza hacia abajo.


  Si un plan de celular cuesta \$8000 fijos más \$50 por minuto, $C(x)=50x+8000$: el coeficiente de posición
  $8000$ representa el costo cuando no se usa ningún minuto ($x=0$).'
procedimiento:
- 'Paso 1: Identifica en la fórmula $mx+n$ el término independiente (sin la variable).'
- 'Paso 2: Ese término es el coeficiente de posición $n$.'
- 'Paso 3: Interprétalo como el valor de la función cuando $x=0$, o el punto de corte con el eje $y$.'
ejemplos:
- titulo: Identificación directa
  enunciado: Identifica el coeficiente de posición de $f(x) = 6x - 15$.
  solucion_pasos:
  - El término independiente es $-15$.
  - $n = -15$.
- titulo: Interpretación contextual
  enunciado: Si $C(x) = 200x + 3000$ modela el costo de $x$ productos con un cargo fijo, ¿qué representa
    $3000$?
  solucion_pasos:
  - Es el coeficiente de posición, el valor cuando $x=0$.
  - Representa el cargo fijo, presente incluso sin comprar ningún producto.
- titulo: ¿El coeficiente de posición es igual a $f(0)$?
  enunciado: ¿El coeficiente de posición es igual a $f(0)$?
  respuesta: Sí
  solucion_pasos:
  - Al evaluar $mx+n$ en $x=0$, el término $mx$ se anula, dejando exactamente $n$.
- titulo: ¿El coeficiente de posición afecta la inclinación de la recta?
  enunciado: ¿El coeficiente de posición afecta la inclinación de la recta?
  respuesta: 'No'
  solucion_pasos:
  - Solo desplaza verticalmente la recta; la inclinación depende exclusivamente de la pendiente $m$.
errores_frecuentes:
- Confundir el coeficiente de posición con la pendiente.
- Creer que $n$ representa siempre un valor positivo.
- Calcular $n$ evaluando en un valor de $x$ distinto de cero.
- No relacionar correctamente $n$ con el punto de corte en el eje $y$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
