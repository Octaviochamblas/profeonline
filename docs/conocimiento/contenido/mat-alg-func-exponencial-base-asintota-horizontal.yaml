semantic_id: MAT.ALG.FUNC_EXPONENCIAL_BASE.ASINTOTA_HORIZONTAL
titulo: Identificación de la asíntota horizontal de la función exponencial básica
objetivo: Identificar la asíntota horizontal de una función exponencial básica, comprendiendo su significado
  geométrico.
introduccion: A medida que el exponente se hace muy negativo (o muy positivo, según la base), la curva exponencial
  se acerca cada vez más a una recta horizontal, sin nunca llegar a tocarla.
resumen: La **asíntota horizontal** de $f(x)=a\cdot b^x$ (sin traslación vertical) es siempre la recta $y=0$
  (el eje $x$), a la que la gráfica se aproxima sin nunca tocarla.
explicacion: '### Definición formal


  Una asíntota horizontal es una recta a la que la gráfica de una función se aproxima indefinidamente sin tocarla.
  Para $f(x)=a\cdot b^x$ sin traslación vertical, cuando $x\to-\infty$ (si $b>1$) o $x\to+\infty$ (si $0<b<1$),
  el valor de $f(x)$ se acerca a $0$ sin alcanzarlo nunca, por lo que la asíntota horizontal es $y=0$.


  ### Desarrollo didáctico


  Geométricamente, esta asíntota corresponde exactamente al eje $x$ del plano cartesiano, en la dirección hacia
  la cual la curva "se aplana" cada vez más.


  Para $f(x)=2\cdot3^x$ (creciente, pues $b=3>1$): a medida que $x\to-\infty$, $f(x)\to0$, aproximándose a la
  asíntota $y=0$ sin tocarla nunca.'
procedimiento:
- 'Paso 1: Verifica que la función exponencial no tenga traslación vertical.'
- 'Paso 2: Concluye que la asíntota horizontal es la recta $y=0$.'
ejemplos:
- titulo: Identificación de asíntota en función creciente
  enunciado: 'Identifica la asíntota horizontal de $f(x)=4\cdot5^x$.'
  solucion_pasos:
  - No hay traslación vertical.
  - La asíntota horizontal es $y=0$.
- titulo: Identificación de asíntota en función decreciente
  enunciado: 'Identifica la asíntota horizontal de $f(x)=7\cdot0{,}2^x$.'
  solucion_pasos:
  - No hay traslación vertical.
  - La asíntota horizontal es $y=0$.
- titulo: ¿La gráfica de una función exponencial básica toca alguna vez su asíntota horizontal?
  enunciado: ¿La gráfica de una función exponencial básica toca alguna vez su asíntota horizontal?
  respuesta: 'No'
  solucion_pasos:
  - La curva se aproxima indefinidamente a la asíntota sin tocarla, ya que la función nunca alcanza el valor
    cero.
- titulo: ¿La asíntota horizontal depende del valor de la base $b$?
  enunciado: ¿La asíntota horizontal depende del valor de la base $b$?
  respuesta: 'No'
  solucion_pasos:
  - Sin importar si $b>1$ o $0<b<1$, la asíntota horizontal de la función exponencial básica es siempre $y=0$.
errores_frecuentes:
- Confundir la asíntota horizontal con el intercepto con el eje $y$.
- Asumir que la gráfica cruza su asíntota horizontal en algún punto.
- Confundir asíntota horizontal (recta $y=\ldots$) con asíntota vertical (recta $x=\ldots$).
- No reconocer que, sin traslación vertical, la asíntota siempre coincide con el eje $x$.
