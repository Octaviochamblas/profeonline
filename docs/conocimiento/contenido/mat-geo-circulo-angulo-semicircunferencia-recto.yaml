semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_SEMICIRCUNFERENCIA_RECTO
titulo: Ángulo inscrito en una semicircunferencia como ángulo recto
objetivo: Reconocer y aplicar que todo ángulo inscrito que subtiende un diámetro (es decir, que abarca
  una semicircunferencia) es un ángulo recto.
introduccion: Cuando un ángulo inscrito 'abraza' exactamente media circunferencia (un diámetro), siempre
  mide 90°, sin importar dónde esté ubicado el vértice.
resumen: Si $AB$ es un diámetro de una circunferencia y $C$ es cualquier otro punto de ella, el ángulo
  inscrito $\angle ACB$ es siempre recto (mide 90°).
explicacion: '![Ángulo inscrito en semicircunferencia es recto](/static/img/geometria/circunferencia-circulo/circulo-angulo-semicircunferencia-recto.svg)


  ### Definición formal


  Si $AB$ es un diámetro de la circunferencia, el arco $AB$ (por cualquiera de los dos lados) mide 180°.
  Como el ángulo inscrito mide la mitad de su arco subtendido, $m(\angle ACB)=\frac{180°}{2}=90°$ para
  cualquier punto $C$ de la circunferencia distinto de $A$ y $B$.


  ### Desarrollo didáctico


  Este resultado, conocido también como el teorema de Tales del ángulo inscrito, es un caso particular
  directo de la relación entre ángulo inscrito y mitad del arco: como el diámetro divide la circunferencia
  en dos arcos de 180° cada uno, el ángulo inscrito correspondiente siempre es de 90°, sin importar la
  posición exacta de $C$ sobre la semicircunferencia.'
procedimiento:
- 'Paso 1: Verifica que el lado opuesto al vértice del ángulo inscrito sea un diámetro de la circunferencia.'
- 'Paso 2: Aplica que el arco subtendido por ese diámetro mide 180°.'
- 'Paso 3: Concluye que el ángulo inscrito mide 180°/2 = 90°, sin necesidad de más cálculos.'
ejemplos:
- titulo: Reconocer un ángulo recto inscrito en semicircunferencia
  enunciado: AB es un diámetro de una circunferencia y C es otro punto de ella.
  solucion_pasos:
  - Como AB es diámetro, el arco AB mide 180°, por lo tanto ∠ACB=180°/2=90°.
- titulo: Usar esta propiedad para determinar un lado desconocido
  enunciado: En un triángulo ACB inscrito en una circunferencia, AB es diámetro y mide 10 cm; AC mide
    6 cm.
  solucion_pasos:
  - Como ∠ACB=90°, el triángulo es rectángulo en C; por Pitágoras, BC=√(10²-6²)=√64=8 cm.
- titulo: ¿Esta propiedad se cumple sin importar la posición de C?
  respuesta: Sí
  solucion_pasos:
  - Sí, mientras AB sea diámetro, cualquier punto C de la circunferencia forma un ángulo recto en C.
- titulo: ¿El ángulo ACB es recto si AB es una cuerda cualquiera (no diámetro)?
  respuesta: 'No'
  solucion_pasos:
  - No, la propiedad exige específicamente que AB sea un diámetro (arco de 180°); con otra cuerda el ángulo
    sería distinto de 90°.
errores_frecuentes:
- Aplicar esta propiedad a cualquier cuerda AB, sin verificar que efectivamente sea un diámetro.
- Olvidar que el punto C debe ser distinto de A y B para que el ángulo esté bien definido.
- No aprovechar esta propiedad para aplicar el teorema de Pitágoras en problemas de triángulos rectángulos
  inscritos.
fuente: 'Elaboración propia (referencias: Moraleja 74, Cid 95).'
estado: publicado
