semantic_id: MAT.EST.NORMAL_CALCULO.UBICACION_FILA_COLUMNA
titulo: Ubicar fila y columna para leer un valor Z en la tabla
objetivo: Ubicar correctamente la fila y la columna correspondientes a un valor Z dentro de la tabla normal estándar.
introduccion: La tabla Z se lee como un plano de coordenadas, donde la fila te da la parte entera y el primer
  decimal, y la columna te da el segundo decimal.
resumen: En la tabla Z, la fila indica el valor entero y el primer decimal de Z, mientras que la columna indica el
  segundo decimal.
explicacion: '![Ubicación de fila y columna en la tabla Z](/static/img/estadistica/normcalc/normcalc-ubicacion-fila-columna.svg)


  ### Definición formal


  En la tabla Z estándar, las filas suelen representar el valor de $Z$ hasta el primer decimal (por ejemplo, 1,2), y

  las columnas representan el segundo decimal (por ejemplo, 0,03), de modo que la celda donde se cruzan entrega

  $P(Z\leq 1{,}23)$.


  ### Desarrollo didáctico


  Es fundamental identificar correctamente ambas coordenadas antes de leer el valor, ya que un error en la fila o la

  columna entrega la probabilidad de un valor Z distinto al buscado.'
procedimiento:
- 'Paso 1: Separa el valor de $Z$ en su parte entera con un decimal, y su segundo decimal.'
- 'Paso 2: Busca la fila correspondiente a la parte entera con un decimal.'
- 'Paso 3: Busca la columna correspondiente al segundo decimal y lee el valor en la intersección.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Para buscar $P(Z\leq 1{,}23)$ en la tabla, ¿qué fila y qué columna se deben usar?
  solucion_pasos:
  - La fila corresponde a 1,2.
  - La columna corresponde a 0,03.
- titulo: Ejemplo 2
  enunciado: ¿Qué ocurre si se usa la fila o columna equivocada al leer la tabla Z?
  solucion_pasos:
  - Se obtiene la probabilidad de un valor Z distinto al que realmente se buscaba.
- titulo: ¿La fila de la tabla Z suele representar el valor entero y el primer decimal?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la convención habitual de estas tablas.
- titulo: ¿La columna de la tabla Z representa el valor entero de Z?
  respuesta: 'No'
  solucion_pasos:
  - 'No, la columna representa el segundo decimal; el valor entero va en la fila.'
errores_frecuentes:
- Confundir la fila con la columna al leer la tabla.
- Redondear el valor de Z antes de ubicarlo, perdiendo precisión en la lectura.
- No revisar si la tabla es de una o dos colas antes de leer el valor.
- Leer la celda vecina por error de alineación visual.
- Olvidar que distintas tablas pueden tener formatos ligeramente distintos.
fuente: 'Elaboración propia (referencia: Moraleja 308).'
estado: publicado
