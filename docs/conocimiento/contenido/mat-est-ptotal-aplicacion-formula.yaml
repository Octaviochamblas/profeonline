semantic_id: MAT.EST.PROBABILIDAD_TOTAL.APLICACION_FORMULA
titulo: Aplicación de la fórmula de probabilidad total en problemas de dos o más casos
objetivo: Aplicar la fórmula del teorema de la probabilidad total a problemas concretos con dos o más
  categorías en la partición.
introduccion: Más allá de conocer el enunciado formal, es fundamental practicar la sustitución correcta
  de valores concretos en la fórmula para resolver problemas reales.
resumen: Para aplicar la fórmula, se identifican las probabilidades de cada parte de la partición y las
  probabilidades condicionales correspondientes, sustituyéndolas directamente en $P(A)=\sum P(B_i)\times
  P(A|B_i)$.
explicacion: '![Aplicación de la fórmula de probabilidad total](/static/img/probabilidad/ptotal/ptotal-aplicacion-formula.svg)


  ### Definición formal


  Dados $P(B_i)$ y $P(A|B_i)$ para cada parte de la partición, se calcula cada producto $P(B_i)\times
  P(A|B_i)$ y se suman todos para obtener $P(A)$.


  ### Desarrollo didáctico


  Un producto proviene del proveedor X (70% del stock, 3% defectuoso) o del proveedor Y (30% del stock,
  8% defectuoso). La probabilidad total de que un producto cualquiera sea defectuoso es $P(\text{defectuoso})=0{,}7\times0{,}03+0{,}3\times0{,}08=0{,}021+0{,}024=0{,}045$.'
procedimiento:
- 'Paso 1: Lista las probabilidades P(Bi) de cada parte de la partición mencionada en el problema.'
- 'Paso 2: Lista las probabilidades condicionales P(A|Bi) correspondientes a cada parte.'
- 'Paso 3: Calcula cada producto P(Bi)×P(A|Bi) y súmalos todos para obtener P(A).'
ejemplos:
- titulo: Aplicar la fórmula con dos proveedores
  enunciado: P(X)=0,7, P(Y)=0,3, P(defectuosa|X)=0,03, P(defectuosa|Y)=0,08.
  solucion_pasos:
  - P(defectuosa)=0,7×0,03+0,3×0,08=0,021+0,024=0,045.
- titulo: Aplicar la fórmula con tres turnos de producción
  enunciado: Turno mañana (40%, 2% defecto), turno tarde (35%, 3% defecto), turno noche (25%, 5% defecto).
  solucion_pasos:
  - P(defectuosa)=0,4×0,02+0,35×0,03+0,25×0,05=0,008+0,0105+0,0125=0,031.
- titulo: ¿Se deben sumar todos los productos calculados para cada parte de la partición?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el paso final de la aplicación de la fórmula.
- titulo: ¿El resultado final siempre debe estar entre 0 y 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que representa una probabilidad válida.
errores_frecuentes:
- Olvidar sumar todos los productos correspondientes a cada parte de la partición, calculando solo uno
  de ellos.
- Confundir P(Bi) con P(A|Bi) al sustituir los valores en la fórmula.
- Cometer errores aritméticos al calcular los productos o la suma final.
fuente: 'Elaboración propia (referencia: Moraleja 294).'
estado: publicado
