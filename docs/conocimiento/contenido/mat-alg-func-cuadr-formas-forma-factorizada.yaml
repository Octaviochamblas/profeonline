semantic_id: MAT.ALG.FUNC_CUADR_FORMAS.FORMA_FACTORIZADA
titulo: Reconocimiento de la forma factorizada de una función cuadrática
objetivo: Reconocer la forma factorizada de una función cuadrática y su utilidad para identificar los ceros directamente.
introduccion: Así como la forma canónica expone el vértice, existe otra forma que expone directamente los puntos
  donde la parábola cruza el eje $x$.
resumen: La **forma factorizada** de una función cuadrática es $f(x)=a(x-r_1)(x-r_2)$, donde $r_1$ y $r_2$ son
  directamente los ceros (raíces) de la función.
explicacion: '### Definición formal


  La forma factorizada de una función cuadrática es $f(x)=a(x-r_1)(x-r_2)$, con $a \neq 0$ y $r_1, r_2$ los ceros
  de la función. Esta forma existe siempre que la función tenga ceros reales, es decir, cuando el discriminante
  de la ecuación asociada es no negativo.


  ### Desarrollo didáctico


  Al observar una función en forma factorizada, los ceros se leen directamente cambiando el signo de los números
  dentro de cada paréntesis.


  En $f(x)=2(x-3)(x+5)$: los ceros son $x=3$ y $x=-5$, leídos directamente de los factores.'
procedimiento:
- 'Paso 1: Verifica que la función esté expresada como $a(x-r_1)(x-r_2)$.'
- 'Paso 2: Identifica $r_1$ y $r_2$, reescribiendo cada binomio si es necesario para leer su signo correctamente.'
ejemplos:
- titulo: Reconocimiento de una función en forma factorizada
  enunciado: '¿Está $f(x)=-2(x-1)(x-6)$ en forma factorizada?'
  solucion_pasos:
  - Tiene la estructura $a(x-r_1)(x-r_2)$, con $a=-2$.
  - Sí, está en forma factorizada.
- titulo: Identificación de los ceros desde la forma factorizada
  enunciado: '¿Cuáles son los ceros de $f(x)=3(x+2)(x-7)$?'
  solucion_pasos:
  - 'Reescribiendo $(x+2)$ como $(x-(-2))$: un cero es $x=-2$.'
  - El otro cero es $x=7$.
- titulo: ¿Toda función cuadrática admite forma factorizada con números reales?
  enunciado: ¿Toda función cuadrática admite forma factorizada con números reales?
  respuesta: 'No'
  solucion_pasos:
  - Solo si la función tiene al menos un cero real, es decir, si el discriminante de la ecuación asociada es no
    negativo.
- titulo: ¿El coeficiente $a$ en la forma factorizada es el mismo que en la forma general?
  enunciado: ¿El coeficiente $a$ en la forma factorizada es el mismo que en la forma general?
  respuesta: Sí
  solucion_pasos:
  - El coeficiente principal se conserva idéntico entre todas las formas equivalentes de la misma función.
errores_frecuentes:
- Leer los ceros con el signo incorrecto al no reescribir el binomio en la forma $(x-r)$.
- Confundir la forma factorizada con la forma canónica.
- Asumir que toda función tiene forma factorizada con números reales, sin verificar el discriminante.
- Olvidar el coeficiente $a$ al escribir o interpretar la forma factorizada.
