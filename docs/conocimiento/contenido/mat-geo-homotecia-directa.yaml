semantic_id: MAT.GEO.HOMOTECIA.DIRECTA
titulo: Homotecia directa con razón positiva
objetivo: Reconocer las propiedades de una homotecia directa, aquella cuya razón k es positiva.
introduccion: Según el signo de la razón k, las homotecias se dividen en dos tipos con comportamientos
  visuales muy distintos; el primero es la homotecia directa.
resumen: Una homotecia es directa cuando su razón $k$ es positiva ($k>0$); en este caso, cada punto imagen
  queda del mismo lado del centro que su punto original.
explicacion: '![Homotecia directa (razón positiva)](/static/img/geometria/congruencia-semejanza/homotecia-directa.svg)


  ### Definición formal


  Si $k>0$, la homotecia se llama directa: para cada punto $P$, su imagen $P''=O+k(P-O)$ se ubica en el
  mismo rayo (semirrecta) que parte de $O$ y pasa por $P$.


  ### Desarrollo didáctico


  En una homotecia directa, la figura imagen conserva la misma orientación que la original (no se invierte);
  solo cambia de tamaño según el valor de $k$ (ampliándose si $k>1$, reduciéndose si $0<k<1$).'
procedimiento:
- 'Paso 1: Observa el signo de la razón de homotecia k.'
- 'Paso 2: Si k es positivo, la homotecia es directa.'
- 'Paso 3: Verifica que cada punto imagen esté del mismo lado del centro que su punto original.'
ejemplos:
- titulo: Identificar una homotecia directa
  enunciado: Una homotecia tiene razón k=2.
  solucion_pasos:
  - Es una homotecia directa, ya que k>0.
- titulo: Verificar la orientación en una homotecia directa
  enunciado: Se aplica una homotecia directa a un triángulo.
  solucion_pasos:
  - La figura imagen mantiene la misma orientación que la original, solo cambia de tamaño.
- titulo: ¿Una homotecia con k=0,5 es directa?
  respuesta: Sí
  solucion_pasos:
  - Sí, sigue siendo directa porque 0,5 es positivo, aunque produzca una reducción.
- titulo: ¿La homotecia directa invierte la figura?
  respuesta: 'No'
  solucion_pasos:
  - No, la orientación se mantiene igual a la original.
errores_frecuentes:
- Creer que 'directa' significa necesariamente que la figura se amplía (en realidad, también puede reducirse
  si 0<k<1).
- Confundir homotecia directa con congruencia, sin considerar que puede cambiar de tamaño.
- No verificar el signo de k antes de clasificar la homotecia como directa o inversa.
fuente: 'Fuente: Moraleja 154.'
estado: publicado
