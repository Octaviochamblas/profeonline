semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.DISTANCIA_PUNTO_RECTA_FORMULA
titulo: Reconocimiento de la fórmula de distancia de un punto a una recta
objetivo: Reconocer la fórmula que permite calcular la distancia mínima (perpendicular) entre un punto
  y una recta dada en forma general.
introduccion: La distancia de un punto a una recta se define como la longitud del segmento perpendicular
  más corto que los une, y existe una fórmula directa para calcularla sin necesidad de encontrar ese punto
  de intersección perpendicular.
resumen: La distancia de un punto $(x_0,y_0)$ a una recta $Ax+By+C=0$ es $d=\dfrac{|Ax_0+By_0+C|}{\sqrt{A^2+B^2}}$.
explicacion: '![Fórmula de distancia de un punto a una recta](/static/img/geometria/analitica/posrc-distancia-punto-recta-formula.svg)


  ### Definición formal


  Dada la recta $Ax+By+C=0$ y el punto $(x_0,y_0)$, la distancia mínima entre ambos es $d=\dfrac{|Ax_0+By_0+C|}{\sqrt{A^2+B^2}}$,
  usando el valor absoluto para garantizar una distancia positiva.


  ### Desarrollo didáctico


  Para la recta $x-y-1=0$ (A=1, B=-1, C=-1) y el punto $P(-2,3)$: $d=\dfrac{|1\times(-2)+(-1)\times3-1|}{\sqrt{1+1}}=\dfrac{|-2-3-1|}{\sqrt2}=\dfrac{6}{\sqrt2}\approx4{,}24$.'
procedimiento:
- 'Paso 1: Escribe la ecuación de la recta en forma general Ax+By+C=0, identificando A, B y C.'
- 'Paso 2: Sustituye las coordenadas del punto (x0,y0) en la expresión Ax0+By0+C.'
- 'Paso 3: Toma el valor absoluto del resultado y divídelo por √(A²+B²).'
ejemplos:
- titulo: Calcular la distancia de P(-2,3) a la recta x-y-1=0
  enunciado: A=1, B=-1, C=-1, P(-2,3).
  solucion_pasos:
  - d=|1×(-2)+(-1)×3-1|/√2=|-6|/√2=6/√2≈4,24.
- titulo: Calcular la distancia de P(0,0) a la recta 3x+4y-10=0
  enunciado: A=3, B=4, C=-10, P(0,0).
  solucion_pasos:
  - d=|0+0-10|/√(9+16)=10/5=2.
- titulo: ¿Se usa el valor absoluto en esta fórmula para garantizar un resultado positivo?
  respuesta: Sí
  solucion_pasos:
  - Sí, la distancia siempre debe ser un valor no negativo.
- titulo: ¿Esta fórmula requiere que la recta esté en forma general?
  respuesta: Sí
  solucion_pasos:
  - Sí, se necesitan los coeficientes A, B y C tal como aparecen en Ax+By+C=0.
errores_frecuentes:
- Olvidar tomar el valor absoluto del numerador antes de dividir.
- Usar la ecuación de la recta en forma principal en vez de convertirla primero a forma general.
- Confundir las coordenadas del punto al sustituirlas en la fórmula.
fuente: Elaboración propia.
estado: publicado
