semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.PRODUCTO
titulo: Propiedad del logaritmo de un producto
objetivo: Aplicar la propiedad $\log_b(xy)=\log_b(x)+\log_b(y)$ para transformar productos en sumas dentro de
  expresiones algebraicas.
introduccion: Igual que las potencias transforman productos en sumas de exponentes, los logaritmos transforman
  productos de argumentos en sumas de logaritmos.
resumen: La propiedad del **producto** establece que $\log_b(xy)=\log_b(x)+\log_b(y)$, siempre que $x>0$ e
  $y>0$, permitiendo separar o combinar factores dentro de un logaritmo.
explicacion: '### Definición formal


  Para $b>0$, $b\neq1$, $x>0$ e $y>0$, se cumple $\log_b(xy)=\log_b(x)+\log_b(y)$. Se demuestra definiendo
  $m=\log_b(x)$ y $n=\log_b(y)$, de modo que $b^m=x$ y $b^n=y$; al multiplicar, $xy=b^{m+n}$, y aplicando el
  logaritmo se obtiene la igualdad.


  ### Desarrollo didáctico


  $\log_2(4\cdot8)=\log_2(4)+\log_2(8)=2+3=5$, lo mismo que calcular directamente $\log_2(32)=5$. En álgebra,
  esto permite separar $\log_b(x^2y)$ en $\log_b(x^2)+\log_b(y)$, preparando la expresión para simplificaciones
  posteriores.'
procedimiento:
- 'Paso 1: Identifica el producto dentro del argumento del logaritmo.'
- 'Paso 2: Separa el logaritmo en una suma de logaritmos, uno por cada factor.'
- 'Paso 3: Verifica que cada factor sea positivo antes de dar por válida la separación.'
ejemplos:
- titulo: Separación de un producto numérico
  enunciado: 'Aplica la propiedad del producto a $\log_3(9\cdot27)$.'
  solucion_pasos:
  - Se separa en $\log_3(9)+\log_3(27)$.
  - 'Se calcula: $2+3=5$, igual a $\log_3(243)$.'
- titulo: Separación de un producto algebraico
  enunciado: 'Aplica la propiedad del producto a $\log_5(x\cdot y^2)$.'
  solucion_pasos:
  - Se separa en $\log_5(x)+\log_5(y^2)$.
  - La expresión queda lista para simplificar $\log_5(y^2)$ con la propiedad de la potencia.
- titulo: ¿Se puede aplicar la propiedad del producto con factores negativos?
  enunciado: ¿Es válido separar $\log_2((-3)\cdot(-4))$ como $\log_2(-3)+\log_2(-4)$?
  respuesta: 'No'
  solucion_pasos:
  - Cada factor debe ser positivo por separado; $-3$ y $-4$ no cumplen esa condición.
- titulo: ¿La propiedad del producto combina o separa términos?
  enunciado: ¿Puede usarse $\log_b(x)+\log_b(y)=\log_b(xy)$ para combinar dos logaritmos en uno solo?
  respuesta: Sí
  solucion_pasos:
  - La propiedad funciona en ambos sentidos: separar un producto o combinar una suma de logaritmos.
errores_frecuentes:
- Confundir la propiedad del producto con $\log_b(x)\cdot\log_b(y)$, que no es una identidad válida.
- Aplicar la separación sin verificar que ambos factores sean positivos.
- Olvidar que la propiedad solo aplica a productos, no a sumas dentro del argumento.
- Combinar logaritmos de distinta base como si compartieran la misma propiedad.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
