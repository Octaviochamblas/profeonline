semantic_id: MAT.ALG.ECUACIONES_LITERALES.DESPEJE_FORMULA_FISICA
titulo: Despeje en Fórmulas de Física
objetivo: Manipular ecuaciones cinemáticas y dinámicas para aislar variables específicas.
explicacion: |
  En física, despejar bien es de vida o muerte. Imagina la fórmula de movimiento rectilíneo: $V_f = V_i + a \cdot t$.

  Si necesitas calcular el tiempo ($t$) necesario para alcanzar una velocidad:
  1. El término $V_i$ está sumando a nuestro bloque objetivo. Lo mandamos restando: $V_f - V_i = a \cdot t$.
  2. La aceleración ($a$) está multiplicando al tiempo. La mandamos a dividir todo el bloque izquierdo: $t = \frac{V_f - V_i}{a}$.

  La clave en fórmulas físicas es reconocer los 'bloques' enteros de términos. No puedes arrancar la 'a' si antes no te deshiciste del término independiente $V_i$.
procedimiento: |
  1. Identifica la variable objetivo.
  2. Despeja sumandos enteros primero (transponiéndolos al lado opuesto).
  3. Despeja factores multiplicativos o divisores al final.
  4. Revisa que las unidades tengan sentido.
