semantic_id: 'MAT.ALG.ECUACIONES_LITERALES.DESPEJE_FORMULA_FISICA'
titulo: 'Despeje en Fórmulas de Física'
objetivo: 'Manipular ecuaciones cinemáticas y dinámicas para aislar variables específicas.'
introduccion: |
  En física, despejar bien es de vida o muerte. Imagina la fórmula de movimiento rectilíneo: $V_f = V_i + a \cdot t$.
resumen: |
  La clave en fórmulas físicas es reconocer los 'término compuestos' enteros de términos. No puedes arrancar la 'a' si antes no te deshiciste del término independiente $V_i$.
explicacion: |
  Si necesitas calcular el tiempo ($t$) necesario para alcanzar una velocidad:
  1. El término $V_i$ está sumando a nuestro término compuesto objetivo. Lo mandamos restando: $V_f - V_i = a \cdot t$.
  2. La aceleración ($a$) está multiplicando al tiempo. La mandamos a dividir todo el término compuesto izquierdo: $t = \frac{V_f - V_i}{a}$.
procedimiento:
  - 'Paso 1: Identifica la variable objetivo.'
  - 'Paso 2: Despeja sumandos enteros primero (transponiéndolos al lado opuesto).'
  - 'Paso 3: Despeja factores multiplicativos o divisores al final.'
  - 'Paso 4: Revisa que las unidades tengan sentido.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
