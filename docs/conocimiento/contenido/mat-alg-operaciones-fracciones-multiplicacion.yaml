semantic_id: 'MAT.ALG.OPERACIONES_FRACCIONES.MULTIPLICACION'
titulo: 'Multiplicación de Fracciones Algebraicas'
objetivo: 'Multiplicar dos o más fracciones algebraicas factorizando y simplificando antes de operar.'
introduccion: |
  Multiplicar fracciones es la operación más directa de todas: el de arriba con el de arriba y el de abajo con el de abajo. Pero en álgebra, multiplicar polinomios grandes antes de simplificar te llevará a expresiones gigantescas. El secreto es: ¡Factoriza y tacha primero, multiplica al final!
resumen: |
  Para multiplicar fracciones algebraicas, multiplica numeradores entre sí y denominadores entre sí ( $\frac{A}{B} \cdot \frac{C}{D} = \frac{AC}{BD}$ ). Es fundamental factorizar todos los polinomios primero y cancelar factores comunes cruzados antes de multiplicar.
explicacion: |
  En aritmética: $\frac{2}{3} \cdot \frac{9}{4} = \frac{18}{12} = \frac{3}{2}$.
  En álgebra, aplicar este método bruto de multiplicar primero puede crear monstruos polinomiales de grado 4 o 5.

  Estrategia ninja:
  1. Factorizamos todo en ambas fracciones.
  2. Todo lo que esté en cualquier numerador (de la primera o segunda fracción) puede cancelarse con cualquier cosa idéntica de cualquier denominador.

  Ejemplo: $\frac{x^2 - 1}{x} \cdot \frac{x^2}{x + 1}$
  - Factorizamos: $\frac{(x-1)(x+1)}{x} \cdot \frac{x \cdot x}{x + 1}$
  - Vemos un $(x+1)$ arriba en la primera y abajo en la segunda. ¡Los tachamos!
  - Vemos una $x$ abajo en la primera y una $x$ libre arriba en la segunda. ¡Las tachamos!
  - Sobrevivientes: Arriba quedó $(x-1)$ y una $x$. Abajo quedó 1.
  - Resultado final: $x(x-1) = x^2 - x$.
procedimiento:
  - 'Paso 1: Factoriza completamente TODOS los numeradores y TODOS los denominadores de todas las fracciones involucradas.'
  - 'Paso 2: Busca factores idénticos. Puedes tachar cualquier factor de cualquier numerador con cualquier factor de cualquier denominador (incluso de forma cruzada).'
  - 'Paso 3: Multiplica en línea recta los factores sobrevivientes en los numeradores.'
  - 'Paso 4: Multiplica en línea recta los factores sobrevivientes en los denominadores.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Multiplica $\frac{x^2 - 4}{3x} \cdot \frac{6x^2}{x - 2}$.'
    solucion_pasos:
    - 'Factorizamos: $\frac{(x-2)(x+2)}{3x} \cdot \frac{6x^2}{x-2}$.'
    - 'Tachamos $(x-2)$ de arriba y abajo.'
    - 'Simplificamos $6x^2$ con $3x$: nos queda $2x$ arriba.'
    - 'Sobrevive: $(x+2) \cdot 2x$.'
    - 'Resultado: $2x(x+2) = 2x^2 + 4x$.'
  - titulo: 'Multiplica $\frac{a}{b} \cdot \frac{b}{c} \cdot \frac{c}{a}$.'
    respuesta: '1'
    solucion_pasos:
    - 'Todo se cancela cruzado: ''a'' con ''a'', ''b'' con ''b'', ''c'' con ''c''. Cuando todo se simplifica en una división/multiplicación, el resultado es 1.'
errores_frecuentes:
  - 'Multiplicar los polinomios término a término antes de simplificar (lo que resulta en un polinomio gigantesco muy difícil de factorizar después).'
  - 'Tachar horizontalmente (numerador con numerador).'
estado: publicado
