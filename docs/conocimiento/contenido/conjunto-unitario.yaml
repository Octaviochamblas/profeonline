semantic_id: MAT.FUND.CONJUNTOS_BASICOS.CONJUNTO_UNITARIO
titulo: Conjunto unitario
objetivo: Comprender conjunto unitario y aplicarlo correctamente en situaciones básicas.
introduccion: 'El estudio de conjunto unitario ayuda a organizar ideas y evitar errores frecuentes de
  interpretación.


  Cuando comprendemos este recurso, podemos leer mejor enunciados, representar conjuntos con precisión
  y justificar conclusiones matemáticas con lenguaje claro.'
resumen: Un conjunto unitario es un conjunto que tiene exactamente un elemento. Además, la cardinalidad
  de un conjunto unitario es 1.
explicacion: 'Un conjunto unitario es un conjunto que tiene exactamente un elemento. Esta idea aparece
  de manera natural cuando trabajamos con lenguaje de conjuntos o con representaciones formales.


  Una forma útil de reconocerla es recordar que la cardinalidad de un conjunto unitario es 1.


  Por ejemplo: El conjunto {7} es unitario porque contiene un solo elemento.'
procedimiento: '1. Identifica qué objetos o expresiones intervienen en la situación.

  2. Determina qué idea de teoría de conjuntos se está usando.

  3. Verifica la notación o la propiedad relevante del concepto.

  4. Concluye usando una representación correcta del conjunto.'
ejemplos:
- tipo: A
  titulo: Identificar el concepto en contexto
  enunciado: Explica por qué el caso “El conjunto {7} es unitario porque contiene un solo elemento.” corresponde
    a conjunto unitario.
  solucion_pasos: '1. Observa qué objetos o expresiones aparecen.

    2. Compáralos con la definición: un conjunto unitario es un conjunto que tiene exactamente un elemento.

    3. Concluye que el caso sí corresponde a conjunto unitario.'
- tipo: A
  titulo: Recordar la idea clave
  enunciado: 'Justifica la afirmación: “La cardinalidad de un conjunto unitario es 1.”.'
  solucion_pasos: '1. Parte de la definición del concepto.

    2. Relaciona esa definición con la propiedad indicada.

    3. Explica por qué la afirmación es correcta en este recurso.'
- tipo: B
  titulo: Verificar una afirmación
  respuesta: Sí
  solucion_pasos: Sí. El ejemplo “El conjunto {7} es unitario porque contiene un solo elemento.” es una
    aplicación válida de conjunto unitario.
- tipo: B
  titulo: Descartar una confusión
  respuesta: 'No'
  solucion_pasos: 'No. Conjunto unitario no debe confundirse con otra noción distinta; su definición correcta
    es: un conjunto unitario es un conjunto que tiene exactamente un elemento.'
errores_frecuentes:
- Confundir conjunto unitario con otro concepto cercano del mismo subtema.
- Usar la notación de manera informal y sacar conclusiones sin revisar la definición.
- Mirar solo un ejemplo particular y olvidar la idea general del recurso.
- Interpretar el contexto sin fijarse en qué conjunto, dominio o representación se está usando.
- Responder de memoria sin comprobar la propiedad clave que caracteriza al concepto.
fuente: Lipschutz, S. (2011). Teoría de conjuntos. McGraw-Hill.
estado: publicado
