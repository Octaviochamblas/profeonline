semantic_id: MAT.ALG.FRACCIONES_COMPLEJAS.FRACCION_CONTINUA_INFINITA
titulo: Resolución de fracción continua infinita simple
objetivo: Comprender la idea y técnica básica para evaluar una fracción continua que se repite infinitamente.
introduccion: 'Una fracción continua infinita es una escalera que nunca toca el suelo. Parece relación
  algebraica negra, pero se puede resolver con un truco algebraico brillante: la auto-referencia.'
resumen: Para evaluar una fracción infinita repetitiva $x = 1 + \frac{1}{1 + \dots}$, se sustituye la
  porción repetida por la variable $x$, creando una ecuación cuadrática a resolver.
explicacion: '### Definición formal


  Este es el principio de auto-similitud que permite plantear una ecuación polinómica.


  ### Desarrollo didáctico


  Una fracción continua infinita es una estructura fascinante, como un espejo frente a otro espejo: $x
  = 1 + \frac{1}{1 + \frac{1}{1 + .}}$. Sigue para siempre.


  Parece imposible de resolver, pero utiliza uno de los trucos lógicos más hermosos de la matemática matemática
  pura: **la auto-similitud fractal**.


  Como la fracción sigue infinitamente hacia abajo con el mismo patrón exacto, si tapas la primera capa,
  el trozo infinito que sobra abajo es matemáticamente idéntico a la fracción original completa ($x$).


  **Truco Maestro:**

  1. Observa el patrón infinito bajo el primer término.

  2. Reemplaza todo ese infinito bloque con la misma letra original $x$.

  3. Tu problema infinito se colapsa instantáneamente a una ecuación finita simple: $x = 1 + \frac{1}{x}$.

  4. Multiplicas todo por $x$ para deshacerte del denominador: $x^2 = x + 1$.

  5. Obtienes $x^2 - x - 1 = 0$, que es una ecuación cuadrática clásica. Y la resuelves. (Dato curioso:
  el resultado positivo de esta específica ecuación da vida al sagrado ''Número de Oro'' o Proporción
  Áurea, $\frac{1+\sqrt{5}}{2}$).'
procedimiento:
- 'Paso 1: Asigna una variable (ej. $x$) a toda la fracción infinita.'
- 'Paso 2: Observa el patrón y encuentra el bloque infinito interior que sea idéntico a tu fracción original.'
- 'Paso 3: Reemplaza ese bloque interno por la variable $x$.'
- 'Paso 4: Resuelve la ecuación algebraica resultante.'
ejemplos:
- titulo: Halla el valor de $y = 2 + \frac{3}{2 + \frac{3}{2 + \dots}}$
  enunciado: Halla el valor de $y = 2 + \frac{3}{2 + \frac{3}{2 + \dots}}$
  solucion_pasos:
  - La parte que se repite en el denominador $2 + \frac{3}{\dots}$ es igual a $y$.
  - 'Ecuación: $y = 2 + \frac{3}{y}$.'
  - 'Multiplica por y: $y^2 = 2y + 3$.'
  - 'Cuadrática: $y^2 - 2y - 3 = 0$.'
  - 'Factoriza: $(y-3)(y+1) = 0$.'
  - Como los términos son positivos, el valor es $y=3$.
- titulo: En la expresión $z = 4 - \frac{1}{4 - \dots}$, ¿cuál es la ecuación a resolver?
  solucion_pasos:
  - Todo el denominador se reemplaza por z.
- titulo: 'Respecto de «Resolución de fracción continua infinita simple»: ¿Es correcta esta caracteriza'
  enunciado: 'Respecto de «Resolución de fracción continua infinita simple»: ¿Es correcta esta caracterización?
