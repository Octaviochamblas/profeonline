semantic_id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_EQUILATERO
titulo: 'Fórmula del área del triángulo equilátero: A = l²√3 / 4'
objetivo: Aplicar la fórmula directa para calcular el área de un triángulo equilátero conociendo solo
  la medida de su lado.
introduccion: Como todos los lados y ángulos de un triángulo equilátero están determinados por una sola
  medida (el lado), existe una fórmula directa para su área que no requiere calcular la altura por separado.
resumen: El área de un triángulo equilátero de lado $l$ es $A=\frac{l^2\sqrt{3}}{4}$.
explicacion: '![Área del triángulo equilátero](/static/img/geometria/areas-pitagoras/areas-triangulos-formula-equilatero.svg)


  ### Definición formal


  Esta fórmula surge de calcular la altura del equilátero con Pitágoras ($h=\frac{l\sqrt{3}}{2}$) y sustituirla
  en $A=\frac{l\times h}{2}=\frac{l\times\frac{l\sqrt3}{2}}{2}=\frac{l^2\sqrt3}{4}$.


  ### Desarrollo didáctico


  Un triángulo equilátero de lado 4 cm tiene área $A=\frac{4^2\sqrt3}{4}=\frac{16\sqrt3}{4}=4\sqrt3\approx6,93$
  cm².'
procedimiento:
- 'Paso 1: Identifica la medida del lado del triángulo equilátero.'
- 'Paso 2: Elévalo al cuadrado y multiplícalo por √3.'
- 'Paso 3: Divide el resultado entre 4.'
ejemplos:
- titulo: Calcular con lado 4
  enunciado: Un triángulo equilátero tiene lado 4 cm.
  solucion_pasos:
  - A=(4²√3)/4=4√3≈6,93 cm².
- titulo: Calcular con lado 6
  enunciado: Un triángulo equilátero tiene lado 6 cm.
  solucion_pasos:
  - A=(6²√3)/4=9√3≈15,59 cm².
- titulo: ¿Esta fórmula requiere calcular la altura por separado?
  respuesta: 'No'
  solucion_pasos:
  - No, la fórmula ya incorpora la altura en función del lado.
- titulo: ¿Esta fórmula aplica a cualquier triángulo isósceles?
  respuesta: 'No'
  solucion_pasos:
  - No, es específica del triángulo equilátero, donde los tres lados son iguales.
errores_frecuentes:
- Aplicar esta fórmula a triángulos isósceles que no son equiláteros.
- Olvidar dividir entre 4 al final.
- Confundir esta fórmula con la de un triángulo cualquiera (base×altura/2).
fuente: Elaboración propia.
estado: publicado
