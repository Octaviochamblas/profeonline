semantic_id: MAT.ALG.CUADRADO_BINOMIO.SIMETRIA_DIFERENCIA
titulo: Uso de la equivalencia entre cuadrados de diferencias opuestas
objetivo: Reconocer y aplicar la propiedad de que $(a-b)^2 = (b-a)^2$.
introduccion: ¿Es lo mismo $5-3$ que $3-5$? Claramente no. Pero, ¿qué pasa si elevamos ambos resultados
  al cuadrado? La historia cambia.
resumen: 'Una propiedad muy útil (y a veces sorprendente) en álgebra es que:

  **$(a-b)^2 = (b-a)^2$**

  Esto sucede porque $(a-b)$ y $(b-a)$ son números opuestos (difieren solo en el signo), y al elevar cualquier
  número real al cuadrado, el resultado es positivo.'
explicacion: "### Definición formal\n\n$(b-a)$ es $-(a-b)$. Y un número negativo al cuadrado se vuelve\
  \ positivo.\n\n### Desarrollo didáctico\n\nExiste una propiedad de simetría muy interesante en el cuadrado\
  \ de un binomio diferencia: **elevar $(a-b)$ al cuadrado produce exactamente el mismo resultado que\
  \ elevar $(b-a)$ al cuadrado**. \n\nMatemáticamente, esto se escribe: $(a-b)^2 = (b-a)^2$.\n\n**¿Por\
  \ qué sucede esto?**\nRecordemos que sacar el negativo de una resta invierte sus términos: $(b-a) =\
  \ -(a-b)$.\nSi tomamos esa expresión y la elevamos al cuadrado, obtenemos:\n$(-(a-b))^2 = (-1)^2 \\\
  cdot (a-b)^2 = 1 \\cdot (a-b)^2 = (a-b)^2$.\n\n**Desarrollo comprobatorio:**\nDesarrollemos ambos para\
  \ comparar:\n$(a-b)^2 = a^2 - 2ab + b^2$\n$(b-a)^2 = b^2 - 2ba + a^2$\nSi ordenamos los términos, vemos\
  \ que son algebraicamente idénticos: $a^2 - 2ab + b^2$. Esta propiedad simétrica es muy útil para reordenar\
  \ restas dentro de paréntesis cuadrados sin afectar el resultado (por ejemplo, para evitar coeficientes\
  \ principales negativos)."
procedimiento:
- 'Paso 1: Al enfrentarte a expresiones como $(x - 4)^2$ o $(4 - x)^2$:'
- 'Paso 2: Puedes usar la que te sea más conveniente de las dos (por ejemplo, es más común dejar la variable
  positiva al inicio).'
- 'Paso 3: Si en una simplificación debes restar $(a-b)^2$ y $(b-a)^2$, recuerda que son iguales, así
  que su resta será $0$.'
ejemplos:
- titulo: Reescritura de expresiones
  enunciado: 'Simplifica la expresión: $(2x - 5)^2 - (5 - 2x)^2$'
  solucion_pasos:
  - Nota que $(5 - 2x)$ es el opuesto de $(2x - 5)$.
  - Por la propiedad de simetría, $(5 - 2x)^2 = (2x - 5)^2$.
  - 'Por lo tanto, la resta es de dos cantidades idénticas: $(2x - 5)^2 - (2x - 5)^2 = 0$.'
  - No es necesario expandir los trinomios, aunque si lo hicieras, obtendrías $0$ de igual forma.
- titulo: Dada la expresión $(2x - 3y)^2 - (3y - 2x)^2$, ¿a qué es equivalente
  enunciado: 'Dada la expresión $(2x - 3y)^2 - (3y - 2x)^2$, ¿a qué es equivalente?


    Opciones: A) $0$ · B) $4x^2 - 9y^2$ · C) $8x^2 - 18y^2$ · D) $2(2x-3y)^2$'
  solucion_pasos:
  - Ambos términos son iguales por simetría, luego restar una cantidad de sí misma da cero.
  - 'Respuesta: $0$'
- titulo: 'Respecto de «Uso de la equivalencia entre cuadrados de diferencias opuestas»: ¿La siguiente'
  enunciado: 'Respecto de «Uso de la equivalencia entre cuadrados de diferencias opuestas»: ¿La siguiente
