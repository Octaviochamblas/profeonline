errores_frecuentes:
- Creer que $(a-b)^2 = -(b-a)^2$, arrastrando un signo negativo imaginario.
- Para «La propiedad $(a-b)^2 = (b-a)^2$ se fundamenta en que:», la respuesta correcta es La resta es
  conmutativa.
- Para «La propiedad $(a-b)^2 = (b-a)^2$ se fundamenta en que:», la respuesta correcta es El cuadrado
  siempre elimina las variables.
- Es un caso especial que solo aplica a $a=b$.
- Para «¿En qué caso es falso que $(x-3) = (3-x)$», la respuesta correcta es En todos los casos.
