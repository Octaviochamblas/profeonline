- titulo: 'Respecto de «Uso de la equivalencia entre cuadrados de diferencias opuestas»: ¿La siguiente'
  enunciado: 'Respecto de «Uso de la equivalencia entre cuadrados de diferencias opuestas»: ¿La siguiente
