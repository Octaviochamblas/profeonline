semantic_id: MAT.ALG.DESIG_PROPIEDADES.RAIZ_INDICE_PAR
titulo: Extracción de raíces de índice par en desigualdades positivas
objetivo: Aplicar la extracción de raíces de índice par a una desigualdad asegurando
  condiciones de existencia y conservación del sentido.
introduccion: Para aplicar raíces de índice par a una desigualdad, se debe asegurar
  que todos los términos sean no negativos. Bajo esta condición, la extracción de
  la raíz mantiene el sentido de la desigualdad.
resumen: Si ambos miembros de una desigualdad son no negativos, se puede extraer raíz
  de índice par a ambos lados conservando el sentido de la desigualdad.
explicacion: '### Definición formal

  Si $0 \leq a < b$ y $n$ es un número natural par, entonces $\sqrt[n]{a} < \sqrt[n]{b}$.


  ### Desarrollo didáctico

  Las raíces de índice par (como la raíz cuadrada o cuarta) solo están definidas en
  el conjunto de los números reales para valores mayores o iguales a cero. En este
  dominio, la función $f(x) = \sqrt[n]{x}$ con $n$ par es estrictamente creciente.
  Esto significa que a un número mayor le corresponde una raíz mayor, manteniendo
  el orden original, siempre y cuando se garantice que los radicandos no sean negativos.'
procedimiento:
- Verificar rigurosamente que ambos miembros de la desigualdad sean mayores o iguales
  a cero.
- Extraer la raíz de índice par deseada en ambos lados.
- Mantener el sentido original del símbolo de desigualdad.
ejemplos:
- titulo: Raíz cuadrada de números positivos
  enunciado: Si $16 < 25$, deduce la relación entre sus raíces cuadradas.
  solucion_pasos:
  - Se verifica que $0 \leq 16 < 25$.
  - Se aplica raíz cuadrada (índice 2, par) a ambos miembros.
  - 'El sentido de la desigualdad se conserva: $\sqrt{16} < \sqrt{25}$.'
  - Esto resulta en $4 < 5$, lo cual es correcto.
- titulo: Raíz cuarta en expresiones algebraicas
  enunciado: Dada la desigualdad $0 \leq x^4 < 81$, ¿qué se puede concluir para $x$
    asumiendo $x \geq 0$?
  solucion_pasos:
  - 'Se asegura que todos los términos son no negativos: $0 \leq x^4 < 81$.'
  - Se extrae la raíz cuarta a ambos lados.
  - 'El sentido se conserva: $\sqrt[4]{x^4} < \sqrt[4]{81}$.'
  - Bajo la condición $x \geq 0$, resulta en $x < 3$. Y al incorporar el límite inferior
    se tiene $0 \leq x < 3$.
- titulo: ¿Se puede aplicar raíz cuadrada a la desigualdad $-9 < -4$ para obtener
    una relación válida en los reales?
  respuesta: 'No'
  solucion_pasos:
  - Ambos números, $-9$ y $-4$, son negativos.
  - La raíz de índice par no está definida para números negativos dentro de los números
    reales.
  - Por lo tanto, la operación no se puede realizar.
- titulo: ¿Si $0 \leq x < y$, entonces $\sqrt{x} < \sqrt{y}$ es siempre verdadero?
  respuesta: Sí
  solucion_pasos:
  - Como $x$ e $y$ son mayores o iguales a cero, las raíces cuadradas están definidas.
  - La función raíz cuadrada es estrictamente creciente en valores no negativos, conservando
    el sentido.
errores_frecuentes:
- Es posible extraer raíz de índice par a números negativos para cambiar el sentido
  de la desigualdad.
- Si $a < b$, siempre se cumple que $\sqrt{a} < \sqrt{b}$ independientemente de sus
  signos.
- La raíz de índice par invierte el sentido de la desigualdad.
- El resultado de $\sqrt{x^2} < \sqrt{y^2}$ es invariablemente $x < y$ ignorando el
  valor absoluto.
- Si se aplica raíz cuadrada, el símbolo de menor estricto se convierte en menor o
  igual.
