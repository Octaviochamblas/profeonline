semantic_id: MAT.ALG.SISTEMAS_2X2.RESTRICCIONES_SIGNO
titulo: Restricciones Contextuales 2x2
objetivo: Filtrar los resultados algebraicos según la lógica del problema.
introduccion: Si resuelves el sistema y obtienes que hay $-5$ gallinas y $35$ vacas, la matemática de las ecuaciones
  está correcta (suman 30 cabezas, etc.), pero físicamente es imposible tener $-5$ gallinas.
resumen: Las condiciones del problema determinan qué signos son admisibles para las soluciones de un sistema; una
  solución algebraica puede no ser válida en el contexto modelado.
explicacion: '### Definición formal


  En un problema contextual, el conjunto solución algebraico de un sistema puede ser más amplio que el conjunto de
  soluciones admisibles en el contexto. Si el modelo impone restricciones como positividad, integralidad o cotas
  superiores, entonces solo son aceptables los pares $(x,y)$ que satisfacen simultáneamente las ecuaciones del sistema
  y las restricciones del contexto.

  Por tanto, una solución algebraica puede ser descartada si contradice las condiciones semánticas del problema, aunque
  haga verdaderas las ecuaciones.


  ### Desarrollo didáctico


  Si resuelves el sistema y obtienes que hay $-5$ gallinas y $35$ vacas, la matemática de las ecuaciones está correcta
  (suman 30 cabezas, etc.), pero físicamente es imposible tener $-5$ gallinas.

  En ese caso, debes concluir que los datos originales del problema eran absurdos o inconsistentes (el granjero
  te mintió sobre cuántas patas había).'
procedimiento:
- Obtén el par $(x, y)$ solucionando el sistema.
- Vuelve a tus definiciones de 'x' e 'y'.
- Analiza si ambos valores numéricos tienen sentido en el mundo real (sin negativos para cosas físicas, sin fracciones
  para cosas indivisibles como personas).
- Concluye la validez de la respuesta.
