- titulo: 'Respecto de «Exclusión de soluciones negativas en problemas modelados por sistemas»: ¿Es cor'
  enunciado: 'Respecto de «Exclusión de soluciones negativas en problemas modelados por sistemas»: ¿Es correcta
    esta caracterización? «Las condiciones del problema determinan qué signos son admisibles para las soluciones
    de un sistema; una solución algebraica puede no ser válida en el contexto modelado»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Las condiciones del problema determinan qué signos son admisibles
    para las soluciones de un sistema; una solución algebraica puede no ser válida en el contexto modelado.'
- titulo: 'Respecto de «Exclusión de soluciones negativas en problemas modelados por sistemas»: ¿Es vál'
  enunciado: 'Respecto de «Exclusión de soluciones negativas en problemas modelados por sistemas»: ¿Es válida esta
    afirmación? «Puede omitirse esta condición sin cambiar el resultado: «Obtén el par $(x, y)$ solucionando el
    sistema»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Las condiciones del problema determinan qué signos son admisibles
    para las soluciones de un sistema; una solución algebraica puede no ser válida en el contexto modelado.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Obtén el par $(x, y)$ solucionando el sistema».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Vuelve a tus definiciones de ''x'' e ''y''».'
- La definición sigue cumpliéndose aunque no se considere que al igual que en las ecuaciones lineales, cuando modelas
  un problema real (como el de las vacas y gallinas), el álgebra no sabe qué es una vaca. Solo ve números.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Concluye la validez de la respuesta».
- La comprobación del resultado vuelve innecesaria la condición «Obtén el par $(x, y)$ solucionando el sistema».
