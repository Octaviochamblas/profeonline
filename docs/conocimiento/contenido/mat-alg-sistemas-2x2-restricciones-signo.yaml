semantic_id: 'MAT.ALG.SISTEMAS_2X2.RESTRICCIONES_SIGNO'
titulo: 'Restricciones Contextuales 2x2'
objetivo: 'Filtrar los resultados algebraicos según la lógica del problema.'
introduccion: |
  Al igual que en las ecuaciones lineales, cuando modelas un problema real (como el de las vacas y gallinas), el álgebra no sabe qué es una vaca. Solo ve números.
resumen: 'Este proceso es fundamental para encontrar la solución correcta.'
explicacion: |
  Si resuelves el sistema y obtienes que hay $-5$ gallinas y $35$ vacas, la matemática de las ecuaciones está correcta (suman 30 cabezas, etc.), pero físicamente es imposible tener $-5$ gallinas.
  En ese caso, debes concluir que los datos originales del problema eran absurdos o inconsistentes (el granjero te mintió sobre cuántas patas había).
procedimiento:
  - 'Paso 1: Obtén el par $(x, y)$ solucionando el sistema.'
  - 'Paso 2: Vuelve a tus definiciones de ''x'' e ''y''.'
  - 'Paso 3: Analiza si ambos valores numéricos tienen sentido en el mundo real (sin negativos para cosas físicas, sin fracciones para cosas indivisibles como personas).'
  - 'Paso 4: Concluye la validez de la respuesta.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
