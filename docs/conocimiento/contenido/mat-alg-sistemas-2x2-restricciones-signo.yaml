semantic_id: MAT.ALG.SISTEMAS_2X2.RESTRICCIONES_SIGNO
titulo: Restricciones Contextuales 2x2
objetivo: Filtrar los resultados algebraicos según la lógica del problema.
explicacion: |
  Al igual que en las ecuaciones lineales, cuando modelas un problema real (como el de las vacas y gallinas), el álgebra no sabe qué es una vaca. Solo ve números.

  Si resuelves el sistema y obtienes que hay $-5$ gallinas y $35$ vacas, la matemática de las ecuaciones está correcta (suman 30 cabezas, etc.), pero físicamente es imposible tener $-5$ gallinas.
  En ese caso, debes concluir que los datos originales del problema eran absurdos o inconsistentes (el granjero te mintió sobre cuántas patas había).
procedimiento: |
  1. Obtén el par $(x, y)$ solucionando el sistema.
  2. Vuelve a tus definiciones de 'x' e 'y'.
  3. Analiza si ambos valores numéricos tienen sentido en el mundo real (sin negativos para cosas físicas, sin fracciones para cosas indivisibles como personas).
  4. Concluye la validez de la respuesta.
