errores_frecuentes:
- Afirmar que $(a+b)^3 = a^3 + b^3$, ignorando por completo los tĂŠrminos centrales cruzados.
- $m^3 + n^3$.
- $3(m+n)$.
- $(m+n)(m^2+n^2)$.
- $4$ tĂŠrminos.
