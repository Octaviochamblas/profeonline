semantic_id: MAT.EST.PROBABILIDAD_TOTAL.DESCOMPOSICION_EVENTO
titulo: Descomposición de un evento según una partición del espacio muestral
objetivo: Descomponer un evento A en la unión de sus intersecciones con cada parte de una partición del
  espacio muestral.
introduccion: Cualquier evento puede 'trocearse' en partes correspondientes a cada categoría de una partición,
  lo que constituye la base geométrica del teorema de la probabilidad total.
resumen: Si $B_1, B_2, \ldots, B_n$ forman una partición de $S$, cualquier evento $A$ se puede descomponer
  como $A=(A\cap B_1)\cup(A\cap B_2)\cup\cdots\cup(A\cap B_n)$, siendo estas intersecciones mutuamente
  excluyentes entre sí.
explicacion: '![Descomposición de un evento según partición](/static/img/probabilidad/ptotal/ptotal-descomposicion-evento.svg)


  ### Definición formal


  Como cada elemento de $A$ pertenece exactamente a una de las partes $B_i$ de la partición, $A$ se divide
  naturalmente en las piezas $A\cap B_1, A\cap B_2, \ldots, A\cap B_n$, sin superposición entre ellas.


  ### Desarrollo didáctico


  Si A=''pieza defectuosa'' y la partición es {máquina A, máquina B}, entonces A se descompone en ''defectuosa
  y de máquina A'' junto con ''defectuosa y de máquina B'', dos partes que no se superponen y que juntas
  forman todo el evento A.'
procedimiento:
- 'Paso 1: Identifica el evento A que se quiere descomponer y la partición B1,...,Bn del espacio muestral.'
- 'Paso 2: Forma las intersecciones A∩B1, A∩B2, ..., A∩Bn.'
- 'Paso 3: Reconoce que la unión de esas intersecciones es exactamente el evento A original, sin superposición
  entre las partes.'
ejemplos:
- titulo: Descomponer 'pieza defectuosa' según la máquina de origen
  enunciado: 'Partición: máquina A, máquina B.'
  solucion_pasos:
  - '''Defectuosa''=(Defectuosa∩A)∪(Defectuosa∩B), dos partes que no se superponen.'
- titulo: Descomponer 'número par' según el rango del dado
  enunciado: 'Partición: {1,2,3} y {4,5,6}.'
  solucion_pasos:
  - '''Par''={2}∪{4,6}=(par∩{1,2,3})∪(par∩{4,5,6}).'
- titulo: ¿Las partes de la descomposición son mutuamente excluyentes entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que provienen de una partición del espacio muestral, que por definición es mutuamente excluyente.
- titulo: ¿La unión de todas las partes de la descomposición reconstruye exactamente el evento original?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad central de esta descomposición.
errores_frecuentes:
- Descomponer el evento con partes que se superponen entre sí, violando la propiedad de la partición.
- Omitir alguna parte de la descomposición, dejando elementos del evento original fuera del análisis.
- Confundir la descomposición del evento con la partición misma del espacio muestral.
fuente: 'Elaboración propia (referencia: Moraleja 294).'
estado: publicado
