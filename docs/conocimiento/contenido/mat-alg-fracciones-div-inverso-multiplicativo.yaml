semantic_id: MAT.ALG.FRACCIONES_DIV.INVERSO_MULTIPLICATIVO
titulo: El Inverso Multiplicativo (Recíproco)
objetivo: Comprender y calcular el inverso multiplicativo de una fracción algebraica.
introduccion: Para dividir fracciones necesitamos una herramienta llamada 'recíproco' o 'inverso multiplicativo'.
  Es simplemente la fracción dada la vuelta.
resumen: El inverso multiplicativo o recíproco de una fracción $\frac{A}{B}$ es $\frac{B}{A}$.
explicacion: '### Definición formal


  Esa es la definición matemática exacta del inverso multiplicativo.


  ### Desarrollo didáctico


  El ''inverso multiplicativo'' (o recíproco) de una fracción es simplemente darla vuelta. Si tienes $\frac{A}{B}$,
  su inverso es $\frac{B}{A}$.


  ¿Por qué importa esto? Porque en álgebra (y en matemáticas en general), **la división de fracciones no existe
  como operación nativa**.

  Dividir por una fracción es exactamente lo mismo que multiplicar por el inverso de esa fracción.


  Por ejemplo, dividir por $1/2$ (la mitad) es matemáticamente idéntico a multiplicar por $2$. Dividir por $\frac{x}{y}$
  es lo mismo que multiplicar por $\frac{y}{x}$.

  El inverso multiplicativo es la llave maestra que transforma el feo problema de la división en un amigable problema
  de multiplicación.'
procedimiento:
- 'Paso 1: Toma el numerador de la fracción original y ponlo en el denominador.'
- 'Paso 2: Toma el denominador de la original y ponlo en el numerador.'
ejemplos:
- titulo: Encuentra el recíproco de $\frac{a^2 + b^2}{2ab}$
  enunciado: Encuentra el recíproco de $\frac{a^2 + b^2}{2ab}$.
  solucion_pasos:
  - El denominador $2ab$ sube.
  - El numerador $a^2+b^2$ baja.
  - 'Recíproco: $\frac{2ab}{a^2+b^2}$.'
- titulo: ¿Cuál es el inverso multiplicativo de $3x+2$?
  solucion_pasos:
  - Imaginamos (3x+2)/1 y le damos la vuelta.
- titulo: 'Respecto de «Identificación del inverso multiplicativo algebraico»: ¿La siguiente formulació'
  enunciado: 'Respecto de «Identificación del inverso multiplicativo algebraico»: ¿La siguiente formulación es correcta?
    «El inverso multiplicativo o recíproco de una fracción $\frac{A}{B}$ es $\frac{B}{A}$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El inverso multiplicativo o recíproco de una fracción $\frac{A}{B}$
    es $\frac{B}{A}$.'
- titulo: 'Respecto de «Identificación del inverso multiplicativo algebraico»: ¿La siguiente conclusión'
  enunciado: 'Respecto de «Identificación del inverso multiplicativo algebraico»: ¿La siguiente conclusión es correcta?
    «Cambiar los signos en lugar de voltear la fracción (confundir inverso multiplicativo con inverso aditivo)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El inverso multiplicativo o recíproco de una fracción $\frac{A}{B}$
    es $\frac{B}{A}$.'
errores_frecuentes:
- Cambiar los signos en lugar de voltear la fracción (confundir inverso multiplicativo con inverso aditivo).
- Para «¿Cuál es la característica principal que define al recíproco de una fracción», la respuesta correcta es
  Cambia de positivo a negativo.
- Es la misma fracción pero factorizada.
- Para «¿Cuál es la característica principal que define al recíproco de una fracción», la respuesta correcta es
  El producto es 0.
- $-\frac{1}{x-3}$.
