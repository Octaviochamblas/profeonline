semantic_id: MAT.GEO.TRIG_APLICA_REAL.IDENTIFICACION_TRIANGULO_OBLICUANGULO
titulo: Identificación de triángulos oblicuángulos en problemas de contexto
objetivo: Reconocer, a partir de un problema descrito en palabras, cuándo la situación se modela con un
  triángulo oblicuángulo (sin ángulo recto) en vez de un triángulo rectángulo.
introduccion: Muchos problemas reales (dos senderos que forman un ángulo cualquiera, dos barcos que se
  alejan en direcciones distintas) no involucran ángulos rectos, por lo que requieren herramientas distintas
  a las razones trigonométricas básicas.
resumen: Un triángulo oblicuángulo es aquel que no tiene ningún ángulo recto; puede ser acutángulo (los
  tres ángulos agudos) u obtusángulo (un ángulo obtuso).
explicacion: '![Identificación de un triángulo oblicuángulo](/static/img/geometria/trigonometria/trigreal-identificacion-oblicuangulo.svg)


  ### Definición formal


  Un triángulo es oblicuángulo si ninguno de sus tres ángulos mide 90°. Puede clasificarse en acutángulo
  (todos los ángulos menores a 90°) u obtusángulo (un ángulo mayor a 90°).


  ### Desarrollo didáctico


  Si un problema menciona explícitamente un ángulo recto entre dos elementos, corresponde un triángulo
  rectángulo y se pueden usar seno, coseno y tangente básicos. Si el ángulo dado o implícito no es de
  90°, y no hay ninguna razón para suponer que exista un ángulo recto, el triángulo es oblicuángulo y
  se requieren las leyes de senos o de cosenos.'
procedimiento:
- 'Paso 1: Lee el problema e identifica todos los ángulos mencionados o implícitos.'
- 'Paso 2: Verifica si alguno de esos ángulos es de 90° (o si la situación garantiza perpendicularidad).'
- 'Paso 3: Si ningún ángulo es recto, reconoce que el triángulo es oblicuángulo y se debe usar la ley
  de senos o de cosenos.'
ejemplos:
- titulo: Reconocer un triángulo oblicuángulo en un contexto de senderos
  enunciado: Dos senderos parten de un mismo punto formando un ángulo de 70° entre ellos.
  solucion_pasos:
  - Como el ángulo entre los senderos no es de 90°, el triángulo formado es oblicuángulo.
- titulo: Reconocer un triángulo rectángulo en un contexto distinto
  enunciado: Un poste vertical proyecta una sombra horizontal sobre el suelo plano.
  solucion_pasos:
  - 'Como el poste es vertical y el suelo horizontal, forman un ángulo recto: el triángulo es rectángulo,
    no oblicuángulo.'
- titulo: ¿Un triángulo obtusángulo es un tipo de triángulo oblicuángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, los triángulos oblicuángulos incluyen tanto los acutángulos como los obtusángulos.
- titulo: ¿Se puede usar el teorema de Pitágoras en un triángulo oblicuángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, el teorema de Pitágoras solo aplica a triángulos rectángulos; para oblicuángulos se usa la ley
    de cosenos.
errores_frecuentes:
- Asumir que todo problema de trigonometría involucra un triángulo rectángulo.
- Confundir un triángulo obtusángulo con uno rectángulo por tener un ángulo grande.
- Intentar aplicar razones trigonométricas básicas (definidas para ángulos agudos de un triángulo rectángulo)
  directamente a un triángulo oblicuángulo.
fuente: Elaboración propia.
estado: publicado
