semantic_id: MAT.EST.PROBA_FUNDAMENTOS.EVENTO_SEGURO
titulo: Identificación de un evento seguro en un experimento aleatorio
objetivo: Identificar un evento seguro como aquel que coincide con el espacio muestral completo, es decir,
  que siempre ocurre.
introduccion: Algunos eventos están garantizados de ocurrir sin importar el resultado específico del experimento;
  a esos se les llama eventos seguros.
resumen: Un evento seguro es aquel que coincide con el espacio muestral completo ($A=S$), por lo que siempre
  ocurre, sin importar cuál sea el resultado del experimento.
explicacion: '![Evento seguro](/static/img/probabilidad/fundamentos/fund-evento-seguro.svg)


  ### Definición formal


  Un evento $A$ es seguro si $A=S$, es decir, si contiene absolutamente todos los resultados posibles
  del experimento.


  ### Desarrollo didáctico


  Al lanzar un dado, el evento ''obtener un número entre 1 y 6'' es seguro, ya que $A=\{1,2,3,4,5,6\}=S$:
  siempre ocurre, sin importar el resultado del lanzamiento.'
procedimiento:
- 'Paso 1: Define el evento cuya condición se quiere verificar.'
- 'Paso 2: Verifica si ese evento incluye absolutamente todos los resultados posibles del espacio muestral.'
- 'Paso 3: Si el evento coincide exactamente con el espacio muestral, es un evento seguro.'
ejemplos:
- titulo: Reconocer un evento seguro al lanzar un dado
  enunciado: 'Evento: ''obtener un número entre 1 y 6''.'
  solucion_pasos:
  - A={1,2,3,4,5,6}=S, por lo que es un evento seguro.
- titulo: Reconocer un evento seguro al lanzar una moneda
  enunciado: 'Evento: ''obtener cara o sello''.'
  solucion_pasos:
  - A={cara, sello}=S, por lo que es un evento seguro.
- titulo: ¿Un evento seguro siempre ocurre?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición, ya que abarca todos los resultados posibles.
- titulo: ¿La probabilidad de un evento seguro es siempre 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una de las propiedades fundamentales de la probabilidad.
errores_frecuentes:
- Confundir un evento seguro con un evento muy probable pero no garantizado.
- Creer que un evento seguro depende del resultado específico del experimento.
- Olvidar que la probabilidad de un evento seguro es exactamente 1, no un valor cercano a 1.
fuente: 'Elaboración propia (referencia: Moraleja 403).'
estado: publicado
