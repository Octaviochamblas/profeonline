semantic_id: MAT.EST.GRAFICOS_CONTINUOS.POLIGONO_FREQ
titulo: Construir el polígono de frecuencias
objetivo: Construir el polígono de frecuencias uniendo los puntos correspondientes a las marcas de clase
  de cada intervalo con su respectiva frecuencia.
introduccion: El polígono de frecuencias es una alternativa al histograma, especialmente útil para comparar
  la forma de dos o más distribuciones en un mismo gráfico.
resumen: El polígono de frecuencias se construye marcando un punto en la marca de clase de cada intervalo,
  a la altura de su frecuencia, y uniendo esos puntos con segmentos de recta.
explicacion: '![Construcción del polígono de frecuencias](/static/img/estadistica/grafcont/grafcont-poligono-freq.svg)


  ### Definición formal


  Cada punto del polígono se ubica en $(MC_i, f_i)$, la marca de clase del intervalo en el eje horizontal
  y su frecuencia en el eje vertical; los puntos se conectan con segmentos de recta.


  ### Desarrollo didáctico


  Con intervalos [0-10) MC=5 f=4, [10-20) MC=15 f=7, [20-30) MC=25 f=3, se marcan los puntos (5,4), (15,7),
  (25,3) y se conectan con segmentos de recta.'
procedimiento:
- 'Paso 1: Calcula la marca de clase de cada intervalo de la tabla de frecuencias.'
- 'Paso 2: Marca un punto en cada marca de clase, a la altura correspondiente a su frecuencia.'
- 'Paso 3: Une los puntos consecutivos con segmentos de recta para formar el polígono.'
ejemplos:
- titulo: Construir el polígono con 3 intervalos
  enunciado: '[0-10) MC=5 f=4, [10-20) MC=15 f=7, [20-30) MC=25 f=3.'
  solucion_pasos:
  - Se marcan los puntos (5,4), (15,7), (25,3) y se conectan con segmentos de recta.
- titulo: Construir el polígono de estaturas
  enunciado: '[150-160) MC=155 f=5, [160-170) MC=165 f=12, [170-180) MC=175 f=8.'
  solucion_pasos:
  - Se marcan los puntos (155,5), (165,12), (175,8) y se conectan en orden.
- titulo: ¿El polígono de frecuencias usa las marcas de clase como referencia en el eje horizontal?
  respuesta: Sí
  solucion_pasos:
  - Sí, cada punto se ubica en la marca de clase del intervalo correspondiente.
- titulo: ¿Se puede construir un histograma y su polígono de frecuencias a partir de los mismos datos?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos son representaciones alternativas de la misma tabla de frecuencias agrupadas.
errores_frecuentes:
- Usar el límite del intervalo en vez de la marca de clase para ubicar los puntos del polígono.
- Conectar los puntos en un orden incorrecto, sin respetar el orden de los intervalos.
- Confundir el polígono de frecuencias con un histograma, olvidando que el polígono usa puntos y líneas,
  no barras.
fuente: 'Elaboración propia (referencia: Moraleja 200, 353).'
estado: publicado
