semantic_id: MAT.GEO.HOMOTECIA.SIMETRIA_CENTRAL_K_MENOS_UNO
titulo: Relación entre homotecia de razón -1 y simetría central
objetivo: Reconocer que una homotecia de razón k=-1 es exactamente equivalente a una simetría central
  respecto al centro de homotecia.
introduccion: 'Existe un caso particular muy especial dentro de las homotecias inversas, en el que la
  transformación coincide exactamente con otra transformación geométrica bien conocida: la simetría central.'
resumen: 'Una homotecia de razón $k=-1$ es equivalente a una simetría central respecto al centro de homotecia:
  cada punto y su imagen son simétricos respecto a ese centro.'
explicacion: '![Simetría central como homotecia de razón -1](/static/img/geometria/congruencia-semejanza/homotecia-simetria-central.svg)


  ### Definición formal


  Con $k=-1$, la fórmula $P''=O+k(P-O)$ se convierte en $P''=O-(P-O)=2O-P$, que es exactamente la fórmula
  de la simetría central de centro $O$: el centro $O$ es el punto medio del segmento $PP''$.


  ### Desarrollo didáctico


  A diferencia de otras homotecias, con $k=-1$ el tamaño de la figura no cambia (ya que $|-1|=1$), solo
  su posición: la figura imagen es congruente con la original, pero rotada 180° respecto al centro O.'
procedimiento:
- 'Paso 1: Verifica que la razón de homotecia sea exactamente k=-1.'
- 'Paso 2: Reconoce que, en ese caso, la transformación es una simetría central respecto al centro O.'
- 'Paso 3: Calcula la imagen de cada punto usando P''=2O-P (equivalente a la fórmula de homotecia con
  k=-1).'
ejemplos:
- titulo: Verificar que k=-1 produce una simetría central
  enunciado: Una homotecia tiene centro O=(3,2) y razón k=-1. El punto P=(7,5) se transforma.
  solucion_pasos:
  - P'=2(3,2)-(7,5)=(6,4)-(7,5)=(-1,-1), que es exactamente el punto simétrico de P respecto a O.
- titulo: Comparar el tamaño de la figura antes y después
  enunciado: Un triángulo se transforma mediante homotecia con k=-1.
  solucion_pasos:
  - El triángulo imagen es congruente (mismo tamaño) con el original, solo cambia su posición.
- titulo: ¿La homotecia con k=-1 cambia el tamaño de la figura?
  respuesta: 'No'
  solucion_pasos:
  - No, porque |-1|=1, la figura imagen es congruente con la original.
- titulo: ¿El centro O es el punto medio entre cada punto y su imagen en este caso?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad que define a la simetría central.
errores_frecuentes:
- Confundir la simetría central (k=-1) con una simetría axial (reflexión respecto a una recta), que es
  una transformación distinta.
- Creer que k=-1 produce algún cambio de tamaño en la figura.
- Aplicar la fórmula general de homotecia sin simplificarla a P'=2O-P en este caso particular.
fuente: 'Fuente: Moraleja 155.'
estado: publicado
