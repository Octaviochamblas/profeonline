semantic_id: MAT.GEO.TRIG_CUADRANTES.LADO_INICIAL_TERMINAL
titulo: Identificación del lado inicial y el lado terminal de un ángulo
objetivo: Distinguir, en un ángulo en posición general, cuál segmento corresponde al lado inicial (fijo,
  sobre el semieje positivo de las x) y cuál al lado terminal (variable, según la medida del ángulo).
introduccion: 'Todo ángulo en posición general queda determinado por dos lados: uno fijo (el lado inicial)
  y uno que rota (el lado terminal), y reconocer cuál es cuál es esencial para ubicar correctamente el
  ángulo.'
resumen: El lado inicial de un ángulo en posición general es siempre el semieje positivo de las x; el
  lado terminal es el rayo obtenido al rotar el lado inicial la medida del ángulo en torno al origen.
explicacion: '![Lado inicial y lado terminal](/static/img/geometria/trigonometria/trigcuad-lado-inicial-terminal.svg)


  ### Definición formal


  En un ángulo $\theta$ en posición general, el lado inicial es el rayo que parte del origen sobre el
  semieje positivo de las x, y el lado terminal es el rayo que parte del origen formando el ángulo $\theta$
  con el lado inicial.


  ### Desarrollo didáctico


  En la figura, el segmento horizontal hacia la derecha es el lado inicial (siempre el mismo, sin importar
  el ángulo), mientras que el rayo hacia el punto $P$, a 120° de rotación, es el lado terminal. El lado
  terminal es el que cambia de posición según la medida del ángulo representado.'
procedimiento:
- 'Paso 1: Identifica el lado inicial como el semieje positivo de las x (siempre fijo).'
- 'Paso 2: Identifica el lado terminal como el rayo que forma el ángulo dado con el lado inicial.'
- 'Paso 3: Usa el lado terminal para determinar en qué cuadrante queda el ángulo.'
ejemplos:
- titulo: Identificar el lado terminal de un ángulo de 120°
  enunciado: Un ángulo de 120° está en posición general.
  solucion_pasos:
  - El lado inicial es el semieje positivo de las x; el lado terminal es el rayo rotado 120° en sentido
    antihorario, ubicado en el segundo cuadrante.
- titulo: Comparar los lados iniciales de dos ángulos distintos
  enunciado: Se representan un ángulo de 40° y uno de 220° en posición general.
  solucion_pasos:
  - Ambos ángulos comparten el mismo lado inicial (el semieje positivo de las x); solo cambia la posición
    de su lado terminal.
- titulo: ¿El lado inicial cambia según la medida del ángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, el lado inicial es siempre el semieje positivo de las x, independientemente del ángulo.
- titulo: ¿El lado terminal determina el cuadrante del ángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, la posición del lado terminal indica en qué cuadrante se ubica el ángulo.
errores_frecuentes:
- Confundir el lado terminal con el lado inicial.
- Suponer que el lado inicial cambia de posición según el ángulo representado.
- No usar el lado terminal para determinar el cuadrante correspondiente al ángulo.
fuente: Elaboración propia.
estado: publicado
