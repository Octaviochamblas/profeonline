  enunciado: 'Respecto de «Reducción de dos términos semejantes con signos opuestos»: ¿La siguiente formulación
    es correcta? «La **Reducción con Signos Opuestos** implica restar los coeficientes de los términos
    semejantes»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Reducción con Signos Opuestos** implica restar
    los coeficientes de los términos semejantes.'
- titulo: 'Respecto de «Reducción de dos términos semejantes con signos opuestos»: ¿La siguiente conclu'
  enunciado: 'Respecto de «Reducción de dos términos semejantes con signos opuestos»: ¿La siguiente conclusión
    es correcta? «Sumar los valores absolutos en lugar de restar cuando los signos son opuestos»'
  respuesta: 'No'
  solucion_pasos:
