semantic_id: MAT.ALG.REDUCCION_OPERATIVA.SIGNOS_OPUESTOS
titulo: Reducción de dos términos semejantes con signos opuestos
objetivo: Reducir términos semejantes con signos opuestos, restando sus coeficientes.
introduccion: Si ganas $10 y gastas $7, te quedan $3. Si lo ganas y lo gastas son el mismo 'tipo' de recurso
  (dinero), puedes restar. En álgebra, cuando dos términos semejantes tienen signos opuestos, se restan.
resumen: La **Reducción con Signos Opuestos** implica restar los coeficientes de los términos semejantes.
  El signo del resultado lo determina el término con el coeficiente de mayor valor absoluto.
explicacion: '### Definición formal


  El signo del ganador (mayor valor absoluto) es el que prevalece.


  ### Desarrollo didáctico


  Sea $9x - 4x$.

  Términos de la familia $x$, pero con signos opuestos.

  Restamos los coeficientes: $9 - 4 = 5$.

  El mayor era positivo, así que el resultado es positivo: $5x$.


  Sea $-11a + 3a$.

  El de mayor valor absoluto es $11a$ (negativo).

  Restamos: $11 - 3 = 8$.

  El resultado toma el signo del mayor: $-8a$.'
procedimiento:
- 'Paso 1: Identifica los términos semejantes.'
- 'Paso 2: Resta el coeficiente menor al mayor (en valor absoluto).'
- 'Paso 3: El resultado lleva el signo del término que tenía mayor valor absoluto.'
- 'Paso 4: Conserva el factor literal.'
ejemplos:
- titulo: La resta vectorial
  enunciado: 'Reduce: 15b - 6b.'
  solucion_pasos:
  - Términos de familia b, signos opuestos.
  - 'Restamos coeficientes: 15 - 6 = 9.'
  - El mayor era positivo.
  - 'Resultado: 9b.'
- titulo: Una empresa tiene activos valorizados en $25k$ millones y pasivos de $18k$ millones. ¿Cuál e
  enunciado: 'Una empresa tiene activos valorizados en $25k$ millones y pasivos de $18k$ millones. ¿Cuál
    es el patrimonio neto? (v1)


    Opciones: A) $7k$ · B) $43k$ · C) $-7k$ · D) $450k$'
  solucion_pasos:
  - 'Activos menos pasivos: $25k - 18k$. Términos semejantes con signos opuestos. $25-18=7$. El mayor
    es positivo: patrimonio = $7k$.'
