semantic_id: MAT.EST.GRAFICOS_BASE.CIRCULAR_DEF
titulo: Representar datos mediante gráfico circular
objetivo: Representar la distribución de una variable mediante un gráfico circular (o de torta), donde
  cada sector representa un porcentaje del total.
introduccion: El gráfico circular es especialmente útil para mostrar cómo se reparte el 100% de los datos
  entre distintas categorías.
resumen: Un gráfico circular divide un círculo completo (que representa el 100% de los datos) en sectores,
  cuyo tamaño es proporcional al porcentaje de cada categoría.
explicacion: '![Gráfico circular](/static/img/estadistica/grafbase/grafbase-circular-def.svg)


  ### Definición formal


  El círculo completo representa el 100% de los datos; cada sector ocupa una porción del círculo proporcional
  al porcentaje de su categoría respectiva.


  ### Desarrollo didáctico


  Si el 40% de un grupo prefiere fútbol, el 35% básquetbol y el 25% vóleibol, se dibuja un círculo dividido
  en tres sectores de esos tamaños proporcionales.'
procedimiento:
- 'Paso 1: Calcula el porcentaje que representa cada categoría respecto del total.'
- 'Paso 2: Convierte cada porcentaje en la porción correspondiente del círculo completo.'
- 'Paso 3: Dibuja los sectores del círculo con esos tamaños, idealmente diferenciados por color.'
ejemplos:
- titulo: Construir un gráfico circular de preferencias deportivas
  enunciado: 'Fútbol: 40%, básquetbol: 35%, vóleibol: 25%.'
  solucion_pasos:
  - Se dibuja un círculo con tres sectores proporcionales a 40%, 35% y 25% del total.
- titulo: Interpretar un gráfico circular de gastos
  enunciado: Un gráfico circular muestra sectores de 50% (vivienda), 30% (alimentación), 20% (otros).
  solucion_pasos:
  - El mayor gasto corresponde a vivienda (50% del total), seguido de alimentación (30%) y otros (20%).
- titulo: ¿La suma de todos los porcentajes de un gráfico circular debe ser 100%?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que el círculo completo representa siempre el 100% de los datos.
- titulo: ¿Un gráfico circular es adecuado para mostrar la evolución de un dato a lo largo del tiempo?
  respuesta: 'No'
  solucion_pasos:
  - No, para eso es más adecuado un gráfico de líneas; el circular muestra una distribución en un momento
    dado.
errores_frecuentes:
- Construir un gráfico circular cuyos porcentajes no suman 100%, generando una representación incorrecta.
- Usar un gráfico circular con demasiadas categorías, lo que dificulta su lectura visual.
- Confundir un gráfico circular con un gráfico de barras al momento de decidir cuál usar según el tipo
  de dato.
fuente: 'Elaboración propia (referencia: Moraleja 200, 353).'
estado: publicado
