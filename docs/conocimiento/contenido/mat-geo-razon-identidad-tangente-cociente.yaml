semantic_id: MAT.GEO.TRIG_IDENTIDADES.TANGENTE_COCIENTE
titulo: Identidad de la tangente como cociente entre seno y coseno
objetivo: Demostrar y aplicar la identidad que expresa la tangente de un ángulo como el cociente entre
  su seno y su coseno.
introduccion: Como el seno y el coseno comparten la misma hipotenusa en el denominador, al dividir uno
  por el otro esa hipotenusa se cancela, dejando exactamente la tangente.
resumen: Para cualquier ángulo agudo $\theta$ (con $\cos\theta\neq0$), se cumple la identidad $\tan\theta=\dfrac{\sin\theta}{\cos\theta}$.
explicacion: '![Identidad de la tangente como cociente](/static/img/geometria/trigonometria/razon-identidad-tangente-cociente.svg)


  ### Definición formal


  Como $\sin\theta=\dfrac{\text{opuesto}}{\text{hipotenusa}}$ y $\cos\theta=\dfrac{\text{adyacente}}{\text{hipotenusa}}$,
  al dividir: $\dfrac{\sin\theta}{\cos\theta}=\dfrac{\text{opuesto}/\text{hipotenusa}}{\text{adyacente}/\text{hipotenusa}}=\dfrac{\text{opuesto}}{\text{adyacente}}=\tan\theta$.


  ### Desarrollo didáctico


  Si $\sin\theta=0{,}6$ y $\cos\theta=0{,}8$, entonces $\tan\theta=\dfrac{0{,}6}{0{,}8}=0{,}75$, coincidiendo
  con el valor calculado directamente desde los catetos.'
procedimiento:
- 'Paso 1: Identifica los valores conocidos de seno y coseno del ángulo θ.'
- 'Paso 2: Divide el valor del seno entre el valor del coseno.'
- 'Paso 3: El resultado obtenido es exactamente la tangente de ese ángulo.'
ejemplos:
- titulo: Calcular la tangente a partir del seno y el coseno
  enunciado: sinθ=0,6 y cosθ=0,8.
  solucion_pasos:
  - tanθ=0,6/0,8=0,75.
- titulo: Verificar la identidad con valores notables
  enunciado: θ=45°, con sin45°=cos45°=√2/2.
  solucion_pasos:
  - tan45°=(√2/2)/(√2/2)=1, coincidiendo con el valor conocido de tan45°.
- titulo: ¿Esta identidad requiere que el coseno sea distinto de cero?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que no se puede dividir entre cero; esto ocurriría solo en el caso límite de 90°, que no es
    un ángulo agudo verdadero.
- titulo: ¿Se puede usar esta identidad para calcular la tangente sin conocer los catetos directamente?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con conocer el seno y el coseno del ángulo, sin necesidad de medir los catetos del triángulo.
errores_frecuentes:
- 'Invertir la división: calcular cosθ/sinθ en vez de sinθ/cosθ.'
- Olvidar que esta identidad requiere que cosθ sea distinto de cero.
- Confundir esta identidad con la definición directa de la tangente en términos de catetos, sin reconocer
  su equivalencia.
fuente: 'Elaboración propia (referencias: Moraleja 178, Cid 155).'
estado: publicado
