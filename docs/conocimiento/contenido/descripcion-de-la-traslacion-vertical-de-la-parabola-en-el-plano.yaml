semantic_id: MAT.ALG.FUNC_CUADR_TRANSFORMACIONES.TRASLACION_VERTICAL
titulo: Descripción de la traslación vertical de la parábola en el plano
objetivo: Describir cómo el parámetro $k$ de la forma canónica traslada verticalmente la gráfica de la
  función cuadrática básica.
introduccion: Además de deslizarse horizontalmente, la parábola puede subir o bajar en el plano, y este
  movimiento se controla con un parámetro distinto, sumado fuera del binomio al cuadrado.
resumen: La función $g(x)=x^2+k$ es la parábola $f(x)=x^2$ **trasladada verticalmente** $k$ unidades,
  hacia arriba si $k>0$ y hacia abajo si $k<0$, sin cambiar su forma.
explicacion: '### Definición formal


  Dada $f(x)=x^2$, la función $g(x)=f(x)+k=x^2+k$ representa una traslación vertical de la gráfica de
  $f$ en $k$ unidades. Cada punto $(x,y)$ de la gráfica original se traslada a $(x,y+k)$ en la nueva gráfica.


  ### Desarrollo didáctico


  A diferencia de la traslación horizontal, el signo de $k$ se interpreta directamente: positivo sube
  la gráfica, negativo la baja, sin necesidad de reescribir nada.


  La gráfica de $g(x)=x^2-4$ es idéntica a la de $f(x)=x^2$, pero desplazada $4$ unidades hacia abajo,
  con vértice en $(0,-4)$ en vez de $(0,0)$.'
procedimiento:
- 'Paso 1: Identifica la función base $f(x)=x^2$ y la función transformada $g(x)=x^2+k$.'
- 'Paso 2: Si $k>0$, concluye que la traslación es hacia arriba.'
- 'Paso 3: Si $k<0$, concluye que la traslación es hacia abajo.'
ejemplos:
- titulo: Descripción de una traslación hacia arriba
  enunciado: Describe la traslación vertical de $g(x)=x^2+6$ respecto a $f(x)=x^2$.
  solucion_pasos:
  - $k=6>0$.
  - Se traslada $6$ unidades hacia arriba, con vértice en $(0,6)$.
- titulo: Descripción de una traslación hacia abajo
  enunciado: Describe la traslación vertical de $g(x)=x^2-8$ respecto a $f(x)=x^2$.
  solucion_pasos:
  - $k=-8<0$.
  - Se traslada $8$ unidades hacia abajo, con vértice en $(0,-8)$.
- titulo: ¿El signo de $k$ se interpreta directamente, sin reescribir nada?
  enunciado: ¿El signo de $k$ se interpreta directamente, sin reescribir nada?
  respuesta: Sí
  solucion_pasos:
  - A diferencia de $h$, el signo de $k$ se lee tal cual aparece en la expresión.
- titulo: ¿La traslación vertical afecta la coordenada $x$ del vértice?
  enunciado: ¿La traslación vertical afecta la coordenada $x$ del vértice?
  respuesta: 'No'
  solucion_pasos:
  - Solo afecta la coordenada $y$ del vértice; la coordenada $x$ permanece igual a la de la función original.
errores_frecuentes:
- Confundir la dirección de la traslación vertical (arriba/abajo) invirtiendo el signo de $k$.
- Aplicar a $k$ la misma lógica de reescritura usada para $h$ en la traslación horizontal.
- Confundir la traslación vertical con la traslación horizontal.
- Aplicar la traslación vertical a la coordenada $x$ del vértice en vez de a la coordenada $y$.
