semantic_id: MAT.ALG.FRACCIONES_BASE.DEFINICION_FRACCION
titulo: Definición de fracción algebraica
objetivo: Comprender qué es una fracción algebraica y sus partes constituyentes.
introduccion: Las fracciones no son solo para números enteros. En álgebra, dividimos polinomios enteros
  entre otros polinomios, creando fracciones algebraicas. Funcionan casi igual que las numéricas, pero
  con letras.
resumen: Una fracción algebraica es el cociente de dos expresiones algebraicas (generalmente polinomios),
  donde el denominador debe ser distinto de cero.
explicacion: '### Definición formal


  Toda fracción es, por definición, una división del numerador entre el denominador.


  ### Desarrollo didáctico


  Una fracción algebraica es simplemente la división indicada de dos polinomios. Funciona exactamente
  con las mismas reglas lógicas que una fracción numérica tradicional (como 3/4), pero en lugar de números,
  sus ''pisos'' están ocupados por letras y expresiones algebraicas.


  Tiene dos partes fundamentales:

  - **El Numerador (Piso superior):** Es la expresión algebraica que está siendo dividida. Representa
  la ''cantidad que tienes''.

  - **El Denominador (Piso inferior):** Es la expresión algebraica que divide. Representa ''en cuántas
  partes estás dividiendo''.


  Por ejemplo: $\frac{P(x)}{Q(x)}$.

  El hecho de que sean polinomios no cambia las leyes matemáticas subyacentes. Las fracciones algebraicas
  se simplifican, se amplifican, se suman, restan, multiplican y dividen siguiendo exactamente los mismos
  protocolos que usabas en la escuela primaria con fracciones numéricas.'
procedimiento:
- 'Paso 1: Identifica la expresión que se encuentra sobre la línea divisoria como el numerador.'
- 'Paso 2: Identifica la expresión debajo de la línea como el denominador.'
- 'Paso 3: Recuerda que la línea central representa la operación de división.'
ejemplos:
- titulo: Conceptualmente, identifica numerador y denominador de $\frac{2a+b}{3a^2}$
  enunciado: Conceptualmente, identifica numerador y denominador de $\frac{2a+b}{3a^2}$.
  solucion_pasos:
  - 'Numerador (parte de arriba): $2a+b$.'
  - 'Denominador (parte de abajo): $3a^2$.'
  - Es el cociente de un binomio dividido por un monomio.
- titulo: Un polinomio normal como $x^2 + 5$ puede considerarse una fracción algebraica con denominado
  enunciado: ¿Un polinomio normal como $x^2 + 5$ puede considerarse una fracción algebraica con denominador
    1?
  solucion_pasos:
  - Correcto, toda expresión puede escribirse sobre 1 matemáticamente.
  - 'Respuesta: Verdadero'
- titulo: 'Respecto de «Definición de fracción algebraica»: ¿Se ajusta a la definición esta afirmación?'
  enunciado: 'Respecto de «Definición de fracción algebraica»: ¿Se ajusta a la definición esta afirmación?
    «Una fracción algebraica es el cociente de dos expresiones algebraicas (generalmente polinomios),
    donde el denominador debe ser distinto de cero»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una fracción algebraica es el cociente de dos expresiones
    algebraicas (generalmente polinomios), donde el denominador debe ser distinto de cero.'
- titulo: 'Respecto de «Definición de fracción algebraica»: ¿Es compatible con el procedimiento esta af'
  enunciado: 'Respecto de «Definición de fracción algebraica»: ¿Es compatible con el procedimiento esta
    afirmación? «Confundir numerador con denominador»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una fracción algebraica es el cociente de dos expresiones
    algebraicas (generalmente polinomios), donde el denominador debe ser distinto de cero.'
errores_frecuentes:
- Confundir numerador con denominador.
- Creer que una fracción sin variables en el denominador (como $x/2$) no es algebraica. Sí lo es, pero
  también se puede escribir como un polinomio regular (1/2)*x.
- Para «¿Qué representa la línea horizontal en una fracción algebraica», la respuesta correcta es Una
  suma oculta.
- Para «¿Qué representa la línea horizontal en una fracción algebraica», la respuesta correcta es Una
  resta entre los polinomios.
- El límite de la ecuación.
