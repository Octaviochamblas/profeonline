semantic_id: MAT.ALG.FRACCIONES_SUMA.IGUAL_DENOMINADOR
titulo: Suma de Fracciones con Igual Denominador
objetivo: Sumar fracciones algebraicas que comparten el mismo denominador.
introduccion: El caso ideal al sumar fracciones es que los denominadores sean idénticos. Cuando esto pasa, el trabajo
  pesado ya está hecho.
resumen: Para sumar fracciones con igual denominador, mantén el denominador y suma los numeradores.
explicacion: '### Definición formal


  El denominador indica en cuántas partes se divide el entero, no cambia al sumar más partes.


  ### Desarrollo didáctico


  Alegría, alegría. Sumar fracciones con el mismo denominador es el escenario más fácil posible.


  La regla fundamental de las fracciones dice que solo puedes sumar pedazos si son del mismo tamaño (es decir, tienen
  el mismo denominador).


  Si los denominadores ya son iguales, la operación es directa:

  1. Conservas el denominador intacto (No los sumes. El tamaño del pedazo no cambia).

  2. Sumas matemáticamente los numeradores (la cantidad de pedazos).


  Ejemplo algebraico:

  $\frac{3x}{x+1} + \frac{5}{x+1}$

  - Mantén el piso de abajo: $x+1$.

  - Junta el techo con una suma: $3x + 5$.

  - Resultado: $\frac{3x + 5}{x+1}$.

  Tan sencillo como sumar 2 manzanas más 3 manzanas.'
procedimiento:
- 'Paso 1: Confirma que los denominadores son exactamente iguales.'
- 'Paso 2: Escribe una sola fracción usando ese denominador común.'
- 'Paso 3: Coloca la suma de los numeradores en la parte superior.'
- El denominador indica en cuántas partes se divide el entero, no cambia al sumar más partes.
ejemplos:
- titulo: Suma $\frac{5a}{3b} + \frac{2a}{3b}$
  enunciado: Suma $\frac{5a}{3b} + \frac{2a}{3b}$.
  solucion_pasos:
  - El denominador es $3b$ para ambos.
  - 'Sumamos numeradores: $5a + 2a = 7a$.'
  - 'Resultado: $\frac{7a}{3b}$.'
- titulo: Suma $\frac{x^2}{x-2} + \frac{4}{x-2}$.
  solucion_pasos:
  - Al tener el mismo denominador, solo se juntan los términos del numerador.
- titulo: 'Respecto de «Adición de fracciones algebraicas de igual denominador»: ¿Se ajusta a la defini'
  enunciado: 'Respecto de «Adición de fracciones algebraicas de igual denominador»: ¿Se ajusta a la definición esta
    afirmación? «Para sumar fracciones con igual denominador, mantén el denominador y suma los numeradores»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para sumar fracciones con igual denominador, mantén el denominador
    y suma los numeradores.'
- titulo: 'Respecto de «Adición de fracciones algebraicas de igual denominador»: ¿Es compatible con el'
  enunciado: 'Respecto de «Adición de fracciones algebraicas de igual denominador»: ¿Es compatible con el procedimiento
    esta afirmación? «Sumar los denominadores (ej. decir que el nuevo denominador es el doble)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para sumar fracciones con igual denominador, mantén el denominador
    y suma los numeradores.'
errores_frecuentes:
- Sumar los denominadores (ej. decir que el nuevo denominador es el doble).
- Se suman entre sí.
- Para «¿Qué pasa con los denominadores cuando se suman dos fracciones que ya tienen el mismo denominador», la respuesta
  correcta es Se multiplican.
- Se cancelan, dejando solo los numeradores.
- $\frac{5m}{2m^2+2}$.
