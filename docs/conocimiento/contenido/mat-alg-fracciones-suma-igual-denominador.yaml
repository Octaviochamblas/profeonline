semantic_id: 'MAT.ALG.FRACCIONES_SUMA.IGUAL_DENOMINADOR'
titulo: 'Suma de Fracciones con Igual Denominador'
objetivo: 'Sumar fracciones algebraicas que comparten el mismo denominador.'
introduccion: |
  El caso ideal al sumar fracciones es que los denominadores sean idénticos. Cuando esto pasa, el trabajo pesado ya está hecho.
resumen: |
  Para sumar fracciones con igual denominador, mantén el denominador y suma los numeradores.
explicacion: |
  Piensa en el denominador como el 'tipo' de objeto. Si sumas 3 manzanas y 2 manzanas, tienes 5 manzanas.
  Si sumas $\frac{3}{x+1} + \frac{2x}{x+1}$, el 'tipo' es el denominador $x+1$.
  Solo unes los numeradores en una misma fracción: $\frac{3 + 2x}{x+1}$.
procedimiento:
  - 'Paso 1: Confirma que los denominadores son exactamente iguales.'
  - 'Paso 2: Escribe una sola fracción usando ese denominador común.'
  - 'Paso 3: Coloca la suma de los numeradores en la parte superior.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Suma $\frac{5a}{3b} + \frac{2a}{3b}$.'
    solucion_pasos:
    - 'El denominador es $3b$ para ambos.'
    - 'Sumamos numeradores: $5a + 2a = 7a$.'
    - 'Resultado: $\frac{7a}{3b}$.'
  - titulo: 'Suma $\frac{x^2}{x-2} + \frac{4}{x-2}$.'
    respuesta: '$\frac{x^2+4}{x-2}$'
    solucion_pasos:
    - 'Al tener el mismo denominador, solo se juntan los términos del numerador.'
errores_frecuentes:
  - 'Sumar los denominadores (ej. decir que el nuevo denominador es el doble).'
estado: publicado
