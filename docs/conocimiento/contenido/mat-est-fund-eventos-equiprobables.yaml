semantic_id: MAT.EST.PROBA_FUNDAMENTOS.EVENTOS_EQUIPROBABLES
titulo: Identificación de eventos equiprobables en espacios muestrales simples
objetivo: Identificar cuándo los resultados de un espacio muestral son equiprobables, es decir, todos
  con la misma probabilidad de ocurrir.
introduccion: La regla de Laplace (casos favorables sobre casos totales) solo es aplicable directamente
  cuando todos los resultados del espacio muestral tienen la misma posibilidad de ocurrir.
resumen: Los resultados de un espacio muestral son equiprobables si todos tienen exactamente la misma
  probabilidad de ocurrir.
explicacion: '![Eventos equiprobables](/static/img/probabilidad/fundamentos/fund-eventos-equiprobables.svg)


  ### Definición formal


  En un espacio muestral con $n(S)$ resultados equiprobables, cada resultado individual tiene probabilidad
  $\dfrac{1}{n(S)}$.


  ### Desarrollo didáctico


  Al lanzar un dado ''justo'' (no cargado), cada uno de los 6 resultados tiene probabilidad $\dfrac{1}{6}$:
  son equiprobables. En cambio, si el dado estuviera cargado para favorecer el 6, los resultados ya no
  serían equiprobables.'
procedimiento:
- 'Paso 1: Identifica el espacio muestral del experimento.'
- 'Paso 2: Verifica si existe alguna razón física o de diseño para que algún resultado sea más probable
  que otro.'
- 'Paso 3: Si todos los resultados tienen igual posibilidad de ocurrir, son equiprobables, y se puede
  aplicar directamente la regla de Laplace.'
ejemplos:
- titulo: Reconocer equiprobabilidad al lanzar un dado justo
  enunciado: Dado no cargado, de seis caras.
  solucion_pasos:
  - Cada cara tiene probabilidad 1/6, por lo que los resultados son equiprobables.
- titulo: Reconocer ausencia de equiprobabilidad
  enunciado: Una ruleta con sectores de distinto tamaño.
  solucion_pasos:
  - Los sectores más grandes tienen mayor probabilidad de ser seleccionados, por lo que los resultados
    NO son equiprobables.
- titulo: ¿Se requiere equiprobabilidad para aplicar directamente la regla de Laplace?
  respuesta: Sí
  solucion_pasos:
  - Sí, la regla de Laplace (casos favorables/casos totales) asume que todos los resultados son igualmente
    probables.
- titulo: ¿Todos los espacios muestrales son automáticamente equiprobables?
  respuesta: 'No'
  solucion_pasos:
  - No, depende del experimento específico; se debe verificar en cada caso.
errores_frecuentes:
- Aplicar la regla de Laplace a espacios muestrales que no son equiprobables sin ajustar el cálculo.
- Asumir que todos los experimentos aleatorios tienen automáticamente resultados equiprobables.
- Confundir equiprobabilidad con la cantidad de resultados posibles (son conceptos distintos).
fuente: Elaboración propia.
estado: publicado
