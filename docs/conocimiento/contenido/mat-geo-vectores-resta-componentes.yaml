semantic_id: MAT.GEO.VECTORES_OPERATORIA.RESTA_COMPONENTES
titulo: Sustracción de vectores por componentes
objetivo: Restar dos vectores algebraicamente, interpretando la resta como la suma del primer vector con
  el opuesto del segundo.
introduccion: Restar un vector v de un vector u es lo mismo que sumarle a u el vector opuesto de v.
resumen: 'Para restar dos vectores $\vec{u}=(u_x,u_y)$ y $\vec{v}=(v_x,v_y)$, se restan sus componentes
  por separado: $\vec{u}-\vec{v}=(u_x-v_x,\,u_y-v_y)$, equivalente a $\vec{u}+(-\vec{v})$.'
explicacion: '![Sustracción de vectores por componentes](/static/img/geometria/cartesiano-vectores/vectores-resta-componentes.svg)


  ### Definición formal


  La resta $\vec{u}-\vec{v}$ se calcula como $(u_x-v_x,\,u_y-v_y)$, y es equivalente a sumar $\vec{u}+(-\vec{v})$,
  donde $-\vec{v}$ es el vector opuesto de $\vec{v}$.


  ### Desarrollo didáctico


  Si $\vec{u}=(3,1)$ y $\vec{v}=(1,3)$, entonces $\vec{u}-\vec{v}=(3-1,\,1-3)=(2,-2)$. Geométricamente,
  este vector va desde el extremo de $\vec{v}$ hasta el extremo de $\vec{u}$ (ambos anclados en el origen).'
procedimiento:
- 'Paso 1: Identifica las componentes de cada vector: u=(ux,uy) y v=(vx,vy).'
- 'Paso 2: Resta las componentes horizontales: ux-vx.'
- 'Paso 3: Resta las componentes verticales: uy-vy, obteniendo el vector resta (ux-vx, uy-vy).'
ejemplos:
- titulo: Restar dos vectores por componentes
  enunciado: u=(3,1) y v=(1,3).
  solucion_pasos:
  - u-v=(3-1, 1-3)=(2,-2).
- titulo: Interpretar la resta como suma del opuesto
  enunciado: Se calcula u-v.
  solucion_pasos:
  - u-v=u+(-v), donde -v=(-vx,-vy); el resultado es equivalente al cálculo directo de la resta.
- titulo: ¿La resta de vectores es conmutativa (u-v=v-u)?
  respuesta: 'No'
  solucion_pasos:
  - No, u-v y v-u son vectores opuestos entre sí, no iguales (salvo que ambos sean el vector nulo).
- titulo: ¿El orden de la resta importa?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de la suma, el orden en la resta de vectores sí afecta el resultado (cambia el signo).
errores_frecuentes:
- Restar en el orden incorrecto (v-u en vez de u-v) sin darse cuenta de que cambia el signo del resultado.
- Mezclar componentes x con componentes y al restar.
- Olvidar que la resta de vectores no es conmutativa, a diferencia de la suma.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 123).'
estado: publicado
