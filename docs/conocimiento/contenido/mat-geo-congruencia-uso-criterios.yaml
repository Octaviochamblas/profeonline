semantic_id: MAT.GEO.CONGRUENCIA_TRIANGULOS.USO_CRITERIOS
titulo: Selección del criterio de congruencia adecuado a partir de datos dados
objetivo: Elegir correctamente cuál de los criterios de congruencia (LLL, LAL, ALA, LLA mayor) aplicar
  según los datos disponibles en un problema.
introduccion: Con los cuatro criterios de congruencia ya conocidos, el último paso es desarrollar la capacidad
  de identificar, frente a un problema concreto, cuál criterio es el adecuado según los datos que se entregan.
resumen: 'Para elegir el criterio correcto, se debe identificar qué combinación de lados y ángulos se
  conoce, y compararla con las condiciones de cada criterio: LLL (tres lados), LAL (dos lados y ángulo
  comprendido), ALA (dos ángulos y lado comprendido), o LLA mayor (dos lados y ángulo opuesto al mayor).'
explicacion: '![Selección del criterio de congruencia adecuado](/static/img/geometria/congruencia-semejanza/congruencia-uso-criterios.svg)


  ### Definición formal


  Dados ciertos elementos conocidos de dos triángulos (lados y/o ángulos), se selecciona el criterio de
  congruencia (LLL, LAL, ALA o LLA mayor) cuya condición coincide exactamente con los datos disponibles.


  ### Desarrollo didáctico


  Por ejemplo, si se conocen los tres lados de ambos triángulos, se usa LLL; si se conocen dos lados y
  el ángulo entre ellos, LAL; si se conocen dos ángulos y el lado entre ellos, ALA; y si se conocen dos
  lados y el ángulo opuesto específicamente al mayor de ellos, LLA mayor. Reconocer rápidamente qué datos
  se tienen es la habilidad clave de este tema.'
procedimiento:
- 'Paso 1: Lista los elementos conocidos (lados y ángulos) de ambos triángulos.'
- 'Paso 2: Determina si esos elementos incluyen tres lados, dos lados y un ángulo, o dos ángulos y un
  lado.'
- 'Paso 3: Si hay un ángulo y dos lados (o dos ángulos y un lado), verifica su posición (comprendido u
  opuesto al mayor) para elegir entre LAL, ALA o LLA mayor.'
ejemplos:
- titulo: Elegir el criterio con tres lados conocidos
  enunciado: Se conocen los tres lados de dos triángulos, y coinciden entre sí.
  solucion_pasos:
  - Se usa el criterio LLL.
- titulo: Elegir el criterio con dos ángulos y un lado comprendido
  enunciado: Se conocen dos ángulos y el lado entre ellos, y coinciden entre ambos triángulos.
  solucion_pasos:
  - Se usa el criterio ALA.
- titulo: ¿Es necesario memorizar los cuatro criterios para resolver estos problemas?
  respuesta: Sí
  solucion_pasos:
  - Sí, reconocer rápidamente cada criterio es esencial para elegir el correcto.
- titulo: ¿Siempre hay un único criterio aplicable a cada conjunto de datos?
  respuesta: 'No'
  solucion_pasos:
  - No necesariamente; a veces los datos disponibles no encajan en ningún criterio válido, y no se puede
    concluir congruencia.
errores_frecuentes:
- Aplicar un criterio sin verificar que los datos disponibles cumplan exactamente su condición (por ejemplo,
  usar LAL con un ángulo no comprendido).
- Confundir el caso ambiguo (lado-lado-ángulo opuesto al menor) con el criterio válido LLA mayor.
- Concluir congruencia sin tener suficiente información para aplicar ningún criterio válido.
fuente: Elaboración propia.
estado: publicado
