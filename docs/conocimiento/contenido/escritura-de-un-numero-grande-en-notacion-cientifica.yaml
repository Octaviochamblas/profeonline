semantic_id: MAT.NUM.NOTACION_CIENTIFICA.ESCRITURA_NUMERO_GRANDE
titulo: Escritura de un número grande en notación científica
objetivo: Convertir números grandes a notación científica.
introduccion: Mover la coma hacia la izquierda produce un coeficiente manejable; la potencia positiva
  registra cuánta escala se retiró del número original.
resumen: Un número grande usa exponente positivo en notación científica. El exponente positivo cuenta
  los lugares que la coma debe volver hacia la derecha.
explicacion: 'Un número grande usa exponente positivo en notación científica.


  La situación “\(482000000=4.82\times10^8\)” permite comprobar, y no solo memorizar, que el exponente
  positivo cuenta los lugares que la coma debe volver hacia la derecha'
procedimiento:
- 'Paso 1: Desplaza la coma a la izquierda hasta dejar una cifra no nula delante.'
- 'Paso 2: Cuenta los desplazamientos y úsalo como exponente positivo.'
- 'Paso 3: Reconstruye el número moviendo la coma a la derecha para verificar.'
ejemplos:
- titulo: Aplicación razonada — Escritura de un número grande en notación científica
  enunciado: \(482000000=4.82\times10^8\).
  solucion_pasos:
  - Desplaza la coma a la izquierda hasta dejar una cifra no nula delante.
  - Cuenta los desplazamientos y úsalo como exponente positivo.
  - Reconstruye el número moviendo la coma a la derecha para verificar.
- titulo: Revisión de una solución — Escritura de un número grande en notación científica
  enunciado: Una solución aplica “Cuenta los desplazamientos y úsalo como exponente positivo.”, pero termina
    sin comprobar que el exponente positivo cuenta los lugares que la coma debe volver hacia la derecha.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define escritura de un número grande en notación científica: un número
    grande usa exponente positivo en notación científica.'
  - Desplaza la coma a la izquierda hasta dejar una cifra no nula delante.
  - 'Completa la revisión con este control: Reconstruye el número moviendo la coma a la derecha para verificar.'
- titulo: ¿Se cumple que el exponente positivo cuenta los lugares que la coma debe volver hacia la derecha?
    — Escritura de un número grande en notación científica
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un número grande usa exponente positivo en notación científica.
  - El caso “\(482000000=4.82\times10^8\)” satisface esa condición.
  - Reconstruye el número moviendo la coma a la derecha para verificar.
- titulo: ¿Es válido omitir el paso “Desplaza la coma a la izquierda hasta dejar una cifra no nula delante”?
    — Escritura de un número grande en notación científica
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de escritura de un número grande en notación científica.
  - 'Omitirlo puede volver inválida la acción siguiente: Cuenta los desplazamientos y úsalo como exponente
    positivo.'
  - 'La solución debe terminar de este modo: Reconstruye el número moviendo la coma a la derecha para
    verificar.'
errores_frecuentes:
- 'Confundir escritura de un número grande en notación científica con otro concepto y omitir este inicio:
  Desplaza la coma a la izquierda hasta dejar una cifra no nula delante.'
- Aplicar mecánicamente “Cuenta los desplazamientos y úsalo como exponente positivo.” sin revisar las
  condiciones de la definición.
- Tomar “\(482000000=4.82\times10^8\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el exponente positivo cuenta los lugares que la
  coma debe volver hacia la derecha”.
- 'Terminar el desarrollo sin realizar este control: Reconstruye el número moviendo la coma a la derecha
  para verificar.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
estado: publicado
