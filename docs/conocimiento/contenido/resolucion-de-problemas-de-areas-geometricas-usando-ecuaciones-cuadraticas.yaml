semantic_id: MAT.ALG.EC_CUADR_MODELO.PROBLEMAS_AREAS
titulo: Resolución de problemas de áreas geométricas usando ecuaciones cuadráticas
objetivo: Plantear y resolver problemas de áreas de figuras geométricas que se modelan mediante ecuaciones
  de segundo grado.
introduccion: Cada vez que el área de un rectángulo, un cuadrado o una figura compuesta depende de una
  dimensión desconocida elevada al cuadrado (o de un producto de dos expresiones con esa incógnita), aparece
  naturalmente una ecuación cuadrática.
resumen: Los problemas de áreas geométricas se modelan planteando la fórmula de área correspondiente en
  función de una incógnita, igualándola al valor de área dado, y resolviendo la ecuación cuadrática resultante.
explicacion: '### Definición formal


  Dada una figura cuya área $A$ depende de una dimensión desconocida $x$ (por ejemplo, un rectángulo de
  lados $x$ y $x+k$), se plantea la ecuación $A(x)=A_0$, donde $A_0$ es el área conocida, obteniendo una
  ecuación de segundo grado en $x$.


  ### Desarrollo didáctico


  Es fundamental primero identificar cómo se expresan las dimensiones de la figura en términos de la incógnita,
  y luego aplicar la fórmula de área correspondiente antes de igualar al valor conocido.


  Un rectángulo tiene un largo que es el doble de su ancho $x$, y su área es $50 \text{ m}^2$. Se plantea
  $x(2x)=50$, es decir $2x^2=50$, cuya solución positiva es $x=5$.'
procedimiento:
- 'Paso 1: Expresa las dimensiones de la figura en función de una incógnita $x$.'
- 'Paso 2: Aplica la fórmula de área correspondiente a la figura.'
- 'Paso 3: Iguala esa expresión al área conocida y normaliza la ecuación resultante.'
- 'Paso 4: Resuelve la ecuación y selecciona la solución válida según el contexto geométrico.'
ejemplos:
- titulo: Área de un rectángulo con dimensiones relacionadas
  enunciado: El largo de un rectángulo es 4 m más que su ancho $x$, y su área es $32 \text{ m}^2$. Plantea
    y resuelve la ecuación.
  solucion_pasos:
  - $x(x+4)=32$, equivalente a $x^2+4x-32=0$.
  - Resolviendo, $x=4$ o $x=-8$; se descarta la solución negativa.
  - El ancho es $4$ m y el largo es $8$ m.
- titulo: Área de un cuadrado aumentado
  enunciado: El lado de un cuadrado se aumenta en 3 cm, y la nueva área es $64 \text{ cm}^2$. Encuentra
    el lado original.
  solucion_pasos:
  - $(x+3)^2=64$.
  - $x+3=\pm8$, dando $x=5$ o $x=-11$; se descarta la solución negativa.
  - El lado original es $5$ cm.
- titulo: ¿En problemas de áreas, ambas soluciones de la ecuación cuadrática son siempre válidas?
  enunciado: ¿En problemas de áreas, ambas soluciones de la ecuación cuadrática son siempre válidas?
  respuesta: 'No'
  solucion_pasos:
  - Las dimensiones de una figura deben ser positivas, por lo que las soluciones negativas se descartan.
- titulo: ¿Es necesario expresar las dimensiones de la figura en función de una sola incógnita?
  enunciado: ¿Es necesario expresar las dimensiones de la figura en función de una sola incógnita?
  respuesta: Sí
  solucion_pasos:
  - Solo así el área queda expresada como una ecuación en una única variable, resoluble mediante los métodos
    habituales.
errores_frecuentes:
- Aceptar como válida una solución negativa para una longitud o dimensión.
- Aplicar incorrectamente la fórmula de área de la figura correspondiente.
- Confundir el planteamiento del área con el del perímetro de la figura.
- No verificar la solución sustituyéndola de nuevo en el problema original.
