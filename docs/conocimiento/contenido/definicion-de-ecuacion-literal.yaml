semantic_id: MAT.ALG.ECUACIONES_LITERALES.DEFINICION
titulo: Definición de ecuación literal
objetivo: Comprender qué es una ecuación literal y cómo difiere de una numérica.
introduccion: 'Por ejemplo: $ax + b = c$.'
resumen: Una ecuación literal es una ecuación que tiene una presencia de varios parámetros. En lugar de
  coeficientes numéricos como el 5 o el 8, está llena de parámetros como $a$, $b$, $m$ o $k$.
explicacion: "### Definición formal\n\nUna ecuación literal en la incógnita $x$ es una igualdad $f(x,\
  \ p_1, p_2, \\dots, p_k) = 0$ donde, además de $x$, intervienen parámetros $p_1, \\dots, p_k$ tratados\
  \ como constantes durante el despeje; su solución se expresa como una fórmula $x = g(p_1, \\dots, p_k)$\
  \ en función de esos parámetros, no como un número fijo.\n\n### Desarrollo didáctico\n\nPor ejemplo:\
  \ $ax + b = c$. \n¿Quién es la incógnita aquí? Generalmente se asume que las últimas letras del abecedario\
  \ ($x$, $y$, $z$) son las incógnitas, y las primeras ($a$, $b$, $c$) son constantes representadas mediante\
  \ parámetros.\n\nResolver una ecuación literal significa despejar la 'x', pero tu respuesta final no\
  \ será un número como '7', sino una fórmula que depende de las otras letras, por ejemplo: $x = \\frac{c\
  \ - b}{a}$."
procedimiento:
- Identifica claramente cuál es la incógnita que debes despejar (usualmente 'x').
- Trata mentalmente a todas las demás letras como si fueran números comunes y corrientes.
- Aplica las mismas reglas de la balanza (transposición) que usarías con números.
