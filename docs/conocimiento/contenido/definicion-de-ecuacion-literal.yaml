- titulo: $ax + b = c$
  enunciado: Determina qué debe hacerse en $ax + b = c$ y fundamenta cada transformación.
  solucion_pasos:
  - "Por ejemplo: $ax + b = c$. \n¿Quién es la incógnita aquí? Generalmente se asume que las últimas letras\
    \ del abecedario ($x$, $y$, $z$) son las incógnitas, y las primeras ($a$, $b$, $c$) son constantes\
    \ representadas mediante parámetros."
  - Identifica claramente cuál es la incógnita que debes despejar (usualmente 'x').
- titulo: $a$
  enunciado: Analiza el caso $a$ y explica cómo se aplica el criterio estudiado.
  solucion_pasos:
