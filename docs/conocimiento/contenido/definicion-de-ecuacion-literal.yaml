- titulo: 'Respecto de «Definición de ecuación literal»: ¿Se ajusta a la definición esta afirmación? «U'
  enunciado: 'Respecto de «Definición de ecuación literal»: ¿Se ajusta a la definición esta afirmación?
    «Una ecuación literal es una ecuación que tiene una presencia de varios parámetros»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una ecuación literal es una ecuación que tiene una
    presencia de varios parámetros.'
- titulo: 'Respecto de «Definición de ecuación literal»: ¿Es compatible con el procedimiento esta afirm'
  enunciado: 'Respecto de «Definición de ecuación literal»: ¿Es compatible con el procedimiento esta afirmación?
    «Puede omitirse esta condición sin cambiar el resultado: «Identifica claramente cuál es la incógnita
    que debes despejar (usualmente ''x'')»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una ecuación literal es una ecuación que tiene una
    presencia de varios parámetros.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Identifica claramente cuál es la incógnita
  que debes despejar (usualmente ''x'')».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Trata mentalmente a todas las demás
  letras como si fueran números comunes y corrientes».'
- La definición sigue cumpliéndose aunque no se considere que una ecuación literal es una ecuación que
  tiene una presencia de varios parámetros. En lugar de coeficientes numéricos como el 5 o el 8, está
  llena de parámetros como $a$, $b$, $m$ o $k$.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Identifica claramente cuál
  es la incógnita que debes despejar (usualmente 'x')».
- La comprobación del resultado vuelve innecesaria la condición «Trata mentalmente a todas las demás letras
  como si fueran números comunes y corrientes».
