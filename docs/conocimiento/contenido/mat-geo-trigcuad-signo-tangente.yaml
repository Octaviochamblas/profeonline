semantic_id: MAT.GEO.TRIG_CUADRANTES.SIGNO_TANGENTE
titulo: Identificación del signo de la tangente según el cuadrante
objetivo: Determinar el signo (positivo o negativo) de la tangente de un ángulo según el cuadrante en
  que se ubica su lado terminal, a partir de los signos de seno y coseno.
introduccion: 'Como tanθ=sinθ/cosθ, su signo se obtiene combinando los signos de seno y coseno en cada
  cuadrante: si ambos tienen el mismo signo, la tangente es positiva; si tienen signos distintos, es negativa.'
resumen: La tangente de un ángulo es positiva en los cuadrantes I y III (donde seno y coseno comparten
  el mismo signo), y negativa en los cuadrantes II y IV (donde seno y coseno tienen signos opuestos).
explicacion: '![Signo de la tangente por cuadrante](/static/img/geometria/trigonometria/trigcuad-signo-tangente.svg)


  ### Definición formal


  Como $\tan\theta=\dfrac{\sin\theta}{\cos\theta}$, su signo es el producto de los signos de $\sin\theta$
  y $\cos\theta$. En el cuadrante I ambos son positivos (tan positiva); en el II, seno positivo y coseno
  negativo (tan negativa); en el III, ambos negativos (tan positiva); en el IV, seno negativo y coseno
  positivo (tan negativa).


  ### Desarrollo didáctico


  Esta relación es consecuencia directa de la identidad tangente=seno/coseno: basta con conocer los signos
  de seno y coseno en cada cuadrante para deducir el signo de la tangente, sin necesidad de memorizarlo
  por separado.'
procedimiento:
- 'Paso 1: Determina el signo del seno y el signo del coseno en el cuadrante correspondiente.'
- 'Paso 2: Aplica la regla de signos de la división: si ambos signos son iguales, el cociente es positivo;
  si son distintos, es negativo.'
- 'Paso 3: Ese resultado es el signo de la tangente en ese cuadrante.'
ejemplos:
- titulo: Determinar el signo de la tangente en el segundo cuadrante
  enunciado: θ está en el segundo cuadrante.
  solucion_pasos:
  - En el segundo cuadrante, sinθ>0 y cosθ<0, por lo que tanθ=sinθ/cosθ<0.
- titulo: Determinar el signo de la tangente en el tercer cuadrante
  enunciado: θ está en el tercer cuadrante.
  solucion_pasos:
  - En el tercer cuadrante, sinθ<0 y cosθ<0, por lo que tanθ=(negativo)/(negativo)>0.
- titulo: ¿La tangente es positiva en el tercer cuadrante?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque seno y coseno son ambos negativos en ese cuadrante, y su cociente es positivo.
- titulo: ¿La tangente es positiva en el cuarto cuadrante?
  respuesta: 'No'
  solucion_pasos:
  - No, en el cuarto cuadrante el seno es negativo y el coseno es positivo, dando un cociente negativo.
errores_frecuentes:
- Memorizar el signo de la tangente sin relacionarlo con los signos de seno y coseno.
- Confundir el signo de la tangente con el del seno o el del coseno por separado.
- Olvidar que la tangente no está definida cuando cosθ=0 (ángulos de 90° y 270°).
fuente: Elaboración propia.
estado: publicado
