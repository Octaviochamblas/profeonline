semantic_id: MAT.FUND.CONJUNTOS_BASICOS.CONJUNTO_INFINITO
titulo: Conjunto infinito
objetivo: Definir e identificar conjuntos infinitos reconociendo que sus elementos no se pueden terminar
  de contar.
introduccion: 'Imagina que decides contar todos los números que existen, empezando desde el 1: 1, 2, 3,
  4, 5... y así sucesivamente. ¿Cuándo terminarías? ¡Nunca! Siempre puedes sumarle uno al último número
  que dijiste para obtener un número más grande.


  En matemáticas, cuando un conjunto de cosas tiene tantas elementos que, por más rápido que cuentes,
  nunca podrás terminar porque no tienen fin, lo llamamos un conjunto infinito. Los números naturales,
  las estrellas en un universo sin límites o los puntos que forman una línea recta son ejemplos de conjuntos
  infinitos.


  Comprender este concepto te abrirá las puertas a la parte más asombrosa de las matemáticas, donde las
  colecciones de objetos continúan para siempre.'
resumen: 'Un conjunto infinito es aquel que no es finito; es decir, tiene una cantidad ilimitada de elementos
  y su proceso de conteo nunca termina. Su cardinalidad no se puede expresar con un número entero no negativo.

  '
explicacion: 'Un **conjunto infinito** es un conjunto que no tiene un límite en la cantidad de sus elementos.
  Formalmente, un conjunto $A$ es infinito si no es equivalente (no existe una biyección) a ningún conjunto
  de la forma $\{1, 2, 3, \dots, n\}$ para cualquier $n \in \mathbb{N}$. Otra definición formal (debida
  a Dedekind) indica que un conjunto es infinito si y solo si puede ponerse en correspondencia biyectiva
  con un subconjunto propio de sí mismo.


  **Ejemplos de conjuntos infinitos:**

  * El conjunto de los números naturales: $\mathbb{N} = \{1, 2, 3, 4, \dots\}$. Si tomamos el subconjunto
  propio de los pares $P = \{2, 4, 6, \dots\}$, podemos asociar cada natural $n$ con el par $2n$, demostrando
  que tienen el "mismo tamaño" infinito.

  * El conjunto de los números enteros: $\mathbb{Z} = \{\dots, -2, -1, 0, 1, 2, \dots\}$.

  * El conjunto de todos los puntos en un segmento de recta, por más pequeño que sea (por ejemplo, el
  intervalo $[0, 1]$).

  * El conjunto de las rectas que pasan por un punto dado en el plano.


  A diferencia de los conjuntos finitos, no podemos asociar una cardinalidad numérica entera tradicional
  a los conjuntos infinitos. En su lugar, el matemático Georg Cantor introdujo los números transfinitos,
  siendo el menor de ellos $\aleph_0$ (alef cero), que representa la cardinalidad de los números naturales.'
procedimiento:
- 'Paso 1: Analiza el criterio de pertenencia o la lista de elementos del conjunto.'
- 'Paso 2: Intenta establecer si existe un elemento final o si hay una regla que permita generar nuevos
  elementos indefinidamente sin repetir ninguno.'
- 'Paso 3: Si se demuestra que para cualquier cantidad $k$ de elementos contados siempre queda al menos
  un elemento sin contar en el conjunto, entonces concluye que el conjunto es infinito.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determina si el conjunto de los números enteros pares mayores que 10, es decir, $P = \{12,
    14, 16, 18, \dots\}$, es un conjunto infinito.
  solucion_pasos:
  - 'Paso a: Analizamos la regla del conjunto: contiene todos los números de la forma $2n$ donde $n$ es
    un entero mayor que 5.'
  - 'Paso b: Observamos que no hay un número par que sea el "último" o el más grande de todos, ya que
    si proponemos un par grande $M$, el número $M+2$ también es par, pertenece al conjunto y es mayor.'
  - 'Paso c: Como siempre podemos generar un elemento más sin repetir ninguno y el conteo no tiene fin,
    el conjunto $P$ es infinito.'
- titulo: Ejemplo 2
  enunciado: 'Determina si el conjunto de los números reales entre 0 y 1, es decir, el intervalo $I =
    \{x \in \mathbb{R} : 0 < x < 1\}$, es un conjunto infinito.'
  solucion_pasos:
  - 'Paso a: Identificamos los elementos de este conjunto. Son todos los números decimales y fraccionarios
    entre 0 y 1, por ejemplo: 0.5, 0.25, 0.1, 0.01, 0.001, etc.'
  - 'Paso b: Consideramos la propiedad de densidad de los números reales: entre cualquier par de números
    reales siempre existe otro número real (por ejemplo, el promedio de ambos).'
  - 'Paso c: Al poder encontrar siempre infinitos números entre 0 y cualquier valor decimal propuesto,
    es imposible terminar de listarlos o contarlos. Por lo tanto, el intervalo $I$ es un conjunto infinito.'
- titulo: ¿Es el conjunto de las estrellas visibles a simple vista en el cielo nocturno un conjunto infinito?
  respuesta: 'No'
  solucion_pasos:
  - Aunque al mirar el cielo despejado nos parezca que hay infinitas estrellas, las estrellas que el ojo
    humano puede distinguir sin ayuda de telescopios son limitadas.
  - En condiciones ideales de visibilidad, el ojo humano puede captar alrededor de 2,000 a 3,000 estrellas
    a la vez.
  - Dado que este número es perfectamente contable y limitado, el conjunto es finito, no infinito.
- titulo: ¿Es el conjunto de los números enteros negativos un conjunto infinito?
  respuesta: Sí
  solucion_pasos:
  - El conjunto de los enteros negativos es $Z^{-} = \{-1, -2, -3, -4, \dots\}$.
  - 'Si empezamos a contar hacia la izquierda en la recta numérica, podemos continuar indefinidamente:
    $-1, -2, -3$, etc., restando 1 en cada paso.'
  - Como no existe un entero negativo "mínimo" que detenga este proceso, el conjunto no tiene fin y es
    infinito.
errores_frecuentes:
- Pensar que "infinito" significa simplemente "muy difícil de contar". Un conjunto infinito es imposible
  de terminar de contar por definición.
- Creer que todos los conjuntos infinitos son del mismo tamaño. El conjunto de los reales es "más grande"
  que el de los naturales.
- Suponer que si un conjunto está contenido dentro de límites pequeños (como el intervalo $0 < x < 1$)
  debe ser finito.
- Confundir un conjunto con infinitos elementos con un conjunto vacío.
- Asociar el concepto de infinito a una falta de definición clara de sus elementos.
fuente: Álgebra y Fundamentos, Universidad de Chile
estado: publicado
