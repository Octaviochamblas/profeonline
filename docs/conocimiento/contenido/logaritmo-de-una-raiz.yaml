semantic_id: MAT.NUM.LOGARITMOS_PROPIEDADES.RAIZ
titulo: Logaritmo de una raíz
objetivo: Transformar el logaritmo de una raíz.
introduccion: 'La propiedad de la raíz no es una regla nueva aislada: nace al escribir el radical como
  exponente fraccionario.'
resumen: \(\log_b\sqrt[n]{x}=\frac1n\log_bx\) para \(x>0\). La raíz actúa como una potencia de exponente
  \(1/n\).
explicacion: '\(\log_b\sqrt[n]{x}=\frac1n\log_bx\) para \(x>0\).


  Al analizar “\(\log_3\sqrt{81}=\frac12\log_3 81=2\)” conviene observar la conexión siguiente: la raíz
  actúa como una potencia de exponente \(1/n\)'
procedimiento:
- 'Paso 1: Escribe la raíz como potencia \(x^{1/n}\).'
- 'Paso 2: Aplica la propiedad de potencia y extrae \(1/n\) como coeficiente.'
- 'Paso 3: Comprueba el dominio y evalúa el radical cuando sea exacto.'
ejemplos:
- titulo: Aplicación razonada — Logaritmo de una raíz
  enunciado: \(\log_3\sqrt{81}=\frac12\log_3 81=2\).
  solucion_pasos:
  - Escribe la raíz como potencia \(x^{1/n}\).
  - Aplica la propiedad de potencia y extrae \(1/n\) como coeficiente.
  - Comprueba el dominio y evalúa el radical cuando sea exacto.
- titulo: Revisión de una solución — Logaritmo de una raíz
  enunciado: Una solución aplica “Aplica la propiedad de potencia y extrae \(1/n\) como coeficiente.”,
    pero termina sin comprobar que la raíz actúa como una potencia de exponente \(1/n\). Determina qué
    falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define logaritmo de una raíz: \(\log_b\sqrt[n]{x}=\frac1n\log_bx\) para
    \(x>0\).'
  - Escribe la raíz como potencia \(x^{1/n}\).
  - 'Completa la revisión con este control: Comprueba el dominio y evalúa el radical cuando sea exacto.'
- titulo: ¿Se cumple que la raíz actúa como una potencia de exponente \(1/n\)? — Logaritmo de una raíz
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\log_b\sqrt[n]{x}=\frac1n\log_bx\) para \(x>0\).
  - El caso “\(\log_3\sqrt{81}=\frac12\log_3 81=2\)” satisface esa condición.
  - Comprueba el dominio y evalúa el radical cuando sea exacto.
- titulo: ¿Es válido omitir el paso “Escribe la raíz como potencia \(x^{1/n}\)”? — Logaritmo de una raíz
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de logaritmo de una raíz.
  - 'Omitirlo puede volver inválida la acción siguiente: Aplica la propiedad de potencia y extrae \(1/n\)
    como coeficiente.'
  - 'La solución debe terminar de este modo: Comprueba el dominio y evalúa el radical cuando sea exacto.'
errores_frecuentes:
- 'Confundir logaritmo de una raíz con otro concepto y omitir este inicio: Escribe la raíz como potencia
  \(x^{1/n}\).'
- Aplicar mecánicamente “Aplica la propiedad de potencia y extrae \(1/n\) como coeficiente.” sin revisar
  las condiciones de la definición.
- Tomar “\(\log_3\sqrt{81}=\frac12\log_3 81=2\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la raíz actúa como una potencia de exponente \(1/n\)”.
- 'Terminar el desarrollo sin realizar este control: Comprueba el dominio y evalúa el radical cuando sea
  exacto.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
estado: publicado
