semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.TRAPECIO_ISOSCELES
titulo: Definición de trapecio isósceles
objetivo: Reconocer el trapecio isósceles como un caso particular de trapecio con lados laterales congruentes.
introduccion: Así como existen triángulos isósceles, existe un caso particular de trapecio con una propiedad
  de simetría muy similar.
resumen: Un trapecio isósceles es un trapecio cuyos dos lados laterales (no paralelos) son congruentes
  entre sí.
explicacion: '![Trapecio isósceles: lados laterales congruentes](/static/img/geometria/poligonos-cuadrilateros/trapecios-isosceles.svg)


  ### Definición formal


  Un trapecio $ABCD$ con $AB\parallel CD$ es isósceles si $AD=BC$ (sus lados laterales son congruentes).
  Como consecuencia, los ángulos de cada base son congruentes entre sí, y las diagonales también son congruentes.


  ### Desarrollo didáctico


  Un trapecio isósceles tiene un eje de simetría vertical que pasa por los puntos medios de ambas bases,
  lo cual explica todas sus propiedades adicionales: ángulos de base iguales y diagonales iguales.'
procedimiento:
- 'Paso 1: Verifica que la figura sea un trapecio (un par de lados paralelos).'
- 'Paso 2: Verifica que sus dos lados laterales sean congruentes entre sí.'
- 'Paso 3: Si se cumplen ambas condiciones, es un trapecio isósceles.'
ejemplos:
- titulo: Identificar un trapecio isósceles
  enunciado: Un trapecio tiene lados laterales de 6 cm cada uno.
  solucion_pasos:
  - Es un trapecio isósceles, ya que sus lados laterales son congruentes.
- titulo: Reconocer propiedades adicionales
  enunciado: En un trapecio isósceles, ¿qué se puede decir de los ángulos de la base mayor?
  solucion_pasos:
  - Los dos ángulos de la base mayor son congruentes entre sí (y lo mismo ocurre con los de la base menor).
- titulo: ¿Un trapecio isósceles tiene eje de simetría?
  respuesta: Sí
  solucion_pasos:
  - Sí, tiene un eje de simetría vertical que pasa por los puntos medios de ambas bases.
- titulo: ¿Las diagonales de un trapecio isósceles son iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad adicional consecuencia de la simetría del trapecio isósceles.
errores_frecuentes:
- Creer que un trapecio isósceles tiene sus cuatro lados iguales (solo los laterales son iguales entre
  sí).
- Confundir el trapecio isósceles con el paralelogramo, olvidando que solo tiene un par de lados paralelos.
- No reconocer las propiedades adicionales (ángulos de base y diagonales iguales) que se derivan de la
  isoscelia.
fuente: 'Fuente: Moraleja Tomo 2 69, Cid 44.'
estado: publicado
