semantic_id: MAT.GEO.RECTA_EULER.DEFINICION
titulo: Definición de recta de Euler como recta que contiene ortocentro, baricentro y circuncentro
objetivo: Identificar la recta de Euler como la recta que pasa simultáneamente por el ortocentro, el baricentro
  y el circuncentro de un triángulo.
introduccion: Aunque el ortocentro, el baricentro y el circuncentro se definen de maneras completamente
  distintas (mediante alturas, transversales de gravedad y simetrales respectivamente), resulta que los
  tres siempre están alineados sobre una misma recta.
resumen: La recta de Euler es la recta que contiene al ortocentro, al baricentro y al circuncentro de
  un triángulo.
explicacion: '![Recta de Euler: ortocentro, baricentro y circuncentro](/static/img/geometria/elementos-secundarios/recta-euler-definicion.svg)


  ### Definición formal


  Para todo triángulo (no equilátero), el ortocentro H, el baricentro G y el circuncentro O son colineales;
  la recta que los contiene se llama recta de Euler.


  ### Desarrollo didáctico


  Esta colinealidad es sorprendente porque H, G y O provienen de construcciones muy distintas (alturas,
  transversales de gravedad y simetrales), y sin embargo, siempre terminan alineados en la misma recta,
  sin importar la forma del triángulo.'
procedimiento:
- 'Paso 1: Calcula o ubica el circuncentro O, el baricentro G y el ortocentro H del triángulo.'
- 'Paso 2: Traza la recta que pasa por esos tres puntos.'
- 'Paso 3: Verifica que los tres queden efectivamente alineados: esa es la recta de Euler.'
ejemplos:
- titulo: Identificar la recta de Euler
  enunciado: Se calculan el ortocentro, el baricentro y el circuncentro de un triángulo escaleno.
  solucion_pasos:
  - Los tres puntos resultan estar alineados sobre la recta de Euler.
- titulo: Caso especial
  enunciado: ¿Qué ocurre con la recta de Euler en un triángulo equilátero?
  solucion_pasos:
  - Los tres puntos (más el incentro) coinciden en uno solo, así que no hay una recta que los distinga.
- titulo: ¿El ortocentro, el baricentro y el circuncentro están siempre alineados?
  respuesta: Sí
  solucion_pasos:
  - Sí, en todo triángulo no equilátero, por la propiedad de la recta de Euler.
- titulo: ¿El incentro también pertenece a la recta de Euler en general?
  respuesta: 'No'
  solucion_pasos:
  - No, el incentro generalmente no está sobre la recta de Euler (salvo en el equilátero, donde todo coincide
    en un punto).
errores_frecuentes:
- Creer que el incentro también está siempre sobre la recta de Euler (en general no lo está).
- Pensar que esta propiedad solo se cumple en triángulos especiales, cuando en realidad aplica a cualquier
  triángulo (no equilátero).
- Confundir el orden o la identidad de los tres puntos que definen esta recta.
fuente: Elaboración propia.
estado: publicado
