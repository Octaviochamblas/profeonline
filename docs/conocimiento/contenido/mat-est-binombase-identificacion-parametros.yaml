semantic_id: MAT.EST.BINOMIAL_BASE.IDENTIFICACION_PARAMETROS
titulo: Identificar correctamente los parámetros n y p a partir de un enunciado contextualizado
objetivo: Identificar correctamente los valores de n y p a partir de la lectura cuidadosa de un enunciado
  de problema aplicado con contexto real.
introduccion: El paso más importante antes de resolver cualquier problema binomial es traducir correctamente
  el lenguaje del enunciado a los parámetros n y p del modelo.
resumen: Identificar los parámetros consiste en reconocer, dentro de un enunciado, cuántas veces se repite
  el experimento (n) y cuál es la probabilidad de éxito en cada repetición (p).
explicacion: '![Identificación de los parámetros n y p](/static/img/probabilidad/binombase/binombase-identificacion-parametros.svg)


  ### Definición formal


  Dado un enunciado, $n$ es la cantidad de repeticiones del experimento y $p$ es la probabilidad del resultado
  definido como éxito en cada repetición, ambos identificados a partir del contexto.


  ### Desarrollo didáctico


  En el enunciado ''Se sabe que el 20% de los tornillos de una fábrica son defectuosos. Se toma una muestra
  aleatoria de 15 tornillos'', se identifica $n=15$ (tamaño de la muestra) y $p=0{,}2$ (probabilidad de
  que un tornillo sea defectuoso, si se define ''defectuoso'' como éxito).'
procedimiento:
- 'Paso 1: Lee el enunciado completo, identificando qué experimento se repite y cuántas veces (ese número
  es n).'
- 'Paso 2: Identifica el resultado que se define como ''éxito'' según lo que pregunta el problema.'
- 'Paso 3: Extrae del enunciado el valor numérico de la probabilidad de ese éxito (ese valor es p), convirtiendo
  porcentajes a decimales si es necesario.'
ejemplos:
- titulo: Identificar n y p en un problema de control de calidad
  enunciado: El 20% de los tornillos de una fábrica son defectuosos. Se toma una muestra de 15 tornillos.
  solucion_pasos:
  - n=15 (tamaño de la muestra). p=0,2 (probabilidad de que un tornillo sea defectuoso, si se define éxito=defectuoso).
- titulo: Identificar n y p en un problema de exámenes
  enunciado: Un estudiante responde al azar 10 preguntas de verdadero/falso.
  solucion_pasos:
  - n=10 (número de preguntas). p=0,5 (probabilidad de acertar al azar cada pregunta de verdadero/falso).
- titulo: ¿Es necesario leer cuidadosamente el enunciado completo antes de identificar n y p?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que ambos valores dependen directamente de la información específica dada en el contexto del
    problema.
- titulo: ¿n siempre corresponde al tamaño de la muestra o número de repeticiones mencionado?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la interpretación estándar de n en problemas contextualizados.
errores_frecuentes:
- Confundir el valor de n con el valor de p al leer rápidamente el enunciado sin analizarlo con cuidado.
- Olvidar convertir un porcentaje a decimal antes de asignarlo como valor de p.
- No identificar correctamente cuál resultado se está definiendo como 'éxito' en el contexto específico
  del problema.
fuente: Elaboración propia.
estado: publicado
