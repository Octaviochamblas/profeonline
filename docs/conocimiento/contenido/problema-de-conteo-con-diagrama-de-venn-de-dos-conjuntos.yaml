semantic_id: MAT.FUND.CARDINALIDAD_CONJUNTOS.PROBLEMA_VENN_DOS_CONJUNTOS
titulo: Problema de conteo con diagrama de Venn de dos conjuntos
objetivo: Resolver problemas de conteo con diagramas de Venn de dos conjuntos distribuyendo los datos
  de 'adentro hacia afuera' en las cuatro regiones disjuntas del diagrama.
introduccion: Imagina que en un grupo de 20 estudiantes, 12 juegan fútbol, 10 juegan tenis y 4 juegan
  ambos deportes. Si quieres saber cuántos estudiantes no juegan ninguno de estos dos deportes, ¿cómo
  lo averiguarías? La mejor manera es dibujar dos círculos que se cruzan. Si colocas primero los 4 en
  el centro (los que hacen ambos deportes), puedes deducir fácilmente quiénes juegan *solo* fútbol ($12
  - 4 = 8$) y quiénes juegan *solo* tenis ($10 - 4 = 6$). Al final, sumas todas estas zonas ($8 + 4 +
  6 = 18$) y se lo restas al total de estudiantes ($20 - 18 = 2$) para saber cuántos quedan afuera de
  los círculos. ¡El dibujo hace que todo sea claro!
resumen: 'Resolver problemas de conteo con dos conjuntos mediante diagramas de Venn consiste en dividir
  el universo en cuatro regiones disjuntas: solo $A$, solo $B$, ambos ($A \cap B$) y ninguno ($(A \cup
  B)^c$), distribuyendo los datos numéricos desde la intersección hacia afuera.'
explicacion: "Un **diagrama de Venn para dos conjuntos** $A$ y $B$ divide al conjunto universal $U$ en\
  \ exactamente cuatro regiones disjuntas (que no se traslapan). Para resolver problemas de conteo, debemos\
  \ identificar cuántos elementos corresponden a cada una de estas áreas.\n\n### Las Cuatro Regiones Disjuntas\n\
  1. **Solo $A$ (Región de diferencia $A \\setminus B$):** Elementos que pertenecen a $A$ pero no a $B$.\
  \ Su cardinalidad se calcula como:\n   $$|A \\setminus B| = |A| - |A \\cap B|$$\n2. **Ambos (Región\
  \ de intersección $A \\cap B$):** Elementos comunes que pertenecen a $A$ y a $B$ simultáneamente.\n\
  3. **Solo $B$ (Región de diferencia $B \\setminus A$):** Elementos que pertenecen a $B$ pero no a $A$.\
  \ Su cardinalidad se calcula como:\n   $$|B \\setminus A| = |B| - |A \\cap B|$$\n4. **Ninguno (Región\
  \ de complemento de la unión $(A \\cup B)^c$):** Elementos en el universo $U$ que no pertenecen a ninguno\
  \ de los dos conjuntos. Su cardinalidad se calcula como:\n   $$|(A \\cup B)^c| = |U| - |A \\cup B|$$\n\
  \n### Estrategia de Resolución \"De adentro hacia afuera\"\nLa regla de oro para resolver problemas\
  \ de conjuntos con diagramas de Venn es rellenar las regiones comenzando por el centro:\n1. **Paso 1:**\
  \ Escribe la cardinalidad de la intersección ($A \\cap B$) en la zona común central.\n2. **Paso 2:**\
  \ Resta el valor de la intersección a las cardinalidades totales de $A$ y $B$ para obtener los valores\
  \ de las regiones \"Solo $A$\" y \"Solo $B$\".\n3. **Paso 3:** Suma los valores de las tres regiones\
  \ interiores para obtener la cardinalidad de la unión:\n   $$|A \\cup B| = |Solo\\ A| + |Ambos| + |Solo\\\
  \ B|$$\n4. **Paso 4:** Resta el total de la unión del total del universo ($|U|$) para encontrar los\
  \ elementos que están en la región \"Ninguno\"."
procedimiento:
- 'Paso 1: Dibuja el diagrama de Venn con dos conjuntos intersecándose dentro de un rectángulo que representa
  el universo.'
- 'Paso 2: Identifica el dato de la intersección y colócalo en la región central compartida.'
- 'Paso 3: Resta este valor central de los totales de cada conjunto para completar las regiones "Solo
  A" y "Solo B".'
- 'Paso 4: Suma las tres regiones internas para obtener la unión y réstala de la cardinalidad del universo
  para hallar la región exterior (Ninguno).'
ejemplos:
- titulo: Ejemplo 1
  enunciado: En una encuesta a 40 personas sobre sus mascotas, 25 dijeron tener perros ($P$), 15 tener
    gatos ($G$) y 8 dijeron tener ambos. ¿Cuántas personas no tienen perros ni gatos?
  solucion_pasos:
  - 'Paso a: Identificamos los datos: Universo $|U| = 40$, Perros $|P| = 25$, Gatos $|G| = 15$, Ambos
    $|P \cap G| = 8$.'
  - 'Paso b: Colocamos el $8$ en la intersección central.'
  - 'Paso c: Calculamos "Solo perros": $25 - 8 = 17$. Calculamos "Solo gatos": $15 - 8 = 7$.'
  - 'Paso d: Sumamos las tres regiones internas para obtener la unión (personas con al menos una mascota):
    $17 + 8 + 7 = 32$.'
  - 'Paso e: Restamos la unión del total del universo para hallar "Ninguno": $40 - 32 = 8$. Por lo tanto,
    8 personas no tienen perros ni gatos.'
- titulo: Ejemplo 2
  enunciado: De 35 estudiantes de un curso, 20 practican atletismo ($A$) y 18 natación ($N$). Si todos
    los estudiantes practican al menos uno de los dos deportes, ¿cuántos estudiantes practican ambos deportes?
  solucion_pasos:
  - 'Paso a: Como todos practican al menos un deporte, la región "Ninguno" es $0$, por lo que la unión
    es igual al universo: $|A \cup N| = 35$. También $|A| = 20$ y $|N| = 18$.'
  - 'Paso b: Planteamos la ecuación del principio de inclusión-exclusión: $35 = 20 + 18 - |A \cap N|$.'
  - 'Paso c: Despejamos el valor de la intersección: $|A \cap N| = 20 + 18 - 35 = 38 - 35 = 3$.'
  - 'Paso d: Colocamos $3$ en el centro. Así, "Solo atletismo" es $20 - 3 = 17$ y "Solo natación" es $18
    - 3 = 15$. La suma de las regiones es $17 + 3 + 15 = 35$, coincidiendo con el total.'
- titulo: ¿Se puede rellenar el diagrama empezando por los totales de los conjuntos $A$ y $B$?
  respuesta: 'No'
  solucion_pasos:
  - Si colocas los totales directamente en los círculos sin restar la intersección, estarías duplicando
    elementos.
  - Por ejemplo, si pones 25 en el círculo de perros y 15 en el de gatos, la suma daría 40, lo cual ignora
    a las 8 personas que tienen ambos y desajusta las proporciones.
- titulo: ¿Si el universo tiene 50 elementos, es posible que la suma de "Solo A", "Ambos" y "Solo B" sea
    55?
  respuesta: 'No'
  solucion_pasos:
  - La unión de los conjuntos $A$ y $B$ es un subconjunto del universo $U$.
  - Por lo tanto, la cardinalidad de la unión ($|Solo\ A| + |Ambos| + |Solo\ B|$) nunca puede ser mayor
    que la cardinalidad del universo ($|U| = 50$). Un valor de 55 indica una inconsistencia en los datos
    del problema.
errores_frecuentes:
- Colocar los valores totales de los conjuntos directamente en las regiones exclusivas sin haber restado
  previamente la intersección central.
- Sumar incorrectamente las regiones disjuntas para obtener la unión.
- Confundir la región "Ninguno" (exterior de los círculos) con el conjunto vacío (que significa ausencia
  de elementos).
- Olvidar que la suma de las cuatro regiones en las que se divide el diagrama de Venn debe ser exactamente
  igual a la cardinalidad del universo.
- Intentar resolver el problema sin hacer un esquema gráfico, aumentando la probabilidad de error al restar.
fuente: Álgebra, Editorial Pearson, pág. 102
estado: publicado
