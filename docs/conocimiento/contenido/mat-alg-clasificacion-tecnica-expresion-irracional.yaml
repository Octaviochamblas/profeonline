semantic_id: MAT.ALG.CLASIFICACION_TECNICA.EXPRESION_IRRACIONAL
objetivo: Identificar expresiones algebraicas irracionales por la presencia de variables
  dentro de un radical.
introduccion: A veces, las variables se quedan atrapadas bajo un techo del cual no
  pueden salir fácilmente. Ese 'techo' es el símbolo de la raíz.
resumen: Una **Expresión Algebraica Irracional** es aquella en la que **al menos una
  de sus variables (letras) se encuentra dentro del signo de una raíz (radical)**,
  o bien, está elevada a un exponente fraccionario.
explicacion: 'El término ''irracional'' aquí significa que no se puede escribir como
  una simple razón (fracción) de polinomios ordinarios.

  - $\sqrt{x}$ es una expresión irracional pura.

  - $5x^2 + \sqrt[3]{y} - 2$ es irracional. (El polinomio entero $5x^2$ se ''contagia''
  de irracionalidad con la sola presencia de $\sqrt[3]{y}$).

  - $z^{1/2}$ es irracional, porque un exponente fraccionario es la forma moderna
  de escribir una raíz ($z^{1/2} = \sqrt{z}$).


  El desafío con las expresiones irracionales de índice par (como la raíz cuadrada)
  es que su dominio está severamente restringido: lo que está dentro de la raíz no
  puede ser negativo en los números reales.'
procedimiento:
- 'Paso 1: Escanea la expresión en busca del símbolo radical ($\sqrt{}$).'
- 'Paso 2: Observa el interior del radical (el radicando).'
- 'Paso 3: Si encuentras al menos una letra en el radicando, la expresión completa
  se clasifica como Irracional.'
- 'Paso 4: También busca exponentes fraccionarios sobre letras (ej. $x^{2/3}$); si
  los hay, también es Irracional.'
ejemplos:
- titulo: Bajo techo
  enunciado: Verifica la clasificación de la expresión 4x + √(xy) - 8.
  solucion_pasos:
  - El primer término es entero (4x).
  - El segundo término tiene el símbolo radical.
  - Dentro del radical están las letras 'x' e 'y'.
  - Por la presencia de este segundo término, la expresión total es Irracional.
errores_frecuentes:
- Clasificar como irracional a una expresión que tiene un número irracional, pero
  letras normales (ej. $\sqrt{5} \cdot x$). La irracionalidad algebraica requiere
  *variables* en la raíz.
- No reconocer que una letra elevada a una fracción (ej. $a^{3/4}$) es una expresión
  irracional oculta.
fuente: Álgebra de Baldor.
estado: publicado
