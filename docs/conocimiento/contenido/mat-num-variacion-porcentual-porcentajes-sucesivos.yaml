semantic_id: MAT.NUM.VARIACION_PORCENTUAL.PORCENTAJES_SUCESIVOS
objetivo: Calcular el impacto real de aplicar aumentos y descuentos de manera sucesiva.
introduccion: 'Las vitrinas anuncian ''¡Liquidación! 50% + 20% extra con tarjeta''.
  ¿Significa eso un 70% de descuento? Lamento decepcionarte: el comercio jamás sumaría
  así los descuentos. Aprende a calcular el verdadero descuento.'
resumen: 'Los porcentajes sucesivos NO se suman ni restan linealmente. Se calculan
  multiplicando encadenadamente sus factores de variación. Ej: $+10\%$ y luego $-10\%$
  no devuelve el precio original.'
explicacion: 'Cuando ocurren variaciones en cadena (un descuento tras otro, o un aumento
  seguido de una caída), **cada variación se aplica sobre el nuevo saldo**, no sobre
  el precio original.


  El método infalible es multiplicar el Valor Inicial por cada factor sucesivo:

  $$\text{Final} = \text{Inicial} \cdot \text{Factor}_1 \cdot \text{Factor}_2$$


  **Ejemplo del ''50% + 20% extra'':**

  - Primer factor (descuento 50%): pagas el $50\%$ ($0.50$).

  - Segundo factor (descuento 20%): pagas el $80\%$ ($0.80$).

  - Multiplicación conjunta: $0.50 \cdot 0.80 = 0.40$.

  Al final terminas pagando el $40\%$ del producto, lo que equivale a un **descuento
  real del $60\%$**, no del $70\%$.'
procedimiento:
- 'Paso 1: Convierte cada aumento o descuento en su ''factor multiplicador'' individual.'
- 'Paso 2: Multiplica todos los factores entre sí. Esto te dará un ''Factor Único''.'
- 'Paso 3: Analiza el Factor Único para ver si quedó arriba o debajo de 1. (Ej. $0.40$
  significa que pagas el 40%, o sea ahorras el 60%).'
ejemplos:
- titulo: Aumentar y descontar lo mismo
  enunciado: Un producto sube 20% y al mes siguiente baja 20%. ¿Queda en el precio
    original?
  solucion_pasos:
  - 'Factor aumento: $1.20$. Factor baja: $0.80$.'
  - 'Multiplicamos: $1.20 \cdot 0.80 = 0.96$.'
  - El factor final es $0.96$, lo que significa que el producto final quedó con un
    descuento real del 4% (¡es más barato que al principio!).
errores_frecuentes:
- Sumar algebraicamente los porcentajes (creer que $+10\%$ y $-10\%$ da $0\%$).
- Aplicar ambos descuentos sobre el Valor Inicial por separado y luego sumarlos.
fuente: Currículum Nacional MINEDUC.
estado: publicado
