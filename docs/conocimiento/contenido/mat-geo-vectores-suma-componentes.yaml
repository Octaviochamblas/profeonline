semantic_id: MAT.GEO.VECTORES_OPERATORIA.SUMA_COMPONENTES
titulo: Adición de vectores por componentes
objetivo: Sumar dos vectores algebraicamente, sumando por separado sus componentes horizontales y sus
  componentes verticales.
introduccion: 'Sumar vectores por componentes es mucho más directo que el método geométrico: basta con
  sumar los números correspondientes de cada componente.'
resumen: 'Para sumar dos vectores $\vec{u}=(u_x,u_y)$ y $\vec{v}=(v_x,v_y)$, se suman sus componentes
  por separado: $\vec{u}+\vec{v}=(u_x+v_x,\,u_y+v_y)$.'
explicacion: '![Adición de vectores por componentes](/static/img/geometria/cartesiano-vectores/vectores-suma-componentes.svg)


  ### Definición formal


  La suma de vectores $\vec{u}=(u_x,u_y)$ y $\vec{v}=(v_x,v_y)$ es $\vec{u}+\vec{v}=(u_x+v_x,\,u_y+v_y)$:
  se suman las componentes horizontales entre sí y las componentes verticales entre sí.


  ### Desarrollo didáctico


  Si $\vec{u}=(3,1)$ y $\vec{v}=(1,3)$, entonces $\vec{u}+\vec{v}=(3+1,\,1+3)=(4,4)$, coincidiendo exactamente
  con el resultado obtenido mediante el método geométrico del triángulo.'
procedimiento:
- 'Paso 1: Identifica las componentes de cada vector: u=(ux,uy) y v=(vx,vy).'
- 'Paso 2: Suma las componentes horizontales: ux+vx.'
- 'Paso 3: Suma las componentes verticales: uy+vy, obteniendo el vector suma (ux+vx, uy+vy).'
ejemplos:
- titulo: Sumar dos vectores por componentes
  enunciado: u=(3,1) y v=(1,3).
  solucion_pasos:
  - u+v=(3+1, 1+3)=(4,4).
- titulo: Sumar vectores con componentes negativas
  enunciado: u=(-2,5) y v=(4,-3).
  solucion_pasos:
  - u+v=(-2+4, 5-3)=(2,2).
- titulo: ¿Este método algebraico da el mismo resultado que el método geométrico?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos métodos (geométrico y por componentes) son equivalentes y dan siempre el mismo vector suma.
- titulo: ¿Se pueden sumar más de dos vectores usando este método?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con sumar todas las componentes x entre sí, y todas las componentes y entre sí, sin importar
    cuántos vectores se sumen.
errores_frecuentes:
- Sumar la componente x de un vector con la componente y del otro, mezclando las componentes incorrectamente.
- Cometer errores de signo al sumar componentes negativas.
- Confundir la suma de vectores con la suma de sus módulos (que no es válida en general).
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 123).'
estado: publicado
