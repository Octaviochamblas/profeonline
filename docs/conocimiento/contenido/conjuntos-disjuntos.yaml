semantic_id: MAT.FUND.RELACIONES_CONJUNTOS.CONJUNTOS_DISJUNTOS
titulo: Conjuntos disjuntos
objetivo: Identificar y justificar si dos conjuntos son disjuntos comprobando que no comparten ningún
  elemento en común.
introduccion: 'Imagina que tienes una caja con lápices de colores y otra caja con autitos de juguete.
  Si buscas en ambas cajas, ¿hay algún objeto que esté en las dos al mismo tiempo? ¡Claro que no! Un lápiz
  no puede ser un autito, ni viceversa. Las colecciones son completamente independientes.


  En matemáticas, cuando dos conjuntos no comparten absolutamente ningún elemento en común, decimos que
  son conjuntos disjuntos. Es como dos islas separadas por el océano, sin ningún puente que las una.


  Comprender este concepto te ayudará a resolver problemas de clasificación y conteo, asegurándote de
  no contar dos veces cosas que pertenecen a grupos totalmente independientes.'
resumen: 'Dos conjuntos $A$ y $B$ son disjuntos si no tienen elementos en común, lo que significa que
  su intersección es el conjunto vacío ($A \cap B = \emptyset$). Su cardinalidad de la intersección es
  cero ($|A \cap B| = 0$).

  '
explicacion: "La relación de **conjuntos disjuntos** describe la exclusión mutua de elementos entre colecciones.\n\
  \n**Definición Formal:**\nDos conjuntos $A$ y $B$ son disjuntos si y solo si:\n$$A \\cap B = \\emptyset$$\n\
  Esto significa que no existe ningún elemento $x$ tal que $x \\in A$ y $x \\in B$ simultáneamente:\n\
  $$\\neg (\\exists x : x \\in A \\land x \\in B)$$\n\n**Propiedades y Consecuencias:**\n1. **Intersección\
  \ Vacía:** La intersección de ambos conjuntos es el conjunto vacío.\n2. **Cardinalidad de la Unión:**\
  \ Si $A$ y $B$ son conjuntos finitos disjuntos, entonces la cardinalidad de su unión es simplemente\
  \ la suma de sus cardinalidades individuales:\n   $$|A \\cup B| = |A| + |B|$$\n   (Ya que no hay elementos\
  \ comunes que restar en el principio de inclusión-exclusión).\n3. **Diferencia de Conjuntos:** Si $A$\
  \ y $B$ son disjuntos, entonces quitarle $B$ a $A$ no le quita nada, es decir, $A \\setminus B = A$.\n\
  4. **Subconjuntos:** Si $A$ y $B$ son disjuntos y $S \\subseteq A$, entonces $S$ y $B$ también son disjuntos."
procedimiento:
- 'Paso 1: Identifica los elementos de los conjuntos $A$ y $B$.'
- 'Paso 2: Compara las listas de elementos buscando si existe algún elemento en común que pertenezca a
  ambos conjuntos a la vez.'
- 'Paso 3: Si no encuentras ningún elemento en común, concluye que los conjuntos son disjuntos ($A \cap
  B = \emptyset$). Si encuentras al menos un elemento en común, concluye que no son disjuntos.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determina si los conjuntos $A = \{1, 3, 5\}$ and $B = \{2, 4, 6\}$ son disjuntos.
  solucion_pasos:
  - 'Paso a: Listamos los elementos de ambos conjuntos. $A$ contiene los números impares: 1, 3, 5. $B$
    contiene los números pares: 2, 4, 6.'
  - 'Paso b: Buscamos elementos comunes. Comprobamos si el 1 está en $B$ (no), si el 3 está en $B$ (no)
    y si el 5 está en $B$ (no).'
  - 'Paso c: Como no existe ningún elemento que pertenezca a ambos conjuntos a la vez, concluimos que
    son conjuntos disjuntos.'
- titulo: Ejemplo 2
  enunciado: Determina si el conjunto de los números naturales menores que 5 y el conjunto de los naturales
    mayores que 7 son disjuntos.
  solucion_pasos:
  - 'Paso a: Escribimos ambos conjuntos por extensión. Sean $P = \{1, 2, 3, 4\}$ y $Q = \{8, 9, 10, 11,
    \dots\}$.'
  - 'Paso b: Analizamos si comparten elementos. Ninguno de los números del 1 al 4 es mayor que 7.'
  - 'Paso c: Como no comparten elementos, la intersección es vacía ($P \cap Q = \emptyset$). Por lo tanto,
    $P$ y $Q$ son conjuntos disjuntos.'
- titulo: ¿Son disjuntos los conjuntos $C = \\{a, b, c\\}$ y $D = \\{c, d, e\\}$?
  respuesta: 'No'
  solucion_pasos:
  - Comparamos los elementos de los conjuntos $C$ y $D$.
  - Observamos que la letra $c$ pertenece tanto al conjunto $C$ como al conjunto $D$.
  - Como existe al menos un elemento en común ($c \in C \cap D$), la intersección no es vacía y los conjuntos
    no son disjuntos.
- titulo: ¿Es el conjunto vacío $\\emptyset$ disjunto con cualquier otro conjunto $A$?
  respuesta: Sí
  solucion_pasos:
  - Para que dos conjuntos sean disjuntos, su intersección debe ser vacía.
  - 'La intersección de cualquier conjunto $A$ con el conjunto vacío siempre es igual al conjunto vacío:
    $A \cap \emptyset = \emptyset$.'
  - Como se cumple la definición, el conjunto vacío es disjunto con cualquier conjunto.
errores_frecuentes:
- Confundir conjuntos disjuntos (intersección vacía) con conjuntos vacíos (sin elementos).
- Pensar que dos conjuntos no son disjuntos solo porque tienen el mismo número de elementos (cardinalidades
  iguales).
- Olvidar que un solo elemento compartido (como el 0 o el vacío en conjuntos de conjuntos) rompe la condición
  de ser disjuntos.
- Creer que los conjuntos de números pares e impares no son disjuntos porque ambos son números enteros.
- Confundir la operación de unión con la de intersección al evaluar si son disjuntos.
fuente: Álgebra y Fundamentos, Universidad de Chile
estado: publicado
