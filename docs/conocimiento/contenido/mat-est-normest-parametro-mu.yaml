semantic_id: MAT.EST.NORMAL_ESTANDAR.PARAMETRO_MU
titulo: Identificar la media mu en la notación normal
objetivo: Identificar el símbolo $\mu$ como el parámetro que representa la media en la notación de una distribución
  normal.
introduccion: La letra griega $\mu$ (mu) es solo el nombre matemático que se le da a la media cuando se habla de
  distribuciones de probabilidad.
resumen: El símbolo $\mu$ representa la media de una distribución normal y corresponde al primer parámetro en la
  notación $N(\mu,\sigma)$.
explicacion: '![Parámetro mu](/static/img/estadistica/normest/normest-parametro-mu.svg)


  ### Definición formal


  En la notación $N(\mu,\sigma)$, el símbolo $\mu$ representa la media de la distribución, es decir, el centro de la

  curva normal correspondiente.


  ### Desarrollo didáctico


  Usar letras griegas como $\mu$ es una convención estándar en estadística para distinguir parámetros poblacionales

  de estadísticos muestrales (como $\bar{x}$).'
procedimiento:
- 'Paso 1: Ubica el símbolo $\mu$ dentro de la notación de la distribución normal.'
- 'Paso 2: Reconoce que ese valor corresponde a la media de la distribución.'
- 'Paso 3: Interpreta $\mu$ como el centro de la curva.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: En $N(50, 5)$, ¿cuál es el valor de $\mu$?
  solucion_pasos:
  - El valor de $\mu$ es 50, ya que corresponde al primer parámetro.
- titulo: Ejemplo 2
  enunciado: ¿Qué representa $\mu$ en el contexto de una distribución normal?
  solucion_pasos:
  - Representa la media de la distribución, el punto central de la curva.
- titulo: ¿El símbolo $\mu$ representa la media en la notación normal?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la convención estándar usada en estadística.
- titulo: ¿El símbolo $\mu$ representa la desviación estándar de la distribución?
  respuesta: 'No'
  solucion_pasos:
  - 'No, la desviación estándar se representa con $\sigma$, no con $\mu$.'
errores_frecuentes:
- Confundir el símbolo $\mu$ con $\sigma$.
- Pensar que $\mu$ representa siempre el valor cero.
- Creer que $\mu$ es un símbolo exclusivo de la distribución normal estándar.
- Confundir $\mu$ (parámetro poblacional) con $\bar{x}$ (estadístico muestral).
- Olvidar que $\mu$ siempre ocupa la primera posición en la notación $N(\mu,\sigma)$.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
