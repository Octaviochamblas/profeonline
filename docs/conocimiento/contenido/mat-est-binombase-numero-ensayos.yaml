semantic_id: MAT.EST.BINOMIAL_BASE.NUMERO_ENSAYOS
titulo: Identificar el número de ensayos n en un experimento binomial
objetivo: Identificar el parámetro n como el número de veces que se repite un experimento de Bernoulli
  en un experimento binomial.
introduccion: El modelo binomial surge de repetir un mismo experimento de Bernoulli un número fijo de
  veces, denotado por el parámetro n.
resumen: El parámetro $n$ representa el número de ensayos (repeticiones) del experimento de Bernoulli
  en un experimento binomial.
explicacion: '![Número de ensayos en un experimento binomial](/static/img/probabilidad/binombase/binombase-numero-ensayos.svg)


  ### Definición formal


  $n$ es un número entero positivo fijo que indica cuántas veces se repite el experimento de Bernoulli.


  ### Desarrollo didáctico


  Si se lanza una moneda 10 veces y se cuenta el número de caras obtenidas, el parámetro $n=10$ representa
  el número de ensayos (lanzamientos) realizados.'
procedimiento:
- 'Paso 1: Lee el problema e identifica cuántas veces se repite el experimento de Bernoulli.'
- 'Paso 2: Ese número de repeticiones corresponde exactamente al parámetro n.'
- 'Paso 3: Verifica que n sea un número fijo y conocido antes de aplicar el modelo binomial.'
ejemplos:
- titulo: Identificar n al lanzar una moneda 10 veces
  enunciado: Se lanza una moneda 10 veces.
  solucion_pasos:
  - n=10, ya que el experimento de Bernoulli (lanzar la moneda) se repite 10 veces.
- titulo: Identificar n al revisar 20 artículos
  enunciado: Se revisan 20 artículos de una línea de producción para verificar si son defectuosos.
  solucion_pasos:
  - n=20, ya que el experimento de Bernoulli (revisar un artículo) se repite 20 veces.
- titulo: ¿n debe ser un número fijo y conocido de antemano?
  respuesta: Sí
  solucion_pasos:
  - Sí, es uno de los requisitos del modelo binomial.
- titulo: ¿n representa el número de éxitos obtenidos?
  respuesta: 'No'
  solucion_pasos:
  - No, n representa el número total de ensayos realizados, no el número de éxitos obtenidos (ese es otro
    parámetro, k).
errores_frecuentes:
- Confundir el parámetro n (número de ensayos) con el número de éxitos obtenidos (k).
- No identificar correctamente cuántas veces se repite el experimento en el enunciado del problema.
- Aplicar el modelo binomial cuando el número de ensayos no está fijado de antemano.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
