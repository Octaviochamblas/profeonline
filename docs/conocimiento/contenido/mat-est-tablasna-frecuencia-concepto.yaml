semantic_id: MAT.EST.TABLAS_NO_AGRUPADAS.FRECUENCIA_CONCEPTO
titulo: Comprender el concepto de frecuencia
objetivo: Comprender la frecuencia como el número de veces que aparece un valor determinado dentro de
  un conjunto de datos.
introduccion: 'La frecuencia es la base de toda tabla estadística: resume cuántas veces se repite cada
  valor observado.'
resumen: La frecuencia de un valor es el número de veces que ese valor aparece dentro del conjunto de
  datos analizado.
explicacion: '![Concepto de frecuencia](/static/img/estadistica/tablasna/tablasna-frecuencia-concepto.svg)


  ### Definición formal


  La frecuencia de un valor $x_i$ es el número de observaciones del conjunto de datos que son iguales
  a $x_i$.


  ### Desarrollo didáctico


  En el conjunto de notas {5, 6, 4, 7, 6}, el valor 6 tiene frecuencia 2, ya que aparece dos veces en
  el conjunto de datos.'
procedimiento:
- 'Paso 1: Elige el valor cuya frecuencia se quiere determinar.'
- 'Paso 2: Cuenta cuántas veces aparece exactamente ese valor en el conjunto de datos.'
- 'Paso 3: Ese conteo es la frecuencia del valor elegido.'
ejemplos:
- titulo: Calcular la frecuencia del valor 6
  enunciado: 'Conjunto de notas: 5, 6, 4, 7, 6.'
  solucion_pasos:
  - El valor 6 aparece 2 veces, por lo tanto su frecuencia es 2.
- titulo: Calcular la frecuencia del valor 1
  enunciado: 'Número de mascotas por familia: 0, 1, 2, 1, 0, 3, 1.'
  solucion_pasos:
  - El valor 1 aparece 3 veces, por lo tanto su frecuencia es 3.
- titulo: ¿La frecuencia de un valor siempre es un número entero positivo o cero?
  respuesta: Sí
  solucion_pasos:
  - Sí, representa un conteo de repeticiones, que nunca puede ser negativo ni decimal.
- titulo: ¿Un valor que no aparece en el conjunto tiene frecuencia cero?
  respuesta: Sí
  solucion_pasos:
  - Sí, si un valor posible no aparece en los datos observados, su frecuencia es 0.
errores_frecuentes:
- Confundir el valor de la variable (x) con su frecuencia (f), mezclando ambos conceptos.
- Contar mal las repeticiones de un valor, especialmente en conjuntos de datos grandes.
- Olvidar considerar un valor con frecuencia cero cuando corresponde incluirlo en el análisis.
fuente: 'Elaboración propia (referencia: Moraleja 351).'
estado: publicado
