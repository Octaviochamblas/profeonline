semantic_id: MAT.GEO.TRIANGULOS_DEF.POLIGONO_TRES_LADOS
titulo: Definición de triángulo como polígono de tres lados
objetivo: Reconocer que un triángulo es el polígono cerrado más simple, formado por exactamente tres segmentos.
introduccion: 'Entre todos los polígonos, el triángulo es el que tiene el menor número posible de lados:
  no existe un polígono cerrado con uno o dos lados, porque se necesitan al menos tres segmentos para
  encerrar una región del plano.'
resumen: Un triángulo es un polígono de tres lados, formado por tres segmentos que se unen dos a dos en
  tres puntos, sin cruzarse entre sí.
explicacion: '![Triángulo, polígono de tres lados](/static/img/geometria/triangulos/triangulos-def-poligono-tres-lados.svg)


  ### Definición formal


  Un triángulo es la figura geométrica plana formada por tres segmentos (llamados lados) que se unen en
  sus extremos formando exactamente tres vértices, sin que ningún par de lados se cruce entre sí (además
  de en esos extremos).


  ### Desarrollo didáctico


  Con tres segmentos AB, BC y CA que comparten extremos de a pares (A con B, B con C, C con A) se forma
  una región cerrada: el triángulo ABC. Si se intenta cerrar una figura con solo dos segmentos, ambos
  comparten los mismos dos extremos y quedan superpuestos, sin encerrar ninguna región — por eso tres
  es el mínimo de lados posible para un polígono.'
procedimiento:
- 'Paso 1: Cuenta cuántos segmentos rectos forman la figura cerrada.'
- 'Paso 2: Verifica que los segmentos se toquen solo en sus extremos, sin cruzarse.'
- 'Paso 3: Si son exactamente tres segmentos, la figura es un triángulo.'
ejemplos:
- titulo: Reconocer un triángulo
  enunciado: Una figura está formada por tres segmentos AB, BC y CA, unidos únicamente en A, B y C.
  solucion_pasos:
  - Se cuentan tres segmentos.
  - Los segmentos se tocan solo en sus extremos.
  - La figura es un triángulo.
- titulo: Figura con dos segmentos
  enunciado: Dos segmentos comparten ambos extremos entre sí.
  solucion_pasos:
  - Se cuentan solo dos segmentos.
  - No alcanza el mínimo de tres lados.
  - La figura no es un polígono cerrado con región propia.
- titulo: ¿Un triángulo puede tener cuatro lados?
  respuesta: 'No'
  solucion_pasos:
  - No. La definición de triángulo exige exactamente tres lados.
  - Una figura de cuatro lados es un cuadrilátero, no un triángulo.
  - El número de lados es el criterio que distingue a cada polígono.
- titulo: ¿El triángulo es el polígono con menos lados posible?
  respuesta: Sí
  solucion_pasos:
  - Sí. Con uno o dos segmentos no se puede encerrar una región del plano.
  - Tres es el mínimo de segmentos necesarios para cerrar una figura.
  - Por eso el triángulo es el polígono más simple que existe.
errores_frecuentes:
- Confundir un triángulo con cualquier figura de líneas cruzadas, sin verificar que los segmentos solo
  se toquen en los extremos.
- Creer que basta con tres puntos cualesquiera sin trazar los tres segmentos que los unen.
- Pensar que existen polígonos de uno o dos lados.
fuente: Elaboración propia.
estado: publicado
