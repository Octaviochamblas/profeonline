semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.ISOSCELES_LADOS_ANGULOS
titulo: Equivalencia entre lados iguales y ángulos opuestos iguales en un triángulo isósceles
objetivo: Reconocer que en un triángulo isósceles, a lados iguales se oponen ángulos iguales, y viceversa.
introduccion: 'La igualdad de dos lados en un triángulo isósceles y la igualdad de sus ángulos basales
  no son dos hechos separados: son dos caras de la misma propiedad, cada una implica la otra.'
resumen: En un triángulo, dos lados son iguales si y solo si los ángulos opuestos a ellos son iguales.
explicacion: '![Correspondencia lados-ángulos en isósceles](/static/img/geometria/triangulos/triangulos-clasificacion-isosceles-lados-angulos.svg)


  ### Definición formal


  En un triángulo ABC, AC=BC si y solo si ∠A=∠B (el ángulo opuesto a AC es B, y el opuesto a BC es A).
  Esta es una equivalencia en ambos sentidos.


  ### Desarrollo didáctico


  Si se sabe que AC=BC (piernas iguales), se concluye ∠A=∠B (basales iguales) sin necesidad de medirlos.
  Al revés, si se observa que ∠A=∠B, se concluye que AC=BC, aunque no se hayan medido los lados directamente.'
procedimiento:
- 'Paso 1: Observa si dos lados del triángulo son iguales, o si dos ángulos lo son.'
- 'Paso 2: Identifica qué ángulo es opuesto a cada lado en cuestión.'
- 'Paso 3: Aplica la equivalencia: lados iguales implican ángulos opuestos iguales, y viceversa.'
ejemplos:
- titulo: De lados a ángulos
  enunciado: En un triángulo ABC, se sabe que AC=BC.
  solucion_pasos:
  - Se concluye que ∠A=∠B, sin necesidad de medirlos.
- titulo: De ángulos a lados
  enunciado: En un triángulo ABC, se sabe que ∠A=∠B.
  solucion_pasos:
  - Se concluye que los lados opuestos, BC y AC, son iguales.
- titulo: ¿Esta equivalencia funciona en ambos sentidos?
  respuesta: Sí
  solucion_pasos:
  - Sí, lados iguales implican ángulos iguales, y ángulos iguales implican lados iguales.
- titulo: ¿Se puede aplicar esta propiedad a un triángulo escaleno?
  respuesta: 'No'
  solucion_pasos:
  - No, en un escaleno no hay lados ni ángulos iguales que relacionar de esta forma.
errores_frecuentes:
- Aplicar la equivalencia entre un lado y su ángulo adyacente, en vez del opuesto.
- Creer que esta propiedad solo funciona en una dirección (de lados a ángulos, no al revés).
- Intentar aplicar la propiedad sin verificar primero cuáles lados o ángulos son iguales.
fuente: Elaboración propia.
estado: publicado
