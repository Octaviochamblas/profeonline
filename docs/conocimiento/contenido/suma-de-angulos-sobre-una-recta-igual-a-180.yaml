semantic_id: MAT.GEO.ANGULOS_RELACIONES_METRICAS.SUMA_RECTA
titulo: Suma de ángulos sobre una recta igual a 180°
objetivo: Usar la recta como referencia para sumar ángulos y comprobar que la recta funciona como referencia
  para detectar pares lineales y suplementarios.
introduccion: Una línea recta puede partirse en dos o más aberturas, pero la suma total sigue siendo una
  media vuelta.
resumen: Los ángulos que completan una recta suman 180°. Como idea de control, la recta funciona como
  referencia para detectar pares lineales y suplementarios.
explicacion: 'Los ángulos que completan una recta suman 180°.


  El ejemplo “si dos ángulos adyacentes ocupan toda una línea, por ejemplo 48° y 132°, su suma es 180°”
  no se resuelve por apariencia: se justifica usando la definición y revisando finalmente que la recta
  funciona como referencia para detectar pares lineales y suplementarios.'
procedimiento:
- 'Paso 1: Reconoce que los ángulos considerados cubren toda la recta sin superponerse.'
- 'Paso 2: Suma las medidas conocidas o expresa con ecuaciones las incógnitas del esquema.'
- 'Paso 3: Comprueba que el total obtenido sea 180° y úsalo para hallar la medida faltante.'
ejemplos:
- titulo: Aplicación directa — Suma sobre una recta
  enunciado: Si dos ángulos adyacentes ocupan toda una línea, por ejemplo 48° y 132°, su suma es 180°.
  solucion_pasos:
  - Reconoce que los ángulos considerados cubren toda la recta sin superponerse.
  - Suma las medidas conocidas o expresa con ecuaciones las incógnitas del esquema.
  - Comprueba que el total obtenido sea 180° y úsalo para hallar la medida faltante.
- titulo: Chequeo del procedimiento — Suma sobre una recta
  enunciado: 'Un estudiante usa la idea “la recta funciona como referencia para detectar pares lineales
    y suplementarios” al analizar este caso: si dos ángulos adyacentes ocupan toda una línea, por ejemplo
    48° y 132°, su suma es 180°. Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: los ángulos que completan una recta suman 180°.'
  - Suma las medidas conocidas o expresa con ecuaciones las incógnitas del esquema.
  - Comprueba que el total obtenido sea 180° y úsalo para hallar la medida faltante.
- titulo: ¿La situación respeta la idea clave del recurso? — Suma sobre una recta
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: los ángulos que completan una recta suman
    180°.'
  - En el caso “si dos ángulos adyacentes ocupan toda una línea, por ejemplo 48° y 132°, su suma es 180°”
    se observa que la recta funciona como referencia para detectar pares lineales y suplementarios.
  - Comprueba que el total obtenido sea 180° y úsalo para hallar la medida faltante.
- titulo: ¿Se puede cerrar sin el control final? — Suma sobre una recta
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de suma de ángulos sobre una recta igual
    a 180°.
  - Después del paso “Reconoce que los ángulos considerados cubren toda la recta sin superponerse.” todavía
    hace falta revisar “Suma las medidas conocidas o expresa con ecuaciones las incógnitas del esquema.”.
  - El cierre correcto exige “Comprueba que el total obtenido sea 180° y úsalo para hallar la medida faltante.”.
errores_frecuentes:
- Suma sobre una recta significa sumar 360° solo porque hay varios ángulos dibujados alrededor de un punto.
- Para resolver suma sobre una recta, basta con el paso “Reconoce que los ángulos considerados cubren
  toda la recta sin superponerse.” y no hace falta revisar “Suma las medidas conocidas o expresa con ecuaciones
  las incógnitas del esquema.”.
- Si el dibujo parece claro, se puede ignorar que la recta funciona como referencia para detectar pares
  lineales y suplementarios.
- Dos configuraciones distintas representan suma sobre una recta solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Comprueba que el total obtenido sea 180°
  y úsalo para hallar la medida faltante.”.
