semantic_id: MAT.EST.DISPERSION_COMPARATIVA.COEF_VARIACION_CALCULO
titulo: Calcular el coeficiente de variación a partir de media y desviación estándar
objetivo: Calcular el coeficiente de variación de un conjunto de datos a partir de su media y su desviación estándar.
introduccion: Con la media y la desviación estándar ya calculadas, obtener el coeficiente de variación es solo una
  división y una multiplicación por 100.
resumen: El coeficiente de variación se calcula dividiendo la desviación estándar por la media y multiplicando el
  resultado por 100 para expresarlo como porcentaje.
explicacion: '![Cálculo del coeficiente de variación](/static/img/estadistica/dispcomp/dispcomp-coef-variacion-calculo.svg)


  ### Definición formal


  Se aplica la fórmula $CV=\dfrac{\sigma}{\bar{x}}\times 100\%$, usando la desviación estándar $\sigma$ y la media

  $\bar{x}$ del mismo conjunto de datos.


  ### Desarrollo didáctico


  Por ejemplo, si $\bar{x}=50$ y $\sigma=5$, entonces $CV=\dfrac{5}{50}\times 100\% = 10\%$, lo que indica una

  dispersión relativa moderada.'
procedimiento:
- 'Paso 1: Calcula la media $\bar{x}$ del conjunto de datos.'
- 'Paso 2: Calcula la desviación estándar $\sigma$ del mismo conjunto.'
- 'Paso 3: Aplica $CV=\dfrac{\sigma}{\bar{x}}\times 100\%$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $\bar{x}=50$ y $\sigma=5$, calcula el coeficiente de variación.
  solucion_pasos:
  - $CV = \dfrac{5}{50}\times 100\%$.
  - $CV = 10\%$.
- titulo: Ejemplo 2
  enunciado: Si $\bar{x}=200$ y $\sigma=40$, calcula el coeficiente de variación.
  solucion_pasos:
  - $CV = \dfrac{40}{200}\times 100\%$.
  - $CV = 20\%$.
- titulo: ¿Se necesita conocer tanto la media como la desviación estándar para calcular el $CV$?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos valores son indispensables en la fórmula.
- titulo: ¿El coeficiente de variación se calcula sin multiplicar por 100?
  respuesta: 'No'
  solucion_pasos:
  - 'No, se debe multiplicar por 100 para expresarlo correctamente como porcentaje.'
errores_frecuentes:
- Olvidar multiplicar por 100 el resultado de la división.
- Invertir la fórmula y dividir la media por la desviación estándar.
- Confundir el coeficiente de variación con la desviación estándar misma.
- Usar la media de un conjunto distinto al de la desviación estándar.
- Redondear el resultado sin conservar suficientes decimales para comparar correctamente.
fuente: 'Elaboración propia (referencia: Moraleja 281, 296).'
estado: publicado
