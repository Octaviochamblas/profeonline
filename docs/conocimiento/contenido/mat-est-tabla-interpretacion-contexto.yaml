semantic_id: MAT.EST.TABLAS_CONTINGENCIA.INTERPRETACION_CONTEXTO
titulo: Interpretación contextual de probabilidades obtenidas desde tablas de doble entrada
objetivo: Interpretar en el contexto real del problema (no solo numéricamente) el significado de una probabilidad
  simple o conjunta calculada a partir de una tabla de doble entrada.
introduccion: 'Calcular correctamente un número no es suficiente: es necesario poder explicar qué significa
  ese resultado en la situación concreta que se está estudiando.'
resumen: Interpretar una probabilidad en contexto significa expresar su significado en términos del problema
  original, no solo como un número aislado.
explicacion: '![Interpretación contextual de una tabla](/static/img/probabilidad/tablas/tabla-interpretacion-contexto.svg)


  ### Definición formal


  Dada una probabilidad calculada a partir de una tabla de doble entrada, su interpretación contextual
  describe, en palabras propias del problema, qué representa ese valor numérico.


  ### Desarrollo didáctico


  Si $P(\text{Recomienda y Ciudad A})=\dfrac{35}{120}\approx0{,}29$, la interpretación en contexto sería:
  ''aproximadamente el 29% de todos los encuestados son de la Ciudad A y recomiendan el servicio''.'
procedimiento:
- 'Paso 1: Calcula el valor numérico de la probabilidad simple o conjunta correspondiente.'
- 'Paso 2: Identifica a qué categorías específicas del problema original corresponde ese valor.'
- 'Paso 3: Redacta la interpretación en palabras propias del contexto, mencionando esas categorías específicas.'
ejemplos:
- titulo: Interpretar P(Recomienda y Ciudad A)
  enunciado: P=35/120≈0,29.
  solucion_pasos:
  - 'Interpretación: aproximadamente el 29% de todos los encuestados son de la Ciudad A y recomiendan
    el servicio.'
- titulo: Interpretar P(No recomienda)
  enunciado: Total marginal 'No recomienda'=70, total general=120.
  solucion_pasos:
  - 'P=70/120≈0,58. Interpretación: aproximadamente el 58% de todos los encuestados no recomienda el servicio,
    sin importar su ciudad.'
- titulo: ¿Es suficiente dar solo el número, sin explicar su significado en contexto?
  respuesta: 'No'
  solucion_pasos:
  - No, en problemas aplicados se espera una interpretación clara que conecte el número con la situación
    real.
- titulo: ¿La interpretación debe mencionar las categorías específicas del problema?
  respuesta: Sí
  solucion_pasos:
  - Sí, una interpretación completa siempre hace referencia a las categorías concretas involucradas.
errores_frecuentes:
- Dar solo el valor numérico de la probabilidad sin explicar su significado en el contexto del problema.
- Interpretar incorrectamente si el cálculo corresponde a una probabilidad simple o conjunta.
- Redactar una interpretación ambigua que no especifique claramente las categorías involucradas.
fuente: Elaboración propia.
estado: publicado
