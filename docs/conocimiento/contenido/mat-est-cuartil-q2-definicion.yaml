semantic_id: MAT.EST.CUARTILES.Q2_DEFINICION
titulo: Interpretar el segundo cuartil como la mediana de los datos
objetivo: Interpretar el segundo cuartil $Q_2$ como la mediana del conjunto de datos ordenados.
introduccion: El segundo cuartil es el corte que queda justo en la mitad de los datos ordenados, el mismo valor que ya
  conoces como mediana.
resumen: El segundo cuartil $Q_2$ coincide siempre con la mediana del conjunto de datos, dejando el 50% de los datos por
  debajo y el 50% por encima.
explicacion: '![Segundo cuartil](/static/img/estadistica/cuartil/cuartil-q2-definicion.svg)


  ### Definición formal


  $Q_2$ es el valor central de un conjunto de datos ordenados, equivalente al percentil 50 ($P_{50}$) y a la mediana.


  ### Desarrollo didáctico


  Como $Q_2$ es la mediana, se calcula exactamente igual: si el número de datos es impar, es el valor central; si es par,

  es el promedio de los dos valores centrales.'
procedimiento:
- 'Paso 1: Ordena los datos de menor a mayor.'
- 'Paso 2: Calcula la mediana del conjunto igual que siempre.'
- 'Paso 3: Ese valor es $Q_2$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Para el conjunto ordenado $\{2, 4, 6, 8, 10\}$, ¿cuál es $Q_2$?
  solucion_pasos:
  - El conjunto tiene 5 datos (impar), por lo que la mediana es el valor central.
  - $Q_2 = 6$.
- titulo: Ejemplo 2
  enunciado: Para el conjunto ordenado $\{1, 3, 5, 7\}$, ¿cuál es $Q_2$?
  solucion_pasos:
  - Con 4 datos (par), la mediana es el promedio de los dos valores centrales.
  - $Q_2 = (3+5)/2 = 4$.
- titulo: ¿El segundo cuartil siempre coincide con la mediana?
  respuesta: Sí
  solucion_pasos:
  - Sí, $Q_2$ es, por definición, la mediana del conjunto de datos.
- titulo: ¿$Q_2$ corresponde al percentil 25?
  respuesta: 'No'
  solucion_pasos:
  - 'No, $Q_2$ corresponde al percentil 50, no al 25 (ese es $Q_1$).'
errores_frecuentes:
- Creer que $Q_2$ es distinto de la mediana.
- Confundir el cálculo de $Q_2$ con el de $Q_1$ o $Q_3$.
- Olvidar promediar los dos valores centrales cuando el número de datos es par.
- Pensar que $Q_2$ siempre es un dato que pertenece al conjunto original.
- No ordenar los datos antes de calcular $Q_2$.
fuente: 'Elaboración propia (referencia: Moraleja 380).'
estado: publicado
