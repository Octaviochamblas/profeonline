semantic_id: MAT.NUM.COMPLEJOS.REPRESENTACION_CARTESIANA
objetivo: Convertir entre forma binomial y par cartesiano.
introduccion: Un complejo puede verse como un punto o vector del plano. La forma cartesiana
  traduce directamente sus dos componentes en coordenadas.
resumen: El complejo \(a+bi\) se representa por el par ordenado \((a,b)\). La coordenada
  horizontal es la parte real y la vertical es la parte imaginaria.
explicacion: |-
  El complejo \(a+bi\) se representa por el par ordenado \((a,b)\).

  Al analizar “\(-2+5i\) corresponde al punto \((-2,5)\)” conviene observar la conexión siguiente: la coordenada horizontal es la parte real y la vertical es la parte imaginaria
procedimiento:
- 'Paso 1: Identifica \(a\) y \(b\) en la forma \(a+bi\).'
- 'Paso 2: Escribe el par \((a,b)\) respetando orden y signos.'
- 'Paso 3: Reconstruye \(a+bi\) desde el par para verificar la correspondencia.'
ejemplos:
- titulo: Aplicación razonada — Representación cartesiana de un número complejo
  enunciado: \(-2+5i\) corresponde al punto \((-2,5)\).
  solucion_pasos:
  - Identifica \(a\) y \(b\) en la forma \(a+bi\).
  - Escribe el par \((a,b)\) respetando orden y signos.
  - Reconstruye \(a+bi\) desde el par para verificar la correspondencia.
- titulo: Revisión de una solución — Representación cartesiana de un número complejo
  enunciado: Una solución aplica “Escribe el par \((a,b)\) respetando orden y signos.”,
    pero termina sin comprobar que la coordenada horizontal es la parte real y la
    vertical es la parte imaginaria. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define representación cartesiana de un número complejo:
    el complejo \(a+bi\) se representa por el par ordenado \((a,b)\).'
  - Identifica \(a\) y \(b\) en la forma \(a+bi\).
  - 'Completa la revisión con este control: Reconstruye \(a+bi\) desde el par para
    verificar la correspondencia.'
- titulo: ¿Se cumple que la coordenada horizontal es la parte real y la vertical es
    la parte imaginaria? — Representación cartesiana de un número complejo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el complejo \(a+bi\) se representa
    por el par ordenado \((a,b)\).
  - El caso “\(-2+5i\) corresponde al punto \((-2,5)\)” satisface esa condición.
  - Reconstruye \(a+bi\) desde el par para verificar la correspondencia.
- titulo: ¿Es válido omitir el paso “Identifica \(a\) y \(b\) en la forma \(a+bi\)”?
    — Representación cartesiana de un número complejo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de representación cartesiana de
    un número complejo.
  - 'Omitirlo puede volver inválida la acción siguiente: Escribe el par \((a,b)\)
    respetando orden y signos.'
  - 'La solución debe terminar de este modo: Reconstruye \(a+bi\) desde el par para
    verificar la correspondencia.'
errores_frecuentes:
- 'Confundir representación cartesiana de un número complejo con otro concepto y omitir
  este inicio: Identifica \(a\) y \(b\) en la forma \(a+bi\).'
- Aplicar mecánicamente “Escribe el par \((a,b)\) respetando orden y signos.” sin
  revisar las condiciones de la definición.
- Tomar “\(-2+5i\) corresponde al punto \((-2,5)\)” como una igualdad aislada, sin
  explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la coordenada horizontal es
  la parte real y la vertical es la parte imaginaria”.
- 'Terminar el desarrollo sin realizar este control: Reconstruye \(a+bi\) desde el
  par para verificar la correspondencia.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
