semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.CONSTANTE_GRAFICO
titulo: Representación gráfica de la función constante
objetivo: Graficar una función constante e interpretar su representación como una recta horizontal.
introduccion: Si el resultado nunca cambia, la línea que dibujas tampoco sube ni baja. La gráfica de una función
  constante es siempre plana.
resumen: La gráfica de la función constante $f(x) = c$ es una **recta horizontal** que pasa por el punto $(0,
  c)$, ubicada a una altura fija $c$ sobre el eje $x$ para todo valor de la variable independiente.
explicacion: '### Definición formal


  La gráfica de $f(x) = c$ es el conjunto $\{(x, c) : x \in \mathbb{R}\}$, que geométricamente corresponde a una
  recta paralela al eje $x$, ubicada a una distancia $|c|$ de él (por encima si $c>0$, por debajo si $c<0$, coincidente
  con el eje si $c=0$).


  ### Desarrollo didáctico


  Como todo punto de la gráfica tiene la misma ordenada $c$, cualquier par de puntos de la recta comparten esa
  altura: $(0,c)$, $(5,c)$, $(-3,c)$, etc.


  Graficar es sencillo: basta marcar el punto $(0,c)$ y trazar una recta horizontal que pase por él, extendiéndola
  en ambas direcciones.'
procedimiento:
- 'Paso 1: Identifica el valor constante $c$ de la función.'
- 'Paso 2: Marca el punto $(0, c)$ en el eje vertical.'
- 'Paso 3: Traza una recta horizontal que pase por ese punto, paralela al eje $x$.'
ejemplos:
- titulo: Gráfica de una constante positiva
  enunciado: Grafica $f(x) = 3$.
  solucion_pasos:
  - Se marca el punto $(0,3)$.
  - Se traza una recta horizontal a la altura $y=3$.
- titulo: Gráfica de una constante negativa
  enunciado: Grafica $f(x) = -2$.
  solucion_pasos:
  - Se marca el punto $(0,-2)$.
  - Se traza una recta horizontal a la altura $y=-2$, bajo el eje $x$.
- titulo: ¿La gráfica de $f(x)=0$ coincide con el eje $x$?
  enunciado: ¿La gráfica de $f(x)=0$ coincide con el eje $x$?
  respuesta: Sí
  solucion_pasos:
  - Todo punto de la gráfica tiene ordenada 0, que es exactamente el eje horizontal.
- titulo: ¿La gráfica de una función constante puede ser una recta vertical?
  enunciado: ¿La gráfica de una función constante puede ser una recta vertical?
  respuesta: 'No'
  solucion_pasos:
  - Una recta vertical no representaría una función (viola el criterio de la línea vertical); la constante es
    siempre horizontal.
errores_frecuentes:
- Confundir la gráfica horizontal (función constante) con una vertical.
- Ubicar el punto $(c, 0)$ en vez de $(0, c)$ al iniciar el trazo.
- Asumir que toda recta horizontal pasa necesariamente por el origen.
- Trazar la recta con inclinación en vez de perfectamente horizontal.
