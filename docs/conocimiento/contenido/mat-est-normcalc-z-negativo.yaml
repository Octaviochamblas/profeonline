semantic_id: MAT.EST.NORMAL_CALCULO.Z_NEGATIVO
titulo: Usar la simetría para valores negativos de Z
objetivo: Usar la propiedad de simetría de la distribución normal estándar para calcular probabilidades asociadas a
  valores negativos de Z.
introduccion: Cuando la tabla que tienes solo muestra valores positivos de Z, puedes usar la simetría de la curva
  para encontrar el resultado que necesitas para un valor negativo.
resumen: Gracias a la simetría de la normal estándar, se cumple que $P(Z<-z)=P(Z>z)=1-P(Z<z)$ para cualquier valor
  positivo $z$.
explicacion: '![Uso de la simetría para Z negativo](/static/img/estadistica/normcalc/normcalc-z-negativo.svg)


  ### Definición formal


  Para un valor $z>0$, se cumple $P(Z<-z)=1-P(Z<z)$, aprovechando que la curva es simétrica respecto de 0.


  ### Desarrollo didáctico


  Esta técnica es especialmente útil cuando se dispone de una tabla que solo entrega valores para $Z$ positivo, muy

  común en libros y formularios de examen.'
procedimiento:
- 'Paso 1: Identifica el valor negativo de $Z$ para el cual se busca la probabilidad.'
- 'Paso 2: Busca en la tabla el valor positivo equivalente (su opuesto).'
- 'Paso 3: Calcula $P(Z<-z)=1-P(Z<z)$ usando ese valor de la tabla.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $P(Z<1{,}5)=0{,}9332$, ¿cuál es $P(Z<-1{,}5)$?
  solucion_pasos:
  - $P(Z<-1{,}5)=1-0{,}9332$.
  - $P(Z<-1{,}5)=0{,}0668$.
- titulo: Ejemplo 2
  enunciado: ¿Por qué es útil la simetría de la curva normal para trabajar con valores negativos de Z?
  solucion_pasos:
  - Porque muchas tablas Z solo entregan valores para Z positivo.
  - La simetría permite calcular el resultado equivalente sin necesitar una tabla de valores negativos.
- titulo: ¿$P(Z<-z)$ es igual a $1-P(Z<z)$ para $z>0$?
  respuesta: Sí
  solucion_pasos:
  - Sí, es consecuencia directa de la simetría de la curva.
- titulo: ¿$P(Z<-z)$ es igual a $P(Z<z)$ directamente?
  respuesta: 'No'
  solucion_pasos:
  - 'No, son distintas salvo que $z=0$; se relacionan mediante el complemento, no la igualdad directa.'
errores_frecuentes:
- Buscar directamente el valor negativo en una tabla que solo tiene valores positivos.
- Olvidar aplicar el complemento (restar de 1) al trabajar con Z negativo.
- Confundir $P(Z<-z)$ con $P(Z>z)$ sin verificar que ambas expresiones son equivalentes.
- Usar el signo incorrecto al identificar el valor de Z opuesto en la tabla.
- Aplicar esta regla en distribuciones que no son simétricas.
fuente: 'Elaboración propia (referencia: Moraleja 308).'
estado: publicado
