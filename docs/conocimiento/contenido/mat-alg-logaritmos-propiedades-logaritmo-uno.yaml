semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.LOGARITMO_UNO
titulo: Propiedad del logaritmo de 1
objetivo: Aplicar la propiedad $\log_b(1)=0$ para simplificar expresiones algebraicas que incluyan este caso
  particular.
introduccion: Dentro de una expresión algebraica más grande, reconocer que un término se reduce a $0$ puede
  simplificar bastante el trabajo posterior.
resumen: Para cualquier base válida $b$, se cumple $\log_b(1)=0$, ya que $b^0=1$; esta propiedad permite eliminar
  términos dentro de expresiones logarítmicas más complejas.
explicacion: '### Definición formal


  Para todo $b>0$, $b\neq1$, se cumple $\log_b(1)=0$, pues $b^0=1$ es válido para cualquier base. Esta propiedad
  se usa como caso particular dentro de simplificaciones algebraicas más extensas, eliminando el término
  correspondiente de una suma o resta.


  ### Desarrollo didáctico


  Al simplificar $\log_b(x)+\log_b(1)-\log_b(y)$, se reemplaza $\log_b(1)$ por $0$, quedando directamente
  $\log_b(x)-\log_b(y)$. Reconocer este término ahorra pasos innecesarios en la simplificación.'
procedimiento:
- 'Paso 1: Localiza cualquier término de la forma $\log_b(1)$ dentro de la expresión.'
- 'Paso 2: Reemplázalo directamente por $0$.'
- 'Paso 3: Simplifica la expresión resultante eliminando ese término de la suma o resta.'
ejemplos:
- titulo: Simplificación directa de $\log_b(1)$
  enunciado: 'Simplifica $\log_5(x)+\log_5(1)$.'
  solucion_pasos:
  - Se reemplaza $\log_5(1)$ por $0$.
  - 'La expresión se reduce a $\log_5(x)$.'
- titulo: Uso dentro de una expresión más compleja
  enunciado: 'Simplifica $\log_2(1)-\log_2(x)+\log_2(y)$.'
  solucion_pasos:
  - Se reemplaza $\log_2(1)$ por $0$.
  - 'La expresión queda $-\log_2(x)+\log_2(y)$, equivalente a $\log_2(y/x)$.'
- titulo: ¿Es cierto que $\log_b(1)=0$ para toda base válida?
  enunciado: ¿La igualdad $\log_b(1)=0$ se cumple para cualquier base $b>0$, $b\neq1$?
  respuesta: Sí
  solucion_pasos:
  - Se deriva directamente de que $b^0=1$ para cualquier base.
- titulo: ¿El valor de $\log_b(1)$ depende de la base?
  enunciado: ¿El resultado de $\log_b(1)$ cambia según el valor de la base $b$?
  respuesta: 'No'
  solucion_pasos:
  - El resultado siempre es $0$, sin importar qué base válida se use.
errores_frecuentes:
- Confundir $\log_b(1)=0$ con $\log_b(0)$, que no está definido.
- Olvidar simplificar un término $\log_b(1)$ dentro de una expresión más grande.
- Suponer que el resultado de $\log_b(1)$ depende de la base utilizada.
- Aplicar la propiedad sin antes verificar que la base cumpla $b>0$, $b\neq1$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
