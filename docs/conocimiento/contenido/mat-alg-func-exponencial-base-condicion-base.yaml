semantic_id: MAT.ALG.FUNC_EXPONENCIAL_BASE.CONDICION_BASE
titulo: Condición de base positiva y distinta de uno en una función exponencial
objetivo: Comprender por qué la base de una función exponencial debe ser positiva y distinta de uno.
introduccion: 'Estas dos restricciones sobre la base no son arbitrarias: sin ellas, la función dejaría de comportarse
  como una exponencial genuina, o simplemente no estaría bien definida.'
resumen: En $f(x)=a\cdot b^x$, la base debe cumplir $b>0$ (para que la función esté definida en todo $\mathbb{R}$)
  y $b\neq1$ (para que la función no se reduzca a una constante).
explicacion: '### Definición formal


  La condición $b>0$ es necesaria porque potencias con base negativa y exponente no entero (como $(-2)^{0{,}5}$)
  no están definidas dentro de los números reales. La condición $b\neq1$ es necesaria porque $1^x=1$ para todo
  $x$, lo que convertiría a $f(x)=a\cdot1^x=a$ en una función constante, no exponencial.


  ### Desarrollo didáctico


  Ambas condiciones garantizan que la función tenga el comportamiento característico esperado: definida para
  todo $x$ real, y con un crecimiento o decrecimiento genuino, no constante.


  Si $f(x)=5\cdot(-2)^x$, la base negativa hace que la función no esté definida para exponentes fraccionarios,
  como $x=0{,}5$, ya que $\sqrt{-2}$ no es un número real.'
procedimiento:
- 'Paso 1: Verifica que la base $b$ propuesta sea un número positivo.'
- 'Paso 2: Verifica que la base $b$ sea distinta de 1.'
- 'Paso 3: Si ambas condiciones se cumplen, la base es válida para una función exponencial.'
ejemplos:
- titulo: Verificación de base válida
  enunciado: '¿Es válida la base de $f(x)=3\cdot7^x$ para una función exponencial?'
  solucion_pasos:
  - '$b=7$ es positivo y distinto de 1.'
  - Sí, es una base válida.
- titulo: Verificación de base inválida por ser igual a 1
  enunciado: '¿Es válida la base de $f(x)=3\cdot1^x$ para una función exponencial?'
  solucion_pasos:
  - '$b=1$ no cumple la condición $b\neq1$.'
  - No es una base válida; la función se reduce a la constante $f(x)=3$.
- titulo: ¿Una base negativa puede producir una función definida para todo $x$ real?
  enunciado: ¿Una base negativa puede producir una función definida para todo $x$ real?
  respuesta: 'No'
  solucion_pasos:
  - Para exponentes fraccionarios, una base negativa produce raíces de números negativos, que no son reales.
- titulo: ¿La condición $b\neq1$ evita que la función sea constante?
  enunciado: ¿La condición $b\neq1$ evita que la función sea constante?
  respuesta: Sí
  solucion_pasos:
  - Con $b=1$, la función $f(x)=a\cdot1^x=a$ sería constante, perdiendo el carácter exponencial.
errores_frecuentes:
- Aceptar como válida una base negativa sin considerar los problemas de definición para exponentes no enteros.
- Aceptar $b=1$ como base válida sin reconocer que produce una función constante.
- Confundir la condición sobre la base $b$ con una condición sobre el coeficiente $a$.
- No verificar ambas condiciones (positividad y distinta de 1) simultáneamente.
