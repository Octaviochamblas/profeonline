semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.CLAUSURA_ADICION
objetivo: Verificar la clausura de \(\mathbb{Q}\) bajo la suma.
introduccion: 'Observa este caso: Si \(\frac{1}{3}\) y \(\frac{2}{5}\) son racionales,
  entonces \(\frac{1}{3}+\frac{2}{5}=\frac{11}{15}\) también es racional. Para explicar
  por qué funciona estudiaremos clausura de Q en la adición. Al finalizar podrás verificar
  la clausura de \(\mathbb{Q}\) bajo la suma.'
resumen: La clausura de \(\mathbb{Q}\) en la adición afirma que la suma de dos racionales
  siempre es racional. Como criterio de control, la operación no saca el resultado
  fuera del conjunto de los racionales
explicacion: |-
  La clausura de \(\mathbb{Q}\) en la adición afirma que la suma de dos racionales siempre es racional.

  Esta formulación se hace concreta en “Si \(\frac{1}{3}\) y \(\frac{2}{5}\) son racionales, entonces \(\frac{1}{3}+\frac{2}{5}=\frac{11}{15}\) también es racional”. Allí puede reconocerse que la operación no saca el resultado fuera del conjunto de los racionales.
procedimiento:
- 'Paso 1: Elige dos racionales y escríbelos con denominador común.'
- 'Paso 2: Súmalos para obtener una nueva fracción con denominador no nulo.'
- 'Paso 3: Concluye que el resultado sigue perteneciendo a \(\mathbb{Q}\).'
ejemplos:
- titulo: Aplicación razonada — Clausura de Q en la adición
  enunciado: Si \(\frac{1}{3}\) y \(\frac{2}{5}\) son racionales, entonces \(\frac{1}{3}+\frac{2}{5}=\frac{11}{15}\)
    también es racional.
  solucion_pasos:
  - Elige dos racionales y escríbelos con denominador común.
  - Súmalos para obtener una nueva fracción con denominador no nulo.
  - Concluye que el resultado sigue perteneciendo a \(\mathbb{Q}\).
- titulo: Revisión de una solución — Clausura de Q en la adición
  enunciado: Una solución aplica “Súmalos para obtener una nueva fracción con denominador
    no nulo.”, pero termina sin comprobar que la operación no saca el resultado fuera
    del conjunto de los racionales. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define clausura de Q en la adición: la clausura de
    \(\mathbb{Q}\) en la adición afirma que la suma de dos racionales siempre es racional.'
  - Elige dos racionales y escríbelos con denominador común.
  - 'Completa la revisión con este control: Concluye que el resultado sigue perteneciendo
    a \(\mathbb{Q}\).'
- titulo: ¿Se cumple que la operación no saca el resultado fuera del conjunto de los
    racionales? — Clausura de Q en la adición
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la clausura de \(\mathbb{Q}\) en la
    adición afirma que la suma de dos racionales siempre es racional.
  - El caso “Si \(\frac{1}{3}\) y \(\frac{2}{5}\) son racionales, entonces \(\frac{1}{3}+\frac{2}{5}=\frac{11}{15}\)
    también es racional” satisface esa condición.
  - Concluye que el resultado sigue perteneciendo a \(\mathbb{Q}\).
- titulo: ¿Es válido omitir el paso “Elige dos racionales y escríbelos con denominador
    común”? — Clausura de Q en la adición
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de clausura de Q en la adición.
  - 'Omitirlo puede volver inválida la acción siguiente: Súmalos para obtener una
    nueva fracción con denominador no nulo.'
  - 'La solución debe terminar de este modo: Concluye que el resultado sigue perteneciendo
    a \(\mathbb{Q}\).'
errores_frecuentes:
- 'Empezar clausura de Q en la adición sin realizar este control inicial: Elige dos
  racionales y escríbelos con denominador común.'
- Memorizar “Si \(\frac{1}{3}\) y \(\frac{2}{5}\) son racionales, entonces \(\frac{1}{3}+\frac{2}{5}=\frac{11}{15}\)
  también es racional” como respuesta aislada, sin reconstruir la definición que lo
  justifica.
- Convertir en receta el paso “Súmalos para obtener una nueva fracción con denominador
  no nulo.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre clausura de Q en la adición que contradice el
  criterio “La operación no saca el resultado fuera del conjunto de los racionales”.
- 'Cerrar el ejercicio sin esta comprobación específica: Concluye que el resultado
  sigue perteneciendo a \(\mathbb{Q}\).'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
