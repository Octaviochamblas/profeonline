semantic_id: MAT.FUND.RELACIONES_CONJUNTOS.SUBCONJUNTO_PROPIO
titulo: Subconjunto propio
objetivo: Distinguir e identificar un subconjunto propio a partir de la comparación estricta de sus elementos
  y cardinalidades con respecto al conjunto contenedor.
introduccion: 'Imagina que tienes una colección de películas favoritas en tu repisa. Si eliges un grupo
  de ellas para prestárselo a un amigo, pero te aseguras de no prestarle todas las películas (te quedas
  con al menos una), el grupo que prestaste es una "verdadera parte" de tu colección.


  En matemáticas, cuando un conjunto está completamente contenido dentro de otro, pero no es exactamente
  igual a él (es decir, el conjunto contenedor tiene al menos un elemento adicional), lo llamamos un subconjunto
  propio. Es como tener una porción real de una torta, pero nunca la torta entera.


  Aprender sobre subconjuntos propios te ayudará a entender relaciones estrictas entre grupos de cosas
  y a clasificar de forma más precisa cómo se relacionan entre sí.'
resumen: 'Un conjunto $A$ es un subconjunto propio de $B$ (denotado por $A \subset B$ o $A \subsetneq
  B$) si todos los elementos de $A$ pertenecen a $B$, pero existe al menos un elemento en $B$ que no pertenece
  a $A$. Esto implica que $A \subseteq B$ y $A \neq B$.

  '
explicacion: 'El concepto de **subconjunto propio** formaliza la idea de contención estricta.


  **Definición Formal:**

  Un conjunto $A$ es un subconjunto propio de $B$, lo cual se escribe $A \subset B$ o $A \subsetneq B$,
  si se cumplen simultáneamente dos condiciones:

  1. $A$ es subconjunto de $B$ ($A \subseteq B$).

  2. $A$ no es igual a $B$ ($A \neq B$).


  Equivalentemente:

  $$A \subsetneq B \iff (\forall x, (x \in A \implies x \in B)) \land (\exists y \in B : y \notin A)$$


  **Propiedades Clave:**

  * **Cardinalidad:** Si $A$ y $B$ son conjuntos finitos y $A$ es un subconjunto propio de $B$, entonces
  la cardinalidad de $A$ es estrictamente menor que la de $B$ ($|A| < |B|$).

  * **El Conjunto Vacío:** El conjunto vacío $\emptyset$ es subconjunto propio de cualquier conjunto no
  vacío. (Si $B \neq \emptyset$, entonces $\emptyset \subsetneq B$).

  * **Transitividad:** Si $A \subsetneq B$ y $B \subsetneq C$, entonces $A \subsetneq C$.

  * **No reflexivo:** Ningún conjunto es subconjunto propio de sí mismo ($A \nsubsetneq A$).'
procedimiento:
- 'Paso 1: Comprueba que todos los elementos de $A$ pertenecen a $B$. Si hay algún elemento en $A$ que
  no esté en $B$, entonces $A$ no puede ser subconjunto propio.'
- 'Paso 2: Busca si existe al menos un elemento en $B$ que no esté en $A$.'
- 'Paso 3: Si se cumplen ambas condiciones (todos los elementos de $A$ están en $B$, y hay al menos un
  elemento en $B$ que no está en $A$), entonces concluye que $A$ es un subconjunto propio de $B$ ($A \subsetneq
  B$).'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determina si el conjunto $A = \{1, 2\}$ es un subconjunto propio de $B = \{1, 2, 3\}$.
  solucion_pasos:
  - 'Paso a: Verificamos si $A \subseteq B$. Los elementos de $A$ son 1 y 2. Ambos pertenecen a $B = \{1,
    2, 3\}$. Por lo tanto, $A \subseteq B$.'
  - 'Paso b: Verificamos si $A \neq B$. El elemento 3 pertenece a $B$, pero no pertenece a $A$. Esto significa
    que $B$ tiene elementos que no están en $A$, por lo que $A \neq B$.'
  - 'Paso c: Al cumplirse $A \subseteq B$ y $A \neq B$, concluimos que $A$ es un subconjunto propio de
    $B$ ($A \subsetneq B$).'
- titulo: Ejemplo 2
  enunciado: Analiza si el conjunto $C = \{a, b, c\}$ es subconjunto propio de $D = \{c, b, a\}$.
  solucion_pasos:
  - 'Paso a: Verificamos si $C \subseteq D$. Los elementos de $C$ son a, b y c, y todos están en $D$.
    Así, $C \subseteq D$.'
  - 'Paso b: Comparamos los conjuntos para ver si son diferentes. Vemos que $C$ y $D$ tienen exactamente
    los mismos elementos, por lo que $C = D$.'
  - 'Paso c: Como los conjuntos son iguales, no se cumple la condición de contención estricta. Por lo
    tanto, $C$ no es un subconjunto propio de $D$ ($C \nsubsetneq D$).'
- titulo: ¿Es el conjunto vacío $\\emptyset$ un subconjunto propio del conjunto vacío?
  respuesta: 'No'
  solucion_pasos:
  - Para que un conjunto $A$ sea subconjunto propio de $B$, se requiere que $A \neq B$.
  - Si tomamos $A = \emptyset$ y $B = \emptyset$, vemos que $A$ y $B$ son idénticos, es decir, $A = B$.
  - Como no son diferentes, el conjunto vacío no es subconjunto propio de sí mismo.
- titulo: ¿Es el conjunto de los números naturales $\\mathbb{N}$ un subconjunto propio de los números
    enteros $\\mathbb{Z}$?
  respuesta: Sí
  solucion_pasos:
  - Todos los números naturales son también números enteros, por lo que se cumple que $\mathbb{N} \subseteq
    \mathbb{Z}$.
  - Existen números enteros (como los negativos o el cero, por ejemplo, $-5$) que no son números naturales.
  - Como $\mathbb{N} \subseteq \mathbb{Z}$ y $\mathbb{N} \neq \mathbb{Z}$, concluimos que $\mathbb{N}$
    es un subconjunto propio de $\mathbb{Z}$ ($\mathbb{N} \subsetneq \mathbb{Z}$).
errores_frecuentes:
- Pensar que un conjunto puede ser subconjunto propio de sí mismo. Ningún conjunto puede ser menor que
  sí mismo.
- No verificar si los dos conjuntos son iguales. Si $A = B$, entonces $A$ no es subconjunto propio de
  $B$.
- Confundir la notación de subconjunto ($\subseteq$) con la de subconjunto propio ($\subsetneq$ o $\subset$).
- Creer que el conjunto vacío no puede ser subconjunto propio de ningún conjunto. Sí lo es de cualquier
  conjunto que contenga elementos.
- Suponer que la relación de subconjunto propio no es transitiva.
fuente: Álgebra y Fundamentos, Universidad de Chile
estado: publicado
