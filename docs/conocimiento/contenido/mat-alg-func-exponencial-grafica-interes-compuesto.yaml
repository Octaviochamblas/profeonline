semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.INTERES_COMPUESTO
titulo: Aplicación de la función exponencial en problemas de interés compuesto
objetivo: Aplicar el modelo exponencial de interés compuesto para calcular el capital acumulado tras un período
  de inversión.
introduccion: A diferencia del interés simple (que suma siempre la misma cantidad), el interés compuesto reinvierte
  las ganancias anteriores, generando un crecimiento exponencial del capital.
resumen: El modelo de **interés compuesto** es $C(t)=C_0\cdot(1+i)^t$, donde $C_0$ es el capital inicial, $i$
  es la tasa de interés por período (como decimal) y $t$ es el número de períodos transcurridos.
explicacion: '### Definición formal


  El capital $C(t)$ acumulado tras $t$ períodos de inversión a una tasa de interés $i$ (como decimal) por período,
  con capitalización compuesta, es $C(t)=C_0\cdot(1+i)^t$, donde $C_0$ es el capital inicial invertido.


  ### Desarrollo didáctico


  Es fundamental verificar que la tasa de interés y el número de períodos estén expresados en las mismas unidades
  de tiempo (por ejemplo, ambos en años, o ambos en meses).


  Con un capital inicial de $\$1.000.000$ a una tasa anual del $5\%$: el modelo es $C(t)=1.000.000\cdot(1{,}05)^t$;
  después de $10$ años, $C(10)=1.000.000\cdot(1{,}05)^{10}\approx\$1.628.895$.'
procedimiento:
- 'Paso 1: Identifica el capital inicial $C_0$ y la tasa de interés $i$ por período.'
- 'Paso 2: Convierte la tasa a decimal y calcula la base $1+i$.'
- 'Paso 3: Plantea el modelo $C(t)=C_0\cdot(1+i)^t$.'
- 'Paso 4: Evalúa el modelo en el número de períodos solicitado.'
ejemplos:
- titulo: Cálculo de capital acumulado
  enunciado: 'Se invierten $\$500.000$ a una tasa anual del $8\%$ con capitalización compuesta. Calcula el capital
    después de $2$ años.'
  solucion_pasos:
  - 'Modelo: $C(t)=500.000\cdot(1{,}08)^t$.'
  - '$C(2)=500.000\cdot(1{,}08)^2=500.000\cdot1{,}1664=\$583.200$.'
- titulo: Planteamiento del modelo desde datos del problema
  enunciado: 'Un capital de $\$2.000.000$ se invierte a una tasa mensual del $1{,}5\%$. Plantea el modelo de interés
    compuesto.'
  solucion_pasos:
  - La tasa decimal es $0{,}015$.
  - '$C(t)=2.000.000\cdot(1{,}015)^t$, donde $t$ se mide en meses.'
- titulo: ¿El interés compuesto crece más rápido que el interés simple a largo plazo?
  enunciado: ¿El interés compuesto crece más rápido que el interés simple a largo plazo?
  respuesta: Sí
  solucion_pasos:
  - El interés compuesto reinvierte las ganancias anteriores, generando un crecimiento exponencial más rápido
    que el crecimiento lineal del interés simple.
- titulo: ¿Es necesario que la tasa y el número de períodos estén en la misma unidad de tiempo?
  enunciado: ¿Es necesario que la tasa y el número de períodos estén en la misma unidad de tiempo?
  respuesta: Sí
  solucion_pasos:
  - Si la tasa es anual, $t$ debe medirse en años; si es mensual, $t$ debe medirse en meses.
errores_frecuentes:
- Usar el porcentaje directamente (por ejemplo, 8) en vez de su forma decimal (0,08) en la base.
- Confundir la tasa por período con la tasa anual cuando la capitalización es más frecuente que anual.
- No verificar que las unidades de la tasa y del tiempo coincidan.
- Confundir el modelo de interés compuesto con el de interés simple, que crece linealmente.
