semantic_id: MAT.NUM.MINIMO_COMUN_MULTIPLO.IDENTIFICACION_LISTA
objetivo: 'Calcular el mínimo común múltiplo (MCM) de dos o más números mediante la comparación de sus listas de múltiplos.'
introduccion: |
  Imagina que estás organizando una carrera de autitos en una pista de juguete. El auto azul da una vuelta completa cada 3 minutos, y el auto rojo da una vuelta completa cada 5 minutos. Si salen juntos de la partida, ¿en qué minuto volverán a cruzar la meta al mismo tiempo?

  Para resolver esto de forma muy clara y visual, podemos escribir una lista con los tiempos de paso de cada auto: 3, 6, 9, 12, 15... para el azul; y 5, 10, 15, 20... para el rojo. Al poner las dos listas frente a frente, ¡verás de inmediato que el primer número en el que coinciden es el 15!

  Este método de hacer listas de múltiplos es la forma más directa y clara de encontrar el MCM para números pequeños.
resumen: |
  El método de listas consiste en escribir de forma ordenada los múltiplos positivos de cada número hasta identificar el menor de los números que aparece en todas las listas. Este número común es el MCM.
explicacion: |
  El método de **Identificación por Lista de Múltiplos** es la estrategia más natural e intuitiva para calcular el MCM de números pequeños. Consiste en generar secuencias de múltiplos y buscar la primera coincidencia entre ellas.

  **Definición de múltiplos positivos:**
  Los múltiplos positivos de un número $n$ se obtienen al multiplicar $n$ por los números naturales:
  $$M(n) = \{n \cdot 1, n \cdot 2, n \cdot 3, n \cdot 4, \dots\}$$

  **Pasos del método:**
  Si queremos calcular el MCM entre $8$ y $12$:

  1. Escribimos los primeros múltiplos de $8$:
     $$M(8) = \{8, 16, 24, 32, 40, 48, 56, 64, 72, \dots\}$$

  2. Escribimos los primeros múltiplos de $12$:
     $$M(12) = \{12, 24, 36, 48, 60, 72, 84, \dots\}$$

  3. Identificamos los múltiplos en común:
     $$M(8) \cap M(12) = \{24, 48, 72, \dots\}$$

  4. Seleccionamos el menor elemento de este conjunto:
     $$\text{MCM}(8, 12) = 24$$

  Este método es ideal cuando trabajamos con números pequeños (menores a $20$), ya que las listas se generan rápidamente. Sin embargo, para números grandes o conjuntos de tres o más números, puede resultar tedioso.
procedimiento:
  - 'Paso 1: Escribe el conjunto de múltiplos positivos para el primer número multiplicándolo por 1, 2, 3, etc.'
  - 'Paso 2: Escribe el conjunto de múltiplos positivos para el segundo número (y terceros, si los hay).'
  - 'Paso 3: Observa ambas listas y encierra en un círculo todos los números que aparezcan en ambas listas.'
  - 'Paso 4: Selecciona el menor de los números encerrados. Este valor es el MCM.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Calcula el MCM entre $4$ y $10$ listando sus múltiplos.'
    solucion_pasos:
      - 'Paso a: Escribimos los múltiplos de $4$: $\{4, 8, 12, 16, 20, 24, 28, 32, 36, 40, \dots\}$.'
      - 'Paso b: Escribimos los múltiplos de $10$: $\{10, 20, 30, 40, 50, \dots\}$.'
      - 'Paso c: Identificamos los múltiplos comunes: $20$ y $40$ aparecen en ambas listas.'
      - 'Paso d: Seleccionamos el menor de ellos: $20$. Por tanto, $\text{MCM}(4, 10) = 20$.'
  - titulo: 'Ejemplo 2'
    enunciado: 'Encuentra el MCM de los números $3$, $4$ y $6$ listando sus múltiplos.'
    solucion_pasos:
      - 'Paso a: Listamos múltiplos de $3$: $\{3, 6, 9, 12, 15, 18, 21, 24, \dots\}$.'
      - 'Paso b: Listamos múltiplos de $4$: $\{4, 8, 12, 16, 20, 24, 28, \dots\}$.'
      - 'Paso c: Listamos múltiplos de $6$: $\{6, 12, 18, 24, 30, \dots\}$.'
      - 'Paso d: Buscamos múltiplos que estén en las tres listas simultáneamente: el $12$ y el $24$ cumplen esto. El menor es $12$. Así, $\text{MCM}(3, 4, 6) = 12$.'
  - titulo: 'Si listamos los múltiplos de $5$ y $9$, ¿es el número $45$ el menor múltiplo común que encontraremos?'
    respuesta: 'Sí'
    solucion_pasos:
      - 'Los múltiplos de $5$ son: $5, 10, 15, 20, 25, 30, 35, 40, 45, 50, \dots$.'
      - 'Los múltiplos de $9$ son: $9, 18, 27, 36, 45, 54, \dots$.'
      - 'El primer número que se repite en ambas listas es el $45$.'
      - 'Como no hay ningún número menor que se repita, el MCM es $45$.'
  - titulo: 'Para encontrar el MCM de $6$ y $12$, ¿debemos listar los múltiplos de $6$ más allá de $12$?'
    respuesta: 'No'
    solucion_pasos:
      - 'Los múltiplos de $6$ son: $6, 12, 18, \dots$.'
      - 'Los múltiplos de $12$ son: $12, 24, 36, \dots$.'
      - 'El número $12$ es en sí mismo un múltiplo de $6$.'
      - 'Dado que $12$ es el primer múltiplo de la lista de $12$ y ya aparece en la lista de $6$, no es necesario seguir listando números mayores, pues ya encontramos el menor múltiplo común, que es $12$.'
errores_frecuentes:
  - 'Listar los divisores del número en lugar de los múltiplos.'
  - 'Detener la lista de múltiplos demasiado pronto antes de encontrar una coincidencia.'
  - 'Cometer errores en las tablas de multiplicar al generar las listas.'
  - 'Olvidar verificar que el múltiplo seleccionado esté presente en todas las listas cuando se calcula el MCM de tres o más números.'
  - 'Elegir un múltiplo común que no sea el menor.'
fuente: 'Teoría de Números'
estado: publicado
