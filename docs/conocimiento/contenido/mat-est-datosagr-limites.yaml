semantic_id: MAT.EST.DATOS_AGRUPADOS.LIMITES
titulo: Identificar los límites de un intervalo de clase
objetivo: Identificar el límite inferior y el límite superior de un intervalo de clase dentro de una tabla
  de datos agrupados.
introduccion: Cada intervalo de clase queda definido por dos valores frontera que delimitan qué datos
  pertenecen a él.
resumen: El límite inferior de un intervalo es el valor menor que lo delimita; el límite superior es el
  valor mayor que lo delimita.
explicacion: '![Límites de un intervalo de clase](/static/img/estadistica/datosagr/datosagr-limites.svg)


  ### Definición formal


  Un intervalo de clase $[LI, LS)$ tiene límite inferior $LI$ y límite superior $LS$; usualmente se incluye
  el límite inferior y se excluye el superior (que pertenece al siguiente intervalo).


  ### Desarrollo didáctico


  En el intervalo [10-20), el límite inferior es 10 y el límite superior es 20; un dato de valor 15 pertenece
  a este intervalo, pero un dato de valor 20 pertenecería al siguiente intervalo [20-30).'
procedimiento:
- 'Paso 1: Observa el intervalo de clase escrito en la tabla (por ejemplo, [10-20)).'
- 'Paso 2: Identifica el primer valor como el límite inferior.'
- 'Paso 3: Identifica el segundo valor como el límite superior.'
ejemplos:
- titulo: Identificar los límites del intervalo [10-20)
  enunciado: Intervalo [10-20).
  solucion_pasos:
  - 'Límite inferior: 10. Límite superior: 20.'
- titulo: Identificar los límites del intervalo [150-160)
  enunciado: Intervalo de estaturas [150-160).
  solucion_pasos:
  - 'Límite inferior: 150. Límite superior: 160.'
- titulo: ¿El límite superior de un intervalo suele coincidir con el límite inferior del siguiente?
  respuesta: Sí
  solucion_pasos:
  - Sí, esto asegura que los intervalos cubran todo el rango sin dejar huecos.
- titulo: ¿Un dato igual al límite superior de un intervalo pertenece a ese mismo intervalo (bajo la convención
    [LI-LS))?
  respuesta: 'No'
  solucion_pasos:
  - No, bajo esa convención pertenece al siguiente intervalo, ya que el límite superior queda excluido.
errores_frecuentes:
- Confundir el límite inferior con el superior al leer un intervalo.
- No aplicar consistentemente la convención de inclusión/exclusión de los límites (por ejemplo, tratar
  el límite superior como incluido cuando la convención dice lo contrario).
- Dejar huecos entre intervalos consecutivos, donde el límite superior de uno no coincide con el inferior
  del siguiente.
fuente: 'Elaboración propia (referencia: Moraleja 351, 128).'
estado: publicado
