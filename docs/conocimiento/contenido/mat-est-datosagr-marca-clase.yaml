semantic_id: MAT.EST.DATOS_AGRUPADOS.MARCA_CLASE
titulo: Calcular la marca de clase de un intervalo
objetivo: Calcular la marca de clase de un intervalo como el promedio entre sus límites inferior y superior,
  representando el valor central del intervalo.
introduccion: La marca de clase es el valor representativo que se usa para hacer cálculos (como la media)
  cuando los datos están agrupados en intervalos.
resumen: La marca de clase de un intervalo es el punto medio entre su límite inferior y su límite superior,
  y se usa como representante de todos los datos de ese intervalo.
explicacion: '![Cálculo de la marca de clase](/static/img/estadistica/datosagr/datosagr-marca-clase.svg)


  ### Definición formal


  $MC=\dfrac{LI+LS}{2}$, el promedio simple entre los límites inferior y superior del intervalo.


  ### Desarrollo didáctico


  En el intervalo [10-20), la marca de clase es $MC=(10+20)/2=15$; este valor representa a todos los datos
  que caen dentro de ese intervalo para efectos de cálculo.'
procedimiento:
- 'Paso 1: Identifica el límite inferior (LI) y el límite superior (LS) del intervalo.'
- 'Paso 2: Suma ambos límites.'
- 'Paso 3: Divide esa suma por 2 para obtener la marca de clase.'
ejemplos:
- titulo: Calcular la marca de clase del intervalo [10-20)
  enunciado: LI=10, LS=20.
  solucion_pasos:
  - MC=(10+20)/2=15.
- titulo: Calcular la marca de clase del intervalo [150-160)
  enunciado: LI=150, LS=160.
  solucion_pasos:
  - MC=(150+160)/2=155.
- titulo: ¿La marca de clase siempre está exactamente en el centro del intervalo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el promedio simple de los límites, ubicado exactamente en el punto medio.
- titulo: ¿La marca de clase representa a todos los datos individuales del intervalo con exactitud?
  respuesta: 'No'
  solucion_pasos:
  - No, es solo una aproximación representativa; los datos reales pueden estar distribuidos de forma distinta
    dentro del intervalo.
errores_frecuentes:
- Calcular la marca de clase con una fórmula incorrecta, como restar en vez de sumar los límites.
- Olvidar dividir por 2 después de sumar los límites del intervalo.
- Confundir la marca de clase con el límite inferior o superior del intervalo.
fuente: 'Elaboración propia (referencia: Moraleja 351, 127).'
estado: publicado
