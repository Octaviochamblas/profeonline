semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.OBTUSANGULO
titulo: Triángulo obtusángulo como triángulo con un ángulo obtuso
objetivo: Reconocer un triángulo obtusángulo por tener uno de sus ángulos interiores mayor que 90°.
introduccion: Cuando uno de los tres ángulos de un triángulo supera los 90°, el triángulo recibe el nombre
  de obtusángulo.
resumen: Un triángulo obtusángulo es aquel que tiene un ángulo interior obtuso, es decir, mayor que 90°
  y menor que 180°.
explicacion: '![Triángulo obtusángulo](/static/img/geometria/triangulos/triangulos-clasificacion-obtusangulo.svg)


  ### Definición formal


  Un triángulo con ángulos interiores α, β y γ es obtusángulo si exactamente uno de ellos, por ejemplo
  γ, cumple 90°<γ<180°.


  ### Desarrollo didáctico


  Un triángulo con ángulos 120°, 40° y 20° es obtusángulo: el ángulo de 120° supera los 90°, mientras
  los otros dos son agudos.'
procedimiento:
- 'Paso 1: Identifica o calcula los tres ángulos interiores del triángulo.'
- 'Paso 2: Verifica si alguno de ellos supera los 90°.'
- 'Paso 3: Si exactamente uno lo hace, el triángulo es obtusángulo.'
ejemplos:
- titulo: Reconocer un obtusángulo
  enunciado: Un triángulo tiene ángulos de 110°, 40° y 30°.
  solucion_pasos:
  - El ángulo de 110° supera los 90°, así que el triángulo es obtusángulo.
- titulo: Caso no obtusángulo
  enunciado: Un triángulo tiene ángulos de 85°, 60° y 35°.
  solucion_pasos:
  - Ninguno supera 90°, así que no es obtusángulo (es acutángulo).
- titulo: ¿Un triángulo puede tener dos ángulos obtusos?
  respuesta: 'No'
  solucion_pasos:
  - No, dos ángulos mayores que 90° sumarían más de 180°, superando el total permitido.
- titulo: ¿Los otros dos ángulos de un triángulo obtusángulo son siempre agudos?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque su suma debe ser menor que 90° (180° menos un ángulo mayor que 90°).
errores_frecuentes:
- Creer que un triángulo puede tener dos ángulos obtusos a la vez.
- Confundir un ángulo obtuso con uno simplemente 'grande visualmente'.
- Clasificar como obtusángulo un triángulo con un ángulo de exactamente 90° (que es rectángulo).
fuente: Elaboración propia.
estado: publicado
