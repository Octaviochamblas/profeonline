semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.EFECTO_ASINTOTAS_TRASLADAS
titulo: Efecto de las traslaciones sobre las asíntotas
objetivo: Determinar cómo se trasladan las asíntotas de $f(x)=a(x-h)^{-n}+k$ respecto a las de la función básica.
introduccion: Cuando una función con exponente negativo se traslada, sus asíntotas se mueven exactamente igual
  que el resto de la curva.
resumen: Para $f(x)=a(x-h)^{-n}+k$, la **asíntota vertical** se traslada a $x=h$ y la **asíntota horizontal** se
  traslada a $y=k$.
explicacion: '### Definición formal


  La función básica $g(x)=a\cdot x^{-n}$ tiene asíntotas $x=0$ e $y=0$. Al aplicar $f(x)=g(x-h)+k$, cada
  asíntota se traslada junto con la curva: la vertical pasa de $x=0$ a $x=h$, y la horizontal pasa de $y=0$ a
  $y=k$.


  ### Desarrollo didáctico


  $f(x)=\dfrac{1}{x-3}+2$: la asíntota vertical, antes en $x=0$, ahora está en $x=3$ (donde el denominador
  original se anulaba); la asíntota horizontal, antes en $y=0$, ahora está en $y=2$.'
procedimiento:
- 'Paso 1: Identifica los valores de $h$ y $k$ en la expresión trasladada.'
- 'Paso 2: Traslada la asíntota vertical de $x=0$ a $x=h$.'
- 'Paso 3: Traslada la asíntota horizontal de $y=0$ a $y=k$.'
ejemplos:
- titulo: Identificación de asíntotas trasladas
  enunciado: '¿Cuáles son las asíntotas de $f(x)=\dfrac{2}{x+1}-4$?'
  solucion_pasos:
  - 'Se identifica $h=-1$ y $k=-4$.'
  - 'La asíntota vertical es $x=-1$ y la horizontal es $y=-4$.'
- titulo: Verificación con un caso numérico
  enunciado: '¿Cuál es la asíntota vertical de $f(x)=\dfrac{5}{x-6}+1$?'
  solucion_pasos:
  - Se identifica $h=6$.
  - 'La asíntota vertical es $x=6$.'
- titulo: ¿Las asíntotas trasladadas siguen siendo perpendiculares entre sí?
  enunciado: ¿Las asíntotas vertical y horizontal trasladadas siguen siendo perpendiculares entre sí?
  respuesta: Sí
  solucion_pasos:
  - Una sigue siendo vertical y la otra horizontal, por lo que siguen siendo perpendiculares.
- titulo: ¿El punto de intersección de las asíntotas coincide siempre con $(h,k)$?
  enunciado: ¿El punto donde se cruzan las asíntotas trasladadas es siempre $(h,k)$?
  respuesta: Sí
  solucion_pasos:
  - La asíntota vertical $x=h$ y la horizontal $y=k$ se cruzan exactamente en el punto $(h,k)$.
errores_frecuentes:
- Trasladar la asíntota vertical usando el valor de $k$ en vez de $h$, o viceversa.
- Olvidar que ambas asíntotas se trasladan simultáneamente cuando la función combina ambos parámetros.
- Confundir el signo de $h$ al identificar la nueva posición de la asíntota vertical.
- No verificar el punto de intersección de las asíntotas como referencia del centro de la curva.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
