semantic_id: MAT.GEO.CUERPOS_REDONDOS_METRICA.ESFERA_AREA
titulo: Cálculo del área total de la esfera
objetivo: Calcular el área total de la superficie de una esfera a partir de su radio.
introduccion: El área de una esfera resulta ser exactamente 4 veces el área de un círculo máximo (un círculo
  del mismo radio que la esfera).
resumen: El área total de una esfera de radio $r$ es $A_T = 4\pi r^2$.
explicacion: '![Área total de la esfera](/static/img/geometria/espacio-cuerpos/esfera-area.svg)


  ### Definición formal


  El área total de la superficie de una esfera de radio $r$ es $A_T=4\pi r^2$, es decir, exactamente 4
  veces el área de un círculo del mismo radio ($\pi r^2$).


  ### Desarrollo didáctico


  Si una esfera tiene radio 5 cm, su área total es $A_T=4\pi(5)^2=100\pi\approx314$ cm² (usando π≈3,14).
  Este resultado, descubierto por Arquímedes, relaciona de forma elegante la superficie esférica con el
  área de un círculo simple.'
procedimiento:
- 'Paso 1: Identifica el radio (r) de la esfera.'
- 'Paso 2: Eleva el radio al cuadrado y multiplícalo por π (obteniendo el área de un círculo del mismo
  radio).'
- 'Paso 3: Multiplica ese resultado por 4 para obtener el área total de la esfera: A_T=4πr².'
ejemplos:
- titulo: Calcular el área total de una esfera
  enunciado: Una esfera tiene radio 5 cm (π≈3,14).
  solucion_pasos:
  - A_T=4×3,14×25=314 cm².
- titulo: Calcular el radio a partir del área total
  enunciado: Una esfera tiene área total de 452,16 cm² (π≈3,14).
  solucion_pasos:
  - 452,16=4×3,14×r² → r²=452,16/12,56=36 → r=6 cm.
- titulo: ¿El área de la esfera es 4 veces el área de un círculo del mismo radio?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la relación que expresa la fórmula 4πr².
- titulo: ¿Se necesita conocer la altura para calcular el área de una esfera?
  respuesta: 'No'
  solucion_pasos:
  - No, a diferencia del cilindro y el cono, la esfera solo requiere el radio para todos sus cálculos.
errores_frecuentes:
- Olvidar multiplicar por 4, calculando solo el área de un círculo (πr²) en vez del área total de la esfera.
- Confundir el radio con el diámetro al aplicar la fórmula.
- Confundir esta fórmula con la del volumen de la esfera.
fuente: 'Elaboración propia (referencias: Moraleja 98, Cid 181, Baldor 336).'
estado: publicado
