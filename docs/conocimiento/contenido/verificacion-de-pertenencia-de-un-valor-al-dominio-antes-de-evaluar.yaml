semantic_id: MAT.ALG.FUNCION_EVALUACION.RESTRICCION_DOMINIO
titulo: Verificación de pertenencia de un valor al dominio antes de evaluar
objetivo: Verificar si un valor pertenece al dominio de una función antes de intentar evaluarla.
introduccion: Antes de sustituir un número en una función, conviene preguntarse si ese número está realmente
  permitido. Evaluar sin verificar puede llevar a expresiones sin sentido matemático.
resumen: Verificar la pertenencia de un valor al dominio consiste en comprobar, antes de evaluar, que
  el valor no provoque una división por cero, una raíz de índice par con radicando negativo, u otra operación
  indefinida en la regla de la función.
explicacion: '### Definición formal


  Dada una función $f$ con dominio $\text{Dom}(f)$, un valor $a$ es evaluable en $f$ si y solo si $a \in
  \text{Dom}(f)$. Verificar esta pertenencia antes de sustituir evita construir expresiones indefinidas,
  como divisiones por cero o raíces de índice par de números negativos.


  ### Desarrollo didáctico


  El chequeo previo consiste en identificar las restricciones de la fórmula (denominadores que no pueden
  anularse, radicandos que no pueden ser negativos) y comprobar que el valor a evaluar no las viole.


  Si $f(x) = \frac{1}{x-4}$ y te piden $f(4)$, primero verificas: $x-4=0$ cuando $x=4$, así que $4 \notin
  \text{Dom}(f)$. No se debe evaluar; la respuesta correcta es que $f(4)$ no está definida.'
procedimiento:
- 'Paso 1: Identifica las restricciones de la fórmula (denominadores, radicandos de índice par).'
- 'Paso 2: Determina el dominio de la función a partir de esas restricciones.'
- 'Paso 3: Antes de sustituir, verifica si el valor solicitado pertenece al dominio.'
- 'Paso 4: Si pertenece, procede a evaluar; si no, indica que la función no está definida en ese valor.'
ejemplos:
- titulo: Verificación previa a evaluar
  enunciado: Si $f(x) = \frac{2}{x+5}$, ¿se puede evaluar $f(-5)$?
  solucion_pasos:
  - Se verifica el denominador - $x+5=0$ cuando $x=-5$.
  - Como $-5$ anula el denominador, no pertenece al dominio.
  - No se puede evaluar $f(-5)$.
- titulo: Verificación con raíz cuadrada
  enunciado: Si $g(x) = \sqrt{x-10}$, ¿se puede evaluar $g(3)$?
  solucion_pasos:
  - Se verifica el radicando - $3-10=-7$, que es negativo.
  - No se puede evaluar $g(3)$ en los números reales.
- titulo: ¿Es necesario verificar el dominio antes de evaluar toda función?
  enunciado: ¿Es necesario verificar el dominio antes de evaluar toda función?
  respuesta: Sí
  solucion_pasos:
  - Evaluar sin verificar puede llevar a construir expresiones matemáticamente indefinidas.
- titulo: ¿El valor $x=2$ pertenece al dominio de $f(x) = \frac{5}{x-2}$?
  enunciado: ¿El valor $x=2$ pertenece al dominio de $f(x) = \frac{5}{x-2}$?
  respuesta: 'No'
  solucion_pasos:
  - En x=2 el denominador se anula, quedando la expresión indefinida.
errores_frecuentes:
- Evaluar directamente sin revisar primero si el valor genera una división por cero.
- Evaluar raíces de índice par sin verificar el signo del radicando.
- Confundir "no está definida" con "el resultado es cero".
- Suponer que toda fórmula algebraica está definida para todos los números reales.
