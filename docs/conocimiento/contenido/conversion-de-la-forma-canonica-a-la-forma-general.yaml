semantic_id: MAT.ALG.FUNC_CUADR_FORMAS.CANONICA_A_GENERAL
titulo: Conversión de la forma canónica a la forma general
objetivo: Convertir una función cuadrática desde su forma canónica a la forma general, desarrollando el
  binomio al cuadrado.
introduccion: Aunque la forma canónica es útil para ver el vértice, muchas veces es necesario volver a
  la forma general, por ejemplo para identificar los coeficientes $a$, $b$ y $c$ directamente.
resumen: Para convertir $f(x)=a(x-h)^2+k$ a la forma general, se desarrolla el binomio al cuadrado, se
  distribuye $a$, y se reducen los términos semejantes hasta llegar a $ax^2+bx+c$.
explicacion: '### Definición formal


  Dada $f(x)=a(x-h)^2+k$, desarrollando el binomio: $(x-h)^2=x^2-2hx+h^2$. Multiplicando por $a$ y sumando
  $k$: $f(x)=ax^2-2ahx+(ah^2+k)$, que es la forma general con $b=-2ah$ y $c=ah^2+k$.


  ### Desarrollo didáctico


  El procedimiento consiste en aplicar el cuadrado de un binomio, distribuir el coeficiente $a$ en cada
  término, y finalmente sumar la constante $k$ para obtener la forma general completa.


  Para $f(x)=2(x-3)^2+4$: desarrollando, $(x-3)^2=x^2-6x+9$; multiplicando por $2$: $2x^2-12x+18$; sumando
  $4$: $f(x)=2x^2-12x+22$.'
procedimiento:
- 'Paso 1: Desarrolla el binomio al cuadrado $(x-h)^2$ usando la fórmula del cuadrado de un binomio.'
- 'Paso 2: Distribuye el coeficiente $a$ en cada término del desarrollo.'
- 'Paso 3: Suma la constante $k$ al resultado.'
- 'Paso 4: Reduce términos semejantes si es necesario para dejar la función en forma general.'
ejemplos:
- titulo: Conversión con coeficiente a igual a 1
  enunciado: Convierte a forma general $f(x)=(x-5)^2+2$.
  solucion_pasos:
  - 'Desarrollando: $(x-5)^2=x^2-10x+25$.'
  - $f(x)=x^2-10x+27$.
- titulo: Conversión con coeficiente a distinto de 1
  enunciado: Convierte a forma general $f(x)=-2(x+1)^2+3$.
  solucion_pasos:
  - 'Desarrollando: $(x+1)^2=x^2+2x+1$.'
  - 'Multiplicando por $-2$: $-2x^2-4x-2$.'
  - $f(x)=-2x^2-4x+1$.
- titulo: ¿Convertir de forma canónica a forma general cambia la gráfica de la función?
  enunciado: ¿Convertir de forma canónica a forma general cambia la gráfica de la función?
  respuesta: 'No'
  solucion_pasos:
  - Son la misma función expresada de dos maneras algebraicamente equivalentes; la gráfica es idéntica.
- titulo: ¿El coeficiente $a$ cambia al convertir de forma canónica a forma general?
  enunciado: ¿El coeficiente $a$ cambia al convertir de forma canónica a forma general?
  respuesta: 'No'
  solucion_pasos:
  - El coeficiente principal se mantiene idéntico entre ambas formas equivalentes.
errores_frecuentes:
- Olvidar distribuir el coeficiente $a$ en todos los términos del binomio desarrollado.
- Cometer errores de signo al desarrollar el cuadrado de un binomio con $h$ negativo.
- No sumar correctamente la constante $k$ al final del proceso.
- Confundir el desarrollo de $(x-h)^2$ con $(x-h) \cdot 2$, aplicando una operación incorrecta.
