semantic_id: MAT.NUM.PROP_DIRECTA.GRAFICO_RECTA_ORIGEN
objetivo: Identificar y analizar el gráfico de una proporción directa.
introduccion: Si tomas todos los puntos de una tabla de proporción directa y los dibujas
  en un plano cartesiano, aparecerá una figura geométrica perfecta e inconfundible
  que nos da información a un solo golpe de vista.
resumen: El gráfico de una proporción directa en el plano cartesiano es siempre una
  línea recta que pasa exactamente por el origen de coordenadas $(0,0)$.
explicacion: 'Una **proporcionalidad directa** siempre se representa gráficamente
  como una **línea recta diagonal**.


  La característica más crítica es que esta recta **debe pasar por el origen** $(0,0)$.
  Esto tiene total sentido lógico: si no compras ningún artículo ($x=0$), no pagas
  nada ($y=0$). Si la recta no pasa por el origen (por ejemplo, si arranca desde más
  arriba en el eje Y), no es proporción directa, sino una función afín con un ''cargo
  fijo''.


  La inclinación (pendiente) de esta recta depende del valor de la constante $k$:
  mientras mayor sea $k$, más empinada será la recta.'
procedimiento:
- 'Paso 1: Observa el plano cartesiano y ubica los puntos de la gráfica.'
- 'Paso 2: Comprueba que forman una línea recta.'
- 'Paso 3: Verifica que el origen $(0,0)$ sea parte de esa recta. Si cumple ambas,
  es proporción directa.'
ejemplos:
- titulo: Evaluando gráficos
  enunciado: Una recta arranca en el punto $(0, 1000)$ y sube constantemente. ¿Es
    proporción directa?
  solucion_pasos:
  - La forma es de recta.
  - Pero corta al eje Y en $1000$, no en $0$.
  - Por lo tanto, NO es proporción directa.
errores_frecuentes:
- Creer que cualquier recta inclinada es proporción directa, olvidando revisar si
  pasa por $(0,0)$.
- Pensar que una curva ascendente puede ser proporción directa.
- Confundir la pendiente de la recta con el valor de la variable $x$.
- Creer que si la recta es muy acostada (pendiente baja), deja de ser proporción directa.
fuente: Currículum Nacional MINEDUC.
estado: publicado
