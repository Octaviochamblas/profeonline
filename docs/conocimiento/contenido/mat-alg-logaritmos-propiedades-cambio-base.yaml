semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.CAMBIO_BASE
titulo: Propiedad del cambio de base
objetivo: Aplicar la fórmula $\log_b(x)=\dfrac{\log_c(x)}{\log_c(b)}$ para reescribir un logaritmo en términos de
  otra base.
introduccion: No siempre la base de un logaritmo es cómoda para calcular con calculadora o para comparar con
  otro logaritmo; el cambio de base permite reescribirlo usando cualquier base conveniente.
resumen: La propiedad de **cambio de base** permite escribir $\log_b(x)=\dfrac{\log_c(x)}{\log_c(b)}$ para
  cualquier base auxiliar $c>0$, $c\neq1$, útil para calcular o comparar logaritmos de distinta base.
explicacion: '### Definición formal


  Para $b,c>0$, $b,c\neq1$ y $x>0$, se cumple $\log_b(x)=\dfrac{\log_c(x)}{\log_c(b)}$. Se demuestra aplicando
  $\log_c(\cdot)$ a ambos lados de $b^{\log_b(x)}=x$: se obtiene $\log_b(x)\cdot\log_c(b)=\log_c(x)$, y despejando
  $\log_b(x)$ resulta la fórmula.


  ### Desarrollo didáctico


  Para calcular $\log_5(20)$ sin una calculadora que tenga base $5$, se cambia a base $10$:
  $\log_5(20)=\dfrac{\log_{10}(20)}{\log_{10}(5)}$. Cualquier base auxiliar sirve, siempre que sea la misma en
  numerador y denominador.'
procedimiento:
- 'Paso 1: Elige una base auxiliar $c$ conveniente (comúnmente $10$).'
- 'Paso 2: Escribe el logaritmo original como cociente entre $\log_c(x)$ y $\log_c(b)$.'
- 'Paso 3: Calcula o simplifica ambos logaritmos en la nueva base.'
ejemplos:
- titulo: Cambio de base a base 10
  enunciado: 'Reescribe $\log_3(15)$ usando base $10$.'
  solucion_pasos:
  - Se aplica la fórmula de cambio de base.
  - 'El resultado es $\dfrac{\log_{10}(15)}{\log_{10}(3)}$.'
- titulo: Cambio de base entre logaritmos con valores conocidos
  enunciado: 'Usa el cambio de base para expresar $\log_4(8)$ en términos de base $2$.'
  solucion_pasos:
  - 'Se aplica la fórmula: $\log_4(8)=\dfrac{\log_2(8)}{\log_2(4)}$.'
  - 'Como $\log_2(8)=3$ y $\log_2(4)=2$, el resultado es $3/2$.'
- titulo: ¿La base auxiliar del cambio de base puede ser cualquier valor válido?
  enunciado: ¿Se puede usar cualquier base auxiliar $c>0$, $c\neq1$ en la fórmula de cambio de base?
  respuesta: Sí
  solucion_pasos:
  - La fórmula es válida para cualquier base auxiliar que cumpla las condiciones de existencia.
- titulo: ¿El cambio de base altera el valor original del logaritmo?
  enunciado: ¿El valor numérico de $\log_b(x)$ cambia al reescribirlo con otra base auxiliar?
  respuesta: 'No'
  solucion_pasos:
  - Solo cambia la forma de escribirlo; el valor numérico permanece exactamente el mismo.
errores_frecuentes:
- Invertir el orden del cociente, escribiendo $\log_c(b)/\log_c(x)$ en vez de $\log_c(x)/\log_c(b)$.
- Usar bases auxiliares distintas en el numerador y el denominador.
- Olvidar que la base auxiliar también debe cumplir $c>0$, $c\neq1$.
- Confundir el cambio de base con la propiedad del cociente de logaritmos.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
