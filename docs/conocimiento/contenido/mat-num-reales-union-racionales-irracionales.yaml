semantic_id: MAT.NUM.REALES.UNION_RACIONALES_IRRACIONALES
objetivo: Clasificar reales separando racionales e irracionales.
introduccion: 'Una recta sin huecos necesita dos familias disjuntas: números expresables
  como fracción y números que no lo son. Su unión forma los reales.'
resumen: \(\mathbb{R}=\mathbb{Q}\cup(\mathbb{R}\setminus\mathbb{Q})\). Ningún número
  es simultáneamente racional e irracional.
explicacion: |-
  \(\mathbb{R}=\mathbb{Q}\cup(\mathbb{R}\setminus\mathbb{Q})\).

  El cálculo “\(0.75\) pertenece a \(\mathbb{Q}\) y \(\sqrt3\) al conjunto irracional; ambos pertenecen a \(\mathbb{R}\)” muestra por qué ningún número es simultáneamente racional e irracional
procedimiento:
- 'Paso 1: Intenta expresar el número como cociente de enteros o decimal finito/periódico.'
- 'Paso 2: Si no es posible y el valor existe en la recta, clasifícalo como irracional.'
- 'Paso 3: Concluye su pertenencia a \(\mathbb{R}\) y evita asignarlo a ambas familias.'
ejemplos:
- titulo: Aplicación razonada — Construcción de los reales como unión de racionales
    e irracionales
  enunciado: \(0.75\) pertenece a \(\mathbb{Q}\) y \(\sqrt3\) al conjunto irracional;
    ambos pertenecen a \(\mathbb{R}\).
  solucion_pasos:
  - Intenta expresar el número como cociente de enteros o decimal finito/periódico.
  - Si no es posible y el valor existe en la recta, clasifícalo como irracional.
  - Concluye su pertenencia a \(\mathbb{R}\) y evita asignarlo a ambas familias.
- titulo: Revisión de una solución — Construcción de los reales como unión de racionales
    e irracionales
  enunciado: Una solución aplica “Si no es posible y el valor existe en la recta,
    clasifícalo como irracional.”, pero termina sin comprobar que ningún número es
    simultáneamente racional e irracional. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define construcción de los reales como unión de racionales
    e irracionales: \(\mathbb{R}=\mathbb{Q}\cup(\mathbb{R}\setminus\mathbb{Q})\).'
  - Intenta expresar el número como cociente de enteros o decimal finito/periódico.
  - 'Completa la revisión con este control: Concluye su pertenencia a \(\mathbb{R}\)
    y evita asignarlo a ambas familias.'
- titulo: ¿Se cumple que ningún número es simultáneamente racional e irracional? —
    Construcción de los reales como unión de racionales e irracionales
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\mathbb{R}=\mathbb{Q}\cup(\mathbb{R}\setminus\mathbb{Q})\).
  - El caso “\(0.75\) pertenece a \(\mathbb{Q}\) y \(\sqrt3\) al conjunto irracional;
    ambos pertenecen a \(\mathbb{R}\)” satisface esa condición.
  - Concluye su pertenencia a \(\mathbb{R}\) y evita asignarlo a ambas familias.
- titulo: ¿Es válido omitir el paso “Intenta expresar el número como cociente de enteros
    o decimal finito/periódico”? — Construcción de los reales como unión de racionales
    e irracionales
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de construcción de los reales como
    unión de racionales e irracionales.
  - 'Omitirlo puede volver inválida la acción siguiente: Si no es posible y el valor
    existe en la recta, clasifícalo como irracional.'
  - 'La solución debe terminar de este modo: Concluye su pertenencia a \(\mathbb{R}\)
    y evita asignarlo a ambas familias.'
errores_frecuentes:
- 'Confundir construcción de los reales como unión de racionales e irracionales con
  otro concepto y omitir este inicio: Intenta expresar el número como cociente de
  enteros o decimal finito/periódico.'
- Aplicar mecánicamente “Si no es posible y el valor existe en la recta, clasifícalo
  como irracional.” sin revisar las condiciones de la definición.
- Tomar “\(0.75\) pertenece a \(\mathbb{Q}\) y \(\sqrt3\) al conjunto irracional;
  ambos pertenecen a \(\mathbb{R}\)” como una igualdad aislada, sin explicar por qué
  es válida.
- Aceptar una respuesta que contradice la idea clave “ningún número es simultáneamente
  racional e irracional”.
- 'Terminar el desarrollo sin realizar este control: Concluye su pertenencia a \(\mathbb{R}\)
  y evita asignarlo a ambas familias.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
