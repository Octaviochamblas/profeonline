semantic_id: MAT.EST.PROBA_COMPUESTA_CONDICIONAL.REGLA_MULTIPLICATIVA_GENERAL
titulo: Derivación de la regla multiplicativa general desde la probabilidad condicional
objetivo: Derivar la regla multiplicativa general despejando P(A∩B) de la fórmula de probabilidad condicional.
introduccion: Al despejar la intersección de la fórmula de probabilidad condicional, se obtiene una regla
  que permite calcular la probabilidad de dos eventos simultáneos, sin necesidad de que sean independientes.
resumen: La regla multiplicativa general establece que $P(A\cap B)=P(B)\times P(A|B)$, obtenida al despejar
  $P(A\cap B)$ de la definición de probabilidad condicional.
explicacion: '![Regla multiplicativa general](/static/img/probabilidad/compuesta/compuesta-regla-multiplicativa-general.svg)


  ### Definición formal


  De $P(A|B)=\dfrac{P(A\cap B)}{P(B)}$, multiplicando ambos lados por $P(B)$: $P(A\cap B)=P(B)\times P(A|B)$.


  ### Desarrollo didáctico


  Esta regla es más general que la regla del producto para eventos independientes (P(A)×P(B)), ya que
  funciona incluso cuando A y B son dependientes, usando la probabilidad condicional en vez de la probabilidad
  simple de A.'
procedimiento:
- 'Paso 1: Parte de la definición de probabilidad condicional P(A|B)=P(A∩B)/P(B).'
- 'Paso 2: Multiplica ambos lados de la ecuación por P(B).'
- 'Paso 3: Obtén la regla P(A∩B)=P(B)×P(A|B), válida para eventos dependientes o independientes.'
ejemplos:
- titulo: Derivar la regla multiplicativa desde la definición
  enunciado: P(A|B)=P(A∩B)/P(B).
  solucion_pasos:
  - 'Multiplicando ambos lados por P(B): P(A∩B)=P(B)×P(A|B).'
- titulo: Aplicar la regla con valores concretos
  enunciado: P(B)=0,4, P(A|B)=0,5.
  solucion_pasos:
  - P(A∩B)=0,4×0,5=0,2.
- titulo: ¿Esta regla funciona para eventos dependientes?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, esa es justamente su ventaja: es válida sin importar si los eventos son dependientes o independientes.'
- titulo: ¿Si A y B son independientes, esta regla se reduce a P(A)×P(B)?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que en ese caso P(A|B)=P(A), reduciendo la fórmula a la regla del producto simple.
errores_frecuentes:
- Confundir esta regla general con la regla del producto simple para eventos independientes.
- Usar P(A) en vez de P(A|B) al aplicar esta fórmula, ignorando la posible dependencia entre los eventos.
- Invertir el orden de los factores, calculando P(A)×P(B|A) cuando se pidió específicamente P(B)×P(A|B)
  (aunque son equivalentes matemáticamente, se debe usar la información disponible correctamente).
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
