semantic_id: MAT.ALG.DESIG_PROPIEDADES.MULTIPLICACION_POSITIVA
titulo: Multiplicación por una cantidad positiva
objetivo: Multiplicar ambos lados de una desigualdad por un número real positivo manteniendo
  el sentido de la desigualdad.
introduccion: Al ampliar o escalar valores en una desigualdad mediante multiplicación,
  es vital entender que los números positivos preservan el orden relativo entre las
  cantidades.
resumen: Al multiplicar ambos miembros de una desigualdad por un número estrictamente
  mayor que cero, el sentido de la desigualdad no cambia.
explicacion: '### Definición formal

  Sean $a, b, c \in \mathbb{R}$, con $c > 0$. Si $a < b$, entonces $a \cdot c < b
  \cdot c$. Análogamente para $>, \leq$ y $\geq$.


  ### Desarrollo didáctico

  Multiplicar por un número positivo es como estirar proporcionalmente una recta numérica.
  Las distancias cambian, pero el número que estaba a la derecha seguirá estando a
  la derecha.'
procedimiento:
  - Verificar que el factor por el cual se va a multiplicar sea positivo.
  - Multiplicar el lado izquierdo de la desigualdad por el factor.
  - Multiplicar el lado derecho de la desigualdad por el mismo factor.
  - Simplificar, conservando la orientación original de la desigualdad.
ejemplos:
  - titulo: Eliminación de denominadores
    enunciado: Resuelva la desigualdad $\frac{x}{3} > 4$.
    solucion_pasos:
      - Multiplicar ambos lados por $3$, que es positivo.
      - $3 \cdot \frac{x}{3} > 3 \cdot 4$.
      - 'Simplificar: $x > 12$.'
  - titulo: Escalamiento de inecuación
    enunciado: Resuelva $\frac{y}{5} \leq 2$.
    solucion_pasos:
      - Multiplicar por $5$ (número positivo) en ambos lados.
      - Simplificar para obtener $y \leq 10$.
  - titulo: ¿Es cierto que $3 < 7$ implica que $3(2) < 7(2)$?
    respuesta: Sí
    solucion_pasos:
      - El factor $2$ es positivo.
      - Al multiplicar, se obtiene $6 < 14$, lo que se cumple.
  - titulo: ¿Cambia la desigualdad si multiplicamos por $0.5$?
    respuesta: 'No'
    solucion_pasos:
      - El número $0.5$ es mayor que cero.
      - Cualquier multiplicación por un número positivo mantiene el orden.
errores_frecuentes:
  - Multiplicar por un número positivo invierte el sentido de la desigualdad.
  - Si se multiplica por una fracción positiva, la desigualdad se invierte.
  - El sentido cambia si los términos de la desigualdad son negativos inicialmente.
  - La propiedad no es válida para desigualdades estrictas ($<$ o $>$).
  - Solo los enteros positivos mantienen el signo de la desigualdad.
fuente: ProfeOnline
