semantic_id: MAT.NUM.LOGARITMOS_CONCEPTO.RELACION_CON_POTENCIA
objetivo: Conectar una potencia con su logaritmo equivalente.
introduccion: Una igualdad exponencial y una logarítmica pueden contar exactamente
  la misma historia. Cambiar de forma permite elegir la operación que deja visible
  la incógnita.
resumen: Logaritmos y potencias expresan la misma relación entre base, exponente y
  resultado. La base se conserva, el resultado de la potencia pasa a argumento y el
  exponente pasa a ser el logaritmo.
explicacion: |-
  Logaritmos y potencias expresan la misma relación entre base, exponente y resultado.

  En el caso “\(3^4=81\) equivale a \(\log_3 81=4\)” esta idea se hace visible: la base se conserva, el resultado de la potencia pasa a argumento y el exponente pasa a ser el logaritmo
procedimiento:
- 'Paso 1: Señala base, exponente y resultado en la igualdad inicial.'
- 'Paso 2: Reubica cada elemento según la definición logarítmica o exponencial.'
- 'Paso 3: Regresa a la forma original para verificar que no intercambiaste argumento
  y exponente.'
ejemplos:
- titulo: Aplicación razonada — Relación entre logaritmo y potencia
  enunciado: \(3^4=81\) equivale a \(\log_3 81=4\).
  solucion_pasos:
  - Señala base, exponente y resultado en la igualdad inicial.
  - Reubica cada elemento según la definición logarítmica o exponencial.
  - Regresa a la forma original para verificar que no intercambiaste argumento y exponente.
- titulo: Revisión de una solución — Relación entre logaritmo y potencia
  enunciado: Una solución aplica “Reubica cada elemento según la definición logarítmica
    o exponencial.”, pero termina sin comprobar que la base se conserva, el resultado
    de la potencia pasa a argumento y el exponente pasa a ser el logaritmo. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define relación entre logaritmo y potencia: logaritmos
    y potencias expresan la misma relación entre base, exponente y resultado.'
  - Señala base, exponente y resultado en la igualdad inicial.
  - 'Completa la revisión con este control: Regresa a la forma original para verificar
    que no intercambiaste argumento y exponente.'
- titulo: ¿Se cumple que la base se conserva, el resultado de la potencia pasa a argumento
    y el exponente pasa a ser el logaritmo? — Relación entre logaritmo y potencia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que logaritmos y potencias expresan la
    misma relación entre base, exponente y resultado.
  - El caso “\(3^4=81\) equivale a \(\log_3 81=4\)” satisface esa condición.
  - Regresa a la forma original para verificar que no intercambiaste argumento y exponente.
- titulo: ¿Es válido omitir el paso “Señala base, exponente y resultado en la igualdad
    inicial”? — Relación entre logaritmo y potencia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de relación entre logaritmo y potencia.
  - 'Omitirlo puede volver inválida la acción siguiente: Reubica cada elemento según
    la definición logarítmica o exponencial.'
  - 'La solución debe terminar de este modo: Regresa a la forma original para verificar
    que no intercambiaste argumento y exponente.'
errores_frecuentes:
- 'Confundir relación entre logaritmo y potencia con otro concepto y omitir este inicio:
  Señala base, exponente y resultado en la igualdad inicial.'
- Aplicar mecánicamente “Reubica cada elemento según la definición logarítmica o exponencial.”
  sin revisar las condiciones de la definición.
- Tomar “\(3^4=81\) equivale a \(\log_3 81=4\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la base se conserva, el resultado
  de la potencia pasa a argumento y el exponente pasa a ser el logaritmo”.
- 'Terminar el desarrollo sin realizar este control: Regresa a la forma original para
  verificar que no intercambiaste argumento y exponente.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
