semantic_id: MAT.EST.TABLAS_NO_AGRUPADAS.FREQ_ABS_ACUM
titulo: Calcular la frecuencia absoluta acumulada
objetivo: Calcular la frecuencia absoluta acumulada (F) como la suma progresiva de las frecuencias absolutas
  hasta un valor determinado.
introduccion: La frecuencia acumulada permite responder preguntas del tipo '¿cuántos datos son menores
  o iguales que cierto valor?'.
resumen: La frecuencia absoluta acumulada $F_i$ es la suma de las frecuencias absolutas de todos los valores
  hasta e incluyendo $x_i$.
explicacion: '![Frecuencia absoluta acumulada](/static/img/estadistica/tablasna/tablasna-freq-abs-acum.svg)


  ### Definición formal


  $F_i=f_1+f_2+\cdots+f_i$, la suma acumulada de las frecuencias absolutas desde el primer valor hasta
  el valor $x_i$.


  ### Desarrollo didáctico


  Con x=4,f=1; x=5,f=2; x=6,f=3; x=7,f=1: la frecuencia acumulada sería F(4)=1, F(5)=1+2=3, F(6)=3+3=6,
  F(7)=6+1=7.'
procedimiento:
- 'Paso 1: Ordena los valores de la variable de menor a mayor con sus frecuencias absolutas.'
- 'Paso 2: Suma progresivamente la frecuencia de cada valor con las frecuencias de los valores anteriores.'
- 'Paso 3: Verifica que la última frecuencia acumulada sea igual al total de datos (n).'
ejemplos:
- titulo: Calcular la frecuencia acumulada de un conjunto de notas
  enunciado: x=4,f=1; x=5,f=2; x=6,f=3; x=7,f=1.
  solucion_pasos:
  - F(4)=1, F(5)=1+2=3, F(6)=3+3=6, F(7)=6+1=7.
- titulo: Calcular la frecuencia acumulada del número de hijos
  enunciado: x=0,f=3; x=1,f=4; x=2,f=2; x=3,f=1.
  solucion_pasos:
  - F(0)=3, F(1)=3+4=7, F(2)=7+2=9, F(3)=9+1=10.
- titulo: ¿La última frecuencia acumulada siempre coincide con el total de datos?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que incluye la suma de todas las frecuencias absolutas del conjunto.
- titulo: ¿La frecuencia acumulada puede disminuir a medida que aumenta x?
  respuesta: 'No'
  solucion_pasos:
  - No, la frecuencia acumulada es siempre creciente o constante, nunca decrece.
errores_frecuentes:
- Sumar incorrectamente las frecuencias, sobre todo al pasar de un valor al siguiente.
- Confundir la frecuencia acumulada con la frecuencia absoluta simple de cada valor.
- No verificar que la última frecuencia acumulada coincida con el total de datos.
fuente: 'Elaboración propia (referencia: Moraleja 198, 351).'
estado: publicado
