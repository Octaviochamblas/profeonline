semantic_id: MAT.GEO.ANGULOS_FUNDAMENTOS.NOTACION_TRES_PUNTOS
titulo: Notación de ángulos mediante tres puntos con el vértice al centro
objetivo: Leer correctamente el orden de una notación angular con tres puntos y comprobar que cambiar
  el punto central modifica el ángulo nombrado, aunque se usen las mismas letras.
introduccion: 'Nombrar un ángulo con tres puntos se parece a dar una dirección muy precisa: los extremos
  ayudan, pero el punto del centro es el que fija la esquina exacta. Aquí lo trabajaremos con ejemplos
  concretos y verificaciones cortas.'
resumen: Al escribir \(\angle ABC\), el punto central \(B\) indica el vértice del ángulo. Como idea de
  control, cambiar el punto central modifica el ángulo nombrado, aunque se usen las mismas letras.
explicacion: 'Al escribir \(\angle ABC\), el punto central \(B\) indica el vértice del ángulo.


  En el caso “la expresión \(\angle ABC\) se lee mirando los rayos \(BA\) y \(BC\)” esta idea se vuelve
  visible y permite comprobar que cambiar el punto central modifica el ángulo nombrado, aunque se usen
  las mismas letras.'
procedimiento:
- 'Paso 1: Identifica la letra central del nombre del ángulo.'
- 'Paso 2: Construye los dos rayos que salen desde ese punto hacia las letras de los extremos.'
- 'Paso 3: Verifica que el nombre elegido coincide con la abertura que se quiere señalar.'
ejemplos:
- titulo: Aplicación directa — Notación con tres puntos
  enunciado: La expresión \(\angle ABC\) se lee mirando los rayos \(BA\) y \(BC\).
  solucion_pasos:
  - Identifica la letra central del nombre del ángulo.
  - Construye los dos rayos que salen desde ese punto hacia las letras de los extremos.
  - Verifica que el nombre elegido coincide con la abertura que se quiere señalar.
- titulo: Corrección de una respuesta — Notación con tres puntos
  enunciado: En la situación “la expresión \(\angle ABC\) se lee mirando los rayos \(BA\) y \(BC\)”, un
    compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye la justificación
    completa.
  solucion_pasos:
  - 'Parte de la definición: al escribir \(\angle ABC\), el punto central \(B\) indica el vértice del
    ángulo.'
  - Construye los dos rayos que salen desde ese punto hacia las letras de los extremos.
  - Verifica que el nombre elegido coincide con la abertura que se quiere señalar.
- titulo: ¿La situación respeta la idea clave del recurso? — Notación con tres puntos
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: al escribir \(\angle ABC\), el punto central
    \(B\) indica el vértice del ángulo.'
  - En el caso “la expresión \(\angle ABC\) se lee mirando los rayos \(BA\) y \(BC\)” se observa que cambiar
    el punto central modifica el ángulo nombrado, aunque se usen las mismas letras.
  - Verifica que el nombre elegido coincide con la abertura que se quiere señalar.
- titulo: ¿Basta con identifica la letra central del nombre del ángulo? — Notación con tres puntos
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de notación de ángulos mediante tres puntos
    con el vértice al centro.
  - Después del paso “Identifica la letra central del nombre del ángulo.” todavía hace falta revisar “Construye
    los dos rayos que salen desde ese punto hacia las letras de los extremos.”.
  - El cierre correcto exige “Verifica que el nombre elegido coincide con la abertura que se quiere señalar.”.
errores_frecuentes:
- Notación con tres puntos significa cualquier permutación de las tres letras, aunque cambie el punto
  central.
- Para resolver notación con tres puntos, basta con el paso “Identifica la letra central del nombre del
  ángulo.” y no hace falta revisar “Construye los dos rayos que salen desde ese punto hacia las letras
  de los extremos.”.
- Si el dibujo parece claro, se puede ignorar que cambiar el punto central modifica el ángulo nombrado,
  aunque se usen las mismas letras.
- Dos configuraciones distintas representan notación con tres puntos solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Verifica que el nombre elegido coincide con
  la abertura que se quiere señalar.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
