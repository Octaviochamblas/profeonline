semantic_id: MAT.ALG.TERMINO_COMUN.IDENTIFICACION_ESTRUCTURA
titulo: Identificación de binomios con término común
objetivo: Reconocer la estructura de dos binomios que comparten exactamente un término para aplicar su
  regla particular.
introduccion: ¿Qué pasa si los binomios se parecen, pero no son idénticos ni conjugados? Si comparten
  al menos una cosa, estás de suerte.
resumen: 'Dos binomios tienen un **término común** cuando exactamente uno de sus términos es idéntico
  en ambos (mismo coeficiente, misma letra, mismo exponente, mismo signo).

  Estructura general: $(x+a)(x+b)$, donde $x$ es el término común, y $a, b$ son los términos no comunes
  (diferentes).'
explicacion: '### Definición formal


  Tienen exactamente un término que es idéntico en ambos paréntesis.


  ### Desarrollo didáctico


  Para usar la regla del término común, el primer paso es aprender a identificar su estructura y diferenciarla
  de otros productos notables.


  La expresión clave es **$(x+a)(x+b)$**.

  Para confirmar que estás frente a un producto con término común, hazte estas dos preguntas:

  1. **¿Hay exactamente un término que es idéntico en ambos binomios (mismo signo y exponente)?** Ese
  será tu término común.

  2. **¿Los otros dos términos son diferentes entre sí?** Estos serán tus términos no comunes. (Si fueran
  iguales, sería un Cuadrado de Binomio; si fueran iguales pero con distinto signo, sería una Suma por
  Diferencia).


  **Ejemplo de análisis:**

  En $(2y^2 - 7)(2y^2 + 4)$:

  - El término común es $2y^2$, ya que aparece exactamente igual en ambos lados.

  - Los términos no comunes son $-7$ y $+4$. (Atención: el signo siempre acompaña al término no común.).

  Sabiendo esto, puedes aplicar el atajo de inmediato.'
procedimiento:
- 'Paso 1: Para identificar este producto notable:'
- 'Paso 2: Observa ambos binomios.'
- 'Paso 3: Verifica si son idénticos (cuadrado de binomio). Si no, pasa al paso 3.'
- 'Paso 4: Verifica si son suma por diferencia. Si no, pasa al paso 4.'
- 'Paso 5: Busca un término que sea exactamente igual en ambos. Ese es tu ''término común''.'
- 'Paso 6: Los otros dos términos son los ''no comunes''.'
- Esa es la definición de la estructura $(x+a)(x+b)$.
ejemplos:
- titulo: Clasificando productos
  enunciado: Determina si $(5p - 2)(5p + 3)$ corresponde a un producto con término común.
  solucion_pasos:
  - El término $5p$ aparece exactamente igual en ambos paréntesis.
  - Los otros términos son $-2$ y $+3$, que son distintos.
  - Por lo tanto, SÍ es un producto de binomios con término común.
- titulo: Es la expresión $(x - y)(x + y)$ un caso especial de binomios con término común
  enunciado: '¿Es la expresión $(x - y)(x + y)$ un caso especial de binomios con término común?


    Opciones: A) Sí, donde el término común es $x$, y los no comunes son $-y$ e $y$. · B) No, porque no
    cumple la estructura general. · C) No, porque los signos son diferentes. · D) Sí, pero el término
    común es $y$.'
  solucion_pasos:
  - 'Si aplicamos la regla de término común: $x^2 + (-y+y)x + (-y)(y) = x^2 + 0x - y^2 = x^2 - y^2$. Sí
    es un caso especial.'
  - 'Respuesta: Sí, donde el término común es $x$, y los no comunes son $-y$ e $y$.'
- titulo: 'Respecto de «Identificación de binomios con término común»: ¿Describe adecuadamente el conce'
  enunciado: 'Respecto de «Identificación de binomios con término común»: ¿Describe adecuadamente el concepto
    esta frase? «Dos binomios tienen un **término común** cuando exactamente uno de sus términos es idéntico
    en ambos (mismo coeficiente, misma letra, mismo exponente, mismo signo)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Dos binomios tienen un **término común** cuando
    exactamente uno de sus términos es idéntico en ambos (mismo coeficiente, misma letra, mismo exponente,
    mismo signo).'
- titulo: 'Respecto de «Identificación de binomios con término común»: ¿Se puede aceptar esta afirmació'
  enunciado: 'Respecto de «Identificación de binomios con término común»: ¿Se puede aceptar esta afirmación?
    «Creer que $(2x+3)(3x+2)$ tiene término común. ¡No lo tiene! $2x$ es distinto de $3x$, y $3$ es distinto
    de $2$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Dos binomios tienen un **término común** cuando
    exactamente uno de sus términos es idéntico en ambos (mismo coeficiente, misma letra, mismo exponente,
    mismo signo).'
errores_frecuentes:
- Creer que $(2x+3)(3x+2)$ tiene término común. ¡No lo tiene! $2x$ es distinto de $3x$, y $3$ es distinto
  de $2$.
- Tienen los mismos términos con distinto signo.
- Ningún término coincide.
- Comparten todos los términos.
- $(3y - 5)(2y + 5)$.
