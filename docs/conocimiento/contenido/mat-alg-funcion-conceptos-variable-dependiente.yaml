semantic_id: MAT.ALG.FUNCION_CONCEPTOS.VARIABLE_DEPENDIENTE
titulo: Identificación de la variable dependiente
objetivo: Reconocer la variable dependiente como aquella cuyo valor queda determinado por la variable independiente
  a través de la función.
introduccion: 'Una vez que eliges el valor de $x$, el valor de $y$ ya no es una elección libre: queda completamente
  determinado por la regla de la función.'
resumen: La **variable dependiente** de una función es aquella cuyo valor está determinado por la variable independiente
  a través de la regla $f$; convencionalmente se denota $y$, y se cumple $y = f(x)$.
explicacion: '### Definición formal


  En $y=f(x)$, la variable $y$ toma el valor que la función asigna a cada $x$ del dominio; su valor no se elige
  libremente, sino que queda unívocamente determinado por $x$ y la regla $f$. Por eso $y$ recibe el nombre de
  variable dependiente.


  ### Desarrollo didáctico


  Retomando el ejemplo de la planta: tú eliges cuánta agua darle ($x$), pero cuánto crece ($y$) no lo eliges directamente,
  es una consecuencia de tu elección y de la biología de la planta (la regla $f$).


  En $y = 3x+2$, si eliges $x=4$, el valor $y=14$ queda forzado; no puedes elegir $y=20$ para ese mismo $x$ sin
  contradecir la función.'
procedimiento:
- 'Paso 1: Identifica cuál cantidad resulta o se calcula a partir de otra en el contexto o la fórmula.'
- 'Paso 2: Esa cantidad, generalmente denotada $y$, es la variable dependiente.'
- 'Paso 3: Confirma que su valor se obtiene evaluando la función en la variable independiente.'
ejemplos:
- titulo: Identificación en una fórmula
  enunciado: En $y = 5x - 2$, ¿cuál es la variable dependiente?
  solucion_pasos:
  - El valor de $y$ se calcula a partir del valor elegido para $x$.
  - 'Variable dependiente: $y$.'
- titulo: Identificación en un contexto verbal
  enunciado: El costo de un taxi depende de los kilómetros recorridos. ¿Cuál es la variable dependiente?
  solucion_pasos:
  - El costo es el resultado que se obtiene a partir de los kilómetros recorridos.
  - 'Variable dependiente: el costo del viaje.'
- titulo: ¿El valor de la variable dependiente se elige libremente?
  enunciado: ¿El valor de la variable dependiente se elige libremente?
  respuesta: Falso
  solucion_pasos:
  - El valor de la variable dependiente queda determinado por la variable independiente a través de la función.
- titulo: ¿En $y=f(x)$, la letra $y$ representa la variable independiente?
  enunciado: ¿En $y=f(x)$, la letra $y$ representa la variable independiente?
  respuesta: Falso
  solucion_pasos:
  - $y$ es el resultado calculado a partir de $x$, es decir, la variable dependiente.
errores_frecuentes:
- Creer que la variable dependiente puede tomar cualquier valor sin relación con $x$.
- Confundir la variable dependiente con el nombre de la función misma.
- Invertir los roles de $x$ e $y$ al leer un contexto verbal.
- Suponer que la variable dependiente es siempre positiva o siempre entera sin analizar el contexto.
