semantic_id: MAT.EST.NORMAL_CALCULO.INTERVALO_SIMETRICO
titulo: Calcular probabilidades en intervalos simétricos respecto de la media
objetivo: Calcular la probabilidad asociada a un intervalo simétrico respecto de la media en una distribución normal.
introduccion: Cuando un intervalo está "parejo" alrededor del centro de la curva, hay un atajo que aprovecha la
  simetría para calcular más rápido su probabilidad.
resumen: Para un intervalo simétrico $[\mu-k\sigma, \mu+k\sigma]$, la probabilidad se calcula como
  $P(-k<Z<k)=2\cdot P(Z<k)-1$.
explicacion: '![Intervalo simétrico respecto de la media](/static/img/estadistica/normcalc/normcalc-intervalo-simetrico.svg)


  ### Definición formal


  Para un intervalo simétrico en torno a la media, se cumple $P(-k<Z<k)=2\cdot P(Z<k)-1$, aprovechando que ambas

  mitades del intervalo aportan la misma área.


  ### Desarrollo didáctico


  Esta fórmula es consistente con la regla empírica: por ejemplo, con $k=1$ se obtiene aproximadamente 0,68 (la

  regla del 68%).'
procedimiento:
- 'Paso 1: Identifica el valor de $k$ del intervalo simétrico $[-k, k]$.'
- 'Paso 2: Busca $P(Z<k)$ en la tabla normal estándar.'
- 'Paso 3: Calcula $P(-k<Z<k)=2\cdot P(Z<k)-1$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $P(Z<1)=0{,}8413$, calcula $P(-1<Z<1)$.
  solucion_pasos:
  - $P(-1<Z<1)=2\times 0{,}8413-1$.
  - $P(-1<Z<1)=0{,}6826$, consistente con la regla del 68%.
- titulo: Ejemplo 2
  enunciado: ¿Por qué la fórmula del intervalo simétrico multiplica por 2 y resta 1?
  solucion_pasos:
  - Porque se aprovecha que ambas mitades del intervalo (izquierda y derecha de la media) aportan áreas iguales.
  - Restar 1 elimina el área excedente que no corresponde al intervalo.
- titulo: ¿La fórmula $2\cdot P(Z<k)-1$ sirve para intervalos simétricos respecto de la media?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente su aplicación.
- titulo: ¿Esta fórmula funciona para cualquier intervalo, incluso si no es simétrico?
  respuesta: 'No'
  solucion_pasos:
  - 'No, solo aplica cuando el intervalo es simétrico respecto de la media (de la forma $[-k,k]$).'
errores_frecuentes:
- Aplicar esta fórmula a intervalos que no son simétricos respecto de la media.
- Olvidar restar 1 después de multiplicar por 2.
- Confundir $k$ con el valor original de $x$ en vez de con el puntaje $Z$.
- Usar $P(Z<-k)$ en vez de $P(Z<k)$ en la fórmula.
- Verificar mal que ambos extremos del intervalo sean equidistantes de la media.
fuente: 'Elaboración propia.'
estado: publicado
