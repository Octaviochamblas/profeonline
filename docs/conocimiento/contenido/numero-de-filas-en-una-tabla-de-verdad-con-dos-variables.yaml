semantic_id: MAT.FUND.TABLAS_VERDAD.FILAS_DOS_VARIABLES
titulo: Número de filas en una tabla de verdad con dos variables
objetivo: Calcular el número de filas y distribuir los valores de verdad en una tabla de verdad con dos
  variables proposicionales.
introduccion: 'Imagina que quieres planificar tu fin de semana considerando dos decisiones independientes:
  "ir al cine" e "ir a la playa". ¿Cuántas combinaciones distintas de planes puedes hacer? Podrías hacer
  ambas cosas, hacer solo una de ellas (cine pero no playa, o playa pero no cine), o no hacer ninguna.
  En total son 4 escenarios posibles. En lógica matemática, cuando tenemos dos proposiciones variables,
  la tabla de verdad necesita exactamente 4 filas para asegurar que estamos evaluando todas las combinaciones
  posibles de verdad y falsedad.'
resumen: Para una tabla de verdad con dos variables proposicionales $p$ y $q$, el número de filas necesarias
  para representar todas las combinaciones de valores de verdad es $2^2 = 4$. Los valores se distribuyen
  de manera sistemática para asegurar que no se omita ninguna combinación.
explicacion: 'El número de combinaciones de verdad posibles para un conjunto de variables lógicas independientes
  está determinado por una progresión exponencial de base 2.


  En general, si una expresión lógica contiene $n$ variables proposicionales distintas, el número total
  de filas en su tabla de verdad viene dado por la fórmula:

  $$\text{Número de filas} = 2^n$$


  Para el caso particular de **dos variables** ($n = 2$), por ejemplo $p$ y $q$, el número de filas requeridas
  es:

  $$2^2 = 4 \text{ filas}$$


  **Distribución estándar de los valores de verdad:**

  Para garantizar que cubrimos de forma sistemática y ordenada las 4 combinaciones posibles sin repetir
  ninguna, se utiliza la siguiente convención:

  1. **Primera columna ($p$):** Se dividen las 4 filas en dos mitades. Las primeras 2 filas se llenan
  con Verdadero ($V$) y las siguientes 2 con Falso ($F$).

  2. **Segunda columna ($q$):** Se alternan los valores de uno en uno ($V, F, V, F$).


  Esto da lugar al siguiente orden canónico de combinaciones:

  - ''Fila 1: $p = V$, $q = V$''

  - ''Fila 2: $p = V$, $q = F$''

  - ''Fila 3: $p = F$, $q = V$''

  - ''Fila 4: $p = F$, $q = F$'''
procedimiento:
- 'Paso 1: Determinar el número de proposiciones simples $n$. En este caso, al tener exactamente dos variables
  proposicionales $p$ y $q$, definimos la cantidad de filas necesarias mediante la fórmula $2^n = 2^2
  = 4$ filas.'
- 'Paso 2: Diseñar la estructura de la tabla, definiendo una columna para $p$, otra para $q$, y las columnas
  necesarias para evaluar de adentro hacia afuera los conectivos de la expresión lógica.'
- 'Paso 3: Llenar los valores lógicos de la primera variable $p$ colocando dos Verdaderos ($V$) seguidos
  de dos Falsos ($F$).'
- 'Paso 4: Llenar la segunda columna $q$ alternando consecutivamente Verdadero y Falso ($V, F, V, F$)
  para completar de manera exhaustiva las 4 combinaciones lógicas únicas.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determina cuántas filas tendrá la tabla de verdad para la expresión lógica compuesta $(p
    \land \neg q) \lor p$.
  solucion_pasos:
  - 'Paso a: Identificamos cuántas variables proposicionales simples distintas aparecen en la expresión.
    En este caso son únicamente $p$ y $q$, es decir, $n = 2$.'
  - 'Paso b: Aplicamos la fórmula del número de filas: $2^n = 2^2 = 4$. Por lo tanto, la tabla de verdad
    tendrá exactamente 4 filas.'
- titulo: Ejemplo 2
  enunciado: Escribe detalladamente la tercera combinación estándar de valores de verdad para una tabla
    con las variables $p$ y $q$.
  solucion_pasos:
  - 'Paso a: Recordamos la distribución estándar de valores. La primera variable $p$ se llena como $V,
    V, F, F$, y la segunda variable $q$ se llena como $V, F, V, F$.'
  - 'Paso b: Observamos la tercera fila. Para $p$, el tercer valor es Falso ($F$). Para $q$, el tercer
    valor es Verdadero ($V$). La combinación es ($F, V$).'
- titulo: ¿Si una expresión lógica contiene las proposiciones $p$, $q$ y de nuevo $p$, la tabla de verdad
    debe tener 8 filas?
  respuesta: 'No'
  solucion_pasos:
  - El número de filas depende de la cantidad de proposiciones simples *distintas*.
  - Aunque $p$ aparezca más de una vez en la fórmula, las variables únicas siguen siendo solo $p$ y $q$.
    Por ende, $n=2$, y la tabla tendrá $2^2 = 4$ filas.
- titulo: ¿La distribución estándar para $q$ en una tabla de dos variables es alternar de dos en dos?
  respuesta: 'No'
  solucion_pasos:
  - 'En la distribución estándar para dos variables, la primera columna ($p$) alterna de dos en dos: $V,
    V, F, F$.'
  - 'La segunda columna ($q$) es la que alterna de uno en uno: $V, F, V, F$, para poder cubrir todas las
    combinaciones cruzadas.'
errores_frecuentes:
- Duplicar el número de filas por cada vez que una misma variable aparece en la expresión, confundiendo
  cantidad de ocurrencias con cantidad de variables distintas.
- Llenar las columnas de variables lógicas sin un orden sistemático, lo que suele provocar que se omitan
  combinaciones o se repita alguna.
- Calcular el número de filas como $n^2$ o $2 \cdot n$ en lugar de usar la fórmula exponencial $2^n$ (por
  ejemplo, pensar que para dos variables son $2 \cdot 2 = 4$ pero para tres son $2 \cdot 3 = 6$).
- Olvidar que la negación de una variable no cuenta como una nueva variable proposicional para calcular
  el número de filas.
- Escribir mal el orden estándar de las variables simples en la tabla, lo que altera la interpretación
  y comparación con otras tablas de verdad estándar.
fuente: Lógica Matemática y Teoría de Conjuntos, pág. 32
estado: publicado
