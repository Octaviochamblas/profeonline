semantic_id: MAT.GEO.TRIG_FUNDAMENTAL.COSENO_DEFINICION
titulo: Definición de coseno de un ángulo agudo como cateto adyacente sobre hipotenusa
objetivo: Definir el coseno de un ángulo agudo de un triángulo rectángulo como el cociente entre el cateto
  adyacente y la hipotenusa.
introduccion: El coseno compara el lado que forma parte del ángulo (adyacente, no la hipotenusa) con el
  lado más largo del triángulo.
resumen: 'El coseno de un ángulo agudo $\theta$ en un triángulo rectángulo es la razón entre el cateto
  adyacente a $\theta$ y la hipotenusa: $\cos\theta=\dfrac{\text{cateto adyacente}}{\text{hipotenusa}}$.'
explicacion: '![Definición de coseno](/static/img/geometria/trigonometria/trig-coseno-definicion.svg)


  ### Definición formal


  En un triángulo rectángulo con ángulo agudo $\theta$, el coseno se define como $\cos\theta=\dfrac{\text{cateto
  adyacente}}{\text{hipotenusa}}$, donde el cateto adyacente es el lado (distinto de la hipotenusa) que
  sí forma parte del ángulo $\theta$.


  ### Desarrollo didáctico


  En la figura, el ángulo $\theta$ está en el vértice $B$. El cateto adyacente a $\theta$ es el lado $AB$
  (horizontal, que toca el vértice B), y la hipotenusa es $BC$. Por lo tanto, $\cos\theta=\dfrac{AB}{BC}$.'
procedimiento:
- 'Paso 1: Identifica el ángulo agudo θ y ubica el vértice donde se encuentra.'
- 'Paso 2: Identifica el cateto adyacente a θ (el lado, distinto de la hipotenusa, que sí toca ese vértice)
  y la hipotenusa.'
- 'Paso 3: Calcula cosθ como el cociente entre la longitud del cateto adyacente y la longitud de la hipotenusa.'
ejemplos:
- titulo: Calcular el coseno de un ángulo con medidas conocidas
  enunciado: En un triángulo rectángulo, el cateto adyacente a θ mide 4 cm y la hipotenusa mide 5 cm.
  solucion_pasos:
  - cosθ=4/5=0,8.
- titulo: Identificar el cateto adyacente correctamente
  enunciado: El ángulo θ está en el vértice B, con ángulo recto en A.
  solucion_pasos:
  - El cateto adyacente a θ es el lado AB, ya que toca el vértice B (pero no es la hipotenusa).
- titulo: ¿El coseno depende del tamaño específico del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, al igual que el seno, el coseno depende solo de la medida del ángulo, no del tamaño del triángulo.
- titulo: ¿El cateto adyacente es el mismo que la hipotenusa?
  respuesta: 'No'
  solucion_pasos:
  - 'No, son lados distintos: el adyacente es uno de los catetos, mientras que la hipotenusa es el lado
    opuesto al ángulo recto.'
errores_frecuentes:
- Confundir el cateto adyacente con la hipotenusa.
- Confundir el cateto adyacente con el cateto opuesto.
- Aplicar la definición de coseno en triángulos que no son rectángulos.
fuente: 'Elaboración propia (referencias: Moraleja 175, Cid 155).'
estado: publicado
