semantic_id: MAT.NUM.PORCENTAJES.REPRESENTACION_DECIMAL
objetivo: Convertir porcentajes a números decimales y viceversa.
introduccion: Las calculadoras no tienen un botón mágico para los porcentajes internos,
  operan con decimales. Si le pides el 20%, ella silenciosamente multiplicará por
  0.20.
resumen: 'Para convertir un porcentaje a decimal, se divide por 100 (corriendo la
  coma dos lugares a la izquierda). Ej: $45\% = 0.45$. Para decimal a porcentaje,
  se multiplica por 100.'
explicacion: 'Como un porcentaje es una fracción de denominador 100 ($x/100$), su
  **representación decimal** se obtiene simplemente ejecutando esa división.


  - $80\% = 80 \div 100 = 0.80$

  - $5\% = 5 \div 100 = 0.05$ (¡Atención al cero!)

  - $150\% = 150 \div 100 = 1.50$


  Para el proceso inverso (de decimal a porcentaje), haces lo contrario: multiplicar
  el decimal por 100 y agregar el símbolo $\%$.

  - $0.12 = 0.12 \cdot 100 = 12\%$.'
procedimiento:
- 'Paso 1: Toma el número del porcentaje y retira el símbolo %.'
- 'Paso 2: Mueve el punto decimal dos posiciones hacia la izquierda.'
- 'Paso 3: Si faltan dígitos, rellena con ceros. (Ej: $2\% \rightarrow 0.02$).'
ejemplos:
- titulo: Conversión decimal
  enunciado: Convierte 3.5% a número decimal.
  solucion_pasos:
  - 'Retiramos el símbolo: 3.5'
  - 'Corremos la coma dos espacios a la izquierda: $0.035$.'
  - El número decimal para operar en calculadora es $0.035$.
errores_frecuentes:
- Convertir el $5\%$ en $0.5$ (eso es el $50\%$). Lo correcto es $0.05$.
- Creer que $100\%$ es $100.0$ en decimal (es $1.0$).
- No saber qué hacer con porcentajes menores a 1, como $0.2\%$ (su decimal es $0.002$).
fuente: Currículum Nacional MINEDUC.
estado: publicado
