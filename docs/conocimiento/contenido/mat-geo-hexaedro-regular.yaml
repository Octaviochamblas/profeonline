semantic_id: MAT.GEO.POLIEDROS_PRISMAS.HEXAEDRO_REGULAR
titulo: Identificación del cubo como hexaedro regular
objetivo: 'Reconocer el cubo como el hexaedro regular: el poliedro regular formado por seis caras cuadradas
  congruentes.'
introduccion: 'El cubo, el cuerpo geométrico más conocido de todos (como un dado), es en realidad el hexaedro
  regular: el poliedro regular de 6 caras.'
resumen: El hexaedro regular (cubo) es un poliedro regular formado por 6 caras cuadradas congruentes,
  8 vértices y 12 aristas, con 3 caras concurriendo en cada vértice.
explicacion: '![Hexaedro regular (cubo)](/static/img/geometria/espacio-cuerpos/hexaedro-regular.svg)


  ### Definición formal


  El hexaedro regular, más conocido como cubo, es uno de los cinco sólidos platónicos. Tiene 6 caras (todas
  cuadrados congruentes), 8 vértices y 12 aristas. En cada vértice concurren exactamente 3 caras.


  ### Desarrollo didáctico


  En la figura, el cubo tiene sus 6 caras cuadradas, todas del mismo tamaño: 2 bases (superior e inferior)
  y 4 caras laterales, todas idénticas entre sí. Es, además de un poliedro regular, un caso particular
  de prisma recto (con bases cuadradas y altura igual al lado de la base).'
procedimiento:
- 'Paso 1: Verifica que el cuerpo tenga exactamente 6 caras cuadradas.'
- 'Paso 2: Verifica que las 6 caras sean congruentes entre sí (mismo tamaño de lado).'
- 'Paso 3: Confirma que en cada uno de los 8 vértices concurran exactamente 3 caras.'
ejemplos:
- titulo: Contar los elementos del cubo
  enunciado: Un cubo tiene 6 caras cuadradas congruentes.
  solucion_pasos:
  - 'Tiene 6 caras, 8 vértices y 12 aristas, cumpliendo la relación de Euler: 8-12+6=2.'
- titulo: Reconocer al cubo como caso particular de prisma
  enunciado: El cubo tiene bases cuadradas y altura igual al lado de la base.
  solucion_pasos:
  - El cubo es un prisma recto especial donde todas las dimensiones (largo, ancho, alto) son iguales.
- titulo: ¿El cubo es también llamado hexaedro regular?
  respuesta: Sí
  solucion_pasos:
  - Sí, 'hexaedro' significa 'seis caras', y 'regular' indica que todas son cuadrados congruentes.
- titulo: ¿Un prisma rectangular con caras de distinto tamaño es un hexaedro regular?
  respuesta: 'No'
  solucion_pasos:
  - No, aunque tenga 6 caras (por lo que sí sería un hexaedro), no sería regular si sus caras no son todas
    cuadrados congruentes entre sí.
errores_frecuentes:
- Confundir cualquier prisma rectangular (con caras de distinto tamaño) con el hexaedro regular.
- Olvidar que 'hexaedro' se refiere al número de caras (6), y 'regular' exige que sean cuadrados congruentes.
- Contar incorrectamente el número de aristas o vértices del cubo.
fuente: 'Elaboración propia (referencia: Moraleja 96).'
estado: publicado
