semantic_id: MAT.EST.BINOMIAL_BASE.VARIABLE_NUMERO_EXITOS
titulo: Definir la variable aleatoria X como el número de éxitos en n ensayos
objetivo: Definir la variable aleatoria X que representa el número total de éxitos obtenidos en los n
  ensayos de un experimento binomial.
introduccion: El resultado final de interés en un experimento binomial no es el resultado de cada ensayo
  individual, sino el conteo total de éxitos obtenidos.
resumen: La variable aleatoria $X$ en un experimento binomial representa el número total de éxitos obtenidos
  en los $n$ ensayos, y puede tomar los valores $0, 1, 2, \ldots, n$.
explicacion: '![Variable aleatoria número de éxitos](/static/img/probabilidad/binombase/binombase-variable-numero-exitos.svg)


  ### Definición formal


  $X\in\{0,1,2,\ldots,n\}$ representa el número de éxitos obtenidos al repetir $n$ veces un experimento
  de Bernoulli con probabilidad de éxito $p$.


  ### Desarrollo didáctico


  Al lanzar una moneda 5 veces, la variable $X$ (número de caras obtenidas) puede tomar los valores 0,
  1, 2, 3, 4 o 5, según cuántas caras se obtengan en total en esos 5 lanzamientos.'
procedimiento:
- 'Paso 1: Identifica el número de ensayos n del experimento.'
- 'Paso 2: Define X como el número de éxitos obtenidos en esos n ensayos.'
- 'Paso 3: Reconoce que X puede tomar cualquier valor entero entre 0 y n, inclusive.'
ejemplos:
- titulo: Definir X al lanzar una moneda 5 veces
  enunciado: Se lanza una moneda 5 veces, contando el número de caras.
  solucion_pasos:
  - X = número de caras obtenidas en los 5 lanzamientos. X puede tomar los valores 0, 1, 2, 3, 4 o 5.
- titulo: Definir X al revisar 12 artículos
  enunciado: Se revisan 12 artículos, contando cuántos son defectuosos.
  solucion_pasos:
  - X = número de artículos defectuosos entre los 12 revisados. X puede tomar valores entre 0 y 12.
- titulo: ¿X puede tomar el valor 0 (ningún éxito)?
  respuesta: Sí
  solucion_pasos:
  - Sí, es uno de los valores posibles, cuando no ocurre ningún éxito en los n ensayos.
- titulo: ¿X puede tomar un valor mayor que n?
  respuesta: 'No'
  solucion_pasos:
  - No, el número de éxitos nunca puede exceder el número total de ensayos realizados.
errores_frecuentes:
- Confundir la variable X (número total de éxitos) con el resultado de un solo ensayo individual.
- Pensar que X puede tomar valores negativos o mayores que n, lo cual no es posible.
- No definir explícitamente qué representa X en el contexto específico del problema.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
