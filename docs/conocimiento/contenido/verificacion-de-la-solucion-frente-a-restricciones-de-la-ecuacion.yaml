semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.VERIFICACION_RESTRICCIONES
titulo: Verificación de la solución frente a restricciones de la ecuación
objetivo: Comprobar formalmente que la solución final cumple con la ecuación original sin violar el dominio.
introduccion: No debes reemplazarla en tu ecuación 'aplanada', porque esa ecuación fue alterada por ti.
  Debes reemplazarla en la original para estar 100% seguro.
resumen: La solución obtenida debe contrastarse con las restricciones del dominio original; cualquier
  valor que anule un denominador se descarta.
explicacion: '### Definición formal


  Verificar una solución $x=k$ consiste en sustituirla en la ecuación fraccionaria original (no en la
  versión sin denominadores) y comprobar dos condiciones simultáneas: que ningún denominador se anule
  en $x=k$, y que ambos miembros de la igualdad resulten numéricamente iguales.


  ### Desarrollo didáctico


  No debes reemplazarla en tu ecuación ''aplanada'', porque esa ecuación fue alterada por ti. Debes reemplazarla
  en la original para estar 100% seguro.

  Si al reemplazar $x$, el lado izquierdo se equilibra perfectamente con el lado derecho, y ningún denominador
  se vuelve cero en el proceso, puedes confirmar la solución. Es correcta.'
procedimiento:
- Toma la solución final válida.
- Sustituye la 'x' por ese número en la ecuación fraccionaria original.
- Resuelve la aritmética en ambos lados.
- Verifica que ambos lados den el mismo número final.
