errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Toma la solución final válida».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Sustituye la ''x'' por ese número en
  la ecuación fraccionaria original».'
- La definición sigue cumpliéndose aunque no se considere que el hábito de los maestros es la verificación.
  Una vez que tienes una solución que sobrevivió a la criba de las restricciones, el último paso es reemplazarla
  físicamente en la ecuación original (la que tenía fracciones).
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Verifica que ambos lados den
  el mismo número final».
- La comprobación del resultado vuelve innecesaria la condición «Toma la solución final válida».
