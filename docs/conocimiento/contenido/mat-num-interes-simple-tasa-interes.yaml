semantic_id: MAT.NUM.INTERES_SIMPLE.TASA_INTERES
objetivo: Despejar la tasa de interés aplicada en una operación de interés simple.
introduccion: Prestas 100 y te devuelven 150 después de 2 años. ¡Genial! Pero, ¿qué
  porcentaje de ganancia tuviste exactamente por año? Para comparar negocios, necesitas
  encontrar la Tasa de Interés.
resumen: 'Si conoces el Capital Inicial ($C$), el Interés generado ($I$) y el Tiempo
  ($t$), puedes despejar la tasa: $i = I / (C \cdot t)$. El resultado será un decimal
  que multiplicas por 100 para pasarlo a porcentaje.'
explicacion: 'Para descubrir qué tasa de interés se aplicó a un préstamo o inversión,
  usamos la fórmula básica $I = C \cdot i \cdot t$ y despejamos la $i$:


  $$i = \frac{I}{C \cdot t}$$


  - **Ojo con los datos:** Necesitas el ''Interés puro ($I$)''. Si el problema te
  da el Monto Final Total ($M$), primero debes calcular el interés restando: $I =
  M - C$.

  - **El resultado es decimal:** Al hacer la división, obtendrás un número como $0.05$.
  Para responder como porcentaje, debes multiplicar por 100 ($5\%$).

  - **Unidad de tiempo:** La tasa obtenida tendrá la misma unidad que el tiempo $t$
  que usaste en la fórmula. Si $t$ estaba en meses, la tasa será mensual.'
procedimiento:
- 'Paso 1: Asegúrate de tener el valor de la ganancia pura ($I$). Si tienes el Monto
  Final, resta el capital inicial ($I = M - C$).'
- 'Paso 2: Divide $I$ por el producto de $(Capital \cdot tiempo)$.'
- 'Paso 3: Multiplica el decimal resultante por 100.'
ejemplos:
- titulo: Descubriendo la tasa del prestamista
  enunciado: Te prestaron $50.000 y tras 3 meses tuviste que devolver $56.000 en total
    (capital + intereses). ¿Qué tasa de interés simple mensual te cobraron?
  solucion_pasos:
  - 'Calculamos el interés puro: $56.000 - 50.000 = 6.000$.'
  - $i = I / (C \cdot t) = 6000 / (50000 \cdot 3)$.
  - $i = 6000 / 150000 = 0.04$.
  - 'En porcentaje: $0.04 \cdot 100 = 4\%$ mensual.'
errores_frecuentes:
- Usar el Monto Final ($M$) en lugar del Interés ($I$) en el numerador.
- Olvidar multiplicar por 100 al final y decir que la tasa es del $0.05\%$ (cuando
  en realidad era $5\%$).
fuente: Currículum Nacional MINEDUC.
estado: publicado
