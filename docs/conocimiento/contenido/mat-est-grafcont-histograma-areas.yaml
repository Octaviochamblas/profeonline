semantic_id: MAT.EST.GRAFICOS_CONTINUOS.HISTOGRAMA_AREAS
titulo: Interpretar el área de las barras en un histograma
objetivo: Interpretar el área de cada barra de un histograma como representación de la frecuencia del
  intervalo correspondiente, especialmente cuando las amplitudes no son iguales.
introduccion: Cuando todos los intervalos tienen la misma amplitud, la altura basta para comparar frecuencias;
  pero si las amplitudes difieren, es el área la que representa correctamente la frecuencia.
resumen: En un histograma con amplitudes distintas, el área de cada barra (no solo su altura) es la que
  representa proporcionalmente la frecuencia del intervalo correspondiente.
explicacion: '![Interpretación del área en un histograma](/static/img/estadistica/grafcont/grafcont-histograma-areas.svg)


  ### Definición formal


  El área de una barra es proporcional a la frecuencia del intervalo: $\text{área}=\text{altura}\times\text{amplitud}\propto
  f_i$. Si las amplitudes son iguales, comparar alturas basta; si no, se debe comparar el área.


  ### Desarrollo didáctico


  Si un intervalo de amplitud 20 tiene la misma altura que uno de amplitud 10, en realidad el primero
  representa el doble de datos (mayor área), aunque visualmente parezcan iguales en altura.'
procedimiento:
- 'Paso 1: Verifica si todos los intervalos del histograma tienen la misma amplitud.'
- 'Paso 2: Si las amplitudes son iguales, la altura de la barra basta para comparar frecuencias directamente.'
- 'Paso 3: Si las amplitudes son distintas, calcula el área (altura×amplitud) para comparar correctamente
  las frecuencias.'
ejemplos:
- titulo: Comparar dos barras de igual amplitud
  enunciado: 'Intervalo A: amplitud 10, altura 5. Intervalo B: amplitud 10, altura 8.'
  solucion_pasos:
  - 'Como las amplitudes son iguales, basta comparar alturas: B (8) tiene mayor frecuencia que A (5).'
- titulo: Comparar dos barras de distinta amplitud
  enunciado: 'Intervalo A: amplitud 10, altura 6. Intervalo B: amplitud 20, altura 6.'
  solucion_pasos:
  - Aunque tienen la misma altura, el área de B (20×6=120) es el doble que la de A (10×6=60), por lo que
    B representa mayor frecuencia.
- titulo: ¿Cuando las amplitudes son iguales, basta comparar las alturas de las barras?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que el área es proporcional a la altura cuando la amplitud es constante.
- titulo: ¿El área de una barra siempre representa exactamente la frecuencia, sin importar la amplitud?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, es el principio general: el área (no solo la altura) es la que representa proporcionalmente la
    frecuencia.'
errores_frecuentes:
- Comparar únicamente las alturas de las barras cuando los intervalos tienen amplitudes distintas, ignorando
  el efecto del área.
- No calcular el producto altura×amplitud al comparar frecuencias entre intervalos de distinta amplitud.
- Asumir que un histograma siempre tiene intervalos de igual amplitud, sin verificarlo primero.
fuente: 'Elaboración propia (referencia: Moraleja 352, 125).'
estado: publicado
