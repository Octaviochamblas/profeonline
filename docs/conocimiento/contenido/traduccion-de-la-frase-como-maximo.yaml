semantic_id: MAT.ALG.LENGUAJE_RELACIONES.COMO_MAXIMO
titulo: Traducción de la frase como máximo
objetivo: Traducir el concepto de límite superior incluyente usando el símbolo menor o igual que.
introduccion: 'Si tu madre te dice: ''Puedes gastar como máximo 20 dólares'', ¿puedes gastar exactamente
  20? Sí. ¿Puedes gastar 19? Sí. ¿Puedes gastar 21? No. Este es un límite cerrado superior.'
resumen: La frase **'Como máximo'** se traduce utilizando el símbolo de desigualdad **menor o igual que
  ($\le$)**. Indica que la variable puede tomar cualquier valor por debajo del límite, o tocar el límite
  exactamente, pero nunca superarlo.
explicacion: '### Definición formal


  Si te digo ''como máximo 10'', puedes tener 9, 8. es decir, cantidades *menores* o iguales a 10. Por
  eso se usa $\le$.


  ### Desarrollo didáctico


  Palabras clave que se traducen como $\le$:

  - Como máximo

  - A lo más

  - No más de

  - Hasta

  - Tiene un tope de


  Ejemplos:

  - ''El peso soportado ($P$) es como máximo 500 kg'': $P \le 500$

  - ''Gastaré a lo más el doble de mi sueldo ($S$)'': $Gastos \le 2S$


  La diferencia crucial con el ''menor que'' estricto ($<$) es la pequeña línea horizontal debajo del
  símbolo, que significa ''o igual''.'
procedimiento:
- 'Paso 1: Identifica la variable que está siendo limitada (el sujeto de la oración).'
- 'Paso 2: Al leer ''como máximo'' o ''a lo más'', escribe el símbolo <= (menor o igual).'
- 'Paso 3: Escribe el valor del límite máximo a la derecha del símbolo.'
ejemplos:
- titulo: El tope de gastos
  enunciado: 'Traduce algebraicamente: ''El costo total de la obra no será de más de un millón''.'
  solucion_pasos:
  - 'Costo total de la obra: C.'
  - 'La frase ''no será de más de'' significa que puede ser menos o exactamente igual: <='
  - 'El límite es un millón: 1000000.'
  - 'Traducción: C <= 1000000.'
- titulo: Para un bono de productividad, el contrato exige que 'el número de productos defectuosos ($D
  enunciado: 'Para un bono de productividad, el contrato exige que ''el número de productos defectuosos
    ($D$) sea como máximo la cuarta parte de los productos perfectos ($P$)''. Un sindicato reclama que
    el bono debería darse con la condición $D < \frac{P}{4}$. ¿En qué perjudica matemáticamente la versión
    del sindicato al trabajador respecto al contrato original? (v1)


    Opciones: A) Le quita el bono en el caso frontera donde los defectuosos sean exactamente iguales a
    la cuarta parte de los perfectos, situación que el contrato original sí premiaba al incluir el ''o
    igual'' ($\le$). · B) Ningún perjuicio, ambas inecuaciones son idénticas en números enteros. · C)
    La versión del sindicato le exige al trabajador tener menos perfectos que defectuosos. · D) La versión
    del sindicato obliga a que los productos defectuosos sean negativos.'
  solucion_pasos:
  - El contrato original era $D \le P/4$. El sindicato propuso $D < P/4$. Al quitar la posibilidad de
    igualdad, se vuelve más estricto, perjudicando a los trabajadores que alcanzan justo el borde de la
    meta.
  - 'Respuesta: Le quita el bono en el caso frontera donde los defectuosos sean exactamente iguales a
    la cuarta parte de los perfectos, situación que el contrato original sí premiaba al incluir el ''o
    igual'' ($\le$).'
- titulo: 'Respecto de «Traducción de la frase como máximo»: ¿Se ajusta a la definición esta afirmación'
  enunciado: 'Respecto de «Traducción de la frase como máximo»: ¿Se ajusta a la definición esta afirmación?
    «La frase **''Como máximo''** se traduce utilizando el símbolo de desigualdad **menor o igual que
    ($\le$)**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La frase **''Como máximo''** se traduce utilizando
