- titulo: 'Respecto de «Traducción de la frase como máximo»: ¿Es compatible con el procedimiento esta
    a'
  enunciado: 'Respecto de «Traducción de la frase como máximo»: ¿Es compatible con el procedimiento esta
    afirmación? «Traducir ''como máximo'' usando el símbolo de mayor ($>$ o $\ge$) confundidos por la
    palabra ''máximo''. (Si el tope es el máximo, la variable tiene que ser *menor* que el tope)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La frase **''Como máximo''** se traduce utilizando
    el símbolo de desigualdad **menor o igual que ($\le$)**.'
errores_frecuentes:
- Traducir 'como máximo' usando el símbolo de mayor ($>$ o $\ge$) confundidos por la palabra 'máximo'.
  (Si el tope es el máximo, la variable tiene que ser *menor* que el tope).
- Usar el símbolo estricto de menor ($<$) perdiendo la posibilidad de igualdad.
- Porque el símbolo $\ge$ solo se usa para ecuaciones de segundo grado.
- Porque 'como máximo' solo permite valores estrictamente menores ($<$), sin incluir el límite.
- Porque 'como máximo' significa que la variable debe multiplicarse por el valor máximo posible.
