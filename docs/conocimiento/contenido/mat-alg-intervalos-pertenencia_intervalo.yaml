semantic_id: MAT.ALG.INTERVALOS.PERTENENCIA_INTERVALO
titulo: Pertenencia de un número a un intervalo
objetivo: Determinar algebraicamente y visualmente si un número real específico pertenece
  o no a un intervalo dado.
introduccion: Evaluar si un valor específico es parte de un conjunto definido por
  un intervalo es una tarea básica en la resolución de inecuaciones y el análisis
  de dominios.
resumen: Un número pertenece a un intervalo si cumple las desigualdades que lo definen.
  Es crucial prestar atención al tipo de corchete para saber si los extremos mismos
  pertenecen (corchete cerrado) o no pertenecen (corchete abierto) al intervalo.
explicacion: '### Definición formal

  Dado un número real $x_0$ y un intervalo $I \subseteq \mathbb{R}$, se dice que $x_0
  \in I$ si $x_0$ satisface las condiciones de acotación del intervalo. Por ejemplo,
  si $I = [a, b[$, entonces $x_0 \in I$ si y solo si $a \leq x_0 < b$. Si esta condición
  no se cumple, entonces $x_0 \notin I$.


  ### Desarrollo didáctico

  Para saber si un número ''vive'' dentro de un intervalo, debemos revisar las reglas
  de entrada de ese intervalo. Si pensamos en el intervalo como un rango de edades
  para entrar a un evento, los corchetes hacia adentro significan que esa edad exacta
  puede entrar, mientras que los corchetes hacia afuera indican que esa edad se queda
  fuera. Solo debemos tomar el número en cuestión y comprobar si su valor numérico
  cae en el segmento delimitado.'
procedimiento:
- Identificar el intervalo dado y sus límites numéricos.
- Traducir el intervalo a su forma de desigualdad para mayor claridad.
- Sustituir el número a evaluar en la variable de la desigualdad.
- Verificar si la proposición matemática resultante es verdadera o falsa.
- Concluir que el número pertenece al intervalo si la proposición es verdadera, o
  no pertenece si es falsa.
ejemplos:
- titulo: Verificación de un número fraccionario en un intervalo cerrado
  enunciado: Determina si el número $x = 2.5$ pertenece al intervalo $[-1, 3]$.
  solucion_pasos:
  - El intervalo $[-1, 3]$ comprende todos los números reales $x$ tales que $-1 \leq
    x \leq 3$.
  - 'Evaluamos el número dado: verificamos si $-1 \leq 2.5 \leq 3$.'
  - Como $2.5$ es mayor que $-1$ y menor que $3$, la proposición es verdadera.
  - Por lo tanto, $2.5$ pertenece al intervalo $[-1, 3]$.
- titulo: Análisis de pertenencia de un extremo excluido
  enunciado: Comprueba si el número $4$ forma parte del intervalo $]4, 10]$.
  solucion_pasos:
  - El intervalo $]4, 10]$ equivale a la desigualdad $4 < x \leq 10$.
  - Sustituimos $x = 4$ y analizamos la proposición $4 < 4 \leq 10$.
  - La primera parte de la desigualdad es $4 < 4$, lo cual es una afirmación falsa.
  - En consecuencia, el número $4$ no pertenece al intervalo $]4, 10]$.
- titulo: ¿El número cero pertenece al intervalo $]-\infty, 0[$?
  respuesta: 'No'
  solucion_pasos:
  - El intervalo $]-\infty, 0[$ representa todos los números estrictamente menores
    que cero ($x < 0$).
  - Puesto que $0$ no es estrictamente menor que $0$, no satisface la desigualdad.
  - El cero no forma parte de este intervalo.
- titulo: ¿Pertenece el número $-5$ al intervalo $[-5, \infty[$?
  respuesta: Sí
  solucion_pasos:
  - El intervalo está cerrado por la izquierda en $-5$, indicado por el corchete $[$,
    lo que significa $x \geq -5$.
  - Dado que $-5$ es igual a $-5$, cumple la condición de la desigualdad.
  - El número $-5$ sí está incluido en el conjunto.
errores_frecuentes:
- Creer que un número ligeramente inferior a un extremo excluido superior no pertenece
  al intervalo (por ejemplo, pensar que $4.9$ no pertenece a $[0, 5[$).
- Considerar que un extremo excluido pertenece al intervalo porque aparece explícitamente
  en su notación.
- Asumir erróneamente que los números enteros son los únicos elementos de un intervalo.
- Confundir infinito positivo con infinito negativo al evaluar intervalos no acotados.
- Afirmar que un número pertenece al intervalo si solo cumple con uno de los límites,
  sin satisfacer ambas condiciones simultáneamente.
