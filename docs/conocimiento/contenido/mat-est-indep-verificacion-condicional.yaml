semantic_id: MAT.EST.INDEPENDENCIA_CONDICIONAL.VERIFICACION_CONDICIONAL
titulo: Verificación de independencia comparando P(A|B) con P(A)
objetivo: Verificar si dos eventos son independientes, calculando y comparando explícitamente P(A|B) con
  P(A).
introduccion: El método más directo para comprobar independencia es calcular ambos valores por separado
  y compararlos numéricamente.
resumen: 'Para verificar independencia, se calcula $P(A)$ sin condición y $P(A|B)$ con la condición, y
  se comparan: si son iguales, los eventos son independientes.'
explicacion: '![Verificación de independencia mediante P(A|B)](/static/img/probabilidad/independencia/indep-verificacion-condicional.svg)


  ### Definición formal


  Se calcula $P(A)=\dfrac{n(A)}{n(S)}$ y $P(A|B)=\dfrac{n(A\cap B)}{n(B)}$; si ambos valores coinciden,
  $A$ y $B$ son independientes.


  ### Desarrollo didáctico


  En una urna con 10 bolitas (5 rojas, 5 azules) donde además 5 tienen número par (2 rojas pares, 3 azules
  pares): P(par)=5/10=0,5. Si P(par|roja)=2/5=0,4≠0,5, entonces el color y la paridad son dependientes.'
procedimiento:
- 'Paso 1: Calcula P(A) usando el espacio muestral completo.'
- 'Paso 2: Calcula P(A|B) usando el espacio muestral restringido a B.'
- 'Paso 3: Compara ambos resultados: si son iguales, hay independencia; si son distintos, hay dependencia.'
ejemplos:
- titulo: Verificar independencia con datos numéricos
  enunciado: P(par)=0,5, P(par|roja)=0,4.
  solucion_pasos:
  - Como 0,5≠0,4, los eventos 'ser par' y 'ser roja' son dependientes.
- titulo: Verificar independencia entre dado y moneda
  enunciado: P(número par en el dado)=0,5, P(número par en el dado|cara en la moneda)=0,5.
  solucion_pasos:
  - Como ambos valores son iguales, son eventos independientes.
- titulo: ¿Se necesita calcular ambos valores (P(A) y P(A|B)) para verificar independencia con este método?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el procedimiento directo de comparación.
- titulo: ¿Una pequeña diferencia entre P(A) y P(A|B) siempre indica dependencia real?
  respuesta: Sí
  solucion_pasos:
  - Sí, matemáticamente cualquier diferencia (por pequeña que sea) indica dependencia; en la práctica
    estadística se pueden usar pruebas adicionales para diferencias muy pequeñas atribuibles al azar muestral.
errores_frecuentes:
- Calcular solo uno de los dos valores (P(A) o P(A|B)) sin comparar ambos.
- Cometer errores aritméticos en alguno de los dos cálculos, llevando a una conclusión errónea.
- Concluir independencia basándose en una aproximación poco precisa entre ambos valores.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
