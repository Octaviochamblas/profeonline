semantic_id: MAT.GEO.ALTURA_ORTOCENTRO.ORTOCENTRO_OBTUSANGULO
titulo: Ubicación exterior del ortocentro en un triángulo obtusángulo
objetivo: Reconocer que el ortocentro de un triángulo obtusángulo se ubica fuera de la figura.
introduccion: Cuando uno de los ángulos del triángulo supera los 90°, dos de las alturas caen sobre la
  prolongación de sus lados opuestos, y su intersección queda fuera del triángulo.
resumen: En todo triángulo obtusángulo, el ortocentro se ubica en el exterior del triángulo.
explicacion: '![Ortocentro exterior en triángulo obtusángulo](/static/img/geometria/elementos-secundarios/altura-ortocentro-ortocentro-obtusangulo.svg)


  ### Definición formal


  Si un triángulo tiene un ángulo interior mayor que 90°, el ortocentro H se ubica fuera de la región
  triangular, del lado opuesto al ángulo obtuso.


  ### Desarrollo didáctico


  En un triángulo obtusángulo, dos de las tres alturas tienen su pie fuera del lado correspondiente (sobre
  la prolongación), por lo que su punto de intersección también cae fuera de la figura.'
procedimiento:
- 'Paso 1: Identifica si el triángulo tiene un ángulo mayor que 90°.'
- 'Paso 2: Si lo tiene, reconoce que dos alturas caerán sobre prolongaciones de los lados.'
- 'Paso 3: Concluye que el ortocentro se ubica fuera del triángulo.'
ejemplos:
- titulo: Ubicar el ortocentro en un obtusángulo
  enunciado: Un triángulo tiene ángulos 110°, 40° y 30°.
  solucion_pasos:
  - Es obtusángulo, así que su ortocentro está fuera de la figura.
- titulo: Contraste con el acutángulo
  enunciado: Compara la ubicación del ortocentro entre un triángulo acutángulo y uno obtusángulo.
  solucion_pasos:
  - En el acutángulo el ortocentro está dentro; en el obtusángulo, fuera.
- titulo: ¿El ortocentro de un triángulo obtusángulo está dentro de la figura?
  respuesta: 'No'
  solucion_pasos:
  - No, se ubica fuera del triángulo.
- titulo: ¿Basta con un ángulo obtuso para que el ortocentro quede afuera?
  respuesta: Sí
  solucion_pasos:
  - Sí, con que exista un solo ángulo mayor que 90° ya se cumple esta propiedad.
errores_frecuentes:
- Creer que el ortocentro está siempre dentro del triángulo, sin importar su forma.
- No verificar si el triángulo tiene realmente un ángulo obtuso antes de ubicar el ortocentro.
- Confundir la ubicación exterior del ortocentro con la del circuncentro.
fuente: Elaboración propia.
estado: publicado
