semantic_id: MAT.GEO.ROTACION_PLANO.REGLA_270_ORIGEN
titulo: Regla de rotación de 270° en torno al origen
objetivo: Aplicar la regla específica para rotar un punto 270° en sentido antihorario alrededor del origen
  del sistema cartesiano.
introduccion: 'Rotar un punto 270° en sentido antihorario equivale a rotarlo 90° en sentido horario: ambas
  describen exactamente el mismo movimiento final.'
resumen: La rotación de 270° en sentido antihorario en torno al origen transforma cada punto $P(x,y)$
  en $P'(y,\,-x)$.
explicacion: '![Regla de rotación de 270° en torno al origen](/static/img/geometria/isometrias/rotacion-regla-270-origen.svg)


  ### Definición formal


  La rotación de $270°$ (antihoraria) en torno al origen transforma $P(x,y)$ en $P''(y,-x)$. Esta regla
  coincide con la rotación de $90°$ en sentido horario, ya que $270°$ antihorario y $90°$ horario ($-90°$)
  llevan al mismo punto final.


  ### Desarrollo didáctico


  En la figura, el punto $P(3,2)$ rotado 270° antihorario alrededor del origen se transforma en $P''(2,-3)$:
  se aplica la regla $(x,y)\to(y,-x)$.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del punto P(x,y) que se desea rotar 270° antihorario alrededor del
  origen.'
- 'Paso 2: Calcula la nueva abscisa como la ordenada original: y.'
- 'Paso 3: Calcula la nueva ordenada como el opuesto de la abscisa original: -x, obteniendo P''(y,-x).'
ejemplos:
- titulo: Aplicar la regla de rotación de 270° a un punto
  enunciado: El punto P(3,2) rota 270° antihorario alrededor del origen.
  solucion_pasos:
  - P'=(2,-3), aplicando la regla (x,y)→(y,-x).
- titulo: Verificar la equivalencia con rotación horaria de 90°
  enunciado: Se compara esta rotación con una rotación de -90° (90° horario).
  solucion_pasos:
  - 'Ambas dan exactamente el mismo resultado: (x,y)→(y,-x).'
- titulo: ¿270° antihorario equivale a 90° horario?
  respuesta: Sí
  solucion_pasos:
  - Sí, 360°-270°=90°, por lo que ambos ángulos representan el mismo giro final desde direcciones opuestas.
- titulo: ¿Esta regla es la inversa de la regla de 90° antihorario?
  respuesta: Sí
  solucion_pasos:
  - Sí, aplicar la regla de 90° tres veces seguidas equivale a aplicar la regla de 270° una sola vez.
errores_frecuentes:
- Confundir esta regla con la de 90° antihorario (que usa (-y,x) en vez de (y,-x)).
- 'Invertir el orden al aplicar la regla: usar (-y,x) por error.'
- No reconocer la equivalencia entre 270° antihorario y 90° horario.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 128, Cid 77).'
estado: publicado
