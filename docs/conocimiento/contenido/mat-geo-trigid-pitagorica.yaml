semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.IDENTIDAD_PITAGORICA
titulo: Aplicación de la identidad pitagórica sen²(x) + cos²(x) = 1
objetivo: Aplicar la identidad pitagórica sen²(x)+cos²(x)=1 para cualquier ángulo x, extendiendo su validez
  más allá de los ángulos agudos de un triángulo rectángulo.
introduccion: 'En la circunferencia unitaria (radio 1), cada punto sobre ella tiene coordenadas (cosx,
  sinx), por lo que la identidad pitagórica es simplemente la ecuación de esa circunferencia: x²+y²=1.'
resumen: Para cualquier ángulo x, se cumple la identidad $\sin^2x+\cos^2x=1$, sin importar en qué cuadrante
  se ubique x.
explicacion: '![Identidad pitagórica en la circunferencia unitaria](/static/img/geometria/trigonometria/trigid-pitagorica.svg)


  ### Definición formal


  Si $P=(\cos x,\sin x)$ es un punto sobre la circunferencia de radio 1 centrada en el origen, entonces
  por definición de esa circunferencia se cumple $\cos^2x+\sin^2x=1$, para cualquier valor de $x$.


  ### Desarrollo didáctico


  A diferencia de la identidad vista en triángulos rectángulos (válida solo para ángulos agudos), esta
  versión es válida para cualquier ángulo, incluyendo los mayores a 90° y los negativos, porque se basa
  en la definición de seno y coseno mediante la circunferencia unitaria, no en un triángulo específico.'
procedimiento:
- 'Paso 1: Recuerda que esta identidad es válida para cualquier ángulo x, sin restricción de cuadrante.'
- 'Paso 2: Si conoces sinx (o cosx), despeja el otro término usando cos²x=1-sin²x (o viceversa).'
- 'Paso 3: Determina el signo correcto de la raíz cuadrada según el cuadrante en que se ubique x.'
ejemplos:
- titulo: Calcular cosx conociendo sinx en el segundo cuadrante
  enunciado: sinx=0,6, con x en el segundo cuadrante.
  solucion_pasos:
  - 'cos²x=1-0,36=0,64 → cosx=±0,8. Como x está en el segundo cuadrante, el coseno es negativo: cosx=-0,8.'
- titulo: Verificar la identidad para un ángulo del tercer cuadrante
  enunciado: x=210°, sinx=-0,5, cosx=-√3/2.
  solucion_pasos:
  - sin²x+cos²x=0,25+0,75=1, confirmando la identidad.
- titulo: ¿Esta identidad es válida para ángulos mayores a 90°?
  respuesta: Sí
  solucion_pasos:
  - Sí, es válida para cualquier ángulo, ya que se basa en la circunferencia unitaria.
- titulo: ¿El signo de la raíz al despejar depende del cuadrante?
  respuesta: Sí
  solucion_pasos:
  - Sí, es necesario conocer el cuadrante para elegir el signo correcto del término despejado.
errores_frecuentes:
- Aplicar esta identidad solo a ángulos agudos, olvidando que es válida para cualquier ángulo.
- Olvidar determinar el signo correcto al despejar la raíz cuadrada según el cuadrante.
- Confundir esta identidad con una relación entre catetos e hipotenusa, sin reconocer su origen en la
  circunferencia unitaria.
fuente: 'Elaboración propia (referencia: Moraleja 178).'
estado: publicado
