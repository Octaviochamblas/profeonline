semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.EXPONENTE_ENTERO_NEGATIVO
objetivo: Transformar y calcular potencias de exponente negativo.
introduccion: El signo del exponente describe una inversión, no el signo del resultado.
  Leerlo así conecta las potencias negativas con los recíprocos.
resumen: Para \(a\neq0\), \(a^{-n}=1/a^n\). Un exponente negativo produce el recíproco;
  no vuelve negativo el valor por sí mismo.
explicacion: |-
  Para \(a\neq0\), \(a^{-n}=1/a^n\).

  Al analizar “\(2^{-3}=1/2^3=1/8\)” conviene observar la conexión siguiente: un exponente negativo produce el recíproco; no vuelve negativo el valor por sí mismo
procedimiento:
- 'Paso 1: Comprueba que la base sea distinta de cero.'
- 'Paso 2: Invierte la base y cambia el exponente a su opuesto positivo.'
- 'Paso 3: Calcula la potencia positiva y verifica multiplicando por la potencia opuesta.'
ejemplos:
- titulo: Aplicación razonada — Potencia con exponente entero negativo
  enunciado: \(2^{-3}=1/2^3=1/8\).
  solucion_pasos:
  - Comprueba que la base sea distinta de cero.
  - Invierte la base y cambia el exponente a su opuesto positivo.
  - Calcula la potencia positiva y verifica multiplicando por la potencia opuesta.
- titulo: Revisión de una solución — Potencia con exponente entero negativo
  enunciado: Una solución aplica “Invierte la base y cambia el exponente a su opuesto
    positivo.”, pero termina sin comprobar que un exponente negativo produce el recíproco;
    no vuelve negativo el valor por sí mismo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define potencia con exponente entero negativo: para
    \(a\neq0\), \(a^{-n}=1/a^n\).'
  - Comprueba que la base sea distinta de cero.
  - 'Completa la revisión con este control: Calcula la potencia positiva y verifica
    multiplicando por la potencia opuesta.'
- titulo: ¿Se cumple que un exponente negativo produce el recíproco; no vuelve negativo
    el valor por sí mismo? — Potencia con exponente entero negativo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para \(a\neq0\), \(a^{-n}=1/a^n\).
  - El caso “\(2^{-3}=1/2^3=1/8\)” satisface esa condición.
  - Calcula la potencia positiva y verifica multiplicando por la potencia opuesta.
- titulo: ¿Es válido omitir el paso “Comprueba que la base sea distinta de cero”?
    — Potencia con exponente entero negativo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de potencia con exponente entero
    negativo.
  - 'Omitirlo puede volver inválida la acción siguiente: Invierte la base y cambia
    el exponente a su opuesto positivo.'
  - 'La solución debe terminar de este modo: Calcula la potencia positiva y verifica
    multiplicando por la potencia opuesta.'
errores_frecuentes:
- 'Confundir potencia con exponente entero negativo con otro concepto y omitir este
  inicio: Comprueba que la base sea distinta de cero.'
- Aplicar mecánicamente “Invierte la base y cambia el exponente a su opuesto positivo.”
  sin revisar las condiciones de la definición.
- Tomar “\(2^{-3}=1/2^3=1/8\)” como una igualdad aislada, sin explicar por qué es
  válida.
- Aceptar una respuesta que contradice la idea clave “un exponente negativo produce
  el recíproco; no vuelve negativo el valor por sí mismo”.
- 'Terminar el desarrollo sin realizar este control: Calcula la potencia positiva
  y verifica multiplicando por la potencia opuesta.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
