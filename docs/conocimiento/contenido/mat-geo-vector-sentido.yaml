semantic_id: MAT.GEO.VECTORES_BASE.SENTIDO
titulo: Concepto de sentido de un vector indicado por la flecha
objetivo: Reconocer el sentido de un vector como la orientación indicada por la punta de la flecha, dentro
  de una dirección dada.
introduccion: El sentido de un vector responde a la pregunta '¿hacia cuál de los dos lados apunta la flecha?',
  dentro de una misma línea de dirección.
resumen: El sentido de un vector es la orientación específica indicada por la punta de la flecha, a lo
  largo de su línea de dirección; dos vectores con la misma dirección pueden tener sentido igual u opuesto.
explicacion: '![Sentido de un vector](/static/img/geometria/cartesiano-vectores/vector-sentido.svg)


  ### Definición formal


  Mientras la dirección de un vector describe la recta (o línea) sobre la que se ubica, el sentido indica
  hacia cuál de los dos lados posibles de esa recta apunta la flecha. Dos vectores paralelos (misma dirección)
  pueden tener el mismo sentido o sentido opuesto.


  ### Desarrollo didáctico


  En la figura, los vectores $\vec{v}$ y $-\vec{v}$ comparten exactamente la misma dirección (son paralelos),
  pero tienen sentido opuesto: uno apunta hacia arriba-derecha y el otro hacia abajo-izquierda.'
procedimiento:
- 'Paso 1: Identifica la dirección (línea) sobre la que se ubica el vector.'
- 'Paso 2: Observa hacia cuál de los dos lados de esa línea apunta la punta de la flecha.'
- 'Paso 3: Compara con otro vector de la misma dirección para determinar si tienen el mismo sentido o
  sentido opuesto.'
ejemplos:
- titulo: Comparar el sentido de dos vectores paralelos
  enunciado: Los vectores v y -v son paralelos entre sí.
  solucion_pasos:
  - 'Ambos comparten la misma dirección, pero tienen sentido opuesto: apuntan hacia lados contrarios.'
- titulo: Reconocer vectores con el mismo sentido
  enunciado: Dos vectores paralelos apuntan ambos hacia la derecha.
  solucion_pasos:
  - Esos vectores tienen el mismo sentido, además de la misma dirección.
- titulo: ¿Dos vectores con la misma dirección siempre tienen el mismo sentido?
  respuesta: 'No'
  solucion_pasos:
  - No, pueden tener el mismo sentido o sentido opuesto, dependiendo de hacia dónde apunte cada uno.
- titulo: ¿El sentido se representa mediante la punta de la flecha?
  respuesta: Sí
  solucion_pasos:
  - Sí, la punta de la flecha es precisamente la que indica el sentido del vector.
errores_frecuentes:
- Confundir el sentido con la dirección, tratándolos como si fueran el mismo concepto.
- Creer que dos vectores paralelos siempre tienen el mismo sentido.
- No fijarse en la punta de la flecha para determinar el sentido correcto.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 122).'
estado: publicado
