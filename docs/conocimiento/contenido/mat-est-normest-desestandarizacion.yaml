semantic_id: MAT.EST.NORMAL_ESTANDAR.DESESTANDARIZACION
titulo: Obtener un valor original a partir de un puntaje Z
objetivo: Obtener el valor original de una variable a partir de su puntaje Z, la media y la desviación estándar de la
  distribución.
introduccion: Si ya sabes cuántas desviaciones estándar se aleja un dato de la media (su puntaje Z), puedes
  "devolverte" y calcular el valor real que tenía ese dato.
resumen: La desestandarización permite obtener el valor original $x$ a partir del puntaje $Z$, despejando la fórmula
  de estandarización como $x=\mu+Z\cdot\sigma$.
explicacion: '![Desestandarización](/static/img/estadistica/normest/normest-desestandarizacion.svg)


  ### Definición formal


  A partir de $Z=\dfrac{x-\mu}{\sigma}$, se despeja $x$ para obtener $x=\mu+Z\cdot\sigma$, recuperando el valor

  original de la variable.


  ### Desarrollo didáctico


  Este proceso es el inverso de la estandarización: en vez de partir de un dato para obtener su puntaje $Z$, se parte

  del puntaje $Z$ para reconstruir el dato original.'
procedimiento:
- 'Paso 1: Identifica el puntaje $Z$, la media $\mu$ y la desviación estándar $\sigma$.'
- 'Paso 2: Multiplica $Z$ por $\sigma$.'
- 'Paso 3: Suma ese resultado a $\mu$ para obtener el valor original $x$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $Z=1{,}5$, $\mu=500$ y $\sigma=100$, calcula el valor original $x$.
  solucion_pasos:
  - $x=500+1{,}5\times 100$.
  - $x=500+150=650$.
- titulo: Ejemplo 2
  enunciado: Si $Z=-1$, $\mu=50$ y $\sigma=2$, calcula el valor original $x$.
  solucion_pasos:
  - $x=50+(-1)\times 2$.
  - $x=50-2=48$.
- titulo: ¿La fórmula de desestandarización es $x=\mu+Z\cdot\sigma$?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el despeje directo de la fórmula de estandarización.
- titulo: ¿Se puede obtener el valor original sin conocer la media y la desviación estándar?
  respuesta: 'No'
  solucion_pasos:
  - 'No, ambos valores son indispensables para reconstruir el dato original.'
errores_frecuentes:
- Restar en vez de sumar al despejar $x=\mu+Z\cdot\sigma$.
- Olvidar multiplicar $Z$ por $\sigma$ antes de sumar $\mu$.
- Confundir la media y desviación estándar de la distribución original con las de la normal estándar.
- Aplicar mal el signo de $Z$ al momento de calcular $x$.
- Confundir esta fórmula con la de estandarización directa.
fuente: 'Elaboración propia.'
estado: publicado
