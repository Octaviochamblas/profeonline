semantic_id: MAT.ALG.POLINOMIOS.IGUALDAD_COEFICIENTES
objetivo: Aplicar el principio de igualdad de coeficientes para resolver problemas
  de identidades algebraicas.
introduccion: El principio que usamos para encontrar a los gemelos idénticos tiene
  un nombre formal y un campo de aplicación inmenso en las ciencias exactas. Se llama
  el Principio de Igualdad de Coeficientes.
resumen: El **Principio de Igualdad de Coeficientes** dicta que en una identidad polinomial
  (donde dos expresiones son siempre iguales sin importar el valor de las variables),
  **los coeficientes de los términos del mismo grado deben ser estrictamente iguales**
  entre ambos lados de la igualdad.
explicacion: 'Este principio te da una ''llave maestra'' para romper problemas que
  parecen imposibles.

  Imagina este problema de física, donde te dicen que una trayectoria $Ax^2 + Bx$
  siempre equivale, a todo momento, a $4x^2 - 7x$.

  Sin el principio, te quedarías atascado intentando darle valores a $x$.

  Con el principio, sabes de inmediato y por ley matemática que:

  $A = 4$

  $B = -7$

  Has descompuesto un problema enorme con infinitas $x$ posibles, en dos pequeñas
  certezas absolutas e independientes.'
procedimiento:
- 'Paso 1: Organiza el polinomio de la izquierda agrupando los términos según el grado
  de su variable.'
- 'Paso 2: Organiza el de la derecha exactamente igual.'
- 'Paso 3: Si en un lado falta un término (por ejemplo, no hay x), asume que su coeficiente
  es cero (+ 0x).'
- 'Paso 4: Crea una lista de mini-ecuaciones igualando el coeficiente izquierdo con
  el derecho para cada grado.'
- 'Paso 5: Resuelve el sistema.'
ejemplos:
- titulo: Rellenando los huecos
  enunciado: Si mx^2 + n = 5x^2 - 4x + 8, halla m y n.
  solucion_pasos:
  - 'Lado izquierdo falta la x. Lo reescribimos como: mx^2 + 0x + n'
  - 'Igualamos cuadráticos: m = 5'
  - 'Igualamos lineales: 0 = -4 (¡Cuidado! Esto genera una contradicción, significa
    que esos polinomios NO pueden ser idénticos jamás en la vida real).'
  - 'Nota teórica: un buen problema siempre tiene congruencia.'
errores_frecuentes:
- Olvidar rellenar con coeficiente cero los términos faltantes antes de emparejar,
  lo que descalabra las ecuaciones.
- Igualar el coeficiente cuadrático de la izquierda con el término independiente de
  la derecha por no haber ordenado primero.
fuente: Álgebra de Baldor.
estado: publicado
