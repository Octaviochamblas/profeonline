semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.FORMA_GENERAL_SENO
titulo: Forma general de la función seno transformada
objetivo: Identificar los parámetros $a$, $b$, $c$ y $d$ en la forma general $f(x)=a\sin(b(x-c))+d$.
introduccion: La función seno básica puede modificarse con cuatro parámetros que controlan su altura, rapidez de
  oscilación, posición horizontal y posición vertical.
resumen: La forma general de la función seno transformada es $f(x)=a\sin(b(x-c))+d$, donde $a$ controla la
  amplitud, $b$ el periodo, $c$ el desplazamiento horizontal y $d$ el desplazamiento vertical.
explicacion: '### Definición formal


  En $f(x)=a\sin(b(x-c))+d$: $|a|$ es la amplitud, $2\pi/|b|$ es el periodo, $c$ es el desplazamiento
  horizontal (fase), y $d$ es el desplazamiento vertical (línea media). Cada parámetro modifica un aspecto
  distinto de la gráfica básica.


  ### Desarrollo didáctico


  En $f(x)=3\sin(2(x-\pi))+1$: $a=3$ (amplitud), $b=2$ (afecta el periodo), $c=\pi$ (desplazamiento horizontal),
  $d=1$ (desplazamiento vertical, línea media en $y=1$).'
procedimiento:
- 'Paso 1: Reescribe la función en la forma estándar $a\sin(b(x-c))+d$ si no está en ese formato.'
- 'Paso 2: Identifica cada uno de los cuatro parámetros.'
- 'Paso 3: Relaciona cada parámetro con su efecto correspondiente en la gráfica.'
ejemplos:
- titulo: Identificación de los cuatro parámetros
  enunciado: 'Identifica $a$, $b$, $c$ y $d$ en $f(x)=4\sin(3(x-2))-5$.'
  solucion_pasos:
  - Se compara con la forma general.
  - '$a=4$, $b=3$, $c=2$, $d=-5$.'
- titulo: Reescritura a la forma estándar
  enunciado: 'Reescribe $f(x)=2\sin(3x-6)$ en la forma $a\sin(b(x-c))+d$.'
  solucion_pasos:
  - Se factoriza $3x-6=3(x-2)$.
  - 'Se obtiene $f(x)=2\sin(3(x-2))$, con $a=2$, $b=3$, $c=2$, $d=0$.'
- titulo: ¿El parámetro $a$ afecta el periodo de la función?
  enunciado: ¿El parámetro $a$ en la forma general afecta el periodo de la función seno transformada?
  respuesta: 'No'
  solucion_pasos:
  - El parámetro $a$ solo afecta la amplitud; el periodo depende de $b$.
- titulo: ¿El parámetro $d$ afecta la amplitud de la función?
  enunciado: ¿El parámetro $d$ afecta la amplitud de la función seno transformada?
  respuesta: 'No'
  solucion_pasos:
  - El parámetro $d$ solo desplaza verticalmente la curva, sin cambiar su amplitud.
errores_frecuentes:
- Confundir el rol de cada parámetro entre sí (por ejemplo, confundir $b$ con $c$).
- No factorizar correctamente para identificar $c$ cuando la expresión no está en forma factorizada.
- Suponer que el parámetro $c$ va sumado en vez de restado dentro del paréntesis.
- Olvidar identificar alguno de los cuatro parámetros al analizar la función.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
