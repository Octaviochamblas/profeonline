semantic_id: MAT.NUM.ERROR_NUMERICO.ERROR_ABSOLUTO
titulo: Error absoluto de una aproximación
objetivo: Calcular la diferencia entre el valor exacto y el valor aproximado de una cantidad.
introduccion: Toda aproximación introduce una diferencia respecto al valor exacto. Cuantificar esa diferencia
  con un número positivo es el primer paso para medir qué tan buena es una aproximación.
resumen: El error absoluto es el valor absoluto de la diferencia entre el valor exacto y el valor aproximado.
explicacion: '### Definición formal


  Si \(V\) es el valor exacto y \(A\) es el valor aproximado, el error absoluto es \(E_a=|V-A|\).


  ### Desarrollo didáctico


  Si el valor exacto es 10 y el aproximado es 9.7, el error absoluto es \(|10-9.7|=0.3\).'
procedimiento:
- 'Paso 1: Identifica cuál es el valor exacto y cuál el aproximado.'
- 'Paso 2: Resta ambos valores y toma el valor absoluto de la diferencia.'
- 'Paso 3: Expresa el error en la misma unidad de la magnitud medida.'
ejemplos:
- titulo: Aplicación razonada — Cálculo del error absoluto
  enunciado: Si el valor exacto es 10 y el aproximado es 9.7, el error absoluto es \(|10-9.7|=0.3\).
  solucion_pasos:
  - Identifica cuál es el valor exacto y cuál el aproximado.
  - Resta ambos valores y toma el valor absoluto de la diferencia.
  - Expresa el error en la misma unidad de la magnitud medida.
- titulo: Revisión de una solución — Cálculo del error absoluto
  enunciado: Una solución aplica “Resta ambos valores y toma el valor absoluto de la diferencia.”, pero
    termina sin comprobar que el error absoluto mide cuánto se aleja la aproximación del valor real. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define cálculo del error absoluto: el error absoluto es la diferencia en
    valor absoluto entre el valor exacto y el valor aproximado.'
  - Identifica cuál es el valor exacto y cuál el aproximado.
  - 'Completa la revisión con este control: Expresa el error en la misma unidad de la magnitud medida.'
- titulo: ¿Se cumple que el error absoluto mide cuánto se aleja la aproximación del valor real? — Cálculo
    del error absoluto
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el error absoluto es la diferencia en valor absoluto entre
    el valor exacto y el valor aproximado.
  - El caso “Si el valor exacto es 10 y el aproximado es 9.7, el error absoluto es \(|10-9.7|=0.3\)” satisface
    esa condición.
  - Expresa el error en la misma unidad de la magnitud medida.
- titulo: ¿Es válido omitir el paso “Identifica cuál es el valor exacto y cuál el aproximado”? — Cálculo
    del error absoluto
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de cálculo del error absoluto.
  - 'Omitirlo puede volver inválida la acción siguiente: Resta ambos valores y toma el valor absoluto
    de la diferencia.'
  - 'La solución debe terminar de este modo: Expresa el error en la misma unidad de la magnitud medida.'
errores_frecuentes:
- 'Empezar cálculo del error absoluto sin realizar este control inicial: Identifica cuál es el valor exacto
  y cuál el aproximado.'
- Memorizar “Si el valor exacto es 10 y el aproximado es 9.7, el error absoluto es \(|10-9.7|=0.3\)” como
  respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Resta ambos valores y toma el valor absoluto de la diferencia.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre cálculo del error absoluto que contradice el criterio “El error
  absoluto mide cuánto se aleja la aproximación del valor real”.
- 'Cerrar el ejercicio sin esta comprobación específica: Expresa el error en la misma unidad de la magnitud
  medida.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
