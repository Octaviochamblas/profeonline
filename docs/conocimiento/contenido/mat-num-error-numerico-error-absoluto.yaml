semantic_id: MAT.NUM.ERROR_NUMERICO.ERROR_ABSOLUTO
objetivo: Calcular el error absoluto de una aproximación.
introduccion: 'Observa este caso: Si el valor exacto es 10 y el aproximado es 9.7,
  el error absoluto es \(|10-9.7|=0.3\). Para explicar por qué funciona estudiaremos
  cálculo del error absoluto. Al finalizar podrás calcular el error absoluto de una
  aproximación.'
resumen: El error absoluto es la diferencia en valor absoluto entre el valor exacto
  y el valor aproximado. Como criterio de control, el error absoluto mide cuánto se
  aleja la aproximación del valor real
explicacion: |-
  El error absoluto es la diferencia en valor absoluto entre el valor exacto y el valor aproximado.

  El ejemplo “Si el valor exacto es 10 y el aproximado es 9.7, el error absoluto es \(|10-9.7|=0.3\)” lleva la definición a una situación concreta y permite verificar esta consecuencia: El error absoluto mide cuánto se aleja la aproximación del valor real.
procedimiento:
- 'Paso 1: Identifica cuál es el valor exacto y cuál el aproximado.'
- 'Paso 2: Resta ambos valores y toma el valor absoluto de la diferencia.'
- 'Paso 3: Expresa el error en la misma unidad de la magnitud medida.'
ejemplos:
- titulo: Aplicación razonada — Cálculo del error absoluto
  enunciado: Si el valor exacto es 10 y el aproximado es 9.7, el error absoluto es
    \(|10-9.7|=0.3\).
  solucion_pasos:
  - Identifica cuál es el valor exacto y cuál el aproximado.
  - Resta ambos valores y toma el valor absoluto de la diferencia.
  - Expresa el error en la misma unidad de la magnitud medida.
- titulo: Revisión de una solución — Cálculo del error absoluto
  enunciado: Una solución aplica “Resta ambos valores y toma el valor absoluto de
    la diferencia.”, pero termina sin comprobar que el error absoluto mide cuánto
    se aleja la aproximación del valor real. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define cálculo del error absoluto: el error absoluto
    es la diferencia en valor absoluto entre el valor exacto y el valor aproximado.'
  - Identifica cuál es el valor exacto y cuál el aproximado.
  - 'Completa la revisión con este control: Expresa el error en la misma unidad de
    la magnitud medida.'
- titulo: ¿Se cumple que el error absoluto mide cuánto se aleja la aproximación del
    valor real? — Cálculo del error absoluto
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el error absoluto es la diferencia
    en valor absoluto entre el valor exacto y el valor aproximado.
  - El caso “Si el valor exacto es 10 y el aproximado es 9.7, el error absoluto es
    \(|10-9.7|=0.3\)” satisface esa condición.
  - Expresa el error en la misma unidad de la magnitud medida.
- titulo: ¿Es válido omitir el paso “Identifica cuál es el valor exacto y cuál el
    aproximado”? — Cálculo del error absoluto
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de cálculo del error absoluto.
  - 'Omitirlo puede volver inválida la acción siguiente: Resta ambos valores y toma
    el valor absoluto de la diferencia.'
  - 'La solución debe terminar de este modo: Expresa el error en la misma unidad de
    la magnitud medida.'
errores_frecuentes:
- 'Empezar cálculo del error absoluto sin realizar este control inicial: Identifica
  cuál es el valor exacto y cuál el aproximado.'
- Memorizar “Si el valor exacto es 10 y el aproximado es 9.7, el error absoluto es
  \(|10-9.7|=0.3\)” como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Resta ambos valores y toma el valor absoluto de la
  diferencia.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre cálculo del error absoluto que contradice el
  criterio “El error absoluto mide cuánto se aleja la aproximación del valor real”.
- 'Cerrar el ejercicio sin esta comprobación específica: Expresa el error en la misma
  unidad de la magnitud medida.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
