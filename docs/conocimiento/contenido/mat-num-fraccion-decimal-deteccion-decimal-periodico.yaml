semantic_id: MAT.NUM.FRACCION_DECIMAL.DETECCION_DECIMAL_PERIODICO
objetivo: Comprender detección de decimal periódico desde la fracción irreductible
  y aplicarlo correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso detección de decimal periódico desde la fracción irreductible ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Una fracción irreductible produce decimal periódico cuando su denominador
  tiene factores primos distintos de 2 y 5. Además, la presencia de otros factores
  primos impide obtener un decimal finito.
explicacion: |-
  Una fracción irreductible produce decimal periódico cuando su denominador tiene factores primos distintos de 2 y 5.

  Una idea importante es que la presencia de otros factores primos impide obtener un decimal finito.

  Por ejemplo, \(\frac{1}{3}\) da decimal periódico porque 3 no divide ninguna potencia de 10.
procedimiento:
- 'Paso 1: Simplificar la fracción si es necesario para analizarla mejor.'
- 'Paso 2: Convertir mediante división o estudiar el denominador en forma irreductible.'
- 'Paso 3: Decidir si la expresión decimal es finita o periódica y justificarlo.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{1}{3}\) da decimal periódico porque
    3 no divide ninguna potencia de 10.” se relaciona con detección de decimal periódico
    desde la fracción irreductible.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: una fracción irreductible produce decimal periódico
    cuando su denominador tiene factores primos distintos de 2 y 5.'
  - Concluye que el ejemplo sí ilustra detección de decimal periódico desde la fracción
    irreductible.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “La presencia de otros factores primos impide
    obtener un decimal finito.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con detección de decimal periódico desde
    la fracción irreductible?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que la presencia de otros factores primos impide
    obtener un decimal finito.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar detección de decimal periódico desde la fracción irreductible
    ignorando la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar detección de decimal periódico desde la fracción irreductible sin
  mirar qué representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
