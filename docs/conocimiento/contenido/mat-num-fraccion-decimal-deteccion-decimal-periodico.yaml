semantic_id: MAT.NUM.FRACCION_DECIMAL.DETECCION_DECIMAL_PERIODICO
titulo: Detección anticipada de decimal periódico a partir de una fracción
objetivo: Predecir si una fracción producirá un decimal periódico sin necesidad de dividir, analizando
  el denominador.
introduccion: Cuando el denominador de una fracción irreductible tiene algún factor primo distinto de
  2 y 5, la división nunca "cierra" exactamente, y el resultado es un decimal periódico.
resumen: Una fracción irreductible \(\frac{a}{b}\) produce un decimal periódico si el denominador \(b\)
  tiene al menos un factor primo distinto de 2 y de 5.
explicacion: '### Definición formal


  Si \(b\) tiene un factor primo \(p\notin\{2,5\}\), no existe potencia de 10 divisible por \(b\), por
  lo que la división \(a\div b\) nunca termina y los restos comienzan a repetirse, generando un período.


  ### Desarrollo didáctico


  \(\frac{1}{3}\) da decimal periódico porque 3 no divide ninguna potencia de 10 (3 no es 2 ni 5); al
  dividir 1 entre 3 el resto se repite indefinidamente, dando \(0.\overline{3}\).'
procedimiento:
- 'Paso 1: Simplifica la fracción hasta hacerla irreductible.'
- 'Paso 2: Factoriza el denominador y busca algún primo distinto de \(2\) y \(5\).'
- 'Paso 3: Concluye que la expansión será periódica y comprueba el patrón por división.'
ejemplos:
- titulo: Aplicación razonada — Detección de decimal periódico desde la fracción irreductible
  enunciado: \(\frac{1}{3}\) da decimal periódico porque 3 no divide ninguna potencia de 10.
  solucion_pasos:
  - Simplifica la fracción hasta hacerla irreductible.
  - Factoriza el denominador y busca algún primo distinto de \(2\) y \(5\).
  - Concluye que la expansión será periódica y comprueba el patrón por división.
- titulo: Revisión de una solución — Detección de decimal periódico desde la fracción irreductible
  enunciado: Una solución aplica “Factoriza el denominador y busca algún primo distinto de \(2\) y \(5\).”,
    pero termina sin comprobar que la presencia de otros factores primos impide obtener un decimal finito.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define detección de decimal periódico desde la fracción irreductible: una
    fracción irreductible produce decimal periódico cuando su denominador tiene factores primos distintos
    de 2 y 5.'
  - Simplifica la fracción hasta hacerla irreductible.
  - 'Completa la revisión con este control: Concluye que la expansión será periódica y comprueba el patrón
    por división.'
- titulo: ¿Se cumple que la presencia de otros factores primos impide obtener un decimal finito? — Detección
    de decimal periódico desde la fracción irreductible
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una fracción irreductible produce decimal periódico cuando
    su denominador tiene factores primos distintos de 2 y 5.
  - El caso “\(\frac{1}{3}\) da decimal periódico porque 3 no divide ninguna potencia de 10” satisface
    esa condición.
  - Concluye que la expansión será periódica y comprueba el patrón por división.
- titulo: ¿Es válido omitir el paso “Simplifica la fracción hasta hacerla irreductible”? — Detección de
    decimal periódico desde la fracción irreductible
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de detección de decimal periódico desde la fracción
    irreductible.
  - 'Omitirlo puede volver inválida la acción siguiente: Factoriza el denominador y busca algún primo
    distinto de \(2\) y \(5\).'
  - 'La solución debe terminar de este modo: Concluye que la expansión será periódica y comprueba el patrón
    por división.'
errores_frecuentes:
- 'Empezar detección de decimal periódico desde la fracción irreductible sin realizar este control inicial:
  Simplifica la fracción hasta hacerla irreductible.'
- Memorizar “\(\frac{1}{3}\) da decimal periódico porque 3 no divide ninguna potencia de 10” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Factoriza el denominador y busca algún primo distinto de \(2\) y \(5\).”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre detección de decimal periódico desde la fracción irreductible que
  contradice el criterio “La presencia de otros factores primos impide obtener un decimal finito”.
- 'Cerrar el ejercicio sin esta comprobación específica: Concluye que la expansión será periódica y comprueba
  el patrón por división.'
