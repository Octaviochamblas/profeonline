semantic_id: MAT.ALG.CLASIFICACION_TECNICA.EXPRESION_ENTERA
objetivo: Reconocer expresiones algebraicas enteras por la ausencia de variables en
  sus denominadores.
introduccion: En el mundo de las expresiones algebraicas, no todo es lo que parece.
  A veces, ver una fracción no significa que la expresión esté 'rota'. Depende de
  quién esté en el sótano.
resumen: Una **Expresión Algebraica Entera** es aquella en la cual **no hay variables
  (letras) en ningún denominador** ni afectadas por exponentes negativos.
explicacion: 'Una expresión es ''entera'' respecto a las letras, no respecto a los
  números.

  - $5x^2 + 3x$ es entera.

  - $\frac{x}{2} + y$ es entera. ¡Sí, es entera! Aunque hay una fracción (división
  por 2), el número de abajo es una constante. La ''x'' está arriba, segura.

  - $\frac{5}{x} + 2$ NO es entera. Aquí la variable ''x'' bajó al denominador. Esto
  la convierte en una expresión fraccionaria.


  Recuerda la ley de exponentes: un exponente negativo equivale a estar en el denominador
  ($x^{-2} = \frac{1}{x^2}$). Por tanto, expresiones con exponentes literales negativos
  tampoco son enteras.'
procedimiento:
- 'Paso 1: Revisa visualmente todos los denominadores (la parte de abajo de cualquier
  fracción).'
- 'Paso 2: Revisa también si hay alguna letra con un exponente negativo.'
- 'Paso 3: Si no encuentras letras en denominadores ni con exponentes negativos, la
  expresión es Entera. (No importa si hay fracciones numéricas).'
ejemplos:
- titulo: Falsas alarmas
  enunciado: Determina si la expresión (x^2 + 5)/4 - y/3 es entera o no.
  solucion_pasos:
  - 'Revisamos los denominadores: hay un 4 y un 3.'
  - 'Revisamos los exponentes de las letras: x tiene 2 (positivo), y tiene 1 (positivo).'
  - Como no hay letras abajo ni exponentes negativos, la expresión es Entera.
errores_frecuentes:
- Creer que la presencia de cualquier línea fraccionaria (como en $\frac{x}{5}$) convierte
  automáticamente a la expresión en no-entera.
- Olvidar que $x^{-1}$ es matemáticamente igual a tener la $x$ en un denominador.
fuente: Álgebra de Baldor.
estado: publicado
