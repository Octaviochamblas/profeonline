semantic_id: MAT.ALG.CLASIFICACION_TECNICA.EXPRESION_ENTERA
objetivo: Reconocer expresiones algebraicas enteras por la ausencia de variables en sus denominadores.
introduccion: En el mundo de las expresiones algebraicas, no todo es lo que parece. A veces, ver una fracción no
  significa que la expresión esté 'rota'. Depende de quién esté en el sótano.
resumen: Una **Expresión Algebraica Entera** es aquella en la cual **no hay variables (letras) en ningún denominador**
  ni afectadas por exponentes negativos.
explicacion: '### Definición formal


  La clasificación de entera se enfoca exclusivamente en la posición de las variables. Fracciones numéricas (como
  $\frac{1}{2}$) son permitidas.


  ### Desarrollo didáctico


  Una expresión es ''entera'' respecto a las letras, no respecto a los números.

  - $5x^2 + 3x$ es entera.

  - $\frac{x}{2} + y$ es entera. Sí, es entera. Aunque hay una fracción (división por 2), el número de abajo es
  una constante. La ''x'' está arriba, segura.

  - $\frac{5}{x} + 2$ NO es entera. Aquí la variable ''x'' bajó al denominador. Esto la convierte en una expresión
  fraccionaria.


  Recuerda la ley de exponentes: un exponente negativo equivale a estar en el denominador ($x^{-2} = \frac{1}{x^2}$).
  Por tanto, expresiones con exponentes literales negativos tampoco son enteras.'
procedimiento:
- 'Paso 1: Revisa visualmente todos los denominadores (la parte de abajo de cualquier fracción).'
- 'Paso 2: Revisa también si hay alguna letra con un exponente negativo.'
- 'Paso 3: Si no encuentras letras en denominadores ni con exponentes negativos, la expresión es Entera. (No importa
  si hay fracciones numéricas).'
ejemplos:
- titulo: Falsas alarmas
  enunciado: Determina si la expresión (x^2 + 5)/4 - y/3 es entera o no.
  solucion_pasos:
  - 'Revisamos los denominadores: hay un 4 y un 3.'
  - 'Revisamos los exponentes de las letras: x tiene 2 (positivo), y tiene 1 (positivo).'
  - Como no hay letras abajo ni exponentes negativos, la expresión es Entera.
- titulo: Un programa de cálculo diferencial requiere que se ingresen exclusivamente 'Expresiones Alge
  enunciado: 'Un programa de cálculo diferencial requiere que se ingresen exclusivamente ''Expresiones Algebraicas
    Enteras'' para garantizar que el dominio sea todos los números reales (sin riesgo de división por cero). ¿Cuál
    de las siguientes fórmulas escritas por un usuario será aceptada por el programa? (v1)


    Opciones: A) $P(t) = \frac{t^3 - 5t}{100} + 4$ · B) $V(r) = \frac{100}{r^2}$ · C) $F(x) = 5x^2 + 3x^{-1}$ ·
    D) $G(y) = \frac{y+2}{y-2}$'
  solucion_pasos:
  - Solo la opción A tiene a la variable (t) libre de denominadores y de exponentes negativos. Las demás poseen
    riesgo de división por cero en sus variables.
  - 'Respuesta: $P(t) = \frac{t^3 - 5t}{100} + 4$'
- titulo: 'Respecto de «Identificación de expresión algebraica entera»: ¿Describe adecuadamente el conc'
  enunciado: 'Respecto de «Identificación de expresión algebraica entera»: ¿Describe adecuadamente el concepto esta
    frase? «Una **Expresión Algebraica Entera** es aquella en la cual **no hay variables (letras) en ningún denominador**
    ni afectadas por exponentes negativos»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una **Expresión Algebraica Entera** es aquella en la cual
    **no hay variables (letras) en ningún denominador** ni afectadas por exponentes negativos.'
- titulo: 'Respecto de «Identificación de expresión algebraica entera»: ¿Se puede aceptar esta afirmaci'
  enunciado: 'Respecto de «Identificación de expresión algebraica entera»: ¿Se puede aceptar esta afirmación? «Creer
    que la presencia de cualquier línea fraccionaria (como en $\frac{x}{5}$) convierte automáticamente a la expresión
    en no-entera»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una **Expresión Algebraica Entera** es aquella en la cual
    **no hay variables (letras) en ningún denominador** ni afectadas por exponentes negativos.'
errores_frecuentes:
- Creer que la presencia de cualquier línea fraccionaria (como en $\frac{x}{5}$) convierte automáticamente a la
  expresión en no-entera.
- Olvidar que $x^{-1}$ es matemáticamente igual a tener la $x$ en un denominador.
- Cuando no existe absolutamente ninguna fracción en toda la expresión, ni siquiera numérica.
- Cuando todos los exponentes de las variables son números pares.
- Cuando carece de raíces cuadradas numéricas.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Identificación de expresión algebraica entera
