semantic_id: MAT.ALG.FUNC_SENO_ANALISIS.SIMETRIA_IMPAR
titulo: Simetría impar de la función seno
objetivo: Verificar que $f(x)=\sin(x)$ es una función impar, cumpliendo $\sin(-x)=-\sin(x)$.
introduccion: 'La curva del seno tiene una simetría particular: lo que ocurre a la derecha del origen es el
  reflejo invertido de lo que ocurre a la izquierda.'
resumen: 'La función $f(x)=\sin(x)$ es **impar**: cumple $\sin(-x)=-\sin(x)$ para todo $x$, y su gráfica es
  simétrica respecto al origen.'
explicacion: '### Definición formal


  Para un ángulo $\theta$ y su opuesto $-\theta$, los puntos asociados en el círculo unitario son $(x,y)$ y
  $(x,-y)$: comparten la misma coordenada $x$ (mismo coseno) pero tienen coordenada $y$ opuesta (senos
  opuestos). Por lo tanto, $\sin(-\theta)=-\sin(\theta)$.


  ### Desarrollo didáctico


  $\sin(\pi/6)=1/2$ y $\sin(-\pi/6)=-1/2$: son valores opuestos. Geométricamente, el ángulo $-\pi/6$ es el
  reflejo de $\pi/6$ respecto al eje $x$, lo que invierte el signo de la coordenada $y$.'
procedimiento:
- 'Paso 1: Calcula $\sin(-x)$ para un valor dado de $x$.'
- 'Paso 2: Compara el resultado con $-\sin(x)$.'
- 'Paso 3: Si coinciden, se confirma la simetría impar.'
ejemplos:
- titulo: Verificación numérica de la simetría impar
  enunciado: 'Verifica que $\sin(-\pi/3)=-\sin(\pi/3)$.'
  solucion_pasos:
  - 'Se calcula $\sin(\pi/3)=\sqrt{3}/2$ y $\sin(-\pi/3)=-\sqrt{3}/2$.'
  - Se confirma que son valores opuestos.
- titulo: Aplicación de la simetría para simplificar un cálculo
  enunciado: 'Si $\sin(2)\approx0{,}909$, calcula $\sin(-2)$ sin evaluar directamente.'
  solucion_pasos:
  - Se aplica la propiedad de simetría impar.
  - '$\sin(-2)=-\sin(2)\approx-0{,}909$.'
- titulo: ¿La gráfica de la función seno es simétrica respecto al eje $y$?
  enunciado: ¿La gráfica de $f(x)=\sin(x)$ es simétrica respecto al eje $y$ (función par)?
  respuesta: 'No'
  solucion_pasos:
  - Es simétrica respecto al origen (función impar), no respecto al eje $y$.
- titulo: ¿$\sin(0)$ es consistente con la simetría impar?
  enunciado: ¿El valor $\sin(0)=0$ es consistente con la propiedad de simetría impar?
  respuesta: Sí
  solucion_pasos:
  - Toda función impar cumple $f(0)=-f(0)$, lo que obliga a $f(0)=0$, consistente con $\sin(0)=0$.
errores_frecuentes:
- Confundir la simetría impar del seno con la simetría par del coseno.
- Suponer que $\sin(-x)=\sin(x)$, cuando en realidad son valores opuestos.
- No aplicar correctamente la simetría para simplificar cálculos con ángulos negativos.
- Confundir simetría respecto al origen con simetría respecto a un eje.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
