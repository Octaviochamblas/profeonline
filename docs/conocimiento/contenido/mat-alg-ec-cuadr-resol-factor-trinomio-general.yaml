semantic_id: MAT.ALG.EC_CUADR_RESOL_FACTOR.TRINOMIO_GENERAL
titulo: Resolución de ecuaciones completas factorizando trinomios de la forma ax² + bx + c
objetivo: Resolver ecuaciones cuadráticas completas con $a\neq1$ factorizando el trinomio mediante descomposición
  del término lineal.
introduccion: 'Cuando el coeficiente cuadrático no es 1, factorizar exige un paso adicional: descomponer el término
  lineal en dos partes que permitan agrupar la expresión.'
resumen: Para resolver $ax^2+bx+c=0$ con $a\neq1$, se descompone $b$ en dos números cuyo producto sea $a \cdot
  c$ y cuya suma sea $b$, reescribiendo el trinomio para factorizar por agrupación.
explicacion: '### Definición formal


  Dada $ax^2+bx+c=0$ con $a\neq1$, se buscan $m,n$ tales que $m+n=b$ y $m \cdot n=a \cdot c$. Reescribiendo $bx=mx+nx$,
  el trinomio $ax^2+mx+nx+c$ se factoriza agrupando en dos pares de términos, obteniendo un factor común binomio.


  ### Desarrollo didáctico


  Este método, conocido como factorización por agrupación, transforma un trinomio de cuatro términos en un producto
  de dos binomios, cada uno con su propio factor común.


  Para $2x^2+7x+3=0$: $a \cdot c=6$; se buscan $m,n$ con $m+n=7$ y $m \cdot n=6$: son $1$ y $6$. Reescribiendo:
  $2x^2+x+6x+3=x(2x+1)+3(2x+1)=(2x+1)(x+3)=0$, dando $x=-1/2$ o $x=-3$.'
procedimiento:
- 'Paso 1: Calcula el producto $a \cdot c$.'
- 'Paso 2: Busca dos números $m$ y $n$ tales que $m+n=b$ y $m \cdot n=a \cdot c$.'
- 'Paso 3: Reescribe el término lineal como $mx+nx$ y agrupa en dos pares de términos.'
- 'Paso 4: Extrae el factor común de cada par y factoriza el binomio común restante.'
- 'Paso 5: Aplica la propiedad del producto nulo para hallar las soluciones.'
ejemplos:
- titulo: Factorización por agrupación con coeficientes positivos
  enunciado: 'Resuelve $3x^2+11x+6=0$ factorizando.'
  solucion_pasos:
  - '$a \cdot c=18$; se buscan $m,n$ con $m+n=11$ y $m \cdot n=18$: son $2$ y $9$.'
  - '$3x^2+2x+9x+6=x(3x+2)+3(3x+2)=(3x+2)(x+3)=0$.'
  - '$x=-2/3$ o $x=-3$.'
- titulo: Factorización con término independiente negativo
  enunciado: 'Resuelve $2x^2-5x-3=0$ factorizando.'
  solucion_pasos:
  - '$a \cdot c=-6$; se buscan $m,n$ con $m+n=-5$ y $m \cdot n=-6$: son $-6$ y $1$.'
  - '$2x^2-6x+x-3=2x(x-3)+1(x-3)=(2x+1)(x-3)=0$.'
  - '$x=-1/2$ o $x=3$.'
- titulo: ¿La factorización por agrupación requiere calcular primero el producto $a \cdot c$?
  enunciado: ¿La factorización por agrupación requiere calcular primero el producto $a \cdot c$?
  respuesta: Sí
  solucion_pasos:
  - Los números $m$ y $n$ deben multiplicar exactamente $a \cdot c$, no solo $c$, cuando $a\neq1$.
- titulo: ¿Toda ecuación de la forma $ax^2+bx+c=0$ con $a\neq1$ admite factorización por agrupación con números
    enteros?
  enunciado: ¿Toda ecuación de la forma $ax^2+bx+c=0$ con $a\neq1$ admite factorización por agrupación con números
    enteros?
  respuesta: 'No'
  solucion_pasos:
  - Solo si existen enteros $m$ y $n$ que cumplan ambas condiciones; en caso contrario conviene usar la fórmula
    general.
errores_frecuentes:
- Buscar $m$ y $n$ que multipliquen solo $c$ en vez de $a \cdot c$, un error común al generalizar el método del
  trinomio simple.
- Agrupar incorrectamente los términos, sin extraer el factor común correcto de cada par.
- Cometer errores de signo al reescribir el término lineal como suma de $mx+nx$.
- No verificar que el binomio factor común sea idéntico en ambos grupos antes de factorizarlo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
