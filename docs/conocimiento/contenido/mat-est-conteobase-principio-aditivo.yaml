semantic_id: MAT.EST.CONTEO_BASE.PRINCIPIO_ADITIVO
titulo: Principio aditivo para contar opciones excluyentes
objetivo: Aplicar el principio aditivo de conteo para determinar el número total de formas de realizar
  una acción, cuando existen alternativas mutuamente excluyentes entre sí.
introduccion: Cuando una tarea se puede realizar de una forma O de otra (pero no ambas a la vez), el total
  de opciones se obtiene sumando las alternativas de cada camino.
resumen: El principio aditivo establece que, si una tarea se puede realizar de $m$ formas mediante una
  alternativa o de $n$ formas mediante otra alternativa excluyente, el número total de formas de realizar
  la tarea es $m+n$.
explicacion: '![Principio aditivo de conteo](/static/img/probabilidad/conteobase/conteobase-principio-aditivo.svg)


  ### Definición formal


  Si las alternativas son mutuamente excluyentes (no se pueden combinar), el total de formas de realizar
  la tarea completa es la suma de las formas de cada alternativa: $m+n$.


  ### Desarrollo didáctico


  Para viajar de una ciudad a otra, hay 3 líneas de bus o 2 líneas de tren (no se puede tomar ambas al
  mismo tiempo para un mismo viaje). El total de formas de viajar es $3+2=5$.'
procedimiento:
- 'Paso 1: Identifica si la situación involucra alternativas excluyentes entre sí (se elige una u otra,
  no ambas).'
- 'Paso 2: Cuenta el número de opciones de cada alternativa por separado.'
- 'Paso 3: Suma esas cantidades para obtener el total de formas posibles.'
ejemplos:
- titulo: Contar formas de viajar con buses o trenes
  enunciado: 3 líneas de bus o 2 líneas de tren.
  solucion_pasos:
  - 3+2=5 formas totales de viajar.
- titulo: Contar formas de elegir un postre o una bebida especial
  enunciado: 4 tipos de postre o 3 tipos de bebida especial (se elige solo uno de los dos, no ambos).
  solucion_pasos:
  - 4+3=7 formas totales de elegir.
- titulo: ¿El principio aditivo requiere que las alternativas sean excluyentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición necesaria para aplicar la suma directamente.
- titulo: ¿Se usa este principio cuando se deben realizar ambas etapas sucesivamente (no una u otra)?
  respuesta: 'No'
  solucion_pasos:
  - No, en ese caso corresponde el principio multiplicativo, no el aditivo.
errores_frecuentes:
- Aplicar el principio aditivo cuando en realidad se deben combinar ambas alternativas sucesivamente (caso
  multiplicativo).
- Sumar opciones que no son realmente excluyentes entre sí, generando un conteo incorrecto.
- Confundir 'o' (aditivo) con 'y' (multiplicativo) al interpretar el enunciado del problema.
fuente: 'Elaboración propia (referencia: Moraleja 298).'
estado: publicado
