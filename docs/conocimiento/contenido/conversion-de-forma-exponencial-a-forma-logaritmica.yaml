semantic_id: MAT.NUM.LOGARITMOS_CONCEPTO.FORMA_EXPONENCIAL_A_LOGARITMICA
titulo: Conversión de forma exponencial a forma logarítmica
objetivo: Convertir una igualdad exponencial a logarítmica.
introduccion: Pasar una potencia a logaritmo permite expresar exponentes desconocidos y escalas muy grandes
  o pequeñas. La posición de cada término determina el significado.
resumen: De \(b^c=a\) se obtiene \(\log_b a=c\). El exponente de la potencia se convierte en el valor
  del logaritmo.
explicacion: 'De \(b^c=a\) se obtiene \(\log_b a=c\).


  En el caso “\(10^{-3}=0.001\) equivale a \(\log_{10}0.001=-3\)” esta idea se hace visible: el exponente
  de la potencia se convierte en el valor del logaritmo'
procedimiento:
- 'Paso 1: Identifica base, exponente y resultado de la potencia.'
- 'Paso 2: Coloca el resultado como argumento y el exponente después del signo igual.'
- 'Paso 3: Verifica que la base sea válida y recupera la potencia para controlar la conversión.'
ejemplos:
- titulo: Aplicación razonada — Conversión de forma exponencial a forma logarítmica
  enunciado: \(10^{-3}=0.001\) equivale a \(\log_{10}0.001=-3\).
  solucion_pasos:
  - Identifica base, exponente y resultado de la potencia.
  - Coloca el resultado como argumento y el exponente después del signo igual.
  - Verifica que la base sea válida y recupera la potencia para controlar la conversión.
- titulo: Revisión de una solución — Conversión de forma exponencial a forma logarítmica
  enunciado: Una solución aplica “Coloca el resultado como argumento y el exponente después del signo
    igual.”, pero termina sin comprobar que el exponente de la potencia se convierte en el valor del logaritmo.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conversión de forma exponencial a forma logarítmica: de \(b^c=a\)
    se obtiene \(\log_b a=c\).'
  - Identifica base, exponente y resultado de la potencia.
  - 'Completa la revisión con este control: Verifica que la base sea válida y recupera la potencia para
    controlar la conversión.'
- titulo: ¿Se cumple que el exponente de la potencia se convierte en el valor del logaritmo? — Conversión
    de forma exponencial a forma logarítmica
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que de \(b^c=a\) se obtiene \(\log_b a=c\).
  - El caso “\(10^{-3}=0.001\) equivale a \(\log_{10}0.001=-3\)” satisface esa condición.
  - Verifica que la base sea válida y recupera la potencia para controlar la conversión.
- titulo: ¿Es válido omitir el paso “Identifica base, exponente y resultado de la potencia”? — Conversión
    de forma exponencial a forma logarítmica
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conversión de forma exponencial a forma logarítmica.
  - 'Omitirlo puede volver inválida la acción siguiente: Coloca el resultado como argumento y el exponente
    después del signo igual.'
  - 'La solución debe terminar de este modo: Verifica que la base sea válida y recupera la potencia para
    controlar la conversión.'
errores_frecuentes:
- 'Confundir conversión de forma exponencial a forma logarítmica con otro concepto y omitir este inicio:
  Identifica base, exponente y resultado de la potencia.'
- Aplicar mecánicamente “Coloca el resultado como argumento y el exponente después del signo igual.” sin
  revisar las condiciones de la definición.
- Tomar “\(10^{-3}=0.001\) equivale a \(\log_{10}0.001=-3\)” como una igualdad aislada, sin explicar por
  qué es válida.
- Aceptar una respuesta que contradice la idea clave “el exponente de la potencia se convierte en el valor
  del logaritmo”.
- 'Terminar el desarrollo sin realizar este control: Verifica que la base sea válida y recupera la potencia
  para controlar la conversión.'
