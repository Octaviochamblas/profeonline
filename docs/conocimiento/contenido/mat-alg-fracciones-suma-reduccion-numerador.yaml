semantic_id: MAT.ALG.FRACCIONES_SUMA.REDUCCION_NUMERADOR
titulo: Reducción de Términos en la Suma
objetivo: Agrupar y reducir los términos semejantes que aparecen en el numerador final tras la suma.
introduccion: Una vez que construyes ese gran numerador uniendo todo, a menudo parece un desorden. Tu deber es ordenarlo,
  agrupar las x con las x, los números con los números, y limpiar la casa.
resumen: Después de sumar los numeradores amplificados, siempre debes reducir términos semejantes (sumar y restar
  coeficientes de las mismas variables).
explicacion: '### Definición formal


  Es el proceso estándar de limpieza algebraica de sumas.


  ### Desarrollo didáctico


  Una vez que has logrado construir tu súper fracción con el denominador común, tienes un numerador gigante lleno
  de sumas y (frecuentemente) multiplicaciones sin resolver.


  El siguiente paso es limpiar ese numerador gigante.

  1. Desarrolla las multiplicaciones distribuyendo los factores. (Ej: $x(x+2)$ se vuelve $x^2 + 2x$).

  2. Identifica los términos semejantes (las $x^2$ con las $x^2$, las $x$ con las $x$, los números con los números).

  3. Suma y resta esos términos para reducir el polinomio a su mínima expresión.


  Cuidado letal: Durante todo este proceso de orden, **NO TOQUES EL DENOMINADOR**. Déjalo factorizado, porque es
  mucho más útil así para el paso final de simplificación.'
procedimiento:
- 'Paso 1: Observa el numerador resultante gigante.'
- 'Paso 2: Identifica los términos que tienen las mismas variables con los mismos exponentes (términos semejantes).'
- 'Paso 3: Suma o resta sus coeficientes numéricos.'
- 'Paso 4: Escribe el polinomio final reducido y ordenado.'
ejemplos:
- titulo: Reduce el numerador de $\frac{4x^2 + 3x - 1 + x^2 - 3x + 5}{x}$
  enunciado: Reduce el numerador de $\frac{4x^2 + 3x - 1 + x^2 - 3x + 5}{x}$.
  solucion_pasos:
  - 'Términos con $x^2$: $4x^2 + x^2 = 5x^2$.'
  - 'Términos con $x$: $3x - 3x = 0$ (se anulan).'
  - 'Números: $-1 + 5 = 4$.'
  - 'Resultado final: $\frac{5x^2 + 4}{x}$.'
- titulo: Limpia $\frac{a + 2b - a + b}{c}$.
  solucion_pasos:
  - Las 'a' se cancelan (a - a = 0). Las 'b' se suman (2b + b = 3b).
- titulo: 'Respecto de «Reducción del numerador resultante en adición de fracciones»: ¿La siguiente for'
  enunciado: 'Respecto de «Reducción del numerador resultante en adición de fracciones»: ¿La siguiente formulación
    es correcta? «Después de sumar los numeradores amplificados, siempre debes reducir términos semejantes (sumar
    y restar coeficientes de las mismas variables)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Después de sumar los numeradores amplificados, siempre debes
    reducir términos semejantes (sumar y restar coeficientes de las mismas variables).'
- titulo: 'Respecto de «Reducción del numerador resultante en adición de fracciones»: ¿La siguiente con'
  enunciado: 'Respecto de «Reducción del numerador resultante en adición de fracciones»: ¿La siguiente conclusión
    es correcta? «Sumar términos que no son semejantes (ej. $2x + 3 = 5x$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Después de sumar los numeradores amplificados, siempre debes
    reducir términos semejantes (sumar y restar coeficientes de las mismas variables).'
errores_frecuentes:
- Sumar términos que no son semejantes (ej. $2x + 3 = 5x$).
- Olvidarse de incluir términos que no tienen pareja al transcribir el resultado.
- Dividir todos los términos por un factor común.
- Tachar términos que sean iguales al denominador.
- Para «Reducir términos semejantes en el numerador de una fracción significa:», la respuesta correcta es Ordenar
  de menor a mayor grado.
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
