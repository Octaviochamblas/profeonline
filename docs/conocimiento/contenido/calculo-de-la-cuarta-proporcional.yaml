semantic_id: MAT.NUM.PROPORCIONES.CUARTA_PROPORCIONAL
titulo: Cálculo de la cuarta proporcional
objetivo: Calcular la cuarta proporcional en una proporción dada.
introduccion: Si conoces el precio de 2 kilos de pan, puedes predecir el de 5 kilos usando una regla de
  tres. En el fondo, estás buscando una cuarta pieza del rompecabezas que hace que todo encaje a la perfección.
resumen: La cuarta proporcional es el término desconocido ($x$) en una proporción cuando se conocen los
  otros tres. Se calcula despejando $x$ de la ecuación del producto cruzado.
explicacion: Se llama **cuarta proporcional** a cualquiera de los términos de una proporción cuando los
  otros tres son conocidos. Para encontrar su valor en $\frac{a}{b} = \frac{c}{x}$, multiplicamos los
  términos de la diagonal que está completa ($b$ y $c$) y dividimos por el término que queda solo ($a$).
procedimiento:
- 'Paso 1: Plantea la proporción dejando la incógnita $x$ en una de las posiciones.'
- 'Paso 2: Multiplica los dos términos conocidos que forman una diagonal.'
- 'Paso 3: Divide ese resultado por el término que hace diagonal con la $x$.'
ejemplos:
- titulo: Hallando x
  enunciado: Halla $x$ en $3/4 = 9/x$
  solucion_pasos:
  - La diagonal completa es $4$ y $9$.
  - Multiplicamos $4 \cdot 9 = 36$.
  - 'Dividimos por el término opuesto a $x$, que es $3$: $36 / 3 = 12$. La cuarta proporcional es 12.'
- titulo: ¿Es lo mismo que la regla de tres?
  respuesta: Sí
  solucion_pasos:
  - La regla de tres simple directa es la aplicación práctica del cálculo de la cuarta proporcional.
errores_frecuentes:
- Dividir por un número de la diagonal equivocada.
- Multiplicar los números de la misma fracción.
- Confundir cuarta proporcional con tercera proporcional.
- No simplificar las fracciones antes para facilitar el cálculo mental.
- Despejar mal en la ecuación de primer grado.
fuente: Currículum Nacional MINEDUC.
estado: publicado
