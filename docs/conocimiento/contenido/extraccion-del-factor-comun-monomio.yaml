semantic_id: MAT.ALG.FACTOR_COMUN.EXTRACCION_MONOMIO
titulo: Extracción del factor común monomio
objetivo: Comprender extracción del factor común monomio y aplicarlo con precisión.
introduccion: Extraer un monomio común equivale a aplicar la distributividad en sentido inverso. Cada
  término se divide por el factor elegido y los cocientes quedan dentro del paréntesis.
resumen: Coeficiente numérico y parte literal.
explicacion: '### Definición formal


  Extraer el factor común monomio $M$ de un polinomio $P = c_1x^{e_1} + c_2x^{e_2} + \dots + c_nx^{e_n}$
  consiste en escribir $P = M \left( \frac{c_1}{M}x^{e_1-k} + \frac{c_2}{M}x^{e_2-k} + \dots \right)$,
  donde $M$ es el producto entre el MCD de los coeficientes y la variable elevada al menor exponente común
  $k$.


  ### Desarrollo didáctico


  Es la unión del MCD numérico y las variables comunes.


  Toda cantidad dividida por sí misma es 1.


  El MCD de 14 y 7 es 7. El menor exponente de x es 2.'
procedimiento:
- Es la unión del MCD numérico y las variables comunes.
- Toda cantidad dividida por sí misma es 1.
- El MCD de 14 y 7 es 7. El menor exponente de x es 2.
ejemplos:
- titulo: El factor común monomio de $5x^2y - 10xy^2$ es $5xy$
  enunciado: ¿El factor común monomio de $5x^2y - 10xy^2$ es $5xy$?
  solucion_pasos:
  - MCD 5, letras comunes x e y con exponente 1.
  - 'Respuesta: Verdadero'
- titulo: Al extraer $4m$ de $4m^2 - 4m$, queda $4m(m)$
  enunciado: ¿Al extraer $4m$ de $4m^2 - 4m$, queda $4m(m)$?
  solucion_pasos:
  - Falta el 1. Lo correcto es 4m(m - 1).
  - 'Respuesta: Falso'
- titulo: 'Respecto de «Extracción del factor común monomio»: ¿Describe adecuadamente el concepto esta'
  enunciado: 'Respecto de «Extracción del factor común monomio»: ¿Describe adecuadamente el concepto esta
    frase? «Coeficiente numérico y parte literal»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Coeficiente numérico y parte literal.'
- titulo: 'Respecto de «Extracción del factor común monomio»: ¿Se puede aceptar esta afirmación? «Solo'
  enunciado: 'Respecto de «Extracción del factor común monomio»: ¿Se puede aceptar esta afirmación? «Solo
    números»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Coeficiente numérico y parte literal.'
errores_frecuentes:
- Solo números.
- Para «¿De qué está compuesto un factor común monomio», la respuesta correcta es Solo letras.
- Para «¿De qué está compuesto un factor común monomio», la respuesta correcta es Dos sumandos.
- Para «Si divides un término por su factor común y son idénticos, ¿qué debes colocar en el paréntesis»,
  la respuesta correcta es 0.
- Para «Si divides un término por su factor común y son idénticos, ¿qué debes colocar en el paréntesis»,
  la respuesta correcta es La misma variable.
