semantic_id: MAT.GEO.POLIEDROS_PRISMAS.ICOSAEDRO_REGULAR
titulo: Identificación del icosaedro regular
objetivo: Reconocer el icosaedro regular como el poliedro regular formado por veinte caras triangulares
  equiláteras congruentes, con cinco caras concurriendo en cada vértice.
introduccion: 'El icosaedro regular es el sólido platónico con más caras: veinte triángulos equiláteros
  idénticos ensamblados formando un cuerpo casi esférico.'
resumen: El icosaedro regular es un poliedro regular formado por 20 caras triangulares equiláteras congruentes,
  12 vértices y 30 aristas, con 5 caras concurriendo en cada vértice.
explicacion: '![Icosaedro regular (esquema)](/static/img/geometria/espacio-cuerpos/icosaedro-regular.svg)


  ### Definición formal


  El icosaedro regular es uno de los cinco sólidos platónicos. Tiene 20 caras (todas triángulos equiláteros
  congruentes), 12 vértices y 30 aristas. En cada vértice concurren exactamente 5 caras.


  ### Desarrollo didáctico


  El esquema muestra la vista desde un vértice del icosaedro: 5 triángulos equiláteros se encuentran exactamente
  en ese punto central, formando un patrón de ''abanico'' pentagonal. Esta es precisamente la figura de
  vértice característica del icosaedro.'
procedimiento:
- 'Paso 1: Verifica que el cuerpo tenga exactamente 20 caras triangulares.'
- 'Paso 2: Verifica que las 20 caras sean triángulos equiláteros congruentes entre sí.'
- 'Paso 3: Confirma que en cada uno de los 12 vértices concurran exactamente 5 caras.'
ejemplos:
- titulo: Contar los elementos del icosaedro regular
  enunciado: Un icosaedro regular tiene 20 caras triangulares.
  solucion_pasos:
  - 'Tiene 20 caras, 12 vértices y 30 aristas, cumpliendo la relación de Euler: 12-30+20=2.'
- titulo: Reconocer la figura de vértice del icosaedro
  enunciado: En cada vértice del icosaedro concurren 5 triángulos.
  solucion_pasos:
  - Esos 5 triángulos forman un patrón de abanico pentagonal alrededor de cada vértice.
- titulo: ¿El icosaedro regular es el sólido platónico con más caras?
  respuesta: Sí
  solucion_pasos:
  - Sí, con 20 caras, es el que tiene más caras de los cinco sólidos platónicos.
- titulo: ¿El icosaedro tiene el mismo número de vértices que el dodecaedro?
  respuesta: 'No'
  solucion_pasos:
  - No, el icosaedro tiene 12 vértices y el dodecaedro tiene 20; son poliedros duales entre sí.
errores_frecuentes:
- Confundir el número de caras concurrentes por vértice (son 5, no 3 o 4 como en otros sólidos platónicos).
- Confundir el icosaedro con el dodecaedro, intercambiando su número de caras y vértices.
- Creer que el icosaedro tiene caras pentagonales en vez de triangulares.
fuente: 'Elaboración propia (referencia: Moraleja 96).'
estado: publicado
