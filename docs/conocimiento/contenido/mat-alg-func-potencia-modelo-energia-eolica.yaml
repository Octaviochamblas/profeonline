semantic_id: MAT.ALG.FUNC_POTENCIA_MODELO.ENERGIA_EOLICA
titulo: Modelamiento de la energía eólica con función potencia
objetivo: Interpretar el modelo $P(v)=k\cdot v^3$ que relaciona la potencia generada por un aerogenerador con la
  velocidad del viento.
introduccion: La energía que puede extraer un aerogenerador no depende linealmente de la velocidad del viento,
  sino de su cubo, lo que explica por qué pequeños cambios de viento generan grandes diferencias de energía.
resumen: La potencia eólica se modela como $P(v)=k\cdot v^3$, donde $v$ es la velocidad del viento y $k$ una
  constante que depende del aerogenerador; duplicar la velocidad multiplica la potencia por $8$.
explicacion: '### Definición formal


  El modelo físico de potencia eólica es $P(v)=k\cdot v^3$, con $k>0$ constante y $v\geq0$ la velocidad del
  viento. Al ser un modelo de función potencia con $n=3$, la potencia crece de forma acelerada respecto a la
  velocidad.


  ### Desarrollo didáctico


  Si $k=0{,}5$ y la velocidad pasa de $4$ m/s a $8$ m/s: $P(4)=0{,}5\cdot64=32$ y $P(8)=0{,}5\cdot512=256$. La
  potencia se multiplicó por $8$, consistente con $2^3=8$, al duplicarse la velocidad.'
procedimiento:
- 'Paso 1: Identifica la constante $k$ y la velocidad $v$ en el problema.'
- 'Paso 2: Evalúa $P(v)=k\cdot v^3$ para calcular la potencia en un punto dado.'
- 'Paso 3: Para comparar dos velocidades, calcula la razón de sus cubos para determinar el factor de cambio.'
ejemplos:
- titulo: Cálculo directo de potencia eólica
  enunciado: 'Con $k=2$, calcula la potencia generada a $v=5$ m/s.'
  solucion_pasos:
  - 'Se evalúa $P(5)=2\cdot5^3=2\cdot125=250$.'
  - La potencia generada es $250$ (en las unidades correspondientes).
- titulo: Efecto de duplicar la velocidad del viento
  enunciado: '¿Por qué factor cambia la potencia si la velocidad del viento se duplica?'
  solucion_pasos:
  - 'Se compara $P(2v)=k(2v)^3=8kv^3=8P(v)$.'
  - La potencia se multiplica por $8$.
- titulo: ¿La potencia eólica depende linealmente de la velocidad del viento?
  enunciado: ¿La relación entre potencia y velocidad del viento en un aerogenerador es lineal?
  respuesta: 'No'
  solucion_pasos:
  - La relación es cúbica ($n=3$), no lineal.
- titulo: ¿Triplicar la velocidad del viento multiplica la potencia por $9$?
  enunciado: ¿Triplicar la velocidad del viento multiplica la potencia generada por un factor de $9$?
  respuesta: 'No'
  solucion_pasos:
  - Se multiplica por $3^3=27$, no por $9$, ya que la relación es cúbica.
errores_frecuentes:
- Suponer que la potencia eólica depende linealmente o cuadráticamente de la velocidad, en vez de cúbicamente.
- Calcular mal el factor de cambio al comparar dos velocidades distintas.
- No verificar que la velocidad del viento sea un valor físicamente razonable (no negativo).
- Confundir la constante $k$ con la velocidad $v$ al aplicar la fórmula.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
