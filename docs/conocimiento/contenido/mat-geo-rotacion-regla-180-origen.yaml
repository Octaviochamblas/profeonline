semantic_id: MAT.GEO.ROTACION_PLANO.REGLA_180_ORIGEN
titulo: Regla de rotación de 180° en torno al origen
objetivo: Aplicar la regla específica para rotar un punto 180° alrededor del origen del sistema cartesiano,
  equivalente a la simetría central respecto del origen.
introduccion: 'Rotar un punto 180° es como darle ''media vuelta completa'' alrededor del centro: termina
  exactamente en el lado opuesto.'
resumen: La rotación de 180° en torno al origen transforma cada punto $P(x,y)$ en $P'(-x,\,-y)$, coincidiendo
  exactamente con la simetría central respecto del origen.
explicacion: '![Regla de rotación de 180° en torno al origen](/static/img/geometria/isometrias/rotacion-regla-180-origen.svg)


  ### Definición formal


  La rotación de $180°$ en torno al origen transforma $P(x,y)$ en $P''(-x,-y)$: se invierte el signo de
  ambas coordenadas. Esta regla es idéntica en resultado a la simetría central respecto del origen, ya
  que ambos sentidos de giro (horario o antihorario) llegan al mismo punto final tras 180°.


  ### Desarrollo didáctico


  En la figura, el punto $P(3,2)$ rotado 180° alrededor del origen se transforma en $P''(-3,-2)$: ambas
  coordenadas cambian de signo.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del punto P(x,y) que se desea rotar 180° alrededor del origen.'
- 'Paso 2: Invierte el signo de la abscisa: -x.'
- 'Paso 3: Invierte el signo de la ordenada: -y, obteniendo P''(-x,-y).'
ejemplos:
- titulo: Aplicar la regla de rotación de 180° a un punto
  enunciado: El punto P(3,2) rota 180° alrededor del origen.
  solucion_pasos:
  - P'=(-3,-2).
- titulo: Verificar la equivalencia con la simetría central
  enunciado: Se compara esta rotación con la simetría central respecto del origen.
  solucion_pasos:
  - 'Ambas dan exactamente el mismo resultado: (x,y)→(-x,-y).'
- titulo: ¿El sentido (horario o antihorario) importa en una rotación de 180°?
  respuesta: 'No'
  solucion_pasos:
  - No, girar 180° en cualquier sentido lleva al mismo punto final, ya que es exactamente media vuelta.
- titulo: ¿Rotar dos veces 180° devuelve el punto a su posición original?
  respuesta: Sí
  solucion_pasos:
  - Sí, 180°+180°=360°, un giro completo que devuelve el punto a su posición inicial.
errores_frecuentes:
- Cambiar el signo de solo una de las dos coordenadas, en vez de ambas.
- Confundir esta regla con la de 90° (que solo intercambia y cambia el signo de una coordenada).
- Creer que el sentido de giro (horario o antihorario) da resultados distintos para 180°.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 128, Cid 77).'
estado: publicado
