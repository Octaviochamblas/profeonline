semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.CONMUTATIVA_MULTIPLICACION
objetivo: Aplicar la conmutatividad del producto racional.
introduccion: Una tarea matemática frecuente es aplicar la conmutatividad del producto
  racional. El caso “\(\frac{2}{3}\cdot\frac{5}{4}=\frac{5}{4}\cdot\frac{2}{3}\)”
  muestra cómo abordarla desde propiedad conmutativa de la multiplicación en Q.
resumen: La propiedad conmutativa de la multiplicación establece que cambiar el orden
  de los factores no altera el producto. Como criterio de control, en una multiplicación
  de racionales el orden no cambia el resultado
explicacion: |-
  La propiedad conmutativa de la multiplicación establece que cambiar el orden de los factores no altera el producto.

  En el caso “\(\frac{2}{3}\cdot\frac{5}{4}=\frac{5}{4}\cdot\frac{2}{3}\)” esta definición se aplica de forma directa. El control final consiste en comprobar que en una multiplicación de racionales el orden no cambia el resultado.
procedimiento:
- 'Paso 1: Escribe un producto de dos racionales.'
- 'Paso 2: Cambia el orden de los factores sin modificar sus signos.'
- 'Paso 3: Comprueba que ambos productos sean iguales: \(ab=ba\).'
ejemplos:
- titulo: Aplicación razonada — Propiedad conmutativa de la multiplicación en Q
  enunciado: \(\frac{2}{3}\cdot\frac{5}{4}=\frac{5}{4}\cdot\frac{2}{3}\).
  solucion_pasos:
  - Escribe un producto de dos racionales.
  - Cambia el orden de los factores sin modificar sus signos.
  - 'Comprueba que ambos productos sean iguales: \(ab=ba\).'
- titulo: Revisión de una solución — Propiedad conmutativa de la multiplicación en
    Q
  enunciado: Una solución aplica “Cambia el orden de los factores sin modificar sus
    signos.”, pero termina sin comprobar que en una multiplicación de racionales el
    orden no cambia el resultado. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define propiedad conmutativa de la multiplicación en
    Q: la propiedad conmutativa de la multiplicación establece que cambiar el orden
    de los factores no altera el producto.'
  - Escribe un producto de dos racionales.
  - 'Completa la revisión con este control: Comprueba que ambos productos sean iguales:
    \(ab=ba\).'
- titulo: ¿Se cumple que en una multiplicación de racionales el orden no cambia el
    resultado? — Propiedad conmutativa de la multiplicación en Q
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la propiedad conmutativa de la multiplicación
    establece que cambiar el orden de los factores no altera el producto.
  - El caso “\(\frac{2}{3}\cdot\frac{5}{4}=\frac{5}{4}\cdot\frac{2}{3}\)” satisface
    esa condición.
  - 'Comprueba que ambos productos sean iguales: \(ab=ba\).'
- titulo: ¿Es válido omitir el paso “Escribe un producto de dos racionales”? — Propiedad
    conmutativa de la multiplicación en Q
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de propiedad conmutativa de la
    multiplicación en Q.
  - 'Omitirlo puede volver inválida la acción siguiente: Cambia el orden de los factores
    sin modificar sus signos.'
  - 'La solución debe terminar de este modo: Comprueba que ambos productos sean iguales:
    \(ab=ba\).'
errores_frecuentes:
- 'Empezar propiedad conmutativa de la multiplicación en Q sin realizar este control
  inicial: Escribe un producto de dos racionales.'
- Memorizar “\(\frac{2}{3}\cdot\frac{5}{4}=\frac{5}{4}\cdot\frac{2}{3}\)” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Cambia el orden de los factores sin modificar sus signos.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre propiedad conmutativa de la multiplicación en
  Q que contradice el criterio “En una multiplicación de racionales el orden no cambia
  el resultado”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que ambos productos
  sean iguales: \(ab=ba\).'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
