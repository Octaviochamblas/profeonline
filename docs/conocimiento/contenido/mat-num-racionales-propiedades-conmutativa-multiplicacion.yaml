semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.CONMUTATIVA_MULTIPLICACION
titulo: Propiedad conmutativa de la multiplicación
objetivo: Aplicar que el orden de los factores no altera el resultado de una multiplicación de racionales.
introduccion: 'Al igual que con la suma, multiplicar \(\frac{2}{3}\cdot\frac{5}{4}\) o \(\frac{5}{4}\cdot\frac{2}{3}\)
  da el mismo resultado: el orden de los factores no importa.'
resumen: Para todo \(p,q\in\mathbb{Q}\), se cumple \(p\cdot q=q\cdot p\).
explicacion: '### Definición formal


  Para \(p=\frac{a}{b}\), \(q=\frac{c}{d}\): \(p\cdot q=\frac{ac}{bd}\) y \(q\cdot p=\frac{ca}{db}\).
  Como la multiplicación de enteros es conmutativa, \(ac=ca\) y \(bd=db\), así que \(p\cdot q=q\cdot p\).


  ### Desarrollo didáctico


  \(\frac{2}{3}\cdot\frac{5}{4}=\frac{10}{12}=\frac{5}{6}\), y también \(\frac{5}{4}\cdot\frac{2}{3}=\frac{10}{12}=\frac{5}{6}\):
  el resultado no cambia al invertir el orden de los factores.'
procedimiento:
- 'Paso 1: Escribe un producto de dos racionales.'
- 'Paso 2: Cambia el orden de los factores sin modificar sus signos.'
- 'Paso 3: Comprueba que ambos productos sean iguales: \(ab=ba\).'
ejemplos:
- titulo: Aplicación razonada — Propiedad conmutativa de la multiplicación en Q
  enunciado: \(\frac{2}{3}\cdot\frac{5}{4}=\frac{5}{4}\cdot\frac{2}{3}\).
  solucion_pasos:
  - Escribe un producto de dos racionales.
  - Cambia el orden de los factores sin modificar sus signos.
  - 'Comprueba que ambos productos sean iguales: \(ab=ba\).'
- titulo: Revisión de una solución — Propiedad conmutativa de la multiplicación en Q
  enunciado: Una solución aplica “Cambia el orden de los factores sin modificar sus signos.”, pero termina
    sin comprobar que en una multiplicación de racionales el orden no cambia el resultado. Determina qué
    falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define propiedad conmutativa de la multiplicación en Q: la propiedad conmutativa
    de la multiplicación establece que cambiar el orden de los factores no altera el producto.'
  - Escribe un producto de dos racionales.
  - 'Completa la revisión con este control: Comprueba que ambos productos sean iguales: \(ab=ba\).'
- titulo: ¿Se cumple que en una multiplicación de racionales el orden no cambia el resultado? — Propiedad
    conmutativa de la multiplicación en Q
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la propiedad conmutativa de la multiplicación establece
    que cambiar el orden de los factores no altera el producto.
  - El caso “\(\frac{2}{3}\cdot\frac{5}{4}=\frac{5}{4}\cdot\frac{2}{3}\)” satisface esa condición.
  - 'Comprueba que ambos productos sean iguales: \(ab=ba\).'
- titulo: ¿Es válido omitir el paso “Escribe un producto de dos racionales”? — Propiedad conmutativa de
    la multiplicación en Q
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de propiedad conmutativa de la multiplicación en Q.
  - 'Omitirlo puede volver inválida la acción siguiente: Cambia el orden de los factores sin modificar
    sus signos.'
  - 'La solución debe terminar de este modo: Comprueba que ambos productos sean iguales: \(ab=ba\).'
errores_frecuentes:
- 'Empezar propiedad conmutativa de la multiplicación en Q sin realizar este control inicial: Escribe
  un producto de dos racionales.'
- Memorizar “\(\frac{2}{3}\cdot\frac{5}{4}=\frac{5}{4}\cdot\frac{2}{3}\)” como respuesta aislada, sin
  reconstruir la definición que lo justifica.
- Convertir en receta el paso “Cambia el orden de los factores sin modificar sus signos.” y usarlo aunque
  cambien las condiciones del problema.
- Dar por válida una conclusión sobre propiedad conmutativa de la multiplicación en Q que contradice el
  criterio “En una multiplicación de racionales el orden no cambia el resultado”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que ambos productos sean iguales: \(ab=ba\).'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
