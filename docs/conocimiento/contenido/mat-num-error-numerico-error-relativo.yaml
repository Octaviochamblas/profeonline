semantic_id: MAT.NUM.ERROR_NUMERICO.ERROR_RELATIVO
titulo: Error relativo de una aproximación
objetivo: Calcular qué proporción representa el error absoluto respecto al valor exacto.
introduccion: 'El error absoluto por sí solo no indica si una aproximación es buena o mala: un error de
  0.3 es grande si el valor exacto es 1, pero pequeño si el valor exacto es 10000. El error relativo compara
  el error con la magnitud del valor exacto.'
resumen: El error relativo es el cociente entre el error absoluto y el valor exacto (en valor absoluto).
explicacion: '### Definición formal


  Si \(E_a\) es el error absoluto y \(V\neq0\) es el valor exacto, el error relativo es \(E_r=\frac{E_a}{|V|}\).


  ### Desarrollo didáctico


  Si el error absoluto es 0.3 y el valor exacto es 10, el error relativo es \(0.3/10=0.03\).'
procedimiento:
- 'Paso 1: Calcula primero el error absoluto.'
- 'Paso 2: Divide ese error por el valor absoluto del dato exacto, que debe ser distinto de cero.'
- 'Paso 3: Interpreta el cociente como error por unidad y compáralo entre mediciones.'
ejemplos:
- titulo: Aplicación razonada — Cálculo del error relativo
  enunciado: Si el error absoluto es 0.3 y el valor exacto es 10, el error relativo es \(0.3/10=0.03\).
  solucion_pasos:
  - Calcula primero el error absoluto.
  - Divide ese error por el valor absoluto del dato exacto, que debe ser distinto de cero.
  - Interpreta el cociente como error por unidad y compáralo entre mediciones.
- titulo: Revisión de una solución — Cálculo del error relativo
  enunciado: Una solución aplica “Divide ese error por el valor absoluto del dato exacto, que debe ser
    distinto de cero.”, pero termina sin comprobar que el error relativo permite evaluar la magnitud del
    error en proporción al valor exacto. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define cálculo del error relativo: el error relativo compara el error absoluto
    con el tamaño del valor exacto.'
  - Calcula primero el error absoluto.
  - 'Completa la revisión con este control: Interpreta el cociente como error por unidad y compáralo entre
    mediciones.'
- titulo: ¿Se cumple que el error relativo permite evaluar la magnitud del error en proporción al valor
    exacto? — Cálculo del error relativo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el error relativo compara el error absoluto con el tamaño
    del valor exacto.
  - El caso “Si el error absoluto es 0.3 y el valor exacto es 10, el error relativo es \(0.3/10=0.03\)”
    satisface esa condición.
  - Interpreta el cociente como error por unidad y compáralo entre mediciones.
- titulo: ¿Es válido omitir el paso “Calcula primero el error absoluto”? — Cálculo del error relativo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de cálculo del error relativo.
  - 'Omitirlo puede volver inválida la acción siguiente: Divide ese error por el valor absoluto del dato
    exacto, que debe ser distinto de cero.'
  - 'La solución debe terminar de este modo: Interpreta el cociente como error por unidad y compáralo
    entre mediciones.'
errores_frecuentes:
- 'Empezar cálculo del error relativo sin realizar este control inicial: Calcula primero el error absoluto.'
- Memorizar “Si el error absoluto es 0.3 y el valor exacto es 10, el error relativo es \(0.3/10=0.03\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Divide ese error por el valor absoluto del dato exacto, que debe ser distinto
  de cero.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre cálculo del error relativo que contradice el criterio “El error
  relativo permite evaluar la magnitud del error en proporción al valor exacto”.
- 'Cerrar el ejercicio sin esta comprobación específica: Interpreta el cociente como error por unidad
  y compáralo entre mediciones.'
