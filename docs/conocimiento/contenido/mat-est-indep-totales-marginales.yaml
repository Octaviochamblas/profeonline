semantic_id: MAT.EST.INDEPENDENCIA_CONDICIONAL.TOTALES_MARGINALES
titulo: Uso de totales marginales como denominador condicionado
objetivo: Reconocer que, al calcular una probabilidad condicional desde una tabla, el total marginal del
  evento condicionante actúa como el nuevo denominador restringido.
introduccion: 'El total marginal no es solo un dato de resumen: representa exactamente el número que se
  debe usar como nuevo universo de referencia al calcular una probabilidad condicional.'
resumen: Al calcular $P(A|B)$ desde una tabla, el total marginal de la categoría $B$ cumple el mismo papel
  que $n(B)$ en la fórmula general de probabilidad condicional.
explicacion: '![Totales marginales como denominador condicionado](/static/img/probabilidad/independencia/indep-totales-marginales.svg)


  ### Definición formal


  El total marginal de una fila o columna en una tabla de contingencia corresponde exactamente a $n(B)$
  (o $N\times P(B)$), el denominador de la fórmula de probabilidad condicional.


  ### Desarrollo didáctico


  Al calcular $P(\text{Sí}|\text{Hombre})$, el total marginal de ''Hombre'' (30) es exactamente el mismo
  número que se usaría como $n(B)$ en la fórmula general $\dfrac{n(A\cap B)}{n(B)}$.'
procedimiento:
- 'Paso 1: Identifica cuál variable de la tabla corresponde al evento condicionante.'
- 'Paso 2: Ubica el total marginal (fila o columna) correspondiente a esa variable.'
- 'Paso 3: Usa ese total marginal como el denominador al calcular la probabilidad condicional.'
ejemplos:
- titulo: Identificar el total marginal correcto como denominador
  enunciado: Se busca P(Sí|Hombre).
  solucion_pasos:
  - El denominador correcto es el total marginal de la columna 'Hombre' (30), no el total general (60).
- titulo: Identificar el total marginal para P(Mujer|No)
  enunciado: Se busca P(Mujer|No).
  solucion_pasos:
  - El denominador correcto es el total marginal de la fila 'No' (20).
- titulo: ¿El total marginal usado como denominador depende de cuál es el evento condicionante?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre corresponde a la fila o columna del evento que aparece a la derecha de la barra vertical
    en la notación.
- titulo: ¿Se puede usar el total general de la tabla como denominador en este cálculo?
  respuesta: 'No'
  solucion_pasos:
  - No, eso daría una probabilidad simple o conjunta, no una probabilidad condicional.
errores_frecuentes:
- Usar el total general de la tabla en vez del total marginal correcto correspondiente al evento condicionante.
- Confundir el total marginal de fila con el de columna al identificar el evento condicionante.
- Olvidar que el evento condicionante determina cuál total marginal específico se debe usar.
fuente: 'Elaboración propia (referencia: Moraleja 411, 419).'
estado: publicado
