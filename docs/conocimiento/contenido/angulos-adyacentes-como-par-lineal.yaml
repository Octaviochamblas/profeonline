semantic_id: MAT.GEO.ANGULOS_RELACIONES_POSICION.ADYACENTES
titulo: Ángulos adyacentes como par lineal
objetivo: Distinguir un par de ángulos adyacentes de otros consecutivos y comprobar que todo par adyacente
  es consecutivo, pero no todo consecutivo es adyacente.
introduccion: Dos ángulos pueden tocarse y aun así no completar una línea. La palabra 'adyacente' exige
  algo más preciso que estar uno junto al otro. Aquí lo trabajaremos con ejemplos concretos y verificaciones
  cortas.
resumen: Dos ángulos son adyacentes cuando son consecutivos y sus lados no comunes forman una recta. Como
  idea de control, todo par adyacente es consecutivo, pero no todo consecutivo es adyacente.
explicacion: 'Dos ángulos son adyacentes cuando son consecutivos y sus lados no comunes forman una recta.


  Cuando se analiza “si dos ángulos comparten un lado y los otros dos quedan como rayos opuestos, forman
  un par lineal” conviene evitar la memoria mecánica. El control decisivo es comprobar que todo par adyacente
  es consecutivo, pero no todo consecutivo es adyacente.'
procedimiento:
- 'Paso 1: Comprueba primero que los ángulos sean consecutivos.'
- 'Paso 2: Observa si los lados no comunes quedan sobre una misma recta en sentidos opuestos.'
- 'Paso 3: Concluye si se trata de un par adyacente o solo de un par consecutivo.'
ejemplos:
- titulo: Lectura del dibujo — Ángulos adyacentes
  enunciado: Si dos ángulos comparten un lado y los otros dos quedan como rayos opuestos, forman un par
    lineal.
  solucion_pasos:
  - Comprueba primero que los ángulos sean consecutivos.
  - Observa si los lados no comunes quedan sobre una misma recta en sentidos opuestos.
  - Concluye si se trata de un par adyacente o solo de un par consecutivo.
- titulo: Revisión del razonamiento — Ángulos adyacentes
  enunciado: En la situación “si dos ángulos comparten un lado y los otros dos quedan como rayos opuestos,
    forman un par lineal”, un compañero llega a la respuesta correcta pero no explica el paso decisivo.
    Reconstruye la justificación completa.
  solucion_pasos:
  - 'Parte de la definición: dos ángulos son adyacentes cuando son consecutivos y sus lados no comunes
    forman una recta.'
  - Observa si los lados no comunes quedan sobre una misma recta en sentidos opuestos.
  - Concluye si se trata de un par adyacente o solo de un par consecutivo.
- titulo: ¿La interpretación del dibujo es válida? — Ángulos adyacentes
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: dos ángulos son adyacentes cuando son consecutivos
    y sus lados no comunes forman una recta.'
  - En el caso “si dos ángulos comparten un lado y los otros dos quedan como rayos opuestos, forman un
    par lineal” se observa que todo par adyacente es consecutivo, pero no todo consecutivo es adyacente.
  - Concluye si se trata de un par adyacente o solo de un par consecutivo.
- titulo: ¿Se puede cerrar sin el control final? — Ángulos adyacentes
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulos adyacentes como par lineal.
  - Después del paso “Comprueba primero que los ángulos sean consecutivos.” todavía hace falta revisar
    “Observa si los lados no comunes quedan sobre una misma recta en sentidos opuestos.”.
  - El cierre correcto exige “Concluye si se trata de un par adyacente o solo de un par consecutivo.”.
errores_frecuentes:
- Ángulos adyacentes significa compartir un lado, aunque los otros dos no formen una recta.
- Para resolver ángulos adyacentes, basta con el paso “Comprueba primero que los ángulos sean consecutivos.”
  y no hace falta revisar “Observa si los lados no comunes quedan sobre una misma recta en sentidos opuestos.”.
- Si el dibujo parece claro, se puede ignorar que todo par adyacente es consecutivo, pero no todo consecutivo
  es adyacente.
- Dos configuraciones distintas representan ángulos adyacentes solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si se trata de un par adyacente
  o solo de un par consecutivo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
estado: publicado
