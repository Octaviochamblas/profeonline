semantic_id: MAT.ALG.FUNC_TRIG_MODELO.INTERPRETACION_AMPLITUD_CONTEXTO
titulo: Interpretación de la amplitud en un modelo de contexto
objetivo: Interpretar el parámetro $a$ de un modelo trigonométrico aplicado como la mitad de la variación total
  del fenómeno.
introduccion: 'En un modelo aplicado, la amplitud no es solo un número abstracto: representa cuánto se aleja el
  fenómeno de su valor promedio en cada dirección.'
resumen: En un modelo $f(t)=a\sin(bt)+d$ aplicado a un contexto, la **amplitud** $|a|$ representa la **mitad de
  la variación total** entre el valor máximo y el valor mínimo del fenómeno.
explicacion: '### Definición formal


  Si un fenómeno alcanza un valor máximo $M$ y un valor mínimo $m$, la amplitud del modelo correspondiente es
  $a=(M-m)/2$. Representa cuánto se aleja el fenómeno de su promedio, tanto hacia arriba como hacia abajo.


  ### Desarrollo didáctico


  Si la temperatura de una ciudad varía entre $10°$C (mínima) y $30°$C (máxima), la amplitud del modelo es
  $(30-10)/2=10°$C: la temperatura se aleja $10$ grados del promedio en cada dirección.'
procedimiento:
- 'Paso 1: Identifica el valor máximo $M$ y el valor mínimo $m$ del fenómeno.'
- 'Paso 2: Calcula la amplitud como $a=(M-m)/2$.'
- 'Paso 3: Interpreta $a$ como la variación máxima respecto al promedio, en las unidades del contexto.'
ejemplos:
- titulo: Cálculo de la amplitud a partir de datos
  enunciado: 'La altura de una marea varía entre $0{,}5$ m y $2{,}5$ m. Calcula la amplitud del modelo.'
  solucion_pasos:
  - 'Se aplica la fórmula: $a=(2{,}5-0{,}5)/2=1$.'
  - La amplitud es $1$ metro.
- titulo: Interpretación de la amplitud en contexto
  enunciado: 'Si un modelo de temperatura tiene amplitud $8°$C y promedio $20°$C, ¿cuáles son la temperatura
    máxima y mínima?'
  solucion_pasos:
  - 'Se suma y resta la amplitud al promedio: $20+8=28$ y $20-8=12$.'
  - La temperatura máxima es $28°$C y la mínima es $12°$C.
- titulo: ¿La amplitud puede calcularse sin conocer tanto el máximo como el mínimo?
  enunciado: ¿Es posible calcular la amplitud de un fenómeno conociendo únicamente su valor máximo?
  respuesta: 'No'
  solucion_pasos:
  - Se necesitan tanto el máximo como el mínimo para calcular correctamente la amplitud.
- titulo: ¿La amplitud representa la variación total del fenómeno?
  enunciado: ¿La amplitud representa la variación total (de mínimo a máximo) del fenómeno?
  respuesta: 'No'
  solucion_pasos:
  - Representa la mitad de esa variación total, no la variación completa.
errores_frecuentes:
- Confundir la amplitud con la variación total (máximo menos mínimo), sin dividir por $2$.
- No identificar correctamente cuál valor es el máximo y cuál el mínimo.
- Confundir la amplitud con la línea media del modelo.
- Olvidar incluir las unidades correctas del contexto al interpretar la amplitud.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
