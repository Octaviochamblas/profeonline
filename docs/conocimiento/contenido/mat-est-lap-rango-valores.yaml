semantic_id: MAT.EST.LAPLACE_MUESTRALES.RANGO_VALORES
titulo: Restricción de valores de probabilidad entre 0 y 1
objetivo: Reconocer que toda probabilidad debe estar comprendida entre 0 y 1, correspondiendo esos extremos
  a un evento imposible y a un evento seguro respectivamente.
introduccion: Ningún valor de probabilidad puede ser negativo ni mayor a 1, ya que representa una proporción
  de casos favorables sobre el total, que siempre está acotada dentro de ese rango.
resumen: Para cualquier evento $A$, se cumple que $0\le P(A)\le1$, donde $P(A)=0$ corresponde a un evento
  imposible y $P(A)=1$ a un evento seguro.
explicacion: '![Rango de valores de la probabilidad](/static/img/probabilidad/laplace/lap-rango-valores.svg)


  ### Definición formal


  Como $n(A)$ está entre 0 y $n(S)$ (inclusive), la razón $P(A)=\dfrac{n(A)}{n(S)}$ siempre está entre
  0 y 1.


  ### Desarrollo didáctico


  Una probabilidad de 0 significa que el evento nunca ocurre (imposible); una probabilidad de 1 significa
  que siempre ocurre (seguro); valores intermedios representan distintos grados de posibilidad.'
procedimiento:
- 'Paso 1: Calcula la probabilidad del evento usando la fórmula correspondiente.'
- 'Paso 2: Verifica que el resultado esté entre 0 y 1 (inclusive).'
- 'Paso 3: Si el resultado está fuera de ese rango, revisa el cálculo, ya que hay un error.'
ejemplos:
- titulo: Verificar que una probabilidad calculada es válida
  enunciado: P(A)=0,7.
  solucion_pasos:
  - Como 0≤0,7≤1, el valor es válido para una probabilidad.
- titulo: Detectar un error en un cálculo de probabilidad
  enunciado: Un cálculo da P(A)=1,5.
  solucion_pasos:
  - Este valor excede 1, por lo que indica un error en el cálculo (ninguna probabilidad puede superar
    1).
- titulo: ¿Puede una probabilidad ser negativa?
  respuesta: 'No'
  solucion_pasos:
  - No, el valor mínimo posible es 0, correspondiente a un evento imposible.
- titulo: ¿Una probabilidad de exactamente 1 indica un evento seguro?
  respuesta: Sí
  solucion_pasos:
  - Sí, corresponde exactamente al caso del evento seguro.
errores_frecuentes:
- Obtener un resultado de probabilidad mayor a 1 o negativo sin detectar el error en el cálculo.
- Confundir el rango de la probabilidad con el rango de los casos favorables o totales.
- Creer que valores intermedios cercanos a 1 son 'casi seguros' en sentido matemático estricto (aunque
  coloquialmente se use así).
fuente: 'Elaboración propia (referencia: Moraleja 404).'
estado: publicado
