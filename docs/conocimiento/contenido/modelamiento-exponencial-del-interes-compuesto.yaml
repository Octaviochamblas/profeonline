semantic_id: MAT.NUM.INTERES_COMPUESTO.MODELO_EXPONENCIAL
titulo: Modelamiento exponencial del interés compuesto
objetivo: Reconocer y modelar situaciones financieras mediante funciones exponenciales.
introduccion: Las matemáticas tienen patrones. Cuando sumas lo mismo cada vez, haces una escalera recta
  (lineal). Cuando multiplicas por lo mismo cada vez, construyes un cohete hacia el cielo (exponencial).
  Así crece el interés compuesto.
resumen: La fórmula del interés compuesto $M(t) = C \cdot (1+i)^t$ es una función exponencial $f(x) =
  a \cdot b^x$. El capital inicial '$C$' es el valor inicial ($a$), y el factor $(1+i)$ es la base de
  crecimiento ($b$).
explicacion: "En la PAES a menudo no te piden calcular dinero, sino **identificar el tipo de modelo matemático**.\n\
  \n- Interés Simple $\\rightarrow$ Suma constante $\\rightarrow$ **Modelo Lineal** (Línea recta).\n-\
  \ Interés Compuesto $\\rightarrow$ Multiplicación constante por $(1+i)$ $\\rightarrow$ **Modelo Exponencial**\
  \ (Curva).\n\nSi analizamos la fórmula $M(t) = C \\cdot (1+i)^t$ como una función:\n- La variable independiente\
  \ (la $x$) es el tiempo $t$, y está ubicada en el **exponente**.\n- Por lo tanto, el dinero crece de\
  \ forma exponencial. \n- Como la base $(1+i)$ siempre es mayor que $1$ (porque la tasa es positiva),\
  \ es una función exponencial de **crecimiento** (la curva va hacia arriba)."
procedimiento:
- 'Paso 1: Identifica si el problema describe un crecimiento donde los intereses se capitalizan.'
- 'Paso 2: Si hay capitalización, asocia inmediatamente la situación a un modelo exponencial.'
- 'Paso 3: Construye la función: $f(x) = Capital \cdot (Factor)^x$.'
ejemplos:
- titulo: Deuda de tarjeta
  enunciado: Una persona debe $100.000 en su tarjeta, la cual cobra 3% de interés compuesto mensual. Modela
    su deuda total en función de los meses 'x'.
  solucion_pasos:
  - Capital = 100.000. Tasa = 0.03. Factor = 1.03.
  - La variable tiempo es 'x'.
  - La función exponencial es $f(x) = 100.000 \cdot (1.03)^x$.
errores_frecuentes:
- Creer que la función es cuadrática porque tiene un exponente (las cuadráticas tienen el 2 fijo como
  exponente, las exponenciales tienen la variable 'x' en el exponente).
- Asignar un modelo lineal al interés compuesto.
fuente: Currículum Nacional MINEDUC.
estado: publicado
