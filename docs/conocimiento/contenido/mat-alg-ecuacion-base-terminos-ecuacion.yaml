semantic_id: MAT.ALG.ECUACION_BASE.TERMINOS_ECUACION
titulo: Términos de una Ecuación
objetivo: Descomponer los miembros de una ecuación en sus componentes individuales (términos).
introduccion: Si el Miembro es el 'país' dentro de la ecuación, los 'Términos' son las ciudades individuales. Son
  las piezas de LEGO con las que está construida la igualdad.
resumen: Los términos son las partes individuales de una ecuación o expresión que están separadas entre sí por los
  signos de suma ($+$) o resta ($-$).
explicacion: '### Definición formal


  Los sumandos y restandos conforman los términos algebraicos individuales.


  ### Desarrollo didáctico


  Veamos la ecuación: $3x - 5 = x + 7$


  Esta ecuación tiene dos Miembros, pero ¿cuántos Términos tiene?

  Cortamos la ecuación donde haya un $+$ o un $-$ que no esté dentro de un paréntesis.

  - En el primer miembro ($3x - 5$), hay dos términos: el $3x$ y el $-5$.

  - En el segundo miembro ($x + 7$), hay dos términos: la $x$ y el $+7$.


  En total, esta ecuación tiene 4 términos. Cada término viaja con su signo a la izquierda. El signo es el ''apellido''
  del término; no se lo puedes quitar.


  Tipos de términos:

  - **Término con incógnita:** Tiene letras (ej. $3x$).

  - **Término independiente:** Es un número puro sin letras (ej. $-5$ o $7$).'
procedimiento:
- 'Paso 1: Observa toda la ecuación.'
- 'Paso 2: Haz una marca imaginaria justo antes de cada signo $+$ o $-$.'
- 'Paso 3: Cada bloque que queda es un término.'
- 'Paso 4: Recuerda que el primer término de un miembro, si es positivo, tiene un $+$ invisible.'
- Los sumandos y restandos conforman los términos algebraicos individuales.
ejemplos:
- titulo: Analiza los términos de $-2x + 8 - y = 14$
  enunciado: Analiza los términos de $-2x + 8 - y = 14$.
  solucion_pasos:
  - Cortes antes de +, -, =.
  - 'Término 1: $-2x$'
  - 'Término 2: $+8$'
  - 'Término 3: $-y$'
  - 'Término 4 (en el otro miembro): $14$ (o $+14$).'
  - 'Total: 4 términos.'
- titulo: ¿Cuántos términos hay en la ecuación $5x = 20$?
  solucion_pasos:
  - El '5x' es un solo término porque la multiplicación los une. El '20' es el otro.
- titulo: 'Respecto de «Identificación de términos de una ecuación»: ¿Es correcta esta caracterización?'
  enunciado: 'Respecto de «Identificación de términos de una ecuación»: ¿Es correcta esta caracterización? «Los
    términos son las partes individuales de una ecuación o expresión que están separadas entre sí por los signos
    de suma ($+$) o resta ($-$)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Los términos son las partes individuales de una ecuación o
    expresión que están separadas entre sí por los signos de suma ($+$) o resta ($-$).'
- titulo: 'Respecto de «Identificación de términos de una ecuación»: ¿Es válida esta afirmación? «Separ'
  enunciado: 'Respecto de «Identificación de términos de una ecuación»: ¿Es válida esta afirmación? «Separar términos
    por multiplicaciones (ej. decir que $3x$ son dos términos, el 3 y la x. ¡Falso, la multiplicación los pega!)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Los términos son las partes individuales de una ecuación o
    expresión que están separadas entre sí por los signos de suma ($+$) o resta ($-$).'
errores_frecuentes:
- Separar términos por multiplicaciones (ej. decir que $3x$ son dos términos, el 3 y la x. ¡Falso, la multiplicación
  los pega!).
- Olvidar incluir el signo negativo al identificar el término.
- Los signos de multiplicación ($\cdot$) y división ($\div$).
- Únicamente el signo de igualdad ($=$).
- Los paréntesis y corchetes.
