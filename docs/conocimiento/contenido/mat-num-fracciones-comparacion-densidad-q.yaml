semantic_id: MAT.NUM.FRACCIONES_COMPARACION.DENSIDAD_Q
titulo: Densidad de los números racionales
objetivo: Reconocer que entre dos racionales distintos siempre existe otro racional.
introduccion: A diferencia de los números enteros, donde entre 2 y 3 no hay otro entero, entre dos racionales
  distintos —por más cercanos que estén— siempre es posible encontrar otro número racional intermedio.
resumen: 'Los números racionales son densos: entre dos racionales distintos cualesquiera existe siempre
  otro número racional.'
explicacion: '### Definición formal


  Dados \(p,q\in\mathbb{Q}\) con \(p<q\), el promedio \(\frac{p+q}{2}\) es racional y cumple \(p<\frac{p+q}{2}<q\),
  lo que prueba que siempre existe un racional intermedio.


  ### Desarrollo didáctico


  Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\), que es su promedio: \(\frac{\frac{1}{2}+\frac{3}{4}}{2}=\frac{\frac{2}{4}+\frac{3}{4}}{2}=\frac{\frac{5}{4}}{2}=\frac{5}{8}\).
  Este proceso puede repetirse indefinidamente, mostrando que entre dos racionales hay infinitos racionales.'
procedimiento:
- 'Paso 1: Ordena los dos racionales y verifica que sean distintos.'
- 'Paso 2: Calcula su promedio \((a+b)/2\), que queda estrictamente entre ambos.'
- 'Paso 3: Comprueba las dos desigualdades y reconoce que el proceso puede repetirse indefinidamente.'
ejemplos:
- titulo: 'Aplicación razonada — Densidad de Q: entre dos racionales siempre hay otro racional'
  enunciado: Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\).
  solucion_pasos:
  - Ordena los dos racionales y verifica que sean distintos.
  - Calcula su promedio \((a+b)/2\), que queda estrictamente entre ambos.
  - Comprueba las dos desigualdades y reconoce que el proceso puede repetirse indefinidamente.
- titulo: 'Revisión de una solución — Densidad de Q: entre dos racionales siempre hay otro racional'
  enunciado: Una solución aplica “Calcula su promedio \((a+b)/2\), que queda estrictamente entre ambos.”,
    pero termina sin comprobar que no existen racionales consecutivos en la recta numérica. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define densidad de Q: entre dos racionales siempre hay otro racional: la
    densidad de \(\mathbb{Q}\) significa que entre dos números racionales distintos siempre existe otro
    número racional.'
  - Ordena los dos racionales y verifica que sean distintos.
  - 'Completa la revisión con este control: Comprueba las dos desigualdades y reconoce que el proceso
    puede repetirse indefinidamente.'
- titulo: '¿Se cumple que no existen racionales consecutivos en la recta numérica? — Densidad de Q: entre
    dos racionales siempre hay otro racional'
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la densidad de \(\mathbb{Q}\) significa que entre dos números
    racionales distintos siempre existe otro número racional.
  - El caso “Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\)” satisface esa condición.
  - Comprueba las dos desigualdades y reconoce que el proceso puede repetirse indefinidamente.
- titulo: '¿Es válido omitir el paso “Ordena los dos racionales y verifica que sean distintos”? — Densidad
    de Q: entre dos racionales siempre hay otro racional'
  respuesta: 'No'
  solucion_pasos:
  - 'No. Ese paso comprueba una condición necesaria de densidad de Q: entre dos racionales siempre hay
    otro racional.'
  - 'Omitirlo puede volver inválida la acción siguiente: Calcula su promedio \((a+b)/2\), que queda estrictamente
    entre ambos.'
  - 'La solución debe terminar de este modo: Comprueba las dos desigualdades y reconoce que el proceso
    puede repetirse indefinidamente.'
errores_frecuentes:
- 'Empezar densidad de Q: entre dos racionales siempre hay otro racional sin realizar este control inicial:
  Ordena los dos racionales y verifica que sean distintos.'
- Memorizar “Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\)” como respuesta aislada, sin
  reconstruir la definición que lo justifica.
- Convertir en receta el paso “Calcula su promedio \((a+b)/2\), que queda estrictamente entre ambos.”
  y usarlo aunque cambien las condiciones del problema.
- 'Dar por válida una conclusión sobre densidad de Q: entre dos racionales siempre hay otro racional que
  contradice el criterio “No existen racionales consecutivos en la recta numérica”.'
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba las dos desigualdades y reconoce que
  el proceso puede repetirse indefinidamente.'
