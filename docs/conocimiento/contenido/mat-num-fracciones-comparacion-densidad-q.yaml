semantic_id: MAT.NUM.FRACCIONES_COMPARACION.DENSIDAD_Q
objetivo: Encontrar un racional entre otros dos.
introduccion: 'La afirmación “No existen racionales consecutivos en la recta numérica”
  se puede comprobar en Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\).
  Este recurso desarrolla el razonamiento de densidad de Q: entre dos racionales siempre
  hay otro racional que conecta ambas ideas.'
resumen: La densidad de \(\mathbb{Q}\) significa que entre dos números racionales
  distintos siempre existe otro número racional. Como criterio de control, no existen
  racionales consecutivos en la recta numérica
explicacion: |-
  La densidad de \(\mathbb{Q}\) significa que entre dos números racionales distintos siempre existe otro número racional.

  Esta formulación se hace concreta en “Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\)”. Allí puede reconocerse que no existen racionales consecutivos en la recta numérica.
procedimiento:
- 'Paso 1: Ordena los dos racionales y verifica que sean distintos.'
- 'Paso 2: Calcula su promedio \((a+b)/2\), que queda estrictamente entre ambos.'
- 'Paso 3: Comprueba las dos desigualdades y reconoce que el proceso puede repetirse
  indefinidamente.'
ejemplos:
- titulo: 'Aplicación razonada — Densidad de Q: entre dos racionales siempre hay otro
    racional'
  enunciado: Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\).
  solucion_pasos:
  - Ordena los dos racionales y verifica que sean distintos.
  - Calcula su promedio \((a+b)/2\), que queda estrictamente entre ambos.
  - Comprueba las dos desigualdades y reconoce que el proceso puede repetirse indefinidamente.
- titulo: 'Revisión de una solución — Densidad de Q: entre dos racionales siempre
    hay otro racional'
  enunciado: Una solución aplica “Calcula su promedio \((a+b)/2\), que queda estrictamente
    entre ambos.”, pero termina sin comprobar que no existen racionales consecutivos
    en la recta numérica. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define densidad de Q: entre dos racionales siempre
    hay otro racional: la densidad de \(\mathbb{Q}\) significa que entre dos números
    racionales distintos siempre existe otro número racional.'
  - Ordena los dos racionales y verifica que sean distintos.
  - 'Completa la revisión con este control: Comprueba las dos desigualdades y reconoce
    que el proceso puede repetirse indefinidamente.'
- titulo: '¿Se cumple que no existen racionales consecutivos en la recta numérica?
    — Densidad de Q: entre dos racionales siempre hay otro racional'
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la densidad de \(\mathbb{Q}\) significa
    que entre dos números racionales distintos siempre existe otro número racional.
  - El caso “Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\)” satisface
    esa condición.
  - Comprueba las dos desigualdades y reconoce que el proceso puede repetirse indefinidamente.
- titulo: '¿Es válido omitir el paso “Ordena los dos racionales y verifica que sean
    distintos”? — Densidad de Q: entre dos racionales siempre hay otro racional'
  respuesta: 'No'
  solucion_pasos:
  - 'No. Ese paso comprueba una condición necesaria de densidad de Q: entre dos racionales
    siempre hay otro racional.'
  - 'Omitirlo puede volver inválida la acción siguiente: Calcula su promedio \((a+b)/2\),
    que queda estrictamente entre ambos.'
  - 'La solución debe terminar de este modo: Comprueba las dos desigualdades y reconoce
    que el proceso puede repetirse indefinidamente.'
errores_frecuentes:
- 'Empezar densidad de Q: entre dos racionales siempre hay otro racional sin realizar
  este control inicial: Ordena los dos racionales y verifica que sean distintos.'
- Memorizar “Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\)” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Calcula su promedio \((a+b)/2\), que queda estrictamente
  entre ambos.” y usarlo aunque cambien las condiciones del problema.
- 'Dar por válida una conclusión sobre densidad de Q: entre dos racionales siempre
  hay otro racional que contradice el criterio “No existen racionales consecutivos
  en la recta numérica”.'
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba las dos desigualdades
  y reconoce que el proceso puede repetirse indefinidamente.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
