semantic_id: MAT.NUM.FRACCIONES_COMPARACION.DENSIDAD_Q
objetivo: 'Comprender densidad de q: entre dos racionales siempre hay otro racional
  y aplicarlo correctamente en ejercicios básicos con números racionales.'
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso densidad de q: entre dos racionales siempre hay otro racional ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: La densidad de \(\mathbb{q}\) significa que entre dos números racionales
  distintos siempre existe otro número racional. Además, no existen racionales consecutivos
  en la recta numérica.
explicacion: |-
  La densidad de \(\mathbb{q}\) significa que entre dos números racionales distintos siempre existe otro número racional.

  Una idea importante es que no existen racionales consecutivos en la recta numérica.

  Por ejemplo, Entre \(\frac{1}{2}\) y \(\frac{3}{4}\) está \(\frac{5}{8}\).
procedimiento:
- 'Paso 1: Elegir una estrategia conveniente: simplificar, amplificar, usar productos
  cruzados o un denominador común.'
- 'Paso 2: Ejecutar la comparación o transformación paso a paso, cuidando el valor
  de la fracción.'
- 'Paso 3: Interpretar el resultado y expresarlo con lenguaje matemático claro.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'Explica por qué la afirmación “Entre \(\frac{1}{2}\) y \(\frac{3}{4}\)
    está \(\frac{5}{8}\).” se relaciona con densidad de q: entre dos racionales siempre
    hay otro racional.'
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: la densidad de \(\mathbb{Q}\) significa que entre
    dos números racionales distintos siempre existe otro número racional.'
  - 'Concluye que el ejemplo sí ilustra densidad de q: entre dos racionales siempre
    hay otro racional.'
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “No existen racionales consecutivos en la recta
    numérica.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: '¿La siguiente idea es coherente con densidad de q: entre dos racionales
    siempre hay otro racional?'
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que no existen racionales consecutivos en la
    recta numérica.
  - Por eso la respuesta correcta es afirmativa.
- titulo: '¿Se puede usar densidad de q: entre dos racionales siempre hay otro racional
    ignorando la definición o las condiciones del problema?'
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- 'Se puede aplicar densidad de q: entre dos racionales siempre hay otro racional
  sin mirar qué representan numerador, denominador o cifra decimal.'
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
