semantic_id: MAT.EST.NORMAL_BASE.FUNCION_DENSIDAD
titulo: Comprender el concepto de función de densidad de probabilidad
objetivo: Comprender la función de densidad como la herramienta que describe cómo se distribuye la probabilidad en una
  variable aleatoria continua.
introduccion: En variables continuas no se puede hablar de la probabilidad de un solo valor exacto; en su lugar se usa
  una curva que muestra dónde es más probable que caigan los datos.
resumen: La función de densidad de probabilidad es una curva que describe cómo se distribuye la probabilidad de una
  variable aleatoria continua a lo largo de su recorrido.
explicacion: '![Función de densidad](/static/img/estadistica/normbase/normbase-funcion-densidad.svg)


  ### Definición formal


  La función de densidad de probabilidad $f(x)$ de una variable aleatoria continua describe la forma de la distribución;

  el área bajo su curva entre dos valores representa la probabilidad de que la variable caiga en ese intervalo.


  ### Desarrollo didáctico


  A diferencia de las variables discretas, donde se asigna una probabilidad a cada valor puntual, en las variables

  continuas la probabilidad se asocia siempre a intervalos, usando el área bajo la curva de densidad.'
procedimiento:
- 'Paso 1: Reconoce que la variable en estudio es continua.'
- 'Paso 2: Identifica la curva de densidad que describe su distribución.'
- 'Paso 3: Interpreta el área bajo la curva entre dos valores como una probabilidad.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: ¿Qué representa la función de densidad de una variable continua?
  solucion_pasos:
  - Representa cómo se distribuye la probabilidad de la variable a lo largo de su recorrido.
  - Su forma indica en qué zonas es más o menos probable encontrar valores de la variable.
- titulo: Ejemplo 2
  enunciado: ¿Cómo se calcula la probabilidad de que una variable continua caiga en un intervalo dado?
  solucion_pasos:
  - Se calcula como el área bajo la curva de densidad entre los dos extremos de ese intervalo.
- titulo: ¿La función de densidad describe cómo se distribuye la probabilidad de una variable continua?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es su función principal.
- titulo: ¿La función de densidad asigna una probabilidad exacta a cada valor puntual?
  respuesta: 'No'
  solucion_pasos:
  - 'No, en variables continuas la probabilidad se asocia a intervalos, no a valores puntuales.'
errores_frecuentes:
- Confundir la función de densidad con una probabilidad directa en un punto específico.
- Creer que la altura de la curva en un punto es la probabilidad de ese valor.
- Pensar que la función de densidad puede tomar valores negativos.
- Confundir el concepto de densidad con el de frecuencia absoluta.
- Olvidar que la probabilidad siempre corresponde al área bajo la curva, no a un solo punto.
fuente: 'Elaboración propia.'
estado: publicado
