semantic_id: MAT.GEO.POLIEDROS_PRISMAS.ARISTAS
titulo: Identificación de las aristas de un poliedro
objetivo: 'Identificar correctamente las aristas de un poliedro: los segmentos de recta donde se encuentran
  (intersectan) dos caras adyacentes.'
introduccion: Cada 'borde recto' que se ve en un poliedro, como el filo de un dado, es lo que en geometría
  se llama arista.
resumen: Las aristas de un poliedro son los segmentos de recta donde se intersectan dos caras adyacentes.
explicacion: '![Aristas de un poliedro](/static/img/geometria/espacio-cuerpos/poliedro-aristas.svg)


  ### Definición formal


  Una arista de un poliedro es el segmento de recta donde se encuentran (se intersectan) exactamente dos
  caras adyacentes. Cada cara está delimitada por varias aristas, y cada arista es compartida por exactamente
  dos caras.


  ### Desarrollo didáctico


  En la figura, el segmento $AB$ es una arista del prisma: es el borde donde se unen la cara frontal y
  la cara inferior. Un prisma rectangular tiene en total 12 aristas.'
procedimiento:
- 'Paso 1: Observa dónde se encuentran (se tocan) dos caras adyacentes del poliedro.'
- 'Paso 2: Identifica el segmento de recta formado en esa intersección; ese segmento es una arista.'
- 'Paso 3: Cuenta el total de aristas para caracterizar completamente el poliedro.'
ejemplos:
- titulo: Identificar una arista en un prisma rectangular
  enunciado: El segmento AB es donde se unen dos caras del prisma.
  solucion_pasos:
  - AB es una arista del prisma, ya que es el segmento donde se intersectan dos caras adyacentes.
- titulo: Contar el total de aristas de un prisma rectangular
  enunciado: Un prisma rectangular tiene 4 aristas en cada base y 4 aristas verticales que las conectan.
  solucion_pasos:
  - 'En total tiene 12 aristas: 4 de la base superior, 4 de la base inferior, y 4 verticales.'
- titulo: ¿Cada arista es compartida por exactamente dos caras?
  respuesta: Sí
  solucion_pasos:
  - Sí, en un poliedro estándar cada arista es el límite común entre exactamente dos caras adyacentes.
- titulo: ¿Una arista puede ser una curva en vez de un segmento recto?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición, las aristas de un poliedro son siempre segmentos de recta, ya que las caras son
    planas.
errores_frecuentes:
- Confundir una arista con una cara (la arista es un segmento, la cara es una región).
- Olvidar contar las aristas verticales (o de conexión) al enumerar el total en un prisma.
- Creer que una arista puede ser compartida por más de dos caras en un poliedro convexo estándar.
fuente: 'Elaboración propia (referencias: Moraleja 96, Cid 167).'
estado: publicado
