semantic_id: MAT.ALG.FRACCIONES_BASE.SIMPLIFICACION_FACTORIZACION
titulo: Simplificación con Polinomios (Factorizar primero)
objetivo: Aprender a simplificar fracciones que contienen sumas o restas mediante la factorización previa.
introduccion: 'Aquí es donde los estudiantes novatos caen como moscas. Tachan cosas que no deberían tachar. Existe
  una regla inquebrantable en las fracciones algebraicas: nunca puedes tachar términos que se estén sumando o restando.'
resumen: Para simplificar una fracción con polinomios, primero DEBES FACTORIZAR completamente tanto el numerador
  como el denominador. Solo se pueden simplificar (tachar) factores completos (paréntesis multiplicativos) que sean
  idénticos.
explicacion: '### Definición formal


  El 4 en el numerador es un sumando, no un factor. (Como probar (2+4)/4 -> 6/4 = 1.5, pero si tacharas daría 2).


  ### Desarrollo didáctico


  El error más catastrófico en álgebra es tachar (simplificar) letras o números que están sumando o restando.


  Si tienes $\frac{x^2 + 2x}{x}$, ESTÁ PROHIBIDO tachar la ''x'' de arriba con la de abajo.


  **Ley Universal de Simplificación:** SOLO puedes simplificar factores. Un factor es algo que está MULTIPLICANDO
  a todo lo demás. Los términos que suman o restan están blindados y no se pueden separar.


  Para poder simplificar, debes **Factorizar primero**. Transformar las sumas en multiplicaciones de paréntesis.

  - Paso 1: Toma el numerador $x^2 + 2x$ y extrae factor común ''x''. Queda: $x(x + 2)$.

  - Paso 2: Reescribe la fracción: $\frac{x(x + 2)}{x}$.

  - Paso 3: Ahora sí. Como la ''x'' está multiplicando a todo el paréntesis, puedes tacharla con la ''x'' que está
  multiplicando sola abajo.

  - Resultado final: $x + 2$.


  Si no hay multiplicaciones puras, no puedes simplificar.'
procedimiento:
- 'Paso 1: Ignora tu instinto de tachar letras sueltas a simple vista.'
- 'Paso 2: Factoriza el numerador lo máximo que puedas.'
- 'Paso 3: Factoriza el denominador lo máximo que puedas.'
- 'Paso 4: Busca paréntesis (o monomios sueltos) enteros que sean idénticos arriba y abajo, y cancélelos.'
ejemplos:
- titulo: Simplifica $\frac{a^2 - b^2}{a+b}$
  enunciado: Simplifica $\frac{a^2 - b^2}{a+b}$.
  solucion_pasos:
  - 1. No puedes tachar 'a' con 'a'.
  - '2. Factoriza arriba (Diferencia de cuadrados): $(a+b)(a-b)$.'
  - '3. Abajo ya es irreducible: $(a+b)$.'
  - '4. Fracción: $\frac{(a+b)(a-b)}{(a+b)}$.'
  - '5. Cancela el bloque entero $(a+b)$. Resultado: $a-b$.'
- titulo: Simplifica $\frac{x^2-3x}{x-3}$.
  solucion_pasos:
  - 'Arriba factor común: x(x-3). Abajo: (x-3). Se cancela (x-3) completo.'
- titulo: 'Respecto de «Simplificación de fracciones mediante factorización de polinomios»: ¿Es correct'
  enunciado: 'Respecto de «Simplificación de fracciones mediante factorización de polinomios»: ¿Es correcta esta
    caracterización? «Para simplificar una fracción con polinomios, primero DEBES FACTORIZAR completamente tanto
    el numerador como el denominador»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para simplificar una fracción con polinomios, primero DEBES
    FACTORIZAR completamente tanto el numerador como el denominador.'
- titulo: 'Respecto de «Simplificación de fracciones mediante factorización de polinomios»: ¿Es válida'
  enunciado: 'Respecto de «Simplificación de fracciones mediante factorización de polinomios»: ¿Es válida esta afirmación?
    «Tachar un sumando (ej. en $(x+4)/4$, tachar los cuatros)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para simplificar una fracción con polinomios, primero DEBES
    FACTORIZAR completamente tanto el numerador como el denominador.'
errores_frecuentes:
- Tachar un sumando (ej. en $(x+4)/4$, tachar los cuatros).
- Tachar partes internas de un paréntesis.
- Porque el 4 de arriba no es múltiplo de x.
- Porque da x, y debería dar x+1.
- Para «¿Por qué es matemáticamente incorrecto simplificar los números '4' en la expresión $\frac{x+4}{4}$», la
  respuesta correcta es Porque no tienen exponentes.
estado: publicado
