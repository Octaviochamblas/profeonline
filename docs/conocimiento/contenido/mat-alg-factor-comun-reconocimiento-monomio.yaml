semantic_id: MAT.ALG.FACTOR_COMUN.RECONOCIMIENTO_MONOMIO
titulo: Reconocimiento del factor común monomio
objetivo: Comprender reconocimiento del factor común monomio y aplicarlo con precisión.
introduccion: Antes de extraer un factor común hay que identificar qué número y qué letras dividen exactamente a
  todos los términos del polinomio.
resumen: Dominar las tablas permite detectar múltiplos comunes inmediatamente.
explicacion: '### Definición formal


  Dado un polinomio con coeficientes $c_1, c_2, \dots, c_n$ y partes literales $x^{e_1}, x^{e_2}, \dots, x^{e_n}$,
  el factor común monomio es el producto entre el Máximo Común Divisor de los coeficientes y la variable elevada
  al menor exponente presente en todos los términos.


  ### Desarrollo didáctico


  5 es el MCD de los coeficientes, y luego falta analizar las variables.


  La variable ''a'' se visualiza presente en los tres términos de la suma.


  4 es el MCD de 8, 4, y 12. y^2 es el menor exponente.'
procedimiento:
- 5 es el MCD de los coeficientes, y luego falta analizar las variables.
- La variable 'a' se visualiza presente en los tres términos de la suma.
- 4 es el MCD de 8, 4, y 12. y^2 es el menor exponente.
ejemplos:
- titulo: Un escaneo rápido de $15x - 3y$ revela que el factor común es 3
  enunciado: ¿Un escaneo rápido de $15x - 3y$ revela que el factor común es 3?
  solucion_pasos:
  - El MCD de 15 y 3 es 3. No hay letras repetidas.
  - 'Respuesta: Verdadero'
- titulo: El factor común en $-2a^2 - 4a$ es obligatoriamente $-2a$ (negativo)
  enunciado: ¿El factor común en $-2a^2 - 4a$ es obligatoriamente $-2a$ (negativo)?
  solucion_pasos:
  - Extraer el signo negativo en polinomios donde el coeficiente principal es negativo es la práctica estándar recomendada.
  - 'Respuesta: Verdadero'
- titulo: 'Respecto de «Reconocimiento del factor común monomio»: ¿Se ajusta a la definición esta afirm'
  enunciado: 'Respecto de «Reconocimiento del factor común monomio»: ¿Se ajusta a la definición esta afirmación?
    «Dominar las tablas permite detectar múltiplos comunes inmediatamente»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Dominar las tablas permite detectar múltiplos comunes inmediatamente.'
- titulo: 'Respecto de «Reconocimiento del factor común monomio»: ¿Es compatible con el procedimiento e'
  enunciado: 'Respecto de «Reconocimiento del factor común monomio»: ¿Es compatible con el procedimiento esta afirmación?
    «Geometría»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Dominar las tablas permite detectar múltiplos comunes inmediatamente.'
errores_frecuentes:
- Geometría.
- Para «¿Qué habilidad matemática previa es esencial para reconocer rápidamente un MCD», la respuesta correcta es
  Suma de fracciones.
- Para «¿Qué habilidad matemática previa es esencial para reconocer rápidamente un MCD», la respuesta correcta es
  Ecuaciones diferenciales.
- Que el factor común es 5.
- Para «Al escanear $35m^3 - 25m^2$, tu cerebro nota de inmediato el número 5. ¿Qué te indica esto», la respuesta
  correcta es Que 5 es el exponente.
