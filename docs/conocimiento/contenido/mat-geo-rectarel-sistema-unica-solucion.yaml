semantic_id: MAT.GEO.RECTA_RELACIONES.SISTEMA_UNICA_SOLUCION
titulo: Interpretación de sistema con única solución como rectas secantes
objetivo: Interpretar que un sistema de dos ecuaciones lineales con única solución corresponde geométricamente
  a dos rectas secantes que se cruzan en un solo punto.
introduccion: La cantidad de soluciones de un sistema de dos ecuaciones lineales tiene una interpretación
  geométrica directa en términos de la posición relativa de las rectas que representan.
resumen: Un sistema de dos ecuaciones lineales tiene una única solución si y solo si las rectas que representa
  son secantes, es decir, tienen pendientes distintas.
explicacion: '![Sistema con única solución](/static/img/geometria/analitica/rectarel-sistema-unica-solucion.svg)


  ### Definición formal


  Si $m_1\neq m_2$, el sistema formado por $y=m_1x+b_1$ e $y=m_2x+b_2$ tiene exactamente una solución,
  correspondiente al único punto de intersección de ambas rectas.


  ### Desarrollo didáctico


  El sistema formado por $y=x$ e $y=-x+4$ tiene única solución $(2,2)$, ya que sus pendientes (1 y -1)
  son distintas.'
procedimiento:
- 'Paso 1: Escribe ambas ecuaciones en forma principal.'
- 'Paso 2: Compara sus pendientes.'
- 'Paso 3: Si son distintas, concluye que el sistema tiene única solución (rectas secantes).'
ejemplos:
- titulo: Determinar que un sistema tiene única solución
  enunciado: y=x, y=-x+4.
  solucion_pasos:
  - 'Pendientes distintas (1 y -1), por lo que el sistema tiene única solución: el punto (2,2).'
- titulo: Verificar la unicidad de solución en un sistema en forma general
  enunciado: 2x+y-5=0, x-y+1=0.
  solucion_pasos:
  - 'Despejando: y=-2x+5 e y=x+1, con pendientes distintas (-2 y 1), por lo que hay única solución.'
- titulo: ¿Un sistema con pendientes distintas siempre tiene solución única?
  respuesta: Sí
  solucion_pasos:
  - Sí, pendientes distintas garantizan exactamente un punto de intersección.
- titulo: ¿Puede un sistema con la misma pendiente tener solución única?
  respuesta: 'No'
  solucion_pasos:
  - No, en ese caso el sistema no tiene solución (rectas paralelas) o tiene infinitas (rectas coincidentes).
errores_frecuentes:
- Concluir que un sistema tiene solución única sin verificar realmente que las pendientes sean distintas.
- Confundir la condición de solución única con la de infinitas soluciones.
- Olvidar convertir ambas ecuaciones a una forma comparable antes de comparar pendientes.
fuente: 'Elaboración propia (referencia: Carreño 184).'
estado: publicado
