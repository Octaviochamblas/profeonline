semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.INVERSO_MULTIPLICATIVO
titulo: Inverso multiplicativo de una fracción
objetivo: Determinar el inverso multiplicativo de una fracción dada.
introduccion: 'Todo número racional distinto de cero tiene un inverso multiplicativo: otro número que,
  al multiplicarlo por el original, da como resultado 1. Para fracciones, este inverso se obtiene invirtiendo
  numerador y denominador.'
resumen: El inverso multiplicativo de \(\frac{a}{b}\) (con \(a,b\neq0\)) es \(\frac{b}{a}\), pues \(\frac{a}{b}\cdot\frac{b}{a}=1\).
explicacion: '### Definición formal


  El inverso multiplicativo de \(\frac{a}{b}\) es el número \(\frac{b}{a}\) que cumple \(\frac{a}{b}\cdot\frac{b}{a}=\frac{a\cdot
  b}{b\cdot a}=1\).


  ### Desarrollo didáctico


  El inverso de \(\frac{3}{8}\) es \(\frac{8}{3}\), porque al multiplicarlos: \(\frac{3}{8}\cdot\frac{8}{3}=\frac{24}{24}=1\).'
procedimiento:
- 'Paso 1: Verifica que numerador y denominador sean distintos de cero antes de invertir.'
- 'Paso 2: Intercambia ambos términos y conserva el signo global de la fracción.'
- 'Paso 3: Comprueba el recíproco calculando que el producto con la fracción original sea \(1\).'
ejemplos:
- titulo: Aplicación razonada — Identificación del inverso multiplicativo de una fracción
  enunciado: El inverso de \(\frac{3}{8}\) es \(\frac{8}{3}\).
  solucion_pasos:
  - Verifica que numerador y denominador sean distintos de cero antes de invertir.
  - Intercambia ambos términos y conserva el signo global de la fracción.
  - Comprueba el recíproco calculando que el producto con la fracción original sea \(1\).
- titulo: Revisión de una solución — Identificación del inverso multiplicativo de una fracción
  enunciado: Una solución aplica “Intercambia ambos términos y conserva el signo global de la fracción.”,
    pero termina sin comprobar que al multiplicar una fracción no nula por su inverso multiplicativo se
    obtiene 1. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación del inverso multiplicativo de una fracción: el inverso
    multiplicativo de una fracción no nula se obtiene invirtiendo numerador y denominador.'
  - Verifica que numerador y denominador sean distintos de cero antes de invertir.
  - 'Completa la revisión con este control: Comprueba el recíproco calculando que el producto con la fracción
    original sea \(1\).'
- titulo: ¿Se cumple que al multiplicar una fracción no nula por su inverso multiplicativo se obtiene
    1? — Identificación del inverso multiplicativo de una fracción
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el inverso multiplicativo de una fracción no nula se obtiene
    invirtiendo numerador y denominador.
  - El caso “El inverso de \(\frac{3}{8}\) es \(\frac{8}{3}\)” satisface esa condición.
  - Comprueba el recíproco calculando que el producto con la fracción original sea \(1\).
- titulo: ¿Es válido omitir el paso “Verifica que numerador y denominador sean distintos de cero antes
    de invertir”? — Identificación del inverso multiplicativo de una fracción
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación del inverso multiplicativo de una
    fracción.
  - 'Omitirlo puede volver inválida la acción siguiente: Intercambia ambos términos y conserva el signo
    global de la fracción.'
  - 'La solución debe terminar de este modo: Comprueba el recíproco calculando que el producto con la
    fracción original sea \(1\).'
errores_frecuentes:
- 'Empezar identificación del inverso multiplicativo de una fracción sin realizar este control inicial:
  Verifica que numerador y denominador sean distintos de cero antes de invertir.'
- Memorizar “El inverso de \(\frac{3}{8}\) es \(\frac{8}{3}\)” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Intercambia ambos términos y conserva el signo global de la fracción.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación del inverso multiplicativo de una fracción que contradice
  el criterio “Al multiplicar una fracción no nula por su inverso multiplicativo se obtiene 1”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba el recíproco calculando que el producto
  con la fracción original sea \(1\).'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
estado: publicado
