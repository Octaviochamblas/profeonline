semantic_id: MAT.NUM.PROP_COMPUESTA.FORMULA_GENERALIZADA
objetivo: Utilizar la fórmula generalizada para resolver proporciones compuestas.
introduccion: 'Si el método de las fracciones te parece lento, existe un ''atajo''
  usado por los ingenieros: la fórmula generalizada de proporcionalidad. Con ella,
  agruparás todas las variables en un solo paso matemático.'
resumen: 'La fórmula generalizada establece que una constante $K$ agrupa todas las
  variables: las magnitudes directamente proporcionales van en el denominador, y las
  inversamente proporcionales en el numerador.'
explicacion: 'En lugar de armar fracciones e invertirlas, podemos definir una gran
  **Constante de Proporcionalidad Compuesta ($K$)**.


  Para armarla, tomamos la variable principal (usualmente la que tiene la incógnita)
  y miramos su relación con las demás:

  - Si $A$ es **Inversa** a la principal, se **multiplica** ($A \cdot \text{Principal}$).

  - Si $B$ es **Directa** a la principal, se **divide** ($Principal / B$).


  Entonces, la expresión queda: $$K = \frac{\text{Principal} \cdot \text{Inversas}}{\text{Directas}}$$

  Esta expresión debe arrojar el mismo valor $K$ para la situación inicial y para
  la situación final.'
procedimiento:
- 'Paso 1: Identifica si cada variable secundaria es directa o inversa respecto a
  la principal.'
- 'Paso 2: Escribe la fórmula $K = (Principal \cdot Inversas) / Directas$.'
- 'Paso 3: Iguala la fórmula con los datos del Escenario 1 a la fórmula con los datos
  del Escenario 2, y despeja la incógnita.'
ejemplos:
- titulo: Aplicando la fórmula generalizada
  enunciado: La producción ($P$, principal) depende de los Obreros ($O$, directa)
    y de las Horas ($H$, directa).
  solucion_pasos:
  - Como $O$ y $H$ son directas respecto a $P$, van en el denominador.
  - 'Fórmula: $K = P / (O \cdot H)$.'
  - 'Si nos dan datos, igualamos: $P_1 / (O_1 \cdot H_1) = P_2 / (O_2 \cdot H_2)$.'
errores_frecuentes:
- Poner las variables inversas en el denominador y las directas en el numerador.
- Olvidarse de incluir la variable principal en el numerador.
- Multiplicar todo en línea sin hacer división.
fuente: Currículum Nacional MINEDUC.
estado: publicado
