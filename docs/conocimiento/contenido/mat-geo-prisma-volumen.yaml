semantic_id: MAT.GEO.POLIEDROS_PRISMAS.PRISMA_VOLUMEN
titulo: Cálculo del volumen de un prisma recto
objetivo: Calcular el volumen de un prisma recto multiplicando el área de su base por su altura.
introduccion: El volumen de un prisma se puede imaginar como 'apilar' copias del área de la base a lo
  largo de toda la altura del cuerpo.
resumen: El volumen de un prisma recto se calcula como $V = A_{base} \times h$, donde $A_{base}$ es el
  área de la base y $h$ es la altura del prisma.
explicacion: '![Volumen de un prisma recto](/static/img/geometria/espacio-cuerpos/prisma-volumen.svg)


  ### Definición formal


  El volumen de un prisma recto es el producto entre el área de su base y su altura: $V=A_{base}\times
  h$. Esta fórmula aplica sin importar la forma poligonal de la base (triangular, cuadrada, hexagonal,
  etc.).


  ### Desarrollo didáctico


  Si un prisma tiene base rectangular de área 24 cm² y altura 10 cm, su volumen es $V=24\times10=240$
  cm³. Esta misma lógica aplica para prismas de cualquier forma de base, siempre que se conozca correctamente
  su área.'
procedimiento:
- 'Paso 1: Calcula el área de la base del prisma (A_base), según su forma poligonal.'
- 'Paso 2: Identifica la altura del prisma (h), es decir, la distancia perpendicular entre las dos bases.'
- 'Paso 3: Multiplica el área de la base por la altura para obtener el volumen: V=A_base×h.'
ejemplos:
- titulo: Calcular el volumen de un prisma rectangular
  enunciado: Un prisma tiene base rectangular de área 24 cm² y altura 10 cm.
  solucion_pasos:
  - V=24×10=240 cm³.
- titulo: Calcular la altura a partir del volumen
  enunciado: Un prisma tiene volumen 180 cm³ y área de base 15 cm².
  solucion_pasos:
  - 180=15×h → h=180/15=12 cm.
- titulo: ¿Esta fórmula aplica para cualquier forma de base?
  respuesta: Sí
  solucion_pasos:
  - Sí, la fórmula V=A_base×h aplica sin importar si la base es triangular, cuadrada, pentagonal, etc.
- titulo: ¿El volumen del prisma depende del perímetro de la base?
  respuesta: 'No'
  solucion_pasos:
  - No, el volumen depende del área de la base, no de su perímetro (el perímetro se usa para el área lateral,
    no para el volumen).
errores_frecuentes:
- Confundir el área de la base con su perímetro al aplicar la fórmula del volumen.
- Usar la altura de una cara lateral en vez de la altura real del prisma (distancia entre bases).
- Confundir esta fórmula con la del área total del prisma.
fuente: 'Elaboración propia (referencias: Moraleja 98, Cid 181).'
estado: publicado
