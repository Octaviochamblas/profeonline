semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.DEMOSTRACION_LEY_SENOS
titulo: Demostración geométrica de la ley de senos mediante alturas
objetivo: Demostrar la ley de senos trazando la altura desde un vértice del triángulo, expresándola de
  dos formas equivalentes mediante seno de los ángulos adyacentes.
introduccion: Al trazar una altura dentro de un triángulo oblicuángulo, se forman dos triángulos rectángulos
  que comparten esa altura, lo que permite relacionar los ángulos y lados originales.
resumen: Trazando la altura $h$ desde el vértice $C$ hasta el lado $AB$, se cumple $h=b\sin A=a\sin B$,
  de donde se deduce $\dfrac{a}{\sin A}=\dfrac{b}{\sin B}$.
explicacion: '![Demostración de la ley de senos](/static/img/geometria/trigonometria/oblicu-demostracion-ley-senos.svg)


  ### Definición formal


  Sea $H$ el pie de la altura trazada desde $C$ hasta $AB$. En el triángulo rectángulo $ACH$, $\sin A=\dfrac{h}{b}$,
  por lo que $h=b\sin A$. En el triángulo rectángulo $BCH$, $\sin B=\dfrac{h}{a}$, por lo que $h=a\sin
  B$. Igualando ambas expresiones de $h$: $b\sin A=a\sin B$, es decir, $\dfrac{a}{\sin A}=\dfrac{b}{\sin
  B}$.


  ### Desarrollo didáctico


  Esta demostración muestra que la ley de senos no es un resultado arbitrario, sino consecuencia directa
  de aplicar la definición de seno en los dos triángulos rectángulos que se forman al trazar una altura
  dentro del triángulo original.'
procedimiento:
- 'Paso 1: Traza la altura h desde un vértice hasta el lado opuesto (o su prolongación), formando dos
  triángulos rectángulos.'
- 'Paso 2: Expresa h de dos formas distintas, usando el seno de cada uno de los dos ángulos adyacentes
  a esa altura.'
- 'Paso 3: Iguala ambas expresiones de h para obtener la proporcionalidad de la ley de senos.'
ejemplos:
- titulo: Expresar la altura h de dos formas distintas
  enunciado: Altura trazada desde C hasta AB, formando ángulos A y B.
  solucion_pasos:
  - h=b·sinA (en el triángulo ACH) y también h=a·sinB (en el triángulo BCH).
- titulo: Deducir la proporcionalidad de la ley de senos
  enunciado: De b·sinA=a·sinB.
  solucion_pasos:
  - Dividiendo ambos lados por sinA·sinB, se obtiene a/sinA=b/sinB.
- titulo: ¿Se forman dos triángulos rectángulos al trazar la altura?
  respuesta: Sí
  solucion_pasos:
  - Sí, la altura es perpendicular al lado opuesto, formando dos ángulos rectos.
- titulo: ¿Esta demostración depende de que el triángulo original sea rectángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, funciona para cualquier triángulo, incluso obtusángulos (trazando la altura hacia la prolongación
    del lado si es necesario).
errores_frecuentes:
- Confundir cuál cateto corresponde a la altura y cuál a la hipotenusa en cada triángulo rectángulo formado.
- Olvidar que, en triángulos obtusángulos, la altura puede caer fuera del segmento entre los vértices,
  sobre la prolongación del lado.
- No igualar correctamente las dos expresiones de la altura h al final de la demostración.
fuente: Elaboración propia.
estado: publicado
