semantic_id: MAT.NUM.VARIACION_PORCENTUAL.CAMBIO_RELATIVO
titulo: Cálculo del cambio relativo
objetivo: Calcular la variación porcentual (cambio relativo) entre dos cantidades.
introduccion: 'Si a un billonario se le pierden 1.000 pesos, no le importa. Si a ti se te pierden 1.000
  pesos, ¡es un problema! El cambio absoluto es igual, pero el ''Cambio Relativo'' (el impacto) es gigante
  para ti. Eso es el cambio relativo: medir el impacto respecto al origen.'
resumen: 'El cambio relativo o variación porcentual indica qué porcentaje creció o disminuyó una cantidad.
  Se calcula: $((Final - Inicial) / Inicial) \cdot 100$.'
explicacion: 'El **Cambio Relativo** transforma la diferencia absoluta en un porcentaje respecto al Valor
  Inicial. Nos permite comparar justamente.


  Fórmula fundamental:

  $$\text{Variación } \% = \left( \frac{\text{Valor Final} - \text{Valor Inicial}}{\text{Valor Inicial}}
  \right) \cdot 100$$


  - O más simple: **$\frac{\text{Cambio Absoluto}}{\text{Valor Inicial}} \cdot 100$**


  Si el resultado es positivo (ej. $+15\%$), hubo un crecimiento del 15%. Si es negativo (ej. $-10\%$),
  hubo una contracción o descuento del 10%.'
procedimiento:
- 'Paso 1: Calcula el cambio absoluto ($Final - Inicial$).'
- 'Paso 2: Divide ese cambio por el Valor Inicial.'
- 'Paso 3: Multiplica por 100 para llevarlo a formato de porcentaje.'
ejemplos:
- titulo: Porcentaje de inflación
  enunciado: Un kilo de pan costaba $1.000 y ahora cuesta $1.200. ¿Qué porcentaje aumentó?
  solucion_pasos:
  - 'Cambio absoluto: $1200 - 1000 = 200$.'
  - 'Dividimos por el Inicial: $200 / 1000 = 0.2$.'
  - 'Multiplicamos por 100: $0.2 \cdot 100 = 20\%$. Aumentó un 20%.'
errores_frecuentes:
- Dividir el cambio absoluto por el Valor Final en lugar del Inicial (¡Gravísimo error!).
- Restar Inicial menos Final, lo que invierte los signos de crecimiento/disminución.
fuente: Currículum Nacional MINEDUC.
estado: publicado
