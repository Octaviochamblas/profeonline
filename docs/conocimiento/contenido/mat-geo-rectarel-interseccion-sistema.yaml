semantic_id: MAT.GEO.RECTA_RELACIONES.INTERSECCION_SISTEMA
titulo: Determinación del punto de intersección entre dos rectas mediante sistemas de ecuaciones
objetivo: Determinar el punto donde dos rectas se cruzan, resolviendo el sistema de ecuaciones formado
  por ambas.
introduccion: El punto de intersección de dos rectas es aquel que satisface simultáneamente ambas ecuaciones,
  por lo que se puede encontrar resolviendo el sistema formado por ellas.
resumen: El punto de intersección de dos rectas $y=m_1x+b_1$ e $y=m_2x+b_2$ se obtiene igualando ambas
  expresiones y despejando $x$, para luego sustituir y obtener $y$.
explicacion: '![Intersección de dos rectas](/static/img/geometria/analitica/rectarel-interseccion-sistema.svg)


  ### Definición formal


  Igualando $m_1x+b_1=m_2x+b_2$, se despeja $x=\dfrac{b_2-b_1}{m_1-m_2}$ (si $m_1\neq m_2$), y luego se
  sustituye en cualquiera de las dos ecuaciones para obtener $y$.


  ### Desarrollo didáctico


  Para $y=x$ e $y=-x+4$: igualando, $x=-x+4$, por lo que $2x=4$, $x=2$. Sustituyendo, $y=2$. El punto
  de intersección es $(2,2)$.'
procedimiento:
- 'Paso 1: Escribe ambas ecuaciones en la misma forma (por ejemplo, principal).'
- 'Paso 2: Iguala las dos expresiones de y, y despeja x.'
- 'Paso 3: Sustituye el valor de x obtenido en cualquiera de las dos ecuaciones para encontrar y.'
ejemplos:
- titulo: Encontrar la intersección entre y=x e y=-x+4
  enunciado: Dos rectas dadas.
  solucion_pasos:
  - x=-x+4 → 2x=4 → x=2; sustituyendo, y=2. El punto es (2,2).
- titulo: Encontrar la intersección entre y=2x-1 e y=-x+5
  enunciado: Dos rectas dadas.
  solucion_pasos:
  - 2x-1=-x+5 → 3x=6 → x=2; sustituyendo, y=3. El punto es (2,3).
- titulo: ¿El punto de intersección satisface ambas ecuaciones simultáneamente?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición, ese punto pertenece a ambas rectas al mismo tiempo.
- titulo: ¿Se puede encontrar la intersección si las rectas son paralelas distintas?
  respuesta: 'No'
  solucion_pasos:
  - No, en ese caso no existe solución, ya que las rectas nunca se cruzan.
errores_frecuentes:
- Sustituir el valor de x encontrado solo en una de las ecuaciones sin verificar en la otra.
- Cometer errores algebraicos al despejar x del sistema igualado.
- Intentar encontrar una intersección entre rectas paralelas distintas, que no existe.
fuente: 'Elaboración propia (referencia: Carreño 184).'
estado: publicado
