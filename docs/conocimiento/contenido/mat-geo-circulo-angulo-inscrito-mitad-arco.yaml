semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_INSCRITO_MITAD_ARCO
titulo: Relación entre ángulo inscrito y mitad del arco correspondiente
objetivo: Aplicar la relación entre la medida de un ángulo inscrito y la mitad de la medida del arco que
  subtiende.
introduccion: Un ángulo inscrito siempre mide exactamente la mitad del arco que abarca (el arco que no
  contiene a su vértice).
resumen: 'La medida de un ángulo inscrito es igual a la mitad de la medida del arco que subtiende: $m(\angle
  ACB) = \frac{m(\text{arco }AB)}{2}$.'
explicacion: '![Ángulo inscrito igual a la mitad del arco](/static/img/geometria/circunferencia-circulo/circulo-angulo-inscrito-mitad-arco.svg)


  ### Definición formal


  Si $\angle ACB$ es un ángulo inscrito que subtiende el arco $AB$, entonces $m(\angle ACB)=\frac{m(\text{arco
  }AB)}{2}$. Esto equivale a decir que el ángulo inscrito mide la mitad del ángulo del centro que subtiende
  el mismo arco.


  ### Desarrollo didáctico


  Si el arco $AB$ mide 80° (y por lo tanto el ángulo del centro $\angle AOB$ también mide 80°), el ángulo
  inscrito $\angle ACB$ que subtiende ese mismo arco mide $\frac{80°}{2}=40°$, es decir, la mitad.'
procedimiento:
- 'Paso 1: Identifica el ángulo inscrito y el arco que subtiende (el arco que no contiene al vértice).'
- 'Paso 2: Si conoces el arco, divide su medida entre 2 para obtener el ángulo inscrito.'
- 'Paso 3: Si conoces el ángulo inscrito, multiplica su medida por 2 para obtener el arco.'
ejemplos:
- titulo: Calcular el ángulo inscrito a partir del arco
  enunciado: El arco AB mide 80°.
  solucion_pasos:
  - m(∠ACB)=80°/2=40°.
- titulo: Calcular el arco a partir del ángulo inscrito
  enunciado: El ángulo inscrito ∠ACB mide 55°.
  solucion_pasos:
  - 'El arco AB mide el doble: 55°×2=110°.'
- titulo: ¿Un ángulo inscrito mide la mitad del ángulo del centro que subtiende el mismo arco?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, ya que ambos se relacionan con la misma medida de arco: el central es igual al arco y el inscrito
    es la mitad.'
- titulo: ¿El ángulo inscrito puede medir lo mismo que el arco que subtiende?
  respuesta: 'No'
  solucion_pasos:
  - No, salvo casos triviales, el ángulo inscrito mide la mitad del arco, no lo mismo.
errores_frecuentes:
- Confundir esta relación con la del ángulo del centro (que es igual al arco, no su mitad).
- Dividir el arco entre 2 pero olvidar duplicar al hacer el cálculo inverso (de ángulo a arco).
- Tomar el arco incorrecto (el que contiene al vértice en vez del que no lo contiene).
fuente: 'Elaboración propia (referencias: Moraleja 74, Cid 95).'
estado: publicado
