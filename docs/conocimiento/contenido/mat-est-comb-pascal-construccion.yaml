semantic_id: MAT.EST.COMBINACIONES.PASCAL_CONSTRUCCION
titulo: Construir el Triángulo de Pascal a partir de la suma de términos adyacentes
objetivo: Construir filas sucesivas del Triángulo de Pascal, sumando cada par de términos adyacentes de
  la fila anterior.
introduccion: El Triángulo de Pascal es una forma visual y práctica de organizar los coeficientes binomiales,
  construida mediante una regla simple de suma.
resumen: El Triángulo de Pascal se construye colocando 1 en los extremos de cada fila, y calculando cada
  término interior como la suma de los dos términos adyacentes de la fila anterior.
explicacion: '![Construcción del Triángulo de Pascal](/static/img/probabilidad/comb/comb-pascal-construccion.svg)


  ### Definición formal


  Cada fila $n$ del triángulo comienza y termina en 1; cada término interior en la posición $r$ es la
  suma de los dos términos de la fila $n-1$ en las posiciones $r-1$ y $r$.


  ### Desarrollo didáctico


  La fila 3 es 1, 3, 3, 1. Para construir la fila 4: el primer y último término son 1; el segundo término
  es $1+3=4$; el tercer término es $3+3=6$; el cuarto es $3+1=4$. Resultado: 1, 4, 6, 4, 1.'
procedimiento:
- 'Paso 1: Escribe 1 en ambos extremos de la nueva fila.'
- 'Paso 2: Para cada posición interior, suma los dos términos adyacentes de la fila anterior.'
- 'Paso 3: Repite el proceso hasta completar toda la fila deseada.'
ejemplos:
- titulo: Construir la fila 4 del Triángulo de Pascal
  enunciado: 'Fila 3: 1, 3, 3, 1.'
  solucion_pasos:
  - 'Fila 4: 1, (1+3)=4, (3+3)=6, (3+1)=4, 1 → 1, 4, 6, 4, 1.'
- titulo: Construir la fila 5 del Triángulo de Pascal
  enunciado: 'Fila 4: 1, 4, 6, 4, 1.'
  solucion_pasos:
  - 'Fila 5: 1, (1+4)=5, (4+6)=10, (6+4)=10, (4+1)=5, 1 → 1, 5, 10, 10, 5, 1.'
- titulo: ¿Cada fila del triángulo comienza y termina en 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una regla fija de construcción del triángulo.
- titulo: ¿Los términos interiores se calculan sumando los dos términos adyacentes de la fila anterior?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la regla central de construcción del Triángulo de Pascal.
errores_frecuentes:
- Sumar términos incorrectos (no adyacentes) de la fila anterior.
- Olvidar colocar 1 en alguno de los extremos de la nueva fila.
- Perder la cuenta de la posición al construir filas más largas, desalineando la suma de términos adyacentes.
fuente: 'Elaboración propia (referencia: Baldor 376, Moraleja 300).'
estado: publicado
