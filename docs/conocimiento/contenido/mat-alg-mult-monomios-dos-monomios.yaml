semantic_id: MAT.ALG.MULT_MONOMIOS.DOS_MONOMIOS
objetivo: Multiplicar dos monomios aplicando la regla de signos, el producto de coeficientes y la suma de exponentes
  de bases iguales.
introduccion: Multiplicar dos monomios es el bloque básico de toda la multiplicación algebraica. Consiste simplemente
  en fusionar dos términos simples en uno solo siguiendo tres reglas ordenadas.
resumen: Para multiplicar **Dos Monomios**, se multiplican sus coeficientes numéricos (aplicando la regla de signos)
  y se suman los exponentes de las letras que tengan la misma base.
explicacion: '### Definición formal


  Signo: $(-)(+)=-$. Coeficientes: $4 \times 3 = 12$. Variable $a$: $a^1 \cdot a^2 = a^3$. Variable $b$: $b^2$.
  Variable $c$: $c$. Resultado: $-12a^3b^2c$.


  ### Desarrollo didáctico


  Multiplica: $(5x^2y)(−3xy^3)$.


  Paso 1: Signos. $(+)(-) = -$.

  Paso 2: Coeficientes. $5 \times 3 = 15$.

  Paso 3: Variable $x$. $x^2 \cdot x^1 = x^{2+1} = x^3$.

  Paso 4: Variable $y$. $y^1 \cdot y^3 = y^{1+3} = y^4$.


  Resultado combinado: $-15x^3y^4$.'
procedimiento:
- 'Paso 1: Determina el signo del producto usando la regla de signos.'
- 'Paso 2: Multiplica los valores numéricos de los coeficientes.'
- 'Paso 3: Identifica las variables repetidas en ambos monomios y suma sus exponentes.'
- 'Paso 4: Conserva intactas las variables que aparezcan en solo uno de los monomios.'
- 'Paso 5: Escribe el término final combinando signo, coeficiente y variables ordenadas alfabéticamente.'
ejemplos:
- titulo: Variables no compartidas
  enunciado: 'Multiplica: (2a^2b)(-5bc).'
  solucion_pasos:
  - 'Signo: (+)(-) = -.'
  - 'Coeficientes: 2 × 5 = 10.'
  - 'Variable a: a^2 (no se repite, queda igual).'
  - 'Variable b: b^1 · b^1 = b^2.'
  - 'Variable c: c (no se repite, queda igual).'
  - 'Resultado: -10a^2b^2c.'
- titulo: Un terreno rectangular tiene de largo $6a^2b$ metros y de ancho $2ab^3$ metros. ¿Cuál es su
  enunciado: 'Un terreno rectangular tiene de largo $6a^2b$ metros y de ancho $2ab^3$ metros. ¿Cuál es su área en
    metros cuadrados? (v1)


    Opciones: A) $12a^3b^4$ · B) $12a^2b^3$ · C) $8a^3b^4$ · D) $12ab$'
  solucion_pasos:
  - Área = largo × ancho $= (6a^2b)(2ab^3) = (6 \cdot 2)(a^{2+1})(b^{1+3}) = 12a^3b^4$.
  - 'Respuesta: $12a^3b^4$'
- titulo: 'Respecto de «Multiplicación de dos monomios»: ¿Es correcta esta caracterización? «Para multi'
  enunciado: 'Respecto de «Multiplicación de dos monomios»: ¿Es correcta esta caracterización? «Para multiplicar
    **Dos Monomios**, se multiplican sus coeficientes numéricos (aplicando la regla de signos) y se suman los exponentes
    de las letras que tengan la misma base»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para multiplicar **Dos Monomios**, se multiplican sus coeficientes
    numéricos (aplicando la regla de signos) y se suman los exponentes de las letras que tengan la misma base.'
- titulo: 'Respecto de «Multiplicación de dos monomios»: ¿Es válida esta afirmación? «Sumar los coefici'
  enunciado: 'Respecto de «Multiplicación de dos monomios»: ¿Es válida esta afirmación? «Sumar los coeficientes
    en lugar de multiplicarlos (ej. $2x \cdot 3x = 5x^2$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para multiplicar **Dos Monomios**, se multiplican sus coeficientes
    numéricos (aplicando la regla de signos) y se suman los exponentes de las letras que tengan la misma base.'
errores_frecuentes:
- Sumar los coeficientes en lugar de multiplicarlos (ej. $2x \cdot 3x = 5x^2$).
- Olvidar sumar los exponentes implícitos que tienen valor 1 (ej. $x^2 \cdot x = x^2$ en lugar de $x^3$).
- $-12ab^2c$.
- $-1a^3b^2c$.
- $-12a^2b^2c$.
fuente: Álgebra de Baldor.
