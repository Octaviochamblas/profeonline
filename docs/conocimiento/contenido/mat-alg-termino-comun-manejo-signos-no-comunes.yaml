semantic_id: 'MAT.ALG.TERMINO_COMUN.MANEJO_SIGNOS_NO_COMUNES'
titulo: 'Manejo de signos en los términos no comunes'
objetivo: 'Realizar correctamente las operaciones algebraicas de suma y multiplicación cuando los términos no comunes tienen distintos signos.'
introduccion: 'Cuando un término no común es positivo y el otro negativo, el cerebro a veces se enreda entre ''sumar'' y ''multiplicar''. ¡Vamos a ordenarlo!'
resumen: |
  En el producto $(x+a)(x-b)$:
  - La **suma algebraica** de los no comunes define el coeficiente lineal: $(a - b)$. Dependiendo de cuál sea mayor en valor absoluto, el término central será positivo o negativo.
  - El **producto** de los no comunes será SIEMPRE negativo: $a \\\\\\cdot (-b) = -ab$.
explicacion: |
  Al aplicar la regla del término común $(x+a)(x+b) = x^2 + (a+b)x + ab$, el principal desafío es manejar correctamente los signos de los términos no comunes ($a$ y $b$). 
  
  **Reglas de oro para los signos:**
  Recuerda que debes incluir el signo junto al número o variable en tus cálculos mentales. 
  
  1. **Para el coeficiente central (La Suma):** Usa las reglas de suma y resta.
     - Si ambos son del mismo signo, se suman sus valores absolutos y se conserva el signo. Ej: $(-4 - 3) = -7$.
     - Si tienen signos distintos, se restan y se conserva el signo del mayor en valor absoluto. Ej: $(+8 - 5) = +3$.
     
  2. **Para el término independiente (El Producto):** Usa las reglas de multiplicación.
     - Mismo signo $\rightarrow$ resultado positivo $(+ \cdot + = +) \text{ o } (- \cdot - = +)$.
     - Distinto signo $\rightarrow$ resultado negativo $(+ \cdot - = -)$.
  
  Ejemplo en $(x - 6)(x - 4)$:
  - Central: $(-6) + (-4) = -10$.
  - Final: $(-6) \cdot (-4) = +24$.
  - Trinomio: $x^2 - 10x + 24$.
procedimiento:
  - 'Paso 1: Si los signos son distintos:'
  - 'Paso 2: Para el medio: Resta los valores absolutos. Ponle el signo del número mayor.'
  - 'Paso 3: Para el final: Multiplica los valores y pon siempre signo negativo.'
ejemplos:
  - titulo: 'Signos opuestos, mayor positivo'
    enunciado: 'Calcula $(x + 9)(x - 4)$.'
    solucion_pasos:
      - 'Suma de no comunes: $9 + (-4) = +5$.'
      - 'Producto de no comunes: $9 \\\\\\cdot (-4) = -36$.'
      - 'Resultado: $x^2 + 5x - 36$.'
errores_frecuentes:
  - 'Aplicar la regla de los signos de la multiplicación a la suma, asumiendo que el término central siempre será negativo si los signos difieren.'
