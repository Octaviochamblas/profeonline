semantic_id: MAT.EST.BINOMIAL_ANALISIS.PROBABILIDAD_EXACTA
titulo: Calcular la probabilidad de obtener exactamente k éxitos
objetivo: Aplicar la función de probabilidad binomial para calcular la probabilidad de un valor exacto
  de éxitos, P(X=k), en contextos aplicados.
introduccion: 'Este es el cálculo más directo del análisis binomial: aplicar la fórmula ya conocida a
  un valor específico de k, en una situación real.'
resumen: La probabilidad de obtener exactamente $k$ éxitos en una distribución $X\sim B(n,p)$ es $P(X=k)=\binom{n}{k}p^{k}q^{n-k}$.
explicacion: '![Cálculo de la probabilidad exacta P(X=k)](/static/img/probabilidad/binoman/binoman-probabilidad-exacta.svg)


  ### Definición formal


  $P(X=k)=C(n,k)\times p^k\times q^{n-k}$, calculado para un valor específico de k pedido en el problema.


  ### Desarrollo didáctico


  Si $X\sim B(6;\,0{,}3)$, la probabilidad de obtener exactamente 2 éxitos es $P(X=2)=C(6,2)\times0{,}3^2\times0{,}7^4=15\times0{,}09\times0{,}2401\approx0{,}3241$.'
procedimiento:
- 'Paso 1: Identifica n, p y el valor exacto de k pedido en el problema.'
- 'Paso 2: Calcula C(n,k), p^k y q^(n-k) por separado.'
- 'Paso 3: Multiplica los tres valores para obtener P(X=k).'
ejemplos:
- titulo: Calcular P(X=2) con X~B(6; 0,3)
  enunciado: n=6, p=0,3, k=2.
  solucion_pasos:
  - P(X=2)=C(6,2)×0,3²×0,7⁴=15×0,09×0,2401≈0,3241.
- titulo: Calcular P(X=4) con X~B(7; 0,6)
  enunciado: n=7, p=0,6, k=4.
  solucion_pasos:
  - P(X=4)=C(7,4)×0,6⁴×0,4³=35×0,1296×0,064≈0,2903.
- titulo: ¿Es necesario calcular C(n,k) para hallar P(X=k)?
  respuesta: Sí
  solucion_pasos:
  - Sí, es parte esencial de la fórmula de probabilidad binomial.
- titulo: ¿P(X=k) representa la probabilidad de un único valor exacto de X?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de 'al menos k' o 'a lo más k', que suman varios valores.
errores_frecuentes:
- Confundir 'exactamente k' con 'al menos k' o 'a lo más k', calculando la probabilidad incorrecta.
- Olvidar el factor combinatorio C(n,k) al calcular P(X=k).
- Cometer errores al calcular las potencias de p y q, especialmente con exponentes altos.
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
