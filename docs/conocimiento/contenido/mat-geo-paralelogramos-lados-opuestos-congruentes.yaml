semantic_id: MAT.GEO.PARALELOGRAMOS.LADOS_OPUESTOS_CONGRUENTES
titulo: Propiedad de lados opuestos congruentes en paralelogramos
objetivo: Reconocer que en todo paralelogramo, los lados opuestos son congruentes (tienen la misma longitud).
introduccion: Además del paralelismo, los paralelogramos tienen una segunda propiedad muy útil relacionada
  con la longitud de sus lados.
resumen: 'En todo paralelogramo, los lados opuestos son congruentes: tienen exactamente la misma longitud.'
explicacion: '![Lados opuestos congruentes en un paralelogramo](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-lados-opuestos-congruentes.svg)


  ### Definición formal


  En un paralelogramo $ABCD$, se cumple $AB=CD$ y $BC=AD$. Esta propiedad se puede demostrar trazando
  la diagonal AC, que forma dos triángulos congruentes por el criterio ALA.


  ### Desarrollo didáctico


  Esta propiedad es consecuencia directa del paralelismo: al trazar una diagonal, se forman dos triángulos
  congruentes que comparten esa diagonal, lo cual obliga a que los lados opuestos correspondientes sean
  iguales.'
procedimiento:
- 'Paso 1: Identifica los dos pares de lados opuestos del paralelogramo.'
- 'Paso 2: Recuerda que, por ser un paralelogramo, cada par de lados opuestos es congruente.'
- 'Paso 3: Si conoces la longitud de un lado, ya conoces la de su lado opuesto (son iguales).'
ejemplos:
- titulo: Aplicar la propiedad con un lado conocido
  enunciado: En un paralelogramo ABCD, AB=8 cm.
  solucion_pasos:
  - CD=8 cm también, ya que es el lado opuesto a AB.
- titulo: Calcular un lado desconocido
  enunciado: En un paralelogramo, BC=6 cm.
  solucion_pasos:
  - AD=6 cm también, ya que es el lado opuesto a BC.
- titulo: ¿Los cuatro lados de un paralelogramo son siempre iguales entre sí?
  respuesta: 'No'
  solucion_pasos:
  - No necesariamente; solo los lados opuestos son iguales entre sí, no los cuatro lados en general (salvo
    en el rombo y el cuadrado).
- titulo: ¿Esta propiedad se puede demostrar usando congruencia de triángulos?
  respuesta: Sí
  solucion_pasos:
  - Sí, trazando una diagonal se forman dos triángulos congruentes por ALA.
errores_frecuentes:
- Creer que los cuatro lados de cualquier paralelogramo son iguales entre sí (eso solo ocurre en rombos
  y cuadrados).
- Confundir lados opuestos con lados adyacentes al aplicar esta propiedad.
- Asumir que esta propiedad no se cumple en paralelogramos 'inclinados' (romboides), cuando en realidad
  se cumple en todos los paralelogramos.
fuente: 'Fuente: Moraleja Tomo 2 68, Cid 45.'
estado: publicado
