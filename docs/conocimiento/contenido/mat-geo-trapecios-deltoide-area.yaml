semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.AREA_DELTOIDE
titulo: Cálculo del área del deltoide mediante sus diagonales
objetivo: Calcular el área de un deltoide usando la fórmula del producto de sus diagonales dividido entre
  2, aprovechando su perpendicularidad.
introduccion: Gracias a la propiedad de perpendicularidad de sus diagonales, el deltoide tiene una fórmula
  de área muy similar a la del rombo.
resumen: El área de un deltoide con diagonales $d_1$ y $d_2$ es $A=\frac{d_1\times d_2}{2}$.
explicacion: '![Área de un deltoide: (d1×d2)/2](/static/img/geometria/poligonos-cuadrilateros/trapecios-deltoide-area.svg)


  ### Definición formal


  Si $d_1$ y $d_2$ son las diagonales (perpendiculares) de un deltoide, su área es $A=\frac{d_1\times
  d_2}{2}$. Esta fórmula es válida gracias a que las diagonales son perpendiculares, permitiendo dividir
  el deltoide en cuatro triángulos rectángulos.


  ### Desarrollo didáctico


  Un deltoide con diagonales de 16 cm y 10 cm tiene área $A=\frac{16\times10}{2}=\frac{160}{2}=80$ cm².
  Esta misma fórmula aplica también al rombo, ya que es un caso particular de deltoide con la misma propiedad
  de diagonales perpendiculares.'
procedimiento:
- 'Paso 1: Identifica las longitudes de las dos diagonales del deltoide.'
- 'Paso 2: Multiplícalas entre sí.'
- 'Paso 3: Divide el resultado entre 2 para obtener el área.'
ejemplos:
- titulo: Calcular el área con diagonales conocidas
  enunciado: Un deltoide tiene diagonales de 16 cm y 10 cm.
  solucion_pasos:
  - A=16×10/2=160/2=80 cm².
- titulo: Calcular una diagonal desconocida a partir del área
  enunciado: Un deltoide tiene área 60 cm² y una diagonal de 12 cm.
  solucion_pasos:
  - 60=12×d/2 → 120=12d → d=10 cm.
- titulo: ¿Esta fórmula requiere que las diagonales sean perpendiculares?
  respuesta: Sí
  solucion_pasos:
  - Sí, la perpendicularidad es la condición que permite usar esta fórmula simplificada.
- titulo: ¿El rombo usa la misma fórmula de área?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque el rombo es un caso particular de deltoide con diagonales también perpendiculares.
errores_frecuentes:
- Olvidar dividir entre 2 después de multiplicar las dos diagonales.
- Usar lados en vez de diagonales al aplicar esta fórmula.
- Aplicar esta fórmula a un cuadrilátero cuyas diagonales no son perpendiculares (donde esta fórmula específica
  no es válida).
fuente: 'Fuente: Moraleja Tomo 2 70.'
estado: publicado
