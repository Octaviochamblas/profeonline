semantic_id: MAT.GEO.TRIG_RECIPROCAS.COTANGENTE_DEFINICION
titulo: Definición de cotangente de un ángulo agudo como cateto adyacente sobre cateto opuesto
objetivo: 'Definir la cotangente de un ángulo agudo como la razón recíproca de la tangente: cateto adyacente
  sobre cateto opuesto.'
introduccion: 'La cotangente es la tangente ''puesta al revés'': en vez de cateto opuesto sobre adyacente,
  es cateto adyacente sobre opuesto.'
resumen: 'La cotangente de un ángulo agudo $\theta$ es la razón recíproca de la tangente: $\cot\theta=\dfrac{\text{cateto
  adyacente}}{\text{cateto opuesto}}=\dfrac{1}{\tan\theta}$.'
explicacion: '![Definición de cotangente](/static/img/geometria/trigonometria/razon-cotangente-definicion.svg)


  ### Definición formal


  La cotangente de $\theta$ se define como $\cot\theta=\dfrac{\text{cateto adyacente}}{\text{cateto opuesto}}$,
  es decir, el recíproco (inverso multiplicativo) de la tangente: $\cot\theta=\dfrac{1}{\tan\theta}$.


  ### Desarrollo didáctico


  Si $\tan\theta=0{,}75$ (es decir, cateto opuesto=3, cateto adyacente=4), entonces $\cot\theta=\dfrac{4}{3}\approx1{,}33$,
  el recíproco exacto de $0{,}75$.'
procedimiento:
- 'Paso 1: Identifica el cateto opuesto y el cateto adyacente a θ del triángulo rectángulo.'
- 'Paso 2: Calcula la razón cateto adyacente/cateto opuesto (el orden invertido respecto de la tangente).'
- 'Paso 3: Verifica, si es útil, que cot θ = 1/tan θ, calculando el recíproco de la tangente.'
ejemplos:
- titulo: Calcular la cotangente con medidas conocidas
  enunciado: El cateto opuesto mide 3 cm y el adyacente 4 cm.
  solucion_pasos:
  - cotθ=4/3≈1,33.
- titulo: Calcular la cotangente a partir de la tangente
  enunciado: tanθ=2.
  solucion_pasos:
  - cotθ=1/2=0,5.
- titulo: ¿La cotangente es el recíproco de la tangente?
  respuesta: Sí
  solucion_pasos:
  - Sí, cotθ=1/tanθ, por definición de razones recíprocas.
- titulo: ¿La cotangente, al igual que la tangente, puede ser mayor o menor que 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de la cosecante y la secante, la cotangente puede tomar cualquier valor positivo,
    mayor o menor que 1.
errores_frecuentes:
- Invertir el orden y calcular cateto opuesto/cateto adyacente en vez de cateto adyacente/cateto opuesto.
- Confundir la cotangente con la tangente misma, olvidando invertir la razón.
- Creer que la cotangente está restringida a valores mayores que 1, como la secante y la cosecante.
fuente: 'Elaboración propia (referencias: Moraleja 175, Cid 155).'
estado: publicado
