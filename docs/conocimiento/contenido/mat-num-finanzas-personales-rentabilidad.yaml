semantic_id: MAT.NUM.FINANZAS_PERSONALES.RENTABILIDAD
objetivo: Comprender el concepto de rentabilidad al invertir o guardar dinero.
introduccion: ¿Dejar la plata bajo el colchón o meterla al banco? Si la dejas en el
  colchón, la inflación se la comerá. Si la inviertes, esperas que te pague un premio
  por usarla. Ese premio es la rentabilidad.
resumen: 'La rentabilidad es el beneficio económico que obtienes por invertir un capital.
  Se expresa como un porcentaje: $((Ganancia) / Capital Inicial) \cdot 100$.'
explicacion: 'La **Rentabilidad** es la variación porcentual positiva de una inversión.


  Fórmula:

  $$\text{Rentabilidad } \% = \left( \frac{\text{Ganancia Obtenida}}{\text{Capital
  Inicial Invertido}} \right) \cdot 100$$


  - **Inversión de bajo riesgo:** Como un Depósito a Plazo. Te pagan poco (ej. $5\%$
  anual), pero tu dinero está 100% seguro.

  - **Inversión de alto riesgo:** Como comprar acciones o criptomonedas. Puedes ganar
  mucho (ej. $30\%$ anual), pero también puedes perder tu capital inicial (rentabilidad
  negativa).


  **Regla de oro financiera:** A mayor rentabilidad esperada, mayor es el riesgo de
  perder tu dinero. No existen inversiones de alta rentabilidad y riesgo cero (quien
  prometa eso, probablemente ofrezca una estafa piramidal).'
procedimiento:
- 'Paso 1: Identifica tu Inversión Inicial (cuánto dinero pusiste).'
- 'Paso 2: Calcula la ganancia neta (Valor Final - Inversión Inicial).'
- 'Paso 3: Divide la ganancia por la inversión inicial y multiplica por 100 para obtener
  el porcentaje de rentabilidad.'
ejemplos:
- titulo: Rentabilidad de un negocio
  enunciado: Invertiste $100.000 en comprar fundas de celulares. Las vendiste todas
    y recibiste $150.000. ¿Cuál fue tu rentabilidad?
  solucion_pasos:
  - Inversión Inicial = $100.000.
  - Ganancia = $150.000 - 100.000 = 50.000$.
  - Rentabilidad = $(50.000 / 100.000) \cdot 100 = 0.5 \cdot 100 = 50\%$.
  - Obtuviste un 50% de rentabilidad.
errores_frecuentes:
- Dividir el Valor Final completo (y no solo la ganancia) sobre la Inversión, lo que
  daría rentabilidades infladas superiores al 100% en el ejemplo anterior.
- Ignorar el efecto de la inflación (si el banco te da 5% de rentabilidad pero la
  inflación es 6%, tu rentabilidad 'real' es negativa).
fuente: Currículum Nacional MINEDUC.
estado: publicado
