semantic_id: MAT.EST.NORMAL_ESTANDAR.DESVIACION_UNO
titulo: Reconocer la propiedad de desviación estándar uno en la normal estándar
objetivo: Reconocer que la distribución normal estándar tiene siempre una desviación estándar igual a uno.
introduccion: En la distribución normal estándar, la "unidad de medida" de la dispersión siempre es exactamente 1,
  ni más ancha ni más angosta.
resumen: La distribución normal estándar tiene, por definición, una desviación estándar igual a 1, lo que fija su
  ancho de referencia para cualquier estandarización.
explicacion: '![Desviación estándar uno en la normal estándar](/static/img/estadistica/normest/normest-desviacion-uno.svg)


  ### Definición formal


  Para la variable $Z$ de la distribución normal estándar $N(0,1)$, se cumple que $\sigma_Z=1$, fijando su nivel de

  dispersión como unidad de referencia.


  ### Desarrollo didáctico


  Gracias a esta propiedad, un valor $Z=2$ siempre significa "dos desviaciones estándar sobre la media", sin importar

  cuál era la desviación estándar original de los datos antes de estandarizar.'
procedimiento:
- 'Paso 1: Recuerda que la normal estándar es $N(0,1)$.'
- 'Paso 2: Identifica que el valor 1 corresponde a la desviación estándar de esa distribución.'
- 'Paso 3: Usa ese valor como unidad de referencia al interpretar puntajes $Z$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: ¿Cuál es la desviación estándar de la distribución normal estándar?
  solucion_pasos:
  - Es exactamente 1.
- titulo: Ejemplo 2
  enunciado: Si un dato tiene $Z=2$, ¿qué significa este valor en términos de desviaciones estándar?
  solucion_pasos:
  - Significa que el dato está a 2 desviaciones estándar sobre la media original.
- titulo: ¿La desviación estándar de la distribución normal estándar es igual a uno?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad definitoria de esta distribución.
- titulo: ¿La desviación estándar de la normal estándar puede variar según el problema?
  respuesta: 'No'
  solucion_pasos:
  - 'No, por definición siempre es exactamente 1.'
errores_frecuentes:
- Creer que la desviación estándar de la normal estándar puede ser distinta de 1.
- Confundir la desviación estándar de $Z$ con la desviación estándar original de los datos.
- Pensar que un valor $Z=1$ representa el valor máximo posible de la variable.
- Olvidar que esta propiedad es la base para interpretar puntajes $Z$ como número de desviaciones estándar.
- Confundir esta propiedad con la de media cero, tratándolas como si fueran la misma.
fuente: 'Elaboración propia (referencia: Moraleja 307).'
estado: publicado
