semantic_id: MAT.GEO.BISECTRIZ_INCENTRO.RADIO_INSCRITO_TRIANGULO_RECTANGULO
titulo: Cálculo del radio inscrito en un triángulo rectángulo mediante r = (a + b - c) / 2
objetivo: Aplicar la fórmula simplificada para calcular el radio inscrito en un triángulo rectángulo,
  usando solo sus catetos e hipotenusa.
introduccion: 'En triángulos rectángulos existe un atajo para calcular el inradio, sin necesidad de calcular
  el área por separado: basta con conocer los catetos y la hipotenusa.'
resumen: En un triángulo rectángulo de catetos a y b e hipotenusa c, el radio inscrito es r = (a + b −
  c) / 2.
explicacion: '![Radio inscrito en un triángulo rectángulo](/static/img/geometria/elementos-secundarios/bisectriz-incentro-radio-inscrito-triangulo-rectangulo.svg)


  ### Definición formal


  En un triángulo rectángulo con catetos $a$, $b$ e hipotenusa $c$, el radio inscrito es $r=\frac{a+b-c}{2}$,
  fórmula equivalente a $r=\frac{\text{Área}}{s}$ para este caso particular.


  ### Desarrollo didáctico


  Para el triángulo rectángulo de catetos 3 y 4 e hipotenusa 5: $r=\frac{3+4-5}{2}=\frac{2}{2}=1$, coincidiendo
  con el cálculo por área y semiperímetro.'
procedimiento:
- 'Paso 1: Identifica los catetos a y b y la hipotenusa c del triángulo rectángulo.'
- 'Paso 2: Súmalos como a + b − c.'
- 'Paso 3: Divide ese resultado entre 2 para obtener el radio inscrito.'
ejemplos:
- titulo: Calcular con el triángulo 3-4-5
  enunciado: Un triángulo rectángulo tiene catetos 3 y 4 e hipotenusa 5.
  solucion_pasos:
  - r=(3+4−5)/2=1.
- titulo: Calcular con el triángulo 6-8-10
  enunciado: Un triángulo rectángulo tiene catetos 6 y 8 e hipotenusa 10.
  solucion_pasos:
  - r=(6+8−10)/2=2.
- titulo: ¿Esta fórmula aplica solo a triángulos rectángulos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una simplificación específica para el caso rectángulo; en general se usa r=Área/s.
- titulo: ¿El resultado coincide con el cálculo por área y semiperímetro?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas fórmulas dan el mismo valor para un triángulo rectángulo.
errores_frecuentes:
- Aplicar esta fórmula simplificada a triángulos que no son rectángulos.
- Confundir cuál lado es la hipotenusa al aplicar la fórmula.
- Olvidar dividir entre 2 después de sumar los catetos y restar la hipotenusa.
fuente: Elaboración propia.
estado: publicado
