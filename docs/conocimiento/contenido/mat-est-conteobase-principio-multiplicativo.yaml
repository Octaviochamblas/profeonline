semantic_id: MAT.EST.CONTEO_BASE.PRINCIPIO_MULTIPLICATIVO
titulo: Principio multiplicativo para contar etapas sucesivas
objetivo: Aplicar el principio multiplicativo de conteo para determinar el número total de formas de realizar
  una tarea que involucra varias etapas sucesivas.
introduccion: Cuando una tarea se compone de varias decisiones que se toman una tras otra (etapas sucesivas),
  el total de combinaciones se obtiene multiplicando las opciones de cada etapa.
resumen: El principio multiplicativo establece que, si una tarea tiene $k$ etapas sucesivas con $n_1,
  n_2, \ldots, n_k$ opciones respectivamente, el número total de formas de realizar la tarea completa
  es $n_1\times n_2\times\cdots\times n_k$.
explicacion: '![Principio multiplicativo de conteo](/static/img/probabilidad/conteobase/conteobase-principio-multiplicativo.svg)


  ### Definición formal


  Si cada etapa se realiza independientemente de las demás, el total de combinaciones se calcula multiplicando
  el número de opciones de cada etapa.


  ### Desarrollo didáctico


  Un menú tiene 3 entradas y 2 postres, eligiendo una de cada categoría (ambas etapas). El número total
  de menús posibles es $3\times2=6$.'
procedimiento:
- 'Paso 1: Identifica si la situación involucra etapas sucesivas que se deben realizar todas (no una alternativa
  excluyente).'
- 'Paso 2: Cuenta el número de opciones de cada etapa por separado.'
- 'Paso 3: Multiplica esas cantidades para obtener el total de combinaciones posibles.'
ejemplos:
- titulo: Contar menús con entrada y postre
  enunciado: 3 entradas y 2 postres.
  solucion_pasos:
  - 3×2=6 menús posibles.
- titulo: Contar contraseñas de 2 letras y 2 dígitos
  enunciado: 26 letras posibles cada una, 10 dígitos posibles cada uno.
  solucion_pasos:
  - 26×26×10×10=67.600 contraseñas posibles.
- titulo: ¿El principio multiplicativo se aplica a etapas sucesivas independientes?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición central de este principio.
- titulo: ¿Se usa este principio cuando se elige una alternativa u otra (no ambas)?
  respuesta: 'No'
  solucion_pasos:
  - No, en ese caso corresponde el principio aditivo, no el multiplicativo.
errores_frecuentes:
- Sumar las opciones de cada etapa en vez de multiplicarlas.
- Confundir etapas sucesivas (multiplicativo) con alternativas excluyentes (aditivo).
- Olvidar considerar todas las etapas de la tarea al calcular el total.
fuente: 'Elaboración propia (referencia: Moraleja 298).'
estado: publicado
