semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.RECORRIDO
titulo: Determinación del recorrido de la función logarítmica
objetivo: Determinar el recorrido de una función logarítmica básica, reconociendo que corresponde a todos los
  números reales.
introduccion: Así como el dominio de la logarítmica hereda el recorrido de la exponencial, el recorrido de la
  logarítmica hereda el dominio de la exponencial, que no tiene restricciones.
resumen: El **recorrido** de la función logarítmica básica $f(x)=\log_b(x)$ es siempre el conjunto de todos los
  números reales, $\text{Rec}(f)=\mathbb{R}$.
explicacion: '### Definición formal


  Como $f(x)=\log_b(x)$ es la inversa de $g(x)=b^x$, el recorrido de $f$ coincide con el dominio de $g$, que
  es $\mathbb{R}$. Por lo tanto, para cualquier número real $y$ (positivo, negativo o cero), existe un $x>0$
  tal que $\log_b(x)=y$.


  ### Desarrollo didáctico


  A diferencia del dominio (restringido a positivos), el recorrido no tiene ninguna limitación: la función logarítmica
  puede tomar cualquier valor real, tanto para argumentos grandes como para argumentos cercanos a cero.


  Para $f(x)=\log_2(x)$: cuando $x\to0^+$, $f(x)\to-\infty$; cuando $x\to+\infty$, $f(x)\to+\infty$, cubriendo
  así todo $\mathbb{R}$.'
procedimiento:
- 'Paso 1: Verifica que la función sea una función logarítmica básica, sin transformaciones adicionales.'
- 'Paso 2: Concluye que el recorrido es $\mathbb{R}$, sin necesidad de excluir ningún valor.'
ejemplos:
- titulo: Determinación del recorrido de una función logarítmica simple
  enunciado: 'Determina el recorrido de $f(x)=\log_4(x)$.'
  solucion_pasos:
  - Es una función logarítmica básica.
  - '$\text{Rec}(f)=\mathbb{R}$.'
- titulo: Verificación de un valor en el recorrido
  enunciado: '¿Existe algún $x$ tal que $\log_3(x)=-5$?'
  solucion_pasos:
  - Sí, porque el recorrido de la función logarítmica es todo $\mathbb{R}$, incluyendo valores negativos.
  - 'Ese $x$ es $3^{-5}=1/243$.'
- titulo: ¿El recorrido de la función logarítmica básica excluye el cero?
  enunciado: ¿El recorrido de la función logarítmica básica excluye el cero?
  respuesta: 'No'
  solucion_pasos:
  - El recorrido incluye todos los reales, incluido el cero (que se obtiene con $x=1$, ya que $\log_b(1)=0$).
- titulo: ¿El recorrido de una función logarítmica depende del valor de la base $b$?
  enunciado: ¿El recorrido de una función logarítmica depende del valor de la base $b$?
  respuesta: 'No'
  solucion_pasos:
  - Sin importar la base (siempre que sea válida), el recorrido de la función logarítmica básica siempre es $\mathbb{R}$.
errores_frecuentes:
- Confundir el recorrido (siempre $\mathbb{R}$) con el dominio (restringido a positivos).
- Asumir que el recorrido está restringido a valores positivos, como el dominio.
- No reconocer que la función logarítmica puede tomar valores negativos.
- Confundir el recorrido de la función logarítmica con el de la función exponencial.
