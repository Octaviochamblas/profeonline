semantic_id: MAT.ALG.TERMINO.PARTE_LITERAL
titulo: Identificación de la parte literal
objetivo: Identificar la parte literal de un término algebraico y reconocer su función fundamental como
  el 'apellido' o especie de la cantidad.
introduccion: Si el coeficiente te dice 'cuántos' tienes, la parte literal te dice 'qué' tienes. ¿Tienes
  5 gatos o tienes 5 manzanas? En el álgebra, el apellido de tu número es la parte literal.
resumen: La **Parte Literal** está constituida por las letras que haya en el término y sus correspondientes
  exponentes. Es el bloque alfabético que sigue al coeficiente numérico.
explicacion: '### Definición formal


  La parte literal es como la ''unidad de medida''. Solo términos con exactamente la misma parte literal
  (misma especie) pueden reducirse mediante adición.


  ### Desarrollo didáctico


  Anatomía de la parte literal:

  - En el término $8xyz$, la parte literal completa es $xyz$.

  - En el término $-2a^2b^3$, la parte literal no son solo las letras sueltas, son las letras con sus
  exponentes pegados. La parte literal es $a^2b^3$.


  La parte literal es sagrada porque funciona como un clasificador de especies. Así como en la vida real
  no puedes sumar 3 perros con 4 gatos para obtener 7 ''perro-gatos'', en el álgebra no puedes sumar la
  parte literal $x$ con la parte literal $x^2$. Son de especies distintas. Analizar bien la parte literal
  es el paso cero antes de intentar sumar o restar.'
procedimiento:
- 'Paso 1: Identifica y aísla el coeficiente numérico (el número grande y su signo).'
- 'Paso 2: Todo lo que sobra a la derecha del coeficiente (letras y sus pequeños exponentes) es el bloque
  que compone la parte literal.'
ejemplos:
- titulo: Separando aguas
  enunciado: Extrae la parte literal del término fraccionario 3m^4/5
  solucion_pasos:
  - 'Separamos el coeficiente: La fracción numérica es 3/5.'
  - Todo lo que resta es la letra y su exponente.
  - La parte literal es m^4.
- titulo: Un programador requiere que su base de datos solo sume cajas del mismo volumen. Modela las d
  enunciado: 'Un programador requiere que su base de datos solo sume cajas del mismo volumen. Modela las
    dimensiones de las cajas grandes como $x^3$ y las rectangulares como $x^2y$. Un empleado suma el inventario
    y reporta ''$10x^5y$''. El programador detecta de inmediato que el cálculo es absurdo algebraicamente
    porque: (v1)


    Opciones: A) Sumó coeficientes de cajas con partes literales de distinta naturaleza matemática ($x^3$
    y $x^2y$), fusionando los exponentes como si hubiera multiplicado. · B) Debió reportar el resultado
    en litros en lugar de letras. · C) Restó las partes literales en vez de sumar sus volúmenes. · D)
    El exponente máximo permitido por las leyes algebraicas es tres.'
  solucion_pasos:
  - No se pueden sumar peras con manzanas. $x^3$ y $x^2y$ tienen partes literales diferentes, su suma
    queda indicada, jamás se fusionan los exponentes.
  - 'Respuesta: Sumó coeficientes de cajas con partes literales de distinta naturaleza matemática ($x^3$
    y $x^2y$), fusionando los exponentes como si hubiera multiplicado.'
- titulo: 'Respecto de «Identificación de la parte literal»: ¿La siguiente formulación es correcta? «La'
  enunciado: 'Respecto de «Identificación de la parte literal»: ¿La siguiente formulación es correcta?
    «La **Parte Literal** está constituida por las letras que haya en el término y sus correspondientes
    exponentes»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Parte Literal** está constituida por las letras
    que haya en el término y sus correspondientes exponentes.'
- titulo: 'Respecto de «Identificación de la parte literal»: ¿La siguiente conclusión es correcta? «Olv'
  enunciado: 'Respecto de «Identificación de la parte literal»: ¿La siguiente conclusión es correcta?
    «Olvidar incluir los exponentes en la parte literal, mencionando solo las letras base»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Parte Literal** está constituida por las letras
    que haya en el término y sus correspondientes exponentes.'
errores_frecuentes:
- Olvidar incluir los exponentes en la parte literal, mencionando solo las letras base.
- Pensar que un término puramente numérico (ej. $15$) tiene una parte literal invisible igual a $x$. (Su
  parte literal es $x^0 = 1$, que no altera el número, por ende 'carece' funcionalmente de parte literal
  visible).
- Define cuántas veces se debe multiplicar el término por sí mismo.
- Indica si el resultado del cálculo será obligatoriamente positivo o negativo.
- Determina el valor absoluto máximo que puede alcanzar el término.
fuente: Álgebra de Baldor.
