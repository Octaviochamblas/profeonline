semantic_id: MAT.NUM.INTERES_SIMPLE.CALCULO_INTERES
titulo: Cálculo del interés simple
objetivo: Calcular la ganancia o deuda final utilizando la fórmula de interés simple.
introduccion: ¿Cómo calculamos rápidamente la deuda si pasan 5 años en un modelo lineal? Simplemente multiplicamos
  el interés de un año por cinco.
resumen: 'Fórmula Interés Simple: $I = C \cdot i \cdot t$. (Interés ganado = Capital $\times$ tasa $\times$
  tiempo). Capital Final: $C_f = C + I$, o $C_f = C(1 + i \cdot t)$. ¡La tasa y el tiempo deben estar
  en la misma unidad!'
explicacion: "La matemática del Interés Simple requiere tres variables:\n- **$C$:** Capital Inicial prestado.\n\
  - **$i$:** Tasa de interés (escrita como decimal. Ej: $5\\% \\rightarrow 0.05$).\n- **$t$:** Tiempo\
  \ o cantidad de periodos.\n\n**1. Fórmula de Ganancia (solo los intereses):**\n$$I = C \\cdot i \\cdot\
  \ t$$\n*(Calcula la ganancia de 1 mes y la multiplica por los meses que pasaron).* \n\n**2. Fórmula\
  \ del Capital Final (Monto Total a pagar):**\n$$C_f = C + (C \\cdot i \\cdot t) = C(1 + i \\cdot t)$$\n\
  \n**¡Regla de Oro!** El tiempo $t$ y la tasa $i$ deben estar en el mismo 'idioma'. Si la tasa es anual\
  \ y te dan el tiempo en meses, debes convertir el tiempo a años dividiendo por 12."
procedimiento:
- 'Paso 1: Convierte la tasa a decimal (divide por 100).'
- 'Paso 2: Asegúrate que tiempo y tasa usen la misma unidad de medida (ej. ambos en años o ambos en meses).'
- 'Paso 3: Multiplica $Capital \times Tasa \times Tiempo$ para hallar la ganancia.'
ejemplos:
- titulo: Cálculo directo
  enunciado: Se invierten $5.000 al 4% de interés simple anual durante 3 años. ¿Cuánto interés se ganó?
  solucion_pasos:
  - C = 5000, i = 0.04 (anual), t = 3 (años).
  - $I = 5000 \cdot 0.04 \cdot 3$.
  - $I = 200 \cdot 3 = 600$.
  - Se ganaron $600 de interés.
errores_frecuentes:
- Olvidar pasar la tasa a decimal (multiplicar por 4 en vez de 0.04).
- Mezclar tasa mensual con tiempo en años sin hacer la conversión.
fuente: Currículum Nacional MINEDUC.
estado: publicado
