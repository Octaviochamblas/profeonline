semantic_id: MAT.GEO.RECTA_RELACIONES.RECTAS_SECANTES
titulo: Identificación de rectas secantes mediante pendientes distintas
objetivo: Identificar que dos rectas son secantes (se cruzan en un único punto) cuando tienen pendientes
  distintas.
introduccion: Si dos rectas no son paralelas ni coincidentes, es decir, tienen distinta inclinación, necesariamente
  se cruzan en exactamente un punto del plano.
resumen: Dos rectas $y=m_1x+b_1$ y $y=m_2x+b_2$ son secantes si y solo si $m_1\neq m_2$, cruzándose en
  exactamente un punto.
explicacion: '![Rectas secantes](/static/img/geometria/analitica/rectarel-rectas-secantes.svg)


  ### Definición formal


  Si $m_1\neq m_2$, el sistema formado por ambas ecuaciones tiene una única solución, correspondiente
  al único punto de intersección de las rectas.


  ### Desarrollo didáctico


  Las rectas $y=x$ e $y=-0{,}5x+2$ tienen pendientes distintas (1 y -0,5), por lo que son secantes y se
  cruzan en un único punto.'
procedimiento:
- 'Paso 1: Identifica las pendientes de ambas rectas.'
- 'Paso 2: Verifica que sean distintas.'
- 'Paso 3: Si son distintas, concluye que las rectas son secantes (se cruzan en un único punto).'
ejemplos:
- titulo: Verificar que dos rectas son secantes
  enunciado: y=x, y=-0,5x+2.
  solucion_pasos:
  - Como m1=1≠m2=-0,5, las rectas son secantes.
- titulo: Determinar si dos rectas dadas en forma general son secantes
  enunciado: 2x+y-3=0 y x-y+1=0.
  solucion_pasos:
  - 'Despejando: y=-2x+3 e y=x+1. Como las pendientes (-2 y 1) son distintas, las rectas son secantes.'
- titulo: ¿Toda pareja de rectas con pendientes distintas es secante?
  respuesta: Sí
  solucion_pasos:
  - Sí, pendientes distintas garantizan que las rectas se crucen en exactamente un punto.
- titulo: ¿Dos rectas secantes pueden ser también perpendiculares?
  respuesta: Sí
  solucion_pasos:
  - Sí, la perpendicularidad es un caso particular de secancia, donde además el producto de pendientes
    es -1.
errores_frecuentes:
- Confundir rectas secantes con rectas paralelas.
- Creer que todas las rectas secantes deben ser también perpendiculares.
- Olvidar convertir las ecuaciones a una forma comparable antes de verificar las pendientes.
fuente: 'Elaboración propia (referencia: Carreño 184).'
estado: publicado
