semantic_id: MAT.GEO.BISECTRIZ_INCENTRO.BISECTRIZ_INTERIOR_DEFINICION
titulo: Definición de bisectriz interior de un triángulo como rayo que divide un ángulo interior en dos
  ángulos iguales
objetivo: Identificar la bisectriz interior de un triángulo como el rayo que divide un ángulo del triángulo
  en dos partes iguales.
introduccion: De los segmentos notables que parten de un vértice, la bisectriz es el que reparte el ángulo
  de ese vértice en dos mitades exactamente iguales.
resumen: La bisectriz interior de un ángulo de un triángulo es el rayo que lo divide en dos ángulos de
  igual medida.
explicacion: '![Bisectriz interior desde un vértice](/static/img/geometria/elementos-secundarios/bisectriz-incentro-bisectriz-interior-definicion.svg)


  ### Definición formal


  La bisectriz interior del ángulo en el vértice A de un triángulo ABC es el rayo que parte de A y divide
  el ángulo ∠BAC en dos ángulos iguales, cada uno de medida ∠BAC/2.


  ### Desarrollo didáctico


  Si el ángulo en A mide 60°, su bisectriz lo divide en dos ángulos de 30° cada uno. Cada triángulo tiene
  tres bisectrices interiores, una por cada vértice.'
procedimiento:
- 'Paso 1: Elige un vértice y mide (o identifica) su ángulo interior.'
- 'Paso 2: Traza el rayo que divide ese ángulo en dos partes iguales.'
- 'Paso 3: Ese rayo es la bisectriz interior de ese vértice.'
ejemplos:
- titulo: Reconocer una bisectriz
  enunciado: El ángulo en A mide 80° y un rayo lo divide en dos de 40°.
  solucion_pasos:
  - Ese rayo es la bisectriz interior del ángulo en A.
- titulo: Contar bisectrices
  enunciado: ¿Cuántas bisectrices interiores tiene un triángulo?
  solucion_pasos:
  - Tiene tres, una por cada vértice.
- titulo: ¿La bisectriz siempre cae dentro del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de la altura, la bisectriz interior siempre permanece dentro del triángulo.
- titulo: ¿Los dos ángulos que forma la bisectriz son siempre iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la condición que la define.
errores_frecuentes:
- Confundir la bisectriz con la altura o la transversal de gravedad del mismo vértice.
- Dividir el ángulo en partes desiguales y llamarlo bisectriz por error.
- Creer que la bisectriz puede caer fuera del triángulo.
fuente: Elaboración propia.
estado: publicado
