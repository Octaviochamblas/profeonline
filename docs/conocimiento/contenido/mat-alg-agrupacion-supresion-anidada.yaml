semantic_id: MAT.ALG.AGRUPACION.SUPRESION_ANIDADA
objetivo: Eliminar signos de agrupación anidados (paréntesis dentro de corchetes dentro
  de llaves) de adentro hacia afuera.
introduccion: 'Imagina unas muñecas rusas: hay que abrir la más pequeña de adentro
  primero para llegar a la de afuera. Los signos de agrupación anidados funcionan
  igual: el proceso es secuencial, de lo más interior a lo más exterior.'
resumen: 'La **Supresión Anidada** requiere eliminar los agrupadores en orden estricto:
  primero paréntesis, luego corchetes, luego llaves. Cada eliminación puede requerir
  invertir o no los signos, dependiendo del signo que antecede a cada agrupador.'
explicacion: 'Simplifica: $\{5a - [3a - (2a + 1)]\}$.


  Paso 1 — Eliminamos el paréntesis (precedido de $-$, invertimos):

  $\{5a - [3a - 2a - 1]\}$.


  Paso 2 — Reducimos lo que quedó en el corchete:

  $\{5a - [a - 1]\}$.


  Paso 3 — Eliminamos el corchete (precedido de $-$, invertimos):

  $\{5a - a + 1\}$.


  Paso 4 — Eliminamos la llave (precedida de nada o $+$, sin cambio):

  $5a - a + 1 = 4a + 1$.'
procedimiento:
- 'Paso 1: Identifica el agrupador más interior (paréntesis). Mira su signo exterior.'
- 'Paso 2: Elimínalo, aplicando la regla correspondiente (+ conserva, - invierte).'
- 'Paso 3: Reduce términos semejantes dentro del siguiente nivel.'
- 'Paso 4: Repite para el corchete y luego para la llave.'
ejemplos:
- titulo: Las tres capas
  enunciado: 'Simplifica: {4b - [2b + (b - 3)]}.'
  solucion_pasos:
  - 'Paréntesis (precedido de +, sin cambio): {4b - [2b + b - 3]}.'
  - 'Reducimos en corchete: {4b - [3b - 3]}.'
  - 'Corchete (precedido de -, invertimos): {4b - 3b + 3}.'
  - 'Llave: 4b - 3b + 3 = b + 3.'
errores_frecuentes:
- Eliminar todos los agrupadores al mismo tiempo sin respetar el orden de adentro
  hacia afuera.
- Al eliminar un agrupador con signo $-$, invertir solo algunos signos interiores
  y olvidarse de otros.
fuente: Álgebra de Baldor.
estado: publicado
