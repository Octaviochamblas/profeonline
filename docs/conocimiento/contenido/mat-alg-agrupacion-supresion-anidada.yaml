semantic_id: MAT.ALG.AGRUPACION.SUPRESION_ANIDADA
objetivo: Eliminar signos de agrupación anidados (paréntesis dentro de corchetes dentro de llaves) de adentro hacia
  afuera.
introduccion: 'Imagina unas muñecas rusas: hay que abrir la más pequeña de adentro primero para llegar a la de afuera.
  Los signos de agrupación anidados funcionan igual: el proceso es secuencial, de lo más interior a lo más exterior.'
resumen: 'La **Supresión Anidada** requiere eliminar los agrupadores en orden estricto: primero paréntesis, luego
  corchetes, luego llaves. Cada eliminación puede requerir invertir o no los signos, dependiendo del signo que antecede
  a cada agrupador.'
explicacion: '### Definición formal


  Eliminamos el paréntesis con signo $-$: $-(c-d) = -c+d$. Dentro del corchete queda $b - c + d$.


  ### Desarrollo didáctico


  Simplifica: $\{5a - [3a - (2a + 1)]\}$.


  Paso 1 — Eliminamos el paréntesis (precedido de $-$, invertimos):

  $\{5a - [3a - 2a - 1]\}$.


  Paso 2 — Reducimos lo que quedó en el corchete:

  $\{5a - [a - 1]\}$.


  Paso 3 — Eliminamos el corchete (precedido de $-$, invertimos):

  $\{5a - a + 1\}$.


  Paso 4 — Eliminamos la llave (precedida de nada o $+$, sin cambio):

  $5a - a + 1 = 4a + 1$.'
procedimiento:
- 'Paso 1: Identifica el agrupador más interior (paréntesis). Mira su signo exterior.'
- 'Paso 2: Elimínalo, aplicando la regla correspondiente (+ conserva, - invierte).'
- 'Paso 3: Reduce términos semejantes dentro del siguiente nivel.'
- 'Paso 4: Repite para el corchete y luego para la llave.'
- 'Eliminamos el paréntesis con signo $-$: $-(c-d) = -c+d$. Dentro del corchete queda $b - c + d$.'
ejemplos:
- titulo: Las tres capas
  enunciado: 'Simplifica: {4b - [2b + (b - 3)]}.'
  solucion_pasos:
  - 'Paréntesis (precedido de +, sin cambio): {4b - [2b + b - 3]}.'
  - 'Reducimos en corchete: {4b - [3b - 3]}.'
  - 'Corchete (precedido de -, invertimos): {4b - 3b + 3}.'
  - 'Llave: 4b - 3b + 3 = b + 3.'
- titulo: La factura de un servicio se calcula con $F = 100 - [20 + (F_b - 5)]$ donde $F_b = 10$. ¿Cuá
  enunciado: 'La factura de un servicio se calcula con $F = 100 - [20 + (F_b - 5)]$ donde $F_b = 10$. ¿Cuál es el
    monto de la factura? (v1)


    Opciones: A) $75$ · B) $85$ · C) $65$ · D) $80$'
  solucion_pasos:
  - 'Sustituimos $F_b=10$: $100 - [20 + (10-5)] = 100 - [20+5] = 100 - [25] = 75$.'
  - 'Respuesta: $75$'
- titulo: 'Respecto de «Supresión de agrupaciones anidadas»: ¿La siguiente formulación es correcta? «La'
  enunciado: 'Respecto de «Supresión de agrupaciones anidadas»: ¿La siguiente formulación es correcta? «La **Supresión
    Anidada** requiere eliminar los agrupadores en orden estricto: primero paréntesis, luego corchetes, luego llaves»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Supresión Anidada** requiere eliminar los agrupadores
    en orden estricto: primero paréntesis, luego corchetes, luego llaves.'
- titulo: 'Respecto de «Supresión de agrupaciones anidadas»: ¿La siguiente conclusión es correcta? «Eli'
  enunciado: 'Respecto de «Supresión de agrupaciones anidadas»: ¿La siguiente conclusión es correcta? «Eliminar
    todos los agrupadores al mismo tiempo sin respetar el orden de adentro hacia afuera»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Supresión Anidada** requiere eliminar los agrupadores
    en orden estricto: primero paréntesis, luego corchetes, luego llaves.'
errores_frecuentes:
- Eliminar todos los agrupadores al mismo tiempo sin respetar el orden de adentro hacia afuera.
- Al eliminar un agrupador con signo $-$, invertir solo algunos signos interiores y olvidarse de otros.
- $b - c - d$.
- $2x - 1$.
- $4x + 1$.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Supresión de agrupaciones anidadas
