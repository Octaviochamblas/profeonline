semantic_id: MAT.NUM.FINANZAS_PERSONALES.TIPOS_GASTO
objetivo: Clasificar los gastos personales en fijos, variables e imprevistos para
  la elaboración de un presupuesto.
introduccion: ¿A dónde se fue mi sueldo? Para tomar el control de tu dinero, lo primero
  es etiquetar las salidas. No es lo mismo pagar el arriendo mensual que comprarte
  un café por antojo.
resumen: Los gastos se dividen en Fijos (obligatorios e ineludibles mes a mes), Variables
  (necesarios pero su monto y frecuencia cambia) e Imprevistos (emergencias fuera
  de control).
explicacion: 'En educación financiera, armar un presupuesto requiere conocer tus tipos
  de egresos (salidas de dinero):


  - **Gasto Fijo:** Son aquellos de los que no puedes escapar a corto plazo y su monto
  suele ser conocido. Ejemplos: El arriendo o dividendo, la mensualidad del colegio,
  cuota de un préstamo. Deben ser tu prioridad número 1.

  - **Gasto Variable:** Son gastos cotidianos y necesarios, pero cuyo valor o frecuencia
  lo decides tú. Ejemplos: Compras en el supermercado, salir a comer, cuentas de servicios
  (luz/agua fluctúan según tu consumo), ropa.

  - **Gasto Imprevisto:** Son urgencias que rompen el presupuesto normal. Ejemplos:
  Una enfermedad, una reparación mecánica del auto, una multa de tránsito.'
procedimiento:
- 'Paso 1: Analiza si el gasto se repite obligatoriamente cada mes. Si sí, es Fijo.'
- 'Paso 2: Si el gasto depende de tu estilo de vida o consumo mes a mes, es Variable.'
- 'Paso 3: Si es una emergencia sorpresiva que no planificaste, es Imprevisto.'
ejemplos:
- titulo: Clasificando la boleta de la luz
  enunciado: ¿Qué tipo de gasto es la cuenta de electricidad de la casa?
  solucion_pasos:
  - Aunque llega todos los meses, el monto cambia dependiendo de si dejas las luces
    prendidas o apagas la estufa.
  - Por lo tanto, es un gasto Variable.
errores_frecuentes:
- Creer que la cuenta del supermercado es un Gasto Fijo porque 'hay que comer' (la
  comida es necesaria, pero el gasto es variable porque puedes elegir comer arroz
  o caviar).
- Confundir un Gasto Variable (ir al cine) con un Imprevisto.
fuente: Currículum Nacional MINEDUC.
estado: publicado
