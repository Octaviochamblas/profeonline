semantic_id: MAT.ALG.LENGUAJE_RELACIONES.SUCESOR_NUMERO
titulo: Representación del sucesor de un número
objetivo: Traducir el concepto de sucesor de un número entero.
introduccion: Si el antecesor mira hacia el pasado, el sucesor mira hacia el futuro. Es el siguiente número
  en la fila.
resumen: El **Sucesor** (o consecutivo) de un número entero se traduce algebraicamente sumando una unidad
  a dicho número. Si el número es $x$, su sucesor es **$x + 1$**.
explicacion: "### Definición formal\n\nSucesor y consecutivo son términos intercambiables que denotan\
  \ avanzar una unidad ($x+1$) en la serie de números enteros.\n\n### Desarrollo didáctico\n\nAl igual\
  \ que con el antecesor, funciona en toda la recta entera.\n- El sucesor de $14$ es $14 + 1 = 15$.\n\
  - El sucesor de $-5$ es $-5 + 1 = -4$. (Ojo aquí: el sucesor es 'más grande', por lo que avanza hacia\
  \ el cero en los negativos).\n- El sucesor de $y$ es $y + 1$.\n\nNuevamente, el uso de paréntesis dictamina\
  \ el orden de las operaciones. \n'El cuadrado del sucesor' es $(x+1)^2$.\n'El sucesor del cuadrado'\
  \ es $x^2 + 1$."
procedimiento:
- 'Paso 1: Identifica la base a la cual le calcularás el sucesor.'
- 'Paso 2: Súmale 1 (+1).'
- 'Paso 3: Si se le aplicará una operación externa a este sucesor, usa paréntesis para agrupar (x+1).'
ejemplos:
- titulo: El consecutivo
  enunciado: 'Traduce: ''La suma de un número con su propio sucesor''.'
  solucion_pasos:
  - El número es x.
  - Su sucesor es (x + 1).
  - 'Sumamos ambas partes: x + (x + 1).'
- titulo: Durante una excavación arqueológica, se determina que un objeto A data del año $x$ (con $x$
  enunciado: 'Durante una excavación arqueológica, se determina que un objeto A data del año $x$ (con
    $x$ siendo un año negativo antes de Cristo). Un objeto B se fabricó exactamente un año después. ¿Cuál
    expresión indica el año de fabricación del objeto B y qué significa en la recta cronológica? (v1)


    Opciones: A) El año es $x + 1$, y el número será más cercano al cero (año 0) que el objeto A. · B)
    El año es $x - 1$, y el número será más negativo (más alejado del año 0). · C) El año es $1 - x$,
    porque los años negativos se restan al revés. · D) El año es $|x| + 1$ para forzar que sea positivo.'
  solucion_pasos:
  - '''Un año después'' es el sucesor. Se suma 1. Al ser $x$ un número negativo (ej. -500), sumarle 1
    da -499, que es matemáticamente un valor mayor y cronológicamente más cercano al cero.'
  - 'Respuesta: El año es $x + 1$, y el número será más cercano al cero (año 0) que el objeto A.'
- titulo: 'Respecto de «Representación del sucesor de un número»: ¿Es correcta esta caracterización? «E'
  enunciado: 'Respecto de «Representación del sucesor de un número»: ¿Es correcta esta caracterización?
    «El **Sucesor** (o consecutivo) de un número entero se traduce algebraicamente sumando una unidad
    a dicho número»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Sucesor** (o consecutivo) de un número entero
    se traduce algebraicamente sumando una unidad a dicho número.'
- titulo: 'Respecto de «Representación del sucesor de un número»: ¿Es válida esta afirmación? «Pensar
    q'
  enunciado: 'Respecto de «Representación del sucesor de un número»: ¿Es válida esta afirmación? «Pensar
    que el sucesor de un número negativo como $-3$ es $-4$. (El sucesor se halla sumando 1, así que $-3
    + 1 = -2$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Sucesor** (o consecutivo) de un número entero
    se traduce algebraicamente sumando una unidad a dicho número.'
errores_frecuentes:
- Pensar que el sucesor de un número negativo como $-3$ es $-4$. (El sucesor se halla sumando 1, así que
  $-3 + 1 = -2$).
- Omitir los paréntesis al multiplicar o elevar potencias.
- El recíproco de $x$.
- Para «En el ámbito de los números enteros, ¿qué sinónimo verbal se utiliza frecuentemente en los problemas
  algebraicos para referirse al 'sucesor' de la variable $x$? (v1)», la respuesta correcta es El opuesto
  de $x$.
- El múltiplo de $x$.
fuente: Álgebra de Baldor.
