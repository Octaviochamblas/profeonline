semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.MONOTONIA
titulo: Determinación de la monotonía de una función exponencial según su base
objetivo: Determinar si una función exponencial es creciente o decreciente observando únicamente el valor de
  su base.
introduccion: Sin necesidad de graficar ni de calcular ningún valor, basta con observar el número que ocupa el
  lugar de la base para saber de inmediato si la curva sube o baja.
resumen: 'Para $f(x)=a\cdot b^x$ con $a>0$: si $b>1$ la función es **creciente**; si $0<b<1$ la función es **decreciente**;
  el caso $b=1$ no es válido, pues produce una función constante.'
explicacion: '### Definición formal


  La monotonía de $f(x)=a\cdot b^x$ (con $a>0$) queda determinada exclusivamente por el valor de $b$: creciente
  si $b>1$, decreciente si $0<b<1$. Si $a<0$, ambos comportamientos se invierten: la función sería decreciente
  si $b>1$, y creciente si $0<b<1$.


  ### Desarrollo didáctico


  Antes de graficar o resolver cualquier problema, conviene clasificar rápidamente la función según su monotonía,
  observando primero el signo de $a$ y luego el valor de $b$ respecto a 1.


  Para $f(x)=-4\cdot0{,}5^x$: como $a=-4<0$ y $0<0{,}5<1$, el comportamiento se invierte respecto al caso estándar,
  resultando en una función creciente (aunque siempre negativa).'
procedimiento:
- 'Paso 1: Identifica el signo del coeficiente $a$.'
- 'Paso 2: Identifica si la base $b$ es mayor que 1 o está entre 0 y 1.'
- 'Paso 3: Combina ambos datos para determinar si la función es creciente o decreciente.'
ejemplos:
- titulo: Determinación de monotonía con a positivo
  enunciado: 'Determina la monotonía de $f(x)=6\cdot4^x$.'
  solucion_pasos:
  - '$a=6>0$, $b=4>1$.'
  - La función es creciente.
- titulo: Determinación de monotonía con a negativo
  enunciado: 'Determina la monotonía de $f(x)=-2\cdot3^x$.'
  solucion_pasos:
  - '$a=-2<0$, $b=3>1$.'
  - El comportamiento se invierte: la función es decreciente (aunque siempre negativa).
- titulo: ¿Puede una función exponencial ser constante?
  enunciado: ¿Puede una función exponencial ser constante?
  respuesta: 'No'
  solucion_pasos:
  - Por definición, se excluye $b=1$, precisamente para evitar el caso constante.
- titulo: ¿El signo de $a$ puede invertir el sentido del crecimiento o decrecimiento determinado por $b$?
  enunciado: ¿El signo de $a$ puede invertir el sentido del crecimiento o decrecimiento determinado por $b$?
  respuesta: Sí
  solucion_pasos:
  - Con $a<0$, el comportamiento se invierte respecto al que tendría la misma base con $a>0$.
errores_frecuentes:
- Determinar la monotonía observando solo la base $b$, sin considerar el signo de $a$.
- Confundir la condición $b>1$ con $b\geq1$, incluyendo incorrectamente el caso $b=1$.
- Asumir que toda función exponencial con $a>0$ es siempre creciente, sin verificar el valor de $b$.
- No distinguir correctamente entre los casos $b>1$ y $0<b<1$ al clasificar la monotonía.
