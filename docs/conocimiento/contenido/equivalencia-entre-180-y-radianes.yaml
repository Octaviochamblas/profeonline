semantic_id: MAT.GEO.MEDICION_ANGULAR.EQUIVALENCIA_GRADOS_RADIANES
titulo: Equivalencia entre 180° y π radianes
objetivo: Convertir medidas angulares usando la equivalencia adecuada y comprobar que la equivalencia
  \(180°=\pi\) rad es el puente básico entre ambos sistemas.
introduccion: 'Para pasar de grados a radianes no hace falta memorizar muchas fórmulas: basta con recordar
  cómo se expresa la media vuelta en cada sistema. Para resolver situaciones de equivalencia entre 180°
  y π radianes conviene mirar el dibujo con método, no solo por intuición.'
resumen: Una media vuelta equivale simultáneamente a 180° y a \(\pi\) radianes. Como idea de control,
  la equivalencia \(180°=\pi\) rad es el puente básico entre ambos sistemas.
explicacion: 'Una media vuelta equivale simultáneamente a 180° y a \(\pi\) radianes.


  Cuando se analiza “el ángulo llano puede escribirse como 180° o como \(\pi\) rad” conviene evitar la
  memoria mecánica. El control decisivo es comprobar que la equivalencia \(180°=\pi\) rad es el puente
  básico entre ambos sistemas.'
procedimiento:
- 'Paso 1: Identifica en qué unidad está dada la medida y a qué unidad debe pasar.'
- 'Paso 2: Escribe la equivalencia base del sistema involucrado antes de calcular.'
- 'Paso 3: Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.'
ejemplos:
- titulo: Aplicación directa — Equivalencia grados-radianes
  enunciado: El ángulo llano puede escribirse como 180° o como \(\pi\) rad.
  solucion_pasos:
  - Identifica en qué unidad está dada la medida y a qué unidad debe pasar.
  - Escribe la equivalencia base del sistema involucrado antes de calcular.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: Chequeo del procedimiento — Equivalencia grados-radianes
  enunciado: 'Revisa una solución del caso “el ángulo llano puede escribirse como 180° o como \(\pi\)
    rad”: el resultado parece razonable, pero falta conectar el dibujo con la definición. Explica esa
    conexión.'
  solucion_pasos:
  - 'Parte de la definición: una media vuelta equivale simultáneamente a 180° y a \(\pi\) radianes.'
  - Escribe la equivalencia base del sistema involucrado antes de calcular.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: ¿La interpretación del dibujo es válida? — Equivalencia grados-radianes
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: una media vuelta equivale simultáneamente
    a 180° y a \(\pi\) radianes.'
  - En el caso “el ángulo llano puede escribirse como 180° o como \(\pi\) rad” se observa que la equivalencia
    \(180°=\pi\) rad es el puente básico entre ambos sistemas.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Equivalencia grados-radianes
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de equivalencia entre 180° y π radianes.
  - Después del paso “Identifica en qué unidad está dada la medida y a qué unidad debe pasar.” todavía
    hace falta revisar “Escribe la equivalencia base del sistema involucrado antes de calcular.”.
  - El cierre correcto exige “Resuelve la proporción o la operación y verifica que el resultado tenga
    la unidad pedida.”.
errores_frecuentes:
- Equivalencia grados-radianes significa tratar \(\pi\) como si fuera la medida de una vuelta completa.
- Para resolver equivalencia grados-radianes, basta con el paso “Identifica en qué unidad está dada la
  medida y a qué unidad debe pasar.” y no hace falta revisar “Escribe la equivalencia base del sistema
  involucrado antes de calcular.”.
- Si el dibujo parece claro, se puede ignorar que la equivalencia \(180°=\pi\) rad es el puente básico
  entre ambos sistemas.
- Dos configuraciones distintas representan equivalencia grados-radianes solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Resuelve la proporción o la operación y verifica
  que el resultado tenga la unidad pedida.”.
fuente: Currículum Nacional MINEDUC — Medición angular, sistemas sexagesimal, radial y centesimal.
