semantic_id: MAT.GEO.TRIG_NOTABLES.TANGENTE_COTANGENTE_COMPLEMENTARIOS
titulo: Relación entre tangente y cotangente de ángulos complementarios
objetivo: Reconocer que la tangente de un ángulo agudo es igual a la cotangente de su ángulo complementario,
  y viceversa.
introduccion: Al igual que con el seno y el coseno, la tangente y la cotangente de ángulos complementarios
  están relacionadas de forma directa.
resumen: Para un ángulo agudo $\theta$, se cumple que $\tan\theta=\cot(90°-\theta)$ y $\cot\theta=\tan(90°-\theta)$.
explicacion: '![Complementariedad tangente-cotangente](/static/img/geometria/trigonometria/razon-notable-tangente-cotangente-complementarios.svg)


  ### Definición formal


  Como $\tan\theta=\dfrac{\text{opuesto}}{\text{adyacente}}$ y $\cot(90°-\theta)=\dfrac{\text{adyacente
  de }(90°-\theta)}{\text{opuesto de }(90°-\theta)}$, y estos catetos se intercambian entre ángulos complementarios,
  resulta $\tan\theta=\cot(90°-\theta)$.


  ### Desarrollo didáctico


  Por ejemplo, $\tan30°=\cot60°=\dfrac{\sqrt3}{3}$, ya que 30° y 60° son ángulos complementarios.'
procedimiento:
- 'Paso 1: Identifica el ángulo agudo θ y su complementario (90°-θ).'
- 'Paso 2: Reconoce que la tangente de uno equivale a la cotangente del otro.'
- 'Paso 3: Aplica la relación tanθ=cot(90°-θ) para deducir un valor a partir del otro.'
ejemplos:
- titulo: Aplicar la relación de complementariedad con ángulos notables
  enunciado: Se sabe que tan30°=√3/3.
  solucion_pasos:
  - Como 30° y 60° son complementarios, cot60°=tan30°=√3/3.
- titulo: Deducir una cotangente a partir de una tangente conocida
  enunciado: tan25°≈0,466.
  solucion_pasos:
  - Como 25° y 65° son complementarios, cot65°≈0,466.
- titulo: ¿tanθ y cot(90°-θ) son siempre iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la relación de complementariedad entre tangente y cotangente.
- titulo: ¿tan45°=cot45°?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que 45° es su propio complementario, y además tan45°=cot45°=1.
errores_frecuentes:
- Confundir esta relación con la de seno-coseno, aplicándola incorrectamente entre razones distintas.
- Calcular incorrectamente el ángulo complementario.
- Creer que tanθ=cotθ para el mismo ángulo θ en general (solo se cumple para θ=45°).
fuente: 'Elaboración propia (referencia: Moraleja 178).'
estado: publicado
