semantic_id: MAT.GEO.TRIANGULOS_NOTABLES.TRIANGULO_30_60_90
titulo: Relación de lados en el triángulo notable 30°-60°-90°
objetivo: Aplicar la proporción fija entre los lados de un triángulo rectángulo con ángulos 30°, 60° y
  90°.
introduccion: Este triángulo, que se obtiene por ejemplo al dividir un triángulo equilátero por su altura,
  tiene una proporción de lados fija y muy usada en geometría y trigonometría.
resumen: En un triángulo 30°-60°-90°, los lados están en proporción $1:\sqrt{3}:2$, correspondiendo respectivamente
  al cateto opuesto a 30°, al cateto opuesto a 60° y a la hipotenusa.
explicacion: '![Triángulo notable 30°-60°-90°](/static/img/geometria/triangulos/triangulos-notables-30-60-90.svg)


  ### Definición formal


  En un triángulo rectángulo con ángulos 30°, 60° y 90°, si el cateto opuesto a 30° mide $l$, el cateto
  opuesto a 60° mide $l\sqrt{3}$, y la hipotenusa mide $2l$.


  ### Desarrollo didáctico


  Si el cateto menor (opuesto a 30°) mide 5 cm, el cateto mayor (opuesto a 60°) mide $5\sqrt{3}\approx8,66$
  cm, y la hipotenusa mide $2(5)=10$ cm.'
procedimiento:
- 'Paso 1: Identifica cuál cateto es el opuesto al ángulo de 30° (el cateto menor).'
- 'Paso 2: Multiplica ese cateto por $\sqrt{3}$ para obtener el cateto opuesto a 60°.'
- 'Paso 3: Multiplica el cateto menor por 2 para obtener la hipotenusa.'
ejemplos:
- titulo: Calcular los otros lados desde el menor
  enunciado: Un triángulo 30-60-90 tiene cateto menor de 6 cm.
  solucion_pasos:
  - El cateto mayor mide $6\sqrt{3}\approx10,39$ cm, y la hipotenusa mide 12 cm.
- titulo: Calcular desde la hipotenusa
  enunciado: Un triángulo 30-60-90 tiene hipotenusa 14 cm.
  solucion_pasos:
  - El cateto menor mide 14÷2=7 cm, y el mayor mide $7\sqrt{3}\approx12,12$ cm.
- titulo: ¿El cateto opuesto a 60° es el más largo de los dos catetos?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque el ángulo mayor (60°, comparado con 30°) se opone al lado mayor entre los catetos.
- titulo: ¿La hipotenusa es el doble del cateto menor?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la proporción fija de este triángulo notable.
errores_frecuentes:
- Confundir cuál cateto corresponde al opuesto de 30° y cuál al de 60°.
- Multiplicar por $\sqrt{2}$ en vez de $\sqrt{3}$, confundiendo con el triángulo 45-45-90.
- Olvidar que la hipotenusa es el doble del cateto menor, no del mayor.
fuente: Elaboración propia.
estado: publicado
