semantic_id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_BASE_ALTURA
titulo: 'Fórmula del área del triángulo: A = base × altura / 2'
objetivo: Aplicar la fórmula fundamental para calcular el área de cualquier triángulo a partir de su base
  y su altura.
introduccion: El área de cualquier triángulo, sin importar su forma, puede calcularse con una sola fórmula
  sencilla que combina la medida de un lado (base) y su altura correspondiente.
resumen: El área de un triángulo es igual al producto de su base por su altura, dividido por 2.
explicacion: '![Fórmula del área: base por altura sobre 2](/static/img/geometria/areas-pitagoras/areas-triangulos-formula-base-altura.svg)


  ### Definición formal


  Si $b$ es la base de un triángulo y $h$ es la altura correspondiente a esa base, su área es $A=\frac{b\cdot
  h}{2}$.


  ### Desarrollo didáctico


  Un triángulo con base 8 cm y altura 5 cm tiene área $A=\frac{8\times5}{2}=\frac{40}{2}=20$ cm². Esta
  fórmula surge de que el triángulo es exactamente la mitad de un paralelogramo de igual base y altura.'
procedimiento:
- 'Paso 1: Identifica la base del triángulo y su altura correspondiente.'
- 'Paso 2: Multiplica esos dos valores.'
- 'Paso 3: Divide el resultado entre 2.'
ejemplos:
- titulo: Calcular con base 8 y altura 5
  enunciado: Un triángulo tiene base 8 cm y altura 5 cm.
  solucion_pasos:
  - A=(8×5)/2=20 cm².
- titulo: Calcular con base 12 y altura 7
  enunciado: Un triángulo tiene base 12 cm y altura 7 cm.
  solucion_pasos:
  - A=(12×7)/2=42 cm².
- titulo: ¿Se divide siempre entre 2 en esta fórmula?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque el triángulo es la mitad de un paralelogramo de igual base y altura.
- titulo: ¿Esta fórmula aplica a cualquier tipo de triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, funciona para triángulos acutángulos, rectángulos y obtusángulos por igual.
errores_frecuentes:
- Olvidar dividir entre 2 después de multiplicar base por altura.
- Usar un lado que no es realmente perpendicular a la base como si fuera la altura.
- Confundir la base con la altura al aplicar la fórmula.
fuente: Elaboración propia.
estado: publicado
