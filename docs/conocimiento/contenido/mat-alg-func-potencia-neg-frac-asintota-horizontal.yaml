semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.ASINTOTA_HORIZONTAL
titulo: Asíntota horizontal de la función potencia con exponente negativo
objetivo: Reconocer que $f(x)=a\cdot x^{-n}$ tiene una asíntota horizontal en $y=0$.
introduccion: A medida que $x$ crece o decrece sin límite, dividir por una potencia cada vez más grande hace que
  el resultado se acerque cada vez más a cero.
resumen: La gráfica de $f(x)=a\cdot x^{-n}$ (con $n$ entero positivo) tiene una **asíntota horizontal** en la
  recta $y=0$, ya que $f(x)\to0$ cuando $|x|\to\infty$.
explicacion: '### Definición formal


  Como $f(x)=a/x^n$, cuando $|x|\to\infty$, el denominador $x^n\to\infty$, así que $f(x)\to0$. La recta $y=0$ es
  asíntota horizontal, ya que la gráfica se aproxima a ella sin cruzarla (para $x\neq0$) tanto en $+\infty$ como
  en $-\infty$.


  ### Desarrollo didáctico


  $f(x)=1/x$: para $x=10$, $f(10)=0{,}1$; para $x=1000$, $f(1000)=0{,}001$. Mientras más grande es $x$, más se
  acerca $f(x)$ a $0$, pero nunca llega exactamente a ser $0$.'
procedimiento:
- 'Paso 1: Evalúa la función con valores de $x$ cada vez más grandes en valor absoluto.'
- 'Paso 2: Observa que los valores de $f(x)$ se acercan cada vez más a $0$.'
- 'Paso 3: Concluye que la recta $y=0$ es la asíntota horizontal.'
ejemplos:
- titulo: Comportamiento cuando $x$ crece
  enunciado: 'Describe qué ocurre con $f(x)=1/x^2$ cuando $x$ crece sin límite.'
  solucion_pasos:
  - Se evalúan valores crecientes de $x$: $10$, $100$, $1000$.
  - Los resultados $0{,}01$, $0{,}0001$, $0{,}000001$ se acercan cada vez más a $0$.
- titulo: Identificación de la ecuación de la asíntota horizontal
  enunciado: '¿Cuál es la ecuación de la asíntota horizontal de $f(x)=7x^{-4}$?'
  solucion_pasos:
  - Toda función con exponente negativo entero se acerca a $0$ cuando $|x|\to\infty$.
  - La asíntota horizontal es siempre la recta $y=0$, sin importar el coeficiente ni el exponente.
- titulo: ¿La función con exponente negativo llega a tomar el valor $0$?
  enunciado: ¿La función $f(x)=a\cdot x^{-n}$ llega a tomar exactamente el valor $0$ para algún $x$?
  respuesta: 'No'
  solucion_pasos:
  - Como $f(x)=a/x^n$ con $a\neq0$, el numerador nunca es $0$, así que $f(x)$ nunca es exactamente $0$.
- titulo: ¿La asíntota horizontal depende del coeficiente $a$?
  enunciado: ¿La posición de la asíntota horizontal cambia según el valor del coeficiente $a$?
  respuesta: 'No'
  solucion_pasos:
  - Para cualquier coeficiente $a\neq0$, la asíntota horizontal siempre es $y=0$.
errores_frecuentes:
- Confundir la asíntota horizontal con la asíntota vertical de esta misma función.
- Suponer que la gráfica puede tocar el eje $x$ para valores muy grandes de $x$.
- Pensar que la posición de la asíntota depende del coeficiente $a$ o del exponente $n$.
- Olvidar mencionar que la asíntota es horizontal al describir la gráfica.
