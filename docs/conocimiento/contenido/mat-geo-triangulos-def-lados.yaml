semantic_id: MAT.GEO.TRIANGULOS_DEF.LADOS
titulo: Identificación de los tres lados de un triángulo
objetivo: Identificar los tres lados de un triángulo y su notación habitual con letras minúsculas.
introduccion: Cada lado de un triángulo conecta dos de sus vértices; una convención común es nombrar cada
  lado con la letra minúscula del vértice opuesto a él.
resumen: Los lados de un triángulo son los tres segmentos que unen sus vértices dos a dos.
explicacion: '![Lados de un triángulo](/static/img/geometria/triangulos/triangulos-def-lados.svg)


  ### Definición formal


  En un triángulo de vértices A, B y C, los lados son los segmentos AB, BC y CA. Por convención, el lado
  opuesto al vértice A se llama $a$ (es decir, BC), el opuesto a B se llama $b$ (CA), y el opuesto a C
  se llama $c$ (AB).


  ### Desarrollo didáctico


  En el triángulo ABC, el lado $a=BC$ es el que NO toca al vértice A; el lado $b=CA$ es el que no toca
  a B; el lado $c=AB$ es el que no toca a C. Esta notación permite referirse a cada lado sin ambigüedad
  usando solo una letra.'
procedimiento:
- 'Paso 1: Identifica los tres vértices del triángulo.'
- 'Paso 2: Traza los tres segmentos que los conectan dos a dos: esos son los lados.'
- 'Paso 3: Nombra cada lado con la letra minúscula del vértice opuesto a él.'
ejemplos:
- titulo: Nombrar un lado por su vértice opuesto
  enunciado: En el triángulo ABC, ¿cómo se llama el lado opuesto al vértice B?
  solucion_pasos:
  - El lado opuesto a B es CA, y se denota $b$.
- titulo: Lados que forman un vértice
  enunciado: ¿Qué dos lados se encuentran en el vértice C del triángulo ABC?
  solucion_pasos:
  - Los lados BC y CA se encuentran en C.
- titulo: ¿El lado $a$ es el que toca al vértice A?
  respuesta: 'No'
  solucion_pasos:
  - 'No, el lado $a$ es precisamente el que NO toca a A: es el lado opuesto, BC.'
- titulo: ¿Un triángulo tiene exactamente tres lados?
  respuesta: Sí
  solucion_pasos:
  - Sí, uno por cada par de vértices que se conectan.
errores_frecuentes:
- Nombrar el lado con la letra del vértice que sí toca, en vez del vértice opuesto.
- Confundir un lado con un ángulo del triángulo.
- Olvidar que cada lado conecta exactamente dos vértices.
fuente: Elaboración propia.
estado: publicado
