semantic_id: 'MAT.ALG.CUADRADO_TRINOMIO.DEFINICION'
titulo: 'Definición del cuadrado de un trinomio'
objetivo: 'Comprender la expansión de un trinomio al cuadrado mediante la distribución y la agrupación de términos semejantes.'
introduccion: 'Si elevar un binomio al cuadrado produce 3 términos, ¿cuántos términos produce elevar un polinomio de 3 términos (trinomio) al cuadrado? Es hora de descubrirlo.'
resumen: |
  El cuadrado de un trinomio se define como la multiplicación de un trinomio por sí mismo: $(a+b+c)^2 = (a+b+c)(a+b+c)$.
  La fórmula final para su desarrollo incluye el cuadrado de cada término y todos los dobles productos posibles entre ellos.
explicacion: |
  Al expandir $(a+b+c)(a+b+c)$ aplicando propiedad distributiva extensiva (cada término por todos los del otro), se generan $3 \times 3 = 9$ términos en total.
  Los resultados son:
  - $a(a) + a(b) + a(c) = a^2 + ab + ac$
  - $b(a) + b(b) + b(c) = ab + b^2 + bc$
  - $c(a) + c(b) + c(c) = ac + bc + c^2$
  Sumando todo y agrupando términos semejantes ($ab+ba=2ab$, etc.), obtenemos: $a^2 + b^2 + c^2 + 2ab + 2ac + 2bc$.
  ¡Se eleva cada término al cuadrado y se suman los dobles de todas las combinaciones posibles de a dos términos!
procedimiento: |
  Al resolver $(a+b+c)^2$ mentalmente o paso a paso:
  1. Escribe el cuadrado de cada uno de los tres términos (siempre serán positivos).
  2. Multiplica el 1º término por el 2º, y duplícalo.
  3. Multiplica el 1º por el 3º, y duplícalo.
  4. Multiplica el 2º por el 3º, y duplícalo.
  5. Suma todos estos elementos prestando especial atención a los signos originales de cada término.
ejemplos:
  - titulo: 'Verificando los 6 términos finales'
    enunciado: 'Expande $(x+y+z)^2$.'
    solucion_pasos:
      - 'Cuadrados: $x^2 + y^2 + z^2$'
      - 'Dobles productos: $2xy + 2xz + 2yz$'
      - 'Final: $x^2 + y^2 + z^2 + 2xy + 2xz + 2yz$'
errores_frecuentes:
  - 'Dejar fuera algunos de los dobles productos combinados.'
  - 'Olvidar elevar al cuadrado alguno de los términos principales.'
