semantic_id: MAT.ALG.ADICION_POL.METODO_HORIZONTAL
objetivo: Sumar polinomios mediante el método horizontal, identificando y reduciendo términos semejantes en una
  sola línea.
introduccion: La suma de polinomios es, en esencia, la extensión de la reducción de términos semejantes. El método
  horizontal permite hacerlo todo en una misma línea, que es la forma más natural cuando los polinomios son sencillos.
resumen: En la **Adición Horizontal**, se colocan los polinomios uno al lado del otro entre paréntesis (si es necesario)
  y se eliminan los agrupadores. Luego se identifican y reducen todos los términos semejantes en una sola expresión
  de línea.
explicacion: '### Definición formal


  En la adición, los paréntesis precedidos de $+$ se eliminan sin alterar los signos.


  ### Desarrollo didáctico


  Suma: $(3x^2 + 2x - 1) + (x^2 - 4x + 5)$.


  Paso 1: Eliminamos paréntesis (precedidos de $+$, sin cambio de signos):

  $3x^2 + 2x - 1 + x^2 - 4x + 5$.


  Paso 2: Agrupamos por familias:

  - Familia $x^2$: $3x^2 + x^2 = 4x^2$.

  - Familia $x$: $2x - 4x = -2x$.

  - Constantes: $-1 + 5 = 4$.


  Resultado: $4x^2 - 2x + 4$.'
procedimiento:
- 'Paso 1: Escribe los polinomios en una línea, conectados por el signo $+$.'
- 'Paso 2: Elimina los paréntesis (en suma, los signos no cambian).'
- 'Paso 3: Agrupa visualmente los términos semejantes (por familias).'
- 'Paso 4: Reduce cada familia y escribe el polinomio resultado.'
ejemplos:
- titulo: Suma horizontal directa
  enunciado: 'Suma: (5a - 3) + (2a + 7).'
  solucion_pasos:
  - 'Eliminamos paréntesis: 5a - 3 + 2a + 7.'
  - 'Familia a: 5a + 2a = 7a.'
  - 'Constantes: -3 + 7 = 4.'
  - 'Resultado: 7a + 4.'
- titulo: La ganancia del primer trimestre de una empresa es $G_1 = 5000k - 200$, y del segundo trimes
  enunciado: 'La ganancia del primer trimestre de una empresa es $G_1 = 5000k - 200$, y del segundo trimestre es
    $G_2 = 3000k + 800$. ¿Cuál es la ganancia semestral total? (v1)


    Opciones: A) $8000k + 600$ · B) $8000k - 600$ · C) $2000k + 600$ · D) $8000k + 1000$'
  solucion_pasos:
  - 'Familia $k$: $5000+3000=8000k$. Constantes: $-200+800=600$. Total: $8000k+600$.'
  - 'Respuesta: $8000k + 600$'
- titulo: 'Respecto de «Adición de polinomios en forma horizontal»: ¿La siguiente formulación es correc'
  enunciado: 'Respecto de «Adición de polinomios en forma horizontal»: ¿La siguiente formulación es correcta? «En
    la **Adición Horizontal**, se colocan los polinomios uno al lado del otro entre paréntesis (si es necesario)
    y se eliminan los agrupadores»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: En la **Adición Horizontal**, se colocan los polinomios uno
    al lado del otro entre paréntesis (si es necesario) y se eliminan los agrupadores.'
- titulo: 'Respecto de «Adición de polinomios en forma horizontal»: ¿La siguiente conclusión es correct'
  enunciado: 'Respecto de «Adición de polinomios en forma horizontal»: ¿La siguiente conclusión es correcta? «Cambiar
    signos al eliminar paréntesis precedidos de $+$ (error que viene de confundir con la resta)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En la **Adición Horizontal**, se colocan los polinomios uno
    al lado del otro entre paréntesis (si es necesario) y se eliminan los agrupadores.'
errores_frecuentes:
- Cambiar signos al eliminar paréntesis precedidos de $+$ (error que viene de confundir con la resta).
- Olvidar agrupar todas las familias y dejar términos semejantes sin reducir.
- Cambiar todos los signos del segundo paréntesis.
- Multiplicar los coeficientes de los términos semejantes.
- Elevar los exponentes de cada término.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Adición de polinomios en forma horizontal
