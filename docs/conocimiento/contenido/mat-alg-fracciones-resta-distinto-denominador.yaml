semantic_id: MAT.ALG.FRACCIONES_RESTA.DISTINTO_DENOMINADOR
titulo: Resta con Diferentes Denominadores
objetivo: Preparar y restar fracciones algebraicas que no comparten denominador.
introduccion: Al igual que con la suma, si los pisos son distintos, tienes prohibido restar. Debes nivelar el terreno
  amplificando las fracciones primero.
resumen: Para restar fracciones de distinto denominador, halla el común denominador, amplifica los numeradores (multiplicando
  por lo que faltaba al denominador original), y procede con la resta usando paréntesis.
explicacion: '### Definición formal


  Sin común denominador, no se puede hacer la operación de resta.


  ### Desarrollo didáctico


  Restar fracciones con denominadores distintos te obliga a seguir la misma ruta ceremonial que la suma: Factorizar,
  encontrar el MCM, amplificar y unir los numeradores.


  Supongamos: $\frac{2}{x-1} - \frac{1}{x+1}$.

  1. Denominador común (MCM): $(x-1)(x+1)$.

  2. A la primera fracción le falta $(x+1)$ abajo. Multiplicamos su techo por eso: $2(x+1)$.

  3. A la segunda fracción le falta $(x-1)$ abajo. Multiplicamos su techo por eso: $1(x-1)$.

  4. Juntamos con la resta en medio: $\frac{2(x+1) - 1(x-1)}{(x-1)(x+1)}$.


  Aquí es donde la resta se pone agresiva: ese menos en medio va a afectar los signos del segundo bloque. Debes
  desarrollar con sumo cuidado.'
procedimiento:
- 'Paso 1: Encuentra el denominador común.'
- 'Paso 2: Amplifica el primer numerador.'
- 'Paso 3: Amplifica el segundo numerador.'
- 'Paso 4: Pon el signo menos entre ellos (si el segundo numerador tiene varios términos, ponlo entre paréntesis).'
- 'Paso 5: Reduce y simplifica si es posible.'
ejemplos:
- titulo: Resta $\frac{3}{a} - \frac{5}{b}$
  enunciado: Resta $\frac{3}{a} - \frac{5}{b}$.
  solucion_pasos:
  - 'Común denominador: $ab$.'
  - 'Primer num: $3 \cdot b = 3b$.'
  - 'Segundo num: $5 \cdot a = 5a$.'
  - 'Resultado: $\frac{3b - 5a}{ab}$.'
- titulo: Calcula $1 - \frac{1}{x}$.
  solucion_pasos:
  - El 1 es 1/1. MCM es x. Queda x/x - 1/x = (x-1)/x.
- titulo: 'Respecto de «Sustracción de fracciones algebraicas de distinto denominador»: ¿Es correcta es'
  enunciado: 'Respecto de «Sustracción de fracciones algebraicas de distinto denominador»: ¿Es correcta esta caracterización?
    «Para restar fracciones de distinto denominador, halla el común denominador, amplifica los numeradores (multiplicando
    por lo que faltaba al denominador original), y procede con la resta usando paréntesis»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para restar fracciones de distinto denominador, halla el común
    denominador, amplifica los numeradores (multiplicando por lo que faltaba al denominador original), y procede
    con la resta usando paréntesis.'
- titulo: 'Respecto de «Sustracción de fracciones algebraicas de distinto denominador»: ¿Es válida esta'
  enunciado: 'Respecto de «Sustracción de fracciones algebraicas de distinto denominador»: ¿Es válida esta afirmación?
    «Restar los denominadores entre sí»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para restar fracciones de distinto denominador, halla el común
    denominador, amplifica los numeradores (multiplicando por lo que faltaba al denominador original), y procede
    con la resta usando paréntesis.'
errores_frecuentes:
- Restar los denominadores entre sí.
- Restar A - C.
- Restar B - D.
- Para «El primer paso indispensable para restar $\frac{A}{B} - \frac{C}{D}$ cuando B y D son distintos es:», la
  respuesta correcta es Invertir C/D.
- $\frac{1}{a-a^2}$.
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
