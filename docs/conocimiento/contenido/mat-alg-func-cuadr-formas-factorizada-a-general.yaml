semantic_id: MAT.ALG.FUNC_CUADR_FORMAS.FACTORIZADA_A_GENERAL
titulo: Conversión de la forma factorizada a la forma general
objetivo: Convertir una función cuadrática desde su forma factorizada a la forma general, desarrollando el producto
  de binomios.
introduccion: Al igual que con la forma canónica, a veces es necesario volver a la forma general desde la forma
  factorizada, por ejemplo para comparar dos funciones o identificar sus coeficientes.
resumen: Para convertir $f(x)=a(x-r_1)(x-r_2)$ a la forma general, se desarrolla el producto de los dos binomios,
  se distribuye $a$, y se reducen los términos semejantes hasta llegar a $ax^2+bx+c$.
explicacion: '### Definición formal


  Dada $f(x)=a(x-r_1)(x-r_2)$, desarrollando el producto: $(x-r_1)(x-r_2)=x^2-(r_1+r_2)x+r_1r_2$. Multiplicando
  por $a$: $f(x)=ax^2-a(r_1+r_2)x+a(r_1r_2)$, que es la forma general.


  ### Desarrollo didáctico


  El procedimiento consiste en multiplicar los dos binomios término a término (usando distribución), y luego
  multiplicar todo el resultado por el coeficiente $a$.


  Para $f(x)=3(x-2)(x+4)$: desarrollando, $(x-2)(x+4)=x^2+2x-8$; multiplicando por $3$: $f(x)=3x^2+6x-24$.'
procedimiento:
- 'Paso 1: Desarrolla el producto de los dos binomios $(x-r_1)(x-r_2)$ mediante distribución.'
- 'Paso 2: Reduce los términos semejantes del desarrollo.'
- 'Paso 3: Distribuye el coeficiente $a$ en cada término.'
ejemplos:
- titulo: Conversión con coeficiente a igual a 1
  enunciado: 'Convierte a forma general $f(x)=(x-3)(x-7)$.'
  solucion_pasos:
  - 'Desarrollando: $x^2-7x-3x+21=x^2-10x+21$.'
  - '$f(x)=x^2-10x+21$.'
- titulo: Conversión con coeficiente a distinto de 1
  enunciado: 'Convierte a forma general $f(x)=2(x+1)(x-5)$.'
  solucion_pasos:
  - 'Desarrollando: $(x+1)(x-5)=x^2-5x+x-5=x^2-4x-5$.'
  - 'Multiplicando por $2$: $f(x)=2x^2-8x-10$.'
- titulo: ¿Convertir de forma factorizada a forma general cambia los ceros de la función?
  enunciado: ¿Convertir de forma factorizada a forma general cambia los ceros de la función?
  respuesta: 'No'
  solucion_pasos:
  - Son la misma función expresada de dos maneras equivalentes; los ceros siguen siendo exactamente los mismos.
- titulo: ¿El término independiente $c$ de la forma general es igual al producto $a \cdot r_1 \cdot r_2$?
  enunciado: ¿El término independiente $c$ de la forma general es igual al producto $a \cdot r_1 \cdot r_2$?
  respuesta: Sí
  solucion_pasos:
  - Al desarrollar $a(x-r_1)(x-r_2)$, el término constante resultante es exactamente $a \cdot r_1 \cdot r_2$.
errores_frecuentes:
- Cometer errores de signo al desarrollar el producto de binomios con raíces negativas.
- Olvidar distribuir el coeficiente $a$ en todos los términos del desarrollo.
- No reducir correctamente los términos semejantes al multiplicar los binomios.
- Confundir el desarrollo del producto de binomios con el cuadrado de un binomio.
