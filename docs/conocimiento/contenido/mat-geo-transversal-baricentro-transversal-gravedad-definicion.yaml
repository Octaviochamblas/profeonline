semantic_id: MAT.GEO.TRANSVERSAL_BARICENTRO.TRANSVERSAL_GRAVEDAD_DEFINICION
titulo: Definición de transversal de gravedad como segmento desde un vértice al punto medio del lado opuesto
objetivo: Identificar la transversal de gravedad (mediana) como el segmento que une un vértice con el
  punto medio del lado opuesto.
introduccion: De los segmentos notables que parten de un vértice, la transversal de gravedad es el que
  llega exactamente al punto medio del lado opuesto, sin importar el ángulo que forme con él.
resumen: La transversal de gravedad (o mediana) de un triángulo es el segmento que une un vértice con
  el punto medio del lado opuesto.
explicacion: '![Transversal de gravedad desde un vértice](/static/img/geometria/elementos-secundarios/transversal-baricentro-transversal-gravedad-definicion.svg)


  ### Definición formal


  La transversal de gravedad desde el vértice A de un triángulo ABC es el segmento AM, donde M es el punto
  medio del lado BC.


  ### Desarrollo didáctico


  Cada triángulo tiene tres transversales de gravedad, una por cada vértice. A diferencia de la altura,
  la transversal de gravedad no exige ningún ángulo particular con el lado opuesto, solo llegar a su punto
  medio.'
procedimiento:
- 'Paso 1: Elige un vértice del triángulo.'
- 'Paso 2: Encuentra el punto medio del lado opuesto a ese vértice.'
- 'Paso 3: Traza el segmento que une el vértice con ese punto medio: esa es la transversal de gravedad.'
ejemplos:
- titulo: Reconocer una transversal de gravedad
  enunciado: Se traza un segmento desde A hasta el punto medio de BC.
  solucion_pasos:
  - Ese segmento es la transversal de gravedad desde A.
- titulo: Contar transversales de gravedad
  enunciado: ¿Cuántas transversales de gravedad tiene un triángulo?
  solucion_pasos:
  - Tiene tres, una por cada vértice.
- titulo: ¿La transversal de gravedad siempre llega al punto medio del lado opuesto?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente su condición de definición.
- titulo: ¿La transversal de gravedad es siempre perpendicular al lado opuesto?
  respuesta: 'No'
  solucion_pasos:
  - No, esa condición corresponde a la altura, no a la transversal de gravedad.
errores_frecuentes:
- Confundir la transversal de gravedad con la altura o la bisectriz del mismo vértice.
- Trazar el segmento hacia un punto del lado opuesto que no es su punto medio.
- Creer que la transversal de gravedad debe formar un ángulo específico con el lado opuesto.
fuente: Elaboración propia.
estado: publicado
