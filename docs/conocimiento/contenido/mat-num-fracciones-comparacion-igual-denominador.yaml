semantic_id: MAT.NUM.FRACCIONES_COMPARACION.IGUAL_DENOMINADOR
objetivo: Comparar fracciones con igual denominador.
introduccion: 'El caso “Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), la mayor es \(\frac{5}{9}\)”
  plantea una situación propia de comparación de fracciones de igual denominador.
  Resolverla exige usar esta condición con precisión: si dos fracciones tienen igual
  denominador, es mayor la que tiene mayor numerador.'
resumen: Si dos fracciones tienen igual denominador, es mayor la que tiene mayor numerador.
  Como criterio de control, con denominadores iguales, las partes comparadas tienen
  el mismo tamaño
explicacion: |-
  Si dos fracciones tienen igual denominador, es mayor la que tiene mayor numerador.

  Esta formulación se hace concreta en “Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), la mayor es \(\frac{5}{9}\)”. Allí puede reconocerse que con denominadores iguales, las partes comparadas tienen el mismo tamaño.
procedimiento:
- 'Paso 1: Comprueba que ambas fracciones tengan el mismo denominador positivo.'
- 'Paso 2: Compara directamente sus numeradores.'
- 'Paso 3: Escribe el orden de las fracciones con el símbolo correspondiente.'
ejemplos:
- titulo: Aplicación razonada — Comparación de fracciones de igual denominador
  enunciado: Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), la mayor es \(\frac{5}{9}\).
  solucion_pasos:
  - Comprueba que ambas fracciones tengan el mismo denominador positivo.
  - Compara directamente sus numeradores.
  - Escribe el orden de las fracciones con el símbolo correspondiente.
- titulo: Revisión de una solución — Comparación de fracciones de igual denominador
  enunciado: Una solución aplica “Compara directamente sus numeradores.”, pero termina
    sin comprobar que con denominadores iguales, las partes comparadas tienen el mismo
    tamaño. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define comparación de fracciones de igual denominador:
    si dos fracciones tienen igual denominador, es mayor la que tiene mayor numerador.'
  - Comprueba que ambas fracciones tengan el mismo denominador positivo.
  - 'Completa la revisión con este control: Escribe el orden de las fracciones con
    el símbolo correspondiente.'
- titulo: ¿Se cumple que con denominadores iguales, las partes comparadas tienen el
    mismo tamaño? — Comparación de fracciones de igual denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que si dos fracciones tienen igual denominador,
    es mayor la que tiene mayor numerador.
  - El caso “Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), la mayor es \(\frac{5}{9}\)”
    satisface esa condición.
  - Escribe el orden de las fracciones con el símbolo correspondiente.
- titulo: ¿Es válido omitir el paso “Comprueba que ambas fracciones tengan el mismo
    denominador positivo”? — Comparación de fracciones de igual denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de comparación de fracciones de
    igual denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Compara directamente sus
    numeradores.'
  - 'La solución debe terminar de este modo: Escribe el orden de las fracciones con
    el símbolo correspondiente.'
errores_frecuentes:
- 'Empezar comparación de fracciones de igual denominador sin realizar este control
  inicial: Comprueba que ambas fracciones tengan el mismo denominador positivo.'
- Memorizar “Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), la mayor es \(\frac{5}{9}\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Compara directamente sus numeradores.” y usarlo aunque
  cambien las condiciones del problema.
- Dar por válida una conclusión sobre comparación de fracciones de igual denominador
  que contradice el criterio “Con denominadores iguales, las partes comparadas tienen
  el mismo tamaño”.
- 'Cerrar el ejercicio sin esta comprobación específica: Escribe el orden de las fracciones
  con el símbolo correspondiente.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
