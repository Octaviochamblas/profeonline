semantic_id: MAT.NUM.FRACCIONES_COMPARACION.IGUAL_DENOMINADOR
titulo: Comparación de fracciones con igual denominador
objetivo: Ordenar fracciones que comparten el mismo denominador.
introduccion: Cuando dos fracciones dividen el entero en la misma cantidad de partes, basta con mirar
  cuántas partes toma cada una para saber cuál es mayor.
resumen: Si dos fracciones tienen igual denominador, es mayor la que tiene mayor numerador.
explicacion: '### Definición formal


  Si \(b>0\), entonces \(\frac{a_1}{b}>\frac{a_2}{b} \iff a_1>a_2\), porque ambas fracciones dividen el
  entero en \(b\) partes iguales y solo cambia cuántas se toman.


  ### Desarrollo didáctico


  Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), ambas dividen el entero en 9 partes iguales; como \(5>3\),
  se toman más partes en la primera, así que \(\frac{5}{9}>\frac{3}{9}\).'
procedimiento:
- 'Paso 1: Comprueba que ambas fracciones tengan el mismo denominador positivo.'
- 'Paso 2: Compara directamente sus numeradores.'
- 'Paso 3: Escribe el orden de las fracciones con el símbolo correspondiente.'
ejemplos:
- titulo: Aplicación razonada — Comparación de fracciones de igual denominador
  enunciado: Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), la mayor es \(\frac{5}{9}\).
  solucion_pasos:
  - Comprueba que ambas fracciones tengan el mismo denominador positivo.
  - Compara directamente sus numeradores.
  - Escribe el orden de las fracciones con el símbolo correspondiente.
- titulo: Revisión de una solución — Comparación de fracciones de igual denominador
  enunciado: Una solución aplica “Compara directamente sus numeradores.”, pero termina sin comprobar que
    con denominadores iguales, las partes comparadas tienen el mismo tamaño. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define comparación de fracciones de igual denominador: si dos fracciones
    tienen igual denominador, es mayor la que tiene mayor numerador.'
  - Comprueba que ambas fracciones tengan el mismo denominador positivo.
  - 'Completa la revisión con este control: Escribe el orden de las fracciones con el símbolo correspondiente.'
- titulo: ¿Se cumple que con denominadores iguales, las partes comparadas tienen el mismo tamaño? — Comparación
    de fracciones de igual denominador
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que si dos fracciones tienen igual denominador, es mayor la
    que tiene mayor numerador.
  - El caso “Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), la mayor es \(\frac{5}{9}\)” satisface esa condición.
  - Escribe el orden de las fracciones con el símbolo correspondiente.
- titulo: ¿Es válido omitir el paso “Comprueba que ambas fracciones tengan el mismo denominador positivo”?
    — Comparación de fracciones de igual denominador
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de comparación de fracciones de igual denominador.
  - 'Omitirlo puede volver inválida la acción siguiente: Compara directamente sus numeradores.'
  - 'La solución debe terminar de este modo: Escribe el orden de las fracciones con el símbolo correspondiente.'
errores_frecuentes:
- 'Empezar comparación de fracciones de igual denominador sin realizar este control inicial: Comprueba
  que ambas fracciones tengan el mismo denominador positivo.'
- Memorizar “Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), la mayor es \(\frac{5}{9}\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Compara directamente sus numeradores.” y usarlo aunque cambien las condiciones
  del problema.
- Dar por válida una conclusión sobre comparación de fracciones de igual denominador que contradice el
  criterio “Con denominadores iguales, las partes comparadas tienen el mismo tamaño”.
- 'Cerrar el ejercicio sin esta comprobación específica: Escribe el orden de las fracciones con el símbolo
  correspondiente.'
