semantic_id: MAT.NUM.FRACCIONES_COMPARACION.IGUAL_DENOMINADOR
objetivo: Comprender comparación de fracciones de igual denominador y aplicarlo correctamente
  en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso comparación de fracciones de igual denominador ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Si dos fracciones tienen igual denominador, es mayor la que tiene mayor numerador.
  Además, con denominadores iguales, las partes comparadas tienen el mismo tamaño.
explicacion: |-
  Si dos fracciones tienen igual denominador, es mayor la que tiene mayor numerador.

  Una idea importante es que con denominadores iguales, las partes comparadas tienen el mismo tamaño.

  Por ejemplo, Entre \(\frac{5}{9}\) y \(\frac{3}{9}\), la mayor es \(\frac{5}{9}\).
procedimiento:
- 'Paso 1: Elegir una estrategia conveniente: simplificar, amplificar, usar productos
  cruzados o un denominador común.'
- 'Paso 2: Ejecutar la comparación o transformación paso a paso, cuidando el valor
  de la fracción.'
- 'Paso 3: Interpretar el resultado y expresarlo con lenguaje matemático claro.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Entre \(\frac{5}{9}\) y \(\frac{3}{9}\),
    la mayor es \(\frac{5}{9}\).” se relaciona con comparación de fracciones de igual
    denominador.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: si dos fracciones tienen igual denominador, es mayor
    la que tiene mayor numerador.'
  - Concluye que el ejemplo sí ilustra comparación de fracciones de igual denominador.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Con denominadores iguales, las partes comparadas
    tienen el mismo tamaño.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con comparación de fracciones de igual denominador?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que con denominadores iguales, las partes comparadas
    tienen el mismo tamaño.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar comparación de fracciones de igual denominador ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar comparación de fracciones de igual denominador sin mirar qué representan
  numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
