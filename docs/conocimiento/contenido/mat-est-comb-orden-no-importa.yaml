semantic_id: MAT.EST.COMBINACIONES.ORDEN_NO_IMPORTA
titulo: Identificar situaciones donde el orden de selección no importa
objetivo: Identificar en un problema de conteo si el orden de selección de los elementos es irrelevante,
  lo que indica que corresponde usar una combinación.
introduccion: Reconocer correctamente si un problema exige distinguir el orden es el paso más importante
  para elegir la fórmula de conteo adecuada.
resumen: El orden no importa cuando dos selecciones con los mismos elementos, en distinto orden, se consideran
  el mismo resultado (por ejemplo, un mismo grupo de personas seleccionadas).
explicacion: '![Identificar cuándo el orden no importa](/static/img/probabilidad/comb/comb-orden-no-importa.svg)


  ### Definición formal


  Si intercambiar el orden de los elementos seleccionados no cambia el resultado del problema, el orden
  no importa, y corresponde usar la fórmula de combinación $C(n,r)$.


  ### Desarrollo didáctico


  Al elegir 2 amigos de un grupo de 5 para ir al cine, seleccionar primero a A y luego a B es exactamente
  lo mismo que seleccionar primero a B y luego a A: el grupo resultante {A,B} es el mismo en ambos casos.'
procedimiento:
- 'Paso 1: Lee el problema e identifica si distintas personas u objetos cumplen roles diferenciados entre
  sí.'
- 'Paso 2: Si no hay roles diferenciados (todos los seleccionados cumplen la misma función), el orden
  no importa.'
- 'Paso 3: En ese caso, aplica la fórmula de combinación C(n,r) para contar las selecciones posibles.'
ejemplos:
- titulo: Reconocer un caso donde el orden no importa
  enunciado: Elegir 2 amigos de un grupo de 5 para ir al cine juntos.
  solucion_pasos:
  - 'El orden no importa: el grupo {A,B} es el mismo, sin importar quién fue ''elegido primero''.'
- titulo: Reconocer un caso donde el orden SÍ importa (para contraste)
  enunciado: Asignar el rol de conductor y copiloto entre 2 amigos elegidos.
  solucion_pasos:
  - El orden sí importa aquí, ya que 'A conductor, B copiloto' es distinto de 'B conductor, A copiloto';
    sería una variación, no una combinación.
- titulo: ¿Elegir un grupo de estudio sin roles diferenciados es un caso de combinación?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que el grupo resultante es el mismo sin importar el orden de selección de sus integrantes.
- titulo: ¿Formar una fila de personas es un caso donde el orden no importa?
  respuesta: 'No'
  solucion_pasos:
  - No, en una fila cada posición es distinta, por lo que el orden sí importa (sería una permutación).
errores_frecuentes:
- Aplicar la fórmula de combinación en problemas donde en realidad hay roles diferenciados (que requieren
  variación).
- Aplicar la fórmula de variación en problemas donde en realidad no hay roles diferenciados (que requieren
  combinación).
- No detenerse a analizar si el contexto del problema distingue o no los roles de los elementos seleccionados.
fuente: Elaboración propia.
estado: publicado
