semantic_id: MAT.GEO.RECTA_ECUACIONES.PARAMETRO_T
titulo: Interpretación del parámetro t en una ecuación paramétrica de la recta
objetivo: Interpretar el parámetro t en una ecuación paramétrica como una variable que recorre todos los
  puntos de la recta, con t=0 correspondiendo al punto de referencia.
introduccion: El parámetro t no representa una coordenada geométrica directamente, sino un valor que indica
  qué tan lejos y en qué dirección nos movemos desde el punto de referencia, a lo largo del vector director.
resumen: En la ecuación paramétrica $x=x_0+td_1$, $y=y_0+td_2$, el parámetro $t=0$ corresponde exactamente
  al punto de referencia $(x_0,y_0)$; valores positivos de $t$ se mueven en la dirección del vector director,
  y valores negativos en la dirección opuesta.
explicacion: '![Interpretación del parámetro t](/static/img/geometria/analitica/rectaeq-parametro-t.svg)


  ### Definición formal


  Para $t=0$: $(x,y)=(x_0,y_0)$. Para $t=1$: $(x,y)=(x_0+d_1,y_0+d_2)$, un punto desplazado exactamente
  el vector director completo. Para $t=-1$: $(x,y)=(x_0-d_1,y_0-d_2)$, desplazado en la dirección opuesta.


  ### Desarrollo didáctico


  En la figura, con punto $(0,1)$ y vector director $(4,3)$: en $t=0$ estamos en $(0,1)$; en $t=1$, en
  $(4,4)$; en $t=-1$, en $(-4,-2)$. A medida que $t$ aumenta, nos movemos en la dirección del vector;
  a medida que disminuye, en la dirección opuesta.'
procedimiento:
- 'Paso 1: Reconoce que t=0 siempre corresponde al punto de referencia (x0,y0).'
- 'Paso 2: Interpreta que valores positivos de t desplazan el punto en la dirección del vector director.'
- 'Paso 3: Interpreta que valores negativos de t desplazan el punto en la dirección opuesta al vector
  director.'
ejemplos:
- titulo: Interpretar t=0 en una ecuación paramétrica
  enunciado: x=4t, y=1+3t.
  solucion_pasos:
  - En t=0, el punto es (0,1), el punto de referencia de la recta.
- titulo: Interpretar el efecto de aumentar t
  enunciado: x=4t, y=1+3t, comparando t=1 y t=2.
  solucion_pasos:
  - En t=1 el punto es (4,4); en t=2 es (8,7). Al aumentar t, el punto se aleja más en la dirección del
    vector director (4,3).
- titulo: ¿t=0 siempre corresponde al punto de referencia (x0,y0)?
  respuesta: Sí
  solucion_pasos:
  - Sí, al sustituir t=0 en las ecuaciones paramétricas, se obtiene exactamente ese punto.
- titulo: ¿Un valor negativo de t representa un punto fuera de la recta?
  respuesta: 'No'
  solucion_pasos:
  - No, todos los valores de t (positivos, negativos o cero) representan puntos sobre la misma recta.
errores_frecuentes:
- Creer que t representa directamente una coordenada x o y del punto.
- Asumir que solo valores positivos de t generan puntos válidos sobre la recta.
- Confundir la magnitud de t con la distancia real recorrida (que depende también de la magnitud del vector
  director).
fuente: Elaboración propia.
estado: publicado
