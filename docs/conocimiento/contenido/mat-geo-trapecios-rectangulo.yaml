semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.TRAPECIO_RECTANGULO
titulo: Definición de trapecio rectángulo
objetivo: Reconocer el trapecio rectángulo como un caso particular de trapecio con uno de sus lados laterales
  perpendicular a las bases.
introduccion: Otro caso particular importante de trapecio se caracteriza por tener uno de sus lados laterales
  formando ángulos rectos con las bases.
resumen: Un trapecio rectángulo es un trapecio que tiene uno de sus lados laterales perpendicular a las
  dos bases (formando dos ángulos rectos).
explicacion: '![Trapecio rectángulo: un lado lateral perpendicular a las bases](/static/img/geometria/poligonos-cuadrilateros/trapecios-rectangulo.svg)


  ### Definición formal


  Un trapecio $ABCD$ con $AB\parallel CD$ es rectángulo si uno de sus lados laterales (por ejemplo, $AD$)
  es perpendicular a ambas bases, generando dos ángulos rectos en los vértices $A$ y $D$.


  ### Desarrollo didáctico


  En un trapecio rectángulo, el lado lateral perpendicular actúa directamente como la altura del trapecio,
  simplificando el cálculo del área, ya que no es necesario trazar una altura adicional.'
procedimiento:
- 'Paso 1: Verifica que la figura sea un trapecio (un par de lados paralelos).'
- 'Paso 2: Verifica que uno de sus lados laterales sea perpendicular a ambas bases.'
- 'Paso 3: Si se cumple esa condición, es un trapecio rectángulo.'
ejemplos:
- titulo: Identificar un trapecio rectángulo
  enunciado: Un trapecio tiene un lado lateral que forma 90° con ambas bases.
  solucion_pasos:
  - Es un trapecio rectángulo, ya que cumple la condición de perpendicularidad.
- titulo: Usar el lado perpendicular como altura
  enunciado: En un trapecio rectángulo, el lado lateral perpendicular mide 6 cm.
  solucion_pasos:
  - Ese lado es directamente la altura del trapecio, sin necesidad de trazar otra.
- titulo: ¿Cuántos ángulos rectos tiene un trapecio rectángulo?
  respuesta: Dos
  solucion_pasos:
  - Dos, ambos formados por el lado lateral perpendicular con cada una de las bases.
- titulo: ¿Un trapecio rectángulo puede ser también isósceles?
  respuesta: No, en general
  solucion_pasos:
  - No, salvo casos degenerados, ya que la perpendicularidad de un solo lado rompe la simetría necesaria
    para ser isósceles.
errores_frecuentes:
- Creer que un trapecio rectángulo tiene los cuatro ángulos rectos (eso lo convertiría en rectángulo,
  no trapecio).
- Confundir el lado lateral perpendicular con la mediana o con una diagonal.
- Olvidar que el lado perpendicular puede usarse directamente como la altura del trapecio para calcular
  su área.
fuente: 'Fuente: Moraleja Tomo 2 69, Cid 44.'
estado: publicado
