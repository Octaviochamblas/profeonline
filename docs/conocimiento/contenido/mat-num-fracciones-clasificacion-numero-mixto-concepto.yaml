semantic_id: MAT.NUM.FRACCIONES_CLASIFICACION.NUMERO_MIXTO_CONCEPTO
titulo: Número mixto
objetivo: Interpretar un número mixto como la suma de una parte entera y una fracción propia.
introduccion: 'Las fracciones impropias suelen escribirse de una forma más fácil de visualizar: separando
  la parte entera completa de la parte fraccionaria restante. Esa forma es el número mixto.'
resumen: Un número mixto \(c\frac{a}{b}\) representa la suma \(c+\frac{a}{b}\), con \(c\in\mathbb{Z}^+\)
  y \(\frac{a}{b}\) una fracción propia.
explicacion: '### Definición formal


  Un número mixto \(c\frac{a}{b}\) es una notación abreviada para la suma \(c+\frac{a}{b}\), donde \(c\)
  es la parte entera y \(\frac{a}{b}\) (con \(a<b\)) es la parte fraccionaria propia. Todo número mixto
  puede convertirse en una fracción impropia equivalente.


  ### Desarrollo didáctico


  \(2\frac{1}{3}\) representa \(2+\frac{1}{3}\): dos enteros completos más un tercio adicional, lo que
  equivale a la fracción impropia \(\frac{7}{3}\).'
procedimiento:
- 'Paso 1: Separa la parte entera de la parte fraccionaria propia.'
- 'Paso 2: Interpreta el número como la suma de ambas partes.'
- 'Paso 3: Convierte a impropia cuando necesites verificar o efectuar operaciones.'
ejemplos:
- titulo: Aplicación razonada — Concepto de número mixto
  enunciado: \(2\frac{1}{3}\) representa 2 enteros y un tercio adicional.
  solucion_pasos:
  - Separa la parte entera de la parte fraccionaria propia.
  - Interpreta el número como la suma de ambas partes.
  - Convierte a impropia cuando necesites verificar o efectuar operaciones.
- titulo: Revisión de una solución — Concepto de número mixto
  enunciado: Una solución aplica “Interpreta el número como la suma de ambas partes.”, pero termina sin
    comprobar que un número mixto es otra forma de escribir una fracción impropia positiva. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define concepto de número mixto: un número mixto combina una parte entera
    y una fracción propia.'
  - Separa la parte entera de la parte fraccionaria propia.
  - 'Completa la revisión con este control: Convierte a impropia cuando necesites verificar o efectuar
    operaciones.'
- titulo: ¿Se cumple que un número mixto es otra forma de escribir una fracción impropia positiva? — Concepto
    de número mixto
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un número mixto combina una parte entera y una fracción
    propia.
  - El caso “\(2\frac{1}{3}\) representa 2 enteros y un tercio adicional” satisface esa condición.
  - Convierte a impropia cuando necesites verificar o efectuar operaciones.
- titulo: ¿Es válido omitir el paso “Separa la parte entera de la parte fraccionaria propia”? — Concepto
    de número mixto
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de concepto de número mixto.
  - 'Omitirlo puede volver inválida la acción siguiente: Interpreta el número como la suma de ambas partes.'
  - 'La solución debe terminar de este modo: Convierte a impropia cuando necesites verificar o efectuar
    operaciones.'
errores_frecuentes:
- 'Empezar concepto de número mixto sin realizar este control inicial: Separa la parte entera de la parte
  fraccionaria propia.'
- Memorizar “\(2\frac{1}{3}\) representa 2 enteros y un tercio adicional” como respuesta aislada, sin
  reconstruir la definición que lo justifica.
- Convertir en receta el paso “Interpreta el número como la suma de ambas partes.” y usarlo aunque cambien
  las condiciones del problema.
- Dar por válida una conclusión sobre concepto de número mixto que contradice el criterio “Un número mixto
  es otra forma de escribir una fracción impropia positiva”.
- 'Cerrar el ejercicio sin esta comprobación específica: Convierte a impropia cuando necesites verificar
  o efectuar operaciones.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
estado: publicado
