semantic_id: MAT.NUM.RACIONALES_CONCEPTO.DEFINICION_Q
objetivo: Comprender definición de número racional como a/b con b distinto de cero
  y aplicarlo correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso definición de número racional como a/b con b distinto de cero ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Un número racional es todo número que puede escribirse como \(\frac{a}{b}\)
  con \(a, b \in \mathbb{z}\) y \(b \neq 0\). Además, todo número racional tiene una
  representación fraccionaria con denominador distinto de cero.
explicacion: |-
  Un número racional es todo número que puede escribirse como \(\frac{a}{b}\) con \(a, b \in \mathbb{z}\) y \(b \neq 0\).

  Una idea importante es que todo número racional tiene una representación fraccionaria con denominador distinto de cero.

  Por ejemplo, Por ejemplo, \(\frac{3}{4}\), \(-\frac{7}{2}\) y \(5=\frac{5}{1}\) son racionales.
procedimiento:
- 'Paso 1: Identificar qué representa el número o la fracción en la situación.'
- 'Paso 2: Revisar la definición formal del concepto y sus condiciones.'
- 'Paso 3: Concluir si el ejemplo sí corresponde a definición de número racional como
  a/b con b distinto de cero y justificarlo.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Por ejemplo, \(\frac{3}{4}\), \(-\frac{7}{2}\)
    y \(5=\frac{5}{1}\) son racionales.” se relaciona con definición de número racional
    como a/b con b distinto de cero.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: un número racional es todo número que puede escribirse
    como \(\frac{a}{b}\) con \(a, b \in \mathbb{Z}\) y \(b \neq 0\).'
  - Concluye que el ejemplo sí ilustra definición de número racional como a/b con
    b distinto de cero.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Todo número racional tiene una representación
    fraccionaria con denominador distinto de cero.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con definición de número racional como a/b
    con b distinto de cero?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que todo número racional tiene una representación
    fraccionaria con denominador distinto de cero.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar definición de número racional como a/b con b distinto de
    cero ignorando la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar definición de número racional como a/b con b distinto de cero sin
  mirar qué representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
