semantic_id: MAT.NUM.RACIONALES_CONCEPTO.DEFINICION_Q
objetivo: Decidir si un número pertenece a \(\mathbb{Q}\).
introduccion: 'Observa este caso: \(\frac{3}{4}\), \(-\frac{7}{2}\) y \(5=\frac{5}{1}\)
  son racionales. Para explicar por qué funciona estudiaremos definición de número
  racional como a/b con b distinto de cero. Al finalizar podrás decidir si un número
  pertenece a \(\mathbb{Q}\).'
resumen: Un número racional es todo número que puede escribirse como \(\frac{a}{b}\)
  con \(a, b \in \mathbb{Z}\) y \(b \neq 0\). Como criterio de control, todo número
  racional tiene una representación fraccionaria con denominador distinto de cero
explicacion: |-
  Un número racional es todo número que puede escribirse como \(\frac{a}{b}\) con \(a, b \in \mathbb{Z}\) y \(b \neq 0\).

  Esta formulación se hace concreta en “\(\frac{3}{4}\), \(-\frac{7}{2}\) y \(5=\frac{5}{1}\) son racionales”. Allí puede reconocerse que todo número racional tiene una representación fraccionaria con denominador distinto de cero.
procedimiento:
- 'Paso 1: Escribe el número como un cociente \(a/b\) de enteros.'
- 'Paso 2: Comprueba que el denominador elegido sea distinto de cero.'
- 'Paso 3: Concluye si la representación cumple completa la definición de racional.'
ejemplos:
- titulo: Aplicación razonada — Definición de número racional como a/b con b distinto
    de cero
  enunciado: \(\frac{3}{4}\), \(-\frac{7}{2}\) y \(5=\frac{5}{1}\) son racionales.
  solucion_pasos:
  - Escribe el número como un cociente \(a/b\) de enteros.
  - Comprueba que el denominador elegido sea distinto de cero.
  - Concluye si la representación cumple completa la definición de racional.
- titulo: Revisión de una solución — Definición de número racional como a/b con b
    distinto de cero
  enunciado: Una solución aplica “Comprueba que el denominador elegido sea distinto
    de cero.”, pero termina sin comprobar que todo número racional tiene una representación
    fraccionaria con denominador distinto de cero. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define definición de número racional como a/b con b
    distinto de cero: un número racional es todo número que puede escribirse como
    \(\frac{a}{b}\) con \(a, b \in \mathbb{Z}\) y \(b \neq 0\).'
  - Escribe el número como un cociente \(a/b\) de enteros.
  - 'Completa la revisión con este control: Concluye si la representación cumple completa
    la definición de racional.'
- titulo: ¿Se cumple que todo número racional tiene una representación fraccionaria
    con denominador distinto de cero? — Definición de número racional como a/b con
    b distinto de cero
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un número racional es todo número que
    puede escribirse como \(\frac{a}{b}\) con \(a, b \in \mathbb{Z}\) y \(b \neq 0\).
  - El caso “\(\frac{3}{4}\), \(-\frac{7}{2}\) y \(5=\frac{5}{1}\) son racionales”
    satisface esa condición.
  - Concluye si la representación cumple completa la definición de racional.
- titulo: ¿Es válido omitir el paso “Escribe el número como un cociente \(a/b\) de
    enteros”? — Definición de número racional como a/b con b distinto de cero
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de definición de número racional
    como a/b con b distinto de cero.
  - 'Omitirlo puede volver inválida la acción siguiente: Comprueba que el denominador
    elegido sea distinto de cero.'
  - 'La solución debe terminar de este modo: Concluye si la representación cumple
    completa la definición de racional.'
errores_frecuentes:
- 'Empezar definición de número racional como a/b con b distinto de cero sin realizar
  este control inicial: Escribe el número como un cociente \(a/b\) de enteros.'
- Memorizar “\(\frac{3}{4}\), \(-\frac{7}{2}\) y \(5=\frac{5}{1}\) son racionales”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Comprueba que el denominador elegido sea distinto de
  cero.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre definición de número racional como a/b con b
  distinto de cero que contradice el criterio “Todo número racional tiene una representación
  fraccionaria con denominador distinto de cero”.
- 'Cerrar el ejercicio sin esta comprobación específica: Concluye si la representación
  cumple completa la definición de racional.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
