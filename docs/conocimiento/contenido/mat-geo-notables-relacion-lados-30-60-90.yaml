semantic_id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.RELACION_LADOS_30_60_90
titulo: 'Relación de lados en el triángulo 30°-60°-90°: cateto opuesto a 30° = ½ hipotenusa, cateto opuesto
  a 60° = hipotenusa·√3/2'
objetivo: Aplicar la relación fija entre los lados de un triángulo notable 30°-60°-90° para calcular catetos
  o hipotenusa.
introduccion: Al igual que el 45-45-90, el triángulo 30-60-90 tiene una proporción fija entre sus lados,
  pero en este caso los tres lados son distintos entre sí.
resumen: 'En un triángulo 30°-60°-90° con hipotenusa $h$: el cateto opuesto al ángulo de 30° mide $\frac{h}{2}$,
  y el cateto opuesto al ángulo de 60° mide $\frac{h\sqrt3}{2}$.'
explicacion: '![Relación de lados en el triángulo 30°-60°-90°](/static/img/geometria/areas-pitagoras/notables-relacion-lados-30-60-90.svg)


  ### Definición formal


  Si la hipotenusa mide $h$, el cateto menor (opuesto a 30°) mide $\frac{h}{2}$, y el cateto mayor (opuesto
  a 60°) mide $\frac{h}{2}\times\sqrt3=\frac{h\sqrt3}{2}$; esta relación se verifica con Pitágoras: $\left(\frac{h}{2}\right)^2+\left(\frac{h\sqrt3}{2}\right)^2=\frac{h^2}{4}+\frac{3h^2}{4}=h^2$.


  ### Desarrollo didáctico


  Un triángulo 30-60-90 con hipotenusa 10 cm tiene cateto menor $\frac{10}{2}=5$ cm (opuesto a 30°) y
  cateto mayor $\frac{10\sqrt3}{2}=5\sqrt3\approx8,66$ cm (opuesto a 60°).'
procedimiento:
- 'Paso 1: Identifica la hipotenusa del triángulo.'
- 'Paso 2: El cateto opuesto al ángulo de 30° es la mitad de la hipotenusa.'
- 'Paso 3: El cateto opuesto al ángulo de 60° es la mitad de la hipotenusa multiplicada por √3.'
ejemplos:
- titulo: Calcular catetos con hipotenusa 10
  enunciado: Un triángulo 30-60-90 tiene hipotenusa 10 cm.
  solucion_pasos:
  - 'Cateto opuesto a 30°: 10/2=5 cm. Cateto opuesto a 60°: 5√3≈8,66 cm.'
- titulo: Calcular la hipotenusa con el cateto menor
  enunciado: El cateto opuesto al ángulo de 30° mide 6 cm.
  solucion_pasos:
  - 'La hipotenusa es el doble del cateto menor: h=12 cm.'
- titulo: ¿El cateto opuesto a 60° es siempre mayor que el opuesto a 30°?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque √3≈1,73 es mayor que 1.
- titulo: ¿La hipotenusa es siempre el lado más largo?
  respuesta: Sí
  solucion_pasos:
  - Sí, la hipotenusa es siempre el lado opuesto al ángulo recto, el mayor de los tres.
errores_frecuentes:
- Confundir cuál cateto corresponde al ángulo de 30° y cuál al de 60°.
- Olvidar el factor √3 al calcular el cateto mayor.
- Calcular la hipotenusa como el doble del cateto mayor en vez del menor.
fuente: Elaboración propia.
estado: publicado
