semantic_id: MAT.ALG.FUNCION_AFIN.FORMULA_DESDE_GRAFICO
titulo: Determinación de la fórmula de una función afín desde su gráfico
objetivo: Obtener la fórmula algebraica de una función afín a partir de la lectura de su gráfica.
introduccion: Si conoces el dibujo de la recta, puedes reconstruir exactamente su fórmula leyendo dos datos clave
  directamente del gráfico.
resumen: Para determinar la fórmula de una función afín desde su gráfico, se identifica el punto de corte con
  el eje $y$ (que da $n$) y se calcula la pendiente $m$ usando dos puntos visibles de la recta.
explicacion: '### Definición formal


  Dada la gráfica de una recta no vertical, su fórmula $f(x)=mx+n$ se reconstruye identificando $n$ como la ordenada
  del punto de corte con el eje $y$, y calculando $m = \dfrac{y_2-y_1}{x_2-x_1}$ usando dos puntos cualesquiera
  visibles en la gráfica.


  ### Desarrollo didáctico


  El proceso combina dos lecturas: una directa (el intercepto $n$) y una calculada (la pendiente $m$, usando la
  fórmula de dos puntos).


  Si el gráfico corta al eje $y$ en $(0,4)$ y pasa también por $(2,10)$: $n=4$, y $m=\frac{10-4}{2-0}=3$. La fórmula
  es $f(x)=3x+4$.'
procedimiento:
- 'Paso 1: Identifica el punto donde la recta corta al eje $y$; su ordenada es $n$.'
- 'Paso 2: Identifica un segundo punto claramente visible en la gráfica.'
- 'Paso 3: Calcula la pendiente $m$ usando el punto de corte y el segundo punto.'
- 'Paso 4: Escribe la fórmula $f(x) = mx + n$ con los valores obtenidos.'
ejemplos:
- titulo: Reconstrucción con dos puntos claros
  enunciado: 'Un gráfico corta al eje $y$ en $(0,-3)$ y pasa por $(4,5)$. Determina la fórmula.'
  solucion_pasos:
  - '$n=-3$.'
  - '$m = \frac{5-(-3)}{4-0} = \frac{8}{4} = 2$.'
  - '$f(x) = 2x - 3$.'
- titulo: Reconstrucción con pendiente negativa
  enunciado: 'Un gráfico corta al eje $y$ en $(0,6)$ y pasa por $(3,0)$. Determina la fórmula.'
  solucion_pasos:
  - '$n=6$.'
  - '$m = \frac{0-6}{3-0} = -2$.'
  - '$f(x) = -2x + 6$.'
- titulo: ¿Basta con conocer un solo punto del gráfico para determinar la fórmula completa?
  enunciado: ¿Basta con conocer un solo punto del gráfico para determinar la fórmula completa?
  respuesta: 'No'
  solucion_pasos:
  - Se necesitan al menos dos datos (usualmente el intercepto y otro punto) para determinar $m$ y $n$.
- titulo: ¿El punto de corte con el eje $y$ entrega directamente el valor de $n$?
  enunciado: ¿El punto de corte con el eje $y$ entrega directamente el valor de $n$?
  respuesta: Sí
  solucion_pasos:
  - La ordenada de ese punto es exactamente el coeficiente de posición.
errores_frecuentes:
- Confundir el punto de corte con el eje $x$ con el del eje $y$ al leer $n$.
- Calcular mal la pendiente por errores en el orden de resta de coordenadas.
- Leer coordenadas aproximadas o incorrectas del gráfico.
- Olvidar escribir la fórmula final combinando ambos parámetros.
