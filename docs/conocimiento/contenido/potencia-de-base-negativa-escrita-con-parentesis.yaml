semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.BASE_NEGATIVA_PARENTESIS
titulo: Potencia de base negativa escrita con paréntesis
objetivo: Distinguir una base negativa de un signo exterio.
introduccion: Dos expresiones visualmente parecidas pueden tener signos opuestos. Los paréntesis indican
  si el menos participa como factor o actúa después de calcular la potencia.
resumen: Una base negativa debe encerrarse entre paréntesis para que el signo quede elevado. Sin paréntesis,
  la potenciación se ejecuta antes que el signo menos exterio.
explicacion: 'Una base negativa debe encerrarse entre paréntesis para que el signo quede elevado.


  El cálculo “\((-2)^4=16\), pero \(-2^4=-(2^4)=-16\)” muestra por qué sin paréntesis, la potenciación
  se ejecuta antes que el signo menos exterio'
procedimiento:
- 'Paso 1: Observa si el signo menos está dentro o fuera de los paréntesis de la base.'
- 'Paso 2: Calcula primero la potencia de acuerdo con la jerarquía de operaciones.'
- 'Paso 3: Aplica el signo exterior, si existe, y compara ambas escrituras.'
ejemplos:
- titulo: Aplicación razonada — Potencia de base negativa escrita con paréntesis
  enunciado: \((-2)^4=16\), pero \(-2^4=-(2^4)=-16\).
  solucion_pasos:
  - Observa si el signo menos está dentro o fuera de los paréntesis de la base.
  - Calcula primero la potencia de acuerdo con la jerarquía de operaciones.
  - Aplica el signo exterior, si existe, y compara ambas escrituras.
- titulo: Revisión de una solución — Potencia de base negativa escrita con paréntesis
  enunciado: Una solución aplica “Calcula primero la potencia de acuerdo con la jerarquía de operaciones.”,
    pero termina sin comprobar que sin paréntesis, la potenciación se ejecuta antes que el signo menos
    exterio. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define potencia de base negativa escrita con paréntesis: una base negativa
    debe encerrarse entre paréntesis para que el signo quede elevado.'
  - Observa si el signo menos está dentro o fuera de los paréntesis de la base.
  - 'Completa la revisión con este control: Aplica el signo exterior, si existe, y compara ambas escrituras.'
- titulo: ¿Se cumple que sin paréntesis, la potenciación se ejecuta antes que el signo menos exterio?
    — Potencia de base negativa escrita con paréntesis
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una base negativa debe encerrarse entre paréntesis para
    que el signo quede elevado.
  - El caso “\((-2)^4=16\), pero \(-2^4=-(2^4)=-16\)” satisface esa condición.
  - Aplica el signo exterior, si existe, y compara ambas escrituras.
- titulo: ¿Es válido omitir el paso “Observa si el signo menos está dentro o fuera de los paréntesis de
    la base”? — Potencia de base negativa escrita con paréntesis
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de potencia de base negativa escrita con paréntesis.
  - 'Omitirlo puede volver inválida la acción siguiente: Calcula primero la potencia de acuerdo con la
    jerarquía de operaciones.'
  - 'La solución debe terminar de este modo: Aplica el signo exterior, si existe, y compara ambas escrituras.'
errores_frecuentes:
- 'Confundir potencia de base negativa escrita con paréntesis con otro concepto y omitir este inicio:
  Observa si el signo menos está dentro o fuera de los paréntesis de la base.'
- Aplicar mecánicamente “Calcula primero la potencia de acuerdo con la jerarquía de operaciones.” sin
  revisar las condiciones de la definición.
- Tomar “\((-2)^4=16\), pero \(-2^4=-(2^4)=-16\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “sin paréntesis, la potenciación se ejecuta antes
  que el signo menos exterio”.
- 'Terminar el desarrollo sin realizar este control: Aplica el signo exterior, si existe, y compara ambas
  escrituras.'
