semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.PENDIENTE_NEGATIVA
titulo: Interpretación de pendiente negativa como decrecimiento
objetivo: Interpretar una pendiente negativa como indicador de que la función es decreciente.
introduccion: Cuando una recta baja de izquierda a derecha, es porque cada avance en $x$ le resta valor
  a $y$, el reflejo numérico de una pendiente negativa.
resumen: Una recta tiene **pendiente negativa** ($m<0$) si y solo si la variable dependiente disminuye
  a medida que la variable independiente aumenta; gráficamente, la recta baja de izquierda a derecha.
explicacion: '### Definición formal


  Para una función lineal o afín $f(x) = mx + n$ con $m < 0$, se cumple que $x_1 < x_2 \implies f(x_1)
  > f(x_2)$ para todo $x_1, x_2$ del dominio; es decir, $f$ es estrictamente decreciente en todo su dominio.


  ### Desarrollo didáctico


  Piensa en bajar una escalera: cada paso hacia la derecha (aumento de $x$) corresponde a un paso hacia
  abajo (disminución de $y$).


  Si $m=-3$, cada aumento de una unidad en $x$ produce una disminución de 3 unidades en $y$. La recta,
  vista de izquierda a derecha, siempre baja.'
procedimiento:
- 'Paso 1: Calcula o identifica el signo de la pendiente $m$.'
- 'Paso 2: Si $m<0$, la función es decreciente en todo su dominio.'
- 'Paso 3: Verifica visualmente que la recta baje al desplazarse hacia la derecha.'
ejemplos:
- titulo: Identificación de pendiente negativa
  enunciado: Determina si $f(x) = -5x + 3$ tiene pendiente negativa.
  solucion_pasos:
  - El coeficiente de $x$ es $-5$, negativo.
  - La función es decreciente.
- titulo: Verificación numérica de decrecimiento
  enunciado: Si $f(x) = -2x$, verifica que $f(4) < f(1)$.
  solucion_pasos:
  - $f(4)=-8$ y $f(1)=-2$.
  - Como $-8<-2$ y $4>1$, se confirma el decrecimiento asociado a la pendiente negativa.
- titulo: ¿Una recta con pendiente negativa baja de izquierda a derecha?
  enunciado: ¿Una recta con pendiente negativa baja de izquierda a derecha?
  respuesta: Sí
  solucion_pasos:
  - Esa es exactamente la interpretación gráfica de una pendiente negativa.
- titulo: ¿Si $m<0$, entonces $f(2) < f(6)$?
  enunciado: ¿Si $m<0$, entonces $f(2) < f(6)$?
  respuesta: 'No'
  solucion_pasos:
  - Con pendiente negativa la función es decreciente, así que $f(2) > f(6)$, no menor.
errores_frecuentes:
- Confundir "pendiente negativa" con "función siempre negativa" (los valores de $y$ pueden ser positivos
  en algún tramo).
- Creer que una pendiente negativa siempre es "menos inclinada" que una positiva del mismo valor absoluto.
- Confundir decrecimiento con la ubicación gráfica en el tercer o cuarto cuadrante.
- Invertir la interpretación, pensando que $m<0$ implica que la función crece.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
