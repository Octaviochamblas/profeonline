semantic_id: MAT.NUM.INTERES_COMPUESTO.TASA_PERIODICA
objetivo: Calcular la tasa periódica cuando la tasa nominal y el período de capitalización
  no coinciden.
introduccion: Los bancos son astutos. Te dicen 'Tasa de 12% anual', pero luego en
  letra chica agregan 'capitalizable mensualmente'. ¿Significa que te cobran 12% cada
  mes? No. Significa que fraccionan ese 12% en pequeñas cuotas mensuales.
resumen: Si la tasa es 'Anual capitalizable Mensualmente', debes dividir la tasa anual
  en 12 (meses) para obtener la tasa real de cada período ($i_p$). Si es bimestral,
  divides en 6. Si es semestral, divides en 2.
explicacion: 'En interés compuesto puro, la tasa debe coincidir con los períodos de
  tiempo en la fórmula. Pero los bancos suelen publicitar una **Tasa Anual Nominal
  (TAN)** acompañada de un período de capitalización distinto (ej. mensual).


  Para aplicar la fórmula $M = C(1+i)^t$, la tasa $i$ debe ser la **Tasa Periódica**.


  **¿Cómo se calcula?**

  Divide la Tasa Nominal por la cantidad de períodos que hay en un año:

  - Si dice ''Capitalizable mensualmente'': $i_p = \text{Tasa Anual} / 12$.

  - Si dice ''Capitalizable semestralmente'': $i_p = \text{Tasa Anual} / 2$.

  - Si dice ''Capitalizable trimestralmente'': $i_p = \text{Tasa Anual} / 4$.


  Ejemplo: Un $24\%$ anual capitalizable mensualmente, significa que cada mes te aplicarán
  un $24\% / 12 = 2\%$ mensual. Usarás $i = 0.02$ en la fórmula.'
procedimiento:
- 'Paso 1: Lee la ''letra chica'' para ver la frecuencia de capitalización.'
- 'Paso 2: Divide la tasa anual dada por el número de esos períodos que caben en un
  año.'
- 'Paso 3: Esa tasa fraccionada es la que debes transformar a decimal para usar en
  $(1+i)$.'
ejemplos:
- titulo: Capitalización Trimestral
  enunciado: Un banco ofrece un 16% de interés anual capitalizable trimestralmente.
    ¿Cuál es la tasa periódica que se usa en la fórmula?
  solucion_pasos:
  - Un año tiene 4 trimestres (3 meses x 4 = 12).
  - Tasa periódica = $16\% / 4 = 4\%$ trimestral.
  - En la fórmula usarás $i = 0.04$.
errores_frecuentes:
- Dividir por 3 cuando dice trimestral (Trimestre son 3 meses, pero hay 4 trimestres
  en el año, se divide por 4).
- Usar el 16% directamente en la fórmula como si fuera anual, ignorando la capitalización.
fuente: Currículum Nacional MINEDUC.
estado: publicado
