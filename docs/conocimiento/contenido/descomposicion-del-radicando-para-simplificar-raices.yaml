semantic_id: MAT.NUM.RAICES_PROPIEDADES.DESCOMPOSICION_RADICANDO
titulo: Descomposición del radicando para simplificar raíces
objetivo: Descomponer un radicando con propósito de simplificación.
introduccion: No cualquier factorización simplifica una raíz. Hay que buscar grupos cuadrados, cúbicos
  o de orden superior según el índice presente.
resumen: Factorizar el radicando permite separar potencias perfectas y simplificar la raíz. La descomposición
  útil depende del índice del radical.
explicacion: 'Factorizar el radicando permite separar potencias perfectas y simplificar la raíz.


  La situación “\(\sqrt[3]{54}=\sqrt[3]{27\cdot2}=3\sqrt[3]2\)” permite comprobar, y no solo memorizar,
  que la descomposición útil depende del índice del radical'
procedimiento:
- 'Paso 1: Factoriza el radicando, preferentemente en primos.'
- 'Paso 2: Agrupa factores en conjuntos del tamaño del índice.'
- 'Paso 3: Extrae los grupos completos y confirma que el radicando residual ya no contiene otra potencia
  perfecta.'
ejemplos:
- titulo: Aplicación razonada — Descomposición del radicando para simplificar raíces
  enunciado: \(\sqrt[3]{54}=\sqrt[3]{27\cdot2}=3\sqrt[3]2\).
  solucion_pasos:
  - Factoriza el radicando, preferentemente en primos.
  - Agrupa factores en conjuntos del tamaño del índice.
  - Extrae los grupos completos y confirma que el radicando residual ya no contiene otra potencia perfecta.
- titulo: Revisión de una solución — Descomposición del radicando para simplificar raíces
  enunciado: Una solución aplica “Agrupa factores en conjuntos del tamaño del índice.”, pero termina sin
    comprobar que la descomposición útil depende del índice del radical. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define descomposición del radicando para simplificar raíces: factorizar
    el radicando permite separar potencias perfectas y simplificar la raíz.'
  - Factoriza el radicando, preferentemente en primos.
  - 'Completa la revisión con este control: Extrae los grupos completos y confirma que el radicando residual
    ya no contiene otra potencia perfecta.'
- titulo: ¿Se cumple que la descomposición útil depende del índice del radical? — Descomposición del radicando
    para simplificar raíces
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que factorizar el radicando permite separar potencias perfectas
    y simplificar la raíz.
  - El caso “\(\sqrt[3]{54}=\sqrt[3]{27\cdot2}=3\sqrt[3]2\)” satisface esa condición.
  - Extrae los grupos completos y confirma que el radicando residual ya no contiene otra potencia perfecta.
- titulo: ¿Es válido omitir el paso “Factoriza el radicando, preferentemente en primos”? — Descomposición
    del radicando para simplificar raíces
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de descomposición del radicando para simplificar raíces.
  - 'Omitirlo puede volver inválida la acción siguiente: Agrupa factores en conjuntos del tamaño del índice.'
  - 'La solución debe terminar de este modo: Extrae los grupos completos y confirma que el radicando residual
    ya no contiene otra potencia perfecta.'
errores_frecuentes:
- 'Confundir descomposición del radicando para simplificar raíces con otro concepto y omitir este inicio:
  Factoriza el radicando, preferentemente en primos.'
- Aplicar mecánicamente “Agrupa factores en conjuntos del tamaño del índice.” sin revisar las condiciones
  de la definición.
- Tomar “\(\sqrt[3]{54}=\sqrt[3]{27\cdot2}=3\sqrt[3]2\)” como una igualdad aislada, sin explicar por qué
  es válida.
- Aceptar una respuesta que contradice la idea clave “la descomposición útil depende del índice del radical”.
- 'Terminar el desarrollo sin realizar este control: Extrae los grupos completos y confirma que el radicando
  residual ya no contiene otra potencia perfecta.'
