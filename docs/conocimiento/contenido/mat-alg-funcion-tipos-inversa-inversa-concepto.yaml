semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.INVERSA_CONCEPTO
titulo: Concepto de función inversa
objetivo: Comprender la función inversa como aquella que revierte exactamente la correspondencia de la función
  original.
introduccion: Si una función es una máquina que transforma entradas en salidas, su inversa es la máquina que deshace
  exactamente esa transformación, devolviendo la salida a su entrada original.
resumen: La **función inversa** de una función biyectiva $f\colon A \to B$, denotada $f^{-1}\colon B \to A$, es la función
  que satisface $f^{-1}(f(x))=x$ para todo $x \in A$ y $f(f^{-1}(y))=y$ para todo $y \in B$.
explicacion: '### Definición formal


  Dada $f\colon A \to B$ biyectiva, su inversa $f^{-1}\colon B \to A$ se define por $f^{-1}(y) = x \iff f(x)=y$. Esta función
  existe y es única precisamente porque la biyectividad garantiza que cada $y \in B$ tiene exactamente un $x$
  asociado.


  ### Desarrollo didáctico


  Intercambiar los roles de entrada y salida es la idea central: donde $f$ decía "de $x$ obtengo $y$", $f^{-1}$
  dice "de $y$ recupero $x$".


  Si $f(x)=2x$ (duplicar), su inversa es $f^{-1}(x)=\frac{x}{2}$ (dividir por dos): aplicar una después de la
  otra deshace completamente la transformación.'
procedimiento:
- 'Paso 1: Verifica que la función sea biyectiva (condición necesaria para tener inversa).'
- 'Paso 2: Interpreta la inversa como la función que revierte exactamente la correspondencia original.'
- 'Paso 3: Confirma que $f^{-1}(f(x))=x$ y $f(f^{-1}(y))=y$ se cumplan.'
ejemplos:
- titulo: Verificación conceptual de inversa
  enunciado: Si $f(x)=x+5$, ¿cuál es su inversa conceptualmente?
  solucion_pasos:
  - La operación "sumar 5" se revierte con "restar 5".
  - '$f^{-1}(x) = x - 5$.'
- titulo: Composición de una función con su inversa
  enunciado: Si $f(x)=3x$ y $f^{-1}(x)=x/3$, calcula $f^{-1}(f(6))$.
  solucion_pasos:
  - '$f(6)=18$.'
  - '$f^{-1}(18)=18/3=6$.'
  - Se recupera el valor original, $6$.
- titulo: ¿La función inversa siempre existe para cualquier función?
  enunciado: ¿La función inversa siempre existe para cualquier función?
  respuesta: 'No'
  solucion_pasos:
  - Solo existe si la función es biyectiva (o se restringe adecuadamente para serlo).
- titulo: ¿$f^{-1}(f(x))=x$ para toda función invertible $f$?
  enunciado: ¿$f^{-1}(f(x))=x$ para toda función invertible $f$?
  respuesta: Sí
  solucion_pasos:
  - Esa es una de las condiciones que define formalmente a la función inversa.
errores_frecuentes:
- Confundir $f^{-1}(x)$ con $\frac{1}{f(x)}$ (el exponente $-1$ no indica un recíproco aquí).
- Intentar calcular la inversa de una función que no es biyectiva sin restringir su dominio.
- Creer que toda función tiene inversa sin verificar biyectividad.
- Confundir el dominio de $f^{-1}$ con el dominio de $f$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
