semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.LEY_SENOS_ANGULOS
titulo: Cálculo de ángulos mediante la ley de senos
objetivo: Calcular un ángulo desconocido de un triángulo oblicuángulo utilizando la ley de senos, conociendo
  dos lados y el ángulo opuesto a uno de ellos.
introduccion: Cuando se conocen dos lados y el ángulo opuesto a uno de ellos, se puede despejar el seno
  del ángulo opuesto al otro lado, y de ahí obtener ese ángulo.
resumen: Para calcular un ángulo desconocido $X$ opuesto a un lado $x$, conociendo otro lado $a$ y su
  ángulo opuesto $A$, se usa $\sin X=\dfrac{x\cdot\sin A}{a}$, y luego $X=\arcsin\left(\dfrac{x\cdot\sin
  A}{a}\right)$.
explicacion: '![Cálculo de ángulos con ley de senos](/static/img/geometria/trigonometria/oblicu-ley-senos-angulos.svg)


  ### Definición formal


  De la proporción $\dfrac{a}{\sin A}=\dfrac{b}{\sin B}$, se despeja $\sin B=\dfrac{b\cdot\sin A}{a}$,
  y luego $B=\arcsin\left(\dfrac{b\cdot\sin A}{a}\right)$.


  ### Desarrollo didáctico


  Si $a=10$, $A=40°$ y $b=12$, entonces $\sin B=\dfrac{12\times\sin40°}{10}\approx\dfrac{12\times0{,}643}{10}\approx0{,}771$,
  por lo que $B\approx50{,}6°$ (considerando la solución aguda).'
procedimiento:
- 'Paso 1: Identifica el lado y ángulo opuesto conocidos (el par completo), y el otro lado conocido.'
- 'Paso 2: Despeja el seno del ángulo buscado: sin(ángulo buscado)=lado_buscado×sin(ángulo conocido)/lado_conocido.'
- 'Paso 3: Aplica arcoseno para obtener el ángulo, verificando si corresponde considerar también la solución
  obtusa (caso ambiguo).'
ejemplos:
- titulo: Calcular un ángulo con datos a=10, A=40°, b=12
  enunciado: Se busca el ángulo B.
  solucion_pasos:
  - sinB=12×sin40°/10≈0,771 → B≈50,6°.
- titulo: Calcular un ángulo con datos c=15, C=50°, a=13
  enunciado: Se busca el ángulo A.
  solucion_pasos:
  - sinA=13×sin50°/15≈13×0,766/15≈0,664 → A≈41,6°.
- titulo: ¿Se necesita aplicar arcoseno al final del procedimiento?
  respuesta: Sí
  solucion_pasos:
  - Sí, luego de despejar el seno del ángulo, se aplica arcoseno para obtener su medida.
- titulo: ¿Puede haber más de un ángulo posible para un mismo valor de seno?
  respuesta: Sí
  solucion_pasos:
  - Sí, esto ocurre en el llamado caso ambiguo, donde tanto el ángulo agudo como su suplementario obtuso
    pueden ser soluciones válidas.
errores_frecuentes:
- Olvidar aplicar arcoseno después de despejar el valor del seno.
- No considerar la posible solución obtusa en situaciones de caso ambiguo.
- Confundir el lado que va en el numerador con el que va en el denominador al despejar el seno.
fuente: 'Elaboración propia (referencia: Moraleja 195).'
estado: publicado
