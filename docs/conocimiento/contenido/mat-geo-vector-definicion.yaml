semantic_id: MAT.GEO.VECTORES_BASE.DEFINICION_VECTOR
titulo: Definición de vector como ente geométrico orientado
objetivo: Reconocer el vector como un segmento orientado que representa una magnitud con dirección y sentido,
  a diferencia de un segmento común.
introduccion: 'Un vector es como una flecha: no solo indica una longitud, sino también hacia dónde apunta.'
resumen: Un vector es un segmento orientado, representado por una flecha, que tiene un origen y un extremo,
  y que queda caracterizado por su módulo (magnitud), su dirección y su sentido.
explicacion: '![Definición de vector](/static/img/geometria/cartesiano-vectores/vector-definicion.svg)


  ### Definición formal


  Un vector $\vec{AB}$ es un segmento orientado con punto de origen $A$ y punto de extremo (o término)
  $B$, representado gráficamente mediante una flecha que va desde $A$ hasta $B$.


  ### Desarrollo didáctico


  En la figura, el vector va desde el punto $A$ (origen) hasta el punto $B$ (extremo), representado por
  la flecha. A diferencia de un segmento común (sin orientación), el vector indica explícitamente una
  dirección de recorrido: de A hacia B, no al revés.'
procedimiento:
- 'Paso 1: Identifica el punto de origen del vector (donde comienza la flecha).'
- 'Paso 2: Identifica el punto de extremo del vector (donde termina la flecha, indicado por la punta).'
- 'Paso 3: Reconoce que el vector representa una magnitud orientada, no solo una longitud.'
ejemplos:
- titulo: Identificar el origen y extremo de un vector
  enunciado: Se traza una flecha desde el punto A hasta el punto B.
  solucion_pasos:
  - A es el origen del vector y B es su extremo; el vector se denota AB (con flecha).
- titulo: Distinguir un vector de un segmento común
  enunciado: Se traza un segmento entre dos puntos, sin flecha.
  solucion_pasos:
  - Ese segmento no es un vector, ya que carece de orientación explícita (no tiene sentido definido).
- titulo: ¿Un vector tiene un punto de origen y uno de extremo bien definidos?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la característica que distingue a un vector de un simple segmento.
- titulo: ¿El vector AB es igual al vector BA?
  respuesta: 'No'
  solucion_pasos:
  - No, tienen el mismo módulo y dirección, pero sentido opuesto; son vectores distintos (opuestos entre
    sí).
errores_frecuentes:
- Confundir un vector con un simple segmento de recta, sin considerar su orientación.
- Creer que el vector AB es igual al vector BA.
- No identificar correctamente cuál extremo es el origen y cuál es el término del vector.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 122).'
estado: publicado
