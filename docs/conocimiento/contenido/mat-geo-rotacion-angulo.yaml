semantic_id: MAT.GEO.ROTACION_PLANO.ANGULO_ROTACION
titulo: Identificación del ángulo de rotación
objetivo: Identificar el ángulo de rotación como la medida angular que determina cuánto gira cada punto
  de una figura alrededor del centro de rotación.
introduccion: El ángulo de rotación indica 'cuántos grados' se gira la figura completa alrededor del centro
  fijo.
resumen: El ángulo de rotación $\theta$ es la medida del ángulo $\angle POP'$ formado entre el punto original
  $P$, el centro de rotación $O$, y la imagen $P'$.
explicacion: '![Ángulo de rotación](/static/img/geometria/isometrias/rotacion-angulo.svg)


  ### Definición formal


  El ángulo de rotación $\theta$ es el mismo para todos los puntos de la figura: es la medida del ángulo
  $\angle POP''$ entre el radio al punto original y el radio a su imagen, medido desde el centro de rotación
  $O$.


  ### Desarrollo didáctico


  En la figura, el punto $P$ gira un ángulo $\theta=70°$ alrededor del centro $O$ para llegar a su imagen
  $P''$. Este mismo ángulo se aplica a todos los demás puntos de la figura.'
procedimiento:
- 'Paso 1: Identifica el centro de rotación O y un punto P junto con su imagen P''.'
- 'Paso 2: Traza los segmentos OP y OP''.'
- 'Paso 3: Mide el ángulo entre esos dos segmentos; ese es el ángulo de rotación θ, el mismo para todos
  los puntos de la figura.'
ejemplos:
- titulo: Identificar el ángulo de rotación entre un punto y su imagen
  enunciado: El punto P gira hasta P', formando un ángulo de 70° con el centro O.
  solucion_pasos:
  - El ángulo de rotación es θ=70°, aplicado a todos los puntos de la figura.
- titulo: Reconocer que el ángulo es el mismo para toda la figura
  enunciado: Se mide el ángulo entre otro par de puntos correspondientes de la misma rotación.
  solucion_pasos:
  - Ese ángulo debe ser exactamente el mismo (70°) que el medido con el primer par de puntos.
- titulo: ¿El ángulo de rotación es el mismo para todos los puntos de la figura?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la característica definitoria de una rotación válida.
- titulo: ¿El ángulo de rotación puede ser mayor a 360°?
  respuesta: 'No'
  solucion_pasos:
  - No, por convención, los ángulos de rotación se expresan entre 0° y 360° (ángulos mayores se reducen
    mediante módulo 360°).
errores_frecuentes:
- Medir ángulos distintos para diferentes puntos de la misma figura, sin verificar que deban ser iguales.
- Confundir el ángulo de rotación con la distancia entre los puntos.
- No considerar el sentido (horario o antihorario) al reportar el ángulo de rotación.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 128, Cid 75).'
estado: publicado
