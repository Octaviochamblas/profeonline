semantic_id: MAT.NUM.PROPORCIONES.DEFINICION_IGUALDAD_RAZONES
titulo: Definición de proporción como igualdad de razones
objetivo: Comprender una proporción como la igualdad de dos razones matemáticas.
introduccion: Si preparas jugo con 2 limones y 1 litro de agua, y luego haces otra jarra con 4 limones
  y 2 litros de agua, ambas jarras tendrán exactamente el mismo sabor. Esta equivalencia de mezclas es
  lo que en matemáticas llamamos proporción.
resumen: Una proporción es la igualdad entre dos razones. Se expresa como $\frac{a}{b} = \frac{c}{d}$
  y significa que ambas razones tienen el mismo valor.
explicacion: Una **proporción** se forma cuando igualamos dos razones que representan la misma relación
  cuantitativa. Si tenemos la razón $a:b$ y la razón $c:d$, afirmamos que forman una proporción si y solo
  si su cociente es el mismo. Se lee 'a es a b como c es a d'.
procedimiento:
- 'Paso 1: Plantea las dos razones a comparar en forma de fracción.'
- 'Paso 2: Calcula el cociente decimal de cada una o simplifícalas al máximo.'
- 'Paso 3: Si los resultados coinciden exactamente, las razones forman una proporción.'
ejemplos:
- titulo: Verificando una proporción
  enunciado: ¿Forman proporción las razones $3:5$ y $9:15$?
  solucion_pasos:
  - 'Escribimos como fracciones: $\frac{3}{5}$ y $\frac{9}{15}$.'
  - 'Simplificamos la segunda: $\frac{9:3}{15:3} = \frac{3}{5}$.'
  - Como ambas equivalen a $\frac{3}{5}$, sí forman una proporción.
- titulo: ¿Toda igualdad de fracciones es proporción?
  respuesta: Sí
  solucion_pasos:
  - Cualquier par de fracciones equivalentes representa, por definición, una proporción.
errores_frecuentes:
- Sumar una constante a ambos términos creyendo que mantiene la proporción.
- Confundir la igualdad de razones con la suma de fracciones.
- Asumir que $a:b = c:d$ implica $a=c$ y $b=d$.
- Comparar cruzado sumando en lugar de multiplicando.
- 'Ignorar el orden: pensar que $a:b$ es proporcional a $d:c$.'
fuente: Currículum Nacional MINEDUC — Proporciones.
estado: publicado
