semantic_id: MAT.GEO.SIMETRAL_CIRCUNCENTRO.CIRCUNCENTRO_EQUIDISTANCIA_VERTICES
titulo: Propiedad del circuncentro como punto equidistante de los vértices del triángulo
objetivo: Aplicar la propiedad de que el circuncentro está exactamente a la misma distancia de los tres
  vértices de un triángulo.
introduccion: Una propiedad notable del circuncentro es que, sin importar la forma del triángulo, su distancia
  a cada uno de los tres vértices es siempre la misma.
resumen: El circuncentro de un triángulo está a igual distancia de sus tres vértices.
explicacion: '![Circuncentro equidistante de los tres vértices](/static/img/geometria/elementos-secundarios/simetral-circuncentro-circuncentro-equidistancia-vertices.svg)


  ### Definición formal


  Si O es el circuncentro de un triángulo ABC, las distancias OA, OB y OC son todas iguales entre sí,
  y esa distancia común es el radio de la circunferencia circunscrita.


  ### Desarrollo didáctico


  Esta propiedad es consecuencia directa de que O está sobre las tres simetrales: todo punto de la simetral
  de un lado es equidistante de los dos vértices que definen ese lado, y al estar O en las tres simetrales
  a la vez, queda equidistante de los tres vértices.'
procedimiento:
- 'Paso 1: Ubica el circuncentro del triángulo (intersección de las simetrales).'
- 'Paso 2: Traza los segmentos desde el circuncentro a cada uno de los tres vértices.'
- 'Paso 3: Verifica que las tres distancias sean iguales.'
ejemplos:
- titulo: Verificar la equidistancia
  enunciado: Se mide la distancia del circuncentro a cada uno de los tres vértices de un triángulo.
  solucion_pasos:
  - Las tres distancias resultan iguales entre sí.
- titulo: Relacionar con las simetrales
  enunciado: ¿Por qué el circuncentro es equidistante de los vértices?
  solucion_pasos:
  - Porque está sobre las tres simetrales, y todo punto de una simetral es equidistante de los dos vértices
    del lado correspondiente.
- titulo: ¿Esta distancia común tiene un nombre especial?
  respuesta: Sí
  solucion_pasos:
  - Sí, se llama radio de la circunferencia circunscrita (o circunradio).
- titulo: ¿El incentro también es equidistante de los vértices?
  respuesta: 'No'
  solucion_pasos:
  - No, esa propiedad es exclusiva del circuncentro; el incentro es equidistante de los lados.
errores_frecuentes:
- Confundir la equidistancia a los vértices (propiedad del circuncentro) con la equidistancia a los lados
  (propiedad del incentro).
- Medir mal la distancia, usando un segmento que no llega exactamente al vértice.
- Creer que esta propiedad aplica al ortocentro o al baricentro.
fuente: Elaboración propia.
estado: publicado
