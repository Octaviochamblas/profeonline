semantic_id: MAT.ALG.FUNCION_EVALUACION.VALORIZACION_FUNCIONAL
titulo: Evaluación de una función por sustitución numérica
objetivo: Evaluar una función sustituyendo un valor numérico específico en su regla de correspondencia.
introduccion: 'Evaluar una función es como seguir una receta: sustituyes el ingrediente (el número) en cada lugar
  donde aparece la variable, y sigues los pasos hasta obtener el resultado.'
resumen: Evaluar una función $f$ en $x=a$ consiste en sustituir cada aparición de la variable por el valor $a$
  en la regla de correspondencia, y luego realizar las operaciones aritméticas indicadas para obtener $f(a)$.
explicacion: '### Definición formal


  Sea $f$ una función dada por una expresión algebraica en la variable $x$. Evaluar $f$ en $x=a$ (con $a \in \text{Dom}(f)$)
  consiste en construir la expresión que resulta de reemplazar cada ocurrencia de $x$ por $a$ y simplificar aplicando
  las operaciones aritméticas en su orden jerárquico, obteniendo el número $f(a)$.


  ### Desarrollo didáctico


  El proceso tiene tres etapas: sustituir, aplicar jerarquía de operaciones, y simplificar.


  Si $f(x) = 3x^2 - 2x + 1$ y quieres $f(2)$: sustituyes $x$ por $2$ en cada lugar, obteniendo $3(2)^2 - 2(2) +
  1$. Resuelves las potencias primero ($3(4)$), luego las multiplicaciones ($12 - 4$), y finalmente sumas: $12
  - 4 + 1 = 9$.'
procedimiento:
- 'Paso 1: Escribe la regla de la función completa.'
- 'Paso 2: Reemplaza cada aparición de la variable por el valor dado, usando paréntesis para evitar errores de
  signo.'
- 'Paso 3: Resuelve las potencias, luego las multiplicaciones y divisiones, y finalmente sumas y restas.'
- 'Paso 4: El número resultante es el valor de la función evaluada.'
ejemplos:
- titulo: Evaluación con potencia
  enunciado: Si $f(x) = 2x^2 + 5$, calcula $f(3)$.
  solucion_pasos:
  - Sustituimos x por 3 con paréntesis.
  - '$f(3) = 2(3)^2 + 5 = 2(9) + 5 = 18 + 5 = 23$.'
- titulo: Evaluación con argumento negativo
  enunciado: Si $f(x) = -x^2 + 4x$, calcula $f(-2)$.
  solucion_pasos:
  - Sustituimos x por -2, cuidando el signo del cuadrado.
  - '$f(-2) = -(-2)^2 + 4(-2) = -(4) - 8 = -4 - 8 = -12$.'
- titulo: ¿Al evaluar $f(-3)$ en $f(x) = x^2$, el resultado es negativo?
  enunciado: ¿Al evaluar $f(-3)$ en $f(x) = x^2$, el resultado es negativo?
  respuesta: 'No'
  solucion_pasos:
  - '$f(-3) = (-3)^2 = 9$, un número positivo.'
- titulo: ¿El orden de las operaciones importa al evaluar una función?
  enunciado: ¿El orden de las operaciones importa al evaluar una función?
  respuesta: Sí
  solucion_pasos:
  - Se debe respetar la jerarquía de operaciones (potencias, luego productos, luego sumas) para obtener el resultado
    correcto.
errores_frecuentes:
- Olvidar usar paréntesis al sustituir valores negativos, calculando $-3^2=-9$ en vez de $(-3)^2=9$.
- Sumar antes de resolver las potencias o multiplicaciones.
- Sustituir el valor solo en parte de la expresión cuando la variable aparece varias veces.
- Confundir evaluar $f(a)$ con resolver la ecuación $f(x)=a$.
