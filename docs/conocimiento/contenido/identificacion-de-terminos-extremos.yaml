semantic_id: MAT.NUM.PROPORCIONES.TERMINOS_EXTREMOS
titulo: Identificación de términos extremos
objetivo: Identificar los términos extremos en una proporción.
introduccion: Cuando escribes una proporción en una sola línea, hay números que quedan en las puntas (al
  inicio y al final). Reconocerlos es el primer paso para aplicar las reglas de resolución.
resumen: En la proporción $a:b = c:d$, los valores $a$ y $d$ se llaman extremos porque ocupan la primera
  y última posición.
explicacion: Al escribir $\frac{a}{b} = \frac{c}{d}$ en notación de cociente $a:b = c:d$, los **extremos**
  son el primer término de la primera razón ($a$) y el segundo término de la segunda razón ($d$). Son
  fundamentales para aplicar el teorema fundamental de las proporciones.
procedimiento:
- 'Paso 1: Escribe la proporción en formato lineal $a:b = c:d$.'
- 'Paso 2: Observa el primer número de toda la expresión.'
- 'Paso 3: Observa el último número de toda la expresión. Esos dos son los extremos.'
ejemplos:
- titulo: Identificando extremos
  enunciado: En $2:5 = 6:15$, ¿cuáles son los extremos?
  solucion_pasos:
  - El primer término es 2.
  - El último término es 15.
  - Los extremos son 2 y 15.
- titulo: ¿Pueden los extremos ser fracciones?
  respuesta: Sí
  solucion_pasos:
  - Cualquier número real puede ocupar la posición de un extremo.
errores_frecuentes:
- Confundirlos con los medios.
- Pensar que en $a/b = c/d$ los extremos son los numeradores.
- Asumir que siempre el mayor y menor número son los extremos.
- Intercambiarlos con los medios al aplicar reglas cruzadas.
- Creer que si se invierte la proporción, los extremos no cambian.
fuente: Currículum Nacional MINEDUC.
estado: publicado
