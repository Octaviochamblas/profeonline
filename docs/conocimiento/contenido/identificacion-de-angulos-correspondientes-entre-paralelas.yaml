semantic_id: MAT.GEO.ANGULOS_RECTAS_TRANSVERSALES.CORRESPONDIENTES_IDENTIFICACION
titulo: Identificación de ángulos correspondientes entre paralelas
objetivo: Identificar un par de ángulos correspondientes en un esquema con paralelas y comprobar que la
  misma posición relativa en cada cruce identifica a los correspondientes.
introduccion: Cuando una calle cruza dos avenidas paralelas aparecen muchos ángulos con nombres distintos.
  El truco no es memorizar números, sino mirar dónde queda cada uno respecto de la transversal y de las
  paralelas. Para resolver situaciones de identificación de ángulos correspondientes entre paralelas conviene
  mirar el dibujo con método, no solo por intuición.
resumen: Los ángulos correspondientes se reconocen por su posición relativa respecto de dos paralelas
  y una transversal. Como idea de control, la misma posición relativa en cada cruce identifica a los correspondientes.
explicacion: 'Los ángulos correspondientes se reconocen por su posición relativa respecto de dos paralelas
  y una transversal.


  La situación “en dos intersecciones análogas, los ángulos 2 y 6 ocupan la misma ''esquina'' relativa”
  muestra cómo pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y
  luego se verifica que la misma posición relativa en cada cruce identifica a los correspondientes.'
procedimiento:
- 'Paso 1: Ubica primero cuáles son las rectas paralelas y cuál es la transversal.'
- 'Paso 2: Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.'
- 'Paso 3: Concluye si el par corresponde a ángulos correspondientes y descarta relaciones vecinas.'
ejemplos:
- titulo: Situación geométrica — Correspondientes
  enunciado: En dos intersecciones análogas, los ángulos 2 y 6 ocupan la misma 'esquina' relativa.
  solucion_pasos:
  - Ubica primero cuáles son las rectas paralelas y cuál es la transversal.
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos correspondientes y descarta relaciones vecinas.
- titulo: Corrección de una respuesta — Correspondientes
  enunciado: En la situación “en dos intersecciones análogas, los ángulos 2 y 6 ocupan la misma 'esquina'
    relativa”, un compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye
    la justificación completa.
  solucion_pasos:
  - 'Parte de la definición: los ángulos correspondientes se reconocen por su posición relativa respecto
    de dos paralelas y una transversal.'
  - Decide si cada ángulo está en la zona interior o exterior y en qué lado de la transversal queda.
  - Concluye si el par corresponde a ángulos correspondientes y descarta relaciones vecinas.
- titulo: ¿Puede concluirse correctamente este hecho? — Correspondientes
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: los ángulos correspondientes se reconocen
    por su posición relativa respecto de dos paralelas y una transversal.'
  - En el caso “en dos intersecciones análogas, los ángulos 2 y 6 ocupan la misma 'esquina' relativa”
    se observa que la misma posición relativa en cada cruce identifica a los correspondientes.
  - Concluye si el par corresponde a ángulos correspondientes y descarta relaciones vecinas.
- titulo: ¿Se puede omitir el paso intermedio? — Correspondientes
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de identificación de ángulos correspondientes
    entre paralelas.
  - Después del paso “Ubica primero cuáles son las rectas paralelas y cuál es la transversal.” todavía
    hace falta revisar “Decide si cada ángulo está en la zona interior o exterior y en qué lado de la
    transversal queda.”.
  - El cierre correcto exige “Concluye si el par corresponde a ángulos correspondientes y descarta relaciones
    vecinas.”.
errores_frecuentes:
- Correspondientes significa estar uno frente al otro dentro del mismo cruce.
- Para resolver correspondientes, basta con el paso “Ubica primero cuáles son las rectas paralelas y cuál
  es la transversal.” y no hace falta revisar “Decide si cada ángulo está en la zona interior o exterior
  y en qué lado de la transversal queda.”.
- Si el dibujo parece claro, se puede ignorar que la misma posición relativa en cada cruce identifica
  a los correspondientes.
- Dos configuraciones distintas representan correspondientes solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si el par corresponde a ángulos
  correspondientes y descarta relaciones vecinas.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
