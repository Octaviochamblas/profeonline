semantic_id: MAT.GEO.CUERPOS_REDONDOS_METRICA.CILINDRO_AREA
titulo: CГЎlculo del ГЎrea total del cilindro
objetivo: Calcular el ГЎrea total de la superficie de un cilindro a partir del radio de sus bases y su
  altura.
introduccion: 'El ГЎrea total de un cilindro se obtiene ''desenrollando'' su superficie: dos cГӯrculos (las
  bases) mГЎs un rectГЎngulo (la superficie lateral desenrollada).'
resumen: El ГЎrea total de un cilindro de radio $r$ y altura $h$ es $A_T = 2\pi r^2 + 2\pi r h$, es decir,
  el ГЎrea de las dos bases circulares mГЎs el ГЎrea lateral.
explicacion: '![ГҒrea total del cilindro](/static/img/geometria/espacio-cuerpos/cilindro-area.svg)


  ### DefiniciГіn formal


  El ГЎrea total de un cilindro es la suma del ГЎrea de sus dos bases circulares ($2\pi r^2$) mГЎs el ГЎrea
  lateral ($2\pi r h$, que corresponde al rectГЎngulo que se obtiene al ''desenrollar'' la superficie curva,
  con base igual a la circunferencia de la base y altura igual a $h$): $A_T=2\pi r^2+2\pi rh$.


  ### Desarrollo didГЎctico


  Si un cilindro tiene radio 4 cm y altura 10 cm, su ГЎrea total es $A_T=2\pi(4)^2+2\pi(4)(10)=32\pi+80\pi=112\pi\approx351,86$
  cmВІ (usando ПҖвүҲ3,14).'
procedimiento:
- 'Paso 1: Identifica el radio (r) de las bases y la altura (h) del cilindro.'
- 'Paso 2: Calcula el ГЎrea de las dos bases circulares: 2ПҖrВІ.'
- 'Paso 3: Calcula el ГЎrea lateral (2ПҖrh) y sГәmala al resultado anterior para obtener el ГЎrea total.'
ejemplos:
- titulo: Calcular el ГЎrea total de un cilindro
  enunciado: Un cilindro tiene radio 4 cm y altura 10 cm (ПҖвүҲ3,14).
  solucion_pasos:
  - A_T=2Г—3,14Г—16+2Г—3,14Г—4Г—10=100,48+251,2=351,68 cmВІ.
- titulo: Calcular solo el ГЎrea lateral de un cilindro
  enunciado: Un cilindro tiene radio 3 cm y altura 8 cm (ПҖвүҲ3,14).
  solucion_pasos:
  - ГҒrea lateral=2Г—3,14Г—3Г—8=150,72 cmВІ (sin incluir las bases).
- titulo: ВҝEl ГЎrea total incluye las dos bases y la superficie lateral?
  respuesta: SГӯ
  solucion_pasos:
  - 'SГӯ, la fГіrmula 2ПҖrВІ+2ПҖrh suma ambas partes: las dos bases y el ГЎrea lateral.'
- titulo: ВҝLa superficie lateral desenrollada forma un rectГЎngulo?
  respuesta: SГӯ
  solucion_pasos:
  - SГӯ, ese rectГЎngulo tiene como base la longitud de la circunferencia (2ПҖr) y como altura la altura
    del cilindro (h).
errores_frecuentes:
- Olvidar multiplicar por 2 el tГ©rmino ПҖrВІ (considerando solo una base en vez de las dos).
- Confundir la fГіrmula del ГЎrea total con la del ГЎrea lateral Гәnicamente (2ПҖrh, sin sumar las bases).
- Usar el diГЎmetro en vez del radio sin ajustar la fГіrmula correspondiente.
fuente: 'ElaboraciГіn propia (referencias: Moraleja 98, Cid 181).'
estado: publicado
