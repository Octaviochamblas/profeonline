semantic_id: MAT.ALG.FUNCION_CONCEPTOS.RELACION_NO_FUNCION
titulo: Identificación de una relación que no es función
objetivo: Reconocer correspondencias que, por violar existencia o unicidad, son relaciones pero no funciones.
introduccion: No toda flecha entre dos conjuntos merece llamarse función. Cuando alguna regla básica se
  rompe, solo queda una relación general.
resumen: Una correspondencia entre dos conjuntos es una **relación que no es función** cuando existe al
  menos un elemento del dominio sin imagen asignada (falla de existencia) o con más de una imagen asignada
  (falla de unicidad).
explicacion: '### Definición formal


  Una relación $R \subseteq A \times B$ no es una función de $A$ en $B$ si viola al menos una de las dos
  condiciones que definen a las funciones: existe algún $x \in A$ tal que no hay $y \in B$ con $(x,y)
  \in R$ (falla de existencia), o existe algún $x \in A$ con dos pares $(x,y_1), (x,y_2) \in R$ tales
  que $y_1 \neq y_2$ (falla de unicidad).


  ### Desarrollo didáctico


  Para detectar una relación que no es función, basta con encontrar **un solo** contraejemplo: un elemento
  del dominio sin imagen, o un elemento con dos imágenes distintas.


  Gráficamente, si alguna recta vertical no toca la curva en ningún punto (falla de existencia) o la toca
  en más de uno (falla de unicidad), la curva representa una relación, pero no una función.'
procedimiento:
- 'Paso 1: Revisa si todo elemento del conjunto de partida tiene al menos una imagen asignada.'
- 'Paso 2: Revisa si algún elemento del conjunto de partida tiene más de una imagen asignada.'
- 'Paso 3: Si alguna de las dos revisiones falla, la correspondencia es una relación, pero no una función.'
ejemplos:
- titulo: Falla por elemento sin imagen
  enunciado: En $A=\{1,2,3\}$, la relación $\{(1,4), (2,5)\}$, ¿es función de $A$ en $B$?
  solucion_pasos:
  - El elemento $3 \in A$ no tiene ninguna imagen asignada en la relación.
  - Se viola la condición de existencia; no es una función de $A$ en $B$.
- titulo: Falla por elemento con dos imágenes
  enunciado: La relación $\{(1,2), (1,6), (3,4)\}$, ¿es una función?
  solucion_pasos:
  - El elemento $1$ tiene asignadas dos imágenes distintas, $2$ y $6$.
  - Se viola la condición de unicidad; no es una función.
- titulo: ¿Una circunferencia completa en el plano cartesiano representa una función?
  enunciado: ¿Una circunferencia completa en el plano cartesiano representa una función?
  respuesta: Falso
  solucion_pasos:
  - Existen valores de $x$ (el diámetro horizontal) donde una recta vertical corta la circunferencia en
    dos puntos, violando la unicidad.
- titulo: ¿Basta con encontrar un solo elemento del dominio con dos imágenes para descartar que sea función?
  enunciado: ¿Basta con encontrar un solo elemento del dominio con dos imágenes para descartar que sea
    función?
  respuesta: Verdadero
  solucion_pasos:
  - Un único contraejemplo de falla de unicidad (o de existencia) es suficiente para descartar que la
    relación sea función.
errores_frecuentes:
- Concluir que una relación es función solo por revisar unos pocos elementos, sin verificar todos.
- No distinguir entre falla de existencia y falla de unicidad al justificar por qué algo no es función.
- Aplicar el criterio de la línea vertical usando una línea horizontal.
- Suponer que toda relación entre números reales definida por una ecuación es automáticamente una función.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
