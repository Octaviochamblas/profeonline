semantic_id: MAT.EST.PERCENTILES.DATOS_NO_AGRUPADOS
titulo: Calcular percentiles para datos no agrupados
objetivo: Aplicar el procedimiento completo de cálculo de un percentil específico sobre un conjunto de
  datos no agrupados y ordenados.
introduccion: Este recurso integra el cálculo de posición con la lectura efectiva del valor correspondiente
  en un conjunto de datos concreto.
resumen: Calcular un percentil en datos no agrupados implica ordenar los datos, calcular la posición mediante
  la fórmula, y leer (o promediar) el valor correspondiente a esa posición.
explicacion: '![Cálculo de percentiles para datos no agrupados](/static/img/estadistica/percentil/percentil-datos-no-agrupados.svg)


  ### Definición formal


  Con los datos ordenados y la posición calculada mediante $(k\times n)/100$, se identifica el valor en
  esa posición (o se promedia con el siguiente valor si la posición no es entera).


  ### Desarrollo didáctico


  Para el conjunto ordenado {2,4,6,8,10,12,14,16,18} (n=9), el percentil 50: posición=(50×9)/100=4,5,
  por lo que se promedia el 4° y 5° dato: (8+10)/2=9.'
procedimiento:
- 'Paso 1: Ordena el conjunto de datos de menor a mayor.'
- 'Paso 2: Calcula la posición mediante (k×n)/100.'
- 'Paso 3: Si la posición es entera, toma ese dato; si no lo es, promedia los dos datos adyacentes a esa
  posición.'
ejemplos:
- titulo: Calcular el percentil 50 en 9 datos
  enunciado: 'Datos ordenados: 2,4,6,8,10,12,14,16,18.'
  solucion_pasos:
  - 'Posición=(50×9)/100=4,5. Se promedia el 4° (8) y 5° (10) dato: (8+10)/2=9.'
- titulo: Calcular el percentil 25 en 8 datos
  enunciado: 'Datos ordenados: 10,12,14,16,18,20,22,24.'
  solucion_pasos:
  - 'Posición=(25×8)/100=2. Como es entero, se toma el 2° dato: 12 (P25=12).'
- titulo: ¿Es necesario ordenar los datos antes de calcular cualquier percentil?
  respuesta: Sí
  solucion_pasos:
  - Sí, es un requisito indispensable de este procedimiento.
- titulo: ¿Se promedia con el siguiente dato solo cuando la posición calculada no es un número entero?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el criterio estándar aplicado en este recurso.
errores_frecuentes:
- No ordenar los datos antes de calcular el percentil, obteniendo un resultado incorrecto.
- Confundir la posición calculada con el valor mismo del percentil, sin ir a buscar el dato correspondiente.
- Olvidar promediar con el dato adyacente cuando la posición calculada no es un número entero.
fuente: 'Elaboración propia (referencia: Moraleja 378).'
estado: publicado
