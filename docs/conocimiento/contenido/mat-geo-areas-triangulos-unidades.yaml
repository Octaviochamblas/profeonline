semantic_id: MAT.GEO.AREAS_TRIANGULOS.UNIDADES
titulo: 'Unidades de medida de área: cm², m², km²'
objetivo: Reconocer las unidades cuadradas usadas para medir área, y su relación de conversión entre sí.
introduccion: Así como la longitud se mide en cm, m o km, el área tiene sus propias unidades, todas elevadas
  al cuadrado, y las conversiones entre ellas no son tan directas como podría parecer.
resumen: El área se mide en unidades cuadradas como cm², m² o km², que se relacionan según el cuadrado
  del factor de conversión lineal.
explicacion: '![Unidades de área: cm², m², km²](/static/img/geometria/areas-pitagoras/areas-triangulos-unidades.svg)


  ### Definición formal


  Si 1 m = 100 cm, entonces 1 m² = (100 cm)² = 10000 cm², no simplemente 100 cm², porque el factor de
  conversión se eleva al cuadrado al pasar de unidades lineales a unidades de área.


  ### Desarrollo didáctico


  Un error común es pensar que 1 m² = 100 cm² (usando el mismo factor 100 que para longitud); en realidad,
  como cada lado se multiplica por 100, el área se multiplica por 100×100=10000.'
procedimiento:
- 'Paso 1: Identifica el factor de conversión lineal entre las dos unidades (por ejemplo, 1 m = 100 cm).'
- 'Paso 2: Eleva ese factor al cuadrado.'
- 'Paso 3: Usa ese factor cuadrado para convertir entre las unidades de área correspondientes.'
ejemplos:
- titulo: Convertir m² a cm²
  enunciado: Un terreno tiene área 3 m².
  solucion_pasos:
  - 3 m² = 3×10000 cm² = 30000 cm².
- titulo: Convertir cm² a m²
  enunciado: Una superficie mide 50000 cm².
  solucion_pasos:
  - 50000 cm² ÷ 10000 = 5 m².
- titulo: ¿1 m² equivale a 100 cm²?
  respuesta: 'No'
  solucion_pasos:
  - No, 1 m² equivale a 10000 cm², porque el factor de conversión se eleva al cuadrado.
- titulo: ¿El factor de conversión de área es el cuadrado del factor lineal?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la regla general para convertir unidades de área.
errores_frecuentes:
- Usar el mismo factor de conversión lineal sin elevarlo al cuadrado.
- Confundir unidades de área con unidades de longitud o de volumen.
- Olvidar el exponente 2 al escribir la unidad (escribir 'cm' en vez de 'cm²').
fuente: Elaboración propia.
estado: publicado
