semantic_id: MAT.FUND.LOGICA_BASICA.EXPRESION_NO_PROPOSICIONAL
titulo: Identificación de expresiones que no son proposiciones
objetivo: Identificar y clasificar expresiones que no corresponden a proposiciones matemáticas, reconociendo
  enunciados abiertos, preguntas, exclamaciones e instrucciones.
introduccion: '¿Alguna vez has intentado responder "verdadero" o "falso" cuando alguien te dice "¡Pásame
  la sal!"? Sería muy raro, ¿verdad? Eso es porque esa frase es una orden, no una afirmación.


  En matemáticas y lógica, existen muchas frases y expresiones matemáticas a las que no podemos ponerles
  la etiqueta de "verdadero" o "falso". Estas se llaman expresiones no proposicionales. Aprender a reconocerlas
  te ayudará a evitar confusiones al estructurar argumentos y resolver ecuaciones.

  '
resumen: 'Una expresión no proposicional es aquella a la que no se le puede asignar un valor de verdad
  (verdadero o falso) único y objetivo. Incluye preguntas, órdenes, opiniones subjetivas, exclamaciones
  y enunciados abiertos con variables no definidas.

  '
explicacion: 'Las **expresiones no proposicionales** son aquellas oraciones o fórmulas matemáticas que
  carecen de un valor de verdad definido o que no pueden ser evaluadas objetivamente como verdaderas o
  falsas.


  Se pueden clasificar principalmente en las siguientes categorías:


  1. **Enunciados abiertos o funciones proposicionales**: Fórmulas o enunciados que contienen variables
  libres. Por ejemplo, en "$x + 5 = 12$", no podemos decir si es verdadero o falso a menos que sepamos
  qué valor toma $x$. Si se define un universo y se le asigna un valor a la variable (por ejemplo, $x
  = 7$), entonces se convierte en una proposición.

  2. **Preguntas (interrogativas)**: Su función es solicitar información, no declarar un hecho. Ejemplo:
  "¿Cuántos lados tiene un triángulo?".

  3. **Órdenes o instrucciones (imperativas)**: Indican una acción a realizar. Ejemplo: "Grafica la función
  $f(x) = x^2$".

  4. **Exclamaciones (exclamativas)**: Expresan emociones, sentimientos o deseos. Ejemplo: "¡Qué interesante
  la clase!".

  5. **Opiniones o juicios de valor**: Enunciados subjetivos que dependen de la persona. Ejemplo: "Las
  matemáticas son difíciles".

  '
procedimiento:
- 'Paso 1: Leer el enunciado y analizar su estructura gramatical o matemática.'
- 'Paso 2: Preguntarse si es posible afirmar, de forma objetiva, que el enunciado es verdadero o falso.'
- 'Paso 3: Si el enunciado depende de variables desconocidas (como $x$) o si es una pregunta, orden, exclamación
  u opinión, concluir que es una expresión no proposicional.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Determine si '$x$ es un número par' es una expresión no proposicional.
  solucion_pasos:
  - 'Paso a: Analizamos el enunciado ''$x$ es un número par''. Contiene la variable ''$x$'', la cual no
    tiene un valor asignado ni un contexto que defina su dominio.'
  - 'Paso b: Si $x = 4$, el enunciado es verdadero. Si $x = 5$, el enunciado es falso. Como el valor de
    verdad no es fijo ni único y depende del valor de la variable $x$, no es una proposición.'
  - 'Paso c: Concluimos que es una expresión no proposicional (específicamente, un enunciado abierto).'
- titulo: Ejemplo 2
  enunciado: 'Clasifique el tipo de expresión no proposicional del enunciado: ''¡Resuelve los ejercicios
    de la página 5!'''
  solucion_pasos:
  - 'Paso a: Evaluamos el enunciado. Es una instrucción redactada en modo imperativo.'
  - 'Paso b: No describe una situación de la cual se pueda evaluar su verdad o falsedad de forma objetiva.'
  - 'Paso c: Concluimos que es una expresión no proposicional del tipo orden o imperativa.'
- titulo: ¿Es una expresión no proposicional la ecuación '$x^2 - 4 = 0$?'
  respuesta: Sí
  solucion_pasos:
  - La ecuación '$x^2 - 4 = 0$' es una igualdad matemática que contiene la variable libre $x$. Sin conocer
    el valor de $x$ (el cual podría ser $2$ o $-2$ para ser verdadera, o cualquier otro número para ser
    falsa), no podemos asignarle un valor de verdad. Por lo tanto, es un enunciado abierto y, en consecuencia,
    una expresión no proposicional.
- titulo: ¿Es una expresión no proposicional el enunciado 'El número $9$ es múltiplo de $3$'?
  respuesta: 'No'
  solucion_pasos:
  - El enunciado afirma de manera directa y sin variables libres una propiedad matemática. Es un enunciado
    declarativo que podemos evaluar con certeza como verdadero. Por lo tanto, es una proposición, no una
    expresión no proposicional.
errores_frecuentes:
- Creer que las ecuaciones con variables siempre son proposiciones.
- Confundir un enunciado abierto (como '$x > 3$') con una proposición simple.
- Pensar que una pregunta que tiene una respuesta matemática única (como '¿Cuánto es $2+2$?') es una proposición,
  cuando la pregunta en sí no es declarativa.
- Olvidar que un enunciado subjetivo carece de valor de verdad lógico.
- Asumir que si un enunciado abierto es fácil de resolver, ya es una proposición sin necesidad de asignarle
  un valor a la variable.
fuente: Lógica Matemática, Thomson p.24
estado: publicado
