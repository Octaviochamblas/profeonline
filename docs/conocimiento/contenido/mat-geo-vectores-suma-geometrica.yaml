semantic_id: MAT.GEO.VECTORES_OPERATORIA.SUMA_GEOMETRICA
titulo: Adición de vectores mediante método geométrico
objetivo: 'Sumar dos vectores mediante el método geométrico del triángulo: colocar el origen del segundo
  vector en el extremo del primero, y el vector suma va desde el origen del primero hasta el extremo del
  segundo.'
introduccion: 'Sumar vectores geométricamente es como seguir dos instrucciones de desplazamiento seguidas:
  primero recorres el vector u, luego el vector v desde donde terminaste; el vector suma es el camino
  directo desde el inicio hasta el final.'
resumen: Para sumar dos vectores $\vec{u}$ y $\vec{v}$ mediante el método geométrico (método del triángulo),
  se traslada $\vec{v}$ de modo que su origen coincida con el extremo de $\vec{u}$; el vector suma $\vec{u}+\vec{v}$
  va desde el origen de $\vec{u}$ hasta el nuevo extremo de $\vec{v}$.
explicacion: '![Adición de vectores mediante método geométrico](/static/img/geometria/cartesiano-vectores/vectores-suma-geometrica.svg)


  ### Definición formal


  El método del triángulo para sumar $\vec{u}+\vec{v}$ consiste en trasladar $\vec{v}$ para que su origen
  coincida con el extremo de $\vec{u}$ (sin cambiar su módulo, dirección ni sentido); el vector resultante
  es el que va desde el origen de $\vec{u}$ hasta el extremo final de $\vec{v}$.


  ### Desarrollo didáctico


  En la figura, el vector $\vec{u}=(3,1)$ se traza primero, y luego $\vec{v}=(1,3)$ se traslada para comenzar
  donde termina $\vec{u}$. El vector suma $\vec{u}+\vec{v}$ (en un tercer color) va directamente desde
  el origen hasta el extremo final.'
procedimiento:
- 'Paso 1: Traza el vector u desde su origen.'
- 'Paso 2: Traslada el vector v (sin cambiar módulo, dirección ni sentido) de modo que su origen coincida
  con el extremo de u.'
- 'Paso 3: Traza el vector suma u+v desde el origen de u hasta el extremo final de v (ya trasladado).'
ejemplos:
- titulo: Sumar dos vectores mediante el método del triángulo
  enunciado: Se tienen los vectores u=(3,1) y v=(1,3).
  solucion_pasos:
  - Se traslada v para que comience donde termina u; el vector suma va desde el origen de u hasta el extremo
    de v trasladado.
- titulo: Reconocer que el orden de los vectores no altera la suma
  enunciado: Se suman u+v y v+u.
  solucion_pasos:
  - Ambos métodos (u primero o v primero) dan el mismo vector suma, ya que la suma de vectores es conmutativa.
- titulo: ¿Se debe cambiar el módulo del vector al trasladarlo?
  respuesta: 'No'
  solucion_pasos:
  - No, al trasladar un vector para sumarlo geométricamente, se mantiene exactamente su módulo, dirección
    y sentido.
- titulo: ¿El vector suma siempre va desde el origen del primer vector hasta el extremo del segundo (trasladado)?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la definición del método del triángulo para la suma geométrica.
errores_frecuentes:
- Cambiar el módulo o la dirección del vector al trasladarlo para sumarlo.
- Trazar el vector suma desde un punto incorrecto, sin partir del origen del primer vector.
- Confundir el método del triángulo con simplemente dibujar ambos vectores desde el mismo origen sin trasladar.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 122).'
estado: publicado
