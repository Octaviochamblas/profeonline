semantic_id: MAT.ALG.LENGUAJE_RELACIONES.ENTEROS_CONSECUTIVOS
titulo: Representación de números enteros consecutivos
objetivo: Modelar series de varios números enteros que se suceden uno tras otro.
introduccion: Ya sabemos encontrar al que sigue en la fila, pero ¿qué pasa si necesitamos a los tres siguientes,
  o a una familia entera de consecutivos? Necesitamos encadenar la lógica del sucesor.
resumen: 'Una **Serie de Enteros Consecutivos** se traduce tomando una variable inicial ($x$) y sumándole
  progresivamente $1, 2, 3.$ para representar los siguientes elementos: **$x, (x+1), (x+2), (x+3)$.**'
explicacion: '### Definición formal


  La clave de la palabra ''consecutivos'' es que reduce todas las incógnitas a una sola variable base,
  aprovechando el espaciado conocido (+1).


  ### Desarrollo didáctico


  Al modelar problemas verbales con tres o más números consecutivos, tienes libertad para elegir el punto
  de partida, pero la progresión debe mantenerse intacta.

  - Modelo clásico: El menor es $x$. Los tres consecutivos son $x$, $x+1$, $x+2$.

  - Modelo centrado (muy útil para simplificar ecuaciones): El del medio es $x$. Los tres consecutivos
  son $x-1$, $x$, $x+1$.


  Ambos modelos son correctos, pero si el problema te pide ''el número menor'' y usaste el modelo centrado,
  recuerda que el menor era $x-1$, no $x$.'
procedimiento:
- 'Paso 1: Identifica cuántos números consecutivos pide el problema (tres, cuatro, cinco.).'
- 'Paso 2: Decide si partirás desde el menor (x) o desde un punto central.'
- 'Paso 3: Construye la lista sumando 1 sucesivamente: x, x+1, x+2.'
- 'Paso 4: Si el problema pide la suma de todos, escribe la suma total de la lista y reduce términos semejantes.'
ejemplos:
- titulo: Tres hermanos seguidos
  enunciado: 'Traduce algebraicamente: ''La suma de las edades de tres hermanos que nacieron en años consecutivos''.'
  solucion_pasos:
  - 'Hermano menor: x.'
  - 'Hermano del medio: x + 1.'
  - 'Hermano mayor: x + 2.'
  - 'Suma total: x + (x + 1) + (x + 2).'
  - 'Si reducimos, obtenemos: 3x + 3.'
- titulo: Un problema PAES pide encontrar cuatro números enteros consecutivos tales que su suma equiva
  enunciado: 'Un problema PAES pide encontrar cuatro números enteros consecutivos tales que su suma equivalga
    a 130. Un estudiante usa el modelo centrado para ganar simetría y nombra al segundo número de la serie
    como $x$. ¿Cuál es la ecuación correcta que debe plantear el estudiante para que los cuatro números
    mantengan la consecutividad? (v1)


    Opciones: A) $(x - 1) + x + (x + 1) + (x + 2) = 130$ · B) $x + (x + 1) + (x + 2) + (x + 3) = 130$
    · C) $(x - 2) + (x - 1) + x + (x + 1) = 130$ · D) $4x + 1 = 130$'
  solucion_pasos:
  - Si el segundo número es x, el primero (que está antes) es x-1. El tercero es x+1, y el cuarto x+2.
    La opción B asume que x es el primero. La C asume que x es el tercero.
  - 'Respuesta: $(x - 1) + x + (x + 1) + (x + 2) = 130$'
- titulo: 'Respecto de «Representación de números enteros consecutivos»: ¿Se ajusta a la definición est'
  enunciado: 'Respecto de «Representación de números enteros consecutivos»: ¿Se ajusta a la definición
    esta afirmación? «Una **Serie de Enteros Consecutivos** se traduce tomando una variable inicial ($x$)
    y sumándole progresivamente $1, 2, 3.$ para representar los siguientes elementos: **$x, (x+1), (x+2),
    (x+3)$.**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una **Serie de Enteros Consecutivos** se traduce
    tomando una variable inicial ($x$) y sumándole progresivamente $1, 2, 3.$ para representar los siguientes
    elementos: **$x, (x+1), (x+2), (x+3)$.**'
- titulo: 'Respecto de «Representación de números enteros consecutivos»: ¿Es compatible con el procedim'
  enunciado: 'Respecto de «Representación de números enteros consecutivos»: ¿Es compatible con el procedimiento
    esta afirmación? «Traducir ''tres números consecutivos'' usando tres letras distintas como $x, y,
    z$. (Error fatal: se pierde la relación matemática entre ellos, que es distar en una unidad)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una **Serie de Enteros Consecutivos** se traduce
    tomando una variable inicial ($x$) y sumándole progresivamente $1, 2, 3.$ para representar los siguientes
    elementos: **$x, (x+1), (x+2), (x+3)$.**'
errores_frecuentes:
- 'Traducir ''tres números consecutivos'' usando tres letras distintas como $x, y, z$. (Error fatal: se
  pierde la relación matemática entre ellos, que es distar en una unidad).'
- Olvidar a la $x$ solita y empezar a contar desde $x+1$. (Ej. escribir $x+1, x+2, x+3$ como tres consecutivos,
  lo cual es válido, pero hace que la variable $x$ no sea ninguno de los números del conjunto).
- Para «Al enfrentar un problema que involucra 'tres números enteros consecutivos', ¿por qué es perjudicial
  modelar la situación asignando tres variables distintas, como $a, b, c$? (v1)», la respuesta correcta
  es Porque el alfabeto no tiene suficientes letras para tantos problemas.
- Porque usar $a, b, c$ obligatoriamente significa que son números pares.
- Porque los números consecutivos deben ser obligatoriamente representados por la letra $x$.
fuente: Álgebra de Baldor.
