semantic_id: MAT.ALG.MULT_POLINOMIOS.DISTRIBUTIVA_INCOMPLETA_ERROR
titulo: Detección de error por aplicación incompleta de la distributiva
objetivo: Detectar y corregir error por aplicación incompleta de la distributiva y justificar el procedimiento
  algebraico.
introduccion: Omitir uno de los productos parciales cambia el valor de toda la expresión. Revisar la distributividad
  término a término permite detectar y corregir esa omisión.
resumen: El estudiante multiplicó primero con primero y segundo con segundo, ignorando los cruzados.
explicacion: '### Definición formal


  Sean $P(x)=\sum_{i=0}^{m} a_i x^i$ y $Q(x)=\sum_{j=0}^{n} b_j x^j$. El producto correcto exige considerar
  todos los pares de términos:

  $$P(x)Q(x)=\sum_{i=0}^{m}\sum_{j=0}^{n} a_i b_j x^{i+j}.$$

  Existe aplicación incompleta de la distributiva cuando la expresión escrita solo incorpora los productos
  asociados a un subconjunto propio de pares $(i,j)$ y omite al menos uno de los términos parciales requeridos.
  En general, esa expresión no es algebraicamente equivalente al producto original, porque deja fuera
  contribuciones necesarias para la suma total.


  ### Desarrollo didáctico


  Se pierden $O$ y $I$ del acrónimo FOIL (Outers e Inners).


  La distributiva incompleta equivale a calcular solo las áreas de 2 celdas de las 4 posibles en el modelo
  de área.


  Los cruzados son $(m)(5) = 5m$ y $(3)(n) = 3n$.'
procedimiento:
- 'Paso 1: Expande el producto listando de manera explícita todos los pares de términos que deben multiplicarse.'
- 'Paso 2: Compara esa lista completa con la solución escrita para detectar productos faltantes.'
- 'Paso 3: Identifica si la omisión afecta términos cruzados, términos internos o cualquier otra combinación
  requerida.'
- 'Paso 4: Incorpora los productos parciales ausentes y reescribe correctamente la expansión completa.'
- 'Paso 5: Reduce los términos semejantes y verifica que el resultado sí represente el producto original.'
ejemplos:
- titulo: Alguien calculó $(3x - a)(x + 2)$ y obtuvo $3x^2 - 2a$ por distributiva incompleta. El valor
  enunciado: 'Alguien calculó $(3x - a)(x + 2)$ y obtuvo $3x^2 - 2a$ por distributiva incompleta. El valor
    real correcto para $x=1$ evaluando directamente los binomios debe ser $-3$. ¿Cuánto vale $a$?


    Opciones: A) $4$ · B) $3$ · C) $2$ · D) $5$'
  solucion_pasos:
  - 'Directo: $(3(1) - a)(1 + 2) = -3 \Rightarrow 3(3 - a) = -3 \Rightarrow 3 - a = -1 \Rightarrow a =
    4$.'
  - 'Respuesta: $4$'
- titulo: Cuál es la diferencia polinómica entre el desarrollo correcto de $(x+a)(x+b)$ y su versión c
  enunciado: '¿Cuál es la diferencia polinómica entre el desarrollo correcto de $(x+a)(x+b)$ y su versión
    con error de distributiva incompleta?


    Opciones: A) $(a+b)x$ · B) $ax+bx+ab$ · C) $ab$ · D) $(a-b)x$'
  solucion_pasos:
  - 'Correcto: $x^2 + (a+b)x + ab$. Incorrecto: $x^2 + ab$. Diferencia: $(a+b)x$.'
- titulo: 'Respecto de «Detección de error por aplicación incompleta de la distributiva»: ¿Es correcta'
  enunciado: 'Respecto de «Detección de error por aplicación incompleta de la distributiva»: ¿Es correcta
    esta caracterización? «El estudiante multiplicó primero con primero y segundo con segundo, ignorando
    los cruzados»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El estudiante multiplicó primero con primero y segundo
    con segundo, ignorando los cruzados.'
- titulo: 'Respecto de «Detección de error por aplicación incompleta de la distributiva»: ¿Es válida es'
  enunciado: 'Respecto de «Detección de error por aplicación incompleta de la distributiva»: ¿Es válida
    esta afirmación? «$(x - 1)(x + 4) = x^2 + 3x - 4$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El estudiante multiplicó primero con primero y segundo
    con segundo, ignorando los cruzados.'
errores_frecuentes:
- $(x - 1)(x + 4) = x^2 + 3x - 4$.
- $3(x + 2) = 3x + 6$.
- $x(x - 2) = x^2 - 2$.
- El término de mayor grado y el término libre.
- Todos los términos negativos.
