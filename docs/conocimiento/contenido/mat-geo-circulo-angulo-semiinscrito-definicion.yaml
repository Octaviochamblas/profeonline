semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_SEMIINSCRITO_DEFINICION
titulo: Definición de ángulo semiinscrito formado por una tangente y una cuerda
objetivo: 'Identificar y definir el ángulo semiinscrito: aquel formado por una recta tangente y una cuerda
  que comparten el punto de tangencia como vértice.'
introduccion: Cuando una recta tangente a una circunferencia y una cuerda se encuentran en el punto de
  tangencia, forman un ángulo especial llamado ángulo semiinscrito.
resumen: Un ángulo semiinscrito es aquel cuyo vértice es el punto de tangencia entre una recta tangente
  y la circunferencia, y cuyos lados son la tangente y una cuerda trazada desde ese punto.
explicacion: '![Ángulo semiinscrito (tangente y cuerda)](/static/img/geometria/circunferencia-circulo/circulo-angulo-semiinscrito-definicion.svg)


  ### Definición formal


  Un ángulo semiinscrito tiene su vértice en el punto de tangencia $T$ entre una recta tangente y la circunferencia,
  y sus lados son la recta tangente y una cuerda $TB$ que parte del mismo punto $T$. El arco $TB$ comprendido
  dentro del ángulo se llama arco subtendido.


  ### Desarrollo didáctico


  En la figura, la recta vertical es tangente a la circunferencia en $T$, y $TB$ es una cuerda. El ángulo
  formado entre la tangente y la cuerda $TB$ es un ángulo semiinscrito, a medio camino conceptual entre
  el ángulo del centro y el ángulo inscrito.'
procedimiento:
- 'Paso 1: Verifica que el vértice del ángulo sea el punto de tangencia entre una recta y la circunferencia.'
- 'Paso 2: Identifica los dos lados: la recta tangente y la cuerda que parte del mismo punto.'
- 'Paso 3: Reconoce el arco subtendido: el arco comprendido dentro de la abertura del ángulo.'
ejemplos:
- titulo: Identificar un ángulo semiinscrito
  enunciado: Una recta es tangente a una circunferencia en el punto T, y se traza la cuerda TB.
  solucion_pasos:
  - El ángulo formado entre la tangente y la cuerda TB, con vértice en T, es un ángulo semiinscrito.
- titulo: Reconocer el arco subtendido
  enunciado: El ángulo semiinscrito tiene vértice T y lado la cuerda TB.
  solucion_pasos:
  - El arco subtendido es el arco TB comprendido dentro de la abertura del ángulo (entre la tangente y
    la cuerda).
- titulo: ¿El vértice de un ángulo semiinscrito es el punto de tangencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición, el vértice coincide siempre con el punto donde la tangente toca la circunferencia.
- titulo: ¿Ambos lados de un ángulo semiinscrito son cuerdas?
  respuesta: 'No'
  solucion_pasos:
  - No, un lado es la recta tangente y el otro es una cuerda; no ambos son cuerdas (eso sería un ángulo
    inscrito).
errores_frecuentes:
- Confundir el ángulo semiinscrito con el ángulo inscrito (cuyos dos lados son cuerdas, no una tangente).
- No verificar que el vértice sea exactamente el punto de tangencia.
- Elegir el arco incorrecto como arco subtendido (el que queda fuera de la abertura del ángulo).
fuente: 'Elaboración propia (referencias: Moraleja 74, Cid 95).'
estado: publicado
