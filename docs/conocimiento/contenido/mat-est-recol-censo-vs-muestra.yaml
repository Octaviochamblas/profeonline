semantic_id: MAT.EST.RECOLECCION_BASE.CENSO_VS_MUESTRA
titulo: Diferenciar un censo poblacional de un muestreo
objetivo: Diferenciar el censo (estudio de toda la población) del muestreo (estudio de una parte de la
  población), reconociendo cuándo se aplica cada uno.
introduccion: Ambos métodos buscan obtener información, pero difieren radicalmente en su alcance, costo
  y tiempo de aplicación.
resumen: El censo es el estudio de todos los elementos de la población; el muestreo es el estudio de solo
  una parte (muestra) de esa población.
explicacion: '![Diferencia entre censo y muestreo](/static/img/estadistica/recol/recol-censo-vs-muestra.svg)


  ### Definición formal


  Un censo recolecta datos de cada elemento de la población $U$; un muestreo recolecta datos únicamente
  de un subconjunto $M\subset U$.


  ### Desarrollo didáctico


  El Censo de Población y Vivienda estudia a todos los habitantes de un país (censo); en cambio, una encuestadora
  que consulta a 1.000 personas sobre sus preferencias políticas realiza un muestreo.'
procedimiento:
- 'Paso 1: Identifica si el estudio recolecta datos de todos los elementos de la población o solo de una
  parte.'
- 'Paso 2: Si son todos los elementos, se trata de un censo; si es solo una parte, es un muestreo.'
- 'Paso 3: Considera las ventajas de cada uno: el censo es más preciso pero costoso y lento; el muestreo
  es más rápido y económico.'
ejemplos:
- titulo: Identificar un censo nacional
  enunciado: Un país recolecta datos de todos sus habitantes cada 10 años.
  solucion_pasos:
  - Es un censo, ya que se estudia a la totalidad de la población del país.
- titulo: Identificar un muestreo de mercado
  enunciado: Una empresa consulta a 500 de sus 100.000 clientes sobre un nuevo producto.
  solucion_pasos:
  - Es un muestreo, ya que se estudia solo una parte (500 clientes) de la población total.
- titulo: ¿El censo es generalmente más costoso que el muestreo?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que requiere recolectar datos de todos los elementos de la población, lo que implica más tiempo
    y recursos.
- titulo: ¿El muestreo siempre da resultados idénticos a un censo?
  respuesta: 'No'
  solucion_pasos:
  - No, el muestreo da una estimación basada en una parte de la población, que puede diferir levemente
    del valor real del censo.
errores_frecuentes:
- Confundir un estudio muestral con un censo cuando en realidad no se estudia a toda la población.
- Pensar que un censo siempre es la mejor opción, sin considerar su costo y tiempo en comparación con
  un muestreo bien diseñado.
- Asumir que un muestreo da exactamente el mismo resultado numérico que un censo.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
