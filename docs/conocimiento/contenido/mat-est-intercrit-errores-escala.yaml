semantic_id: MAT.EST.INTERPRETACION_CRITICA.ERRORES_ESCALA
titulo: Identificar errores de escala en gráficos estadísticos
objetivo: Identificar errores de escala en gráficos, como ejes truncados o intervalos no proporcionales,
  que distorsionan la percepción visual de los datos.
introduccion: Un gráfico con una escala mal construida puede exagerar o minimizar diferencias que en realidad
  son pequeñas o grandes.
resumen: Un error de escala ocurre cuando el eje de un gráfico no comienza en cero sin indicarlo claramente,
  o cuando los intervalos de la escala no son proporcionales, distorsionando la comparación visual.
explicacion: '![Errores de escala en gráficos](/static/img/estadistica/intercrit/intercrit-errores-escala.svg)


  ### Definición formal


  Un eje ''truncado'' (que no comienza en cero) puede hacer que diferencias pequeñas parezcan mucho más
  grandes de lo que realmente son, si no se advierte claramente al lector.


  ### Desarrollo didáctico


  Un gráfico de barras que compara 98 y 100 con un eje que va de 95 a 100 (en vez de 0 a 100) hará que
  la diferencia entre ambas barras parezca enorme, cuando en realidad es de solo un 2%.'
procedimiento:
- 'Paso 1: Observa dónde comienza el eje de valores del gráfico (¿en cero o en otro valor?).'
- 'Paso 2: Verifica si los intervalos marcados en el eje son de igual tamaño (proporcionales).'
- 'Paso 3: Si el eje está truncado sin advertencia clara, o los intervalos no son proporcionales, identifica
  esto como un error de escala.'
ejemplos:
- titulo: Identificar un eje truncado
  enunciado: Un gráfico de barras compara 98 y 100, con el eje vertical yendo de 95 a 100.
  solucion_pasos:
  - 'Es un error de escala: el eje truncado exagera visualmente una diferencia que en realidad es pequeña
    (2%).'
- titulo: Identificar un gráfico sin error de escala
  enunciado: Un gráfico de barras compara 40 y 80, con el eje vertical yendo de 0 a 100.
  solucion_pasos:
  - 'No hay error de escala: el eje comienza en 0 y permite una comparación visual proporcional.'
- titulo: ¿Un eje truncado siempre distorsiona la percepción de las diferencias?
  respuesta: Sí
  solucion_pasos:
  - Sí, especialmente si no se advierte claramente al lector que el eje no comienza en cero.
- titulo: ¿Es siempre incorrecto usar un eje que no comience en cero?
  respuesta: 'No'
  solucion_pasos:
  - No necesariamente, pero se debe advertir claramente esta condición para no inducir a interpretaciones
    erróneas.
errores_frecuentes:
- No verificar dónde comienza el eje vertical antes de interpretar las diferencias visuales entre barras.
- Asumir automáticamente que dos barras de altura muy distinta representan una diferencia real muy grande,
  sin revisar la escala.
- No advertir (al construir un gráfico) cuando el eje está truncado, induciendo a error al lector.
fuente: 'Elaboración propia (referencia: Moraleja 114, 280).'
estado: publicado
