semantic_id: MAT.ALG.FUNCIONES_ESPECIALES.PARTE_ENTERA_COBROS_TRAMOS
titulo: Modelamiento de cobros por tramos mediante función parte entera
objetivo: Modelar situaciones de cobro escalonado (por tramos completos) usando la función parte entera.
introduccion: Los estacionamientos que cobran por hora completa (aunque hayas usado solo unos minutos de la siguiente
  hora) son el ejemplo perfecto de la vida real de la función parte entera en acción.
resumen: Situaciones donde se cobra por **tramos completos** (por ejemplo, por cada hora iniciada, redondeando
  siempre hacia el tramo ya transcurrido) se modelan usando la función parte entera aplicada al tiempo dividido
  por la duración del tramo.
explicacion: '### Definición formal


  Si el cobro es de $c$ pesos por cada tramo de duración $T$, y el tiempo usado es $t$, el número de tramos completados
  totalmente es $\left\lfloor \dfrac{t}{T} \right\rfloor$, y el cobro por tramos completos es $c \cdot \left\lfloor
  \dfrac{t}{T} \right\rfloor$.


  ### Desarrollo didáctico


  La clave es identificar si el cobro es "por tramo completo transcurrido" (parte entera) o "por tramo iniciado"
  (que normalmente requiere sumar 1 salvo en los múltiplos exactos, un caso distinto).


  Un estacionamiento cobra \$1000 por cada hora completa transcurrida. Si un auto estuvo $2{,}7$ horas, el número
  de horas completas es $\lfloor 2{,}7 \rfloor = 2$, así que el cobro por horas completas es $2 \times 1000 =
  \$2000$ (sin contar la hora parcial adicional, según las reglas específicas del estacionamiento).'
procedimiento:
- 'Paso 1: Identifica la duración de cada tramo y el costo por tramo.'
- 'Paso 2: Divide el tiempo total usado por la duración del tramo.'
- 'Paso 3: Aplica la función parte entera a ese cociente para obtener el número de tramos completos.'
- 'Paso 4: Multiplica ese número por el costo de cada tramo.'
ejemplos:
- titulo: Cálculo de cobro por horas completas
  enunciado: Un estacionamiento cobra \$800 por cada hora completa. Si un vehículo estuvo $3{,}5$ horas, ¿cuánto
    se cobra por las horas completas?
  solucion_pasos:
  - '$\lfloor 3{,}5 \rfloor = 3$ horas completas.'
  - '$3 \times 800 = \$2400$.'
- titulo: Cálculo con tiempo exacto
  enunciado: El mismo estacionamiento, si un vehículo estuvo exactamente $4$ horas, ¿cuánto se cobra?
  solucion_pasos:
  - '$\lfloor 4 \rfloor = 4$ horas completas (el tiempo ya es entero).'
  - '$4 \times 800 = \$3200$.'
- titulo: ¿La función parte entera modela cobros por tramo completo transcurrido?
  enunciado: ¿La función parte entera modela cobros por tramo completo transcurrido?
  respuesta: Sí
  solucion_pasos:
  - Redondea siempre hacia abajo, contando solo los tramos íntegramente completados.
- titulo: ¿$3{,}9$ horas cuentan como $4$ horas completas al aplicar parte entera?
  enunciado: ¿$3{,}9$ horas cuentan como $4$ horas completas al aplicar parte entera?
  respuesta: 'No'
  solucion_pasos:
  - $\lfloor 3{,}9 \rfloor = 3$, pues aún no se ha completado la cuarta hora.
errores_frecuentes:
- Redondear al entero más cercano en vez de aplicar la parte entera (redondeo hacia abajo).
- Confundir "cobro por tramo completado" con "cobro por tramo iniciado" (que exigiría sumar 1 en casos no exactos).
- Olvidar que un tiempo exactamente entero no genera cobro adicional por fracción de tramo.
- No dividir correctamente el tiempo total por la duración de cada tramo antes de aplicar la parte entera.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
