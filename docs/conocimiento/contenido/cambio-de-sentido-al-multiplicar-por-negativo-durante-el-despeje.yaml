semantic_id: MAT.ALG.INECUACIONES_LINEALES.MULTIPLICACION_NEGATIVA_DESPEJE
titulo: Cambio de sentido al multiplicar por negativo durante el despeje
objetivo: Comprender y aplicar la regla de inversión del sentido de la desigualdad al multiplicar o dividir
  por un número negativo.
introduccion: En el trabajo con inecuaciones, una de las diferencias más importantes respecto a las ecuaciones
  es el comportamiento ante operaciones con números negativos, lo que garantiza la conservación de las
  relaciones de orden.
resumen: Al resolver inecuaciones lineales, multiplicar o dividir ambos lados por un número negativo obliga
  a invertir el signo de desigualdad para mantener la validez de la proposición matemática.
explicacion: '### Definición formal

  Dada una inecuación de la forma $a x < b$, si $a < 0$, al dividir ambos miembros por $a$ (lo que equivale
  a multiplicar por $1/a$, siendo $1/a < 0$), la relación de orden se invierte, resultando en $x > b/a$.
  En general, si $x < y$ y $c < 0$, entonces $x \\cdot c > y \\cdot c$.


  ### Desarrollo didáctico

  Las inecuaciones representan balanzas en desequilibrio. Cuando aplicamos una operación que preserva
  el orden, el desequilibrio se mantiene en la misma dirección. Sin embargo, los números negativos invierten
  la posición relativa de los números en la recta numérica. Por ello, una desigualdad verdadera como $2
  < 5$ se transforma en $-2 > -5$ al multiplicar por $-1$. Este principio se extiende al despejar variables:
  si tenemos un coeficiente negativo multiplicando a la incógnita, debemos revertir la dirección de la
  desigualdad al pasarlo dividiendo (o multiplicando) para encontrar el intervalo solución correcto.'
procedimiento:
- Aislar el término que contiene la variable en uno de los lados de la inecuación usando sumas o restas.
- Identificar el coeficiente que multiplica a la variable.
- Si el coeficiente es negativo, multiplicar o dividir ambos lados por dicho coeficiente e invertir inmediatamente
  el sentido del signo de desigualdad.
- Simplificar el resultado y expresar la solución en forma de intervalo o conjunto, según sea requerido.
ejemplos:
- titulo: Despeje con coeficiente negativo simple
  enunciado: Resuelve la inecuación $-3x < 12$.
  solucion_pasos:
  - Dividimos ambos lados por $-3$.
  - Como $-3$ es negativo, invertimos el signo de menor que a mayor que.
  - Obtenemos $x > -4$.
- titulo: Inecuación con términos compuestos
  enunciado: Encuentra el conjunto solución para $5 - 2x \\geq 11$.
  solucion_pasos:
  - Restamos $5$ en ambos lados - $-2x \\geq 6$.
  - Dividimos entre $-2$ y simultáneamente invertimos el signo de desigualdad.
  - La solución final es $x \\leq -3$.
- titulo: ¿Se mantiene la desigualdad?
  respuesta: Falso
  solucion_pasos:
  - '{"Observamos la proposición": "Si $-x < 4$, entonces $x < -4$."}'
  - Al multiplicar por $-1$, debemos invertir el signo de desigualdad.
  - El resultado correcto es $x > -4$.
- titulo: ¿Es correcto el sentido de la desigualdad?
  respuesta: Verdadero
  solucion_pasos:
  - '{"Evaluamos": "Si $-5x \\\\geq -15$, entonces $x \\\\leq 3$."}'
  - Al dividir ambos lados entre $-5$ (número negativo), el signo $\\geq$ debe cambiar a $\\leq$.
  - Operando se obtiene $x \\leq 3$, por lo que el proceso es correcto.
errores_frecuentes:
- Pasar dividiendo un número negativo sin cambiar el sentido de la desigualdad.
- Invertir la desigualdad al restar un número negativo en ambos lados.
- Cambiar el signo de la desigualdad cuando se divide por un número positivo si el otro lado es negativo.
- Creer que el signo de desigualdad se invierte solo al trabajar con fracciones negativas.
- Olvidar el signo negativo al realizar la división y además no invertir la desigualdad.
