semantic_id: MAT.GEO.ANGULOS_CLASIFICACION.LLANO
titulo: Uso del término ángulo llano como equivalente de ángulo extendido
objetivo: Reconocer que 'llano' y 'extendido' se usan como equivalentes y comprobar que llano y extendido
  nombran la misma abertura geométrica.
introduccion: 'En geometría a veces aparecen dos palabras para el mismo objeto. Aquí no hay dos ángulos
  distintos: hay dos formas de nombrar una media vuelta. Este recurso se centra en uso del término ángulo
  llano como equivalente de ángulo extendido y en cómo reconocerlo con un criterio geométrico claro.'
resumen: Ángulo llano es otro nombre para un ángulo de 180°. Como idea de control, llano y extendido nombran
  la misma abertura geométrica.
explicacion: 'Ángulo llano es otro nombre para un ángulo de 180°.


  La situación “si dos rayos opuestos forman una recta, se puede decir que el ángulo es llano o extendido”
  muestra cómo pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y
  luego se verifica que llano y extendido nombran la misma abertura geométrica.'
procedimiento:
- 'Paso 1: Identifica si la abertura mide exactamente 180°.'
- 'Paso 2: Relaciona esa medida con la imagen de una recta formada por rayos opuestos.'
- 'Paso 3: Concluye que los términos ''llano'' y ''extendido'' describen el mismo ángulo.'
ejemplos:
- titulo: Situación geométrica — Ángulo llano
  enunciado: Si dos rayos opuestos forman una recta, se puede decir que el ángulo es llano o extendido.
  solucion_pasos:
  - Identifica si la abertura mide exactamente 180°.
  - Relaciona esa medida con la imagen de una recta formada por rayos opuestos.
  - Concluye que los términos 'llano' y 'extendido' describen el mismo ángulo.
- titulo: Corrección de una respuesta — Ángulo llano
  enunciado: En la situación “si dos rayos opuestos forman una recta, se puede decir que el ángulo es
    llano o extendido”, un compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye
    la justificación completa.
  solucion_pasos:
  - 'Parte de la definición: ángulo llano es otro nombre para un ángulo de 180°.'
  - Relaciona esa medida con la imagen de una recta formada por rayos opuestos.
  - Concluye que los términos 'llano' y 'extendido' describen el mismo ángulo.
- titulo: ¿El caso confirma que llano y extendido nombran la misma abertura geométrica? — Ángulo llano
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: ángulo llano es otro nombre para un ángulo
    de 180°.'
  - En el caso “si dos rayos opuestos forman una recta, se puede decir que el ángulo es llano o extendido”
    se observa que llano y extendido nombran la misma abertura geométrica.
  - Concluye que los términos 'llano' y 'extendido' describen el mismo ángulo.
- titulo: ¿Se puede cerrar sin el control final? — Ángulo llano
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de uso del término ángulo llano como equivalente
    de ángulo extendido.
  - Después del paso “Identifica si la abertura mide exactamente 180°.” todavía hace falta revisar “Relaciona
    esa medida con la imagen de una recta formada por rayos opuestos.”.
  - El cierre correcto exige “Concluye que los términos 'llano' y 'extendido' describen el mismo ángulo.”.
errores_frecuentes:
- Ángulo llano significa un ángulo diferente del extendido solo porque cambia la palabra usada.
- Para resolver ángulo llano, basta con el paso “Identifica si la abertura mide exactamente 180°.” y no
  hace falta revisar “Relaciona esa medida con la imagen de una recta formada por rayos opuestos.”.
- Si el dibujo parece claro, se puede ignorar que llano y extendido nombran la misma abertura geométrica.
- Dos configuraciones distintas representan ángulo llano solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye que los términos 'llano' y 'extendido'
  describen el mismo ángulo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
