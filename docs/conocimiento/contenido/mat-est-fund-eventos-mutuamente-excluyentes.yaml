semantic_id: MAT.EST.PROBA_FUNDAMENTOS.EVENTOS_MUTUAMENTE_EXCLUYENTES
titulo: Concepto de eventos mutuamente excluyentes o disjuntos
objetivo: Definir eventos mutuamente excluyentes (o disjuntos) como aquellos que no pueden ocurrir simultáneamente,
  es decir, cuya intersección es el conjunto vacío.
introduccion: 'Algunos eventos son incompatibles entre sí: si ocurre uno, el otro no puede ocurrir en
  ese mismo resultado del experimento.'
resumen: 'Dos eventos $A$ y $B$ son mutuamente excluyentes (o disjuntos) si no tienen ningún elemento
  en común: $A\cap B=\emptyset$.'
explicacion: '![Eventos mutuamente excluyentes](/static/img/probabilidad/fundamentos/fund-eventos-mutuamente-excluyentes.svg)


  ### Definición formal


  Dos eventos $A$ y $B$ son mutuamente excluyentes si $A\cap B=\emptyset$, es decir, si no existe ningún
  resultado que pertenezca a ambos eventos simultáneamente.


  ### Desarrollo didáctico


  Al lanzar un dado, el evento $A=\{1,3,5\}$ (impar) y el evento $B=\{2,4\}$ (par menor que 5) no comparten
  ningún elemento, por lo que son mutuamente excluyentes: si sale un número impar, no puede ser par al
  mismo tiempo.'
procedimiento:
- 'Paso 1: Identifica los elementos de cada evento (A y B).'
- 'Paso 2: Verifica si existe algún elemento común entre ambos conjuntos.'
- 'Paso 3: Si no existe ningún elemento común, los eventos son mutuamente excluyentes.'
ejemplos:
- titulo: Verificar que dos eventos son mutuamente excluyentes
  enunciado: A={1,3,5}, B={2,4}.
  solucion_pasos:
  - A∩B=∅ (no comparten elementos), por lo que son mutuamente excluyentes.
- titulo: Verificar que dos eventos NO son mutuamente excluyentes
  enunciado: A={1,2,3}, B={3,4,5}.
  solucion_pasos:
  - A∩B={3}≠∅, por lo que NO son mutuamente excluyentes (comparten el elemento 3).
- titulo: ¿Dos eventos mutuamente excluyentes pueden ocurrir al mismo tiempo?
  respuesta: 'No'
  solucion_pasos:
  - No, esa imposibilidad de ocurrencia simultánea es justamente lo que los define.
- titulo: ¿Un evento y su complemento son siempre mutuamente excluyentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, un evento y su complemento nunca comparten elementos, por definición.
errores_frecuentes:
- Confundir eventos mutuamente excluyentes con eventos independientes (son conceptos distintos).
- Afirmar que dos eventos son excluyentes sin verificar realmente su intersección.
- Creer que todos los pares de eventos posibles son automáticamente mutuamente excluyentes.
fuente: 'Elaboración propia (referencia: Moraleja 403).'
estado: publicado
