semantic_id: MAT.ALG.MULT_POLINOMIOS.REGLA_GENERAL
objetivo: Multiplicar dos polinomios multiplicando cada término del primero por todos los términos del segundo y
  reduciendo los semejantes.
introduccion: Si la multiplicación de monomio por polinomio era un cartero entregando cartas en una cuadra, la multiplicación
  de polinomios es como si todos los carteros de una oficina entregaran cartas en todas las casas de la cuadra.
  Absolutamente todos se multiplican con todos.
resumen: La **Multiplicación de Polinomios** consiste en multiplicar cada término del primer polinomio por cada
  uno de los términos del segundo polinomio. Luego se reducen todos los términos semejantes que resulten.
explicacion: '### Definición formal


  Sean $P(x)=\sum_{i=0}^{m} a_i x^i$ y $Q(x)=\sum_{j=0}^{n} b_j x^j$ dos polinomios. Su producto se define por

  $$P(x)Q(x)=\sum_{i=0}^{m}\sum_{j=0}^{n} a_i b_j x^{i+j}.$$

  Al reagrupar los términos del mismo grado, también puede escribirse como

  $$P(x)Q(x)=\sum_{k=0}^{m+n}\left(\sum_{i+j=k} a_i b_j\right)x^k.$$

  Esto expresa que multiplicar dos polinomios consiste en aplicar la distributividad a todos los pares de términos
  y luego reducir los términos semejantes. Si $P$ tiene $r$ términos no nulos y $Q$ tiene $s$ términos no nulos,
  entonces aparecen $r\cdot s$ productos parciales antes de la reducción.


  ### Desarrollo didáctico


  Multiplica: $(2x + 3)(x - 4)$.


  Aplicamos la distribución extendida:

  1. $(2x)(x) = 2x^2$.

  2. $(2x)(-4) = -8x$.

  3. $(3)(x) = +3x$.

  4. $(3)(-4) = -12$.


  Unimos los términos: $2x^2 - 8x + 3x - 12$.

  Reducimos semejantes (familia $x$): $-8x + 3x = -5x$.

  Resultado final: $2x^2 - 5x - 12$.'
procedimiento:
- 'Paso 1: Identifica todos los términos de cada polinomio y decide un orden de trabajo claro.'
- 'Paso 2: Multiplica cada término del primer polinomio por cada término del segundo, sin omitir ninguna combinación.'
- 'Paso 3: Escribe todos los productos parciales conservando signos, coeficientes y potencias.'
- 'Paso 4: Agrupa los términos que tengan la misma parte literal y el mismo exponente.'
- 'Paso 5: Reduce los términos semejantes y ordena el resultado final.'
ejemplos:
- titulo: El producto cruzado
  enunciado: 'Multiplica: (a + b)(a - b).'
  solucion_pasos:
  - (a)(a) = a^2.
  - (a)(-b) = -ab.
  - (b)(a) = +ab (ordenado).
  - (b)(-b) = -b^2.
  - 'Línea completa: a^2 - ab + ab - b^2.'
  - 'Reducción: -ab + ab = 0.'
  - 'Resultado: a^2 - b^2.'
- titulo: Un parque rectangular tiene largo $(x + 8)$ metros y ancho $(x - 3)$ metros. ¿Qué expresión
  enunciado: 'Un parque rectangular tiene largo $(x + 8)$ metros y ancho $(x - 3)$ metros. ¿Qué expresión algebraica
    describe el área total del parque? (v1)


    Opciones: A) $x^2 + 5x - 24$ metros cuadrados. · B) $x^2 - 24$ metros cuadrados. · C) $x^2 + 5x + 24$ metros
    cuadrados. · D) $2x + 5$ metros cuadrados.'
  solucion_pasos:
  - Área = largo × ancho $= (x+8)(x-3) = x^2 - 3x + 8x - 24 = x^2 + 5x - 24$.
  - 'Respuesta: $x^2 + 5x - 24$ metros cuadrados.'
- titulo: 'Respecto de «Aplicación de la regla general para multiplicar dos polinomios»: ¿La siguiente'
  enunciado: 'Respecto de «Aplicación de la regla general para multiplicar dos polinomios»: ¿La siguiente formulación
    es correcta? «La **Multiplicación de Polinomios** consiste en multiplicar cada término del primer polinomio
    por cada uno de los términos del segundo polinomio»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Multiplicación de Polinomios** consiste en multiplicar
    cada término del primer polinomio por cada uno de los términos del segundo polinomio.'
- titulo: 'Respecto de «Aplicación de la regla general para multiplicar dos polinomios»: ¿La siguiente'
  enunciado: 'Respecto de «Aplicación de la regla general para multiplicar dos polinomios»: ¿La siguiente conclusión
    es correcta? «Multiplicar solo términos en la misma posición (ej. creer que $(x+1)(x+2) = x^2 + 2$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Multiplicación de Polinomios** consiste en multiplicar
    cada término del primer polinomio por cada uno de los términos del segundo polinomio.'
errores_frecuentes:
- Multiplicar solo términos en la misma posición (ej. creer que $(x+1)(x+2) = x^2 + 2$).
- Olvidar la regla de signos en algunos de los productos cruzados.
- Para «Al multiplicar un binomio de 2 términos por un trinomio de 3 términos, ¿cuántas multiplicaciones de monomios
  individuales se deben realizar antes de reducir semejantes? (v1)», la respuesta correcta es $5$ multiplicaciones.
- Para «Al multiplicar un binomio de 2 términos por un trinomio de 3 términos, ¿cuántas multiplicaciones de monomios
  individuales se deben realizar antes de reducir semejantes? (v1)», la respuesta correcta es $4$ multiplicaciones.
- Para «Al multiplicar un binomio de 2 términos por un trinomio de 3 términos, ¿cuántas multiplicaciones de monomios
  individuales se deben realizar antes de reducir semejantes? (v1)», la respuesta correcta es $2$ multiplicaciones.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Aplicación de la regla general para multiplicar dos polinomios
