semantic_id: MAT.ALG.MULT_POLINOMIOS.REGLA_GENERAL
objetivo: Multiplicar dos polinomios multiplicando cada término del primero por todos
  los términos del segundo y reduciendo los semejantes.
introduccion: Si la multiplicación de monomio por polinomio era un cartero entregando
  cartas en una cuadra, la multiplicación de polinomios es como si todos los carteros
  de una oficina entregaran cartas en todas las casas de la cuadra. Absolutamente
  todos se multiplican con todos.
resumen: La **Multiplicación de Polinomios** consiste en multiplicar cada término
  del primer polinomio por cada uno de los términos del segundo polinomio. Luego se
  reducen todos los términos semejantes que resulten.
explicacion: 'Multiplica: $(2x + 3)(x - 4)$.


  Aplicamos la distribución extendida:

  1. $(2x)(x) = 2x^2$.

  2. $(2x)(-4) = -8x$.

  3. $(3)(x) = +3x$.

  4. $(3)(-4) = -12$.


  Unimos los términos: $2x^2 - 8x + 3x - 12$.

  Reducimos semejantes (familia $x$): $-8x + 3x = -5x$.

  Resultado final: $2x^2 - 5x - 12$.'
procedimiento:
- 'Paso 1: Toma el primer término del primer polinomio y multiplícalo por todos los
  términos del segundo.'
- 'Paso 2: Toma el segundo término del primer polinomio y haz lo mismo.'
- 'Paso 3: Repite el proceso para cada término del primer polinomio.'
- 'Paso 4: Escribe todos los productos obtenidos en una sola línea.'
- 'Paso 5: Identifica y reduce los términos semejantes para obtener el polinomio simplificado.'
ejemplos:
- titulo: El producto cruzado
  enunciado: 'Multiplica: (a + b)(a - b).'
  solucion_pasos:
  - (a)(a) = a^2.
  - (a)(-b) = -ab.
  - (b)(a) = +ab (ordenado).
  - (b)(-b) = -b^2.
  - 'Línea completa: a^2 - ab + ab - b^2.'
  - 'Reducción: -ab + ab = 0.'
  - 'Resultado: a^2 - b^2.'
errores_frecuentes:
- Multiplicar solo términos en la misma posición (ej. creer que $(x+1)(x+2) = x^2
  + 2$).
- Olvidar la regla de signos en algunos de los productos cruzados.
fuente: Álgebra de Baldor.
estado: publicado
