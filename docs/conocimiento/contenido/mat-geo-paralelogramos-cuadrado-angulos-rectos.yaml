semantic_id: MAT.GEO.PARALELOGRAMOS.CUADRADO_ANGULOS_RECTOS
titulo: Propiedad de cuatro ángulos rectos en el cuadrado
objetivo: Reconocer que el cuadrado tiene sus cuatro ángulos interiores rectos (de 90°).
introduccion: La segunda propiedad característica que define completamente al cuadrado, junto con la de
  sus lados, tiene que ver con sus ángulos.
resumen: En un cuadrado, los cuatro ángulos interiores son rectos, es decir, miden exactamente 90° cada
  uno.
explicacion: '![Cuatro ángulos rectos en el cuadrado](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-cuadrado-angulos-rectos.svg)


  ### Definición formal


  Un cuadrado tiene $\angle A=\angle B=\angle C=\angle D=90°$. Esto es consistente con la suma de ángulos
  interiores de un cuadrilátero (360°), ya que $4\times90°=360°$.


  ### Desarrollo didáctico


  Esta propiedad, junto con la de los cuatro lados congruentes, es lo que distingue completamente al cuadrado
  de otros paralelogramos: el rombo tiene lados iguales pero no necesariamente ángulos rectos, y el rectángulo
  tiene ángulos rectos pero no necesariamente lados iguales; el cuadrado combina ambas propiedades.'
procedimiento:
- 'Paso 1: Verifica que la figura sea un cuadrado.'
- 'Paso 2: Si lo es, todos sus cuatro ángulos interiores miden 90°.'
- 'Paso 3: Verifica que la suma de los cuatro ángulos sea 360° (4×90°=360°), como en todo cuadrilátero.'
ejemplos:
- titulo: Verificar los ángulos de un cuadrado
  enunciado: Un cuadrado tiene un ángulo marcado de 90°.
  solucion_pasos:
  - Los otros tres ángulos también miden 90° cada uno, por ser cuadrado.
- titulo: Comprobar la suma total
  enunciado: ¿Cuánto suman los cuatro ángulos de un cuadrado?
  solucion_pasos:
  - 4×90°=360°, consistente con la suma de ángulos de cualquier cuadrilátero.
- titulo: ¿Un rombo tiene necesariamente ángulos rectos?
  respuesta: 'No'
  solucion_pasos:
  - No, un rombo puede tener ángulos distintos de 90°; solo el cuadrado (caso particular de rombo) los
    tiene rectos.
- titulo: ¿Basta con tener ángulos rectos para ser un cuadrado?
  respuesta: 'No'
  solucion_pasos:
  - No, también se requiere que los cuatro lados sean iguales; de lo contrario, sería un rectángulo no
    cuadrado.
errores_frecuentes:
- Confundir el cuadrado con el rectángulo, olvidando el requisito adicional de lados iguales.
- Creer que basta con verificar un solo ángulo recto para concluir que los cuatro lo son.
- Aplicar esta propiedad a un rombo no cuadrado, donde los ángulos no son rectos.
fuente: 'Fuente: Moraleja Tomo 2 68, Cid 45.'
estado: publicado
