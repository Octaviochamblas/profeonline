semantic_id: MAT.GEO.POLIEDROS_PRISMAS.CARAS
titulo: Identificación de las caras de un poliedro
objetivo: 'Identificar correctamente las caras de un poliedro: cada una de las regiones poligonales planas
  que forman su superficie exterior.'
introduccion: Cada 'lado plano' visible de un poliedro (como cada cara de un dado) es lo que en geometría
  se llama una cara.
resumen: Las caras de un poliedro son cada una de las regiones poligonales planas que constituyen su superficie
  exterior.
explicacion: '![Caras de un poliedro](/static/img/geometria/espacio-cuerpos/poliedro-caras.svg)


  ### Definición formal


  Las caras de un poliedro son los polígonos planos que forman su superficie. Cada cara está delimitada
  por un conjunto de aristas que forman un polígono cerrado.


  ### Desarrollo didáctico


  En la figura, la región ABCD (uno de los rectángulos que forman la superficie del prisma) es una cara
  del poliedro. Un prisma rectangular tiene en total 6 caras: 2 bases y 4 caras laterales.'
procedimiento:
- 'Paso 1: Observa la superficie del poliedro e identifica cada región poligonal plana individual.'
- 'Paso 2: Verifica que cada una de esas regiones esté delimitada por aristas que forman un polígono cerrado.'
- 'Paso 3: Cuenta el total de caras identificadas para caracterizar el poliedro.'
ejemplos:
- titulo: Identificar una cara en un prisma rectangular
  enunciado: El prisma tiene una región plana ABCD delimitada por cuatro aristas.
  solucion_pasos:
  - 'ABCD es una cara del prisma: una región poligonal plana delimitada por aristas.'
- titulo: Contar el número de caras de un prisma rectangular
  enunciado: Un prisma rectangular tiene 2 bases y 4 caras laterales.
  solucion_pasos:
  - 'En total tiene 6 caras: 2 bases (rectángulos) más 4 caras laterales (rectángulos).'
- titulo: ¿Cada cara de un poliedro es necesariamente un polígono?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición de poliedro, todas sus caras deben ser regiones poligonales planas.
- titulo: ¿Dos caras de un poliedro pueden compartir más de una arista?
  respuesta: 'No'
  solucion_pasos:
  - No, en un poliedro convexo estándar, dos caras distintas comparten como máximo una arista en común.
errores_frecuentes:
- Confundir una cara (región bidimensional) con una arista (segmento unidimensional).
- Olvidar contar alguna de las caras, especialmente las bases, al enumerar el total de caras de un poliedro.
- Creer que todas las caras de cualquier poliedro deben tener la misma forma (eso solo aplica a los poliedros
  regulares).
fuente: 'Elaboración propia (referencias: Moraleja 96, Cid 167).'
estado: publicado
