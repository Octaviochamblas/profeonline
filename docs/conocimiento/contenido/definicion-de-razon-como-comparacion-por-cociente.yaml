semantic_id: MAT.NUM.RAZONES.DEFINICION_COCIENTE
titulo: Definición de razón como comparación por cociente
objetivo: Comprender y calcular una razón como la comparación entre dos cantidades mediante un cociente.
introduccion: Imagina que en una receta necesitas 2 tazas de harina por cada 3 de leche. La relación entre
  la harina y la leche es constante, sin importar si haces un pastel pequeño o uno gigante. En matemáticas,
  a esa forma de comparar cantidades le llamamos razón, y nos ayuda a mantener las proporciones correctas
  en todo momento.
resumen: 'Una razón es la comparación de dos cantidades mediante división o cociente. Se denota como $a
  : b$ o $\frac{a}{b}$ y se lee ''a es a b''.'
explicacion: "Una **razón** compara dos cantidades calculando cuántas veces cabe una en la otra, o qué\
  \ fracción es una de la otra. A diferencia de una resta (que compara por diferencia), la razón compara\
  \ por cociente. \n\nSi tenemos las cantidades $a$ y $b$, su razón se expresa matemáticamente como:\n\
  $$\\frac{a}{b} \\quad \\text{o} \\quad a : b$$\nAmbas formas son válidas y representan la misma relación."
procedimiento:
- 'Paso 1: Identifica las dos cantidades que se desean comparar en el problema.'
- 'Paso 2: Escribe la primera cantidad mencionada como el numerador y la segunda como el denominador.'
- 'Paso 3: Simplifica la fracción resultante, si es posible, para obtener la razón en su forma más simple.'
ejemplos:
- titulo: Calculando la razón de alumnos
  enunciado: En un curso hay 15 niñas y 10 niños. ¿Cuál es la razón entre el número de niñas y de niños?
  solucion_pasos:
  - 'Identificamos las cantidades: niñas = 15, niños = 10.'
  - 'Escribimos el cociente en el orden solicitado: $\frac{15}{10}$.'
  - 'Simplificamos dividiendo por 5: $\frac{3}{2}$. La razón es $3 : 2$.'
- titulo: ¿Es la razón una comparación aditiva?
  respuesta: 'No'
  solucion_pasos:
  - La comparación aditiva responde a 'cuánto más' (resta). La razón es una comparación por cociente (división),
    que responde a 'cuántas veces' o 'en qué proporción'.
errores_frecuentes:
- Invertir el orden de las cantidades al escribir la razón.
- Creer que una razón es exactamente lo mismo que una fracción (las fracciones representan partes de un
  todo, las razones comparan dos cantidades cualesquiera).
- Comparar restando en lugar de dividiendo.
- Escribir la razón sin simplificar, cuando se pide la forma irreductible.
- Asumir que si la razón es $2:3$, las cantidades exactas son obligatoriamente 2 y 3.
fuente: Currículum Nacional MINEDUC — Razones y proporciones.
estado: publicado
