semantic_id: MAT.ALG.EC_CUADR_BASE.CONDICION_A_NO_CERO
titulo: Condición a ≠ 0 para que una ecuación sea cuadrática
objetivo: Comprender por qué la condición $a\neq0$ es indispensable para que $ax^2+bx+c=0$ sea una ecuación
  de segundo grado.
introduccion: Si el coeficiente que acompaña a $x^2$ vale cero, ese término simplemente desaparece, y
  con él, todo lo que hace "cuadrática" a la ecuación.
resumen: La condición $a\neq0$ es indispensable en $ax^2+bx+c=0$, porque si $a=0$ el término cuadrático
  se anula y la ecuación se reduce a una de primer grado (o a una constante).
explicacion: '### Definición formal


  En la forma general $ax^2+bx+c=0$, la condición $a\neq0$ es parte constitutiva de la definición de ecuación
  de segundo grado. Si $a=0$, la expresión se reduce a $bx+c=0$, que es una ecuación de primer grado (si
  $b\neq0$) o una proposición sin incógnita (si además $b=0$).


  ### Desarrollo didáctico


  Antes de aplicar cualquier método propio de ecuaciones cuadráticas (fórmula general, discriminante,
  etc.), conviene verificar que el coeficiente cuadrático realmente sea distinto de cero, incluso después
  de simplificar.


  En $0x^2+4x-8=0$, el coeficiente $a=0$ elimina el término cuadrático, dejando $4x-8=0$, que es lineal,
  no cuadrática.'
procedimiento:
- 'Paso 1: Identifica el coeficiente $a$ que acompaña al término $x^2$.'
- 'Paso 2: Verifica que $a$ sea distinto de cero, incluso tras simplificar la ecuación si es necesario.'
- 'Paso 3: Si $a=0$, trata la ecuación como de primer grado (o como una proposición sin incógnita), no
  como cuadrática.'
ejemplos:
- titulo: Verificación de la condición sobre a
  enunciado: ¿La ecuación $(k-2)x^2+3x-1=0$ es cuadrática para $k=2$?
  solucion_pasos:
  - Si $k=2$, el coeficiente de $x^2$ es $k-2=0$.
  - No es cuadrática para $k=2$; se reduce a una ecuación lineal.
- titulo: Determinación del valor excluido de un parámetro
  enunciado: ¿Para qué valor de $m$ deja de ser cuadrática la ecuación $(m+5)x^2-x+2=0$?
  solucion_pasos:
  - Se necesita que $m+5=0$.
  - Para $m=-5$, la ecuación deja de ser cuadrática.
- titulo: ¿Una ecuación con $a=0$ y $b=0$ puede seguir teniendo solución en $x$?
  enunciado: ¿Una ecuación con $a=0$ y $b=0$ puede seguir teniendo solución en $x$?
  respuesta: 'No'
  solucion_pasos:
  - Se reduce a una proposición del tipo $c=0$, que no depende de $x$ y no es una ecuación en la incógnita.
- titulo: ¿La condición $a \neq 0$ también aplica a $b$ y $c$?
  enunciado: ¿La condición $a \neq 0$ también aplica a $b$ y $c$?
  respuesta: 'No'
  solucion_pasos:
  - Los coeficientes $b$ y $c$ sí pueden valer cero sin afectar que la ecuación siga siendo cuadrática.
errores_frecuentes:
- Aplicar la fórmula general o el discriminante a una ecuación donde en realidad $a=0$ (por ejemplo, tras
  simplificar un parámetro).
- No verificar el valor de $a$ cuando depende de un parámetro literal.
- Confundir la condición sobre $a$ con una condición sobre $b$ o $c$.
- Asumir que toda ecuación escrita con "$x^2$" visible es automáticamente cuadrática, sin revisar el valor
  real del coeficiente.
