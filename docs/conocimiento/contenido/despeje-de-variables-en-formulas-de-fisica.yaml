  - Despeja sumandos enteros primero (transponiéndolos al lado opuesto).
- titulo: 'Respecto de «Despeje de variables en fórmulas de física»: ¿La siguiente formulación es corre'
  enunciado: 'Respecto de «Despeje de variables en fórmulas de física»: ¿La siguiente formulación es correcta?
    «En física, despejar bien es indispensable»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: En física, despejar bien es indispensable.'
- titulo: 'Respecto de «Despeje de variables en fórmulas de física»: ¿La siguiente conclusión es correc'
  enunciado: 'Respecto de «Despeje de variables en fórmulas de física»: ¿La siguiente conclusión es correcta?
    «Puede omitirse esta condición sin cambiar el resultado: «Identifica la variable objetivo»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En física, despejar bien es indispensable.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Identifica la variable objetivo».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Despeja sumandos enteros primero (transponiéndolos
  al lado opuesto)».'
- 'La definición sigue cumpliéndose aunque no se considere que en física, despejar bien es indispensable.
  Imagina la fórmula de movimiento rectilíneo: $V_f = V_i + a \cdot t$.'
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Revisa que las unidades tengan
  sentido».
- La comprobación del resultado vuelve innecesaria la condición «Identifica la variable objetivo».
