semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.FRACCIONES_EQUIVALENTES_CONCEPTO
titulo: Concepto de fracciones equivalentes
objetivo: Reconocer cuándo dos fracciones distintas representan la misma cantidad.
introduccion: Fracciones con numeradores y denominadores diferentes pueden representar exactamente la
  misma parte de un entero. Reconocer esa igualdad de valor, aunque cambie la escritura, es clave para
  comparar, simplificar y sumar fracciones.
resumen: Dos fracciones son equivalentes si representan el mismo número racional, aunque tengan numerador
  y denominador distintos.
explicacion: '### Definición formal


  Dos fracciones \(\frac{a}{b}\) y \(\frac{c}{d}\) (con \(b,d\neq0\)) son equivalentes si \(a\cdot d =
  b\cdot c\), es decir, si representan el mismo número racional.


  ### Desarrollo didáctico


  \(\frac{1}{2}=\frac{2}{4}=\frac{3}{6}\): en los tres casos se toma la mitad de un entero, solo cambia
  en cuántas partes se dividió. Multiplicando numerador y denominador de \(\frac{1}{2}\) por 2 se obtiene
  \(\frac{2}{4}\), y por 3 se obtiene \(\frac{3}{6}\); el valor no cambia porque se multiplica por \(1\)
  en la forma \(\frac{2}{2}\) o \(\frac{3}{3}\).'
procedimiento:
- 'Paso 1: Simplifica ambas fracciones o busca una transformación común.'
- 'Paso 2: Compara sus productos cruzados sin alterar los signos.'
- 'Paso 3: Declara equivalencia solo si representan exactamente el mismo valor.'
ejemplos:
- titulo: Aplicación razonada — Concepto de fracciones equivalentes
  enunciado: \(\frac{1}{2}=\frac{2}{4}=\frac{3}{6}\).
  solucion_pasos:
  - Simplifica ambas fracciones o busca una transformación común.
  - Compara sus productos cruzados sin alterar los signos.
  - Declara equivalencia solo si representan exactamente el mismo valor.
- titulo: Revisión de una solución — Concepto de fracciones equivalentes
  enunciado: Una solución aplica “Compara sus productos cruzados sin alterar los signos.”, pero termina
    sin comprobar que las fracciones equivalentes ocupan el mismo punto en la recta numérica. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define concepto de fracciones equivalentes: dos fracciones son equivalentes
    si representan la misma cantidad aunque tengan numerador y denominador distintos.'
  - Simplifica ambas fracciones o busca una transformación común.
  - 'Completa la revisión con este control: Declara equivalencia solo si representan exactamente el mismo
    valor.'
- titulo: ¿Se cumple que las fracciones equivalentes ocupan el mismo punto en la recta numérica? — Concepto
    de fracciones equivalentes
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que dos fracciones son equivalentes si representan la misma
    cantidad aunque tengan numerador y denominador distintos.
  - El caso “\(\frac{1}{2}=\frac{2}{4}=\frac{3}{6}\)” satisface esa condición.
  - Declara equivalencia solo si representan exactamente el mismo valor.
- titulo: ¿Es válido omitir el paso “Simplifica ambas fracciones o busca una transformación común”? —
    Concepto de fracciones equivalentes
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de concepto de fracciones equivalentes.
  - 'Omitirlo puede volver inválida la acción siguiente: Compara sus productos cruzados sin alterar los
    signos.'
  - 'La solución debe terminar de este modo: Declara equivalencia solo si representan exactamente el mismo
    valor.'
errores_frecuentes:
- 'Empezar concepto de fracciones equivalentes sin realizar este control inicial: Simplifica ambas fracciones
  o busca una transformación común.'
- Memorizar “\(\frac{1}{2}=\frac{2}{4}=\frac{3}{6}\)” como respuesta aislada, sin reconstruir la definición
  que lo justifica.
- Convertir en receta el paso “Compara sus productos cruzados sin alterar los signos.” y usarlo aunque
  cambien las condiciones del problema.
- Dar por válida una conclusión sobre concepto de fracciones equivalentes que contradice el criterio “Las
  fracciones equivalentes ocupan el mismo punto en la recta numérica”.
- 'Cerrar el ejercicio sin esta comprobación específica: Declara equivalencia solo si representan exactamente
  el mismo valor.'
