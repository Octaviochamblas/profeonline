semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.FRACCIONES_EQUIVALENTES_CONCEPTO
objetivo: Comprender concepto de fracciones equivalentes y aplicarlo correctamente
  en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso concepto de fracciones equivalentes ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Dos fracciones son equivalentes si representan la misma cantidad aunque tengan
  numerador y denominador distintos. Además, las fracciones equivalentes ocupan el
  mismo punto en la recta numérica.
explicacion: |-
  Dos fracciones son equivalentes si representan la misma cantidad aunque tengan numerador y denominador distintos.

  Una idea importante es que las fracciones equivalentes ocupan el mismo punto en la recta numérica.

  Por ejemplo, \(\frac{1}{2}=\frac{2}{4}=\frac{3}{6}\).
procedimiento:
- 'Paso 1: Elegir una estrategia conveniente: simplificar, amplificar, usar productos
  cruzados o un denominador común.'
- 'Paso 2: Ejecutar la comparación o transformación paso a paso, cuidando el valor
  de la fracción.'
- 'Paso 3: Interpretar el resultado y expresarlo con lenguaje matemático claro.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{1}{2}=\frac{2}{4}=\frac{3}{6}\).”
    se relaciona con concepto de fracciones equivalentes.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: dos fracciones son equivalentes si representan la
    misma cantidad aunque tengan numerador y denominador distintos.'
  - Concluye que el ejemplo sí ilustra concepto de fracciones equivalentes.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Las fracciones equivalentes ocupan el mismo
    punto en la recta numérica.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con concepto de fracciones equivalentes?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que las fracciones equivalentes ocupan el mismo
    punto en la recta numérica.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar concepto de fracciones equivalentes ignorando la definición
    o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar concepto de fracciones equivalentes sin mirar qué representan numerador,
  denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
