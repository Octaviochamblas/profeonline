semantic_id: MAT.NUM.LOGARITMOS_CONCEPTO.RESTRICCION_BASE_POSITIVA
titulo: Restricción de base positiva en un logaritmo
objetivo: Descartar logaritmos con base no positiva.
introduccion: No toda potencia con base negativa puede invertirse de manera continua en los reales. Por
  eso el logaritmo exige una base estrictamente positiva.
resumen: La base de un logaritmo real debe ser positiva. Una base negativa no produce una función exponencial
  real definida para todos los exponentes.
explicacion: 'La base de un logaritmo real debe ser positiva.


  Al analizar “\(\log_{-2}8\) no define un logaritmo real” conviene observar la conexión siguiente: una
  base negativa no produce una función exponencial real definida para todos los exponentes'
procedimiento:
- 'Paso 1: Identifica la base antes de calcular.'
- 'Paso 2: Impone la desigualdad \(b>0\).'
- 'Paso 3: Si la condición falla, declara que la expresión no está definida en \(\mathbb{R}\).'
ejemplos:
- titulo: Aplicación razonada — Restricción de base positiva en un logaritmo
  enunciado: \(\log_{-2}8\) no define un logaritmo real.
  solucion_pasos:
  - Identifica la base antes de calcular.
  - Impone la desigualdad \(b>0\).
  - Si la condición falla, declara que la expresión no está definida en \(\mathbb{R}\).
- titulo: Revisión de una solución — Restricción de base positiva en un logaritmo
  enunciado: Una solución aplica “Impone la desigualdad \(b>0\).”, pero termina sin comprobar que una
    base negativa no produce una función exponencial real definida para todos los exponentes. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define restricción de base positiva en un logaritmo: la base de un logaritmo
    real debe ser positiva.'
  - Identifica la base antes de calcular.
  - 'Completa la revisión con este control: Si la condición falla, declara que la expresión no está definida
    en \(\mathbb{R}\).'
- titulo: ¿Se cumple que una base negativa no produce una función exponencial real definida para todos
    los exponentes? — Restricción de base positiva en un logaritmo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la base de un logaritmo real debe ser positiva.
  - El caso “\(\log_{-2}8\) no define un logaritmo real” satisface esa condición.
  - Si la condición falla, declara que la expresión no está definida en \(\mathbb{R}\).
- titulo: ¿Es válido omitir el paso “Identifica la base antes de calcular”? — Restricción de base positiva
    en un logaritmo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de restricción de base positiva en un logaritmo.
  - 'Omitirlo puede volver inválida la acción siguiente: Impone la desigualdad \(b>0\).'
  - 'La solución debe terminar de este modo: Si la condición falla, declara que la expresión no está definida
    en \(\mathbb{R}\).'
errores_frecuentes:
- 'Confundir restricción de base positiva en un logaritmo con otro concepto y omitir este inicio: Identifica
  la base antes de calcular.'
- Aplicar mecánicamente “Impone la desigualdad \(b>0\).” sin revisar las condiciones de la definición.
- Tomar “\(\log_{-2}8\) no define un logaritmo real” como una igualdad aislada, sin explicar por qué es
  válida.
- Aceptar una respuesta que contradice la idea clave “una base negativa no produce una función exponencial
  real definida para todos los exponentes”.
- 'Terminar el desarrollo sin realizar este control: Si la condición falla, declara que la expresión no
  está definida en \(\mathbb{R}\).'
