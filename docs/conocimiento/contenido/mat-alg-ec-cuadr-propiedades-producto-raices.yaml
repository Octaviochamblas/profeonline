semantic_id: MAT.ALG.EC_CUADR_PROPIEDADES.PRODUCTO_RAICES
titulo: Cálculo del producto de las raíces mediante la relación c/a
objetivo: Calcular el producto de las raíces de una ecuación cuadrática usando la relación $c/a$, sin necesidad
  de resolver completamente la ecuación.
introduccion: Así como existe un atajo para la suma de las raíces, existe otro para su producto, que también se
  obtiene directamente de los coeficientes de la ecuación.
resumen: El **producto de las raíces** de $ax^2+bx+c=0$ está dado por $x_1 \cdot x_2=\dfrac{c}{a}$, sin necesidad
  de resolver explícitamente la ecuación.
explicacion: '### Definición formal


  Si $x_1$ y $x_2$ son las raíces de $ax^2+bx+c=0$ con $a\neq0$, entonces $x_1 \cdot x_2=\dfrac{c}{a}$. Esta relación
  se obtiene multiplicando las dos soluciones de la fórmula general, donde aparece una diferencia de cuadrados
  que involucra el discriminante.


  ### Desarrollo didáctico


  Junto con la suma de las raíces, esta propiedad permite reconstruir información sobre las soluciones sin resolver
  la ecuación, o verificar un par de soluciones ya encontradas.


  Para $x^2-7x+10=0$: $a=1$, $c=10$, por lo que $x_1 \cdot x_2=\dfrac{10}{1}=10$. En efecto, las raíces son $2$
  y $5$, y $2 \cdot 5=10$.'
procedimiento:
- 'Paso 1: Identifica los coeficientes $a$ y $c$ de la ecuación en forma general.'
- 'Paso 2: Calcula $\dfrac{c}{a}$.'
- 'Paso 3: Ese resultado es el producto de las dos raíces, sin necesidad de calcularlas individualmente.'
ejemplos:
- titulo: Cálculo directo del producto de raíces
  enunciado: 'Calcula el producto de las raíces de $x^2-5x+6=0$ sin resolver la ecuación.'
  solucion_pasos:
  - '$a=1$, $c=6$.'
  - '$x_1 \cdot x_2=\dfrac{6}{1}=6$.'
- titulo: Cálculo con coeficiente a distinto de 1
  enunciado: 'Calcula el producto de las raíces de $2x^2+6x-8=0$ sin resolver la ecuación.'
  solucion_pasos:
  - '$a=2$, $c=-8$.'
  - '$x_1 \cdot x_2=\dfrac{-8}{2}=-4$.'
- titulo: ¿El producto de las raíces depende del valor de $b$?
  enunciado: ¿El producto de las raíces depende del valor de $b$?
  respuesta: 'No'
  solucion_pasos:
  - La fórmula $c/a$ no involucra a $b$; el coeficiente lineal no afecta el producto de las raíces.
- titulo: ¿Un producto de raíces negativo implica que las raíces tienen signos opuestos?
  enunciado: ¿Un producto de raíces negativo implica que las raíces tienen signos opuestos?
  respuesta: Sí
  solucion_pasos:
  - Un producto negativo solo se obtiene multiplicando un número positivo por uno negativo.
errores_frecuentes:
- Confundir el producto de las raíces con la suma de las raíces.
- Usar el valor de $b$ en vez de $c$ al calcular el producto.
- Olvidar dividir por $a$ cuando $a\neq1$.
- Aplicar la fórmula a una ecuación que no está en su forma general, usando coeficientes incorrectos.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
