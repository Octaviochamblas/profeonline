semantic_id: MAT.ALG.FRACCIONES_BASE.SIGNO_FRACCION
titulo: El Signo de la Fracción (Global)
objetivo: Comprender la regla de los signos aplicada a la estructura general de una fracción.
introduccion: 'Una fracción tiene tres lugares donde puede llevar un signo negativo: arriba (numerador), abajo (denominador)
  o justo al frente (el signo de la fracción). ¿Cómo interactúan entre ellos? Con la vieja y confiable regla de
  los signos de la multiplicación.'
resumen: Toda fracción tiene tres signos (numerador, denominador y el de la fracción misma). Cambiar exactamente
  DOS de estos signos al mismo tiempo NO altera el valor de la fracción.
explicacion: '### Definición formal


  Menos entre menos da más, por lo que el valor global no se altera.


  ### Desarrollo didáctico


  Toda fracción posee tres posiciones donde se puede colocar un signo (positivo o negativo):

  1. El signo del Numerador.

  2. El signo del Denominador.

  3. El signo Global (delante de la línea fraccionaria).


  La regla de oro de los signos en fracciones dicta que **puedes cambiar dos signos simultáneamente** sin alterar
  el valor real de la fracción (porque menos por menos da más).


  Por ejemplo, la fracción $-\frac{A}{B}$ es exactamente igual a $\frac{-A}{B}$ (signo al numerador) y también es
  igual a $\frac{A}{-B}$ (signo al denominador).


  Sin embargo, por pura estética y convención matemática mundial, los matemáticos odian tener signos negativos en
  el denominador o colgando solos. El estándar de oro es **subir el signo negativo al numerador**, o **dejarlo justo
  al nivel de la línea de fracción**.'
procedimiento:
- 'Paso 1: Identifica el signo global de la fracción (frente a la línea fraccionaria).'
- 'Paso 2: Identifica el signo del numerador y el del denominador.'
- 'Paso 3: Para que la fracción siga valiendo lo mismo, solo puedes multiplicar por -1 (cambiar el signo) a DOS
  de esos tres elementos simultáneamente.'
ejemplos:
- titulo: Muestra dos formas alternativas de escribir $-\frac{x}{y}$
  enunciado: Muestra dos formas alternativas de escribir $-\frac{x}{y}$.
  solucion_pasos:
  - 'Cambiamos el global y el de arriba: $\frac{-x}{y}$.'
  - 'Cambiamos el global y el de abajo: $\frac{x}{-y}$.'
  - Ambas son completamente válidas.
- titulo: ¿Es $-\frac{-a}{-b}$ igual a $\frac{a}{b}$ o a $-\frac{a}{b}$?
  solucion_pasos:
  - 'Tres signos negativos: dos de ellos se cancelan (- / - = +), pero queda el tercero flotando al frente, así
    que es negativo.'
- titulo: 'Respecto de «Cambio de signo global de una fracción algebraica»: ¿Se ajusta a la definición'
  enunciado: 'Respecto de «Cambio de signo global de una fracción algebraica»: ¿Se ajusta a la definición esta afirmación?
    «Toda fracción tiene tres signos (numerador, denominador y el de la fracción misma)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Toda fracción tiene tres signos (numerador, denominador y
    el de la fracción misma).'
- titulo: 'Respecto de «Cambio de signo global de una fracción algebraica»: ¿Es compatible con el proce'
  enunciado: 'Respecto de «Cambio de signo global de una fracción algebraica»: ¿Es compatible con el procedimiento
    esta afirmación? «Creer que $-\frac{x}{y}$ es lo mismo que $\frac{-x}{-y}$ (en el primero hay un solo negativo,
    en el segundo hay dos que se vuelven positivo)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Toda fracción tiene tres signos (numerador, denominador y
    el de la fracción misma).'
errores_frecuentes:
- Creer que $-\frac{x}{y}$ es lo mismo que $\frac{-x}{-y}$ (en el primero hay un solo negativo, en el segundo hay
  dos que se vuelven positivo).
- Poner el signo negativo al numerador y además dejarlo al frente de la fracción doblemente.
- $-\frac{x}{y}$.
- Para «Si en la fracción $\frac{x}{y}$ cambiamos el signo del numerador y del denominador simultáneamente, obtenemos:»,
  la respuesta correcta es $\frac{y}{x}$.
- Para «Si en la fracción $\frac{x}{y}$ cambiamos el signo del numerador y del denominador simultáneamente, obtenemos:»,
  la respuesta correcta es 1.
estado: publicado
