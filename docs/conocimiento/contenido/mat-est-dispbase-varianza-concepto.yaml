semantic_id: MAT.EST.DISPERSION_BASE.VARIANZA_CONCEPTO
titulo: Definir la varianza como medida de dispersión
objetivo: Definir la varianza como una medida de dispersión basada en el promedio de las desviaciones al cuadrado respecto
  de la media.
introduccion: La varianza resume, en un solo número, qué tan lejos suelen estar los datos del promedio del grupo,
  elevando al cuadrado cada distancia para que no se cancelen entre sí.
resumen: La varianza es el promedio de los cuadrados de las desviaciones de cada dato respecto de la media aritmética
  del conjunto.
explicacion: '![Concepto de varianza](/static/img/estadistica/dispbase/dispbase-varianza-concepto.svg)


  ### Definición formal


  La varianza $\sigma^2$ se define como el promedio de los cuadrados de las desviaciones respecto de la media:

  $\sigma^2=\dfrac{\sum (x_i-\bar{x})^2}{n}$.


  ### Desarrollo didáctico


  Elevar al cuadrado cada desviación evita que las diferencias positivas y negativas se cancelen entre sí, permitiendo

  medir la dispersión total de forma efectiva.'
procedimiento:
- 'Paso 1: Calcula la media aritmética del conjunto de datos.'
- 'Paso 2: Calcula la desviación de cada dato respecto de la media y elévala al cuadrado.'
- 'Paso 3: Promedia todos esos cuadrados para obtener la varianza.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: ¿Por qué se elevan al cuadrado las desviaciones al calcular la varianza?
  solucion_pasos:
  - Porque la suma de las desviaciones simples siempre da cero.
  - Elevar al cuadrado evita esa cancelación y permite medir la dispersión real.
- titulo: Ejemplo 2
  enunciado: Si todos los datos de un conjunto son idénticos, ¿cuál es su varianza?
  solucion_pasos:
  - Todas las desviaciones respecto de la media serían cero.
  - Por lo tanto, la varianza sería cero.
- titulo: ¿La varianza usa el cuadrado de las desviaciones respecto de la media?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la base de su definición.
- titulo: ¿La varianza puede ser un valor negativo?
  respuesta: 'No'
  solucion_pasos:
  - 'No, al ser un promedio de cuadrados, siempre es mayor o igual a cero.'
errores_frecuentes:
- Olvidar elevar al cuadrado las desviaciones antes de promediarlas.
- Creer que la varianza puede tomar valores negativos.
- Confundir la varianza directamente con la desviación estándar.
- Pensar que la varianza se calcula sin necesidad de conocer la media.
- Sumar las desviaciones simples en vez de sus cuadrados.
fuente: 'Elaboración propia (referencia: Moraleja 238, 296).'
estado: publicado
