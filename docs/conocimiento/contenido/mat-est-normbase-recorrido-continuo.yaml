semantic_id: MAT.EST.NORMAL_BASE.RECORRIDO_CONTINUO
titulo: Interpretar el recorrido continuo de una variable aleatoria
objetivo: Interpretar el recorrido de una variable aleatoria continua como un intervalo de números reales, no como un
  conjunto de valores aislados.
introduccion: El recorrido de una variable continua no es una lista de números separados, sino un tramo completo de la
  recta numérica, sin espacios vacíos entre los valores.
resumen: El recorrido de una variable aleatoria continua corresponde a un intervalo de números reales, donde entre dos
  valores cualquiera siempre existe otro valor posible.
explicacion: '![Recorrido continuo](/static/img/estadistica/normbase/normbase-recorrido-continuo.svg)


  ### Definición formal


  El recorrido de una variable aleatoria continua es un intervalo (o unión de intervalos) de números reales, en el

  cual la variable puede tomar cualquier valor posible, sin espacios ni saltos entre ellos.


  ### Desarrollo didáctico


  Por ejemplo, el recorrido de las estaturas de un grupo de personas podría representarse como el intervalo real

  $[150, 195]$ cm, incluyendo todos los valores decimales posibles dentro de ese rango.'
procedimiento:
- 'Paso 1: Identifica el valor mínimo razonable de la variable continua.'
- 'Paso 2: Identifica el valor máximo razonable de la variable continua.'
- 'Paso 3: Expresa el recorrido como el intervalo real entre ambos valores.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si las estaturas de un grupo varían entre 150 y 195 cm, ¿cómo se expresa su recorrido?
  solucion_pasos:
  - Se expresa como el intervalo $[150, 195]$ cm.
  - Incluye todos los valores decimales posibles dentro de ese rango.
- titulo: Ejemplo 2
  enunciado: ¿Por qué el recorrido de una variable continua no se puede listar valor por valor?
  solucion_pasos:
  - Porque entre dos valores cualquiera siempre existe otro valor intermedio posible.
  - Por eso se expresa como un intervalo, no como una lista de valores.
- titulo: ¿El recorrido de una variable continua se expresa como un intervalo de números reales?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la forma correcta de expresarlo.
- titulo: ¿El recorrido de una variable continua se puede listar completamente valor por valor?
  respuesta: 'No'
  solucion_pasos:
  - 'No, porque contiene infinitos valores posibles dentro del intervalo.'
errores_frecuentes:
- Intentar listar todos los valores del recorrido de una variable continua.
- Confundir el recorrido con solo los valores extremos del intervalo.
- Creer que el recorrido de una variable continua siempre debe incluir números enteros únicamente.
- Pensar que el recorrido de una variable continua tiene "huecos" entre ciertos valores.
- Confundir el recorrido de la variable con el recorrido de la función de densidad.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
