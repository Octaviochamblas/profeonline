semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.SOLUCION_GRAFICA
titulo: La Solución como Intersección
objetivo: Entender que la solución del sistema es el punto geométrico donde las rectas chocan.
introduccion: Visualmente, esto no es más que **el punto de intersección (la intersección)** entre las dos rectas.
resumen: La solución gráfica de un sistema corresponde al punto de intersección de sus rectas; sus coordenadas satisfacen
  simultáneamente ambas ecuaciones.
explicacion: '### Definición formal


  La solución gráfica de un sistema corresponde al punto de intersección de sus rectas; sus coordenadas satisfacen
  simultáneamente ambas ecuaciones.


  ### Desarrollo didáctico


  Visualmente, esto no es más que **el punto de intersección (la intersección)** entre las dos rectas.

  El par ordenado $(x,y)$ que tanto te esforzaste en calcular algebraicamente usando Reducción o Sustitución, son
  exactamente las coordenadas espaciales donde las dos líneas se cruzan en tu dibujo.

  Es la fusión perfecta entre el álgebra y la geometría.'
procedimiento:
- Grafica la primera recta.
- Grafica la segunda recta en el mismo plano.
- Busca visualmente el punto exacto donde se cruzan (intersección).
- Lee las coordenadas (x,y) de ese punto. Esa es la solución de tu sistema.
