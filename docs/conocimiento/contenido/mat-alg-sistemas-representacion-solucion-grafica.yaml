    «Puede omitirse esta condición sin cambiar el resultado: «Grafica la primera recta»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La solución gráfica de un sistema corresponde al punto de
    intersección de sus rectas; sus coordenadas satisfacen simultáneamente ambas ecuaciones.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Grafica la primera recta».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Grafica la segunda recta en el mismo plano».'
- 'La definición sigue cumpliéndose aunque no se considere que si cada ecuación es una línea recta llena de puntos-solución,
  entonces resolver el sistema significa: ''Busca el único punto que pertenezca a ambas líneas al mismo tiempo''.'
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Lee las coordenadas (x,y) de ese punto.
