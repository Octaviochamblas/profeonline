semantic_id: 'MAT.ALG.SISTEMAS_REPRESENTACION.SOLUCION_GRAFICA'
titulo: 'La Solución como Intersección'
objetivo: |
  Entender que la solución del sistema es el punto geométrico donde las rectas chocan.
introduccion: |
  Si cada ecuación es una línea recta llena de puntos-solución, entonces resolver el sistema significa: 'Busca el único punto que pertenezca a ambas líneas al mismo tiempo'.
resumen: 'Este proceso es fundamental para encontrar la solución correcta.'
explicacion: |
  Visualmente, esto no es más que **el punto de intersección (la intersección)** entre las dos rectas.
  El par ordenado $(x,y)$ que tanto te esforzaste en calcular algebraicamente usando Reducción o Sustitución, son exactamente las coordenadas espaciales donde las dos líneas se cruzan en tu dibujo.
  Es la fusión perfecta entre el álgebra y la geometría.
procedimiento:
  - 'Paso 1: Grafica la primera recta.'
  - 'Paso 2: Grafica la segunda recta en el mismo plano.'
  - 'Paso 3: Busca visualmente el punto exacto donde se cruzan (intersección).'
  - 'Paso 4: Lee las coordenadas (x,y) de ese punto. Esa es la solución de tu sistema.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
