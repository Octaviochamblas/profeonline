semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.SOLUCION_GRAFICA
titulo: La Solución como Intersección
objetivo: Entender que la solución del sistema es el punto geométrico donde las rectas chocan.
explicacion: |
  Si cada ecuación es una línea recta llena de puntos-solución, entonces resolver el sistema significa: 'Busca el único punto que pertenezca a ambas líneas al mismo tiempo'.

  Visualmente, esto no es más que **el punto de choque (la intersección)** entre las dos rectas.
  El par ordenado $(x,y)$ que tanto te esforzaste en calcular algebraicamente usando Reducción o Sustitución, son exactamente las coordenadas espaciales donde las dos líneas se cruzan en tu dibujo.
  Es la fusión perfecta entre el álgebra y la geometría.
procedimiento: |
  1. Grafica la primera recta.
  2. Grafica la segunda recta en el mismo plano.
  3. Busca visualmente el punto exacto donde se cruzan (intersección).
  4. Lee las coordenadas (x,y) de ese punto. Esa es la solución de tu sistema.
