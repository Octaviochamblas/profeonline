semantic_id: MAT.ALG.FUNC_CUADR_GRAFICA.CONSTRUCCION_PUNTOS
titulo: Construcción de la gráfica de una función cuadrática a partir de puntos
objetivo: Construir la gráfica de una función cuadrática uniendo con una curva suave los puntos de una tabla de
  valores.
introduccion: Una vez calculados varios pares ordenados, el paso final es marcarlos en el plano cartesiano y unirlos
  con la curva suave y simétrica característica de toda parábola.
resumen: Construir la gráfica consiste en marcar los puntos $(x,f(x))$ de la tabla de valores en el plano cartesiano
  y unirlos con una curva suave, respetando la simetría de la parábola.
explicacion: '### Definición formal


  Dada una tabla de pares ordenados $(x_i,f(x_i))$ de una función cuadrática, la gráfica se construye marcando
  cada punto en el plano cartesiano y trazando la curva continua y suave que los une, extendiéndola más allá de
  los puntos calculados según la tendencia observada.


  ### Desarrollo didáctico


  Al trazar la curva, nunca se deben unir los puntos con segmentos rectos: la parábola es una curva suave sin
  esquinas, y el trazo debe reflejar esa suavidad, especialmente cerca del vértice.


  Con los puntos $(0,3)$, $(1,0)$, $(2,-1)$, $(3,0)$, $(4,3)$ de $f(x)=x^2-4x+3$: se marcan en el plano y se traza
  una curva suave en forma de "U" que pasa por todos ellos, con el vértice en $(2,-1)$.'
procedimiento:
- 'Paso 1: Marca cada punto $(x,f(x))$ de la tabla de valores en el plano cartesiano.'
- 'Paso 2: Identifica el punto más bajo o más alto entre los marcados (aproximación del vértice).'
- 'Paso 3: Traza una curva suave y continua que una todos los puntos, respetando la simetría de la parábola.'
ejemplos:
- titulo: Construcción de una parábola simple
  enunciado: 'Describe cómo se vería la gráfica de $f(x)=x^2$ con los puntos $(-2,4)$, $(-1,1)$, $(0,0)$, $(1,1)$,
    $(2,4)$.'
  solucion_pasos:
  - Los puntos forman una curva simétrica respecto al eje $y$.
  - La curva tiene forma de "U", con vértice en $(0,0)$, abriendo hacia arriba.
- titulo: Construcción de una parábola invertida
  enunciado: 'Describe cómo se vería la gráfica de $f(x)=-x^2+4$ con los puntos $(-2,0)$, $(-1,3)$, $(0,4)$, $(1,3)$,
    $(2,0)$.'
  solucion_pasos:
  - Los puntos forman una curva simétrica respecto al eje $y$.
  - La curva tiene forma de "U" invertida, con vértice en $(0,4)$, abriendo hacia abajo.
- titulo: ¿Se deben unir los puntos de la tabla con segmentos rectos?
  enunciado: ¿Se deben unir los puntos de la tabla con segmentos rectos?
  respuesta: 'No'
  solucion_pasos:
  - La parábola es una curva suave y continua; unir con segmentos rectos produciría una figura poligonal incorrecta.
- titulo: ¿La gráfica debe extenderse más allá de los puntos calculados en la tabla?
  enunciado: ¿La gráfica debe extenderse más allá de los puntos calculados en la tabla?
  respuesta: Sí
  solucion_pasos:
  - La función está definida para todo $x \in \mathbb{R}$, por lo que la curva continúa indefinidamente en ambas
    direcciones.
errores_frecuentes:
- Unir los puntos con líneas rectas en vez de una curva suave.
- Dibujar una curva asimétrica que no respeta la simetría propia de la parábola.
- Detener la gráfica exactamente en los últimos puntos calculados, sin sugerir su continuación.
- Ubicar incorrectamente el vértice al no observar cuál punto de la tabla es el más extremo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
