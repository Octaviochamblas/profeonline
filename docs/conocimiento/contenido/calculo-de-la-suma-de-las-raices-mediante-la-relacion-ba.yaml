semantic_id: MAT.ALG.EC_CUADR_PROPIEDADES.SUMA_RAICES
titulo: Cálculo de la suma de las raíces mediante la relación -b/a
objetivo: Calcular la suma de las raíces de una ecuación cuadrática usando la relación $-b/a$, sin necesidad
  de resolver completamente la ecuación.
introduccion: Existe un atajo para saber cuánto suman las dos soluciones de una ecuación cuadrática, sin
  tener que calcular cada una por separado.
resumen: La **suma de las raíces** de $ax^2+bx+c=0$ está dada por $x_1+x_2=-\dfrac{b}{a}$, sin necesidad
  de resolver explícitamente la ecuación.
explicacion: '### Definición formal


  Si $x_1$ y $x_2$ son las raíces de $ax^2+bx+c=0$ con $a\neq0$, entonces $x_1+x_2=-\dfrac{b}{a}$. Esta
  relación se obtiene sumando directamente las dos soluciones de la fórmula general, donde los términos
  con $\sqrt{\Delta}$ se cancelan.


  ### Desarrollo didáctico


  Esta propiedad permite verificar rápidamente un par de soluciones ya calculadas, o encontrar la suma
  sin resolver la ecuación, simplemente leyendo los coeficientes $a$ y $b$.


  Para $x^2-7x+10=0$: $a=1$, $b=-7$, por lo que $x_1+x_2=-\dfrac{-7}{1}=7$. En efecto, las raíces son
  $2$ y $5$, y $2+5=7$.'
procedimiento:
- 'Paso 1: Identifica los coeficientes $a$ y $b$ de la ecuación en forma general.'
- 'Paso 2: Calcula $-\dfrac{b}{a}$.'
- 'Paso 3: Ese resultado es la suma de las dos raíces, sin necesidad de calcularlas individualmente.'
ejemplos:
- titulo: Cálculo directo de la suma de raíces
  enunciado: Calcula la suma de las raíces de $x^2-5x+6=0$ sin resolver la ecuación.
  solucion_pasos:
  - $a=1$, $b=-5$.
  - $x_1+x_2=-\dfrac{-5}{1}=5$.
- titulo: Cálculo con coeficiente a distinto de 1
  enunciado: Calcula la suma de las raíces de $2x^2+6x-8=0$ sin resolver la ecuación.
  solucion_pasos:
  - $a=2$, $b=6$.
  - $x_1+x_2=-\dfrac{6}{2}=-3$.
- titulo: ¿Se necesita resolver la ecuación para calcular la suma de sus raíces?
  enunciado: ¿Se necesita resolver la ecuación para calcular la suma de sus raíces?
  respuesta: 'No'
  solucion_pasos:
  - Basta con conocer los coeficientes $a$ y $b$, sin necesidad de aplicar la fórmula general completa.
- titulo: ¿La suma de las raíces depende del valor de $c$?
  enunciado: ¿La suma de las raíces depende del valor de $c$?
  respuesta: 'No'
  solucion_pasos:
  - La fórmula $-b/a$ no involucra a $c$; el término independiente no afecta la suma de las raíces.
errores_frecuentes:
- Olvidar el signo negativo en la fórmula $-b/a$.
- Confundir la suma de las raíces con el producto de las raíces.
- Usar el valor de $c$ en vez de $b$ al calcular la suma.
- Aplicar la fórmula a una ecuación que no está en su forma general, usando coeficientes incorrectos.
