semantic_id: MAT.ALG.TRIG_CIRCULO_ANGULOS.PUNTO_CIRCULO
titulo: El punto asociado a cada ángulo en el círculo unitario
objetivo: Reconocer que cada ángulo $\theta$ determina un único punto $(x,y)$ sobre el círculo unitario.
introduccion: Girar el lado terminal de un ángulo alrededor del origen siempre termina en un punto específico
  sobre la circunferencia de radio $1$.
resumen: Para cada ángulo $\theta$ en posición estándar, el lado terminal corta al círculo unitario en un
  **único punto** $(x,y)$, que es la base para definir las funciones trigonométricas de $\theta$.
explicacion: '### Definición formal


  Dado un ángulo $\theta$ con vértice en el origen y lado inicial sobre el semieje positivo $x$, el lado
  terminal interseca al círculo unitario en exactamente un punto $(x,y)$ que satisface $x^2+y^2=1$. Esta
  correspondencia entre ángulo y punto es la base de toda la trigonometría del círculo unitario.


  ### Desarrollo didáctico


  Para $\theta=0°$, el lado terminal coincide con el lado inicial, y el punto asociado es $(1,0)$. Para
  $\theta=180°$, el lado terminal apunta en dirección opuesta, y el punto asociado es $(-1,0)$.'
procedimiento:
- 'Paso 1: Ubica el lado terminal del ángulo $\theta$ girando desde el semieje positivo $x$.'
- 'Paso 2: Identifica el punto donde el lado terminal corta al círculo unitario.'
- 'Paso 3: Verifica que las coordenadas del punto cumplan $x^2+y^2=1$.'
ejemplos:
- titulo: Identificación del punto para $\theta=90°$
  enunciado: '¿Cuál es el punto del círculo unitario asociado a $\theta=90°$?'
  solucion_pasos:
  - El lado terminal apunta en la dirección del semieje positivo $y$.
  - 'El punto asociado es $(0,1)$.'
- titulo: Identificación del punto para $\theta=270°$
  enunciado: '¿Cuál es el punto del círculo unitario asociado a $\theta=270°$?'
  solucion_pasos:
  - El lado terminal apunta en la dirección del semieje negativo $y$.
  - 'El punto asociado es $(0,-1)$.'
- titulo: ¿Cada ángulo determina un único punto en el círculo unitario?
  enunciado: ¿Cada ángulo en posición estándar determina exactamente un punto sobre el círculo unitario?
  respuesta: Sí
  solucion_pasos:
  - El lado terminal solo puede cortar al círculo en un único punto para cada dirección específica.
- titulo: ¿Un mismo punto del círculo unitario puede corresponder a más de un ángulo?
  enunciado: ¿Puede un mismo punto del círculo unitario corresponder a más de un valor de ángulo?
  respuesta: Sí
  solucion_pasos:
  - Ángulos coterminales, que difieren en múltiplos de $360°$, corresponden al mismo punto.
errores_frecuentes:
- Suponer que el punto asociado a un ángulo depende de algo más que la dirección del lado terminal.
- No verificar que las coordenadas obtenidas cumplan la ecuación del círculo unitario.
- Confundir el punto asociado a un ángulo con las coordenadas de otro ángulo cercano.
- Olvidar que ángulos coterminales comparten el mismo punto en el círculo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
