semantic_id: MAT.ALG.INECUACIONES_LINEALES.DEFINICION
title: Definición de Inecuación Lineal
description: |-
  Comprender y modelar situaciones mediante inecuaciones lineales, reconociendo su estructura y representación.
content:
  introduccion: |-
    Muchas situaciones de la vida real no representan igualdades exactas, sino límites o condiciones.
  resumen: |-
    Una inecuación lineal es una desigualdad matemática con una o más incógnitas.
  explicacion: "### Definición formal\nUna inecuación lineal en una variable $x$ es\
    \ una expresión matemática que se puede reducir a una de las siguientes formas:\
    \ $ax + b < 0$, $ax + b \\le 0$, $ax + b > 0$, o $ax + b \\ge 0$, donde $a$ y\
    \ $b$ son números reales y $a \neq 0$.\n\n### Desarrollo didáctico\nResolver una\
    \ inecuación consiste en encontrar todos los valores de $x$ que hacen que la desigualdad\
    \ sea verdadera. A diferencia de las ecuaciones lineales, que usualmente tienen\
    \ una única solución, las inecuaciones lineales tienen como solución un conjunto\
    \ de valores, frecuentemente representado como un intervalo en la recta numérica."
  pasos:
  - |-
    Identificar la variable y los coeficientes involucrados en la desigualdad matemática.
  - |-
    Agrupar los términos con la variable en un lado de la desigualdad y los términos constantes en el otro.
  - |-
    Despejar la variable multiplicando o dividiendo. Recordar que al multiplicar o dividir por un número negativo, el sentido de la desigualdad debe invertirse.
  ejemplos_resueltos:
  - tipo: abierto
    titulo: Modelado de una restricción de presupuesto
    enunciado: |-
      Un estudiante tiene $\$5000$ para gastar en cuadernos que cuestan $\$800$ cada uno. Escriba y resuelva la inecuación que representa la cantidad máxima de cuadernos que puede comprar.
    pasos:
    - Sea $x$ la cantidad de cuadernos.
    - |-
      El costo total es $800x$. Este costo no puede superar los $\$5000$, por lo que $800x \le 5000$.
    - 'Dividimos por $800$: $x \le \frac{5000}{800} = 6.25$.'
    - |-
      Como $x$ debe ser un número entero, la cantidad máxima de cuadernos es $6$.
  - tipo: abierto
    titulo: Resolución de una inecuación simple
    enunciado: Resuelva la inecuación $3x - 5 > 10$.
    pasos:
    - 'Sumamos $5$ a ambos lados: $3x > 15$.'
    - |-
      Dividimos por $3$ ambos lados (como es positivo, la desigualdad se mantiene): $x > 5$.
    - La solución es el intervalo $(5, \infty)$.
  - tipo: verdadero_falso
    titulo: ¿Es $x=4$ solución de la inecuación $2x + 1 < 9$?
    afirmacion: ¿Es $x=4$ solución de la inecuación $2x + 1 < 9$?
    respuesta: false
    explicacion: |-
      Sustituimos $x = 4$ en la expresión: $2(4) + 1$.
      Calculamos el resultado: $8 + 1 = 9$.
      Evaluamos la desigualdad: $9 < 9$ es una proposición falsa. Por lo tanto, $x=4$ no es solución.
  - tipo: verdadero_falso
    titulo: ¿El intervalo $[-2, \infty)$ es la solución de $-x \le 2$?
    afirmacion: ¿El intervalo $[-2, \infty)$ es la solución de $-x \le 2$?
    respuesta: true
    explicacion: |-
      Partimos de la inecuación $-x \le 2$.
      Multiplicamos por $-1$ a ambos lados. Esto invierte el sentido de la desigualdad.
      Obtenemos $x \ge -2$.
      En notación de intervalo, todos los números mayores o iguales a $-2$ se representan como $[-2, \infty)$.
  errores_frecuentes:
  - descripcion: |-
      Creer que al multiplicar o dividir ambos lados por un número negativo la dirección de la desigualdad se mantiene inalterada.
  - descripcion: |-
      Confundir los símbolos de menor estricto ($<$) con menor o igual ($\le$) al interpretar resultados o escribir intervalos.
  - descripcion: |-
      Pensar que una inecuación lineal siempre tiene una única solución igual que una ecuación lineal.
  - descripcion: |-
      Asumir que si $x > a$ y $x > b$, la solución es el intervalo entre $a$ y $b$.
  - descripcion: |-
      Afirmar que $0x > 5$ tiene solución, en lugar de reconocer que es un conjunto vacío.
