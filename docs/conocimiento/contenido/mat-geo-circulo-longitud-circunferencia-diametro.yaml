semantic_id: MAT.GEO.CIRCULO_METRICA.LONGITUD_CIRCUNFERENCIA_DIAMETRO
titulo: Cálculo de la longitud de la circunferencia usando πd
objetivo: Calcular la longitud de una circunferencia a partir de su diámetro, usando la fórmula πd.
introduccion: Existe una forma alternativa y equivalente de calcular la longitud de una circunferencia,
  usando directamente el diámetro en vez del radio.
resumen: La longitud de una circunferencia de diámetro $d$ es $L=\pi d$.
explicacion: '![Longitud de la circunferencia: πd](/static/img/geometria/circunferencia-circulo/circulo-longitud-circunferencia-diametro.svg)


  ### Definición formal


  La longitud de una circunferencia de diámetro $d$ es $L=\pi d$. Esta fórmula es equivalente a $L=2\pi
  r$, ya que $d=2r$.


  ### Desarrollo didáctico


  Una circunferencia de diámetro 14 cm tiene longitud $L=\pi\times14\approx43,98$ cm. Históricamente,
  esta es la definición original de π: la razón constante entre la longitud de cualquier circunferencia
  y su diámetro ($\pi=L/d$).'
procedimiento:
- 'Paso 1: Identifica el diámetro d de la circunferencia.'
- 'Paso 2: Multiplica el diámetro por π (usando 3,14 o 3,1416 como aproximación).'
- 'Paso 3: Ese resultado es la longitud de la circunferencia.'
ejemplos:
- titulo: Calcular la longitud con diámetro conocido
  enunciado: Una circunferencia tiene diámetro 14 cm.
  solucion_pasos:
  - L=π×14≈43,98 cm.
- titulo: Calcular el diámetro a partir de la longitud
  enunciado: Una circunferencia tiene longitud 31,4 cm (aproximada).
  solucion_pasos:
  - d=31,4/π≈31,4/3,14=10 cm.
- titulo: ¿Esta fórmula es equivalente a 2πr?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que d=2r, por lo tanto πd=π(2r)=2πr.
- titulo: ¿π se define originalmente como la razón entre longitud y diámetro?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la definición histórica y original de la constante π.
errores_frecuentes:
- Usar el radio en vez del diámetro sin ajustar la fórmula (aplicar πr en vez de πd).
- Confundir esta fórmula con la del área del círculo.
- Olvidar que d=2r al intentar convertir entre ambas versiones de la fórmula.
fuente: 'Fuente: Moraleja 73, Cid 32, 248.'
estado: publicado
