semantic_id: MAT.FUND.PRODUCTO_CARTESIANO.PRODUCTO_CARTESIANO_DEFINICION
titulo: DefiniciГіn de producto cartesiano
objetivo: 'Comprender la definiciГіn formal del producto cartesiano $A \times B$, construir

  el conjunto resultado dado dos conjuntos, y reconocer que el orden de los conjuntos

  importa: $A \times B \neq B \times A$ en general.

  '
introduccion: 'Dados dos conjuntos $A$ y $B$, podemos construir un nuevo conjunto cuyos elementos

  son **todos los pares ordenados posibles** formados tomando un elemento de $A$

  como primera coordenada y un elemento de $B$ como segunda coordenada.

  Este nuevo conjunto se llama **producto cartesiano** de $A$ y $B$, escrito $A \times B$.

  Su nombre honra a RenГ© Descartes, quien vinculГі ГЎlgebra y geometrГӯa mediante el plano cartesiano.

  '
resumen: 'El **producto cartesiano** de dos conjuntos $A$ y $B$ se define como:

  $$A \times B = \{(a, b) \mid a \in A \text{ y } b \in B\}$$

  - Todo elemento de $A \times B$ es un par ordenado $(a, b)$.

  - La primera coordenada pertenece a $A$; la segunda, a $B$.

  - En general, $A \times B \neq B \times A$ (el orden de los conjuntos importa).

  - Si $A$ o $B$ es vacГӯo, entonces $A \times B = \emptyset$.

  '
explicacion: 'Para construir $A \times B$ se toma cada elemento de $A$ y se lo empareja con

  cada elemento de $B$, generando un par ordenado por cada combinaciГіn.


  **NotaciГіn formal:**

  $$A \times B = \{(a, b) \mid a \in A,\; b \in B\}$$


  **ВҝPor quГ© $A \times B \neq B \times A$ en general?**

  Los elementos de $A \times B$ tienen primera coordenada en $A$;

  los de $B \times A$ tienen primera coordenada en $B$.

  Si $A \neq B$, estos conjuntos de pares difieren.


  **Caso especial:** si $A = B$, se escribe $A^2 = A \times A$.

  El plano cartesiano es $\mathbb{R}^2 = \mathbb{R} \times \mathbb{R}$.

  '
procedimiento: 'Para construir $A \times B$ explГӯcitamente:

  1. Listar todos los elementos de $A$ (en cualquier orden).

  2. Para cada elemento $a \in A$, formar el par $(a, b)$ con cada $b \in B$.

  3. Reunir todos los pares generados en un conjunto (entre llaves).

  4. Verificar que la cantidad total de pares sea $|A| \times |B|$.

  '
ejemplos:
- tipo: A
  titulo: Construir $A \times B$ con $A = \{1, 2\}$ y $B = \{x, y\}$
  enunciado: 'Dados $A = \{1, 2\}$ y $B = \{x, y\}$, escribe explГӯcitamente todos los

    elementos de $A \times B$.

    '
  solucion_pasos: "Paso 1 вҖ” Elemento $1 \\in A$, emparejado con cada elemento de $B$:\n  $(1, x)$ y $(1,\
    \ y)$\n\nPaso 2 вҖ” Elemento $2 \\in A$, emparejado con cada elemento de $B$:\n  $(2, x)$ y $(2, y)$\n\
    \nPaso 3 вҖ” Reunir todos los pares:\n  $A \\times B = \\{(1, x),\\, (1, y),\\, (2, x),\\, (2, y)\\\
    }$\n\nVerificaciГіn: $|A| \\times |B| = 2 \\times 2 = 4$ pares вң“\n"
- tipo: A
  titulo: Construir $A \times B$ con $A = \{a, b\}$ y $B = \{1, 2, 3\}$
  enunciado: 'Dados $A = \{a, b\}$ y $B = \{1, 2, 3\}$, escribe explГӯcitamente todos los

    elementos de $A \times B$.

    '
  solucion_pasos: "Paso 1 вҖ” Elemento $a \\in A$, emparejado con cada elemento de $B$:\n  $(a, 1)$, $(a,\
    \ 2)$, $(a, 3)$\n\nPaso 2 вҖ” Elemento $b \\in A$, emparejado con cada elemento de $B$:\n  $(b, 1)$,\
    \ $(b, 2)$, $(b, 3)$\n\nPaso 3 вҖ” Reunir todos los pares:\n  $A \\times B = \\{(a,1),\\, (a,2),\\,\
    \ (a,3),\\, (b,1),\\, (b,2),\\, (b,3)\\}$\n\nVerificaciГіn: $|A| \\times |B| = 2 \\times 3 = 6$ pares\
    \ вң“\n"
- tipo: B
  titulo: ВҝEs siempre cierto que $A \times B = B \times A$?
  respuesta: 'No'
  solucion_pasos: "Contraejemplo: $A = \\{1\\}$ y $B = \\{2\\}$.\n  $A \\times B = \\{(1, 2)\\}$\n  $B\
    \ \\times A = \\{(2, 1)\\}$\n  $(1, 2) \\neq (2, 1)$ porque $1 \\neq 2$.\n\nPor tanto $A \\times B\
    \ \\neq B \\times A$ cuando $A \\neq B$.\nLa igualdad solo se cumple si $A = B$ o si alguno es vacГӯo.\n\
    \nLa respuesta es **No**.\n"
- tipo: B
  titulo: ВҝTodo elemento de $A \times B$ es un par ordenado cuya primera componente pertenece a $A$?
  respuesta: SГӯ
  solucion_pasos: 'Por definiciГіn, $A \times B = \{(a, b) \mid a \in A \text{ y } b \in B\}$.

    Todo elemento del conjunto tiene la forma $(a, b)$ donde $a \in A$.


    No puede existir un elemento de $A \times B$ cuya primera coordenada

    no pertenezca a $A$; eso violarГӯa la definiciГіn.


    La respuesta es **SГӯ**.

    '
errores_frecuentes:
- error: Confundir $A \times B$ con $B \times A$
  descripcion: 'Pensar que el orden de los conjuntos no importa, igual que en una multiplicaciГіn

    de nГәmeros donde $a \times b = b \times a$.

    '
  correccion: 'En el producto cartesiano el orden sГӯ importa: la primera coordenada viene de

    el primer conjunto y la segunda del segundo. En general $A \times B \neq B \times A$.

    '
- error: Incluir pares con la primera coordenada de $B$ en $A \times B$
  descripcion: 'Al construir $A \times B$ con $A = \{1, 2\}$ y $B = \{x, y\}$, incluir

    $(x, 1)$ o $(y, 2)$ como elementos de $A \times B$.

    '
  correccion: 'En $A \times B$ la primera coordenada siempre pertenece a $A$ y la segunda a $B$.

    $(x, 1)$ pertenecerГӯa a $B \times A$, no a $A \times B$.

    '
- error: Omitir alguna combinaciГіn al listar $A \times B$
  descripcion: 'Con $A = \{a, b\}$ y $B = \{1, 2, 3\}$, olvidar algГәn par como $(b, 2)$.

    '
  correccion: 'Trabajar sistemГЎticamente: para cada elemento de $A$, emparejarlo con

    **todos** los elementos de $B$ antes de pasar al siguiente.

    '
- error: Escribir $A \times B$ como un conjunto de elementos sueltos
  descripcion: 'Escribir $A \times B = \{1, 2, x, y\}$ en lugar de $\{(1,x),(1,y),(2,x),(2,y)\}$.

    '
  correccion: 'Los elementos de $A \times B$ son pares ordenados, siempre encerrados en parГ©ntesis.

    El conjunto usa llaves, pero cada elemento es un par.

    '
- error: Confundir el producto cartesiano con la uniГіn o intersecciГіn
  descripcion: 'Pensar que $A \times B = A \cup B$ o que contiene elementos de $A$ y $B$ directamente.

    '
  correccion: '$A \times B$ no contiene elementos de $A$ ni de $B$ directamente, sino

    pares ordenados construidos a partir de ellos.

    '
