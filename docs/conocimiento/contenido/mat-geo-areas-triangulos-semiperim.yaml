semantic_id: MAT.GEO.AREAS_TRIANGULOS.SEMIPERIM
titulo: 'Cálculo del semiperímetro de un triángulo: s = (a + b + c) / 2'
objetivo: Calcular el semiperímetro de un triángulo como paso previo necesario para aplicar la fórmula
  de Herón.
introduccion: 'Antes de poder calcular el área de un triángulo cuando solo se conocen sus tres lados (sin
  base ni altura directas), es necesario calcular un valor intermedio: el semiperímetro.'
resumen: 'El semiperímetro de un triángulo es la mitad de su perímetro: $s=\frac{a+b+c}{2}$.'
explicacion: '![Semiperímetro de un triángulo](/static/img/geometria/areas-pitagoras/areas-triangulos-semiperim.svg)


  ### Definición formal


  Si un triángulo tiene lados $a$, $b$ y $c$, su semiperímetro es $s=\frac{a+b+c}{2}$.


  ### Desarrollo didáctico


  Un triángulo de lados 5, 6 y 7 tiene semiperímetro $s=\frac{5+6+7}{2}=\frac{18}{2}=9$. Este valor será
  fundamental en la fórmula de Herón, estudiada a continuación.'
procedimiento:
- 'Paso 1: Suma los tres lados del triángulo.'
- 'Paso 2: Divide esa suma entre 2.'
- 'Paso 3: Ese resultado es el semiperímetro.'
ejemplos:
- titulo: Calcular con lados 5, 6 y 7
  enunciado: Un triángulo tiene lados 5, 6 y 7.
  solucion_pasos:
  - s=(5+6+7)/2=9.
- titulo: Calcular con lados 8, 9 y 10
  enunciado: Un triángulo tiene lados 8, 9 y 10.
  solucion_pasos:
  - s=(8+9+10)/2=13,5.
- titulo: ¿El semiperímetro es la mitad del perímetro?
  respuesta: Sí
  solucion_pasos:
  - Sí, es literalmente la mitad del perímetro total.
- titulo: ¿El semiperímetro por sí solo es el área del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, es solo un paso intermedio, usado junto con los lados en la fórmula de Herón.
errores_frecuentes:
- Olvidar dividir entre 2 después de sumar los tres lados.
- Confundir el semiperímetro con el área directamente.
- Sumar mal alguno de los tres lados.
fuente: Elaboración propia.
estado: publicado
