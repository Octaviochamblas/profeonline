semantic_id: MAT.GEO.RELACIONES_TR.CATETO_MEDIA_GEOMETRICA
titulo: 'Propiedad: cada cateto es media geométrica entre la hipotenusa y su proyección sobre ella'
objetivo: 'Aplicar la primera relación métrica de Euclides: cada cateto es media geométrica entre la hipotenusa
  completa y la proyección de ese mismo cateto.'
introduccion: 'Gracias a la semejanza entre los triángulos formados por la altura sobre la hipotenusa,
  existe una relación exacta entre cada cateto, la hipotenusa y su proyección: el cateto es la media geométrica
  de esos dos valores.'
resumen: En un triángulo rectángulo, cada cateto es media geométrica entre la hipotenusa y la proyección
  de ese cateto sobre ella.
explicacion: '![Cateto como media geométrica](/static/img/geometria/areas-pitagoras/relaciones-tr-cateto-media-geometrica.svg)


  ### Definición formal


  Si $c$ es la hipotenusa y $m$ es la proyección del cateto $b$ sobre ella, entonces $b^2=c\cdot m$ (equivalentemente,
  $b=\sqrt{c\cdot m}$).


  ### Desarrollo didáctico


  Si la hipotenusa mide 25 y la proyección de un cateto es 9, ese cateto mide $b=\sqrt{25\cdot9}=\sqrt{225}=15$.'
procedimiento:
- 'Paso 1: Identifica la hipotenusa y la proyección del cateto que buscas.'
- 'Paso 2: Multiplica la hipotenusa por esa proyección.'
- 'Paso 3: Calcula la raíz cuadrada de ese producto: ese es el cateto buscado.'
ejemplos:
- titulo: Calcular un cateto con esta relación
  enunciado: La hipotenusa mide 20 y la proyección de un cateto es 4.
  solucion_pasos:
  - b=√(20×4)=√80=4√5.
- titulo: Verificar con la terna 3-4-5
  enunciado: En un triángulo rectángulo 3-4-5, la proyección del cateto 4 sobre la hipotenusa 5 es 3,2.
  solucion_pasos:
  - 'Se verifica: 4²=16, y 5×3,2=16. Se cumple la relación.'
- titulo: ¿Esta relación aplica a cualquier triángulo rectángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad general del triángulo rectángulo.
- titulo: ¿Se usa la proyección del MISMO cateto que se calcula?
  respuesta: Sí
  solucion_pasos:
  - Sí, cada cateto se relaciona con su propia proyección, no con la del otro cateto.
errores_frecuentes:
- Usar la proyección del otro cateto en vez de la propia.
- Olvidar la raíz cuadrada final, dejando el resultado como el cuadrado del cateto.
- Confundir esta relación con el propio teorema de Pitágoras.
fuente: Elaboración propia.
estado: publicado
