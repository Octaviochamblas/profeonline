semantic_id: MAT.ALG.RELACION_EXP_LOG.COMPOSICION_EXP_LOG
titulo: Composición $b^{\log_b(x)}=x$
objetivo: Aplicar la propiedad $b^{\log_b(x)}=x$ para simplificar expresiones donde una exponencial actúa sobre
  un logaritmo de igual base.
introduccion: Cuando la base de una potencia coincide con la base del logaritmo que tiene en el exponente, ambas
  operaciones se cancelan directamente.
resumen: Para $b>0$, $b\neq1$ y $x>0$, se cumple $b^{\log_b(x)}=x$, porque la función exponencial deshace
  exactamente lo que hace la función logarítmica de igual base.
explicacion: '### Definición formal


  Si $f(x)=\log_b(x)$ y $g(x)=b^x$ son funciones inversas, entonces $g(f(x))=x$ para todo $x>0$. Esto se escribe
  como $b^{\log_b(x)}=x$, válido para cualquier $x$ en el dominio del logaritmo.


  ### Desarrollo didáctico


  $3^{\log_3(7)}=7$: el exponente $\log_3(7)$ es exactamente el valor al que hay que elevar $3$ para obtener
  $7$, así que al elevarlo se recupera $7$ directamente, sin necesidad de calcular el logaritmo numéricamente.'
procedimiento:
- 'Paso 1: Verifica que la base de la potencia y la base del logaritmo del exponente sean iguales.'
- 'Paso 2: Si coinciden, el resultado es directamente el argumento del logaritmo.'
- 'Paso 3: Si no coinciden, no se puede aplicar esta simplificación directa.'
ejemplos:
- titulo: Aplicación directa con bases iguales
  enunciado: 'Simplifica $5^{\log_5(12)}$.'
  solucion_pasos:
  - Se verifica que ambas bases coinciden ($5$).
  - 'El resultado es directamente el argumento del logaritmo: $12$.'
- titulo: Aplicación en una expresión algebraica
  enunciado: 'Simplifica $2^{\log_2(x+1)}$ para $x>-1$.'
  solucion_pasos:
  - Se verifica que ambas bases coinciden ($2$).
  - 'El resultado es directamente el argumento: $x+1$.'
- titulo: ¿Se cumple $b^{\log_b(x)}=x$ para cualquier $x>0$?
  enunciado: ¿La propiedad $b^{\log_b(x)}=x$ es válida para cualquier valor de $x$ dentro del dominio del
    logaritmo?
  respuesta: Sí
  solucion_pasos:
  - Se cumple para todo $x>0$, siempre que $b>0$ y $b\neq1$.
- titulo: ¿Se puede simplificar $4^{\log_2(x)}$ usando esta propiedad directamente?
  enunciado: ¿Es posible aplicar $b^{\log_b(x)}=x$ directamente a $4^{\log_2(x)}$?
  respuesta: 'No'
  solucion_pasos:
  - Las bases no coinciden ($4$ y $2$), así que la simplificación directa no aplica sin transformar antes la expresión.
errores_frecuentes:
- Aplicar la propiedad cuando la base de la potencia y del logaritmo no son iguales.
- Confundir $b^{\log_b(x)}=x$ con $\log_b(b^x)=x$, que tiene las operaciones en orden inverso.
- Olvidar que $x$ debe ser positivo para que el logaritmo esté definido.
- No verificar que la base cumpla $b>0$, $b\neq1$ antes de simplificar.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
