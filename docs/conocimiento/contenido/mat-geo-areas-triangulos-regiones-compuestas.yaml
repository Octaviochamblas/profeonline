semantic_id: MAT.GEO.AREAS_TRIANGULOS.AREA_REGIONES_COMPUESTAS
titulo: Cálculo del área de regiones compuestas mediante suma o resta de triángulos
objetivo: Calcular el área de figuras compuestas descomponiéndolas en triángulos que se suman o se restan
  entre sí.
introduccion: Muchas figuras irregulares no tienen una fórmula directa de área, pero pueden descomponerse
  en triángulos (u otras figuras simples) cuya área sí se sabe calcular.
resumen: El área de una región compuesta se calcula sumando o restando las áreas de los triángulos (u
  otras figuras) en que puede descomponerse.
explicacion: '![Área de regiones compuestas por triángulos](/static/img/geometria/areas-pitagoras/areas-triangulos-regiones-compuestas.svg)


  ### Definición formal


  Si una región compuesta se forma sumando triángulos, su área total es la suma de las áreas individuales;
  si se forma restando (una región recortada de otra), su área es la diferencia entre el área mayor y
  la del recorte.


  ### Desarrollo didáctico


  Un triángulo grande de área 90 cm² con un triángulo recortado de área 20 cm² en su interior tiene una
  región compuesta de área 90−20=70 cm². Si en cambio dos triángulos de 15 cm² y 25 cm² se unen sin superposición,
  su área compuesta total es 15+25=40 cm².'
procedimiento:
- 'Paso 1: Identifica cómo se forma la región compuesta (por suma o por resta de triángulos).'
- 'Paso 2: Calcula el área de cada triángulo involucrado por separado.'
- 'Paso 3: Suma o resta esas áreas según corresponda para obtener el área total.'
ejemplos:
- titulo: Restar un triángulo recortado
  enunciado: Un triángulo de área 90 cm² tiene un triángulo recortado de área 20 cm².
  solucion_pasos:
  - Área compuesta = 90 − 20 = 70 cm².
- titulo: Sumar dos triángulos adyacentes
  enunciado: Dos triángulos de áreas 15 cm² y 25 cm² se unen sin superposición.
  solucion_pasos:
  - Área compuesta = 15 + 25 = 40 cm².
- titulo: ¿Siempre se debe sumar las áreas para obtener el área compuesta?
  respuesta: 'No'
  solucion_pasos:
  - No, depende de si la región se forma añadiendo o recortando triángulos.
- titulo: ¿Es necesario identificar bien cómo se descompone la figura antes de calcular?
  respuesta: Sí
  solucion_pasos:
  - Sí, un error en la descomposición lleva a sumar o restar mal las áreas.
errores_frecuentes:
- Sumar las áreas cuando en realidad se debía restar (o viceversa).
- Olvidar alguno de los triángulos en que se descompuso la figura.
- Calcular mal el área de alguno de los triángulos individuales antes de combinarlas.
fuente: Elaboración propia.
estado: publicado
