semantic_id: MAT.NUM.POTENCIAS_PROPIEDADES.DIVISION_IGUAL_EXPONENTE
objetivo: Combinar cocientes de potencias con exponente común.
introduccion: Un cociente de potencias puede esconder una división sencilla entre
  bases. Reconocer el exponente común evita calcular números grandes innecesariamente.
resumen: 'Potencias con igual exponente pueden reunirse dividiendo sus bases: \(a^n/b^n=(a/b)^n\).
  El divisor y su potencia deben ser distintos de cero.'
explicacion: |-
  Potencias con igual exponente pueden reunirse dividiendo sus bases: \(a^n/b^n=(a/b)^n\).

  El cálculo “\(12^2/3^2=(12/3)^2=16\)” muestra por qué el divisor y su potencia deben ser distintos de cero
procedimiento:
- 'Paso 1: Verifica que ambos exponentes coincidan y que la base divisora no sea cero.'
- 'Paso 2: Divide las bases y conserva el exponente.'
- 'Paso 3: Simplifica antes de elevar y comprueba con el cociente original.'
ejemplos:
- titulo: Aplicación razonada — División de potencias de igual exponente
  enunciado: \(12^2/3^2=(12/3)^2=16\).
  solucion_pasos:
  - Verifica que ambos exponentes coincidan y que la base divisora no sea cero.
  - Divide las bases y conserva el exponente.
  - Simplifica antes de elevar y comprueba con el cociente original.
- titulo: Revisión de una solución — División de potencias de igual exponente
  enunciado: Una solución aplica “Divide las bases y conserva el exponente.”, pero
    termina sin comprobar que el divisor y su potencia deben ser distintos de cero.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define división de potencias de igual exponente: potencias
    con igual exponente pueden reunirse dividiendo sus bases: \(a^n/b^n=(a/b)^n\).'
  - Verifica que ambos exponentes coincidan y que la base divisora no sea cero.
  - 'Completa la revisión con este control: Simplifica antes de elevar y comprueba
    con el cociente original.'
- titulo: ¿Se cumple que el divisor y su potencia deben ser distintos de cero? — División
    de potencias de igual exponente
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que potencias con igual exponente pueden
    reunirse dividiendo sus bases: \(a^n/b^n=(a/b)^n\).'
  - El caso “\(12^2/3^2=(12/3)^2=16\)” satisface esa condición.
  - Simplifica antes de elevar y comprueba con el cociente original.
- titulo: ¿Es válido omitir el paso “Verifica que ambos exponentes coincidan y que
    la base divisora no sea cero”? — División de potencias de igual exponente
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de división de potencias de igual
    exponente.
  - 'Omitirlo puede volver inválida la acción siguiente: Divide las bases y conserva
    el exponente.'
  - 'La solución debe terminar de este modo: Simplifica antes de elevar y comprueba
    con el cociente original.'
errores_frecuentes:
- 'Confundir división de potencias de igual exponente con otro concepto y omitir este
  inicio: Verifica que ambos exponentes coincidan y que la base divisora no sea cero.'
- Aplicar mecánicamente “Divide las bases y conserva el exponente.” sin revisar las
  condiciones de la definición.
- Tomar “\(12^2/3^2=(12/3)^2=16\)” como una igualdad aislada, sin explicar por qué
  es válida.
- Aceptar una respuesta que contradice la idea clave “el divisor y su potencia deben
  ser distintos de cero”.
- 'Terminar el desarrollo sin realizar este control: Simplifica antes de elevar y
  comprueba con el cociente original.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
