semantic_id: MAT.NUM.DECIMALES_CLASIFICACION.DECIMAL_SEMIPERIODICO
titulo: Decimal semiperiódico
objetivo: Reconocer cuándo un decimal periódico presenta cifras no periódicas antes del período.
introduccion: 'Algunos decimales periódicos no comienzan a repetirse justo después de la coma: primero
  aparecen una o más cifras que no forman parte del período, llamadas anteperíodo.'
resumen: Un decimal semiperiódico es un decimal periódico que tiene un anteperíodo, es decir, una o más
  cifras no periódicas entre la coma y el período.
explicacion: '### Definición formal


  Un número racional \(\frac{a}{b}\) (en forma irreductible) genera un decimal semiperiódico cuando \(b\)
  tiene como factores primos 2 y/o 5 junto con algún otro primo distinto; las cifras asociadas a los factores
  2 y 5 forman el anteperíodo.


  ### Desarrollo didáctico


  \(1.2\overline{7}\) es semiperiódico porque antes del período aparece un anteperíodo: la cifra 2 no
  se repite, mientras que 7 sí se repite indefinidamente.'
procedimiento:
- 'Paso 1: Busca primero las cifras decimales que no se repiten.'
- 'Paso 2: Identifica a continuación el bloque que se repite indefinidamente.'
- 'Paso 3: Separa anteperíodo y período para justificar la clasificación.'
ejemplos:
- titulo: Aplicación razonada — Identificación de decimal infinito semiperiódico
  enunciado: \(1.2\overline{7}\) es semiperiódico porque antes del período aparece un anteperíodo.
  solucion_pasos:
  - Busca primero las cifras decimales que no se repiten.
  - Identifica a continuación el bloque que se repite indefinidamente.
  - Separa anteperíodo y período para justificar la clasificación.
- titulo: Revisión de una solución — Identificación de decimal infinito semiperiódico
  enunciado: Una solución aplica “Identifica a continuación el bloque que se repite indefinidamente.”,
    pero termina sin comprobar que en un decimal semiperiódico conviven anteperíodo y período. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de decimal infinito semiperiódico: un decimal semiperiódico
    tiene primero cifras no repetidas y luego un período que se repite indefinidamente.'
  - Busca primero las cifras decimales que no se repiten.
  - 'Completa la revisión con este control: Separa anteperíodo y período para justificar la clasificación.'
- titulo: ¿Se cumple que en un decimal semiperiódico conviven anteperíodo y período? — Identificación
    de decimal infinito semiperiódico
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un decimal semiperiódico tiene primero cifras no repetidas
    y luego un período que se repite indefinidamente.
  - El caso “\(1.2\overline{7}\) es semiperiódico porque antes del período aparece un anteperíodo” satisface
    esa condición.
  - Separa anteperíodo y período para justificar la clasificación.
- titulo: ¿Es válido omitir el paso “Busca primero las cifras decimales que no se repiten”? — Identificación
    de decimal infinito semiperiódico
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de decimal infinito semiperiódico.
  - 'Omitirlo puede volver inválida la acción siguiente: Identifica a continuación el bloque que se repite
    indefinidamente.'
  - 'La solución debe terminar de este modo: Separa anteperíodo y período para justificar la clasificación.'
errores_frecuentes:
- 'Empezar identificación de decimal infinito semiperiódico sin realizar este control inicial: Busca primero
  las cifras decimales que no se repiten.'
- Memorizar “\(1.2\overline{7}\) es semiperiódico porque antes del período aparece un anteperíodo” como
  respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Identifica a continuación el bloque que se repite indefinidamente.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación de decimal infinito semiperiódico que contradice
  el criterio “En un decimal semiperiódico conviven anteperíodo y período”.
- 'Cerrar el ejercicio sin esta comprobación específica: Separa anteperíodo y período para justificar
  la clasificación.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
