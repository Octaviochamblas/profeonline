semantic_id: MAT.EST.VARIABLES_TIPOS.CUANTITATIVA_ID
titulo: Identificar variables cuantitativas
objetivo: Identificar variables cuantitativas como aquellas que describen cantidades numéricas medibles
  o contables de los elementos de estudio.
introduccion: Muchas características de interés estadístico son numéricas, permitiendo aplicar operaciones
  aritméticas y medidas como la media o la varianza.
resumen: Una variable cuantitativa es aquella cuyos valores son números que representan cantidades, sobre
  los cuales tiene sentido realizar operaciones aritméticas.
explicacion: '![Identificación de variables cuantitativas](/static/img/estadistica/vartipo/vartipo-cuantitativa-id.svg)


  ### Definición formal


  Una variable es cuantitativa si sus valores son numéricos y admiten operaciones aritméticas con sentido
  (suma, promedio, comparación de magnitud).


  ### Desarrollo didáctico


  La edad, el ingreso mensual o el peso corporal son variables cuantitativas: se pueden sumar, promediar
  y comparar numéricamente con sentido real.'
procedimiento:
- 'Paso 1: Observa los valores posibles que puede tomar la variable en estudio.'
- 'Paso 2: Verifica si esos valores son números con sentido numérico (sobre los que se puede sumar o promediar).'
- 'Paso 3: Si tiene sentido realizar operaciones aritméticas sobre esos valores, la variable es cuantitativa.'
ejemplos:
- titulo: 'Identificar una variable cuantitativa: edad'
  enunciado: Se registra la edad de cada integrante de un grupo.
  solucion_pasos:
  - La edad es una variable cuantitativa, ya que representa una cantidad numérica con sentido aritmético.
- titulo: 'Identificar una variable cuantitativa: ingreso mensual'
  enunciado: Se registra el ingreso mensual de cada trabajador de una empresa.
  solucion_pasos:
  - El ingreso mensual es una variable cuantitativa, ya que es un valor numérico que se puede sumar y
    promediar.
- titulo: ¿El nombre de una persona es una variable cuantitativa?
  respuesta: 'No'
  solucion_pasos:
  - No, es una variable cualitativa, ya que no tiene sentido numérico ni aritmético.
- titulo: ¿El número de mascotas de una familia es una variable cuantitativa?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que representa un conteo numérico sobre el que tiene sentido sumar y promediar.
errores_frecuentes:
- Confundir un código numérico (como el número de una comuna) con una variable cuantitativa real, cuando
  en realidad es solo una etiqueta.
- Pensar que toda variable expresada con números es automáticamente cuantitativa, sin verificar si esas
  operaciones tienen sentido real.
- No distinguir entre variables discretas y continuas al clasificar una variable como cuantitativa.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
