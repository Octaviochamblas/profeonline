semantic_id: MAT.ALG.VALORIZACION.MONOMIO_ENTEROS
objetivo: Valorizar monomios simples con coeficientes y variables enteras.
introduccion: Un monomio es un bloque sólido de álgebra, sin sumas ni restas que lo
  dividan. Todo está conectado por la multiplicación. Es el ladrillo fundamental.
resumen: Para valorizar un **Monomio**, se sustituyen sus variables por los números
  dados y se realiza la **multiplicación continuada** entre el coeficiente (el número
  inicial) y los valores de las letras.
explicacion: 'Ejemplo de monomio: $7m^2n$.

  Este término es en realidad una multiplicación triple oculta: $7 \cdot m^2 \cdot
  n$.

  Si $m=2$ y $n=3$:

  1. Sustituimos: $7 \cdot (2)^2 \cdot (3)$.

  2. Papomudas nos obliga a resolver la potencia primero: $2^2 = 4$.

  3. La expresión queda como una cadena de multiplicaciones puras: $7 \cdot 4 \cdot
  3$.

  4. Resolvemos de izquierda a derecha (o en el orden que prefieras, la multiplicación
  es conmutativa): $28 \cdot 3 = 84$.'
procedimiento:
- 'Paso 1: Identifica el coeficiente (el número grande adelante) y anótalo.'
- 'Paso 2: Sustituye las letras por sus valores numéricos entre paréntesis.'
- 'Paso 3: Aplica los exponentes a los valores que los tengan.'
- 'Paso 4: Multiplica todos los números resultantes para obtener el valor final del
  monomio.'
ejemplos:
- titulo: El bloque irrompible
  enunciado: Valora -3xy^3 para x=4, y=2.
  solucion_pasos:
  - 'Sustituyendo: -3 * (4) * (2)^3.'
  - 'Potencia primero: 2^3 = 8.'
  - 'Expresión: -3 * 4 * 8.'
  - 'Multiplicando: -12 * 8 = -96.'
errores_frecuentes:
- 'Multiplicar primero y elevar a la potencia después. (Ej: $(2 \cdot 3)^2$ en lugar
  de $2 \cdot 3^2$).'
- Ignorar el signo negativo del coeficiente inicial.
fuente: Álgebra de Baldor.
estado: publicado
