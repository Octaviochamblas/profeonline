semantic_id: MAT.ALG.FACTOR_AGRUPACION.REAGRUPACION_ALTERNATIVA
titulo: Reagrupación alternativa de términos
objetivo: Demostrar que existen múltiples formas de agrupar los términos inicialmente sin alterar el resultado
  factorizado final.
introduccion: ¿Qué pasa si agrupaste los términos de una forma, y tu compañero de banco los agrupó de
  otra? No se peleen. En la factorización por agrupación, todos los caminos (si están bien hechos) conducen
  a Roma.
resumen: Un polinomio factorizable por agrupación suele permitir más de una combinación posible de grupos
  (por ejemplo, agrupar 1 con 3 y 2 con 4 en lugar de 1 con 2 y 3 con 4), llevando siempre a los mismos
  factores finales.
explicacion: '### Definición formal


  Podemos mover los sumandos (con su signo) a conveniencia sin alterar la expresión.


  ### Desarrollo didáctico


  Usemos de ejemplo el polinomio original: $ax + bx + ay + by$.


  Forma Clásica: Agrupamos (1,2) y (3,4).

  $(ax+bx) + (ay+by) \rightarrow x(a+b) + y(a+b) \rightarrow (a+b)(x+y)$.


  Forma Alternativa: ¿Qué tal si reordenamos el polinomio y agrupamos el primer término con el tercero
  (1,3), y el segundo con el cuarto (2,4)?

  $ax + ay + bx + by$

  Agrupamos: $(ax+ay) + (bx+by)$

  Factorizamos cada grupo: $a(x+y) + b(x+y)$

  Extraemos el factor polinomio: $(x+y)(a+b)$.


  ¿El resultado? $(x+y)(a+b)$ es matemáticamente idéntico a $(a+b)(x+y)$ gracias a la conmutatividad de
  la multiplicación. Esto significa que mientras asegures tener un factor común válido en cada grupo,
  tu elección inicial no arruinará el problema.'
procedimiento:
- 'Paso 1: Reordena los términos del polinomio si la primera agrupación que intentaste no genera paréntesis
  idénticos.'
- 'Paso 2: Asegúrate de llevarte el signo correcto de cada término al reordenarlo.'
- 'Paso 3: Agrupa usando tu nueva configuración.'
- 'Paso 4: Aplica los pasos de factor común por grupo y factor resultante.'
ejemplos:
- titulo: Factoriza $3mx - 2ny + 3nx - 2my$ mediante una reagrupación conveniente
  enunciado: Factoriza $3mx - 2ny + 3nx - 2my$ mediante una reagrupación conveniente.
  solucion_pasos:
  - 'La agrupación inicial no sirve bien. Reordenamos juntando las ''m'' y las ''n'': $3mx - 2my + 3nx
    - 2ny$.'
  - 'Agrupamos: $(3mx - 2my) + (3nx - 2ny)$.'
  - 'Extraemos: $m(3x - 2y) + n(3x - 2y)$.'
  - 'Final: $(3x - 2y)(m + n)$.'
- titulo: Si agrupo $x^2 + xy + ax + ay$ como $(x^2 + ax) + (xy + ay)$, ¿qué resultado obtengo?
  solucion_pasos:
  - 'Sacamos ''x'' del primero y ''y'' del segundo: $x(x+a) + y(x+a)$. Esto da (x+a)(x+y), idéntico al
    otro método.'
