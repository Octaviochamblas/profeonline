    r'
  enunciado: 'Respecto de «Reagrupación alternativa de términos»: ¿Se puede aceptar esta afirmación? «Al
    reordenar términos, olvidar moverlos con su signo original correspondiente»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un polinomio factorizable por agrupación suele permitir
