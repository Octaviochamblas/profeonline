semantic_id: MAT.GEO.TRIANGULOS_METRICA.DESIGUALDAD_TRIANGULAR_DIFERENCIA
titulo: 'Desigualdad triangular: un lado debe ser mayor que la diferencia de los otros dos'
objetivo: Aplicar la forma equivalente de la desigualdad triangular expresada como diferencia de lados.
introduccion: 'La misma condición de existencia de un triángulo puede escribirse de otra forma: cada lado
  debe ser mayor que la diferencia (positiva) de los otros dos.'
resumen: En todo triángulo, cada lado debe ser mayor que el valor absoluto de la diferencia de los otros
  dos.
explicacion: '![Desigualdad triangular: diferencia de lados](/static/img/geometria/triangulos/triangulos-metrica-desigualdad-diferencia.svg)


  ### Definición formal


  Para un triángulo de lados $a$, $b$ y $c$ se cumple $|a-b|<c$, $|b-c|<a$ y $|a-c|<b$; esta es la forma
  equivalente de la desigualdad triangular expresada por diferencia.


  ### Desarrollo didáctico


  Con lados 4, 5 y 7: $|5-4|=1<7$, $|7-5|=2<4$ y $|7-4|=3<5$; las tres se cumplen, confirmando que estos
  lados sí forman un triángulo.'
procedimiento:
- 'Paso 1: Calcula la diferencia (en valor absoluto) entre cada par de lados.'
- 'Paso 2: Compara esa diferencia con el tercer lado restante.'
- 'Paso 3: Si el tercer lado siempre supera la diferencia correspondiente, el triángulo es válido.'
ejemplos:
- titulo: Verificar con diferencias
  enunciado: Comprueba con diferencias si 4, 5 y 7 forman un triángulo.
  solucion_pasos:
  - '|5−4|=1<7, |7−5|=2<4, |7−4|=3<5: se cumplen las tres condiciones.'
- titulo: Caso inválido
  enunciado: Comprueba con diferencias si 2, 3 y 8 forman un triángulo.
  solucion_pasos:
  - '|8−3|=5, que no es menor que 2: no se cumple la condición.'
- titulo: ¿Esta forma es equivalente a la desigualdad por suma?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas expresan la misma condición de existencia del triángulo.
- titulo: ¿Se necesita valor absoluto en esta desigualdad?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque la diferencia entre dos lados podría salir negativa si se restan en el orden incorrecto.
errores_frecuentes:
- Olvidar el valor absoluto y obtener una diferencia negativa sin sentido.
- Confundir esta desigualdad con la versión por suma de lados.
- Verificar solo una de las tres combinaciones posibles.
fuente: Elaboración propia.
estado: publicado
