semantic_id: MAT.EST.MODA_ANALISIS.BIMODAL
titulo: Identificar un conjunto de datos bimodal
objetivo: Identificar un conjunto de datos bimodal, aquel que tiene exactamente dos valores empatados
  con la máxima frecuencia.
introduccion: En algunos conjuntos, dos valores distintos comparten la frecuencia más alta, generando
  dos modas simultáneas.
resumen: Un conjunto de datos es bimodal cuando existen exactamente dos valores que comparten la máxima
  frecuencia, siendo ambos considerados modas.
explicacion: '![Conjunto bimodal](/static/img/estadistica/moda/moda-bimodal.svg)


  ### Definición formal


  Un conjunto es bimodal si existen dos valores $x_i$ y $x_j$ con $f_i=f_j$, y ambos son mayores que la
  frecuencia de cualquier otro valor del conjunto.


  ### Desarrollo didáctico


  En el conjunto {4, 5, 5, 5, 6, 6, 6, 7}, tanto el 5 como el 6 tienen frecuencia 3, la máxima del conjunto,
  por lo que este conjunto es bimodal con modas 5 y 6.'
procedimiento:
- 'Paso 1: Calcula la frecuencia de cada valor distinto del conjunto de datos.'
- 'Paso 2: Identifica la frecuencia máxima del conjunto.'
- 'Paso 3: Verifica si exactamente dos valores distintos alcanzan esa frecuencia máxima; si es así, el
  conjunto es bimodal.'
ejemplos:
- titulo: Verificar que {4,5,5,5,6,6,6,7} es bimodal
  enunciado: 'Conjunto: 4,5,5,5,6,6,6,7.'
  solucion_pasos:
  - El 5 y el 6 tienen ambos frecuencia 3, la máxima del conjunto. Es bimodal con modas 5 y 6.
- titulo: Verificar tallas de zapatos bimodales
  enunciado: 'Tallas vendidas: 38(3), 39(7), 40(7), 41(2).'
  solucion_pasos:
  - Las tallas 39 y 40 tienen ambas frecuencia 7, la máxima. Es bimodal con modas 39 y 40.
- titulo: ¿Un conjunto bimodal tiene exactamente dos modas?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición de conjunto bimodal.
- titulo: ¿Es necesario que las dos modas de un conjunto bimodal tengan exactamente la misma frecuencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas deben compartir la frecuencia máxima del conjunto para considerarse modas simultáneas.
errores_frecuentes:
- No verificar si existe un empate exacto en la frecuencia máxima antes de clasificar un conjunto como
  bimodal.
- Confundir un conjunto bimodal con uno unimodal, ignorando que hay dos valores empatados en la cima.
- Reportar solo una de las dos modas de un conjunto bimodal, omitiendo la segunda.
fuente: 'Elaboración propia (referencia: Moraleja 359).'
estado: publicado
