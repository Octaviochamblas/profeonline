semantic_id: MAT.NUM.DECIMALES_OPERATORIA.ADICION
titulo: Adición de números decimales
objetivo: Sumar números decimales alineando correctamente las cifras según su valor posicional.
introduccion: 'Sumar decimales exige respetar el valor posicional de cada cifra: unidades con unidades,
  décimas con décimas, y así sucesivamente, lo que se logra alineando las comas decimales.'
resumen: Para sumar números decimales se alinean las comas decimales (completando con ceros si es necesario)
  y se suma como si fueran números enteros, respetando el valor posicional.
explicacion: '### Definición formal


  Sumar decimales equivale a sumar sus expresiones como fracciones con denominador potencia de 10 común:
  se alinean las comas para que cada columna represente la misma potencia de 10 en ambos números.


  ### Desarrollo didáctico


  \(3.45+0.8\): se completa \(0.8\) con un cero para igualar cifras decimales, \(0.80\); se alinean las
  comas y se suma como enteros: \(3.45+0.80=4.25\).'
procedimiento:
- 'Paso 1: Alinea los sumandos haciendo coincidir sus comas decimales.'
- 'Paso 2: Completa con ceros si ayuda y suma columna por columna.'
- 'Paso 3: Coloca la coma en la misma columna y estima para controlar el resultado.'
ejemplos:
- titulo: Aplicación razonada — Adición de decimales mediante alineación de coma
  enunciado: \(3.45 + 0.8 = 3.45 + 0.80 = 4.25\).
  solucion_pasos:
  - Alinea los sumandos haciendo coincidir sus comas decimales.
  - Completa con ceros si ayuda y suma columna por columna.
  - Coloca la coma en la misma columna y estima para controlar el resultado.
- titulo: Revisión de una solución — Adición de decimales mediante alineación de coma
  enunciado: Una solución aplica “Completa con ceros si ayuda y suma columna por columna.”, pero termina
    sin comprobar que alinear la coma mantiene unidades, décimas y centésimas en su lugar correcto. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define adición de decimales mediante alineación de coma: para sumar decimales
    se alinean las comas y se suman cifras del mismo valor posicional.'
  - Alinea los sumandos haciendo coincidir sus comas decimales.
  - 'Completa la revisión con este control: Coloca la coma en la misma columna y estima para controlar
    el resultado.'
- titulo: ¿Se cumple que alinear la coma mantiene unidades, décimas y centésimas en su lugar correcto?
    — Adición de decimales mediante alineación de coma
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para sumar decimales se alinean las comas y se suman cifras
    del mismo valor posicional.
  - El caso “\(3.45 + 0.8 = 3.45 + 0.80 = 4.25\)” satisface esa condición.
  - Coloca la coma en la misma columna y estima para controlar el resultado.
- titulo: ¿Es válido omitir el paso “Alinea los sumandos haciendo coincidir sus comas decimales”? — Adición
    de decimales mediante alineación de coma
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de adición de decimales mediante alineación de coma.
  - 'Omitirlo puede volver inválida la acción siguiente: Completa con ceros si ayuda y suma columna por
    columna.'
  - 'La solución debe terminar de este modo: Coloca la coma en la misma columna y estima para controlar
    el resultado.'
errores_frecuentes:
- 'Empezar adición de decimales mediante alineación de coma sin realizar este control inicial: Alinea
  los sumandos haciendo coincidir sus comas decimales.'
- Memorizar “\(3.45 + 0.8 = 3.45 + 0.80 = 4.25\)” como respuesta aislada, sin reconstruir la definición
  que lo justifica.
- Convertir en receta el paso “Completa con ceros si ayuda y suma columna por columna.” y usarlo aunque
  cambien las condiciones del problema.
- Dar por válida una conclusión sobre adición de decimales mediante alineación de coma que contradice
  el criterio “Alinear la coma mantiene unidades, décimas y centésimas en su lugar correcto”.
- 'Cerrar el ejercicio sin esta comprobación específica: Coloca la coma en la misma columna y estima para
  controlar el resultado.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
