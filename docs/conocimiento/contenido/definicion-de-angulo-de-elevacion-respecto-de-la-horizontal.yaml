semantic_id: MAT.GEO.ANGULOS_APLICACIONES.ELEVACION_DEFINICION
titulo: Definición de ángulo de elevación respecto de la horizontal
objetivo: Reconocer un ángulo de elevación en un contexto real y comprobar que la referencia siempre es
  la horizontal del observador y no la pared del objeto observado.
introduccion: Cuando miras la cima de un cerro no partes desde el suelo del cerro, sino desde tu propia
  línea horizontal de mirada. Aquí lo trabajaremos con ejemplos concretos y verificaciones cortas.
resumen: El ángulo de elevación se mide desde la horizontal del observador hacia arriba, hasta la línea
  de visión. Como idea de control, la referencia siempre es la horizontal del observador y no la pared
  del objeto observado.
explicacion: 'El ángulo de elevación se mide desde la horizontal del observador hacia arriba, hasta la
  línea de visión.


  El ejemplo “si una persona mira la parte alta de un edificio, el ángulo entre la horizontal y su mirada
  es un ángulo de elevación” no se resuelve por apariencia: se justifica usando la definición y revisando
  finalmente que la referencia siempre es la horizontal del observador y no la pared del objeto observado.'
procedimiento:
- 'Paso 1: Ubica al observador y dibuja mentalmente su horizontal.'
- 'Paso 2: Traza la línea de visión hacia el objeto que está por encima de esa horizontal.'
- 'Paso 3: Identifica el ángulo formado entre ambas direcciones y verifica que se mida hacia arriba.'
ejemplos:
- titulo: Situación geométrica — Ángulo de elevación
  enunciado: Si una persona mira la parte alta de un edificio, el ángulo entre la horizontal y su mirada
    es un ángulo de elevación.
  solucion_pasos:
  - Ubica al observador y dibuja mentalmente su horizontal.
  - Traza la línea de visión hacia el objeto que está por encima de esa horizontal.
  - Identifica el ángulo formado entre ambas direcciones y verifica que se mida hacia arriba.
- titulo: Corrección de una respuesta — Ángulo de elevación
  enunciado: 'Revisa una solución del caso “si una persona mira la parte alta de un edificio, el ángulo
    entre la horizontal y su mirada es un ángulo de elevación”: el resultado parece razonable, pero falta
    conectar el dibujo con la definición. Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: el ángulo de elevación se mide desde la horizontal del observador hacia arriba,
    hasta la línea de visión.'
  - Traza la línea de visión hacia el objeto que está por encima de esa horizontal.
  - Identifica el ángulo formado entre ambas direcciones y verifica que se mida hacia arriba.
- titulo: ¿La situación respeta la idea clave del recurso? — Ángulo de elevación
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: el ángulo de elevación se mide desde la horizontal
    del observador hacia arriba, hasta la línea de visión.'
  - En el caso “si una persona mira la parte alta de un edificio, el ángulo entre la horizontal y su mirada
    es un ángulo de elevación” se observa que la referencia siempre es la horizontal del observador y
    no la pared del objeto observado.
  - Identifica el ángulo formado entre ambas direcciones y verifica que se mida hacia arriba.
- titulo: ¿Se puede omitir el paso intermedio? — Ángulo de elevación
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de definición de ángulo de elevación respecto
    de la horizontal.
  - Después del paso “Ubica al observador y dibuja mentalmente su horizontal.” todavía hace falta revisar
    “Traza la línea de visión hacia el objeto que está por encima de esa horizontal.”.
  - El cierre correcto exige “Identifica el ángulo formado entre ambas direcciones y verifica que se mida
    hacia arriba.”.
errores_frecuentes:
- Ángulo de elevación significa medir el ángulo desde la vertical del edificio en vez de desde la horizontal
  del observador.
- Para resolver ángulo de elevación, basta con el paso “Ubica al observador y dibuja mentalmente su horizontal.”
  y no hace falta revisar “Traza la línea de visión hacia el objeto que está por encima de esa horizontal.”.
- Si el dibujo parece claro, se puede ignorar que la referencia siempre es la horizontal del observador
  y no la pared del objeto observado.
- Dos configuraciones distintas representan ángulo de elevación solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Identifica el ángulo formado entre ambas
  direcciones y verifica que se mida hacia arriba.”.
fuente: Currículum Nacional MINEDUC — Aplicaciones de ángulos y lectura geométrica de situaciones cotidianas.
