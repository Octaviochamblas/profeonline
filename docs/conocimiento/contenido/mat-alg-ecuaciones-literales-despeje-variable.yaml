semantic_id: MAT.ALG.ECUACIONES_LITERALES.DESPEJE_VARIABLE
titulo: Despeje de una Variable en Función de Otras
objetivo: Aislar una incógnita cuando está acompañada de múltiples parámetros literales.
introduccion: Debes deshacerte de los operaciones que acompañan a la variable desde afuera hacia adentro.
resumen: El arte de despejar se basa en el orden de las operaciones en reversa. Imagina que la 'x' es la variable
  que debe aislarse, y los parámetros ($a$, $b$, $c$) son los operaciones que acompañan a la variable.
explicacion: '### Definición formal


  Despejar la incógnita $x$ en una ecuación literal $f(x,a,b,c,\dots)=0$ consiste en aplicar, en orden inverso
  al que fueron aplicadas sobre $x$, las operaciones aritméticas cuyos operandos son los parámetros $a, b, c, \dots$
  (tratados como constantes), hasta dejar $x$ aislada en un miembro de la igualdad.


  ### Desarrollo didáctico


  Debes deshacerte de los operaciones que acompañan a la variable desde afuera hacia adentro.

  Ejemplo: Tienes $\frac{ax - b}{c} = d$.

  1. Operación externa: El $/c$ que divide a todo. Pasa multiplicando: $ax - b = cd$.

  2. Operación intermedia: El $-b$ que resta. Pasa sumando: $ax = cd + b$.

  3. Coeficiente adyacente: La ''a'' que multiplica. Pasa dividiendo a TODO lo del otro lado: $x = \frac{cd + b}{a}$.


  La variable queda aislada. Y tienes tu fórmula.'
procedimiento:
- Elimina denominadores multiplicando (si los hay).
- Agrupa todos los términos que contengan a la incógnita 'x' en un solo lado de la igualdad, y manda todo el resto
  (los parámetros puros) al otro lado.
- Si hay varias 'x', factoriza (extrae factor común 'x').
- Divide por el coeficiente o paréntesis que acompañe a la 'x'.
ejemplos:
- titulo: $\frac{ax - b}{c} = d$ y $ax - b = cd$
  enunciado: Analiza el caso $\frac{ax - b}{c} = d$ y $ax - b = cd$ y explica cómo se aplica el criterio estudiado.
  solucion_pasos:
  - 'Debes deshacerte de los operaciones que acompañan a la variable desde afuera hacia adentro.

    Ejemplo: Tienes $\frac{ax - b}{c} = d$.

    1. Operación externa: El $/c$ que divide a todo. Pasa multiplicando: $ax - b = cd$.

    2. Operación intermedia: El $-b$ que resta. Pasa sumando: $ax = cd + b$.

    3. Coeficiente adyacente: La ''a'' que multiplica. Pasa dividiendo a TODO lo del otro lado: $x = \frac{cd +
    b}{a}$.'
  - Elimina denominadores multiplicando (si los hay).
- titulo: $a$
  enunciado: Resuelve o interpreta $a$ usando las condiciones de este recurso.
