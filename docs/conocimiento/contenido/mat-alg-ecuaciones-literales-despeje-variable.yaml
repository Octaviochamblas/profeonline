semantic_id: MAT.ALG.ECUACIONES_LITERALES.DESPEJE_VARIABLE
titulo: Despeje de una Variable en Función de Otras
objetivo: Aislar una incógnita cuando está acompañada de múltiples parámetros literales.
explicacion: |
  El arte de despejar se basa en el orden de las operaciones en reversa. Imagina que la 'x' es la princesa atrapada en el castillo, y los parámetros ($a$, $b$, $c$) son los guardias.

  Debes deshacerte de los guardias desde afuera hacia adentro.
  Ejemplo: Tienes $\frac{ax - b}{c} = d$.
  1. Guardia externo: El $/c$ que divide a todo. Pasa multiplicando: $ax - b = cd$.
  2. Guardia del medio: El $-b$ que resta. Pasa sumando: $ax = cd + b$.
  3. Guardia cercano: La 'a' que multiplica. Pasa dividiendo a TODO lo del otro lado: $x = \frac{cd + b}{a}$.

  ¡La princesa está libre! Y tienes tu fórmula.
procedimiento: |
  1. Elimina denominadores multiplicando (si los hay).
  2. Agrupa todos los términos que contengan a la incógnita 'x' en un solo lado de la igualdad, y manda todo el resto (los parámetros puros) al otro lado.
  3. Si hay varias 'x', factoriza (extrae factor común 'x').
  4. Divide por el coeficiente o paréntesis que acompañe a la 'x'.
