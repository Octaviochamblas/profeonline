- titulo: 'Respecto de «Despeje de una variable en una ecuación literal»: ¿Es correcta esta caracteriza'
  enunciado: 'Respecto de «Despeje de una variable en una ecuación literal»: ¿Es correcta esta caracterización?
    «El arte de despejar se basa en el orden de las operaciones en reversa»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El arte de despejar se basa en el orden de las operaciones
    en reversa.'
- titulo: 'Respecto de «Despeje de una variable en una ecuación literal»: ¿Es válida esta afirmación? «'
  enunciado: 'Respecto de «Despeje de una variable en una ecuación literal»: ¿Es válida esta afirmación? «Puede
    omitirse esta condición sin cambiar el resultado: «Elimina denominadores multiplicando (si los hay)»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El arte de despejar se basa en el orden de las operaciones
    en reversa.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Elimina denominadores multiplicando (si los hay)».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Agrupa todos los términos que contengan a la
  incógnita ''x'' en un solo lado de la igualdad, y manda todo el resto (los parámetros puros) al otro lado».'
- La definición sigue cumpliéndose aunque no se considere que el arte de despejar se basa en el orden de las operaciones
  en reversa. Imagina que la 'x' es la variable que debe aislarse, y los parámetros ($a$, $b$, $c$) son los operaciones
  que acompañan a la variable.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Divide por el coeficiente o paréntesis
  que acompañe a la 'x'».
- La comprobación del resultado vuelve innecesaria la condición «Elimina denominadores multiplicando (si los hay)».
