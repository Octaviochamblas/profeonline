semantic_id: 'MAT.ALG.ECUACIONES_LITERALES.DESPEJE_VARIABLE'
titulo: 'Despeje de una Variable en Función de Otras'
objetivo: 'Aislar una incógnita cuando está acompañada de múltiples parámetros literales.'
introduccion: |
  El arte de despejar se basa en el orden de las operaciones en reversa. Imagina que la 'x' es la variable a despejar, y los parámetros ($a$, $b$, $c$) son los términos y coeficientes.
resumen: 'La variable ha sido despejada. Y tienes tu fórmula.'
explicacion: |
  Debes deshacerte de los términos y coeficientes desde afuera hacia adentro.
  Ejemplo: Tienes $\frac{ax - b}{c} = d$.
  1. Término externo: El $/c$ que divide a todo. Pasa multiplicando: $ax - b = cd$.
  2. Término intermedio: El $-b$ que resta. Pasa sumando: $ax = cd + b$.
  3. Coeficiente adyacente: La 'a' que multiplica. Pasa dividiendo a TODO lo del otro lado: $x = \frac{cd + b}{a}$.
procedimiento:
  - 'Paso 1: Elimina denominadores multiplicando (si los hay).'
  - 'Paso 2: Agrupa todos los términos que contengan a la incógnita ''x'' en un solo lado de la igualdad, y manda todo el resto (los parámetros puros) al otro lado.'
  - 'Paso 3: Si hay varias ''x'', factoriza (extrae factor común ''x'').'
  - 'Paso 4: Divide por el coeficiente o paréntesis que acompañe a la ''x''.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
