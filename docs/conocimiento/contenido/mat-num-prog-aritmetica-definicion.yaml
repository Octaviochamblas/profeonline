semantic_id: MAT.NUM.PROG_ARITMETICA.DEFINICION
objetivo: Reconocer las Progresiones Aritméticas (P.A.) como sucesiones donde la diferencia
  entre términos consecutivos es constante.
introduccion: 'Imagina una escalera donde todos los peldaños miden exactamente lo
  mismo. Subes a un ritmo perfectamente constante. En matemáticas, esa escalera tan
  predecible y ordenada tiene nombre y apellido: Progresión Aritmética.'
resumen: Una Progresión Aritmética (P.A.) es un tipo especial de sucesión. Su regla
  inquebrantable es que se suma (o se resta) exactamente la misma cantidad para pasar
  de un término al siguiente. Ese número fijo se llama 'Diferencia' ($d$).
explicacion: "De todas las sucesiones numéricas posibles, la **Progresión Aritmética**\
  \ es la más sencilla de todas. Corresponde a crecimientos lineales.\n\n- **La Prueba\
  \ de Ácido:** Para saber si una sucesión es aritmética, debes restar cualquier número\
  \ con su vecino anterior (Ej: $a_2 - a_1$). Si repites esto en toda la lista y **siempre\
  \ te da el mismo resultado**, ¡es una P.A.!\n- **La Diferencia ($d$):** Ese número\
  \ constante que siempre se suma o se resta. \n  - Si $d > 0$, la progresión es *Creciente*\
  \ (Ej: $2, 5, 8, 11\\dots$ aquí $d=3$).\n  - Si $d < 0$, la progresión es *Decreciente*\
  \ (Ej: $20, 15, 10, 5\\dots$ aquí $d=-5$).\n  - Si $d = 0$, la progresión es *Constante*\
  \ (Ej: $7, 7, 7, 7\\dots$)."
procedimiento:
- 'Paso 1: Toma el segundo término y réstale el primero ($a_2 - a_1$). Anota el resultado.'
- 'Paso 2: Toma el tercer término y réstale el segundo ($a_3 - a_2$). Anota el resultado.'
- 'Paso 3: Si ambos resultados son idénticos, es altamente probable que sea una Progresión
  Aritmética de diferencia ''d'' igual a tu resultado.'
ejemplos:
- titulo: Comprobando la escalera
  enunciado: ¿Es la secuencia 10, 14, 18, 22 una progresión aritmética? Si es así,
    ¿cuál es su diferencia 'd'?
  solucion_pasos:
  - 'Restamos: $14 - 10 = 4$.'
  - 'Restamos: $18 - 14 = 4$.'
  - 'Restamos: $22 - 18 = 4$.'
  - La resta siempre da lo mismo. Sí es una P.A. y su diferencia es $d = 4$.
errores_frecuentes:
- Restar al revés (restar el primer término menos el segundo), lo cual da un signo
  equivocado a la diferencia 'd'. ¡Siempre es el de la derecha menos el de la izquierda!
- Creer que la sucesión $2, 4, 8, 16$ es aritmética (¡No lo es! $4-2=2$, pero $8-4=4$.
  Esa es geométrica).
fuente: Currículum Nacional MINEDUC.
estado: publicado
