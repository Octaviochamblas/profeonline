semantic_id: MAT.GEO.CIRCULO_ELEMENTOS.SECTOR_CIRCULAR_DEFINICION
titulo: Definición de sector circular como región delimitada por dos radios y un arco
objetivo: Comprender el sector circular como la región del círculo delimitada por dos radios y el arco
  comprendido entre ellos, similar a una porción de pizza o pastel.
introduccion: 'Dentro del círculo, es posible identificar regiones parciales muy características, delimitadas
  por elementos ya conocidos: los radios y los arcos.'
resumen: Un sector circular es la región del círculo delimitada por dos radios y el arco de circunferencia
  comprendido entre ellos.
explicacion: '![Sector circular: región entre dos radios y un arco](/static/img/geometria/circunferencia-circulo/circulo-sector-circular.svg)


  ### Definición formal


  Dados dos radios $OA$ y $OB$ de una circunferencia de centro $O$, el sector circular es la región plana
  delimitada por esos dos radios y el arco $\overset{\frown}{AB}$ comprendido entre ellos.


  ### Desarrollo didáctico


  Un sector circular es análogo a una porción de pizza o pastel: dos cortes rectos (los radios) desde
  el centro hasta el borde, y el arco de borde entre esos dos cortes. El tamaño del sector depende del
  ángulo entre los dos radios.'
procedimiento:
- 'Paso 1: Identifica el centro y dos radios distintos de la circunferencia.'
- 'Paso 2: Identifica el arco de circunferencia comprendido entre los extremos de esos dos radios.'
- 'Paso 3: La región delimitada por los dos radios y ese arco es el sector circular.'
ejemplos:
- titulo: Identificar un sector circular
  enunciado: Se trazan dos radios OA y OB en un círculo, junto con el arco AB entre ellos.
  solucion_pasos:
  - La región delimitada por OA, OB y el arco AB es un sector circular.
- titulo: Relacionar con una analogía cotidiana
  enunciado: Se corta una porción de pizza circular con dos cortes rectos desde el centro.
  solucion_pasos:
  - Esa porción de pizza es un ejemplo físico de sector circular.
- titulo: ¿El tamaño de un sector circular depende del ángulo entre los radios?
  respuesta: Sí
  solucion_pasos:
  - Sí, a mayor ángulo entre los radios, mayor es el sector circular resultante.
- titulo: ¿Un sector circular es una región o solo una línea?
  respuesta: Una región
  solucion_pasos:
  - Es una región (parte del círculo), no solo una línea o curva.
errores_frecuentes:
- Confundir el sector circular (una región, delimitada por dos radios y un arco) con el arco (solo la
  línea curva).
- Olvidar que el sector circular requiere DOS radios, no solo uno.
- Confundir el sector circular con el segmento circular (región delimitada por una cuerda y un arco, sin
  radios).
fuente: Elaboración propia.
estado: publicado
