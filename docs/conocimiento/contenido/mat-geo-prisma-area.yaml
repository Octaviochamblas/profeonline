semantic_id: MAT.GEO.POLIEDROS_PRISMAS.PRISMA_AREA
titulo: Cálculo del área total de un prisma recto
objetivo: Calcular el área total de un prisma recto sumando el área de sus dos bases y el área lateral
  (perímetro de la base multiplicado por la altura).
introduccion: 'El área total de un prisma se obtiene ''desenvolviendo'' su superficie: las dos bases más
  el rectángulo (o rectángulos) que forman todas las caras laterales desplegadas.'
resumen: El área total de un prisma recto es $A_T = 2\times A_{base} + P_{base}\times h$, donde $A_{base}$
  es el área de una base, $P_{base}$ su perímetro y $h$ la altura del prisma.
explicacion: '![Área total de un prisma recto](/static/img/geometria/espacio-cuerpos/prisma-area.svg)


  ### Definición formal


  El área total de un prisma recto es la suma del área de sus dos bases congruentes más el área lateral
  (la suma de las áreas de todas sus caras laterales): $A_T=2A_{base}+P_{base}\times h$, ya que el área
  lateral total equivale al perímetro de la base multiplicado por la altura.


  ### Desarrollo didáctico


  Si un prisma tiene base rectangular de 6 cm por 4 cm (área 24 cm², perímetro 20 cm) y altura 10 cm,
  su área total es $A_T=2\times24+20\times10=48+200=248$ cm².'
procedimiento:
- 'Paso 1: Calcula el área de una base (A_base) según su forma poligonal.'
- 'Paso 2: Calcula el perímetro de la base (P_base) y multiplícalo por la altura del prisma (h) para obtener
  el área lateral.'
- 'Paso 3: Suma el doble del área de la base (las dos bases) más el área lateral para obtener el área
  total.'
ejemplos:
- titulo: Calcular el área total de un prisma rectangular
  enunciado: Un prisma tiene base rectangular de 6 cm × 4 cm y altura 10 cm.
  solucion_pasos:
  - A_base=6×4=24 cm²; P_base=2(6+4)=20 cm; A_T=2×24+20×10=48+200=248 cm².
- titulo: Calcular la altura a partir del área total
  enunciado: Un prisma tiene A_base=15 cm², P_base=16 cm, y área total 190 cm².
  solucion_pasos:
  - 190=2×15+16×h → 190=30+16h → h=160/16=10 cm.
- titulo: ¿El área lateral depende del perímetro de la base?
  respuesta: Sí
  solucion_pasos:
  - Sí, el área lateral total es el perímetro de la base multiplicado por la altura del prisma.
- titulo: ¿Se debe multiplicar el área de la base solo una vez en la fórmula?
  respuesta: 'No'
  solucion_pasos:
  - No, se debe multiplicar por 2, ya que el prisma tiene dos bases congruentes (superior e inferior).
errores_frecuentes:
- Olvidar multiplicar por 2 el área de la base (considerando solo una de las dos bases).
- Confundir el perímetro de la base con su área al calcular el área lateral.
- Usar la altura del prisma en vez de la altura de la base (o viceversa) al calcular áreas.
fuente: 'Elaboración propia (referencias: Moraleja 98, Cid 181).'
estado: publicado
