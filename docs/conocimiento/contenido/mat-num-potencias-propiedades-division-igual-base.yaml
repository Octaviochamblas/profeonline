semantic_id: MAT.NUM.POTENCIAS_PROPIEDADES.DIVISION_IGUAL_BASE
objetivo: Reducir cocientes de potencias con la misma base.
introduccion: En un cociente de potencias iguales, cada factor del denominador cancela
  uno del numerador. Los factores restantes quedan registrados por la diferencia de
  exponentes.
resumen: 'Al dividir potencias de igual base no nula se restan los exponentes: \(a^m/a^n=a^{m-n}\).
  La resta cuenta los factores de la base que no se cancelan.'
explicacion: |-
  Al dividir potencias de igual base no nula se restan los exponentes: \(a^m/a^n=a^{m-n}\).

  En el caso “\(5^6/5^2=5^4=625\)” esta idea se hace visible: la resta cuenta los factores de la base que no se cancelan
procedimiento:
- 'Paso 1: Comprueba que las bases coincidan y que la base no sea cero.'
- 'Paso 2: Resta exponente del denominador al del numerador.'
- 'Paso 3: Interpreta un exponente negativo como recíproco y verifica las cancelaciones.'
ejemplos:
- titulo: Aplicación razonada — División de potencias de igual base
  enunciado: \(5^6/5^2=5^4=625\).
  solucion_pasos:
  - Comprueba que las bases coincidan y que la base no sea cero.
  - Resta exponente del denominador al del numerador.
  - Interpreta un exponente negativo como recíproco y verifica las cancelaciones.
- titulo: Revisión de una solución — División de potencias de igual base
  enunciado: Una solución aplica “Resta exponente del denominador al del numerador.”,
    pero termina sin comprobar que la resta cuenta los factores de la base que no
    se cancelan. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define división de potencias de igual base: al dividir
    potencias de igual base no nula se restan los exponentes: \(a^m/a^n=a^{m-n}\).'
  - Comprueba que las bases coincidan y que la base no sea cero.
  - 'Completa la revisión con este control: Interpreta un exponente negativo como
    recíproco y verifica las cancelaciones.'
- titulo: ¿Se cumple que la resta cuenta los factores de la base que no se cancelan?
    — División de potencias de igual base
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que al dividir potencias de igual base
    no nula se restan los exponentes: \(a^m/a^n=a^{m-n}\).'
  - El caso “\(5^6/5^2=5^4=625\)” satisface esa condición.
  - Interpreta un exponente negativo como recíproco y verifica las cancelaciones.
- titulo: ¿Es válido omitir el paso “Comprueba que las bases coincidan y que la base
    no sea cero”? — División de potencias de igual base
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de división de potencias de igual
    base.
  - 'Omitirlo puede volver inválida la acción siguiente: Resta exponente del denominador
    al del numerador.'
  - 'La solución debe terminar de este modo: Interpreta un exponente negativo como
    recíproco y verifica las cancelaciones.'
errores_frecuentes:
- 'Confundir división de potencias de igual base con otro concepto y omitir este inicio:
  Comprueba que las bases coincidan y que la base no sea cero.'
- Aplicar mecánicamente “Resta exponente del denominador al del numerador.” sin revisar
  las condiciones de la definición.
- Tomar “\(5^6/5^2=5^4=625\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la resta cuenta los factores
  de la base que no se cancelan”.
- 'Terminar el desarrollo sin realizar este control: Interpreta un exponente negativo
  como recíproco y verifica las cancelaciones.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
