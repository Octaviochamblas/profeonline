semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.LINEA_MEDIA
titulo: Línea media de una función trigonométrica transformada
objetivo: Reconocer que $y=d$ es la línea media de $f(x)=a\sin(bx)+d$, alrededor de la cual oscila la curva.
introduccion: Toda función periódica oscila de forma simétrica alrededor de una recta horizontal central, que
  sirve como referencia para describir su comportamiento.
resumen: La **línea media** de $f(x)=a\sin(bx)+d$ es la recta horizontal $y=d$, alrededor de la cual la curva
  oscila simétricamente entre $d-|a|$ y $d+|a|$.
explicacion: '### Definición formal


  Como $a\sin(bx)$ oscila entre $-|a|$ y $|a|$, sumar $d$ desplaza ese rango a $[d-|a|,d+|a|]$. La recta $y=d$
  queda exactamente en el punto medio de ese intervalo, siendo la línea media de la función.


  ### Desarrollo didáctico


  $f(x)=4\sin(x)+2$ tiene línea media $y=2$: oscila entre $2-4=-2$ y $2+4=6$, siempre a la misma distancia
  ($4$, la amplitud) por encima y por debajo de $y=2$.'
procedimiento:
- 'Paso 1: Identifica el parámetro $d$ en la forma general.'
- 'Paso 2: Reconoce que $y=d$ es la línea media de la función.'
- 'Paso 3: Calcula el rango de oscilación como $[d-|a|,d+|a|]$ si es necesario.'
ejemplos:
- titulo: Identificación de la línea media
  enunciado: '¿Cuál es la línea media de $f(x)=3\cos(x)-1$?'
  solucion_pasos:
  - Se identifica $d=-1$.
  - 'La línea media es $y=-1$.'
- titulo: Cálculo del recorrido a partir de la línea media
  enunciado: '¿Cuál es el recorrido de $f(x)=5\sin(x)+2$, usando su línea media y amplitud?'
  solucion_pasos:
  - 'Línea media $d=2$, amplitud $|a|=5$.'
  - 'El recorrido es $[2-5,2+5]=[-3,7]$.'
- titulo: ¿La línea media coincide con el eje $x$ en la función básica?
  enunciado: ¿La línea media de la función seno o coseno básica (sin transformar) coincide con el eje $x$?
  respuesta: Sí
  solucion_pasos:
  - En la función básica, $d=0$, así que la línea media es $y=0$, el eje $x$.
- titulo: ¿La línea media depende del valor de la amplitud $a$?
  enunciado: ¿La posición de la línea media depende del valor de la amplitud $a$?
  respuesta: 'No'
  solucion_pasos:
  - La línea media depende exclusivamente del parámetro $d$, no de $a$.
errores_frecuentes:
- Confundir la línea media con el valor máximo o mínimo de la función.
- No calcular correctamente el recorrido combinando línea media y amplitud.
- Suponer que la línea media depende del parámetro $b$ o de $a$.
- Confundir la línea media con el desplazamiento horizontal.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
