titulo: InterpretaciĂ³n del signo de h en la traslaciĂ³n horizontal
objetivo: Interpretar correctamente el signo de $h$ en $(x-h)^2$ para determinar la direcciĂ³n de la traslaciĂ³n
  horizontal.
introduccion: El signo de $h$ es la fuente mĂ¡s comĂºn de confusiĂ³n al trabajar con traslaciones horizontales, porque
  su efecto es "contraintuitivo" a primera vista.
resumen: En $g(x)=(x-h)^2$, si $h>0$ la parĂ¡bola se traslada hacia la **derecha**; si $h<0$, se traslada hacia
  la **izquierda**; el efecto es opuesto al signo que aparece dentro del parĂ©ntesis.
explicacion: '### DefiniciĂ³n formal


  Dada $g(x)=(x-h)^2$: para $h>0$, la grĂ¡fica de $f(x)=x^2$ se desplaza $h$ unidades a la derecha; para $h<0$,
  se desplaza $|h|$ unidades a la izquierda. Es fundamental identificar $h$ reescribiendo el binomio en la forma
  $(x-h)$, no leyendo directamente el signo que aparece en la expresiĂ³n.


  ### Desarrollo didĂ¡ctico


  El punto clave es que $(x+3)$ debe reescribirse como $(x-(-3))$ para identificar $h=-3$; el signo "+" dentro
  del parĂ©ntesis corresponde a una traslaciĂ³n hacia la **izquierda**, no hacia la derecha como podrĂ­a parecer
