  Para $g(x)=(x+2)^2$: reescribiendo, $h=-2$, por lo que la parĂ¡bola se traslada $2$ unidades hacia la izquierda,
  no hacia la derecha.'
procedimiento:
- 'Paso 1: Reescribe el binomio en la forma exacta $(x-h)$.'
- 'Paso 2: Si $h>0$, concluye que la traslaciĂ³n es hacia la derecha.'
- 'Paso 3: Si $h<0$, concluye que la traslaciĂ³n es hacia la izquierda.'
