semantic_id: MAT.GEO.TRIG_NOTABLES.RAZONES_45_GRADOS
titulo: Razones trigonométricas del ángulo de 45°
objetivo: Determinar las razones trigonométricas exactas del ángulo de 45°, a partir de un triángulo rectángulo
  isósceles.
introduccion: El ángulo de 45° aparece en un triángulo rectángulo isósceles (con ambos catetos iguales),
  lo que permite calcular sus razones trigonométricas de forma exacta.
resumen: 'En un triángulo rectángulo isósceles con catetos de longitud 1, la hipotenusa mide $\sqrt{2}$,
  de donde: $\sin45°=\cos45°=\dfrac{1}{\sqrt{2}}=\dfrac{\sqrt{2}}{2}$ y $\tan45°=1$.'
explicacion: '![Razones trigonométricas de 45°](/static/img/geometria/trigonometria/razon-notable-45-grados.svg)


  ### Definición formal


  En un triángulo rectángulo isósceles, ambos catetos miden lo mismo (por ejemplo, 1), y por el teorema
  de Pitágoras la hipotenusa mide $\sqrt{1^2+1^2}=\sqrt{2}$. Como los dos ángulos agudos son iguales (45°
  cada uno), $\sin45°=\cos45°=\dfrac{1}{\sqrt2}=\dfrac{\sqrt2}{2}\approx0{,}707$, y $\tan45°=\dfrac{1}{1}=1$.


  ### Desarrollo didáctico


  Este triángulo notable (45°-45°-90°) es uno de los dos triángulos base para memorizar los valores trigonométricos
  exactos, junto con el triángulo 30°-60°-90°.'
procedimiento:
- 'Paso 1: Dibuja un triángulo rectángulo isósceles con ambos catetos de longitud 1.'
- 'Paso 2: Calcula la hipotenusa usando el teorema de Pitágoras: √(1²+1²)=√2.'
- 'Paso 3: Aplica las definiciones de seno, coseno y tangente usando estas tres medidas (1, 1, √2).'
ejemplos:
- titulo: Calcular el seno de 45°
  enunciado: En el triángulo isósceles, cateto opuesto=1, hipotenusa=√2.
  solucion_pasos:
  - sin45°=1/√2=√2/2≈0,707.
- titulo: Calcular la tangente de 45°
  enunciado: En el triángulo isósceles, ambos catetos miden 1.
  solucion_pasos:
  - tan45°=1/1=1.
- titulo: ¿El seno y el coseno de 45° son iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque los dos catetos del triángulo isósceles son iguales, dando el mismo valor para ambas razones.
- titulo: ¿La tangente de 45° es exactamente 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que el cateto opuesto y el adyacente son iguales, su cociente es exactamente 1.
errores_frecuentes:
- Olvidar racionalizar la fracción 1/√2, dejándola sin simplificar a √2/2.
- Confundir el valor de tan45° con el de sin45° o cos45°.
- Aplicar el teorema de Pitágoras incorrectamente al calcular la hipotenusa.
fuente: 'Elaboración propia (referencias: Moraleja 177, Cid 156).'
estado: publicado
