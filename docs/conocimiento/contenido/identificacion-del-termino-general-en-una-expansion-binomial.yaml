semantic_id: MAT.ALG.GENERALIZACIONES_PRODUCTOS.TERMINO_GENERAL
titulo: Identificación del término general en una expansión binomial
objetivo: Calcular un término específico del desarrollo de un binomio sin tener que desarrollarlo todo.
introduccion: Es hora de sacar provecho del Binomio de Newton para evitar trabajo excesivo.
resumen: 'El **término general** (el término que ocupa el lugar $k+1$) en el desarrollo de $(a+b)^n$ es:

  $T_{k+1} = \binom{n}{k} a^{n-k} b^k$'
explicacion: '### Definición formal


  En el desarrollo $(a+b)^n = \sum_{k=0}^{n} \binom{n}{k} a^{n-k} b^k$, el sumando indexado por $k$ ocupa
  la posición $k+1$ del desarrollo y se denota $T_{k+1} = \binom{n}{k} a^{n-k} b^k$. Para hallar el término
  que ocupa la posición $m$, basta evaluar la fórmula con $k = m - 1$.


  ### Desarrollo didáctico


  Cuando desarrollamos un binomio elevado a una potencia alta como $(a+b)^{12}$, muchas veces no nos interesa
  expandir todo el polinomio (que tendría 13 términos), sino que un problema nos pedirá encontrar **un
  término en específico**, como el quinto término.


  Para evitar hacer todo el desarrollo, utilizamos la fórmula del **Término General**, derivada directamente
  del Binomio de Newton.


  **Fórmula del Término de posición $(k+1)$:**

  $$T_{k+1} = \binom{n}{k} a^{n-k} b^k$$


  **¿Cómo funciona esta fórmula?**

  1. **$n$:** Es el exponente global del binomio original.

  2. **$k$:** Cuidado aquí. El valor de $k$ es siempre **uno menos** que la posición que buscas. Si te
  piden el 5º término ($T_5$), entonces debes usar $k=4$. Si te piden el término 8, usas $k=7$.

  3. **El Coeficiente $\binom{n}{k}$:** Es una combinatoria.

  4. **Las potencias:** El primer término interno ($a$) queda elevado a la diferencia $(n-k)$, y el segundo
  término interno ($b$) se eleva directamente a $k$.


  Esta fórmula es el equivalente a un francotirador algebraico: apunta y calcula exactamente lo que necesitas
  sin esfuerzo extra.'
procedimiento:
- 'Paso 1: Para buscar el término $m$-ésimo:'
- 'Paso 2: Establece $k = m - 1$.'
- 'Paso 3: Identifica $n, a, b$ del binomio.'
- 'Paso 4: Reemplaza en la fórmula $T_{k+1}$.'
- 'Paso 5: Resuelve el número combinatorio y simplifica las potencias de las bases.'
- $k=2$. $\binom{5}{2} = 10$. El término es $10 (x)^{5-2} (2)^2 = 10 x^3 (4) = 40x^3$.
ejemplos:
- titulo: Búsqueda del 3er término
  enunciado: Halla el tercer término del desarrollo de $(2x - y)^4$.
  solucion_pasos:
  - Tercer término implica $k = 2$. Además $n = 4$, $a = 2x$, $b = -y$.
  - $T_{3} = \binom{4}{2} (2x)^{4-2} (-y)^2$.
  - $\binom{4}{2} = 6$.
  - $T_{3} = 6 (2x)^2 (y^2) = 6(4x^2)(y^2) = 24x^2y^2$.
- titulo: Halla el tercer término del desarrollo de $(x + 2)^5$
  enunciado: 'Halla el tercer término del desarrollo de $(x + 2)^5$.


    Opciones: A) $40x^3$ · B) $10x^3$ · C) $20x^2$ · D) $80x^2$'
  solucion_pasos:
  - $k=2$. $\binom{5}{2} = 10$. El término es $10 (x)^{5-2} (2)^2 = 10 x^3 (4) = 40x^3$.
  - 'Respuesta: $40x^3$'
- titulo: 'Respecto de «Identificación del término general en una expansión binomial»: ¿Es correcta est'
  enunciado: 'Respecto de «Identificación del término general en una expansión binomial»: ¿Es correcta
    esta caracterización? «El **término general** (el término que ocupa el lugar $k+1$) en el desarrollo
    de $(a+b)^n$ es: $T_{k+1} = \binom{n}{k} a^{n-k} b^k$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **término general** (el término que ocupa el
    lugar $k+1$) en el desarrollo de $(a+b)^n$ es: $T_{k+1} = \binom{n}{k} a^{n-k} b^k$'
- titulo: 'Respecto de «Identificación del término general en una expansión binomial»: ¿Es válida esta'
  enunciado: 'Respecto de «Identificación del término general en una expansión binomial»: ¿Es válida esta
    afirmación? «No aplicar la potencia de $a$ o $b$ al coeficiente numérico interno de la base (ej. decir
    que $(2x)^2$ es $2x^2$ en lugar de $4x^2$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **término general** (el término que ocupa el
    lugar $k+1$) en el desarrollo de $(a+b)^n$ es: $T_{k+1} = \binom{n}{k} a^{n-k} b^k$'
errores_frecuentes:
- No aplicar la potencia de $a$ o $b$ al coeficiente numérico interno de la base (ej. decir que $(2x)^2$
  es $2x^2$ en lugar de $4x^2$).
- Para «Halla el tercer término del desarrollo de $(x + 2)^5$.», la respuesta correcta es $10x^3$.
- Para «Halla el tercer término del desarrollo de $(x + 2)^5$.», la respuesta correcta es $20x^2$.
- Para «Halla el tercer término del desarrollo de $(x + 2)^5$.», la respuesta correcta es $80x^2$.
- La afirmación «$40x^3$» no es válida en este contenido.
