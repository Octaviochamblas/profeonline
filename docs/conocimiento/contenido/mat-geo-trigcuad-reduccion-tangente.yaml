semantic_id: MAT.GEO.TRIG_CUADRANTES.REDUCCION_TANGENTE
titulo: Reducción de la tangente al primer cuadrante usando ángulo de referencia
objetivo: Calcular la tangente de un ángulo no agudo expresándola en función de la tangente de su ángulo
  de referencia, con el signo correspondiente al cuadrante.
introduccion: La tangente de cualquier ángulo puede obtenerse a partir de la tangente de su ángulo de
  referencia (agudo), ajustando el signo según el cuadrante (positivo en I y III, negativo en II y IV).
resumen: 'La tangente de un ángulo $\theta$ es igual a la tangente de su ángulo de referencia $\alpha$,
  con el signo correspondiente al cuadrante de $\theta$: $\tan\theta=\pm\tan\alpha$.'
explicacion: '![Reducción de la tangente al primer cuadrante](/static/img/geometria/trigonometria/trigcuad-reduccion-tangente.svg)


  ### Definición formal


  Si $\alpha$ es el ángulo de referencia de $\theta$, entonces $|\tan\theta|=\tan\alpha$, y el signo de
  $\tan\theta$ se determina según el cuadrante de $\theta$ (positivo en I y III, negativo en II y IV).


  ### Desarrollo didáctico


  Para $\theta=120°$ (segundo cuadrante), el ángulo de referencia es $\alpha=60°$. Como la tangente es
  negativa en el segundo cuadrante, $\tan120°=-\tan60°=-\sqrt3$.'
procedimiento:
- 'Paso 1: Calcula el ángulo de referencia α del ángulo θ dado.'
- 'Paso 2: Calcula tanα usando los valores conocidos de ángulos notables o agudos.'
- 'Paso 3: Asigna el signo correspondiente al cuadrante de θ para obtener tanθ=±tanα.'
ejemplos:
- titulo: Calcular tan(120°) usando el ángulo de referencia
  enunciado: θ=120°, α=60°, segundo cuadrante.
  solucion_pasos:
  - tan120°=-tan60°=-√3, negativo porque la tangente es negativa en el segundo cuadrante.
- titulo: Calcular tan(240°) usando el ángulo de referencia
  enunciado: θ=240°, α=60°, tercer cuadrante.
  solucion_pasos:
  - tan240°=+tan60°=√3, positivo porque la tangente es positiva en el tercer cuadrante.
- titulo: ¿El valor absoluto de tanθ es igual al de tanα?
  respuesta: Sí
  solucion_pasos:
  - Sí, |tanθ|=tanα siempre, solo cambia el signo según el cuadrante.
- titulo: ¿La tangente de un ángulo del cuarto cuadrante es positiva?
  respuesta: 'No'
  solucion_pasos:
  - No, la tangente es negativa en el cuarto cuadrante.
errores_frecuentes:
- Olvidar aplicar el signo correspondiente al cuadrante del ángulo original.
- Calcular mal el ángulo de referencia antes de aplicar la reducción.
- Intentar aplicar esta reducción a ángulos cuadrantales donde la tangente no está definida (90°, 270°).
fuente: Elaboración propia.
estado: publicado
