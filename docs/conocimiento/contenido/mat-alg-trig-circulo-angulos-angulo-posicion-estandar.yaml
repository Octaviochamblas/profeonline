semantic_id: MAT.ALG.TRIG_CIRCULO_ANGULOS.ANGULO_POSICION_ESTANDAR
titulo: Ángulo en posición estándar
objetivo: Reconocer las condiciones que definen un ángulo en posición estándar dentro del plano cartesiano.
introduccion: Para poder comparar ángulos de forma sistemática, la trigonometría fija una convención sobre dónde
  debe ubicarse el vértice y el lado inicial de cualquier ángulo.
resumen: Un ángulo está en **posición estándar** cuando su vértice coincide con el origen y su lado inicial
  coincide con el semieje positivo $x$.
explicacion: '### Definición formal


  Un ángulo $\theta$ está en posición estándar si su vértice es el origen $(0,0)$ y su lado inicial coincide
  con el semieje positivo del eje $x$. El lado terminal se obtiene rotando el lado inicial alrededor del origen
  según la medida y el sentido del ángulo.


  ### Desarrollo didáctico


  Un ángulo de $45°$ en posición estándar tiene su vértice en el origen, su lado inicial sobre el semieje
  positivo $x$, y su lado terminal a medio camino entre los semiejes positivos $x$ e $y$, dentro del primer
  cuadrante.'
procedimiento:
- 'Paso 1: Verifica que el vértice del ángulo esté en el origen.'
- 'Paso 2: Verifica que el lado inicial coincida con el semieje positivo $x$.'
- 'Paso 3: Si ambas condiciones se cumplen, el ángulo está en posición estándar.'
ejemplos:
- titulo: Verificación de un ángulo en posición estándar
  enunciado: '¿Está en posición estándar un ángulo con vértice en el origen y lado inicial sobre el semieje
    positivo $x$?'
  solucion_pasos:
  - Se verifican ambas condiciones de la definición.
  - Sí, cumple con la definición de posición estándar.
- titulo: Detección de un ángulo que no está en posición estándar
  enunciado: '¿Está en posición estándar un ángulo con vértice en $(2,3)$?'
  solucion_pasos:
  - El vértice no coincide con el origen.
  - No, no está en posición estándar.
- titulo: ¿El lado terminal debe coincidir siempre con un eje?
  enunciado: ¿El lado terminal de un ángulo en posición estándar debe coincidir siempre con alguno de los ejes
    coordenados?
  respuesta: 'No'
  solucion_pasos:
  - El lado terminal puede ubicarse en cualquier dirección, salvo en los ángulos cuadrantales específicos.
- titulo: ¿Puede un ángulo en posición estándar tener medida negativa?
  enunciado: ¿Puede un ángulo en posición estándar medirse en sentido negativo (horario)?
  respuesta: Sí
  solucion_pasos:
  - La posición estándar solo exige vértice en el origen y lado inicial en el semieje positivo $x$, no restringe el sentido.
errores_frecuentes:
- Confundir la posición estándar con la ubicación específica del lado terminal.
- Suponer que el vértice puede estar en cualquier punto, no solo en el origen.
- No verificar que el lado inicial coincida exactamente con el semieje positivo $x$.
- Creer que solo los ángulos positivos pueden estar en posición estándar.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
