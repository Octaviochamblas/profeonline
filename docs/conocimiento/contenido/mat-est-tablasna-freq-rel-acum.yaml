semantic_id: MAT.EST.TABLAS_NO_AGRUPADAS.FREQ_REL_ACUM
titulo: Calcular la frecuencia relativa acumulada
objetivo: Calcular la frecuencia relativa acumulada (Fr) como el cociente entre la frecuencia absoluta
  acumulada y el número total de datos.
introduccion: La frecuencia relativa acumulada combina los conceptos de acumulación y proporción, permitiendo
  interpretar posiciones relativas dentro del conjunto.
resumen: La frecuencia relativa acumulada de un valor es el cociente entre su frecuencia absoluta acumulada
  (F) y el total de datos (n).
explicacion: '![Frecuencia relativa acumulada](/static/img/estadistica/tablasna/tablasna-freq-rel-acum.svg)


  ### Definición formal


  $Fr_i=\dfrac{F_i}{n}$, donde $F_i$ es la frecuencia absoluta acumulada hasta el valor $x_i$ y $n$ el
  total de datos.


  ### Desarrollo didáctico


  Si $F(6)=6$ y $n=10$, la frecuencia relativa acumulada es $Fr(6)=6/10=0{,}6$, indicando que el 60% de
  los datos son menores o iguales que 6.'
procedimiento:
- 'Paso 1: Calcula (o identifica) la frecuencia absoluta acumulada (F) del valor.'
- 'Paso 2: Identifica el número total de datos (n) del conjunto.'
- 'Paso 3: Divide F por n para obtener la frecuencia relativa acumulada.'
ejemplos:
- titulo: Calcular Fr(6) con F(6)=6, n=10
  enunciado: F(6)=6, n=10.
  solucion_pasos:
  - Fr(6)=6/10=0,6.
- titulo: Calcular Fr(2) con F(2)=9, n=20
  enunciado: F(2)=9, n=20.
  solucion_pasos:
  - Fr(2)=9/20=0,45.
- titulo: ¿La última frecuencia relativa acumulada de una tabla siempre es igual a 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que la última frecuencia absoluta acumulada es igual a n, dando Fr=n/n=1.
- titulo: ¿La frecuencia relativa acumulada puede disminuir a medida que aumenta x?
  respuesta: 'No'
  solucion_pasos:
  - No, es siempre creciente o constante, al igual que la frecuencia absoluta acumulada.
errores_frecuentes:
- Confundir la frecuencia relativa acumulada con la frecuencia relativa simple de cada valor.
- Dividir por un valor incorrecto de n al calcular la frecuencia relativa acumulada.
- No verificar que la última frecuencia relativa acumulada sea igual a 1.
fuente: 'Elaboración propia (referencia: Moraleja 198, 351).'
estado: publicado
