semantic_id: MAT.EST.PERCENTILES.TABLA_FRECUENCIA
titulo: Determinar percentiles en tablas de frecuencia simple
objetivo: Determinar el valor de un percentil específico a partir de una tabla de frecuencias, usando
  la frecuencia acumulada para localizar la posición correspondiente.
introduccion: Al igual que con la mediana, cuando los datos están en una tabla de frecuencias se usa la
  frecuencia acumulada para ubicar directamente el percentil.
resumen: En una tabla de frecuencias, el percentil k es el valor x cuya frecuencia acumulada (F) alcanza
  o supera por primera vez la posición (k×n)/100.
explicacion: '![Percentiles en tablas de frecuencia](/static/img/estadistica/percentil/percentil-tabla-frecuencia.svg)


  ### Definición formal


  Se busca el primer valor $x_i$ cuya frecuencia acumulada $F_i$ sea mayor o igual a la posición $(k\times
  n)/100$ calculada.


  ### Desarrollo didáctico


  Con x=4,F=3; x=5,F=8; x=6,F=15 (n=15), para el percentil 40: posición=(40×15)/100=6; F=8 (en x=5) es
  la primera en alcanzar o superar 6, por lo que P40=5.'
procedimiento:
- 'Paso 1: Calcula la posición del percentil k usando (k×n)/100.'
- 'Paso 2: Observa la columna de frecuencia acumulada (F) de la tabla.'
- 'Paso 3: Identifica el primer valor x cuya F alcance o supere esa posición; ese valor es el percentil
  buscado.'
ejemplos:
- titulo: Calcular el percentil 40 con tabla de 3 valores
  enunciado: x=4,f=3,F=3; x=5,f=5,F=8; x=6,f=7,F=15 (n=15).
  solucion_pasos:
  - Posición=(40×15)/100=6. F=8 (x=5) es la primera en alcanzar la posición 6. P40=5.
- titulo: Calcular el percentil 80 con tabla de notas
  enunciado: x=4,F=5; x=5,F=15; x=6,F=25; x=7,F=30 (n=30).
  solucion_pasos:
  - Posición=(80×30)/100=24. F=25 (x=6) es la primera en alcanzar 24. P80=6.
- titulo: ¿Se usa la frecuencia acumulada (F), no la absoluta simple (f), para ubicar un percentil en
    una tabla?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la columna clave para este procedimiento, igual que con la mediana.
- titulo: ¿El percentil 50 calculado en una tabla debería coincidir aproximadamente con la mediana de
    la misma tabla?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos representan conceptualmente la misma posición central.
errores_frecuentes:
- Buscar la posición en la columna de frecuencia absoluta simple (f) en vez de la acumulada (F).
- Calcular incorrectamente la posición (k×n)/100 antes de buscarla en la tabla.
- No revisar toda la tabla en orden antes de determinar cuál es el primer valor que cumple la condición
  buscada.
fuente: 'Elaboración propia (referencia: Moraleja 378).'
estado: publicado
