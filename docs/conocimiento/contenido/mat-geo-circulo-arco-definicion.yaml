semantic_id: MAT.GEO.CIRCULO_ELEMENTOS.ARCO_DEFINICION
titulo: Definición de arco de circunferencia
objetivo: Comprender el arco como una porción continua de la circunferencia comprendida entre dos de sus
  puntos.
introduccion: Al igual que un segmento de recta puede ser una parte de una recta completa, existe un concepto
  análogo para porciones de la circunferencia.
resumen: Un arco de circunferencia es una porción continua de la circunferencia, delimitada por dos de
  sus puntos.
explicacion: '![Arco de circunferencia](/static/img/geometria/circunferencia-circulo/circulo-arco-definicion.svg)


  ### Definición formal


  Dados dos puntos $A$ y $B$ de una circunferencia, el arco $\overset{\frown}{AB}$ es la porción de la
  circunferencia comprendida entre esos dos puntos (existen en realidad dos arcos posibles entre ellos,
  el menor y el mayor, que juntos forman la circunferencia completa).


  ### Desarrollo didáctico


  Dos puntos cualesquiera de una circunferencia siempre determinan dos arcos: uno más corto y otro más
  largo (a menos que ambos puntos sean diametralmente opuestos, en cuyo caso ambos arcos son iguales,
  llamados semicircunferencias).'
procedimiento:
- 'Paso 1: Identifica dos puntos distintos sobre la circunferencia.'
- 'Paso 2: Considera la porción continua de la circunferencia entre esos dos puntos.'
- 'Paso 3: Esa porción es un arco (hay dos arcos posibles: el menor y el mayor).'
ejemplos:
- titulo: Identificar un arco
  enunciado: Se marcan dos puntos A y B en una circunferencia.
  solucion_pasos:
  - La porción de la circunferencia entre A y B (en cualquiera de los dos sentidos) es un arco.
- titulo: Reconocer los dos arcos posibles
  enunciado: ¿Cuántos arcos determinan dos puntos distintos en una circunferencia?
  solucion_pasos:
  - 'Dos arcos: uno menor (más corto) y uno mayor (más largo), salvo que sean diametralmente opuestos.'
- titulo: ¿Un arco es un segmento de recta?
  respuesta: 'No'
  solucion_pasos:
  - No, un arco es una porción curva de la circunferencia, no un segmento recto.
- titulo: ¿La cuerda y el arco entre los mismos dos puntos son lo mismo?
  respuesta: 'No'
  solucion_pasos:
  - No, la cuerda es el segmento recto que une los puntos; el arco es la porción curva de la circunferencia.
errores_frecuentes:
- Confundir el arco (curvo) con la cuerda (recta) entre los mismos dos puntos.
- Olvidar que dos puntos determinan dos arcos posibles (menor y mayor), no solo uno.
- Creer que un arco es lo mismo que un sector circular (que es una región, no una línea).
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
