semantic_id: MAT.EST.GRAFICOS_BASE.CIRCULAR_ANGULOS
titulo: Calcular el ángulo central de un sector en un gráfico circular
objetivo: Calcular el ángulo central de cada sector de un gráfico circular a partir de la proporción que
  representa dentro del total de 360 grados.
introduccion: Para construir un gráfico circular con precisión, se necesita traducir cada porcentaje o
  proporción en un ángulo específico dentro del círculo completo.
resumen: El ángulo central de un sector se calcula multiplicando la proporción (fracción decimal) que
  representa la categoría por los 360° totales del círculo.
explicacion: '![Cálculo del ángulo central](/static/img/estadistica/grafbase/grafbase-circular-angulos.svg)


  ### Definición formal


  $\theta_i=fr_i\times360°$, donde $fr_i$ es la frecuencia relativa (proporción) de la categoría $i$.


  ### Desarrollo didáctico


  Si una categoría representa el 25% de los datos, su ángulo central es $\theta=0{,}25\times360°=90°$,
  es decir, un cuarto del círculo completo.'
procedimiento:
- 'Paso 1: Calcula la frecuencia relativa (proporción) de la categoría, dividiendo su frecuencia por el
  total de datos.'
- 'Paso 2: Multiplica esa proporción por 360°.'
- 'Paso 3: Ese resultado es el ángulo central del sector correspondiente a esa categoría.'
ejemplos:
- titulo: Calcular el ángulo central para 25% de los datos
  enunciado: Una categoría representa el 25% del total.
  solucion_pasos:
  - θ=0,25×360°=90°.
- titulo: Calcular el ángulo central para 12 de 40 datos
  enunciado: Una categoría tiene 12 datos de un total de 40.
  solucion_pasos:
  - fr=12/40=0,3. θ=0,3×360°=108°.
- titulo: ¿La suma de los ángulos centrales de todos los sectores debe ser 360°?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que en conjunto cubren el círculo completo, que mide 360°.
- titulo: ¿Se puede calcular el ángulo central directamente desde la frecuencia absoluta, sin calcular
    primero la relativa?
  respuesta: Sí
  solucion_pasos:
  - Sí, mediante θ=(f/n)×360°, combinando ambos pasos en una sola fórmula.
errores_frecuentes:
- Olvidar multiplicar por 360° después de calcular la proporción, dejando el resultado como una fracción
  decimal.
- Calcular la proporción con el denominador incorrecto (usar otro valor en vez del total de datos n).
- No verificar que la suma de todos los ángulos centrales sea igual a 360°.
fuente: 'Elaboración propia (referencia: Baldor 401).'
estado: publicado
