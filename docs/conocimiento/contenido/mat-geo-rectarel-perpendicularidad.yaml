semantic_id: MAT.GEO.RECTA_RELACIONES.PERPENDICULARIDAD
titulo: Aplicación del producto de pendientes igual a -1 en rectas perpendiculares
objetivo: Aplicar el criterio de que dos rectas son perpendiculares si y solo si el producto de sus pendientes
  es igual a -1.
introduccion: 'Cuando dos rectas se cruzan formando un ángulo recto, sus pendientes cumplen una relación
  algebraica muy específica: ser recíprocas y de signo opuesto entre sí.'
resumen: Dos rectas $y=m_1x+b_1$ y $y=m_2x+b_2$ (no verticales) son perpendiculares si y solo si $m_1\cdot
  m_2=-1$.
explicacion: '![Rectas perpendiculares](/static/img/geometria/analitica/rectarel-perpendicularidad.svg)


  ### Definición formal


  Dos rectas no verticales son perpendiculares si y solo si el producto de sus pendientes es $-1$: $m_1\cdot
  m_2=-1$, equivalentemente $m_2=-\dfrac{1}{m_1}$.


  ### Desarrollo didáctico


  Las rectas $y=x$ (m=1) e $y=-x$ (m=-1) son perpendiculares, ya que $1\times(-1)=-1$, formando un ángulo
  recto en su intersección (el origen).'
procedimiento:
- 'Paso 1: Identifica las pendientes de ambas rectas.'
- 'Paso 2: Multiplica ambas pendientes.'
- 'Paso 3: Si el producto es exactamente -1, las rectas son perpendiculares.'
ejemplos:
- titulo: Verificar la perpendicularidad entre y=x e y=-x
  enunciado: m1=1, m2=-1.
  solucion_pasos:
  - 1×(-1)=-1, por lo que las rectas son perpendiculares.
- titulo: Calcular la pendiente perpendicular a una recta dada
  enunciado: Una recta tiene m=4.
  solucion_pasos:
  - La pendiente perpendicular es m2=-1/4, ya que 4×(-1/4)=-1.
- titulo: ¿El producto de las pendientes de rectas perpendiculares es siempre -1?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición exacta que define la perpendicularidad (para rectas no verticales).
- titulo: ¿Una recta horizontal y una vertical son perpendiculares entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, aunque el criterio del producto de pendientes no aplica directamente (la vertical no tiene pendiente),
    geométricamente sí forman un ángulo recto.
errores_frecuentes:
- Calcular la pendiente perpendicular como el recíproco sin cambiar el signo (olvidando el signo negativo).
- Confundir la condición de perpendicularidad (producto=-1) con la de paralelismo (pendientes iguales).
- Aplicar la fórmula del producto de pendientes a una recta vertical, que no tiene pendiente numérica.
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
