semantic_id: MAT.ALG.SIMILARIDAD.TERMINOS_NO_SEMEJANTES
objetivo: Identificar términos que no cumplen los criterios de semejanza y dejarlos
  expresados como suma o resta irreducible.
introduccion: En álgebra, hay un instinto compulsivo de querer juntar todo en una
  sola 'bola'. Pero a veces, la respuesta correcta es dejar las cosas exactamente
  como están.
resumen: Cuando los **Términos No son Semejantes** (difieren en letras o exponentes),
  es algebraicamente imposible agruparlos mediante sumas o restas. La expresión se
  considera **irreducible** en ese aspecto.
explicacion: 'Si te piden sumar $2x$ y $3y$, la respuesta final y definitiva es $2x
  + 3y$.

  Si te piden sumar $x^2$ y $x$, la respuesta final es $x^2 + x$.

  No hay ninguna regla mágica que los funda en algo como $5xy$ o $2x^3$. Forzar una
  reducción donde no hay semejanza es destruir las reglas matemáticas fundamentales.
  La frontera queda trazada: lo que no es igual, no se mezcla en la suma.'
procedimiento:
- 'Paso 1: Aplica el test de semejanza (mismas letras, mismos exponentes).'
- 'Paso 2: Si el test falla, los términos no son semejantes.'
- 'Paso 3: Para sumar o restar, simplemente escribe un término al lado del otro conectado
  por su signo.'
- 'Paso 4: Declara que la expresión está en su forma más simple (irreducible).'
ejemplos:
- titulo: Forzando la mezcla
  enunciado: 'Reduce si es posible: 8a^3 - 5a^2.'
  solucion_pasos:
  - 'Analizamos: tienen la letra ''a'', pero uno es al cubo y otro al cuadrado.'
  - 'Veredicto: No son semejantes.'
  - 'Conclusión: La expresión no se puede reducir. Queda 8a^3 - 5a^2.'
errores_frecuentes:
- Juntar las letras de términos que se suman (ej. $2a + 3b = 5ab$). ¡Eso sería si
  estuvieran multiplicando!
- Sumar los exponentes al sumar bases iguales (ej. $x^2 + x^3 = x^5$).
fuente: Álgebra de Baldor.
estado: publicado
