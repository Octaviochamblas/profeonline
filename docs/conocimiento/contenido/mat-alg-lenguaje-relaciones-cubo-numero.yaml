semantic_id: MAT.ALG.LENGUAJE_RELACIONES.CUBO_NUMERO
objetivo: Traducir correctamente la operación de elevar al cubo en contraposición
  a multiplicar por tres.
introduccion: Si el cuadrado era el área de una figura plana, el cubo nos da el volumen,
  la tercera dimensión. Es un crecimiento exponencial aún más acelerado.
resumen: El **Cubo de un Número** se traduce elevando la variable a la potencia de
  tres ($x^3$). Representa el volumen de un cubo de arista $x$, o el producto del
  número por sí mismo tres veces ($x \cdot x \cdot x$).
explicacion: 'Al igual que con el cuadrado, no debemos confundir el múltiplo con la
  potencia:

  - ''El triple de un número'' $\rightarrow$ $3x$ (multiplicación).

  - ''El cubo de un número'' $\rightarrow$ $x^3$ (potenciación).


  Y la regla de los paréntesis sigue siendo sagrada:

  - ''El cubo de la diferencia'' $\rightarrow$ $(x - y)^3$.

  - ''La diferencia de los cubos'' $\rightarrow$ $x^3 - y^3$.'
procedimiento:
- 'Paso 1: Identifica a qué entidad se le está aplicando el ''cubo''.'
- 'Paso 2: Si es a una variable simple, agrégale el exponente 3 ($a^3$).'
- 'Paso 3: Si es a un polinomio o a un resultado de una operación (ej. la suma de
  dos números), agrupa primero la operación entre paréntesis y pon el exponente 3
  fuera del grupo ($(a+b)^3$).'
ejemplos:
- titulo: Volumen algebraico
  enunciado: 'Traduce algebraicamente: ''El cubo de la suma entre un número y dos''.'
  solucion_pasos:
  - 'La base que será elevada es la suma de un número y dos: (x + 2).'
  - Se nos pide 'el cubo' de toda esa suma.
  - 'Traducción correcta: (x + 2)^3.'
errores_frecuentes:
- Confundir el triple ($3x$) con el cubo ($x^3$).
- 'Escribir mal el orden de operaciones por falta de paréntesis. (Ej: ''el cubo del
  doble de x'' escrito como $2x^3$ en lugar de $(2x)^3$).'
fuente: Álgebra de Baldor.
estado: publicado
