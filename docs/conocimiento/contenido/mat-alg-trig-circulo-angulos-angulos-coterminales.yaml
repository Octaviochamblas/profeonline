semantic_id: MAT.ALG.TRIG_CIRCULO_ANGULOS.ANGULOS_COTERMINALES
titulo: Ángulos coterminales
objetivo: Reconocer que dos ángulos son coterminales si comparten el mismo lado terminal, y calcular ángulos
  coterminales sumando o restando múltiplos de $360°$.
introduccion: Un mismo punto del círculo unitario puede alcanzarse dando distinta cantidad de vueltas, lo que da
  origen a familias de ángulos que comparten la misma posición final.
resumen: Dos ángulos son **coterminales** si tienen el mismo lado terminal; se obtienen sumando o restando
  múltiplos de $360°$ (o $2\pi$ radianes) a un ángulo dado.
explicacion: '### Definición formal


  Los ángulos $\theta$ y $\theta+360°k$ (con $k\in\mathbb{Z}$) son coterminales, ya que sumar o restar vueltas
  completas no cambia la posición final del lado terminal. En radianes, la relación equivalente es
  $\theta+2\pi k$.


  ### Desarrollo didáctico


  El ángulo $30°$ es coterminal con $390°$ ($30°+360°$), con $-330°$ ($30°-360°$), y con $750°$
  ($30°+2\cdot360°$). Todos comparten el mismo lado terminal y, por lo tanto, el mismo punto en el círculo
  unitario.'
procedimiento:
- 'Paso 1: Identifica el ángulo original $\theta$.'
- 'Paso 2: Suma o resta un múltiplo de $360°$ (o $2\pi$ radianes) para obtener un ángulo coterminal.'
- 'Paso 3: Verifica que el resultado comparta el mismo lado terminal que el ángulo original.'
ejemplos:
- titulo: Cálculo de un ángulo coterminal positivo
  enunciado: 'Encuentra un ángulo coterminal con $50°$ sumando una vuelta completa.'
  solucion_pasos:
  - 'Se suma $360°$: $50°+360°=410°$.'
  - '$410°$ es coterminal con $50°$.'
- titulo: Cálculo de un ángulo coterminal negativo
  enunciado: 'Encuentra un ángulo coterminal con $80°$ restando una vuelta completa.'
  solucion_pasos:
  - 'Se resta $360°$: $80°-360°=-280°$.'
  - '$-280°$ es coterminal con $80°$.'
- titulo: ¿$400°$ y $40°$ son ángulos coterminales?
  enunciado: ¿Los ángulos $400°$ y $40°$ son coterminales entre sí?
  respuesta: Sí
  solucion_pasos:
  - '$400°-360°=40°$, así que ambos comparten el mismo lado terminal.'
- titulo: ¿Dos ángulos coterminales tienen siempre el mismo valor numérico?
  enunciado: ¿Dos ángulos coterminales deben tener necesariamente el mismo valor numérico?
  respuesta: 'No'
  solucion_pasos:
  - Difieren en un múltiplo de $360°$, aunque compartan el mismo lado terminal.
errores_frecuentes:
- Sumar o restar un valor distinto de $360°$ (o $2\pi$) al buscar ángulos coterminales.
- Confundir ángulos coterminales con ángulos suplementarios o complementarios.
- No verificar que el resultado final comparta efectivamente el mismo lado terminal.
- Mezclar unidades, sumando grados a un ángulo expresado en radianes sin convertir primero.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
