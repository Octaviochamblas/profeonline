semantic_id: MAT.ALG.FRACCIONES_RESTA.CAMBIO_SIGNOS_NUMERADOR
titulo: Cambio de signos en el numerador sustraído
objetivo: Ejecutar la eliminación de paréntesis tras una resta para simplificar el numerador.
introduccion: El trabajo no termina al plantear la resta con su paréntesis protector. Hay que abrir las
  puertas y dejar que el signo negativo haga su trabajo destructivo/constructivo.
resumen: Al quitar el paréntesis del segundo numerador en una resta, todos y cada uno de los términos
  dentro del paréntesis deben invertir su signo matemático.
explicacion: '### Definición formal


  Es la definición de la distribución de un signo negativo.


  ### Desarrollo didáctico


  La mecánica del cambio de signos es tu escudo protector al operar el numerador de una resta.


  Veámoslo en cámara lenta:

  Tienes la expresión en el numerador: $x^2 - 3x - (2x^2 - 5x + 1)$.


  El signo menos actúa como un ''inversor universal'' multiplicando por $-1$.

  - El $2x^2$ positivo se voltea a $-2x^2$.

  - El $-5x$ negativo se voltea a $+5x$.

  - El $+1$ positivo se voltea a $-1$.


  El numerador sin paréntesis queda: $x^2 - 3x - 2x^2 + 5x - 1$.

  Ahora puedes reducir términos semejantes tranquilo. Si dominas esto sistemáticamente sin saltarte pasos,
  serás invulnerable en las restas algebraicas.'
procedimiento:
- 'Paso 1: Observa el polinomio que está precedido por el signo menos (o por un número negativo).'
- 'Paso 2: Reescribe el polinomio completo, cambiando los + por - y los - por +.'
- 'Paso 3: Si había un número multiplicando (ej. $-4(x+2)$), distribuye el número con todo y su signo
  negativo.'
ejemplos:
- titulo: 'Limpia el numerador: $5x - (3x^2 - 4x + 1)$'
  enunciado: 'Limpia el numerador: $5x - (3x^2 - 4x + 1)$.'
  solucion_pasos:
  - El $3x^2$ sale como $-3x^2$.
  - El $-4x$ sale como $+4x$.
  - El $+1$ sale como $-1$.
  - 'Resultado: $5x - 3x^2 + 4x - 1 = -3x^2 + 9x - 1$.'
- titulo: Distribuye el menos en $- ( -2a - 3b )$.
  solucion_pasos:
  - Menos por menos da más en ambos casos.
- titulo: 'Respecto de «Cambio de signos en el numerador sustraído»: ¿Es correcta esta caracterización?'
  enunciado: 'Respecto de «Cambio de signos en el numerador sustraído»: ¿Es correcta esta caracterización?
    «Al quitar el paréntesis del segundo numerador en una resta, todos y cada uno de los términos dentro
    del paréntesis deben invertir su signo matemático»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al quitar el paréntesis del segundo numerador en
    una resta, todos y cada uno de los términos dentro del paréntesis deben invertir su signo matemático.'
- titulo: 'Respecto de «Cambio de signos en el numerador sustraído»: ¿Es válida esta afirmación? «Inver'
  enunciado: 'Respecto de «Cambio de signos en el numerador sustraído»: ¿Es válida esta afirmación? «Invertir
    el signo solo del primer término y copiar el resto igual (el error clásico)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al quitar el paréntesis del segundo numerador en
    una resta, todos y cada uno de los términos dentro del paréntesis deben invertir su signo matemático.'
errores_frecuentes:
- Invertir el signo solo del primer término y copiar el resto igual (el error clásico).
- Restando solo el primer término.
- Para «Cuando tienes un signo de resta delante de un polinomio entre paréntesis, matemáticamente estás:»,
  la respuesta correcta es Dividiendo el polinomio entre 1.
- Elevando todo a -1.
- $x^2 - 5x$.
