semantic_id: MAT.GEO.CARTESIANO_BASE.PAR_ORDENADO
titulo: Concepto de par ordenado en el plano cartesiano
objetivo: Reconocer el par ordenado como la notación (x,y) que representa la posición única de un punto
  en el plano cartesiano.
introduccion: 'Un par ordenado es como una dirección postal de dos partes: primero indica cuánto avanzar
  horizontalmente, y luego cuánto avanzar verticalmente.'
resumen: Un par ordenado es una pareja de números $(x,y)$ que representa la posición única de un punto
  en el plano cartesiano, donde $x$ es la abscisa y $y$ es la ordenada.
explicacion: '![Concepto de par ordenado](/static/img/geometria/cartesiano-vectores/cartesiano-par-ordenado.svg)


  ### Definición formal


  Un par ordenado $(x,y)$ representa un punto único en el plano cartesiano: $x$ (la abscisa) indica la
  posición horizontal respecto del origen, e $y$ (la ordenada) indica la posición vertical. El orden importa:
  $(3,2)$ y $(2,3)$ representan puntos distintos.


  ### Desarrollo didáctico


  En la figura, el punto marcado corresponde al par ordenado $(3,2)$: se avanza 3 unidades horizontalmente
  (abscisa) y 2 unidades verticalmente (ordenada) desde el origen.'
procedimiento:
- 'Paso 1: Identifica el primer número del par ordenado, la abscisa (x), que indica el desplazamiento
  horizontal desde el origen.'
- 'Paso 2: Identifica el segundo número del par ordenado, la ordenada (y), que indica el desplazamiento
  vertical desde el origen.'
- 'Paso 3: Recuerda que el orden de los números importa: (x,y) no es lo mismo que (y,x), salvo que sean
  iguales.'
ejemplos:
- titulo: Interpretar un par ordenado
  enunciado: El par ordenado (3,2) representa un punto en el plano.
  solucion_pasos:
  - Significa avanzar 3 unidades en el eje X (abscisa) y 2 unidades en el eje Y (ordenada) desde el origen.
- titulo: Comparar dos pares ordenados distintos
  enunciado: Se comparan los pares (4,7) y (7,4).
  solucion_pasos:
  - 'Son pares ordenados distintos, ya que representan puntos diferentes: el orden de los números importa.'
- titulo: ¿El primer número de un par ordenado siempre representa la abscisa?
  respuesta: Sí
  solucion_pasos:
  - Sí, por convención, el primer número de (x,y) es siempre la abscisa y el segundo la ordenada.
- titulo: ¿(5,3) y (3,5) representan el mismo punto?
  respuesta: 'No'
  solucion_pasos:
  - No, salvo casos especiales, representan puntos distintos porque el orden de las coordenadas importa.
errores_frecuentes:
- Invertir el orden de las coordenadas, confundiendo la abscisa con la ordenada.
- Creer que (x,y) y (y,x) representan siempre el mismo punto.
- Olvidar que un par ordenado representa una posición única en el plano, no dos posiciones distintas.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Baldor 292, Santillana 13).'
estado: publicado
