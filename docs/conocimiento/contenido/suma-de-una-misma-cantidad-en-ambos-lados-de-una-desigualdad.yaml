semantic_id: MAT.ALG.DESIG_PROPIEDADES.SUMA_MISMA_CANTIDAD
titulo: Suma de una misma cantidad en ambos lados de una desigualdad
objetivo: Aplicar la propiedad de la suma de una misma cantidad a ambos lados de una desigualdad para
  mantener la relación de orden.
introduccion: Al resolver problemas con desigualdades, a menudo necesitamos despejar una variable. Sumar
  una misma cantidad a ambos lados es una operación fundamental que preserva la desigualdad original.
resumen: Si se suma el mismo valor en ambos miembros de una desigualdad, el sentido de la misma no se
  altera.
explicacion: '### Definición formal

  Sean $a, b, c \in \mathbb{R}$. Si $a < b$, entonces $a + c < b + c$. Esta propiedad aplica de manera
  análoga para $>, \leq$ y $\geq$.


  ### Desarrollo didáctico

  Al igual que en una balanza, si tienes un lado más liviano que otro y agregas exactamente el mismo peso
  en ambos lados, el lado que era más liviano seguirá siéndolo.'
procedimiento:
- Identificar la desigualdad original.
- Determinar la cantidad que se sumará a ambos lados.
- Sumar dicha cantidad en el lado izquierdo y derecho.
- Simplificar ambos miembros manteniendo el mismo signo de desigualdad.
ejemplos:
- titulo: Despeje de variable
  enunciado: Resuelva la desigualdad $x - 5 > 2$.
  solucion_pasos:
  - 'Sumar $5$ a ambos lados: $x - 5 + 5 > 2 + 5$.'
  - Simplificar para obtener $x > 7$.
- titulo: Inecuación con términos negativos
  enunciado: Resuelva $y - 3 \leq -1$.
  solucion_pasos:
  - 'Sumar $3$ a ambos lados: $y - 3 + 3 \leq -1 + 3$.'
  - 'Simplificar: $y \leq 2$.'
- titulo: ¿Se mantiene la desigualdad si sumamos $4$ a ambos lados de $-2 < 5$?
  respuesta: Sí
  solucion_pasos:
  - 'Sumar $4$: $-2 + 4 < 5 + 4$.'
  - 'Resultado: $2 < 9$, lo cual es verdadero.'
- titulo: ¿El sentido de la desigualdad cambia al sumar una cantidad negativa?
  respuesta: 'No'
  solucion_pasos:
  - Sumar una cantidad negativa es equivalente a restar.
  - La propiedad establece que sumar cualquier número real, ya sea positivo o negativo, no cambia el sentido
    de la desigualdad.
errores_frecuentes:
- Sumar una cantidad a un solo lado mantiene la desigualdad.
- Sumar un número negativo invierte el sentido de la desigualdad.
- Solo se pueden sumar números enteros a una desigualdad.
- La propiedad no aplica para desigualdades con $\geq$.
- Si $x < y$, entonces $x + 2 > y + 2$.
