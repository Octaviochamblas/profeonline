semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.DEFINICION_FUNCIONAL
titulo: Definición de la función coseno
objetivo: Comprender $f(x)=\cos(x)$ como una función que asigna a cada número real $x$ (interpretado como
  ángulo) la coordenada $x$ de su punto asociado en el círculo unitario.
introduccion: Igual que con el seno, el coseno se convierte en función tratando su argumento como cualquier
  número real, no solo como un ángulo entre $0°$ y $360°$.
resumen: La **función coseno** $f(x)=\cos(x)$ asigna a cada número real $x$, interpretado como un ángulo en
  radianes, la coordenada $x$ del punto correspondiente en el círculo unitario.
explicacion: '### Definición formal


  $f:\mathbb{R}\to\mathbb{R}$, $f(x)=\cos(x)$, donde $x$ se interpreta como la medida en radianes de un ángulo
  en posición estándar, y $f(x)$ es la coordenada $x$ del punto donde el lado terminal corta al círculo
  unitario.


  ### Desarrollo didáctico


  $f(0)=\cos(0)=1$; $f(\pi/2)=\cos(\pi/2)=0$; $f(\pi)=\cos(\pi)=-1$. A diferencia del seno, que comienza en
  $0$, el coseno comienza en su valor máximo.'
procedimiento:
- 'Paso 1: Interpreta el valor de $x$ como una medida angular en radianes.'
- 'Paso 2: Ubica el punto correspondiente en el círculo unitario.'
- 'Paso 3: Lee la coordenada $x$ de ese punto como el valor de $f(x)$.'
ejemplos:
- titulo: Evaluación de la función coseno en un valor simple
  enunciado: 'Evalúa $f(x)=\cos(x)$ en $x=\pi$.'
  solucion_pasos:
  - Se interpreta $\pi$ como un ángulo de $180°$.
  - 'Se obtiene $f(\pi)=-1$.'
- titulo: Evaluación de la función coseno en cero
  enunciado: 'Evalúa $f(x)=\cos(x)$ en $x=0$.'
  solucion_pasos:
  - El punto asociado a $0$ radianes es $(1,0)$.
  - 'Se obtiene $f(0)=1$.'
- titulo: ¿El coseno, como el seno, se interpreta habitualmente en radianes en el análisis funcional?
  enunciado: ¿En el análisis funcional de $f(x)=\cos(x)$, el argumento $x$ se interpreta habitualmente en
    radianes?
  respuesta: Sí
  solucion_pasos:
  - Es la convención estándar al tratar el coseno como función de variable real.
- titulo: ¿La función coseno está definida para cualquier número real?
  enunciado: ¿La función $f(x)=\cos(x)$ está definida para cualquier valor real de $x$?
  respuesta: Sí
  solucion_pasos:
  - Todo número real puede interpretarse como una medida angular en radianes.
errores_frecuentes:
- Confundir grados con radianes al evaluar la función.
- Suponer que el coseno comienza en $0$, confundiéndolo con el seno.
- No relacionar el valor de $f(x)$ con la coordenada $x$ del círculo unitario.
- Olvidar que $x$ puede tomar valores negativos o mayores que $2\pi$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
