semantic_id: MAT.ALG.MODELAMIENTO_DESIGUALDADES
titulo: Modelamiento con desigualdades
objetivo: Traducir restricciones de situaciones reales a desigualdades o sistemas de desigualdades, resolverlos e interpretar sus soluciones de acuerdo con el contexto del problema.
introduccion: Modelar con desigualdades significa pasar desde una condición verbal a una relación matemática que exprese límites, mínimos, máximos, rangos permitidos o restricciones simultáneas. Ese paso conecta el lenguaje cotidiano con el razonamiento algebraico.
resumen: El modelamiento con desigualdades consiste en definir variables, identificar restricciones cuantitativas y representarlas mediante inecuaciones cuyo conjunto solución describe los valores admisibles en el contexto.
explicacion: |-
  ### Definición formal
  El modelamiento con desigualdades es el proceso de representar matemáticamente condiciones de orden, cota o restricción mediante una o más inecuaciones. Su propósito es describir el conjunto de valores que satisface las exigencias de una situación dada y permitir su análisis algebraico e interpretación contextual.

  ### Desarrollo didáctico
  En este tipo de problemas no basta con resolver una expresión simbólica: primero hay que decidir qué representa la variable, qué cantidades están limitadas y de qué forma actúa cada restricción. Palabras como “al menos”, “a lo sumo”, “no supera”, “debe exceder” o “debe mantenerse entre” orientan la traducción al símbolo adecuado. La parte final también es clave: una solución algebraicamente correcta puede no ser válida en el contexto si contradice una condición física, práctica o de dominio.
procedimiento:
  - Definir con claridad la variable y las magnitudes involucradas en la situación.
  - Identificar las restricciones presentes en el enunciado y traducir cada una mediante el signo de desigualdad correspondiente.
  - Formular una inecuación o un sistema de inecuaciones que represente fielmente la situación.
  - Resolver el modelo obtenido usando las propiedades algebraicas apropiadas.
  - Interpretar el conjunto solución en el contexto y descartar valores incompatibles con la realidad del problema.
ejemplos:
  - titulo: Presupuesto máximo
    enunciado: Una persona dispone de $\$24000$ para comprar cuadernos de $\$1500$ cada uno. Modele la situación y determine cuántos puede comprar como máximo.
    solucion_pasos:
      - Si $x$ es la cantidad de cuadernos, el costo total se expresa como $1500x$.
      - Como el gasto no puede superar $\$24000$, se plantea $1500x\le 24000$.
      - Al dividir por $1500$, se obtiene $x\le 16$.
      - En el contexto, la interpretación útil es que puede comprar como máximo $16$ cuadernos.
  - titulo: Rango permitido de concentración
    enunciado: La concentración $c$ de una solución debe mantenerse entre $12\%$ y $18\%$, incluyendo ambos extremos. Exprese la restricción y represente la solución.
    solucion_pasos:
      - La expresión “entre” con inclusión de extremos se traduce como una inecuación doble.
      - Se formula $12\le c\le 18$.
      - El conjunto solución corresponde al intervalo cerrado $[12,18]$.
      - En el contexto, cualquier concentración fuera de ese rango incumple la condición del problema.
  - titulo: ¿Una solución negativa puede aceptarse siempre que satisfaga la inecuación?
    respuesta: Falso
    solucion_pasos:
      - En modelamiento, la validez no depende solo del álgebra sino también del significado de la variable.
      - Si la variable representa una cantidad física, tiempo, masa o número de objetos, puede existir una restricción adicional de no negatividad.
      - Por eso algunas soluciones algebraicas deben descartarse al interpretar el problema.
  - titulo: ¿Expresiones como “a lo sumo” y “como máximo” se asocian con $\le$?
    respuesta: Verdadero
    solucion_pasos:
      - Ambas expresiones indican que el valor buscado no puede exceder una cota superior.
      - Matemáticamente eso se representa con una desigualdad del tipo menor o igual.
      - Reconocer estas frases es esencial para construir correctamente el modelo.
errores_frecuentes:
  - Elegir una variable sin definir con precisión qué cantidad representa.
  - Traducir expresiones verbales como “al menos” o “a lo sumo” con el signo incorrecto.
  - Resolver bien la inecuación, pero omitir la interpretación contextual del resultado.
  - Aceptar soluciones negativas o no enteras cuando el problema impone restricciones adicionales.
  - Modelar solo una parte de la situación y dejar fuera una restricción relevante del enunciado.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
