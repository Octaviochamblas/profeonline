semantic_id: MAT.ALG.FUNC_POTENCIA_ENTERA_POSITIVA.MONOTONIA_IMPAR
titulo: Monotonía de la función potencia con exponente impar
objetivo: Describir el comportamiento de crecimiento o decrecimiento de $f(x)=a\cdot x^n$ cuando $n$ es un
  entero positivo impar.
introduccion: A diferencia del caso par, con exponente impar la función mantiene el mismo comportamiento en todo
  su dominio, sin puntos de cambio.
resumen: Si $n$ es impar y $a>0$, $f(x)=a\cdot x^n$ es **estrictamente creciente en todo $\mathbb{R}$**; si
  $a<0$, es **estrictamente decreciente en todo $\mathbb{R}$**.
explicacion: '### Definición formal


  Para $n$ impar y $a>0$, si $x_1<x_2$, entonces $x_1^n<x_2^n$ (por ser $n$ impar, la potencia conserva el orden
  incluso con signos distintos), y al multiplicar por $a>0$ se conserva la desigualdad: $f(x_1)<f(x_2)$. Si
  $a<0$, la desigualdad se invierte, resultando en una función decreciente.


  ### Desarrollo didáctico


  Con $f(x)=x^3$: $f(-2)=-8$, $f(-1)=-1$, $f(0)=0$, $f(1)=1$, $f(2)=8$. Los valores aumentan de forma continua
  conforme $x$ aumenta, sin ningún tramo donde la función retroceda.'
procedimiento:
- 'Paso 1: Verifica que $n$ sea impar y determina el signo de $a$.'
- 'Paso 2: Si $a>0$, concluye que la función es creciente en todo $\mathbb{R}$.'
- 'Paso 3: Si $a<0$, concluye que la función es decreciente en todo $\mathbb{R}$.'
ejemplos:
- titulo: Monotonía de $f(x)=x^3$
  enunciado: 'Describe la monotonía de $f(x)=x^3$.'
  solucion_pasos:
  - Con $a=1>0$ y $n=3$ impar.
  - La función es estrictamente creciente en todo $\mathbb{R}$.
- titulo: Monotonía de $f(x)=-2x^5$
  enunciado: 'Describe la monotonía de $f(x)=-2x^5$.'
  solucion_pasos:
  - Con $a=-2<0$ y $n=5$ impar.
  - La función es estrictamente decreciente en todo $\mathbb{R}$.
- titulo: ¿$f(x)=x^5$ tiene algún tramo donde deje de ser creciente?
  enunciado: ¿La función $f(x)=x^5$ presenta algún intervalo donde no sea creciente?
  respuesta: 'No'
  solucion_pasos:
  - Es estrictamente creciente en todo su dominio, sin excepciones.
- titulo: ¿La monotonía de una función con exponente impar cambia en algún punto, como ocurre con exponente par?
  enunciado: ¿Existe un punto donde cambie el comportamiento de crecimiento/decrecimiento en una función con
    exponente impar?
  respuesta: 'No'
  solucion_pasos:
  - A diferencia del exponente par, no hay ningún punto de cambio: el comportamiento es uniforme en todo $\mathbb{R}$.
errores_frecuentes:
- Aplicar el análisis de monotonía par (con cambio en $x=0$) a una función con exponente impar.
- Confundir la condición de crecimiento (relacionada con el signo de $a$) con la del recorrido.
- Suponer que la función tiene puntos mínimos o máximos que interrumpen su monotonía.
- No verificar el signo de $a$ antes de determinar si es creciente o decreciente.
