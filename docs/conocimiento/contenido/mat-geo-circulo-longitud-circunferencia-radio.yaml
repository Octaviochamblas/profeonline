semantic_id: MAT.GEO.CIRCULO_METRICA.LONGITUD_CIRCUNFERENCIA_RADIO
titulo: Cálculo de la longitud de la circunferencia usando 2πr
objetivo: Calcular la longitud (perímetro) de una circunferencia a partir de su radio, usando la fórmula
  2πr.
introduccion: Toda circunferencia tiene una longitud total (la medida de su contorno completo), que se
  relaciona de forma directa y constante con su radio.
resumen: La longitud de una circunferencia de radio $r$ es $L=2\pi r$.
explicacion: '![Longitud de la circunferencia: 2πr](/static/img/geometria/circunferencia-circulo/circulo-longitud-circunferencia-radio.svg)


  ### Definición formal


  La longitud (perímetro) de una circunferencia de radio $r$ es $L=2\pi r$, donde $\pi\approx3,1416$ es
  una constante matemática que relaciona la longitud de cualquier circunferencia con su diámetro.


  ### Desarrollo didáctico


  Una circunferencia de radio 5 cm tiene longitud $L=2\times\pi\times5=10\pi\approx31,42$ cm. Esta fórmula
  es universal: aplica a cualquier circunferencia, sin importar su tamaño, siempre que se use el mismo
  valor de $r$.'
procedimiento:
- 'Paso 1: Identifica el radio r de la circunferencia.'
- 'Paso 2: Multiplica el radio por 2.'
- 'Paso 3: Multiplica ese resultado por π (usando 3,14 o 3,1416 como aproximación) para obtener la longitud.'
ejemplos:
- titulo: Calcular la longitud con radio conocido
  enunciado: Una circunferencia tiene radio 5 cm.
  solucion_pasos:
  - L=2×π×5=10π≈31,42 cm.
- titulo: Calcular el radio a partir de la longitud
  enunciado: Una circunferencia tiene longitud 62,8 cm (aproximadamente).
  solucion_pasos:
  - r=62,8/(2π)≈62,8/6,28≈10 cm.
- titulo: ¿Esta fórmula usa el radio o el diámetro?
  respuesta: El radio
  solucion_pasos:
  - Usa el radio directamente; existe una fórmula equivalente usando el diámetro (πd).
- titulo: ¿π es un número exacto?
  respuesta: 'No'
  solucion_pasos:
  - No, π es un número irracional; en los cálculos se usa una aproximación, como 3,14 o 3,1416.
errores_frecuentes:
- Olvidar multiplicar por 2 (usar solo πr en vez de 2πr).
- Confundir esta fórmula (longitud) con la del área del círculo (πr²).
- Usar el diámetro en lugar del radio sin ajustar la fórmula correspondiente.
fuente: 'Fuente: Moraleja 73, Cid 32, 248.'
estado: publicado
