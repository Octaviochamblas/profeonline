semantic_id: MAT.GEO.ISOMETRIA_TRASLACION.VECTOR_TRASLACION_MAGNITUD
titulo: Interpretación de la magnitud del vector traslación
objetivo: Interpretar la magnitud (módulo) del vector traslación como la distancia total que se desplaza
  cada punto de la figura durante la traslación.
introduccion: La magnitud del vector traslación indica 'qué tan lejos' se mueve la figura, sin importar
  la dirección específica del desplazamiento.
resumen: La magnitud (o módulo) del vector traslación $\vec{v}=(a,b)$ es $|\vec{v}|=\sqrt{a^2+b^2}$, y
  representa la distancia real que se desplaza cada punto de la figura.
explicacion: '![Magnitud del vector traslación](/static/img/geometria/isometrias/vector-traslacion-magnitud.svg)


  ### Definición formal


  Si el vector traslación es $\vec{v}=(a,b)$, su magnitud es $|\vec{v}|=\sqrt{a^2+b^2}$. Esta magnitud
  representa la distancia (en las mismas unidades del plano) que recorre cada punto de la figura durante
  la traslación.


  ### Desarrollo didáctico


  Si el vector traslación es $\vec{v}=(3,4)$, su magnitud es $|\vec{v}|=\sqrt{3^2+4^2}=\sqrt{25}=5$: cada
  punto de la figura se desplaza exactamente 5 unidades de distancia.'
procedimiento:
- 'Paso 1: Identifica las componentes del vector traslación v=(a,b).'
- 'Paso 2: Aplica la fórmula |v|=√(a²+b²) para calcular la magnitud.'
- 'Paso 3: Interpreta ese resultado como la distancia real que se desplaza cada punto de la figura.'
ejemplos:
- titulo: Calcular la magnitud de un vector traslación
  enunciado: El vector traslación es v=(3,4).
  solucion_pasos:
  - '|v|=√(3²+4²)=√25=5; cada punto se desplaza 5 unidades.'
- titulo: Interpretar la magnitud de una traslación puramente horizontal
  enunciado: El vector traslación es v=(6,0).
  solucion_pasos:
  - '|v|=√(6²+0²)=6; la figura se desplaza exactamente 6 unidades horizontalmente.'
- titulo: ¿La magnitud del vector traslación depende de la dirección del desplazamiento?
  respuesta: 'No'
  solucion_pasos:
  - No, la magnitud solo mide la distancia total, sin importar hacia dónde apunte el vector.
- titulo: ¿Todos los puntos de la figura se desplazan la misma distancia?
  respuesta: Sí
  solucion_pasos:
  - Sí, al ser el mismo vector traslación para toda la figura, todos los puntos recorren exactamente esa
    misma distancia.
errores_frecuentes:
- Confundir la magnitud del vector con una sola de sus componentes.
- Olvidar sacar la raíz cuadrada al final del cálculo de la magnitud.
- Creer que puntos distintos de la figura pueden desplazarse distancias diferentes en una misma traslación.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 126).'
estado: publicado
