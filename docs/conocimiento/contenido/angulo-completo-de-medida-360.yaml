semantic_id: MAT.GEO.ANGULOS_CLASIFICACION.COMPLETO
titulo: Ángulo completo de medida 360°
objetivo: Clasificar un ángulo a partir de su medida y comprobar que volver a la dirección inicial no
  significa medir 0°, sino haber recorrido un giro total.
introduccion: 'Cuando una rueda da una vuelta y apunta otra vez en la misma dirección, el movimiento no
  desaparece: completó un giro entero. Para resolver situaciones de ángulo completo de medida 360° conviene
  mirar el dibujo con método, no solo por intuición.'
resumen: Un ángulo completo mide 360° y corresponde a un giro entero. Como idea de control, volver a la
  dirección inicial no significa medir 0°, sino haber recorrido un giro total.
explicacion: 'Un ángulo completo mide 360° y corresponde a un giro entero.


  La situación “dar una vuelta completa y volver al mismo rayo inicial produce 360°” muestra cómo pasar
  del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se verifica que
  volver a la dirección inicial no significa medir 0°, sino haber recorrido un giro total.'
procedimiento:
- 'Paso 1: Lee o estima la abertura del ángulo en grados.'
- 'Paso 2: Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.'
- 'Paso 3: Asigna el nombre correcto y revisa que no contradiga el dibujo.'
ejemplos:
- titulo: Aplicación directa — Ángulo completo
  enunciado: Dar una vuelta completa y volver al mismo rayo inicial produce 360°.
  solucion_pasos:
  - Lee o estima la abertura del ángulo en grados.
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: Corrección de una respuesta — Ángulo completo
  enunciado: 'Revisa una solución del caso “dar una vuelta completa y volver al mismo rayo inicial produce
    360°”: el resultado parece razonable, pero falta conectar el dibujo con la definición. Explica esa
    conexión.'
  solucion_pasos:
  - 'Parte de la definición: un ángulo completo mide 360° y corresponde a un giro entero.'
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Puede concluirse correctamente este hecho? — Ángulo completo
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo completo mide 360° y corresponde
    a un giro entero.'
  - En el caso “dar una vuelta completa y volver al mismo rayo inicial produce 360°” se observa que volver
    a la dirección inicial no significa medir 0°, sino haber recorrido un giro total.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Basta con lee o estima la abertura del ángulo en grados? — Ángulo completo
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulo completo de medida 360°.
  - Después del paso “Lee o estima la abertura del ángulo en grados.” todavía hace falta revisar “Compara
    la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
  - El cierre correcto exige “Asigna el nombre correcto y revisa que no contradiga el dibujo.”.
errores_frecuentes:
- Ángulo completo significa ser idéntico a un ángulo nulo porque ambos terminan en la misma dirección.
- Para resolver ángulo completo, basta con el paso “Lee o estima la abertura del ángulo en grados.” y
  no hace falta revisar “Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
- Si el dibujo parece claro, se puede ignorar que volver a la dirección inicial no significa medir 0°,
  sino haber recorrido un giro total.
- Dos configuraciones distintas representan ángulo completo solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Asigna el nombre correcto y revisa que no
  contradiga el dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
