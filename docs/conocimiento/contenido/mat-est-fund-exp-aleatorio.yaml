semantic_id: MAT.EST.PROBA_FUNDAMENTOS.EXP_ALEATORIO
titulo: Definición de experimento aleatorio como situación con resultado incierto
objetivo: Definir un experimento aleatorio como aquel proceso cuyo resultado no se puede predecir con
  certeza antes de realizarlo, aunque se conozcan todos sus posibles resultados.
introduccion: 'Muchas situaciones cotidianas (lanzar una moneda, tirar un dado, sacar una carta) comparten
  una característica: no sabemos qué resultado ocurrirá exactamente, aunque sí sabemos cuáles son todos
  los resultados posibles.'
resumen: Un experimento aleatorio es un proceso o acción cuyo resultado no puede predecirse con certeza
  antes de realizarse, aunque se conozca el conjunto de todos sus resultados posibles.
explicacion: '![Experimento aleatorio](/static/img/probabilidad/fundamentos/fund-exp-aleatorio.svg)


  ### Definición formal


  Un experimento aleatorio es aquel que, repetido bajo las mismas condiciones, puede dar resultados distintos,
  y cuyo resultado específico no se puede anticipar con certeza antes de ejecutarlo.


  ### Desarrollo didáctico


  Al lanzar un dado, sabemos que el resultado será uno de {1,2,3,4,5,6}, pero no podemos saber cuál específicamente
  ocurrirá antes de lanzarlo: por eso es un experimento aleatorio.'
procedimiento:
- 'Paso 1: Identifica la acción o proceso que se está realizando.'
- 'Paso 2: Verifica si el resultado se puede predecir con certeza antes de realizar la acción.'
- 'Paso 3: Si no se puede predecir con certeza (aunque se conozcan los resultados posibles), es un experimento
  aleatorio.'
ejemplos:
- titulo: Reconocer un experimento aleatorio con un dado
  enunciado: Se lanza un dado de seis caras.
  solucion_pasos:
  - No se puede predecir qué número saldrá antes de lanzarlo, por lo que es un experimento aleatorio.
- titulo: Reconocer un experimento aleatorio con una moneda
  enunciado: Se lanza una moneda al aire.
  solucion_pasos:
  - No se puede saber con certeza si saldrá cara o sello antes de lanzarla, por lo que es un experimento
    aleatorio.
- titulo: ¿El resultado de un experimento aleatorio se puede predecir con certeza?
  respuesta: 'No'
  solucion_pasos:
  - No, esa imposibilidad de predicción exacta es justamente lo que lo define como aleatorio.
- titulo: ¿Se deben conocer todos los resultados posibles para clasificar un experimento como aleatorio?
  respuesta: Sí
  solucion_pasos:
  - Sí, aunque no se sepa cuál ocurrirá, se debe poder listar el conjunto de resultados posibles.
errores_frecuentes:
- Confundir un experimento aleatorio con uno determinista, donde el resultado siempre es el mismo.
- Creer que un experimento aleatorio no tiene resultados posibles conocidos.
- Pensar que la aleatoriedad implica que cualquier resultado es igual de probable (no siempre es así).
fuente: 'Elaboración propia (referencia: Moraleja 403).'
estado: publicado
