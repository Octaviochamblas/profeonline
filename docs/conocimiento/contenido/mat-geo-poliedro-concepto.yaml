semantic_id: MAT.GEO.POLIEDROS_PRISMAS.POLIEDRO_CONCEPTO
titulo: Concepto de poliedro como cuerpo geométrico limitado por caras planas
objetivo: Reconocer el poliedro como un cuerpo geométrico tridimensional cuya superficie está formada
  exclusivamente por polígonos planos.
introduccion: 'Un poliedro es como una caja o una piedra tallada: un cuerpo sólido cuya superficie exterior
  está formada completamente por caras planas, sin curvas.'
resumen: Un poliedro es un cuerpo geométrico del espacio limitado por un número finito de caras planas
  poligonales, que se unen entre sí formando aristas y vértices.
explicacion: '![Concepto de poliedro](/static/img/geometria/espacio-cuerpos/poliedro-concepto.svg)


  ### Definición formal


  Un poliedro es un cuerpo geométrico tridimensional cuya frontera (superficie) está compuesta exclusivamente
  por un número finito de polígonos planos, llamados caras. Estas caras se encuentran en segmentos llamados
  aristas, y las aristas se encuentran en puntos llamados vértices.


  ### Desarrollo didáctico


  En la figura, el prisma rectangular es un ejemplo de poliedro: toda su superficie está formada por seis
  caras planas (rectángulos), sin ninguna superficie curva. Un cuerpo con al menos una superficie curva
  (como un cilindro o una esfera) no es un poliedro.'
procedimiento:
- 'Paso 1: Observa la superficie completa del cuerpo geométrico en cuestión.'
- 'Paso 2: Verifica que todas las caras sean polígonos planos, sin ninguna superficie curva.'
- 'Paso 3: Si se cumple esa condición, el cuerpo es un poliedro.'
ejemplos:
- titulo: Verificar si un cuerpo es un poliedro
  enunciado: Un cubo tiene sus seis caras formadas por cuadrados planos.
  solucion_pasos:
  - El cubo es un poliedro, ya que toda su superficie está formada por polígonos planos (cuadrados).
- titulo: Reconocer un cuerpo que NO es un poliedro
  enunciado: Un cilindro tiene dos caras circulares planas y una superficie lateral curva.
  solucion_pasos:
  - El cilindro NO es un poliedro, porque su superficie lateral es curva, no un polígono plano.
- titulo: ¿Todas las caras de un poliedro deben ser polígonos planos?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la condición que define a un poliedro.
- titulo: ¿Una pirámide (con base poligonal y caras triangulares) es un poliedro?
  respuesta: Sí
  solucion_pasos:
  - Sí, todas sus caras (la base y los triángulos laterales) son polígonos planos.
errores_frecuentes:
- Confundir poliedros con cuerpos que tienen alguna superficie curva (como cilindros, conos o esferas).
- Creer que un poliedro debe tener necesariamente todas sus caras iguales (eso aplica solo a los poliedros
  regulares).
- No verificar que TODAS las caras sean planas, aceptando erróneamente cuerpos con una sola cara curva.
fuente: 'Elaboración propia (referencias: Moraleja 96, Cid 167).'
estado: publicado
