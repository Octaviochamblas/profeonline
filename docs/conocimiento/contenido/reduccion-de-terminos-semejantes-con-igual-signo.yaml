semantic_id: MAT.ALG.REDUCCION_OPERATIVA.MISMO_SIGNO
titulo: Reducción de términos semejantes con igual signo
objetivo: Reducir términos semejantes que tienen el mismo signo, sumando sus coeficientes.
introduccion: Cuando en una expresión algebraica aparecen varios términos que son de la misma familia
  y además tienen el mismo signo (todos positivos o todos negativos), reducirlos es tan simple como contar.
resumen: La **Reducción de Mismo Signo** consiste en sumar los valores absolutos de los coeficientes cuando
  todos los términos semejantes tienen el mismo signo, manteniendo ese signo en el resultado.
explicacion: '### Definición formal


  La reducción de semejantes es una suma de coeficientes. El factor literal no cambia.


  ### Desarrollo didáctico


  Considera $3x + 5x + 2x$.

  Todos son de la familia $x$ y todos son positivos.

  Sumamos los coeficientes: $3 + 5 + 2 = 10$.

  El resultado es $10x$.


  En el caso negativo: $-4a - 7a$.

  Ambos son de la familia $a$ y ambos son negativos.

  Sumamos los valores absolutos: $4 + 7 = 11$.

  Como todos eran negativos, el resultado conserva el signo negativo: $-11a$.'
procedimiento:
- 'Paso 1: Identifica los términos semejantes (misma parte literal).'
- 'Paso 2: Verifica que todos tienen el mismo signo.'
- 'Paso 3: Suma los coeficientes numéricamente.'
- 'Paso 4: Adjunta el signo común al resultado y mantén el factor literal intacto.'
ejemplos:
- titulo: Triple acumulación positiva
  enunciado: 'Reduce: 6b + 4b + b.'
  solucion_pasos:
  - Todos son de la familia b y todos son positivos.
  - El coeficiente de b sin número es 1.
  - 'Sumamos: 6 + 4 + 1 = 11.'
  - 'Resultado: 11b.'
- titulo: 'Un almacén recibe tres partidas de cajas del mismo tipo: $12c$ cajas en la mañana, $20c$ al'
  enunciado: 'Un almacén recibe tres partidas de cajas del mismo tipo: $12c$ cajas en la mañana, $20c$
    al mediodía y $8c$ en la tarde. ¿Cuántas cajas totales de ese tipo hay en el almacén al final del
    día? (v1)


    Opciones: A) $40c$ · B) $30c$ · C) $1920c$ · D) $20c$'
  solucion_pasos:
  - 'Todas son del tipo $c$ y positivas. Sumamos coeficientes: $12+20+8=40$. Total: $40c$.'
- titulo: 'Respecto de «Reducción de términos semejantes con igual signo»: ¿La siguiente formulación es'
  enunciado: 'Respecto de «Reducción de términos semejantes con igual signo»: ¿La siguiente formulación
    es correcta? «La **Reducción de Mismo Signo** consiste en sumar los valores absolutos de los coeficientes
    cuando todos los términos semejantes tienen el mismo signo, manteniendo ese signo en el resultado»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La **Reducción de Mismo Signo** consiste en sumar
    los valores absolutos de los coeficientes cuando todos los términos semejantes tienen el mismo signo,
    manteniendo ese signo en el resultado.'
- titulo: 'Respecto de «Reducción de términos semejantes con igual signo»: ¿La siguiente conclusión es'
  enunciado: 'Respecto de «Reducción de términos semejantes con igual signo»: ¿La siguiente conclusión
    es correcta? «Multiplicar los coeficientes en lugar de sumarlos (ej. decir que 3x + 5x = 15x)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La **Reducción de Mismo Signo** consiste en sumar
    los valores absolutos de los coeficientes cuando todos los términos semejantes tienen el mismo signo,
    manteniendo ese signo en el resultado.'
errores_frecuentes:
- Multiplicar los coeficientes en lugar de sumarlos (ej. decir que 3x + 5x = 15x).
- Olvidar que un término sin coeficiente visible (ej. 'x') tiene coeficiente 1.
- Se multiplican los coeficientes entre sí.
- Para «Al reducir varios términos semejantes con el mismo signo positivo, ¿cuál es la operación que se
  realiza con sus coeficientes? (v1)», la respuesta correcta es Se suman los coeficientes y los exponentes.
- Para «Al reducir varios términos semejantes con el mismo signo positivo, ¿cuál es la operación que se
  realiza con sus coeficientes? (v1)», la respuesta correcta es Se promedian los coeficientes.
fuente: Álgebra de Baldor.
