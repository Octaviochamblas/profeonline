semantic_id: MAT.EST.NORMAL_BASE.REGLA_997
titulo: Aplicar la regla empírica del 99,7% en torno a la media
objetivo: Aplicar la regla empírica que indica que aproximadamente el 99,7% de los datos de una distribución normal
  se encuentra a tres desviaciones estándar de la media.
introduccion: Con tres desviaciones estándar hacia cada lado del centro, prácticamente todos los datos de una
  distribución normal quedan cubiertos, solo escapa un porcentaje mínimo.
resumen: Aproximadamente el 99,7% de los datos de una distribución normal se encuentra dentro del intervalo
  $[\mu-3\sigma, \mu+3\sigma]$.
explicacion: '![Regla del 99,7%](/static/img/estadistica/normbase/normbase-regla-997.svg)


  ### Definición formal


  En toda distribución normal, se cumple que $P(\mu-3\sigma\leq X\leq \mu+3\sigma)\approx 0{,}997$, es decir, el

  99,7% de los datos está a menos de tres desviaciones estándar de la media.


  ### Desarrollo didáctico


  Un dato fuera de este intervalo es extremadamente inusual, ya que solo un 0,3% de los datos, en promedio, cae fuera

  de las tres desviaciones estándar en torno a la media.'
procedimiento:
- 'Paso 1: Calcula los valores $\mu-3\sigma$ y $\mu+3\sigma$.'
- 'Paso 2: Reconoce ese intervalo como el rango de tres desviaciones estándar en torno a la media.'
- 'Paso 3: Aplica la regla empírica: aproximadamente el 99,7% de los datos está en ese intervalo.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si una distribución normal tiene $\mu=100$ y $\sigma=10$, ¿qué intervalo contiene aproximadamente el 99,7%
    de los datos?
  solucion_pasos:
  - El intervalo es $[100-30, 100+30] = [70, 130]$.
  - Aproximadamente el 99,7% de los datos se encuentra en ese rango.
- titulo: Ejemplo 2
  enunciado: ¿Qué porcentaje de los datos queda fuera del intervalo $[\mu-3\sigma, \mu+3\sigma]$?
  solucion_pasos:
  - Aproximadamente el 0,3% de los datos queda fuera de ese intervalo (100% - 99,7%).
- titulo: ¿La regla del 99,7% se refiere al intervalo de tres desviaciones estándar en torno a la media?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente ese intervalo.
- titulo: ¿La regla del 99,7% corresponde a dos desviaciones estándar en torno a la media?
  respuesta: 'No'
  solucion_pasos:
  - 'No, corresponde a tres desviaciones estándar; dos desviaciones corresponden a la regla del 95%.'
errores_frecuentes:
- Confundir la regla del 99,7% con la del 68% o la del 95%.
- Calcular el intervalo usando $2\sigma$ en vez de $3\sigma$.
- Pensar que el 99,7% cubre el 100% exacto de los datos.
- Olvidar que el intervalo es simétrico respecto de la media.
- Confundir un dato fuera de tres desviaciones estándar con un dato imposible en vez de extremadamente inusual.
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
