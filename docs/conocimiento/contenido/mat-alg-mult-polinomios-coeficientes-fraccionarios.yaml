semantic_id: MAT.ALG.MULT_POLINOMIOS.COEFICIENTES_FRACCIONARIOS
titulo: Multiplicación de polinomios con coeficientes fraccionarios
objetivo: Multiplicar dos polinomios donde los coeficientes son fracciones, aplicando correctamente la distributividad
  y las reglas de las fracciones.
introduccion: 'Multiplicar polinomios con fracciones es igual que con números enteros, solo que ahora debemos recordar
  cómo multiplicar fracciones: el numerador por el numerador y el denominador por el denominador.'
resumen: 'Al multiplicar polinomios con coeficientes fraccionarios, se aplica la propiedad distributiva multiplicando
  cada término del primer polinomio por cada término del segundo.


  Para cada multiplicación de términos:

  - Multiplica los coeficientes (numerador con numerador, denominador con denominador).

  - Suma los exponentes de las letras iguales.

  - Al final, reduce términos semejantes, lo cual puede requerir encontrar un denominador común.'
explicacion: '### Definición formal


  Sean $P(x)=\sum_{i=0}^{m} a_i x^i$ y $Q(x)=\sum_{j=0}^{n} b_j x^j$ con $a_i,b_j\in\mathbb{Q}$ y denominadores
  no nulos. Su producto se define por

  $$P(x)Q(x)=\sum_{i=0}^{m}\sum_{j=0}^{n} a_i b_j x^{i+j}.$$

  Como los coeficientes pertenecen al conjunto de los números racionales, cada coeficiente parcial $a_i b_j$ se
  obtiene mediante la multiplicación ordinaria de fracciones, y los coeficientes de términos semejantes se suman
  también dentro de $\mathbb{Q}$. La presencia de fracciones no modifica la regla polinomial; solo cambia el campo
  numérico en que se realizan los cálculos.


  ### Desarrollo didáctico


  La regla general para multiplicar dos polinomios $P(x)$ y $Q(x)$ se mantiene: cada término de $P(x)$ se multiplica
  por cada término de $Q(x)$.


  Cuando los coeficientes son fracciones, como $\frac{a}{b}$ y $\frac{c}{d}$, el coeficiente del término resultante
  será $\frac{a \cdot c}{b \cdot d}$.


  Después de distribuir todos los términos, es probable que se generen términos semejantes con coeficientes fraccionarios.
  Para reducirlos, debes sumar o restar esas fracciones encontrando el mínimo común múltiplo (MCM) de sus denominadores.'
procedimiento:
- 'Paso 1: Multiplica cada término del primer polinomio por cada término del segundo, como en cualquier producto polinomial.'
- 'Paso 2: En cada producto parcial, multiplica los coeficientes fraccionarios de forma directa: numerador con numerador y denominador con denominador.'
- 'Paso 3: Conserva la parte literal y suma los exponentes de las bases iguales.'
- 'Paso 4: Reúne los términos semejantes obtenidos en la expansión.'
- 'Paso 5: Suma o resta sus coeficientes fraccionarios usando denominador común cuando sea necesario.'
- 'Paso 6: Simplifica los coeficientes finales y ordena el polinomio resultante.'
ejemplos:
- titulo: Binomio por binomio con fracciones simples
  enunciado: Multiplica $(\frac{1}{2}x + 1)(\frac{1}{3}x - 2)$.
  solucion_pasos:
  - 'Distribuye: $(\frac{1}{2}x)(\frac{1}{3}x) + (\frac{1}{2}x)(-2) + (1)(\frac{1}{3}x) + (1)(-2)$'
  - 'Calcula: $\frac{1}{6}x^2 - 1x + \frac{1}{3}x - 2$'
  - 'Reduce términos semejantes ($-1 + \frac{1}{3} = -\frac{2}{3}$): $\frac{1}{6}x^2 - \frac{2}{3}x - 2$'
- titulo: Producto con fracciones en ambos factores
  enunciado: Calcula $(\frac{2}{5}a - \frac{1}{2})(\frac{5}{2}a + \frac{1}{4})$.
  solucion_pasos:
  - 'Distribuye: $(\frac{2}{5}a)(\frac{5}{2}a) + (\frac{2}{5}a)(\frac{1}{4}) - (\frac{1}{2})(\frac{5}{2}a) - (\frac{1}{2})(\frac{1}{4})$'
  - 'Multiplica: $1a^2 + \frac{2}{20}a - \frac{5}{4}a - \frac{1}{8}$'
  - 'Simplifica $\frac{2}{20}$ a $\frac{1}{10}$ y suma con $-\frac{5}{4}$ ($MCM=20$): $\frac{2}{20} - \frac{25}{20}
    = -\frac{23}{20}$'
  - 'Resultado final: $a^2 - \frac{23}{20}a - \frac{1}{8}$'
- titulo: Verificación del coeficiente cuadrático
  enunciado: El término cuadrático del producto $(\frac{3}{4}x + 1)(\frac{2}{3}x - 5)$ tiene coeficiente $\frac{1}{2}$.
  solucion_pasos:
  - El término cuadrático se forma multiplicando $(\frac{3}{4}x)(\frac{2}{3}x)$.
  - $\frac{3 \cdot 2}{4 \cdot 3} = \frac{6}{12} = \frac{1}{2}$.
  - Por lo tanto, la afirmación es Verdadera.
- titulo: 'Respecto de «Multiplicación de polinomios con coeficientes fraccionarios»: ¿Describe adecuad'
  enunciado: 'Respecto de «Multiplicación de polinomios con coeficientes fraccionarios»: ¿Describe adecuadamente
    el concepto esta frase? «Al multiplicar polinomios con coeficientes fraccionarios, se aplica la propiedad distributiva
    multiplicando cada término del primer polinomio por cada término del segundo»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al multiplicar polinomios con coeficientes fraccionarios,
    se aplica la propiedad distributiva multiplicando cada término del primer polinomio por cada término del segundo.'
- titulo: 'Respecto de «Multiplicación de polinomios con coeficientes fraccionarios»: ¿Se puede aceptar'
  enunciado: 'Respecto de «Multiplicación de polinomios con coeficientes fraccionarios»: ¿Se puede aceptar esta
    afirmación? «Multiplicar cruzado los coeficientes en lugar de directo (numerador con numerador)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al multiplicar polinomios con coeficientes fraccionarios,
    se aplica la propiedad distributiva multiplicando cada término del primer polinomio por cada término del segundo.'
errores_frecuentes:
- Multiplicar cruzado los coeficientes en lugar de directo (numerador con numerador).
- Olvidar buscar denominador común al reducir los términos semejantes finales.
- Equivocarse en la ley de los signos al multiplicar fracciones negativas.
- Para «Para multiplicar los términos $(\frac{a}{b}x)$ y $(\frac{c}{d}y)$, ¿cuál es el procedimiento correcto para
  los coeficientes», la respuesta correcta es Multiplicar cruzado $a \cdot d$ y $b \cdot c$.
- Encontrar el denominador común entre $b$ y $d$.
