semantic_id: MAT.ALG.FUNC_EXPONENCIAL_BASE.DOMINIO
titulo: Determinación del dominio real de la función exponencial
objetivo: Determinar el dominio de una función exponencial, reconociendo que siempre corresponde a todos los
  números reales.
introduccion: Gracias a que la base es siempre positiva, una potencia con esa base está definida sin excepción
  para cualquier exponente real, por extraño que parezca ese exponente.
resumen: El **dominio** de cualquier función exponencial $f(x)=a\cdot b^x$ (con $b>0$, $b\neq1$) es siempre el
  conjunto de todos los números reales, $\text{Dom}(f)=\mathbb{R}$.
explicacion: '### Definición formal


  Para $f(x)=a\cdot b^x$ con $b>0$, la potencia $b^x$ está definida y produce un resultado real positivo para
  cualquier valor de $x \in \mathbb{R}$, incluidos exponentes negativos y fraccionarios. Por tanto, $\text{Dom}(f)=\mathbb{R}$.


  ### Desarrollo didáctico


  A diferencia de una potencia con base negativa (que puede no estar definida para exponentes fraccionarios),
  la positividad de la base garantiza que no exista ninguna restricción sobre el dominio.


  Para $f(x)=2\cdot5^x$, la potencia $5^x$ está definida para cualquier $x$, incluyendo $x=-3$ ($5^{-3}=1/125$)
  o $x=0{,}5$ ($5^{0{,}5}=\sqrt{5}$).'
procedimiento:
- 'Paso 1: Verifica que la base $b$ de la función exponencial sea positiva.'
- 'Paso 2: Concluye que el dominio es $\mathbb{R}$, sin necesidad de excluir ningún valor.'
ejemplos:
- titulo: Determinación del dominio de una función exponencial simple
  enunciado: 'Determina el dominio de $f(x)=3\cdot2^x$.'
  solucion_pasos:
  - La base $2$ es positiva.
  - '$\text{Dom}(f)=\mathbb{R}$.'
- titulo: Determinación del dominio con base fraccionaria
  enunciado: 'Determina el dominio de $f(x)=7\cdot(1/3)^x$.'
  solucion_pasos:
  - La base $1/3$ es positiva.
  - '$\text{Dom}(f)=\mathbb{R}$.'
- titulo: ¿Existe algún valor de $x$ excluido del dominio de una función exponencial?
  enunciado: ¿Existe algún valor de $x$ excluido del dominio de una función exponencial?
  respuesta: 'No'
  solucion_pasos:
  - Gracias a que la base es siempre positiva, la potencia está definida para cualquier valor real de $x$.
- titulo: ¿El dominio de una función exponencial depende del valor del coeficiente $a$?
  enunciado: ¿El dominio de una función exponencial depende del valor del coeficiente $a$?
  respuesta: 'No'
  solucion_pasos:
  - El dominio depende únicamente de que la base sea positiva; el coeficiente $a$ no introduce restricciones.
errores_frecuentes:
- Confundir el dominio (siempre $\mathbb{R}$) con el recorrido, que sí depende de los parámetros de la función.
- Buscar restricciones de dominio como si la base pudiera ser negativa.
- Excluir por error el cero u otros valores particulares sin ninguna justificación matemática.
- Confundir el dominio matemático con el dominio restringido de un problema aplicado (contexto).
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
