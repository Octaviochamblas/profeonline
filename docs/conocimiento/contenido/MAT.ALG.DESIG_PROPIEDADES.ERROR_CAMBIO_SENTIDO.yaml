semantic_id: MAT.ALG.DESIG_PROPIEDADES.ERROR_CAMBIO_SENTIDO
titulo: Errores comunes en el cambio de sentido de las desigualdades
objetivo: Identificar y evitar equivocaciones al decidir si una operación matemática
  altera o no el sentido de una desigualdad.
introduccion: Resolver inecuaciones exige conocer precisamente qué operaciones conservan
  la desigualdad y cuáles la invierten. Los errores al respecto pueden cambiar por
  completo el conjunto solución.
resumen: Solo la multiplicación y división por un número estrictamente negativo invierten
  el sentido de la desigualdad; la suma, resta y multiplicación por positivos lo conservan.
explicacion: "### Definición formal\nSea $a < b$. \nSi $c \\in \\mathbb{R}$, entonces\
  \ $a + c < b + c$.\nSi $c > 0$, entonces $a \\cdot c < b \\cdot c$.\nSi $c < 0$,\
  \ entonces $a \\cdot c > b \\cdot c$.\n\n### Desarrollo didáctico\nUn error frecuente\
  \ es asumir que restar un número (que se percibe como una operación \"negativa\"\
  ) altera el sentido. Sin embargo, desplazar los puntos a la izquierda o a la derecha\
  \ en la recta numérica (suma y resta) no altera su orden relativo. Únicamente la\
  \ dilatación/contracción combinada con una reflexión (multiplicación/división por\
  \ negativos) es la que transpone la relación de orden."
procedimiento:
- Observar la operación que se aplica a ambos lados de la desigualdad.
- Si es suma o resta, el sentido de la desigualdad nunca cambia.
- Si es multiplicación o división, el sentido solo cambia si el factor o divisor es
  un número estrictamente negativo.
ejemplos:
- titulo: Resta de un número
  enunciado: Resuelve $x + 5 < 2$ y justifica si cambia el sentido.
  solucion_pasos:
  - Se tiene la inecuación $x + 5 < 2$.
  - 'Para despejar, se resta $5$ a ambos lados: $x < 2 - 5$.'
  - Como es una resta, el sentido de la desigualdad no cambia.
  - El resultado es $x < -3$.
- titulo: División por un número positivo
  enunciado: Aplica una división a $4x \geq -12$ e indica cómo se mantiene el signo.
  solucion_pasos:
  - Se parte de $4x \geq -12$.
  - Se divide por $4$, que es un valor positivo.
  - Al ser positivo, el sentido se conserva.
  - El resultado es $x \geq -3$.
- titulo: ¿Cambia el sentido al restar un número negativo?
  respuesta: 'No'
  solucion_pasos:
  - Restar un número negativo es equivalente a sumar su valor absoluto.
  - La suma no altera el orden de los elementos en la recta numérica, por lo que el
    sentido se mantiene.
- titulo: ¿Se invierte la desigualdad al dividir entre $-1$?
  respuesta: Sí
  solucion_pasos:
  - Dividir por $-1$ es una operación de división por un valor negativo.
  - La regla indica que cualquier multiplicación o división por negativos requiere
    invertir el sentido del símbolo.
errores_frecuentes:
- Restar un número en ambos miembros invierte el sentido de la desigualdad.
- Sumar un número negativo a ambos miembros cambia la dirección del símbolo.
- Dividir por un número positivo invierte la desigualdad si el otro lado de la inecuación
  es negativo.
- El sentido cambia siempre que el resultado de la operación sea un número negativo.
- Multiplicar por una variable $x$ siempre mantiene el sentido asumiendo erróneamente
  que $x$ es positivo.
