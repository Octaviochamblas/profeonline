semantic_id: MAT.EST.PROBA_COMPUESTA_CONDICIONAL.SIN_REPOSICION
titulo: Efecto de las extracciones sin reposición en la probabilidad condicional
objetivo: Analizar cómo las extracciones sucesivas sin reposición generan probabilidades condicionales
  distintas según el resultado de la extracción anterior.
introduccion: Cuando no se repone el objeto extraído, la probabilidad del segundo evento depende explícitamente
  de qué ocurrió en el primero, generando ramas distintas en el análisis.
resumen: En extracciones sin reposición, la probabilidad condicional de la segunda extracción varía según
  el resultado específico de la primera, ya que el conjunto de objetos disponibles cambia.
explicacion: '![Efecto de extracciones sin reposición](/static/img/probabilidad/compuesta/compuesta-sin-reposicion.svg)


  ### Definición formal


  Si la primera extracción fue de un objeto de tipo $X$, la probabilidad de la segunda extracción se calcula
  sobre el conjunto reducido (sin ese objeto de tipo $X$), dando $P(\text{2da}|\text{1ra}=X)$ distinto
  según cuál haya sido $X$.


  ### Desarrollo didáctico


  En una urna con 5 rojas y 5 azules: si la primera extracción fue roja, quedan 4 rojas y 5 azules (9
  en total), dando $P(\text{2da roja}|\text{1ra roja})=4/9$. Si la primera fue azul, quedan 5 rojas y
  4 azules, dando $P(\text{2da roja}|\text{1ra azul})=5/9$: valores distintos según el primer resultado.'
procedimiento:
- 'Paso 1: Identifica el resultado posible de la primera extracción.'
- 'Paso 2: Para cada resultado posible de la primera extracción, recalcula la composición del conjunto
  restante.'
- 'Paso 3: Calcula la probabilidad condicional de la segunda extracción usando esa composición actualizada,
  específica para cada caso.'
ejemplos:
- titulo: Calcular P(2da roja|1ra roja) sin reposición
  enunciado: Urna con 5 rojas y 5 azules, se extrae una roja primero.
  solucion_pasos:
  - 'Quedan 4 rojas y 5 azules (9 en total): P(2da roja|1ra roja)=4/9.'
- titulo: Calcular P(2da roja|1ra azul) sin reposición
  enunciado: Misma urna, se extrae una azul primero.
  solucion_pasos:
  - 'Quedan 5 rojas y 4 azules (9 en total): P(2da roja|1ra azul)=5/9.'
- titulo: ¿Estas dos probabilidades condicionales son iguales entre sí?
  respuesta: 'No'
  solucion_pasos:
  - No, son distintas, ya que dependen de cuál fue el resultado específico de la primera extracción.
- titulo: ¿El denominador (total de objetos) siempre disminuye en 1 tras la primera extracción?
  respuesta: Sí
  solucion_pasos:
  - Sí, sin reposición, el total de objetos disponibles disminuye en 1 en cada extracción.
errores_frecuentes:
- Usar la misma probabilidad condicional para la segunda extracción, sin importar el resultado de la primera.
- Olvidar disminuir el total de objetos disponibles tras la primera extracción.
- Confundir cuál conteo (rojas o azules) se reduce, según el resultado específico obtenido en la primera
  extracción.
fuente: 'Elaboración propia (referencia: Moraleja 411).'
estado: publicado
