semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.VERIFICACION_RESTRICCIONES
titulo: Verificación de restricciones al resolver ecuaciones logarítmicas
objetivo: Comprobar que las soluciones de una ecuación logarítmica cumplan las condiciones de existencia del
  logaritmo.
introduccion: Resolver la ecuación es solo la mitad del trabajo. Antes de dar por válida una solución, hay que
  confirmar que el argumento del logaritmo original quede positivo.
resumen: Toda solución de una ecuación logarítmica debe **verificarse** reemplazándola en la expresión original,
  descartando aquellas que produzcan un argumento menor o igual a $0$.
explicacion: '### Definición formal


  Si $x_0$ es una solución obtenida al resolver $\log_b(g(x))=c$, entonces $x_0$ es una solución válida solo si
  $g(x_0)>0$. Cuando $g(x_0)\leq0$, la expresión $\log_b(g(x_0))$ no está definida y $x_0$ debe descartarse del
  conjunto solución.


  ### Desarrollo didáctico


  Al resolver $\log_2(x-3)=2$ se obtiene $x-3=2^2=4$, es decir $x=7$. Se verifica reemplazando: $x-3=7-3=4>0$,
  por lo que la solución es válida. Si en cambio se hubiese obtenido un valor que hiciera $x-3\leq0$, esa solución
  debería descartarse aunque el despeje algebraico fuera correcto.'
procedimiento:
- 'Paso 1: Resuelve la ecuación logarítmica aplicando la definición o las propiedades correspondientes.'
- 'Paso 2: Reemplaza cada solución obtenida en el argumento del logaritmo original.'
- 'Paso 3: Descarta toda solución que haga el argumento menor o igual a $0$.'
- 'Paso 4: Declara como conjunto solución únicamente los valores que superan la verificación.'
ejemplos:
- titulo: Verificación de una solución válida
  enunciado: 'Verifica si $x=7$ es solución válida de $\log_2(x-3)=2$.'
  solucion_pasos:
  - Se reemplaza en el argumento: $x-3=7-3=4$.
  - Como $4>0$, la solución $x=7$ es válida.
- titulo: Descarte de una solución inválida
  enunciado: 'Al resolver $\log_3(x-5)=1$ se obtiene algebraicamente $x=8$; ¿qué ocurre si en otra ecuación similar
    el despeje diera $x=4$ para el mismo argumento $x-5$?'
  solucion_pasos:
  - Se reemplaza en el argumento: $x-5=4-5=-1$.
  - Como $-1\leq0$, esa solución debería descartarse por no cumplir el dominio del logaritmo.
- titulo: ¿Puede una ecuación logarítmica tener soluciones que se deben descartar?
  enunciado: ¿Es posible que el despeje algebraico de una ecuación logarítmica entregue una solución que deba
    rechazarse?
  respuesta: Sí
  solucion_pasos:
  - Si la solución hace el argumento del logaritmo menor o igual a $0$, no es válida y debe descartarse.
- titulo: ¿Basta con resolver la ecuación algebraicamente sin más pasos?
  enunciado: ¿Es suficiente despejar la incógnita para garantizar que la solución sea correcta?
  respuesta: 'No'
  solucion_pasos:
  - Siempre debe verificarse que el argumento del logaritmo original quede positivo con esa solución.
errores_frecuentes:
- Aceptar como válida cualquier solución del despeje algebraico sin comprobar el dominio.
- Verificar el signo de la incógnita en vez del signo del argumento completo del logaritmo.
- Olvidar que un argumento igual a $0$ también invalida la solución, no solo los negativos.
- No repetir la verificación cuando la ecuación tiene más de una solución candidata.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
