semantic_id: MAT.NUM.LOGARITMOS_CONCEPTO.RESTRICCION_ARGUMENTO_POSITIVO
titulo: Restricción de argumento positivo en un logaritmo
objetivo: Determinar el dominio mediante la positividad del argumento.
introduccion: El argumento es el resultado de una potencia de base positiva. Como esa potencia nunca llega
  a cero ni a valores negativos, esos argumentos quedan fuera del dominio.
resumen: El argumento de un logaritmo real debe ser mayor que cero. Una base positiva elevada a cualquier
  exponente real siempre produce un valor positivo.
explicacion: 'El argumento de un logaritmo real debe ser mayor que cero.


  La situación “\(\log_3(-9)\) y \(\log_3 0\) no existen en \(\mathbb{R}\)” permite comprobar, y no solo
  memorizar, que una base positiva elevada a cualquier exponente real siempre produce un valor positivo'
procedimiento:
- 'Paso 1: Aísla la expresión completa que actúa como argumento.'
- 'Paso 2: Plantea la condición argumento \(>0\) y resuélvela si contiene variables.'
- 'Paso 3: Conserva solo los valores que satisfacen la desigualdad antes de operar.'
ejemplos:
- titulo: Aplicación razonada — Restricción de argumento positivo en un logaritmo
  enunciado: \(\log_3(-9)\) y \(\log_3 0\) no existen en \(\mathbb{R}\).
  solucion_pasos:
  - Aísla la expresión completa que actúa como argumento.
  - Plantea la condición argumento \(>0\) y resuélvela si contiene variables.
  - Conserva solo los valores que satisfacen la desigualdad antes de operar.
- titulo: Revisión de una solución — Restricción de argumento positivo en un logaritmo
  enunciado: Una solución aplica “Plantea la condición argumento \(>0\) y resuélvela si contiene variables.”,
    pero termina sin comprobar que una base positiva elevada a cualquier exponente real siempre produce
    un valor positivo. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define restricción de argumento positivo en un logaritmo: el argumento
    de un logaritmo real debe ser mayor que cero.'
  - Aísla la expresión completa que actúa como argumento.
  - 'Completa la revisión con este control: Conserva solo los valores que satisfacen la desigualdad antes
    de operar.'
- titulo: ¿Se cumple que una base positiva elevada a cualquier exponente real siempre produce un valor
    positivo? — Restricción de argumento positivo en un logaritmo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el argumento de un logaritmo real debe ser mayor que cero.
  - El caso “\(\log_3(-9)\) y \(\log_3 0\) no existen en \(\mathbb{R}\)” satisface esa condición.
  - Conserva solo los valores que satisfacen la desigualdad antes de operar.
- titulo: ¿Es válido omitir el paso “Aísla la expresión completa que actúa como argumento”? — Restricción
    de argumento positivo en un logaritmo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de restricción de argumento positivo en un logaritmo.
  - 'Omitirlo puede volver inválida la acción siguiente: Plantea la condición argumento \(>0\) y resuélvela
    si contiene variables.'
  - 'La solución debe terminar de este modo: Conserva solo los valores que satisfacen la desigualdad antes
    de operar.'
errores_frecuentes:
- 'Confundir restricción de argumento positivo en un logaritmo con otro concepto y omitir este inicio:
  Aísla la expresión completa que actúa como argumento.'
- Aplicar mecánicamente “Plantea la condición argumento \(>0\) y resuélvela si contiene variables.” sin
  revisar las condiciones de la definición.
- Tomar “\(\log_3(-9)\) y \(\log_3 0\) no existen en \(\mathbb{R}\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “una base positiva elevada a cualquier exponente
  real siempre produce un valor positivo”.
- 'Terminar el desarrollo sin realizar este control: Conserva solo los valores que satisfacen la desigualdad
  antes de operar.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
