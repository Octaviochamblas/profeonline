semantic_id: MAT.EST.TABLAS_CONTINGENCIA.TOTALES_MARGINALES
titulo: Identificación de totales marginales en tablas de doble entrada
objetivo: Identificar los totales marginales de una tabla de doble entrada, es decir, las sumas de cada
  fila y cada columna, ubicadas en el margen de la tabla.
introduccion: Los totales marginales resumen la cantidad total de casos en cada categoría de una sola
  variable, sumando todas las celdas de esa fila o columna.
resumen: Los totales marginales de una tabla de doble entrada son las sumas de los valores de cada fila
  y de cada columna, ubicados en el margen (borde) de la tabla.
explicacion: '![Totales marginales](/static/img/probabilidad/tablas/tabla-totales-marginales.svg)


  ### Definición formal


  El total marginal de una fila es la suma de todas las celdas de esa fila; el total marginal de una columna
  es la suma de todas las celdas de esa columna. El total general (esquina inferior derecha) es la suma
  de todos los datos.


  ### Desarrollo didáctico


  En la tabla de sexo y preferencia, el total marginal de la columna ''Hombre'' es $18+12=30$, y el total
  marginal de la fila ''Sí'' es $18+22=40$.'
procedimiento:
- 'Paso 1: Identifica todas las celdas interiores de una fila (o columna) específica.'
- 'Paso 2: Suma esos valores para obtener el total marginal de esa fila (o columna).'
- 'Paso 3: Verifica que la suma de todos los totales marginales de filas coincida con la suma de todos
  los totales marginales de columnas (el total general).'
ejemplos:
- titulo: Calcular el total marginal de la columna 'Hombre'
  enunciado: 18 (Sí, Hombre), 12 (No, Hombre).
  solucion_pasos:
  - Total marginal=18+12=30.
- titulo: Calcular el total marginal de la fila 'Sí'
  enunciado: 18 (Sí, Hombre), 22 (Sí, Mujer).
  solucion_pasos:
  - Total marginal=18+22=40.
- titulo: ¿Los totales marginales de fila deben sumar lo mismo que los de columna?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas sumas deben coincidir con el total general de datos.
- titulo: ¿Un total marginal puede calcularse sumando solo una parte de la fila o columna?
  respuesta: 'No'
  solucion_pasos:
  - No, debe incluir todas las celdas de esa fila o columna completa.
errores_frecuentes:
- Sumar solo algunas celdas de la fila o columna, omitiendo otras.
- Confundir un total marginal con una celda interior específica.
- No verificar que la suma de los totales marginales coincida con el total general.
fuente: 'Elaboración propia (referencia: Moraleja 185).'
estado: publicado
