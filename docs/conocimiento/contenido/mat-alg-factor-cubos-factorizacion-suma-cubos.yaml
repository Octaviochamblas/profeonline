semantic_id: MAT.ALG.FACTOR_CUBOS.FACTORIZACION_SUMA_CUBOS
titulo: Factorización de la Suma de Cubos
objetivo: Aplicar la fórmula $a^3 + b^3 = (a+b)(a^2 - ab + b^2)$ para factorizar polinomios.
introduccion: Una vez que identificamos los dos cubos, el proceso de desarmarlos sigue una plantilla estricta. Es
  como una coreografía matemática. Produce un binomio pequeño y un trinomio más grande.
resumen: 'La suma de cubos se factoriza en dos paréntesis: un binomio con la suma de las raíces cúbicas $(a+b)$,
  multiplicado por un trinomio que contiene el cuadrado de la primera raíz, menos el producto de ambas raíces, más
  el cuadrado de la segunda: $(a^2 - ab + b^2)$.'
explicacion: "### Definición formal\n\nEl término central del trinomio siempre lleva el signo opuesto al binomio\
  \ inicial, que en este caso era positivo.\n\n### Desarrollo didáctico\n\nFórmula Maestra: $a^3 + b^3 = (a+b)(a^2\
  \ - ab + b^2)$.\n\nApliquémoslo a $x^3 + 8$:\n1. Raíces cúbicas: La de $x^3$ es $x$ (nuestra '$a$'). La de $8$\
  \ es $2$ (nuestra '$b$').\n2. Primer paréntesis (el binomio): Simplemente cópialas con el signo original. Nos\
  \ queda $(x + 2)$.\n3. Segundo paréntesis (el trinomio):\n   - El primero al cuadrado: $(x)^2 = x^2$.\n   - MENOS\
  \ la multiplicación de ambos: $-(x \\cdot 2) = -2x$. (Ojo. No es el doble, es solo la multiplicación).\n   - MÁS\
  \ el segundo al cuadrado: $(2)^2 = 4$.\n\nUnimos las piezas: $(x + 2)(x^2 - 2x + 4)$.\nDato curioso: El trinomio\
  \ resultante $(x^2 - 2x + 4)$ jamás se puede seguir factorizando en los Reales."
procedimiento:
- 'Paso 1: Extrae la raíz cúbica del 1er término ($a$) y del 2do término ($b$).'
- 'Paso 2: Abre un paréntesis pequeño para el binomio: $(a + b)$.'
- 'Paso 3: Abre un paréntesis grande para el trinomio.'
- 'Paso 4: El primer elemento es el cuadrado de la primera raíz: $a^2$.'
- 'Paso 5: El segundo elemento es el negativo del producto de las raíces: $-ab$.'
- 'Paso 6: El tercer elemento es el cuadrado de la segunda raíz: $+b^2$.'
- El término central del trinomio siempre lleva el signo opuesto al binomio inicial, que en este caso era positivo.
ejemplos:
- titulo: Factoriza $27y^3 + 1$
  enunciado: Factoriza $27y^3 + 1$.
  solucion_pasos:
  - 'Raíces: $3y$ y $1$.'
  - 'Binomio: $(3y + 1)$.'
  - 'Trinomio: $(3y)^2 - (3y)(1) + (1)^2 = 9y^2 - 3y + 1$.'
  - 'Resultado: $(3y + 1)(9y^2 - 3y + 1)$.'
- titulo: Factoriza $8x^3 + 125y^6$.
  solucion_pasos:
  - 'Raíces: 2x y 5y^2. Trinomio: cuadrado de 2x es 4x^2, producto invertido es -10xy^2, cuadrado de 5y^2 es 25y^4.'
- titulo: 'Respecto de «Factorización de una suma de cubos perfectos»: ¿La siguiente formulación es cor'
  enunciado: 'Respecto de «Factorización de una suma de cubos perfectos»: ¿La siguiente formulación es correcta?
    «La suma de cubos se factoriza en dos paréntesis: un binomio con la suma de las raíces cúbicas $(a+b)$, multiplicado
    por un trinomio que contiene el cuadrado de la primera raíz, menos el producto de ambas raíces, más el cuadrado
    de la segunda: $(a^2 - ab + b^2)$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La suma de cubos se factoriza en dos paréntesis: un binomio
    con la suma de las raíces cúbicas $(a+b)$, multiplicado por un trinomio que contiene el cuadrado de la primera
    raíz, menos el producto de ambas raíces, más el cuadrado de la segunda: $(a^2 - ab + b^2)$.'
- titulo: 'Respecto de «Factorización de una suma de cubos perfectos»: ¿La siguiente conclusión es corr'
  enunciado: 'Respecto de «Factorización de una suma de cubos perfectos»: ¿La siguiente conclusión es correcta?
    «En el trinomio, poner el doble del producto (escribir $-2ab$ en vez de $-ab$), confundiéndolo con un TCP»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La suma de cubos se factoriza en dos paréntesis: un binomio
    con la suma de las raíces cúbicas $(a+b)$, multiplicado por un trinomio que contiene el cuadrado de la primera
    raíz, menos el producto de ambas raíces, más el cuadrado de la segunda: $(a^2 - ab + b^2)$.'
errores_frecuentes:
- En el trinomio, poner el doble del producto (escribir $-2ab$ en vez de $-ab$), confundiéndolo con un TCP.
- Olvidar cambiar el signo del término central del trinomio a negativo.
- Intentar factorizar el trinomio resultante. (¡Pérdida de tiempo, su discriminante siempre es negativo!).
- Porque así lo dicta la regla mnemotécnica (SOAP).
- Para «¿Por qué el término central del trinomio largo NO lleva un '2' como coeficiente, a diferencia del TCP»,
  la respuesta correcta es Porque los cubos no tienen dobles.
