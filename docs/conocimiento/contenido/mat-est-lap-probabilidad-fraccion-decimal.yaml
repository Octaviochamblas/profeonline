semantic_id: MAT.EST.LAPLACE_MUESTRALES.PROBABILIDAD_FRACCION_DECIMAL
titulo: Expresión de una probabilidad como fracción, decimal o porcentaje
objetivo: Expresar una probabilidad indistintamente como fracción, número decimal o porcentaje, reconociendo
  que son formas equivalentes del mismo valor.
introduccion: 'Una probabilidad puede comunicarse de distintas formas según el contexto: en matemáticas
  suele preferirse la fracción, mientras que en la vida cotidiana se usa más el porcentaje.'
resumen: Toda probabilidad puede expresarse como fracción $\dfrac{n(A)}{n(S)}$, como decimal (dividiendo
  esa fracción), o como porcentaje (multiplicando el decimal por 100).
explicacion: '![Probabilidad como fracción, decimal o porcentaje](/static/img/probabilidad/laplace/lap-probabilidad-fraccion-decimal.svg)


  ### Definición formal


  Si $P(A)=\dfrac{3}{6}$, esta fracción equivale al decimal $0{,}5$, y al porcentaje $50\%$ (multiplicando
  el decimal por 100).


  ### Desarrollo didáctico


  La probabilidad de obtener un número par al lanzar un dado es $\dfrac{3}{6}=0{,}5=50\%$: las tres formas
  representan exactamente el mismo valor.'
procedimiento:
- 'Paso 1: Calcula la probabilidad como fracción, usando casos favorables sobre casos totales.'
- 'Paso 2: Divide esa fracción para obtener su forma decimal.'
- 'Paso 3: Multiplica el decimal por 100 para expresarlo como porcentaje.'
ejemplos:
- titulo: Convertir 3/6 a decimal y porcentaje
  enunciado: P(A)=3/6.
  solucion_pasos:
  - 3/6=0,5=50%.
- titulo: Convertir 1/4 a decimal y porcentaje
  enunciado: P(A)=1/4.
  solucion_pasos:
  - 1/4=0,25=25%.
- titulo: ¿Estas tres formas representan siempre el mismo valor de probabilidad?
  respuesta: Sí
  solucion_pasos:
  - Sí, son simplemente representaciones distintas de la misma cantidad.
- titulo: ¿Un porcentaje mayor a 100% puede representar una probabilidad válida?
  respuesta: 'No'
  solucion_pasos:
  - No, ninguna probabilidad puede superar el 100% (equivalente a 1).
errores_frecuentes:
- Olvidar multiplicar por 100 al convertir de decimal a porcentaje.
- Confundir la fracción de la probabilidad con un número mayor a 1.
- Redondear incorrectamente al convertir entre las distintas formas de representación.
fuente: Elaboración propia.
estado: publicado
