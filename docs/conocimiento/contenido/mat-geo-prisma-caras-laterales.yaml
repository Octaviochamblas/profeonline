semantic_id: MAT.GEO.POLIEDROS_PRISMAS.PRISMA_CARAS_LATERALES
titulo: Identificación de las caras laterales de un prisma recto
objetivo: 'Identificar correctamente las caras laterales de un prisma recto: los rectángulos que conectan
  los lados correspondientes de ambas bases.'
introduccion: 'Las caras laterales de un prisma son como sus ''paredes'': las superficies rectangulares
  que unen la base superior con la inferior.'
resumen: Las caras laterales de un prisma recto son los rectángulos que conectan cada lado de una base
  con el lado correspondiente de la otra base.
explicacion: '![Caras laterales de un prisma recto](/static/img/geometria/espacio-cuerpos/prisma-caras-laterales.svg)


  ### Definición formal


  Las caras laterales de un prisma recto son las caras rectangulares (distintas de las bases) que conectan
  cada arista de una base con la arista correspondiente de la otra base. El número de caras laterales
  es igual al número de lados de la base.


  ### Desarrollo didáctico


  En la figura, las caras resaltadas (que no son ni la base superior ni la inferior) son caras laterales
  del prisma: conectan los vértices de una base con los de la otra. Un prisma de base cuadrada tiene 4
  caras laterales; uno de base hexagonal tendría 6.'
procedimiento:
- 'Paso 1: Identifica primero las dos bases del prisma (las caras congruentes y paralelas).'
- 'Paso 2: Reconoce que todas las demás caras (que no son bases) son caras laterales.'
- 'Paso 3: Cuenta las caras laterales; su número coincide con el número de lados de la base.'
ejemplos:
- titulo: Identificar las caras laterales de un prisma cuadrangular
  enunciado: Un prisma tiene bases cuadradas (4 lados cada una).
  solucion_pasos:
  - Tiene 4 caras laterales, una por cada lado de la base cuadrada.
- titulo: Determinar el número de caras laterales según la base
  enunciado: Un prisma tiene bases hexagonales (6 lados cada una).
  solucion_pasos:
  - Tiene 6 caras laterales, una por cada lado del hexágono.
- titulo: ¿Las caras laterales de un prisma recto son siempre rectángulos?
  respuesta: Sí
  solucion_pasos:
  - Sí, al ser el prisma recto (aristas laterales perpendiculares a las bases), sus caras laterales son
    necesariamente rectángulos.
- titulo: ¿El número de caras laterales depende de la altura del prisma?
  respuesta: 'No'
  solucion_pasos:
  - No, el número de caras laterales depende únicamente del número de lados de la base, no de la altura
    del prisma.
errores_frecuentes:
- Confundir las caras laterales con las bases del prisma.
- Calcular incorrectamente el número de caras laterales, sin relacionarlo con el número de lados de la
  base.
- Creer que las caras laterales pueden tener forma distinta a un rectángulo en un prisma recto.
fuente: 'Elaboración propia (referencias: Moraleja 96, Cid 181).'
estado: publicado
