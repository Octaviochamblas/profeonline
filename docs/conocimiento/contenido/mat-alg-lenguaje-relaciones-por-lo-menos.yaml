semantic_id: MAT.ALG.LENGUAJE_RELACIONES.POR_LO_MENOS
objetivo: Traducir el concepto de límite inferior incluyente usando el símbolo mayor o igual que.
introduccion: Para subir a la montaña rusa debes medir 'por lo menos' 1.50 metros. Si mides exacto 1.50m, pasas.
  Si mides 1.60m, también. Este es el piso mínimo indispensable.
resumen: La frase **'Por lo menos'** se traduce utilizando el símbolo de desigualdad **mayor o igual que ($\ge$)**.
  Indica que la variable tiene un valor de piso y puede tomar ese valor exacto o cualquiera superior a él.
explicacion: '### Definición formal


  Si necesitas ''por lo menos 5 dólares'' para un sándwich, te sirven 5, 10 o 100 dólares (cantidades mayores o
  iguales a 5).


  ### Desarrollo didáctico


  Palabras clave que se traducen como $\ge$:

  - Por lo menos

  - Al menos

  - Como mínimo

  - No menos de

  - Desde


  Ejemplos:

  - ''La edad ($E$) requerida es de por lo menos 18 años'': $E \ge 18$

  - ''Como mínimo debes sacar la mitad del puntaje ($P$)'': $Nota \ge \frac{P}{2}$


  Nuevamente, el instinto engaña. Uno lee ''por lo MENOS'' y el cerebro quiere dibujar un signo ''menor''. Error.
  Si te exigen ''por lo menos'' algo, te están exigiendo que seas de ese tamaño *hacia arriba* (mayor o igual).'
procedimiento:
- 'Paso 1: Identifica la variable sujeta a la condición (el sujeto).'
- 'Paso 2: Al leer ''por lo menos'' o ''como mínimo'', escribe el símbolo >= (mayor o igual).'
- 'Paso 3: Escribe el valor del umbral mínimo a la derecha del símbolo.'
ejemplos:
- titulo: El piso de aprobación
  enunciado: 'Traduce algebraicamente: ''Para aprobar, el estudiante necesita sacar no menos de 60 puntos''.'
  solucion_pasos:
  - 'Sujeto: El puntaje del estudiante (P).'
  - 'La frase ''no menos de'' permite sacar 60 exactos, o 70, o 100. Es un piso mínimo: >='
  - El umbral es 60.
  - 'Traducción: P >= 60.'
- titulo: Una ley municipal de recolección de agua lluvias exige que 'el volumen del estanque de reser
  enunciado: 'Una ley municipal de recolección de agua lluvias exige que ''el volumen del estanque de reserva ($V$)
    sea al menos igual al producto del área del techo ($A$) por la precipitación histórica ($P$)''. ¿Cuál inecuación
    verifica que una casa cumple legalmente con la norma? (v1)


    Opciones: A) $V \ge A \cdot P$ · B) $V \le A \cdot P$ · C) $V = A + P$ · D) $V > A + P$'
  solucion_pasos:
  - La frase 'al menos' establece la frontera mínima ($\ge$). El límite es el 'producto' de A y P ($A \cdot P$).
    El tanque V debe ser mayor o igual a ese producto.
  - 'Respuesta: $V \ge A \cdot P$'
- titulo: 'Respecto de «Traducción de la frase por lo menos»: ¿Se ajusta a la definición esta afirmació'
  enunciado: 'Respecto de «Traducción de la frase por lo menos»: ¿Se ajusta a la definición esta afirmación? «La
    frase **''Por lo menos''** se traduce utilizando el símbolo de desigualdad **mayor o igual que ($\ge$)**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La frase **''Por lo menos''** se traduce utilizando el símbolo
    de desigualdad **mayor o igual que ($\ge$)**.'
- titulo: 'Respecto de «Traducción de la frase por lo menos»: ¿Es compatible con el procedimiento esta'
  enunciado: 'Respecto de «Traducción de la frase por lo menos»: ¿Es compatible con el procedimiento esta afirmación?
    «Traducir ''por lo menos'' con el símbolo $\le$ o $<$ (caer en la trampa lingüística de la palabra ''menos'')»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La frase **''Por lo menos''** se traduce utilizando el símbolo
    de desigualdad **mayor o igual que ($\ge$)**.'
errores_frecuentes:
- Traducir 'por lo menos' con el símbolo $\le$ o $<$ (caer en la trampa lingüística de la palabra 'menos').
- Traducirlo con el símbolo estricto $>$ (perdiendo el derecho a igualar el piso).
- Porque en álgebra las palabras siempre significan lo contrario que en el lenguaje natural.
- Porque es imposible tener variables menores en una inecuación.
- Porque 'por lo menos' siempre se refiere a números negativos.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción de la frase por lo menos
