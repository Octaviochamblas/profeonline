semantic_id: MAT.ALG.FUNCION_AFIN.DEFINICION
titulo: Estudio de la función afín
objetivo: Reconocer la función afín como aquella que combina una parte proporcional a la variable con
  un término constante.
introduccion: 'A diferencia de la función lineal, la afín tiene un "punto de partida" distinto de cero:
  ya trae un valor inicial antes de que la variable empiece a influir.'
resumen: Una **función afín** es aquella de la forma $f(x) = mx + n$, con $m, n \in \mathbb{R}$ y $n \neq
  0$, donde $m$ es la pendiente y $n$ es el coeficiente de posición o intercepto.
explicacion: '### Definición formal


  Una función $f: \mathbb{R} \to \mathbb{R}$ se llama afín si existen constantes $m, n \in \mathbb{R}$,
  con $n \neq 0$, tales que $f(x) = mx + n$ para todo $x$. La función lineal ($n=0$) y la constante ($m=0$)
  son casos particulares relacionados, pero no afines en sentido estricto según esta definición.


  ### Desarrollo didáctico


  La estructura es "parte variable más parte fija": el término $mx$ cambia según $x$, mientras que $n$
  permanece igual siempre.


  Si un plan de telefonía cuesta \$5000 fijos más \$100 por cada minuto usado, el costo se modela como
  $C(x) = 100x + 5000$: aquí $m=100$ (costo por minuto) y $n=5000$ (cargo fijo, presente incluso sin usar
  minutos).'
procedimiento:
- 'Paso 1: Verifica que la fórmula tenga la forma $mx+n$.'
- 'Paso 2: Identifica el coeficiente $m$ que acompaña a la variable (la pendiente).'
- 'Paso 3: Identifica el término independiente $n$ (el coeficiente de posición).'
- 'Paso 4: Confirma que $n \neq 0$ para distinguirla de la función lineal.'
ejemplos:
- titulo: Identificación de función afín
  enunciado: Determina si $f(x) = 3x - 7$ es una función afín, e identifica $m$ y $n$.
  solucion_pasos:
  - Tiene la forma $mx+n$ con $n=-7 \neq 0$.
  - $m=3$, $n=-7$.
- titulo: Comparación lineal versus afín
  enunciado: Compara $f(x) = 5x$ con $g(x) = 5x + 2$.
  solucion_pasos:
  - $f$ es lineal, sin término independiente.
  - $g$ es afín, con $n=2 \neq 0$.
- titulo: ¿$f(x) = 4x$ es una función afín?
  enunciado: ¿$f(x) = 4x$ es una función afín?
  respuesta: 'No'
  solucion_pasos:
  - No tiene término independiente distinto de cero; es lineal, no afín.
- titulo: ¿Toda función lineal puede considerarse un caso particular relacionado con la familia afín?
  enunciado: ¿Toda función lineal puede considerarse un caso particular relacionado con la familia afín?
  respuesta: Sí
  solucion_pasos:
  - La lineal comparte la forma $mx+n$ con $n=0$, aunque estrictamente se distingue de la afín por esa
    condición.
errores_frecuentes:
- Confundir "afín" con "lineal", usando los términos como sinónimos exactos.
- Olvidar identificar correctamente cuál coeficiente es $m$ y cuál es $n$.
- Creer que $m$ debe ser positivo en toda función afín.
- No verificar la condición $n\neq0$ al clasificar entre lineal y afín.
