semantic_id: MAT.ALG.MODELAMIENTO_DESIGUALDADES.IDENTIFICACION_RESTRICCION
titulo: Identificación de una restricción en un problema contextual
objetivo: Identificar la restricción cuantitativa principal de un problema y expresarla como una desigualdad
  coherente con el contexto.
introduccion: En muchos problemas reales no se busca una cantidad exacta, sino respetar un límite. Ese
  límite puede venir dado por presupuesto, capacidad, tiempo, temperatura o seguridad.
resumen: 'Identificar una restricción consiste en reconocer qué cantidad está limitada y qué tipo de relación
  se exige: no superar, alcanzar al menos, quedar por debajo o mantenerse por encima.'
explicacion: '### Definición formal

  Una restricción contextual es una condición que reduce el conjunto de valores admisibles de una variable
  o de una expresión algebraica. Si $f(x)$ modela una magnitud del problema, una restricción se representa
  como una desigualdad del tipo


  $$f(x) < c,\qquad f(x) \le c,\qquad f(x) > c \qquad \text{o} \qquad f(x) \ge c,$$


  según el significado verbal del enunciado. Identificar la restricción consiste en determinar cuál es
  la magnitud controlada, qué cota la limita y qué símbolo de desigualdad expresa correctamente esa condición.


  ### Desarrollo didáctico

  Frases como “a lo más”, “no supera”, “al menos” o “debe exceder” no son adornos: indican exactamente
  el tipo de límite que el problema impone. Antes de operar, conviene preguntar qué cantidad está siendo
  comparada con un máximo o con un mínimo. Si se reconoce esa relación, ya se dispone del núcleo matemático
  del problema.'
procedimiento:
- Leer el enunciado y detectar la cantidad que está sujeta a una condición o límite.
- Identificar las palabras clave que expresan restricción, como “máximo”, “mínimo”, “no más de”, “al menos”
  o “supera”.
- Determinar si la condición corresponde a $<$, $>$, $\leq$ o $\geq$.
- Representar con una variable la cantidad desconocida involucrada en la restricción.
- Escribir la desigualdad que modela fielmente el límite del problema.
ejemplos:
- titulo: Límite de personas en una sala
  enunciado: Una sala admite como máximo $45$ personas. Si $p$ representa la cantidad de personas en la
    sala, escribe la restricción correspondiente.
  solucion_pasos:
  - La magnitud restringida es la cantidad de personas, representada por $p$.
  - La expresión “como máximo” indica que no se puede exceder el valor dado.
  - Por tanto, la restricción se modela como $p \leq 45$.
- titulo: Cantidad mínima para una promoción
  enunciado: Una tienda entrega despacho gratis por compras de al menos $30000$ pesos. Si $x$ representa
    el monto de compra, formula la restricción.
  solucion_pasos:
  - La cantidad comparada es el monto total de compra, representado por $x$.
  - La expresión “al menos” incluye el valor límite y todos los superiores.
  - La desigualdad correcta es $x \geq 30000$.
- titulo: ¿La expresión “no supera 80” se modela con $x \leq 80$?
  respuesta: Sí
  solucion_pasos:
  - “No supera” significa que el valor puede ser igual a $80$ o menor que $80$.
  - Eso corresponde exactamente a la desigualdad $x \leq 80$.
- titulo: ¿La expresión “a lo menos 12” se modela con $x < 12$?
  respuesta: false
  solucion_pasos:
  - “A lo menos” significa igual o mayor que el valor dado.
  - La traducción correcta es $x \geq 12$, no $x < 12$.
errores_frecuentes:
- Traducir “como máximo” usando $\geq$ en vez de $\leq$.
- Creer que “al menos” excluye el valor límite.
- Escribir una igualdad cuando el problema plantea un rango o una cota.
- Identificar mal la cantidad restringida y aplicar la desigualdad a otra magnitud.
- Ignorar palabras clave del contexto y elegir el signo por intuición.
