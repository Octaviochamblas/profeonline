semantic_id: MAT.ALG.SIMILARIDAD.DEFINICION_TERMINOS_SEMEJANTES
objetivo: Comprender la definición conceptual de términos semejantes en álgebra.
introduccion: En la vida diaria, podemos sumar 3 manzanas con 2 manzanas para obtener
  5 manzanas. Pero no podemos sumar 3 manzanas con 2 peras y decir que tenemos '5
  manzanaperas'. En álgebra, la regla es exactamente la misma.
resumen: Los **Términos Semejantes** son aquellos monomios que poseen exactamente
  el mismo **factor literal** (las mismas letras) afectado por los mismos **exponentes**,
  sin importar el coeficiente numérico que los acompañe.
explicacion: 'Dos términos son ''familia'' (semejantes) única y exclusivamente si
  sus letras y los pequeños números sobre ellas (exponentes) son idénticos.

  - $3a$ y $5a$ son semejantes (ambos son de la familia ''a'').

  - $-2x^2y$ y $7x^2y$ son semejantes (ambos de la familia ''x al cuadrado, y'').


  El coeficiente (el número grande adelante, como el $3$, $5$, $-2$ o $7$) nos dice
  **cuántos** elementos de esa familia tenemos. No define si son familia o no.'
procedimiento:
- 'Paso 1: Ignora temporalmente el coeficiente numérico y su signo.'
- 'Paso 2: Observa la parte literal (las letras).'
- 'Paso 3: Verifica que las letras sean exactamente las mismas en ambos términos.'
- 'Paso 4: Verifica que cada letra tenga exactamente el mismo exponente en ambos términos.
  Si ambas condiciones se cumplen, son semejantes.'
ejemplos:
- titulo: Manzanas con manzanas
  enunciado: ¿Son semejantes 4m y -9m?
  solucion_pasos:
  - Ignoramos los coeficientes 4 y -9.
  - 'Observamos la parte literal del primero: m.'
  - 'Observamos la parte literal del segundo: m.'
  - Tienen la misma letra con el mismo exponente (1). Sí son semejantes.
errores_frecuentes:
- Creer que términos con el mismo coeficiente pero distintas letras son semejantes
  (ej. pensar que $3x$ y $3y$ son semejantes).
- Considerar que un número sin letras (constante) es semejante a un término con letras.
fuente: Álgebra de Baldor.
estado: publicado
