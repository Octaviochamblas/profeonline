semantic_id: MAT.ALG.SIMILARIDAD.DEFINICION_TERMINOS_SEMEJANTES
objetivo: Comprender la definición conceptual de términos semejantes en álgebra.
introduccion: En la vida diaria, podemos sumar 3 manzanas con 2 manzanas para obtener 5 manzanas. Pero no podemos
  sumar 3 manzanas con 2 peras y decir que tenemos '5 manzanaperas'. En álgebra, la regla es exactamente la misma.
resumen: Los **Términos Semejantes** son aquellos monomios que poseen exactamente el mismo **factor literal** (las
  mismas letras) afectado por los mismos **exponentes**, sin importar el coeficiente numérico que los acompañe.
explicacion: '### Definición formal


  La semejanza algebraica depende única y exclusivamente del factor literal (letras y exponentes). Los coeficientes
  solo indican cantidad.


  ### Desarrollo didáctico


  Dos términos son ''familia'' (semejantes) única y exclusivamente si sus letras y los pequeños números sobre ellas
  (exponentes) son idénticos.

  - $3a$ y $5a$ son semejantes (ambos son de la familia ''a'').

  - $-2x^2y$ y $7x^2y$ son semejantes (ambos de la familia ''x al cuadrado, y'').


  El coeficiente (el número grande adelante, como el $3$, $5$, $-2$ o $7$) nos dice **cuántos** elementos de esa
  familia tenemos. No define si son familia o no.'
procedimiento:
- 'Paso 1: Ignora temporalmente el coeficiente numérico y su signo.'
- 'Paso 2: Observa la parte literal (las letras).'
- 'Paso 3: Verifica que las letras sean exactamente las mismas en ambos términos.'
- 'Paso 4: Verifica que cada letra tenga exactamente el mismo exponente en ambos términos. Si ambas condiciones
  se cumplen, son semejantes.'
ejemplos:
- titulo: Manzanas con manzanas
  enunciado: ¿Son semejantes 4m y -9m?
  solucion_pasos:
  - Ignoramos los coeficientes 4 y -9.
  - 'Observamos la parte literal del primero: m.'
  - 'Observamos la parte literal del segundo: m.'
  - Tienen la misma letra con el mismo exponente (1). Sí son semejantes.
- titulo: Un programa de software clasifica variables de memoria asignándoles etiquetas. Si asigna la
  enunciado: 'Un programa de software clasifica variables de memoria asignándoles etiquetas. Si asigna la etiqueta
    ''tipo A'' al bloque $3x^4$ y busca agruparlo con otro bloque del mismo tipo para optimización, ¿cuál de los
    siguientes bloques debería seleccionar? (v1)


    Opciones: A) $\frac{1}{2}x^4$ · B) $3x^3$ · C) $4x^3$ · D) $3x$'
  solucion_pasos:
  - La etiqueta se define por el factor literal $x^4$. El bloque $\frac{1}{2}x^4$ comparte esa estructura, siendo
    el único término semejante.
- titulo: 'Respecto de «Definición de términos semejantes»: ¿Describe adecuadamente el concepto esta fr'
  enunciado: 'Respecto de «Definición de términos semejantes»: ¿Describe adecuadamente el concepto esta frase? «Los
    **Términos Semejantes** son aquellos monomios que poseen exactamente el mismo **factor literal** (las mismas
    letras) afectado por los mismos **exponentes**, sin importar el coeficiente numérico que los acompañe»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Los **Términos Semejantes** son aquellos monomios que poseen
    exactamente el mismo **factor literal** (las mismas letras) afectado por los mismos **exponentes**, sin importar
    el coeficiente numérico que los acompañe.'
- titulo: 'Respecto de «Definición de términos semejantes»: ¿Se puede aceptar esta afirmación? «Creer q'
  enunciado: 'Respecto de «Definición de términos semejantes»: ¿Se puede aceptar esta afirmación? «Creer que términos
    con el mismo coeficiente pero distintas letras son semejantes (ej. pensar que $3x$ y $3y$ son semejantes)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Los **Términos Semejantes** son aquellos monomios que poseen
    exactamente el mismo **factor literal** (las mismas letras) afectado por los mismos **exponentes**, sin importar
    el coeficiente numérico que los acompañe.'
errores_frecuentes:
- Creer que términos con el mismo coeficiente pero distintas letras son semejantes (ej. pensar que $3x$ y $3y$ son
  semejantes).
- Considerar que un número sin letras (constante) es semejante a un término con letras.
- Son aquellos que tienen el mismo coeficiente numérico, aunque sus letras sean diferentes.
- Son aquellos que tienen las mismas letras, aunque sus exponentes varíen.
- Para «¿Cuál de las siguientes afirmaciones define correctamente el concepto de 'términos semejantes' en álgebra?
  (v1)», la respuesta correcta es Son aquellos que tienen el mismo signo y el mismo coeficiente.
fuente: Álgebra de Baldor.
