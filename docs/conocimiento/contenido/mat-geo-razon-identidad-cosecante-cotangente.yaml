semantic_id: MAT.GEO.TRIG_IDENTIDADES.COSECANTE_COTANGENTE
titulo: 'Identidad pitagórica recíproca: uno más cotangente cuadrado igual a cosecante cuadrado'
objetivo: Demostrar y aplicar la identidad pitagórica recíproca que relaciona la cotangente y la cosecante
  de un mismo ángulo.
introduccion: Esta identidad se obtiene dividiendo la identidad pitagórica fundamental por el seno al
  cuadrado, transformando seno y coseno en cotangente y cosecante.
resumen: Para cualquier ángulo agudo $\theta$, se cumple la identidad $1+\cot^2\theta=\csc^2\theta$.
explicacion: '![Identidad pitagórica: 1+cot²θ=csc²θ](/static/img/geometria/trigonometria/razon-identidad-cosecante-cotangente.svg)


  ### Definición formal


  Partiendo de $\sin^2\theta+\cos^2\theta=1$ y dividiendo ambos lados por $\sin^2\theta$: $1+\dfrac{\cos^2\theta}{\sin^2\theta}=\dfrac{1}{\sin^2\theta}$,
  es decir, $1+\cot^2\theta=\csc^2\theta$.


  ### Desarrollo didáctico


  Si $\cot\theta=\dfrac{4}{3}$, entonces $\csc^2\theta=1+\left(\dfrac{4}{3}\right)^2=1+\dfrac{16}{9}=\dfrac{25}{9}$,
  por lo que $\csc\theta=\dfrac{5}{3}$.'
procedimiento:
- 'Paso 1: Recuerda que esta identidad se obtiene dividiendo la identidad pitagórica fundamental por sin²θ.'
- 'Paso 2: Si conoces cotθ, calcula csc²θ=1+cot²θ.'
- 'Paso 3: Extrae la raíz cuadrada para obtener cscθ, y de ahí sinθ=1/cscθ si es necesario.'
ejemplos:
- titulo: Calcular la cosecante a partir de la cotangente
  enunciado: cotθ=4/3.
  solucion_pasos:
  - csc²θ=1+(4/3)²=1+16/9=25/9 → cscθ=5/3.
- titulo: Verificar la identidad con valores notables
  enunciado: θ=45°, con cot45°=1.
  solucion_pasos:
  - csc²45°=1+1²=2 → csc45°=√2, coincidiendo con 1/sin45°=1/(√2/2)=√2.
- titulo: ¿Esta identidad se deduce de la identidad pitagórica fundamental?
  respuesta: Sí
  solucion_pasos:
  - Sí, se obtiene dividiendo sin²θ+cos²θ=1 por sin²θ.
- titulo: ¿Se puede usar esta identidad para calcular el seno a partir de la cotangente?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, una vez obtenida la cosecante, el seno es simplemente su recíproco: sinθ=1/cscθ.'
errores_frecuentes:
- Olvidar sumar 1 antes de elevar la cotangente al cuadrado.
- Confundir esta identidad con la de secante-tangente, dividiendo por el término incorrecto.
- Olvidar sacar la raíz cuadrada al despejar la cosecante desde su cuadrado.
fuente: 'Elaboración propia (referencias: Moraleja 178, Cid 155).'
estado: publicado
