semantic_id: MAT.EST.REGLAS_PROBABILIDAD.SUMA_GENERAL
titulo: Regla aditiva general para eventos con intersección
objetivo: Aplicar la regla aditiva general para calcular la probabilidad de la unión de dos eventos que
  sí comparten elementos, restando la probabilidad de su intersección para no contarla dos veces.
introduccion: Cuando dos eventos comparten algunos resultados, sumar directamente sus probabilidades contaría
  esos elementos comunes dos veces, por lo que se debe restar la probabilidad de la intersección.
resumen: Para cualquier par de eventos $A$ y $B$, la probabilidad de su unión es $P(A\cup B)=P(A)+P(B)-P(A\cap
  B)$.
explicacion: '![Regla aditiva general](/static/img/probabilidad/reglas/regla-suma-general.svg)


  ### Definición formal


  Como los elementos de $A\cap B$ se cuentan tanto en $n(A)$ como en $n(B)$, se deben restar una vez para
  no duplicarlos: $n(A\cup B)=n(A)+n(B)-n(A\cap B)$, de donde $P(A\cup B)=P(A)+P(B)-P(A\cap B)$.


  ### Desarrollo didáctico


  Al lanzar un dado, si $A$=''número par'' ($P(A)=3/6$) y $B$=''número mayor que 3'' ($P(B)=3/6$), su
  intersección es $\{4,6\}$ ($P(A\cap B)=2/6$). Entonces $P(A\cup B)=3/6+3/6-2/6=4/6$.'
procedimiento:
- 'Paso 1: Calcula P(A) y P(B) por separado.'
- 'Paso 2: Calcula la probabilidad de la intersección P(A∩B).'
- 'Paso 3: Aplica la fórmula P(A∪B)=P(A)+P(B)-P(A∩B).'
ejemplos:
- titulo: Calcular P(A∪B) con intersección no vacía
  enunciado: A='par' (P=3/6), B='mayor que 3' (P=3/6), A∩B={4,6} (P=2/6).
  solucion_pasos:
  - P(A∪B)=3/6+3/6-2/6=4/6=2/3.
- titulo: Calcular P(A∪B) con cartas
  enunciado: A='rey' (P=4/52), B='corazón' (P=13/52), A∩B='rey de corazones' (P=1/52).
  solucion_pasos:
  - P(A∪B)=4/52+13/52-1/52=16/52.
- titulo: ¿Se debe restar P(A∩B) si los eventos comparten elementos?
  respuesta: Sí
  solucion_pasos:
  - Sí, de lo contrario se contarían dos veces los elementos comunes.
- titulo: ¿Esta fórmula también funciona cuando los eventos son excluyentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, en ese caso P(A∩B)=0, y la fórmula se reduce a la regla de la suma simple.
errores_frecuentes:
- Olvidar restar la probabilidad de la intersección, sobreestimando la probabilidad de la unión.
- Calcular incorrectamente P(A∩B), afectando el resultado final.
- Aplicar la regla de la suma simple (sin restar la intersección) cuando los eventos no son excluyentes.
fuente: 'Elaboración propia (referencia: Moraleja 409).'
estado: publicado
