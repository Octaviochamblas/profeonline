semantic_id: MAT.NUM.REPARTO_ESCALAS.REPARTO_DIRECTO
objetivo: Calcular partes de un todo utilizando el reparto proporcional directo.
introduccion: Si tú pones $10.000 para comprar un boleto de lotería y tu amigo pone
  $5.000, ¿es justo que se dividan el premio en partes iguales? El reparto directo
  asegura que quien más pone, más recibe, de forma matemáticamente exacta.
resumen: El reparto proporcional directo divide una cantidad en partes que son directamente
  proporcionales a ciertos 'índices' o 'cuotas'. Se resuelve hallando una constante
  de reparto.
explicacion: "El **reparto directo** consiste en distribuir una cantidad total ($T$)\
  \ entre varias partes ($A, B, C...$) de modo que estas partes reciban cantidades\
  \ proporcionales a sus respectivos índices de participación ($a, b, c...$).\n\n\
  El método de la **Constante de Reparto ($K$)** es el más rápido:\n1. Suma todos\
  \ los índices: $S = a + b + c$\n2. Divide el Total a repartir por esta suma para\
  \ hallar $K$: $K = T / S$\n3. La porción de cada uno es su índice multiplicado por\
  \ $K$: \n   - Parte de A $= a \\cdot K$\n   - Parte de B $= b \\cdot K$"
procedimiento:
- 'Paso 1: Suma todos los valores base o índices de reparto.'
- 'Paso 2: Divide la cantidad total a repartir entre esa suma. El resultado es el
  valor de ''una cuota'' ($K$).'
- 'Paso 3: Multiplica el índice de cada participante por la cuota $K$ para saber cuánto
  le toca.'
ejemplos:
- titulo: Reparto de ganancias
  enunciado: Repartir $60.000 de ganancia entre Ana (trabajó 2 horas) y Luis (trabajó
    4 horas).
  solucion_pasos:
  - 'Suma de índices (horas totales): $2 + 4 = 6$ horas.'
  - 'Calculamos la constante: $K = 60.000 / 6 = 10.000$ (pagan 10 mil por hora).'
  - 'Ana recibe: $2 \cdot 10.000 = 20.000$.'
  - 'Luis recibe: $4 \cdot 10.000 = 40.000$.'
errores_frecuentes:
- Repartir en partes iguales ignorando los índices.
- Dividir el total por cada índice de forma aislada, en vez de sumarlos primero.
- Sumar mal los índices y arrastrar el error al cálculo de $K$.
fuente: Currículum Nacional MINEDUC.
estado: publicado
