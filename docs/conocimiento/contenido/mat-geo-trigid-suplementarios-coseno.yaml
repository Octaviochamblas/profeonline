semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.SUPLEMENTARIOS_COSENO
titulo: Relación del coseno entre ángulos suplementarios
objetivo: Establecer que el coseno de un ángulo es igual al opuesto del coseno de su ángulo suplementario
  (ángulos que suman 180°).
introduccion: A diferencia del seno, el coseno sí cambia de signo entre ángulos suplementarios, porque
  los puntos correspondientes en la circunferencia unitaria son reflejos horizontales entre sí, con coordenadas
  x opuestas.
resumen: Si $x$ y $180°-x$ son ángulos suplementarios, se cumple $\cos(180°-x)=-\cos x$.
explicacion: '![Coseno de ángulos suplementarios](/static/img/geometria/trigonometria/trigid-suplementarios-coseno.svg)


  ### Definición formal


  Para cualquier ángulo $x$, se cumple $\cos(180°-x)=-\cos x$, ya que el punto correspondiente a $180°-x$
  en la circunferencia unitaria tiene la misma coordenada y pero coordenada x opuesta a la del punto correspondiente
  a $x$.


  ### Desarrollo didáctico


  En la figura, θ=35° y su suplementario 180°-θ=145°. Se cumple que cos145°=-cos35°, ya que ambos ángulos
  comparten la misma altura (mismo seno) pero están reflejados horizontalmente (coseno de signo opuesto).'
procedimiento:
- 'Paso 1: Verifica que los dos ángulos sumen 180° (sean suplementarios).'
- 'Paso 2: Aplica cos(180°-x)=-cosx, recordando el cambio de signo.'
- 'Paso 3: Usa esta relación para obtener el coseno de un ángulo obtuso a partir del coseno (con signo
  cambiado) de su suplementario agudo.'
ejemplos:
- titulo: Verificar la relación con 35° y 145°
  enunciado: θ=35°, suplementario 145°.
  solucion_pasos:
  - cos145°=-cos35°, por ser ángulos suplementarios.
- titulo: Calcular cos(150°) usando el suplementario
  enunciado: cos30°=√3/2≈0,866.
  solucion_pasos:
  - cos150°=-cos(180°-150°)=-cos30°≈-0,866.
- titulo: ¿El coseno cambia de signo entre ángulos suplementarios?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del seno, el coseno sí cambia de signo.
- titulo: ¿El coseno de un ángulo obtuso es siempre negativo?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque los ángulos obtusos están en el segundo cuadrante, donde el coseno es negativo.
errores_frecuentes:
- Olvidar el cambio de signo al aplicar esta identidad (a diferencia del seno).
- Confundir esta identidad con la del seno de ángulos suplementarios.
- Aplicar el signo negativo incorrectamente, cambiándolo también en ángulos agudos.
fuente: Elaboración propia.
estado: publicado
