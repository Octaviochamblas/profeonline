semantic_id: MAT.ALG.FUNDAMENTOS.REPRESENTACION_LETRAS
objetivo: Comprender que las letras en álgebra representan cantidades numéricas que
  operan bajo las mismas leyes que los números.
introduccion: Si ves una '$a$' en un libro de lenguaje, es la primera vocal. Si la
  ves en un libro de matemáticas, es un número disfrazado. Tienes que aprender a tratar
  a las letras con el mismo respeto (y las mismas reglas) que a los números de siempre.
resumen: En álgebra, las **letras representan números**. Por lo tanto, puedes sumar,
  restar, multiplicar o dividirlas siguiendo exactamente las **mismas propiedades
  aritméticas** que los números reales (conmutatividad, asociatividad, distributividad).
explicacion: 'Como la letra representa un número escondido, debes obedecer las reglas
  universales:

  1. Propiedad Conmutativa: Así como $2 + 5$ es igual a $5 + 2$, también ocurre que
  $x + y = y + x$.

  2. Propiedad Distributiva: Así como $3 \cdot (4 + 2) = 3\cdot 4 + 3\cdot 2$, también
  ocurre que $a \cdot (b + c) = ab + ac$.


  Si le asignas el valor numérico 10 a la letra $k$, entonces la expresión $k + 5$
  automáticamente vale 15. Las letras son solo ''recipientes'' maleables, y operan
  como si ya tuvieran el número adentro.'
procedimiento:
- 'Paso 1: Observa las letras de la expresión.'
- 'Paso 2: Recuerda que son números reales, y aplícales las reglas de la aritmética
  que ya conoces.'
- 'Paso 3: No intentes sumar letras diferentes (como a + b) en un solo término final
  a menos que sepas su valor, porque son recipientes distintos.'
ejemplos:
- titulo: Operando a ciegas
  enunciado: Aplica la propiedad conmutativa a la multiplicación de 'p' y 'q'.
  solucion_pasos:
  - En aritmética, 3 * 4 = 4 * 3.
  - En álgebra, p * q = q * p.
  - No importa qué números escondan p y q, el orden de los factores no altera el producto.
errores_frecuentes:
- Olvidar que las letras son números y tratar de operar fuera de las reglas aritméticas
  (ej. pensar que $a + a = a^2$ en lugar de $2a$, como si fueran manzanas en lugar
  de cantidades).
- Creer que letras distintas siempre deben tener valores distintos (a veces $x$ e
  $y$ podrían valer 5 ambas, a menos que el problema diga lo contrario).
fuente: Álgebra de Baldor.
estado: publicado
