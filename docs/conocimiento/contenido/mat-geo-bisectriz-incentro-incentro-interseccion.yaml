semantic_id: MAT.GEO.BISECTRIZ_INCENTRO.INCENTRO_INTERSECCION
titulo: Definición de incentro como punto de intersección de las bisectrices interiores
objetivo: Reconocer el incentro como el punto único donde concurren las tres bisectrices interiores de
  un triángulo.
introduccion: 'Al igual que las alturas concurren en el ortocentro, las tres bisectrices interiores de
  un triángulo también concurren siempre en un único punto: el incentro.'
resumen: El incentro es el punto donde se intersecan las tres bisectrices interiores de un triángulo.
explicacion: '![Incentro, intersección de las bisectrices](/static/img/geometria/elementos-secundarios/bisectriz-incentro-incentro-interseccion.svg)


  ### Definición formal


  Dado un triángulo ABC, el incentro I es el punto común a las tres bisectrices interiores trazadas desde
  A, B y C.


  ### Desarrollo didáctico


  A diferencia del ortocentro (que puede quedar fuera del triángulo), el incentro siempre se ubica en
  el interior de la figura, sin importar el tipo de triángulo.'
procedimiento:
- 'Paso 1: Traza (o identifica) las tres bisectrices interiores del triángulo.'
- 'Paso 2: Encuentra el punto donde las tres se cruzan.'
- 'Paso 3: Ese punto es el incentro.'
ejemplos:
- titulo: Identificar el incentro
  enunciado: Las tres bisectrices de un triángulo se cruzan en un punto I.
  solucion_pasos:
  - I es el incentro del triángulo.
- titulo: Basta con dos bisectrices
  enunciado: ¿Es necesario trazar las tres bisectrices para hallar el incentro?
  solucion_pasos:
  - 'No, basta con trazar dos: su intersección ya es el incentro.'
- titulo: ¿El incentro siempre está dentro del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del ortocentro, el incentro siempre queda dentro de la figura.
- titulo: ¿El incentro coincide con el ortocentro en general?
  respuesta: 'No'
  solucion_pasos:
  - No, son puntos distintos salvo en el triángulo equilátero.
errores_frecuentes:
- Creer que se necesitan las tres bisectrices para ubicar el incentro (basta con dos).
- Confundir el incentro con el ortocentro o el baricentro.
- Pensar que el incentro puede quedar fuera del triángulo.
fuente: Elaboración propia.
estado: publicado
