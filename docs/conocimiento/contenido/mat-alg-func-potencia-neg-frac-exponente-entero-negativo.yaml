semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.EXPONENTE_ENTERO_NEGATIVO
titulo: Función potencia con exponente entero negativo
objetivo: Reescribir $f(x)=x^{-n}$ (con $n$ entero positivo) como $f(x)=1/x^n$ y reconocer su significado.
introduccion: Un exponente negativo no indica un resultado negativo, sino que la potencia pasa a formar parte de
  un denominador.
resumen: Para $n$ entero positivo, $f(x)=x^{-n}$ es equivalente a $f(x)=\dfrac{1}{x^n}$, una expresión que
  requiere excluir $x=0$ del dominio.
explicacion: '### Definición formal


  Para $n\in\mathbb{Z}^+$, se define $x^{-n}=\dfrac{1}{x^n}$ para todo $x\neq0$. Esta identidad traslada el
  análisis de exponentes negativos al de fracciones con potencias en el denominador.


  ### Desarrollo didáctico


  $f(x)=x^{-2}=\dfrac{1}{x^2}$: al evaluar en $x=3$, se obtiene $f(3)=1/9$; al evaluar en $x=-3$, se obtiene
  $f(-3)=1/9$ también, porque el exponente $-2$ hereda la paridad de $2$.'
procedimiento:
- 'Paso 1: Identifica el exponente negativo $-n$ en la expresión $x^{-n}$.'
- 'Paso 2: Reescribe la expresión como $1/x^n$, con $n$ positivo.'
- 'Paso 3: Excluye $x=0$ del dominio, ya que produce una división por cero.'
ejemplos:
- titulo: Reescritura de un exponente negativo simple
  enunciado: 'Reescribe $f(x)=x^{-3}$ como fracción.'
  solucion_pasos:
  - Se aplica la definición de exponente negativo.
  - 'Se obtiene $f(x)=1/x^3$.'
- titulo: Evaluación con exponente negativo
  enunciado: 'Evalúa $f(x)=x^{-2}$ en $x=5$.'
  solucion_pasos:
  - 'Se reescribe como $f(x)=1/x^2$.'
  - 'Se evalúa: $f(5)=1/25$.'
- titulo: ¿$x^{-n}$ es siempre negativo?
  enunciado: ¿El resultado de $x^{-n}$ es siempre un número negativo?
  respuesta: 'No'
  solucion_pasos:
  - El signo del resultado depende del signo de $x$ y de la paridad de $n$, no del signo del exponente.
- titulo: ¿$x=0$ pertenece al dominio de $f(x)=x^{-n}$?
  enunciado: ¿El valor $x=0$ pertenece al dominio de $f(x)=x^{-n}$ para $n$ entero positivo?
  respuesta: 'No'
  solucion_pasos:
  - Se excluye porque produciría una división por cero al reescribir como $1/x^n$.
errores_frecuentes:
- Suponer que un exponente negativo siempre produce un resultado negativo.
- Olvidar excluir $x=0$ del dominio al reescribir la expresión como fracción.
- Confundir $x^{-n}$ con $-x^n$, que son expresiones completamente distintas.
- No aplicar correctamente la paridad de $n$ al determinar el signo del resultado.
