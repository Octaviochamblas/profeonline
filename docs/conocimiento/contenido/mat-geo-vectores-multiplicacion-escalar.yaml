semantic_id: MAT.GEO.VECTORES_OPERATORIA.MULTIPLICACION_ESCALAR
titulo: Multiplicación de un vector por un escalar
objetivo: Multiplicar un vector por un número real (escalar), obteniendo un nuevo vector cuyas componentes
  son las originales multiplicadas por ese escalar.
introduccion: Multiplicar un vector por un escalar es como 'estirar' o 'encoger' la flecha que lo representa,
  manteniendo su misma línea de dirección.
resumen: La multiplicación de un vector $\vec{v}=(v_x,v_y)$ por un escalar $k$ (número real) es $k\vec{v}=(k\cdot
  v_x,\,k\cdot v_y)$.
explicacion: '![Multiplicación de un vector por un escalar](/static/img/geometria/cartesiano-vectores/vectores-multiplicacion-escalar.svg)


  ### Definición formal


  Si $\vec{v}=(v_x,v_y)$ y $k$ es un número real (escalar), entonces $k\vec{v}=(k\cdot v_x,\,k\cdot v_y)$:
  cada componente del vector se multiplica por el mismo escalar.


  ### Desarrollo didáctico


  En la figura, el vector $\vec{v}=(1{,}5,1)$ multiplicado por el escalar $k=2$ da $2\vec{v}=(3,2)$: un
  vector con el doble de longitud, en la misma dirección y sentido que el original.'
procedimiento:
- 'Paso 1: Identifica el vector v=(vx,vy) y el escalar k por el que se multiplicará.'
- 'Paso 2: Multiplica cada componente del vector por el escalar: k·vx y k·vy.'
- 'Paso 3: Escribe el vector resultante kv=(k·vx, k·vy).'
ejemplos:
- titulo: Multiplicar un vector por un escalar positivo
  enunciado: v=(1,5;1) se multiplica por k=2.
  solucion_pasos:
  - 2v=(2×1,5, 2×1)=(3,2).
- titulo: Multiplicar un vector por un escalar negativo
  enunciado: v=(4,-2) se multiplica por k=-3.
  solucion_pasos:
  - -3v=(-3×4, -3×(-2))=(-12,6).
- titulo: ¿Se multiplican ambas componentes por el mismo escalar?
  respuesta: Sí
  solucion_pasos:
  - Sí, tanto la componente x como la componente y se multiplican por el mismo número k.
- titulo: ¿La multiplicación por escalar cambia la dirección del vector si k es positivo?
  respuesta: 'No'
  solucion_pasos:
  - No, si k es positivo, la dirección y el sentido del vector se mantienen; solo cambia su módulo.
errores_frecuentes:
- Multiplicar solo una de las dos componentes por el escalar, dejando la otra sin modificar.
- Confundir la multiplicación escalar con la suma de vectores.
- No considerar el efecto del signo del escalar sobre el sentido del vector.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 123).'
estado: publicado
