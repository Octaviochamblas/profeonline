semantic_id: MAT.ALG.FUNCION_TIPOS_INVERSA.CONDICION_INVERTIBILIDAD
titulo: Reconocimiento de condición de invertibilidad de una función
objetivo: Reconocer que la biyectividad es condición necesaria y suficiente para que una función tenga
  inversa.
introduccion: No toda función merece tener una inversa propia; solo aquellas que emparejan perfectamente
  cada entrada con una única salida, sin dejar a nadie sin pareja ni compartiendo pareja.
resumen: Una función $f\colon A \to B$ es **invertible** si y solo si es **biyectiva**; en tal caso, y
  solo en tal caso, existe una función inversa $f^{-1}\colon B \to A$ bien definida.
explicacion: '### Definición formal


  Una función $f\colon A \to B$ admite una función inversa $f^{-1}\colon B \to A$ si y solo si $f$ es
  biyectiva. Si $f$ no es inyectiva, algún $y$ tendría más de una preimagen, violando la unicidad exigida
  a $f^{-1}$; si $f$ no es sobreyectiva, algún $y \in B$ no tendría preimagen, dejando a $f^{-1}$ sin
  definir en ese punto.


  ### Desarrollo didáctico


  Para verificar invertibilidad, basta con verificar biyectividad: si falla la inyectividad o la sobreyectividad,
  la función no tiene inversa (sobre esos conjuntos $A$ y $B$).


  $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=x^2$ no es invertible (no es inyectiva), pero restringida
  a $f\colon [0,+\infty[ \to [0,+\infty[$ sí lo es, porque en ese dominio restringido se vuelve biyectiva.'
procedimiento:
- 'Paso 1: Verifica si la función es inyectiva.'
- 'Paso 2: Verifica si la función es sobreyectiva.'
- 'Paso 3: Si ambas se cumplen, la función es invertible; si no, no tiene inversa sobre esos conjuntos.'
- 'Paso 4: Si falla la inyectividad, considera restringir el dominio para lograr invertibilidad.'
ejemplos:
- titulo: Verificación de invertibilidad en función afín
  enunciado: Determina si $f\colon \mathbb{R} \to \mathbb{R}$, $f(x)=4x-1$, es invertible.
  solucion_pasos:
  - Es inyectiva (pendiente distinta de cero) y sobreyectiva (recorrido igual a $\mathbb{R}$).
  - Es biyectiva, por lo tanto es invertible.
- titulo: Restricción de dominio para lograr invertibilidad
  enunciado: Explica por qué $f\colon \mathbb{R} \to [0,+\infty[$, $f(x)=x^2$, no es invertible, y cómo
    restringirla para que lo sea.
  solucion_pasos:
  - No es inyectiva en todo $\mathbb{R}$, pues $f(2)=f(-2)=4$.
  - Restringiendo el dominio a $[0,+\infty[$, la función se vuelve inyectiva y por tanto invertible.
- titulo: ¿Una función que no es biyectiva puede tener inversa sobre su dominio completo?
  enunciado: ¿Una función que no es biyectiva puede tener inversa sobre su dominio completo?
  respuesta: 'No'
  solucion_pasos:
  - La biyectividad es condición necesaria y suficiente para la invertibilidad sobre esos conjuntos.
- titulo: ¿Restringir el dominio puede convertir una función no invertible en invertible?
  enunciado: ¿Restringir el dominio puede convertir una función no invertible en invertible?
  respuesta: Sí
  solucion_pasos:
  - Al restringir adecuadamente el dominio, se puede lograr inyectividad y, por tanto, invertibilidad.
errores_frecuentes:
- Creer que toda función tiene inversa sin verificar biyectividad.
- Olvidar que restringir el dominio puede cambiar el estatus de invertibilidad de una función.
- Confundir la condición de invertibilidad con la simple existencia de una fórmula algebraica para $f^{-1}$.
- No verificar sobreyectividad, centrándose solo en la inyectividad.
