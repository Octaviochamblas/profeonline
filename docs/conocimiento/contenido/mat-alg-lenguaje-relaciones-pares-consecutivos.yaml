semantic_id: MAT.ALG.LENGUAJE_RELACIONES.PARES_CONSECUTIVOS
objetivo: Modelar una serie de números pares que se suceden entre sí.
introduccion: Si estamos contando de dos en dos (2, 4, 6, 8...), ya no nos sirve sumar
  de a 1. El salto entre números de la misma familia de paridad es mayor.
resumen: 'Los **Números Pares Consecutivos** se distancian siempre en **2 unidades**.
  Para modelarlos, anclamos el primer número como par ($2n$) y le sumamos $2, 4, 6...$
  obteniendo: **$2n$, $2n+2$, $2n+4$**.'
explicacion: 'Construcción lógica:

  1. El primer número debe ser garantizado par: $2n$.

  2. ¿Cuál es el siguiente número par? Si le sumo 1 ($2n+1$) caigo en un impar. Debo
  sumarle 2.

  3. El segundo par consecutivo es: $2n+2$.

  4. El tercer par consecutivo es: $2n+4$.


  Si el problema es más permisivo y no exige que las letras representen ''cualquier
  entero'', a veces verás que usan $x, x+2, x+4$ asumiendo tácitamente que ''x'' ya
  es par de antemano.'
procedimiento:
- 'Paso 1: Establece el primer número como 2n (el primer par).'
- 'Paso 2: Suma 2 para hallar el segundo (2n + 2).'
- 'Paso 3: Suma 4 para hallar el tercero (2n + 4), y así sucesivamente.'
- 'Paso 4: Relaciona estos bloques según lo pida el enunciado (suma, resta, producto).'
ejemplos:
- titulo: Sumando saltos pares
  enunciado: 'Traduce algebraicamente: ''La suma de tres pares consecutivos''.'
  solucion_pasos:
  - 'Primer par: 2n.'
  - 'Segundo par: 2n + 2.'
  - 'Tercer par: 2n + 4.'
  - 'Suma total: 2n + (2n + 2) + (2n + 4).'
  - 'Reducido: 6n + 6.'
errores_frecuentes:
- Traducirlos como $2n, 2n+1, 2n+2$. (Aquí estás alternando par-impar-par).
- Confundirlos con enteros consecutivos ($x, x+1, x+2$).
fuente: Álgebra de Baldor.
estado: publicado
