semantic_id: MAT.ALG.MODELAMIENTO_AFIN.CRECIMIENTO_POBLACIONAL_LINEAL
titulo: Modelamiento de crecimiento poblacional lineal
objetivo: Modelar el crecimiento o decrecimiento de una población mediante una función afín, cuando la
  variación es constante en el tiempo.
introduccion: Cuando una población gana o pierde exactamente el mismo número de individuos cada año, su
  comportamiento es tan predecible como una recta.
resumen: El **crecimiento poblacional lineal** se modela con una función afín $P(t) = mt + P_0$, donde
  $P_0$ es la población inicial y $m$ es la variación constante de población por unidad de tiempo.
explicacion: '### Definición formal


  Si una población $P(t)$ en el instante $t$ satisface $P(t) = mt + P_0$, con $P_0=P(0)$ la población
  inicial y $m$ la variación neta constante por período (positiva si crece, negativa si decrece), el modelo
  es de crecimiento poblacional lineal (a diferencia del crecimiento exponencial, donde la tasa depende
  del tamaño actual).


  ### Desarrollo didáctico


  Este modelo asume que la cantidad de nuevos individuos (o de individuos perdidos) por período es siempre
  la misma, sin importar el tamaño actual de la población.


  Si una ciudad tenía 50.000 habitantes en 2020 y gana 1.200 habitantes por año: $P(t) = 1200t + 50000$,
  donde $t$ son los años transcurridos desde 2020.'
procedimiento:
- 'Paso 1: Identifica la población inicial $P_0$ del contexto.'
- 'Paso 2: Identifica la variación constante por período (positiva si crece, negativa si decrece).'
- 'Paso 3: Construye el modelo $P(t) = mt + P_0$.'
- 'Paso 4: Evalúa el modelo en el tiempo solicitado para obtener la población proyectada.'
ejemplos:
- titulo: Modelamiento de crecimiento poblacional
  enunciado: Un pueblo tiene 3000 habitantes y crece a razón de 80 habitantes por año. Modela su población
    $P$ después de $t$ años.
  solucion_pasos:
  - Población inicial - $P_0=3000$.
  - Tasa de crecimiento - $m=80$.
  - $P(t) = 80t + 3000$.
- titulo: Modelamiento de decrecimiento poblacional
  enunciado: Un pueblo tiene 5000 habitantes y pierde 30 habitantes por año debido a la migración. Modela
    su población $P$ después de $t$ años.
  solucion_pasos:
  - Población inicial - $P_0=5000$.
  - Tasa de decrecimiento - $m=-30$.
  - $P(t) = -30t + 5000$.
- titulo: ¿El crecimiento poblacional lineal asume una variación constante por período?
  enunciado: ¿El crecimiento poblacional lineal asume una variación constante por período?
  respuesta: Sí
  solucion_pasos:
  - Esa es la hipótesis fundamental que distingue el modelo lineal de otros modelos de crecimiento.
- titulo: ¿Una población que pierde habitantes puede modelarse con este tipo de función?
  enunciado: ¿Una población que pierde habitantes puede modelarse con este tipo de función?
  respuesta: Sí
  solucion_pasos:
  - Se modela con pendiente negativa, representando la disminución constante.
errores_frecuentes:
- Confundir el crecimiento lineal (variación constante en cantidad) con el crecimiento exponencial (variación
  proporcional al tamaño actual).
- Olvidar el signo negativo al modelar una población decreciente.
- Confundir la población inicial con la tasa de crecimiento.
- Asumir que toda población crece indefinidamente sin considerar límites del contexto real.
