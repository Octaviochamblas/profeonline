semantic_id: MAT.EST.REGLA_BAYES.POSTERIORI
titulo: Interpretación de probabilidad a posteriori tras incorporar nueva información
objetivo: Interpretar la probabilidad a posteriori como la probabilidad actualizada de un evento, después
  de incorporar nueva evidencia u observación.
introduccion: Una vez que se observa nueva información (como un resultado de prueba), la probabilidad
  inicial (a priori) se actualiza, dando lugar a una probabilidad a posteriori que refleja ese nuevo conocimiento.
resumen: La probabilidad a posteriori de un evento $A$ dado una evidencia $B$, es decir $P(A|B)$, es la
  probabilidad actualizada de $A$ después de conocer que $B$ ocurrió.
explicacion: '![Probabilidad a posteriori](/static/img/probabilidad/bayes/bayes-posteriori.svg)


  ### Definición formal


  $P(A|B)$ es la probabilidad a posteriori de $A$: representa cómo se actualiza la creencia inicial $P(A)$
  (a priori) al incorporar la evidencia $B$.


  ### Desarrollo didáctico


  Si $P(\text{enfermedad})=0{,}05$ es la probabilidad a priori, y luego de un resultado positivo se calcula
  $P(\text{enfermedad}|\text{positivo})=0{,}32$, este segundo valor es la probabilidad a posteriori, actualizada
  tras la evidencia del resultado positivo.'
procedimiento:
- 'Paso 1: Identifica cuál es la evidencia nueva que se ha observado (por ejemplo, un resultado de prueba).'
- 'Paso 2: Aplica la regla de Bayes para calcular la probabilidad actualizada del evento de interés dado
  esa evidencia.'
- 'Paso 3: Interpreta ese resultado como la probabilidad a posteriori, actualizada respecto de la probabilidad
  a priori inicial.'
ejemplos:
- titulo: Interpretar una probabilidad a posteriori médica
  enunciado: P(enfermedad)=0,05 (a priori), P(enfermedad|positivo)=0,32 (a posteriori).
  solucion_pasos:
  - La probabilidad a posteriori (0,32) es mucho mayor que la a priori (0,05), reflejando que el resultado
    positivo aumentó considerablemente la creencia de tener la enfermedad.
- titulo: Interpretar una probabilidad a posteriori de control de calidad
  enunciado: P(máquina A)=0,6 (a priori), P(máquina A|defectuosa)=0,43 (a posteriori).
  solucion_pasos:
  - La probabilidad a posteriori (0,43) actualiza la creencia inicial (0,6) considerando que la pieza
    resultó ser defectuosa.
- titulo: ¿La probabilidad a posteriori se calcula después de observar la evidencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente su definición, opuesta a la probabilidad a priori.
- titulo: ¿La probabilidad a posteriori siempre es mayor que la a priori?
  respuesta: 'No'
  solucion_pasos:
  - No, puede ser mayor, menor o igual, dependiendo de si la evidencia favorece, desfavorece o es neutral
    respecto del evento.
errores_frecuentes:
- Confundir la probabilidad a posteriori con la a priori, sin distinguir el momento (antes o después de
  la evidencia).
- Asumir que la probabilidad a posteriori siempre debe ser mayor que la a priori.
- Calcular la probabilidad a posteriori sin aplicar correctamente la regla de Bayes con la evidencia relevante.
fuente: Elaboración propia.
estado: publicado
