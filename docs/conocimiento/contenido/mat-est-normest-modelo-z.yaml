semantic_id: MAT.EST.NORMAL_ESTANDAR.MODELO_Z
titulo: Reconocer las características de la distribución normal estándar
objetivo: Reconocer la distribución normal estándar como aquella distribución normal particular con media 0 y
  desviación estándar 1.
introduccion: Entre todas las distribuciones normales posibles, existe una muy especial que sirve de referencia
  universal para todas las demás, la normal estándar.
resumen: La distribución normal estándar, denotada $N(0,1)$, es la distribución normal con media 0 y desviación
  estándar 1, usada como referencia para estandarizar cualquier otra normal.
explicacion: '![Distribución normal estándar](/static/img/estadistica/normest/normest-modelo-z.svg)


  ### Definición formal


  La distribución normal estándar es la distribución normal $N(0,1)$, es decir, con $\mu=0$ y $\sigma=1$. Su variable

  se denota habitualmente con la letra $Z$.


  ### Desarrollo didáctico


  Cualquier distribución normal puede transformarse en la normal estándar mediante un proceso llamado

  estandarización, lo que permite usar una única tabla de valores (la tabla Z) para cualquier problema normal.'
procedimiento:
- 'Paso 1: Reconoce que la normal estándar tiene siempre $\mu=0$.'
- 'Paso 2: Reconoce que la normal estándar tiene siempre $\sigma=1$.'
- 'Paso 3: Identifica su variable asociada como $Z$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: ¿Cuáles son la media y la desviación estándar de la distribución normal estándar?
  solucion_pasos:
  - Su media es 0.
  - Su desviación estándar es 1.
- titulo: Ejemplo 2
  enunciado: ¿Con qué letra se suele denotar la variable de la distribución normal estándar?
  solucion_pasos:
  - Se denota habitualmente con la letra $Z$.
- titulo: ¿La distribución normal estándar tiene media 0 y desviación estándar 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente su definición.
- titulo: ¿Existen muchas distribuciones normales estándar distintas?
  respuesta: 'No'
  solucion_pasos:
  - 'No, la distribución normal estándar es única: siempre $N(0,1)$.'
errores_frecuentes:
- Creer que existen varias distribuciones normales estándar distintas.
- Confundir la normal estándar con cualquier distribución normal en general.
- Pensar que la normal estándar puede tener una media distinta de 0.
- Olvidar que su desviación estándar siempre es exactamente 1.
- Confundir la variable $Z$ con la variable original $X$ de otra distribución normal.
fuente: 'Elaboración propia (referencia: Moraleja 307).'
estado: publicado
