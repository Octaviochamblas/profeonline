semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.CALCULO_LADOS_HOMOLOGOS
titulo: Cálculo de lados homólogos usando semejanza de triángulos
objetivo: Resolver problemas numéricos calculando lados desconocidos en triángulos semejantes a partir
  de la razón de semejanza.
introduccion: Con la semejanza de triángulos ya establecida (por cualquiera de sus criterios), el siguiente
  paso práctico es calcular longitudes desconocidas de lados homólogos.
resumen: Para calcular un lado homólogo desconocido, se plantea la proporción entre lados correspondientes
  y se despeja la incógnita.
explicacion: '![Cálculo de lados homólogos por semejanza](/static/img/geometria/congruencia-semejanza/semejanza-calculo-lados-homologos.svg)


  ### Definición formal


  Si $\triangle ABC\sim\triangle A''B''C''$ con razón de semejanza $k=\frac{A''B''}{AB}$, entonces cualquier
  lado desconocido $X''$ correspondiente a $X$ se calcula como $X''=k\times X$.


  ### Desarrollo didáctico


  Dado un triángulo con lados 6, 8, 10 semejante a otro con un lado conocido de 15 (correspondiente al
  lado 10), la razón es $k=\frac{15}{10}=1,5$, y los otros dos lados desconocidos son $6\times1,5=9$ y
  $8\times1,5=12$.'
procedimiento:
- 'Paso 1: Calcula la razón de semejanza usando un par de lados homólogos conocidos.'
- 'Paso 2: Identifica el lado desconocido y su correspondiente en el otro triángulo.'
- 'Paso 3: Multiplica (o divide, según corresponda) el lado conocido por la razón de semejanza para obtener
  el desconocido.'
ejemplos:
- titulo: Calcular lados desconocidos con razón conocida
  enunciado: Un triángulo tiene lados 6, 8, 10; su semejante tiene un lado de 15 correspondiente al 10.
  solucion_pasos:
  - k=15/10=1,5; los otros lados son 6×1,5=9 y 8×1,5=12.
- titulo: Calcular con razón menor a 1
  enunciado: Un triángulo tiene lados 12, 16, 20; su semejante (más pequeño) tiene razón 0,25.
  solucion_pasos:
  - Los lados del triángulo menor son 12×0,25=3, 16×0,25=4, 20×0,25=5.
- titulo: ¿Es necesario calcular la razón antes de encontrar los lados desconocidos?
  respuesta: Sí
  solucion_pasos:
  - Sí, la razón de semejanza es el paso intermedio necesario para el cálculo.
- titulo: ¿El método cambia si la razón es mayor o menor que 1?
  respuesta: 'No'
  solucion_pasos:
  - No, el procedimiento (multiplicar por la razón) es el mismo en ambos casos.
errores_frecuentes:
- Calcular mal la razón de semejanza inicial, arrastrando el error a todos los lados calculados.
- Multiplicar por la razón incorrecta (invertida) al calcular un lado desconocido.
- Confundir qué lado del triángulo pequeño corresponde a cuál lado del triángulo grande.
fuente: 'Fuente: Cid 117, 118.'
estado: publicado
