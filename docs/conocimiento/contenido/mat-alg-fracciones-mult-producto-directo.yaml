semantic_id: 'MAT.ALG.FRACCIONES_MULT.PRODUCTO_DIRECTO'
titulo: 'Producto Directo de Fracciones'
objetivo: 'Comprender la regla básica de multiplicación de fracciones algebraicas.'
introduccion: |
  A diferencia de la suma, la multiplicación no requiere denominadores comunes. La multiplicación es directa: los de arriba se multiplican con los de arriba, y los de abajo con los de abajo.
resumen: |
  El producto de dos fracciones $\frac{A}{B}$ y $\frac{C}{D}$ es igual a $\frac{AC}{BD}$.
explicacion: |
  Al multiplicar fracciones, simplemente multiplicas todos los numeradores para formar el nuevo numerador, y todos los denominadores para formar el nuevo denominador.
  $\frac{2x}{y} \cdot \frac{3}{5z} = \frac{2x \cdot 3}{y \cdot 5z} = \frac{6x}{5yz}$.
procedimiento:
  - 'Paso 1: Multiplica los numeradores entre sí.'
  - 'Paso 2: Multiplica los denominadores entre sí.'
  - 'Paso 3: Expresa el resultado como una sola fracción.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Multiplica $\frac{4}{a} \cdot \frac{b}{7}$.'
    solucion_pasos:
    - 'Numerador: $4 \cdot b = 4b$.'
    - 'Denominador: $a \cdot 7 = 7a$.'
    - 'Resultado: $\frac{4b}{7a}$.'
  - titulo: 'Multiplica $\frac{x}{2} \cdot \frac{x}{3}$.'
    respuesta: '$\frac{x^2}{6}$'
    solucion_pasos:
    - '$x \cdot x = x^2$ y $2 \cdot 3 = 6$.'
errores_frecuentes:
  - 'Multiplicar cruzado en lugar de directo.'
  - 'Sumar los numeradores en lugar de multiplicarlos.'
estado: publicado
