semantic_id: MAT.FUND.PROPIEDADES_CONJUNTOS.DISTRIBUTIVA_UNION_SOBRE_INTERSECCION
titulo: Propiedad distributiva de la unión sobre la intersección
objetivo: Aplicar la propiedad distributiva de la unión sobre la intersección para simplificar y resolver
  operaciones combinadas entre tres conjuntos.
introduccion: Imagina que en un colegio deciden premiar a los estudiantes que pertenecen a 1° Medio ($A$),
  O que participan simultáneamente en el taller de Ajedrez ($B$) Y en el de Robótica ($C$). Esto se puede
  expresar como $A \cup (B \cap C)$. La propiedad distributiva nos dice que esto es exactamente equivalente
  a premiar a los alumnos que están en (1° Medio o Ajedrez) Y que también están en (1° Medio o Robótica),
  es decir, $(A \cup B) \cap (A \cup C)$. Esta regla nos permite reorganizar las condiciones de manera
  más simple.
resumen: 'La propiedad distributiva de la unión sobre la intersección establece que la unión de un conjunto
  con la intersección de otros dos es equivalente a la intersección de las uniones del primer conjunto
  con cada uno de los otros dos. Formalmente: $A \cup (B \cap C) = (A \cup B) \cap (A \cup C)$.'
explicacion: 'La **propiedad distributiva de la unión sobre la intersección** es una ley fundamental en
  la teoría de conjuntos que nos permite relacionar y reescribir expresiones algebraicas de conjuntos
  que combinan las operaciones de unión e intersección.


  ### Definición Formal

  Sean $A$, $B$ y $C$ tres conjuntos en un universo $U$. Se cumple la siguiente igualdad:

  $$A \cup (B \cap C) = (A \cup B) \cap (A \cup C)$$


  ### Demostración

  Esta propiedad se basa en la ley distributiva de la disyunción proposicional sobre la conjunción proposicional
  en lógica matemática. Por definición de las operaciones de conjuntos:

  $$A \cup (B \cap C) = \{x \in U \mid x \in A \lor x \in (B \cap C)\}$$

  $$= \{x \in U \mid x \in A \lor (x \in B \land x \in C)\}$$

  Aplicando la propiedad distributiva de la lógica de proposiciones, donde $p \lor (q \land r) \equiv
  (p \lor q) \land (p \lor r)$, tenemos:

  $$= \{x \in U \mid (x \in A \lor x \in B) \land (x \in A \lor x \in C)\}$$

  $$= \{x \in U \mid x \in (A \cup B) \land x \in (A \cup C)\} = (A \cup B) \cap (A \cup C)$$

  Esto demuestra analíticamente que ambos miembros son iguales.


  ### Diferencia con la Aritmética Común

  En el álgebra numérica ordinaria, el producto se distribuye sobre la suma ($a \cdot (b+c) = a \cdot
  b + a \cdot c$), pero la suma NO se distribuye sobre el producto ($a + (b \cdot c) \neq (a+b) \cdot
  (a+c)$). Sin embargo, en el álgebra de conjuntos, la unión sí se distribuye sobre la intersección y
  viceversa.'
procedimiento:
- 'Paso 1: Identifica los tres conjuntos $A$, $B$ y $C$. El conjunto $A$ es el que se une externamente,
  mientras que $B$ y $C$ se intersectan.'
- 'Paso 2: Resuelve el lado izquierdo $A \cup (B \cap C)$ calculando primero la intersección $B \cap C$
  y luego uniendo el resultado con $A$.'
- 'Paso 3: Resuelve el lado derecho $(A \cup B) \cap (A \cup C)$ calculando por separado las uniones $A
  \cup B$ y $A \cup C$, para luego intersectar ambos conjuntos resultantes.'
- 'Paso 4: Compara los conjuntos finales de ambos lados y comprueba que sus elementos coinciden.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Sean los conjuntos $A = \{1, 2\}$, $B = \{2, 3\}$ y $C = \{2, 4\}$. Comprueba la propiedad
    distributiva calculando $A \cup (B \cap C)$ y $(A \cup B) \cap (A \cup C)$.
  solucion_pasos:
  - 'Paso a: Evaluamos el lado izquierdo. Primero calculamos la intersección: $B \cap C = \{2\}$.'
  - 'Paso b: Unimos $A$ con el resultado anterior: $A \cup (B \cap C) = \{1, 2\} \cup \{2\} = \{1, 2\}$.'
  - 'Paso c: Evaluamos el lado derecho. Primero calculamos las uniones parciales: $A \cup B = \{1, 2,
    3\}$ y $A \cup C = \{1, 2, 4\}$.'
  - 'Paso d: Ahora intersectamos ambos resultados: $(A \cup B) \cap (A \cup C) = \{1, 2, 3\} \cap \{1,
    2, 4\} = \{1, 2\}$.'
  - 'Paso e: Ambos lados dan como resultado $\{1, 2\}$, verificando la propiedad distributiva.'
- titulo: Ejemplo 2
  enunciado: Sean los conjuntos $X = \{a\}$, $Y = \{b\}$ y $Z = \{c\}$. Comprueba la propiedad distributiva
    de la unión sobre la intersección.
  solucion_pasos:
  - 'Paso a: Para el lado izquierdo, calculamos primero $Y \cap Z = \varnothing$. Luego, $X \cup \varnothing
    = \{a\}$.'
  - 'Paso b: Para el lado derecho, calculamos $X \cup Y = \{a, b\}$ y $X \cup Z = \{a, c\}$. La intersección
    entre $\{a, b\}$ y $\{a, c\}$ es $\{a\}$.'
  - 'Paso c: Ambos lados resultan en el conjunto $\{a\}$, confirmando la equivalencia.'
- titulo: ¿Es la expresión $A \cup (B \cap C)$ equivalente a $(A \cup B) \cap (A \cup C)$ para cualquier
    trío de conjuntos?
  respuesta: Sí
  solucion_pasos:
  - La propiedad distributiva de la unión sobre la intersección es una ley lógica universal de la teoría
    de conjuntos.
  - Se cumple siempre, sin importar la naturaleza o el tamaño de los conjuntos involucrados.
- titulo: ¿Qué ocurre con la propiedad si los conjuntos $B$ y $C$ son disjuntos?
  respuesta: Se cumple igual
  solucion_pasos:
  - Si $B \cap C = \varnothing$, el lado izquierdo se reduce a $A \cup \varnothing = A$.
  - El lado derecho también se reducirá a $A$, por lo que la propiedad sigue siendo perfectamente válida.
errores_frecuentes:
- Confundir esta propiedad con la distributiva de la intersección sobre la unión, escribiendo $A \cap
  (B \cup C)$ en lugar de $A \cup (B \cap C)$.
- Distribuir la unión como si fuera multiplicación aritmética y escribir erróneamente $(A \cup B) \cup
  (A \cup C)$.
- Olvidar que la intersección final en el lado derecho es de dos conjuntos ya unidos, no de los conjuntos
  originales.
- Creer que esta propiedad no se aplica si alguno de los conjuntos es vacío.
- Pensar que la propiedad asociativa y la distributiva son lo mismo, omitiendo los cambios de operaciones
  entre unión e intersección.
fuente: Elementos de Matemática, Editorial Addison-Wesley, pág. 62
estado: publicado
