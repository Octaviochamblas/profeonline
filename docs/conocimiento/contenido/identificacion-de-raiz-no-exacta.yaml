semantic_id: MAT.NUM.RAICES_CONCEPTO.RAIZ_NO_EXACTA
titulo: Identificación de raíz no exacta
objetivo: Distinguir valor exacto y aproximación de una raíz.
introduccion: Una calculadora entrega cifras útiles para ubicar una raíz, pero no reemplaza su valor exacto.
  Elegir entre radical y decimal depende de lo que pida el problema.
resumen: Una raíz no exacta no produce un entero o racional simple y suele conservarse en forma radical.
  La forma \(\sqrt{13}\) es exacta, mientras que \(3.606\) es una aproximación.
explicacion: 'Una raíz no exacta no produce un entero o racional simple y suele conservarse en forma radical.


  La situación “\(\sqrt{13}\) está entre \(3\) y \(4\) y vale aproximadamente \(3.606\)” permite comprobar,
  y no solo memorizar, que la forma \(\sqrt{13}\) es exacta, mientras que \(3.606\) es una aproximación'
procedimiento:
- 'Paso 1: Ubica el radicando entre potencias perfectas consecutivas.'
- 'Paso 2: Conserva el radical si se requiere una respuesta exacta.'
- 'Paso 3: Si aproximas, indica precisión y comprueba elevando las cotas vecinas.'
ejemplos:
- titulo: Aplicación razonada — Identificación de raíz no exacta
  enunciado: \(\sqrt{13}\) está entre \(3\) y \(4\) y vale aproximadamente \(3.606\).
  solucion_pasos:
  - Ubica el radicando entre potencias perfectas consecutivas.
  - Conserva el radical si se requiere una respuesta exacta.
  - Si aproximas, indica precisión y comprueba elevando las cotas vecinas.
- titulo: Revisión de una solución — Identificación de raíz no exacta
  enunciado: Una solución aplica “Conserva el radical si se requiere una respuesta exacta.”, pero termina
    sin comprobar que la forma \(\sqrt{13}\) es exacta, mientras que \(3.606\) es una aproximación. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de raíz no exacta: una raíz no exacta no produce
    un entero o racional simple y suele conservarse en forma radical.'
  - Ubica el radicando entre potencias perfectas consecutivas.
  - 'Completa la revisión con este control: Si aproximas, indica precisión y comprueba elevando las cotas
    vecinas.'
- titulo: ¿Se cumple que la forma \(\sqrt{13}\) es exacta, mientras que \(3.606\) es una aproximación?
    — Identificación de raíz no exacta
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una raíz no exacta no produce un entero o racional simple
    y suele conservarse en forma radical.
  - El caso “\(\sqrt{13}\) está entre \(3\) y \(4\) y vale aproximadamente \(3.606\)” satisface esa condición.
  - Si aproximas, indica precisión y comprueba elevando las cotas vecinas.
- titulo: ¿Es válido omitir el paso “Ubica el radicando entre potencias perfectas consecutivas”? — Identificación
    de raíz no exacta
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de raíz no exacta.
  - 'Omitirlo puede volver inválida la acción siguiente: Conserva el radical si se requiere una respuesta
    exacta.'
  - 'La solución debe terminar de este modo: Si aproximas, indica precisión y comprueba elevando las cotas
    vecinas.'
errores_frecuentes:
- 'Confundir identificación de raíz no exacta con otro concepto y omitir este inicio: Ubica el radicando
  entre potencias perfectas consecutivas.'
- Aplicar mecánicamente “Conserva el radical si se requiere una respuesta exacta.” sin revisar las condiciones
  de la definición.
- Tomar “\(\sqrt{13}\) está entre \(3\) y \(4\) y vale aproximadamente \(3.606\)” como una igualdad aislada,
  sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la forma \(\sqrt{13}\) es exacta, mientras que \(3.606\)
  es una aproximación”.
- 'Terminar el desarrollo sin realizar este control: Si aproximas, indica precisión y comprueba elevando
  las cotas vecinas.'
