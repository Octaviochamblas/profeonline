semantic_id: MAT.FUND.OPERACIONES_CONJUNTOS.INTERSECCION
titulo: Intersección de conjuntos con diagrama de Venn
objetivo: Comprender la operación de intersección de conjuntos, reconocer cuándo dos conjuntos son disjuntos
  y aplicar la intersección en la resolución de problemas.
introduccion: 'La **intersección** de dos conjuntos $A$ y $B$, denotada $A \cap B$, es el conjunto formado
  por los elementos que pertenecen **simultáneamente** a $A$ y a $B$.


  Por ejemplo, si $A$ representa a los estudiantes que aprobaron Matemáticas y $B$ a los que aprobaron
  Lenguaje, entonces $A \cap B$ corresponde a quienes aprobaron **ambas** asignaturas a la vez.'
resumen: '- $A \cap B = \{x \mid x \in A \text{ y } x \in B\}$

  - Siempre se cumple: $A \cap B \subseteq A$ y $A \cap B \subseteq B$

  - Conmutativa: $A \cap B = B \cap A$

  - Si $A \cap B = \emptyset$, los conjuntos son **disjuntos**

  - Distributiva con unión: $A \cap (B \cup C) = (A \cap B) \cup (A \cap C)$

  '
explicacion: 'La intersección de dos conjuntos $A$ y $B$ se define formalmente como:


  $$A \cap B = \{x \mid x \in A \text{ y } x \in B\}$$


  A diferencia de la unión, la intersección exige que el elemento cumpla **ambas** condiciones al mismo
  tiempo.


  **Propiedades fundamentales:**


  1. **Subconjunto:** $A \cap B \subseteq A$ y $A \cap B \subseteq B$. La intersección nunca puede ser
  mayor que cualquiera de los conjuntos originales.

  2. **Conmutativa:** $A \cap B = B \cap A$.

  3. **Asociativa:** $(A \cap B) \cap C = A \cap (B \cap C)$.

  4. **Elemento neutro:** Si $U$ es el conjunto universal, $A \cap U = A$.

  5. **Conjuntos disjuntos:** Cuando $A \cap B = \emptyset$, se dice que $A$ y $B$ son disjuntos; no comparten
  ningún elemento.


  En el diagrama de Venn, $A \cap B$ corresponde únicamente a la región central donde los dos círculos
  se superponen.'
procedimiento:
- Identificar claramente los conjuntos $A$ y $B$ involucrados.
- Recorrer los elementos de $A$ uno por uno.
- Para cada elemento de $A$, verificar si también pertenece a $B$.
- Incluir en el resultado solo los elementos que estén en ambos conjuntos.
- Si ningún elemento es común, la intersección es $\emptyset$ (conjuntos disjuntos).
ejemplos:
- titulo: Ejemplo 1 — Intersección con números
  enunciado: Sean $A = \{1, 2, 3, 4\}$ y $B = \{2, 4, 6\}$. Calcula $A \cap B$.
  solucion_pasos:
  - 'Revisamos cada elemento de $A$: ¿está $1$ en $B$? No. ¿está $2$ en $B$? Sí. ¿está $3$ en $B$? No.
    ¿está $4$ en $B$? Sí.'
  - Los elementos comunes son $2$ y $4$.
  - Por lo tanto, $A \cap B = \{2, 4\}$.
- titulo: Ejemplo 2 — Intersección con vocales
  enunciado: Sea $A = \{a, e, i, o, u\}$ (vocales) y $B = \{a, b, c, d, e\}$. Calcula $A \cap B$.
  solucion_pasos:
  - Buscamos los elementos de $A$ que también aparecen en $B$.
  - '$a$: está en $B$ ✓. $e$: está en $B$ ✓. $i$: no está en $B$. $o$: no está en $B$. $u$: no está en
    $B$.'
  - 'Resultado: $A \cap B = \{a, e\}$.'
- titulo: ¿Es siempre cierto que $A \cap B \subseteq A$?
  respuesta: Sí
  solucion_pasos:
  - Sea $x$ un elemento cualquiera de $A \cap B$.
  - Por definición de intersección, $x \in A \cap B$ implica que $x \in A$ **y** $x \in B$.
  - En particular, $x \in A$. Como esto vale para todo $x \in A \cap B$, se concluye que $A \cap B \subseteq
    A$.
- titulo: ¿Puede ocurrir que $|A \cap B| > |A|$?
  respuesta: 'No'
  solucion_pasos:
  - Como $A \cap B \subseteq A$, la intersección es un subconjunto de $A$.
  - Un subconjunto no puede tener más elementos que el conjunto que lo contiene.
  - Por lo tanto, $|A \cap B| \leq |A|$ siempre, y es imposible que $|A \cap B| > |A|$.
errores_frecuentes:
- 'Incluir elementos que están solo en uno de los conjuntos: la intersección exige que el elemento esté
  en **ambos**.'
- 'Confundir $\cap$ (intersección) con $\cup$ (unión): $\cap$ es "y ambos", $\cup$ es "al menos uno".'
- Creer que $A \cap B = \emptyset$ implica que $A = \emptyset$ o $B = \emptyset$; dos conjuntos no vacíos
  pueden ser disjuntos.
- No reconocer que $A \cap B \subseteq A$ y $A \cap B \subseteq B$ son propiedades siempre válidas.
- Escribir $A \cap B$ con elementos repetidos; al igual que todo conjunto, no admite repeticiones.
fuente: Matemáticas para la Educación Media, MINEDUC
estado: publicado
