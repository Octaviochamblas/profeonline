semantic_id: MAT.ALG.ORDEN_FUNDAMENTOS.TRADUCCION_VERBAL
"titulo": "Traducción de enunciados verbales a desigualdades"
"objetivo": |-
  Modelar situaciones descritas verbalmente mediante expresiones algebraicas con desigualdades.
"introduccion": |-
  Muchos problemas del mundo real se enuncian con palabras y requieren ser transformados en lenguaje matemático.
"resumen": |-
  Traducir enunciados verbales consiste en asociar expresiones clave con sus respectivos símbolos de orden.
"explicacion": |-
  ### Definición formal
  Sea un enunciado en lenguaje natural. Existe una asignación hacia las relaciones $\\mathcal{R} \\in \\{<, >, \\leq, \\geq\\}$ que modela matemáticamente la restricción.

  ### Desarrollo didáctico
  Identificar las palabras clave es el paso esencial para la correcta formulación del modelo algebraico sin pérdida de información.
"procedimiento":
- "Leer detenidamente el enunciado verbal."
- "Subrayar las cantidades y las palabras clave de restricción."
- "Asignar variables y escribir la desigualdad matemática correspondiente."
"ejemplos":
- "enunciado": "Analizar la validez de la relación para $x = 3$ frente a $y = 2$."
  "solucion_pasos":
  - "Evaluar los valores asignados a cada variable."
  - "Comparar los resultados obtenidos en el marco de la definición formal."
  "titulo": "Ejemplo de análisis 1 en el contexto de la relación matemática"
- "enunciado": "Analizar la validez de la relación para $x = 4$ frente a $y = 4$."
  "solucion_pasos":
  - "Evaluar los valores asignados a cada variable."
  - "Comparar los resultados obtenidos en el marco de la definición formal."
  "titulo": "Ejemplo de análisis 2 en el contexto de la relación matemática"
- "respuesta": "Sí"
  "solucion_pasos":
  - "Reemplazar el valor propuesto en la formulación."
  - "Verificar la concordancia lógica positiva."
  "titulo": "¿Cumple el número $5$ con la condición matemática descrita?"
- "respuesta": "No"
  "solucion_pasos":
  - "Sustituir la cantidad constante en el modelo algebraico."
  - "Demostrar que el valor no satisface la exigencia definida."
  "titulo": "¿Cumple el número $-3$ con la condición matemática descrita?"
"errores_frecuentes":
- "La expresión como máximo se traduce con el símbolo de mayor que."
- "La expresión al menos se traduce con el símbolo de menor que."
- "La palabra entre incluye siempre los extremos del intervalo."
- |-
  Traducir literalmente el orden de las palabras garantiza la desigualdad correcta.
- "Una restricción verbal siempre resulta en una ecuación de igualdad."
"fuente": "Elaboración propia"
"estado": "publicado"
