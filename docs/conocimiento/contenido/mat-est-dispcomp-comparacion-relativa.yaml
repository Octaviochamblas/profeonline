semantic_id: MAT.EST.DISPERSION_COMPARATIVA.COMPARACION_RELATIVA
titulo: Usar el coeficiente de variación para comparar grupos con distintas medias
objetivo: Usar el coeficiente de variación para comparar la dispersión relativa de grupos que tienen medias distintas.
introduccion: Cuando dos grupos tienen promedios muy diferentes, no basta con mirar la desviación estándar de cada uno;
  hay que usar el coeficiente de variación para comparar de forma justa.
resumen: El coeficiente de variación permite comparar la dispersión relativa de dos o más grupos, incluso cuando tienen
  medias muy distintas entre sí.
explicacion: '![Comparación relativa con el coeficiente de variación](/static/img/estadistica/dispcomp/dispcomp-comparacion-relativa.svg)


  ### Definición formal


  Para comparar la dispersión relativa entre grupos con medias distintas, se calcula el $CV$ de cada grupo y se

  compara directamente el porcentaje resultante.


  ### Desarrollo didáctico


  Un grupo con mayor desviación estándar no necesariamente tiene mayor dispersión relativa si también tiene una media

  mucho más alta; el $CV$ corrige esa distorsión.'
procedimiento:
- 'Paso 1: Calcula el coeficiente de variación de cada grupo por separado.'
- 'Paso 2: Compara los porcentajes obtenidos entre los grupos.'
- 'Paso 3: Concluye que el grupo con mayor $CV$ tiene mayor dispersión relativa.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: El grupo A tiene $\bar{x}=1000$ y $\sigma=50$; el grupo B tiene $\bar{x}=50$ y $\sigma=10$. ¿Cuál tiene mayor
    dispersión relativa?
  solucion_pasos:
  - $CV_A = 50/1000\times 100\% = 5\%$.
  - $CV_B = 10/50\times 100\% = 20\%$, por lo tanto el grupo B tiene mayor dispersión relativa.
- titulo: Ejemplo 2
  enunciado: ¿Por qué no basta con comparar las desviaciones estándar directamente en el ejemplo anterior?
  solucion_pasos:
  - Porque el grupo A tiene una desviación estándar mayor en valor absoluto (50 contra 10), pero su media también es
    mucho más grande.
  - Al calcular el $CV$, se ve que en realidad el grupo B es relativamente más disperso.
- titulo: ¿El grupo con mayor coeficiente de variación tiene mayor dispersión relativa?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la interpretación directa del $CV$.
- titulo: ¿Basta con comparar las desviaciones estándar para saber cuál grupo es relativamente más disperso?
  respuesta: 'No'
  solucion_pasos:
  - 'No, si las medias son muy distintas, se debe usar el coeficiente de variación en su lugar.'
errores_frecuentes:
- Comparar directamente desviaciones estándar de grupos con medias muy distintas.
- Concluir que el grupo con mayor desviación estándar siempre tiene mayor dispersión relativa.
- Calcular el $CV$ de un grupo con la media del otro grupo.
- Ignorar el signo o la magnitud de la media al interpretar el $CV$.
- No expresar el $CV$ como porcentaje al momento de comparar.
fuente: 'Elaboración propia (referencia: Moraleja 281, 296).'
estado: publicado
