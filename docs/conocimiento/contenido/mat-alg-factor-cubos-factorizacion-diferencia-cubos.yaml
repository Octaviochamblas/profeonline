semantic_id: MAT.ALG.FACTOR_CUBOS.FACTORIZACION_DIFERENCIA_CUBOS
titulo: Factorización de Diferencia de Cubos
objetivo: Aplicar la fórmula $a^3 - b^3 = (a-b)(a^2 + ab + b^2)$ de manera sistemática.
introduccion: Hora de desarmar la resta. La fórmula para factorizar la Diferencia de Cubos es casi un espejo de
  la suma, pero los signos se cambian de asiento. Si aprendes la mnemotecnia correcta (SOAP), jamás los confundirás.
resumen: 'La diferencia de cubos se factoriza como: $(a-b)(a^2 + ab + b^2)$. El binomio mantiene el signo de resta,
  y el trinomio tiene todos sus signos positivos.'
explicacion: "### Definición formal\n\nOpposite (Opuesto). Como el problema es una resta (-), el opuesto es positivo\
  \ (+).\n\n### Desarrollo didáctico\n\nFórmula: $A^3 - B^3 = (A - B)(A^2 + A \\cdot B + B^2)$.\n\n¿Cómo recordar\
  \ los signos? Usa el acrónimo en inglés **SOAP** (Same, Opposite, Always Positive):\n- **S**ame (Mismo signo):\
  \ El binomio inicial lleva el MISMO signo que el problema ($-$).\n- **O**pposite (Signo opuesto): El primer signo\
  \ del trinomio lleva el OPUESTO ($+$).\n- **AP** (Siempre Positivo): El último signo del trinomio es siempre POSITIVO\
  \ ($+$).\n\nFactoricemos $27x^3 - 64$:\n1. Raíces: $A = 3x$, $B = 4$.\n2. Binomio (Same): $(3x - 4)$.\n3. Trinomio\
  \ (Opposite, AP):\n   - Cuadrado de A: $(3x)^2 = 9x^2$\n   - Producto (Opposite sign): $+(3x)(4) = +12x$\n   -\
  \ Cuadrado de B (Always Positive): $+(4)^2 = +16$\n\nResultado: $(3x - 4)(9x^2 + 12x + 16)$."
procedimiento:
- 'Paso 1: Extrae la raíz cúbica de ambos términos ($a$ y $b$).'
- 'Paso 2: Escribe el binomio con la resta: $(a - b)$.'
- 'Paso 3: Escribe el trinomio abriendo paréntesis.'
- 'Paso 4: Eleva la primera raíz al cuadrado: $a^2$.'
- 'Paso 5: Multiplica ambas raíces y ponle signo positivo: $+ab$.'
- 'Paso 6: Eleva la segunda raíz al cuadrado y ponle signo positivo: $+b^2$.'
ejemplos:
- titulo: Factoriza $y^3 - 1000$
  enunciado: Factoriza $y^3 - 1000$.
  solucion_pasos:
  - 'Raíces: $y$ y $10$.'
  - 'Binomio: $(y - 10)$.'
  - 'Trinomio: $y^2 + 10y + 100$.'
  - 'Respuesta final: $(y - 10)(y^2 + 10y + 100)$.'
- titulo: Factoriza $8m^6 - 1$.
  solucion_pasos:
  - 'Raíces: 2m^2 y 1. Binomio (2m^2-1). Trinomio: (2m^2)^2 = 4m^4. Producto = +2m^2. (1)^2 = +1.'
- titulo: 'Respecto de «Factorización de una diferencia de cubos perfectos»: ¿La siguiente formulación'
  enunciado: 'Respecto de «Factorización de una diferencia de cubos perfectos»: ¿La siguiente formulación es correcta?
    «La diferencia de cubos se factoriza como: $(a-b)(a^2 + ab + b^2)$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La diferencia de cubos se factoriza como: $(a-b)(a^2 + ab
    + b^2)$.'
- titulo: 'Respecto de «Factorización de una diferencia de cubos perfectos»: ¿La siguiente conclusión e'
  enunciado: 'Respecto de «Factorización de una diferencia de cubos perfectos»: ¿La siguiente conclusión es correcta?
    «Poner un signo negativo en el término central del trinomio»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La diferencia de cubos se factoriza como: $(a-b)(a^2 + ab
    + b^2)$.'
errores_frecuentes:
- Poner un signo negativo en el término central del trinomio.
- 'Elevar incorrectamente la primera raíz al cuadrado si tiene coeficientes numéricos (Ej: raíz $3x$, poner $3x^2$
  en vez de $9x^2$).'
- Para «Según la regla SOAP, ¿qué signo lleva el término del medio en el trinomio largo de la Diferencia de Cubos»,
  la respuesta correcta es Negativo.
- Para «Según la regla SOAP, ¿qué signo lleva el término del medio en el trinomio largo de la Diferencia de Cubos»,
  la respuesta correcta es El mismo del problema original.
- Para «Según la regla SOAP, ¿qué signo lleva el término del medio en el trinomio largo de la Diferencia de Cubos»,
  la respuesta correcta es Depende de las variables.
