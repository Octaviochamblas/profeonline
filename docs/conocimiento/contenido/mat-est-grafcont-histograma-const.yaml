semantic_id: MAT.EST.GRAFICOS_CONTINUOS.HISTOGRAMA_CONST
titulo: Construir histogramas para datos agrupados
objetivo: Construir un histograma como representación gráfica de las frecuencias de datos agrupados en
  intervalos de clase.
introduccion: El histograma es el gráfico estándar para variables continuas agrupadas, donde a diferencia
  del gráfico de barras, las barras van pegadas entre sí.
resumen: Un histograma representa las frecuencias de cada intervalo de clase mediante barras adyacentes
  (sin espacios entre ellas), cuya altura es proporcional a la frecuencia.
explicacion: '![Construcción de histogramas](/static/img/estadistica/grafcont/grafcont-histograma-const.svg)


  ### Definición formal


  Cada barra del histograma corresponde a un intervalo de clase; las barras se dibujan adyacentes (sin
  separación) porque representan una variable continua sin huecos entre intervalos.


  ### Desarrollo didáctico


  Con intervalos [0-10) f=4, [10-20) f=7, [20-30) f=3, se dibujan tres barras pegadas entre sí, con alturas
  proporcionales a 4, 7 y 3 respectivamente.'
procedimiento:
- 'Paso 1: Ordena los intervalos de clase de menor a mayor.'
- 'Paso 2: Dibuja una barra para cada intervalo, con altura proporcional a su frecuencia.'
- 'Paso 3: Ubica las barras adyacentes entre sí, sin espacios, ya que representan intervalos continuos
  consecutivos.'
ejemplos:
- titulo: Construir un histograma con 3 intervalos
  enunciado: '[0-10) f=4, [10-20) f=7, [20-30) f=3.'
  solucion_pasos:
  - Se dibujan 3 barras adyacentes con alturas proporcionales a 4, 7 y 3.
- titulo: Construir un histograma de estaturas
  enunciado: '[150-160) f=5, [160-170) f=12, [170-180) f=8.'
  solucion_pasos:
  - Se dibujan 3 barras adyacentes con alturas proporcionales a 5, 12 y 8.
- titulo: ¿Las barras de un histograma van pegadas entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del gráfico de barras simples, ya que representan una variable continua.
- titulo: ¿Un histograma se puede usar para variables cualitativas nominales?
  respuesta: 'No'
  solucion_pasos:
  - No, el histograma es específico para datos cuantitativos agrupados en intervalos.
errores_frecuentes:
- Dibujar las barras del histograma separadas, confundiéndolo con un gráfico de barras simples.
- No usar una escala consistente en el eje de frecuencias.
- Usar el histograma para representar variables cualitativas, cuando en realidad requiere datos cuantitativos
  agrupados.
fuente: 'Elaboración propia (referencia: Moraleja 200, 352).'
estado: publicado
