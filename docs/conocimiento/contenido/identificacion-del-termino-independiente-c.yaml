semantic_id: MAT.ALG.EC_CUADR_BASE.COEFICIENTE_C
titulo: Identificación del término independiente c
objetivo: Identificar correctamente el término independiente $c$ en una ecuación de segundo grado dada
  en forma general.
introduccion: El término independiente es el único que no lleva la incógnita $x$ acompañándolo; es simplemente
  un número suelto en la ecuación.
resumen: El **término independiente $c$** de una ecuación de segundo grado $ax^2+bx+c=0$ es el número
  que no está multiplicado por ninguna potencia de $x$; al igual que $b$, puede valer cero.
explicacion: '### Definición formal


  En la forma general $ax^2+bx+c=0$, el término independiente $c$ es el número real que no acompaña a
  ninguna potencia de $x$ (equivalentemente, el coeficiente del término $x^0$). No existe restricción
  sobre su valor: $c$ puede ser cualquier número real, incluido cero.


  ### Desarrollo didáctico


  Para identificar $c$, se localiza el término numérico que aparece solo, sin ninguna $x$ junto a él,
  respetando su signo. Si ese término no aparece, $c=0$.


  En $3x^2+2x-9=0$, el término independiente es $-9$. En $x^2+4x=0$, no hay término numérico suelto, por
  lo que $c=0$.'
procedimiento:
- 'Paso 1: Ordena la ecuación en forma general si aún no lo está.'
- 'Paso 2: Localiza el término numérico que no está multiplicado por ninguna potencia de $x$.'
- 'Paso 3: Ese número, con su signo, es el término independiente $c$; si no aparece, $c=0$.'
ejemplos:
- titulo: Identificación directa del término independiente
  enunciado: Identifica el término independiente $c$ en $2x^2-5x+7=0$.
  solucion_pasos:
  - El único término sin $x$ es $7$.
  - $c=7$.
- titulo: Identificación de término independiente nulo
  enunciado: Identifica el término independiente $c$ en $8x^2-3x=0$.
  solucion_pasos:
  - No hay ningún término numérico suelto.
  - $c=0$.
- titulo: ¿El término independiente debe ser distinto de cero para que la ecuación sea cuadrática?
  enunciado: ¿El término independiente debe ser distinto de cero para que la ecuación sea cuadrática?
  respuesta: 'No'
  solucion_pasos:
  - Solo se exige que $a$ sea distinto de cero; $c$ puede valer cero sin afectar el carácter cuadrático.
- titulo: ¿El término independiente puede ser negativo?
  enunciado: ¿El término independiente puede ser negativo?
  respuesta: Sí
  solucion_pasos:
  - El signo que precede al término numérico forma parte del valor de $c$.
errores_frecuentes:
- Olvidar identificar $c=0$ cuando el término independiente no aparece explícitamente en la ecuación.
- Confundir el término independiente con el coeficiente $b$ cuando la ecuación no está ordenada.
- Omitir el signo negativo del término independiente al leer su valor.
- Pasar por alto un término independiente ubicado antes del término cuadrático o lineal en la ecuación
  sin reordenar.
