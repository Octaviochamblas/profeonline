semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.AMPLIFICACION
titulo: Amplificación de fracciones
objetivo: Obtener una fracción equivalente multiplicando numerador y denominador por un mismo número.
introduccion: 'Cuando se necesita expresar una fracción con un denominador mayor —por ejemplo, para sumar
  con otra fracción—, se recurre a la amplificación: multiplicar arriba y abajo por el mismo número entero.'
resumen: Amplificar una fracción es multiplicar su numerador y su denominador por un mismo número entero
  distinto de cero, obteniendo una fracción equivalente.
explicacion: '### Definición formal


  Amplificar \(\frac{a}{b}\) por \(k\in\mathbb{Z}\), \(k\neq0\), produce \(\frac{a\cdot k}{b\cdot k}\),
  que es equivalente a \(\frac{a}{b}\) porque equivale a multiplicar por \(\frac{k}{k}=1\).


  ### Desarrollo didáctico


  Al amplificar \(\frac{2}{3}\) por 4: numerador \(2\cdot4=8\), denominador \(3\cdot4=12\), resultando
  \(\frac{8}{12}\). Como se multiplicó por \(\frac{4}{4}=1\), el valor de la fracción no cambió, solo
  su escritura.'
procedimiento:
- 'Paso 1: Elige un entero no nulo como factor de amplificación.'
- 'Paso 2: Multiplica por ese mismo factor el numerador y el denominador.'
- 'Paso 3: Simplifica de vuelta o divide para comprobar que el valor inicial se conserva.'
ejemplos:
- titulo: Aplicación razonada — Amplificación de fracciones
  enunciado: Al amplificar \(\frac{2}{3}\) por 4 se obtiene \(\frac{8}{12}\).
  solucion_pasos:
  - Elige un entero no nulo como factor de amplificación.
  - Multiplica por ese mismo factor el numerador y el denominador.
  - Simplifica de vuelta o divide para comprobar que el valor inicial se conserva.
- titulo: Revisión de una solución — Amplificación de fracciones
  enunciado: Una solución aplica “Multiplica por ese mismo factor el numerador y el denominador.”, pero
    termina sin comprobar que la amplificación conserva el valor de la fracción. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define amplificación de fracciones: amplificar una fracción consiste en
    multiplicar numerador y denominador por el mismo número distinto de cero.'
  - Elige un entero no nulo como factor de amplificación.
  - 'Completa la revisión con este control: Simplifica de vuelta o divide para comprobar que el valor
    inicial se conserva.'
- titulo: ¿Se cumple que la amplificación conserva el valor de la fracción? — Amplificación de fracciones
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que amplificar una fracción consiste en multiplicar numerador
    y denominador por el mismo número distinto de cero.
  - El caso “Al amplificar \(\frac{2}{3}\) por 4 se obtiene \(\frac{8}{12}\)” satisface esa condición.
  - Simplifica de vuelta o divide para comprobar que el valor inicial se conserva.
- titulo: ¿Es válido omitir el paso “Elige un entero no nulo como factor de amplificación”? — Amplificación
    de fracciones
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de amplificación de fracciones.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica por ese mismo factor el numerador
    y el denominador.'
  - 'La solución debe terminar de este modo: Simplifica de vuelta o divide para comprobar que el valor
    inicial se conserva.'
errores_frecuentes:
- 'Empezar amplificación de fracciones sin realizar este control inicial: Elige un entero no nulo como
  factor de amplificación.'
- Memorizar “Al amplificar \(\frac{2}{3}\) por 4 se obtiene \(\frac{8}{12}\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Multiplica por ese mismo factor el numerador y el denominador.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre amplificación de fracciones que contradice el criterio “La amplificación
  conserva el valor de la fracción”.
- 'Cerrar el ejercicio sin esta comprobación específica: Simplifica de vuelta o divide para comprobar
  que el valor inicial se conserva.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
