semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.AMPLIFICACION
objetivo: Comprender amplificación de fracciones y aplicarlo correctamente en ejercicios
  básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso amplificación de fracciones ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Amplificar una fracción consiste en multiplicar numerador y denominador por
  el mismo número distinto de cero. Además, la amplificación conserva el valor de
  la fracción.
explicacion: |-
  Amplificar una fracción consiste en multiplicar numerador y denominador por el mismo número distinto de cero.

  Una idea importante es que la amplificación conserva el valor de la fracción.

  Por ejemplo, Al amplificar \(\frac{2}{3}\) por 4 se obtiene \(\frac{8}{12}\).
procedimiento:
- 'Paso 1: Elegir una estrategia conveniente: simplificar, amplificar, usar productos
  cruzados o un denominador común.'
- 'Paso 2: Ejecutar la comparación o transformación paso a paso, cuidando el valor
  de la fracción.'
- 'Paso 3: Interpretar el resultado y expresarlo con lenguaje matemático claro.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Al amplificar \(\frac{2}{3}\) por 4 se
    obtiene \(\frac{8}{12}\).” se relaciona con amplificación de fracciones.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: amplificar una fracción consiste en multiplicar
    numerador y denominador por el mismo número distinto de cero.'
  - Concluye que el ejemplo sí ilustra amplificación de fracciones.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “La amplificación conserva el valor de la fracción.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con amplificación de fracciones?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que la amplificación conserva el valor de la
    fracción.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar amplificación de fracciones ignorando la definición o las
    condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar amplificación de fracciones sin mirar qué representan numerador,
  denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
