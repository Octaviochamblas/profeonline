semantic_id: MAT.ALG.RELACION_EXP_LOG.MODELO_LOGARITMICO_CONTEXTO
titulo: Modelamiento de situaciones con funciones logarítmicas
objetivo: Construir e interpretar modelos logarítmicos a partir de situaciones reales como escalas de magnitud o
  tiempos de crecimiento.
introduccion: Muchos fenómenos, como la escala de Richter o el pH, comprimen rangos enormes de valores usando
  logaritmos, porque crecen o decrecen de forma exponencial en la realidad.
resumen: Un **modelo logarítmico** describe una cantidad que depende del logaritmo de otra variable, útil cuando
  el fenómeno real involucra magnitudes que varían en escalas exponenciales, como el pH o la escala de Richter.
explicacion: '### Definición formal


  Un modelo logarítmico tiene la forma $f(x)=a\cdot\log_b(x)+c$, donde $x$ representa la magnitud física
  original y $f(x)$ una escala comprimida logarítmicamente. Se usa cuando el fenómeno real crece o decrece de
  forma exponencial, y se necesita una escala manejable para compararlo.


  ### Desarrollo didáctico


  La escala de Richter mide la magnitud $M$ de un sismo a partir de la amplitud $A$ de la onda registrada,
  mediante $M=\log_{10}(A)+c$. Un aumento de una unidad en $M$ corresponde a multiplicar por $10$ la amplitud
  real de la onda: por eso la escala logarítmica es capaz de representar sismos de intensidades muy distintas
  en un rango pequeño de números.'
procedimiento:
- 'Paso 1: Identifica la variable física original y la magnitud logarítmica que la representa.'
- 'Paso 2: Escribe el modelo en la forma $f(x)=a\cdot\log_b(x)+c$ usando los datos del contexto.'
- 'Paso 3: Evalúa el modelo para responder preguntas concretas sobre la situación.'
- 'Paso 4: Interpreta el resultado en el contexto original del problema.'
ejemplos:
- titulo: Interpretación de la escala de Richter
  enunciado: 'Si un sismo tiene amplitud $A_1$ y otro amplitud $A_2=10\cdot A_1$, ¿cómo se comparan sus
    magnitudes en la escala de Richter?'
  solucion_pasos:
  - 'Se aplica $M=\log_{10}(A)$: $\log_{10}(10A_1)=\log_{10}(10)+\log_{10}(A_1)=1+\log_{10}(A_1)$.'
  - La magnitud del segundo sismo es exactamente $1$ unidad mayor que la del primero.
- titulo: Modelo de tiempo hasta alcanzar un valor
  enunciado: 'Si una población crece según $P(t)=100\cdot2^t$, ¿cómo se despeja el tiempo $t$ necesario para
    alcanzar $P(t)=800$?'
  solucion_pasos:
  - 'Se plantea $100\cdot2^t=800$, es decir $2^t=8$.'
  - 'Se aplica logaritmo base $2$: $t=\log_2(8)=3$.'
- titulo: ¿Un aumento de una unidad en la escala de Richter representa un cambio proporcional en la amplitud?
  enunciado: ¿Un aumento de una unidad en la magnitud de Richter corresponde a multiplicar la amplitud real por
    un factor fijo?
  respuesta: Sí
  solucion_pasos:
  - Debido a la escala logarítmica base $10$, cada unidad adicional multiplica la amplitud por $10$.
- titulo: ¿El modelo logarítmico se usa cuando el fenómeno crece de forma lineal?
  enunciado: ¿Es apropiado un modelo logarítmico para describir un fenómeno que crece de forma lineal?
  respuesta: 'No'
  solucion_pasos:
  - Los modelos logarítmicos se usan cuando el fenómeno involucra crecimiento o decrecimiento exponencial, no lineal.
errores_frecuentes:
- Aplicar un modelo logarítmico a fenómenos que en realidad son lineales.
- Confundir la variable física original con la magnitud logarítmica que la representa.
- Olvidar despejar correctamente el tiempo al usar el logaritmo como herramienta inversa de la exponencial.
- No interpretar el resultado numérico en el contexto real del problema.
