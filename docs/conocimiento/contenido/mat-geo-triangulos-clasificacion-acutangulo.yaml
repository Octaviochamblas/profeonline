semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.ACUTANGULO
titulo: Triángulo acutángulo como triángulo con tres ángulos agudos
objetivo: Reconocer un triángulo acutángulo por tener sus tres ángulos interiores agudos (menores que
  90°).
introduccion: Al clasificar triángulos según sus ángulos, el caso donde ninguno alcanza los 90° se llama
  acutángulo.
resumen: Un triángulo acutángulo es aquel cuyos tres ángulos interiores son agudos, es decir, cada uno
  mide menos de 90°.
explicacion: '![Triángulo acutángulo](/static/img/geometria/triangulos/triangulos-clasificacion-acutangulo.svg)


  ### Definición formal


  Un triángulo con ángulos interiores α, β y γ es acutángulo si α<90°, β<90° y γ<90° simultáneamente.


  ### Desarrollo didáctico


  Un triángulo con ángulos de 70°, 60° y 50° es acutángulo, porque los tres son menores que 90° (y en
  efecto suman 180°).'
procedimiento:
- 'Paso 1: Identifica o calcula los tres ángulos interiores del triángulo.'
- 'Paso 2: Verifica que cada uno sea menor que 90°.'
- 'Paso 3: Si los tres cumplen esa condición, el triángulo es acutángulo.'
ejemplos:
- titulo: Reconocer un acutángulo
  enunciado: Un triángulo tiene ángulos de 80°, 60° y 40°.
  solucion_pasos:
  - Los tres son menores que 90°, así que el triángulo es acutángulo.
- titulo: Caso no acutángulo
  enunciado: Un triángulo tiene ángulos de 100°, 50° y 30°.
  solucion_pasos:
  - El ángulo de 100° supera los 90°, así que no es acutángulo (es obtusángulo).
- titulo: ¿Un triángulo equilátero es siempre acutángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque sus tres ángulos miden 60°, todos menores que 90°.
- titulo: ¿Un triángulo rectángulo puede ser acutángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, un triángulo rectángulo tiene un ángulo de exactamente 90°, que no es agudo.
errores_frecuentes:
- Clasificar como acutángulo un triángulo con un ángulo de exactamente 90°.
- Verificar solo uno o dos ángulos en vez de los tres.
- Confundir 'acutángulo' con 'agudo' aplicado a un solo ángulo, no a los tres.
fuente: Elaboración propia.
estado: publicado
