semantic_id: MAT.ALG.FUNC_CUADR_VERTICE.VERTICE_CONCEPTO
titulo: Identificación del vértice como punto extremo de la parábola
objetivo: Identificar el vértice como el punto extremo (máximo o mínimo) de la gráfica de una función
  cuadrática.
introduccion: Entre todos los puntos de una parábola, hay uno especial que marca el punto de "quiebre"
  entre su tramo decreciente y su tramo creciente (o viceversa).
resumen: 'El **vértice** de una parábola es su único punto extremo: el punto más bajo si la parábola abre
  hacia arriba, o el punto más alto si abre hacia abajo.'
explicacion: '### Definición formal


  El vértice de la gráfica de $f(x)=ax^2+bx+c$ es el punto donde la función alcanza su valor extremo (mínimo
  si $a>0$, máximo si $a<0$). Es el único punto de la parábola donde la curva cambia de decreciente a
  creciente, o de creciente a decreciente.


  ### Desarrollo didáctico


  Visualmente, el vértice es fácil de identificar en cualquier gráfica: es el punto donde la curva "toca
  fondo" (si abre hacia arriba) o "toca techo" (si abre hacia abajo).


  En la parábola de $f(x)=x^2-4x+3$, el vértice es el punto más bajo de la curva, ubicado en $(2,-1)$,
  donde la función deja de decrecer y comienza a crecer.'
procedimiento:
- 'Paso 1: Observa la gráfica (o los datos) de la función cuadrática.'
- 'Paso 2: Identifica el punto donde la curva cambia de dirección (de decreciente a creciente, o viceversa).'
- 'Paso 3: Ese punto es el vértice de la parábola.'
ejemplos:
- titulo: Identificación del vértice como mínimo
  enunciado: ¿Qué tipo de punto extremo tiene la parábola de $f(x)=x^2-6x+5$, que abre hacia arriba?
  solucion_pasos:
  - Al abrir hacia arriba, la parábola tiene un punto más bajo.
  - Su vértice es un mínimo.
- titulo: Identificación del vértice como máximo
  enunciado: ¿Qué tipo de punto extremo tiene la parábola de $f(x)=-2x^2+8x$, que abre hacia abajo?
  solucion_pasos:
  - Al abrir hacia abajo, la parábola tiene un punto más alto.
  - Su vértice es un máximo.
- titulo: ¿Toda parábola tiene exactamente un vértice?
  enunciado: ¿Toda parábola tiene exactamente un vértice?
  respuesta: Sí
  solucion_pasos:
  - Es el único punto extremo de la curva, sin importar la orientación de la parábola.
- titulo: ¿El vértice puede estar en cualquier tramo, no solo en el punto más extremo?
  enunciado: ¿El vértice puede estar en cualquier tramo, no solo en el punto más extremo?
  respuesta: 'No'
  solucion_pasos:
  - Por definición, el vértice es exclusivamente el punto extremo (máximo o mínimo) de la parábola.
errores_frecuentes:
- Confundir el vértice con cualquier otro punto de la gráfica que no sea el extremo.
- Asumir que toda parábola tiene un mínimo, sin considerar el caso en que abre hacia abajo (máximo).
- Confundir el concepto de vértice con el de intersección con el eje $y$.
- No relacionar el vértice con el cambio de dirección (de decreciente a creciente o viceversa) de la función.
