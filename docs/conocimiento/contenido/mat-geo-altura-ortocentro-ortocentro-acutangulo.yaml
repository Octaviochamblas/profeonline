semantic_id: MAT.GEO.ALTURA_ORTOCENTRO.ORTOCENTRO_ACUTANGULO
titulo: Ubicación interior del ortocentro en un triángulo acutángulo
objetivo: Reconocer que el ortocentro de un triángulo acutángulo siempre se ubica en el interior de la
  figura.
introduccion: La posición del ortocentro respecto al triángulo depende del tipo de triángulo; en el caso
  acutángulo, cae siempre dentro.
resumen: En todo triángulo acutángulo, el ortocentro se ubica en el interior del triángulo.
explicacion: '![Ortocentro interior en triángulo acutángulo](/static/img/geometria/elementos-secundarios/altura-ortocentro-ortocentro-acutangulo.svg)


  ### Definición formal


  Si los tres ángulos interiores de un triángulo son agudos (menores que 90°), el ortocentro H se ubica
  en el interior de la región triangular.


  ### Desarrollo didáctico


  En un triángulo acutángulo, las tres alturas caen dentro de la figura (sus pies están dentro de los
  lados correspondientes), por lo que su punto de intersección también queda dentro.'
procedimiento:
- 'Paso 1: Verifica que los tres ángulos del triángulo sean agudos.'
- 'Paso 2: Traza las alturas y observa que sus pies caen dentro de los lados.'
- 'Paso 3: Concluye que el ortocentro está dentro del triángulo.'
ejemplos:
- titulo: Ubicar el ortocentro en un acutángulo
  enunciado: Un triángulo tiene ángulos 70°, 60° y 50°.
  solucion_pasos:
  - Es acutángulo, así que su ortocentro está en el interior de la figura.
- titulo: Verificar con las alturas
  enunciado: En un triángulo acutángulo, ¿dónde caen los pies de las tres alturas?
  solucion_pasos:
  - Todos dentro de los lados correspondientes, por eso su intersección también queda dentro.
- titulo: ¿El ortocentro de un triángulo acutángulo está siempre dentro?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad general de los triángulos acutángulos.
- titulo: ¿Puede el ortocentro de un acutángulo coincidir con un vértice?
  respuesta: 'No'
  solucion_pasos:
  - No, eso solo ocurre en triángulos rectángulos.
errores_frecuentes:
- Creer que el ortocentro siempre está dentro del triángulo, sin importar su tipo.
- Confundir la condición 'acutángulo' con 'equilátero'.
- No verificar los tres ángulos antes de concluir que el triángulo es acutángulo.
fuente: Elaboración propia.
estado: publicado
