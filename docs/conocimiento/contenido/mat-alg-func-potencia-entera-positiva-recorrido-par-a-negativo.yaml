semantic_id: MAT.ALG.FUNC_POTENCIA_ENTERA_POSITIVA.RECORRIDO_PAR_A_NEGATIVO
titulo: Recorrido con exponente par y coeficiente negativo
objetivo: Determinar el recorrido de $f(x)=a\cdot x^n$ cuando $n$ es par y $a<0$.
introduccion: Cuando el coeficiente es negativo, la gráfica se refleja respecto al eje $x$, invirtiendo también
  el recorrido de la función.
resumen: Si $n$ es par y $a<0$, el recorrido de $f(x)=a\cdot x^n$ es $(-\infty,0]$, ya que el máximo valor
  posible es $f(0)=0$ y la función decrece sin límite.
explicacion: '### Definición formal


  Para $n$ par y $a<0$, $x^n\geq0$ para todo $x$, pero al multiplicar por $a<0$ se invierte el signo:
  $f(x)=a\cdot x^n\leq0$. El máximo se alcanza en $f(0)=0$, y como $f(x)\to-\infty$ cuando $|x|\to\infty$, el
  recorrido es $(-\infty,0]$.


  ### Desarrollo didáctico


  $f(x)=-2x^2$ tiene valores $f(0)=0$, $f(1)=-2$, $f(-1)=-2$, $f(2)=-8$: nunca aparece un resultado positivo, y
  el valor $0$ sí se alcanza exactamente en $x=0$, siendo ahora el máximo de la función.'
procedimiento:
- 'Paso 1: Verifica que $n$ sea par y $a<0$.'
- 'Paso 2: Identifica que el máximo de la función es $f(0)=0$.'
- 'Paso 3: Concluye que el recorrido es $(-\infty,0]$.'
ejemplos:
- titulo: Determinación del recorrido de $-3x^2$
  enunciado: 'Determina el recorrido de $f(x)=-3x^2$.'
  solucion_pasos:
  - El exponente $2$ es par y el coeficiente $-3$ es negativo.
  - 'El recorrido es $(-\infty,0]$.'
- titulo: Determinación del recorrido de $-0{,}5x^4$
  enunciado: 'Determina el recorrido de $f(x)=-0{,}5x^4$.'
  solucion_pasos:
  - El exponente $4$ es par y el coeficiente $-0{,}5$ es negativo.
  - 'El recorrido es $(-\infty,0]$.'
- titulo: ¿El valor $0$ pertenece al recorrido de $f(x)=-x^4$?
  enunciado: ¿El valor $f(x)=0$ pertenece al recorrido de $f(x)=-x^4$?
  respuesta: Sí
  solucion_pasos:
  - Se alcanza exactamente en $x=0$, siendo ahora el máximo de la función.
- titulo: ¿Puede $f(x)=-5x^2$ tomar algún valor positivo?
  enunciado: ¿Puede $f(x)=-5x^2$ tomar algún valor positivo para algún $x$ real?
  respuesta: 'No'
  solucion_pasos:
  - Con exponente par y coeficiente negativo, el resultado nunca es positivo.
errores_frecuentes:
- Confundir este caso con el de coeficiente positivo, invirtiendo el signo del recorrido.
- Suponer que el punto $(0,0)$ es un mínimo en vez de un máximo cuando $a<0$.
- Excluir incorrectamente el valor $0$ del recorrido.
- No verificar el signo del coeficiente antes de determinar el recorrido.
