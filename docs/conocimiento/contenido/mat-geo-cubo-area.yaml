semantic_id: MAT.GEO.POLIEDROS_PRISMAS.CUBO_AREA
titulo: Cálculo del área total del cubo
objetivo: Calcular el área total de la superficie de un cubo a partir de la medida de su arista.
introduccion: Como todas las caras de un cubo son cuadrados idénticos, basta con calcular el área de una
  cara y multiplicarla por el número total de caras.
resumen: El área total de un cubo de arista $a$ se calcula como $A_T = 6a^2$, ya que tiene 6 caras cuadradas
  congruentes, cada una de área $a^2$.
explicacion: '![Área total del cubo](/static/img/geometria/espacio-cuerpos/cubo-area.svg)


  ### Definición formal


  El área total de un cubo de arista $a$ es la suma de las áreas de sus 6 caras cuadradas congruentes:
  $A_T=6\times a^2$.


  ### Desarrollo didáctico


  Si un cubo tiene arista $a=5$ cm, el área de una cara es $5^2=25$ cm², y como tiene 6 caras iguales,
  el área total es $6\times25=150$ cm².'
procedimiento:
- 'Paso 1: Identifica la medida de la arista del cubo (a).'
- 'Paso 2: Calcula el área de una cara, elevando la arista al cuadrado (a²).'
- 'Paso 3: Multiplica ese resultado por 6 (el número de caras del cubo) para obtener el área total.'
ejemplos:
- titulo: Calcular el área total de un cubo
  enunciado: Un cubo tiene arista de 5 cm.
  solucion_pasos:
  - A_T=6×5²=6×25=150 cm².
- titulo: Calcular la arista a partir del área total
  enunciado: Un cubo tiene área total de 96 cm².
  solucion_pasos:
  - 96=6×a² → a²=16 → a=4 cm.
- titulo: ¿El área total del cubo depende del cuadrado de la arista?
  respuesta: Sí
  solucion_pasos:
  - Sí, la fórmula A_T=6a² depende de a elevado al cuadrado.
- titulo: ¿Se puede calcular el área total sumando 6 veces el área de una sola cara?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que las 6 caras son congruentes, sumar 6 veces el área de una cara es equivalente a multiplicar
    por 6.
errores_frecuentes:
- Olvidar multiplicar por 6 (el número de caras) y calcular solo el área de una cara.
- Confundir la fórmula del área total del cubo con la del volumen (a³ en vez de 6a²).
- Olvidar sacar raíz cuadrada al despejar la arista a partir del área total.
fuente: 'Elaboración propia (referencias: Moraleja 98, Santillana 128).'
estado: publicado
