semantic_id: MAT.GEO.PITAGORAS.RECIPROCO
titulo: Recíproco del teorema de Pitágoras para verificar si un triángulo es rectángulo
objetivo: Aplicar el recíproco del teorema de Pitágoras para determinar si un triángulo con lados conocidos
  es rectángulo.
introduccion: 'El teorema de Pitágoras no solo permite calcular lados de un triángulo YA SABIDO rectángulo:
  su versión recíproca permite, al revés, verificar si un triángulo de lados conocidos es rectángulo o
  no.'
resumen: Si en un triángulo se cumple que el cuadrado del lado mayor es igual a la suma de los cuadrados
  de los otros dos, el triángulo es rectángulo.
explicacion: '![Recíproco del teorema de Pitágoras](/static/img/geometria/areas-pitagoras/pitagoras-reciproco.svg)


  ### Definición formal


  Si un triángulo tiene lados $a\leq b\leq c$ y se cumple $c^2=a^2+b^2$, entonces el triángulo es rectángulo,
  con el ángulo recto opuesto al lado $c$.


  ### Desarrollo didáctico


  Para verificar si un triángulo de lados 6, 8 y 10 es rectángulo, se comprueba: $10^2=8^2+6^2 \Rightarrow
  100=64+36=100$; se cumple, así que el triángulo es rectángulo.'
procedimiento:
- 'Paso 1: Ordena los tres lados de menor a mayor.'
- 'Paso 2: Calcula el cuadrado del lado mayor, y la suma de los cuadrados de los otros dos.'
- 'Paso 3: Si ambos resultados son iguales, el triángulo es rectángulo.'
ejemplos:
- titulo: Verificar un triángulo rectángulo
  enunciado: Un triángulo tiene lados 9, 12 y 15.
  solucion_pasos:
  - '15²=225 y 9²+12²=81+144=225: son iguales, así que es rectángulo.'
- titulo: Verificar un triángulo NO rectángulo
  enunciado: Un triángulo tiene lados 5, 6 y 8.
  solucion_pasos:
  - '8²=64 y 5²+6²=25+36=61: no son iguales, así que NO es rectángulo.'
- titulo: ¿Cuál lado se eleva al cuadrado por separado?
  respuesta: El mayor
  solucion_pasos:
  - El lado mayor se compara contra la suma de los cuadrados de los otros dos.
- titulo: ¿Este método sirve para clasificar cualquier triángulo (no solo verificar si es rectángulo)?
  respuesta: Sí
  solucion_pasos:
  - Sí, si el cuadrado del mayor es menor que la suma, el triángulo es acutángulo; si es mayor, es obtusángulo.
errores_frecuentes:
- Comparar el cuadrado de un lado que no es el mayor.
- Concluir que el triángulo es rectángulo sin verificar la igualdad exacta.
- Confundir esta verificación con la desigualdad triangular (que verifica la existencia del triángulo,
  no si es rectángulo).
fuente: Elaboración propia.
estado: publicado
