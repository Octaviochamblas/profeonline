- titulo: 'Respecto de «Clasificación de expresiones según cantidad de términos»: ¿Es compatible con el'
  enunciado: 'Respecto de «Clasificación de expresiones según cantidad de términos»: ¿Es compatible con el procedimiento
    esta afirmación? «Contar como términos a los elementos que están sumándose *dentro* de un numerador común (ej.
    ver $\frac{x+y}{2}$ y pensar que son dos términos porque hay un ''$+$'' arriba)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Número de Términos** de un polinomio indica cuántos bloques
    irreductibles conforman la expresión.'
errores_frecuentes:
- Contar como términos a los elementos que están sumándose *dentro* de un numerador común (ej. ver $\frac{x+y}{2}$
  y pensar que son dos términos porque hay un '$+$' arriba).
- Contar las multiplicaciones. Separar $5x$ en dos términos (5 y x).
- Multiplican la cantidad de términos que hay adentro por la cantidad que hay afuera.
- Obligan a sumar todos los coeficientes numéricos.
- Descomponen la expresión en el doble de sus términos originales.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Clasificación de expresiones según cantidad de términos
