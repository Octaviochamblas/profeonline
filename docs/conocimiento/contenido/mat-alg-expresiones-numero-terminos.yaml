semantic_id: MAT.ALG.EXPRESIONES.NUMERO_TERMINOS
objetivo: Determinar con exactitud la cantidad de términos que conforman un polinomio
  mediante la identificación de los signos separadores operativos.
introduccion: Para no perder vagones en el viaje, debemos saber contarlos correctamente.
  Esto requiere entrenar al ojo para ver los signos de sumar y restar como muros que
  dividen habitaciones.
resumen: El **Número de Términos** de un polinomio indica cuántos bloques irreductibles
  conforman la expresión. Se cuentan observando los separadores de suma ($+$) y resta
  ($-$) que se encuentran **fuera de cualquier paréntesis, corchete, raíz o denominador**.
explicacion: 'Una técnica infalible para contar términos es jugar a ''separar las
  aguas'':

  - Si ves: $3x^2 - 4x + 7$.

  1. Empieza en la izquierda.

  2. Al primer ''-'' haz un corte vertical. Ahí acaba el primer término ($3x^2$).

  3. Avanza. Al encontrar el ''+'' haz otro corte. Termina el segundo ($-4x$).

  4. Avanza hasta el final. Termina el tercero ($+7$).

  Total: 3 términos.


  *La regla del escudo protector:* Si un signo + o - está atrapado dentro de un paréntesis
  (ej. $5(a+b)$) o dentro de un denominador largo (ej. $\frac{x+y+z}{2}$), ese signo
  está ''protegido''. No sirve como separador principal. Esos bloques gigantescos
  cuentan como un solo término inmenso.'
procedimiento:
- 'Paso 1: Simplifica o reduce el polinomio si tiene partes semejantes.'
- 'Paso 2: Subraya cada pedazo de la expresión, cortando el subrayado justo ANTES
  de cada signo + o - que esté ''libre'' al aire (no encerrado en escudos).'
- 'Paso 3: Cuenta cuántas líneas de subrayado hiciste.'
ejemplos:
- titulo: Esquivando trampas
  enunciado: 'Determina el número de términos de la expresión: a - (b+c) + d/4'
  solucion_pasos:
  - 'Término 1: ''a''. Luego viene un menos libre. Corte.'
  - 'Término 2: ''-(b+c)''. El signo más interior no cuenta porque está protegido.
    Luego viene un más libre. Corte.'
  - 'Término 3: ''+ d/4''.'
  - 'Total: 3 términos.'
errores_frecuentes:
- Contar como términos a los elementos que están sumándose *dentro* de un numerador
  común (ej. ver $\frac{x+y}{2}$ y pensar que son dos términos porque hay un '$+$'
  arriba).
- Contar las multiplicaciones. Separar $5x$ en dos términos (5 y x).
fuente: Álgebra de Baldor.
estado: publicado
