semantic_id: MAT.ALG.EXPRESIONES.NUMERO_TERMINOS
objetivo: Determinar con exactitud la cantidad de términos que conforman un polinomio mediante la identificación
  de los signos separadores operativos.
introduccion: Para no perder vagones en el viaje, debemos saber contarlos correctamente. Esto requiere entrenar
  al ojo para ver los signos de sumar y restar como muros que dividen habitaciones.
resumen: El **Número de Términos** de un polinomio indica cuántos bloques irreductibles conforman la expresión.
  Se cuentan observando los separadores de suma ($+$) y resta ($-$) que se encuentran **fuera de cualquier paréntesis,
  corchete, raíz o denominador**.
explicacion: '### Definición formal


  Un paréntesis agrupa cosas. Todo lo que esté dentro funciona como una unidad integral (un solo vagón sellado)
  frente al resto de la expresión.


  ### Desarrollo didáctico


  Una técnica infalible para contar términos es jugar a ''separar las aguas'':

  - Si ves: $3x^2 - 4x + 7$.

  1. Empieza en la izquierda.

  2. Al primer ''-'' haz un corte vertical. Ahí acaba el primer término ($3x^2$).

  3. Avanza. Al encontrar el ''+'' haz otro corte. Termina el segundo ($-4x$).

  4. Avanza hasta el final. Termina el tercero ($+7$).

  Total: 3 términos.


  *La regla del escudo protector:* Si un signo + o - está atrapado dentro de un paréntesis (ej. $5(a+b)$) o dentro
  de un denominador largo (ej. $\frac{x+y+z}{2}$), ese signo está ''protegido''. No sirve como separador principal.
  Esos bloques gigantescos cuentan como un solo término inmenso.'
procedimiento:
- 'Paso 1: Simplifica o reduce el polinomio si tiene partes semejantes.'
- 'Paso 2: Subraya cada pedazo de la expresión, cortando el subrayado justo ANTES de cada signo + o - que esté ''libre''
  al aire (no encerrado en escudos).'
- 'Paso 3: Cuenta cuántas líneas de subrayado hiciste.'
- Un paréntesis agrupa cosas. Todo lo que esté dentro funciona como una unidad integral (un solo vagón sellado)
  frente al resto de la expresión.
ejemplos:
- titulo: Esquivando trampas
  enunciado: 'Determina el número de términos de la expresión: a - (b+c) + d/4'
  solucion_pasos:
  - 'Término 1: ''a''. Luego viene un menos libre. Corte.'
  - 'Término 2: ''-(b+c)''. El signo más interior no cuenta porque está protegido. Luego viene un más libre. Corte.'
  - 'Término 3: ''+ d/4''.'
  - 'Total: 3 términos.'
- titulo: Una fórmula de corrección de vuelo está dada por $E = 1000 - \frac{v+w}{t} + 4(a-b)$. El com
  enunciado: 'Una fórmula de corrección de vuelo está dada por $E = 1000 - \frac{v+w}{t} + 4(a-b)$. El computador
    de vuelo reserva en memoria un ''registro'' de cálculo para cada término matemático individual e independiente
    que conforma la fórmula. ¿Cuántos registros de memoria utilizará la computadora para evaluar el lado derecho
    de la ecuación? (v1)


    Opciones: A) 3 registros de memoria. · B) 7 registros de memoria. · C) 5 registros de memoria. · D) 1 registro
    de memoria.'
  solucion_pasos:
  - Analizamos $1000 - \frac{{v+w}}{{t}} + 4(a-b)$. El primer corte es tras el 1000 (T1). El segundo corte es tras
    la fracción compleja que agrupa $v+w$ sobre $t$ (T2). El tercer bloque es la multiplicación del 4 por el paréntesis
    protegido (T3). Son 3 términos gruesos.
  - 'Respuesta: 3 registros de memoria.'
