  enunciado: 'Respecto de «Clasificación de expresiones según cantidad de términos»: ¿Se ajusta a la definición
    esta afirmación? «El **Número de Términos** de un polinomio indica cuántos bloques irreductibles conforman la
    expresión»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Número de Términos** de un polinomio indica cuántos bloques
