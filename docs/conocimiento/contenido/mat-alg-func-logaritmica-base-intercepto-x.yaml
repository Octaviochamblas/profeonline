semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.INTERCEPTO_X
titulo: Intercepto en el eje $x$ de la función logarítmica
objetivo: Determinar que toda función $f(x)=\log_b(x)$ corta el eje $x$ en el punto $(1,0)$.
introduccion: Sin importar qué base uses, elevar cualquier número a la potencia $0$ siempre da $1$. Esa propiedad
  fija un punto que todas las funciones logarítmicas comparten.
resumen: La gráfica de $f(x)=\log_b(x)$ tiene un único **intercepto en el eje $x$** en el punto $(1,0)$, porque
  $\log_b(1)=0$ para cualquier base válida $b$.
explicacion: '### Definición formal


  Para toda función $f(x)=\log_b(x)$ con $b>0$ y $b\neq1$, se cumple $f(1)=\log_b(1)=0$, puesto que $b^0=1$ para
  cualquier base. Por lo tanto, el punto $(1,0)$ pertenece siempre a la gráfica y es su único intercepto con el
  eje $x$.


  ### Desarrollo didáctico


  Comprueba con distintas bases: $\log_2(1)=0$ porque $2^0=1$; $\log_{10}(1)=0$ porque $10^0=1$; $\log_{0{,}5}(1)=0$
  porque $0{,}5^0=1$. El resultado es siempre $0$ cuando el argumento es $1$, así que la curva siempre atraviesa
  el eje $x$ en ese único punto.'
procedimiento:
- 'Paso 1: Reconoce que $b^0=1$ se cumple para cualquier base $b>0$, $b\neq1$.'
- 'Paso 2: Evalúa $f(1)=\log_b(1)$ y concluye que su valor es $0$.'
- 'Paso 3: Ubica el punto $(1,0)$ como el intercepto de la gráfica con el eje $x$.'
ejemplos:
- titulo: Cálculo del intercepto con base 3
  enunciado: 'Determina el intercepto en $x$ de $f(x)=\log_3(x)$.'
  solucion_pasos:
  - Se evalúa $f(1)=\log_3(1)$.
  - 'Como $3^0=1$, entonces $\log_3(1)=0$, por lo que el intercepto es $(1,0)$.'
- titulo: Verificación con otra base
  enunciado: 'Verifica que $(1,0)$ pertenece a la gráfica de $f(x)=\log_{0{,}25}(x)$.'
  solucion_pasos:
  - Se reemplaza $x=1$ en la función: $f(1)=\log_{0{,}25}(1)$.
  - 'Como $0{,}25^0=1$, se cumple $f(1)=0$, así que $(1,0)$ pertenece a la gráfica.'
- titulo: ¿Toda función logarítmica pasa por el punto $(1,0)$?
  enunciado: ¿El punto $(1,0)$ pertenece a la gráfica de $f(x)=\log_b(x)$ para cualquier base válida $b$?
  respuesta: Sí
  solucion_pasos:
  - $b^0=1$ se cumple para cualquier base $b>0$, $b\neq1$, así que $\log_b(1)=0$ siempre.
- titulo: ¿Puede una función logarítmica tener más de un intercepto en $x$?
  enunciado: ¿Puede $f(x)=\log_b(x)$ cortar el eje $x$ en más de un punto?
  respuesta: 'No'
  solucion_pasos:
  - La función logarítmica es estrictamente creciente o decreciente, así que $f(x)=0$ tiene una sola solución.
errores_frecuentes:
- Creer que el intercepto en $x$ depende del valor de la base $b$.
- Confundir el intercepto en $x$ de la logarítmica con el intercepto en $y$ de la exponencial.
- Calcular mal $b^0$ y suponer que el resultado varía según la base.
- Ubicar el punto en $(0,1)$ en lugar de $(1,0)$.
