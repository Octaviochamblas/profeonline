semantic_id: MAT.GEO.HOMOTECIA.COORDENADAS_CENTRO_GENERAL
titulo: Homotecia en el plano cartesiano con centro distinto del origen
objetivo: Calcular las coordenadas de la imagen de un punto bajo una homotecia cuyo centro no es el origen
  del plano cartesiano.
introduccion: 'Cuando el centro de homotecia no coincide con el origen, el cálculo de coordenadas requiere
  un paso adicional: trasladar el punto respecto al centro antes de escalar.'
resumen: Si el centro de homotecia es $O=(a,b)$, la imagen de un punto $(x,y)$ bajo razón $k$ es $(a+k(x-a),
  b+k(y-b))$.
explicacion: '![Homotecia con centro distinto del origen](/static/img/geometria/congruencia-semejanza/homotecia-coordenadas-centro-general.svg)


  ### Definición formal


  Para una homotecia de centro $O=(a,b)$ y razón $k$, un punto $P=(x,y)$ se transforma en $P''=(a+k(x-a),
  b+k(y-b))$.


  ### Desarrollo didáctico


  El punto $(5,7)$ bajo una homotecia de centro $(2,3)$ y razón $k=2$ se transforma en $(2+2(5-2), 3+2(7-3))=(2+6,
  3+8)=(8,11)$. Es fundamental restar las coordenadas del centro antes de multiplicar por $k$, y luego
  volver a sumarlas.'
procedimiento:
- 'Paso 1: Resta las coordenadas del centro (a,b) a las coordenadas del punto (x,y).'
- 'Paso 2: Multiplica el resultado por la razón k.'
- 'Paso 3: Suma nuevamente las coordenadas del centro para obtener la imagen final.'
ejemplos:
- titulo: Calcular la imagen con centro distinto del origen
  enunciado: El punto (5,7) se transforma bajo una homotecia de centro (2,3) y razón k=2.
  solucion_pasos:
  - (2+2(5-2), 3+2(7-3))=(2+6, 3+8)=(8,11).
- titulo: Calcular con razón fraccionaria
  enunciado: El punto (10,6) se transforma bajo una homotecia de centro (4,2) y razón k=0,5.
  solucion_pasos:
  - (4+0,5(10-4), 2+0,5(6-2))=(4+3, 2+2)=(7,4).
- titulo: ¿Es necesario restar las coordenadas del centro antes de multiplicar por k?
  respuesta: Sí
  solucion_pasos:
  - Sí, es un paso esencial cuando el centro no es el origen.
- titulo: ¿El centro de homotecia se transforma en sí mismo?
  respuesta: Sí
  solucion_pasos:
  - Sí, sin importar dónde esté ubicado, el centro siempre es su propio punto fijo.
errores_frecuentes:
- Olvidar restar las coordenadas del centro antes de multiplicar por k.
- Olvidar sumar nuevamente las coordenadas del centro después de multiplicar por k.
- Confundir este caso general con el caso simplificado de centro en el origen.
fuente: Elaboración propia.
estado: publicado
