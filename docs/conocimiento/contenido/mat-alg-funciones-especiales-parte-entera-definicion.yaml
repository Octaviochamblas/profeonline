semantic_id: MAT.ALG.FUNCIONES_ESPECIALES.PARTE_ENTERA_DEFINICION
titulo: Definición de función parte entera
objetivo: Comprender la función parte entera como aquella que asigna a cada número real el mayor entero que no
  lo supera.
introduccion: 'Si tienes 7,9 años de experiencia y alguien te pregunta "¿cuántos años completos tienes de experiencia?",
  la respuesta no es 8: es 7. Esa operación de "quedarse con lo completo, sin redondear hacia arriba" es la función
  parte entera.'
resumen: La **función parte entera**, denotada $\lfloor x \rfloor$ o $\text{ent}(x)$, asigna a cada número real
  $x$ el mayor número entero que es menor o igual a $x$.
explicacion: '### Definición formal


  La función parte entera se define como $\lfloor x \rfloor = \max\{n \in \mathbb{Z} : n \leq x\}$: el mayor entero
  $n$ tal que $n \leq x$. Para $x$ ya entero, $\lfloor x \rfloor = x$; para $x$ no entero, se "redondea hacia abajo"
  siempre, incluso si $x$ es negativo.


  ### Desarrollo didáctico


  Un error común es pensar que la parte entera es simplemente "quitar los decimales", pero eso solo funciona
  para números positivos. Para negativos, el redondeo hacia abajo va en la dirección opuesta a la intuición decimal.


  $\lfloor 5{,}7 \rfloor = 5$ (el mayor entero menor o igual a 5,7). Pero $\lfloor -5{,}7 \rfloor = -6$ (no $-5$),
  porque $-6$ es el mayor entero que sigue siendo menor o igual a $-5{,}7$.'
procedimiento:
- 'Paso 1: Ubica el número $x$ en la recta numérica.'
- 'Paso 2: Identifica el entero inmediatamente a su izquierda o igual a él (nunca a la derecha).'
- 'Paso 3: Ese entero es el valor de $\lfloor x \rfloor$.'
ejemplos:
- titulo: Parte entera de un número positivo no entero
  enunciado: Calcula $\lfloor 8{,}3 \rfloor$.
  solucion_pasos:
  - El mayor entero menor o igual a $8{,}3$ es $8$.
  - '$\lfloor 8{,}3 \rfloor = 8$.'
- titulo: Parte entera de un número negativo no entero
  enunciado: Calcula $\lfloor -2{,}4 \rfloor$.
  solucion_pasos:
  - El mayor entero menor o igual a $-2{,}4$ es $-3$, no $-2$.
  - '$\lfloor -2{,}4 \rfloor = -3$.'
- titulo: ¿$\lfloor 6 \rfloor = 6$ para un número ya entero?
  enunciado: ¿$\lfloor 6 \rfloor = 6$ para un número ya entero?
  respuesta: Sí
  solucion_pasos:
  - Si $x$ ya es entero, coincide exactamente con su propia parte entera.
- titulo: ¿$\lfloor -3{,}2 \rfloor = -3$?
  enunciado: ¿$\lfloor -3{,}2 \rfloor = -3$?
  respuesta: 'No'
  solucion_pasos:
  - El resultado correcto es $-4$, el mayor entero menor o igual a $-3{,}2$.
errores_frecuentes:
- Redondear al entero más cercano en vez de tomar siempre el entero inferior.
- Truncar simplemente los decimales sin considerar el signo negativo, obteniendo un resultado incorrecto.
- Confundir la parte entera con el redondeo matemático estándar.
- Asumir que la parte entera de un número negativo es el mismo número sin la parte decimal.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
