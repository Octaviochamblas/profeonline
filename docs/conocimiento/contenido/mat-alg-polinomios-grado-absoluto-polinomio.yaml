semantic_id: MAT.ALG.POLINOMIOS.GRADO_ABSOLUTO_POLINOMIO
objetivo: Calcular el grado absoluto de un polinomio comparando los grados de sus
  términos.
introduccion: Si el grado absoluto de un término es su peso individual, el Grado Absoluto
  de un Polinomio no es la suma de todos los pesos, sino el peso del vagón más pesado
  de todo el tren.
resumen: El **Grado Absoluto de un Polinomio** es el **grado absoluto del término
  de mayor grado** que contiene dicho polinomio.
explicacion: 'No se suman los grados de todos los términos juntos. Se evalúa cada
  término por separado, como en un concurso, y el que tenga el mayor grado absoluto
  le hereda su grado a todo el polinomio.


  Ejemplo: $x^4 - 5x^3y^2 + 8x^2$

  1. Evaluamos el primer vagón ($x^4$): Su grado absoluto es $4$.

  2. Evaluamos el segundo vagón ($-5x^3y^2$): Su grado absoluto es $3+2 = 5$.

  3. Evaluamos el tercer vagón ($8x^2$): Su grado absoluto es $2$.


  El vagón ganador es el segundo (grado 5). Por lo tanto, decimos que todo el polinomio
  es de quinto grado absoluto.'
procedimiento:
- 'Paso 1: Calcula mentalmente el grado absoluto de cada término por separado (sumando
  los exponentes de sus letras).'
- 'Paso 2: Compara los resultados obtenidos.'
- 'Paso 3: El número mayor encontrado es el grado absoluto de todo el polinomio.'
ejemplos:
- titulo: Buscando al campeón
  enunciado: Halla el grado absoluto del polinomio a^4b - a^3b^3 + ab^5.
  solucion_pasos:
  - 'Término 1: a^4b. Grado = 4 + 1 = 5.'
  - 'Término 2: -a^3b^3. Grado = 3 + 3 = 6.'
  - 'Término 3: ab^5. Grado = 1 + 5 = 6.'
  - El mayor grado encontrado es 6. El polinomio es de sexto grado.
errores_frecuentes:
- Sumar los grados de todos los términos juntos (en el ejemplo anterior, decir que
  el grado es $5+6+6=17$).
- Mirar solamente el exponente más alto escrito, sin sumar las letras dentro de cada
  término compuesto.
fuente: Álgebra de Baldor.
estado: publicado
