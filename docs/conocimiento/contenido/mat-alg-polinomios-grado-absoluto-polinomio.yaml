errores_frecuentes:
- Sumar los grados de todos los términos juntos (en el ejemplo anterior, decir que el grado es $5+6+6=17$).
- Mirar solamente el exponente más alto escrito, sin sumar las letras dentro de cada término compuesto.
- Se calcula el grado absoluto de cada término y luego se suman todos esos resultados parciales.
- Se toma exclusivamente el grado del primer término que aparece escrito.
- Se restan los grados del término mayor y el término menor.
fuente: Álgebra de Baldor.
