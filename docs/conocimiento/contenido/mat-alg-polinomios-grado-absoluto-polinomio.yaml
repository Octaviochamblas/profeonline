- titulo: 'Respecto de «Cálculo del grado absoluto de un polinomio»: ¿Es compatible con el procedimient'
  enunciado: 'Respecto de «Cálculo del grado absoluto de un polinomio»: ¿Es compatible con el procedimiento esta
    afirmación? «Sumar los grados de todos los términos juntos (en el ejemplo anterior, decir que el grado es $5+6+6=17$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Grado Absoluto de un Polinomio** es el **grado absoluto
