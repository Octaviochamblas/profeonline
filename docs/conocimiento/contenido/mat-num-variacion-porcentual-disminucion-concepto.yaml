semantic_id: MAT.NUM.VARIACION_PORCENTUAL.DISMINUCION_CONCEPTO
objetivo: Comprender el concepto de disminución porcentual y sus aplicaciones matemáticas.
introduccion: Si la batería de tu celular cae de un 100% a un 80%, experimentaste
  una disminución del 20%. En la vida, el valor de los autos, la población de algunas
  ciudades y los precios suelen experimentar disminuciones porcentuales constantes.
resumen: Una disminución porcentual consiste en restar un porcentaje $p\%$ al $100\%$
  original. El nuevo valor corresponde al $(100 - p)\%$ de la cantidad inicial.
explicacion: 'La **disminución porcentual** indica cuánto se reduce una cantidad inicial.

  Al igual que en los aumentos, existen dos métodos lógicos:


  **Método de 2 pasos (Resta):**

  1. Calculas el valor de la disminución: $Valor \cdot (D / 100)$

  2. Se lo restas al valor original: $Valor - Disminución$


  **Método de 1 paso (Factor de variación):**

  Si al $100\%$ le quitas un $D\%$, te quedas con el $(100 - D)\%$.

  - Si la cantidad disminuye un $30\%$, significa que te quedaste con el $70\%$ del
  valor original.

  - Para calcularlo rápido, multiplicas por el decimal correspondiente al nuevo porcentaje
  ($0.70$).'
procedimiento:
- 'Paso 1: Identifica qué porcentaje se va a disminuir ($D\%$).'
- 'Paso 2: Réstale ese porcentaje a 100 (ej. $100 - 30 = 70\%$).'
- 'Paso 3: El nuevo valor será el $70\%$ del original. Multiplícalo por $0.70$.'
ejemplos:
- titulo: Caída de acciones
  enunciado: Una acción valía $5.000 y disminuyó su valor en un 12%. ¿Cuánto vale
    ahora?
  solucion_pasos:
  - 'Calculamos el nuevo porcentaje: $100\% - 12\% = 88\%$.'
  - 'Multiplicamos el valor original por el factor de variación: $5.000 \cdot 0.88$.'
  - 'Resultado: $4.400. Ese es el nuevo valor.'
errores_frecuentes:
- Calcular el 12% y decir que ese es el nuevo precio (olvidar restar del total).
- Multiplicar por $1.12$ en vez de $0.88$, confundiendo disminución con aumento.
fuente: Currículum Nacional MINEDUC.
estado: publicado
