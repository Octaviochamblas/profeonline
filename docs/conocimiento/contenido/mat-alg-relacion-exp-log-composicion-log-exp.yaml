semantic_id: MAT.ALG.RELACION_EXP_LOG.COMPOSICION_LOG_EXP
titulo: Composición $\log_b(b^x)=x$
objetivo: Aplicar la propiedad $\log_b(b^x)=x$ para simplificar expresiones donde un logaritmo actúa sobre una
  potencia de igual base.
introduccion: 'Igual que en el caso anterior, pero en orden inverso: ahora el logaritmo es quien "deshace" la
  potencia de su misma base.'
resumen: Para $b>0$ y $b\neq1$, se cumple $\log_b(b^x)=x$ para todo $x\in\mathbb{R}$, porque la función
  logarítmica deshace exactamente lo que hace la función exponencial de igual base.
explicacion: '### Definición formal


  Si $f(x)=\log_b(x)$ y $g(x)=b^x$ son funciones inversas, entonces $f(g(x))=x$ para todo $x\in\mathbb{R}$. Esto
  se escribe como $\log_b(b^x)=x$, válido para cualquier $x$ real, incluso negativo o fraccionario.


  ### Desarrollo didáctico


  $\log_4(4^6)=6$: el exponente $6$ ya representa la potencia a la que está elevado $4$, así que el logaritmo
  simplemente recupera ese valor. Lo mismo ocurre con $\log_2(2^{-3})=-3$.'
procedimiento:
- 'Paso 1: Verifica que la base del logaritmo y la base de la potencia sean iguales.'
- 'Paso 2: Si coinciden, el resultado es directamente el exponente de la potencia.'
- 'Paso 3: Si no coinciden, no se puede aplicar esta simplificación directa.'
ejemplos:
- titulo: Aplicación directa con bases iguales
  enunciado: 'Simplifica $\log_7(7^9)$.'
  solucion_pasos:
  - Se verifica que ambas bases coinciden ($7$).
  - 'El resultado es directamente el exponente: $9$.'
- titulo: Aplicación en una expresión algebraica
  enunciado: 'Simplifica $\log_3(3^{2x+1})$.'
  solucion_pasos:
  - Se verifica que ambas bases coinciden ($3$).
  - 'El resultado es directamente el exponente: $2x+1$.'
- titulo: ¿Se cumple $\log_b(b^x)=x$ para cualquier $x$ real, incluso negativo?
  enunciado: ¿La propiedad $\log_b(b^x)=x$ es válida cuando $x$ es un número negativo?
  respuesta: Sí
  solucion_pasos:
  - A diferencia del dominio de $\log_b$, el exponente $x$ puede tomar cualquier valor real.
- titulo: ¿Esta propiedad es la misma que $b^{\log_b(x)}=x$?
  enunciado: ¿$\log_b(b^x)=x$ y $b^{\log_b(x)}=x$ son exactamente la misma propiedad?
  respuesta: 'No'
  solucion_pasos:
  - Son dos composiciones distintas de las mismas funciones inversas, aplicadas en orden diferente.
errores_frecuentes:
- Confundir $\log_b(b^x)=x$ con $b^{\log_b(x)}=x$, invirtiendo el orden de composición.
- Aplicar la propiedad cuando las bases del logaritmo y de la potencia no coinciden.
- Creer que el dominio de esta composición se restringe igual que el del logaritmo puro.
- No verificar que la base cumpla $b>0$, $b\neq1$ antes de simplificar.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
