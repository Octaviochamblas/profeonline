semantic_id: MAT.FUND.RAZONAMIENTO_LOGICO.CONDICIONAL_CONTRARRECIPROCO
titulo: Contrarrecíproco de un condicional
objetivo: Obtener el contrarrecíproco de una proposición condicional y demostrar su equivalencia lógica
  con el condicional original.
introduccion: 'Imagina que te dicen: "Si una fruta es un plátano, entonces es amarilla". ¿Qué pasa si
  te encuentras con una fruta que NO es amarilla? Lógicamente, ¡no puede ser un plátano! Porque si lo
  fuera, tendría que ser amarilla.


  Esta forma de pensar se llama contrarrecíproco. Consiste en leer la frase al revés e intercambiar sus
  términos, pero negando ambos en el proceso.


  Lo más maravilloso de esta regla es que, a diferencia del recíproco y del inverso, el contrarrecíproco
  dice EXACTAMENTE lo mismo que la frase original. Son como gemelos perfectos. Si uno es verdadero, el
  otro también, lo que la convierte en una de las herramientas más valiosas de la matemática para hacer
  demostraciones difíciles.'
resumen: 'El contrarrecíproco de un condicional $p \to q$ es la proposición condicional $\neg q \to \neg
  p$. A diferencia de otras variaciones, un condicional y su contrarrecíproco son lógicamente equivalentes:
  $p \to q \equiv \neg q \to \neg p$.

  '
explicacion: 'Dado un condicional de la forma $p \to q$, donde $p$ es el **antecedente** y $q$ es el **consecuente**,
  podemos definir su **contrarrecíproco** (o contraposición).


  El contrarrecíproco se obtiene de dos maneras equivalentes:

  1. Intercambiando el antecedente y el consecuente, y luego negando ambos.

  2. Negando ambos y luego intercambiándolos.


  Formalmente:

  $$\text{Si el condicional original es } p \to q \text{, su contrarrecíproco es } \neg q \to \neg p$$


  **Equivalencia Lógica Perfecta**

  El condicional original y su contrarrecíproco son **lógicamente equivalentes**:

  $$p \to q \equiv \neg q \to \neg p$$


  Demostración mediante Tabla de Verdad:


  | $p$ | $q$ | $\neg q$ | $\neg p$ | Condicional: $p \to q$ | Contrarrecíproco: $\neg q \to \neg p$ |

  | :---: | :---: | :---: | :---: | :---: | :---: |

  | V | V | F | F | **V** | **V** |

  | V | F | V | F | **F** | **F** |

  | F | V | F | V | **V** | **V** |

  | F | F | V | V | **V** | **V** |


  Como se observa, ambas columnas son idénticas en todas sus filas. Esta equivalencia es muy útil en matemáticas
  para realizar **demostraciones por contraposición**, donde demostrar $\neg q \to \neg p$ resulta más
  sencillo que demostrar directamente $p \to q$.'
procedimiento:
- 'Paso 1: Identificar el antecedente ($p$) y el consecuente ($q$) en la proposición condicional original
  $p \to q$.'
- 'Paso 2: Negar ambas proposiciones individuales para obtener $\neg p$ y $\neg q$.'
- 'Paso 3: Intercambiar sus posiciones en el condicional, escribiendo la negación del consecuente original
  como nuevo antecedente, y la negación del antecedente original como nuevo consecuente.'
- 'Paso 4: Escribir la proposición equivalente resultante: $\neg q \to \neg p$. En esquema: $p \to q \equiv
  \neg q \to \neg p$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'Determina el contrarrecíproco de la proposición: ''Si un número es par, entonces su cuadrado
    es par''.'
  solucion_pasos:
  - 'Paso a: Identificamos el antecedente $p$ (''un número es par'') y el consecuente $q$ (''su cuadrado
    es par'').'
  - 'Paso b: Negamos ambas partes: $\neg p$ es ''un número no es par (es impar)'' y $\neg q$ es ''su cuadrado
    no es par (es impar)''.'
  - 'Paso c: Intercambiamos el orden y escribimos el condicional contrarrecíproco: ''Si el cuadrado de
    un número es impar, entonces el número es impar''.'
  - 'Paso d: Dado que el condicional original y el contrarrecíproco son equivalentes, ambos son verdaderos.'
- titulo: Ejemplo 2
  enunciado: Escribe la proposición contrarrecíproca de $\neg p \to q$.
  solucion_pasos:
  - 'Paso a: Identificamos el antecedente: $\neg p$.'
  - 'Paso b: Identificamos el consecuente: $q$.'
  - 'Paso c: Negamos ambos: $\neg(\neg p) \equiv p$ y la negación de $q$ es $\neg q$.'
  - 'Paso d: Intercambiamos los términos negados para formar la nueva implicación: $\neg q \to p$.'
- titulo: ¿El contrarrecíproco de 'Si estudio, entonces apruebo' es 'Si no apruebo, entonces no estudio'?
  respuesta: Sí
  solucion_pasos:
  - 'Identificamos el antecedente: ''estudio''.'
  - 'Identificamos el consecuente: ''apruebo''.'
  - 'Negamos ambos términos e intercambiamos sus lugares: ''Si no apruebo, entonces no estudio''.'
  - Esta estructura corresponde de manera exacta a la definición de contrarrecíproco.
- titulo: ¿Es la proposición $p \to q$ lógicamente equivalente a $\neg p \to \neg q$?
  respuesta: 'No'
  solucion_pasos:
  - La expresión $\neg p \to \neg q$ corresponde al inverso, no al contrarrecíproco.
  - Como se demuestra en las tablas de verdad, el condicional original no es equivalente a su inverso
    (difieren en las combinaciones VF y FV).
  - Por ende, la equivalencia planteada es falsa.
errores_frecuentes:
- Confundir el contrarrecíproco (\\neg q \\to \\neg p) con el inverso (\\neg p \\to \\neg q), olvidando
  intercambiar el orden de las proposiciones.
- Confundir el contrarrecíproco con el recíproco (q \\to p), olvidando negar los términos.
- Creer que el contrarrecíproco de una afirmación verdadera puede ser falso, ignorando su equivalencia
  lógica perfecta.
- No aplicar correctamente la doble negación al construir el contrarrecíproco de proposiciones que ya
  contienen negaciones.
- Identificar mal el antecedente y el consecuente en enunciados con redactado no estándar.
fuente: Introducción a la Lógica Matemática, P. Suppes, Capítulo 2
estado: publicado
