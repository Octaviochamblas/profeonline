semantic_id: MAT.NUM.IMAGINARIOS.I_CUADRADO
objetivo: Simplificar expresiones que contienen \(i^2\).
introduccion: La propiedad \(i^2=-1\) es la regla de reducción fundamental de los
  números imaginarios. Permite convertir potencias y productos en formas más simples.
resumen: Por definición, \(i^2=-1\). Cada par de factores \(i\) puede reemplazarse
  por \(-1\).
explicacion: |-
  Por definición, \(i^2=-1\).

  La situación “\(5i^2=-5\)” permite comprobar, y no solo memorizar, que cada par de factores \(i\) puede reemplazarse por \(-1\)
procedimiento:
- 'Paso 1: Agrupa los factores imaginarios de dos en dos.'
- 'Paso 2: Reemplaza cada \(i^2\) por \(-1\).'
- 'Paso 3: Combina signos y coeficientes reales para comprobar la forma final.'
ejemplos:
- titulo: Aplicación razonada — Propiedad i al cuadrado igual a menos uno
  enunciado: \(5i^2=-5\).
  solucion_pasos:
  - Agrupa los factores imaginarios de dos en dos.
  - Reemplaza cada \(i^2\) por \(-1\).
  - Combina signos y coeficientes reales para comprobar la forma final.
- titulo: Revisión de una solución — Propiedad i al cuadrado igual a menos uno
  enunciado: Una solución aplica “Reemplaza cada \(i^2\) por \(-1\).”, pero termina
    sin comprobar que cada par de factores \(i\) puede reemplazarse por \(-1\). Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define propiedad i al cuadrado igual a menos uno: por
    definición, \(i^2=-1\).'
  - Agrupa los factores imaginarios de dos en dos.
  - 'Completa la revisión con este control: Combina signos y coeficientes reales para
    comprobar la forma final.'
- titulo: ¿Se cumple que cada par de factores \(i\) puede reemplazarse por \(-1\)?
    — Propiedad i al cuadrado igual a menos uno
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que por definición, \(i^2=-1\).
  - El caso “\(5i^2=-5\)” satisface esa condición.
  - Combina signos y coeficientes reales para comprobar la forma final.
- titulo: ¿Es válido omitir el paso “Agrupa los factores imaginarios de dos en dos”?
    — Propiedad i al cuadrado igual a menos uno
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de propiedad i al cuadrado igual
    a menos uno.
  - 'Omitirlo puede volver inválida la acción siguiente: Reemplaza cada \(i^2\) por
    \(-1\).'
  - 'La solución debe terminar de este modo: Combina signos y coeficientes reales
    para comprobar la forma final.'
errores_frecuentes:
- 'Confundir propiedad i al cuadrado igual a menos uno con otro concepto y omitir
  este inicio: Agrupa los factores imaginarios de dos en dos.'
- Aplicar mecánicamente “Reemplaza cada \(i^2\) por \(-1\).” sin revisar las condiciones
  de la definición.
- Tomar “\(5i^2=-5\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “cada par de factores \(i\) puede
  reemplazarse por \(-1\)”.
- 'Terminar el desarrollo sin realizar este control: Combina signos y coeficientes
  reales para comprobar la forma final.'
