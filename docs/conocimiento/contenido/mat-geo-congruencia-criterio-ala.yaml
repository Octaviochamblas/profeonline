semantic_id: MAT.GEO.CONGRUENCIA_TRIANGULOS.CRITERIO_ALA
titulo: 'Criterio de congruencia ALA: ángulo, lado comprendido, ángulo'
objetivo: Aplicar el criterio ALA para determinar que dos triángulos son congruentes cuando dos ángulos
  y el lado comprendido entre ellos son iguales.
introduccion: 'El tercer criterio abreviado de congruencia invierte el rol de lados y ángulos respecto
  a LAL: en vez de un ángulo entre dos lados, se usan dos ángulos y el lado entre ellos.'
resumen: El criterio ALA establece que dos triángulos son congruentes si tienen dos ángulos correspondientes
  iguales y el lado comprendido entre esos ángulos también es igual.
explicacion: '![Criterio de congruencia ALA](/static/img/geometria/congruencia-semejanza/congruencia-criterio-ala.svg)


  ### Definición formal


  Si en $\triangle ABC$ y $\triangle A''B''C''$ se cumple $\angle B=\angle B''$, $BC=B''C''$ y $\angle
  C=\angle C''$ (con el lado BC comprendido entre los ángulos B y C), entonces $\triangle ABC\cong\triangle
  A''B''C''$.


  ### Desarrollo didáctico


  Al igual que en LAL, la posición del lado importa: debe estar exactamente entre los dos ángulos conocidos.
  Este criterio es muy usado cuando se conocen dos ángulos de un triángulo (y por lo tanto el tercero,
  por suma 180°) junto con la longitud de un lado entre dos de ellos.'
procedimiento:
- 'Paso 1: Identifica dos ángulos de cada triángulo que quieras comparar.'
- 'Paso 2: Verifica que el lado comprendido entre esos dos ángulos también sea igual en ambos triángulos.'
- 'Paso 3: Si los dos ángulos y el lado comprendido coinciden, concluye congruencia por ALA.'
ejemplos:
- titulo: Verificar congruencia con dos ángulos y el lado comprendido
  enunciado: Un triángulo tiene ángulos de 50° y 60° con lado comprendido de 8 cm; otro tiene los mismos
    datos.
  solucion_pasos:
  - Son congruentes por el criterio ALA.
- titulo: Relacionar ALA con la suma de ángulos internos
  enunciado: Si se conocen dos ángulos de un triángulo, ¿se conoce también el tercero?
  solucion_pasos:
  - Sí, porque la suma de los tres ángulos internos siempre es 180°.
- titulo: ¿El lado debe estar exactamente entre los dos ángulos conocidos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la condición esencial del criterio ALA (lado 'comprendido').
- titulo: ¿ALA es equivalente a conocer los tres ángulos de un triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, conocer solo los tres ángulos determina la forma pero no el tamaño (eso da semejanza, no congruencia);
    se necesita además el lado.
errores_frecuentes:
- Usar un lado que no está comprendido entre los dos ángulos conocidos.
- Confundir ALA con el criterio AA de semejanza, que no garantiza congruencia.
- Olvidar verificar que los ángulos usados sean realmente correspondientes entre ambos triángulos.
fuente: 'Fuente: Cid 58.'
estado: publicado
