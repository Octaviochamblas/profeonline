semantic_id: MAT.EST.PROBA_COND_BASE.LECTURA_NOTACION
titulo: Lectura verbal de P(A|B) como probabilidad de A dado B
objetivo: 'Traducir la notación P(A|B) a su lectura verbal correcta: ''la probabilidad de A, dado B''.'
introduccion: Poder leer correctamente en palabras una expresión matemática de probabilidad condicional
  es fundamental para entender y comunicar problemas de este tipo.
resumen: La expresión $P(A|B)$ se lee verbalmente como 'la probabilidad de que ocurra $A$, dado que ocurrió
  $B$'.
explicacion: '![Lectura verbal de la notación condicional](/static/img/probabilidad/condbase/condbase-lectura-notacion.svg)


  ### Definición formal


  $P(A|B)$ se traduce como: ''la probabilidad del evento $A$, condicionada a que el evento $B$ ya ocurrió''
  o, de forma abreviada, ''la probabilidad de A dado B''.


  ### Desarrollo didáctico


  $P(\text{lluvia}|\text{nublado})$ se lee: ''la probabilidad de que llueva, dado que está nublado''.'
procedimiento:
- 'Paso 1: Identifica el evento a la izquierda de la barra vertical (el evento de interés, A).'
- 'Paso 2: Identifica el evento a la derecha de la barra vertical (la condición, B).'
- 'Paso 3: Redacta la lectura como ''la probabilidad de [A], dado [B]''.'
ejemplos:
- titulo: Leer P(par|mayor que 3)
  enunciado: P(par|mayor que 3).
  solucion_pasos:
  - '''La probabilidad de obtener un número par, dado que el número es mayor que 3''.'
- titulo: Leer P(as|figura)
  enunciado: P(as|figura).
  solucion_pasos:
  - '''La probabilidad de que sea un as, dado que la carta es una figura'' (nota: en este caso, dicho
    evento sería imposible, ya que un as no es figura, pero la lectura verbal sigue siendo correcta como
    ejercicio de traducción).'
- titulo: ¿La lectura siempre comienza con el evento de interés (a la izquierda de la barra)?
  respuesta: Sí
  solucion_pasos:
  - Sí, se lee primero el evento cuya probabilidad se calcula.
- titulo: ¿Se debe mencionar la palabra 'dado' (o equivalente) en la lectura verbal?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la palabra clave que indica la condición aplicada.
errores_frecuentes:
- Leer los eventos en el orden incorrecto, invirtiendo cuál es la condición.
- Omitir la palabra 'dado' (o una expresión equivalente), perdiendo el sentido condicional de la expresión.
- Confundir la lectura de P(A|B) con la de P(A∩B) ('A y B'), que son conceptos distintos.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
