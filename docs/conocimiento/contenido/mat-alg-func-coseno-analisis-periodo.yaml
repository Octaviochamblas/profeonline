semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.PERIODO
titulo: Periodo de la función coseno
objetivo: Reconocer que $f(x)=\cos(x)$ es una función periódica con periodo $2\pi$.
introduccion: Al igual que el seno, el coseno repite su patrón de valores exactamente cada $2\pi$ unidades a lo
  largo del eje $x$.
resumen: 'La función $f(x)=\cos(x)$ es **periódica** con **periodo $2\pi$**: se cumple $\cos(x+2\pi)=\cos(x)$
  para todo $x$.'
explicacion: '### Definición formal


  Para $f(x)=\cos(x)$, el periodo es $T=2\pi$, ya que sumar $2\pi$ al ángulo corresponde a dar una vuelta
  completa en el círculo unitario, regresando al mismo punto y, por lo tanto, a la misma coordenada $x$.


  ### Desarrollo didáctico


  $\cos(0)=1$ y $\cos(0+2\pi)=\cos(2\pi)=1$: coinciden. Lo mismo ocurre en cualquier punto: $\cos(\pi)=-1$ y
  $\cos(\pi+2\pi)=\cos(3\pi)=-1$.'
procedimiento:
- 'Paso 1: Recuerda que sumar $2\pi$ al ángulo corresponde a dar una vuelta completa en el círculo unitario.'
- 'Paso 2: Verifica que $\cos(x+2\pi)=\cos(x)$ para cualquier valor de $x$.'
- 'Paso 3: Concluye que el periodo de la función coseno básica es $2\pi$.'
ejemplos:
- titulo: Verificación de la periodicidad
  enunciado: 'Verifica que $\cos(\pi/3)=\cos(\pi/3+2\pi)$.'
  solucion_pasos:
  - 'Se calcula $\cos(\pi/3)=1/2$.'
  - '$\pi/3+2\pi$ es coterminal con $\pi/3$, así que también da $1/2$.'
- titulo: Uso del periodo para simplificar un cálculo
  enunciado: 'Calcula $\cos(6\pi+\pi/3)$ usando la periodicidad.'
  solucion_pasos:
  - 'Se observa que $6\pi=3\cdot2\pi$, tres periodos completos.'
  - 'Se simplifica a $\cos(\pi/3)=1/2$.'
- titulo: ¿$2\pi$ es el menor periodo positivo de la función coseno básica?
  enunciado: ¿El valor $2\pi$ es el menor periodo positivo posible para $f(x)=\cos(x)$?
  respuesta: Sí
  solucion_pasos:
  - No existe un valor positivo menor que $2\pi$ que cumpla $\cos(x+T)=\cos(x)$ para todo $x$.
- titulo: ¿El periodo del coseno es igual al del seno?
  enunciado: ¿El periodo de $f(x)=\cos(x)$ coincide con el de $g(x)=\sin(x)$?
  respuesta: Sí
  solucion_pasos:
  - Ambas funciones básicas tienen periodo $2\pi$.
errores_frecuentes:
- Confundir el periodo con la amplitud de la función.
- Suponer que el periodo es $\pi$ en vez de $2\pi$.
- No distinguir entre el periodo fundamental y los múltiplos del periodo.
- Aplicar la periodicidad incorrectamente al simplificar cálculos.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
