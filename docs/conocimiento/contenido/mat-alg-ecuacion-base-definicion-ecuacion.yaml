semantic_id: MAT.ALG.ECUACION_BASE.DEFINICION_ECUACION
titulo: Definición de Ecuación
objetivo: Diferenciar una ecuación de otras igualdades, comprendiendo que su veracidad depende de incógnitas específicas.
introduccion: 'No todas las igualdades son ecuaciones. Una ecuación es como un candado con clave: es una igualdad
  que solo ''se abre'' o es cierta si usas el número secreto correcto.'
resumen: Una ecuación es una igualdad algebraica que contiene letras (incógnitas) y que solo es verdadera para valores
  muy específicos de dichas letras.
explicacion: '### Definición formal


  Esa es la diferencia clave: depende del valor de la incógnita para ser verdad.


  ### Desarrollo didáctico


  Vamos a diseccionar esto:

  - Si escribo $2 + 2 = 4$, es una **igualdad numérica**. Siempre es verdad, no hay misterio.

  - Si escribo $x + 2 = 5$, ahí hay un misterio. La letra $x$ es una incógnita. Esta expresión se llama **ecuación**.


  ¿Por qué es especial?

  Porque su equilibrio es ''condicional''. Imagina que la balanza está tapada. ¿Es cierto que el lado izquierdo
  pesa igual que el derecho?

  - Si adivinas que $x = 1$, tendrías $1 + 2 = 5$. Esto es falso. La balanza se inclina.

  - Si adivinas que $x = 3$, tendrías $3 + 2 = 5$. Esto es cierto. Equilibrio perfecto.


  Entonces, una ecuación es una pregunta matemática disfrazada de afirmación: ''¿Qué valor debe tener la $x$ para
  que este lado sea idéntico al otro?'''
procedimiento:
- 'Paso 1: Busca el signo $=$ para confirmar que es una igualdad.'
- 'Paso 2: Busca letras (variables o incógnitas).'
- 'Paso 3: Pregúntate: ''¿Esta igualdad depende de la letra para ser cierta?''. Si la respuesta es sí, es una ecuación.'
ejemplos:
- titulo: 'Clasifica: $3x - 1 = 8$'
  enunciado: 'Clasifica: $3x - 1 = 8$'
  solucion_pasos:
  - 'Tiene signo ''='': Es igualdad.'
  - 'Tiene incógnita ''x'': Es algebraica.'
  - Solo es cierta si $x=3$ (pues $3(3)-1=8$).
  - 'Conclusión: Es una ecuación.'
- titulo: ¿La expresión $x + x = 2x$ es una ecuación?
  solucion_pasos:
  - Aunque tiene letras, es cierta para CUALQUIER valor de x (si x=1, 2=2; si x=5, 10=10). Las ecuaciones suelen
    ser ciertas solo para valores específicos.
- titulo: 'Respecto de «Definición de ecuación como igualdad con incógnitas»: ¿Se ajusta a la definició'
  enunciado: 'Respecto de «Definición de ecuación como igualdad con incógnitas»: ¿Se ajusta a la definición esta
    afirmación? «Una ecuación es una igualdad algebraica que contiene letras (incógnitas) y que solo es verdadera
    para valores muy específicos de dichas letras»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una ecuación es una igualdad algebraica que contiene letras
    (incógnitas) y que solo es verdadera para valores muy específicos de dichas letras.'
- titulo: 'Respecto de «Definición de ecuación como igualdad con incógnitas»: ¿Es compatible con el pro'
  enunciado: 'Respecto de «Definición de ecuación como igualdad con incógnitas»: ¿Es compatible con el procedimiento
    esta afirmación? «Llamar ''ecuación'' a cualquier cosa que tenga una ''x'', incluso si no tiene signo igual»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una ecuación es una igualdad algebraica que contiene letras
    (incógnitas) y que solo es verdadera para valores muy específicos de dichas letras.'
errores_frecuentes:
- Llamar 'ecuación' a cualquier cosa que tenga una 'x', incluso si no tiene signo igual.
- Una expresión algebraica sin signo igual.
- Una igualdad numérica siempre verdadera.
- Una multiplicación de polinomios.
- $2x + 5$.
