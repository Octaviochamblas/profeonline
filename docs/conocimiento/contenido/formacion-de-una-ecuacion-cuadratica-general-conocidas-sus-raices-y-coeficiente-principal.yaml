semantic_id: MAT.ALG.EC_CUADR_PROPIEDADES.CONSTRUCCION_GENERAL
titulo: Formación de una ecuación cuadrática general conocidas sus raíces y coeficiente principal
objetivo: Construir la ecuación cuadrática general, con un coeficiente principal $a$ dado, a partir de
  sus dos raíces conocidas.
introduccion: Cuando además de las raíces se especifica el valor del coeficiente cuadrático, la ecuación
  mónica ya no es suficiente; hay que escalar toda la ecuación por ese coeficiente.
resumen: Dadas dos raíces $x_1$, $x_2$ y un coeficiente principal $a$, la ecuación cuadrática correspondiente
  es $a\left[x^2-(x_1+x_2)x+x_1x_2\right]=0$, es decir, la mónica multiplicada por $a$.
explicacion: '### Definición formal


  Si $x_1$ y $x_2$ son las raíces deseadas y se especifica un coeficiente principal $a\neq0$, la ecuación
  cuadrática correspondiente es $a\,x^2-a(x_1+x_2)x+a(x_1x_2)=0$, obtenida al multiplicar la ecuación
  mónica $x^2-(x_1+x_2)x+x_1x_2=0$ por $a$.


  ### Desarrollo didáctico


  Construir esta ecuación es un proceso de dos etapas: primero se forma la ecuación mónica con las raíces
  dadas, y luego se multiplica toda la ecuación por el coeficiente principal deseado.


  Para raíces $x_1=2$, $x_2=-1$ y coeficiente $a=3$: la mónica es $x^2-x-2=0$; multiplicando por $3$:
  $3x^2-3x-6=0$.'
procedimiento:
- 'Paso 1: Calcula la suma y el producto de las raíces dadas.'
- 'Paso 2: Forma la ecuación mónica $x^2-(\text{suma})x+(\text{producto})=0$.'
- 'Paso 3: Multiplica toda la ecuación por el coeficiente principal $a$ especificado.'
ejemplos:
- titulo: Construcción con coeficiente principal entero
  enunciado: Construye la ecuación cuadrática con raíces $1$ y $6$, y coeficiente principal $a=2$.
  solucion_pasos:
  - 'Mónica: suma $=7$, producto $=6$, dando $x^2-7x+6=0$.'
  - 'Multiplicando por $2$: $2x^2-14x+12=0$.'
- titulo: Construcción con raíz negativa y coeficiente principal negativo
  enunciado: Construye la ecuación cuadrática con raíces $-2$ y $3$, y coeficiente principal $a=-1$.
  solucion_pasos:
  - 'Mónica: suma $=1$, producto $=-6$, dando $x^2-x-6=0$.'
  - 'Multiplicando por $-1$: $-x^2+x+6=0$.'
- titulo: ¿La ecuación construida con un coeficiente principal distinto de 1 tiene las mismas raíces que
    la mónica?
  enunciado: ¿La ecuación construida con un coeficiente principal distinto de 1 tiene las mismas raíces
    que la mónica?
  respuesta: Sí
  solucion_pasos:
  - Multiplicar toda la ecuación por una constante distinta de cero no cambia su conjunto solución.
- titulo: ¿Existen infinitas ecuaciones cuadráticas distintas con las mismas dos raíces?
  enunciado: ¿Existen infinitas ecuaciones cuadráticas distintas con las mismas dos raíces?
  respuesta: Sí
  solucion_pasos:
  - Cada valor distinto del coeficiente principal $a$ genera una ecuación diferente (aunque equivalente
    en soluciones), por lo que hay infinitas posibilidades.
errores_frecuentes:
- Olvidar multiplicar todos los términos de la ecuación mónica por el coeficiente principal, multiplicando
  solo algunos.
- Confundir el coeficiente principal solicitado con uno de los valores de las raíces.
- Cometer errores de signo al multiplicar una ecuación con términos negativos por un coeficiente también
  negativo.
- Suponer incorrectamente que cambiar el coeficiente principal cambia las raíces de la ecuación.
