errores_frecuentes:
- Suponer que la inversa de $\log_b(x)$ es otra funciĂ³n logarĂ­tmica en vez de una exponencial.
- Usar una base distinta para la funciĂ³n inversa.
- Confundir "funciĂ³n inversa" con "funciĂ³n recĂ­proca" ($1/f(x)$).
- Olvidar verificar la relaciĂ³n mediante composiciĂ³n para confirmar que efectivamente son inversas.
