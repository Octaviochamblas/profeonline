titulo: La funciĂ³n logarĂ­tmica como inversa de la exponencial
objetivo: Reconocer que $f(x)=\log_b(x)$ y $g(x)=b^x$ son funciones inversas entre sĂ­.
introduccion: Dos funciones son inversas cuando una deshace exactamente lo que hace la otra. La funciĂ³n
  logarĂ­tmica y la exponencial cumplen precisamente esa relaciĂ³n.
resumen: 'Las funciones $g(x)=b^x$ y $f(x)=\log_b(x)$ son **inversas entre sĂ­**: cada una "deshace" el efecto de
  la otra, siempre que $b>0$ y $b\neq1$.'
explicacion: '### DefiniciĂ³n formal


  Dos funciones $f$ y $g$ son inversas si $f(g(x))=x$ para todo $x$ del dominio de $g$, y $g(f(x))=x$ para todo
  $x$ del dominio de $f$. Para $g(x)=b^x$ y $f(x)=\log_b(x)$, ambas composiciones se cumplen, lo que confirma que
  son funciones inversas.


  ### Desarrollo didĂ¡ctico


  Si $g(2)=b^2$, aplicar $f$ a ese resultado debe devolver $2$: $f(b^2)=\log_b(b^2)=2$. De la misma manera, si
  $f(x)=\log_b(x)$ da un resultado $y$, aplicar $g$ a $y$ devuelve el $x$ original: $g(y)=b^y=x$.'
procedimiento:
- 'Paso 1: Identifica la funciĂ³n exponencial $g(x)=b^x$ y su base $b$.'
- 'Paso 2: Reconoce que su inversa es $f(x)=\log_b(x)$, con la misma base $b$.'
- 'Paso 3: Verifica la relaciĂ³n aplicando una funciĂ³n sobre el resultado de la otra.'
ejemplos:
- titulo: IdentificaciĂ³n de un par de funciones inversas
  enunciado: 'Â¿CuĂ¡l es la funciĂ³n inversa de $g(x)=5^x$?'
  solucion_pasos:
  - Se identifica la base $b=5$.
  - 'La funciĂ³n inversa es $f(x)=\log_5(x)$.'
- titulo: VerificaciĂ³n de la relaciĂ³n inversa
  enunciado: 'Verifica que $f(x)=\log_2(x)$ y $g(x)=2^x$ son inversas evaluando en $x=3$.'
  solucion_pasos:
  - 'Se calcula $g(3)=2^3=8$.'
  - 'Se aplica $f$ al resultado: $f(8)=\log_2(8)=3$, recuperando el valor original.'
