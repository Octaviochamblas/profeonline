semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.ANGULO_DOBLE_COSENO
titulo: Identidad del coseno del ángulo doble
objetivo: Aplicar la identidad del coseno del ángulo doble, que expresa cos(2x) en función del seno y
  el coseno de x.
introduccion: Esta identidad es un caso particular de la fórmula del coseno de una suma, cuando ambos
  ángulos que se suman son iguales (α=β=x), y admite formas equivalentes usando la identidad pitagórica.
resumen: Para cualquier ángulo $x$, se cumple $\cos(2x)=\cos^2x-\sin^2x$, que también puede escribirse
  como $2\cos^2x-1$ o como $1-2\sin^2x$.
explicacion: '![Coseno del ángulo doble](/static/img/geometria/trigonometria/trigid-angulo-doble-coseno.svg)


  ### Definición formal


  Haciendo $\alpha=\beta=x$ en la identidad $\cos(\alpha+\beta)=\cos\alpha\cos\beta-\sin\alpha\sin\beta$,
  se obtiene $\cos(2x)=\cos^2x-\sin^2x$. Usando $\sin^2x=1-\cos^2x$ o $\cos^2x=1-\sin^2x$, se obtienen
  las formas equivalentes $2\cos^2x-1$ y $1-2\sin^2x$.


  ### Desarrollo didáctico


  En la figura, θ=50° y 2θ=100°. Se puede verificar que cos100°=cos²50°-sin²50°, o de forma equivalente
  usando cualquiera de las otras dos formas de la fórmula.'
procedimiento:
- 'Paso 1: Identifica el ángulo x cuyo doble se quiere calcular.'
- 'Paso 2: Obtén (o calcula) los valores de sinx y cosx (o solo uno de ellos, según la forma de la fórmula
  que uses).'
- 'Paso 3: Aplica la forma más conveniente: cos²x-sin²x, 2cos²x-1, o 1-2sin²x.'
ejemplos:
- titulo: Calcular cos(60°) usando el ángulo doble de 30°
  enunciado: sin30°=0,5, cos30°=√3/2≈0,866.
  solucion_pasos:
  - cos60°=cos²30°-sin²30°=0,75-0,25=0,5, coincidiendo con el valor conocido de cos60°.
- titulo: Calcular cos(2x) usando solo el coseno de x
  enunciado: cosx=0,8.
  solucion_pasos:
  - cos(2x)=2×0,8²-1=2×0,64-1=0,28, usando la forma que solo requiere el coseno.
- titulo: ¿Existen varias formas equivalentes de esta identidad?
  respuesta: Sí
  solucion_pasos:
  - Sí, cos²x-sin²x, 2cos²x-1 y 1-2sin²x son todas equivalentes.
- titulo: ¿Se puede calcular cos(2x) conociendo solo sinx?
  respuesta: Sí
  solucion_pasos:
  - Sí, usando la forma cos(2x)=1-2sin²x, que no requiere el valor de cosx.
errores_frecuentes:
- Usar solo la forma cos²x-sin²x cuando conviene más usar 2cos²x-1 o 1-2sin²x según los datos disponibles.
- Confundir esta identidad con la del seno del ángulo doble.
- Olvidar que las tres formas de la fórmula son equivalentes entre sí, y elegir la que requiere un dato
  no disponible.
fuente: Elaboración propia.
estado: publicado
