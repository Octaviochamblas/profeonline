objetivo: Aplicar la ley de exponentes al multiplicar potencias de la misma base, sumando los exponentes.
introduccion: 'ÂżCuĂĄnto es $x^2 \cdot x^3$? Podemos pensar: $x^2 = x \cdot x$ y $x^3 = x \cdot x \cdot x$. JuntĂĄndolos:
  $x \cdot x \cdot x \cdot x \cdot x = x^5$. Los exponentes se suman.'
resumen: 'Al multiplicar potencias de la **misma base**, los exponentes se **suman**: $x^m \cdot x^n = x^{m+n}$.
  La base permanece igual; solo los exponentes se operan.'
explicacion: '### DefiniciĂłn formal


