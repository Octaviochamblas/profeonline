  ### Desarrollo didĂĄctico


  Regla formal: $a^m \cdot a^n = a^{m+n}$.


  Ejemplos:

  - $x^3 \cdot x^4 = x^{3+4} = x^7$.

  - $y^2 \cdot y = y^{2+1} = y^3$ (el exponente 1 es implĂ­cito).

  - $a^5 \cdot a^0 = a^{5+0} = a^5$ (cualquier base elevada a cero es 1).


  Importante: Esta regla solo aplica cuando las bases son idĂ©nticas. $x^3 \cdot y^4$ NO se simplifica sumando exponentes
  porque las bases ($x$ e $y$) son distintas.'
procedimiento:
- 'Paso 1: Verifica que las dos potencias tengan exactamente la misma base.'
- 'Paso 2: Suma sus exponentes.'
- 'Paso 3: Escribe la base con el exponente resultante.'
- 'Paso 4: Si las bases son distintas, NO apliques esta regla; dĂ©jalas separadas.'
