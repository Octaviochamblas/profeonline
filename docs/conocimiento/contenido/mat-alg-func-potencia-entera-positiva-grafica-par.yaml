semantic_id: MAT.ALG.FUNC_POTENCIA_ENTERA_POSITIVA.GRAFICA_PAR
titulo: Gráfica de $f(x)=x^n$ con exponente entero positivo par
objetivo: Describir la forma general de la gráfica de $f(x)=a\cdot x^n$ cuando $n$ es un entero positivo par.
introduccion: Las funciones con exponente par positivo, como $x^2$ o $x^4$, comparten una forma de "copa"
  reconocible, aunque más o menos abierta según el exponente.
resumen: Cuando $n$ es un entero positivo par, la gráfica de $f(x)=a\cdot x^n$ tiene forma de **copa**, similar
  a una parábola, con un único punto mínimo (si $a>0$) o máximo (si $a<0$) en el origen.
explicacion: '### Definición formal


  Para $n\in\mathbb{Z}^+$ par y $a>0$, la función $f(x)=a\cdot x^n$ satisface $f(x)\geq0$ para todo $x$, con
  $f(0)=0$ como único mínimo, y $f(x)\to+\infty$ cuando $|x|\to\infty$. La gráfica desciende hasta el origen y
  luego asciende, formando una curva simétrica respecto al eje $y$.


  ### Desarrollo didáctico


  Comparando $f(x)=x^2$ y $g(x)=x^4$ en el intervalo $[-1,1]$: $g$ queda más "aplanada" cerca de $0$, pero fuera
  de ese intervalo crece más rápido que $f$. Ambas comparten la forma general de copa y el mismo punto mínimo en
  el origen.'
procedimiento:
- 'Paso 1: Verifica que el exponente $n$ sea un entero positivo par.'
- 'Paso 2: Ubica el punto $(0,0)$ como vértice de la curva.'
- 'Paso 3: Calcula puntos adicionales simétricos respecto al eje $y$ para trazar la forma de copa.'
ejemplos:
- titulo: Descripción de la gráfica de $x^2$
  enunciado: 'Describe la forma general de la gráfica de $f(x)=x^2$.'
  solucion_pasos:
  - El exponente $2$ es par, así que la gráfica tiene forma de copa.
  - El vértice está en $(0,0)$ y la curva es simétrica respecto al eje $y$.
- titulo: Comparación de dos exponentes pares
  enunciado: 'Compara la forma de $f(x)=x^2$ y $g(x)=x^6$ cerca del origen.'
  solucion_pasos:
  - Ambas tienen forma de copa con vértice en el origen.
  - $g(x)=x^6$ queda más aplanada cerca de $0$ que $f(x)=x^2$, pero crece más rápido lejos del origen.
- titulo: ¿La gráfica de $f(x)=x^4$ tiene un único punto mínimo?
  enunciado: ¿La gráfica de $f(x)=x^4$ tiene exactamente un punto mínimo, ubicado en el origen?
  respuesta: Sí
  solucion_pasos:
  - Con exponente par positivo y $a>0$, el único mínimo se encuentra en $(0,0)$.
- titulo: ¿La gráfica de $f(x)=x^2$ tiene dos ramas independientes que se cruzan en dos puntos?
  enunciado: ¿La gráfica de una función potencia con exponente par cruza el eje $x$ en más de un punto?
  respuesta: 'No'
  solucion_pasos:
  - Solo toca el eje $x$ en el origen, que es simultáneamente su único mínimo.
errores_frecuentes:
- Confundir la forma de copa del exponente par con la forma de "s" del exponente impar.
- Suponer que todas las funciones con exponente par tienen exactamente la misma "apertura".
- Olvidar verificar el signo de $a$ antes de decidir si el vértice es mínimo o máximo.
- No reconocer que el vértice siempre está en el origen para la función básica $x^n$ sin traslaciones.
