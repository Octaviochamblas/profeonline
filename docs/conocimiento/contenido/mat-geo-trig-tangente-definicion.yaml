semantic_id: MAT.GEO.TRIGONOMETRIA_BASICA.TANGENTE_DEFINICION
titulo: Definición de la tangente de un ángulo agudo como razón cateto opuesto / cateto adyacente
objetivo: Comprender la tangente de un ángulo agudo en un triángulo rectángulo como la razón entre el
  cateto opuesto y el cateto adyacente.
introduccion: La tercera razón trigonométrica fundamental es la tangente, que a diferencia del seno y
  el coseno, relaciona los dos catetos entre sí, sin involucrar la hipotenusa.
resumen: 'La tangente de un ángulo agudo α en un triángulo rectángulo es la razón entre el cateto opuesto
  y el cateto adyacente a α: $\tan(\alpha)=\frac{\text{cateto opuesto}}{\text{cateto adyacente}}$.'
explicacion: '![Definición de la tangente](/static/img/geometria/areas-pitagoras/trig-tangente-definicion.svg)


  ### Definición formal


  Dado un ángulo agudo $\alpha$ en un triángulo rectángulo, $\tan(\alpha)=\frac{\text{cateto opuesto a
  }\alpha}{\text{cateto adyacente a }\alpha}=\frac{\text{sen}(\alpha)}{\cos(\alpha)}$.


  ### Desarrollo didáctico


  En un triángulo rectángulo con cateto opuesto a α de 3 cm y cateto adyacente de 4 cm, $\tan(\alpha)=\frac{3}{4}=0,75$.
  A diferencia del seno y coseno, la tangente puede tomar cualquier valor positivo, ya que no está limitada
  por la hipotenusa como denominador.'
procedimiento:
- 'Paso 1: Identifica el ángulo agudo α del que quieres calcular la tangente.'
- 'Paso 2: Identifica el cateto opuesto y el cateto adyacente a ese ángulo.'
- 'Paso 3: Divide el cateto opuesto entre el cateto adyacente.'
ejemplos:
- titulo: Calcular tan(α) con cateto opuesto 3 y adyacente 4
  enunciado: Un triángulo rectángulo tiene cateto opuesto a α de 3 cm y cateto adyacente de 4 cm.
  solucion_pasos:
  - tan(α)=3/4=0,75.
- titulo: Calcular tan(α) con cateto opuesto 12 y adyacente 5
  enunciado: Un triángulo rectángulo tiene cateto opuesto a α de 12 cm y cateto adyacente de 5 cm.
  solucion_pasos:
  - tan(α)=12/5=2,4.
- titulo: ¿La tangente puede ser mayor que 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del seno y coseno, la tangente no está acotada por 1.
- titulo: ¿La tangente involucra la hipotenusa en su definición?
  respuesta: 'No'
  solucion_pasos:
  - No, relaciona directamente los dos catetos entre sí.
errores_frecuentes:
- Confundir el orden de la razón, calculando cateto adyacente/cateto opuesto en vez de opuesto/adyacente.
- Creer que la tangente, como el seno y coseno, está limitada al intervalo entre 0 y 1.
- Involucrar erróneamente la hipotenusa en el cálculo de la tangente.
fuente: 'Fuente: Moraleja 53, Cid 221.'
estado: publicado
