semantic_id: MAT.GEO.TRIG_FUNDAMENTAL.TANGENTE_DEFINICION
titulo: Definición de tangente de un ángulo agudo como cateto opuesto sobre cateto adyacente
objetivo: Definir la tangente de un ángulo agudo de un triángulo rectángulo como el cociente entre el
  cateto opuesto y el cateto adyacente.
introduccion: A diferencia del seno y el coseno, la tangente compara los dos catetos entre sí, sin involucrar
  la hipotenusa.
resumen: 'La tangente de un ángulo agudo $\theta$ en un triángulo rectángulo es la razón entre el cateto
  opuesto y el cateto adyacente: $\tan\theta=\dfrac{\text{cateto opuesto}}{\text{cateto adyacente}}$.'
explicacion: '![Definición de tangente](/static/img/geometria/trigonometria/trig-tangente-definicion.svg)


  ### Definición formal


  En un triángulo rectángulo con ángulo agudo $\theta$, la tangente se define como $\tan\theta=\dfrac{\text{cateto
  opuesto}}{\text{cateto adyacente}}$. A diferencia del seno y el coseno, la tangente no involucra la
  hipotenusa.


  ### Desarrollo didáctico


  En la figura, el ángulo $\theta$ está en el vértice $B$. El cateto opuesto es $AC$ y el cateto adyacente
  es $AB$. Por lo tanto, $\tan\theta=\dfrac{AC}{AB}$.'
procedimiento:
- 'Paso 1: Identifica el ángulo agudo θ y ubica el vértice donde se encuentra.'
- 'Paso 2: Identifica el cateto opuesto y el cateto adyacente a θ (sin involucrar la hipotenusa).'
- 'Paso 3: Calcula tanθ como el cociente entre la longitud del cateto opuesto y la del cateto adyacente.'
ejemplos:
- titulo: Calcular la tangente de un ángulo con medidas conocidas
  enunciado: En un triángulo rectángulo, el cateto opuesto a θ mide 3 cm y el cateto adyacente mide 4
    cm.
  solucion_pasos:
  - tanθ=3/4=0,75.
- titulo: Reconocer que la tangente no usa la hipotenusa
  enunciado: Se calcula tanθ conociendo solo los dos catetos.
  solucion_pasos:
  - No es necesario conocer la hipotenusa para calcular la tangente, a diferencia del seno y el coseno.
- titulo: ¿La tangente puede tomar valores mayores que 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del seno y el coseno (limitados entre 0 y 1), la tangente puede ser mayor que 1 si
    el cateto opuesto es mayor que el adyacente.
- titulo: ¿Se puede calcular la tangente como el cociente entre seno y coseno?
  respuesta: Sí
  solucion_pasos:
  - Sí, tanθ=sinθ/cosθ, ya que ambos comparten la hipotenusa en el denominador, que se cancela al dividir.
errores_frecuentes:
- 'Confundir el orden de la división: usar cateto adyacente/cateto opuesto en vez de opuesto/adyacente.'
- Intentar usar la hipotenusa en la fórmula de la tangente, cuando no es necesaria.
- Creer que la tangente, como el seno y el coseno, está limitada entre 0 y 1.
fuente: 'Elaboración propia (referencias: Moraleja 175, Cid 155).'
estado: publicado
