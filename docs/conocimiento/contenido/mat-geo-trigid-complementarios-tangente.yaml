semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.COMPLEMENTARIOS_TANGENTE
titulo: RelaciУГn entre tangente y cotangente de УЁngulos complementarios
objetivo: Establecer que la tangente de un УЁngulo es igual a la cotangente de su УЁngulo complementario
  (y viceversa), para УЁngulos complementarios (que suman 90ТА).
introduccion: De la misma forma que seno y coseno se intercambian entre УЁngulos complementarios, la tangente
  se relaciona con la cotangente del УЁngulo complementario, ya que ambas son cocientes de seno y coseno
  intercambiados.
resumen: Si $x$ y $90ТА-x$ son УЁngulos complementarios, se cumple $\tan(90ТА-x)=\cot x$ y $\cot(90ТА-x)=\tan
  x$.
explicacion: '![Tangente y cotangente de УЁngulos complementarios](/static/img/geometria/trigonometria/trigid-complementarios-tangente.svg)


  ### DefiniciУГn formal


  Como $\tan(90ТА-x)=\dfrac{\sin(90ТА-x)}{\cos(90ТА-x)}=\dfrac{\cos x}{\sin x}=\cot x$, se obtiene la identidad
  de complementariedad entre tangente y cotangente.


  ### Desarrollo didУЁctico


  En la figura, ЮИ=40ТА y su complementario 90ТА-ЮИ=50ТА. Se cumple que tan40ТА=cot50ТА y cot40ТА=tan50ТА, ya que
  ambas razones intercambian su papel al pasar de un УЁngulo a su complementario.'
procedimiento:
- 'Paso 1: Verifica que los dos УЁngulos sean complementarios (sumen 90ТА).'
- 'Paso 2: Aplica tan(90ТА-x)=cotx, o de forma equivalente cot(90ТА-x)=tanx.'
- 'Paso 3: Usa esta relaciУГn para obtener el valor de una razУГn a partir de la otra.'
ejemplos:
- titulo: Verificar la relaciУГn con 40ТА y 50ТА
  enunciado: ЮИ=40ТА, complementario 50ТА.
  solucion_pasos:
  - tan40ТА=cot50ТА y cot40ТА=tan50ТА, por ser УЁngulos complementarios.
