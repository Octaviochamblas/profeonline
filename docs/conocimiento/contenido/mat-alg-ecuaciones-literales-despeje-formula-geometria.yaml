semantic_id: 'MAT.ALG.ECUACIONES_LITERALES.DESPEJE_FORMULA_GEOMETRIA'
titulo: 'Despeje en Fórmulas Geométricas'
objetivo: 'Aplicar el despeje literal a fórmulas clásicas de la geometría.'
introduccion: |
  Las ecuaciones literales no son un invento tortuoso, son el corazón de la ciencia. Toma la fórmula del área de un trapecio: $A = \frac{(B+b)h}{2}$.
resumen: 'Ahora tienes una fórmula explícita para evaluar bases mayores.'
explicacion: |
  ¿Qué pasa si conoces el Área ($A$), la altura ($h$) y la base menor ($b$), pero necesitas calcular la Base mayor ($B$)? Debes despejar $B$.

  Trata a las demás letras como términos y coeficientes:
  - El 2 divide, pasa multiplicando: $2A = (B+b)h$.
  - La $h$ multiplica a todo el paréntesis, pasa dividiendo: $\frac{2A}{h} = B+b$.
  - La $b$ está sumando, pasa restando: $\frac{2A}{h} - b = B$.
procedimiento:
  - 'Paso 1: Identifica la variable objetivo (ej: radio, altura, base).'
  - 'Paso 2: Mueve constantes divisoras o multiplicadoras al otro lado.'
  - 'Paso 3: Aíslala mediante suma/resta o división final, manteniendo las variables como letras.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
