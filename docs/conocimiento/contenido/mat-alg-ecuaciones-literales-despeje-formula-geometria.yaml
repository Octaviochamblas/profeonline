semantic_id: MAT.ALG.ECUACIONES_LITERALES.DESPEJE_FORMULA_GEOMETRIA
titulo: Despeje en Fórmulas Geométricas
objetivo: Aplicar el despeje literal a fórmulas clásicas de la geometría.
introduccion: ¿Qué pasa si conoces el Área ($A$), la altura ($h$) y la base menor ($b$), pero necesitas calcular
  la Base mayor ($B$)? Debes despejar $B$.
resumen: 'Las ecuaciones literales no son un invento tortuoso, son el corazón de la ciencia. Toma la fórmula del
  área de un trapecio: $A = \frac{(B+b)h}{2}$.'
explicacion: '### Definición formal


  Las ecuaciones literales no son un invento tortuoso, son el corazón de la ciencia. Toma la fórmula del área de
  un trapecio: $A = \frac{(B+b)h}{2}$.


  ### Desarrollo didáctico


  ¿Qué pasa si conoces el Área ($A$), la altura ($h$) y la base menor ($b$), pero necesitas calcular la Base mayor
  ($B$)? Debes despejar $B$.


  Trata a las demás letras como operaciones que acompañan a la variable:

  - El 2 divide, pasa multiplicando: $2A = (B+b)h$.

  - La $h$ multiplica a todo el paréntesis, pasa dividiendo: $\frac{2A}{h} = B+b$.

  - La $b$ está sumando, pasa restando: $\frac{2A}{h} - b = B$.


  Ahora tienes una fórmula explícita para calcular bases mayores.'
procedimiento:
- 'Identifica la variable objetivo (ej: radio, altura, base).'
- Mueve constantes divisoras o multiplicadoras al otro lado.
- Aíslala mediante suma/resta o división final, manteniendo las variables como letras.
