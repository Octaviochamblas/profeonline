semantic_id: MAT.GEO.CIRCULO_ELEMENTOS.DIAMETRO
titulo: Identificación del diámetro como cuerda que pasa por el centro
objetivo: Identificar el diámetro de una circunferencia como la cuerda especial que pasa exactamente por
  el centro.
introduccion: Entre todas las posibles cuerdas de una circunferencia, existe una en particular que se
  distingue por atravesar el centro exacto de la figura.
resumen: El diámetro es la cuerda que pasa por el centro de la circunferencia, uniendo dos puntos diametralmente
  opuestos.
explicacion: '![Diámetro: cuerda que pasa por el centro](/static/img/geometria/circunferencia-circulo/circulo-diametro.svg)


  ### Definición formal


  El diámetro es el segmento $\overline{AB}$ donde $A$ y $B$ son puntos de la circunferencia, y el centro
  $O$ pertenece al segmento $AB$ (siendo su punto medio).


  ### Desarrollo didáctico


  El diámetro divide a la circunferencia en dos arcos exactamente iguales (dos semicircunferencias), y
  también divide al círculo en dos semicírculos idénticos; es la única cuerda que tiene esta propiedad
  de división exacta por la mitad.'
procedimiento:
- 'Paso 1: Identifica el centro de la circunferencia.'
- 'Paso 2: Traza una cuerda que pase exactamente por ese centro.'
- 'Paso 3: Esa cuerda es el diámetro.'
ejemplos:
- titulo: Identificar un diámetro
  enunciado: Se traza una cuerda que pasa exactamente por el centro O de una circunferencia.
  solucion_pasos:
  - Esa cuerda es el diámetro de la circunferencia.
- titulo: Verificar la propiedad de bisección
  enunciado: ¿Qué ocurre con la circunferencia al trazar un diámetro?
  solucion_pasos:
  - El diámetro la divide en dos arcos exactamente iguales (dos semicircunferencias).
- titulo: ¿El diámetro es la cuerda más larga posible?
  respuesta: Sí
  solucion_pasos:
  - Sí, ninguna otra cuerda puede ser más larga que el diámetro.
- titulo: ¿Toda cuerda que pase cerca del centro es un diámetro?
  respuesta: 'No'
  solucion_pasos:
  - No, debe pasar exactamente por el centro, no solo cerca de él.
errores_frecuentes:
- Creer que cualquier cuerda larga es un diámetro, sin verificar que pase exactamente por el centro.
- Confundir el diámetro con el radio, olvidando que el diámetro atraviesa toda la circunferencia (de lado
  a lado).
- Asumir que existen múltiples diámetros de distinta longitud en una misma circunferencia.
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
