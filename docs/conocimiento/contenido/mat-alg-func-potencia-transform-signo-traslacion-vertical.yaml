semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.SIGNO_TRASLACION_VERTICAL
titulo: Efecto del signo en la traslación vertical
objetivo: Determinar la dirección del desplazamiento vertical según el signo de $k$ en $f(x)=a\cdot x^n+k$.
introduccion: A diferencia de la traslación horizontal, en este caso el signo de $k$ coincide directamente con la
  dirección visual del desplazamiento.
resumen: En $f(x)=a\cdot x^n+k$, si $k>0$ la curva se desplaza **hacia arriba**; si $k<0$, se desplaza **hacia
  abajo**.
explicacion: '### Definición formal


  Para $f(x)=a\cdot x^n+k$, un valor $k>0$ suma directamente al resultado de $a\cdot x^n$, elevando toda la
  curva. Un valor $k<0$ resta, bajando toda la curva. A diferencia de la traslación horizontal, no hay inversión
  de signo entre la expresión y la dirección del movimiento.


  ### Desarrollo didáctico


  $f(x)=x^3+4$ con $k=4>0$ se desplaza hacia arriba: su punto de paso, antes en $(0,0)$, ahora está en $(0,4)$.
  $f(x)=x^3-4$ con $k=-4<0$ se desplaza hacia abajo: su punto de paso ahora está en $(0,-4)$.'
procedimiento:
- 'Paso 1: Identifica el valor de $k$ sumado o restado fuera de la potencia.'
- 'Paso 2: Si $k>0$, desplaza hacia arriba; si $k<0$, desplaza hacia abajo.'
- 'Paso 3: Verifica evaluando $f(0)=k$ para confirmar la nueva posición vertical.'
ejemplos:
- titulo: Traslación hacia arriba
  enunciado: '¿Hacia dónde se desplaza $f(x)=x^2+7$ respecto a $x^2$?'
  solucion_pasos:
  - Se identifica $k=7>0$.
  - Se desplaza $7$ unidades hacia arriba.
- titulo: Traslación hacia abajo
  enunciado: '¿Hacia dónde se desplaza $f(x)=x^4-3$ respecto a $x^4$?'
  solucion_pasos:
  - Se identifica $k=-3<0$.
  - Se desplaza $3$ unidades hacia abajo.
- titulo: ¿$f(x)=x^2-5$ se desplaza hacia arriba?
  enunciado: ¿La función $f(x)=x^2-5$ se desplaza hacia arriba respecto a $x^2$?
  respuesta: 'No'
  solucion_pasos:
  - Con $k=-5<0$, el desplazamiento es hacia abajo.
- titulo: ¿El signo de $k$ coincide directamente con la dirección del desplazamiento?
  enunciado: ¿El signo de $k$ en $f(x)=a\cdot x^n+k$ coincide directamente con la dirección visual del
    desplazamiento (a diferencia de la traslación horizontal)?
  respuesta: Sí
  solucion_pasos:
  - A diferencia de $h$ en la traslación horizontal, aquí no hay inversión de signo.
errores_frecuentes:
- Aplicar la misma lógica de inversión de signo que en la traslación horizontal, cuando aquí no corresponde.
- Confundir esta traslación con una traslación horizontal.
- No verificar el signo de $k$ antes de determinar la dirección del desplazamiento.
- Olvidar que el desplazamiento vertical también mueve el recorrido de la función.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
