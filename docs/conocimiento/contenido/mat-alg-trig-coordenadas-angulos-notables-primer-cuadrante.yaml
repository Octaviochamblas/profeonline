semantic_id: MAT.ALG.TRIG_COORDENADAS.ANGULOS_NOTABLES_PRIMER_CUADRANTE
titulo: Ángulos notables del primer cuadrante
objetivo: Memorizar los valores exactos de seno y coseno para los ángulos notables $30°$, $45°$ y $60°$.
introduccion: Además de los ángulos cuadrantales, existen otros tres ángulos del primer cuadrante cuyos valores
  de seno y coseno se pueden calcular exactamente, sin usar calculadora.
resumen: Los **ángulos notables** del primer cuadrante son $30°$ ($\pi/6$), $45°$ ($\pi/4$) y $60°$ ($\pi/3$),
  con valores exactos de seno y coseno derivados de triángulos especiales.
explicacion: '### Definición formal


  Los valores exactos son: $\sin(30°)=1/2$, $\cos(30°)=\sqrt{3}/2$; $\sin(45°)=\sqrt{2}/2$,
  $\cos(45°)=\sqrt{2}/2$; $\sin(60°)=\sqrt{3}/2$, $\cos(60°)=1/2$. Se derivan de un triángulo equilátero
  (para $30°$ y $60°$) y de un triángulo rectángulo isósceles (para $45°$).


  ### Desarrollo didáctico


  Nota que $\sin(30°)=\cos(60°)$ y $\sin(60°)=\cos(30°)$: los valores de seno y coseno de ángulos complementarios
  ($30°+60°=90°$) se intercambian, un patrón útil para memorizar la tabla completa.'
procedimiento:
- 'Paso 1: Identifica si el ángulo dado es uno de los tres notables: $30°$, $45°$ o $60°$.'
- 'Paso 2: Recupera el valor exacto correspondiente de la tabla de ángulos notables.'
- 'Paso 3: Usa el patrón de complementariedad para verificar el resultado si es necesario.'
ejemplos:
- titulo: Cálculo directo de $\sin(45°)$
  enunciado: 'Determina $\sin(45°)$.'
  solucion_pasos:
  - Se recupera el valor exacto de la tabla de ángulos notables.
  - '$\sin(45°)=\sqrt{2}/2$.'
- titulo: Verificación de complementariedad
  enunciado: 'Verifica que $\sin(30°)=\cos(60°)$.'
  solucion_pasos:
  - 'Se calcula $\sin(30°)=1/2$ y $\cos(60°)=1/2$.'
  - Ambos valores coinciden, confirmando el patrón de complementariedad.
- titulo: ¿$\sin(45°)$ y $\cos(45°)$ son iguales?
  enunciado: ¿$\sin(45°)$ y $\cos(45°)$ tienen el mismo valor exacto?
  respuesta: Sí
  solucion_pasos:
  - Ambos valen $\sqrt{2}/2$, consecuencia de la simetría del triángulo rectángulo isósceles.
- titulo: ¿$\cos(30°)$ es mayor que $\sin(30°)$?
  enunciado: ¿$\cos(30°)$ es mayor que $\sin(30°)$?
  respuesta: Sí
  solucion_pasos:
  - '$\cos(30°)=\sqrt{3}/2\approx0{,}87$ es mayor que $\sin(30°)=1/2=0{,}5$.'
errores_frecuentes:
- Confundir los valores de $30°$ con los de $60°$, invirtiendo seno y coseno.
- Olvidar el radical en $\sqrt{2}/2$ y $\sqrt{3}/2$, dejando solo el número entero.
- No usar el patrón de complementariedad para verificar los resultados memorizados.
- Confundir estos valores exactos con aproximaciones decimales redondeadas.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
