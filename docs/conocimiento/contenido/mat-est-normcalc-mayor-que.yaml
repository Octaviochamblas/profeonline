semantic_id: MAT.EST.NORMAL_CALCULO.MAYOR_QUE
titulo: Calcular probabilidad mayor que un valor usando complemento
objetivo: Calcular la probabilidad de que una variable normal sea mayor que un valor determinado, usando el
  complemento de la tabla Z.
introduccion: Si la tabla Z solo entrega el área a la izquierda, para calcular el área a la derecha basta con restar
  ese resultado de 1.
resumen: Para calcular $P(X>a)$ se usa el complemento, aplicando $P(X>a)=1-P(X\leq a)$, calculando primero el área
  acumulada a la izquierda con la tabla Z.
explicacion: '![Probabilidad mayor que un valor](/static/img/estadistica/normcalc/normcalc-mayor-que.svg)


  ### Definición formal


  Como el área total bajo la curva es 1, se cumple que $P(X>a)=1-P(X\leq a)$, donde $P(X\leq a)$ se obtiene

  estandarizando $a$ y buscando el valor en la tabla Z.


  ### Desarrollo didáctico


  Este es el método del complemento: en vez de buscar directamente el área derecha (que muchas tablas no entregan),

  se calcula 1 menos el área izquierda ya conocida.'
procedimiento:
- 'Paso 1: Calcula el puntaje $Z=\dfrac{a-\mu}{\sigma}$.'
- 'Paso 2: Busca $P(Z\leq z)$ en la tabla normal estándar.'
- 'Paso 3: Calcula $P(X>a)=1-P(Z\leq z)$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $P(Z\leq 1)=0{,}8413$, ¿cuál es $P(Z>1)$?
  solucion_pasos:
  - $P(Z>1)=1-0{,}8413$.
  - $P(Z>1)=0{,}1587$.
- titulo: Ejemplo 2
  enunciado: ¿Por qué se usa el complemento para calcular $P(X>a)$?
  solucion_pasos:
  - Porque la tabla Z entrega directamente el área acumulada a la izquierda, no a la derecha.
  - El complemento permite obtener el área derecha a partir de la izquierda.
- titulo: ¿$P(X>a)$ se calcula como $1-P(X\leq a)$?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el método del complemento.
- titulo: ¿La tabla Z entrega directamente el área a la derecha de un valor?
  respuesta: 'No'
  solucion_pasos:
  - 'No, entrega el área acumulada a la izquierda; el área derecha se obtiene por complemento.'
errores_frecuentes:
- Olvidar restar de 1 y usar directamente el valor de la tabla como si fuera el área derecha.
- Confundir el complemento con simplemente cambiar el signo del resultado.
- Calcular mal el puntaje Z antes de aplicar el complemento.
- Aplicar el complemento cuando en realidad se pedía el área izquierda.
- Redondear el resultado antes de restar de 1, perdiendo precisión.
fuente: 'Elaboración propia (referencia: Moraleja 308).'
estado: publicado
