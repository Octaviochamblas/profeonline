semantic_id: MAT.EST.BINOMIAL_ANALISIS.ESPERANZA_MEDIA
titulo: Calcular la esperanza (media) de una distribución binomial
objetivo: Calcular el valor esperado (media) del número de éxitos en una distribución binomial, usando
  la fórmula E(X)=n×p.
introduccion: La esperanza indica, en promedio, cuántos éxitos se espera obtener si se repitiera muchas
  veces el experimento binomial completo.
resumen: La esperanza (media) de una variable $X\sim B(n,p)$ es $E(X)=\mu=n\times p$.
explicacion: '![Esperanza de una distribución binomial](/static/img/probabilidad/binoman/binoman-esperanza-media.svg)


  ### Definición formal


  $E(X)=n\times p$, el producto entre el número de ensayos y la probabilidad de éxito en cada uno.


  ### Desarrollo didáctico


  Si se lanza una moneda 20 veces ($n=20$, $p=0{,}5$), el número esperado de caras es $E(X)=20\times0{,}5=10$:
  en promedio, se espera obtener 10 caras.'
procedimiento:
- 'Paso 1: Identifica los valores de n (número de ensayos) y p (probabilidad de éxito).'
- 'Paso 2: Multiplica n por p para obtener E(X).'
- 'Paso 3: Interpreta el resultado como el número promedio de éxitos esperado si se repitiera el experimento
  muchas veces.'
ejemplos:
- titulo: Calcular la esperanza al lanzar una moneda 20 veces
  enunciado: n=20, p=0,5.
  solucion_pasos:
  - E(X)=20×0,5=10 caras esperadas en promedio.
- titulo: Calcular la esperanza de artículos defectuosos
  enunciado: Se revisan 50 artículos, con probabilidad de defecto p=0,04.
  solucion_pasos:
  - E(X)=50×0,04=2 artículos defectuosos esperados en promedio.
- titulo: ¿E(X) siempre es igual a n×p?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la fórmula general de la esperanza en una distribución binomial.
- titulo: ¿E(X) representa necesariamente un valor entero?
  respuesta: 'No'
  solucion_pasos:
  - No, E(X) es un promedio teórico y puede resultar en un valor decimal, aunque X en sí solo tome valores
    enteros.
errores_frecuentes:
- Olvidar multiplicar n por p, calculando solo uno de los dos valores como si fuera la esperanza.
- Pensar que E(X) debe ser siempre un número entero, cuando en realidad puede ser decimal.
- Confundir la esperanza con la probabilidad de un valor específico de X (son conceptos distintos).
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
