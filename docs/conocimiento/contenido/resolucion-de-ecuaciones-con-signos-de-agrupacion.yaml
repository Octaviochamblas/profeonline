semantic_id: MAT.ALG.RESOLUCION_LINEAL.SIGNOS_AGRUPACION
titulo: Resolución de ecuaciones con signos de agrupación
objetivo: Distribuir correctamente factores para eliminar paréntesis, corchetes y llaves antes de reducir
  una ecuación.
introduccion: A veces, las manzanas de la ecuación vienen empaquetadas en cajas (paréntesis). No puedes
  organizar tu despensa sin antes abrir las cajas. En álgebra, la 'propiedad distributiva' es el cuchillo
  para abrir esas cajas.
resumen: 'Para resolver ecuaciones con paréntesis, se debe utilizar la propiedad distributiva: el número
  o signo que está fuera del paréntesis multiplica a CADA UNO de los términos que están adentro.'
explicacion: '### Definición formal


  El factor se ''distribuye'' a cada uno de los sumandos del interior.


  ### Desarrollo didáctico


  Considera la ecuación: $2(x - 3) = 14$


  No puedes ''pasar'' el $-3$ al otro lado todavía, porque está atrapado dentro de la fortaleza del paréntesis,
  y el $2$ es el guardia en la puerta.


  Para liberar a los términos, el guardia ($2$) multiplica a todos:

  $2 \cdot (x) - 2 \cdot (3) = 14$

  $2x - 6 = 14$


  Listo. El paréntesis desapareció. Ahora es una ecuación normal y corriente.

  - Pasa el $-6$ como $+6$: $2x = 20$

  - Pasa el $2$ dividiendo: $x = 10$


  Si hubiera múltiples signos de agrupación (ej. llaves y corchetes), se destruyen de adentro hacia afuera.'
procedimiento:
- 'Paso 1: Localiza el número y signo que están inmediatamente a la izquierda del paréntesis.'
- 'Paso 2: Multiplica ese número por el primer término de adentro.'
- 'Paso 3: Multiplica ese número por el segundo término (respeta la ley de los signos).'
- 'Paso 4: Escribe la nueva ecuación sin paréntesis y procede a reducir términos semejantes.'
ejemplos:
- titulo: 'Resuelve: $3(2x + 1) = 21$'
  enunciado: 'Resuelve: $3(2x + 1) = 21$'
  solucion_pasos:
  - 'Distribuimos el 3: $3(2x) + 3(1) = 21$.'
  - $6x + 3 = 21$.
  - 'Pasamos el 3 restando: $6x = 18$.'
  - 'Dividimos por 6: $x = 3$.'
- titulo: Resuelve la ecuación $4(x - 2) = x + 7$
  solucion_pasos:
  - 'Distribuye: 4x - 8 = x + 7.'
  - 'Trae las x a un lado: 4x - x = 7 + 8.'
  - 'Reduce: 3x = 15.'
  - 'Despeja: x = 5.'
- titulo: 'Respecto de «Resolución de ecuaciones con signos de agrupación»: ¿La siguiente formulación
    e'
  enunciado: 'Respecto de «Resolución de ecuaciones con signos de agrupación»: ¿La siguiente formulación
    es correcta? «Para resolver ecuaciones con paréntesis, se debe utilizar la propiedad distributiva:
    el número o signo que está fuera del paréntesis multiplica a CADA UNO de los términos que están adentro»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para resolver ecuaciones con paréntesis, se debe
    utilizar la propiedad distributiva: el número o signo que está fuera del paréntesis multiplica a CADA
    UNO de los términos que están adentro.'
- titulo: 'Respecto de «Resolución de ecuaciones con signos de agrupación»: ¿La siguiente conclusión es'
  enunciado: 'Respecto de «Resolución de ecuaciones con signos de agrupación»: ¿La siguiente conclusión
    es correcta? «Distribuir el número solo al primer término del paréntesis y olvidar el segundo (ej:
    $2(x+3)$ -> $2x+3$). ¡Error súper común!»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para resolver ecuaciones con paréntesis, se debe
    utilizar la propiedad distributiva: el número o signo que está fuera del paréntesis multiplica a CADA
    UNO de los términos que están adentro.'
errores_frecuentes:
- 'Distribuir el número solo al primer término del paréntesis y olvidar el segundo (ej: $2(x+3)$ -> $2x+3$).
  ¡Error súper común!'
- Pasar un término que está dentro del paréntesis sumando al otro lado de la ecuación antes de eliminar
  el paréntesis.
- Para «¿Qué propiedad matemática permite 'eliminar' los paréntesis multiplicando el factor externo por
  cada término interno», la respuesta correcta es Propiedad Asociativa.
- Para «¿Qué propiedad matemática permite 'eliminar' los paréntesis multiplicando el factor externo por
  cada término interno», la respuesta correcta es Propiedad Conmutativa.
- Para «¿Qué propiedad matemática permite 'eliminar' los paréntesis multiplicando el factor externo por
  cada término interno», la respuesta correcta es Propiedad Cancelativa.
