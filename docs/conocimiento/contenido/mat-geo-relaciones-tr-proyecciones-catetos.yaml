semantic_id: MAT.GEO.RELACIONES_TR.PROYECCIONES_CATETOS
titulo: Proyección de cada cateto sobre la hipotenusa
objetivo: Identificar la proyección de cada cateto sobre la hipotenusa como el segmento entre un vértice
  y el pie de la altura.
introduccion: 'Al trazar la altura relativa a la hipotenusa, esta la divide en dos segmentos: cada uno
  de ellos es la ''sombra'' o proyección de uno de los catetos sobre la hipotenusa.'
resumen: La proyección de un cateto sobre la hipotenusa es el segmento entre el vértice correspondiente
  y el pie de la altura relativa a la hipotenusa.
explicacion: '![Proyecciones de los catetos sobre la hipotenusa](/static/img/geometria/areas-pitagoras/relaciones-tr-proyecciones-catetos.svg)


  ### Definición formal


  En un triángulo rectángulo ABC con ángulo recto en A y pie de altura H sobre BC, el segmento BH es la
  proyección del cateto AB sobre la hipotenusa, y CH es la proyección del cateto AC sobre la hipotenusa.


  ### Desarrollo didáctico


  Si imaginamos una luz perpendicular a la hipotenusa, la ''sombra'' que cada cateto proyecta sobre ella
  es exactamente BH o CH, respectivamente. Juntas, ambas proyecciones suman la hipotenusa completa: BH+CH=BC.'
procedimiento:
- 'Paso 1: Traza la altura relativa a la hipotenusa y ubica su pie H.'
- 'Paso 2: Identifica el segmento entre cada vértice de la hipotenusa y H.'
- 'Paso 3: Cada uno de esos segmentos es la proyección del cateto correspondiente.'
ejemplos:
- titulo: Identificar las proyecciones
  enunciado: En un triángulo rectángulo ABC, la altura desde A cae en H sobre BC.
  solucion_pasos:
  - BH es la proyección de AB, y CH es la proyección de AC.
- titulo: Verificar que suman la hipotenusa
  enunciado: Si BH=4 y CH=9, ¿cuánto mide la hipotenusa BC?
  solucion_pasos:
  - BC=BH+CH=4+9=13.
- titulo: ¿Las dos proyecciones suman la hipotenusa completa?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque H está sobre el segmento BC, entre B y C.
- titulo: ¿La proyección de un cateto es igual a la medida del propio cateto?
  respuesta: 'No'
  solucion_pasos:
  - No, la proyección es un segmento distinto, generalmente más corto que el cateto.
errores_frecuentes:
- Confundir la proyección de un cateto con la medida del propio cateto.
- Intercambiar cuál proyección corresponde a cuál cateto.
- Olvidar que ambas proyecciones juntas deben sumar exactamente la hipotenusa.
fuente: Elaboración propia.
estado: publicado
