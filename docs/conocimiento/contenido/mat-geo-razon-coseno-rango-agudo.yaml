semantic_id: MAT.GEO.TRIG_FUNDAMENTAL.COSENO_RANGO_AGUDO
titulo: Restricción del valor del coseno de un ángulo agudo entre 0 y 1
objetivo: Reconocer que el coseno de cualquier ángulo agudo siempre toma un valor comprendido estrictamente
  entre 0 y 1.
introduccion: El coseno de un ángulo agudo, al igual que el seno, nunca puede ser cero ni uno, y mucho
  menos negativo o mayor que uno.
resumen: Para cualquier ángulo agudo $\theta$ (con $0°<\theta<90°$), se cumple que $0<\cos\theta<1$.
explicacion: '![Rango del coseno de un ángulo agudo](/static/img/geometria/trigonometria/trig-coseno-rango-agudo.svg)


  ### Definición formal


  Como el cateto adyacente a un ángulo agudo siempre es menor que la hipotenusa (el lado más largo del
  triángulo rectángulo), la razón $\cos\theta=\dfrac{\text{cateto adyacente}}{\text{hipotenusa}}$ siempre
  resulta en un valor entre 0 y 1, sin alcanzar ninguno de esos extremos.


  ### Desarrollo didáctico


  En la figura, el cateto adyacente ($AB$) es siempre menor que la hipotenusa ($BC$). Por lo tanto, $\cos\theta=\dfrac{AB}{BC}$
  siempre da un valor menor que 1 y mayor que 0.'
procedimiento:
- 'Paso 1: Recuerda que en cualquier triángulo rectángulo, la hipotenusa es siempre el lado de mayor longitud.'
- 'Paso 2: Reconoce que el cateto adyacente a un ángulo agudo es siempre menor que esa hipotenusa.'
- 'Paso 3: Concluye que la razón (cateto adyacente)/(hipotenusa) siempre está entre 0 y 1 para ángulos
  agudos verdaderos.'
ejemplos:
- titulo: Verificar que un valor de coseno calculado es válido
  enunciado: Se calcula cosθ=0,7 para un ángulo agudo.
  solucion_pasos:
  - Es un resultado válido, ya que 0,7 está estrictamente entre 0 y 1.
- titulo: Reconocer un resultado imposible para el coseno de un ángulo agudo
  enunciado: Un estudiante calcula cosθ=-0,4 para un ángulo agudo.
  solucion_pasos:
  - Ese resultado es imposible, ya que el coseno de un ángulo agudo nunca puede ser negativo; hay un error
    en el cálculo.
- titulo: ¿El coseno de un ángulo agudo puede ser exactamente 0 o exactamente 1?
  respuesta: 'No'
  solucion_pasos:
  - No, esos valores extremos corresponden a los ángulos límite 90° y 0°, que no son estrictamente agudos.
- titulo: ¿El coseno de un ángulo agudo comparte el mismo rango que el seno?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos (seno y coseno de un ángulo agudo) están restringidos al intervalo abierto (0,1).
errores_frecuentes:
- Aceptar como válido un resultado de coseno fuera del rango (0,1).
- Creer que el coseno de un ángulo agudo puede ser negativo.
- Confundir esta restricción con la del rango de la tangente (que no tiene esta misma limitación).
fuente: 'Elaboración propia (referencia: Moraleja 175).'
estado: publicado
