semantic_id: MAT.NUM.RAICES_CONCEPTO.DEFINICION_RAIZ_ENESIMA
titulo: Definición de raíz enésima
objetivo: Interpretar y calcular una raíz enésima.
introduccion: 'Una raíz responde una pregunta inversa: ¿qué número, elevado cierto número de veces, produce
  el radicando? Leerla así evita tratar el símbolo como una división.'
resumen: \(\sqrt[n]{a}=b\) significa que \(b^n=a\). El índice indica qué potencia debe deshacerse.
explicacion: '\(\sqrt[n]{a}=b\) significa que \(b^n=a\).


  La situación “\(\sqrt[3]{64}=4\) porque \(4^3=64\)” permite comprobar, y no solo memorizar, que el índice
  indica qué potencia debe deshacerse'
procedimiento:
- 'Paso 1: Identifica el índice y el radicando.'
- 'Paso 2: Busca un número cuya potencia con ese índice reproduzca el radicando.'
- 'Paso 3: Eleva el resultado para verificar la igualdad original.'
ejemplos:
- titulo: Aplicación razonada — Definición de raíz enésima
  enunciado: \(\sqrt[3]{64}=4\) porque \(4^3=64\).
  solucion_pasos:
  - Identifica el índice y el radicando.
  - Busca un número cuya potencia con ese índice reproduzca el radicando.
  - Eleva el resultado para verificar la igualdad original.
- titulo: Revisión de una solución — Definición de raíz enésima
  enunciado: Una solución aplica “Busca un número cuya potencia con ese índice reproduzca el radicando.”,
    pero termina sin comprobar que el índice indica qué potencia debe deshacerse. Determina qué falta
    justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define definición de raíz enésima: \(\sqrt[n]{a}=b\) significa que \(b^n=a\).'
  - Identifica el índice y el radicando.
  - 'Completa la revisión con este control: Eleva el resultado para verificar la igualdad original.'
- titulo: ¿Se cumple que el índice indica qué potencia debe deshacerse? — Definición de raíz enésima
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\sqrt[n]{a}=b\) significa que \(b^n=a\).
  - El caso “\(\sqrt[3]{64}=4\) porque \(4^3=64\)” satisface esa condición.
  - Eleva el resultado para verificar la igualdad original.
- titulo: ¿Es válido omitir el paso “Identifica el índice y el radicando”? — Definición de raíz enésima
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de definición de raíz enésima.
  - 'Omitirlo puede volver inválida la acción siguiente: Busca un número cuya potencia con ese índice
    reproduzca el radicando.'
  - 'La solución debe terminar de este modo: Eleva el resultado para verificar la igualdad original.'
errores_frecuentes:
- 'Confundir definición de raíz enésima con otro concepto y omitir este inicio: Identifica el índice y
  el radicando.'
- Aplicar mecánicamente “Busca un número cuya potencia con ese índice reproduzca el radicando.” sin revisar
  las condiciones de la definición.
- Tomar “\(\sqrt[3]{64}=4\) porque \(4^3=64\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el índice indica qué potencia debe deshacerse”.
- 'Terminar el desarrollo sin realizar este control: Eleva el resultado para verificar la igualdad original.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
estado: publicado
