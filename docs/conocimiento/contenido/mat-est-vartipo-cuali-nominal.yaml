semantic_id: MAT.EST.VARIABLES_TIPOS.CUALI_NOMINAL
titulo: Clasificar variables cualitativas nominales
objetivo: Clasificar variables cualitativas nominales como aquellas cuyas categorías no tienen un orden
  o jerarquía intrínseca entre sí.
introduccion: 'Dentro de las variables cualitativas existe una subdivisión importante: algunas categorías
  tienen orden natural y otras no.'
resumen: Una variable cualitativa nominal es aquella cuyas categorías no poseen un orden natural entre
  sí; solo se pueden clasificar, no jerarquizar.
explicacion: '![Variables cualitativas nominales](/static/img/estadistica/vartipo/vartipo-cuali-nominal.svg)


  ### Definición formal


  En una variable nominal, no existe ninguna relación de orden lógica entre sus categorías: ninguna categoría
  es ''mayor'' o ''menor'' que otra.


  ### Desarrollo didáctico


  El color de ojos (azul, café, verde) es nominal: no tiene sentido decir que ''azul es mayor que café''.
  En cambio, el nivel educativo sí tiene un orden natural (no es nominal, es ordinal).'
procedimiento:
- 'Paso 1: Identifica que la variable es cualitativa (describe categorías).'
- 'Paso 2: Analiza si existe un orden lógico natural entre esas categorías.'
- 'Paso 3: Si no existe ningún orden natural, la variable es nominal.'
ejemplos:
- titulo: Clasificar el color de ojos como nominal
  enunciado: Se registra el color de ojos de un grupo de personas.
  solucion_pasos:
  - Es una variable nominal, ya que no existe un orden natural entre los colores de ojos.
- titulo: Clasificar la religión como nominal
  enunciado: Se pregunta la religión que profesa cada persona.
  solucion_pasos:
  - Es una variable nominal, ya que las religiones no tienen un orden jerárquico intrínseco.
- titulo: ¿El nivel educativo (básica, media, superior) es una variable nominal?
  respuesta: 'No'
  solucion_pasos:
  - No, es ordinal, ya que existe un orden natural de progresión entre esos niveles.
- titulo: ¿La nacionalidad de una persona es una variable nominal?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que no existe un orden jerárquico natural entre las distintas nacionalidades.
errores_frecuentes:
- Confundir variables nominales con ordinales, asignando un orden arbitrario a categorías que no lo tienen.
- Asumir que cualquier variable cualitativa es automáticamente nominal, sin verificar si existe orden
  natural.
- Asignar códigos numéricos a categorías nominales y tratarlos luego como si tuvieran orden o magnitud.
fuente: 'Elaboración propia (referencia: Moraleja 198, 350).'
estado: publicado
