semantic_id: MAT.ALG.EC_CUADR_DISCRIMINANTE.DELTA_POSITIVO
titulo: Interpretación de discriminante positivo como dos soluciones reales distintas
objetivo: Interpretar el caso $\Delta>0$ como indicador de que la ecuación cuadrática tiene dos soluciones
  reales distintas.
introduccion: Cuando el discriminante resulta positivo, la raíz cuadrada que aparece en la fórmula general
  existe y no es cero, lo que abre paso a dos resultados diferentes.
resumen: Si $\Delta=b^2-4ac>0$, la ecuación cuadrática tiene **dos soluciones reales distintas**, dadas
  por $x=\dfrac{-b\pm\sqrt{\Delta}}{2a}$.
explicacion: '### Definición formal


  Cuando $\Delta>0$, la raíz cuadrada $\sqrt{\Delta}$ es un número real positivo distinto de cero. Al
  aplicar $x=\dfrac{-b\pm\sqrt{\Delta}}{2a}$, el signo $\pm$ genera dos valores distintos, ya que se suma
  y se resta una cantidad no nula.


  ### Desarrollo didáctico


  El signo positivo del discriminante es la señal directa de que existen exactamente dos puntos donde
  la parábola asociada corta al eje $x$.


  En $x^2-5x+6=0$, $\Delta=25-24=1>0$, por lo que hay dos soluciones reales distintas: $x=\dfrac{5\pm1}{2}$,
  es decir $x=3$ y $x=2$.'
procedimiento:
- 'Paso 1: Calcula el discriminante $\Delta=b^2-4ac$.'
- 'Paso 2: Verifica que $\Delta>0$.'
- 'Paso 3: Concluye que existen dos soluciones reales distintas, sin necesidad de calcularlas aún.'
ejemplos:
- titulo: Interpretación con discriminante positivo
  enunciado: Sin resolver la ecuación, ¿cuántas soluciones reales tiene $3x^2+5x-2=0$ si $\Delta=49$?
  solucion_pasos:
  - $\Delta=49>0$.
  - Tiene dos soluciones reales distintas.
- titulo: Verificación previa a resolver
  enunciado: Verifica si $x^2+2x-8=0$ tiene dos soluciones reales distintas.
  solucion_pasos:
  - $\Delta=2^2-4(1)(-8)=4+32=36$.
  - Como $\Delta=36>0$, tiene dos soluciones reales distintas.
- titulo: ¿Cuando $\Delta>0$, las dos soluciones son siempre números opuestos?
  enunciado: ¿Cuando $\Delta>0$, las dos soluciones son siempre números opuestos?
  respuesta: 'No'
  solucion_pasos:
  - Solo son opuestas en el caso particular en que $b=0$; en general son dos valores distintos cualesquiera.
- titulo: ¿Un discriminante positivo garantiza que la parábola corta al eje $x$ en dos puntos?
  enunciado: ¿Un discriminante positivo garantiza que la parábola corta al eje $x$ en dos puntos?
  respuesta: Sí
  solucion_pasos:
  - Las dos soluciones reales corresponden exactamente a los dos puntos de intersección con el eje $x$.
errores_frecuentes:
- Concluir "dos soluciones" sin verificar realmente que $\Delta$ sea estrictamente mayor que cero.
- Confundir "dos soluciones distintas" con "dos soluciones iguales" (que corresponde a $\Delta=0$).
- Olvidar el signo $\pm$ al calcular explícitamente ambas soluciones tras confirmar $\Delta>0$.
- Asumir que ambas soluciones son siempre positivas o siempre de igual signo.
