semantic_id: MAT.EST.PROBA_COND_BASE.CONDICION_PROB_POSITIVA
titulo: Condición de probabilidad positiva del evento condicionante
objetivo: Reconocer que la probabilidad condicional P(A|B) solo está definida cuando la probabilidad del
  evento condicionante B es estrictamente mayor que 0.
introduccion: No tiene sentido condicionar sobre un evento que nunca puede ocurrir, ya que la fórmula
  de probabilidad condicional implicaría una división por cero.
resumen: La probabilidad condicional $P(A|B)$ está definida únicamente cuando $P(B)>0$; si $P(B)=0$, la
  expresión no tiene sentido matemático.
explicacion: '![Condición de probabilidad positiva](/static/img/probabilidad/condbase/condbase-condicion-prob-positiva.svg)


  ### Definición formal


  Como $P(A|B)=\dfrac{P(A\cap B)}{P(B)}$, esta expresión requiere $P(B)\neq0$ (y, dado que las probabilidades
  no son negativas, equivalentemente $P(B)>0$) para estar bien definida.


  ### Desarrollo didáctico


  No tiene sentido preguntar ''dado que el dado mostró un 7, ¿cuál es la probabilidad de que sea par?'',
  ya que P(mostrar un 7)=0 en un dado normal: la condición nunca puede cumplirse.'
procedimiento:
- 'Paso 1: Antes de aplicar la fórmula de probabilidad condicional, verifica que el evento condicionante
  B tenga probabilidad positiva.'
- 'Paso 2: Si P(B)=0, reconoce que la probabilidad condicional no está definida en ese caso.'
- 'Paso 3: Si P(B)>0, procede normalmente a calcular P(A|B) con la fórmula estándar.'
ejemplos:
- titulo: Reconocer un caso donde la condición no está definida
  enunciado: P(obtener un 7 al lanzar un dado)=0.
  solucion_pasos:
  - No se puede calcular ninguna probabilidad condicional sobre este evento, ya que su probabilidad es
    0.
- titulo: Verificar que una condición es válida
  enunciado: P(número par)=0,5.
  solucion_pasos:
  - Como P(par)=0,5>0, es válido calcular probabilidades condicionadas a este evento.
- titulo: ¿Se puede calcular P(A|B) si P(B)=0?
  respuesta: 'No'
  solucion_pasos:
  - No, la fórmula implicaría una división por cero, matemáticamente indefinida.
- titulo: ¿Esta condición aplica también al evento condicionado A, no solo al condicionante B?
  respuesta: 'No'
  solucion_pasos:
  - No, la restricción de probabilidad positiva se aplica específicamente al evento condicionante B, que
    aparece en el denominador.
errores_frecuentes:
- Intentar aplicar la fórmula de probabilidad condicional a un evento condicionante con probabilidad 0.
- Confundir esta restricción, aplicándola al evento de interés A en vez de al condicionante B.
- No verificar esta condición antes de plantear un problema de probabilidad condicional.
fuente: Elaboración propia.
estado: publicado
