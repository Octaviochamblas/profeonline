semantic_id: MAT.GEO.ISOMETRIA_TRASLACION.TRASLACION_FIGURAS
titulo: Procedimiento de traslación de figuras en el plano
objetivo: Aplicar el procedimiento para trasladar una figura completa, trasladando cada uno de sus vértices
  con el mismo vector traslación.
introduccion: Trasladar una figura completa es simplemente trasladar cada uno de sus vértices por separado,
  todos con el mismo vector.
resumen: Para trasladar una figura (como un polígono) mediante un vector $\vec{v}=(a,b)$, se traslada
  cada uno de sus vértices individualmente usando ese mismo vector, y luego se conectan los vértices imagen
  en el mismo orden.
explicacion: '![Procedimiento de traslación de figuras](/static/img/geometria/isometrias/traslacion-figuras.svg)


  ### Definición formal


  Para trasladar un polígono con vértices $P_1,P_2,\ldots,P_n$ mediante un vector $\vec{v}=(a,b)$, se
  calcula la imagen $P_i''(x_i+a,\,y_i+b)$ de cada vértice, y se conectan los vértices imagen respetando
  el mismo orden que en la figura original.


  ### Desarrollo didáctico


  En la figura, el triángulo original y su imagen están unidos por segmentos paralelos (líneas punteadas),
  todos con la misma longitud y dirección, ya que cada vértice se trasladó con el mismo vector.'
procedimiento:
- 'Paso 1: Identifica las coordenadas de todos los vértices de la figura original.'
- 'Paso 2: Aplica el vector traslación a cada vértice por separado, sumando sus componentes.'
- 'Paso 3: Conecta los vértices imagen en el mismo orden que en la figura original, obteniendo la figura
  trasladada completa.'
ejemplos:
- titulo: Trasladar un triángulo completo
  enunciado: Un triángulo con vértices A(-4,-3), B(-2,-3), C(-3,-1) se traslada con v=(5,4).
  solucion_pasos:
  - A'=(1,1), B'=(3,1), C'=(2,3); se conectan estos tres puntos en el mismo orden (A'B'C') para formar
    la figura imagen.
- titulo: Verificar que la figura trasladada es congruente con la original
  enunciado: Se comparan los lados del triángulo original y el trasladado.
  solucion_pasos:
  - Ambos triángulos tienen exactamente los mismos lados y ángulos, confirmando que son congruentes.
- titulo: ¿Se debe trasladar cada vértice con el mismo vector?
  respuesta: Sí
  solucion_pasos:
  - Sí, usar el mismo vector para todos los vértices es lo que garantiza que la figura no se deforme.
- titulo: ¿El orden de los vértices debe respetarse al conectar la figura imagen?
  respuesta: Sí
  solucion_pasos:
  - Sí, se deben conectar en el mismo orden que en la figura original para obtener una figura congruente
    correcta.
errores_frecuentes:
- Usar vectores distintos para trasladar diferentes vértices de la misma figura.
- Conectar los vértices imagen en un orden distinto al de la figura original, generando una figura incorrecta.
- Cometer errores aritméticos al sumar las componentes del vector a cada vértice individualmente.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 126, Cid 73).'
estado: publicado
