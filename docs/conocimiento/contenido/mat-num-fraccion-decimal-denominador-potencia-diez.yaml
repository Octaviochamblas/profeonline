semantic_id: MAT.NUM.FRACCION_DECIMAL.DENOMINADOR_POTENCIA_DIEZ
titulo: Conversión de fracción con denominador potencia de diez
objetivo: Convertir directamente a decimal una fracción cuyo denominador es una potencia de 10.
introduccion: 'Cuando el denominador de una fracción ya es 10, 100, 1000, etc., no es necesario dividir:
  basta con desplazar la coma decimal según la cantidad de ceros del denominador.'
resumen: Si el denominador de una fracción es una potencia de 10 (\(10^n\)), su valor decimal se obtiene
  ubicando la coma \(n\) lugares desde la derecha del numerador.
explicacion: '### Definición formal


  \(\frac{a}{10^n}\) equivale a desplazar la coma decimal de \(a\) exactamente \(n\) posiciones hacia
  la izquierda, porque dividir por \(10^n\) reduce el valor posicional de cada cifra en \(n\) lugares.


  ### Desarrollo didáctico


  \(\frac{47}{100}\): como \(100=10^2\), se desplaza la coma 2 lugares desde la derecha de 47, obteniendo
  \(0.47\).'
procedimiento:
- 'Paso 1: Simplifica la fracción y factoriza su denominador.'
- 'Paso 2: Busca el factor que completa \(10\), \(100\), \(1000\) u otra potencia de diez.'
- 'Paso 3: Amplifica numerador y denominador por el mismo factor y lee el decimal resultante.'
ejemplos:
- titulo: Aplicación razonada — Conversión de fracción decimal a número decimal
  enunciado: \(\frac{47}{100}=0.47\).
  solucion_pasos:
  - Simplifica la fracción y factoriza su denominador.
  - Busca el factor que completa \(10\), \(100\), \(1000\) u otra potencia de diez.
  - Amplifica numerador y denominador por el mismo factor y lee el decimal resultante.
- titulo: Revisión de una solución — Conversión de fracción decimal a número decimal
  enunciado: Una solución aplica “Busca el factor que completa \(10\), \(100\), \(1000\) u otra potencia
    de diez.”, pero termina sin comprobar que los denominadores 10, 100 y 1000 facilitan la lectura decimal.
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conversión de fracción decimal a número decimal: si una fracción
    tiene denominador potencia de 10, su forma decimal se lee directamente por valor posicional.'
  - Simplifica la fracción y factoriza su denominador.
  - 'Completa la revisión con este control: Amplifica numerador y denominador por el mismo factor y lee
    el decimal resultante.'
- titulo: ¿Se cumple que los denominadores 10, 100 y 1000 facilitan la lectura decimal? — Conversión de
    fracción decimal a número decimal
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que si una fracción tiene denominador potencia de 10, su forma
    decimal se lee directamente por valor posicional.
  - El caso “\(\frac{47}{100}=0.47\)” satisface esa condición.
  - Amplifica numerador y denominador por el mismo factor y lee el decimal resultante.
- titulo: ¿Es válido omitir el paso “Simplifica la fracción y factoriza su denominador”? — Conversión
    de fracción decimal a número decimal
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conversión de fracción decimal a número decimal.
  - 'Omitirlo puede volver inválida la acción siguiente: Busca el factor que completa \(10\), \(100\),
    \(1000\) u otra potencia de diez.'
  - 'La solución debe terminar de este modo: Amplifica numerador y denominador por el mismo factor y lee
    el decimal resultante.'
errores_frecuentes:
- 'Empezar conversión de fracción decimal a número decimal sin realizar este control inicial: Simplifica
  la fracción y factoriza su denominador.'
- Memorizar “\(\frac{47}{100}=0.47\)” como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Busca el factor que completa \(10\), \(100\), \(1000\) u otra potencia
  de diez.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre conversión de fracción decimal a número decimal que contradice el
  criterio “Los denominadores 10, 100 y 1000 facilitan la lectura decimal”.
- 'Cerrar el ejercicio sin esta comprobación específica: Amplifica numerador y denominador por el mismo
  factor y lee el decimal resultante.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
