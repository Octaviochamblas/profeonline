semantic_id: MAT.GEO.ANGULOS_FUNDAMENTOS.ELEMENTO_VERTICE
titulo: Identificación del vértice de un ángulo
objetivo: Identificar el vértice de un ángulo a partir del dibujo o de su nombre y comprobar que en la
  notación de tres puntos, el vértice siempre queda escrito al centro.
introduccion: En una esquina de la sala, el lugar importante no es cualquier punto del borde, sino justo
  el punto donde cambian de dirección las dos paredes. Para resolver situaciones de identificación del
  vértice de un ángulo conviene mirar el dibujo con método, no solo por intuición.
resumen: El vértice es el punto común desde el cual nacen los dos rayos de un ángulo. Como idea de control,
  en la notación de tres puntos, el vértice siempre queda escrito al centro.
explicacion: 'El vértice es el punto común desde el cual nacen los dos rayos de un ángulo.


  La situación “en \(\angle ABC\), los rayos \(BA\) y \(BC\) salen del punto \(B\)” muestra cómo pasar
  del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se verifica que
  en la notación de tres puntos, el vértice siempre queda escrito al centro.'
procedimiento:
- 'Paso 1: Busca el punto desde donde parten ambos rayos.'
- 'Paso 2: Si el ángulo está nombrado con tres letras, ubica la letra central.'
- 'Paso 3: Verifica que el punto elegido sea común a los dos lados del ángulo.'
ejemplos:
- titulo: Situación geométrica — Vértice del ángulo
  enunciado: En \(\angle ABC\), los rayos \(BA\) y \(BC\) salen del punto \(B\).
  solucion_pasos:
  - Busca el punto desde donde parten ambos rayos.
  - Si el ángulo está nombrado con tres letras, ubica la letra central.
  - Verifica que el punto elegido sea común a los dos lados del ángulo.
- titulo: Revisión del razonamiento — Vértice del ángulo
  enunciado: En la situación “en \(\angle ABC\), los rayos \(BA\) y \(BC\) salen del punto \(B\)”, un
    compañero llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye la justificación
    completa.
  solucion_pasos:
  - 'Parte de la definición: el vértice es el punto común desde el cual nacen los dos rayos de un ángulo.'
  - Si el ángulo está nombrado con tres letras, ubica la letra central.
  - Verifica que el punto elegido sea común a los dos lados del ángulo.
- titulo: ¿La situación respeta la idea clave del recurso? — Vértice del ángulo
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: el vértice es el punto común desde el cual
    nacen los dos rayos de un ángulo.'
  - En el caso “en \(\angle ABC\), los rayos \(BA\) y \(BC\) salen del punto \(B\)” se observa que en
    la notación de tres puntos, el vértice siempre queda escrito al centro.
  - Verifica que el punto elegido sea común a los dos lados del ángulo.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Vértice del ángulo
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de identificación del vértice de un ángulo.
  - Después del paso “Busca el punto desde donde parten ambos rayos.” todavía hace falta revisar “Si el
    ángulo está nombrado con tres letras, ubica la letra central.”.
  - El cierre correcto exige “Verifica que el punto elegido sea común a los dos lados del ángulo.”.
errores_frecuentes:
- Vértice del ángulo significa el primer punto que aparece escrito al nombrar el ángulo.
- Para resolver vértice del ángulo, basta con el paso “Busca el punto desde donde parten ambos rayos.”
  y no hace falta revisar “Si el ángulo está nombrado con tres letras, ubica la letra central.”.
- Si el dibujo parece claro, se puede ignorar que en la notación de tres puntos, el vértice siempre queda
  escrito al centro.
- Dos configuraciones distintas representan vértice del ángulo solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Verifica que el punto elegido sea común a
  los dos lados del ángulo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
