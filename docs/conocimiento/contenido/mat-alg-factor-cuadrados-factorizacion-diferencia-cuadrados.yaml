semantic_id: MAT.ALG.FACTOR_CUADRADOS.FACTORIZACION_DIFERENCIA_CUADRADOS
titulo: Casos especiales de Diferencia de Cuadrados
objetivo: Aplicar el teorema de diferencia de cuadrados cuando uno o ambos términos son polinomios encapsulados
  en paréntesis.
introduccion: ¿Qué sucede si en lugar de tener letras sueltas como 'x' o 'y', tienes paréntesis enteros elevados
  al cuadrado? El mismo truco funciona a una escala mayor. Las matemáticas no discriminan tamaños, aplican sus reglas
  universales.
resumen: La diferencia de cuadrados es aplicable a polinomios. $(a+b)^2 - (c-d)^2$ se resuelve extrayendo las raíces
  (que son los polinomios enteros) y multiplicando su suma por su resta, usando corchetes para mantener el orden.
explicacion: '### Definición formal


  El signo negativo afecta a todo el bloque B, invirtiendo sus signos internos.


  ### Desarrollo didáctico


  Imagina la expresión $(x+y)^2 - a^2$.


  Sigue siendo una diferencia de cuadrados:

  1. Tenemos dos términos (el bloque paréntesis y la letra ''a'').

  2. Se están restando.

  3. Ambos están al cuadrado.


  La raíz del primero es todo el bloque $(x+y)$. La raíz del segundo es $a$.


  Aplicamos la regla de (suma) por (resta):

  $[ (x+y) + a ] \cdot [ (x+y) - a ]$


  Ahora, quitamos los paréntesis internos (con cuidado de aplicar bien los signos negativos, si los hay):

  $(x + y + a)(x + y - a)$.

  Ya factorizamos un caso especial. El gran cuidado debe tenerse cuando el término restado es un paréntesis, pues
  el signo negativo de la "resta de las raíces" le cambiará los signos internos a ese paréntesis.'
procedimiento:
- 'Paso 1: Trata cada paréntesis al cuadrado como si fuera una sola variable gigante.'
- 'Paso 2: Extrae las raíces (simplemente quítales el cuadrado a los paréntesis).'
- 'Paso 3: Abre dos corchetes, uno para la SUMA de las raíces y otro para la RESTA de las raíces.'
- 'Paso 4: En el corchete de la resta, asegúrate de distribuir el signo negativo a todos los elementos de la segunda
  raíz.'
- 'Paso 5: Reduce términos semejantes dentro de cada corchete si es posible.'
ejemplos:
- titulo: Factoriza $(a+1)^2 - (a-2)^2$
  enunciado: Factoriza $(a+1)^2 - (a-2)^2$.
  solucion_pasos:
  - 'Raíces: $(a+1)$ y $(a-2)$.'
  - 'Corchete Suma: $[(a+1) + (a-2)] = [2a - 1]$.'
  - 'Corchete Resta: $[(a+1) - (a-2)] = [a + 1 - a + 2] = [3]$.'
  - 'Resultado final: $(2a - 1)(3) = 3(2a - 1)$.'
- titulo: Factoriza $16 - (m+n)^2$.
  solucion_pasos:
  - 'Raíces: 4 y (m+n). En la suma queda (4 + m + n). En la resta, el menos afecta a la m y la n, quedando (4 -
    m - n).'
- titulo: 'Respecto de «Factorización de una diferencia de cuadrados perfectos»: ¿La siguiente formulac'
  enunciado: 'Respecto de «Factorización de una diferencia de cuadrados perfectos»: ¿La siguiente formulación es
    correcta? «La diferencia de cuadrados es aplicable a polinomios»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La diferencia de cuadrados es aplicable a polinomios.'
- titulo: 'Respecto de «Factorización de una diferencia de cuadrados perfectos»: ¿La siguiente conclusi'
  enunciado: 'Respecto de «Factorización de una diferencia de cuadrados perfectos»: ¿La siguiente conclusión es
    correcta? «En el corchete de la resta, no distribuir el signo negativo al segundo bloque. (Ej: Hacer $(x) -
    (a+b)$ y escribir $(x - a + b)$ en lugar del correcto $(x - a - b)$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La diferencia de cuadrados es aplicable a polinomios.'
errores_frecuentes:
- 'En el corchete de la resta, no distribuir el signo negativo al segundo bloque. (Ej: Hacer $(x) - (a+b)$ y escribir
  $(x - a + b)$ en lugar del correcto $(x - a - b)$).'
