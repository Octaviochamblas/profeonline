semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.COTANGENTE_RECIPROCA
titulo: Definición de cotangente como recíproca de la tangente
objetivo: Definir la cotangente de un ángulo x como el recíproco (inverso multiplicativo) de la tangente
  de ese mismo ángulo.
introduccion: 'La cotangente es una de las razones trigonométricas recíprocas, y se relaciona con la tangente
  de la misma forma en que el coseno se relaciona con la secante: invirtiendo la fracción.'
resumen: Para cualquier ángulo $x$ con $\tan x\neq0$, se cumple la identidad $\cot x=\dfrac{1}{\tan x}=\dfrac{\cos
  x}{\sin x}$.
explicacion: '![Cotangente como recíproca de la tangente](/static/img/geometria/trigonometria/trigid-cotangente-reciproca.svg)


  ### Definición formal


  Como $\tan x=\dfrac{\sin x}{\cos x}$, su recíproco es $\cot x=\dfrac{1}{\tan x}=\dfrac{\cos x}{\sin
  x}$, definido para todo $x$ con $\sin x\neq0$.


  ### Desarrollo didáctico


  Si $\tan x=0{,}75$, entonces $\cot x=\dfrac{1}{0{,}75}\approx1{,}33$. Esta relación recíproca es útil
  para pasar de una razón a la otra sin recalcular desde seno y coseno.'
procedimiento:
- 'Paso 1: Calcula (o identifica) el valor de tanx del ángulo dado.'
- 'Paso 2: Calcula cotx como el recíproco de tanx (1 dividido por tanx).'
- 'Paso 3: Verifica que cotx no esté definida cuando sinx=0 (ángulos de 0° y 180°).'
ejemplos:
- titulo: Calcular la cotangente a partir de la tangente
  enunciado: tanx=0,75.
  solucion_pasos:
  - cotx=1/0,75≈1,33.
- titulo: Calcular la cotangente a partir de seno y coseno
  enunciado: sinx=0,6, cosx=0,8.
  solucion_pasos:
  - cotx=cosx/sinx=0,8/0,6≈1,33, coincidiendo con el recíproco de tanx=0,75.
- titulo: ¿La cotangente es el recíproco de la tangente?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición cotx=1/tanx.
- titulo: ¿La cotangente está definida cuando sinx=0?
  respuesta: 'No'
  solucion_pasos:
  - No, en esos ángulos (0°, 180°) la cotangente no está definida, ya que se dividiría por cero.
errores_frecuentes:
- Confundir la cotangente con la tangente misma, sin invertir el cociente.
- Olvidar que la cotangente no está definida cuando sinx=0.
- Calcular cotx como sinx/cosx en vez de cosx/sinx.
fuente: 'Elaboración propia (referencia: Moraleja 178).'
estado: publicado
