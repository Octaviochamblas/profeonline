semantic_id: MAT.EST.REGLA_BAYES.PRIORI
titulo: Interpretación de probabilidad a priori en contextos de decisión
objetivo: Interpretar la probabilidad a priori como el conocimiento inicial sobre un evento, antes de
  incorporar cualquier información adicional u observación.
introduccion: Antes de observar cualquier evidencia (como el resultado de una prueba), ya se cuenta con
  un conocimiento inicial (a menudo basado en estadísticas generales) sobre la probabilidad de un evento.
resumen: La probabilidad a priori de un evento $A$, denotada $P(A)$, es la probabilidad conocida o asumida
  antes de incorporar cualquier información adicional (evidencia).
explicacion: '![Probabilidad a priori](/static/img/probabilidad/bayes/bayes-priori.svg)


  ### Definición formal


  En el contexto de la regla de Bayes, $P(A)$ representa el conocimiento inicial (a priori) sobre el evento
  $A$, previo a observar la evidencia $B$.


  ### Desarrollo didáctico


  Si se sabe que el 5% de la población tiene cierta enfermedad (dato general, sin ninguna prueba realizada
  a un individuo específico), esa tasa poblacional P(enfermedad)=0,05 es la probabilidad a priori.'
procedimiento:
- 'Paso 1: Identifica el evento cuya probabilidad se conoce antes de cualquier evidencia adicional.'
- 'Paso 2: Reconoce que ese valor (generalmente una tasa general o poblacional) es la probabilidad a priori.'
- 'Paso 3: Usa ese valor como punto de partida antes de aplicar la regla de Bayes con nueva evidencia.'
ejemplos:
- titulo: Identificar la probabilidad a priori en un contexto médico
  enunciado: El 5% de la población tiene cierta enfermedad.
  solucion_pasos:
  - P(enfermedad)=0,05 es la probabilidad a priori, antes de considerar cualquier resultado de prueba
    específico.
- titulo: Identificar la probabilidad a priori en control de calidad
  enunciado: El 3% de todos los productos fabricados son defectuosos, en general.
  solucion_pasos:
  - P(defectuoso)=0,03 es la probabilidad a priori, antes de inspeccionar un producto en particular.
- titulo: ¿La probabilidad a priori se conoce antes de observar cualquier evidencia adicional?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente su definición.
- titulo: ¿La probabilidad a priori suele basarse en estadísticas generales o históricas?
  respuesta: Sí
  solucion_pasos:
  - Sí, típicamente proviene de estudios previos, censos o tasas poblacionales conocidas.
errores_frecuentes:
- Confundir la probabilidad a priori con la probabilidad a posteriori (calculada después de la evidencia).
- Usar un valor incorrecto o desactualizado como probabilidad a priori, afectando todo el cálculo bayesiano
  posterior.
- Olvidar que la probabilidad a priori es el punto de partida, no el resultado final del análisis.
fuente: Elaboración propia.
estado: publicado
