semantic_id: 'MAT.ALG.SISTEMAS_2X2.VERIFICACION_SOLUCION'
titulo: 'Verificación del Par Ordenado'
objetivo: 'Comprobar que la solución encontrada satisface ambas ecuaciones simultáneamente.'
introduccion: |
  Una trampa común es encontrar el valor de 'x' e 'y', reemplazarlo en la primera ecuación para ver si cuadra, y seguir de largo.
resumen: |
  Para que el par ordenado $(x, y)$ sea el par ordenado válido del sistema, debe ser capaz de reemplazar las letras en AMBAS ecuaciones y mantener la igualdad perfecta en las dos. Si falla en una, el resultado está malo.
explicacion: |
  ¡Falso sentido de seguridad! Es posible equivocarse en el desarrollo, que los números cuadren por casualidad en la primera ecuación, pero que fallen horriblemente en la segunda.
procedimiento:
  - 'Paso 1: Toma tus valores finales obtenidos para ''x'' e ''y''.'
  - 'Paso 2: Reemplázalos en la Ecuación 1 y verifica que el lado izquierdo sea igual al derecho.'
  - 'Paso 3: Reemplázalos en la Ecuación 2 y verifica la igualdad.'
  - 'Paso 4: Solo si ambas igualdades son ciertas, el par es la solución oficial.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
