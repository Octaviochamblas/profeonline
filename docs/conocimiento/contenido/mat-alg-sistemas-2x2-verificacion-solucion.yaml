semantic_id: MAT.ALG.SISTEMAS_2X2.VERIFICACION_SOLUCION
titulo: Verificación del Par Ordenado
objetivo: Comprobar que la solución encontrada satisface ambas ecuaciones simultáneamente.
explicacion: |
  Una trampa común es encontrar el valor de 'x' e 'y', reemplazarlo en la primera ecuación para ver si cuadra, y seguir de largo.

  ¡Falso sentido de seguridad! Es posible equivocarse en el desarrollo, que los números cuadren por casualidad en la primera ecuación, pero que fallen horriblemente en la segunda.

  Para que el par ordenado $(x, y)$ sea el rey legítimo del sistema, debe ser capaz de reemplazar las letras en AMBAS ecuaciones y mantener la igualdad perfecta en las dos. Si falla en una, el resultado está malo.
procedimiento: |
  1. Toma tus valores finales obtenidos para 'x' e 'y'.
  2. Reemplázalos en la Ecuación 1 y verifica que el lado izquierdo sea igual al derecho.
  3. Reemplázalos en la Ecuación 2 y verifica la igualdad.
  4. Solo si ambas igualdades son ciertas, el par es la solución oficial.
