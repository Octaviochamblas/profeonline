semantic_id: MAT.ALG.FUNCION_EVALUACION.EVALUACION_DESDE_GRAFICO
titulo: Evaluación de una función dada por gráfico
objetivo: Determinar el valor de una función en un punto específico a partir de la lectura de su gráfico.
introduccion: Cuando solo tienes el dibujo de la curva, evaluar se convierte en un ejercicio visual, un
  poco de geometría con regla imaginaria.
resumen: Evaluar una función dada por su gráfico consiste en ubicar el valor de $x$ sobre el eje horizontal,
  trazar una línea vertical hasta la curva, y leer la altura correspondiente (el valor de $y$) en el eje
  vertical.
explicacion: '### Definición formal


  Dado el gráfico de una función $f$, evaluar $f(a)$ consiste en identificar el punto $(a, f(a))$ sobre
  la curva cuya primera coordenada es $a$, y leer su segunda coordenada como el valor de la función en
  ese punto.


  ### Desarrollo didáctico


  El procedimiento visual es trazar una recta vertical desde $x=a$ en el eje horizontal hasta que corte
  la curva, y desde ese punto de corte trazar una recta horizontal hasta el eje vertical para leer el
  valor de $y$.


  Si la curva pasa por el punto $(3, 7)$, entonces $f(3) = 7$: basta leer directamente la altura de la
  curva en $x=3$.'
procedimiento:
- 'Paso 1: Ubica el valor de $x$ solicitado sobre el eje horizontal.'
- 'Paso 2: Traza (mentalmente o en el papel) una línea vertical desde ese punto hasta que corte la curva.'
- 'Paso 3: Desde el punto de corte, traza una línea horizontal hasta el eje vertical.'
- 'Paso 4: Lee el valor donde esa línea corta el eje vertical; ese es $f(x)$.'
ejemplos:
- titulo: Lectura directa de un punto en la curva
  enunciado: Si la gráfica de $f$ pasa por el punto $(2, 6)$, determina $f(2)$.
  solucion_pasos:
  - El punto $(2,6)$ indica directamente que la imagen de x=2 es 6.
  - $f(2) = 6$.
- titulo: Lectura en un vértice
  enunciado: Si el vértice de una parábola graficada está en $(0, -4)$, determina $f(0)$.
  solucion_pasos:
  - El vértice es un punto de la curva, con coordenadas $(0,-4)$.
  - $f(0) = -4$.
- titulo: ¿Se puede evaluar $f(a)$ si el gráfico tiene un punto abierto (hueco) en $x=a$?
  enunciado: ¿Se puede evaluar $f(a)$ si el gráfico tiene un punto abierto (hueco) en $x=a$?
  respuesta: 'No'
  solucion_pasos:
  - Un punto abierto indica que ese valor de x no pertenece al dominio de la función; no tiene imagen
    definida.
- titulo: ¿La evaluación gráfica requiere trazar una línea vertical desde el eje $x$?
  enunciado: ¿La evaluación gráfica requiere trazar una línea vertical desde el eje $x$?
  respuesta: Sí
  solucion_pasos:
  - Esa línea vertical localiza el punto de la curva correspondiente al valor buscado.
errores_frecuentes:
- Trazar una línea horizontal en vez de vertical al buscar la imagen de un valor de $x$.
- Confundir la lectura de la imagen con la lectura de la preimagen (que requiere el proceso inverso).
- Ignorar puntos abiertos o discontinuidades del gráfico al evaluar.
- Leer coordenadas aproximadas sin verificar la escala de los ejes.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
