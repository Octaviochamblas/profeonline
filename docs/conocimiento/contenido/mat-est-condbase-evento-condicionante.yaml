semantic_id: MAT.EST.PROBA_COND_BASE.EVENTO_CONDICIONANTE
titulo: Identificación del evento condicionante en problemas de texto
objetivo: Identificar en un problema descrito en palabras cuál es el evento condicionante, es decir, la
  información que ya se sabe que ocurrió.
introduccion: En un problema de probabilidad condicional planteado en palabras, es esencial reconocer
  cuál dato es la condición ya conocida y cuál es lo que se quiere calcular.
resumen: El evento condicionante es aquel del cual ya se conoce o asume su ocurrencia, y que restringe
  el espacio muestral para el cálculo de la probabilidad de otro evento.
explicacion: '![Identificación del evento condicionante](/static/img/probabilidad/condbase/condbase-evento-condicionante.svg)


  ### Definición formal


  En un problema de probabilidad condicional, el evento condicionante suele identificarse por frases como
  ''dado que'', ''sabiendo que'', ''si se sabe que'', que anteceden a la información ya conocida.


  ### Desarrollo didáctico


  En el enunciado ''si se sabe que el número obtenido al lanzar un dado es mayor que 3, ¿cuál es la probabilidad
  de que sea par?'', el evento condicionante es ''mayor que 3'', identificado por la frase ''si se sabe
  que''.'
procedimiento:
- 'Paso 1: Busca en el enunciado frases como ''dado que'', ''sabiendo que'' o ''si se sabe que''.'
- 'Paso 2: El evento descrito inmediatamente después de esa frase es el evento condicionante.'
- 'Paso 3: Ese evento se ubicará a la derecha de la barra vertical en la notación P(A|B).'
ejemplos:
- titulo: Identificar el evento condicionante en un problema de dado
  enunciado: '''Si se sabe que el resultado es mayor que 3, ¿cuál es la probabilidad de que sea par?'''
  solucion_pasos:
  - El evento condicionante es 'mayor que 3'.
- titulo: Identificar el evento condicionante en un problema de cartas
  enunciado: '''Sabiendo que la carta extraída es una figura, ¿cuál es la probabilidad de que sea de corazones?'''
  solucion_pasos:
  - El evento condicionante es 'ser una figura'.
- titulo: ¿El evento condicionante siempre aparece antes en la lectura del problema?
  respuesta: 'No'
  solucion_pasos:
  - No, puede aparecer en cualquier parte del enunciado; lo importante es identificar cuál información
    ya se conoce como cierta.
- titulo: ¿El evento condicionante se identifica mediante frases como 'dado que' o 'sabiendo que'?
  respuesta: Sí
  solucion_pasos:
  - Sí, esas frases son señales lingüísticas típicas del evento condicionante.
errores_frecuentes:
- Confundir el evento condicionante con el evento de interés (lo que se pregunta).
- No identificar correctamente las frases clave que señalan la condición en el enunciado.
- Asumir como condicionante un evento que en realidad es el que se quiere calcular.
fuente: Elaboración propia.
estado: publicado
