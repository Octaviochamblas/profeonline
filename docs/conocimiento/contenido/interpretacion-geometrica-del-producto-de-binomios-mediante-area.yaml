  enunciado: 'Un modelo de ĂĄrea de $2 \times 2$ tiene como suma de celdas $x^2 + px + q$. Si la suma de
    las ĂĄreas de las dos celdas de la diagonal principal (sup-izq e inf-der) es $x^2 + 12$, y la suma
    de la diagonal secundaria es $7x$, halla $p+q$.


    Opciones: A) $19$ Âˇ B) $7$ Âˇ C) $12$ Âˇ D) $5$'
  solucion_pasos:
