- titulo: En un diagrama de ĂĄrea para $(kx - 1)(x + k)$, una celda interior es $4x^2$. ÂżCuĂĄl es el ĂĄre
  enunciado: 'En un diagrama de ĂĄrea para $(kx - 1)(x + k)$, una celda interior es $4x^2$. ÂżCuĂĄl es el
    ĂĄrea total del rectĂĄngulo asumiendo $k>0$?


    Opciones: A) $4x^2 + 15x - 4$ Âˇ B) $4x^2 + 16x - 4$ Âˇ C) $4x^2 + 17x - 4$ Âˇ D) $4x^2 - 15x - 4$'
  solucion_pasos:
  - $kx \cdot x = 4x^2 \Rightarrow k=4$. Entonces $(4x-1)(x+4) = 4x^2 + 16x - x - 4 = 4x^2 + 15x - 4$.
  - 'Respuesta: $4x^2 + 15x - 4$'
