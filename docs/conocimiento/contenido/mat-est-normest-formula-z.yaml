semantic_id: MAT.EST.NORMAL_ESTANDAR.FORMULA_Z
titulo: Aplicar la fórmula de estandarización mediante puntaje Z
objetivo: Aplicar la fórmula de estandarización para transformar un valor de una distribución normal cualquiera en un
  puntaje Z.
introduccion: Estandarizar un dato es como "traducirlo" a un idioma común, el de la normal estándar, para poder
  compararlo con cualquier otro dato sin importar la escala original.
resumen: La fórmula de estandarización transforma un valor $x$ en un puntaje $Z$ mediante $Z=\dfrac{x-\mu}{\sigma}$,
  usando la media y la desviación estándar de la distribución original.
explicacion: '![Fórmula de estandarización Z](/static/img/estadistica/normest/normest-formula-z.svg)


  ### Definición formal


  La fórmula de estandarización es $Z=\dfrac{x-\mu}{\sigma}$, donde $x$ es el valor original, $\mu$ es la media y

  $\sigma$ es la desviación estándar de la distribución de origen.


  ### Desarrollo didáctico


  Esta transformación traslada cualquier valor $x$ a la escala de la normal estándar, permitiendo usar una única

  tabla (la tabla Z) para calcular probabilidades de cualquier distribución normal.'
procedimiento:
- 'Paso 1: Identifica el valor $x$, la media $\mu$ y la desviación estándar $\sigma$ de la distribución original.'
- 'Paso 2: Calcula la diferencia $x-\mu$.'
- 'Paso 3: Divide esa diferencia por $\sigma$ para obtener el puntaje $Z$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $x=180$, $\mu=170$ y $\sigma=10$, calcula el puntaje $Z$.
  solucion_pasos:
  - $Z=\dfrac{180-170}{10}=\dfrac{10}{10}$.
  - $Z=1$.
- titulo: Ejemplo 2
  enunciado: Si $x=150$, $\mu=170$ y $\sigma=10$, calcula el puntaje $Z$.
  solucion_pasos:
  - $Z=\dfrac{150-170}{10}=\dfrac{-20}{10}$.
  - $Z=-2$.
- titulo: ¿La fórmula de estandarización resta la media al valor original antes de dividir?
  respuesta: Sí
  solucion_pasos:
  - Sí, primero se calcula $x-\mu$ y luego se divide por $\sigma$.
- titulo: ¿Un puntaje $Z$ negativo indica que el dato está sobre la media?
  respuesta: 'No'
  solucion_pasos:
  - 'No, un puntaje $Z$ negativo indica que el dato está por debajo de la media original.'
errores_frecuentes:
- Invertir la resta y calcular $\mu-x$ en vez de $x-\mu$.
- Olvidar dividir por $\sigma$ después de calcular la diferencia.
- Confundir el signo del resultado, interpretando mal si el dato está sobre o bajo la media.
- Usar la media o desviación estándar de un conjunto distinto al del valor $x$.
- Redondear demasiado pronto el resultado del puntaje $Z$, afectando cálculos posteriores.
fuente: 'Elaboración propia (referencia: Moraleja 307).'
estado: publicado
