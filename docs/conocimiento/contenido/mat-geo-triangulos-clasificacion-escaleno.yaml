semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.ESCALENO
titulo: Triángulo escaleno como triángulo de tres lados de distinta medida
objetivo: Reconocer un triángulo escaleno por tener sus tres lados de longitudes diferentes.
introduccion: Al clasificar triángulos según sus lados, el caso donde no hay ninguna medida repetida se
  llama escaleno.
resumen: Un triángulo escaleno es aquel cuyos tres lados tienen medidas distintas entre sí.
explicacion: '![Triángulo escaleno](/static/img/geometria/triangulos/triangulos-clasificacion-escaleno.svg)


  ### Definición formal


  Un triángulo de lados $a$, $b$ y $c$ es escaleno si $a \neq b$, $b \neq c$ y $a \neq c$: ninguna pareja
  de lados comparte la misma medida.


  ### Desarrollo didáctico


  Un triángulo con lados de 5 cm, 7 cm y 9 cm es escaleno, porque las tres medidas son distintas entre
  sí.'
procedimiento:
- 'Paso 1: Mide los tres lados del triángulo.'
- 'Paso 2: Compara las tres medidas entre sí.'
- 'Paso 3: Si las tres son distintas, el triángulo es escaleno.'
ejemplos:
- titulo: Reconocer un escaleno
  enunciado: Un triángulo tiene lados de 4 cm, 6 cm y 8 cm.
  solucion_pasos:
  - Las tres medidas son distintas, así que el triángulo es escaleno.
- titulo: Comparar con un caso no escaleno
  enunciado: Un triángulo tiene lados de 5 cm, 5 cm y 8 cm.
  solucion_pasos:
  - Dos lados son iguales, así que no es escaleno.
- titulo: ¿Un triángulo escaleno puede tener dos lados iguales?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición sus tres lados deben ser distintos entre sí.
- titulo: ¿Un triángulo con lados 3, 3 y 3 es escaleno?
  respuesta: 'No'
  solucion_pasos:
  - No, ese es un triángulo equilátero, con las tres medidas iguales.
errores_frecuentes:
- Clasificar como escaleno un triángulo que tiene dos lados iguales.
- Comparar solo dos de los tres lados en vez de los tres.
- Confundir 'escaleno' con 'equilátero'.
fuente: Elaboración propia.
estado: publicado
