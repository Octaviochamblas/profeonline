semantic_id: MAT.GEO.ANGULOS_RELACIONES_POSICION.RECTAS_PERPENDICULARES_DEFINICION
titulo: Definición de rectas perpendiculares
objetivo: Reconocer cuándo dos rectas son perpendiculares y comprobar que la perpendicularidad se decide
  por la medida del ángulo y no por la apariencia de estar inclinadas.
introduccion: En una hoja cuadriculada muchas rectas parecen 'derechas', pero la perpendicularidad solo
  aparece cuando el cruce genera un ángulo recto. Este recurso se centra en definición de rectas perpendiculares
  y en cómo reconocerlo con un criterio geométrico claro.
resumen: Dos rectas son perpendiculares cuando se cortan formando un ángulo recto. Como idea de control,
  la perpendicularidad se decide por la medida del ángulo y no por la apariencia de estar inclinadas.
explicacion: 'Dos rectas son perpendiculares cuando se cortan formando un ángulo recto.


  La situación “una recta vertical y una horizontal que se cruzan producen una abertura de 90°” muestra
  cómo pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se
  verifica que la perpendicularidad se decide por la medida del ángulo y no por la apariencia de estar
  inclinadas.'
procedimiento:
- 'Paso 1: Ubica el punto de corte entre las dos rectas.'
- 'Paso 2: Comprueba si una de las aberturas formadas mide 90°.'
- 'Paso 3: Concluye que las rectas son perpendiculares y recuerda que entonces aparecen cuatro ángulos
  rectos.'
ejemplos:
- titulo: Lectura del dibujo — Rectas perpendiculares
  enunciado: Una recta vertical y una horizontal que se cruzan producen una abertura de 90°.
  solucion_pasos:
  - Ubica el punto de corte entre las dos rectas.
  - Comprueba si una de las aberturas formadas mide 90°.
  - Concluye que las rectas son perpendiculares y recuerda que entonces aparecen cuatro ángulos rectos.
- titulo: Revisión del razonamiento — Rectas perpendiculares
  enunciado: 'Revisa una solución del caso “una recta vertical y una horizontal que se cruzan producen
    una abertura de 90°”: el resultado parece razonable, pero falta conectar el dibujo con la definición.
    Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: dos rectas son perpendiculares cuando se cortan formando un ángulo recto.'
  - Comprueba si una de las aberturas formadas mide 90°.
  - Concluye que las rectas son perpendiculares y recuerda que entonces aparecen cuatro ángulos rectos.
- titulo: ¿El caso confirma que la perpendicularidad se decide por la medida del ángulo y no por la apariencia
    de estar inclinadas? — Rectas perpendiculares
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: dos rectas son perpendiculares cuando se cortan
    formando un ángulo recto.'
  - En el caso “una recta vertical y una horizontal que se cruzan producen una abertura de 90°” se observa
    que la perpendicularidad se decide por la medida del ángulo y no por la apariencia de estar inclinadas.
  - Concluye que las rectas son perpendiculares y recuerda que entonces aparecen cuatro ángulos rectos.
- titulo: ¿Basta con ubica el punto de corte entre las dos rectas? — Rectas perpendiculares
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de definición de rectas perpendiculares.
  - Después del paso “Ubica el punto de corte entre las dos rectas.” todavía hace falta revisar “Comprueba
    si una de las aberturas formadas mide 90°.”.
  - El cierre correcto exige “Concluye que las rectas son perpendiculares y recuerda que entonces aparecen
    cuatro ángulos rectos.”.
errores_frecuentes:
- Rectas perpendiculares significa verse una hacia arriba y otra hacia el lado, aunque no formen 90° exactos.
- Para resolver rectas perpendiculares, basta con el paso “Ubica el punto de corte entre las dos rectas.”
  y no hace falta revisar “Comprueba si una de las aberturas formadas mide 90°.”.
- Si el dibujo parece claro, se puede ignorar que la perpendicularidad se decide por la medida del ángulo
  y no por la apariencia de estar inclinadas.
- Dos configuraciones distintas representan rectas perpendiculares solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye que las rectas son perpendiculares
  y recuerda que entonces aparecen cuatro ángulos rectos.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
estado: publicado
