semantic_id: MAT.ALG.MODELAMIENTO_LINEAL.IDENTIFICACION_INCOGNITA
titulo: Identificación de la incógnita en un problema lineal
objetivo: Aprender a traducir una pregunta en lenguaje natural a una variable matemática.
introduccion: 'Si el problema dice ''¿Cuántos años tiene Juan?'', entonces defines: $x = \text{edad de
  Juan}$.'
resumen: El primer paso para resolver un problema de la vida real con álgebra no es calcular, es nombrar.
  Lee la pregunta del problema (generalmente está al final). Lo que te están preguntando es tu incógnita.
explicacion: '### Definición formal


  En el modelamiento algebraico de un problema verbal, la incógnita $x$ se define como la cantidad desconocida
  que el enunciado solicita explícitamente (usualmente en la pregunta final); todas las demás cantidades
  del problema se expresan como funciones lineales de esa misma $x$.


  ### Desarrollo didáctico


  Si el problema dice ''¿Cuántos años tiene Juan?'', entonces defines: $x = \text{edad de Juan}$.

  Si el problema habla de varios sujetos (''La edad de Pedro es el doble que la de Juan''), debes usar
  ESA misma $x$ como base para construir a los demás. Entonces Pedro sería $2x$.


  criterio recomendado: Asigna la $x$ al elemento más pequeño o básico del problema. Si sabes cuánto vale
  la base, sabes cuánto valen los demás.'
procedimiento:
- Lee la pregunta final del problema verbal.
- Asigna la letra 'x' a la cantidad desconocida principal.
- 'Escribe explícitamente en una esquina qué significa la ''x'' (ej: ''x = precio del pantalón'').'
- Expresa todas las demás cantidades desconocidas usando variaciones de 'x' (x+5, 3x, etc.).
ejemplos:
- titulo: $x = \text{edad de Juan}$
  enunciado: Justifica el procedimiento adecuado para el caso $x = \text{edad de Juan}$.
  solucion_pasos:
  - 'Si el problema dice ''¿Cuántos años tiene Juan?'', entonces defines: $x = \text{edad de Juan}$.

    Si el problema habla de varios sujetos (''La edad de Pedro es el doble que la de Juan''), debes usar
    ESA misma $x$ como base para construir a los demás. Entonces Pedro sería $2x$.'
  - Lee la pregunta final del problema verbal.
- titulo: $x$
  enunciado: Determina qué debe hacerse en $x$ y fundamenta cada transformación.
  solucion_pasos:
  - 'criterio recomendado: Asigna la $x$ al elemento más pequeño o básico del problema. Si sabes cuánto
    vale la base, sabes cuánto valen los demás.'
  - Asigna la letra 'x' a la cantidad desconocida principal.
- titulo: 'Respecto de «Identificación de la incógnita en un problema lineal»: ¿La siguiente formulació'
  enunciado: 'Respecto de «Identificación de la incógnita en un problema lineal»: ¿La siguiente formulación
    es correcta? «El primer paso para resolver un problema de la vida real con álgebra no es calcular,
    es nombrar»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El primer paso para resolver un problema de la vida
    real con álgebra no es calcular, es nombrar.'
- titulo: 'Respecto de «Identificación de la incógnita en un problema lineal»: ¿La siguiente conclusión'
  enunciado: 'Respecto de «Identificación de la incógnita en un problema lineal»: ¿La siguiente conclusión
    es correcta? «Puede omitirse esta condición sin cambiar el resultado: «Lee la pregunta final del problema
    verbal»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El primer paso para resolver un problema de la vida
    real con álgebra no es calcular, es nombrar.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Lee la pregunta final del problema verbal».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Asigna la letra ''x'' a la cantidad
  desconocida principal».'
- La definición sigue cumpliéndose aunque no se considere que el primer paso para resolver un problema
  de la vida real con álgebra no es calcular, es nombrar. Lee la pregunta del problema (generalmente está
  al final). Lo que te están preguntando es tu incógnita.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Expresa todas las demás cantidades
  desconocidas usando variaciones de 'x' (x+5, 3x, etc.)».
- La comprobación del resultado vuelve innecesaria la condición «Lee la pregunta final del problema verbal».
