semantic_id: MAT.GEO.RECTA_RELACIONES.PENDIENTE_DOS_PUNTOS
titulo: Cálculo de la pendiente de una recta dados dos puntos
objetivo: Calcular la pendiente de una recta que pasa por dos puntos conocidos, usando la razón entre
  la diferencia de las coordenadas y y la diferencia de las coordenadas x.
introduccion: La pendiente mide qué tan inclinada está una recta, y se puede calcular directamente a partir
  de dos puntos cualesquiera que pertenezcan a ella.
resumen: Dados dos puntos $(x_1,y_1)$ y $(x_2,y_2)$ de una recta (con $x_1\neq x_2$), la pendiente se
  calcula como $m=\dfrac{y_2-y_1}{x_2-x_1}$.
explicacion: '![Pendiente entre dos puntos](/static/img/geometria/analitica/rectarel-pendiente-dos-puntos.svg)


  ### Definición formal


  La pendiente entre $(x_1,y_1)$ y $(x_2,y_2)$ es $m=\dfrac{y_2-y_1}{x_2-x_1}$, siempre que $x_1\neq x_2$.


  ### Desarrollo didáctico


  Para los puntos $(-2,-2)$ y $(3,3)$: $m=\dfrac{3-(-2)}{3-(-2)}=\dfrac{5}{5}=1$.'
procedimiento:
- 'Paso 1: Identifica las coordenadas de los dos puntos dados.'
- 'Paso 2: Resta las coordenadas y (y2-y1) y las coordenadas x (x2-x1), en el mismo orden.'
- 'Paso 3: Divide la diferencia de y por la diferencia de x para obtener la pendiente.'
ejemplos:
- titulo: Calcular la pendiente entre (-2,-2) y (3,3)
  enunciado: P1(-2,-2), P2(3,3).
  solucion_pasos:
  - m=(3-(-2))/(3-(-2))=5/5=1.
- titulo: Calcular la pendiente entre (1,5) y (4,-1)
  enunciado: P1(1,5), P2(4,-1).
  solucion_pasos:
  - m=(-1-5)/(4-1)=-6/3=-2.
- titulo: ¿El orden de los puntos afecta el resultado de la pendiente?
  respuesta: 'No'
  solucion_pasos:
  - No, siempre que se mantenga el mismo orden en numerador y denominador, el resultado es el mismo.
- titulo: ¿Se puede calcular la pendiente si ambos puntos tienen la misma coordenada x?
  respuesta: 'No'
  solucion_pasos:
  - No, se produciría una división por cero; en ese caso la recta es vertical y no tiene pendiente definida.
errores_frecuentes:
- Invertir el orden al restar (usar x1-x2 en el numerador y y2-y1 en el denominador, por ejemplo).
- Calcular la pendiente con puntos que tienen la misma coordenada x, sin notar la división por cero.
- Confundir cuál diferencia va en el numerador (y) y cuál en el denominador (x).
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
