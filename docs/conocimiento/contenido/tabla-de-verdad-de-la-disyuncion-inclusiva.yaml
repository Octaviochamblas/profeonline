semantic_id: MAT.FUND.TABLAS_VERDAD.TABLA_DISYUNCION_INCLUSIVA
titulo: Tabla de verdad de la disyunción inclusiva
objetivo: Comprender y construir la tabla de verdad del conectivo de disyunción inclusiva para evaluar
  proposiciones compuestas del tipo "o".
introduccion: 'Imagina que en un restaurante el menú incluye de postre: "helado o flan". Esto significa
  que puedes pedir helado, puedes pedir flan, o incluso si el restaurante es muy generoso, podrías pedir
  ambos y seguiría siendo válido. La única forma de que te quedes sin postre es que no elijas ninguno
  de los dos. En lógica, el conectivo "o" (disyunción inclusiva) funciona así: es verdadero si al menos
  una de las opciones es verdadera, o si ambas lo son.'
resumen: La disyunción inclusiva (u "o" lógico) es un conectivo binario que se denota con el símbolo $\lor$.
  La proposición $p \lor q$ es verdadera si al menos una de las proposiciones ($p$ o $q$) es verdadera,
  y es falsa únicamente cuando ambas son falsas.
explicacion: 'La **disyunción inclusiva** une dos proposiciones $p$ y $q$ mediante el símbolo $\lor$ (se
  lee "o"). Escribimos $p \lor q$.


  En lógica formal, el conectivo "o" se interpreta de forma inclusiva: la expresión es verdadera si $p$
  es verdadera, si $q$ es verdadera, o si ambas lo son. Solo resulta falsa cuando ninguna se cumple.


  Para dos variables simples ($n = 2$), la tabla de verdad tiene $2^2 = 4$ filas:


  | $p$ | $q$ | $p \lor q$ |

  | :---: | :---: | :---: |

  | $V$ | $V$ | $V$ |

  | $V$ | $F$ | $V$ |

  | $F$ | $V$ | $V$ |

  | $F$ | $F$ | $F$ |


  **Comparación importante:**

  A diferencia de la conjunción ($\land$), donde necesitamos que ambas proposiciones sean verdaderas,
  en la disyunción inclusiva ($\lor$) basta con que **una sola** de las proposiciones simples sea verdadera
  para que toda la expresión sea verdadera.'
procedimiento:
- 'Paso 1: Determinar el número de proposiciones simples $n$. Para dos variables $p$ y $q$ ($n=2$), calculamos
  la cantidad de filas necesarias mediante la fórmula $2^n = 2^2 = 4$ filas.'
- 'Paso 2: Definir las columnas de la tabla de verdad: una columna para $p$, otra para $q$, y una columna
  final para la disyunción $p \lor q$.'
- 'Paso 3: Llenar de forma ordenada los valores lógicos iniciales: $p$ con ($V, V, F, F$) y $q$ con ($V,
  F, V, F$).'
- 'Paso 4: Evaluar la disyunción inclusiva fila por fila, aplicando el conectivo de adentro hacia afuera:
  la expresión da Falso ($F$) si y solo si ambas variables son $F$; de lo contrario, el resultado es Verdadero
  ($V$).'
ejemplos:
- titulo: Ejemplo 1
  enunciado: 'Determina el valor de verdad de la proposición: "10 es un número impar o $3 + 3 = 6$".'
  solucion_pasos:
  - 'Paso a: Identificamos las proposiciones simples. Sea $p$: "10 es un número impar" (Falso) y $q$:
    "$3 + 3 = 6$" (Verdadero).'
  - 'Paso b: Evaluamos la disyunción inclusiva $p \lor q$. Como el segundo término $q$ es Verdadero ($V$),
    toda la expresión "o" es Verdadera ($V$).'
- titulo: Ejemplo 2
  enunciado: Si $p$ es falsa y $q$ es falsa, ¿cuál es el valor de verdad de la expresión $\neg p \lor
    q$?
  solucion_pasos:
  - 'Paso a: Evaluamos primero la negación interna: como $p$ es Falso ($F$), su negación $\neg p$ es Verdadera
    ($V$).'
  - 'Paso b: Evaluamos la disyunción inclusiva conectivo por conectivo: tenemos $\neg p \lor q$, que equivale
    a Verdadero ($V$) o Falso ($F$). Como uno de los términos es Verdadero, el resultado es Verdadero
    ($V$).'
- titulo: ¿La disyunción inclusiva $p \lor q$ es falsa si al menos una de las proposiciones es verdadera?
  respuesta: 'No'
  solucion_pasos:
  - Por la regla de la disyunción inclusiva, basta con que una sola de las proposiciones sea verdadera
    para que toda la proposición compuesta sea verdadera.
  - Por lo tanto, si al menos una es verdadera, la disyunción inclusiva es Verdadera, no Falsa.
- titulo: ¿Es la proposición "$2 > 5 \lor 4 > 9$" falsa?
  respuesta: Sí
  solucion_pasos:
  - 'Evaluamos el primer término: $2 > 5$ es Falso ($F$).'
  - 'Evaluamos el segundo término: $4 > 9$ es Falso ($F$).'
  - Como ambos términos son falsos, la disyunción $F \lor F$ es Falsa ($F$).
errores_frecuentes:
- Confundir la disyunción inclusiva con la exclusiva, pensando que si ambas proposiciones son verdaderas,
  el resultado de $p \lor q$ debe ser falso.
- Confundir el símbolo de disyunción ($\lor$) con el de conjunción ($\land$).
- Asociar la palabra "o" del lenguaje cotidiano únicamente a situaciones donde se debe elegir una sola
  opción de manera obligatoria.
- No realizar la negación de los términos antes de evaluar la disyunción, obteniendo un valor de verdad
  erróneo.
- Colocar mal los paréntesis al construir tablas de verdad más grandes, cambiando la precedencia de la
  disyunción con respecto a la conjunción.
fuente: Lógica Matemática y Teoría de Conjuntos, pág. 18
estado: publicado
