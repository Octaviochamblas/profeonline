semantic_id: MAT.ALG.LENGUAJE_RELACIONES.IMPARES_CONSECUTIVOS
objetivo: Modelar una serie de números impares que se suceden entre sí.
introduccion: ¿A qué distancia está el 5 del 7? A dos unidades. Curiosamente, la distancia
  entre impares es exactamente la misma que la distancia entre pares.
resumen: 'Los **Números Impares Consecutivos** también se distancian en **2 unidades**.
  Se modelan anclando el primer número como impar ($2n+1$) y sumando $2, 4, 6...$
  obteniendo: **$2n+1$, $2n+3$, $2n+5$**.'
explicacion: 'Análisis del salto:

  1. Base impar garantizada: $2n+1$.

  2. Si a un impar le sumo 1, me vuelvo par. ¡Prohibido!

  3. Si le sumo 2, vuelvo a caer en la casilla impar: $(2n+1) + 2 = 2n+3$.

  4. El siguiente será $(2n+3) + 2 = 2n+5$.


  ¡Cuidado con la trampa psicológica! Muchos estudiantes creen que como son ''impares'',
  deben sumar números impares ($+1, +3, +5$). Eso es un error letal. Para mantener
  la imparidad, debes dar saltos pares ($+2, +4$). Impar + Par = Impar.'
procedimiento:
- 'Paso 1: Establece el primer número usando la estructura impar (2n + 1 o 2n - 1).'
- 'Paso 2: Suma 2 para hallar el segundo (2n + 3).'
- 'Paso 3: Suma 2 de nuevo para hallar el tercero (2n + 5).'
ejemplos:
- titulo: El salto impar
  enunciado: 'Traduce algebraicamente: ''El producto de dos impares consecutivos''.'
  solucion_pasos:
  - 'Primer impar: (2n + 1).'
  - 'Segundo impar (saltando 2 unidades): (2n + 3).'
  - 'Producto: (2n + 1) * (2n + 3).'
errores_frecuentes:
- Traducirlos como $2n+1, 2n+2, 2n+3$. (El $2n+2$ es par, se rompió la racha).
- Sumar impares a la base ($+1, +3, +5$) pensando erróneamente que eso mantiene la
  serie impar.
fuente: Álgebra de Baldor.
estado: publicado
