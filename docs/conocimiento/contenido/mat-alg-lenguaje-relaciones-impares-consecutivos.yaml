semantic_id: MAT.ALG.LENGUAJE_RELACIONES.IMPARES_CONSECUTIVOS
objetivo: Modelar una serie de números impares que se suceden entre sí.
introduccion: ¿A qué distancia está el 5 del 7? A dos unidades. Curiosamente, la distancia entre impares es exactamente
  la misma que la distancia entre pares.
resumen: 'Los **Números Impares Consecutivos** también se distancian en **2 unidades**. Se modelan anclando el primer
  número como impar ($2n+1$) y sumando $2, 4, 6.$ obteniendo: **$2n+1$, $2n+3$, $2n+5$**.'
explicacion: '### Definición formal


  La paridad se conserva sumando números pares. Impar + Par = Impar. Si sumas un impar, te cambias de bando (Impar
  + Impar = Par).


  ### Desarrollo didáctico


  Análisis del salto:

  1. Base impar garantizada: $2n+1$.

  2. Si a un impar le sumo 1, me vuelvo par. Prohibido.

  3. Si le sumo 2, vuelvo a caer en la casilla impar: $(2n+1) + 2 = 2n+3$.

  4. El siguiente será $(2n+3) + 2 = 2n+5$.


  Cuidado con la trampa psicológica. Muchos estudiantes creen que como son ''impares'', deben sumar números impares
  ($+1, +3, +5$). Eso es un error letal. Para mantener la imparidad, debes dar saltos pares ($+2, +4$). Impar +
  Par = Impar.'
procedimiento:
- 'Paso 1: Establece el primer número usando la estructura impar (2n + 1 o 2n - 1).'
- 'Paso 2: Suma 2 para hallar el segundo (2n + 3).'
- 'Paso 3: Suma 2 de nuevo para hallar el tercero (2n + 5).'
- La paridad se conserva sumando números pares. Impar + Par = Impar. Si sumas un impar, te cambias de bando (Impar
  + Impar = Par).
ejemplos:
- titulo: El salto impar
  enunciado: 'Traduce algebraicamente: ''El producto de dos impares consecutivos''.'
  solucion_pasos:
  - 'Primer impar: (2n + 1).'
  - 'Segundo impar (saltando 2 unidades): (2n + 3).'
  - 'Producto: (2n + 1) * (2n + 3).'
- titulo: En un edificio, se sabe que los números de tres departamentos contiguos en el mismo pasillo
  enunciado: 'En un edificio, se sabe que los números de tres departamentos contiguos en el mismo pasillo son números
    impares consecutivos y su suma es $105$. Si representamos el número del departamento del medio como $x$ (sabiendo
    que es impar), ¿cuál es la ecuación más eficiente para resolver este problema? (v1)


    Opciones: A) $(x - 2) + x + (x + 2) = 105$ · B) $(x - 1) + x + (x + 1) = 105$ · C) $2x+1 + 2x+3 + 2x+5 = 105$
    · D) $x + (x+2) + (x+4) = 105$'
  solucion_pasos:
  - Si $x$ es el impar del medio, el impar anterior está 2 unidades atrás ($x-2$) y el siguiente 2 unidades adelante
    ($x+2$). La opción C asume que la variable a despejar es el parámetro generador (n), no el número de departamento.
    La opción A usa el modelo centrado directo en la incógnita.
  - 'Respuesta: $(x - 2) + x + (x + 2) = 105$'
- titulo: 'Respecto de «Representación de números impares consecutivos»: ¿Es correcta esta caracterizac'
  enunciado: 'Respecto de «Representación de números impares consecutivos»: ¿Es correcta esta caracterización? «Los
    **Números Impares Consecutivos** también se distancian en **2 unidades**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Los **Números Impares Consecutivos** también se distancian
    en **2 unidades**.'
- titulo: 'Respecto de «Representación de números impares consecutivos»: ¿Es válida esta afirmación? «T'
  enunciado: 'Respecto de «Representación de números impares consecutivos»: ¿Es válida esta afirmación? «Traducirlos
    como $2n+1, 2n+2, 2n+3$. (El $2n+2$ es par, se rompió la racha)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Los **Números Impares Consecutivos** también se distancian
    en **2 unidades**.'
errores_frecuentes:
- Traducirlos como $2n+1, 2n+2, 2n+3$. (El $2n+2$ es par, se rompió la racha).
- Sumar impares a la base ($+1, +3, +5$) pensando erróneamente que eso mantiene la serie impar.
- Porque la regla establece que los números pares se suman con pares y los impares con impares.
- Porque sumar $2$ siempre genera números pares, cancelando el $1$ original.
- Es solo una coincidencia algebraica sin explicación en la recta numérica.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Representación de números impares consecutivos
