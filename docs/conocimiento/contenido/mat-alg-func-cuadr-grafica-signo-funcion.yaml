semantic_id: MAT.ALG.FUNC_CUADR_GRAFICA.SIGNO_FUNCION
titulo: Lectura del signo de la función cuadrática a partir de su gráfica
objetivo: Leer, a partir de la gráfica de una función cuadrática, los intervalos donde es positiva, negativa o
  cero.
introduccion: Observando simplemente si la parábola está por encima o por debajo del eje $x$ en cada tramo, se
  puede leer directamente el signo de la función sin hacer ningún cálculo adicional.
resumen: El **signo de una función cuadrática** en un intervalo se determina observando si su gráfica está por
  encima del eje $x$ (positiva), por debajo (negativa), o exactamente sobre él (cero, en los ceros de la función).
explicacion: '### Definición formal


  Dada la gráfica de $f(x)=ax^2+bx+c$, se tiene $f(x)>0$ en los intervalos donde la parábola está por encima del
  eje $x$; $f(x)<0$ donde está por debajo; y $f(x)=0$ exactamente en los ceros de la función (si existen).


  ### Desarrollo didáctico


  Los ceros de la función dividen el eje $x$ en intervalos donde el signo de la función se mantiene constante;
  basta con observar en qué intervalo la curva está arriba o abajo del eje.


  Para $f(x)=x^2-4$, con ceros en $x=-2$ y $x=2$: la parábola está por debajo del eje $x$ entre $-2$ y $2$ (donde
  $f(x)<0$), y por encima fuera de ese intervalo (donde $f(x)>0$).'
procedimiento:
- 'Paso 1: Identifica los ceros de la función, que dividen el eje $x$ en intervalos.'
- 'Paso 2: Para cada intervalo, observa si la parábola está por encima o por debajo del eje $x$.'
- 'Paso 3: Concluye el signo de la función en cada intervalo correspondiente.'
ejemplos:
- titulo: Lectura de signo con parábola cóncava hacia arriba
  enunciado: 'Para $f(x)=x^2-9$, con ceros en $x=-3$ y $x=3$, ¿dónde es $f(x)<0$?'
  solucion_pasos:
  - Entre los ceros, la parábola (cóncava hacia arriba) está por debajo del eje $x$.
  - '$f(x)<0$ para $x \in ]-3,3[$.'
- titulo: Lectura de signo con parábola cóncava hacia abajo
  enunciado: 'Para $f(x)=-x^2+9$, con ceros en $x=-3$ y $x=3$, ¿dónde es $f(x)>0$?'
  solucion_pasos:
  - Entre los ceros, la parábola (cóncava hacia abajo) está por encima del eje $x$.
  - '$f(x)>0$ para $x \in ]-3,3[$.'
- titulo: ¿El signo de la función cambia siempre exactamente en sus ceros?
  enunciado: ¿El signo de la función cambia siempre exactamente en sus ceros?
  respuesta: Sí
  solucion_pasos:
  - Los ceros son los únicos puntos donde la gráfica cruza el eje $x$, marcando el límite entre los intervalos
    de signo constante.
- titulo: ¿Una función sin ceros reales puede cambiar de signo?
  enunciado: ¿Una función sin ceros reales puede cambiar de signo?
  respuesta: 'No'
  solucion_pasos:
  - Sin ceros, la gráfica nunca cruza el eje $x$, por lo que el signo de la función es el mismo en todo su dominio.
errores_frecuentes:
- Invertir los intervalos de signo positivo y negativo al no considerar la concavidad de la parábola.
- Incluir o excluir incorrectamente los ceros en los intervalos de signo (los ceros son donde $f(x)=0$, no positivo
  ni negativo).
- Asumir que toda función cuadrática cambia de signo, sin verificar si tiene ceros reales.
- Confundir el signo de la función con el signo del coeficiente $a$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
