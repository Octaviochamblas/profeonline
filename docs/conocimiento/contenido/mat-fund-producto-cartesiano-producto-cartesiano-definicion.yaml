semantic_id: MAT.FUND.PRODUCTO_CARTESIANO.PRODUCTO_CARTESIANO_DEFINICION

objetivo: |
  Comprender la definición formal del producto cartesiano $A \times B$, construir
  el conjunto resultado dado dos conjuntos, y reconocer que el orden de los conjuntos
  importa: $A \times B \neq B \times A$ en general.

introduccion: |
  Dados dos conjuntos $A$ y $B$, podemos construir un nuevo conjunto cuyos elementos
  son **todos los pares ordenados posibles** formados tomando un elemento de $A$
  como primera coordenada y un elemento de $B$ como segunda coordenada.
  Este nuevo conjunto se llama **producto cartesiano** de $A$ y $B$, escrito $A \times B$.
  Su nombre honra a René Descartes, quien vinculó álgebra y geometría mediante el plano cartesiano.

resumen: |
  El **producto cartesiano** de dos conjuntos $A$ y $B$ se define como:
  $$A \times B = \{(a, b) \mid a \in A \text{ y } b \in B\}$$
  - Todo elemento de $A \times B$ es un par ordenado $(a, b)$.
  - La primera coordenada pertenece a $A$; la segunda, a $B$.
  - En general, $A \times B \neq B \times A$ (el orden de los conjuntos importa).
  - Si $A$ o $B$ es vacío, entonces $A \times B = \emptyset$.

explicacion: |
  Para construir $A \times B$ se toma cada elemento de $A$ y se lo empareja con
  cada elemento de $B$, generando un par ordenado por cada combinación.

  **Notación formal:**
  $$A \times B = \{(a, b) \mid a \in A,\; b \in B\}$$

  **¿Por qué $A \times B \neq B \times A$ en general?**
  Los elementos de $A \times B$ tienen primera coordenada en $A$;
  los de $B \times A$ tienen primera coordenada en $B$.
  Si $A \neq B$, estos conjuntos de pares difieren.

  **Caso especial:** si $A = B$, se escribe $A^2 = A \times A$.
  El plano cartesiano es $\mathbb{R}^2 = \mathbb{R} \times \mathbb{R}$.

procedimiento: |
  Para construir $A \times B$ explícitamente:
  1. Listar todos los elementos de $A$ (en cualquier orden).
  2. Para cada elemento $a \in A$, formar el par $(a, b)$ con cada $b \in B$.
  3. Reunir todos los pares generados en un conjunto (entre llaves).
  4. Verificar que la cantidad total de pares sea $|A| \times |B|$.

ejemplos:
  - tipo: A
    titulo: 'Construir $A \times B$ con $A = \{1, 2\}$ y $B = \{x, y\}$'
    enunciado: |
      Dados $A = \{1, 2\}$ y $B = \{x, y\}$, escribe explícitamente todos los
      elementos de $A \times B$.
    solucion_pasos: |
      Paso 1 — Elemento $1 \in A$, emparejado con cada elemento de $B$:
        $(1, x)$ y $(1, y)$

      Paso 2 — Elemento $2 \in A$, emparejado con cada elemento de $B$:
        $(2, x)$ y $(2, y)$

      Paso 3 — Reunir todos los pares:
        $A \times B = \{(1, x),\, (1, y),\, (2, x),\, (2, y)\}$

      Verificación: $|A| \times |B| = 2 \times 2 = 4$ pares ✓

  - tipo: A
    titulo: 'Construir $A \times B$ con $A = \{a, b\}$ y $B = \{1, 2, 3\}$'
    enunciado: |
      Dados $A = \{a, b\}$ y $B = \{1, 2, 3\}$, escribe explícitamente todos los
      elementos de $A \times B$.
    solucion_pasos: |
      Paso 1 — Elemento $a \in A$, emparejado con cada elemento de $B$:
        $(a, 1)$, $(a, 2)$, $(a, 3)$

      Paso 2 — Elemento $b \in A$, emparejado con cada elemento de $B$:
        $(b, 1)$, $(b, 2)$, $(b, 3)$

      Paso 3 — Reunir todos los pares:
        $A \times B = \{(a,1),\, (a,2),\, (a,3),\, (b,1),\, (b,2),\, (b,3)\}$

      Verificación: $|A| \times |B| = 2 \times 3 = 6$ pares ✓

  - tipo: B
    titulo: '¿Es siempre cierto que $A \times B = B \times A$?'
    respuesta: 'No'
    solucion_pasos: |
      Contraejemplo: $A = \{1\}$ y $B = \{2\}$.
        $A \times B = \{(1, 2)\}$
        $B \times A = \{(2, 1)\}$
        $(1, 2) \neq (2, 1)$ porque $1 \neq 2$.

      Por tanto $A \times B \neq B \times A$ cuando $A \neq B$.
      La igualdad solo se cumple si $A = B$ o si alguno es vacío.

      La respuesta es **No**.

  - tipo: B
    titulo: '¿Todo elemento de $A \times B$ es un par ordenado cuya primera componente pertenece a $A$?'
    respuesta: 'Sí'
    solucion_pasos: |
      Por definición, $A \times B = \{(a, b) \mid a \in A \text{ y } b \in B\}$.
      Todo elemento del conjunto tiene la forma $(a, b)$ donde $a \in A$.

      No puede existir un elemento de $A \times B$ cuya primera coordenada
      no pertenezca a $A$; eso violaría la definición.

      La respuesta es **Sí**.

errores_frecuentes:
  - error: 'Confundir $A \times B$ con $B \times A$'
    descripcion: |
      Pensar que el orden de los conjuntos no importa, igual que en una multiplicación
      de números donde $a \times b = b \times a$.
    correccion: |
      En el producto cartesiano el orden sí importa: la primera coordenada viene de
      el primer conjunto y la segunda del segundo. En general $A \times B \neq B \times A$.

  - error: 'Incluir pares con la primera coordenada de $B$ en $A \times B$'
    descripcion: |
      Al construir $A \times B$ con $A = \{1, 2\}$ y $B = \{x, y\}$, incluir
      $(x, 1)$ o $(y, 2)$ como elementos de $A \times B$.
    correccion: |
      En $A \times B$ la primera coordenada siempre pertenece a $A$ y la segunda a $B$.
      $(x, 1)$ pertenecería a $B \times A$, no a $A \times B$.

  - error: 'Omitir alguna combinación al listar $A \times B$'
    descripcion: |
      Con $A = \{a, b\}$ y $B = \{1, 2, 3\}$, olvidar algún par como $(b, 2)$.
    correccion: |
      Trabajar sistemáticamente: para cada elemento de $A$, emparejarlo con
      **todos** los elementos de $B$ antes de pasar al siguiente.

  - error: 'Escribir $A \times B$ como un conjunto de elementos sueltos'
    descripcion: |
      Escribir $A \times B = \{1, 2, x, y\}$ en lugar de $\{(1,x),(1,y),(2,x),(2,y)\}$.
    correccion: |
      Los elementos de $A \times B$ son pares ordenados, siempre encerrados en paréntesis.
      El conjunto usa llaves, pero cada elemento es un par.

  - error: 'Confundir el producto cartesiano con la unión o intersección'
    descripcion: |
      Pensar que $A \times B = A \cup B$ o que contiene elementos de $A$ y $B$ directamente.
    correccion: |
      $A \times B$ no contiene elementos de $A$ ni de $B$ directamente, sino
      pares ordenados construidos a partir de ellos.

fuente: 'Matemáticas para la Educación Media, MINEDUC'
