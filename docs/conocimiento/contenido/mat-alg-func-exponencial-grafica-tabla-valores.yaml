semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.TABLA_VALORES
titulo: Construcción de una tabla de valores para graficar una función exponencial
objetivo: Construir una tabla de valores adecuada para graficar una función exponencial, eligiendo exponentes
  representativos.
introduccion: A diferencia de una parábola, la curva exponencial no tiene simetría; para representarla bien conviene
  elegir valores de $x$ que muestren tanto su comportamiento cercano a la asíntota como su crecimiento (o decrecimiento)
  acelerado.
resumen: Una **tabla de valores** para graficar una función exponencial consiste en calcular $f(x)$ para varios
  exponentes, típicamente incluyendo valores negativos, cero, y positivos pequeños.
explicacion: '### Definición formal


  Una tabla de valores para $f(x)=a\cdot b^x$ es un conjunto de pares ordenados $(x_i,f(x_i))$ obtenidos evaluando
  la función en varios valores elegidos de $x_i$. Debido al crecimiento (o decrecimiento) acelerado, conviene
  elegir un rango de exponentes centrado en $x=0$, sin extenderse demasiado.


  ### Desarrollo didáctico


  Es recomendable incluir $x=0$ (para ver el intercepto), un par de valores negativos (para ver el acercamiento
  a la asíntota) y un par de valores positivos pequeños (para ver el crecimiento).


  Para $f(x)=2\cdot3^x$, evaluando en $x=-2,-1,0,1,2$: se obtiene $f(-2)=2/9$, $f(-1)=2/3$, $f(0)=2$, $f(1)=6$,
  $f(2)=18$, mostrando el rápido crecimiento.'
procedimiento:
- 'Paso 1: Elige un rango de exponentes centrado en $x=0$, incluyendo valores negativos y positivos pequeños.'
- 'Paso 2: Calcula $f(x)$ para cada valor elegido.'
- 'Paso 3: Observa el patrón de crecimiento o decrecimiento en los valores obtenidos.'
ejemplos:
- titulo: Construcción de tabla para función creciente
  enunciado: 'Construye una tabla de valores para $f(x)=2^x$ usando $x=-2,-1,0,1,2,3$.'
  solucion_pasos:
  - '$f(-2)=1/4$, $f(-1)=1/2$, $f(0)=1$, $f(1)=2$, $f(2)=4$, $f(3)=8$.'
  - Se observa que los valores se duplican en cada paso, mostrando el crecimiento exponencial.
- titulo: Construcción de tabla para función decreciente
  enunciado: 'Construye una tabla de valores para $f(x)=(1/2)^x$ usando $x=-2,-1,0,1,2$.'
  solucion_pasos:
  - '$f(-2)=4$, $f(-1)=2$, $f(0)=1$, $f(1)=1/2$, $f(2)=1/4$.'
  - Se observa que los valores se reducen a la mitad en cada paso.
- titulo: ¿Es útil incluir $x=0$ en la tabla de una función exponencial?
  enunciado: ¿Es útil incluir $x=0$ en la tabla de una función exponencial?
  respuesta: Sí
  solucion_pasos:
  - Permite verificar directamente el intercepto con el eje $y$, que coincide con el parámetro $a$.
- titulo: ¿Los valores de una tabla exponencial cambian de manera lineal, sumando siempre la misma cantidad?
  enunciado: ¿Los valores de una tabla exponencial cambian de manera lineal, sumando siempre la misma cantidad?
  respuesta: 'No'
  solucion_pasos:
  - Cambian de manera multiplicativa, multiplicándose por la base $b$ en cada incremento unitario de $x$.
errores_frecuentes:
- Elegir un rango de exponentes demasiado amplio, dificultando visualizar los valores pequeños cerca de la asíntota.
- Confundir el patrón de cambio exponencial (multiplicativo) con el patrón lineal (aditivo).
- No incluir suficientes valores negativos para apreciar el comportamiento cerca de la asíntota.
- Cometer errores al calcular potencias con exponentes negativos o fraccionarios.
