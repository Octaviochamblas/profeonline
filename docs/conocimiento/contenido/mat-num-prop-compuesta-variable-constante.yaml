semantic_id: MAT.NUM.PROP_COMPUESTA.VARIABLE_CONSTANTE
objetivo: Resolver un problema de proporcionalidad compuesta unificando las relaciones.
introduccion: Ahora que sabes desarmar un problema compuesto identificando qué es
  directo y qué es inverso, es hora de armar el rompecabezas. Crearemos una gran ecuación
  matemática donde todo encaja perfectamente.
resumen: Para resolver, se iguala la fracción de la incógnita al producto de las demás
  fracciones, invirtiendo aquellas que tengan relación inversa con la incógnita.
explicacion: 'El método general de **reducción a la unidad** o de **igualación de
  razones** para resolver proporciones compuestas sigue la siguiente estructura:


  $$\frac{\text{Dato incógnita}}{\text{Incógnita } x} = (\text{Fracción } A) \cdot
  (\text{Fracción } B) \cdot ...$$


  Donde:

  - Si la variable $A$ es Directa, su fracción se escribe tal cual (Arriba/Abajo).

  - Si la variable $B$ es Inversa, su fracción se escribe invertida (Abajo/Arriba).


  Finalmente, se multiplican las fracciones del lado derecho y se aplica la regla
  de la cuarta proporcional (producto cruzado) para hallar $x$.'
procedimiento:
- 'Paso 1: Ordena en una tabla de 3 o más columnas. Pon la incógnita al final.'
- 'Paso 2: Escribe la ecuación poniendo la fracción de la columna incógnita sola en
  un lado.'
- 'Paso 3: Multiplica el resto de columnas. Si una era inversa, dales la vuelta a
  sus números antes de multiplicar. Despeja $x$.'
ejemplos:
- titulo: Problema completo
  enunciado: 5 obreros hacen 10 metros de muro en 4 días. ¿Cuántos días ($x$) demoran
    10 obreros en hacer 20 metros?
  solucion_pasos:
  - 'Incógnita: Días. Días con Obreros es Inversa (invierte). Días con Metros es Directa
    (mantiene).'
  - 'Fracción incógnita: $4 / x$. Fracciones: Obreros $5/10$ (invierte a $10/5$),
    Metros $10/20$ (mantiene $10/20$).'
  - 'Ecuación: $4/x = (10/5) \cdot (10/20) = 100/100 = 1$.'
  - $4/x = 1 \implies x = 4$ días.
errores_frecuentes:
- Equivocarse en la simplificación de las fracciones antes de multiplicar.
- Invertir la fracción de la incógnita en lugar de la variable inversa.
- Sumar las fracciones en vez de multiplicarlas.
- No escribir los datos ordenados en la tabla, mezclando filas.
fuente: Currículum Nacional MINEDUC.
estado: publicado
