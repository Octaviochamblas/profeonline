semantic_id: MAT.GEO.RELACIONES_TR.CALCULO_CATETO_PROYECCION
titulo: Cálculo de un cateto usando su proyección y la hipotenusa
objetivo: Aplicar la relación del cateto como media geométrica para resolver problemas numéricos concretos.
introduccion: Con la relación b²=c·m ya establecida, es momento de aplicarla directamente para resolver
  ejercicios numéricos donde se conocen la hipotenusa y una proyección.
resumen: Para calcular un cateto conocidas la hipotenusa y su proyección, se multiplica ambas y se extrae
  la raíz cuadrada.
explicacion: '![Cálculo de un cateto usando su proyección](/static/img/geometria/areas-pitagoras/relaciones-tr-calculo-cateto-proyeccion.svg)


  ### Definición formal


  Si la hipotenusa es $c=18$ y la proyección de un cateto es $m=8$, ese cateto es $b=\sqrt{18\times8}=\sqrt{144}=12$.


  ### Desarrollo didáctico


  Este cálculo es una aplicación numérica directa de la relación $b^2=c\cdot m$, útil cuando se conocen
  la hipotenusa completa y una de las dos proyecciones (no ambos catetos).'
procedimiento:
- 'Paso 1: Identifica la hipotenusa completa y la proyección del cateto buscado.'
- 'Paso 2: Multiplica ambos valores.'
- 'Paso 3: Calcula la raíz cuadrada del producto: ese es el cateto buscado.'
ejemplos:
- titulo: Calcular con hipotenusa 18 y proyección 8
  enunciado: La hipotenusa mide 18 y la proyección de un cateto es 8.
  solucion_pasos:
  - b=√(18×8)=√144=12.
- titulo: Calcular con hipotenusa 27 y proyección 3
  enunciado: La hipotenusa mide 27 y la proyección de un cateto es 3.
  solucion_pasos:
  - b=√(27×3)=√81=9.
- titulo: ¿Se puede aplicar esta relación sin conocer la hipotenusa completa?
  respuesta: 'No'
  solucion_pasos:
  - No, esta relación específica requiere conocer la hipotenusa y la proyección correspondiente.
- titulo: ¿El resultado siempre es menor que la hipotenusa?
  respuesta: Sí
  solucion_pasos:
  - Sí, todo cateto es menor que la hipotenusa en un triángulo rectángulo.
errores_frecuentes:
- Confundir cuál proyección corresponde al cateto que se busca.
- Multiplicar la proyección por sí misma en vez de por la hipotenusa.
- Olvidar extraer la raíz cuadrada al final.
fuente: Elaboración propia.
estado: publicado
