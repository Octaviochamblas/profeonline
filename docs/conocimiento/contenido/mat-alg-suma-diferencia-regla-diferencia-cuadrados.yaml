semantic_id: MAT.ALG.SUMA_DIFERENCIA.REGLA_DIFERENCIA_CUADRADOS
titulo: Aplicación de la regla de diferencia de cuadrados
objetivo: Aplicar la regla rápida del producto de una suma por su diferencia para calcular expresiones algebraicas.
introduccion: Este es probablemente el producto notable favorito de todos. Rápido, simple y sin términos centrales
  molestos.
resumen: 'La regla de la suma por diferencia es:

  **''El cuadrado del término idéntico, menos el cuadrado del término que cambia de signo.''**

  Fórmula: $(a+b)(a-b) = a^2 - b^2$'
explicacion: '### Definición formal


  Los productos cruzados son opuestos aditivos y se cancelan.


  ### Desarrollo didáctico


  La regla de suma por diferencia es posiblemente el producto notable más rápido y útil del álgebra. Nos permite
  saltarnos por completo el proceso de multiplicar término a término cuando detectamos binomios conjugados.


  **Fórmula de la regla:** $(a+b)(a-b) = a^2 - b^2$

  Al resultado de esta operación se le conoce formalmente como **Diferencia de Cuadrados**.


  **Regla en palabras:**

  El producto de una suma por su diferencia es igual al cuadrado del primer término (el que no cambia de signo)
  menos el cuadrado del segundo término (el que sí cambia de signo en los paréntesis).


  **Ejemplo de aplicación rápida:**

  Resuelve $(5x + 2y)(5x - 2y)$.

  - Primer término: $5x$. Su cuadrado es $(5x)^2 = 25x^2$.

  - Segundo término: $2y$. Su cuadrado es $(2y)^2 = 4y^2$.

  - Resultado final: Solo los restas. $\rightarrow 25x^2 - 4y^2$. No hay término central porque se cancela automáticamente.'
procedimiento:
- 'Paso 1: Pasos para aplicar la regla:'
- 'Paso 2: Identifica que es una suma por diferencia.'
- 'Paso 3: Ubica el término que NO cambia de signo (el término estable). Ése será tu $A$.'
- 'Paso 4: Ubica el término que SÍ cambia de signo (el término opuesto). Ése será tu $B$.'
- 'Paso 5: El resultado es $A^2 - B^2$. (Siempre es menos.).'
- Los productos cruzados son opuestos aditivos y se cancelan.
ejemplos:
- titulo: Aplicación directa
  enunciado: Calcula $(y - 8)(y + 8)$.
  solucion_pasos:
  - 'Término estable: $y$. Su cuadrado es $y^2$.'
  - 'Término que cambia: $8$. Su cuadrado es $64$.'
  - 'Resultado: $y^2 - 64$.'
- titulo: Variables en ambos términos
  enunciado: Desarrolla $(5x + 3y^2)(5x - 3y^2)$.
  solucion_pasos:
  - 'Cuadrado del primero: $(5x)^2 = 25x^2$.'
  - 'Cuadrado del segundo: $(3y^2)^2 = 9y^4$.'
  - 'Resultado: $25x^2 - 9y^4$.'
- titulo: 'Respecto de «Aplicación de la regla de diferencia de cuadrados»: ¿Es correcta esta caracteri'
  enunciado: 'Respecto de «Aplicación de la regla de diferencia de cuadrados»: ¿Es correcta esta caracterización?
    «La regla de la suma por diferencia es: **''El cuadrado del término idéntico, menos el cuadrado del término
    que cambia de signo.''** Fórmula: $(a+b)(a-b) = a^2 - b^2$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La regla de la suma por diferencia es: **''El cuadrado del
    término idéntico, menos el cuadrado del término que cambia de signo.''** Fórmula: $(a+b)(a-b) = a^2 - b^2$'
- titulo: 'Respecto de «Aplicación de la regla de diferencia de cuadrados»: ¿Es válida esta afirmación?'
  enunciado: 'Respecto de «Aplicación de la regla de diferencia de cuadrados»: ¿Es válida esta afirmación? «Poner
    un signo más en el resultado final: $(x-2)(x+2) = x^2 + 4$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La regla de la suma por diferencia es: **''El cuadrado del
    término idéntico, menos el cuadrado del término que cambia de signo.''** Fórmula: $(a+b)(a-b) = a^2 - b^2$'
errores_frecuentes:
- 'Poner un signo más en el resultado final: $(x-2)(x+2) = x^2 + 4$.'
- Porque la multiplicación de un positivo y un negativo siempre anula la variable.
- Porque es una regla preestablecida sin demostración algebraica.
- Porque los términos centrales se dividen por $1$.
- $4m^2 + 25n^2$.
