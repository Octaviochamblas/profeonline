semantic_id: MAT.EST.BINOMIAL_BASE.FUNCION_PROBABILIDAD
titulo: Aplicar la función de probabilidad del modelo binomial
objetivo: Aplicar la fórmula de la función de probabilidad binomial para calcular la probabilidad de obtener
  exactamente k éxitos en n ensayos.
introduccion: Esta fórmula combina el número de combinaciones posibles de ubicar los éxitos entre los
  ensayos, con las probabilidades de éxito y fracaso elevadas a las potencias correspondientes.
resumen: La función de probabilidad de una variable $X\sim B(n,p)$ es $P(X=k)=\binom{n}{k}p^{k}q^{n-k}$,
  donde $k$ es el número exacto de éxitos buscado.
explicacion: '![Función de probabilidad binomial](/static/img/probabilidad/binombase/binombase-funcion-probabilidad.svg)


  ### Definición formal


  $P(X=k)=C(n,k)\times p^{k}\times q^{n-k}$, para $k=0,1,\ldots,n$, donde $C(n,k)$ cuenta las formas de
  ubicar los $k$ éxitos entre los $n$ ensayos.


  ### Desarrollo didáctico


  Si $X\sim B(5;\,0{,}5)$ (lanzar una moneda 5 veces), la probabilidad de obtener exactamente 3 caras
  es $P(X=3)=C(5,3)\times0{,}5^3\times0{,}5^2=10\times0{,}125\times0{,}25=0{,}3125$.'
procedimiento:
- 'Paso 1: Identifica los valores de n, p, q=1-p y el número exacto de éxitos k que se busca.'
- 'Paso 2: Calcula C(n,k), el número de formas de ubicar los k éxitos entre los n ensayos.'
- 'Paso 3: Multiplica C(n,k) por p elevado a k y por q elevado a (n-k) para obtener P(X=k).'
ejemplos:
- titulo: Calcular P(X=3) con X~B(5; 0,5)
  enunciado: n=5, p=0,5, k=3.
  solucion_pasos:
  - P(X=3)=C(5,3)×0,5³×0,5²=10×0,125×0,25=0,3125.
- titulo: Calcular P(X=2) con X~B(4; 0,3)
  enunciado: n=4, p=0,3, k=2.
  solucion_pasos:
  - q=0,7. P(X=2)=C(4,2)×0,3²×0,7²=6×0,09×0,49=0,2646.
- titulo: ¿La fórmula binomial incluye el término C(n,k)?
  respuesta: Sí
  solucion_pasos:
  - Sí, cuenta las distintas formas de ordenar los k éxitos entre los n ensayos.
- titulo: ¿El exponente de q en la fórmula es (n-k)?
  respuesta: Sí
  solucion_pasos:
  - Sí, representa el número de fracasos, que es igual al total de ensayos menos los éxitos.
errores_frecuentes:
- Olvidar el factor combinatorio C(n,k), calculando solo p^k×q^(n-k).
- Confundir los exponentes de p y q, o calcular mal (n-k).
- No convertir correctamente p y q a valores decimales antes de aplicar la fórmula.
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
