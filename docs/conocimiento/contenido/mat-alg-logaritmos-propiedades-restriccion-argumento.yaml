semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.RESTRICCION_ARGUMENTO
titulo: Restricción del argumento al simplificar expresiones logarítmicas
objetivo: Verificar que los argumentos de una expresión logarítmica permanezcan positivos antes y después de
  aplicar propiedades algebraicas.
introduccion: Al separar o combinar logaritmos, el argumento cambia de forma, y es fácil perder de vista si sigue
  siendo positivo en cada nueva expresión.
resumen: Cada argumento involucrado en una propiedad logarítmica, tanto antes como después de aplicarla, debe
  cumplir la condición de ser **estrictamente positivo**.
explicacion: '### Definición formal


  Al aplicar $\log_b(xy)=\log_b(x)+\log_b(y)$, se exige $x>0$ y $y>0$ por separado, no solo que el producto
  $xy>0$. Esta distinción es crucial: $xy$ puede ser positivo aunque $x$ e $y$ sean ambos negativos, pero en ese
  caso $\log_b(x)$ y $\log_b(y)$ no estarían definidos.


  ### Desarrollo didáctico


  Considera $\log_b((-2)\cdot(-3))=\log_b(6)$, que sí está definido. Sin embargo, separarlo como
  $\log_b(-2)+\log_b(-3)$ no es válido, porque ni $-2$ ni $-3$ son argumentos positivos. La propiedad del
  producto solo puede aplicarse cuando ambos factores son positivos por separado.'
procedimiento:
- 'Paso 1: Identifica cada argumento individual involucrado en la expresión logarítmica.'
- 'Paso 2: Verifica que cada uno cumpla la condición de ser estrictamente positivo por separado.'
- 'Paso 3: Aplica la propiedad solo si todos los argumentos individuales son válidos.'
ejemplos:
- titulo: Verificación de argumentos antes de separar un producto
  enunciado: '¿Se puede aplicar $\log_2(xy)=\log_2(x)+\log_2(y)$ si $x=5$ e $y=3$?'
  solucion_pasos:
  - Se verifica que $x=5>0$ e $y=3>0$ por separado.
  - Sí, ambos son positivos, así que la propiedad es aplicable.
- titulo: Detección de un argumento inválido al separar
  enunciado: '¿Se puede aplicar la propiedad del producto a $\log_3((-4)\cdot(-5))$ separando en dos logaritmos?'
  solucion_pasos:
  - Se verifica cada factor por separado: $-4<0$ y $-5<0$.
  - No, aunque el producto $20$ sea positivo, no se puede separar porque los factores individuales son negativos.
- titulo: ¿Basta con que el producto de los argumentos sea positivo para separar el logaritmo?
  enunciado: ¿Es suficiente que $xy>0$ para poder aplicar $\log_b(xy)=\log_b(x)+\log_b(y)$?
  respuesta: 'No'
  solucion_pasos:
  - Se exige que $x>0$ y $y>0$ por separado, no solo que su producto sea positivo.
- titulo: ¿La restricción del argumento aplica también al cociente?
  enunciado: ¿La condición de positividad por separado también se exige en $\log_b(x/y)=\log_b(x)-\log_b(y)$?
  respuesta: Sí
  solucion_pasos:
  - Tanto $x$ como $y$ deben ser positivos individualmente para que ambos logaritmos estén definidos.
errores_frecuentes:
- Suponer que basta con que el resultado final del argumento sea positivo, ignorando los factores individuales.
- Separar $\log_b(xy)$ en $\log_b(x)+\log_b(y)$ sin verificar el signo de $x$ e $y$ por separado.
- Aplicar la propiedad del cociente sin comprobar que numerador y denominador sean ambos positivos.
- Confundir la restricción del argumento con la restricción de la base.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
