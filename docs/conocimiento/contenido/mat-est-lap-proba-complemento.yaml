semantic_id: MAT.EST.LAPLACE_MUESTRALES.PROBA_COMPLEMENTO
titulo: Cálculo de la probabilidad del evento complementario
objetivo: Calcular la probabilidad del complemento de un evento, usando la relación de que la probabilidad
  de un evento y la de su complemento suman siempre 1.
introduccion: En algunos problemas resulta mucho más simple calcular la probabilidad de que algo NO ocurra,
  y luego restarla de 1 para obtener la probabilidad de que sí ocurra.
resumen: La probabilidad del complemento de un evento $A$ se calcula como $P(A^c)=1-P(A)$.
explicacion: '![Probabilidad del complemento](/static/img/probabilidad/laplace/lap-proba-complemento.svg)


  ### Definición formal


  Como $A\cup A^c=S$ y $A\cap A^c=\emptyset$, se cumple que $P(A)+P(A^c)=1$, de donde $P(A^c)=1-P(A)$.


  ### Desarrollo didáctico


  Si la probabilidad de obtener un número par al lanzar un dado es $P(A)=0{,}5$, entonces la probabilidad
  de obtener un número impar (el complemento) es $P(A^c)=1-0{,}5=0{,}5$.'
procedimiento:
- 'Paso 1: Calcula la probabilidad del evento original P(A).'
- 'Paso 2: Aplica la fórmula P(Aᶜ)=1-P(A).'
- 'Paso 3: El resultado es la probabilidad del evento complementario.'
ejemplos:
- titulo: Calcular la probabilidad de 'no obtener un 6' al lanzar un dado
  enunciado: P(A)=P(obtener 6)=1/6.
  solucion_pasos:
  - P(Aᶜ)=1-1/6=5/6.
- titulo: Calcular la probabilidad de 'no llover' si P(llover)=0,3
  enunciado: P(A)=0,3.
  solucion_pasos:
  - P(Aᶜ)=1-0,3=0,7.
- titulo: ¿La suma de la probabilidad de un evento y su complemento es siempre 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad fundamental que permite este cálculo.
- titulo: ¿Es útil esta fórmula cuando calcular directamente P(A) es complicado?
  respuesta: Sí
  solucion_pasos:
  - Sí, a veces es mucho más simple calcular P(Aᶜ) y luego restarla de 1.
errores_frecuentes:
- Olvidar restar de 1, calculando el complemento incorrectamente.
- Confundir el complemento de un evento con otro evento no relacionado.
- Aplicar esta fórmula sin haber calculado correctamente la probabilidad original P(A).
fuente: 'Elaboración propia (referencia: Moraleja 404).'
estado: publicado
