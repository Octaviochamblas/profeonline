semantic_id: MAT.GEO.TRIGONOMETRIA_BASICA.CALCULO_LADOS
titulo: Cálculo de lados desconocidos de un triángulo rectángulo usando razones trigonométricas
objetivo: Aplicar las razones trigonométricas (seno, coseno o tangente) para calcular un lado desconocido
  de un triángulo rectángulo, conociendo un ángulo y otro lado.
introduccion: 'Con las tres razones trigonométricas ya definidas, es posible resolver un problema muy
  común: encontrar un lado desconocido de un triángulo rectángulo cuando se conoce un ángulo agudo y otro
  lado.'
resumen: Para calcular un lado desconocido, se elige la razón trigonométrica (seno, coseno o tangente)
  que relacione el lado conocido, el ángulo dado y el lado buscado.
explicacion: '![Cálculo de lados con razones trigonométricas](/static/img/geometria/areas-pitagoras/trig-calculo-lados.svg)


  ### Definición formal


  Si se conoce el ángulo α y el cateto adyacente, y se busca el cateto opuesto x, se usa $\tan(\alpha)=\frac{x}{\text{adyacente}}$,
  despejando $x=\text{adyacente}\times\tan(\alpha)$.


  ### Desarrollo didáctico


  Con α=37° y cateto adyacente de 8 cm, el cateto opuesto es $x=8\times\tan(37°)\approx8\times0,754\approx6,03$
  cm. La elección de qué razón usar depende de cuáles dos lados (de los tres posibles) están involucrados:
  si se busca la hipotenusa con un cateto, se usa seno o coseno; si se relacionan los dos catetos, se
  usa tangente.'
procedimiento:
- 'Paso 1: Identifica el ángulo conocido y los lados involucrados (el conocido y el que se busca).'
- 'Paso 2: Elige la razón trigonométrica (seno, coseno o tangente) que relacione esos dos lados con el
  ángulo.'
- 'Paso 3: Despeja el lado desconocido y calcula su valor usando la calculadora.'
ejemplos:
- titulo: Calcular el cateto opuesto con tangente
  enunciado: Un triángulo rectángulo tiene α=37° y cateto adyacente de 8 cm.
  solucion_pasos:
  - x=8×tan(37°)≈8×0,754≈6,03 cm.
- titulo: Calcular la hipotenusa con seno
  enunciado: Un triángulo rectángulo tiene α=30° y cateto opuesto de 5 cm.
  solucion_pasos:
  - h=5/sen(30°)=5/0,5=10 cm.
- titulo: ¿Se necesita siempre la hipotenusa para calcular un lado desconocido?
  respuesta: 'No'
  solucion_pasos:
  - No, si se conocen los dos catetos y el ángulo, se puede usar tangente sin necesitar la hipotenusa.
- titulo: ¿Es necesario elegir la razón correcta según los lados dados?
  respuesta: Sí
  solucion_pasos:
  - Sí, usar la razón equivocada llevaría a un despeje incorrecto.
errores_frecuentes:
- Elegir la razón trigonométrica incorrecta para los lados involucrados.
- Despejar mal la incógnita al momento de resolver la ecuación.
- Usar la calculadora en modo radianes cuando el ángulo está en grados (o viceversa).
fuente: 'Fuente: Moraleja 53, Cid 221.'
estado: publicado
