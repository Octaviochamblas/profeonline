semantic_id: MAT.GEO.ROTACION_PLANO.SENTIDO_ROTACION
titulo: Identificación del sentido de rotación
objetivo: Reconocer el sentido de rotación como la orientación del giro (horario o antihorario) alrededor
  del centro de rotación.
introduccion: 'El sentido de rotación indica ''hacia qué lado gira'' la figura: en el mismo sentido que
  las manecillas del reloj, o en sentido contrario.'
resumen: 'El sentido de rotación indica la orientación del giro: horario (en el mismo sentido que las
  manecillas del reloj) o antihorario (en sentido contrario).'
explicacion: '![Sentido de rotación](/static/img/geometria/isometrias/rotacion-sentido.svg)


  ### Definición formal


  El sentido de rotación describe si el giro se realiza en sentido horario (igual al de las manecillas
  de un reloj) o antihorario (contrario a las manecillas de un reloj). Por convención matemática, el sentido
  antihorario corresponde a ángulos positivos, y el horario a ángulos negativos.


  ### Desarrollo didáctico


  En la figura, la flecha curva indica el sentido de rotación: si apunta en sentido contrario a las manecillas
  del reloj, la rotación es antihoraria (ángulo positivo); si apunta en el mismo sentido que las manecillas,
  es horaria (ángulo negativo).'
procedimiento:
- 'Paso 1: Observa la dirección del giro entre el punto original y su imagen.'
- 'Paso 2: Compara esa dirección con el movimiento de las manecillas de un reloj.'
- 'Paso 3: Si coincide con las manecillas, el sentido es horario; si es contrario, es antihorario.'
ejemplos:
- titulo: Determinar el sentido de una rotación
  enunciado: Un punto gira en la misma dirección que las manecillas de un reloj.
  solucion_pasos:
  - Esa rotación tiene sentido horario.
- titulo: Reconocer una rotación antihoraria
  enunciado: Un punto gira en dirección contraria a las manecillas del reloj.
  solucion_pasos:
  - Esa rotación tiene sentido antihorario.
- titulo: ¿El sentido antihorario corresponde a ángulos positivos por convención?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la convención matemática estándar para expresar ángulos de rotación.
- titulo: ¿El sentido de rotación afecta la magnitud del ángulo, o solo su signo?
  respuesta: 'No'
  solucion_pasos:
  - El sentido solo afecta el signo (positivo o negativo) del ángulo, no su magnitud.
errores_frecuentes:
- Confundir el sentido horario con el antihorario al describir una rotación.
- 'Olvidar la convención de signos: antihorario positivo, horario negativo.'
- Creer que el sentido de rotación cambia la distancia al centro de rotación.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 128, Cid 75).'
estado: publicado
