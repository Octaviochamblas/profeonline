semantic_id: MAT.NUM.VARIACION_PORCENTUAL.VALOR_FINAL_AUMENTO
titulo: Cálculo del valor final con aumento porcentual
objetivo: Calcular el valor final tras aplicar un aumento porcentual en un solo paso.
introduccion: Si trabajas en comercio, no tienes tiempo para calcular el impuesto (IVA) y luego sumarlo
  al producto a mano en la calculadora en dos pasos. Tienes que saber hacerlo multiplicando por un solo
  número mágico.
resumen: 'Para aplicar un aumento del $A\%$ en un solo paso, debes multiplicar el Valor Inicial por el
  factor multiplicador: $(1 + A/100)$. Ej: Aumentar 19% es multiplicar por $1.19$.'
explicacion: 'Profundizamos el concepto del factor de variación.

  La fórmula para hallar el Valor Final tras un aumento del $A\%$ es:


  $$\text{Valor Final} = \text{Valor Inicial} \cdot \left( 1 + \frac{A}{100} \right)$$


  Ese paréntesis $(1 + A/100)$ se conoce como **factor multiplicador**.

  - Si el IVA es $19\%$, el factor es $1 + 0.19 = 1.19$. Si multiplicas el precio neto por $1.19$, obtienes
  inmediatamente el precio con IVA incluido.

  - Si hay un aumento inflacionario del $4\%$, el factor es $1 + 0.04 = 1.04$. (¡Cuidado con poner $1.4$,
  eso sería un $40\%$!).'
procedimiento:
- 'Paso 1: Escribe el porcentaje de aumento como un decimal (dividiendo por 100).'
- 'Paso 2: Súmale 1 entero a ese decimal. Este es tu factor multiplicador.'
- 'Paso 3: Multiplica el Valor Inicial por este factor.'
ejemplos:
- titulo: Precio con IVA
  enunciado: Un monitor cuesta $100.000 neto. Si el IVA es del 19%, ¿cuál es el precio bruto (final)?
  solucion_pasos:
  - 'Convertimos 19% a decimal: $0.19$.'
  - 'Sumamos 1: El factor es $1.19$.'
  - 'Multiplicamos: $100.000 \cdot 1.19 = 119.000$.'
  - El precio final es $119.000.
errores_frecuentes:
- Confundir el factor de aumento del 5% ($1.05$) con el del 50% ($1.5$).
- Multiplicar solo por $0.19$ (obteniendo el valor del impuesto y olvidando sumar el 1 inicial).
fuente: Currículum Nacional MINEDUC.
estado: publicado
