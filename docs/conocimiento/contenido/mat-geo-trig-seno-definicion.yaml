semantic_id: MAT.GEO.TRIG_FUNDAMENTAL.SENO_DEFINICION
titulo: Definición de seno de un ángulo agudo como cateto opuesto sobre hipotenusa
objetivo: Definir el seno de un ángulo agudo de un triángulo rectángulo como el cociente entre el cateto
  opuesto y la hipotenusa.
introduccion: El seno es una de las tres razones trigonométricas fundamentales, y compara el lado 'de
  enfrente' del ángulo con el lado más largo del triángulo (la hipotenusa).
resumen: 'El seno de un ángulo agudo $\theta$ en un triángulo rectángulo es la razón entre el cateto opuesto
  a $\theta$ y la hipotenusa: $\sin\theta=\dfrac{\text{cateto opuesto}}{\text{hipotenusa}}$.'
explicacion: '![Definición de seno](/static/img/geometria/trigonometria/trig-seno-definicion.svg)


  ### Definición formal


  En un triángulo rectángulo con ángulo agudo $\theta$, el seno se define como $\sin\theta=\dfrac{\text{cateto
  opuesto}}{\text{hipotenusa}}$, donde el cateto opuesto es el lado que no forma parte del ángulo $\theta$,
  y la hipotenusa es el lado opuesto al ángulo recto.


  ### Desarrollo didáctico


  En la figura, el ángulo $\theta$ está en el vértice $B$. El cateto opuesto a $\theta$ es el lado $AC$
  (vertical), y la hipotenusa es el lado $BC$. Por lo tanto, $\sin\theta=\dfrac{AC}{BC}$.'
procedimiento:
- 'Paso 1: Identifica el ángulo agudo θ en el triángulo rectángulo y ubica el vértice donde se encuentra.'
- 'Paso 2: Identifica el cateto opuesto a θ (el lado que no toca ese vértice) y la hipotenusa (el lado
  opuesto al ángulo recto).'
- 'Paso 3: Calcula sinθ como el cociente entre la longitud del cateto opuesto y la longitud de la hipotenusa.'
ejemplos:
- titulo: Calcular el seno de un ángulo con medidas conocidas
  enunciado: En un triángulo rectángulo, el cateto opuesto a θ mide 3 cm y la hipotenusa mide 5 cm.
  solucion_pasos:
  - sinθ=3/5=0,6.
- titulo: Identificar el cateto opuesto correctamente
  enunciado: El ángulo θ está en el vértice B de un triángulo rectángulo con ángulo recto en A.
  solucion_pasos:
  - El cateto opuesto a θ es el lado AC, ya que no forma parte del ángulo θ (no toca el vértice B).
- titulo: ¿El seno depende del tamaño específico del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, el seno de un ángulo depende solo de su medida, no del tamaño del triángulo (triángulos semejantes
    dan el mismo seno).
- titulo: ¿La hipotenusa es siempre el lado más largo del triángulo rectángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, la hipotenusa (opuesta al ángulo recto) es siempre el lado de mayor longitud en un triángulo rectángulo.
errores_frecuentes:
- Confundir el cateto opuesto con el cateto adyacente al calcular el seno.
- Usar la hipotenusa incorrecta (confundirla con uno de los catetos).
- Aplicar la definición de seno en triángulos que no son rectángulos.
fuente: 'Elaboración propia (referencias: Moraleja 175, Cid 155).'
estado: publicado
