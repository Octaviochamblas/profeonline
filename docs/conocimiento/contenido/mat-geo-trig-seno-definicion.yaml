semantic_id: MAT.GEO.TRIGONOMETRIA_BASICA.SENO_DEFINICION
titulo: Definición del seno de un ángulo agudo como razón cateto opuesto / hipotenusa
objetivo: Comprender el seno de un ángulo agudo en un triángulo rectángulo como la razón entre el cateto
  opuesto y la hipotenusa.
introduccion: En un triángulo rectángulo, cada ángulo agudo tiene asociadas tres razones fijas entre sus
  lados; la primera y más usada es el seno.
resumen: 'El seno de un ángulo agudo α en un triángulo rectángulo es la razón entre el cateto opuesto
  a α y la hipotenusa: $\text{sen}(\alpha)=\frac{\text{cateto opuesto}}{\text{hipotenusa}}$.'
explicacion: '![Definición del seno](/static/img/geometria/areas-pitagoras/trig-seno-definicion.svg)


  ### Definición formal


  Dado un ángulo agudo $\alpha$ en un triángulo rectángulo, $\text{sen}(\alpha)=\frac{\text{cateto opuesto
  a }\alpha}{\text{hipotenusa}}$.


  ### Desarrollo didáctico


  En un triángulo rectángulo con cateto opuesto a α de 3 cm e hipotenusa de 5 cm, $\text{sen}(\alpha)=\frac{3}{5}=0,6$.
  Este valor no depende del tamaño del triángulo, solo de la medida del ángulo α, ya que todos los triángulos
  semejantes con ese ángulo tienen la misma razón.'
procedimiento:
- 'Paso 1: Identifica el ángulo agudo α del que quieres calcular el seno.'
- 'Paso 2: Identifica el cateto opuesto a ese ángulo (el que no lo toca) y la hipotenusa.'
- 'Paso 3: Divide el cateto opuesto entre la hipotenusa.'
ejemplos:
- titulo: Calcular sen(α) con cateto opuesto 3 e hipotenusa 5
  enunciado: Un triángulo rectángulo tiene cateto opuesto a α de 3 cm e hipotenusa de 5 cm.
  solucion_pasos:
  - sen(α)=3/5=0,6.
- titulo: Calcular sen(α) con cateto opuesto 8 e hipotenusa 10
  enunciado: Un triángulo rectángulo tiene cateto opuesto a α de 8 cm e hipotenusa de 10 cm.
  solucion_pasos:
  - sen(α)=8/10=0,8.
- titulo: ¿El seno depende del tamaño del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, depende solo del ángulo; triángulos semejantes con el mismo ángulo tienen el mismo seno.
- titulo: ¿El seno puede ser mayor que 1?
  respuesta: 'No'
  solucion_pasos:
  - No, porque el cateto opuesto siempre es menor que la hipotenusa en un triángulo rectángulo.
errores_frecuentes:
- Confundir el cateto opuesto con el cateto adyacente al calcular el seno.
- Usar un lado que no es la hipotenusa como denominador.
- Aplicar la razón del seno a un ángulo que no es agudo (por ejemplo, al ángulo recto).
fuente: 'Fuente: Moraleja 53, Cid 221.'
estado: publicado
