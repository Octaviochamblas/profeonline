semantic_id: MAT.EST.MEDIANA_ANALISIS.CALCULO_PAR
titulo: Determinar la mediana para un número par de datos
objetivo: Determinar la mediana de un conjunto con número par de datos, calculando el promedio de los
  dos valores centrales.
introduccion: Cuando el conjunto tiene un número par de datos, no existe un único valor central, sino
  dos, por lo que se promedian.
resumen: Con un número par de datos ordenados, la mediana es el promedio de los dos valores que ocupan
  las posiciones centrales del conjunto.
explicacion: '![Mediana con número par de datos](/static/img/estadistica/mediana/mediana-calculo-par.svg)


  ### Definición formal


  Con $n$ par, la mediana es el promedio de los valores en las posiciones $n/2$ y $n/2+1$: $Me=\dfrac{x_{(n/2)}+x_{(n/2+1)}}{2}$.


  ### Desarrollo didáctico


  Con 6 datos ordenados {2,4,6,8,10,12}, las posiciones centrales son 3 y 4 (valores 6 y 8), por lo que
  la mediana es $(6+8)/2=7$.'
procedimiento:
- 'Paso 1: Ordena el conjunto de datos de menor a mayor.'
- 'Paso 2: Identifica los dos valores que ocupan las posiciones centrales (n/2 y n/2+1).'
- 'Paso 3: Calcula el promedio de esos dos valores centrales para obtener la mediana.'
ejemplos:
- titulo: Calcular la mediana con 6 datos
  enunciado: 'Datos ordenados: 2,4,6,8,10,12 (n=6).'
  solucion_pasos:
  - 'Posiciones centrales: 3 y 4 (valores 6 y 8). Mediana=(6+8)/2=7.'
- titulo: Calcular la mediana con 4 datos
  enunciado: 'Datos ordenados: 5,7,9,11 (n=4).'
  solucion_pasos:
  - 'Posiciones centrales: 2 y 3 (valores 7 y 9). Mediana=(7+9)/2=8.'
- titulo: ¿Con número par de datos, la mediana puede ser un valor que no está en el conjunto original?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que es el promedio de dos valores centrales, que puede no coincidir con ningún dato original.
- titulo: ¿Con número par de datos, siempre se deben promediar exactamente dos valores centrales?
  respuesta: Sí
  solucion_pasos:
  - Sí, son los dos valores que ocupan las posiciones centrales del conjunto ordenado.
errores_frecuentes:
- Tomar solo uno de los dos valores centrales como si fuera la mediana, sin promediarlos.
- Calcular incorrectamente las posiciones centrales (n/2 y n/2+1) del conjunto.
- Olvidar ordenar los datos antes de identificar los valores centrales a promediar.
fuente: 'Elaboración propia (referencia: Moraleja 359).'
estado: publicado
