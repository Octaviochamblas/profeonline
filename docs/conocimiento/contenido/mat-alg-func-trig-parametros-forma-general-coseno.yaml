semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.FORMA_GENERAL_COSENO
titulo: Forma general de la función coseno transformada
objetivo: Identificar los parámetros $a$, $b$, $c$ y $d$ en la forma general $f(x)=a\cos(b(x-c))+d$.
introduccion: Igual que el seno, la función coseno básica se transforma con los mismos cuatro parámetros, con el
  mismo significado en cada caso.
resumen: La forma general de la función coseno transformada es $f(x)=a\cos(b(x-c))+d$, donde $a$ controla la
  amplitud, $b$ el periodo, $c$ el desplazamiento horizontal y $d$ el desplazamiento vertical.
explicacion: '### Definición formal


  En $f(x)=a\cos(b(x-c))+d$: $|a|$ es la amplitud, $2\pi/|b|$ es el periodo, $c$ es el desplazamiento
  horizontal, y $d$ es el desplazamiento vertical. Los parámetros funcionan exactamente igual que en la
  función seno transformada.


  ### Desarrollo didáctico


  En $f(x)=2\cos(4(x+1))-3$: $a=2$ (amplitud), $b=4$ (afecta el periodo), $c=-1$ (desplazamiento horizontal,
  ya que $x+1=x-(-1)$), $d=-3$ (línea media en $y=-3$).'
procedimiento:
- 'Paso 1: Reescribe la función en la forma estándar $a\cos(b(x-c))+d$ si no está en ese formato.'
- 'Paso 2: Identifica cada uno de los cuatro parámetros.'
- 'Paso 3: Relaciona cada parámetro con su efecto correspondiente en la gráfica.'
ejemplos:
- titulo: Identificación de los cuatro parámetros
  enunciado: 'Identifica $a$, $b$, $c$ y $d$ en $f(x)=5\cos(2(x-3))+4$.'
  solucion_pasos:
  - Se compara con la forma general.
  - '$a=5$, $b=2$, $c=3$, $d=4$.'
- titulo: Reescritura a la forma estándar
  enunciado: 'Reescribe $f(x)=3\cos(2x+4)$ en la forma $a\cos(b(x-c))+d$.'
  solucion_pasos:
  - Se factoriza $2x+4=2(x+2)=2(x-(-2))$.
  - 'Se obtiene $f(x)=3\cos(2(x-(-2)))$, con $a=3$, $b=2$, $c=-2$, $d=0$.'
- titulo: ¿El parámetro $b$ afecta la amplitud de la función?
  enunciado: ¿El parámetro $b$ afecta la amplitud de la función coseno transformada?
  respuesta: 'No'
  solucion_pasos:
  - El parámetro $b$ afecta el periodo; la amplitud depende de $a$.
- titulo: ¿Los parámetros de la forma general tienen el mismo significado en seno y coseno?
  enunciado: ¿Los parámetros $a$, $b$, $c$ y $d$ tienen el mismo significado en la forma general del seno y del
    coseno?
  respuesta: Sí
  solucion_pasos:
  - Ambas funciones se transforman de la misma manera con estos cuatro parámetros.
errores_frecuentes:
- Confundir el rol de cada parámetro entre sí.
- No factorizar correctamente para identificar $c$.
- Suponer que el parámetro $c$ va sumado en vez de restado dentro del paréntesis.
- Olvidar identificar alguno de los cuatro parámetros al analizar la función.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
