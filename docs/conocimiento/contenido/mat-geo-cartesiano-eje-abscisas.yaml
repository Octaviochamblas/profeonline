semantic_id: MAT.GEO.CARTESIANO_BASE.EJE_ABSCISAS
titulo: Identificación del eje de las abscisas en el plano cartesiano
objetivo: Identificar el eje de las abscisas (eje X) como la recta horizontal del plano cartesiano.
introduccion: 'El eje de las abscisas es la ''línea del piso'' del plano cartesiano: la recta horizontal
  sobre la que se miden los valores de x.'
resumen: El eje de las abscisas, o eje X, es la recta horizontal del plano cartesiano, sobre la cual se
  representa la primera coordenada (x) de cualquier punto.
explicacion: '![Eje de las abscisas](/static/img/geometria/cartesiano-vectores/cartesiano-eje-abscisas.svg)


  ### Definición formal


  El eje de las abscisas (eje X) es la recta horizontal del plano cartesiano. Todos los puntos sobre esta
  recta tienen su segunda coordenada (y) igual a cero.


  ### Desarrollo didáctico


  En la figura, el eje horizontal resaltado es el eje de las abscisas. Cualquier valor medido a lo largo
  de esta recta corresponde a la coordenada x de un punto.'
procedimiento:
- 'Paso 1: Identifica la recta horizontal del plano cartesiano.'
- 'Paso 2: Reconoce que esa recta es el eje de las abscisas (eje X).'
- 'Paso 3: Recuerda que todo punto sobre este eje tiene su coordenada y igual a 0.'
ejemplos:
- titulo: Identificar el eje de las abscisas
  enunciado: En un plano cartesiano se traza la recta horizontal.
  solucion_pasos:
  - Esa recta horizontal es el eje de las abscisas, también llamado eje X.
- titulo: Reconocer un punto sobre el eje de las abscisas
  enunciado: El punto (5,0) está en el plano cartesiano.
  solucion_pasos:
  - Como su coordenada y es 0, el punto (5,0) está exactamente sobre el eje de las abscisas.
- titulo: ¿El eje de las abscisas es horizontal?
  respuesta: Sí
  solucion_pasos:
  - Sí, por convención, el eje de las abscisas (eje X) es siempre la recta horizontal.
- titulo: ¿Todos los puntos sobre el eje de las abscisas tienen y=0?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la característica que define a los puntos ubicados sobre este eje.
errores_frecuentes:
- Confundir el eje de las abscisas con el eje de las ordenadas (vertical).
- Creer que los puntos sobre el eje de las abscisas tienen x=0 en vez de y=0.
- No reconocer visualmente cuál de los dos ejes es el horizontal.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Baldor 292).'
estado: publicado
