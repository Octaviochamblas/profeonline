semantic_id: MAT.GEO.TEOREMA_COSENOS.ENUNCIADO
titulo: 'Enunciado del teorema del coseno: a² = b² + c² − 2bc·cos(A)'
objetivo: Comprender el teorema del coseno como una generalización del teorema de Pitágoras para cualquier
  triángulo, no solo los rectángulos.
introduccion: 'El teorema de Pitágoras solo funciona en triángulos rectángulos. Para relacionar los lados
  de un triángulo cualquiera, sin ángulo recto, se necesita una herramienta más general: el teorema del
  coseno.'
resumen: 'El teorema del coseno establece que en cualquier triángulo con lados $a$, $b$, $c$ y ángulo
  $A$ opuesto al lado $a$: $a^2=b^2+c^2-2bc\cos(A)$.'
explicacion: '![Enunciado del teorema del coseno](/static/img/geometria/areas-pitagoras/cosenos-enunciado.svg)


  ### Definición formal


  Para un triángulo de lados $a$, $b$, $c$, con $A$ el ángulo opuesto al lado $a$: $a^2=b^2+c^2-2bc\cos(A)$.
  Existen fórmulas análogas para $b^2$ y $c^2$, cambiando el ángulo correspondiente.


  ### Desarrollo didáctico


  Si el ángulo A mide 90°, entonces cos(90°)=0, y la fórmula se reduce exactamente a $a^2=b^2+c^2$, el
  teorema de Pitágoras. Esto muestra que el teorema del coseno es una generalización: Pitágoras es un
  caso particular cuando el ángulo es recto.'
procedimiento:
- 'Paso 1: Identifica el lado que quieres calcular y el ángulo opuesto a ese lado.'
- 'Paso 2: Identifica los otros dos lados del triángulo.'
- 'Paso 3: Sustituye los valores en la fórmula a²=b²+c²−2bc·cos(A).'
ejemplos:
- titulo: Reconocer el teorema como generalización de Pitágoras
  enunciado: ¿Qué ocurre con el teorema del coseno si el ángulo A es 90°?
  solucion_pasos:
  - cos(90°)=0, por lo que la fórmula se reduce a a²=b²+c², el teorema de Pitágoras.
- titulo: Identificar los elementos de la fórmula
  enunciado: En la fórmula a²=b²+c²−2bc·cos(A), ¿qué representa A?
  solucion_pasos:
  - A es el ángulo opuesto al lado a, el lado que se está calculando.
- titulo: ¿Este teorema aplica solo a triángulos rectángulos?
  respuesta: 'No'
  solucion_pasos:
  - No, aplica a cualquier triángulo, sea acutángulo, rectángulo u obtusángulo.
- titulo: ¿El teorema del coseno reemplaza al teorema de Pitágoras?
  respuesta: 'No'
  solucion_pasos:
  - 'No lo reemplaza, lo generaliza: Pitágoras es un caso particular del teorema del coseno.'
errores_frecuentes:
- Usar un ángulo que no es el opuesto al lado que se está calculando.
- Olvidar el signo negativo en el término −2bc·cos(A).
- Aplicar la fórmula de Pitágoras a un triángulo que no es rectángulo, en vez del teorema del coseno.
fuente: 'Fuente: Moraleja 55.'
estado: publicado
