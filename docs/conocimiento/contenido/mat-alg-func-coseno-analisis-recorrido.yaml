semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.RECORRIDO
titulo: Recorrido de la función coseno
objetivo: Determinar que el recorrido de $f(x)=\cos(x)$ es el intervalo $[-1,1]$.
introduccion: Al igual que el seno, el resultado del coseno siempre queda restringido a un rango pequeño y fijo
  de valores.
resumen: El recorrido de $f(x)=\cos(x)$ es el intervalo **$[-1,1]$**, ya que el valor del coseno corresponde a
  una coordenada del círculo unitario, que nunca supera ese rango.
explicacion: '### Definición formal


  Como $\cos(x)$ es la coordenada $x$ de un punto sobre el círculo unitario, y todo punto del círculo cumple
  $-1\leq x\leq1$, se concluye que $-1\leq\cos(x)\leq1$ para todo $x$. Los valores extremos $-1$ y $1$ sí se
  alcanzan.


  ### Desarrollo didáctico


  El máximo $\cos(x)=1$ se alcanza en $x=0$ (y en todos sus coterminales); el mínimo $\cos(x)=-1$ se alcanza en
  $x=\pi$. Ningún valor de $x$ produce un resultado fuera de $[-1,1]$.'
procedimiento:
- 'Paso 1: Recuerda que $\cos(x)$ representa una coordenada del círculo unitario.'
- 'Paso 2: Verifica que esa coordenada siempre está entre $-1$ y $1$, inclusive.'
- 'Paso 3: Concluye que el recorrido es $[-1,1]$.'
ejemplos:
- titulo: Verificación de un valor dentro del recorrido
  enunciado: '¿Pertenece $0{,}87$ al recorrido de $f(x)=\cos(x)$?'
  solucion_pasos:
  - Se verifica que $-1\leq0{,}87\leq1$.
  - Sí, pertenece al recorrido, y de hecho $\cos(\pi/6)\approx0{,}87$.
- titulo: Detección de un valor fuera del recorrido
  enunciado: '¿Pertenece $-1{,}2$ al recorrido de $f(x)=\cos(x)$?'
  solucion_pasos:
  - Se verifica que $-1{,}2<-1$.
  - No, no existe ningún $x$ tal que $\cos(x)=-1{,}2$.
- titulo: ¿El coseno puede alcanzar exactamente el valor $-1$?
  enunciado: ¿Existe algún valor de $x$ para el cual $\cos(x)=-1$ exactamente?
  respuesta: Sí
  solucion_pasos:
  - 'Se alcanza en $x=\pi$, y en todos sus ángulos coterminales.'
- titulo: ¿El recorrido del coseno es igual al del seno?
  enunciado: ¿El recorrido de $f(x)=\cos(x)$ es el mismo intervalo que el recorrido de $g(x)=\sin(x)$?
  respuesta: Sí
  solucion_pasos:
  - Ambas funciones tienen recorrido $[-1,1]$, aunque alcancen esos valores en distintos puntos.
errores_frecuentes:
- Confundir el recorrido con el dominio, que es todo $\mathbb{R}$.
- Excluir los valores extremos $-1$ y $1$, cuando sí se alcanzan.
- Suponer que el coseno puede tomar valores mayores que $1$ o menores que $-1$.
- No relacionar el recorrido con la definición del coseno como coordenada del círculo unitario.
