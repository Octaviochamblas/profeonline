semantic_id: MAT.EST.PROBA_COND_BASE.FORMULA_INTERSECCION
titulo: Fórmula de probabilidad condicional mediante intersección de eventos
objetivo: Aplicar la fórmula formal de la probabilidad condicional, que relaciona la probabilidad de la
  intersección de dos eventos con la probabilidad del evento condicionante.
introduccion: Existe una fórmula precisa que permite calcular la probabilidad condicional a partir de
  las probabilidades de la intersección y del evento condicionante, sin necesidad de contar directamente
  elementos del espacio restringido.
resumen: La probabilidad condicional de $A$ dado $B$ se calcula como $P(A|B)=\dfrac{P(A\cap B)}{P(B)}$.
explicacion: '![Fórmula de probabilidad condicional](/static/img/probabilidad/condbase/condbase-formula-interseccion.svg)


  ### Definición formal


  La fórmula $P(A|B)=\dfrac{P(A\cap B)}{P(B)}$ es la definición formal de la probabilidad condicional,
  válida siempre que $P(B)>0$.


  ### Desarrollo didáctico


  Si $P(A\cap B)=0{,}2$ y $P(B)=0{,}5$, entonces $P(A|B)=\dfrac{0{,}2}{0{,}5}=0{,}4$.'
procedimiento:
- 'Paso 1: Identifica (o calcula) la probabilidad de la intersección P(A∩B).'
- 'Paso 2: Identifica (o calcula) la probabilidad del evento condicionante P(B).'
- 'Paso 3: Divide P(A∩B) por P(B) para obtener P(A|B).'
ejemplos:
- titulo: Calcular P(A|B) con datos dados
  enunciado: P(A∩B)=0,2, P(B)=0,5.
  solucion_pasos:
  - P(A|B)=0,2/0,5=0,4.
- titulo: Calcular P(A|B) al lanzar un dado
  enunciado: A='par', B='mayor que 3'. P(A∩B)=2/6, P(B)=3/6.
  solucion_pasos:
  - P(A|B)=(2/6)/(3/6)=2/3.
- titulo: ¿Esta fórmula requiere que P(B) sea distinto de 0?
  respuesta: Sí
  solucion_pasos:
  - Sí, de lo contrario se produciría una división por cero.
- titulo: ¿P(A∩B) siempre debe ser menor o igual que P(B)?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que A∩B es un subconjunto de B, por lo que P(A∩B)≤P(B).
errores_frecuentes:
- Invertir la fórmula, dividiendo P(B) por P(A∩B) en vez de al revés.
- Aplicar la fórmula con P(B)=0, produciendo una división indefinida.
- Confundir P(A∩B) con P(A)×P(B) sin verificar si los eventos son realmente independientes.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
