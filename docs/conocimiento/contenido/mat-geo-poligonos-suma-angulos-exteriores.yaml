semantic_id: MAT.GEO.POLIGONOS_BASE.SUMA_ANGULOS_EXTERIORES
titulo: Teorema de la suma de ángulos exteriores de un polígono convexo igual a 360°
objetivo: Comprender que la suma de los ángulos exteriores de cualquier polígono convexo es siempre 360°,
  sin importar el número de lados.
introduccion: 'A diferencia de la suma de ángulos interiores (que depende del número de lados), existe
  una propiedad sorprendente sobre los ángulos exteriores: su suma es siempre constante.'
resumen: La suma de los ángulos exteriores de cualquier polígono convexo, tomando un ángulo exterior por
  vértice, es siempre igual a 360°.
explicacion: '![Suma de ángulos exteriores de un polígono](/static/img/geometria/poligonos-cuadrilateros/poligonos-suma-angulos-exteriores.svg)


  ### Definición formal


  Para cualquier polígono convexo, sin importar el número de lados $n$, la suma de sus ángulos exteriores
  (uno por vértice, tomados en el mismo sentido de recorrido) es siempre $360°$.


  ### Desarrollo didáctico


  Esto se puede visualizar imaginando recorrer el perímetro del polígono: en cada vértice se gira un ángulo
  exterior, y al completar la vuelta completa (regresar al punto de partida con la misma orientación),
  se ha girado exactamente 360°, sin importar cuántos vértices tenga el polígono.'
procedimiento:
- 'Paso 1: Identifica que se trata de un polígono convexo.'
- 'Paso 2: Recuerda que la suma de ángulos exteriores es siempre 360°, sin necesidad de calcularla.'
- 'Paso 3: Si se conocen todos los ángulos exteriores menos uno, usa la suma 360° para despejar el faltante.'
ejemplos:
- titulo: Aplicar la propiedad a un pentágono
  enunciado: Un pentágono tiene ángulos exteriores desconocidos.
  solucion_pasos:
  - Sin importar sus valores individuales, su suma siempre es 360°.
- titulo: Calcular un ángulo exterior faltante
  enunciado: Un cuadrilátero tiene tres ángulos exteriores de 80°, 90° y 100°.
  solucion_pasos:
  - El cuarto ángulo exterior es 360-80-90-100=90°.
- titulo: ¿La suma de ángulos exteriores depende del número de lados?
  respuesta: 'No'
  solucion_pasos:
  - No, es siempre 360°, sin importar si el polígono tiene 3, 10 o 100 lados.
- titulo: ¿Esta propiedad aplica también a polígonos regulares?
  respuesta: Sí
  solucion_pasos:
  - Sí, en un polígono regular cada ángulo exterior mide 360°/n, y la suma sigue siendo 360°.
errores_frecuentes:
- Creer que la suma de ángulos exteriores depende del número de lados, como ocurre con los interiores.
- Confundir el ángulo exterior con el ángulo interior de un mismo vértice.
- Aplicar esta propiedad a polígonos cóncavos, donde no se cumple de la misma forma directa.
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 46.'
estado: publicado
