semantic_id: MAT.ALG.INTERVALOS.DEFINICION_INTERVALO
titulo: Definición de intervalo como porción de la recta numérica
objetivo: Definir el concepto de intervalo numérico y su representación en la recta real.
introduccion: Un intervalo es un conjunto continuo de números reales.
resumen: Representa todos los números comprendidos entre dos límites, pudiendo o no incluir dichos extremos.
explicacion: '### Definición formal

  Un intervalo es un subconjunto $I \subseteq \mathbb{R}$ tal que para cualquier $a, b \in I$ y $c \in
  \mathbb{R}$ con $a < c < b$, se cumple que $c \in I$.


  ### Desarrollo didáctico

  Podemos visualizar un intervalo como un segmento o rayo en la recta numérica real.'
procedimiento:
- Identificar los valores extremos $a$ y $b$.
- Determinar mediante la notación de corchetes si los extremos se incluyen en el conjunto.
- Trazar el segmento sobre una recta numérica desde $a$ hasta $b$.
ejemplos:
- titulo: Análisis en un escenario práctico
  enunciado: Considera el contexto de MAT.ALG.INTERVALOS.DEFINICION_INTERVALO. Determina las implicancias.
  solucion_pasos:
  - Establecer los límites.
  - Analizar el tipo de extremo.
  - Concluir.
- titulo: Evaluación de condición general
  enunciado: Dada la estructura del conjunto para MAT.ALG.INTERVALOS.DEFINICION_INTERVALO, plantea la
    desigualdad.
  solucion_pasos:
  - Identificar la variable.
  - Aplicar la definición.
  - Escribir el intervalo.
- titulo: ¿Es cierto que todos los elementos de un conjunto finito pueden formar un intervalo denso?
  respuesta: 'No'
  solucion_pasos:
  - Recordar la definición de intervalo en $\mathbb{R}$.
  - Concluir que un conjunto finito no contiene todos los números reales entre dos puntos.
- titulo: ¿El uso de MAT.ALG.INTERVALOS.DEFINICION_INTERVALO es adecuado para expresar desigualdades lineales
    simples?
  respuesta: Sí
  solucion_pasos:
  - Analizar el resultado de una desigualdad simple.
  - Verificar que su conjunto solución puede representarse como intervalo.
errores_frecuentes:
- Un intervalo solo contiene números enteros.
- Todo intervalo debe estar acotado por ambos lados.
- Un intervalo puede tener 'agujeros' en su interior.
- El símbolo de infinito puede incluirse como un número real dentro de un intervalo cerrado.
- Los intervalos que van de $1$ a $3$ y de $2$ a $4$ no comparten elementos reales.
