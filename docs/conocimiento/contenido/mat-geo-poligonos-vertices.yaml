semantic_id: MAT.GEO.POLIGONOS_BASE.VERTICES
titulo: Identificación de los vértices de un polígono
objetivo: Identificar los vértices de un polígono como los puntos donde se encuentran dos lados consecutivos.
introduccion: Cada polígono tiene puntos característicos donde sus lados se encuentran, y a estos puntos
  se les llama vértices.
resumen: Los vértices de un polígono son los puntos donde se unen dos lados consecutivos.
explicacion: '![Vértices de un polígono](/static/img/geometria/poligonos-cuadrilateros/poligonos-vertices.svg)


  ### Definición formal


  En un polígono de $n$ lados, existen exactamente $n$ vértices, cada uno formado por la intersección
  de dos lados consecutivos.


  ### Desarrollo didáctico


  Un pentágono (5 lados) tiene exactamente 5 vértices, generalmente nombrados con letras mayúsculas consecutivas
  (A, B, C, D, E). El número de vértices siempre coincide con el número de lados del polígono.'
procedimiento:
- 'Paso 1: Identifica todos los puntos donde se unen dos lados del polígono.'
- 'Paso 2: Cuenta esos puntos: ese es el número de vértices.'
- 'Paso 3: Verifica que ese número coincida con el número de lados del polígono.'
ejemplos:
- titulo: Contar los vértices de un pentágono
  enunciado: Un pentágono tiene 5 lados.
  solucion_pasos:
  - Tiene exactamente 5 vértices, uno por cada par de lados consecutivos.
- titulo: Relacionar vértices y lados en un hexágono
  enunciado: Un hexágono tiene 6 vértices.
  solucion_pasos:
  - Por lo tanto también tiene 6 lados, ya que ambos números siempre coinciden.
- titulo: ¿El número de vértices siempre coincide con el número de lados?
  respuesta: Sí
  solucion_pasos:
  - Sí, en cualquier polígono, ambos números son siempre iguales.
- titulo: ¿Un vértice puede estar en medio de un lado?
  respuesta: 'No'
  solucion_pasos:
  - No, un vértice es siempre un punto de unión entre dos lados, nunca un punto intermedio de un solo
    lado.
errores_frecuentes:
- Contar mal los vértices, confundiéndolos con puntos intermedios de los lados.
- Creer que el número de vértices puede ser distinto al número de lados.
- No nombrar los vértices en el orden consecutivo correcto alrededor del polígono.
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 46.'
estado: publicado
