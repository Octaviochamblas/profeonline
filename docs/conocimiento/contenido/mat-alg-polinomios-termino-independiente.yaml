semantic_id: MAT.ALG.POLINOMIOS.TERMINO_INDEPENDIENTE
objetivo: Identificar el término independiente en un polinomio y comprender su naturaleza.
introduccion: 'En una fiesta llena de letras mutantes, siempre hay un invitado que
  se niega a usar disfraz: el número puro. Ese es el término independiente.'
resumen: El **Término Independiente** de un polinomio es aquel término que **no tiene
  ninguna variable (letra)** visible. Es decir, consta únicamente de un número (constante).
explicacion: 'Su nombre se debe a que su valor *no depende* de las letras.

  En $P(x) = 2x^2 + 5x - 7$:

  - $2x^2$ y $5x$ cambiarán de valor dependiendo del número que metamos en $x$.

  - El $-7$ siempre valdrá $-7$. Es independiente del valor de $x$.


  Matemáticamente, el término independiente tiene a la variable elevada a la potencia
  cero ($x^0 = 1$). Por eso decimos que es el término de ''grado cero''.


  Si un polinomio no tiene ningún número suelto (ej. $x^3 + 5x$), su término independiente
  es igual a $0$.'
procedimiento:
- 'Paso 1: Recorre el polinomio buscando un término que no esté acompañado de ninguna
  letra.'
- 'Paso 2: Si lo encuentras, recuerda incluir el signo que lo antecede. Ese es el
  término independiente.'
- 'Paso 3: Si todos los términos tienen letras, el término independiente es cero.'
ejemplos:
- titulo: El lobo solitario
  enunciado: Encuentra el término independiente en el polinomio 4x^3 - 9x^2 + x +
    15.
  solucion_pasos:
  - Buscamos el término sin letras.
  - Es el 15.
  - Como tiene un más adelante, el término independiente es +15.
errores_frecuentes:
- Olvidar el signo del término independiente (ej. en $x^2 - 4$, decir que el independiente
  es 4 en lugar de -4).
- Creer que el coeficiente del término de mayor grado es el término independiente.
fuente: Álgebra de Baldor.
estado: publicado
