semantic_id: MAT.ALG.MODELAMIENTO_AFIN.MODELO_LINEAL_CONTEXTUAL
titulo: Modelamiento de una situación de proporcionalidad directa mediante función lineal
objetivo: Construir el modelo de función lineal para situaciones de proporcionalidad directa sin cargo
  inicial.
introduccion: Cuando no hay ningún costo o valor de partida, y todo depende exactamente de la cantidad,
  el modelo correcto es la función lineal más simple.
resumen: Una situación se modela con **función lineal** $f(x)=mx$ cuando no existe valor inicial ni cargo
  fijo, y la magnitud dependiente es directamente proporcional a la independiente.
explicacion: '### Definición formal


  Si una situación cumple $y=0$ cuando $x=0$ (sin valor de partida) y la razón $y/x$ es constante, el
  modelo correcto es $f(x)=mx$, donde $m$ es esa razón constante (la tasa de cambio).


  ### Desarrollo didáctico


  El indicador clave para descartar el término independiente es que, en el contexto, "cero entradas" debe
  producir "cero salidas".


  Si el pago por trabajo a destajo es \$2000 por cada pieza fabricada, sin sueldo base, el modelo es $P(x)=2000x$:
  fabricar cero piezas produce pago cero.'
procedimiento:
- 'Paso 1: Verifica que no exista un valor o costo inicial en el contexto (cero entradas produce cero
  salidas).'
- 'Paso 2: Identifica la tasa de cambio constante del contexto.'
- 'Paso 3: Construye el modelo $f(x)=mx$ usando esa tasa como pendiente.'
ejemplos:
- titulo: Modelamiento de pago por pieza
  enunciado: Un trabajador gana \$1500 por cada pieza fabricada, sin sueldo base. Modela su pago $P$ en
    función de las piezas $x$.
  solucion_pasos:
  - No hay sueldo base, así que cero piezas producen cero pago.
  - $P(x) = 1500x$.
- titulo: Modelamiento de compra a granel
  enunciado: El kilo de naranjas cuesta \$800, sin cargo adicional. Modela el costo $C$ según los kilos
    $x$ comprados.
  solucion_pasos:
  - No hay cargo fijo por comprar.
  - $C(x) = 800x$.
- titulo: ¿Un modelo con sueldo base fijo se representa con función lineal pura?
  enunciado: ¿Un modelo con sueldo base fijo se representa con función lineal pura?
  respuesta: 'No'
  solucion_pasos:
  - Un sueldo base introduce un término independiente, transformando el modelo en afín, no lineal.
- titulo: ¿En un modelo lineal, cero unidades siempre producen cero resultado?
  enunciado: ¿En un modelo lineal, cero unidades siempre producen cero resultado?
  respuesta: Sí
  solucion_pasos:
  - Esa es la característica definitoria de la función lineal, $f(0)=0$.
errores_frecuentes:
- Agregar un término independiente cuando el contexto no lo justifica.
- No verificar la condición "cero entradas, cero salidas" antes de elegir el modelo lineal.
- Confundir la tasa de cambio con un valor inicial existente.
- Aplicar el modelo lineal a contextos que sí tienen cargo fijo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
