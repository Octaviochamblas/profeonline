semantic_id: MAT.EST.NORMAL_BASE.VARIABLE_ALEATORIA_CONTINUA
titulo: Reconocer el concepto de variable aleatoria continua
objetivo: Reconocer una variable aleatoria continua como aquella que puede tomar cualquier valor dentro de un intervalo
  de números reales.
introduccion: Hay cosas que se cuentan (como el número de hermanos) y cosas que se miden (como la estatura); estas
  últimas pueden tomar infinitos valores posibles dentro de un rango.
resumen: Una variable aleatoria continua puede tomar cualquier valor dentro de un intervalo de números reales, a
  diferencia de una variable discreta, que solo toma valores contables.
explicacion: '![Variable aleatoria continua](/static/img/estadistica/normbase/normbase-variable-aleatoria-continua.svg)


  ### Definición formal


  Una variable aleatoria continua es aquella cuyo conjunto de valores posibles corresponde a un intervalo de números

  reales, en contraste con una variable discreta, que toma valores contables o enumerables.


  ### Desarrollo didáctico


  La estatura, el peso y el tiempo de reacción son ejemplos típicos de variables continuas, ya que entre dos valores

  cualquiera siempre existe, en teoría, otro valor intermedio posible.'
procedimiento:
- 'Paso 1: Observa si la variable se obtiene contando o midiendo.'
- 'Paso 2: Si se mide y puede tomar infinitos valores dentro de un rango, es continua.'
- 'Paso 3: Si solo toma valores contables (enteros), es discreta.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: ¿El tiempo que tarda un atleta en correr 100 metros es una variable continua o discreta?
  solucion_pasos:
  - Es una variable continua, ya que el tiempo puede tomar cualquier valor dentro de un intervalo.
- titulo: Ejemplo 2
  enunciado: ¿El número de goles anotados en un partido es una variable continua o discreta?
  solucion_pasos:
  - Es una variable discreta, ya que solo puede tomar valores enteros contables.
- titulo: ¿La estatura de una persona es un ejemplo de variable aleatoria continua?
  respuesta: Sí
  solucion_pasos:
  - Sí, puede tomar cualquier valor dentro de un rango razonable de estaturas.
- titulo: ¿El número de hijos de una familia es una variable continua?
  respuesta: 'No'
  solucion_pasos:
  - 'No, es una variable discreta porque solo toma valores enteros contables.'
errores_frecuentes:
- Confundir variables continuas con variables discretas de muchos valores posibles.
- Creer que toda variable numérica es automáticamente continua.
- Pensar que las variables continuas solo pueden tomar valores enteros.
- No distinguir entre variables que se cuentan y variables que se miden.
- Asumir que una variable discreta no puede tener un rango muy amplio de valores.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
