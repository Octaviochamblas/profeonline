semantic_id: MAT.ALG.LENGUAJE_RELACIONES.SUCESOR_NUMERO
objetivo: Traducir el concepto de sucesor de un número entero.
introduccion: Si el antecesor mira hacia el pasado, el sucesor mira hacia el futuro.
  Es el siguiente número en la fila.
resumen: El **Sucesor** (o consecutivo) de un número entero se traduce algebraicamente
  sumando una unidad a dicho número. Si el número es $x$, su sucesor es **$x + 1$**.
explicacion: "Al igual que con el antecesor, funciona en toda la recta entera.\n-\
  \ El sucesor de $14$ es $14 + 1 = 15$.\n- El sucesor de $-5$ es $-5 + 1 = -4$. (Ojo\
  \ aquí: el sucesor es 'más grande', por lo que avanza hacia el cero en los negativos).\n\
  - El sucesor de $y$ es $y + 1$.\n\nNuevamente, el uso de paréntesis dictamina el\
  \ orden de las operaciones. \n'El cuadrado del sucesor' es $(x+1)^2$.\n'El sucesor\
  \ del cuadrado' es $x^2 + 1$."
procedimiento:
- 'Paso 1: Identifica la base a la cual le calcularás el sucesor.'
- 'Paso 2: Súmale 1 (+1).'
- 'Paso 3: Si se le aplicará una operación externa a este sucesor, usa paréntesis
  para agrupar (x+1).'
ejemplos:
- titulo: El consecutivo
  enunciado: 'Traduce: ''La suma de un número con su propio sucesor''.'
  solucion_pasos:
  - El número es x.
  - Su sucesor es (x + 1).
  - 'Sumamos ambas partes: x + (x + 1).'
errores_frecuentes:
- Pensar que el sucesor de un número negativo como $-3$ es $-4$. (El sucesor se halla
  sumando 1, así que $-3 + 1 = -2$).
- Omitir los paréntesis al multiplicar o elevar potencias.
fuente: Álgebra de Baldor.
estado: publicado
