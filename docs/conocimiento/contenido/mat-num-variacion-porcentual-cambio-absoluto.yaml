semantic_id: MAT.NUM.VARIACION_PORCENTUAL.CAMBIO_ABSOLUTO
objetivo: Calcular y diferenciar el cambio absoluto en contextos de variación matemática.
introduccion: Si antes pesabas 70 kg y ahora pesas 65 kg, perdiste 5 kilos. Esos 5
  kilos son tu 'cambio absoluto'. No tiene que ver con porcentajes aún, es simplemente
  la diferencia real en números.
resumen: El cambio absoluto es la diferencia matemática cruda entre un Valor Final
  y un Valor Inicial ($Variación = Final - Inicial$).
explicacion: "Antes de hablar de porcentajes de crecimiento, debemos definir el **Cambio\
  \ Absoluto** o **Variación Absoluta**.\n\nFórmula matemática:\n$$\\text{Cambio Absoluto}\
  \ = \\text{Valor Final} - \\text{Valor Inicial}$$\n\n- Si el número da **positivo**,\
  \ hubo un aumento.\n- Si el número da **negativo**, hubo una disminución.\n\nEjemplo:\
  \ Si tu cuenta de ahorros pasó de tener $\\$10.000$ (inicial) a $\\$12.000$ (final),\
  \ el cambio absoluto es $12.000 - 10.000 = +2.000$. \nEs 'absoluto' porque se expresa\
  \ en la unidad original de medida (pesos, kilos, metros), no en un porcentaje."
procedimiento:
- 'Paso 1: Identifica el Valor Inicial (el dato del pasado o el original).'
- 'Paso 2: Identifica el Valor Final (el dato del presente o el nuevo).'
- 'Paso 3: Resta $Final - Inicial$ para hallar la variación neta.'
ejemplos:
- titulo: Crecimiento poblacional
  enunciado: En 2020 habían 500 alumnos. En 2021 habían 450. ¿Cuál es el cambio absoluto?
  solucion_pasos:
  - Inicial = 500, Final = 450.
  - Cambio Absoluto = $450 - 500 = -50$.
  - Hubo una disminución de 50 alumnos.
errores_frecuentes:
- Restar siempre el mayor menos el menor, ignorando el orden de tiempo. (Si restas
  Inicial - Final te dará el signo equivocado y podrías reportar un aumento cuando
  fue una caída).
- Expresar el resultado con un símbolo $\%$ (el cambio absoluto NO es un porcentaje).
fuente: Currículum Nacional MINEDUC.
estado: publicado
