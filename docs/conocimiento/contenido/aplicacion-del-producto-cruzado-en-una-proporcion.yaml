semantic_id: MAT.NUM.PROPORCIONES.PRODUCTO_CRUZADO
titulo: Aplicación del producto cruzado en una proporción
objetivo: Aplicar el Teorema Fundamental de las Proporciones (producto cruzado).
introduccion: 'Si dos fracciones son equivalentes, sus diagonales esconden un secreto matemático: al multiplicarlas,
  el resultado es siempre el mismo. Esta es la llave maestra para resolver casi cualquier problema de
  proporciones.'
resumen: 'El Teorema Fundamental establece que en toda proporción $a/b = c/d$, el producto de los extremos
  es igual al producto de los medios: $a \cdot d = b \cdot c$.'
explicacion: El **producto cruzado** es la propiedad más importante de las proporciones. Indica que si
  multiplicas cruzado el numerador de la primera por el denominador de la segunda, y viceversa, los resultados
  deben ser idénticos. Esto permite comprobar si dos razones forman proporción y, más útil aún, encontrar
  términos desconocidos (resolución de ecuaciones).
procedimiento:
- 'Paso 1: Escribe la proporción como fracciones $\frac{a}{b} = \frac{c}{d}$.'
- 'Paso 2: Multiplica el numerador izquierdo por el denominador derecho ($a \cdot d$).'
- 'Paso 3: Multiplica el denominador izquierdo por el numerador derecho ($b \cdot c$) y compara o iguala.'
ejemplos:
- titulo: Comprobando una proporción
  enunciado: ¿Es $4/6 = 10/15$ una proporción válida?
  solucion_pasos:
  - 'Multiplicamos extremos: $4 \cdot 15 = 60$.'
  - 'Multiplicamos medios: $6 \cdot 10 = 60$.'
  - Como $60 = 60$, es una proporción.
- titulo: ¿Sirve para encontrar una incógnita?
  respuesta: Sí
  solucion_pasos:
  - Si $x/3 = 8/6$, entonces $6x = 24$, por lo que $x = 4$.
errores_frecuentes:
- Multiplicar numeradores con numeradores en lugar de hacerlo en cruz.
- Sumar en cruz en vez de multiplicar.
- Olvidar igualar los dos productos (dejándolos sueltos).
- Aplicar producto cruzado cuando se están sumando fracciones ($a/b + c/d$).
- Confundir el producto de extremos con el valor de la razón.
fuente: Currículum Nacional MINEDUC.
estado: publicado
