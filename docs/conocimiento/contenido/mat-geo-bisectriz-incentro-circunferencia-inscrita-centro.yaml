semantic_id: MAT.GEO.BISECTRIZ_INCENTRO.CIRCUNFERENCIA_INSCRITA_CENTRO
titulo: Propiedad del incentro como centro de la circunferencia inscrita
objetivo: Reconocer al incentro como el centro de la circunferencia inscrita, la que es tangente a los
  tres lados del triángulo.
introduccion: Gracias a la equidistancia del incentro respecto a los tres lados, es posible trazar una
  única circunferencia centrada en él que toca (sin cruzar) cada uno de los tres lados.
resumen: La circunferencia inscrita de un triángulo es la que tiene centro en el incentro y es tangente
  a los tres lados.
explicacion: '![Circunferencia inscrita, centro en el incentro](/static/img/geometria/elementos-secundarios/bisectriz-incentro-circunferencia-inscrita-centro.svg)


  ### Definición formal


  La circunferencia inscrita de un triángulo ABC tiene centro en el incentro I y radio igual al inradio
  r (la distancia común de I a los tres lados); es tangente a AB, BC y CA.


  ### Desarrollo didáctico


  Como I está a la misma distancia r de los tres lados, una circunferencia de centro I y radio r toca
  exactamente cada lado en un solo punto, sin cruzarlo: es tangente a los tres.'
procedimiento:
- 'Paso 1: Ubica el incentro del triángulo.'
- 'Paso 2: Calcula o mide el inradio (distancia de I a cualquier lado).'
- 'Paso 3: Traza la circunferencia de centro I y radio igual al inradio.'
ejemplos:
- titulo: Trazar la circunferencia inscrita
  enunciado: Un triángulo tiene incentro I e inradio 2 cm.
  solucion_pasos:
  - Se traza una circunferencia de centro I y radio 2 cm; es tangente a los tres lados.
- titulo: Verificar la tangencia
  enunciado: ¿Por qué la circunferencia inscrita no cruza ningún lado?
  solucion_pasos:
  - Porque su radio es exactamente la distancia del incentro a cada lado, así que solo los toca.
- titulo: ¿La circunferencia inscrita siempre cabe dentro del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición es tangente interior a los tres lados.
- titulo: ¿El centro de la circunferencia inscrita es el circuncentro?
  respuesta: 'No'
  solucion_pasos:
  - No, el centro de la inscrita es el incentro; el circuncentro es el centro de la circunscrita.
errores_frecuentes:
- Confundir la circunferencia inscrita (centrada en el incentro) con la circunscrita (centrada en el circuncentro).
- Usar un radio distinto al inradio, haciendo que la circunferencia cruce algún lado.
- Ubicar el centro en un punto notable distinto al incentro.
fuente: Elaboración propia.
estado: publicado
