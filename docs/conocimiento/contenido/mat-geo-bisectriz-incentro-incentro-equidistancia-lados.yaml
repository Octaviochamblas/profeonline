semantic_id: MAT.GEO.BISECTRIZ_INCENTRO.INCENTRO_EQUIDISTANCIA_LADOS
titulo: Propiedad del incentro como punto equidistante de los lados del triángulo
objetivo: Aplicar la propiedad de que el incentro está exactamente a la misma distancia de los tres lados
  de un triángulo.
introduccion: Una propiedad notable del incentro es que, sin importar la forma del triángulo, su distancia
  perpendicular a cada uno de los tres lados es siempre la misma.
resumen: El incentro de un triángulo está a igual distancia de sus tres lados.
explicacion: '![Incentro equidistante de los tres lados](/static/img/geometria/elementos-secundarios/bisectriz-incentro-incentro-equidistancia-lados.svg)


  ### Definición formal


  Si I es el incentro de un triángulo ABC, las distancias perpendiculares de I a los lados AB, BC y CA
  son todas iguales entre sí, y esa distancia común es el radio de la circunferencia inscrita.


  ### Desarrollo didáctico


  Esta propiedad es consecuencia directa de que I está sobre las tres bisectrices: todo punto de una bisectriz
  es equidistante de los dos lados que forman ese ángulo, y al estar I en las tres bisectrices a la vez,
  queda equidistante de los tres lados.'
procedimiento:
- 'Paso 1: Ubica el incentro del triángulo (intersección de las bisectrices).'
- 'Paso 2: Traza las perpendiculares desde el incentro a cada uno de los tres lados.'
- 'Paso 3: Verifica que las tres distancias sean iguales.'
ejemplos:
- titulo: Verificar la equidistancia
  enunciado: Se mide la distancia del incentro a cada uno de los tres lados de un triángulo.
  solucion_pasos:
  - Las tres distancias resultan iguales entre sí.
- titulo: Relacionar con las bisectrices
  enunciado: ¿Por qué el incentro es equidistante de los lados?
  solucion_pasos:
  - Porque está sobre las tres bisectrices, y todo punto de una bisectriz es equidistante de los dos lados
    que forman ese ángulo.
- titulo: ¿Esta distancia común tiene un nombre especial?
  respuesta: Sí
  solucion_pasos:
  - Sí, se llama radio de la circunferencia inscrita (o inradio).
- titulo: ¿El ortocentro también es equidistante de los lados?
  respuesta: 'No'
  solucion_pasos:
  - No, esa propiedad es exclusiva del incentro.
errores_frecuentes:
- Confundir la equidistancia a los lados (propiedad del incentro) con la equidistancia a los vértices
  (propiedad del circuncentro).
- Medir mal la distancia perpendicular, usando otro tipo de segmento.
- Creer que esta propiedad aplica al ortocentro o al baricentro.
fuente: Elaboración propia.
estado: publicado
