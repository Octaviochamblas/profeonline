semantic_id: MAT.EST.PROBA_COMPUESTA_CONDICIONAL.SUMA_RUTAS
titulo: Suma de rutas del árbol que conducen a un mismo evento
objetivo: Calcular la probabilidad total de un evento que puede alcanzarse por más de un camino del árbol,
  sumando las probabilidades de todos esos caminos.
introduccion: Cuando un mismo resultado final (por ejemplo, 'pieza defectuosa') puede llegar por distintas
  rutas del árbol (desde distintas ramas del primer nivel), se debe sumar la probabilidad de todas esas
  rutas.
resumen: Si un evento puede ocurrir a través de varios caminos distintos y mutuamente excluyentes del
  árbol, su probabilidad total es la suma de las probabilidades de todos esos caminos.
explicacion: '![Suma de rutas del árbol](/static/img/probabilidad/compuesta/compuesta-suma-rutas.svg)


  ### Definición formal


  Si el evento $A$ puede ocurrir a través de las rutas que pasan por $B_1$ o por $B_2$ (mutuamente excluyentes),
  $P(A)=P(B_1\cap A)+P(B_2\cap A)$.


  ### Desarrollo didáctico


  Una pieza puede ser defectuosa proviniendo de la máquina A (probabilidad de esa ruta: 0,03) o de la
  máquina B (probabilidad de esa ruta: 0,04). La probabilidad total de que una pieza cualquiera sea defectuosa
  es $0{,}03+0{,}04=0{,}07$.'
procedimiento:
- 'Paso 1: Identifica todos los caminos del árbol que terminan en el evento de interés.'
- 'Paso 2: Calcula la probabilidad de cada uno de esos caminos (multiplicando sus ramas).'
- 'Paso 3: Suma las probabilidades de todos esos caminos para obtener la probabilidad total del evento.'
ejemplos:
- titulo: Calcular P(defectuosa) sumando ambas rutas
  enunciado: P(A y defectuosa)=0,03, P(B y defectuosa)=0,04.
  solucion_pasos:
  - P(defectuosa)=0,03+0,04=0,07.
- titulo: Calcular P(buena) sumando ambas rutas
  enunciado: P(A y buena)=0,57, P(B y buena)=0,36.
  solucion_pasos:
  - P(buena)=0,57+0,36=0,93.
- titulo: ¿Se deben sumar todas las rutas que llevan al mismo evento final?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la regla para calcular la probabilidad total de un evento con múltiples caminos posibles.
- titulo: ¿P(defectuosa)+P(buena) debe sumar 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que representan todos los resultados posibles del espacio muestral completo (0,07+0,93=1).
errores_frecuentes:
- Considerar solo una de las rutas posibles, ignorando las otras que también llevan al mismo evento.
- Multiplicar las probabilidades de distintas rutas en vez de sumarlas.
- Confundir cuáles caminos del árbol realmente terminan en el evento de interés.
fuente: Elaboración propia.
estado: publicado
