semantic_id: MAT.ALG.FUNC_CUADR_GRAFICA.CEROS_CALCULO
titulo: Determinación de los ceros resolviendo la ecuación cuadrática asociada
objetivo: Calcular los ceros de una función cuadrática resolviendo la ecuación $f(x)=0$ mediante los métodos
  conocidos.
introduccion: Para encontrar exactamente dónde una parábola cruza el eje $x$, se recurre a las mismas
  herramientas usadas para resolver ecuaciones de segundo grado.
resumen: Los ceros de $f(x)=ax^2+bx+c$ se calculan resolviendo la ecuación asociada $ax^2+bx+c=0$, usando
  fórmula general, factorización o completación de cuadrado, según convenga.
explicacion: '### Definición formal


  Calcular los ceros de $f(x)=ax^2+bx+c$ equivale a resolver la ecuación $ax^2+bx+c=0$. Cualquier método
  válido para resolver ecuaciones cuadráticas (fórmula general, factorización, completar el cuadrado)
  sirve para este propósito.


  ### Desarrollo didáctico


  La elección del método depende de la estructura de la función: si es fácilmente factorizable, conviene
  factorizar; si no, la fórmula general siempre funciona.


  Para $f(x)=x^2-x-6$, se resuelve $x^2-x-6=0$; factorizando, $(x-3)(x+2)=0$, dando los ceros $x=3$ y
  $x=-2$.'
procedimiento:
- 'Paso 1: Plantea la ecuación $ax^2+bx+c=0$ a partir de la función.'
- 'Paso 2: Elige un método de resolución (fórmula general, factorización, completar el cuadrado).'
- 'Paso 3: Resuelve la ecuación para obtener los ceros de la función.'
ejemplos:
- titulo: Cálculo de ceros por factorización
  enunciado: Determina los ceros de $f(x)=x^2+2x-8$.
  solucion_pasos:
  - Se resuelve $x^2+2x-8=0$; factorizando, $(x+4)(x-2)=0$.
  - Los ceros son $x=-4$ y $x=2$.
- titulo: Cálculo de ceros con fórmula general
  enunciado: Determina los ceros de $f(x)=2x^2-3x-2$.
  solucion_pasos:
  - $\Delta=9+16=25$.
  - $x=\dfrac{3\pm5}{4}$, dando $x=2$ y $x=-1/2$.
- titulo: ¿Es obligatorio usar la fórmula general para calcular los ceros de una función cuadrática?
  enunciado: ¿Es obligatorio usar la fórmula general para calcular los ceros de una función cuadrática?
  respuesta: 'No'
  solucion_pasos:
  - La factorización o completar el cuadrado son igualmente válidos cuando resultan más directos.
- titulo: ¿Puede una función cuadrática no tener ceros reales?
  enunciado: ¿Puede una función cuadrática no tener ceros reales?
  respuesta: Sí
  solucion_pasos:
  - Si el discriminante de la ecuación asociada es negativo, la función no tiene ceros reales.
errores_frecuentes:
- Confundir el proceso de calcular ceros con el de encontrar el vértice.
- Olvidar considerar ambas soluciones al resolver la ecuación cuadrática asociada.
- Elegir un método de resolución poco eficiente cuando la función admite una factorización simple.
- Confundir la respuesta final: los ceros son valores de $x$, no puntos con ambas coordenadas.
