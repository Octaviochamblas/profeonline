semantic_id: MAT.NUM.DECIMAL_FRACCION.PERIODICO
titulo: Conversión de decimal periódico puro a fracción
objetivo: Convertir un decimal periódico puro a fracción usando el método algebraico de restar múltiplos
  de 10.
introduccion: Un decimal periódico no puede escribirse como fracción con denominador potencia de 10; se
  necesita un método algebraico que aproveche que, al multiplicar por la potencia de 10 adecuada, el período
  "se alinea" y se cancela al restar.
resumen: Para convertir un decimal periódico puro a fracción se plantea \(x\) igual al decimal, se multiplica
  por \(10^k\) (con \(k\) igual a la cantidad de cifras del período) y se resta \(x\) para eliminar la
  parte periódica.
explicacion: '### Definición formal


  Si \(x=0.\overline{c_1\ldots c_k}\), entonces \(10^k x = c_1\ldots c_k.\overline{c_1\ldots c_k}\); al
  restar \(10^k x - x\) el período se cancela, quedando \((10^k-1)x=c_1\ldots c_k\), de donde \(x=\frac{c_1\ldots
  c_k}{10^k-1}\).


  ### Desarrollo didáctico


  Si \(x=0.\overline{3}\), se multiplica por \(10\): \(10x=3.\overline{3}\); al restar, \(10x-x=3\), es
  decir \(9x=3\), por lo tanto \(x=\frac{3}{9}=\frac{1}{3}\).'
procedimiento:
- 'Paso 1: Llama \(x\) al decimal e identifica la longitud de su período.'
- 'Paso 2: Multiplica por la potencia de diez que desplaza un período y resta la ecuación original.'
- 'Paso 3: Despeja \(x\), simplifica la fracción y verifica su expansión decimal.'
ejemplos:
- titulo: Aplicación razonada — Conversión de decimal periódico a fracción
  enunciado: Si \(x=0.\overline{3}\), entonces \(10x-x=3\) y \(x=\frac{1}{3}\).
  solucion_pasos:
  - Llama \(x\) al decimal e identifica la longitud de su período.
  - Multiplica por la potencia de diez que desplaza un período y resta la ecuación original.
  - Despeja \(x\), simplifica la fracción y verifica su expansión decimal.
- titulo: Revisión de una solución — Conversión de decimal periódico a fracción
  enunciado: Una solución aplica “Multiplica por la potencia de diez que desplaza un período y resta la
    ecuación original.”, pero termina sin comprobar que la repetición del período permite eliminar la
    parte decimal mediante una resta. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conversión de decimal periódico a fracción: un decimal periódico
    puro puede convertirse a fracción usando una igualdad algebraica y restando el período.'
  - Llama \(x\) al decimal e identifica la longitud de su período.
  - 'Completa la revisión con este control: Despeja \(x\), simplifica la fracción y verifica su expansión
    decimal.'
- titulo: ¿Se cumple que la repetición del período permite eliminar la parte decimal mediante una resta?
    — Conversión de decimal periódico a fracción
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un decimal periódico puro puede convertirse a fracción
    usando una igualdad algebraica y restando el período.
  - El caso “Si \(x=0.\overline{3}\), entonces \(10x-x=3\) y \(x=\frac{1}{3}\)” satisface esa condición.
  - Despeja \(x\), simplifica la fracción y verifica su expansión decimal.
- titulo: ¿Es válido omitir el paso “Llama \(x\) al decimal e identifica la longitud de su período”? —
    Conversión de decimal periódico a fracción
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conversión de decimal periódico a fracción.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica por la potencia de diez que desplaza
    un período y resta la ecuación original.'
  - 'La solución debe terminar de este modo: Despeja \(x\), simplifica la fracción y verifica su expansión
    decimal.'
errores_frecuentes:
- 'Empezar conversión de decimal periódico a fracción sin realizar este control inicial: Llama \(x\) al
  decimal e identifica la longitud de su período.'
- Memorizar “Si \(x=0.\overline{3}\), entonces \(10x-x=3\) y \(x=\frac{1}{3}\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Multiplica por la potencia de diez que desplaza un período y resta la ecuación
  original.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre conversión de decimal periódico a fracción que contradice el criterio
  “La repetición del período permite eliminar la parte decimal mediante una resta”.
- 'Cerrar el ejercicio sin esta comprobación específica: Despeja \(x\), simplifica la fracción y verifica
  su expansión decimal.'
