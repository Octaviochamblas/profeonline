semantic_id: MAT.GEO.ANGULOS_RELACIONES_METRICAS.SUMA_PUNTO
titulo: Suma de ángulos alrededor de un punto igual a 360°
objetivo: Usar la suma de 360° alrededor de un punto para hallar una medida faltante y comprobar que dar
  una vuelta completa alrededor del vértice obliga a reunir 360°.
introduccion: Cuando varias calles salen de una plaza central, recorrer todas sus aperturas alrededor
  del centro equivale a dar un giro completo. Aquí lo trabajaremos con ejemplos concretos y verificaciones
  cortas.
resumen: Los ángulos que rodean completamente un punto suman 360°. Como idea de control, dar una vuelta
  completa alrededor del vértice obliga a reunir 360°.
explicacion: 'Los ángulos que rodean completamente un punto suman 360°.


  Cuando se analiza “si cuatro sectores miden 80°, 95°, 110° y 75°, juntos completan 360° alrededor del
  punto” conviene evitar la memoria mecánica. El control decisivo es comprobar que dar una vuelta completa
  alrededor del vértice obliga a reunir 360°.'
procedimiento:
- 'Paso 1: Comprueba que los ángulos considerados rodean completamente el mismo vértice.'
- 'Paso 2: Suma las medidas conocidas o representa las desconocidas con una expresión.'
- 'Paso 3: Iguala el total a 360° y verifica que no falte ni sobre ninguna región.'
ejemplos:
- titulo: Lectura del dibujo — Suma alrededor de un punto
  enunciado: Si cuatro sectores miden 80°, 95°, 110° y 75°, juntos completan 360° alrededor del punto.
  solucion_pasos:
  - Comprueba que los ángulos considerados rodean completamente el mismo vértice.
  - Suma las medidas conocidas o representa las desconocidas con una expresión.
  - Iguala el total a 360° y verifica que no falte ni sobre ninguna región.
- titulo: Verificación de la solución — Suma alrededor de un punto
  enunciado: 'Un estudiante usa la idea “dar una vuelta completa alrededor del vértice obliga a reunir
    360°” al analizar este caso: si cuatro sectores miden 80°, 95°, 110° y 75°, juntos completan 360°
    alrededor del punto. Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: los ángulos que rodean completamente un punto suman 360°.'
  - Suma las medidas conocidas o representa las desconocidas con una expresión.
  - Iguala el total a 360° y verifica que no falte ni sobre ninguna región.
- titulo: ¿El caso confirma que dar una vuelta completa alrededor del vértice obliga a reunir 360°? —
    Suma alrededor de un punto
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: los ángulos que rodean completamente un punto
    suman 360°.'
  - En el caso “si cuatro sectores miden 80°, 95°, 110° y 75°, juntos completan 360° alrededor del punto”
    se observa que dar una vuelta completa alrededor del vértice obliga a reunir 360°.
  - Iguala el total a 360° y verifica que no falte ni sobre ninguna región.
- titulo: ¿Basta con comprueba que los ángulos considerados rodean completamente el mismo vértice? — Suma
    alrededor de un punto
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de suma de ángulos alrededor de un punto
    igual a 360°.
  - Después del paso “Comprueba que los ángulos considerados rodean completamente el mismo vértice.” todavía
    hace falta revisar “Suma las medidas conocidas o representa las desconocidas con una expresión.”.
  - El cierre correcto exige “Iguala el total a 360° y verifica que no falte ni sobre ninguna región.”.
errores_frecuentes:
- Suma alrededor de un punto significa usar 180° aunque el recorrido complete toda la vuelta alrededor
  del vértice.
- Para resolver suma alrededor de un punto, basta con el paso “Comprueba que los ángulos considerados
  rodean completamente el mismo vértice.” y no hace falta revisar “Suma las medidas conocidas o representa
  las desconocidas con una expresión.”.
- Si el dibujo parece claro, se puede ignorar que dar una vuelta completa alrededor del vértice obliga
  a reunir 360°.
- Dos configuraciones distintas representan suma alrededor de un punto solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Iguala el total a 360° y verifica que no
  falte ni sobre ninguna región.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
