semantic_id: MAT.GEO.HOMOTECIA.CENTRO
titulo: Identificación del centro de homotecia
objetivo: Identificar el centro de una homotecia a partir de una figura original y su imagen, usando las
  rectas que unen puntos correspondientes.
introduccion: Dada una figura y su imagen homotética, es posible encontrar el centro de la transformación
  que las relaciona, incluso si no se indica explícitamente.
resumen: El centro de homotecia es el único punto que permanece fijo bajo la transformación, y por el
  cual pasan todas las rectas que unen cada punto original con su imagen.
explicacion: '![Identificación del centro de homotecia](/static/img/geometria/congruencia-semejanza/homotecia-centro.svg)


  ### Definición formal


  El centro de homotecia $O$ es el punto de intersección de las rectas $AA''$, $BB''$, $CC''$, que unen
  cada vértice de la figura original con su correspondiente en la figura imagen.


  ### Desarrollo didáctico


  Para encontrar el centro de una homotecia entre dos figuras semejantes conocidas, basta con trazar al
  menos dos de estas rectas (por ejemplo, $AA''$ y $BB''$); su punto de intersección es el centro $O$
  buscado.'
procedimiento:
- 'Paso 1: Identifica al menos dos pares de puntos correspondientes entre la figura original y su imagen.'
- 'Paso 2: Traza las rectas que unen cada punto con su correspondiente imagen.'
- 'Paso 3: El punto donde se cortan esas rectas es el centro de homotecia.'
ejemplos:
- titulo: Encontrar el centro con dos rectas
  enunciado: Se conocen los puntos A, A', B, B' de una homotecia.
  solucion_pasos:
  - Se trazan las rectas AA' y BB'; su intersección es el centro O.
- titulo: Verificar el centro con un tercer par de puntos
  enunciado: Ya se encontró el centro O con AA' y BB'. Se traza también CC'.
  solucion_pasos:
  - La recta CC' también debe pasar por O, confirmando el centro encontrado.
- titulo: ¿Basta con un solo par de puntos correspondientes para encontrar el centro?
  respuesta: 'No'
  solucion_pasos:
  - No, se necesitan al menos dos pares para determinar el punto de intersección único.
- titulo: ¿El centro de homotecia puede estar dentro de la figura original?
  respuesta: Sí
  solucion_pasos:
  - Sí, el centro puede estar dentro, fuera, o incluso sobre el borde de la figura, según el caso.
errores_frecuentes:
- Intentar encontrar el centro con un solo par de puntos correspondientes, sin poder determinarlo únicamente.
- Trazar las rectas de forma imprecisa, generando un punto de intersección incorrecto.
- No verificar el centro encontrado con un tercer par de puntos correspondientes.
fuente: 'Fuente: Moraleja 154, Cid 119.'
estado: publicado
