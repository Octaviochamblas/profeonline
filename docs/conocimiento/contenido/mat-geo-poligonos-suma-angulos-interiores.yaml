semantic_id: MAT.GEO.POLIGONOS_BASE.SUMA_ANGULOS_INTERIORES
titulo: Cálculo de la suma de ángulos interiores de un polígono convexo mediante 180°(n - 2)
objetivo: Calcular la suma de los ángulos interiores de un polígono convexo usando la fórmula 180°(n-2).
introduccion: Así como los ángulos internos de un triángulo siempre suman 180°, existe una fórmula general
  que permite calcular la suma de los ángulos internos de cualquier polígono convexo.
resumen: La suma de los ángulos interiores de un polígono convexo de $n$ lados es $180°(n-2)$.
explicacion: '![Suma de ángulos interiores de un polígono](/static/img/geometria/poligonos-cuadrilateros/poligonos-suma-angulos-interiores.svg)


  ### Definición formal


  La suma de los ángulos interiores de un polígono convexo de $n$ lados es $S=180°\times(n-2)$. Esta fórmula
  surge de dividir el polígono en $(n-2)$ triángulos trazando diagonales desde un solo vértice.


  ### Desarrollo didáctico


  Un pentágono ($n=5$) tiene suma de ángulos interiores $180°\times(5-2)=180°\times3=540°$. Esto se puede
  verificar dividiendo el pentágono en 3 triángulos desde un vértice, cada uno con 180°: $3\times180°=540°$.'
procedimiento:
- 'Paso 1: Identifica el número de lados n del polígono.'
- 'Paso 2: Resta 2 al número de lados: (n-2).'
- 'Paso 3: Multiplica ese resultado por 180° para obtener la suma de ángulos interiores.'
ejemplos:
- titulo: Calcular la suma para un pentágono
  enunciado: Un pentágono tiene 5 lados.
  solucion_pasos:
  - S=180°×(5-2)=180°×3=540°.
- titulo: Calcular la suma para un hexágono
  enunciado: Un hexágono tiene 6 lados.
  solucion_pasos:
  - S=180°×(6-2)=180°×4=720°.
- titulo: ¿La fórmula aplica solo a polígonos regulares?
  respuesta: 'No'
  solucion_pasos:
  - No, aplica a cualquier polígono convexo, sea regular o irregular.
- titulo: ¿De dónde proviene el factor (n-2)?
  respuesta: Del número de triángulos formados al trazar diagonales desde un vértice
  solucion_pasos:
  - Representa el número de triángulos que se forman al trazar todas las diagonales posibles desde un
    solo vértice.
errores_frecuentes:
- Olvidar restar 2 al número de lados antes de multiplicar por 180°.
- Aplicar la fórmula a un polígono cóncavo, donde no es directamente válida sin ajustes.
- Confundir la suma de ángulos interiores con la de ángulos exteriores (que siempre es 360°).
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 46.'
estado: publicado
