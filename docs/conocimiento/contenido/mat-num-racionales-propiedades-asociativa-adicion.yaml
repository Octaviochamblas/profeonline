semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.ASOCIATIVA_ADICION
objetivo: Reagrupar una suma de racionales.
introduccion: 'Para estudiar propiedad asociativa de la adición en Q partiremos de
  una situación concreta: \((\frac{1}{2}+\frac{1}{3})+\frac{1}{6}=\frac{1}{2}+(\frac{1}{3}+\frac{1}{6})\).
  La definición que guiará cada decisión es: la propiedad asociativa de la adición
  permite agrupar sumandos de distintas maneras sin cambiar la suma.'
resumen: La propiedad asociativa de la adición permite agrupar sumandos de distintas
  maneras sin cambiar la suma. Como criterio de control, al sumar racionales, cambiar
  la agrupación no cambia el resultado
explicacion: |-
  La propiedad asociativa de la adición permite agrupar sumandos de distintas maneras sin cambiar la suma.

  El ejemplo “\((\frac{1}{2}+\frac{1}{3})+\frac{1}{6}=\frac{1}{2}+(\frac{1}{3}+\frac{1}{6})\)” lleva la definición a una situación concreta y permite verificar esta consecuencia: Al sumar racionales, cambiar la agrupación no cambia el resultado.
procedimiento:
- 'Paso 1: Mantén el orden de tres sumandos y calcula primero los dos iniciales.'
- 'Paso 2: Calcula luego agrupando los dos últimos.'
- 'Paso 3: Compara \((a+b)+c\) con \(a+(b+c)\) y verifica la igualdad.'
ejemplos:
- titulo: Aplicación razonada — Propiedad asociativa de la adición en Q
  enunciado: \((\frac{1}{2}+\frac{1}{3})+\frac{1}{6}=\frac{1}{2}+(\frac{1}{3}+\frac{1}{6})\).
  solucion_pasos:
  - Mantén el orden de tres sumandos y calcula primero los dos iniciales.
  - Calcula luego agrupando los dos últimos.
  - Compara \((a+b)+c\) con \(a+(b+c)\) y verifica la igualdad.
- titulo: Revisión de una solución — Propiedad asociativa de la adición en Q
  enunciado: Una solución aplica “Calcula luego agrupando los dos últimos.”, pero
    termina sin comprobar que al sumar racionales, cambiar la agrupación no cambia
    el resultado. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define propiedad asociativa de la adición en Q: la
    propiedad asociativa de la adición permite agrupar sumandos de distintas maneras
    sin cambiar la suma.'
  - Mantén el orden de tres sumandos y calcula primero los dos iniciales.
  - 'Completa la revisión con este control: Compara \((a+b)+c\) con \(a+(b+c)\) y
    verifica la igualdad.'
- titulo: ¿Se cumple que al sumar racionales, cambiar la agrupación no cambia el resultado?
    — Propiedad asociativa de la adición en Q
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la propiedad asociativa de la adición
    permite agrupar sumandos de distintas maneras sin cambiar la suma.
  - El caso “\((\frac{1}{2}+\frac{1}{3})+\frac{1}{6}=\frac{1}{2}+(\frac{1}{3}+\frac{1}{6})\)”
    satisface esa condición.
  - Compara \((a+b)+c\) con \(a+(b+c)\) y verifica la igualdad.
- titulo: ¿Es válido omitir el paso “Mantén el orden de tres sumandos y calcula primero
    los dos iniciales”? — Propiedad asociativa de la adición en Q
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de propiedad asociativa de la adición
    en Q.
  - 'Omitirlo puede volver inválida la acción siguiente: Calcula luego agrupando los
    dos últimos.'
  - 'La solución debe terminar de este modo: Compara \((a+b)+c\) con \(a+(b+c)\) y
    verifica la igualdad.'
errores_frecuentes:
- 'Empezar propiedad asociativa de la adición en Q sin realizar este control inicial:
  Mantén el orden de tres sumandos y calcula primero los dos iniciales.'
- Memorizar “\((\frac{1}{2}+\frac{1}{3})+\frac{1}{6}=\frac{1}{2}+(\frac{1}{3}+\frac{1}{6})\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Calcula luego agrupando los dos últimos.” y usarlo
  aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre propiedad asociativa de la adición en Q que
  contradice el criterio “Al sumar racionales, cambiar la agrupación no cambia el
  resultado”.
- 'Cerrar el ejercicio sin esta comprobación específica: Compara \((a+b)+c\) con \(a+(b+c)\)
  y verifica la igualdad.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
