semantic_id: MAT.NUM.SUCESIONES_BASE.DEFINICION
titulo: Definición de sucesión numérica como lista ordenada de términos
objetivo: Comprender qué es una sucesión numérica y distinguirla de un simple conjunto de números.
introduccion: ¿Has notado que los años bisiestos ocurren cada 4 años? 2020, 2024, 2028... Estás frente
  a una sucesión. A diferencia de un grupo de números al azar, aquí el orden y el patrón lo son todo.
resumen: Una sucesión numérica es una lista ORDENADA de números. Cada número ocupa una posición específica
  y suele existir una regla matemática (o lógica) que conecta un término con el siguiente.
explicacion: 'Imagina una fila de personas esperando entrar a un concierto. Cada persona tiene un número
  de llegada: el primero, el segundo, el tercero. Una **sucesión numérica** es exactamente eso: una fila
  de números.


  - **Orden:** Es la característica principal. El conjunto $\{2, 4, 6\}$ tiene los mismos números que
  la sucesión $6, 4, 2$, pero como sucesiones son totalmente distintas porque el orden cambió.

  - **Términos:** Cada número dentro de la sucesión se llama ''término''.

  - **Patrón:** Casi todas las sucesiones que estudiarás tienen una regla matemática que predice el futuro
  (ej. ''sumar 3 al anterior'').


  Ejemplo: $5, 10, 15, 20, \dots$ es una sucesión donde cada término es múltiplo de 5, ordenados de menor
  a mayor.'
procedimiento:
- 'Paso 1: Observa una lista de números.'
- 'Paso 2: Verifica si el orden importa (si cambiar los números de posición altera el sentido de la lista).'
- 'Paso 3: Identifica si es una sucesión finita (termina) o infinita (tiene puntos suspensivos...).'
ejemplos:
- titulo: El orden importa
  enunciado: ¿Es lo mismo la sucesión 1, 2, 3 que la sucesión 3, 2, 1?
  solucion_pasos:
  - Ambas tienen los mismos elementos matemáticos.
  - Sin embargo, el primer término de la primera es 1, y el de la segunda es 3.
  - Al ser el orden distinto, son sucesiones diferentes.
errores_frecuentes:
- Confundir una 'sucesión' con un 'conjunto'. (En los conjuntos el orden no importa, en las sucesiones
  sí).
- Pensar que las sucesiones solo pueden ir en aumento (pueden decrecer, alternar signos o incluso ser
  constantes como 3, 3, 3...).
fuente: Currículum Nacional MINEDUC.
estado: publicado
