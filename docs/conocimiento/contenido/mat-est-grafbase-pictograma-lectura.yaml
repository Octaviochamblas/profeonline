semantic_id: MAT.EST.GRAFICOS_BASE.PICTOGRAMA_LECTURA
titulo: Leer pictogramas basados en escalas
objetivo: Leer correctamente un pictograma, interpretando la cantidad que representa cada símbolo según
  la escala indicada.
introduccion: Los pictogramas usan símbolos o íconos en vez de barras para representar cantidades, siendo
  muy comunes en medios de comunicación y materiales visuales.
resumen: Un pictograma representa datos mediante símbolos repetidos, donde cada símbolo (completo o parcial)
  equivale a una cantidad fija indicada por una escala.
explicacion: '![Lectura de pictogramas](/static/img/estadistica/grafbase/grafbase-pictograma-lectura.svg)


  ### Definición formal


  Si la escala indica que 1 símbolo = $k$ unidades, entonces el número de símbolos dibujados para una
  categoría, multiplicado por $k$, da la cantidad total representada.


  ### Desarrollo didáctico


  Si la escala de un pictograma indica que cada pez representa 10 personas, y una categoría muestra 3
  peces, esa categoría representa $3\times10=30$ personas.'
procedimiento:
- 'Paso 1: Identifica la escala indicada en el pictograma (cuántas unidades representa cada símbolo).'
- 'Paso 2: Cuenta el número de símbolos (completos y fracciones de símbolo) dibujados para la categoría.'
- 'Paso 3: Multiplica el número de símbolos por el valor de la escala para obtener la cantidad total.'
ejemplos:
- titulo: Leer un pictograma con escala 1 símbolo=10 unidades
  enunciado: Una categoría muestra 3 símbolos completos.
  solucion_pasos:
  - 3×10=30 unidades representadas.
- titulo: Leer un pictograma con símbolo parcial
  enunciado: Una categoría muestra 2 símbolos completos y medio símbolo, con escala 1 símbolo=20 unidades.
  solucion_pasos:
  - 2,5×20=50 unidades representadas.
- titulo: ¿Es necesario conocer la escala antes de interpretar un pictograma?
  respuesta: Sí
  solucion_pasos:
  - Sí, sin la escala no se puede determinar la cantidad exacta que representa cada símbolo.
- titulo: ¿Un símbolo parcial (por ejemplo, medio símbolo) puede representar una cantidad fraccionaria
    de la escala?
  respuesta: Sí
  solucion_pasos:
  - Sí, un medio símbolo representa la mitad del valor de la escala completa.
errores_frecuentes:
- Interpretar un pictograma sin considerar la escala indicada, asumiendo que cada símbolo vale 1 unidad.
- No contabilizar correctamente los símbolos parciales (fracciones de símbolo) al leer el pictograma.
- Confundir el número de símbolos dibujados con la cantidad real representada (olvidando multiplicar por
  la escala).
fuente: Elaboración propia.
estado: publicado
