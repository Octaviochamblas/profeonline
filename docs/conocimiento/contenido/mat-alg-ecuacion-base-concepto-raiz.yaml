semantic_id: MAT.ALG.ECUACION_BASE.CONCEPTO_RAIZ
titulo: La 'Raíz' de una Ecuación
objetivo: Conocer la terminología 'raíz' como sinónimo de solución y entender su uso, especialmente en grados superiores.
introduccion: En álgebra, las palabras importan. Si un ejercicio de examen te pide 'Encuentra las raíces de la ecuación',
  no te lances a calcular raíces cuadradas. Te están pidiendo otra cosa.
resumen: En el contexto de ecuaciones, la palabra 'raíz' es un sinónimo directo de 'solución'. Es el valor que satisface
  la ecuación.
explicacion: '### Definición formal


  El valor numérico (solución) que hace verdadera la igualdad.


  ### Desarrollo didáctico


  Históricamente, los matemáticos se referían al número de origen que generaba el equilibrio de la ecuación como
  la ''raíz'' del problema (de ahí crecía el árbol de la ecuación).


  - Ecuación de primer grado (lineal): Ej. $2x - 6 = 0$. Tiene **una sola raíz** ($x=3$).

  - Ecuación de segundo grado (cuadrática): Ej. $x^2 - 9 = 0$. Puede tener **dos raíces** (soluciones). En este
  caso, $x=3$ y $x=-3$.

  - Ecuación de tercer grado (cúbica): Puede tener hasta **tres raíces**.


  Por lo tanto, la cantidad máxima de ''raíces'' o soluciones que tiene un polinomio depende de su grado mayor (Teorema
  Fundamental del Álgebra). Cuando te pidan raíces, solo despeja la ''x''.'
procedimiento:
- 'Paso 1: Cuando leas ''Encuentra la raíz'', tradúcelo en tu mente a ''Encuentra la solución''.'
- 'Paso 2: Resuelve la ecuación despejando la incógnita.'
- 'Paso 3: El valor numérico final obtenido es la raíz.'
- Raíz y solución son sinónimos en este contexto.
ejemplos:
- titulo: 'Pregunta de examen: ¿Cuál es la raíz de $4x = 20$'
  enunciado: 'Pregunta de examen: ¿Cuál es la raíz de $4x = 20$?'
  solucion_pasos:
  - 'Traducimos: ¿Cuál es la solución de $4x = 20$?'
  - 'Despejamos: El 4 pasa dividiendo, $x = 20/4$.'
  - $x = 5$.
  - La raíz es 5.
- titulo: ¿Cuántas raíces máximo puede tener una ecuación de grado 1 (lineal)?
  solucion_pasos:
  - Las ecuaciones lineales (x elevada a 1) solo tienen una solución o raíz.
- titulo: 'Respecto de «Concepto de raíz de una ecuación»: ¿Describe adecuadamente el concepto esta fra'
  enunciado: 'Respecto de «Concepto de raíz de una ecuación»: ¿Describe adecuadamente el concepto esta frase? «En
    el contexto de ecuaciones, la palabra ''raíz'' es un sinónimo directo de ''solución''»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: En el contexto de ecuaciones, la palabra ''raíz'' es un sinónimo
    directo de ''solución''.'
- titulo: 'Respecto de «Concepto de raíz de una ecuación»: ¿Se puede aceptar esta afirmación? «Extraer'
  enunciado: 'Respecto de «Concepto de raíz de una ecuación»: ¿Se puede aceptar esta afirmación? «Extraer raíz cuadrada
    a los términos de la ecuación pensando que a eso se refiere la instrucción ''halla la raíz''»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En el contexto de ecuaciones, la palabra ''raíz'' es un sinónimo
    directo de ''solución''.'
errores_frecuentes:
- Extraer raíz cuadrada a los términos de la ecuación pensando que a eso se refiere la instrucción 'halla la raíz'.
- El exponente de la incógnita.
- La operación de raíz cuadrada.
- El coeficiente que acompaña a la 'x'.
- Para «Encuentra la raíz de la ecuación $x + 8 = 15$.», la respuesta correcta es $23$.
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
