semantic_id: MAT.ALG.CUADRADO_BINOMIO.DIFERENCIA_DEFINICION
titulo: Definición de cuadrado de binomio (Diferencia)
objetivo: Comprender e interpretar algebraicamente el concepto del cuadrado de un binomio en su forma de diferencia
  $(a-b)^2$.
introduccion: Al igual que con la suma, podemos elevar una resta o diferencia al cuadrado. ¿Crees que el resultado
  es muy distinto al de la suma?
resumen: 'El cuadrado de un binomio diferencia se define como la multiplicación del binomio por sí mismo: $(a-b)^2
  = (a-b)(a-b)$.

  Al aplicar la distributividad, se genera un término central negativo: $a^2 - 2ab + b^2$.'
explicacion: '### Definición formal


  El exponente $2$ indica multiplicar la base, que es el binomio completo $(x-y)$, por sí misma.


  ### Desarrollo didáctico


  El cuadrado de un binomio con una resta (diferencia) se expresa como $(a-b)^2$. Igual que en la suma, esto significa
  multiplicar el binomio por sí mismo: $(a-b)(a-b)$.


  Aplicando la propiedad distributiva término a término, pero teniendo mucho cuidado con los signos:

  $(a-b)(a-b) = a(a) + a(-b) + (-b)(a) + (-b)(-b)$

  $= a^2 - ab - ba + b^2$


  Como la multiplicación es conmutativa, $-ab$ y $-ba$ son términos semejantes. Al juntarlos, obtenemos un solo
  término negativo: $-2ab$. El último término, $(-b)(-b)$, se vuelve positivo ($+b^2$) porque negativo por negativo
  es positivo.


  **Fórmula:** $(a-b)^2 = a^2 - 2ab + b^2$


  **Conclusión:** La única diferencia respecto al cuadrado de una suma es el signo negativo del término central
  o "doble producto". Los extremos ($a^2$ y $b^2$) siempre serán positivos.'
procedimiento:
- 'Paso 1: Para entender la definición de la diferencia:'
- 'Paso 2: Escribe la base multiplicada por sí misma: $(A-B)(A-B)$.'
- 'Paso 3: Recuerda que los productos cruzados tendrán un signo negativo y un signo positivo, resultando siempre
  negativos.'
- 'Paso 4: Recuerda que el producto de los segundos términos será $(-B)(-B) = +B^2$.'
- El exponente $2$ indica multiplicar la base, que es el binomio completo $(x-y)$, por sí misma.
ejemplos:
- titulo: Expansión conceptual
  enunciado: Expresa conceptualmente qué significa $(5x - 2y)^2$.
  solucion_pasos:
  - La base es la resta $(5x - 2y)$.
  - El cuadrado indica multiplicar esa base por sí misma dos veces.
  - Significa $(5x - 2y)(5x - 2y)$.
- titulo: Sabiendo que $(a-b)^2 = 36$ y que $a^2+b^2=100$. ¿Cuál es el valor del producto $ab$
  enunciado: 'Sabiendo que $(a-b)^2 = 36$ y que $a^2+b^2=100$. ¿Cuál es el valor del producto $ab$?


    Opciones: A) $32$ · B) $64$ · C) $-32$ · D) $136$'
  solucion_pasos:
  - $(a-b)^2 = a^2 - 2ab + b^2 = 100 - 2ab$. Como sabemos que es igual a $36$, entonces $100 - 2ab = 36 \Rightarrow
    2ab = 64 \Rightarrow ab = 32$.
  - 'Respuesta: $32$'
- titulo: 'Respecto de «Definición de cuadrado de binomio diferencia»: ¿Es correcta esta caracterizació'
  enunciado: 'Respecto de «Definición de cuadrado de binomio diferencia»: ¿Es correcta esta caracterización? «El
    cuadrado de un binomio diferencia se define como la multiplicación del binomio por sí mismo: $(a-b)^2 = (a-b)(a-b)$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El cuadrado de un binomio diferencia se define como la multiplicación
    del binomio por sí mismo: $(a-b)^2 = (a-b)(a-b)$.'
- titulo: 'Respecto de «Definición de cuadrado de binomio diferencia»: ¿Es válida esta afirmación? «Pen'
  enunciado: 'Respecto de «Definición de cuadrado de binomio diferencia»: ¿Es válida esta afirmación? «Pensar que
    el último término es negativo: $(a-b)^2 = a^2 - 2ab - b^2$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El cuadrado de un binomio diferencia se define como la multiplicación
    del binomio por sí mismo: $(a-b)^2 = (a-b)(a-b)$.'
errores_frecuentes:
- 'Pensar que el último término es negativo: $(a-b)^2 = a^2 - 2ab - b^2$.'
- Creer que $(a-b)^2 = a^2 - b^2$.
- El cuadrado del primer término menos el cuadrado del segundo.
- Para «¿Qué indica conceptualmente la expresión $(x-y)^2$», la respuesta correcta es La diferencia entre el doble
  de $x$ y el doble de $y$.
- El producto de $(x-y)(x+y)$.
