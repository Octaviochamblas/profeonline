semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.COCIENTE
titulo: Propiedad del logaritmo de un cociente
objetivo: Aplicar la propiedad $\log_b(x/y)=\log_b(x)-\log_b(y)$ para transformar cocientes en restas dentro de
  expresiones algebraicas.
introduccion: Así como el producto se transforma en una suma de logaritmos, el cociente se transforma en una
  resta, siguiendo la misma lógica de las potencias.
resumen: La propiedad del **cociente** establece que $\log_b(x/y)=\log_b(x)-\log_b(y)$, siempre que $x>0$ e
  $y>0$, permitiendo separar o combinar una división dentro de un logaritmo.
explicacion: '### Definición formal


  Para $b>0$, $b\neq1$, $x>0$ e $y>0$, se cumple $\log_b(x/y)=\log_b(x)-\log_b(y)$. Se demuestra definiendo
  $m=\log_b(x)$ y $n=\log_b(y)$, de modo que $b^m=x$ y $b^n=y$; al dividir, $x/y=b^{m-n}$, y aplicando el
  logaritmo se obtiene la igualdad.


  ### Desarrollo didáctico


  $\log_2(32/4)=\log_2(32)-\log_2(4)=5-2=3$, lo mismo que calcular directamente $\log_2(8)=3$. En álgebra, esto
  permite separar $\log_b(x/y^2)$ en $\log_b(x)-\log_b(y^2)$, preparando la expresión para simplificar el
  segundo término con la propiedad de la potencia.'
procedimiento:
- 'Paso 1: Identifica el cociente dentro del argumento del logaritmo.'
- 'Paso 2: Separa el logaritmo en una resta de logaritmos: numerador menos denominador.'
- 'Paso 3: Verifica que tanto el numerador como el denominador sean positivos antes de dar por válida la
    separación.'
ejemplos:
- titulo: Separación de un cociente numérico
  enunciado: 'Aplica la propiedad del cociente a $\log_3(81/9)$.'
  solucion_pasos:
  - Se separa en $\log_3(81)-\log_3(9)$.
  - 'Se calcula: $4-2=2$, igual a $\log_3(9)=2$.'
- titulo: Separación de un cociente algebraico
  enunciado: 'Aplica la propiedad del cociente a $\log_4(x^3/y)$.'
  solucion_pasos:
  - Se separa en $\log_4(x^3)-\log_4(y)$.
  - La expresión queda lista para simplificar $\log_4(x^3)$ con la propiedad de la potencia.
- titulo: ¿Se puede aplicar la propiedad del cociente si el denominador es negativo?
  enunciado: ¿Es válido separar $\log_5(x/(-y))$ como $\log_5(x)-\log_5(-y)$?
  respuesta: 'No'
  solucion_pasos:
  - El denominador debe ser positivo por separado; $-y$ no cumple esa condición si $y>0$.
- titulo: ¿El orden de la resta importa en la propiedad del cociente?
  enunciado: ¿Es lo mismo $\log_b(x)-\log_b(y)$ que $\log_b(y)-\log_b(x)$?
  respuesta: 'No'
  solucion_pasos:
  - 'El primero equivale a $\log_b(x/y)$ y el segundo a $\log_b(y/x)$, expresiones distintas salvo que $x=y$.'
errores_frecuentes:
- Invertir el orden de la resta al separar el cociente, cambiando el resultado.
- Confundir la propiedad del cociente con una división entre logaritmos, $\log_b(x)/\log_b(y)$.
- Aplicar la separación sin verificar que numerador y denominador sean ambos positivos.
- Olvidar que la propiedad solo aplica a cocientes, no a restas dentro del argumento.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
