semantic_id: MAT.ALG.MODELAMIENTO_AFIN.INTERPRETACION_PENDIENTE_CONTEXTO
titulo: Interpretación contextual de la pendiente
objetivo: Interpretar el valor numérico de la pendiente de un modelo afín en términos del contexto real que representa.
introduccion: Un número solo no dice mucho; pero cuando le agregas las unidades y el contexto, la pendiente cuenta
  toda la historia de cómo cambia una magnitud respecto a otra.
resumen: En un modelo afín aplicado a un contexto, la **pendiente** $m$ representa la tasa de cambio de la magnitud
  dependiente por cada unidad de la magnitud independiente, con las unidades propias del problema.
explicacion: '### Definición formal


  Dado un modelo $f(x)=mx+n$ que representa una magnitud $y$ (con unidades $U_y$) en función de $x$ (con unidades
  $U_x$), la pendiente $m$ se interpreta como una tasa de cambio con unidades $U_y/U_x$: cuánto varía $y$ por
  cada unidad de $U_x$ que aumenta $x$.


  ### Desarrollo didáctico


  Para interpretar correctamente, siempre hay que nombrar las dos magnitudes y sus unidades: no basta con decir
  "la pendiente es 5", hay que decir "por cada [unidad de x], [la magnitud y] cambia en 5 [unidades de y]".


  Si $C(x)=250x+1000$ modela el costo (en pesos) según los kilómetros recorridos, la pendiente $250$ se interpreta
  como "el costo aumenta \$250 por cada kilómetro adicional recorrido".'
procedimiento:
- 'Paso 1: Identifica qué magnitud representa $x$ y qué magnitud representa $y$ en el contexto.'
- 'Paso 2: Identifica las unidades de ambas magnitudes.'
- 'Paso 3: Redacta la interpretación como "por cada unidad de $x$, $y$ cambia en $m$ unidades".'
ejemplos:
- titulo: Interpretación en contexto de velocidad
  enunciado: 'Si $D(t)=60t$ modela la distancia (en km) recorrida en función del tiempo $t$ (en horas), interpreta
    la pendiente $60$.'
  solucion_pasos:
  - La pendiente indica cuánto cambia la distancia por cada hora transcurrida.
  - Interpretación - por cada hora, la distancia recorrida aumenta en 60 km (es decir, la velocidad es 60 km/h).
- titulo: Interpretación en contexto de costo
  enunciado: 'Si $C(x)=80x+2000$ modela el costo según las unidades producidas $x$, interpreta la pendiente $80$.'
  solucion_pasos:
  - La pendiente indica cuánto cambia el costo por cada unidad producida.
  - Interpretación - por cada unidad adicional producida, el costo aumenta en \$80.
- titulo: ¿La pendiente de un modelo contextual debe interpretarse con sus unidades correspondientes?
  enunciado: ¿La pendiente de un modelo contextual debe interpretarse con sus unidades correspondientes?
  respuesta: Sí
  solucion_pasos:
  - Sin las unidades, el número pierde el significado real que aporta al contexto.
- titulo: ¿Una pendiente negativa en contexto siempre representa una pérdida de dinero?
  enunciado: ¿Una pendiente negativa en contexto siempre representa una pérdida de dinero?
  respuesta: 'No'
  solucion_pasos:
  - Depende del contexto - puede representar disminución de temperatura, de altura, de población, etc., no exclusivamente
    dinero.
errores_frecuentes:
- Interpretar la pendiente como un número aislado, sin mencionar las magnitudes ni las unidades.
- Confundir cuál magnitud corresponde a $x$ y cuál a $y$ al redactar la interpretación.
- Olvidar mencionar la dirección del cambio (aumento o disminución) según el signo de la pendiente.
- Interpretar la pendiente como si fuera el valor total, en vez de la tasa por unidad.
