semantic_id: 'MAT.ALG.SUMA_DIFERENCIA.ERROR_SIGNO'
titulo: 'Detección de error de signo en suma por diferencia'
objetivo: 'Identificar y corregir el error común de sumar los cuadrados en lugar de restarlos.'
introduccion: '¡No dejes que los signos te engañen! El resultado de una suma por su diferencia NUNCA es una suma de cuadrados.'
resumen: |
  Un error clásico es resolver $(a+b)(a-b) = a^2 + b^2$.
  La realidad es que $(a+b)(a-b)$ SIEMPRE resulta en una diferencia: $a^2 - b^2$.
  La suma de cuadrados $a^2 + b^2$ NO es factorizable en los números reales mediante binomios simples (requiere números complejos).
explicacion: |
  Al usar la regla de suma por diferencia, es común cometer errores relacionados con los signos si no se identifica correctamente qué término juega el rol de "primer término" y cuál de "segundo término".
  
  **El error principal:**
  Si tienes la multiplicación $(-x + y)(-x - y)$, un error común es decir que el resultado es $x^2 + y^2$ o $-x^2 - y^2$.
  
  **Cómo hacerlo correctamente:**
  Debes fijarte en qué término cambia de signo entre los dos paréntesis y cuál se mantiene constante.
  - El término constante es el minuendo (va primero y positivo al elevar al cuadrado).
  - El término que cambia de signo es el sustraendo (va después del signo menos).
  
  En $(-x + y)(-x - y)$:
  - El término que no cambia es $-x$. Su cuadrado es $(-x)^2 = x^2$.
  - El término que sí cambia de signo es $y$ (en un paréntesis es $+y$, en el otro es $-y$). Su cuadrado es $y^2$.
  - Restamos: $x^2 - y^2$.
  
  No te dejes engañar por el orden visual; confía siempre en quién cambia de signo y quién no.
procedimiento:
  - 'Paso 1: Al auditar un resultado de suma por diferencia:'
  - 'Paso 2: Verifica que haya dos términos, ambos elevados al cuadrado.'
  - 'Paso 3: Revisa el signo entre ellos. DEBE ser un signo menos ($-$).'
  - 'Paso 4: Si hay un signo más, el desarrollo está incorrecto.'
ejemplos:
  - titulo: 'Auditoría simple'
    enunciado: 'En un examen, un estudiante escribe $(x-7)(x+7) = x^2 + 49$. ¿Por qué está malo?'
    solucion_pasos:
      - 'Porque al hacer la multiplicación final de los segundos términos: $(-7) \\\\\\cdot (+7) = -49$.'
      - 'El estudiante omitió la regla de signos. Lo correcto es $x^2 - 49$.'
errores_frecuentes:
  - 'Creer que la diferencia de cuadrados puede dar positivo si se reordena la expresión.'
