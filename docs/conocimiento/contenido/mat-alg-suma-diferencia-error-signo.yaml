semantic_id: MAT.ALG.SUMA_DIFERENCIA.ERROR_SIGNO
titulo: Detección de error de signo en suma por diferencia
objetivo: Identificar y corregir el error común de sumar los cuadrados en lugar de restarlos.
introduccion: No dejes que los signos te engañen. El resultado de una suma por su diferencia nunca es una suma de
  cuadrados.
resumen: 'Un error clásico es resolver $(a+b)(a-b) = a^2 + b^2$.

  La realidad es que $(a+b)(a-b)$ siempre resulta en una diferencia: $a^2 - b^2$.

  La suma de cuadrados $a^2 + b^2$ NO es factorizable en los números reales mediante binomios simples (requiere
  números complejos).'
explicacion: '### Definición formal


  Más por menos da menos. El resultado correcto es $x^2 - 25$.


  ### Desarrollo didáctico


  Al usar la regla de suma por diferencia, es común cometer errores relacionados con los signos si no se identifica
  correctamente qué término juega el rol de "primer término" y cuál de "segundo término".


  **El error principal:**

  Si tienes la multiplicación $(-x + y)(-x - y)$, un error común es decir que el resultado es $x^2 + y^2$ o $-x^2
  - y^2$.


  **Cómo hacerlo correctamente:**

  Debes fijarte en qué término cambia de signo entre los dos paréntesis y cuál se mantiene constante.

  - El término constante es el minuendo (va primero y positivo al elevar al cuadrado).

  - El término que cambia de signo es el sustraendo (va después del signo menos).


  En $(-x + y)(-x - y)$:

  - El término que no cambia es $-x$. Su cuadrado es $(-x)^2 = x^2$.

  - El término que sí cambia de signo es $y$ (en un paréntesis es $+y$, en el otro es $-y$). Su cuadrado es $y^2$.

  - Restamos: $x^2 - y^2$.


  No te dejes engañar por el orden visual; confía siempre en quién cambia de signo y quién no.'
procedimiento:
- 'Paso 1: Al auditar un resultado de suma por diferencia:'
- 'Paso 2: Verifica que haya dos términos, ambos elevados al cuadrado.'
- 'Paso 3: Revisa el signo entre ellos. DEBE ser un signo menos ($-$).'
- 'Paso 4: Si hay un signo más, el desarrollo está incorrecto.'
- Más por menos da menos. El resultado correcto es $x^2 - 25$.
ejemplos:
- titulo: Auditoría simple
  enunciado: En un examen, un estudiante escribe $(x-7)(x+7) = x^2 + 49$. ¿Por qué está malo?
  solucion_pasos:
  - 'Porque al hacer la multiplicación final de los segundos términos: $(-7) \\\\\\cdot (+7) = -49$.'
  - El estudiante omitió la regla de signos. Lo correcto es $x^2 - 49$.
- titulo: Si un alumno afirma que $a^2 + b^2 = (a-b)(a+b)$, y lo usa para resolver un sistema, ¿en qué
  enunciado: 'Si un alumno afirma que $a^2 + b^2 = (a-b)(a+b)$, y lo usa para resolver un sistema, ¿en qué caso
    particular su razonamiento defectuoso le arrojará una respuesta correcta a pesar del error?


    Opciones: A) Solo cuando $b = 0$. · B) Cuando $a = b$. · C) Nunca, siempre será un error catastrófico. · D)
    Cuando $a$ es positivo y $b$ es negativo.'
  solucion_pasos:
  - Si igualamos $a^2 + b^2 = a^2 - b^2$, obtenemos $2b^2 = 0 \Rightarrow b = 0$. Solo en ese caso extremo el error
    no afecta.
  - 'Respuesta: Solo cuando $b = 0$.'
- titulo: 'Respecto de «Detección de error de signo en suma por diferencia»: ¿Es correcta esta caracter'
  enunciado: 'Respecto de «Detección de error de signo en suma por diferencia»: ¿Es correcta esta caracterización?
    «Un error clásico es resolver $(a+b)(a-b) = a^2 + b^2$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un error clásico es resolver $(a+b)(a-b) = a^2 + b^2$.'
- titulo: 'Respecto de «Detección de error de signo en suma por diferencia»: ¿Es válida esta afirmación'
  enunciado: 'Respecto de «Detección de error de signo en suma por diferencia»: ¿Es válida esta afirmación? «Creer
    que la diferencia de cuadrados puede dar positivo si se reordena la expresión»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un error clásico es resolver $(a+b)(a-b) = a^2 + b^2$.'
errores_frecuentes:
- Creer que la diferencia de cuadrados puede dar positivo si se reordena la expresión.
- Falta el término central $10x$.
- Para «¿Cuál de las siguientes afirmaciones explica por qué $(x+5)(x-5) = x^2 + 25$ es un resultado INCORRECTO»,
  la respuesta correcta es Falta el doble producto.
- La $x$ debería estar elevada a $4$.
- $x^2 - 16$.
