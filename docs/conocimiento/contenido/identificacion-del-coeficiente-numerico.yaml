semantic_id: MAT.ALG.TERMINO.COEFICIENTE_NUMERICO
titulo: Identificación del coeficiente numérico
objetivo: Identificar el coeficiente numérico de un término algebraico y comprender su función multiplicadora.
introduccion: Si tienes una caja llena de gatos, la variable es 'gato'. Pero, ¿cuántos gatos tienes? El
  número grande que va al frente de la palabra es el que te da la cantidad. Ese número es el coeficiente.
resumen: "El **Coeficiente Numérico** es el factor (el número conocido) que antecede a las letras en un\
  \ término algebraico. Indica cuántas veces se debe sumar la parte literal a sí misma. \n- **Regla del\
  \ uno invisible:** Si un término no tiene coeficiente numérico visible (ej. $x$), se asume obligatoriamente\
  \ que su coeficiente es el número $1$."
explicacion: "### Definición formal\n\nEl coeficiente es un multiplicador (factor). $4xy = xy + xy + xy\
  \ + xy$.\n\n### Desarrollo didáctico\n\nEl coeficiente es el capitán del barco. \n- En el término $5a$,\
  \ el coeficiente es $5$. Significa que tenemos $a + a + a + a + a$. Es el multiplicador.\n- En el término\
  \ $-3x^2$, el coeficiente es $-3$.\n- En el término $ab$, no ves ningún número. ¿Significa que hay cero\
  \ $ab$? Claro que no. Si hubiese cero, no verías las letras (porque $0 \\cdot ab = 0$). El coeficiente\
  \ es $1$. (Un $ab$).\n- En el término $-x$, el coeficiente es $-1$.\n\n*Ojo con las fracciones:* En\
  \ un término como $\\frac{x}{4}$, el coeficiente numérico no es un '4 abajo', es la fracción completa\
  \ $\\frac{1}{4}$."
procedimiento:
- 'Paso 1: Localiza el número grande que multiplica las letras.'
- 'Paso 2: Incluye el signo que lo acompaña (+ o -) como parte de su identidad.'
- 'Paso 3: Si no hay número, escribe ''1''. Si está en forma de división por ''k'', el coeficiente es
  la fracción ''1/k''.'
ejemplos:
- titulo: Cacería de coeficientes
  enunciado: Extrae el coeficiente numérico de a) -8y, b) abc, c) -z, d) 3x/5
  solucion_pasos:
  - a) -8. (Se lleva su signo negativo).
  - b) 1. (El uno invisible).
  - c) -1. (El negativo y el uno invisible).
  - d) 3/5. (Es una fracción multiplicando a x).
- titulo: Un test automatizado evalúa las características de la expresión $-y$. Un estudiante marca qu
  enunciado: 'Un test automatizado evalúa las características de la expresión $-y$. Un estudiante marca
    que ''su coeficiente numérico es cero porque no hay números y su signo es negativo''. La retroalimentación
    automática rechaza la respuesta porque: (v1)


    Opciones: A) Si el coeficiente fuera verdaderamente cero, la expresión completa se anularía matemáticamente;
    el coeficiente real es $-1$. · B) El coeficiente sí es cero, pero el estudiante falló en el signo.
    · C) Las variables individuales no poseen coeficiente numérico por definición. · D) El coeficiente
    debe ser obligatoriamente una letra.'
  solucion_pasos:
  - Cero multiplicado por cualquier cosa da cero ($0 \cdot y = 0$). Como la y sobrevive en la expresión
    $-y$, su coeficiente es el neutro multiplicativo con signo cambiado ($-1$).
  - 'Respuesta: Si el coeficiente fuera verdaderamente cero, la expresión completa se anularía matemáticamente;
    el coeficiente real es $-1$.'
- titulo: 'Respecto de «Identificación del coeficiente numérico»: ¿Describe adecuadamente el concepto
    e'
  enunciado: 'Respecto de «Identificación del coeficiente numérico»: ¿Describe adecuadamente el concepto
    esta frase? «El **Coeficiente Numérico** es el factor (el número conocido) que antecede a las letras
    en un término algebraico»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Coeficiente Numérico** es el factor (el número
    conocido) que antecede a las letras en un término algebraico.'
- titulo: 'Respecto de «Identificación del coeficiente numérico»: ¿Se puede aceptar esta afirmación? «C'
  enunciado: 'Respecto de «Identificación del coeficiente numérico»: ¿Se puede aceptar esta afirmación?
    «Confundir el coeficiente con el exponente (Ej: en $x^5$ decir que el coeficiente es 5, cuando el
    coeficiente es 1 y el exponente es 5)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Coeficiente Numérico** es el factor (el número
    conocido) que antecede a las letras en un término algebraico.'
errores_frecuentes:
- 'Confundir el coeficiente con el exponente (Ej: en $x^5$ decir que el coeficiente es 5, cuando el coeficiente
  es 1 y el exponente es 5).'
- Decir que el coeficiente de una variable solitaria es cero, lo que eliminaría todo el término matemáticamente.
- Para «¿Qué significado aritmético tiene el coeficiente numérico '$4$' en el término algebraico $4xy$?
  (v1)», la respuesta correcta es Significa que la letra $x$ y la letra $y$ deben elevarse ambas a la
  cuarta potencia.
- Significa que se le debe sumar cuatro al valor final de '$xy$'.
- Significa que el número cuatro se divide entre las letras.
fuente: Álgebra de Baldor.
