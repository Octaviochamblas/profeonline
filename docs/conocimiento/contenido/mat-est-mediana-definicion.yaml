semantic_id: MAT.EST.MEDIANA_ANALISIS.DEFINICION
titulo: Definir la mediana como valor central de datos ordenados
objetivo: Definir la mediana como el valor que ocupa la posición central de un conjunto de datos ordenados
  de menor a mayor.
introduccion: 'La mediana divide al conjunto de datos ordenados en dos mitades iguales: la mitad de los
  datos son menores o iguales, y la otra mitad mayores o iguales.'
resumen: La mediana es el valor que se ubica en el centro de un conjunto de datos ordenados, dejando la
  misma cantidad de datos por debajo y por encima de ella.
explicacion: '![Concepto de mediana](/static/img/estadistica/mediana/mediana-definicion.svg)


  ### Definición formal


  Ordenados los datos de menor a mayor, la mediana $Me$ es el valor que ocupa la posición central, dejando
  el 50% de los datos a cada lado.


  ### Desarrollo didáctico


  En el conjunto ordenado {3, 5, 7, 9, 11}, el valor central es 7 (con dos datos menores y dos mayores),
  por lo que la mediana es 7.'
procedimiento:
- 'Paso 1: Ordena los datos de menor a mayor.'
- 'Paso 2: Identifica la posición central del conjunto ordenado.'
- 'Paso 3: El valor en esa posición central es la mediana.'
ejemplos:
- titulo: Determinar la mediana de {3,5,7,9,11}
  enunciado: 'Datos ordenados: 3,5,7,9,11.'
  solucion_pasos:
  - El valor central es 7, con dos datos menores y dos mayores. Mediana=7.
- titulo: Determinar la mediana de edades
  enunciado: 'Edades ordenadas: 10,12,14,16,18.'
  solucion_pasos:
  - El valor central es 14. Mediana=14.
- titulo: ¿La mediana requiere que los datos estén ordenados previamente?
  respuesta: Sí
  solucion_pasos:
  - Sí, es un requisito indispensable antes de identificar el valor central.
- titulo: ¿La mediana deja la misma cantidad de datos por debajo y por encima de ella?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad central que define a la mediana.
errores_frecuentes:
- Calcular la mediana sin ordenar primero los datos, obteniendo un resultado incorrecto.
- Confundir la mediana con la media o la moda, aplicando el procedimiento equivocado.
- No verificar que efectivamente queden la misma cantidad de datos a cada lado del valor identificado.
fuente: 'Elaboración propia (referencia: Moraleja 359).'
estado: publicado
