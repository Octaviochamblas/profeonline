semantic_id: MAT.ALG.FUNCION_REPRESENTACION.RECORRIDO_DESDE_GRAFICO
titulo: Determinación del recorrido desde un gráfico
objetivo: Determinar el recorrido de una función proyectando su gráfica sobre el eje vertical.
introduccion: 'Si el dominio es la sombra sobre el suelo, el recorrido es la sombra sobre la pared: todas las alturas
  que la curva efectivamente alcanza.'
resumen: El recorrido de una función representada gráficamente se obtiene proyectando la totalidad de la curva
  sobre el eje vertical ($y$), identificando todos los valores de ordenada efectivamente alcanzados.
explicacion: '### Definición formal


  Dado el gráfico $G_f = \{(x, f(x))\}$ de una función $f$, el recorrido corresponde a la proyección ortogonal
  de $G_f$ sobre el eje $y$: $\text{Rec}(f) = \{y \in \mathbb{R} : \exists\, x,\ (x,y) \in G_f\}$.


  ### Desarrollo didáctico


  Visualmente, observa las alturas mínima y máxima que alcanza la curva, prestando atención a si esos extremos
  se incluyen (puntos sólidos) o se excluyen (puntos abiertos), y a posibles huecos en el recorrido.


  Si una parábola con vértice en $(2, -5)$ abre hacia arriba y no tiene cota superior, el recorrido es $[-5, +\infty[$.'
procedimiento:
- 'Paso 1: Identifica la altura mínima (más baja) alcanzada por la curva.'
- 'Paso 2: Identifica la altura máxima (más alta) alcanzada por la curva.'
- 'Paso 3: Verifica si esos extremos están incluidos (puntos sólidos) o excluidos (puntos abiertos).'
- 'Paso 4: Expresa el recorrido como intervalo, considerando también posibles huecos intermedios.'
ejemplos:
- titulo: Recorrido acotado
  enunciado: Una curva alcanza como máximo $y=6$ (incluido) y como mínimo $y=-2$ (incluido), sin interrupciones.
    Determina el recorrido.
  solucion_pasos:
  - Ambos extremos están incluidos y no hay huecos intermedios.
  - 'Recorrido: $[-2, 6]$.'
- titulo: Recorrido de una parábola hacia arriba
  enunciado: El vértice de una parábola está en $(3, -4)$ y la parábola abre hacia arriba sin cota superior. Determina
    el recorrido.
  solucion_pasos:
  - La altura mínima es $-4$, alcanzada en el vértice.
  - No existe cota superior, pues la parábola crece indefinidamente.
  - 'Recorrido: $[-4, +\infty[$.'
- titulo: ¿El recorrido se obtiene proyectando la curva sobre el eje horizontal?
  enunciado: ¿El recorrido se obtiene proyectando la curva sobre el eje horizontal?
  respuesta: 'No'
  solucion_pasos:
  - Esa proyección da el dominio; el recorrido se obtiene proyectando sobre el eje vertical.
- titulo: ¿Un punto abierto en la altura máxima de una curva indica que esa altura pertenece al recorrido?
  enunciado: ¿Un punto abierto en la altura máxima de una curva indica que esa altura pertenece al recorrido?
  respuesta: 'No'
  solucion_pasos:
  - Un punto abierto marca la exclusión de esa altura específica del recorrido.
errores_frecuentes:
- Proyectar la curva sobre el eje horizontal en vez del vertical, confundiendo recorrido con dominio.
- Ignorar que una curva puede tener un salto o hueco en su rango de alturas.
- Suponer que toda curva no acotada tiene recorrido $\mathbb{R}$ completo, sin analizar el comportamiento real.
- Confundir el valor máximo o mínimo visible en el recuadro del gráfico con el verdadero extremo del recorrido.
