semantic_id: MAT.GEO.POLIEDROS_PRISMAS.OCTAEDRO_REGULAR
titulo: Identificación del octaedro regular
objetivo: Reconocer el octaedro regular como el poliedro regular formado por ocho caras triangulares equiláteras
  congruentes, equivalente a dos pirámides de base cuadrada unidas por su base.
introduccion: El octaedro regular se puede imaginar como dos pirámides cuadradas idénticas pegadas por
  su base, formando un cuerpo con 8 caras triangulares.
resumen: El octaedro regular es un poliedro regular formado por 8 caras triangulares equiláteras congruentes,
  6 vértices y 12 aristas, con 4 caras concurriendo en cada vértice.
explicacion: '![Octaedro regular](/static/img/geometria/espacio-cuerpos/octaedro-regular.svg)


  ### Definición formal


  El octaedro regular es uno de los cinco sólidos platónicos. Tiene 8 caras (todas triángulos equiláteros
  congruentes), 6 vértices y 12 aristas. En cada vértice concurren exactamente 4 caras.


  ### Desarrollo didáctico


  En la figura, el octaedro puede visualizarse como dos pirámides de base cuadrada unidas por esa base:
  4 vértices forman el ''ecuador'' cuadrado, y los otros 2 vértices son las puntas superior e inferior.
  Cada una de las 8 caras triangulares conecta un lado del ecuador con una de las dos puntas.'
procedimiento:
- 'Paso 1: Verifica que el cuerpo tenga exactamente 8 caras triangulares.'
- 'Paso 2: Verifica que las 8 caras sean triángulos equiláteros congruentes entre sí.'
- 'Paso 3: Confirma que en cada uno de los 6 vértices concurran exactamente 4 caras.'
ejemplos:
- titulo: Contar los elementos del octaedro regular
  enunciado: Un octaedro regular tiene 8 caras triangulares.
  solucion_pasos:
  - 'Tiene 8 caras, 6 vértices y 12 aristas, cumpliendo la relación de Euler: 6-12+8=2.'
- titulo: Visualizar el octaedro como dos pirámides unidas
  enunciado: El octaedro tiene un 'ecuador' cuadrado con 4 vértices, más 2 vértices (arriba y abajo).
  solucion_pasos:
  - Se puede pensar como dos pirámides de base cuadrada pegadas por esa base común.
- titulo: ¿En cada vértice del octaedro concurren 4 caras?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del tetraedro y el cubo (donde concurren 3), en el octaedro concurren 4 caras por
    vértice.
- titulo: ¿El octaedro tiene más aristas que el tetraedro?
  respuesta: Sí
  solucion_pasos:
  - Sí, el octaedro tiene 12 aristas, mientras que el tetraedro tiene solo 6.
errores_frecuentes:
- Confundir el octaedro con dos pirámides independientes en vez de un único poliedro fusionado.
- Contar incorrectamente el número de caras concurrentes en cada vértice (son 4, no 3).
- Olvidar que el octaedro regular exige caras triangulares equiláteras, no cualquier triángulo.
fuente: 'Elaboración propia (referencia: Moraleja 96).'
estado: publicado
