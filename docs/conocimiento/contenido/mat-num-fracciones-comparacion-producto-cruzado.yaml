semantic_id: MAT.NUM.FRACCIONES_COMPARACION.PRODUCTO_CRUZADO
objetivo: Comprender comparación de fracciones mediante producto cruzado y aplicarlo
  correctamente en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso comparación de fracciones mediante producto cruzado ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: El producto cruzado permite comparar dos fracciones sin calcular decimales,
  multiplicando cada numerador por el denominador opuesto. Además, si \(a\cdot d >
  b\cdot c\), entonces \(\frac{a}{b} > \frac{c}{d}\) con denominadores positivos.
explicacion: |-
  El producto cruzado permite comparar dos fracciones sin calcular decimales, multiplicando cada numerador por el denominador opuesto.

  Una idea importante es que si \(a\cdot d > b\cdot c\), entonces \(\frac{a}{b} > \frac{c}{d}\) con denominadores positivos.

  Por ejemplo, Para comparar \(\frac{4}{7}\) y \(\frac{5}{9}\), se comparan \(4\cdot 9\) y \(5\cdot 7\).
procedimiento:
- 'Paso 1: Elegir una estrategia conveniente: simplificar, amplificar, usar productos
  cruzados o un denominador común.'
- 'Paso 2: Ejecutar la comparación o transformación paso a paso, cuidando el valor
  de la fracción.'
- 'Paso 3: Interpretar el resultado y expresarlo con lenguaje matemático claro.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Para comparar \(\frac{4}{7}\) y \(\frac{5}{9}\),
    se comparan \(4\cdot 9\) y \(5\cdot 7\).” se relaciona con comparación de fracciones
    mediante producto cruzado.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: el producto cruzado permite comparar dos fracciones
    sin calcular decimales, multiplicando cada numerador por el denominador opuesto.'
  - Concluye que el ejemplo sí ilustra comparación de fracciones mediante producto
    cruzado.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Si \(a\cdot d > b\cdot c\), entonces \(\frac{a}{b}
    > \frac{c}{d}\) con denominadores positivos.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con comparación de fracciones mediante producto
    cruzado?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que si \(a\cdot d > b\cdot c\), entonces \(\frac{a}{b}
    > \frac{c}{d}\) con denominadores positivos.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar comparación de fracciones mediante producto cruzado ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar comparación de fracciones mediante producto cruzado sin mirar qué
  representan numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
