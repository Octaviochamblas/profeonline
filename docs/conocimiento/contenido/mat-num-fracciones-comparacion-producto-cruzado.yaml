semantic_id: MAT.NUM.FRACCIONES_COMPARACION.PRODUCTO_CRUZADO
titulo: Comparación de fracciones mediante producto cruzado
objetivo: Comparar dos fracciones sin buscar un denominador común, usando productos cruzados.
introduccion: 'Existe un atajo para comparar fracciones con distinto denominador que evita calcular el
  mínimo común múltiplo: comparar directamente los productos cruzados de sus términos.'
resumen: 'Para comparar \(\frac{a}{b}\) con \(\frac{c}{d}\) (con \(b,d>0\)) se comparan los productos
  cruzados \(a\cdot d\) y \(b\cdot c\): la fracción asociada al producto mayor es la fracción mayor.'
explicacion: '### Definición formal


  Si \(b,d>0\), \(\frac{a}{b}>\frac{c}{d} \iff a\cdot d>b\cdot c\), pues equivale a amplificar ambas fracciones
  al denominador común \(b\cdot d\) y comparar los numeradores resultantes.


  ### Desarrollo didáctico


  Para comparar \(\frac{4}{7}\) y \(\frac{5}{9}\), se comparan \(4\cdot9=36\) y \(5\cdot7=35\). Como \(36>35\),
  el producto asociado a \(\frac{4}{7}\) es mayor, por lo tanto \(\frac{4}{7}>\frac{5}{9}\).'
procedimiento:
- 'Paso 1: Comprueba que los denominadores sean positivos; si no, normaliza los signos.'
- 'Paso 2: Calcula los productos cruzados \(a\cdot d\) y \(c\cdot b\).'
- 'Paso 3: Compara esos productos para establecer el orden entre \(a/b\) y \(c/d\).'
ejemplos:
- titulo: Aplicación razonada — Comparación de fracciones mediante producto cruzado
  enunciado: Para comparar \(\frac{4}{7}\) y \(\frac{5}{9}\), se comparan \(4\cdot 9\) y \(5\cdot 7\).
  solucion_pasos:
  - Comprueba que los denominadores sean positivos; si no, normaliza los signos.
  - Calcula los productos cruzados \(a\cdot d\) y \(c\cdot b\).
  - Compara esos productos para establecer el orden entre \(a/b\) y \(c/d\).
- titulo: Revisión de una solución — Comparación de fracciones mediante producto cruzado
  enunciado: Una solución aplica “Calcula los productos cruzados \(a\cdot d\) y \(c\cdot b\).”, pero termina
    sin comprobar que si \(a\cdot d > b\cdot c\), entonces \(\frac{a}{b} > \frac{c}{d}\) con denominadores
    positivos. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define comparación de fracciones mediante producto cruzado: el producto
    cruzado permite comparar dos fracciones sin calcular decimales, multiplicando cada numerador por el
    denominador opuesto.'
  - Comprueba que los denominadores sean positivos; si no, normaliza los signos.
  - 'Completa la revisión con este control: Compara esos productos para establecer el orden entre \(a/b\)
    y \(c/d\).'
- titulo: ¿Se cumple que si \(a\cdot d > b\cdot c\), entonces \(\frac{a}{b} > \frac{c}{d}\) con denominadores
    positivos? — Comparación de fracciones mediante producto cruzado
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el producto cruzado permite comparar dos fracciones sin
    calcular decimales, multiplicando cada numerador por el denominador opuesto.
  - El caso “Para comparar \(\frac{4}{7}\) y \(\frac{5}{9}\), se comparan \(4\cdot 9\) y \(5\cdot 7\)”
    satisface esa condición.
  - Compara esos productos para establecer el orden entre \(a/b\) y \(c/d\).
- titulo: ¿Es válido omitir el paso “Comprueba que los denominadores sean positivos; si no, normaliza
    los signos”? — Comparación de fracciones mediante producto cruzado
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de comparación de fracciones mediante producto cruzado.
  - 'Omitirlo puede volver inválida la acción siguiente: Calcula los productos cruzados \(a\cdot d\) y
    \(c\cdot b\).'
  - 'La solución debe terminar de este modo: Compara esos productos para establecer el orden entre \(a/b\)
    y \(c/d\).'
errores_frecuentes:
- 'Empezar comparación de fracciones mediante producto cruzado sin realizar este control inicial: Comprueba
  que los denominadores sean positivos; si no, normaliza los signos.'
- Memorizar “Para comparar \(\frac{4}{7}\) y \(\frac{5}{9}\), se comparan \(4\cdot 9\) y \(5\cdot 7\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Calcula los productos cruzados \(a\cdot d\) y \(c\cdot b\).” y usarlo aunque
  cambien las condiciones del problema.
- Dar por válida una conclusión sobre comparación de fracciones mediante producto cruzado que contradice
  el criterio “Si \(a\cdot d > b\cdot c\), entonces \(\frac{a}{b} > \frac{c}{d}\) con denominadores positivos”.
- 'Cerrar el ejercicio sin esta comprobación específica: Compara esos productos para establecer el orden
  entre \(a/b\) y \(c/d\).'
