semantic_id: MAT.ALG.MULT_POLINOMIOS.PRODUCTO_BINOMIOS
objetivo: Multiplicar dos binomios aplicando el método distributivo doble (método
  FOIL) y reduciendo semejantes.
introduccion: El producto de dos binomios, como $(x+a)(x+b)$, es la multiplicación
  más común que verás en álgebra. Existe un método nemotécnico muy popular en inglés
  llamado FOIL (First, Outer, Inner, Last), que te ayuda a recordar los cuatro productos
  cruzados indispensables.
resumen: 'Al multiplicar **Dos Binomios** $(a+b)(c+d)$, se realizan exactamente 4
  productos: primero × primero ($ac$), primero × segundo ($ad$), segundo × primero
  ($bc$) y segundo × segundo ($bd$). Luego se reducen los semejantes.'
explicacion: 'Sea el producto: $(x + 3)(x - 5)$.


  Aplicamos los cuatro productos:

  1. **F**irst (Primeros): $x \cdot x = x^2$.

  2. **O**uter (Exteriores): $x \cdot (-5) = -5x$.

  3. **I**nner (Interiores): $3 \cdot x = +3x$.

  4. **L**ast (Últimos): $3 \cdot (-5) = -15$.


  Sumamos: $x^2 - 5x + 3x - 15$.

  Reducimos semejantes: $x^2 - 2x - 15$.'
procedimiento:
- 'Paso 1: Multiplica los primeros términos de cada binomio.'
- 'Paso 2: Multiplica los términos exteriores (el primero del primero y el segundo
  del segundo).'
- 'Paso 3: Multiplica los términos interiores (el segundo del primero y el primero
  del segundo).'
- 'Paso 4: Multiplica los últimos términos de cada binomio.'
- 'Paso 5: Agrupa los dos términos centrales (semejantes) y redúcelos.'
ejemplos:
- titulo: El FOIL en acción
  enunciado: 'Multiplica: (2x + 1)(x - 3).'
  solucion_pasos:
  - 'Primeros: (2x)(x) = 2x^2.'
  - 'Exteriores: (2x)(-3) = -6x.'
  - 'Interiores: (1)(x) = +x.'
  - 'Últimos: (1)(-3) = -3.'
  - 'Línea: 2x^2 - 6x + x - 3.'
  - 'Reducción: 2x^2 - 5x - 3.'
errores_frecuentes:
- Multiplicar solo los primeros y los últimos, omitiendo los productos cruzados exteriores/interiores.
- Equivocarse en el signo del producto de los últimos términos.
fuente: Álgebra de Baldor.
estado: publicado
