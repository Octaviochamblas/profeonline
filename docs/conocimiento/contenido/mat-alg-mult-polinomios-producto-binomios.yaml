errores_frecuentes:
- Multiplicar solo los primeros y los últimos, omitiendo los productos cruzados exteriores/interiores.
- Equivocarse en el signo del producto de los últimos términos.
- $x^2$, $-4x$ y $-24$.
- $x^2$ y $-24$.
- $2x$, $6x$, $-4x$ y $2$.
