semantic_id: MAT.ALG.MULT_POLINOMIOS.PRODUCTO_BINOMIOS
objetivo: Multiplicar dos binomios aplicando el método distributivo doble (método FOIL) y reduciendo semejantes.
introduccion: El producto de dos binomios, como $(x+a)(x+b)$, es la multiplicación más común que verás en álgebra.
  Existe un método nemotécnico muy popular en inglés llamado FOIL (First, Outer, Inner, Last), que te ayuda a recordar
  los cuatro productos cruzados indispensables.
resumen: 'Al multiplicar **Dos Binomios** $(a+b)(c+d)$, se realizan exactamente 4 productos: primero × primero ($ac$),
  primero × segundo ($ad$), segundo × primero ($bc$) y segundo × segundo ($bd$). Luego se reducen los semejantes.'
explicacion: '### Definición formal


  Sean $B_1=a+b$ y $B_2=c+d$ dos binomios. Entonces, por distributividad,

  $$(a+b)(c+d)=ac+ad+bc+bd.$$

  La multiplicación de dos binomios genera exactamente cuatro productos parciales: uno entre cada término del primer
  factor y cada término del segundo. Después de expandir, se reducen los términos semejantes que puedan aparecer en
  la suma resultante.


  ### Desarrollo didáctico


  Sea el producto: $(x + 3)(x - 5)$.


  Aplicamos los cuatro productos:

  1. **F**irst (Primeros): $x \cdot x = x^2$.

  2. **O**uter (Exteriores): $x \cdot (-5) = -5x$.

  3. **I**nner (Interiores): $3 \cdot x = +3x$.

  4. **L**ast (Últimos): $3 \cdot (-5) = -15$.


  Sumamos: $x^2 - 5x + 3x - 15$.

  Reducimos semejantes: $x^2 - 2x - 15$.'
procedimiento:
- 'Paso 1: Identifica los dos términos del primer binomio y los dos del segundo.'
- 'Paso 2: Forma los cuatro productos parciales entre ambos factores: primero con primero, primero con segundo, segundo con primero y segundo con segundo.'
- 'Paso 3: Calcula cada producto parcial aplicando correctamente la ley de signos y las leyes de potencias.'
- 'Paso 4: Escribe la suma de los cuatro productos en una sola expresión.'
- 'Paso 5: Reduce los términos semejantes, especialmente los términos centrales si tienen la misma parte literal.'
ejemplos:
- titulo: El FOIL en acción
  enunciado: 'Multiplica: (2x + 1)(x - 3).'
  solucion_pasos:
  - 'Primeros: (2x)(x) = 2x^2.'
  - 'Exteriores: (2x)(-3) = -6x.'
  - 'Interiores: (1)(x) = +x.'
  - 'Últimos: (1)(-3) = -3.'
  - 'Línea: 2x^2 - 6x + x - 3.'
  - 'Reducción: 2x^2 - 5x - 3.'
- titulo: El ingreso neto por ventas de una distribuidora es $I = (x - 2)(2x + 10)$ miles de pesos, do
  enunciado: 'El ingreso neto por ventas de una distribuidora es $I = (x - 2)(2x + 10)$ miles de pesos, donde $x$
    es el precio unitario. ¿Cuál es la expresión equivalente al desarrollar el producto? (v1)


    Opciones: A) $2x^2 + 6x - 20$ miles de pesos. · B) $2x^2 - 20$ miles de pesos. · C) $2x^2 - 6x - 20$ miles de
    pesos. · D) $2x^2 + 10x - 20$ miles de pesos.'
  solucion_pasos:
  - 'Desarrollamos: $x(2x+10) = 2x^2 + 10x$. $-2(2x+10) = -4x - 20$. Reduciendo semejantes: $2x^2 + (10-4)x - 20
    = 2x^2 + 6x - 20$.'
  - 'Respuesta: $2x^2 + 6x - 20$ miles de pesos.'
