semantic_id: MAT.ALG.FUNCIONES_ESPECIALES.FUNCION_IMPAR_DEFINICION
titulo: Definición de función impar
objetivo: Comprender la definición algebraica de función impar mediante la condición $f(-x)=-f(x)$.
introduccion: 'En otras funciones, evaluar en el opuesto de un número produce exactamente el opuesto del
  resultado original: ese comportamiento define a las funciones impares.'
resumen: Una función $f$ es **impar** si $f(-x) = -f(x)$ para todo $x$ del dominio; es decir, la imagen
  del opuesto de $x$ es el opuesto de la imagen de $x$.
explicacion: '### Definición formal


  Una función $f$ con dominio simétrico respecto al origen es impar si $f(-x) = -f(x)$ para todo $x \in
  \text{Dom}(f)$. Equivalentemente, $f(-x) + f(x) = 0$ para todo $x$.


  ### Desarrollo didáctico


  El procedimiento de verificación es análogo al de las funciones pares: sustituir $-x$, simplificar,
  y esta vez comparar con $-f(x)$ (la fórmula original con signo cambiado).


  Si $f(x)=x^3$: $f(-x)=(-x)^3=-x^3=-f(x)$. Se confirma que es impar. En cambio, para $g(x)=x^2+1$: $g(-x)=x^2+1=g(x)
  \neq -g(x)$, por lo que no es impar.'
procedimiento:
- 'Paso 1: Sustituye $-x$ en cada aparición de la variable de la función.'
- 'Paso 2: Simplifica la expresión resultante.'
- 'Paso 3: Calcula $-f(x)$, es decir, la fórmula original con el signo cambiado.'
- 'Paso 4: Compara ambos resultados - si coinciden, la función es impar.'
ejemplos:
- titulo: Verificación de función impar
  enunciado: Determina si $f(x)=5x^3-2x$ es impar.
  solucion_pasos:
  - $f(-x)=5(-x)^3-2(-x)=-5x^3+2x$.
  - $-f(x)=-(5x^3-2x)=-5x^3+2x$.
  - Coinciden, es impar.
- titulo: Función que no es impar
  enunciado: Determina si $f(x)=x^3+1$ es impar.
  solucion_pasos:
  - $f(-x)=(-x)^3+1=-x^3+1$.
  - $-f(x)=-(x^3+1)=-x^3-1$.
  - No coinciden, no es impar.
- titulo: ¿La función identidad $f(x)=x$ es impar?
  enunciado: ¿La función identidad $f(x)=x$ es impar?
  respuesta: Sí
  solucion_pasos:
  - $f(-x)=-x=-f(x)$, cumpliendo la definición.
- titulo: ¿Toda función impar cumple $f(0)=0$ si $0$ pertenece al dominio?
  enunciado: ¿Toda función impar cumple $f(0)=0$ si $0$ pertenece al dominio?
  respuesta: Sí
  solucion_pasos:
  - De $f(-0)=-f(0)$ se obtiene $f(0)=-f(0)$, lo que solo es posible si $f(0)=0$.
errores_frecuentes:
- Confundir la condición $f(-x)=-f(x)$ con $f(-x)=f(x)$ (paridad).
- Olvidar cambiar el signo de toda la expresión al calcular $-f(x)$.
- Suponer que una función con exponentes impares en su fórmula es automáticamente impar sin verificar
  términos constantes.
- No verificar la condición para todo $x$, sino solo para un valor particular.
