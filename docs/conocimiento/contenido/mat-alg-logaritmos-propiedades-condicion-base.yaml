semantic_id: MAT.ALG.LOGARITMOS_PROPIEDADES.CONDICION_BASE
titulo: Condición de la base al aplicar propiedades logarítmicas
objetivo: Verificar que la base cumpla $b>0$ y $b\neq1$ antes de aplicar cualquier propiedad algebraica del
  logaritmo.
introduccion: Al simplificar expresiones logarítmicas con literales, es fácil olvidar revisar si la base sigue
  siendo válida en cada paso del desarrollo algebraico.
resumen: Toda propiedad del logaritmo, como el producto, cociente o cambio de base, exige que la base $b$ cumpla
  $b>0$ y $b\neq1$; de lo contrario, la propiedad no es aplicable.
explicacion: '### Definición formal


  Las propiedades $\log_b(xy)=\log_b(x)+\log_b(y)$, $\log_b(x/y)=\log_b(x)-\log_b(y)$ y $\log_b(x^n)=n\log_b(x)$
  se enuncian bajo el supuesto de que $b>0$ y $b\neq1$. Si la base propuesta en un ejercicio no cumple estas
  condiciones, ninguna de las propiedades puede aplicarse.


  ### Desarrollo didáctico


  Antes de simplificar una expresión como $\log_5(xy)$, se verifica que $b=5$ cumpla $5>0$ y $5\neq1$. Solo
  entonces es válido reescribirla como $\log_5(x)+\log_5(y)$. Si en cambio se propusiera $\log_1(xy)$, ninguna
  propiedad sería aplicable, porque la base $1$ queda excluida desde la definición misma del logaritmo.'
procedimiento:
- 'Paso 1: Identifica la base $b$ de la expresión logarítmica antes de aplicar cualquier propiedad.'
- 'Paso 2: Verifica que $b>0$ y $b\neq1$.'
- 'Paso 3: Solo si la base es válida, aplica la propiedad algebraica correspondiente.'
ejemplos:
- titulo: Verificación previa a aplicar una propiedad
  enunciado: '¿Es válido aplicar $\log_7(xy)=\log_7(x)+\log_7(y)$?'
  solucion_pasos:
  - Se revisa la base: $7>0$ y $7\neq1$.
  - Sí, es válido aplicar la propiedad del producto.
- titulo: Detección de una base inválida
  enunciado: '¿Es válido aplicar propiedades a $\log_1(x^n)$?'
  solucion_pasos:
  - Se revisa la base: $b=1$ no cumple $b\neq1$.
  - No es válido; la expresión ni siquiera está definida como función logarítmica.
- titulo: ¿Las propiedades logarítmicas dependen de la condición de la base?
  enunciado: ¿La validez de las propiedades del logaritmo depende de que la base cumpla $b>0$ y $b\neq1$?
  respuesta: Sí
  solucion_pasos:
  - Todas las propiedades se enuncian bajo ese supuesto sobre la base.
- titulo: ¿Puede aplicarse una propiedad logarítmica con base negativa?
  enunciado: ¿Se puede aplicar la propiedad del cociente con una base negativa como $b=-2$?
  respuesta: 'No'
  solucion_pasos:
  - La base debe ser positiva; con $b=-2$ la expresión ni siquiera representa una función logarítmica válida.
errores_frecuentes:
- Aplicar propiedades logarítmicas sin verificar primero la condición de la base.
- Aceptar $b=1$ como base válida al simplificar expresiones algebraicas.
- Confundir la condición sobre la base con la condición sobre el argumento.
- Suponer que la condición de la base solo aplica al inicio y no en cada paso del desarrollo.
