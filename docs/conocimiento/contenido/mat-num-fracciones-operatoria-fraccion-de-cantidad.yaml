semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.FRACCION_DE_CANTIDAD
objetivo: Comprender cálculo de la fracción de una cantidad y aplicarlo correctamente
  en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso cálculo de la fracción de una cantidad ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Calcular la fracción de una cantidad significa multiplicar la cantidad total
  por la fracción correspondiente. Además, una fracción de cantidad representa una
  parte proporcional del total.
explicacion: |-
  Calcular la fracción de una cantidad significa multiplicar la cantidad total por la fracción correspondiente.

  Una idea importante es que una fracción de cantidad representa una parte proporcional del total.

  Por ejemplo, \(\frac{3}{5}\) de 20 es \(20\cdot\frac{3}{5}=12\).
procedimiento:
- 'Paso 1: Identificar la operación y preparar una representación adecuada de los
  datos.'
- 'Paso 2: Aplicar la regla específica de la operación respetando valor posicional
  o denominadores.'
- 'Paso 3: Simplificar o verificar el resultado final según corresponda.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(\frac{3}{5}\) de 20 es \(20\cdot\frac{3}{5}=12\).”
    se relaciona con cálculo de la fracción de una cantidad.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: calcular la fracción de una cantidad significa multiplicar
    la cantidad total por la fracción correspondiente.'
  - Concluye que el ejemplo sí ilustra cálculo de la fracción de una cantidad.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “Una fracción de cantidad representa una parte
    proporcional del total.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con cálculo de la fracción de una cantidad?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que una fracción de cantidad representa una
    parte proporcional del total.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar cálculo de la fracción de una cantidad ignorando la definición
    o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar cálculo de la fracción de una cantidad sin mirar qué representan
  numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
