semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.FRACCION_DE_CANTIDAD
objetivo: Calcular una fracción de una cantidad.
introduccion: 'El caso “\(\frac{3}{5}\) de 20 es \(20\cdot\frac{3}{5}=12\)” plantea
  una situación propia de cálculo de la fracción de una cantidad. Resolverla exige
  usar esta condición con precisión: calcular la fracción de una cantidad significa
  multiplicar la cantidad total por la fracción correspondiente.'
resumen: Calcular la fracción de una cantidad significa multiplicar la cantidad total
  por la fracción correspondiente. Como criterio de control, una fracción de cantidad
  representa una parte proporcional del total
explicacion: |-
  Calcular la fracción de una cantidad significa multiplicar la cantidad total por la fracción correspondiente.

  Esta formulación se hace concreta en “\(\frac{3}{5}\) de 20 es \(20\cdot\frac{3}{5}=12\)”. Allí puede reconocerse que una fracción de cantidad representa una parte proporcional del total.
procedimiento:
- 'Paso 1: Interpreta “\(a/b\) de \(N\)” como una multiplicación.'
- 'Paso 2: Divide la cantidad en \(b\) partes y toma \(a\), o calcula \(N\cdot a/b\).'
- 'Paso 3: Comprueba que la respuesta tenga la unidad del problema y una magnitud
  coherente.'
ejemplos:
- titulo: Aplicación razonada — Cálculo de la fracción de una cantidad
  enunciado: \(\frac{3}{5}\) de 20 es \(20\cdot\frac{3}{5}=12\).
  solucion_pasos:
  - Interpreta “\(a/b\) de \(N\)” como una multiplicación.
  - Divide la cantidad en \(b\) partes y toma \(a\), o calcula \(N\cdot a/b\).
  - Comprueba que la respuesta tenga la unidad del problema y una magnitud coherente.
- titulo: Revisión de una solución — Cálculo de la fracción de una cantidad
  enunciado: Una solución aplica “Divide la cantidad en \(b\) partes y toma \(a\),
    o calcula \(N\cdot a/b\).”, pero termina sin comprobar que una fracción de cantidad
    representa una parte proporcional del total. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define cálculo de la fracción de una cantidad: calcular
    la fracción de una cantidad significa multiplicar la cantidad total por la fracción
    correspondiente.'
  - Interpreta “\(a/b\) de \(N\)” como una multiplicación.
  - 'Completa la revisión con este control: Comprueba que la respuesta tenga la unidad
    del problema y una magnitud coherente.'
- titulo: ¿Se cumple que una fracción de cantidad representa una parte proporcional
    del total? — Cálculo de la fracción de una cantidad
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que calcular la fracción de una cantidad
    significa multiplicar la cantidad total por la fracción correspondiente.
  - El caso “\(\frac{3}{5}\) de 20 es \(20\cdot\frac{3}{5}=12\)” satisface esa condición.
  - Comprueba que la respuesta tenga la unidad del problema y una magnitud coherente.
- titulo: ¿Es válido omitir el paso “Interpreta “\(a/b\) de \(N\)” como una multiplicación”?
    — Cálculo de la fracción de una cantidad
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de cálculo de la fracción de una
    cantidad.
  - 'Omitirlo puede volver inválida la acción siguiente: Divide la cantidad en \(b\)
    partes y toma \(a\), o calcula \(N\cdot a/b\).'
  - 'La solución debe terminar de este modo: Comprueba que la respuesta tenga la unidad
    del problema y una magnitud coherente.'
errores_frecuentes:
- 'Empezar cálculo de la fracción de una cantidad sin realizar este control inicial:
  Interpreta “\(a/b\) de \(N\)” como una multiplicación.'
- Memorizar “\(\frac{3}{5}\) de 20 es \(20\cdot\frac{3}{5}=12\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Divide la cantidad en \(b\) partes y toma \(a\), o
  calcula \(N\cdot a/b\).” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre cálculo de la fracción de una cantidad que contradice
  el criterio “Una fracción de cantidad representa una parte proporcional del total”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que la respuesta
  tenga la unidad del problema y una magnitud coherente.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
