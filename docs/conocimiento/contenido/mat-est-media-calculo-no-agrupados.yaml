semantic_id: MAT.EST.MEDIA_PROMEDIO.CALCULO_DATOS_NO_AGRUPADOS
titulo: Calcular la media aritmética en una lista de datos
objetivo: Aplicar el procedimiento de cálculo de la media aritmética a listas concretas de datos numéricos
  no agrupados.
introduccion: Este recurso se enfoca en la práctica directa del cálculo, aplicando la fórmula ya definida
  a distintos ejemplos numéricos.
resumen: El cálculo de la media consiste en sumar todos los valores de la lista y dividir ese total por
  el número de datos de la lista.
explicacion: '![Cálculo de la media en una lista de datos](/static/img/estadistica/promedio/media-calculo-no-agrupados.svg)


  ### Definición formal


  $\bar{x}=\dfrac{\sum_{i=1}^n x_i}{n}$, aplicado directamente sobre una lista específica de valores.


  ### Desarrollo didáctico


  Para la lista {8, 10, 6, 12, 9}: suma=8+10+6+12+9=45, n=5, media=45/5=9.'
procedimiento:
- 'Paso 1: Suma cuidadosamente todos los valores de la lista, verificando no omitir ninguno.'
- 'Paso 2: Cuenta el número total de valores de la lista (n).'
- 'Paso 3: Divide la suma total por n, verificando el resultado con una operación inversa (media×n=suma).'
ejemplos:
- titulo: Calcular la media de {8, 10, 6, 12, 9}
  enunciado: 'Lista: 8, 10, 6, 12, 9.'
  solucion_pasos:
  - Suma=45. n=5. Media=45/5=9.
- titulo: Calcular la media de {3, 3, 3, 3}
  enunciado: 'Lista: 3, 3, 3, 3.'
  solucion_pasos:
  - Suma=12. n=4. Media=12/4=3.
- titulo: ¿Es útil verificar el resultado multiplicando la media obtenida por n?
  respuesta: Sí
  solucion_pasos:
  - Sí, si media×n coincide con la suma original, el cálculo es correcto.
- titulo: ¿La media de datos idénticos entre sí es igual a ese mismo valor?
  respuesta: Sí
  solucion_pasos:
  - Sí, como en {3,3,3,3}, cuya media es 3, igual al valor constante de todos los datos.
errores_frecuentes:
- Omitir algún dato al sumar la lista completa, generando un resultado incorrecto.
- Dividir por un número de datos distinto al real (por ejemplo, contar mal cuántos valores tiene la lista).
- No verificar el resultado obtenido con una operación inversa simple.
fuente: 'Elaboración propia (referencia: Moraleja 359, Santillana 38).'
estado: publicado
