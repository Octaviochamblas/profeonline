semantic_id: MAT.ALG.FUNC_CUADR_BASE.PARAMETRO_A
titulo: Identificación del coeficiente cuadrático a en la expresión funcional
objetivo: Identificar correctamente el coeficiente $a$ (cuadrático) en una función cuadrática dada en
  forma general.
introduccion: El coeficiente $a$ es el número que "acompaña" al término $x^2$; es el que le da a la función
  su carácter cuadrático y determina la orientación de su gráfica.
resumen: El **coeficiente $a$** de una función cuadrática $f(x)=ax^2+bx+c$ es el número (distinto de cero)
  que multiplica al término $x^2$.
explicacion: '### Definición formal


  En $f(x)=ax^2+bx+c$, el coeficiente $a$ es el número real que multiplica al término de mayor grado,
  $x^2$. Por definición de función cuadrática, $a \neq 0$, y su signo determina si la parábola abre hacia
  arriba o hacia abajo.


  ### Desarrollo didáctico


  Para identificar $a$, se localiza el término que contiene $x^2$ y se lee el número que lo multiplica,
  respetando su signo. Si no aparece ningún número explícito, el coeficiente es $1$ (o $-1$ si el término
  es negativo).


  En $f(x)=-7x^2+3x-2$, el coeficiente $a$ es $-7$. En $f(x)=x^2-4$, el coeficiente $a$ es $1$, aunque
  no aparezca escrito.'
procedimiento:
- 'Paso 1: Ordena la función en forma general si aún no lo está.'
- 'Paso 2: Localiza el término que contiene $x^2$.'
- 'Paso 3: Lee el número que lo multiplica, incluyendo su signo; ese es el coeficiente $a$.'
ejemplos:
- titulo: Identificación directa del coeficiente a
  enunciado: Identifica el coeficiente $a$ en $f(x)=8x^2-x+3$.
  solucion_pasos:
  - El término cuadrático es $8x^2$.
  - $a=8$.
- titulo: Identificación del coeficiente a implícito
  enunciado: Identifica el coeficiente $a$ en $f(x)=-x^2+5x$.
  solucion_pasos:
  - El término cuadrático es $-x^2$, equivalente a $-1x^2$.
  - $a=-1$.
- titulo: ¿El coeficiente $a$ puede ser un número negativo?
  enunciado: ¿El coeficiente $a$ puede ser un número negativo?
  respuesta: Sí
  solucion_pasos:
  - Solo se exige que $a$ sea distinto de cero; puede ser positivo o negativo.
- titulo: ¿El coeficiente $a$ determina la orientación de la parábola?
  enunciado: ¿El coeficiente $a$ determina la orientación de la parábola?
  respuesta: Sí
  solucion_pasos:
  - Si $a>0$ la parábola abre hacia arriba; si $a<0$, abre hacia abajo.
errores_frecuentes:
- Olvidar el signo negativo del coeficiente $a$ al leerlo desde la función.
- Confundir el coeficiente $a$ con el coeficiente $b$ cuando la función no está ordenada.
- Asumir que un término $x^2$ sin número visible tiene coeficiente cero en vez de $1$.
- No reordenar la función antes de identificar $a$, confundiéndolo con otro término.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
