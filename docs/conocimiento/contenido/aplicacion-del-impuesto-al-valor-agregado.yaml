semantic_id: MAT.NUM.VARIACION_PORCENTUAL.IVA
titulo: Aplicación del Impuesto al Valor Agregado
objetivo: Aplicar y despejar el Impuesto al Valor Agregado (IVA) en operaciones comerciales.
introduccion: Todo lo que compras en una tienda formal ya trae el IVA escondido. El gobierno recauda el
  19% extra sobre el precio original (neto). ¿Sabrías cómo 'quitarle' ese IVA a un producto para saber
  cuánto gana realmente el vendedor?
resumen: 'El IVA en Chile es del $19\%$. El Precio Neto no tiene IVA. El Precio Bruto incluye el IVA.
  Fórmulas: $Bruto = Neto \cdot 1.19$. $Neto = Bruto / 1.19$.'
explicacion: 'El **IVA (Impuesto al Valor Agregado)** es un aumento porcentual estándar fijado por el
  Estado (en Chile, 19%).


  Términos comerciales:

  - **Precio Neto:** Valor real del producto sin impuestos (es el $100\%$ base).

  - **Valor del IVA:** Monto de dinero que va al gobierno ($19\%$ del neto).

  - **Precio Bruto (Final):** Lo que pagas en caja ($119\%$ del neto).


  **Para agregar el IVA:**

  Multiplicas el precio neto por $1.19$ (es un aumento porcentual).

  **Para ''sacarle'' el IVA a un precio final:**

  Como $Bruto = Neto \cdot 1.19$, entonces $Neto = Bruto \div 1.19$. (¡Nunca calcules el 19% del bruto
  para restarlo, eso matemáticamente está mal porque la base era el neto!).'
procedimiento:
- 'Paso 1: Identifica si el dato dado es el Neto (sin impuesto) o el Bruto (con impuesto ya metido).'
- 'Paso 2: Si te dan el Neto y piden el Bruto, multiplica por $1.19$.'
- 'Paso 3: Si te dan el Bruto (lo pagado en caja) y piden el Neto, divide por $1.19$.'
ejemplos:
- titulo: Despejando el Neto
  enunciado: Pagas $11.900 por un audífono. ¿Cuánto es el precio neto sin IVA?
  solucion_pasos:
  - 11.900 es el Precio Bruto.
  - Para hallar el neto, dividimos por el factor 1.19.
  - $11.900 / 1.19 = 10.000$.
  - El precio sin IVA era $10.000. (El Estado se llevó $1.900).
errores_frecuentes:
- Creer que si un producto cuesta $10.000 bruto, el IVA es $1.900 (Falso, el IVA se calcula sobre el neto,
  en este caso sería $10.000 / 1.19 = 8.403$, y el IVA es $1.597$).
- Restar el 19% del Precio Bruto para intentar hallar el Neto.
fuente: Currículum Nacional MINEDUC.
estado: publicado
