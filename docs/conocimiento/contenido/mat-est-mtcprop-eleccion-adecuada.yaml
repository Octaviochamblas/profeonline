semantic_id: MAT.EST.MTC_PROPIEDADES.ELECCION_ADECUADA
titulo: Elegir la medida de tendencia central más representativa según el contexto
objetivo: Elegir, según el tipo de variable y la presencia de valores atípicos, cuál medida de tendencia
  central es más representativa en cada contexto.
introduccion: No existe una única medida 'correcta' en todos los casos; la elección depende del tipo de
  datos y de las características de su distribución.
resumen: La elección de la medida más adecuada depende del tipo de variable (cualitativa, ordinal, cuantitativa)
  y de si existen valores atípicos que puedan distorsionar la media.
explicacion: '![Elección de la MTC más representativa](/static/img/estadistica/mtcprop/mtcprop-eleccion-adecuada.svg)


  ### Definición formal


  Se recomienda usar la moda para variables cualitativas nominales, la mediana para variables ordinales
  o cuantitativas con valores atípicos, y la media para variables cuantitativas sin valores atípicos.


  ### Desarrollo didáctico


  Para el ''color favorito'' de un curso (variable nominal) se debe usar la moda; para los ''sueldos de
  una empresa'' (con posibles valores atípicos) conviene la mediana; para las ''notas de una prueba''
  (sin atípicos) es apropiada la media.'
procedimiento:
- 'Paso 1: Identifica el tipo de variable en estudio (cualitativa nominal, ordinal, o cuantitativa).'
- 'Paso 2: Si es cuantitativa, verifica si existen valores atípicos que puedan distorsionar la media.'
- 'Paso 3: Elige la moda para variables nominales, la mediana si hay atípicos u orden sin magnitud exacta,
  y la media para datos cuantitativos sin atípicos.'
ejemplos:
- titulo: Elegir la medida para el color favorito de un curso
  enunciado: 'Variable: color favorito (cualitativa nominal).'
  solucion_pasos:
  - Se debe usar la moda, ya que es la única medida aplicable a variables nominales.
- titulo: Elegir la medida para sueldos con valores atípicos
  enunciado: 'Variable: sueldos de una empresa, con un sueldo de gerente muy superior al resto.'
  solucion_pasos:
  - Se recomienda usar la mediana, ya que es robusta frente al valor atípico del sueldo del gerente.
- titulo: ¿La moda es la única medida aplicable a variables cualitativas nominales?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que la media y la mediana requieren orden o magnitud numérica, que las variables nominales
    no tienen.
- titulo: ¿La media siempre es la mejor opción para cualquier variable cuantitativa?
  respuesta: 'No'
  solucion_pasos:
  - No, si existen valores atípicos, la mediana suele ser más representativa que la media.
errores_frecuentes:
- Usar la media por defecto sin considerar el tipo de variable ni la posible presencia de valores atípicos.
- Intentar calcular la media o la mediana de una variable cualitativa nominal, donde esas medidas no tienen
  sentido.
- No justificar la elección de la medida usada, aplicándola de forma automática sin analizar el contexto.
fuente: Elaboración propia.
estado: publicado
