semantic_id: MAT.EST.PROBA_FUNDAMENTOS.CARDINALIDAD_ESPACIO
titulo: Determinación de la cardinalidad del espacio muestral
objetivo: Determinar la cardinalidad del espacio muestral, es decir, el número total de resultados posibles
  de un experimento aleatorio.
introduccion: Contar cuántos resultados posibles tiene un experimento es un paso indispensable antes de
  calcular cualquier probabilidad, ya que ese número será el denominador en la regla de Laplace.
resumen: La cardinalidad del espacio muestral, denotada $n(S)$, es el número total de elementos (resultados
  posibles) que contiene.
explicacion: '![Cardinalidad del espacio muestral](/static/img/probabilidad/fundamentos/fund-cardinalidad-espacio.svg)


  ### Definición formal


  Si $S=\{1,2,3,4,5,6\}$, su cardinalidad es $n(S)=6$, ya que contiene 6 elementos distintos.


  ### Desarrollo didáctico


  Para el lanzamiento de un dado, $n(S)=6$; para el lanzamiento de una moneda, $n(S)=2$; para la extracción
  de una carta de un mazo, $n(S)=52$.'
procedimiento:
- 'Paso 1: Identifica el espacio muestral completo del experimento.'
- 'Paso 2: Cuenta cuántos elementos distintos contiene ese conjunto.'
- 'Paso 3: Ese número es la cardinalidad n(S) del espacio muestral.'
ejemplos:
- titulo: Determinar n(S) al lanzar un dado
  enunciado: S={1,2,3,4,5,6}.
  solucion_pasos:
  - n(S)=6.
- titulo: Determinar n(S) al lanzar dos monedas
  enunciado: S={CC,CS,SC,SS}.
  solucion_pasos:
  - n(S)=4.
- titulo: ¿n(S) siempre es un número entero positivo?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que representa un conteo de elementos de un conjunto finito.
- titulo: ¿La cardinalidad del espacio muestral puede ser 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, aunque sería un caso poco común, correspondería a un experimento con un único resultado posible.
errores_frecuentes:
- Contar mal los elementos del espacio muestral, olvidando alguno o repitiendo otro.
- Confundir n(S) con la probabilidad de un evento específico.
- Calcular n(S) sin antes haber definido correctamente el espacio muestral completo.
fuente: 'Elaboración propia (referencia: Moraleja 403).'
estado: publicado
