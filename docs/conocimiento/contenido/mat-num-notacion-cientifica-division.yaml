semantic_id: MAT.NUM.NOTACION_CIENTIFICA.DIVISION
objetivo: Dividir números en notación científica.
introduccion: En una división, la escala del divisor se resta de la del dividendo.
  Esta operación evita desplegar números enormes antes de simplificarlos.
resumen: Para dividir notación científica se dividen coeficientes y se restan exponentes.
  La normalización final conserva un coeficiente de valor absoluto entre \(1\) y \(10\).
explicacion: |-
  Para dividir notación científica se dividen coeficientes y se restan exponentes.

  El cálculo “\((9\times10^7)/(3\times10^2)=3\times10^5\)” muestra por qué la normalización final conserva un coeficiente de valor absoluto entre \(1\) y \(10\)
procedimiento:
- 'Paso 1: Divide los coeficientes comprobando que el divisor no sea cero.'
- 'Paso 2: Resta el exponente del divisor al del dividendo.'
- 'Paso 3: Normaliza el coeficiente y verifica el orden mediante una estimación.'
ejemplos:
- titulo: Aplicación razonada — División de números en notación científica
  enunciado: \((9\times10^7)/(3\times10^2)=3\times10^5\).
  solucion_pasos:
  - Divide los coeficientes comprobando que el divisor no sea cero.
  - Resta el exponente del divisor al del dividendo.
  - Normaliza el coeficiente y verifica el orden mediante una estimación.
- titulo: Revisión de una solución — División de números en notación científica
  enunciado: Una solución aplica “Resta el exponente del divisor al del dividendo.”,
    pero termina sin comprobar que la normalización final conserva un coeficiente
    de valor absoluto entre \(1\) y \(10\). Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define división de números en notación científica:
    para dividir notación científica se dividen coeficientes y se restan exponentes.'
  - Divide los coeficientes comprobando que el divisor no sea cero.
  - 'Completa la revisión con este control: Normaliza el coeficiente y verifica el
    orden mediante una estimación.'
- titulo: ¿Se cumple que la normalización final conserva un coeficiente de valor absoluto
    entre \(1\) y \(10\)? — División de números en notación científica
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para dividir notación científica se
    dividen coeficientes y se restan exponentes.
  - El caso “\((9\times10^7)/(3\times10^2)=3\times10^5\)” satisface esa condición.
  - Normaliza el coeficiente y verifica el orden mediante una estimación.
- titulo: ¿Es válido omitir el paso “Divide los coeficientes comprobando que el divisor
    no sea cero”? — División de números en notación científica
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de división de números en notación
    científica.
  - 'Omitirlo puede volver inválida la acción siguiente: Resta el exponente del divisor
    al del dividendo.'
  - 'La solución debe terminar de este modo: Normaliza el coeficiente y verifica el
    orden mediante una estimación.'
errores_frecuentes:
- 'Confundir división de números en notación científica con otro concepto y omitir
  este inicio: Divide los coeficientes comprobando que el divisor no sea cero.'
- Aplicar mecánicamente “Resta el exponente del divisor al del dividendo.” sin revisar
  las condiciones de la definición.
- Tomar “\((9\times10^7)/(3\times10^2)=3\times10^5\)” como una igualdad aislada, sin
  explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la normalización final conserva
  un coeficiente de valor absoluto entre \(1\) y \(10\)”.
- 'Terminar el desarrollo sin realizar este control: Normaliza el coeficiente y verifica
  el orden mediante una estimación.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
