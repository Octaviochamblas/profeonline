semantic_id: MAT.ALG.MCM_ALGEBRAICO.MCM_MONOMIOS
titulo: Cálculo del MCM de Monomios Completos
objetivo: Integrar el coeficiente numérico y la parte literal para hallar el MCM completo de varios monomios.
introduccion: Uniendo las dos mitades que hemos aprendido (números y letras), puedes ensamblar el MCM completo.
  Este monomio gigante será vital más adelante cuando queramos sumar o restar fracciones algebraicas.
resumen: El MCM completo de dos o más monomios se obtiene multiplicando el MCM de sus coeficientes por las letras
  comunes y no comunes elevadas a su mayor exponente.
explicacion: "### Definición formal\n\nEse es todo el punto del MCM: al contenerlos a todos de forma perfecta, las\
  \ divisiones son siempre exactas.\n\n### Desarrollo didáctico\n\nEl MCM definitivo de un grupo de monomios se\
  \ ensambla multiplicando el MCM de sus números y el MCM de sus letras.\n\n**Fórmula de ensamblaje:**\nMCM(Total)\
  \ = MCM(Coeficientes) $\\cdot$ MCM(Parte Literal)\n\nTomemos un ejemplo: $12a^4 b$ y $18a^2 b^3 c^2$.\n\n1. **Coeficientes\
  \ (12 y 18):** El menor múltiplo común entre 12 y 18 es **36** (ya que 36/12=3 y 36/18=2).\n2. **Letras (Todas):**\
  \ Aparecen '$a$', '$b$', y '$c$'.\n3. **Exponentes mayores:**\n   - Para '$a$': entre 4 y 2, tomamos **4** ($a^4$).\n\
  \   - Para '$b$': entre 1 y 3, tomamos **3** ($b^3$).\n   - Para '$c$': solo está elevada a 2, tomamos **2** ($c^2$).\n\
  \nJuntando todo: El MCM es **$36a^4 b^3 c^2$**. Este super-término es divisible exactamente tanto por $12a^4 b$\
  \ como por $18a^2 b^3 c^2$."
procedimiento:
- 'Paso 1: Calcula el MCM aritmético de los coeficientes numéricos.'
- 'Paso 2: Extrae todas las letras diferentes que encuentres.'
- 'Paso 3: Colócale a cada letra el exponente mayor con el que aparezca en el grupo.'
- 'Paso 4: Multiplica la parte numérica y la parte literal.'
- 'Ese es todo el punto del MCM: al contenerlos a todos de forma perfecta, las divisiones son siempre exactas.'
ejemplos:
- titulo: Halla el MCM de $10x^3 y$, $15x y^2$ y $5y^3 z$
  enunciado: Halla el MCM de $10x^3 y$, $15x y^2$ y $5y^3 z$.
  solucion_pasos:
  - 'Números: MCM de 10, 15 y 5. El mayor múltiplo mínimo común es 30.'
  - 'Letras presentes: x, y, z.'
  - 'Exp. mayores: $x^3$, $y^3$, $z^1$.'
  - 'Resultado final: $30x^3 y^3 z$.'
- titulo: Calcula el MCM de $3p$ y $4q$.
  solucion_pasos:
  - 'MCM de 3 y 4 es 12. Letras p y q. Todo junto: 12pq.'
