semantic_id: MAT.NUM.POTENCIAS_PROPIEDADES.POTENCIA_DE_POTENCIA
titulo: Potencia de una potencia
objetivo: Simplificar una potencia elevada a otra potencia.
introduccion: Una potencia de potencia repite un bloque que ya contiene factores iguales. Multiplicar
  los exponentes cuenta cuántos factores hay en total.
resumen: 'Al elevar una potencia a otra potencia se multiplican los exponentes: \((a^m)^n=a^{mn}\). Cada
  una de las \(n\) copias aporta \(m\) factores de la base.'
explicacion: 'Al elevar una potencia a otra potencia se multiplican los exponentes: \((a^m)^n=a^{mn}\).


  Al analizar “\((3^2)^4=3^8\)” conviene observar la conexión siguiente: cada una de las \(n\) copias
  aporta \(m\) factores de la base'
procedimiento:
- 'Paso 1: Identifica con los paréntesis la potencia interior completa.'
- 'Paso 2: Multiplica los exponentes y conserva la base original.'
- 'Paso 3: Evita sumar exponentes: compara con la expansión de dos bloques para verificar.'
ejemplos:
- titulo: Aplicación razonada — Potencia de una potencia
  enunciado: \((3^2)^4=3^8\).
  solucion_pasos:
  - Identifica con los paréntesis la potencia interior completa.
  - Multiplica los exponentes y conserva la base original.
  - 'Evita sumar exponentes: compara con la expansión de dos bloques para verificar.'
- titulo: Revisión de una solución — Potencia de una potencia
  enunciado: Una solución aplica “Multiplica los exponentes y conserva la base original.”, pero termina
    sin comprobar que cada una de las \(n\) copias aporta \(m\) factores de la base. Determina qué falta
    justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define potencia de una potencia: al elevar una potencia a otra potencia
    se multiplican los exponentes: \((a^m)^n=a^{mn}\).'
  - Identifica con los paréntesis la potencia interior completa.
  - 'Completa la revisión con este control: Evita sumar exponentes: compara con la expansión de dos bloques
    para verificar.'
- titulo: ¿Se cumple que cada una de las \(n\) copias aporta \(m\) factores de la base? — Potencia de
    una potencia
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que al elevar una potencia a otra potencia se multiplican
    los exponentes: \((a^m)^n=a^{mn}\).'
  - El caso “\((3^2)^4=3^8\)” satisface esa condición.
  - 'Evita sumar exponentes: compara con la expansión de dos bloques para verificar.'
- titulo: ¿Es válido omitir el paso “Identifica con los paréntesis la potencia interior completa”? — Potencia
    de una potencia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de potencia de una potencia.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica los exponentes y conserva la base
    original.'
  - 'La solución debe terminar de este modo: Evita sumar exponentes: compara con la expansión de dos bloques
    para verificar.'
errores_frecuentes:
- 'Confundir potencia de una potencia con otro concepto y omitir este inicio: Identifica con los paréntesis
  la potencia interior completa.'
- Aplicar mecánicamente “Multiplica los exponentes y conserva la base original.” sin revisar las condiciones
  de la definición.
- Tomar “\((3^2)^4=3^8\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “cada una de las \(n\) copias aporta \(m\) factores
  de la base”.
- 'Terminar el desarrollo sin realizar este control: Evita sumar exponentes: compara con la expansión
  de dos bloques para verificar.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces, logaritmos y complejos.
