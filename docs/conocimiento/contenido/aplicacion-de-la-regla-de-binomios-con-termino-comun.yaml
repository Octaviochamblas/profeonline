semantic_id: MAT.ALG.TERMINO_COMUN.REGLA_GENERAL
titulo: Aplicación de la regla de binomios con término común
objetivo: Aplicar la fórmula rápida para multiplicar binomios que comparten un término.
introduccion: Multiplicar $(x+5)(x+3)$ paso a paso toma $4$ cálculos. Con la regla del término común,
  lo harás mentalmente en $3$ pasos rápidos.
resumen: 'La regla para $(x+a)(x+b)$ es:

  **''El cuadrado del término común, MÁS la suma algebraica de los no comunes por el término común, MÁS
  el producto de los no comunes.''**

  Fórmula: $(x+a)(x+b) = x^2 + (a+b)x + (ab)$'
explicacion: '### Definición formal


  Para todo $x, a, b$, el producto $(x+a)(x+b)$ se expande mediante la propiedad distributiva como $x^2
  + bx + ax + ab = x^2 + (a+b)x + ab$: el coeficiente del término lineal en $x$ es la suma algebraica
  de $a$ y $b$, y el término independiente es su producto.


  ### Desarrollo didáctico


  La regla del término común es un atajo directo que convierte la multiplicación $(x+a)(x+b)$ en un trinomio
  ordenado en un solo paso mental.


  **Fórmula de la regla:** $(x+a)(x+b) = x^2 + (a+b)x + ab$


  **Regla en palabras (los tres pasos):**

  El desarrollo consta siempre de tres partes:

  1. **El cuadrado del término común:** Toma el término que se repite y elévalo al cuadrado.

  2. **La suma por el común:** Suma (algebraicamente, respetando signos) los dos términos no comunes.
  El resultado de esa suma se multiplica por el término común.

  3. **El producto:** Multiplica los dos términos no comunes entre sí (respetando la regla de los signos).


  **Ejemplo rápido:** $(x + 5)(x - 2)$

  - Cuadrado del común: $x^2$.

  - Suma por el común: $(+5 - 2) = +3$. Se multiplica por $x \rightarrow +3x$.

  - Producto: $(+5)(-2) = -10$.

  Resultado: $x^2 + 3x - 10$.'
procedimiento:
- 'Paso 1: Al calcular $(x+a)(x+b)$:'
- 'Paso 2: Eleva el término común al cuadrado.'
- 'Paso 3: Suma algebraicamente los términos no comunes (ej. si son $+5$ y $-3$, la suma es $2$).'
- 'Paso 4: Multiplica esa suma por el término común.'
- 'Paso 5: Multiplica los términos no comunes entre sí.'
- 'Paso 6: Escribe el trinomio resultante.'
- 'Suma: $4+9=13$. Producto: $4 \cdot 9=36$. Trinomio: $m^2 + 13m + 36$.'
ejemplos:
- titulo: Aplicación rápida
  enunciado: Desarrolla $(m + 6)(m + 4)$.
  solucion_pasos:
  - 'Término común: $m$. Al cuadrado: $m^2$.'
  - 'No comunes: $6$ y $4$. Suma: $6+4=10$. Multiplicado por el común: $10m$.'
  - 'Producto de no comunes: $6 \\\\\\cdot 4 = 24$.'
  - 'Resultado: $m^2 + 10m + 24$.'
- titulo: Con signos negativos
  enunciado: Desarrolla $(y - 7)(y - 2)$.
  solucion_pasos:
  - 'Término común: $y$. Al cuadrado: $y^2$.'
  - 'Suma: $-7 + -2 = -9$. Por el común: $-9y$.'
  - 'Producto: $(-7) \\\\\\cdot (-2) = +14$.'
  - 'Resultado: $y^2 - 9y + 14$.'
