errores_frecuentes:
- Multiplicar los no comunes para el término central en lugar de sumarlos (ej. poner $24m$ en lugar de
  $10m$ en el primer ejemplo).
- $m^2 + 36m + 13$.
- $m^2 + 13m + 13$.
- $m^2 + 36$.
- Para «Calcula el término central de la expansión de $(2x^2 + 3)(2x^2 + 8)$.», la respuesta correcta
  es $11x^2$.
