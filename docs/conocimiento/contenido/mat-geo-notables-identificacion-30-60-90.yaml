semantic_id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.IDENTIFICACION_30_60_90
titulo: Identificación de un triángulo notable 30°-60°-90° a partir de sus ángulos
objetivo: Reconocer un triángulo notable 30°-60°-90° identificando sus tres ángulos característicos.
introduccion: El segundo triángulo notable más usado es el 30°-60°-90°, que a diferencia del 45-45-90,
  tiene sus tres ángulos distintos entre sí.
resumen: Un triángulo notable 30°-60°-90° es un triángulo rectángulo cuyos ángulos agudos miden 30° y
  60°.
explicacion: '![Triángulo notable 30°-60°-90°](/static/img/geometria/areas-pitagoras/notables-identificacion-30-60-90.svg)


  ### Definición formal


  Un triángulo 30°-60°-90° tiene un ángulo recto (90°) y sus dos ángulos agudos son de 30° y 60°, distintos
  entre sí (a diferencia del 45-45-90).


  ### Desarrollo didáctico


  Este triángulo se obtiene, por ejemplo, al trazar la altura de un triángulo equilátero: se forman dos
  triángulos rectángulos con ángulos 30°, 60° y 90°.'
procedimiento:
- 'Paso 1: Verifica que el triángulo tenga un ángulo recto (90°).'
- 'Paso 2: Verifica que los otros dos ángulos midan 30° y 60°.'
- 'Paso 3: Si se cumplen ambas condiciones, es un triángulo notable 30-60-90.'
ejemplos:
- titulo: Identificar un triángulo con ángulos 90°, 30° y 60°
  enunciado: Un triángulo tiene ángulos de 90°, 30° y 60°.
  solucion_pasos:
  - Es un triángulo notable 30-60-90.
- titulo: Relacionar con la altura de un triángulo equilátero
  enunciado: Se traza la altura de un triángulo equilátero. ¿Qué triángulos se forman?
  solucion_pasos:
  - Se forman dos triángulos 30-60-90, congruentes entre sí.
- titulo: ¿Este triángulo es isósceles?
  respuesta: 'No'
  solucion_pasos:
  - No, sus tres ángulos son distintos, por lo que sus tres lados también lo son (triángulo escaleno).
- titulo: ¿Un triángulo con ángulos 90°, 45° y 45° es un 30-60-90?
  respuesta: 'No'
  solucion_pasos:
  - No, ese es el otro triángulo notable, el 45-45-90.
errores_frecuentes:
- Confundir este triángulo con el 45-45-90 por tener ambos un ángulo recto.
- Asumir que es isósceles, cuando en realidad es escaleno (sus tres lados son distintos).
- Invertir qué lado corresponde al ángulo de 30° y cuál al de 60°.
fuente: Elaboración propia.
estado: publicado
