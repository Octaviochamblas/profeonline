semantic_id: MAT.ALG.FUNC_CUADR_MODELO.RECONOCIMIENTO_MODELO
titulo: Reconocimiento de situaciones que pueden modelarse mediante una función cuadrática
objetivo: Reconocer características de un problema contextualizado que indican que puede modelarse con
  una función cuadrática.
introduccion: No todo problema aplicado requiere una función cuadrática; reconocer las señales típicas
  de estos problemas evita usar herramientas matemáticas equivocadas.
resumen: Una situación se modela con una **función cuadrática** cuando involucra un producto de dos cantidades
  que dependen linealmente de la misma variable, o una trayectoria bajo aceleración constante (como la
  gravedad).
explicacion: '### Definición formal


  Una situación es modelable mediante una función cuadrática cuando la cantidad de interés se expresa
  como el producto de dos expresiones lineales en la misma variable (como área = ancho × largo, con ambos
  dependientes de $x$), o cuando involucra movimiento bajo aceleración constante (posición en función
  del tiempo).


  ### Desarrollo didáctico


  Las señales típicas son: "área" o "producto" de dos cantidades relacionadas linealmente, "trayectoria",
  "altura de un proyectil", o "ingreso total" cuando tanto el precio como la cantidad vendida dependen
  de la misma variable.


  Si un jardín tiene un ancho $x$ y un largo que es el doble más $3$, su área $A(x)=x(2x+3)$ es una función
  cuadrática, porque el área es un producto de dos expresiones lineales en $x$.'
procedimiento:
- 'Paso 1: Identifica si la cantidad de interés depende del producto de dos expresiones lineales en la
  misma variable.'
- 'Paso 2: Verifica si la situación involucra una trayectoria bajo aceleración constante (como la gravedad).'
- 'Paso 3: Si se cumple alguna de esas condiciones, la situación es modelable con una función cuadrática.'
ejemplos:
- titulo: Reconocimiento de un problema de área
  enunciado: ¿Se puede modelar con una función cuadrática el área de un rectángulo cuyo ancho es $x$ y
    cuyo largo es $x+5$?
  solucion_pasos:
  - El área es $A(x)=x(x+5)$, un producto de dos expresiones lineales en $x$.
  - Sí, se modela con una función cuadrática.
- titulo: Reconocimiento de un problema de ingreso
  enunciado: ¿Se puede modelar con una función cuadrática el ingreso de una empresa si el precio es $p(x)=50-2x$
    y la cantidad vendida es $x$?
  solucion_pasos:
  - El ingreso es $I(x)=x(50-2x)$, un producto de dos expresiones lineales en $x$.
  - Sí, se modela con una función cuadrática.
- titulo: ¿Toda trayectoria de un objeto en movimiento se modela con una función cuadrática?
  enunciado: ¿Toda trayectoria de un objeto en movimiento se modela con una función cuadrática?
  respuesta: 'No'
  solucion_pasos:
  - Solo si el movimiento ocurre bajo aceleración constante; un movimiento a velocidad constante se modela
    con una función afín, no cuadrática.
- titulo: ¿La suma de dos cantidades que dependen linealmente de la misma variable produce siempre una
    función cuadrática?
  enunciado: ¿La suma de dos cantidades que dependen linealmente de la misma variable produce siempre
    una función cuadrática?
  respuesta: 'No'
  solucion_pasos:
  - La suma de dos expresiones lineales sigue siendo lineal; es el producto el que genera el término cuadrático.
errores_frecuentes:
- Confundir un problema de suma de cantidades lineales (que da función afín) con uno de producto (que
  da función cuadrática).
- Modelar como cuadrática una situación de movimiento a velocidad constante, sin aceleración.
- No identificar correctamente cuáles dos cantidades del problema dependen de la misma variable.
- Asumir que cualquier problema con la palabra "máximo" o "mínimo" requiere necesariamente una función
  cuadrática.
