semantic_id: MAT.NUM.NOTACION_CIENTIFICA.CONVERSION_A_DECIMAL
objetivo: Pasar una escritura científica a decimal.
introduccion: La potencia de diez contiene una instrucción de escala. Leer su signo
  y magnitud permite reconstruir el decimal sin contar ceros a ciegas.
resumen: Convertir desde notación científica consiste en escalar el coeficiente por
  la potencia de diez. Un exponente positivo mueve la coma a la derecha y uno negativo
  a la izquierda.
explicacion: |-
  Convertir desde notación científica consiste en escalar el coeficiente por la potencia de diez.

  Al analizar “\(3.07\times10^{-4}=0.000307\)” conviene observar la conexión siguiente: un exponente positivo mueve la coma a la derecha y uno negativo a la izquierda
procedimiento:
- 'Paso 1: Lee el signo y el valor absoluto del exponente.'
- 'Paso 2: Desplaza la coma del coeficiente en la dirección y cantidad indicadas.'
- 'Paso 3: Completa posiciones con ceros y verifica el orden de magnitud.'
ejemplos:
- titulo: Aplicación razonada — Conversión de notación científica a número decimal
  enunciado: \(3.07\times10^{-4}=0.000307\).
  solucion_pasos:
  - Lee el signo y el valor absoluto del exponente.
  - Desplaza la coma del coeficiente en la dirección y cantidad indicadas.
  - Completa posiciones con ceros y verifica el orden de magnitud.
- titulo: Revisión de una solución — Conversión de notación científica a número decimal
  enunciado: Una solución aplica “Desplaza la coma del coeficiente en la dirección
    y cantidad indicadas.”, pero termina sin comprobar que un exponente positivo mueve
    la coma a la derecha y uno negativo a la izquierda. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conversión de notación científica a número decimal:
    convertir desde notación científica consiste en escalar el coeficiente por la
    potencia de diez.'
  - Lee el signo y el valor absoluto del exponente.
  - 'Completa la revisión con este control: Completa posiciones con ceros y verifica
    el orden de magnitud.'
- titulo: ¿Se cumple que un exponente positivo mueve la coma a la derecha y uno negativo
    a la izquierda? — Conversión de notación científica a número decimal
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que convertir desde notación científica
    consiste en escalar el coeficiente por la potencia de diez.
  - El caso “\(3.07\times10^{-4}=0.000307\)” satisface esa condición.
  - Completa posiciones con ceros y verifica el orden de magnitud.
- titulo: ¿Es válido omitir el paso “Lee el signo y el valor absoluto del exponente”?
    — Conversión de notación científica a número decimal
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conversión de notación científica
    a número decimal.
  - 'Omitirlo puede volver inválida la acción siguiente: Desplaza la coma del coeficiente
    en la dirección y cantidad indicadas.'
  - 'La solución debe terminar de este modo: Completa posiciones con ceros y verifica
    el orden de magnitud.'
errores_frecuentes:
- 'Confundir conversión de notación científica a número decimal con otro concepto
  y omitir este inicio: Lee el signo y el valor absoluto del exponente.'
- Aplicar mecánicamente “Desplaza la coma del coeficiente en la dirección y cantidad
  indicadas.” sin revisar las condiciones de la definición.
- Tomar “\(3.07\times10^{-4}=0.000307\)” como una igualdad aislada, sin explicar por
  qué es válida.
- Aceptar una respuesta que contradice la idea clave “un exponente positivo mueve
  la coma a la derecha y uno negativo a la izquierda”.
- 'Terminar el desarrollo sin realizar este control: Completa posiciones con ceros
  y verifica el orden de magnitud.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
