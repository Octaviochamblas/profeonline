semantic_id: MAT.ALG.AGRUPACION.ERROR_SIGNO_NEGATIVO
objetivo: Identificar y corregir el error de olvidar invertir los signos al eliminar un paréntesis precedido de
  signo negativo.
introduccion: 'El error más clásico del álgebra pre-universitaria: ver un paréntesis con signo negativo, cambiar
  el primer signo, y dejar los demás igual. Es como detener una avalancha solo a la mitad.'
resumen: 'El **Error de Signo Negativo** ocurre cuando al eliminar un paréntesis precedido de $-$, se invierte el
  signo del primer término pero se dejan los signos de los términos siguientes sin cambio. La regla es clara: todos
  deben cambiar.'
explicacion: '### Definición formal


  La respuesta correcta es $10-4a+2b-c$. El $-$ externo invierte absolutamente todos los signos.


  ### Desarrollo didáctico


  La operación errónea más frecuente:

  $5 - (3x - 4y + 2) = 5 - 3x - 4y + 2$ ← INCORRECTO.


  El $-$ delante del paréntesis actúa sobre TODO lo que está adentro:

  $5 - (3x - 4y + 2) = 5 - 3x + 4y - 2$ ← CORRECTO.


  Verificación: $-(+3x) = -3x$, $-(-4y) = +4y$, $-(+2) = -2$.


  Resumen final: $3 - 3x + 4y$.'
procedimiento:
- 'Paso 1: Localiza el signo $-$ antes del paréntesis.'
- 'Paso 2: Marca con una flecha o subrayado CADA término dentro del paréntesis.'
- 'Paso 3: Invierte uno a uno el signo de cada término marcado.'
- 'Paso 4: Verifica que no quedó ningún término sin invertir.'
ejemplos:
- titulo: Todos o ninguno
  enunciado: 'Elimina y simplifica: 8 - (2x - 5y + 3z - 1).'
  solucion_pasos:
  - -(+2x) = -2x.
  - -(-5y) = +5y.
  - -(+3z) = -3z.
  - -(-1) = +1.
  - 'Resultado: 8 - 2x + 5y - 3z + 1 = 9 - 2x + 5y - 3z.'
- titulo: 'Un ingeniero debe calcular el material sobrante tras descontar el desperdicio: $M = 100 - (1'
  enunciado: 'Un ingeniero debe calcular el material sobrante tras descontar el desperdicio: $M = 100 - (15t - 5
    + 3w)$. ¿Cuál es la expresión simplificada del material disponible? (v1)


    Opciones: A) $105 - 15t - 3w$ · B) $95 - 15t - 3w$ · C) $105 + 15t - 3w$ · D) $105 - 15t + 3w$'
  solucion_pasos:
  - 'Invertimos: $-(+15t)=-15t$, $-(-5)=+5$, $-(+3w)=-3w$. Queda: $100-15t+5-3w = 105-15t-3w$.'
  - 'Respuesta: $105 - 15t - 3w$'
- titulo: 'Respecto de «Detección de error al suprimir agrupación negativa»: ¿La siguiente formulación'
  enunciado: 'Respecto de «Detección de error al suprimir agrupación negativa»: ¿La siguiente formulación es correcta?
    «El **Error de Signo Negativo** ocurre cuando al eliminar un paréntesis precedido de $-$, se invierte el signo
    del primer término pero se dejan los signos de los términos siguientes sin cambio»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Error de Signo Negativo** ocurre cuando al eliminar un
    paréntesis precedido de $-$, se invierte el signo del primer término pero se dejan los signos de los términos
    siguientes sin cambio.'
- titulo: 'Respecto de «Detección de error al suprimir agrupación negativa»: ¿La siguiente conclusión e'
  enunciado: 'Respecto de «Detección de error al suprimir agrupación negativa»: ¿La siguiente conclusión es correcta?
    «Invertir solo el signo del primer término interior»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Error de Signo Negativo** ocurre cuando al eliminar un
    paréntesis precedido de $-$, se invierte el signo del primer término pero se dejan los signos de los términos
    siguientes sin cambio.'
errores_frecuentes:
- Invertir solo el signo del primer término interior.
- Invertir los signos de los términos negativos y dejar los positivos 'porque ya son positivos'.
- No invirtió ningún signo.
- Invirtió los signos de forma correcta.
- Sumó todos los coeficientes en lugar de restar.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Detección de error al suprimir agrupación negativa
