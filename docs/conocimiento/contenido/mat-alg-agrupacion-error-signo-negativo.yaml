semantic_id: MAT.ALG.AGRUPACION.ERROR_SIGNO_NEGATIVO
objetivo: Identificar y corregir el error de olvidar invertir los signos al eliminar
  un paréntesis precedido de signo negativo.
introduccion: 'El error más clásico del álgebra pre-universitaria: ver un paréntesis
  con signo negativo, cambiar el primer signo, y dejar los demás igual. Es como detener
  una avalancha solo a la mitad.'
resumen: 'El **Error de Signo Negativo** ocurre cuando al eliminar un paréntesis precedido
  de $-$, se invierte el signo del primer término pero se dejan los signos de los
  términos siguientes sin cambio. La regla es clara: todos deben cambiar.'
explicacion: 'La operación errónea más frecuente:

  $5 - (3x - 4y + 2) = 5 - 3x - 4y + 2$ ← ¡INCORRECTO!


  El $-$ delante del paréntesis actúa sobre TODO lo que está adentro:

  $5 - (3x - 4y + 2) = 5 - 3x + 4y - 2$ ← CORRECTO.


  Verificación: $-(+3x) = -3x$, $-(-4y) = +4y$, $-(+2) = -2$.


  Resumen final: $3 - 3x + 4y$.'
procedimiento:
- 'Paso 1: Localiza el signo $-$ antes del paréntesis.'
- 'Paso 2: Marca con una flecha o subrayado CADA término dentro del paréntesis.'
- 'Paso 3: Invierte uno a uno el signo de cada término marcado.'
- 'Paso 4: Verifica que no quedó ningún término sin invertir.'
ejemplos:
- titulo: Todos o ninguno
  enunciado: 'Elimina y simplifica: 8 - (2x - 5y + 3z - 1).'
  solucion_pasos:
  - -(+2x) = -2x.
  - -(-5y) = +5y.
  - -(+3z) = -3z.
  - -(-1) = +1.
  - 'Resultado: 8 - 2x + 5y - 3z + 1 = 9 - 2x + 5y - 3z.'
errores_frecuentes:
- Invertir solo el signo del primer término interior.
- Invertir los signos de los términos negativos y dejar los positivos 'porque ya son
  positivos'.
fuente: Álgebra de Baldor.
estado: publicado
