semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.PUNTO_EXTERIOR_CIRCUNFERENCIA
titulo: Determinación de un punto exterior a una circunferencia mediante distancia al centro
objetivo: Determinar si un punto es exterior a una circunferencia, comparando su distancia al centro con
  el radio de la circunferencia.
introduccion: Un punto está fuera de una circunferencia si está más lejos del centro que la longitud del
  radio, la condición opuesta a la de un punto interior.
resumen: Un punto $(x_0,y_0)$ es exterior a una circunferencia de centro $(h,k)$ y radio $r$ si $\sqrt{(x_0-h)^2+(y_0-k)^2}>r$.
explicacion: '![Punto exterior a una circunferencia](/static/img/geometria/analitica/posrc-punto-exterior-circunferencia.svg)


  ### Definición formal


  Un punto es exterior a la circunferencia si su distancia al centro es estrictamente mayor que el radio:
  $d(P,\text{centro})>r$.


  ### Desarrollo didáctico


  Para la circunferencia $x^2+y^2=9$ (centro (0,0), radio 3) y el punto $P(5,4)$: $d=\sqrt{25+16}=\sqrt{41}\approx6{,}4>3$,
  por lo que $P$ es exterior a la circunferencia.'
procedimiento:
- 'Paso 1: Identifica el centro y el radio de la circunferencia.'
- 'Paso 2: Calcula la distancia entre el punto dado y el centro de la circunferencia.'
- 'Paso 3: Si esa distancia es mayor que el radio, el punto es exterior a la circunferencia.'
ejemplos:
- titulo: Verificar que P(5,4) es exterior a x²+y²=9
  enunciado: Centro (0,0), radio 3, P(5,4).
  solucion_pasos:
  - d=√41≈6,4>3, por lo que P es exterior.
- titulo: Verificar un punto exterior con centro distinto del origen
  enunciado: (x-2)²+(y-1)²=4, punto (10,10).
  solucion_pasos:
  - d=√((10-2)²+(10-1)²)=√(64+81)=√145≈12,04>2, por lo que el punto es exterior.
- titulo: ¿Un punto exterior siempre tiene distancia al centro mayor que el radio?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente la condición que lo define como exterior.
- titulo: ¿Se puede determinar si un punto es exterior sin calcular la raíz cuadrada?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con comparar (x0-h)²+(y0-k)² con r², evitando el cálculo de la raíz.
errores_frecuentes:
- Comparar la distancia con el diámetro en vez de con el radio.
- Confundir la condición de exterior (distancia mayor) con la de interior (distancia menor).
- Cometer errores aritméticos al calcular las diferencias de coordenadas respecto del centro.
fuente: Elaboración propia.
estado: publicado
