semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.EQUILATERO
titulo: Triángulo equilátero como triángulo de tres lados de igual medida
objetivo: Reconocer un triángulo equilátero por tener sus tres lados exactamente iguales.
introduccion: 'El caso más simétrico de triángulo, según sus lados, es aquel donde las tres medidas coinciden:
  el equilátero.'
resumen: Un triángulo equilátero es aquel cuyos tres lados tienen exactamente la misma medida.
explicacion: '![Triángulo equilátero](/static/img/geometria/triangulos/triangulos-clasificacion-equilatero.svg)


  ### Definición formal


  Un triángulo de lados $a$, $b$ y $c$ es equilátero si $a=b=c$.


  ### Desarrollo didáctico


  Un triángulo con sus tres lados de 5 cm es equilátero: las tres medidas coinciden exactamente.'
procedimiento:
- 'Paso 1: Mide los tres lados del triángulo.'
- 'Paso 2: Verifica que las tres medidas sean exactamente iguales.'
- 'Paso 3: Si coinciden las tres, el triángulo es equilátero.'
ejemplos:
- titulo: Reconocer un equilátero
  enunciado: Un triángulo tiene sus tres lados de 8 cm.
  solucion_pasos:
  - Las tres medidas coinciden, así que el triángulo es equilátero.
- titulo: Caso no equilátero
  enunciado: Un triángulo tiene lados 8 cm, 8 cm y 7 cm.
  solucion_pasos:
  - Solo dos lados coinciden; es isósceles, no equilátero.
- titulo: ¿Un triángulo equilátero es también isósceles?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque cumple la condición de tener al menos dos lados iguales.
- titulo: ¿Un triángulo equilátero puede ser escaleno?
  respuesta: 'No'
  solucion_pasos:
  - No, escaleno exige las tres medidas distintas, y el equilátero las tiene todas iguales.
errores_frecuentes:
- Confundir equilátero (tres lados iguales) con isósceles (al menos dos).
- Clasificar como equilátero un triángulo con solo dos lados iguales.
- Olvidar verificar los tres lados y confiar solo en la apariencia del dibujo.
fuente: Elaboración propia.
estado: publicado
