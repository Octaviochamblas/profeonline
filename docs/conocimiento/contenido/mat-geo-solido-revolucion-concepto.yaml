semantic_id: MAT.GEO.CUERPOS_REDONDOS_BASE.SOLIDOS_REVOLUCION_CONCEPTO
titulo: Concepto de sólido de revolución
objetivo: Reconocer un sólido de revolución como el cuerpo geométrico que se genera al girar una figura
  plana alrededor de un eje fijo.
introduccion: Si giras rápidamente una figura plana (como un rectángulo) alrededor de una línea fija,
  el 'barrido' que genera en el espacio es un sólido de revolución.
resumen: Un sólido de revolución es el cuerpo geométrico que se genera al hacer girar una figura plana
  360° alrededor de una recta fija llamada eje de rotación.
explicacion: '![Concepto de sólido de revolución](/static/img/geometria/espacio-cuerpos/solido-revolucion-concepto.svg)


  ### Definición formal


  Un sólido de revolución se obtiene al girar una región plana 360° alrededor de una recta fija (el eje
  de rotación), que generalmente es uno de los lados o un eje de simetría de la figura original.


  ### Desarrollo didáctico


  En la figura, un rectángulo gira alrededor de uno de sus lados (el eje vertical), generando un cilindro.
  Según la figura plana que se haga girar (rectángulo, triángulo rectángulo, semicírculo), se obtienen
  distintos cuerpos redondos: cilindro, cono o esfera respectivamente.'
procedimiento:
- 'Paso 1: Identifica la figura plana que se hará girar y el eje de rotación (una recta fija).'
- 'Paso 2: Imagina el giro de 360° completo de la figura alrededor del eje.'
- 'Paso 3: Reconoce el cuerpo geométrico tridimensional que ''barre'' ese giro completo.'
ejemplos:
- titulo: Identificar el sólido generado al rotar un rectángulo
  enunciado: Un rectángulo gira 360° alrededor de uno de sus lados.
  solucion_pasos:
  - Se genera un cilindro, cuyo radio es el otro lado del rectángulo y cuya altura es el lado usado como
    eje.
- titulo: Identificar el sólido generado al rotar un triángulo rectángulo
  enunciado: Un triángulo rectángulo gira 360° alrededor de uno de sus catetos.
  solucion_pasos:
  - Se genera un cono, cuyo radio es el otro cateto y cuya altura es el cateto usado como eje.
- titulo: ¿El giro debe ser de exactamente 360° para generar el sólido completo?
  respuesta: Sí
  solucion_pasos:
  - Sí, un giro completo de 360° es necesario para generar la superficie cerrada completa del sólido.
- titulo: ¿Cualquier figura plana genera un cuerpo redondo al rotar?
  respuesta: Sí
  solucion_pasos:
  - Sí, cualquier figura plana genera algún sólido de revolución al rotar; la forma específica del sólido
    depende de la figura original.
errores_frecuentes:
- Olvidar que el eje de rotación debe ser una recta fija, generalmente contenida en la figura o adyacente
  a ella.
- Confundir el radio del sólido resultante con la altura, según qué lado de la figura se use como eje.
- Creer que un giro parcial (menor a 360°) genera el sólido completo.
fuente: 'Elaboración propia (referencias: Moraleja 97, Cid 182).'
estado: publicado
