semantic_id: 'MAT.ALG.ECUACIONES_LITERALES.ERROR_DESPEJE'
titulo: 'Errores Comunes en el Despeje Literal'
objetivo: 'Identificar y evitar fallas lógicas al manipular ecuaciones con letras.'
introduccion: |
  El error conceptual más común en las ecuaciones literales es 'distribuir incorrectamente' o dividir a medias.
resumen: 'Respeta los jerarquías operativas de los paréntesis.'
explicacion: |
  Ejemplo: Quieres despejar $y$ en la ecuación $x = a(y + b)$.
  - **Error común:** Estudiante pasa la $b$ restando: $x - b = ay$. ¡Falso! La $b$ está atrapada dentro del paréntesis que está siendo multiplicado por $a$. No puede salir mágicamente.
  - **Método correcto 1:** Distribuyes primero: $x = ay + ab$. Luego pasas restando $ab$: $x - ab = ay$. Finalmente divides por $a$: $y = \frac{x - ab}{a}$.
  - **Método correcto 2:** Pasas dividiendo la $a$ primero: $\frac{x}{a} = y + b$. Luego pasas restando la $b$: $y = \frac{x}{a} - b$.
procedimiento:
  - 'Paso 1: Nunca extraigas un término sumando o restando desde adentro de un paréntesis multiplicado.'
  - 'Paso 2: Siempre divide todo el miembro opuesto completo (no solo una parte de él).'
  - 'Paso 3: Si hay factores comunes, extraélos formalmente antes de dividir.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
