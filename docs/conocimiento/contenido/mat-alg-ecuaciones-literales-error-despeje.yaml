semantic_id: MAT.ALG.ECUACIONES_LITERALES.ERROR_DESPEJE
titulo: Errores Comunes en el Despeje Literal
objetivo: Identificar y evitar fallas lógicas al manipular ecuaciones con letras.
introduccion: 'Ejemplo: Quieres despejar $y$ en la ecuación $x = a(y + b)$.'
resumen: El error conceptual más común en las ecuaciones literales es 'operar incorrectamente dentro de los paréntesis'
  o dividir a medias.
explicacion: '### Definición formal


  En una ecuación literal con un término entre paréntesis multiplicado por un parámetro, como $x=a(y+b)$, ningún
  sumando interno al paréntesis puede transponerse por separado: primero debe aplicarse la propiedad distributiva
  ($x=ay+ab$) o dividirse por el factor externo completo ($\frac{x}{a}=y+b$) antes de despejar los términos que
  estaban agrupados.


  ### Desarrollo didáctico


  Ejemplo: Quieres despejar $y$ en la ecuación $x = a(y + b)$.

  - **Error frecuente:** Estudiante pasa la $b$ restando: $x - b = ay$. Falso. La $b$ está atrapada dentro del paréntesis
  que está siendo multiplicado por $a$. No puede salir de manera directa.

  - **Método correcto 1:** Distribuyes primero: $x = ay + ab$. Luego pasas restando $ab$: $x - ab = ay$. Finalmente
  divides por $a$: $y = \frac{x - ab}{a}$.

  - **Método correcto 2:** Pasas dividiendo la $a$ primero: $\frac{x}{a} = y + b$. Luego pasas restando la $b$:
  $y = \frac{x}{a} - b$.


  Respeta los jerarquías operativas de los paréntesis.'
procedimiento:
- Nunca extraigas un término sumando o restando desde adentro de un paréntesis multiplicado.
- Siempre divide todo el miembro opuesto completo (no solo una parte de él).
- Si hay fcantidades involucradas comunes, extraélos formalmente antes de dividir.
