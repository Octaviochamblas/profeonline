semantic_id: MAT.ALG.ECUACIONES_LITERALES.ERROR_DESPEJE
titulo: Errores Comunes en el Despeje Literal
objetivo: Identificar y evitar fallas lógicas al manipular ecuaciones con letras.
explicacion: |
  El error mortal más común en las ecuaciones literales es 'romper paréntesis ilegalmente' o dividir a medias.

  Ejemplo: Quieres despejar $y$ en la ecuación $x = a(y + b)$.
  - **Error garrafal:** Estudiante pasa la $b$ restando: $x - b = ay$. ¡Falso! La $b$ está atrapada dentro del paréntesis que está siendo multiplicado por $a$. No puede salir mágicamente.
  - **Método correcto 1:** Distribuyes primero: $x = ay + ab$. Luego pasas restando $ab$: $x - ab = ay$. Finalmente divides por $a$: $y = \frac{x - ab}{a}$.
  - **Método correcto 2:** Pasas dividiendo la $a$ primero: $\frac{x}{a} = y + b$. Luego pasas restando la $b$: $y = \frac{x}{a} - b$.

  Respeta los campos de fuerza de los paréntesis.
procedimiento: |
  1. Nunca extraigas un término sumando o restando desde adentro de un paréntesis multiplicado.
  2. Siempre divide todo el miembro opuesto completo (no solo una parte de él).
  3. Si hay factores comunes, extraélos formalmente antes de dividir.
