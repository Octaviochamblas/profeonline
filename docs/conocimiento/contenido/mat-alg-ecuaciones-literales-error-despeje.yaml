- titulo: 'Respecto de «Detección de error en el despeje de una variable»: ¿Es correcta esta caracteriz'
  enunciado: 'Respecto de «Detección de error en el despeje de una variable»: ¿Es correcta esta caracterización?
    «El error conceptual más común en las ecuaciones literales es ''operar incorrectamente dentro de los paréntesis''
    o dividir a medias»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El error conceptual más común en las ecuaciones literales
    es ''operar incorrectamente dentro de los paréntesis'' o dividir a medias.'
- titulo: 'Respecto de «Detección de error en el despeje de una variable»: ¿Es válida esta afirmación?'
  enunciado: 'Respecto de «Detección de error en el despeje de una variable»: ¿Es válida esta afirmación? «Puede
    omitirse esta condición sin cambiar el resultado: «Nunca extraigas un término sumando o restando desde adentro
    de un paréntesis multiplicado»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El error conceptual más común en las ecuaciones literales
    es ''operar incorrectamente dentro de los paréntesis'' o dividir a medias.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Nunca extraigas un término sumando o restando desde
  adentro de un paréntesis multiplicado».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Siempre divide todo el miembro opuesto completo
  (no solo una parte de él)».'
- La definición sigue cumpliéndose aunque no se considere que el error conceptual más común en las ecuaciones literales
  es 'operar incorrectamente dentro de los paréntesis' o dividir a medias.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Nunca extraigas un término sumando o
  restando desde adentro de un paréntesis multiplicado».
- La comprobación del resultado vuelve innecesaria la condición «Siempre divide todo el miembro opuesto completo
  (no solo una parte de él)».
