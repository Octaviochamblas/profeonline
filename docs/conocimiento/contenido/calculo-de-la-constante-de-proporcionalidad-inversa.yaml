semantic_id: MAT.NUM.PROP_INVERSA.CONSTANTE_PROPORCIONALIDAD
titulo: Cálculo de la constante de proporcionalidad inversa
objetivo: Calcular la constante de proporcionalidad inversa.
introduccion: Si contratas a 3 pintores y demoran 4 días, el 'esfuerzo total' de la obra es de 12 días-pintor.
  Ese número global que engloba el trabajo o el tamaño total del problema no cambia por más que varíes
  a los trabajadores. Es nuestra nueva constante.
resumen: 'La constante de proporcionalidad inversa ($k$) es el valor fijo que resulta de multiplicar dos
  magnitudes proporcionales inversas: $k = x \cdot y$.'
explicacion: "En una **proporcionalidad inversa**, el comportamiento matemático central es que el área\
  \ del rectángulo formado por $x$ e $y$ siempre es la misma. \n\nSi multiplicas cualquier valor de $y$\
  \ por su correspondiente $x$, siempre obtendrás el mismo número.\n\nA este número inalterable lo llamamos\
  \ **constante de proporcionalidad inversa ($k$)**.\n$$k = x \\cdot y$$"
procedimiento:
- 'Paso 1: Identifica un par de valores $(x, y)$ que correspondan entre sí.'
- 'Paso 2: Multiplica ambas magnitudes ($x \cdot y$).'
- 'Paso 3: El resultado de esa multiplicación es la constante $k$.'
ejemplos:
- titulo: Hallando k inversa
  enunciado: Si $4$ tractores aran un campo en $6$ horas, ¿cuál es la constante de proporcionalidad inversa?
  solucion_pasos:
  - El par de valores es $x=4$ tractores, $y=6$ horas.
  - Multiplicamos $x \cdot y = 4 \cdot 6 = 24$.
  - La constante es $k=24$. (Se requieren 24 horas-tractor para arar el campo).
- titulo: ¿Qué pasa si divido?
  respuesta: Obtienes un número sin sentido constante.
  solucion_pasos:
  - Si haces $6/4 = 1.5$. Si ahora usas 8 tractores (demorarán 3 horas), el cociente sería $3/8 = 0.375$.
    La división no es constante, el producto sí ($4\cdot6=24$ y $8\cdot3=24$).
errores_frecuentes:
- Dividir los valores en lugar de multiplicarlos (confundir con proporción directa).
- Sumar $x+y$ para hallar la constante.
- Creer que la constante cambia si se agregan decimales.
fuente: Currículum Nacional MINEDUC.
estado: publicado
