semantic_id: MAT.NUM.INTERES_SIMPLE.TIEMPO_INVERSION
objetivo: Determinar el tiempo necesario para alcanzar un monto deseado en interés
  simple.
introduccion: ¿Cuánto tendré que esperar para que mis ahorros se dupliquen? El tiempo
  es oro, literalmente. Aprende a calcular cuántos meses o años debe madurar una inversión.
resumen: 'Para hallar el tiempo $t$, se despeja la fórmula básica: $t = I / (C \cdot
  i)$. Si la tasa es anual, el tiempo obtenido estará en años. Si la tasa es mensual,
  el tiempo estará en meses.'
explicacion: "Despejamos el tiempo ($t$) de la fórmula de interés simple $I = C \\\
  cdot i \\cdot t$:\n\n$$t = \\frac{I}{C \\cdot i}$$\n\n- Igual que antes, si te dan\
  \ el Monto Final, primero debes restar el capital para hallar $I$.\n- El tiempo\
  \ que te dé como resultado **'hereda' el apellido de la tasa**. Si usaste una tasa\
  \ del $4\\%$ *trimestral*, el número final que obtengas será una cantidad de *trimestres*.\
  \ \n- Si el resultado da con decimales (ej. $2.5$ años), significa que son $2$ años\
  \ y medio (es decir, $2$ años y $6$ meses)."
procedimiento:
- 'Paso 1: Calcula el interés generado ($I = Monto - Capital$).'
- 'Paso 2: Transforma la tasa a decimal.'
- 'Paso 3: Divide el interés por $(Capital \cdot tasa)$.'
- 'Paso 4: Interpreta el resultado numérico en la unidad de tiempo correspondiente
  a la tasa.'
ejemplos:
- titulo: Duplicando el dinero
  enunciado: Si invierto a una tasa del 5% simple anual, ¿cuántos años debo esperar
    para duplicar mi capital?
  solucion_pasos:
  - Duplicar capital significa que el Monto $M = 2C$.
  - 'Por ende, el interés ganado debe ser igual al capital: $I = C$.'
  - $t = I / (C \cdot i) \rightarrow t = C / (C \cdot 0.05)$.
  - 'Las C se cancelan: $t = 1 / 0.05 = 20$. Debes esperar 20 años.'
errores_frecuentes:
- Olvidar revisar si la tasa era mensual o anual, respondiendo 'meses' cuando la matemática
  indicaba 'años'.
- Poner el Capital en el numerador de la división.
fuente: Currículum Nacional MINEDUC.
estado: publicado
