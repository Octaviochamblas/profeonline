semantic_id: MAT.GEO.RECTA_ECUACIONES.INTERCEPTOS_SEGMENTARIA
titulo: Interpretación de los interceptos en la ecuación segmentaria
objetivo: Interpretar geométricamente los valores a y b de la ecuación segmentaria como los puntos exactos
  donde la recta corta los ejes x e y respectivamente.
introduccion: 'Los valores a y b no son solo coeficientes algebraicos: representan directamente las coordenadas
  de los puntos de corte con los ejes, lo que facilita graficar la recta rápidamente.'
resumen: En la ecuación segmentaria $\dfrac{x}{a}+\dfrac{y}{b}=1$, el valor $a$ corresponde al punto $(a,0)$
  (intercepto con el eje x) y el valor $b$ corresponde al punto $(0,b)$ (intercepto con el eje y).
explicacion: '![Interceptos en la forma segmentaria](/static/img/geometria/analitica/rectaeq-interceptos-segmentaria.svg)


  ### Definición formal


  Evaluando $\dfrac{x}{a}+\dfrac{y}{b}=1$ en $y=0$: $\dfrac{x}{a}=1$, por lo que $x=a$, confirmando el
  intercepto $(a,0)$. Evaluando en $x=0$: $\dfrac{y}{b}=1$, por lo que $y=b$, confirmando el intercepto
  $(0,b)$.


  ### Desarrollo didáctico


  En la figura, la recta $\dfrac{x}{5}+\dfrac{y}{3}=1$ corta el eje x exactamente en $(5,0)$ y el eje
  y exactamente en $(0,3)$, permitiendo graficarla trazando solo esos dos puntos y uniéndolos.'
procedimiento:
- 'Paso 1: Identifica los valores a y b en la ecuación x/a+y/b=1.'
- 'Paso 2: Interpreta a como la coordenada x del intercepto con el eje x: el punto (a,0).'
- 'Paso 3: Interpreta b como la coordenada y del intercepto con el eje y: el punto (0,b).'
ejemplos:
- titulo: Interpretar los interceptos de x/5+y/3=1
  enunciado: a=5, b=3.
  solucion_pasos:
  - La recta corta el eje x en (5,0) y el eje y en (0,3).
- titulo: Graficar una recta usando solo sus interceptos
  enunciado: x/(-4)+y/2=1.
  solucion_pasos:
  - Se marcan los puntos (-4,0) y (0,2), y se traza la recta que los une.
- titulo: ¿El valor a siempre corresponde a una coordenada sobre el eje x?
  respuesta: Sí
  solucion_pasos:
  - Sí, es el valor de x cuando y=0.
- titulo: ¿Se puede graficar una recta conociendo solo su ecuación segmentaria?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con marcar los dos interceptos (a,0) y (0,b) y unirlos con una línea recta.
errores_frecuentes:
- Confundir el intercepto con el eje x (a,0) con el intercepto con el eje y (0,b).
- Olvidar que a y b son las coordenadas completas de los puntos de corte, no solo valores aislados.
- Intentar graficar la recta usando un solo intercepto, sin considerar el segundo punto necesario.
fuente: 'Elaboración propia (referencia: Carreño 167).'
estado: publicado
