semantic_id: MAT.GEO.CIRCULO_ELEMENTOS.DIAMETRO_DOBLE_RADIO
titulo: Relación entre diámetro y radio como d = 2r
objetivo: 'Comprender y aplicar la relación fija entre el diámetro y el radio de una circunferencia: el
  diámetro es siempre el doble del radio.'
introduccion: Con el radio y el diámetro ya definidos por separado, es momento de establecer la relación
  numérica precisa que los conecta.
resumen: 'El diámetro de una circunferencia es siempre el doble de su radio: $d=2r$.'
explicacion: '![Relación entre diámetro y radio: d = 2r](/static/img/geometria/circunferencia-circulo/circulo-diametro-doble-radio.svg)


  ### Definición formal


  Si $r$ es el radio de una circunferencia, su diámetro es $d=2r$. Equivalentemente, $r=\frac{d}{2}$.


  ### Desarrollo didáctico


  Esto se debe a que el diámetro está formado por dos radios consecutivos y opuestos entre sí (uno a cada
  lado del centro), cada uno de longitud $r$, sumando en total $2r$.'
procedimiento:
- 'Paso 1: Identifica si tienes el radio o el diámetro como dato conocido.'
- 'Paso 2: Si tienes el radio, multiplícalo por 2 para obtener el diámetro.'
- 'Paso 3: Si tienes el diámetro, divídelo entre 2 para obtener el radio.'
ejemplos:
- titulo: Calcular el diámetro a partir del radio
  enunciado: Una circunferencia tiene radio 7 cm.
  solucion_pasos:
  - d=2×7=14 cm.
- titulo: Calcular el radio a partir del diámetro
  enunciado: Una circunferencia tiene diámetro 20 cm.
  solucion_pasos:
  - r=20/2=10 cm.
- titulo: ¿El diámetro siempre es mayor que el radio?
  respuesta: Sí
  solucion_pasos:
  - Sí, exactamente el doble, ya que d=2r.
- titulo: ¿Esta relación aplica a cualquier circunferencia, sin importar su tamaño?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una relación constante y universal para cualquier circunferencia.
errores_frecuentes:
- Confundir la dirección de la conversión, dividiendo cuando se debía multiplicar (o viceversa).
- Olvidar la relación por completo y tratar el radio y el diámetro como si fueran el mismo valor.
- Aplicar el factor incorrecto (por ejemplo, multiplicar por 3 en vez de 2).
fuente: 'Fuente: Moraleja 73, Cid 94.'
estado: publicado
