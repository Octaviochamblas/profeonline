semantic_id: MAT.ALG.FUNCION_EVALUACION.EVALUACION_DESDE_FORMULA
titulo: Evaluación de una función dada por fórmula
objetivo: Evaluar funciones definidas por fórmulas algebraicas que incluyen fracciones, raíces o varios términos.
introduccion: 'Las fórmulas más elaboradas exigen más cuidado, pero el método sigue siendo el mismo: sustituir
  y simplificar, respetando la estructura completa de la expresión.'
resumen: Evaluar una función dada por una fórmula algebraica compleja (con fracciones, raíces o varios términos)
  exige sustituir el valor en toda la expresión y simplificar respetando su estructura completa, incluidos paréntesis
  y agrupaciones.
explicacion: '### Definición formal


  Dada una función $f(x)$ definida mediante una expresión algebraica con múltiples operaciones (sumas, productos,
  cocientes, potencias, raíces), la evaluación en $x=a$ requiere sustituir $a$ en cada subexpresión y resolver
  respetando la jerarquía de operaciones y las agrupaciones indicadas por paréntesis, corchetes o líneas de fracción.


  ### Desarrollo didáctico


  Cuando la fórmula tiene una fracción, primero evalúa numerador y denominador por separado, y luego divide.


  Si $f(x) = \frac{2x+1}{x-3}$ y buscas $f(5)$: numerador $= 2(5)+1 = 11$; denominador $= 5-3=2$; entonces $f(5)
  = \frac{11}{2}$.


  Si hay raíces, evalúa primero el radicando completo antes de extraer la raíz: $g(x) = \sqrt{x+7}$, $g(9) = \sqrt{9+7}
  = \sqrt{16} = 4$.'
procedimiento:
- 'Paso 1: Identifica las subexpresiones de la fórmula (numerador, denominador, radicando, etc.).'
- 'Paso 2: Sustituye el valor dado en cada subexpresión.'
- 'Paso 3: Simplifica cada subexpresión de forma independiente.'
- 'Paso 4: Combina los resultados parciales según la estructura de la fórmula original.'
ejemplos:
- titulo: Evaluación de una fracción algebraica
  enunciado: Si $f(x) = \frac{x^2-1}{x+1}$, calcula $f(4)$.
  solucion_pasos:
  - 'Numerador: $4^2-1 = 15$.'
  - 'Denominador: $4+1 = 5$.'
  - '$f(4) = 15/5 = 3$.'
- titulo: Evaluación con raíz cuadrada
  enunciado: Si $g(x) = \sqrt{2x+3}$, calcula $g(11)$.
  solucion_pasos:
  - 'Radicando: $2(11)+3 = 25$.'
  - '$g(11) = \sqrt{25} = 5$.'
- titulo: ¿En $f(x) = \frac{3}{x-2}$, se puede evaluar $f(2)$?
  enunciado: ¿En $f(x) = \frac{3}{x-2}$, se puede evaluar $f(2)$?
  respuesta: 'No'
  solucion_pasos:
  - En x=2 el denominador se anula, x=2 no pertenece al dominio de f.
- titulo: ¿Se debe evaluar el radicando completo antes de extraer la raíz?
  enunciado: ¿Se debe evaluar el radicando completo antes de extraer la raíz?
  respuesta: Sí
  solucion_pasos:
  - La raíz actúa sobre el resultado final del radicando, no sobre cada término por separado.
errores_frecuentes:
- Dividir antes de terminar de simplificar completamente el numerador o el denominador.
- Extraer la raíz de cada término del radicando por separado en vez de simplificar la suma completa primero.
- Olvidar verificar que el valor sustituido pertenezca al dominio antes de evaluar.
- No usar paréntesis al sustituir en fórmulas con varios términos, causando errores de signo.
