semantic_id: MAT.ALG.FUNC_POTENCIA_BASE.EXPONENTE_N
titulo: El exponente $n$ como parámetro determinante
objetivo: Reconocer que el exponente $n$ de $f(x)=a\cdot x^n$ es el parámetro que determina el tipo de curva.
introduccion: Mientras el coeficiente $a$ solo escala y refleja la gráfica, el exponente $n$ es el que decide si
  la curva se comporta como una parábola, una recta, una hipérbola o una raíz.
resumen: 'El exponente $n$ en $f(x)=a\cdot x^n$ determina el **tipo general de curva**: entero positivo par o
  impar, entero negativo, o fraccionario, cada uno con un comportamiento gráfico característico.'
explicacion: '### Definición formal


  Dado $f(x)=a\cdot x^n$, el valor de $n\in\mathbb{R}$ clasifica la función en distintas familias: si
  $n\in\mathbb{Z}^+$ par, la curva es simétrica respecto al eje $y$ (como una parábola); si $n\in\mathbb{Z}^+$
  impar, es simétrica respecto al origen; si $n<0$, aparece una asíntota vertical en $x=0$; si $n$ es
  fraccionario, la función involucra raíces.


  ### Desarrollo didáctico


  $f(x)=x^2$ (n par positivo) tiene forma de parábola. $f(x)=x^3$ (n impar positivo) tiene forma de "s". $f(x)=x^{-1}$
  (n negativo) tiene forma de hipérbola. $f(x)=x^{1/2}$ (n fraccionario) tiene forma de raíz cuadrada. Cada tipo
  de exponente produce una familia de curvas completamente distinta.'
procedimiento:
- 'Paso 1: Identifica el valor y tipo del exponente $n$ (entero positivo par/impar, negativo, o fraccionario).'
- 'Paso 2: Asocia ese tipo de exponente con la familia de curva correspondiente.'
- 'Paso 3: Usa esa clasificación para anticipar el comportamiento general antes de graficar en detalle.'
ejemplos:
- titulo: Clasificación de exponentes
  enunciado: 'Clasifica el exponente de $f(x)=6x^4$.'
  solucion_pasos:
  - Se observa que $n=4$ es un entero positivo par.
  - Se espera una curva simétrica respecto al eje $y$, similar a una parábola.
- titulo: Clasificación de un exponente fraccionario
  enunciado: 'Clasifica el exponente de $f(x)=2x^{1/3}$.'
  solucion_pasos:
  - Se observa que $n=1/3$ es un exponente fraccionario.
  - Se espera un comportamiento asociado a una función raíz.
- titulo: ¿El coeficiente $a$ determina el tipo de curva de la función potencia?
  enunciado: ¿Es el coeficiente $a$ el que determina si la curva es parábola, hipérbola o raíz?
  respuesta: 'No'
  solucion_pasos:
  - Es el exponente $n$ el que determina el tipo general de curva; $a$ solo escala y refleja.
- titulo: ¿Todos los exponentes enteros positivos producen curvas del mismo tipo?
  enunciado: ¿Producen el mismo tipo de curva los exponentes enteros positivos pares e impares?
  respuesta: 'No'
  solucion_pasos:
  - Los exponentes pares producen curvas simétricas respecto al eje $y$, y los impares respecto al origen.
errores_frecuentes:
- Confundir el rol del exponente $n$ con el del coeficiente $a$.
- Suponer que todos los exponentes positivos producen curvas idénticas, sin distinguir par de impar.
- No anticipar la aparición de asíntotas cuando el exponente es negativo.
- Olvidar que los exponentes fraccionarios pueden restringir el dominio de la función.
