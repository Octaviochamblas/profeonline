semantic_id: MAT.ALG.EC_CUADR_RESOL_FACTOR.INCOMPLETA_BINOMIA
titulo: Resolución de ecuaciones de la forma ax² + bx = 0 mediante factor común
objetivo: Resolver ecuaciones incompletas binomias de la forma $ax^2+bx=0$ factorizando por término común.
introduccion: Cuando una ecuación cuadrática le falta el término independiente, la $x$ que comparten ambos
  términos restantes se puede extraer como factor común, y desde ahí resolver es directo.
resumen: Para resolver $ax^2+bx=0$, se factoriza por término común extrayendo $x$, obteniendo $x(ax+b)=0$,
  y se aplica la propiedad del producto nulo para hallar las dos soluciones.
explicacion: '### Definición formal


  Dada la ecuación $ax^2+bx=0$ con $a\neq0$ y $b\neq0$, se factoriza extrayendo el factor común $x$: $x(ax+b)=0$.
  Por la propiedad del producto nulo, las soluciones son $x=0$ y $x=-\dfrac{b}{a}$.


  ### Desarrollo didáctico


  Este método es mucho más rápido que aplicar la fórmula general, ya que no requiere calcular ningún discriminante:
  basta con factorizar por término común.


  Para $3x^2-12x=0$: factorizando, $3x(x-4)=0$, por lo que $3x=0$ o $x-4=0$, dando $x=0$ o $x=4$.'
procedimiento:
- 'Paso 1: Verifica que la ecuación tenga la forma $ax^2+bx=0$, sin término independiente.'
- 'Paso 2: Factoriza extrayendo $x$ como factor común: $x(ax+b)=0$.'
- 'Paso 3: Aplica la propiedad del producto nulo, igualando cada factor a cero.'
- 'Paso 4: Resuelve cada ecuación resultante para obtener las dos soluciones.'
ejemplos:
- titulo: Resolución con factor común simple
  enunciado: Resuelve $x^2-5x=0$.
  solucion_pasos:
  - 'Factorizando: $x(x-5)=0$.'
  - $x=0$ o $x=5$.
- titulo: Resolución con coeficiente principal distinto de 1
  enunciado: Resuelve $4x^2+8x=0$.
  solucion_pasos:
  - 'Factorizando: $4x(x+2)=0$.'
  - $x=0$ o $x=-2$.
- titulo: ¿Una ecuación incompleta binomia tiene siempre $x=0$ como una de sus soluciones?
  enunciado: ¿Una ecuación incompleta binomia tiene siempre $x=0$ como una de sus soluciones?
  respuesta: Sí
  solucion_pasos:
  - Al factorizar $x(ax+b)=0$, uno de los factores es siempre $x$, dando la solución $x=0$.
- titulo: ¿Es necesario aplicar la fórmula general para resolver una ecuación incompleta binomia?
  enunciado: ¿Es necesario aplicar la fórmula general para resolver una ecuación incompleta binomia?
  respuesta: 'No'
  solucion_pasos:
  - Factorizar por término común es un método más directo y rápido para este tipo de ecuación.
errores_frecuentes:
- Olvidar la solución $x=0$ al resolver la ecuación, reportando solo la otra raíz.
- Dividir por $x$ en vez de factorizar, lo que elimina indebidamente la solución $x=0$.
- Factorizar incorrectamente el término común, dejando un factor con signo equivocado.
- Aplicar la fórmula general innecesariamente cuando la factorización es más directa.
