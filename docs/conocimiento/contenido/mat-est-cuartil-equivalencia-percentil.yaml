semantic_id: MAT.EST.CUARTILES.EQUIVALENCIA_PERCENTIL
titulo: Relacionar los cuartiles con sus percentiles equivalentes
objetivo: Establecer la relación entre cada cuartil y el percentil que le corresponde.
introduccion: Los cuartiles no son una idea nueva, son solo tres percentiles especiales que ya tienen nombre propio por
  lo mucho que se usan.
resumen: Los cuartiles equivalen a percentiles específicos, donde $Q_1 = P_{25}$, $Q_2 = P_{50}$ (mediana) y $Q_3 = P_{75}$.
explicacion: '![Equivalencia entre cuartiles y percentiles](/static/img/estadistica/cuartil/cuartil-equivalencia-percentil.svg)


  ### Definición formal


  Cada cuartil corresponde a un percentil determinado: $Q_1=P_{25}$, $Q_2=P_{50}$, $Q_3=P_{75}$.


  ### Desarrollo didáctico


  Esta equivalencia permite usar el mismo procedimiento de cálculo de percentiles para obtener cualquier cuartil,

  simplemente reemplazando $k$ por 25, 50 o 75 según corresponda.'
procedimiento:
- 'Paso 1: Identifica qué cuartil necesitas calcular ($Q_1$, $Q_2$ o $Q_3$).'
- 'Paso 2: Traduce el cuartil a su percentil equivalente (25, 50 o 75).'
- 'Paso 3: Aplica el procedimiento de cálculo de percentiles con ese valor de $k$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: ¿A qué percentil equivale el primer cuartil de un conjunto de datos?
  solucion_pasos:
  - El primer cuartil equivale al percentil 25.
  - Por lo tanto, $Q_1 = P_{25}$.
- titulo: Ejemplo 2
  enunciado: Si necesitas calcular $Q_3$ usando la fórmula de posición de percentiles, ¿qué valor de $k$ usarías?
  solucion_pasos:
  - $Q_3$ equivale al percentil 75.
  - Se usaría $k = 75$ en la fórmula de posición.
- titulo: ¿$Q_2$ equivale al percentil 50?
  respuesta: Sí
  solucion_pasos:
  - Sí, y por eso $Q_2$ coincide siempre con la mediana.
- titulo: ¿$Q_1$ equivale al percentil 75?
  respuesta: 'No'
  solucion_pasos:
  - 'No, $Q_1$ equivale al percentil 25; el percentil 75 corresponde a $Q_3$.'
errores_frecuentes:
- Intercambiar las equivalencias entre $Q_1$ y $Q_3$.
- Creer que $Q_2$ no tiene relación con ningún percentil.
- Pensar que los cuartiles y los percentiles son conceptos completamente independientes.
- Usar $k=50$ para calcular $Q_1$ en vez de $k=25$.
- Olvidar que la mediana es un caso particular tanto de percentil como de cuartil.
fuente: 'Elaboración propia (referencia: Moraleja 380).'
estado: publicado
