semantic_id: MAT.GEO.HOMOTECIA.RAZON_LONGITUDES
titulo: Relación entre longitudes homólogas en una homotecia
objetivo: Calcular la longitud de un segmento homólogo en una homotecia a partir de la longitud original
  y el valor absoluto de la razón.
introduccion: Consecuencia directa del paralelismo de segmentos homólogos es la relación exacta entre
  sus longitudes, determinada por la razón de homotecia.
resumen: En una homotecia de razón $k$, la longitud de cualquier segmento imagen es igual al valor absoluto
  de $k$ multiplicado por la longitud del segmento original.
explicacion: '![Razón entre longitudes homólogas](/static/img/geometria/congruencia-semejanza/homotecia-razon-longitudes.svg)


  ### Definición formal


  Si $AB$ es un segmento y $A''B''$ su homólogo bajo una homotecia de razón $k$, entonces $\overline{A''B''}=|k|\times\overline{AB}$.


  ### Desarrollo didáctico


  Un segmento de 6 cm bajo una homotecia de razón $k=-2,5$ tiene su imagen con longitud $|-2,5|\times6=15$
  cm; el signo negativo de $k$ afecta la posición (inversión), pero no la longitud, que siempre es un
  valor positivo.'
procedimiento:
- 'Paso 1: Identifica la longitud del segmento original.'
- 'Paso 2: Calcula el valor absoluto de la razón de homotecia k.'
- 'Paso 3: Multiplica la longitud original por |k| para obtener la longitud del segmento imagen.'
ejemplos:
- titulo: Calcular la longitud imagen con k positivo
  enunciado: Un segmento de 6 cm se transforma bajo una homotecia de razón k=2,5.
  solucion_pasos:
  - Longitud imagen = 2,5×6=15 cm.
- titulo: Calcular la longitud imagen con k negativo
  enunciado: Un segmento de 6 cm se transforma bajo una homotecia de razón k=-2,5.
  solucion_pasos:
  - Longitud imagen = |-2,5|×6=15 cm (la misma que con k positivo, ya que la longitud siempre es positiva).
- titulo: ¿El signo de k afecta la longitud del segmento imagen?
  respuesta: 'No'
  solucion_pasos:
  - No, el signo solo afecta la posición relativa (dirección), no la longitud, que se calcula con el valor
    absoluto.
- titulo: ¿Se puede calcular la razón de homotecia a partir de dos longitudes conocidas?
  respuesta: Sí
  solucion_pasos:
  - Sí, dividiendo la longitud imagen entre la longitud original se obtiene |k| (y el signo se determina
    por la posición).
errores_frecuentes:
- Usar el valor de k con su signo directamente en el cálculo de longitud, obteniendo un resultado negativo
  (las longitudes siempre son positivas).
- Confundir la razón de longitudes con la razón de áreas (que es el cuadrado de |k|).
- Comparar segmentos que no son realmente homólogos entre la figura original y la imagen.
fuente: Elaboración propia.
estado: publicado
