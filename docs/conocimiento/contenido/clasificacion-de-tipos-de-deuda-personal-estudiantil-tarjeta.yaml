semantic_id: MAT.NUM.FINANZAS_PERSONALES.TIPOS_DEUDA
titulo: Clasificación de tipos de deuda (personal, estudiantil, tarjeta)
objetivo: Clasificar los tipos de deuda personal y sus implicancias financieras.
introduccion: No toda la deuda es mala. Endeudarse para comprar una casa o estudiar puede ser una inversión
  en tu futuro. Pero endeudarse para ir de vacaciones o comprar comida es una trampa mortal.
resumen: 'Tipos de deuda comunes: Crédito Hipotecario (para bienes raíces, largo plazo), Crédito de Consumo
  (libre disposición, mediano plazo), Crédito Automotriz, CAE (estudiantil) y Tarjetas de Crédito (cupo
  rotativo, altas tasas).'
explicacion: 'Una deuda es un compromiso de devolver dinero prestado más un interés. No todas tienen el
  mismo riesgo:


  - **Hipotecario:** Sirve para comprar propiedades. Suele tener las tasas de interés más bajas porque
  la propiedad es la garantía.

  - **Automotriz:** Para comprar vehículos. El vehículo queda en ''prenda'' (no puedes venderlo hasta
  pagar la deuda).

  - **Consumo / Personal:** El banco te presta dinero en efectivo para lo que quieras. Tiene tasas más
  altas porque no hay garantías físicas fuertes.

  - **Estudiantil (CAE, Fondo Solidario):** Para financiar educación superior. Suelen tener tasas bajas
  y condiciones de pago asociadas a los ingresos futuros.

  - **Tarjetas de Crédito / Líneas de Crédito:** Es dinero plástico o disponible al instante. Si no pagas
  el total facturado a fin de mes, cobran los intereses más altos del mercado (interés rotativo).'
procedimiento:
- 'Paso 1: Analiza el propósito del dinero prestado.'
- 'Paso 2: Evalúa qué tipo de garantía exige el banco (la casa, el auto, o solo tu firma).'
- 'Paso 3: A menor garantía, mayor suele ser la tasa de interés que te cobran.'
ejemplos:
- titulo: Comprando un departamento
  enunciado: Si quieres adquirir un departamento a 20 años plazo, ¿qué tipo de crédito debes solicitar?
  solucion_pasos:
  - Es un bien raíz.
  - Es a largo plazo.
  - Por lo tanto, la opción correcta es un Crédito Hipotecario.
errores_frecuentes:
- Usar la Tarjeta de Crédito en muchas cuotas para pagar compras grandes y permanentes (sus intereses
  arruinan el presupuesto).
- Pedir un Crédito de Consumo para comprar una casa (los plazos son muy cortos y la cuota sería impagable).
fuente: Currículum Nacional MINEDUC.
estado: publicado
