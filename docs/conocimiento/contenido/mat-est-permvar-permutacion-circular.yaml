semantic_id: MAT.EST.PERMUTACIONES_VARIACIONES.PERMUTACION_CIRCULAR
titulo: Cálculo de permutaciones circulares de n elementos
objetivo: Calcular el número de permutaciones circulares de n elementos distintos, donde las rotaciones
  de un mismo arreglo se consideran equivalentes.
introduccion: Al sentar personas alrededor de una mesa redonda, rotar a todos un puesto no genera un arreglo
  realmente distinto, por lo que la fórmula de conteo debe ajustarse respecto de la permutación lineal.
resumen: El número de permutaciones circulares de $n$ elementos distintos es $P_c(n)=(n-1)!$, ya que se
  fija arbitrariamente la posición de un elemento para eliminar las rotaciones equivalentes.
explicacion: '![Permutaciones circulares](/static/img/probabilidad/permvar/permvar-permutacion-circular.svg)


  ### Definición formal


  Como cualquier rotación de un arreglo circular representa el mismo orden relativo, se fija la posición
  de un elemento (reduciendo el problema a ordenar los $n-1$ restantes): $P_c(n)=(n-1)!$.


  ### Desarrollo didáctico


  Con 4 personas en una mesa redonda, el número de arreglos circulares distintos es $(4-1)!=3!=6$, en
  vez de $4!=24$ (que sería el conteo si las rotaciones se consideraran distintas).'
procedimiento:
- 'Paso 1: Identifica el número n de elementos distintos que se van a ordenar en círculo.'
- 'Paso 2: Fija arbitrariamente la posición de uno de los elementos, para eliminar las rotaciones equivalentes.'
- 'Paso 3: Calcula (n-1)! para ordenar el resto de los elementos alrededor del primero ya fijado.'
ejemplos:
- titulo: Calcular las permutaciones circulares de 4 personas
  enunciado: 4 personas en una mesa redonda.
  solucion_pasos:
  - Pc(4)=(4-1)!=3!=6 arreglos circulares distintos.
- titulo: Calcular las permutaciones circulares de 6 personas
  enunciado: 6 personas en una mesa redonda.
  solucion_pasos:
  - Pc(6)=(6-1)!=5!=120 arreglos circulares distintos.
- titulo: ¿Las rotaciones de un mismo arreglo circular se consideran el mismo caso?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la razón por la que se usa (n-1)! en vez de n!.
- titulo: ¿El número de permutaciones circulares es siempre menor que el de permutaciones lineales para
    el mismo n?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que (n-1)!<n! para cualquier n>1, al eliminar las n rotaciones equivalentes de cada arreglo.
errores_frecuentes:
- Usar la fórmula de permutación lineal (n!) en vez de la circular ((n-1)!), sobreestimando el conteo.
- Olvidar que las rotaciones de un mismo arreglo circular no generan casos nuevos.
- Confundir permutaciones circulares con permutaciones lineales en problemas de mesas redondas o arreglos
  cíclicos.
fuente: 'Elaboración propia (referencia: Baldor 373, Moraleja 299).'
estado: publicado
