semantic_id: MAT.GEO.PARALELOGRAMOS.PERIMETRO
titulo: Cálculo del perímetro de un paralelogramo
objetivo: Calcular el perímetro de un paralelogramo a partir de la longitud de dos lados consecutivos
  (no paralelos).
introduccion: Aprovechando la propiedad de lados opuestos congruentes, se puede calcular fácilmente el
  perímetro de cualquier paralelogramo con solo dos medidas.
resumen: El perímetro de un paralelogramo con lados consecutivos $a$ y $b$ es $P=2(a+b)$.
explicacion: '![Perímetro de un paralelogramo: 2(a+b)](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-perimetro.svg)


  ### Definición formal


  Si un paralelogramo tiene lados consecutivos $a$ y $b$, como los lados opuestos son congruentes, el
  perímetro es $P=a+b+a+b=2(a+b)$.


  ### Desarrollo didáctico


  Un paralelogramo con lados de 9 cm y 6 cm tiene perímetro $P=2(9+6)=2\times15=30$ cm. Esta fórmula funciona
  para cualquier paralelogramo, sea cuadrado, rectángulo, rombo o romboide.'
procedimiento:
- 'Paso 1: Identifica dos lados consecutivos (no paralelos entre sí) del paralelogramo.'
- 'Paso 2: Súmalos.'
- 'Paso 3: Multiplica esa suma por 2 para obtener el perímetro.'
ejemplos:
- titulo: Calcular el perímetro con dos lados dados
  enunciado: Un paralelogramo tiene lados de 9 cm y 6 cm.
  solucion_pasos:
  - P=2(9+6)=2×15=30 cm.
- titulo: Calcular el perímetro de un rombo (caso particular)
  enunciado: Un rombo tiene lado de 7 cm (a=b=7).
  solucion_pasos:
  - P=2(7+7)=28 cm, equivalente a 4×7=28 cm.
- titulo: ¿Esta fórmula aplica a cualquier tipo de paralelogramo?
  respuesta: Sí
  solucion_pasos:
  - Sí, incluyendo cuadrados, rectángulos, rombos y romboides.
- titulo: ¿Se necesitan los cuatro lados para calcular el perímetro?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con dos lados consecutivos, ya que los opuestos son iguales a estos.
errores_frecuentes:
- Sumar dos lados opuestos (iguales) en vez de dos lados consecutivos (distintos).
- Olvidar multiplicar por 2 después de sumar los dos lados consecutivos.
- Confundir el perímetro con el área al aplicar la fórmula incorrecta.
fuente: 'Fuente: Moraleja Tomo 2 68-69, Cid 32-33.'
estado: publicado
