semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.SIN_INTERCEPTO_Y
titulo: Ausencia de intercepto en el eje $y$
objetivo: Justificar por quรฉ la funciรณn logarรญtmica nunca corta el eje $y$.
introduccion: Para que una grรกfica corte el eje $y$, la funciรณn debe estar definida en $x=0$. Como el logaritmo
  excluye ese valor del dominio, esa intersecciรณn simplemente no puede ocurrir.
resumen: La funciรณn $f(x)=\log_b(x)$ **no tiene intercepto en el eje $y$**, porque $x=0$ no pertenece a su dominio
  y, por lo tanto, $f(0)$ no estรก definido.
explicacion: '### Definiciรณn formal


  El dominio de $f(x)=\log_b(x)$ es $\mathbb{R}^+=\{x\in\mathbb{R}: x>0\}$, que excluye $x=0$. Como el intercepto
  en $y$ requiere evaluar $f(0)$, y ese valor queda fuera del dominio, la grรกfica de toda funciรณn logarรญtmica
  carece de intercepto con el eje $y$.


  ### Desarrollo didรกctico


  Intenta evaluar $f(0)=\log_b(0)$: la pregunta serรญa "ยฟa quรฉ exponente se eleva $b$ para obtener $0$?". Ninguna
  potencia de una base positiva puede dar $0$, por eso la expresiรณn no estรก definida y el eje $y$ queda excluido
  como posible intersecciรณn.'
procedimiento:
- 'Paso 1: Recuerda que el dominio de $f(x)=\log_b(x)$ es $x>0$.'
- 'Paso 2: Intenta evaluar $f(0)$ y verifica que $x=0$ no pertenece al dominio.'
- 'Paso 3: Concluye que la grรกfica no tiene intercepto en el eje $y$, coherente con la asรญntota vertical en $x=0$.'
ejemplos:
- titulo: Intento de evaluaciรณn en $x=0$
  enunciado: 'ยฟQuรฉ ocurre al intentar calcular $f(0)$ para $f(x)=\log_7(x)$?'
  solucion_pasos:
  - Se busca un exponente $y$ tal que $7^y=0$.
  - Ninguna potencia de $7$ puede dar $0$, asรญ que $f(0)$ no estรก definido.
- titulo: Relaciรณn con la asรญntota vertical
  enunciado: Explica cรณmo se relaciona la ausencia de intercepto en $y$ con la asรญntota vertical.
  solucion_pasos:
  - La asรญntota vertical en $x=0$ indica que la funciรณn se acerca a ese valor sin alcanzarlo nunca.
  - Como $x=0$ nunca se alcanza, no puede existir un punto de la grรกfica sobre el eje $y$.
- titulo: ยฟLa funciรณn logarรญtmica corta el eje $y$?
  enunciado: ยฟLa grรกfica de $f(x)=\log_b(x)$ tiene algรบn punto sobre el eje $y$?
  respuesta: 'No'
  solucion_pasos:
  - El valor $x=0$ no pertenece al dominio de la funciรณn logarรญtmica.
- titulo: ยฟEs posible que exista una excepciรณn segรบn la base $b$?
  enunciado: ยฟExiste alguna base $b$ para la cual $f(x)=\log_b(x)$ sรญ tenga intercepto en $y$?
  respuesta: 'No'
  solucion_pasos:
  - Para toda base vรกlida $b>0$, $b\neq1$, el dominio siempre excluye $x=0$.
errores_frecuentes:
- Suponer que $\log_b(0)=0$ por analogรญa incorrecta con otras funciones.
- Confundir la ausencia de intercepto en $y$ con la existencia de un intercepto en $(0,0)$.
- No relacionar esta propiedad con la asรญntota vertical en $x=0$.
- Creer que alguna base particular permite evaluar la funciรณn en $x=0$.
