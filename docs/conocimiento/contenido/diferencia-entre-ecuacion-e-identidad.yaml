semantic_id: MAT.ALG.ECUACION_BASE.DIFERENCIA_IDENTIDAD
titulo: Diferencia entre ecuación e identidad
objetivo: Distinguir entre una ecuación (condicional) y una identidad (absoluta).
introduccion: Hay dos tipos de frases algebraicas que usan el signo igual. Una es un misterio que hay
  que resolver (la ecuación). La otra es un hecho irrefutable que siempre es verdad (la identidad).
resumen: Una ecuación se cumple solo para algunos valores de la incógnita. Una identidad se cumple para
  ABSOLUTAMENTE TODOS los valores de la incógnita.
explicacion: "### Definición formal\n\nComo es verdad para toda x, la x 'desaparece' del cálculo, dejándote\
  \ con una verdad absoluta.\n\n### Desarrollo didáctico\n\nPiénsalo así:\n- **Ecuación (Condicional):**\
  \ $x + 2 = 5$.\n  Pregunta: ¿Cuándo es verdad esto? Solo cuando $x=3$. Si $x$ es otro número, es mentira.\n\
  \n- **Identidad (Absoluta):** $x + x = 2x$.\n  Pregunta: ¿Cuándo es verdad esto?\n  - Si $x = 1$, $1+1\
  \ = 2(1) \\rightarrow 2=2$. Verdad.\n  - Si $x = 10$, $10+10 = 2(10) \\rightarrow 20=20$. Verdad.\n\
  \  - Si $x = -5$, $-5-5 = 2(-5) \\rightarrow -10=-10$. Verdad.\n  Es verdad para siempre y para cualquier\
  \ número. Eso es una identidad.\n\nLos Productos Notables (ej. $(a+b)^2 = a^2 + 2ab + b^2$) son identidades.\
  \ No se 'resuelven', se 'aplican', porque son una verdad universal sin importar cuánto valgan 'a' y\
  \ 'b'."
procedimiento:
- 'Paso 1: Observa la igualdad algebraica.'
- 'Paso 2: Intenta resolverla o simplificarla al máximo.'
- 'Paso 3: Si al simplificar ambos lados te queda algo como $x = 3$, es una ecuación.'
- 'Paso 4: Si al simplificar llegas a algo como $x = x$ o $0 = 0$, significa que es una identidad.'
ejemplos:
- titulo: Determina si $2(x + 1) = 2x + 2$ es ecuación o identidad
  enunciado: Determina si $2(x + 1) = 2x + 2$ es ecuación o identidad.
  solucion_pasos:
  - 'Desarrolla el lado izquierdo multiplicando: $2x + 2$.'
  - 'Compara con el derecho: $2x + 2 = 2x + 2$.'
  - Son exactamente iguales en estructura. Cualquier valor de x funcionará.
  - Es una Identidad.
- titulo: 'Clasifica: $3x = 15$.'
  solucion_pasos:
  - Solo se cumple si x=5. No es universal.
- titulo: 'Respecto de «Diferencia entre ecuación e identidad»: ¿Es correcta esta caracterización? «Una'
  enunciado: 'Respecto de «Diferencia entre ecuación e identidad»: ¿Es correcta esta caracterización?
    «Una ecuación se cumple solo para algunos valores de la incógnita»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una ecuación se cumple solo para algunos valores
    de la incógnita.'
- titulo: 'Respecto de «Diferencia entre ecuación e identidad»: ¿Es válida esta afirmación? «Tratar de'
  enunciado: 'Respecto de «Diferencia entre ecuación e identidad»: ¿Es válida esta afirmación? «Tratar
    de resolver una identidad y frustrarse al llegar a $0 = 0$, pensando que se cometió un error»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una ecuación se cumple solo para algunos valores
    de la incógnita.'
errores_frecuentes:
- Tratar de resolver una identidad y frustrarse al llegar a $0 = 0$, pensando que se cometió un error.
- Para «¿Qué sucede invariablemente si intentas resolver algebraicamente una identidad», la respuesta
  correcta es Llegas a un resultado fraccionario.
- Llegas a una contradicción como $0 = 1$.
- Llegas a que $x = 0$.
- $2x - 1 = 7$.
