semantic_id: MAT.ALG.EC_CUADR_MODELO.INTERPRETACION_SOLUCION
titulo: Interpretación contextual de las soluciones de una ecuación cuadrática
objetivo: Interpretar el significado, dentro del contexto del problema, de la solución numérica obtenida al resolver
  una ecuación cuadrática.
introduccion: Encontrar el valor numérico correcto de $x$ no es el final del problema; falta traducir ese número
  de vuelta al lenguaje de la situación original, respondiendo realmente lo que se preguntó.
resumen: Interpretar la solución consiste en traducir el valor numérico obtenido de vuelta al contexto del problema,
  respondiendo con las unidades y el significado correctos, y no solo entregando el número aislado.
explicacion: '### Definición formal


  La interpretación contextual asocia el valor numérico $x=x_0$, obtenido al resolver la ecuación, con la cantidad
  concreta que representa en el problema (una longitud, un tiempo, una cantidad de objetos), incluyendo sus unidades
  y, si corresponde, el valor de otras cantidades derivadas de $x_0$.


  ### Desarrollo didáctico


  Muchas veces la pregunta del problema no es directamente "cuál es $x$", sino una cantidad derivada de $x$ (como
  el largo, si $x$ representa el ancho), por lo que interpretar bien implica revisar exactamente qué se preguntó.


  Si $x=5$ representa el ancho de un rectángulo cuyo largo es $x+4$, y la pregunta es por el largo, la interpretación
  correcta no es "$x=5$", sino "el largo mide $9$ unidades".'
procedimiento:
- 'Paso 1: Verifica exactamente qué cantidad pregunta el problema (puede no ser directamente $x$).'
- 'Paso 2: Calcula, si es necesario, la cantidad derivada a partir del valor válido de $x$.'
- 'Paso 3: Expresa la respuesta final con las unidades correspondientes y en el lenguaje del problema original.'
ejemplos:
- titulo: Interpretación de una cantidad derivada
  enunciado: 'Si el ancho de un terreno es $x=7$ m y el largo es $x+3$, ¿cuál es la respuesta a "determina el largo
    del terreno"?'
  solucion_pasos:
  - 'El largo es $x+3=7+3=10$.'
  - El largo del terreno mide $10$ metros.
- titulo: Interpretación de un tiempo de caída
  enunciado: 'Si al resolver $h(t)=0$ se obtiene $t=4$ segundos, ¿cómo se interpreta esta solución?'
  solucion_pasos:
  - '$t=4$ representa el instante, medido en segundos desde el lanzamiento, en que el objeto toca el suelo.'
  - La respuesta se expresa como "el objeto toca el suelo a los 4 segundos".
- titulo: ¿Basta con entregar el valor numérico de $x$ como respuesta final de un problema aplicado?
  enunciado: ¿Basta con entregar el valor numérico de $x$ como respuesta final de un problema aplicado?
  respuesta: 'No'
  solucion_pasos:
  - Se debe traducir ese valor al contexto del problema, incluyendo unidades y, si corresponde, calcular la cantidad
    realmente preguntada.
- titulo: ¿La pregunta de un problema siempre corresponde exactamente al valor de la incógnita definida?
  enunciado: ¿La pregunta de un problema siempre corresponde exactamente al valor de la incógnita definida?
  respuesta: 'No'
  solucion_pasos:
  - Muchas veces se pregunta por una cantidad derivada de la incógnita, que debe calcularse a partir de su valor.
errores_frecuentes:
- Entregar el valor de $x$ como respuesta final sin verificar qué cantidad se preguntó realmente.
- Omitir las unidades de medida en la respuesta final.
- No calcular las cantidades derivadas necesarias para responder completamente la pregunta del problema.
- Confundir la solución matemática de la ecuación con la respuesta completa al problema original.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
