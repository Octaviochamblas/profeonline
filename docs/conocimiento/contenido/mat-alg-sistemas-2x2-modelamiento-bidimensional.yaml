semantic_id: 'MAT.ALG.SISTEMAS_2X2.MODELAMIENTO_BIDIMENSIONAL'
titulo: 'Modelamiento de Problemas 2x2'
objetivo: 'Plantear sistemas a partir de problemas con dos condiciones dadas.'
introduccion: |
  Cuando un problema te da dos piezas de información totalmente distintas, necesitas un sistema 2x2.
resumen: |
  Acabas de modelar el problema. Ahora aplicas reducción, sustitución o igualación.
explicacion: |
  Ejemplo clásico de la granja:
  'En una granja hay gallinas ($x$) y vacas ($y$). En total hay 30 cabezas y 100 patas.'
  Aquí tienes dos mundos (dos ecuaciones):
  - El mundo de las cabezas (cada animal tiene 1): $1x + 1y = 30$.
  - El mundo de las patas (gallinas tienen 2, vacas tienen 4): $2x + 4y = 100$.
procedimiento:
  - 'Paso 1: Define claramente qué representa ''x'' y qué representa ''y''.'
  - 'Paso 2: Lee la primera condición del problema y tradúcela a la Ecuación 1.'
  - 'Paso 3: Lee la segunda condición del problema (suele hablar de dinero, total de patas, edades) y tradúcela a la Ecuación 2.'
  - 'Paso 4: Asegúrate de que las unidades coincidan en cada ecuación.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
