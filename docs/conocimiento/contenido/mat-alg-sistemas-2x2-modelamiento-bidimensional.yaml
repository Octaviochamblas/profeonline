semantic_id: MAT.ALG.SISTEMAS_2X2.MODELAMIENTO_BIDIMENSIONAL
titulo: Modelamiento de Problemas 2x2
objetivo: Plantear sistemas a partir de problemas con dos condiciones dadas.
explicacion: |
  Cuando un problema te da dos piezas de información totalmente distintas, necesitas un sistema 2x2.

  Ejemplo clásico de la granja:
  'En una granja hay gallinas ($x$) y vacas ($y$). En total hay 30 cabezas y 100 patas.'
  Aquí tienes dos mundos (dos ecuaciones):
  - El mundo de las cabezas (cada animal tiene 1): $1x + 1y = 30$.
  - El mundo de las patas (gallinas tienen 2, vacas tienen 4): $2x + 4y = 100$.

  Acabas de modelar el problema. Ahora aplicas reducción, sustitución o igualación.
procedimiento: |
  1. Define claramente qué representa 'x' y qué representa 'y'.
  2. Lee la primera condición del problema y tradúcela a la Ecuación 1.
  3. Lee la segunda condición del problema (suele hablar de dinero, total de patas, edades) y tradúcela a la Ecuación 2.
  4. Asegúrate de que las unidades coincidan en cada ecuación.
