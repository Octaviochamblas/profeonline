semantic_id: MAT.NUM.PORCENTAJES.REPRESENTACION_FRACCIONARIA
objetivo: Transformar porcentajes en fracciones irreductibles y utilizarlas en cálculos.
introduccion: Trabajar el 75% de un número multiplicando por 0.75 es válido, pero
  ¿no es más rápido multiplicar por 3 y dividir por 4? Las fracciones irreductibles
  son los 'atajos ninja' de los porcentajes.
resumen: 'Cualquier porcentaje se puede simplificar como una fracción irreductible.
  Ejemplos clásicos: $50\% = 1/2$, $25\% = 1/4$, $20\% = 1/5$, $75\% = 3/4$.'
explicacion: 'Todo porcentaje es la fracción $x/100$. Muchas veces, esa fracción se
  puede simplificar dividiendo numerador y denominador por un factor común.


  Estas **fracciones irreductibles equivalentes** te permiten hacer cálculos mentalmente
  mucho más rápido que usando decimales.

  - $10\% = 10/100 = 1/10$ (dividir por 10)

  - $20\% = 20/100 = 1/5$ (dividir por 5)

  - $25\% = 25/100 = 1/4$ (dividir por 4)

  - $50\% = 50/100 = 1/2$ (la mitad)

  - $75\% = 75/100 = 3/4$ (tres cuartas partes)'
procedimiento:
- 'Paso 1: Escribe el porcentaje como fracción $x/100$.'
- 'Paso 2: Simplifica dividiendo por 2, 5 o múltiplos de 10 hasta que sea irreductible.'
- 'Paso 3: Utiliza esa fracción multiplicando por el numerador y dividiendo por el
  denominador.'
ejemplos:
- titulo: Uso de la fracción equivalente
  enunciado: Calcula el 25% de 800.
  solucion_pasos:
  - Sabemos que 25% es $1/4$.
  - Multiplicamos $800 \cdot (1/4)$.
  - 'Es lo mismo que dividir por 4: $800 / 4 = 200$.'
errores_frecuentes:
- Creer que $20\%$ es $1/20$ (es $1/5$, porque $100/20 = 5$).
- Creer que $10\%$ equivale a dividir por 100 (equivale a dividir por 10).
- Tratar de simplificar porcentajes como $17\%$ que son primos y no se pueden simplificar
  (queda $17/100$).
fuente: Currículum Nacional MINEDUC.
estado: publicado
