semantic_id: MAT.GEO.SIMETRIAS.EJES_FIGURAS
titulo: Identificación de ejes de simetría en figuras planas
objetivo: 'Identificar los ejes de simetría de una figura plana: las rectas que dividen a la figura en
  dos partes que son reflejo exacto una de la otra.'
introduccion: 'Un eje de simetría es como una línea de ''doblado perfecto'': si doblas la figura por esa
  línea, ambas mitades coinciden exactamente.'
resumen: Un eje de simetría de una figura plana es una recta tal que, al reflejar la figura respecto de
  ella, se obtiene exactamente la misma figura (la figura es su propia imagen).
explicacion: '![Identificación de ejes de simetría en figuras planas](/static/img/geometria/isometrias/simetria-ejes-figuras.svg)


  ### Definición formal


  Una recta $L$ es un eje de simetría de una figura $F$ si al aplicar la simetría axial respecto de $L$,
  la imagen de $F$ coincide exactamente con $F$ misma.


  ### Desarrollo didáctico


  En la figura, el triángulo isósceles tiene un eje de simetría vertical que pasa por el vértice superior
  y el punto medio de la base opuesta: al reflejar el triángulo respecto de esa recta, se obtiene el mismo
  triángulo.'
procedimiento:
- 'Paso 1: Observa la figura y busca una recta que pueda dividirla en dos mitades especulares.'
- 'Paso 2: Verifica que al reflejar la figura respecto de esa recta, se obtenga exactamente la misma figura.'
- 'Paso 3: Cuenta el número total de ejes de simetría que cumplen esta condición (algunas figuras tienen
  varios).'
ejemplos:
- titulo: Identificar el eje de simetría de un triángulo isósceles
  enunciado: Un triángulo isósceles tiene dos lados iguales.
  solucion_pasos:
  - Su eje de simetría es la recta que pasa por el vértice entre los lados iguales y el punto medio del
    lado opuesto (base).
- titulo: Contar los ejes de simetría de un cuadrado
  enunciado: Un cuadrado tiene 4 lados iguales y 4 ángulos rectos.
  solucion_pasos:
  - 'Tiene 4 ejes de simetría: las dos diagonales y las dos rectas que unen los puntos medios de lados
    opuestos.'
- titulo: ¿Un triángulo escaleno (sin lados iguales) tiene ejes de simetría?
  respuesta: 'No'
  solucion_pasos:
  - No, al no tener ningún par de lados iguales, no existe ninguna recta que lo divida en mitades especulares.
- titulo: ¿Puede una figura tener más de un eje de simetría?
  respuesta: Sí
  solucion_pasos:
  - Sí, muchas figuras regulares (como el cuadrado o el círculo) tienen múltiples ejes de simetría.
errores_frecuentes:
- Confundir cualquier línea trazada sobre la figura con un verdadero eje de simetría.
- Olvidar contar todos los ejes de simetría posibles en figuras con múltiples ejes (como polígonos regulares).
- Creer que toda figura plana tiene al menos un eje de simetría.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 127, Cid 78).'
estado: publicado
