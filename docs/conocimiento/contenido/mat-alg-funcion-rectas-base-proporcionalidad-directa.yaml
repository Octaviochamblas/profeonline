semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.PROPORCIONALIDAD_DIRECTA
titulo: Interpretación de la función lineal como proporcionalidad directa
objetivo: Interpretar la función lineal como un modelo de proporcionalidad directa entre dos magnitudes.
introduccion: 'Cuando el precio total de una compra depende solo de la cantidad de productos, a un mismo precio
  unitario, estás usando exactamente el modelo de una función lineal: la proporcionalidad directa.'
resumen: Dos magnitudes están en **proporcionalidad directa** cuando su razón (cociente) es constante; esta relación
  se modela exactamente mediante una función lineal $f(x) = mx$, donde $m$ es la constante de proporcionalidad.
explicacion: '### Definición formal


  Dos magnitudes $x$ e $y$ son directamente proporcionales si existe una constante $k \neq 0$ tal que $y = kx$
  para todo par de valores correspondientes; equivalentemente, el cociente $\frac{y}{x}$ es constante e igual
  a $k$ para todo $x \neq 0$.


  ### Desarrollo didáctico


  La proporcionalidad directa es la interpretación contextual de la función lineal: al duplicar $x$, $y$ también
  se duplica; al triplicar $x$, $y$ también se triplica.


  Si un kilogramo de manzanas cuesta \$1200, el costo total $C(n) = 1200n$ es directamente proporcional a la cantidad
  $n$ de kilogramos comprados: comprar el doble de kilos cuesta el doble.'
procedimiento:
- 'Paso 1: Verifica que la razón entre las dos magnitudes sea constante para todos los pares de datos.'
- 'Paso 2: Si es constante, identifica ese valor como la constante de proporcionalidad $k$.'
- 'Paso 3: Modela la relación mediante la función lineal $f(x) = kx$.'
ejemplos:
- titulo: Verificación de proporcionalidad directa
  enunciado: 'Una tabla muestra: 2 horas $\to$ 100 km; 4 horas $\to$ 200 km; 6 horas $\to$ 300 km. ¿Es proporcionalidad
    directa?'
  solucion_pasos:
  - Se calcula la razón en cada caso - $100/2=50$; $200/4=50$; $300/6=50$.
  - La razón es constante, así que es proporcionalidad directa con $k=50$.
- titulo: Modelamiento con constante de proporcionalidad
  enunciado: Si el costo de $n$ entradas al cine es directamente proporcional a $n$, y 3 entradas cuestan \$15.000,
    determina la fórmula.
  solucion_pasos:
  - 'Se calcula $k = 15000/3 = 5000$.'
  - '$C(n) = 5000n$.'
- titulo: ¿Toda función lineal representa una proporcionalidad directa?
  enunciado: ¿Toda función lineal representa una proporcionalidad directa?
  respuesta: Sí
  solucion_pasos:
  - Por definición, $f(x)=mx$ satisface $y/x=m$ constante, que es exactamente la condición de proporcionalidad
    directa.
- titulo: ¿Una función afín $f(x)=mx+n$ con $n\neq 0$ representa proporcionalidad directa?
  enunciado: ¿Una función afín $f(x)=mx+n$ con $n\neq 0$ representa proporcionalidad directa?
  respuesta: 'No'
  solucion_pasos:
  - La razón $y/x$ no es constante cuando hay un término independiente distinto de cero.
errores_frecuentes:
- Confundir proporcionalidad directa con cualquier relación creciente entre dos magnitudes.
- No verificar que la razón sea constante para TODOS los pares de datos, solo para algunos.
- Aplicar el modelo de proporcionalidad directa a relaciones que en realidad son afines (con intercepto distinto
  de cero).
- Calcular la constante de proporcionalidad usando solo un par de datos sin verificar consistencia con los demás.
