semantic_id: MAT.ALG.EXPRESIONES.IDENTIFICACION_POLINOMIO
objetivo: Identificar y clasificar expresiones algebraicas compuestas por más de un
  término (Polinomios), incluyendo binomios y trinomios.
introduccion: Cuando enganchas varios vagones formas un tren. En álgebra, la palabra
  'Poli' significa muchos. Si una expresión tiene sumas o restas intermedias, ya cruzaste
  la frontera del monomio y entraste a la ciudad de los Polinomios.
resumen: "Un **Polinomio** es una expresión algebraica que consta de **más de un término**.\
  \ \nExisten nombres especiales para los más pequeños:\n- **Binomio:** Polinomio\
  \ de exactamente dos términos (ej. $a + b$).\n- **Trinomio:** Polinomio de exactamente\
  \ tres términos (ej. $x^2 + 5x + 6$).\nSi tiene cuatro o más, se le llama simplemente\
  \ polinomio."
explicacion: 'Contar términos es el primer paso para dominar el álgebra operativa.

  - Expresión: $4a - 5b$. ¿Hay un signo en medio actuando de puente? Sí, el menos.
  Hay dos bloques. Es un **Binomio**.

  - Expresión: $x^2 - 3x + 2$. Hay dos puentes (- y +). Por ende hay tres bloques.
  Es un **Trinomio**.

  - Expresión: $m^3 + m^2 - m + 1$. Tres puentes, cuatro bloques. Le llamamos Polinomio
  (de 4 términos).


  *Nota vital:* Para contar limpiamente, asegúrate de que los términos no se puedan
  sumar entre ellos. Por ejemplo, $2x + 3x$ parece un binomio, pero como son peras
  con peras, en realidad es un monomio disfrazado ($5x$).'
procedimiento:
- 'Paso 1: Simplifica la expresión si es posible (junta términos semejantes).'
- 'Paso 2: Cuenta cuántos ''puentes'' libres de suma o resta (+, -) existen.'
- 'Paso 3: El número de bloques resultantes te da la clasificación: 2 (binomio), 3
  (trinomio), 4+ (polinomio genérico).'
ejemplos:
- titulo: Clasificando el tren
  enunciado: 'Clasifica la expresión: 5x^2 - 4y + z/2'
  solucion_pasos:
  - 'Separador 1: el menos antes del 4y.'
  - 'Separador 2: el más antes de z/2.'
  - 'Bloques totales: 3.'
  - 'Conclusión: Es un Trinomio (y por ende, también pertenece a la familia general
    de los polinomios).'
errores_frecuentes:
- Contar variables en vez de términos (ej. en $a+b+c$ hay tres términos, pero en $abc$
  hay un solo término con tres letras).
- Pensar que un binomio NO es un polinomio. 'Polinomio' es la familia de todo lo que
  tenga 2 o más. El binomio es solo un sub-tipo de polinomio.
fuente: Álgebra de Baldor.
estado: publicado
