semantic_id: MAT.ALG.FUNC_POTENCIA_MODELO.DECRECIMIENTO_INVERSO
titulo: Modelamiento de decrecimiento con exponente negativo
objetivo: Interpretar situaciones donde una magnitud decrece según un modelo de función potencia con exponente
  negativo.
introduccion: Muchos fenómenos físicos, como la intensidad de la luz o la fuerza gravitacional, disminuyen a
  medida que aumenta la distancia, siguiendo un modelo de exponente negativo.
resumen: Un **modelo de decrecimiento inverso** usa $y=a\cdot x^{-n}$ (con $n$ entero positivo) para describir
  cómo una magnitud disminuye a medida que aumenta la variable independiente.
explicacion: '### Definición formal


  En un modelo $y=a\cdot x^{-n}=a/x^n$ con $a>0$, $x>0$ y $n$ entero positivo, la magnitud $y$ disminuye a
  medida que $x$ aumenta, acercándose a $0$ sin llegar a alcanzarlo, típico de relaciones inversamente
  proporcionales.


  ### Desarrollo didáctico


  La intensidad luminosa a distancia $d$ de una fuente sigue $I(d)=k/d^2$: al duplicar la distancia, la
  intensidad se reduce a un cuarto de su valor original, ya que $I(2d)=k/(2d)^2=k/(4d^2)=I(d)/4$.'
procedimiento:
- 'Paso 1: Identifica el modelo $y=a\cdot x^{-n}$ que describe la situación.'
- 'Paso 2: Evalúa el modelo en los valores de $x$ requeridos por el problema.'
- 'Paso 3: Interpreta el resultado, prestando atención a que la magnitud disminuye al aumentar $x$.'
ejemplos:
- titulo: Interpretación de un modelo de intensidad
  enunciado: 'Si $I(d)=100/d^2$, ¿cuánto disminuye la intensidad al triplicar la distancia?'
  solucion_pasos:
  - 'Se compara $I(d)$ con $I(3d)=100/(3d)^2=100/(9d^2)=I(d)/9$.'
  - La intensidad se reduce a un noveno de su valor original.
- titulo: Cálculo directo en un modelo de decrecimiento inverso
  enunciado: 'Con $P(t)=50/t$, calcula la presión para $t=5$.'
  solucion_pasos:
  - Se evalúa $P(5)=50/5=10$.
  - La presión para $t=5$ es $10$.
- titulo: ¿Un modelo de decrecimiento inverso puede tomar el valor $0$?
  enunciado: ¿Puede un modelo $y=a\cdot x^{-n}$ (con $a\neq0$) llegar a valer exactamente $0$?
  respuesta: 'No'
  solucion_pasos:
  - El numerador de la fracción equivalente nunca es $0$, así que $y$ nunca alcanza exactamente ese valor.
- titulo: ¿Duplicar $x$ siempre reduce $y$ exactamente a la mitad en este tipo de modelo?
  enunciado: ¿Duplicar la variable independiente $x$ siempre reduce $y$ exactamente a la mitad en un modelo con
    $n>1$?
  respuesta: 'No'
  solucion_pasos:
  - El resultado se divide por $2^n$, no solo por $2$, cuando $n>1$.
errores_frecuentes:
- Confundir el decrecimiento inverso con un decrecimiento lineal.
- Suponer que la magnitud puede llegar a valer $0$ para algún valor finito de $x$.
- No verificar el dominio del modelo, que suele excluir $x=0$ por razones físicas y matemáticas.
- Aplicar el modelo fuera de su rango de validez física (valores negativos sin sentido en el contexto).
