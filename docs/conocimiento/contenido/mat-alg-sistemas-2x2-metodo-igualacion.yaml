semantic_id: MAT.ALG.SISTEMAS_2X2.METODO_IGUALACION
titulo: Método de Igualación
objetivo: Resolver un sistema despejando la misma variable en ambas ecuaciones.
explicacion: |
  El método de igualación se basa en la ley transitiva: Si A es igual a B, y C es igual a B, entonces A tiene que ser igual a C.

  Es muy mecánico: Tomas ambas ecuaciones y despejas la **misma** letra (por ejemplo, despejas la 'y' en ambas).
  Obtendrás dos identidades para la 'y':
  - $y = \text{Expresión 1}$
  - $y = \text{Expresión 2}$

  Como ambas valen 'y', las igualas entre sí: $\text{Expresión 1} = \text{Expresión 2}$.
  Ahora tienes una sola ecuación con pura 'x'. La resuelves y listo.
procedimiento: |
  1. Elige una incógnita y despéjala en la primera ecuación.
  2. Despeja la MISMA incógnita en la segunda ecuación.
  3. Iguala los dos resultados obtenidos (omitiendo la letra despejada).
  4. Resuelve la ecuación resultante para hallar la primera variable.
  5. Reemplaza el valor hallado en cualquiera de los dos despejes iniciales para obtener la segunda variable.
