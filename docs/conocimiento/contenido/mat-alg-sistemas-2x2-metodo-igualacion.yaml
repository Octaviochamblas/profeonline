semantic_id: 'MAT.ALG.SISTEMAS_2X2.METODO_IGUALACION'
titulo: 'Método de Igualación'
objetivo: 'Resolver un sistema despejando la misma variable en ambas ecuaciones.'
introduccion: |
  El método de igualación se basa en la ley transitiva: Si A es igual a B, y C es igual a B, entonces A tiene que ser igual a C.
resumen: |
  Como ambas valen 'y', las igualas entre sí: $\text{Expresión 1} = \text{Expresión 2}$.
  Ahora tienes una sola ecuación con pura 'x'. La resuelves y listo.
explicacion: |
  Es muy mecánico: Tomas ambas ecuaciones y despejas la **misma** letra (por ejemplo, despejas la 'y' en ambas).
  Obtendrás dos identidades para la 'y':
  - $y = \text{Expresión 1}$
  - $y = \text{Expresión 2}$
procedimiento:
  - 'Paso 1: Elige una incógnita y despéjala en la primera ecuación.'
  - 'Paso 2: Despeja la MISMA incógnita en la segunda ecuación.'
  - 'Paso 3: Iguala los dos resultados obtenidos (omitiendo la letra despejada).'
  - 'Paso 4: Resuelve la ecuación resultante para hallar la primera variable.'
  - 'Paso 5: Reemplaza el valor hallado en cualquiera de los dos despejes iniciales para obtener la segunda variable.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
