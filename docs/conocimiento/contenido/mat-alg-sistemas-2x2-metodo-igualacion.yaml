semantic_id: MAT.ALG.SISTEMAS_2X2.METODO_IGUALACION
titulo: Método de Igualación
objetivo: Resolver un sistema despejando la misma variable en ambas ecuaciones.
introduccion: 'Es muy mecánico: Tomas ambas ecuaciones y despejas la **misma** letra (por ejemplo, despejas la ''y''
  en ambas).'
resumen: 'El método de igualación se basa en la ley transitiva: Si A es igual a B, y C es igual a B, entonces A
  tiene que ser igual a C.'
explicacion: '### Definición formal


  El método de igualación se basa en la ley transitiva: Si A es igual a B, y C es igual a B, entonces A tiene que
  ser igual a C.


  ### Desarrollo didáctico


  Es muy mecánico: Tomas ambas ecuaciones y despejas la **misma** letra (por ejemplo, despejas la ''y'' en ambas).

  Obtendrás dos identidades para la ''y'':

  - $y = \text{Expresión 1}$

  - $y = \text{Expresión 2}$


  Como ambas valen ''y'', las igualas entre sí: $\text{Expresión 1} = \text{Expresión 2}$.

  Ahora tienes una sola ecuación con pura ''x''. La resuelves y listo.'
procedimiento:
- Elige una incógnita y despéjala en la primera ecuación.
- Despeja la MISMA incógnita en la segunda ecuación.
- Iguala los dos resultados obtenidos (omitiendo la letra despejada).
- Resuelve la ecuación resultante para hallar la primera variable.
- Reemplaza el valor hallado en cualquiera de los dos despejes iniciales para obtener la segunda variable.
ejemplos:
- titulo: $y = \text{Expresión 1}$ y $y = \text{Expresión 2}$
  enunciado: Determina qué debe hacerse en $y = \text{Expresión 1}$ y $y = \text{Expresión 2}$ y fundamenta cada
    transformación.
  solucion_pasos:
  - 'Es muy mecánico: Tomas ambas ecuaciones y despejas la **misma** letra (por ejemplo, despejas la ''y'' en ambas).

    Obtendrás dos identidades para la ''y'':

    - $y = \text{Expresión 1}$

    - $y = \text{Expresión 2}$'
  - Elige una incógnita y despéjala en la primera ecuación.
- titulo: $\text{Expresión 1} = \text{Expresión 2}$
  enunciado: Analiza el caso $\text{Expresión 1} = \text{Expresión 2}$ y explica cómo se aplica el criterio estudiado.
  solucion_pasos:
  - 'Como ambas valen ''y'', las igualas entre sí: $\text{Expresión 1} = \text{Expresión 2}$.

    Ahora tienes una sola ecuación con pura ''x''. La resuelves y listo.'
  - Despeja la MISMA incógnita en la segunda ecuación.
- titulo: 'Respecto de «Resolución mediante el método de igualación»: ¿Se ajusta a la definición esta a'
  enunciado: 'Respecto de «Resolución mediante el método de igualación»: ¿Se ajusta a la definición esta afirmación?
    «El método de igualación se basa en la ley transitiva: Si A es igual a B, y C es igual a B, entonces A tiene
    que ser igual a C»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El método de igualación se basa en la ley transitiva: Si A
    es igual a B, y C es igual a B, entonces A tiene que ser igual a C.'
- titulo: 'Respecto de «Resolución mediante el método de igualación»: ¿Es compatible con el procedimien'
  enunciado: 'Respecto de «Resolución mediante el método de igualación»: ¿Es compatible con el procedimiento esta
    afirmación? «Puede omitirse esta condición sin cambiar el resultado: «Elige una incógnita y despéjala en la
    primera ecuación»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El método de igualación se basa en la ley transitiva: Si A
    es igual a B, y C es igual a B, entonces A tiene que ser igual a C.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Elige una incógnita y despéjala en la primera ecuación».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Despeja la MISMA incógnita en la segunda ecuación».'
- 'La definición sigue cumpliéndose aunque no se considere que el método de igualación se basa en la ley transitiva:
  Si A es igual a B, y C es igual a B, entonces A tiene que ser igual a C.'
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Resuelve la ecuación resultante para
  hallar la primera variable».
- La comprobación del resultado vuelve innecesaria la condición «Reemplaza el valor hallado en cualquiera de los
  dos despejes iniciales para obtener la segunda variable».
