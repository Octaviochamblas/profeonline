semantic_id: MAT.EST.TABLAS_CONTINGENCIA.ESTRUCTURA_DOBLE
titulo: Organización de datos en tablas de doble entrada
objetivo: Organizar datos de un estudio o encuesta en una tabla de doble entrada, que cruza dos variables
  categóricas en filas y columnas.
introduccion: Cuando se quiere analizar la relación entre dos características de un grupo de personas
  u objetos (por ejemplo, sexo y preferencia), una tabla de doble entrada permite visualizar claramente
  cómo se distribuyen los datos.
resumen: Una tabla de doble entrada (o tabla de contingencia) organiza los datos de dos variables categóricas,
  con una variable en las filas y la otra en las columnas, mostrando en cada celda la cantidad de casos
  que cumplen ambas condiciones simultáneamente.
explicacion: '![Tabla de doble entrada](/static/img/probabilidad/tablas/tabla-estructura-doble.svg)


  ### Definición formal


  Una tabla de doble entrada tiene filas correspondientes a las categorías de una variable, columnas correspondientes
  a las categorías de otra variable, y en cada celda interior el número de casos que cumplen ambas categorías
  simultáneamente.


  ### Desarrollo didáctico


  En una encuesta sobre sexo y preferencia por cierto producto, las filas pueden ser ''Sí'' y ''No'' (preferencia),
  y las columnas ''Hombre'' y ''Mujer'' (sexo), con cada celda mostrando cuántas personas de cada combinación
  existen.'
procedimiento:
- 'Paso 1: Identifica las dos variables categóricas que se quieren cruzar.'
- 'Paso 2: Asigna una variable a las filas y otra a las columnas de la tabla.'
- 'Paso 3: Completa cada celda interior con el número de casos que cumplen ambas categorías correspondientes.'
ejemplos:
- titulo: Organizar datos de sexo y preferencia en una tabla
  enunciado: 18 hombres que dicen sí, 22 mujeres que dicen sí, 12 hombres que dicen no, 8 mujeres que
    dicen no.
  solucion_pasos:
  - Se organiza en una tabla 2x2 con filas 'Sí'/'No' y columnas 'Hombre'/'Mujer', colocando cada cantidad
    en su celda correspondiente.
- titulo: Organizar datos de curso y aprobación en una tabla
  enunciado: Estudiantes de 2 cursos, cada uno con estado aprobado/reprobado.
  solucion_pasos:
  - Se arma una tabla con filas 'Aprobado'/'Reprobado' y columnas 'Curso A'/'Curso B', completando cada
    celda con el conteo correspondiente.
- titulo: ¿Cada celda interior de la tabla representa la intersección de una fila y una columna?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición estructural de una tabla de doble entrada.
- titulo: ¿Una tabla de doble entrada puede tener más de dos categorías por variable?
  respuesta: Sí
  solucion_pasos:
  - Sí, no está limitada a tablas 2x2; puede tener tantas filas y columnas como categorías tenga cada
    variable.
errores_frecuentes:
- Confundir qué variable corresponde a las filas y cuál a las columnas.
- Colocar un dato en la celda incorrecta, sin cruzar correctamente ambas categorías.
- Olvidar completar alguna celda de la tabla, dejando datos sin organizar.
fuente: Elaboración propia.
estado: publicado
