semantic_id: MAT.NUM.POTENCIAS_CONCEPTO.SIGNO_BASE_NEGATIVA_EXPONENTE_IMPAR
titulo: Signo de potencia con base negativa y exponente impar
objetivo: Predecir el signo con base negativa y exponente impa.
introduccion: Con exponente impar, la multiplicación conserva un signo menos. La paridad permite saberlo
  incluso antes de calcular el valor absoluto.
resumen: Una base negativa elevada a exponente impar produce un resultado negativo. Después de formar
  pares positivos queda un factor negativo.
explicacion: 'Una base negativa elevada a exponente impar produce un resultado negativo.


  En el caso “\((-2)^5=-32\)” esta idea se hace visible: después de formar pares positivos queda un factor
  negativo'
procedimiento:
- 'Paso 1: Verifica que la base incluya el signo negativo.'
- 'Paso 2: Reconoce que el exponente impar deja un factor negativo sin pareja.'
- 'Paso 3: Calcula el valor absoluto y coloca signo negativo al resultado.'
ejemplos:
- titulo: Aplicación razonada — Signo de potencia con base negativa y exponente impar
  enunciado: \((-2)^5=-32\).
  solucion_pasos:
  - Verifica que la base incluya el signo negativo.
  - Reconoce que el exponente impar deja un factor negativo sin pareja.
  - Calcula el valor absoluto y coloca signo negativo al resultado.
- titulo: Revisión de una solución — Signo de potencia con base negativa y exponente impar
  enunciado: Una solución aplica “Reconoce que el exponente impar deja un factor negativo sin pareja.”,
    pero termina sin comprobar que después de formar pares positivos queda un factor negativo. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define signo de potencia con base negativa y exponente impar: una base
    negativa elevada a exponente impar produce un resultado negativo.'
  - Verifica que la base incluya el signo negativo.
  - 'Completa la revisión con este control: Calcula el valor absoluto y coloca signo negativo al resultado.'
- titulo: ¿Se cumple que después de formar pares positivos queda un factor negativo? — Signo de potencia
    con base negativa y exponente impar
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una base negativa elevada a exponente impar produce un
    resultado negativo.
  - El caso “\((-2)^5=-32\)” satisface esa condición.
  - Calcula el valor absoluto y coloca signo negativo al resultado.
- titulo: ¿Es válido omitir el paso “Verifica que la base incluya el signo negativo”? — Signo de potencia
    con base negativa y exponente impar
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de signo de potencia con base negativa y exponente
    impar.
  - 'Omitirlo puede volver inválida la acción siguiente: Reconoce que el exponente impar deja un factor
    negativo sin pareja.'
  - 'La solución debe terminar de este modo: Calcula el valor absoluto y coloca signo negativo al resultado.'
errores_frecuentes:
- 'Confundir signo de potencia con base negativa y exponente impar con otro concepto y omitir este inicio:
  Verifica que la base incluya el signo negativo.'
- Aplicar mecánicamente “Reconoce que el exponente impar deja un factor negativo sin pareja.” sin revisar
  las condiciones de la definición.
- Tomar “\((-2)^5=-32\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “después de formar pares positivos queda un factor
  negativo”.
- 'Terminar el desarrollo sin realizar este control: Calcula el valor absoluto y coloca signo negativo
  al resultado.'
