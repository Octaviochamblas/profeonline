semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.TANGENTE_COCIENTE
titulo: Expresión de la tangente como cociente entre seno y coseno
objetivo: Expresar la tangente de cualquier ángulo x como el cociente entre su seno y su coseno, extendiendo
  esta relación más allá de los ángulos agudos.
introduccion: Así como en el triángulo rectángulo la tangente es opuesto sobre adyacente, en la circunferencia
  unitaria esa misma relación se expresa como sinx sobre cosx, válida para cualquier ángulo donde cosx≠0.
resumen: Para cualquier ángulo $x$ con $\cos x\neq0$, se cumple la identidad $\tan x=\dfrac{\sin x}{\cos
  x}$.
explicacion: '![Tangente como cociente entre seno y coseno](/static/img/geometria/trigonometria/trigid-tangente-cociente.svg)


  ### Definición formal


  Si $P=(\cos x,\sin x)$ es un punto sobre la circunferencia unitaria, la tangente se define como $\tan
  x=\dfrac{\sin x}{\cos x}$, siempre que $\cos x\neq0$.


  ### Desarrollo didáctico


  Esta identidad permite calcular la tangente de cualquier ángulo (incluyendo los no agudos) a partir
  de su seno y coseno, sin necesidad de un triángulo rectángulo. Por ejemplo, si sin150°=0,5 y cos150°=-√3/2,
  entonces tan150°=0,5/(-√3/2)≈-0,577.'
procedimiento:
- 'Paso 1: Identifica los valores de senx y cosx para el ángulo dado (usando reducción al primer cuadrante
  si es necesario).'
- 'Paso 2: Divide senx entre cosx.'
- 'Paso 3: Verifica que el signo del resultado coincida con el signo de la tangente esperado según el
  cuadrante.'
ejemplos:
- titulo: Calcular tan(150°) usando seno y coseno
  enunciado: sin150°=0,5, cos150°=-√3/2≈-0,866.
  solucion_pasos:
  - tan150°=0,5/(-0,866)≈-0,577.
- titulo: Calcular tan(210°) usando seno y coseno
  enunciado: sin210°=-0,5, cos210°=-√3/2≈-0,866.
  solucion_pasos:
  - tan210°=(-0,5)/(-0,866)≈0,577.
- titulo: ¿Esta identidad requiere que cosx sea distinto de cero?
  respuesta: Sí
  solucion_pasos:
  - Sí, en los ángulos donde cosx=0 (90°, 270°), la tangente no está definida.
- titulo: ¿Se puede aplicar esta identidad a ángulos de cualquier cuadrante?
  respuesta: Sí
  solucion_pasos:
  - Sí, es válida en todos los cuadrantes donde el coseno no sea cero.
errores_frecuentes:
- Invertir el cociente, calculando cosx/sinx en vez de sinx/cosx.
- Olvidar que la tangente no está definida cuando cosx=0.
- Usar valores de seno y coseno de un cuadrante incorrecto al calcular la tangente.
fuente: 'Elaboración propia (referencia: Moraleja 178).'
estado: publicado
