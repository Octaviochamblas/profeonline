semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.RECTA_TANGENTE_CIRCUNFERENCIA
titulo: Identificación de recta tangente a una circunferencia
objetivo: Identificar que una recta es tangente a una circunferencia cuando la toca en exactamente un
  punto, condición que se cumple si la distancia del centro a la recta es igual al radio.
introduccion: 'La recta tangente representa el caso límite entre secante y exterior: toca la circunferencia
  en un único punto, sin cruzarla.'
resumen: 'Una recta es tangente a una circunferencia de centro $(h,k)$ y radio $r$ si la distancia entre
  el centro y la recta es exactamente igual a $r$: $d(\text{centro},\text{recta})=r$.'
explicacion: '![Recta tangente a una circunferencia](/static/img/geometria/analitica/posrc-recta-tangente-circunferencia.svg)


  ### Definición formal


  Una recta $Ax+By+C=0$ es tangente a una circunferencia de centro $(h,k)$ y radio $r$ si $\dfrac{|Ah+Bk+C|}{\sqrt{A^2+B^2}}=r$,
  tocándola en un único punto.


  ### Desarrollo didáctico


  Para la circunferencia $x^2+y^2=9$ (centro (0,0), radio 3) y la recta horizontal $y=3$: la distancia
  del centro a la recta es exactamente 3, igual al radio, por lo que la recta es tangente, tocando la
  circunferencia en el punto $(0,3)$.'
procedimiento:
- 'Paso 1: Calcula la distancia entre el centro de la circunferencia y la recta dada.'
- 'Paso 2: Compara esa distancia con el radio de la circunferencia.'
- 'Paso 3: Si la distancia es exactamente igual al radio, la recta es tangente (toca la circunferencia
  en un único punto).'
ejemplos:
- titulo: Verificar que y=3 es tangente a x²+y²=9
  enunciado: Centro (0,0), radio 3, recta y=3.
  solucion_pasos:
  - La distancia del centro a la recta es 3=r, por lo que la recta es tangente, tocando en (0,3).
- titulo: Verificar una recta tangente vertical
  enunciado: x²+y²=25, recta x=5.
  solucion_pasos:
  - La distancia del centro (0,0) a la recta x=5 es 5=r, por lo que la recta es tangente, tocando en (5,0).
- titulo: ¿Una recta tangente toca la circunferencia en un único punto?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la definición geométrica de tangencia.
- titulo: ¿La recta tangente es siempre perpendicular al radio en el punto de tangencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad geométrica fundamental de la tangencia.
errores_frecuentes:
- Confundir recta tangente con recta secante, sin verificar la igualdad exacta de distancias.
- Creer que la recta tangente corta la circunferencia en dos puntos muy cercanos entre sí, en vez de exactamente
  uno.
- Olvidar que la tangencia se cumple con una igualdad, no con una desigualdad.
fuente: 'Elaboración propia (referencia: mat-geo-circulo-recta-tangente para el caso geométrico básico).'
estado: publicado
