semantic_id: MAT.NUM.LOGARITMOS_PROPIEDADES.PRODUCTO
titulo: Logaritmo de un producto
objetivo: Expandir o condensar el logaritmo de un producto.
introduccion: Multiplicar potencias de la misma base suma exponentes; la propiedad del producto es esa
  misma idea expresada mediante logaritmos.
resumen: \(\log_b(xy)=\log_bx+\log_by\) para argumentos positivos. Un producto dentro del argumento se
  convierte en suma de logaritmos.
explicacion: '\(\log_b(xy)=\log_bx+\log_by\) para argumentos positivos.


  La situación “\(\log_2(8\cdot4)=\log_2 8+\log_2 4=5\)” permite comprobar, y no solo memorizar, que un
  producto dentro del argumento se convierte en suma de logaritmos'
procedimiento:
- 'Paso 1: Verifica que cada factor sea positivo.'
- 'Paso 2: Separa el producto en una suma de logaritmos con la misma base.'
- 'Paso 3: Evalúa o vuelve a condensar para comprobar la igualdad.'
ejemplos:
- titulo: Aplicación razonada — Logaritmo de un producto
  enunciado: \(\log_2(8\cdot4)=\log_2 8+\log_2 4=5\).
  solucion_pasos:
  - Verifica que cada factor sea positivo.
  - Separa el producto en una suma de logaritmos con la misma base.
  - Evalúa o vuelve a condensar para comprobar la igualdad.
- titulo: Revisión de una solución — Logaritmo de un producto
  enunciado: Una solución aplica “Separa el producto en una suma de logaritmos con la misma base.”, pero
    termina sin comprobar que un producto dentro del argumento se convierte en suma de logaritmos. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define logaritmo de un producto: \(\log_b(xy)=\log_bx+\log_by\) para argumentos
    positivos.'
  - Verifica que cada factor sea positivo.
  - 'Completa la revisión con este control: Evalúa o vuelve a condensar para comprobar la igualdad.'
- titulo: ¿Se cumple que un producto dentro del argumento se convierte en suma de logaritmos? — Logaritmo
    de un producto
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\log_b(xy)=\log_bx+\log_by\) para argumentos positivos.
  - El caso “\(\log_2(8\cdot4)=\log_2 8+\log_2 4=5\)” satisface esa condición.
  - Evalúa o vuelve a condensar para comprobar la igualdad.
- titulo: ¿Es válido omitir el paso “Verifica que cada factor sea positivo”? — Logaritmo de un producto
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de logaritmo de un producto.
  - 'Omitirlo puede volver inválida la acción siguiente: Separa el producto en una suma de logaritmos
    con la misma base.'
  - 'La solución debe terminar de este modo: Evalúa o vuelve a condensar para comprobar la igualdad.'
errores_frecuentes:
- 'Confundir logaritmo de un producto con otro concepto y omitir este inicio: Verifica que cada factor
  sea positivo.'
- Aplicar mecánicamente “Separa el producto en una suma de logaritmos con la misma base.” sin revisar
  las condiciones de la definición.
- Tomar “\(\log_2(8\cdot4)=\log_2 8+\log_2 4=5\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “un producto dentro del argumento se convierte en
  suma de logaritmos”.
- 'Terminar el desarrollo sin realizar este control: Evalúa o vuelve a condensar para comprobar la igualdad.'
