semantic_id: MAT.GEO.AREAS_TRIANGULOS.DEFINICION
titulo: Definición de área como medida de la superficie encerrada por una figura plana
objetivo: Comprender el área como la cantidad de superficie que ocupa una figura plana, distinta de su
  perímetro.
introduccion: 'Mientras el perímetro mide el contorno de una figura, el área mide una cosa completamente
  distinta: cuánta superficie plana queda encerrada dentro de ese contorno.'
resumen: El área es la medida de la superficie encerrada por una figura plana.
explicacion: '![Área como superficie encerrada](/static/img/geometria/areas-pitagoras/areas-triangulos-definicion.svg)


  ### Definición formal


  El área de una figura plana es la cantidad de unidades cuadradas necesarias para cubrir por completo
  la superficie que encierra su contorno.


  ### Desarrollo didáctico


  Un triángulo y un rectángulo pueden tener el mismo perímetro (misma longitud de contorno) pero áreas
  muy distintas (distinta cantidad de superficie interior); son dos magnitudes independientes.'
procedimiento:
- 'Paso 1: Identifica la figura plana cuya superficie quieres medir.'
- 'Paso 2: Reconoce que el área mide la superficie interior, no el contorno.'
- 'Paso 3: Aplica la fórmula correspondiente a esa figura para calcular su área.'
ejemplos:
- titulo: Distinguir área de perímetro
  enunciado: Un triángulo tiene perímetro 30 cm.
  solucion_pasos:
  - Ese dato no dice nada sobre su área; son magnitudes independientes.
- titulo: Reconocer una unidad de área
  enunciado: ¿Qué tipo de unidad se usa para medir área?
  solucion_pasos:
  - Una unidad cuadrada, como cm² o m².
- titulo: ¿El área mide el contorno de una figura?
  respuesta: 'No'
  solucion_pasos:
  - No, el área mide la superficie interior; el contorno lo mide el perímetro.
- titulo: ¿Dos triángulos con el mismo perímetro pueden tener áreas distintas?
  respuesta: Sí
  solucion_pasos:
  - Sí, el perímetro y el área son magnitudes independientes.
errores_frecuentes:
- Confundir el área con el perímetro.
- Usar unidades lineales (cm, m) en vez de unidades cuadradas (cm², m²) para el área.
- Creer que figuras con igual perímetro tienen necesariamente igual área.
fuente: Elaboración propia.
estado: publicado
