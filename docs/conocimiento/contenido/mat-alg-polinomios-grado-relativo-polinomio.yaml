semantic_id: MAT.ALG.POLINOMIOS.GRADO_RELATIVO_POLINOMIO
objetivo: Calcular el grado relativo de un polinomio respecto a una variable particular.
introduccion: Así como podíamos buscar a la letra ganadora dentro de un solo término, podemos buscar a la letra
  con mayor exponente a lo largo de toda una expresión completa.
resumen: El **Grado Relativo de un Polinomio respecto a una letra** es el **mayor exponente con el que aparece dicha
  letra** en todo el polinomio.
explicacion: "### Definición formal\n\nSe hace una búsqueda de la variable z y se selecciona su exponente máximo\
  \ encontrado en el polinomio.\n\n### Desarrollo didáctico\n\nEs un concurso por especialidad. \nDado el polinomio:\
  \ $x^6 - x^4y^2 + x^2y^5$\n\n- Grado relativo respecto a la $x$: Buscamos a todas las $x$ del tren. Encontramos\
  \ $x^6$, $x^4$ y $x^2$. La ganadora es la del 6. El grado relativo a $x$ es 6.\n- Grado relativo respecto a la\
  \ $y$: Buscamos a las $y$. Encontramos $y^2$ y $y^5$. La ganadora es la del 5. El grado relativo a $y$ es 5.\n\
  \nEs útil para escribir polinomios de forma ordenada (ej: ordenando descendentemente respecto a la letra x)."
procedimiento:
- 'Paso 1: Identifica respecto a qué letra te están preguntando.'
- 'Paso 2: Recorre todo el polinomio buscando esa letra en cada término.'
- 'Paso 3: Compara sus exponentes.'
- 'Paso 4: El exponente más alto que encuentres es el grado relativo de esa letra.'
ejemplos:
- titulo: Campeonato de exponentes
  enunciado: Determina el grado relativo de 'a' y de 'b' en el polinomio a^3 + a^2b^4 - ab^5.
  solucion_pasos:
  - 'Para ''a'': Los exponentes son 3, 2 y 1. El mayor es 3. Grado relativo a ''a'' = 3.'
  - 'Para ''b'': Los exponentes son 4 y 5 (en el primer término la ''b'' no está, es 0). El mayor es 5. Grado relativo
    a ''b'' = 5.'
- titulo: Un algoritmo de ordenamiento polinomial requiere que el usuario ingrese el grado relativo do
  enunciado: 'Un algoritmo de ordenamiento polinomial requiere que el usuario ingrese el grado relativo dominante
    de la variable base. Para el polinomio $-3a^5b^2 + 8a^2b^8 - a^7b$, si el algoritmo solicita el grado relativo
    respecto a ''$a$'', el usuario debe ingresar: (v1)


    Opciones: A) $7$, ya que es el mayor exponente que acompaña exclusivamente a la variable ''$a$''. · B) $14$,
    sumando todos los exponentes de ''$a$''. · C) $8$, porque es el mayor exponente presente en toda la expresión,
    aunque pertenezca a ''$b$''. · D) $5$, por ser el exponente de ''$a$'' en el primer término.'
  solucion_pasos:
  - Buscamos 'a'. Sus exponentes son 5, 2 y 7. El mayor es 7.
  - 'Respuesta: $7$, ya que es el mayor exponente que acompaña exclusivamente a la variable ''$a$''.'
- titulo: 'Respecto de «Cálculo del grado relativo de un polinomio»: ¿Es correcta esta caracterización?'
  enunciado: 'Respecto de «Cálculo del grado relativo de un polinomio»: ¿Es correcta esta caracterización? «El **Grado
    Relativo de un Polinomio respecto a una letra** es el **mayor exponente con el que aparece dicha letra** en
    todo el polinomio»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Grado Relativo de un Polinomio respecto a una letra**
    es el **mayor exponente con el que aparece dicha letra** en todo el polinomio.'
- titulo: 'Respecto de «Cálculo del grado relativo de un polinomio»: ¿Es válida esta afirmación? «Sumar'
  enunciado: 'Respecto de «Cálculo del grado relativo de un polinomio»: ¿Es válida esta afirmación? «Sumar todos
    los exponentes que tiene esa letra en el polinomio, en lugar de elegir el mayor»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Grado Relativo de un Polinomio respecto a una letra**
    es el **mayor exponente con el que aparece dicha letra** en todo el polinomio.'
errores_frecuentes:
- Sumar todos los exponentes que tiene esa letra en el polinomio, en lugar de elegir el mayor.
- Elegir la letra del término que tiene el mayor grado absoluto global, incluso si esa letra específica no tiene
  su exponente máximo allí.
- La suma total de todos los exponentes que posea la variable '$z$' a lo largo del polinomio.
- El número total de veces que la variable '$z$' aparece repetida en la expresión.
- El grado absoluto del término que contenga a la variable '$z$'.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Cálculo del grado relativo de un polinomio
