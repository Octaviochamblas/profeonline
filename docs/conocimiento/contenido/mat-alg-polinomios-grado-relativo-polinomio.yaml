semantic_id: MAT.ALG.POLINOMIOS.GRADO_RELATIVO_POLINOMIO
objetivo: Calcular el grado relativo de un polinomio respecto a una variable particular.
introduccion: Así como podíamos buscar a la letra ganadora dentro de un solo término,
  podemos buscar a la letra con mayor exponente a lo largo de toda una expresión completa.
resumen: El **Grado Relativo de un Polinomio respecto a una letra** es el **mayor
  exponente con el que aparece dicha letra** en todo el polinomio.
explicacion: "Es un concurso por especialidad. \nDado el polinomio: $x^6 - x^4y^2\
  \ + x^2y^5$\n\n- Grado relativo respecto a la $x$: Buscamos a todas las $x$ del\
  \ tren. Encontramos $x^6$, $x^4$ y $x^2$. La ganadora es la del 6. El grado relativo\
  \ a $x$ es 6.\n- Grado relativo respecto a la $y$: Buscamos a las $y$. Encontramos\
  \ $y^2$ y $y^5$. La ganadora es la del 5. El grado relativo a $y$ es 5.\n\nEs útil\
  \ para escribir polinomios de forma ordenada (ej: ordenando descendentemente respecto\
  \ a la letra x)."
procedimiento:
- 'Paso 1: Identifica respecto a qué letra te están preguntando.'
- 'Paso 2: Recorre todo el polinomio buscando esa letra en cada término.'
- 'Paso 3: Compara sus exponentes.'
- 'Paso 4: El exponente más alto que encuentres es el grado relativo de esa letra.'
ejemplos:
- titulo: Campeonato de exponentes
  enunciado: Determina el grado relativo de 'a' y de 'b' en el polinomio a^3 + a^2b^4
    - ab^5.
  solucion_pasos:
  - 'Para ''a'': Los exponentes son 3, 2 y 1. El mayor es 3. Grado relativo a ''a''
    = 3.'
  - 'Para ''b'': Los exponentes son 4 y 5 (en el primer término la ''b'' no está,
    es 0). El mayor es 5. Grado relativo a ''b'' = 5.'
errores_frecuentes:
- Sumar todos los exponentes que tiene esa letra en el polinomio, en lugar de elegir
  el mayor.
- Elegir la letra del término que tiene el mayor grado absoluto global, incluso si
  esa letra específica no tiene su exponente máximo allí.
fuente: Álgebra de Baldor.
estado: publicado
