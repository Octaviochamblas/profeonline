semantic_id: 'MAT.ALG.MODELAMIENTO_LINEAL.RESTRICCION_SIGNO'
titulo: 'Restricciones de Signo y Lógica Real'
objetivo: 'Evaluar si la solución matemática tiene sentido en el mundo físico.'
introduccion: |
  Las matemáticas son ciegas al mundo real. Si tú planteas una ecuación para averiguar cuántas personas asistieron a una fiesta y el álgebra te dice que $x = -4.5$, el álgebra no se equivocó, tú planteaste mal el problema (o el problema no tiene solución lógica).
resumen: |
  Si tu resultado viola las leyes de la física o del sentido común, debes descartarlo inmediatamente e indicar que el problema no tiene solución o revisar tu planteamiento inicial.
explicacion: |
  Existen restricciones del mundo físico:
  - El número de personas debe ser un número Natural (positivo y sin decimales).
  - Las edades deben ser positivas.
  - Las distancias deben ser positivas.
procedimiento:
  - 'Paso 1: Obtén el resultado matemático.'
  - 'Paso 2: Analiza qué entidad física representa (personas, tiempo, dinero, edad).'
  - 'Paso 3: Evalúa si el número (su signo y si es decimal) tiene sentido lógico.'
  - 'Paso 4: Si es absurdo, descarta la solución.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
