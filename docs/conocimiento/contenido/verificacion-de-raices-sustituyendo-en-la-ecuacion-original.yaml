semantic_id: MAT.ALG.EC_CUADR_RESOL_FACTOR.VERIFICACION_RAICES
titulo: Verificación de raíces sustituyendo en la ecuación original
objetivo: Verificar que las soluciones encontradas para una ecuación cuadrática sean correctas, sustituyéndolas
  en la ecuación original.
introduccion: Después de resolver una ecuación cuadrática, siempre es posible (y recomendable) comprobar
  que cada solución realmente funciona, sustituyéndola de vuelta en la ecuación de partida.
resumen: Verificar una raíz consiste en sustituir su valor en la ecuación original y comprobar que la
  igualdad se cumple, obteniendo cero (o el valor correspondiente) en ambos lados.
explicacion: '### Definición formal


  Una solución $x=r$ de la ecuación $ax^2+bx+c=0$ es válida si y solo si $ar^2+br+c=0$. La verificación
  consiste en sustituir $r$ en la expresión original y comprobar que el resultado sea efectivamente cero.


  ### Desarrollo didáctico


  Este paso final permite detectar errores de cálculo cometidos durante la resolución (de signo, de factorización,
  o de simplificación) antes de dar la respuesta por definitiva.


  Para verificar que $x=3$ es solución de $x^2-x-6=0$: se sustituye, $3^2-3-6=9-3-6=0$. Se cumple la igualdad,
  por lo que $x=3$ es efectivamente una solución.'
procedimiento:
- 'Paso 1: Toma la ecuación original antes de resolverla.'
- 'Paso 2: Sustituye el valor de la solución encontrada en cada aparición de la incógnita.'
- 'Paso 3: Calcula el resultado y verifica que sea igual a cero (o al valor correspondiente del otro lado
  de la igualdad).'
ejemplos:
- titulo: Verificación de una solución correcta
  enunciado: Verifica que $x=-2$ es solución de $x^2+5x+6=0$.
  solucion_pasos:
  - 'Sustituyendo: $(-2)^2+5(-2)+6=4-10+6=0$.'
  - Se cumple la igualdad, por lo que $x=-2$ es solución.
- titulo: Verificación que revela un error
  enunciado: Verifica si $x=1$ es solución de $x^2-3x+2=0$.
  solucion_pasos:
  - 'Sustituyendo: $1^2-3(1)+2=1-3+2=0$.'
  - Se cumple la igualdad, por lo que $x=1$ sí es solución.
- titulo: ¿Verificar una solución sustituyéndola es siempre posible, sin importar el método usado para
    resolverla?
  enunciado: ¿Verificar una solución sustituyéndola es siempre posible, sin importar el método usado para
    resolverla?
  respuesta: Sí
  solucion_pasos:
  - La verificación por sustitución es independiente del método usado (fórmula general, factorización,
    completar el cuadrado).
- titulo: ¿Si la sustitución no da cero, significa necesariamente que la ecuación original estaba mal
    planteada?
  enunciado: ¿Si la sustitución no da cero, significa necesariamente que la ecuación original estaba mal
    planteada?
  respuesta: 'No'
  solucion_pasos:
  - Generalmente indica un error en el proceso de resolución (cálculo o factorización), no en el planteamiento
    original de la ecuación.
errores_frecuentes:
- Sustituir la solución en una versión ya simplificada de la ecuación, en vez de en la ecuación original.
- Cometer errores de signo al sustituir un valor negativo en la expresión.
- Omitir el paso de verificación, dejando pasar errores de cálculo sin detectar.
- Verificar solo una de las dos soluciones, dejando la otra sin comprobar.
