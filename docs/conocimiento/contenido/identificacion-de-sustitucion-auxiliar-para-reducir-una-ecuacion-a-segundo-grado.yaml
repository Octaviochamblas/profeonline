semantic_id: MAT.ALG.EC_CUADR_METODOS.SUSTITUCION_AUXILIAR
titulo: Identificación de sustitución auxiliar para reducir una ecuación a segundo grado
objetivo: Identificar qué sustitución auxiliar permite transformar una ecuación de mayor grado en una
  ecuación de segundo grado.
introduccion: Algunas ecuaciones que parecen de grado 4 o superior en realidad esconden una estructura
  cuadrática, si se sabe reconocer qué expresión conviene "renombrar" con una nueva variable.
resumen: Una **sustitución auxiliar** consiste en renombrar una expresión repetida de la ecuación original
  (como $x^2$) con una nueva variable $u$, de modo que la ecuación resultante quede en la forma $au^2+bu+c=0$.
explicacion: '### Definición formal


  Dada una ecuación donde una expresión $g(x)$ aparece elevada al cuadrado y también a la primera potencia
  (por ejemplo, $a\,[g(x)]^2+b\,g(x)+c=0$), la sustitución auxiliar $u=g(x)$ transforma la ecuación en
  $au^2+bu+c=0$, una ecuación cuadrática estándar en la variable $u$.


  ### Desarrollo didáctico


  Para identificar la sustitución adecuada, se busca una expresión que aparezca "duplicada" en grado:
  si $x^4$ y $x^2$ están presentes, conviene sustituir $u=x^2$; si aparecen $(x+1)^2$ y $(x+1)$, conviene
  sustituir $u=x+1$.


  En $x^4-5x^2+4=0$, la expresión $x^2$ aparece elevada al cuadrado ($x^4=(x^2)^2$) y a la primera potencia,
  por lo que conviene sustituir $u=x^2$, obteniendo $u^2-5u+4=0$.'
procedimiento:
- 'Paso 1: Observa la ecuación buscando una expresión que aparezca elevada al cuadrado y a la primera
  potencia.'
- 'Paso 2: Define una nueva variable $u$ igual a esa expresión.'
- 'Paso 3: Reescribe la ecuación completa en términos de $u$, verificando que quede en la forma $au^2+bu+c=0$.'
ejemplos:
- titulo: Identificación de sustitución para ecuación bicuadrada
  enunciado: ¿Qué sustitución auxiliar conviene usar en $x^4-13x^2+36=0$?
  solucion_pasos:
  - $x^4=(x^2)^2$, y $x^2$ también aparece a la primera potencia.
  - La sustitución adecuada es $u=x^2$, dando $u^2-13u+36=0$.
- titulo: Identificación de sustitución con expresión compuesta
  enunciado: ¿Qué sustitución auxiliar conviene usar en $(x-2)^2-5(x-2)+6=0$?
  solucion_pasos:
  - La expresión $(x-2)$ aparece elevada al cuadrado y a la primera potencia.
  - La sustitución adecuada es $u=x-2$, dando $u^2-5u+6=0$.
- titulo: ¿La sustitución auxiliar cambia el conjunto solución de la ecuación original?
  enunciado: ¿La sustitución auxiliar cambia el conjunto solución de la ecuación original?
  respuesta: 'No'
  solucion_pasos:
  - Es solo un renombramiento temporal; al final se debe deshacer la sustitución para obtener las soluciones
    en términos de $x$.
- titulo: ¿Toda ecuación de grado 4 admite una sustitución auxiliar cuadrática?
  enunciado: ¿Toda ecuación de grado 4 admite una sustitución auxiliar cuadrática?
  respuesta: 'No'
  solucion_pasos:
  - Solo aquellas donde la variable aparece exclusivamente en potencias que sean múltiplos de una expresión
    común (como $x^4$ y $x^2$) admiten esta técnica.
errores_frecuentes:
- Elegir una sustitución que no simplifica realmente la ecuación a la forma $au^2+bu+c=0$.
- Olvidar deshacer la sustitución al final, entregando la solución en términos de $u$ en vez de $x$.
- Confundir el exponente correcto de la expresión sustituida, por ejemplo usar $u=x$ en vez de $u=x^2$.
- No verificar que la ecuación resultante en $u$ sea efectivamente cuadrática antes de continuar.
