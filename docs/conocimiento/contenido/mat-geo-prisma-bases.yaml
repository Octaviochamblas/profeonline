semantic_id: MAT.GEO.POLIEDROS_PRISMAS.PRISMA_BASES
titulo: Identificación de las bases de un prisma recto
objetivo: 'Identificar correctamente las bases de un prisma recto: las dos caras poligonales congruentes
  y paralelas entre las que se extiende el cuerpo.'
introduccion: 'Las bases de un prisma son como su ''tapa'' y su ''fondo'': dos caras idénticas y paralelas
  que definen la forma transversal del cuerpo.'
resumen: Las bases de un prisma recto son sus dos caras poligonales congruentes y paralelas, ubicadas
  en los extremos del cuerpo.
explicacion: '![Bases de un prisma recto](/static/img/geometria/espacio-cuerpos/prisma-bases.svg)


  ### Definición formal


  Las bases de un prisma son las dos caras poligonales congruentes (de igual forma y tamaño) y paralelas
  entre sí, ubicadas en los extremos opuestos del cuerpo. El resto de las caras (las laterales) conectan
  los lados correspondientes de ambas bases.


  ### Desarrollo didáctico


  En la figura, las caras superior e inferior del prisma (resaltadas) son sus bases: tienen exactamente
  la misma forma y tamaño, y son paralelas entre sí. El nombre del prisma (por ejemplo, ''prisma hexagonal'')
  se determina justamente por la forma de sus bases.'
procedimiento:
- 'Paso 1: Busca las dos caras del poliedro que sean congruentes entre sí (misma forma y tamaño).'
- 'Paso 2: Verifica que esas dos caras sean además paralelas entre sí.'
- 'Paso 3: Identifica esas dos caras como las bases del prisma; el resto son las caras laterales.'
ejemplos:
- titulo: Identificar las bases de un prisma hexagonal
  enunciado: Un prisma tiene dos caras hexagonales congruentes en sus extremos, paralelas entre sí.
  solucion_pasos:
  - Esas dos caras hexagonales son las bases del prisma; las 6 caras rectangulares restantes son las caras
    laterales.
- titulo: Determinar el nombre de un prisma según sus bases
  enunciado: Un prisma tiene bases triangulares.
  solucion_pasos:
  - Se llama 'prisma triangular', nombrado según la forma de sus bases.
- titulo: ¿Las dos bases de un prisma deben ser congruentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas bases deben tener exactamente la misma forma y tamaño.
- titulo: ¿Las bases de un prisma pueden ser caras laterales al mismo tiempo?
  respuesta: 'No'
  solucion_pasos:
  - No, las bases y las caras laterales son conjuntos distintos y complementarios de caras en un prisma.
errores_frecuentes:
- Confundir las bases con las caras laterales, especialmente cuando el prisma está 'acostado' visualmente.
- Olvidar verificar que las dos caras candidatas a base sean realmente congruentes entre sí.
- Nombrar incorrectamente el prisma sin identificar primero la forma real de sus bases.
fuente: 'Elaboración propia (referencias: Moraleja 96, Cid 181).'
estado: publicado
