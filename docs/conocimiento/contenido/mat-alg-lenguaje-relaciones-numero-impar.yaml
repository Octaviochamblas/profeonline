semantic_id: MAT.ALG.LENGUAJE_RELACIONES.NUMERO_IMPAR
objetivo: Garantizar algebraicamente que una expresión siempre resulte en un número
  impar.
introduccion: 'Ya sabemos cómo hacer que cualquier número sea par (multiplicando por
  2). ¿Y cómo lo hacemos impar? Fácil: rompiendo la paridad empujándolo un paso hacia
  adelante o hacia atrás.'
resumen: Un **Número Impar** se traduce algebraicamente como **$2n + 1$** (o $2n -
  1$), donde $n$ pertenece a los enteros.
explicacion: 'Dado que $2n$ asegura un número par, sumar 1 ($2n + 1$) o restar 1 ($2n
  - 1$) nos mueve exactamente al número consecutivo en la recta numérica. Y como sabemos,
  al lado de cualquier número par siempre habita un impar.

  - Si $n=4$, $2(4) + 1 = 9$ (impar).

  - Si $n=5$, $2(5) + 1 = 11$ (impar).


  En matemáticas formales, $2n+1$ es el estándar predilecto, aunque $2n-1$ es matemáticamente
  igual de válido.'
procedimiento:
- 'Paso 1: Construye el ''escudo par'' multiplicando una variable por 2 (2n).'
- 'Paso 2: Suma o resta 1 al bloque anterior.'
- 'Paso 3: Protege la expresión (2n+1) entre paréntesis si la vas a multiplicar o
  elevar a potencias.'
ejemplos:
- titulo: El impar al cuadrado
  enunciado: 'Traduce algebraicamente: ''El cuadrado de un número impar''.'
  solucion_pasos:
  - 'Construimos el número impar: (2n + 1).'
  - Elevamos todo el bloque al cuadrado.
  - 'Traducción final: (2n + 1)^2.'
errores_frecuentes:
- Usar simplemente $x$ o $y$ para denotar un impar. (La variable libre puede tomar
  cualquier valor).
- Usar $x+1$ para forzar un impar. (Si $x$ era 3, $x+1$ es 4, que es par. $x+1$ solo
  da el sucesor, no la imparidad absoluta).
fuente: Álgebra de Baldor.
estado: publicado
