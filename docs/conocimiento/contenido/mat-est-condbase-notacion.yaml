semantic_id: MAT.EST.PROBA_COND_BASE.NOTACION
titulo: Notación de probabilidad condicional P(A|B)
objetivo: Reconocer y usar correctamente la notación P(A|B) para representar la probabilidad condicional
  de un evento A dado un evento B.
introduccion: La probabilidad condicional tiene una notación matemática específica que distingue claramente
  cuál es el evento de interés y cuál es la condición conocida.
resumen: La notación $P(A|B)$ representa la probabilidad condicional del evento $A$, dado que el evento
  $B$ ya ocurrió.
explicacion: '![Notación de probabilidad condicional](/static/img/probabilidad/condbase/condbase-notacion.svg)


  ### Definición formal


  En $P(A|B)$, el símbolo "|" se lee como "dado que", separando el evento de interés (a la izquierda)
  del evento condicionante (a la derecha).


  ### Desarrollo didáctico


  $P(\text{par}|\text{mayor que 3})$ representa la probabilidad de obtener un número par, sabiendo que
  el resultado fue mayor que 3, y se calcula distinto de $P(\text{par})$ sin ninguna condición.'
procedimiento:
- 'Paso 1: Identifica el evento de interés (el que va a la izquierda de la barra vertical).'
- 'Paso 2: Identifica el evento condicionante (el que va a la derecha de la barra vertical, la condición
  ya conocida).'
- 'Paso 3: Escribe la notación completa como P(evento de interés | evento condicionante).'
ejemplos:
- titulo: Escribir la notación de 'par dado mayor que 3'
  enunciado: 'Evento de interés: par. Condición: mayor que 3.'
  solucion_pasos:
  - P(par|mayor que 3).
- titulo: Escribir la notación de 'as dado figura'
  enunciado: 'Evento de interés: as. Condición: figura.'
  solucion_pasos:
  - P(as|figura).
- titulo: ¿El evento a la derecha de la barra vertical es la condición ya conocida?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la interpretación estándar de esta notación.
- titulo: ¿P(A|B) es en general igual a P(B|A)?
  respuesta: 'No'
  solucion_pasos:
  - No, en general son valores distintos, ya que cada uno restringe el espacio muestral a un evento diferente.
errores_frecuentes:
- Invertir el orden de los eventos en la notación, confundiendo cuál es la condición.
- Confundir la barra vertical '|' con una división matemática.
- Creer que P(A|B) siempre es igual a P(B|A), cuando en general son valores distintos.
fuente: 'Elaboración propia (referencia: Moraleja 410).'
estado: publicado
