semantic_id: MAT.GEO.CIRCUNFERENCIA_ANALITICA.GENERAL_A_CANONICA
titulo: Transformación de la ecuación general a la forma canónica de la circunferencia
objetivo: Transformar la ecuación general de una circunferencia (x²+y²+Dx+Ey+F=0) a su forma canónica
  ((x-h)²+(y-k)²=r²), completando cuadrados en x e y.
introduccion: Al completar los cuadrados de ambas variables y reagrupar los términos, la ecuación general
  revela finalmente su centro y su radio de forma explícita.
resumen: Para transformar $x^2+y^2+Dx+Ey+F=0$ a forma canónica, se agrupan y completan los cuadrados en
  x e y, obteniendo $(x-h)^2+(y-k)^2=r^2$ con $h=-\dfrac{D}{2}$, $k=-\dfrac{E}{2}$, y $r^2=h^2+k^2-F$.
explicacion: '![Conversión: forma general a canónica](/static/img/geometria/analitica/circanal-general-a-canonica.svg)


  ### Definición formal


  Dada $x^2+y^2+Dx+Ey+F=0$, se agrupan: $(x^2+Dx)+(y^2+Ey)=-F$. Completando ambos cuadrados: $\left(x+\dfrac{D}{2}\right)^2+\left(y+\dfrac{E}{2}\right)^2=-F+\left(\dfrac{D}{2}\right)^2+\left(\dfrac{E}{2}\right)^2$.


  ### Desarrollo didáctico


  Para $x^2+y^2-4x+6y-3=0$: agrupando, $(x^2-4x)+(y^2+6y)=3$. Completando: $(x-2)^2-4+(y+3)^2-9=3$, es
  decir, $(x-2)^2+(y+3)^2=16$. El centro es $(2,-3)$ y el radio es $\sqrt{16}=4$.'
procedimiento:
- 'Paso 1: Agrupa los términos en x y los términos en y por separado, dejando la constante F al otro lado
  de la igualdad.'
- 'Paso 2: Completa el cuadrado en cada grupo, sumando la misma cantidad a ambos lados de la ecuación.'
- 'Paso 3: Escribe la ecuación resultante en forma canónica y verifica que el término derecho (r²) sea
  positivo.'
ejemplos:
- titulo: Convertir x²+y²-4x+6y-3=0 a forma canónica
  enunciado: x²+y²-4x+6y-3=0.
  solucion_pasos:
  - (x-2)²+(y+3)²=16, con centro (2,-3) y radio 4.
- titulo: Convertir x²+y²+2x-8y+1=0 a forma canónica
  enunciado: x²+y²+2x-8y+1=0.
  solucion_pasos:
  - 'Agrupando y completando: (x+1)²+(y-4)²=16, con centro (-1,4) y radio 4.'
- titulo: ¿Se debe completar el cuadrado en ambas variables para obtener la forma canónica?
  respuesta: Sí
  solucion_pasos:
  - Sí, tanto en x como en y, de forma independiente.
- titulo: ¿El signo del centro se determina después de completar los cuadrados?
  respuesta: Sí
  solucion_pasos:
  - Sí, aparece directamente en la expresión (x-h)² o (x+h)² resultante.
errores_frecuentes:
- Olvidar sumar la constante correcta a ambos lados de la ecuación al completar cada cuadrado.
- Cometer errores de signo al agrupar los términos antes de completar los cuadrados.
- No verificar al final que el término derecho de la ecuación (r²) sea efectivamente positivo.
fuente: Elaboración propia.
estado: publicado
