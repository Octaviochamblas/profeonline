semantic_id: MAT.ALG.LEYES_MULTIPLICACION.PROPIEDAD_DISTRIBUTIVA
titulo: Uso de la propiedad distributiva en multiplicación algebraica
objetivo: Aplicar la propiedad distributiva en multiplicación algebraica y justificar el procedimiento algebraico.
introduccion: Multiplicar un factor por una suma exige considerar todos los términos que están dentro del paréntesis.
  La propiedad distributiva formaliza esa relación y permite desarrollarla.
resumen: Cada uno de los $m$ términos se multiplica por cada uno de los $n$ términos, dando $m \times n$ productos.
explicacion: '### Definición formal


  Cada uno de los $m$ términos se multiplica por cada uno de los $n$ términos, dando $m \times n$ productos.


  ### Desarrollo didáctico


  En polinomios ordenados, los últimos términos suelen ser los independientes. Omitir su producto pierde esa constante
  pura.


  Polinomio de 3 por polinomio de 4. $3 \times 4 = 12$ términos resultantes.


  $x \cdot y = xy$, $x \cdot -2 = -2x$, $1 \cdot y = y$, $1 \cdot -2 = -2$.'
procedimiento:
- En polinomios ordenados, los últimos términos suelen ser los independientes. Omitir su producto pierde esa constante
  pura.
- Polinomio de 3 por polinomio de 4. $3 \times 4 = 12$ términos resultantes.
- $x \cdot y = xy$, $x \cdot -2 = -2x$, $1 \cdot y = y$, $1 \cdot -2 = -2$.
ejemplos:
- titulo: Si el polinomio $P(x) = (ax + b)(cx^2 + dx + e)$ tiene grado 3, y calculamos su expansión, e
  enunciado: 'Si el polinomio $P(x) = (ax + b)(cx^2 + dx + e)$ tiene grado 3, y calculamos su expansión, el coeficiente
    de $x^2$ corresponderá a la expresión:


    Opciones: A) $ad + bc$ · B) $ac + bd$ · C) $ae + bd$ · D) $bc + de$'
  solucion_pasos:
  - El término cuadrático se forma al multiplicar $(ax)(dx) = adx^2$ y $(b)(cx^2) = bcx^2$. Por tanto, el coeficiente
    es $ad + bc$.
- titulo: Se sabe que al multiplicar $(x^2 - ax + 2)(x - 3)$, el coeficiente de $x$ resulta ser $11$
  enunciado: 'Se sabe que al multiplicar $(x^2 - ax + 2)(x - 3)$, el coeficiente de $x$ resulta ser $11$. ¿Cuál
    es el valor de $a$?


    Opciones: A) $3$ · B) $-3$ · C) $1$ · D) $-1$'
  solucion_pasos:
  - 'Término en $x$: $(-ax)(-3) = 3ax$; $(2)(x) = 2x$. Suma: $3ax + 2x = (3a + 2)x$. Si $3a + 2 = 11 \Rightarrow
    3a = 9 \Rightarrow a = 3$.'
  - 'Respuesta: $3$'
- titulo: 'Respecto de «Uso de la propiedad distributiva en multiplicación algebraica»: ¿Se ajusta a la'
  enunciado: 'Respecto de «Uso de la propiedad distributiva en multiplicación algebraica»: ¿Se ajusta a la definición
    esta afirmación? «Cada uno de los $m$ términos se multiplica por cada uno de los $n$ términos, dando $m \times
    n$ productos»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Cada uno de los $m$ términos se multiplica por cada uno de
    los $n$ términos, dando $m \times n$ productos.'
- titulo: 'Respecto de «Uso de la propiedad distributiva en multiplicación algebraica»: ¿Es compatible'
  enunciado: 'Respecto de «Uso de la propiedad distributiva en multiplicación algebraica»: ¿Es compatible con el
    procedimiento esta afirmación? «$m + n$ términos»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Cada uno de los $m$ términos se multiplica por cada uno de
    los $n$ términos, dando $m \times n$ productos.'
errores_frecuentes:
- $m + n$ términos.
- Se pierde el término de mayor grado.
- Para «Si en la distributiva omites multiplicar el último término del primer polinomio por el último del segundo
  polinomio, ¿qué consecuencia geométrica o algebraica inmediata tiene», la respuesta correcta es El grado total
  del polinomio disminuye.
- Para «Si en la distributiva omites multiplicar el último término del primer polinomio por el último del segundo
  polinomio, ¿qué consecuencia geométrica o algebraica inmediata tiene», la respuesta correcta es Todos los signos
  cambian.
- Se puede sumar $(a+x)$, $(b+y)$, etc.
