semantic_id: MAT.GEO.CIRCULO_METRICA.LONGITUD_ARCO_GRADOS
titulo: Cálculo de longitud de arco mediante proporción respecto de 360°
objetivo: Calcular la longitud de un arco de circunferencia usando una proporción entre su ángulo central
  (en grados) y el giro completo de 360°.
introduccion: Un arco es solo una fracción de la circunferencia completa; esa fracción se puede determinar
  comparando su ángulo central con el giro completo de 360°.
resumen: La longitud de un arco con ángulo central $\theta$ (en grados) en una circunferencia de radio
  $r$ es $L=\frac{\theta}{360°}\times2\pi r$.
explicacion: '![Longitud de arco en grados](/static/img/geometria/circunferencia-circulo/circulo-longitud-arco-grados.svg)


  ### Definición formal


  La longitud de un arco es proporcional a su ángulo central: $L=\frac{\theta}{360°}\times2\pi r$, donde
  $\theta$ es la medida del ángulo central en grados y $2\pi r$ es la longitud de la circunferencia completa.


  ### Desarrollo didáctico


  Un arco de 90° en una circunferencia de radio 8 cm mide $L=\frac{90}{360}\times2\pi\times8=\frac{1}{4}\times16\pi=4\pi\approx12,57$
  cm, es decir, exactamente un cuarto de la circunferencia completa.'
procedimiento:
- 'Paso 1: Identifica el ángulo central θ del arco (en grados) y el radio r de la circunferencia.'
- 'Paso 2: Calcula la fracción θ/360° que representa el arco respecto al giro completo.'
- 'Paso 3: Multiplica esa fracción por la longitud total de la circunferencia (2πr).'
ejemplos:
- titulo: Calcular la longitud de un arco de 90°
  enunciado: Una circunferencia de radio 8 cm tiene un arco con ángulo central de 90°.
  solucion_pasos:
  - L=(90/360)×2π×8=(1/4)×16π=4π≈12,57 cm.
- titulo: Calcular el ángulo central a partir de la longitud del arco
  enunciado: Un arco de 6,28 cm (aproximado) está en una circunferencia de radio 12 cm.
  solucion_pasos:
  - 6,28=(θ/360)×2π×12 → θ=(6,28×360)/(2π×12)≈30°.
- titulo: ¿Un arco de 180° corresponde a media circunferencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, 180/360=1/2, exactamente la mitad de la circunferencia (una semicircunferencia).
- titulo: ¿La longitud del arco depende solo del ángulo, sin importar el radio?
  respuesta: 'No'
  solucion_pasos:
  - No, también depende del radio; a mayor radio, mayor longitud de arco para el mismo ángulo.
errores_frecuentes:
- Olvidar dividir el ángulo entre 360° antes de multiplicar por la longitud total.
- Confundir grados con radianes al aplicar la fórmula.
- Usar el diámetro en vez del radio sin ajustar la fórmula de la circunferencia completa.
fuente: Elaboración propia.
estado: publicado
