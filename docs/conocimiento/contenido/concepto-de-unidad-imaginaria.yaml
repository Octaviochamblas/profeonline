semantic_id: MAT.NUM.IMAGINARIOS.UNIDAD_IMAGINARIA
titulo: Concepto de unidad imaginaria
objetivo: Usar la unidad imaginaria para expresar raíces negativas.
introduccion: La ecuación \(x^2+1=0\) no tiene solución real, pero sí puede resolverse al ampliar el sistema
  numérico con una nueva unidad.
resumen: La unidad imaginaria \(i\) se define por la relación \(i^2=-1\). Introducir \(i\) permite extender
  los reales para representar raíces de números negativos.
explicacion: 'La unidad imaginaria \(i\) se define por la relación \(i^2=-1\).


  Al analizar “\(\sqrt{-9}=3i\)” conviene observar la conexión siguiente: introducir \(i\) permite extender
  los reales para representar raíces de números negativos'
procedimiento:
- 'Paso 1: Separa el signo negativo del valor absoluto bajo la raíz.'
- 'Paso 2: Sustituye \(\sqrt{-1}\) por \(i\).'
- 'Paso 3: Simplifica la raíz positiva restante y verifica usando \(i^2=-1\).'
ejemplos:
- titulo: Aplicación razonada — Concepto de unidad imaginaria
  enunciado: \(\sqrt{-9}=3i\).
  solucion_pasos:
  - Separa el signo negativo del valor absoluto bajo la raíz.
  - Sustituye \(\sqrt{-1}\) por \(i\).
  - Simplifica la raíz positiva restante y verifica usando \(i^2=-1\).
- titulo: Revisión de una solución — Concepto de unidad imaginaria
  enunciado: Una solución aplica “Sustituye \(\sqrt{-1}\) por \(i\).”, pero termina sin comprobar que
    introducir \(i\) permite extender los reales para representar raíces de números negativos. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define concepto de unidad imaginaria: la unidad imaginaria \(i\) se define
    por la relación \(i^2=-1\).'
  - Separa el signo negativo del valor absoluto bajo la raíz.
  - 'Completa la revisión con este control: Simplifica la raíz positiva restante y verifica usando \(i^2=-1\).'
- titulo: ¿Se cumple que introducir \(i\) permite extender los reales para representar raíces de números
    negativos? — Concepto de unidad imaginaria
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la unidad imaginaria \(i\) se define por la relación \(i^2=-1\).
  - El caso “\(\sqrt{-9}=3i\)” satisface esa condición.
  - Simplifica la raíz positiva restante y verifica usando \(i^2=-1\).
- titulo: ¿Es válido omitir el paso “Separa el signo negativo del valor absoluto bajo la raíz”? — Concepto
    de unidad imaginaria
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de concepto de unidad imaginaria.
  - 'Omitirlo puede volver inválida la acción siguiente: Sustituye \(\sqrt{-1}\) por \(i\).'
  - 'La solución debe terminar de este modo: Simplifica la raíz positiva restante y verifica usando \(i^2=-1\).'
errores_frecuentes:
- 'Confundir concepto de unidad imaginaria con otro concepto y omitir este inicio: Separa el signo negativo
  del valor absoluto bajo la raíz.'
- Aplicar mecánicamente “Sustituye \(\sqrt{-1}\) por \(i\).” sin revisar las condiciones de la definición.
- Tomar “\(\sqrt{-9}=3i\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “introducir \(i\) permite extender los reales para
  representar raíces de números negativos”.
- 'Terminar el desarrollo sin realizar este control: Simplifica la raíz positiva restante y verifica usando
  \(i^2=-1\).'
