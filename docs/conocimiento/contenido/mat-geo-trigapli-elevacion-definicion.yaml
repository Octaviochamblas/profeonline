semantic_id: MAT.GEO.TRIG_APLICACIONES.ELEVACION_DEFINICION
titulo: Concepto de ángulo de elevación medido hacia arriba desde la horizontal
objetivo: Definir el ángulo de elevación como el ángulo agudo medido desde la horizontal hacia arriba
  hasta la línea de mira que apunta a un objeto ubicado por encima del nivel del observador.
introduccion: 'Cuando alguien mira hacia un objeto que está más arriba que sus ojos (la cima de un edificio,
  un dron, la punta de un cerro), se forma un ángulo entre la horizontal y la línea de mira: ese es el
  ángulo de elevación.'
resumen: El ángulo de elevación es el ángulo agudo formado entre la horizontal, a la altura del observador,
  y la línea de mira dirigida hacia un objeto ubicado por encima de esa horizontal.
explicacion: '![Ángulo de elevación](/static/img/geometria/trigonometria/trigapli-elevacion-definicion.svg)


  ### Definición formal


  Sea un observador situado en un punto y un objeto ubicado por encima del nivel de sus ojos. El ángulo
  de elevación $\theta$ es el ángulo agudo entre la recta horizontal que pasa por el observador y la línea
  de mira (recta que une al observador con el objeto).


  ### Desarrollo didáctico


  En la figura, el observador está en el vértice inferior derecho, mirando hacia el objeto ubicado arriba.
  La horizontal es el segmento hacia la base del objeto, y la línea de mira es la hipotenusa. El ángulo
  $\theta$ entre ambas es el ángulo de elevación, y junto con la distancia horizontal $d$ permite calcular
  la altura $h$ mediante $\tan\theta=\dfrac{h}{d}$.'
procedimiento:
- 'Paso 1: Ubica al observador y traza la horizontal a la altura de sus ojos.'
- 'Paso 2: Traza la línea de mira desde el observador hasta el objeto (que está por encima de la horizontal).'
- 'Paso 3: El ángulo entre la horizontal y la línea de mira, medido hacia arriba, es el ángulo de elevación.'
ejemplos:
- titulo: Reconocer un ángulo de elevación en un contexto
  enunciado: Una persona observa la punta de un edificio desde el suelo, mirando hacia arriba respecto
    de la horizontal.
  solucion_pasos:
  - El ángulo formado entre la horizontal (a la altura de los ojos) y la línea de mira hacia la punta
    del edificio es un ángulo de elevación.
- titulo: Calcular la altura usando el ángulo de elevación
  enunciado: Desde 40 m de distancia horizontal, el ángulo de elevación a la cima de una torre es tal
    que tanθ=1,2.
  solucion_pasos:
  - h=d×tanθ=40×1,2=48 m.
- titulo: ¿El ángulo de elevación se mide siempre desde la horizontal?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición se mide desde la horizontal hacia arriba, nunca desde la vertical.
- titulo: ¿Se puede tener un ángulo de elevación si el objeto está al mismo nivel que el observador?
  respuesta: 'No'
  solucion_pasos:
  - No, si el objeto está al mismo nivel el ángulo de elevación es 0°; se necesita que el objeto esté
    por encima del observador.
errores_frecuentes:
- Medir el ángulo desde la vertical en vez de la horizontal.
- Confundir el ángulo de elevación con el de depresión cuando el objeto está por debajo del observador.
- Olvidar que el ángulo de elevación se mide siempre respecto a la altura de los ojos del observador,
  no respecto del suelo.
fuente: 'Elaboración propia (referencia: Moraleja 183).'
estado: publicado
