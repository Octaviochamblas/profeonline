semantic_id: MAT.GEO.CIRCULO_ELEMENTOS.SEMICIRCUNFERENCIA_DEFINICION
titulo: Definición de semicircunferencia como arco correspondiente a medio giro
objetivo: Reconocer la semicircunferencia como el caso particular de arco que corresponde exactamente
  a la mitad de la circunferencia completa.
introduccion: 'Entre todos los arcos posibles de una circunferencia, existe un caso especial de gran importancia:
  aquel determinado por los extremos de un diámetro.'
resumen: Una semicircunferencia es el arco correspondiente a medio giro completo (180°), determinado por
  los dos extremos de un diámetro.
explicacion: '![Semicircunferencia: arco de medio giro](/static/img/geometria/circunferencia-circulo/circulo-semicircunferencia.svg)


  ### Definición formal


  Si $A$ y $B$ son los extremos de un diámetro de una circunferencia, cada uno de los dos arcos que determinan
  (ambos iguales) es una semicircunferencia, correspondiente a un ángulo central de 180°.


  ### Desarrollo didáctico


  Un diámetro siempre divide a la circunferencia en dos semicircunferencias exactamente iguales; esta
  es la única forma en que dos arcos determinados por dos puntos resultan ser iguales entre sí.'
procedimiento:
- 'Paso 1: Identifica un diámetro de la circunferencia.'
- 'Paso 2: Observa los dos puntos extremos de ese diámetro.'
- 'Paso 3: Cada uno de los dos arcos que esos puntos determinan es una semicircunferencia.'
ejemplos:
- titulo: Identificar una semicircunferencia
  enunciado: Se traza un diámetro AB en una circunferencia.
  solucion_pasos:
  - Cada uno de los dos arcos determinados por A y B es una semicircunferencia.
- titulo: Calcular el ángulo central de una semicircunferencia
  enunciado: ¿Cuánto mide el ángulo central correspondiente a una semicircunferencia?
  solucion_pasos:
  - 180°, ya que corresponde a medio giro completo.
- titulo: ¿Las dos semicircunferencias de un mismo diámetro son iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, son exactamente iguales entre sí.
- titulo: ¿Cualquier par de puntos de una circunferencia determina dos semicircunferencias?
  respuesta: 'No'
  solucion_pasos:
  - No, solo ocurre cuando esos dos puntos son diametralmente opuestos (extremos de un diámetro).
errores_frecuentes:
- Creer que cualquier par de arcos iguales son semicircunferencias, sin verificar que provengan de un
  diámetro.
- Confundir la semicircunferencia (arco) con el semicírculo (región, la mitad del círculo).
- Olvidar que el ángulo central de una semicircunferencia es exactamente 180°.
fuente: Elaboración propia.
estado: publicado
