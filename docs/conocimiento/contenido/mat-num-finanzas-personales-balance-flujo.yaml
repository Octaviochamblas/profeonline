semantic_id: MAT.NUM.FINANZAS_PERSONALES.BALANCE_FLUJO
objetivo: Calcular el balance mensual restando los gastos totales a los ingresos totales.
introduccion: Llegó fin de mes. Sumamos todo lo que entró y restamos todo lo que salió.
  Si el número es verde, hiciste las cosas bien. Si el número es rojo, estás cavando
  un hoyo financiero.
resumen: Balance Financiero = Ingresos Totales - Gastos Totales. Un balance positivo
  indica superávit (capacidad de ahorro). Un balance negativo indica déficit (endeudamiento).
explicacion: 'El **Balance o Flujo de Caja Mensual** es la operación matemática que
  evalúa el resultado de tu mes.


  Fórmula:

  $$\text{Balance} = \sum \text{Ingresos} - \sum \text{Gastos}$$


  - **Superávit (Balance $> 0$):** Te sobró dinero. Tus ingresos fueron mayores que
  tus gastos. Este dinero debe ir a ahorro o inversión.

  - **Equilibrio (Balance $= 0$):** Gastaste exactamente todo lo que ganaste (vivir
  al día).

  - **Déficit (Balance $< 0$):** Gastaste más de lo que ganaste. Esto significa matemáticamente
  que usaste crédito (tarjeta, préstamo) o ahorros pasados para cubrir el mes. Estás
  aumentando tus deudas.'
procedimiento:
- 'Paso 1: Suma todos tus ingresos del periodo.'
- 'Paso 2: Suma todos tus gastos (fijos, variables, cuotas de créditos).'
- 'Paso 3: Resta $Ingresos - Gastos$ para obtener el Balance final.'
ejemplos:
- titulo: Cálculo de flujo
  enunciado: 'Ingreso: $500.000. Gastos Fijos: $300.000. Gastos Variables: $250.000.
    ¿Cuál es el balance?'
  solucion_pasos:
  - Total Gastos = $300.000 + 250.000 = 550.000$.
  - Balance = $500.000 - 550.000 = -50.000$.
  - Hay un déficit de $50.000. Esa persona se endeudó ese mes.
errores_frecuentes:
- Olvidar sumar los 'pagos con tarjeta de crédito' como un gasto en el mes que se
  pagan.
- Creer que pedir un préstamo suma como 'Ingreso' (el préstamo te da efectivo hoy,
  pero aumenta tus gastos futuros, no es un ingreso real tuyo).
fuente: Currículum Nacional MINEDUC.
estado: publicado
