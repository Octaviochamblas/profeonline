semantic_id: MAT.ALG.FUNC_CUADR_FORMAS.FORMA_CANONICA
titulo: Reconocimiento de la forma canónica f(x) = a(x - h)² + k
objetivo: Reconocer la forma canónica de una función cuadrática y su utilidad para identificar el vértice directamente.
introduccion: Existe una manera de escribir una función cuadrática donde el vértice de su parábola queda "a la
  vista", sin necesidad de calcularlo con fórmulas adicionales.
resumen: La **forma canónica** de una función cuadrática es $f(x)=a(x-h)^2+k$, donde $(h,k)$ son directamente
  las coordenadas del vértice de la parábola.
explicacion: '### Definición formal


  La forma canónica de una función cuadrática es $f(x)=a(x-h)^2+k$, con $a \neq 0$ y $h,k \in \mathbb{R}$. Esta
  forma es algebraicamente equivalente a la forma general $ax^2+bx+c$, pero expone directamente las coordenadas
  del vértice como el par $(h,k)$.


  ### Desarrollo didáctico


  Al observar una función en forma canónica, basta con identificar los valores de $h$ y $k$ (prestando atención
  al signo de $h$, ya que aparece restado dentro del paréntesis) para conocer inmediatamente el vértice.


  En $f(x)=2(x-3)^2+5$: el vértice es $(3,5)$, leído directamente de los valores $h=3$ y $k=5$.'
procedimiento:
- 'Paso 1: Verifica que la función esté expresada como $a(x-h)^2+k$.'
- 'Paso 2: Identifica el valor de $h$, recordando que en la forma canónica aparece con signo restado.'
- 'Paso 3: Identifica el valor de $k$, que aparece sumado fuera del paréntesis.'
ejemplos:
- titulo: Reconocimiento de una función en forma canónica
  enunciado: '¿Está $f(x)=-3(x+2)^2-1$ en forma canónica?'
  solucion_pasos:
  - Tiene la estructura $a(x-h)^2+k$, con $a=-3$.
  - Sí, está en forma canónica.
- titulo: Reconocimiento de una función que no está en forma canónica
  enunciado: '¿Está $f(x)=x^2+4x+3$ en forma canónica?'
  solucion_pasos:
  - No tiene la estructura de un binomio al cuadrado más una constante.
  - No, está en forma general.
- titulo: ¿La forma canónica y la forma general representan siempre la misma función?
  enunciado: ¿La forma canónica y la forma general representan siempre la misma función?
  respuesta: Sí
  solucion_pasos:
  - Ambas formas son algebraicamente equivalentes; solo difieren en cómo se presenta la misma regla.
- titulo: ¿El valor de $h$ en la forma canónica aparece con el mismo signo dentro del paréntesis?
  enunciado: ¿El valor de $h$ en la forma canónica aparece con el mismo signo dentro del paréntesis?
  respuesta: 'No'
  solucion_pasos:
  - '$h$ aparece restado en $(x-h)$; si la función tiene $(x+2)$, entonces $h=-2$, no $2$.'
errores_frecuentes:
- Confundir el signo de $h$ al leerlo directamente de $(x+2)^2$ en vez de reescribirlo como $(x-(-2))^2$.
- Confundir la forma canónica con la forma factorizada de la función.
- Olvidar el coeficiente $a$ al identificar la forma canónica, asumiendo siempre $a=1$.
- No reconocer una función en forma canónica cuando $k=0$ y el término no aparece explícitamente.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
