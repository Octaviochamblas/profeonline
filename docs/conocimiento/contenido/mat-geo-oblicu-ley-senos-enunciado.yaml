semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.LEY_SENOS_ENUNCIADO
titulo: Enunciado de la ley de senos para triángulos oblicuángulos
objetivo: Enunciar la ley de senos, que relaciona los lados de un triángulo cualquiera con los senos de
  sus ángulos opuestos.
introduccion: En triángulos que no son rectángulos, no se pueden usar directamente las razones trigonométricas
  del triángulo rectángulo, por lo que se necesitan herramientas específicas como la ley de senos.
resumen: La ley de senos establece que, en cualquier triángulo, la razón entre un lado y el seno de su
  ángulo opuesto es constante para los tres lados del triángulo.
explicacion: '![Ley de senos](/static/img/geometria/trigonometria/oblicu-ley-senos-enunciado.svg)


  ### Definición formal


  En un triángulo de lados $a$, $b$, $c$ opuestos a los ángulos $A$, $B$, $C$ respectivamente, se cumple
  $\dfrac{a}{\sin A}=\dfrac{b}{\sin B}=\dfrac{c}{\sin C}$.


  ### Desarrollo didáctico


  En la figura, el lado $a$ (BC) es opuesto al ángulo $A$, el lado $b$ (CA) es opuesto al ángulo $B$,
  y el lado $c$ (AB) es opuesto al ángulo $C$. La ley de senos permite relacionar cualquier par de estos
  lados con los senos de sus respectivos ángulos opuestos, sin necesidad de que el triángulo sea rectángulo.'
procedimiento:
- 'Paso 1: Identifica los lados del triángulo y sus ángulos opuestos respectivos.'
- 'Paso 2: Escribe la proporción a/sinA=b/sinB=c/sinC.'
- 'Paso 3: Usa dos de las tres razones (las que involucren los datos conocidos) para plantear una ecuación.'
ejemplos:
- titulo: Reconocer los lados y ángulos opuestos en un triángulo
  enunciado: En un triángulo ABC, el lado a es opuesto al ángulo A.
  solucion_pasos:
  - El lado a es BC (el lado que no toca el vértice A), y es opuesto al ángulo A, ubicado en ese vértice.
- titulo: Plantear la proporción de la ley de senos
  enunciado: Un triángulo tiene a=8, A=40°, y B=60°.
  solucion_pasos:
  - Se plantea 8/sin40°=b/sin60°, para luego despejar b.
- titulo: ¿La ley de senos aplica a cualquier triángulo, no solo a los rectángulos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una herramienta general válida para cualquier tipo de triángulo.
- titulo: ¿Las tres razones a/sinA, b/sinB y c/sinC son siempre iguales entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa igualdad constante es exactamente lo que establece la ley de senos.
errores_frecuentes:
- Emparejar un lado con el seno de un ángulo que no es su opuesto.
- Aplicar la ley de senos únicamente a triángulos rectángulos, olvidando que es válida para cualquier
  triángulo.
- Confundir la ley de senos con la ley de cosenos al momento de elegir cuál usar.
fuente: 'Elaboración propia (referencia: Moraleja 195).'
estado: publicado
