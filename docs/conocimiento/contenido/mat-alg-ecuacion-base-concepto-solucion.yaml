semantic_id: MAT.ALG.ECUACION_BASE.CONCEPTO_SOLUCION
titulo: Concepto de Solución de una Ecuación
objetivo: Entender qué significa que un número sea la solución de una ecuación.
introduccion: El objetivo final de cualquier ecuación es 'resolverla'. Pero ¿qué es exactamente lo que estamos buscando?
  Buscamos el valor desconocido que equilibra la balanza.
resumen: La solución (o raíz) de una ecuación es el valor específico que, al sustituirse en lugar de la incógnita,
  hace que la igualdad sea numéricamente verdadera.
explicacion: '### Definición formal


  La verificación empírica sustituyendo el valor es infalible y te asegura el puntaje.


  ### Desarrollo didáctico


  Resolver una ecuación es un proceso de análisis.

  Si te dan la ecuación $2x - 1 = 7$, te están diciendo: ''El doble de un número secreto, menos uno, es igual a
  siete. ¿Quién es el número?''.


  Si alguien te dice ''Creo que la solución es 5.'' ¿Cómo lo compruebas?

  Reemplazas la ''x'' por el 5:

  Lado izquierdo: $2(5) - 1 = 10 - 1 = 9$.

  Lado derecho: $7$.

  ¿Es $9 = 7$? No. Entonces 5 **no es la solución**.


  Si alguien te dice ''Es 4.'':

  Reemplazas: $2(4) - 1 = 8 - 1 = 7$.

  Lado derecho: $7$.

  ¿Es $7 = 7$? Sí. Perfecto equilibrio.

  Entonces decimos que **$x = 4$ es la solución**.'
procedimiento:
- 'Paso 1: Toma el valor candidato que crees que es la solución.'
- 'Paso 2: Sustituye todas las apariciones de la incógnita en la ecuación por ese número (usa paréntesis).'
- 'Paso 3: Calcula el valor numérico del Primer Miembro.'
- 'Paso 4: Calcula el valor numérico del Segundo Miembro.'
- 'Paso 5: Si ambos valores son idénticos, es la solución.'
- La verificación empírica sustituyendo el valor es infalible y te asegura el puntaje.
ejemplos:
- titulo: Comprueba si $x = 3$ es solución de $x^2 - 2 = 7$
  enunciado: Comprueba si $x = 3$ es solución de $x^2 - 2 = 7$.
  solucion_pasos:
  - 'Reemplazamos $x$ por 3: $(3)^2 - 2 = 7$.'
  - 'Calculamos: $9 - 2 = 7$.'
  - $7 = 7$.
  - Sí, es solución verdadera.
- titulo: Si al reemplazar un valor candidato en la ecuación obtengo $0 = 0$, significa que el valor e
  enunciado: Si al reemplazar un valor candidato en la ecuación obtengo $0 = 0$, significa que el valor está equivocado.
  solucion_pasos:
  - El 0 es un número. Si llegas a 0=0, la balanza está equilibrada, y el valor que reemplazaste SÍ es la solución
    correcta.
  - 'Respuesta: Falso'
- titulo: 'Respecto de «Concepto de solución de una ecuación»: ¿Se ajusta a la definición esta afirmaci'
  enunciado: 'Respecto de «Concepto de solución de una ecuación»: ¿Se ajusta a la definición esta afirmación? «La
    solución (o raíz) de una ecuación es el valor específico que, al sustituirse en lugar de la incógnita, hace
    que la igualdad sea numéricamente verdadera»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La solución (o raíz) de una ecuación es el valor específico
