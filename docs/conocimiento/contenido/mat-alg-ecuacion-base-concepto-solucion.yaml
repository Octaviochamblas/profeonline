- titulo: 'Respecto de «Concepto de solución de una ecuación»: ¿Es compatible con el procedimiento esta'
  enunciado: 'Respecto de «Concepto de solución de una ecuación»: ¿Es compatible con el procedimiento esta afirmación?
    «Creer que la ''solución'' son los pasos intermedios»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La solución (o raíz) de una ecuación es el valor específico
    que, al sustituirse en lugar de la incógnita, hace que la igualdad sea numéricamente verdadera.'
errores_frecuentes:
- Creer que la 'solución' son los pasos intermedios.
- Equivocarse en los signos al verificar la solución (ej. al reemplazar un número negativo).
- Para «La forma definitiva y más confiable de saber si has encontrado la solución correcta de una ecuación es:»,
  la respuesta correcta es Preguntarle al profesor.
- Repasar los pasos de álgebra para ver si no hay errores.
- Para «La forma definitiva y más confiable de saber si has encontrado la solución correcta de una ecuación es:»,
  la respuesta correcta es Usar otra letra diferente.
