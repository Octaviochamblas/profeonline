semantic_id: MAT.EST.PERMUTACIONES_VARIACIONES.FACTORIAL_SIMPLIFICACION
titulo: Simplificación de cocientes con factoriales
objetivo: Simplificar cocientes de factoriales cancelando los términos comunes, sin necesidad de calcular
  ambos factoriales completos.
introduccion: En fórmulas de conteo, es habitual encontrar cocientes de factoriales; calcularlos por simplificación
  directa es mucho más eficiente que calcular ambos valores completos y luego dividir.
resumen: Un cociente de factoriales como $\dfrac{n!}{m!}$ (con $n>m$) se simplifica escribiendo solo los
  factores de $n!$ que no aparecen en $m!$, es decir, $n\times(n-1)\times\cdots\times(m+1)$.
explicacion: '![Simplificación de cocientes con factoriales](/static/img/probabilidad/permvar/permvar-factorial-simplificacion.svg)


  ### Definición formal


  $\dfrac{n!}{m!}=n\times(n-1)\times\cdots\times(m+1)$, cancelando los factores comunes desde $m$ hasta
  1.


  ### Desarrollo didáctico


  $\dfrac{8!}{5!}=\dfrac{8\times7\times6\times5\times4\times3\times2\times1}{5\times4\times3\times2\times1}=8\times7\times6=336$,
  ya que los factores del 5 hacia abajo se cancelan.'
procedimiento:
- 'Paso 1: Identifica el factorial mayor (numerador) y el menor (denominador).'
- 'Paso 2: Reescribe el numerador como el producto de los factores desde n hasta (m+1), multiplicado por
  m!.'
- 'Paso 3: Cancela el m! común entre numerador y denominador, dejando solo el producto de los factores
  restantes.'
ejemplos:
- titulo: Simplificar 8!/5!
  enunciado: 8!/5!.
  solucion_pasos:
  - 8!/5!=8×7×6=336, cancelando 5! del numerador y denominador.
- titulo: Simplificar 10!/8!
  enunciado: 10!/8!.
  solucion_pasos:
  - 10!/8!=10×9=90.
- titulo: ¿Es más eficiente simplificar que calcular ambos factoriales completos?
  respuesta: Sí
  solucion_pasos:
  - Sí, especialmente cuando los números son grandes, evita cálculos innecesarios.
- titulo: ¿Se cancelan siempre los factores desde el denominador hacia abajo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la técnica estándar de simplificación de este tipo de cociente.
errores_frecuentes:
- Calcular ambos factoriales completos y luego dividir, en vez de simplificar directamente.
- Cancelar incorrectamente los factores, dejando algunos de más o de menos en el resultado.
- Confundir el orden del cociente, calculando m!/n! en vez de n!/m!.
fuente: 'Elaboración propia (referencia: Baldor 373, Moraleja 299).'
estado: publicado
