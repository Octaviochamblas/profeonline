semantic_id: MAT.ALG.INTERVALOS.SEMIABIERTO_IZQUIERDA
titulo: Notación de intervalo semiabierto por la izquierda
objetivo: Comprender la notación de intervalos que excluyen el límite inferior y contienen el límite superior.
introduccion: Un intervalo semiabierto incluye uno de sus extremos y excluye el otro. Cuando es abierto
  por la izquierda, excluye el valor inicial.
resumen: El intervalo denotado como $(a, b]$ excluye $a$ y contiene $b$.
explicacion: '### Definición formal

  Un intervalo semiabierto por la izquierda se define como $(a, b] = \{ x \in \mathbb{R} \mid a < x \le
  b \}$.


  ### Desarrollo didáctico

  Al graficarlo, dibujamos un círculo hueco en el límite inferior y un círculo relleno en el límite superior.'
procedimiento:
- Identificar el límite no incluido ($a$) y el límite incluido ($b$).
- 'Escribir el intervalo con paréntesis en $a$ y corchete en $b$: $(a, b]$.'
- Dibujar la recta con un círculo vacío en $a$ y uno lleno en $b$.
ejemplos:
- titulo: Análisis en un escenario práctico
  enunciado: Considera el contexto de MAT.ALG.INTERVALOS.SEMIABIERTO_IZQUIERDA. Determina las implicancias.
  solucion_pasos:
  - Establecer los límites.
  - Analizar el tipo de extremo.
  - Concluir.
- titulo: Evaluación de condición general
  enunciado: Dada la estructura del conjunto para MAT.ALG.INTERVALOS.SEMIABIERTO_IZQUIERDA, plantea la
    desigualdad.
  solucion_pasos:
  - Identificar la variable.
  - Aplicar la definición.
  - Escribir el intervalo.
- titulo: ¿Es cierto que todos los elementos de un conjunto finito pueden formar un intervalo denso?
  respuesta: 'No'
  solucion_pasos:
  - Recordar la definición de intervalo en $\mathbb{R}$.
  - Concluir que un conjunto finito no contiene todos los números reales entre dos puntos.
- titulo: ¿El uso de MAT.ALG.INTERVALOS.SEMIABIERTO_IZQUIERDA es adecuado para expresar desigualdades
    lineales simples?
  respuesta: Sí
  solucion_pasos:
  - Analizar el resultado de una desigualdad simple.
  - Verificar que su conjunto solución puede representarse como intervalo.
errores_frecuentes:
- El intervalo $(a, b]$ incluye al número $a$.
- Si $a=1$ y $b=5$, el intervalo semiabierto por izquierda es $[1, 5)$.
- Este intervalo incluye exactamente la mitad de los números entre $a$ y $b$.
- La longitud del intervalo semiabierto es distinta a la del cerrado.
- Se representa gráficamente con dos círculos vacíos.
