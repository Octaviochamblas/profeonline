semantic_id: MAT.NUM.PROP_DIRECTA.CONCEPTO_VARIABLES
objetivo: Comprender el concepto de variables directamente proporcionales.
introduccion: ¿Has notado que si compras el doble de pan, pagas exactamente el doble?
  Cuando dos magnitudes se mueven en perfecta sincronía hacia arriba o hacia abajo,
  estamos ante una proporcionalidad directa.
resumen: Dos variables son directamente proporcionales si al multiplicar una por una
  constante, la otra también se multiplica por la misma constante. Su cociente siempre
  es el mismo ($y/x = k$).
explicacion: 'Hablamos de **proporcionalidad directa** cuando dos magnitudes numéricas
  están vinculadas de modo que el aumento de una provoca el aumento de la otra en
  la misma proporción (y lo mismo con su disminución).


  Matemáticamente, si $x$ e $y$ son directamente proporcionales, el cociente entre
  ellas es constante:

  $$\frac{y}{x} = k$$

  Donde $k$ es la **constante de proporcionalidad**. Si $x$ se duplica, $y$ se duplica.
  Si $x$ se divide por 3, $y$ se divide por 3.'
procedimiento:
- 'Paso 1: Identifica las dos variables del problema.'
- 'Paso 2: Comprueba si al aumentar una al doble, la otra obligatoriamente debe aumentar
  al doble.'
- 'Paso 3: Si esto se cumple, son variables directamente proporcionales.'
ejemplos:
- titulo: Variables de la vida real
  enunciado: ¿Son el tiempo de viaje (a velocidad constante) y la distancia recorrida
    proporcionales?
  solucion_pasos:
  - Si viajas el doble de tiempo a la misma velocidad, recorrerás el doble de distancia.
  - Como ambas crecen en la misma proporción, son directamente proporcionales.
- titulo: ¿Toda relación que sube es proporcional?
  respuesta: 'No'
  solucion_pasos:
  - 'La edad de una persona y su altura: si bien a mayor edad (hasta la adultez) suele
    haber mayor altura, a los 20 años no mides el doble que a los 10 años. No es proporcionalidad
    directa.'
errores_frecuentes:
- Creer que 'si una sube y la otra sube' ya es suficiente (deben subir multiplicadas
  por el mismo factor, no sumar el mismo factor).
- Confundir proporcionalidad directa con función lineal afín que no pasa por el origen
  ($y=mx+n$).
- Asumir que si la constante es negativa, no es proporcional.
fuente: Currículum Nacional MINEDUC.
estado: publicado
