semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.AMPLITUD_BASE
titulo: Amplitud de la función coseno básica
objetivo: Reconocer que la amplitud de $f(x)=\cos(x)$ es $1$, correspondiente a la mitad de la distancia entre
  su máximo y su mínimo.
introduccion: Al igual que el seno, la función coseno oscila simétricamente alrededor de una línea central,
  alcanzando una distancia máxima fija desde esa línea.
resumen: La **amplitud** de $f(x)=\cos(x)$ es **$1$**, calculada como la mitad de la distancia entre el valor
  máximo ($1$) y el valor mínimo ($-1$).
explicacion: '### Definición formal


  La amplitud de una función periódica se define como $\dfrac{\text{valor máximo}-\text{valor mínimo}}{2}$.
  Para $f(x)=\cos(x)$, el máximo es $1$ y el mínimo es $-1$, así que la amplitud es
  $\dfrac{1-(-1)}{2}=\dfrac{2}{2}=1$.


  ### Desarrollo didáctico


  Gráficamente, la amplitud representa qué tan lejos se aleja la curva de su línea media (en este caso, el eje
  $x$), la misma cantidad tanto hacia arriba como hacia abajo.'
procedimiento:
- 'Paso 1: Identifica el valor máximo y el valor mínimo de la función.'
- 'Paso 2: Calcula la diferencia entre el máximo y el mínimo.'
- 'Paso 3: Divide esa diferencia por $2$ para obtener la amplitud.'
ejemplos:
- titulo: Cálculo directo de la amplitud
  enunciado: 'Calcula la amplitud de $f(x)=\cos(x)$ usando su máximo y mínimo.'
  solucion_pasos:
  - 'Máximo $=1$, mínimo $=-1$.'
  - 'Amplitud $=\dfrac{1-(-1)}{2}=1$.'
- titulo: Interpretación gráfica de la amplitud
  enunciado: '¿Qué representa gráficamente la amplitud $1$ de la función coseno básica?'
  solucion_pasos:
  - Representa la distancia vertical desde la línea media (el eje $x$) hasta el máximo o el mínimo.
  - La curva se aleja como máximo $1$ unidad hacia arriba y $1$ unidad hacia abajo.
- titulo: ¿La amplitud del coseno puede ser un número negativo?
  enunciado: ¿Puede la amplitud de la función coseno básica ser un valor negativo?
  respuesta: 'No'
  solucion_pasos:
  - La amplitud se define como una distancia, por lo que siempre es un valor no negativo.
- titulo: ¿La amplitud de $f(x)=\cos(x)$ es la misma que la de $g(x)=\sin(x)$?
  enunciado: ¿La amplitud de la función coseno básica es igual a la de la función seno básica?
  respuesta: Sí
  solucion_pasos:
  - Ambas funciones oscilan entre $-1$ y $1$, así que ambas tienen amplitud $1$.
errores_frecuentes:
- Confundir la amplitud con el valor máximo, olvidando dividir por $2$.
- Confundir la amplitud con el periodo de la función.
- Suponer que la amplitud puede ser negativa.
- No identificar correctamente el máximo y el mínimo antes de calcular la amplitud.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
