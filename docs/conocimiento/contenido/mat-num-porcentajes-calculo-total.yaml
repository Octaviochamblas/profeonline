semantic_id: MAT.NUM.PORCENTAJES.CALCULO_TOTAL
objetivo: Calcular el total (100%) conociendo el valor de un porcentaje específico.
introduccion: Si te dicen que $12.000 corresponde al 20% de un premio, ¿cuál era el
  premio completo? Aprender a reconstruir el pastel entero teniendo solo una rebanada
  es fundamental en finanzas.
resumen: 'Para hallar el Total ($T$) cuando se conoce que el $c\%$ equivale a una
  Parte ($P$), se despeja de la fórmula básica: $T = (P / c) \cdot 100$.'
explicacion: 'Sabemos que el cálculo directo es $\text{Parte} = \text{Total} \cdot
  (c/100)$. Si lo que nos falta es el **Total**, debemos despejar la ecuación:


  $$\text{Total} = \frac{\text{Parte}}{c} \cdot 100$$


  Esto se puede razonar lógicamente en dos pasos:

  1. Al dividir la Parte entre el porcentaje $c$, estás averiguando **cuánto vale
  el 1%**.

  2. Al multiplicar ese resultado por 100, estás descubriendo **el 100%** (el Total).'
procedimiento:
- 'Paso 1: Identifica el valor de la Parte ($P$) y a qué porcentaje equivale ($c$).'
- 'Paso 2: Divide $P$ por $c$. Esto te da el valor del 1%.'
- 'Paso 3: Multiplica ese resultado por 100 para obtener el Total.'
ejemplos:
- titulo: Adivinando el sueldo
  enunciado: Si ahorraste $15.000 y eso corresponde al 5% de tu sueldo, ¿cuánto es
    tu sueldo total?
  solucion_pasos:
  - Parte = $15.000, Porcentaje = 5.
  - 'Calculamos el 1%: $15.000 / 5 = 3.000$.'
  - 'Multiplicamos por 100: $3.000 \cdot 100 = 300.000$.'
  - El sueldo total es $300.000.
errores_frecuentes:
- Multiplicar la Parte por el porcentaje en lugar de dividir (ej. calcular el 5% de
  15.000 en vez de usar 15.000 como base para hallar el total).
- Usar el número decimal ($0.05$) dividiendo, lo cual es matemáticamente correcto
  ($15000 / 0.05$), pero la gente suele confundirse al dividir por decimales. El método
  del 1% es más seguro.
fuente: Currículum Nacional MINEDUC.
estado: publicado
