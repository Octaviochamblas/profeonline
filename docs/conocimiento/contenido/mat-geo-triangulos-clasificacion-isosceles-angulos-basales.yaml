semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.ISOSCELES_ANGULOS_BASALES
titulo: Propiedad de igualdad de los ángulos basales en un triángulo isósceles
objetivo: Aplicar la propiedad de que los dos ángulos que se apoyan en la base de un triángulo isósceles
  son iguales entre sí.
introduccion: En un triángulo isósceles, los dos ángulos que tienen como lado a la base (los ángulos basales)
  siempre resultan iguales entre sí, como consecuencia de la igualdad de las piernas.
resumen: Los ángulos basales de un triángulo isósceles, es decir, los que se apoyan en la base, son iguales
  entre sí.
explicacion: '![Ángulos basales de un triángulo isósceles](/static/img/geometria/triangulos/triangulos-clasificacion-isosceles-angulos-basales.svg)


  ### Definición formal


  En un triángulo isósceles ABC con AC=BC, los ángulos basales en A y en B (los que tienen como lado a
  la base AB) son iguales: ∠A=∠B.


  ### Desarrollo didáctico


  Si un triángulo isósceles tiene su ángulo apical (en el vértice C, entre las piernas) de 40°, los dos
  ángulos basales se reparten los 140° restantes en partes iguales: cada uno mide 70°.'
procedimiento:
- 'Paso 1: Identifica cuáles son los dos ángulos basales (los que tocan la base).'
- 'Paso 2: Recuerda que ambos ángulos basales son iguales entre sí.'
- 'Paso 3: Si conoces el ángulo apical, resta de 180° y divide entre 2 para hallar cada basal.'
ejemplos:
- titulo: Calcular ángulos basales
  enunciado: Un triángulo isósceles tiene ángulo apical de 50°.
  solucion_pasos:
  - Cada ángulo basal mide (180°−50°)/2=65°.
- titulo: Verificar con lados
  enunciado: En un triángulo isósceles con AC=BC, ¿qué relación cumplen los ángulos en A y B?
  solucion_pasos:
  - Son iguales entre sí, por ser los ángulos basales.
- titulo: ¿Los ángulos basales de un triángulo isósceles son siempre iguales?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad directa de la igualdad de las piernas.
- titulo: ¿El ángulo apical puede ser distinto de los basales?
  respuesta: Sí
  solucion_pasos:
  - Sí, salvo en el caso equilátero, el ángulo apical suele ser distinto a los basales.
errores_frecuentes:
- Confundir el ángulo apical (entre las piernas) con uno de los basales.
- Suponer que los tres ángulos son iguales sin verificar si es también equilátero.
- Olvidar dividir entre 2 al calcular cada ángulo basal a partir del apical.
fuente: Elaboración propia.
estado: publicado
