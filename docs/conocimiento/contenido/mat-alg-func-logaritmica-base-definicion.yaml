semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.DEFINICION
titulo: Definición de función logarítmica
objetivo: Comprender la función logarítmica como la inversa de la función exponencial.
introduccion: 'Si la función exponencial responde "¿cuánto vale $b$ elevado a $x$?", la función logarítmica responde
  la pregunta opuesta: "¿a qué exponente hay que elevar $b$ para obtener $x$?".'
resumen: Una **función logarítmica** es una función de la forma $f(x)=\log_b(x)$, que asigna a cada $x$ el exponente
  al que hay que elevar la base $b$ para obtener $x$.
explicacion: '### Definición formal


  Una función $f:\mathbb{R}^+ \to \mathbb{R}$ es logarítmica si puede expresarse como $f(x)=\log_b(x)$, con $b>0$
  y $b\neq1$, donde $y=\log_b(x)$ significa que $b^y=x$. Es, por construcción, la función inversa de $g(x)=b^x$.


  ### Desarrollo didáctico


  Para interpretar $\log_b(x)$, conviene traducirlo mentalmente a la pregunta: "¿a qué potencia elevo $b$ para
  obtener $x$?".


  $\log_2(8)=3$, porque $2^3=8$. En cambio, $\log_5(x)$ para $x\leq0$ no tiene sentido, ya que ninguna potencia
  de $5$ (positivo) puede dar un resultado no positivo.'
procedimiento:
- 'Paso 1: Identifica la base $b$ y el argumento $x$ de la expresión logarítmica.'
- 'Paso 2: Traduce $\log_b(x)$ como la pregunta "¿a qué exponente se eleva $b$ para obtener $x$?".'
- 'Paso 3: Verifica que $b>0$, $b\neq1$ y $x>0$ para que la expresión esté bien definida.'
ejemplos:
- titulo: Interpretación directa de un logaritmo
  enunciado: 'Interpreta el significado de $\log_3(9)$.'
  solucion_pasos:
  - Se pregunta a qué exponente se eleva $3$ para obtener $9$.
  - 'Como $3^2=9$, entonces $\log_3(9)=2$.'
- titulo: Reconocimiento de una expresión no definida
  enunciado: '¿Está definido $\log_4(-2)$?'
  solucion_pasos:
  - No existe ninguna potencia de $4$ (base positiva) que dé un resultado negativo.
  - No, no está definido dentro de los números reales.
- titulo: ¿La función logarítmica es la inversa de la función exponencial?
  enunciado: ¿La función logarítmica es la inversa de la función exponencial?
  respuesta: Sí
  solucion_pasos:
  - Por construcción, $\log_b(x)$ deshace la operación de elevar $b$ a una potencia.
- titulo: ¿Puede el argumento de un logaritmo ser igual a cero?
  enunciado: ¿Puede el argumento de un logaritmo ser igual a cero?
  respuesta: 'No'
  solucion_pasos:
  - Ninguna potencia de una base positiva puede dar como resultado cero.
errores_frecuentes:
- Confundir $\log_b(x)$ con una división o resta entre $b$ y $x$.
- Aplicar la función logarítmica a argumentos negativos o iguales a cero.
- Olvidar que la base debe cumplir las mismas restricciones que en la función exponencial.
- Confundir el orden de base y argumento al leer la notación $\log_b(x)$.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
