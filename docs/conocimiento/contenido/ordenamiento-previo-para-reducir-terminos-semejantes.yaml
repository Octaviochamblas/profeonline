semantic_id: MAT.ALG.REDUCCION_OPERATIVA.ORDENAMIENTO_PREVIO
titulo: Ordenamiento previo para reducir términos semejantes
objetivo: Aplicar un ordenamiento previo de los términos antes de reducir, para facilitar la identificación
  de familias semejantes.
introduccion: 'A veces las expresiones llegan ''revueltas''. Antes de reducir, conviene acomodar la mesa:
  ordenar los términos por familia o por grado para que el proceso sea más limpio y sin errores.'
resumen: El **Ordenamiento Previo** consiste en reescribir los términos de una expresión agrupados por
  familia (o por grado decreciente) antes de efectuar la reducción. Es una estrategia preventiva que evita
  errores.
explicacion: '### Definición formal


  El orden es una estrategia preventiva. La suma es conmutativa y no cambia el resultado.


  ### Desarrollo didáctico


  Sea la expresión: $5x - 3y + 2x + y - x + 4y$.


  Sin orden, es fácil olvidar un término. Con ordenamiento previo:

  1. Familia $x$: $5x + 2x - x = 6x$.

  2. Familia $y$: $-3y + y + 4y = 2y$.


  Resultado: $6x + 2y$.


  El ordenamiento no cambia el valor (la suma es conmutativa), solo lo hace más seguro.'
procedimiento:
- 'Paso 1: Lee todos los términos de la expresión.'
- 'Paso 2: Reagrupa mentalmente (o por escrito) los términos de la misma familia.'
- 'Paso 3: Reescribe la expresión con los grupos juntos.'
- 'Paso 4: Aplica la reducción dentro de cada grupo.'
ejemplos:
- titulo: Ordenar para no perder nada
  enunciado: 'Reduce: 3a - 2b + a + 5b - 4a + b.'
  solucion_pasos:
  - 'Familia a: 3a + a - 4a = 0.'
  - 'Familia b: -2b + 5b + b = 4b.'
  - 'Resultado: 4b.'
- titulo: 'Un economista registra las variaciones de activos y pasivos de manera alternada: $5A - 3P +'
  enunciado: 'Un economista registra las variaciones de activos y pasivos de manera alternada: $5A - 3P
    + 2A - P + A + 4P$. ¿Cuáles son los activos ($A$) y pasivos ($P$) netos? (v1)


    Opciones: A) $8A$ · B) $8A + 6P$ · C) $8A - 6P$ · D) $8A + 2P$'
  solucion_pasos:
  - 'Activos: $5+2+1=8A$. Pasivos: $-3-1+4=0P$. Los pasivos se cancelan. Resultado: $8A$.'
- titulo: 'Respecto de «Ordenamiento previo para reducir términos semejantes»: ¿Se ajusta a la definici'
  enunciado: 'Respecto de «Ordenamiento previo para reducir términos semejantes»: ¿Se ajusta a la definición
    esta afirmación? «El **Ordenamiento Previo** consiste en reescribir los términos de una expresión
    agrupados por familia (o por grado decreciente) antes de efectuar la reducción»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Ordenamiento Previo** consiste en reescribir
    los términos de una expresión agrupados por familia (o por grado decreciente) antes de efectuar la
    reducción.'
- titulo: 'Respecto de «Ordenamiento previo para reducir términos semejantes»: ¿Es compatible con el pr'
  enunciado: 'Respecto de «Ordenamiento previo para reducir términos semejantes»: ¿Es compatible con el
    procedimiento esta afirmación? «Olvidar un término al reordenar y que quede fuera de la reducción»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Ordenamiento Previo** consiste en reescribir
    los términos de una expresión agrupados por familia (o por grado decreciente) antes de efectuar la
    reducción.'
errores_frecuentes:
- Olvidar un término al reordenar y que quede fuera de la reducción.
- Cambiar el signo de un término al moverlo (la reescritura solo cambia el orden, no el signo).
- Porque el álgebra exige siempre un orden de mayor a menor.
- Para «¿Por qué es recomendable ordenar previamente los términos de una expresión antes de reducirla?
  (v1)», la respuesta correcta es Para cambiar los signos y simplificar el resultado.
- Porque sin orden, la reducción es algebraicamente imposible.
fuente: Álgebra de Baldor.
estado: publicado
