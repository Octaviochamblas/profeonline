semantic_id: MAT.ALG.EC_CUADR_DISCRIMINANTE.CONDICIONES_PARAMETRO
titulo: Determinación de condiciones sobre un parámetro para la existencia de raíces reales
objetivo: Determinar, mediante el análisis del discriminante, para qué valores de un parámetro una ecuación cuadrática
  tiene soluciones reales.
introduccion: Cuando uno de los coeficientes de una ecuación cuadrática depende de un parámetro, el discriminante
  se convierte en una expresión con ese parámetro, y estudiar su signo revela para qué valores hay soluciones
  reales.
resumen: Para determinar condiciones sobre un parámetro, se expresa el discriminante $\Delta$ en función de ese
  parámetro y se plantea (según lo pedido) $\Delta\geq0$, $\Delta>0$ o $\Delta<0$, resolviendo la inecuación resultante.
explicacion: '### Definición formal


  Si los coeficientes de $ax^2+bx+c=0$ dependen de un parámetro $k$, el discriminante $\Delta(k)=b(k)^2-4a(k)c(k)$
  es una expresión en $k$. Las condiciones sobre $k$ para que existan soluciones reales se obtienen resolviendo
  la inecuación $\Delta(k) \geq 0$ (dos soluciones o una doble) o $\Delta(k) > 0$ (dos soluciones distintas).


  ### Desarrollo didáctico


  El procedimiento combina dos temas: calcular el discriminante en función del parámetro, y luego resolver la
  inecuación resultante sobre ese parámetro, tal como se resuelve cualquier inecuación algebraica.


  Para que $x^2+kx+9=0$ tenga soluciones reales, se plantea $\Delta=k^2-36 \geq 0$, cuya solución es $k \leq -6$
  o $k \geq 6$.'
procedimiento:
- 'Paso 1: Escribe el discriminante $\Delta$ en función del parámetro dado.'
- 'Paso 2: Plantea la inecuación correspondiente según lo que se pide ($\Delta\geq0$, $\Delta>0$ o $\Delta<0$).'
- 'Paso 3: Resuelve la inecuación para despejar el rango de valores del parámetro.'
ejemplos:
- titulo: Condición para dos soluciones distintas
  enunciado: 'Determina para qué valores de $k$ la ecuación $x^2-2x+k=0$ tiene dos soluciones reales distintas.'
  solucion_pasos:
  - '$\Delta=(-2)^2-4(1)(k)=4-4k$.'
  - Se exige $\Delta>0$, es decir $4-4k>0$, lo que da $k<1$.
- titulo: Condición para una raíz doble
  enunciado: 'Determina el valor de $m$ para que $x^2+6x+m=0$ tenga una única solución real.'
  solucion_pasos:
  - '$\Delta=6^2-4(1)(m)=36-4m$.'
  - Se exige $\Delta=0$, es decir $36-4m=0$, lo que da $m=9$.
- titulo: ¿Para determinar condiciones de existencia de raíces reales se usa $\Delta\geq0$?
  enunciado: ¿Para determinar condiciones de existencia de raíces reales se usa $\Delta\geq0$?
  respuesta: Sí
  solucion_pasos:
  - $\Delta\geq0$ incluye tanto el caso de dos soluciones distintas como el de una raíz doble.
- titulo: ¿Al calcular el discriminante con parámetro, se debe seguir cumpliendo $a\neq0$?
  enunciado: ¿Al calcular el discriminante con parámetro, se debe seguir cumpliendo $a\neq0$?
  respuesta: Sí
  solucion_pasos:
  - Si el parámetro también afecta a $a$, se debe excluir el valor que lo anularía antes de aplicar el análisis
    del discriminante.
errores_frecuentes:
- Plantear $\Delta>0$ cuando el problema en realidad pide "al menos una solución real" (que corresponde a $\Delta\geq0$).
- Olvidar verificar que $a$ siga siendo distinto de cero para los valores del parámetro obtenidos.
- Cometer errores algebraicos al expandir el discriminante en función del parámetro.
- Resolver incorrectamente la inecuación resultante, invirtiendo el sentido de la desigualdad al multiplicar
  por un número negativo.
