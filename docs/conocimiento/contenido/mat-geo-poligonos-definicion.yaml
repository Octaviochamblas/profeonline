semantic_id: MAT.GEO.POLIGONOS_BASE.DEFINICION_POLIGONO
titulo: Definición de polígono como figura plana cerrada formada por segmentos
objetivo: Comprender la definición de polígono como una figura plana cerrada, formada exclusivamente por
  segmentos de recta.
introduccion: Antes de estudiar triángulos y cuadriláteros como casos particulares, es importante entender
  qué caracteriza en general a cualquier polígono.
resumen: Un polígono es una figura plana cerrada formada por segmentos de recta que se unen únicamente
  en sus extremos, sin cruzarse entre sí.
explicacion: '![Polígono: figura plana cerrada de segmentos](/static/img/geometria/poligonos-cuadrilateros/poligonos-definicion.svg)


  ### Definición formal


  Un polígono es una figura plana delimitada por una línea poligonal cerrada: una secuencia de segmentos
  de recta consecutivos donde el último segmento termina en el punto donde comenzó el primero, y ningún
  segmento se cruza con otro no adyacente.


  ### Desarrollo didáctico


  Un triángulo, un cuadrado y un pentágono son todos polígonos, con 3, 4 y 5 lados respectivamente. En
  cambio, una figura formada por una curva (como un círculo) o por segmentos que no cierran completamente
  no es un polígono.'
procedimiento:
- 'Paso 1: Verifica que la figura esté formada únicamente por segmentos de recta.'
- 'Paso 2: Verifica que la figura sea cerrada (el último segmento conecta con el primero).'
- 'Paso 3: Verifica que los segmentos no se crucen entre sí (salvo en los vértices consecutivos).'
ejemplos:
- titulo: Identificar un polígono
  enunciado: Una figura está formada por 6 segmentos de recta unidos en sus extremos, cerrando la figura.
  solucion_pasos:
  - Es un polígono (específicamente un hexágono, por tener 6 lados).
- titulo: Identificar una figura que NO es un polígono
  enunciado: Un círculo está formado por una curva continua.
  solucion_pasos:
  - No es un polígono, ya que no está formado por segmentos de recta.
- titulo: ¿Un polígono puede tener lados curvos?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición todos los lados de un polígono deben ser segmentos de recta.
- titulo: ¿Una figura abierta (no cerrada) puede ser un polígono?
  respuesta: 'No'
  solucion_pasos:
  - No, la condición de ser cerrada es esencial para la definición de polígono.
errores_frecuentes:
- Confundir un polígono con cualquier figura plana, incluyendo aquellas con lados curvos.
- Considerar como polígono una figura abierta, que no cierra completamente.
- No verificar que los segmentos no se crucen entre sí de forma no consecutiva.
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 46.'
estado: publicado
