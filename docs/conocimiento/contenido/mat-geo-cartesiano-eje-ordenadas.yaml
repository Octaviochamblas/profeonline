semantic_id: MAT.GEO.CARTESIANO_BASE.EJE_ORDENADAS
titulo: Identificación del eje de las ordenadas en el plano cartesiano
objetivo: Identificar el eje de las ordenadas (eje Y) como la recta vertical del plano cartesiano.
introduccion: 'El eje de las ordenadas es la ''línea de la pared'' del plano cartesiano: la recta vertical
  sobre la que se miden los valores de y.'
resumen: El eje de las ordenadas, o eje Y, es la recta vertical del plano cartesiano, sobre la cual se
  representa la segunda coordenada (y) de cualquier punto.
explicacion: '![Eje de las ordenadas](/static/img/geometria/cartesiano-vectores/cartesiano-eje-ordenadas.svg)


  ### Definición formal


  El eje de las ordenadas (eje Y) es la recta vertical del plano cartesiano. Todos los puntos sobre esta
  recta tienen su primera coordenada (x) igual a cero.


  ### Desarrollo didáctico


  En la figura, el eje vertical resaltado es el eje de las ordenadas. Cualquier valor medido a lo largo
  de esta recta corresponde a la coordenada y de un punto.'
procedimiento:
- 'Paso 1: Identifica la recta vertical del plano cartesiano.'
- 'Paso 2: Reconoce que esa recta es el eje de las ordenadas (eje Y).'
- 'Paso 3: Recuerda que todo punto sobre este eje tiene su coordenada x igual a 0.'
ejemplos:
- titulo: Identificar el eje de las ordenadas
  enunciado: En un plano cartesiano se traza la recta vertical.
  solucion_pasos:
  - Esa recta vertical es el eje de las ordenadas, también llamado eje Y.
- titulo: Reconocer un punto sobre el eje de las ordenadas
  enunciado: El punto (0,6) está en el plano cartesiano.
  solucion_pasos:
  - Como su coordenada x es 0, el punto (0,6) está exactamente sobre el eje de las ordenadas.
- titulo: ¿El eje de las ordenadas es vertical?
  respuesta: Sí
  solucion_pasos:
  - Sí, por convención, el eje de las ordenadas (eje Y) es siempre la recta vertical.
- titulo: ¿Todos los puntos sobre el eje de las ordenadas tienen x=0?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es la característica que define a los puntos ubicados sobre este eje.
errores_frecuentes:
- Confundir el eje de las ordenadas con el eje de las abscisas (horizontal).
- Creer que los puntos sobre el eje de las ordenadas tienen y=0 en vez de x=0.
- No reconocer visualmente cuál de los dos ejes es el vertical.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Baldor 292).'
estado: publicado
