semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.SEMEJANZA_POLIGONOS_CONCEPTO
titulo: Concepto de semejanza de polígonos
objetivo: Extender el concepto de semejanza a polígonos de cualquier número de lados, no solo triángulos.
introduccion: 'El concepto de semejanza no se limita a los triángulos: se extiende de forma natural a
  cualquier polígono, sin importar su número de lados.'
resumen: Dos polígonos son semejantes si tienen el mismo número de lados, sus ángulos correspondientes
  son iguales, y sus lados correspondientes son proporcionales.
explicacion: '![Semejanza de polígonos](/static/img/geometria/congruencia-semejanza/semejanza-poligonos-concepto.svg)


  ### Definición formal


  Dos polígonos con $n$ lados son semejantes si existe una correspondencia entre sus vértices tal que
  todos los ángulos correspondientes sean iguales y todos los lados correspondientes sean proporcionales,
  con la misma razón de proporcionalidad para todos los pares.


  ### Desarrollo didáctico


  A diferencia de los triángulos (donde basta con verificar ángulos O lados en ciertos criterios abreviados),
  en polígonos de más de tres lados se deben verificar AMBAS condiciones (ángulos iguales Y lados proporcionales)
  de forma independiente, ya que una sola no garantiza la otra.'
procedimiento:
- 'Paso 1: Verifica que ambos polígonos tengan el mismo número de lados.'
- 'Paso 2: Verifica que todos los ángulos correspondientes sean iguales.'
- 'Paso 3: Verifica que todos los lados correspondientes sean proporcionales, con la misma razón.'
ejemplos:
- titulo: Verificar semejanza de dos pentágonos regulares
  enunciado: Dos pentágonos regulares tienen distinto tamaño.
  solucion_pasos:
  - Son semejantes, ya que todos los pentágonos regulares tienen ángulos iguales entre sí y lados proporcionales.
- titulo: Detectar cuando dos polígonos no son semejantes
  enunciado: Un cuadrado y un rectángulo no cuadrado.
  solucion_pasos:
  - No son semejantes, ya que sus lados no mantienen la misma razón (el cuadrado tiene todos los lados
    iguales, el rectángulo no).
- titulo: ¿Basta con que los ángulos sean iguales para garantizar semejanza en un polígono de 5 lados?
  respuesta: 'No'
  solucion_pasos:
  - No, en polígonos de más de tres lados se necesita además que los lados sean proporcionales.
- titulo: ¿Todos los polígonos regulares del mismo número de lados son semejantes entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque comparten los mismos ángulos internos y sus lados son siempre proporcionales entre versiones
    de distinto tamaño.
errores_frecuentes:
- Asumir que basta con verificar los ángulos para garantizar semejanza en polígonos de más de tres lados.
- Comparar polígonos con distinto número de lados como si pudieran ser semejantes.
- No verificar la correspondencia correcta de vértices al comparar ángulos y lados.
fuente: Elaboración propia.
estado: publicado
