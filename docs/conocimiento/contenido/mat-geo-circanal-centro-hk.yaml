semantic_id: MAT.GEO.CIRCUNFERENCIA_ANALITICA.CENTRO_HK
titulo: Reconocimiento de la ecuación canónica de circunferencia con centro en (h, k)
objetivo: Reconocer la ecuación canónica de una circunferencia cuyo centro se ubica en un punto (h,k)
  distinto del origen.
introduccion: Cuando el centro de una circunferencia no coincide con el origen, su ecuación incluye desplazamientos
  que reflejan las coordenadas de ese centro.
resumen: La ecuación canónica de una circunferencia con centro $(h,k)$ y radio $r$ es $(x-h)^2+(y-k)^2=r^2$.
explicacion: '![Circunferencia con centro (h,k)](/static/img/geometria/analitica/circanal-centro-hk.svg)


  ### Definición formal


  Un punto $(x,y)$ pertenece a la circunferencia de centro $(h,k)$ y radio $r$ si su distancia a ese centro
  es exactamente $r$: $\sqrt{(x-h)^2+(y-k)^2}=r$, es decir, $(x-h)^2+(y-k)^2=r^2$.


  ### Desarrollo didáctico


  La ecuación $(x-2)^2+(y-3)^2=9$ representa una circunferencia con centro $(2,3)$ y radio $3$ (ya que
  $9=3^2$).'
procedimiento:
- 'Paso 1: Identifica la ecuación en la forma (x-h)²+(y-k)²=r².'
- 'Paso 2: Reconoce que el centro es el punto (h,k), notando que los signos dentro de los paréntesis se
  invierten respecto de la ecuación.'
- 'Paso 3: El radio se obtiene calculando la raíz cuadrada del término de la derecha.'
ejemplos:
- titulo: Reconocer el centro y radio de (x-2)²+(y-3)²=9
  enunciado: (x-2)²+(y-3)²=9.
  solucion_pasos:
  - Centro (2,3), radio 3.
- titulo: Reconocer el centro cuando hay signos positivos dentro del paréntesis
  enunciado: (x+4)²+(y-1)²=16.
  solucion_pasos:
  - Como (x+4)² equivale a (x-(-4))², el centro es (-4,1), radio 4.
- titulo: ¿El signo dentro del paréntesis se invierte al identificar la coordenada del centro?
  respuesta: Sí
  solucion_pasos:
  - Sí, (x-h) con h positivo da un signo negativo dentro del paréntesis, y viceversa.
- titulo: ¿La ecuación con centro en el origen es un caso particular de esta forma?
  respuesta: Sí
  solucion_pasos:
  - Sí, corresponde al caso h=0, k=0.
errores_frecuentes:
- No invertir el signo al identificar h y k cuando la ecuación tiene (x+h) en vez de (x-h).
- Confundir el orden de las coordenadas del centro, invirtiendo h y k.
- Olvidar extraer la raíz cuadrada del término derecho para obtener el radio.
fuente: Elaboración propia.
estado: publicado
