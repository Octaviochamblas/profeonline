semantic_id: MAT.ALG.RELACION_EXP_LOG.RESOLUCION_EXP_LOGARITMOS
titulo: Resolución de ecuaciones que combinan exponenciales y logaritmos
objetivo: Resolver ecuaciones donde aparecen simultáneamente expresiones exponenciales y logarítmicas, usando su
  relación inversa.
introduccion: Algunos problemas combinan ambos tipos de expresión en la misma ecuación; resolverlos requiere
  decidir si conviene aplicar un logaritmo o una potencia a ambos lados.
resumen: Para resolver ecuaciones que combinan exponenciales y logaritmos, se aplica una función (logaritmo o
  exponencial) a **ambos lados de la ecuación**, aprovechando que son operaciones inversas entre sí.
explicacion: '### Definición formal


  Si una ecuación tiene la incógnita atrapada dentro de un exponente, se aplica $\log_b(\cdot)$ a ambos lados
  para liberarla, usando $\log_b(b^x)=x$. Si la incógnita está dentro de un logaritmo, se aplica la función
  exponencial de igual base a ambos lados, usando $b^{\log_b(x)}=x$.


  ### Desarrollo didáctico


  Para resolver $3^{2x}=81$, se aplica $\log_3$ a ambos lados: $\log_3(3^{2x})=\log_3(81)$, lo que da $2x=4$, y
  luego $x=2$. Para resolver $\log_5(x)=3^{0}$, primero se simplifica el lado derecho, $3^0=1$, y luego se
  convierte a forma exponencial: $x=5^1=5$.'
procedimiento:
- 'Paso 1: Identifica si la incógnita está dentro de un exponente o dentro de un logaritmo.'
- 'Paso 2: Si está en un exponente, aplica el logaritmo de igual base a ambos lados de la ecuación.'
- 'Paso 3: Si está en un logaritmo, aplica la función exponencial de igual base a ambos lados.'
- 'Paso 4: Simplifica usando las propiedades $\log_b(b^x)=x$ o $b^{\log_b(x)}=x$ según corresponda.'
- 'Paso 5: Verifica que la solución cumpla las restricciones de dominio de la expresión original.'
ejemplos:
- titulo: Incógnita en el exponente
  enunciado: 'Resuelve $2^{3x}=64$.'
  solucion_pasos:
  - Se aplica $\log_2$ a ambos lados: $\log_2(2^{3x})=\log_2(64)$.
  - 'Se simplifica: $3x=6$, así que $x=2$.'
- titulo: Incógnita dentro de un logaritmo
  enunciado: 'Resuelve $\log_4(x)=2^1$.'
  solucion_pasos:
  - 'Se simplifica el lado derecho: $2^1=2$.'
  - 'Se convierte a forma exponencial: $x=4^2=16$.'
- titulo: ¿Se puede resolver $5^{x+1}=125$ igualando bases en vez de usar logaritmos?
  enunciado: ¿Conviene resolver $5^{x+1}=125$ igualando exponentes en vez de aplicar logaritmos?
  respuesta: Sí
  solucion_pasos:
  - 'Como $125=5^3$, se iguala $x+1=3$, obteniendo $x=2$, sin necesidad de logaritmos.'
- titulo: ¿Es necesario verificar el dominio al resolver ecuaciones combinadas?
  enunciado: ¿Debe verificarse siempre que la solución obtenida cumpla las restricciones de dominio de logaritmos
    involucrados?
  respuesta: Sí
  solucion_pasos:
  - Cualquier argumento logarítmico en la ecuación original debe quedar positivo con la solución encontrada.
errores_frecuentes:
- Aplicar logaritmos con distinta base a ambos lados de la ecuación.
- Olvidar verificar el dominio de los logaritmos involucrados en la solución final.
- Usar logaritmos cuando igualar bases directamente sería más simple y directo.
- Confundir cuándo aplicar logaritmo (incógnita en exponente) y cuándo aplicar potencia (incógnita en argumento).
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
