- titulo: ┬┐La columna F siempre termina en el total de datos (n)?
  respuesta: S├Ł
  solucion_pasos:
  - S├Ł, es la propiedad de la frecuencia acumulada, que suma todas las frecuencias absolutas.
- titulo: ┬┐La columna Fr siempre termina en 1?
