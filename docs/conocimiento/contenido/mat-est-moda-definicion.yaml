semantic_id: MAT.EST.MODA_ANALISIS.DEFINICION
titulo: Definir la moda de un conjunto de datos
objetivo: Definir la moda como el valor que aparece con mayor frecuencia dentro de un conjunto de datos.
introduccion: La moda es la única medida de tendencia central que puede aplicarse tanto a variables cualitativas
  como cuantitativas.
resumen: La moda es el valor (o valores) que presenta la mayor frecuencia dentro de un conjunto de datos.
explicacion: '![Definición de moda](/static/img/estadistica/moda/moda-definicion.svg)


  ### Definición formal


  La moda $Mo$ es el valor $x_i$ tal que $f_i\geq f_j$ para todo otro valor $x_j$ del conjunto de datos.


  ### Desarrollo didáctico


  En el conjunto {4, 5, 5, 5, 6}, el valor 5 aparece 3 veces (más que cualquier otro), por lo que la moda
  es 5.'
procedimiento:
- 'Paso 1: Cuenta la frecuencia de cada valor distinto en el conjunto de datos.'
- 'Paso 2: Identifica cuál valor (o valores) tiene la mayor frecuencia.'
- 'Paso 3: Ese valor (o esos valores) es la moda del conjunto.'
ejemplos:
- titulo: Determinar la moda de {4,5,5,5,6}
  enunciado: 'Conjunto: 4, 5, 5, 5, 6.'
  solucion_pasos:
  - El valor 5 tiene frecuencia 3, la mayor de todas. Moda=5.
- titulo: Determinar la moda del color favorito
  enunciado: 'Colores: rojo, azul, azul, azul, verde.'
  solucion_pasos:
  - El color azul aparece 3 veces, más que cualquier otro. Moda=azul.
- titulo: ¿La moda puede aplicarse a variables cualitativas?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la única medida de tendencia central aplicable directamente a datos cualitativos.
- titulo: ¿La moda siempre es un valor único en cualquier conjunto de datos?
  respuesta: 'No'
  solucion_pasos:
  - No, puede haber más de un valor con la máxima frecuencia (conjunto bimodal o multimodal).
errores_frecuentes:
- Confundir la moda con la frecuencia misma, en vez del valor que tiene esa frecuencia máxima.
- Contar mal las repeticiones de cada valor al determinar cuál tiene mayor frecuencia.
- Asumir que siempre existe una única moda, sin verificar si hay empates entre varios valores.
fuente: 'Elaboración propia (referencia: Moraleja 359).'
estado: publicado
