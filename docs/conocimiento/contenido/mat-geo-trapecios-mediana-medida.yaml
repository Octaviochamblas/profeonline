semantic_id: MAT.GEO.TRAPECIOS_TRAPEZOIDES.MEDIANA_TRAPECIO_MEDIDA
titulo: Propiedad de medida de la mediana del trapecio como semisuma de las bases
objetivo: Calcular la longitud de la mediana de un trapecio como la semisuma (promedio) de las longitudes
  de sus dos bases.
introduccion: La mediana del trapecio no solo tiene una posición geométrica especial, sino también una
  longitud que se relaciona directamente con las dos bases.
resumen: 'La longitud de la mediana de un trapecio es igual a la semisuma de las longitudes de sus dos
  bases: $m=\frac{B+b}{2}$.'
explicacion: '![Medida de la mediana: semisuma de las bases](/static/img/geometria/poligonos-cuadrilateros/trapecios-mediana-medida.svg)


  ### Definición formal


  Si $B$ es la base mayor y $b$ es la base menor de un trapecio, la mediana mide $m=\frac{B+b}{2}$, es
  decir, el promedio aritmético de ambas bases.


  ### Desarrollo didáctico


  Un trapecio con base mayor 20 cm y base menor 12 cm tiene mediana $m=\frac{20+12}{2}=\frac{32}{2}=16$
  cm. Esta propiedad es muy útil porque relaciona un segmento interior del trapecio con sus dos lados
  paralelos externos.'
procedimiento:
- 'Paso 1: Identifica la longitud de la base mayor B y la base menor b.'
- 'Paso 2: Súmalas.'
- 'Paso 3: Divide esa suma entre 2 para obtener la longitud de la mediana.'
ejemplos:
- titulo: Calcular la mediana con bases conocidas
  enunciado: Un trapecio tiene base mayor 20 cm y base menor 12 cm.
  solucion_pasos:
  - m=(20+12)/2=16 cm.
- titulo: Calcular una base desconocida a partir de la mediana
  enunciado: Un trapecio tiene mediana 15 cm y base mayor 22 cm.
  solucion_pasos:
  - 15=(22+b)/2 → 30=22+b → b=8 cm.
- titulo: ¿La mediana siempre es menor que la base mayor?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que es un promedio entre la base mayor y la menor, siempre queda entre ambas.
- titulo: ¿La mediana siempre es mayor que la base menor?
  respuesta: Sí
  solucion_pasos:
  - 'Sí, por la misma razón: al ser un promedio, queda entre los dos valores.'
errores_frecuentes:
- Olvidar dividir entre 2 después de sumar las dos bases.
- Confundir la base mayor con la menor al aplicar la fórmula.
- Aplicar esta fórmula a un lado lateral en vez de a las bases del trapecio.
fuente: 'Fuente: Moraleja Tomo 2 69.'
estado: publicado
