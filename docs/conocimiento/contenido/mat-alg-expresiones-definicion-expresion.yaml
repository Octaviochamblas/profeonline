semantic_id: MAT.ALG.EXPRESIONES.DEFINICION_EXPRESION
objetivo: Comprender la definición de Expresión Algebraica como una combinación de
  términos vinculados por sumas y restas.
introduccion: Ya conocemos los vagones individuales (términos). Ahora es el momento
  de engancharlos para formar trenes matemáticos completos. Un tren puede tener un
  vagón o cien vagones.
resumen: Una **Expresión Algebraica** es la representación de un símbolo algebraico
  o de **una o más operaciones algebraicas**. Básicamente, es cualquier conjunto válido
  de números y letras (términos) unidos por los signos de adición o sustracción.
explicacion: 'Cualquier trozo de matemáticas que escribas siguiendo las reglas es
  una expresión algebraica.

  - Ejemplos de expresiones de 1 término: $5x$, $-y^2$, $\frac{a}{b}$.

  - Ejemplos de expresiones de 2 términos: $x + y$, $a^2 - b^2$.

  - Ejemplos de expresiones de 3 términos: $a + b + c$, $x^2 + 5x + 6$.


  La expresión algebraica es el concepto general, el ''paraguas''. Luego, dependiendo
  de cuántos términos la compongan, la clasificaremos con nombres específicos (Monomios,
  Binomios, Polinomios).'
procedimiento:
- 'Paso 1: Observa el conjunto de números, letras y operaciones matemáticas.'
- 'Paso 2: Si no hay un signo igual (=) o de desigualdad (<, >), es una expresión
  pura.'
- 'Paso 3: Si tiene un igual, se convierte en una ecuación (una igualdad entre dos
  expresiones).'
ejemplos:
- titulo: Todo cabe en el paraguas
  enunciado: ¿Es '(x^2 + y) / 2' una expresión algebraica?
  solucion_pasos:
  - Tiene variables (x, y).
  - Tiene operaciones (potencia, suma, división).
  - Cumple la sintaxis matemática. Sí, es una expresión algebraica válida.
errores_frecuentes:
- Confundir una 'expresión' con una 'ecuación'. Una expresión (ej. $2x + 1$) no se
  'resuelve' ni se 'despeja', solo se evalúa o simplifica. La ecuación ($2x + 1 =
  5$) sí se resuelve porque tiene un signo igual.
- Creer que si tiene solo un término no es una 'expresión'. Las expresiones pueden
  tener desde 1 hasta infinitos términos.
fuente: Álgebra de Baldor.
estado: publicado
