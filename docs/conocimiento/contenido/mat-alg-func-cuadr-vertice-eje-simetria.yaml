semantic_id: MAT.ALG.FUNC_CUADR_VERTICE.EJE_SIMETRIA
titulo: Cálculo de la ecuación del eje de simetría de la parábola
objetivo: Calcular la ecuación de la recta vertical que corresponde al eje de simetría de una función cuadrática.
introduccion: Toda parábola es simétrica respecto a una recta vertical imaginaria que pasa exactamente por su
  vértice, dividiéndola en dos mitades que son reflejo exacto una de la otra.
resumen: El **eje de simetría** de $f(x)=ax^2+bx+c$ es la recta vertical $x=-\dfrac{b}{2a}$, que pasa exactamente
  por la coordenada $x$ del vértice.
explicacion: '### Definición formal


  El eje de simetría de la parábola $f(x)=ax^2+bx+c$ es la recta vertical $x=-\dfrac{b}{2a}$. Esta recta divide
  la parábola en dos mitades simétricas: para cualquier punto $(x_0,y_0)$ de la gráfica, el punto reflejado $(2\cdot(-b/2a)-x_0,y_0)$
  también pertenece a la gráfica.


  ### Desarrollo didáctico


  Calcular el eje de simetría es idéntico a calcular la coordenada $x$ del vértice; la diferencia es que el eje
  de simetría se expresa como una ecuación de recta ($x=\ldots$), no como un número aislado.


  Para $f(x)=x^2-8x+12$: el eje de simetría es $x=-\dfrac{-8}{2(1)}=4$, es decir, la recta vertical $x=4$.'
procedimiento:
- 'Paso 1: Identifica los coeficientes $a$ y $b$ de la función.'
- 'Paso 2: Calcula $-\dfrac{b}{2a}$.'
- 'Paso 3: Expresa el resultado como la ecuación de la recta vertical $x=-\dfrac{b}{2a}$.'
ejemplos:
- titulo: Cálculo del eje de simetría con coeficiente a igual a 1
  enunciado: 'Calcula el eje de simetría de $f(x)=x^2-10x+21$.'
  solucion_pasos:
  - '$a=1$, $b=-10$.'
  - '$x=-\dfrac{-10}{2(1)}=5$.'
  - El eje de simetría es la recta $x=5$.
- titulo: Cálculo del eje de simetría con coeficiente a distinto de 1
  enunciado: 'Calcula el eje de simetría de $f(x)=3x^2+12x-2$.'
  solucion_pasos:
  - '$a=3$, $b=12$.'
  - '$x=-\dfrac{12}{2(3)}=-2$.'
  - El eje de simetría es la recta $x=-2$.
- titulo: ¿El eje de simetría pasa exactamente por la coordenada $x$ del vértice?
  enunciado: ¿El eje de simetría pasa exactamente por la coordenada $x$ del vértice?
  respuesta: Sí
  solucion_pasos:
  - Ambos se calculan con la misma fórmula, $-b/(2a)$.
- titulo: ¿El eje de simetría es una recta horizontal?
  enunciado: ¿El eje de simetría es una recta horizontal?
  respuesta: 'No'
  solucion_pasos:
  - El eje de simetría de una parábola vertical es siempre una recta vertical, de la forma $x=\text{constante}$.
errores_frecuentes:
- Expresar el eje de simetría como un número aislado en vez de como la ecuación de una recta ($x=\ldots$).
- Confundir el eje de simetría con una recta horizontal.
- Cometer errores de signo al calcular $-b/(2a)$, especialmente cuando $b$ es negativo.
- Confundir el eje de simetría con el eje $y$ del plano cartesiano.
