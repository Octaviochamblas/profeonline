semantic_id: MAT.ALG.VALORIZACION.EXPRESIONES_POTENCIAS
objetivo: Valorizar polinomios y fracciones algebraicas complejas donde las variables figuran como exponentes de
  otras variables o números.
introduccion: Hasta ahora las letras se mantenían en el suelo. Pero a veces, las incógnitas deciden volar y sentarse
  en el exponente. Esto es el corazón del crecimiento exponencial (como las pandemias o el interés compuesto).
resumen: 'Cuando la **Variable está en el Exponente**, la sustitución sigue la misma regla: se coloca el número
  en el lugar de la letra. Sin embargo, la operación resultante será calcular **cuántas veces se multiplica la base
  por sí misma**, según indique ese nuevo exponente numérico.'
explicacion: '### Definición formal


  Mientras que $3x$ para $x=4$ es sumar 3 cuatro veces ($3+3+3+3=12$), el modelo $3^x$ es multiplicar 3 cuatro veces
  ($3 \cdot 3 \cdot 3 \cdot 3 = 81$).


  ### Desarrollo didáctico


  Observa la expresión $2^x$.

  Si $x = 3$:

  1. Sustituimos la $x$ en el ''cielo'': $2^{(3)}$.

  2. Esto NO es $2 \cdot 3$. Es una potencia.

  3. Calculamos: $2 \cdot 2 \cdot 2 = 8$.


  Si la expresión es más compleja, como $3^{x+1}$ con $x=1$:

  Primero debes resolver la suma ''en el cielo'' antes de aplicar la potencia.

  - Cielo: $1 + 1 = 2$.

  - Potencia: $3^2 = 9$.'
procedimiento:
- 'Paso 1: Identifica las variables que están posicionadas como exponentes (arriba a la derecha).'
- 'Paso 2: Sustitúyelas por su valor numérico.'
- 'Paso 3: Si hay sumas, restas o multiplicaciones en el exponente, resuélvelas primero para tener un solo número
  como exponente.'
- 'Paso 4: Desarrolla la potencia multiplicando la base base por sí misma la cantidad de veces que dicte el exponente.'
- Mientras que $3x$ para $x=4$ es sumar 3 cuatro veces ($3+3+3+3=12$), el modelo $3^x$ es multiplicar 3 cuatro veces
  ($3 \cdot 3 \cdot 3 \cdot 3 = 81$).
ejemplos:
- titulo: Elevado a la equis
  enunciado: Valora 5^{n-2} para n=4.
  solucion_pasos:
  - 'Sustituimos la n en el exponente: 5^{(4-2)}.'
  - 'Resolvemos la resta en el exponente: 5^2.'
  - 'Calculamos la potencia: 5 * 5 = 25.'
- titulo: Un biólogo modela el crecimiento de una bacteria con la expresión poblacional $P = 100 \cdot
  enunciado: 'Un biólogo modela el crecimiento de una bacteria con la expresión poblacional $P = 100 \cdot 2^{t/3}$,
    donde $t$ es el tiempo en horas. ¿Qué población existirá exactamente a las $9$ horas de iniciado el cultivo?
    (v1)


    Opciones: A) $800$ · B) $600$ · C) $900$ · D) $1800$'
  solucion_pasos:
  - 'Sustituimos $t=9$. Exponente: $9/3 = 3$. La fórmula queda $100 \cdot 2^3$. Resolvemos la potencia primero:
    $2^3 = 8$. Finalmente multiplicamos: $100 \cdot 8 = 800$.'
  - 'Respuesta: $800$'
- titulo: 'Respecto de «Valorización de expresiones con potencias»: ¿Se ajusta a la definición esta afi'
  enunciado: 'Respecto de «Valorización de expresiones con potencias»: ¿Se ajusta a la definición esta afirmación?
    «Cuando la **Variable está en el Exponente**, la sustitución sigue la misma regla: se coloca el número en el
    lugar de la letra»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Cuando la **Variable está en el Exponente**, la sustitución
    sigue la misma regla: se coloca el número en el lugar de la letra.'
- titulo: 'Respecto de «Valorización de expresiones con potencias»: ¿Es compatible con el procedimiento'
  enunciado: 'Respecto de «Valorización de expresiones con potencias»: ¿Es compatible con el procedimiento esta
    afirmación? «Multiplicar la base por el exponente (ej. decir que $2^3$ es $6$ en lugar de $8$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Cuando la **Variable está en el Exponente**, la sustitución
    sigue la misma regla: se coloca el número en el lugar de la letra.'
errores_frecuentes:
- Multiplicar la base por el exponente (ej. decir que $2^3$ es $6$ en lugar de $8$).
- Aplicar la potencia antes de resolver las operaciones en el exponente (ej. en $3^{x+1}$ elevar primero a la $x$
  y luego sumarle 1 al resultado general).
- No altera en nada, son simplemente dos formas distintas de escribir una multiplicación.
- Transforma la operación en una suma reiterada.
- Para «Cuando en una expresión matemática la variable actúa como exponente (ej. $3^x$), ¿cómo altera esto la naturaleza
  de la operación en comparación con un coeficiente (ej. $3x$)? (v1)», la respuesta correcta es Obliga a que la
  base se invierta.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Valorización de expresiones con potencias
