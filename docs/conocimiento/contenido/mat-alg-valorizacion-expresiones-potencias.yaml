semantic_id: MAT.ALG.VALORIZACION.EXPRESIONES_POTENCIAS
objetivo: Valorizar polinomios y fracciones algebraicas complejas donde las variables
  figuran como exponentes de otras variables o números.
introduccion: Hasta ahora las letras se mantenían en el suelo. Pero a veces, las incógnitas
  deciden volar y sentarse en el exponente. Esto es el corazón del crecimiento exponencial
  (como las pandemias o el interés compuesto).
resumen: 'Cuando la **Variable está en el Exponente**, la sustitución sigue la misma
  regla: se coloca el número en el lugar de la letra. Sin embargo, la operación resultante
  será calcular **cuántas veces se multiplica la base por sí misma**, según indique
  ese nuevo exponente numérico.'
explicacion: 'Observa la expresión $2^x$.

  Si $x = 3$:

  1. Sustituimos la $x$ en el ''cielo'': $2^{(3)}$.

  2. Esto NO es $2 \cdot 3$. Es una potencia.

  3. Calculamos: $2 \cdot 2 \cdot 2 = 8$.


  Si la expresión es más compleja, como $3^{x+1}$ con $x=1$:

  Primero debes resolver la suma ''en el cielo'' antes de aplicar la potencia.

  - Cielo: $1 + 1 = 2$.

  - Potencia: $3^2 = 9$.'
procedimiento:
- 'Paso 1: Identifica las variables que están posicionadas como exponentes (arriba
  a la derecha).'
- 'Paso 2: Sustitúyelas por su valor numérico.'
- 'Paso 3: Si hay sumas, restas o multiplicaciones en el exponente, resuélvelas primero
  para tener un solo número como exponente.'
- 'Paso 4: Desarrolla la potencia multiplicando la base base por sí misma la cantidad
  de veces que dicte el exponente.'
ejemplos:
- titulo: Elevado a la equis
  enunciado: Valora 5^{n-2} para n=4.
  solucion_pasos:
  - 'Sustituimos la n en el exponente: 5^{(4-2)}.'
  - 'Resolvemos la resta en el exponente: 5^2.'
  - 'Calculamos la potencia: 5 * 5 = 25.'
errores_frecuentes:
- Multiplicar la base por el exponente (ej. decir que $2^3$ es $6$ en lugar de $8$).
- Aplicar la potencia antes de resolver las operaciones en el exponente (ej. en $3^{x+1}$
  elevar primero a la $x$ y luego sumarle 1 al resultado general).
fuente: Álgebra de Baldor.
estado: publicado
