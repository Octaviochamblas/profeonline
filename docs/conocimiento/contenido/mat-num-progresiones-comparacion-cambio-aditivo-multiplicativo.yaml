semantic_id: MAT.NUM.PROGRESIONES_COMPARACION.CAMBIO_ADITIVO_MULTIPLICATIVO
objetivo: Diferenciar entre situaciones reales que presentan cambio aditivo (lineal)
  y cambio multiplicativo (exponencial).
introduccion: '¿Tu sueldo crece de la misma manera que una infección viral? Afortunadamente
  no (o lamentablemente, dependiendo cómo lo mires). El universo matemático tiene
  dos engranajes principales: el que suma y el que multiplica.'
resumen: 'El **cambio aditivo** (P.A.) suma o resta cantidades fijas (ej: $+ $\$1000$
  diarios$). El **cambio multiplicativo** (P.G.) multiplica por factores fijos, generalmente
  descritos como porcentajes o palabras de proporción (ej: aumenta un $10\%$, o se
  *triplica*).'
explicacion: 'Lee atentamente los enunciados. Tienes que ser un detective de palabras
  clave:


  **Señales de Cambio Aditivo (Usa Progresión Aritmética):**

  - ''Aumenta en 5 litros por minuto''

  - ''Suma $\$500$ cada día''

  - ''Pierde 3 puntos por cada error''

  - Características: La gráfica de este crecimiento es una línea recta (Función Lineal).


  **Señales de Cambio Multiplicativo (Usa Progresión Geométrica):**

  - ''Aumenta un $5\%$ mensual'' (Porcentajes = Siempre P.G.)

  - ''Se duplica, se triplica, se reduce a la mitad''

  - ''Por cada hora, crece a un factor de 1.5''

  - Características: La gráfica es una curva que despega violentamente o cae en picada
  (Función Exponencial).'
procedimiento:
- 'Paso 1: Busca la palabra que describe cómo ocurre el cambio en el tiempo.'
- 'Paso 2: Si el cambio se expresa en unidades directas (metros, pesos, litros), el
  modelo es Aditivo (P.A.).'
- 'Paso 3: Si el cambio se expresa en multiplicadores (''el doble'') o porcentajes
  (''15%''), el modelo es Multiplicativo (P.G.).'
ejemplos:
- titulo: Contrato A vs Contrato B
  enunciado: 'Contrato A: Sueldo inicial 1 millón, sube $50.000 cada año. Contrato
    B: Sueldo inicial 1 millón, sube 5% cada año. Clasifícalos.'
  solucion_pasos:
  - 'Contrato A: Sube una cantidad en pesos directos (50.000). Es un cambio Aditivo
    (Progresión Aritmética).'
  - 'Contrato B: Sube en base a un porcentaje (5%). Es un cambio Multiplicativo (Progresión
    Geométrica).'
  - Al principio son parecidos, pero a largo plazo el Contrato B ganará por goleada
    exponencial.
errores_frecuentes:
- 'Confundir un porcentaje fijo con un cambio aditivo (Ej: ''Si sube 10% cada año,
  es una suma constante''. No, porque ese 10% se calcula sobre montos cada vez más
  grandes, es multiplicativo).'
- Asumir que si la cantidad restada es muy grande, debe ser exponencial.
fuente: Currículum Nacional MINEDUC.
estado: publicado
