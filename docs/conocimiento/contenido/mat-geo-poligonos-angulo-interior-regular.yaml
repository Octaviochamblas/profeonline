semantic_id: MAT.GEO.POLIGONOS_METRICA.ANGULO_INTERIOR_REGULAR
titulo: Cálculo de la medida de cada ángulo interior en un polígono regular
objetivo: Calcular la medida exacta de cada ángulo interior de un polígono regular usando la fórmula 180°(n-2)/n.
introduccion: Combinando la fórmula de suma de ángulos interiores con la propiedad de congruencia de ángulos
  en polígonos regulares, se puede calcular directamente la medida de cada ángulo individual.
resumen: En un polígono regular de $n$ lados, cada ángulo interior mide $\frac{180°(n-2)}{n}$.
explicacion: '![Ángulo interior de un polígono regular](/static/img/geometria/poligonos-cuadrilateros/poligonos-angulo-interior-regular.svg)


  ### Definición formal


  Como la suma de ángulos interiores es $180°(n-2)$ y todos los ángulos son congruentes (por ser regular),
  cada ángulo individual mide $\frac{180°(n-2)}{n}$.


  ### Desarrollo didáctico


  Un pentágono regular ($n=5$) tiene cada ángulo interior igual a $\frac{180°\times3}{5}=\frac{540°}{5}=108°$.
  Esta fórmula combina dos ideas ya estudiadas: la suma total de ángulos interiores, y su distribución
  uniforme entre los n ángulos del polígono regular.'
procedimiento:
- 'Paso 1: Identifica el número de lados n del polígono regular.'
- 'Paso 2: Calcula la suma de ángulos interiores: 180°(n-2).'
- 'Paso 3: Divide esa suma entre n para obtener la medida de cada ángulo interior individual.'
ejemplos:
- titulo: Calcular el ángulo interior de un pentágono regular
  enunciado: Un pentágono regular tiene 5 lados.
  solucion_pasos:
  - Ángulo interior=180×3/5=540/5=108°.
- titulo: Calcular el ángulo interior de un decágono regular
  enunciado: Un decágono regular tiene 10 lados.
  solucion_pasos:
  - Ángulo interior=180×8/10=1440/10=144°.
- titulo: ¿Esta fórmula aplica a polígonos irregulares?
  respuesta: 'No'
  solucion_pasos:
  - No, solo aplica a polígonos regulares, donde todos los ángulos son iguales y se puede dividir la suma
    total equitativamente.
- titulo: ¿El ángulo interior de un polígono regular aumenta con el número de lados?
  respuesta: Sí
  solucion_pasos:
  - Sí, a medida que n crece, el ángulo interior se acerca cada vez más a 180°.
errores_frecuentes:
- Aplicar esta fórmula a un polígono irregular, donde los ángulos no son todos iguales.
- Olvidar dividir entre n después de calcular la suma total de ángulos interiores.
- Confundir el ángulo interior con el ángulo exterior correspondiente (que es su suplemento).
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 47.'
estado: publicado
