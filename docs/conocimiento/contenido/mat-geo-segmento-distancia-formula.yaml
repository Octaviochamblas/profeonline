semantic_id: MAT.GEO.SEGMENTO_METRICA.DISTANCIA_DOS_PUNTOS
titulo: Fórmula de distancia entre dos puntos en el plano cartesiano
objetivo: Reconocer y comprender la fórmula que permite calcular la distancia entre dos puntos cualesquiera
  del plano cartesiano.
introduccion: La distancia entre dos puntos en el plano se calcula igual que la hipotenusa de un triángulo
  rectángulo, usando el teorema de Pitágoras con las diferencias de coordenadas.
resumen: La distancia entre dos puntos $A(x_1,y_1)$ y $B(x_2,y_2)$ en el plano cartesiano se calcula como
  $d(A,B)=\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}$.
explicacion: '![Fórmula de distancia entre dos puntos](/static/img/geometria/cartesiano-vectores/segmento-distancia-formula.svg)


  ### Definición formal


  La fórmula de distancia se deduce del teorema de Pitágoras: la diferencia de abscisas ($\Delta x=x_2-x_1$)
  y la diferencia de ordenadas ($\Delta y=y_2-y_1$) forman los catetos de un triángulo rectángulo, cuya
  hipotenusa es exactamente la distancia entre los puntos: $d(A,B)=\sqrt{(\Delta x)^2+(\Delta y)^2}$.


  ### Desarrollo didáctico


  En la figura, los puntos $A(-3,-2)$ y $B(4,3)$ forman, junto con el punto auxiliar $(4,-2)$, un triángulo
  rectángulo. Los catetos son $\Delta x=4-(-3)=7$ y $\Delta y=3-(-2)=5$, y la distancia $AB$ es la hipotenusa
  de ese triángulo.'
procedimiento:
- 'Paso 1: Identifica las coordenadas de los dos puntos: A(x₁,y₁) y B(x₂,y₂).'
- 'Paso 2: Calcula las diferencias Δx=x₂-x₁ y Δy=y₂-y₁.'
- 'Paso 3: Aplica la fórmula d(A,B)=√((Δx)²+(Δy)²) para obtener la distancia.'
ejemplos:
- titulo: Plantear la fórmula de distancia con dos puntos genéricos
  enunciado: Se tienen los puntos A(x₁,y₁) y B(x₂,y₂).
  solucion_pasos:
  - La distancia es d(A,B)=√((x₂-x₁)²+(y₂-y₁)²), aplicando el teorema de Pitágoras a las diferencias de
    coordenadas.
- titulo: Identificar los catetos del triángulo auxiliar
  enunciado: Se traza un triángulo rectángulo auxiliar entre A y B.
  solucion_pasos:
  - Los catetos son las diferencias Δx y Δy; la hipotenusa de ese triángulo es la distancia AB.
- titulo: ¿La fórmula de distancia se basa en el teorema de Pitágoras?
  respuesta: Sí
  solucion_pasos:
  - Sí, la distancia entre dos puntos es exactamente la hipotenusa de un triángulo rectángulo formado
    por las diferencias de coordenadas.
- titulo: ¿El orden de resta (x₂-x₁ o x₁-x₂) afecta el resultado final?
  respuesta: 'No'
  solucion_pasos:
  - No, porque ambas diferencias se elevan al cuadrado, eliminando cualquier signo negativo.
errores_frecuentes:
- Olvidar elevar al cuadrado las diferencias antes de sumarlas.
- Olvidar sacar la raíz cuadrada al final del cálculo.
- Restar las coordenadas en el orden incorrecto sin darse cuenta de que el cuadrado elimina el signo de
  todas formas.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 121, Cid 75).'
estado: publicado
