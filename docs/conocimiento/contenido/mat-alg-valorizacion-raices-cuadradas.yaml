semantic_id: MAT.ALG.VALORIZACION.RAICES_CUADRADAS
objetivo: Valorizar expresiones que contienen raíces cuadradas u otros radicales.
introduccion: A veces, las fórmulas matemáticas nos obligan a buscar el origen de un número. Si una sala cuadrada
  tiene un área de 25 metros, ¿cuánto mide su lado? La respuesta yace en la raíz cuadrada.
resumen: Para valorizar una **Expresión con Raíces**, primero se debe **calcular completamente el valor numérico
  de todo lo que está dentro de la raíz** (el radicando). Una vez obtenido ese número final, se le extrae la raíz.
explicacion: '### Definición formal


  El ''techo'' de la raíz encapsula toda la expresión subradical. Debes reducir todo a un solo número antes de aplicar
  la raíz. Separar raíces en sumas es un error fatal en matemáticas.


  ### Desarrollo didáctico


  Imagina la expresión $\sqrt{b^2 - 4ac}$. (Te sonará conocida.).

  Para valorizarla, digamos con $a=1, b=5, c=6$:

  1. Sustituimos dentro del ''techo'' de la raíz: $\sqrt{(5)^2 - 4(1)(6)}$.

  2. Resolvemos el interior usando jerarquía. Primero potencias y multiplicaciones: $\sqrt{25 - 24}$.

  3. Hacemos la resta: $\sqrt{1}$.

  4. Solo al final, cuando queda un solo número bajo el techo, extraemos la raíz: $1$.


  Regla de hierro: **Jamás** separes una suma o resta que está bajo una raíz en dos raíces diferentes. $\sqrt{16
  + 9}$ es $\sqrt{25} = 5$. Si lo separas como $\sqrt{16} + \sqrt{9}$ obtendrías $4 + 3 = 7$, lo cual es matemáticamente
  falso.'
procedimiento:
- 'Paso 1: Sustituye las letras por los números dentro de la raíz.'
- 'Paso 2: Resuelve todas las operaciones bajo el techo de la raíz hasta reducirlo a un solo número.'
- 'Paso 3: Calcula la raíz de ese número final.'
- 'Paso 4: Si la raíz estaba multiplicando o sumando a otras cosas fuera de ella, usa ese resultado para continuar
  el cálculo general.'
- El 'techo' de la raíz encapsula toda la expresión subradical. Debes reducir todo a un solo número antes de aplicar
  la raíz. Separar raíces en sumas es un error fatal en matemáticas.
ejemplos:
- titulo: El techo protector
  enunciado: Valora la expresión \sqrt{2x + 1} para x=4.
  solucion_pasos:
  - 'Sustituimos la x dentro de la raíz: \sqrt{2(4) + 1}.'
  - 'Resolvemos la multiplicación interior: \sqrt{8 + 1}.'
  - 'Sumamos el interior: \sqrt{9}.'
  - 'Extraemos la raíz: 3.'
- titulo: La velocidad de escape de un planeta simplificado se modela como $v = \sqrt{2GM}$. Si un sim
  enunciado: 'La velocidad de escape de un planeta simplificado se modela como $v = \sqrt{2GM}$. Si un simulador
    asigna $G = 8$ y $M = 9$, ¿cuál será la velocidad de escape $v$? (v1)


    Opciones: A) $12$ · B) $144$ · C) $72$ · D) $24$'
  solucion_pasos:
  - 'Sustituimos dentro: $2(8)(9) = 16 \cdot 9 = 144$. Ahora extraemos la raíz del interior completo: $\sqrt{144}
    = 12$.'
  - 'Respuesta: $12$'
- titulo: 'Respecto de «Valorización de expresiones con raíces cuadradas»: ¿Se ajusta a la definición e'
  enunciado: 'Respecto de «Valorización de expresiones con raíces cuadradas»: ¿Se ajusta a la definición esta afirmación?
    «Para valorizar una **Expresión con Raíces**, primero se debe **calcular completamente el valor numérico de
    todo lo que está dentro de la raíz** (el radicando)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Para valorizar una **Expresión con Raíces**, primero se debe
    **calcular completamente el valor numérico de todo lo que está dentro de la raíz** (el radicando).'
- titulo: 'Respecto de «Valorización de expresiones con raíces cuadradas»: ¿Es compatible con el proced'
  enunciado: 'Respecto de «Valorización de expresiones con raíces cuadradas»: ¿Es compatible con el procedimiento
    esta afirmación? «Extraer raíces parciales de sumas (ej. decir que $\sqrt{a^2 + b^2}$ es igual a $a + b$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Para valorizar una **Expresión con Raíces**, primero se debe
    **calcular completamente el valor numérico de todo lo que está dentro de la raíz** (el radicando).'
errores_frecuentes:
- Extraer raíces parciales de sumas (ej. decir que $\sqrt{a^2 + b^2}$ es igual a $a + b$).
- Aplicar la raíz al primer número que ven y luego sumar el resto.
- El radical exige que se le extraiga la raíz primero a la $x$ y luego a la $y$ por separado.
- Para «Al valorar una expresión como $\sqrt{x + y}$, ¿qué principio fundamental rige el orden de las operaciones
  respecto al símbolo radical? (v1)», la respuesta correcta es El radical debe resolverse al mismo tiempo que las
  multiplicaciones interiores.
- El orden no importa, siempre dará el mismo resultado.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Valorización de expresiones con raíces cuadradas
