semantic_id: MAT.NUM.COMPLEJOS.CONJUGADO
objetivo: Obtener y verificar el conjugado de un complejo.
introduccion: Cambiar el signo imaginario produce una simetría geométrica y, al multiplicar,
  elimina la componente con \(i\). Ambas lecturas explican la utilidad del conjugado.
resumen: El conjugado de \(z=a+bi\) es \(\overline z=a-bi\). El conjugado refleja
  el punto respecto del eje real y cumple \(z\overline z=a^2+b^2\).
explicacion: |-
  El conjugado de \(z=a+bi\) es \(\overline z=a-bi\).

  La situación “si \(z=4-7i\), entonces \(\overline z=4+7i\)” permite comprobar, y no solo memorizar, que el conjugado refleja el punto respecto del eje real y cumple \(z\overline z=a^2+b^2\)
procedimiento:
- 'Paso 1: Conserva la parte real sin cambios.'
- 'Paso 2: Cambia únicamente el signo del coeficiente imaginario.'
- 'Paso 3: Multiplica por el original o refleja el punto para comprobar el resultado.'
ejemplos:
- titulo: Aplicación razonada — Conjugado de un número complejo
  enunciado: Si \(z=4-7i\), entonces \(\overline z=4+7i\).
  solucion_pasos:
  - Conserva la parte real sin cambios.
  - Cambia únicamente el signo del coeficiente imaginario.
  - Multiplica por el original o refleja el punto para comprobar el resultado.
- titulo: Revisión de una solución — Conjugado de un número complejo
  enunciado: Una solución aplica “Cambia únicamente el signo del coeficiente imaginario.”,
    pero termina sin comprobar que el conjugado refleja el punto respecto del eje
    real y cumple \(z\overline z=a^2+b^2\). Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conjugado de un número complejo: el conjugado
    de \(z=a+bi\) es \(\overline z=a-bi\).'
  - Conserva la parte real sin cambios.
  - 'Completa la revisión con este control: Multiplica por el original o refleja el
    punto para comprobar el resultado.'
- titulo: ¿Se cumple que el conjugado refleja el punto respecto del eje real y cumple
    \(z\overline z=a^2+b^2\)? — Conjugado de un número complejo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que el conjugado de \(z=a+bi\) es \(\overline
    z=a-bi\).
  - El caso “si \(z=4-7i\), entonces \(\overline z=4+7i\)” satisface esa condición.
  - Multiplica por el original o refleja el punto para comprobar el resultado.
- titulo: ¿Es válido omitir el paso “Conserva la parte real sin cambios”? — Conjugado
    de un número complejo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conjugado de un número complejo.
  - 'Omitirlo puede volver inválida la acción siguiente: Cambia únicamente el signo
    del coeficiente imaginario.'
  - 'La solución debe terminar de este modo: Multiplica por el original o refleja
    el punto para comprobar el resultado.'
errores_frecuentes:
- 'Confundir conjugado de un número complejo con otro concepto y omitir este inicio:
  Conserva la parte real sin cambios.'
- Aplicar mecánicamente “Cambia únicamente el signo del coeficiente imaginario.” sin
  revisar las condiciones de la definición.
- Tomar “si \(z=4-7i\), entonces \(\overline z=4+7i\)” como una igualdad aislada,
  sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el conjugado refleja el punto
  respecto del eje real y cumple \(z\overline z=a^2+b^2\)”.
- 'Terminar el desarrollo sin realizar este control: Multiplica por el original o
  refleja el punto para comprobar el resultado.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
