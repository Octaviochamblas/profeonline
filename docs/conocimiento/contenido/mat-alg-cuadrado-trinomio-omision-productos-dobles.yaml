semantic_id: MAT.ALG.CUADRADO_TRINOMIO.OMISION_PRODUCTOS_DOBLES
titulo: Detección de error por omisión de productos dobles
objetivo: Evitar la tentación de simplificar $(a+b+c)^2$ a solo $a^2+b^2+c^2$.
introduccion: Si el error de omisión era malo con binomios, con trinomios omites 3 términos completos.
resumen: El desarrollo correcto tiene $6$ sumandos. Omitir los productos cruzados asumiendo que $(a+b+c)^2 = a^2+b^2+c^2$
  es un error conceptual grave de distribución de potencias en sumas.
explicacion: '### Definición formal


  El desarrollo correcto tiene $6$ sumandos. Omitir los productos cruzados asumiendo que $(a+b+c)^2 = a^2+b^2+c^2$
  es un error conceptual grave de distribución de potencias en sumas.


  ### Desarrollo didáctico


  El error algebraico más crítico al enfrentar un cuadrado de un trinomio $(a+b+c)^2$ es asumir, por falta de rigor
  o prisa, que el exponente se puede repartir directamente sobre cada sumando.


  **El error en cuestión:**

  $(a+b+c)^2 \neq a^2 + b^2 + c^2$


  **Por qué es incorrecto:**

  Distribuir potencias solo es matemáticamente válido a través de multiplicaciones o divisiones (ej. $(abc)^2 =
  a^2b^2c^2$), nunca a través de sumas o restas. Si omites los dobles productos ($2ab+2ac+2bc$), estás ignorando
  deliberadamente seis de los nueve términos que se originan de la distributividad real $(a+b+c)(a+b+c)$.


  Si un estudiante comete este error calculando áreas o valores numéricos, estaría perdiendo gran parte del valor
  total. Para recordarlo, asimila que las sumas "generan puentes" (términos cruzados) entre las variables al elevarse
  a una potencia.'
procedimiento:
- 'Paso 1: Al auditar cálculos ajenos, cuenta cuántos términos se generaron al desarrollar un trinomio al cuadrado.
  Deben ser 6 antes de reducir términos semejantes.'
- Faltan los 3 dobles productos ($2xy, 2xz, 2yz$).
ejemplos:
- titulo: Auditoría
  enunciado: 'Detecta el error en: $(x-y-1)^2 = x^2 - y^2 + 1$.'
  solucion_pasos:
  - Primero, el cuadrado de $-y$ debe ser $+y^2$.
  - 'Segundo, faltan todos los productos cruzados: $-2xy$, $-2x$, $+2y$.'
- titulo: Cuántos términos omite el estudiante que asume que $(x+y+z)^2 = x^2+y^2+z^2$
  enunciado: '¿Cuántos términos omite el estudiante que asume que $(x+y+z)^2 = x^2+y^2+z^2$?


    Opciones: A) Omite $3$ términos. · B) Omite $1$ término. · C) Omite $6$ términos. · D) No omite ninguno.'
  solucion_pasos:
  - Faltan los 3 dobles productos ($2xy, 2xz, 2yz$).
  - 'Respuesta: Omite $3$ términos.'
- titulo: 'Respecto de «Detección de error por omisión de productos dobles»: ¿Se ajusta a la definición'
  enunciado: 'Respecto de «Detección de error por omisión de productos dobles»: ¿Se ajusta a la definición esta
    afirmación? «El desarrollo correcto tiene $6$ sumandos»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El desarrollo correcto tiene $6$ sumandos.'
- titulo: 'Respecto de «Detección de error por omisión de productos dobles»: ¿Es compatible con el proc'
  enunciado: 'Respecto de «Detección de error por omisión de productos dobles»: ¿Es compatible con el procedimiento
    esta afirmación? «Olvidar los productos cruzados»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El desarrollo correcto tiene $6$ sumandos.'
errores_frecuentes:
- Olvidar los productos cruzados.
- Omite $1$ término.
- Omite $6$ términos.
- Para «¿Cuántos términos omite el estudiante que asume que $(x+y+z)^2 = x^2+y^2+z^2$», la respuesta correcta es
  No omite ninguno.
- La afirmación «Omite $3$ términos» no es válida en este contenido.
