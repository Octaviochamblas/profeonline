semantic_id: MAT.GEO.ANGULOS_RELACIONES_METRICAS.COMPLEMENTO_CALCULO
titulo: Cálculo del complemento de un ángulo dado
objetivo: Calcular el complemento de un ángulo dado y comprobar que solo existe complemento positivo para
  medidas menores o iguales que 90°.
introduccion: Si ya tienes una parte de un ángulo recto, la otra parte se descubre mirando cuánto falta
  para completar 90°. Para resolver situaciones de cálculo del complemento de un ángulo dado conviene
  mirar el dibujo con método, no solo por intuición.
resumen: El complemento de un ángulo se obtiene restando su medida a 90°. Como idea de control, solo existe
  complemento positivo para medidas menores o iguales que 90°.
explicacion: 'El complemento de un ángulo se obtiene restando su medida a 90°.


  Cuando se analiza “el complemento de 27° es 63° porque \(90°-27°=63°\)” conviene evitar la memoria mecánica.
  El control decisivo es comprobar que solo existe complemento positivo para medidas menores o iguales
  que 90°.'
procedimiento:
- 'Paso 1: Comprueba que la medida dada no exceda 90°.'
- 'Paso 2: Resta la medida del ángulo a 90° respetando la unidad en grados.'
- 'Paso 3: Verifica que la suma entre el ángulo dado y el obtenido sea exactamente 90°.'
ejemplos:
- titulo: Situación geométrica — Cálculo del complemento
  enunciado: El complemento de 27° es 63° porque \(90°-27°=63°\).
  solucion_pasos:
  - Comprueba que la medida dada no exceda 90°.
  - Resta la medida del ángulo a 90° respetando la unidad en grados.
  - Verifica que la suma entre el ángulo dado y el obtenido sea exactamente 90°.
- titulo: Revisión del razonamiento — Cálculo del complemento
  enunciado: 'Un estudiante usa la idea “solo existe complemento positivo para medidas menores o iguales
    que 90°” al analizar este caso: el complemento de 27° es 63° porque \(90°-27°=63°\). Explica qué debe
    revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: el complemento de un ángulo se obtiene restando su medida a 90°.'
  - Resta la medida del ángulo a 90° respetando la unidad en grados.
  - Verifica que la suma entre el ángulo dado y el obtenido sea exactamente 90°.
- titulo: ¿Puede concluirse correctamente este hecho? — Cálculo del complemento
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: el complemento de un ángulo se obtiene restando
    su medida a 90°.'
  - En el caso “el complemento de 27° es 63° porque \(90°-27°=63°\)” se observa que solo existe complemento
    positivo para medidas menores o iguales que 90°.
  - Verifica que la suma entre el ángulo dado y el obtenido sea exactamente 90°.
- titulo: ¿Basta con comprueba que la medida dada no exceda 90°? — Cálculo del complemento
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de cálculo del complemento de un ángulo
    dado.
  - Después del paso “Comprueba que la medida dada no exceda 90°.” todavía hace falta revisar “Resta la
    medida del ángulo a 90° respetando la unidad en grados.”.
  - El cierre correcto exige “Verifica que la suma entre el ángulo dado y el obtenido sea exactamente
    90°.”.
errores_frecuentes:
- Cálculo del complemento significa sumar 90° a la medida dada para hallar el complemento.
- Para resolver cálculo del complemento, basta con el paso “Comprueba que la medida dada no exceda 90°.”
  y no hace falta revisar “Resta la medida del ángulo a 90° respetando la unidad en grados.”.
- Si el dibujo parece claro, se puede ignorar que solo existe complemento positivo para medidas menores
  o iguales que 90°.
- Dos configuraciones distintas representan cálculo del complemento solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Verifica que la suma entre el ángulo dado
  y el obtenido sea exactamente 90°.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
