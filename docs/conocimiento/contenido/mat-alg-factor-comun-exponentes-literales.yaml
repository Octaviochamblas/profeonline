semantic_id: MAT.ALG.FACTOR_COMUN.EXPONENTES_LITERALES
titulo: Extracción de factor común con exponentes literales
objetivo: Extraer factor común con exponentes literales y justificar el procedimiento algebraico.
introduccion: Para hallar el factor literal común se analiza cada variable por separado. Solo se incluyen las letras
  compartidas y, para cada una, se selecciona el menor exponente.
resumen: Extraer el menor exponente garantiza que todos los términos puedan ser divididos exactamente.
explicacion: '### Definición formal


  Para una variable $x$ presente en todos los términos con exponentes $e_1, \dots, e_n$, extraer $x^{\min(e_1,\dots,e_n)}$
  garantiza que cada cociente $x^{e_i - \min(e_1,\dots,e_n)}$ tenga exponente no negativo, es decir, que la división
  sea exacta en todos los términos.


  ### Desarrollo didáctico


  El exponente más pequeño de la x presente en todos los términos es el 2.


  Ambas letras aparecen en todos los términos de la expresión.


  $m^5/m^3 = m^2$ y $m^3/m^3 = 1$. Todo factor dividido por sí mismo da 1.'
procedimiento:
- El exponente más pequeño de la x presente en todos los términos es el 2.
- Ambas letras aparecen en todos los términos de la expresión.
- $m^5/m^3 = m^2$ y $m^3/m^3 = 1$. Todo factor dividido por sí mismo da 1.
ejemplos:
- titulo: El factor literal común en $x^5y^2 - x^4z$ es $x^4$
  enunciado: ¿El factor literal común en $x^5y^2 - x^4z$ es $x^4$?
  solucion_pasos:
  - La variable x es la única común a todos y su menor exponente es 4.
  - 'Respuesta: Verdadero'
- titulo: Al extraer $a^2$ de $a^2+a^3$, queda $a^2(0+a)$
  enunciado: ¿Al extraer $a^2$ de $a^2+a^3$, queda $a^2(0+a)$?
  solucion_pasos:
  - Queda a^2(1+a). Dividir algo por sí mismo da 1, no 0.
  - 'Respuesta: Falso'
- titulo: 'Respecto de «Extracción de factor común con exponentes literales»: ¿Describe adecuadamente e'
  enunciado: 'Respecto de «Extracción de factor común con exponentes literales»: ¿Describe adecuadamente el concepto
    esta frase? «Extraer el menor exponente garantiza que todos los términos puedan ser divididos exactamente»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Extraer el menor exponente garantiza que todos los términos
    puedan ser divididos exactamente.'
- titulo: 'Respecto de «Extracción de factor común con exponentes literales»: ¿Se puede aceptar esta af'
  enunciado: 'Respecto de «Extracción de factor común con exponentes literales»: ¿Se puede aceptar esta afirmación?
    «Para «¿Cuál es la regla para elegir el exponente de un factor común literal», la respuesta correcta es Elegir
    el mayor exponente presente»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Extraer el menor exponente garantiza que todos los términos
    puedan ser divididos exactamente.'
errores_frecuentes:
- Para «¿Cuál es la regla para elegir el exponente de un factor común literal», la respuesta correcta es Elegir
  el mayor exponente presente.
- Para «¿Cuál es la regla para elegir el exponente de un factor común literal», la respuesta correcta es Sumar todos
  los exponentes.
- Para «¿Cuál es la regla para elegir el exponente de un factor común literal», la respuesta correcta es Restar
  el mayor menos el menor.
- Para «¿Qué parte literal extraes en $x^4 + x^3 + x^2$», la respuesta correcta es $x^4$.
- Para «¿Qué parte literal extraes en $x^4 + x^3 + x^2$», la respuesta correcta es $x^3$.
