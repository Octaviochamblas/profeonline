semantic_id: MAT.ALG.ADICION_POL.METODO_VERTICAL
titulo: Adición de polinomios por alineación de términos semejantes
objetivo: Sumar polinomios mediante el método vertical, alineando los términos semejantes en columnas.
introduccion: 'Cuando en la escuela aprendiste a sumar números de varios dígitos (unidades con unidades,
  decenas con decenas), estabas usando el método vertical. En álgebra, la misma lógica se aplica: cada
  ''columna'' agrupa una familia de términos semejantes.'
resumen: En la **Adición Vertical**, los polinomios se escriben uno debajo del otro, alineando los términos
  semejantes en columnas. Luego se suma columna por columna, como en la aritmética de los números.
explicacion: "### Definición formal\n\nLa alineación visual por columnas es la gran fortaleza del método\
  \ vertical.\n\n### Desarrollo didáctico\n\nSuma: $(4x^2 + 3x - 5)$ y $(2x^2 - x + 1)$.\n\nAlineamos\
  \ verticalmente:\n```\n  4x² + 3x - 5\n+ 2x² -  x + 1\n─────────────\n  6x² + 2x - 4\n```\n\nEn cada\
  \ columna sumamos los coeficientes:\n- Columna $x^2$: $4 + 2 = 6$.\n- Columna $x$: $3 + (-1) = 2$.\n\
  - Columna constante: $-5 + 1 = -4$.\n\nResultado: $6x^2 + 2x - 4$."
procedimiento:
- 'Paso 1: Escribe el primer polinomio.'
- 'Paso 2: Escribe el segundo polinomio debajo, alineando estrictamente los términos del mismo grado en
  la misma columna.'
- 'Paso 3: Traza una línea horizontal separadora.'
- 'Paso 4: Suma columna por columna los coeficientes.'
ejemplos:
- titulo: La suma de los pesos
  enunciado: 'Suma verticalmente: $(2m^2 - 3m) + (m^2 + 5m - 4)$.'
  solucion_pasos:
  - 'Columna $m^2$: $2 + 1 = 3m^2$.'
  - 'Columna $m$: $-3 + 5 = 2m$.'
  - 'Columna constante: 0 + (-4) = -4.'
  - 'Resultado: $3m^2 + 2m - 4$.'
- titulo: Tres proyectos describen sus costos con los polinomios $P_1 = 2t^2 + 3t$, $P_2 = t^2 - t + 5
  enunciado: 'Tres proyectos describen sus costos con los polinomios $P_1 = 2t^2 + 3t$, $P_2 = t^2 - t
    + 5$ y $P_3 = 4t - 2$. ¿Cuál es el costo total combinado? (v1)


    Opciones: A) $3t^2 + 6t + 3$ · B) $3t^2 - 6t + 3$ · C) $3t^2 + 6t - 3$ · D) $7t^2 + 6t + 3$'
  solucion_pasos:
  - 'Col $t^2$: $2+1+0=3$. Col $t$: $3-1+4=6$. Col constante: $0+5-2=3$. Total: $3t^2+6t+3$.'
  - 'Respuesta: $3t^2 + 6t + 3$'
- titulo: 'Respecto de «Adición de polinomios por alineación de términos semejantes»: ¿La siguiente for'
  enunciado: 'Respecto de «Adición de polinomios por alineación de términos semejantes»: ¿La siguiente
    formulación es correcta? «En la **Adición Vertical**, los polinomios se escriben uno debajo del otro,
    alineando los términos semejantes en columnas»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: En la **Adición Vertical**, los polinomios se escriben
    uno debajo del otro, alineando los términos semejantes en columnas.'
- titulo: 'Respecto de «Adición de polinomios por alineación de términos semejantes»: ¿La siguiente con'
  enunciado: 'Respecto de «Adición de polinomios por alineación de términos semejantes»: ¿La siguiente
    conclusión es correcta? «Desalinear los términos, sumando coeficientes de distintas familias por error
    de columna»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En la **Adición Vertical**, los polinomios se escriben
    uno debajo del otro, alineando los términos semejantes en columnas.'
errores_frecuentes:
- Desalinear los términos, sumando coeficientes de distintas familias por error de columna.
- Olvidar que si un polinomio no tiene un término de cierto grado, se deja un espacio en blanco (coeficiente
  0) en esa columna.
- Es más rápido que el método horizontal siempre.
- Elimina la necesidad de identificar términos semejantes.
- Para «¿Cuál es la ventaja principal del método vertical para sumar polinomios? (v1)», la respuesta correcta
  es Permite multiplicar en lugar de sumar.
fuente: Álgebra de Baldor.
estado: publicado
