semantic_id: MAT.NUM.PROPORCIONES.MEDIA_PROPORCIONAL
titulo: Cálculo de la media proporcional
objetivo: Calcular la media proporcional en una proporción continua.
introduccion: Imagina que tienes una secuencia geométrica donde el número del medio es la clave para pasar
  del primero al último. En proporciones, cuando los dos números del centro son idénticos, a ese número
  lo llamamos media proporcional.
resumen: 'La media proporcional (o geométrica) es el término repetido en los medios de una proporción
  continua: $a/x = x/b$. Su valor es $x = \sqrt{a \cdot b}$.'
explicacion: 'Una proporción es **continua** si sus términos medios son iguales. En la proporción $a:x
  = x:b$, al término $x$ se le llama **media proporcional** entre $a$ y $b$.


  Aplicando el producto cruzado obtenemos $x \cdot x = a \cdot b$, es decir, $x^2 = ab$. Por lo tanto,
  la media proporcional se calcula extrayendo la raíz cuadrada del producto de los extremos: $x = \sqrt{ab}$.'
procedimiento:
- 'Paso 1: Identifica los dos extremos conocidos $a$ y $b$.'
- 'Paso 2: Multiplica esos dos valores ($a \cdot b$).'
- 'Paso 3: Extrae la raíz cuadrada del producto obtenido para hallar $x$.'
ejemplos:
- titulo: Hallando la media proporcional
  enunciado: Calcula la media proporcional entre 4 y 9.
  solucion_pasos:
  - 'Multiplicamos los extremos: $4 \cdot 9 = 36$.'
  - 'Extraemos la raíz cuadrada: $\sqrt{36} = 6$.'
  - La media proporcional es 6, ya que $4/6 = 6/9$.
- titulo: ¿Puede ser negativa?
  respuesta: Sí
  solucion_pasos:
  - Algebraicamente $x^2 = 36$ tiene como soluciones $6$ y $-6$. Generalmente en geometría se toma la
    positiva, pero matemáticamente ambas satisfacen la proporción.
errores_frecuentes:
- Confundirla con la media aritmética (sumar y dividir por dos).
- Olvidar sacar la raíz cuadrada después de multiplicar.
- Colocar la $x$ en un extremo en lugar de en los dos medios.
- Extraer la raíz de un solo término antes de multiplicar.
- Asumir que siempre dará un número entero (muchas veces es irracional).
fuente: Currículum Nacional MINEDUC.
estado: publicado
