semantic_id: MAT.GEO.RECTA_RELACIONES.PENDIENTE_INCLINACION
titulo: Relación entre pendiente y ángulo de inclinación de una recta
objetivo: Relacionar la pendiente de una recta con su ángulo de inclinación (el ángulo que forma con el
  semieje positivo de las x), mediante la tangente de ese ángulo.
introduccion: 'La pendiente no es un número arbitrario: está directamente relacionada con el ángulo que
  la recta forma con la horizontal, mediante la función tangente.'
resumen: 'La pendiente $m$ de una recta es igual a la tangente de su ángulo de inclinación $\alpha$ (medido
  desde el semieje positivo de las x en sentido antihorario): $m=\tan\alpha$.'
explicacion: '![Pendiente y ángulo de inclinación](/static/img/geometria/analitica/rectarel-pendiente-inclinacion.svg)


  ### Definición formal


  El ángulo de inclinación $\alpha$ de una recta (con $0°\le\alpha<180°$) es el ángulo que forma con el
  semieje positivo de las x, medido en sentido antihorario. Se cumple $m=\tan\alpha$.


  ### Desarrollo didáctico


  Una recta con pendiente $m=1$ tiene ángulo de inclinación $\alpha=45°$, ya que $\tan45°=1$. Una recta
  con $m=-1$ tiene $\alpha=135°$, ya que $\tan135°=-1$.'
procedimiento:
- 'Paso 1: Si conoces la pendiente m, calcula el ángulo de inclinación como α=arctan(m), ajustando el
  cuadrante si m es negativo.'
- 'Paso 2: Si conoces el ángulo de inclinación α, calcula la pendiente como m=tanα.'
- 'Paso 3: Recuerda que el ángulo de inclinación está siempre entre 0° y 180° (sin incluir 180°).'
ejemplos:
- titulo: Calcular el ángulo de inclinación de una recta con m=1
  enunciado: m=1.
  solucion_pasos:
  - α=arctan(1)=45°.
- titulo: Calcular la pendiente de una recta con ángulo de inclinación 60°
  enunciado: α=60°.
  solucion_pasos:
  - m=tan60°=√3≈1,73.
- titulo: ¿El ángulo de inclinación siempre está entre 0° y 180°?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición, sin incluir el valor 180° mismo.
- titulo: ¿Una pendiente negativa corresponde a un ángulo de inclinación obtuso?
  respuesta: Sí
  solucion_pasos:
  - Sí, ángulos entre 90° y 180° tienen tangente negativa, correspondiendo a pendientes negativas.
errores_frecuentes:
- Olvidar ajustar el ángulo al cuadrante correcto cuando la pendiente es negativa (arcotangente da directamente
  un ángulo negativo o agudo, no el de inclinación obtuso correspondiente).
- Confundir el ángulo de inclinación con el ángulo entre dos rectas distintas.
- Creer que el ángulo de inclinación puede ser mayor o igual a 180°.
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
