semantic_id: MAT.ALG.FUNC_CUADR_TRANSFORMACIONES.COMBINACION_TRANSFORMACIONES
titulo: Análisis de transformaciones combinadas en la gráfica cuadrática
objetivo: Analizar el efecto combinado de traslación horizontal, traslación vertical, reflexión y escala vertical
  en una función cuadrática dada en forma canónica.
introduccion: La forma canónica $a(x-h)^2+k$ concentra en una sola expresión las cuatro transformaciones posibles;
  saber leerlas todas juntas permite anticipar la gráfica completa sin necesidad de graficar punto por punto.
resumen: 'En $f(x)=a(x-h)^2+k$, se combinan simultáneamente: traslación horizontal ($h$), traslación vertical
  ($k$), concavidad (signo de $a$) y abertura (valor absoluto de $a$), todas aplicadas sobre la parábola base
  $x^2$.'
explicacion: '### Definición formal


  Dada $f(x)=a(x-h)^2+k$, la gráfica se obtiene a partir de $y=x^2$ aplicando, en cualquier orden lógico: una
  dilatación o contracción vertical según $|a|$, una reflexión respecto al eje $x$ si $a<0$, una traslación horizontal
  de $h$ unidades, y una traslación vertical de $k$ unidades.


  ### Desarrollo didáctico


  Para describir la transformación completa, conviene enumerar cada efecto por separado: el valor de $a$ (concavidad
  y abertura), y las coordenadas $(h,k)$ del vértice resultante.


  Para $f(x)=-2(x-3)^2+5$: parábola contraída (pues $|a|=2>1$), cóncava hacia abajo (pues $a=-2<0$), con vértice
  trasladado a $(3,5)$.'
procedimiento:
- 'Paso 1: Identifica el valor de $a$ y describe su efecto en concavidad y abertura.'
- 'Paso 2: Identifica $h$ (reescribiendo el binomio si es necesario) y describe la traslación horizontal.'
- 'Paso 3: Identifica $k$ y describe la traslación vertical.'
- 'Paso 4: Combina todos los efectos para describir la parábola completa, incluyendo su vértice final.'
ejemplos:
- titulo: Descripción combinada con vértice desplazado
  enunciado: 'Describe todas las transformaciones de $f(x)=3(x+2)^2-4$ respecto a $y=x^2$.'
  solucion_pasos:
  - 'Contraída (pues $|a|=3>1$), cóncava hacia arriba (pues $a=3>0$).'
  - 'Traslación horizontal: $h=-2$ (2 unidades a la izquierda).'
  - 'Traslación vertical: $k=-4$ (4 unidades hacia abajo). Vértice final: $(-2,-4)$.'
- titulo: Descripción combinada con reflexión
  enunciado: 'Describe todas las transformaciones de $f(x)=-\dfrac{1}{2}(x-1)^2+6$ respecto a $y=x^2$.'
  solucion_pasos:
  - 'Dilatada (pues $|a|=1/2<1$), cóncava hacia abajo (pues $a<0$).'
  - 'Traslación horizontal: $h=1$ (1 unidad a la derecha).'
  - 'Traslación vertical: $k=6$ (6 unidades hacia arriba). Vértice final: $(1,6)$.'
- titulo: ¿El orden en que se aplican las transformaciones afecta el resultado final de la gráfica?
  enunciado: ¿El orden en que se aplican las transformaciones afecta el resultado final de la gráfica?
  respuesta: 'No'
  solucion_pasos:
  - Todas las transformaciones descritas por la forma canónica se combinan de manera consistente, produciendo
    siempre la misma gráfica final.
- titulo: ¿El vértice final de la parábola siempre coincide con $(h,k)$, sin importar el valor de $a$?
  enunciado: ¿El vértice final de la parábola siempre coincide con $(h,k)$, sin importar el valor de $a$?
  respuesta: Sí
  solucion_pasos:
  - El coeficiente $a$ afecta concavidad y abertura, pero no altera la posición del vértice, determinada exclusivamente
    por $h$ y $k$.
errores_frecuentes:
- Omitir uno de los cuatro efectos (concavidad, abertura, traslación horizontal, traslación vertical) al describir
  la transformación completa.
- Confundir el orden o la dirección de alguna de las transformaciones individuales.
- No reescribir correctamente el binomio para identificar el signo real de $h$.
- Describir el vértice de forma incompleta, sin combinar correctamente $h$ y $k$.
