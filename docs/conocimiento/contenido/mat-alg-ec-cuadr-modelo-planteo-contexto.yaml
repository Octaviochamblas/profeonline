semantic_id: MAT.ALG.EC_CUADR_MODELO.PLANTEO_CONTEXTO
titulo: Traducción de problemas de lenguaje natural a ecuaciones de segundo grado
objetivo: Traducir un problema planteado en lenguaje natural a una ecuación de segundo grado que lo represente
  matemáticamente.
introduccion: Antes de resolver cualquier problema cuadrático de la vida real, hay que "traducirlo" del español
  a una ecuación; ese primer paso suele ser el más difícil de todo el proceso.
resumen: Traducir un problema a una ecuación de segundo grado implica identificar la incógnita, expresar las relaciones
  del enunciado en términos de esa incógnita, y plantear una igualdad que resulte en la forma $ax^2+bx+c=0$.
explicacion: '### Definición formal


  El planteo de un problema consiste en asignar una variable $x$ a la cantidad desconocida y traducir cada relación
  verbal del enunciado (sumas, productos, comparaciones) en una expresión algebraica, hasta obtener una igualdad
  equivalente a una ecuación de segundo grado.


  ### Desarrollo didáctico


  Suele ayudar identificar primero qué palabra clave corresponde a qué operación: "el producto de" indica multiplicación,
  "la suma de" indica adición, "es igual a" indica el signo igual.


  "El producto de un número y el número aumentado en 3 es igual a 40" se traduce como $x(x+3)=40$, una ecuación
  de segundo grado tras desarrollar.'
procedimiento:
- 'Paso 1: Define una variable $x$ para representar la cantidad desconocida.'
- 'Paso 2: Traduce cada relación del enunciado a una expresión algebraica en términos de $x$.'
- 'Paso 3: Plantea la igualdad completa y normalízala a la forma $ax^2+bx+c=0$.'
ejemplos:
- titulo: Traducción de un problema numérico simple
  enunciado: 'Traduce a ecuación: "El cuadrado de un número disminuido en 5 es igual a 20".'
  solucion_pasos:
  - Sea $x$ el número buscado.
  - '$x^2-5=20$, equivalente a $x^2-25=0$.'
- titulo: Traducción de un problema con producto
  enunciado: 'Traduce a ecuación: "El producto de dos números consecutivos es 56".'
  solucion_pasos:
  - Sea $x$ el primer número; el segundo es $x+1$.
  - '$x(x+1)=56$, equivalente a $x^2+x-56=0$.'
- titulo: ¿El primer paso al traducir un problema es siempre definir la incógnita?
  enunciado: ¿El primer paso al traducir un problema es siempre definir la incógnita?
  respuesta: Sí
  solucion_pasos:
  - Sin una variable claramente definida, no es posible traducir las relaciones del enunciado a expresiones algebraicas.
- titulo: ¿Toda ecuación cuadrática planteada a partir de un problema queda automáticamente en forma general?
  enunciado: ¿Toda ecuación cuadrática planteada a partir de un problema queda automáticamente en forma general?
  respuesta: 'No'
  solucion_pasos:
  - Generalmente hay que desarrollar productos y trasladar términos para normalizarla a la forma $ax^2+bx+c=0$.
errores_frecuentes:
- Definir la incógnita de forma ambigua, sin precisar exactamente qué representa.
- Traducir incorrectamente una relación verbal, por ejemplo confundiendo "el doble de un número" con "un número
  al cuadrado".
- Olvidar normalizar la ecuación planteada a su forma general antes de resolverla.
- No verificar que la ecuación planteada realmente sea de segundo grado tras desarrollarla.
