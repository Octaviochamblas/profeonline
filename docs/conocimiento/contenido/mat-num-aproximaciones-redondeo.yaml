semantic_id: MAT.NUM.APROXIMACIONES.REDONDEO
titulo: Redondeo de números decimales
objetivo: Aproximar un número decimal al valor más cercano en el orden indicado, según la cifra siguiente.
introduccion: 'El redondeo combina la aproximación por defecto y por exceso: se elige la que esté más
  cerca del número original, observando la cifra inmediatamente posterior al orden pedido.'
resumen: 'Para redondear un número al orden pedido se observa la cifra siguiente: si es 5 o mayor, se
  aumenta en una unidad la cifra conservada (redondeo por exceso); si es menor que 5, se mantiene sin
  cambios (redondeo por defecto).'
explicacion: '### Definición formal


  Redondear \(x\) al orden \(10^{-n}\) consiste en tomar la aproximación por defecto si la cifra en la
  posición \(n+1\) es menor que 5, o la aproximación por exceso si esa cifra es 5 o mayor, obteniendo
  así el múltiplo de \(10^{-n}\) más cercano a \(x\).


  ### Desarrollo didáctico


  Redondear \(12.46\) a la décima: la cifra siguiente a la décima es 6 (centésima), que es mayor que 5,
  así que se redondea por exceso, aumentando la décima de 4 a 5: resultado \(12.5\).'
procedimiento:
- 'Paso 1: Marca la cifra que quieres conservar y observa inmediatamente la siguiente.'
- 'Paso 2: Conserva si la siguiente es menor que \(5\); aumenta una unidad si es \(5\) o mayor.'
- 'Paso 3: Elimina las cifras restantes y compara la distancia al valor original.'
ejemplos:
- titulo: Aplicación razonada — Aproximación por redondeo
  enunciado: Redondear \(12.46\) a la décima da \(12.5\).
  solucion_pasos:
  - Marca la cifra que quieres conservar y observa inmediatamente la siguiente.
  - Conserva si la siguiente es menor que \(5\); aumenta una unidad si es \(5\) o mayor.
  - Elimina las cifras restantes y compara la distancia al valor original.
- titulo: Revisión de una solución — Aproximación por redondeo
  enunciado: Una solución aplica “Conserva si la siguiente es menor que \(5\); aumenta una unidad si es
    \(5\) o mayor.”, pero termina sin comprobar que el redondeo busca un valor cercano y fácil de usar
    conservando una precisión dada. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define aproximación por redondeo: redondear consiste en reemplazar un número
    por otro cercano según una cifra de referencia.'
  - Marca la cifra que quieres conservar y observa inmediatamente la siguiente.
  - 'Completa la revisión con este control: Elimina las cifras restantes y compara la distancia al valor
    original.'
- titulo: ¿Se cumple que el redondeo busca un valor cercano y fácil de usar conservando una precisión
    dada? — Aproximación por redondeo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que redondear consiste en reemplazar un número por otro cercano
    según una cifra de referencia.
  - El caso “Redondear \(12.46\) a la décima da \(12.5\)” satisface esa condición.
  - Elimina las cifras restantes y compara la distancia al valor original.
- titulo: ¿Es válido omitir el paso “Marca la cifra que quieres conservar y observa inmediatamente la
    siguiente”? — Aproximación por redondeo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de aproximación por redondeo.
  - 'Omitirlo puede volver inválida la acción siguiente: Conserva si la siguiente es menor que \(5\);
    aumenta una unidad si es \(5\) o mayor.'
  - 'La solución debe terminar de este modo: Elimina las cifras restantes y compara la distancia al valor
    original.'
errores_frecuentes:
- 'Empezar aproximación por redondeo sin realizar este control inicial: Marca la cifra que quieres conservar
  y observa inmediatamente la siguiente.'
- Memorizar “Redondear \(12.46\) a la décima da \(12.5\)” como respuesta aislada, sin reconstruir la definición
  que lo justifica.
- Convertir en receta el paso “Conserva si la siguiente es menor que \(5\); aumenta una unidad si es \(5\)
  o mayor.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre aproximación por redondeo que contradice el criterio “El redondeo
  busca un valor cercano y fácil de usar conservando una precisión dada”.
- 'Cerrar el ejercicio sin esta comprobación específica: Elimina las cifras restantes y compara la distancia
  al valor original.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
