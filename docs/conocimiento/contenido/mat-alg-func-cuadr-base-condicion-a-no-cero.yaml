semantic_id: MAT.ALG.FUNC_CUADR_BASE.CONDICION_A_NO_CERO
titulo: Condición a ≠ 0 para que la función sea cuadrática
objetivo: Comprender por qué la condición $a\neq0$ es indispensable para que $f(x)=ax^2+bx+c$ sea una función
  cuadrática.
introduccion: Si el coeficiente que acompaña a $x^2$ vale cero, ese término desaparece, y con él, todo lo que
  hace "cuadrática" a la función.
resumen: La condición $a\neq0$ es indispensable en $f(x)=ax^2+bx+c$, porque si $a=0$ el término cuadrático se
  anula y la función se reduce a una afín (o constante).
explicacion: '### Definición formal


  En $f(x)=ax^2+bx+c$, la condición $a\neq0$ forma parte de la definición de función cuadrática. Si $a=0$, la
  expresión se reduce a $f(x)=bx+c$, que es una función afín (si $b\neq0$) o constante (si además $b=0$).


  ### Desarrollo didáctico


  Antes de analizar la gráfica o el vértice de una función, conviene verificar que el coeficiente cuadrático realmente
  sea distinto de cero, incluso después de simplificar la regla.


  Con $f(x)=(k-3)x^2+2x-1$: si $k=3$, el coeficiente de $x^2$ se anula, y $f$ deja de ser cuadrática, convirtiéndose
  en la función afín $f(x)=2x-1$.'
procedimiento:
- 'Paso 1: Identifica el coeficiente $a$ que acompaña al término $x^2$ en la regla de la función.'
- 'Paso 2: Verifica que $a$ sea distinto de cero, incluso tras simplificar si es necesario.'
- 'Paso 3: Si $a=0$, trata la función como afín o constante, no como cuadrática.'
ejemplos:
- titulo: Verificación de la condición sobre a
  enunciado: '¿Es cuadrática $f(x)=(m-4)x^2+3x$ para $m=4$?'
  solucion_pasos:
  - 'Si $m=4$, el coeficiente de $x^2$ es $m-4=0$.'
  - No es cuadrática para $m=4$; se reduce a una función afín.
- titulo: Determinación del valor excluido de un parámetro
  enunciado: '¿Para qué valor de $p$ deja de ser cuadrática $f(x)=(p+2)x^2-x+5$?'
  solucion_pasos:
  - Se necesita que $p+2=0$.
  - 'Para $p=-2$, la función deja de ser cuadrática.'
- titulo: ¿Una función con $a=0$ y $b=0$ puede seguir siendo una función no constante?
  enunciado: ¿Una función con $a=0$ y $b=0$ puede seguir siendo una función no constante?
  respuesta: 'No'
  solucion_pasos:
  - Se reduce a $f(x)=c$, una función constante que asigna el mismo valor a todo $x$.
- titulo: ¿La condición $a \neq 0$ también aplica a $b$ y $c$?
  enunciado: ¿La condición $a \neq 0$ también aplica a $b$ y $c$?
  respuesta: 'No'
  solucion_pasos:
  - Los coeficientes $b$ y $c$ sí pueden valer cero sin afectar que la función siga siendo cuadrática.
errores_frecuentes:
- Analizar el vértice o la concavidad de una función donde en realidad $a=0$ tras simplificar un parámetro.
- No verificar el valor de $a$ cuando depende de un parámetro literal.
- Confundir la condición sobre $a$ con una condición sobre $b$ o $c$.
- Asumir que toda función escrita con "$x^2$" visible es automáticamente cuadrática, sin revisar el coeficiente
  real.
