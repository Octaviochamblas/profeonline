semantic_id: MAT.ALG.COMPOSICION_FUNCIONES.CALCULO_ALGEBRAICO
titulo: Cálculo algebraico de una función compuesta
objetivo: Calcular la fórmula algebraica general de la composición de dos funciones dadas por expresiones.
introduccion: En vez de evaluar número por número, esta vez el objetivo es obtener una fórmula completa
  que sirva para cualquier valor de $x$ de una sola vez.
resumen: Calcular algebraicamente $(f\circ g)(x)$ consiste en sustituir la expresión completa de $g(x)$
  en cada aparición de la variable de $f(x)$, y luego simplificar la expresión resultante.
explicacion: '### Definición formal


  Dadas $f(x)$ y $g(x)$ como expresiones algebraicas, $(f\circ g)(x) = f(g(x))$ se obtiene reemplazando
  formalmente cada ocurrencia de la variable en la fórmula de $f$ por la expresión completa de $g(x)$,
  y aplicando las reglas algebraicas de simplificación sobre el resultado.


  ### Desarrollo didáctico


  Es fundamental usar paréntesis al sustituir, para no perder términos ni cometer errores de signo, especialmente
  cuando $g(x)$ tiene más de un término.


  Si $f(x)=x^2+3x$ y $g(x)=x-1$: $(f\circ g)(x)=f(x-1)=(x-1)^2+3(x-1)=x^2-2x+1+3x-3=x^2+x-2$.'
procedimiento:
- 'Paso 1: Escribe la fórmula de $f(x)$ dejando espacio explícito donde aparece la variable.'
- 'Paso 2: Sustituye cada aparición de la variable por la expresión completa de $g(x)$, usando paréntesis.'
- 'Paso 3: Desarrolla las operaciones indicadas (potencias, productos, etc.).'
- 'Paso 4: Reduce términos semejantes para obtener la expresión final simplificada.'
ejemplos:
- titulo: Composición con función lineal
  enunciado: Si $f(x)=2x-5$ y $g(x)=x+4$, calcula $(f\circ g)(x)$.
  solucion_pasos:
  - $(f\circ g)(x) = 2(x+4)-5$.
  - $= 2x+8-5 = 2x+3$.
- titulo: Composición con función cuadrática
  enunciado: Si $f(x)=x^2$ y $g(x)=3x-2$, calcula $(f\circ g)(x)$.
  solucion_pasos:
  - $(f\circ g)(x) = (3x-2)^2$.
  - $= 9x^2-12x+4$.
- titulo: ¿Al sustituir $g(x)$ en $f(x)$ es necesario usar paréntesis?
  enunciado: ¿Al sustituir $g(x)$ en $f(x)$ es necesario usar paréntesis?
  respuesta: Sí
  solucion_pasos:
  - Sin paréntesis, se pueden cometer errores de signo o de aplicación incorrecta de exponentes.
- titulo: ¿$(f\circ g)(x)$ y $(g\circ f)(x)$ dan siempre la misma expresión algebraica?
  enunciado: ¿$(f\circ g)(x)$ y $(g\circ f)(x)$ dan siempre la misma expresión algebraica?
  respuesta: 'No'
  solucion_pasos:
  - En general son expresiones distintas, ya que la composición no es conmutativa.
errores_frecuentes:
- Omitir paréntesis al sustituir $g(x)$ dentro de una potencia de $f$.
- Sustituir solo parcialmente la expresión de $g(x)$ en $f(x)$.
- Confundir el orden de composición al desarrollar la sustitución.
- Cometer errores algebraicos al expandir binomios al cuadrado durante la simplificación.
