semantic_id: MAT.GEO.CIRCUNFERENCIA_ANALITICA.IDENTIFICAR_CENTRO
titulo: Identificación del centro de una circunferencia desde su forma canónica
objetivo: Identificar correctamente las coordenadas del centro de una circunferencia a partir de su ecuación
  canónica, prestando atención al cambio de signo.
introduccion: Aunque la fórmula general usa (x-h) y (y-k), en la práctica la ecuación puede aparecer con
  distintos signos, por lo que se debe tener cuidado al extraer h y k.
resumen: Dada la ecuación $(x-h)^2+(y-k)^2=r^2$, el centro de la circunferencia es el punto $(h,k)$, considerando
  que un signo positivo dentro del paréntesis corresponde a un valor negativo de esa coordenada del centro.
explicacion: '![Identificación del centro](/static/img/geometria/analitica/circanal-identificar-centro.svg)


  ### Definición formal


  Si la ecuación es $(x-a)^2+(y-b)^2=r^2$, el centro es $(a,b)$. Si aparece como $(x+a)^2+(y-b)^2=r^2$,
  se reescribe como $(x-(-a))^2+(y-b)^2=r^2$, por lo que el centro es $(-a,b)$.


  ### Desarrollo didáctico


  Para $(x+2)^2+(y-1)^2=16$: reescribiendo, $(x-(-2))^2+(y-1)^2=16$, por lo que el centro es $(-2,1)$.'
procedimiento:
- 'Paso 1: Escribe la ecuación en la forma exacta (x-h)²+(y-k)²=r².'
- 'Paso 2: Si el término dentro del paréntesis tiene signo +, reescríbelo como resta de un número negativo.'
- 'Paso 3: Extrae h y k directamente de esa forma reescrita.'
ejemplos:
- titulo: Identificar el centro de (x-3)²+(y-5)²=4
  enunciado: (x-3)²+(y-5)²=4.
  solucion_pasos:
  - Centro (3,5).
- titulo: Identificar el centro de (x+2)²+(y-1)²=16
  enunciado: (x+2)²+(y-1)²=16.
  solucion_pasos:
  - Reescribiendo (x+2)² como (x-(-2))², el centro es (-2,1).
- titulo: ¿Un signo + dentro del paréntesis indica una coordenada negativa del centro?
  respuesta: Sí
  solucion_pasos:
  - Sí, (x+a) equivale a (x-(-a)), por lo que esa coordenada del centro es -a.
- titulo: ¿Se puede identificar el centro sin reescribir la ecuación, solo con cuidado en el signo?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con recordar que el signo del centro es siempre opuesto al signo que aparece en la ecuación.
errores_frecuentes:
- Tomar el signo que aparece en la ecuación como si fuera directamente el signo de la coordenada del centro.
- Confundir el orden de las coordenadas, intercambiando h por k.
- Olvidar aplicar esta regla de signos cuando ambos términos (x e y) tienen signo positivo dentro del
  paréntesis.
fuente: Elaboración propia.
estado: publicado
