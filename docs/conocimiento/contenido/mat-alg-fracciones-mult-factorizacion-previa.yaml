semantic_id: 'MAT.ALG.FRACCIONES_MULT.FACTORIZACION_PREVIA'
titulo: 'Factorización Previa en Multiplicación'
objetivo: 'Factorizar todos los polinomios antes de multiplicar para facilitar la simplificación.'
introduccion: |
  Si multiplicas polinomios grandes directamente, crearás un monstruo de alto grado casi imposible de simplificar después. La regla de oro es: ¡Factoriza todo primero!
resumen: |
  Antes de multiplicar fracciones con polinomios, factoriza completamente cada numerador y cada denominador.
explicacion: |
  Si te lanzas a multiplicar directamente polinomios gigantes (ej: $(x^2 - 4) \cdot (x^2 + 5x + 6)$), vas a terminar con un monstruo polinómico de grado 4 que será casi imposible de simplificar al final.

  La ley de oro antes de multiplicar cualquier fracción compleja es **FACTORIZAR TODO PRIMERO**.
  Debes desarmar cada numerador y cada denominador en pequeños paréntesis (factores).

  ¿Por qué? Porque al multiplicar, esos pequeños paréntesis quedarán todos juntos, pegados por multiplicaciones, en una sola gran fracción. Y como están multiplicando, ¡te será muy fácil tachar (simplificar) los paréntesis idénticos de arriba con los de abajo antes de calcular nada grande!

procedimiento:
  - 'Paso 1: Revisa el primer numerador y factorízalo si es posible.'
  - 'Paso 2: Revisa el primer denominador y factorízalo.'
  - 'Paso 3: Repite para la segunda fracción.'
  - 'Paso 4: Reescribe la multiplicación usando solo los factores.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Prepara para multiplicar factorizando: $\frac{x^2-9}{x^2+3x} \cdot \frac{5}{x-3}$.'
    solucion_pasos:
    - 'Numerador 1: $(x-3)(x+3)$.'
    - 'Denominador 1: $x(x+3)$.'
    - 'Fracción 2 ya es irreducible.'
    - 'Resultado preparado: $\frac{(x-3)(x+3)}{x(x+3)} \cdot \frac{5}{x-3}$.'
  - titulo: 'Factoriza la expresión antes de multiplicar: $\frac{2x+4}{3} \cdot \frac{x}{x+2}$.'
    respuesta: '$\frac{2(x+2)}{3} \cdot \frac{x}{x+2}$'
    solucion_pasos:
    - 'Factor común 2 en 2x+4.'
errores_frecuentes:
  - 'Multiplicar los polinomios en forma expandida y perder la oportunidad de simplificar.'
estado: publicado
