semantic_id: MAT.GEO.CIRCULO_TEOREMAS.SECANTES_SEGMENTOS
titulo: Identificación de segmentos exteriores y segmentos totales en dos secantes trazadas desde un punto
  exterior
objetivo: Identificar correctamente el segmento exterior y el segmento total en cada una de dos secantes
  trazadas desde un mismo punto exterior a una circunferencia.
introduccion: Cuando desde un punto fuera de un círculo se trazan dos rectas secantes, cada una determina
  un segmento 'corto' (exterior) y un segmento 'largo' (total) que hay que distinguir con precisión.
resumen: Si desde un punto exterior $P$ se traza una secante que corta la circunferencia en $A$ (cercano)
  y $B$ (lejano), el segmento $PA$ es el segmento exterior y el segmento $PB$ es el segmento total (o
  secante completa).
explicacion: '![Segmentos exteriores y totales de dos secantes](/static/img/geometria/circunferencia-circulo/circulo-teorema-secantes-segmentos.svg)


  ### Definición formal


  Si desde un punto exterior $P$ se traza una secante que corta a la circunferencia en dos puntos, el
  más cercano a $P$ (llamado $A$) determina el segmento exterior $PA$, mientras que el punto más lejano
  (llamado $B$) determina el segmento total $PB$ (que incluye tanto la parte exterior como la cuerda interior).


  ### Desarrollo didáctico


  En la figura, desde el punto $P$ se trazan dos secantes: una corta en $A$ (cercano) y $B$ (lejano);
  la otra corta en $C$ (cercano) y $D$ (lejano). Los segmentos exteriores son $PA$ y $PC$; los segmentos
  totales son $PB$ y $PD$.'
procedimiento:
- 'Paso 1: Identifica el punto exterior P y las dos secantes trazadas desde él.'
- 'Paso 2: En cada secante, identifica el punto de corte más cercano a P (segmento exterior) y el más
  lejano (segmento total).'
- 'Paso 3: Verifica que el segmento total siempre sea mayor que el segmento exterior correspondiente,
  pues lo contiene.'
ejemplos:
- titulo: Identificar segmento exterior y total en una secante
  enunciado: Desde P se traza una secante que corta la circunferencia en A (cercano) y B (lejano).
  solucion_pasos:
  - PA es el segmento exterior; PB es el segmento total (la secante completa desde P hasta el punto lejano).
- titulo: Distinguir los cuatro segmentos de dos secantes
  enunciado: 'Desde P salen dos secantes: una corta en A y B; la otra en C y D.'
  solucion_pasos:
  - 'Segmentos exteriores: PA y PC. Segmentos totales: PB y PD.'
- titulo: ¿El segmento total siempre incluye al segmento exterior?
  respuesta: Sí
  solucion_pasos:
  - Sí, el segmento total PB va desde P hasta el punto lejano B, pasando por el punto cercano A; por lo
    tanto contiene al segmento exterior PA.
- titulo: ¿El segmento exterior puede ser mayor que el segmento total de la misma secante?
  respuesta: 'No'
  solucion_pasos:
  - No, el segmento exterior siempre es menor, ya que es una parte del segmento total.
errores_frecuentes:
- Confundir cuál punto de corte es el cercano y cuál el lejano, invirtiendo los segmentos exterior y total.
- Creer que el segmento total es solo la cuerda interior (AB), sin incluir la parte exterior PA.
- Mezclar los segmentos de una secante con los de la otra al identificar la relación entre ellos.
fuente: 'Elaboración propia (referencias: Moraleja 75, Cid 132).'
estado: publicado
