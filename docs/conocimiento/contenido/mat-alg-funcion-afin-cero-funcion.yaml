semantic_id: MAT.ALG.FUNCION_AFIN.CERO_FUNCION
titulo: Determinación del cero de una función afín
objetivo: Calcular el cero de una función afín como el valor de $x$ que anula la función.
introduccion: El "cero" de una función no es lo mismo que evaluarla en cero; es exactamente lo opuesto, el valor
  de entrada que produce una salida igual a cero.
resumen: El **cero** (o raíz) de una función afín $f(x)=mx+n$, con $m \neq 0$, es el valor $x = -\dfrac{n}{m}$
  que satisface $f(x)=0$; coincide con la abscisa del punto de intersección con el eje $x$.
explicacion: '### Definición formal


  Un número $c$ es un cero de la función $f$ si $f(c) = 0$. Para $f(x) = mx+n$ con $m \neq 0$, resolver $mx+n=0$
  da $c = -\dfrac{n}{m}$, que es el único cero de la función afín (por ser lineal en $x$, la ecuación tiene solución
  única).


  ### Desarrollo didáctico


  El procedimiento es idéntico al de encontrar la intersección con el eje $x$: se iguala la función a cero y se
  despeja la incógnita.


  Si $f(x) = -5x + 25$: se resuelve $-5x+25=0$, obteniendo $x=5$. El cero de la función es $5$, y se cumple $f(5)=0$.'
procedimiento:
- 'Paso 1: Plantea la ecuación $f(x)=0$.'
- 'Paso 2: Resuelve la ecuación lineal resultante para despejar $x$.'
- 'Paso 3: El valor obtenido es el cero de la función.'
- 'Paso 4: Verifica sustituyendo ese valor en $f$, confirmando que el resultado sea cero.'
ejemplos:
- titulo: Cálculo del cero
  enunciado: Determina el cero de $f(x) = 6x - 18$.
  solucion_pasos:
  - Se resuelve $6x-18=0$.
  - '$x=3$.'
  - 'Verificación: $f(3)=6(3)-18=0$.'
- titulo: Cero con coeficientes fraccionarios
  enunciado: Determina el cero de $f(x) = \frac{1}{2}x - 4$.
  solucion_pasos:
  - Se resuelve $\frac{1}{2}x-4=0$.
  - '$\frac{1}{2}x=4 \Rightarrow x=8$.'
- titulo: ¿El cero de una función afín es siempre el mismo que su coeficiente de posición?
  enunciado: ¿El cero de una función afín es siempre el mismo que su coeficiente de posición?
  respuesta: 'No'
  solucion_pasos:
  - El coeficiente de posición es $f(0)=n$; el cero es el valor de $x$ tal que $f(x)=0$, generalmente distinto.
- titulo: ¿Toda función afín con $m\neq0$ tiene exactamente un cero?
  enunciado: ¿Toda función afín con $m\neq0$ tiene exactamente un cero?
  respuesta: Sí
  solucion_pasos:
  - La ecuación $mx+n=0$ con $m\neq0$ siempre tiene solución única.
errores_frecuentes:
- Confundir "el cero de la función" con "evaluar la función en cero" ($f(0)$).
- Cometer errores de signo al despejar $x$ en la ecuación $mx+n=0$.
- Dividir por $m$ sin verificar previamente que sea distinto de cero.
- Olvidar verificar el resultado sustituyendo de vuelta en la función.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
