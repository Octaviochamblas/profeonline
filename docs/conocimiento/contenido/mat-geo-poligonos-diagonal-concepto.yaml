semantic_id: MAT.GEO.POLIGONOS_METRICA.DIAGONAL_CONCEPTO
titulo: Concepto de diagonal como segmento que une vértices no consecutivos de un polígono
objetivo: Comprender qué es una diagonal de un polígono y distinguirla de un lado.
introduccion: Dentro de un polígono es posible trazar segmentos que conectan vértices que no son adyacentes
  entre sí; estos segmentos reciben un nombre especial.
resumen: Una diagonal de un polígono es un segmento que une dos vértices no consecutivos (no adyacentes)
  del polígono.
explicacion: '![Diagonal de un polígono](/static/img/geometria/poligonos-cuadrilateros/poligonos-diagonal-concepto.svg)


  ### Definición formal


  En un polígono, una diagonal es el segmento $\overline{P_iP_j}$ que une dos vértices $P_i$ y $P_j$ que
  no son adyacentes (es decir, no están unidos directamente por un lado).


  ### Desarrollo didáctico


  En un hexágono ABCDEF, el segmento AD es una diagonal (A y D no son vértices consecutivos), mientras
  que AB es un lado (A y B sí son consecutivos). Los triángulos son el único tipo de polígono que no tiene
  diagonales, ya que todos sus vértices son consecutivos entre sí.'
procedimiento:
- 'Paso 1: Elige dos vértices del polígono.'
- 'Paso 2: Verifica si esos vértices son consecutivos (unidos por un lado) o no.'
- 'Paso 3: Si no son consecutivos, el segmento que los une es una diagonal.'
ejemplos:
- titulo: Identificar una diagonal en un hexágono
  enunciado: En un hexágono ABCDEF, se traza el segmento AD.
  solucion_pasos:
  - AD es una diagonal, ya que A y D no son vértices consecutivos.
- titulo: Distinguir un lado de una diagonal
  enunciado: En el mismo hexágono, se traza el segmento AB.
  solucion_pasos:
  - AB es un lado, ya que A y B son vértices consecutivos, no una diagonal.
- titulo: ¿Un triángulo tiene diagonales?
  respuesta: 'No'
  solucion_pasos:
  - No, en un triángulo todos los vértices son consecutivos entre sí, por lo que no existen diagonales.
- titulo: ¿Una diagonal siempre pasa por el interior del polígono?
  respuesta: Depende
  solucion_pasos:
  - En polígonos convexos sí; en polígonos cóncavos, algunas diagonales pueden pasar por el exterior.
errores_frecuentes:
- Confundir una diagonal con un lado del polígono.
- Creer que todos los polígonos, incluidos los triángulos, tienen diagonales.
- No verificar correctamente si dos vértices son consecutivos antes de clasificar el segmento.
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 46.'
estado: publicado
