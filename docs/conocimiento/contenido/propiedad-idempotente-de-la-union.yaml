semantic_id: MAT.FUND.PROPIEDADES_CONJUNTOS.IDEMPOTENCIA_UNION
titulo: Propiedad idempotente de la unión
objetivo: Aplicar la propiedad de idempotencia de la unión para simplificar operaciones redundantes de
  un conjunto consigo mismo.
introduccion: Imagina que tienes una lista con los nombres de tus amigos ($A$). Si tomas una segunda copia
  idéntica de esa misma lista y decides juntar todos los nombres en un nuevo papel, eliminando los nombres
  repetidos, el resultado final será exactamente la misma lista original. No tendrás más amigos ni nombres
  nuevos. En matemáticas, esta propiedad de unir un conjunto consigo mismo y obtener el mismo conjunto
  original se conoce como idempotencia de la unión.
resumen: La propiedad de idempotencia de la unión establece que la unión de cualquier conjunto consigo
  mismo da como resultado el propio conjunto. Formalmente, para cualquier conjunto $A$, se cumple que
  $A \cup A = A$.
explicacion: 'La **propiedad de idempotencia de la unión** indica que la operación de unión no produce
  acumulación ni duplicación de elementos cuando se aplica a un mismo conjunto.


  ### Definición Formal

  Sea $A$ un conjunto cualquiera dentro de un universo $U$. Se cumple que:

  $$A \cup A = A$$


  ### Demostración

  Esta propiedad se deriva directamente de la idempotencia de la disyunción proposicional en lógica formal,
  la cual establece que para cualquier proposición $p$, se cumple que $p \lor p \equiv p$. Aplicando esto
  a la definición de unión:

  $$A \cup A = \{x \in U \mid x \in A \lor x \in A\}$$

  Dado que la proposición $x \in A \lor x \in A$ equivale lógicamente a $x \in A$, podemos simplificar
  la condición de pertenencia:

  $$\{x \in U \mid x \in A \lor x \in A\} = \{x \in U \mid x \in A\} = A$$

  Por lo tanto, queda demostrado que $A \cup A = A$.


  ### Aplicación en Simplificación de Fórmulas

  Esta regla es sumamente útil al resolver o simplificar operaciones algebraicas extensas de conjuntos.
  Cada vez que identifiquemos un término de la forma $X \cup X$, podemos reducirlo inmediatamente a $X$,
  simplificando considerablemente los cálculos.'
procedimiento:
- 'Paso 1: Identifica si en una expresión aparece la unión de un conjunto consigo mismo (por ejemplo,
  $A \cup A$).'
- 'Paso 2: Reemplaza toda la expresión $A \cup A$ por el conjunto individual $A$.'
- 'Paso 3: Utiliza este resultado simplificado para continuar resolviendo el resto de las operaciones.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Dado el conjunto $A = \{a, b, c\}$, calcula $A \cup A$ y comprueba que se cumple la propiedad
    de idempotencia.
  solucion_pasos:
  - 'Paso a: Escribimos la operación de unión: $A \cup A = \{a, b, c\} \cup \{a, b, c\}$.'
  - 'Paso b: Reunimos todos los elementos de ambos conjuntos sin repetir ninguno: $\{a, b, c\}$.'
  - 'Paso c: Comparamos el resultado con el conjunto original $A$. Vemos que $\{a, b, c\} = A$, por lo
    que $A \cup A = A$.'
- titulo: Ejemplo 2
  enunciado: Simplifica la expresión algebraica de conjuntos $(B \cup B) \cup (C \cup C)$ utilizando las
    propiedades de la unión.
  solucion_pasos:
  - 'Paso a: Identificamos que el término $(B \cup B)$ es la unión de un conjunto consigo mismo. Por idempotencia,
    lo simplificamos a $B$.'
  - 'Paso b: Identificamos que el término $(C \cup C)$ también es la unión de un conjunto consigo mismo.
    Lo simplificamos a $C$.'
  - 'Paso c: Sustituimos los términos simplificados en la expresión original, obteniendo: $B \cup C$.'
- titulo: ¿Se cumple la propiedad de idempotencia de la unión si el conjunto es el conjunto vacío?
  respuesta: Sí
  solucion_pasos:
  - Si aplicamos la unión al conjunto vacío consigo mismo, tenemos $\varnothing \cup \varnothing$.
  - Como ninguno de los dos conjuntos aporta elementos, el resultado sigue siendo el conjunto vacío $\varnothing$.
  - Por lo tanto, la igualdad se cumple perfectamente.
- titulo: ¿Se cumple la propiedad de idempotencia para conjuntos infinitos como los números enteros $\mathbb{Z}$?
  respuesta: Sí
  solucion_pasos:
  - La idempotencia es una propiedad estructural aplicable a cualquier conjunto.
  - Para el conjunto de los enteros se cumple que $\mathbb{Z} \cup \mathbb{Z} = \mathbb{Z}$, ya que al
    unir todos los enteros con todos los enteros no se genera ningún elemento nuevo fuera del conjunto.
errores_frecuentes:
- Pensar que la unión de un conjunto consigo mismo da como resultado el doble de elementos o un conjunto
  duplicado.
- Confundir la unión $A \cup A$ con el producto cartesiano $A \times A$ (el cual sí genera un conjunto
  de pares ordenados de mayor cardinalidad).
- Creer que para el conjunto vacío la propiedad no es válida porque no tiene elementos.
- Olvidar aplicar la idempotencia para simplificar expresiones, lo que complica innecesariamente los ejercicios
  algebraicos.
- Confundir la propiedad de idempotencia con la del elemento neutro ($A \cup \varnothing = A$).
fuente: Álgebra e Introducción al Cálculo, Editorial McGraw-Hill, pág. 34
estado: publicado
