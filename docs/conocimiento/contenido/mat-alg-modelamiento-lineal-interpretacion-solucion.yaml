semantic_id: MAT.ALG.MODELAMIENTO_LINEAL.INTERPRETACION_SOLUCION
titulo: Interpretación de la Solución
objetivo: Volver a traducir el resultado numérico al contexto original del problema.
introduccion: 'Si entregas ''$x=10$'' como respuesta en una prueba, podrías tenerlo malo. Debes volver a tu diccionario
  inicial:'
resumen: Encontraste que $x = 10$. Felicidades. Pero la pregunta no era '¿Cuánto vale x?', la pregunta era '¿Cuántos
  años tienen Juan y Pedro?'.
explicacion: '### Definición formal


  Encontraste que $x = 10$. Felicidades. Pero la pregunta no era ''¿Cuánto vale x?'', la pregunta era ''¿Cuántos
  años tienen Juan y Pedro?''.


  ### Desarrollo didáctico


  Si entregas ''$x=10$'' como respuesta en una prueba, podrías tenerlo malo. Debes volver a tu diccionario inicial:

  - Habíamos dicho que Juan = $x$. Entonces Juan tiene 10 años.

  - Habíamos dicho que Pedro = $2x$. Entonces Pedro tiene $2 \cdot 10 = 20$ años.


  La respuesta correcta y completa es ''Juan tiene 10 años y Pedro tiene 20 años''. Siempre debes responder a la
  pregunta específica que te hicieron.'
procedimiento:
- Toma el valor numérico obtenido para 'x'.
- Vuelve a tus definiciones iniciales (tu diccionario algebraico).
- Reemplaza 'x' en todas las expresiones relevantes para calcular los valores reales.
- Redacta una oración final respondiendo exactamente lo que se preguntó.
ejemplos:
- titulo: $x=10$ y $2 \cdot 10 = 20$
  enunciado: Analiza el caso $x=10$ y $2 \cdot 10 = 20$ y explica cómo se aplica el criterio estudiado.
  solucion_pasos:
  - 'Si entregas ''$x=10$'' como respuesta en una prueba, podrías tenerlo malo. Debes volver a tu diccionario inicial:

    - Habíamos dicho que Juan = $x$. Entonces Juan tiene 10 años.

    - Habíamos dicho que Pedro = $2x$. Entonces Pedro tiene $2 \cdot 10 = 20$ años.'
  - Toma el valor numérico obtenido para 'x'.
- titulo: $x = 10$
  enunciado: Resuelve o interpreta $x = 10$ usando las condiciones de este recurso.
  solucion_pasos:
  - Encontraste que $x = 10$. Felicidades. Pero la pregunta no era '¿Cuánto vale x?', la pregunta era '¿Cuántos
    años tienen Juan y Pedro?'.
  - Vuelve a tus definiciones iniciales (tu diccionario algebraico).
- titulo: 'Respecto de «Interpretación contextual de la solución de una ecuación lineal»: ¿Es correcta'
  enunciado: 'Respecto de «Interpretación contextual de la solución de una ecuación lineal»: ¿Es correcta esta caracterización?
    «Encontraste que $x = 10$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Encontraste que $x = 10$.'
- titulo: 'Respecto de «Interpretación contextual de la solución de una ecuación lineal»: ¿Es válida es'
  enunciado: 'Respecto de «Interpretación contextual de la solución de una ecuación lineal»: ¿Es válida esta afirmación?
    «Puede omitirse esta condición sin cambiar el resultado: «Toma el valor numérico obtenido para ''x''»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Encontraste que $x = 10$.'
errores_frecuentes:
- 'Puede omitirse esta condición sin cambiar el resultado: «Toma el valor numérico obtenido para ''x''».'
- 'Es válido invertir el orden y dejar para el final esta acción: «Vuelve a tus definiciones iniciales (tu diccionario
  algebraico)».'
- La definición sigue cumpliéndose aunque no se considere que encontraste que $x = 10$. Felicidades. Pero la pregunta
  no era '¿Cuánto vale x?', la pregunta era '¿Cuántos años tienen Juan y Pedro?'.
- Basta con ejecutar una parte del procedimiento; no es necesario revisar «Redacta una oración final respondiendo
  exactamente lo que se preguntó».
- La comprobación del resultado vuelve innecesaria la condición «Toma el valor numérico obtenido para 'x'».
