semantic_id: 'MAT.ALG.MODELAMIENTO_LINEAL.INTERPRETACION_SOLUCION'
titulo: 'Interpretación de la Solución'
objetivo: 'Volver a traducir el resultado numérico al contexto original del problema.'
introduccion: |
  Encontraste que $x = 10$. ¡Felicidades! Pero la pregunta no era '¿Cuánto vale x?', la pregunta era '¿Cuántos años tienen Juan y Pedro?'.
resumen: |
  La respuesta correcta y completa es 'Juan tiene 10 años y Pedro tiene 20 años'. Siempre debes responder a la pregunta específica que te hicieron.
explicacion: |
  Si entregas '$x=10$' como respuesta en una prueba, podrías tenerlo malo. Debes volver a tu diccionario inicial:
  - Habíamos dicho que Juan = $x$. Entonces Juan tiene 10 años.
  - Habíamos dicho que Pedro = $2x$. Entonces Pedro tiene $2 \cdot 10 = 20$ años.
procedimiento:
  - 'Paso 1: Toma el valor numérico obtenido para ''x''.'
  - 'Paso 2: Vuelve a tus definiciones iniciales (tu diccionario algebraico).'
  - 'Paso 3: Reemplaza ''x'' en todas las expresiones relevantes para calcular los valores reales.'
  - 'Paso 4: Redacta una oración final respondiendo exactamente lo que se preguntó.'
ejemplos:
  - titulo: 'Ejemplo ilustrativo'
    enunciado: 'Resuelva la ecuación o sistema planteado aplicando los conceptos descritos.'
    solucion_pasos:
    - 'Se plantea la ecuación inicial según la definición matemática.'
    - 'Se aplican las propiedades algebraicas correspondientes al tema.'
    - 'Se obtiene el conjunto solución verificando el dominio.'
errores_frecuentes:
  - 'Omitir la verificación de las restricciones de dominio al finalizar el despeje.'
  - 'Errores de signo al transponer términos de un miembro a otro.'
estado: 'publicado'
