semantic_id: MAT.ALG.FACTOR_CUBOS.DIFERENCIA_POTENCIAS_IMPARES
titulo: Diferencia de Potencias Impares Iguales
objetivo: Conocer la generalización para factorizar restas de potencias impares iguales.
introduccion: 'Para cerrar el círculo cósmico de los exponentes, abordaremos la Diferencia de Potencias Impares.
  A diferencia de las sumas (que alternan signos), las diferencias nos regalan el polinomio largo más amigable y
  relajado de todos: todo es positivo.'
resumen: La expresión $a^n - b^n$ (con $n$ impar) siempre es divisible por $(a-b)$. El polinomio resultante tendrá
  TODOS sus signos positivos $(+ + + .)$ manteniendo el mismo patrón de escalera de exponentes.
explicacion: '### Definición formal


  A diferencia de la suma, la diferencia genera un polinomio complementario 100% positivo.


  ### Desarrollo didáctico


  Pensemos en $x^5 - y^5$.

  Sabemos que el factor corto mantendrá el signo negativo: $(x - y)$.


  El factor largo seguirá la regla de la escalera que ya conoces:

  - La ''x'' empieza en $x^4$ y va bajando.

  - La ''y'' va subiendo.


  La gran ventaja es que NO hay que alternar signos. Como el binomio ya lleva el signo negativo, el polinomio largo
  compensa siendo pura positividad.


  $x^5 - y^5 = (x - y)(x^4 + x^3 y + x^2 y^2 + x y^3 + y^4)$.


  Este patrón (binomio negativo, todo el resto positivo) es la generalización de la regla de Diferencia de Cubos
  que vimos antes (donde el trinomio tenía signos $+ + +$).'
procedimiento:
- 'Paso 1: Confirma que sea una diferencia (resta) de potencias iguales impares.'
- 'Paso 2: Escribe el factor corto como $(a - b)$.'
- 'Paso 3: Escribe el polinomio largo empezando con $a^{n-1}$.'
- 'Paso 4: Usa SÓLO signos positivos (+).'
- 'Paso 5: Sigue bajando el exponente de ''$a$'' y subiendo el de ''$b$'' en cada término.'
- A diferencia de la suma, la diferencia genera un polinomio complementario 100% positivo.
ejemplos:
- titulo: Factoriza $p^7 - q^7$
  enunciado: Factoriza $p^7 - q^7$.
  solucion_pasos:
  - 'Factor corto: $(p - q)$.'
  - El largo empieza en $p^6$ y son 7 términos, todos positivos.
  - 'Respuesta: $(p - q)(p^6 + p^5 q + p^4 q^2 + p^3 q^3 + p^2 q^4 + p q^5 + q^6)$.'
- titulo: Factoriza $x^5 - 1$.
  solucion_pasos:
  - El 1 a cualquier potencia es 1. El binomio es (x-1). El factor largo es la escalera decreciente de x hasta 1,
    todo con signo positivo.
- titulo: 'Respecto de «Factorización de diferencia de potencias impares iguales»: ¿Describe adecuadame'
  enunciado: 'Respecto de «Factorización de diferencia de potencias impares iguales»: ¿Describe adecuadamente el
    concepto esta frase? «La expresión $a^n - b^n$ (con $n$ impar) siempre es divisible por $(a-b)$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La expresión $a^n - b^n$ (con $n$ impar) siempre es divisible
    por $(a-b)$.'
- titulo: 'Respecto de «Factorización de diferencia de potencias impares iguales»: ¿Se puede aceptar es'
  enunciado: 'Respecto de «Factorización de diferencia de potencias impares iguales»: ¿Se puede aceptar esta afirmación?
    «Alternar los signos en el polinomio largo (confundiéndolo con la regla de la suma de potencias)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La expresión $a^n - b^n$ (con $n$ impar) siempre es divisible
    por $(a-b)$.'
errores_frecuentes:
- Alternar los signos en el polinomio largo (confundiéndolo con la regla de la suma de potencias).
- Poner un signo $+$ en el factor corto (binomio).
- Para «En la factorización de la diferencia de potencias impares ($a^n - b^n$), ¿qué signos lleva el polinomio
  largo», la respuesta correcta es Alternados.
- Para «En la factorización de la diferencia de potencias impares ($a^n - b^n$), ¿qué signos lleva el polinomio
  largo», la respuesta correcta es Todos negativos.
- Solo el primero y el último son positivos.
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
