semantic_id: MAT.NUM.PORCENTAJES.CALCULO_MENTAL_DIEZ
objetivo: Aplicar la estrategia de cálculo mental rápida para el 10% y sus múltiplos.
introduccion: No siempre tienes una calculadora a mano en el supermercado. Aprender
  a calcular el 10% en tu cabeza te dará superpoderes para estimar el 20%, 30% o 50%
  en segundos.
resumen: Para hallar el 10% de cualquier número, simplemente divídelo por 10 (córrele
  la coma un espacio a la izquierda). Luego, multiplica ese valor para hallar el 20%,
  30%, etc.
explicacion: 'El **$10\%$** es la base del cálculo mental porque equivale a la fracción
  $10/100$, que simplificada es $1/10$.


  **Regla de oro del 10%:**

  Para calcular el 10% de un número, mueve su punto decimal una posición a la izquierda.

  - El 10% de 450 es 45.

  - El 10% de 35 es 3.5.


  Una vez tienes el 10%, calcular múltiplos es fácil:

  - **$20\%$**: Calcula el 10% y el resultado multiplícalo por 2.

  - **$30\%$**: Calcula el 10% y multiplícalo por 3.

  - **$5\%$**: Calcula el 10% y divídelo por 2 (es la mitad).'
procedimiento:
- 'Paso 1: Mueve la coma decimal un lugar a la izquierda para obtener el 10%.'
- 'Paso 2: Si te piden el 20%, multiplica ese resultado por 2. Si es 30%, por 3, etc.'
- 'Paso 3: Si te piden el 5%, saca la mitad del valor obtenido en el Paso 1.'
ejemplos:
- titulo: Cálculo en restaurante
  enunciado: La cuenta es de $18.000. Quieres dejar un 15% de propina. ¿Cuánto es
    mentalmente?
  solucion_pasos:
  - 'Calculamos el 10%: Movemos un cero. Es $1.800.'
  - 'Calculamos el 5%: Es la mitad del 10%. La mitad de 1.800 es $900$.'
  - 'Sumamos ambos: $1.800 + 900 = 2.700$ de propina.'
errores_frecuentes:
- Mover la coma dos espacios en lugar de uno (eso calcula el 1%, no el 10%).
- Tratar de multiplicar directamente por 0.15 mentalmente en lugar de desglosarlo
  en 10% + 5%.
fuente: Currículum Nacional MINEDUC.
estado: publicado
