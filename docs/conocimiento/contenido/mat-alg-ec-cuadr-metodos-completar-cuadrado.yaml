semantic_id: MAT.ALG.EC_CUADR_METODOS.COMPLETAR_CUADRADO
titulo: Resolución de ecuaciones de segundo grado completando el cuadrado
objetivo: Resolver ecuaciones de segundo grado mediante el método de completar el cuadrado, transformando la ecuación
  en un binomio al cuadrado.
introduccion: 'Antes de que existiera la fórmula general, este era el método clásico para resolver ecuaciones cuadráticas:
  reescribir la expresión como el cuadrado de un binomio.'
resumen: Completar el cuadrado consiste en transformar $ax^2+bx+c=0$ en una expresión de la forma $(x+h)^2=k$,
  para luego despejar $x$ extrayendo raíz cuadrada.
explicacion: '### Definición formal


  Completar el cuadrado transforma $x^2+px+q=0$ (con $a=1$) en $\left(x+\dfrac{p}{2}\right)^2 = \dfrac{p^2}{4}-q$,
  sumando y restando el término $\left(\dfrac{p}{2}\right)^2$ que hace que los primeros dos términos formen un
  cuadrado perfecto.


  ### Desarrollo didáctico


  El procedimiento consiste en aislar los términos con $x$, sumar el cuadrado de la mitad del coeficiente lineal
  a ambos lados, factorizar el trinomio resultante como un binomio al cuadrado, y despejar mediante raíz cuadrada.


  Para $x^2+6x-7=0$: se aísla $x^2+6x=7$; se suma $9$ (el cuadrado de la mitad de $6$) a ambos lados: $x^2+6x+9=16$;
  se factoriza: $(x+3)^2=16$; se despeja: $x+3=\pm4$, dando $x=1$ o $x=-7$.'
procedimiento:
- 'Paso 1: Si $a\neq1$, divide toda la ecuación por $a$.'
- 'Paso 2: Aísla los términos con $x$ en un lado de la igualdad.'
- 'Paso 3: Suma el cuadrado de la mitad del coeficiente lineal a ambos lados de la igualdad.'
- 'Paso 4: Factoriza el trinomio resultante como un binomio al cuadrado y despeja extrayendo raíz cuadrada.'
ejemplos:
- titulo: Completar el cuadrado con coeficiente lineal par
  enunciado: 'Resuelve $x^2+4x-5=0$ completando el cuadrado.'
  solucion_pasos:
  - '$x^2+4x=5$.'
  - 'Sumando $4$ a ambos lados: $x^2+4x+4=9$, es decir $(x+2)^2=9$.'
  - '$x+2=\pm3$, por lo que $x=1$ o $x=-5$.'
- titulo: Completar el cuadrado con coeficiente a distinto de 1
  enunciado: 'Resuelve $2x^2+8x-10=0$ completando el cuadrado.'
  solucion_pasos:
  - 'Dividiendo por 2: $x^2+4x-5=0$.'
  - 'Completando el cuadrado como antes: $(x+2)^2=9$.'
  - '$x=1$ o $x=-5$.'
- titulo: ¿Se puede completar el cuadrado en cualquier ecuación cuadrática?
  enunciado: ¿Se puede completar el cuadrado en cualquier ecuación cuadrática?
  respuesta: Sí
  solucion_pasos:
  - Es un método general, aplicable a cualquier ecuación de la forma $ax^2+bx+c=0$ con $a\neq0$.
- titulo: ¿Completar el cuadrado y aplicar la fórmula general dan siempre el mismo resultado?
  enunciado: ¿Completar el cuadrado y aplicar la fórmula general dan siempre el mismo resultado?
  respuesta: Sí
  solucion_pasos:
  - La fórmula general se deduce precisamente completando el cuadrado sobre la forma general, por lo que ambos
    métodos son equivalentes.
errores_frecuentes:
- Olvidar dividir por $a$ antes de completar el cuadrado cuando $a\neq1$.
- Sumar el término que completa el cuadrado solo a un lado de la igualdad, rompiendo la equivalencia.
- Calcular incorrectamente el cuadrado de la mitad del coeficiente lineal.
- Olvidar el signo $\pm$ al despejar la raíz cuadrada del binomio al cuadrado.
