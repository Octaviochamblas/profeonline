semantic_id: MAT.ALG.RESOLUCION_LINEAL.VERIFICACION_SOLUCION
titulo: Verificación (Comprobación) de una Ecuación
objetivo: Comprobar la certeza de un resultado matemático sustituyéndolo de regreso en la ecuación original.
introduccion: 'Las ecuaciones tienen algo maravilloso que casi ningún otro tema de matemáticas tiene: te permiten
  ''revisar tu propio examen'' antes de entregarlo. Si haces la comprobación, sabrás con 100% de certeza si tu nota
  es un 7.'
resumen: 'La verificación consiste en sustituir el valor obtenido como respuesta en el lugar de la incógnita en
  la ecuación ORIGINAL. Si se obtiene una igualdad numérica verdadera (ej: $10 = 10$), la solución es correcta.'
explicacion: '### Definición formal


  Un error temprano corrompe la ecuación. Comprobar en una ecuación corrompida te dará un falso positivo.


  ### Desarrollo didáctico


  Paso 1: Resuelves la ecuación.

  Supón que resolviste $3x - 2 = x + 6$ y concluiste que $x = 4$.


  Paso 2: La prueba de fuego.

  Tomas tu $4$ y lo metes en la ecuación inicial. Nunca en los pasos intermedios, siempre en la original por si
  arrastraste un error.


  Lado Izquierdo: $3(4) - 2 = 12 - 2 = 10$.

  Lado Derecho: $(4) + 6 = 10$.


  Paso 3: Compara.

  ¿Es $10 = 10$? Sí. Tu respuesta es correcta y absoluta.

  ¿Qué pasa si hubiera dado $8 = 10$? Significaría que te equivocaste despejando, algún signo falló y debes revisar
  tu procedimiento.'
procedimiento:
- 'Paso 1: Termina de resolver la ecuación y obtén tu posible solución.'
- 'Paso 2: Copia la ecuación ORIGINAL.'
- 'Paso 3: Sustituye la incógnita en todos los lados por tu número, usando paréntesis.'
- 'Paso 4: Calcula el valor de cada lado de manera independiente (no cruces números de un lado a otro).'
- 'Paso 5: Si los dos números finales son iguales, has verificado exitosamente.'
ejemplos:
- titulo: Verifica si $x = -2$ es solución de $5x + 3 = -7$
  enunciado: Verifica si $x = -2$ es solución de $5x + 3 = -7$.
  solucion_pasos:
  - 'Sustituimos -2 en la ecuación: $5(-2) + 3$.'
  - 'Calculamos lado izquierdo: $-10 + 3 = -7$.'
  - 'Comparamos con el lado derecho: $-7$.'
  - $-7 = -7$. La solución es correcta.
- titulo: Si al verificar $x=1$ en una ecuación obtengo $5 = 6$, ¿qué concluyo?
  solucion_pasos:
  - La balanza está desequilibrada. Hay un error en el despeje.
- titulo: 'Respecto de «Verificación de la solución encontrada»: ¿Es correcta esta caracterización? «La'
  enunciado: 'Respecto de «Verificación de la solución encontrada»: ¿Es correcta esta caracterización? «La verificación
    consiste en sustituir el valor obtenido como respuesta en el lugar de la incógnita en la ecuación ORIGINAL»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: La verificación consiste en sustituir el valor obtenido como
    respuesta en el lugar de la incógnita en la ecuación ORIGINAL.'
- titulo: 'Respecto de «Verificación de la solución encontrada»: ¿Es válida esta afirmación? «Verificar'
  enunciado: 'Respecto de «Verificación de la solución encontrada»: ¿Es válida esta afirmación? «Verificar el resultado
    en el segundo o tercer paso de la resolución (si te equivocaste en el primer paso, ¡la verificación dirá que
    está bien siendo un resultado malo!). Siempre usar la primera línea»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: La verificación consiste en sustituir el valor obtenido como
    respuesta en el lugar de la incógnita en la ecuación ORIGINAL.'
errores_frecuentes:
- Verificar el resultado en el segundo o tercer paso de la resolución (si te equivocaste en el primer paso, ¡la
  verificación dirá que está bien siendo un resultado malo!). Siempre usar la primera línea.
- Porque es la única que tiene letras.
- Para practicar más la multiplicación.
- Para «¿Por qué es crucial realizar la verificación sustituyendo en la ecuación ORIGINAL del problema y no en un
  paso intermedio del despeje», la respuesta correcta es Porque los pasos intermedios siempre son incorrectos.
- Obtiene $-2 = 2$, por lo que concluye que hay un error.
estado: publicado
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
