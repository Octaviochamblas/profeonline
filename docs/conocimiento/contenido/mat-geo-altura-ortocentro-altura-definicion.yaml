semantic_id: MAT.GEO.ALTURA_ORTOCENTRO.ALTURA_DEFINICION
titulo: Definición de altura como segmento perpendicular desde un vértice al lado opuesto o a su prolongación
objetivo: Identificar la altura de un triángulo como el segmento que va desde un vértice, formando ángulo
  recto con el lado opuesto.
introduccion: De los tres segmentos notables que se pueden trazar desde un vértice, la altura es el que
  cae perpendicularmente sobre el lado opuesto (o su prolongación).
resumen: La altura de un triángulo es el segmento perpendicular trazado desde un vértice hasta el lado
  opuesto o su prolongación.
explicacion: '![Altura de un triángulo](/static/img/geometria/elementos-secundarios/altura-ortocentro-altura-definicion.svg)


  ### Definición formal


  La altura desde el vértice A de un triángulo ABC es el segmento AH'', donde H'' es el pie de la perpendicular
  trazada desde A hacia la recta que contiene a BC.


  ### Desarrollo didáctico


  En un triángulo ABC, la altura desde A cae perpendicularmente sobre BC (o su prolongación si el triángulo
  es obtusángulo). Cada triángulo tiene tres alturas, una por cada vértice.'
procedimiento:
- 'Paso 1: Elige un vértice del triángulo.'
- 'Paso 2: Traza el segmento perpendicular desde ese vértice hacia el lado opuesto.'
- 'Paso 3: Ese segmento es la altura correspondiente a ese vértice.'
ejemplos:
- titulo: Reconocer una altura
  enunciado: Desde el vértice A se traza un segmento que forma 90° con el lado BC.
  solucion_pasos:
  - Ese segmento es la altura desde A.
- titulo: Contar las alturas de un triángulo
  enunciado: ¿Cuántas alturas tiene un triángulo?
  solucion_pasos:
  - Tiene tres, una desde cada vértice.
- titulo: ¿Una altura siempre cae dentro del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, en un triángulo obtusángulo dos de las alturas caen sobre la prolongación del lado opuesto, fuera
    del triángulo.
- titulo: ¿La altura siempre forma un ángulo de 90° con el lado opuesto?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es exactamente la condición que la define.
errores_frecuentes:
- Confundir la altura con la bisectriz o la transversal de gravedad del mismo vértice.
- Creer que la altura siempre cae dentro del triángulo.
- Trazar un segmento que no forma exactamente 90° con el lado opuesto.
fuente: Elaboración propia.
estado: publicado
