semantic_id: MAT.EST.REPRESENTACION_CONTEO.PRINCIPIO_MULTIPLICATIVO_CONTEO
titulo: Aplicación del principio multiplicativo para contar resultados posibles
objetivo: Aplicar el principio multiplicativo de conteo para determinar el número total de resultados
  posibles de un experimento compuesto por varias etapas independientes.
introduccion: En vez de listar manualmente todas las combinaciones posibles de un experimento con varias
  etapas, el principio multiplicativo permite calcular ese total simplemente multiplicando las cantidades
  de opciones de cada etapa.
resumen: Si un proceso tiene $k$ etapas, con $n_1, n_2, \ldots, n_k$ opciones posibles en cada una, el
  número total de resultados posibles es $n_1\times n_2\times\cdots\times n_k$.
explicacion: '![Principio multiplicativo de conteo](/static/img/probabilidad/conteo/conteo-principio-multiplicativo.svg)


  ### Definición formal


  El principio multiplicativo establece que, si una elección se realiza en $k$ etapas independientes con
  $n_1,n_2,\ldots,n_k$ opciones respectivamente, el total de combinaciones posibles es el producto $n_1\times
  n_2\times\cdots\times n_k$.


  ### Desarrollo didáctico


  Si una persona tiene 3 poleras y 2 pantalones, el número total de combinaciones de vestimenta posibles
  es $3\times2=6$, sin necesidad de listar cada combinación individualmente.'
procedimiento:
- 'Paso 1: Identifica las distintas etapas o decisiones independientes del proceso.'
- 'Paso 2: Cuenta cuántas opciones hay disponibles en cada etapa.'
- 'Paso 3: Multiplica el número de opciones de todas las etapas para obtener el total de combinaciones
  posibles.'
ejemplos:
- titulo: Calcular combinaciones de ropa
  enunciado: 3 poleras y 2 pantalones.
  solucion_pasos:
  - 3×2=6 combinaciones posibles.
- titulo: Calcular combinaciones de un menú
  enunciado: 2 entradas, 3 platos de fondo, 2 postres.
  solucion_pasos:
  - 2×3×2=12 combinaciones posibles de menú completo.
- titulo: ¿El principio multiplicativo requiere que las etapas sean independientes entre sí?
  respuesta: Sí
  solucion_pasos:
  - Sí, cada elección no debe verse afectada por las elecciones de las otras etapas.
- titulo: ¿Este principio evita tener que listar manualmente cada combinación?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es su principal ventaja práctica.
errores_frecuentes:
- Sumar el número de opciones de cada etapa en vez de multiplicarlas.
- Olvidar considerar todas las etapas del proceso al aplicar el principio.
- Aplicar el principio multiplicativo cuando las etapas no son realmente independientes entre sí.
fuente: 'Elaboración propia (referencia: Moraleja 405).'
estado: publicado
