semantic_id: MAT.GEO.TEOREMA_COSENOS.APLICACION
titulo: Aplicación del teorema del coseno para calcular el tercer lado o un ángulo de un triángulo cualquiera
objetivo: 'Aplicar el teorema del coseno para resolver problemas numéricos: calcular un lado desconocido
  o un ángulo desconocido de un triángulo cualquiera.'
introduccion: 'El teorema del coseno tiene dos usos principales: calcular un lado cuando se conocen los
  otros dos lados y el ángulo entre ellos, o calcular un ángulo cuando se conocen los tres lados.'
resumen: El teorema del coseno se aplica despejando la incógnita (lado o ángulo) de la fórmula $a^2=b^2+c^2-2bc\cos(A)$,
  según los datos disponibles.
explicacion: '![Aplicación del teorema del coseno](/static/img/geometria/areas-pitagoras/cosenos-aplicacion.svg)


  ### Definición formal


  Para calcular un lado: se sustituyen los dos lados conocidos y el ángulo comprendido directamente en
  $a^2=b^2+c^2-2bc\cos(A)$. Para calcular un ángulo conociendo los tres lados: se despeja $\cos(A)=\frac{b^2+c^2-a^2}{2bc}$
  y luego se aplica el arcocoseno.


  ### Desarrollo didáctico


  Con $b=8$, $c=5$ y ángulo $A=60°$: $a^2=8^2+5^2-2(8)(5)\cos(60°)=64+25-80(0,5)=89-40=49$, por lo que
  $a=7$. Para el caso inverso, con $a=7$, $b=8$, $c=5$: $\cos(A)=\frac{64+25-49}{80}=\frac{40}{80}=0,5$,
  por lo que $A=\arccos(0,5)=60°$.'
procedimiento:
- 'Paso 1: Identifica qué se busca (un lado o un ángulo) y qué datos se conocen.'
- 'Paso 2: Si buscas un lado, sustituye los dos lados conocidos y el ángulo comprendido en la fórmula
  directamente.'
- 'Paso 3: Si buscas un ángulo, despeja el coseno con los tres lados conocidos y aplica el arcocoseno.'
ejemplos:
- titulo: Calcular un lado con dos lados y el ángulo comprendido
  enunciado: Un triángulo tiene b=8, c=5 y ángulo A=60° entre ellos.
  solucion_pasos:
  - a²=64+25−80×0,5=89−40=49 → a=7.
- titulo: Calcular un ángulo con los tres lados
  enunciado: Un triángulo tiene a=7, b=8, c=5.
  solucion_pasos:
  - cos(A)=(64+25−49)/80=40/80=0,5 → A=arccos(0,5)=60°.
- titulo: ¿Se puede calcular un ángulo conociendo solo dos lados?
  respuesta: 'No'
  solucion_pasos:
  - No, se necesitan los tres lados para despejar el coseno de un ángulo.
- titulo: ¿El teorema del coseno permite resolver un triángulo sin ángulos rectos?
  respuesta: Sí
  solucion_pasos:
  - Sí, es precisamente su utilidad principal frente al teorema de Pitágoras.
errores_frecuentes:
- Confundir cuál lado y ángulo corresponden entre sí al sustituir en la fórmula.
- Olvidar aplicar el arcocoseno al final, dejando el resultado como cos(A) en vez del ángulo A.
- Errores de signo al despejar cos(A) de la ecuación original.
fuente: 'Fuente: Moraleja 55.'
estado: publicado
