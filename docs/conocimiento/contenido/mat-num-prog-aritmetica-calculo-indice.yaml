semantic_id: MAT.NUM.PROG_ARITMETICA.CALCULO_INDICE
objetivo: Despejar y calcular la posición (n) que ocupa un número específico dentro
  de una progresión aritmética.
introduccion: ¿A qué hora llegará el tren a la estación número 50? Ya sabemos calcular
  el número conociendo la posición, pero ¿y si te dan el número y te preguntan en
  qué asiento va sentado? Esto requiere encontrar la incógnita 'n'.
resumen: 'Para saber la posición de un término, despejamos ''$n$'' de la fórmula general:
  $n = \frac{a_n - a_1}{d} + 1$. El resultado final siempre debe ser un número entero
  positivo.'
explicacion: 'Supongamos que el primer término es 3 ($a_1=3$) y vas sumando 4 ($d=4$).
  De repente encuentras el número 43. ¿Qué posición ocupa en la lista?


  Volvemos a nuestra fiel ecuación $a_n = a_1 + (n-1)d$, pero ahora la incógnita es
  ''$n$''.

  **Fórmula despejada para el índice:**

  $$n = \frac{a_n - a_1}{d} + 1$$


  Traducción lógica: ''Resto mi destino menos el inicio para saber la distancia total.
  Divido por el tamaño del paso para saber cuántos pasos di. Y le sumo 1 porque ya
  estaba parado en el primer casillero''.


  Resolviendo el ejemplo:

  - $n = \frac{43 - 3}{4} + 1$

  - $n = \frac{40}{4} + 1$

  - $n = 10 + 1 = 11$

  El número 43 está en la 11va posición.'
procedimiento:
- 'Paso 1: Resta el término final menos el término inicial ($a_n - a_1$).'
- 'Paso 2: Divide ese resultado por la diferencia constante ''d''.'
- 'Paso 3: Súmale 1 al resultado de la división.'
- 'Paso 4: Comprueba que tu respuesta sea un número natural (no puede existir la posición
  3.5 o -2).'
ejemplos:
- titulo: ¿Qué número de cliente eres?
  enunciado: La sucesión es 15, 20, 25... ¿En qué posición se encuentra el número
    105?
  solucion_pasos:
  - a1 = 15, d = 5. Destino an = 105.
  - 'Distancia total: 105 - 15 = 90.'
  - 'Pasos dados: 90 / 5 = 18.'
  - 'Posición final: 18 + 1 = 19.'
  - El 105 está en la posición 19.
errores_frecuentes:
- Olvidar sumar el '+1' al final del despeje, entregando como respuesta solo el número
  de 'saltos'.
- Dividir por 'd' antes de haber hecho la resta $a_n - a_1$ (error de jerarquía de
  fracciones).
fuente: Currículum Nacional MINEDUC.
estado: publicado
