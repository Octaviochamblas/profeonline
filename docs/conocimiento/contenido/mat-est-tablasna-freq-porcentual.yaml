semantic_id: MAT.EST.TABLAS_NO_AGRUPADAS.FREQ_PORCENTUAL
titulo: Convertir la frecuencia relativa a frecuencia porcentual
objetivo: Convertir la frecuencia relativa a frecuencia porcentual, multiplicando por 100 para expresarla
  como porcentaje.
introduccion: La frecuencia porcentual es la forma más intuitiva de comunicar la importancia proporcional
  de un valor dentro de un conjunto de datos.
resumen: La frecuencia porcentual es la frecuencia relativa expresada como porcentaje, obtenida multiplicando
  la frecuencia relativa por 100.
explicacion: '![Conversión a frecuencia porcentual](/static/img/estadistica/tablasna/tablasna-freq-porcentual.svg)


  ### Definición formal


  $f\%_i=fr_i\times100=\dfrac{f_i}{n}\times100$, la frecuencia relativa expresada en porcentaje.


  ### Desarrollo didáctico


  Si la frecuencia relativa de un valor es 0,3, su frecuencia porcentual es $0{,}3\times100=30\%$.'
procedimiento:
- 'Paso 1: Calcula (o identifica) la frecuencia relativa (fr) del valor.'
- 'Paso 2: Multiplica esa frecuencia relativa por 100.'
- 'Paso 3: Expresa el resultado con el símbolo de porcentaje (%).'
ejemplos:
- titulo: Convertir fr=0,3 a porcentaje
  enunciado: fr=0,3.
  solucion_pasos:
  - f%=0,3×100=30%.
- titulo: Convertir fr=0,25 a porcentaje
  enunciado: fr=0,25.
  solucion_pasos:
  - f%=0,25×100=25%.
- titulo: ¿La suma de todas las frecuencias porcentuales de un conjunto es igual a 100%?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que la suma de las frecuencias relativas es 1, y al multiplicar por 100 se obtiene 100%.
- titulo: ¿La frecuencia porcentual puede superar el 100%?
  respuesta: 'No'
  solucion_pasos:
  - No, ya que la frecuencia relativa máxima es 1 (equivalente a 100%).
errores_frecuentes:
- Olvidar multiplicar por 100 al convertir de frecuencia relativa a porcentual.
- Confundir la frecuencia porcentual con la frecuencia absoluta, mezclando unidades.
- No verificar que la suma de todas las frecuencias porcentuales sea igual a 100%.
fuente: 'Elaboración propia (referencia: Moraleja 198, 351).'
estado: publicado
