semantic_id: MAT.EST.NORMAL_ESTANDAR.MEDIA_CERO
titulo: Reconocer la propiedad de media cero en la normal estándar
objetivo: Reconocer que la distribución normal estándar tiene siempre una media igual a cero.
introduccion: En la distribución normal estándar, el "centro" de la curva siempre está exactamente en el número cero.
resumen: La distribución normal estándar tiene, por definición, una media igual a 0, lo que centra su curva
  exactamente en el origen del eje.
explicacion: '![Media cero en la normal estándar](/static/img/estadistica/normest/normest-media-cero.svg)


  ### Definición formal


  Para la variable $Z$ de la distribución normal estándar $N(0,1)$, se cumple que $\mu_Z=0$, ubicando el centro de la

  curva exactamente en el valor 0 del eje horizontal.


  ### Desarrollo didáctico


  Esta propiedad es la razón por la cual los valores positivos de $Z$ corresponden a datos por encima de la media

  original, y los valores negativos a datos por debajo de ella.'
procedimiento:
- 'Paso 1: Recuerda que la normal estándar es $N(0,1)$.'
- 'Paso 2: Identifica que el valor 0 corresponde a la media de esa distribución.'
- 'Paso 3: Ubica el centro de la curva exactamente en $Z=0$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: ¿En qué valor se ubica el centro de la curva de la distribución normal estándar?
  solucion_pasos:
  - Se ubica exactamente en 0.
- titulo: Ejemplo 2
  enunciado: Si un valor $Z$ es positivo, ¿qué indica respecto de la media original de los datos?
  solucion_pasos:
  - Indica que el dato original está por encima de su media.
- titulo: ¿La media de la distribución normal estándar es igual a cero?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad definitoria de esta distribución.
- titulo: ¿La media de la distribución normal estándar puede ser distinta de cero en algún caso?
  respuesta: 'No'
  solucion_pasos:
  - 'No, por definición siempre es exactamente 0.'
errores_frecuentes:
- Creer que la media de la normal estándar puede variar según el problema.
- Confundir la media de la normal estándar con la media de la variable original $X$.
- Pensar que un valor $Z=0$ representa el valor mínimo de la distribución.
- Olvidar que esta propiedad es exclusiva de la distribución estandarizada, no de cualquier normal.
- Confundir el centro de la curva con su valor máximo en el eje vertical.
fuente: 'Elaboración propia (referencia: Moraleja 307).'
estado: publicado
