semantic_id: MAT.EST.NORMAL_BASE.REGLA_68
titulo: Aplicar la regla empírica del 68% en torno a la media
objetivo: Aplicar la regla empírica que indica que aproximadamente el 68% de los datos de una distribución normal se
  encuentra a una desviación estándar de la media.
introduccion: En cualquier distribución normal, la mayoría de los datos (aproximadamente 68 de cada 100) se agrupa muy
  cerca del centro, dentro de una sola desviación estándar.
resumen: Aproximadamente el 68% de los datos de una distribución normal se encuentra dentro del intervalo
  $[\mu-\sigma, \mu+\sigma]$.
explicacion: '![Regla del 68%](/static/img/estadistica/normbase/normbase-regla-68.svg)


  ### Definición formal


  En toda distribución normal, se cumple que $P(\mu-\sigma\leq X\leq \mu+\sigma)\approx 0{,}68$, es decir, el 68% de

  los datos está a menos de una desviación estándar de la media.


  ### Desarrollo didáctico


  Esta regla forma parte de la llamada "regla empírica" (68-95-99,7), muy usada para estimar rápidamente proporciones

  de datos sin necesidad de tablas o cálculos exactos.'
procedimiento:
- 'Paso 1: Calcula los valores $\mu-\sigma$ y $\mu+\sigma$.'
- 'Paso 2: Reconoce ese intervalo como el rango de una desviación estándar en torno a la media.'
- 'Paso 3: Aplica la regla empírica: aproximadamente el 68% de los datos está en ese intervalo.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si una distribución normal tiene $\mu=100$ y $\sigma=10$, ¿qué intervalo contiene aproximadamente el 68%
    de los datos?
  solucion_pasos:
  - El intervalo es $[100-10, 100+10] = [90, 110]$.
  - Aproximadamente el 68% de los datos se encuentra en ese rango.
- titulo: Ejemplo 2
  enunciado: ¿Qué porcentaje de los datos queda fuera del intervalo $[\mu-\sigma, \mu+\sigma]$?
  solucion_pasos:
  - Aproximadamente el 32% de los datos queda fuera de ese intervalo (100% - 68%).
- titulo: ¿La regla del 68% se refiere al intervalo de una desviación estándar en torno a la media?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente ese intervalo.
- titulo: ¿La regla del 68% corresponde a dos desviaciones estándar en torno a la media?
  respuesta: 'No'
  solucion_pasos:
  - 'No, corresponde a una sola desviación estándar; dos desviaciones corresponden a la regla del 95%.'
errores_frecuentes:
- Confundir la regla del 68% con la del 95% o la del 99,7%.
- Calcular el intervalo usando $2\sigma$ en vez de $1\sigma$.
- Pensar que el 68% es un valor exacto en vez de una aproximación empírica.
- Olvidar que el intervalo es simétrico respecto de la media.
- Confundir esta regla con el cálculo exacto usando tabla Z.
fuente: 'Elaboración propia (referencia: Moraleja 306).'
estado: publicado
