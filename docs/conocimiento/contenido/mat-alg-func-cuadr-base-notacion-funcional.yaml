semantic_id: MAT.ALG.FUNC_CUADR_BASE.NOTACION_FUNCIONAL
titulo: Uso de la notación funcional f(x) en una función cuadrática
objetivo: Interpretar y usar correctamente la notación $f(x)$ al trabajar con funciones cuadráticas.
introduccion: 'La notación $f(x)$ para una función cuadrática funciona exactamente igual que para cualquier otra
  función: nombra el valor que la función produce al recibir a $x$ como entrada.'
resumen: En una función cuadrática $f(x)=ax^2+bx+c$, la notación $f(x)$ representa la imagen que la función asigna
  al valor $x$; evaluar $f(k)$ significa sustituir $x$ por $k$ en toda la regla.
explicacion: '### Definición formal


  Dada $f(x)=ax^2+bx+c$, la notación $f(k)$ denota el valor $a k^2+bk+c$, obtenido al sustituir cada aparición
  de $x$ por el número $k$. El símbolo $f(x)$ no representa "$f$ multiplicado por $x$", sino el nombre completo
  del valor de salida.


  ### Desarrollo didáctico


  Al evaluar $f(k)$, conviene sustituir con paréntesis en cada lugar donde aparecía $x$, para preservar correctamente
  los signos y exponentes durante el cálculo.


  Si $f(x)=2x^2-3x+1$, entonces $f(2)=2(2)^2-3(2)+1=8-6+1=3$.'
procedimiento:
- 'Paso 1: Identifica la regla completa de la función cuadrática $f(x)=ax^2+bx+c$.'
- 'Paso 2: Sustituye cada aparición de $x$ por el valor solicitado, usando paréntesis.'
- 'Paso 3: Calcula el resultado siguiendo el orden de las operaciones.'
ejemplos:
- titulo: Evaluación en un valor positivo
  enunciado: 'Si $f(x)=x^2-4x+3$, calcula $f(5)$.'
  solucion_pasos:
  - '$f(5)=(5)^2-4(5)+3=25-20+3$.'
  - '$f(5)=8$.'
- titulo: Evaluación en un valor negativo
  enunciado: 'Si $f(x)=-2x^2+x-1$, calcula $f(-3)$.'
  solucion_pasos:
  - '$f(-3)=-2(-3)^2+(-3)-1=-2(9)-3-1$.'
  - '$f(-3)=-22$.'
- titulo: ¿$f(x)$ significa $f$ multiplicado por $x$?
  enunciado: ¿$f(x)$ significa $f$ multiplicado por $x$?
  respuesta: 'No'
  solucion_pasos:
  - Es el nombre completo del valor que la función $f$ produce al evaluar en $x$, no una multiplicación.
- titulo: ¿Es necesario usar paréntesis al sustituir un valor negativo en la regla de la función?
  enunciado: ¿Es necesario usar paréntesis al sustituir un valor negativo en la regla de la función?
  respuesta: Sí
  solucion_pasos:
  - Los paréntesis preservan el signo del valor sustituido durante las operaciones de potenciación y multiplicación.
errores_frecuentes:
- Olvidar elevar al cuadrado el valor completo (incluyendo el signo) al sustituir un número negativo.
- Interpretar $f(x)$ como una multiplicación en vez de como notación de evaluación.
- Cometer errores en el orden de las operaciones al calcular $f(k)$.
- No sustituir $x$ en todos los términos de la regla, dejando alguno sin evaluar.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
