semantic_id: MAT.GEO.ANGULOS_RELACIONES_METRICAS.SUPLEMENTARIOS_DEFINICION
titulo: Definición de ángulos suplementarios como ángulos cuya suma es 180°
objetivo: Reconocer cuándo dos medidas forman un par de ángulos suplementarios y comprobar que la relación
  se comprueba por suma y no por la apariencia de estar sobre una recta.
introduccion: Dos aberturas diferentes pueden completar una media vuelta exacta. Lo importante es el total
  de 180°, aunque el dibujo no las muestre pegadas.
resumen: Dos ángulos son suplementarios cuando sus medidas suman 180°. Como idea de control, la relación
  se comprueba por suma y no por la apariencia de estar sobre una recta.
explicacion: 'Dos ángulos son suplementarios cuando sus medidas suman 180°.


  En el caso “si un ángulo mide 110° y otro 70°, juntos completan 180°” esta idea se vuelve visible y
  permite comprobar que la relación se comprueba por suma y no por la apariencia de estar sobre una recta.'
procedimiento:
- 'Paso 1: Determina las dos medidas angulares que se comparan.'
- 'Paso 2: Súmalas y contrasta el total con 180°.'
- 'Paso 3: Decide si el par es suplementario justificando la igualdad o la diferencia encontrada.'
ejemplos:
- titulo: Situación geométrica — Ángulos suplementarios
  enunciado: Si un ángulo mide 110° y otro 70°, juntos completan 180°.
  solucion_pasos:
  - Determina las dos medidas angulares que se comparan.
  - Súmalas y contrasta el total con 180°.
  - Decide si el par es suplementario justificando la igualdad o la diferencia encontrada.
- titulo: Corrección de una respuesta — Ángulos suplementarios
  enunciado: 'Un estudiante usa la idea “la relación se comprueba por suma y no por la apariencia de estar
    sobre una recta” al analizar este caso: si un ángulo mide 110° y otro 70°, juntos completan 180°.
    Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: dos ángulos son suplementarios cuando sus medidas suman 180°.'
  - Súmalas y contrasta el total con 180°.
  - Decide si el par es suplementario justificando la igualdad o la diferencia encontrada.
- titulo: ¿La interpretación del dibujo es válida? — Ángulos suplementarios
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: dos ángulos son suplementarios cuando sus
    medidas suman 180°.'
  - En el caso “si un ángulo mide 110° y otro 70°, juntos completan 180°” se observa que la relación se
    comprueba por suma y no por la apariencia de estar sobre una recta.
  - Decide si el par es suplementario justificando la igualdad o la diferencia encontrada.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Ángulos suplementarios
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de definición de ángulos suplementarios
    como ángulos cuya suma es 180°.
  - Después del paso “Determina las dos medidas angulares que se comparan.” todavía hace falta revisar
    “Súmalas y contrasta el total con 180°.”.
  - El cierre correcto exige “Decide si el par es suplementario justificando la igualdad o la diferencia
    encontrada.”.
errores_frecuentes:
- Ángulos suplementarios significa tener cualquier suma grande, aunque no llegue exactamente a 180°.
- Para resolver ángulos suplementarios, basta con el paso “Determina las dos medidas angulares que se
  comparan.” y no hace falta revisar “Súmalas y contrasta el total con 180°.”.
- Si el dibujo parece claro, se puede ignorar que la relación se comprueba por suma y no por la apariencia
  de estar sobre una recta.
- Dos configuraciones distintas representan ángulos suplementarios solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Decide si el par es suplementario justificando
  la igualdad o la diferencia encontrada.”.
