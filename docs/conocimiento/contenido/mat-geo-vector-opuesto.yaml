semantic_id: MAT.GEO.VECTORES_BASE.VECTOR_OPUESTO
titulo: Concepto de vector opuesto
objetivo: Reconocer el vector opuesto de un vector dado como aquel con el mismo módulo y dirección, pero
  sentido contrario.
introduccion: 'El vector opuesto de un vector es como su ''reflejo'': mismo tamaño, misma línea, pero
  apuntando exactamente hacia el lado contrario.'
resumen: El vector opuesto de $\vec{v}$, denotado $-\vec{v}$, es el vector con el mismo módulo y dirección
  que $\vec{v}$, pero sentido contrario.
explicacion: '![Vector opuesto](/static/img/geometria/cartesiano-vectores/vector-opuesto.svg)


  ### Definición formal


  Si $\vec{v}=(v_x,v_y)$, su vector opuesto es $-\vec{v}=(-v_x,-v_y)$: se invierte el signo de cada componente,
  manteniendo el mismo módulo y dirección, pero sentido opuesto.


  ### Desarrollo didáctico


  En la figura, el vector $\vec{v}=(4,3)$ y su opuesto $-\vec{v}=(-4,-3)$ están sobre la misma línea (misma
  dirección) y tienen igual longitud (mismo módulo), pero apuntan hacia lados contrarios.'
procedimiento:
- 'Paso 1: Identifica las componentes del vector original v=(vx,vy).'
- 'Paso 2: Invierte el signo de cada componente para obtener -v=(-vx,-vy).'
- 'Paso 3: Verifica que el vector opuesto tenga el mismo módulo que el original, pero sentido contrario.'
ejemplos:
- titulo: Determinar el vector opuesto de un vector dado
  enunciado: El vector v tiene componentes (4,3).
  solucion_pasos:
  - El vector opuesto es -v=(-4,-3), invirtiendo el signo de cada componente.
- titulo: Verificar que el módulo se mantiene igual
  enunciado: Se comparan los módulos de v=(4,3) y -v=(-4,-3).
  solucion_pasos:
  - 'Ambos tienen el mismo módulo: √(4²+3²)=√(-4)²+(-3)²)=5, ya que el cuadrado elimina el signo.'
- titulo: ¿El vector opuesto tiene la misma dirección que el original?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos están sobre la misma línea (misma dirección), solo cambia el sentido.
- titulo: ¿El opuesto del vector opuesto es el vector original?
  respuesta: Sí
  solucion_pasos:
  - Sí, -(-v)=v, por lo que aplicar el opuesto dos veces devuelve el vector original.
errores_frecuentes:
- Cambiar el módulo del vector al calcular su opuesto, en vez de solo invertir el sentido.
- Invertir el signo de solo una de las dos componentes, en vez de ambas.
- Confundir el vector opuesto con un vector de distinta dirección.
fuente: 'Elaboración propia (referencia: Moraleja Tomo 2 122).'
estado: publicado
