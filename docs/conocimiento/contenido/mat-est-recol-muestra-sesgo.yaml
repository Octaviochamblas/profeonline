semantic_id: MAT.EST.RECOLECCION_BASE.MUESTRA_SESGO
titulo: Identificar sesgos en la selección de una muestra
objetivo: Identificar situaciones en las que el método de selección de una muestra introduce un sesgo,
  distorsionando su representatividad.
introduccion: El sesgo muestral ocurre cuando el método usado para elegir a los participantes favorece
  sistemáticamente a ciertos grupos por sobre otros.
resumen: El sesgo de una muestra es una distorsión sistemática que ocurre cuando el método de selección
  favorece a ciertos elementos de la población por sobre otros, de forma no aleatoria.
explicacion: '![Identificación de sesgos en la muestra](/static/img/estadistica/recol/recol-muestra-sesgo.svg)


  ### Definición formal


  Una muestra está sesgada cuando el proceso de selección hace que algunos subgrupos de la población tengan
  mayor o menor probabilidad de ser incluidos que otros, de forma sistemática.


  ### Desarrollo didáctico


  Encuestar solo a personas que responden llamadas telefónicas fijas introduce un sesgo, ya que excluye
  sistemáticamente a quienes solo usan celular, un grupo que puede tener características distintas.'
procedimiento:
- 'Paso 1: Analiza el método usado para seleccionar a los participantes de la muestra.'
- 'Paso 2: Identifica si ese método excluye o subrepresenta sistemáticamente a algún grupo de la población.'
- 'Paso 3: Si existe esa exclusión sistemática, concluye que la muestra tiene sesgo de selección.'
ejemplos:
- titulo: Identificar sesgo en una encuesta telefónica fija
  enunciado: Una encuesta se realiza solo a números de teléfono fijo.
  solucion_pasos:
  - Existe sesgo, ya que excluye sistemáticamente a personas que solo usan celular, un grupo posiblemente
    distinto.
- titulo: Identificar sesgo en una encuesta en redes sociales
  enunciado: Una encuesta sobre hábitos de lectura se publica solo en una red social usada mayormente
    por jóvenes.
  solucion_pasos:
  - Existe sesgo, ya que subrepresenta a adultos mayores que no usan esa red social.
- titulo: ¿Un sesgo de selección puede afectar la validez de las conclusiones del estudio?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que los resultados pueden reflejar las características del subgrupo sobrerrepresentado, no
    de toda la población.
- titulo: ¿Una muestra aleatoria bien diseñada tiende a evitar el sesgo de selección?
  respuesta: Sí
  solucion_pasos:
  - Sí, el muestreo aleatorio busca dar a todos los elementos de la población la misma probabilidad de
    ser elegidos.
errores_frecuentes:
- No identificar el método de selección como una posible fuente de sesgo en el estudio.
- Asumir que cualquier muestra grande está libre de sesgo, sin analizar cómo fue seleccionada.
- Ignorar que ciertos canales de recolección de datos (como una sola red social) excluyen sistemáticamente
  a algunos grupos.
fuente: 'Elaboración propia (referencia: Moraleja 350).'
estado: publicado
