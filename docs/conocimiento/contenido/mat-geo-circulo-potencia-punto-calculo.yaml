semantic_id: MAT.GEO.CIRCULO_TEOREMAS.POTENCIA_PUNTO_CALCULO
titulo: Cálculo de potencia de un punto usando cuerdas, secantes o tangentes
objetivo: Calcular la potencia de un punto respecto de una circunferencia utilizando indistintamente la
  fórmula PO²-r², el producto de segmentos de cuerdas o secantes, o el cuadrado del segmento tangente.
introduccion: 'La potencia de un punto puede calcularse de varias formas equivalentes: usando la distancia
  al centro, o usando los segmentos de cuerdas, secantes o tangentes trazadas desde ese punto.'
resumen: La potencia de un punto $P$ puede calcularse como $\text{pot}(P)=PO^2-r^2$, o equivalentemente
  como $PA\times PB$ (cuerdas o secantes) o $PT^2$ (tangente), dando siempre el mismo valor absoluto.
explicacion: '![Cálculo de la potencia de un punto](/static/img/geometria/circunferencia-circulo/circulo-potencia-punto-calculo.svg)


  ### Definición formal


  Para un punto exterior $P$, la potencia puede calcularse de tres formas equivalentes: $\text{pot}(P)=PO^2-r^2$
  (usando la distancia al centro), $\text{pot}(P)=PA\times PB$ (usando una secante que corta en $A$ y
  $B$), o $\text{pot}(P)=PT^2$ (usando la tangente que toca en $T$). Para un punto interior, la potencia
  (negativa) se calcula como $-(PA\times PB)$ usando dos cuerdas que se cruzan en $P$.


  ### Desarrollo didáctico


  Si un punto $P$ está a 10 cm del centro de una circunferencia de radio 6 cm, su potencia es $10^2-6^2=64$.
  Si además se traza una tangente desde $P$, esta debe medir $PT=\sqrt{64}=8$ cm; y si se traza una secante
  con segmento exterior $PA=4$ cm, el segmento total debe cumplir $PB=64/4=16$ cm. Los tres métodos son
  consistentes entre sí.'
procedimiento:
- 'Paso 1: Identifica qué información tienes disponible (distancia al centro, segmentos de secante/cuerda,
  o segmento tangente).'
- 'Paso 2: Elige la fórmula correspondiente: PO²-r² (distancia), PA×PB (cuerdas o secantes), o PT² (tangente).'
- 'Paso 3: Calcula la potencia y, si es necesario, usa ese valor para encontrar un segmento desconocido
  con otro de los métodos.'
ejemplos:
- titulo: Calcular la potencia usando la distancia al centro
  enunciado: Un punto P está a 10 cm del centro de una circunferencia de radio 6 cm.
  solucion_pasos:
  - pot(P)=10²-6²=100-36=64.
- titulo: Verificar la potencia usando el segmento tangente
  enunciado: La potencia de P es 64, y desde P se traza una tangente.
  solucion_pasos:
  - PT²=64 → PT=√64=8 cm, consistente con el valor de la potencia.
- titulo: ¿Los tres métodos (distancia, secante, tangente) dan siempre el mismo valor de potencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, son formas equivalentes de calcular la misma cantidad, la potencia del punto P.
- titulo: ¿Se puede calcular la potencia sin conocer el radio, usando solo segmentos de una secante?
  respuesta: Sí
  solucion_pasos:
  - Sí, basta con multiplicar el segmento exterior por el segmento total de la secante (PA×PB), sin necesidad
    de conocer el radio directamente.
errores_frecuentes:
- Mezclar los tres métodos de cálculo sin verificar que efectivamente den el mismo resultado.
- Usar la fórmula PO²-r² sin conocer realmente la distancia al centro, confundiéndola con otro segmento.
- Olvidar que, para un punto interior, la potencia calculada mediante cuerdas es negativa (el producto
  se antepone de signo menos).
fuente: Elaboración propia (sin fuente específica).
estado: publicado
