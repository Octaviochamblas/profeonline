semantic_id: MAT.ALG.MULT_MONOMIOS.GRADO_PRODUCTO
titulo: Determinación del grado del producto de monomios
objetivo: Determinar el grado absoluto y relativo del resultado de multiplicar dos o más monomios, comprendiendo
  que el grado final es la suma de los grados de los factores.
introduccion: Cuando multiplicas dos monomios, el 'tamaño' algebraico (su grado) aumenta. Si multiplicas algo de
  grado 2 por algo de grado 3, el resultado es de grado 5. Los grados siempre se suman.
resumen: 'El grado de un monomio es la suma de los exponentes de sus letras (grado absoluto) o el exponente de una
  letra específica (grado relativo).


  Al multiplicar monomios:

  - El grado absoluto del producto es igual a la suma de los grados absolutos de los factores.

  - El grado relativo (respecto a una variable) del producto es igual a la suma de los grados relativos de esa variable
  en los factores.'
explicacion: '### Definición formal


  Como las potencias de igual base se suman ($x^a \cdot x^b = x^{a+b}$), los grados absolutos de los factores se
  suman.


  ### Desarrollo didáctico


  La propiedad del grado en la multiplicación se deriva directamente de la regla de los exponentes: $x^a \cdot x^b
  = x^{a+b}$.


  Si tienes un monomio $M_1$ de grado absoluto $m$ y un monomio $M_2$ de grado absoluto $n$, el producto $M_1 \cdot
  M_2$ tendrá grado absoluto $m + n$.


  Por ejemplo, si $M_1 = 3x^2y^3$ (grado $2+3=5$) y $M_2 = -2x^4y$ (grado $4+1=5$), el producto es $-6x^6y^4$. Su
  grado absoluto es $6+4=10$, que es exactamente $5 + 5$.'
procedimiento:
- 'Para hallar el grado absoluto del producto sin calcularlo completamente:

  1. Encuentra el grado absoluto del primer factor (suma sus exponentes).

  2. Encuentra el grado absoluto del segundo factor.

  3. Suma ambos grados obtenidos.


  Para hallar el grado absoluto del producto calculado:

  1. Multiplica los monomios normalmente.

  2. Suma todos los exponentes de las letras en el resultado final.'
- Como las potencias de igual base se suman ($x^a \cdot x^b = x^{a+b}$), los grados absolutos de los factores se
  suman.
ejemplos:
- title: Cálculo a partir de los factores
  text: Encuentra el grado del producto de $5x^3y^2$ y $7x^4y^5$.
  steps:
  - El grado del primer factor es $3 + 2 = 5$.
  - El grado del segundo factor es $4 + 5 = 9$.
  - El grado del producto será $5 + 9 = 14$.
  solucion_pasos: []
- title: Cálculo verificando el producto
  text: Multiplica $-2a^2b^3c$ por $4ab^2c^4$ y determina el grado absoluto.
  steps:
  - 'Producto: $-8a^{2+1}b^{3+2}c^{1+4} = -8a^3b^5c^5$.'
  - 'Suma los exponentes del resultado: $3 + 5 + 5 = 13$.'
  - El grado absoluto es $13$.
  solucion_pasos: []
- title: 'Verdadero o Falso: Multiplicación de grados'
  text: El grado absoluto del producto de dos monomios se obtiene multiplicando los grados absolutos de los factores.
  steps:
  - Los exponentes se suman al multiplicar potencias de igual base.
  - Por lo tanto, los grados absolutos de los monomios se suman, no se multiplican.
  - La afirmación es Falsa.
  solucion_pasos: []
- titulo: 'Respecto de «Determinación del grado del producto de monomios»: ¿La siguiente formulación es'
  enunciado: 'Respecto de «Determinación del grado del producto de monomios»: ¿La siguiente formulación es correcta?
    «El grado de un monomio es la suma de los exponentes de sus letras (grado absoluto) o el exponente de una letra
    específica (grado relativo)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El grado de un monomio es la suma de los exponentes de sus
    letras (grado absoluto) o el exponente de una letra específica (grado relativo).'
- titulo: 'Respecto de «Determinación del grado del producto de monomios»: ¿La siguiente conclusión es'
  enunciado: 'Respecto de «Determinación del grado del producto de monomios»: ¿La siguiente conclusión es correcta?
    «Multiplicar los grados de los factores en lugar de sumarlos»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El grado de un monomio es la suma de los exponentes de sus
    letras (grado absoluto) o el exponente de una letra específica (grado relativo).'
errores_frecuentes:
- Multiplicar los grados de los factores en lugar de sumarlos.
- Olvidar que las variables sin exponente escrito tienen exponente $1$.
- Confundir el grado absoluto (suma de todos los exponentes) con el coeficiente del monomio.
- Para «Al multiplicar dos monomios, ¿cómo se determina el grado absoluto del producto», la respuesta correcta es
  Multiplicando los grados absolutos de ambos monomios.
- Para «Al multiplicar dos monomios, ¿cómo se determina el grado absoluto del producto», la respuesta correcta es
  El grado absoluto es igual al del monomio de mayor grado.
