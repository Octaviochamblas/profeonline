semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.NUMERO_DISMINUIDO
objetivo: Traducir expresiones donde una cantidad se ve reducida en un valor específico.
introduccion: Si a un estanque de agua se le hace un agujero, la cantidad de agua
  disminuye. Al igual que el concepto de 'aumentado', el álgebra tiene una traducción
  directa para cuando perdemos cantidad.
resumen: Un **Número Disminuido** se traduce tomando la variable inicial y aplicándole
  una sustracción ($-$) con la cantidad que se pierde o disminuye.
explicacion: 'Palabras clave:

  - Disminuido en

  - Reducido en

  - Rebajado en


  Ejemplos:

  - ''Un número disminuido en quince'': $x - 15$

  - ''El precio de la camisa reducido en un descuento desconocido'': $P - d$

  - ''Diez disminuido en un número'': $10 - x$


  Nuevamente, el orden es ley. Si la oración dice ''un número disminuido en siete'',
  el número es el que sufre la pérdida, por lo tanto él va primero: $x - 7$.'
procedimiento:
- 'Paso 1: Identifica el objeto principal de la oración que va a sufrir la pérdida.'
- 'Paso 2: Escribe la letra que lo representa.'
- 'Paso 3: Escribe el signo de resta (-).'
- 'Paso 4: Escribe la cantidad de reducción a la derecha del signo menos.'
ejemplos:
- titulo: Pérdida de peso
  enunciado: 'Traduce algebraicamente: ''El peso de un paciente disminuido en 5 kilogramos''.'
  solucion_pasos:
  - 'El sujeto principal es el peso del paciente: P.'
  - 'Sufre una reducción: -.'
  - 'La reducción es de 5 kg: 5.'
  - 'Traducción completa: P - 5.'
errores_frecuentes:
- 'Escribir la constante primero por inercia cuando se lee rápido. (Ej: ''un número
  disminuido en 8'' traducido como $8 - x$).'
- 'Confundir ''disminuido en'' con ''disminuido a''. (Ej: ''El precio rebajado a la
  mitad'' es una división $\frac{x}{2}$, pero ''el precio rebajado en la mitad'' es
  una resta $x - \frac{x}{2}$).'
fuente: Álgebra de Baldor.
estado: publicado
