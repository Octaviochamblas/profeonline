semantic_id: MAT.ALG.FUNC_EXPONENCIAL_BASE.PARAMETRO_BASE
titulo: Identificación de la base b en la función exponencial
objetivo: Identificar correctamente la base $b$ en una función exponencial dada en forma general.
introduccion: 'La base $b$ es el verdadero "motor" del comportamiento exponencial: determina si la función crece
  o decrece, y qué tan rápido lo hace.'
resumen: La **base $b$** de una función exponencial $f(x)=a\cdot b^x$ es el número que se eleva a la potencia
  $x$, y determina si la función es creciente o decreciente.
explicacion: '### Definición formal


  En $f(x)=a\cdot b^x$, la base $b$ es el número real positivo y distinto de 1 que se eleva a la potencia $x$.
  Si $b>1$, la función es creciente; si $0<b<1$, la función es decreciente.


  ### Desarrollo didáctico


  Para identificar $b$, se localiza el número que está elevado a la potencia $x$, distinguiéndolo del coeficiente
  $a$ que lo multiplica.


  En $f(x)=6\cdot1{,}5^x$, la base es $1{,}5$, un valor mayor que 1, por lo que la función es creciente.'
procedimiento:
- 'Paso 1: Ordena la función para identificar claramente la potencia con exponente variable.'
- 'Paso 2: Identifica el número elevado a la potencia $x$; ese es el valor de $b$.'
- 'Paso 3: Determina si $b>1$ (creciente) o $0<b<1$ (decreciente).'
ejemplos:
- titulo: Identificación de base mayor que uno
  enunciado: 'Identifica la base $b$ en $f(x)=4\cdot5^x$.'
  solucion_pasos:
  - El número elevado a $x$ es $5$.
  - '$b=5$, y como $5>1$, la función es creciente.'
- titulo: Identificación de base entre cero y uno
  enunciado: 'Identifica la base $b$ en $f(x)=10\cdot0{,}2^x$.'
  solucion_pasos:
  - El número elevado a $x$ es $0{,}2$.
  - '$b=0{,}2$, y como $0<0{,}2<1$, la función es decreciente.'
- titulo: ¿Se puede determinar si una función exponencial crece o decrece observando solo la base?
  enunciado: ¿Se puede determinar si una función exponencial crece o decrece observando solo la base?
  respuesta: Sí
  solucion_pasos:
  - '$b>1$ indica crecimiento; $0<b<1$ indica decrecimiento, sin importar el valor de $a$ (siempre que $a>0$).'
- titulo: ¿La base puede ser un número negativo?
  enunciado: ¿La base puede ser un número negativo?
  respuesta: 'No'
  solucion_pasos:
  - La base debe ser positiva para que la función esté definida en todo $\mathbb{R}$.
errores_frecuentes:
- Confundir la base $b$ con el coeficiente $a$ que la multiplica.
- Invertir la interpretación de $b>1$ y $0<b<1$ respecto a crecimiento y decrecimiento.
- Aceptar como válida una base negativa o igual a 1.
- No verificar el efecto combinado del signo de $a$ junto con el valor de $b$ al describir el comportamiento
  completo.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
