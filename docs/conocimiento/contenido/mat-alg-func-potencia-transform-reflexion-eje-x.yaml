semantic_id: MAT.ALG.FUNC_POTENCIA_TRANSFORM.REFLEXION_EJE_X
titulo: Reflexión respecto al eje $x$
objetivo: Reconocer que cambiar el signo del coeficiente $a$ en $f(x)=a\cdot x^n$ refleja la gráfica respecto al
  eje $x$.
introduccion: Multiplicar toda la función por $-1$ invierte el signo de cada valor de salida, produciendo un
  reflejo de la curva original respecto al eje horizontal.
resumen: 'Dada $g(x)=a\cdot x^n$, la función $f(x)=-g(x)=-a\cdot x^n$ es su **reflexión respecto al eje $x$**:
  cada punto $(x_0,y_0)$ de $g$ se refleja en $(x_0,-y_0)$.'
explicacion: '### Definición formal


  Para $f(x)=-g(x)$, se cumple $f(x_0)=-g(x_0)$ para todo $x_0$: si $(x_0,y_0)$ pertenece a la gráfica de $g$,
  entonces $(x_0,-y_0)$ pertenece a la gráfica de $f$. Geométricamente, esto invierte la curva respecto al eje
  $x$, como si se doblara el plano sobre ese eje.


  ### Desarrollo didáctico


  Si $g(x)=2x^2$ pasa por $(3,18)$, entonces $f(x)=-2x^2$ pasa por $(3,-18)$. La forma de copa de $g$ (abriendo
  hacia arriba) se convierte en una forma de copa invertida (abriendo hacia abajo) en $f$.'
procedimiento:
- 'Paso 1: Identifica el signo del coeficiente $a$ en la función original y en la reflejada.'
- 'Paso 2: Verifica que ambos coeficientes tengan signos opuestos.'
- 'Paso 3: Confirma que cada punto de la gráfica original se refleja cambiando el signo de su coordenada $y$.'
ejemplos:
- titulo: Identificación de una reflexión respecto al eje $x$
  enunciado: '¿Es $f(x)=-5x^3$ la reflexión de $g(x)=5x^3$ respecto al eje $x$?'
  solucion_pasos:
  - Se compara: $f(x)=-g(x)$.
  - Sí, es exactamente su reflexión respecto al eje $x$.
- titulo: Verificación numérica de una reflexión
  enunciado: 'Si $g(2)=8$ para $g(x)=x^3$, ¿cuál es $f(2)$ para $f(x)=-x^3$?'
  solucion_pasos:
  - Se aplica $f(x)=-g(x)$.
  - 'Se obtiene $f(2)=-8$.'
- titulo: ¿La reflexión respecto al eje $x$ cambia el dominio de la función?
  enunciado: ¿Reflejar una función respecto al eje $x$ cambia su dominio?
  respuesta: 'No'
  solucion_pasos:
  - El dominio permanece igual; solo se invierte el signo de los valores de salida.
- titulo: ¿La reflexión respecto al eje $x$ invierte la monotonía de la función?
  enunciado: ¿Una función creciente se vuelve decreciente al reflejarla respecto al eje $x$?
  respuesta: Sí
  solucion_pasos:
  - Al invertir el signo de todos los valores, el crecimiento se transforma en decrecimiento y viceversa.
errores_frecuentes:
- Confundir la reflexión respecto al eje $x$ con una reflexión respecto al eje $y$.
- Suponer que la reflexión cambia el dominio de la función.
- No aplicar el cambio de signo a todos los valores de la función, solo a algunos.
- Confundir esta transformación con una traslación vertical.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
