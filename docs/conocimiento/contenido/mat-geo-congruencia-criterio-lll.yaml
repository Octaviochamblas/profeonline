semantic_id: MAT.GEO.CONGRUENCIA_TRIANGULOS.CRITERIO_LLL
titulo: 'Criterio de congruencia LLL: lado, lado, lado'
objetivo: Aplicar el criterio LLL para determinar que dos triángulos son congruentes cuando sus tres lados
  correspondientes son iguales.
introduccion: En vez de verificar los seis elementos (tres lados y tres ángulos) para confirmar que dos
  triángulos son congruentes, existen criterios abreviados que requieren mucha menos información. El primero
  es el criterio LLL.
resumen: El criterio LLL establece que dos triángulos son congruentes si sus tres lados correspondientes
  son iguales entre sí.
explicacion: '![Criterio de congruencia LLL](/static/img/geometria/congruencia-semejanza/congruencia-criterio-lll.svg)


  ### Definición formal


  Si en $\triangle ABC$ y $\triangle A''B''C''$ se cumple $AB=A''B''$, $BC=B''C''$ y $CA=C''A''$, entonces
  $\triangle ABC\cong\triangle A''B''C''$.


  ### Desarrollo didáctico


  Basta con medir los tres lados de cada triángulo: si coinciden exactamente (en cualquier correspondencia
  consistente), los triángulos son congruentes, sin necesidad de medir ningún ángulo. Esto ocurre porque
  tres lados determinan de forma única la forma de un triángulo.'
procedimiento:
- 'Paso 1: Mide o identifica los tres lados de cada triángulo.'
- 'Paso 2: Compara los lados correspondientes entre ambos triángulos.'
- 'Paso 3: Si los tres pares de lados correspondientes son iguales, concluye que los triángulos son congruentes
  por LLL.'
ejemplos:
- titulo: Verificar congruencia con tres lados iguales
  enunciado: Un triángulo tiene lados 5, 6 y 7 cm; otro tiene lados 5, 6 y 7 cm.
  solucion_pasos:
  - Son congruentes por el criterio LLL.
- titulo: Detectar cuando LLL no se cumple
  enunciado: Un triángulo tiene lados 5, 6 y 7; otro tiene lados 5, 6 y 8.
  solucion_pasos:
  - No son congruentes, ya que el tercer lado no coincide.
- titulo: ¿El criterio LLL requiere medir ángulos?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con comparar los tres lados.
- titulo: ¿Tres lados determinan una única forma de triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la base geométrica que justifica el criterio LLL.
errores_frecuentes:
- Comparar lados que no son realmente correspondientes entre los dos triángulos.
- Creer que basta con que dos de los tres lados coincidan para aplicar LLL.
- Confundir este criterio con LAL, que sí requiere un ángulo.
fuente: 'Fuente: Cid 58.'
estado: publicado
