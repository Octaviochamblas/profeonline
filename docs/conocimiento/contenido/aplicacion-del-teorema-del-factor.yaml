semantic_id: MAT.ALG.TEOREMA_FACTOR.FACTOR_LINEAL
titulo: Aplicación del teorema del factor
objetivo: Conectar el concepto de 'raíz' de un polinomio con su factorización mediante el Teorema del
  Factor.
introduccion: Aquí es donde aparece la relación que une todo este bloque. Encontrar un cero no solo te
  da un punto en un gráfico, te regala directamente un pedazo de la factorización del polinomio. Son dos
  caras de la misma moneda.
resumen: 'El Teorema del Factor establece que: Si un número ''$c$'' es raíz de un polinomio $P(x)$ (es
  decir, $P(c)=0$), entonces el binomio $(x - c)$ es un factor exacto de ese polinomio.'
explicacion: '### Definición formal


  El Teorema del Factor es una equivalencia: para un polinomio $P(x)$ y un número $c$, se cumple $P(c)=0
  \iff (x-c)$ divide exactamente a $P(x)$. Esta doble implicación permite pasar de una raíz conocida a
  un factor, y de un factor conocido a una raíz.


  ### Desarrollo didáctico


  En la lección anterior vimos que $x = 2$ era raíz de $P(x) = x^2 - 5x + 6$.

  El Teorema del Factor toma ese $x=2$ y te dice: "Si lo pasas restando al otro lado, obtienes $(x - 2)$.
  Ese paréntesis es un factor del polinomio.".


  Y tenía razón, si factorizas $x^2 - 5x + 6$ con los métodos antiguos, te da $(x - 2)(x - 3)$.

  Las dos raíces eran 2 y 3, y los factores resultaron ser $(x-2)$ y $(x-3)$.


  Esta regla es bidireccional:

  1. Si conoces una raíz ($x = 5$), inmediatamente conoces un factor: $(x - 5)$.

  2. Si conoces un factor $(x + 4)$, inmediatamente conoces una raíz: $x = -4$ (cambiando el signo al
  despejar $x+4=0$).


  Gracias a esto, podemos factorizar polinomios de grado mayor de grado 3 o 4 probando de manera sistemática
  o probando una de sus raíces y extrayendo su factor correspondiente.'
procedimiento:
- 'Paso 1: Encuentra un número ''$c$'' que haga que el polinomio valga cero.'
- 'Paso 2: Escribe una variable ''x''.'
- 'Paso 3: Réstale ese número ''$c$''. Si $c$ es negativo, la resta lo convertirá en suma (ej. si $c =
  -3$, queda $x - (-3) = x + 3$).'
- 'Paso 4: Ponle paréntesis. Ya tienes tu primer factor.'
ejemplos:
- titulo: Si sabemos que $P(-7) = 0$, ¿qué factor tiene el polinomio
  enunciado: Si sabemos que $P(-7) = 0$, ¿qué factor tiene el polinomio?
  solucion_pasos:
  - El número $-7$ es una raíz.
  - 'Aplicamos el teorema: $(x - c) \rightarrow (x - (-7))$.'
  - 'Simplificamos signos: $(x + 7)$.'
  - El factor es $(x + 7)$.
- titulo: Si $(x - 8)$ es factor de un polinomio, ¿qué valor evalúa a cero?
  solucion_pasos:
  - Por el Teorema del Factor bidireccional, si $(x-c)$ es factor, $c$ es raíz. Aquí $c=8$.
- titulo: 'Respecto de «Aplicación del teorema del factor»: ¿La siguiente formulación es correcta? «El'
  enunciado: 'Respecto de «Aplicación del teorema del factor»: ¿La siguiente formulación es correcta?
    «El Teorema del Factor establece que: Si un número ''$c$'' es raíz de un polinomio $P(x)$ (es decir,
    $P(c)=0$), entonces el binomio $(x - c)$ es un factor exacto de ese polinomio»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El Teorema del Factor establece que: Si un número
    ''$c$'' es raíz de un polinomio $P(x)$ (es decir, $P(c)=0$), entonces el binomio $(x - c)$ es un factor
    exacto de ese polinomio.'
- titulo: 'Respecto de «Aplicación del teorema del factor»: ¿La siguiente conclusión es correcta? «No
    i'
  enunciado: 'Respecto de «Aplicación del teorema del factor»: ¿La siguiente conclusión es correcta? «No
    invertir el signo al pasar de raíz a factor. (Ej: Si la raíz es $4$, decir que el factor es $(x+4)$
    en lugar de $(x-4)$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El Teorema del Factor establece que: Si un número
    ''$c$'' es raíz de un polinomio $P(x)$ (es decir, $P(c)=0$), entonces el binomio $(x - c)$ es un factor
    exacto de ese polinomio.'
errores_frecuentes:
- 'No invertir el signo al pasar de raíz a factor. (Ej: Si la raíz es $4$, decir que el factor es $(x+4)$
  en lugar de $(x-4)$).'
- Creer que $(x-c)$ es la respuesta final a la factorización completa (solo es UN factor, faltan los demás).
- La raíz $c$ se relaciona con el factor $(x+c)$ sin considerar su signo.
- Comprobar que $P(c)=0$ basta para afirmar que $(x+c)$ es factor.
- Encontrar un factor lineal entrega automáticamente todos los demás factores del polinomio.
