semantic_id: MAT.GEO.CUERPOS_REDONDOS_BASE.CILINDRO_POR_ROTACION
titulo: Generación del cilindro como sólido de revolución
objetivo: Reconocer que el cilindro se genera al hacer girar un rectángulo 360° alrededor de uno de sus
  lados.
introduccion: Si tomas un rectángulo y lo giras rápidamente alrededor de uno de sus lados, el barrido
  que genera en el espacio forma un cilindro.
resumen: 'El cilindro se genera al rotar un rectángulo 360° alrededor de uno de sus lados: ese lado se
  convierte en el eje (y en la altura), y el lado perpendicular se convierte en el radio de las bases.'
explicacion: '![Generación del cilindro por rotación](/static/img/geometria/espacio-cuerpos/cilindro-por-rotacion.svg)


  ### Definición formal


  Al rotar un rectángulo de lados $b$ y $h$ 360° alrededor del lado $h$ (que actúa como eje), se genera
  un cilindro cuya altura es $h$ y cuyo radio de las bases es $b$ (el lado perpendicular al eje).


  ### Desarrollo didáctico


  En la figura, el rectángulo resaltado gira alrededor del eje vertical (uno de sus lados), ''barriendo''
  el espacio y generando el cilindro mostrado a la derecha. El lado del rectángulo usado como eje se convierte
  en la altura del cilindro, y el otro lado (perpendicular) se convierte en el radio.'
procedimiento:
- 'Paso 1: Identifica el rectángulo generador y cuál de sus lados actuará como eje de rotación.'
- 'Paso 2: Reconoce que el lado usado como eje se convierte en la altura (h) del cilindro.'
- 'Paso 3: Reconoce que el lado perpendicular al eje se convierte en el radio (r) de las bases del cilindro.'
ejemplos:
- titulo: Determinar las medidas del cilindro generado
  enunciado: Un rectángulo de 4 cm × 9 cm gira alrededor de su lado de 9 cm.
  solucion_pasos:
  - Se genera un cilindro de altura h=9 cm (el eje) y radio r=4 cm (el lado perpendicular).
- titulo: Identificar el eje correcto de rotación
  enunciado: Un rectángulo puede rotar alrededor de cualquiera de sus dos lados distintos.
  solucion_pasos:
  - Según qué lado se use como eje, cambian los valores de r y h del cilindro resultante (se intercambian).
- titulo: ¿El lado usado como eje se convierte en la altura del cilindro?
  respuesta: Sí
  solucion_pasos:
  - Sí, el lado que permanece fijo (el eje) se convierte exactamente en la altura del cilindro generado.
- titulo: ¿Rotar el mismo rectángulo alrededor de su otro lado genera el mismo cilindro?
  respuesta: 'No'
  solucion_pasos:
  - No, se generaría un cilindro distinto, con el radio y la altura intercambiados respecto del primer
    caso.
errores_frecuentes:
- Confundir cuál lado del rectángulo se convierte en el radio y cuál en la altura del cilindro.
- Olvidar que el giro debe ser de 360° completos para generar el cilindro cerrado.
- Creer que cualquier rotación de un rectángulo genera siempre el mismo cilindro, sin importar el eje
  elegido.
fuente: 'Elaboración propia (referencias: Moraleja 97, Cid 182).'
estado: publicado
