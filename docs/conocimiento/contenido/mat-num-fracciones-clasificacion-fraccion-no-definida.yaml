semantic_id: MAT.NUM.FRACCIONES_CLASIFICACION.FRACCION_NO_DEFINIDA
objetivo: Reconocer una fracción no definida.
introduccion: 'Observa este caso: \(\frac{7}{0}\) no está definida. Para explicar
  por qué funciona estudiaremos fracción no definida con denominador cero. Al finalizar
  podrás reconocer una fracción no definida.'
resumen: Una fracción con denominador cero no está definida como número. Como criterio
  de control, dividir por cero no produce un número racional
explicacion: |-
  Una fracción con denominador cero no está definida como número.

  En el caso “\(\frac{7}{0}\) no está definida” esta definición se aplica de forma directa. El control final consiste en comprobar que dividir por cero no produce un número racional.
procedimiento:
- 'Paso 1: Inspecciona el denominador de la expresión.'
- 'Paso 2: Si es cero y el numerador no lo es, reconoce que no existe cociente posible.'
- 'Paso 3: No asignes infinito ni ningún valor numérico a la expresión.'
ejemplos:
- titulo: Aplicación razonada — Fracción no definida con denominador cero
  enunciado: \(\frac{7}{0}\) no está definida.
  solucion_pasos:
  - Inspecciona el denominador de la expresión.
  - Si es cero y el numerador no lo es, reconoce que no existe cociente posible.
  - No asignes infinito ni ningún valor numérico a la expresión.
- titulo: Revisión de una solución — Fracción no definida con denominador cero
  enunciado: Una solución aplica “Si es cero y el numerador no lo es, reconoce que
    no existe cociente posible.”, pero termina sin comprobar que dividir por cero
    no produce un número racional. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define fracción no definida con denominador cero: una
    fracción con denominador cero no está definida como número.'
  - Inspecciona el denominador de la expresión.
  - 'Completa la revisión con este control: No asignes infinito ni ningún valor numérico
    a la expresión.'
- titulo: ¿Se cumple que dividir por cero no produce un número racional? — Fracción
    no definida con denominador cero
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una fracción con denominador cero no
    está definida como número.
  - El caso “\(\frac{7}{0}\) no está definida” satisface esa condición.
  - No asignes infinito ni ningún valor numérico a la expresión.
- titulo: ¿Es válido omitir el paso “Inspecciona el denominador de la expresión”?
    — Fracción no definida con denominador cero
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de fracción no definida con denominador
    cero.
  - 'Omitirlo puede volver inválida la acción siguiente: Si es cero y el numerador
    no lo es, reconoce que no existe cociente posible.'
  - 'La solución debe terminar de este modo: No asignes infinito ni ningún valor numérico
    a la expresión.'
errores_frecuentes:
- 'Empezar fracción no definida con denominador cero sin realizar este control inicial:
  Inspecciona el denominador de la expresión.'
- Memorizar “\(\frac{7}{0}\) no está definida” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Si es cero y el numerador no lo es, reconoce que no
  existe cociente posible.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre fracción no definida con denominador cero que
  contradice el criterio “Dividir por cero no produce un número racional”.
- 'Cerrar el ejercicio sin esta comprobación específica: No asignes infinito ni ningún
  valor numérico a la expresión.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
