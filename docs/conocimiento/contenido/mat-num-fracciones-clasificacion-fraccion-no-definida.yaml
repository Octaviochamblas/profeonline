semantic_id: MAT.NUM.FRACCIONES_CLASIFICACION.FRACCION_NO_DEFINIDA
titulo: Fracción no definida
objetivo: Reconocer que una fracción con denominador cero y numerador distinto de cero no está definida.
introduccion: 'Cuando el denominador de una fracción es cero pero el numerador no lo es, no existe ningún
  número que pueda representar esa expresión: se dice que la fracción no está definida.'
resumen: La expresión \(\frac{a}{0}\), con \(a\neq0\), no está definida como número racional.
explicacion: '### Definición formal


  Si \(\frac{a}{0}=x\) (con \(a\neq0\)) fuera un número, debería cumplir \(0\cdot x=a\); pero \(0\cdot
  x=0\) para cualquier \(x\), y nunca puede igualar a un \(a\neq0\). Por lo tanto, no existe ningún valor
  \(x\) que satisfaga la igualdad: la expresión no está definida.


  ### Desarrollo didáctico


  \(\frac{7}{0}\) no está definida: no existe ningún número que, multiplicado por \(0\), dé \(7\). Por
  eso el denominador de un número racional siempre debe cumplir \(b\neq0\).'
procedimiento:
- 'Paso 1: Inspecciona el denominador de la expresión.'
- 'Paso 2: Si es cero y el numerador no lo es, reconoce que no existe cociente posible.'
- 'Paso 3: No asignes infinito ni ningún valor numérico a la expresión.'
ejemplos:
- titulo: Aplicación razonada — Fracción no definida con denominador cero
  enunciado: \(\frac{7}{0}\) no está definida.
  solucion_pasos:
  - Inspecciona el denominador de la expresión.
  - Si es cero y el numerador no lo es, reconoce que no existe cociente posible.
  - No asignes infinito ni ningún valor numérico a la expresión.
- titulo: Revisión de una solución — Fracción no definida con denominador cero
  enunciado: Una solución aplica “Si es cero y el numerador no lo es, reconoce que no existe cociente
    posible.”, pero termina sin comprobar que dividir por cero no produce un número racional. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define fracción no definida con denominador cero: una fracción con denominador
    cero no está definida como número.'
  - Inspecciona el denominador de la expresión.
  - 'Completa la revisión con este control: No asignes infinito ni ningún valor numérico a la expresión.'
- titulo: ¿Se cumple que dividir por cero no produce un número racional? — Fracción no definida con denominador
    cero
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una fracción con denominador cero no está definida como
    número.
  - El caso “\(\frac{7}{0}\) no está definida” satisface esa condición.
  - No asignes infinito ni ningún valor numérico a la expresión.
- titulo: ¿Es válido omitir el paso “Inspecciona el denominador de la expresión”? — Fracción no definida
    con denominador cero
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de fracción no definida con denominador cero.
  - 'Omitirlo puede volver inválida la acción siguiente: Si es cero y el numerador no lo es, reconoce
    que no existe cociente posible.'
  - 'La solución debe terminar de este modo: No asignes infinito ni ningún valor numérico a la expresión.'
errores_frecuentes:
- 'Empezar fracción no definida con denominador cero sin realizar este control inicial: Inspecciona el
  denominador de la expresión.'
- Memorizar “\(\frac{7}{0}\) no está definida” como respuesta aislada, sin reconstruir la definición que
  lo justifica.
- Convertir en receta el paso “Si es cero y el numerador no lo es, reconoce que no existe cociente posible.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre fracción no definida con denominador cero que contradice el criterio
  “Dividir por cero no produce un número racional”.
- 'Cerrar el ejercicio sin esta comprobación específica: No asignes infinito ni ningún valor numérico
  a la expresión.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
