semantic_id: MAT.EST.COMBINACIONES.SIMETRIA_COMBINACIONES
titulo: Aplicar la propiedad de simetría de los coeficientes combinatorios
objetivo: Aplicar la propiedad de simetría C(n,r)=C(n,n-r) para simplificar cálculos, eligiendo el valor
  de r más pequeño y conveniente.
introduccion: Elegir r elementos de un conjunto de n es equivalente a decidir cuáles (n-r) elementos quedan
  fuera de la selección; esta dualidad da origen a la propiedad de simetría.
resumen: Para cualquier combinación, se cumple la propiedad de simetría $C(n,r)=C(n,n-r)$, ya que elegir
  los $r$ elementos seleccionados equivale a elegir los $(n-r)$ elementos no seleccionados.
explicacion: '![Propiedad de simetría de las combinaciones](/static/img/probabilidad/comb/comb-simetria-combinaciones.svg)


  ### Definición formal


  $C(n,r)=\dfrac{n!}{r!(n-r)!}=\dfrac{n!}{(n-r)!\,r!}=C(n,n-r)$, ya que la fórmula es simétrica al intercambiar
  $r$ por $n-r$.


  ### Desarrollo didáctico


  $C(8,3)=C(8,5)=56$, ya que elegir 3 elementos de un total de 8 para incluir es exactamente equivalente
  a elegir los otros 5 elementos para excluir.'
procedimiento:
- 'Paso 1: Identifica los valores de n y r en la combinación que se quiere calcular.'
- 'Paso 2: Calcula (n-r); si este valor es menor que r, usa la propiedad de simetría para simplificar
  el cálculo.'
- 'Paso 3: Calcula C(n,n-r) en vez de C(n,r) directamente, obteniendo el mismo resultado con menos factores.'
ejemplos:
- titulo: Aplicar la simetría para calcular C(8,5)
  enunciado: C(8,5), usando que C(8,5)=C(8,3).
  solucion_pasos:
  - C(8,5)=C(8,3)=(8×7×6)/(3×2×1)=336/6=56, más simple que calcular directamente con 5 factores.
- titulo: Aplicar la simetría para calcular C(10,7)
  enunciado: C(10,7), usando que C(10,7)=C(10,3).
  solucion_pasos:
  - C(10,7)=C(10,3)=(10×9×8)/(3×2×1)=720/6=120.
- titulo: ¿C(n,r) siempre es igual a C(n,n-r)?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad de simetría de los coeficientes combinatorios, válida para cualquier n y r.
- titulo: ¿Es conveniente usar la propiedad de simetría cuando r es cercano a n?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que permite calcular con (n-r) factores en vez de r factores, simplificando el cálculo cuando
    r es grande.
errores_frecuentes:
- No aprovechar la propiedad de simetría cuando r es grande, complicando innecesariamente el cálculo.
- Calcular incorrectamente (n-r) al intentar aplicar la propiedad de simetría.
- Pensar que la simetría solo aplica en casos particulares, en vez de reconocerla como una propiedad general
  válida siempre.
fuente: 'Elaboración propia (referencia: Baldor 375, Moraleja 300).'
estado: publicado
