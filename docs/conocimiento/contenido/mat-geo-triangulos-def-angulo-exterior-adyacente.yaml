semantic_id: MAT.GEO.TRIANGULOS_DEF.ANGULO_EXTERIOR_ADYACENTE
titulo: Relación entre ángulo exterior y ángulo interior adyacente
objetivo: Reconocer que un ángulo exterior y el ángulo interior del mismo vértice son adyacentes y suman
  180°.
introduccion: El ángulo interior de un vértice y su ángulo exterior comparten un lado y su vértice, y
  juntos forman una línea recta a lo largo de la prolongación del otro lado.
resumen: 'Un ángulo exterior es adyacente al ángulo interior de su mismo vértice, y ambos son suplementarios:
  su suma es 180°.'
explicacion: '![Ángulo exterior y su adyacente interior](/static/img/geometria/triangulos/triangulos-def-angulo-exterior-adyacente.svg)


  ### Definición formal


  Si β es el ángulo interior en el vértice B de un triángulo, y δ es el ángulo exterior formado al prolongar
  el lado AB más allá de B, entonces β y δ son adyacentes (comparten el lado BC y el vértice B) y suplementarios:
  β + δ = 180°.


  ### Desarrollo didáctico


  Si el ángulo interior β mide 65°, su ángulo exterior adyacente δ mide 180° − 65° = 115°, porque ambos
  se ubican a lo largo de la misma línea recta (la prolongación de AB) y juntos la completan.'
procedimiento:
- 'Paso 1: Identifica el ángulo interior del vértice y su ángulo exterior asociado.'
- 'Paso 2: Reconoce que ambos comparten el vértice y un lado, y se ubican sobre una misma recta.'
- 'Paso 3: Aplica β + δ = 180° para calcular uno a partir del otro.'
ejemplos:
- titulo: Calcular el ángulo exterior conocido el interior
  enunciado: El ángulo interior en un vértice mide 65°. Calcula su ángulo exterior adyacente.
  solucion_pasos:
  - δ = 180° − 65° = 115°.
- titulo: Calcular el ángulo interior conocido el exterior
  enunciado: El ángulo exterior de un vértice mide 100°. ¿Cuánto mide el ángulo interior adyacente?
  solucion_pasos:
  - β = 180° − 100° = 80°.
- titulo: ¿Un ángulo interior y su exterior adyacente suman 180°?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque ambos están sobre la misma línea recta (la prolongación de un lado).
- titulo: ¿Pueden un ángulo interior y su exterior medir lo mismo?
  respuesta: Sí
  solucion_pasos:
  - Sí, si ambos miden 90° cada uno, ya que 90° + 90° = 180°.
errores_frecuentes:
- Sumar el ángulo exterior con un ángulo interior que no es el de su mismo vértice.
- Olvidar que la relación de suplementariedad es específica del mismo vértice.
- Confundir esta relación con la de ángulos complementarios (que suman 90°).
fuente: Elaboración propia.
estado: publicado
