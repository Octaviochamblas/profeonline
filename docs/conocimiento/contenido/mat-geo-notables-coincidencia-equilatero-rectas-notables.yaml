semantic_id: MAT.GEO.NOTABLES_COINCIDENCIA.EQUILATERO_RECTAS_NOTABLES
titulo: Coincidencia de alturas, bisectrices, simetrales y transversales de gravedad en un triángulo equilátero
objetivo: Reconocer que en un triángulo equilátero, las alturas, bisectrices, simetrales y transversales
  de gravedad de cada vértice coinciden en un único conjunto de tres segmentos.
introduccion: 'El triángulo equilátero lleva al extremo la propiedad que se observaba en el isósceles:
  como sus tres vértices son ''apicales'' a la vez (por la simetría total de la figura), las cuatro rectas
  notables de cada vértice se funden en una sola.'
resumen: En un triángulo equilátero, para cada vértice, la altura, la bisectriz, la simetral (del lado
  opuesto) y la transversal de gravedad coinciden en un mismo segmento.
explicacion: '![Rectas notables coincidentes en triángulo equilátero](/static/img/geometria/elementos-secundarios/notables-coincidencia-equilatero-rectas-notables.svg)


  ### Definición formal


  En un triángulo equilátero ABC, el segmento desde cualquier vértice hasta el punto medio del lado opuesto
  es simultáneamente altura, bisectriz, transversal de gravedad (desde ese vértice) y simetral (del lado
  opuesto).


  ### Desarrollo didáctico


  Esto ocurre porque un triángulo equilátero es isósceles respecto a cualquiera de sus tres vértices a
  la vez (todos sus lados son iguales), así que la coincidencia que en el isósceles ocurría solo en el
  vértice apical, en el equilátero ocurre en los tres vértices simultáneamente.'
procedimiento:
- 'Paso 1: Reconoce que un triángulo equilátero es isósceles respecto a cualquiera de sus tres vértices.'
- 'Paso 2: Aplica la coincidencia del isósceles a cada uno de los tres vértices.'
- 'Paso 3: Concluye que las cuatro rectas notables coinciden en cada uno de los tres segmentos resultantes.'
ejemplos:
- titulo: Identificar la coincidencia en un vértice
  enunciado: Un triángulo equilátero ABC tiene el segmento desde A hasta el punto medio de BC.
  solucion_pasos:
  - Ese segmento es a la vez altura, bisectriz, transversal de gravedad (desde A) y simetral (de BC).
- titulo: Contar los segmentos totales
  enunciado: ¿Cuántos segmentos distintos se forman al trazar todas estas rectas notables en un equilátero?
  solucion_pasos:
  - Solo tres, uno por cada vértice/lado opuesto, ya que todas las rectas notables coinciden en cada caso.
- titulo: ¿Esta coincidencia ocurre en los tres vértices del equilátero?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del isósceles (donde solo ocurre en el vértice apical), aquí ocurre en los tres.
- titulo: ¿El triángulo equilátero es un caso particular del isósceles?
  respuesta: Sí
  solucion_pasos:
  - Sí, cumple la condición de isósceles (al menos dos lados iguales) respecto a cualquiera de sus vértices.
errores_frecuentes:
- Creer que en el equilátero solo coinciden dos de las cuatro rectas notables por vértice.
- Pensar que la coincidencia ocurre en un solo vértice, como en el isósceles general.
- Olvidar que la simetral también forma parte de esta coincidencia (no solo altura, bisectriz y transversal
  de gravedad).
fuente: Elaboración propia.
estado: publicado
