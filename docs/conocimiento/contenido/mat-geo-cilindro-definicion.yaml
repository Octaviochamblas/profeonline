semantic_id: MAT.GEO.CUERPOS_REDONDOS_BASE.CILINDRO_DEFINICION
titulo: Definición de cilindro
objetivo: Reconocer el cilindro como un cuerpo redondo con dos bases circulares congruentes y paralelas,
  unidas por una superficie lateral curva.
introduccion: 'Un cilindro es como una lata de conservas: dos tapas circulares idénticas conectadas por
  una superficie curva.'
resumen: Un cilindro es un cuerpo redondo formado por dos bases circulares congruentes y paralelas, unidas
  por una superficie lateral curva.
explicacion: '![Definición de cilindro](/static/img/geometria/espacio-cuerpos/cilindro-definicion.svg)


  ### Definición formal


  Un cilindro recto está formado por dos círculos congruentes y paralelos (las bases), de radio $r$, separados
  por una distancia $h$ (la altura), y conectados por una superficie lateral curva perpendicular a las
  bases.


  ### Desarrollo didáctico


  En la figura, el cilindro tiene sus dos bases circulares (superior e inferior), de radio $r$, separadas
  por la altura $h$. A diferencia de los poliedros, la superficie lateral del cilindro es curva, no está
  formada por polígonos planos.'
procedimiento:
- 'Paso 1: Identifica las dos bases circulares congruentes y paralelas del cuerpo.'
- 'Paso 2: Reconoce la superficie lateral curva que conecta ambas bases.'
- 'Paso 3: Identifica el radio (r) de las bases y la altura (h), la distancia entre ellas.'
ejemplos:
- titulo: Identificar un cilindro
  enunciado: Una lata de conservas tiene dos tapas circulares idénticas conectadas por una superficie
    curva.
  solucion_pasos:
  - 'Esa lata tiene forma de cilindro: dos bases circulares congruentes y una superficie lateral curva.'
- titulo: Reconocer los elementos de un cilindro
  enunciado: Un cilindro tiene bases de radio 4 cm y altura 10 cm.
  solucion_pasos:
  - El radio r=4 cm corresponde a las bases circulares, y la altura h=10 cm es la distancia entre ellas.
- titulo: ¿El cilindro es un poliedro?
  respuesta: 'No'
  solucion_pasos:
  - No, el cilindro tiene una superficie lateral curva, por lo que no cumple la definición de poliedro
    (que exige caras planas).
- titulo: ¿Las dos bases de un cilindro deben ser congruentes?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas bases deben ser círculos exactamente del mismo radio.
errores_frecuentes:
- Confundir el cilindro con un prisma, ignorando que su superficie lateral es curva y no plana.
- Creer que el cilindro es un poliedro.
- Confundir la altura del cilindro con el radio de sus bases.
fuente: 'Elaboración propia (referencias: Moraleja 97, Cid 181).'
estado: publicado
