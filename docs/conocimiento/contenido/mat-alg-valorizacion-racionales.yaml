semantic_id: MAT.ALG.VALORIZACION.RACIONALES
objetivo: Valorizar expresiones fraccionarias sustituyendo el numerador y el denominador.
introduccion: 'Las fracciones en álgebra no son más que divisiones pospuestas. Valorizar
  una expresión racional es como calcular el peso de dos trenes distintos: uno arriba
  (numerador) y otro abajo (denominador), y luego ver si podemos simplificarlos.'
resumen: Al valorizar **Expresiones Racionales** (fracciones), se debe tratar al **numerador
  y al denominador como polinomios independientes**. Se calcula el valor numérico
  de arriba, el valor de abajo, y finalmente se divide o simplifica la fracción resultante.
explicacion: 'Toma la expresión: $\frac{2x + 4}{x - 1}$, para $x=3$.

  Regla del bloque: Jamás intentes cruzar operaciones entre el piso de arriba y el
  de abajo antes de que sean un solo número.

  - Arriba: $2(3) + 4 = 6 + 4 = 10$.

  - Abajo: $(3) - 1 = 2$.

  - Nueva fracción: $\frac{10}{2}$.

  - División final: $5$.


  *Advertencia crítica:* Si al evaluar el denominador obtienes un $0$ (ej. en $\frac{5}{x-2}$
  con $x=2$, quedaría $\frac{5}{0}$), la expresión es **indeterminada** o ''no existe''
  en los números reales. ¡El cero en el divisor es el apocalipsis matemático!'
procedimiento:
- 'Paso 1: Valoriza y calcula completamente el numerador como si fuera un ejercicio
  solitario.'
- 'Paso 2: Valoriza y calcula el denominador de igual manera.'
- 'Paso 3: Construye la fracción con ambos resultados finales (ej. 15 / 3).'
- 'Paso 4: Divide si es un resultado entero, o simplifica la fracción si no lo es.'
- 'Paso 5: Si el denominador dio cero, declara que la expresión está indeterminada.'
ejemplos:
- titulo: Pisos independientes
  enunciado: Valora (x^2 - 1) / (x + 1) para x = 4.
  solucion_pasos:
  - 'Numerador: (4)^2 - 1 = 16 - 1 = 15.'
  - 'Denominador: (4) + 1 = 5.'
  - 'Fracción final: 15 / 5.'
  - 'División: 3.'
errores_frecuentes:
- Simplificar variables o números entre el numerador y denominador ANTES de terminar
  las sumas/restas (ej. 'cancelar' una $x$ de arriba con una $x$ de abajo si están
  sumando).
- No notar que un denominador igual a 0 invalida todo el problema.
fuente: Álgebra de Baldor.
estado: publicado
