semantic_id: MAT.GEO.CIRCULO_METRICA.AREA_SEMICIRCULO
titulo: Cálculo del área de un semicírculo
objetivo: Calcular el área de un semicírculo como la mitad exacta del área del círculo completo correspondiente.
introduccion: Un semicírculo, al ser exactamente la mitad de un círculo, tiene una fórmula de área que
  se deriva directamente de la fórmula del círculo completo.
resumen: 'El área de un semicírculo de radio $r$ es la mitad del área del círculo completo: $A=\frac{\pi
  r^2}{2}$.'
explicacion: '![Área de un semicírculo: πr²/2](/static/img/geometria/circunferencia-circulo/circulo-area-semicirculo.svg)


  ### Definición formal


  Un semicírculo es exactamente la mitad de un círculo (delimitado por un diámetro), por lo que su área
  es $A=\frac{\pi r^2}{2}$.


  ### Desarrollo didáctico


  Un semicírculo de radio 8 cm tiene área $A=\frac{\pi\times64}{2}=32\pi\approx100,5$ cm², exactamente
  la mitad del área de un círculo completo de igual radio ($64\pi\approx201,1$ cm²).'
procedimiento:
- 'Paso 1: Identifica el radio r del semicírculo.'
- 'Paso 2: Calcula el área del círculo completo con ese radio (πr²).'
- 'Paso 3: Divide ese resultado entre 2 para obtener el área del semicírculo.'
ejemplos:
- titulo: Calcular el área de un semicírculo
  enunciado: Un semicírculo tiene radio 8 cm.
  solucion_pasos:
  - A=(π×64)/2=32π≈100,5 cm².
- titulo: Calcular el radio a partir del área del semicírculo
  enunciado: Un semicírculo tiene área 25,12 cm² (aproximada).
  solucion_pasos:
  - πr²=2×25,12=50,24; r²=50,24/3,14=16 → r=4 cm.
- titulo: ¿El área del semicírculo es exactamente la mitad del círculo completo?
  respuesta: Sí
  solucion_pasos:
  - Sí, por definición, un semicírculo es la mitad exacta de un círculo.
- titulo: ¿Se necesita conocer el diámetro completo para calcular esta área?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con conocer el radio (aunque el diámetro también sirve para deducirlo).
errores_frecuentes:
- Olvidar dividir entre 2 después de calcular el área del círculo completo.
- Confundir el área del semicírculo con su perímetro.
- Calcular el área con el diámetro en vez del radio sin ajustar la fórmula.
fuente: 'Fuente: Moraleja 73, 76.'
estado: publicado
