semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.LEY_SENOS_LADOS
titulo: Cálculo de lados mediante la ley de senos
objetivo: Calcular la longitud de un lado desconocido de un triángulo oblicuángulo utilizando la ley de
  senos, conociendo un lado y dos ángulos (o un lado, su ángulo opuesto y otro ángulo).
introduccion: Cuando se conoce un lado con su ángulo opuesto, y además otro ángulo del triángulo, se puede
  despejar cualquier otro lado usando la proporcionalidad de la ley de senos.
resumen: Para calcular un lado desconocido $x$ opuesto a un ángulo $X$, conociendo un lado $a$ y su ángulo
  opuesto $A$, se usa $x=\dfrac{a\cdot\sin X}{\sin A}$.
explicacion: '![Cálculo de lados con ley de senos](/static/img/geometria/trigonometria/oblicu-ley-senos-lados.svg)


  ### Definición formal


  De la proporción $\dfrac{a}{\sin A}=\dfrac{b}{\sin B}$, se despeja $b=\dfrac{a\cdot\sin B}{\sin A}$.


  ### Desarrollo didáctico


  Si $a=10$, $A=40°$ y $B=70°$, entonces $b=\dfrac{10\cdot\sin70°}{\sin40°}\approx\dfrac{10\times0{,}940}{0{,}643}\approx14{,}6$.'
procedimiento:
- 'Paso 1: Identifica el lado y ángulo opuesto conocidos (el par completo).'
- 'Paso 2: Identifica el ángulo opuesto al lado que se busca.'
- 'Paso 3: Despeja el lado desconocido: lado=lado_conocido×sin(ángulo buscado opuesto)/sin(ángulo conocido
  opuesto).'
ejemplos:
- titulo: Calcular un lado con datos a=10, A=40°, B=70°
  enunciado: Se busca el lado b.
  solucion_pasos:
  - b=10×sin70°/sin40°≈10×0,940/0,643≈14,6.
- titulo: Calcular un lado con datos c=15, C=50°, A=60°
  enunciado: Se busca el lado a.
  solucion_pasos:
  - a=15×sin60°/sin50°≈15×0,866/0,766≈16,96.
- titulo: ¿Se necesita conocer un ángulo y su lado opuesto completo para aplicar este cálculo?
  respuesta: Sí
  solucion_pasos:
  - Sí, sin ese par completo no se puede formar la proporción de la ley de senos.
- titulo: ¿El resultado depende del orden en que se escriban los términos de la proporción?
  respuesta: 'No'
  solucion_pasos:
  - No, mientras se respete qué lado va con qué ángulo opuesto, el resultado es el mismo.
errores_frecuentes:
- Despejar el lado usando el ángulo incorrecto (que no es su opuesto).
- Confundir el numerador y el denominador al despejar la incógnita.
- Olvidar convertir correctamente los senos calculados con calculadora en modo grados.
fuente: 'Elaboración propia (referencia: Moraleja 195).'
estado: publicado
