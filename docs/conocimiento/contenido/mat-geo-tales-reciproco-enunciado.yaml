semantic_id: MAT.GEO.TEOREMA_TALES.RECIPROCO_ENUNCIADO
titulo: Enunciado del recíproco del teorema de Tales
objetivo: 'Comprender el enunciado del recíproco del teorema de Tales: si los segmentos son proporcionales,
  la recta que los determina es paralela al tercer lado.'
introduccion: El teorema de Tales dice que el paralelismo implica proporcionalidad. Pero, ¿es cierto también
  el camino inverso? El recíproco del teorema responde esta pregunta.
resumen: El recíproco del teorema de Tales establece que si en un triángulo ABC un punto D en AB y un
  punto E en AC cumplen $\frac{AD}{DB}=\frac{AE}{EC}$, entonces el segmento DE es paralelo al lado BC.
explicacion: '![Recíproco del teorema de Tales](/static/img/geometria/congruencia-semejanza/tales-reciproco-enunciado.svg)


  ### Definición formal


  Si $D\in AB$, $E\in AC$ y $\frac{AD}{DB}=\frac{AE}{EC}$, entonces $DE\parallel BC$. Este es el enunciado
  recíproco (inverso) del teorema directo de Tales.


  ### Desarrollo didáctico


  Mientras el teorema directo va de "paralelismo" a "proporcionalidad", el recíproco va de "proporcionalidad"
  a "paralelismo": ambos son igual de válidos y útiles, pero se usan en situaciones distintas según qué
  información se tiene y qué se quiere demostrar.'
procedimiento:
- 'Paso 1: Verifica que se cumpla la proporción AD/DB = AE/EC entre los segmentos dados.'
- 'Paso 2: Si la proporción se cumple exactamente, concluye que DE es paralela a BC.'
- 'Paso 3: Si la proporción no se cumple, DE no es paralela a BC.'
ejemplos:
- titulo: Aplicar el recíproco con una proporción que se cumple
  enunciado: En un triángulo, AD=4, DB=6, AE=6, EC=9.
  solucion_pasos:
  - 4/6=6/9=2/3, la proporción se cumple, por lo tanto DE es paralela a BC.
- titulo: Detectar cuando el recíproco no se cumple
  enunciado: AD=3, DB=5, AE=4, EC=7.
  solucion_pasos:
  - 3/5=0,6 y 4/7≈0,57; no son iguales, por lo tanto DE no es paralela a BC.
- titulo: ¿El teorema directo y el recíproco son la misma afirmación?
  respuesta: 'No'
  solucion_pasos:
  - 'No, van en direcciones opuestas: uno parte del paralelismo, el otro de la proporcionalidad.'
- titulo: ¿El recíproco permite demostrar paralelismo sin medir ángulos?
  respuesta: Sí
  solucion_pasos:
  - Sí, esa es precisamente su utilidad principal.
errores_frecuentes:
- Confundir el teorema directo con su recíproco, aplicándolos de forma intercambiable sin justificación.
- Concluir paralelismo con una proporción que no se cumple exactamente (solo aproximadamente).
- Olvidar verificar ambos cocientes de la proporción antes de concluir.
fuente: 'Fuente: Cid 106.'
estado: publicado
