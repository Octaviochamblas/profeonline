semantic_id: MAT.EST.NORMAL_CALCULO.ENTRE_VALORES
titulo: Calcular probabilidad entre dos valores de la variable normal
objetivo: Calcular la probabilidad de que una variable normal caiga entre dos valores determinados, restando áreas
  acumuladas.
introduccion: Para saber qué porción de la curva queda entre dos valores, basta con calcular las dos áreas
  acumuladas por separado y restarlas.
resumen: Para calcular $P(a<X<b)$ se restan las áreas acumuladas, aplicando $P(a<X<b)=P(X<b)-P(X<a)$, usando la
  tabla Z para cada una.
explicacion: '![Probabilidad entre dos valores](/static/img/estadistica/normcalc/normcalc-entre-valores.svg)


  ### Definición formal


  Para calcular $P(a<X<b)$, se estandarizan ambos valores a $z_a$ y $z_b$, y se calcula $P(a<X<b)=P(Z<z_b)-P(Z<z_a)$

  usando la tabla normal estándar.


  ### Desarrollo didáctico


  Es fundamental restar en el orden correcto (el área mayor menos la menor), ya que $b$ siempre debe ser mayor que

  $a$ para que el resultado sea una probabilidad positiva.'
procedimiento:
- 'Paso 1: Estandariza ambos valores $a$ y $b$ a sus puntajes $z_a$ y $z_b$.'
- 'Paso 2: Busca $P(Z<z_a)$ y $P(Z<z_b)$ en la tabla.'
- 'Paso 3: Calcula $P(a<X<b)=P(Z<z_b)-P(Z<z_a)$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si $P(Z<z_a)=0{,}3$ y $P(Z<z_b)=0{,}7$, ¿cuál es $P(a<X<b)$?
  solucion_pasos:
  - $P(a<X<b)=0{,}7-0{,}3$.
  - $P(a<X<b)=0{,}4$.
- titulo: Ejemplo 2
  enunciado: ¿Por qué se resta el área menor de la mayor al calcular una probabilidad entre dos valores?
  solucion_pasos:
  - Porque el área entre $a$ y $b$ corresponde exactamente a la diferencia entre ambas áreas acumuladas.
- titulo: ¿Se necesita estandarizar ambos valores $a$ y $b$ para calcular $P(a<X<b)$?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos deben transformarse a puntajes $Z$ antes de usar la tabla.
- titulo: ¿Se suman las dos áreas acumuladas para calcular $P(a<X<b)$?
  respuesta: 'No'
  solucion_pasos:
  - 'No, se restan; sumarlas daría un resultado incorrecto y mayor que 1 en muchos casos.'
errores_frecuentes:
- Sumar las áreas acumuladas en vez de restarlas.
- Restar en el orden incorrecto, obteniendo un resultado negativo.
- Olvidar estandarizar alguno de los dos valores antes de buscar en la tabla.
- Confundir el intervalo $[a,b]$ con uno de sus extremos únicamente.
- Usar la media o desviación estándar incorrecta al estandarizar alguno de los valores.
fuente: 'Elaboración propia (referencia: Moraleja 308).'
estado: publicado
