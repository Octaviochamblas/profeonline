semantic_id: MAT.GEO.TRIG_APLICACIONES.DISTANCIAS_INDIRECTAS
titulo: Resolución de problemas de distancias indirectas usando razones trigonométricas
objetivo: Calcular una distancia o altura que no se puede medir directamente, utilizando una razón trigonométrica
  junto con un ángulo y una distancia medible.
introduccion: Muchas veces no es posible medir directamente una altura o distancia (la altura de un cerro,
  el ancho de un río), pero sí se puede medir un ángulo y una distancia accesible; con esos datos se calcula
  la distancia inaccesible usando razones trigonométricas.
resumen: Una distancia indirecta es una longitud que no puede medirse de forma directa, y que se determina
  aplicando una razón trigonométrica a partir de un ángulo conocido y una distancia medible.
explicacion: '![Distancias indirectas](/static/img/geometria/trigonometria/trigapli-distancias-indirectas.svg)


  ### Definición formal


  Dado un triángulo rectángulo en que un lado representa una distancia inaccesible, un ángulo agudo conocido
  y otro lado que sí es medible, la distancia inaccesible se obtiene despejándola de la razón trigonométrica
  que relaciona ambos lados con el ángulo.


  ### Desarrollo didáctico


  Por ejemplo, para medir el ancho de un río sin cruzarlo: se mide una distancia a lo largo de la orilla
  (cateto adyacente) y el ángulo hacia un árbol en la otra orilla (θ). El ancho del río (cateto opuesto,
  inaccesible) se calcula como ancho=distancia medible×tanθ.'
procedimiento:
- 'Paso 1: Identifica cuál distancia es inaccesible (no se puede medir directamente) y cuál sí es medible.'
- 'Paso 2: Mide (o usa como dato) el ángulo agudo relevante entre la distancia medible y la línea de mira
  o la hipotenusa.'
- 'Paso 3: Selecciona la razón trigonométrica adecuada según los lados involucrados y despeja la distancia
  inaccesible.'
ejemplos:
- titulo: Calcular el ancho de un río sin cruzarlo
  enunciado: Se mide 25 m a lo largo de la orilla y un ángulo θ hacia un árbol en la otra orilla, con
    tanθ=0,8.
  solucion_pasos:
  - ancho=25×0,8=20 m.
- titulo: Calcular la altura de un cerro inaccesible
  enunciado: Desde 200 m de distancia horizontal (medible), el ángulo de elevación a la cima tiene tanθ=0,45.
  solucion_pasos:
  - altura=200×0,45=90 m.
- titulo: ¿Se requiere necesariamente un ángulo conocido para calcular una distancia indirecta?
  respuesta: Sí
  solucion_pasos:
  - Sí, sin un ángulo conocido no se puede aplicar ninguna razón trigonométrica.
- titulo: ¿Es posible calcular una distancia indirecta sin ninguna distancia medible?
  respuesta: 'No'
  solucion_pasos:
  - No, se necesita al menos una distancia conocida junto con el ángulo para despejar la incógnita.
errores_frecuentes:
- Intentar calcular la distancia inaccesible sin haber medido ni el ángulo ni una distancia de referencia.
- Aplicar la razón trigonométrica invertida (por ejemplo, usar tangente cuando corresponde seno o coseno).
- Confundir cuál de las dos distancias del problema es la inaccesible y cuál es la medible.
fuente: 'Elaboración propia (referencias: Moraleja 183, Cid 155).'
estado: publicado
