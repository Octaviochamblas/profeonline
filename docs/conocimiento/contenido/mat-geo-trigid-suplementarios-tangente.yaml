semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.SUPLEMENTARIOS_TANGENTE
titulo: Relación de la tangente entre ángulos suplementarios
objetivo: Establecer que la tangente de un ángulo es igual al opuesto de la tangente de su ángulo suplementario
  (ángulos que suman 180°).
introduccion: Como la tangente es el cociente entre seno y coseno, y el seno no cambia de signo entre
  suplementarios mientras que el coseno sí, la tangente hereda ese cambio de signo del coseno.
resumen: Si $x$ y $180°-x$ son ángulos suplementarios, se cumple $\tan(180°-x)=-\tan x$.
explicacion: '![Tangente de ángulos suplementarios](/static/img/geometria/trigonometria/trigid-suplementarios-tangente.svg)


  ### Definición formal


  Como $\tan(180°-x)=\dfrac{\sin(180°-x)}{\cos(180°-x)}=\dfrac{\sin x}{-\cos x}=-\tan x$, se obtiene la
  identidad de suplementariedad de la tangente.


  ### Desarrollo didáctico


  En la figura, θ=25° y su suplementario 180°-θ=155°. Se cumple que tan155°=-tan25°, consecuencia directa
  de que el seno se mantiene igual y el coseno cambia de signo entre ambos ángulos.'
procedimiento:
- 'Paso 1: Verifica que los dos ángulos sumen 180° (sean suplementarios).'
- 'Paso 2: Aplica tan(180°-x)=-tanx, recordando el cambio de signo.'
- 'Paso 3: Usa esta relación para obtener la tangente de un ángulo obtuso a partir de la tangente (con
  signo cambiado) de su suplementario agudo.'
ejemplos:
- titulo: Verificar la relación con 25° y 155°
  enunciado: θ=25°, suplementario 155°.
  solucion_pasos:
  - tan155°=-tan25°, por ser ángulos suplementarios.
- titulo: Calcular tan(120°) usando el suplementario
  enunciado: tan60°=√3≈1,732.
  solucion_pasos:
  - tan120°=-tan(180°-120°)=-tan60°≈-1,732.
- titulo: ¿La tangente cambia de signo entre ángulos suplementarios?
  respuesta: Sí
  solucion_pasos:
  - Sí, hereda el cambio de signo del coseno.
- titulo: ¿La tangente de todo ángulo obtuso es negativa?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque los ángulos obtusos están en el segundo cuadrante, donde la tangente es negativa.
errores_frecuentes:
- Olvidar el cambio de signo al aplicar esta identidad.
- Confundir esta identidad con la del seno de ángulos suplementarios (que no cambia de signo).
- Aplicar esta relación a ángulos que no sean realmente suplementarios.
fuente: Elaboración propia.
estado: publicado
