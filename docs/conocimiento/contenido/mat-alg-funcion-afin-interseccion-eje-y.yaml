semantic_id: MAT.ALG.FUNCION_AFIN.INTERSECCION_EJE_Y
titulo: Determinación de la intersección con el eje de las ordenadas
objetivo: Determinar el punto donde la gráfica de una función afín corta el eje vertical.
introduccion: Toda recta no vertical corta al eje $y$ en algún punto, y ese punto tiene una relación directa con
  la fórmula de la función.
resumen: La **intersección con el eje $y$** de una función afín $f(x) = mx+n$ es el punto $(0, n)$, obtenido evaluando
  la función en $x=0$.
explicacion: '### Definición formal


  Dada $f(x) = mx + n$, su gráfica corta al eje $y$ (eje de las ordenadas) exactamente en el punto $(0, f(0)) =
  (0, n)$, ya que el eje $y$ corresponde a todos los puntos con abscisa cero.


  ### Desarrollo didáctico


  Encontrar este punto es tan simple como leer el coeficiente de posición $n$ directamente de la fórmula, sin
  necesidad de resolver ninguna ecuación.


  Si $f(x) = -3x + 8$, la intersección con el eje $y$ es el punto $(0, 8)$, obtenido evaluando $f(0) = -3(0)+8
  = 8$.'
procedimiento:
- 'Paso 1: Identifica la fórmula de la función afín $f(x) = mx+n$.'
- 'Paso 2: Evalúa la función en $x=0$, o simplemente lee el valor de $n$.'
- 'Paso 3: El punto de intersección con el eje $y$ es $(0, n)$.'
ejemplos:
- titulo: Cálculo directo
  enunciado: Determina la intersección con el eje $y$ de $f(x) = 5x - 12$.
  solucion_pasos:
  - '$f(0) = 5(0) - 12 = -12$.'
  - 'Punto de intersección: $(0, -12)$.'
- titulo: Intersección con función sin coeficiente de posición explícito
  enunciado: Determina la intersección con el eje $y$ de $f(x) = 7x$.
  solucion_pasos:
  - '$f(0) = 7(0) = 0$.'
  - 'Punto de intersección: $(0, 0)$, el origen (caso de función lineal).'
- titulo: ¿La intersección con el eje $y$ de una función afín siempre tiene abscisa cero?
  enunciado: ¿La intersección con el eje $y$ de una función afín siempre tiene abscisa cero?
  respuesta: Sí
  solucion_pasos:
  - Por definición, el eje $y$ contiene exactamente los puntos con $x=0$.
- titulo: ¿El punto de intersección con el eje $y$ depende de la pendiente $m$?
  enunciado: ¿El punto de intersección con el eje $y$ depende de la pendiente $m$?
  respuesta: 'No'
  solucion_pasos:
  - Al evaluar en $x=0$, el término $mx$ se anula independientemente del valor de $m$; solo depende de $n$.
errores_frecuentes:
- Confundir la intersección con el eje $y$ con la intersección con el eje $x$.
- Calcular incorrectamente $f(0)$ sin anular correctamente el término $mx$.
- Expresar el punto sin sus dos coordenadas, olvidando el cero de la abscisa.
- Creer que la intersección con el eje $y$ depende del signo de la pendiente.
