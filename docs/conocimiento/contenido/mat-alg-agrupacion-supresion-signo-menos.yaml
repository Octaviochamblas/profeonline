semantic_id: MAT.ALG.AGRUPACION.SUPRESION_SIGNO_MENOS
objetivo: Eliminar paréntesis precedidos de signo menos, invirtiendo los signos de
  todos los términos interiores.
introduccion: 'El signo menos es un espejo invertido. Cada vez que un paréntesis tiene
  un signo menos delante, es como si ese menos le dijera a todos los de adentro: ''Dense
  vuelta''. Los positivos se vuelven negativos y los negativos se vuelven positivos.'
resumen: 'Al **Suprimir un Signo Menos** delante de un paréntesis, **todos** los términos
  dentro del paréntesis cambian de signo: los $+$ se vuelven $-$ y los $-$ se vuelven
  $+$.'
explicacion: 'Ejemplo: $10 - (3x - 2y + 5)$.


  El paréntesis va precedido de $-$. Este $-$ invierte todos los signos interiores:

  $10 - 3x + 2y - 5$.


  ¿Por qué? Porque el $-$ exterior se ''distribuye'' sobre cada término:

  $-(+3x) = -3x$.

  $-(-2y) = +2y$.

  $-(+5) = -5$.


  Reducimos: $(10 - 5) - 3x + 2y = 5 - 3x + 2y$.'
procedimiento:
- 'Paso 1: Identifica el signo $-$ delante del paréntesis.'
- 'Paso 2: Elimina el $-$ y el paréntesis.'
- 'Paso 3: Invierte el signo de CADA término que estaba dentro: $+$ pasa a $-$ y $-$
  pasa a $+$.'
- 'Paso 4: Reescribe la expresión completa y reduce los términos semejantes.'
ejemplos:
- titulo: El espejo invertidor
  enunciado: 'Elimina el paréntesis: 6a - (4b - 2a + 1).'
  solucion_pasos:
  - 'Signo exterior: -.'
  - 'Invertimos cada signo interior:'
  - -4b → queda +4b... espera, el signo de 4b dentro era +4b, entonces queda -4b.
  - 'No, analicemos: -(+4b) = -4b. -(-2a) = +2a. -(+1) = -1.'
  - 'Resultado sin paréntesis: 6a - 4b + 2a - 1.'
  - 'Reducimos: 8a - 4b - 1.'
errores_frecuentes:
- Cambiar solo el signo del primer término y dejar los demás igual.
- Cambiar el signo del primer término y del paréntesis mismo, omitiendo los del interior.
fuente: Álgebra de Baldor.
estado: publicado
