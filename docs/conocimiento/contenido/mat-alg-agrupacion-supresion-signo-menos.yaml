semantic_id: MAT.ALG.AGRUPACION.SUPRESION_SIGNO_MENOS
objetivo: Eliminar paréntesis precedidos de signo menos, invirtiendo los signos de todos los términos interiores.
introduccion: 'El signo menos es un espejo invertido. Cada vez que un paréntesis tiene un signo menos delante, es
  como si ese menos le dijera a todos los de adentro: ''Dense vuelta''. Los positivos se vuelven negativos y los
  negativos se vuelven positivos.'
resumen: 'Al **Suprimir un Signo Menos** delante de un paréntesis, **todos** los términos dentro del paréntesis
  cambian de signo: los $+$ se vuelven $-$ y los $-$ se vuelven $+$.'
explicacion: '### Definición formal


  El $-$ exterior invierte cada signo: $-(+2x)=-2x$, $-(-5y)=+5y$, $-(+3z)=-3z$.


  ### Desarrollo didáctico


  Ejemplo: $10 - (3x - 2y + 5)$.


  El paréntesis va precedido de $-$. Este $-$ invierte todos los signos interiores:

  $10 - 3x + 2y - 5$.


  ¿Por qué? Porque el $-$ exterior se ''distribuye'' sobre cada término:

  $-(+3x) = -3x$.

  $-(-2y) = +2y$.

  $-(+5) = -5$.


  Reducimos: $(10 - 5) - 3x + 2y = 5 - 3x + 2y$.'
procedimiento:
- 'Paso 1: Identifica el signo $-$ delante del paréntesis.'
- 'Paso 2: Elimina el $-$ y el paréntesis.'
- 'Paso 3: Invierte el signo de CADA término que estaba dentro: $+$ pasa a $-$ y $-$ pasa a $+$.'
- 'Paso 4: Reescribe la expresión completa y reduce los términos semejantes.'
- 'El $-$ exterior invierte cada signo: $-(+2x)=-2x$, $-(-5y)=+5y$, $-(+3z)=-3z$.'
ejemplos:
- titulo: El espejo invertidor
  enunciado: 'Elimina el paréntesis: 6a - (4b - 2a + 1).'
  solucion_pasos:
  - 'Signo exterior: -.'
  - 'Invertimos cada signo interior:'
  - -4b → queda +4b... espera, el signo de 4b dentro era +4b, entonces queda -4b.
  - 'No, analicemos: -(+4b) = -4b. -(-2a) = +2a. -(+1) = -1.'
  - 'Resultado sin paréntesis: 6a - 4b + 2a - 1.'
  - 'Reducimos: 8a - 4b - 1.'
- titulo: La temperatura de un reactor se modela como $T = 80 - (15 - 5t + 2)$. ¿Cuál es la expresión
  enunciado: 'La temperatura de un reactor se modela como $T = 80 - (15 - 5t + 2)$. ¿Cuál es la expresión simplificada?
    (v1)


    Opciones: A) $63 + 5t$ · B) $63 - 5t$ · C) $97 + 5t$ · D) $97 - 5t$'
  solucion_pasos:
  - 'Invertimos signos: $-(+15)=-15$, $-(-5t)=+5t$, $-(+2)=-2$. Queda: $80 - 15 + 5t - 2$. Constantes: $80-15-2=63$.
    Resultado: $63+5t$.'
  - 'Respuesta: $63 + 5t$'
- titulo: 'Respecto de «Supresión de agrupación precedida por signo negativo»: ¿Describe adecuadamente'
  enunciado: 'Respecto de «Supresión de agrupación precedida por signo negativo»: ¿Describe adecuadamente el concepto
    esta frase? «Al **Suprimir un Signo Menos** delante de un paréntesis, **todos** los términos dentro del paréntesis
    cambian de signo: los $+$ se vuelven $-$ y los $-$ se vuelven $+$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Al **Suprimir un Signo Menos** delante de un paréntesis, **todos**
    los términos dentro del paréntesis cambian de signo: los $+$ se vuelven $-$ y los $-$ se vuelven $+$.'
- titulo: 'Respecto de «Supresión de agrupación precedida por signo negativo»: ¿Se puede aceptar esta a'
  enunciado: 'Respecto de «Supresión de agrupación precedida por signo negativo»: ¿Se puede aceptar esta afirmación?
    «Cambiar solo el signo del primer término y dejar los demás igual»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Al **Suprimir un Signo Menos** delante de un paréntesis, **todos**
    los términos dentro del paréntesis cambian de signo: los $+$ se vuelven $-$ y los $-$ se vuelven $+$.'
errores_frecuentes:
- Cambiar solo el signo del primer término y dejar los demás igual.
- Cambiar el signo del primer término y del paréntesis mismo, omitiendo los del interior.
- $-2x - 5y + 3z$.
- $6b + 2$.
- $12b - 2$.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Supresión de agrupación precedida por signo negativo
