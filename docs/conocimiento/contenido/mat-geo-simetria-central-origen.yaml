semantic_id: MAT.GEO.SIMETRIAS.CENTRAL_ORIGEN
titulo: Simetría central respecto del origen de coordenadas
objetivo: 'Aplicar la regla específica de la simetría central respecto del origen del sistema cartesiano:
  cada punto P(x,y) se transforma en P''(-x,-y).'
introduccion: 'Cuando el centro de simetría es exactamente el origen del plano, la regla se simplifica:
  solo hay que cambiar el signo de ambas coordenadas.'
resumen: 'La simetría central respecto del origen $(0,0)$ transforma cada punto $P(x,y)$ en $P''(-x,-y)$:
  se invierte el signo de ambas coordenadas.'
explicacion: '![Simetría central respecto del origen](/static/img/geometria/isometrias/simetria-central-origen.svg)


  ### Definición formal


  Si el centro de simetría es el origen $(0,0)$, la fórmula general $P''=(2x_O-x_P,\,2y_O-y_P)$ se simplifica
  a $P''=(-x_P,-y_P)$, ya que $x_O=y_O=0$.


  ### Desarrollo didáctico


  En la figura, el punto $P(-3,2)$ tiene como imagen respecto del origen $P''(3,-2)$: simplemente se invierte
  el signo de cada coordenada.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del punto P(x,y) que se desea transformar.'
- 'Paso 2: Invierte el signo de la abscisa: -x.'
- 'Paso 3: Invierte el signo de la ordenada: -y, obteniendo el punto imagen P''(-x,-y).'
ejemplos:
- titulo: Aplicar la simetría respecto del origen
  enunciado: El punto P(-3,2) se refleja respecto del origen.
  solucion_pasos:
  - P'=(-(-3), -2)=(3,-2).
- titulo: Aplicar la simetría a un punto con ambas coordenadas positivas
  enunciado: El punto P(5,8) se refleja respecto del origen.
  solucion_pasos:
  - P'=(-5,-8).
- titulo: ¿Esta simetría cambia el signo de ambas coordenadas?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambas coordenadas cambian de signo simultáneamente.
- titulo: ¿El origen es su propia imagen bajo esta simetría?
  respuesta: Sí
  solucion_pasos:
  - Sí, el origen (0,0) se transforma en sí mismo, ya que -0=0.
errores_frecuentes:
- Invertir el signo de solo una de las dos coordenadas.
- Confundir esta simetría con la reflexión respecto de un eje (que solo cambia el signo de una coordenada).
- Aplicar la fórmula general del punto medio sin simplificarla al caso particular del origen.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 126, Cid 76).'
estado: publicado
