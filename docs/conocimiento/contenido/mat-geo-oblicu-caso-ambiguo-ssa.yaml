semantic_id: MAT.GEO.TRIG_OBLICUANGULOS.CASO_AMBIGUO_SSA
titulo: Reconocimiento del caso ambiguo SSA en la ley de senos
objetivo: Reconocer el caso ambiguo que puede presentarse al aplicar la ley de senos con datos lado-lado-ángulo
  (SSA), donde existen dos triángulos distintos posibles con los mismos datos.
introduccion: Cuando los datos conocidos son dos lados y un ángulo no comprendido entre ellos (SSA), a
  diferencia de otras configuraciones, puede que existan dos triángulos válidos, uno solo, o ninguno,
  dependiendo de los valores específicos.
resumen: El caso ambiguo SSA ocurre cuando, dados dos lados y un ángulo no comprendido, el valor del seno
  calculado para el segundo ángulo admite dos soluciones válidas (un ángulo agudo y su suplementario obtuso),
  generando dos triángulos distintos posibles.
explicacion: '![Caso ambiguo SSA](/static/img/geometria/trigonometria/oblicu-caso-ambiguo-ssa.svg)


  ### Definición formal


  Dados el lado $a$, el lado $b$ y el ángulo $A$ (no comprendido entre ellos), al calcular $\sin B=\dfrac{b\cdot\sin
  A}{a}$ pueden existir dos valores válidos de $B$ (agudo y obtuso) que completen un triángulo válido,
  dando lugar a dos triángulos distintos: $ABC$ y $ABC''$.


  ### Desarrollo didáctico


  En la figura, el vértice $C$ puede ubicarse en dos posiciones distintas (C y C'', mostrado con línea
  punteada) que satisfacen los mismos datos de lado $a$, lado $b$ y ángulo $A$, generando dos triángulos
  válidos y distintos.'
procedimiento:
- 'Paso 1: Verifica si los datos corresponden a una configuración SSA (dos lados y un ángulo no comprendido
  entre ellos).'
- 'Paso 2: Calcula el seno del segundo ángulo y determina si existen una, dos o ninguna solución posible.'
- 'Paso 3: Si existen dos soluciones válidas (ángulo agudo y su suplementario obtuso), reconoce que hay
  dos triángulos posibles con esos datos.'
ejemplos:
- titulo: Reconocer una configuración SSA
  enunciado: Se conocen los lados a=10, b=14, y el ángulo A=30° (no comprendido entre a y b).
  solucion_pasos:
  - Esta es una configuración SSA, que puede generar el caso ambiguo, ya que el ángulo conocido no está
    entre los dos lados dados.
- titulo: Determinar si existen dos soluciones posibles
  enunciado: Al calcular sinB se obtiene 0,7, con B agudo≈44,4° o B obtuso≈135,6°.
  solucion_pasos:
  - Se debe verificar si ambos valores de B permiten formar un triángulo válido (que la suma de los tres
    ángulos no exceda 180°) antes de aceptar ambas soluciones.
- titulo: ¿El caso ambiguo puede ocurrir en una configuración LAL (lado-ángulo-lado)?
  respuesta: 'No'
  solucion_pasos:
  - No, el caso ambiguo es exclusivo de la configuración SSA (lado-lado-ángulo no comprendido); en LAL
    siempre existe una solución única.
- titulo: ¿Es posible que una configuración SSA no tenga ninguna solución válida?
  respuesta: Sí
  solucion_pasos:
  - Sí, si el valor calculado del seno resulta mayor a 1, no existe ningún triángulo posible con esos
    datos.
errores_frecuentes:
- Asumir que siempre existe una única solución al resolver un triángulo con datos SSA.
- Olvidar verificar si la solución obtusa también genera un triángulo geométricamente válido.
- Confundir la configuración SSA con la LAL, donde no se presenta el caso ambiguo.
fuente: Elaboración propia.
estado: publicado
