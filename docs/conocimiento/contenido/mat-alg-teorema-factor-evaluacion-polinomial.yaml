- titulo: 'Respecto de «Evaluación de un polinomio en un valor dado»: ¿Se puede aceptar esta afirmación'
  enunciado: 'Respecto de «Evaluación de un polinomio en un valor dado»: ¿Se puede aceptar esta afirmación? «Olvidar
    los paréntesis al evaluar números negativos. (Ej: escribir $-2^2$ en vez de $(-2)^2$, lo que da $-4$ en lugar
    del correcto $+4$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Evaluar un polinomio $P(x)$ en $x=a$ consiste en reemplazar
    cada aparición de ''$x$'' por el número ''$a$'', y luego realizar las operaciones aritméticas en el orden correcto
    (potencias, multiplicaciones, sumas) para obtener un resultado final $P(a)$.'
errores_frecuentes:
- 'Olvidar los paréntesis al evaluar números negativos. (Ej: escribir $-2^2$ en vez de $(-2)^2$, lo que da $-4$
  en lugar del correcto $+4$).'
- 'Multiplicar antes de elevar a la potencia. (Ej: en $3(2)^2$, hacer $6^2=36$ en vez de $3(4)=12$).'
- Evaluar un polinomio consiste en sustituir la variable solo en el término de mayor grado.
- En una evaluación se realizan las sumas antes que las potencias.
- Las expresiones $(-a)^2$ y $-a^2$ representan siempre el mismo valor.
