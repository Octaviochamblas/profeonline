semantic_id: MAT.ALG.TEOREMA_FACTOR.EVALUACION_POLINOMIAL
titulo: Evaluación de un polinomio (Valor Numérico)
objetivo: Aprender a sustituir variables por un número específico para hallar el valor de un polinomio en un punto.
introduccion: 'Un polinomio es como una máquina de fábrica: tú le entregas una materia prima (un número que representa
  a ''x''), la máquina lo procesa, y te devuelve un producto final (el valor numérico). Este es el primer paso vital
  para entender la factorización avanzada.'
resumen: Evaluar un polinomio $P(x)$ en $x=a$ consiste en reemplazar cada aparición de '$x$' por el número '$a$',
  y luego realizar las operaciones aritméticas en el orden correcto (potencias, multiplicaciones, sumas) para obtener
  un resultado final $P(a)$.
explicacion: "### Definición formal\n\nEvaluar un polinomio $P(x)$ en $x=a$ consiste en reemplazar cada aparición\
  \ de '$x$' por el número '$a$', y luego realizar las operaciones aritméticas en el orden correcto (potencias,\
  \ multiplicaciones, sumas) para obtener un resultado final $P(a)$.\n\n### Desarrollo didáctico\n\nSupongamos que\
  \ tenemos el polinomio $P(x) = 2x^3 - 4x^2 + 5x - 7$.\nQueremos evaluarlo para $x = 2$. ¿Cómo lo hacemos?\n\n\
  Cambiamos cada 'x' por un (2) entre paréntesis:\n$P(2) = 2(2)^3 - 4(2)^2 + 5(2) - 7$\n\nAhora resolvemos usando\
  \ PEMDAS (jerarquía de operaciones):\n1. Primero potencias:\n   $(2)^3 = 8$\n   $(2)^2 = 4$\n   Queda: $2(8) -\
  \ 4(4) + 5(2) - 7$\n\n2. Luego multiplicaciones:\n   $16 - 16 + 10 - 7$\n\n3. Por último, sumas y restas de izquierda\
  \ a derecha:\n   $0 + 10 - 7 = 3$.\n\nEl valor numérico del polinomio cuando $x=2$ es $3$. Se escribe como $P(2)\
  \ = 3$."
procedimiento:
- 'Paso 1: Escribe el polinomio original.'
- 'Paso 2: Sustituye todas las ''x'' por el valor numérico, usando siempre paréntesis (ej. $(-3)$).'
- 'Paso 3: Resuelve las potencias primero (cuidado con los signos en potencias pares/impares).'
- 'Paso 4: Resuelve las multiplicaciones.'
- 'Paso 5: Suma y resta los valores resultantes para obtener el número final.'
ejemplos:
- titulo: Evalúa $P(x) = x^2 - 3x + 1$ para $x = -4$
  enunciado: Evalúa $P(x) = x^2 - 3x + 1$ para $x = -4$.
  solucion_pasos:
  - 'Sustitución: $P(-4) = (-4)^2 - 3(-4) + 1$.'
  - 'Potencias: $16 - 3(-4) + 1$.'
  - 'Multiplicación: $16 + 12 + 1$.'
  - 'Suma final: $29$. Por tanto $P(-4) = 29$.'
- titulo: Si $M(y) = 5y^3 - 2y$, halla $M(1)$.
  solucion_pasos:
  - 5(1)^3 - 2(1) = 5(1) - 2 = 5 - 2 = 3.
- titulo: 'Respecto de «Evaluación de un polinomio en un valor dado»: ¿Describe adecuadamente el concep'
  enunciado: 'Respecto de «Evaluación de un polinomio en un valor dado»: ¿Describe adecuadamente el concepto esta
    frase? «Evaluar un polinomio $P(x)$ en $x=a$ consiste en reemplazar cada aparición de ''$x$'' por el número
    ''$a$'', y luego realizar las operaciones aritméticas en el orden correcto (potencias, multiplicaciones, sumas)
    para obtener un resultado final $P(a)$»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Evaluar un polinomio $P(x)$ en $x=a$ consiste en reemplazar
    cada aparición de ''$x$'' por el número ''$a$'', y luego realizar las operaciones aritméticas en el orden correcto
