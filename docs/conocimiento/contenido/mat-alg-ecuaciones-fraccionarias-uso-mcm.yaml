semantic_id: MAT.ALG.ECUACIONES_FRACCIONARIAS.USO_MCM
titulo: Uso del MCM para Eliminar Denominadores Algebraicos
objetivo: Encontrar el MCM cuando los denominadores contienen polinomios con la incógnita.
explicacion: |
  Cuando los pisos de abajo son expresiones como $(x-1)$ y $(x^2-1)$, multiplicarlos entre sí crearía un monstruo enorme. Necesitas usar el MCM algebraico.

  Funciona como un antídoto personalizado. Factorizas todos los denominadores primero (ej: $x^2-1$ se vuelve $(x-1)(x+1)$).
  Luego, construyes tu antídoto (el MCM) tomando todos los factores que aparecen, a su mayor exponente. Al inyectar (multiplicar) este antídoto en toda la ecuación, aniquilarás todos los denominadores de un solo golpe, dejándote una ecuación lineal amigable en el piso de arriba.
procedimiento: |
  1. Factoriza completamente todos los denominadores de la ecuación.
  2. Construye el MCM tomando los factores comunes y no comunes al mayor exponente.
  3. Multiplica cada término de la ecuación por el MCM. Los denominadores se cancelarán con partes del MCM.
