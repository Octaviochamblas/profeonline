semantic_id: MAT.GEO.CUERPOS_REDONDOS_METRICA.ESFERA_VOLUMEN
titulo: Cálculo del volumen de la esfera
objetivo: Calcular el volumen de una esfera a partir de su radio.
introduccion: El volumen de una esfera indica cuánto espacio tridimensional ocupa una figura perfectamente
  redonda, como una pelota.
resumen: El volumen de una esfera de radio $r$ es $V = \frac{4\pi r^3}{3}$.
explicacion: '![Volumen de la esfera](/static/img/geometria/espacio-cuerpos/esfera-volumen.svg)


  ### Definición formal


  El volumen de una esfera de radio $r$ es $V=\frac{4}{3}\pi r^3$.


  ### Desarrollo didáctico


  Si una esfera tiene radio 3 cm, su volumen es $V=\frac{4}{3}\pi(3)^3=\frac{4}{3}\times27\pi=36\pi\approx113,04$
  cm³ (usando π≈3,14). Esta fórmula fue descubierta por Arquímedes, quien demostró que el volumen de la
  esfera es dos tercios del volumen del cilindro que la circunscribe.'
procedimiento:
- 'Paso 1: Identifica el radio (r) de la esfera.'
- 'Paso 2: Eleva el radio al cubo (multiplícalo por sí mismo tres veces).'
- 'Paso 3: Multiplica ese resultado por 4π y divide entre 3 para obtener el volumen: V=(4πr³)/3.'
ejemplos:
- titulo: Calcular el volumen de una esfera
  enunciado: Una esfera tiene radio 3 cm (π≈3,14).
  solucion_pasos:
  - V=(4×3,14×27)/3=339,12/3=113,04 cm³.
- titulo: Calcular el radio a partir del volumen
  enunciado: Una esfera tiene volumen 33,49 cm³ (aproximado, π≈3,14).
  solucion_pasos:
  - 33,49=(4×3,14×r³)/3 → 100,47=12,56×r³ → r³≈8 → r=2 cm.
- titulo: ¿El volumen de la esfera depende del radio elevado al cubo?
  respuesta: Sí
  solucion_pasos:
  - Sí, la fórmula V=(4πr³)/3 depende de r elevado a la tercera potencia.
- titulo: ¿El volumen de la esfera es dos tercios del cilindro que la circunscribe?
  respuesta: Sí
  solucion_pasos:
  - Sí, es un resultado clásico descubierto por Arquímedes.
errores_frecuentes:
- Olvidar elevar el radio al cubo (usando el cuadrado en su lugar, como en la fórmula del área).
- Olvidar dividir entre 3 después de multiplicar por 4π y el radio al cubo.
- Confundir esta fórmula con la del área total de la esfera (4πr²).
fuente: 'Elaboración propia (referencias: Moraleja 98, Cid 181, Baldor 336).'
estado: publicado
