semantic_id: 'MAT.ALG.ECUACION_BASE.PROPIEDAD_MULTIPLICATIVA'
titulo: 'La Regla de Plata: Propiedad Multiplicativa'
objetivo: 'Entender y aplicar la regla de multiplicar o dividir ambos lados de una ecuación por la misma cantidad.'
introduccion: |
  Si podemos añadir pesas a la balanza, también podemos duplicar todo su peso o reducirlo a la mitad, siempre y cuando lo hagamos parejo. Esta es la segunda gran regla de las ecuaciones.
resumen: |
  Si multiplicas o divides TODO el Primer Miembro y TODO el Segundo Miembro de una ecuación por la misma cantidad (distinta de cero), la igualdad se mantiene.
explicacion: |
  Situación común: $3x = 12$.
  Significa 'El triple de mi incógnita pesa 12'.
  ¿Cómo descubro el peso de una sola $x$? Dividiendo ambas partes entre 3.
  $\frac{3x}{3} = \frac{12}{3}$
  Los tres de la izquierda se simplifican (dan $1x$, que es $x$).
  $x = 4$.

  Esto es lo que conoces como 'si está multiplicando, pasa dividiendo'.

  **OJO (Advertencia Letal):** Cuando divides o multiplicas, afecta a TODO EL MIEMBRO.
  Si la ecuación fuera $3x + 1 = 12$, y decides dividir por 3, debes dividir todo: $\frac{3x + 1}{3} = \frac{12}{3}$. ¡Por eso siempre se recomienda hacer sumas/restas PRIMERO, y dejar esta regla de multiplicar/dividir para el final, cuando la $x$ esté sola con su coeficiente!
procedimiento:
  - 'Paso 1: Asegúrate de que el término que tiene la incógnita esté aislado (ya aplicaste sumas y restas).'
  - 'Paso 2: Identifica el coeficiente (el número que multiplica a la incógnita).'
  - 'Paso 3: Divide a ambos lados de la ecuación por ese mismo coeficiente.'
  - 'Paso 4: Simplifica las fracciones para obtener tu ''x'' desnuda.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Despeja aplicando la propiedad: $5y = 35$.'
    solucion_pasos:
    - 'El 5 está multiplicando a la ''y''.'
    - 'Dividimos ambos lados entre 5: $\frac{5y}{5} = \frac{35}{5}$.'
    - 'Simplificamos: $1y = 7$.'
    - 'Respuesta: $y = 7$.'
  - titulo: 'Si tengo $\frac{x}{2} = 8$, ¿qué operación aplico?'
    respuesta: 'Multiplicar por 2 ambos lados.'
    solucion_pasos:
    - 'Multiplicar por 2 elimina la división por 2 del lado izquierdo.'
errores_frecuentes:
  - 'Dividir por 0 (matemáticamente imposible y explota el universo).'
  - 'En un lado dividir por 3 y en el otro por -3 (arruina el signo final).'
estado: publicado
