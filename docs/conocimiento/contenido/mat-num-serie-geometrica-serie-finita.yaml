semantic_id: MAT.NUM.SERIE_GEOMETRICA.SERIE_FINITA
objetivo: Calcular matemáticamente el valor de una serie geométrica finita aplicando
  la fórmula de suma parcial.
introduccion: Ya conoces la diferencia entre lista y suma. Ahora, vamos a los fierros.
  Cuando la lista es de 30 términos, no puedes sumar a mano. Sacaremos nuestra fórmula
  mágica para devorar grandes sumas geométricas en un segundo.
resumen: 'Para calcular una serie finita (suma de ''n'' términos) usamos la fórmula
  ya conocida: $S_n = \frac{a_1(r^n - 1)}{r - 1}$. Recuerda que el exponente es ''$n$''
  entero, no ''$(n-1)$''.'
explicacion: "Repasemos la mecánica de la fórmula con un ejemplo donde los errores\
  \ abundan.\n\nFórmula: $$S_n = \\frac{a_1(r^n - 1)}{r - 1}$$\n\nSi queremos la serie\
  \ de los primeros 6 términos de $10, 20, 40\\dots$\n- $a_1 = 10$, $r = 2$, $n =\
  \ 6$.\n\nReemplazo cuidadoso:\n1. Arriba: $10 \\cdot (2^6 - 1)$\n   - Primero la\
  \ potencia: $2^6 = 64$\n   - Luego la resta: $64 - 1 = 63$\n   - Luego multiplicamos:\
  \ $10 \\cdot 63 = 630$.\n2. Abajo: $2 - 1 = 1$.\n3. División final: $630 / 1 = 630$.\n\
  \nLa serie vale 630. Cuidado con el paso 1: jamás debes hacer $10 \\cdot 2$ primero\
  \ y luego elevar a la sexta (eso daría un absurdo $20^6$)."
procedimiento:
- 'Paso 1: Detecta $a_1, r, n$.'
- 'Paso 2: Evalúa la potencia $r^n$.'
- 'Paso 3: Resta 1 a la potencia.'
- 'Paso 4: Multiplica por $a_1$ (esto completa el numerador).'
- 'Paso 5: Divide por $(r-1)$ (el denominador).'
ejemplos:
- titulo: Números fríos
  enunciado: Halla el valor de la serie de los 4 primeros términos de la sucesión
    que empieza en 100 con razón -2.
  solucion_pasos:
  - a1=100, r=-2, n=4.
  - 'Potencia: (-2)^4 = +16.'
  - 'Resta: 16 - 1 = 15.'
  - 'Multiplica a1: 100 * 15 = 1500.'
  - 'Denominador: r - 1 = -2 - 1 = -3.'
  - 'División final: 1500 / -3 = -500.'
  - La serie da -500.
errores_frecuentes:
- 'Romper la jerarquía de operaciones multiplicando $a_1$ por la base $r$ antes de
  aplicar el exponente (Ej: resolver $3(2^4)$ como $6^4$).'
- Olvidar los paréntesis al evaluar una razón negativa elevada a potencia par, como
  escribir $-2^4 = -16$ en vez de $(-2)^4 = +16$.
fuente: Currículum Nacional MINEDUC.
estado: publicado
