semantic_id: MAT.GEO.PARALELOGRAMOS.RECTANGULO_ANGULOS_RECTOS
titulo: Propiedad de cuatro ángulos rectos en el rectángulo
objetivo: Reconocer que el rectángulo, como caso particular de paralelogramo, tiene sus cuatro ángulos
  interiores rectos.
introduccion: Otro caso particular importante de paralelogramo es el rectángulo, caracterizado por una
  propiedad angular específica.
resumen: En un rectángulo, los cuatro ángulos interiores son rectos (miden 90° cada uno).
explicacion: '![Cuatro ángulos rectos en el rectángulo](/static/img/geometria/poligonos-cuadrilateros/paralelogramos-rectangulo-angulos-rectos.svg)


  ### Definición formal


  Un rectángulo es un paralelogramo con $\angle A=\angle B=\angle C=\angle D=90°$. A diferencia del cuadrado,
  el rectángulo no exige que sus cuatro lados sean iguales, solo que los lados opuestos lo sean (propiedad
  heredada de todo paralelogramo).


  ### Desarrollo didáctico


  Un rectángulo de 8 cm por 5 cm tiene sus cuatro ángulos de 90°, pero sus lados no son todos iguales
  (dos miden 8 cm y los otros dos 5 cm). Esto lo distingue del cuadrado, que además exige lados iguales.'
procedimiento:
- 'Paso 1: Verifica que la figura sea un rectángulo.'
- 'Paso 2: Si lo es, todos sus cuatro ángulos interiores miden 90°.'
- 'Paso 3: Recuerda que esto no implica que los cuatro lados sean iguales (a diferencia del cuadrado).'
ejemplos:
- titulo: Verificar los ángulos de un rectángulo
  enunciado: Un rectángulo tiene un ángulo marcado de 90°.
  solucion_pasos:
  - Los otros tres ángulos también miden 90° cada uno, por ser rectángulo.
- titulo: Distinguir rectángulo de cuadrado
  enunciado: Un rectángulo mide 8 cm por 5 cm.
  solucion_pasos:
  - Tiene ángulos rectos, pero no es un cuadrado, ya que sus lados no son todos iguales.
- titulo: ¿Todo cuadrado es un rectángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, el cuadrado es un caso particular de rectángulo, con la condición adicional de lados iguales.
- titulo: ¿Todo rectángulo es un cuadrado?
  respuesta: 'No'
  solucion_pasos:
  - No, solo lo es si además tiene los cuatro lados iguales.
errores_frecuentes:
- Creer que todo rectángulo es un cuadrado, olvidando que el cuadrado requiere además lados iguales.
- Confundir esta propiedad con la del rombo (que tiene lados iguales pero no necesariamente ángulos rectos).
- Asumir que un rectángulo no cumple las propiedades generales de todo paralelogramo (lados opuestos congruentes,
  diagonales que se bisecan).
fuente: 'Fuente: Moraleja Tomo 2 68, Cid 45.'
estado: publicado
