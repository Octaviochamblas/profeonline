semantic_id: MAT.GEO.TRIANGULOS_CLASIFICACION.ISOSCELES
titulo: Triángulo isósceles como triángulo con dos lados de igual medida
objetivo: Reconocer un triángulo isósceles por tener exactamente dos lados de igual longitud.
introduccion: 'Entre los triángulos, aquellos con dos lados de la misma medida (y el tercero distinto)
  reciben un nombre especial: isósceles.'
resumen: Un triángulo isósceles es aquel que tiene dos lados de igual medida.
explicacion: '![Triángulo isósceles](/static/img/geometria/triangulos/triangulos-clasificacion-isosceles.svg)


  ### Definición formal


  Un triángulo de lados $a$, $b$ y $c$ es isósceles si al menos dos de sus lados son iguales, por ejemplo
  $a=b$.


  ### Desarrollo didáctico


  Un triángulo con lados 6 cm, 6 cm y 4 cm es isósceles: los dos lados de 6 cm son iguales (llamados lados
  o piernas), y el de 4 cm es la base.'
procedimiento:
- 'Paso 1: Mide los tres lados del triángulo.'
- 'Paso 2: Busca si al menos dos de esas medidas coinciden.'
- 'Paso 3: Si encuentras un par igual, el triángulo es isósceles.'
ejemplos:
- titulo: Reconocer un isósceles
  enunciado: Un triángulo tiene lados de 7 cm, 7 cm y 5 cm.
  solucion_pasos:
  - Dos lados miden 7 cm, así que el triángulo es isósceles.
- titulo: Caso con tres lados iguales
  enunciado: Un triángulo tiene lados de 5 cm, 5 cm y 5 cm.
  solucion_pasos:
  - También es isósceles (y además equilátero), porque tiene al menos dos lados iguales.
- titulo: ¿Todo triángulo equilátero es también isósceles?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque tiene al menos dos lados iguales (de hecho, los tres).
- titulo: ¿Un triángulo isósceles puede tener sus tres lados distintos?
  respuesta: 'No'
  solucion_pasos:
  - No, por definición debe tener al menos dos lados iguales.
errores_frecuentes:
- Creer que un triángulo isósceles no puede ser también equilátero.
- Confundir los lados iguales (piernas) con la base.
- Clasificar como isósceles un triángulo con las tres medidas distintas.
fuente: Elaboración propia.
estado: publicado
