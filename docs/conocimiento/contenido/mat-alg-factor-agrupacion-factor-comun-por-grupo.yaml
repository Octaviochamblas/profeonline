semantic_id: MAT.ALG.FACTOR_AGRUPACION.FACTOR_COMUN_POR_GRUPO
titulo: Extracción del factor común por grupo
objetivo: Aplicar la regla del factor común monomio de forma independiente a cada uno de los grupos formados previamente.
introduccion: Una vez que tenemos a nuestro polinomio extenso dividido en dos equipos, es hora de simplificar a
  cada equipo por separado. Le quitaremos a cada grupo lo que le sobra, aplicando la técnica de factor común monomio
  que ya conocemos.
resumen: Consiste en factorizar cada uno de los paréntesis agrupados extrayendo su respectivo factor común monomio.
  El objetivo crítico de este paso es lograr que los polinomios resultantes dentro de los nuevos paréntesis sean
  **idénticos**.
explicacion: '### Definición formal


  Crear un paréntesis idéntico en ambos lados es vital para el paso final.


  ### Desarrollo didáctico


  Continuando con nuestro polinomio agrupado: $(ax + bx) + (ay + by)$.


  Trabajamos en el primer grupo: $(ax + bx)$. Ambos términos tienen la letra ''x''. Si factorizamos extrayendo la
  ''x'', nos queda $x(a + b)$.


  Trabajamos en el segundo grupo: $(ay + by)$. Ambos tienen la letra ''y''. Extraemos la ''y'' y nos queda $y(a
  + b)$.


  Juntando los dos resultados en nuestra expresión general, tenemos ahora:

  $x(a + b) + y(a + b)$.


  Fíjate en la relación algebraica que acaba de ocurrir. Al factorizar cada grupo por separado, hemos creado artificialmente
  un nuevo bloque repetido: el paréntesis $(a + b)$. Si los paréntesis no hubiesen quedado iguales, significaría
  que la agrupación fue incorrecta o que debimos extraer un signo negativo.'
procedimiento:
- 'Paso 1: Toma el primer grupo y extrae su mayor factor común monomio.'
- 'Paso 2: Toma el segundo grupo y haz lo mismo.'
- 'Paso 3: Si los interiores de los paréntesis quedaron con los signos al revés (ej. $(x-y)$ y $(y-x)$), extrae
  un -1 en el segundo grupo para igualarlos.'
- 'Paso 4: Escribe la nueva expresión mostrando los monomios multiplicando a sus respectivos paréntesis.'
- Crear un paréntesis idéntico en ambos lados es vital para el paso final.
ejemplos:
- titulo: Extrae los factores por grupo en $(2x^2 + 4x) + (3xy + 6y)$
  enunciado: Extrae los factores por grupo en $(2x^2 + 4x) + (3xy + 6y)$.
  solucion_pasos:
  - 'Primer grupo: Factor común es 2x. Queda $2x(x + 2)$.'
  - 'Segundo grupo: Factor común es 3y. Queda $3y(x + 2)$.'
  - 'Expresión resultante: $2x(x + 2) + 3y(x + 2)$.'
- titulo: ¿Qué obtienes al extraer factores en $(m^3 - m^2) + (-2m + 2)$?
  solucion_pasos:
  - En el segundo grupo sacamos el factor negativo (-2) para que el interior cambie a (m-1) y sea idéntico al primero.
- titulo: 'Respecto de «Extracción de factor común por grupo»: ¿Se ajusta a la definición esta afirmaci'
  enunciado: 'Respecto de «Extracción de factor común por grupo»: ¿Se ajusta a la definición esta afirmación? «Consiste
    en factorizar cada uno de los paréntesis agrupados extrayendo su respectivo factor común monomio»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Consiste en factorizar cada uno de los paréntesis agrupados
    extrayendo su respectivo factor común monomio.'
- titulo: 'Respecto de «Extracción de factor común por grupo»: ¿Es compatible con el procedimiento esta'
  enunciado: 'Respecto de «Extracción de factor común por grupo»: ¿Es compatible con el procedimiento esta afirmación?
    «Olvidar escribir el signo ''+'' (o ''-'') entre los dos grupos una vez extraídos los factores»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Consiste en factorizar cada uno de los paréntesis agrupados
    extrayendo su respectivo factor común monomio.'
errores_frecuentes:
- Olvidar escribir el signo '+' (o '-') entre los dos grupos una vez extraídos los factores.
- Extraer factores pero dejar paréntesis que no son idénticos, y tratar de continuar con el siguiente paso.
- Extraer un número positivo cuando se necesitaba uno negativo para igualar signos internos.
- Eliminar todos los paréntesis.
- Para «¿Cuál es el objetivo principal al extraer factores de cada grupo», la respuesta correcta es Que los factores
  externos sean iguales.
estado: publicado
