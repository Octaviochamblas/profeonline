semantic_id: MAT.NUM.RAICES_PROPIEDADES.RAIZ_DE_RAIZ
objetivo: Simplificar raíces anidadas.
introduccion: Cada radical divide un exponente; aplicar dos divisiones sucesivas equivale
  a dividir por el producto de los índices.
resumen: 'Una raíz aplicada a otra multiplica sus índices: \(\sqrt[m]{\sqrt[n]{a}}=\sqrt[mn]{a}\).
  En exponentes, \((a^{1/n})^{1/m}=a^{1/(mn)}\).'
explicacion: |-
  Una raíz aplicada a otra multiplica sus índices: \(\sqrt[m]{\sqrt[n]{a}}=\sqrt[mn]{a}\).

  La situación “\(\sqrt{\sqrt[3]{64}}=\sqrt[6]{64}=2\)” permite comprobar, y no solo memorizar, que en exponentes, \((a^{1/n})^{1/m}=a^{1/(mn)}\)
procedimiento:
- 'Paso 1: Identifica el índice de cada radical, incluyendo el \(2\) implícito.'
- 'Paso 2: Multiplica los índices y conserva el radicando.'
- 'Paso 3: Revisa el dominio y eleva el resultado al índice combinado para verificar.'
ejemplos:
- titulo: Aplicación razonada — Raíz de una raíz
  enunciado: \(\sqrt{\sqrt[3]{64}}=\sqrt[6]{64}=2\).
  solucion_pasos:
  - Identifica el índice de cada radical, incluyendo el \(2\) implícito.
  - Multiplica los índices y conserva el radicando.
  - Revisa el dominio y eleva el resultado al índice combinado para verificar.
- titulo: Revisión de una solución — Raíz de una raíz
  enunciado: Una solución aplica “Multiplica los índices y conserva el radicando.”,
    pero termina sin comprobar que en exponentes, \((a^{1/n})^{1/m}=a^{1/(mn)}\).
    Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define raíz de una raíz: una raíz aplicada a otra multiplica
    sus índices: \(\sqrt[m]{\sqrt[n]{a}}=\sqrt[mn]{a}\).'
  - Identifica el índice de cada radical, incluyendo el \(2\) implícito.
  - 'Completa la revisión con este control: Revisa el dominio y eleva el resultado
    al índice combinado para verificar.'
- titulo: ¿Se cumple que en exponentes, \((a^{1/n})^{1/m}=a^{1/(mn)}\)? — Raíz de
    una raíz
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que una raíz aplicada a otra multiplica
    sus índices: \(\sqrt[m]{\sqrt[n]{a}}=\sqrt[mn]{a}\).'
  - El caso “\(\sqrt{\sqrt[3]{64}}=\sqrt[6]{64}=2\)” satisface esa condición.
  - Revisa el dominio y eleva el resultado al índice combinado para verificar.
- titulo: ¿Es válido omitir el paso “Identifica el índice de cada radical, incluyendo
    el \(2\) implícito”? — Raíz de una raíz
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de raíz de una raíz.
  - 'Omitirlo puede volver inválida la acción siguiente: Multiplica los índices y
    conserva el radicando.'
  - 'La solución debe terminar de este modo: Revisa el dominio y eleva el resultado
    al índice combinado para verificar.'
errores_frecuentes:
- 'Confundir raíz de una raíz con otro concepto y omitir este inicio: Identifica el
  índice de cada radical, incluyendo el \(2\) implícito.'
- Aplicar mecánicamente “Multiplica los índices y conserva el radicando.” sin revisar
  las condiciones de la definición.
- Tomar “\(\sqrt{\sqrt[3]{64}}=\sqrt[6]{64}=2\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “en exponentes, \((a^{1/n})^{1/m}=a^{1/(mn)}\)”.
- 'Terminar el desarrollo sin realizar este control: Revisa el dominio y eleva el
  resultado al índice combinado para verificar.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
estado: publicado
