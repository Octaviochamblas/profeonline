semantic_id: MAT.NUM.FRACCIONES_CLASIFICACION.FRACCION_IMPROPIA
titulo: Fracción impropia
objetivo: Reconocer una fracción impropia a partir de la comparación entre numerador y denominador.
introduccion: 'Cuando el numerador es mayor que el denominador, la fracción representa más que un entero
  completo: ese tipo de fracción se llama impropia.'
resumen: Una fracción \(\frac{a}{b}\) es impropia si \(a>b\), y representa una cantidad mayor que \(1\).
explicacion: '### Definición formal


  Una fracción \(\frac{a}{b}\) (con \(a,b\) enteros positivos) es impropia si \(a>b\). En ese caso, \(\frac{a}{b}>1\):
  la fracción representa más que un entero completo, y puede reescribirse como número mixto.


  ### Desarrollo didáctico


  \(\frac{9}{4}\) es impropia porque \(9>4\): representa más de un entero completo, equivalente al número
  mixto \(2\frac{1}{4}\).'
procedimiento:
- 'Paso 1: Verifica primero que la expresión esté definida.'
- 'Paso 2: Compara numerador y denominador y comprueba que el numerador sea mayor.'
- 'Paso 3: Divide para confirmar que el valor de la fracción sea mayor que \(1\).'
ejemplos:
- titulo: Aplicación razonada — Identificación de fracción impropia
  enunciado: \(\frac{9}{4}\) es impropia porque 9 es mayor que 4.
  solucion_pasos:
  - Verifica primero que la expresión esté definida.
  - Compara numerador y denominador y comprueba que el numerador sea mayor.
  - Divide para confirmar que el valor de la fracción sea mayor que \(1\).
- titulo: Revisión de una solución — Identificación de fracción impropia
  enunciado: Una solución aplica “Compara numerador y denominador y comprueba que el numerador sea mayor.”,
    pero termina sin comprobar que una fracción impropia puede convertirse en número mixto. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de fracción impropia: una fracción impropia tiene
    numerador mayor que denominador y representa una cantidad mayor que 1.'
  - Verifica primero que la expresión esté definida.
  - 'Completa la revisión con este control: Divide para confirmar que el valor de la fracción sea mayor
    que \(1\).'
- titulo: ¿Se cumple que una fracción impropia puede convertirse en número mixto? — Identificación de
    fracción impropia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una fracción impropia tiene numerador mayor que denominador
    y representa una cantidad mayor que 1.
  - El caso “\(\frac{9}{4}\) es impropia porque 9 es mayor que 4” satisface esa condición.
  - Divide para confirmar que el valor de la fracción sea mayor que \(1\).
- titulo: ¿Es válido omitir el paso “Verifica primero que la expresión esté definida”? — Identificación
    de fracción impropia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de fracción impropia.
  - 'Omitirlo puede volver inválida la acción siguiente: Compara numerador y denominador y comprueba que
    el numerador sea mayor.'
  - 'La solución debe terminar de este modo: Divide para confirmar que el valor de la fracción sea mayor
    que \(1\).'
errores_frecuentes:
- 'Empezar identificación de fracción impropia sin realizar este control inicial: Verifica primero que
  la expresión esté definida.'
- Memorizar “\(\frac{9}{4}\) es impropia porque 9 es mayor que 4” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Compara numerador y denominador y comprueba que el numerador sea mayor.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación de fracción impropia que contradice el criterio “Una
  fracción impropia puede convertirse en número mixto”.
- 'Cerrar el ejercicio sin esta comprobación específica: Divide para confirmar que el valor de la fracción
  sea mayor que \(1\).'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
estado: publicado
