semantic_id: MAT.ALG.FUNC_POTENCIA_MODELO.VOLUMENES_GEOMETRICOS
titulo: Modelamiento de volúmenes mediante función potencia
objetivo: Reconocer que el volumen de sólidos semejantes se relaciona con el cubo de su dimensión lineal
  característica.
introduccion: Al igual que el área escala con el cuadrado, el volumen de un sólido que crece manteniendo su
  forma escala con el cubo de su dimensión lineal.
resumen: El volumen de un sólido en función de su dimensión lineal $x$ (lado, radio, etc.) sigue el modelo
  $V(x)=a\cdot x^3$, donde $a$ depende del tipo de sólido.
explicacion: '### Definición formal


  Para sólidos semejantes con dimensión lineal $x$, el volumen se modela como $V(x)=a\cdot x^3$, con $a$ una
  constante geométrica (por ejemplo, $a=1$ para un cubo de arista $x$, o $a=\frac{4}{3}\pi$ para una esfera de
  radio $x$). Es un caso particular de función potencia con $n=3$.


  ### Desarrollo didáctico


  Si se duplica la arista de un cubo, de $x$ a $2x$, su volumen pasa de $x^3$ a $(2x)^3=8x^3$: se multiplica por
  $8$, no se duplica. Esta relación cúbica explica por qué objetos ligeramente más grandes pesan
  desproporcionadamente más.'
procedimiento:
- 'Paso 1: Identifica la dimensión lineal característica del sólido (arista, radio, etc.).'
- 'Paso 2: Escribe el modelo de volumen como $V(x)=a\cdot x^3$, determinando la constante $a$ según el sólido.'
- 'Paso 3: Evalúa o compara el modelo según lo que pida el problema.'
ejemplos:
- titulo: Modelo de volumen de una esfera
  enunciado: 'Escribe el modelo de volumen de una esfera en función de su radio $r$.'
  solucion_pasos:
  - Se identifica la fórmula geométrica conocida: $V=\frac{4}{3}\pi r^3$.
  - 'Es un modelo de función potencia con $a=\frac{4}{3}\pi$ y $n=3$.'
- titulo: Efecto de triplicar la arista de un cubo
  enunciado: '¿Por qué factor cambia el volumen de un cubo si su arista se triplica?'
  solucion_pasos:
  - 'Se compara $V(3x)=(3x)^3=27x^3=27V(x)$.'
  - El volumen se multiplica por $27$.
- titulo: ¿El volumen de un cubo depende cuadráticamente de su arista?
  enunciado: ¿El volumen de un cubo depende del cuadrado de la longitud de su arista?
  respuesta: 'No'
  solucion_pasos:
  - Depende del cubo de la arista, no del cuadrado.
- titulo: ¿Duplicar el radio de una esfera multiplica su volumen por $4$?
  enunciado: ¿Duplicar el radio de una esfera multiplica su volumen exactamente por $4$?
  respuesta: 'No'
  solucion_pasos:
  - El volumen se multiplica por $2^3=8$, no por $4$ (que corresponde al cambio en el área).
errores_frecuentes:
- Confundir el modelo de volumen (exponente $3$) con el de área (exponente $2$).
- Suponer que el volumen escala en la misma proporción que la dimensión lineal.
- No identificar correctamente la constante $a$ según el tipo de sólido.
- Aplicar el modelo a sólidos que no son semejantes entre sí.
