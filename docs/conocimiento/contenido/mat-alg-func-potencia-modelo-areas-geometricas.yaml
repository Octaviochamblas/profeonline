semantic_id: MAT.ALG.FUNC_POTENCIA_MODELO.AREAS_GEOMETRICAS
titulo: Modelamiento de áreas mediante función potencia
objetivo: Reconocer que el área de figuras semejantes se relaciona con el cuadrado de su dimensión lineal
  característica.
introduccion: Cuando una figura crece manteniendo su forma (sus lados escalan todos por igual), su área no crece
  en la misma proporción que sus lados, sino según el cuadrado de esa proporción.
resumen: El área de una figura en función de su dimensión lineal $x$ (lado, radio, etc.) sigue el modelo
  $A(x)=a\cdot x^2$, donde $a$ depende del tipo de figura.
explicacion: '### Definición formal


  Para figuras semejantes con dimensión lineal $x$, el área se modela como $A(x)=a\cdot x^2$, con $a$ una
  constante geométrica (por ejemplo, $a=1$ para un cuadrado de lado $x$, o $a=\pi$ para un círculo de radio
  $x$). Es un caso particular de función potencia con $n=2$.


  ### Desarrollo didáctico


  Si se duplica el lado de un cuadrado, de $x$ a $2x$, su área pasa de $x^2$ a $(2x)^2=4x^2$: se cuadruplica, no
  se duplica. Esta relación cuadrática se cumple para cualquier figura semejante que escale proporcionalmente.'
procedimiento:
- 'Paso 1: Identifica la dimensión lineal característica de la figura (lado, radio, diagonal, etc.).'
- 'Paso 2: Escribe el modelo de área como $A(x)=a\cdot x^2$, determinando la constante $a$ según la figura.'
- 'Paso 3: Evalúa o compara el modelo según lo que pida el problema.'
ejemplos:
- titulo: Modelo de área de un círculo
  enunciado: 'Escribe el modelo de área de un círculo en función de su radio $r$.'
  solucion_pasos:
  - Se identifica la fórmula geométrica conocida: $A=\pi r^2$.
  - 'Es un modelo de función potencia con $a=\pi$ y $n=2$.'
- titulo: Efecto de triplicar el lado de un cuadrado
  enunciado: '¿Por qué factor cambia el área de un cuadrado si su lado se triplica?'
  solucion_pasos:
  - 'Se compara $A(3x)=(3x)^2=9x^2=9A(x)$.'
  - El área se multiplica por $9$.
- titulo: ¿El área de un cuadrado depende linealmente de su lado?
  enunciado: ¿El área de un cuadrado depende linealmente de la longitud de su lado?
  respuesta: 'No'
  solucion_pasos:
  - Depende del cuadrado del lado, no linealmente.
- titulo: ¿Duplicar el radio de un círculo duplica su área?
  enunciado: ¿Duplicar el radio de un círculo duplica exactamente su área?
  respuesta: 'No'
  solucion_pasos:
  - El área se multiplica por $2^2=4$, no por $2$.
errores_frecuentes:
- Suponer que el área escala en la misma proporción que la dimensión lineal.
- Confundir el modelo de área (exponente $2$) con el de volumen (exponente $3$).
- No identificar correctamente la constante $a$ según el tipo de figura.
- Aplicar el modelo a figuras que no son semejantes entre sí.
