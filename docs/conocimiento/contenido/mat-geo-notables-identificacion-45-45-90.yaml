semantic_id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.IDENTIFICACION_45_45_90
titulo: Identificación de un triángulo notable 45°-45°-90° a partir de sus ángulos
objetivo: Reconocer un triángulo rectángulo isósceles (notable 45°-45°-90°) identificando sus ángulos
  característicos.
introduccion: Algunos triángulos rectángulos tienen medidas de ángulos tan específicas que sus lados guardan
  siempre la misma proporción entre sí; el primero de estos es el triángulo 45°-45°-90°.
resumen: 'Un triángulo notable 45°-45°-90° es un triángulo rectángulo isósceles: tiene un ángulo recto
  y dos ángulos agudos de 45° cada uno.'
explicacion: '![Triángulo notable 45°-45°-90°](/static/img/geometria/areas-pitagoras/notables-identificacion-45-45-90.svg)


  ### Definición formal


  Un triángulo 45°-45°-90° tiene un ángulo recto (90°) y sus dos ángulos agudos son iguales entre sí (45°
  cada uno), lo que lo hace además isósceles: sus dos catetos son de igual longitud.


  ### Desarrollo didáctico


  Este triángulo se obtiene, por ejemplo, al trazar la diagonal de un cuadrado: se forman dos triángulos
  rectángulos isósceles, cada uno con ángulos 45°, 45° y 90°.'
procedimiento:
- 'Paso 1: Verifica que el triángulo tenga un ángulo recto (90°).'
- 'Paso 2: Verifica que los otros dos ángulos midan 45° cada uno.'
- 'Paso 3: Si se cumplen ambas condiciones, es un triángulo notable 45°-45°-90°.'
ejemplos:
- titulo: Identificar un triángulo con ángulos 90°, 45° y 45°
  enunciado: Un triángulo tiene ángulos de 90°, 45° y 45°.
  solucion_pasos:
  - Es un triángulo notable 45°-45°-90°, ya que cumple ambas condiciones angulares.
- titulo: Relacionar con la diagonal de un cuadrado
  enunciado: Se traza la diagonal de un cuadrado. ¿Qué triángulos se forman?
  solucion_pasos:
  - Se forman dos triángulos 45°-45°-90°, congruentes entre sí.
- titulo: ¿Este triángulo es isósceles?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque sus dos ángulos agudos son iguales, lo que implica catetos iguales.
- titulo: ¿Un triángulo con ángulos 90°, 30° y 60° es un 45-45-90?
  respuesta: 'No'
  solucion_pasos:
  - No, ese es el otro triángulo notable, el 30°-60°-90°.
errores_frecuentes:
- Confundir este triángulo con el 30°-60°-90° por tener ambos un ángulo recto.
- Olvidar verificar que ambos ángulos agudos sean exactamente iguales (45° cada uno).
- Asumir que cualquier triángulo isósceles es automáticamente un 45-45-90, sin verificar el ángulo recto.
fuente: Elaboración propia.
estado: publicado
