semantic_id: MAT.ALG.TEOREMA_FACTOR.FACTORIZACION_POR_RAICES
titulo: Factorización polinomial a partir de raíces conocidas
objetivo: Consolidar el uso de raíces dadas o calculadas para construir la expresión factorizada total
  de un polinomio, incluyendo coeficientes líderes.
introduccion: 'A veces el problema te da la solución en bandeja: "Construye un polinomio sabiendo que
  sus raíces son estas". Esta es la ingeniería inversa definitiva del Teorema del Factor. Pasarás de tener
  puntos dispersos en un plano a construir la ecuación maestra que los rige.'
resumen: Si un polinomio tiene raíces $r_1, r_2, \dots, r_n$, su factorización completa se expresa como
  $P(x) = a(x - r_1)(x - r_2)\dots(x - r_n)$, donde '$a$' es un coeficiente líder (constante de ajuste
  de escala).
explicacion: '### Definición formal


  Por el Teorema del Factor, cada raíz $r_i$ de un polinomio $P(x)$ de grado $n$ aporta un factor lineal
  $(x-r_i)$. Si $P$ tiene exactamente $n$ raíces $r_1, \dots, r_n$ (contando multiplicidad), estos $n$
  factores agotan el grado del polinomio, por lo que $P(x) = a(x-r_1)(x-r_2)\dots(x-r_n)$ para alguna
  constante $a$ que ajusta la escala vertical.


  ### Desarrollo didáctico


  Imagínate que alguien te dice: "Tengo un polinomio de tercer grado. Sus raíces son $5$, $-2$ y $0$.

  ¿Puedes reconstruirlo?


  Por supuesto.

  - Si la raíz es $5$, su factor es $(x - 5)$.

  - Si la raíz es $-2$, su factor es $(x - (-2)) = (x + 2)$.

  - Si la raíz es $0$, su factor es $(x - 0) = x$.


  Multiplicamos las piezas maestras:

  $P(x) = x \cdot (x - 5) \cdot (x + 2)$.


  Si te pidieran la forma expandida, simplemente multiplicas todo:

  $x \cdot (x^2 - 3x - 10) = x^3 - 3x^2 - 10x$.


  La única trampa es el "coeficiente $a$". Si el problema te dice que el polinomio cruza el eje Y en 20,
  tendrás que añadir una letra ''$a$'' multiplicando al frente: $P(x) = a(x)(x-5)(x+2)$ y resolver para
  ''$a$'' evaluando en un punto dado.'
procedimiento:
- 'Paso 1: Transforma cada raíz $r$ dada en un factor $(x - r)$.'
- 'Paso 2: Multiplica todos los factores entre sí.'
- 'Paso 3: Si te dan el coeficiente líder de $x^n$, colócalo multiplicando al frente de todo.'
- 'Paso 4: Si te piden la forma general, aplica distributiva múltiple para expandir los paréntesis.'
- 'Se invierten los signos: (x - 6) y (x - (-1)).'
ejemplos:
- titulo: Construye un polinomio factorizado con raíces $1, 2$ y $3$
  enunciado: Construye un polinomio factorizado con raíces $1, 2$ y $3$.
  solucion_pasos:
  - 'Factores: $(x-1)$, $(x-2)$, $(x-3)$.'
  - 'Ensamblaje: $P(x) = (x-1)(x-2)(x-3)$.'
- titulo: Crea un polinomio cuadrático con raíz doble en -4.
  solucion_pasos:
  - Una raíz doble significa que el factor aparece dos veces. El factor es (x - (-4)) = (x+4). Al repetirlo,
    es (x+4)^2.
- titulo: 'Respecto de «Factorización polinomial a partir de raíces conocidas»: ¿Describe adecuadamente'
  enunciado: 'Respecto de «Factorización polinomial a partir de raíces conocidas»: ¿Describe adecuadamente
    el concepto esta frase? «Si un polinomio tiene raíces $r_1, r_2, \dots, r_n$, su factorización completa
    se expresa como $P(x) = a(x - r_1)(x - r_2)\dots(x - r_n)$, donde ''$a$'' es un coeficiente líder
    (constante de ajuste de escala)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Si un polinomio tiene raíces $r_1, r_2, \dots, r_n$,
    su factorización completa se expresa como $P(x) = a(x - r_1)(x - r_2)\dots(x - r_n)$, donde ''$a$''
    es un coeficiente líder (constante de ajuste de escala).'
- titulo: 'Respecto de «Factorización polinomial a partir de raíces conocidas»: ¿Se puede aceptar esta'
  enunciado: 'Respecto de «Factorización polinomial a partir de raíces conocidas»: ¿Se puede aceptar esta
    afirmación? «Olvidar cambiar el signo al meter la raíz en el paréntesis. (Ej: con raíz $3$, poner
    $(x+3)$ en lugar de $(x-3)$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Si un polinomio tiene raíces $r_1, r_2, \dots, r_n$,
    su factorización completa se expresa como $P(x) = a(x - r_1)(x - r_2)\dots(x - r_n)$, donde ''$a$''
    es un coeficiente líder (constante de ajuste de escala).'
errores_frecuentes:
- 'Olvidar cambiar el signo al meter la raíz en el paréntesis. (Ej: con raíz $3$, poner $(x+3)$ en lugar
  de $(x-3)$).'
- Si te dan una raíz fraccionaria como $1/2$, escribir $(x - 1/2)$ está bien, pero es más elegante (y
  algebraicamente preferido) escribirlo como $(2x - 1)$ para evitar fracciones.
- $(x+6)(x-1)$.
- Para «Si el problema indica que el coeficiente de la variable de mayor grado (coeficiente principal
  o líder) es 3, ¿dónde se ubica en la factorización», la respuesta correcta es Se suma al final.
- Para «Si el problema indica que el coeficiente de la variable de mayor grado (coeficiente principal
  o líder) es 3, ¿dónde se ubica en la factorización», la respuesta correcta es Se eleva al cuadrado.
