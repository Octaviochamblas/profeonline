semantic_id: MAT.GEO.ANGULOS_APLICACIONES.MANECILLA_MINUTERA_AVANCE
titulo: 'Avance angular de la manecilla minutera: 6° por minuto'
objetivo: Calcular el giro de la manecilla minutera en un intervalo dado y comprobar que el cálculo se
  basa en una proporcionalidad directa entre tiempo transcurrido y giro.
introduccion: 'Un reloj da una vuelta completa cada hora con la minutera. Repartir esa vuelta en 60 minutos
  permite saber cuánto gira en cualquier intervalo. Este recurso se centra en avance angular de la manecilla
  minutera: 6° por minuto y en cómo reconocerlo con un criterio geométrico claro.'
resumen: La manecilla minutera recorre 360° en 60 minutos, por lo que avanza 6° por minuto. Como idea
  de control, el cálculo se basa en una proporcionalidad directa entre tiempo transcurrido y giro.
explicacion: 'La manecilla minutera recorre 360° en 60 minutos, por lo que avanza 6° por minuto.


  La situación “en 10 minutos, la minutera gira \(10\cdot 6° = 60°\)” muestra cómo pasar del dibujo a
  una conclusión válida: primero se identifica la relación correcta y luego se verifica que el cálculo
  se basa en una proporcionalidad directa entre tiempo transcurrido y giro.'
procedimiento:
- 'Paso 1: Recuerda que la vuelta completa de la minutera es 360° en 60 minutos.'
- 'Paso 2: Obtén la tasa de giro de 6° por minuto.'
- 'Paso 3: Multiplica esa tasa por el tiempo transcurrido y verifica que el resultado sea coherente con
  una hora completa.'
ejemplos:
- titulo: Aplicación directa — Avance de la minutera
  enunciado: En 10 minutos, la minutera gira \(10\cdot 6° = 60°\).
  solucion_pasos:
  - Recuerda que la vuelta completa de la minutera es 360° en 60 minutos.
  - Obtén la tasa de giro de 6° por minuto.
  - Multiplica esa tasa por el tiempo transcurrido y verifica que el resultado sea coherente con una hora
    completa.
- titulo: Corrección de una respuesta — Avance de la minutera
  enunciado: 'Un estudiante usa la idea “el cálculo se basa en una proporcionalidad directa entre tiempo
    transcurrido y giro” al analizar este caso: en 10 minutos, la minutera gira \(10\cdot 6° = 60°\).
    Explica qué debe revisar primero y cómo se justifica la conclusión.'
  solucion_pasos:
  - 'Parte de la definición: la manecilla minutera recorre 360° en 60 minutos, por lo que avanza 6° por
    minuto.'
  - Obtén la tasa de giro de 6° por minuto.
  - Multiplica esa tasa por el tiempo transcurrido y verifica que el resultado sea coherente con una hora
    completa.
- titulo: ¿La interpretación del dibujo es válida? — Avance de la minutera
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: la manecilla minutera recorre 360° en 60 minutos,
    por lo que avanza 6° por minuto.'
  - En el caso “en 10 minutos, la minutera gira \(10\cdot 6° = 60°\)” se observa que el cálculo se basa
    en una proporcionalidad directa entre tiempo transcurrido y giro.
  - Multiplica esa tasa por el tiempo transcurrido y verifica que el resultado sea coherente con una hora
    completa.
- titulo: ¿Basta con recuerda que la vuelta completa de la minutera es 360° en 60 minutos? — Avance de
    la minutera
  respuesta: 'No'
  solucion_pasos:
  - 'No. Un inicio útil no reemplaza la justificación completa de avance angular de la manecilla minutera:
    6° por minuto.'
  - Después del paso “Recuerda que la vuelta completa de la minutera es 360° en 60 minutos.” todavía hace
    falta revisar “Obtén la tasa de giro de 6° por minuto.”.
  - El cierre correcto exige “Multiplica esa tasa por el tiempo transcurrido y verifica que el resultado
    sea coherente con una hora completa.”.
errores_frecuentes:
- Avance de la minutera significa usar 0,5° por minuto, que corresponde a la manecilla horaria.
- Para resolver avance de la minutera, basta con el paso “Recuerda que la vuelta completa de la minutera
  es 360° en 60 minutos.” y no hace falta revisar “Obtén la tasa de giro de 6° por minuto.”.
- Si el dibujo parece claro, se puede ignorar que el cálculo se basa en una proporcionalidad directa entre
  tiempo transcurrido y giro.
- Dos configuraciones distintas representan avance de la minutera solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Multiplica esa tasa por el tiempo transcurrido
  y verifica que el resultado sea coherente con una hora completa.”.
fuente: Currículum Nacional MINEDUC — Aplicaciones de ángulos y lectura geométrica de situaciones cotidianas.
