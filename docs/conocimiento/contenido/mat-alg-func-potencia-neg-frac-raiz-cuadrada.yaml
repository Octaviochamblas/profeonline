semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.RAIZ_CUADRADA
titulo: La función raíz cuadrada como caso particular de función potencia
objetivo: Reconocer $f(x)=\sqrt{x}$ como la función potencia $f(x)=x^{1/2}$ y describir su forma básica.
introduccion: La función raíz cuadrada, tan conocida desde cursos anteriores, es en realidad un caso particular
  de función potencia con exponente $1/2$.
resumen: La función $f(x)=\sqrt{x}$ corresponde a $f(x)=x^{1/2}$, definida solo para $x\geq0$, con gráfica
  creciente que parte del origen y crece cada vez más lento.
explicacion: '### Definición formal


  $f(x)=\sqrt{x}=x^{1/2}$ está definida para $x\geq0$, ya que la raíz cuadrada de un número negativo no es real.
  Es estrictamente creciente en su dominio, con $f(0)=0$ como valor mínimo y sin límite superior.


  ### Desarrollo didáctico


  $f(4)=2$, $f(9)=3$, $f(16)=4$: la función crece, pero cada vez más lentamente, ya que se necesitan incrementos
  cada vez mayores de $x$ para lograr el mismo aumento en $f(x)$.'
procedimiento:
- 'Paso 1: Reconoce que $\sqrt{x}$ equivale a $x^{1/2}$, con exponente fraccionario.'
- 'Paso 2: Verifica que el dominio se restringe a $x\geq0$.'
- 'Paso 3: Evalúa algunos valores para confirmar el crecimiento lento característico.'
ejemplos:
- titulo: Evaluación de la raíz cuadrada
  enunciado: 'Evalúa $f(x)=\sqrt{x}$ en $x=25$ y $x=100$.'
  solucion_pasos:
  - 'Se calcula $f(25)=5$ y $f(100)=10$.'
  - Aunque $x$ se cuadruplicó, $f(x)$ solo se duplicó, mostrando el crecimiento lento.
- titulo: Reescritura como exponente fraccionario
  enunciado: 'Reescribe $f(x)=\sqrt{x}$ en notación de exponente.'
  solucion_pasos:
  - Se aplica la equivalencia entre raíz cuadrada y exponente $1/2$.
  - 'Se obtiene $f(x)=x^{1/2}$.'
- titulo: ¿$f(x)=\sqrt{x}$ está definida para $x=-4$?
  enunciado: ¿La función $f(x)=\sqrt{x}$ está definida para $x=-4$?
  respuesta: 'No'
  solucion_pasos:
  - La raíz cuadrada de un número negativo no es un número real.
- titulo: ¿La función raíz cuadrada es decreciente en algún tramo de su dominio?
  enunciado: ¿La función $f(x)=\sqrt{x}$ es decreciente en algún intervalo de su dominio?
  respuesta: 'No'
  solucion_pasos:
  - Es estrictamente creciente en todo su dominio $[0,+\infty)$, sin tramos decrecientes.
errores_frecuentes:
- Suponer que la raíz cuadrada está definida para números negativos.
- Confundir el crecimiento lento de la raíz cuadrada con un comportamiento decreciente.
- No reconocer la equivalencia entre $\sqrt{x}$ y $x^{1/2}$ al resolver problemas.
- Olvidar que $f(0)=0$ es el valor mínimo, no un punto excluido del dominio.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
