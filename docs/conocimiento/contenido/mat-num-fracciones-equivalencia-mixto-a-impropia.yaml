semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.MIXTO_A_IMPROPIA
objetivo: Convertir un número mixto en fracción impropia.
introduccion: 'El caso “\(2\frac{3}{5}=\frac{2\cdot 5 + 3}{5}=\frac{13}{5}\)” plantea
  una situación propia de conversión de número mixto a fracción impropia. Resolverla
  exige usar esta condición con precisión: para convertir un número mixto a fracción
  impropia se multiplica la parte entera por el denominador y luego se suma el numerador.'
resumen: Para convertir un número mixto a fracción impropia se multiplica la parte
  entera por el denominador y luego se suma el numerador. Como criterio de control,
  en un número mixto el denominador se conserva al pasar a fracción impropia
explicacion: |-
  Para convertir un número mixto a fracción impropia se multiplica la parte entera por el denominador y luego se suma el numerador.

  En el caso “\(2\frac{3}{5}=\frac{2\cdot 5 + 3}{5}=\frac{13}{5}\)” esta definición se aplica de forma directa. El control final consiste en comprobar que en un número mixto el denominador se conserva al pasar a fracción impropia.
procedimiento:
- 'Paso 1: Multiplica la parte entera por el denominador de la fracción.'
- 'Paso 2: Suma el numerador y conserva el denominador original.'
- 'Paso 3: Divide la impropia obtenida para comprobar que reproduce el número mixto.'
ejemplos:
- titulo: Aplicación razonada — Conversión de número mixto a fracción impropia
  enunciado: \(2\frac{3}{5}=\frac{2\cdot 5 + 3}{5}=\frac{13}{5}\).
  solucion_pasos:
  - Multiplica la parte entera por el denominador de la fracción.
  - Suma el numerador y conserva el denominador original.
  - Divide la impropia obtenida para comprobar que reproduce el número mixto.
- titulo: Revisión de una solución — Conversión de número mixto a fracción impropia
  enunciado: Una solución aplica “Suma el numerador y conserva el denominador original.”,
    pero termina sin comprobar que en un número mixto el denominador se conserva al
    pasar a fracción impropia. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conversión de número mixto a fracción impropia:
    para convertir un número mixto a fracción impropia se multiplica la parte entera
    por el denominador y luego se suma el numerador.'
  - Multiplica la parte entera por el denominador de la fracción.
  - 'Completa la revisión con este control: Divide la impropia obtenida para comprobar
    que reproduce el número mixto.'
- titulo: ¿Se cumple que en un número mixto el denominador se conserva al pasar a
    fracción impropia? — Conversión de número mixto a fracción impropia
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que para convertir un número mixto a fracción
    impropia se multiplica la parte entera por el denominador y luego se suma el numerador.
  - El caso “\(2\frac{3}{5}=\frac{2\cdot 5 + 3}{5}=\frac{13}{5}\)” satisface esa condición.
  - Divide la impropia obtenida para comprobar que reproduce el número mixto.
- titulo: ¿Es válido omitir el paso “Multiplica la parte entera por el denominador
    de la fracción”? — Conversión de número mixto a fracción impropia
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conversión de número mixto a
    fracción impropia.
  - 'Omitirlo puede volver inválida la acción siguiente: Suma el numerador y conserva
    el denominador original.'
  - 'La solución debe terminar de este modo: Divide la impropia obtenida para comprobar
    que reproduce el número mixto.'
errores_frecuentes:
- 'Empezar conversión de número mixto a fracción impropia sin realizar este control
  inicial: Multiplica la parte entera por el denominador de la fracción.'
- Memorizar “\(2\frac{3}{5}=\frac{2\cdot 5 + 3}{5}=\frac{13}{5}\)” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Suma el numerador y conserva el denominador original.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre conversión de número mixto a fracción impropia
  que contradice el criterio “En un número mixto el denominador se conserva al pasar
  a fracción impropia”.
- 'Cerrar el ejercicio sin esta comprobación específica: Divide la impropia obtenida
  para comprobar que reproduce el número mixto.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
