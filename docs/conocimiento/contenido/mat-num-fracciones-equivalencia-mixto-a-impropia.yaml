semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.MIXTO_A_IMPROPIA
objetivo: Comprender conversión de número mixto a fracción impropia y aplicarlo correctamente
  en ejercicios básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso conversión de número mixto a fracción impropia ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Para convertir un número mixto a fracción impropia se multiplica la parte
  entera por el denominador y luego se suma el numerador. Además, en un número mixto
  el denominador se conserva al pasar a fracción impropia.
explicacion: |-
  Para convertir un número mixto a fracción impropia se multiplica la parte entera por el denominador y luego se suma el numerador.

  Una idea importante es que en un número mixto el denominador se conserva al pasar a fracción impropia.

  Por ejemplo, \(2\frac{3}{5}=\frac{2\cdot 5 + 3}{5}=\frac{13}{5}\).
procedimiento:
- 'Paso 1: Elegir una estrategia conveniente: simplificar, amplificar, usar productos
  cruzados o un denominador común.'
- 'Paso 2: Ejecutar la comparación o transformación paso a paso, cuidando el valor
  de la fracción.'
- 'Paso 3: Interpretar el resultado y expresarlo con lenguaje matemático claro.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “\(2\frac{3}{5}=\frac{2\cdot 5 + 3}{5}=\frac{13}{5}\).”
    se relaciona con conversión de número mixto a fracción impropia.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: para convertir un número mixto a fracción impropia
    se multiplica la parte entera por el denominador y luego se suma el numerador.'
  - Concluye que el ejemplo sí ilustra conversión de número mixto a fracción impropia.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “En un número mixto el denominador se conserva
    al pasar a fracción impropia.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con conversión de número mixto a fracción
    impropia?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que en un número mixto el denominador se conserva
    al pasar a fracción impropia.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar conversión de número mixto a fracción impropia ignorando
    la definición o las condiciones del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar conversión de número mixto a fracción impropia sin mirar qué representan
  numerador, denominador o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
