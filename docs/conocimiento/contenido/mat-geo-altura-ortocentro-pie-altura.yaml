semantic_id: MAT.GEO.ALTURA_ORTOCENTRO.PIE_ALTURA
titulo: Identificación del pie de la altura en un triángulo
objetivo: Identificar el pie de una altura como el punto donde ésta toca al lado opuesto (o su prolongación).
introduccion: 'El segmento de la altura tiene un punto de llegada específico sobre la recta del lado opuesto;
  ese punto tiene nombre propio: pie de la altura.'
resumen: El pie de la altura es el punto donde la altura interseca a la recta que contiene al lado opuesto.
explicacion: '![Pie de la altura](/static/img/geometria/elementos-secundarios/altura-ortocentro-pie-altura.svg)


  ### Definición formal


  Si la altura desde A cae sobre la recta BC en el punto H'', ese punto H'' es el pie de la altura desde
  A.


  ### Desarrollo didáctico


  En un triángulo acutángulo, el pie de cada altura cae dentro del lado correspondiente. En un triángulo
  obtusángulo, el pie de dos de las alturas cae fuera del segmento, sobre la prolongación de la recta.'
procedimiento:
- 'Paso 1: Traza la altura desde el vértice elegido.'
- 'Paso 2: Ubica el punto exacto donde esa altura toca la recta del lado opuesto.'
- 'Paso 3: Ese punto es el pie de la altura.'
ejemplos:
- titulo: Ubicar un pie de altura
  enunciado: La altura desde A toca la recta BC en un punto P.
  solucion_pasos:
  - P es el pie de la altura desde A.
- titulo: Pie fuera del segmento
  enunciado: En un triángulo obtusángulo, el pie de una altura cae fuera del lado BC.
  solucion_pasos:
  - Aun así, sigue siendo el pie de esa altura, sobre la prolongación de BC.
- titulo: ¿El pie de la altura siempre está dentro del lado opuesto?
  respuesta: 'No'
  solucion_pasos:
  - No, en triángulos obtusángulos puede caer en la prolongación, fuera del segmento.
- titulo: ¿Cada altura tiene un único pie?
  respuesta: Sí
  solucion_pasos:
  - Sí, cada altura interseca la recta del lado opuesto en un solo punto.
errores_frecuentes:
- Creer que el pie de la altura siempre está dentro del segmento del lado opuesto.
- Confundir el pie de la altura con el punto medio del lado.
- No distinguir entre el segmento (altura) y el punto donde termina (pie).
fuente: Elaboración propia.
estado: publicado
