semantic_id: MAT.ALG.MULT_POLINOMIOS.ORDENAMIENTO_FACTORES
objetivo: Ordenar previamente los polinomios antes de multiplicarlos para facilitar
  la alineación de términos semejantes.
introduccion: Si intentas multiplicar polinomios desordenados, te arriesgas a perder
  la pista de qué término va con cuál. La forma más segura y ordenada de multiplicar
  es organizar ambos polinomios por grados, de mayor a menor.
resumen: El **Ordenamiento de Factores** en la multiplicación exige ordenar cada polinomio
  factor en orden descendente respecto a una misma variable. Esto asegura que al multiplicar
  verticalmente, los productos semejantes queden naturalmente alineados en las mismas
  columnas.
explicacion: "Multiplica: $(3 + x^2 - 2x)(x + 5)$.\n\nPaso 1: Ordenamos el trinomio:\
  \ $(x^2 - 2x + 3)$.\nPaso 2: Ordenamos el binomio (ya está ordenado): $(x + 5)$.\n\
  Paso 3: Multiplicamos verticalmente:\n```\n    x² - 2x + 3\n  ×      x + 5\n  ─────────────\n\
  \    5x² - 10x + 15    (multiplicación por 5)\n+ x³ - 2x² +  3x          (multiplicación\
  \ por x)\n────────────────\n  x³ + 3x² -  7x + 15\n```\n\nEl ordenamiento garantiza\
  \ que la familia $x^2$ y la familia $x$ queden perfectamente alineadas una debajo\
  \ de la otra."
procedimiento:
- 'Paso 1: Elige una variable de referencia en común.'
- 'Paso 2: Reescribe el primer polinomio en orden decreciente de exponentes de esa
  variable.'
- 'Paso 3: Reescribe el segundo polinomio siguiendo el mismo orden.'
- 'Paso 4: Realiza la multiplicación término a término de izquierda a derecha (o usando
  el método vertical).'
- 'Paso 5: Reduce los términos que queden alineados.'
ejemplos:
- titulo: Ordenar para el producto vertical
  enunciado: 'Multiplica: (2 - a + a^2)(a + 1).'
  solucion_pasos:
  - 'Ordenamos trinomio: a^2 - a + 2.'
  - 'Ordenamos binomio: a + 1.'
  - 'Multiplicación 1 (por 1): a^2 - a + 2.'
  - 'Multiplicación 2 (por a): a^3 - a^2 + 2a.'
  - 'Sumamos: a^3 + 0a^2 + a + 2 = a^3 + a + 2.'
errores_frecuentes:
- Multiplicar los polinomios en el orden desordenado original, dificultando la suma
  de términos semejantes.
- Cambiar los signos de los términos al reordenarlos dentro del polinomio.
fuente: Álgebra de Baldor.
estado: publicado
