semantic_id: MAT.NUM.LOGARITMOS_PROPIEDADES.LOGARITMO_DE_POTENCIA_MISMA_BASE
titulo: Logaritmo de una potencia con igual base
objetivo: Simplificar el logaritmo de una potencia con base coincidente.
introduccion: 'La composición inversa también funciona en el otro orden: aplicar logaritmo a una potencia
  de la misma base devuelve el exponente.'
resumen: \(\log_b(b^x)=x\) para una base logarítmica válida. El logaritmo recupera el exponente de una
  potencia con la misma base.
explicacion: '\(\log_b(b^x)=x\) para una base logarítmica válida.


  La situación “\(\log_7(7^{-2})=-2\)” permite comprobar, y no solo memorizar, que el logaritmo recupera
  el exponente de una potencia con la misma base'
procedimiento:
- 'Paso 1: Compara la base del logaritmo con la base de la potencia interior.'
- 'Paso 2: Comprueba que la base sea positiva y distinta de uno.'
- 'Paso 3: Elimina las operaciones inversas y conserva el exponente completo.'
ejemplos:
- titulo: Aplicación razonada — Logaritmo de una potencia con igual base
  enunciado: \(\log_7(7^{-2})=-2\).
  solucion_pasos:
  - Compara la base del logaritmo con la base de la potencia interior.
  - Comprueba que la base sea positiva y distinta de uno.
  - Elimina las operaciones inversas y conserva el exponente completo.
- titulo: Revisión de una solución — Logaritmo de una potencia con igual base
  enunciado: Una solución aplica “Comprueba que la base sea positiva y distinta de uno.”, pero termina
    sin comprobar que el logaritmo recupera el exponente de una potencia con la misma base. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define logaritmo de una potencia con igual base: \(\log_b(b^x)=x\) para
    una base logarítmica válida.'
  - Compara la base del logaritmo con la base de la potencia interior.
  - 'Completa la revisión con este control: Elimina las operaciones inversas y conserva el exponente completo.'
- titulo: ¿Se cumple que el logaritmo recupera el exponente de una potencia con la misma base? — Logaritmo
    de una potencia con igual base
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\log_b(b^x)=x\) para una base logarítmica válida.
  - El caso “\(\log_7(7^{-2})=-2\)” satisface esa condición.
  - Elimina las operaciones inversas y conserva el exponente completo.
- titulo: ¿Es válido omitir el paso “Compara la base del logaritmo con la base de la potencia interior”?
    — Logaritmo de una potencia con igual base
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de logaritmo de una potencia con igual base.
  - 'Omitirlo puede volver inválida la acción siguiente: Comprueba que la base sea positiva y distinta
    de uno.'
  - 'La solución debe terminar de este modo: Elimina las operaciones inversas y conserva el exponente
    completo.'
errores_frecuentes:
- 'Confundir logaritmo de una potencia con igual base con otro concepto y omitir este inicio: Compara
  la base del logaritmo con la base de la potencia interior.'
- Aplicar mecánicamente “Comprueba que la base sea positiva y distinta de uno.” sin revisar las condiciones
  de la definición.
- Tomar “\(\log_7(7^{-2})=-2\)” como una igualdad aislada, sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el logaritmo recupera el exponente de una potencia
  con la misma base”.
- 'Terminar el desarrollo sin realizar este control: Elimina las operaciones inversas y conserva el exponente
  completo.'
