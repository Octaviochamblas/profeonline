semantic_id: MAT.NUM.LOGARITMOS_CONCEPTO.RESTRICCION_BASE_DISTINTA_UNO
titulo: Restricción de base distinta de uno en un logaritmo
objetivo: Reconocer por qué la base uno está excluida.
introduccion: Una base válida debe cambiar al variar el exponente. Como todas las potencias de uno valen
  uno, no es posible recuperar un exponente único.
resumen: La base logarítmica no puede ser \(1\). La función \(1^x\) es constante y no tiene inversa.
explicacion: 'La base logarítmica no puede ser \(1\).


  El cálculo “\(\log_1 7\) no existe porque ninguna potencia de \(1\) produce \(7\)” muestra por qué la
  función \(1^x\) es constante y no tiene inversa'
procedimiento:
- 'Paso 1: Comprueba si la base es exactamente \(1\).'
- 'Paso 2: Analiza la ecuación equivalente \(1^x=a\).'
- 'Paso 3: Concluye que no hay logaritmo único y rechaza la expresión.'
ejemplos:
- titulo: Aplicación razonada — Restricción de base distinta de uno en un logaritmo
  enunciado: \(\log_1 7\) no existe porque ninguna potencia de \(1\) produce \(7\).
  solucion_pasos:
  - Comprueba si la base es exactamente \(1\).
  - Analiza la ecuación equivalente \(1^x=a\).
  - Concluye que no hay logaritmo único y rechaza la expresión.
- titulo: Revisión de una solución — Restricción de base distinta de uno en un logaritmo
  enunciado: Una solución aplica “Analiza la ecuación equivalente \(1^x=a\).”, pero termina sin comprobar
    que la función \(1^x\) es constante y no tiene inversa. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define restricción de base distinta de uno en un logaritmo: la base logarítmica
    no puede ser \(1\).'
  - Comprueba si la base es exactamente \(1\).
  - 'Completa la revisión con este control: Concluye que no hay logaritmo único y rechaza la expresión.'
- titulo: ¿Se cumple que la función \(1^x\) es constante y no tiene inversa? — Restricción de base distinta
    de uno en un logaritmo
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la base logarítmica no puede ser \(1\).
  - El caso “\(\log_1 7\) no existe porque ninguna potencia de \(1\) produce \(7\)” satisface esa condición.
  - Concluye que no hay logaritmo único y rechaza la expresión.
- titulo: ¿Es válido omitir el paso “Comprueba si la base es exactamente \(1\)”? — Restricción de base
    distinta de uno en un logaritmo
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de restricción de base distinta de uno en un logaritmo.
  - 'Omitirlo puede volver inválida la acción siguiente: Analiza la ecuación equivalente \(1^x=a\).'
  - 'La solución debe terminar de este modo: Concluye que no hay logaritmo único y rechaza la expresión.'
errores_frecuentes:
- 'Confundir restricción de base distinta de uno en un logaritmo con otro concepto y omitir este inicio:
  Comprueba si la base es exactamente \(1\).'
- Aplicar mecánicamente “Analiza la ecuación equivalente \(1^x=a\).” sin revisar las condiciones de la
  definición.
- Tomar “\(\log_1 7\) no existe porque ninguna potencia de \(1\) produce \(7\)” como una igualdad aislada,
  sin explicar por qué es válida.
- Aceptar una respuesta que contradice la idea clave “la función \(1^x\) es constante y no tiene inversa”.
- 'Terminar el desarrollo sin realizar este control: Concluye que no hay logaritmo único y rechaza la
  expresión.'
