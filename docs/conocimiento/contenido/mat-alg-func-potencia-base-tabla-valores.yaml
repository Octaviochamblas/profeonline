semantic_id: MAT.ALG.FUNC_POTENCIA_BASE.TABLA_VALORES
titulo: Construcción de una tabla de valores para la función potencia
objetivo: Elaborar una tabla de valores de $f(x)=a\cdot x^n$ como paso previo para analizar o graficar la función.
introduccion: Antes de identificar propiedades más abstractas, calcular algunos valores concretos ayuda a
  visualizar cómo se comporta la función potencia en la práctica.
resumen: Una **tabla de valores** de $f(x)=a\cdot x^n$ se construye evaluando la función en distintos valores de
  $x$, incluyendo positivos, negativos y, si corresponde, valores cercanos a $0$.
explicacion: '### Definición formal


  Dada $f(x)=a\cdot x^n$, una tabla de valores es un conjunto de pares ordenados $(x,f(x))$ obtenidos
  evaluando la función en una selección representativa de valores de $x$ dentro de su dominio, típicamente
  incluyendo valores negativos, positivos, y cero cuando pertenece al dominio.


  ### Desarrollo didáctico


  Para $f(x)=2x^2$: $f(-2)=8$, $f(-1)=2$, $f(0)=0$, $f(1)=2$, $f(2)=8$. La tabla revela de inmediato la simetría
  respecto al eje $y$, propia del exponente par, antes de siquiera trazar la gráfica.'
procedimiento:
- 'Paso 1: Elige un conjunto de valores representativos de $x$ dentro del dominio de la función.'
- 'Paso 2: Evalúa $f(x)=a\cdot x^n$ para cada valor elegido.'
- 'Paso 3: Organiza los pares $(x,f(x))$ en una tabla para identificar patrones.'
ejemplos:
- titulo: Tabla de valores con exponente impar
  enunciado: 'Construye una tabla de valores de $f(x)=x^3$ para $x=-2,-1,0,1,2$.'
  solucion_pasos:
  - 'Se evalúa: $f(-2)=-8$, $f(-1)=-1$, $f(0)=0$, $f(1)=1$, $f(2)=8$.'
  - La tabla revela que los resultados conservan el signo de $x$, propio del exponente impar.
- titulo: Tabla de valores con exponente negativo
  enunciado: 'Construye una tabla de valores de $f(x)=x^{-1}$ para $x=-2,-1,1,2$ (excluyendo $x=0$).'
  solucion_pasos:
  - 'Se evalúa: $f(-2)=-0{,}5$, $f(-1)=-1$, $f(1)=1$, $f(2)=0{,}5$.'
  - Se excluye $x=0$ porque no pertenece al dominio de esta función.
- titulo: ¿Se debe incluir $x=0$ en la tabla de valores de $f(x)=x^{-2}$?
  enunciado: ¿Corresponde incluir $x=0$ al construir la tabla de valores de $f(x)=x^{-2}$?
  respuesta: 'No'
  solucion_pasos:
  - '$x=0$ no pertenece al dominio de esta función, por lo que no puede incluirse en la tabla.'
- titulo: ¿Una tabla de valores puede revelar la simetría de una función potencia antes de graficarla?
  enunciado: ¿Puede una tabla de valores mostrar patrones de simetría antes de trazar la gráfica?
  respuesta: Sí
  solucion_pasos:
  - Comparar los valores de $f(-x)$ y $f(x)$ en la tabla permite anticipar si la función es par o impar.
errores_frecuentes:
- Incluir valores de $x$ que no pertenecen al dominio de la función.
- Elegir solo valores positivos, sin considerar cómo se comporta la función con $x$ negativo.
- No organizar los resultados de forma que se puedan comparar fácilmente para detectar simetrías.
- Cometer errores aritméticos al evaluar potencias con exponentes negativos o fraccionarios.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
