semantic_id: MAT.GEO.SIMETRAL_CIRCUNCENTRO.CIRCUNFERENCIA_CIRCUNSCRITA_CENTRO
titulo: Propiedad del circuncentro como centro de la circunferencia circunscrita
objetivo: Reconocer al circuncentro como el centro de la circunferencia circunscrita, la que pasa exactamente
  por los tres vértices del triángulo.
introduccion: Gracias a la equidistancia del circuncentro respecto a los tres vértices, es posible trazar
  una única circunferencia centrada en él que pasa exactamente por los tres.
resumen: La circunferencia circunscrita de un triángulo es la que tiene centro en el circuncentro y pasa
  por los tres vértices.
explicacion: '![Circunferencia circunscrita, centro en el circuncentro](/static/img/geometria/elementos-secundarios/simetral-circuncentro-circunferencia-circunscrita-centro.svg)


  ### Definición formal


  La circunferencia circunscrita de un triángulo ABC tiene centro en el circuncentro O y radio igual al
  circunradio R (la distancia común de O a los tres vértices); pasa por A, B y C.


  ### Desarrollo didáctico


  Como O está a la misma distancia R de los tres vértices, una circunferencia de centro O y radio R pasa
  exactamente por A, B y C, sin importar la forma del triángulo.'
procedimiento:
- 'Paso 1: Ubica el circuncentro del triángulo.'
- 'Paso 2: Calcula o mide el circunradio (distancia de O a cualquier vértice).'
- 'Paso 3: Traza la circunferencia de centro O y radio igual al circunradio.'
ejemplos:
- titulo: Trazar la circunferencia circunscrita
  enunciado: Un triángulo tiene circuncentro O y circunradio 5 cm.
  solucion_pasos:
  - Se traza una circunferencia de centro O y radio 5 cm; pasa por los tres vértices.
- titulo: Verificar que pasa por los vértices
  enunciado: ¿Por qué la circunferencia circunscrita pasa exactamente por los tres vértices?
  solucion_pasos:
  - Porque su radio es exactamente la distancia del circuncentro a cada vértice.
- titulo: ¿Todo triángulo tiene una circunferencia circunscrita?
  respuesta: Sí
  solucion_pasos:
  - Sí, todo triángulo tiene una única circunferencia que pasa por sus tres vértices.
- titulo: ¿El centro de la circunferencia circunscrita es el incentro?
  respuesta: 'No'
  solucion_pasos:
  - No, el centro de la circunscrita es el circuncentro; el incentro es el centro de la inscrita.
errores_frecuentes:
- Confundir la circunferencia circunscrita (centrada en el circuncentro) con la inscrita (centrada en
  el incentro).
- Usar un radio distinto al circunradio, haciendo que la circunferencia no pase por algún vértice.
- Ubicar el centro en un punto notable distinto al circuncentro.
fuente: Elaboración propia.
estado: publicado
