semantic_id: MAT.EST.INTERPRETACION_CRITICA.SESGO_VISUAL
titulo: Identificar sesgos visuales en la representación gráfica
objetivo: Identificar sesgos visuales en gráficos, como el uso engañoso de colores, tamaños de íconos
  o perspectivas 3D, que distorsionan la percepción de los datos.
introduccion: Además de los errores de escala, existen otras técnicas visuales que pueden inducir a interpretaciones
  erróneas de un gráfico.
resumen: Un sesgo visual es cualquier elemento de diseño (color, tamaño, perspectiva, orden) que, sin
  cambiar los datos en sí, influye en la percepción del lector de forma que distorsiona su interpretación
  real.
explicacion: '![Sesgos visuales en gráficos](/static/img/estadistica/intercrit/intercrit-sesgo-visual.svg)


  ### Definición formal


  Un sesgo visual induce una interpretación distinta de la que corresponde a los datos reales, mediante
  recursos como perspectivas 3D que distorsionan proporciones, o íconos de tamaño desproporcionado en
  pictogramas.


  ### Desarrollo didáctico


  Un pictograma que representa el doble de un valor mediante un ícono el doble de ALTO Y ANCHO en realidad
  multiplica el área visual por 4, exagerando la diferencia real, que debería ser solo del doble.'
procedimiento:
- 'Paso 1: Observa si el gráfico usa efectos visuales como perspectiva 3D, íconos de tamaño variable o
  colores que resaltan una categoría sobre otra.'
- 'Paso 2: Evalúa si esos efectos visuales cambian la percepción de las proporciones reales de los datos.'
- 'Paso 3: Si distorsionan la percepción respecto de los valores reales, identifica esto como un sesgo
  visual.'
ejemplos:
- titulo: Identificar sesgo por perspectiva 3D
  enunciado: Un gráfico circular en 3D hace parecer más grande el sector que está 'al frente' de la perspectiva.
  solucion_pasos:
  - 'Es un sesgo visual: la perspectiva 3D distorsiona el tamaño percibido de los sectores, sin cambiar
    los datos reales.'
- titulo: Identificar sesgo por tamaño de ícono en pictograma
  enunciado: Un pictograma duplica el valor usando un ícono el doble de alto y ancho (área 4 veces mayor).
  solucion_pasos:
  - 'Es un sesgo visual: el área del ícono aumenta 4 veces cuando el valor real solo se duplicó.'
- titulo: ¿La perspectiva 3D en gráficos circulares puede distorsionar la percepción de los sectores?
  respuesta: Sí
  solucion_pasos:
  - Sí, es un sesgo visual común que hace parecer más grandes los sectores más cercanos a la vista.
- titulo: ¿Usar colores más intensos para resaltar una categoría específica puede introducir sesgo en
    la percepción del lector?
  respuesta: Sí
  solucion_pasos:
  - Sí, puede hacer que esa categoría parezca más importante de lo que realmente es en los datos.
errores_frecuentes:
- No detectar el efecto de una perspectiva 3D al comparar el tamaño de sectores o barras en un gráfico.
- Escalar íconos en un pictograma proporcionalmente en ambas dimensiones, multiplicando su área en vez
  de solo su altura.
- Ignorar el efecto de resaltar visualmente (con color o tamaño) una categoría sobre las demás sin justificación
  en los datos.
fuente: 'Elaboración propia (referencia: Moraleja 114, 280).'
estado: publicado
