semantic_id: MAT.EST.PERMUTACIONES_VARIACIONES.VARIACION_SIN_REPETICION
titulo: Cálculo de variaciones de n elementos tomados de a r sin repetición
objetivo: Calcular el número de variaciones de n elementos tomados de a r, sin repetición, donde el orden
  importa y no se reutiliza ningún elemento.
introduccion: A diferencia de las permutaciones (que usan todos los elementos), las variaciones seleccionan
  y ordenan solo una parte r de los n elementos disponibles.
resumen: El número de variaciones de $n$ elementos distintos tomados de a $r$ (sin repetición, $r\leq
  n$) es $V(n,r)=\dfrac{n!}{(n-r)!}$.
explicacion: '![Variaciones sin repetición](/static/img/probabilidad/permvar/permvar-variacion-sin-repeticion.svg)


  ### Definición formal


  $V(n,r)=\dfrac{n!}{(n-r)!}=n\times(n-1)\times\cdots\times(n-r+1)$, seleccionando y ordenando $r$ elementos
  de un total de $n$, sin repetir ninguno.


  ### Desarrollo didáctico


  Si hay 5 personas y se deben asignar 3 puestos distintos (primero, segundo, tercer lugar), el número
  de formas es $V(5,3)=\dfrac{5!}{2!}=5\times4\times3=60$.'
procedimiento:
- 'Paso 1: Identifica el número total de elementos n y el número r de elementos que se seleccionan y ordenan.'
- 'Paso 2: Aplica la fórmula V(n,r)=n!/(n-r)!, o equivalentemente multiplica los r factores decrecientes
  desde n.'
- 'Paso 3: Verifica que el resultado tenga sentido (sea un número entero positivo, y que r≤n).'
ejemplos:
- titulo: Calcular V(5,3) para asignar 3 puestos entre 5 personas
  enunciado: n=5, r=3.
  solucion_pasos:
  - V(5,3)=5×4×3=60.
- titulo: Calcular V(8,2) para asignar medallas de oro y plata entre 8 competidores
  enunciado: n=8, r=2.
  solucion_pasos:
  - V(8,2)=8×7=56.
- titulo: ¿El orden importa en una variación sin repetición?
  respuesta: Sí
  solucion_pasos:
  - Sí, cada asignación distinta de posiciones (por ejemplo, quién queda primero vs. segundo) cuenta como
    un caso diferente.
- titulo: ¿Se puede repetir un mismo elemento en distintas posiciones de la variación?
  respuesta: 'No'
  solucion_pasos:
  - No, cada elemento se usa como máximo una vez en cada arreglo (es 'sin repetición').
errores_frecuentes:
- Confundir variación (r<n, orden importa) con combinación (orden no importa) o con permutación (usa todos
  los elementos).
- Calcular incorrectamente (n-r)! antes de aplicar la fórmula.
- Permitir que un mismo elemento se repita en distintas posiciones, violando la condición 'sin repetición'.
fuente: 'Elaboración propia (referencia: Baldor 372, Moraleja 299).'
estado: publicado
