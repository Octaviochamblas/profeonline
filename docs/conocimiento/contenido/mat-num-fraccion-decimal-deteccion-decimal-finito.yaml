semantic_id: MAT.NUM.FRACCION_DECIMAL.DETECCION_DECIMAL_FINITO
objetivo: Predecir si una fracción produce decimal finito.
introduccion: 'Para estudiar detección de decimal finito desde la fracción irreductible
  partiremos de una situación concreta: \(\frac{3}{20}\) da decimal finito porque
  \(20=2^2\cdot 5\). La definición que guiará cada decisión es: una fracción irreductible
  produce decimal finito cuando su denominador solo tiene factores primos 2 y/o 5.'
resumen: Una fracción irreductible produce decimal finito cuando su denominador solo
  tiene factores primos 2 y/o 5. Como criterio de control, los factores 2 y 5 son
  los que aparecen en las potencias de 10
explicacion: |-
  Una fracción irreductible produce decimal finito cuando su denominador solo tiene factores primos 2 y/o 5.

  Para analizar “\(\frac{3}{20}\) da decimal finito porque \(20=2^2\cdot 5\)” se identifican los datos, se aplica la definición y se controla el resultado mediante la idea “Los factores 2 y 5 son los que aparecen en las potencias de 10”.
procedimiento:
- 'Paso 1: Reduce la fracción a su forma irreductible.'
- 'Paso 2: Factoriza el denominador y comprueba que solo contenga factores \(2\) y/o
  \(5\).'
- 'Paso 3: Concluye que la expansión termina y confirma mediante la división.'
ejemplos:
- titulo: Aplicación razonada — Detección de decimal finito desde la fracción irreductible
  enunciado: \(\frac{3}{20}\) da decimal finito porque \(20=2^2\cdot 5\).
  solucion_pasos:
  - Reduce la fracción a su forma irreductible.
  - Factoriza el denominador y comprueba que solo contenga factores \(2\) y/o \(5\).
  - Concluye que la expansión termina y confirma mediante la división.
- titulo: Revisión de una solución — Detección de decimal finito desde la fracción
    irreductible
  enunciado: Una solución aplica “Factoriza el denominador y comprueba que solo contenga
    factores \(2\) y/o \(5\).”, pero termina sin comprobar que los factores 2 y 5
    son los que aparecen en las potencias de 10. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define detección de decimal finito desde la fracción
    irreductible: una fracción irreductible produce decimal finito cuando su denominador
    solo tiene factores primos 2 y/o 5.'
  - Reduce la fracción a su forma irreductible.
  - 'Completa la revisión con este control: Concluye que la expansión termina y confirma
    mediante la división.'
- titulo: ¿Se cumple que los factores 2 y 5 son los que aparecen en las potencias
    de 10? — Detección de decimal finito desde la fracción irreductible
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una fracción irreductible produce decimal
    finito cuando su denominador solo tiene factores primos 2 y/o 5.
  - El caso “\(\frac{3}{20}\) da decimal finito porque \(20=2^2\cdot 5\)” satisface
    esa condición.
  - Concluye que la expansión termina y confirma mediante la división.
- titulo: ¿Es válido omitir el paso “Reduce la fracción a su forma irreductible”?
    — Detección de decimal finito desde la fracción irreductible
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de detección de decimal finito
    desde la fracción irreductible.
  - 'Omitirlo puede volver inválida la acción siguiente: Factoriza el denominador
    y comprueba que solo contenga factores \(2\) y/o \(5\).'
  - 'La solución debe terminar de este modo: Concluye que la expansión termina y confirma
    mediante la división.'
errores_frecuentes:
- 'Empezar detección de decimal finito desde la fracción irreductible sin realizar
  este control inicial: Reduce la fracción a su forma irreductible.'
- Memorizar “\(\frac{3}{20}\) da decimal finito porque \(20=2^2\cdot 5\)” como respuesta
  aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Factoriza el denominador y comprueba que solo contenga
  factores \(2\) y/o \(5\).” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre detección de decimal finito desde la fracción
  irreductible que contradice el criterio “Los factores 2 y 5 son los que aparecen
  en las potencias de 10”.
- 'Cerrar el ejercicio sin esta comprobación específica: Concluye que la expansión
  termina y confirma mediante la división.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
