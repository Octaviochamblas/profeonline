semantic_id: MAT.NUM.PROG_ARITMETICA.TERMINO_GENERAL
titulo: Aplicación de la fórmula del término general en una progresión aritmética
objetivo: Aplicar la fórmula universal del término general de una progresión aritmética para hallar cualquier
  valor lejano.
introduccion: 'Si tu sueldo sube 10.000 pesos cada mes, ¿cuánto ganarás en el mes 48? Contar con los dedos
  no sirve aquí. Es la hora de usar el cañón pesado: la fórmula de la Progresión Aritmética.'
resumen: 'Cualquier término de una P.A. se puede calcular con la fórmula maestra: $a_n = a_1 + (n - 1)
  \cdot d$. Solo necesitas el primer término ($a_1$), la posición que buscas ($n$) y la diferencia ($d$).'
explicacion: 'Anatomía de la fórmula: **$a_n = a_1 + (n - 1) \cdot d$**

  - **$a_n$**: Es el número que quieres descubrir (el ''futuro'').

  - **$a_1$**: Es tu punto de partida. Desde dónde empiezas a contar.

  - **$d$**: Es el tamaño de cada paso que das.

  - **$(n - 1)$**: Es la cantidad de pasos que debes dar. ¿Por qué menos uno? Porque ya estás parado en
  el primer término ($a_1$), así que para llegar a la posición 10, solo debes dar 9 pasos.


  Ejemplo: Tienes la progresión $5, 8, 11...$ y te piden el término en la posición 20.

  - $a_1 = 5$

  - $d = 3$ (porque $8-5=3$)

  - $n = 20$

  Fórmula: $a_{20} = 5 + (20 - 1) \cdot 3 \rightarrow 5 + (19) \cdot 3 \rightarrow 5 + 57 = 62$. ¡Directo
  al blanco!'
procedimiento:
- 'Paso 1: Extrae de la serie el valor de a1 (el primer número).'
- 'Paso 2: Calcula la diferencia ''d'' restando el segundo menos el primero.'
- 'Paso 3: Identifica la posición ''n'' que te pide el problema.'
- 'Paso 4: Reemplaza estos tres datos en la fórmula $a_n = a_1 + (n-1)d$ y resuelve, recordando multiplicar
  antes de sumar.'
ejemplos:
- titulo: Retrocediendo en el tiempo
  enunciado: 'Halla el término 15 de la P.A: 100, 95, 90...'
  solucion_pasos:
  - a1 = 100.
  - d = 95 - 100 = -5.
  - n = 15.
  - 'Fórmula: a15 = 100 + (15 - 1) * (-5)'
  - a15 = 100 + (14) * (-5)
  - a15 = 100 - 70 = 30.
errores_frecuentes:
- 'Olvidar restar 1 a la ''n'' en el paréntesis. (Ej: multiplicar por 20 pasos en lugar de 19 para llegar
  a la posición 20).'
- Sumar $a_1 + (n-1)$ antes de multiplicar por la diferencia 'd' (Error grave de Papomudas).
fuente: Currículum Nacional MINEDUC.
estado: publicado
