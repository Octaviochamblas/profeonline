semantic_id: MAT.EST.LAPLACE_MUESTRALES.REGLA_LAPLACE
titulo: Cálculo de probabilidad clásica mediante la regla de Laplace
objetivo: Aplicar la regla de Laplace para calcular la probabilidad de un evento, dividiendo el número
  de casos favorables entre el número de casos totales.
introduccion: Cuando todos los resultados de un experimento son equiprobables, existe una fórmula directa
  y sencilla para calcular la probabilidad de cualquier evento.
resumen: La regla de Laplace establece que la probabilidad de un evento $A$ es $P(A)=\dfrac{n(A)}{n(S)}$,
  donde $n(A)$ son los casos favorables y $n(S)$ los casos totales.
explicacion: '![Regla de Laplace](/static/img/probabilidad/laplace/lap-regla-laplace.svg)


  ### Definición formal


  Si el espacio muestral $S$ tiene resultados equiprobables, la probabilidad de un evento $A$ es $P(A)=\dfrac{n(A)}{n(S)}$.


  ### Desarrollo didáctico


  Al lanzar un dado, el evento ''número par'' tiene $n(A)=3$ y $n(S)=6$, por lo que $P(A)=\dfrac{3}{6}=0{,}5$.'
procedimiento:
- 'Paso 1: Verifica que los resultados del espacio muestral sean equiprobables.'
- 'Paso 2: Cuenta los casos favorables n(A) y los casos totales n(S).'
- 'Paso 3: Calcula la probabilidad como P(A)=n(A)/n(S).'
ejemplos:
- titulo: Calcular la probabilidad de 'número par' al lanzar un dado
  enunciado: n(A)=3, n(S)=6.
  solucion_pasos:
  - P(A)=3/6=0,5.
- titulo: Calcular la probabilidad de 'sacar un as' de un mazo
  enunciado: n(A)=4, n(S)=52.
  solucion_pasos:
  - P(A)=4/52≈0,077.
- titulo: ¿La regla de Laplace requiere resultados equiprobables?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una condición necesaria para aplicar esta fórmula directamente.
- titulo: ¿El resultado de la regla de Laplace siempre está entre 0 y 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que n(A) siempre es menor o igual que n(S).
errores_frecuentes:
- Aplicar la regla de Laplace sin verificar que los resultados sean equiprobables.
- Invertir la fracción, calculando n(S)/n(A) en vez de n(A)/n(S).
- Contar incorrectamente los casos favorables o los casos totales antes de aplicar la fórmula.
fuente: 'Elaboración propia (referencia: Moraleja 404).'
estado: publicado
