semantic_id: MAT.ALG.FUNC_CUADR_MODELO.PLANTEO_FUNCION
titulo: Planteamiento de una función cuadrática a partir de un problema contextualizado
objetivo: Plantear la regla de una función cuadrática que represente correctamente un problema dado en lenguaje
  natural.
introduccion: Una vez identificado que un problema se modela con una función cuadrática, el siguiente paso es
  traducir el enunciado completo en una regla algebraica precisa.
resumen: Plantear una función cuadrática implica definir una variable para la cantidad que varía, expresar las
  demás cantidades en función de ella, y combinar todo en una única regla $f(x)$.
explicacion: '### Definición formal


  Plantear una función cuadrática a partir de un problema consiste en asignar una variable $x$ a la cantidad
  desconocida, expresar las demás cantidades relevantes del problema en términos de $x$, y combinar esas expresiones
  (generalmente mediante un producto) en una única regla $f(x)=ax^2+bx+c$.


  ### Desarrollo didáctico


  Conviene identificar primero qué cantidad conviene llamar $x$ (usualmente la que tiene menos restricciones),
  y luego expresar el resto en función de ella antes de combinar todo en la regla final.


  "El ancho de un terreno rectangular es $x$ metros y el largo es $6$ metros más que el ancho. Plantea el área
  en función de $x$": el largo es $x+6$, por lo que $A(x)=x(x+6)=x^2+6x$.'
procedimiento:
- 'Paso 1: Define una variable $x$ para la cantidad que varía en el problema.'
- 'Paso 2: Expresa las demás cantidades relevantes del problema en función de $x$.'
- 'Paso 3: Combina las expresiones (generalmente mediante un producto) para obtener la regla completa $f(x)$.'
ejemplos:
- titulo: Planteamiento de una función de área
  enunciado: 'El largo de un rectángulo es el triple de su ancho $x$. Plantea el área en función de $x$.'
  solucion_pasos:
  - El largo es $3x$.
  - '$A(x)=x(3x)=3x^2$.'
- titulo: Planteamiento de una función de ingreso
  enunciado: 'Un producto se vende a $p(x)=20-x$ pesos, donde $x$ es la cantidad de descuentos aplicados. Plantea
    el ingreso si se venden $x+10$ unidades.'
  solucion_pasos:
  - El ingreso es precio por cantidad.
  - '$I(x)=(20-x)(x+10)=-x^2+10x+200$.'
- titulo: ¿Es necesario definir primero una variable antes de plantear la función?
  enunciado: ¿Es necesario definir primero una variable antes de plantear la función?
  respuesta: Sí
  solucion_pasos:
  - Sin una variable claramente definida, no es posible expresar las demás cantidades del problema en su función.
- titulo: ¿La función planteada debe simplificarse a su forma general?
  enunciado: ¿La función planteada debe simplificarse a su forma general?
  respuesta: Sí
  solucion_pasos:
  - Simplificar a la forma general facilita identificar coeficientes y aplicar métodos posteriores de análisis.
errores_frecuentes:
- Definir la variable de forma ambigua, sin precisar exactamente qué representa.
- Expresar incorrectamente una de las cantidades en función de la variable elegida.
- Olvidar desarrollar y simplificar el producto planteado hasta la forma general.
- Confundir el planteamiento del área con el del perímetro u otra cantidad distinta.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
