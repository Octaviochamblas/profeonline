semantic_id: MAT.ALG.EC_CUADR_METODOS.FORMULA_GENERAL
titulo: Aplicación de la fórmula general para resolver ecuaciones cuadráticas
objetivo: Aplicar la fórmula general para resolver cualquier ecuación de segundo grado escrita en su forma
  estándar.
introduccion: Existe una única fórmula que resuelve cualquier ecuación cuadrática, sin importar qué tan
  complicados sean sus coeficientes; basta con sustituir tres números en ella.
resumen: La **fórmula general** para resolver $ax^2+bx+c=0$ es $x=\dfrac{-b\pm\sqrt{b^2-4ac}}{2a}$, aplicable
  a cualquier ecuación cuadrática con $a\neq0$.
explicacion: '### Definición formal


  Para toda ecuación $ax^2+bx+c=0$ con $a \neq 0$, las soluciones están dadas por $x=\dfrac{-b\pm\sqrt{b^2-4ac}}{2a}$.
  Esta fórmula se obtiene mediante el método de completar el cuadrado aplicado a la forma general, y es
  válida para cualquier terna de coeficientes reales.


  ### Desarrollo didáctico


  El uso de la fórmula general sigue siempre el mismo patrón: identificar $a$, $b$, $c$; calcular el discriminante;
  y sustituir todo en la fórmula, resolviendo por separado el caso $+$ y el caso $-$.


  Para $x^2-3x-4=0$: $a=1$, $b=-3$, $c=-4$. Sustituyendo, $x=\dfrac{3\pm\sqrt{9+16}}{2}=\dfrac{3\pm5}{2}$,
  lo que da $x=4$ y $x=-1$.'
procedimiento:
- 'Paso 1: Identifica los coeficientes $a$, $b$ y $c$ de la ecuación en forma general.'
- 'Paso 2: Sustituye esos valores en $x=\dfrac{-b\pm\sqrt{b^2-4ac}}{2a}$.'
- 'Paso 3: Calcula el discriminante y simplifica la raíz cuadrada si corresponde.'
- 'Paso 4: Resuelve por separado el caso $+$ y el caso $-$ para obtener las dos soluciones (o la única,
  si el discriminante es cero).'
ejemplos:
- titulo: Aplicación directa de la fórmula general
  enunciado: Resuelve $x^2+2x-3=0$ usando la fórmula general.
  solucion_pasos:
  - $a=1$, $b=2$, $c=-3$.
  - $x=\dfrac{-2\pm\sqrt{4+12}}{2}=\dfrac{-2\pm4}{2}$.
  - $x=1$ o $x=-3$.
- titulo: Aplicación con coeficiente a distinto de 1
  enunciado: Resuelve $2x^2-5x+2=0$ usando la fórmula general.
  solucion_pasos:
  - $a=2$, $b=-5$, $c=2$.
  - $x=\dfrac{5\pm\sqrt{25-16}}{4}=\dfrac{5\pm3}{4}$.
  - $x=2$ o $x=1/2$.
- titulo: ¿La fórmula general funciona para cualquier ecuación cuadrática?
  enunciado: ¿La fórmula general funciona para cualquier ecuación cuadrática?
  respuesta: Sí
  solucion_pasos:
  - Es válida siempre que $a\neq0$, sin importar los valores de $b$ y $c$.
- titulo: ¿Es necesario calcular el discriminante antes de aplicar la fórmula general?
  enunciado: ¿Es necesario calcular el discriminante antes de aplicar la fórmula general?
  respuesta: 'No'
  solucion_pasos:
  - El discriminante forma parte de la fórmula general; se calcula como paso intermedio dentro de ella,
    no como requisito previo separado.
errores_frecuentes:
- Olvidar el signo $\pm$, obteniendo solo una de las dos soluciones.
- Cometer errores de signo al sustituir un coeficiente negativo, especialmente en $-b$.
- Dividir solo el término con la raíz por $2a$, en vez de dividir toda la expresión $-b\pm\sqrt{\Delta}$.
- No simplificar la fracción final cuando es posible.
