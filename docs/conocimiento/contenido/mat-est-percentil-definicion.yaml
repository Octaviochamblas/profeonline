semantic_id: MAT.EST.PERCENTILES.DEFINICION
titulo: Definir el percentil como medida de posición relativa
objetivo: Definir el percentil k como el valor que deja el k por ciento de los datos por debajo de él,
  en un conjunto ordenado.
introduccion: Los percentiles son medidas de posición que permiten ubicar un dato dentro de la distribución
  completa, más allá de solo conocer su valor.
resumen: El percentil $k$ (con $0<k<100$) es el valor que divide un conjunto de datos ordenados de forma
  que aproximadamente el $k\%$ de los datos son menores o iguales que él.
explicacion: '![Definición de percentil](/static/img/estadistica/percentil/percentil-definicion.svg)


  ### Definición formal


  $P_k$ es el valor tal que aproximadamente el $k\%$ de los datos ordenados son menores o iguales a él,
  y el $(100-k)\%$ restante son mayores.


  ### Desarrollo didáctico


  Si un estudiante obtiene un puntaje que corresponde al percentil 90 en una prueba estandarizada, significa
  que su puntaje es mayor o igual que el del 90% de los estudiantes que rindieron esa prueba.'
procedimiento:
- 'Paso 1: Identifica el valor de k del percentil que se busca (por ejemplo, P30, P75).'
- 'Paso 2: Ordena los datos de menor a mayor.'
- 'Paso 3: Ubica el valor que deja aproximadamente el k% de los datos por debajo de él.'
ejemplos:
- titulo: Interpretar el percentil 90 en una prueba
  enunciado: Un estudiante obtiene un puntaje en el percentil 90.
  solucion_pasos:
  - Su puntaje es mayor o igual que el del 90% de los estudiantes que rindieron la prueba.
- titulo: Interpretar el percentil 25 de estaturas
  enunciado: Un niño está en el percentil 25 de estatura para su edad.
  solucion_pasos:
  - Su estatura es mayor o igual que la del 25% de los niños de su edad, y menor que la del 75% restante.
- titulo: ¿El percentil 100 correspondería al valor máximo del conjunto?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que dejaría el 100% de los datos por debajo o igual a él (aproximadamente).
- titulo: ¿Un percentil alto (como P90) siempre indica un valor bajo dentro del conjunto?
  respuesta: 'No'
  solucion_pasos:
  - 'No, al contrario: un percentil alto indica que el valor supera a la mayoría de los datos del conjunto.'
errores_frecuentes:
- Confundir el percentil (una posición relativa) con el valor absoluto del dato mismo.
- Pensar que un percentil alto significa un valor 'malo' o bajo, cuando en realidad indica lo contrario.
- No ordenar los datos antes de intentar ubicar un percentil específico.
fuente: 'Elaboración propia (referencia: Moraleja 378).'
estado: publicado
