semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.LINEAL_DEFINICION
titulo: Estudio de la función lineal
objetivo: Reconocer la función lineal como aquella proporcional a la variable independiente, sin término
  constante.
introduccion: Cuando duplicar la entrada duplica exactamente la salida, y triplicarla la triplica, estás
  frente a una función lineal.
resumen: Una **función lineal** es aquella de la forma $f(x) = mx$, donde $m$ es una constante real distinta
  de cero llamada pendiente; su gráfica siempre pasa por el origen.
explicacion: '### Definición formal


  Una función $f: \mathbb{R} \to \mathbb{R}$ se llama lineal si existe $m \in \mathbb{R} - \{0\}$ tal
  que $f(x) = mx$ para todo $x$. Se cumple la propiedad de proporcionalidad: $f(x_1 + x_2) = f(x_1) +
  f(x_2)$ y $f(kx) = k f(x)$ para todo escalar $k$.


  ### Desarrollo didáctico


  La característica esencial es que no hay término independiente: cuando $x=0$, siempre se obtiene $f(0)=0$,
  sin excepción.


  Si $f(x) = 5x$: al duplicar la entrada de $2$ a $4$, la salida pasa de $10$ a $20$, también duplicándose.
  Esta proporcionalidad directa es la firma distintiva de las funciones lineales.'
procedimiento:
- 'Paso 1: Verifica que la fórmula tenga la forma $f(x) = mx$, sin término constante sumado.'
- 'Paso 2: Identifica el valor de $m$ (la pendiente).'
- 'Paso 3: Confirma que $f(0) = 0$, lo cual es característico de toda función lineal.'
ejemplos:
- titulo: Identificación de función lineal
  enunciado: Determina si $f(x) = -3x$ es una función lineal.
  solucion_pasos:
  - Tiene la forma $mx$ con $m=-3$, sin término independiente.
  - Es una función lineal.
- titulo: Verificación de proporcionalidad
  enunciado: Si $f(x) = 4x$, verifica que $f(2+3) = f(2)+f(3)$.
  solucion_pasos:
  - $f(5) = 20$; $f(2)+f(3) = 8+12 = 20$.
  - Ambos coinciden, confirmando la propiedad de proporcionalidad.
- titulo: ¿$f(x) = 2x + 1$ es una función lineal?
  enunciado: ¿$f(x) = 2x + 1$ es una función lineal?
  respuesta: 'No'
  solucion_pasos:
  - Tiene un término independiente ($+1$), por lo que no cumple $f(0)=0$; es afín, no lineal.
- titulo: ¿Toda función lineal cumple $f(0)=0$?
  enunciado: ¿Toda función lineal cumple $f(0)=0$?
  respuesta: Sí
  solucion_pasos:
  - Al evaluar $f(x)=mx$ en $x=0$, se obtiene $m \cdot 0 = 0$ siempre.
errores_frecuentes:
- Confundir "función lineal" con cualquier función cuya gráfica sea una recta, incluyendo las afines con
  intercepto distinto de cero.
- Olvidar verificar que no exista término constante al clasificar una función como lineal.
- Creer que $m$ puede ser cero en una función lineal (en ese caso sería la función constante $f(x)=0$).
- Asumir que toda proporcionalidad implica necesariamente valores positivos.
