semantic_id: MAT.GEO.NOTABLES_COINCIDENCIA.EQUILATERO_PUNTOS_NOTABLES
titulo: Coincidencia de ortocentro, incentro, circuncentro y baricentro en un triángulo equilátero
objetivo: Reconocer que en un triángulo equilátero, los cuatro puntos notables (ortocentro, incentro,
  circuncentro y baricentro) coinciden en un único punto.
introduccion: 'Como consecuencia directa de que las rectas notables coinciden en el triángulo equilátero,
  también coinciden los puntos donde esas rectas se cruzan: los cuatro puntos notables se reducen a uno
  solo.'
resumen: En un triángulo equilátero, el ortocentro, el incentro, el circuncentro y el baricentro son un
  mismo punto.
explicacion: '![Puntos notables coincidentes en triángulo equilátero](/static/img/geometria/elementos-secundarios/notables-coincidencia-equilatero-puntos-notables.svg)


  ### Definición formal


  En un triángulo equilátero, dado que las alturas, bisectrices, simetrales y transversales de gravedad
  coinciden respectivamente en los mismos tres segmentos, sus puntos de intersección (ortocentro, incentro,
  circuncentro y baricentro) coinciden en un único punto, llamado centro del triángulo equilátero.


  ### Desarrollo didáctico


  Este punto único cumple, a la vez, todas las propiedades de los cuatro puntos notables: es equidistante
  de los vértices (como el circuncentro) y de los lados (como el incentro), y divide cada transversal
  de gravedad en razón 2:1 (como el baricentro).'
procedimiento:
- 'Paso 1: Reconoce que el triángulo es equilátero.'
- 'Paso 2: Recuerda que sus rectas notables coinciden en los tres mismos segmentos.'
- 'Paso 3: Concluye que los cuatro puntos notables (H, I, O, G) son el mismo punto.'
ejemplos:
- titulo: Identificar el centro único
  enunciado: Un triángulo equilátero tiene sus cuatro puntos notables calculados por separado.
  solucion_pasos:
  - Los cuatro resultan ser exactamente el mismo punto.
- titulo: Verificar una propiedad compartida
  enunciado: ¿Este punto único es equidistante de los vértices y de los lados a la vez?
  solucion_pasos:
  - Sí, cumple ambas propiedades simultáneamente (la del circuncentro y la del incentro).
- titulo: ¿Los cuatro puntos notables coinciden solo en el equilátero?
  respuesta: Sí
  solucion_pasos:
  - Sí, esta coincidencia de los cuatro puntos a la vez es exclusiva del triángulo equilátero.
- titulo: ¿Este punto único divide las transversales de gravedad en razón 2:1?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque también actúa como baricentro.
errores_frecuentes:
- Creer que solo dos o tres de los cuatro puntos notables coinciden, no los cuatro.
- Aplicar esta coincidencia a triángulos isósceles no equiláteros, donde no se cumple.
- Olvidar que este punto único cumple TODAS las propiedades de los cuatro puntos a la vez.
fuente: Elaboración propia.
estado: publicado
