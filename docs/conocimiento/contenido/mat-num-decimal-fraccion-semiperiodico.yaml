semantic_id: MAT.NUM.DECIMAL_FRACCION.SEMIPERIODICO
titulo: Conversión de decimal semiperiódico a fracción
objetivo: Convertir un decimal semiperiódico a fracción separando el efecto del anteperíodo y del período.
introduccion: 'Cuando el decimal tiene un anteperíodo además del período, se necesita un paso adicional:
  multiplicar primero por una potencia de 10 que desplace la coma hasta el inicio del período, y luego
  aplicar el método de resta.'
resumen: Para convertir un decimal semiperiódico a fracción se multiplica \(x\) por dos potencias de 10
  distintas —una que ubique la coma al inicio del período y otra al final de un ciclo del período— y se
  restan ambas expresiones para cancelar la parte periódica.
explicacion: '### Definición formal


  Si \(x=0.a_1\ldots a_m\overline{c_1\ldots c_k}\), se calculan \(10^{m+k}x\) y \(10^m x\); ambas comparten
  la misma cola periódica, así que al restarlas \((10^{m+k}-10^m)x\) es un entero, y se despeja \(x\)
  como fracción.


  ### Desarrollo didáctico


  Si \(x=0.1\overline{6}\), se usan \(10x=1.\overline{6}\) y \(100x=16.\overline{6}\); al restar, \(100x-10x=15\),
  es decir \(90x=15\), por lo tanto \(x=\frac{15}{90}=\frac{1}{6}\).'
procedimiento:
- 'Paso 1: Llama \(x\) al decimal y cuenta cifras de anteperíodo y período.'
- 'Paso 2: Forma dos ecuaciones con potencias de diez que alineen la parte repetitiva y réstalas.'
- 'Paso 3: Despeja, simplifica y comprueba que la fracción reproduce anteperíodo y período.'
ejemplos:
- titulo: Aplicación razonada — Conversión de decimal semiperiódico a fracción
  enunciado: Si \(x=0.1\overline{6}\), se usan \(10x\) y \(100x\) para cancelar la repetición y hallar
    la fracción.
  solucion_pasos:
  - Llama \(x\) al decimal y cuenta cifras de anteperíodo y período.
  - Forma dos ecuaciones con potencias de diez que alineen la parte repetitiva y réstalas.
  - Despeja, simplifica y comprueba que la fracción reproduce anteperíodo y período.
- titulo: Revisión de una solución — Conversión de decimal semiperiódico a fracción
  enunciado: Una solución aplica “Forma dos ecuaciones con potencias de diez que alineen la parte repetitiva
    y réstalas.”, pero termina sin comprobar que en un semiperiódico hay que considerar por separado anteperíodo
    y período. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define conversión de decimal semiperiódico a fracción: un decimal semiperiódico
    se convierte a fracción aislando el anteperíodo y el período con potencias de 10 adecuadas.'
  - Llama \(x\) al decimal y cuenta cifras de anteperíodo y período.
  - 'Completa la revisión con este control: Despeja, simplifica y comprueba que la fracción reproduce
    anteperíodo y período.'
- titulo: ¿Se cumple que en un semiperiódico hay que considerar por separado anteperíodo y período? —
    Conversión de decimal semiperiódico a fracción
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que un decimal semiperiódico se convierte a fracción aislando
    el anteperíodo y el período con potencias de 10 adecuadas.
  - El caso “Si \(x=0.1\overline{6}\), se usan \(10x\) y \(100x\) para cancelar la repetición y hallar
    la fracción” satisface esa condición.
  - Despeja, simplifica y comprueba que la fracción reproduce anteperíodo y período.
- titulo: ¿Es válido omitir el paso “Llama \(x\) al decimal y cuenta cifras de anteperíodo y período”?
    — Conversión de decimal semiperiódico a fracción
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de conversión de decimal semiperiódico a fracción.
  - 'Omitirlo puede volver inválida la acción siguiente: Forma dos ecuaciones con potencias de diez que
    alineen la parte repetitiva y réstalas.'
  - 'La solución debe terminar de este modo: Despeja, simplifica y comprueba que la fracción reproduce
    anteperíodo y período.'
errores_frecuentes:
- 'Empezar conversión de decimal semiperiódico a fracción sin realizar este control inicial: Llama \(x\)
  al decimal y cuenta cifras de anteperíodo y período.'
- Memorizar “Si \(x=0.1\overline{6}\), se usan \(10x\) y \(100x\) para cancelar la repetición y hallar
  la fracción” como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Forma dos ecuaciones con potencias de diez que alineen la parte repetitiva
  y réstalas.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre conversión de decimal semiperiódico a fracción que contradice el
  criterio “En un semiperiódico hay que considerar por separado anteperíodo y período”.
- 'Cerrar el ejercicio sin esta comprobación específica: Despeja, simplifica y comprueba que la fracción
  reproduce anteperíodo y período.'
