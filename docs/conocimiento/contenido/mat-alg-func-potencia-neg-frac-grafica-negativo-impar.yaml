semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.GRAFICA_NEGATIVO_IMPAR
titulo: Gráfica de $f(x)=x^{-n}$ con $n$ impar
objetivo: Describir la forma de la gráfica de $f(x)=a\cdot x^{-n}$ cuando $n$ es un entero positivo impar
  (tipo hipérbola).
introduccion: Cuando el exponente negativo es impar, la función forma dos ramas ubicadas en cuadrantes opuestos,
  como la clásica hipérbola $y=1/x$.
resumen: Cuando $n$ es impar, la gráfica de $f(x)=a\cdot x^{-n}$ (con $a>0$) tiene **dos ramas en cuadrantes
  opuestos**, una en el primer cuadrante y otra en el tercero, típica de una hipérbola.
explicacion: '### Definición formal


  Para $n$ impar y $a>0$, $f(x)=a\cdot x^{-n}$ conserva el signo de $x$: positivo para $x>0$ y negativo para
  $x<0$, ya que $x^{-n}=1/x^n$ y $x^n$ conserva el signo de $x$ cuando $n$ es impar. La curva forma dos ramas en
  los cuadrantes I y III.


  ### Desarrollo didáctico


  $f(x)=x^{-1}=1/x$: para $x=2$, $f(2)=0{,}5$ (cuadrante I); para $x=-2$, $f(-2)=-0{,}5$ (cuadrante III). Las
  ramas nunca se tocan y se acercan a ambas asíntotas sin cruzarlas.'
procedimiento:
- 'Paso 1: Verifica que $n$ sea impar y determina el signo de $a$.'
- 'Paso 2: Reconoce que la curva tendrá dos ramas en cuadrantes opuestos.'
- 'Paso 3: Calcula puntos en ambos lados para confirmar el signo de cada rama.'
ejemplos:
- titulo: Descripción de la gráfica de $x^{-1}$
  enunciado: 'Describe la forma de $f(x)=x^{-1}$.'
  solucion_pasos:
  - El exponente $-1$ tiene parte impar ($n=1$), así que la curva tiene dos ramas en cuadrantes opuestos.
  - Una rama en el cuadrante I (para $x>0$) y otra en el cuadrante III (para $x<0$).
- titulo: Verificación de antisimetría con exponente negativo impar
  enunciado: 'Verifica que $f(2)=-f(-2)$ para $f(x)=x^{-3}$.'
  solucion_pasos:
  - 'Se calcula $f(2)=1/8$ y $f(-2)=-1/8$.'
  - Se cumple $f(2)=-f(-2)$, confirmando la simetría respecto al origen.
- titulo: ¿$f(x)=x^{-3}$ toma valores en el cuadrante II?
  enunciado: ¿La gráfica de $f(x)=x^{-3}$ puede tener puntos en el cuadrante II (con $x<0$ e $y>0$)?
  respuesta: 'No'
  solucion_pasos:
  - Con exponente negativo impar y $a>0$, la función conserva el signo de $x$, así que para $x<0$ se obtiene $y<0$.
- titulo: ¿La gráfica de $f(x)=x^{-1}$ pasa por el origen?
  enunciado: ¿La gráfica de $f(x)=x^{-1}$ pasa por el punto $(0,0)$?
  respuesta: 'No'
  solucion_pasos:
  - $x=0$ no pertenece al dominio, así que la curva nunca toca el origen.
errores_frecuentes:
- Confundir el comportamiento de exponente negativo impar con el de exponente negativo par.
- Suponer que ambas ramas quedan en cuadrantes adyacentes en vez de opuestos.
- Olvidar que la curva nunca cruza ninguna de sus dos asíntotas.
- No verificar el signo de $a$ antes de ubicar las ramas en los cuadrantes correctos.
