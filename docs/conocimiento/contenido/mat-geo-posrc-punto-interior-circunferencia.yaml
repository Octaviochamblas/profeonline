semantic_id: MAT.GEO.POSICIONES_RECTAS_CIRCUNFERENCIAS.PUNTO_INTERIOR_CIRCUNFERENCIA
titulo: Determinación de un punto interior a una circunferencia mediante distancia al centro
objetivo: Determinar si un punto es interior a una circunferencia, comparando su distancia al centro con
  el radio de la circunferencia.
introduccion: Un punto está dentro de una circunferencia si está más cerca del centro que la longitud
  del radio; esta comparación se puede hacer sin necesidad de graficar, solo con la fórmula de distancia.
resumen: Un punto $(x_0,y_0)$ es interior a una circunferencia de centro $(h,k)$ y radio $r$ si $\sqrt{(x_0-h)^2+(y_0-k)^2}<r$.
explicacion: '![Punto interior a una circunferencia](/static/img/geometria/analitica/posrc-punto-interior-circunferencia.svg)


  ### Definición formal


  Un punto es interior a la circunferencia si su distancia al centro es estrictamente menor que el radio:
  $d(P,\text{centro})<r$.


  ### Desarrollo didáctico


  Para la circunferencia $x^2+y^2=16$ (centro (0,0), radio 4) y el punto $P(1,1)$: $d=\sqrt{1+1}=\sqrt2\approx1{,}41<4$,
  por lo que $P$ es interior a la circunferencia.'
procedimiento:
- 'Paso 1: Identifica el centro y el radio de la circunferencia.'
- 'Paso 2: Calcula la distancia entre el punto dado y el centro de la circunferencia.'
- 'Paso 3: Si esa distancia es menor que el radio, el punto es interior a la circunferencia.'
ejemplos:
- titulo: Verificar que P(1,1) es interior a x²+y²=16
  enunciado: Centro (0,0), radio 4, P(1,1).
  solucion_pasos:
  - d=√2≈1,41<4, por lo que P es interior.
- titulo: Verificar que un punto es interior a una circunferencia con centro distinto del origen
  enunciado: (x-2)²+(y-1)²=25, punto (3,2).
  solucion_pasos:
  - d=√((3-2)²+(2-1)²)=√2≈1,41<5, por lo que el punto es interior.
- titulo: ¿Un punto interior siempre tiene distancia al centro menor que el radio?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente la condición que lo define como interior.
- titulo: ¿El centro de la circunferencia es siempre un punto interior a ella misma?
  respuesta: Sí
  solucion_pasos:
  - Sí, la distancia del centro a sí mismo es 0, que es menor que cualquier radio positivo.
errores_frecuentes:
- Comparar la distancia con el diámetro en vez de con el radio.
- Confundir la desigualdad estricta (menor que) con la de igualdad (que correspondería a un punto sobre
  la circunferencia).
- Calcular mal la distancia al centro, olvidando ajustar por las coordenadas del centro si no es el origen.
fuente: Elaboración propia.
estado: publicado
