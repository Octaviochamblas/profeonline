semantic_id: MAT.NUM.LOGARITMOS_CONCEPTO.LOGARITMO_DECIMAL
objetivo: Interpretar y calcular logaritmos de base diez.
introduccion: Las escalas de pH, decibeles y magnitud aprovechan una base alineada
  con nuestro sistema decimal. La base diez suele omitirse por convenio.
resumen: \(\log x\) suele denotar \(\log_{10}x\). El logaritmo decimal mide órdenes
  de magnitud en potencias de diez.
explicacion: |-
  \(\log x\) suele denotar \(\log_{10}x\).

  El cálculo “\(\log 10000=4\) porque \(10^4=10000\)” muestra por qué el logaritmo decimal mide órdenes de magnitud en potencias de diez
procedimiento:
- 'Paso 1: Reconoce la ausencia de base escrita como base \(10\) según el contexto.'
- 'Paso 2: Expresa el argumento como potencia de diez cuando sea posible.'
- 'Paso 3: Lee el exponente y verifica elevando \(10\) a ese valor.'
ejemplos:
- titulo: Aplicación razonada — Concepto de logaritmo decimal
  enunciado: \(\log 10000=4\) porque \(10^4=10000\).
  solucion_pasos:
  - Reconoce la ausencia de base escrita como base \(10\) según el contexto.
  - Expresa el argumento como potencia de diez cuando sea posible.
  - Lee el exponente y verifica elevando \(10\) a ese valor.
- titulo: Revisión de una solución — Concepto de logaritmo decimal
  enunciado: Una solución aplica “Expresa el argumento como potencia de diez cuando
    sea posible.”, pero termina sin comprobar que el logaritmo decimal mide órdenes
    de magnitud en potencias de diez. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define concepto de logaritmo decimal: \(\log x\) suele
    denotar \(\log_{10}x\).'
  - Reconoce la ausencia de base escrita como base \(10\) según el contexto.
  - 'Completa la revisión con este control: Lee el exponente y verifica elevando \(10\)
    a ese valor.'
- titulo: ¿Se cumple que el logaritmo decimal mide órdenes de magnitud en potencias
    de diez? — Concepto de logaritmo decimal
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\log x\) suele denotar \(\log_{10}x\).
  - El caso “\(\log 10000=4\) porque \(10^4=10000\)” satisface esa condición.
  - Lee el exponente y verifica elevando \(10\) a ese valor.
- titulo: ¿Es válido omitir el paso “Reconoce la ausencia de base escrita como base
    \(10\) según el contexto”? — Concepto de logaritmo decimal
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de concepto de logaritmo decimal.
  - 'Omitirlo puede volver inválida la acción siguiente: Expresa el argumento como
    potencia de diez cuando sea posible.'
  - 'La solución debe terminar de este modo: Lee el exponente y verifica elevando
    \(10\) a ese valor.'
errores_frecuentes:
- 'Confundir concepto de logaritmo decimal con otro concepto y omitir este inicio:
  Reconoce la ausencia de base escrita como base \(10\) según el contexto.'
- Aplicar mecánicamente “Expresa el argumento como potencia de diez cuando sea posible.”
  sin revisar las condiciones de la definición.
- Tomar “\(\log 10000=4\) porque \(10^4=10000\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el logaritmo decimal mide órdenes
  de magnitud en potencias de diez”.
- 'Terminar el desarrollo sin realizar este control: Lee el exponente y verifica elevando
  \(10\) a ese valor.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
