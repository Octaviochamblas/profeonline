semantic_id: MAT.GEO.ANGULOS_RELACIONES_POSICION.OPUESTOS_VERTICE_DEFINICION
titulo: Identificación de ángulos opuestos por el vértice
objetivo: Identificar un par de ángulos opuestos por el vértice y comprobar que los ángulos opuestos por
  el vértice no comparten lado, pero sí el mismo vértice.
introduccion: Cuando dos rectas se cruzan aparecen cuatro regiones. Las que se miran 'de frente' a través
  del cruce forman un par especial. Aquí lo trabajaremos con ejemplos concretos y verificaciones cortas.
resumen: Los ángulos opuestos por el vértice aparecen cuando dos rectas se cruzan y el par considerado
  queda enfrentado. Como idea de control, los ángulos opuestos por el vértice no comparten lado, pero
  sí el mismo vértice.
explicacion: 'Los ángulos opuestos por el vértice aparecen cuando dos rectas se cruzan y el par considerado
  queda enfrentado.


  En el caso “al cruzarse dos rectas, el ángulo de arriba y el de abajo forman un par opuesto por el vértice”
  esta idea se vuelve visible y permite comprobar que los ángulos opuestos por el vértice no comparten
  lado, pero sí el mismo vértice.'
procedimiento:
- 'Paso 1: Ubica el punto donde se cortan las dos rectas.'
- 'Paso 2: Mira qué regiones quedan enfrentadas a través del vértice y no comparten lado.'
- 'Paso 3: Concluye si el par elegido es opuesto por el vértice y no adyacente.'
ejemplos:
- titulo: Aplicación directa — Opuestos por el vértice
  enunciado: Al cruzarse dos rectas, el ángulo de arriba y el de abajo forman un par opuesto por el vértice.
  solucion_pasos:
  - Ubica el punto donde se cortan las dos rectas.
  - Mira qué regiones quedan enfrentadas a través del vértice y no comparten lado.
  - Concluye si el par elegido es opuesto por el vértice y no adyacente.
- titulo: Revisión del razonamiento — Opuestos por el vértice
  enunciado: 'Revisa una solución del caso “al cruzarse dos rectas, el ángulo de arriba y el de abajo
    forman un par opuesto por el vértice”: el resultado parece razonable, pero falta conectar el dibujo
    con la definición. Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: los ángulos opuestos por el vértice aparecen cuando dos rectas se cruzan
    y el par considerado queda enfrentado.'
  - Mira qué regiones quedan enfrentadas a través del vértice y no comparten lado.
  - Concluye si el par elegido es opuesto por el vértice y no adyacente.
- titulo: ¿La interpretación del dibujo es válida? — Opuestos por el vértice
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: los ángulos opuestos por el vértice aparecen
    cuando dos rectas se cruzan y el par considerado queda enfrentado.'
  - En el caso “al cruzarse dos rectas, el ángulo de arriba y el de abajo forman un par opuesto por el
    vértice” se observa que los ángulos opuestos por el vértice no comparten lado, pero sí el mismo vértice.
  - Concluye si el par elegido es opuesto por el vértice y no adyacente.
- titulo: ¿Se puede cerrar sin el control final? — Opuestos por el vértice
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de identificación de ángulos opuestos por
    el vértice.
  - Después del paso “Ubica el punto donde se cortan las dos rectas.” todavía hace falta revisar “Mira
    qué regiones quedan enfrentadas a través del vértice y no comparten lado.”.
  - El cierre correcto exige “Concluye si el par elegido es opuesto por el vértice y no adyacente.”.
errores_frecuentes:
- Opuestos por el vértice significa estar a lados distintos del dibujo aunque compartan un rayo.
- Para resolver opuestos por el vértice, basta con el paso “Ubica el punto donde se cortan las dos rectas.”
  y no hace falta revisar “Mira qué regiones quedan enfrentadas a través del vértice y no comparten lado.”.
- Si el dibujo parece claro, se puede ignorar que los ángulos opuestos por el vértice no comparten lado,
  pero sí el mismo vértice.
- Dos configuraciones distintas representan opuestos por el vértice solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Concluye si el par elegido es opuesto por
  el vértice y no adyacente.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
