semantic_id: MAT.ALG.FUNCION_RECTAS_BASE.IDENTIDAD
titulo: Estudio de la función identidad
objetivo: Reconocer la función identidad como aquella que asigna a cada valor su propia imagen.
introduccion: La función más simple de todas ni siquiera transforma la entrada; simplemente la devuelve intacta.
resumen: La **función identidad** es $f(x) = x$, el caso particular de función lineal con pendiente $m=1$, que
  asigna a cada elemento del dominio su propio valor como imagen.
explicacion: '### Definición formal


  La función identidad en $\mathbb{R}$ se define como $\text{id}(x) = x$ para todo $x \in \mathbb{R}$. Es el caso
  particular de función lineal $f(x)=mx$ con $m=1$, y satisface $\text{id}(a) = a$ para todo $a$ de su dominio.


  ### Desarrollo didáctico


  Su gráfica es la recta que biseca el primer y tercer cuadrante, formando un ángulo de $45°$ con el eje $x$,
  porque cada punto tiene coordenadas iguales: $(1,1)$, $(2,2)$, $(-3,-3)$, etc.


  Un uso conceptual importante: componer cualquier función $f$ con la identidad no la cambia, $f(\text{id}(x))
  = f(x)$.'
procedimiento:
- 'Paso 1: Verifica que la fórmula tenga exactamente la forma $f(x) = x$.'
- 'Paso 2: Confirma que la pendiente sea $m=1$ y no exista término independiente.'
- 'Paso 3: Para graficar, marca puntos donde ambas coordenadas coinciden y traza la recta a $45°$.'
ejemplos:
- titulo: Evaluación de la función identidad
  enunciado: Si $f(x)=x$, calcula $f(7)$ y $f(-4)$.
  solucion_pasos:
  - Cada valor se devuelve sin cambios.
  - '$f(7)=7$ y $f(-4)=-4$.'
- titulo: Reconocimiento de la identidad entre funciones lineales
  enunciado: 'De las funciones $f(x)=x$, $g(x)=2x$, $h(x)=-x$, ¿cuál es la identidad?'
  solucion_pasos:
  - Solo $f(x)=x$ cumple la condición de pendiente igual a 1 sin transformación adicional.
  - '$f(x)=x$ es la función identidad.'
- titulo: ¿La gráfica de la función identidad pasa por el origen?
  enunciado: ¿La gráfica de la función identidad pasa por el origen?
  respuesta: Sí
  solucion_pasos:
  - Al ser un caso particular de función lineal, cumple $f(0)=0$.
- titulo: ¿La gráfica de la función identidad forma un ángulo de $45°$ con el eje $x$?
  enunciado: ¿La gráfica de la función identidad forma un ángulo de $45°$ con el eje $x$?
  respuesta: Sí
  solucion_pasos:
  - Al tener pendiente 1, la recta sube exactamente lo mismo que avanza, formando ese ángulo característico.
errores_frecuentes:
- Confundir la función identidad con la función constante, que no depende de $x$.
- Creer que cualquier función lineal es la identidad, sin verificar que $m=1$ específicamente.
- Suponer que la identidad solo aplica a números positivos.
- Confundir el concepto de función identidad con el de elemento neutro de la suma.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
