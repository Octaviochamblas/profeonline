semantic_id: MAT.EST.TABLAS_CONTINGENCIA.PROBABILIDAD_CONJUNTA
titulo: Cálculo de probabilidades conjuntas a partir de celdas interiores
objetivo: Calcular la probabilidad conjunta de dos categorías (una de cada variable), usando el valor
  de la celda interior correspondiente dividido por el total general.
introduccion: A diferencia de la probabilidad simple, la probabilidad conjunta considera ambas variables
  simultáneamente, usando directamente el valor de una celda interior de la tabla.
resumen: La probabilidad conjunta de dos categorías se calcula dividiendo el valor de la celda interior
  que las cruza por el total general de la tabla.
explicacion: '![Probabilidad conjunta](/static/img/probabilidad/tablas/tabla-probabilidad-conjunta.svg)


  ### Definición formal


  Si la celda que cruza la categoría $A$ (fila) con la categoría $B$ (columna) tiene valor $n_{AB}$, y
  el total general es $N$, la probabilidad conjunta es $P(A\cap B)=\dfrac{n_{AB}}{N}$.


  ### Desarrollo didáctico


  En la tabla de sexo y preferencia, la celda (Sí, Hombre) tiene valor 18. Con un total general de 60,
  la probabilidad conjunta es $P(\text{Sí y Hombre})=\dfrac{18}{60}=\dfrac{3}{10}$.'
procedimiento:
- 'Paso 1: Identifica la celda interior que cruza las dos categorías de interés.'
- 'Paso 2: Identifica el total general de la tabla.'
- 'Paso 3: Divide el valor de la celda por el total general para obtener la probabilidad conjunta.'
ejemplos:
- titulo: Calcular P(Sí y Hombre)
  enunciado: Celda (Sí,Hombre)=18, total general=60.
  solucion_pasos:
  - P(Sí y Hombre)=18/60=3/10.
- titulo: Calcular P(No y Mujer)
  enunciado: Celda (No,Mujer)=8, total general=60.
  solucion_pasos:
  - P(No y Mujer)=8/60=2/15.
- titulo: ¿La probabilidad conjunta usa una celda interior específica de la tabla?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de la probabilidad simple, que usa un total marginal.
- titulo: ¿La suma de todas las probabilidades conjuntas de la tabla debe dar 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que cubren todas las combinaciones posibles de ambas variables.
errores_frecuentes:
- Usar un total marginal en vez de la celda interior específica para calcular la probabilidad conjunta.
- Confundir cuál celda corresponde a la combinación de categorías buscada.
- Olvidar dividir por el total general, dejando el resultado como el conteo bruto de la celda.
fuente: 'Elaboración propia (referencia: Moraleja 185).'
estado: publicado
