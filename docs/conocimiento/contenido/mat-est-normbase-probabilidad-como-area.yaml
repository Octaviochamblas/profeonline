semantic_id: MAT.EST.NORMAL_BASE.PROBABILIDAD_COMO_AREA
titulo: Interpretar la probabilidad como área bajo la curva
objetivo: Interpretar la probabilidad de un intervalo en una variable continua como el área bajo la curva de densidad
  en ese tramo.
introduccion: En una distribución continua, en vez de sumar probabilidades punto por punto, se calcula el área de la
  región bajo la curva que corresponde al intervalo de interés.
resumen: La probabilidad de que una variable continua tome un valor dentro de un intervalo corresponde exactamente al
  área bajo la curva de densidad en ese tramo.
explicacion: '![Probabilidad como área bajo la curva](/static/img/estadistica/normbase/normbase-probabilidad-como-area.svg)


  ### Definición formal


  Para una variable aleatoria continua $X$ con función de densidad $f(x)$, la probabilidad $P(a\leq X\leq b)$

  corresponde al área bajo la curva de $f(x)$ entre $a$ y $b$.


  ### Desarrollo didáctico


  Esta interpretación geométrica permite usar herramientas visuales (como sombrear regiones bajo la curva normal) para

  entender y calcular probabilidades sin necesidad de cálculo integral formal en el aula escolar.'
procedimiento:
- 'Paso 1: Identifica el intervalo $[a, b]$ para el cual se busca la probabilidad.'
- 'Paso 2: Ubica ese intervalo bajo la curva de densidad de la variable.'
- 'Paso 3: Interpreta el área de esa región como la probabilidad buscada.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Si el área bajo la curva de densidad entre 60 y 70 es 0,25, ¿qué representa este valor?
  solucion_pasos:
  - Representa la probabilidad de que la variable tome un valor entre 60 y 70.
  - $P(60\leq X\leq 70)=0{,}25$.
- titulo: Ejemplo 2
  enunciado: ¿Cómo se interpreta gráficamente la probabilidad de un intervalo en una distribución continua?
  solucion_pasos:
  - Se interpreta como la región sombreada bajo la curva entre los dos extremos del intervalo.
- titulo: ¿La probabilidad de un intervalo corresponde al área bajo la curva de densidad?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la interpretación geométrica central de la probabilidad continua.
- titulo: ¿La probabilidad de un intervalo se calcula sumando alturas puntuales de la curva?
  respuesta: 'No'
  solucion_pasos:
  - 'No, se calcula considerando el área de la región, no alturas individuales.'
errores_frecuentes:
- Confundir la altura de la curva con la probabilidad de un intervalo.
- Sumar valores puntuales de la función de densidad en vez de considerar el área.
- Olvidar que el área bajo toda la curva debe sumar exactamente 1.
- Pensar que solo se puede calcular probabilidad para intervalos muy pequeños.
- Confundir el área bajo la curva con el largo del intervalo en el eje horizontal.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
