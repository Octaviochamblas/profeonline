semantic_id: MAT.GEO.TRIG_IDENTIDADES_AMP.SUMA_ANGULOS_COSENO
titulo: Identidad del coseno de una suma de ángulos
objetivo: Aplicar la identidad del coseno de una suma de dos ángulos, que expresa cos(α+β) en función
  de los senos y cosenos de α y β por separado.
introduccion: Al igual que el seno, el coseno de una suma de ángulos no es la suma de los cosenos; existe
  una fórmula específica, con un signo negativo entre los términos.
resumen: Para cualquier par de ángulos $\alpha$ y $\beta$, se cumple $\cos(\alpha+\beta)=\cos\alpha\cos\beta-\sin\alpha\sin\beta$.
explicacion: '![Coseno de una suma de ángulos](/static/img/geometria/trigonometria/trigid-suma-angulos-coseno.svg)


  ### Definición formal


  Para ángulos $\alpha$ y $\beta$ cualesquiera, $\cos(\alpha+\beta)=\cos\alpha\cos\beta-\sin\alpha\sin\beta$.


  ### Desarrollo didáctico


  En la figura, α=25° y β=45°, con suma α+β=70°. Se puede verificar que cos70°=cos25°cos45°-sin25°sin45°,
  notando el signo negativo entre los términos (a diferencia del seno de la suma, que usa signo positivo).'
procedimiento:
- 'Paso 1: Identifica los dos ángulos α y β que se están sumando.'
- 'Paso 2: Aplica la fórmula cos(α+β)=cosα·cosβ-sinα·sinβ, sustituyendo los valores conocidos.'
- 'Paso 3: Calcula el resultado, prestando especial atención al signo negativo entre los términos.'
ejemplos:
- titulo: Calcular cos(75°) descomponiéndolo como 45°+30°
  enunciado: cos45°=sin45°=√2/2, cos30°=√3/2, sin30°=0,5.
  solucion_pasos:
  - cos75°=cos45°cos30°-sin45°sin30°=(√2/2)(√3/2)-(√2/2)(0,5)=(√6-√2)/4≈0,259.
- titulo: Verificar que cos(α+β) no es cosα+cosβ
  enunciado: α=30°, β=30°.
  solucion_pasos:
  - cos(30°+30°)=cos60°=0,5, mientras que cos30°+cos30°=√3≈1,732, valores distintos, confirmando que no
    se puede sumar directamente.
- titulo: ¿Esta identidad usa un signo negativo entre sus términos?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia de la del seno, que usa signo positivo.
- titulo: ¿Se puede usar esta identidad para calcular el coseno de ángulos no notables descomponiéndolos
    en dos notables?
  respuesta: Sí
  solucion_pasos:
  - Sí, por ejemplo 75°=45°+30°, ambos ángulos notables.
errores_frecuentes:
- Usar signo positivo en vez de negativo entre los términos de la fórmula.
- Confundir esta identidad con la del seno de una suma.
- Sumar directamente los cosenos de cada ángulo, en vez de aplicar la fórmula correcta.
fuente: Elaboración propia.
estado: publicado
