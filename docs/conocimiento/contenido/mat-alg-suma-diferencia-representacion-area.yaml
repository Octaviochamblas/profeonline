errores_frecuentes:
- No entender que la figura en forma de 'L' (gnomon) y el rectángulo largo tienen exactamente la misma área, solo
  están reordenados.
- Para «En la representación geométrica de $a^2 - b^2$, la figura que queda tras restar el cuadrado $b^2$ tiene
  forma de 'L'. ¿Cómo se forma el rectángulo de $(a+b)(a-b)$ a partir de esta 'L'», la respuesta correcta es Se
  le suma un cuadrado de $b^2$.
- Para «En la representación geométrica de $a^2 - b^2$, la figura que queda tras restar el cuadrado $b^2$ tiene
  forma de 'L'. ¿Cómo se forma el rectángulo de $(a+b)(a-b)$ a partir de esta 'L'», la respuesta correcta es Se
  divide a la mitad.
- Es imposible formar un rectángulo perfecto con una L.
