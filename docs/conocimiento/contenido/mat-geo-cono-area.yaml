semantic_id: MAT.GEO.CUERPOS_REDONDOS_METRICA.CONO_AREA
titulo: Cálculo del área total del cono
objetivo: Calcular el área total de la superficie de un cono a partir del radio de su base y su generatriz.
introduccion: El área total de un cono se obtiene sumando el área de su base circular más el área lateral
  (un sector circular que se forma al 'desenrollar' la superficie curva).
resumen: El área total de un cono de radio $r$ y generatriz $g$ es $A_T = \pi r^2 + \pi r g$, es decir,
  el área de la base más el área lateral.
explicacion: '![Área total del cono](/static/img/geometria/espacio-cuerpos/cono-area.svg)


  ### Definición formal


  El área total de un cono es la suma del área de su base circular ($\pi r^2$) más el área lateral ($\pi
  r g$, donde $g$ es la generatriz): $A_T=\pi r^2+\pi rg$. La generatriz se calcula mediante el teorema
  de Pitágoras: $g=\sqrt{r^2+h^2}$.


  ### Desarrollo didáctico


  Si un cono tiene radio 3 cm y altura 4 cm, primero se calcula la generatriz: $g=\sqrt{3^2+4^2}=5$ cm.
  Luego, el área total es $A_T=\pi(3)^2+\pi(3)(5)=9\pi+15\pi=24\pi\approx75,36$ cm² (usando π≈3,14).'
procedimiento:
- 'Paso 1: Identifica el radio (r) y la altura (h) del cono, y calcula la generatriz g=√(r²+h²) si no
  se conoce directamente.'
- 'Paso 2: Calcula el área de la base circular: πr².'
- 'Paso 3: Calcula el área lateral (πrg) y súmala al resultado anterior para obtener el área total.'
ejemplos:
- titulo: Calcular el área total de un cono
  enunciado: Un cono tiene radio 3 cm y altura 4 cm (π≈3,14).
  solucion_pasos:
  - g=√(9+16)=5 cm; A_T=3,14×9+3,14×3×5=28,26+47,1=75,36 cm².
- titulo: Calcular el área lateral de un cono conociendo la generatriz
  enunciado: Un cono tiene radio 5 cm y generatriz 13 cm (π≈3,14).
  solucion_pasos:
  - Área lateral=3,14×5×13=204,1 cm² (sin incluir la base).
- titulo: ¿Se necesita la generatriz (no solo la altura) para calcular el área lateral?
  respuesta: Sí
  solucion_pasos:
  - Sí, el área lateral usa la generatriz g, no la altura h directamente.
- titulo: ¿El área total del cono incluye solo una base?
  respuesta: Sí
  solucion_pasos:
  - Sí, a diferencia del cilindro (con dos bases), el cono tiene una sola base circular.
errores_frecuentes:
- Usar la altura (h) en vez de la generatriz (g) al calcular el área lateral.
- Olvidar calcular primero la generatriz mediante Pitágoras si no se conoce directamente.
- Sumar dos veces el área de la base, como si el cono tuviera dos bases (como el cilindro).
fuente: 'Elaboración propia (referencias: Moraleja 98, Cid 181).'
estado: publicado
