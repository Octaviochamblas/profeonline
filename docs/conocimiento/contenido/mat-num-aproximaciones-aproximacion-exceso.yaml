semantic_id: MAT.NUM.APROXIMACIONES.APROXIMACION_EXCESO
titulo: Aproximación por exceso
objetivo: Aproximar un número decimal aumentando en una unidad la cifra del orden pedido, para obtener
  un valor mayor o igual al original.
introduccion: Aproximar por exceso significa quedarse con el valor inmediatamente mayor o igual al número
  original en el orden decimal indicado.
resumen: Aproximar un número por exceso a un cierto orden consiste en aumentar en una unidad la última
  cifra conservada de ese orden y eliminar las cifras siguientes.
explicacion: '### Definición formal


  Aproximar \(x\) por exceso al orden \(10^{-n}\) da el menor múltiplo de \(10^{-n}\) que es mayor o igual
  a \(x\); si \(x\) no es ya un múltiplo exacto, se suma \(10^{-n}\) a la aproximación por defecto.


  ### Desarrollo didáctico


  Aproximar por exceso \(5.72\) a la décima: la aproximación por defecto sería \(5.7\); como \(5.72\)
  no es múltiplo exacto de una décima, se suma una décima más, dando \(5.8\).'
procedimiento:
- 'Paso 1: Ubica el orden al que debes aproximar.'
- 'Paso 2: Si hay cifras posteriores no nulas, aumenta en una unidad la última cifra conservada.'
- 'Paso 3: Comprueba que el resultado sea mayor o igual que el número original.'
ejemplos:
- titulo: Aplicación razonada — Aproximación por exceso
  enunciado: Aproximar por exceso \(5.72\) a la décima da \(5.8\).
  solucion_pasos:
  - Ubica el orden al que debes aproximar.
  - Si hay cifras posteriores no nulas, aumenta en una unidad la última cifra conservada.
  - Comprueba que el resultado sea mayor o igual que el número original.
- titulo: Revisión de una solución — Aproximación por exceso
  enunciado: Una solución aplica “Si hay cifras posteriores no nulas, aumenta en una unidad la última
    cifra conservada.”, pero termina sin comprobar que la aproximación por exceso nunca queda por debajo
    del valor original. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define aproximación por exceso: una aproximación por exceso es un valor
    mayor o igual que el número original.'
  - Ubica el orden al que debes aproximar.
  - 'Completa la revisión con este control: Comprueba que el resultado sea mayor o igual que el número
    original.'
- titulo: ¿Se cumple que la aproximación por exceso nunca queda por debajo del valor original? — Aproximación
    por exceso
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una aproximación por exceso es un valor mayor o igual que
    el número original.
  - El caso “Aproximar por exceso \(5.72\) a la décima da \(5.8\)” satisface esa condición.
  - Comprueba que el resultado sea mayor o igual que el número original.
- titulo: ¿Es válido omitir el paso “Ubica el orden al que debes aproximar”? — Aproximación por exceso
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de aproximación por exceso.
  - 'Omitirlo puede volver inválida la acción siguiente: Si hay cifras posteriores no nulas, aumenta en
    una unidad la última cifra conservada.'
  - 'La solución debe terminar de este modo: Comprueba que el resultado sea mayor o igual que el número
    original.'
errores_frecuentes:
- 'Empezar aproximación por exceso sin realizar este control inicial: Ubica el orden al que debes aproximar.'
- Memorizar “Aproximar por exceso \(5.72\) a la décima da \(5.8\)” como respuesta aislada, sin reconstruir
  la definición que lo justifica.
- Convertir en receta el paso “Si hay cifras posteriores no nulas, aumenta en una unidad la última cifra
  conservada.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre aproximación por exceso que contradice el criterio “La aproximación
  por exceso nunca queda por debajo del valor original”.
- 'Cerrar el ejercicio sin esta comprobación específica: Comprueba que el resultado sea mayor o igual
  que el número original.'
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones y error.
