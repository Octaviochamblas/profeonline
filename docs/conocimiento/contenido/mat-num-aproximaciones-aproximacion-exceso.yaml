semantic_id: MAT.NUM.APROXIMACIONES.APROXIMACION_EXCESO
objetivo: Comprender aproximación por exceso y aplicarlo correctamente en ejercicios
  básicos con números racionales.
introduccion: |-
  Cuando trabajamos con fracciones, decimales o aproximaciones, no basta con calcular: también necesitamos entender qué representa cada número.

  El recurso aproximación por exceso ayuda a reconocer una idea clave para comparar, transformar u operar números racionales con seguridad.
resumen: Una aproximación por exceso es un valor mayor o igual que el número original.
  Además, la aproximación por exceso nunca queda por debajo del valor original.
explicacion: |-
  Una aproximación por exceso es un valor mayor o igual que el número original.

  Una idea importante es que la aproximación por exceso nunca queda por debajo del valor original.

  Por ejemplo, Aproximar por exceso \(5.72\) a la décima da \(5.8\).
procedimiento:
- 'Paso 1: Identificar el orden al que se quiere aproximar el número.'
- 'Paso 2: Mirar la cifra relevante y aplicar defecto, exceso, redondeo o truncamiento
  según corresponda.'
- 'Paso 3: Escribir la aproximación y comprobar si cumple la condición pedida.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Explica por qué la afirmación “Aproximar por exceso \(5.72\) a la décima
    da \(5.8\).” se relaciona con aproximación por exceso.
  solucion_pasos:
  - Identifica qué dato o representación aparece en el ejemplo.
  - 'Compáralo con la definición: una aproximación por exceso es un valor mayor o
    igual que el número original.'
  - Concluye que el ejemplo sí ilustra aproximación por exceso.
- titulo: Ejemplo 2
  enunciado: 'Justifica la idea clave: “La aproximación por exceso nunca queda por
    debajo del valor original.”.'
  solucion_pasos:
  - Parte desde la definición del concepto.
  - Relaciona la definición con la propiedad o interpretación mencionada.
  - Escribe una conclusión breve con lenguaje matemático claro.
- titulo: ¿La siguiente idea es coherente con aproximación por exceso?
  respuesta: Sí
  solucion_pasos:
  - Sí. La afirmación coincide con la definición o propiedad principal del recurso.
  - En este caso, la clave es recordar que la aproximación por exceso nunca queda
    por debajo del valor original.
  - Por eso la respuesta correcta es afirmativa.
- titulo: ¿Se puede usar aproximación por exceso ignorando la definición o las condiciones
    del problema?
  respuesta: 'No'
  solucion_pasos:
  - No. En matemáticas, el procedimiento correcto depende de la definición y de las
    condiciones del ejercicio.
  - Ignorar esas condiciones suele producir errores de interpretación o de cálculo.
  - Por eso primero se revisa qué representa el número y luego se opera.
errores_frecuentes:
- Se puede aplicar aproximación por exceso sin mirar qué representan numerador, denominador
  o cifra decimal.
- Toda fracción o decimal se interpreta de la misma manera, aunque el contexto cambie.
- Si una cuenta se ve razonable, no hace falta verificar definición, signo ni unidad.
- Cambiar la representación de un número siempre cambia también su valor.
- Las propiedades y reglas de los racionales funcionan aunque no se respeten sus condiciones
  de uso.
fuente: Texto escolar MINEDUC — Matemática 7°-8° Básico, decimales, aproximaciones
  y error.
estado: publicado
