semantic_id: MAT.NUM.RAICES_CONCEPTO.RAIZ_CUADRADA_PRINCIPAL
objetivo: Calcular y reconocer la raíz cuadrada principal.
introduccion: El número \(-5\) también tiene cuadrado 25, pero no es el valor del
  símbolo \(\sqrt{25}\). Distinguir raíz principal de soluciones de una ecuación evita
  duplicar respuestas.
resumen: \(\sqrt{a}\) denota la raíz cuadrada no negativa de \(a\ge0\). El símbolo
  radical representa un valor principal; el signo \(\pm\) aparece al resolver ecuaciones
  como \(x^2=25\).
explicacion: |-
  \(\sqrt{a}\) denota la raíz cuadrada no negativa de \(a\ge0\).

  El cálculo “\(\sqrt{25}=5\), no \(\pm5\)” muestra por qué el símbolo radical representa un valor principal; el signo \(\pm\) aparece al resolver ecuaciones como \(x^2=25\)
procedimiento:
- 'Paso 1: Comprueba que el radicando sea no negativo.'
- 'Paso 2: Busca el número no negativo cuyo cuadrado sea el radicando.'
- 'Paso 3: Diferencia el valor del radical de las dos soluciones posibles de una ecuación
  cuadrática.'
ejemplos:
- titulo: Aplicación razonada — Raíz cuadrada principal
  enunciado: \(\sqrt{25}=5\), no \(\pm5\).
  solucion_pasos:
  - Comprueba que el radicando sea no negativo.
  - Busca el número no negativo cuyo cuadrado sea el radicando.
  - Diferencia el valor del radical de las dos soluciones posibles de una ecuación
    cuadrática.
- titulo: Revisión de una solución — Raíz cuadrada principal
  enunciado: Una solución aplica “Busca el número no negativo cuyo cuadrado sea el
    radicando.”, pero termina sin comprobar que el símbolo radical representa un valor
    principal; el signo \(\pm\) aparece al resolver ecuaciones como \(x^2=25\). Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define raíz cuadrada principal: \(\sqrt{a}\) denota
    la raíz cuadrada no negativa de \(a\ge0\).'
  - Comprueba que el radicando sea no negativo.
  - 'Completa la revisión con este control: Diferencia el valor del radical de las
    dos soluciones posibles de una ecuación cuadrática.'
- titulo: ¿Se cumple que el símbolo radical representa un valor principal; el signo
    \(\pm\) aparece al resolver ecuaciones como \(x^2=25\)? — Raíz cuadrada principal
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que \(\sqrt{a}\) denota la raíz cuadrada
    no negativa de \(a\ge0\).
  - El caso “\(\sqrt{25}=5\), no \(\pm5\)” satisface esa condición.
  - Diferencia el valor del radical de las dos soluciones posibles de una ecuación
    cuadrática.
- titulo: ¿Es válido omitir el paso “Comprueba que el radicando sea no negativo”?
    — Raíz cuadrada principal
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de raíz cuadrada principal.
  - 'Omitirlo puede volver inválida la acción siguiente: Busca el número no negativo
    cuyo cuadrado sea el radicando.'
  - 'La solución debe terminar de este modo: Diferencia el valor del radical de las
    dos soluciones posibles de una ecuación cuadrática.'
errores_frecuentes:
- 'Confundir raíz cuadrada principal con otro concepto y omitir este inicio: Comprueba
  que el radicando sea no negativo.'
- Aplicar mecánicamente “Busca el número no negativo cuyo cuadrado sea el radicando.”
  sin revisar las condiciones de la definición.
- Tomar “\(\sqrt{25}=5\), no \(\pm5\)” como una igualdad aislada, sin explicar por
  qué es válida.
- Aceptar una respuesta que contradice la idea clave “el símbolo radical representa
  un valor principal; el signo \(\pm\) aparece al resolver ecuaciones como \(x^2=25\)”.
- 'Terminar el desarrollo sin realizar este control: Diferencia el valor del radical
  de las dos soluciones posibles de una ecuación cuadrática.'
