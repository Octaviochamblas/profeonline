semantic_id: MAT.GEO.TRIG_NOTABLES.RAZONES_30_GRADOS
titulo: Razones trigonométricas del ángulo de 30°
objetivo: Determinar las razones trigonométricas exactas del ángulo de 30°, a partir de un triángulo rectángulo
  30°-60°-90°.
introduccion: El ángulo de 30° aparece en un triángulo rectángulo especial cuyas medidas de lados (1,
  √3, 2) permiten calcular razones trigonométricas exactas.
resumen: 'En un triángulo rectángulo 30°-60°-90° con cateto opuesto a 30° igual a 1, cateto adyacente
  $\sqrt3$ e hipotenusa 2: $\sin30°=\dfrac{1}{2}$, $\cos30°=\dfrac{\sqrt3}{2}$ y $\tan30°=\dfrac{1}{\sqrt3}=\dfrac{\sqrt3}{3}$.'
explicacion: '![Razones trigonométricas de 30°](/static/img/geometria/trigonometria/razon-notable-30-grados.svg)


  ### Definición formal


  El triángulo 30°-60°-90° tiene lados en proporción $1:\sqrt3:2$ (cateto menor, cateto mayor, hipotenusa).
  Con el ángulo de 30° opuesto al cateto de longitud 1: $\sin30°=\frac{1}{2}$, $\cos30°=\frac{\sqrt3}{2}$,
  $\tan30°=\frac{1}{\sqrt3}=\frac{\sqrt3}{3}$.


  ### Desarrollo didáctico


  Este triángulo se obtiene al dividir un triángulo equilátero por la mitad mediante su altura, generando
  dos triángulos rectángulos congruentes con ángulos 30°, 60° y 90°.'
procedimiento:
- 'Paso 1: Recuerda que el triángulo 30°-60°-90° tiene lados en proporción 1:√3:2.'
- 'Paso 2: Identifica que el cateto de longitud 1 es el opuesto al ángulo de 30°, y el de longitud √3
  es el adyacente.'
- 'Paso 3: Aplica las definiciones de seno, coseno y tangente usando estas tres medidas (1, √3, 2).'
ejemplos:
- titulo: Calcular el seno de 30°
  enunciado: En el triángulo 30-60-90, cateto opuesto a 30°=1, hipotenusa=2.
  solucion_pasos:
  - sin30°=1/2=0,5.
- titulo: Calcular el coseno de 30°
  enunciado: En el mismo triángulo, cateto adyacente=√3, hipotenusa=2.
  solucion_pasos:
  - cos30°=√3/2≈0,866.
- titulo: ¿sin30° es exactamente 0,5?
  respuesta: Sí
  solucion_pasos:
  - Sí, es uno de los valores exactos más simples de memorizar en trigonometría.
- titulo: ¿El triángulo 30-60-90 se obtiene de un triángulo equilátero?
  respuesta: Sí
  solucion_pasos:
  - Sí, se obtiene dividiendo un triángulo equilátero a la mitad mediante su altura.
errores_frecuentes:
- Confundir cuál cateto corresponde al ángulo de 30° (el menor, no el mayor).
- Olvidar racionalizar 1/√3 a √3/3.
- Intercambiar los valores de seno y coseno de 30° con los de 60°.
fuente: 'Elaboración propia (referencias: Moraleja 177, Cid 156).'
estado: publicado
