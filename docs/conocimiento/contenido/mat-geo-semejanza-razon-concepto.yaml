semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.RAZON_SEMEJANZA_CONCEPTO
titulo: Concepto de razón de semejanza
objetivo: Comprender la razón de semejanza como el número que indica cuántas veces más grande (o pequeña)
  es una figura respecto a otra semejante.
introduccion: 'Cuando dos figuras son semejantes, existe un único número que resume la relación de tamaño
  entre ellas: la razón de semejanza.'
resumen: La razón de semejanza es el cociente constante entre las longitudes de lados correspondientes
  de dos figuras semejantes.
explicacion: '![Razón de semejanza](/static/img/geometria/congruencia-semejanza/semejanza-razon-concepto.svg)


  ### Definición formal


  Si dos figuras semejantes tienen lados correspondientes $l$ y $l''$, la razón de semejanza es $k=\frac{l''}{l}$
  (o su inverso, según cuál figura se tome como referencia).


  ### Desarrollo didáctico


  Si $k>1$, la segunda figura es una ampliación de la primera; si $0<k<1$, es una reducción; si $k=1$,
  las figuras son congruentes (mismo tamaño). El valor de $k$ resume toda la información de escala entre
  ambas figuras.'
procedimiento:
- 'Paso 1: Identifica un par de lados correspondientes entre las dos figuras semejantes.'
- 'Paso 2: Divide la longitud de un lado por la longitud de su correspondiente en la otra figura.'
- 'Paso 3: Ese cociente es la razón de semejanza entre ambas figuras.'
ejemplos:
- titulo: Calcular la razón de semejanza entre dos triángulos
  enunciado: Un triángulo tiene un lado de 4 cm; su semejante tiene el lado correspondiente de 10 cm.
  solucion_pasos:
  - k=10/4=2,5.
- titulo: Interpretar una razón menor que 1
  enunciado: La razón de semejanza entre dos figuras es 0,5.
  solucion_pasos:
  - La segunda figura es una reducción a la mitad del tamaño de la primera.
- titulo: ¿Una razón de semejanza igual a 1 implica congruencia?
  respuesta: Sí
  solucion_pasos:
  - Sí, si la razón es exactamente 1, ambas figuras tienen el mismo tamaño, es decir, son congruentes.
- titulo: ¿La razón de semejanza puede ser negativa?
  respuesta: 'No'
  solucion_pasos:
  - No, al ser un cociente entre longitudes (siempre positivas), la razón de semejanza es siempre positiva.
errores_frecuentes:
- Invertir la razón sin darse cuenta, calculando lado pequeño/lado grande cuando se buscaba lo contrario.
- Usar lados que no son realmente correspondientes para calcular la razón.
- Creer que una razón de semejanza distinta de 1 significa que las figuras no son semejantes (en realidad,
  cualquier razón positiva es válida).
fuente: 'Fuente: Cid 117.'
estado: publicado
