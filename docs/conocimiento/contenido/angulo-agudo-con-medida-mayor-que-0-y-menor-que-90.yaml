semantic_id: MAT.GEO.ANGULOS_CLASIFICACION.AGUDO
titulo: Ángulo agudo con medida mayor que 0° y menor que 90°
objetivo: Clasificar un ángulo a partir de su medida y comprobar que compararlo con 90° permite distinguirlo
  de uno recto u obtuso.
introduccion: Cuando una tijera apenas se abre, la abertura sigue siendo clara, pero todavía no alcanza
  un cuarto de vuelta. Este recurso se centra en ángulo agudo con medida mayor que 0° y menor que 90°
  y en cómo reconocerlo con un criterio geométrico claro.
resumen: Un ángulo agudo mide más de 0° y menos de 90°. Como idea de control, compararlo con 90° permite
  distinguirlo de uno recto u obtuso.
explicacion: 'Un ángulo agudo mide más de 0° y menos de 90°.


  La situación “una abertura de 35° cabe completamente antes de llegar a un ángulo recto” muestra cómo
  pasar del dibujo a una conclusión válida: primero se identifica la relación correcta y luego se verifica
  que compararlo con 90° permite distinguirlo de uno recto u obtuso.'
procedimiento:
- 'Paso 1: Lee o estima la abertura del ángulo en grados.'
- 'Paso 2: Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.'
- 'Paso 3: Asigna el nombre correcto y revisa que no contradiga el dibujo.'
ejemplos:
- titulo: Caso guiado — Ángulo agudo
  enunciado: Una abertura de 35° cabe completamente antes de llegar a un ángulo recto.
  solucion_pasos:
  - Lee o estima la abertura del ángulo en grados.
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: Chequeo del procedimiento — Ángulo agudo
  enunciado: Al resolver “una abertura de 35° cabe completamente antes de llegar a un ángulo recto”, una
    alumna salta desde el dibujo a la conclusión. Indica qué control geométrico faltó y cómo cerrar la
    solución.
  solucion_pasos:
  - 'Parte de la definición: un ángulo agudo mide más de 0° y menos de 90°.'
  - Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿El caso confirma que compararlo con 90° permite distinguirlo de uno recto u obtuso? — Ángulo
    agudo
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: un ángulo agudo mide más de 0° y menos de
    90°.'
  - En el caso “una abertura de 35° cabe completamente antes de llegar a un ángulo recto” se observa que
    compararlo con 90° permite distinguirlo de uno recto u obtuso.
  - Asigna el nombre correcto y revisa que no contradiga el dibujo.
- titulo: ¿Se puede omitir el paso intermedio? — Ángulo agudo
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de ángulo agudo con medida mayor que 0°
    y menor que 90°.
  - Después del paso “Lee o estima la abertura del ángulo en grados.” todavía hace falta revisar “Compara
    la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
  - El cierre correcto exige “Asigna el nombre correcto y revisa que no contradiga el dibujo.”.
errores_frecuentes:
- Ángulo agudo significa medir 90° o más.
- Para resolver ángulo agudo, basta con el paso “Lee o estima la abertura del ángulo en grados.” y no
  hace falta revisar “Compara la medida con los valores de referencia 0°, 90°, 180° y 360°.”.
- Si el dibujo parece claro, se puede ignorar que compararlo con 90° permite distinguirlo de uno recto
  u obtuso.
- Dos configuraciones distintas representan ángulo agudo solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Asigna el nombre correcto y revisa que no
  contradiga el dibujo.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
