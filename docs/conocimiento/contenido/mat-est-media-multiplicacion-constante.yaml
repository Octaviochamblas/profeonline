semantic_id: MAT.EST.MEDIA_PROMEDIO.MULTIPLICACION_CONSTANTE
titulo: Analizar el efecto de multiplicar o dividir todos los datos por una constante sobre la media
objetivo: Analizar cómo cambia la media de un conjunto de datos cuando todos los valores se multiplican
  o dividen por una misma constante.
introduccion: Este efecto es distinto al de sumar una constante, ya que aquí la media se escala proporcionalmente,
  no se desplaza en una cantidad fija.
resumen: Si todos los datos de un conjunto se multiplican (o dividen) por una constante $k$, la nueva
  media es igual a la media original multiplicada (o dividida) por esa misma constante $k$.
explicacion: '![Efecto de multiplicar por una constante](/static/img/estadistica/promedio/media-multiplicacion-constante.svg)


  ### Definición formal


  Si $y_i=k\times x_i$ para todo $i$, entonces $\bar{y}=k\times\bar{x}$.


  ### Desarrollo didáctico


  Si la media de los precios de un producto en pesos es 1000, y se convierten todos los precios a dólares
  dividiendo por 900 (tipo de cambio aproximado), la nueva media será $1000/900\approx1{,}11$ dólares.'
procedimiento:
- 'Paso 1: Identifica la media original del conjunto de datos.'
- 'Paso 2: Identifica la constante k por la que se multiplican (o dividen) todos los datos por igual.'
- 'Paso 3: Multiplica (o divide) esa constante k directamente por la media original para obtener la nueva
  media.'
ejemplos:
- titulo: Calcular la nueva media al convertir precios de moneda
  enunciado: Media en pesos=1000. Se divide por 900 para convertir a dólares.
  solucion_pasos:
  - Nueva media=1000/900≈1,11 dólares.
- titulo: Calcular la nueva media al duplicar todos los datos
  enunciado: Media original=8. Se multiplican todos los datos por 2.
  solucion_pasos:
  - Nueva media=8×2=16.
- titulo: ¿Multiplicar todos los datos por una constante escala la media por esa misma constante?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la propiedad descrita en este recurso.
- titulo: ¿El efecto de multiplicar por una constante es igual al de sumarla?
  respuesta: 'No'
  solucion_pasos:
  - No, multiplicar escala proporcionalmente la media, mientras que sumar la desplaza en una cantidad
    fija.
errores_frecuentes:
- Confundir el efecto de multiplicar (escala proporcional) con el de sumar una constante (desplazamiento
  fijo).
- Multiplicar solo la media sin verificar que la constante se aplica exactamente a todos los datos por
  igual.
- Cometer errores aritméticos al multiplicar o dividir la media por la constante correspondiente.
fuente: 'Elaboración propia (referencia: Moraleja 160).'
estado: publicado
