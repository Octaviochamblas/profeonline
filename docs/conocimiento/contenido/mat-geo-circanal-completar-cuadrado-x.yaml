semantic_id: MAT.GEO.CIRCUNFERENCIA_ANALITICA.COMPLETAR_CUADRADO_X
titulo: Completación de cuadrados en la variable x para transformar la ecuación general
objetivo: Completar el cuadrado de los términos en x de la ecuación general de una circunferencia, como
  paso para obtener su forma canónica.
introduccion: Los términos x²+Dx no forman por sí solos un cuadrado perfecto; se necesita sumar una constante
  específica para completarlo, y luego restar esa misma cantidad para no alterar la ecuación.
resumen: Para completar el cuadrado en $x^2+Dx$, se suma y resta $\left(\dfrac{D}{2}\right)^2$, obteniendo
  $\left(x+\dfrac{D}{2}\right)^2-\left(\dfrac{D}{2}\right)^2$.
explicacion: '![Completación de cuadrado en x](/static/img/geometria/analitica/circanal-completar-cuadrado-x.svg)


  ### Definición formal


  Dado $x^2+Dx$, se agrega el término $\left(\dfrac{D}{2}\right)^2$ para completar el cuadrado perfecto:
  $x^2+Dx+\left(\dfrac{D}{2}\right)^2=\left(x+\dfrac{D}{2}\right)^2$.


  ### Desarrollo didáctico


  Para $x^2-6x$: la mitad de -6 es -3, y su cuadrado es 9. Entonces $x^2-6x+9=(x-3)^2$, y para no alterar
  la ecuación original, se debe restar ese mismo 9 en algún otro lugar de la ecuación.'
procedimiento:
- 'Paso 1: Identifica el coeficiente D que acompaña a x en el término x²+Dx.'
- 'Paso 2: Calcula (D/2)² y súmalo para completar el cuadrado.'
- 'Paso 3: Resta esa misma cantidad (D/2)² en otro lugar de la ecuación, para mantener la igualdad.'
ejemplos:
- titulo: Completar el cuadrado en x²-6x
  enunciado: x²-6x.
  solucion_pasos:
  - (-6/2)²=9; x²-6x+9=(x-3)², restando 9 en algún otro lugar de la ecuación completa.
- titulo: Completar el cuadrado en x²+8x
  enunciado: x²+8x.
  solucion_pasos:
  - (8/2)²=16; x²+8x+16=(x+4)², restando 16 en algún otro lugar de la ecuación completa.
- titulo: ¿Se debe restar la misma cantidad que se sumó para no alterar la ecuación?
  respuesta: Sí
  solucion_pasos:
  - Sí, sumar y restar la misma cantidad mantiene la igualdad original.
- titulo: ¿El valor que se suma es siempre el cuadrado de la mitad del coeficiente de x?
  respuesta: Sí
  solucion_pasos:
  - Sí, es exactamente (D/2)², donde D es el coeficiente de x.
errores_frecuentes:
- Olvidar restar la cantidad sumada al completar el cuadrado, alterando el valor de la ecuación.
- Calcular mal la mitad del coeficiente D antes de elevarla al cuadrado.
- Confundir el coeficiente D con el valor final del cuadrado completado.
fuente: Elaboración propia.
estado: publicado
