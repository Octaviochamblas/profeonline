semantic_id: MAT.NUM.FRACCIONES_EQUIVALENCIA.FRACCION_IRREDUCTIBLE
objetivo: Determinar si una fracción es irreductible.
introduccion: La afirmación “Toda fracción racional puede escribirse en forma irreductible”
  se puede comprobar en \(\frac{5}{8}\) es irreductible porque 5 y 8 no tienen divisores
  comunes mayores que 1. Este recurso desarrolla el razonamiento de identificación
  de fracción irreductible que conecta ambas ideas.
resumen: Una fracción irreductible es una fracción que ya no puede simplificarse porque
  su numerador y su denominador son coprimos. Como criterio de control, toda fracción
  racional puede escribirse en forma irreductible
explicacion: |-
  Una fracción irreductible es una fracción que ya no puede simplificarse porque su numerador y su denominador son coprimos.

  La relación entre la definición y el caso “\(\frac{5}{8}\) es irreductible porque 5 y 8 no tienen divisores comunes mayores que 1” conduce a una conclusión útil: Toda fracción racional puede escribirse en forma irreductible.
procedimiento:
- 'Paso 1: Calcula o identifica el máximo común divisor del numerador y el denominador.'
- 'Paso 2: Si el MCD es mayor que uno, divide ambos términos por él.'
- 'Paso 3: Confirma que el MCD final sea \(1\) y que ya no exista simplificación entera.'
ejemplos:
- titulo: Aplicación razonada — Identificación de fracción irreductible
  enunciado: \(\frac{5}{8}\) es irreductible porque 5 y 8 no tienen divisores comunes
    mayores que 1.
  solucion_pasos:
  - Calcula o identifica el máximo común divisor del numerador y el denominador.
  - Si el MCD es mayor que uno, divide ambos términos por él.
  - Confirma que el MCD final sea \(1\) y que ya no exista simplificación entera.
- titulo: Revisión de una solución — Identificación de fracción irreductible
  enunciado: Una solución aplica “Si el MCD es mayor que uno, divide ambos términos
    por él.”, pero termina sin comprobar que toda fracción racional puede escribirse
    en forma irreductible. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define identificación de fracción irreductible: una
    fracción irreductible es una fracción que ya no puede simplificarse porque su
    numerador y su denominador son coprimos.'
  - Calcula o identifica el máximo común divisor del numerador y el denominador.
  - 'Completa la revisión con este control: Confirma que el MCD final sea \(1\) y
    que ya no exista simplificación entera.'
- titulo: ¿Se cumple que toda fracción racional puede escribirse en forma irreductible?
    — Identificación de fracción irreductible
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que una fracción irreductible es una fracción
    que ya no puede simplificarse porque su numerador y su denominador son coprimos.
  - El caso “\(\frac{5}{8}\) es irreductible porque 5 y 8 no tienen divisores comunes
    mayores que 1” satisface esa condición.
  - Confirma que el MCD final sea \(1\) y que ya no exista simplificación entera.
- titulo: ¿Es válido omitir el paso “Calcula o identifica el máximo común divisor
    del numerador y el denominador”? — Identificación de fracción irreductible
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de identificación de fracción irreductible.
  - 'Omitirlo puede volver inválida la acción siguiente: Si el MCD es mayor que uno,
    divide ambos términos por él.'
  - 'La solución debe terminar de este modo: Confirma que el MCD final sea \(1\) y
    que ya no exista simplificación entera.'
errores_frecuentes:
- 'Empezar identificación de fracción irreductible sin realizar este control inicial:
  Calcula o identifica el máximo común divisor del numerador y el denominador.'
- Memorizar “\(\frac{5}{8}\) es irreductible porque 5 y 8 no tienen divisores comunes
  mayores que 1” como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Si el MCD es mayor que uno, divide ambos términos por
  él.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre identificación de fracción irreductible que
  contradice el criterio “Toda fracción racional puede escribirse en forma irreductible”.
- 'Cerrar el ejercicio sin esta comprobación específica: Confirma que el MCD final
  sea \(1\) y que ya no exista simplificación entera.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
