semantic_id: MAT.ALG.EXPRESIONES.IDENTIFICACION_MONOMIO
objetivo: Identificar y clasificar expresiones algebraicas compuestas por un solo término (Monomios).
introduccion: En el lenguaje cotidiano, 'mono' significa uno (monociclo, monolito, monopolio). En álgebra ocurre
  exactamente lo mismo.
resumen: Un **Monomio** es una expresión algebraica que consta de **un solo término**. En un monomio, no existen
  signos de suma ($+$) o resta ($-$) que separen bloques; todas sus letras y números están fusionados mediante multiplicación
  o división.
explicacion: '### Definición formal


  Mono significa uno. Un monomio es un bloque de un solo término (sin + ni - como separadores).


  ### Desarrollo didáctico


  Para saber si estás frente a un monomio, busca los signos + y -.

  - $5x$: Es un monomio (no hay sumas ni restas sueltas).

  - $-3a^2b$: Es un monomio. Espera. ¿No hay un signo menos ahí? Sí, pero ese signo le pertenece al coeficiente
  numérico ($-3$), no está *separando* a la $a$ de la $b$. Es un solo bloque sólido.

  - $\frac{x^2y}{4z}$: Es un monomio (el bloque es gigante, pero está todo pegado por divisiones y multiplicaciones).

  - $a + b$: ALERTA. Hay un signo + libre en el medio. Son dos vagones separados. Esto NO es un monomio.'
procedimiento:
- 'Paso 1: Revisa la expresión completa de izquierda a derecha.'
- 'Paso 2: Si detectas un ''+'' o ''-'' en medio de variables, actuando como puente o enganche, descártalo: no es
  monomio.'
- 'Paso 3: Si toda la expresión es un bloque sólido ininterrumpido (aunque tenga signo negativo al inicio), es un
  monomio.'
ejemplos:
- titulo: El bloque solitario
  enunciado: Clasifica la expresión -7x^4y^5.
  solucion_pasos:
  - Analizamos la expresión en busca de sumas o restas intermedias.
  - No hay puentes '+' ni '-' entre la x y la y.
  - Toda la estructura es sólida. Por tanto, es un Monomio.
- titulo: En una tarea de programación, se solicita crear una variable de código que reciba y procese
  enunciado: 'En una tarea de programación, se solicita crear una variable de código que reciba y procese exclusivamente
    ''monomios''. El estudiante prueba su código con los siguientes inputs de texto. ¿Cuál de ellos será validado
    exitosamente por el programa? (v1)


    Opciones: A) ''-45x^2y^3'' · B) ''x^2 - y^2'' · C) ''3x + 1'' · D) ''a - b'''
  solucion_pasos:
  - El programa solo acepta 1 término. La opción A es la única que no posee operadores separadores (+ o -) entre
    sus letras.
  - 'Respuesta: ''-45x^2y^3'''
- titulo: 'Respecto de «Identificación de monomio»: ¿Se ajusta a la definición esta afirmación? «Un **M'
  enunciado: 'Respecto de «Identificación de monomio»: ¿Se ajusta a la definición esta afirmación? «Un **Monomio**
    es una expresión algebraica que consta de **un solo término**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un **Monomio** es una expresión algebraica que consta de **un
    solo término**.'
- titulo: 'Respecto de «Identificación de monomio»: ¿Es compatible con el procedimiento esta afirmación'
  enunciado: 'Respecto de «Identificación de monomio»: ¿Es compatible con el procedimiento esta afirmación? «Descartar
    a los términos negativos (ej. $-4x$) creyendo que el signo menos rompe la regla de ''no tener restas''. El menos
    inicial es de identidad, no de separación operativa»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un **Monomio** es una expresión algebraica que consta de **un
    solo término**.'
errores_frecuentes:
- Descartar a los términos negativos (ej. $-4x$) creyendo que el signo menos rompe la regla de 'no tener restas'.
  El menos inicial es de identidad, no de separación operativa.
- Creer que $\frac{x}{y}$ son dos términos (numerador y denominador). Las divisiones fusionan, no separan.
- Tiene como máximo una sola letra (variable).
- Su coeficiente numérico es exactamente igual a uno.
- Solo posee operaciones de adición en su estructura.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Identificación de monomio
