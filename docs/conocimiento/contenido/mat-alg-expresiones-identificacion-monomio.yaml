semantic_id: MAT.ALG.EXPRESIONES.IDENTIFICACION_MONOMIO
objetivo: Identificar y clasificar expresiones algebraicas compuestas por un solo
  término (Monomios).
introduccion: En el lenguaje cotidiano, 'mono' significa uno (monociclo, monolito,
  monopolio). En álgebra ocurre exactamente lo mismo.
resumen: Un **Monomio** es una expresión algebraica que consta de **un solo término**.
  En un monomio, no existen signos de suma ($+$) o resta ($-$) que separen bloques;
  todas sus letras y números están fusionados mediante multiplicación o división.
explicacion: 'Para saber si estás frente a un monomio, busca los signos + y -.

  - $5x$: Es un monomio (no hay sumas ni restas sueltas).

  - $-3a^2b$: Es un monomio. ¡Espera! ¿No hay un signo menos ahí? Sí, pero ese signo
  le pertenece al coeficiente numérico ($-3$), no está *separando* a la $a$ de la
  $b$. Es un solo bloque sólido.

  - $\frac{x^2y}{4z}$: Es un monomio (el bloque es gigante, pero está todo pegado
  por divisiones y multiplicaciones).

  - $a + b$: ¡ALERTA! Hay un signo + libre en el medio. Son dos vagones separados.
  Esto NO es un monomio.'
procedimiento:
- 'Paso 1: Revisa la expresión completa de izquierda a derecha.'
- 'Paso 2: Si detectas un ''+'' o ''-'' en medio de variables, actuando como puente
  o enganche, descártalo: no es monomio.'
- 'Paso 3: Si toda la expresión es un bloque sólido ininterrumpido (aunque tenga signo
  negativo al inicio), es un monomio.'
ejemplos:
- titulo: El bloque solitario
  enunciado: Clasifica la expresión -7x^4y^5.
  solucion_pasos:
  - Analizamos la expresión en busca de sumas o restas intermedias.
  - No hay puentes '+' ni '-' entre la x y la y.
  - Toda la estructura es sólida. Por tanto, es un Monomio.
errores_frecuentes:
- Descartar a los términos negativos (ej. $-4x$) creyendo que el signo menos rompe
  la regla de 'no tener restas'. El menos inicial es de identidad, no de separación
  operativa.
- Creer que $\frac{x}{y}$ son dos términos (numerador y denominador). Las divisiones
  fusionan, no separan.
fuente: Álgebra de Baldor.
estado: publicado
