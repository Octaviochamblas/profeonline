semantic_id: MAT.NUM.PROP_COMPUESTA.RELACION_DIRECTA
titulo: Identificación de una relación directa en contexto compuesto
objetivo: Identificar una relación directa dentro de un contexto de proporcionalidad compuesta.
introduccion: Cuando tienes 3 magnitudes o más, el truco es congelar todas menos dos. Si analizas esas
  dos y ambas crecen, tienes una relación directa en medio de la compuesta.
resumen: Al aislar la variable incógnita y compararla con otra (manteniendo el resto constante), si una
  aumenta y la otra también, la fracción asociada a esa variable se usa tal cual en la ecuación multiplicativa.
explicacion: 'En el análisis de un problema compuesto, tomamos la magnitud de la incógnita ($X$) y la
  comparamos con la magnitud $A$.


  Si decimos: ''A mayor cantidad de $A$, ¿se necesitará más o menos $X$?'' y la respuesta es ''MÁS'' (crecen
  juntas), entonces la relación entre $X$ y $A$ es **directa**.


  En la resolución por el método de igualación de fracciones, la columna de la variable $A$ se escribe
  exactamente en el mismo orden (arriba/abajo) en que aparecen los datos.'
procedimiento:
- 'Paso 1: Fija mentalmente las demás variables (imagina que no cambian).'
- 'Paso 2: Hazte la pregunta: ''A más de esto, ¿más o menos de la incógnita?''.'
- 'Paso 3: Si la respuesta es ''más'', anota una ''D'' (directa) sobre esa columna de datos.'
ejemplos:
- titulo: Pintores, casas y pintura
  enunciado: La incógnita es 'Galones de pintura'. Las otras variables son Pintores y Casas. ¿Cómo es
    la relación Pintura-Casas?
  solucion_pasos:
  - Congelamos los Pintores (asumimos que son los mismos).
  - 'Pregunta: A más Casas, ¿necesitamos más o menos Galones de pintura?'
  - 'Respuesta: Más. Por tanto, la relación Pintura-Casas es Directa.'
errores_frecuentes:
- Preguntar 'A más de A, ¿más de B?' usando dos variables que no son la incógnita.
- No congelar la tercera variable en el experimento mental, confundiendo la deducción.
fuente: Currículum Nacional MINEDUC.
estado: publicado
