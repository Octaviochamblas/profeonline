semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.ASINTOTA_TRANSFORMADA
titulo: Identificación de la asíntota horizontal en funciones exponenciales trasladadas
objetivo: Identificar la nueva asíntota horizontal de una función exponencial después de aplicar una traslación
  vertical.
introduccion: Cuando la curva exponencial se desplaza verticalmente, su "línea límite" (la asíntota) se desplaza
  exactamente en la misma medida, dejando de coincidir con el eje $x$.
resumen: La **asíntota horizontal** de $g(x)=a\cdot b^x+k$ es la recta $y=k$, desplazada exactamente $k$ unidades
  respecto a la asíntota original ($y=0$) de la función sin trasladar.
explicacion: '### Definición formal


  Dada $g(x)=a\cdot b^x+k$, como $a\cdot b^x$ se aproxima a $0$ (sin alcanzarlo) en una de las direcciones, $g(x)$
  se aproxima a $0+k=k$. Por lo tanto, la asíntota horizontal de $g$ es la recta $y=k$.


  ### Desarrollo didáctico


  Basta con identificar la constante sumada al final de la función para conocer directamente la nueva asíntota,
  sin necesidad de ningún cálculo adicional.


  Para $g(x)=5\cdot2^x-8$: la asíntota horizontal es $y=-8$, exactamente el valor de la constante sumada (en
  este caso, restada).'
procedimiento:
- 'Paso 1: Identifica la constante $k$ sumada (o restada) al final de la función exponencial.'
- 'Paso 2: La asíntota horizontal es la recta $y=k$.'
ejemplos:
- titulo: Identificación de asíntota con traslación positiva
  enunciado: 'Identifica la asíntota horizontal de $g(x)=3\cdot4^x+6$.'
  solucion_pasos:
  - '$k=6$.'
  - La asíntota horizontal es $y=6$.
- titulo: Identificación de asíntota con traslación negativa
  enunciado: 'Identifica la asíntota horizontal de $g(x)=2\cdot0{,}5^x-9$.'
  solucion_pasos:
  - '$k=-9$.'
  - La asíntota horizontal es $y=-9$.
- titulo: ¿La asíntota horizontal de una función trasladada verticalmente puede coincidir con el eje $x$?
  enunciado: ¿La asíntota horizontal de una función trasladada verticalmente puede coincidir con el eje $x$?
  respuesta: Sí
  solucion_pasos:
  - Ocurre únicamente cuando $k=0$, es decir, cuando no hay traslación vertical.
- titulo: ¿La asíntota horizontal depende del valor de $a$ o de $b$?
  enunciado: ¿La asíntota horizontal depende del valor de $a$ o de $b$?
  respuesta: 'No'
  solucion_pasos:
  - Depende únicamente de la constante $k$ sumada al final de la función.
errores_frecuentes:
- Confundir la asíntota horizontal trasladada con la asíntota original ($y=0$), sin considerar $k$.
- No relacionar directamente la asíntota con la constante $k$ de la función.
- Confundir la traslación de la asíntota horizontal con una traslación del intercepto con el eje $y$.
- Cometer errores de signo al identificar $k$ cuando la constante aparece restada.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
