semantic_id: MAT.GEO.CIRCULO_ANGULOS.ANGULO_SEMIINSCRITO_MITAD_ARCO
titulo: Relación entre ángulo semiinscrito y mitad del arco correspondiente
objetivo: Aplicar la relación entre la medida de un ángulo semiinscrito y la mitad de la medida del arco
  que subtiende.
introduccion: Al igual que el ángulo inscrito, el ángulo semiinscrito (entre tangente y cuerda) mide exactamente
  la mitad del arco que abarca.
resumen: 'La medida de un ángulo semiinscrito es igual a la mitad de la medida del arco que subtiende:
  $m(\angle(\text{tangente},TB)) = \frac{m(\text{arco }TB)}{2}$.'
explicacion: '![Ángulo semiinscrito igual a la mitad del arco](/static/img/geometria/circunferencia-circulo/circulo-angulo-semiinscrito-mitad-arco.svg)


  ### Definición formal


  Si el ángulo semiinscrito entre la tangente en $T$ y la cuerda $TB$ subtiende el arco $TB$, entonces
  su medida es $\frac{m(\text{arco }TB)}{2}$, exactamente igual que en el caso del ángulo inscrito.


  ### Desarrollo didáctico


  Si el arco $TB$ mide 120°, el ángulo semiinscrito formado entre la tangente y la cuerda $TB$ mide $\frac{120°}{2}=60°$.
  Esta relación completa el conjunto de propiedades angulares de la circunferencia junto al ángulo del
  centro y el ángulo inscrito.'
procedimiento:
- 'Paso 1: Identifica el ángulo semiinscrito y el arco que subtiende (el arco comprendido dentro de su
  abertura).'
- 'Paso 2: Si conoces el arco, divide su medida entre 2 para obtener el ángulo semiinscrito.'
- 'Paso 3: Si conoces el ángulo semiinscrito, multiplica su medida por 2 para obtener el arco.'
ejemplos:
- titulo: Calcular el ángulo semiinscrito a partir del arco
  enunciado: El arco TB mide 120°.
  solucion_pasos:
  - m(∠(tan,TB))=120°/2=60°.
- titulo: Calcular el arco a partir del ángulo semiinscrito
  enunciado: El ángulo semiinscrito mide 48°.
  solucion_pasos:
  - 'El arco TB mide el doble: 48°×2=96°.'
- titulo: ¿Esta relación es la misma que la del ángulo inscrito?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos ángulos (inscrito y semiinscrito) miden la mitad del arco que subtienden.
- titulo: ¿El ángulo semiinscrito puede medir más de 180°?
  respuesta: 'No'
  solucion_pasos:
  - No, dado que es la mitad de un arco (que mide como máximo 360°), el ángulo semiinscrito mide como
    máximo 180°.
errores_frecuentes:
- Confundir esta relación con la del ángulo del centro (igual al arco, no su mitad).
- Elegir el arco incorrecto (el que queda fuera de la abertura del ángulo, en vez del que queda dentro).
- Olvidar duplicar correctamente al calcular el arco a partir del ángulo.
fuente: 'Elaboración propia (referencias: Moraleja 74, Cid 95).'
estado: publicado
