semantic_id: MAT.GEO.SEMEJANZA_TRIANGULOS_POLIGONOS.CRITERIO_AA
titulo: 'Criterio de semejanza AA: dos ángulos correspondientes congruentes'
objetivo: Aplicar el criterio AA para determinar que dos triángulos son semejantes verificando solo dos
  pares de ángulos correspondientes iguales.
introduccion: Así como existen criterios abreviados de congruencia, existen criterios abreviados de semejanza,
  que requieren mucha menos información que verificar las seis condiciones completas. El primero y más
  simple es el criterio AA.
resumen: El criterio AA establece que dos triángulos son semejantes si tienen dos pares de ángulos correspondientes
  congruentes (iguales).
explicacion: '![Criterio de semejanza AA](/static/img/geometria/congruencia-semejanza/semejanza-criterio-aa.svg)


  ### Definición formal


  Si en $\triangle ABC$ y $\triangle A''B''C''$ se cumple $\angle A=\angle A''$ y $\angle B=\angle B''$,
  entonces $\triangle ABC\sim\triangle A''B''C''$.


  ### Desarrollo didáctico


  Basta con dos ángulos iguales, porque el tercer ángulo queda automáticamente determinado por la suma
  de 180°: si dos ángulos coinciden, el tercero también debe coincidir, garantizando que los tres ángulos
  sean iguales y, por lo tanto, los triángulos semejantes.'
procedimiento:
- 'Paso 1: Identifica dos ángulos de cada triángulo que quieras comparar.'
- 'Paso 2: Verifica que esos dos pares de ángulos correspondientes sean iguales.'
- 'Paso 3: Si ambos pares coinciden, concluye que los triángulos son semejantes por AA.'
ejemplos:
- titulo: Verificar semejanza con dos ángulos iguales
  enunciado: Dos triángulos tienen ángulos de 50° y 60° cada uno.
  solucion_pasos:
  - Son semejantes por el criterio AA.
- titulo: Deducir el tercer ángulo
  enunciado: Con dos ángulos de 50° y 60°, ¿cuánto mide el tercero?
  solucion_pasos:
  - 180-50-60=70°, y por lo tanto también coincide en ambos triángulos.
- titulo: ¿Es necesario verificar el tercer ángulo para aplicar AA?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con dos ángulos, ya que el tercero queda determinado automáticamente.
- titulo: ¿AA requiere conocer algún lado del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - No, es el único criterio de semejanza que no requiere ningún dato de longitud.
errores_frecuentes:
- Creer que se necesitan los tres ángulos, cuando basta con dos.
- Confundir este criterio de semejanza (AA) con el criterio de congruencia ALA (que sí requiere un lado).
- Comparar ángulos que no son realmente correspondientes entre los dos triángulos.
fuente: 'Fuente: Cid 118.'
estado: publicado
