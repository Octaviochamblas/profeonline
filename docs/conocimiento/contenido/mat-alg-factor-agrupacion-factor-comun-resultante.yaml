semantic_id: MAT.ALG.FACTOR_AGRUPACION.FACTOR_COMUN_RESULTANTE
titulo: Extracción del factor común polinomial resultante
objetivo: Concluir el método de agrupación extrayendo el bloque polinomial que se ha revelado como común en toda
  la expresión.
introduccion: Es el gran final del truco de relación algebraica. Lo que empezó como un polinomio desordenado, se
  agrupó, se limpió, y ahora nos muestra un patrón idéntico en ambos bandos. Ahora solo falta recoger el premio.
resumen: El paso final de la factorización por agrupación es identificar el factor polinomio (el paréntesis) que
  se repite y extraerlo como un factor común global, creando un producto de dos polinomios.
explicacion: '### Definición formal


  Toda factorización exitosa termina siendo una cadena de multiplicaciones.


  ### Desarrollo didáctico


  Nuestra expresión procesada en el paso anterior era: $x(a + b) + y(a + b)$.


  Si observas, esto no es más que una "Extracción de factor común polinomio", un concepto que vimos en el bloque
  de Factor Común. El bloque $(a+b)$ se comporta como si fuera una sola letra gigante que se repite en ambos lados.


  Procedemos a extraerlo escribiéndolo una sola vez: $(a + b)$.

  Luego, abrimos un segundo paréntesis donde introducimos todo lo que estaba multiplicando por fuera a esos bloques:
  la ''$x$'' y el ''$+y$''.


  El resultado definitivo y completamente factorizado es: $(a + b)(x + y)$.

  Hemos convertido una suma de 4 términos en una simple multiplicación de 2 binomios.'
procedimiento:
- 'Paso 1: Confirma visualmente que los paréntesis de tu expresión son matemáticamente idénticos.'
- 'Paso 2: Escribe ese paréntesis común una sola vez al inicio de tu respuesta.'
- 'Paso 3: Abre un nuevo par de paréntesis justo al lado (para indicar multiplicación).'
- 'Paso 4: Ingresa los factores externos (coeficientes o monomios) en este nuevo paréntesis, conservando sus signos.'
ejemplos:
- titulo: Completa la factorización para $3x(m-n) - 5y(m-n)$
  enunciado: Completa la factorización para $3x(m-n) - 5y(m-n)$.
  solucion_pasos:
  - El factor polinomio repetido es $(m-n)$.
  - Los factores exteriores son $3x$ y $-5y$.
  - 'Juntamos: $(m-n)(3x - 5y)$.'
- titulo: ¿Cuál es el final de $x^2(a+1) + (a+1)$?
  solucion_pasos:
  - El segundo $(a+1)$ tiene un 1 imaginario multiplicando afuera. Lo recolectamos como $+1$.
- titulo: 'Respecto de «Extracción del factor común resultante»: ¿Describe adecuadamente el concepto es'
  enunciado: 'Respecto de «Extracción del factor común resultante»: ¿Describe adecuadamente el concepto esta frase?
    «El paso final de la factorización por agrupación es identificar el factor polinomio (el paréntesis) que se
    repite y extraerlo como un factor común global, creando un producto de dos polinomios»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El paso final de la factorización por agrupación es identificar
    el factor polinomio (el paréntesis) que se repite y extraerlo como un factor común global, creando un producto
    de dos polinomios.'
- titulo: 'Respecto de «Extracción del factor común resultante»: ¿Se puede aceptar esta afirmación? «Su'
  enunciado: 'Respecto de «Extracción del factor común resultante»: ¿Se puede aceptar esta afirmación? «Sumar los
    factores internos del paréntesis. (Ej: pensar que el resultado es $(2a+2b)$ en lugar de sacarlo como factor)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El paso final de la factorización por agrupación es identificar
    el factor polinomio (el paréntesis) que se repite y extraerlo como un factor común global, creando un producto
    de dos polinomios.'
errores_frecuentes:
- 'Sumar los factores internos del paréntesis. (Ej: pensar que el resultado es $(2a+2b)$ en lugar de sacarlo como
  factor).'
- Olvidar colocar el '1' cuando un paréntesis no tiene un número afuera visible.
- 'Dejar un signo ''+'' entre los dos paréntesis finales, arruinando la factorización (Ej: $(a+b) + (x+y)$).'
- Para «¿Cuál es la forma final de un polinomio factorizado por agrupación», la respuesta correcta es Un polinomio
  muy largo.
- Una suma de dos paréntesis.
estado: publicado
