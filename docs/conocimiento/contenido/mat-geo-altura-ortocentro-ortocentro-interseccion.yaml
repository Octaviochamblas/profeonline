semantic_id: MAT.GEO.ALTURA_ORTOCENTRO.ORTOCENTRO_INTERSECCION
titulo: Definición de ortocentro como punto de intersección de las alturas
objetivo: Reconocer el ortocentro como el punto único donde concurren las tres alturas de un triángulo.
introduccion: 'Aunque un triángulo tiene tres alturas distintas, las tres siempre se cruzan en un mismo
  punto: el ortocentro.'
resumen: El ortocentro es el punto donde se intersecan las tres alturas de un triángulo.
explicacion: '![Ortocentro, intersección de las alturas](/static/img/geometria/elementos-secundarios/altura-ortocentro-ortocentro-interseccion.svg)


  ### Definición formal


  Dado un triángulo ABC, el ortocentro H es el punto común a las tres rectas que contienen las alturas
  desde A, B y C.


  ### Desarrollo didáctico


  Al trazar las tres alturas de un triángulo, se observa que, sin importar la forma del triángulo, siempre
  se cruzan en un único punto H, el ortocentro.'
procedimiento:
- 'Paso 1: Traza (o identifica) las tres alturas del triángulo.'
- 'Paso 2: Encuentra el punto donde las tres se cruzan.'
- 'Paso 3: Ese punto es el ortocentro.'
ejemplos:
- titulo: Identificar el ortocentro
  enunciado: Las tres alturas de un triángulo se cruzan en un punto H.
  solucion_pasos:
  - H es el ortocentro del triángulo.
- titulo: Basta con dos alturas
  enunciado: ¿Es necesario trazar las tres alturas para encontrar el ortocentro?
  solucion_pasos:
  - 'No, basta con trazar dos: su intersección ya es el ortocentro, la tercera pasa por el mismo punto.'
- titulo: ¿Las tres alturas siempre concurren en un mismo punto?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una propiedad general de todo triángulo.
- titulo: ¿El ortocentro puede estar fuera del triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, en triángulos obtusángulos el ortocentro cae fuera de la figura.
errores_frecuentes:
- Creer que se necesitan las tres alturas para ubicar el ortocentro (basta con dos).
- Confundir el ortocentro con el centroide (baricentro) o el circuncentro.
- Asumir que el ortocentro siempre está dentro del triángulo.
fuente: Elaboración propia.
estado: publicado
