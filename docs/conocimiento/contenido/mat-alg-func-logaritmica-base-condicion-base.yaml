semantic_id: MAT.ALG.FUNC_LOGARITMICA_BASE.CONDICION_BASE
titulo: Condición de base positiva y distinta de uno en la función logarítmica
objetivo: Comprender por qué la base de una función logarítmica debe ser positiva y distinta de uno.
introduccion: Estas condiciones sobre la base son heredadas directamente de la función exponencial, ya que la
  logarítmica es su inversa y no puede tener más sentido del que tiene la función que invierte.
resumen: En $f(x)=\log_b(x)$, la base debe cumplir $b>0$ y $b\neq1$, exactamente las mismas condiciones exigidas
  a la base de la función exponencial correspondiente.
explicacion: '### Definición formal


  Como $f(x)=\log_b(x)$ es la inversa de $g(x)=b^x$, las condiciones sobre $b$ deben ser idénticas: $b>0$ (para
  que $g$ esté definida en todo $\mathbb{R}$) y $b\neq1$ (para que $g$ no sea constante, lo cual impediría que
  tuviera una inversa).


  ### Desarrollo didáctico


  Si $b=1$, la función exponencial $g(x)=1^x=1$ sería constante, y una función constante no es inyectiva, por
  lo que no tendría inversa; de ahí que $\log_1(x)$ no esté definido.


  Para $\log_b(x)$ con $b=-2$: no existe una función exponencial válida con base $-2$, por lo que tampoco existe
  su inversa logarítmica.'
procedimiento:
- 'Paso 1: Verifica que la base propuesta sea un número positivo.'
- 'Paso 2: Verifica que la base sea distinta de 1.'
- 'Paso 3: Si ambas condiciones se cumplen, la base es válida para una función logarítmica.'
ejemplos:
- titulo: Verificación de base válida
  enunciado: '¿Es válida la base de $f(x)=\log_9(x)$?'
  solucion_pasos:
  - '$b=9$ es positivo y distinto de 1.'
  - Sí, es una base válida.
- titulo: Verificación de base inválida
  enunciado: '¿Es válida la base de $f(x)=\log_1(x)$?'
  solucion_pasos:
  - '$b=1$ no cumple la condición $b\neq1$.'
  - No es una base válida.
- titulo: ¿Las condiciones sobre la base de la función logarítmica son las mismas que las de la exponencial?
  enunciado: ¿Las condiciones sobre la base de la función logarítmica son las mismas que las de la exponencial?
  respuesta: Sí
  solucion_pasos:
  - Como son funciones inversas entre sí, ambas exigen exactamente las mismas condiciones sobre la base.
- titulo: ¿Puede la base de un logaritmo ser un número negativo?
  enunciado: ¿Puede la base de un logaritmo ser un número negativo?
  respuesta: 'No'
  solucion_pasos:
  - No existe una función exponencial válida con base negativa que pudiera tener esa función logarítmica como
    inversa.
errores_frecuentes:
- Aceptar como válida una base negativa o igual a cero para un logaritmo.
- Aceptar $b=1$ como base válida sin reconocer que impediría la existencia de la función inversa.
- Confundir la condición sobre la base con la restricción sobre el argumento (que debe ser positivo).
- No relacionar la condición sobre $b$ con la de la función exponencial correspondiente.
