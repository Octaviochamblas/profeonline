semantic_id: MAT.NUM.INTERES_COMPUESTO.CONCEPTO
objetivo: Comprender el concepto de interés compuesto como un proceso exponencial
  donde los intereses generan nuevos intereses.
introduccion: Albert Einstein supuestamente dijo que el interés compuesto es la octava
  maravilla del mundo. 'Aquel que lo entiende, lo gana; aquel que no, lo paga'. Es
  el motor secreto de la riqueza (y de las deudas impagables).
resumen: En el interés compuesto, la base de cálculo cambia en cada período (se capitaliza).
  Los intereses ganados se suman al capital, y en el siguiente mes calcularás el porcentaje
  sobre este monto mayor. Es un crecimiento exponencial (curva).
explicacion: 'A diferencia del interés simple donde siempre calculas sobre el capital
  original, el **Interés Compuesto** funciona bajo la regla de la **Capitalización**.


  - **Periodo 1:** Inviertes $\$100$ al $10\%$. Ganas $\$10$. Tienes $\$110$.

  - **Periodo 2:** Ahora el $10\%$ se calcula sobre los $\$110$. Ganas $\$11$. Tienes
  $\$121$.

  - **Periodo 3:** El $10\%$ se calcula sobre $\$121$. Ganas $\$12.1$. Tienes $\$133.1$.


  Como ves, la cantidad de interés generada es cada vez mayor. Esto crea un efecto
  ''bola de nieve''. En el corto plazo la diferencia con el simple es pequeña, pero
  a largo plazo (20-30 años, como en los fondos de jubilación o créditos hipotecarios),
  la curva del interés compuesto despega exponencialmente hacia el cielo.'
procedimiento:
- 'Paso 1: Entiende que el Capital va cambiando y creciendo periodo a periodo.'
- 'Paso 2: Reconoce la palabra clave ''Capitalizable'' (significa que el interés se
  suma al pozo para el próximo cálculo).'
- 'Paso 3: Visualiza un gráfico de curva exponencial ascendente.'
ejemplos:
- titulo: Bola de nieve financiera
  enunciado: Si tienes una deuda de tarjeta de crédito y no pagas nada, ¿por qué la
    deuda crece tan rápido?
  solucion_pasos:
  - El banco cobra intereses sobre la deuda inicial.
  - Al mes siguiente, te cobran intereses sobre la deuda inicial MÁS los intereses
    impagos del mes pasado.
  - Es la magia negra del interés compuesto trabajando en tu contra.
errores_frecuentes:
- Creer que si la tasa es 10% anual capitalizable, en 2 años ganarás el 20% (falso,
  ganarás 21% debido al interés sobre el interés del primer año).
- Usar la fórmula lineal del interés simple cuando el problema indica 'capitalización'.
fuente: Currículum Nacional MINEDUC.
estado: publicado
