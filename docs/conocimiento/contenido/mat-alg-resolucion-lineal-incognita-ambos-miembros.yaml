semantic_id: MAT.ALG.RESOLUCION_LINEAL.INCOGNITA_AMBOS_MIEMBROS
titulo: Incógnitas en Ambos Miembros
objetivo: Agrupar todas las incógnitas en un lado de la ecuación y los números en el otro.
introduccion: A veces, las manzanas están repartidas en ambos platillos de la balanza. Para saber cuánto pesa una,
  primero debemos juntarlas todas en un solo platillo.
resumen: Cuando una ecuación tiene la incógnita (la misma letra) en el primer y en el segundo miembro, se deben
  transponer los términos para que todas las letras queden de un lado (usualmente a la izquierda) y los números
  del otro (a la derecha).
explicacion: '### Definición formal


  Cuando la incógnita aparece en ambos miembros, se suma o resta el mismo término algebraico en los dos lados hasta
  reunir todos los términos con incógnita en un solo miembro.


  ### Desarrollo didáctico


  Observa: $5x - 4 = 2x + 11$


  Hay ''x'' a la izquierda y a la derecha. ¿Qué hacemos? Organizar.

  1. Decidimos un lado para las ''x''. Generalmente se elige el izquierdo.

  2. Traemos el $2x$ del lado derecho hacia el izquierdo. Como el $2x$ es positivo, se resta $2x$ en ambos miembros.

  3. Llevamos el $-4$ del lado izquierdo hacia el derecho de los números. Cruzará sumando ($+4$).


  Nuestra ecuación se convierte en:

  $5x - 2x = 11 + 4$


  Ahora, el problema es súper fácil. Reducimos:

  $3x = 15$

  $x = \frac{15}{3} = 5$.


  *Tip pro:* Siempre conviene pasar la incógnita menor hacia el lado donde está la incógnita mayor. Así evitas trabajar
  con números negativos, y menos signos negativos significan menos probabilidad de error.'
procedimiento:
- 'Paso 1: Identifica los términos que tienen letra en ambos miembros.'
- 'Paso 2: Transpón el término con letra de menor coeficiente hacia el otro miembro (cambiando su signo).'
- 'Paso 3: Transpón los términos independientes (números) hacia el miembro opuesto.'
- 'Paso 4: Reduce términos semejantes en ambos miembros.'
- 'Paso 5: Despeja dividiendo.'
- El 2x es positivo y está sumando en su miembro. Al transponerlo al miembro izquierdo, debe cruzar restando.
ejemplos:
- titulo: 'Resuelve: $8x + 2 = 5x + 14$'
  enunciado: 'Resuelve: $8x + 2 = 5x + 14$'
  solucion_pasos:
  - El 5x es menor, lo movemos a la izquierda restando.
  - $8x - 5x + 2 = 14$
  - El +2 lo movemos a la derecha restando.
  - $8x - 5x = 14 - 2$
  - 'Reducimos: $3x = 12$'
  - 'Dividimos: $x = 4$.'
- titulo: Resuelve $x - 7 = 3x - 19$
  solucion_pasos:
  - 'Movemos la x: -7 = 2x - 19'
  - 'Movemos -19: 12 = 2x'
  - x = 6
- titulo: 'Respecto de «Resolución de ecuaciones con incógnita en ambos miembros»: ¿Describe adecuadame'
  enunciado: 'Respecto de «Resolución de ecuaciones con incógnita en ambos miembros»: ¿Describe adecuadamente el
    concepto esta frase? «Cuando una ecuación tiene la incógnita (la misma letra) en el primer y en el segundo miembro,
    se deben transponer los términos para que todas las letras queden de un lado (usualmente a la izquierda) y los
    números del otro (a la derecha)»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Cuando una ecuación tiene la incógnita (la misma letra) en
    el primer y en el segundo miembro, se deben transponer los términos para que todas las letras queden de un lado
    (usualmente a la izquierda) y los números del otro (a la derecha).'
- titulo: 'Respecto de «Resolución de ecuaciones con incógnita en ambos miembros»: ¿Se puede aceptar es'
  enunciado: 'Respecto de «Resolución de ecuaciones con incógnita en ambos miembros»: ¿Se puede aceptar esta afirmación?
    «Sumar las ''x'' de ambos lados como si estuvieran en el mismo miembro (ej. en $3x = 2x + 5$, sumar $3x+2x =
    5x$). Deben cruzarse cambiando el signo primero»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Cuando una ecuación tiene la incógnita (la misma letra) en
    el primer y en el segundo miembro, se deben transponer los términos para que todas las letras queden de un lado
    (usualmente a la izquierda) y los números del otro (a la derecha).'
errores_frecuentes:
- Sumar las 'x' de ambos lados como si estuvieran en el mismo miembro (ej. en $3x = 2x + 5$, sumar $3x+2x = 5x$).
  Deben cruzarse cambiando el signo primero.
- $+2x$.
- Para «Si en la ecuación $6x + 5 = 2x + 17$ decides agrupar las incógnitas en el lado izquierdo, el término $2x$
  del lado derecho debe moverse como:», la respuesta correcta es Dividiendo por $2$.
- Para «Si en la ecuación $6x + 5 = 2x + 17$ decides agrupar las incógnitas en el lado izquierdo, el término $2x$
  del lado derecho debe moverse como:», la respuesta correcta es Multiplicando por $2$.
- Para «Para evitar trabajar con coeficientes negativos en la ecuación $2x + 10 = 7x - 5$, el paso más astuto sería
  mover:», la respuesta correcta es El $7x$ hacia la izquierda.
