semantic_id: MAT.ALG.FUNC_TRIG_PARAMETROS.COMPARACION_BASE_TRANSFORMADA
titulo: Comparación integral entre la función básica y su transformación
objetivo: Describir de forma integrada todos los efectos de los parámetros $a$, $b$, $c$ y $d$ al comparar
  $f(x)=a\sin(b(x-c))+d$ con la función básica.
introduccion: Ya conoces cada parámetro por separado; ahora se combinan todos para describir completamente cómo
  se transforma la función trigonométrica básica.
resumen: Para comparar $f(x)=a\sin(b(x-c))+d$ con la función básica, se analizan en conjunto la amplitud ($|a|$),
  el periodo ($2\pi/|b|$), el desplazamiento horizontal ($c$) y la línea media ($d$).
explicacion: '### Definición formal


  La descripción completa de una función trigonométrica transformada requiere indicar: (1) la amplitud $|a|$;
  (2) si hay reflexión, cuando $a<0$; (3) el periodo $2\pi/|b|$; (4) el desplazamiento horizontal $c$; (5) la
  línea media $y=d$.


  ### Desarrollo didáctico


  Para $f(x)=-2\sin(3(x-\pi/6))+1$: amplitud $2$, reflexión (por $a<0$), periodo $2\pi/3$, desfase $\pi/6$ a la
  derecha, línea media $y=1$. Con esta información completa se puede trazar la gráfica sin necesidad de una
  tabla de valores extensa.'
procedimiento:
- 'Paso 1: Identifica los cuatro parámetros $a$, $b$, $c$ y $d$ en la forma general.'
- 'Paso 2: Calcula la amplitud, el periodo, el desfase y la línea media.'
- 'Paso 3: Describe la combinación completa de transformaciones respecto a la función básica.'
ejemplos:
- titulo: Descripción integral de una transformación del seno
  enunciado: 'Describe todas las transformaciones de $f(x)=4\sin(2(x-\pi/4))-3$ respecto a $\sin(x)$.'
  solucion_pasos:
  - 'Amplitud $4$, sin reflexión ($a>0$), periodo $2\pi/2=\pi$.'
  - 'Desfase $\pi/4$ a la derecha, línea media $y=-3$.'
- titulo: Descripción integral con reflexión
  enunciado: 'Describe todas las transformaciones de $f(x)=-0{,}5\cos(4x)+2$ respecto a $\cos(x)$.'
  solucion_pasos:
  - 'Amplitud $0{,}5$, con reflexión ($a<0$), periodo $2\pi/4=\pi/2$.'
  - 'Sin desfase horizontal ($c=0$), línea media $y=2$.'
- titulo: ¿Es posible que una función trigonométrica tenga los cuatro parámetros distintos de sus valores básicos?
  enunciado: ¿Puede una función trigonométrica transformada tener simultáneamente amplitud, periodo,
    desplazamiento horizontal y vertical distintos de los valores básicos?
  respuesta: Sí
  solucion_pasos:
  - Los cuatro parámetros son independientes entre sí y pueden combinarse libremente.
- titulo: ¿El orden en que se analizan los parámetros afecta el resultado final de la gráfica?
  enunciado: ¿Cambia la gráfica final según el orden en que se analicen los parámetros $a$, $b$, $c$, $d$?
  respuesta: 'No'
  solucion_pasos:
  - La forma estándar combina los cuatro parámetros de manera consistente, sin importar el orden de análisis.
errores_frecuentes:
- Analizar solo algunos parámetros y olvidar otros al describir la transformación completa.
- Confundir el efecto de cada parámetro entre sí.
- No factorizar correctamente antes de identificar $b$ y $c$.
- No verificar el resultado final evaluando la función en un punto de referencia.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
