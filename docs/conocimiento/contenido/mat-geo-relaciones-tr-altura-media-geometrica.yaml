semantic_id: MAT.GEO.RELACIONES_TR.ALTURA_MEDIA_GEOMETRICA
titulo: 'Propiedad: la altura sobre la hipotenusa es media geométrica de las dos proyecciones'
objetivo: 'Aplicar la segunda relación métrica de Euclides: la altura sobre la hipotenusa es media geométrica
  entre las dos proyecciones de los catetos.'
introduccion: Así como cada cateto se relaciona con su propia proyección y la hipotenusa, la altura misma
  tiene su propia relación exacta con las dos proyecciones que ella genera.
resumen: En un triángulo rectángulo, la altura relativa a la hipotenusa es media geométrica entre las
  dos proyecciones de los catetos.
explicacion: '![Altura como media geométrica de las proyecciones](/static/img/geometria/areas-pitagoras/relaciones-tr-altura-media-geometrica.svg)


  ### Definición formal


  Si $m$ y $n$ son las proyecciones de los dos catetos sobre la hipotenusa, la altura $h$ cumple $h^2=m\cdot
  n$.


  ### Desarrollo didáctico


  Si las proyecciones son 4 y 9, la altura es $h=\sqrt{4\times9}=\sqrt{36}=6$.'
procedimiento:
- 'Paso 1: Identifica las dos proyecciones de los catetos sobre la hipotenusa.'
- 'Paso 2: Multiplica esas dos proyecciones.'
- 'Paso 3: Calcula la raíz cuadrada de ese producto: esa es la altura sobre la hipotenusa.'
ejemplos:
- titulo: Calcular la altura con esta relación
  enunciado: Las proyecciones de los catetos son 3 y 12.
  solucion_pasos:
  - h=√(3×12)=√36=6.
- titulo: Verificar con proyecciones iguales
  enunciado: Un triángulo rectángulo isósceles tiene ambas proyecciones iguales a 5.
  solucion_pasos:
  - h=√(5×5)=√25=5.
- titulo: ¿Esta relación usa la hipotenusa directamente?
  respuesta: 'No'
  solucion_pasos:
  - No, esta relación usa únicamente las dos proyecciones, no la hipotenusa completa.
- titulo: ¿La altura siempre es menor que ambas proyecciones?
  respuesta: 'No'
  solucion_pasos:
  - No necesariamente; la altura es la media geométrica, que puede ser mayor o menor que una proyección
    individual, dependiendo de los valores.
errores_frecuentes:
- Confundir esta relación con la del cateto (que sí usa la hipotenusa).
- Multiplicar la altura por sí misma en vez de las dos proyecciones.
- Olvidar la raíz cuadrada final.
fuente: Elaboración propia.
estado: publicado
