semantic_id: MAT.GEO.AREAS_TRIANGULOS.IDENTIFICACION_BASE_ALTURA
titulo: Identificación de la base y la altura correspondiente en distintas orientaciones del triángulo
objetivo: Identificar correctamente la base y su altura correspondiente en un triángulo, sin importar
  cómo esté dibujado u orientado.
introduccion: Un mismo triángulo puede dibujarse en cualquier orientación, y cualquiera de sus tres lados
  puede tomarse como base; lo esencial es siempre usar la altura correspondiente a esa base específica,
  no cualquier otro segmento.
resumen: Para identificar correctamente base y altura, se elige cualquier lado como base, y la altura
  es siempre el segmento perpendicular desde el vértice opuesto hasta esa base (o su prolongación).
explicacion: '![Identificación de base y altura](/static/img/geometria/areas-pitagoras/areas-triangulos-identificacion-base-altura.svg)


  ### Definición formal


  Cualquiera de los tres lados de un triángulo puede tomarse como base; la altura correspondiente es siempre
  el segmento perpendicular desde el vértice opuesto a esa base (o a su prolongación).


  ### Desarrollo didáctico


  Un mismo triángulo tiene tres pares posibles de base-altura, uno por cada lado; los tres dan el mismo
  valor de área, ya que A=(base×altura)/2 es constante sin importar qué lado se elija como base.'
procedimiento:
- 'Paso 1: Elige cualquiera de los tres lados del triángulo como base.'
- 'Paso 2: Identifica el vértice opuesto a esa base.'
- 'Paso 3: Traza (o identifica) el segmento perpendicular desde ese vértice hasta la base: esa es la altura
  correspondiente.'
ejemplos:
- titulo: Identificar base y altura en un triángulo inclinado
  enunciado: Un triángulo está dibujado sin ningún lado horizontal.
  solucion_pasos:
  - Se puede elegir cualquier lado como base, y la altura sigue siendo la perpendicular desde el vértice
    opuesto.
- titulo: Verificar que las tres opciones dan la misma área
  enunciado: ¿El área calculada depende de qué lado se elija como base?
  solucion_pasos:
  - No, las tres combinaciones de base y su altura correspondiente dan siempre el mismo valor de área.
- titulo: ¿Cualquier lado puede ser la base?
  respuesta: Sí
  solucion_pasos:
  - Sí, la elección de base es libre; lo importante es usar la altura correcta para esa base.
- titulo: ¿La altura debe ser perpendicular a la base elegida?
  respuesta: Sí
  solucion_pasos:
  - Sí, siempre debe formar 90° con la base (o su prolongación).
errores_frecuentes:
- Usar una altura que no corresponde a la base elegida (mezclar pares base-altura).
- Creer que solo el lado 'de abajo' en el dibujo puede ser la base.
- Confundir un lado cualquiera con la altura, sin verificar la perpendicularidad.
fuente: Elaboración propia.
estado: publicado
