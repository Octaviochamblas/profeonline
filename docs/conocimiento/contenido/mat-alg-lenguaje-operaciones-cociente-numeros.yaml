semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.COCIENTE_NUMEROS
objetivo: Traducir el cociente o división entre dos cantidades algebraicas.
introduccion: A veces hay que repartir en partes iguales. Cuando necesitamos expresar
  un reparto entre dos variables desconocidas, llamamos al cociente.
resumen: El **Cociente de Cantidades** se traduce utilizando la división, la cual
  se representa preferentemente en **formato de fracción** $\frac{x}{y}$, donde la
  primera cantidad mencionada es el numerador y la segunda el denominador.
explicacion: 'Palabras clave:

  - El cociente entre

  - La división de

  - La razón entre

  - Repartido entre


  Ejemplos:

  - ''El cociente entre un número y otro número distinto'': $\frac{a}{b}$

  - ''La fortuna de un millonario dividida entre la cantidad de herederos'': $\frac{F}{H}$


  Igual que en la resta, **el orden es crítico**. En ''El cociente entre A y B'',
  A debe ir arriba (numerador) y B abajo (denominador).'
procedimiento:
- 'Paso 1: Detecta que se trata de una división (cociente). Dibuja una línea fraccionaria.'
- 'Paso 2: Identifica cuál es la primera cantidad mencionada. Escríbela en la parte
  de arriba (numerador).'
- 'Paso 3: Identifica la segunda cantidad mencionada. Escríbela en la parte de abajo
  (denominador).'
ejemplos:
- titulo: El orden del reparto
  enunciado: 'Traduce algebraicamente: ''El cociente entre la velocidad y el tiempo''.'
  solucion_pasos:
  - La operación es una división.
  - La 'velocidad' (v) se nombra primero. Va arriba.
  - El 'tiempo' (t) se nombra segundo. Va abajo.
  - 'Traducción: v / t.'
errores_frecuentes:
- Invertir el orden de las variables. Escribir $\frac{y}{x}$ cuando el enunciado dijo
  'el cociente entre x e y'.
- Usar el símbolo de porcentaje o multiplicación. (Ej. confundir 'repartir' con 'multiplicar').
fuente: Álgebra de Baldor.
estado: publicado
