semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.COCIENTE_NUMEROS
objetivo: Traducir el cociente o división entre dos cantidades algebraicas.
introduccion: A veces hay que repartir en partes iguales. Cuando necesitamos expresar un reparto entre dos variables
  desconocidas, llamamos al cociente.
resumen: El **Cociente de Cantidades** se traduce utilizando la división, la cual se representa preferentemente
  en **formato de fracción** $\frac{x}{y}$, donde la primera cantidad mencionada es el numerador y la segunda el
  denominador.
explicacion: '### Definición formal


  La división no es conmutativa. El estricto orden de lectura verbal define quién es partido y quién parte.


  ### Desarrollo didáctico


  Palabras clave:

  - El cociente entre

  - La división de

  - La razón entre

  - Repartido entre


  Ejemplos:

  - ''El cociente entre un número y otro número distinto'': $\frac{a}{b}$

  - ''La fortuna de un millonario dividida entre la cantidad de herederos'': $\frac{F}{H}$


  Igual que en la resta, **el orden es crítico**. En ''El cociente entre A y B'', A debe ir arriba (numerador) y
  B abajo (denominador).'
procedimiento:
- 'Paso 1: Detecta que se trata de una división (cociente). Dibuja una línea fraccionaria.'
- 'Paso 2: Identifica cuál es la primera cantidad mencionada. Escríbela en la parte de arriba (numerador).'
- 'Paso 3: Identifica la segunda cantidad mencionada. Escríbela en la parte de abajo (denominador).'
ejemplos:
- titulo: El orden del reparto
  enunciado: 'Traduce algebraicamente: ''El cociente entre la velocidad y el tiempo''.'
  solucion_pasos:
  - La operación es una división.
  - La 'velocidad' (v) se nombra primero. Va arriba.
  - El 'tiempo' (t) se nombra segundo. Va abajo.
  - 'Traducción: v / t.'
- titulo: Un estudio sociológico necesita calcular el 'Índice de Densidad' de varias ciudades. La regl
  enunciado: 'Un estudio sociológico necesita calcular el ''Índice de Densidad'' de varias ciudades. La regla teórica
    establece que dicho índice es ''el cociente entre la cantidad de habitantes y la superficie territorial en kilómetros
    cuadrados''. Si Habitantes es $H$ y Superficie es $S$, ¿qué fórmula debe implementar la base de datos? (v1)


    Opciones: A) $I = \frac{H}{S}$ · B) $I = \frac{S}{H}$ · C) $I = H \cdot S$ · D) $I = H - S$'
  solucion_pasos:
  - 'La palabra cociente indica fracción. Habitantes se nombra primero (numerador). Superficie se nombra segundo
    (denominador). Resultado: H/S.'
  - 'Respuesta: $I = \frac{H}{S}$'
- titulo: 'Respecto de «Traducción del cociente entre dos números»: ¿Es correcta esta caracterización?'
  enunciado: 'Respecto de «Traducción del cociente entre dos números»: ¿Es correcta esta caracterización? «El **Cociente
    de Cantidades** se traduce utilizando la división, la cual se representa preferentemente en **formato de fracción**
    $\frac{x}{y}$, donde la primera cantidad mencionada es el numerador y la segunda el denominador»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Cociente de Cantidades** se traduce utilizando la división,
    la cual se representa preferentemente en **formato de fracción** $\frac{x}{y}$, donde la primera cantidad mencionada
    es el numerador y la segunda el denominador.'
- titulo: 'Respecto de «Traducción del cociente entre dos números»: ¿Es válida esta afirmación? «Invert'
  enunciado: 'Respecto de «Traducción del cociente entre dos números»: ¿Es válida esta afirmación? «Invertir el
    orden de las variables. Escribir $\frac{y}{x}$ cuando el enunciado dijo ''el cociente entre x e y''»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Cociente de Cantidades** se traduce utilizando la división,
    la cual se representa preferentemente en **formato de fracción** $\frac{x}{y}$, donde la primera cantidad mencionada
    es el numerador y la segunda el denominador.'
errores_frecuentes:
- Invertir el orden de las variables. Escribir $\frac{y}{x}$ cuando el enunciado dijo 'el cociente entre x e y'.
- Usar el símbolo de porcentaje o multiplicación. (Ej. confundir 'repartir' con 'multiplicar').
- Para «Al traducir el enunciado 'el cociente entre la cantidad $A$ y la cantidad $B$', ¿qué regla determina la
  posición de las variables en la fracción resultante? (v1)», la respuesta correcta es La letra que vaya antes en
  el abecedario debe ir en el numerador.
- Para «Al traducir el enunciado 'el cociente entre la cantidad $A$ y la cantidad $B$', ¿qué regla determina la
  posición de las variables en la fracción resultante? (v1)», la respuesta correcta es La variable que represente
  la cantidad mayor debe ir siempre en el numerador.
- El orden es irrelevante, $\frac{A}{B}$ y $\frac{B}{A}$ representan la misma traducción matemática.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción del cociente entre dos números
