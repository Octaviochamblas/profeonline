semantic_id: MAT.ALG.LENGUAJE_RELACIONES.COMO_MAXIMO
objetivo: Traducir el concepto de límite superior incluyente usando el símbolo menor
  o igual que.
introduccion: 'Si tu madre te dice: ''Puedes gastar como máximo 20 dólares'', ¿puedes
  gastar exactamente 20? Sí. ¿Puedes gastar 19? Sí. ¿Puedes gastar 21? No. Este es
  un límite cerrado superior.'
resumen: La frase **'Como máximo'** se traduce utilizando el símbolo de desigualdad
  **menor o igual que ($\le$)**. Indica que la variable puede tomar cualquier valor
  por debajo del límite, o tocar el límite exactamente, pero nunca superarlo.
explicacion: 'Palabras clave que se traducen como $\le$:

  - Como máximo

  - A lo más

  - No más de

  - Hasta

  - Tiene un tope de


  Ejemplos:

  - ''El peso soportado ($P$) es como máximo 500 kg'': $P \le 500$

  - ''Gastaré a lo más el doble de mi sueldo ($S$)'': $Gastos \le 2S$


  La diferencia crucial con el ''menor que'' estricto ($<$) es la pequeña línea horizontal
  debajo del símbolo, que significa ''o igual''.'
procedimiento:
- 'Paso 1: Identifica la variable que está siendo limitada (el sujeto de la oración).'
- 'Paso 2: Al leer ''como máximo'' o ''a lo más'', escribe el símbolo <= (menor o
  igual).'
- 'Paso 3: Escribe el valor del límite máximo a la derecha del símbolo.'
ejemplos:
- titulo: El tope de gastos
  enunciado: 'Traduce algebraicamente: ''El costo total de la obra no será de más
    de un millón''.'
  solucion_pasos:
  - 'Costo total de la obra: C.'
  - 'La frase ''no será de más de'' significa que puede ser menos o exactamente igual:
    <='
  - 'El límite es un millón: 1000000.'
  - 'Traducción: C <= 1000000.'
errores_frecuentes:
- Traducir 'como máximo' usando el símbolo de mayor ($>$ o $\ge$) confundidos por
  la palabra 'máximo'. (Si el tope es el máximo, la variable tiene que ser *menor*
  que el tope).
- Usar el símbolo estricto de menor ($<$) perdiendo la posibilidad de igualdad.
fuente: Álgebra de Baldor.
estado: publicado
