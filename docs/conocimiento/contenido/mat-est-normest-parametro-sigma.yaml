semantic_id: MAT.EST.NORMAL_ESTANDAR.PARAMETRO_SIGMA
titulo: Identificar la desviación estándar sigma en la notación normal
objetivo: Identificar el símbolo $\sigma$ como el parámetro que representa la desviación estándar en la notación de
  una distribución normal.
introduccion: La letra griega $\sigma$ (sigma) es el nombre matemático que se usa para la desviación estándar en el
  contexto de distribuciones de probabilidad.
resumen: El símbolo $\sigma$ representa la desviación estándar de una distribución normal y corresponde al segundo
  parámetro en la notación $N(\mu,\sigma)$.
explicacion: '![Parámetro sigma](/static/img/estadistica/normest/normest-parametro-sigma.svg)


  ### Definición formal


  En la notación $N(\mu,\sigma)$, el símbolo $\sigma$ representa la desviación estándar de la distribución, es decir,

  qué tan ancha o angosta es la curva normal correspondiente.


  ### Desarrollo didáctico


  Un valor de $\sigma$ pequeño produce una curva angosta y concentrada; un valor grande produce una curva ancha y más

  dispersa.'
procedimiento:
- 'Paso 1: Ubica el símbolo $\sigma$ dentro de la notación de la distribución normal.'
- 'Paso 2: Reconoce que ese valor corresponde a la desviación estándar de la distribución.'
- 'Paso 3: Interpreta $\sigma$ como la medida de dispersión de la curva.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: En $N(50, 5)$, ¿cuál es el valor de $\sigma$?
  solucion_pasos:
  - El valor de $\sigma$ es 5, ya que corresponde al segundo parámetro.
- titulo: Ejemplo 2
  enunciado: ¿Qué representa $\sigma$ en el contexto de una distribución normal?
  solucion_pasos:
  - Representa la desviación estándar, la dispersión de los datos respecto de la media.
- titulo: ¿El símbolo $\sigma$ representa la desviación estándar en la notación normal?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la convención estándar usada en estadística.
- titulo: ¿El símbolo $\sigma$ ocupa la primera posición en la notación $N(\mu,\sigma)$?
  respuesta: 'No'
  solucion_pasos:
  - 'No, $\sigma$ ocupa la segunda posición; $\mu$ ocupa la primera.'
errores_frecuentes:
- Confundir el símbolo $\sigma$ con $\mu$.
- Pensar que $\sigma$ puede tomar valores negativos.
- Creer que $\sigma$ representa la varianza en vez de la desviación estándar.
- Confundir $\sigma$ (desviación estándar poblacional) con $s$ (desviación estándar muestral).
- Olvidar que $\sigma$ siempre ocupa la segunda posición en la notación $N(\mu,\sigma)$.
fuente: 'Elaboración propia (referencia: Moraleja 305).'
estado: publicado
