semantic_id: MAT.GEO.RECTA_ECUACIONES.ECUACION_PRINCIPAL
titulo: Definición de la ecuación principal de la recta y = mx + b
objetivo: Definir la ecuación principal (o pendiente-intercepto) de una recta en el plano cartesiano,
  de la forma y=mx+b.
introduccion: La forma más utilizada para representar una recta es aquella que muestra directamente su
  inclinación (pendiente) y el punto donde cruza el eje vertical.
resumen: La ecuación principal de una recta tiene la forma $y=mx+b$, donde $m$ es la pendiente y $b$ es
  el coeficiente de posición (intercepto con el eje y).
explicacion: '![Ecuación principal de la recta](/static/img/geometria/analitica/rectaeq-ecuacion-principal.svg)


  ### Definición formal


  Toda recta no vertical del plano cartesiano puede escribirse en la forma $y=mx+b$, donde $m\in\mathbb{R}$
  es la pendiente y $b\in\mathbb{R}$ es el coeficiente de posición.


  ### Desarrollo didáctico


  En la figura, la recta $y=1{,}5x+1$ tiene pendiente $m=1{,}5$ y coeficiente de posición $b=1$, por lo
  que cruza el eje y en el punto $(0,1)$.'
procedimiento:
- 'Paso 1: Identifica la ecuación de la recta y verifica que esté despejada en función de y.'
- 'Paso 2: Reconoce el coeficiente que acompaña a x como la pendiente m.'
- 'Paso 3: Reconoce el término constante como el coeficiente de posición b.'
ejemplos:
- titulo: Identificar m y b en una ecuación dada
  enunciado: y=3x-2.
  solucion_pasos:
  - m=3 (pendiente) y b=-2 (coeficiente de posición).
- titulo: Reconocer una ecuación que no está en forma principal
  enunciado: 2x+y-4=0.
  solucion_pasos:
  - Esta ecuación no está despejada en y; se debe reescribir como y=-2x+4 para obtener su forma principal.
- titulo: ¿La forma principal siempre despeja la variable y?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la característica que define a esta forma de la ecuación.
- titulo: ¿Toda recta del plano puede escribirse en forma principal?
  respuesta: 'No'
  solucion_pasos:
  - No, las rectas verticales (x=k) no tienen pendiente definida y no pueden escribirse como y=mx+b.
errores_frecuentes:
- Confundir el coeficiente de posición b con la pendiente m.
- Intentar escribir una recta vertical en la forma y=mx+b.
- Olvidar despejar completamente y antes de identificar m y b.
fuente: 'Elaboración propia (referencia: Carreño 161).'
estado: publicado
