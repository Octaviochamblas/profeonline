semantic_id: MAT.ALG.FRACCIONES_DIV.PRODUCTO_RECIPROCO
titulo: División como Producto del Recíproco
objetivo: Transformar cualquier división de fracciones algebraicas en una multiplicación.
introduccion: Dividir fracciones es un mito. Nadie lo hace realmente. Lo que hacemos es transformar el problema
  en una multiplicación, usando el recíproco del divisor.
resumen: Dividir una fracción por otra es exactamente lo mismo que multiplicar la primera fracción por el recíproco
  de la segunda ( $\frac{A}{B} \div \frac{C}{D} = \frac{A}{B} \cdot \frac{D}{C}$ ).
explicacion: '### Definición formal


  Es fundamental invertir únicamente la fracción que viene DESPUÉS del signo de división.


  ### Desarrollo didáctico


  La regla universal para dividir fracciones algebraicas se resume en el mantra de tres pasos de la escuela: ''Mantener,
  Cambiar, Voltear'' (Keep, Change, Flip).


  Si tienes: $\frac{A}{B} \div \frac{C}{D}$


  1. **Mantener:** La primera fracción ($\frac{A}{B}$) se queda exactamente igual. No la toques.

  2. **Cambiar:** El signo de división ($\div$) se convierte en multiplicación ($\cdot$).

  3. **Voltear:** Inviertes (das vuelta) la segunda fracción. El numerador pasa a ser denominador y viceversa. ($\frac{C}{D}$
  se convierte en $\frac{D}{C}$).


  Operación resultante: $\frac{A}{B} \cdot \frac{D}{C}$.


  A partir de aquí, el problema es una simple multiplicación de fracciones. Factorizas, simplificas cruzado y resuelves.'
procedimiento:
- 'Paso 1: Escribe la primera fracción tal como está.'
- 'Paso 2: Cambia el operador $\div$ a $\cdot$.'
- 'Paso 3: Invierte numerador y denominador de la SEGUNDA fracción.'
- 'Paso 4: Multiplica.'
- Es fundamental invertir únicamente la fracción que viene DESPUÉS del signo de división.
ejemplos:
- titulo: 'Convierte a multiplicación: $\frac{a^2}{b} \div \frac{a}{c}$'
  enunciado: 'Convierte a multiplicación: $\frac{a^2}{b} \div \frac{a}{c}$.'
  solucion_pasos:
  - Mantenemos $\frac{a^2}{b}$.
  - Cambiamos a multiplicar.
  - Volteamos la segunda a $\frac{c}{a}$.
  - 'Queda: $\frac{a^2}{b} \cdot \frac{c}{a}$.'
- titulo: ¿A qué multiplicación equivale $\frac{1}{x} \div x$?
  solucion_pasos:
  - La segunda 'x' es x/1, se voltea a 1/x.
- titulo: 'Respecto de «Conversión de división en producto por recíproco»: ¿Es correcta esta caracteriz'
  enunciado: 'Respecto de «Conversión de división en producto por recíproco»: ¿Es correcta esta caracterización?
    «Dividir una fracción por otra es exactamente lo mismo que multiplicar la primera fracción por el recíproco
    de la segunda ( $\frac{A}{B} \div \frac{C}{D} = \frac{A}{B} \cdot \frac{D}{C}$ )»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Dividir una fracción por otra es exactamente lo mismo que
    multiplicar la primera fracción por el recíproco de la segunda ( $\frac{A}{B} \div \frac{C}{D} = \frac{A}{B}
    \cdot \frac{D}{C}$ ).'
- titulo: 'Respecto de «Conversión de división en producto por recíproco»: ¿Es válida esta afirmación?'
  enunciado: 'Respecto de «Conversión de división en producto por recíproco»: ¿Es válida esta afirmación? «Voltear
    la primera fracción»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Dividir una fracción por otra es exactamente lo mismo que
    multiplicar la primera fracción por el recíproco de la segunda ( $\frac{A}{B} \div \frac{C}{D} = \frac{A}{B}
    \cdot \frac{D}{C}$ ).'
errores_frecuentes:
- Voltear la primera fracción.
- Voltear ambas fracciones.
- Multiplicar directo sin voltear.
- Solo la primera fracción (dividendo).
- Para «Al transformar una división en multiplicación, la operación 'Mantener, Cambiar, Voltear' indica que debemos
  voltear:», la respuesta correcta es Ambas fracciones.
