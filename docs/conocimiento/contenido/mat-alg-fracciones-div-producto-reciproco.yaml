semantic_id: 'MAT.ALG.FRACCIONES_DIV.PRODUCTO_RECIPROCO'
titulo: 'División como Producto del Recíproco'
objetivo: 'Transformar cualquier división de fracciones algebraicas en una multiplicación.'
introduccion: |
  ¡Dividir fracciones es un mito! Nadie lo hace realmente. Lo que hacemos es transformar el problema en una multiplicación, usando el recíproco del divisor.
resumen: |
  Dividir una fracción por otra es exactamente lo mismo que multiplicar la primera fracción por el recíproco de la segunda ( $\frac{A}{B} \div \frac{C}{D} = \frac{A}{B} \cdot \frac{D}{C}$ ).
explicacion: |
  En lugar de complicarnos intentando dividir polinomios, usamos la regla: 'Mantener, Cambiar, Voltear'.
  1. **Mantener** la primera fracción exactamente igual.
  2. **Cambiar** el signo $\div$ por $\cdot$.
  3. **Voltear** la segunda fracción (su recíproco).
  Ejemplo: $\frac{x}{2} \div \frac{3}{y} = \frac{x}{2} \cdot \frac{y}{3} = \frac{xy}{6}$.
procedimiento:
  - 'Paso 1: Escribe la primera fracción tal como está.'
  - 'Paso 2: Cambia el operador $\div$ a $\cdot$.'
  - 'Paso 3: Invierte numerador y denominador de la SEGUNDA fracción.'
  - 'Paso 4: Multiplica.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Convierte a multiplicación: $\frac{a^2}{b} \div \frac{a}{c}$.'
    solucion_pasos:
    - 'Mantenemos $\frac{a^2}{b}$.'
    - 'Cambiamos a multiplicar.'
    - 'Volteamos la segunda a $\frac{c}{a}$.'
    - 'Queda: $\frac{a^2}{b} \cdot \frac{c}{a}$.'
  - titulo: '¿A qué multiplicación equivale $\frac{1}{x} \div x$?'
    respuesta: '$\frac{1}{x} \cdot \frac{1}{x}$'
    solucion_pasos:
    - 'La segunda ''x'' es x/1, se voltea a 1/x.'
errores_frecuentes:
  - 'Voltear la primera fracción.'
  - 'Voltear ambas fracciones.'
  - 'Multiplicar directo sin voltear.'
estado: publicado
