semantic_id: MAT.GEO.POLIGONOS_METRICA.DIAGONALES_TOTAL
titulo: Cálculo de la cantidad total de diagonales de un polígono mediante n(n - 3) / 2
objetivo: Calcular el número total de diagonales de un polígono usando la fórmula n(n-3)/2.
introduccion: Con la cantidad de diagonales por vértice ya conocida, es posible deducir una fórmula para
  el número total de diagonales de todo el polígono.
resumen: El número total de diagonales de un polígono de $n$ lados es $\frac{n(n-3)}{2}$.
explicacion: '![Total de diagonales de un polígono](/static/img/geometria/poligonos-cuadrilateros/poligonos-diagonales-total.svg)


  ### Definición formal


  Si cada uno de los $n$ vértices tiene $(n-3)$ diagonales, el producto $n(n-3)$ cuenta cada diagonal
  dos veces (una desde cada extremo), por lo que se divide entre 2: $D=\frac{n(n-3)}{2}$.


  ### Desarrollo didáctico


  Un hexágono ($n=6$) tiene $\frac{6\times3}{2}=\frac{18}{2}=9$ diagonales en total. Esta fórmula combina
  el resultado de diagonales por vértice (n-3) con el ajuste necesario para no contar cada diagonal dos
  veces.'
procedimiento:
- 'Paso 1: Identifica el número de lados n del polígono.'
- 'Paso 2: Calcula n(n-3).'
- 'Paso 3: Divide el resultado entre 2 para obtener el total de diagonales.'
ejemplos:
- titulo: Calcular el total de diagonales de un hexágono
  enunciado: Un hexágono tiene 6 lados.
  solucion_pasos:
  - D=6×3/2=18/2=9 diagonales.
- titulo: Calcular el total de diagonales de un pentágono
  enunciado: Un pentágono tiene 5 lados.
  solucion_pasos:
  - D=5×2/2=10/2=5 diagonales.
- titulo: ¿Por qué se divide entre 2 en esta fórmula?
  respuesta: Para no contar cada diagonal dos veces
  solucion_pasos:
  - Porque cada diagonal se cuenta una vez desde cada uno de sus dos extremos, duplicando el conteo si
    no se divide.
- titulo: ¿Un triángulo tiene diagonales según esta fórmula?
  respuesta: 'No'
  solucion_pasos:
  - 'No, con n=3: D=3×0/2=0, confirmando que el triángulo no tiene diagonales.'
errores_frecuentes:
- Olvidar dividir entre 2, duplicando el conteo real de diagonales.
- Confundir esta fórmula con la de diagonales desde un solo vértice (n-3).
- Errores aritméticos al calcular n(n-3) antes de dividir.
fuente: 'Fuente: Moraleja Tomo 2 67, Cid 46.'
estado: publicado
