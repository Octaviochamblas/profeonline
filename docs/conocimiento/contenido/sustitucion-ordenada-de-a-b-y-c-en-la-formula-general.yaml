semantic_id: MAT.ALG.EC_CUADR_METODOS.SUSTITUCION_COEFICIENTES
titulo: Sustitución ordenada de a, b y c en la fórmula general
objetivo: Sustituir correctamente y en orden los coeficientes $a$, $b$ y $c$ dentro de la fórmula general,
  evitando errores de signo.
introduccion: La mayoría de los errores al usar la fórmula general no ocurren por no saberla de memoria,
  sino por sustituir mal un coeficiente, sobre todo cuando es negativo.
resumen: Sustituir ordenadamente en la fórmula general implica reemplazar cada coeficiente exactamente
  donde corresponde, usando paréntesis para preservar el signo de los valores negativos.
explicacion: '### Definición formal


  Sustituir en $x=\dfrac{-b\pm\sqrt{b^2-4ac}}{2a}$ significa reemplazar $a$, $b$ y $c$ por sus valores
  numéricos concretos, manteniendo cada uno encerrado entre paréntesis para preservar su signo durante
  las operaciones posteriores (elevar al cuadrado, multiplicar).


  ### Desarrollo didáctico


  Escribir cada coeficiente entre paréntesis antes de operar evita el error más común: perder o invertir
  un signo negativo al elevarlo al cuadrado o multiplicarlo.


  Para $-3x^2+2x+8=0$: $a=-3$, $b=2$, $c=8$. Sustituyendo con paréntesis, $x=\dfrac{-(2)\pm\sqrt{(2)^2-4(-3)(8)}}{2(-3)}=\dfrac{-2\pm\sqrt{4+96}}{-6}$.'
procedimiento:
- 'Paso 1: Identifica los valores numéricos de $a$, $b$ y $c$, incluyendo su signo.'
- 'Paso 2: Escribe cada coeficiente entre paréntesis al sustituirlo en la fórmula.'
- 'Paso 3: Resuelve las operaciones (potencias, productos) respetando los paréntesis antes de simplificar.'
ejemplos:
- titulo: Sustitución con coeficiente b negativo
  enunciado: Sustituye correctamente en la fórmula general para $x^2-6x+5=0$.
  solucion_pasos:
  - $a=1$, $b=-6$, $c=5$.
  - $x=\dfrac{-(-6)\pm\sqrt{(-6)^2-4(1)(5)}}{2(1)}=\dfrac{6\pm\sqrt{36-20}}{2}$.
- titulo: Sustitución con coeficiente a negativo
  enunciado: Sustituye correctamente en la fórmula general para $-2x^2+3x-1=0$.
  solucion_pasos:
  - $a=-2$, $b=3$, $c=-1$.
  - $x=\dfrac{-(3)\pm\sqrt{(3)^2-4(-2)(-1)}}{2(-2)}=\dfrac{-3\pm\sqrt{9-8}}{-4}$.
- titulo: ¿Usar paréntesis al sustituir ayuda a evitar errores de signo?
  enunciado: ¿Usar paréntesis al sustituir ayuda a evitar errores de signo?
  respuesta: Sí
  solucion_pasos:
  - Los paréntesis preservan el signo original de cada coeficiente durante las operaciones posteriores.
- titulo: ¿Sustituir $-b$ cuando $b$ es negativo produce un resultado positivo?
  enunciado: ¿Sustituir $-b$ cuando $b$ es negativo produce un resultado positivo?
  respuesta: Sí
  solucion_pasos:
  - $-b$ con $b$ negativo equivale a $-(\text{negativo})$, que es positivo.
errores_frecuentes:
- No usar paréntesis al sustituir un coeficiente negativo, perdiendo su signo en operaciones posteriores.
- Olvidar aplicar el signo negativo delante de $b$ en el término $-b$ de la fórmula.
- Confundir el orden de sustitución de $a$, $b$ y $c$, sustituyendo un valor en la posición equivocada.
- Elevar $b$ al cuadrado sin encerrarlo en paréntesis, obteniendo un signo incorrecto si $b$ es negativo.
