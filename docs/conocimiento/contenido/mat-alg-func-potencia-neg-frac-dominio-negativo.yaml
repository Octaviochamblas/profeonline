semantic_id: MAT.ALG.FUNC_POTENCIA_NEG_FRAC.DOMINIO_NEGATIVO
titulo: Dominio de la función potencia con exponente entero negativo
objetivo: Determinar que el dominio de $f(x)=a\cdot x^{-n}$ (con $n$ entero positivo) excluye $x=0$.
introduccion: Al reescribir un exponente negativo como fracción, aparece una división que obliga a excluir el
  valor que anularía el denominador.
resumen: Cuando $n$ es un entero positivo, el dominio de $f(x)=a\cdot x^{-n}$ es $\mathbb{R}\setminus\{0\}$,
  excluyendo únicamente el valor $x=0$.
explicacion: '### Definición formal


  Como $x^{-n}=1/x^n$, la expresión requiere $x^n\neq0$, lo que ocurre exactamente cuando $x\neq0$. Por lo tanto,
  el dominio de $f(x)=a\cdot x^{-n}$ es $\mathbb{R}\setminus\{0\}$, sin ninguna otra restricción.


  ### Desarrollo didáctico


  $f(x)=x^{-3}$ puede evaluarse en cualquier número salvo $0$: $f(2)=1/8$, $f(-5)=-1/125$, pero $f(0)$ no está
  definido, porque implicaría dividir por $0$.'
procedimiento:
- 'Paso 1: Reescribe $x^{-n}$ como $1/x^n$ si aún no está en esa forma.'
- 'Paso 2: Identifica el valor que anula el denominador.'
- 'Paso 3: Excluye ese valor del dominio, dejando el resto de $\mathbb{R}$.'
ejemplos:
- titulo: Determinación del dominio de $x^{-2}$
  enunciado: 'Determina el dominio de $f(x)=x^{-2}$.'
  solucion_pasos:
  - Se reescribe como $f(x)=1/x^2$.
  - 'El dominio es $\mathbb{R}\setminus\{0\}$.'
- titulo: Determinación del dominio de $5x^{-4}$
  enunciado: 'Determina el dominio de $f(x)=5x^{-4}$.'
  solucion_pasos:
  - El coeficiente $5$ no afecta el dominio; solo importa el exponente negativo.
  - 'El dominio es $\mathbb{R}\setminus\{0\}$.'
- titulo: ¿$x=0$ pertenece al dominio de $f(x)=x^{-1}$?
  enunciado: ¿El valor $x=0$ pertenece al dominio de $f(x)=x^{-1}$?
  respuesta: 'No'
  solucion_pasos:
  - Produciría una división por cero al reescribir como $1/x$.
- titulo: ¿El dominio de $f(x)=x^{-2}$ excluye algún valor negativo además de $0$?
  enunciado: ¿El dominio de $f(x)=x^{-2}$ excluye algún número negativo, además de $x=0$?
  respuesta: 'No'
  solucion_pasos:
  - Solo se excluye $x=0$; cualquier otro número real, positivo o negativo, pertenece al dominio.
errores_frecuentes:
- Suponer que el dominio excluye también los valores negativos, confundiéndolo con el de raíces.
- Olvidar excluir $x=0$ al no reescribir primero la expresión como fracción.
- Confundir esta restricción con la del recorrido, que es un análisis distinto.
- No verificar el dominio antes de evaluar la función en un valor específico.
