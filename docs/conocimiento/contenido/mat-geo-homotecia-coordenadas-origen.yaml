semantic_id: MAT.GEO.HOMOTECIA.COORDENADAS_ORIGEN
titulo: Homotecia en el plano cartesiano con centro en el origen
objetivo: Calcular las coordenadas de la imagen de un punto bajo una homotecia con centro en el origen
  del plano cartesiano.
introduccion: El caso más simple de homotecia en el plano cartesiano ocurre cuando el centro de la transformación
  coincide con el origen del sistema de coordenadas.
resumen: Si el centro de homotecia es el origen $(0,0)$, la imagen de un punto $(x,y)$ bajo razón $k$
  es simplemente $(kx, ky)$.
explicacion: '![Homotecia con centro en el origen](/static/img/geometria/congruencia-semejanza/homotecia-coordenadas-origen.svg)


  ### Definición formal


  Para una homotecia de centro $O=(0,0)$ y razón $k$, un punto $P=(x,y)$ se transforma en $P''=(kx,ky)$,
  ya que $P''=O+k(P-O)=k(x,y)$.


  ### Desarrollo didáctico


  El punto $(3,5)$ bajo una homotecia de centro en el origen y razón $k=2$ se transforma en $(2\times3,
  2\times5)=(6,10)$. Este caso es especialmente simple porque no hay que restar las coordenadas del centro
  (al ser cero).'
procedimiento:
- 'Paso 1: Verifica que el centro de homotecia sea el origen (0,0).'
- 'Paso 2: Identifica las coordenadas (x,y) del punto original.'
- 'Paso 3: Multiplica cada coordenada por la razón k para obtener las coordenadas de la imagen.'
ejemplos:
- titulo: Calcular la imagen de un punto con centro en el origen
  enunciado: El punto (3,5) se transforma bajo una homotecia de centro (0,0) y razón k=2.
  solucion_pasos:
  - La imagen es (2×3, 2×5)=(6,10).
- titulo: Calcular con razón negativa
  enunciado: El punto (4,-2) se transforma bajo una homotecia de centro (0,0) y razón k=-1.
  solucion_pasos:
  - La imagen es (-1×4, -1×-2)=(-4,2).
- titulo: ¿Es necesario restar las coordenadas del centro en este caso?
  respuesta: 'No'
  solucion_pasos:
  - No, porque el centro es (0,0), restar cero no cambia las coordenadas originales.
- titulo: ¿El origen mismo se transforma en otro punto?
  respuesta: 'No'
  solucion_pasos:
  - No, el origen es el centro de homotecia, por lo que permanece fijo (su propia imagen).
errores_frecuentes:
- Sumar en vez de multiplicar las coordenadas por la razón k.
- Aplicar la razón solo a una de las dos coordenadas, olvidando la otra.
- Confundir este caso simplificado con el caso general (centro distinto del origen), que sí requiere restar
  las coordenadas del centro.
fuente: 'Fuente: Moraleja 155.'
estado: publicado
