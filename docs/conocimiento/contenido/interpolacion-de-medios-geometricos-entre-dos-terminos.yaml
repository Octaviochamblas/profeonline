semantic_id: MAT.NUM.PROGRESIONES_COMPARACION.INTERPOLACION_GEOMETRICA
titulo: Interpolación de medios geométricos entre dos términos
objetivo: Interpolar (insertar) medios geométricos (números faltantes) entre dos extremos conocidos calculando
  la razón a través de raíces.
introduccion: 'Ya rellenamos huecos sumando. Ahora rellenaremos huecos multiplicando. Cuando la brecha
  entre el primer y último número es explosiva (ejemplo: de 2 a 162 en pocos pasos), sabes que estás en
  territorio geométrico. Las raíces serán tus mejores amigas aquí.'
resumen: 'Para interpolar ''$k$'' medios geométricos entre ''$A$'' y ''$B$'', debes calcular la razón
  multiplicativa ''$r$'' usando la fórmula de raíces: **$r = \sqrt[k+1]{\frac{B}{A}}$**. Luego, vas multiplicando
  repetidamente por ''$r$'' desde ''$A$''.'
explicacion: "Visualicemos: Interpolar **2 medios geométricos** entre el número 3 y el número 192.\n-\
  \ La lista: $3, \\_ , \\_ , 192$.\n- Hay 2 huecos, lo que significa que daremos **3 saltos multiplicativos**.\
  \ (Multiplicaremos por '$r$' tres veces seguidas).\n\nPara hallar 'r', hacemos el camino inverso a la\
  \ potencia (la raíz):\n1. Cociente total = $192 / 3 = 64$.\n2. Cantidad de saltos = $k + 1 = 2 + 1 =\
  \ 3$.\n3. Extraer la raíz: $r = \\sqrt[3]{64}$. \n4. Buscamos qué número multiplicado por sí mismo 3\
  \ veces da 64. ¡Es el 4!\n5. La razón $r = 4$.\n\nLlenamos los huecos multiplicando:\n- $3 \\cdot 4\
  \ = 12$\n- $12 \\cdot 4 = 48$\n- Comprobamos el puente: $48 \\cdot 4 = 192$. ¡Encaje perfecto! Los medios\
  \ son 12 y 48."
procedimiento:
- 'Paso 1: Divide el término final entre el término inicial ($B / A$).'
- 'Paso 2: A la cantidad de números a interpolar ($k$) súmale 1 ($k + 1$). Este será el índice de tu raíz.'
- 'Paso 3: Saca la raíz de índice ''$(k+1)$'' al resultado de la división. Esa es tu razón ''r''.'
- 'Paso 4: Multiplica por ''r'' repetidamente partiendo desde ''A'' para llenar los espacios.'
ejemplos:
- titulo: El eslabón perdido
  enunciado: Interpolar 1 medio geométrico entre 5 y 125.
  solucion_pasos:
  - A = 5, B = 125, k = 1.
  - Índice de la raíz = 1 + 1 = 2 (raíz cuadrada).
  - Cociente = 125 / 5 = 25.
  - r = Raíz Cuadrada de 25 = 5.
  - 'Interpolar: 5 * 5 = 25. Compruebo: 25 * 5 = 125.'
  - El medio geométrico es 25.
errores_frecuentes:
- 'Olvidar que si la cantidad de saltos ($k+1$) es un número PAR (ej: raíz cuadrada o cuarta), la razón
  ''r'' podría ser un número negativo (Ej: $\sqrt{25}$ puede ser 5 o -5), abriendo la puerta a dos sucesiones
  posibles.'
- Aplicar la fórmula de interpolación aritmética por error, terminando con sumas raras en vez de raíces.
fuente: Currículum Nacional MINEDUC.
estado: publicado
