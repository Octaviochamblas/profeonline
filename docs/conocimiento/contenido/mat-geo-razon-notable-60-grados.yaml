semantic_id: MAT.GEO.TRIG_NOTABLES.RAZONES_60_GRADOS
titulo: Razones trigonométricas del ángulo de 60°
objetivo: Determinar las razones trigonométricas exactas del ángulo de 60°, a partir del mismo triángulo
  rectángulo 30°-60°-90°.
introduccion: El ángulo de 60° comparte el mismo triángulo notable que el de 30°, pero sus razones se
  calculan considerando los catetos desde el otro vértice.
resumen: 'En un triángulo rectángulo 30°-60°-90° con cateto opuesto a 60° igual a $\sqrt3$, cateto adyacente
  1 e hipotenusa 2: $\sin60°=\dfrac{\sqrt3}{2}$, $\cos60°=\dfrac{1}{2}$ y $\tan60°=\sqrt3$.'
explicacion: '![Razones trigonométricas de 60°](/static/img/geometria/trigonometria/razon-notable-60-grados.svg)


  ### Definición formal


  En el mismo triángulo 30°-60°-90° (lados $1:\sqrt3:2$), ahora considerando el ángulo de 60°: el cateto
  opuesto es $\sqrt3$ y el adyacente es 1. Por lo tanto $\sin60°=\frac{\sqrt3}{2}$, $\cos60°=\frac{1}{2}$,
  $\tan60°=\sqrt3$.


  ### Desarrollo didáctico


  Observa que $\sin60°=\cos30°$ y $\cos60°=\sin30°$: esta es la relación de complementariedad entre ángulos
  que suman 90°, aplicada a este triángulo notable.'
procedimiento:
- 'Paso 1: Recuerda que el triángulo 30°-60°-90° tiene lados en proporción 1:√3:2.'
- 'Paso 2: Identifica que, para el ángulo de 60°, el cateto opuesto es √3 y el adyacente es 1 (invertidos
  respecto de 30°).'
- 'Paso 3: Aplica las definiciones de seno, coseno y tangente usando estas tres medidas.'
ejemplos:
- titulo: Calcular el seno de 60°
  enunciado: En el triángulo 30-60-90, cateto opuesto a 60°=√3, hipotenusa=2.
  solucion_pasos:
  - sin60°=√3/2≈0,866.
- titulo: Calcular la tangente de 60°
  enunciado: En el mismo triángulo, cateto opuesto a 60°=√3, adyacente=1.
  solucion_pasos:
  - tan60°=√3/1=√3≈1,732.
- titulo: ¿sin60° es igual a cos30°?
  respuesta: Sí
  solucion_pasos:
  - Sí, por la relación de ángulos complementarios (30°+60°=90°).
- titulo: ¿tan60° es el recíproco de tan30°?
  respuesta: 'No'
  solucion_pasos:
  - No, tan60°=√3 y tan30°=√3/3=1/√3; en realidad son valores recíprocos entre sí, no iguales, pero es
    una relación distinta a 'ser el mismo valor'. tan60°=1/tan30°, es decir, cot30°=tan60°.
errores_frecuentes:
- Confundir el cateto opuesto a 60° con el opuesto a 30° (invertir la proporción).
- Olvidar que tan60°=√3 (sin racionalizar, ya que no hay raíz en el denominador en este caso).
- No reconocer la relación de complementariedad entre las razones de 30° y 60°.
fuente: 'Elaboración propia (referencias: Moraleja 177, Cid 156).'
estado: publicado
