semantic_id: MAT.ALG.FUNCION_CONCEPTOS.PREIMAGEN
titulo: Concepto de preimagen de una función
objetivo: Comprender la preimagen de un valor como el conjunto de elementos del dominio que producen esa
  imagen.
introduccion: Si la imagen es "lo que sale", la preimagen es "lo que entró para producir ese resultado".
  A diferencia de la imagen, un valor puede tener varias preimágenes.
resumen: Dada una función $f\colon A \to B$ y un valor $y \in B$, la **preimagen** de $y$ es el conjunto
  de todos los elementos $x \in A$ tales que $f(x) = y$, denotado $f^{-1}(\{y\})$.
explicacion: '### Definición formal


  Para $f\colon A \to B$ y $y \in B$, la preimagen de $y$ se define como $f^{-1}(\{y\}) = \{x \in A \colon
  f(x) = y\}$. A diferencia de la imagen de un elemento (que es única por definición de función), la preimagen
  de un valor puede contener cero, uno o varios elementos.


  ### Desarrollo didáctico


  Buscar la preimagen de $y_0$ equivale a resolver la ecuación $f(x) = y_0$ para la variable $x$.


  Si $f(x) = x^2$ y buscas la preimagen de $9$, resuelves $x^2 = 9$, obteniendo $x = 3$ y $x = -3$: ambos
  valores son preimágenes de $9$. En cambio, la preimagen de $-9$ es el conjunto vacío, porque ningún
  real al cuadrado da un número negativo.'
procedimiento:
- 'Paso 1: Escribe la ecuación $f(x) = y_0$, donde $y_0$ es el valor cuya preimagen buscas.'
- 'Paso 2: Resuelve la ecuación para despejar $x$.'
- 'Paso 3: Verifica que cada solución obtenida pertenezca al dominio de la función.'
- 'Paso 4: El conjunto de soluciones válidas es la preimagen de $y_0$.'
ejemplos:
- titulo: Preimagen con dos soluciones
  enunciado: Si $f(x) = x^2$, determina la preimagen de $16$.
  solucion_pasos:
  - Se resuelve la ecuación $x^2 = 16$.
  - Las soluciones son $x=4$ y $x=-4$.
  - 'Preimagen de $16$: $\{4, -4\}$.'
- titulo: Preimagen vacía
  enunciado: Si $f(x) = x^2$, determina la preimagen de $-4$.
  solucion_pasos:
  - Se resuelve $x^2 = -4$, que no tiene solución en los números reales.
  - 'Preimagen de $-4$: conjunto vacío, $\varnothing$.'
- titulo: ¿Un valor del codominio siempre tiene exactamente una preimagen?
  enunciado: ¿Un valor del codominio siempre tiene exactamente una preimagen?
  respuesta: Falso
  solucion_pasos:
  - La preimagen de un valor puede tener cero, una o varias soluciones, a diferencia de la imagen de un
    elemento del dominio, que sí es única.
- titulo: ¿Calcular la preimagen de $y_0$ equivale a resolver $f(x)=y_0$?
  enunciado: ¿Calcular la preimagen de $y_0$ equivale a resolver $f(x)=y_0$?
  respuesta: Verdadero
  solucion_pasos:
  - Por definición, la preimagen son todos los $x$ que satisfacen esa ecuación.
errores_frecuentes:
- Confundir imagen (siempre única) con preimagen (puede tener varios valores o ninguno).
- Olvidar descartar soluciones de la ecuación $f(x)=y_0$ que no pertenezcan al dominio de $f$.
- Suponer que toda ecuación $f(x)=y_0$ tiene al menos una solución real.
- Calcular $f(y_0)$ en lugar de resolver $f(x)=y_0$ al buscar una preimagen.
