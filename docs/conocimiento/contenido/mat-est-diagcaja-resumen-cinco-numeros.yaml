semantic_id: MAT.EST.DIAGRAMA_CAJA.RESUMEN_CINCO_NUMEROS
titulo: Identificar el resumen de cinco números
objetivo: Identificar los cinco valores que componen el resumen de cinco números de un conjunto de datos.
introduccion: Antes de dibujar un diagrama de caja, necesitas cinco números clave que resumen todo el conjunto de datos,
  como una ficha resumen de la distribución.
resumen: El resumen de cinco números está formado por el valor mínimo, $Q_1$, la mediana ($Q_2$), $Q_3$ y el valor máximo
  de un conjunto de datos.
explicacion: '![Resumen de cinco números](/static/img/estadistica/diagcaja/diagcaja-resumen-cinco-numeros.svg)


  ### Definición formal


  El resumen de cinco números de un conjunto de datos ordenados es la secuencia $\{\text{mínimo}, Q_1, Q_2, Q_3,

  \text{máximo}\}$, base para construir el diagrama de caja y bigotes.


  ### Desarrollo didáctico


  Estos cinco valores permiten reconstruir una imagen general de cómo se distribuyen los datos sin necesidad de listar

  cada observación individual.'
procedimiento:
- 'Paso 1: Ordena los datos de menor a mayor.'
- 'Paso 2: Identifica el valor mínimo y el valor máximo del conjunto.'
- 'Paso 3: Calcula $Q_1$, $Q_2$ (mediana) y $Q_3$.'
ejemplos:
- titulo: Ejemplo 1
  enunciado: Para el conjunto ordenado $\{2, 4, 5, 6, 8, 9, 10\}$, identifica el resumen de cinco números.
  solucion_pasos:
  - 'Mínimo: 2, máximo: 10.'
  - '$Q_2$ (mediana): 6.'
  - '$Q_1$: 4, $Q_3$: 9.'
- titulo: Ejemplo 2
  enunciado: ¿Cuántos valores forman el resumen de cinco números?
  solucion_pasos:
  - Son exactamente cinco valores.
  - 'Mínimo, $Q_1$, $Q_2$, $Q_3$ y máximo.'
- titulo: ¿El resumen de cinco números incluye el valor mínimo y el máximo?
  respuesta: Sí
  solucion_pasos:
  - Sí, ambos extremos forman parte del resumen.
- titulo: ¿El resumen de cinco números incluye la media aritmética?
  respuesta: 'No'
  solucion_pasos:
  - 'No, la media no forma parte del resumen de cinco números; se usan mínimo, cuartiles y máximo.'
errores_frecuentes:
- Confundir el resumen de cinco números con las cinco frecuencias más altas.
- Incluir la media aritmética como parte del resumen.
- Olvidar ordenar los datos antes de calcular los cinco valores.
- Omitir el valor mínimo o máximo del resumen.
- Creer que los cinco valores siempre están separados por la misma distancia numérica.
fuente: 'Elaboración propia (referencia: Moraleja 380).'
estado: publicado
