semantic_id: MAT.ALG.FUNC_CUADR_GRAFICA.CANTIDAD_INTERSECCIONES_X
titulo: Determinación de la cantidad de intersecciones con el eje X usando el discriminante
objetivo: Determinar cuántas veces la gráfica de una función cuadrática interseca al eje $x$, usando el signo
  del discriminante.
introduccion: Sin necesidad de graficar ni calcular explícitamente los ceros, el discriminante ya revela cuántas
  veces la parábola tocará el eje $x$.
resumen: Si $\Delta>0$, la parábola interseca al eje $x$ en **dos puntos**; si $\Delta=0$, lo toca en **un solo
  punto** (tangente); si $\Delta<0$, **no lo interseca** en ningún punto.
explicacion: '### Definición formal


  Para $f(x)=ax^2+bx+c$, el discriminante $\Delta=b^2-4ac$ de la ecuación asociada determina la cantidad de intersecciones
  con el eje $x$: $\Delta>0$ da dos intersecciones distintas; $\Delta=0$ da una única intersección (tangencia);
  $\Delta<0$ da ninguna intersección real.


  ### Desarrollo didáctico


  Este análisis combina el trabajo algebraico del discriminante con su interpretación geométrica directa sobre
  la gráfica, sin necesidad de calcular los ceros de manera explícita.


  Para $f(x)=x^2-4x+4$: $\Delta=16-16=0$, por lo que la parábola es tangente al eje $x$ en un único punto (su
  vértice).'
procedimiento:
- 'Paso 1: Calcula el discriminante $\Delta=b^2-4ac$ de la función.'
- 'Paso 2: Si $\Delta>0$, concluye que hay dos intersecciones con el eje $x$.'
- 'Paso 3: Si $\Delta=0$, concluye que hay una única intersección (tangencia).'
- 'Paso 4: Si $\Delta<0$, concluye que no hay ninguna intersección real con el eje $x$.'
ejemplos:
- titulo: Determinación con discriminante positivo
  enunciado: 'Sin graficar, determina cuántas veces $f(x)=x^2-5x+6$ interseca al eje $x$.'
  solucion_pasos:
  - '$\Delta=25-24=1>0$.'
  - Interseca al eje $x$ en dos puntos distintos.
- titulo: Determinación con discriminante negativo
  enunciado: 'Sin graficar, determina cuántas veces $f(x)=x^2+2x+5$ interseca al eje $x$.'
  solucion_pasos:
  - '$\Delta=4-20=-16<0$.'
  - No interseca al eje $x$ en ningún punto.
- titulo: ¿Un discriminante igual a cero implica que la parábola es tangente al eje $x$?
  enunciado: ¿Un discriminante igual a cero implica que la parábola es tangente al eje $x$?
  respuesta: Sí
  solucion_pasos:
  - La parábola toca al eje $x$ en exactamente un punto, que coincide con el vértice.
- titulo: ¿Una parábola con $\Delta<0$ sigue teniendo gráfica?
  enunciado: ¿Una parábola con $\Delta<0$ sigue teniendo gráfica?
  respuesta: Sí
  solucion_pasos:
  - La parábola existe y se puede graficar; simplemente permanece completamente por encima o por debajo del eje
    $x$.
errores_frecuentes:
- Confundir el signo del discriminante que da dos intersecciones con el que da ninguna.
- Calcular los ceros explícitamente cuando solo se pide la cantidad de intersecciones.
- Confundir "no interseca el eje $x$" con "no tiene gráfica".
- Olvidar que el caso $\Delta=0$ corresponde a tangencia, no a ausencia de intersección.
