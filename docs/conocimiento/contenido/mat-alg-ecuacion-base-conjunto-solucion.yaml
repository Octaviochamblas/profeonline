semantic_id: 'MAT.ALG.ECUACION_BASE.CONJUNTO_SOLUCION'
titulo: 'Conjunto Solución'
objetivo: 'Escribir la respuesta de una ecuación en formato de teoría de conjuntos.'
introduccion: |
  Una vez que atrapas al culpable (la solución), debes encerrarlo en una celda. En matemáticas formales, esa celda se llama 'Conjunto Solución'.
resumen: |
  El Conjunto Solución, denotado usualmente con una $S$, es el grupo de todos los valores que hacen verdadera la ecuación, encerrados entre llaves $\{ \}$.
explicacion: |
  Aunque decir '$x = 5$' es correcto, la notación formal universitaria (y usada en pruebas estandarizadas como PAES) es colocar ese 5 en un conjunto.

  - Si la ecuación es lineal y su respuesta es 5, escribimos: $S = \{5\}$.
  - Si la ecuación es cuadrática y tiene dos respuestas, ej. 3 y -3, escribimos: $S = \{-3, 3\}$.
  - Si una ecuación absurda (ej. $x = x + 1$) resulta NO tener solución, decimos que su conjunto solución es el Conjunto Vacío. Se escribe $S = \emptyset$ o $S = \{\}$.

  Las llaves $\{ \}$ indican que estamos enumerando elementos específicos, a diferencia de los corchetes $[ ]$ que indican un intervalo completo.
procedimiento:
  - 'Paso 1: Resuelve la ecuación para obtener la(s) solución(es).'
  - 'Paso 2: Escribe la letra mayúscula $S$ y un signo igual.'
  - 'Paso 3: Abre llaves $\{$.'
  - 'Paso 4: Escribe tus respuestas dentro, separadas por comas (si hay más de una).'
  - 'Paso 5: Cierra llaves $\}$.'
ejemplos:
  - titulo: 'Ejemplo 1'
    enunciado: 'Expresa la solución de $2x - 4 = 0$ como conjunto solución.'
    solucion_pasos:
    - 'Resolvemos: $2x = 4 \rightarrow x = 2$.'
    - 'Formateamos como conjunto: $S = \{2\}$.'
  - titulo: 'Si una ecuación no tiene solución, ¿cómo se escribe su conjunto solución?'
    respuesta: '$S = \emptyset$'
    solucion_pasos:
    - 'O también S = {}. Simboliza que el conjunto está vacío de respuestas.'
errores_frecuentes:
  - 'Usar paréntesis redondos () o corchetes [] en lugar de llaves {}. En matemáticas esto significa ''intervalo'' y es un grave error conceptual en ecuaciones.'
  - 'Escribir $\{ \emptyset \}$ (esto es un conjunto que contiene al conjunto vacío, no está vacío).'
estado: publicado
