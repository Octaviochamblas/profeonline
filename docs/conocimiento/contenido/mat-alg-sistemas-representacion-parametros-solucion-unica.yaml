semantic_id: MAT.ALG.SISTEMAS_REPRESENTACION.PARAMETROS_SOLUCION_UNICA
titulo: Parámetros para Solución Única
objetivo: Determinar qué valores deben tener los coeficientes para que las rectas se crucen.
introduccion: 'Recuerda: Para que haya solución única, las rectas deben tener pendientes diferentes (deben chocar).
  La forma matemática de verificar esto rápidamente es comparando las fracciones que forman los coeficientes.'
resumen: 'En pruebas PAES es muy común que en lugar de darte todos los números, escondan uno con una letra ''k'',
  por ejemplo: $kx + 2y = 4$ y $3x + 4y = 8$. Y te preguntan: ''¿Qué valor NO puede tomar k para que haya solución
  única?''.'
explicacion: '### Definición formal


  En pruebas PAES es muy común que en lugar de darte todos los números, escondan uno con una letra ''k'', por ejemplo:
  $kx + 2y = 4$ y $3x + 4y = 8$. Y te preguntan: ''¿Qué valor NO puede tomar k para que haya solución única?''.


  ### Desarrollo didáctico


  Recuerda: Para que haya solución única, las rectas deben tener pendientes diferentes (deben chocar). La forma
  matemática de verificar esto rápidamente es comparando las fracciones que forman los coeficientes.


  Regla: Para solución única, la proporción de las ''x'' debe ser distinta a la proporción de las ''y''. Es decir:
  $\frac{A_1}{A_2} \neq \frac{B_1}{B_2}$.

  En nuestro ejemplo: $\frac{k}{3} \neq \frac{2}{4}$. Resuelves y listo: $k \neq 1.5$.'
procedimiento:
- Identifica los coeficientes que acompañan a 'x' ($A_1, A_2$) y los que acompañan a 'y' ($B_1, B_2$).
- 'Plantea la inecuación de que la división de las ''x'' sea DISTINTA a la división de las ''y'': $\frac{A_1}{A_2}
  \neq \frac{B_1}{B_2}$.'
- Despeja el parámetro desconocido ('k') como si fuera una ecuación normal.
