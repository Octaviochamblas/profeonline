  enunciado: 'Respecto de «Condición paramétrica para solución única en un sistema 2x2»: ¿La siguiente conclusión
    es correcta? «Puede omitirse esta condición sin cambiar el resultado: «Identifica los coeficientes que acompañan
    a ''x'' ($A_1, A_2$) y los que acompañan a ''y'' ($B_1, B_2$)»»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: En pruebas PAES es muy común que en lugar de darte todos los
    números, escondan uno con una letra ''k'', por ejemplo: $kx + 2y = 4$ y $3x + 4y = 8$.'
