semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.DIVISION
titulo: División de fracciones
objetivo: Dividir una fracción por otra usando el inverso multiplicativo.
introduccion: 'Dividir por una fracción no es un procedimiento nuevo: equivale a multiplicar por su inverso
  multiplicativo, lo que reduce la división a una multiplicación ya conocida.'
resumen: Para dividir dos fracciones se multiplica la primera por el inverso multiplicativo de la segunda.
explicacion: '### Definición formal


  \(\frac{a}{b}\div\frac{c}{d}=\frac{a}{b}\cdot\frac{d}{c}\), pues dividir por \(\frac{c}{d}\) equivale
  a multiplicar por su inverso \(\frac{d}{c}\), ya que \(\frac{c}{d}\cdot\frac{d}{c}=1\).


  ### Desarrollo didáctico


  \(\frac{2}{5}\div\frac{3}{4}\): se multiplica \(\frac{2}{5}\) por el inverso de \(\frac{3}{4}\), que
  es \(\frac{4}{3}\), obteniendo \(\frac{2}{5}\cdot\frac{4}{3}=\frac{8}{15}\).'
procedimiento:
- 'Paso 1: Comprueba que la fracción divisora sea distinta de cero.'
- 'Paso 2: Conserva el dividendo, invierte el divisor y cambia división por multiplicación.'
- 'Paso 3: Multiplica, simplifica y verifica el resultado con la operación inversa.'
ejemplos:
- titulo: Aplicación razonada — División de fracciones como multiplicación por el recíproco
  enunciado: \(\frac{2}{5}\div\frac{3}{4}=\frac{2}{5}\cdot\frac{4}{3}=\frac{8}{15}\).
  solucion_pasos:
  - Comprueba que la fracción divisora sea distinta de cero.
  - Conserva el dividendo, invierte el divisor y cambia división por multiplicación.
  - Multiplica, simplifica y verifica el resultado con la operación inversa.
- titulo: Revisión de una solución — División de fracciones como multiplicación por el recíproco
  enunciado: Una solución aplica “Conserva el dividendo, invierte el divisor y cambia división por multiplicación.”,
    pero termina sin comprobar que el divisor debe ser distinto de cero para que la división exista. Determina
    qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define división de fracciones como multiplicación por el recíproco: dividir
    por una fracción equivale a multiplicar por su recíproco.'
  - Comprueba que la fracción divisora sea distinta de cero.
  - 'Completa la revisión con este control: Multiplica, simplifica y verifica el resultado con la operación
    inversa.'
- titulo: ¿Se cumple que el divisor debe ser distinto de cero para que la división exista? — División
    de fracciones como multiplicación por el recíproco
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que dividir por una fracción equivale a multiplicar por su
    recíproco.
  - El caso “\(\frac{2}{5}\div\frac{3}{4}=\frac{2}{5}\cdot\frac{4}{3}=\frac{8}{15}\)” satisface esa condición.
  - Multiplica, simplifica y verifica el resultado con la operación inversa.
- titulo: ¿Es válido omitir el paso “Comprueba que la fracción divisora sea distinta de cero”? — División
    de fracciones como multiplicación por el recíproco
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de división de fracciones como multiplicación por el
    recíproco.
  - 'Omitirlo puede volver inválida la acción siguiente: Conserva el dividendo, invierte el divisor y
    cambia división por multiplicación.'
  - 'La solución debe terminar de este modo: Multiplica, simplifica y verifica el resultado con la operación
    inversa.'
errores_frecuentes:
- 'Empezar división de fracciones como multiplicación por el recíproco sin realizar este control inicial:
  Comprueba que la fracción divisora sea distinta de cero.'
- Memorizar “\(\frac{2}{5}\div\frac{3}{4}=\frac{2}{5}\cdot\frac{4}{3}=\frac{8}{15}\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Conserva el dividendo, invierte el divisor y cambia división por multiplicación.”
  y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre división de fracciones como multiplicación por el recíproco que
  contradice el criterio “El divisor debe ser distinto de cero para que la división exista”.
- 'Cerrar el ejercicio sin esta comprobación específica: Multiplica, simplifica y verifica el resultado
  con la operación inversa.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números racionales.
