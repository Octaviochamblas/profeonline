semantic_id: MAT.NUM.FRACCIONES_OPERATORIA.DIVISION
objetivo: Dividir fracciones mediante el recíproco.
introduccion: La afirmación “El divisor debe ser distinto de cero para que la división
  exista” se puede comprobar en \(\frac{2}{5}\div\frac{3}{4}=\frac{2}{5}\cdot\frac{4}{3}=\frac{8}{15}\).
  Este recurso desarrolla el razonamiento de división de fracciones como multiplicación
  por el recíproco que conecta ambas ideas.
resumen: Dividir por una fracción equivale a multiplicar por su recíproco. Como criterio
  de control, el divisor debe ser distinto de cero para que la división exista
explicacion: |-
  Dividir por una fracción equivale a multiplicar por su recíproco.

  Para analizar “\(\frac{2}{5}\div\frac{3}{4}=\frac{2}{5}\cdot\frac{4}{3}=\frac{8}{15}\)” se identifican los datos, se aplica la definición y se controla el resultado mediante la idea “El divisor debe ser distinto de cero para que la división exista”.
procedimiento:
- 'Paso 1: Comprueba que la fracción divisora sea distinta de cero.'
- 'Paso 2: Conserva el dividendo, invierte el divisor y cambia división por multiplicación.'
- 'Paso 3: Multiplica, simplifica y verifica el resultado con la operación inversa.'
ejemplos:
- titulo: Aplicación razonada — División de fracciones como multiplicación por el
    recíproco
  enunciado: \(\frac{2}{5}\div\frac{3}{4}=\frac{2}{5}\cdot\frac{4}{3}=\frac{8}{15}\).
  solucion_pasos:
  - Comprueba que la fracción divisora sea distinta de cero.
  - Conserva el dividendo, invierte el divisor y cambia división por multiplicación.
  - Multiplica, simplifica y verifica el resultado con la operación inversa.
- titulo: Revisión de una solución — División de fracciones como multiplicación por
    el recíproco
  enunciado: Una solución aplica “Conserva el dividendo, invierte el divisor y cambia
    división por multiplicación.”, pero termina sin comprobar que el divisor debe
    ser distinto de cero para que la división exista. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define división de fracciones como multiplicación por
    el recíproco: dividir por una fracción equivale a multiplicar por su recíproco.'
  - Comprueba que la fracción divisora sea distinta de cero.
  - 'Completa la revisión con este control: Multiplica, simplifica y verifica el resultado
    con la operación inversa.'
- titulo: ¿Se cumple que el divisor debe ser distinto de cero para que la división
    exista? — División de fracciones como multiplicación por el recíproco
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que dividir por una fracción equivale a
    multiplicar por su recíproco.
  - El caso “\(\frac{2}{5}\div\frac{3}{4}=\frac{2}{5}\cdot\frac{4}{3}=\frac{8}{15}\)”
    satisface esa condición.
  - Multiplica, simplifica y verifica el resultado con la operación inversa.
- titulo: ¿Es válido omitir el paso “Comprueba que la fracción divisora sea distinta
    de cero”? — División de fracciones como multiplicación por el recíproco
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de división de fracciones como
    multiplicación por el recíproco.
  - 'Omitirlo puede volver inválida la acción siguiente: Conserva el dividendo, invierte
    el divisor y cambia división por multiplicación.'
  - 'La solución debe terminar de este modo: Multiplica, simplifica y verifica el
    resultado con la operación inversa.'
errores_frecuentes:
- 'Empezar división de fracciones como multiplicación por el recíproco sin realizar
  este control inicial: Comprueba que la fracción divisora sea distinta de cero.'
- Memorizar “\(\frac{2}{5}\div\frac{3}{4}=\frac{2}{5}\cdot\frac{4}{3}=\frac{8}{15}\)”
  como respuesta aislada, sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Conserva el dividendo, invierte el divisor y cambia
  división por multiplicación.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre división de fracciones como multiplicación por
  el recíproco que contradice el criterio “El divisor debe ser distinto de cero para
  que la división exista”.
- 'Cerrar el ejercicio sin esta comprobación específica: Multiplica, simplifica y
  verifica el resultado con la operación inversa.'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
