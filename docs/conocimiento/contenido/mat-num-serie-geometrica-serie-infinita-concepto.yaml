semantic_id: MAT.NUM.SERIE_GEOMETRICA.SERIE_INFINITA_CONCEPTO
objetivo: Comprender la convergencia y calcular el límite de una serie geométrica
  infinita decreciente.
introduccion: Si sumas números positivos para siempre, el resultado debería ser infinito,
  ¿verdad? ¡Sorpresa matemática! Si los números se achican lo suficientemente rápido,
  sumar infinitos números te dará un total pequeño y cerrado. Rompamos la mente con
  el infinito.
resumen: 'Una serie geométrica se puede sumar hasta el INFINITO solo si su razón es
  una fracción estricta ($-1 < r < 1$). La suma total de infinitos términos converge
  a una simple fórmula mágica: $S_{\infty} = \frac{a_1}{1 - r}$.'
explicacion: 'Imagina que caminas hacia la pared. Primero avanzas 1 metro, luego medio
  metro, luego un cuarto de metro, luego un octavo... Si haces esto infinitas veces,
  ¡nunca superarás los 2 metros totales! Te estancarás (convergerás) en 2 metros exactos.


  Para que la magia del infinito funcione:

  1. La razón debe ser **menor a 1 y mayor a -1** (Ej: $r = 1/2, r = -0.3, r = 2/3$).
  Si $r=2$, los números crecen y la suma sí explota al infinito.

  2. La fórmula de suma infinita colapsa a la mínima expresión matemática:

  $$S_{\infty} = \frac{a_1}{1 - r}$$


  Es tan simple porque el término enorme $(r^n)$ de la fórmula antigua, al ser ''r''
  una fracción minúscula elevada al infinito, se vuelve prácticamente CERO, desapareciendo
  de la ecuación.'
procedimiento:
- 'Paso 1: Revisa que la razón ''r'' esté entre -1 y 1 (obligatorio).'
- 'Paso 2: Identifica el primer término ($a_1$).'
- 'Paso 3: Resta (1 - r) para el denominador.'
- 'Paso 4: Divide $a_1$ por ese denominador. El resultado es el techo máximo al que
  llegará la suma infinita.'
ejemplos:
- titulo: Sumando polvo de estrellas
  enunciado: Calcula el total de la suma infinita de 100 + 50 + 25 + 12.5 + ...
  solucion_pasos:
  - a1 = 100. La razón es 0.5 (o 1/2).
  - Como 0.5 está entre -1 y 1, SÍ se puede calcular.
  - S_inf = 100 / (1 - 0.5)
  - S_inf = 100 / 0.5
  - S_inf = 200.
  - Sumar infinitos términos de esta secuencia dará exactamente 200.
errores_frecuentes:
- Intentar aplicar la fórmula del infinito a una progresión creciente donde $r>1$
  (esto te dará un número negativo absurdo, cuando en realidad la suma es matemáticamente
  'Infinito').
- 'Equivocarse en la resta del denominador cuando $r$ es negativa, olvidando la regla
  de signos: $1 - (-0.5) = 1.5$.'
fuente: Currículum Nacional MINEDUC.
estado: publicado
