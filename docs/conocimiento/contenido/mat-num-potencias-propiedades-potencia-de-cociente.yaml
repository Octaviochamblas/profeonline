semantic_id: MAT.NUM.POTENCIAS_PROPIEDADES.POTENCIA_DE_COCIENTE
objetivo: Distribuir una potencia sobre un cociente.
introduccion: La barra de fracción agrupa dos cantidades en una sola base. Al repetir
  ese cociente, numeradores y denominadores forman productos paralelos.
resumen: 'La potencia de un cociente se aplica al numerador y al denominador: \((a/b)^n=a^n/b^n\).
  El denominador debe ser no nulo y recibe el mismo exponente que el numerado.'
explicacion: |-
  La potencia de un cociente se aplica al numerador y al denominador: \((a/b)^n=a^n/b^n\).

  Al analizar “\(\left(\frac34\right)^2=\frac9{16}\)” conviene observar la conexión siguiente: el denominador debe ser no nulo y recibe el mismo exponente que el numerado
procedimiento:
- 'Paso 1: Verifica que el denominador sea distinto de cero y que la fracción completa
  sea la base.'
- 'Paso 2: Eleva numerador y denominador al exponente exterior.'
- 'Paso 3: Simplifica la fracción y contrasta con la multiplicación repetida del cociente.'
ejemplos:
- titulo: Aplicación razonada — Potencia de un cociente
  enunciado: \(\left(\frac34\right)^2=\frac9{16}\).
  solucion_pasos:
  - Verifica que el denominador sea distinto de cero y que la fracción completa sea
    la base.
  - Eleva numerador y denominador al exponente exterior.
  - Simplifica la fracción y contrasta con la multiplicación repetida del cociente.
- titulo: Revisión de una solución — Potencia de un cociente
  enunciado: Una solución aplica “Eleva numerador y denominador al exponente exterior.”,
    pero termina sin comprobar que el denominador debe ser no nulo y recibe el mismo
    exponente que el numerado. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define potencia de un cociente: la potencia de un cociente
    se aplica al numerador y al denominador: \((a/b)^n=a^n/b^n\).'
  - Verifica que el denominador sea distinto de cero y que la fracción completa sea
    la base.
  - 'Completa la revisión con este control: Simplifica la fracción y contrasta con
    la multiplicación repetida del cociente.'
- titulo: ¿Se cumple que el denominador debe ser no nulo y recibe el mismo exponente
    que el numerado? — Potencia de un cociente
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La definición pertinente establece que la potencia de un cociente se aplica
    al numerador y al denominador: \((a/b)^n=a^n/b^n\).'
  - El caso “\(\left(\frac34\right)^2=\frac9{16}\)” satisface esa condición.
  - Simplifica la fracción y contrasta con la multiplicación repetida del cociente.
- titulo: ¿Es válido omitir el paso “Verifica que el denominador sea distinto de cero
    y que la fracción completa sea la base”? — Potencia de un cociente
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de potencia de un cociente.
  - 'Omitirlo puede volver inválida la acción siguiente: Eleva numerador y denominador
    al exponente exterior.'
  - 'La solución debe terminar de este modo: Simplifica la fracción y contrasta con
    la multiplicación repetida del cociente.'
errores_frecuentes:
- 'Confundir potencia de un cociente con otro concepto y omitir este inicio: Verifica
  que el denominador sea distinto de cero y que la fracción completa sea la base.'
- Aplicar mecánicamente “Eleva numerador y denominador al exponente exterior.” sin
  revisar las condiciones de la definición.
- Tomar “\(\left(\frac34\right)^2=\frac9{16}\)” como una igualdad aislada, sin explicar
  por qué es válida.
- Aceptar una respuesta que contradice la idea clave “el denominador debe ser no nulo
  y recibe el mismo exponente que el numerado”.
- 'Terminar el desarrollo sin realizar este control: Simplifica la fracción y contrasta
  con la multiplicación repetida del cociente.'
fuente: Currículum Nacional MINEDUC — Matemática, números reales, potencias, raíces,
  logaritmos y complejos.
