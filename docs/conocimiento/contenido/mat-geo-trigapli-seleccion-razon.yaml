semantic_id: MAT.GEO.TRIG_APLICACIONES.SELECCION_RAZON_TRIGONOMETRICA
titulo: Selección de la razón trigonométrica adecuada según los datos del problema
objetivo: Elegir correctamente entre seno, coseno o tangente según cuáles de los tres lados del triángulo
  rectángulo (opuesto, adyacente, hipotenusa) son datos conocidos y cuál es la incógnita.
introduccion: 'Una vez modelado el triángulo rectángulo, el paso siguiente es decidir qué razón trigonométrica
  conviene usar, lo que depende exclusivamente de qué dos lados (o qué lado y qué ángulo) están involucrados:
  los conocidos y el que se busca.'
resumen: La selección de la razón trigonométrica adecuada consiste en identificar, de los tres lados del
  triángulo rectángulo (opuesto, adyacente e hipotenusa), cuáles corresponden a datos conocidos y cuál
  a la incógnita, y elegir sinθ, cosθ o tanθ según correspondan a esos dos lados.
explicacion: '![Selección de la razón trigonométrica](/static/img/geometria/trigonometria/trigapli-seleccion-razon.svg)


  ### Definición formal


  Si los datos involucran el cateto opuesto y la hipotenusa, se usa $\sin\theta$. Si involucran el cateto
  adyacente y la hipotenusa, se usa $\cos\theta$. Si involucran el cateto opuesto y el cateto adyacente
  (sin la hipotenusa), se usa $\tan\theta$.


  ### Desarrollo didáctico


  Por ejemplo, si se conoce la hipotenusa y se busca el cateto opuesto, se debe usar $\sin\theta=\dfrac{\text{opuesto}}{\text{hipotenusa}}$,
  despejando el opuesto. En cambio, si se conocen ambos catetos, no es necesario usar razones trigonométricas
  para encontrar el tercer lado directamente, aunque sí para encontrar el ángulo mediante $\tan\theta=\dfrac{\text{opuesto}}{\text{adyacente}}$.'
procedimiento:
- 'Paso 1: Identifica, respecto del ángulo dado, cuáles de los tres lados (opuesto, adyacente, hipotenusa)
  son datos conocidos y cuál es la incógnita.'
- 'Paso 2: Si los dos lados involucrados son opuesto e hipotenusa, usa seno; si son adyacente e hipotenusa,
  usa coseno; si son opuesto y adyacente, usa tangente.'
- 'Paso 3: Plantea la ecuación con la razón elegida y despeja la incógnita.'
ejemplos:
- titulo: Elegir la razón cuando se conoce la hipotenusa y se busca el cateto opuesto
  enunciado: Se conoce la hipotenusa (10 m) y el ángulo (θ), y se busca el cateto opuesto.
  solucion_pasos:
  - Como los lados involucrados son opuesto e hipotenusa, se usa sinθ=opuesto/10, despejando opuesto=10×sinθ.
- titulo: Elegir la razón cuando se conocen ambos catetos y se busca el ángulo
  enunciado: El cateto opuesto mide 8 m y el adyacente mide 6 m; se busca el ángulo θ.
  solucion_pasos:
  - Como los lados involucrados son opuesto y adyacente, se usa tanθ=8/6, y luego θ=arctan(8/6).
- titulo: ¿Se debe usar coseno cuando los datos son el cateto adyacente y la hipotenusa?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque cosθ se define exactamente como adyacente sobre hipotenusa.
- titulo: ¿Se puede usar cualquier razón trigonométrica indistintamente en un mismo problema?
  respuesta: 'No'
  solucion_pasos:
  - No, la razón adecuada depende de qué lados están involucrados como datos e incógnita.
errores_frecuentes:
- Elegir una razón trigonométrica sin antes identificar qué lados son dato y cuál es incógnita.
- Confundir cuál lado es el cateto opuesto y cuál el adyacente respecto del ángulo dado.
- Usar tangente cuando uno de los datos es la hipotenusa (situación en la que corresponde seno o coseno).
fuente: 'Elaboración propia (referencias: Moraleja 183, Cid 155).'
estado: publicado
