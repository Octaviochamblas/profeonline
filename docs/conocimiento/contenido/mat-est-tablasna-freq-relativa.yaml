semantic_id: MAT.EST.TABLAS_NO_AGRUPADAS.FREQ_RELATIVA
titulo: Calcular la frecuencia relativa
objetivo: Calcular la frecuencia relativa (fr) de un valor como el cociente entre su frecuencia absoluta
  y el número total de datos.
introduccion: La frecuencia relativa permite comparar la importancia proporcional de un valor, independientemente
  del tamaño total del conjunto de datos.
resumen: La frecuencia relativa de un valor es el cociente entre su frecuencia absoluta y el número total
  de datos, expresado usualmente como decimal.
explicacion: '![Frecuencia relativa](/static/img/estadistica/tablasna/tablasna-freq-relativa.svg)


  ### Definición formal


  $fr_i=\dfrac{f_i}{n}$, donde $f_i$ es la frecuencia absoluta del valor y $n$ es el total de datos del
  conjunto.


  ### Desarrollo didáctico


  Si el valor 6 tiene frecuencia absoluta 3 en un conjunto de 10 datos totales, su frecuencia relativa
  es $fr=3/10=0{,}3$.'
procedimiento:
- 'Paso 1: Identifica la frecuencia absoluta (f) del valor en cuestión.'
- 'Paso 2: Identifica el número total de datos (n) del conjunto.'
- 'Paso 3: Divide f por n para obtener la frecuencia relativa.'
ejemplos:
- titulo: Calcular la frecuencia relativa del valor 6
  enunciado: f(6)=3, n=10.
  solucion_pasos:
  - fr=3/10=0,3.
- titulo: Calcular la frecuencia relativa del valor 2 hijos
  enunciado: f(2)=5, n=20.
  solucion_pasos:
  - fr=5/20=0,25.
- titulo: ¿La suma de todas las frecuencias relativas de un conjunto es igual a 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que cada frecuencia relativa representa una proporción del total, y todas juntas cubren el
    100%.
- titulo: ¿La frecuencia relativa puede ser mayor que 1?
  respuesta: 'No'
  solucion_pasos:
  - No, ya que representa una proporción del total de datos, que como máximo puede ser 1 (100%).
errores_frecuentes:
- Dividir en el orden incorrecto (n/f en vez de f/n).
- Olvidar que la frecuencia relativa siempre debe estar entre 0 y 1.
- No verificar que la suma de todas las frecuencias relativas sea igual a 1.
fuente: 'Elaboración propia (referencia: Moraleja 198, 351).'
estado: publicado
