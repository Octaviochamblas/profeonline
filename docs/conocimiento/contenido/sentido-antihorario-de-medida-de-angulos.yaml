semantic_id: MAT.GEO.ANGULOS_FUNDAMENTOS.SENTIDO_ANTIHORARIO
titulo: Sentido antihorario de medida de ángulos
objetivo: Interpretar el sentido antihorario al leer una medida angular y comprobar que el sentido de
  recorrido determina qué abertura se está midiendo.
introduccion: Un reloj gira en sentido horario, pero en geometría la lectura positiva de los ángulos se
  hace al revés. Ese acuerdo evita ambigüedades al medir.
resumen: Por convenio, la medida positiva de un ángulo se lee desde el lado inicial hacia el lado final
  en sentido antihorario. Como idea de control, el sentido de recorrido determina qué abertura se está
  midiendo.
explicacion: 'Por convenio, la medida positiva de un ángulo se lee desde el lado inicial hacia el lado
  final en sentido antihorario.


  La situación “desde un rayo horizontal hacia la derecha hasta uno vertical hacia arriba se recorre una
  abertura de 90° en sentido antihorario” muestra cómo pasar del dibujo a una conclusión válida: primero
  se identifica la relación correcta y luego se verifica que el sentido de recorrido determina qué abertura
  se está midiendo.'
procedimiento:
- 'Paso 1: Ubica cuál es el lado inicial y cuál es el lado final del ángulo.'
- 'Paso 2: Recorre mentalmente la abertura en sentido contrario al movimiento del reloj.'
- 'Paso 3: Verifica que la medida obtenida corresponda al recorrido elegido y no al complementario.'
ejemplos:
- titulo: Caso guiado — Sentido antihorario
  enunciado: Desde un rayo horizontal hacia la derecha hasta uno vertical hacia arriba se recorre una
    abertura de 90° en sentido antihorario.
  solucion_pasos:
  - Ubica cuál es el lado inicial y cuál es el lado final del ángulo.
  - Recorre mentalmente la abertura en sentido contrario al movimiento del reloj.
  - Verifica que la medida obtenida corresponda al recorrido elegido y no al complementario.
- titulo: Corrección de una respuesta — Sentido antihorario
  enunciado: 'Revisa una solución del caso “desde un rayo horizontal hacia la derecha hasta uno vertical
    hacia arriba se recorre una abertura de 90° en sentido antihorario”: el resultado parece razonable,
    pero falta conectar el dibujo con la definición. Explica esa conexión.'
  solucion_pasos:
  - 'Parte de la definición: por convenio, la medida positiva de un ángulo se lee desde el lado inicial
    hacia el lado final en sentido antihorario.'
  - Recorre mentalmente la abertura en sentido contrario al movimiento del reloj.
  - Verifica que la medida obtenida corresponda al recorrido elegido y no al complementario.
- titulo: ¿La interpretación del dibujo es válida? — Sentido antihorario
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: por convenio, la medida positiva de un ángulo
    se lee desde el lado inicial hacia el lado final en sentido antihorario.'
  - En el caso “desde un rayo horizontal hacia la derecha hasta uno vertical hacia arriba se recorre una
    abertura de 90° en sentido antihorario” se observa que el sentido de recorrido determina qué abertura
    se está midiendo.
  - Verifica que la medida obtenida corresponda al recorrido elegido y no al complementario.
- titulo: ¿Alcanza con una lectura rápida del esquema? — Sentido antihorario
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de sentido antihorario de medida de ángulos.
  - Después del paso “Ubica cuál es el lado inicial y cuál es el lado final del ángulo.” todavía hace
    falta revisar “Recorre mentalmente la abertura en sentido contrario al movimiento del reloj.”.
  - El cierre correcto exige “Verifica que la medida obtenida corresponda al recorrido elegido y no al
    complementario.”.
errores_frecuentes:
- Sentido antihorario significa medir siempre por el camino más corto, aunque el convenio indique otro
  sentido.
- Para resolver sentido antihorario, basta con el paso “Ubica cuál es el lado inicial y cuál es el lado
  final del ángulo.” y no hace falta revisar “Recorre mentalmente la abertura en sentido contrario al
  movimiento del reloj.”.
- Si el dibujo parece claro, se puede ignorar que el sentido de recorrido determina qué abertura se está
  midiendo.
- Dos configuraciones distintas representan sentido antihorario solo porque contienen la palabra 'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Verifica que la medida obtenida corresponda
  al recorrido elegido y no al complementario.”.
fuente: Currículum Nacional MINEDUC — Geometría plana, ángulos, relaciones y paralelismo.
estado: publicado
