semantic_id: MAT.ALG.FUNC_EXPONENCIAL_GRAFICA.MODELO_CRECIMIENTO
titulo: Modelamiento de crecimiento poblacional mediante funciones exponenciales
objetivo: Plantear y resolver problemas de crecimiento poblacional (o similar) usando funciones exponenciales.
introduccion: Poblaciones de bacterias, animales o incluso usuarios de una aplicación suelen crecer multiplicándose
  por un mismo factor en cada período de tiempo, un comportamiento que se ajusta exactamente al modelo exponencial.
resumen: Un modelo de crecimiento poblacional se expresa como $P(t)=P_0\cdot(1+r)^t$, donde $P_0$ es la población
  inicial, $r$ es la tasa de crecimiento (como decimal) y $t$ es el tiempo transcurrido.
explicacion: '### Definición formal


  Un fenómeno de crecimiento que aumenta una tasa fija $r$ (expresada como decimal) por cada unidad de tiempo
  se modela como $P(t)=P_0\cdot(1+r)^t$, donde $P_0=P(0)$ es la población inicial y la base $b=1+r>1$ garantiza
  crecimiento.


  ### Desarrollo didáctico


  Para plantear el modelo, se identifica la población inicial y la tasa de crecimiento porcentual, convirtiendo
  esta última a su forma decimal y sumándola a 1 para obtener la base.


  Una población de $200$ conejos crece a una tasa del $8\%$ anual: el modelo es $P(t)=200\cdot(1{,}08)^t$, con
  $P_0=200$ y base $b=1+0{,}08=1{,}08$.'
procedimiento:
- 'Paso 1: Identifica la población inicial $P_0$ y la tasa de crecimiento porcentual $r\%$.'
- 'Paso 2: Convierte la tasa a decimal y calcula la base $b=1+r$.'
- 'Paso 3: Plantea el modelo $P(t)=P_0\cdot b^t$.'
- 'Paso 4: Evalúa el modelo en el tiempo solicitado para responder la pregunta del problema.'
ejemplos:
- titulo: Planteamiento de un modelo de crecimiento poblacional
  enunciado: 'Una población de $500$ bacterias crece a una tasa del $20\%$ por hora. Plantea el modelo y calcula
    la población después de $3$ horas.'
  solucion_pasos:
  - 'Modelo: $P(t)=500\cdot(1{,}2)^t$.'
  - '$P(3)=500\cdot(1{,}2)^3=500\cdot1{,}728=864$.'
- titulo: Cálculo con crecimiento poblacional dado por duplicación
  enunciado: 'Una colonia de $50$ hormigas se duplica cada semana. Plantea el modelo y calcula la población después
    de $4$ semanas.'
  solucion_pasos:
  - 'Duplicarse corresponde a base $2$: $P(t)=50\cdot2^t$.'
  - '$P(4)=50\cdot16=800$ hormigas.'
- titulo: ¿La base de un modelo de crecimiento con tasa $r\%$ es siempre $1+r$ (en decimal)?
  enunciado: ¿La base de un modelo de crecimiento con tasa $r\%$ es siempre $1+r$ (en decimal)?
  respuesta: Sí
  solucion_pasos:
  - Sumar 1 a la tasa decimal representa el 100% original más el porcentaje de crecimiento adicional.
- titulo: ¿Un crecimiento "que se duplica cada período" corresponde a una base igual a 2?
  enunciado: ¿Un crecimiento "que se duplica cada período" corresponde a una base igual a 2?
  respuesta: Sí
  solucion_pasos:
  - Duplicarse significa multiplicar por 2 en cada unidad de tiempo, lo que corresponde exactamente a $b=2$.
errores_frecuentes:
- Olvidar convertir la tasa porcentual a decimal antes de sumarla a 1.
- Confundir la tasa de crecimiento $r$ con la base $b=1+r$ del modelo.
- Usar directamente el porcentaje (por ejemplo, 20) en vez de su forma decimal (0,2) al construir la base.
- No identificar correctamente la población inicial cuando el problema la describe de forma indirecta.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
