semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.RAZON_COMPARACION
objetivo: Traducir una razón como una comparación por cociente entre dos cantidades.
introduccion: Si en un salón hay 2 niños por cada 3 niñas, no sabemos cuántos alumnos hay en total. Solo sabemos
  la proporción o el 'ritmo' de la mezcla. Esa es la relación algebraica de la razón.
resumen: Una **Razón** es una comparación entre dos cantidades mediante una división. Se traduce algebraicamente
  de la misma forma que un cociente ($\frac{a}{b}$) o usando el símbolo de proporción ($a:b$).
explicacion: '### Definición formal


  La palabra ''razón'' en este contexto significa proporción geométrica, es decir, un cociente que compara dos tamaños.


  ### Desarrollo didáctico


  Palabras clave:

  - La razón entre

  - La relación entre

  - Está en proporción de

  - Es a (ej: ''x es a y'')


  Ejemplos:

  - ''La razón entre hombres y mujeres es de 2 a 3'': Se traduce como $\frac{H}{M} = \frac{2}{3}$

  - ''El peso de A y el peso de B están en razón de 5 a 1'': $\frac{A}{B} = \frac{5}{1}$


  El orden de aparición en el enunciado dicta estrictamente el orden en la fracción. El primero nombrado va al numerador
  (arriba), y el segundo al denominador (abajo).'
procedimiento:
- 'Paso 1: Identifica las dos variables que se están comparando.'
- 'Paso 2: Construye la fracción con la primera variable arriba y la segunda abajo.'
- 'Paso 3: Si el problema te da los números de la proporción (ej. ''es de 3 a 4''), iguala la fracción de las variables
  a la fracción numérica (3/4).'
ejemplos:
- titulo: Comparando pesos
  enunciado: 'Traduce algebraicamente: ''La razón entre la masa de Júpiter y la masa de la Tierra es de 318 a 1''.'
  solucion_pasos:
  - Las variables son masa de Júpiter (J) y masa de la Tierra (T).
  - El texto dice 'La razón entre Júpiter y la Tierra'. Formamos la fracción J/T.
  - La proporción numérica es '318 a 1', formando la fracción 318/1.
  - 'Igualamos: J/T = 318/1.'
- titulo: Un nutricionista indica que 'en esta dieta, la razón entre gramos de proteínas ($P$) y gramo
  enunciado: 'Un nutricionista indica que ''en esta dieta, la razón entre gramos de proteínas ($P$) y gramos de
    carbohidratos ($C$) debe ser de uno a tres''. Si el paciente arma su plan alimenticio usando la ecuación $P
    = 3C$, ¿está cumpliendo la instrucción del nutricionista? (v1)


    Opciones: A) No, la ecuación del paciente indica que las proteínas son el triple de los carbohidratos, mientras
    que la razón original $\frac{P}{C} = \frac{1}{3}$ exige que los carbohidratos sean el triple ($C = 3P$). · B)
    Sí, porque en una razón el orden de los números no importa, $1$ a $3$ es lo mismo que $3$ a $1$. · C) Sí, porque
    al multiplicar cruzado $\frac{P}{C} = \frac{1}{3}$ resulta en $P = 3C$. · D) No, porque no debió usar ecuaciones
    lineales sino logaritmos para las dietas.'
  solucion_pasos:
  - 'Traducción original: P/C = 1/3. Al multiplicar cruzado (propiedad de las proporciones): $3P = 1C \rightarrow
    C = 3P$. El paciente se equivocó e invirtió la proporción, comiendo un exceso peligroso de proteínas.'
  - 'Respuesta: No, la ecuación del paciente indica que las proteínas son el triple de los carbohidratos, mientras
    que la razón original $\frac{P}{C} = \frac{1}{3}$ exige que los carbohidratos sean el triple ($C = 3P$).'
- titulo: 'Respecto de «Traducción de una razón como comparación entre cantidades»: ¿Se ajusta a la def'
  enunciado: 'Respecto de «Traducción de una razón como comparación entre cantidades»: ¿Se ajusta a la definición
    esta afirmación? «Una **Razón** es una comparación entre dos cantidades mediante una división»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Una **Razón** es una comparación entre dos cantidades mediante
    una división.'
- titulo: 'Respecto de «Traducción de una razón como comparación entre cantidades»: ¿Es compatible con'
  enunciado: 'Respecto de «Traducción de una razón como comparación entre cantidades»: ¿Es compatible con el procedimiento
    esta afirmación? «Invertir el orden de las variables al construir la fracción. (Ej: ''La razón entre oro y plata
    es 1 a 2'', traducido erróneamente como $\frac{P}{O} = \frac{1}{2}$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Una **Razón** es una comparación entre dos cantidades mediante
    una división.'
errores_frecuentes:
- 'Invertir el orden de las variables al construir la fracción. (Ej: ''La razón entre oro y plata es 1 a 2'', traducido
  erróneamente como $\frac{P}{O} = \frac{1}{2}$).'
- Confundir la 'razón geométrica' (división) con la 'razón aritmética' (resta). En álgebra básica, 'razón' a secas
  siempre implica división.
- Una suma entre las dos variables ($A + B$).
- Una resta, donde a la mayor se le quita la menor.
- Una multiplicación directa ($A \cdot B$).
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción de una razón como comparación entre cantidades
