semantic_id: MAT.ALG.LENGUAJE_OPERACIONES.RAZON_COMPARACION
objetivo: Traducir una razón como una comparación por cociente entre dos cantidades.
introduccion: Si en un salón hay 2 niños por cada 3 niñas, no sabemos cuántos alumnos
  hay en total. Solo sabemos la proporción o el 'ritmo' de la mezcla. Esa es la magia
  de la razón.
resumen: Una **Razón** es una comparación entre dos cantidades mediante una división.
  Se traduce algebraicamente de la misma forma que un cociente ($\frac{a}{b}$) o usando
  el símbolo de proporción ($a:b$).
explicacion: 'Palabras clave:

  - La razón entre

  - La relación entre

  - Está en proporción de

  - Es a (ej: ''x es a y'')


  Ejemplos:

  - ''La razón entre hombres y mujeres es de 2 a 3'': Se traduce como $\frac{H}{M}
  = \frac{2}{3}$

  - ''El peso de A y el peso de B están en razón de 5 a 1'': $\frac{A}{B} = \frac{5}{1}$


  El orden de aparición en el enunciado dicta estrictamente el orden en la fracción.
  El primero nombrado va al numerador (arriba), y el segundo al denominador (abajo).'
procedimiento:
- 'Paso 1: Identifica las dos variables que se están comparando.'
- 'Paso 2: Construye la fracción con la primera variable arriba y la segunda abajo.'
- 'Paso 3: Si el problema te da los números de la proporción (ej. ''es de 3 a 4''),
  iguala la fracción de las variables a la fracción numérica (3/4).'
ejemplos:
- titulo: Comparando pesos
  enunciado: 'Traduce algebraicamente: ''La razón entre la masa de Júpiter y la masa
    de la Tierra es de 318 a 1''.'
  solucion_pasos:
  - Las variables son masa de Júpiter (J) y masa de la Tierra (T).
  - El texto dice 'La razón entre Júpiter y la Tierra'. Formamos la fracción J/T.
  - La proporción numérica es '318 a 1', formando la fracción 318/1.
  - 'Igualamos: J/T = 318/1.'
errores_frecuentes:
- 'Invertir el orden de las variables al construir la fracción. (Ej: ''La razón entre
  oro y plata es 1 a 2'', traducido erróneamente como $\frac{P}{O} = \frac{1}{2}$).'
- Confundir la 'razón geométrica' (división) con la 'razón aritmética' (resta). En
  álgebra básica, 'razón' a secas siempre implica división.
fuente: Álgebra de Baldor.
estado: publicado
