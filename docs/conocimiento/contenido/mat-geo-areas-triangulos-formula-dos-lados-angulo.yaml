semantic_id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_DOS_LADOS_ANGULO
titulo: 'Fórmula del área con dos lados y ángulo comprendido: A = ½ab·sen(C)'
objetivo: Calcular el área de un triángulo conociendo dos de sus lados y el ángulo comprendido entre ellos.
introduccion: Si conoces dos lados de un triángulo y el ángulo que forman entre ellos, no necesitas la altura
  ni el tercer lado para calcular su área.
resumen: 'El área de un triángulo se puede calcular con dos lados $a$, $b$ y el ángulo $C$ comprendido entre
  ellos, mediante la fórmula $A=\frac{1}{2}ab\,\text{sen}(C)$.'
explicacion: '![Área con dos lados y ángulo comprendido](/static/img/geometria/areas-pitagoras/areas-triangulos-formula-dos-lados-angulo.svg)


  ### Definición formal


  Dado un triángulo con dos lados $a$ y $b$, y el ángulo $C$ comprendido entre ellos, el área se calcula como

  $A=\frac{1}{2}ab\,\text{sen}(C)$.


  ### Desarrollo didáctico


  Esta fórmula equivale a la fórmula base por altura, ya que $b\,\text{sen}(C)$ representa exactamente la

  altura relativa al lado $a$, sin necesidad de calcularla por separado.'
procedimiento:
- 'Paso 1: Identifica los dos lados $a$ y $b$, y el ángulo $C$ comprendido entre ellos.'
- 'Paso 2: Calcula $\text{sen}(C)$.'
- 'Paso 3: Aplica $A=\frac{1}{2}ab\,\text{sen}(C)$.'
ejemplos:
- titulo: Lados 6 y 8 con ángulo de 30°
  enunciado: Un triángulo tiene lados $a=6$ y $b=8$, con un ángulo de $30°$ comprendido entre ellos.
    Calcula su área.
  solucion_pasos:
  - '$\text{sen}(30°)=0{,}5$.'
  - '$A=\frac{1}{2}\cdot 6\cdot 8\cdot 0{,}5=12$.'
- titulo: Reconocer los datos necesarios
  enunciado: ¿Qué tres datos del triángulo se requieren para aplicar esta fórmula?
  solucion_pasos:
  - Se requieren dos lados del triángulo y el ángulo comprendido exactamente entre esos dos lados.
- titulo: ¿El ángulo usado en la fórmula debe estar comprendido entre los dos lados conocidos?
  respuesta: Sí
  solucion_pasos:
  - Sí, si el ángulo no está entre esos dos lados, la fórmula no es válida directamente.
- titulo: ¿Esta fórmula requiere conocer la altura del triángulo?
  respuesta: 'No'
  solucion_pasos:
  - 'No, el término $b\,\text{sen}(C)$ reemplaza el cálculo directo de la altura.'
errores_frecuentes:
- Usar un ángulo que no está comprendido entre los dos lados conocidos.
- Olvidar el factor $\frac{1}{2}$ en la fórmula.
- Confundir grados con radianes al calcular el seno del ángulo.
- Multiplicar los tres valores en el orden incorrecto, alterando el resultado.
- Confundir esta fórmula con la fórmula de Herón, que usa los tres lados en vez de un ángulo.
fuente: 'Elaboración propia (referencia: Moraleja 47, Cid 34).'
estado: publicado
