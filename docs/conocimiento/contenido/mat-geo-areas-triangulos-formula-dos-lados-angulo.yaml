semantic_id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_DOS_LADOS_ANGULO
titulo: 'Fórmula del área con dos lados y el ángulo comprendido: A = (a·b·sen(C)) / 2'
objetivo: Calcular el área de un triángulo conociendo dos lados y el ángulo comprendido entre ellos, sin
  necesidad de la altura.
introduccion: Cuando se conocen dos lados de un triángulo y el ángulo que forman entre sí, existe una
  fórmula trigonométrica directa para el área, sin tener que calcular la altura por separado.
resumen: El área de un triángulo con dos lados $a$ y $b$ y ángulo comprendido $C$ es $A=\frac{a\cdot b\cdot\text{sen}(C)}{2}$.
explicacion: '![Área con dos lados y el ángulo entre ellos](/static/img/geometria/areas-pitagoras/areas-triangulos-formula-dos-lados-angulo.svg)


  ### Definición formal


  Esta fórmula surge de que la altura relativa al lado $a$ es $h=b\cdot\text{sen}(C)$, y al sustituir
  en $A=\frac{a\cdot h}{2}$ se obtiene $A=\frac{a\cdot b\cdot\text{sen}(C)}{2}$.


  ### Desarrollo didáctico


  Un triángulo con lados 8 cm y 10 cm, y ángulo comprendido de 30°, tiene área $A=\frac{8\times10\times\text{sen}(30°)}{2}=\frac{80\times0,5}{2}=20$
  cm².'
procedimiento:
- 'Paso 1: Identifica los dos lados conocidos y el ángulo comprendido entre ellos.'
- 'Paso 2: Multiplica ambos lados por el seno del ángulo comprendido.'
- 'Paso 3: Divide el resultado entre 2.'
ejemplos:
- titulo: Calcular con lados 8 y 10, ángulo 30°
  enunciado: Dos lados miden 8 cm y 10 cm, con ángulo comprendido de 30°.
  solucion_pasos:
  - A=(8×10×sen30°)/2=(80×0,5)/2=20 cm².
- titulo: Calcular con lados 6 y 6, ángulo 90°
  enunciado: Dos lados miden 6 cm cada uno, con ángulo comprendido de 90°.
  solucion_pasos:
  - A=(6×6×sen90°)/2=(36×1)/2=18 cm².
- titulo: ¿El ángulo debe estar comprendido entre los dos lados conocidos?
  respuesta: Sí
  solucion_pasos:
  - Sí, debe ser el ángulo formado exactamente por esos dos lados.
- titulo: ¿Se necesita conocer el tercer lado para usar esta fórmula?
  respuesta: 'No'
  solucion_pasos:
  - No, basta con dos lados y el ángulo entre ellos.
errores_frecuentes:
- Usar un ángulo que no está comprendido entre los dos lados conocidos.
- Olvidar dividir entre 2 después de aplicar la fórmula.
- Confundir grados con radianes al calcular el seno del ángulo.
fuente: Elaboración propia.
estado: publicado
