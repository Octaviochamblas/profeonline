semantic_id: MAT.ALG.TRIG_COORDENADAS.ANGULO_REFERENCIA
titulo: Ángulo de referencia
objetivo: Determinar el ángulo de referencia de un ángulo cualquiera para calcular sus valores trigonométricos a
  partir de los ángulos notables.
introduccion: Para no memorizar valores trigonométricos de cada ángulo posible, conviene relacionarlo con su
  ángulo agudo equivalente más cercano al eje $x$.
resumen: El **ángulo de referencia** de $\theta$ es el ángulo agudo (entre $0°$ y $90°$) que forma el lado
  terminal de $\theta$ con el eje $x$, y permite calcular sus razones trigonométricas usando los ángulos
  notables.
explicacion: '### Definición formal


  El ángulo de referencia $\theta_R$ de un ángulo $\theta$ se calcula según el cuadrante: en el segundo
  cuadrante, $\theta_R=180°-\theta$; en el tercero, $\theta_R=\theta-180°$; en el cuarto, $\theta_R=360°-\theta$.
  En el primer cuadrante, $\theta_R=\theta$.


  ### Desarrollo didáctico


  Para $\theta=150°$ (segundo cuadrante): $\theta_R=180°-150°=30°$. Esto significa que $|\sin(150°)|=\sin(30°)$
  y $|\cos(150°)|=\cos(30°)$, ajustando el signo según el cuadrante.'
procedimiento:
- 'Paso 1: Identifica el cuadrante donde se ubica el ángulo $\theta$.'
- 'Paso 2: Aplica la fórmula correspondiente a ese cuadrante para calcular el ángulo de referencia.'
- 'Paso 3: Usa el ángulo de referencia junto con el signo del cuadrante para obtener el valor trigonométrico.'
ejemplos:
- titulo: Ángulo de referencia en el segundo cuadrante
  enunciado: 'Determina el ángulo de referencia de $135°$.'
  solucion_pasos:
  - Está en el segundo cuadrante, así que se aplica $180°-\theta$.
  - '$180°-135°=45°$.'
- titulo: Ángulo de referencia en el tercer cuadrante
  enunciado: 'Determina el ángulo de referencia de $210°$.'
  solucion_pasos:
  - Está en el tercer cuadrante, así que se aplica $\theta-180°$.
  - '$210°-180°=30°$.'
- titulo: ¿El ángulo de referencia siempre está entre $0°$ y $90°$?
  enunciado: ¿El ángulo de referencia de cualquier ángulo $\theta$ está siempre entre $0°$ y $90°$?
  respuesta: Sí
  solucion_pasos:
  - Es la definición del ángulo de referencia: siempre un ángulo agudo.
- titulo: ¿El ángulo de referencia determina el signo del valor trigonométrico?
  enunciado: ¿El ángulo de referencia por sí solo determina el signo de $\sin(\theta)$ o $\cos(\theta)$?
  respuesta: 'No'
  solucion_pasos:
  - El signo depende del cuadrante donde se ubique $\theta$, no solo del ángulo de referencia.
errores_frecuentes:
- Aplicar la fórmula del cuadrante incorrecto al calcular el ángulo de referencia.
- Olvidar ajustar el signo del resultado según el cuadrante original de $\theta$.
- Confundir el ángulo de referencia con el ángulo coterminal.
- Calcular mal la resta o suma correspondiente al cuadrante.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
