semantic_id: MAT.GEO.SIMETRIAS.AXIAL_EJE_X
titulo: Simetría axial respecto del eje x
objetivo: 'Aplicar la regla específica de la simetría axial respecto del eje de las abscisas (eje X):
  cada punto P(x,y) se transforma en P''(x,-y).'
introduccion: Reflejar un punto respecto del eje X es como 'voltear' su posición vertical, manteniendo
  igual la posición horizontal.
resumen: 'La simetría axial respecto del eje X transforma cada punto $P(x,y)$ en $P''(x,-y)$: se mantiene
  igual la abscisa y se invierte el signo de la ordenada.'
explicacion: '![Simetría axial respecto del eje X](/static/img/geometria/isometrias/simetria-axial-eje-x.svg)


  ### Definición formal


  Si el eje X es la recta de simetría, cada punto $P(x,y)$ se transforma en $P''(x,-y)$: la coordenada
  $x$ permanece igual, y la coordenada $y$ cambia de signo.


  ### Desarrollo didáctico


  En la figura, el punto $P(3,3)$ tiene como imagen respecto del eje X el punto $P''(3,-3)$: la abscisa
  se mantiene igual, y la ordenada se invierte.'
procedimiento:
- 'Paso 1: Identifica las coordenadas del punto P(x,y).'
- 'Paso 2: Mantén la abscisa x sin cambios.'
- 'Paso 3: Invierte el signo de la ordenada y, obteniendo el punto imagen P''(x,-y).'
ejemplos:
- titulo: Aplicar la simetría respecto del eje X
  enunciado: El punto P(3,3) se refleja respecto del eje X.
  solucion_pasos:
  - P'=(3,-3).
- titulo: Aplicar la simetría a un punto con ordenada negativa
  enunciado: El punto P(-5,-2) se refleja respecto del eje X.
  solucion_pasos:
  - P'=(-5,2).
- titulo: ¿La abscisa del punto cambia en esta simetría?
  respuesta: 'No'
  solucion_pasos:
  - No, la abscisa permanece exactamente igual; solo cambia el signo de la ordenada.
- titulo: ¿Un punto sobre el eje X es su propia imagen?
  respuesta: Sí
  solucion_pasos:
  - Sí, si y=0, entonces -y=0 también, por lo que el punto no cambia.
errores_frecuentes:
- Invertir el signo de la abscisa en vez de la ordenada.
- Confundir esta simetría con la respecto del eje Y (que invierte x, no y).
- Cambiar ambas coordenadas de signo, confundiendo con la simetría central respecto del origen.
fuente: 'Elaboración propia (referencias: Moraleja Tomo 2 127, Cid 76).'
estado: publicado
