semantic_id: MAT.ALG.POLINOMIOS.POLINOMIO_HETEROGENEO
objetivo: Identificar polinomios heterogéneos donde existe disparidad en el grado absoluto de sus términos.
introduccion: 'En el mundo real, los equipos suelen estar formados por personas de diferentes pesos y estaturas.
  En el álgebra, la inmensa mayoría de los polinomios son así: diversos y desiguales.'
resumen: Un **Polinomio Heterogéneo** es aquel en el que **sus términos NO tienen el mismo grado absoluto**. Basta
  con que un solo término tenga un grado distinto para que todo el polinomio sea heterogéneo.
explicacion: "### Definición formal\n\nHeterogéneo indica variedad en el 'peso' de los términos. Si no son todos\
  \ idénticos en grado, es heterogéneo.\n\n### Desarrollo didáctico\n\nHetero significa 'diferente' o 'desigual'.\
  \ \n- Polinomio: $x^3 - 5x^2 + 6$\n  - Vagón 1 ($x^3$): Grado 3.\n  - Vagón 2 ($-5x^2$): Grado 2.\n  - Vagón 3\
  \ ($+6$): Grado 0.\nLos grados son 3, 2 y 0. Son diferentes. Por tanto, es un polinomio heterogéneo.\n\nCasi todos\
  \ los polinomios de una sola variable que incluyen un término numérico suelto (independiente) son heterogéneos\
  \ automáticamente, a menos que consten *solamente* del término independiente."
procedimiento:
- 'Paso 1: Calcula el grado absoluto de cada término.'
- 'Paso 2: Compara los resultados.'
- 'Paso 3: En el momento en que encuentres al menos dos términos con grados diferentes, puedes detenerte y clasificarlo
  como Heterogéneo.'
- Heterogéneo indica variedad en el 'peso' de los términos. Si no son todos idénticos en grado, es heterogéneo.
ejemplos:
- titulo: Buscando la diferencia
  enunciado: Clasifica el polinomio a^2b + ab^2 - a^3b^2.
  solucion_pasos:
  - 'T1: a^2b (Grado 3).'
  - 'T2: ab^2 (Grado 3).'
  - 'T3: -a^3b^2 (Grado 5).'
  - T1 y T2 son iguales, pero T3 es diferente. Por ende, es Heterogéneo.
- titulo: Un sistema de ecuaciones requiere una lista de 'Polinomios Heterogéneos' para entrenar una r
  enunciado: 'Un sistema de ecuaciones requiere una lista de ''Polinomios Heterogéneos'' para entrenar una red neuronal
    en reconocimiento de asimetrías. Un programador carga el polinomio $8x^2y^2 - 4x^3y + 2xy^3$. La red lo expulsa
    del entrenamiento. ¿Por qué el polinomio fue rechazado? (v1)


    Opciones: A) Porque todos sus términos suman exactamente grado $4$ ($2+2, 3+1, 1+3$), convirtiéndolo en un polinomio
    homogéneo. · B) Porque tiene más de dos letras. · C) Porque falta el término con grado cero. · D) Porque los
    coeficientes son todos números pares.'
  solucion_pasos:
  - Al analizar los grados de los términos vemos que todos pesan 4. No hay asimetría de grados. Al ser homogéneo,
    incumple la regla del sistema.
  - 'Respuesta: Porque todos sus términos suman exactamente grado $4$ ($2+2, 3+1, 1+3$), convirtiéndolo en un polinomio
    homogéneo.'
- titulo: 'Respecto de «Identificación de polinomio heterogéneo»: ¿Se ajusta a la definición esta afirm'
  enunciado: 'Respecto de «Identificación de polinomio heterogéneo»: ¿Se ajusta a la definición esta afirmación?
    «Un **Polinomio Heterogéneo** es aquel en el que **sus términos NO tienen el mismo grado absoluto**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un **Polinomio Heterogéneo** es aquel en el que **sus términos
    NO tienen el mismo grado absoluto**.'
- titulo: 'Respecto de «Identificación de polinomio heterogéneo»: ¿Es compatible con el procedimiento e'
  enunciado: 'Respecto de «Identificación de polinomio heterogéneo»: ¿Es compatible con el procedimiento esta afirmación?
    «Creer que heterogéneo significa que tiene letras distintas (variables diferentes). La heterogeneidad se mide
    en el grado total, no en la variedad de letras»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un **Polinomio Heterogéneo** es aquel en el que **sus términos
    NO tienen el mismo grado absoluto**.'
errores_frecuentes:
- Creer que heterogéneo significa que tiene letras distintas (variables diferentes). La heterogeneidad se mide en
  el grado total, no en la variedad de letras.
- Revisar solo los dos primeros términos, ver que coinciden, y asumir que es homogéneo sin revisar hasta el final.
- Cuando está compuesto por dos o más variables (letras) diferentes en su estructura.
- Cuando sus coeficientes son números fraccionarios o irracionales.
- Cuando carece de un término independiente.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Identificación de polinomio heterogéneo
