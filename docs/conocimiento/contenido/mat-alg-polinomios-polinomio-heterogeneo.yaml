semantic_id: MAT.ALG.POLINOMIOS.POLINOMIO_HETEROGENEO
objetivo: Identificar polinomios heterogéneos donde existe disparidad en el grado
  absoluto de sus términos.
introduccion: 'En el mundo real, los equipos suelen estar formados por personas de
  diferentes pesos y estaturas. En el álgebra, la inmensa mayoría de los polinomios
  son así: diversos y desiguales.'
resumen: Un **Polinomio Heterogéneo** es aquel en el que **sus términos NO tienen
  el mismo grado absoluto**. Basta con que un solo término tenga un grado distinto
  para que todo el polinomio sea heterogéneo.
explicacion: "Hetero significa 'diferente' o 'desigual'. \n- Polinomio: $x^3 - 5x^2\
  \ + 6$\n  - Vagón 1 ($x^3$): Grado 3.\n  - Vagón 2 ($-5x^2$): Grado 2.\n  - Vagón\
  \ 3 ($+6$): Grado 0.\nLos grados son 3, 2 y 0. Son diferentes. Por tanto, es un\
  \ polinomio heterogéneo.\n\nCasi todos los polinomios de una sola variable que incluyen\
  \ un término numérico suelto (independiente) son heterogéneos automáticamente, a\
  \ menos que consten *solamente* del término independiente."
procedimiento:
- 'Paso 1: Calcula el grado absoluto de cada término.'
- 'Paso 2: Compara los resultados.'
- 'Paso 3: En el momento en que encuentres al menos dos términos con grados diferentes,
  puedes detenerte y clasificarlo como Heterogéneo.'
ejemplos:
- titulo: Buscando la diferencia
  enunciado: Clasifica el polinomio a^2b + ab^2 - a^3b^2.
  solucion_pasos:
  - 'T1: a^2b (Grado 3).'
  - 'T2: ab^2 (Grado 3).'
  - 'T3: -a^3b^2 (Grado 5).'
  - T1 y T2 son iguales, pero T3 es diferente. Por ende, es Heterogéneo.
errores_frecuentes:
- Creer que heterogéneo significa que tiene letras distintas (variables diferentes).
  La heterogeneidad se mide en el grado total, no en la variedad de letras.
- Revisar solo los dos primeros términos, ver que coinciden, y asumir que es homogéneo
  sin revisar hasta el final.
fuente: Álgebra de Baldor.
estado: publicado
