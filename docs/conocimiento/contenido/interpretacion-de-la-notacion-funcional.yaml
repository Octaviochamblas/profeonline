semantic_id: MAT.ALG.FUNCION_CONCEPTOS.NOTACION_FUNCIONAL
titulo: Interpretación de la notación funcional
objetivo: Interpretar correctamente la notación $f(x)$ y su significado como imagen de $x$ bajo $f$.
introduccion: La escritura $f(x)$ no significa "$f$ multiplicado por $x$". Es un nombre completo para
  "el valor que la función $f$ produce cuando recibe a $x$".
resumen: La notación $f(x)$ se lee "$f$ de $x$" y representa la imagen que la función $f$ asigna al elemento
  $x$ del dominio; $f$ nombra a la función y $x$ es el argumento sustituido en su regla.
explicacion: '### Definición formal


  Dada una función $f\colon A \to B$ definida por una regla, la notación $f(x)$ denota el único elemento
  $y \in B$ tal que $(x,y) \in f$. La expresión $y = f(x)$ establece que $y$ es la imagen de $x$ bajo
  la función $f$.


  ### Desarrollo didáctico


  Piensa en $f$ como el nombre de una máquina y en $(x)$ como el ingrediente que le entregas. $f(x)$ es
  lo que la máquina entrega de vuelta.


  Si $f(x) = 2x+1$, entonces $f(3)$ significa "sustituye $x$ por $3$ en la regla": $f(3) = 2(3)+1 = 7$.
  El paréntesis no indica multiplicación; indica "evaluado en".


  Distintas letras pueden nombrar funciones distintas ($g(x)$, $h(t)$), y la variable dentro del paréntesis
  puede tener cualquier nombre.'
procedimiento:
- 'Paso 1: Identifica el nombre de la función (por ejemplo $f$) y su regla de correspondencia.'
- 'Paso 2: Identifica el argumento entre paréntesis que debes sustituir.'
- 'Paso 3: Reemplaza cada aparición de la variable en la regla por el argumento dado.'
- 'Paso 4: Realiza las operaciones para obtener el valor numérico o algebraico resultante.'
ejemplos:
- titulo: Evaluación directa
  enunciado: Si $f(x) = 3x - 5$, calcula $f(4)$.
  solucion_pasos:
  - Sustituimos $x$ por $4$ en $3x-5$.
  - $f(4) = 3(4) - 5 = 12 - 5 = 7$.
- titulo: Argumento no numérico
  enunciado: Si $g(x) = x^2 + 1$, calcula $g(a)$.
  solucion_pasos:
  - Se sustituye $x$ por la letra $a$, tratándola como cualquier otro valor.
  - $g(a) = a^2 + 1$.
- titulo: ¿La expresión $f(x)$ significa "$f$ multiplicado por $x$"?
  enunciado: ¿La expresión $f(x)$ significa "$f$ multiplicado por $x$"?
  respuesta: 'No'
  solucion_pasos:
  - $f(x)$ es notación de evaluación, no de multiplicación; nombra la imagen de $x$ bajo $f$.
- titulo: ¿$f(2)$ representa un elemento del dominio o del codominio?
  enunciado: ¿$f(2)$ representa un elemento del dominio o del codominio?
  respuesta: Del codominio (imagen)
  solucion_pasos:
  - $f(2)$ es el resultado de evaluar la función en $x=2$, es decir, la imagen correspondiente en el codominio.
errores_frecuentes:
- Interpretar $f(x)$ como el producto de $f$ por $x$.
- Confundir el nombre de la función ($f$) con el nombre de la variable ($x$).
- Al evaluar $f(a+1)$, sustituir solo parcialmente y olvidar reemplazar cada ocurrencia de la variable.
- Creer que cambiar el nombre de la variable independiente (de $x$ a $t$) cambia la función.
- Confundir $f(2)$ (evaluar en $2$) con $2f(x)$ (multiplicar la función por $2$).
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
