semantic_id: MAT.ALG.FACTOR_TRINOMIOS.RECONOCIMIENTO_COMPUESTO
titulo: Trinomios de la forma ax² + bx + c
objetivo: Conocer la estructura de los trinomios donde el coeficiente principal es distinto de 1 y por qué los métodos
  simples fallan.
introduccion: Atención. Hasta ahora jugábamos en modo fácil. Los trinomios empezaban gentilmente con un simple y
  solitario $x^2$. ¿Pero qué sucede cuando un número rebelde como un 3 o un 5 se instala delante del $x^2$? Las
  reglas del juego cambian por completo.
resumen: Un trinomio compuesto $ax^2 + bx + c$ (donde $a \neq 1$) no se puede factorizar simplemente buscando dos
  números que sumen '$b$' y multipliquen '$c$', porque la expansión de los binomios introduce cruzamientos con el
  coeficiente '$a$'.
explicacion: '### Definición formal


  La presencia de ''a'' diferente de 1 es lo que altera el método clásico de factorización.


  ### Desarrollo didáctico


  Si intentas usar la regla rápida en $2x^2 + 7x + 3$ buscando números que sumen 7 y multipliquen 3. te frustrarás
  rápido. (1 y 3 suman 4, no 7. Y no hay más enteros.).


  ¿Por qué falla el método?

  Si factorizamos, obtendremos algo como $(Ax + B)(Cx + D)$.

  Al multiplicar eso (ley distributiva) obtenemos:

  $AC x^2 + (AD + BC)x + BD$


  Como puedes ver, el término central $(AD + BC)$ ya no es simplemente la suma de los dos últimos números. Ahora
  hay una multiplicación cruzada (el efecto tijera o aspa) que se mezcla con el término inicial.


  Para resolver este caos organizado, existen dos métodos clásicos y altamente efectivos: El Método del Aspa Simple
  (visual) y el Método de Amplificación/Ruffini (analítico).'
procedimiento:
- 'Para diagnosticar un trinomio compuesto:'
- 'Paso 1: Revisa el coeficiente del término con la variable al cuadrado.'
- 'Paso 2: Si es 1, usa el método simple (buscar 2 números).'
- 'Paso 3: Si es distinto de 1, verifica si se puede extraer como Factor Común Global. (Ej: en $2x^2 + 4x + 6$,
  puedes extraer el 2).'
- 'Paso 4: Si no hay factor común global, prepárate para aplicar el Método del Aspa Simple o Amplificación.'
ejemplos:
- titulo: Determina cómo atacar $3x^2 + 10x + 8$
  enunciado: Determina cómo atacar $3x^2 + 10x + 8$.
  solucion_pasos:
  - El coeficiente líder es 3.
  - No hay factor común global porque 10 y 8 no son divisibles por 3.
  - 'Conclusión: Es un trinomio compuesto y requiere Aspa o Amplificación.'
- titulo: Diagnostica $4x^2 - 12x + 8$.
  solucion_pasos:
  - 'Se puede extraer el 4: $4(x^2 - 3x + 2)$. Lo de adentro se resuelve con el método simple.'
- titulo: 'Respecto de «Reconocimiento del trinomio cuadrático no mónico»: ¿La siguiente formulación es'
  enunciado: 'Respecto de «Reconocimiento del trinomio cuadrático no mónico»: ¿La siguiente formulación es correcta?
    «Un trinomio compuesto $ax^2 + bx + c$ (donde $a \neq 1$) no se puede factorizar simplemente buscando dos números
    que sumen ''$b$'' y multipliquen ''$c$'', porque la expansión de los binomios introduce cruzamientos con el
    coeficiente ''$a$''»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Un trinomio compuesto $ax^2 + bx + c$ (donde $a \neq 1$) no
    se puede factorizar simplemente buscando dos números que sumen ''$b$'' y multipliquen ''$c$'', porque la expansión
    de los binomios introduce cruzamientos con el coeficiente ''$a$''.'
- titulo: 'Respecto de «Reconocimiento del trinomio cuadrático no mónico»: ¿La siguiente conclusión es'
  enunciado: 'Respecto de «Reconocimiento del trinomio cuadrático no mónico»: ¿La siguiente conclusión es correcta?
    «Intentar aplicar ciegamente la regla de "sumados y multiplicados" a trinomios como $3x^2 + 5x + 2$»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Un trinomio compuesto $ax^2 + bx + c$ (donde $a \neq 1$) no
    se puede factorizar simplemente buscando dos números que sumen ''$b$'' y multipliquen ''$c$'', porque la expansión
    de los binomios introduce cruzamientos con el coeficiente ''$a$''.'
errores_frecuentes:
- Intentar aplicar ciegamente la regla de "sumados y multiplicados" a trinomios como $3x^2 + 5x + 2$.
- No darse cuenta de que a veces el número se puede extraer como factor común, haciendo el problema cien veces más
  fácil.
- Tiene más de tres términos.
- Para «¿Qué caracteriza a un trinomio "compuesto" respecto a uno simple», la respuesta correcta es Todas sus variables
  son diferentes.
- Tiene números decimales.
