semantic_id: MAT.ALG.RESOLUCION_LINEAL.PARENTESIS_NEGATIVO
titulo: El Peligro del Paréntesis Precedido por un Signo Menos
objetivo: Cambiar correctamente los signos de todos los términos dentro de un paréntesis que está precedido por
  una resta.
introduccion: Si hay un 'asesino silencioso' en los exámenes de álgebra, es el signo menos antes de un paréntesis.
  Ha arruinado más notas perfectas que cualquier otro error matemático.
resumen: Cuando un paréntesis está precedido por un signo menos ($-$), al eliminar el paréntesis se DEBEN CAMBIAR
  LOS SIGNOS de TODOS los términos de su interior.
explicacion: '### Definición formal


  El menos de afuera invierte el signo del 3x positivo (queda -3x) y el del -7 (queda +7).


  ### Desarrollo didáctico


  Fíjate en esto: $10 - (2x + 4) = 0$


  Ese signo $-$ no solo afecta al $2x$. Ese signo menos es en realidad un $-1$ disfrazado que está multiplicando
  a todo el paréntesis.

  Si aplicas la propiedad distributiva con $-1$:

  - El $2x$ positivo se vuelve negativo: $-2x$

  - El $+4$ se vuelve negativo: $-4$


  La ecuación liberada queda: $10 - 2x - 4 = 0$.


  Si el interior tuviera un negativo, por ejemplo $-(x - 5)$, la regla de los signos (menos por menos da más) lo
  transforma en $-x + 5$.


  La regla de oro: Un ''menos'' afuera invierte TODOS los signos de adentro. Un ''más'' afuera deja todos los signos
  exactamente igual.'
procedimiento:
- 'Paso 1: Detecta el signo $-$ antes del paréntesis.'
- 'Paso 2: Borra el signo menos y los paréntesis.'
- 'Paso 3: Escribe cada término del interior pero con su signo opuesto (+ cambia a -, y - cambia a +).'
- 'Paso 4: Continúa reduciendo términos como de costumbre.'
- El menos de afuera invierte el signo del 3x positivo (queda -3x) y el del -7 (queda +7).
ejemplos:
- titulo: 'Elimina el paréntesis y resuelve: $8 - (x - 2) = 12$'
  enunciado: 'Elimina el paréntesis y resuelve: $8 - (x - 2) = 12$'
  solucion_pasos:
  - El signo menos afecta a la 'x' y al '-2'.
  - 'Queda: $8 - x + 2 = 12$.'
  - 'Reducimos: $10 - x = 12$.'
  - 'Despejamos: $-x = 12 - 10 \rightarrow -x = 2$.'
  - 'Cambiamos signo a todo: $x = -2$.'
- titulo: Resuelve $5x - (2x + 9) = 6$
  solucion_pasos:
  - 5x - 2x - 9 = 6
  - 3x - 9 = 6
  - 3x = 15
  - x = 5
- titulo: 'Respecto de «Resolución de ecuaciones con paréntesis precedido por signo negativo»: ¿Describ'
  enunciado: 'Respecto de «Resolución de ecuaciones con paréntesis precedido por signo negativo»: ¿Describe adecuadamente
    el concepto esta frase? «Cuando un paréntesis está precedido por un signo menos ($-$), al eliminar el paréntesis
    se DEBEN CAMBIAR LOS SIGNOS de TODOS los términos de su interior»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: Cuando un paréntesis está precedido por un signo menos ($-$),
    al eliminar el paréntesis se DEBEN CAMBIAR LOS SIGNOS de TODOS los términos de su interior.'
- titulo: 'Respecto de «Resolución de ecuaciones con paréntesis precedido por signo negativo»: ¿Se pued'
  enunciado: 'Respecto de «Resolución de ecuaciones con paréntesis precedido por signo negativo»: ¿Se puede aceptar
    esta afirmación? «El error más clásico: Cambiar el signo solo del primer término y copiar el segundo igual.
    Ej: $-(x+5)$ -> $-x+5$ (Incorrecto, es $-x-5$)»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: Cuando un paréntesis está precedido por un signo menos ($-$),
    al eliminar el paréntesis se DEBEN CAMBIAR LOS SIGNOS de TODOS los términos de su interior.'
errores_frecuentes:
- 'El error más clásico: Cambiar el signo solo del primer término y copiar el segundo igual. Ej: $-(x+5)$ -> $-x+5$
  (Incorrecto, es $-x-5$).'
- $-3x - 7$.
- $2x - x - 1 = 5$.
- $x - 1 = 5$.
- $3x - 1 = 5$.
