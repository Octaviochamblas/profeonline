semantic_id: MAT.EST.PERMUTACIONES_VARIACIONES.FACTORIAL_DEFINICION
titulo: Definición de factorial de un número natural
objetivo: Definir el factorial de un número natural como el producto de todos los enteros positivos desde
  ese número hasta 1.
introduccion: El factorial es una operación fundamental en el conteo, ya que representa el número de formas
  de ordenar un conjunto de elementos distintos.
resumen: 'El factorial de un número natural $n$, denotado $n!$, es el producto de todos los enteros positivos
  desde $n$ hasta 1: $n!=n\times(n-1)\times(n-2)\times\cdots\times2\times1$.'
explicacion: '![Definición de factorial](/static/img/probabilidad/permvar/permvar-factorial-definicion.svg)


  ### Definición formal


  $n!=n\times(n-1)\times\cdots\times1$ para $n\geq1$, y por definición especial $0!=1$.


  ### Desarrollo didáctico


  $5!=5\times4\times3\times2\times1=120$. El factorial de 0 se define como 1 por convención, para que
  las fórmulas de permutaciones y combinaciones funcionen correctamente en los casos límite.'
procedimiento:
- 'Paso 1: Identifica el número n cuyo factorial se quiere calcular.'
- 'Paso 2: Multiplica todos los enteros positivos desde n hasta 1.'
- 'Paso 3: Recuerda que 0!=1 por definición especial, un caso particular a memorizar.'
ejemplos:
- titulo: Calcular 5!
  enunciado: n=5.
  solucion_pasos:
  - 5!=5×4×3×2×1=120.
- titulo: Calcular 4!
  enunciado: n=4.
  solucion_pasos:
  - 4!=4×3×2×1=24.
- titulo: ¿0! es igual a 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, es una definición especial adoptada por convención matemática.
- titulo: ¿El factorial de un número negativo está definido de la forma usual?
  respuesta: 'No'
  solucion_pasos:
  - No, el factorial de números negativos no está definido en el sentido elemental usado aquí.
errores_frecuentes:
- Olvidar multiplicar hasta 1, deteniéndose antes de completar el producto.
- Confundir 0! con 0, cuando en realidad 0!=1.
- Intentar calcular el factorial de un número negativo con la fórmula elemental.
fuente: 'Elaboración propia (referencia: Baldor 373, Moraleja 299).'
estado: publicado
