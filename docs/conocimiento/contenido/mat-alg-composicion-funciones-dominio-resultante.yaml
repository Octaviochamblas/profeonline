semantic_id: MAT.ALG.COMPOSICION_FUNCIONES.DOMINIO_RESULTANTE
titulo: Determinación del dominio resultante en una composición de funciones
objetivo: Determinar el dominio de una función compuesta $(f\circ g)$ considerando las restricciones de ambas
  funciones involucradas.
introduccion: 'El dominio de una composición no es tan simple como el de cada función por separado: hay que asegurarse
  de que el resultado intermedio "encaje" en la siguiente función.'
resumen: 'El dominio de $(f\circ g)$ es el conjunto de valores $x$ del dominio de $g$ tales que $g(x)$ pertenece
  además al dominio de $f$; es decir, $\text{Dom}(f\circ g) = \{x \in \text{Dom}(g) \colon g(x) \in \text{Dom}(f)\}$.'
explicacion: '### Definición formal


  Formalmente, $\text{Dom}(f\circ g) = \{x \in \text{Dom}(g) : g(x) \in \text{Dom}(f)\}$. Esta definición exige
  cumplir dos condiciones simultáneas: que $x$ sea válido para $g$, y que el resultado $g(x)$ sea a su vez válido
  como entrada de $f$.


  ### Desarrollo didáctico


  El error más común es calcular solo el dominio de $g$, olvidando verificar si su resultado cae dentro del dominio
  permitido de $f$.


  Si $g(x)=x-5$ (dominio $\mathbb{R}$) y $f(x)=\sqrt{x}$ (dominio $[0,+\infty[$): para que $(f\circ g)(x)=\sqrt{x-5}$
  esté definida, se necesita $x-5\geq0$, es decir $x\geq5$. Aunque $g$ acepta todo $\mathbb{R}$, la composición
  exige la restricción adicional impuesta por $f$.'
procedimiento:
- 'Paso 1: Determina el dominio de la función interna $g$.'
- 'Paso 2: Determina el dominio de la función externa $f$.'
- 'Paso 3: Exige que $g(x)$ pertenezca al dominio de $f$, planteando la restricción correspondiente.'
- 'Paso 4: Intersecta esa restricción con el dominio original de $g$ para obtener el dominio final de la composición.'
ejemplos:
- titulo: Restricción heredada de la función externa
  enunciado: 'Si $g(x)=x+2$ y $f(x)=\frac{1}{x}$, determina el dominio de $(f\circ g)(x)$.'
  solucion_pasos:
  - '$(f\circ g)(x) = \frac{1}{x+2}$.'
  - Se exige que $x+2 \neq 0$, es decir $x \neq -2$.
  - 'Dominio: $\mathbb{R}-\{-2\}$.'
- titulo: Restricción con raíz cuadrada
  enunciado: 'Si $g(x)=x^2-9$ y $f(x)=\sqrt{x}$, determina el dominio de $(f\circ g)(x)$.'
  solucion_pasos:
  - Se exige que $g(x)\geq0$, es decir $x^2-9\geq0$.
  - Resolviendo, $x\leq-3$ o $x\geq3$.
  - 'Dominio: $]-\infty,-3] \cup [3,+\infty[$.'
- titulo: ¿El dominio de $(f\circ g)$ es siempre igual al dominio de $g$?
  enunciado: ¿El dominio de $(f\circ g)$ es siempre igual al dominio de $g$?
  respuesta: 'No'
  solucion_pasos:
  - Puede ser un subconjunto más restringido, según las exigencias adicionales de $f$.
- titulo: ¿Se debe verificar que $g(x)$ pertenezca al dominio de $f$?
  enunciado: ¿Se debe verificar que $g(x)$ pertenezca al dominio de $f$?
  respuesta: Sí
  solucion_pasos:
  - Esa verificación es esencial para que la composición esté correctamente definida.
errores_frecuentes:
- Calcular solo el dominio de la función interna, ignorando las restricciones de la externa.
- No intersectar correctamente ambas restricciones al determinar el dominio final.
- Confundir el dominio de $(f\circ g)$ con el dominio de $(g\circ f)$.
- Olvidar simplificar la fórmula de la composición antes de identificar sus restricciones.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
