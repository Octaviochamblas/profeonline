semantic_id: MAT.ALG.FUNC_COSENO_ANALISIS.MAXIMOS_MINIMOS
titulo: Máximos y mínimos de la función coseno
objetivo: Determinar los valores de $x$ donde $f(x)=\cos(x)$ alcanza sus máximos y mínimos absolutos.
introduccion: A diferencia del seno, el coseno alcanza su primer máximo exactamente en $x=0$, sin necesidad de
  avanzar ningún ángulo.
resumen: La función $f(x)=\cos(x)$ alcanza su **máximo** ($y=1$) en $x=2n\pi$, y su **mínimo** ($y=-1$) en
  $x=\pi+2n\pi$, para cualquier entero $n$.
explicacion: '### Definición formal


  El máximo de $\cos(x)$ ocurre cuando el punto asociado es $(1,0)$, es decir, cuando $x=2n\pi$. El mínimo
  ocurre cuando el punto asociado es $(-1,0)$, es decir, cuando $x=\pi+2n\pi$.


  ### Desarrollo didáctico


  Dentro de un período, el máximo se alcanza en $x=0$ y el mínimo en $x=\pi$. Sumando múltiplos de $2\pi$ se
  obtienen todos los demás máximos y mínimos: $x=2\pi$ también es un máximo.'
procedimiento:
- 'Paso 1: Identifica el primer máximo dentro de un período, en $x=0$.'
- 'Paso 2: Suma múltiplos de $2\pi$ para encontrar todos los demás máximos.'
- 'Paso 3: Repite el proceso con $x=\pi$ para encontrar todos los mínimos.'
ejemplos:
- titulo: Verificación de un máximo
  enunciado: '¿Es $x=4\pi$ un máximo de $f(x)=\cos(x)$?'
  solucion_pasos:
  - 'Se verifica: $4\pi=2\cdot2\pi$.'
  - Sí, es un máximo, ya que corresponde a dos períodos completos después de $0$.
- titulo: Verificación de un mínimo
  enunciado: '¿Es $x=-\pi$ un mínimo de $f(x)=\cos(x)$?'
  solucion_pasos:
  - 'Se calcula $\cos(-\pi)=-1$.'
  - Sí, es un mínimo de la función.
- titulo: ¿La distancia entre un máximo y el siguiente máximo es igual al periodo?
  enunciado: ¿La distancia entre dos máximos consecutivos de $f(x)=\cos(x)$ es igual al periodo $2\pi$?
  respuesta: Sí
  solucion_pasos:
  - Al repetirse el patrón cada $2\pi$, los máximos también se repiten con esa misma separación.
- titulo: ¿El máximo del coseno está en el mismo lugar que el máximo del seno?
  enunciado: ¿El máximo de $f(x)=\cos(x)$ ocurre en el mismo valor de $x$ que el máximo de $g(x)=\sin(x)$?
  respuesta: 'No'
  solucion_pasos:
  - El máximo del coseno ocurre en $x=0$; el del seno, en $x=\pi/2$.
errores_frecuentes:
- Confundir la posición del máximo con la del mínimo.
- Olvidar sumar múltiplos de $2\pi$ para encontrar todos los máximos y mínimos posibles.
- Confundir estos valores con los ceros de la función.
- Aplicar la fórmula del coseno a la función seno, donde las posiciones son distintas.
