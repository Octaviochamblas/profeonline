semantic_id: MAT.NUM.PROG_GEOMETRICA.SUMA_FINITA
titulo: Cálculo de la suma finita de los n primeros términos de una progresión geométrica
objetivo: Calcular la suma total acumulada de los primeros 'n' términos de una progresión geométrica.
introduccion: El inventor del ajedrez le pidió al rey 1 grano de trigo por la primera casilla, 2 por la
  segunda, 4 por la tercera... El rey pensó que era barato. No sabía que sumar progresiones geométricas
  arroja números monumentales. Descubramos cómo calcular ese total.
resumen: 'La suma de los primeros ''$n$'' términos de una P.G. (con $r \neq 1$) se calcula con la fórmula:
  $S_n = \frac{a_1 \cdot (r^n - 1)}{r - 1}$. Aquí ''$n$'' SÍ actúa como exponente directo de ''$r$''.'
explicacion: 'Sumar una P.G. a mano es muy agotador. Usaremos una fórmula cerrada:

  $$S_n = \frac{a_1 \cdot (r^n - 1)}{r - 1}$$


  Analicemos sus partes:

  - **$S_n$**: La suma total de todo lo acumulado en esos ''$n$'' casilleros.

  - **$a_1$**: Lo que había en el primer casillero.

  - **$r^n$**: La razón elevada a la cantidad de términos que sumarás. **¡ALERTA!** En esta fórmula SÍ
  elevamos a ''$n$'', NO a ''$(n-1)$''. Este es el error número uno en las pruebas.


  Ejemplo: Suma los 4 primeros términos de la serie $5, 15, 45, 135$. (Sabemos que suman 200).

  - $a_1 = 5, r = 3, n = 4$.

  - $S_4 = \frac{5 \cdot (3^4 - 1)}{3 - 1}$

  - $S_4 = \frac{5 \cdot (81 - 1)}{2}$

  - $S_4 = \frac{5 \cdot 80}{2} = \frac{400}{2} = 200$.'
procedimiento:
- 'Paso 1: Identifica $a_1, r$ y la cantidad de términos a sumar ($n$).'
- 'Paso 2: Calcula la potencia $r^n$.'
- 'Paso 3: Resta 1 a ese resultado en el numerador.'
- 'Paso 4: Multiplica el numerador por $a_1$.'
- 'Paso 5: Divide todo por $(r - 1)$.'
ejemplos:
- titulo: Ahorros multiplicados
  enunciado: Ahorras $2 el primer día y cada día duplicas lo del día anterior. ¿Cuánto sumarás en total
    luego de 5 días?
  solucion_pasos:
  - a1 = 2, r = 2, n = 5.
  - 'Fórmula: S5 = 2 * (2^5 - 1) / (2 - 1)'
  - S5 = 2 * (32 - 1) / 1
  - S5 = 2 * 31 = 62.
  - Suman 62 en total.
errores_frecuentes:
- Elevar '$r$' a la '$(n-1)$' en vez de '$n$' por inercia o confusión con la fórmula del término general.
- Dividir por $(r-1)$ antes de multiplicar el numerador completo.
fuente: Currículum Nacional MINEDUC.
estado: publicado
