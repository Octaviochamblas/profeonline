semantic_id: MAT.NUM.RACIONALES_PROPIEDADES.CONMUTATIVA_ADICION
objetivo: Aplicar la conmutatividad de la suma racional.
introduccion: '\(\frac{1}{2}+\frac{3}{7}=\frac{3}{7}+\frac{1}{2}\). Este resultado
  se explica mediante propiedad conmutativa de la adición en Q; el criterio que permite
  controlarlo es: En una suma de racionales el orden no cambia el resultado.'
resumen: La propiedad conmutativa de la adición establece que cambiar el orden de
  los sumandos no altera la suma. Como criterio de control, en una suma de racionales
  el orden no cambia el resultado
explicacion: |-
  La propiedad conmutativa de la adición establece que cambiar el orden de los sumandos no altera la suma.

  En “\(\frac{1}{2}+\frac{3}{7}=\frac{3}{7}+\frac{1}{2}\)” cada decisión debe justificarse desde la definición, no desde la memoria. La comprobación decisiva es que en una suma de racionales el orden no cambia el resultado.
procedimiento:
- 'Paso 1: Escribe una suma de dos racionales en el orden original.'
- 'Paso 2: Intercambia únicamente el orden de los sumandos y calcula ambas expresiones.'
- 'Paso 3: Verifica que los resultados coincidan: \(a+b=b+a\).'
ejemplos:
- titulo: Aplicación razonada — Propiedad conmutativa de la adición en Q
  enunciado: \(\frac{1}{2}+\frac{3}{7}=\frac{3}{7}+\frac{1}{2}\).
  solucion_pasos:
  - Escribe una suma de dos racionales en el orden original.
  - Intercambia únicamente el orden de los sumandos y calcula ambas expresiones.
  - 'Verifica que los resultados coincidan: \(a+b=b+a\).'
- titulo: Revisión de una solución — Propiedad conmutativa de la adición en Q
  enunciado: Una solución aplica “Intercambia únicamente el orden de los sumandos
    y calcula ambas expresiones.”, pero termina sin comprobar que en una suma de racionales
    el orden no cambia el resultado. Determina qué falta justificar.
  solucion_pasos:
  - 'Vuelve a la condición que define propiedad conmutativa de la adición en Q: la
    propiedad conmutativa de la adición establece que cambiar el orden de los sumandos
    no altera la suma.'
  - Escribe una suma de dos racionales en el orden original.
  - 'Completa la revisión con este control: Verifica que los resultados coincidan:
    \(a+b=b+a\).'
- titulo: ¿Se cumple que en una suma de racionales el orden no cambia el resultado?
    — Propiedad conmutativa de la adición en Q
  respuesta: Sí
  solucion_pasos:
  - Sí. La definición pertinente establece que la propiedad conmutativa de la adición
    establece que cambiar el orden de los sumandos no altera la suma.
  - El caso “\(\frac{1}{2}+\frac{3}{7}=\frac{3}{7}+\frac{1}{2}\)” satisface esa condición.
  - 'Verifica que los resultados coincidan: \(a+b=b+a\).'
- titulo: ¿Es válido omitir el paso “Escribe una suma de dos racionales en el orden
    original”? — Propiedad conmutativa de la adición en Q
  respuesta: 'No'
  solucion_pasos:
  - No. Ese paso comprueba una condición necesaria de propiedad conmutativa de la
    adición en Q.
  - 'Omitirlo puede volver inválida la acción siguiente: Intercambia únicamente el
    orden de los sumandos y calcula ambas expresiones.'
  - 'La solución debe terminar de este modo: Verifica que los resultados coincidan:
    \(a+b=b+a\).'
errores_frecuentes:
- 'Empezar propiedad conmutativa de la adición en Q sin realizar este control inicial:
  Escribe una suma de dos racionales en el orden original.'
- Memorizar “\(\frac{1}{2}+\frac{3}{7}=\frac{3}{7}+\frac{1}{2}\)” como respuesta aislada,
  sin reconstruir la definición que lo justifica.
- Convertir en receta el paso “Intercambia únicamente el orden de los sumandos y calcula
  ambas expresiones.” y usarlo aunque cambien las condiciones del problema.
- Dar por válida una conclusión sobre propiedad conmutativa de la adición en Q que
  contradice el criterio “En una suma de racionales el orden no cambia el resultado”.
- 'Cerrar el ejercicio sin esta comprobación específica: Verifica que los resultados
  coincidan: \(a+b=b+a\).'
fuente: Texto escolar MINEDUC — Matemática 7° Básico, unidad de fracciones y números
  racionales.
estado: publicado
