semantic_id: MAT.GEO.TRIANGULOS_ANGULOS.CALCULO_ANGULO_EXTERIOR
titulo: Cálculo de un ángulo exterior usando ángulos interiores no adyacentes
objetivo: Calcular la medida de un ángulo exterior de un triángulo a partir de los dos ángulos interiores
  no adyacentes a él.
introduccion: En vez de calcular primero el ángulo interior del vértice y luego restar de 180°, es posible
  obtener el ángulo exterior directamente sumando los dos ángulos interiores que no comparten su vértice.
resumen: El ángulo exterior de un triángulo se calcula sumando los dos ángulos interiores no adyacentes
  a él.
explicacion: '![Cálculo de un ángulo exterior](/static/img/geometria/triangulos/triangulos-angulos-calculo-angulo-exterior.svg)


  ### Definición formal


  Si α y γ son los ángulos interiores no adyacentes al ángulo exterior δ en el vértice B, entonces δ =
  α + γ.


  ### Desarrollo didáctico


  Con α=40° y γ=35°, el ángulo exterior en B es δ=40°+35°=75°, sin necesidad de calcular primero el ángulo
  interior en B.'
procedimiento:
- 'Paso 1: Identifica el vértice del ángulo exterior que quieres calcular.'
- 'Paso 2: Identifica los dos ángulos interiores que NO están en ese vértice.'
- 'Paso 3: Suma esos dos ángulos para obtener el ángulo exterior buscado.'
ejemplos:
- titulo: Calcular un ángulo exterior directo
  enunciado: Los ángulos no adyacentes al exterior en B son 40° y 35°.
  solucion_pasos:
  - El ángulo exterior en B es 40°+35°=75°.
- titulo: Otro caso numérico
  enunciado: Los ángulos no adyacentes a un exterior son 25° y 65°.
  solucion_pasos:
  - El ángulo exterior es 25°+65°=90°.
- titulo: ¿Se puede calcular el exterior sin pasar por el interior del mismo vértice?
  respuesta: Sí
  solucion_pasos:
  - Sí, sumando directamente los dos ángulos no adyacentes.
- titulo: ¿El resultado depende del orden en que se suman los dos ángulos?
  respuesta: 'No'
  solucion_pasos:
  - 'No, la suma es conmutativa: da el mismo resultado en cualquier orden.'
errores_frecuentes:
- Incluir el ángulo interior del mismo vértice en la suma.
- Restar en vez de sumar los dos ángulos no adyacentes.
- Confundir cuáles son los ángulos no adyacentes al vértice del exterior.
fuente: Elaboración propia.
estado: publicado
