semantic_id: MAT.ALG.FUNC_TRIG_MODELO.INTERPRETACION_PERIODO_CONTEXTO
titulo: Interpretación del periodo en un modelo de contexto
objetivo: Interpretar el periodo de un modelo trigonométrico aplicado como el tiempo (o distancia) que tarda el
  fenómeno en completar un ciclo completo.
introduccion: El periodo de un modelo de contexto tiene unidades reales, como horas o días, y representa cuánto
  tiempo pasa antes de que el fenómeno repita su comportamiento.
resumen: En un modelo de contexto, el **periodo** representa el **tiempo (o distancia) necesario** para que el
  fenómeno complete un ciclo y vuelva a su estado inicial.
explicacion: '### Definición formal


  Si un fenómeno tarda $T$ unidades de tiempo en repetir exactamente su comportamiento, el periodo del modelo
  trigonométrico correspondiente es $T$, y el parámetro $b$ se calcula como $b=2\pi/T$.


  ### Desarrollo didáctico


  Las mareas suben y bajan completando un ciclo aproximadamente cada $12{,}4$ horas: ese es el periodo del
  modelo. Para construir el modelo, se calcula $b=2\pi/12{,}4\approx0{,}507$.'
procedimiento:
- 'Paso 1: Identifica el tiempo (o distancia) que tarda el fenómeno en repetir su comportamiento.'
- 'Paso 2: Ese valor es el periodo $T$ del modelo.'
- 'Paso 3: Calcula $b=2\pi/T$ si se necesita construir la función completa.'
ejemplos:
- titulo: Identificación del periodo a partir de una descripción
  enunciado: 'Un ciclo respiratorio completo dura $4$ segundos. ¿Cuál es el periodo del modelo correspondiente?'
  solucion_pasos:
  - Se identifica directamente el tiempo del ciclo completo.
  - El periodo es $T=4$ segundos.
- titulo: Cálculo de $b$ a partir del periodo
  enunciado: 'Si el periodo de un fenómeno es $T=8$ horas, calcula $b$.'
  solucion_pasos:
  - 'Se aplica la fórmula: $b=2\pi/8=\pi/4$.'
  - El valor de $b$ es $\pi/4$.
- titulo: ¿El periodo puede expresarse en unidades distintas de tiempo?
  enunciado: ¿El periodo de un modelo de contexto puede expresarse en unidades distintas al tiempo, como
    distancia?
  respuesta: Sí
  solucion_pasos:
  - Depende de la variable independiente del modelo; puede ser tiempo, distancia u otra magnitud continua.
- titulo: ¿Un periodo más corto implica un fenómeno que oscila más rápido?
  enunciado: ¿Un periodo más corto significa que el fenómeno completa sus ciclos más rápidamente?
  respuesta: Sí
  solucion_pasos:
  - A menor tiempo para completar un ciclo, más rápida es la oscilación del fenómeno.
errores_frecuentes:
- Confundir el periodo con la amplitud del modelo.
- Calcular mal el valor de $b$ a partir del periodo, invirtiendo la fórmula.
- No identificar correctamente cuánto tiempo tarda un ciclo completo, confundiéndolo con medio ciclo.
- Ignorar las unidades del periodo al interpretar el resultado en contexto.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
