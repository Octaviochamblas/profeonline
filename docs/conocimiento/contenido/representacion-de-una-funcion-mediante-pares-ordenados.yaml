semantic_id: MAT.ALG.FUNCION_REPRESENTACION.PARES_ORDENADOS
titulo: Representación de una función mediante pares ordenados
objetivo: Representar una función como un conjunto de pares ordenados y verificar que cumpla la definición
  de función.
introduccion: 'Un conjunto de pares ordenados es la forma más directa de mostrar una función: cada par
  $(x,y)$ dice exactamente qué entrada produce qué salida.'
resumen: Una función puede representarse explícitamente como un **conjunto de pares ordenados** $(x, y)$,
  donde cada primera componente $x$ aparece asociada a un único segundo componente $y = f(x)$.
explicacion: '### Definición formal


  Formalmente, una función $f: A \to B$ puede identificarse con el conjunto de pares ordenados $\{(x,
  f(x)) : x \in A\} \subseteq A \times B$. Esta representación es válida como función si y solo si ningún
  valor de $x$ se repite asociado a distintos valores de $y$.


  ### Desarrollo didáctico


  Cuando el dominio es finito, listar todos los pares ordenados es una representación completa y exacta
  de la función, sin necesidad de fórmula ni gráfico.


  El conjunto $\{(1,3), (2,5), (3,7)\}$ representa una función: cada primer componente aparece una sola
  vez, con una única imagen asociada.'
procedimiento:
- 'Paso 1: Lista todos los pares ordenados que definen la correspondencia.'
- 'Paso 2: Verifica que cada valor de $x$ aparezca a lo más una vez con cada imagen.'
- 'Paso 3: Si se cumple, el conjunto de pares representa una función válida.'
ejemplos:
- titulo: Verificación de pares ordenados válidos
  enunciado: Determina si $\{(1,4), (2,4), (3,6)\}$ representa una función.
  solucion_pasos:
  - Cada valor de x (1, 2, 3) aparece una sola vez.
  - No importa que dos imágenes coincidan (4 se repite), eso no afecta la definición.
  - Es una función.
- titulo: Conjunto que no representa función
  enunciado: Determina si $\{(2,5), (2,9), (3,1)\}$ representa una función.
  solucion_pasos:
  - El valor x=2 aparece dos veces con imágenes distintas (5 y 9).
  - No es una función.
- titulo: ¿El orden en que se listan los pares ordenados afecta si representan una función?
  enunciado: ¿El orden en que se listan los pares ordenados afecta si representan una función?
  respuesta: 'No'
  solucion_pasos:
  - Lo que importa es la unicidad de imagen para cada x, no el orden de la lista.
- titulo: ¿Dos pares ordenados con la misma segunda componente pueden coexistir en una función?
  enunciado: ¿Dos pares ordenados con la misma segunda componente pueden coexistir en una función?
  respuesta: Sí
  solucion_pasos:
  - La unicidad exige una sola imagen por cada x, pero no prohíbe compartir imágenes entre distintos x.
errores_frecuentes:
- Confundir la repetición de una imagen (permitida) con la repetición de un valor de $x$ (prohibida).
- No verificar cuidadosamente todos los pares al buscar valores de $x$ repetidos en listas extensas.
- Asumir que el conjunto debe estar ordenado numéricamente para ser función.
- Ignorar pares con componentes iguales, como $(3,3)$, pensando que no son válidos.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
