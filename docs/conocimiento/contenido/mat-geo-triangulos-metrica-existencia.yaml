semantic_id: MAT.GEO.TRIANGULOS_METRICA.EXISTENCIA_TRIANGULO
titulo: Verificación de existencia de un triángulo a partir de tres medidas de lados
objetivo: Determinar si tres medidas dadas pueden efectivamente formar un triángulo, aplicando la desigualdad
  triangular.
introduccion: Antes de intentar dibujar o calcular propiedades de un triángulo con tres medidas dadas,
  conviene verificar si esas medidas realmente pueden formar un triángulo.
resumen: 'Tres medidas forman un triángulo si y solo si cumplen la desigualdad triangular: la suma de
  las dos menores debe superar a la mayor.'
explicacion: '![Verificación de existencia de un triángulo](/static/img/geometria/triangulos/triangulos-metrica-existencia.svg)


  ### Definición formal


  Dadas tres medidas positivas $a\le b\le c$, existe un triángulo con esos lados si y solo si $a+b>c$
  (las otras dos condiciones de la desigualdad triangular se cumplen automáticamente al ordenar así).


  ### Desarrollo didáctico


  Para verificar si 5, 6 y 9 forman un triángulo, se ordenan de menor a mayor (5, 6, 9) y se comprueba
  solo la condición crítica: $5+6=11>9$. Como se cumple, el triángulo existe.'
procedimiento:
- 'Paso 1: Ordena las tres medidas de menor a mayor.'
- 'Paso 2: Suma las dos medidas menores.'
- 'Paso 3: Si esa suma es mayor que la medida más grande, el triángulo existe.'
ejemplos:
- titulo: Verificar existencia
  enunciado: ¿Existe un triángulo con lados 5, 6 y 9?
  solucion_pasos:
  - 'Ordenados: 5, 6, 9. Como 5+6=11>9, el triángulo existe.'
- titulo: Caso inexistente
  enunciado: ¿Existe un triángulo con lados 2, 3 y 10?
  solucion_pasos:
  - 'Ordenados: 2, 3, 10. Como 2+3=5, que no es mayor que 10, el triángulo no existe.'
- titulo: ¿Basta con comparar solo las dos medidas menores contra la mayor?
  respuesta: Sí
  solucion_pasos:
  - Sí, si esa condición se cumple, las otras dos combinaciones se cumplen automáticamente.
- titulo: ¿Tres medidas iguales siempre forman un triángulo?
  respuesta: Sí
  solucion_pasos:
  - Sí, porque la suma de dos de ellas siempre supera a la tercera (que es igual a las otras).
errores_frecuentes:
- Verificar las tres combinaciones de suma en vez de solo la crítica (las dos menores contra la mayor).
- Ordenar mal las medidas antes de comparar.
- Confundir 'mayor que' con 'mayor o igual que' en la condición de existencia.
fuente: Elaboración propia.
estado: publicado
