semantic_id: MAT.ALG.COMPOSICION_FUNCIONES.CONCEPTO
titulo: Concepto de composición de funciones
objetivo: Comprender la composición de funciones como el proceso de aplicar una función sobre el resultado de
  otra.
introduccion: 'Imagina dos máquinas conectadas en línea: la salida de la primera se convierte directamente en
  la entrada de la segunda. Eso es exactamente componer funciones.'
resumen: La **composición** de dos funciones $f$ y $g$, denotada $(f \circ g)(x)$, consiste en aplicar primero
  $g$ a $x$ y luego aplicar $f$ al resultado obtenido, es decir, $(f \circ g)(x) = f(g(x))$.
explicacion: '### Definición formal


  Dadas $g: A \to B$ y $f: B \to C$, la composición $f \circ g: A \to C$ se define por $(f \circ g)(x) = f(g(x))$
  para todo $x \in A$. Para que la composición esté bien definida, el recorrido de $g$ debe estar contenido en
  el dominio de $f$.


  ### Desarrollo didáctico


  El orden importa: en $f \circ g$, se aplica primero $g$ (la función más cercana a $x$) y después $f$ (la función
  exterior).


  Si $g(x)=x+3$ y $f(x)=x^2$, entonces $(f \circ g)(x) = f(g(x)) = f(x+3) = (x+3)^2$: primero se suma 3, luego
  se eleva al cuadrado el resultado.'
procedimiento:
- 'Paso 1: Identifica cuál función se aplica primero (la interna, $g$) y cuál después (la externa, $f$).'
- 'Paso 2: Sustituye la expresión completa de $g(x)$ en cada aparición de la variable de $f$.'
- 'Paso 3: Simplifica la expresión resultante.'
ejemplos:
- titulo: Composición básica
  enunciado: 'Si $f(x)=2x$ y $g(x)=x+5$, calcula $(f \circ g)(x)$.'
  solucion_pasos:
  - Se sustituye $g(x)=x+5$ dentro de $f$.
  - '$(f \circ g)(x) = f(x+5) = 2(x+5) = 2x+10$.'
- titulo: Composición con función cuadrática
  enunciado: 'Si $f(x)=x^2-1$ y $g(x)=3x$, calcula $(f \circ g)(x)$.'
  solucion_pasos:
  - Se sustituye $g(x)=3x$ dentro de $f$.
  - '$(f \circ g)(x) = f(3x) = (3x)^2-1 = 9x^2-1$.'
- titulo: ¿$(f \circ g)(x)$ significa aplicar primero $f$ y luego $g$?
  enunciado: ¿$(f \circ g)(x)$ significa aplicar primero $f$ y luego $g$?
  respuesta: 'No'
  solucion_pasos:
  - Se aplica primero $g$ (la función interna) y luego $f$ sobre ese resultado.
- titulo: ¿La composición $(f \circ g)(x)$ es lo mismo que $f(x) \cdot g(x)$?
  enunciado: ¿La composición $(f \circ g)(x)$ es lo mismo que $f(x) \cdot g(x)$?
  respuesta: 'No'
  solucion_pasos:
  - La composición sustituye una función dentro de otra; el producto simplemente multiplica sus valores.
errores_frecuentes:
- Invertir el orden de aplicación, calculando $g(f(x))$ cuando se pide $(f \circ g)(x)$.
- Confundir la composición con el producto de las dos funciones.
- No sustituir la expresión completa de la función interna, sustituyendo solo parte de ella.
- Olvidar simplificar completamente la expresión resultante tras la sustitución.
fuente: Currículum Nacional MINEDUC y elaboración pedagógica ProfeOnline.
estado: publicado
