semantic_id: MAT.ALG.INECUACIONES_VALOR_ABSOLUTO
titulo: Inecuaciones con valor absoluto
objetivo: Comprender y resolver inecuaciones con valor absoluto, interpretándolas como condiciones de distancia respecto de un valor de referencia en la recta real.
introduccion: Las inecuaciones con valor absoluto aparecen cuando una cantidad debe mantenerse dentro de un margen, o bien quedar suficientemente alejada de un valor central. Su interpretación geométrica permite entender mejor por qué algunas soluciones se expresan como intervalos y otras como unión de intervalos.
resumen: Una inecuación con valor absoluto compara una distancia algebraica con un número real, y su resolución depende del tipo de desigualdad involucrada y del signo de la constante de comparación.
explicacion: |-
  ### Definición formal
  Una inecuación con valor absoluto es una desigualdad que contiene una expresión del tipo $|A(x)|$, donde $A(x)$ es una expresión algebraica. Resolverla consiste en determinar los valores de $x$ para los cuales la distancia representada por $|A(x)|$ satisface una condición de orden frente a una constante real.

  ### Desarrollo didáctico
  El significado más útil del valor absoluto es el de distancia. Por eso, expresiones como $|x-a|<b$ indican que $x$ debe estar a menos de $b$ unidades de $a$, mientras que $|x-a|>b$ exige que esté a más de esa distancia. Esta lectura permite anticipar la forma de la solución: los casos “menor que” producen una franja central, y los casos “mayor que” generan regiones separadas. Antes de operar, conviene verificar si la constante de comparación es positiva, nula o negativa, porque eso puede cambiar completamente la existencia de soluciones.
procedimiento:
  - Aislar la expresión con valor absoluto en uno de los miembros de la desigualdad.
  - Identificar si la comparación es del tipo menor, menor o igual, mayor, o mayor o igual.
  - Analizar el signo de la constante para determinar si la inecuación admite solución, no admite ninguna o se satisface para todos los reales.
  - Reescribir la desigualdad según la propiedad correspondiente, transformándola en una inecuación doble o en dos inecuaciones separadas.
  - Resolver las expresiones resultantes e interpretar el conjunto solución en intervalos o en la recta real.
ejemplos:
  - titulo: Tolerancia alrededor de un valor
    enunciado: Una medición $x$ debe diferir de $18$ en menos de $2$ unidades. Formule la inecuación y determine la solución.
    solucion_pasos:
      - La condición se expresa como $|x-18|<2$.
      - Al tratarse de una distancia menor que $2$, se obtiene la inecuación doble $-2<x-18<2$.
      - Sumamos $18$ en los tres miembros.
      - El conjunto solución es $16<x<20$.
  - titulo: Distancia mínima exigida
    enunciado: Resuelva $|2x-6|\ge 8$.
    solucion_pasos:
      - Una desigualdad del tipo “mayor o igual” se separa en dos casos: $2x-6\le -8$ o $2x-6\ge 8$.
      - En el primer caso se obtiene $2x\le -2$, luego $x\le -1$.
      - En el segundo caso se obtiene $2x\ge 14$, luego $x\ge 7$.
      - La solución es $(-\infty,-1]\cup[7,\infty)$.
  - titulo: ¿Si $|x-a|<b$, la solución siempre es una zona central?
    respuesta: Verdadero
    solucion_pasos:
      - Cuando $b>0$, la condición pide que la distancia entre $x$ y $a$ sea menor que $b$.
      - Eso equivale a ubicar a $x$ entre dos extremos equidistantes del centro $a$.
      - Por ello la solución toma la forma de un intervalo alrededor de $a$.
  - titulo: ¿Toda inecuación del tipo $|A(x)|>-3$ carece de solución?
    respuesta: Falso
    solucion_pasos:
      - El valor absoluto siempre es mayor o igual que $0$.
      - Como $0>-3$, cualquier valor posible de $|A(x)|$ satisface la desigualdad.
      - Por tanto, la solución es todo $\mathbb{R}$.
errores_frecuentes:
  - Resolver $|A(x)|<b$ como una sola desigualdad y omitir el extremo negativo.
  - Confundir los casos “menor que” con los casos “mayor que” al traducir la propiedad del valor absoluto.
  - Ignorar el signo de la constante y trabajar mecánicamente aunque el problema ya esté resuelto por análisis previo.
  - Representar una unión de intervalos como si fuera un intervalo único y continuo.
  - Perder la interpretación de distancia, lo que dificulta comprobar si el resultado obtenido es razonable.
