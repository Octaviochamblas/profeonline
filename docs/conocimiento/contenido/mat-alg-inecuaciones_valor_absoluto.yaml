semantic_id: MAT.ALG.INECUACIONES_VALOR_ABSOLUTO
title: 'Inecuaciones con valor absoluto: Conceptos generales'
description: |-
  Comprender la estructura y los fundamentos matemáticos de las inecuaciones que involucran valor absoluto, reconociendo la distancia entre elementos en la recta real.
content:
  introduccion: |-
    El valor absoluto de una expresión matemática representa su distancia al origen en la recta real. Al trabajar con inecuaciones que contienen valor absoluto, se modelan conjuntos de números cuyas distancias cumplen ciertas condiciones de orden, lo que permite resolver problemas donde las variaciones o márgenes de error son limitados.
  resumen: |-
    Una inecuación con valor absoluto es una desigualdad de la forma $|A(x)| < b$, $|A(x)| > b$, $|A(x)| \leq b$ o $|A(x)| \geq b$, donde $A(x)$ es una expresión algebraica y $b$ es un número real.
  explicacion: |-
    ### Definición formal
    Una inecuación con valor absoluto en la variable $x$ es una desigualdad que contiene el valor absoluto de una expresión algebraica en $x$. Se clasifica según el signo de desigualdad y el valor de la constante con la cual se compara. Sus conjuntos solución se determinan aplicando las propiedades de orden del valor absoluto.

    ### Desarrollo didáctico
    Para comprender estas inecuaciones, es esencial recordar que el valor absoluto $|x|$ indica la distancia desde $x$ hasta el cero. Por ende, la inecuación $|x| < a$ (con $a > 0$) busca todos los puntos cuya distancia al cero es estrictamente menor que $a$, formando el intervalo abierto $(-a, a)$. Análogamente, $|x| > a$ busca los puntos cuya distancia al cero es estrictamente mayor que $a$, lo que corresponde a la unión de intervalos $(-\infty, -a) \cup (a, \infty)$. Las expresiones más complejas, como $|A(x)|$, se analizan con los mismos principios.
  pasos:
  - |-
    Identificar el tipo de desigualdad involucrada ($<$, $>$, $\leq$, $\geq$).
  - |-
    Aislar la expresión con valor absoluto en un lado de la inecuación, si es necesario.
  - |-
    Analizar el signo de la constante con la cual se compara el valor absoluto.
  - |-
    Aplicar la propiedad correspondiente al tipo de desigualdad para reescribir la inecuación como un sistema de inecuaciones lineales o cuadráticas sin valor absoluto.
  - |-
    Resolver las inecuaciones resultantes y combinar las soluciones mediante intersección o unión, según corresponda.
  ejemplos_resueltos:
  - tipo: abierto
    titulo: Distancia a una referencia
    enunciado: |-
      La temperatura en un reactor debe mantenerse a $50^\circ$C con un margen de tolerancia estrictamente menor a $3^\circ$C. Si $T$ representa la temperatura en grados Celsius, exprese esta condición mediante una inecuación y determine el conjunto solución.
    pasos:
    - |-
      La diferencia entre la temperatura $T$ y la referencia $50$ es $T - 50$.
    - |-
      El margen de tolerancia implica que el valor absoluto de esta diferencia debe ser menor que $3$: $|T - 50| < 3$.
    - |-
      Por la propiedad del valor absoluto, esto es equivalente a $-3 < T - 50 < 3$.
    - 'Sumando $50$ a cada término: $-3 + 50 < T < 3 + 50$.'
    - El conjunto solución es $47 < T < 53$.
  - tipo: abierto
    titulo: Intervalos de exclusión
    enunciado: |-
      Un sistema de seguridad activa su alarma si la presión $P$ en bares de una caldera difiere de $100$ bares en $5$ bares o más. Determine el conjunto de valores de $P$ que activan la alarma.
    pasos:
    - |-
      La diferencia de la presión respecto al valor nominal es $P - 100$.
    - |-
      La condición de activación es que la magnitud de esta diferencia sea igual o superior a $5$: $|P - 100| \geq 5$.
    - |-
      Esto se descompone en dos inecuaciones: $P - 100 \leq -5$ o $P - 100 \geq 5$.
    - 'Resolviendo cada una: $P \leq 95$ o $P \geq 105$.'
    - |-
      El conjunto de valores es $P \in (-\infty, 95] \cup [105, \infty)$.
  - tipo: verdadero_falso
    titulo: ¿Es $|x+2| < 5$ equivalente a $-3 < x < 3$?
    afirmacion: ¿Es $|x+2| < 5$ equivalente a $-3 < x < 3$?
    respuesta: false
    explicacion: |-
      Se aplica la propiedad del valor absoluto: $-5 < x + 2 < 5$.
      Se resta $2$ a toda la expresión: $-5 - 2 < x < 5 - 2$.
      El resultado correcto es $-7 < x < 3$.
  - tipo: verdadero_falso
    titulo: ¿El conjunto solución de $|x| \geq -2$ es $\mathbb{R}$?
    afirmacion: ¿El conjunto solución de $|x| \geq -2$ es $\mathbb{R}$?
    respuesta: true
    explicacion: |-
      El valor absoluto de cualquier número real siempre es mayor o igual a cero, es decir, $|x| \geq 0$.
      Como $0 > -2$, se deduce por transitividad que $|x| \geq -2$ para todo $x$ en los números reales.
      Por lo tanto, la inecuación es válida para cualquier número real.
  errores_frecuentes:
  - descripcion: |-
      Asumir que $|x-a| < b$ es equivalente a $x-a < b$ e ignorar el caso negativo.
  - descripcion: Creer que una inecuación como $|x| > -5$ no tiene solución.
  - descripcion: Resolver $|x| > a$ como $-a < x < a$.
  - descripcion: |-
      Considerar que $|x+y| < a$ implica $|x| + |y| < a$ como paso de resolución.
  - descripcion: |-
      Tratar a $|x| \leq 0$ como una inecuación sin solución en lugar de la ecuación $x = 0$.
