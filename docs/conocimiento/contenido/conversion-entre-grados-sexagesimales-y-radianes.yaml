semantic_id: MAT.GEO.MEDICION_ANGULAR.CONVERSION_GRADOS_RADIANES
titulo: Conversión entre grados sexagesimales y radianes
objetivo: Convertir medidas angulares usando la equivalencia adecuada y comprobar que conviene dejar el
  resultado exacto en función de \(\pi\) cuando no se pide aproximación decimal.
introduccion: 'Una misma abertura puede leerse con grados o con radianes. La conversión no cambia el ángulo:
  solo cambia la unidad con que lo describimos.'
resumen: Convertir entre grados y radianes exige usar la equivalencia \(180°=\pi\) rad. Como idea de control,
  conviene dejar el resultado exacto en función de \(\pi\) cuando no se pide aproximación decimal.
explicacion: 'Convertir entre grados y radianes exige usar la equivalencia \(180°=\pi\) rad.


  Cuando se analiza “para pasar 60° a radianes se calcula \(60\cdot\pi/180=\pi/3\)” conviene evitar la
  memoria mecánica. El control decisivo es comprobar que conviene dejar el resultado exacto en función
  de \(\pi\) cuando no se pide aproximación decimal.'
procedimiento:
- 'Paso 1: Identifica en qué unidad está dada la medida y a qué unidad debe pasar.'
- 'Paso 2: Escribe la equivalencia base del sistema involucrado antes de calcular.'
- 'Paso 3: Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.'
ejemplos:
- titulo: Caso guiado — Conversión grados-radianes
  enunciado: Para pasar 60° a radianes se calcula \(60\cdot\pi/180=\pi/3\).
  solucion_pasos:
  - Identifica en qué unidad está dada la medida y a qué unidad debe pasar.
  - Escribe la equivalencia base del sistema involucrado antes de calcular.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: Verificación de la solución — Conversión grados-radianes
  enunciado: En la situación “para pasar 60° a radianes se calcula \(60\cdot\pi/180=\pi/3\)”, un compañero
    llega a la respuesta correcta pero no explica el paso decisivo. Reconstruye la justificación completa.
  solucion_pasos:
  - 'Parte de la definición: convertir entre grados y radianes exige usar la equivalencia \(180°=\pi\)
    rad.'
  - Escribe la equivalencia base del sistema involucrado antes de calcular.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: ¿La interpretación del dibujo es válida? — Conversión grados-radianes
  respuesta: Sí
  solucion_pasos:
  - 'Sí. La situación encaja con la definición del recurso: convertir entre grados y radianes exige usar
    la equivalencia \(180°=\pi\) rad.'
  - En el caso “para pasar 60° a radianes se calcula \(60\cdot\pi/180=\pi/3\)” se observa que conviene
    dejar el resultado exacto en función de \(\pi\) cuando no se pide aproximación decimal.
  - Resuelve la proporción o la operación y verifica que el resultado tenga la unidad pedida.
- titulo: ¿Se puede cerrar sin el control final? — Conversión grados-radianes
  respuesta: 'No'
  solucion_pasos:
  - No. Un inicio útil no reemplaza la justificación completa de conversión entre grados sexagesimales
    y radianes.
  - Después del paso “Identifica en qué unidad está dada la medida y a qué unidad debe pasar.” todavía
    hace falta revisar “Escribe la equivalencia base del sistema involucrado antes de calcular.”.
  - El cierre correcto exige “Resuelve la proporción o la operación y verifica que el resultado tenga
    la unidad pedida.”.
errores_frecuentes:
- Conversión grados-radianes significa dividir por \(\pi\) siempre, sin revisar en qué sentido va la conversión.
- Para resolver conversión grados-radianes, basta con el paso “Identifica en qué unidad está dada la medida
  y a qué unidad debe pasar.” y no hace falta revisar “Escribe la equivalencia base del sistema involucrado
  antes de calcular.”.
- Si el dibujo parece claro, se puede ignorar que conviene dejar el resultado exacto en función de \(\pi\)
  cuando no se pide aproximación decimal.
- Dos configuraciones distintas representan conversión grados-radianes solo porque contienen la palabra
  'ángulo'.
- Se puede cerrar el ejercicio sin aplicar el control final “Resuelve la proporción o la operación y verifica
  que el resultado tenga la unidad pedida.”.
fuente: Currículum Nacional MINEDUC — Medición angular, sistemas sexagesimal, radial y centesimal.
