semantic_id: MAT.ALG.FUNC_TRIG_MODELO.MODELO_SENO_CONTEXTO
titulo: Construcción de un modelo con función seno en contexto
objetivo: Construir un modelo $f(t)=a\sin(b(t-c))+d$ a partir de datos de un fenómeno periódico que comienza en
  su valor medio y sube.
introduccion: Cuando un fenómeno comienza en su valor promedio y su primer movimiento es de ascenso, conviene
  usar la función seno como base del modelo.
resumen: Se usa un **modelo con seno** cuando el fenómeno comienza en su línea media y su tendencia inicial es
  creciente, siguiendo la forma $f(t)=a\sin(b(t-c))+d$.
explicacion: '### Definición formal


  El seno básico comienza en $0$ (su línea media) y sube hacia el máximo. Si el fenómeno tiene ese
  comportamiento en el instante de referencia, conviene modelarlo con $f(t)=a\sin(b(t-c))+d$, ajustando
  amplitud, periodo, desfase y línea media según los datos observados.


  ### Desarrollo didáctico


  La altura de una rueda de la fortuna, medida desde su centro, comienza en $0$ (a la altura del eje) y sube;
  esto sugiere un modelo tipo seno: $h(t)=a\sin(bt)+d$, donde $a$ es el radio de la rueda y $d$ la altura del
  eje respecto al suelo.'
procedimiento:
- 'Paso 1: Verifica que el fenómeno comience en su valor medio y con tendencia creciente.'
- 'Paso 2: Calcula la amplitud, el periodo, el desfase y la línea media a partir de los datos.'
- 'Paso 3: Escribe el modelo completo $f(t)=a\sin(b(t-c))+d$.'
ejemplos:
- titulo: Construcción de un modelo simple
  enunciado: 'Una señal comienza en $0$, sube a $5$, vuelve a $0$ en $2$ segundos, baja a $-5$, y vuelve a $0$
    en $4$ segundos. Escribe su modelo.'
  solucion_pasos:
  - 'Amplitud $a=5$; periodo $T=4$, así que $b=2\pi/4=\pi/2$; sin desfase ni desplazamiento vertical.'
  - 'El modelo es $f(t)=5\sin(\pi t/2)$.'
- titulo: Identificación del uso del seno
  enunciado: '¿Por qué se usa seno y no coseno para modelar una señal que comienza en su valor medio y sube?'
  solucion_pasos:
  - El seno básico comienza exactamente en $0$ (su línea media) con tendencia creciente.
  - Es la elección natural para ese comportamiento inicial.
- titulo: ¿Es posible modelar el mismo fenómeno con coseno en vez de seno?
  enunciado: ¿Es posible modelar un fenómeno que comienza en su valor medio usando coseno en vez de seno, con un
    desfase adecuado?
  respuesta: Sí
  solucion_pasos:
  - Aplicando el desfase correcto, cualquier función coseno puede reescribirse como una función seno equivalente.
- titulo: ¿El modelo con seno siempre tiene desfase igual a cero?
  enunciado: ¿Un modelo basado en seno siempre tiene el parámetro $c$ igual a cero?
  respuesta: 'No'
  solucion_pasos:
  - Si el fenómeno no comienza exactamente en el instante de referencia elegido, se necesita un desfase distinto de cero.
errores_frecuentes:
- Elegir seno cuando el fenómeno en realidad comienza en su valor máximo (caso más apropiado para coseno).
- No verificar la tendencia inicial (creciente o decreciente) antes de elegir el modelo.
- Calcular mal la amplitud o el periodo a partir de los datos observados.
- Olvidar incluir la línea media si el fenómeno no oscila alrededor de $0$.
