semantic_id: MAT.ALG.LENGUAJE_RELACIONES.EXCESO_NUMERO
objetivo: Comprender y traducir el concepto de 'exceso', que equivale matemáticamente
  a una diferencia o resta.
introduccion: Cuando decimos que un camión 'excede' el límite de peso por 500 kilos,
  estamos hablando de lo que le sobra. Y la única forma matemática de calcular cuánto
  le sobra a algo, es mediante la resta.
resumen: 'El **Exceso de un número sobre otro** se traduce planteando una **resta**
  donde la primera cantidad (el que excede) es el minuendo, y la segunda (el que es
  excedido) es el sustraendo: **$x - y$**.'
explicacion: 'Palabras clave:

  - El exceso de A sobre B: $A - B$

  - A excede a B en C: $A - B = C$

  - Lo que B es excedido por A: $A - B$


  Frecuentemente, el concepto de exceso asusta por su redacción rebuscada. Sin embargo,
  ''el exceso de 10 sobre 7'' es simplemente preguntar ''¿cuánto le sobra al 10 para
  igualar al 7?''. La respuesta es la resta: $10 - 7 = 3$.

  En álgebra, ''El exceso del doble de un número sobre 5 es 11'' se traduce como:
  $2x - 5 = 11$.'
procedimiento:
- 'Paso 1: Identifica a la entidad mayor (la que excede). Escríbela primero.'
- 'Paso 2: Escribe el signo de resta (-).'
- 'Paso 3: Identifica a la entidad menor (la que es superada). Escríbela después del
  signo menos.'
- 'Paso 4: Si te dan el valor exacto del exceso, iguálalo a la resta (Ej. ... = 10).'
ejemplos:
- titulo: Lo que sobra
  enunciado: 'Traduce algebraicamente: ''El exceso de tu salario sobre tus gastos
    es de mil dólares''.'
  solucion_pasos:
  - 'El que excede (el mayor): Salario (S).'
  - 'El superado (el menor): Gastos (G).'
  - 'La resta del exceso: S - G.'
  - 'El valor del exceso es mil: S - G = 1000.'
errores_frecuentes:
- Confundir el 'exceso' con un 'aumento', y sumar las variables ($A+B$) en lugar de
  restarlas.
- Invertir el orden de la resta (escribir $B - A$ en lugar de $A - B$).
fuente: Álgebra de Baldor.
estado: publicado
