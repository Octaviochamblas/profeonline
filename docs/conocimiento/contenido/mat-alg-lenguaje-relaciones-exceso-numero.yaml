semantic_id: MAT.ALG.LENGUAJE_RELACIONES.EXCESO_NUMERO
objetivo: Comprender y traducir el concepto de 'exceso', que equivale matemáticamente a una diferencia o resta.
introduccion: Cuando decimos que un camión 'excede' el límite de peso por 500 kilos, estamos hablando de lo que
  le sobra. Y la única forma matemática de calcular cuánto le sobra a algo, es mediante la resta.
resumen: 'El **Exceso de un número sobre otro** se traduce planteando una **resta** donde la primera cantidad (el
  que excede) es el minuendo, y la segunda (el que es excedido) es el sustraendo: **$x - y$**.'
explicacion: '### Definición formal


  El exceso mide cuánto más grande es A en comparación con B. Eso es, por definición, la distancia entre ellos en
  la recta numérica, lo que se calcula restando $A - B$.


  ### Desarrollo didáctico


  Palabras clave:

  - El exceso de A sobre B: $A - B$

  - A excede a B en C: $A - B = C$

  - Lo que B es excedido por A: $A - B$


  Frecuentemente, el concepto de exceso asusta por su redacción rebuscada. Sin embargo, ''el exceso de 10 sobre
  7'' es simplemente preguntar ''¿cuánto le sobra al 10 para igualar al 7?''. La respuesta es la resta: $10 - 7
  = 3$.

  En álgebra, ''El exceso del doble de un número sobre 5 es 11'' se traduce como: $2x - 5 = 11$.'
procedimiento:
- 'Paso 1: Identifica a la entidad mayor (la que excede). Escríbela primero.'
- 'Paso 2: Escribe el signo de resta (-).'
- 'Paso 3: Identifica a la entidad menor (la que es superada). Escríbela después del signo menos.'
- 'Paso 4: Si te dan el valor exacto del exceso, iguálalo a la resta (Ej. . = 10).'
ejemplos:
- titulo: Lo que sobra
  enunciado: 'Traduce algebraicamente: ''El exceso de tu salario sobre tus gastos es de mil dólares''.'
  solucion_pasos:
  - 'El que excede (el mayor): Salario (S).'
  - 'El superado (el menor): Gastos (G).'
  - 'La resta del exceso: S - G.'
  - 'El valor del exceso es mil: S - G = 1000.'
- titulo: 'Un contrato de alquiler estipula: ''La multa a pagar será equivalente al cuadrado del exceso'
  enunciado: 'Un contrato de alquiler estipula: ''La multa a pagar será equivalente al cuadrado del exceso de los
    días de retraso ($d$) sobre los días de gracia permitidos ($g$)''. ¿Cuál es la fórmula matemática que define
    la multa ($M$)? (v1)


    Opciones: A) $M = (d - g)^2$ · B) $M = d^2 - g^2$ · C) $M = d + g^2$ · D) $M = (g - d)^2$'
  solucion_pasos:
  - 'Primero determinamos el exceso de retraso sobre gracia: $d - g$. Luego se nos pide el cuadrado de esa cantidad
    entera (del exceso). Entonces encerramos en paréntesis y elevamos: $(d - g)^2$.'
  - 'Respuesta: $M = (d - g)^2$'
- titulo: 'Respecto de «Traducción del exceso de un número sobre otro»: ¿Se ajusta a la definición esta'
  enunciado: 'Respecto de «Traducción del exceso de un número sobre otro»: ¿Se ajusta a la definición esta afirmación?
    «El **Exceso de un número sobre otro** se traduce planteando una **resta** donde la primera cantidad (el que
    excede) es el minuendo, y la segunda (el que es excedido) es el sustraendo: **$x - y$**»'
  respuesta: Sí
  solucion_pasos:
  - 'La afirmación coincide con la definición formal: El **Exceso de un número sobre otro** se traduce planteando
    una **resta** donde la primera cantidad (el que excede) es el minuendo, y la segunda (el que es excedido) es
    el sustraendo: **$x - y$**.'
- titulo: 'Respecto de «Traducción del exceso de un número sobre otro»: ¿Es compatible con el procedimi'
  enunciado: 'Respecto de «Traducción del exceso de un número sobre otro»: ¿Es compatible con el procedimiento esta
    afirmación? «Confundir el ''exceso'' con un ''aumento'', y sumar las variables ($A+B$) en lugar de restarlas»'
  respuesta: 'No'
  solucion_pasos:
  - 'La afirmación es falsa. El criterio correcto es: El **Exceso de un número sobre otro** se traduce planteando
    una **resta** donde la primera cantidad (el que excede) es el minuendo, y la segunda (el que es excedido) es
    el sustraendo: **$x - y$**.'
errores_frecuentes:
- Confundir el 'exceso' con un 'aumento', y sumar las variables ($A+B$) en lugar de restarlas.
- Invertir el orden de la resta (escribir $B - A$ en lugar de $A - B$).
- Una adición, sumando el exceso a la cantidad menor.
- Una división entre $A$ y $B$.
- Un cálculo de porcentaje sobre $A$.
fuente: Álgebra de Baldor.
estado: publicado
titulo: Traducción del exceso de un número sobre otro
