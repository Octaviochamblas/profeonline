semantic_id: MAT.EST.REPRESENTACION_CONTEO.DIAGRAMA_ARBOL_PROBABILIDADES
titulo: Uso de diagramas de árbol para calcular probabilidades en etapas
objetivo: Utilizar un diagrama de árbol para calcular la probabilidad de un resultado compuesto, multiplicando
  las probabilidades a lo largo del camino correspondiente.
introduccion: Además de representar los resultados posibles, un diagrama de árbol puede etiquetarse con
  las probabilidades de cada rama, permitiendo calcular la probabilidad de cualquier camino completo.
resumen: La probabilidad de un resultado representado por un camino completo del árbol se calcula multiplicando
  las probabilidades de todas las ramas que forman ese camino.
explicacion: '![Diagrama de árbol con probabilidades](/static/img/probabilidad/conteo/conteo-diagrama-arbol-probabilidades.svg)


  ### Definición formal


  Si un camino del árbol pasa por ramas con probabilidades $p_1, p_2, \ldots, p_k$, la probabilidad de
  ese resultado compuesto es $p_1\times p_2\times\cdots\times p_k$.


  ### Desarrollo didáctico


  Al lanzar una moneda dos veces, cada rama tiene probabilidad $\dfrac{1}{2}$. La probabilidad del camino
  ''CC'' es $\dfrac{1}{2}\times\dfrac{1}{2}=\dfrac{1}{4}$, igual para los otros tres caminos (CS, SC,
  SS).'
procedimiento:
- 'Paso 1: Construye el árbol y etiqueta cada rama con su probabilidad correspondiente.'
- 'Paso 2: Identifica el camino completo que representa el resultado de interés.'
- 'Paso 3: Multiplica las probabilidades de todas las ramas de ese camino para obtener la probabilidad
  del resultado.'
ejemplos:
- titulo: Calcular la probabilidad de 'CC' en dos lanzamientos
  enunciado: Cada rama tiene probabilidad 1/2.
  solucion_pasos:
  - P(CC)=1/2×1/2=1/4.
- titulo: Calcular la probabilidad de un camino con probabilidades distintas
  enunciado: 'Rama 1: P=0,3; rama 2: P=0,6.'
  solucion_pasos:
  - P(camino)=0,3×0,6=0,18.
- titulo: ¿Se multiplican las probabilidades de las ramas para obtener la probabilidad de un camino completo?
  respuesta: Sí
  solucion_pasos:
  - Sí, es la regla básica de cálculo con diagramas de árbol.
- titulo: ¿La suma de las probabilidades de todos los caminos completos del árbol debe dar 1?
  respuesta: Sí
  solucion_pasos:
  - Sí, ya que representan todos los resultados posibles del espacio muestral.
errores_frecuentes:
- Sumar las probabilidades de las ramas de un camino en vez de multiplicarlas.
- Olvidar verificar que la suma de todos los caminos completos sea igual a 1.
- Confundir la probabilidad de una sola rama con la probabilidad del camino completo.
fuente: 'Elaboración propia (referencia: Moraleja 405).'
estado: publicado
