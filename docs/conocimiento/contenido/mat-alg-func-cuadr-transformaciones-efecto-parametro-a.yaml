semantic_id: MAT.ALG.FUNC_CUADR_TRANSFORMACIONES.EFECTO_PARAMETRO_A
titulo: Relación entre el parámetro a, la concavidad y la abertura de la parábola
objetivo: Sintetizar el doble efecto del parámetro $a$ sobre la gráfica de una función cuadrática, combinando
  signo y valor absoluto.
introduccion: 'El coeficiente $a$ hace dos trabajos a la vez: su signo decide hacia dónde abre la parábola, y su
  valor absoluto decide qué tan abierta o cerrada se ve.'
resumen: 'El parámetro $a$ determina simultáneamente la **concavidad** (según su signo: arriba si $a>0$, abajo
  si $a<0$) y la **abertura** (según su valor absoluto: más angosta si $|a|>1$, más ancha si $0<|a|<1$) de la
  parábola.'
explicacion: '### Definición formal


  Dada $f(x)=ax^2$, el parámetro $a$ tiene dos efectos independientes: el signo de $a$ determina la concavidad
  (hacia arriba si $a>0$, hacia abajo si $a<0$), y el valor $|a|$ determina la abertura (contracción si $|a|>1$,
  dilatación si $0<|a|<1$).


  ### Desarrollo didáctico


  Para analizar completamente el efecto de $a$, conviene separar el análisis en dos preguntas independientes:
  ¿cuál es el signo de $a$? y ¿cuál es el valor de $|a|$? Ambas respuestas se combinan para describir completamente
  la parábola.


  Para $f(x)=-3x^2$: el signo negativo indica concavidad hacia abajo; el valor absoluto $3>1$ indica que la parábola
  es más angosta que $x^2$. Combinando ambos efectos, es una parábola angosta que abre hacia abajo.'
procedimiento:
- 'Paso 1: Analiza el signo de $a$ para determinar la concavidad (arriba o abajo).'
- 'Paso 2: Analiza el valor absoluto de $a$ para determinar la abertura (más angosta o más ancha que $x^2$).'
- 'Paso 3: Combina ambos análisis para describir completamente la forma de la parábola.'
ejemplos:
- titulo: Análisis combinado con a negativo y grande
  enunciado: 'Describe completamente el efecto de $a$ en $f(x)=-6x^2$.'
  solucion_pasos:
  - Concavidad hacia abajo, pues $a=-6<0$.
  - Más angosta que $x^2$, pues $|a|=6>1$.
- titulo: Análisis combinado con a positivo y pequeño
  enunciado: 'Describe completamente el efecto de $a$ en $f(x)=0{,}2x^2$.'
  solucion_pasos:
  - Concavidad hacia arriba, pues $a=0{,}2>0$.
  - Más ancha que $x^2$, pues $|a|=0{,}2<1$.
- titulo: ¿Son independientes el efecto del signo y del valor absoluto de $a$?
  enunciado: ¿Son independientes el efecto del signo y del valor absoluto de $a$?
  respuesta: Sí
  solucion_pasos:
  - El signo determina exclusivamente la concavidad, y el valor absoluto determina exclusivamente la abertura;
    son análisis separados.
- titulo: ¿Dos parábolas con el mismo $|a|$ pero signo opuesto tienen la misma abertura?
  enunciado: ¿Dos parábolas con el mismo $|a|$ pero signo opuesto tienen la misma abertura?
  respuesta: Sí
  solucion_pasos:
  - La abertura depende solo del valor absoluto de $a$, por lo que sería idéntica aunque las concavidades sean
    opuestas.
errores_frecuentes:
- Analizar solo el signo de $a$ sin considerar el efecto de su valor absoluto en la abertura.
- Analizar solo el valor absoluto sin considerar el efecto del signo en la concavidad.
- Confundir "parábola angosta" con "parábola con concavidad hacia abajo", que son propiedades independientes.
- No combinar correctamente ambos efectos al describir completamente una parábola.
