# DAG de prerrequisitos — Eje 01 (Fundamentos): Lógica y Conjuntos
# Primer eje del árbol: no depende de ningún otro. Aristas validadas contra el rango real
# de `cursos` de cada tema (no solo el orden del código): una arista "A requiere B" solo
# se agrega si el curso mínimo de B es igual o anterior al curso mínimo de A.
prerequisitos:
  # --- Lógica (todos 3M-4M) ---
  - node: MAT.FUND.CONECTIVOS_LOGICOS
    requires: MAT.FUND.LOGICA_BASICA
    kind: requerido
  - node: MAT.FUND.TABLAS_VERDAD
    requires: MAT.FUND.CONECTIVOS_LOGICOS
    kind: requerido
  - node: MAT.FUND.RAZONAMIENTO_LOGICO
    requires: MAT.FUND.TABLAS_VERDAD
    kind: requerido
  - node: MAT.FUND.CUANTIFICADORES
    requires: MAT.FUND.LOGICA_BASICA
    kind: requerido
  - node: MAT.FUND.CUANTIFICADORES
    requires: MAT.FUND.CONECTIVOS_LOGICOS
    kind: recomendado

  # --- Conjuntos (desde 3B hasta 4M según el tema) ---
  - node: MAT.FUND.RELACIONES_CONJUNTOS
    requires: MAT.FUND.CONJUNTOS_BASICOS
    kind: requerido
  - node: MAT.FUND.DIAGRAMAS_VENN
    requires: MAT.FUND.RELACIONES_CONJUNTOS
    kind: requerido
  - node: MAT.FUND.OPERACIONES_CONJUNTOS
    requires: MAT.FUND.CONJUNTOS_BASICOS
    kind: requerido
  - node: MAT.FUND.OPERACIONES_CONJUNTOS
    requires: MAT.FUND.DIAGRAMAS_VENN
    kind: recomendado
  - node: MAT.FUND.PROPIEDADES_CONJUNTOS
    requires: MAT.FUND.OPERACIONES_CONJUNTOS
    kind: requerido
  - node: MAT.FUND.CARDINALIDAD_CONJUNTOS
    requires: MAT.FUND.OPERACIONES_CONJUNTOS
    kind: requerido
  - node: MAT.FUND.PRODUCTO_CARTESIANO
    requires: MAT.FUND.CONJUNTOS_BASICOS
    kind: requerido
