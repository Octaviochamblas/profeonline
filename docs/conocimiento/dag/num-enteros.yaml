# DAG de prerrequisitos — Eje 02 (Números), Bloque 01: Números Enteros
# Regla: la operatoria en enteros requiere dominar antes el conjunto y orden.
# Acíclico, intra-bloque. Los prerrequisitos entre bloques se agregan cuando el
# segundo bloque esté poblado.
prerequisitos:
  - node: MAT.NUM.ENTEROS_OPERATORIA     # Operatoria en enteros
    requires: MAT.NUM.ENTEROS_CONJUNTO   # El conjunto de los enteros y orden
    kind: requerido
    min_mastery: 0.75
