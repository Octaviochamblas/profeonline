      - { cod: "01.01.01.02", id: MAT.FUND.LOGICA_BASICA.EXPRESION_NO_PROPOSICIONAL, nombre: "Identificación de expresiones que no son proposiciones", dificultad: basica, cursos: [3M, 4M] }
      - { cod: "01.01.01.03", id: MAT.FUND.LOGICA_BASICA.PROPOSICION_SIMPLE, nombre: "Proposición simple", dificultad: basica, cursos: [3M, 4M] }
