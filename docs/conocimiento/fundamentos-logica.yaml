      - { cod: "01.01.05.02", id: MAT.FUND.CUANTIFICADORES.CUANTIFICADOR_EXISTENCIAL, nombre: "Cuantificador existencial", dificultad: media, cursos: [3M, 4M] }
      - { cod: "01.01.05.03", id: MAT.FUND.CUANTIFICADORES.DOMINIO_DE_DISCURSO, nombre: "Dominio de discurso", dificultad: media, cursos: [3M, 4M] }
      - { cod: "01.01.05.04", id: MAT.FUND.CUANTIFICADORES.NEGACION_UNIVERSAL, nombre: "Negación de una proposición universal", dificultad: avanzada, cursos: [3M, 4M] }
