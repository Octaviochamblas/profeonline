      - { cod: "01.01.04.05", id: MAT.FUND.RAZONAMIENTO_LOGICO.CONDICIONAL_RECIPROCO, nombre: "Recíproco de un condicional", dificultad: media, cursos: [3M, 4M] }
      - { cod: "01.01.04.06", id: MAT.FUND.RAZONAMIENTO_LOGICO.CONDICIONAL_INVERSO, nombre: "Inverso de un condicional", dificultad: media, cursos: [3M, 4M] }
      - { cod: "01.01.04.07", id: MAT.FUND.RAZONAMIENTO_LOGICO.CONDICIONAL_CONTRARRECIPROCO, nombre: "Contrarrecíproco de un condicional", dificultad: media, cursos: [3M, 4M] }
