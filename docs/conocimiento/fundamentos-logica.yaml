      - { cod: "01.01.03.09", id: MAT.FUND.TABLAS_VERDAD.CONSTRUCCION_DOS_VARIABLES, nombre: "Construcción de tabla de verdad con dos variables", dificultad: media, cursos: [3M, 4M] }
      - { cod: "01.01.03.10", id: MAT.FUND.TABLAS_VERDAD.CONSTRUCCION_TRES_VARIABLES, nombre: "Construcción de tabla de verdad con tres variables", dificultad: avanzada, cursos: [3M, 4M] }
      - { cod: "01.01.03.11", id: MAT.FUND.TABLAS_VERDAD.TAUTOLOGIA, nombre: "Tautología", dificultad: media, cursos: [3M, 4M] }
      - { cod: "01.01.03.12", id: MAT.FUND.TABLAS_VERDAD.CONTRADICCION, nombre: "Contradicción", dificultad: media, cursos: [3M, 4M] }
      - { cod: "01.01.03.13", id: MAT.FUND.TABLAS_VERDAD.CONTINGENCIA, nombre: "Contingencia", dificultad: media, cursos: [3M, 4M] }

