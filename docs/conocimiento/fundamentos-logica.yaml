      - { cod: "01.01.03.04", id: MAT.FUND.TABLAS_VERDAD.TABLA_DISYUNCION_EXCLUSIVA, nombre: "Tabla de verdad de la disyunción exclusiva", dificultad: media, cursos: [3M, 4M] }
