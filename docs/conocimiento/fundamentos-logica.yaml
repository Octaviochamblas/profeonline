      - { cod: "01.01.02.03", id: MAT.FUND.CONECTIVOS_LOGICOS.DISYUNCION_INCLUSIVA, nombre: "Disyunción inclusiva", dificultad: basica, cursos: [3M, 4M] }
      - { cod: "01.01.02.04", id: MAT.FUND.CONECTIVOS_LOGICOS.DISYUNCION_EXCLUSIVA, nombre: "Disyunción exclusiva", dificultad: media, cursos: [3M, 4M] }
