# =============================================================================
# DETALLE ATÓMICO — Eje 01: FUNDAMENTOS · Bloque 01: Lógica
# Grano: núcleo mínimo (1 recurso = 1 idea = 1 video corto).
# Nomenclatura: EE.BB.TT.RR. id = identificador semántico estable.
# competencia: M1 | M2 | U   dificultad: basica < media < avanzada
# Archivo separado (un archivo por bloque). Temas 01.01.01–01.01.05.
# =============================================================================

rama: Fundamentos
codigo: "01"
abreviatura: FUND
bloque: "Lógica"
bloque_codigo: "01.01"
