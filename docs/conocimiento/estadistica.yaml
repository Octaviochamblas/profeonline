# =============================================================================
# DETALLE — Rama ESTADÍSTICA
# Backbone PAES (Cap 19, 20). Rama que solo cubría el texto PAES.
# =============================================================================

rama: Estadística
abreviatura: EST
temas:

  - id: MAT.EST.DATOS
    nombre: Análisis y tabulación de datos
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Tabulación de datos no agrupados", dificultad: basica }
      - { n: "02", nombre: "Tablas de frecuencia para datos agrupados (intervalos)", dificultad: media }

  - id: MAT.EST.GRAFICOS
    nombre: Representación gráfica e interpretación
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Histograma y gráfico de barras", dificultad: basica }
      - { n: "02", nombre: "Polígono de frecuencias", dificultad: media }
      - { n: "03", nombre: "Gráfico de torta o circular", dificultad: basica }
      - { n: "04", nombre: "Interpretación de gráficos", dificultad: media }

  - id: MAT.EST.TENDENCIA-CENTRAL
    nombre: Medidas de tendencia central
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Media, moda y mediana (datos sin agrupar)", dificultad: media }
      - { n: "02", nombre: "MTC en tabla sin intervalos", dificultad: media }
      - { n: "03", nombre: "MTC en tabla con intervalos", dificultad: media }

  - id: MAT.EST.POSICION
    nombre: Medidas de posición
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Percentiles", dificultad: media }
      - { n: "02", nombre: "Cuartiles", dificultad: media }
      - { n: "03", nombre: "Diagrama de caja", dificultad: media }

  - id: MAT.EST.DISPERSION
    nombre: Medidas de dispersión
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Varianza", dificultad: avanzada }
      - { n: "02", nombre: "Desviación estándar", dificultad: avanzada }
