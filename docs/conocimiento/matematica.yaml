  # ---------------------------------------------------------------- PROBABILIDAD
  - nombre: Probabilidad
    abreviatura: PROB
    temas:
      - id: MAT.PROB.BASICA
        nombre: Probabilidad básica (regla de Laplace)
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.RACIONALES]
        objetivo: Calcular probabilidades por casos favorables y totales (Laplace).
      - id: MAT.PROB.SUMA-PRODUCTO
        nombre: Suma y producto de probabilidades
        dificultad: [media, avanzada]
        competencia: M1
        prerrequisitos: [MAT.PROB.BASICA]
        objetivo: Aplicar la suma y el producto según eventos excluyentes e independientes.
      - id: MAT.PROB.CONDICIONAL
        nombre: Probabilidad condicional
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.PROB.SUMA-PRODUCTO]
        objetivo: Calcular probabilidades condicionales y reconocer dependencia.
      - id: MAT.PROB.CONTEO
        nombre: Técnicas de conteo (permutaciones, variaciones, combinaciones)
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.PROB.BASICA]
        objetivo: Contar usando principios y fórmulas combinatorias.
      - id: MAT.PROB.BINOMIO
        nombre: Teorema del binomio y triángulo de Pascal
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.PROB.CONTEO, MAT.ALG.PRODUCTOS-NOTABLES]
        objetivo: Desarrollar potencias de binomios con el teorema del binomio.
      - id: MAT.PROB.BINOMIAL
        nombre: Distribución binomial
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.PROB.CONTEO, MAT.PROB.SUMA-PRODUCTO]
        objetivo: Modelar con la distribución binomial y calcular esperanza y varianza.

  # ---------------------------------------------------------------- PROGRESIONES
