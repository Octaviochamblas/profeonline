# =============================================================================
# ESQUELETO UNIVERSAL — MATEMÁTICA (preuniversitario / "entrar a la Universidad")
# Proyecto: Biblioteca de Conocimiento Estructurada (ver backlog).
# Fase 1 — v1 para validación del 🧑 (gate).
#
# Consolidado (deduplicado) de: Texto PAES 9ª ed. (Tomo 1+2, backbone), Santillana
# Aritmética y Álgebra, Álgebra Carreño & Cruz (= Arrayán), Álgebra de Baldor,
# Geometría Ed. Cid. Fuentes en scratch/_indices/.
#
# CONVENCIONES
# - id: MAT.<RAMA>.<TEMA>  (estable; lo referencian contenido, ejercicios y vistas).
# - dificultad: rango [min, max] sobre  basica < media < avanzada.
# - competencia: M1 (núcleo PAES obligatorio) | M2 (electiva, 3°-4° medio).
#   (Tags M1/M2 PRELIMINARES — derivados del libro M1; el 🧑 los afina.)
# - prerrequisitos: IDs de nodos previos (grafo de aprendizaje; no exhaustivo en v1).
# - objetivo: una línea en v1; se enriquece (objetivos múltiples + conceptos_clave) tras aprobar la estructura.
# - granularidad: cada nodo = un recurso (≈ una lección/video).
#
# NOTA: las ramas PROGRESIONES y ÁLGEBRA LINEAL (vectores/matrices) están en el
# BORDE superior de preu (M2 avanzado); el 🧑 decide si entran o van a fase universitaria.
# =============================================================================

disciplina: Matemática
codigo: MAT
escala_dificultad: [basica, media, avanzada]
ramas:

  # ------------------------------------------------------------------ NÚMEROS
  - nombre: Números (Aritmética)
    abreviatura: NUM
    temas:
      - id: MAT.NUM.CONJUNTOS
        nombre: Conjuntos numéricos (ℕ, ℤ, ℚ, 𝕀, ℝ, ℂ)
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: []
        objetivo: Reconocer y relacionar los conjuntos numéricos y su cadena de inclusión.
      - id: MAT.NUM.NATURALES
        nombre: Números naturales y sistemas de numeración
        dificultad: [basica, basica]
        competencia: M1
        prerrequisitos: []
        objetivo: Contar, ordenar y representar cantidades en el sistema decimal.
      - id: MAT.NUM.DIVISIBILIDAD
        nombre: Divisibilidad, múltiplos y divisores
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.NATURALES]
        objetivo: Aplicar criterios de divisibilidad e identificar múltiplos y divisores.
      - id: MAT.NUM.PRIMOS
        nombre: Números primos, compuestos y teorema fundamental
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.DIVISIBILIDAD]
        objetivo: Descomponer en factores primos y usar el teorema fundamental de la aritmética.
      - id: MAT.NUM.MCM-MCD
        nombre: M.C.M. y M.C.D.
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.PRIMOS]
        objetivo: Calcular mínimo común múltiplo y máximo común divisor y aplicarlos en problemas.
      - id: MAT.NUM.ENTEROS
        nombre: Números enteros - orden y operatoria
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.NATURALES]
        objetivo: Operar con enteros respetando signos, orden y propiedades de las operaciones.
      - id: MAT.NUM.VALOR-ABS
        nombre: Valor absoluto
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.ENTEROS]
        objetivo: Interpretar y calcular el valor absoluto como distancia al cero.
      - id: MAT.NUM.RACIONALES
        nombre: Fracciones y números racionales
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.ENTEROS, MAT.NUM.MCM-MCD]
        objetivo: Operar con fracciones y reconocer sus propiedades.
      - id: MAT.NUM.DECIMALES
        nombre: Números decimales y conversión a fracción
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.RACIONALES]
        objetivo: Clasificar decimales y convertir entre decimal y fracción.
      - id: MAT.NUM.IRRACIONALES
        nombre: Números irracionales
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.RACIONALES, MAT.NUM.RAICES]
        objetivo: Reconocer y representar números irracionales en la recta.
      - id: MAT.NUM.REALES
        nombre: Números reales y recta numérica
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.RACIONALES, MAT.NUM.IRRACIONALES]
        objetivo: Operar en ℝ y ubicar números en la recta real continua.
      - id: MAT.NUM.APROXIMACION
        nombre: Aproximación, redondeo y estimación
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.DECIMALES]
        objetivo: Aproximar por redondeo/truncamiento y estimar resultados.
      - id: MAT.NUM.POTENCIAS
        nombre: Potencias y sus propiedades
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.ENTEROS]
        objetivo: Aplicar las propiedades de las potencias, incluido exponente cero y negativo.
      - id: MAT.NUM.NOTACION-CIENT
        nombre: Notación científica
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.POTENCIAS]
        objetivo: Expresar y operar cantidades en notación científica.
      - id: MAT.NUM.RAICES
        nombre: Raíces y sus propiedades
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.POTENCIAS]
        objetivo: Operar con raíces aplicando sus propiedades.
      - id: MAT.NUM.RACIONALIZACION
        nombre: Racionalización
        dificultad: [media, avanzada]
        competencia: M1
        prerrequisitos: [MAT.NUM.RAICES]
        objetivo: Racionalizar denominadores con raíces.
      - id: MAT.NUM.LOGARITMOS
        nombre: Logaritmos y sus propiedades
        dificultad: [media, avanzada]
        competencia: M2
        prerrequisitos: [MAT.NUM.POTENCIAS]
        objetivo: Definir el logaritmo y aplicar sus propiedades y cambio de base.
      - id: MAT.NUM.COMPLEJOS
        nombre: Números complejos (forma canónica y polar)
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.NUM.REALES, MAT.TRIG.RAZONES]
        objetivo: Operar con complejos en forma binómica y polar.

  # ---------------------------------------------------------- PROPORCIONALIDAD
  - nombre: Proporcionalidad y porcentaje
    abreviatura: PROP
    temas:
      - id: MAT.PROP.RAZONES
        nombre: Razones y proporciones
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.RACIONALES]
        objetivo: Plantear y resolver proporciones y series de razones.
      - id: MAT.PROP.DIRECTA
        nombre: Proporcionalidad directa
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.PROP.RAZONES]
        objetivo: Modelar y resolver situaciones de proporcionalidad directa.
      - id: MAT.PROP.INVERSA
        nombre: Proporcionalidad inversa
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.PROP.RAZONES]
        objetivo: Modelar y resolver situaciones de proporcionalidad inversa.
      - id: MAT.PROP.COMPUESTA
        nombre: Proporcionalidad compuesta
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.PROP.DIRECTA, MAT.PROP.INVERSA]
        objetivo: Resolver problemas con varias magnitudes proporcionales.
      - id: MAT.PROP.PORCENTAJE
        nombre: Porcentaje y sus aplicaciones
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.PROP.RAZONES]
        objetivo: Calcular porcentajes y aplicarlos en contextos cotidianos.
      - id: MAT.PROP.CAMBIOS
        nombre: Porcentajes y variación (cambio absoluto/relativo)
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.PROP.PORCENTAJE]
        objetivo: Describir y comparar cambios mediante variación porcentual.
      - id: MAT.PROP.FINANCIERA
        nombre: Matemática financiera (interés, créditos, IPC)
        dificultad: [media, avanzada]
        competencia: M2
        prerrequisitos: [MAT.PROP.PORCENTAJE, MAT.NUM.POTENCIAS]
        objetivo: Calcular interés simple/compuesto y analizar productos financieros.

  # ------------------------------------------------------------------ ÁLGEBRA
  - nombre: Álgebra
    abreviatura: ALG
    temas:
      - id: MAT.ALG.LENGUAJE
        nombre: Lenguaje algebraico
        dificultad: [basica, basica]
        competencia: M1
        prerrequisitos: [MAT.NUM.ENTEROS]
        objetivo: Traducir entre lenguaje natural y expresiones algebraicas.
      - id: MAT.ALG.EXPRESIONES
        nombre: Operatoria con expresiones algebraicas
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.ALG.LENGUAJE]
        objetivo: Reducir términos semejantes y multiplicar expresiones algebraicas.
      - id: MAT.ALG.PRODUCTOS-NOTABLES
        nombre: Productos notables
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.ALG.EXPRESIONES]
        objetivo: Aplicar los productos notables para expandir expresiones.
      - id: MAT.ALG.FACTORIZACION
        nombre: Factorización
        dificultad: [media, avanzada]
        competencia: M1
        prerrequisitos: [MAT.ALG.PRODUCTOS-NOTABLES]
        objetivo: Factorizar usando factor común, productos notables, trinomios y cubos.
      - id: MAT.ALG.FRACCIONES
        nombre: Fracciones algebraicas
        dificultad: [media, avanzada]
        competencia: M1
        prerrequisitos: [MAT.ALG.FACTORIZACION]
        objetivo: Simplificar y operar con fracciones algebraicas.
      - id: MAT.ALG.ECUACIONES-1
        nombre: Ecuaciones de primer grado
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.ALG.EXPRESIONES]
        objetivo: Resolver ecuaciones lineales (enteras, fraccionarias, literales).
      - id: MAT.ALG.VALOR-ABS-EC
        nombre: Ecuaciones e inecuaciones con valor absoluto
        dificultad: [media, avanzada]
        competencia: M1
        prerrequisitos: [MAT.ALG.ECUACIONES-1, MAT.NUM.VALOR-ABS]
        objetivo: Resolver ecuaciones e inecuaciones que involucran valor absoluto.
      - id: MAT.ALG.SISTEMAS-1
        nombre: Sistemas de ecuaciones de primer grado
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.ALG.ECUACIONES-1]
        objetivo: Resolver sistemas por sustitución, igualación y reducción.
      - id: MAT.ALG.PLANTEAMIENTO
        nombre: Problemas de planteamiento
        dificultad: [media, avanzada]
        competencia: M1
        prerrequisitos: [MAT.ALG.ECUACIONES-1, MAT.ALG.SISTEMAS-1]
        objetivo: Modelar y resolver problemas verbales con ecuaciones y sistemas.
      - id: MAT.ALG.DESIGUALDADES
        nombre: Desigualdades, intervalos e inecuaciones de primer grado
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.ALG.ECUACIONES-1]
        objetivo: Resolver y representar inecuaciones lineales e intervalos.
      - id: MAT.ALG.ECUACIONES-2
        nombre: Ecuaciones de segundo grado
        dificultad: [media, avanzada]
        competencia: M2
        prerrequisitos: [MAT.ALG.FACTORIZACION]
        objetivo: Resolver cuadráticas por factorización, fórmula general y discriminante.
      - id: MAT.ALG.INECUACIONES-2
        nombre: Inecuaciones de segundo grado y fraccionarias
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.ALG.ECUACIONES-2, MAT.ALG.DESIGUALDADES]
        objetivo: Resolver inecuaciones cuadráticas y fraccionarias.
      - id: MAT.ALG.POLINOMIOS
        nombre: Polinomios y teoría de ecuaciones
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.ALG.FACTORIZACION]
        objetivo: Operar con polinomios y relacionar coeficientes y raíces.
      - id: MAT.ALG.PROG-LINEAL
        nombre: Sistemas de inecuaciones y programación lineal
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.ALG.DESIGUALDADES, MAT.FUN.LINEAL-AFIN]
        objetivo: Modelar y optimizar con sistemas de inecuaciones en el plano.

  # ----------------------------------------------------------------- FUNCIONES
  - nombre: Funciones
    abreviatura: FUN
    temas:
      - id: MAT.FUN.CONCEPTO
        nombre: Concepto de función (dominio, recorrido, plano cartesiano)
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.ALG.EXPRESIONES]
        objetivo: Reconocer funciones, su dominio y recorrido, y valorizarlas.
      - id: MAT.FUN.LINEAL-AFIN
        nombre: Función lineal y afín (ecuación de la recta)
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.FUN.CONCEPTO]
        objetivo: Graficar e interpretar funciones lineales y afines.
      - id: MAT.FUN.TRAMOS
        nombre: Función definida por tramos
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.FUN.LINEAL-AFIN]
        objetivo: Evaluar y graficar funciones definidas por tramos.
      - id: MAT.FUN.VALOR-ABS
        nombre: Función valor absoluto
        dificultad: [media, avanzada]
        competencia: M2
        prerrequisitos: [MAT.FUN.TRAMOS, MAT.NUM.VALOR-ABS]
        objetivo: Graficar e interpretar la función valor absoluto.
      - id: MAT.FUN.CUADRATICA
        nombre: Función cuadrática
        dificultad: [media, avanzada]
        competencia: M1
        prerrequisitos: [MAT.FUN.CONCEPTO, MAT.ALG.FACTORIZACION]
        objetivo: Analizar la parábola (vértice, ceros, concavidad, desplazamientos).
      - id: MAT.FUN.POTENCIA
        nombre: Función potencia
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.FUN.CUADRATICA, MAT.NUM.POTENCIAS]
        objetivo: Analizar funciones potencia según el exponente.
      - id: MAT.FUN.RAIZ
        nombre: Función raíz cuadrada y cúbica
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.NUM.RAICES, MAT.FUN.CONCEPTO]
        objetivo: Graficar funciones raíz y resolver ecuaciones con radicales.
      - id: MAT.FUN.INVERSA-COMP
        nombre: Función inversa y composición de funciones
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.FUN.LINEAL-AFIN]
        objetivo: Componer funciones y determinar la función inversa.
      - id: MAT.FUN.EXPONENCIAL
        nombre: Función exponencial
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.NUM.POTENCIAS, MAT.FUN.CONCEPTO]
        objetivo: Analizar el crecimiento/decaimiento exponencial.
      - id: MAT.FUN.LOGARITMICA
        nombre: Función logarítmica
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.NUM.LOGARITMOS, MAT.FUN.EXPONENCIAL]
        objetivo: Analizar la función logarítmica como inversa de la exponencial.

  # ----------------------------------------------------------------- GEOMETRÍA
  - nombre: Geometría
    abreviatura: GEO
    temas:
      - id: MAT.GEO.ANGULOS
        nombre: Ángulos y rectas (paralelas cortadas por transversal)
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: []
        objetivo: Clasificar ángulos y aplicar relaciones entre paralelas y transversales.
      - id: MAT.GEO.PLANO-CARTESIANO
        nombre: Plano cartesiano (distancia y punto medio)
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.NUM.RAICES]
        objetivo: Calcular distancia entre puntos y punto medio de un segmento.
      - id: MAT.GEO.TRIANGULOS
        nombre: Triángulos - clasificación y elementos secundarios
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.GEO.ANGULOS]
        objetivo: Clasificar triángulos y reconocer altura, bisectriz, simetral, mediana y transversal.
      - id: MAT.GEO.CONGRUENCIA
        nombre: Congruencia de triángulos
        dificultad: [media, media]
        competencia: M2
        prerrequisitos: [MAT.GEO.TRIANGULOS]
        objetivo: Aplicar los criterios de congruencia de triángulos.
      - id: MAT.GEO.PITAGORAS
        nombre: Teorema de Pitágoras
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.GEO.TRIANGULOS, MAT.NUM.RAICES]
        objetivo: Aplicar Pitágoras y reconocer tríos pitagóricos.
      - id: MAT.GEO.EUCLIDES
        nombre: Teorema de Euclides (triángulo rectángulo)
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.GEO.PITAGORAS]
        objetivo: Aplicar las relaciones de Euclides en el triángulo rectángulo.
      - id: MAT.GEO.AREA-PERIMETRO
        nombre: Áreas y perímetros de figuras planas
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.GEO.TRIANGULOS]
        objetivo: Calcular áreas y perímetros de figuras planas frecuentes.
      - id: MAT.GEO.CUADRILATEROS
        nombre: Cuadriláteros y polígonos
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: [MAT.GEO.ANGULOS]
        objetivo: Clasificar cuadriláteros y polígonos y usar sus propiedades.
      - id: MAT.GEO.CIRCUNFERENCIA
        nombre: Circunferencia - ángulos y proporciones
        dificultad: [media, avanzada]
        competencia: M1
        prerrequisitos: [MAT.GEO.ANGULOS]
        objetivo: Aplicar propiedades angulares y proporcionales en la circunferencia.
      - id: MAT.GEO.THALES
        nombre: Teorema de Thales
        dificultad: [media, media]
        competencia: M2
        prerrequisitos: [MAT.PROP.RAZONES, MAT.GEO.TRIANGULOS]
        objetivo: Aplicar el teorema de Thales y la división proporcional de segmentos.
      - id: MAT.GEO.SEMEJANZA
        nombre: Semejanza y homotecia
        dificultad: [media, avanzada]
        competencia: M2
        prerrequisitos: [MAT.GEO.THALES]
        objetivo: Aplicar criterios de semejanza, homotecia y modelos a escala.
      - id: MAT.GEO.CUERPOS
        nombre: Cuerpos geométricos (áreas y volúmenes)
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.GEO.AREA-PERIMETRO]
        objetivo: Calcular áreas y volúmenes de poliedros y cuerpos redondos.
      - id: MAT.GEO.ISOMETRIAS
        nombre: Transformaciones isométricas
        dificultad: [media, media]
        competencia: M1
        prerrequisitos: [MAT.GEO.PLANO-CARTESIANO]
        objetivo: Aplicar traslación, reflexión, simetría y rotación en el plano.
      - id: MAT.GEO.VECTORES-PLANO
        nombre: Vectores en el plano
        dificultad: [media, avanzada]
        competencia: M1
        prerrequisitos: [MAT.GEO.PLANO-CARTESIANO]
        objetivo: Operar con vectores (suma, ponderación, módulo) en el plano.
      - id: MAT.GEO.ESPACIO
        nombre: Geometría del espacio (sistema 3D)
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.GEO.PLANO-CARTESIANO]
        objetivo: Ubicar puntos y razonar en el sistema cartesiano tridimensional.

  # -------------------------------------------------------------- TRIGONOMETRÍA
  - nombre: Trigonometría
    abreviatura: TRIG
    temas:
      - id: MAT.TRIG.ANGULOS-MEDICION
        nombre: Sistemas de medición de ángulos
        dificultad: [media, media]
        competencia: M2
        prerrequisitos: [MAT.GEO.ANGULOS]
        objetivo: Convertir entre sistemas de medición angular (grados, radianes).
      - id: MAT.TRIG.RAZONES
        nombre: Razones trigonométricas en el triángulo rectángulo
        dificultad: [media, media]
        competencia: M2
        prerrequisitos: [MAT.GEO.PITAGORAS]
        objetivo: Definir y aplicar seno, coseno y tangente en triángulos rectángulos.
      - id: MAT.TRIG.VALORES-ESPECIALES
        nombre: Razones para ángulos especiales (30°, 45°, 60°)
        dificultad: [media, media]
        competencia: M2
        prerrequisitos: [MAT.TRIG.RAZONES]
        objetivo: Memorizar y aplicar las razones de los ángulos notables.
      - id: MAT.TRIG.IDENTIDADES
        nombre: Identidades trigonométricas
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.TRIG.RAZONES]
        objetivo: Demostrar y aplicar identidades trigonométricas fundamentales.
      - id: MAT.TRIG.FUNCIONES
        nombre: Funciones trigonométricas y periodicidad
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.TRIG.VALORES-ESPECIALES, MAT.FUN.CONCEPTO]
        objetivo: Analizar funciones trigonométricas de un ángulo cualquiera y su periodicidad.
      - id: MAT.TRIG.ECUACIONES
        nombre: Ecuaciones trigonométricas
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.TRIG.IDENTIDADES]
        objetivo: Resolver ecuaciones trigonométricas elementales.
      - id: MAT.TRIG.TRIANGULO-NO-RECT
        nombre: Resolución de triángulos no rectángulos (seno y coseno)
        dificultad: [avanzada, avanzada]
        competencia: M2
        prerrequisitos: [MAT.TRIG.RAZONES]
        objetivo: Aplicar los teoremas del seno y del coseno.

  # ---------------------------------------------------------------- ESTADÍSTICA
  - nombre: Estadística
    abreviatura: EST
    temas:
      - id: MAT.EST.DATOS
        nombre: Análisis y tabulación de datos
        dificultad: [basica, media]
        competencia: M1
        prerrequisitos: []
