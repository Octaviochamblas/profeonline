# =============================================================================
# DETALLE ATÓMICO — Eje 04: GEOMETRÍA · Bloque 04: Perímetros, Áreas y Teoremas
# Grano: núcleo mínimo (1 recurso = 1 idea = 1 video corto).
# Nomenclatura: EE.BB.TT.RR. id = identificador semántico estable.
# competencia: M1 | M2 | U   dificultad: basica < media < avanzada
# Archivo separado (un archivo por bloque). Temas 04.04.01–04.04.06.
# NOTA: tema 04.04.04 usa MAT.GEO.TRIANGULOS_NOTABLES_METRICA (aplicaciones
# métricas) para no colisionar con MAT.GEO.TRIANGULOS_NOTABLES de 04.02.06
# (clasificación). Los recursos de 04.02.06 son TRIANGULO_45_45_90 y
# TRIANGULO_30_60_90; los de aquí son IDENTIFICACION_* / RELACION_LADOS_*.
# =============================================================================

rama: Geometría
codigo: "04"
abreviatura: GEO
bloque: "Perímetros, Áreas y Teoremas"
bloque_codigo: "04.04"
temas:
  - codigo: "04.04.01"
    id: MAT.GEO.PITAGORAS
    nombre: "Teorema de Pitágoras"
    competencia: M1
    recursos:
      - { cod: "04.04.01.01", id: MAT.GEO.PITAGORAS.ENUNCIADO, nombre: "Enunciado del teorema de Pitágoras: el cuadrado de la hipotenusa es igual a la suma de los cuadrados de los catetos", dificultad: basica, competencia: M1, cursos: [8B, 1M] } # Fuente: Moraleja 44, Cid 216
      - { cod: "04.04.01.02", id: MAT.GEO.PITAGORAS.CALCULO_HIPOTENUSA, nombre: "Cálculo de la hipotenusa dados los dos catetos", dificultad: basica, competencia: M1, cursos: [8B, 1M] } # Fuente: Moraleja 44, Cid 216
      - { cod: "04.04.01.03", id: MAT.GEO.PITAGORAS.CALCULO_CATETO, nombre: "Cálculo de un cateto dados la hipotenusa y el otro cateto", dificultad: basica, competencia: M1, cursos: [8B, 1M] } # Fuente: Moraleja 44, Cid 216
      - { cod: "04.04.01.04", id: MAT.GEO.PITAGORAS.RECIPROCO, nombre: "Recíproco del teorema de Pitágoras para verificar si un triángulo es rectángulo", dificultad: media, competencia: M1, cursos: [8B, 1M] } # Fuente: Moraleja 44, Cid 216
      - { cod: "04.04.01.05", id: MAT.GEO.PITAGORAS.TERNAS, nombre: "Identificación de ternas pitagóricas básicas: (3, 4, 5), (5, 12, 13), (8, 15, 17)", dificultad: media, competencia: M1, cursos: [8B, 1M] } # sin fuente
      - { cod: "04.04.01.06", id: MAT.GEO.PITAGORAS.APLICACION_GEOMETRICA, nombre: "Aplicación del teorema de Pitágoras para calcular diagonales y distancias en figuras geométricas", dificultad: media, competencia: M1, cursos: [8B, 1M, 2M] } # Fuente: Moraleja 44, Cid 217

  - codigo: "04.04.02"
    id: MAT.GEO.RELACIONES_TR
    nombre: "Relaciones métricas en el triángulo rectángulo"
    competencia: M2
    recursos:
      - { cod: "04.04.02.01", id: MAT.GEO.RELACIONES_TR.ALTURA_SOBRE_HIPOTENUSA, nombre: "Definición de la altura relativa a la hipotenusa en un triángulo rectángulo", dificultad: media, competencia: M2, cursos: [2M, 3M] } # Fuente: Moraleja 45, Cid 217
      - { cod: "04.04.02.02", id: MAT.GEO.RELACIONES_TR.PROYECCIONES_CATETOS, nombre: "Proyección de cada cateto sobre la hipotenusa", dificultad: media, competencia: M2, cursos: [2M, 3M] } # Fuente: Moraleja 45, Cid 217
      - { cod: "04.04.02.03", id: MAT.GEO.RELACIONES_TR.CATETO_MEDIA_GEOMETRICA, nombre: "Propiedad: cada cateto es media geométrica entre la hipotenusa y su proyección sobre ella", dificultad: avanzada, competencia: M2, cursos: [2M, 3M] } # Fuente: Moraleja 45, Cid 217
      - { cod: "04.04.02.04", id: MAT.GEO.RELACIONES_TR.ALTURA_MEDIA_GEOMETRICA, nombre: "Propiedad: la altura sobre la hipotenusa es media geométrica de las dos proyecciones", dificultad: avanzada, competencia: M2, cursos: [2M, 3M] } # Fuente: Moraleja 45, Cid 217
      - { cod: "04.04.02.05", id: MAT.GEO.RELACIONES_TR.CALCULO_CATETO_PROYECCION, nombre: "Cálculo de un cateto usando su proyección y la hipotenusa", dificultad: avanzada, competencia: M2, cursos: [2M, 3M] } # sin fuente
      - { cod: "04.04.02.06", id: MAT.GEO.RELACIONES_TR.CALCULO_ALTURA, nombre: "Cálculo de la altura sobre la hipotenusa a partir de las proyecciones de los catetos", dificultad: avanzada, competencia: M2, cursos: [2M, 3M] } # sin fuente

  - codigo: "04.04.03"
    id: MAT.GEO.AREAS_TRIANGULOS
    nombre: "Área de triángulos y regiones"
    competencia: M1
    recursos:
      - { cod: "04.04.03.01", id: MAT.GEO.AREAS_TRIANGULOS.DEFINICION, nombre: "Definición de área como medida de la superficie encerrada por una figura plana", dificultad: basica, competencia: M1, cursos: [5B, 6B] } # Fuente: Moraleja 46, Cid 32
      - { cod: "04.04.03.02", id: MAT.GEO.AREAS_TRIANGULOS.UNIDADES, nombre: "Unidades de medida de área: cm², m², km²", dificultad: basica, competencia: M1, cursos: [5B, 6B] } # Fuente: Cid 32
      - { cod: "04.04.03.03", id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_BASE_ALTURA, nombre: "Fórmula del área del triángulo: A = base × altura / 2", dificultad: basica, competencia: M1, cursos: [5B, 6B, 7B] } # Fuente: Moraleja 46, Cid 33
      - { cod: "04.04.03.04", id: MAT.GEO.AREAS_TRIANGULOS.IDENTIFICACION_BASE_ALTURA, nombre: "Identificación de la base y la altura correspondiente en distintas orientaciones del triángulo", dificultad: media, competencia: M1, cursos: [6B, 7B] } # sin fuente
      - { cod: "04.04.03.05", id: MAT.GEO.AREAS_TRIANGULOS.CALCULO_BASE_ALTURA, nombre: "Cálculo del área de un triángulo dada la base y la altura", dificultad: basica, competencia: M1, cursos: [6B, 7B, 8B] } # sin fuente
      - { cod: "04.04.03.06", id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_EQUILATERO, nombre: "Fórmula del área del triángulo equilátero: A = l²√3 / 4", dificultad: media, competencia: M1, cursos: [8B, 1M] } # Fuente: Moraleja 46
      - { cod: "04.04.03.07", id: MAT.GEO.AREAS_TRIANGULOS.SEMIPERIM, nombre: "Cálculo del semiperímetro de un triángulo: s = (a + b + c) / 2", dificultad: media, competencia: M1, cursos: [8B, 1M] } # Fuente: Moraleja 46, Cid 33
      - { cod: "04.04.03.08", id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_HERON, nombre: "Fórmula de Herón: A = √(s(s−a)(s−b)(s−c))", dificultad: avanzada, competencia: M2, cursos: [2M, 3M] } # Fuente: Moraleja 46, Cid 33
      - { cod: "04.04.03.09", id: MAT.GEO.AREAS_TRIANGULOS.HERON_APLICACION, nombre: "Cálculo del área de un triángulo usando la fórmula de Herón dados los tres lados", dificultad: avanzada, competencia: M2, cursos: [2M, 3M] } # sin fuente
      - { cod: "04.04.03.10", id: MAT.GEO.AREAS_TRIANGULOS.FORMULA_DOS_LADOS_ANGULO, nombre: "Fórmula del área con dos lados y ángulo comprendido: A = ½ab·sen(C)", dificultad: avanzada, competencia: M2, cursos: [2M, 3M, 4M] } # Fuente: Moraleja 47, Cid 34
      - { cod: "04.04.03.11", id: MAT.GEO.AREAS_TRIANGULOS.TRIANGULOS_IGUAL_BASE, nombre: "Igualdad de áreas de triángulos con igual base entre paralelas", dificultad: media, competencia: M1, cursos: [8B, 1M] } # sin fuente
      - { cod: "04.04.03.12", id: MAT.GEO.AREAS_TRIANGULOS.AREA_REGIONES_COMPUESTAS, nombre: "Cálculo del área de regiones poligonales descomponiéndolas en triángulos", dificultad: avanzada, competencia: M1, cursos: [8B, 1M, 2M] } # sin fuente
      - { cod: "04.04.03.13", id: MAT.GEO.AREAS_TRIANGULOS.AREA_COORDENADAS, nombre: "Cálculo del área de un triángulo con vértices dados por coordenadas mediante determinante", dificultad: avanzada, competencia: M2, cursos: [3M, 4M] } # sin fuente

  - codigo: "04.04.04"
    id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA
    nombre: "Triángulos notables: aplicaciones métricas"
    competencia: M2
    recursos:
      - { cod: "04.04.04.01", id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.IDENTIFICACION_45_45_90, nombre: "Identificación de un triángulo notable 45°-45°-90° a partir de sus ángulos", dificultad: media, competencia: M2, cursos: [2M, 3M] } # sin fuente
      - { cod: "04.04.04.02", id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.RELACION_LADOS_45_45_90, nombre: "Relación de lados en el triángulo 45°-45°-90°: cateto = hipotenusa / √2", dificultad: avanzada, competencia: M2, cursos: [2M, 3M, 4M] } # sin fuente
      - { cod: "04.04.04.03", id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.IDENTIFICACION_30_60_90, nombre: "Identificación de un triángulo notable 30°-60°-90° a partir de sus ángulos", dificultad: media, competencia: M2, cursos: [2M, 3M] } # sin fuente
      - { cod: "04.04.04.04", id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.RELACION_LADOS_30_60_90, nombre: "Relación de lados en el triángulo 30°-60°-90°: cateto opuesto 30°= ½ hipotenusa, cateto opuesto 60°= hipotenusa·√3/2", dificultad: avanzada, competencia: M2, cursos: [2M, 3M, 4M] } # sin fuente
      - { cod: "04.04.04.05", id: MAT.GEO.TRIANGULOS_NOTABLES_METRICA.FACTOR_ESCALA_NOTABLES, nombre: "Aplicación del factor de escala para calcular lados en triángulos notables no unitarios", dificultad: avanzada, competencia: M2, cursos: [2M, 3M, 4M] } # sin fuente

  - codigo: "04.04.05"
    id: MAT.GEO.TRIGONOMETRIA_BASICA
    nombre: "Razones trigonométricas básicas"
    competencia: M1
    recursos:
      - { cod: "04.04.05.01", id: MAT.GEO.TRIGONOMETRIA_BASICA.SENO_DEFINICION, nombre: "Definición del seno de un ángulo agudo como razón cateto opuesto / hipotenusa", dificultad: basica, competencia: M1, cursos: [1M, 2M] } # Fuente: Moraleja 53, Cid 221
      - { cod: "04.04.05.02", id: MAT.GEO.TRIGONOMETRIA_BASICA.COSENO_DEFINICION, nombre: "Definición del coseno de un ángulo agudo como razón cateto adyacente / hipotenusa", dificultad: basica, competencia: M1, cursos: [1M, 2M] } # Fuente: Moraleja 53, Cid 221
      - { cod: "04.04.05.03", id: MAT.GEO.TRIGONOMETRIA_BASICA.TANGENTE_DEFINICION, nombre: "Definición de la tangente de un ángulo agudo como razón cateto opuesto / cateto adyacente", dificultad: basica, competencia: M1, cursos: [1M, 2M] } # Fuente: Moraleja 53, Cid 221
      - { cod: "04.04.05.04", id: MAT.GEO.TRIGONOMETRIA_BASICA.CALCULO_LADOS, nombre: "Cálculo de lados desconocidos de un triángulo rectángulo usando razones trigonométricas", dificultad: media, competencia: M1, cursos: [1M, 2M] } # Fuente: Moraleja 53, Cid 221

  - codigo: "04.04.06"
    id: MAT.GEO.TEOREMA_COSENOS
    nombre: "Teorema del coseno"
    competencia: M2
    recursos:
      - { cod: "04.04.06.01", id: MAT.GEO.TEOREMA_COSENOS.ENUNCIADO, nombre: "Enunciado del teorema del coseno: a² = b² + c² − 2bc·cos(A)", dificultad: avanzada, competencia: M2, cursos: [3M, 4M] } # Fuente: Moraleja 55
      - { cod: "04.04.06.02", id: MAT.GEO.TEOREMA_COSENOS.APLICACION, nombre: "Aplicación del teorema del coseno para calcular el tercer lado o un ángulo de un triángulo cualquiera", dificultad: avanzada, competencia: M2, cursos: [3M, 4M] } # Fuente: Moraleja 55
