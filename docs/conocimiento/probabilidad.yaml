# =============================================================================
# DETALLE — Rama PROBABILIDAD
# Backbone PAES (Cap 21, 22). Aditivo con Carreño (Cap 13).
# =============================================================================

rama: Probabilidad
abreviatura: PROB
temas:

  - id: MAT.PROB.BASICA
    nombre: Probabilidad básica
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Nociones básicas (experimento, espacio muestral, evento)", dificultad: media }
      - { n: "02", nombre: "Regla de Laplace (casos favorables y totales)", dificultad: media }
      - { n: "03", nombre: "Diagrama de árbol", dificultad: media }

  - id: MAT.PROB.SUMA-PRODUCTO
    nombre: Suma y producto de probabilidades
    dificultad: [media, avanzada]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Suma de probabilidades (eventos excluyentes y no excluyentes)", dificultad: media }
      - { n: "02", nombre: "Producto de probabilidades (eventos independientes y dependientes)", dificultad: avanzada }

  - id: MAT.PROB.CONDICIONAL
    nombre: Probabilidad condicional
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Probabilidad condicional", dificultad: avanzada }

  - id: MAT.PROB.CONTEO
    nombre: Técnicas de conteo
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Principio multiplicativo y aditivo", dificultad: avanzada }
      - { n: "02", nombre: "Permutaciones", dificultad: avanzada }
      - { n: "03", nombre: "Variaciones (arreglos)", dificultad: avanzada }
      - { n: "04", nombre: "Combinaciones", dificultad: avanzada }

  - id: MAT.PROB.BINOMIO
    nombre: Teorema del binomio
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Triángulo de Pascal", dificultad: media }
      - { n: "02", nombre: "Teorema del binomio (Newton)", dificultad: avanzada }

  - id: MAT.PROB.BINOMIAL
    nombre: Distribución binomial
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Distribución binomial", dificultad: avanzada }
      - { n: "02", nombre: "Esperanza y varianza de la binomial", dificultad: avanzada }
