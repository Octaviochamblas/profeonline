      - { cod: "02.02.02", id: MAT.NUM.ENTEROS_OPERATORIA.ADICION_DISTINTO_SIGNO, nombre: "Adición de enteros con distinto signo", dificultad: media, cursos: [7B] } # Fuente: Moraleja 23
