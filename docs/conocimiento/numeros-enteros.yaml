      - { cod: "02.02.06", id: MAT.NUM.ENTEROS_OPERATORIA.INVERSO_ADITIVO, nombre: "Identificación del inverso aditivo (opuesto)", dificultad: basica, cursos: [7B] } # Fuente: Santillana 50
      - { cod: "02.02.07", id: MAT.NUM.ENTEROS_OPERATORIA.SUSTRACCION_REGLA, nombre: "Transformación de sustracción a suma por el inverso", dificultad: media, cursos: [7B] } # Fuente: Santillana 50
      - { cod: "02.02.08", id: MAT.NUM.ENTEROS_OPERATORIA.MULT_SIGNOS_IGUALES, nombre: "Multiplicación de enteros: Regla de signos iguales", dificultad: basica, cursos: [8B] } # Fuente: Santillana 51
      - { cod: "02.02.09", id: MAT.NUM.ENTEROS_OPERATORIA.MULT_SIGNOS_DISTINTOS, nombre: "Multiplicación de enteros: Regla de signos distintos", dificultad: basica, cursos: [8B] } # Fuente: Moraleja 23
      - { cod: "02.02.10", id: MAT.NUM.ENTEROS_OPERATORIA.CONMUTATIVA_MULT, nombre: "Propiedad conmutativa de la multiplicación", dificultad: basica, cursos: [8B] }
      - { cod: "02.02.11", id: MAT.NUM.ENTEROS_OPERATORIA.ASOCIATIVA_MULT, nombre: "Propiedad asociativa de la multiplicación", dificultad: media, cursos: [8B] }
      - { cod: "02.02.12", id: MAT.NUM.ENTEROS_OPERATORIA.NEUTRO_MULT, nombre: "Elemento neutro multiplicativo (el uno)", dificultad: basica, cursos: [8B] }
      - { cod: "02.02.13", id: MAT.NUM.ENTEROS_OPERATORIA.ABSORBENTE_CERO, nombre: "Elemento absorbente de la multiplicación (el cero)", dificultad: basica, cursos: [8B] }
      - { cod: "02.02.14", id: MAT.NUM.ENTEROS_OPERATORIA.DISTRIBUTIVA_MULT_ADICION, nombre: "Propiedad distributiva de la multiplicación sobre la adición", dificultad: media, cursos: [8B, 1M] }
      - { cod: "02.02.15", id: MAT.NUM.ENTEROS_OPERATORIA.DIV_SIGNOS_IGUALES, nombre: "División de enteros: Regla de signos iguales", dificultad: basica, cursos: [8B] } # Fuente: Santillana 51
      - { cod: "02.02.16", id: MAT.NUM.ENTEROS_OPERATORIA.DIV_SIGNOS_DISTINTOS, nombre: "División de enteros: Regla de signos distintos", dificultad: basica, cursos: [8B] } # Fuente: Moraleja 23
      - { cod: "02.02.17", id: MAT.NUM.ENTEROS_OPERATORIA.DIVISION_POR_CERO, nombre: "Indefinición de la división por cero", dificultad: media, cursos: [8B] }
      - { cod: "02.02.18", id: MAT.NUM.ENTEROS_OPERATORIA.PAPOMUDAS_ORDEN, nombre: "Prioridad de operaciones: El orden PAPOMUDAS", dificultad: media, cursos: [5B, 7B, 8B] } # Fuente: Moraleja 27
      - { cod: "02.02.19", id: MAT.NUM.ENTEROS_OPERATORIA.PARENTESIS_MAS, nombre: "Eliminación de paréntesis precedidos por signo +", dificultad: media, cursos: [7B, 1M] } # Fuente: Carreño 13
      - { cod: "02.02.20", id: MAT.NUM.ENTEROS_OPERATORIA.PARENTESIS_MENOS, nombre: "Eliminación de paréntesis precedidos por signo -", dificultad: avanzada, cursos: [7B, 1M] } # Fuente: Carreño 13
      - { cod: "02.02.21", id: MAT.NUM.ENTEROS_OPERATORIA.PARENTESIS_ANIDADOS, nombre: "Resolución de paréntesis de adentro hacia afuera", dificultad: avanzada, cursos: [1M] } # Fuente: Baldor 60
