# =============================================================================
# DETALLE ATÓMICO — Rama 02: NÚMEROS · Bloque: Enteros (conjunto, orden, operatoria)
# Grano: núcleo mínimo (1 recurso = 1 idea = 1 video corto).
# Nomenclatura: codigo RR.TT.rr. id = identificador semántico estable.
# competencia: M1 | M2 | U   dificultad: basica < media < avanzada
# Archivo separado (Opción 1). Temas 02.01–02.02.
# =============================================================================

rama: Números
codigo: "02"
abreviatura: NUM
temas:

  - codigo: "02.01"
    id: MAT.NUM.ENTEROS_CONJUNTO
    nombre: El conjunto de los números enteros y orden
    competencia: M1
    recursos:
      - { cod: "02.01.01", id: MAT.NUM.ENTEROS_CONJUNTO.NATURALES, nombre: "Identificación de los Números Naturales (N)", dificultad: basica, cursos: [1B, 5B, 7B] } # Fuente: Santillana 32
      - { cod: "02.01.02", id: MAT.NUM.ENTEROS_CONJUNTO.CARDINALES, nombre: "Identificación de los Números Cardinales (N0)", dificultad: basica, cursos: [1B, 5B, 7B] } # Fuente: Moraleja 21
      - { cod: "02.01.03", id: MAT.NUM.ENTEROS_CONJUNTO.DEFINICION, nombre: "Definición de los Números Enteros (Z) como extensión de N", dificultad: basica, cursos: [7B] } # Fuente: Santillana 48
      - { cod: "02.01.04", id: MAT.NUM.ENTEROS_CONJUNTO.POSITIVOS_NEGATIVOS, nombre: "Identificación de enteros positivos y negativos", dificultad: basica, cursos: [7B] } # Fuente: Moraleja 21
      - { cod: "02.01.05", id: MAT.NUM.ENTEROS_CONJUNTO.RECTA_UBICACION, nombre: "Ubicación de enteros en la recta numérica", dificultad: basica, cursos: [7B] } # Fuente: Santillana 48
      - { cod: "02.01.06", id: MAT.NUM.ENTEROS_CONJUNTO.RECTA_CONVENCION, nombre: "Convención de sentido en la recta (derecha vs izquierda)", dificultad: basica, cursos: [7B] } # Fuente: Baldor 10
      - { cod: "02.01.07", id: MAT.NUM.ENTEROS_CONJUNTO.ORDEN_LOGICA, nombre: "Determinación de orden en la recta numérica (mayor a la derecha)", dificultad: media, cursos: [7B] } # Fuente: Moraleja 22
      - { cod: "02.01.08", id: MAT.NUM.ENTEROS_CONJUNTO.TRICOTOMIA, nombre: "Ley de tricotomía para el orden de enteros (<, >, =)", dificultad: media, cursos: [7B, 1M] } # Fuente: Baldor 33
      - { cod: "02.01.09", id: MAT.NUM.ENTEROS_CONJUNTO.VALOR_ABSOLUTO_DEF, nombre: "Concepto de valor absoluto como distancia al origen", dificultad: basica, cursos: [7B] } # Fuente: Santillana 49
      - { cod: "02.01.10", id: MAT.NUM.ENTEROS_CONJUNTO.VALOR_ABSOLUTO_NOTACION, nombre: "Notación y signo del valor absoluto |x|", dificultad: basica, cursos: [7B] } # Fuente: Moraleja 21
      - { cod: "02.01.11", id: MAT.NUM.ENTEROS_CONJUNTO.VALOR_ABSOLUTO_OPUESTOS, nombre: "Propiedad: Valor absoluto de números opuestos", dificultad: media, cursos: [7B] } # Fuente: Santillana 49
      - { cod: "02.01.12", id: MAT.NUM.ENTEROS_CONJUNTO.PARES, nombre: "Definición de números pares", dificultad: basica, cursos: [3B, 7B] } # Fuente: Moraleja 25
      - { cod: "02.01.13", id: MAT.NUM.ENTEROS_CONJUNTO.IMPARES, nombre: "Definición de números impares", dificultad: basica, cursos: [3B, 7B] } # Fuente: Moraleja 25
      - { cod: "02.01.14", id: MAT.NUM.ENTEROS_CONJUNTO.SUCESOR, nombre: "Concepto de sucesor de un número (n + 1)", dificultad: basica, cursos: [1B, 7B] } # Fuente: Moraleja 31
      - { cod: "02.01.15", id: MAT.NUM.ENTEROS_CONJUNTO.ANTECESOR, nombre: "Concepto de antecesor de un número (n - 1)", dificultad: basica, cursos: [1B, 7B] } # Fuente: Moraleja 31

  - codigo: "02.02"
