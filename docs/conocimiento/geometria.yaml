# =============================================================================
# DETALLE — Rama GEOMETRÍA
# Backbone PAES (Cap 13-17). Aditivo con Geometría Cid (14 cap) y Carreño.
# =============================================================================

rama: Geometría
abreviatura: GEO
temas:

  - id: MAT.GEO.ANGULOS
    nombre: Ángulos y rectas
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Clasificación de ángulos", dificultad: basica }
      - { n: "02", nombre: "Ángulos entre paralelas cortadas por una transversal", dificultad: media }

  - id: MAT.GEO.PLANO-CARTESIANO
    nombre: Plano cartesiano
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Distancia entre dos puntos", dificultad: media }
      - { n: "02", nombre: "Punto medio de un segmento", dificultad: media }

  - id: MAT.GEO.TRIANGULOS
    nombre: Triángulos
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Clasificación de triángulos (lados y ángulos)", dificultad: basica }
      - { n: "02", nombre: "Suma de ángulos interiores y exteriores", dificultad: basica }
      - { n: "03", nombre: "Elementos secundarios (altura, bisectriz, simetral, mediana, transversal de gravedad)", dificultad: media }
      - { n: "04", nombre: "Puntos notables del triángulo", dificultad: media }

  - id: MAT.GEO.CONGRUENCIA
    nombre: Congruencia de triángulos
    dificultad: [media, media]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Concepto de congruencia", dificultad: media }
      - { n: "02", nombre: "Criterios de congruencia", dificultad: media }
      - { n: "03", nombre: "Aplicaciones de la congruencia", dificultad: media }

  - id: MAT.GEO.PITAGORAS
    nombre: Teorema de Pitágoras
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Teorema de Pitágoras", dificultad: basica }
      - { n: "02", nombre: "Tríos pitagóricos", dificultad: media }
      - { n: "03", nombre: "Aplicaciones de Pitágoras", dificultad: media }

  - id: MAT.GEO.EUCLIDES
    nombre: Teorema de Euclides
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Teorema de Euclides (relativo a la altura)", dificultad: media }
      - { n: "02", nombre: "Teorema de Euclides (relativo a los catetos)", dificultad: media }

  - id: MAT.GEO.AREA-PERIMETRO
    nombre: Áreas y perímetros de figuras planas
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Perímetros de figuras planas", dificultad: basica }
      - { n: "02", nombre: "Áreas de figuras planas", dificultad: media }
      - { n: "03", nombre: "Áreas de triángulos (casos frecuentes)", dificultad: media }

  - id: MAT.GEO.CUADRILATEROS
    nombre: Cuadriláteros y polígonos
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Clasificación de cuadriláteros", dificultad: basica }
      - { n: "02", nombre: "Paralelogramos y sus propiedades", dificultad: media }
      - { n: "03", nombre: "Trapecios y trapezoides", dificultad: media }
      - { n: "04", nombre: "Polígonos y polígonos regulares", dificultad: media }

  - id: MAT.GEO.CIRCUNFERENCIA
    nombre: Circunferencia y círculo
    dificultad: [media, avanzada]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Circunferencia y círculo: elementos", dificultad: media }
      - { n: "02", nombre: "Ángulos en la circunferencia", dificultad: media }
      - { n: "03", nombre: "Proporciones en la circunferencia (cuerdas, secantes, tangentes)", dificultad: avanzada }

  - id: MAT.GEO.THALES
    nombre: Teorema de Thales
    dificultad: [media, media]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Teorema de Thales", dificultad: media }
      - { n: "02", nombre: "División proporcional de segmentos", dificultad: media }

  - id: MAT.GEO.SEMEJANZA
    nombre: Semejanza y homotecia
    dificultad: [media, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Concepto de semejanza", dificultad: media }
      - { n: "02", nombre: "Criterios de semejanza", dificultad: media }
      - { n: "03", nombre: "Homotecia", dificultad: avanzada }
      - { n: "04", nombre: "Modelos a escala", dificultad: media }

  - id: MAT.GEO.CUERPOS
    nombre: Cuerpos geométricos
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Poliedros y cuerpos redondos", dificultad: media }
      - { n: "02", nombre: "Áreas y volúmenes de cuerpos", dificultad: media }
      - { n: "03", nombre: "Cuerpos generados por rotación y traslación", dificultad: avanzada }

  - id: MAT.GEO.ISOMETRIAS
    nombre: Transformaciones isométricas
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Traslación", dificultad: media }
      - { n: "02", nombre: "Simetría central", dificultad: media }
      - { n: "03", nombre: "Simetría axial", dificultad: media }
      - { n: "04", nombre: "Rotación", dificultad: media }
      - { n: "05", nombre: "Teselaciones", dificultad: media }

  - id: MAT.GEO.VECTORES-PLANO
    nombre: Vectores en el plano
    dificultad: [media, avanzada]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Vectores en el plano y representación", dificultad: media }
      - { n: "02", nombre: "Operatoria con vectores (suma, resta, ponderación)", dificultad: media }
      - { n: "03", nombre: "Módulo de un vector", dificultad: avanzada }

  - id: MAT.GEO.ESPACIO
    nombre: Geometría del espacio
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Sistema cartesiano tridimensional", dificultad: avanzada }
      - { n: "02", nombre: "Conceptos y propiedades en el espacio", dificultad: avanzada }
