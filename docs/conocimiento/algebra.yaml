# =============================================================================
# DETALLE — Rama ÁLGEBRA (Matemática preu)
# Nivel 2 del esqueleto: Tema/ítem → Recursos (cada recurso = una lección/video).
# Plantilla de granularidad para validar antes de escalar al resto de las ramas.
#
# Cada recurso (Tema.NN) es un pequeño avance progresivo; llevará su teoría + sus
# ejercicios por tipo (6 ejes). dificultad por recurso: basica < media < avanzada.
# competencia heredada del tema salvo override.
# =============================================================================

rama: Álgebra
abreviatura: ALG
temas:

  - id: MAT.ALG.LENGUAJE
    nombre: Lenguaje algebraico
    dificultad: [basica, basica]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Del lenguaje natural al algebraico (traducción)", dificultad: basica }
      - { n: "02", nombre: "Valorización de expresiones algebraicas", dificultad: basica }

  - id: MAT.ALG.EXPRESIONES
    nombre: Operatoria con expresiones algebraicas
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Término algebraico y términos semejantes (reducción)", dificultad: basica }
      - { n: "02", nombre: "Agrupación de términos semejantes", dificultad: basica }
      - { n: "03", nombre: "Reducción de expresiones con paréntesis", dificultad: basica }
      - { n: "04", nombre: "Multiplicación: monomio por monomio", dificultad: basica }
      - { n: "05", nombre: "Multiplicación: monomio por polinomio", dificultad: media }
      - { n: "06", nombre: "Multiplicación: polinomio por polinomio", dificultad: media }
      - { n: "07", nombre: "División de expresiones algebraicas", dificultad: media }

  - id: MAT.ALG.PRODUCTOS-NOTABLES
    nombre: Productos notables
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Cuadrado de binomio", dificultad: media }
      - { n: "02", nombre: "Suma por su diferencia", dificultad: media }
      - { n: "03", nombre: "Cubo de binomio", dificultad: media }
      - { n: "04", nombre: "Producto de binomios con término común (x+a)(x+b)", dificultad: media }
      - { n: "05", nombre: "Cuadrado de trinomio", dificultad: media }

  - id: MAT.ALG.FACTORIZACION
    nombre: Factorización
    dificultad: [media, avanzada]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Factor común (monomio)", dificultad: media }
      - { n: "02", nombre: "Factor común por agrupación", dificultad: media }
      - { n: "03", nombre: "Diferencia de cuadrados", dificultad: media }
      - { n: "04", nombre: "Trinomio cuadrado perfecto", dificultad: media }
      - { n: "05", nombre: "Trinomio de la forma x² + bx + c", dificultad: media }
      - { n: "06", nombre: "Trinomio de la forma ax² + bx + c", dificultad: avanzada }
      - { n: "07", nombre: "Suma y diferencia de cubos", dificultad: avanzada }
      - { n: "08", nombre: "Factorización combinada (varios métodos)", dificultad: avanzada }

  - id: MAT.ALG.MCD-MCM
    nombre: M.C.D. y m.c.m. de expresiones algebraicas
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "M.C.D. de expresiones algebraicas", dificultad: media }
      - { n: "02", nombre: "m.c.m. de expresiones algebraicas", dificultad: media }

  - id: MAT.ALG.FRACCIONES
    nombre: Fracciones algebraicas
    dificultad: [media, avanzada]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Simplificación de fracciones algebraicas", dificultad: media }
      - { n: "02", nombre: "Multiplicación y división", dificultad: media }
      - { n: "03", nombre: "Adición y sustracción (igual denominador)", dificultad: media }
      - { n: "04", nombre: "Adición y sustracción (distinto denominador)", dificultad: avanzada }
      - { n: "05", nombre: "Fracciones algebraicas compuestas", dificultad: avanzada }

  - id: MAT.ALG.ECUACIONES-1
    nombre: Ecuaciones de primer grado
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Ecuación de primer grado (coeficientes enteros)", dificultad: basica }
      - { n: "02", nombre: "Ecuaciones con coeficientes fraccionarios", dificultad: media }
      - { n: "03", nombre: "Ecuaciones fraccionarias (incógnita en el denominador)", dificultad: media }
      - { n: "04", nombre: "Ecuaciones literales", dificultad: media }
      - { n: "05", nombre: "Análisis de soluciones (única, infinitas, ninguna)", dificultad: media }

  - id: MAT.ALG.VALOR-ABS-EC
    nombre: Ecuaciones e inecuaciones con valor absoluto
    dificultad: [media, avanzada]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Ecuaciones con valor absoluto", dificultad: media }
      - { n: "02", nombre: "Inecuaciones con valor absoluto", dificultad: avanzada }

  - id: MAT.ALG.SISTEMAS-1
    nombre: Sistemas de ecuaciones de primer grado
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Método de sustitución", dificultad: media }
      - { n: "02", nombre: "Método de igualación", dificultad: media }
      - { n: "03", nombre: "Método de reducción", dificultad: media }
      - { n: "04", nombre: "Análisis de un sistema (compatible/incompatible)", dificultad: media }
      - { n: "05", nombre: "Sistemas de tres incógnitas", dificultad: avanzada }

  - id: MAT.ALG.PLANTEAMIENTO
    nombre: Problemas de planteamiento
    dificultad: [media, avanzada]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Problemas con una ecuación", dificultad: media }
      - { n: "02", nombre: "Problemas de dígitos", dificultad: media }
      - { n: "03", nombre: "Problemas de edades", dificultad: media }
      - { n: "04", nombre: "Problemas de móviles, caudales y trabajo", dificultad: avanzada }
      - { n: "05", nombre: "Problemas que se resuelven con sistemas", dificultad: avanzada }

  - id: MAT.ALG.DESIGUALDADES
    nombre: Desigualdades e inecuaciones de primer grado
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Desigualdades e intervalos", dificultad: media }
      - { n: "02", nombre: "Inecuaciones de primer grado con una incógnita", dificultad: media }
      - { n: "03", nombre: "Inecuaciones simultáneas", dificultad: media }
      - { n: "04", nombre: "Problemas con inecuaciones", dificultad: avanzada }

  - id: MAT.ALG.ECUACIONES-2
    nombre: Ecuaciones de segundo grado
    dificultad: [media, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Cuadrática por factorización", dificultad: media }
      - { n: "02", nombre: "Cuadrática por fórmula general", dificultad: media }
      - { n: "03", nombre: "Discriminante y naturaleza de las raíces", dificultad: avanzada }
      - { n: "04", nombre: "Relación entre coeficientes y raíces", dificultad: avanzada }
      - { n: "05", nombre: "Ecuaciones bicuadráticas", dificultad: avanzada }
      - { n: "06", nombre: "Ecuaciones reductibles a cuadráticas", dificultad: avanzada }

  - id: MAT.ALG.INECUACIONES-2
    nombre: Inecuaciones de segundo grado y fraccionarias
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Inecuaciones de segundo grado", dificultad: avanzada }
      - { n: "02", nombre: "Inecuaciones fraccionarias", dificultad: avanzada }

  - id: MAT.ALG.SISTEMAS-2
    nombre: Sistemas de ecuaciones de segundo grado
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Sistema con una ecuación lineal y una cuadrática", dificultad: avanzada }
