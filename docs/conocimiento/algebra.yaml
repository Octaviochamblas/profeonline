      - { n: "03", nombre: "Sistemas de la forma x² ± y² = a, xy = b", dificultad: avanzada }

  - id: MAT.ALG.POLINOMIOS
    nombre: Polinomios y teoría de ecuaciones
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Operaciones con polinomios", dificultad: media }
