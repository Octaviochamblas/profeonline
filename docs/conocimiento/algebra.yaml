      - { n: "03", nombre: "Teorema del resto y del factor", dificultad: avanzada }
      - { n: "04", nombre: "Raíces de un polinomio y factorización", dificultad: avanzada }
      - { n: "05", nombre: "Relación entre coeficientes y raíces", dificultad: avanzada }

  - id: MAT.ALG.PROG-LINEAL
    nombre: Sistemas de inecuaciones y programación lineal
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Inecuaciones con dos variables", dificultad: avanzada }
