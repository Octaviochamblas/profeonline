      - { n: "02", nombre: "Funciones periódicas", dificultad: avanzada }
      - { n: "03", nombre: "Funciones pares e impares", dificultad: avanzada }

  - id: MAT.TRIG.ECUACIONES
    nombre: Ecuaciones trigonométricas
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Ecuaciones trigonométricas", dificultad: avanzada }

  - id: MAT.TRIG.TRIANGULO-NO-RECT
    nombre: Resolución de triángulos no rectángulos
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Teorema del seno", dificultad: avanzada }
      - { n: "02", nombre: "Teorema del coseno", dificultad: avanzada }
      - { n: "03", nombre: "Ángulos de elevación y depresión", dificultad: media }
