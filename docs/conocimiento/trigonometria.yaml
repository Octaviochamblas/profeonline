rama: Trigonometría
abreviatura: TRIG
temas:

  - id: MAT.TRIG.ANGULOS-MEDICION
    nombre: Medición de ángulos
    dificultad: [media, media]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Sistemas de medición de ángulos (grados y radianes)", dificultad: media }

  - id: MAT.TRIG.RAZONES
    nombre: Razones trigonométricas
    dificultad: [media, media]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Razones trigonométricas en el triángulo rectángulo", dificultad: media }
      - { n: "02", nombre: "Aplicación con el teorema de Pitágoras", dificultad: media }

  - id: MAT.TRIG.VALORES-ESPECIALES
    nombre: Razones de ángulos especiales
    dificultad: [media, media]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Razones de 30°, 45° y 60°", dificultad: media }
      - { n: "02", nombre: "Razones de 0°, 90°, 180° y 270°", dificultad: media }

  - id: MAT.TRIG.IDENTIDADES
    nombre: Identidades trigonométricas
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Identidades trigonométricas fundamentales", dificultad: avanzada }

  - id: MAT.TRIG.FUNCIONES
    nombre: Funciones trigonométricas
    dificultad: [avanzada, avanzada]
