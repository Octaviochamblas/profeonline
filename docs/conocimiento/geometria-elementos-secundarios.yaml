      - { cod: "04.03.05.04", id: MAT.GEO.SEGMENTO_MEDIO.CUATRO_TRIANGULOS_CONGRUENTES, nombre: "División del triángulo en cuatro triángulos congruentes por sus segmentos medios", dificultad: avanzada, competencia: M1, cursos: [8B, 1M] } # Fuente: Moraleja 43
      - { cod: "04.03.05.05", id: MAT.GEO.SEGMENTO_MEDIO.TRIANGULO_CENTRAL_AREA_UN_CUARTO, nombre: "Razón de área 1:4 entre el triángulo central formado por segmentos medios y el triángulo original", dificultad: avanzada, competencia: M1, cursos: [8B, 1M] } # sin fuente

