# =============================================================================
# DETALLE — Rama NÚMEROS (Aritmética)  ·  "desde 0", base de todo
# Backbone: PAES 9ª ed. (Cap 1, 2, 4, 8, 10). Aditivo con Santillana (Cap 2) y
# Carreño (Cap 6 potencias/raíces, 7 logaritmos, 9 complejos). Nada omitido.
# Nivel 2: Tema/ítem → Recursos (cada recurso = una lección/video).
# =============================================================================

rama: Números (Aritmética)
abreviatura: NUM
temas:

  - id: MAT.NUM.CONJUNTOS
    nombre: Conjuntos numéricos
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Conjuntos numéricos y cadena de inclusión (ℕ⊂ℤ⊂ℚ⊂ℝ⊂ℂ)", dificultad: basica }

  - id: MAT.NUM.NATURALES
    nombre: Números naturales y sistemas de numeración
    dificultad: [basica, basica]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Sistemas de numeración (decimal y otros)", dificultad: basica }
      - { n: "02", nombre: "Números naturales: orden y operatoria", dificultad: basica }

  - id: MAT.NUM.DIVISIBILIDAD
    nombre: Divisibilidad, múltiplos y divisores
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Múltiplos y divisores", dificultad: basica }
      - { n: "02", nombre: "Criterios de divisibilidad", dificultad: basica }
      - { n: "03", nombre: "Paridad e imparidad", dificultad: basica }

  - id: MAT.NUM.PRIMOS
    nombre: Números primos y teorema fundamental
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Números primos y compuestos", dificultad: basica }
      - { n: "02", nombre: "Descomposición en factores primos (teorema fundamental)", dificultad: media }

  - id: MAT.NUM.MCM-MCD
    nombre: M.C.M. y M.C.D.
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Mínimo común múltiplo (m.c.m.)", dificultad: media }
      - { n: "02", nombre: "Máximo común divisor (M.C.D.)", dificultad: media }
      - { n: "03", nombre: "Problemas de aplicación de m.c.m. y M.C.D.", dificultad: media }

  - id: MAT.NUM.ENTEROS
    nombre: Números enteros
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "El conjunto ℤ y la recta numérica", dificultad: basica }
      - { n: "02", nombre: "Orden y comparación en ℤ", dificultad: basica }
      - { n: "03", nombre: "Adición y sustracción de enteros", dificultad: basica }
      - { n: "04", nombre: "Multiplicación y división de enteros", dificultad: basica }
      - { n: "05", nombre: "Propiedades y prioridad de las operaciones", dificultad: media }
      - { n: "06", nombre: "Operaciones combinadas en ℤ", dificultad: media }

  - id: MAT.NUM.VALOR-ABS
    nombre: Valor absoluto
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Valor absoluto y sus propiedades", dificultad: media }

  - id: MAT.NUM.RACIONALES
    nombre: Fracciones y números racionales
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "El conjunto ℚ y tipos de fracciones", dificultad: basica }
      - { n: "02", nombre: "Fracciones equivalentes: amplificación y simplificación", dificultad: basica }
      - { n: "03", nombre: "Fracciones irreducibles", dificultad: basica }
      - { n: "04", nombre: "Adición y sustracción de fracciones", dificultad: media }
      - { n: "05", nombre: "Multiplicación y división de fracciones", dificultad: media }
      - { n: "06", nombre: "Operaciones combinadas con fracciones", dificultad: media }
      - { n: "07", nombre: "Propiedades de la operatoria en ℚ", dificultad: media }

  - id: MAT.NUM.DECIMALES
    nombre: Números decimales y conversión
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Tipos de decimales (finito, periódico, semiperiódico)", dificultad: basica }
      - { n: "02", nombre: "Operatoria con decimales", dificultad: basica }
      - { n: "03", nombre: "Transformación de decimal a fracción", dificultad: media }
      - { n: "04", nombre: "Relación de orden en ℚ", dificultad: media }

  - id: MAT.NUM.APROXIMACION
    nombre: Aproximación, redondeo y estimación
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Aproximación por defecto y por exceso", dificultad: basica }
      - { n: "02", nombre: "Truncamiento y redondeo", dificultad: basica }

  - id: MAT.NUM.IRRACIONALES
    nombre: Números irracionales
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Concepto de número irracional", dificultad: media }
      - { n: "02", nombre: "Representación de irracionales en la recta", dificultad: media }

  - id: MAT.NUM.REALES
    nombre: Números reales
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "El conjunto ℝ y la recta real continua", dificultad: media }
      - { n: "02", nombre: "Aproximación y operatoria en ℝ", dificultad: media }

  - id: MAT.NUM.POTENCIAS
    nombre: Potencias y sus propiedades
    dificultad: [basica, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Potencias de exponente natural", dificultad: basica }
      - { n: "02", nombre: "Exponente cero y exponente entero negativo", dificultad: media }
      - { n: "03", nombre: "Multiplicación y división de potencias de igual base", dificultad: media }
      - { n: "04", nombre: "Potencia de una potencia", dificultad: media }
      - { n: "05", nombre: "Potencias de igual exponente (producto y cociente)", dificultad: media }
      - { n: "06", nombre: "Exponente racional (fraccionario)", dificultad: media }
      - { n: "07", nombre: "Operaciones combinadas con potencias", dificultad: media }

  - id: MAT.NUM.NOTACION-CIENT
    nombre: Notación científica
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Notación científica y operatoria", dificultad: media }

  - id: MAT.NUM.RAICES
    nombre: Raíces y sus propiedades
    dificultad: [media, avanzada]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Raíz enésima y sus propiedades", dificultad: media }
      - { n: "02", nombre: "Multiplicación y división de raíces de igual índice", dificultad: media }
      - { n: "03", nombre: "Raíz de una raíz", dificultad: media }
      - { n: "04", nombre: "Ingreso y extracción de factores de una raíz", dificultad: media }
      - { n: "05", nombre: "Adición y sustracción de raíces semejantes", dificultad: avanzada }

  - id: MAT.NUM.RACIONALIZACION
    nombre: Racionalización y ecuaciones irracionales
    dificultad: [media, avanzada]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Racionalización de monomios", dificultad: media }
      - { n: "02", nombre: "Racionalización con binomios (conjugado)", dificultad: avanzada }
      - { n: "03", nombre: "Denominador con sumas de raíces cúbicas", dificultad: avanzada }
      - { n: "04", nombre: "Ecuaciones irracionales", dificultad: avanzada }

  - id: MAT.NUM.EXPONENCIAL-EC
    nombre: Ecuación exponencial (igualdad de bases)
    dificultad: [media, media]
    competencia: M1
    recursos:
      - { n: "01", nombre: "Ecuación exponencial con igualdad de bases", dificultad: media }

  - id: MAT.NUM.LOGARITMOS
    nombre: Logaritmos
    dificultad: [media, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Definición de logaritmo", dificultad: media }
      - { n: "02", nombre: "Propiedades de los logaritmos", dificultad: media }
      - { n: "03", nombre: "Cambio de base", dificultad: avanzada }
      - { n: "04", nombre: "Ecuaciones logarítmicas", dificultad: avanzada }
      - { n: "05", nombre: "Ecuaciones exponenciales con distinta base (vía logaritmo)", dificultad: avanzada }

  - id: MAT.NUM.COMPLEJOS
    nombre: Números complejos
    dificultad: [avanzada, avanzada]
    competencia: M2
    recursos:
      - { n: "01", nombre: "Unidad imaginaria y forma binómica (a+bi)", dificultad: avanzada }
      - { n: "02", nombre: "Operaciones con números complejos", dificultad: avanzada }
      - { n: "03", nombre: "Potencias de i", dificultad: avanzada }
      - { n: "04", nombre: "Conjugado y módulo", dificultad: avanzada }
      - { n: "05", nombre: "Representación geométrica (plano complejo)", dificultad: avanzada }
      - { n: "06", nombre: "Forma polar o trigonométrica", dificultad: avanzada }
      - { n: "07", nombre: "Producto, cociente y potenciación en forma polar (De Moivre)", dificultad: avanzada }
      - { n: "08", nombre: "Radicación de números complejos", dificultad: avanzada }
