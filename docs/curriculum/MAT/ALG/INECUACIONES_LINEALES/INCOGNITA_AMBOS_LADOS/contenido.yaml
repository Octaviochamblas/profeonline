semantic_id: MAT.ALG.INECUACIONES_LINEALES.INCOGNITA_AMBOS_LADOS
titulo: Inecuaciones Lineales con Incógnita en Ambos Lados
objetivo: Resolver inecuaciones lineales agrupando términos semejantes cuando la variable
  aparece en ambos lados de la desigualdad.
introduccion: Muchas veces, las expresiones matemáticas involucran variables distribuidas
  en distintos miembros de una ecuación o inecuación. Para encontrar la solución,
  es necesario reordenar estos términos empleando las operaciones básicas, manteniendo
  las propiedades fundamentales de las desigualdades.
resumen: Para resolver una inecuación lineal con incógnitas en ambos lados, se agrupan
  los términos con la variable de un lado y los términos constantes del otro, utilizando
  operaciones inversas y recordando invertir el signo de desigualdad si se multiplica
  o divide por un número negativo.
explicacion: '### Definición formal

  Una inecuación lineal con la incógnita en ambos lados es de la forma $ax + b < cx
  + d$, donde $a$, $b$, $c$ y $d$ son constantes reales con $a \neq c$, y el símbolo
  $<$ puede ser sustituido por $\leq$, $>$, o $\geq$. Su resolución implica la aplicación
  sistemática de propiedades de las desigualdades: si se suma o resta un mismo término
  a ambos lados, la desigualdad se mantiene.


  ### Desarrollo didáctico

  Al enfrentar inecuaciones como $3x - 5 \geq x + 7$, el principio rector es juntar
  los términos que contienen $x$ y separarlos de los números puros.


  Podemos optar por mover $x$ hacia el lado izquierdo, restando $x$ a ambos lados
  de la inecuación: $3x - x - 5 \geq 7$. Esto simplifica a $2x - 5 \geq 7$. A continuación,
  agrupamos las constantes sumando $5$ en ambos miembros: $2x \geq 12$. Por último,
  para despejar $x$, dividimos entre $2$. Como $2$ es positivo, la dirección de la
  desigualdad no cambia: $x \geq 6$.


  Es relevante notar que si decidimos agrupar los términos de manera que el coeficiente
  final de la variable resulte negativo (por ejemplo, operando hacia el lado derecho
  para ciertas inecuaciones), al final deberemos dividir o multiplicar por dicho coeficiente.
  En ese caso, la regla fundamental de las desigualdades dictamina que debemos invertir
  el signo de la desigualdad. Por ello, a menudo resulta estratégico agrupar los términos
  variables donde su coeficiente resulte positivo para evitar errores en el último
  paso.'
procedimiento:
- Utilizar la propiedad distributiva, si es necesario, para eliminar paréntesis en
  ambos lados.
- Agrupar todos los términos que contengan la incógnita en un lado de la desigualdad
  sumando o restando términos a ambos lados.
- Agrupar todos los términos constantes en el otro lado de la desigualdad de la misma
  manera.
- Reducir términos semejantes para obtener una inecuación de la forma $Ax < B$ o similar.
- Despejar la incógnita multiplicando o dividiendo. Si se multiplica o divide por
  un número negativo, invertir el sentido de la desigualdad.
ejemplos:
- titulo: Resolución directa con variable positiva
  enunciado: Resuelve la inecuación $5x - 4 < 2x + 11$.
  solucion_pasos:
  - 'Restamos $2x$ a ambos lados para agrupar variables: $5x - 2x - 4 < 11$.'
  - 'Simplificamos los términos: $3x - 4 < 11$.'
  - 'Sumamos $4$ a ambos lados: $3x < 11 + 4$.'
  - 'Simplificamos: $3x < 15$.'
  - 'Dividimos por $3$ (que es positivo, no se invierte la desigualdad): $x < 5$.'
- titulo: Agrupamiento que resulta en coeficiente negativo
  enunciado: Resuelve la inecuación $2x + 9 \geq 6x - 7$.
  solucion_pasos:
  - 'Restamos $6x$ de ambos lados: $2x - 6x + 9 \geq -7$.'
  - Simplificamos a $-4x + 9 \geq -7$.
  - 'Restamos $9$ de ambos lados: $-4x \geq -7 - 9$, quedando $-4x \geq -16$.'
  - Dividimos por $-4$. Como es negativo, invertimos el signo de $\geq$ a $\leq$.
  - La solución es $x \leq 4$.
- titulo: ¿Es $x > -2$ la solución de $x - 3 < 3x + 1$?
  respuesta: Sí
  solucion_pasos:
  - 'Restamos $x$ a ambos lados: $-3 < 2x + 1$.'
  - 'Restamos $1$ a ambos lados: $-4 < 2x$.'
  - 'Dividimos entre $2$: $-2 < x$.'
  - Esto es equivalente a $x > -2$. La afirmación es correcta.
- titulo: ¿El intervalo solución de $4 - 2x \geq 8 - 4x$ incluye el número $-1$?
  respuesta: 'No'
  solucion_pasos:
  - 'Sumamos $4x$ a ambos lados: $4 - 2x + 4x \geq 8$.'
  - 'Simplificamos: $4 + 2x \geq 8$.'
  - 'Restamos $4$ a ambos lados: $2x \geq 4$.'
  - 'Dividimos entre $2$: $x \geq 2$.'
  - El número $-1$ no es mayor o igual a $2$, por lo que no pertenece al conjunto
    solución.
errores_frecuentes:
- Agrupar erróneamente los términos sin cambiar los signos al moverlos al otro lado
  de la inecuación.
- Olvidar invertir el signo de la desigualdad cuando se divide por un coeficiente
  negativo que acompaña a la variable.
- Sumar los coeficientes de un mismo lado pero tratarlos como si se estuvieran moviendo,
  duplicando la operación.
- Confundir un coeficiente negativo con una constante, y sumarlo en lugar de dividir
  al despejar la incógnita.
- Invertir el símbolo de desigualdad al dividir por una constante positiva si el número
  en el lado opuesto era negativo.
